question: В каком состоянии находится запись в кэше ip neigh, если сопоставление IP/MAC является действительным и недавним?
answer: ПОДРОБНЕЕ
wrong_answers:
  - ПОДКЛЮЧЕННЫЕ
  - VALID
  - СТАЛЬ
explanation: |
  Состояние REACHABLE означает, что сопоставление IP/MAC известно и функционирует в кэше соседей.
reviewed: false
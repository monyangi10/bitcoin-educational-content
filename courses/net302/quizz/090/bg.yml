question: Кога се използва опцията -u в lsof?
answer: Филтриране по потребител
wrong_answers:
  - Принудително разрешаване на DNS
  - Показване на отворени портове
  - Задаване на DNS сървър
explanation: |
  Опцията -u в lsof ограничава изхода до файлове, отворени от определен потребител или UID.
reviewed: false
question: lsof में -u विकल्प का प्रयोग कब किया जाता है?
answer: उपयोगकर्ता द्वारा फ़िल्टर करने के लिए
wrong_answers:
  - DNS रिज़ॉल्यूशन को बाध्य करने के लिए
  - खुले पोर्ट प्रदर्शित करने के लिए
  - DNS सर्वर निर्दिष्ट करने के लिए
explanation: |
  lsof में -u विकल्प आउटपुट को किसी विशिष्ट उपयोगकर्ता या UID द्वारा खोली गई फ़ाइलों तक सीमित कर देता है।
reviewed: false
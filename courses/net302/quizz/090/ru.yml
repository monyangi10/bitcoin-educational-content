question: Когда используется опция -u в lsof?
answer: Чтобы отфильтровать по пользователю
wrong_answers:
  - Чтобы принудительно разрешить DNS
  - Чтобы отобразить открытые порты
  - Чтобы указать DNS-сервер
explanation: |
  Параметр -u в lsof ограничивает вывод файлов, открытых определенным пользователем или UID.
reviewed: false
question: گزینه -u در lsof چه زمانی استفاده می‌شود؟
answer: برای فیلتر کردن بر اساس کاربر
wrong_answers:
  - برای مجبور کردن حل DNS
  - برای نمایش پورت‌های باز
  - برای مشخص کردن یک سرور DNS
explanation: |
  گزینه -u در lsof خروجی را به فایل‌هایی که توسط یک کاربر یا UID خاص باز شده‌اند محدود می‌کند.
reviewed: false
question: Какво е дейтаграма в контекста на IP протокола?
answer: Самостоятелен блок от данни, пренасян по мрежата
wrong_answers:
  - Криптирано съобщение, предназначено за едно устройство
  - TCP сегмент, капсулиран в UDP
  - Физически сигнал от слоя за достъп до мрежата
explanation: |
  IP данните се предават под формата на дейтаграми - независими блокове, които съдържат цялата информация, необходима за доставката.
reviewed: false
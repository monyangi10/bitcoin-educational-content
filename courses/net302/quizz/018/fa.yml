question: دیتاگرام در زمینه پروتکل IP چیست؟
answer: یک بلوک داده مستقل که از طریق شبکه منتقل می‌شود
wrong_answers:
  - یک پیام رمزگذاری‌شده که برای یک دستگاه خاص ارسال شده است
  - یک بخش TCP محصور شده در UDP
  - یک سیگنال فیزیکی از شبکه دسترسی Layer
explanation: |
  داده‌های IP به صورت دیتاگرام‌ها منتقل می‌شوند، بلوک‌های مستقلی که حاوی تمام اطلاعات لازم برای تحویل هستند.
reviewed: false
question: Что такое дейтаграмма в контексте протокола IP?
answer: Самостоятельный блок данных, передаваемый по сети
wrong_answers:
  - Зашифрованное сообщение, предназначенное для одного устройства
  - Сегмент TCP, инкапсулированный в UDP
  - Физический сигнал от устройства сетевого доступа Layer
explanation: |
  IP-данные передаются в виде дейтаграмм - независимых блоков, содержащих всю необходимую для доставки информацию.
reviewed: false
question: आईपी ​​प्रोटोकॉल के संदर्भ में डेटाग्राम क्या है?
answer: नेटवर्क पर ले जाए जाने वाले डेटा का एक स्व-निहित ब्लॉक
wrong_answers:
  - एक एन्क्रिप्टेड संदेश जो एक ही डिवाइस के लिए है
  - UDP में समाहित एक TCP खंड
  - नेटवर्क एक्सेस Layer से एक भौतिक संकेत
explanation: |
  आईपी ​​डेटा को डेटाग्राम के रूप में प्रेषित किया जाता है, जो स्वतंत्र ब्लॉक होते हैं जिनमें वितरण के लिए आवश्यक सभी सूचनाएं होती हैं।

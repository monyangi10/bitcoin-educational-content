question: ในบริบทของโปรโตคอล IP datagram คืออะไร?
answer: บล็อกข้อมูลที่บรรจุในตัวเองที่ส่งผ่านเครือข่าย
wrong_answers:
  - ข้อความที่เข้ารหัสสำหรับอุปกรณ์เดียว
  - เซ็กเมนต์ TCP ที่ห่อหุ้มใน UDP
  - สัญญาณทางกายภาพจากชั้นการเข้าถึงเครือข่าย
explanation: |
  ข้อมูล IP ถูกส่งในรูปแบบของ datagrams ซึ่งเป็นบล็อกอิสระที่มีข้อมูลทั้งหมดที่จำเป็นสำหรับการส่งมอบ
reviewed: false
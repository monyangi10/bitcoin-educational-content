question: I hvilken DNS-sone plasseres PTR-oppføringer for revers oppløsning av IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Sonen ip6.arpa er spesifikt dedikert til omvendt oppløsning av IPv6-adresser, mens in-addr.arpa brukes for IPv4.
reviewed: false
question: ¿En qué zona DNS se colocan los registros PTR para la resolución inversa IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  La zona ip6.arpa está dedicada específicamente a la resolución inversa de direcciones IPv6, mientras que in-addr.arpa se utiliza para IPv4.
reviewed: false
question: Di zona DNS mana catatan PTR ditempatkan untuk resolusi balik IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Zona ip6.arpa secara khusus didedikasikan untuk resolusi balik alamat IPv6, sedangkan in-addr.arpa digunakan untuk IPv4.
reviewed: false
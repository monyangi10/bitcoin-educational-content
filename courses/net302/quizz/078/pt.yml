question: Em que zona DNS são colocados os registos PTR para a resolução inversa do IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  A zona ip6.arpa é especificamente dedicada à resolução inversa de endereços IPv6, enquanto in-addr.arpa é utilizada para IPv4.
reviewed: false
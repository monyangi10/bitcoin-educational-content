question: Bản ghi PTR được đặt ở vùng DNS nào để giải quyết vấn đề ngược IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Vùng ip6.arpa được dành riêng cho việc phân giải ngược địa chỉ IPv6, trong khi in-addr.arpa được sử dụng cho IPv4.
reviewed: false
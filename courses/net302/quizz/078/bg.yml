question: В коя DNS зона се поставят PTR записи за обратна резолюция на IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Зоната ip6.arpa е специално предназначена за обратното разрешаване на IPv6 адреси, докато in-addr.arpa се използва за IPv4.
reviewed: false
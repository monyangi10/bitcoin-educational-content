question: Ve které zóně DNS jsou umístěny záznamy PTR pro reverzní překlad protokolu IPv6?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Zóna ip6.arpa je určena speciálně pro reverzní překlad adres IPv6, zatímco zóna in-addr.arpa se používá pro IPv4.
reviewed: false
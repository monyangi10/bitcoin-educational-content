question: Rekodi za PTR zimewekwa katika eneo gani la DNS kwa azimio la kubadili nyuma la IPv6?
answer: ip6.arpa
wrong_answers:
  - katika-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  Ukanda wa ip6.arpa umejitolea mahsusi kwa utatuzi wa kubadilisha wa anwani za IPv6, wakati in-addr.arpa inatumika kwa IPv4.
reviewed: false
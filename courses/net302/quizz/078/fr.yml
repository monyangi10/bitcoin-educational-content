question: Dans quelle zone DNS place-t-on les enregistrements PTR pour la résolution inverse d’IPv6 ?
answer: ip6.arpa
wrong_answers:
  - in-addr.arpa
  - ipv6.arpa
  - rev.arpa
explanation: |
  La zone ip6.arpa est spécifiquement dédiée à la résolution inverse des adresses IPv6, alors que in-addr.arpa sert pour IPv4.
reviewed: true 

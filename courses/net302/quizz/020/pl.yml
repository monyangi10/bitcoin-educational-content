question: Jaka jest główna różnica między protokołami TCP i UDP?
answer: TCP jest zorientowany na połączenia, UDP nie jest
wrong_answers:
  - TCP działa tylko w sieciach lokalnych, UDP w Internecie
  - TCP zawsze używa szyfrowania, UDP nigdy tego nie robi
  - TCP zarządza fragmentacją IP, UDP obsługuje kompresję
explanation: |
  Protokół TCP wymaga ustanowienia i monitorowania połączenia, podczas gdy protokół UDP wysyła pakiety bez konfigurowania lub kontrolowania wcześniejszej sesji.

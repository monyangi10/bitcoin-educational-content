question: تفاوت اصلی بین TCP و UDP چیست؟
answer: TCP اتصال‌گرا است، UDP این‌گونه نیست
wrong_answers:
  - TCP فقط در شبکه‌های محلی کار می‌کند، UDP در اینترنت
  - ‏TCP همیشه از رمزگذاری استفاده می‌کند، UDP هرگز این کار را نمی‌کند
  - TCP مدیریت تکه‌تکه شدن IP را بر عهده دارد، UDP فشرده‌سازی را انجام می‌دهد
explanation: |
  TCP نیاز به برقراری و نظارت بر یک اتصال دارد، در حالی که UDP بسته‌ها را بدون تنظیم یا کنترل یک جلسه قبلی ارسال می‌کند.
reviewed: false
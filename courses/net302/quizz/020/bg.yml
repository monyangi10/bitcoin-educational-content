question: Каква е основната разлика между TCP и UDP?
answer: TCP е ориентиран към връзката, а UDP - не
wrong_answers:
  - TCP работи само в локални мрежи, а UDP - в интернет
  - TCP винаги използва криптиране, а UDP - никога
  - TCP управлява фрагментацията на IP, а UDP се справя с компресията
explanation: |
  TCP изисква установяване и наблюдение на връзка, докато UDP изпраща пакети, без да установява или контролира предварителна сесия.

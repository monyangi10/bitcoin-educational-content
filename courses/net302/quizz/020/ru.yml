question: В чем основное различие между TCP и UDP?
answer: TCP ориентирован на соединение, UDP - нет
wrong_answers:
  - TCP работает только в локальных сетях, UDP - в Интернете
  - TCP всегда использует шифрование, UDP - никогда
  - TCP управляет фрагментацией IP, UDP - сжатием
explanation: |
  TCP требует установления и контроля соединения, в то время как UDP отправляет пакеты без установления и контроля предварительного сеанса связи.

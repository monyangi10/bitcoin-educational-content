question: ความแตกต่างหลักระหว่าง TCP และ UDP คืออะไร?
answer: TCP เป็นแบบ connection-oriented, UDP ไม่ใช่
wrong_answers:
  - TCP ใช้งานได้เฉพาะในเครือข่ายท้องถิ่น, UDP บนอินเทอร์เน็ต
  - TCP มักใช้การเข้ารหัสเสมอ, UDP ไม่เคยใช้
  - TCP จัดการการแบ่งส่วน IP, UDP จัดการการบีบอัด
explanation: |
  TCP ต้องการการเชื่อมต่อที่ถูกสร้างขึ้นและตรวจสอบ ในขณะที่ UDP ส่งแพ็กเก็ตโดยไม่ต้องตั้งค่าหรือควบคุมเซสชันล่วงหน้า

question: Quelle est la différence majeure entre TCP et UDP ?
answer: TCP est orienté connexion, UDP non
wrong_answers:
  - TCP fonctionne uniquement sur réseaux locaux, UDP sur Internet
  - TCP utilise le chiffrement systématique, UDP jamais
  - TCP gère la fragmentation IP, UDP la compression
explanation: |
  TCP nécessite d’établir une connexion avec suivi des échanges, tandis qu’UDP envoie les paquets sans établir ni contrôler de session préalable.
reviewed: true 

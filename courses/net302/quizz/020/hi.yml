question: टीसीपी और यूडीपी के बीच मुख्य अंतर क्या है?
answer: टीसीपी कनेक्शन-उन्मुख है, यूडीपी नहीं है
wrong_answers:
  - टीसीपी केवल स्थानीय नेटवर्क पर काम करता है, जबकि यूडीपी इंटरनेट पर काम करता है
  - TCP हमेशा एन्क्रिप्शन का उपयोग करता है, UDP कभी नहीं
  - टीसीपी आईपी विखंडन का प्रबंधन करता है, यूडीपी संपीड़न को संभालता है
explanation: |
  टीसीपी के लिए कनेक्शन स्थापित करने और निगरानी की आवश्यकता होती है, जबकि यूडीपी बिना किसी पूर्व सत्र को स्थापित या नियंत्रित किए पैकेट भेजता है।
reviewed: false
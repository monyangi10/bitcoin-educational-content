question: В чем главный недостаток кольцевой сети?
answer: Выход из строя одного устройства может прервать работу всей сети
wrong_answers:
  - Требуется много кабелей для подключения каждого элемента оборудования
  - Трудно расширить
  - Управление им является сложным
explanation: |
  В кольцевой топологии отказ одного устройства разрывает петлю и препятствует циркуляции данных.

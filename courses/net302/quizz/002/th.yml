question: ข้อบกพร่องหลักของเครือข่ายแบบวงแหวนคืออะไร?
answer: ความล้มเหลวของอุปกรณ์เพียงชิ้นเดียวสามารถขัดจังหวะเครือข่ายทั้งหมดได้
wrong_answers:
  - ต้องใช้สายเคเบิลจำนวนมากในการเชื่อมต่ออุปกรณ์แต่ละชิ้น
  - มันยากที่จะขยาย
  - การจัดการของมันมีความซับซ้อน
explanation: |
  ในโทโพโลยีแบบวงแหวน การล้มเหลวของอุปกรณ์หนึ่งจะทำให้วงจรขาดและป้องกันไม่ให้ข้อมูลหมุนเวียน
reviewed: false
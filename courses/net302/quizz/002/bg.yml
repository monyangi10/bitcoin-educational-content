question: Коя е основната слабост на пръстеновидната мрежа?
answer: Отказът на едно устройство може да прекъсне работата на цялата мрежа
wrong_answers:
  - Необходими са много кабели за свързване на всяко оборудване
  - Трудно е да се разшири
  - Управлението му е сложно
explanation: |
  При пръстеновидната топология повредата на едно устройство прекъсва веригата и не позволява на данните да циркулират.

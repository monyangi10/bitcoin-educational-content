question: रिंग नेटवर्क की मुख्य कमजोरी क्या है?
answer: एक भी डिवाइस की विफलता पूरे नेटवर्क को बाधित कर सकती है
wrong_answers:
  - प्रत्येक उपकरण को जोड़ने के लिए बहुत सारी केबलों की आवश्यकता होती है
  - इसे विस्तारित करना कठिन है
  - इसका प्रबंधन जटिल है
explanation: |
  रिंग टोपोलॉजी में, एक डिवाइस की विफलता लूप को तोड़ देती है और डेटा को प्रसारित होने से रोकती है।

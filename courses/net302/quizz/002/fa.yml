question: ضعف اصلی یک شبکه حلقه‌ای چیست؟
answer: خرابی یک دستگاه می‌تواند کل شبکه را مختل کند.
wrong_answers:
  - برای اتصال هر قطعه از تجهیزات به کابل‌های زیادی نیاز است.
  - گسترش آن دشوار است
  - مدیریت آن پیچیده است
explanation: |
  در توپولوژی حلقه‌ای، خرابی یک دستگاه باعث قطع شدن حلقه و جلوگیری از گردش داده می‌شود.
reviewed: false
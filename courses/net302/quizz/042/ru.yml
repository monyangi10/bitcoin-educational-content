question: Какой элемент доменного имени представляет собой домен верхнего уровня (TLD)?
answer: Самый правый элемент
wrong_answers:
  - Самый левый элемент
  - Второй уровень после хоста
  - Имя основного хоста
explanation: |
  ДВУ всегда является крайним правым элементом FQDN, например .com, .org или .fr.
reviewed: false
question: Кой елемент от името на домейна представлява домейна от най-високо ниво (TLD)?
answer: Най-десният елемент
wrong_answers:
  - Най-левият елемент
  - Второто ниво след хоста
  - Името на основния хост
explanation: |
  ДПН винаги е най-дясната част на FQDN, например .com, .org или .fr.
reviewed: false
question: डोमेन नाम का कौन सा तत्व शीर्ष स्तरीय डोमेन (TLD) का प्रतिनिधित्व करता है?
answer: सबसे दाहिना तत्व
wrong_answers:
  - सबसे बाईं ओर का तत्व
  - मेजबान के बाद दूसरा स्तर
  - मुख्य होस्ट का नाम
explanation: |
  TLD हमेशा FQDN का सबसे दाहिना तत्व होता है, जैसे .com, .org या .fr.
reviewed: false
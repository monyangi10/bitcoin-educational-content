question: วัตถุประสงค์หลักของ IPv5 (Stream Protocol, ST) คืออะไร?
answer: การรับประกันคุณภาพการให้บริการสำหรับการไหลบางประเภท
wrong_answers:
  - ขยายความสามารถในการกำหนดที่อยู่ IP
  - การให้ความเข้ากันได้ย้อนหลังกับ IPv6
  - การลดขนาดของแพ็กเก็ตเครือข่าย TCP/IP
explanation: |
  IPv5 (ST) ได้รับการออกแบบมาเพื่อให้บริการคุณภาพ (QoS) สำหรับสตรีมมัลติมีเดีย เช่น VoIP โดยการรับประกันแบนด์วิดท์และลำดับความสำคัญ
reviewed: false
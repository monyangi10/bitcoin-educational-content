question: IPv5 (स्ट्रीम प्रोटोकॉल, ST) का मुख्य उद्देश्य क्या है?
answer: कुछ प्रवाहों के लिए सेवा की गुणवत्ता सुनिश्चित करना
wrong_answers:
  - IP एड्रेसिंग क्षमता बढ़ाएँ
  - IPv6 के साथ पश्चगामी संगतता प्रदान करना
  - TCP/IP नेटवर्क पैकेट का आकार कम करना
explanation: |
  IPv5 (ST) को मल्टीमीडिया स्ट्रीम, जैसे VoIP, के लिए बैंडविड्थ और प्राथमिकता की गारंटी देकर सेवा की गुणवत्ता (QoS) प्रदान करने के लिए डिज़ाइन किया गया था।
reviewed: false
question: Mikä on IPv5:n (Stream Protocol, ST) päätarkoitus?
answer: Palvelun laadun varmistaminen tietyille virroille
wrong_answers:
  - IP-osoitekapasiteetin laajentaminen
  - Yhteensopivuus taaksepäin IPv6:n kanssa
  - TCP/IP-verkkopakettien koon pienentäminen
explanation: |
  IPv5 (ST) suunniteltiin tarjoamaan palvelun laatua (QoS) multimediavirroille, kuten VoIP:lle, takaamalla kaistanleveys ja prioriteetti.
reviewed: false
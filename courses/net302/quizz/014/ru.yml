question: Каково основное назначение протокола IPv5 (Stream Protocol, ST)?
answer: Обеспечение качества обслуживания для определенных потоков
wrong_answers:
  - Расширение возможностей IP-адресации
  - Обеспечение обратной совместимости с IPv6
  - Уменьшение размера сетевых пакетов TCP/IP
explanation: |
  Протокол IPv5 (ST) был разработан для обеспечения качества обслуживания (QoS) мультимедийных потоков, таких как VoIP, путем гарантирования пропускной способности и приоритета.

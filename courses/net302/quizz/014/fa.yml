question: هدف اصلی IPv5 (پروتکل جریان، ST) چیست؟
answer: اطمینان از کیفیت خدمات برای جریان‌های خاص
wrong_answers:
  - ظرفیت آدرس‌دهی IP را گسترش دهید
  - ارائه سازگاری معکوس با IPv6
  - کاهش اندازه بسته‌های شبکه TCP/IP
explanation: |
  IPv5 (ST) برای ارائه کیفیت خدمات (QoS) برای جریان‌های چندرسانه‌ای، مانند VoIP، با تضمین پهنای باند و اولویت طراحی شده بود.
reviewed: false
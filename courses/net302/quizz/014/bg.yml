question: Каква е основната цел на IPv5 (Stream Protocol, ST)?
answer: Осигуряване на качество на услугата за определени потоци
wrong_answers:
  - Разширяване на капацитета за IP адресиране
  - Осигуряване на обратна съвместимост с IPv6
  - Намаляване на размера на мрежовите пакети TCP/IP
explanation: |
  IPv5 (ST) е проектиран да осигурява качество на услугата (QoS) за мултимедийни потоци, като VoIP, като гарантира широчина на честотната лента и приоритет.
reviewed: false
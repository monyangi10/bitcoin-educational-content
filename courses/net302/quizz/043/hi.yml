question: DNS सर्वर के लिए संदर्भ के रूप में आमतौर पर किस ओपन-सोर्स सॉफ्टवेयर का उपयोग किया जाता है?
answer: बाँध
wrong_answers:
  - अपाचे
  - विद्रूप
  - सांबा
explanation: |
  BIND (बर्कले इंटरनेट नेम डोमेन) एक ओपन-सोर्स संदर्भ कार्यान्वयन है जिसका उपयोग दुनिया भर के अधिकांश DNS सर्वरों द्वारा किया जाता है।
reviewed: false
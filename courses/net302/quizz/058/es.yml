question: ¿Qué archivo de configuración define una interfaz de red estática en un sistema de tipo RHEL?
answer: ifcfg-[Interface]
wrong_answers:
  - /etc/hosts
  - /etc/resolv.conf
  - /etc/red/interfaces
explanation: |
  En RHEL, CentOS y sistemas similares, cada interfaz tiene su propio archivo ifcfg-* ubicado en /etc/sysconfig/network-scripts/.
reviewed: true
question: Which configuration file defines a static network Interface on a RHEL-like system?
answer: ifcfg-[Interface]
wrong_answers:
  - /etc/hosts
  - /etc/resolv.conf
  - /etc/network/interfaces
explanation: |
  On RHEL, CentOS and derivatives, each Interface has its own ifcfg-* file in /etc/sysconfig/network-scripts/.

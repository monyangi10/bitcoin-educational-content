question: Какой термин относится к первым трем байтам MAC Address?
answer: OUI (организационно уникальный идентификатор)
wrong_answers:
  - SID (идентификатор сеанса)
  - LUI (местный уникальный идентификатор)
  - PAN (физический номер Address)
explanation: |
  OUI присваивается IEEE и идентифицирует производителя сетевой карты в MAC Address.
reviewed: false
question: कौन सा शब्द MAC Address के पहले तीन बाइट्स को संदर्भित करता है?
answer: OUI (संगठनात्मक रूप से विशिष्ट पहचानकर्ता)
wrong_answers:
  - SID (सत्र पहचानकर्ता)
  - LUI (स्थानीय विशिष्ट पहचानकर्ता)
  - पैन (भौतिक Address संख्या)
explanation: |
  OUI को IEEE द्वारा निर्दिष्ट किया जाता है और यह MAC Address में नेटवर्क कार्ड निर्माता की पहचान करता है।
reviewed: false
question: Кой термин се отнася за първите три байта на MAC адреса?
answer: OUI (уникален организационен идентификатор)
wrong_answers:
  - SID (идентификатор на сесията)
  - LUI (местен уникален идентификатор)
  - PAN (физически номер Address)
explanation: |
  OUI се присвоява от IEEE и идентифицира производителя на мрежовата карта в MAC адреса.
reviewed: false
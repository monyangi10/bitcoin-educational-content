question: ¿Qué término se refiere a los tres primeros bytes de una dirección MAC?
answer: OUI (Identificador único de la organización)
wrong_answers:
  - SID (Identificador de sesión)
  - LUI (Identificador único local)
  - PAN (Número de dirección física)
explanation: |
  La OUI es asignada por el IEEE e identifica al fabricante de la tarjeta de red en una dirección MAC.
reviewed: true
question: อะไรคือแรงจูงใจหลักในการใช้ตัวระบุอินเทอร์เฟซแบบสุ่มแทนที่อยู่ MAC ใน IPv6?
answer: การรักษาความเป็นส่วนตัว
wrong_answers:
  - ลดขนาดแพ็กเก็ต
  - เร่งความเร็วในการแก้ไข DNS
  - ปรับปรุงความเข้ากันได้ของ ARP
explanation: |
  การใช้ตัวระบุอินเทอร์เฟซแบบสุ่มช่วยป้องกันการติดตามอุปกรณ์โดยอิงจากที่อยู่ MAC
reviewed: false
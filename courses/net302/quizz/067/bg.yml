question: Каква е основната мотивация за използването на произволни идентификатори на интерфейса вместо MAC адрес в IPv6?
answer: Запазване на неприкосновеността на личния живот
wrong_answers:
  - Намаляване на размера на пакетите
  - Ускоряване на разрешаването на DNS
  - Подобряване на съвместимостта на ARP
explanation: |
  Използването на случайни идентификатори на интерфейса помага за защита срещу проследяване на устройствата въз основа на MAC адреса.

question: IPv6 में MAC Address के बजाय यादृच्छिक Interface पहचानकर्ताओं का उपयोग करने के पीछे मुख्य प्रेरणा क्या है?
answer: गोपनीयता का संरक्षण
wrong_answers:
  - पैकेट का आकार कम करना
  - DNS समाधान में तेजी लाना
  - ARP संगतता में सुधार
explanation: |
  यादृच्छिक Interface पहचानकर्ताओं का उपयोग करने से MAC Address पर आधारित डिवाइस ट्रैकिंग से सुरक्षा मिलती है।
reviewed: false
question: Koja je glavna motivacija za korišćenje nasumičnih interfejs identifikatora umesto MAC adresa u IPv6?
answer: Očuvanje privatnosti
wrong_answers:
  - Smanjenje veličine paketa
  - Ubrzavanje DNS rezolucije
  - Poboljšanje ARP kompatibilnosti
explanation: |
  Korišćenje nasumičnih interfejs identifikatora pomaže u zaštiti od praćenja uređaja zasnovanoj na MAC adresi.
reviewed: true

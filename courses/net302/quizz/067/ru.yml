question: Какова основная мотивация использования случайных идентификаторов Interface вместо MAC Address в IPv6?
answer: Сохранение конфиденциальности
wrong_answers:
  - Уменьшение размера пакета
  - Ускорение разрешения DNS
  - Улучшение совместимости ARP
explanation: |
  Использование случайных идентификаторов Interface помогает защититься от отслеживания устройств по MAC Address.
reviewed: false
question: ¿Cuál es la principal motivación para utilizar identificadores Interface aleatorios en lugar de MAC Address en IPv6?
answer: Preservar la intimidad
wrong_answers:
  - Reducir el tamaño de los paquetes
  - Aceleración de la resolución DNS
  - Mejora de la compatibilidad ARP
explanation: |
  El uso de identificadores Interface aleatorios ayuda a proteger contra el rastreo de dispositivos basado en la MAC Address.
reviewed: false
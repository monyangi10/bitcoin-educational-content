question: Какую основную информацию должен записывать NAT-шлюз для каждого сетевого потока?
answer: Сопоставление между внутренним IP и публичным IP
wrong_answers:
  - Тип используемого сетевого кабеля
  - Сопоставление между IP Address и DNS-сервером
  - Тип используемого сетевого протокола
explanation: |
  NAT опирается на таблицу трансляции, которая отслеживает соответствие между внутренними и публичными адресами, чтобы обеспечить правильную маршрутизацию пакетов.
reviewed: false
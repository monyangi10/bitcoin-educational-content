question: ข้อมูลพื้นฐานที่ NAT gateway ต้องบันทึกสำหรับแต่ละ network flow คืออะไร?
answer: การแมประหว่าง IP ภายในและ IP สาธารณะ
wrong_answers:
  - ประเภทของสายเคเบิลเครือข่ายที่ใช้
  - การจับคู่ระหว่างที่อยู่ IP และเซิร์ฟเวอร์ DNS
  - ประเภทของโปรโตคอลเครือข่ายที่ใช้
explanation: |
  NAT อาศัยตารางการแปลเพื่อรักษาความสอดคล้องที่ติดตามการจับคู่ระหว่างที่อยู่ภายในและที่อยู่สาธารณะเพื่อให้แน่ใจว่าแพ็กเก็ตถูกส่งไปอย่างถูกต้อง
reviewed: false
question: Каква основна информация трябва да записва NAT шлюзът за всеки мрежов поток?
answer: Съпоставянето между вътрешен IP и публичен IP
wrong_answers:
  - Вид на използвания мрежов кабел
  - Съпоставянето между IP адрес и DNS сървър
  - Вид на използвания мрежов протокол
explanation: |
  NAT разчита на таблица за транслация, за да поддържа кореспонденция, която следи за съпоставянето между вътрешните и публичните адреси, за да гарантира правилното маршрутизиране на пакетите.
reviewed: false
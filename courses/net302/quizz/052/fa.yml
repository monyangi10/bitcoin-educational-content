question: یک دروازه NAT باید چه اطلاعات اساسی را برای هر جریان شبکه ثبت کند؟
answer: نقشه‌برداری بین IP داخلی و IP عمومی
wrong_answers:
  - نوع کابل شبکه استفاده شده
  - نگاشت بین IP Address و سرور DNS
  - نوع پروتکل شبکه استفاده شده
explanation: |
  ‏NAT به یک جدول ترجمه متکی است تا تطابقی را حفظ کند که نقشه‌برداری بین آدرس‌های داخلی و عمومی را پیگیری می‌کند تا اطمینان حاصل شود که بسته‌ها به درستی مسیریابی می‌شوند.
reviewed: false
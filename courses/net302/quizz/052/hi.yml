question: प्रत्येक नेटवर्क प्रवाह के लिए NAT गेटवे को कौन सी मूलभूत जानकारी रिकॉर्ड करनी चाहिए?
answer: आंतरिक आईपी और सार्वजनिक आईपी के बीच मैपिंग
wrong_answers:
  - प्रयुक्त नेटवर्क केबल का प्रकार
  - IP Address और DNS सर्वर के बीच मैपिंग
  - प्रयुक्त नेटवर्क प्रोटोकॉल का प्रकार
explanation: |
  NAT पत्राचार बनाए रखने के लिए एक अनुवाद तालिका पर निर्भर करता है जो आंतरिक और सार्वजनिक पतों के बीच मैपिंग का ट्रैक रखता है ताकि यह सुनिश्चित किया जा सके कि पैकेट सही ढंग से रूट किए गए हैं।
reviewed: false
question: ¿Qué comando se puede utilizar para añadir una dirección IP estática a una interfaz en Linux?
answer: ip add add [Address]/[máscara] dev [Interface]
wrong_answers:
  - ifconfig [Interface] up [Address]/[máscara]
  - ip route add [Address] dev [Interface]
  - route add -net [Address] netmask [mask] dev [Interface]
explanation: |
  El comando "ip addr add" es el método moderno para asignar una dirección IP estática a una interfaz de red en Linux.
reviewed: false
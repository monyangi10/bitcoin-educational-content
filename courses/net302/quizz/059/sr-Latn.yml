question: Koja komanda se može koristiti za dodavanje statičke IP adrese interfejsu na Linuxu?
answer: ip addr add [Address]/[mask] dev [Interface]
wrong_answers:
  - ifconfig [Interface] up [Address]/[mask]
  - ip route add [Address] dev [Interface]
  - route add -net [Address] netmask [mask] dev [Interface]
explanation: |
  Komanda "ip addr add" je savremeni metod za dodelu statičke IP adrese mrežnom interfejsu na Linuxu.
reviewed: true

question: Which command can be used to add a static IP address to a Interface under Linux?
answer: ip addr add [Address]/[mask] dev [Interface]
wrong_answers:
  - ifconfig [Interface] up [Address]/[mask]
  - ip route add [Address] dev [Interface]
  - route add -net [Address] netmask [mask] dev [Interface]
explanation: |
  The "ip addr add" command is the modern way of assigning an IP address to a Interface network under Linux.

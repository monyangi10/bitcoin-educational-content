question: एप्लीकेशन Layer (TCP/IP) पर आदान-प्रदान की जाने वाली डेटा इकाई का नाम क्या है?
answer: संदेश
wrong_answers:
  - चौखटा
  - खंड
  - आंकड़ारेख
explanation: |
  टीसीपी/आईपी मॉडल में, एप्लीकेशन Layer पर आदान-प्रदान किए गए डेटा को संदेश (या स्ट्रीम, संदर्भ के आधार पर) कहा जाता है।
reviewed: false
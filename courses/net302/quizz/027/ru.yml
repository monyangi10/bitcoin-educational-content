question: Как называется единица данных, которыми обмениваются приложения Layer (TCP/IP)?
answer: Сообщение
wrong_answers:
  - Рама
  - Сегмент
  - Датаграмма
explanation: |
  В модели TCP/IP данные, которыми обмениваются на Application Layer, называются сообщениями (или потоками, в зависимости от контекста).
reviewed: false
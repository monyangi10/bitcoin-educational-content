question: Кое е основното предимство на шинната топология?
answer: Ниски разходи за инсталиране
wrong_answers:
  - Висока степен на излишък
  - Ниска латентност
  - Висока наличност
explanation: |
  Шината разчита на един физически носител, което намалява разходите за инсталиране, но също така въвежда една единствена точка на отказ.

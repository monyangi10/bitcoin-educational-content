question: Koja je glavna prednost sabirničke (bus) topologije?
answer: Niski troškovi instalacije
wrong_answers:
  - Visoka redundancija
  - Niska latencija
  - Visoka dostupnost
explanation: |
  Bus ili sabirnička topologija se oslanja na jedan fizički medijum, što smanjuje troškove instalacije, ali takođe uvodi jednu tačku kvara.
reviewed: true

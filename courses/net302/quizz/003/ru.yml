question: Какое основное преимущество имеет топология шины?
answer: Низкая стоимость установки
wrong_answers:
  - Высокая избыточность
  - Низкая латентность
  - Высокая доступность
explanation: |
  Шина опирается на один физический носитель, что снижает стоимость установки, но при этом создает единую точку отказа.

question: Koja je svrha servisnih primitiva u TCP/IP modelu?
answer: Upravljaj razmenama između slojeva
wrong_answers:
  - Automatski šifruj mrežne poruke
  - Distribuiraj IP adrese udaljenim hostovima
  - Proverite ukupnu dužinu IP paketa
explanation: |
  Servisne primitive definišu komunikaciju Interface između različitih slojeva, omogućavajući uspostavljanje, održavanje ili prekid mrežnih razmena.

question: टीसीपी/आईपी मॉडल में सेवा प्राइमिटिव्स का उद्देश्य क्या है?
answer: परतों के बीच आदान-प्रदान प्रबंधित करें
wrong_answers:
  - नेटवर्क संदेशों को स्वचालित रूप से एन्क्रिप्ट करें
  - दूरस्थ होस्टों को IP पते वितरित करें
  - IP पैकेट की कुल लंबाई की जाँच करें
explanation: |
  सेवा आदिम विभिन्न परतों के बीच संचार Interface को परिभाषित करते हैं, जिससे नेटवर्क एक्सचेंजों को स्थापित, बनाए रखा या समाप्त किया जा सकता है।
reviewed: false
question: هدف از سرویس پرایمیتیوها در مدل TCP/IP چیست؟
answer: مدیریت تبادلات بین لایه‌ها
wrong_answers:
  - به‌طور خودکار پیام‌های شبکه را رمزگذاری کنید
  - توزیع آدرس‌های IP به میزبان‌های راه دور
  - طول کل بسته‌های IP را بررسی کنید
explanation: |
  ابتدایی‌های خدمات، ارتباط Interface بین لایه‌های مختلف را تعریف می‌کنند و امکان برقراری، نگهداری یا خاتمه تبادلات شبکه را فراهم می‌سازند.
reviewed: false
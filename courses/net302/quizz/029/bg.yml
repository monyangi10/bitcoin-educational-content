question: Каква е целта на служебните примитиви в модела TCP/IP?
answer: Управление на обмена между слоевете
wrong_answers:
  - Автоматично криптиране на мрежови съобщения
  - Разпределяне на IP адреси към отдалечени хостове
  - Проверка на общата дължина на IP пакетите
explanation: |
  Примитивите на услугата определят комуникационния интерфейс между различните слоеве, като позволяват установяването, поддържането или прекратяването на мрежовия обмен.
reviewed: false
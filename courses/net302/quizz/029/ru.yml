question: Каково назначение сервисных примитивов в модели TCP/IP?
answer: Управление обменом между слоями
wrong_answers:
  - Автоматическое шифрование сетевых сообщений
  - Распределение IP-адресов между удаленными узлами
  - Проверьте общую длину IP-пакетов
explanation: |
  Сервисные примитивы определяют коммуникацию Interface между различными уровнями, позволяя устанавливать, поддерживать или завершать сетевые обмены.
reviewed: false
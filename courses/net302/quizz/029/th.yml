question: วัตถุประสงค์ของ service primitives ในโมเดล TCP/IP คืออะไร?
answer: จัดการการแลกเปลี่ยนระหว่างเลเยอร์
wrong_answers:
  - เข้ารหัสข้อความเครือข่ายโดยอัตโนมัติ
  - แจกจ่ายที่อยู่ IP ไปยังโฮสต์ระยะไกล
  - ตรวจสอบความยาวรวมของแพ็กเก็ต IP
explanation: |
  ไพรมิทีฟของบริการกำหนดอินเทอร์เฟซการสื่อสารระหว่างเลเยอร์ต่างๆ ช่วยให้สามารถสร้าง รักษา หรือยุติการแลกเปลี่ยนเครือข่ายได้
reviewed: false
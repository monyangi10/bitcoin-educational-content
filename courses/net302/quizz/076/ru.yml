question: Какой алгоритм или документ регулирует выбор между IPv4 и IPv6, когда имя имеет оба типа Address?
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 определяет алгоритм, используемый для принятия решения об использовании IPv4 или IPv6 Address, когда оба доступны для одного и того же имени хоста.
reviewed: false
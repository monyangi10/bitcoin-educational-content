question: Mikä algoritmi tai asiakirja ohjaa IPv4:n ja IPv6:n välistä valintaa, kun nimellä on molemmat Address-tyypit?
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 määrittelee algoritmin, jota käytetään päättämään, käytetäänkö IPv4- vai IPv6 Address:tä, kun molemmat ovat käytettävissä samalle isäntänimelle.
reviewed: false
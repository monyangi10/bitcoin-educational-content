question: کدام الگوریتم یا سند انتخاب بین IPv4 و IPv6 را زمانی که یک نام هر دو نوع Address را دارد، تعیین می‌کند؟
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 الگوریتمی را تعریف می‌کند که تصمیم می‌گیرد آیا از IPv4 یا IPv6 Address استفاده شود زمانی که هر دو برای همان نام میزبان در دسترس هستند.
reviewed: false
question: जब किसी नाम में दोनों प्रकार के Address हों, तो कौन सा एल्गोरिदम या दस्तावेज़ IPv4 और IPv6 के बीच चयन को नियंत्रित करता है?
answer: आरएफसी 6724
wrong_answers:
  - आरएफसी 1918
  - आरएफसी 4861
  - आरएफसी 1035
explanation: |
  RFC 6724 उस एल्गोरिथ्म को परिभाषित करता है जिसका उपयोग यह निर्णय लेने के लिए किया जाता है कि IPv4 या IPv6 Address का उपयोग किया जाए, जब दोनों एक ही होस्ट नाम के लिए उपलब्ध हों।
reviewed: false
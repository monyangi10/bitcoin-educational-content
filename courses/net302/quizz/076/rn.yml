question: Ni iyihe algorithme canke inyandiko igenzura uguhitamwo hagati ya IPv4 na IPv6 iyo izina rifise ubwoko bwompi bwa Address?
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 isobanura ubuhinga bukoreshwa mu gufata ingingo yo gukoresha IPv4 canke IPv6 Address iyo vyose biboneka ku izina rimwe ry'umushitsi.
reviewed: false
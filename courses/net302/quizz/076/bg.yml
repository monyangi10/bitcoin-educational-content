question: Кой алгоритъм или документ управлява избора между IPv4 и IPv6, когато дадено име има и двата вида адреси?
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 определя алгоритъма, използван за вземане на решение дали да се използва IPv4 или IPv6 адрес, когато и двата са налични за едно и също име на хост.
reviewed: false
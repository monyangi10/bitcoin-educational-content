question: Hvilken algoritme eller hvilket dokument styrer valget mellom IPv4 og IPv6 når et navn har begge typer Address?
answer: RFC 6724
wrong_answers:
  - RFC 1918
  - RFC 4861
  - RFC 1035
explanation: |
  RFC 6724 definerer algoritmen som brukes til å avgjøre om IPv4 eller IPv6 Address skal brukes når begge er tilgjengelige for det samme vertsnavnet.
reviewed: false
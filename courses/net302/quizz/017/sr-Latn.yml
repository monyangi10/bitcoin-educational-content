question: Šta predstavlja vrednost MTU u mreži?
answer: Maksimalna veličina okvira (eng. frame-a) koja se može preneti bez fragmentacije
wrong_answers:
  - Maksimalna veličina paketa koju ruter može da primi u RAM bez fragmentacije
  - Maksimalan broj hostova na mreži bez fragmentacije
  - Minimalna dužina IP zaglavlja bez fragmentacije
explanation: |
  MTU (Maximum Transmission Unit) definiše maksimalnu veličinu okvira (eng. frame) koji može biti prenesen na Ethernet (ili link-layer) segmentu bez potrebe za fragmentacijom.
reviewed: true

question: ارزش MTU در یک شبکه چه چیزی را نشان می‌دهد؟
answer: حداکثر اندازه فریمی که می‌تواند بدون تکه‌تکه شدن منتقل شود
wrong_answers:
  - حداکثر ظرفیت ذخیره‌سازی یک روتر بدون تکه‌تکه شدن
  - حداکثر تعداد میزبان‌ها در یک شبکه بدون تکه‌تکه شدن
  - حداقل طول هدر IP بدون تکه‌تکه شدن
explanation: |
  MTU (حداکثر واحد انتقال) حداکثر اندازه یک فریم را که می‌تواند در یک بخش بدون نیاز به تکه‌تکه شدن منتقل شود، تعریف می‌کند.
reviewed: false
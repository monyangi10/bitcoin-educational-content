question: Что представляет собой значение MTU в сети?
answer: Максимальный размер кадра, который может быть передан без фрагментации
wrong_answers:
  - Максимальный объем памяти маршрутизатора без фрагментации
  - Максимальное количество хостов в сети без фрагментации
  - Минимальная длина заголовка IP без фрагментации
explanation: |
  MTU (Maximum Transmission Unit) определяет максимальный размер кадра, который может быть передан в сегменте без необходимости фрагментации.

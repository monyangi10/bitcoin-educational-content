question: ค่า MTU ในเครือข่ายหมายถึงอะไร?
answer: ขนาดเฟรมสูงสุดที่สามารถส่งได้โดยไม่ต้องแยกส่วน
wrong_answers:
  - ความจุสูงสุดของเราเตอร์โดยไม่ต้องแยกส่วน
  - จำนวนโฮสต์สูงสุดบนเครือข่ายโดยไม่ต้องแยกส่วน
  - ความยาวส่วนหัว IP ขั้นต่ำโดยไม่มีการแบ่งส่วน
explanation: |
  MTU (Maximum Transmission Unit) กำหนดขนาดสูงสุดของเฟรมที่สามารถส่งผ่านบนเซ็กเมนต์ได้โดยไม่ต้องการการแบ่งส่วน
reviewed: false
question: नेटवर्क में MTU मान क्या दर्शाता है?
answer: अधिकतम फ्रेम आकार जिसे विखंडन के बिना प्रेषित किया जा सकता है
wrong_answers:
  - विखंडन के बिना राउटर की अधिकतम भंडारण क्षमता
  - विखंडन के बिना नेटवर्क पर होस्टों की अधिकतम संख्या
  - विखंडन के बिना न्यूनतम IP हेडर लंबाई
explanation: |
  एमटीयू (अधिकतम ट्रांसमिशन यूनिट) एक फ्रेम के अधिकतम आकार को परिभाषित करता है जिसे विखंडन की आवश्यकता के बिना एक खंड पर प्रेषित किया जा सकता है।
reviewed: false
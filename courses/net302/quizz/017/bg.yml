question: Какво представлява стойността на MTU в една мрежа?
answer: Максималният размер на кадъра, който може да бъде предаден без фрагментация
wrong_answers:
  - Максималният капацитет за съхранение на маршрутизатор без фрагментация
  - Максималният брой хостове в мрежа без фрагментация
  - Минималната дължина на IP заглавието без фрагментиране
explanation: |
  MTU (Maximum Transmission Unit - максимална единица за предаване) определя максималния размер на кадъра, който може да бъде предаден в сегмента, без да се налага фрагментиране.
reviewed: false
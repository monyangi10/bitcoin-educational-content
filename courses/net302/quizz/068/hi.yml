question: IPv6 Address उत्पन्न करने के लिए कौन सी प्रणाली MAC Address को 64-बिट पहचानकर्ता में परिवर्तित करती है?
answer: ईयूआई-64
wrong_answers:
  - एनएटी64
  - पीपीपीओई-64
  - डीएनएसएसईसी64
explanation: |
  EUI-64 तंत्र 48-बिट MAC Address को 64-बिट पहचानकर्ता में परिवर्तित करता है, जिसका उपयोग IPv6 ऑटो-कॉन्फ़िगरेशन में किया जाता है।
reviewed: false
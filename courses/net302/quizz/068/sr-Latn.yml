question: Koji mehanizam pretvara MAC adresu u 64-bitni identifikator za generisanje IPv6 adresa?
answer: EUI-64
wrong_answers:
  - NAT64
  - PPPoE-64
  - DNSSEC64
explanation: |
  Mehanizam EUI-64 transformiše 48-bitnu MAC adresu u 64-bitni identifikator, koji se koristi u IPv6 automatskoj konfiguraciji.
reviewed: true

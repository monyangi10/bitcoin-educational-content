question: ¿Qué mecanismo convierte una dirección MAC en un identificador de 64 bits para generar una dirección IPv6?
answer: EUI-64
wrong_answers:
  - NAT64
  - PPPoE-64
  - DNSSEC64
explanation: |
  El mecanismo EUI-64 transforma una dirección MAC de 48 bits en un identificador de 64 bits, utilizado en la autoconfiguración IPv6.
reviewed: true
question: Кой механизъм преобразува MAC адреса в 64-битов идентификатор за генериране на IPv6 адрес?
answer: EUI-64
wrong_answers:
  - NAT64
  - PPPoE-64
  - DNSSEC64
explanation: |
  Механизмът EUI-64 трансформира 48-битов MAC адрес в 64-битов идентификатор, който се използва при автоматичното конфигуриране на IPv6.
reviewed: false
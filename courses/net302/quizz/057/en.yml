question: Which parameter in the ifcfg-eth0 file indicates DHCP configuration?
answer: BOOTPROTO=dhcp
wrong_answers:
  - IPADDR=dhcp
  - ONBOOT=dhcp
  - GATEWAY=dhcp
explanation: |
  The "BOOTPROTO=dhcp" parameter specifies that the Interface should retrieve its configuration via the DHCP protocol.
reviewed: false
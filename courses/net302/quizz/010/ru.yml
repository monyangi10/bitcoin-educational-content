question: Какой современный протокол обеспечивает функциональность, аналогичную той, на которую нацелен IPv5 в управлении качеством обслуживания сети?
answer: RSVP
wrong_answers:
  - HTTP
  - ARP
  - FTP
explanation: |
  Протокол RSVP (Resource Reservation Protocol) позволяет динамически резервировать сетевые ресурсы, чтобы гарантировать качество обслуживания (QoS), что было первоначальной целью IPv5.
reviewed: false
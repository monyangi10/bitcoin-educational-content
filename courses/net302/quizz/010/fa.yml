question: کدام پروتکل مدرن عملکردی مشابه با آنچه IPv5 در مدیریت کیفیت خدمات شبکه هدف داشت ارائه می‌دهد؟
answer: پاسخ‌ دهید
wrong_answers:
  - HTTP
  - ARP
  - اف‌تی‌پی
explanation: |
  پروتکل رزرو منابع (RSVP) اجازه می‌دهد تا منابع شبکه به صورت پویا رزرو شوند تا کیفیت خدمات (QoS) تضمین شود، که هدف اصلی IPv5 بود.
reviewed: false
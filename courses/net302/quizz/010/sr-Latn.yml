question: Koji moderni protokol pruža funkcionalnost sličnu onoj koju je IPv5 ciljao u upravljanju kvalitetom usluge mreže?
answer: RSVP
wrong_answers:
  - HTTP
  - ARP
  - FTP
explanation: |
  RSVP (Resource Reservation Protocol) omogućava dinamičku rezervaciju mrežnih resursa kako bi se garantovao Kvalitet Usluge (QoS), što je bio originalni cilj IPv5.
reviewed: false
question: Кой съвременен протокол осигурява функционалност, подобна на тази, която IPv5 цели в управлението на качеството на мрежовите услуги?
answer: RSVP
wrong_answers:
  - HTTP
  - ARP
  - FTP
explanation: |
  Протоколът RSVP (Resource Reservation Protocol) позволява динамично резервиране на мрежови ресурси, за да се гарантира качеството на услугата (QoS), което беше първоначалната цел на IPv5.
reviewed: false
question: कौन सा आधुनिक प्रोटोकॉल नेटवर्क गुणवत्ता सेवा प्रबंधन में IPv5 के समान कार्यक्षमता प्रदान करता है?
answer: RSVP
wrong_answers:
  - एचटीटीपी
  - एआरपी
  - एफ़टीपी
explanation: |
  आरएसवीपी (संसाधन आरक्षण प्रोटोकॉल) सेवा की गुणवत्ता (क्यूओएस) की गारंटी के लिए नेटवर्क संसाधनों के गतिशील आरक्षण की अनुमति देता है, जो आईपीवी5 का मूल लक्ष्य था।
reviewed: false
question: कौन सा दस्तावेज़ टीसीपी/आईपी प्रोटोकॉल विनिर्देशों के लिए तकनीकी संदर्भ के रूप में कार्य करता है?
answer: आरएफसी
wrong_answers:
  - सफेद कागज
  - आईएसओ
  - आईआईपी
explanation: |
  आरएफसी (टिप्पणियों के लिए अनुरोध) संदर्भ दस्तावेज हैं जो टीसीपी/आईपी प्रोटोकॉल विनिर्देशों को परिभाषित करते हैं।
reviewed: false
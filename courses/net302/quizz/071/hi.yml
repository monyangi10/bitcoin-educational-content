question: IPv6 Address में उपसर्ग आकार को इंगित करने के लिए किस संकेतन का उपयोग किया जाता है?
answer: सीआईडीआर
wrong_answers:
  - बिंदीदार दशमलव नेटमास्क
  - कोलन द्वारा अलग किए गए हेक्साडेसिमल
  - मुझ में क्षमता है
explanation: |
  CIDR संकेतन, IPv4 की तरह ही, स्लैश के बाद निश्चित उपसर्ग बिट्स की संख्या निर्दिष्ट करता है।
reviewed: false
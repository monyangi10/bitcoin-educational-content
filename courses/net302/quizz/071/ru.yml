question: Какая нотация используется для обозначения размера префикса в IPv6 Address?
answer: CIDR
wrong_answers:
  - Точечная десятичная сетевая маска
  - Шестнадцатеричное число, разделенное двоеточиями
  - ICANN
explanation: |
  В нотации CIDR указывается количество фиксированных битов префикса после слэша, как и в IPv4.
reviewed: false
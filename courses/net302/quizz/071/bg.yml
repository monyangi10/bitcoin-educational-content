question: Каква нотация се използва за обозначаване на размера на префикса в IPv6 адреса?
answer: CIDR
wrong_answers:
  - Десетична мрежова маска с точки
  - Шестнадесетична система, разделена с двоеточия
  - ICANN
explanation: |
  Нотацията CIDR определя броя на фиксираните битове на префикса след наклонената черта, точно както в IPv4.
reviewed: false
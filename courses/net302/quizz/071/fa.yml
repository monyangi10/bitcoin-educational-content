question: از چه نمادی برای نشان دادن اندازه پیشوند در یک IPv6 Address استفاده می‌شود؟
answer: CIDR
wrong_answers:
  - ماسک شبکه اعشاری نقطه‌دار
  - هگزادسیمال جدا شده با دو نقطه
  - آیکان
explanation: |
  نماد CIDR تعداد بیت‌های پیشوند ثابت را بعد از یک اسلش مشخص می‌کند، درست مانند در IPv4.
reviewed: false
question: Какой механизм позволяет получить доступ к внутренней службе извне через NAT?
answer: Переадресация портов
wrong_answers:
  - Фрагментация пакетов
  - Маршрутизация RIP
  - Сжатие NAT
explanation: |
  Переадресация портов позволяет перенаправить внешнее соединение на определенный внутренний хост через шлюз NAT.
reviewed: false
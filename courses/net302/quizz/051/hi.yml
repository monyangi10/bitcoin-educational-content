question: कौन सी प्रणाली NAT के माध्यम से आंतरिक सेवा को बाह्य रूप से एक्सेस करने की अनुमति देती है?
answer: अग्रेषण पोर्ट
wrong_answers:
  - पैकेट विखंडन
  - RIP रूटिंग
  - NAT संपीड़न
explanation: |
  पोर्ट फ़ॉरवर्डिंग किसी बाहरी कनेक्शन को NAT गेटवे के माध्यम से किसी विशिष्ट आंतरिक होस्ट पर फ़ॉरवर्ड करने की अनुमति देता है।
reviewed: false
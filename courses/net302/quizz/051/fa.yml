question: چه مکانیزمی به یک سرویس داخلی اجازه می‌دهد تا از طریق NAT به صورت خارجی قابل دسترسی باشد؟
answer: پورت فورواردینگ
wrong_answers:
  - تکه‌تکه شدن بسته‌ها
  - مسیریابی RIP
  - فشرده‌سازی NAT
explanation: |
  انتقال پورت به یک اتصال خارجی اجازه می‌دهد تا از طریق دروازه NAT به یک میزبان داخلی خاص هدایت شود.
reviewed: false
question: Кой механизъм позволява на вътрешна услуга да бъде достъпна отвън чрез NAT?
answer: Препращане на портове
wrong_answers:
  - Фрагментиране на пакетите
  - RIP маршрутизация
  - Компресия на NAT
explanation: |
  Пренасочването на портове позволява на външна връзка да бъде пренасочена към определен вътрешен хост чрез NAT шлюза.
reviewed: false
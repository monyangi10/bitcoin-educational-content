question: टीसीपी के लिए ट्रांसपोर्ट Layer के माध्यम से प्रवाहित होने वाले डेटा की इकाई क्या है?
answer: खंड
wrong_answers:
  - आंकड़ारेख
  - चौखटा
  - धारा
explanation: |
  टीसीपी के साथ ट्रांसपोर्ट जीडब्ल्यू-1 में, डेटा इकाई को सेगमेंट कहा जाता है, जबकि यूडीपी पैकेट शब्द का उपयोग करता है।
reviewed: false
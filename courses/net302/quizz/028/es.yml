question: ¿Cuál es la unidad de datos que fluye a través de la capa de transporte para TCP?
answer: Segmento
wrong_answers:
  - Datagrama
  - Marco
  - Corriente
explanation: |
  En la capa de transporte con TCP, la unidad de datos se denomina segmento, mientras que UDP utiliza el término paquete.
reviewed: true
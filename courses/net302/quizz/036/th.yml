question: ทำไมการย้ายไปใช้ IPv6 จึงกลายเป็นสิ่งจำเป็น?
answer: การหมดลงของที่อยู่ IPv4
wrong_answers:
  - ความล้มเหลวของโปรโตคอล NAT บน IPv4
  - ความไม่เข้ากันของซับเน็ตมาสก์
  - สิ้นสุดการสนับสนุน DHCP
explanation: |
  การหมดลงของที่อยู่ IPv4 ทำให้เกิดการเปลี่ยนไปใช้ IPv6 ซึ่งมีพื้นที่ที่อยู่ที่ใหญ่กว่ามาก
reviewed: false
question: Защо се наложи преминаването към IPv6?
answer: Изчерпване на IPv4 адресите
wrong_answers:
  - Неуспех на протокола NAT при IPv4
  - Несъвместимост на маската на подмрежата
  - Край на поддръжката на DHCP
explanation: |
  Изчерпването на IPv4 адресите доведе до преминаването към IPv6, който предоставя значително по-голямо адресно пространство.
reviewed: false
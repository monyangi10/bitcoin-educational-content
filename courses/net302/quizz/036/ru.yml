question: Почему возникла необходимость перехода на IPv6?
answer: Исчерпание IPv4 Address
wrong_answers:
  - Сбой протокола NAT на IPv4
  - Несовместимость масок подсети
  - Прекращение поддержки DHCP
explanation: |
  Исчерпание адресов IPv4 привело к переходу на IPv6, который предоставляет значительно большее пространство Address.
reviewed: false
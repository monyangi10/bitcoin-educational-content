question: คุณลักษณะของ TCP ใดที่เพิ่มประสิทธิภาพการส่งผ่านโดยการปรับจำนวนเซ็กเมนต์ที่ส่งโดยไม่ต้องรับรองทันที?
answer: หน้าต่างเลื่อน
wrong_answers:
  - การกระจายตัวแบบไดนามิก
  - การสลับแพ็กเก็ต
  - การกำหนดเส้นทางแบบคงที่
explanation: |
  "sliding window" ช่วยให้สามารถส่งเซ็กเมนต์หลายๆ อันต่อเนื่องกันได้ จากนั้นจะเลื่อนช่วงด้วยการยืนยันแต่ละครั้งเพื่อเพิ่มประสิทธิภาพการไหล
reviewed: false
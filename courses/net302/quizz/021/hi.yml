question: कौन सी टीसीपी सुविधा तत्काल पावती के बिना भेजे गए खंडों की संख्या को अनुकूलित करके थ्रूपुट को अनुकूलित करती है?
answer: स्लाइडिंग विंडो
wrong_answers:
  - गतिशील विखंडन
  - पैकेट स्विचिंग
  - स्थैतिक रूटिंग
explanation: |
  "स्लाइडिंग विंडो" कई खंडों को क्रमिक रूप से भेजने की अनुमति देती है, फिर प्रवाह को अनुकूलित करने के लिए प्रत्येक पावती के साथ सीमा को स्थानांतरित करती है।
reviewed: false
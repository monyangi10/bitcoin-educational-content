question: Коя функция на TCP оптимизира пропускателната способност, като адаптира броя на сегментите, изпратени без незабавно потвърждение?
answer: Плъзгащият се прозорец
wrong_answers:
  - Динамично фрагментиране
  - Превключване на пакети
  - Статично маршрутизиране
explanation: |
  "Плъзгащият се прозорец" позволява изпращането на няколко сегмента последователно, след което променя обхвата с всяко потвърждение, за да оптимизира потока.
reviewed: false
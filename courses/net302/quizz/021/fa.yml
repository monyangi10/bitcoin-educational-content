question: کدام ویژگی TCP با تطبیق تعداد بخش‌های ارسال شده بدون تأیید فوری، بازده را بهینه می‌کند؟
answer: پنجره کشویی
wrong_answers:
  - تکه‌تکه شدن پویا
  - بسته‌گردانی
  - مسیریابی ایستا
explanation: |
  "پنجره لغزنده" اجازه می‌دهد چندین بخش به‌طور متوالی ارسال شوند، سپس با هر تأییدیه محدوده را تغییر می‌دهد تا جریان را بهینه کند.
reviewed: false
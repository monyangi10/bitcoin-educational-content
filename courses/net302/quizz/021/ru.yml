question: Какая функция TCP оптимизирует пропускную способность, адаптируя количество сегментов, отправляемых без немедленного подтверждения?
answer: Скользящее окно
wrong_answers:
  - Динамическая фрагментация
  - Коммутация пакетов
  - Статическая маршрутизация
explanation: |
  Скользящее окно" позволяет отправлять несколько сегментов подряд, а затем смещает диапазон при каждом подтверждении, чтобы оптимизировать поток.
reviewed: false
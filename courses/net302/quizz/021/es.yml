question: ¿Qué función de TCP optimiza el rendimiento adaptando el número de segmentos enviados sin acuse de recibo inmediato?
answer: La ventana corredera
wrong_answers:
  - Fragmentación dinámica
  - Conmutación de paquetes
  - Enrutamiento estático
explanation: |
  La "ventana deslizante" permite enviar varios segmentos seguidos y, a continuación, desplaza el alcance con cada acuse de recibo para optimizar el flujo.
reviewed: false
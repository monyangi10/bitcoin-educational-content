question: ¿Qué forma de NAT asocia permanentemente una dirección IP privada con una dirección IP pública?
answer: Traducción estática
wrong_answers:
  - Traducción dinámica
  - PAT (Traducción Puerto Address)
  - Enrutamiento dinámico
explanation: |
  La traducción estática crea un mapeo fijo entre una dirección IP interna y una dirección IP pública, útil para hacer que los recursos internos sean accesibles desde el exterior.
reviewed: true
question: Quelle forme de NAT consiste à associer de façon permanente une adresse IP privée à une adresse IP publique ?
answer: Traduction statique
wrong_answers:
  - Traduction dynamique
  - PAT (Port Address Translation)
  - Routage dynamique
explanation: |
  La traduction statique établit un lien fixe entre une adresse IP interne et une adresse IP publique, utile pour rendre des ressources internes accessibles depuis l’extérieur.
reviewed: true 

question: รูปแบบใดของ NAT ที่เชื่อมโยงที่อยู่ IP ส่วนตัวกับที่อยู่ IP สาธารณะอย่างถาวร?
answer: การแปลแบบคงที่
wrong_answers:
  - การแปลแบบไดนามิก
  - PAT (การแปลพอร์ต Address)
  - การกำหนดเส้นทางแบบไดนามิก
explanation: |
  การแปลแบบคงที่สร้างการจับคู่แบบตายตัวระหว่างที่อยู่ IP ภายในและที่อยู่ IP สาธารณะ ซึ่งมีประโยชน์สำหรับการทำให้ทรัพยากรภายในสามารถเข้าถึงได้จากภายนอก
reviewed: false
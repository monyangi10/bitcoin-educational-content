question: Коя форма на NAT постоянно свързва частен IP адрес с публичен IP адрес?
answer: Статичен превод
wrong_answers:
  - Динамичен превод
  - PAT (Превод на порт Address)
  - Динамично маршрутизиране
explanation: |
  Статичната транслация създава фиксирано съпоставяне между вътрешен IP адрес и публичен IP адрес, което е полезно за осигуряване на достъп до вътрешни ресурси отвън.
reviewed: false
question: NAT का कौन सा रूप निजी IP Address को सार्वजनिक IP Address के साथ स्थायी रूप से जोड़ता है?
answer: स्थैतिक अनुवाद
wrong_answers:
  - गतिशील अनुवाद
  - PAT (पोर्ट Address अनुवाद)
  - गतिशील रूटिंग
explanation: |
  स्थैतिक अनुवाद, आंतरिक IP Address और सार्वजनिक IP Address के बीच एक निश्चित मैपिंग बनाता है, जो आंतरिक संसाधनों को बाहर से सुलभ बनाने के लिए उपयोगी है।
reviewed: false
question: Какая форма NAT постоянно связывает частный IP Address с публичным IP Address?
answer: Статический перевод
wrong_answers:
  - Динамический перевод
  - PAT (перевод порта Address)
  - Динамическая маршрутизация
explanation: |
  Статическая трансляция создает фиксированное отображение между внутренним IP Address и публичным IP Address, что полезно для обеспечения доступа к внутренним ресурсам извне.
reviewed: false
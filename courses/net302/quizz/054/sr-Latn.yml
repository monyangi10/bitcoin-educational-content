question: Koji oblik NAT trajno povezuje privatnu IP adresu Address sa javnom IP adresom Address?
answer: Statični prevod
wrong_answers:
  - Dinamičko prevođenje
  - PAT (Port Address Prevod)
  - Dinamičko rutiranje
explanation: |
  Statični prevod stvara fiksno mapiranje između interne IP adrese Address i javne IP adrese Address, što je korisno za omogućavanje pristupa unutrašnjim resursima sa spoljašnje strane.
reviewed: false
question: Hvilken kommando kan brukes til å sjekke hvilken Interface og gateway en pakke til 8.8.8.8.8 vil bli rutet gjennom?
answer: ip route get 8.8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8.8
  - ping -i 8.8.8.8.8
  - netstat -r 8.8.8.8.8
explanation: |
  ip route get <Address> viser den nøyaktige veien en pakke vil ta for å nå en bestemt destinasjon.
reviewed: false
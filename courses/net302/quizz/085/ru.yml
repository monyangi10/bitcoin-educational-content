question: Какую команду можно использовать для проверки того, через какой Interface и шлюз будет направлен пакет на адрес 8.8.8.8?
answer: ip route get 8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8
  - ping -i 8.8.8.8
  - netstat -r 8.8.8.8
explanation: |
  ip route get <Address> показывает точный путь, по которому пакет достигнет определенного пункта назначения.

question: Millise käsuga saab kontrollida, millise Interface ja värava kaudu suunatakse pakett aadressile 8.8.8.8.8?
answer: ip route get 8.8.8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8.8.8
  - ping -i 8.8.8.8.8
  - netstat -r 8.8.8.8.8
explanation: |
  ip route get <Address> näitab täpset teed, mida pakett võtaks, et jõuda konkreetsesse sihtkohta.
reviewed: false
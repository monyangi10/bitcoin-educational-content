question: किस कमांड का उपयोग यह जांचने के लिए किया जा सकता है कि 8.8.8.8 के लिए पैकेट किस Interface और गेटवे के माध्यम से रूट किया जाएगा?
answer: आईपी ​​रूट 8.8.8.8 प्राप्त करें
wrong_answers:
  - एसएस रूट -tulnp 8.8.8.8
  - पिंग -i 8.8.8.8
  - नेटस्टैट -आर 8.8.8.8
explanation: |
  ip route get <Address> वह सटीक पथ दिखाता है जो पैकेट किसी विशिष्ट गंतव्य तक पहुंचने के लिए अपनाएगा।

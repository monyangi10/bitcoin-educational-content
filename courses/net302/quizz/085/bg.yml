question: Коя команда може да се използва, за да се провери през кой интерфейс и шлюз ще бъде маршрутизиран пакет към 8.8.8.8?
answer: ip route get 8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8.8
  - ping -i 8.8.8.8
  - netstat -r 8.8.8.8
explanation: |
  ip route get <Address> показва точния път, по който даден пакет ще достигне до определена дестинация.

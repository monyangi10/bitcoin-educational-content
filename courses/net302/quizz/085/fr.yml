question: Quelle commande permet de vérifier par quelle interface et passerelle un paquet vers 8.8.8.8 serait routé ?
answer: ip route get 8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8
  - ping -i 8.8.8.8
  - netstat -r 8.8.8.8
explanation: |
  ip route get <address> indique le chemin exact que suivrait un paquet vers une adresse précise.
reviewed: true 

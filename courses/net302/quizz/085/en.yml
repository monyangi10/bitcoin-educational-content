question: Which command can be used to check which Interface and gateway a packet to 8.8.8.8 would be routed through?
answer: ip route get 8.8.8.8
wrong_answers:
  - ss route -tulnp 8.8.8.8
  - ping -i 8.8.8.8
  - netstat -r 8.8.8.8
explanation: |
  ip route get <Address> indicates the exact path a packet would take to a specific address.

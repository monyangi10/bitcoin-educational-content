question: การปฏิบัติในการแก้ไขที่อยู่ MAC ของคุณอย่างเทียม ๆ คืออะไร?
answer: การปลอมแปลง MAC
wrong_answers:
  - MAC Phishing
  - การดักจับ MAC
  - การบันทึกการกดแป้นพิมพ์บน Mac
explanation: |
  MAC spoofing คือการเปลี่ยนแปลงที่อยู่ฮาร์ดแวร์ของอินเทอร์เฟซเครือข่าย ซึ่งมักทำเพื่อเหตุผลด้านความเป็นส่วนตัวหรือเพื่อหลีกเลี่ยงข้อจำกัดต่างๆ
reviewed: false
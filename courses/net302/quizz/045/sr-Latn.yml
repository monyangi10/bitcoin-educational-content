question: Šta je praksa veštačkog modifikovanja vaše MAC adrese?
answer: MAC Spoofing
wrong_answers:
  - MAC Phishing
  - MAC Sniffing
  - Mac Keylogging
explanation: |
  MAC spoofing je čin promene hardverske adrese mrežnog interfejsa, često iz razloga privatnosti ili kako bi se zaobišla određena ograničenja.
reviewed: true

question: आपके MAC Address को कृत्रिम रूप से संशोधित करने की प्रथा क्या है?
answer: मैक स्पूफिंग
wrong_answers:
  - मैक फ़िशिंग
  - मैक सूँघना
  - मैक कीलॉगिंग
explanation: |
  मैक स्पूफिंग, नेटवर्क Interface के हार्डवेयर Address को बदलने का कार्य है, जो प्रायः गोपनीयता कारणों से या प्रतिबंधों को दरकिनार करने के लिए किया जाता है।
reviewed: false
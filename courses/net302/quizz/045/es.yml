question: ¿En qué consiste la práctica de modificar artificialmente su dirección MAC?
answer: Suplantación de MAC
wrong_answers:
  - Suplantación de identidad MAC
  - Escaneado MAC
  - Mac Keylogging
explanation: |
  La suplantación de MAC consiste en cambiar la dirección de hardware de una interfaz de red, a menudo por motivos de privacidad o para eludir restricciones.
reviewed: true
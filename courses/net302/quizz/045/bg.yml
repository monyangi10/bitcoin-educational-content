question: Каква е практиката за изкуствено модифициране на вашия MAC адрес?
answer: MAC Spoofing
wrong_answers:
  - Фишинг на MAC
  - Проникване в MAC
  - Протоколиране на клавишите на Mac
explanation: |
  Подправянето на MAC адреси е промяна на хардуерния адрес на мрежов интерфейс, често от съображения за поверителност или за заобикаляне на ограничения.
reviewed: false
question: Какова основная причина, по которой IPv5 так и не получил широкого распространения?
answer: Он оставался экспериментальным
wrong_answers:
  - Его развертывание было слишком дорогостоящим
  - Он был несовместим с IPv6
  - Он имел серьезные недостатки в системе безопасности
explanation: |
  Протокол IPv5 был реализован только экспериментально. Он так и не был стандартизирован или широко принят, и в итоге от него отказались в пользу IPv6.
reviewed: false
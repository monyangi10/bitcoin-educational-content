question: دلیل اصلی اینکه چرا IPv5 هرگز به طور گسترده پیاده‌سازی نشده است چیست؟
answer: این به صورت آزمایشی باقی ماند
wrong_answers:
  - استقرار آن بسیار پرهزینه بود
  - با IPv6 سازگار نبود
  - این دارای نقص‌های امنیتی عمده‌ای بود
explanation: |
  IPv5 تنها به صورت آزمایشی پیاده‌سازی شد. هرگز استاندارد یا به طور گسترده پذیرفته نشد و در نهایت به نفع IPv6 کنار گذاشته شد.
reviewed: false
question: IPv5 को कभी भी व्यापक रूप से लागू नहीं किये जाने का मुख्य कारण क्या है?
answer: यह प्रायोगिक ही रहा
wrong_answers:
  - इसकी तैनाती बहुत महंगी थी
  - यह IPv6 के साथ संगत नहीं था
  - इसमें बड़ी सुरक्षा खामियां थीं
explanation: |
  IPv5 को केवल प्रायोगिक तौर पर लागू किया गया था। इसे कभी मानकीकृत या व्यापक रूप से अपनाया नहीं गया, और अंततः IPv6 के पक्ष में इसे छोड़ दिया गया।
reviewed: false
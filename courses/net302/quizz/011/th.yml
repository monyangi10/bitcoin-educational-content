question: เหตุผลหลักที่ IPv5 ไม่เคยถูกใช้งานอย่างแพร่หลายคืออะไร?
answer: มันยังคงเป็นการทดลอง
wrong_answers:
  - การปรับใช้มีค่าใช้จ่ายสูงเกินไป
  - มันไม่เข้ากันกับ IPv6
  - มันมีข้อบกพร่องด้านความปลอดภัยที่สำคัญ
explanation: |
  IPv5 ถูกนำมาใช้เพียงในเชิงทดลองเท่านั้น ไม่เคยได้รับการมาตรฐานหรือการยอมรับอย่างกว้างขวาง และในที่สุดก็ถูกละทิ้งไปเพื่อสนับสนุน IPv6
reviewed: false
question: Коя е основната причина, поради която IPv5 никога не е бил широко разпространен?
answer: Той остава експериментален
wrong_answers:
  - Внедряването му е било твърде скъпо
  - Той не е съвместим с IPv6
  - Имаше сериозни недостатъци в сигурността
explanation: |
  IPv5 е въведен само експериментално. Той никога не е бил стандартизиран или широко приет и в крайна сметка е изоставен в полза на IPv6.
reviewed: false
question: نقش اصلی پروتکل TCP در مدل TCP/IP چیست؟
answer: انتقال داده قابل اعتماد و منظم را تضمین کنید
wrong_answers:
  - رمزگذاری ارتباطات شبکه
  - به ماشین‌ها آدرس‌های IP اختصاص دهید.
  - قطعه‌قطعه کردن دیتاگرام‌ها در سطح فیزیکی
explanation: |
  TCP با اطمینان از صحت داده‌ها، حفظ ترتیب و مدیریت بازیابی در صورت از دست رفتن، انتقال داده‌های قابل اعتماد را تضمین می‌کند.
reviewed: false
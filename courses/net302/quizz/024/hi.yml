question: टीसीपी/आईपी मॉडल में टीसीपी प्रोटोकॉल की मुख्य भूमिका क्या है?
answer: विश्वसनीय और व्यवस्थित डेटा स्थानांतरण सुनिश्चित करें
wrong_answers:
  - नेटवर्क संचार एन्क्रिप्ट करें
  - मशीनों को IP पते निर्दिष्ट करें
  - भौतिक स्तर पर खंड डेटाग्राम
explanation: |
  टीसीपी अखंडता की पुष्टि, व्यवस्था बनाए रखने, तथा हानि की स्थिति में पुनर्प्राप्ति का प्रबंध करके विश्वसनीय डेटा संचरण सुनिश्चित करता है।
reviewed: false
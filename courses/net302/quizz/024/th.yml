question: บทบาทหลักของโปรโตคอล TCP ในโมเดล TCP/IP คืออะไร?
answer: ตรวจสอบให้แน่ใจว่าการถ่ายโอนข้อมูลมีความน่าเชื่อถือและเป็นระเบียบ
wrong_answers:
  - เข้ารหัสการสื่อสารเครือข่าย
  - กำหนดที่อยู่ IP ให้กับเครื่อง
  - ทำให้ข้อมูล datagrams แตกเป็นส่วนย่อยในระดับกายภาพ
explanation: |
  TCP รับประกันการส่งข้อมูลที่เชื่อถือได้โดยการตรวจสอบความสมบูรณ์ รักษาลำดับ และจัดการการกู้คืนในกรณีที่สูญหาย
reviewed: false
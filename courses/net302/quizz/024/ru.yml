question: Какова основная роль протокола TCP в модели TCP/IP?
answer: Обеспечьте надежную и упорядоченную передачу данных
wrong_answers:
  - Шифрование сетевых соединений
  - Назначение IP-адресов машинам
  - Фрагментация дейтаграмм на физическом уровне
explanation: |
  TCP обеспечивает надежную передачу данных, проверяя целостность, поддерживая порядок и восстанавливая данные в случае потери.
reviewed: false
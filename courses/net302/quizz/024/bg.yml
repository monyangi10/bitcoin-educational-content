question: Каква е основната роля на протокола TCP в модела TCP/IP?
answer: Осигуряване на надежден и организиран трансфер на данни
wrong_answers:
  - Криптиране на мрежови комуникации
  - Присвояване на IP адреси на машини
  - Фрагментиране на дейтаграми на физическо ниво
explanation: |
  TCP осигурява надеждно предаване на данни, като проверява целостта, поддържа реда и се грижи за възстановяване в случай на загуба.
reviewed: false
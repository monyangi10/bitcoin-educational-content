question: होस्ट के खुले पोर्ट्स को स्कैन करने और सुलभ सेवाओं की पहचान करने के लिए किस कमांड का उपयोग किया जाता है?
answer: एनमैप
wrong_answers:
  - खोदना
  - एथटूल
  - आईपी ​​नेई
explanation: |
  एनमैप खुले पोर्ट, उजागर सेवाओं और कभी-कभी दूरस्थ ऑपरेटिंग सिस्टम के प्रकार का पता लगाता है।
reviewed: false
question: Коя команда се използва за сканиране на отворените портове на хост и идентифициране на достъпни услуги?
answer: nmap
wrong_answers:
  - копайте
  - ettool
  - iP съседство
explanation: |
  nmap открива отворени портове, открити услуги и понякога вида на отдалечената операционна система.
reviewed: false
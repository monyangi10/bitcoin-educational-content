question: ¿Qué organización asigna los números de versión del protocolo IP?
answer: IANA
wrong_answers:
  - IETF
  - RFC
  - Google
explanation: |
  La Autoridad de Asignación de Números de Internet (IANA) gestiona el Assignment de los números de versión del protocolo IP y la asignación de rangos de protocolos.
reviewed: false
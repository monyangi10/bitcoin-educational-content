question: Коя организация присвоява номерата на версиите на IP протокола?
answer: IANA
wrong_answers:
  - IETF
  - RFC
  - Google
explanation: |
  Органът за присвояване на номера в интернет (IANA) управлява присвояването на номерата на версиите на IP протоколите и разпределянето на диапазоните на протоколите.
reviewed: false
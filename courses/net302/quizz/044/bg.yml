question: Каква е основната роля на DNS в архитектурата на интернет?
answer: Съпоставяне на имена на домейни с IP адреси
wrong_answers:
  - Криптиране на комуникациите между маршрутизаторите
  - Динамично присвояване на MAC адреси на устройствата
  - Контрол на достъпа до уеб сървъри
explanation: |
  Системата DNS (Domain Name System) превежда разбираемите от човека имена на домейни в цифрови IP адреси, необходими за маршрутизиране.
reviewed: false
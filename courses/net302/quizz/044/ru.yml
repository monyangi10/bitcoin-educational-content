question: Какова основная роль DNS в архитектуре Интернета?
answer: Сопоставление доменных имен с IP-адресами
wrong_answers:
  - Шифрование сообщений между маршрутизаторами
  - Динамическое назначение MAC-адресов устройствам
  - Контроль доступа к веб-серверам
explanation: |
  DNS (Domain Name System) переводит человекочитаемые доменные имена в числовые IP-адреса, необходимые для маршрутизации.
reviewed: false
question: บทบาทหลักของ DNS ในสถาปัตยกรรมอินเทอร์เน็ตคืออะไร?
answer: การแมปชื่อโดเมนไปยังที่อยู่ IP
wrong_answers:
  - เข้ารหัสการสื่อสารระหว่างเราเตอร์
  - กำหนดที่อยู่ MAC ให้กับอุปกรณ์แบบไดนามิก
  - ควบคุมการเข้าถึงเซิร์ฟเวอร์เว็บ
explanation: |
  DNS (Domain Name System) แปลชื่อโดเมนที่มนุษย์อ่านได้เป็นที่อยู่ IP เชิงตัวเลขที่จำเป็นสำหรับการกำหนดเส้นทาง
reviewed: false
question: Ni nini jukumu kuu la DNS katika usanifu wa mtandao?
answer: Kupanga majina ya vikoa kwa IP Address
wrong_answers:
  - Simba mawasiliano kati ya gateways 
  - Wape vifaa address za MAC
  - Dhibiti ufikiaji wa server za wavuti
explanation: |
  DNS (Mfumo wa Jina la Kikoa) hutafsiri majina ya vikoa vinavyoweza kusomeka na binadamu katika anwani za IP za nambari zinazohitajika kwa uelekezaji.
reviewed: true

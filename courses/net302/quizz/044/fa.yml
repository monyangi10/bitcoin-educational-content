question: نقش اصلی DNS در معماری اینترنت چیست؟
answer: نگاشت نام‌های دامنه به آدرس‌های IP
wrong_answers:
  - ارتباطات بین روترها را رمزگذاری کنید
  - به‌طور پویا آدرس‌های MAC را به دستگاه‌ها اختصاص دهید
  - کنترل دسترسی به سرورهای وب
explanation: |
  DNS (سیستم نام دامنه) نام‌های دامنه قابل خواندن توسط انسان را به آدرس‌های IP عددی مورد نیاز برای مسیریابی ترجمه می‌کند.
reviewed: false
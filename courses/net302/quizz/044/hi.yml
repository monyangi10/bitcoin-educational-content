question: इंटरनेट आर्किटेक्चर में DNS की मुख्य भूमिका क्या है?
answer: डोमेन नामों को IP पतों से मैप करना
wrong_answers:
  - राउटरों के बीच संचार एन्क्रिप्ट करें
  - डिवाइसों को गतिशील रूप से MAC पते असाइन करें
  - वेब सर्वर तक पहुँच नियंत्रित करें
explanation: |
  DNS (डोमेन नाम सिस्टम) मानव-पठनीय डोमेन नामों को रूटिंग के लिए आवश्यक संख्यात्मक IP पतों में अनुवादित करता है।
reviewed: false
question: نقش اساسی شبکه در فناوری اطلاعات چیست؟
answer: فعال کردن داده Exchange
wrong_answers:
  - افزایش حافظه کامپیوتر
  - ایجاد نسخه‌های پشتیبان
  - فعال کردن Exchange تجهیزات کامپیوتری
explanation: |
  یک شبکه چندین دستگاه را به هم متصل می‌کند تا گردش و Exchange اطلاعات را امکان‌پذیر سازد.
reviewed: false
question: บทบาทพื้นฐานของเครือข่ายใน IT คืออะไร?
answer: เปิดใช้งานการแลกเปลี่ยนข้อมูล
wrong_answers:
  - การเพิ่มหน่วยความจำคอมพิวเตอร์
  - สร้างสำเนาสำรอง
  - เปิดใช้งานการแลกเปลี่ยนอุปกรณ์คอมพิวเตอร์
explanation: |
  เครือข่ายเชื่อมต่ออุปกรณ์หลายตัวเพื่อให้การหมุนเวียนและแลกเปลี่ยนข้อมูลเป็นไปได้
reviewed: false
question: Каква е основната роля на мрежата в ИТ?
answer: Разрешаване на обмена на данни
wrong_answers:
  - Увеличаване на компютърната памет
  - Създаване на резервни копия
  - Позволява обмен на компютърно оборудване
explanation: |
  Мрежата свързва множество устройства, за да позволи циркулацията и обмена на информация.

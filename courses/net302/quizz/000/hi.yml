question: आईटी में नेटवर्क की मूलभूत भूमिका क्या है?
answer: डेटा Exchange सक्षम करें
wrong_answers:
  - कंप्यूटर मेमोरी बढ़ाना
  - बैकअप प्रतियां बनाएँ
  - कंप्यूटर उपकरणों के Exchange को सक्षम करें
explanation: |
  एक नेटवर्क सूचना के संचलन और Exchange की अनुमति देने के लिए कई उपकरणों को जोड़ता है।
reviewed: false
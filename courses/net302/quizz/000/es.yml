question: ¿Cuál es el papel fundamental de una red en TI?
answer: Habilitar datos de intercambio
wrong_answers:
  - Aumentar la memoria del ordenador
  - Crear copias de seguridad
  - Habilitar el intercambio de equipos informáticos
explanation: |
  Una red conecta múltiples dispositivos para permitir la circulación y el intercambio de información.
reviewed: true
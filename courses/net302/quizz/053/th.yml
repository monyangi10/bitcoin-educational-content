question: โหมด NAT ใดที่อนุญาตให้อุปกรณ์หลายสิบเครื่องแชร์ที่อยู่ IP สาธารณะเดียวโดยการแก้ไขพอร์ต?
answer: แพท
wrong_answers:
  - Static NAT
  - NAT แบบไดนามิก
  - การกำหนดเส้นทางแบบคงที่
explanation: |
  PAT หรือที่รู้จักกันในชื่อ NAT overload หรือ IP masquerading จะเปลี่ยนหมายเลขพอร์ตเพื่อแยกแยะเซสชัน ทำให้อุปกรณ์หลายเครื่องสามารถใช้ที่อยู่สาธารณะเดียวกันได้
reviewed: false
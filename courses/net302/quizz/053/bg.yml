question: Кой режим на NAT позволява на десетки устройства да споделят един публичен IP адрес чрез промяна на портовете?
answer: PAT
wrong_answers:
  - Статичен NAT
  - Динамичен NAT
  - Статично маршрутизиране
explanation: |
  PAT, известен също като претоварване на NAT или IP маскиране, променя номерата на портовете, за да разграничи сесиите, като позволява на много устройства да използват един и същ публичен адрес.
reviewed: false
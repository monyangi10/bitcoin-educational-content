question: Какой режим NAT позволяет десяткам устройств совместно использовать один общедоступный IP Address, изменяя порты?
answer: ПАТ
wrong_answers:
  - Статический NAT
  - Динамическая NAT
  - Статическая маршрутизация
explanation: |
  PAT, также известный как перегрузка NAT или IP-маскарад, изменяет номера портов для разграничения сеансов, позволяя многим устройствам использовать один и тот же общедоступный Address.
reviewed: false
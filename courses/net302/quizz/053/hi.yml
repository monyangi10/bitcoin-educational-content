question: कौन सा NAT मोड दर्जनों डिवाइसों को पोर्ट संशोधित करके एक ही सार्वजनिक IP Address साझा करने की अनुमति देता है?
answer: थपथपाना
wrong_answers:
  - स्थैतिक NAT
  - डायनेमिक NAT
  - स्थैतिक रूटिंग
explanation: |
  PAT, जिसे NAT ओवरलोड या IP मास्करेडिंग के नाम से भी जाना जाता है, सत्रों में अंतर करने के लिए पोर्ट संख्या में परिवर्तन करता है, जिससे कई डिवाइस एक ही सार्वजनिक Address का उपयोग करने में सक्षम हो जाते हैं।
reviewed: false
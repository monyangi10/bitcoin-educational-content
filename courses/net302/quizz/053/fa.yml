question: کدام حالت NAT به ده‌ها دستگاه اجازه می‌دهد تا با تغییر پورت‌ها یک IP عمومی Address را به اشتراک بگذارند؟
answer: پت
wrong_answers:
  - NAT ایستا
  - NAT پویا
  - مسیریابی ایستا
explanation: |
  PAT، که به عنوان NAT overload یا IP masquerading نیز شناخته می‌شود، شماره‌های پورت را برای تمایز جلسات تغییر می‌دهد و به بسیاری از دستگاه‌ها اجازه می‌دهد از همان Address عمومی استفاده کنند.
reviewed: false
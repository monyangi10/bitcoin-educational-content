question: Какой размер блока IPv6 обычно выделяется IANA для каждого регионального реестра Интернета (RIR)?
answer: /12
wrong_answers:
  - /48
  - /32
  - /23
explanation: |
  С 2006 года каждый RIR обычно получает /12 блок IPv6, что обеспечивает очень большой резерв для регионального распределения.
reviewed: false
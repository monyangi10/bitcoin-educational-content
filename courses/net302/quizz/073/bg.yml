question: Какъв е размерът на блока IPv6, който обикновено се разпределя от IANA за всеки регионален интернет регистър (RIR)?
answer: /12
wrong_answers:
  - /48
  - /32
  - /23
explanation: |
  От 2006 г. насам всеки RIR обикновено получава /12 блок от IPv6, което осигурява много голям резерв за регионално разпределение.
reviewed: false
question: اندازه بلوک IPv6 که به طور کلی توسط IANA به هر رجیستری اینترنت منطقه‌ای (RIR) اختصاص داده می‌شود چیست؟
answer: /۱۲
wrong_answers:
  - /۴۸
  - /۳۲
  - /23
explanation: |
  از سال 2006، هر RIR معمولاً یک بلوک /12 از IPv6 دریافت می‌کند که یک ذخیره بسیار بزرگ برای تخصیص منطقه‌ای فراهم می‌کند.
reviewed: false
question: सामान्यतः IANA द्वारा प्रत्येक क्षेत्रीय इंटरनेट रजिस्ट्री (RIR) को आवंटित IPv6 ब्लॉक आकार क्या है?
answer: /12
wrong_answers:
  - /48
  - /32
  - /23
explanation: |
  2006 से, प्रत्येक RIR को आमतौर पर IPv6 का /12 ब्लॉक प्राप्त होता है, जो क्षेत्रीय आवंटन के लिए एक बहुत बड़ा रिजर्व प्रदान करता है।
reviewed: false
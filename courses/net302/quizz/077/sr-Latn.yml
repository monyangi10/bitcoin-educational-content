question: Koja metoda razrešavanja zahteva obrtanje svake heksadecimalne cifre IPv6 adrese za reverznu zonu?
answer: Obrnuta rezolucija
wrong_answers:
  - Suprotna rezolucija
  - Primarna rezolucija
  - Sekundarna rezolucija
explanation: |
  Za obrnuto razrešavanje, svaki nibbl pune IPv6 adrese se obrće i razdvaja tačkama pre nego što se doda sufiks ip6.arpa.
reviewed: true

question: วิธีการแก้ไขปัญหาใดที่ต้องย้อนกลับแต่ละหลักฐานฐานสิบหกของที่อยู่ IPv6 สำหรับโซนย้อนกลับ?
answer: การแก้ไขย้อนกลับ
wrong_answers:
  - มติที่ตรงกันข้าม
  - ความละเอียดหลัก
  - ความละเอียดรอง
explanation: |
  สำหรับการแก้ไขย้อนกลับ แต่ละนิบเบิลของที่อยู่ IPv6 แบบเต็มจะถูกย้อนกลับและคั่นด้วยจุดก่อนที่จะต่อท้ายด้วย ip6.arpa.
reviewed: false
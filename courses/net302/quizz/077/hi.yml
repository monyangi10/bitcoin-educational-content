question: कौन सी समाधान विधि में रिवर्स ज़ोन के लिए IPv6 Address के प्रत्येक हेक्साडेसिमल अंक को उलटने की आवश्यकता होती है?
answer: रिवर्स रिज़ॉल्यूशन
wrong_answers:
  - विपरीत संकल्प
  - प्राथमिक संकल्प
  - द्वितीयक संकल्प
explanation: |
  रिवर्स रिज़ॉल्यूशन के लिए, पूर्ण IPv6 Address के प्रत्येक निबल को उलट दिया जाता है और ip6.arpa के साथ प्रत्यय लगाने से पहले डॉट्स द्वारा अलग किया जाता है।
reviewed: false
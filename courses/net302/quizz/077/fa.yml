question: کدام روش حل نیاز به معکوس کردن هر رقم هگزادسیمال IPv6 Address برای ناحیه معکوس دارد؟
answer: وضوح معکوس
wrong_answers:
  - وضوح مخالف
  - وضوح اولیه
  - وضوح ثانویه
explanation: |
  برای حل معکوس، هر نیم‌بایت از IPv6 کامل Address معکوس شده و با نقطه‌ها جدا می‌شود و سپس با ip6.arpa. خاتمه می‌یابد.
reviewed: false
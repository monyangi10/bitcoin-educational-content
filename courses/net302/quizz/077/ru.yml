question: Какой метод разрешения требует перевернуть каждую шестнадцатеричную цифру IPv6 Address для обратной зоны?
answer: Обратное разрешение
wrong_answers:
  - Противоположное разрешение
  - Первичное разрешение
  - Вторичное разрешение
explanation: |
  Для обратного разрешения каждый полубайт полного IPv6 Address разворачивается и разделяется точками перед суффиксом ip6.arpa.
reviewed: false
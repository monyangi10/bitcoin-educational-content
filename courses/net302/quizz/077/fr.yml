question: Quelle méthode de résolution nécessite d’inverser chaque chiffre hexadécimal de l’adresse IPv6 pour la zone inverse ?
answer: Résolution inverse
wrong_answers:
  - Résolution opposée
  - Résolution primaire
  - Résolution secondaire
explanation: |
  Pour la résolution inverse, chaque nibble de l’adresse IPv6 complète est inversé et séparé par des points avant d’être suffixé par ip6.arpa.
reviewed: true 

question: Кой метод за разрешаване изисква обръщане на всяка шестнадесетична цифра от IPv6 адреса за обратната зона?
answer: Обратна резолюция
wrong_answers:
  - Противоположна резолюция
  - Първична резолюция
  - Вторична резолюция
explanation: |
  При обратното разрешаване всяко зърно на пълния IPv6 адрес се обръща и се разделя с точки, преди да се завърши с ip6.arpa.
reviewed: false
question: कंप्यूटर नेटवर्क में "टोपोलॉजी" का क्या अर्थ है?
answer: उपकरण आपस में कैसे जुड़े हैं
wrong_answers:
  - इंटरनेट कनेक्शन की गति
  - संचार के लिए प्रयुक्त प्रोटोकॉल का प्रकार
  - नेटवर्क पर उपयोग किए जाने वाले राउटर के ब्रांड के लिए
explanation: |
  टोपोलॉजी किसी नेटवर्क की भौतिक या तार्किक संरचना तथा उसके घटकों के आपस में जुड़ने के तरीके को संदर्भित करती है।
reviewed: false
question: توپولوژی در یک شبکه کامپیوتری به معنای نحوه‌ی اتصال و چیدمان فیزیکی یا منطقی اجزای شبکه است.
answer: چگونه دستگاه‌ها به هم متصل می‌شوند
wrong_answers:

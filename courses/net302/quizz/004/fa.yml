  - نوع پروتکل مورد استفاده برای ارتباطات
  - به برند روترهای استفاده شده در یک شبکه
explanation: |
  توپولوژی به ساختار فیزیکی یا منطقی یک شبکه و نحوه اتصال اجزای آن اشاره دارد.

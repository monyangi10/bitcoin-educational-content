question: Что означает термин "топология" в компьютерной сети?
answer: Как взаимосвязаны устройства
wrong_answers:
  - Скорость подключения к Интернету
  - Тип протокола, используемого для связи
  - К марке маршрутизаторов, используемых в сети
explanation: |
  Топология - это физическая или логическая структура сети и способ соединения ее компонентов.
reviewed: false
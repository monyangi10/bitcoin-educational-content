question: À quoi correspond la notion de topologie dans un réseau informatique ?
answer: À la façon dont les équipements sont interconnectés
wrong_answers:
  - À la rapidité de la connexion Internet
  - Au type de protocole utilisé pour la communication
  - À la marque des routeurs utilisés sur un réseau
explanation: |
  La topologie désigne la structure physique ou logique d’un réseau et la manière dont ses composants sont reliés.
reviewed: false

question: Какво означава "топология" в компютърна мрежа?
answer: Как устройствата са свързани помежду си
wrong_answers:
  - Скорост на интернет връзката
  - Видът на протокола, използван за комуникация
  - За марката на маршрутизаторите, използвани в дадена мрежа
explanation: |
  Топологията се отнася до физическата или логическата структура на дадена мрежа и начина, по който са свързани нейните компоненти.
reviewed: false
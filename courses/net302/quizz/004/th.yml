question: "\"Topology\" ในเครือข่ายคอมพิวเตอร์หมายถึงโครงสร้างหรือรูปแบบการเชื่อมต่อของเครือข่าย ซึ่งอาจเป็นการจัดเรียงทางกายภาพหรือทางตรรกะของโหนดและการเชื่อมต่อในเครือข่าย"
answer: "วิธีการเชื่อมต่ออุปกรณ์ต่างๆ"
wrong_answers:
  - "ความเร็วในการเชื่อมต่ออินเทอร์เน็ต"
  - "ประเภทของโปรโตคอลที่ใช้สำหรับการสื่อสาร"
  - "ไปยังยี่ห้อของเราเตอร์ที่ใช้ในเครือข่าย"
explanation: |
  โทโพโลยีหมายถึงโครงสร้างทางกายภาพหรือเชิงตรรกะของเครือข่ายและวิธีการเชื่อมต่อของส่วนประกอบต่างๆ
reviewed: false

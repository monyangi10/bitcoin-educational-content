question: ที่อยู่ MAC อยู่ในเลเยอร์ใดของโมเดล OSI?
answer: เลเยอร์ลิงก์ข้อมูล
wrong_answers:
  - เลเยอร์แอปพลิเคชัน
  - เลเยอร์การขนส่ง
  - เลเยอร์เครือข่าย
explanation: |
  ที่อยู่ MAC ทำงานที่เลเยอร์ 2 ของโมเดล OSI ซึ่งรู้จักกันในชื่อ "เลเยอร์ลิงก์ข้อมูล" โดยใช้สำหรับการกำหนดที่อยู่ฮาร์ดแวร์ของเฟรม
reviewed: false
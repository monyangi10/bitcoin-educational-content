question: Je, MAC Address ni ya Layer gani ya modeli ya OSI?
answer: Kiungo cha data Layer
wrong_answers:
  - Application Layer
  - Transport Layer
  - Network Layer
explanation: |
  MAC Address inafanya kazi katika Layer 2 ya modeli ya OSI, inayojulikana kama "Data Link Layer", ambapo hutumika kushughulikia maunzi ya fremu.
reviewed: true

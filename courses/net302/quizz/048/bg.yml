question: Към кой слой на модела OSI принадлежи MAC адресът?
answer: Слой за връзка с данни
wrong_answers:
  - Слой на приложението
  - Транспортен слой
  - Мрежово ниво
explanation: |
  MAC адресът работи на ниво 2 от модела OSI, известно като "ниво на връзката с данни", където се използва за хардуерно адресиране на кадри.
reviewed: false
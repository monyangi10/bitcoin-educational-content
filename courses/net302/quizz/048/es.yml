question: ¿A qué capa del modelo OSI pertenece la dirección MAC?
answer: Capa de Enlace de datos
wrong_answers:
  - Capa de Aplicación
  - Capa de Transporte
  - Capa de Red
explanation: |
  La dirección MAC opera en la capa 2 del modelo OSI, conocido como "Capa de Enlace de datos", donde se utiliza para el direccionamiento por hardware de las tramas.
reviewed: true
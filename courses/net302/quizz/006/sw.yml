question: Ni shirika gani linalosimamia usimamizi wa kiufundi wa protocol za Mtandao?
answer: Bodi ya Usanifu wa Mtandao
wrong_answers:
  - Jumuiya ya Mtandao
  - Muungano wa Mtandao Wote wa Ulimwenguni
  - Taasisi ya Wahandisi wa Umeme na Elektroniki
explanation: |
  Internet Architecture Board (IAB) inasimamia utawala wa kiufundi na kuratibu mabadiliko ya itifaki za mtandao.
reviewed: true

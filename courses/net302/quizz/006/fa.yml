question: کدام سازمان نظارت بر حاکمیت فنی پروتکل‌های اینترنت را بر عهده دارد؟
answer: هیئت معماری اینترنت
wrong_answers:
  - جامعه اینترنتی
  - کنسرسیوم وب جهان‌شمول
  - مؤسسه مهندسان برق و الکترونیک
explanation: |
  هیئت معماری اینترنت (IAB) نظارت بر حاکمیت فنی و هماهنگی تکامل پروتکل‌های اینترنت را بر عهده دارد.
reviewed: false
question: Коя организация контролира техническото управление на интернет протоколите?
answer: Съвет за архитектура на интернет
wrong_answers:
  - Интернет общност
  - Консорциум за световна мрежа
  - Институт на инженерите по електротехника и електроника
explanation: |
  Съветът за архитектура на интернет (IAB) наблюдава техническото управление и координира развитието на интернет протоколите.
reviewed: false
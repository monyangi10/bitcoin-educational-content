question: Какая организация следит за техническим управлением интернет-протоколами?
answer: Совет по архитектуре Интернета
wrong_answers:
  - Интернет-сообщество
  - Консорциум Всемирной паутины
  - Институт инженеров по электротехнике и электронике
explanation: |
  Совет по архитектуре Интернета (IAB) следит за техническим управлением и координирует эволюцию протоколов Интернета.
reviewed: false
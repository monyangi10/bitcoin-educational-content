question: องค์กรใดที่ดูแลการกำกับดูแลทางเทคนิคของโปรโตคอลอินเทอร์เน็ต?
answer: คณะกรรมการสถาปัตยกรรมอินเทอร์เน็ต
wrong_answers:
  - ชุมชนอินเทอร์เน็ต
  - สมาคมเวิลด์ไวด์เว็บ
  - สถาบันวิศวกรไฟฟ้าและอิเล็กทรอนิกส์
explanation: |
  คณะกรรมการสถาปัตยกรรมอินเทอร์เน็ต (IAB) ดูแลการกำกับดูแลทางเทคนิคและประสานงานการพัฒนาของโปรโตคอลอินเทอร์เน็ต
reviewed: false
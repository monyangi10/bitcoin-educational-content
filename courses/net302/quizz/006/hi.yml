question: कौन सा संगठन इंटरनेट प्रोटोकॉल के तकनीकी शासन की देखरेख करता है?
answer: इंटरनेट आर्किटेक्चर बोर्ड
wrong_answers:
  - इंटरनेट समुदाय
  - वर्ल्ड वाइड वेब कंसोर्टियम
  - इलेक्ट्रिकल और इलेक्ट्रॉनिक्स इंजीनियर्स संस्थान
explanation: |
  इंटरनेट आर्किटेक्चर बोर्ड (आईएबी) तकनीकी प्रशासन की देखरेख करता है और इंटरनेट प्रोटोकॉल के विकास का समन्वय करता है।
reviewed: false
question: บทบาทหลักของโปรโตคอล IP ในโมเดล TCP/IP คืออะไร?
answer: ส่งข้อมูลแพ็กเก็ตจากโฮสต์หนึ่งไปยังอีกโฮสต์หนึ่ง
wrong_answers:
  - จัดการการเข้ารหัสของการสื่อสารเครือข่าย
  - ตรวจสอบให้แน่ใจว่าการเชื่อมต่อระหว่างแอปพลิเคชันมีความต่อเนื่อง
  - แปลที่อยู่ MAC เป็นที่อยู่ IP
explanation: |
  โปรโตคอล IP จัดการการกำหนดที่อยู่เชิงตรรกะของอุปกรณ์และรับประกันว่าชุดข้อมูลจะถูกส่งผ่านเครือข่ายที่เชื่อมต่อกัน
reviewed: false
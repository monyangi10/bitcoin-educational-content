question: Je, ni jukumu gani kuu la Protocol ya IP katika muundo wa TCP/IP?
answer: Peana pakiti za data kutoka kwa server pangishi moja hadi nyingine
wrong_answers:
  - Dhibiti usimbaji fiche wa mawasiliano ya mtandao
  - Hakikisha miunganisho inayoendelea kati ya programu
  - Tafsiri anwani za MAC kuwa anwani za IP
explanation: |
  Protocol ya IP hushughulikia ushughulikiaji wa kimantiki wa vifaa na kuhakikisha kuwa pakiti zinapitishwa kwenye mitandao iliyounganishwa.
reviewed: true

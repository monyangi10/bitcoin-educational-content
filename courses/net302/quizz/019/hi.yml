question: टीसीपी/आईपी मॉडल में आईपी प्रोटोकॉल की मुख्य भूमिका क्या है?
answer: एक होस्ट से दूसरे होस्ट तक डेटा पैकेट पहुँचाना
wrong_answers:
  - नेटवर्क संचार के एन्क्रिप्शन का प्रबंधन करें
  - अनुप्रयोगों के बीच स्थायी कनेक्शन सुनिश्चित करें
  - MAC पतों को IP पतों में अनुवाद करें
explanation: |
  आईपी ​​प्रोटोकॉल उपकरणों के तार्किक एड्रेसिंग को संभालता है और यह सुनिश्चित करता है कि पैकेट्स को आपस में जुड़े नेटवर्कों पर रूट किया जाए।

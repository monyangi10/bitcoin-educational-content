question: Какова основная роль протокола IP в модели TCP/IP?
answer: Передача пакетов данных от одного узла к другому
wrong_answers:
  - Управление шифрованием сетевых коммуникаций
  - Обеспечение постоянных соединений между приложениями
  - Трансляция MAC-адресов в IP-адреса
explanation: |
  Протокол IP управляет логической адресацией устройств и обеспечивает маршрутизацию пакетов во взаимосвязанных сетях.
reviewed: false
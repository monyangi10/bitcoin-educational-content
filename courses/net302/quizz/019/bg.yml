question: Каква е основната роля на протокола IP в модела TCP/IP?
answer: Предаване на пакети данни от един хост на друг
wrong_answers:
  - Управление на криптирането на мрежовите комуникации
  - Осигуряване на постоянни връзки между приложенията
  - Преобразуване на MAC адреси в IP адреси
explanation: |
  IP протоколът обработва логическото адресиране на устройствата и осигурява маршрутизирането на пакетите в свързаните мрежи.
reviewed: false
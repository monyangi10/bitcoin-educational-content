question: نقش اصلی پروتکل IP در مدل TCP/IP چیست؟
answer: تحویل بسته‌های داده از یک میزبان به میزبان دیگر
wrong_answers:
  - مدیریت رمزگذاری ارتباطات شبکه
  - اتصال‌های پایدار بین برنامه‌ها را تضمین کنید
  - ترجمه آدرس‌های MAC به آدرس‌های IP
explanation: |
  پروتکل IP به آدرس‌دهی منطقی دستگاه‌ها می‌پردازد و اطمینان حاصل می‌کند که بسته‌ها در شبکه‌های به‌هم‌پیوسته مسیریابی می‌شوند.
reviewed: false
question: Koji je glavni cilj uvođenja IPv6?
answer: Obezbeđivanje praktično neograničenog adresnog prostor
wrong_answers:
  - Povećanje propusnosti Ethernet-a za faktor 4
  - Postepeno zamenjivanje TCP-a sa UDP-om
  - Smanjivanje broja bajtova po paketu
explanation: |
  Glavna svrha IPv6 je rešavanje nedostatka IP adresa masovnim proširenjem adresnog prostora.
reviewed: true

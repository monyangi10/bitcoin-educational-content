question: Каква е основната цел на въвеждането на IPv6?
answer: Предоставяне на практически неограничено адресно пространство
wrong_answers:
  - Увеличаване на пропускателната способност на Ethernet с 4 пъти
  - Постепенна замяна на TCP с UDP
  - Намаляване на броя на байтовете в пакет
explanation: |
  Основната цел на IPv6 е да се реши проблемът с недостига на IP адреси чрез масово разширяване на адресното пространство.
reviewed: false
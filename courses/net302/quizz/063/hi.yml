question: IPv6 को शुरू करने का मुख्य लक्ष्य क्या है?
answer: वस्तुतः असीमित Address स्थान प्रदान करें
wrong_answers:
  - ईथरनेट थ्रूपुट को 4 गुना बढ़ाएँ
  - धीरे-धीरे TCP को UDP से बदलें
  - प्रति पैकेट बाइट्स की संख्या कम करें
explanation: |
  IPv6 का मुख्य उद्देश्य Address स्थान का व्यापक विस्तार करके IP पतों की कमी को दूर करना है।
reviewed: false
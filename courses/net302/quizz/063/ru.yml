question: Какова основная цель внедрения IPv6?
answer: Обеспечивают практически неограниченное пространство Address
wrong_answers:
  - Увеличение пропускной способности Ethernet в 4 раза
  - Постепенная замена TCP на UDP
  - Сократите количество байтов в пакете
explanation: |
  Основная цель IPv6 - решить проблему нехватки IP-адресов за счет массового расширения пространства Address.
reviewed: false
question: เป้าหมายหลักของการแนะนำ IPv6 คืออะไร?
answer: ให้พื้นที่ที่อยู่ที่ไม่จำกัด
wrong_answers:
  - เพิ่มอัตราการส่งข้อมูลผ่าน Ethernet ขึ้น 4 เท่า
  - ค่อยๆ แทนที่ TCP ด้วย UDP
  - ลดจำนวนไบต์ต่อแพ็กเก็ต
explanation: |
  วัตถุประสงค์หลักของ IPv6 คือการแก้ปัญหาการขาดแคลนที่อยู่ IP โดยการขยายพื้นที่ที่อยู่ให้มากขึ้นอย่างมหาศาล
reviewed: false
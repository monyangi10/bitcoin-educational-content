question: هدف اصلی معرفی IPv6 چیست؟
answer: ارائه فضای Address تقریباً نامحدود
wrong_answers:
  - افزایش توان عملیاتی اترنت به میزان ۴ برابر
  - به تدریج TCP را با UDP جایگزین کنید
  - تعداد بایت‌ها در هر بسته را کاهش دهید
explanation: |
  هدف اصلی IPv6 حل کمبود آدرس‌های IP با گسترش گسترده فضای Address است.
reviewed: false
question: किसी डोमेन नाम को IPv6 Address के साथ मैप करने के लिए किस प्रकार के DNS रिकॉर्ड का उपयोग किया जाता है?
answer: एएएए
wrong_answers:
  - ए
  - पीटीआर
  - एमएक्स
explanation: |
  प्रकार AAAA (क्वाड-A) का उपयोग IPv6 Address के साथ डोमेन नाम को मैप करने के लिए किया जाता है, जबकि प्रकार A IPv4 के लिए आरक्षित है।
reviewed: false
question: Для чего в модели TCP/IP используются зарезервированные порты?
answer: Чтобы прослушать запросы на конкретные услуги
wrong_answers:
  - К generate автоматическая инкапсуляция дейтаграмм
  - Для физической маршрутизации сетевых кадров
  - Для управления фрагментацией пакетов UDP
explanation: |
  Порты - это логические точки прослушивания, которые позволяют сетевым приложениям различать различные службы, работающие на одном хосте.

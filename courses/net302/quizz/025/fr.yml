question: À quoi servent les ports réservés dans le modèle TCP/IP ?
answer: À écouter les demandes sur des services spécifiques
wrong_answers:
  - À générer l’encapsulation automatique datagrammes
  - À router physiquement les trames réseau
  - À contrôler la fragmentation des paquets UDP
explanation: |
  Les ports sont des points d’écoute logiques permettant aux applications réseau de distinguer les différents services sur un même hôte.
reviewed: true 

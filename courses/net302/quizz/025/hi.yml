question: टीसीपी/आईपी मॉडल में आरक्षित पोर्ट का उपयोग किस लिए किया जाता है?
answer: विशिष्ट सेवाओं पर अनुरोधों को सुनने के लिए
wrong_answers:
  - generate स्वचालित डेटाग्राम एनकैप्सुलेशन के लिए
  - नेटवर्क फ़्रेम को भौतिक रूप से रूट करने के लिए
  - UDP पैकेट विखंडन को नियंत्रित करने के लिए
explanation: |
  पोर्ट तार्किक श्रवण बिंदु होते हैं जो नेटवर्क अनुप्रयोगों को एक ही होस्ट पर चल रही विभिन्न सेवाओं के बीच अंतर करने की अनुमति देते हैं।
reviewed: false
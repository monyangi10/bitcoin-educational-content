question: За какво се използват запазените портове в модела TCP/IP?
answer: Слушане на заявки за конкретни услуги
wrong_answers:
  - За generate автоматично капсулиране на дейтаграми
  - Физическо маршрутизиране на мрежови кадри
  - Управление на фрагментирането на UDP пакети
explanation: |
  Портовете са логически точки за слушане, които позволяват на мрежовите приложения да правят разлика между различните услуги, изпълнявани на един и същ хост.
reviewed: false
question: พอร์ตที่สงวนไว้ใช้สำหรับอะไรในโมเดล TCP/IP?
answer: ฟังคำขอบนบริการเฉพาะเจาะจง
wrong_answers:
  - ไปยัง generate การห่อหุ้ม datagram อัตโนมัติ
  - เพื่อกำหนดเส้นทางเฟรมเครือข่ายทางกายภาพ
  - ควบคุมการแบ่งแพ็กเก็ต UDP
explanation: |
  พอร์ตเป็นจุดรับฟังเชิงตรรกะที่ช่วยให้แอปพลิเคชันเครือข่ายสามารถแยกแยะระหว่างบริการต่าง ๆ ที่ทำงานบนโฮสต์เดียวกันได้
reviewed: false
question: پورت‌های رزرو شده در مدل TCP/IP برای چه استفاده می‌شوند؟
answer: برای گوش دادن به درخواست‌ها در خدمات خاص
wrong_answers:
  - به کپسوله‌سازی خودکار دیتاگرام generate
  - برای مسیریابی فیزیکی فریم‌های شبکه
  - برای کنترل تکه‌تکه شدن بسته‌های UDP
explanation: |
  پورت‌ها نقاط شنود منطقی هستند که به برنامه‌های شبکه اجازه می‌دهند تا بین خدمات مختلفی که بر روی یک میزبان واحد اجرا می‌شوند، تمایز قائل شوند.
reviewed: false
question: अधिकांश प्रणालियों पर ARP कैश से परामर्श करने के लिए किस ऐतिहासिक कमांड का उपयोग किया जा सकता है?
answer: एआरपी
wrong_answers:
  - खोदना
  - एनएसलुकअप
  - गुनगुनाहट
explanation: |
  arp कमांड आपको ARP कैश को देखने या संशोधित करने की सुविधा देता है, जो IP/MAC मैपिंग को स्थानीय रूप से संग्रहीत करता है।
reviewed: false
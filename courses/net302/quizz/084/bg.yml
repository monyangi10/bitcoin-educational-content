question: Коя историческа команда може да се използва за проверка на ARP кеша в повечето системи?
answer: arp
wrong_answers:
  - копайте
  - nslookup
  - ping
explanation: |
  Командата arp ви позволява да преглеждате или променяте ARP кеша, който съхранява локално IP/MAC съпоставки.
reviewed: false
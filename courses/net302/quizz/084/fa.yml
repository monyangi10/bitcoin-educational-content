question: کدام دستور تاریخی می‌تواند برای مشاوره با حافظه پنهان ARP در اکثر سیستم‌ها استفاده شود؟
answer: آرپ
wrong_answers:
  - حفاری کردن
  - nslookup
  - پینگ
explanation: |
  دستور arp به شما اجازه می‌دهد تا حافظه پنهان ARP را مشاهده یا تغییر دهید، که نگاشت‌های IP/MAC را به صورت محلی ذخیره می‌کند.
reviewed: false
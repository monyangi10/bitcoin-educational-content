question: Какая историческая команда может быть использована для просмотра ARP-кэша в большинстве систем?
answer: arp
wrong_answers:
  - копать
  - nslookup
  - пинг
explanation: |
  Команда arp позволяет просматривать или изменять ARP-кэш, в котором локально хранятся сопоставления IP/MAC.
reviewed: false
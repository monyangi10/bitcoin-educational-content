question: Какво представлява anycast адресът в IPv6?
answer: Адрес, присвоен на няколко възела
wrong_answers:
  - Адрес, предназначен за глобално многоадресно предаване
  - Адрес, който се променя при всяко рестартиране
  - Адрес, запазен за техническа документация
explanation: |
  Един anycast адрес се присвоява на няколко устройства и маршрутизацията доставя пакета до това, което е топологично най-близо.
reviewed: false
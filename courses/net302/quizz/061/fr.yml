question: Qu’appelle-t-on une adresse anycast en IPv6 ?
answer: Une adresse assignée à plusieurs nœuds
wrong_answers:
  - Une adresse dédiée à la multidiffusion globale
  - Une adresse qui change à chaque redémarrage
  - Une adresse réservée à la documentation technique
explanation: |
  Une adresse anycast est attribuée à plusieurs équipements, et le routage livre le paquet à celui qui est topologiquement le plus proche.
reviewed: true 

question: Address در IPv6 چیست؟
answer: یک Address اختصاص داده شده به چندین گره
wrong_answers:
  - یک Address اختصاص داده شده به پخش چندگانه جهانی
  - یک Address که با هر راه‌اندازی مجدد تغییر می‌کند
  - یک Address برای مستندات فنی رزرو شده است
explanation: |
  یک anycast Address به چندین دستگاه اختصاص داده شده است و مسیریابی بسته را به دستگاهی که از نظر توپولوژیکی نزدیک‌تر است، تحویل می‌دهد.
reviewed: false
question: ที่อยู่ anycast ใน IPv6 คืออะไร?
answer: ที่อยู่ที่กำหนดให้กับหลายโหนด
wrong_answers:
  - ที่อยู่ที่อุทิศให้กับการกระจายสัญญาณทั่วโลก
  - ที่อยู่ที่เปลี่ยนแปลงทุกครั้งที่รีบูต
  - ที่อยู่ที่สงวนไว้สำหรับเอกสารทางเทคนิค
explanation: |
  ที่อยู่ anycast ถูกกำหนดให้กับอุปกรณ์หลายตัว และการกำหนดเส้นทางจะส่งแพ็กเก็ตไปยังอุปกรณ์ที่อยู่ใกล้ที่สุดในเชิงโทโพโลยี
reviewed: false
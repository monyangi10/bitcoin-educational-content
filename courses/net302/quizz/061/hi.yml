question: IPv6 में एनीकास्ट Address क्या है?
answer: एक Address को कई नोड्स को सौंपा गया
wrong_answers:
  - वैश्विक मल्टीकास्टिंग के लिए समर्पित एक Address
  - एक Address जो हर रीबूट के साथ बदलता है
  - तकनीकी दस्तावेज़ीकरण के लिए आरक्षित Address
explanation: |
  एनीकास्ट Address को कई डिवाइसों को सौंपा जाता है, तथा रूटिंग पैकेट को उस डिवाइस तक पहुंचाती है जो टोपोलॉजिकल रूप से सबसे निकट होता है।
reviewed: false
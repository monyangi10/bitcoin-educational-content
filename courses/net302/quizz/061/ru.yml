question: Что такое anycast Address в IPv6?
answer: Address назначен на несколько узлов
wrong_answers:
  - Address, предназначенный для глобальной многоадресной рассылки
  - Address, который меняется при каждой перезагрузке
  - Address, зарезервированный для технической документации
explanation: |
  Anycast Address назначается нескольким устройствам, и маршрутизация доставляет пакет тому из них, которое топологически ближе всего.

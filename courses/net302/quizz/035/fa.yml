question: کدام محدوده‌های IPv4 Address برای استفاده خصوصی رزرو شده‌اند؟
answer: ۱۰.۰.۰.۰/۸، ۱۷۲.۱۶.۰.۰/۱۲، ۱۹۲.۱۶۸.۰.۰/۱۶
wrong_answers:
  - ۸.۸.۸.۸/۳۲، ۱.۱.۱.۱/۳۲، ۲۵۵.۲۵۵.۲۵۵.۰/۲۴
  - ۲۲۴.۰.۰.۰/۴، ۲۴۰.۰.۰.۰/۴، ۰.۰.۰.۰/۸
  - ۱۲۷.۰.۰.۰/۸، ۱۶۹.۲۵۴.۰.۰/۱۶، ۱۹۸.۵۱.۱۰۰.۰/۲۴
explanation: |
  این سه محدوده به طور رسمی برای استفاده خصوصی رزرو شده‌اند و در اینترنت قابل مسیریابی نیستند.

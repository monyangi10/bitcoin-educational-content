question: प्रत्येक DNS ज़ोन फ़ाइल में कौन सा रिकॉर्ड अनिवार्य है?
answer: SOA (प्राधिकरण की शुरुआत)
wrong_answers:
  - पीटीआर (पॉइंटर)
  - AAAA (IPv6 Address)
  - एसआरवी (सेवा लोकेटर)
explanation: |
  SOA रिकॉर्ड ज़ोन प्राधिकरण को परिभाषित करता है और प्रत्येक DNS ज़ोन फ़ाइल में आवश्यक होता है।
reviewed: false
question: वैश्विक DNS के आगमन से पहले स्थानीय समाधान के लिए ऐतिहासिक रूप से किस फ़ाइल का उपयोग किया जाता था?
answer: /आदि/होस्ट
wrong_answers:
  - /आदि/डीएनएस
  - /आदि/नेटवर्क
  - /etc/समाधान
explanation: |
  DNS के व्यापक होने से पहले, नाम समाधान यूनिक्स/लिनक्स प्रणालियों पर स्थिर /etc/hosts फ़ाइल पर निर्भर था।
reviewed: false
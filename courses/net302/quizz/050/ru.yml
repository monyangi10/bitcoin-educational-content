question: Что необходимо добавить к NAT, чтобы обеспечить надлежащую безопасность сети?
answer: Брандмауэр
wrong_answers:
  - Локальный DNS-сервер
  - HTTP-прокси
  - Антивирус
explanation: |
  Одного NAT недостаточно для фильтрации вредоносного трафика: он должен быть дополнен правилами брандмауэра для тонкого контроля трафика.
reviewed: false
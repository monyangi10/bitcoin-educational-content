question: नेटवर्क को उचित रूप से सुरक्षित करने के लिए NAT में क्या जोड़ा जाना चाहिए?
answer: एक फ़ायरवॉल
wrong_answers:
  - एक स्थानीय DNS सर्वर
  - एक HTTP प्रॉक्सी
  - एक एंटीवायरस
explanation: |
  दुर्भावनापूर्ण ट्रैफ़िक को फ़िल्टर करने के लिए अकेले NAT पर्याप्त नहीं है: इसे सूक्ष्म ट्रैफ़िक नियंत्रण के लिए फ़ायरवॉल नियमों द्वारा पूरक होना चाहिए।
reviewed: false
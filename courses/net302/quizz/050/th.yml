question: สิ่งที่ต้องเพิ่มเข้าไปใน NAT เพื่อรักษาความปลอดภัยของเครือข่ายอย่างเหมาะสมคืออะไร?
answer: ไฟร์วอลล์
wrong_answers:
  - เซิร์ฟเวอร์ DNS ท้องถิ่น
  - พร็อกซี HTTP
  - แอนตี้ไวรัส
explanation: |
  NAT เพียงอย่างเดียวไม่เพียงพอที่จะกรองการจราจรที่เป็นอันตราย: จำเป็นต้องมีการเสริมด้วยกฎไฟร์วอลล์เพื่อการควบคุมการจราจรที่ละเอียดมากขึ้น
reviewed: false
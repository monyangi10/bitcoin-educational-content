question: Какво трябва да се добави към NAT, за да се защити правилно една мрежа?
answer: Защитна стена
wrong_answers:
  - Местен DNS сървър
  - HTTP прокси
  - Антивирусен софтуер
explanation: |
  Само NAT не е достатъчен за филтриране на злонамерен трафик: той трябва да бъде допълнен от правила за защитна стена за фин контрол на трафика.
reviewed: false
question: چه چیزی باید به NAT اضافه شود تا یک شبکه به درستی ایمن شود؟
answer: یک دیوار آتش
wrong_answers:
  - یک سرور DNS محلی
  - یک پروکسی HTTP
  - یک آنتی‌ویروس
explanation: |
  تنها NAT برای فیلتر کردن ترافیک مخرب کافی نیست: باید با قوانین فایروال برای کنترل دقیق ترافیک تکمیل شود.
reviewed: false
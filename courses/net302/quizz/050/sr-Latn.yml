question: Šta treba dodati NAT-u da bi se mreža pravilno osigurala?
answer: Vatrozid
wrong_answers:
  - lokalni DNS server
  - HTTP proxy
  - Antivirus
explanation: |
  Samo NAT nije dovoljan za filtriranje zlonamernog saobraćaja: mora biti dopunjen pravilima vatrozida za preciznu kontrolu saobraćaja.

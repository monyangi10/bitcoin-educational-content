question: Šta treba dodati NAT-u da bi se mreža pravilno osigurala?
answer: Firewall
wrong_answers:
  - Lokalni DNS server
  - HTTP proxy
  - Antivirus
explanation: |
  Samo NAT nije dovoljan za filtriranje zlonamernog saobraćaja: mora biti dopunjen pravilima firewall-a za preciznu kontrolu saobraćaja.
reviewed: true

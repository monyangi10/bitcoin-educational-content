question: टीसीपी में बहु-चरणीय कनेक्शन स्थापना प्रक्रिया का नाम क्या है?
answer: तीन-तरफ़ा हाथ मिलाना
wrong_answers:
  - चार-तरफ़ा हाथ मिलाना
  - स्लाइडिंग खिड़की
  - चेकसम प्रक्रिया
explanation: |
  तीन-तरफ़ा हैंडशेक, पेलोड डेटा के किसी भी Exchange से पहले क्लाइंट और सर्वर के बीच अनुक्रम संख्याओं को सिंक्रनाइज़ करता है।

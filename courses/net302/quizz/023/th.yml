question: ชื่อของขั้นตอนการเชื่อมต่อหลายขั้นตอนใน TCP คืออะไร?
answer: การจับมือสามทาง
wrong_answers:
  - จับมือสี่ทาง
  - หน้าต่างเลื่อน
  - กระบวนการตรวจสอบผลรวม
explanation: |
  การจับมือสามทางจะซิงโครไนซ์หมายเลขลำดับระหว่างไคลเอนต์และเซิร์ฟเวอร์ก่อนการแลกเปลี่ยนข้อมูลเพย์โหลดใด ๆ
reviewed: false
question: نام روش برقراری اتصال چند مرحله‌ای در TCP چیست؟
answer: مصافحه سه‌طرفه
wrong_answers:
  - مصافحه چهار مرحله‌ای
  - پنجره لغزنده
  - فرآیند بررسی مجموع
explanation: |
  سه‌طرفه دست دادن شماره‌های توالی را بین مشتری و سرور قبل از هر Exchange از داده‌های بارگذاری همگام‌سازی می‌کند.
reviewed: false
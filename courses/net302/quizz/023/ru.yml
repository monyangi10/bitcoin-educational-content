question: Как называется многоступенчатая процедура установления соединения в TCP?
answer: Трехстороннее рукопожатие
wrong_answers:
  - Четырехстороннее рукопожатие
  - Раздвижное окно
  - Процесс получения контрольной суммы
explanation: |
  Трехстороннее рукопожатие синхронизирует номера последовательностей между клиентом и сервером перед передачей данных полезной нагрузки Exchange.
reviewed: false
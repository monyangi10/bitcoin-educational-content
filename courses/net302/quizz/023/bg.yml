question: Как се нарича многоетапната процедура за установяване на връзка в TCP?
answer: Тристранно ръкостискане
wrong_answers:
  - Четиристранно ръкостискане
  - Плъзгащ се прозорец
  - Процес на контролна сума
explanation: |
  Тристранното ръкостискане синхронизира номерата на последователността между клиента и сървъра преди всеки обмен на данни за полезен товар.
reviewed: false
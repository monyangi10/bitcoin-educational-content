question: Кому разрешено фрагментировать пакет IPv6?
answer: Только исходный хост
wrong_answers:
  - Только первый промежуточный маршрутизатор
  - Только маршрутизатор назначения
  - Все маршрутизаторы
explanation: |
  В IPv6 фрагментация выполняется исключительно хостом-источником, и никогда - промежуточными маршрутизаторами.
reviewed: false
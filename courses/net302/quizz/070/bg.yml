question: На кого е разрешено да фрагментира IPv6 пакет?
answer: Само изходният хост
wrong_answers:
  - Само първият междинен маршрутизатор
  - Само маршрутизатор на местоназначението
  - Всички маршрутизатори
explanation: |
  В IPv6 фрагментирането се извършва изключително от изходния хост, а не от междинните маршрутизатори.
reviewed: false
question: Koja je svrha posebne IPv4 notacije 0.0.0.0?
answer: Za označavanje svih interfejsa ili nedodeljene adrese
wrong_answers:
  - Za slanje poruke svim mrežama
  - Za testiranje lokalne veze uređaja
  - Za signalizaciju greške u adresiranju ili vezi na lokalnom ruteru
explanation: |
  Notacija 0.0.0.0 se lokalno koristi za predstavljanje odsustva dodeljene adrese ili za slušanje na svim interfejsima.
reviewed: true

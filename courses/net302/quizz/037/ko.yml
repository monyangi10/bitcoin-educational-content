question: 특수 IPv4 표기법 0.0.0.0의 목적은 무엇인가요?
answer: 모든 인터페이스 또는 할당되지 않은 Address 지정하기
wrong_answers:
  - 모든 네트워크에 메시지를 보내려면 다음과 같이 하세요
  - 디바이스의 로컬 연결을 테스트하려면 다음과 같이 하세요
  - 로컬 라우터에서 주소 지정 또는 연결 오류를 표시하려면 다음과 같이 하세요
explanation: |
  0.0.0.0 표기는 할당된 Address이 없음을 나타내거나 모든 인터페이스에서 수신하기 위해 로컬로 사용됩니다.
reviewed: false
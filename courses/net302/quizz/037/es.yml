question: ¿Para qué sirve la notación especial 0.0.0.0 de IPv4?
answer: Para designar todas las interfaces o una dirección no asignada
wrong_answers:
  - Para enviar un mensaje a todas las redes
  - Para probar la conexión local de un dispositivo
  - Para indicar un error de direccionamiento o de conexión en el router local
explanation: |
  La notación 0.0.0.0 se utiliza localmente para representar la ausencia de una dirección asignada o para escuchar en todas las interfaces.
reviewed: true
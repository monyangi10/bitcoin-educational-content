question: هدف از نماد خاص IPv4 یعنی 0.0.0.0 چیست؟
answer: برای تعیین همه رابط‌ها یا یک Address تخصیص‌نیافته
wrong_answers:
  - برای ارسال پیام به تمام شبکه‌ها
  - برای آزمایش اتصال محلی یک دستگاه
  - برای نشان دادن خطای آدرس‌دهی یا اتصال در روتر محلی
explanation: |
  نماد 0.0.0.0 به صورت محلی برای نشان دادن عدم وجود یک Address اختصاص داده شده یا برای گوش دادن بر روی تمام رابط‌ها استفاده می‌شود.
reviewed: false
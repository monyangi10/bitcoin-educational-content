question: Какво е предназначението на специалния запис на IPv4 0.0.0.0?
answer: Определяне на всички интерфейси или на ненасочен адрес
wrong_answers:
  - Изпращане на съобщение до всички мрежи
  - Тестване на локалната връзка на устройство
  - Индикация за грешка в адресирането или връзката в локалния маршрутизатор
explanation: |
  Записът 0.0.0.0 се използва локално, за да представи липсата на присвоен адрес или за слушане на всички интерфейси.
reviewed: false
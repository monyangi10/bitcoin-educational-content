question: कौन सा कमांड लिनक्स में सभी नेटवर्क इंटरफेस की विस्तृत स्थिति प्रदर्शित करता है?
answer: आईपी ​​एड्रेस दिखाएँ
wrong_answers:
  - ifup -a
  - नेटस्टैट -i
  - आईपी ​​रूट शो
explanation: |
  "ip addr show" कमांड सभी नेटवर्क इंटरफेस को उनकी स्थिति, पते और संबंधित पैरामीटर के साथ सूचीबद्ध करता है।

question: स्थानीय नेटवर्क में MAC Address का मुख्य कार्य क्या है?
answer: किसी नेटवर्क की विशिष्ट पहचान करें Interface
wrong_answers:
  - डोमेन नाम को IP Address में अनुवादित करें
  - किसी होस्ट को गतिशील रूप से IP Address असाइन करें
  - अपने इंटरनेट कनेक्शन की गति निर्धारित करें
explanation: |
  MAC Address प्रत्येक नेटवर्क Interface के लिए एक अद्वितीय हार्डवेयर पहचानकर्ता के रूप में कार्य करता है, जिससे स्थानीय नेटवर्क पर उपकरणों को भौतिक रूप से पहचाना जा सकता है।

question: Koja je glavna funkcija MAC adrese u lokalnoj mreži?
answer: Jedinstveno identifikovanje mrežnog interfejsa
wrong_answers:
  - Prevođenje naziva domena u IP adresy
  - Dinamičko dodeljivanje IP adrese hostu
  - Određivanje brzine vaše internet veze
explanation: |
  MAC adresa služi kao jedinstveni hardverski identifikator za svaki mrežni interfejs, omogućavajući uređajima da budu fizički razlikovani na lokalnoj mreži.
reviewed: true

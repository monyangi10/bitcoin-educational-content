question: عملکرد اصلی MAC Address در یک شبکه محلی چیست؟
answer: به‌طور منحصر به فرد یک شبکه Interface را شناسایی کنید
wrong_answers:
  - ترجمه یک نام دامنه به یک IP Address
  - به صورت پویا یک IP Address به یک میزبان اختصاص دهید
  - سرعت اتصال اینترنت خود را تعیین کنید
explanation: |
  Address MAC به عنوان یک شناسه سخت‌افزاری منحصر به فرد برای هر شبکه Interface عمل می‌کند و به دستگاه‌ها امکان می‌دهد تا به صورت فیزیکی در یک شبکه محلی متمایز شوند.
reviewed: false
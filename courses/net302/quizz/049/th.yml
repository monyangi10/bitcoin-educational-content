question: หน้าที่หลักของ MAC address ในเครือข่ายท้องถิ่นคืออะไร?
answer: ระบุอินเทอร์เฟซเครือข่ายอย่างเฉพาะเจาะจง
wrong_answers:
  - แปลงชื่อโดเมนเป็นที่อยู่ IP
  - กำหนดที่อยู่ IP ให้กับโฮสต์แบบไดนามิก
  - กำหนดความเร็วของการเชื่อมต่ออินเทอร์เน็ตของคุณ
explanation: |
  ที่อยู่ MAC ทำหน้าที่เป็นตัวระบุฮาร์ดแวร์ที่ไม่ซ้ำกันสำหรับแต่ละอินเทอร์เฟซเครือข่าย ช่วยให้สามารถแยกแยะอุปกรณ์ทางกายภาพบนเครือข่ายท้องถิ่นได้
reviewed: false
question: Каква е основната функция на MAC адреса в локалната мрежа?
answer: Уникално идентифициране на мрежов интерфейс
wrong_answers:
  - Преобразуване на име на домейн в IP адрес
  - Динамично присвояване на IP адрес на хост
  - Определете скоростта на интернет връзката си
explanation: |
  MAC адресът служи като уникален хардуерен идентификатор за всеки мрежов интерфейс, което позволява физическото разграничаване на устройствата в локалната мрежа.
reviewed: false
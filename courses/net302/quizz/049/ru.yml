question: Какова основная функция MAC Address в локальной сети?
answer: Уникальная идентификация сети Interface
wrong_answers:
  - Трансляция доменного имени в IP Address
  - Динамическое назначение IP Address хосту
  - Определите скорость вашего интернет-соединения
explanation: |
  MAC Address служит уникальным аппаратным идентификатором для каждого сетевого Interface, позволяя физически различать устройства в локальной сети.
reviewed: false
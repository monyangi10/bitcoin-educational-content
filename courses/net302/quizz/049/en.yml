question: What is the main function of the MAC address in a local network?
answer: Uniquely identify a Interface network
wrong_answers:
  - Translate a domain name into an IP address
  - Dynamically assign an IP address to a host
  - Determine the speed of your Internet connection
explanation: |
  The MAC address serves as a unique hardware identifier for each Interface network, enabling devices to be physically distinguished on a local network.

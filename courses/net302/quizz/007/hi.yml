question: किस विश्वविद्यालय ऑपरेटिंग सिस्टम ने शैक्षणिक जगत में टीसीपी/आईपी प्रोटोकॉल के प्रसार को सुगम बनाया?
answer: बीएसडी यूनिक्स
wrong_answers:
  - लिनक्स
  - सोलारिस
  - मिनिक्स
explanation: |
  बर्कले विश्वविद्यालय द्वारा विकसित बीएसडी यूनिक्स, टीसीपी/आईपी प्रोटोकॉल को एकीकृत करने वाली पहली प्रणालियों में से एक थी और इसने उन्हें शैक्षणिक जगत में व्यापक रूप से फैलाने में मदद की।
reviewed: false
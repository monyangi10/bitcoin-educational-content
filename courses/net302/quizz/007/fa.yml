question: کدام سیستم‌عامل دانشگاهی به گسترش پروتکل‌های TCP/IP در دنیای آکادمیک کمک کرد؟
answer: یونیکس BSD
wrong_answers:
  - لینوکس
  - سولاریس
  - مینیکس
explanation: |
  یونیکس BSD، توسعه‌یافته توسط دانشگاه برکلی، یکی از اولین سیستم‌هایی بود که پروتکل‌های TCP/IP را یکپارچه‌سازی کرد و به گسترش وسیع آن‌ها در دنیای آکادمیک کمک کرد.
reviewed: false
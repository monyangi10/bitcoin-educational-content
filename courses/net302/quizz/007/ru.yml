question: Какая университетская операционная система способствовала распространению протоколов TCP/IP в академическом мире?
answer: BSD Unix
wrong_answers:
  - Linux
  - Solaris
  - Minix
explanation: |
  BSD Unix, разработанная в университете Беркли, была одной из первых систем, интегрировавших протоколы TCP/IP, и способствовала их широкому распространению в академическом мире.

question: ระบบปฏิบัติการของมหาวิทยาลัยใดที่ช่วยในการแพร่กระจายของโปรโตคอล TCP/IP ในโลกวิชาการ?
answer: BSD ยูนิกซ์
wrong_answers:
  - ลินุกซ์
  - โซลาริส
  - มินิกซ์
explanation: |
  BSD Unix, พัฒนาโดยมหาวิทยาลัยเบิร์กลีย์, เป็นหนึ่งในระบบแรกที่รวมโปรโตคอล TCP/IP และช่วยเผยแพร่อย่างกว้างขวางในวงการวิชาการ.
reviewed: false
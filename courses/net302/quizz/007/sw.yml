question: Ni mfumo gani wa uendeshaji wa chuo kikuu uliwezesha kuenea kwa protocol za TCP/IP katika ulimwengu wa kitaaluma?
answer: BSD Unix
wrong_answers:
  - Linux
  - Solaris
  - Minix
explanation: |
  BSD Unix, ilianzisha Chuo Kikuu cha Berkeley, ilikuwa mojawapo ya mifumo ya kwanza ya kuunganisha protocol za TCP/IP na ilisaidia kuzieneza sana katika ulimwengu wa kitaaluma.
reviewed: true

question: Коя университетска операционна система улесни разпространението на протоколите TCP/IP в академичния свят?
answer: BSD Unix
wrong_answers:
  - Linux
  - Solaris
  - Minix
explanation: |
  BSD Unix, разработена в университета Бъркли, е една от първите системи, които интегрират протоколите TCP/IP и спомага за широкото им разпространение в академичния свят.
reviewed: false
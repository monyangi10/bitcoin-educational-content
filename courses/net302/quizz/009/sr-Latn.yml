question: Koja američka agencija je stajala iza projekta ARPANET?
answer: ARPA
wrong_answers:
  - ARPAN
  - IETF
  - AETF
explanation: |
  ARPA (Advanced Research Projects Agency) inicirala je ARPANET, koji je postavio temelje za razvoj TCP/IP protokola. Godine 1972, agencija je preimenovana u DARPA (Defense Advanced Research Projects Agency).

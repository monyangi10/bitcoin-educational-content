question: ARPANET परियोजना के पीछे कौन सी अमेरिकी एजेंसी थी?
answer: एआरपीए
wrong_answers:
  - अर्पण
  - आईईटीएफ
  - एईटीएफ
explanation: |
  ARPA (एडवांस्ड रिसर्च प्रोजेक्ट्स एजेंसी) ने ARPANET की शुरुआत की, जिसने TCP/IP प्रोटोकॉल के विकास की नींव रखी। 1972 में, एजेंसी का नाम बदलकर DARPA (डिफेंस एडवांस्ड रिसर्च प्रोजेक्ट्स एजेंसी) कर दिया गया।
reviewed: false
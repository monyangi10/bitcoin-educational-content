question: کدام آژانس ایالات متحده پشت پروژه ARPANET بود؟
answer: آرپا
wrong_answers:
  - آرپان
  - IETF
  - AETF
explanation: |
  آژانس پروژه‌های تحقیقاتی پیشرفته (ARPA) شبکه ARPANET را آغاز کرد که پایه‌گذار توسعه پروتکل TCP/IP بود. در سال 1972، نام این آژانس به DARPA (آژانس پروژه‌های تحقیقاتی پیشرفته دفاعی) تغییر یافت.
reviewed: false
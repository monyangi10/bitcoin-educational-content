question: कौन सा प्रोटोकॉल स्वचालित रूप से वितरित IPv6 पतों को गतिशील रूप से जीवनकाल प्रदान करता है?
answer: डीएचसीपीवी6
wrong_answers:
  - ओएसपीएफवी3
  - आरआईपीएनजी
  - आईसीएमपीवी4
explanation: |
  DHCPv6 स्पष्ट रूप से लीज़ के माध्यम से जीवनकाल का प्रबंधन करता है, जबकि NDP अपने राउटर कॉन्फ़िगरेशन संदेशों में इसकी घोषणा करता है।
reviewed: false
question: کدام پروتکل به صورت پویا طول عمر را به آدرس‌های IPv6 که به طور خودکار توزیع شده‌اند اختصاص می‌دهد؟
answer: DHCPv6
wrong_answers:
  - OSPFv3
  - RIPng
  - ICMPv4
explanation: |
  ‏DHCPv6 به‌طور صریح زمان‌های اجاره را مدیریت می‌کند، در حالی که NDP آن‌ها را در پیام‌های پیکربندی روتر اعلام می‌کند.
reviewed: false
question: Какой протокол динамически назначает время жизни автоматически распределяемым адресам IPv6?
answer: DHCPv6
wrong_answers:
  - OSPFv3
  - RIPng
  - ICMPv4
explanation: |
  DHCPv6 явно управляет временем жизни через аренду, в то время как NDP объявляет его в сообщениях конфигурации маршрутизатора.
reviewed: false
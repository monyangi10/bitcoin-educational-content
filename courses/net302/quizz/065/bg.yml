question: Кой протокол динамично задава време на живот на автоматично разпределените IPv6 адреси?
answer: DHCPv6
wrong_answers:
  - OSPFv3
  - RIPng
  - ICMPv4
explanation: |
  DHCPv6 изрично управлява времето на живот чрез наемане, докато NDP го обявява в съобщенията за конфигурация на маршрутизатора.
reviewed: false
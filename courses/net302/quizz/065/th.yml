question: โปรโตคอลใดที่กำหนดอายุการใช้งานให้กับที่อยู่ IPv6 ที่แจกจ่ายโดยอัตโนมัติอย่างไดนามิก?
answer: DHCPv6
wrong_answers:
  - OSPFv3
  - RIPng
  - ICMPv4
explanation: |
  DHCPv6 จัดการอายุการใช้งานอย่างชัดเจนผ่านการเช่า ในขณะที่ NDP ประกาศอายุการใช้งานในข้อความการกำหนดค่าของเราเตอร์
reviewed: false
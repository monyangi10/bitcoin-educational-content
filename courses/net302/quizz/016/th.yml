question: โปรโตคอล IP จะทำการแบ่งข้อมูลออกเป็นชิ้นเล็ก ๆ หรือที่เรียกว่า "fragmentation" หาก datagram มีขนาดเกินกว่า MTU ของเครือข่ายที่มันผ่านไป
answer: เขาแยกมันออกเป็นหลายชิ้น
wrong_answers:
  - มันเข้ารหัสดาต้าแกรมทั้งหมดก่อนส่ง
  - มันปฏิเสธเสมอและส่งข้อความแสดงข้อผิดพลาด
  - เขาบีบอัดมันก่อนส่ง
explanation: |
  หากขนาดของดาต้าแกรมเกินกว่า MTU เราเตอร์จะทำการแบ่งมันออกเป็นแพ็กเก็ตขนาดเล็กหลายๆ แพ็กเก็ตที่พอดีกับเครือข่ายเป้าหมาย
reviewed: false
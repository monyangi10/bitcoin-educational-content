question: यदि कोई डेटाग्राम उस नेटवर्क के MTU से अधिक हो जाता है जिससे वह गुजरता है तो IP प्रोटोकॉल क्या करता है?
answer: वह इसे कई टुकड़ों में विभाजित करता है
wrong_answers:
  - यह भेजने से पहले संपूर्ण डेटाग्राम को एन्क्रिप्ट करता है
  - यह हमेशा इसे अस्वीकार कर देता है और एक त्रुटि संदेश भेजता है
  - वह संचारण से पहले इसे संपीड़ित करता है
explanation: |
  यदि डेटाग्राम का आकार MTU से अधिक हो जाता है, तो राउटर उसे कई छोटे पैकेटों में विभाजित कर देता है, जो लक्ष्य नेटवर्क में फिट हो जाते हैं।
reviewed: false
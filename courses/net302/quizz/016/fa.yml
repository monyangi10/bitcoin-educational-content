question: اگر یک دیتاگرام از MTU شبکه‌ای که از آن عبور می‌کند بزرگ‌تر باشد، پروتکل IP آن را به قطعات کوچکتر تقسیم می‌کند تا با MTU شبکه سازگار شود.
answer: او آن را به چندین قطعه تقسیم می‌کند
wrong_answers:
  - قبل از ارسال، کل دیتاگرام را رمزگذاری می‌کند.
  - همیشه آن را رد می‌کند و یک پیام خطا ارسال می‌کند.
  - او آن را قبل از ارسال فشرده می‌کند
explanation: |
  اگر اندازه دیتاگرام از MTU بیشتر شود، روتر آن را به چند بسته کوچکتر تقسیم می‌کند که در شبکه هدف جا شوند.
reviewed: false
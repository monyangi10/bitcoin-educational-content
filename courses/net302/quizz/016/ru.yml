question: Что делает протокол IP, если дейтаграмма превышает MTU сети, через которую она проходит?
answer: Он разбивает его на несколько частей
wrong_answers:
  - Он шифрует всю дейтаграмму перед отправкой
  - Он всегда отклоняет его и отправляет сообщение об ошибке
  - Он сжимает его перед передачей
explanation: |
  Если размер дейтаграммы превышает MTU, маршрутизатор фрагментирует ее на несколько меньших пакетов, подходящих для целевой сети.
reviewed: false
question: Itifaki ya IP hufanya nini ikiwa datagramu inazidi MTU ya mtandao unaopitia?
answer: Anaigawanya katika vipande kadhaa
wrong_answers:
  - Inasimba datagramu nzima kabla ya kutuma
  - Daima huikataa na kutuma ujumbe wa hitilafu
  - Anaibana kabla ya kusambaza
explanation: |
  Ikiwa saizi ya datagramu inazidi MTU, kipanga njia huigawanya katika pakiti kadhaa ndogo zinazolingana na mtandao unaolengwa.

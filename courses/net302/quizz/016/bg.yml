question: Какво прави IP протоколът, ако дадена дейтаграма надхвърли MTU на мрежата, през която преминава?
answer: Той го разделя на няколко части
wrong_answers:
  - Тя криптира цялата дейтаграма преди изпращане
  - Тя винаги го отхвърля и изпраща съобщение за грешка
  - Той го компресира, преди да го предаде
explanation: |
  Ако размерът на дейтаграмата надхвърля MTU, маршрутизаторът я фрагментира на няколко по-малки пакета, които са подходящи за целевата мрежа.
reviewed: false
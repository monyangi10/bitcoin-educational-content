question: Koja je glavna uloga IPv4 adrese u računarskoj mreži?
answer: Jedinstveno identifikovati mrežni interfejs
wrong_answers:
  - Identifikovanje uređaja na mreži
  - Dinamička dodela MAC adrese na mreži
  - Generisanje DNS imena
explanation: |
  IPv4 adresa se dodeljuje svakom mrežnom interfejsu uređaja, omogućavajući njegovo lociranje i pristupanje na mrežu.
reviewed: true

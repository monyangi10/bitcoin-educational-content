question: Quel est le rôle principal d’une adresse IPv4 dans un réseau informatique ?
answer: Identifier une interface réseau de manière unique
wrong_answers:
  - Identifier l’appareil dans son ensemble sur un réseau
  - Attribuer dynamiquement les adresses MAC sur un réseau
  - Générer des noms DNS
explanation: |
  Une adresse IPv4 est assignée à chaque interface réseau d’un équipement et permet de la localiser et de l’atteindre sur le réseau.
reviewed: true 

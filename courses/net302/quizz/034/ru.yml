question: Какова основная роль IPv4 Address в компьютерной сети?
answer: Уникальная идентификация сети Interface
wrong_answers:
  - Идентификация всего устройства в сети
  - Динамическое назначение MAC-адресов в сети
  - Имена DNS generate
explanation: |
  Каждому сетевому Interface устройства присваивается IPv4 Address, что позволяет определять его местоположение и доступ к нему в сети.

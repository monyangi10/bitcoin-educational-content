question: कंप्यूटर नेटवर्क में IPv4 Address की मुख्य भूमिका क्या है?
answer: किसी नेटवर्क की विशिष्ट पहचान करें Interface
wrong_answers:
  - नेटवर्क पर संपूर्ण डिवाइस की पहचान करें
  - नेटवर्क पर गतिशील रूप से MAC पते निर्दिष्ट करें
  - generate DNS नाम
explanation: |
  किसी डिवाइस के प्रत्येक नेटवर्क Interface को एक IPv4 Address प्रदान किया जाता है, जिससे उसे नेटवर्क पर स्थित किया जा सकता है और उस तक पहुंचा जा सकता है।

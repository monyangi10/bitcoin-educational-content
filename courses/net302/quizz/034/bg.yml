question: Каква е основната роля на IPv4 адреса в компютърната мрежа?
answer: Уникално идентифициране на мрежов интерфейс
wrong_answers:
  - Идентифициране на цялото устройство в мрежата
  - Динамично присвояване на MAC адреси в мрежа
  - Генериране на имена на DNS
explanation: |
  На всеки мрежов интерфейс на дадено устройство се присвоява IPv4 адрес, който му позволява да бъде локализирано и достигнато в мрежата.
reviewed: false
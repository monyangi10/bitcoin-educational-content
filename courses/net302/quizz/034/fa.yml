question: نقش اصلی یک IPv4 Address در یک شبکه کامپیوتری چیست؟
answer: به‌طور منحصر به فرد یک شبکه Interface را شناسایی کنید
wrong_answers:
  - شناسایی کل دستگاه در یک شبکه
  - به‌طور پویا آدرس‌های MAC را در یک شبکه اختصاص دهید.
  - نام‌های DNS generate
explanation: |
  به هر شبکه Interface یک IPv4 Address اختصاص داده می‌شود که به دستگاه امکان می‌دهد در شبکه پیدا شده و به آن دسترسی پیدا کند.
reviewed: false
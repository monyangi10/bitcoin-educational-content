question: บทบาทหลักของที่อยู่ IPv4 ในเครือข่ายคอมพิวเตอร์คืออะไร?
answer: ระบุอินเทอร์เฟซเครือข่ายอย่างเฉพาะเจาะจง
wrong_answers:
  - ระบุอุปกรณ์ทั้งหมดบนเครือข่าย
  - กำหนดที่อยู่ MAC บนเครือข่ายแบบไดนามิก
  - สร้างชื่อ DNS
explanation: |
  ที่อยู่ IPv4 ถูกกำหนดให้กับแต่ละอินเทอร์เฟซเครือข่ายของอุปกรณ์ ทำให้สามารถระบุตำแหน่งและเข้าถึงได้บนเครือข่าย
reviewed: false
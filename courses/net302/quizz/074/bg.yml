question: Коя организация управлява първоначалното разпределение на блокове IPv6 адреси в световен мащаб?
answer: IANA
wrong_answers:
  - NIST
  - RIPE NCC
  - ARIN
explanation: |
  IANA стои на върха на йерархията на разпределение, като делегира IPv6 блокове на петте регионални интернет регистъра (RIR).
reviewed: false
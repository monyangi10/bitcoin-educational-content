question: Какая организация управляет первоначальным распределением блоков IPv6 Address по всему миру?
answer: IANA
wrong_answers:
  - NIST
  - RIPE NCC
  - АРИН
explanation: |
  IANA находится на вершине иерархии распределения, делегируя блоки IPv6 пяти региональным интернет-регистратурам (RIR).
reviewed: false
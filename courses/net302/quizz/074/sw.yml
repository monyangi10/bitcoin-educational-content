question: Ni shirika gani linalodhibiti ugawaji wa awali wa vitalu vya IPv6 Address duniani kote?
answer: IANA
wrong_answers:
  - NIST
  - MBIVU NCC
  - ARIN
explanation: |
  IANA iko juu ya daraja la ugawaji, ikikabidhi vizuizi vya IPv6 kwa Rejesta tano za Kikanda za Mtandao (RIRs).
reviewed: false
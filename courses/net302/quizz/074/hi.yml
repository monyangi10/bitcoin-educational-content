question: कौन सा संगठन दुनिया भर में IPv6 Address ब्लॉकों के प्रारंभिक आवंटन का प्रबंधन करता है?
answer: आईएएनए
wrong_answers:
  - एनआईएसटी
  - RIPE NCC
  - एरिन
explanation: |
  IANA आवंटन पदानुक्रम में शीर्ष पर है, जो IPv6 ब्लॉकों को पांच क्षेत्रीय इंटरनेट रजिस्ट्री (RIR) को सौंपता है।
reviewed: false
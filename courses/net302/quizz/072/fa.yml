question: چه نوع بلوک IPv6 به یک شرکت اجازه می‌دهد تا حتی هنگام تغییر ISP پیشوند خود را حفظ کند؟
answer: PI (مستقل از ارائه‌دهنده)
wrong_answers:
  - PA (قابل تجمیع توسط ارائه‌دهنده)
  - LIR (ثبت‌نام محلی اینترنت)
  - ارائه‌دهنده قابل تعویض (IP)
explanation: |
  یک بلوک PI (مستقل از ارائه‌دهنده) مستقیماً توسط یک RIR به یک سازمان تخصیص داده می‌شود، به‌طور مستقل از ارائه‌دهنده خدمات اینترنت.
reviewed: false
question: Кой тип IPv6 блок позволява на компанията да запази своя префикс дори при смяна на доставчика на интернет услуги?
answer: PI (независим доставчик)
wrong_answers:
  - PA (агрегируем доставчик)
  - LIR (местен интернет регистър)
  - IP (взаимозаменяем доставчик)
explanation: |
  Блокът PI (Provider Independent) се разпределя директно на дадена организация от RIR, независимо от доставчика на интернет услуги.
reviewed: false
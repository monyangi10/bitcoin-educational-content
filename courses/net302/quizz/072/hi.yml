question: किस प्रकार का IPv6 ब्लॉक किसी कंपनी को ISP बदलने पर भी अपना प्रीफ़िक्स बनाए रखने की अनुमति देता है?
answer: पीआई (प्रदाता स्वतंत्र)
wrong_answers:
  - पीए (प्रदाता एग्रीगेटेबल)
  - एलआईआर (स्थानीय इंटरनेट रजिस्ट्री)
  - आईपी ​​(विनिमेय प्रदाता)
explanation: |
  एक PI (प्रदाता स्वतंत्र) ब्लॉक, इंटरनेट सेवा प्रदाता से स्वतंत्र होकर, RIR द्वारा किसी संगठन को सीधे आवंटित किया जाता है।
reviewed: false
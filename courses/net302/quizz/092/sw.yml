question: Je, server za DNS husanidiwa wapi kwenye mfumo wa Linux?
answer: /etc/resolv.conf
wrong_answers:
  - /etc/jina la mwenyeji
  - /etc/network/interfaces
  - /etc/hosts.ruhusu
explanation: |
  Faili ya /etc/resolv.conf inabainisha server za DNS na domain ya utafutaji kwa utatuzi wa jina.
reviewed: false

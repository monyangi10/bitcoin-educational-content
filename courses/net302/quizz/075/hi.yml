question: IPv6 Address से संबद्ध नाम खोजने के लिए किस प्रकार के DNS रिकॉर्ड का उपयोग किया जाता है?
answer: पीटीआर
wrong_answers:
  - एएएए
  - एमएक्स
  - एसओए
explanation: |
  पीटीआर (पॉइंटर रिकॉर्ड) रिवर्स रिज़ॉल्यूशन को सक्षम करता है, जिसका अर्थ है कि यह एक आईपीवी6 जीडब्ल्यू-1 को डोमेन नाम से जोड़ता है।
reviewed: false
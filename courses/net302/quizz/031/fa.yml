question: کدام محدوده IPv4 Address برای تست لوپ‌بک محلی رزرو شده است؟
answer: ۱۲۷.۰.۰.۰/۸
wrong_answers:
  - ۱۰.۰.۰.۰/۸
  - ۱۷۲.۱۶.۰.۰/۱۲
  - ۱۹۲.۱۶۸.۰.۰/۱۶
explanation: |
  محدوده 127.0.0.0/8 برای بازگشت محلی استفاده می‌شود. هر درخواستی به این محدوده در داخل ماشین مبدأ باقی می‌ماند.
reviewed: false
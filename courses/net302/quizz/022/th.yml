question: วัตถุประสงค์ของ "ACK" flag ใน TCP segment คืออะไร?
answer: เพื่อรับทราบการรับส่วนต่าง ๆ
wrong_answers:
  - เพื่อเริ่มต้นการปิดการเชื่อมต่อ
  - เพื่อเข้ารหัสการไหลของข้อมูลที่แลกเปลี่ยน
  - เพื่อระบุพอร์ตบริการที่ใช้
explanation: |
  เมื่อถูกตั้งค่า ธง ACK ยืนยันว่าเซ็กเมนต์ได้รับสำเร็จและระบุหมายเลขลำดับถัดไปที่คาดหวัง
reviewed: false
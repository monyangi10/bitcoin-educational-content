question: هدف از پرچم "ACK" در یک بخش TCP چیست؟
answer: برای تأیید دریافت بخش‌ها
wrong_answers:
  - برای شروع بستن اتصال
  - برای رمزگذاری جریان داده‌های مبادله شده
  - برای شناسایی پورت سرویس استفاده شده
explanation: |
  هنگامی که تنظیم می‌شود، پرچم ACK تأیید می‌کند که یک بخش با موفقیت دریافت شده و شماره توالی بعدی مورد انتظار را مشخص می‌کند.
reviewed: false
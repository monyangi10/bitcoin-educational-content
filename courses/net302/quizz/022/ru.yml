question: Каково назначение флага "ACK" в сегменте TCP?
answer: Подтверждение получения сегментов
wrong_answers:
  - Чтобы инициировать закрытие соединения
  - Для шифрования потока обмениваемых данных
  - Чтобы определить используемый служебный порт
explanation: |
  Если флаг ACK установлен, он подтверждает, что сегмент был успешно получен, и указывает следующий ожидаемый номер последовательности.
reviewed: false
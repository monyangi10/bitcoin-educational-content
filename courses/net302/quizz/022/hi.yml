question: TCP सेगमेंट में "ACK" ध्वज का उद्देश्य क्या है?
answer: खंडों की प्राप्ति की पुष्टि करने के लिए
wrong_answers:
  - कनेक्शन बंद करने के लिए
  - आदान-प्रदान किए गए डेटा प्रवाह को एन्क्रिप्ट करने के लिए
  - उपयोग किए गए सेवा पोर्ट की पहचान करने के लिए
explanation: |
  जब सेट किया जाता है, तो ACK ध्वज पुष्टि करता है कि खंड सफलतापूर्वक प्राप्त हो गया है और अगली अपेक्षित अनुक्रम संख्या निर्दिष्ट करता है।
reviewed: false
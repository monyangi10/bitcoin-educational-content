question: Каква е целта на флага "ACK" в TCP сегмент?
answer: Потвърждаване на получаването на сегменти
wrong_answers:
  - Иницииране на затваряне на връзката
  - Криптиране на обменения поток от данни
  - Идентифициране на използвания порт за услуги
explanation: |
  Когато е зададен, флагът ACK потвърждава, че сегментът е получен успешно, и посочва следващия очакван пореден номер.
reviewed: false
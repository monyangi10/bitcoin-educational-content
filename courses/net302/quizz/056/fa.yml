question: هدف اصلی از شبکه‌بندی (Network Bonding) چیست؟
answer: تجمیع چندین رابط شبکه فیزیکی
wrong_answers:
  - افزودن آدرس‌های IP مجازی به شبکه محلی
  - ایجاد یک پل Wi-Fi
  - کاهش اندازه بسته در کابل RJ45
explanation: |
  اتصال شبکه‌ای چندین رابط فیزیکی را به یک رابط منطقی واحد ترکیب می‌کند و افزونگی یا پهنای باند افزایش‌یافته را فراهم می‌آورد.
reviewed: false
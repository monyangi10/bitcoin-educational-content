question: Какова основная цель объединения сетей?
answer: Агрегирование нескольких физических сетевых интерфейсов
wrong_answers:
  - Добавьте виртуальные IP-адреса в локальную сеть
  - Создание моста Wi-Fi
  - Уменьшение размера пакетов в кабеле RJ45
explanation: |
  Сетевое соединение объединяет несколько физических интерфейсов в один логический, обеспечивая резервирование или увеличение пропускной способности.
reviewed: false
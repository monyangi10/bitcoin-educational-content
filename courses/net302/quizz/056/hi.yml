question: नेटवर्क बॉन्डिंग का मुख्य उद्देश्य क्या है?
answer: एकाधिक भौतिक नेटवर्क इंटरफेस को एकत्रित करें
wrong_answers:
  - स्थानीय नेटवर्क में वर्चुअल IP पते जोड़ें
  - वाई-फाई ब्रिज बनाना
  - RJ45 केबल पर पैकेट का आकार कम करें
explanation: |
  नेटवर्क बॉन्डिंग कई भौतिक इंटरफेस को एक तार्किक इंटरफेस में संयोजित करती है, जिससे अतिरेक या बढ़ी हुई बैंडविड्थ मिलती है।

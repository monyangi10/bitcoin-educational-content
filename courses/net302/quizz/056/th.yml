question: วัตถุประสงค์หลักของการทำ Network Bonding คืออะไร?
answer: รวมหลายอินเทอร์เฟซเครือข่ายทางกายภาพ
wrong_answers:
  - เพิ่มที่อยู่ IP เสมือนในเครือข่ายท้องถิ่น
  - การสร้างสะพานเชื่อมต่อ Wi-Fi
  - ลดขนาดแพ็กเก็ตบนสาย RJ45
explanation: |
  การเชื่อมโยงเครือข่ายรวมอินเทอร์เฟซทางกายภาพหลายตัวเข้าด้วยกันเป็นอินเทอร์เฟซเชิงตรรกะเดียว เพื่อให้มีความซ้ำซ้อนหรือเพิ่มแบนด์วิดท์
reviewed: false
question: Каква е основната цел на свързването на мрежи?
answer: Агрегиране на множество физически мрежови интерфейси
wrong_answers:
  - Добавяне на виртуални IP адреси към локалната мрежа
  - Създаване на мост за Wi-Fi
  - Намаляване на размера на пакетите за кабел RJ45
explanation: |
  Мрежовото свързване комбинира няколко физически интерфейса в един логически, като осигурява резервираност или по-голяма широчина на честотната лента.

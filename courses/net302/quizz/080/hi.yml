question: कैप्चर किए गए नेटवर्क पैकेटों का विस्तृत शैक्षिक विश्लेषण प्रदान करने के लिए किस ग्राफिक्स सॉफ्टवेयर का उपयोग किया जा सकता है?
answer: वायरशार्क
wrong_answers:
  - इफकॉन्फिग
  - ट्रेसरूट
  - मार्ग
explanation: |
  वायरशार्क कैप्चर किए गए नेटवर्क ट्रैफ़िक की गहन जांच के लिए एक ग्राफिकल पैकेट विश्लेषक है।
reviewed: false
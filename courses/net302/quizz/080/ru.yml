question: Какое графическое программное обеспечение можно использовать для детального образовательного анализа захваченных сетевых пакетов?
answer: Wireshark
wrong_answers:
  - Ifconfig
  - Traceroute
  - Маршрут
explanation: |
  Wireshark - это графический анализатор пакетов для глубокого изучения захваченного сетевого трафика.
reviewed: false
question: ซอฟต์แวร์กราฟิกใดบ้างที่สามารถใช้ในการวิเคราะห์เชิงการศึกษาที่ละเอียดของแพ็กเก็ตเครือข่ายที่จับได้?
answer: Wireshark
wrong_answers:
  - Ifconfig
  - การติดตามเส้นทาง
  - เส้นทาง
explanation: |
  Wireshark เป็นเครื่องมือวิเคราะห์แพ็กเก็ตแบบกราฟิกสำหรับการตรวจสอบเชิงลึกของทราฟฟิกเครือข่ายที่จับได้
reviewed: false
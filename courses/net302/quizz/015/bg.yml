question: Какъв е максималният теоретичен размер на една IP дейтаграма?
answer: 65 536 байта
wrong_answers:
  - 1 500 байта
  - 512 байта
  - 255 байта
explanation: |
  Максималният размер на една IP дейтаграма е 65 536 байта, определен от ограничението на полето за обща дължина в IP заглавието.
reviewed: false
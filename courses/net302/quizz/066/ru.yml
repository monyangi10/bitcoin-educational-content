question: Какие два времени жизни связаны с автоматически назначенным IPv6 Address?
answer: Предпочтительный срок службы и действительный срок службы
wrong_answers:
  - Время аренды и время удержания
  - Время жизни и истечение срока действия
  - Первоначальное время жизни и вторичное время жизни
explanation: |
  Предпочтительный срок службы определяет период нормального использования Address, а действительный срок службы - общий срок действия.
reviewed: false
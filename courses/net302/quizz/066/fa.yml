question: دو طول عمر مرتبط با یک IPv6 Address که به‌طور خودکار اختصاص داده شده است چیست؟
answer: عمر ترجیحی و عمر معتبر
wrong_answers:
  - زمان اجاره و زمان نگهداری
  - زمان حیات و انقضا
  - عمر اولیه و عمر ثانویه
explanation: |
  عمر ترجیحی دوره استفاده عادی از Address و عمر معتبر دوره کلی اعتبار آن را تعیین می‌کند.
reviewed: false
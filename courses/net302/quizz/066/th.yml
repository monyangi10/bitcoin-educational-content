question: อายุการใช้งานสองประเภทที่เกี่ยวข้องกับที่อยู่ IPv6 ที่กำหนดโดยอัตโนมัติคืออะไร?
answer: อายุการใช้งานที่ต้องการและอายุการใช้งานที่ถูกต้อง
wrong_answers:
  - เวลาเช่าและเวลาเก็บรักษา
  - เวลาในการมีชีวิตและการหมดอายุ
  - อายุการใช้งานเริ่มต้นและอายุการใช้งานรอง
explanation: |
  ระยะเวลาที่ต้องการกำหนดช่วงเวลาการใช้งานปกติของที่อยู่และอายุการใช้งานที่ถูกต้องคือช่วงเวลาทั้งหมดของความถูกต้อง
reviewed: false
question: स्वचालित रूप से निर्दिष्ट IPv6 Address से जुड़े दो जीवनकाल क्या हैं?
answer: पसंदीदा जीवनकाल और वैध जीवनकाल
wrong_answers:
  - पट्टे का समय और धारण समय
  - जीवन-काल और समाप्ति
  - प्रारंभिक जीवनकाल और द्वितीयक जीवनकाल
explanation: |
  पसंदीदा जीवनकाल Address के सामान्य उपयोग की अवधि निर्धारित करता है, तथा वैध जीवनकाल इसकी वैधता की कुल अवधि निर्धारित करता है।
reviewed: false
question: Кои са двете времена на живот, свързани с автоматично присвоен IPv6 адрес?
answer: Предпочитан срок на експлоатация и валиден срок на експлоатация
wrong_answers:
  - Време за отдаване под наем и време за задържане
  - Време на живот и изтичане на срока
  - Първоначална продължителност на живота и вторична продължителност на живота
explanation: |
  Предпочитаният срок на експлоатация определя периода на нормално използване на адреса, а валидният срок на експлоатация - общия период на валидност.
reviewed: false
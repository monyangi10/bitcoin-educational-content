question: Каква нотация се използва за въвеждане на IPv6 адрес в URL?
answer: IPv6 адресът е затворен в квадратни скоби
wrong_answers:
  - IPv6 адресът е затворен в скоби
  - IPv6 адресът е поставен в кавички
  - IPv6 адресът се записва в суров вид
explanation: |
  Квадратните скоби се използват за разграничаване на IPv6 адреса от порта в URL адреса, за да се избегне двусмислие.
reviewed: false
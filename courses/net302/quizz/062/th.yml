question: ใช้สัญลักษณ์ใดในการแทรกที่อยู่ IPv6 ใน URL?
answer: ที่อยู่ IPv6 ถูกปิดล้อมในวงเล็บสี่เหลี่ยม
wrong_answers:
  - ที่อยู่ IPv6 ถูกปิดล้อมในวงเล็บ
  - ที่อยู่ IPv6 ถูกปิดล้อมด้วยเครื่องหมายคำพูด
  - ที่อยู่ IPv6 ถูกเขียนในรูปแบบดิบ
explanation: |
  ใช้วงเล็บเหลี่ยมเพื่อแยกที่อยู่ IPv6 ออกจากพอร์ตใน URL เพื่อหลีกเลี่ยงความคลุมเครือใดๆ
reviewed: false
question: В чем основная разница между публичным IPv4 Address и частным IPv4 Address?
answer: Публичный Address уникален и доступен для маршрутизации в Интернете
wrong_answers:
  - Частный Address является уникальным и маршрутизируемым в Интернете
  - Публичный Address всегда назначается по DHCP
  - Частный Address всегда назначается по DHCP
explanation: |
  Публичный IPv4 Address является глобально уникальным и маршрутизируемым в Интернете, в то время как частный Address действителен только в пределах локальной сети.

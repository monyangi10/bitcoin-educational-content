question: Каква е основната разлика между публичен IPv4 адрес и частен IPv4 адрес?
answer: Публичният адрес е уникален и може да бъде маршрутизиран в интернет
wrong_answers:
  - Частният адрес е уникален и може да бъде маршрутизиран в интернет
  - Публичният адрес винаги се задава от DHCP
  - Частният адрес винаги се задава от DHCP
explanation: |
  Публичният IPv4 адрес е глобално уникален и може да се маршрутизира в интернет, докато частният адрес е валиден само в рамките на локалната мрежа.
reviewed: false
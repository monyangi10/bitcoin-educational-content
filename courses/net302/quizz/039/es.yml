question: ¿Cuál es la principal diferencia entre una dirección IPv4 pública y una dirección IPv4 privada?
answer: Una dirección pública es única y enrutable en internet
wrong_answers:
  - Una dirección privada es única y enrutable en internet
  - Una dirección pública siempre se asigna mediante DHCP
  - Una dirección privada siempre se asigna mediante DHCP
explanation: |
  Una dirección IPv4 pública es única a nivel mundial y enrutable en internet, mientras que una dirección privada sólo es válida dentro de una red local.
reviewed: true
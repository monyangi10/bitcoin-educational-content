question: ¿Cuál es la principal diferencia entre una IPv4 Address pública y una IPv4 Address privada?
answer: Una Address pública es única y enrutable en Internet
wrong_answers:
  - Una Address privada es única y enrutable en Internet
  - Una Address pública siempre se asigna mediante DHCP
  - Un Address privado siempre se asigna mediante DHCP
explanation: |
  Una Address IPv4 pública es única a nivel mundial y enrutable en Internet, mientras que una Address privada sólo es válida dentro de una red local.

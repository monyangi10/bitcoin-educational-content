question: ความแตกต่างหลักระหว่างที่อยู่ IPv4 สาธารณะและที่อยู่ IPv4 ส่วนตัวคืออะไร?
answer: ที่อยู่สาธารณะมีความเฉพาะตัวและสามารถกำหนดเส้นทางบนอินเทอร์เน็ตได้
wrong_answers:
  - ที่อยู่ส่วนตัวมีความเฉพาะตัวและสามารถกำหนดเส้นทางบนอินเทอร์เน็ตได้
  - ที่อยู่สาธารณะจะถูกกำหนดโดย DHCP เสมอ
  - ที่อยู่ส่วนตัวจะถูกกำหนดโดย DHCP เสมอ
explanation: |
  ที่อยู่ IPv4 สาธารณะมีความเป็นเอกลักษณ์ทั่วโลกและสามารถกำหนดเส้นทางบนอินเทอร์เน็ตได้ ในขณะที่ที่อยู่ส่วนตัวจะใช้ได้เฉพาะภายในเครือข่ายท้องถิ่นเท่านั้น
reviewed: false
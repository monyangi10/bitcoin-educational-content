question: تفاوت اصلی بین یک Address عمومی IPv4 و یک Address خصوصی IPv4 چیست؟
answer: یک Address عمومی در اینترنت منحصربه‌فرد و قابل مسیریابی است.
wrong_answers:
  - یک Address خصوصی منحصر به فرد و قابل مسیریابی در اینترنت است
  - یک Address عمومی همیشه توسط DHCP اختصاص داده می‌شود.
  - یک Address خصوصی همیشه توسط DHCP اختصاص داده می‌شود
explanation: |
  یک Address عمومی IPv4 به صورت جهانی منحصر به فرد و قابل مسیریابی در اینترنت است، در حالی که یک Address خصوصی فقط در یک شبکه محلی معتبر است.
reviewed: false
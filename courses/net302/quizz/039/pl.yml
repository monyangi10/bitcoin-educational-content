question: Jaka jest główna różnica między publicznym Address IPv4 a prywatnym Address IPv4?
answer: Publiczny Address jest unikalny i routowalny w Internecie
wrong_answers:
  - Prywatny Address jest unikalny i routowalny w Internecie
  - Publiczny Address jest zawsze przypisywany przez DHCP
  - Prywatny Address jest zawsze przypisywany przez DHCP
explanation: |
  Publiczny Address IPv4 jest globalnie unikalny i routowalny w Internecie, podczas gdy prywatny Address jest ważny tylko w sieci lokalnej.

question: सार्वजनिक IPv4 Address और निजी IPv4 Address के बीच मुख्य अंतर क्या है?
answer: एक सार्वजनिक Address अद्वितीय है और इंटरनेट पर रूट करने योग्य है
wrong_answers:
  - एक निजी Address अद्वितीय है और इंटरनेट पर रूट करने योग्य है
  - एक सार्वजनिक Address हमेशा DHCP द्वारा असाइन किया जाता है
  - एक निजी Address हमेशा DHCP द्वारा असाइन किया जाता है
explanation: |
  सार्वजनिक IPv4 Address वैश्विक स्तर पर अद्वितीय है और इंटरनेट पर रूट करने योग्य है, जबकि निजी Address केवल स्थानीय नेटवर्क के भीतर ही मान्य है।
reviewed: false
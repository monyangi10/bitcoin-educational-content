question: Ni mbinu gani huruhusu mashine nyingi za ndani kushiriki IP moja ya umma Address kufikia Mtandao?
answer: NAT (Tafsiri ya Mtandao wa Address)
wrong_answers:
  - ARP (Address Resolution Protocol)
  - DHCP (Dynamic Host Configuration Protocol)
  - CIDR (Classless Inter-Domain Routing)
explanation: |
  NAT hutafsiri anwani za ndani za kibinafsi kuwa IP ya umma Address, kuwezesha vifaa vingi kushiriki muunganisho sawa wa nje.
reviewed: true

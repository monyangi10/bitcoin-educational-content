question: What technique enables several internal machines to use a single public IP address to access the Internet?
answer: NAT (Network Address Translation)
wrong_answers:
  - ARP (Address Resolution Protocol)
  - DHCP (Dynamic Host Configuration Protocol)
  - CIDR (Classless Inter-Domain Routing)
explanation: |
  NAT translates internal private addresses into a public IP address, enabling multiple devices to share the same external connection.

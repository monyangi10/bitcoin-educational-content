question: Какая техника позволяет нескольким внутренним компьютерам использовать один общедоступный IP Address для доступа в Интернет?
answer: NAT (трансляция сети Address)
wrong_answers:
  - ARP (протокол разрешения Address)
  - DHCP (протокол динамической конфигурации хоста)
  - CIDR (бесклассовая междоменная маршрутизация)
explanation: |
  NAT преобразует частные внутренние адреса в общедоступные IP Address, позволяя нескольким устройствам использовать одно внешнее соединение.
reviewed: false
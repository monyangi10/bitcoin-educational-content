question: کدام تکنیک به ماشین‌های داخلی متعدد اجازه می‌دهد تا یک آدرس IP عمومی Address را برای دسترسی به اینترنت به اشتراک بگذارند؟
answer: NAT (ترجمه شبکه Address)
wrong_answers:
  - پروتکل حل‌وفصل (Address) ARP
  - پروتکل پیکربندی پویای میزبان (DHCP)
  - CIDR (مسیر‌یابی بین‌دامنه‌ای بدون کلاس)
explanation: |
  NAT آدرس‌های داخلی خصوصی را به یک IP عمومی Address ترجمه می‌کند و به چندین دستگاه اجازه می‌دهد تا از یک اتصال خارجی مشترک استفاده کنند.
reviewed: false
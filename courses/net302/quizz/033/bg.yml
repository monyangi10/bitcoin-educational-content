question: Коя техника позволява на няколко вътрешни машини да споделят един публичен IP адрес за достъп до интернет?
answer: NAT (превод на мрежата Address)
wrong_answers:
  - ARP (протокол за резолюция Address)
  - DHCP (протокол за динамично конфигуриране на хостове)
  - CIDR (безкласово маршрутизиране между домейни)
explanation: |
  NAT преобразува частните вътрешни адреси в публични IP адреси, което позволява на няколко устройства да използват една и съща външна връзка.
reviewed: false
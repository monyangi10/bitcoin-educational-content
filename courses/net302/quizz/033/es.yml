question: ¿Qué técnica permite que varias máquinas internas compartan una única dirección IP pública para acceder a Internet?
answer: NAT (Traducción de direcciones de red)
wrong_answers:
  - ARP (Protocolo de resolución de direcciones)
  - DHCP (Protocolo de configuración dinámica de host)
  - CIDR (Enrutamiento entre dominios sin clases)
explanation: |
  NAT traduce las direcciones internas privadas en una dirección IP pública, lo que permite a varios dispositivos compartir la misma conexión externa.
reviewed: true
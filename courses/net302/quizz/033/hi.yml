question: कौन सी तकनीक कई आंतरिक मशीनों को इंटरनेट तक पहुंचने के लिए एक ही सार्वजनिक आईपी Address साझा करने की अनुमति देती है?
answer: NAT (नेटवर्क Address अनुवाद)
wrong_answers:
  - एआरपी (Address रिज़ॉल्यूशन प्रोटोकॉल)
  - DHCP (डायनामिक होस्ट कॉन्फ़िगरेशन प्रोटोकॉल)
  - CIDR (क्लासलेस इंटर-डोमेन रूटिंग)
explanation: |
  NAT निजी आंतरिक पतों को सार्वजनिक IP Address में परिवर्तित करता है, जिससे कई डिवाइस एक ही बाह्य कनेक्शन को साझा कर सकते हैं।
reviewed: false
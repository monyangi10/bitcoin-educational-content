question: 공격자가 대칭 암호화 체계로 암호화된 메시지를 가로채면 어떻게 될까요?
answer: 원래 메시지에 대해 중요한 내용을 알아서는 안 됩니다
wrong_answers:
  - 키 없이도 언제든지 메시지를 해독할 수 있습니다
  - 공개 키로 암호를 해독할 수 있어야 합니다
  - 메시지의 내용을 추측할 수 있어야 합니다
explanation: |
  잘 설계된 대칭 암호화 체계에서는 암호화된 메시지를 가로채는 공격자가 복호화 키 없이는 메시지 내용에 대한 관련 정보를 추론할 수 없어야 합니다.
reviewed: false
question: จะเกิดอะไรขึ้นหากผู้โจมตีดักข้อความที่เข้ารหัสในโครงร่างการเข้ารหัสแบบสมมาตรที่ดี?
answer: พวกเขาไม่ควรเรียนรู้อะไรที่สำคัญเกี่ยวกับข้อความต้นฉบับ
wrong_answers:
  - พวกเขาสามารถถอดรหัสข้อความได้เสมอโดยไม่ต้องใช้กุญแจ
  - พวกเขาควรจะสามารถถอดรหัสได้ด้วยกุญแจสาธารณะ
  - พวกเขาควรจะสามารถเดาเนื้อหาของข้อความได้
explanation: |
  ในโครงร่างการเข้ารหัสแบบสมมาตรที่ออกแบบมาอย่างดี ผู้โจมตีที่ดักข้อความที่เข้ารหัสไม่ควรจะสามารถสรุปข้อมูลที่เกี่ยวข้องเกี่ยวกับเนื้อหาของข้อความได้หากไม่มีคีย์ถอดรหัส
reviewed: false
question: अगर कोई हमलावर एक अच्छी सिमेट्रिक एन्क्रिप्शन स्कीम में एन्क्रिप्टेड मैसेज को इंटरसेप्ट कर लेता है, तो क्या होगा?
answer: उन्हें मूल संदेश के बारे में कुछ भी महत्वपूर्ण नहीं सीखना चाहिए
wrong_answers:
  - वे बिना कुंजी के हमेशा संदेश को डिक्रिप्ट कर सकते हैं
  - उन्हें इसे पब्लिक की से डिक्रिप्ट करने में सक्षम होना चाहिए
  - उन्हें संदेश की सामग्री का अंदाज़ा लगाना चाहिए
explanation: |
  एक अच्छी तरह से डिज़ाइन की गई सिमेट्रिक एन्क्रिप्शन योजना में, अगर कोई हमलावर एन्क्रिप्टेड मैसेज को इंटरसेप्ट कर लेता है, तो वह डिक्रिप्शन की (बिना चाबी के) मैसेज के कंटेंट के बारे में कोई जरूरी जानकारी नहीं निकाल पाएगा।
reviewed: false
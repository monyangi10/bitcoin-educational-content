question: Какво се случва, ако нападател прихване криптирано съобщение в добра схема за симетрично криптиране?
answer: Те не трябва да научават нищо съществено за първоначалното съобщение
wrong_answers:
  - Те винаги могат да декриптират съобщението без ключа
  - Те трябва да могат да го декриптират с публичен ключ
  - Те трябва да могат да познаят съдържанието на съобщението
explanation: |
  В една добре проектирана схема за симетрично криптиране нападателят, който прихваща криптирано съобщение, не трябва да може да извлече съответната информация за съдържанието на съобщението без ключа за декриптиране.
reviewed: false
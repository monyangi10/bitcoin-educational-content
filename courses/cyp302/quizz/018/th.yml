question: ในกรณีใดที่เราสามารถกล่าวได้ว่าเหตุการณ์สองเหตุการณ์เป็นอิสระต่อกัน?
answer: ความน่าจะเป็นของสิ่งหนึ่งไม่ส่งผลต่อความน่าจะเป็นของอีกสิ่งหนึ่ง
wrong_answers:
  - เหตุการณ์ทั้งสองเกิดขึ้นพร้อมกันเสมอ
  - พวกเขาไม่สามารถเกิดขึ้นพร้อมกันได้
  - ความน่าจะเป็นรวมของพวกเขาเท่ากับความน่าจะเป็นสูงสุดของทั้งสอง
explanation: |
  เหตุการณ์สองเหตุการณ์เป็นอิสระต่อกันหากความน่าจะเป็นของเหตุการณ์หนึ่งไม่เปลี่ยนแปลงความน่าจะเป็นของอีกเหตุการณ์ เช่น การจับสลากไม่มีอิทธิพลต่อสภาพอากาศของวันถัดไป
reviewed: false
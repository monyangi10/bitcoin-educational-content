question: हम किस स्थिति में कह सकते हैं कि दो घटनाएँ स्वतंत्र हैं?
answer: एक की संभावना दूसरे की संभावना को प्रभावित नहीं करती
wrong_answers:
  - दोनों घटनाएँ हमेशा एक साथ घटित होती हैं
  - वे एक दूसरे से अलग हैं
  - उनकी संयुक्त संभावना दोनों में से सबसे ज़्यादा संभावना के बराबर है
explanation: |
  दो घटनाएँ स्वतंत्र होती हैं अगर एक की संभावना दूसरे की संभावना को नहीं बदलती, जैसे कि लॉटरी निकालने का अगले दिन के मौसम पर कोई असर नहीं होता।
reviewed: false
question: В кой случай можем да кажем, че две събития са независими?
answer: Вероятността на едното не влияе на вероятността на другото
wrong_answers:
  - Двете събития винаги се случват едновременно
  - Те са взаимно изключващи се
  - Тяхната обща вероятност е равна на най-голямата вероятност от двете
explanation: |
  Две събития са независими, ако вероятността на едното не променя вероятността на другото, например тегленето на лотария не оказва влияние върху времето през следващия ден.
reviewed: false
question: Какво е предназначението на операцията за смяна на редовете в AES?
answer: Увеличаване на дифузията чрез пренареждане на байтовете в таблицата на състоянията
wrong_answers:
  - Уверете се, че всеки блок е с еднаква дължина
  - Прилагане на секретен ключ към всеки ред от таблицата на състоянието
  - Въвеждане на допълнително объркване чрез заместване на байтове
explanation: |
  Операцията за преместване на редовете в AES пренарежда байтовете в таблицата на състоянията, за да разпредели информацията, като по този начин увеличава разсейването.
reviewed: false
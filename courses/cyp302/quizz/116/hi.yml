question: AES में "shift rows" ऑपरेशन का मकसद क्या है?  

(या फिर थोड़े और सरल तरीके से)  

AES में "shift rows" करने का क्या फायदा है?  

(नोट: यहां "shift rows" को हिंदी में अनुवाद नहीं किया गया क्योंकि यह एक टेक्निकल टर्म है जिसे आमतौर पर ऐसे ही इस्तेमाल किया जाता है। अगर कॉन्टेक्स्ट के हिसाब से सरल शब्दों में समझाना हो, तो "पंक्तियों को खिसकाना" भी कह सकते हैं।)
answer: स्टेट टेबल में बाइट्स को दोबारा व्यवस्थित करके डिफ्यूजन बढ़ाने के लिए
wrong_answers:
  - हर ब्लॉक को एक ही लंबाई का सुनिश्चित करें
  - स्टेट टेबल की हर पंक्ति पर एक सीक्रेट की लगाओ
  - भ्रम बढ़ाने के लिए बाइट्स को बदल दें
explanation: |
  AES में शिफ्ट रोज़ ऑपरेशन स्टेट टेबल के बाइट्स को दोबारा व्यवस्थित करता है ताकि जानकारी को फैलाया जा सके, जिससे डिफ्यूज़न बढ़ता है।
reviewed: false
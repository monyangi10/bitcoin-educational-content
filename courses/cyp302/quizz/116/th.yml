question: วัตถุประสงค์ของการดำเนินการ shift rows ใน AES คืออะไร?
answer: เพื่อเพิ่มการแพร่กระจายโดยการจัดเรียงไบต์ใหม่ในตารางสถานะ
wrong_answers:
  - ตรวจสอบให้แน่ใจว่าแต่ละบล็อกมีความยาวเท่ากัน
  - ใช้คีย์ลับกับแต่ละแถวของตารางสถานะ
  - แนะนำความสับสนเพิ่มเติมโดยการแทนที่ไบต์
explanation: |
  การดำเนินการเลื่อนแถวใน AES จะจัดเรียงไบต์ในตารางสถานะใหม่เพื่อกระจายข้อมูลออกไป ซึ่งจะเพิ่มการแพร่กระจาย
reviewed: false
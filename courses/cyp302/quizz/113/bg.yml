question: Каква е ролята на масива K в криптирането RC4?
answer: Тя инициализира и трансформира масива S, за да generate ключовия поток
wrong_answers:
  - Той директно криптира обикновения текст
  - Той съхранява криптирания текст
  - Той служи само за временно съхранение на данни до края на процеса
explanation: |
  Масивът K се използва за трансформиране на масива S в процеса на планиране на ключовете, което позволява генерирането на псевдослучаен ключов поток за криптиране на открития текст.

question: Je! ni nini jukumu la safu ya K katika usimbaji fiche wa RC4?
answer: Huanzisha na kubadilisha safu ya S hadi generate mkondo muhimu
wrong_answers:
  - Inasimba maandishi wazi moja kwa moja
  - Huhifadhi maandishi yaliyosimbwa
  - Hutumika tu kama hifadhi ya muda ya data hadi mwisho wa mchakato
explanation: |
  Mkusanyiko wa K hutumika kubadilisha safu ya S katika mchakato wa uratibu wa ufunguo, ambao huruhusu uundaji wa mkondo muhimu wa uwongo ili kusimba maandishi wazi.
reviewed: true
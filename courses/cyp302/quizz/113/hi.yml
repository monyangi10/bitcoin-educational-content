question: RC4 एन्क्रिप्शन में K ऐरे की भूमिका क्या है?
answer: यह S ऐरे को इनिशियलाइज़ करता है और कीस्ट्रीम generate में ट्रांसफॉर्म करता है
wrong_answers:
  - यह सीधे प्लेनटेक्स्ट को एन्क्रिप्ट करता है
  - यह एन्क्रिप्टेड टेक्स्ट को स्टोर करता है
  - यह प्रक्रिया के अंत तक डेटा के लिए सिर्फ अस्थायी भंडारण का काम करता है
explanation: |
  K ऐरे का इस्तेमाल S ऐरे को ट्रांसफॉर्म करने के लिए किया जाता है की-शेड्यूलिंग प्रोसेस में, जिससे प्लेनटेक्स्ट को एन्क्रिप्ट करने के लिए एक छद्म-यादृच्छिक कीस्ट्रीम जनरेट की जा सके।
reviewed: false
question: บทบาทของอาร์เรย์ K ในการเข้ารหัส RC4 คืออะไร?
answer: มันเริ่มต้นและแปลงอาร์เรย์ S ไปยัง generate สตรีมคีย์
wrong_answers:
  - มันเข้ารหัสข้อความธรรมดาโดยตรง
  - มันเก็บข้อความที่เข้ารหัสไว้
  - มันทำหน้าที่เป็นที่เก็บข้อมูลชั่วคราวจนกว่ากระบวนการจะสิ้นสุดลง
explanation: |
  อาร์เรย์ K ถูกใช้เพื่อแปลงอาร์เรย์ S ในกระบวนการจัดตารางคีย์ ซึ่งช่วยให้สามารถสร้างสตรีมคีย์เทียมเพื่อเข้ารหัสข้อความธรรมดาได้
reviewed: false
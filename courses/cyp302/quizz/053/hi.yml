question: एक फील्ड जिसमें Elements की सीमित संख्या होती है, उसे क्या कहते हैं?
answer: एक गैलोइस फील्ड
wrong_answers:
  - एक गुणात्मक क्षेत्र
  - एक सममित क्षेत्र
  - एक वेक्टर फील्ड
explanation: |
  एक फाइनाइट फील्ड को गैलोइस फील्ड भी कहा जाता है, जिसका नाम गणितज्ञ एवरिस्ट गैलोइस के नाम पर रखा गया है, और यह मॉडर्न क्रिप्टोग्राफी में बहुत जरूरी है।
reviewed: false
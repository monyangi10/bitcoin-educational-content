question: ฟิลด์ที่มีจำนวนสมาชิกจำกัดเรียกว่าอะไร?
answer: ฟิลด์กาลัวส์
wrong_answers:
  - ฟิลด์การคูณ
  - สนามสมมาตร
  - ฟิลด์เวกเตอร์
explanation: |
  ฟิลด์จำกัดยังเป็นที่รู้จักกันในชื่อฟิลด์กาลัวส์ ตั้งชื่อตามนักคณิตศาสตร์ Évariste Galois และมีความสำคัญในวิทยาการเข้ารหัสลับสมัยใหม่
reviewed: false
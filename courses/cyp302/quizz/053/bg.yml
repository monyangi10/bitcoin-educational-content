question: Как се нарича поле с краен брой елементи?
answer: Поле на Галоа
wrong_answers:
  - Мултипликативно поле
  - Симетрично поле
  - Векторно поле
explanation: |
  Крайното поле е известно още като поле на Галоа, наречено на името на математика Еварист Галоа, и е от съществено значение за съвременната криптография.
reviewed: false
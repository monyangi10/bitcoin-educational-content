question: Umurima ufise umubare w’iherezo wa Elements witwa iki?
answer: Umurima wa Galois
wrong_answers:
  - Umurima w'ugukubita
  - Umurima uringaniye
  - Umurima w'umurongo
explanation: |
  Ibarabara rifise impera rizwi kandi nk’ibarabara rya Galois, ryiswe izina ry’umuhinga mu vy’imibare Évariste Galois, kandi ni ngirakamaro mu buhinga bwo gukingira amakuru bwo muri iki gihe.

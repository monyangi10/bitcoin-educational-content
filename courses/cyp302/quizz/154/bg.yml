question: Защо в криптосистемата RSA е трудно да се намери стойността на d?
answer: Тъй като изисква познаване на φ(N), което зависи от простите коефициенти на N
wrong_answers:
  - Тъй като d е случайно число
  - Тъй като d е по-голямо от N
  - Тъй като d се изчислява независимо от φ(N)
explanation: |
  Намирането на d е трудно, тъй като зависи от познаването на φ(N), което от своя страна зависи от стойностите на p и q, простите коефициенти на N.
reviewed: false
question: ในระบบการเข้ารหัส RSA ทำไมถึงยากที่จะหาค่า d?
answer: เพราะมันต้องการความรู้เกี่ยวกับ φ(N) ซึ่งขึ้นอยู่กับตัวประกอบเฉพาะของ N
wrong_answers:
  - เพราะ d เป็นตัวเลขสุ่ม
  - เพราะ d มีค่ามากกว่า N
  - เนื่องจาก d ถูกคำนวณโดยอิสระจาก φ(N)
explanation: |
  การหาค่า d เป็นเรื่องยากเพราะมันขึ้นอยู่กับความรู้เกี่ยวกับ φ(N) ซึ่งในทางกลับกันขึ้นอยู่กับค่าของ p และ q ซึ่งเป็นตัวประกอบเฉพาะของ N
reviewed: false
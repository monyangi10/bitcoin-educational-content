question: RSA क्रिप्टोसिस्टम में, 'd' का मान ढूंढ़ना मुश्किल क्यों है?
answer: क्योंकि इसमें φ(N) का ज्ञान चाहिए, जो N के अभाज्य गुणनखंडों पर निर्भर करता है
wrong_answers:
  - क्योंकि d एक रैंडम नंबर है
  - क्योंकि d, N से बड़ा है
  - क्योंकि d को φ(N) से स्वतंत्र रूप से गणना किया जाता है
explanation: |
  d को ढूँढ़ना मुश्किल है क्योंकि यह φ(N) के ज्ञान पर निर्भर करता है, जो बदले में p और q के मानों पर निर्भर करता है - ये N के अभाज्य गुणनखंड हैं।

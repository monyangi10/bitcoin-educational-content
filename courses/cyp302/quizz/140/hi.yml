question: असिमेट्रिक क्रिप्टोसिस्टम जैसे RSA की सुरक्षा के पीछे फैक्टराइज़ेशन प्रॉब्लम की प्रकृति क्या है?
answer: किसी संख्या को दो बहुत बड़े अभाज्य गुणनखंडों में विभाजित करना
wrong_answers:
  - किसी संख्या को 2 के क्रमिक गुणनखंडों में विभाजित करना
  - किसी संख्या को उसके सबसे छोटे विभाजकों में कम करना
  - दो बड़े अभाज्य संख्याओं को गुणा करके एक गुणनफल प्राप्त करना
explanation: |
  RSA की सुरक्षा एक बड़ी संख्या (दो बड़े अभाज्य संख्याओं का गुणनफल) को उसके दो अभाज्य गुणनखंडों में फैक्टराइज़ करने की कठिनाई पर आधारित है, यह काम प्राइवेट की के बिना लगभग नामुमकिन है।
reviewed: false
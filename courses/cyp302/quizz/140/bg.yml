question: Какво е естеството на проблема с факторизацията, който е в основата на сигурността на асиметрични криптосистеми като RSA?
answer: Факторизиране на едно число на два много големи прости фактора
wrong_answers:
  - Разлагане на число на последователни множители на 2
  - Редуциране на едно число до най-малките му делители
  - Умножаване на две големи прости числа за получаване на произведение
explanation: |
  Сигурността на RSA се основава на трудността да се факторизира голямо число (произведение на две големи прости числа) на неговите два прости фактора - задача, която е почти невъзможна без частния ключ.
reviewed: false
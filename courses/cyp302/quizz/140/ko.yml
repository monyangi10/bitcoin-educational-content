question: RSA와 같은 비대칭 암호 시스템의 보안의 근간이 되는 인수분해 문제의 본질은 무엇인가요?
answer: 숫자를 두 개의 매우 큰 소인수로 인수분해하기
wrong_answers:
  - 숫자를 2의 연속 요소로 분해하기
  - 숫자를 가장 작은 나눗셈으로 줄이기
  - 두 개의 큰 소수를 곱하여 곱셈을 구하는 방법
explanation: |
  RSA의 보안은 큰 수(두 개의 큰 소수의 곱)를 두 개의 소인수로 인수분해하는 난이도에 기반하며, 이 작업은 개인 키 없이는 거의 불가능합니다.
reviewed: false
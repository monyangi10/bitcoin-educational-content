question: ปัญหาการแยกตัวประกอบที่เป็นพื้นฐานของความปลอดภัยในระบบเข้ารหัสแบบอสมมาตรเช่น RSA คืออะไร?
answer: การแยกตัวประกอบของจำนวนออกเป็นตัวประกอบเฉพาะที่มีขนาดใหญ่มากสองตัว
wrong_answers:
  - การแยกตัวประกอบของจำนวนออกเป็นตัวประกอบของ 2 ติดต่อกัน
  - การลดจำนวนให้เหลือเพียงตัวหารที่เล็กที่สุด
  - การคูณจำนวนเฉพาะขนาดใหญ่สองจำนวนเพื่อให้ได้ผลคูณ
explanation: |
  ความปลอดภัยของ RSA ขึ้นอยู่กับความยากในการแยกตัวประกอบของจำนวนมาก (ผลคูณของจำนวนเฉพาะขนาดใหญ่สองจำนวน) ให้เป็นตัวประกอบเฉพาะสองตัว ซึ่งเป็นงานที่แทบจะเป็นไปไม่ได้หากไม่มีคีย์ส่วนตัว
reviewed: false
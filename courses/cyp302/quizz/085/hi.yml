question: क्रिप्टोग्राफी में ब्लॉक सिफर क्या है?
answer: एक एल्गोरिदम जो एक निश्चित लंबाई वाली स्ट्रिंग को उसी लंबाई की दूसरी स्ट्रिंग में बदल देता है
wrong_answers:
  - एक असममित एन्क्रिप्शन जो सार्वजनिक और निजी गुप्त कुंजियों पर आधारित है
  - एक ऐसा सिस्टम जो स्ट्रीम द्वारा वेरिएबल-लेंथ डेटा को एन्क्रिप्ट करता है
  - एक ऐसा एन्क्रिप्शन जिसमें किसी गुप्त कुंजी की जरूरत नहीं होती
explanation: |
  एक ब्लॉक सिफर एक ऐसा एल्गोरिदम है जो एक फिक्स्ड-लेंथ बिट स्ट्रिंग पर एक की (कुंजी) के साथ ट्रांसफॉर्मेशन लगाकर उसी लंबाई की दूसरी स्ट्रिंग बनाता है।

question: บล็อกไซเฟอร์ในวิทยาการเข้ารหัสลับคืออะไร?
answer: อัลกอริทึมที่แปลงสตริงความยาวคงที่เป็นสตริงอื่นที่มีความยาวเท่ากัน
wrong_answers:
  - การเข้ารหัสแบบอสมมาตรที่ใช้คีย์สาธารณะและคีย์ลับส่วนตัว
  - ระบบที่เข้ารหัสข้อมูลความยาวแปรผันโดยสตรีม
  - การเข้ารหัสที่ไม่ต้องการกุญแจลับ
explanation: |
  บล็อกไซเฟอร์คืออัลกอริทึมที่ใช้การแปลงบนสตริงบิตที่มีความยาวคงที่ด้วยคีย์เพื่อสร้างสตริงอีกชุดที่มีความยาวเท่ากัน
reviewed: false
question: Какво представлява блоковият шифър в криптографията?
answer: Алгоритъм, който преобразува низ с фиксирана дължина в друг низ със същата дължина
wrong_answers:
  - Асиметрично криптиране, базирано на публичен и частен секретен ключ
  - Система, която криптира данни с променлива дължина чрез поток
  - Криптиране, което не изисква таен ключ
explanation: |
  Блоковият шифър е алгоритъм, който прилага трансформация върху битов низ с фиксирана дължина и ключ, за да се получи друг низ със същата дължина.
reviewed: false
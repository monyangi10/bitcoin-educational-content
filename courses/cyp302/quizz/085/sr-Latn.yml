question: Šta je blok šifra u kriptografiji?
answer: Algoritam koji transformiše niz fiksne dužine u drugi niz iste dužine
wrong_answers:
  - Asimetrično šifrovanje zasnovano na javnim i privatnim tajnim ključevima
  - Sistem koji šifruje podatke promenljive dužine putem toka (eng. stream-a)
  - Enkripcija koja ne zahteva tajni ključ
explanation: |
  Blok šifra je algoritam koji primenjuje transformaciju niza bitova fiksne dužine sa ključem kako bi proizveo drugi niz iste dužine.
reviewed: true

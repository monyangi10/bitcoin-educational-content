question: पार्टियाँ सिक्योर सेशन में मैसेजेस का सही क्रम कैसे सुनिश्चित कर सकती हैं?
answer: हर मैसेज में सीक्वेंस नंबर का इस्तेमाल करके
wrong_answers:
  - हर मैसेज के लिए कीज़ का आदान-प्रदान करके
  - मैसेजेस के बीच देरी डालकर
  - संदेशों को एक अलग एल्गोरिदम से एन्क्रिप्ट करके
explanation: |
  सीक्वेंस नंबर यह सुनिश्चित करते हैं कि मैसेज सही क्रम में प्राप्त हों और उनके ऑर्डर को बदलने से रोकें।
reviewed: false
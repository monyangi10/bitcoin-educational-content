question: Как страните могат да гарантират правилния ред на съобщенията в защитена сесия?
answer: Чрез използване на номера на последователността във всяко съобщение
wrong_answers:
  - Чрез размяна на ключове за всяко съобщение
  - Чрез добавяне на закъснения между съобщенията
  - Чрез криптиране на съобщения с различен алгоритъм
explanation: |
  Поредните номера гарантират, че съобщенията се получават в правилния ред, и предотвратяват тяхното пренареждане.

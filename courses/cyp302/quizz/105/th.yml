question: พรรคการเมืองจะมั่นใจได้อย่างไรว่าข้อความในเซสชันที่ปลอดภัยมีลำดับที่ถูกต้อง?
answer: โดยใช้หมายเลขลำดับในแต่ละข้อความ
wrong_answers:
  - โดยการแลกเปลี่ยนกุญแจสำหรับแต่ละข้อความ
  - โดยการเพิ่มความล่าช้าระหว่างข้อความ
  - โดยการเข้ารหัสข้อความด้วยอัลกอริทึมที่แตกต่างกัน
explanation: |
  หมายเลขลำดับช่วยให้มั่นใจว่าข้อความได้รับในลำดับที่ถูกต้องและป้องกันการเรียงลำดับใหม่ของข้อความ
reviewed: false
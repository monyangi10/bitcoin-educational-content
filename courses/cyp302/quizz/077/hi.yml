question: क्रिप्टोग्राफी में केर्कहॉफ़ का सिद्धांत क्या भूमिका निभाता है?
answer: यह सुनिश्चित करने के लिए कि सुरक्षा गुप्त कुंजी पर निर्भर करे, न कि योजना की गोपनीयता पर
wrong_answers:
  - यह सुनिश्चित करने के लिए कि सुरक्षा योजना की गोपनीयता पर निर्भर करे, न कि गुप्त कुंजी पर
  - बहुत लंबी एन्क्रिप्शन की (कुंजी) की आवश्यकता होना
  - यह सुनिश्चित करने के लिए कि हर संदेश का एक अनूठा कुंजी हो
explanation: |
  केर्कहॉफ़ के सिद्धांत के अनुसार, किसी क्रिप्टोग्राफ़िक सिस्टम की सुरक्षा सिर्फ़ गुप्त कुंजी (सीक्रेट की) पर निर्भर होनी चाहिए, न कि एल्गोरिदम की गोपनीयता पर।
reviewed: false
question: บทบาทของหลักการของเคิร์คฮอฟฟ์ในวิทยาการเข้ารหัสลับคืออะไร?
answer: เพื่อให้มั่นใจว่าความปลอดภัยขึ้นอยู่กับกุญแจลับ ไม่ใช่ความลับของแผนการ
wrong_answers:
  - เพื่อให้แน่ใจว่าความปลอดภัยขึ้นอยู่กับความลับของแผนการ ไม่ใช่ความลับของกุญแจลับ
  - เพื่อกำหนดให้ใช้กุญแจการเข้ารหัสที่ยาวมาก
  - เพื่อรับประกันว่าแต่ละข้อความมีคีย์ที่ไม่ซ้ำกัน
explanation: |
  ตามหลักการของ Kerckhoff ความปลอดภัยของระบบการเข้ารหัสควรพึ่งพาเฉพาะกุญแจลับเท่านั้น และไม่ควรพึ่งพาการปกปิดของอัลกอริทึมเอง
reviewed: false
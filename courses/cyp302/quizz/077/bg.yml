question: Каква е ролята на принципа на Керкхоф в криптографията?
answer: За да се гарантира, че сигурността зависи от секретния ключ, а не от секретността на схемата
wrong_answers:
  - За да се гарантира, че сигурността зависи от секретността на схемата, а не от тайния ключ
  - Изискване на много дълъг ключ за криптиране
  - За да се гарантира, че всяко съобщение има уникален ключ
explanation: |
  Според принципа на Керкхоф сигурността на една криптографска система трябва да се основава единствено на секретния ключ, а не на секретността на самия алгоритъм.

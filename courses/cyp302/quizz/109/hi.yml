question: एक सिक्योर कम्युनिकेशन सेशन में सीक्वेंस नंबर किस तरह के अटैक को रोक सकता है?
answer: रीप्ले और पुनःक्रमण (रीऑर्डरिंग) हमले
wrong_answers:
  - निष्क्रिय अवरोधन हमले
  - सेवा से इनकार करने वाले हमले (डिनायल ऑफ सर्विस अटैक्स)
  - की स्पूफिंग हमले
explanation: |
  हर मैसेज में एक सीक्वेंस नंबर होता है जो रिप्ले और रीऑर्डरिंग अटैक्स को रोकता है, क्योंकि यह मैसेजेस के ऑर्डर और यूनिकनेस को वेरिफाई करने की अनुमति देता है।
reviewed: false
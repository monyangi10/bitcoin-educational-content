question: Koju vrstu napada može da spreči broj sekvence u bezbednoj komunikacionoj sesiji?
answer: Napadi ponovnog puštanja i preuređivanja
wrong_answers:
  - Pasivni napadi presretanja
  - Napadi uskraćivanjem usluge
  - Napadi lažnog predstavljanja ključeva
explanation: |
  Broj sekvence u svakoj poruci sprečava napade ponovnog slanja i preuređivanja, jer omogućava verifikaciju reda i jedinstvenosti poruka.
reviewed: true

question: การโจมตีประเภทใดที่หมายเลขลำดับสามารถป้องกันได้ในเซสชันการสื่อสารที่ปลอดภัย?
answer: การโจมตีแบบ Replay และ Reordering
wrong_answers:
  - การโจมตีดักฟังแบบพาสซีฟ
  - การโจมตีแบบปฏิเสธการให้บริการ
  - การโจมตีแบบปลอมแปลงคีย์
explanation: |
  หมายเลขลำดับในแต่ละข้อความช่วยป้องกันการโจมตีแบบ replay และ reordering เนื่องจากช่วยให้สามารถตรวจสอบลำดับและความเป็นเอกลักษณ์ของข้อความได้
reviewed: false
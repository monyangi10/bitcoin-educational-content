question: Какъв тип атака може да предотврати номерът на последователността в защитена комуникационна сесия?
answer: Атаки за преиграване и пренареждане
wrong_answers:
  - Пасивни атаки за прихващане
  - Атаки за отказ на услуга
  - Атаки за подмяна на ключове
explanation: |
  Поредният номер във всяко съобщение предотвратява атаки за преиграване и промяна на реда, тъй като позволява проверка на реда и уникалността на съобщенията.
reviewed: false
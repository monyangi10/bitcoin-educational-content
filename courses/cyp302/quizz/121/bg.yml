question: Какъв е основният проблем в управлението?
answer: Сложността на осигуряването и съхранението на двойка ключове за всеки клиент
wrong_answers:
  - Невъзможност за подновяване на ключове, изгубени от клиенти
  - Необходимост от декриптиране на всеки ключ преди използването му от клиента
  - Необходимост от предаване на ключове за всяка комуникация
explanation: |
  Проблемът с управлението на ключовете се състои в трудността да се съхранява и подсигурява двойка ключове за всеки потребител, особено когато броят на клиентите достига милиони.
reviewed: false
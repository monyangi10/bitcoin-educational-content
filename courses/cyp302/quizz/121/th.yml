question: ปัญหาการจัดการที่สำคัญคืออะไร?
answer: ความซับซ้อนในการรักษาความปลอดภัยและการจัดเก็บคู่กุญแจสำหรับลูกค้าแต่ละราย
wrong_answers:
  - ความเป็นไปไม่ได้ในการต่ออายุคีย์ที่ลูกค้าทำหาย
  - ความจำเป็นในการถอดรหัสแต่ละคีย์ก่อนการใช้งานโดยลูกค้า
  - ความจำเป็นในการส่งคีย์สำหรับการสื่อสารแต่ละครั้ง
explanation: |
  ปัญหาการจัดการหลักอยู่ที่ความยากลำบากในการจัดเก็บและรักษาความปลอดภัยของคู่กุญแจสำหรับผู้ใช้แต่ละราย โดยเฉพาะอย่างยิ่งเมื่อจำนวนลูกค้าถึงหลักล้าน
reviewed: false
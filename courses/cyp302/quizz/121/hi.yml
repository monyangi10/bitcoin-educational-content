question: मुख्य प्रबंधन समस्या क्या है?
answer: हर क्लाइंट के लिए एक जोड़ी चाबियों को सुरक्षित रखने और स्टोर करने की जटिलता
wrong_answers:
  - क्लाइंट द्वारा खोए गए कीज़ को नवीनीकृत करने की असंभवता
  - क्लाइंट द्वारा इस्तेमाल से पहले हर की को डिक्रिप्ट करने की ज़रूरत
  - हर बार संवाद के लिए चाबियाँ भेजने की ज़रूरत
explanation: |
  मुख्य प्रबंधन समस्या यह है कि हर यूज़र के लिए एक जोड़ी की (key) को स्टोर करना और सुरक्षित रखना मुश्किल हो जाता है, खासकर जब क्लाइंट्स की संख्या लाखों में पहुँच जाती है।

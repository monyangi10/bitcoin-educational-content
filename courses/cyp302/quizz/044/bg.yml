question: Защо множеството на целите числа при събиране е група, а при умножение не е?
answer: Множеството не удовлетворява условието за инверсия при умножение
wrong_answers:
  - Множеството не е затворено при умножение
  - Умножението не е асоциативно над целите числа
  - Няма неутрален елемент за умножение
explanation: |
  Множеството от цели числа не отговаря на условието за инверсия при умножение, тъй като за всяко цяло число, което би се умножило, за да се получи 1, няма инверсия. Само елементите 1 и -1 отговарят на това условие.
reviewed: false
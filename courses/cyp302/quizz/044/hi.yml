question: पूर्णांकों का समूह जोड़ के साथ एक ग्रुप क्यों है, लेकिन गुणा के साथ नहीं?
answer: समुच्चय गुणन के तहत उलटा (इनवर्शन) की शर्त को पूरा नहीं करता है।
wrong_answers:
  - समुच्चय गुणा के अंतर्गत बंद नहीं है
  - गुणा करने का नियम पूर्णांकों पर सहयोगी नहीं होता
  - गुणा के लिए कोई तटस्थ अवयव नहीं है
explanation: |
  पूर्णांकों का समूह गुणा के तहत उलटे (इनवर्स) की शर्त को पूरा नहीं करता क्योंकि हर पूर्णांक का कोई उलटा नहीं होता जो 1 देने के लिए गुणा हो सके। सिर्फ 1 और -1 ही इस शर्त को पूरा करते हैं।
reviewed: false
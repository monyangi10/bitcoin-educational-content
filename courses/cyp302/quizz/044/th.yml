question: ทำไมเซตของจำนวนเต็มกับการบวกจึงเป็นกลุ่ม ในขณะที่ไม่เป็นกับการคูณ?
answer: เซ็ตนี้ไม่เป็นไปตามเงื่อนไขการผกผันภายใต้การคูณ
wrong_answers:
  - เซตนี้ไม่ปิดภายใต้การคูณ
  - การคูณไม่เป็นการเชื่อมโยงกันเหนือจำนวนเต็ม
  - ไม่มีเอกลักษณ์สำหรับการคูณ
explanation: |
  เซตของจำนวนเต็มไม่เป็นไปตามเงื่อนไขการผกผันภายใต้การคูณเพราะไม่มีผกผันสำหรับแต่ละจำนวนเต็มที่จะคูณให้ได้ 1 มีเพียงสมาชิก 1 และ -1 เท่านั้นที่เป็นไปตามเงื่อนไขนี้
reviewed: false
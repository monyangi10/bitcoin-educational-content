question: ความแตกต่างระหว่างตัวแปรสุ่มแบบไม่ต่อเนื่องและแบบต่อเนื่องคืออะไร?
answer: ตัวแปรไม่ต่อเนื่องมีจำนวนผลลัพธ์ที่เป็นไปได้จำกัด ในขณะที่ตัวแปรต่อเนื่องสามารถมีค่าจำนวนอนันต์ภายในช่วงหนึ่ง
wrong_answers:
  - ตัวแปรไม่ต่อเนื่องเปลี่ยนค่าอยู่ตลอดเวลา ในขณะที่ตัวแปรต่อเนื่องคงที่
  - ตัวแปรไม่ต่อเนื่องเป็นลักษณะเฉพาะของการทดลองทางกายภาพที่ดำเนินการ ตัวแปรต่อเนื่องเป็นนามธรรมในช่วงของมัน
  - ตัวแปรไม่ต่อเนื่องไม่มีอยู่ในวิทยาการเข้ารหัสลับสมัยใหม่ มีเพียงตัวแปรต่อเนื่องเท่านั้นที่ถูกใช้
explanation: |
  ตัวแปรไม่ต่อเนื่องมีชุดของผลลัพธ์ที่จำกัด ในขณะที่ตัวแปรต่อเนื่องสามารถมีค่าใดๆ ภายในช่วง เช่น จำนวนจริงระหว่าง 0 และ 1
reviewed: false
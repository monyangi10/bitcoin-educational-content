question: 불연속형 확률 변수와 연속형 확률 변수의 차이점은 무엇인가요?
answer: 불연속형 변수는 가능한 결과의 수가 한정되어 있는 반면, 연속형 변수는 간격 내에서 무한한 수의 값을 가질 수 있습니다.
wrong_answers:
  - 불연속형 변수는 값이 계속 변하는 반면 연속형 변수는 안정적으로 유지됩니다.
  - 불연속 변수는 수행된 물리적 실험에 구체적이고, 연속 변수는 그 간격이 추상적입니다.
  - 최신 암호화에서는 불연속 변수가 존재하지 않으며, 연속 변수만 사용됩니다.
explanation: |
  불연속형 변수는 결과 집합이 유한한 반면, 연속형 변수는 0과 1 사이의 실수와 같이 간격 내에서 어떤 값이라도 취할 수 있습니다.

question: Каква е разликата между дискретна и непрекъсната случайна величина?
answer: Дискретната променлива има краен брой възможни резултати, докато непрекъснатата променлива може да приема безкраен брой стойности в рамките на един интервал.
wrong_answers:
  - Дискретната променлива постоянно променя стойността си, докато непрекъснатата променлива остава стабилна.
  - Дискретната променлива е специфична за провежданите физически експерименти, а непрекъснатата променлива е абстрактна в своя интервал.
  - В съвременната криптография не съществуват дискретни променливи, използват се само непрекъснати променливи.
explanation: |
  Дискретните променливи имат краен набор от резултати, докато непрекъснатите променливи могат да приемат всяка стойност в рамките на интервал, например реалните числа между 0 и 1.
reviewed: false
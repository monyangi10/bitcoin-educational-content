question: एक डिस्क्रीट रैंडम वेरिएबल और कंटीन्यूअस वेरिएबल में क्या फर्क है?
answer: एक असतत चर के पास संभावित परिणामों की एक सीमित संख्या होती है, जबकि एक सतत चर किसी अंतराल के भीतर अनंत मान ले सकता है।
wrong_answers:
  - एक असतत चर लगातार अपना मूल्य बदलता रहता है, जबकि एक सतत चर स्थिर बना रहता है।
  - एक असतत चर उन भौतिक प्रयोगों के लिए विशिष्ट होता है जो किए जाते हैं, जबकि एक सतत चर अपने अंतराल में अमूर्त होता है।
  - आधुनिक क्रिप्टोग्राफी में अलग-अलग वेरिएबल्स नहीं होते, सिर्फ लगातार चलने वाले वेरिएबल्स का इस्तेमाल होता है।
explanation: |
  असतत चरों के परिणामों का एक सीमित समूह होता है, जबकि सतत चर किसी अंतराल में कोई भी मान ले सकते हैं, जैसे 0 और 1 के बीच की वास्तविक संख्याएँ।

question: В циклична група как се нарича елемент, който може да generate всички останали елементи чрез експонентиране?
answer: Генератор
wrong_answers:
  - Мултипликатор
  - А коприма
  - Обратен
explanation: |
  Генератор е елемент от циклична група, който чрез експоненциране може да произведе всички останали елементи на групата.
reviewed: false
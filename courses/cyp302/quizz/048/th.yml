question: ในกลุ่มเชิงวงจร คำศัพท์สำหรับสมาชิกที่สามารถ generate สมาชิกอื่นทั้งหมดผ่านการยกกำลังคืออะไร?
answer: เครื่องกำเนิดไฟฟ้า
wrong_answers:
  - ตัวคูณ
  - จำนวนที่ไม่มีตัวหารร่วม
  - ผกผัน
explanation: |
  ตัวสร้าง (generator) คือองค์ประกอบในกลุ่มเชิงวงจรที่สามารถสร้างองค์ประกอบอื่นๆ ทั้งหมดในกลุ่มได้ผ่านการยกกำลัง
reviewed: false
question: Защо умножението на произведение на две много големи прости числа се смята за трудна задача?
answer: Защото изисква прекалено много изчислително време дори за суперкомпютри.
wrong_answers:
  - Тъй като изисква публичен ключ за всеки фактор.
  - Защото включва само основни операции при изчисление.
  - Защото зависи от умножението, а не от делението.
explanation: |
  Факторирането на огромно число - произведението на две големи прости числа - изисква изчислителни мощности, които надхвърлят капацитета на сегашните компютри, което прави тази задача практически неизпълнима.
reviewed: false
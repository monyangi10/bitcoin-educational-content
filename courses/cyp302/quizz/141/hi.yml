question: बड़े-बड़े अभाज्य संख्याओं (prime numbers) के गुणनफल को फैक्टर करना मुश्किल क्यों माना जाता है?  

देखिए, जब दो बहुत बड़े अभाज्य संख्याओं को आपस में गुणा किया जाता है, तो उसका गुणनफल (product) भी बहुत बड़ा होता है। अब, उस गुणनफल से वापस उन दोनों अभाज्य संख्याओं को ढूंढना एक कठिन समस्या बन जाती है।  

इसकी वजह यह है कि:  

1. **कोई सीधा फॉर्मूला नहीं है**: अभाज्य संख्याओं को गुणा करना आसान है, लेकिन उन्हें वापस अलग करने का कोई आसान तरीका नहीं है।  
2. **ब्रूट-फोर्स मेथड धीमा है**: अगर संख्या बहुत बड़ी है, तो उसके सभी संभावित गुणनखंडों (factors) को चेक करने में कंप्यूटर को भी सालों लग सकते हैं।  
3. **क्वांटम कंप्यूटिंग के बिना मुश्किल**: आम कंप्यूटरों के लिए यह समस्या बहुत जटिल है, हालांकि क्वांटम कंप्यूटर शायद भविष्य में इसे आसान बना दें।  

इसीलिए, यह समस्या क्रिप्टोग्राफी (encryption) में इस्तेमाल होती है—जैसे RSA एल्गोरिदम में, क्योंकि इसे क्रैक करना बेहद मुश्किल होता है।
answer: क्योंकि यह सुपरकंप्यूटर्स के लिए भी बहुत ज़्यादा कंप्यूटेशन समय माँगता है।
wrong_answers:
  - क्योंकि हर फैक्टर के लिए एक पब्लिक की चाहिए होती है।
  - क्योंकि इसमें केवल बेसिक ऑपरेशन्स ही इस्तेमाल होते हैं।
  - क्योंकि यह गुणा पर निर्भर करता है, भाग पर नहीं।
explanation: |
  एक बड़ी संख्या को फैक्टर करना, जो दो बड़े अभाज्य संख्याओं का गुणनफल हो, उसके लिए ऐसी कंप्यूटिंग शक्ति चाहिए जो मौजूदा कंप्यूटरों की क्षमता से कहीं ज्यादा है, यानी यह काम अभी के हिसाब से लगभग नामुमकिन है।

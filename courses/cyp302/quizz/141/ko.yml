question: 두 개의 매우 큰 소수의 곱을 인수분해하는 것이 왜 어려운 문제로 간주될까요?
answer: 슈퍼컴퓨터로도 엄청난 양의 계산 시간이 필요하기 때문입니다.
wrong_answers:
  - 각 요소마다 공개 키가 필요하기 때문입니다.
  - 계산에는 기본적인 연산만 포함되기 때문입니다.
  - 곱셈이 아니라 나눗셈에 의존하기 때문입니다.
explanation: |
  두 개의 큰 소수의 곱인 거대한 숫자를 계산하려면 현재 컴퓨터의 용량을 초과하는 컴퓨팅 성능이 필요하기 때문에 이 작업은 사실상 불가능합니다.
reviewed: false
question: ทำไมการแยกตัวประกอบของผลคูณของจำนวนเฉพาะขนาดใหญ่มากสองจำนวนจึงถือว่าเป็นปัญหาที่ยาก?
answer: เนื่องจากต้องใช้เวลาในการคำนวณมากเกินไป แม้แต่สำหรับซูเปอร์คอมพิวเตอร์
wrong_answers:
  - เพราะว่ามันต้องการกุญแจสาธารณะสำหรับแต่ละปัจจัย
  - เพราะมันเกี่ยวข้องกับการคำนวณพื้นฐานเท่านั้น
  - เพราะมันขึ้นอยู่กับการคูณไม่ใช่การหาร
explanation: |
  การแยกตัวประกอบของจำนวนมหาศาล ซึ่งเป็นผลคูณของจำนวนเฉพาะขนาดใหญ่สองจำนวน ต้องการพลังการคำนวณที่เกินขีดความสามารถของคอมพิวเตอร์ในปัจจุบัน ทำให้ภารกิจนี้แทบจะเป็นไปไม่ได้ในทางปฏิบัติ
reviewed: false
question: ปัญหาการคำนวณที่ยากซึ่งเกี่ยวข้องกับระบบอสมมาตรเช่น RSA คืออะไร?
answer: การแยกตัวประกอบของจำนวนเฉพาะ
wrong_answers:
  - การคูณเลขยกกำลังของจำนวนเต็ม
  - การสร้างตัวเลขสุ่มยาว
  - การแลกเปลี่ยนกุญแจอย่างปลอดภัย
explanation: |
  RSA ขึ้นอยู่กับความยากของการแยกตัวประกอบของจำนวนเฉพาะ ซึ่งเป็นงานที่ยากทางคอมพิวเตอร์ที่ทำให้ระบบการเข้ารหัสปลอดภัยจากการโจมตี
reviewed: false
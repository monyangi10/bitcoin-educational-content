question: Koji težak računarski problem je povezan sa asimetričnim sistemima kao što je RSA?
answer: Faktorizacija prostih brojeva
wrong_answers:
  - Eksponencijalno množenje celih brojeva
  - Kreiranje dugih nasumičnih brojeva
  - Osiguraj ključ Exchange
explanation: |
  RSA se zasniva na težini faktorizacije prostih brojeva, što je računski težak zadatak koji čini kriptosistem sigurnim protiv napada.

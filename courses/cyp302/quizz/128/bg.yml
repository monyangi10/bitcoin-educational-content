question: Какъв труден изчислителен проблем е свързан с асиметрични системи като RSA?
answer: Факторизация на първични числа
wrong_answers:
  - Експоненциално умножение на цели числа
  - Създаване на дълги случайни числа
  - Сигурен обмен на ключове
explanation: |
  RSA се основава на трудността на факторизацията на простите числа - задача, която е трудна за изчисление и която прави криптосистемата сигурна срещу атаки.
reviewed: false
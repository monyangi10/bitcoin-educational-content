question: एक मुश्किल कम्प्यूटेशनल समस्या जो RSA जैसी असममित सिस्टम्स से जुड़ी है, वह है **"फैक्टराइज़ेशन प्रॉब्लम"** (गुणनखंड निकालने की समस्या)। 

इसमें बड़े संख्याओं (जैसे दो बड़े प्राइम नंबर्स का गुणनफल) को उनके मूल गुणनखंडों में तोड़ना मुश्किल होता है। RSA इसी मुश्किल पर आधारित है—अगर कोई आसानी से गुणनखंड निकाल सके, तो RSA की सुरक्षा टूट जाएगी!
answer: अभाज्य संख्या का गुणनखंडन
wrong_answers:
  - पूर्णांकों का घातांकीय गुणन
  - लंबी रैंडम संख्याओं का निर्माण
  - सुरक्षित कुंजी जीडब्ल्यू-0
explanation: |
  RSA का आधार अभाज्य संख्याओं के गुणनखंड निकालने की कठिनाई पर है, यह एक कम्प्यूटेशनल रूप से मुश्किल काम है जो इस क्रिप्टोसिस्टम को हमलों से सुरक्षित बनाता है।
reviewed: false
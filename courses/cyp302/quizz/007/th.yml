question: อะไรที่ทำให้แผนการเข้ารหัสสมัยใหม่แตกต่างจากแผนการเข้ารหัสแบบง่าย?
answer: การรับรองความสมบูรณ์และความถูกต้องของข้อความ
wrong_answers:
  - การใช้กุญแจลับเดียว
  - การกระจายอำนาจของกุญแจ
  - การทำให้ข้อความไม่ระบุตัวตน
explanation: |
  การเข้ารหัสลับสมัยใหม่รวมถึงแผนการที่ไปไกลกว่าการรักษาความลับเพื่อให้มั่นใจในความถูกต้องและความแท้จริง รวมถึงการปฏิเสธไม่ได้ ซึ่งแตกต่างจากแผนการเข้ารหัสแบบง่าย ๆ
reviewed: false
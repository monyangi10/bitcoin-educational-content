question: एक मॉडर्न क्रिप्टोग्राफी स्कीम और एक साधारण एन्क्रिप्शन स्कीम में क्या फर्क होता है?
answer: संदेश की अखंडता और प्रामाणिकता की गारंटी
wrong_answers:
  - एक ही गुप्त कुंजी का उपयोग
  - मुख्य चीज़ का विकेंद्रीकरण
  - मैसेज को गुमनाम बनाना
explanation: |
  आधुनिक क्रिप्टोग्राफी में ऐसी योजनाएँ शामिल हैं जो सिर्फ गोपनीयता से आगे जाकर अखंडता और प्रामाणिकता, साथ ही गैर-अस्वीकृति को भी सुनिश्चित करती हैं, जो कि साधारण एन्क्रिप्शन योजनाओं से अलग है।
reviewed: false
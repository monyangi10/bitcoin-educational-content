question: По какво се различава една съвременна криптографска схема от обикновена криптографска схема?
answer: Гарантиране на целостта и автентичността на съобщенията
wrong_answers:
  - Използване на един секретен ключ
  - Децентрализация на ключовите
  - Анонимизиране на съобщенията
explanation: |
  Съвременната криптография включва схеми, които отиват отвъд поверителността, за да осигурят интегритет и автентичност, както и невъзможност за отричане, за разлика от обикновените схеми за криптиране.
reviewed: false
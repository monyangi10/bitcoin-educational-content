question: ฟังก์ชันของกุญแจส่วนตัว d ในระบบการเข้ารหัส RSA คืออะไร?
answer: มันถูกใช้ในการถอดรหัสข้อความโดยใช้โมดูลัส N
wrong_answers:
  - มันถูกใช้เพื่อเข้ารหัสข้อความเท่านั้น
  - มันถูกใช้เพื่อปลดล็อกบิตคอยน์
  - มันถูกใช้ในการคำนวณ φ(N)
explanation: |
  คีย์ส่วนตัว d ถูกใช้ในการถอดรหัสข้อความที่เข้ารหัส โดยการทำการคำนวณร่วมกับโมดูลัส N
reviewed: false
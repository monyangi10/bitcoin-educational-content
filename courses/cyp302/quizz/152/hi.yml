question: RSA क्रिप्टोसिस्टम में प्राइवेट की 'd' का क्या काम होता है?
answer: यह मैसेज को डिक्रिप्ट करने के लिए इस्तेमाल होता है, जहां मॉड्यूलस N का उपयोग किया जाता है।
wrong_answers:
  - यह सिर्फ मैसेज को एन्क्रिप्ट करने के लिए इस्तेमाल होता है
  - इसका इस्तेमाल बिटकॉइन को अनलॉक करने के लिए किया जाता है
  - इसका उपयोग φ(N) की गणना करने के लिए किया जाता है
explanation: |
  प्राइवेट की 'd' का इस्तेमाल एन्क्रिप्टेड मैसेज को डिक्रिप्ट करने के लिए किया जाता है, मॉड्यूलस 'N' के साथ कैलकुलेशन पूरा करके।
reviewed: false
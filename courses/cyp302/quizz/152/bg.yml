question: Каква е функцията на частния ключ d в криптосистемата RSA?
answer: Той се използва за декриптиране на съобщения с помощта на модула N
wrong_answers:
  - Използва се само за криптиране на съобщения
  - Той се използва за отключване на биткойни
  - Той се използва за изчисляване на φ(N)
explanation: |
  Частният ключ d се използва за декриптиране на криптирани съобщения, като се завърши изчислението с модула N.
reviewed: false
question: सर्टिफिकेट अथॉरिटीज़ (CA) पब्लिक की डिस्ट्रीब्यूशन प्रोसेस में क्या भूमिका निभाते हैं?
answer: वे सार्टिफिकेट जारी करते हैं जो पब्लिक कीज़ की प्रामाणिकता की गारंटी देते हैं
wrong_answers:
  - वे उपयोगकर्ताओं के लिए generate प्राइवेट कीज़
  - वे सभी उपयोगकर्ताओं के लिए सार्वजनिक कुंजियाँ संग्रहीत करते हैं
  - वे यूज़र्स के बीच मैसेजेज़ को एन्क्रिप्ट करने का ध्यान रखते हैं
explanation: |
  सर्टिफिकेट अथॉरिटीज सर्टिफिकेट जारी करती हैं जो पब्लिक की को उसके मालिक से जोड़ते हैं, जिससे यूजर्स यह पुष्टि कर सकते हैं कि वे जिस पब्लिक की का इस्तेमाल कर रहे हैं वह असली है।
reviewed: false
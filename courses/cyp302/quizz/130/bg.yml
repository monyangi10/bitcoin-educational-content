question: Каква е ролята на удостоверяващите органи в процеса на разпространение на публични ключове?
answer: Те издават сертификати, които гарантират автентичността на публичните ключове
wrong_answers:
  - Те generate частни ключове за потребителите
  - Те съхраняват публични ключове за всички потребители
  - Те осигуряват криптирането на съобщенията между потребителите
explanation: |
  Удостоверяващите органи издават удостоверения, които свързват даден публичен ключ с неговия собственик, като по този начин позволяват на потребителите да проверяват автентичността на използваните от тях публични ключове.
reviewed: false
question: บทบาทของหน่วยงานออกใบรับรองในกระบวนการแจกจ่ายกุญแจสาธารณะคืออะไร?
answer: พวกเขาออกใบรับรองที่รับประกันความถูกต้องของกุญแจสาธารณะ
wrong_answers:
  - พวกเขา generate private keys สำหรับผู้ใช้
  - พวกเขาเก็บคีย์สาธารณะสำหรับผู้ใช้ทุกคน
  - พวกเขารับรองการเข้ารหัสของข้อความระหว่างผู้ใช้
explanation: |
  หน่วยงานออกใบรับรองออกใบรับรองที่เชื่อมโยงกุญแจสาธารณะกับเจ้าของ ทำให้ผู้ใช้สามารถตรวจสอบความถูกต้องของกุญแจสาธารณะที่พวกเขาใช้ได้
reviewed: false
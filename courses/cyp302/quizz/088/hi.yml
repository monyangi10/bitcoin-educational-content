question: AES मानक के रूप में अपनाया गया ब्लॉक एन्क्रिप्शन एल्गोरिदम कौन सा है?
answer: रिजंडेल साइफर
wrong_answers:
  - डीईएस
  - आरएसए
  - डिफी-हैलमैन
explanation: |
  रिजंडेल साइफर को NIST द्वारा सिमेट्रिक एन्क्रिप्शन स्टैंडर्ड (AES) के रूप में अपनाया गया था, क्योंकि यह हाई परफॉरमेंस और सुरक्षा प्रदान करता है।
reviewed: false
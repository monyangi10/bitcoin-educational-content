question: ทำไมการเข้ารหัสแบบเลื่อนถึงเสี่ยงต่อการโจมตีแบบ brute force?
answer: เพราะว่ามันมีคีย์ที่เป็นไปได้เพียง 26 คีย์เท่านั้น
wrong_answers:
  - เพราะมันใช้กุญแจสาธารณะ
  - เนื่องจากมันขึ้นอยู่กับการเข้ารหัสแบบสมมาตร
  - เพราะมันใช้ตัวเลขสุ่ม
explanation: |
  การเข้ารหัสแบบเลื่อนสามารถถูกโจมตีด้วยวิธี brute force ได้ง่าย เนื่องจากมีคีย์ที่เป็นไปได้เพียง 26 คีย์ ตั้งแต่ 0 ถึง 25 เนื่องจากการใช้โมดูโล 26 ซึ่งขึ้นอยู่กับขนาดของตัวอักษร คุณไม่สามารถใช้คีย์ที่ใหญ่กว่านี้ได้ เพราะในกรณีใด ๆ ก็จะเทียบเท่ากับคีย์ระหว่าง 0 ถึง 25 ดังนั้น การทดสอบแต่ละคีย์จึงเพียงพอที่จะค้นหาข้อความ
reviewed: false
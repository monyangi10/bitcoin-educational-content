question: शिफ्ट एन्क्रिप्शन ब्रूट फोर्स अटैक के लिए कमजोर क्यों है?
answer: क्योंकि इसमें सिर्फ 26 संभावित चाबियाँ होती हैं
wrong_answers:
  - क्योंकि यह एक पब्लिक की का इस्तेमाल करता है
  - क्योंकि यह सिमेट्रिक एन्क्रिप्शन पर आधारित है
  - क्योंकि यह रैंडम नंबर्स का इस्तेमाल करता है
explanation: |
  शिफ्ट एन्क्रिप्शन ब्रूट फोर्स अटैक के लिए बहुत आसानी से कमजोर होता है क्योंकि इसमें सिर्फ 26 संभावित कीज़ होती हैं, 0 से 25 तक। ऐसा मॉड्यूलो 26 के इस्तेमाल की वजह से होता है जो खुद अल्फाबेट के साइज़ पर निर्भर करता है। आप बड़ी वैध कीज़ का इस्तेमाल नहीं कर सकते, क्योंकि वो किसी भी हाल में 0 से 25 के बीच की किसी की के बराबर ही होंगी। इसलिए, मैसेज को ढूंढ़ने के लिए हर एक की को टेस्ट करना काफी होता है।
reviewed: false
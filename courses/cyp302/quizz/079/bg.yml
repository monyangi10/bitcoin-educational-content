question: Защо шифроването на смяна е уязвимо на атаки с груба сила?
answer: Защото има само 26 възможни ключа
wrong_answers:
  - Тъй като използва публичен ключ
  - Тъй като се основава на симетрично криптиране
  - Тъй като използва случайни числа
explanation: |
  Шифрирането с разместване е лесно податливо на атаки с груба сила, тъй като има само 26 възможни ключа, от 0 до 25, поради използването на модул 26, който сам по себе си зависи от размера на азбуката. Не можете да използвате по-големи валидни ключове, тъй като те във всички случаи ще бъдат еквивалентни на ключ между 0 и 25. Следователно е достатъчно да се тества всеки от тях, за да се намери съобщението.

question: 시프트 암호화가 무차별 대입 공격에 취약한 이유는 무엇인가요?
answer: 가능한 키는 26개뿐이므로
wrong_answers:
  - 공개 키를 사용하기 때문에
  - 대칭형 암호화를 기반으로 하기 때문입니다
  - 난수를 사용하기 때문에
explanation: |
  시프트 암호화는 알파벳 크기에 따라 달라지는 모듈로 26을 사용하기 때문에 0에서 25까지 가능한 키가 26개밖에 없기 때문에 무차별 암호 대입 공격에 쉽게 노출될 수 있습니다. 더 큰 유효한 키는 어떤 경우에도 0에서 25 사이의 키와 동일하므로 사용할 수 없습니다. 따라서 메시지를 찾기 위해 각각의 키를 테스트하는 것으로 충분합니다.

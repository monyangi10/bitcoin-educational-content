question: आधुनिक क्रिप्टोसिस्टम जैसे RSA में फैक्टराइजेशन के लिए इस्तेमाल होने वाले प्राइम नंबर्स का आमतौर पर साइज़ क्या होता है?
answer: हर फैक्टर के लिए 1024 बिट्स
wrong_answers:
  - कुल मिलाकर 1024 बिट्स
  - हर फैक्टर के लिए 256 बिट्स
  - कुल मिलाकर 256 बिट्स
explanation: |
  आधुनिक क्रिप्टोसिस्टम जैसे RSA में, चुनी गई अभाज्य संख्याएँ आमतौर पर 1024 बिट्स की होती हैं, जिससे फैक्टराइज़ेशन बेहद मुश्किल हो जाता है और सुरक्षा बढ़ जाती है।
reviewed: false
question: Какъв е типичният размер на простите числа, използвани за факторизация в съвременни криптосистеми като RSA?
answer: 1024 бита за всеки фактор
wrong_answers:
  - общо 1024 бита
  - 256 бита за всеки фактор
  - общо 256 бита
explanation: |
  В съвременните криптосистеми като RSA избраните прости числа обикновено са по 1024 бита всяко, което прави факторизацията изключително трудна и повишава сигурността.
reviewed: false
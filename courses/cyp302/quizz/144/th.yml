question: ขนาดทั่วไปของจำนวนเฉพาะที่ใช้ในการแยกตัวประกอบสำหรับระบบเข้ารหัสสมัยใหม่เช่น RSA คือเท่าใด?
answer: 1024 บิตสำหรับแต่ละแฟกเตอร์
wrong_answers:
  - 1024 บิตทั้งหมด
  - 256 บิตสำหรับแต่ละปัจจัย
  - 256 บิตทั้งหมด
explanation: |
  ในระบบการเข้ารหัสสมัยใหม่เช่น RSA ตัวเลขเฉพาะที่เลือกมักจะมีขนาด 1024 บิตแต่ละตัว ทำให้การแยกตัวประกอบเป็นเรื่องยากมากและเพิ่มความปลอดภัย
reviewed: false
question: Каква е спецификата на трите криптирани текста, съдържащи се в кутията?
answer: Те съдържат числа, разделени със запетаи
wrong_answers:
  - Всички те са написани с обикновени букви
  - Използват непознати символи
  - Те са написани на няколко езика
explanation: |
  Трите криптирани текста се състоят от поредица от числа, разделени със запетаи, като за декриптирането им е необходим ключ.
reviewed: false
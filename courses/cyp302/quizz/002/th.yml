question: ความเฉพาะเจาะจงของข้อความที่เข้ารหัสทั้งสามในกล่องคืออะไร?
answer: พวกมันประกอบด้วยตัวเลขที่คั่นด้วยเครื่องหมายจุลภาค
wrong_answers:
  - พวกเขาทั้งหมดเขียนด้วยตัวอักษรธรรมดา
  - พวกเขาใช้สัญลักษณ์ที่ไม่รู้จัก
  - พวกเขาถูกเขียนในหลายภาษา
explanation: |
  ข้อความที่เข้ารหัสทั้งสามประกอบด้วยชุดของตัวเลขที่คั่นด้วยเครื่องหมายจุลภาค ซึ่งต้องใช้กุญแจในการถอดรหัส
reviewed: false
question: तीन एन्क्रिप्टेड टेक्स्ट जो बॉक्स में हैं, उनकी खासियत क्या है?
answer: वे अल्पविराम से अलग किए गए नंबरों को शामिल करते हैं
wrong_answers:
  - वे सभी साधारण अक्षरों में लिखे गए हैं।
  - वे अज्ञात चिह्नों का उपयोग करते हैं
  - वे कई भाषाओं में लिखे गए हैं
explanation: |
  तीन एन्क्रिप्टेड टेक्स्ट्स में कॉमा से अलग किए गए नंबर्स की सीरीज़ होती हैं, जिन्हें डिक्रिप्ट करने के लिए एक की की ज़रूरत होती है।
reviewed: false
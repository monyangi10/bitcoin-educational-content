question: ความเทียบเท่าของ XOR กับการดำเนินการโมดูลัสคืออะไร?
answer: XOR เทียบเท่ากับการดำเนินการ modulo 2 บนบิต
wrong_answers:
  - XOR เทียบเท่ากับการลบแบบคลาสสิกโมดูโล 3
  - XOR เทียบเท่ากับการดำเนินการ modulo 7 บนบิต
  - XOR คือการผกผันของการบวก
explanation: |
  การดำเนินการ XOR สามารถมองว่าเป็นการบวกบิตด้วยโมดูโล 2 ทำให้ผลลัพธ์เหมือนกัน
reviewed: false
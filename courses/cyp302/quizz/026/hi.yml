question: XOR और मॉड्यूलो ऑपरेशन के बीच समानता क्या है?
answer: XOR बिट्स पर मॉड्यूलो 2 ऑपरेशन के बराबर होता है
wrong_answers:
  - XOR 3 के मॉड्यूलो में क्लासिक घटाव के बराबर है।
  - XOR बिट्स पर मॉड्यूलो 7 ऑपरेशन के बराबर है
  - XOR जोड़ का उल्टा होता है
explanation: |
  XOR ऑपरेशन को बिट्स का मॉड्यूलो 2 के साथ जोड़ के तौर पर देखा जा सकता है, जिससे रिजल्ट एक जैसे हो जाते हैं।

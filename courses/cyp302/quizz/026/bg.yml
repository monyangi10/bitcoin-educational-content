question: Каква е еквивалентността на операцията XOR с операцията modulo?
answer: XOR е еквивалентен на операция модуло 2 върху битове
wrong_answers:
  - XOR е еквивалентен на класическо изваждане модул 3
  - XOR е еквивалентен на операция модуло 7 върху битове
  - XOR е обратното на събирането
explanation: |
  Операцията XOR може да се разглежда като събиране на битове с модул 2, което прави резултатите идентични.
reviewed: false
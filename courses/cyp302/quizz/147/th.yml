question: หากจำนวนเต็ม N เป็นผลคูณของจำนวนเฉพาะสองจำนวน p และ q ลำดับของ N คำนวณอย่างไร?
answer: (p - 1) * (q - 1)
wrong_answers:
  - (p * q) - 1
  - p + q
  - (p - 1) + (q - 1)
explanation: |
  สำหรับ N ที่เท่ากับผลคูณของจำนวนเฉพาะสองจำนวน p และ q ลำดับของ N คำนวณได้เป็น (p - 1) * (q - 1)
reviewed: false
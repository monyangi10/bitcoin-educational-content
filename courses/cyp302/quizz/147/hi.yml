question: अगर एक पूर्णांक N दो अभाज्य संख्याओं p और q का गुणनफल है, तो N का क्रम (order) कैसे निकाला जाता है?
answer: (p - 1) * (q - 1)
wrong_answers:
  - (p * q) - 1 को हिंदी में "पी गुणा क्यू घटा एक" कहते हैं।
  - पी + क्यू
  - (p - 1) + (q - 1) को हिंदी में अनुवादित करने पर होगा:

(पी - 1) + (क्यू - 1)
explanation: |
  जब N दो अभाज्य संख्याओं p और q के गुणनफल के बराबर होता है, तो N का क्रम (p - 1) * (q - 1) के रूप में गणना की जाती है।
reviewed: false
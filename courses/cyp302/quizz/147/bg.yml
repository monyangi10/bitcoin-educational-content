question: Ако едно цяло число N е произведение на две прости числа p и q, как се изчислява редът на N?
answer: (p - 1) * (q - 1)
wrong_answers:
  - (p * q) - 1
  - p + q
  - (p - 1) + (q - 1)
explanation: |
  За N, равно на произведението на две прости числа p и q, редът на N се изчислява като (p - 1) * (q - 1).

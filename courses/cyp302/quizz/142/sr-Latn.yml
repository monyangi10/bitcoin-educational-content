question: Kako se zove problem kod kojeg je lako izračunati rezultat u jednom smeru, ali je gotovo nemoguće obrnuti ga?
answer: Jednosmerna funkcija
wrong_answers:
  - Linearna funkcija
  - Eksponencijalna funkcija
  - Reverzibilna funkcija
explanation: |
  Jednosmerne funkcije omogućavaju brzo računanje u jednom pravcu, ali čine inverzno rešavanje praktično nemogućim, što ih čini korisnim u kriptografiji.
reviewed: true

question: Как се нарича задача, при която е лесно да се изчисли резултат в една посока, но е почти невъзможно да се обърне?
answer: Еднопосочна функция
wrong_answers:
  - Линейна функция
  - Експоненциална функция
  - Обратима функция
explanation: |
  Еднопосочните функции позволяват бързи изчисления в едната посока, но правят обратното решаване практически невъзможно, поради което са полезни в криптографията.
reviewed: false
question: एक ऐसी समस्या को क्या कहते हैं जहाँ एक दिशा में परिणाम निकालना आसान हो, लेकिन उल्टा करना लगभग नामुमकिन?
answer: एक तरफ़ा फंक्शन
wrong_answers:
  - एक रेखीय फंक्शन
  - एक्स्पोनेंशियल फंक्शन
  - एक उलटा कार्य (reversible function)
explanation: |
  एक-वे फंक्शन एक दिशा में तेज़ी से कैलकुलेशन करने देते हैं, लेकिन उल्टा सॉल्व करना लगभग नामुमकिन बना देते हैं, इसीलिए क्रिप्टोग्राफी में इनका इस्तेमाल होता है।
reviewed: false
question: ปัญหาที่สามารถคำนวณผลลัพธ์ได้ง่ายในทิศทางหนึ่งแต่แทบจะเป็นไปไม่ได้ที่จะย้อนกลับคืออะไร?
answer: ฟังก์ชันทางเดียว
wrong_answers:
  - ฟังก์ชันเชิงเส้น
  - ฟังก์ชันเอ็กซ์โพเนนเชียล
  - ฟังก์ชันที่กลับได้
explanation: |
  ฟังก์ชันทางเดียวช่วยให้การคำนวณในทิศทางเดียวเป็นไปอย่างรวดเร็ว แต่ทำให้การแก้ไขย้อนกลับแทบจะเป็นไปไม่ได้เลย ดังนั้นจึงมีประโยชน์ในวิทยาการเข้ารหัสลับ
reviewed: false
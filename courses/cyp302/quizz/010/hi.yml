question: खुले संचार के माहौल में क्रिप्टोग्राफी क्यों जरूरी है?
answer: यह डेटा को सुरक्षित करता है, भले ही संचार चैनल को बीच में ही रोक लिया जाए।
wrong_answers:
  - यह सभी नेटवर्क से संचार को अदृश्य बना देता है।
  - यह लोकल नेटवर्क पर हमलों को रोकता है।
  - यह सुरक्षित संचार के साथ भौतिक केबल्स की जगह लेता है।
explanation: |
  एक खुले संचार वातावरण में, जहां चैनलों पर नजर रखी जा सकती है, क्रिप्टोग्राफी संभावित हमलों की मौजूदगी में भी, आदान-प्रदान किए गए डेटा की सुरक्षा करके सुरक्षा सुनिश्चित करती है।
reviewed: false
question: Защо криптографията е от решаващо значение в отворената комуникационна среда?
answer: Той осигурява сигурност на данните, дори ако комуникационният канал бъде прихванат.
wrong_answers:
  - Тя прави комуникациите невидими за всички мрежи.
  - Тя предотвратява атаки към локални мрежи.
  - Той заменя физическите кабели със защитени комуникации.
explanation: |
  В отворена комуникационна среда, в която каналите могат да бъдат наблюдавани, криптографията осигурява сигурност, като защитава обменяните данни, дори при наличието на потенциални атаки.
reviewed: false
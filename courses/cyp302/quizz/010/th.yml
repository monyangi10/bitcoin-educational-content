question: ทำไมการเข้ารหัสจึงมีความสำคัญในสภาพแวดล้อมการสื่อสารแบบเปิด?
answer: มันรักษาความปลอดภัยของข้อมูล แม้ว่าช่องทางการสื่อสารจะถูกดักฟัง
wrong_answers:
  - มันทำให้การสื่อสารมองไม่เห็นสำหรับทุกเครือข่าย
  - มันป้องกันการโจมตีบนเครือข่ายท้องถิ่น
  - มันแทนที่สายเคเบิลทางกายภาพด้วยการสื่อสารที่ปลอดภัย
explanation: |
  ในสภาพแวดล้อมการสื่อสารแบบเปิด ที่ช่องทางสามารถถูกตรวจสอบได้ การเข้ารหัสลับช่วยให้มั่นใจในความปลอดภัยโดยการปกป้องข้อมูลที่แลกเปลี่ยน แม้ในกรณีที่มีการโจมตีที่อาจเกิดขึ้น
reviewed: false
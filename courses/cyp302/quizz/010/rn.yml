question: Ni kubera iki ubuhinga bwo gukoresha amakuru y’ibanga ari ngirakamaro cane mu gihe umuntu ashobora guhanahana amakuru ataco yishisha?
answer: Iracungera amakuru, naho umurongo wo guhanahana amakuru woba wacitse.
wrong_answers:
  - Bituma ivy’itumanaho bitaboneka ku nzira zose.
  - Bibuza ibitero ku mbuga zo mu karere.
  - Isubirira imigozi y’umubiri n’ivy’itumanaho bitekanye.
explanation: |
  Mu kibanza c’itumanaho gifunguye, aho imihora ishobora gukurikiranirwa hafi, ubuhinga bwo gukingira amakuru buratuma haba umutekano mu kurinda amakuru ahindurwa, mbere n’igihe hoba hariho ibitero bishobora gutera.
reviewed: false
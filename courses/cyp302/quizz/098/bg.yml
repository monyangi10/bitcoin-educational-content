question: Как MAC помага за предотвратяване на фалшифицирането на съобщения от нападател?
answer: Като позволява да се провери дали полученото съобщение не е било променено
wrong_answers:
  - Чрез предотвратяване на атаки от типа "груба сила
  - Чрез скриване на съдържанието на съобщението
  - Чрез автоматично блокиране на подозрителни съобщения
explanation: |
  MAC дава възможност на получателя да провери дали дадено съобщение не е било модифицирано чрез етикет, генериран с помощта на споделен секретен ключ, което ограничава възможностите за манипулиране.
reviewed: false
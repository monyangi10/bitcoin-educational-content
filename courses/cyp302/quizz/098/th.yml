question: MAC ช่วยป้องกันการแก้ไขข้อความโดยผู้โจมตีได้อย่างไร?
answer: โดยอนุญาตให้ตรวจสอบว่าข้อความที่ได้รับไม่ได้ถูกแก้ไข
wrong_answers:
  - โดยการป้องกันการโจมตีประเภท brute-force
  - โดยการปกปิดเนื้อหาข้อความ
  - โดยการบล็อกข้อความที่น่าสงสัยโดยอัตโนมัติ
explanation: |
  MAC ช่วยให้ผู้รับสามารถตรวจสอบได้ว่าข้อความไม่ได้ถูกแก้ไขผ่านแท็กที่สร้างขึ้นด้วยคีย์ลับที่ใช้ร่วมกัน ซึ่งจำกัดความเป็นไปได้ของการถูกดัดแปลง
reviewed: false
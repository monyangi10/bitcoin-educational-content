question: एक MAC (Message Authentication Code) कैसे मदद करता है कि कोई हमलावर मैसेज को छेड़छाड़ न कर पाए?
answer: यह सुनिश्चित करके कि प्राप्त संदेश में कोई बदलाव नहीं किया गया है
wrong_answers:
  - ब्रूट-फोर्स टाइप के हमलों को रोककर
  - संदेश की सामग्री को छिपाकर
  - संदिग्ध संदेशों को अपने आप ब्लॉक करके
explanation: |
  एक MAC (मैसेज ऑथेंटिकेशन कोड) रिसीवर को यह वेरिफाई करने की अनुमति देता है कि मैसेज में कोई बदलाव नहीं किया गया है, यह एक टैग के जरिए होता है जो शेयर्ड सीक्रेट की (shared secret key) से जनरेट किया जाता है। इससे मैनिपुलेशन की संभावनाएं सीमित हो जाती हैं।
reviewed: false
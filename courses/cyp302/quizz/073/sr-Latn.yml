question: Kako se ključ može definisati u šifrovanju pomeranjem?
answer: Broj od 0 do 25
wrong_answers:
  - Nasumična reč
  - Bilo koji nasumičan broj bez ograničenja
  - Broj od 1 do 26
explanation: |
  U šifrovanju pomakom, ključ je broj između 0 i 25, što odgovara broju pozicija pomaka primenjenih na svako slovo poruke u alfabetu od 26 slova.
reviewed: false
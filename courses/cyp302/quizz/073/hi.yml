question: शिफ्ट एन्क्रिप्शन में एक 'कुंजी' (key) को कैसे परिभाषित किया जा सकता है?
answer: 0 से 25 तक की एक संख्या
wrong_answers:
  - एक अनियमित शब्द
  - कोई भी बिना पाबंदी वाली रैंडम संख्या
  - 1 से 26 तक की एक संख्या
explanation: |
  शिफ्ट एन्क्रिप्शन में, की 0 से 25 के बीच की एक संख्या होती है, जो 26-अक्षरों वाले अल्फाबेट में मैसेज के हर अक्षर पर लागू की जाने वाली शिफ्ट पोजीशन की संख्या को दर्शाती है।
reviewed: false
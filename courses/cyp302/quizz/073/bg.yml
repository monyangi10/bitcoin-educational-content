question: Как може да се дефинира ключ при шифроване на смени?
answer: Число от 0 до 25
wrong_answers:
  - Случайна дума
  - Всяко произволно число без ограничение
  - Число от 1 до 26
explanation: |
  При шифроването с преместване ключът е число между 0 и 25, което съответства на броя на позициите на преместване, приложени към всяка буква от съобщението в 26-буквена азбука.

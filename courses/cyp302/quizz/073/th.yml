question: คีย์ในระบบการเข้ารหัสแบบเลื่อนสามารถกำหนดได้อย่างไร?
answer: ตัวเลขจาก 0 ถึง 25
wrong_answers:
  - คำแบบสุ่ม
  - ตัวเลขสุ่มใด ๆ โดยไม่มีข้อจำกัด
  - ตัวเลขจาก 1 ถึง 26
explanation: |
  ในการเข้ารหัสแบบเลื่อน คีย์คือหมายเลขระหว่าง 0 ถึง 25 ซึ่งสอดคล้องกับจำนวนตำแหน่งที่เลื่อนที่ใช้กับแต่ละตัวอักษรของข้อความในตัวอักษร 26 ตัว
reviewed: false
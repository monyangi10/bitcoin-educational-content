question: องค์ประกอบที่จำเป็นสามประการของโครงร่างการเข้ารหัสแบบสมมาตรคืออะไร?
answer: อัลกอริทึมการสร้างคีย์, อัลกอริทึมการเข้ารหัส, และอัลกอริทึมการถอดรหัส
wrong_answers:
  - อัลกอริธึมแฮช, คีย์สาธารณะ, และอัลกอริธึมการตรวจสอบ
  - คีย์สาธารณะ, คีย์ส่วนตัว, และอัลกอริทึมการถอดรหัส
  - อัลกอริทึมการเข้ารหัส, กุญแจสาธารณะ, และกุญแจส่วนตัว
explanation: |
  โครงร่างการเข้ารหัสแบบสมมาตรประกอบด้วยสามองค์ประกอบ: อัลกอริทึมการสร้างกุญแจ, อัลกอริทึมการเข้ารหัส, และอัลกอริทึมการถอดรหัส ทั้งหมดนี้ใช้กุญแจเดียวกัน
reviewed: false
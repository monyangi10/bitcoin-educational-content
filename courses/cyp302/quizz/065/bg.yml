question: Кои са трите основни компонента на схемата за симетрично криптиране?
answer: Алгоритъм за генериране на ключове, алгоритъм за криптиране и алгоритъм за декриптиране
wrong_answers:
  - Алгоритъм за хеширане, публичен ключ и алгоритъм за проверка
  - Публичен ключ, частен ключ и алгоритъм за декриптиране
  - Алгоритъм за криптиране, публичен ключ и частен ключ
explanation: |
  Схемата за симетрично криптиране се състои от три елемента: алгоритъм за генериране на ключове, алгоритъм за криптиране и алгоритъм за декриптиране. Всички те използват един и същ ключ.
reviewed: false
question: Je, ni vipengele vipi vitatu muhimu vya mpango wa usimbaji fiche linganifu?
answer: Algorithm muhimu ya kutengeneza, algoriti ya usimbaji fiche, na algoriti ya usimbuaji
wrong_answers:
  - Kanuni ya hashing, ufunguo wa umma, na kanuni ya uthibitishaji
  - Ufunguo wa umma, ufunguo wa faragha na algoriti ya kusimbua
  - Kanuni ya usimbaji fiche, ufunguo wa umma na ufunguo wa faragha
explanation: |
  Mpango wa usimbaji linganifu unajumuisha Elements tatu: algoriti ya ufunguo wa kizazi, algoriti ya usimbaji fiche, na algoriti ya kusimbua. Wote hutumia ufunguo sawa.

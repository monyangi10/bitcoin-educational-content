question: एक ग्रुप जो कम्यूटेटिविटी कंडीशन को पूरा करता है, उसे क्या कहते हैं?
answer: एक एबेलियन समूह
wrong_answers:
  - एक बंद ग्रुप
  - एक साथ जुड़ा हुआ समूह
  - एक उल्टा समूह
explanation: |
  एक एबेलियन, या कम्यूटेटिव, ग्रुप वह ग्रुप होता है जिसमें बाइनरी ऑपरेशन Elements में तत्वों के क्रम का परिणाम पर कोई असर नहीं पड़ता। इसका मतलब है कि किसी भी a और b के लिए, a ∘ b = b ∘ a होता है।
reviewed: false
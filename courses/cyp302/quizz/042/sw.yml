question: Kikundi kinaitwaje ambacho kinakidhi hali ya mawasiliano?
answer: Kikundi cha abelian
wrong_answers:
  - Kikundi kilichofungwa
  - Kikundi cha ushirika
  - Kikundi cha kinyume
explanation: |
  Kikundi cha abelian, au cha kubadilisha, ni kikundi ambacho mpangilio wa Elements katika operesheni ya biti hauathiri matokeo. Hii ina maana kwamba kwa yoyote a na b, a ∘ b = b ∘ a.
reviewed: true
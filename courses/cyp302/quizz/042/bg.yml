question: Как се нарича група, която отговаря на условието за комутативност?
answer: Абелова група
wrong_answers:
  - Затворена група
  - Асоциативна група
  - Обратна група
explanation: |
  Абеловата или комутативната група е група, в която редът на елементите в двоичната операция не влияе на резултата. Това означава, че за всяко a и b, a ∘ b = b ∘ a.
reviewed: false
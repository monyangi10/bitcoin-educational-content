question: กลุ่มที่เรียกว่ากลุ่มที่มีเงื่อนไขการสลับที่พอใจคืออะไร?
answer: กลุ่มอาบีเลียน
wrong_answers:
  - กลุ่มปิด
  - กลุ่มเชื่อมโยง
  - กลุ่มผกผัน
explanation: |
  กลุ่มอาเบเลียน หรือกลุ่มคอมมิวเตทีฟ คือกลุ่มที่ลำดับของสมาชิกในปฏิบัติการทวิภาคไม่ส่งผลต่อผลลัพธ์ ซึ่งหมายความว่าสำหรับ a และ b ใด ๆ a ∘ b = b ∘ a
reviewed: false
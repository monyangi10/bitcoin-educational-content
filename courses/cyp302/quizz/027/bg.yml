question: Какво е комутативното свойство на операцията XOR?
answer: Редът на операндите не влияе на резултата от операцията
wrong_answers:
  - XOR работи само с четни числа
  - XOR изисква операнди с еднаква дължина
  - Позицията на битовете в операндите не влияе на резултата от операцията
explanation: |
  XOR е комутативен, което означава, че a XOR b е равно на b XOR a.
reviewed: false
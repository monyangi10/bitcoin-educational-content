question: Je, sifa ya ubadilishanaji ya operesheni ya XOR ni gani?
answer: Utaratibu wa uendeshaji hauathiri matokeo ya operesheni
wrong_answers:
  - XOR inafanya kazi na nambari sawa pekee
  - XOR inahitaji uendeshaji wa urefu sawa
  - Msimamo wa bits katika uendeshaji hauathiri matokeo ya operesheni
explanation: |
  XOR ni ya kubadilishana, kumaanisha kuwa XOR b ni sawa na b XOR a.
reviewed: true

question: XOR ऑपरेशन का कम्यूटेटिव प्रॉपर्टी क्या है?
answer: ऑपरेंड्स का क्रम ऑपरेशन के परिणाम को प्रभावित नहीं करता
wrong_answers:
  - XOR सिर्फ सम संख्याओं के साथ काम करता है
  - XOR को समान लंबाई के ऑपरेंड्स की जरूरत होती है
  - ऑपरेंड्स में बिट्स की पोजीशन का ऑपरेशन के रिजल्ट पर कोई असर नहीं पड़ता
explanation: |
  XOR कम्यूटेटिव है, मतलब कि a XOR b, b XOR a के बराबर होता है।

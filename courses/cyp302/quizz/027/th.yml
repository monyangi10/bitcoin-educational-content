question: สมบัติการสลับที่ของการดำเนินการ XOR คืออะไร?
answer: ลำดับของตัวถูกดำเนินการไม่ส่งผลต่อผลลัพธ์ของการดำเนินการ
wrong_answers:
  - XOR ใช้งานได้เฉพาะกับเลขคู่เท่านั้น
  - XOR ต้องการออเปอแรนด์ที่มีความยาวเท่ากัน
  - ตำแหน่งของบิตในตัวถูกดำเนินการไม่ส่งผลต่อผลลัพธ์ของการดำเนินการ
explanation: |
  XOR เป็นการดำเนินการที่สลับที่ได้ หมายความว่า a XOR b เท่ากับ b XOR a
reviewed: false
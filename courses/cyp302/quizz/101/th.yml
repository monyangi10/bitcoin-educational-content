question: HMAC คืออะไร?
answer: รหัสการตรวจสอบข้อความที่อิงตามฟังก์ชันแฮช
wrong_answers:
  - อัลกอริธึมการเข้ารหัสแบบอสมมาตรที่อิงตามฟังก์ชันแฮช
  - อัลกอริทึมการเข้ารหัสแบบอสมมาตรที่อิงตาม Diffie-Hellman
  - รหัสการยืนยันข้อความที่อิงตาม Diffie-Hellman
explanation: |
  HMAC คือรหัสการตรวจสอบความถูกต้องของข้อความที่ใช้ฟังก์ชันแฮช เช่น SHA-256 เพื่อสร้างแท็กที่ยืนยันความสมบูรณ์และความถูกต้องของข้อความ
reviewed: false
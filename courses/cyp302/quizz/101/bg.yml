question: Какво представлява HMAC?
answer: Код за удостоверяване на автентичността на съобщението, базиран на хеш функция
wrong_answers:
  - Алгоритъм за асиметрично криптиране, базиран на хеш функция
  - Алгоритъм за асиметрично криптиране, базиран на Diffie-Hellman
  - Код за удостоверяване на съобщения, базиран на Diffie-Hellman
explanation: |
  HMAC е код за удостоверяване на съобщения, който използва хеш функция, като например SHA-256, за създаване на етикет, който проверява целостта и автентичността на дадено съобщение.
reviewed: false
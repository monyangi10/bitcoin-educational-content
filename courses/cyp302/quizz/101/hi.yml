question: HMAC क्या है?
answer: Hash फंक्शन पर आधारित एक मैसेज ऑथेंटिकेशन कोड
wrong_answers:
  - Hash फंक्शन पर आधारित एक असममित एन्क्रिप्शन एल्गोरिदम
  - डिफी-हेलमैन पर आधारित एक असममित एन्क्रिप्शन एल्गोरिदम
  - डिफी-हेलमन पर आधारित एक संदेश प्रमाणीकरण कोड
explanation: |
  एक HMAC एक मैसेज ऑथेंटिकेशन कोड है जो SHA-256 जैसे Hash फंक्शन का इस्तेमाल करके एक टैग बनाता है, जो मैसेज की सच्चाई और असलियत को वेरिफाई करता है।
reviewed: false
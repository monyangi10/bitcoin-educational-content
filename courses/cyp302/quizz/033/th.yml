question: หน้าที่หลักของ seed ในบริบทของโซ่สุ่มเทียมคืออะไร?
answer: เพื่อใช้เป็นจุดเริ่มต้นในการสร้างห่วงโซ่ที่ยาวขึ้น
wrong_answers:
  - เพื่อกำหนดความยาวคงที่ของโซ่สุ่มเทียม
  - เพื่อตรวจสอบความสมบูรณ์ของโซ่สุ่มเทียม
  - เพิ่มการแจกแจงแบบสม่ำเสมอให้กับค่าของโซ่
explanation: |
  seed เป็นสตริงที่สั้นกว่า ใช้เป็นจุดเริ่มต้นโดยอัลกอริธึมขยายเพื่อสร้าง generate ซึ่งเป็นโซ่สุ่มเทียมที่ยาวกว่า
reviewed: false
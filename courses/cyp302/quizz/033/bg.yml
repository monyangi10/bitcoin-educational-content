question: Каква е основната функция на seed в контекста на псевдослучайните вериги?
answer: Да служи като отправна точка за генериране на по-дълга верига
wrong_answers:
  - Определяне на фиксираната дължина на псевдослучайна верига
  - Проверка на целостта на псевдослучайна верига
  - Добавяне на равномерно разпределение към стойностите на верига
explanation: |
  seed е по-кратък низ, използван като отправна точка от алгоритъм за разширяване на generate до по-дълга псевдослучайна верига.

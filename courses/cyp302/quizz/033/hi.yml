question: seed का मुख्य काम pseudorandom chains के संदर्भ में क्या है?
answer: एक लंबी श्रृंखला बनाने के लिए शुरुआती बिंदु के रूप में काम करना
wrong_answers:
  - एक पसूडोरैंडम चेन की निश्चित लंबाई को परिभाषित करना
  - एक छद्म-यादृच्छिक श्रृंखला की अखंडता सत्यापित करने के लिए
  - चेन के वैल्यूज़ में एक समान वितरण जोड़ने के लिए
explanation: |
  seed एक छोटी स्ट्रिंग है जिसे एक्सपेंशन अल्गोरिदम द्वारा generate (एक लंबी छद्म-यादृच्छिक श्रृंखला) के लिए शुरुआती बिंदु के रूप में इस्तेमाल किया जाता है।

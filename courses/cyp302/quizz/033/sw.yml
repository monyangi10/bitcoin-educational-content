question: Je, ni kazi gani kuu ya seed katika muktadha wa kamba nasibu bandia?
answer: Kutumika kama kianzio cha kutengeneza mnyororo mrefu
wrong_answers:
  - Ili kufafanua urefu uliowekwa wa mnyororo wa uwongo
  - Ili kuthibitisha uadilifu wa msururu wa uwongo
  - Ili kuongeza usambazaji sawa kwa maadili ya mnyororo
explanation: |
  Seed ni kamba fupi inayotumiwa kama sehemu ya kuanzia na algoriti ya upanuzi ili kuzalisha kamba ndefu ya nasibu bandia.
reviewed: true

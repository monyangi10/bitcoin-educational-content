question: Koja je glavna funkcija seed-a u kontekstu pseudonasumičnih lanaca?
answer: Da služi kao početna tačka za generisanje dužeg lanca
wrong_answers:
  - Da se definiše fiksna dužina pseudonasumičnog lanca
  - Da verifikujete integritet pseudonasumičnog lanca
  - Da dodate uniformnu distribuciju vrednostima lanca
explanation: |
  Seed je kraći niz koji koristi algoritam ekspanzije kao početnu tačku za generisanje, dužeg pseudonasumičnon lanca.
reviewed: true

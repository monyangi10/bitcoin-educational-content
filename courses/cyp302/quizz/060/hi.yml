question: कौन सा जवाब क्रिप्टोग्राफी की दो मुख्य शाखाओं में से एक को दर्शाता है?
answer: सममित क्रिप्टोग्राफी
wrong_answers:
  - क्रिप्टोलॉजी
  - होमोमॉर्फिक एन्क्रिप्शन
  - क्रिप्टविश्लेषण
explanation: |
  सिमेट्रिक क्रिप्टोग्राफी क्रिप्टोग्राफी की एक प्रमुख शाखा है, जिसमें एन्क्रिप्शन स्कीम्स शामिल होती हैं जहां मैसेज को एन्क्रिप्ट और डिक्रिप्ट करने के लिए एक ही की का इस्तेमाल होता है।
reviewed: false
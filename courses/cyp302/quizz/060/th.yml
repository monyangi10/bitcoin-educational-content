question: คำตอบใดแสดงถึงหนึ่งในสองสาขาหลักของการเข้ารหัสลับ?
answer: การเข้ารหัสแบบสมมาตร
wrong_answers:
  - วิทยาการเข้ารหัสลับ
  - การเข้ารหัสแบบโฮโมมอร์ฟิก
  - การวิเคราะห์การเข้ารหัส
explanation: |
  การเข้ารหัสแบบสมมาตรเป็นสาขาหลักของการเข้ารหัส ซึ่งเกี่ยวข้องกับรูปแบบการเข้ารหัสที่ใช้กุญแจเดียวในการเข้ารหัสและถอดรหัสข้อความ
reviewed: false
question: Кой отговор представлява един от двата основни клона на криптографията?
answer: Симетрична криптография
wrong_answers:
  - Криптология
  - Хомоморфно криптиране
  - Криптоанализ
explanation: |
  Симетричната криптография е основен клон на криптографията, включващ схеми за криптиране, при които за криптиране и декриптиране на съобщения се използва един ключ.
reviewed: false
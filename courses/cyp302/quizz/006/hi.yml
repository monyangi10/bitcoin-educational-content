question: कौन सा कॉन्सेप्ट सिर्फ़ सिमेट्रिक या एसिमेट्रिक क्रिप्टोग्राफ़ी स्कीम्स से एक्सक्लूसिवली रिलेटेड नहीं है?
answer: जीडब्ल्यू-0 फंक्शन्स
wrong_answers:
  - सार्वजनिक और निजी कुंजी जोड़े
  - असममित क्रिप्टोग्राफी
  - सममित क्रिप्टोग्राफी
explanation: |
  Hash फंक्शन्स मॉडर्न क्रिप्टोग्राफी का एक अहम हिस्सा हैं, लेकिन ये पब्लिक और प्राइवेट कीज़ की तरह स्पेसिफिकली सिमेट्रिक या एसिमेट्रिक स्कीम्स से जुड़े नहीं होते।
reviewed: false
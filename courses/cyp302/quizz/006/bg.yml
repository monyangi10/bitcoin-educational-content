question: Коя концепция не е свързана единствено със симетрични или асиметрични криптографски схеми?
answer: Функции на Hash
wrong_answers:
  - Двойки публични и частни ключове
  - Асиметрична криптография
  - Симетрична криптография
explanation: |
  Функциите Hash са ключов компонент на съвременната криптография, но за разлика от публичните и частните ключове те не са конкретно свързани със симетрични или асиметрични схеми.
reviewed: false
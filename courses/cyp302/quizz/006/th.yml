question: แนวคิดใดที่ไม่เกี่ยวข้องเฉพาะกับโครงร่างการเข้ารหัสแบบสมมาตรหรืออสมมาตร?
answer: ฟังก์ชัน Hash
wrong_answers:
  - คู่กุญแจสาธารณะและกุญแจส่วนตัว
  - การเข้ารหัสแบบอสมมาตร
  - การเข้ารหัสแบบสมมาตร
explanation: |
  ฟังก์ชัน Hash เป็นส่วนประกอบสำคัญของการเข้ารหัสสมัยใหม่ แต่ไม่ได้เชื่อมโยงโดยเฉพาะกับโครงร่างแบบสมมาตรหรืออสมมาตร เหมือนกับกุญแจสาธารณะและกุญแจส่วนตัว
reviewed: false
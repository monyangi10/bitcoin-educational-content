question: कौन सी ब्लॉक सिफर विधि एक इनिशियलाइज़ेशन वेक्टर (IV) का उपयोग करती है और प्रोबेबिलिस्टिक एन्क्रिप्शन बनाती है?
answer: सीबीसी (सिफर ब्लॉक चेनिंग)
wrong_answers:
  - ईसीबी (इलेक्ट्रॉनिक कोड बुक)
  - एईएस-128
  - एस-एच-ए 256 (SHA-256)
explanation: |
  CBC मेथड एक इनिशियलाइज़ेशन वेक्टर (IV) का इस्तेमाल करती है और हर प्लेनटेक्स्ट ब्लॉक को पिछले एन्क्रिप्टेड ब्लॉक के साथ XOR ऑपरेशन से जोड़ती है। इससे एन्क्रिप्शन प्रोबेबिलिस्टिक (संभाव्य) हो जाता है और ECB की तुलना में ज्यादा सुरक्षित होता है।
reviewed: false
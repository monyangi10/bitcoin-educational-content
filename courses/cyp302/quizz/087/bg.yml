question: Кой метод за блоков шифър използва вектор за инициализация и създава вероятностно криптиране?
answer: CBC (Cipher Block Chaining)
wrong_answers:
  - ЕЦБ (електронна кодова книга)
  - AES-128
  - SHA-256
explanation: |
  Методът CBC използва вектор за инициализация и прилага XOR между всеки блок от открит текст и предишния криптиран блок, което прави криптирането вероятностно и по-безопасно от ЕЦБ.
reviewed: false
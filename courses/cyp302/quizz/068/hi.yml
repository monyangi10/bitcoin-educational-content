question: सममित एन्क्रिप्शन और डिक्रिप्शन प्रक्रियाओं में कुंजी (key) की क्या भूमिका होती है?
answer: इसका उपयोग संदेश को एन्क्रिप्ट और डिक्रिप्ट करने के लिए किया जाता है
wrong_answers:
  - यह सिर्फ संदेश को डिक्रिप्ट करने के लिए इस्तेमाल होता है
  - इसका उपयोग संदेश की अखंडता सत्यापन कोड बनाने के लिए किया जाता है
  - यह सार्वजनिक रूप से generate अन्य कुंजियों को साझा किया गया है
explanation: |
  सममित एन्क्रिप्शन स्कीम्स में, एक ही प्राइवेट की का इस्तेमाल मैसेज को भेजते समय एन्क्रिप्ट करने और प्राप्त होने पर डिक्रिप्ट करने दोनों के लिए किया जाता है।
reviewed: false
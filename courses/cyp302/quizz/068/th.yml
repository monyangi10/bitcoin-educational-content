question: บทบาทของกุญแจในกระบวนการเข้ารหัสและถอดรหัสแบบสมมาตรคืออะไร?
answer: มันถูกใช้ในการเข้ารหัสและถอดรหัสข้อความ
wrong_answers:
  - มันถูกใช้เพื่อถอดรหัสข้อความเท่านั้น
  - มันถูกใช้เพื่อสร้างรหัสตรวจสอบความสมบูรณ์ของข้อความ
  - มันถูกแชร์ต่อสาธารณะไปยัง generate คีย์อื่น ๆ
explanation: |
  ในรูปแบบการเข้ารหัสแบบสมมาตร จะใช้กุญแจส่วนตัวเดียวกันทั้งในการเข้ารหัสข้อความเมื่อส่งและในการถอดรหัสเมื่อรับ
reviewed: false
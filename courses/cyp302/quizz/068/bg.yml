question: Каква е ролята на ключа в процесите на симетрично криптиране и декриптиране?
answer: Използва се за криптиране и декриптиране на съобщението
wrong_answers:
  - Използва се само за декриптиране на съобщението
  - Използва се за създаване на код за проверка на целостта на съобщението
  - Споделя се публично, за да се използват други ключове generate
explanation: |
  При симетричните схеми за криптиране един и същ частен ключ се използва както за криптиране на съобщението при изпращане, така и за декриптирането му при получаване.
reviewed: false
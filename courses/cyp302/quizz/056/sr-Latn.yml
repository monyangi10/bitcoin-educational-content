question: Koja vrsta algebarske strukture je osnova apstraktne algebre?
answer: Grupa
wrong_answers:
  - Polje
  - Prsten
  - Matrica
explanation: |
  Grupa je fundamentalna algebarska struktura na kojoj se zasniva apstraktna algebra, definisana skupom Elements i binarnom operacijom koja poštuje određena svojstva.

question: अमूर्त बीजगणित (abstract algebra) का आधार किस प्रकार की बीजगणितीय संरचना है?
answer: ग्रुप
wrong_answers:
  - क्षेत्र
  - रिंग
  - मैट्रिक्स
explanation: |
  ग्रुप (group) वह बुनियादी बीजगणितीय संरचना है जिस पर अमूर्त बीजगणित (abstract algebra) आधारित होता है। इसे एक समुच्चय (set) Elements और एक द्विआधारी संक्रिया (binary operation) द्वारा परिभाषित किया जाता है जो कुछ खास गुणों को पूरा करती है।
reviewed: false
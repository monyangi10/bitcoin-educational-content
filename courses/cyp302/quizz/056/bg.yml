question: Кой тип алгебрична структура е в основата на абстрактната алгебра?
answer: Група
wrong_answers:
  - Поле
  - Пръстен
  - Матрица
explanation: |
  Групата е фундаменталната алгебрична структура, на която се основава абстрактната алгебра, дефинирана чрез множество от елементи и бинарна операция, която спазва определени свойства.
reviewed: false
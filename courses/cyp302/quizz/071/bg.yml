question: Как става декриптирането при шифъра на смяна?
answer: Чрез изваждане на ключа от всяка криптирана буква и прилагане на модул 26
wrong_answers:
  - Чрез изваждане на ключа от всяка криптирана буква и прилагане на модул 20
  - Чрез умножаване на ключа с всяка криптирана буква
  - Чрез разделяне на ключа от всяка криптирана буква и прилагане на модул 27
explanation: |
  При шифъра на смяна декриптирането се извършва чрез изваждане на ключа от всяка криптирана буква, след което се прилага модул 26, за да се върне оригиналният текст. Модуло 26 позволява връщане към началото на азбуката след буквата Z.
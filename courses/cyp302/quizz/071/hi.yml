question: शिफ्ट सिफर में डिक्रिप्शन कैसे काम करता है?
answer: हर एक एन्क्रिप्टेड अक्षर से key को घटाकर और modulo 26 लगाकर
wrong_answers:
  - हर एन्क्रिप्टेड अक्षर से key को घटाकर और modulo 20 लगाकर
  - कुंजी को प्रत्येक एन्क्रिप्टेड अक्षर से गुणा करके
  - हर एन्क्रिप्टेड अक्षर से की को विभाजित करके और मॉड्यूलो 27 लगाकर
explanation: |
  शिफ्ट सिफर में, डिक्रिप्शन (वापस मूल में लाना) हर एन्क्रिप्टेड (गुप्त) अक्षर से की (कुंजी) को घटाकर किया जाता है, फिर मोड्यूलो 26 लगाकर मूल टेक्स्ट पर वापस आया जाता है। मोड्यूलो 26 की मदद से Z के बाद वापस अल्फाबेट (वर्णमाला) की शुरुआत में लौटा जा सकता है।
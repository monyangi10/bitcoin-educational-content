question: 시프트 암호에서 복호화는 어떻게 작동하나요?
answer: 각 암호화된 문자에서 키를 빼고 모듈로 26을 적용합니다
wrong_answers:
  - 각 암호화된 문자에서 키를 빼고 모듈로 20을 적용합니다
  - 암호화된 각 문자에 키를 곱하면 다음과 같이 됩니다
  - 각 암호화된 문자에서 키를 나누고 모듈로 27을 적용하여
explanation: |
  시프트 암호에서 복호화는 암호화된 각 문자에서 키를 뺀 다음 모듈로 26을 적용하여 원래 텍스트로 돌아가는 방식으로 수행됩니다. 모듈로 26을 사용하면 문자 Z 뒤에 오는 알파벳의 시작 부분으로 돌아갈 수 있습니다.
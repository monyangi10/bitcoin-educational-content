question: การถอดรหัสในรหัสซีซาร์ทำงานอย่างไร?
answer: โดยการลบกุญแจออกจากแต่ละตัวอักษรที่เข้ารหัสและใช้โมดูโล 26
wrong_answers:
  - โดยการลบกุญแจออกจากแต่ละตัวอักษรที่เข้ารหัสและใช้โมดูโล 20
  - โดยการคูณกุญแจกับแต่ละตัวอักษรที่เข้ารหัส
  - โดยการหารคีย์จากแต่ละตัวอักษรที่เข้ารหัสและใช้โมดูโล 27
explanation: |
  ในรหัสซีซาร์ (shift cipher) การถอดรหัสจะทำโดยการลบกุญแจออกจากแต่ละตัวอักษรที่เข้ารหัส แล้วใช้โมดูโล 26 เพื่อกลับไปยังข้อความต้นฉบับ โมดูโล 26 ช่วยให้สามารถกลับไปยังจุดเริ่มต้นของตัวอักษรหลังจากตัวอักษร Z
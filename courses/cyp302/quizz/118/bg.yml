question: Каква роля играе операцията за заместване на байтове (S-Box) в криптирането с AES?
answer: Той внася объркване, като заменя всеки байт с друг
wrong_answers:
  - Тя осигурява целостта чрез проверка на байтовете на съобщението
  - Разбърква колоните, за да увеличи дифузията
  - Той разделя открития текст на 128-битови блокове
explanation: |
  Операцията за заместване на байтове (S-Box) в AES внася объркване, като замества всеки байт с различна стойност съгласно таблица, което затруднява анализа на криптирания текст.
reviewed: false
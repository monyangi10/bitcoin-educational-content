question: บทบาทของการแทนที่ไบต์ (S-Box) ในการเข้ารหัส AES คืออะไร?
answer: มันสร้างความสับสนโดยการแทนที่แต่ละไบต์ด้วยไบต์อื่น
wrong_answers:
  - มันรับรองความสมบูรณ์โดยการตรวจสอบไบต์ของข้อความ
  - มันสับเปลี่ยนคอลัมน์เพื่อเพิ่มการแพร่กระจาย
  - มันแบ่งข้อความธรรมดาออกเป็นบล็อกขนาด 128 บิต
explanation: |
  การดำเนินการแทนที่ไบต์ (S-Box) ใน AES สร้างความสับสนโดยการแทนที่ไบต์แต่ละตัวด้วยค่าที่แตกต่างกันตามตาราง ทำให้ข้อความที่เข้ารหัสยากต่อการวิเคราะห์มากขึ้น
reviewed: false
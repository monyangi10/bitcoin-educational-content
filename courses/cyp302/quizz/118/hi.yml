question: AES एन्क्रिप्शन में बाइट सब्स्टिट्यूशन ऑपरेशन (एस-बॉक्स) क्या भूमिका निभाता है?  

एस-बॉक्स AES एन्क्रिप्शन का एक अहम हिस्सा है जो डेटा को गोपनीय बनाने में मदद करता है। यह हर बाइट को एक अलग वैल्यू से बदल देता है, जिससे मूल डेटा को समझना मुश्किल हो जाता है। यह नॉन-लीनियर ट्रांसफॉर्मेशन प्रदान करके सिक्योरिटी बढ़ाता है और क्रिप्टैनालिसिस (हमलों) से बचाता है। सीधे शब्दों में कहें तो, एस-बॉक्स डेटा को मिक्स करके उसे और सुरक्षित बना देता है!
answer: यह भ्रम पैदा करता है क्योंकि हर बाइट को दूसरे से बदल देता है
wrong_answers:
  - यह मैसेज के बाइट्स को चेक करके इंटिग्रिटी सुनिश्चित करता है
  - यह डिफ्यूज़न बढ़ाने के लिए कॉलम्स को फेरबदल करता है।
  - यह प्लेनटेक्स्ट को 128-बिट के ब्लॉक्स में बाँट देता है
explanation: |
  AES में बाइट प्रतिस्थापन ऑपरेशन (एस-बॉक्स) एक टेबल के अनुसार हर बाइट को अलग वैल्यू से बदलकर कन्फ्यूजन पैदा करता है, जिससे एन्क्रिप्टेड टेक्स्ट का विश्लेषण करना और मुश्किल हो जाता है।

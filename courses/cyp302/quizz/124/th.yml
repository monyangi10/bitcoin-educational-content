question: ทำไมการแลกเปลี่ยนกุญแจด้วยตนเองจึงไม่เหมาะสมสำหรับการสื่อสารออนไลน์ที่ปลอดภัย?
answer: มันนำไปสู่ค่าใช้จ่ายขององค์กรที่สูงในขณะที่ไม่มีประสิทธิภาพ
wrong_answers:
  - มันทำให้การสื่อสารที่เข้ารหัสไม่สามารถใช้งานได้
  - จำเป็นต้องใช้คีย์หลายตัวต่อไคลเอนต์
  - มันป้องกันการใช้คีย์ซ้ำสำหรับธุรกรรมที่เกิดซ้ำ
explanation: |
  การแลกเปลี่ยนกุญแจด้วยตนเองมีค่าใช้จ่ายสูงและไม่มีประสิทธิภาพ โดยเฉพาะในขนาดใหญ่ เนื่องจากทำให้การทำธุรกรรมช้าลงและก่อให้เกิดค่าใช้จ่ายด้านโลจิสติกส์ที่สำคัญสำหรับลูกค้าใหม่แต่ละราย
reviewed: false
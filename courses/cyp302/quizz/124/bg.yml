question: Защо личната размяна на ключове е непрактична за сигурни онлайн комуникации?
answer: Води до високи организационни разходи и същевременно е неефективен
wrong_answers:
  - Това прави криптираната комуникация неизползваема
  - Изисква използването на няколко ключа за всеки клиент
  - Предотвратява повторното използване на ключове за многократни транзакции
explanation: |
  Личната размяна на ключове е скъпа и неефективна, особено в голям мащаб, тъй като забавя транзакциите и налага значителни логистични разходи за всеки нов клиент.

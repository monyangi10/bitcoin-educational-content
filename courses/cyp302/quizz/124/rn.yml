question: Ni kubera iki guhana imfunguruzo umuntu ku giti ciwe bidashoboka kugira ngo umuntu ashobore guhanahana amakuru ata nkomanzi kuri Internet?
answer: Bituma habaho amafaranga menshi yo gutunganya ibintu mu gihe ataco bimaze .
wrong_answers:
  - Bituma ubutumwa bubitswe butakoreshwa
  - Bisaba gukoresha imfunguruzo nyinshi ku mukiriya
  - Bibuza gusubira gukoresha imfunguruzo mu gusubiramwo amafaranga
explanation: |
  Guhana imfunguruzo umuntu ku giti ciwe birazimvye kandi ntibigira akamaro, cane cane ku rugero runini, kuko bigabanya amafaranga yo gucuruza kandi bikaba bitera amafaranga menshi y’ivy’ubuhinga ku mukiriya mushasha wese.
reviewed: false
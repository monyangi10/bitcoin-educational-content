question: 안전한 온라인 커뮤니케이션을 위해 직접 키를 교환하는 것이 비현실적인 이유는 무엇인가요?
answer: 비효율적이면서 높은 조직 비용으로 이어집니다
wrong_answers:
  - 암호화된 통신을 사용할 수 없게 만듭니다
  - 클라이언트당 여러 개의 키를 사용해야 합니다
  - 반복되는 거래에서 키 재사용을 방지합니다
explanation: |
  직접 키를 교환하는 것은 특히 대규모의 경우 거래 속도가 느려지고 새로운 고객마다 상당한 물류 비용이 부과되므로 비용이 많이 들고 비효율적입니다.
reviewed: false
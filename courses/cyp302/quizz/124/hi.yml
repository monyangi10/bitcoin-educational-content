question: ऑनलाइन सुरक्षित संचार के लिए व्यक्तिगत रूप से कुंजियों (keys) का आदान-प्रदान करना अव्यावहारिक क्यों है?
answer: इससे संगठनात्मक लागतें बढ़ जाती हैं और काम भी अकुशल होता है
wrong_answers:
  - यह एन्क्रिप्टेड कम्युनिकेशन को बेकार कर देता है
  - इसके लिए हर क्लाइंट के लिए एक से ज़्यादा चाबियों का इस्तेमाल करना पड़ता है
  - यह बार-बार लेन-देन के लिए एक ही चाबी का इस्तेमाल रोकता है
explanation: |
  व्यक्तिगत रूप से चाबियों का आदान-प्रदान करना महंगा और अक्षम है, खासकर बड़े पैमाने पर, क्योंकि यह लेन-देन को धीमा कर देता है और हर नए ग्राहक के लिए भारी लॉजिस्टिक लागत लगाता है।
reviewed: false
question: อะไรที่ทำให้ RC4 มีช่องโหว่ในปัจจุบันแม้จะเคยได้รับความนิยมในอดีต?
answer: จุดอ่อนที่ได้รับการบันทึกไว้อย่างดีในการสร้างกระแสคีย์
wrong_answers:
  - คีย์ที่สั้นเกินไปที่จะรับประกันความปลอดภัย
  - ความไม่สามารถในการทำงานกับข้อความยาว
  - ข้อกำหนดในการใช้กุญแจสาธารณะนอกเหนือจากกุญแจส่วนตัว
explanation: |
  RC4 มีจุดอ่อนที่สำคัญในการสร้างกระแสคีย์ ซึ่งทำให้การเข้ารหัสถูกโจมตีได้ จึงทำให้ถูกละทิ้งไปอย่างค่อยเป็นค่อยไปในโปรโตคอลความปลอดภัยสมัยใหม่
reviewed: false
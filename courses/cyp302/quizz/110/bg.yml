question: Какво прави RC4 уязвим днес въпреки популярността му в миналото?
answer: Добре документирани слабости при генерирането на ключови потоци
wrong_answers:
  - Твърде кратък ключ за гарантиране на сигурността
  - Неспособност за работа с дълги текстове
  - Изискването за използване на публичен ключ в допълнение към частния ключ
explanation: |
  RC4 има значителни слабости при генерирането на ключовия поток, които излагат криптирането на атаки, поради което постепенно се изоставя в съвременните протоколи за сигурност.
reviewed: false
question: आज RC4 अपनी पुरानी लोकप्रियता के बावजूद कमजोर क्यों माना जाता है?
answer: कुंजी स्ट्रीम जनरेशन में अच्छी तरह से दर्ज कमजोरियाँ
wrong_answers:
  - एक कुंजी जो सुरक्षा सुनिश्चित करने के लिए बहुत छोटी है
  - यह लंबे टेक्स्ट के साथ काम करने में असमर्थ है
  - निजी कुंजी के अलावा सार्वजनिक कुंजी का उपयोग करने की आवश्यकता
explanation: |
  RC4 की की स्ट्रीम जनरेशन में काफी कमजोरियाँ हैं, जो इसे एन्क्रिप्शन हमलों के लिए खुला छोड़ देती हैं। इसी वजह से आधुनिक सुरक्षा प्रोटोकॉल्स में इसका इस्तेमाल धीरे-धीरे बंद हो रहा है।
reviewed: false
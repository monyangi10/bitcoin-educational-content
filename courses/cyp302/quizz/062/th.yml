question: การเข้ารหัสแบบสมมาตรประเภทใดที่ใช้เป็นหลักสำหรับการสื่อสารต่อเนื่อง เช่น สตรีมเสียงหรือวิดีโอ?
answer: การเข้ารหัสแบบสตรีม
wrong_answers:
  - การเข้ารหัสแบบบล็อก
  - รหัสยืนยัน
  - การแฮชข้อความ
explanation: |
  การเข้ารหัสแบบสตรีมเหมาะสมอย่างยิ่งสำหรับการสื่อสารอย่างต่อเนื่องเพราะมันเข้ารหัสข้อมูลอย่างต่อเนื่อง แตกต่างจากการเข้ารหัสแบบบล็อกซึ่งแบ่งข้อมูลออกเป็นบล็อก
reviewed: false
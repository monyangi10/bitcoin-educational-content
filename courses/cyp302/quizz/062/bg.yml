question: Кой тип симетрично криптиране се използва предимно за непрекъснати комуникации, като например аудио или видеопотоци?
answer: Криптиране на потока
wrong_answers:
  - Блоково криптиране
  - Код за проверка
  - Хеширане на съобщения
explanation: |
  Поточното криптиране е особено подходящо за непрекъснати комуникации, тъй като криптира данните непрекъснато, за разлика от блоковото криптиране, което ги разделя на блокове.
reviewed: false
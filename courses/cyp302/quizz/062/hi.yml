question: स्ट्रीमिंग कम्युनिकेशन जैसे ऑडियो या वीडियो स्ट्रीम के लिए मुख्य रूप से किस तरह का सिमेट्रिक एन्क्रिप्शन इस्तेमाल होता है?
answer: स्ट्रीम एन्क्रिप्शन
wrong_answers:
  - ब्लॉक एन्क्रिप्शन
  - वेरिफिकेशन कोड
  - संदेश हैशिंग
explanation: |
  स्ट्रीम एन्क्रिप्शन लगातार कम्युनिकेशन के लिए खास तौर पर मुफीद है क्योंकि यह डेटा को लगातार एन्क्रिप्ट करता है, जबकि ब्लॉक एन्क्रिप्शन डेटा को ब्लॉक्स में बाँट देता है।
reviewed: false
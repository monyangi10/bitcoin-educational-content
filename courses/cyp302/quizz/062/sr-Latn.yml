question: Koji tip simetrične enkripcije se prvenstveno koristi za kontinuirane komunikacije, kao što su audio ili video strimovi?
answer: Šifrovanje toka
wrong_answers:
  - Šifrovanje blokova
  - Verifikacioni kod
  - Heširanje poruka
explanation: |
  Šifrovanje toka je posebno pogodno za kontinuirane komunikacije jer šifruje podatke kontinuirano, za razliku od blok šifrovanja, koje ih deli na blokove.
reviewed: false
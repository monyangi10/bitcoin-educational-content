question: กลุ่มประเภทใดที่ใช้การเข้ารหัสเป็นหลัก?
answer: กลุ่มที่กำหนดบนจำนวนเต็มหรือองค์ประกอบที่อธิบายโดยจำนวนเต็ม
wrong_answers:
  - กลุ่มของจำนวนเชิงซ้อนหรือองค์ประกอบที่อธิบายโดยจำนวนเชิงซ้อน
  - กลุ่มของการแปลงเชิงเรขาคณิตหรือองค์ประกอบที่อธิบายโดยการแปลงเชิงเรขาคณิต
  - กลุ่มของจำนวนตรรกยะหรือองค์ประกอบที่อธิบายโดยจำนวนตรรกยะ
explanation: |
  การเข้ารหัสลับใช้กลุ่มที่อิงตามจำนวนเต็ม หรือองค์ประกอบที่อธิบายโดยจำนวนเต็ม เช่น จุดบนเส้นโค้งวงรี สำหรับการเข้ารหัสและการลงนาม
reviewed: false
question: 어떤 유형의 그룹이 주로 암호화를 사용하나요?
answer: 정수로 정의된 그룹 또는 정수로 설명되는 Elements에 정의된 그룹
wrong_answers:
  - 복소수 그룹 또는 복소수로 설명되는 Elements
  - 기하학적 변환 그룹 또는 기하학적 변환으로 설명되는 Elements
  - 유리수 그룹 또는 유리수로 설명되는 Elements
explanation: |
  암호화는 타원 곡선의 점과 같이 정수를 기반으로 하는 그룹 또는 정수로 설명되는 Elements를 사용하여 암호화 및 서명 작업을 수행합니다.

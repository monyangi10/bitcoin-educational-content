question: क्रिप्टोग्राफी मुख्य रूप से किस तरह के समूह द्वारा इस्तेमाल की जाती है?
answer: पूर्णांकों पर परिभाषित समूह या Elements जिनका वर्णन पूर्णांकों द्वारा किया गया है
wrong_answers:
  - कॉम्प्लेक्स नंबर्स द्वारा वर्णित समूह या Elements
  - ज्यामितीय परिवर्तनों के समूह या जीडब्ल्यू-2 जो ज्यामितीय परिवर्तनों द्वारा वर्णित हैं
  - तर्कसंगत संख्याओं के समूह या Elements जिन्हें तर्कसंगत संख्याओं द्वारा वर्णित किया गया है
explanation: |
  क्रिप्टोग्राफी में एन्क्रिप्शन और साइनिंग ऑपरेशंस के लिए इंटीजर्स पर आधारित ग्रुप्स का इस्तेमाल होता है, जैसे कि इंटीजर्स द्वारा वर्णित Elements या एलिप्टिक कर्व पर मौजूद पॉइंट्स।

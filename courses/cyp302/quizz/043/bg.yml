question: Кой тип група използва предимно криптография?
answer: Групи, дефинирани върху цели числа или елементи, описани с цели числа
wrong_answers:
  - Групи от комплексни числа или елементи, описани с комплексни числа
  - Групи от геометрични трансформации или елементи, описани чрез геометрични трансформации
  - Групи от рационални числа или елементи, описани с рационални числа
explanation: |
  Криптографията използва групи, базирани на цели числа, или елементи, описани с цели числа, като например точките на елиптична крива, за операции по криптиране и подписване.
reviewed: false
question: การค้นพบอื่นของนักวิจัยชาวอังกฤษที่ GCHQ ที่มาก่อนการค้นพบของ Diffie และ Hellman แต่ยังคงเป็นความลับคืออะไร?
answer: แนวคิดของการเข้ารหัสแบบอสมมาตรและการแลกเปลี่ยนกุญแจ
wrong_answers:
  - โปรโตคอลการเข้ารหัสแบบสมมาตรที่พัฒนาโดยไม่ต้องใช้กุญแจ
  - วิธีการใหม่ของการแฮชแบบอสมมาตรในวิทยาการเข้ารหัสลับ
  - วิธีการสร้างเงินอิเล็กทรอนิกส์
explanation: |
  นักเข้ารหัสชาวอังกฤษที่ทำงานให้กับ GCHQ ได้พัฒนาแนวคิดที่คล้ายคลึงกับของ Diffie และ Hellman อย่างอิสระ แต่ความก้าวหน้าเหล่านี้ยังคงเป็นความลับจนกระทั่งถูกเปิดเผยในปี 1997
reviewed: false
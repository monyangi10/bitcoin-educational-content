question: Кое друго британско откритие, направено от изследователи в GCHQ, е предшествало откритието на Дифи и Хелман, но е останало в тайна?
answer: Концепциите за асиметрична криптография и обмен на ключове
wrong_answers:
  - Протокол за симетрично криптиране, усъвършенстван без необходимост от ключ
  - Нов метод за асиметрично криптографско хеширане
  - Метод за създаване на електронни пари
explanation: |
  Британски криптографи, работещи за GCHQ, разработват самостоятелно идеи, подобни на тези на Дифи и Хелман, но тези постижения остават поверителни до разкриването им през 1997 г.
reviewed: false
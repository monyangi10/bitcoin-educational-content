question: GCHQ के शोधकर्ताओं ने Diffie और Hellman से पहले एक और ब्रिटिश खोज की थी, जो "public-key cryptography" (सार्वजनिक कुंजी कूटलेखन) की अवधारणा थी। यह खोज James H. Ellis, Clifford Cocks और Malcolm Williamson ने की थी, लेकिन यह गोपनीय (secret) रही क्योंकि यह GCHQ के अंदर ही सीमित थी।
answer: असममित क्रिप्टोग्राफी और की Exchange की अवधारणाएँ
wrong_answers:
  - एक सममित एन्क्रिप्शन प्रोटोकॉल जिसमें कुंजी की जरूरत नहीं होती
  - एक नया तरीका असममित क्रिप्टोग्राफिक हैशिंग का
  - इलेक्ट्रॉनिक पैसा बनाने की एक विधि
explanation: |
  GCHQ के लिए काम करने वाले ब्रिटिश क्रिप्टोग्राफर्स ने डिफी और हेलमैन के विचारों जैसे ही कुछ खुद विकसित किया, लेकिन यह प्रगति 1997 तक गोपनीय बनी रही जब तक कि इसे सार्वजनिक नहीं कर दिया गया।
reviewed: false
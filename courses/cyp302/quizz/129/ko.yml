question: 디피와 헬먼의 발견에 앞서 영국 GCHQ 연구원들이 발견했지만 비밀로 남아있던 또 다른 발견은 무엇이었나요?
answer: 비대칭 암호화와 키 Exchange의 개념
wrong_answers:
  - 키가 필요 없는 고급 대칭 암호화 프로토콜
  - 비대칭 암호화 해싱의 새로운 방법
  - 전자 화폐 생성 방법
explanation: |
  GCHQ에서 근무하던 영국의 암호학자들은 Diffie와 Hellman의 아이디어와 유사한 아이디어를 독자적으로 개발했지만, 이러한 발전은 1997년에 공개될 때까지 기밀로 유지되었습니다.
reviewed: false
question: สาขาคณิตศาสตร์ใดที่ให้เครื่องมือสมัยใหม่สำหรับทฤษฎีจำนวน?
answer: พีชคณิตนามธรรม
wrong_answers:
  - เรขาคณิต
  - สถิติ
  - การวิเคราะห์เชิงซ้อน
explanation: |
  พีชคณิตนามธรรม ในฐานะที่เป็นสาขาย่อยของคณิตศาสตร์ ให้โครงสร้างทางคณิตศาสตร์ที่ช่วยในการวิเคราะห์และทำความเข้าใจคุณสมบัติของตัวเลขที่ใช้ในทฤษฎีจำนวน
reviewed: false
question: Коя математическа област предоставя съвременните инструменти за теория на числата?
answer: Абстрактна алгебра
wrong_answers:
  - Геометрия
  - Статистика
  - Комплексен анализ
explanation: |
  Абстрактната алгебра, като поддисциплина на математиката, предоставя математически структури, които позволяват анализ и разбиране на свойствата на числата, използвани в теорията на числата.
reviewed: false
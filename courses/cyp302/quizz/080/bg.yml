question: Какво представлява поточният шифър в криптографията?
answer: Симетрично криптиране, при което се генерира поток от ключове със същата дължина като съобщението
wrong_answers:
  - Асиметрично криптиране, базирано на прости числа
  - Криптиране, при което се използват няколко различни ключа за декриптиране
  - Криптиране, което разделя съобщението на блокове данни
explanation: |
  Поточният шифър е симетрично криптиране, при което поток от ключове със същата дължина като съобщението се комбинира с последното, за да се получи криптираният текст.
reviewed: false
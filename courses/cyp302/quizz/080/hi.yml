question: क्रिप्टोग्राफी में स्ट्रीम सिफर क्या होता है?
answer: एक सममित एन्क्रिप्शन जो संदेश के बराबर लंबाई की कुंजियों की एक धारा उत्पन्न करता है
wrong_answers:
  - प्राइम नंबर्स पर आधारित एक असममित एन्क्रिप्शन
  - एक एन्क्रिप्शन जो कई अलग-अलग डिक्रिप्शन कुंजियों का उपयोग करता है
  - एक एन्क्रिप्शन जो मैसेज को डेटा ब्लॉक्स में बाँट देता है
explanation: |
  एक स्ट्रीम सिफर एक सममित एन्क्रिप्शन है जिसमें संदेश के बराबर लंबाई की कुंजियों की एक धारा को संदेश के साथ मिलाकर एन्क्रिप्टेड टेक्स्ट बनाया जाता है।
reviewed: false
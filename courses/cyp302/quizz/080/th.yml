question: สตรีมไซเฟอร์ในวิทยาการเข้ารหัสลับคืออะไร?
answer: การเข้ารหัสแบบสมมาตรที่สร้างสตรีมของคีย์ที่มีความยาวเท่ากับข้อความ
wrong_answers:
  - การเข้ารหัสแบบอสมมาตรที่ใช้เลขจำนวนเฉพาะ
  - การเข้ารหัสที่ใช้กุญแจถอดรหัสหลายแบบต่างกัน
  - การเข้ารหัสที่แบ่งข้อความออกเป็นบล็อกข้อมูล
explanation: |
  สตรีมไซเฟอร์เป็นการเข้ารหัสแบบสมมาตรซึ่งสตรีมของคีย์ที่มีความยาวเท่ากับข้อความจะถูกรวมเข้ากับข้อความเพื่อสร้างข้อความที่เข้ารหัส
reviewed: false
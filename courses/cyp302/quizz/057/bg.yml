question: Какво е абелова група?
answer: Група, в която операцията е комутативна
wrong_answers:
  - Група, която има уникален генератор
  - Група, ограничена до цели числа
  - Група без неутрален елемент
explanation: |
  Абеловата група е група, в която редът на елементите в операцията не влияе на резултата, т.е. тя се придържа към комутативността.
reviewed: false
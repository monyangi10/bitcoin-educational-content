question: एक एबेलियन ग्रुप क्या है?
answer: एक ऐसा समूह जिसमें ऑपरेशन कम्यूटेटिव होता है
wrong_answers:
  - एक ऐसा समूह जिसका एक अनोखा जनरेटर होता है
  - एक समूह जो केवल पूर्णांक संख्याओं तक सीमित है
  - एक समूह जिसमें कोई तटस्थ तत्व नहीं है
explanation: |
  एक अबेलियन ग्रुप वो ग्रुप होता है जिसमें ऑपरेशन में Elements का ऑर्डर रिजल्ट पर कोई असर नहीं डालता, यानी यह कम्यूटेटिविटी का पालन करता है।

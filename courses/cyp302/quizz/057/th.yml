question: กลุ่มอาเบลคืออะไร?
answer: กลุ่มที่การดำเนินการเป็นแบบสลับที่ได้
wrong_answers:
  - กลุ่มที่มีตัวสร้างเฉพาะ
  - กลุ่มที่จำกัดเฉพาะจำนวนเต็ม
  - กลุ่มที่ไม่มีธาตุเป็นกลาง
explanation: |
  กลุ่มอาเบเลียนคือกลุ่มที่ลำดับของสมาชิกในการดำเนินการไม่ส่งผลต่อผลลัพธ์ หมายความว่ามันปฏิบัติตามสมบัติการสลับที่ได้
reviewed: false
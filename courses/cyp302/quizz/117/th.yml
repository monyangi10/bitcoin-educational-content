question: Galois Fields ถูกใช้ในขั้นตอนใดของการเข้ารหัส AES?
answer: ในการแทนที่ไบต์และการดำเนินการ MixColumns
wrong_answers:
  - ในการสร้างคีย์ส่วนตัว
  - เมื่อแบ่งข้อความออกเป็นบล็อกขนาด 128 บิต
  - ในทุกขั้นตอนของการดำเนินการ XOR
explanation: |
  ฟิลด์ของกาลัวส์ถูกใช้ในการแทนที่ไบต์เพื่อคำนวณการผกผันการคูณและในกระบวนการ MixColumns เพื่อดำเนินการคูณโมดูโลพหุนามที่ไม่สามารถแยกตัวประกอบได้
reviewed: false
question: На кой етап от криптирането на AES се използват полета на Галоа?
answer: При заместване на байтове и операцията MixColumns
wrong_answers:
  - При генерирането на частния ключ
  - При разделяне на текста на 128-битови блокове
  - На всеки етап от операцията XOR
explanation: |
  Полетата на Галоа се използват при заместването на байтове за изчисляване на обратната мултипликация и при операцията MixColumns за извършване на умножения по модул на несводим полином.
reviewed: false
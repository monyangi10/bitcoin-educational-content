question: AES एन्क्रिप्शन में गैलोइस फील्ड्स (Galois Fields) का इस्तेमाल किस स्टेज पर होता है?
answer: बाइट प्रतिस्थापन और मिक्सकॉलम ऑपरेशन में
wrong_answers:
  - प्राइवेट की जनरेशन में
  - 128-बिट ब्लॉक में टेक्स्ट को डिवाइड करते समय
  - XOR ऑपरेशन के हर चरण में
explanation: |
  गैलोइस फील्ड्स का इस्तेमाल बाइट सब्स्टिट्यूशन में मल्टीप्लिकेटिव इनवर्स कैलकुलेट करने के लिए और मिक्सकॉलम्स ऑपरेशन में इर्रेड्यूसिबल पॉलिनोमियल के मॉड्यूलो पर गुणा करने के लिए किया जाता है।
reviewed: false
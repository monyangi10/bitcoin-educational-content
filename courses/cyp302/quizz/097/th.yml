question: ทำไมการรักษาความลับเพียงอย่างเดียวถึงไม่เพียงพอที่จะรับรองการสื่อสารที่ปลอดภัย?
answer: เนื่องจากผู้โจมตียังคงสามารถดักจับและแก้ไขข้อความได้โดยไม่ต้องเข้าใจเนื้อหาของมัน
wrong_answers:
  - เพราะความลับเป็นสิ่งที่ยากเกินกว่าจะได้รับ
  - เนื่องจากคีย์ส่วนตัวสามารถเดาได้ง่าย
  - เนื่องจากไม่สามารถยืนยันความถูกต้องของข้อความได้หากไม่มีลายเซ็นดิจิทัล
explanation: |
  การรักษาความลับช่วยปกป้องเนื้อหาของข้อความ แต่หากไม่มี MAC ผู้โจมตียังคงสามารถดักจับและแก้ไขข้อความได้โดยไม่ต้องเข้าใจ ซึ่งจะส่งผลกระทบต่อความสมบูรณ์ของการสื่อสาร
reviewed: false
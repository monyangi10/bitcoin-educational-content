question: Защо поверителността сама по себе си не е достатъчна за осигуряване на сигурна комуникация?
answer: Тъй като нападателят все още може да прихване и модифицира съобщението, без да разбере съдържанието му.
wrong_answers:
  - Защото е твърде трудно да се постигне поверителност.
  - Тъй като частните ключове могат лесно да бъдат отгатнати.
  - Тъй като съобщенията не могат да бъдат удостоверени без цифров подпис.
explanation: |
  Конфиденциалността защитава съдържанието на съобщенията, но без MAC нападателят може да прихване и промени съобщението, без да го разбере, като по този начин наруши целостта на комуникацията.
reviewed: false
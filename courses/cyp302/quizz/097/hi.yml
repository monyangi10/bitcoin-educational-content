question: केवल गोपनीयता (confidentiality) ही सुरक्षित संचार (secure communication) के लिए क्यों पर्याप्त नहीं है?
answer: क्योंकि हमलावर अभी भी संदेश को रोककर उसमें बदलाव कर सकता है, भले ही वह उसकी सामग्री को समझ न पाए।
wrong_answers:
  - क्योंकि गोपनीयता हासिल करना बहुत मुश्किल है।
  - क्योंकि प्राइवेट कीज़ आसानी से अंदाज़ा लगाया जा सकता है।
  - क्योंकि डिजिटल सिग्नेचर के बिना मैसेज की पुष्टि नहीं की जा सकती।
explanation: |
  गोपनीयता संदेशों की सामग्री को सुरक्षित रखती है, लेकिन MAC (मैसेज ऑथेंटिकेशन कोड) के बिना, एक हमलावर संदेश को समझे बिना भी उसे रोककर बदल सकता है, जिससे संचार की अखंडता खतरे में पड़ जाती है।
reviewed: false
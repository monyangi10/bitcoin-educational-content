question: 기밀성만으로는 안전한 커뮤니케이션을 보장하기에 충분하지 않은 이유는 무엇인가요?
answer: 공격자는 메시지 내용을 이해하지 못해도 메시지를 가로채서 수정할 수 있기 때문입니다.
wrong_answers:
  - 기밀을 유지하기가 너무 어렵기 때문입니다.
  - 개인 키는 쉽게 추측할 수 있기 때문입니다.
  - 디지털 서명이 없으면 메시지를 인증할 수 없기 때문입니다.
explanation: |
  기밀성은 메시지 내용을 보호하지만, MAC이 없으면 공격자가 메시지를 이해하지 못한 채 메시지를 가로채고 수정하여 통신의 무결성을 손상시킬 수 있습니다.
reviewed: false
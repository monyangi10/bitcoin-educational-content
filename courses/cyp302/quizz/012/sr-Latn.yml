question: Kakva je iluzija u vezi sa sigurnošću komunikacionih kanala u modernom svetu?
answer: Verovanje da fizička zaštita kanala sprečava presretanje
wrong_answers:
  - Mišljenje da su bežične mreže neefikasne
  - Verovanje da kriptografija nije neophodna za lokalne komunikacije
  - Samo nacionalne agencije mogu presretati podatke
explanation: |
  Iluzija je misliti da je samo fizičko osiguranje kanala dovoljno za obezbeđivanje poverljivosti, jer mnoge tačke presretanja ostaju dostupne, posebno za bežične komunikacije.
reviewed: true

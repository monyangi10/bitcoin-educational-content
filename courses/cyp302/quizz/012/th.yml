question: ภาพลวงตาเกี่ยวกับความปลอดภัยของช่องทางการสื่อสารในโลกสมัยใหม่คืออะไร?
answer: เชื่อว่าการปกป้องช่องทางทางกายภาพป้องกันการดักฟัง
wrong_answers:
  - คิดว่าเครือข่ายไร้สายไม่มีประสิทธิภาพ
  - เชื่อว่าการเข้ารหัสไม่จำเป็นสำหรับการสื่อสารในท้องถิ่น
  - พิจารณาว่ามีเพียงหน่วยงานระดับชาติเท่านั้นที่สามารถดักข้อมูลได้
explanation: |
  เป็นภาพลวงตาที่จะคิดว่าการรักษาความปลอดภัยช่องทางทางกายภาพเพียงอย่างเดียวเพียงพอที่จะรับรองความลับได้ เนื่องจากยังมีจุดดักฟังหลายจุดที่ยังคงเข้าถึงได้ โดยเฉพาะสำหรับการสื่อสารแบบไร้สาย
reviewed: false
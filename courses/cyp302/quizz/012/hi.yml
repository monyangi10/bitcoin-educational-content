question: आधुनिक दुनिया में संचार चैनलों की सुरक्षा के बारे में क्या भ्रम है?
answer: यह मानते हुए कि चैनल को शारीरिक रूप से सुरक्षित रखने से उसका इंटरसेप्शन रोका जा सकता है
wrong_answers:
  - यह सोचना कि वायरलेस नेटवर्क्स बेकार हैं
  - यह मानना कि स्थानीय संचार के लिए क्रिप्टोग्राफी की जरूरत नहीं है
  - यह सोचते हुए कि सिर्फ राष्ट्रीय एजेंसियाँ ही डेटा को इंटरसेप्ट कर सकती हैं
explanation: |
  यह सोचना एक भ्रम है कि सिर्फ चैनल को भौतिक रूप से सुरक्षित कर लेना गोपनीयता सुनिश्चित करने के लिए काफी है, क्योंकि अवरोधन के कई बिंदु खुले रहते हैं, खासकर वायरलेस संचार में।
reviewed: false
question: Каква е илюзията относно сигурността на комуникационните канали в съвременния свят?
answer: Убеждението, че физическата защита на канала предотвратява прихващането
wrong_answers:
  - Смятате, че безжичните мрежи са неефективни
  - Смятате, че криптографията не е необходима за местните комуникации
  - Като се има предвид, че само националните агенции могат да прихващат данни
explanation: |
  Илюзия е да се смята, че само физическата защита на канала е достатъчна, за да се осигури поверителност, тъй като много точки на прихващане остават достъпни, особено при безжичните комуникации.
reviewed: false
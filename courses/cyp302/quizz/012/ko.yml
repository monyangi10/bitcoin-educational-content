question: 현대 사회에서 커뮤니케이션 채널의 보안에 대한 환상은 무엇일까요?
answer: 물리적으로 채널을 보호하면 가로채기를 방지할 수 있다고 믿는 경우
wrong_answers:
  - 무선 네트워크가 비효율적이라고 생각하는 경우
  - 로컬 통신에 암호화가 필요하지 않다고 생각하는 경우
  - 국가 기관만 데이터를 가로챌 수 있다는 점을 고려하면
explanation: |
  특히 무선 통신의 경우 감청할 수 있는 지점이 많이 남아 있기 때문에 물리적으로 채널을 보호하는 것만으로 기밀성을 보장할 수 있다고 생각하는 것은 착각입니다.
reviewed: false
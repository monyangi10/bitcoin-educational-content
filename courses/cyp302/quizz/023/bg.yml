question: Каква е ролята на операцията модуло в шифроването с шифър на смяна?
answer: Тя гарантира, че буквите се връщат в началото на азбуката, когато се надхвърлят 26
wrong_answers:
  - Той умножава стойностите на буквите по ключа
  - Обръща буквите на азбуката
  - Той изтрива буквите след буквата Z
explanation: |
  Операцията модуло 26 позволява на буквите да се върнат обратно след Z, за да се гарантира, че всяка криптирана буква остава в рамките на 26-те букви на азбуката.
reviewed: false
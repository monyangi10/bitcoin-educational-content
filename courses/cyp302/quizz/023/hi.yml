question: शिफ्ट सिफर एन्क्रिप्शन में मॉड्यूलो ऑपरेशन की क्या भूमिका है?
answer: यह सुनिश्चित करता है कि जब अक्षर 26 से अधिक हो जाते हैं, तो वे वर्णमाला की शुरुआत में वापस आ जाते हैं।
wrong_answers:
  - यह अक्षरों के मान को कुंजी से गुणा करता है
  - यह अल्फाबेट के अक्षरों को उलट देता है
  - यह Z अक्षर के बाद वाले अक्षरों को डिलीट कर देता है
explanation: |
  मॉड्यूलो 26 ऑपरेशन से Z के बाद लेटर्स फिर से A से शुरू हो जाते हैं, ताकि एन्क्रिप्टेड लेटर हमेशा अल्फाबेट के 26 अक्षरों के भीतर ही रहे।
reviewed: false
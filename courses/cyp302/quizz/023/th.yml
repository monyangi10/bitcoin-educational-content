question: บทบาทของการดำเนินการโมดูโลในการเข้ารหัสแบบซีซาร์คืออะไร?
answer: มันทำให้แน่ใจว่าตัวอักษรจะกลับไปที่จุดเริ่มต้นของตัวอักษรเมื่อเกิน 26
wrong_answers:
  - มันคูณค่าตัวอักษรด้วยคีย์
  - มันกลับตัวอักษรของตัวอักษร
  - มันลบตัวอักษรหลังจากตัวอักษร Z
explanation: |
  การดำเนินการโมดูโล 26 ช่วยให้ตัวอักษรวนกลับหลังจาก Z เพื่อให้แน่ใจว่าตัวอักษรที่เข้ารหัสแต่ละตัวอยู่ภายใน 26 ตัวอักษรของตัวอักษร
reviewed: false
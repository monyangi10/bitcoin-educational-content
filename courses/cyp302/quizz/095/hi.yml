question: एक MAC (Message Authentication Code) ऐलिस को यह कैसे पुष्टि करने देता है कि संदेश वास्तव में बॉब से ही है?
answer: बॉब द्वारा भेजे गए टैग से मेल खाता है यह जाँचकर
wrong_answers:
  - संदेश को डिक्रिप्ट करके देखना कि क्या यह पढ़ने योग्य है
  - संदेश के आकार और टैग के आकार की तुलना करके
  - भेजने वाले के आईपी Address को वेरिफाई करके
explanation: |
  ऐलिस शेयर्ड सीक्रेट की का इस्तेमाल करके generate से प्राप्त मैसेज का टैग वेरिफाई करती है। अगर यह टैग बॉब द्वारा भेजे गए टैग से मिलता है, तो वह जान जाती है कि मैसेज ऑथेंटिक और बिना किसी बदलाव के है।
reviewed: false
question: Как MAC позволява на Alice да провери дали дадено съобщение наистина е от Bob?
answer: Проверява се дали генерираният етикет съвпада с този, изпратен от Bob
wrong_answers:
  - Чрез декриптиране на съобщението, за да се провери дали то може да бъде прочетено
  - Чрез сравняване на размера на съобщението и размера на етикета
  - Чрез проверка на IP адреса на подателя
explanation: |
  Alice използва споделения секретен ключ, за да създаде етикет на generate от полученото съобщение. Ако този таг съвпада с изпратения от Bob, тя знае, че съобщението е автентично и непокътнато.
reviewed: false
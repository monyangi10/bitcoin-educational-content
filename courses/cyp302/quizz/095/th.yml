question: MAC ช่วยให้ Alice ยืนยันได้อย่างไรว่าข้อความมาจาก Bob จริงหรือไม่?
answer: โดยตรวจสอบว่าแท็กที่สร้างขึ้นตรงกับแท็กที่ส่งโดย Bob
wrong_answers:
  - โดยการถอดรหัสข้อความเพื่อดูว่ามันสามารถอ่านได้หรือไม่
  - โดยการเปรียบเทียบขนาดของข้อความและขนาดของแท็ก
  - โดยการตรวจสอบที่อยู่ IP ของผู้ส่ง
explanation: |
  Alice ใช้คีย์ลับที่ใช้ร่วมกันกับ generate เพื่อตรวจสอบแท็กจากข้อความที่ได้รับ หากแท็กนี้ตรงกับที่ส่งโดย Bob เธอจะรู้ว่าข้อความนั้นเป็นของแท้และครบถ้วนสมบูรณ์
reviewed: false
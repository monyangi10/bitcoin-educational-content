question: Какво осигурява кодът за удостоверяване на съобщението (MAC) в криптографска схема?
answer: Цялостност и автентичност на съобщението
wrong_answers:
  - Поверителност на съобщението
  - Компресиране на съобщението
  - Преобразуване на съобщението в двоичен код
explanation: |
  Кодът за удостоверяване на автентичността на съобщението (MAC) се използва, за да се гарантира, че съобщението не е променено и че наистина идва от предполагаемия подател.

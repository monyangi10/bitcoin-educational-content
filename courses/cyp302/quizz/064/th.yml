question: Message Authentication Code (MAC) รับรองอะไรในโครงร่างการเข้ารหัสลับ?
answer: ความซื่อสัตย์และความแท้จริงของข้อความ
wrong_answers:
  - ความลับของข้อความ
  - การบีบอัดข้อความ
  - การแปลงข้อความเป็นไบนารี
explanation: |
  รหัสการยืนยันข้อความ (MAC) ถูกใช้เพื่อให้แน่ใจว่าข้อความไม่ได้ถูกแก้ไขและมาจากผู้ส่งที่คาดหวังจริงๆ
reviewed: false
question: एक मैसेज ऑथेंटिकेशन कोड (MAC) क्रिप्टोग्राफ़िक स्कीम में क्या सुनिश्चित करता है?
answer: संदेश की सत्यता और विश्वसनीयता
wrong_answers:
  - संदेश की गोपनीयता
  - संदेश का संपीड़न
  - संदेश को बाइनरी में बदलना
explanation: |
  एक मैसेज ऑथेंटिकेशन कोड (MAC) का इस्तेमाल यह सुनिश्चित करने के लिए किया जाता है कि मैसेज में कोई बदलाव नहीं हुआ है और यह वास्तव में उसी व्यक्ति/स्रोत से आया है जिससे आने की उम्मीद थी।
reviewed: false
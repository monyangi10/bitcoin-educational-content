question: Коя функция се използва за изчисляване на броя на целите числа, по-малки от N, които са равнозначни на N?
answer: Фи функция на Ойлер
wrong_answers:
  - Гама функция на Ойлер
  - Функцията Sigma на Ойлер
  - Бета функция на Дирихле
explanation: |
  Функцията Phi на Ойлер определя броя на целите числа, по-малки от N, които са коприми с N - централно понятие в криптографските теореми, основани на прости числа.
reviewed: false
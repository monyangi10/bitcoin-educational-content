question: कौन सा फंक्शन N से कम उन पूर्णांकों की संख्या निकालने के लिए इस्तेमाल होता है जो N के साथ कोप्राइम (coprime) होते हैं?
answer: यूलर का फाई फंक्शन
wrong_answers:
  - यूलर का गामा फंक्शन
  - यूलर का सिग्मा फ़ंक्शन
  - डिरिचले का बीटा फंक्शन
explanation: |
  यूलर का फ़ाई फंक्शन (Euler's Phi function) यह निर्धारित करता है कि N से छोटे कितने पूर्णांक (integers) ऐसे हैं जो N के साथ सह-अभाज्य (coprime) हैं। यह अभाज्य संख्याओं (prime numbers) पर आधारित क्रिप्टोग्राफ़ी प्रमेयों (cryptography theorems) में एक केंद्रीय अवधारणा है।

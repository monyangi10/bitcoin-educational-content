question: ฟังก์ชันใดที่ใช้ในการคำนวณจำนวนจำนวนเต็มที่น้อยกว่า N ที่เป็นจำนวนเฉพาะร่วมกับ N?
answer: ฟังก์ชันฟีของออยเลอร์
wrong_answers:
  - ฟังก์ชันแกมมาของออยเลอร์
  - ฟังก์ชันซิกมาของออยเลอร์
  - ฟังก์ชันบีตาของดิริชเลต์
explanation: |
  ฟังก์ชัน Phi ของออยเลอร์กำหนดจำนวนเต็มที่น้อยกว่า N ที่เป็นจำนวนเฉพาะกับ N ซึ่งเป็นแนวคิดสำคัญในทฤษฎีการเข้ารหัสที่อิงตามจำนวนเฉพาะ
reviewed: false
question: Alice과 Bob 간의 통신 맥락에서 비대칭 암호화의 주요 목표는 무엇인가요?
answer: Bob이 공개 키를 사용하여 Alice에게 비밀 메시지를 전송할 수 있도록 하려면 다음과 같이 하세요
wrong_answers:
  - Bob가 공개 키 없이 메시지를 암호화 및 복호화할 수 있도록 하려면 다음과 같이 하세요
  - Alice가 Bob의 메시지를 해독하지 못하도록 하려면 다음과 같이 하세요
  - Alice이 메시지를 암호화하여 무결성을 확인하도록 허용하려면 다음과 같이 하세요
explanation: |
  비대칭 암호화에서 Alice의 공개 키는 Bob가 자신만 해독할 수 있는 암호화된 메시지를 전송할 수 있도록 하여 메시지의 기밀성을 보장합니다.

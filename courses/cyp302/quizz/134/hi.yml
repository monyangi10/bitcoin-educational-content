question: एकतरफा क्रिप्टोग्राफी (असिमेट्रिक क्रिप्टोग्राफी) का मुख्य मकसद एलिस और बॉब के बीच सुरक्षित संचार सुनिश्चित करना है। इसमें दो अलग-अलग कुंजियाँ (keys) होती हैं - एक सार्वजनिक (public key) और एक निजी (private key)। सार्वजनिक कुंजी से मैसेज को एन्क्रिप्ट किया जाता है, जबकि निजी कुंजी से डिक्रिप्ट किया जाता है। इस तरह, बिना सीक्रेट की शेयरिंग के भी सुरक्षित कम्युनिकेशन हो पाता है।
answer: बॉब को ऐलिस के पब्लिक की का इस्तेमाल करके उसे एक सीक्रेट मैसेज भेजने की अनुमति देने के लिए
wrong_answers:
  - बॉब को बिना पब्लिक की के मैसेज एन्क्रिप्ट और डिक्रिप्ट करने की अनुमति देने के लिए
  - ऐलिस को बॉब के मैसेजेस को डिक्रिप्ट करने से रोकने के लिए
  - ऐलिस को मैसेज की सत्यता जांचने के लिए उसे एन्क्रिप्ट करने की अनुमति देना
explanation: |
  असममित क्रिप्टोग्राफी में, ऐलिस की पब्लिक की बॉब को एक एन्क्रिप्टेड मैसेज भेजने में मदद करती है जिसे सिर्फ वही डिक्रिप्ट कर सकती है, इस तरह मैसेज की कॉन्फिडेंशियलिटी सुनिश्चित होती है।
reviewed: false
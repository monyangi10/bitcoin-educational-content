question: เป้าหมายหลักของการเข้ารหัสแบบอสมมาตรในบริบทของการสื่อสารระหว่าง Alice และ Bob คืออะไร?
answer: เพื่อให้ Bob สามารถส่งข้อความลับไปยัง Alice โดยใช้กุญแจสาธารณะของเธอ
wrong_answers:
  - เพื่อให้ Bob สามารถเข้ารหัสและถอดรหัสข้อความได้โดยไม่ต้องใช้กุญแจสาธารณะ
  - เพื่อป้องกันไม่ให้ Alice ถอดรหัสข้อความของ Bob
  - เพื่อให้ Alice เข้ารหัสข้อความเพื่อยืนยันความสมบูรณ์ของข้อความ
explanation: |
  ในวิทยาการเข้ารหัสลับแบบอสมมาตร คีย์สาธารณะของ Alice ช่วยให้ Bob สามารถส่งข้อความที่เข้ารหัสซึ่งมีเพียงเธอเท่านั้นที่สามารถถอดรหัสได้ จึงมั่นใจได้ในความลับของข้อความ
reviewed: false
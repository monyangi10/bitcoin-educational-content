question: Каква е основната цел на асиметричната криптография в контекста на комуникацията между Alice и Bob?
answer: За да се позволи на Bob да предаде тайно съобщение на Alice, като използва нейния публичен ключ
wrong_answers:
  - Да се позволи на Bob да криптира и декриптира съобщения без публичен ключ
  - За да се предотврати декриптирането на съобщенията на Alice от Bob
  - Да се позволи на Alice да криптира съобщението, за да провери неговата цялост
explanation: |
  При асиметричната криптография публичният ключ на Alice позволява на Bob да изпрати криптирано съобщение, което само тя може да декриптира, като по този начин гарантира поверителността на съобщението.
reviewed: false
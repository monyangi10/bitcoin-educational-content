question: ความสำคัญของกลุ่มเชิงวงจรในวิทยาการเข้ารหัสลับคืออะไร?
answer: พวกเขาอนุญาตให้สร้างระบบการเข้ารหัสที่อิงตามตัวสร้าง
wrong_answers:
  - พวกเขาทำให้การคูณของกุญแจเข้ารหัสง่ายขึ้น
  - พวกเขาเพิ่มความปลอดภัยของช่องทางการสื่อสารสาธารณะ
  - พวกมันถูกใช้ในการแฮชข้อความโดยตรงเพื่อรักษาความสมบูรณ์ของข้อความ
explanation: |
  ในวิทยาการเข้ารหัสลับ กลุ่มเชิงวงจรที่มีตัวสร้างมีความสำคัญสำหรับการสร้างฐานสำหรับกุญแจการเข้ารหัส โดยเฉพาะในระบบกุญแจสาธารณะ
reviewed: false
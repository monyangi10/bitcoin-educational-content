question: Ni nini umuhimu wa vikundi vya mzunguko katika kriptografia?
answer: Wanaruhusu kuundwa kwa mifumo ya kriptografia inayotegemea jenereta
wrong_answers:
  - Wanarahisisha kuzidisha funguo za usimbuaji
  - Wanaongeza usalama wa njia za mawasiliano ya umma
  - Zinatumika kwa jumbe za Hash moja kwa moja ili kuhifadhi uadilifu wao
explanation: |
  Katika kriptografia, vikundi vya mzunguko, vina jenereta, ni muhimu kwa kuanzisha misingi ya funguo za usimbuaji, haswa katika mifumo muhimu ya umma.
reviewed: true

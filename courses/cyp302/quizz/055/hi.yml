question: साइक्लिक ग्रुप्स का क्रिप्टोग्राफी में क्या महत्व है?
answer: वे जनरेटर पर आधारित क्रिप्टोग्राफिक सिस्टम बनाने की अनुमति देते हैं
wrong_answers:
  - वे एन्क्रिप्शन कीज़ के गुणा को आसान बना देते हैं
  - वे सार्वजनिक संचार चैनलों की सुरक्षा बढ़ाते हैं
  - वे Hash संदेशों को सीधे उनकी अखंडता बनाए रखने के लिए इस्तेमाल करते हैं
explanation: |
  क्रिप्टोग्राफी में, साइक्लिक ग्रुप्स, जिनमें जनरेटर्स होते हैं, एन्क्रिप्शन कीज़ के लिए बेस स्थापित करने के लिए बहुत ज़रूरी होते हैं, खासकर पब्लिक की सिस्टम्स में।
reviewed: false
question: U Bitcoin transakciji, koja tehnologija se obično koristi za dokazivanje Ownership sredstava otključavanjem skripte?
answer: Digitalni potpisi
wrong_answers:
  - Digitalni sertifikati
  - Simetrično šifrovanje
  - Kodovi za autentifikaciju poruka (MAC)
explanation: |
  Digitalni potpisi u Bitcoin dokazuju posedovanje sredstava potpisivanjem transakcija privatnim ključem kako bi se otključao skript koji obezbeđuje UTXO.
reviewed: false
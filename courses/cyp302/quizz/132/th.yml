question: ในธุรกรรม Bitcoin เทคโนโลยีใดที่มักใช้เพื่อพิสูจน์ความเป็นเจ้าของเงินโดยการปลดล็อกสคริปต์?
answer: ลายเซ็นดิจิทัล
wrong_answers:
  - ใบรับรองดิจิทัล
  - การเข้ารหัสแบบสมมาตร
  - รหัสการพิสูจน์ตัวตนของข้อความ (MAC)
explanation: |
  ลายเซ็นดิจิทัลใน Bitcoin พิสูจน์การครอบครองเงินโดยการลงนามธุรกรรมด้วยกุญแจส่วนตัวเพื่อปลดล็อกสคริปต์ที่รักษาความปลอดภัย UTXO
reviewed: false
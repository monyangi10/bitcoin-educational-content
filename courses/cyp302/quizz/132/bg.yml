question: При транзакция Bitcoin коя технология обикновено се използва за доказване на собствеността върху средствата чрез отключване на скрипта?
answer: Цифрови подписи
wrong_answers:
  - Цифрови сертификати
  - Симетрично криптиране
  - Кодове за автентификация на съобщения (MAC)
explanation: |
  Цифровите подписи в Bitcoin доказват притежаването на средства чрез подписване на транзакции с частен ключ, за да се отключи скриптът, който защитава UTXO.
reviewed: false
question: Bitcoin लेन-देन में, फंड्स का Ownership साबित करने के लिए आमतौर पर कौन सी टेक्नोलॉजी इस्तेमाल की जाती है जब स्क्रिप्ट को अनलॉक किया जाता है?
answer: डिजिटल हस्ताक्षर
wrong_answers:
  - डिजिटल सर्टिफिकेट्स
  - सममित एन्क्रिप्शन
  - संदेश प्रमाणीकरण कोड (एमएसी)
explanation: |
  Bitcoin में डिजिटल सिग्नेचर ये साबित करते हैं कि फंड्स का मालिकाना हक है, जो एक प्राइवेट की से ट्रांजैक्शन्स पर सिग्नेचर करके UTXO को सुरक्षित करने वाले स्क्रिप्ट को अनलॉक करता है।
reviewed: false
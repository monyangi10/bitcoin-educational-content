question: 블록 암호는 어떻게 스트림 암호로 변환할 수 있나요?
answer: 블록 암호에서 키 스트림을 generate하는 OFB와 같은 모드를 사용하여
wrong_answers:
  - 평문 텍스트를 바이트 단위로 나누어 하나씩 암호화합니다
  - 암호화하기 전에 메시지에 패딩 적용하기
  - 각 암호화된 블록의 키 길이를 늘림으로써
explanation: |
  OFB와 같은 모드에서는 블록 암호가 키 스트림을 생성하여 스트림 암호처럼 작동할 수 있으며, 이 키 스트림은 평문 텍스트의 각 부분에 사용됩니다.
reviewed: false
question: Как един блоков шифър може да бъде трансформиран в поточен шифър?
answer: Чрез използване на режими като OFB, който generate поток от ключове от блоковия шифър
wrong_answers:
  - Чрез разделяне на открития текст на байтове и криптирането им един по един
  - Чрез прилагане на подложка към съобщенията преди криптиране
  - Чрез увеличаване на дължината на ключа за всеки криптиран блок
explanation: |
  Режими като OFB позволяват на блоковия шифър да действа като поточен шифър, като генерира ключов поток, който след това се използва за всяка част от открития текст.
reviewed: false
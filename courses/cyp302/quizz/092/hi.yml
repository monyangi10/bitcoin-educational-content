question: एक ब्लॉक सिफर को स्ट्रीम सिफर में कैसे बदला जा सकता है?
answer: OFB जैसे मोड्स का इस्तेमाल करके generate ब्लॉक सिफर से एक की स्ट्रीम बनाता है
wrong_answers:
  - प्लेनटेक्स्ट को बाइट्स में बाँटकर और उन्हें एक-एक करके एन्क्रिप्ट करके
  - मैसेज को एन्क्रिप्ट करने से पहले पैडिंग लगाकर
  - हर एन्क्रिप्टेड ब्लॉक के लिए की लंबाई बढ़ाकर
explanation: |
  OFB जैसे मोड्स ब्लॉक सिफर को स्ट्रीम सिफर की तरह काम करने देते हैं, जहाँ एक की स्ट्रीम जनरेट होती है और फिर हर प्लेनटेक्स्ट के हिस्से के लिए इस्तेमाल की जाती है।
reviewed: false
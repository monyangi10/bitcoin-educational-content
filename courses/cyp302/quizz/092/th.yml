question: จะเปลี่ยนบล็อกไซเฟอร์ให้เป็นสตรีมไซเฟอร์ได้อย่างไร?
answer: โดยใช้โหมดเช่น OFB ที่ generate สตรีมคีย์จากบล็อกไซเฟอร์
wrong_answers:
  - โดยการแบ่งข้อความธรรมดาออกเป็นไบต์และเข้ารหัสทีละไบต์
  - โดยการเพิ่มแพดดิ้งให้กับข้อความก่อนการเข้ารหัส
  - โดยการเพิ่มความยาวของคีย์สำหรับแต่ละบล็อกที่เข้ารหัส
explanation: |
  โหมดอย่าง OFB ช่วยให้บล็อกไซเฟอร์ทำงานเหมือนสตรีมไซเฟอร์โดยการสร้างสตรีมคีย์ ซึ่งจะถูกใช้สำหรับแต่ละส่วนของข้อความธรรมดา
reviewed: false
question: किसने रॉबर्ट मॉरिस को सुरक्षित रखने के लिए एक लोहे का बक्सा सौंपा था?
answer: थॉमस जे. बील
wrong_answers:
  - जे.बी. वार्ड
  - साइमन सिंह
  - एंड्रू एलन
explanation: |
  यह थॉमस जे. बील थे जिन्होंने एक लोहे का बक्सा जिसमें एन्क्रिप्टेड दस्तावेज़ और एक नोट था, रॉबर्ट मॉरिस को सौंपा था, और उन्हें अपनी वापसी न होने की स्थिति में दिए गए निर्देश दिए थे।
reviewed: false
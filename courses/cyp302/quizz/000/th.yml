question: ใครที่ฝากกล่องเหล็กไว้กับเจ้าของโรงแรม Robert Morriss เพื่อการเก็บรักษา?
answer: โทมัส เจ. บีล
wrong_answers:
  - เจ.บี. วอร์ด
  - ไซมอน ซิงห์
  - แอนดรูว์ อัลเลน
explanation: |
  มันคือ Thomas J. Beale ที่ส่งมอบกล่องเหล็กที่มีเอกสารเข้ารหัสและบันทึกให้กับ Robert Morriss โดยให้คำแนะนำแก่เขาในกรณีที่เขาไม่กลับมา
reviewed: false
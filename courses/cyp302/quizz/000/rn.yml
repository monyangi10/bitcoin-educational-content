question: Ni nde yashize isandugu y’icuma umukuru w’inzu y’abashitsi yitwa Robert Morriss kugira ngo ayizigame?
answer: Tomasi J. Biyali
wrong_answers:
  - J.B. Uwadi
  - Simoni
  - Andereya Aleni
explanation: |
  Thomas J. Beale ni we yahaye Robert Morriss isandugu y’icuma yarimwo inyandiko zifise amajambo apfutse be n’agapapuro, akamuha amabwirizwa mu gihe yoba atagarutse.

question: Wie vertrouwde de herbergier Robert Morriss een ijzeren kist toe?
answer: Thomas J. Beale
wrong_answers:
  - J.B. Ward
  - Simon Singh
  - Andrew Allen
explanation: |
  Het was Thomas J. Beale die een ijzeren doos met gecodeerde documenten en een briefje overhandigde aan Robert Morriss, met instructies voor het geval hij niet zou terugkeren.
reviewed: false
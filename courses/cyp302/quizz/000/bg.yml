question: Кой поверява на гостилничаря Робърт Морис желязна кутия за съхранение?
answer: Томас Джей Бил
wrong_answers:
  - J.B. Ward
  - Саймън Сингх
  - Андрю Алън
explanation: |
  Томас Джей Бил е този, който предава желязна кутия с криптирани документи и бележка на Робърт Морис, в която му дава инструкции в случай, че не се върне.
reviewed: false
question: Kto powierzył żelazną skrzynię na przechowanie karczmarzowi Robertowi Morrissowi?
answer: Thomas J. Beale
wrong_answers:
  - J.B. Ward
  - Simon Singh
  - Andrew Allen
explanation: |
  To Thomas J. Beale przekazał Robertowi Morrissowi żelazną skrzynkę zawierającą zaszyfrowane dokumenty i notatkę z instrukcjami na wypadek, gdyby nie wrócił.
reviewed: false
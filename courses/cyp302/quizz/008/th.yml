question: สาขาของการเข้ารหัสที่ใช้คู่ของกุญแจสาธารณะและกุญแจส่วนตัวเรียกว่าอะไร?
answer: การเข้ารหัสแบบอสมมาตร
wrong_answers:
  - การเข้ารหัสแบบสมมาตร
  - การเข้ารหัสเชิงเดี่ยว
  - การเข้ารหัสเชิงบูรณาการ
explanation: |
  การเข้ารหัสแบบอสมมาตรขึ้นอยู่กับการใช้คู่กุญแจ ซึ่งประกอบด้วยกุญแจสาธารณะและกุญแจส่วนตัว ทำให้สามารถเข้ารหัสได้โดยไม่ต้องแบ่งปันกุญแจลับ
reviewed: false
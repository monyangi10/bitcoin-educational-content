question: Как се нарича клонът на криптографията, който използва двойка публичен и частен ключ?
answer: Асиметрична криптография
wrong_answers:
  - Симетрична криптография
  - Моноалгоритмична криптография
  - Интегративна криптография
explanation: |
  Асиметричната криптография се основава на използването на двойка ключове - публичен и частен, които позволяват криптиране, без да се споделя тайният ключ.

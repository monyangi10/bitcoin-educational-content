question: क्रिप्टोग्राफी की वह शाखा जो सार्वजनिक और निजी कुंजियों की एक जोड़ी का उपयोग करती है, उसे क्या कहते हैं?
answer: असममित क्रिप्टोग्राफी
wrong_answers:
  - सममित क्रिप्टोग्राफी
  - मोनो-एल्गोरिदमिक क्रिप्टोग्राफी
  - एकीकृत क्रिप्टोग्राफी
explanation: |
  असममित क्रिप्टोग्राफी में एक सार्वजनिक और एक निजी कुंजी के जोड़े का उपयोग होता है, जिससे बिना कोई गुप्त कुंजी साझा किए एन्क्रिप्शन संभव होता है।
reviewed: false
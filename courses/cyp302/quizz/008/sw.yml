question: Tawi la kriptografia linalotumia jozi ya funguo za umma na za kibinafsi linaitwaje?
answer: Kriptografia isiyolinganishwa
wrong_answers:
  - Kriptografia linganifu
  - Usimbaji fiche wa mono-algoritiic
  - Kriptografia jumuishi
explanation: |
  Usimbaji fiche usiolinganishwa unatokana na matumizi ya jozi ya funguo, za umma na za faragha, zinazoruhusu usimbaji fiche bila kushiriki ufunguo wa siri.
reviewed: true

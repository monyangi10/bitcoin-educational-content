question: ทำไมการเข้ารหัสแบบเลื่อนถึงถือว่าเป็นการเข้ารหัสแบบสมมาตร?
answer: เนื่องจากใช้กุญแจเดียวกันทั้งในการเข้ารหัสและถอดรหัส
wrong_answers:
  - เนื่องจากมันใช้กุญแจสองดอก คือ สาธารณะและส่วนตัว
  - เพราะมันถอดรหัสโดยไม่ใช้กุญแจ
  - เนื่องจากคีย์จะแตกต่างกันไปในแต่ละการเข้ารหัส
explanation: |
  การเข้ารหัสแบบ Shift ถือเป็นการเข้ารหัสแบบสมมาตรเพราะใช้กุญแจเดียวกันในการเข้ารหัสและถอดรหัสข้อความ ซึ่งช่วยให้มั่นใจในความลับระหว่างฝ่ายที่แชร์กุญแจนี้
reviewed: false
question: Защо шифроването на смяна се счита за симетрично шифроване?
answer: Тъй като един и същ ключ се използва за криптиране и декриптиране
wrong_answers:
  - Тъй като използва два ключа - публичен и частен
  - Тъй като декриптира без използване на ключ
  - Тъй като ключът се променя при всяко криптиране
explanation: |
  Шифровото криптиране се счита за симетрично криптиране, тъй като използва един и същ ключ за криптиране и декриптиране на съобщението, като по този начин осигурява поверителност между страните, които споделят този ключ.
reviewed: false
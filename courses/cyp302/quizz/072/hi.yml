question: शिफ्ट एन्क्रिप्शन को सिमेट्रिक एन्क्रिप्शन क्यों माना जाता है?
answer: क्योंकि एक ही चाबी (की) का इस्तेमाल एन्क्रिप्शन और डिक्रिप्शन दोनों के लिए किया जाता है
wrong_answers:
  - क्योंकि यह दो चाबियों का इस्तेमाल करता है, सार्वजनिक और निजी
  - क्योंकि यह बिना किसी कुंजी के डिक्रिप्ट हो जाता है
  - क्योंकि हर बार एन्क्रिप्शन के साथ चाबी बदलती है
explanation: |
  शिफ्ट एन्क्रिप्शन को सिमेट्रिक एन्क्रिप्शन माना जाता है क्योंकि यह मैसेज को एन्क्रिप्ट और डिक्रिप्ट करने के लिए एक ही की का इस्तेमाल करता है, जिससे इस की को शेयर करने वाले पार्टियों के बीच कॉन्फिडेंशियलिटी सुनिश्चित होती है।
reviewed: false
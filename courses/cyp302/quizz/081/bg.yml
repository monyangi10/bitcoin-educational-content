question: Коя операция обикновено се използва за комбиниране на ключовия поток и съобщението в поточен шифър?
answer: XOR
wrong_answers:
  - Умножение
  - Модулно преместване
  - Замяна на всяка буква
explanation: |
  В поточния шифър операцията XOR обикновено се използва за комбиниране на ключовия поток със съобщението, тъй като е проста и обратима.
reviewed: false
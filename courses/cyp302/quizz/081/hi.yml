question: स्ट्रीम सिफर में कीस्ट्रीम और मैसेज को कॉम्बाइन करने के लिए आमतौर पर कौन सा ऑपरेशन इस्तेमाल होता है?
answer: एक्सओआर
wrong_answers:
  - गुणा
  - मॉड्यूलर शिफ्टिंग
  - हर अक्षर का प्रतिस्थापन
explanation: |
  स्ट्रीम सिफर में, XOR ऑपरेशन आमतौर पर कीस्ट्रीम को मैसेज के साथ जोड़ने के लिए इस्तेमाल किया जाता है क्योंकि यह सरल और उलटा योग्य (रिवर्सिबल) होता है।
reviewed: false
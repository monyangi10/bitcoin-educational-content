question: การดำเนินการใดที่มักใช้ในการรวม keystream และข้อความใน stream cipher?
answer: XOR
wrong_answers:
  - การคูณ
  - การเลื่อนแบบโมดูลาร์
  - การแทนที่ของแต่ละตัวอักษร
explanation: |
  ในรหัสลับแบบสตรีม การดำเนินการ XOR มักถูกใช้เพื่อรวมคีย์สตรีมกับข้อความเนื่องจากมันง่ายและสามารถย้อนกลับได้
reviewed: false
question: Nonce की भूमिका प्रमाणित एन्क्रिप्शन स्कीम में क्या है?
answer: हर मैसेज को दोहराव से बचाने के लिए एक अलग टैग जरूर दें।
wrong_answers:
  - संदेश भेजने वाले की पहचान करें
  - एक अस्थायी डिक्रिप्शन कुंजी बनाएं
  - एक अतिरिक्त Layer एन्क्रिप्शन जोड़ें
explanation: |
  एक ऑथेंटिकेटेड एन्क्रिप्शन स्कीम में, Nonce का इस्तेमाल यह सुनिश्चित करने के लिए किया जाता है कि हर मैसेज का एक यूनिक टैग हो, जिससे रिपीटिशन को रोककर सिक्योरिटी बढ़ाई जाती है।

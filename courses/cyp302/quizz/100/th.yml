question: บทบาทของ nonce ในโครงร่างการเข้ารหัสที่มีการรับรองความถูกต้องคืออะไร?
answer: ตรวจสอบให้แน่ใจว่าแต่ละข้อความมีแท็กที่ไม่ซ้ำกันเพื่อป้องกันการซ้ำกัน
wrong_answers:
  - ระบุผู้ส่งข้อความ
  - สร้างคีย์ถอดรหัสชั่วคราว
  - เพิ่มชั้นการเข้ารหัสเพิ่มเติม
explanation: |
  ในโครงร่างการเข้ารหัสที่มีการตรวจสอบสิทธิ์ จะใช้ nonce เพื่อให้แน่ใจว่าแต่ละข้อความมีแท็กที่ไม่ซ้ำกัน ซึ่งจะช่วยเพิ่มความปลอดภัยโดยการป้องกันการทำซ้ำ
reviewed: false
question: Koja je uloga Nonce-a u šemi autentifikovane enkripcije?
answer: Osiguravanje da svaka poruka ima jedinstvenu oznaku kako bi se sprečile ponavljanja.
wrong_answers:
  - Identifikacija pošiljaoca poruke
  - Kreiranje privremenog ključa za dešifrovanje
  - Dodavanje dodatnog sloja enkripcije
explanation: |
  U šemi autentifikovane enkripcije, Nonce se koristi kako bi se osiguralo da svaka poruka ima jedinstvenu oznaku, čime se poboljšava sigurnost sprečavanjem ponavljanja.
reviewed: true

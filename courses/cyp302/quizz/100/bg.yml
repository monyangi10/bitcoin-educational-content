question: Каква е ролята на nonce в схема за удостоверено криптиране?
answer: Уверете се, че всяко съобщение има уникален етикет, за да предотвратите повторения
wrong_answers:
  - Идентифициране на подателя на съобщението
  - Създаване на временен ключ за декриптиране
  - Добавяне на допълнително ниво на криптиране
explanation: |
  В схемата за удостоверено криптиране се използва нонсе, за да се гарантира, че всяко съобщение има уникален етикет, като по този начин се повишава сигурността чрез предотвратяване на повторения.
reviewed: false
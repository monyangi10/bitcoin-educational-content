question: สองจำนวนเป็นจำนวนเฉพาะร่วมกันหมายความว่าอย่างไร?
answer: ตัวหารร่วมมากที่สุดของพวกเขาเท่ากับ 1
wrong_answers:
  - ผลรวมของพวกเขาเป็นเลขคู่
  - พวกมันทั้งคู่เป็นเลขคู่
  - พวกเขาไม่มีตัวหารร่วมอื่นใดนอกจาก 1 และตัวมันเอง
explanation: |
  ตัวเลขสองจำนวนเป็นจำนวนเฉพาะร่วมกันหากตัวหารร่วมมากที่สุดของพวกมันคือ 1 หมายความว่าพวกมันไม่มีปัจจัยเฉพาะร่วมกัน ซึ่งเป็นคุณสมบัติที่สำคัญในวิทยาการเข้ารหัสลับ
reviewed: false
question: Какво означава две числа да са равнозначни?
answer: Най-големият им общ делител е равен на 1
wrong_answers:
  - Техният сбор е четно число
  - И двамата са дори
  - Те нямат общи делители, освен 1 и себе си
explanation: |
  Две числа са равнозначни, ако най-големият им общ делител е 1, което означава, че нямат общи прости множители - важно свойство в криптографията.
reviewed: false
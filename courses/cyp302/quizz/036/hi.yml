question: दो नंबर्स को कोप्राइम कहा जाता है जब उनका सबसे बड़ा सामान्य भाजक (GCD) 1 होता है। यानी, 1 के अलावा उनका कोई और सामान्य भाजक नहीं होता।  

उदाहरण के लिए:  
- 8 और 15 कोप्राइम हैं क्योंकि उनका GCD 1 है।  
- 9 और 12 कोप्राइम नहीं हैं क्योंकि उनका GCD 3 है।  

इसे "अपेक्षाकृत अभाज्य" (relatively prime) भी कहते हैं।
answer: उनका सबसे बड़ा सामान्य भाजक 1 के बराबर है
wrong_answers:
  - उनका जोड़ एक सम संख्या है
  - वे दोनों बराबर हैं
  - उनके पास 1 और खुद के अलावा कोई साझा भाजक नहीं है।
explanation: |
  दो नंबर्स को-प्राइम (coprime) कहलाते हैं अगर उनका सबसे बड़ा कॉमन डिवाइज़र (GCD) 1 हो, यानी उनमें कोई भी प्राइम फैक्टर शेयर नहीं होता। क्रिप्टोग्राफी में यह एक अहम प्रॉपर्टी है।

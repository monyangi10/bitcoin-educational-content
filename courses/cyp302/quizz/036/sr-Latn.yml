question: Šta znači da su dva broja međusobno prosta?
answer: Njihov najveći zajednički delilac je jednak 1
wrong_answers:
  - Njihov zbir je paran broj
  - Oba su parni
  - Nemaju zajedničkih delilaca osim 1 i njih samih
explanation: |
  Dva broja su međusobno prosta ako je njihov najveći zajednički delilac 1, što znači da ne dele nijedan prost faktor, što je važna osobina u kriptografiji.

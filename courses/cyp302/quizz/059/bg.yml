question: Кой френски математик въвежда концепцията за групите през XIX в.?
answer: Еварист Галоа
wrong_answers:
  - Анри Поанкаре
  - Пиер-Симон Лаплас
  - Жозеф Фурие
explanation: |
  Еварист Галоа разработва теорията на групите, за да изследва решенията на полиномни уравнения от степен, по-висока от пет.

question: Ni uwuhe muhinga mu vy’imibare w’Umufaransa yashizeho iciyumviro c’imigwi mu kinjana ca 19?
answer: Evariste Galois
wrong_answers:
  - Henri Poinkare
  - Piyeri-Simoni Laplasi
  - Yozefu Furiye
explanation: |
  Évariste Galois yarateguye inyigisho y’imigwi kugira ngo yige inyishu z’imirongo myinshi y’ingero zirengeye zitanu.

question: 19वीं सदी में फ्रांसीसी गणितज्ञ Évariste Galois ने समूह (groups) की अवधारणा पेश की थी।
answer: एवारिस्ट गाल्वा
wrong_answers:
  - हेनरी प्वांकारे
  - पियरे-साइमन लाप्लास
  - जोसेफ फूरियर
explanation: |
  एवारिस्ट गैलोआ ने पाँच से ज़्यादा डिग्री वाले बहुपद समीकरणों के हल को समझने के लिए समूह सिद्धांत विकसित किया।
reviewed: false
question: दो पूर्णांकों को एक-दूसरे के सापेक्ष "कोप्राइम" (coprime) कहा जाता है जब उनका महत्तम समापवर्तक (GCD) 1 होता है। यानी, अगर दो संख्याओं का सबसे बड़ा साझा भाजक केवल 1 हो, तो वे कोप्राइम होती हैं।  

उदाहरण के लिए:  
- 8 और 15 कोप्राइम हैं क्योंकि उनका GCD 1 है।  
- 9 और 12 कोप्राइम नहीं हैं क्योंकि उनका GCD 3 है।  

इसे "अपेक्षाकृत अभाज्य" (relatively prime) भी कहते हैं।
answer: एक पूर्णांक जिसका दूसरे पूर्णांक के साथ महत्तम समापवर्तक 1 हो
wrong_answers:
  - एक पूर्णांक जो दूसरे पूर्णांक से बिना किसी शेषफल के विभाज्य होता है
  - एक पूर्णांक जो अभाज्य है
  - एक पूर्णांक जो दूसरे से बड़ा है
explanation: |
  एक पूर्णांक दूसरे पूर्णांक के साथ सह-अभाज्य (coprime) होता है अगर उनका महत्तम समापवर्तक (greatest common divisor) 1 हो, यानी उनमें कोई और साझा गुणनखंड नहीं होता।

question: Каква е дефиницията на това, че едно цяло число е равно на друго цяло число?
answer: Цяло число, което има най-голям общ делител 1 с друго цяло число
wrong_answers:
  - Цяло число, което се дели на друго цяло число без остатък
  - Цяло число, което е просто
  - Цяло число, което е по-голямо от другото
explanation: |
  Едно цяло число е равно на друго, ако най-големият им общ делител е 1, т.е. нямат друг общ фактор.

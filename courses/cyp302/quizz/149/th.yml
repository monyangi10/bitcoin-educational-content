question: นิยามของจำนวนเต็มที่เป็น coprime กับจำนวนเต็มอีกจำนวนหนึ่งคืออะไร?
answer: จำนวนเต็มที่มีตัวหารร่วมมากที่สุดเป็น 1 กับจำนวนเต็มอื่นนั้น
wrong_answers:
  - จำนวนเต็มที่หารด้วยจำนวนเต็มอื่นลงตัว
  - จำนวนเต็มที่เป็นจำนวนเฉพาะ
  - จำนวนเต็มที่มีค่ามากกว่าอีกจำนวนหนึ่ง
explanation: |
  จำนวนเต็มสองจำนวนจะเป็นจำนวนที่ไม่มีตัวประกอบร่วมกัน (coprime) หากตัวหารร่วมมากที่สุดของพวกมันคือ 1 ซึ่งหมายความว่าพวกมันไม่มีตัวประกอบร่วมอื่นใด
reviewed: false
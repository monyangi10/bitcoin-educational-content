question: Šta je definicija da je jedan ceo broj relativno prost u odnosu na drugi ceo broj?
answer: Ceo broj koji ima najveći zajednički delilac 1 sa tim drugim celim brojem
wrong_answers:
  - Ceo broj koji je deljiv drugim celim brojem bez ostatka
  - Ceo broj koji je prost
  - Ceo broj koji je veći od drugog
explanation: |
  Ceo broj je međusobno prost sa drugim ako je njihov najveći zajednički delilac 1, što znači da ne dele nijedan drugi zajednički faktor.

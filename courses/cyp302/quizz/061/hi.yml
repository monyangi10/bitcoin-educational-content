question: किस तरह की एन्क्रिप्शन में फिक्स्ड डेटा ब्लॉक्स का इस्तेमाल होता है?
answer: ब्लॉक एन्क्रिप्शन
wrong_answers:
  - स्ट्रीम एन्क्रिप्शन
  - संदेश प्रमाणीकरण कोड
  - सार्वजनिक कुंजी
explanation: |
  ब्लॉक एन्क्रिप्शन डेटा को फिक्स्ड साइज़ के ब्लॉक्स में बाँट देता है और उन्हें अलग-अलग एन्क्रिप्ट कर देता है।
reviewed: false
question: Кой тип криптиране използва фиксирани блокове данни?
answer: Блоково криптиране
wrong_answers:
  - Криптиране на потока
  - Код за удостоверяване на съобщението
  - Публичен ключ
explanation: |
  Блоковото криптиране разделя данните на блокове с фиксирана големина и ги криптира самостоятелно.
reviewed: false
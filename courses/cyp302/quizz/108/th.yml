question: ทำไมการเข้ารหัสที่ผ่านการรับรองเพียงอย่างเดียวจึงไม่เพียงพอในเซสชันการสื่อสาร?
answer: ไม่ได้รับประกันว่าข้อความถูกส่งโดยผู้ส่งในเวลาของเซสชัน
wrong_answers:
  - มันใช้คีย์ที่สั้นเกินไป
  - มันไม่ได้เข้ารหัสข้อความที่ส่งในขณะที่เซสชันกำลังดำเนินอยู่
  - มันไม่อนุญาตให้มีการตรวจสอบสิทธิ์ของผู้ส่งในขณะที่เซสชันกำลังดำเนินการ
explanation: |
  โครงร่างการเข้ารหัสที่ผ่านการรับรองความถูกต้องไม่สามารถป้องกันการโจมตีเช่นการเล่นซ้ำ การเรียงลำดับใหม่ และการสะท้อนกลับได้หากไม่มีการเพิ่มตัวบ่งชี้เช่นตัวระบุและหมายเลขลำดับ
reviewed: false
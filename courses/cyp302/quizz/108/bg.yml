question: Защо само автентифицирана схема за криптиране е недостатъчна за комуникационна сесия?
answer: Тя не гарантира, че съобщението е изпратено от изпращача по време на сесията.
wrong_answers:
  - Той използва твърде къси клавиши.
  - Тя не криптира съобщенията, изпратени по време на сесията.
  - Тя не позволява удостоверяване на изпращача по време на сесията.
explanation: |
  Схемата за удостоверено криптиране не защитава от атаки като преиграване, пренареждане и отразяване без добавяне на индикатори като идентификатори и номера на последователността.
reviewed: false
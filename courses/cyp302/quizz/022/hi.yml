question: शिफ्ट एन्क्रिप्शन में, की (key) 17 के साथ शब्द "DOG" का रिजल्ट क्या होगा?  

**हल:**  
हर अक्षर को 17 पोजीशन आगे शिफ्ट करें:  

- D (4th letter) → 4 + 17 = 21 → U (21st letter)  
- O (15th letter) → 15 + 17 = 32 → 32 - 26 = 6 → F (6th letter)  
- G (7th letter) → 7 + 17 = 24 → X (24th letter)  

**जवाब:** "UFX"
answer: यूएफएक्स (UFX)
wrong_answers:
  - ज़ेड के एच
  - टीपीजी
  - यूवीडब्ल्यू
explanation: |
  अक्षरमाला में 17 का शिफ्ट करने पर, D बन जाता है U, O बन जाता है F, और G बन जाता है X। इसलिए, एन्क्रिप्टेड शब्द है UFX।

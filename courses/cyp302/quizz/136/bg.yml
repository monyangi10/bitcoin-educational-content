question: Как онлайн услугата проверява паролата, без да я съхранява директно?
answer: Чрез сравняване на хеша на въведената парола с този в базата данни
wrong_answers:
  - Чрез декриптиране на съхранената парола, за да я проверите
  - Чрез използване на публичен ключ за проверка на самоличността
  - Чрез директно сравняване на паролата с тази на други потребители
explanation: |
  Услугата генерира хеш на въведената парола и я сравнява със съхранената, без да съхранява директно паролата, като по този начин осигурява по-голяма сигурност.
reviewed: false
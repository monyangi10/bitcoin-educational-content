question: एक ऑनलाइन सेवा पासवर्ड को बिना सीधे स्टोर किए कैसे वेरिफाई करती है?
answer: डाले गए पासवर्ड के Hash की डेटाबेस में मौजूद Hash से तुलना करके
wrong_answers:
  - स्टोर किए गए पासवर्ड को डिक्रिप्ट करके उसकी पुष्टि करने से
  - किसी की पहचान सत्यापित करने के लिए सार्वजनिक कुंजी का उपयोग करके
  - दूसरे यूजर्स के पासवर्ड से सीधे तुलना करके
explanation: |
  सर्विस दर्ज किए गए पासवर्ड का Hash जनरेट करती है और उसे स्टोर्ड वाले से तुलना करती है, बिना कभी सीधे पासवर्ड को स्टोर किए, जिससे सुरक्षा बढ़ जाती है।
reviewed: false
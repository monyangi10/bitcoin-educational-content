question: บริการออนไลน์ตรวจสอบรหัสผ่านโดยไม่จัดเก็บโดยตรงได้อย่างไร?
answer: โดยการเปรียบเทียบแฮชของรหัสผ่านที่ป้อนกับแฮชที่อยู่ในฐานข้อมูล
wrong_answers:
  - โดยการถอดรหัสรหัสผ่านที่เก็บไว้เพื่อตรวจสอบ
  - โดยใช้กุญแจสาธารณะในการยืนยันตัวตน
  - โดยการเปรียบเทียบรหัสผ่านโดยตรงกับของผู้ใช้อื่น
explanation: |
  บริการนี้สร้างแฮชของรหัสผ่านที่ป้อนและเปรียบเทียบกับรหัสผ่านที่เก็บไว้ โดยไม่เคยเก็บรหัสผ่านโดยตรง ซึ่งช่วยเพิ่มความปลอดภัยมากขึ้น
reviewed: false
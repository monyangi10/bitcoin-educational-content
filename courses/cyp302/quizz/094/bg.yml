question: Кой е основният източник на объркване между термините блоков шифър и поточен шифър?
answer: Понякога под блокови шифри се разбират единствено алгоритми, използващи блокови режими като ЕЦБ или CBC.
wrong_answers:
  - Поточните шифри винаги са по-малко сигурни от блоковите.
  - Блоковите шифри работят с по един бит в даден момент.
  - Поточните шифри винаги изискват подложка.
explanation: |
  Объркването произтича от факта, че някои разглеждат блоковите шифри само като алгоритми, използващи специфични режими на блокиране, докато в действителност те могат да включват схеми за криптиране като режима OFB.
reviewed: false
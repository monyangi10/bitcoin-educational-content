question: แหล่งที่มาหลักของความสับสนระหว่างคำว่า block cipher และ stream cipher คืออะไร?
answer: บล็อกไซเฟอร์บางครั้งถูกเข้าใจว่าเป็นเพียงแค่อัลกอริทึมที่ใช้โหมดบล็อกเช่น ECB หรือ CBC เท่านั้น
wrong_answers:
  - สตรีมไซเฟอร์มีความปลอดภัยน้อยกว่าแบบบล็อกไซเฟอร์เสมอ
  - บล็อกไซเฟอร์ทำงานทีละบิตเดียว
  - สตรีมไซเฟอร์ต้องการการเติมข้อมูลเสมอ
explanation: |
  ความสับสนเกิดจากข้อเท็จจริงที่ว่าบางคนพิจารณาว่าบล็อกไซเฟอร์เป็นเพียงอัลกอริธึมที่ใช้โหมดบล็อกเฉพาะ แต่ในความเป็นจริงแล้ว พวกมันสามารถรวมถึงรูปแบบการเข้ารหัสเช่นโหมด OFB ได้
reviewed: false
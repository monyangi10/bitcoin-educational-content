question: Koji je glavni izvor zabune između pojmova blok šifra i strim šifra?
answer: Blok šifre se ponekad razumeju isključivo kao algoritmi koji koriste blok modove poput ECB ili CBC.
wrong_answers:
  - Stream šifre su uvek manje sigurne od blok šifara.
  - Blok šifre operišu na jednom bitu istovremeno.
  - Stream šifre uvek zahtevaju popunjavanje.
explanation: |
  Zbrka nastaje zbog činjenice da neki smatraju blokovske šifre samo kao algoritme koji koriste specifične načine blokiranja, dok u stvarnosti, one mogu uključivati šeme šifrovanja kao što je OFB način.

question: ब्लॉक सिफर और स्ट्रीम सिफर के बीच मुख्य भ्रम का स्रोत क्या है?
answer: ब्लॉक सिफर को कभी-कभी सिर्फ ECB या CBC जैसे ब्लॉक मोड का इस्तेमाल करने वाले एल्गोरिदम के रूप में समझा जाता है।
wrong_answers:
  - स्ट्रीम सिफर हमेशा ब्लॉक सिफर से कम सुरक्षित होते हैं।
  - ब्लॉक सिफर एक बार में एक बिट पर काम करते हैं।
  - स्ट्रीम सिफर को हमेशा पैडिंग की जरूरत होती है।
explanation: |
  भ्रम इस बात से पैदा होता है कि कुछ लोग ब्लॉक सिफर को सिर्फ विशेष ब्लॉकिंग मोड्स का इस्तेमाल करने वाले एल्गोरिदम मानते हैं, जबकि असल में इनमें OFB मोड जैसी एन्क्रिप्शन स्कीम्स भी शामिल हो सकती हैं।
reviewed: false
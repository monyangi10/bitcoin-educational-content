question: 블록 사이퍼와 스트림 사이퍼라는 용어를 혼동하는 주요 원인은 무엇인가요?
answer: 블록 암호는 때때로 ECB 또는 CBC와 같은 블록 모드를 사용하는 알고리즘으로만 이해되기도 합니다.
wrong_answers:
  - 스트림 암호는 항상 블록 암호보다 보안성이 떨어집니다.
  - 블록 암호는 한 번에 한 비트씩 작동합니다.
  - 스트림 암호는 항상 패딩이 필요합니다.
explanation: |
  일부에서는 블록 암호를 특정 차단 모드를 사용하는 알고리즘으로만 생각하지만 실제로는 OFB 모드와 같은 암호화 체계도 포함할 수 있기 때문에 혼란이 생깁니다.
reviewed: false
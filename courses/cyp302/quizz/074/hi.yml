question: अगर "CAT" शब्द को 7 की कुंजी (key) से एन्क्रिप्ट किया जाए, तो क्या होगा?
answer: शब्द बन जाता है "झा"
wrong_answers:
  - शब्द JBA बन जाता है
  - शब्द बन जाता है JHB
  - शब्द "ZHA" बन जाता है
explanation: |
  7 की कुंजी के साथ, शब्द CAT के हर अक्षर को वर्णमाला में 7 स्थान आगे खिसकाया जाता है, जिससे एन्क्रिप्टेड शब्द JHA बनता है।
reviewed: false
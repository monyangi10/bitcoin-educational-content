question: จะเกิดอะไรขึ้นถ้าใช้กุญแจ 7 ในการเข้ารหัสคำว่า CAT?
answer: คำนี้กลายเป็น JHA
wrong_answers:
  - คำว่า JBA
  - คำนี้กลายเป็น JHB
  - คำนี้กลายเป็น ZHA
explanation: |
  ด้วยกุญแจที่มีค่าเท่ากับ 7 แต่ละตัวอักษรของคำว่า CAT ถูกเลื่อนไป 7 ตำแหน่งในตัวอักษร ซึ่งทำให้เกิดคำที่เข้ารหัสว่า JHA
reviewed: false
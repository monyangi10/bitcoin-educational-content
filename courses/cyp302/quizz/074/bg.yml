question: Какво ще се случи, ако за криптиране на думата CAT се използва ключ 7?
answer: Думата става JHA
wrong_answers:
  - Думата става JBA
  - Думата става JHB
  - Думата става ZHA
explanation: |
  С ключ от 7 всяка буква от думата CAT се измества със 7 позиции в азбуката, което води до криптираната дума JHA.
reviewed: false
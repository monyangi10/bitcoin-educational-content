question: Как се дефинира случаен низ в тази глава?
answer: Като низ, избран равномерно от всички низове с еднаква дължина
wrong_answers:
  - Като низ, създаден само с битове 0 и 1
  - Като низ, получен от ръчен избор
  - Като низ с променлива дължина, получен в резултат на процес на криптиране
explanation: |
  Случаен низ се дефинира като низ от равномерен избор сред всички възможни низове със същата дължина.

question: ในบทนี้ สตริงสุ่มถูกกำหนดอย่างไร?
answer: ในฐานะสตริงที่เลือกอย่างสม่ำเสมอจากสตริงทั้งหมดที่มีความยาวเท่ากัน
wrong_answers:
  - ในฐานะสตริงที่สร้างขึ้นด้วยบิต 0 และ 1 เท่านั้น
  - ในฐานะสตริงที่ได้รับจากการเลือกด้วยตนเอง
  - ในฐานะสตริงที่มีความยาวแปรผันซึ่งเป็นผลมาจากกระบวนการเข้ารหัส
explanation: |
  สตริงสุ่มถูกกำหนดให้เป็นการเลือกแบบสุ่มจากสตริงทั้งหมดที่เป็นไปได้ที่มีความยาวเท่ากัน
reviewed: false
question: इस चैप्टर में रैंडम स्ट्रिंग को कैसे डिफाइन किया गया है?
answer: एक स्ट्रिंग जो उसी लंबाई की सभी स्ट्रिंग्स से समान रूप से चुनी गई हो
wrong_answers:
  - एक स्ट्रिंग जो सिर्फ 0 और 1 के बिट्स से बनी हो
  - मैनुअल चयन से प्राप्त एक स्ट्रिंग के रूप में
  - एक एन्क्रिप्शन प्रक्रिया से प्राप्त होने वाली वेरिएबल-लेंथ स्ट्रिंग
explanation: |
  एक रैंडम स्ट्रिंग को उसी लंबाई के सभी संभावित स्ट्रिंग्स में से एक समान चयन के रूप में परिभाषित किया जाता है।
reviewed: false
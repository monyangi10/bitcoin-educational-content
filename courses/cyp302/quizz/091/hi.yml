question: एक प्रिमिटिव स्ट्रीम सिफर और ब्लॉक सिफर स्ट्रीम सिफर में मुख्य अंतर क्या है?
answer: एक आदिम स्ट्रीम सिफर ब्लॉक सिफर से नहीं बनाया जाता है।
wrong_answers:
  - एक आदिम स्ट्रीम सिफर को मैसेजेस में पैडिंग की जरूरत होती है।
  - एक ब्लॉक सिफर स्ट्रीम सिफर वेरिएबल साइज़ के ब्लॉक्स का इस्तेमाल करता है।
  - एक ब्लॉक सिफर स्ट्रीम सिफर बड़े डेटा के लिए इस्तेमाल नहीं किया जा सकता।
explanation: |
  एक आदिम स्ट्रीम सिफर, जैसे कि सालसा20, को ब्लॉक सिफर से स्वतंत्र रूप से डिज़ाइन किया जाता है, जबकि ब्लॉक सिफर स्ट्रीम सिफर एक ब्लॉक सिफर को अपना आधार बनाता है, जिसे एन्क्रिप्शन की स्ट्रीम पैदा करने के लिए संशोधित किया जाता है।

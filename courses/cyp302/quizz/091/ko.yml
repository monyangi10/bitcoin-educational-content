question: 원시 스트림 암호와 블록 암호 스트림 암호의 주요 차이점은 무엇인가요?
answer: 원시 스트림 암호는 블록 암호로 구축되지 않습니다.
wrong_answers:
  - 원시 스트림 암호는 메시지 패딩이 필요합니다.
  - 블록 사이퍼 스트림 사이퍼는 다양한 크기의 블록을 사용합니다.
  - 블록 사이퍼 스트림 사이퍼는 대용량 데이터에는 사용할 수 없습니다.
explanation: |
  살사20과 같은 원시 스트림 암호는 블록 암호와 독립적으로 설계된 반면, 블록 암호 스트림 암호는 블록 암호를 기본으로 사용하며 암호화 스트림을 생성하도록 수정됩니다.
reviewed: false
question: Каква е основната разлика между примитивния поточен шифър и блоковия поточен шифър?
answer: Примитивният поточен шифър не е изграден от блоков шифър.
wrong_answers:
  - Примитивният поточен шифър изисква подплънка на съобщенията.
  - Поточният шифър на блоковия шифър използва блокове с променлив размер.
  - Поточен шифър с блоков шифър не може да се използва за големи данни.
explanation: |
  Примитивният поточно-шифров код, като Salsa20, е проектиран независимо от блоков шифър, докато поточно-шифровият код с блоков шифър използва за основа блоков шифър, модифициран за създаване на поток от криптиране.
reviewed: false
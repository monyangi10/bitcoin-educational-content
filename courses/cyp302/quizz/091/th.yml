question: ความแตกต่างหลักระหว่าง primitive stream cipher และ block cipher stream cipher คืออะไร?
answer: สตรีมไซเฟอร์แบบดั้งเดิมไม่ได้สร้างจากบล็อกไซเฟอร์
wrong_answers:
  - รหัสสตรีมแบบดั้งเดิมต้องการการเติมข้อความให้เต็ม.
  - รหัสบล็อกสตรีมไซเฟอร์ใช้บล็อกที่มีขนาดแปรผัน
  - บล็อกไซเฟอร์สตรีมไซเฟอร์ไม่สามารถใช้กับข้อมูลขนาดใหญ่ได้
explanation: |
  สตรีมไซเฟอร์แบบดั้งเดิม เช่น Salsa20 ถูกออกแบบมาโดยไม่ขึ้นกับบล็อกไซเฟอร์ ในขณะที่สตรีมไซเฟอร์บล็อกไซเฟอร์ใช้บล็อกไซเฟอร์เป็นพื้นฐาน โดยมีการปรับเปลี่ยนเพื่อผลิตสตรีมของการเข้ารหัส
reviewed: false
question: บทบาทของทฤษฎีบทของเบย์ในความน่าจะเป็นคืออะไร?
answer: มันอนุญาตให้คำนวณความน่าจะเป็นแบบมีเงื่อนไขโดยการย้อนกลับเหตุการณ์
wrong_answers:
  - มันให้ความน่าจะเป็นของการเกิดขึ้นของเหตุการณ์เดียว
  - มันกำหนดความน่าจะเป็นรวมของเหตุการณ์ที่เป็นไปได้ทั้งหมด
  - มันใช้ได้กับตัวแปรต่อเนื่องเท่านั้น
explanation: |
  ทฤษฎีบทของเบย์ช่วยให้สามารถคำนวณความน่าจะเป็นของเหตุการณ์ A เมื่อทราบ B โดยการกลับความน่าจะเป็นและเป็นสิ่งสำคัญในทฤษฎีความน่าจะเป็น
reviewed: false
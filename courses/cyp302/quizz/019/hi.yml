question: बेयस' प्रमेय (Bayes' Theorem) की प्रोबेबिलिटी (Probability) में क्या भूमिका है?
answer: यह कंडीशनल प्रोबेबिलिटी (सप्रतिबंध प्रायिकता) की गणना करने की अनुमति देता है, घटनाओं को उलट कर।
wrong_answers:
  - यह एकल घटना के होने की संभावना प्रदान करता है।
  - यह सभी संभावित घटनाओं की कुल संभावना को परिभाषित करता है।
  - यह सिर्फ लगातार चलने वाले वेरिएबल्स पर लागू होता है।
explanation: |
  बेयस प्रमेय (Bayes' theorem) किसी घटना A की प्रायिकता (probability) की गणना करने में मदद करता है, जब घटना B हो चुकी हो। यह प्रायिकताओं को उलटकर (reversing the probabilities) काम करता है और प्रायिकता सिद्धांत (probability theory) में बहुत महत्वपूर्ण है।

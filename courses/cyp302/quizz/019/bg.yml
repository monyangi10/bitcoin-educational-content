question: Каква е ролята на теоремата на Бейс във вероятностите?
answer: Той позволява изчисляване на условна вероятност чрез обръщане на събитията.
wrong_answers:
  - Той дава вероятността за настъпване на едно събитие.
  - Тя определя общата вероятност на всички възможни събития.
  - Това се отнася само за непрекъснати променливи.
explanation: |
  Теоремата на Бейс позволява да се изчисли вероятността за събитие А при условие, че е налице Б, като се обърнат вероятностите, и е от съществено значение в теорията на вероятностите.
reviewed: false
question: แนวคิดทางคณิตศาสตร์ที่เป็นพื้นฐานของการแลกเปลี่ยนกุญแจ Diffie-Hellman คือ ทฤษฎีจำนวนและเลขยกกำลังโมดูโล (modular exponentiation)
answer: ฟังก์ชันทางเดียวที่มีทางลับกลับ
wrong_answers:
  - ฟังก์ชันเอ็กซ์โพเนนเชียลผกผัน
  - อัลกอริธึมแฮชเข้ารหัสลับ
  - การหารแบบโมดูลาร์ที่เรียบง่าย
explanation: |
  Diffie-Hellman อาศัยฟังก์ชันทางเดียวที่คำนวณได้ง่ายในทิศทางหนึ่ง แต่แทบจะเป็นไปไม่ได้ที่จะย้อนกลับได้โดยไม่มีข้อมูลลับที่เรียกว่า backdoor
reviewed: false
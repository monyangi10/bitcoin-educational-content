question: Коя математическа концепция е в основата на обмена на ключове на Дифи-Хелман?
answer: Еднопосочна функция със задна врата
wrong_answers:
  - Обратна експоненциална функция
  - Криптографски алгоритъм за хеширане
  - Опростено модулно разделение
explanation: |
  Diffie-Hellman разчита на еднопосочна функция, която е лесна за изчисляване в едната посока, но практически невъзможна за обръщане без секретна част от информацията, наречена задна врата.
reviewed: false
question: Кое свойство трябва да притежава хеш функцията, за да се гарантира сигурността при проверка на софтуера?
answer: Устойчивост на сблъсък
wrong_answers:
  - Обратимост
  - Възможност за работа с асиметрични ключове
  - Възможност за генериране в реално време
explanation: |
  Устойчивостта на сблъсък гарантира, че е практически невъзможно да се намерят два различни входа, които да дадат един и същ хеш, което е важно за проверката, че софтуерът не е бил подправен.
reviewed: false
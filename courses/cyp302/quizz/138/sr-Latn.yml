question: Koje svojstvo mora imati heš funkcija da bi se osigurala bezbednost tokom verifikacije softvera?
answer: Otpornost na koliziju
wrong_answers:
  - Reverzibilnost
  - Operabilnost sa asimetričnim ključevima
  - Generabilnost u realnom vremenu
explanation: |
  Otpornost na kolizije osigurava da je praktično nemoguće pronaći dva različita ulaza koja proizvode isti heš, što je važno za verifikaciju da softver nije bio izmenjen.
reviewed: true

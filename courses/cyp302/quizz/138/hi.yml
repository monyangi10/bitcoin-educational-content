question: Hash फंक्शन में कौन सा प्रॉपर्टी होना चाहिए ताकि सॉफ्टवेयर वेरिफिकेशन के दौरान सुरक्षा सुनिश्चित हो सके?
answer: टकराव प्रतिरोध
wrong_answers:
  - उलटाव
  - असममित कुंजियों के साथ संचालन क्षमता
  - रियल-टाइम जनरेबिलिटी
explanation: |
  टकराव प्रतिरोध (Collision resistance) यह सुनिश्चित करता है कि एक ही Hash पैदा करने वाले दो अलग-अलग इनपुट ढूंढना लगभग नामुमकिन हो, जो यह सत्यापित करने के लिए महत्वपूर्ण है कि सॉफ़्टवेयर के साथ छेड़छाड़ नहीं की गई है।
reviewed: false
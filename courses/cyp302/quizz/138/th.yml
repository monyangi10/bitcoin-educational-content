question: ฟังก์ชันแฮชต้องมีคุณสมบัติอะไรเพื่อให้มั่นใจในความปลอดภัยระหว่างการตรวจสอบซอฟต์แวร์?
answer: ความต้านทานการชนกัน
wrong_answers:
  - การกลับคืนได้
  - การทำงานร่วมกับคีย์อสมมาตร
  - ความสามารถในการสร้างแบบเรียลไทม์
explanation: |
  การต้านทานการชนกัน (Collision resistance) ช่วยให้มั่นใจได้ว่าแทบจะเป็นไปไม่ได้เลยที่จะหาข้อมูลนำเข้าที่แตกต่างกันสองชุดที่สร้างแฮชเดียวกัน ซึ่งมีความสำคัญในการตรวจสอบว่าไม่มีการดัดแปลงซอฟต์แวร์
reviewed: false
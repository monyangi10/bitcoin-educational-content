question: ข้อความที่สองของ Beale เปิดเผยอะไรเมื่อถอดรหัส?
answer: รายการสมบัติที่ฝังไว้ (ทองคำ, เงิน, และอัญมณี)
wrong_answers:
  - สถานที่ที่แน่นอนที่ฝังสมบัติ
  - วันที่บีลกลับมา
  - ลายเซ็นของบีลและของผู้ร่วมงานของเขา
explanation: |
  หลังจากถอดรหัส ข้อความที่สองอธิบายถึงเนื้อหาของสมบัติ ซึ่งประกอบด้วยทองคำ เงิน และอัญมณี
reviewed: false
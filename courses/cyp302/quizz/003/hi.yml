question: दूसरा बील संदेश डिक्रिप्ट होने के बाद क्या बताता है?
answer: दफ़न किए गए खज़ानों की सूची (सोना, चाँदी, और जेवरात)
wrong_answers:
  - खजाना जिस जगह दबा हुआ है वो ये है
  - बील के वापस आने की तारीख
  - बील और उसके साथियों के हस्ताक्षर
explanation: |
  डिक्रिप्शन के बाद, दूसरा मैसेज खजाने की सामग्री बताता है, जिसमें सोना, चांदी और जेवरात शामिल हैं।
reviewed: false
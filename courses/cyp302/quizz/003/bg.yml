question: Какво разкрива второто съобщение на Бил, след като бъде декриптирано?
answer: Списъкът на заровените съкровища (злато, сребро и скъпоценности)
wrong_answers:
  - Точното място, където е заровено съкровището
  - Датата на завръщането на Бийл
  - Подписът на Бийл и на неговите сътрудници
explanation: |
  След дешифрирането второто съобщение описва съдържанието на съкровището, състоящо се от злато, сребро и скъпоценни камъни.
reviewed: false
question: Според теоремата на Ойлер какъв е резултатът от експоненцията a^ϕ(N) mod N за две цели числа a и N, които са коприми?
answer: 1 mod N
wrong_answers:
  - 0 mod N
  - N mod a
  - a mod N
explanation: |
  Теоремата на Ойлер гласи, че за две цели числа a и N, които са коприма, експоненцията a^ϕ(N) mod N е винаги равна на 1 mod N - свойство, използвано в криптографията.
reviewed: false
question: ตามทฤษฎีบทของออยเลอร์ ผลลัพธ์ของการยกกำลัง a^ϕ(N) mod N สำหรับจำนวนเต็มสองจำนวน a และ N ที่เป็นจำนวนร่วมกันเท่ากับ 1 คือ 1
answer: 1 mod N
wrong_answers:
  - 0 mod N
  - N mod a
  - a mod N
explanation: |
  ทฤษฎีบทของออยเลอร์ระบุว่าสำหรับจำนวนเต็มสองจำนวน a และ N ที่เป็นจำนวนเฉพาะร่วมกัน การยกกำลัง a^ϕ(N) mod N จะเท่ากับ 1 mod N เสมอ ซึ่งเป็นสมบัติที่ใช้ในวิทยาการเข้ารหัสลับ
reviewed: false
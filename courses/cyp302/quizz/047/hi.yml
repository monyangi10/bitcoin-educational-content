question: यूलर के प्रमेय के अनुसार, अगर दो पूर्णांक a और N सह-अभाज्य (coprime) हैं, तो घातांक a^ϕ(N) mod N का परिणाम क्या होगा?  

**उत्तर:**  
a^ϕ(N) mod N = 1  

यहाँ, ϕ(N) यूलर के टोटिएंट फ़ंक्शन को दर्शाता है, जो N से छोटे और N के सह-अभाज्य संख्याओं की गिनती करता है।
answer: 1 मॉड N
wrong_answers:
  - 0 मॉड N
  - N mod a
  - ए मॉड एन
explanation: |
  यूलर का प्रमेय कहता है कि दो पूर्णांक a और N जो एक-दूसरे के सहअभाज्य (coprime) हैं, के लिए घातांक a^ϕ(N) mod N हमेशा 1 mod N के बराबर होता है। यह गुण क्रिप्टोग्राफी में इस्तेमाल किया जाता है।
reviewed: false
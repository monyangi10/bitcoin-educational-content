question: Защо химиците използват теория на групите?
answer: Класифициране на формите на молекулите
wrong_answers:
  - Анализиране на химични връзки
  - Изчисляване на молекулната маса
  - Предвиждане на химични реакции
explanation: |
  Теорията на групите позволява на химиците да класифицират молекулните форми въз основа на тяхната симетрия, което помага за разбирането на структурните им свойства.
reviewed: false
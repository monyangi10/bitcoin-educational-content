question: केमिस्ट (रसायनज्ञ) ग्रुप थ्योरी का इस्तेमाल क्यों करते हैं?
answer: अणुओं के आकारों को वर्गीकृत करना
wrong_answers:
  - रासायनिक बंधों का विश्लेषण करना
  - आण्विक द्रव्यमान की गणना करने के लिए
  - रासायनिक प्रतिक्रियाओं का अनुमान लगाना
explanation: |
  ग्रुप थ्योरी के जरिए केमिस्ट अणुओं के आकार को उनकी सममिति (सिमिट्री) के आधार पर वर्गीकृत कर सकते हैं, जिससे उनके संरचनात्मक गुणों को समझने में मदद मिलती है।
reviewed: false
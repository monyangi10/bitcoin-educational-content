question: ทำไมนักเคมีถึงใช้ทฤษฎีหมู่?
answer: เพื่อจำแนกรูปร่างของโมเลกุล
wrong_answers:
  - วิเคราะห์พันธะเคมี
  - ในการคำนวณมวลโมเลกุล
  - เพื่อทำนายปฏิกิริยาเคมี
explanation: |
  ทฤษฎีหมู่ช่วยให้นักเคมีสามารถจัดประเภทของรูปร่างโมเลกุลตามสมมาตรของพวกมัน ซึ่งช่วยในการทำความเข้าใจคุณสมบัติเชิงโครงสร้างของพวกมัน
reviewed: false
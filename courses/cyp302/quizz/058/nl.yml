question: Waarom gebruiken chemici groepentheorie?
answer: De vormen van moleculen classificeren
wrong_answers:
  - Chemische bindingen analyseren
  - Moleculaire massa berekenen
  - Chemische reacties voorspellen
explanation: |
  Groepentheorie stelt chemici in staat om moleculaire vormen te classificeren op basis van hun symmetrieën, wat helpt bij het begrijpen van hun structurele eigenschappen.
reviewed: false
question: कमजोर पासवर्ड का मुख्य खतरा क्या है जब उन्हें हैश किया जाता है?
answer: वे डिक्शनरी अटैक के लिए कमजोर हैं
wrong_answers:
  - उन्हें हैशिंग से वेरिफाई नहीं किया जा सकता
  - वे हमेशा generate टकराव करते हैं
  - वे ज़्यादा सुरक्षा के लिए लंबे हैशिंग की मांग करते हैं
explanation: |
  कमजोर पासवर्ड को Hash से आसानी से डिक्शनरी अटैक के जरिए हैक किया जा सकता है, इसलिए सुरक्षा के लिए मजबूत पासवर्ड चुनना जरूरी है।
reviewed: false
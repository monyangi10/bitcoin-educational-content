question: ช่องโหว่หลักของรหัสผ่านที่อ่อนแอเมื่อถูกแฮชคืออะไร?
answer: พวกเขามีความเสี่ยงต่อการโจมตีแบบพจนานุกรม
wrong_answers:
  - ไม่สามารถตรวจสอบได้ด้วยการแฮช
  - พวกเขามักจะชนกัน generate
  - พวกเขาต้องการการแฮชที่ยาวขึ้นเพื่อความปลอดภัยมากขึ้น
explanation: |
  รหัสผ่านที่อ่อนแอสามารถถูกกู้คืนได้ง่ายจากแฮชของพวกเขาโดยใช้การโจมตีแบบพจนานุกรม ทำให้การเลือกของพวกเขามีความสำคัญเพื่อให้มั่นใจในความปลอดภัย
reviewed: false
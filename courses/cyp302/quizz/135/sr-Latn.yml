question: Koja je glavna ranjivost slabih lozinki kada su heširane?
answer: Ranjivost na napade rečnikom
wrong_answers:
  - Ne mogu se verifikovati heširanjem
  - One uvek generišu kolizije
  - Oni zahtevaju duže heširanje za veću sigurnost
explanation: |
  Slabe lozinke se lako mogu povratiti iz njihove heš vrednosti korišćenjem napada rečnikom, što čini njihov izbor važnim za osiguranje bezbednosti.
reviewed: true

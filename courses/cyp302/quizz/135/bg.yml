question: Каква е основната уязвимост на слабите пароли, когато те са хеширани?
answer: Те са уязвими към речникови атаки
wrong_answers:
  - Те не могат да бъдат проверени чрез хеширане
  - Те винаги се сблъскват с generate
  - Те изискват по-дълго хеширане за по-голяма сигурност
explanation: |
  Слабите пароли могат лесно да бъдат възстановени чрез речникови атаки, което прави избора им важен за гарантиране на сигурността.

question: CBC 및 OFB 방식에서 무작위 Nonce을 사용하는 것의 중요성은 무엇인가요?
answer: 동일한 데이터에 대해서도 각 암호화 세션이 고유하도록 보장합니다.
wrong_answers:
  - 암호화 프로세스 전체에서 키 길이를 줄입니다.
  - 암호화가 더 빨라집니다.
  - 알고리즘의 코드가 인간을 위해 더 아름답게 만들어집니다.
explanation: |
  각 세션에 대해 무작위 Nonce을 사용하는 CBC 및 OFB 방식은 각 암호화가 고유하도록 보장하여 동일한 데이터를 악용하는 공격을 방지합니다.
reviewed: false
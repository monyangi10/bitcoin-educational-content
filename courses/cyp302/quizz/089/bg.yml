question: Какво е значението на използването на случаен код за сигурност в методите CBC и OFB?
answer: Тя гарантира, че всяка сесия на криптиране е уникална, дори за идентични данни.
wrong_answers:
  - Той намалява дължината на ключа по време на целия процес на криптиране.
  - Това прави криптирането по-бързо.
  - Това прави кода на алгоритъма по-красив за хората.
explanation: |
  Чрез използването на случаен код за всяка сесия методите CBC и OFB гарантират, че всяко криптиране е уникално, което предотвратява атаки, използващи идентични данни.
reviewed: false
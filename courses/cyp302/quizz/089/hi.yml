question: CBC और OFB तरीकों में रैंडम Nonce का इस्तेमाल करने का क्या महत्व है?
answer: यह सुनिश्चित करता है कि हर एन्क्रिप्शन सत्र यूनिक हो, चाहे डेटा एक जैसा ही क्यों न हो।
wrong_answers:
  - यह एन्क्रिप्शन प्रक्रिया के दौरान की लंबाई को कम कर देता है।
  - यह एन्क्रिप्शन को तेज़ कर देता है।
  - यह एल्गोरिदम का कोड इंसानों के लिए और भी खूबसूरत बना देता है।
explanation: |
  हर सत्र के लिए एक अलग-अलग Nonce का इस्तेमाल करके, CBC और OFB तरीके यह सुनिश्चित करते हैं कि हर एन्क्रिप्शन यूनिक हो, जो एक जैसे डेटा का फायदा उठाने वाले हमलों को रोकता है।
reviewed: false
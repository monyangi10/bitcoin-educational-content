question: ความสำคัญของการใช้ nonce แบบสุ่มในวิธี CBC และ OFB คืออะไร?
answer: มันช่วยให้มั่นใจได้ว่าแต่ละเซสชันการเข้ารหัสมีความเป็นเอกลักษณ์ แม้สำหรับข้อมูลที่เหมือนกัน
wrong_answers:
  - มันลดความยาวของคีย์ตลอดกระบวนการเข้ารหัส
  - มันทำให้การเข้ารหัสเร็วขึ้น
  - มันทำให้โค้ดของอัลกอริทึมสวยงามขึ้นสำหรับมนุษย์
explanation: |
  โดยการใช้ nonce แบบสุ่มสำหรับแต่ละเซสชัน วิธีการ CBC และ OFB ช่วยให้การเข้ารหัสแต่ละครั้งมีความเป็นเอกลักษณ์ ซึ่งป้องกันการโจมตีที่ใช้ประโยชน์จากข้อมูลที่เหมือนกัน
reviewed: false
question: Какъв тип криптиране е шифроването на смяна?
answer: Моноалфабетичен шифър на заместване
wrong_answers:
  - Шифър за пермутация на думи
  - Полиалфабетичен шифър на заместване
  - Асиметричен шифър
explanation: |
  Шифрирането с разместване е пример за моноалфабетен шифър на заместване, при който всяка буква в съобщението се размества с фиксиран брой позиции в азбуката.
reviewed: false
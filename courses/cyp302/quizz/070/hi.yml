question: शिफ्ट एन्क्रिप्शन किस तरह का एन्क्रिप्शन है?
answer: एक मोनोअल्फाबेटिक सब्स्टिट्यूशन साइफर
wrong_answers:
  - एक शब्द क्रमचय साइफर
  - एक बहु-वर्णमाला प्रतिस्थापन सिफर
  - एक असममित सिफर
explanation: |
  शिफ्ट एन्क्रिप्शन एक मोनोअल्फाबेटिक सब्स्टिट्यूशन साइफर का उदाहरण है, जहाँ मैसेज के हर अक्षर को अल्फाबेट में एक निश्चित संख्या की पोजीशन से शिफ्ट किया जाता है।
reviewed: false
question: การเข้ารหัสแบบใดคือการเข้ารหัสแบบเลื่อน?
answer: การเข้ารหัสแบบแทนที่ตัวอักษรเดียว
wrong_answers:
  - การเข้ารหัสแบบสลับคำ
  - การเข้ารหัสแบบแทนที่หลายตัวอักษร
  - การเข้ารหัสแบบอสมมาตร
explanation: |
  การเข้ารหัสแบบเลื่อนเป็นตัวอย่างของการเข้ารหัสแบบแทนที่ตัวอักษรเดียว ซึ่งตัวอักษรแต่ละตัวในข้อความจะถูกเลื่อนตามจำนวนตำแหน่งที่กำหนดในตัวอักษร
reviewed: false
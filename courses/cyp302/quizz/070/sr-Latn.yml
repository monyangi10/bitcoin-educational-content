question: Kakav tip enkripcije je pomerajuća enkripcija?
answer: Monoalfabetska supstituciona šifra
wrong_answers:
  - Permutaciona šifra reči
  - Višestruka supstituciona šifra
  - Asimetrična šifra
explanation: |
  Šifrovanje pomakom je primer monoalfabetske supstitucione šifre, gde je svako slovo u poruci pomereno za fiksni broj pozicija u abecedi.

question: Koji korak nije uključen u sigurnosni dokaz moderne kriptografske šeme?
answer: Postavljanje korisničkog interfejsa
wrong_answers:
  - Navođenje definicija bezbednosti
  - Pretpostavke matematičke složenosti
  - Matematička demonstracija sigurnosti
explanation: |
  Dokaz bezbednosti u modernoj kriptografiji fokusira se na ciljeve i matematičke pretpostavke, isključujući aspekte kao što je korisnički interfejs, koji nije relevantan za kriptografsku bezbednost.
reviewed: true

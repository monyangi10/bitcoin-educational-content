question: ขั้นตอนใดที่ไม่ได้รวมอยู่ในการพิสูจน์ความปลอดภัยของโครงร่างการเข้ารหัสสมัยใหม่?
answer: การตั้งค่าหน้าผู้ใช้
wrong_answers:
  - ระบุคำจำกัดความด้านความปลอดภัย
  - ข้อสมมติฐานความซับซ้อนทางคณิตศาสตร์
  - การสาธิตทางคณิตศาสตร์ของความปลอดภัย
explanation: |
  หลักฐานความปลอดภัยในวิทยาการเข้ารหัสลับสมัยใหม่มุ่งเน้นไปที่วัตถุประสงค์และสมมติฐานทางคณิตศาสตร์ โดยไม่รวมถึงแง่มุมต่างๆ เช่น ส่วนต่อประสานผู้ใช้ ซึ่งไม่เกี่ยวข้องกับความปลอดภัยทางการเข้ารหัสลับ
reviewed: false
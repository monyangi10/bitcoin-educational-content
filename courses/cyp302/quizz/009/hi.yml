question: आधुनिक क्रिप्टोग्राफिक स्कीम के सुरक्षा प्रूफ में कौन सा स्टेप शामिल नहीं होता?
answer: यूज़र Interface को सेट अप करना
wrong_answers:
  - सुरक्षा परिभाषाओं को बताना
  - गणितीय जटिलता की मान्यताएँ
  - सुरक्षा का गणितीय प्रदर्शन
explanation: |
  आधुनिक क्रिप्टोग्राफी में सुरक्षा सबूत मुख्य रूप से उद्देश्यों और गणितीय मान्यताओं पर केंद्रित होता है, जिसमें यूजर Interface जैसे पहलू शामिल नहीं होते, क्योंकि यह क्रिप्टोग्राफिक सुरक्षा से संबंधित नहीं है।
reviewed: false
question: प्रमाणित एन्क्रिप्शन चुने हुए सिफरटेक्स्ट अटैक (CCA) के खिलाफ क्यों मजबूत होता है?
answer: क्योंकि हमलावर द्वारा सिफरटेक्स्ट में किसी भी तरह का बदलाव करने से टैग अमान्य हो जाता है
wrong_answers:
  - क्योंकि यह एक ही एन्क्रिप्शन एल्गोरिथम का इस्तेमाल करता है
  - क्योंकि हमलावर द्वारा सिफरटेक्स्ट में कोई भी बदलाव करने से कुंजी अमान्य हो जाती है
  - क्योंकि यह सिर्फ मैसेज को एन्क्रिप्ट करता है, बिना किसी टैग के
explanation: |
  एक प्रमाणित एन्क्रिप्शन स्कीम सिफरटेक्स्ट में किए गए बदलावों का पता लगाने के लिए डिज़ाइन की गई है, जो छेड़छाड़ के प्रयासों के मामले में टैग को अमान्य कर देती है और चुने हुए सिफरटेक्स्ट हमलों के खिलाफ प्रतिरोध सुनिश्चित करती है।
reviewed: false
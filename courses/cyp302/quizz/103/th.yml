question: ทำไมการเข้ารหัสที่ผ่านการตรวจสอบแล้วจึงต้านทานการโจมตีด้วยการเลือกข้อความเข้ารหัส?
answer: เนื่องจากการแก้ไขใด ๆ ของข้อความลับโดยผู้โจมตีทำให้แท็กไม่ถูกต้อง
wrong_answers:
  - เพราะมันใช้เพียงอัลกอริทึมการเข้ารหัสเดียว
  - เนื่องจากการแก้ไขใด ๆ ของข้อความที่ถูกเข้ารหัสโดยผู้โจมตีจะทำให้คีย์ไม่ถูกต้อง
  - เพราะมันเข้ารหัสเฉพาะข้อความโดยไม่มีแท็ก
explanation: |
  โครงร่างการเข้ารหัสที่ผ่านการรับรองถูกออกแบบมาเพื่อตรวจจับการแก้ไขของข้อความที่เข้ารหัส ซึ่งจะทำให้แท็กไม่ถูกต้องในกรณีที่มีความพยายามในการดัดแปลงและรับประกันความต้านทานต่อการโจมตีด้วยการเลือกข้อความที่เข้ารหัส
reviewed: false
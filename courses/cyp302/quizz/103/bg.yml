question: Защо удостовереното криптиране е устойчиво на атаки с избран шифър текст?
answer: Тъй като всяка промяна на шифровия текст от страна на нападател прави етикета невалиден
wrong_answers:
  - Тъй като използва само един алгоритъм за криптиране
  - Тъй като всяка промяна на шифровия текст от страна на нападателя прави ключа невалиден
  - Тъй като криптира само съобщението без таг
explanation: |
  Схемата за шифроване с удостоверяване на автентичността е проектирана така, че да открива модификации на шифровия текст, което прави етикета невалиден в случай на опити за подправяне и осигурява устойчивост на атаки с избран шифров текст.
reviewed: false
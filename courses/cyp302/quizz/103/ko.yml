question: 인증된 암호화가 선택된 암호문 공격에 저항하는 이유는 무엇인가요?
answer: 공격자가 암호 텍스트를 수정하면 태그가 무효화되기 때문입니다
wrong_answers:
  - 단일 암호화 알고리즘을 사용하기 때문에
  - 공격자가 암호 텍스트를 수정하면 키가 무효화되기 때문입니다
  - 태그가 없는 메시지만 암호화하기 때문입니다
explanation: |
  인증된 암호화 체계는 암호화 텍스트의 수정을 감지하도록 설계되어 변조 시도가 있을 경우 태그를 무효로 만들고 선택된 암호화 텍스트 공격에 대한 저항력을 보장합니다.

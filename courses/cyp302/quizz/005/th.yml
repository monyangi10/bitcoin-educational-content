question: เป้าหมายหลักของการเข้ารหัสแบบคลาสสิกที่ยังคงมีอยู่ในการเข้ารหัสสมัยใหม่คืออะไร?
answer: ความลับของข้อความ
wrong_answers:
  - การทำให้ข้อความง่ายขึ้น
  - การทำซ้ำของข้อความ
  - การทำให้การส่งข้อความเป็นอัตโนมัติ
explanation: |
  การเข้ารหัสแบบคลาสสิกมุ่งเน้นไปที่การรักษาความลับเป็นหลัก และเป้าหมายนี้ยังคงมีความสำคัญในวิทยาการเข้ารหัสสมัยใหม่ แม้ว่าจะมีหัวข้ออื่น ๆ เช่น ความถูกต้องและความแท้จริง ถูกเพิ่มเข้ามาด้วย
reviewed: false
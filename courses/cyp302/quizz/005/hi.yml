question: क्लासिकल क्रिप्टोग्राफी का मुख्य लक्ष्य क्या है जो आज की मॉडर्न क्रिप्टोग्राफी में अभी भी मौजूद है?
answer: मैसेज की गोपनीयता
wrong_answers:
  - संदेशों को सरल बनाना
  - संदेशों की बार-बार दोहराई
  - मैसेज भेजने का स्वचालन
explanation: |
  क्लासिकल क्रिप्टोग्राफी मुख्य रूप से गोपनीयता पर केंद्रित थी, और यह लक्ष्य आधुनिक क्रिप्टोग्राफी में भी महत्वपूर्ण बना हुआ है, हालांकि इसमें अब और भी विषय जुड़ गए हैं, जैसे कि अखंडता और प्रामाणिकता।
reviewed: false
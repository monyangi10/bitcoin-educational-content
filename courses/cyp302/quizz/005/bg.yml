question: Коя е основната цел на класическата криптография, която все още присъства в съвременната криптография?
answer: Поверителност на съобщенията
wrong_answers:
  - Опростяване на съобщенията
  - Повтаряне на съобщенията
  - Автоматизиране на изпращането на съобщения
explanation: |
  Класическата криптография се е фокусирала основно върху поверителността и тази цел остава основна в съвременната криптография, въпреки че са добавени и други теми, като например цялостност и автентичност.
reviewed: false
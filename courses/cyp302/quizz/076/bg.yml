question: Какъв размер на ключа се счита за сигурен срещу атаки с груба сила за съвременното криптиране?
answer: 128 бита
wrong_answers:
  - 16 бита
  - 64 бита
  - 100 бита
explanation: |
  С ключ от поне 128 бита съвременното криптиране понастоящем се счита за сигурно срещу атаки с груба сила, тъй като броят на опитите би бил нереалистичен.
reviewed: false
question: आजकल के एन्क्रिप्शन के लिए, ब्रूट फोर्स अटैक से सुरक्षित माने जाने वाले की साइज़ क्या है?
answer: 128 बिट्स
wrong_answers:
  - 16 बिट्स
  - 64 बिट्स
  - 100 बिट्स
explanation: |
  कम से कम 128 बिट की चाबी के साथ, आधुनिक एन्क्रिप्शन को फिलहाल ब्रूट फोर्स अटैक के खिलाफ सुरक्षित माना जाता है, क्योंकि कोशिशों की संख्या अवास्तविक होगी।
reviewed: false
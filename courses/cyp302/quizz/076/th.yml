question: ขนาดคีย์ใดที่ถือว่าปลอดภัยต่อการโจมตีแบบ brute force สำหรับการเข้ารหัสสมัยใหม่?
answer: 128 บิต
wrong_answers:
  - 16 บิต
  - 64 บิต
  - 100 บิต
explanation: |
  ด้วยคีย์ที่มีความยาวอย่างน้อย 128 บิต การเข้ารหัสสมัยใหม่ถือว่ามีความปลอดภัยต่อการโจมตีแบบ brute force ในปัจจุบัน เนื่องจากจำนวนความพยายามจะเป็นไปไม่ได้ในทางปฏิบัติ
reviewed: false
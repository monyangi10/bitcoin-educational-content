question: 1970s से पहले वितरण और प्रमुख प्रबंधन मुद्दों का क्या प्रभाव था?
answer: उन्होंने बड़े पैमाने पर संचार की सुरक्षा और दक्षता को सीमित कर दिया।
wrong_answers:
  - उन्होंने सार्वजनिक नेटवर्क पर एन्क्रिप्टेड संदेशों के ट्रांसमिशन को रोक दिया।
  - उन्हें हर मैसेज के लिए पब्लिक कीज़ चाहिए थीं
  - उन्होंने होमोमोर्फिक क्रिप्टोग्राफी के उपयोग को अनिवार्य कर दिया
explanation: |
  1970 के दशक से पहले, कुंजी वितरण और प्रबंधन में समस्याओं के कारण बड़े पैमाने पर संचार को सुरक्षित करना मुश्किल था, जिससे ऑनलाइन शॉपिंग जैसे आधुनिक अनुप्रयोगों का विकास बाधित हुआ।
reviewed: false
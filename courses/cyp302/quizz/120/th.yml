question: ผลกระทบของปัญหาการกระจายและการจัดการกุญแจก่อนทศวรรษ 1970 คืออะไร?
answer: พวกเขาจำกัดความปลอดภัยและประสิทธิภาพของการสื่อสารขนาดใหญ่
wrong_answers:
  - พวกเขาป้องกันการส่งข้อความที่เข้ารหัสบนเครือข่ายสาธารณะ
  - พวกเขาต้องการกุญแจสาธารณะสำหรับแต่ละข้อความ
  - พวกเขาบังคับใช้การเข้ารหัสแบบโฮโมมอร์ฟิค
explanation: |
  ก่อนทศวรรษ 1970 ปัญหาการแจกจ่ายและการจัดการกุญแจทำให้ยากต่อการรักษาความปลอดภัยในการสื่อสารในระดับใหญ่ ซึ่งเป็นอุปสรรคต่อการพัฒนาแอปพลิเคชันสมัยใหม่ เช่น การช้อปปิ้งออนไลน์
reviewed: false
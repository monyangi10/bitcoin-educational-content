question: 1970년대 이전에는 유통 및 키 관리 문제가 어떤 영향을 미쳤나요?
answer: 대규모 커뮤니케이션의 보안과 효율성을 제한했습니다
wrong_answers:
  - 공용 네트워크에서 암호화된 메시지의 전송을 방지합니다
  - 각 메시지마다 공개 키가 필요했습니다
  - 동형 암호화를 사용하도록 의무화했습니다
explanation: |
  1970년대 이전에는 키 배포 및 관리 문제로 인해 대규모 통신 보안이 어려웠기 때문에 온라인 쇼핑과 같은 최신 애플리케이션의 개발이 어려웠습니다.
reviewed: false
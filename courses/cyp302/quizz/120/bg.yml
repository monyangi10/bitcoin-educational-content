question: Какво е било въздействието на въпросите, свързани с дистрибуцията и управлението на ключовете, преди 70-те години?
answer: Те ограничават сигурността и ефективността на широкомащабните комуникации
wrong_answers:
  - Те предотвратяват предаването на криптирани съобщения в обществени мрежи
  - Те изискват публични ключове за всяко съобщение
  - Те налагат използването на хомоморфна криптография
explanation: |
  Преди 70-те години на миналия век проблемите с разпространението и управлението на ключовете затрудняваха осигуряването на комуникации в голям мащаб, което възпрепятстваше развитието на съвременни приложения, като например онлайн пазаруването.
reviewed: false
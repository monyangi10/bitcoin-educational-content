question: Ni ingaruka izihe z’ugusangira n’ibibazo nyamukuru vy’uburongozi imbere y’imyaka ya 1970?
answer: Zagabanya umutekano n’ubushobozi bwo guhanahana amakuru ku rugero runini .
wrong_answers:
  - Babujije gutangaza ubutumwa bushizwe mu mazi ku mbuga za bose .
  - Basaba imfunguruzo za bose ku butumwa bwose
  - Baciye bategeka gukoresha ubuhinga bwo gukingira amajambo y'uruyeri .
explanation: |
  Imbere y’imyaka ya 1970, ibibazo bijanye no gukwiragiza n’ugucungera amakuru y’ingenzi vyatumye bigorana gucungera amakuru ku rugero runini, ivyo bikaba vyatumye habaho uguteza imbere ubuhinga bwa none nk’ugugura kuri Internet.

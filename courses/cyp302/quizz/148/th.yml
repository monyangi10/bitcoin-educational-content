question: ฟังก์ชันใดที่ใช้ในการคำนวณจำนวนจำนวนเต็มที่เป็นจำนวนเฉพาะร่วมกับจำนวนเต็ม N?
answer: ฟังก์ชันฟีของออยเลอร์
wrong_answers:
  - ฟังก์ชันลอการิทึม
  - ฟังก์ชันแกมมาของออยเลอร์
  - ฟังก์ชันเกาส์
explanation: |
  ฟังก์ชัน Phi ของออยเลอร์ (หรือฟังก์ชันโทเทียนต์) ใช้ในการคำนวณจำนวนของจำนวนที่เป็นจำนวนร่วมกันของจำนวนเต็ม N โดยเฉพาะสำหรับจำนวนที่ไม่ใช่จำนวนเฉพาะ
reviewed: false
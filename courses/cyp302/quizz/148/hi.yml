question: N के साथ सह-अभाज्य (coprime) पूर्णांकों की संख्या निकालने के लिए कौन सा फंक्शन इस्तेमाल होता है?
answer: यूलर का फाई फंक्शन
wrong_answers:
  - लघुगणक फंक्शन
  - यूलर का गामा फंक्शन
  - गॉस फंक्शन
explanation: |
  यूलर का फ़ाई फंक्शन (या टोटिएंट फंक्शन) किसी पूर्णांक N के कोप्राइम्स (सह-अभाज्य संख्याओं) की संख्या निकालने के लिए इस्तेमाल होता है, खासकर गैर-अभाज्य पूर्णांकों के लिए।
reviewed: false
question: Коя функция се използва за изчисляване на броя на копримените цели числа към цяло число N?
answer: Фи функция на Ойлер
wrong_answers:
  - Логаритмичната функция
  - Гама функция на Ойлер
  - Функцията на Гаус
explanation: |
  Функцията Фи на Ойлер (или функцията на тотиентите) се използва за изчисляване на броя на копримите на цяло число N, особено за цели числа, които не са първични.
reviewed: false
question: नंबर थ्योरी पब्लिक की क्रिप्टोग्राफी में इतनी खास क्यों है?
answer: यह एन्क्रिप्शन और डिक्रिप्शन ऑपरेशन्स के लिए ज़रूरी गणितीय आधार प्रदान करता है।
wrong_answers:
  - यह हैशिंग ऑपरेशन्स के लिए ज़रूरी गणितीय बुनियाद मुहैया कराता है।
  - न्यूरल नेटवर्क बनाने के लिए यह जरूरी है।
  - यह सिर्फ बाइनरी में ऑपरेशन्स के कैलकुलेशन की इजाज़त देता है।
explanation: |
  नंबर थ्योरी पब्लिक की क्रिप्टोग्राफी में बहुत जरूरी है क्योंकि यह इंटीजर्स के गुणों पर आधारित एल्गोरिदम को स्ट्रक्चर करने में मदद करती है, जिससे एन्क्रिप्शन और डिक्रिप्शन ऑपरेशन आसान हो जाते हैं।

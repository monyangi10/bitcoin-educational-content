question: सममित एन्क्रिप्शन स्कीम में की जनरेशन अल्गोरिथम का क्या काम होता है?
answer: यह एक प्राइवेट की जनरेट करता है
wrong_answers:
  - यह एक पब्लिक की जनरेट करता है
  - यह मैसेज को हैश करता है
  - यह संदेश को एन्क्रिप्ट करता है
explanation: |
  एक सममित एन्क्रिप्शन स्कीम में, की जनरेशन अल्गोरिदम एक प्राइवेट की बनाता है, जिसे बाद में मैसेजेस को एन्क्रिप्ट और डिक्रिप्ट करने के लिए इस्तेमाल किया जाएगा।
reviewed: false
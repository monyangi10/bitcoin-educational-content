question: Каква е функцията на алгоритъма за генериране на ключове в схема за симетрично криптиране?
answer: Той генерира частен ключ
wrong_answers:
  - Той генерира публичен ключ
  - Той хешира съобщението
  - Той криптира съобщението
explanation: |
  В схемата за симетрично криптиране алгоритъмът за генериране на ключове създава частен ключ, който след това се използва за криптиране и декриптиране на съобщения.
reviewed: false
question: ฟังก์ชันของอัลกอริทึมการสร้างคีย์ในโครงร่างการเข้ารหัสแบบสมมาตรคืออะไร?
answer: มันสร้างคีย์ส่วนตัว
wrong_answers:
  - มันสร้างกุญแจสาธารณะ
  - มันแฮชข้อความ
  - มันเข้ารหัสข้อความ
explanation: |
  ในโครงร่างการเข้ารหัสแบบสมมาตร อัลกอริธึมการสร้างคีย์จะสร้างคีย์ส่วนตัว ซึ่งจะถูกใช้ในการเข้ารหัสและถอดรหัสข้อความ
reviewed: false
question: Ni nini kazi ya algoriti ya kizazi muhimu katika mpango wa usimbaji fiche linganifu?
answer: Inazalisha ufunguo wa kibinafsi
wrong_answers:
  - Inazalisha ufunguo wa umma
  - Inaharakisha ujumbe
  - Inasimba ujumbe kwa njia fiche
explanation: |
  Katika mpango wa usimbaji wa ulinganifu, algoriti ya uundaji wa ufunguo hutoa ufunguo wa faragha, ambao utatumiwa kusimba na kusimbua ujumbe.
reviewed: true
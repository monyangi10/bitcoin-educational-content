question: ในฟิลด์จำกัด บทบาทของพหุนามที่ไม่สามารถแยกตัวประกอบได้คืออะไร?
answer: กำหนดการดำเนินการคูณในฟิลด์
wrong_answers:
  - กำหนดอินเวอร์สการบวกของแต่ละองค์ประกอบ
  - ตรวจสอบให้แน่ใจว่าปิดสนามแล้ว
  - กำหนดเอกลักษณ์การคูณ
explanation: |
  พหุนามที่ไม่สามารถลดได้ถูกใช้เพื่อจัดโครงสร้างการคูณในฟิลด์จำกัด เพื่อให้แน่ใจว่าแต่ละองค์ประกอบยังคงอยู่ภายในฟิลด์
reviewed: false
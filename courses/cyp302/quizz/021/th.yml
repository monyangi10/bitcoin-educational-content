question: คำศัพท์ทางคณิตศาสตร์สำหรับการคำนวณที่เกี่ยวข้องกับการดำเนินการโมดูโลคืออะไร?
answer: เลขคณิตโมดูลาร์
wrong_answers:
  - พีชคณิตเชิงเส้น
  - ตรีโกณมิติ
  - เรขาคณิตเชิงแยก
explanation: |
  เลขคณิตโมดูลาร์เป็นสาขาของคณิตศาสตร์ที่เกี่ยวข้องกับการดำเนินการกับตัวเลขภายในกรอบจำกัด โดยใช้การดำเนินการโมดูลัส
reviewed: false
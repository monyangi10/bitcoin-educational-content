question: Какъв е математическият термин за изчисления, включващи операции модуло?
answer: Модулна аритметика
wrong_answers:
  - Линейна алгебра
  - Тригонометрия
  - Дискретна геометрия
explanation: |
  Модулната аритметика е дял от математиката, който се занимава с операциите с числа в крайна рамка, използвайки операцията модул.
reviewed: false
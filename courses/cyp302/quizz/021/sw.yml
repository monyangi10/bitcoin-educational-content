question: Ni neno gani la kihisabati linalotumika kwa hesabu zinazohusisha operesheni ya modulo?
answer: Hesabu ya modula
wrong_answers:
  - Algebra ya mstari
  - Trigonometry
  - Jiometri ya diskreti
explanation: |
  Hesabu ya moduli ni tawi la hisabati ambalo hujishughulisha na uendeshaji wa nambari ndani ya mfumo wenye kikomo, kwa kutumia uendeshaji wa modulo.
reviewed: true

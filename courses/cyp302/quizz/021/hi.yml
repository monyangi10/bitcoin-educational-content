question: गणित में मॉड्यूलो ऑपरेशन से जुड़े कैलकुलेशन को क्या कहते हैं?
answer: मॉड्यूलर अंकगणित
wrong_answers:
  - रैखिक बीजगणित
  - त्रिकोणमिति
  - डिस्क्रीट ज्योमेट्री
explanation: |
  मॉड्यूलर अंकगणित गणित की वह शाखा है जो मॉड्यूलो ऑपरेशन का उपयोग करके एक सीमित ढांचे के भीतर संख्याओं पर संचालन से संबंधित है।
reviewed: false
question: ทำไมฟิลด์ขยายที่มีฐาน 2 ถึงมีประโยชน์ในวิทยาการเข้ารหัสลับ?
answer: พวกเขาอนุญาตให้มีการจัดการสตริงไบนารีอย่างปลอดภัย
wrong_answers:
  - พวกเขาทำให้การคำนวณง่ายขึ้นโดยลดจำนวนการดำเนินการลง
  - พวกเขาป้องกันข้อผิดพลาดในการคำนวณโดยการเพิ่มความซ้ำซ้อน
  - พวกเขาจำกัดขอบเขตของความเป็นไปได้โดยการลดจำนวนองค์ประกอบลง
explanation: |
  ฟิลด์ขยายที่มีฐาน 2 นั้นสะดวกเพราะองค์ประกอบของมันสามารถมองเป็นสตริงไบนารี ทำให้ง่ายต่อการดำเนินการกับข้อมูลดิจิทัลในระดับไบนารีในระบบ
reviewed: false
question: क्रिप्टोग्राफी में 2 को आधार (बेस) वाले एक्सटेंशन फील्ड्स क्यों उपयोगी हैं?
answer: वे बाइनरी स्ट्रिंग्स को सुरक्षित तरीके से हैंडल करने की अनुमति देते हैं।
wrong_answers:
  - वे ऑपरेशन्स की संख्या को कम करके गणनाओं को सरल बनाते हैं।
  - वे अतिरिक्त जानकारी (redundancy) जोड़कर गणना में गलतियों को रोकते हैं।
  - वे Elements की संख्या को कम करके संभावनाओं की सीमा को सीमित करते हैं।
explanation: |
  2 के आधार वाले एक्सटेंशन फ़ील्ड्स काफी सुविधाजनक होते हैं क्योंकि इनके Elements को बाइनरी स्ट्रिंग्स के रूप में देखा जा सकता है। इससे सिस्टम्स में डिजिटल डेटा पर बाइनरी लेवल पर ऑपरेशन्स करना आसान हो जाता है।
reviewed: false
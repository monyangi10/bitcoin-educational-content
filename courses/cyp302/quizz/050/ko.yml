question: 기본값이 2인 확장 필드가 암호화에 유용한 이유는 무엇인가요?
answer: 이를 통해 바이너리 문자열을 안전하게 조작할 수 있습니다.
wrong_answers:
  - 연산 횟수를 줄여 계산을 간소화합니다.
  - 중복성을 추가하여 계산 오류를 방지합니다.
  - Elements의 수를 줄임으로써 가능성의 범위를 제한합니다.
explanation: |
  기본값이 2인 확장 필드는 Elements을 이진 문자열로 볼 수 있어 시스템에서 이진 수준에서 디지털 데이터에 대한 연산을 쉽게 수행할 수 있기 때문에 편리합니다.
reviewed: false
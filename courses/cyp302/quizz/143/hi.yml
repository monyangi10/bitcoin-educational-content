question: 2048-बिट इंटीजर को फैक्टराइज़ करने का अनुमानित समय क्या है, अगर सभी मौजूदा कंप्यूटिंग संसाधनों का इस्तेमाल किया जाए?
answer: ब्रह्मांड की उम्र से कहीं ज्यादा
wrong_answers:
  - क्लासिकल कंप्यूटर्स के साथ कुछ महीने
  - सुपरकंप्यूटर्स के साथ कुछ मिनट
  - कुछ दशकों में एक Bitcoin Mining फार्म
explanation: |
  2,048-बिट नंबर्स को फैक्टर करने की जटिलता इतनी ज़्यादा है कि इसे सुलझाना लगभग नामुमकिन है, यहाँ तक कि ब्रह्मांड की उम्र से भी ज़्यादा समय तक सारे मौजूदा कंप्यूटिंग संसाधनों का इस्तेमाल करके भी।
reviewed: false
question: 현재 모든 컴퓨팅 리소스를 사용하여 2048비트 정수를 인수분해하는 데 걸리는 예상 시간은 얼마인가요?
answer: 우주의 나이를 훨씬 뛰어넘어
wrong_answers:
  - 클래식 컴퓨터로 몇 달 동안
  - 슈퍼컴퓨터로 몇 분 만에
  - Bitcoin Mining 농장의 경우 수십 년이 걸립니다
explanation: |
  2048비트 숫자를 인수분해하는 복잡성은 우주의 나이를 초과하는 기간 동안 현존하는 모든 컴퓨팅 자원을 사용하더라도 사실상 풀 수 없을 정도로 복잡합니다.
reviewed: false
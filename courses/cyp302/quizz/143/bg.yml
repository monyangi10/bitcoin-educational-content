question: Какво е приблизителното време за факторизиране на 2048-битово цяло число, като се използват всички налични изчислителни ресурси?
answer: Много повече от възрастта на Вселената
wrong_answers:
  - Няколко месеца с класически компютри
  - Няколко минути със суперкомпютри
  - Няколко десетилетия за стопанство Bitcoin mining
explanation: |
  Сложността на факторирането на 2048-битови числа е такава, че би било практически невъзможно да се реши, дори ако се използват всички съществуващи изчислителни ресурси за период, надвишаващ възрастта на Вселената.
reviewed: false
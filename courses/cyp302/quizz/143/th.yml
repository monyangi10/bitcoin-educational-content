question: เวลาที่ประมาณการในการแยกตัวประกอบจำนวนเต็ม 2048 บิตโดยใช้ทรัพยากรการคำนวณทั้งหมดในปัจจุบันคือเท่าใด?
answer: ไกลเกินกว่ายุคของจักรวาล
wrong_answers:
  - ไม่กี่เดือนกับคอมพิวเตอร์คลาสสิก
  - ไม่กี่นาทีกับซูเปอร์คอมพิวเตอร์
  - ไม่กี่ทศวรรษสำหรับฟาร์ม Bitcoin mining
explanation: |
  ความซับซ้อนของการแยกตัวประกอบของตัวเลขขนาด 2048 บิตนั้นมีมากจนแทบจะเป็นไปไม่ได้ที่จะหาคำตอบได้ แม้จะใช้ทรัพยากรการคำนวณทั้งหมดที่มีอยู่ในช่วงเวลาที่ยาวนานกว่าช่วงอายุของจักรวาลก็ตาม
reviewed: false
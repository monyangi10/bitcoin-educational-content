question: क्रिप्टोग्राफी के उदाहरणों में अक्सर ऐलिस और बॉब कैरेक्टर्स का इस्तेमाल क्यों होता है?
answer: क्रिप्टोग्राफी के सिद्धांतों को आसान तरीके से समझाने के लिए
wrong_answers:
  - क्योंकि एलिस और बॉब क्रिप्टोग्राफी में तकनीकी शब्द हैं
  - क्योंकि वे दुनिया में सबसे आम नाम हैं
  - क्योंकि वे कंप्यूटर सिस्टम को दर्शाते हैं
explanation: |
  ऐलिस और बॉब क्रिप्टोग्राफी में अक्सर काल्पनिक किरदारों के तौर पर इस्तेमाल किए जाते हैं। ये संदेशों के आदान-प्रदान और क्रिप्टोग्राफी के सिद्धांतों को सरल और स्पष्ट तरीके से समझाने के लिए होते हैं।
reviewed: false
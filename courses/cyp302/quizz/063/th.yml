question: ทำไมตัวอย่างการเข้ารหัสมักใช้ตัวอักษร Alice และ Bob?
answer: เพื่อแสดงหลักการเข้ารหัสในรูปแบบที่ง่ายขึ้น
wrong_answers:
  - เนื่องจาก Alice และ Bob เป็นคำศัพท์ทางเทคนิคในวิทยาการเข้ารหัสลับ
  - เพราะว่าพวกเขาเป็นชื่อที่พบบ่อยที่สุดในโลก
  - เพราะพวกเขาเป็นตัวแทนของระบบคอมพิวเตอร์
explanation: |
  Alice และ Bob มักถูกใช้ในวิทยาการเข้ารหัสลับเป็นตัวละครสมมุติเพื่อแสดงการแลกเปลี่ยนข้อความและหลักการเข้ารหัสในบริบทที่เรียบง่ายและเป็นแบบแผน
reviewed: false
question: Защо в примерите за криптография често се използват символите Alice и Bob?
answer: Илюстриране на криптографските принципи по опростен начин
wrong_answers:
  - Тъй като Alice и Bob са технически термини в криптографията
  - Защото това са най-разпространените имена в света
  - Тъй като те представляват компютърни системи
explanation: |
  Alice и Bob обикновено се използват в криптографията като измислени герои за илюстриране на обмена на съобщения и криптографските принципи в опростен и схематичен контекст.
reviewed: false
question: कुंजी वितरण समस्या क्या है?
answer: कीज़ को बिना किसी फिजिकल Exchange के सुरक्षित तरीके से ट्रांसमिट करने की चुनौती
wrong_answers:
  - ग्राहक के लिए generate मल्टीपल की पेयर्स की ज़रूरत
  - कुंजियों (keys) को सुरक्षित रूप से रखने में मुश्किल होना
  - हर बार संचार करते समय चाबियाँ बदलने की ज़िम्मेदारी
explanation: |
  कुंजी वितरण समस्या (key distribution problem) सुरक्षित तरीके से कुंजियों (keys) को भेजने की चुनौती से जुड़ी है, यह एक ऐसी जरूरत है जो डिजिटल संचार (digital communications) में बेहद अहम हो गई है जहाँ भौतिक Exchange (physical Exchange) का इस्तेमाल करना व्यावहारिक नहीं है।

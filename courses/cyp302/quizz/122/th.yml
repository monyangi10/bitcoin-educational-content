question: ปัญหาการกระจายกุญแจคืออะไร?
answer: ความท้าทายในการส่งผ่านกุญแจอย่างปลอดภัยโดยไม่ต้องแลกเปลี่ยนทางกายภาพ
wrong_answers:
  - ความจำเป็นในการ generate คู่คีย์หลายคู่ต่อไคลเอนต์
  - ความยากลำบากในการรักษาความปลอดภัยของการจัดเก็บกุญแจทางกายภาพ
  - ข้อผูกพันในการเปลี่ยนกุญแจในแต่ละการสื่อสาร
explanation: |
  ปัญหาการแจกจ่ายกุญแจเกี่ยวข้องกับความท้าทายในการส่งกุญแจในลักษณะที่ปลอดภัย ซึ่งเป็นสิ่งจำเป็นที่มีความสำคัญอย่างยิ่งในระบบการสื่อสารดิจิทัลที่การแลกเปลี่ยนทางกายภาพไม่สามารถทำได้จริง
reviewed: false
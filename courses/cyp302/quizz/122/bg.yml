question: Какъв е проблемът с разпределението на ключовете?
answer: Предизвикателството за сигурно предаване на ключове без физически обмен
wrong_answers:
  - Необходимост от generate няколко двойки ключове за всеки клиент
  - Трудностите при осигуряване на физическото съхранение на ключовете
  - Задължението за смяна на ключовете при всяко съобщение
explanation: |
  Проблемът с разпределението на ключовете се отнася до предизвикателството да се предават ключове по сигурен начин - необходимост, която е от решаващо значение в цифровите комуникации, където физическият обмен е непрактичен.
reviewed: false
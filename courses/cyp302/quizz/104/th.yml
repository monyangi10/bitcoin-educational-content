question: เป้าหมายหลักของโครงร่างการเข้ารหัสที่รับรองความถูกต้องคืออะไร?
answer: รับรองความลับและความถูกต้องของการสื่อสาร
wrong_answers:
  - สร้างคีย์ในลักษณะที่ปลอดภัย
  - แทนที่ MACs ในการแลกเปลี่ยนข้อมูลเข้ารหัสลับ
  - ถอดรหัสข้อความที่ดักจับได้โดยอัตโนมัติ
explanation: |
  โครงร่างการเข้ารหัสที่ผ่านการรับรองรวมการเข้ารหัสและรหัสการตรวจสอบความถูกต้อง (MAC) เพื่อรับประกันทั้งความลับของข้อความและความถูกต้องของข้อความเหล่านั้น
reviewed: false
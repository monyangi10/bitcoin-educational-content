question: एक प्रमाणित एन्क्रिप्शन स्कीम का मुख्य लक्ष्य क्या है?
answer: संचार की गोपनीयता और प्रामाणिकता सुनिश्चित करें
wrong_answers:
  - generate कुंजियों को सुरक्षित तरीके से
  - क्रिप्टोग्राफ़िक एक्सचेंज में MACs को बदलें
  - स्वचालित रूप से रोके गए संदेशों को डिक्रिप्ट करें
explanation: |
  एक प्रमाणित एन्क्रिप्शन स्कीम (authenticated encryption scheme) मैसेज की गोपनीयता (confidentiality) और उसकी प्रामाणिकता (authenticity) दोनों सुनिश्चित करने के लिए एन्क्रिप्शन और ऑथेंटिकेशन कोड (MAC) को मिलाता है।

question: Каква е основната цел на схемата за удостоверено криптиране?
answer: Гарантиране на поверителността и автентичността на съобщенията
wrong_answers:
  - Генериране на ключове по сигурен начин
  - Замяна на MAC в криптографските обмени
  - Автоматично декриптиране на прихванати съобщения
explanation: |
  Схемата за удостоверено криптиране съчетава криптиране и код за удостоверяване (MAC), за да гарантира едновременно поверителността на съобщенията и тяхната автентичност.
reviewed: false
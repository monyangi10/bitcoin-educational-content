question: Каква е основната цел на теорията на числата?
answer: Изучаване на свойствата на целите числа и функциите, които оперират с тях
wrong_answers:
  - Анализиране на геометрични трансформации
  - Изследване на структурата на случайни геометрични фигури в крайна група
  - Разработване на алгоритми за симетрично криптиране
explanation: |
  Теорията на числата се фокусира върху свойствата на целите числа и функциите, прилагани към тях, често за приложения в криптографията, особено в контекста на криптографията с публичен ключ.

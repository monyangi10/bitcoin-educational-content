question: เป้าหมายหลักของทฤษฎีจำนวนคืออะไร?
answer: ศึกษาคุณสมบัติของจำนวนเต็มและฟังก์ชันที่ทำงานร่วมกับจำนวนเต็มเหล่านั้น
wrong_answers:
  - วิเคราะห์การแปลงทางเรขาคณิต
  - ศึกษาโครงสร้างของรูปทรงเรขาคณิตแบบสุ่มในกลุ่มจำกัด
  - พัฒนาอัลกอริธึมการเข้ารหัสแบบสมมาตร
explanation: |
  ทฤษฎีจำนวนมุ่งเน้นไปที่คุณสมบัติของจำนวนเต็มและฟังก์ชันที่ประยุกต์ใช้กับจำนวนเต็ม ซึ่งมักใช้ในแอปพลิเคชันด้านการเข้ารหัส โดยเฉพาะในบริบทของการเข้ารหัสคีย์สาธารณะ
reviewed: false
question: नंबर थ्योरी का मुख्य लक्ष्य क्या है?
answer: पूर्णांकों के गुणों और उनके साथ काम करने वाले फंक्शन्स का अध्ययन करना
wrong_answers:
  - ज्यामितीय परिवर्तनों का विश्लेषण करें
  - एक सीमित समूह में यादृच्छिक ज्यामितीय आकृतियों की संरचना का अध्ययन करें
  - सममित एन्क्रिप्शन एल्गोरिदम विकसित करें
explanation: |
  नंबर थ्योरी पूर्णांकों (इंटीजर्स) के गुणों और उन पर लागू होने वाले फंक्शन्स पर फोकस करती है, खासकर क्रिप्टोग्राफी में इस्तेमाल के लिए, खास तौर पर पब्लिक की क्रिप्टोग्राफी के संदर्भ में।
reviewed: false
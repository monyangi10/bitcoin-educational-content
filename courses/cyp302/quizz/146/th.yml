question: เงื่อนไขสำหรับจำนวนเต็ม a ที่จะมีอินเวอร์สโมดูโล N คือ a และ N ต้องเป็นจำนวนที่ไม่มีตัวหารร่วมกันนอกจาก 1 หรือกล่าวอีกนัยหนึ่งคือ a และ N ต้องเป็นจำนวนเฉพาะสัมพัทธ์ (gcd(a, N) = 1)
answer: a และ N ต้องเป็นจำนวนที่ไม่มีตัวประกอบร่วม
wrong_answers:
  - N ต้องเป็นเลขคู่
  - a ต้องเป็นเลขคี่
  - a ต้องเป็นจำนวนเฉพาะ
explanation: |
  จำนวนเต็ม a มีอินเวอร์สโมดูโล N ก็ต่อเมื่อพวกมันเป็นจำนวนที่ไม่มีตัวหารร่วมกัน นั่นหมายความว่าตัวหารร่วมมากที่สุดของพวกมันคือ 1
reviewed: false
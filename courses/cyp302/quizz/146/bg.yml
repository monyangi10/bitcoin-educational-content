question: Кое е условието едно цяло число a да има обратен модул на N?
answer: a и N трябва да са коприми
wrong_answers:
  - N трябва да е четно
  - a трябва да е нечетно
  - a трябва да е просто число
explanation: |
  Едно цяло число a има обратна на него формула в модул N тогава и само тогава, когато те са коприми, т.е. най-големият им общ делител е 1.
reviewed: false
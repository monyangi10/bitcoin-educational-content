question: एक पूर्णांक a का N के सापेक्ष व्युत्क्रम (inverse modulo N) होने की शर्त क्या है?
answer: a और N सह-अभाज्य होने चाहिए
wrong_answers:
  - N जरूर सम होना चाहिए
  - a विषम होना चाहिए
  - a एक अभाज्य संख्या होनी चाहिए
explanation: |
  एक पूर्णांक a का N के साथ मॉड्यूलो उल्टा (इनवर्स) तभी होता है जब वे सह-अभाज्य (कॉप्राइम) हों, यानी उनका महत्तम समापवर्तक (GCD) 1 हो।

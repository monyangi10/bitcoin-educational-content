question: Какво се съдържа в желязната кутия, предадена на Робърт Морис?
answer: Три криптирани текста и бележка
wrong_answers:
  - Карта и улики
  - Уникален ключ за криптиране
  - Единичен списък с имена
explanation: |
  Кутията съдържа три криптирани текста и бележка, в която се обяснява откриването на съкровище и се дават инструкции как да се извлече съдържанието му.
reviewed: false
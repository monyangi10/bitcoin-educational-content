question: None muri ako gasandugu k’icuma kashikirijwe Robert Morriss harimwo iki?
answer: Ivyanditswe bitatu bipfutse n'agapapuro
wrong_answers:
  - Ikarata n'ibimenyetso
  - Urufunguzo rwihariye rw'ububiko
  - Urutonde rumwe rw'amazina
explanation: |
  Ico kigega carimwo ivyanditswe bitatu vy’ibanga be n’agapapuro kasigura ukuntu ubutunzi bwavumbuwe be n’amabwirizwa yerekeye ingene umuntu yoronka ibirimwo.

question: มีอะไรอยู่ในกล่องเหล็กที่ส่งมอบให้กับโรเบิร์ต มอร์ริสส์?
answer: ข้อความที่เข้ารหัสสามข้อความและบันทึก
wrong_answers:
  - แผนที่และเบาะแส
  - คีย์การเข้ารหัสที่ไม่ซ้ำกัน
  - รายชื่อเดียว
explanation: |
  กล่องนั้นบรรจุข้อความที่เข้ารหัสสามข้อความและบันทึกที่อธิบายการค้นพบสมบัติและให้คำแนะนำเกี่ยวกับวิธีการดึงเนื้อหาของมันออกมา
reviewed: false
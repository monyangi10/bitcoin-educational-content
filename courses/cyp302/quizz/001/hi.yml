question: लोहे के बक्से में क्या था जो रॉबर्ट मॉरिस को सौंपा गया था?
answer: तीन एन्क्रिप्टेड टेक्स्ट और एक नोट
wrong_answers:
  - एक नक्शा और सुराग
  - एक अनोखा एन्क्रिप्शन कुंजी
  - एक नामों की सूची
explanation: |
  डिब्बे में तीन एन्क्रिप्टेड टेक्स्ट और एक नोट था जिसमें एक खजाने की खोज का ज़िक्र था और उसकी सामग्री को कैसे प्राप्त किया जाए, इसके निर्देश दिए गए थे।
reviewed: false
question: 일회용 패드의 실질적인 주요 한계는 무엇인가요?
answer: 키는 메시지 길이만큼 길어야 하며 재사용하지 않아야 합니다
wrong_answers:
  - 키는 매일 변경해야 합니다
  - 키는 메시지보다 세 배 길어야 합니다
  - 키는 반드시 프랑스 미니텔에 보관해야 합니다
explanation: |
  일회용 패드의 키는 메시지 길이만큼 길어야 하고 재사용할 수 없기 때문에 실제 상황에서 사용하기가 상당히 복잡합니다. 메시지만큼의 데이터를 안전하게 전송할 수 있다면 키가 아닌 메시지를 직접 전송하는 것이 더 합리적이기 때문입니다.
reviewed: false
question: वन-टाइम पैड की मुख्य व्यावहारिक सीमा क्या है?
answer: कुंजी संदेश जितनी लंबी होनी चाहिए और कभी भी दोबारा इस्तेमाल नहीं करनी चाहिए
wrong_answers:
  - रोज़ चाबी बदलनी चाहिए
  - कुंजी संदेश से तीन गुना लंबी होनी चाहिए
  - कुंजी को जरूर फ्रेंच मिनिटेल पर स्टोर किया जाना चाहिए
explanation: |
  वन-टाइम पैड में इस्तेमाल होने वाली कुंजी (key) मैसेज जितनी ही लंबी होनी चाहिए और कभी भी दोबारा इस्तेमाल नहीं की जानी चाहिए। यह बात इसे प्रैक्टिकल इस्तेमाल में काफी मुश्किल बना देती है। दरअसल, अगर कोई मैसेज जितना लंबा डेटा सुरक्षित तरीके से ट्रांसमिट कर सकता है, तो कुंजी भेजने के बजाय सीधे मैसेज भेजना ज़्यादा समझदारी होगी।

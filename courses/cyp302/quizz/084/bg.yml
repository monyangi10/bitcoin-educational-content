question: Кое е основното практическо ограничение на еднократния блок?
answer: Ключът трябва да е дълъг колкото съобщението и никога да не се използва повторно
wrong_answers:
  - Ключът трябва да се сменя всеки ден
  - Ключът трябва да е три пъти по-дълъг от съобщението
  - Ключът трябва задължително да се съхранява на френски Minitel
explanation: |
  Ключът в еднократната подложка трябва да бъде толкова дълъг, колкото е съобщението, и никога да не се използва повторно, което значително усложнява използването му в практически контекст. Това е така, защото ако някой е в състояние да предаде данни, дълги колкото съобщението, по сигурен начин, би било по-разумно да предаде директно съобщението, а не ключа.
reviewed: false
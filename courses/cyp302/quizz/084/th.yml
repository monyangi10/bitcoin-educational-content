question: ข้อจำกัดที่สำคัญในทางปฏิบัติของ one-time pad คืออะไร?
answer: กุญแจต้องมีความยาวเท่ากับข้อความและห้ามนำกลับมาใช้ใหม่
wrong_answers:
  - ต้องเปลี่ยนกุญแจทุกวัน
  - กุญแจต้องยาวกว่าข้อความสามเท่า
  - คีย์จะต้องถูกเก็บไว้บน Minitel ของฝรั่งเศส
explanation: |
  กุญแจใน one-time pad ต้องมีความยาวเท่ากับข้อความและไม่สามารถนำกลับมาใช้ใหม่ได้ ซึ่งทำให้การใช้งานในบริบทที่เป็นจริงซับซ้อนมากขึ้น นี่เป็นเพราะว่าหากสามารถส่งข้อมูลที่มีความยาวเท่ากับข้อความได้อย่างปลอดภัย จะมีเหตุผลมากกว่าที่จะส่งข้อความโดยตรงแทนที่จะส่งกุญแจ
reviewed: false
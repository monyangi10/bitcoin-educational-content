question: Какво представлява цифровият подпис в контекста на асиметричната криптография?
answer: Механизъм за проверка на автентичността на дадено съобщение чрез използване на частния ключ
wrong_answers:
  - Процес за по-силно криптиране на съобщението
  - Допълнителен публичен ключ за валидиране на криптирано съобщение
  - Цифрово копие на саморъчен подпис
explanation: |
  Цифровият подпис е криптографска техника, която доказва, че дадено съобщение наистина е създадено от собственика на съответния частен ключ, като по този начин гарантира неговата автентичност.
reviewed: false
question: असिमेट्रिक क्रिप्टोग्राफी के संदर्भ में डिजिटल सिग्नेचर क्या होता है?
answer: एक संदेश की प्रामाणिकता सत्यापित करने का तरीका जो निजी कुंजी का उपयोग करता है
wrong_answers:
  - संदेश को और मज़बूती से एन्क्रिप्ट करने की एक प्रक्रिया
  - एक्स्ट्रा पब्लिक की जो एन्क्रिप्टेड मैसेज को वैलिडेट करे
  - हस्ताक्षर की एक डिजिटल कॉपी
explanation: |
  डिजिटल सिग्नेचर एक क्रिप्टोग्राफिक तकनीक है जो यह साबित करती है कि मैसेज वास्तव में उसी प्राइवेट की के मालिक द्वारा बनाया गया था, जिससे उसकी प्रामाणिकता सुनिश्चित होती है।
reviewed: false
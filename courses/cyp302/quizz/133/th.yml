question: ลายเซ็นดิจิทัลคืออะไรในบริบทของการเข้ารหัสแบบอสมมาตร?
answer: กลไกสำหรับการตรวจสอบความถูกต้องของข้อความโดยใช้กุญแจส่วนตัว
wrong_answers:
  - กระบวนการในการเข้ารหัสข้อความให้แข็งแกร่งยิ่งขึ้น
  - คีย์สาธารณะเพิ่มเติมเพื่อยืนยันข้อความที่เข้ารหัส
  - สำเนาดิจิทัลของลายเซ็นที่เขียนด้วยมือ
explanation: |
  ลายเซ็นดิจิทัลเป็นเทคนิคการเข้ารหัสที่พิสูจน์ว่าข้อความถูกสร้างขึ้นโดยเจ้าของกุญแจส่วนตัวที่สอดคล้องกัน ซึ่งทำให้มั่นใจได้ในความถูกต้องของมัน
reviewed: false
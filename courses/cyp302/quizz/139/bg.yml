question: Каква е основната характеристика на криптографската хеш функция?
answer: Той дава изход с фиксирана дължина за всеки вход, независимо от неговия размер.
wrong_answers:
  - Той криптира данни с помощта на симетричен ключ.
  - Той дава променлив изход в зависимост от дължината на входа.
  - Той декриптира съобщенията с помощта на публичен ключ.
explanation: |
  Хеш функцията генерира хеш с фиксирана дължина, независимо от размера на входа.

question: क्रिप्टोग्राफ़िक Hash फंक्शन की मुख्य विशेषता क्या है?
answer: यह किसी भी इनपुट के लिए एक निश्चित लंबाई का आउटपुट देता है, चाहे उसका आकार कुछ भी हो।
wrong_answers:
  - यह डेटा को एक सममित कुंजी (symmetric key) का इस्तेमाल करके एन्क्रिप्ट करता है।
  - यह इनपुट की लंबाई के हिसाब से अलग-अलग आउटपुट देता है।
  - यह पब्लिक की का इस्तेमाल करके मैसेजेस को डिक्रिप्ट करता है।
explanation: |
  एक Hash फंक्शन फिक्स्ड लेंथ का Hash जनरेट करता है, चाहे इनपुट का साइज़ कुछ भी हो।
reviewed: false
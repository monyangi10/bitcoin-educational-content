question: ลักษณะสำคัญของฟังก์ชันแฮชเข้ารหัสคืออะไร?
answer: มันสร้างผลลัพธ์ที่มีความยาวคงที่สำหรับข้อมูลนำเข้าใด ๆ โดยไม่คำนึงถึงขนาดของมัน
wrong_answers:
  - มันเข้ารหัสข้อมูลโดยใช้กุญแจสมมาตร
  - มันสร้างผลลัพธ์ที่เปลี่ยนแปลงได้ขึ้นอยู่กับความยาวของข้อมูลนำเข้า
  - มันถอดรหัสข้อความโดยใช้กุญแจสาธารณะ
explanation: |
  ฟังก์ชันแฮชสร้างแฮชที่มีความยาวคงที่ ไม่ว่าจะมีขนาดของข้อมูลนำเข้าเท่าใดก็ตาม
reviewed: false
question: Каква нагласа трябва да възприемат потребителите по отношение на неприкосновеността на техните комуникации в съвременната среда?
answer: Предполагайте, че някой винаги ви слуша
wrong_answers:
  - Разчитайте само на Wi-Fi
  - Вярват, че мобилните данни са напълно сигурни
  - Използвайте само кабелни връзки
explanation: |
  В свят, в който много комуникационни канали са податливи на прихващане, е разумно да се предположи, че трета страна може да подслушва, което прави криптографията от съществено значение.

question: ผู้ใช้ควรมีทัศนคติอย่างไรเกี่ยวกับความเป็นส่วนตัวของการสื่อสารในสภาพแวดล้อมสมัยใหม่?
answer: สมมติว่ามีคนคอยฟังอยู่เสมอ
wrong_answers:
  - พึ่งพา Wi-Fi เท่านั้น
  - เชื่อว่าข้อมูลมือถือปลอดภัยอย่างสมบูรณ์
  - ใช้การเชื่อมต่อแบบใช้สายเท่านั้น
explanation: |
  ในโลกที่ช่องทางการสื่อสารหลายแห่งมีความเสี่ยงต่อการถูกดักฟัง การสมมติว่ามีบุคคลที่สามอาจกำลังฟังอยู่จึงเป็นเรื่องที่ฉลาด ซึ่งทำให้การเข้ารหัสข้อมูลเป็นสิ่งจำเป็น
reviewed: false
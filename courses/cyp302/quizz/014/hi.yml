  - यकीन करो कि मोबाइल डेटा पूरी तरह से सुरक्षित है
  - वायरलेस कनेक्शन नहीं, केवल तार वाले कनेक्शन का इस्तेमाल करें
explanation: |
  एक ऐसी दुनिया में जहां कई संचार माध्यमों को बीच में रोका जा सकता है, यह मान लेना समझदारी है कि कोई तीसरा पक्ष सुन रहा हो सकता है, इसलिए क्रिप्टोग्राफी बेहद जरूरी हो जाती है।

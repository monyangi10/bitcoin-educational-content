question: Ni inyifato iyihe abakoresha bakwiye kugira ku bijanye n’ubuzima bwite bw’ivyo bavugana mu bihe vya none?
answer: Twiyumvire ko hari umuntu yama yumviriza .
wrong_answers:
  - Kwizigira Wi-Fi gusa
  - Niwizere ko amakuru yo kuri telefone ngendanwa atekanye neza
  - Koresha amahuzu y'intsinga gusa
explanation: |
  Mu isi aho imihora myinshi yo guhanahana amakuru ishobora gufatwa n’abantu, birabereye kwiyumvira ko uwundi muntu yoba ariko aratega yompi, ivyo bikaba bituma ubuhinga bwo gukingira amakuru buba ngombwa cane.

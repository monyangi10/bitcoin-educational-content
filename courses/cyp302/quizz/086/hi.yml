question: ECB (Electronic Codebook) मोड में ब्लॉक साइफर का मुख्य नुकसान यह है कि एक ही प्लेनटेक्स्ट ब्लॉक हमेशा एक ही साइफरटेक्स्ट ब्लॉक में एन्क्रिप्ट होता है। इससे पैटर्न दिखाई देने लगते हैं, खासकर बड़ी डेटा फाइल्स या इमेजेस में, जहाँ एक जैसे ब्लॉक्स बार-बार आते हैं। यह सिक्योरिटी के लिए खतरनाक हो सकता है क्योंकि अटैकर डेटा के स्ट्रक्चर को समझ सकता है, भले ही वह कंटेंट को डिक्रिप्ट न कर पाए।
answer: यह निर्धारित है और डेटा में पैटर्न दिखा सकता है
wrong_answers:
  - इसे अलग-अलग लंबाई की चाबियों की जरूरत होती है
  - यह 128 बिट से ज़्यादा के मैसेज के साथ काम नहीं करता
  - यह 256 बिट से ज़्यादा के मैसेज के साथ काम नहीं करता
  The ECB method (Electronic Code Book) is deterministic: identical blocks of data are encrypted in the same way, which allows patterns to be detected in the encrypted text.

question: Какъв е основният недостатък на метода ЕЦБ с блоков шифър?
answer: Той е детерминистичен и може да разкрие модели в данните
wrong_answers:
  - Изисква ключове с променлива дължина
  - Не работи със съобщения над 128 бита
  - Не работи със съобщения над 256 бита
explanation: |
  Методът на ЕЦБ (Electronic Code Book) е детерминистичен: идентични блокове от данни се криптират по един и същи начин, което позволява да се откриват шаблони в криптирания текст.
reviewed: false
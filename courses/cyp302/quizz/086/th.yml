question: ข้อบกพร่องหลักของวิธี ECB กับบล็อกไซเฟอร์คืออะไร?
answer: มันเป็นแบบกำหนดแน่นอนและสามารถเปิดเผยรูปแบบในข้อมูลได้
wrong_answers:
  - ต้องใช้คีย์ที่มีความยาวแปรผัน
  - มันไม่ทำงานกับข้อความที่มีขนาดเกิน 128 บิต
  - มันไม่ทำงานกับข้อความที่มีขนาดเกิน 256 บิต
explanation: |
  วิธี ECB (Electronic Code Book) เป็นแบบกำหนดแน่นอน: บล็อกข้อมูลที่เหมือนกันจะถูกเข้ารหัสในลักษณะเดียวกัน ซึ่งทำให้สามารถตรวจจับรูปแบบในข้อความที่เข้ารหัสได้
reviewed: false
question: कर्कहॉफ़ का सिद्धांत खुले सिस्टम जैसे लिनक्स की सुरक्षा को कैसे बढ़ावा देता है?
answer: यह सार्वजनिक रूप से संभावित कमजोरियों की जांच करने की अनुमति देता है
wrong_answers:
  - यह एन्क्रिप्शन एल्गोरिदम को अदृश्य बना देता है
  - यह संभावित उपयोगकर्ताओं की संख्या को सीमित करता है
  - यह सुनिश्चित करता है कि यूनिक की का इस्तेमाल हो
explanation: |
  केर्कहॉफ़ का सिद्धांत सुरक्षा खामियों की सार्वजनिक जाँच को सक्षम बनाता है, जैसे कि ओपन-सोर्स सिस्टम्स में होता है, जिससे पारदर्शिता के ज़रिए सिस्टम्स ज़्यादा विश्वसनीय बनते हैं। सुरक्षा सिर्फ़ कुंजी (की) से सुनिश्चित होती है, एन्क्रिप्शन प्रक्रिया से नहीं।

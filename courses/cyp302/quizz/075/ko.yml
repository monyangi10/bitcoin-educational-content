question: Kerckhoff의 원칙이 Linux와 같은 개방형 시스템의 보안을 어떻게 촉진하나요?
answer: 잠재적인 취약점을 공개적으로 검증할 수 있습니다
wrong_answers:
  - 암호화 알고리즘을 보이지 않게 만듭니다
  - 잠재적 사용자 수를 제한합니다
  - 고유 키 사용을 보장합니다
explanation: |
  케르크호프의 원칙은 오픈 소스 시스템에서와 같이 보안 결함을 공개적으로 검증할 수 있게 하여 투명성을 통해 시스템의 신뢰성을 높입니다. 보안은 암호화 프로세스 자체가 아니라 키에 의해서만 보장됩니다.
reviewed: false
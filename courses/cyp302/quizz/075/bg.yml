question: Как принципът на Керкхоф улеснява сигурността на отворените системи като Linux?
answer: Тя позволява публична проверка на потенциални уязвимости
wrong_answers:
  - Той прави алгоритмите за криптиране невидими
  - Ограничава броя на потенциалните потребители
  - Тя гарантира използването на уникални ключове
explanation: |
  Принципът на Керкхоф дава възможност за публична проверка на пропуските в сигурността, както е в системите с отворен код, което прави системите по-надеждни благодарение на прозрачността. Сигурността се гарантира единствено от ключа, а не от самия процес на криптиране.
reviewed: false
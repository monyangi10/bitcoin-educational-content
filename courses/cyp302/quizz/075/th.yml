question: หลักการของเคิร์คฮอฟฟ์ช่วยให้ระบบเปิดอย่างลินุกซ์มีความปลอดภัยได้อย่างไร?
answer: มันอนุญาตให้มีการตรวจสอบสาธารณะเกี่ยวกับช่องโหว่ที่อาจเกิดขึ้น
wrong_answers:
  - มันทำให้อัลกอริทึมการเข้ารหัสลับมองไม่เห็น
  - มันจำกัดจำนวนผู้ใช้ที่เป็นไปได้
  - มันรับประกันการใช้คีย์ที่ไม่ซ้ำกัน
explanation: |
  หลักการของ Kerckhoff ช่วยให้สามารถตรวจสอบข้อบกพร่องด้านความปลอดภัยได้อย่างเปิดเผย เช่นเดียวกับในระบบโอเพ่นซอร์ส ซึ่งทำให้ระบบมีความน่าเชื่อถือมากขึ้นผ่านความโปร่งใส ความปลอดภัยได้รับการรับรองโดยอาศัยเฉพาะกุญแจเท่านั้น ไม่ใช่กระบวนการเข้ารหัสเอง
reviewed: false
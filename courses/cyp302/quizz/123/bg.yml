question: Какъв проблем възниква, ако Jim's Sporting Goods използва една и съща двойка ключове за всички клиенти?
answer: Всеки клиент може да получи достъп до комуникациите на други потребители
wrong_answers:
  - Ключът ще стане твърде голям
  - Комуникациите ще се забавят
  - Клиентите ще трябва да сменят ключовете при всяка покупка
explanation: |
  С използването на един и същ ключ за всички, Jim's Sporting Goods ще компрометира поверителността и целостта, тъй като всеки клиент може да получи достъп до данните на други клиенти.
reviewed: false
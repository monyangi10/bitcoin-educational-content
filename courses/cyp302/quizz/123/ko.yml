question: 짐스 스포츠용품에서 모든 고객에게 동일한 키 쌍을 사용하는 경우 어떤 문제가 발생하나요?
answer: 모든 고객이 다른 고객의 커뮤니케이션에 액세스할 수 있습니다
wrong_answers:
  - 키가 너무 커질 수 있습니다
  - 통신 속도가 느려질 수 있습니다
  - 고객은 구매할 때마다 키를 변경해야 합니다
explanation: |
  모든 고객에게 동일한 키를 사용하면 각 고객이 잠재적으로 다른 고객의 데이터에 액세스할 수 있기 때문에 짐스 스포츠용품은 기밀성과 무결성을 손상시킬 수 있습니다.
reviewed: false
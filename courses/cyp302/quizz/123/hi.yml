question: अगर जिम स्पोर्टिंग गुड्स सभी ग्राहकों के लिए एक ही जोड़ी की (एक जैसी) चाबियों का इस्तेमाल करे, तो क्या समस्या हो सकती है?
answer: कोई भी ग्राहक दूसरों के संदेशों तक पहुँच सकता था
wrong_answers:
  - चाबी बहुत बड़ी हो जाएगी
  - कम्यूनिकेशन धीमे हो जाएंगे
  - ग्राहकों को हर खरीदारी के साथ चाबियाँ बदलनी पड़ेंगी
explanation: |
  सबके लिए एक ही चाबी (key) इस्तेमाल करने से, जिम्स स्पोर्टिंग गुड्स गोपनीयता (confidentiality) और सुरक्षा (integrity) को खतरे में डाल देगा, क्योंकि हर ग्राहक दूसरे ग्राहकों के डेटा तक पहुँच सकता है।

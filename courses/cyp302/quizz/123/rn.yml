question: Ni ingorane iyihe yovyuka iyo Jim’s Sporting Goods ikoresha imfunguruzo zibiri ku bakiriya bose?
answer: Umukiriya wese yari gushobora kuronka amakuru y'abandi
wrong_answers:
  - Urufunguzo rwobaye runini cane
  - Ivy'itumanaho vyogabanuka
  - Abaguzi bobwirizwa guhindura imfunguruzo igihe cose baguze
explanation: |
  Mu gukoresha urufunguzo rumwe kuri bose, Jim’s Sporting Goods yoshobora gutuma ibanga n’ubunyankamugayo bihungabana, kuko umukiriya wese yoshobora kuronka amakuru y’abandi bakiriya.

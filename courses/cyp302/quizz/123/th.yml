question: ปัญหาอะไรเกิดขึ้นถ้า Jim's Sporting Goods ใช้คู่กุญแจเดียวกันสำหรับลูกค้าทุกคน?
answer: ลูกค้าทุกคนสามารถเข้าถึงการสื่อสารของผู้อื่นได้
wrong_answers:
  - คีย์จะมีขนาดใหญ่เกินไป
  - การสื่อสารจะช้าลง
  - ลูกค้าจะต้องเปลี่ยนกุญแจทุกครั้งที่ซื้อ
explanation: |
  การใช้กุญแจเดียวกันสำหรับทุกคน ร้านอุปกรณ์กีฬาของจิมจะทำให้ความลับและความสมบูรณ์ถูกประนีประนอม เนื่องจากลูกค้าแต่ละรายอาจสามารถเข้าถึงข้อมูลของลูกค้ารายอื่นได้
reviewed: false
question: RC4가 동기 스트림 암호로 분류되는 이유는 무엇인가요?
answer: 키 스트림은 일반 텍스트 및 암호 텍스트와 독립적입니다
wrong_answers:
  - 키 스트림은 이전 암호 텍스트의 값에 따라 달라집니다
  - 일반 텍스트는 키 스트림에 통합되어야 합니다
  - 평문 텍스트만을 기반으로 하는 키 스트림을 사용합니다
explanation: |
  RC4는 키 스트림이 평문이나 암호문이 아닌 초기 키에만 의존하므로 메시지로부터 이 스트림의 독립성을 보장하기 때문에 동기 스트림 암호화입니다.

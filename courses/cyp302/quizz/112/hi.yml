question: RC4 को synchronous stream cipher क्यों कहा जाता है?
answer: की स्ट्रीम प्लेनटेक्स्ट और सिफरटेक्स्ट से स्वतंत्र होती है
wrong_answers:
  - की स्ट्रीम पिछले सिफरटेक्स्ट के वैल्यूज़ पर निर्भर करती है
  - प्लेनटेक्स्ट को की स्ट्रीम में शामिल किया जाना चाहिए
  - यह सिर्फ सादे टेक्स्ट (plaintext) पर आधारित एक की स्ट्रीम का इस्तेमाल करता है।
explanation: |
  RC4 एक सिंक्रोनस स्ट्रीम सिफर है क्योंकि इसकी की स्ट्रीम सिर्फ शुरुआती की (initial key) पर निर्भर करती है, न कि प्लेनटेक्स्ट या सिफरटेक्स्ट पर। यह सुनिश्चित करता है कि यह स्ट्रीम मैसेजेस से स्वतंत्र रहे।
reviewed: false
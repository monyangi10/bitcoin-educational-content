question: ทำไม RC4 ถึงถูกจัดประเภทเป็น synchronous stream cipher?
answer: สตรีมคีย์เป็นอิสระจากข้อความที่เป็นข้อความธรรมดาและข้อความที่ถูกเข้ารหัส
wrong_answers:
  - สตรีมคีย์ขึ้นอยู่กับค่าของข้อความลับก่อนหน้า
  - ต้องผสมข้อความลับเข้ากับกระแสคีย์
  - มันใช้สตรีมคีย์ที่อิงจากข้อความธรรมดาเท่านั้น
explanation: |
  RC4 เป็น synchronous stream cipher เนื่องจาก key stream ของมันขึ้นอยู่กับ key เริ่มต้นเท่านั้นและไม่ขึ้นอยู่กับ plaintext หรือ ciphertext ทำให้มั่นใจได้ว่า stream นี้เป็นอิสระจากข้อความ
reviewed: false
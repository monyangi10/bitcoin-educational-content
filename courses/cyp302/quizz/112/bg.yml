question: Защо RC4 е класифициран като синхронен поточен шифър?
answer: Потокът от ключове е независим от открития и шифрования текст
wrong_answers:
  - Потокът от ключове зависи от стойностите на предишния шифров текст
  - Откритият текст трябва да бъде интегриран в потока ключове
  - Използва се поток от ключове, базиран единствено на обикновения текст
explanation: |
  RC4 е синхронен поточен шифър, тъй като неговият ключов поток зависи само от първоначалния ключ, а не от открития или шифрования текст, което гарантира независимостта на този поток от съобщенията.
reviewed: false
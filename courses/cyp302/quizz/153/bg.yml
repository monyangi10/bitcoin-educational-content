question: Какъв проблем за сигурността възниква, ако едно и също съобщение се криптира многократно в опростената криптосистема RSA?
answer: Съобщението винаги ще дава едно и също криптиране
wrong_answers:
  - Съобщението ще бъде уязвимо на атаки с груба сила
  - Съобщението ще бъде обърнато
  - Съобщението няма да може да бъде декриптирано
explanation: |
  При опростената RSA криптирането на дадено съобщение многократно винаги води до един и същ резултат, което прави криптирането уязвимо на атаки.
reviewed: false
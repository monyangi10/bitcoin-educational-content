question: अगर एक ही मैसेज को सरल RSA क्रिप्टोसिस्टम में बार-बार एन्क्रिप्ट किया जाए, तो कौन-सी सिक्योरिटी समस्या पैदा हो सकती है?
answer: संदेश हमेशा एक ही एन्क्रिप्शन पैदा करेगा
wrong_answers:
  - संदेश ब्रूट फोर्स हमलों के प्रति संवेदनशील होगा
  - संदेश उलट जाएगा
  - संदेश को डिक्रिप्ट करना नामुमकिन हो जाएगा
explanation: |
  एक सरल RSA में, किसी संदेश को बार-बार एन्क्रिप्ट करने पर हमेशा एक ही नतीजा मिलता है, जिससे एन्क्रिप्शन हमलों के लिए कमजोर हो जाता है।
reviewed: false
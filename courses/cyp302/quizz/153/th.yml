question: ปัญหาด้านความปลอดภัยที่เกิดขึ้นหากข้อความเดียวกันถูกเข้ารหัสหลายครั้งในระบบ RSA แบบง่ายคืออะไร?
answer: ข้อความจะสร้างการเข้ารหัสเดียวกันเสมอ
wrong_answers:
  - ข้อความจะมีความเสี่ยงต่อการโจมตีแบบ brute force
  - ข้อความจะถูกย้อนกลับ
  - ข้อความจะกลายเป็นการถอดรหัสไม่ได้
explanation: |
  ใน RSA ที่เรียบง่าย การเข้ารหัสข้อความหลายครั้งจะให้ผลลัพธ์เหมือนเดิมเสมอ ทำให้การเข้ารหัสมีความเสี่ยงต่อการถูกโจมตี
reviewed: false
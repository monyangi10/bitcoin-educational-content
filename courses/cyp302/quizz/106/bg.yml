question: Кой механизъм предотвратява атаките с отразяване при защитена комуникация?
answer: Добавяне на уникален идентификатор за всеки участник
wrong_answers:
  - Увеличаване на дължината на ключа
  - Използване на няколко клавиша за всяко съобщение
  - Добавяне на допълнителен ключ във всяко съобщение
explanation: |
  Добавянето на уникален идентификатор за всеки участник в криптираното съобщение предотвратява атаките с отразяване, тъй като позволява да се различи произходът на съобщенията.
reviewed: false
question: กลไกใดที่ป้องกันการโจมตีแบบสะท้อนกลับในการสื่อสารที่ปลอดภัย?
answer: เพิ่มตัวระบุเฉพาะสำหรับผู้เข้าร่วมแต่ละคน
wrong_answers:
  - การเพิ่มความยาวของคีย์
  - การใช้คีย์หลายตัวสำหรับแต่ละข้อความ
  - การเพิ่มคีย์พิเศษในแต่ละข้อความ
explanation: |
  การเพิ่มตัวระบุเฉพาะสำหรับผู้เข้าร่วมแต่ละคนในข้อความที่เข้ารหัสช่วยป้องกันการโจมตีแบบสะท้อน เนื่องจากช่วยให้สามารถแยกแยะต้นกำเนิดของข้อความได้
reviewed: false
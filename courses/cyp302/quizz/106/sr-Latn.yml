question: Koji mehanizam sprečava refleksione napade u sigurnoj komunikaciji?
answer: Dodavanje jedinstvenog identifikatora za svakog učesnika
wrong_answers:
  - Povećanje dužine ključa
  - Korišćenje više ključeva za svaku poruku
  - Dodavanje dodatnog ključa u svaku poruku
explanation: |
  Dodavanje jedinstvenog identifikatora za svakog učesnika u šifrovanoj poruci sprečava reflection napade, jer omogućava razlikovanje porekla poruka.

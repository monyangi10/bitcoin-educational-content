question: सुरक्षित संचार में रिफ्लेक्शन अटैक्स को रोकने के लिए कौन-सा तंत्र इस्तेमाल होता है?
answer: हर प्रतिभागी के लिए एक अलग पहचानकर्ता जोड़ना
wrong_answers:
  - कुंजी की लंबाई बढ़ाना
  - हर मैसेज के लिए कई चाबियों का इस्तेमाल करना
  - हर मैसेज में एक एक्स्ट्रा की जोड़ना
explanation: |
  एन्क्रिप्टेड मैसेज में हर पार्टिसिपेंट के लिए एक यूनिक आइडेंटिफायर जोड़ने से रिफ्लेक्शन अटैक्स रोके जा सकते हैं, क्योंकि इससे मैसेज के सोर्स को पहचानने में मदद मिलती है।
reviewed: false
question: Как се нарича уникалният елемент в група, който, когато се приложи към друг елемент, не го променя?
answer: Елементът на идентичност
wrong_answers:
  - Обратният елемент
  - Комутативният елемент
  - Асоциативният елемент
explanation: |
  Идентификационният елемент на дадена група е уникалният елемент, който, когато се приложи към друг елемент, го оставя непроменен. Например в групата на целите числа при събиране идентичният елемент е 0.
reviewed: false
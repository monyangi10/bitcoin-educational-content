question: ในกลุ่ม องค์ประกอบที่ไม่ซ้ำกันที่เมื่อใช้กับองค์ประกอบอื่นจะไม่เปลี่ยนแปลงมันเรียกว่าอะไร?
answer: ธาตุเอกลักษณ์
wrong_answers:
  - ธาตุกลับกัน
  - ธาตุการสลับที่
  - องค์ประกอบเชื่อมโยง
explanation: |
  เอกลักษณ์ของกลุ่มคือองค์ประกอบที่ไม่ซ้ำกันซึ่งเมื่อถูกนำไปใช้กับองค์ประกอบอื่นจะไม่เปลี่ยนแปลงองค์ประกอบนั้น ตัวอย่างเช่น ในกลุ่มของจำนวนเต็มภายใต้การบวก เอกลักษณ์คือ 0
reviewed: false
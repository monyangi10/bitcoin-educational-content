question: ग्रुप में, उस अद्वितीय तत्व को क्या कहते हैं जो, जब किसी दूसरे तत्व पर लागू किया जाता है, तो उसे बदलता नहीं है?
answer: पहचान तत्व
wrong_answers:
  - उल्टा तत्व
  - कम्यूटेटिव एलिमेंट
  - संबंधित तत्व
explanation: |
  एक ग्रुप का पहचान तत्व वह अनोखा तत्व होता है जो किसी दूसरे तत्व पर लागू होने पर उसे अपरिवर्तित छोड़ देता है। उदाहरण के लिए, जोड़ के अंतर्गत पूर्णांकों के ग्रुप में पहचान तत्व 0 होता है।
reviewed: false
question: ฟังก์ชันหลักของ Message Authentication Code (MAC) คืออะไร?
answer: ตรวจสอบความถูกต้องและความสมบูรณ์ของข้อความ
wrong_answers:
  - เข้ารหัสข้อความเพื่อให้มั่นใจในความลับ
  - ป้องกันการดักข้อความ
  - สร้างคีย์ส่วนตัวสำหรับการสื่อสารแต่ละครั้ง
explanation: |
  MAC เป็นรูปแบบการเข้ารหัสที่ช่วยให้สามารถตรวจสอบได้ว่าข้อความนั้นมาจากผู้ส่งที่ถูกต้องตามกฎหมายจริง ๆ และไม่ได้ถูกแก้ไข ดังนั้นจึงมั่นใจได้ถึงความถูกต้องและความสมบูรณ์ของข้อมูล
reviewed: false
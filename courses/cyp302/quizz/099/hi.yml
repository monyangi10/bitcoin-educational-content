question: एक मैसेज ऑथेंटिकेशन कोड (MAC) का मुख्य काम क्या है?
answer: संदेश की प्रामाणिकता और अखंडता सुनिश्चित करें
wrong_answers:
  - संदेशों को गोपनीयता सुनिश्चित करने के लिए एन्क्रिप्ट करें
  - संदेश रोकने से बचाएं
  - जीडब्ल्यू-0 प्राइवेट कीज़ हर कम्युनिकेशन के लिए
explanation: |
  MAC एक क्रिप्टोग्राफ़िक स्कीम है जो यह सत्यापित करने की अनुमति देती है कि संदेश वास्तव में वैध प्रेषक से आया है और इसमें कोई बदलाव नहीं किया गया है, इस प्रकार प्रामाणिकता और अखंडता सुनिश्चित करता है।
reviewed: false
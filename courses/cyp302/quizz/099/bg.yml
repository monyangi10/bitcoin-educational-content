question: Каква е основната функция на кода за удостоверяване на съобщението (MAC)?
answer: Гарантиране на автентичността и целостта на съобщението
wrong_answers:
  - Криптиране на съобщенията за осигуряване на поверителност
  - Предотвратяване на прихващане на съобщения
  - Генериране на частни ключове за всяка комуникация
explanation: |
  MAC е криптографска схема, която позволява да се провери дали дадено съобщение наистина идва от легитимния подател и не е променено, като по този начин се гарантира автентичността и целостта.
reviewed: false
question: Koja je primarna funkcija koda za autentifikaciju poruke (MAC)?
answer: Osiguravanje autentičnosti i integriteta poruke
wrong_answers:
  - Šifrovanje poruke kako bi se osigurala poverljivost
  - Sprečavanje presretanje poruka
  - Generisanje privatnih ključeva za svaku komunikaciju
explanation: |
  MAC je kriptografska šema koja omogućava verifikaciju da poruka zaista dolazi od legitimnog pošiljaoca i da nije izmenjena, čime se osigurava autentičnost i integritet.
reviewed: true

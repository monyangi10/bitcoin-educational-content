question: Какво представлява асинхронното криптиране на потоци?
answer: Криптиране, чийто поток от ключове зависи както от ключа, така и от елементите на предварително криптирания текст
wrong_answers:
  - Криптиране, при което при всяко използване се генерира случаен поток от ключове
  - Криптиране, при което ключът трябва да се променя за всяко съобщение
  - Криптиране, чийто поток от ключове зависи само от началния ключ
explanation: |
  Асинхронното поточно криптиране е вид криптиране, при което ключовият поток се влияе от ключа и елементите на криптирания текст.
reviewed: false
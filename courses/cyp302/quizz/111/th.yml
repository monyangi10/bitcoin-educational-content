question: การเข้ารหัสสตรีมแบบอะซิงโครนัสคืออะไร?
answer: การเข้ารหัสที่สตรีมคีย์ขึ้นอยู่กับทั้งคีย์และองค์ประกอบของข้อความที่เข้ารหัสก่อนหน้านี้
wrong_answers:
  - การเข้ารหัสที่สร้างสตรีมคีย์แบบสุ่มในแต่ละครั้งที่ใช้
  - การเข้ารหัสที่ต้องเปลี่ยนคีย์สำหรับแต่ละข้อความ
  - การเข้ารหัสที่สตรีมคีย์ขึ้นอยู่กับคีย์เริ่มต้นเท่านั้น
explanation: |
  การเข้ารหัสแบบสตรีมอะซิงโครนัสเป็นประเภทของการเข้ารหัสที่สตรีมคีย์ได้รับอิทธิพลจากคีย์และองค์ประกอบของข้อความที่เข้ารหัส
reviewed: false
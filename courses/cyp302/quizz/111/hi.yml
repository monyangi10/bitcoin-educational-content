question: एसिंक्रोनस स्ट्रीम एन्क्रिप्शन क्या है?
answer: एक एन्क्रिप्शन जिसकी की स्ट्रीम पिछले एन्क्रिप्टेड टेक्स्ट के की और Elements दोनों पर निर्भर करती है
wrong_answers:
  - एक एन्क्रिप्शन जो हर बार इस्तेमाल के साथ एक रैंडम की स्ट्रीम जनरेट करता है
  - एक एन्क्रिप्शन जहां हर मैसेज के लिए की बदलनी पड़ती है
  - एक ऐसा एन्क्रिप्शन जिसकी की स्ट्रीम सिर्फ शुरुआती की पर निर्भर करती है
explanation: |
  एसिंक्रोनस स्ट्रीम एन्क्रिप्शन एक तरह का एन्क्रिप्शन है जहां की स्ट्रीम, की और एन्क्रिप्टेड टेक्स्ट के Elements से प्रभावित होती है।

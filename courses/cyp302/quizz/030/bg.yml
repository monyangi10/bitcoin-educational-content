question: Каква е основната разлика между случаен низ и псевдослучаен низ?
answer: Случайният низ е резултат от чист случаен процес, докато псевдослучайният низ се генерира чрез алгоритъм от seed.
wrong_answers:
  - Псевдослучайният низ използва само 1 бит.
  - Случайният низ винаги е по-дълъг от псевдослучайния низ, защото върху него има естествено действие.
  - Псевдослучайният низ се дефинира чрез строго двоичен модел, а случайният низ - чрез строго шестнадесетичен модел.
explanation: |
  Случайният низ е резултат от пряк случаен процес, докато псевдослучайният низ се създава с помощта на алгоритъм за разширяване и начален seed.

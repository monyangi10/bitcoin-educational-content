question: एक रैंडम स्ट्रिंग और एक स्यूडोरैंडम स्ट्रिंग में मुख्य अंतर क्या है?
answer: एक रैंडम स्ट्रिंग प्योर रैंडम प्रोसेस से आती है, जबकि एक स्यूडोरैंडम स्ट्रिंग एल्गोरिदम द्वारा seed से जनरेट की जाती है।
wrong_answers:
  - एक छद्म-यादृच्छिक स्ट्रिंग सिर्फ 1 बिट्स का इस्तेमाल करती है।
  - एक रैंडम स्ट्रिंग हमेशा एक स्यूडोरैंडम स्ट्रिंग से लंबी होती है क्योंकि उस पर एक प्राकृतिक क्रिया होती है।
  - एक pseudorandom string को strictly binary model से define किया जाता है, जबकि एक random string strictly hexadecimal model से define होता है।
explanation: |
  एक रैंडम स्ट्रिंग सीधे रैंडम प्रोसेस से आती है, जबकि एक छद्म-रैंडम स्ट्रिंग एक्सपेंशन अल्गोरिदम और एक इनिशियल seed का इस्तेमाल करके बनाई जाती है।

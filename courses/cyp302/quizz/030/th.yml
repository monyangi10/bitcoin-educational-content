question: ความแตกต่างหลักระหว่างสตริงสุ่มและสตริงเทียมสุ่มคืออะไร?
answer: สตริงสุ่มมาจากกระบวนการสุ่มบริสุทธิ์ ในขณะที่สตริงเทียมสุ่มถูกสร้างขึ้นโดยอัลกอริทึมจาก seed.
wrong_answers:
  - สตริงเทียมสุ่มใช้เฉพาะบิต 1 เท่านั้น
  - สตริงแบบสุ่มมักจะยาวกว่าสตริงแบบสุ่มเทียมเพราะมีการกระทำตามธรรมชาติบนมัน
  - สตริงเทียมสุ่มถูกกำหนดโดยโมเดลไบนารีอย่างเคร่งครัด ในขณะที่สตริงสุ่มถูกกำหนดโดยโมเดลเลขฐานสิบหกอย่างเคร่งครัด
explanation: |
  สตริงสุ่มมาจากกระบวนการสุ่มโดยตรง ในขณะที่สตริงเทียมสุ่มถูกสร้างขึ้นโดยใช้การขยายอัลกอริทึมและ seed เริ่มต้น

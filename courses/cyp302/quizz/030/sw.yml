question: Ni tofauti gani kuu kati ya kamba ya nasibu na kamba ya uwongo?
answer: Mfuatano wa nasibu hutoka kwa mchakato safi wa nasibu, huku mfuatano wa nasibu bandia ukitolewa na algoriti kutoka kwa seed.
wrong_answers:
  - Mfuatano wa nasibu bandia hutumia biti 1 pekee.
  - Mfuatano wa nasibu kila mara ni mrefu kuliko mfuatano wa uwongo kwa sababu kuna kitendo cha asili juu yake.
  - Mfuatano wa nasibu bandia unafafanuliwa kwa mtindo wa biti madhubuti, wakati mfuatano wa nasibu unafafanuliwa kwa kielelezo madhubuti cha heksadesimali.
explanation: |
  Mfuatano wa nasibu hutoka kwa mchakato wa nasibu wa moja kwa moja, ambapo mfuatano wa nasibu bandia unatolewa kwa kutumia algoriti ya upanuzi na seed ya awali.
reviewed: true

question: 무작위 문자열과 유사 무작위 문자열의 주요 차이점은 무엇인가요?
answer: 무작위 문자열은 순수한 무작위 프로세스에서 생성되는 반면 의사 무작위 문자열은 seed의 알고리즘에 의해 생성됩니다.
wrong_answers:
  - 의사 난수 문자열은 1비트만 사용합니다.
  - 랜덤 문자열은 자연스러운 동작이 있기 때문에 의사 랜덤 문자열보다 항상 더 깁니다.
  - 의사 난수 문자열은 엄격한 2진수 모델로 정의되는 반면, 무작위 문자열은 엄격한 16진수 모델로 정의됩니다.
explanation: |
  무작위 문자열은 직접 무작위 프로세스를 통해 생성되는 반면 의사 무작위 문자열은 확장 알고리즘과 초기 seed을 사용하여 생성됩니다.

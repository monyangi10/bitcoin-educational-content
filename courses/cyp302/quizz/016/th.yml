question: ลักษณะของตัวแปรที่เป็นเอกภาพคืออะไร?
answer: ค่าที่เป็นไปได้ทั้งหมดมีความน่าจะเป็นเท่ากันในการเกิดขึ้น
wrong_answers:
  - ค่าต่าง ๆ ตามการแจกแจงแบบอสมมาตร
  - ความน่าจะเป็นของแต่ละค่า ขึ้นอยู่กับการทดลอง
  - มีเพียงสองค่าเท่านั้นที่สามารถเกิดขึ้นได้ด้วยความน่าจะเป็นที่เท่ากัน
explanation: |
  ตัวแปรสม่ำเสมอคือ ตัวแปรสุ่มที่ค่าที่เป็นไปได้ทั้งหมดมีความน่าจะเป็นเท่ากันในการเกิดขึ้น
reviewed: false
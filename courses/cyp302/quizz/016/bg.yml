question: Каква е характеристиката на еднаква променлива?
answer: Всички възможни стойности имат еднаква вероятност да се появят
wrong_answers:
  - Стойностите следват асиметрично разпределение
  - Вероятността за всяка стойност зависи от експеримента
  - Само две стойности могат да възникнат с еднаква вероятност
explanation: |
  Еднородна променлива е случайна променлива, при която всички възможни стойности имат еднаква вероятност да се появят.

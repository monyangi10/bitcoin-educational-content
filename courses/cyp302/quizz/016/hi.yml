question: एकसमान वेरिएबल की क्या विशेषता होती है?
answer: सभी संभावित मानों के होने की समान संभावना होती है
wrong_answers:
  - मान एक असममित वितरण का पालन करते हैं
  - हर एक मान की संभावना प्रयोग पर निर्भर करती है
  - केवल दो मान समान संभावनाओं के साथ हो सकते हैं
explanation: |
  एक समान चर (uniform variable) एक ऐसा यादृच्छिक चर होता है जिसमें सभी संभावित मूल्यों के होने की समान संभावना होती है।
reviewed: false
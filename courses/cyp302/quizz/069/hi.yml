question: Salsa20 अल्गोरिदम में 128-बिट की और 256-बिट की कुंजी (key) का उपयोग करने में क्या अंतर है?
answer: कुंजी की लंबाई एल्गोरिथ्म में राउंड्स की संख्या को प्रभावित करती है।
wrong_answers:
  - कुंजी की लंबाई एन्क्रिप्शन के प्रकार को बदल देती है।
  - स्ट्रीम एन्क्रिप्शन के लिए 128-बिट की और ब्लॉक एन्क्रिप्शन के लिए 256-बिट की चाबी इस्तेमाल होती है।
  - Salsa20 में key की लंबाई का कोई असर नहीं होता।
explanation: |
  सिमेट्रिक एन्क्रिप्शन स्कीम सालसा20 में, की लंबाई (128 या 256 बिट्स) अल्गोरिदम के राउंड्स की संख्या को प्रभावित करती है, लेकिन अल्गोरिदम के मूल कोर में कोई बदलाव नहीं होता।
reviewed: false
question: 128비트 키와 256비트 키로 살사20 알고리즘을 사용하는 것의 차이점은 무엇인가요?
answer: 키 길이는 알고리즘의 라운드 수에 영향을 줍니다.
wrong_answers:
  - 키 길이에 따라 암호화 유형이 변경됩니다.
  - 스트림 암호화에는 128비트 키가, 블록 암호화에는 256비트 키가 사용됩니다.
  - 살사20에서는 키 길이가 영향을 미치지 않습니다.
explanation: |
  대칭 암호화 방식인 살사20에서는 키 길이(128비트 또는 256비트)가 알고리즘 자체의 핵심을 변경하지 않고 알고리즘의 라운드 수에 영향을 미칩니다.
reviewed: false
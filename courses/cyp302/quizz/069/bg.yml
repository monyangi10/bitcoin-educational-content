question: Каква е разликата между използването на алгоритъма Salsa20 със 128-битов ключ и 256-битов ключ?
answer: Дължината на ключа влияе върху броя на рундовете в алгоритъма.
wrong_answers:
  - Дължината на ключа променя вида на криптирането.
  - За криптиране на потоци се използва 128-битов ключ, а за криптиране на блокове - 256-битов ключ.
  - Дължината на ключа не оказва влияние в Salsa20.
explanation: |
  В схемата за симетрично криптиране Salsa20 дължината на ключа (128 или 256 бита) влияе върху броя на рундовете в алгоритъма, без да променя сърцевината на самия алгоритъм.
reviewed: false
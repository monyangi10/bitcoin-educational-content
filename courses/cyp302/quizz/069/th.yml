question: ความแตกต่างระหว่างการใช้อัลกอริทึม Salsa20 กับคีย์ 128 บิตและคีย์ 256 บิตคืออะไร?
answer: ความยาวของกุญแจมีผลต่อจำนวนรอบในอัลกอริทึม
wrong_answers:
  - ความยาวของกุญแจเปลี่ยนประเภทของการเข้ารหัส
  - ใช้คีย์ 128 บิตสำหรับการเข้ารหัสแบบสตรีมและคีย์ 256 บิตสำหรับการเข้ารหัสแบบบล็อก
  - ความยาวของคีย์ไม่มีผลกระทบใน Salsa20.
explanation: |
  ในโครงร่างการเข้ารหัสแบบสมมาตร Salsa20 ความยาวของกุญแจ (128 หรือ 256 บิต) มีผลต่อจำนวนรอบในอัลกอริทึม โดยไม่เปลี่ยนแปลงแกนหลักของอัลกอริทึมเอง
reviewed: false
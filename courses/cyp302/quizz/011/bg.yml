question: Какво улеснява прихващането на местни комуникации от зле оборудвани нападатели?
answer: Използване на радиовълни за безжични връзки
wrong_answers:
  - Маршрутизиране на всички данни чрез сателити
  - Използване само на коаксиални кабели за предаване на данни
  - Изпращане на данни само чрез оптични влакна
explanation: |
  Безжичните връзки, които предават данни чрез радиовълни, улесняват прихващането от страна на нападателите, тъй като не изискват физически достъп до мрежата.
reviewed: false
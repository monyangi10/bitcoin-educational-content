question: Ni igiki corohereza abatera badafise ibikoresho bikwiye gufata amakuru yo mu karere?
answer: Ikoreshwa ry'imipfunda ya radiyo mu guhuza amakuru ata nsinga
wrong_answers:
  - Gurungika amakuru yose biciye ku bikoresho vy'inyenyeri
  - Gukoresha intsinga z'imirongo gusa mu gutanga amakuru
  - Kwohereza amakuru biciye ku nsinga z'amaso gusa
explanation: |
  Ivyuma bitagira amashanyarazi, birungika amakuru biciye ku mipfunda ya radiyo, bituma abatera boroherwa no gufata amakuru, kuko bitasaba ko umuntu ashobora gushika kuri iyo nzira.

question: อะไรที่ช่วยให้ผู้โจมตีที่มีอุปกรณ์ไม่ดีสามารถดักฟังการสื่อสารในท้องถิ่นได้?
answer: การใช้คลื่นวิทยุสำหรับการเชื่อมต่อแบบไร้สาย
wrong_answers:
  - กำหนดเส้นทางข้อมูลทั้งหมดผ่านดาวเทียม
  - การใช้สายโคแอกเซียลเท่านั้นสำหรับการส่งข้อมูล
  - ส่งข้อมูลผ่านเส้นใยแก้วนำแสงเท่านั้น
explanation: |
  การเชื่อมต่อแบบไร้สายซึ่งส่งข้อมูลผ่านคลื่นวิทยุทำให้การดักจับข้อมูลง่ายขึ้นสำหรับผู้โจมตีเนื่องจากไม่จำเป็นต้องเข้าถึงเครือข่ายทางกายภาพ
reviewed: false
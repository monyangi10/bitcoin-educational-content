question: कमजोर सुविधाओं वाले हमलावरों द्वारा स्थानीय संचार को रोकने में क्या मदद करता है?
answer: वायरलेस कनेक्शन के लिए रेडियो तरंगों का उपयोग
wrong_answers:
  - सारा डेटा सैटेलाइट के जरिए भेजना
  - डेटा ट्रांसमिशन के लिए सिर्फ कोएक्सियल केबल्स का इस्तेमाल करना
  - ऑप्टिकल फाइबर के जरिए सिर्फ डेटा भेजना
explanation: |
  वायरलेस कनेक्शन, जो डेटा को रेडियो तरंगों के जरिए भेजते हैं, हमलावरों के लिए इंटरसेप्शन को आसान बना देते हैं, क्योंकि इनमें नेटवर्क तक भौतिक पहुंच की जरूरत नहीं होती।
reviewed: false
question: RSA क्रिप्टोसिस्टम में एक्सपोनेंट **e** को कैसे चुना जाता है?  

RSA में, **e** एक सार्वजनिक एक्सपोनेंट होता है जिसे आमतौर पर छोटी और अच्छी तरह से ज्ञात संख्याओं में से चुना जाता है, जैसे:  
- **3**  
- **65537 (0x10001)**  

### **चुनने के मुख्य कारण:**  
1. **कम्प्यूटेशनल दक्षता**: छोटे **e** (जैसे 3 या 65537) से एन्क्रिप्शन तेज़ होता है क्योंकि इन्हें कम गणना की ज़रूरत होती है।  
2. **सुरक्षा**: **65537** को अक्सर प्राथमिकता दी जाती है क्योंकि बहुत छोटे **e** (जैसे 3) कुछ हमलों (जैसे "क्यूबिक रूट अटैक") के लिए असुरक्षित हो सकते हैं।  
3. **गणितीय अनुकूलता**: **e** को **φ(n) = (p-1)(q-1)** के साथ को-प्राइम (यानी gcd(e, φ(n)) = 1) होना चाहिए, ताकि प्राइवेट एक्सपोनेंट **d** की गणना की जा सके।  

### **नोट:**  
- **65537** एक लोकप्रिय विकल्प है क्योंकि यह **Fermat's prime (2¹⁶ + 1)** है और बाइनरी में इसकी गणना आसान होती है।  
- **e** को बहुत बड़ा नहीं चुनना चाहिए, वरना डिक्रिप्शन धीमा हो सकता है।  

इस तरह, **e** का चुनाव RSA की सुरक्षा और परफॉरमेंस दोनों को प्रभावित करता है! 🔐
answer: यह 2 से बड़ा एक पूर्णांक होना चाहिए, जो φ(N) के साथ सह-अभाज्य हो

  - यह φ(N) के बराबर होना चाहिए
explanation: |
  RSA में, एक्सपोनेंट e को इस तरह चुना जाता है कि वह 2 से बड़ा हो और φ(N) के साथ को-प्राइम (सह-अभाज्य) हो, जो ऑपरेशन्स की सुरक्षा सुनिश्चित करता है।

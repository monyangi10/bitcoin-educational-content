question: Как се избира експонентата e в криптосистемата RSA?
answer: То трябва да е цяло число, по-голямо от 2, равно на φ(N)
wrong_answers:
  - То трябва да е просто число, по-малко от N
  - Избира се на случаен принцип без ограничения
  - То трябва да е равно на φ(N)
explanation: |
  В RSA експонентата e се избира така, че да е по-голяма от 2 и да е коприма на φ(N), което гарантира сигурността на операциите.

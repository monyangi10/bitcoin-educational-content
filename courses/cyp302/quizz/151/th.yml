question: ตัวเลขยกกำลัง e ถูกเลือกอย่างไรในระบบ RSA?
answer: มันต้องเป็นจำนวนเต็มที่มากกว่า 2 ซึ่งเป็นจำนวนที่ไม่มีตัวหารร่วมกับ φ(N)
wrong_answers:
  - มันต้องเป็นจำนวนเฉพาะที่น้อยกว่า N
  - มันถูกเลือกแบบสุ่มโดยไม่มีข้อจำกัด
  - มันต้องเท่ากับ φ(N)
explanation: |
  ใน RSA เลขชี้กำลัง e ถูกเลือกให้มีค่ามากกว่า 2 และเป็นจำนวนที่ไม่มีตัวหารร่วมกับ φ(N) ซึ่งจะช่วยให้การดำเนินการมีความปลอดภัย
reviewed: false
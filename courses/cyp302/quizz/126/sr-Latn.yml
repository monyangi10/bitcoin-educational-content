question: Šta omogućava protokol Diffie-Hellman ključa Exchange?
answer: Omogućava dvema stranama da kreiraju zajednički tajni ključ deljenjem javnih informacija.
wrong_answers:
  - Omogućava lični tajni ključ Exchange za svaku sesiju.
  - Omogućava korišćenje javnog ključa za enkripciju i privatnog ključa za dekripciju.
  - Omogućava Exchange elektronske valute.
explanation: |
  Diffie-Hellman protokol omogućava dvema stranama da javno dele informacije, dok osigurava da samo one mogu generate zajednički ključ za osiguranje svojih budućih razmena.

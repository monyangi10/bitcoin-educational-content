question: डिफी-हेलमैन की Exchange प्रोटोकॉल क्या करने की अनुमति देती है?
answer: यह दो पार्टियों को पब्लिक जानकारी शेयर करके एक कॉमन सीक्रेट की बनाने की अनुमति देता है।
wrong_answers:
  - यह हर सत्र के लिए एक इन-पर्सन सीक्रेट की Exchange की अनुमति देता है।
  - यह पब्लिक की का इस्तेमाल एन्क्रिप्शन के लिए और प्राइवेट की का इस्तेमाल डिक्रिप्शन के लिए करने की अनुमति देता है।
  - यह इलेक्ट्रॉनिक करेंसी का Exchange करने की अनुमति देता है।
explanation: |
  डिफी-हेलमैन प्रोटोकॉल दो पक्षों को सार्वजनिक रूप से जानकारी साझा करने की सुविधा देता है, जबकि यह सुनिश्चित करता है कि केवल वे ही generate एक सामान्य कुंजी बना सकते हैं ताकि उनके भविष्य के आदान-प्रदान सुरक्षित रहें।

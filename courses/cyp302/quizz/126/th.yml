question: โปรโตคอลการแลกเปลี่ยนกุญแจ Diffie-Hellman อนุญาตให้ทำอะไร?
answer: มันช่วยให้ทั้งสองฝ่ายสร้างกุญแจลับร่วมกันโดยการแบ่งปันข้อมูลสาธารณะ
wrong_answers:
  - มันอนุญาตให้มีการแลกเปลี่ยนกุญแจลับแบบตัวต่อตัวสำหรับแต่ละเซสชัน
  - ช่วยให้สามารถใช้กุญแจสาธารณะสำหรับการเข้ารหัสและกุญแจส่วนตัวสำหรับการถอดรหัสได้
  - มันอนุญาตให้มีการแลกเปลี่ยนสกุลเงินอิเล็กทรอนิกส์
explanation: |
  โปรโตคอล Diffie-Hellman ช่วยให้สองฝ่ายสามารถแบ่งปันข้อมูลกันได้อย่างเปิดเผย ในขณะที่มั่นใจได้ว่ามีเพียงพวกเขาเท่านั้นที่สามารถ generate กุญแจร่วมกันเพื่อรักษาความปลอดภัยในการแลกเปลี่ยนข้อมูลในอนาคตของพวกเขา
reviewed: false
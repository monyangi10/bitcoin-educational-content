question: Какво позволява протоколът за обмен на ключове Diffie-Hellman?
answer: Тя позволява на две страни да създадат общ секретен ключ чрез споделяне на публична информация.
wrong_answers:
  - Той позволява личен обмен на секретни ключове за всяка сесия.
  - Той позволява използването на публичен ключ за криптиране и частен ключ за декриптиране.
  - Тя позволява обмен на електронна валута.
explanation: |
  Протоколът на Дифи-Хелман дава възможност на две страни да споделят публично информация, като същевременно гарантира, че само те могат да използват общ ключ за защита на бъдещите си обмени.
reviewed: false
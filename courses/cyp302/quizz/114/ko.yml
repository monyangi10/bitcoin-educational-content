question: 표준 길이의 RC4 키 스트림과 예제에 제시된 간소화된 버전의 차이점은 무엇인가요?
answer: 표준 RC4에서 S 배열의 길이는 256바이트입니다
wrong_answers:
  - S 배열은 128바이트로 제한됩니다
  - 사용된 키는 8바이트 이상이어야 합니다
  - 표준 RC4에서는 S의 길이가 고정되어 있지 않습니다
explanation: |
  표준 RC4에서 S 배열은 256바이트를 포함하므로 8바이트만 있는 단순화된 버전에 비해 계산의 복잡성이 크게 증가하고 보안이 강화됩니다.
reviewed: false
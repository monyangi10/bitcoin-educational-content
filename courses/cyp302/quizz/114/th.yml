question: อะไรที่ทำให้กระแสคีย์ RC4 มาตรฐานแตกต่างจากเวอร์ชันที่เรียบง่ายที่นำเสนอในตัวอย่าง?
answer: ความยาวของอาร์เรย์ S ใน RC4 มาตรฐานคือ 256 ไบต์
wrong_answers:
  - อาร์เรย์ S ถูกจำกัดไว้ที่ 128 ไบต์
  - คีย์ที่ใช้ต้องมีขนาดมากกว่า 8 ไบต์
  - ไม่มีความยาวที่กำหนดตายตัวสำหรับ S ในมาตรฐาน RC4
explanation: |
  ใน RC4 มาตรฐาน อาร์เรย์ S ประกอบด้วย 256 ไบต์ ซึ่งเพิ่มความซับซ้อนของการคำนวณอย่างมากและเพิ่มความปลอดภัยเมื่อเทียบกับเวอร์ชันที่เรียบง่ายซึ่งมีเพียง 8 ไบต์เท่านั้น
reviewed: false
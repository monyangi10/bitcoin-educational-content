question: एक स्टैंडर्ड लंबाई वाली RC4 की-स्ट्रीम और उदाहरण में दिखाए गए सरलीकृत वर्जन में क्या फर्क है?
answer: स्टैंडर्ड RC4 में S ऐरे की लंबाई 256 बाइट्स होती है
wrong_answers:
  - एस अरे 128 बाइट्स तक सीमित है
  - इस्तेमाल की गई कुंजी 8 बाइट से ज़्यादा होनी चाहिए
  - स्टैंडर्ड RC4 में S की कोई फिक्स्ड लंबाई नहीं होती है
explanation: |
  मानक RC4 में, S ऐरे में 256 बाइट्स होते हैं, जो गणनाओं की जटिलता को काफी बढ़ा देता है और सुरक्षा को मजबूत करता है, खासकर जब इसकी तुलना सिर्फ 8 बाइट्स वाले सरलीकृत वर्जन से की जाए।
reviewed: false
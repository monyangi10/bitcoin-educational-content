question: По какво се различава ключовият поток RC4 със стандартна дължина от опростената версия, представена в примера?
answer: Дължината на масива S в стандартния RC4 е 256 байта
wrong_answers:
  - Масивът S е ограничен до 128 байта
  - Използваният ключ трябва да е повече от 8 байта
  - В стандартния RC4 няма фиксирана дължина за S
explanation: |
  В стандартния RC4 масивът S съдържа 256 байта, което значително увеличава сложността на изчисленията и повишава сигурността в сравнение с опростената версия, съдържаща само 8 байта.
reviewed: false
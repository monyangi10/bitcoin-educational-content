question: На кое основно условие трябва да отговаря едно множество S с двоична операция, за да бъде група?
answer: Условието за затваряне
wrong_answers:
  - Условието за комутативност
  - Условието за симетрия
  - Условие за разпределеност
explanation: |
  Едно множество S с двоична операция трябва да отговаря на няколко условия, за да образува група, като първото е условието за затваряне: операцията между два елемента на S трябва да дава елемент на S.
reviewed: false
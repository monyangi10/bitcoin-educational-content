question: เงื่อนไขพื้นฐานที่เซต S พร้อมด้วยการดำเนินการทวิภาคต้องมีเพื่อให้เป็นกลุ่มคืออะไร?
answer: เงื่อนไขการปิด
wrong_answers:
  - เงื่อนไขการสลับที่
  - เงื่อนไขความสมมาตร
  - เงื่อนไขการแจกแจง
explanation: |
  เซต S ที่มีการดำเนินการแบบทวินิยมต้องมีเงื่อนไขหลายประการเพื่อที่จะเป็นกลุ่ม และเงื่อนไขแรกคือเงื่อนไขการปิด: การดำเนินการระหว่างสองสมาชิกของ S ต้องให้ผลลัพธ์เป็นสมาชิกของ S
reviewed: false
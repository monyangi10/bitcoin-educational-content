question: ในบริบทของการเข้ารหัสลับ ตัวแปรสุ่มหมายถึงอะไร?
answer: ตัวแปรที่สามารถรับค่าที่เป็นไปได้หลายค่าโดยมีความน่าจะเป็นเป็นบวก
wrong_answers:
  - ตัวแปรที่เปลี่ยนค่าในทุกขณะ
  - ตัวแปรที่มีค่าคงที่และกำหนดไว้ล่วงหน้า
  - ตัวแปรที่กำหนดเสมอในบริบทของการทดลองทางกายภาพเฉพาะ
explanation: |
  ตัวแปรสุ่มสามารถรับค่าได้สองค่าหรือมากกว่านั้น โดยแต่ละค่ามีความน่าจะเป็นเป็นบวก และมักถูกกำหนดอย่างเป็นนามธรรมในบริบทของการเข้ารหัสลับ
reviewed: false
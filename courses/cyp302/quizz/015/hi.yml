question: क्रिप्टोग्राफी के संदर्भ में एक रैंडम वेरिएबल की परिभाषा क्या है?
answer: एक वेरिएबल जो कई संभावित मानों को सकारात्मक संभावना के साथ ले सकता है
wrong_answers:
  - एक वेरिएबल जिसकी वैल्यू हर पल बदलती रहती है
  - एक ऐसा वेरिएबल जिसके मान फिक्स्ड और पहले से डिफाइन्ड होते हैं
  - एक वेरिएबल हमेशा किसी खास भौतिक प्रयोग के संदर्भ में परिभाषित होता है
explanation: |
  एक रैंडम वेरिएबल दो या दो से अधिक मान ले सकता है, जहाँ हर मान की एक पॉजिटिव प्रोबेबिलिटी होती है, और क्रिप्टोग्राफी के संदर्भ में इसे अक्सर अमूर्त रूप से परिभाषित किया जाता है।
reviewed: false
question: Какво е определението за случайна величина в контекста на криптографията?
answer: Променлива, която може да приема няколко възможни стойности с положителна вероятност
wrong_answers:
  - Променлива, която променя стойността си във всеки един момент
  - Променлива, чиито стойности са фиксирани и предварително определени
  - Променлива, която винаги се определя в контекста на конкретен физически експеримент
explanation: |
  Случайната променлива може да приема две или повече стойности, всяка от които с положителна вероятност, и често се дефинира абстрактно в контекста на криптографията.

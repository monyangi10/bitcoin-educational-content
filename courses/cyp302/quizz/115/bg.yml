question: Какво означава терминът дифузия в контекста на криптирането AES?
answer: Промяна в открития текст води до значителна промяна в шифровия текст
wrong_answers:
  - Шифровият текст е винаги с еднаква дължина
  - Байтовете с ключове се разпределят равномерно
  - Чувствителната информация се кодира във всеки блок от шифровия текст
explanation: |
  Дифузията означава, че малка промяна в открития текст води до значителна промяна в шифровия текст, което затруднява нападателя да извлече открития текст.
reviewed: false
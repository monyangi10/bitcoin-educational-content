question: คำว่า diffusion ในบริบทของการเข้ารหัส AES หมายถึงอะไร?
answer: การเปลี่ยนแปลงในข้อความธรรมดาทำให้เกิดการเปลี่ยนแปลงอย่างมีนัยสำคัญในข้อความเข้ารหัส
wrong_answers:
  - ข้อความที่เข้ารหัสมีความยาวเท่ากันเสมอ
  - ไบต์คีย์ถูกแจกจ่ายอย่างสม่ำเสมอ
  - ข้อมูลที่ละเอียดอ่อนจะถูกเข้ารหัสในแต่ละบล็อกของข้อความลับ
explanation: |
  การแพร่กระจายหมายถึงการที่การเปลี่ยนแปลงเล็กน้อยในข้อความธรรมดาส่งผลให้เกิดการเปลี่ยนแปลงอย่างมีนัยสำคัญในข้อความเข้ารหัส ทำให้ผู้โจมตียากที่จะสรุปข้อความธรรมดาได้
reviewed: false
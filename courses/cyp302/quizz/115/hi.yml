question: AES एन्क्रिप्शन के संदर्भ में "डिफ्यूजन" शब्द का क्या मतलब है?
answer: सादे पाठ (plaintext) में एक छोटा सा बदलाव भी सिफरटेक्स्ट (ciphertext) में बड़ा बदलाव ला देता है।
wrong_answers:
  - सिफरटेक्स्ट हमेशा एक ही लंबाई का होता है
  - की बाइट्स को बराबर बांटा गया है
  - संवेदनशील जानकारी हर ब्लॉक में सिफरटेक्स्ट में अस्त-व्यस्त कर दी जाती है
explanation: |
  डिफ्यूज़न का मतलब है कि प्लेनटेक्स्ट में एक छोटा सा बदलाव सिफरटेक्स्ट में एक बड़ा बदलाव लाता है, जिससे हमलावर के लिए प्लेनटेक्स्ट का पता लगाना मुश्किल हो जाता है।
reviewed: false
question: Какво означава атака с груба сила?
answer: Изпробване на всички възможни ключове, докато се намери правилният
wrong_answers:
  - Промяна на текста, за да стане неразбираем
  - Използване на публичен ключ за декриптиране на съобщението
  - Удряне на компютъра много силно, за да го принуди да предаде тайния ключ
explanation: |
  Атаката с груба сила включва систематично тестване на всички възможни ключове за декриптиране на криптирано съобщение.

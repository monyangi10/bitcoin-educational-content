question: การโจมตีแบบ Brute Force หมายถึงอะไร?
answer: ลองใช้กุญแจทุกดอกจนกว่าจะพบกุญแจที่ถูกต้อง
wrong_answers:
  - เปลี่ยนข้อความให้ไม่สามารถเข้าใจได้
  - การใช้กุญแจสาธารณะในการถอดรหัสข้อความ
  - ทุบคอมพิวเตอร์อย่างแรงเพื่อบังคับให้มันเปิดเผยกุญแจลับ
explanation: |
  การโจมตีแบบ brute force เกี่ยวข้องกับการทดสอบคีย์ทั้งหมดอย่างเป็นระบบเพื่อถอดรหัสข้อความที่เข้ารหัส

question: Ni igiki gishingiyeko mu buryo bw’umubiri ubuhinga bwinshi bwo guhanahana amakuru mu bihugu vyateye imbere?
answer: Intsinga z'amatara
wrong_answers:
  - Satellite ku guhuza kwose
  - Intsinga zifatanya gusa
  - Intsinga z'umuringa gusa
explanation: |
  Ivyinshi mu vy’itumanaho vyo muri iki gihe bishingiye ku nzira z’imirongo y’amatara, ivyo bikaba bituma amakuru ashobora guhanahana amakuru vyihuta cane, naho nyene hariho uburyo bumwebumwe bwo gukoresha inyenyeri n’imirongo y’amatara igumaho.
reviewed: false
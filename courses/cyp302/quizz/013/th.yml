question: อะไรคือพื้นฐานทางกายภาพของการสื่อสารส่วนใหญ่ในโลกที่พัฒนาแล้ว?
answer: เครือข่ายสายเคเบิลใยแก้วนำแสง
wrong_answers:
  - ดาวเทียมสำหรับทุกการเชื่อมต่อ
  - เฉพาะสายโคแอกเชียล
  - เฉพาะสายทองแดง
explanation: |
  การสื่อสารสมัยใหม่ส่วนใหญ่พึ่งพาเครือข่ายสายเคเบิลใยแก้วนำแสง ซึ่งรับประกันการแลกเปลี่ยนข้อมูลความเร็วสูง แม้ว่าการใช้ดาวเทียมและสายโคแอกเซียลบางส่วนยังคงมีอยู่
reviewed: false
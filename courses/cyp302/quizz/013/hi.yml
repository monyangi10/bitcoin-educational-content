question: विकसित दुनिया में ज़्यादातर संचार का भौतिक आधार क्या है?
answer: फाइबर ऑप्टिक केबल नेटवर्क
wrong_answers:
  - हर कनेक्शन के लिए उपग्रह
  - केवल कोएक्सियल केबल्स
  - केवल तांबे के तार
explanation: |
  आधुनिक संचार का बड़ा हिस्सा फाइबर ऑप्टिक केबल नेटवर्क पर निर्भर करता है, जो हाई-स्पीड डेटा एक्सचेंज को सुनिश्चित करता है, हालांकि सैटेलाइट और कोएक्सियल केबल्स का कुछ इस्तेमाल अभी भी बना हुआ है।
reviewed: false
question: Каква е физическата основа на по-голямата част от комуникациите в развития свят?
answer: Оптични кабелни мрежи
wrong_answers:
  - Сателити за всяка връзка
  - Само коаксиални кабели
  - Само медни проводници
explanation: |
  По-голямата част от съвременните комуникации разчитат на мрежи от оптични кабели, които осигуряват високоскоростен обмен на данни, въпреки че все още се използват сателити и коаксиални кабели.
reviewed: false
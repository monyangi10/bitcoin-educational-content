question: Ni nini kinachofanya msingi wa kimwili wa mawasiliano mengi katika ulimwengu ulioendelea?
answer: Mitandao ya waya ya fiber optic
wrong_answers:
  - Satelaiti kwa kila muunganisho
  - waya za coaxial pekee
  - Waya za shaba pekee
explanation: |
  Mawasiliano mengi ya kisasa yanategemea mitandao ya nyaya za fibre optic, ambayo huhakikisha ubadilishanaji wa data wa kasi ya juu, ingawa baadhi ya matumizi ya satelaiti na nyaya za koaxial husalia.
reviewed: true

question: क्यों प्रैक्टिस में वन-टाइम पैड की बजाय स्यूडोरैंडम स्ट्रीम सिफर ज़्यादा इस्तेमाल होते हैं?
answer: वे एक छोटी चाबी के इस्तेमाल की इजाज़त देते हैं, जबकि एक लंबी की-स्ट्रीम जनरेट करते हैं।
wrong_answers:
  - उन्हें कोई गुप्त कुंजी की जरूरत नहीं होती
  - वे सममित और असममित एन्क्रिप्शन का मिश्रण इस्तेमाल करते हैं
  - उन्हें की अपडेट्स की जरूरत नहीं है
explanation: |
  छूटे-अछूटे (Pseudorandom) स्ट्रीम सिफर ज़्यादा व्यावहारिक होते हैं क्योंकि ये एक छोटी कुंजी (key) को लंबी की-स्ट्रीम में बदल देते हैं। इससे मैसेज जितनी लंबी कुंजी स्टोर करने की ज़रूरत नहीं पड़ती।
reviewed: false
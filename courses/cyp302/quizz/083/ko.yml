question: 의사 랜덤 스트림 암호가 일회성 패드보다 실무에서 더 일반적으로 사용되는 이유는 무엇인가요?
answer: 더 긴 키 스트림을 생성하면서 더 짧은 키를 사용할 수 있습니다
wrong_answers:
  - 비밀 키가 필요하지 않습니다
  - 대칭 암호화와 비대칭 암호화의 조합을 사용합니다
  - 주요 업데이트가 필요하지 않습니다
explanation: |
  의사 랜덤 스트림 암호는 짧은 키를 더 긴 키 스트림으로 확장할 수 있어 메시지 자체만큼 긴 키를 저장할 필요가 없으므로 더 실용적입니다.
reviewed: false
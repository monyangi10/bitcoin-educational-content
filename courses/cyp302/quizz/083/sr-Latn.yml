question: Zašto se pseudonasumične šifre toka češće koriste u praksi nego jednokratni blokovi?
answer: Dozvoljavaju korišćenje kraćeg ključa prilikom generisanja dužeg toka ključeva (eng - keystream-a)
wrong_answers:
  - Oni ne zahtevaju tajni ključ
  - Oni koriste kombinaciju simetrične i asimetrične enkripcije
  - Oni ne trebaju ključna ažuriranja
explanation: |
  Pseudonasumične šifre toka su praktičnije jer omogućavaju da se kratak ključ proširi u duži ključni tok (eng. keystream), izbegavajući potrebu za čuvanjem ključa koji je dug kao sama poruka.
reviewed: true

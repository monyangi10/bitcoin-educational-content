question: ทำไมรหัสลับสตรีมแบบสุ่มเทียมถึงถูกใช้งานในทางปฏิบัติมากกว่ารหัสลับแบบใช้ครั้งเดียว?
answer: พวกเขาอนุญาตให้ใช้คีย์ที่สั้นกว่าในขณะที่สร้างสตรีมคีย์ที่ยาวกว่า
wrong_answers:
  - พวกเขาไม่ต้องการกุญแจลับ
  - พวกเขาใช้การเข้ารหัสแบบสมมาตรและอสมมาตรร่วมกัน
  - พวกเขาไม่ต้องการการอัปเดตที่สำคัญ
explanation: |
  ตัวเข้ารหัสสตรีมเทียมแบบสุ่มมีความเป็นไปได้มากกว่าเพราะพวกมันอนุญาตให้ใช้กุญแจสั้นเพื่อขยายเป็นสตรีมกุญแจที่ยาวขึ้น หลีกเลี่ยงความจำเป็นในการเก็บกุญแจที่ยาวเท่ากับข้อความเอง
reviewed: false
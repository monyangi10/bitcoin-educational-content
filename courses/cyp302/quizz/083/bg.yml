question: Защо псевдослучайните поточни шифри се използват по-често в практиката, отколкото еднократните подложки?
answer: Те позволяват използването на по-кратък ключ при генериране на по-дълъг ключов поток
wrong_answers:
  - Те не се нуждаят от секретен ключ
  - Те използват комбинация от симетрично и асиметрично криптиране
  - Те не се нуждаят от актуализации на ключовете
explanation: |
  Псевдослучайните поточни шифри са по-практични, тъй като позволяват кратък ключ да бъде разширен в по-дълъг ключов поток, като се избягва необходимостта от съхраняване на ключ, дълъг колкото самото съобщение.
reviewed: false
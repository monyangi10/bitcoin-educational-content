question: Какво означава операцията XOR, когато се прилага между два бита?
answer: Връща 1, ако битовете са различни, в противен случай връща 0
wrong_answers:
  - Връща 1 само ако и двата бита са 1
  - Той събира битовете и връща сумата
  - Винаги връща 0, независимо от резултата
explanation: |
  Операцията XOR (или exclusive or) дава 1, ако двата бита са различни (0 и 1 или 1 и 0), и 0, ако са еднакви.

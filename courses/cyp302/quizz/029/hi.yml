question: दो बिट्स पर XOR ऑपरेशन का मतलब क्या होता है?  

जब दो बिट्स (0 या 1) के बीच XOR (एक्सक्लूसिव OR) ऑपरेशन किया जाता है, तो नतीजा इस तरह होता है:  

- अगर दोनों बिट्स **अलग-अलग** हों (एक 0 और दूसरा 1), तो रिजल्ट **1** होगा।  
- अगर दोनों बिट्स **समान** हों (दोनों 0 या दोनों 1), तो रिजल्ट **0** होगा।  

इसे ऐसे भी याद रख सकते हैं:  
**"जब दोनों अलग हों, तभी 1; वरना 0।"**  

उदाहरण:  
- 0 XOR 0 = 0  
- 0 XOR 1 = 1  
- 1 XOR 0 = 1  
- 1 XOR 1 = 0  

यह ऑपरेशन कंप्यूटर साइंस और डिजिटल लॉजिक में बहुत काम आता है!
answer: अगर बिट्स अलग-अलग हैं तो यह 1 देता है, वरना 0 देता है
wrong_answers:
  - यह तभी 1 देता है जब दोनों बिट 1 हों
  - यह बिट्स को जोड़ता है और योग वापस देता है
  - यह हमेशा 0 ही रिटर्न करता है, चाहे रिजल्ट कुछ भी हो
explanation: |
  XOR ऑपरेशन (या एक्सक्लूसिव OR) 1 देता है अगर दोनों बिट्स अलग हों (0 और 1 या 1 और 0) और 0 देता है अगर वे समान हों।

question: การดำเนินการ XOR หมายถึงอะไรเมื่อใช้ระหว่างบิตสองบิต?
answer: มันจะคืนค่า 1 ถ้าบิตต่างกัน มิฉะนั้นจะคืนค่า 0
wrong_answers:
  - มันจะคืนค่า 1 ก็ต่อเมื่อบิตทั้งสองเป็น 1
  - มันเพิ่มบิตและคืนค่าผลรวม
  - มันจะคืนค่า 0 เสมอไม่ว่าจะเป็นผลลัพธ์ใดก็ตาม
explanation: |
  การดำเนินการ XOR (หรือ exclusive or) จะให้ผลลัพธ์เป็น 1 ถ้าบิตทั้งสองต่างกัน (0 และ 1 หรือ 1 และ 0) และให้ผลลัพธ์เป็น 0 ถ้าบิตทั้งสองเหมือนกัน
reviewed: false
question: เหตุใดสตริงสุ่มเทียมจึงกล่าวว่าไม่สามารถแยกแยะได้จากสตริงสุ่มจริง?
answer: เนื่องจากแทบจะเป็นไปไม่ได้เลยที่จะระบุแหล่งที่มาโดยไม่มีข้อมูลเพิ่มเติม
wrong_answers:
  - เพราะมันมีส่วนที่กำหนดแน่นอนซึ่งเหมือนกับสตริงสุ่มอย่างแท้จริง
  - เพราะมันใช้ตัวเลขทศนิยมในการสร้าง
  - เพราะมันเกิดจากเหตุการณ์ทางธรรมชาติล้วนๆ
explanation: |
  สตริงเทียมสุ่มถูกออกแบบมาให้คล้ายคลึงกับสตริงสุ่มจริง ทำให้การแยกแยะเป็นไปไม่ได้หากไม่มีการเข้าถึง seed หรืออัลกอริทึมที่ใช้
reviewed: false
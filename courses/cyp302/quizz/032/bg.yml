question: Защо се казва, че един псевдослучаен низ е неразличим от истински случаен низ?
answer: Тъй като е почти невъзможно да се определи произходът му без допълнителна информация
wrong_answers:
  - Тъй като съдържа детерминистични сегменти, идентични с истински случаен низ
  - Тъй като при конструирането му се използват плаващи числа
  - Тъй като се генерира единствено от природни явления
explanation: |
  Псевдослучайният низ е проектиран така, че да наподобява истински случаен низ, като разграничаването му е невъзможно без достъп до seed или използвания алгоритъм.
reviewed: false
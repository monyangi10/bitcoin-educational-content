question: Kwa nini kamba ya uwongo inasemwa kuwa haiwezi kutofautishwa na kamba ya nasibu kweli?
answer: Kwa sababu karibu haiwezekani kuamua asili yake bila habari ya ziada
wrong_answers:
  - Kwa sababu ina sehemu za kuamua zinazofanana na kamba ya nasibu
  - Kwa sababu hutumia nambari zinazoelea katika ujenzi wake
  - Kwa sababu hutolewa tu kutoka kwa matukio ya asili
explanation: |
  Kamba ya uwongo umeundwa ili kufanana kwa karibu na kamba ya nasibu ya kweli, na kufanya tofauti isiwezekane bila ufikiaji wa seed au algoriti iliyotumika.
reviewed: true

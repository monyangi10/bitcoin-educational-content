question: 의사 난수 문자열이 진정한 난수 문자열과 구별할 수 없다고 하는 이유는 무엇인가요?
answer: 추가 정보 없이는 그 출처를 파악하는 것이 거의 불가능하기 때문입니다
wrong_answers:
  - 진정한 무작위 문자열과 동일한 결정론적 세그먼트가 포함되어 있기 때문입니다
  - 구성에 부동 숫자를 사용하기 때문에
  - 자연 현상에서만 생성되기 때문입니다
explanation: |
  의사 난수 문자열은 실제 난수 문자열과 매우 유사하게 설계되어 seed 또는 사용된 알고리즘에 대한 액세스 없이는 구분이 불가능합니다.
reviewed: false
question: एक pseudorandom string को truly random string से अलग नहीं बताया जा सकता क्योंकि वह computationally (गणनात्मक रूप से) इतनी मुश्किल से बनाई जाती है कि कोई भी practical algorithm या तरीका उसे असली random string से पहचान नहीं पाता। यानी, अगर आपके पास एक अच्छी तरह से डिज़ाइन की गई pseudorandom string है, तो कोई भी computer program, चाहे कितना भी ताकतवर हो, यह नहीं बता पाएगा कि वह असली random नहीं है—बशर्ते कि आपके पास original seed (बीज) का पता न हो। इसीलिए cryptography (गोपनीयता विज्ञान) में इनका इस्तेमाल किया जाता है, क्योंकि ये predict (अनुमान) करने में मुश्किल होते हैं।
answer: क्योंकि बिना अतिरिक्त जानकारी के इसकी उत्पत्ति का पता लगाना लगभग असंभव है
wrong_answers:
  - क्योंकि इसमें एकदम रैंडम स्ट्रिंग जैसे ही निर्धारित सेगमेंट्स होते हैं
  - क्योंकि इसके निर्माण में फ्लोटिंग नंबर्स का इस्तेमाल होता है
  - क्योंकि यह पूरी तरह से प्राकृतिक घटनाओं से उत्पन्न होता है
explanation: |
  एक प्स्यूडोरैंडम स्ट्रिंग असली रैंडम स्ट्रिंग जैसी दिखने के लिए बनाई जाती है, जिससे seed या इस्तेमाल किए गए अल्गोरिदम के बिना फर्क बताना नामुमकिन हो जाता है।

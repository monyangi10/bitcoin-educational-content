question: ขั้นตอนพื้นฐานสามขั้นในโครงร่าง MAC คืออะไร?
answer: การสร้างคีย์, การสร้างแท็ก, การตรวจสอบ
wrong_answers:
  - การเข้ารหัส, การถอดรหัส, การส่งข้อมูล
  - การสร้างกุญแจสาธารณะ, การเข้ารหัสกุญแจส่วนตัว, การตรวจสอบความถูกต้อง
  - การแฮชข้อความ, การเข้ารหัสแท็ก, การกระจายแท็ก
explanation: |
  โครงร่าง MAC ประกอบด้วยสามขั้นตอนหลัก: การสร้างกุญแจลับ, การสร้างแท็กสำหรับข้อความ, และการตรวจสอบว่าข้อความที่ได้รับและแท็กของมันตรงกัน
reviewed: false
question: Кои са трите основни стъпки в схемата MAC?
answer: Генериране на ключове, генериране на тагове, проверка
wrong_answers:
  - Криптиране, декриптиране, предаване
  - Генериране на публичен ключ, криптиране на частен ключ, валидиране
  - Хеширане на съобщения, криптиране на тагове, разпространение на тагове
explanation: |
  Схемата MAC се състои от три основни стъпки: генериране на секретен ключ, създаване на етикет за съобщението и проверка на съответствието между полученото съобщение и неговия етикет.

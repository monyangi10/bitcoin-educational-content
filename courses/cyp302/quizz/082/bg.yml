question: Защо еднократният блок се счита за сигурен метод за криптиране?
answer: Тъй като всеки бит от ключа е случаен и никоя част не се използва повторно
wrong_answers:
  - Тъй като използва случаен публичен и частен ключ
  - Тъй като разчита на прости числа
  - Тъй като криптира само малки съобщения
explanation: |
  Еднократната подложка е сигурна, защото всеки бит от ключа е случаен и никога не се използва повторно, което гарантира, че тя не оставя следи, които могат да бъдат използвани от нападателя.
reviewed: false
question: वन-टाइम पैड को सुरक्षित एन्क्रिप्शन मेथड क्यों माना जाता है?
answer: क्योंकि कुंजी का हर बिट रैंडम है और कोई भी हिस्सा दोबारा इस्तेमाल नहीं होता
wrong_answers:
  - क्योंकि यह एक रैंडम पब्लिक और प्राइवेट की का इस्तेमाल करता है
  - क्योंकि यह अभाज्य संख्याओं पर निर्भर करता है
  - क्योंकि यह सिर्फ छोटे संदेशों को एन्क्रिप्ट करता है
explanation: |
  वन-टाइम पैड सुरक्षित होता है क्योंकि इसकी हर एक बिट कुंजी (key) बिल्कुल रैंडम होती है और कभी दोबारा इस्तेमाल नहीं की जाती, जिससे हमलावर के लिए कोई भी शोषण योग्य निशान नहीं बचते।
reviewed: false
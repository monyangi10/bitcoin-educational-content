question: ทำไมแผ่นรหัสครั้งเดียวถึงถือว่าเป็นวิธีการเข้ารหัสที่ปลอดภัย?
answer: เนื่องจากแต่ละบิตของกุญแจเป็นแบบสุ่มและไม่มีส่วนใดที่ถูกนำมาใช้ซ้ำ
wrong_answers:
  - เนื่องจากมันใช้กุญแจสาธารณะและกุญแจส่วนตัวแบบสุ่ม
  - เพราะมันขึ้นอยู่กับจำนวนเฉพาะ
  - เพราะมันเข้ารหัสเฉพาะข้อความขนาดเล็กเท่านั้น
explanation: |
  แผ่นรหัสใช้ครั้งเดียวมีความปลอดภัยเพราะแต่ละบิตของกุญแจเป็นแบบสุ่มและไม่ถูกนำมาใช้ซ้ำ ทำให้มั่นใจได้ว่าจะไม่ทิ้งร่องรอยที่สามารถถูกโจมตีได้
reviewed: false
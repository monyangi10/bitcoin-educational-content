question: Кой тип група е особено важна за криптографията с публичен ключ поради способността ѝ да се generate всички елементи чрез експонентиране?
answer: Циклични групи
wrong_answers:
  - Неабелови групи
  - Безкрайни групи
  - Групи от комплексни числа
explanation: |
  В криптографията цикличните групи са от съществено значение, тъй като позволяват генерирането на всички елементи на групата с помощта на експонентирането на един елемент, наречен генератор.
reviewed: false
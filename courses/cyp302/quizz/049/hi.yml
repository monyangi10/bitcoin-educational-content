question: वह ग्रुप जो पब्लिक की क्रिप्टोग्राफी के लिए खास अहमियत रखता है, वह है "साइक्लिक ग्रुप" (cyclic group), क्योंकि यह generate (जनरेटर) की मदद से Elements (ग्रुप के सभी एलिमेंट्स) को एक्सपोनेंशिएशन (घातांक) के जरिए पूरी तरह कवर कर सकता है।  

(टेक्निकली: साइक्लिक ग्रुप्स में एक जनरेटर एलिमेंट होता है जिसकी पावर्स से पूरा ग्रुप बनता है, जो पब्लिक-की क्रिप्टोग्राफी के लिए बेहद उपयोगी है।)
answer: चक्रीय समूह
wrong_answers:
  - गैर-एबेलियन समूह
  - अनंत समूह
  - कॉम्प्लेक्स नंबर ग्रुप्स
explanation: |
  क्रिप्टोग्राफी में, साइक्लिक ग्रुप बहुत जरूरी होते हैं क्योंकि इनमें एक ही एलिमेंट (जिसे जनरेटर कहते हैं) को एक्सपोनेंशिएट करके पूरे Elements ग्रुप को जनरेट किया जा सकता है।
reviewed: false
question: Защо паролите често се съхраняват като хеш на защитени сървъри?
answer: Предотвратяване на лесното извличане на пароли в случай на изтичане на информация
wrong_answers:
  - Увеличаване на размера на хранилището за потребителски данни
  - Криптиране на пароли в реално време по симетричен начин
  - Разрешаване на потребителите да влизат в системата без парола
explanation: |
  Чрез съхраняването на хешове на пароли дори в случай на нарушаване на сигурността на данните действителните пароли не могат да бъдат прочетени директно, което повишава сигурността.

question: सुरक्षित सर्वर पर पासवर्ड अक्सर हैश के रूप में क्यों स्टोर किए जाते हैं?
answer: लीक होने की स्थिति में पासवर्ड को आसानी से पुनर्प्राप्त होने से रोकने के लिए
wrong_answers:
  - यूजर डेटा स्टोरेज का साइज़ बढ़ाने के लिए
  - पासवर्ड को रियल-टाइम में सिमेट्रिक तरीके से एन्क्रिप्ट करने के लिए
  - उपयोगकर्ताओं को बिना पासवर्ड के लॉग इन करने की अनुमति देने के लिए
explanation: |
  पासवर्ड हैशेज़ को स्टोर करके, डेटा ब्रीच की स्थिति में भी, असली पासवर्ड्स को सीधे पढ़ा नहीं जा सकता, जिससे सुरक्षा बढ़ जाती है।
reviewed: false
question: ทำไมรหัสผ่านมักถูกเก็บเป็นแฮชบนเซิร์ฟเวอร์ที่ปลอดภัย?
answer: เพื่อป้องกันไม่ให้รหัสผ่านถูกดึงข้อมูลได้ง่ายในกรณีที่เกิดการรั่วไหล
wrong_answers:
  - เพื่อเพิ่มขนาดของการจัดเก็บข้อมูลผู้ใช้
  - เข้ารหัสรหัสผ่านแบบเรียลไทม์ในลักษณะสมมาตร
  - เพื่อให้ผู้ใช้เข้าสู่ระบบโดยไม่ต้องใช้รหัสผ่าน
explanation: |
  การจัดเก็บแฮชของรหัสผ่าน แม้ในกรณีที่ข้อมูลรั่วไหล รหัสผ่านจริงจะไม่สามารถถูกอ่านได้โดยตรง ซึ่งจะเพิ่มความปลอดภัย
reviewed: false
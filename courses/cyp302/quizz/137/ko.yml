question: 비밀번호가 보안 서버에 해시로 저장되는 경우가 많은 이유는 무엇인가요?
answer: 비밀번호 유출 시 비밀번호가 쉽게 검색되지 않도록 하려면 다음과 같이 하세요
wrong_answers:
  - 사용자 데이터 저장소 크기를 늘리려면
  - 대칭 방식으로 실시간으로 비밀번호를 암호화하려면 다음과 같이 하세요
  - 사용자가 비밀번호 없이 로그인할 수 있도록 하려면 다음과 같이 하세요
explanation: |
  비밀번호 해시를 저장하면 데이터 유출이 발생하더라도 실제 비밀번호를 직접 읽을 수 없으므로 보안이 강화됩니다.

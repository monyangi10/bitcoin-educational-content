question: В контекста на криптосистемата RSA на какво съответства произведението на две прости числа p и q?
answer: Той представлява цялото число N, което се използва като модул за операции
wrong_answers:
  - Той представлява публичния ключ
  - Служи като ключ за декриптиране
  - Той се използва само за generate на експонентата e
explanation: |
  В RSA цялото число N е произведение на две големи прости числа p и q и се използва като модул за операциите по криптиране и декриптиране.
reviewed: false
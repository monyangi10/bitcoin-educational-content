question: Katika muktadha wa mfumo wa siri wa RSA, bidhaa ya nambari kuu mbili p na q inalingana na nini?
answer: Inajumuisha nambari kamili N inayotumika kama moduli ya operesheni
wrong_answers:
  - Inajumuisha ufunguo wa umma
  - Inatumika kama ufunguo wa kusimbua
  - Inatumika tu kwa generate kipeo e
explanation: |
  Katika RSA, nambari kamili N ni zao la nambari kuu mbili, p na q, na inatumika kama moduli ya operesheni ya usimbaji fiche na usimbuaji.
reviewed: true

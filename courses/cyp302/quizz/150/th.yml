question: ในบริบทของระบบการเข้ารหัส RSA ผลคูณของจำนวนเฉพาะสองจำนวน p และ q สอดคล้องกับอะไร?
answer: มันประกอบด้วยจำนวนเต็ม N ที่ใช้เป็นโมดูลัสสำหรับการดำเนินการ
wrong_answers:
  - มันประกอบด้วยกุญแจสาธารณะ
  - มันทำหน้าที่เป็นกุญแจถอดรหัส
  - มันถูกใช้เฉพาะกับ generate ตัวเลขยกกำลัง e
explanation: |
  ใน RSA จำนวนเต็ม N คือผลคูณของจำนวนเฉพาะขนาดใหญ่สองจำนวน p และ q และมันถูกใช้เป็นโมดูลัสสำหรับการเข้ารหัสและถอดรหัสข้อมูล
reviewed: false
question: RSA क्रिप्टोसिस्टम में, दो अभाज्य संख्याओं p और q का गुणनफल किस चीज़ से मेल खाता है?
answer: यह पूर्णांक N को दर्शाता है जिसे ऑपरेशन्स के लिए मॉड्यूलस के रूप में इस्तेमाल किया जाता है।
wrong_answers:
  - यह पब्लिक की है
  - यह डिक्रिप्शन की चाबी का काम करता है
  - इसे सिर्फ generate एक्सपोनेंट e के लिए इस्तेमाल किया जाता है
explanation: |
  RSA में, पूर्णांक N दो बड़े अभाज्य संख्याओं p और q का गुणनफल होता है, और इसे एन्क्रिप्शन और डिक्रिप्शन ऑपरेशन्स के लिए मॉड्यूलस के रूप में इस्तेमाल किया जाता है।
reviewed: false
question: प्रमाणित एन्क्रिप्शन में ऑपरेशन्स का सही क्रम क्या है?
answer: पहले एन्क्रिप्ट करो, फिर एन्क्रिप्ट किए गए टेक्स्ट पर एक टैग बनाओ
wrong_answers:
  - पहले एक टैग बनाओ, फिर मैसेज और टैग को एन्क्रिप्ट करो
  - प्लेनटेक्स्ट को एक टैग के साथ मिलाओ, फिर एन्क्रिप्ट करो
  - एक टैग बनाओ, फिर उसे पब्लिक की से एन्क्रिप्ट करो
explanation: |
  सुरक्षा सुनिश्चित करने के लिए, प्रमाणित एन्क्रिप्शन को पहले संदेश को एन्क्रिप्ट करना चाहिए, फिर एन्क्रिप्टेड टेक्स्ट पर generate टैग करना चाहिए। अन्य तरीके संभावित रूप से असुरक्षित हो सकते हैं।

question: ลำดับการดำเนินการที่ถูกต้องในกระบวนการเข้ารหัสที่มีการตรวจสอบความถูกต้องคืออะไร?
answer: เข้ารหัสก่อน จากนั้นสร้างแท็กบนข้อความที่เข้ารหัสแล้ว
wrong_answers:
  - ก่อนอื่นสร้างแท็ก จากนั้นเข้ารหัสข้อความและแท็ก
  - รวมข้อความธรรมดากับแท็ก จากนั้นเข้ารหัส
  - สร้างแท็ก จากนั้นใช้คีย์สาธารณะเพื่อเข้ารหัสแท็ก
explanation: |
  เพื่อความปลอดภัย การเข้ารหัสที่ผ่านการรับรองต้องเข้ารหัสข้อความก่อน จากนั้น generate แท็กบนข้อความที่เข้ารหัสแล้ว ลำดับอื่นอาจมีความเสี่ยงได้
reviewed: false
question: Каква е правилната последователност на операциите при удостоверено криптиране?
answer: Първо криптирайте, а след това създайте таг върху криптирания текст
wrong_answers:
  - Първо създайте таг, след което криптирайте съобщението и тага
  - Комбинирайте обикновения текст с таг, след което го криптирайте
  - Създаване на етикет, след което използвайте публичен ключ, за да го криптирате
explanation: |
  За да се гарантира сигурността, автентифицираното криптиране трябва първо да криптира съобщението, след което да постави етикет generate върху криптирания текст. Други поръчки са потенциално уязвими.
reviewed: false
question: 인증된 암호화에서 올바른 작업 순서는 무엇인가요?
answer: 먼저 암호화한 다음 암호화된 텍스트에 태그를 만듭니다
wrong_answers:
  - 먼저 태그를 만든 다음 메시지와 태그를 암호화합니다
  - 일반 텍스트를 태그와 결합한 다음 암호화합니다
  - 태그를 만든 다음 공개 키를 사용하여 암호화합니다
explanation: |
  보안을 보장하기 위해 인증된 암호화는 먼저 메시지를 암호화한 다음 암호화된 텍스트에 태그를 generate으로 지정해야 합니다. 다른 주문은 잠재적으로 취약할 수 있습니다.
reviewed: false
question: ब्लॉक सिफर एन्क्रिप्शन में आमतौर पर ब्लॉक साइज़ कितनी होती है?
answer: 64, 128, 192, या 256 बिट्स
wrong_answers:
  - 8, 16, 32, या 64 बिट्स
  - 4, 8, 16, या 32 बिट्स
  - 256, 512, 1024, या 2048 बिट्स
explanation: |
  ब्लॉक सिफर डेटा को फिक्स्ड साइज़ के ब्लॉक्स में प्रोसेस करते हैं, आमतौर पर 64, 128, 192, या 256 बिट्स, ताकि एन्क्रिप्शन की सुरक्षा और इंटिग्रिटी बेहतरीन रहे।
reviewed: false
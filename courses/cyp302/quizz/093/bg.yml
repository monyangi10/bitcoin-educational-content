question: Какъв е типичният размер на блока за криптиране с блоков шифър?
answer: 64, 128, 192 или 256 бита
wrong_answers:
  - 8, 16, 32 или 64 бита
  - 4, 8, 16 или 32 бита
  - 256, 512, 1024 или 2048 бита
explanation: |
  Блоковите шифри обработват данни в блокове с фиксиран размер, обикновено 64, 128, 192 или 256 бита, за да се осигури оптимална сигурност и цялост на криптирането.
reviewed: false
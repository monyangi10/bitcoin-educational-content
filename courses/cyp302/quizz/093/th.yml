question: ขนาดบล็อกทั่วไปสำหรับการเข้ารหัสบล็อกไซเฟอร์คือเท่าใด?
answer: 64, 128, 192, หรือ 256 บิต
wrong_answers:
  - 8, 16, 32, หรือ 64 บิต
  - 4, 8, 16, หรือ 32 บิต
  - 256, 512, 1024, หรือ 2048 บิต
explanation: |
  บล็อกไซเฟอร์ประมวลผลข้อมูลในบล็อกขนาดคงที่ โดยทั่วไปคือ 64, 128, 192 หรือ 256 บิต เพื่อให้มั่นใจถึงความปลอดภัยและความสมบูรณ์ของการเข้ารหัส
reviewed: false
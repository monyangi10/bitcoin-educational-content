question: เหตุผลหลักที่ทำให้รหัส Beale อื่น ๆ ยังคงไม่สามารถถอดรหัสได้คืออะไร?
answer: กุญแจของรหัสเหล่านี้ยังไม่เป็นที่รู้จัก
wrong_answers:
  - ข้อความที่เข้ารหัสนั้นเก่าเกินไป
  - กล่องนั้นหายไปก่อนที่จะถูกถอดรหัส
  - นักวิจัยขาดเอกสารประวัติศาสตร์ที่เชื่อถือได้
explanation: |
  รหัส Beale อื่น ๆ ไม่เคยถูกถอดรหัสเพราะกุญแจที่จำเป็นในการอ่านยังคงไม่เป็นที่รู้จัก แม้จะมีความพยายามมากมายก็ตาม
reviewed: false
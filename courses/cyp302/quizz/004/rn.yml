question: Ni imvo nyamukuru iyihe ituma izindi nkuru za Beale ziguma zitasobanuwe?
answer: Urufunguzo rw'izo nkuru z'ubupfumu n'ubu ntiruramenyekana .
wrong_answers:
  - Ivyanditswe bipfutse birashaje cane
  - Iyo sandugu yarazimiye imbere y'uko ishobora gusobanurwamwo .
  - Abashakashatsi ntibagira inyandiko zo kwizigirwa zerekeye kahise .
explanation: |
  Ibindi bimenyetso vya Beale ntivyigeze bisobanurwa kubera ko urufunguruzo rukenewe kugira ngo umuntu abisome ruguma rutazwi, naho nyene vyageragejwe kenshi.

question: Wat is de belangrijkste reden waarom de andere Beale cijfers niet ontcijferd zijn?
answer: De sleutel tot deze cijfers is nog onbekend
wrong_answers:
  - De gecodeerde teksten zijn te oud
  - De doos ging verloren voordat hij kon worden ontcijferd
  - Onderzoekers hebben geen betrouwbare historische documenten
explanation: |
  De andere Beale cijfers zijn nooit ontcijferd omdat de benodigde sleutel om ze te lezen onbekend blijft, ondanks talloze pogingen.
reviewed: false
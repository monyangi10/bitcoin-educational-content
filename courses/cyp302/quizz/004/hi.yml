question: दूसरे बील साइफर क्यों नहीं सुलझाए जा सके हैं, इसका मुख्य कारण क्या है?
answer: इन सिफरों की चाबी अभी भी अज्ञात है
wrong_answers:
  - एनक्रिप्टेड टेक्स्ट बहुत पुराने हैं
  - वह बॉक्स समझ में आने से पहले ही गुम हो गया
  - शोधकर्ताओ के पास भरोसेमंद ऐतिहासिक दस्तावेज़ों की कमी है
explanation: |
  बाकी बील साइफर कभी भी डिकोड नहीं किए जा सके हैं क्योंकि उन्हें पढ़ने के लिए जरूरी चाबी अभी तक पता नहीं चल पाई है, हालांकि कई कोशिशें की गई हैं।
reviewed: false
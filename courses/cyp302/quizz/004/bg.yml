question: Коя е основната причина другите шифри на Бил да останат неразгадани?
answer: Ключът към тези шифри все още е неизвестен
wrong_answers:
  - Криптираните текстове са твърде стари
  - Кутията е изгубена, преди да бъде разчетена
  - Изследователите не разполагат с надеждни исторически документи
explanation: |
  Другите шифри на Бил никога не са били дешифрирани, тъй като ключът, необходим за разчитането им, остава неизвестен, въпреки многобройните опити.
reviewed: false
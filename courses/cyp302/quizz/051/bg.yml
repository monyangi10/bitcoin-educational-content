question: Какво означава терминът champ premier или corps premier?
answer: Поле с прост брой елементи
wrong_answers:
  - Поле, съдържащо само прости числа
  - Поле, определено единствено чрез събиране на прости числа
  - Поле, което използва случайни вектори
explanation: |
  Пространственото поле съдържа брой елементи, равен на едно просто число, което го прави основно поле за криптографски операции.
reviewed: false
question: "Champ premier" या "corps premier" शब्द का क्या मतलब है?
answer: एक खेत जिसमें Elements की एक अभाज्य संख्या हो
wrong_answers:
  - एक ऐसा खेत जिसमें सिर्फ अभाज्य संख्याएँ हों
  - एक क्षेत्र जिसे केवल अभाज्य संख्याओं के जोड़ से परिभाषित किया गया है
  - एक क्षेत्र जो रैंडम वेक्टर्स का इस्तेमाल करता है
explanation: |
  एक प्राइम फील्ड में Elements की संख्या एक अभाज्य संख्या के बराबर होती है, जो इसे क्रिप्टोग्राफिक ऑपरेशन्स के लिए एक मूलभूत फील्ड बनाती है।
reviewed: false
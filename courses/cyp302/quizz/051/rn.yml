question: Ijambo champ premier canke corps premier risobanura iki?
answer: Umurima ufise umubare w’intango wa Elements.
wrong_answers:
  - Umurima urimwo imibare y'intango gusa
  - Umurima usobanurwa gusa n'ukwongerako imibare y'intango
  - Umurima ukoresha ama vecteur atari yo
explanation: |
  Ibarabara ry’intango ririmwo umubare Elements ungana n’umubare w’intango, bikaba bituma ari ibara ry’ishimikiro ry’ibikorwa vy’ubuhinga bwo gupfuka amakuru.

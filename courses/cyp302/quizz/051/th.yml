question: คำว่า champ premier หรือ corps premier หมายถึงอะไร?
answer: ฟิลด์ที่มีจำนวนสมาชิกเป็นจำนวนเฉพาะ
wrong_answers:
  - ฟิลด์ที่มีเฉพาะจำนวนเฉพาะ
  - ฟิลด์ที่กำหนดโดยการบวกของจำนวนเฉพาะเท่านั้น
  - สนามที่ใช้เวกเตอร์สุ่ม
explanation: |
  ฟิลด์เฉพาะประกอบด้วยจำนวนขององค์ประกอบที่เท่ากับจำนวนเฉพาะ ทำให้เป็นฟิลด์พื้นฐานสำหรับการดำเนินการเข้ารหัสลับ
reviewed: false
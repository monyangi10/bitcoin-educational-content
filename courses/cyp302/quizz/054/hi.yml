question: क्रिप्टोग्राफी में फाइनाइट फील्ड्स के लिए इस्तेमाल होने वाली मुख्य बीजगणितीय संरचना क्या है?
answer: अघटनीय बहुपद
wrong_answers:
  - वर्ग आव्यूह
  - रैंडम वेक्टर्स
  - घनमूल
explanation: |
  क्रिप्टोग्राफी में, 2^m ऑर्डर के फाइनाइट फील्ड्स में अक्सर अपरिवर्तनीय बहुपद (irreducible polynomials) का इस्तेमाल किया जाता है ताकि फील्ड अच्छी तरह से परिभाषित हो और सभी ऑपरेशन्स संभव हो सकें।
reviewed: false
question: Кой е основният тип алгебрична структура, използвана в крайните полета за криптография?
answer: Нередуцируеми полиноми
wrong_answers:
  - Квадратни матрици
  - Случайни вектори
  - Кубични корени
explanation: |
  В криптографията в крайните полета от ред 2^m често се използват несводими полиноми, за да се гарантира, че полето е добре дефинирано и че всички операции са възможни.
reviewed: false
question: โครงสร้างพีชคณิตหลักที่ใช้ในฟิลด์จำกัดสำหรับการเข้ารหัสคืออะไร?
answer: พหุนามที่ไม่สามารถแยกตัวประกอบได้
wrong_answers:
  - เมทริกซ์จัตุรัส
  - เวกเตอร์สุ่ม
  - รากที่สาม
explanation: |
  ในวิทยาการเข้ารหัสลับ สนามจำกัดของลำดับ 2^m มักใช้พหุนามที่ไม่สามารถแยกตัวประกอบได้เพื่อให้แน่ใจว่าสนามนั้นถูกกำหนดไว้อย่างดีและสามารถดำเนินการทั้งหมดได้
reviewed: false
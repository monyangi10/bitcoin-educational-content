question: Waarom wordt AES-codering in ECB-modus niet aanbevolen voor veilig gebruik?
answer: Het resulteert in deterministische encryptie
wrong_answers:
  - Hiervoor is een sleutel van meer dan 128 bits nodig
  - Het is te traag voor de meeste moderne toepassingen
  - De tekst kan niet in 128-bits blokken worden verdeeld
explanation: |
  ECB mode wordt niet aanbevolen omdat het deterministische encryptie produceert, wat betekent dat identieke blokken plaintext identieke blokken ciphertext opleveren, wat gebruikt kan worden om informatie over de plaintext te raden.
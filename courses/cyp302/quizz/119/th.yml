question: ทำไมการเข้ารหัส AES ในโหมด ECB จึงไม่แนะนำให้ใช้เพื่อความปลอดภัย?
answer: มันส่งผลให้เกิดการเข้ารหัสแบบกำหนดแน่นอน
wrong_answers:
  - ต้องใช้คีย์ที่มีมากกว่า 128 บิต
  - มันช้าเกินไปสำหรับแอปพลิเคชันสมัยใหม่ส่วนใหญ่
  - มันไม่อนุญาตให้แบ่งข้อความออกเป็นบล็อกขนาด 128 บิต
explanation: |
  โหมด ECB ไม่แนะนำให้ใช้เพราะมันสร้างการเข้ารหัสแบบกำหนดได้ ซึ่งหมายความว่าบล็อกของข้อความธรรมดาที่เหมือนกันจะให้บล็อกของข้อความเข้ารหัสที่เหมือนกัน ซึ่งสามารถถูกใช้ประโยชน์เพื่อคาดเดาข้อมูลเกี่ยวกับข้อความธรรมดาได้
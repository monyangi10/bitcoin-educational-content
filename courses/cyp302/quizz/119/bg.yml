question: Защо AES криптирането в режим ЕЦБ не се препоръчва за сигурна употреба?
answer: Това води до детерминистично криптиране
wrong_answers:
  - Изисква ключ с дължина над 128 бита
  - Той е твърде бавен за повечето съвременни приложения
  - Тя не позволява разделянето на текста на 128-битови блокове
explanation: |
  Режимът ЕЦБ не се препоръчва, тъй като при него се получава детерминистично криптиране, което означава, че идентични блокове от открит текст ще дадат идентични блокове от шифрован текст, което може да се използва за отгатване на информация за открития текст.
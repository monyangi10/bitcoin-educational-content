question: Kamba ya nasibu bandia ni nini?
answer: Kamba inayoonekana kutoka kwa kigezo kimoja lakini hutolewa na kanuni ya upanuzi
wrong_answers:
  - Mfuatano uliotengenezwa kwa uwezekano sawa kwa kila herufi
  - Mfuatano wa urefu usiobadilika kutoka kwa tukio la asili la nasibu
  - Mfuatano wa nasibu uliochaguliwa pekee kutoka kwa thamani za biti 0 na 1
explanation: |
  Kamba ya nasibu bandia inatolewa na algoriti ya upanuzi kutoka kwa seed ndogo, kwa njia ambayo inaiga uteuzi sare kati ya kamba zote za urefu sawa.
reviewed: true

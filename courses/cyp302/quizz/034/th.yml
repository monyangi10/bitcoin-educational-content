question: สตริงเทียมสุ่มคืออะไร?
answer: สตริงที่ดูเหมือนมาจากตัวแปรแบบสม่ำเสมอแต่ถูกสร้างขึ้นโดยอัลกอริธึมการขยาย
wrong_answers:
  - สตริงที่สร้างขึ้นโดยมีความน่าจะเป็นเท่ากันสำหรับแต่ละตัวอักษร
  - สตริงความยาวคงที่จากเหตุการณ์สุ่มตามธรรมชาติ
  - สตริงสุ่มที่เลือกจากค่าไบนารี 0 และ 1 เท่านั้น
explanation: |
  สตริงเทียมสุ่มถูกสร้างขึ้นโดยอัลกอริทึมขยายจาก seed ที่เล็กกว่า ในลักษณะที่เลียนแบบการเลือกแบบสม่ำเสมอในบรรดาสตริงทั้งหมดที่มีความยาวเท่ากัน
reviewed: false
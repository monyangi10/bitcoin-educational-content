question: Šta je pseudonasumični niz?
answer: Niz koja izgleda kao da dolazi iz uniformne promenljive, ali je proizvedena algoritmom ekspanzije
wrong_answers:
  - Niz generisan sa identičnom verovatnoćom za svaki karakter
  - Niz fiksne dužine iz prirodnog nasumičnog događaja
  - Nasumičan niz odabran samo iz binarnih vrednosti 0 i 1
explanation: |
  Pseudonasumičan niz se proizvodi pomoću algoritma ekspanzije iz manjeg seed-a, na način koji oponaša uniformni odabir među svim nizovima iste dužine.
reviewed: true

question: Какво е псевдослучаен низ?
answer: Редица, която изглежда, че идва от единна променлива, но е създадена чрез алгоритъм за разширяване
wrong_answers:
  - Последователност, генерирана с еднаква вероятност за всеки символ
  - Поредица с фиксирана дължина от естествено случайно събитие
  - Случаен низ, избран само от двоичните стойности 0 и 1
explanation: |
  Псевдослучайният низ се създава чрез алгоритъм за разширяване от по-малък seed по начин, който имитира равномерен избор сред всички низове с еднаква дължина.
reviewed: false
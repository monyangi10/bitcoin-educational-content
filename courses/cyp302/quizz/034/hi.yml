question: एक pseudorandom string क्या है?
answer: एक स्ट्रिंग जो एक समान वेरिएबल से आती हुई दिखती है, लेकिन एक विस्तार एल्गोरिदम द्वारा उत्पन्न की गई है
wrong_answers:
  - हर अक्षर के लिए एक समान संभावना के साथ उत्पन्न एक स्ट्रिंग
  - एक प्राकृतिक यादृच्छिक घटना से एक निश्चित-लंबाई वाली स्ट्रिंग
  - एक बाइनरी वैल्यूज़ 0 और 1 से चुनी गई रैंडम स्ट्रिंग
explanation: |
  एक छद्म-यादृच्छिक स्ट्रिंग को एक छोटे seed से एक विस्तार एल्गोरिदम द्वारा उत्पन्न किया जाता है, जो उसी लंबाई की सभी स्ट्रिंग्स के बीच एक समान चयन की नकल करता है।

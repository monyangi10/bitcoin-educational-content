question: ปัญหาสำคัญที่นักเข้ารหัส Diffie, Hellman, และ Merkle พยายามแก้ไขในทศวรรษ 1970 คืออะไร?
answer: ปัญหาของการกระจายและการจัดการกุญแจ
wrong_answers:
  - การพัฒนาการเข้ารหัสหลังควอนตัม
  - การรักษาความปลอดภัยในการสื่อสารทางทหาร
  - การปรับปรุงเทคนิคการเข้ารหัสแบบสมมาตร
explanation: |
  Diffie, Hellman, และ Merkle ได้รับแรงบันดาลใจจากความยากลำบากในทางปฏิบัติของการแจกจ่ายและการจัดการกุญแจเพื่อรักษาความปลอดภัยในการสื่อสาร ซึ่งเป็นความท้าทายที่สำคัญในโลกที่กำลังเปลี่ยนไปสู่การสื่อสารดิจิทัล
reviewed: false
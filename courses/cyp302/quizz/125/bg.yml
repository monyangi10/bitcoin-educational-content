question: Какъв основен проблем се опитват да решат криптографите Дифи, Хелман и Меркъл през 70-те години на миналия век?
answer: Проблеми на разпределението и управлението на ключове
wrong_answers:
  - Развитие на постквантовата криптография
  - Осигуряване на военни комуникации
  - Подобряване на техниките за симетрично криптиране
explanation: |
  Дифи, Хелман и Меркъл са мотивирани от практическите трудности при разпределянето и управлението на ключове за защита на комуникациите, които са изключително важни в един свят, преминаващ към цифрова комуникация.
reviewed: false
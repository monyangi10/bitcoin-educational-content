question: 1970 के दशक में क्रिप्टोग्राफर्स डिफी, हेलमैन और मर्कले ने कौन सी बड़ी समस्या को हल करने की कोशिश की थी?
answer: कुंजी वितरण और प्रबंधन की समस्याएँ
wrong_answers:
  - पोस्ट-क्वांटम क्रिप्टोग्राफी का विकास
  - सैन्य संचार को सुरक्षित करना
  - सममित एन्क्रिप्शन तकनीकों में सुधार
explanation: |
  डिफी, हेलमैन और मर्कल प्रैक्टिकल मुश्किलों से प्रेरित थे, जैसे कि कुंजी वितरण और प्रबंधन, जो सुरक्षित संचार के लिए ज़रूरी हैं। ये चुनौतियाँ डिजिटल संचार की ओर बढ़ते दुनिया में बेहद अहम थीं।
reviewed: false
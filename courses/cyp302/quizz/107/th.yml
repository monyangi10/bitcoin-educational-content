question: การโจมตีแบบสะท้อนในเซสชันการสื่อสารคืออะไร?
answer: ผู้โจมตีส่งข้อความกลับไปยัง Alice ที่พวกเขาดักฟังระหว่าง Alice และ Bob
wrong_answers:
  - ผู้โจมตีสลับลำดับของข้อความในการสื่อสาร
  - ผู้โจมตีส่งข้อความที่ถูกแก้ไขโดยไม่มีแท็ก
  - ผู้โจมตีใช้ข้อความเก่าเพื่อสร้างข้อความใหม่
explanation: |
  ในการโจมตีแบบสะท้อนกลับ ผู้โจมตีดักข้อความจาก Alice ไปยัง Bob และส่งข้อความเดียวกันกลับไปยัง Alice ทำให้เกิดความสับสนในเซสชัน
reviewed: false
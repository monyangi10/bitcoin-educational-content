question: Какво представлява атаката с отразяване в комуникационна сесия?
answer: Атакуващият изпраща обратно на Alice съобщение, което е прихванал между Alice и Bob
wrong_answers:
  - Нападателят променя реда на съобщенията в комуникацията
  - Атакуващият изпраща модифицирано съобщение без таг
  - Нападателят използва старо съобщение, за да създаде ново
explanation: |
  При атаката с отразяване на съобщението атакуващият прихваща съобщение от Alice към Bob и изпраща същото съобщение обратно към Alice, като предизвиква объркване в сесията.
reviewed: false
question: 커뮤니케이션 세션에서 리플렉션 공격이란 무엇인가요?
answer: 공격자는 Alice과 Bob 사이에서 가로챈 메시지를 Alice으로 다시 보냅니다
wrong_answers:
  - 공격자는 통신에서 메시지 순서를 뒤집습니다
  - 공격자가 태그 없이 수정된 메시지를 보냅니다
  - 공격자가 이전 메시지를 사용하여 새 메시지를 생성합니다
explanation: |
  리플렉션 공격에서는 공격자가 Alice에서 Bob으로 보내는 메시지를 가로채서 동일한 메시지를 Alice로 다시 보내 세션에 혼란을 일으킵니다.
reviewed: false
question: एक कम्युनिकेशन सेशन में रिफ्लेक्शन अटैक क्या होता है?
answer: हमलावर ऐलिस को वह संदेश वापस भेजता है जो उसने ऐलिस और बॉब के बीच रोक लिया था।
wrong_answers:
  - हमलावर संचार में संदेशों के क्रम को उलट देता है
  - हमलावर बिना टैग के एक संशोधित संदेश भेजता है
  - हमलावर एक नया संदेश बनाने के लिए पुराने संदेश का इस्तेमाल करता है
explanation: |
  रिफ्लेक्शन अटैक में, हमलावर ऐलिस से बॉब को भेजे गए संदेश को रोक लेता है और वही संदेश वापस ऐलिस को भेज देता है, जिससे सेशन में भ्रम पैदा हो जाता है।
reviewed: false
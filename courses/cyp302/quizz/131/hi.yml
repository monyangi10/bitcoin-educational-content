question: बड़े डेटा एक्सचेंज में एसिमेट्रिक क्रिप्टोग्राफी, सिमेट्रिक क्रिप्टोग्राफी की तुलना में कम क्यों इस्तेमाल होती है?
answer: समान स्तर की सुरक्षा के लिए यह कम कारगर है
wrong_answers:
  - यह संदेशों की प्रामाणिकता सुनिश्चित नहीं करता है
  - इसके लिए हर Exchange के लिए कई सारे पब्लिक कीज़ चाहिए होते हैं
  - यह आधुनिक संचार प्रोटोकॉल के साथ संगत नहीं है।
explanation: |
  असिमेट्रिक क्रिप्टोग्राफी, हालांकि प्रमाणीकरण और शुरुआती एन्क्रिप्शन के लिए शक्तिशाली है, लेकिन इसे ज्यादा संसाधनों की जरूरत होती है, जिसकी वजह से बड़े डेटा ट्रांसफर के लिए इसका इस्तेमाल अकुशल हो जाता है।
reviewed: false
question: 대규모 데이터 거래소에서 대칭형 암호화보다 비대칭형 암호화가 덜 사용되는 이유는 무엇인가요?
answer: 동일한 수준의 보안에 비해 효율성이 떨어집니다
wrong_answers:
  - 메시지의 신뢰성을 보장하지 않습니다
  - 각 Exchange에 대해 여러 개의 공개키가 필요합니다
  - 최신 통신 프로토콜과 호환되지 않습니다
explanation: |
  비대칭 암호화는 인증 및 초기 암호화에는 강력하지만 더 많은 리소스를 필요로 하기 때문에 대규모 데이터 전송에는 비효율적입니다.
reviewed: false
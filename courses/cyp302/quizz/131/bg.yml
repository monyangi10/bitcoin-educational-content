question: Защо асиметричната криптография се използва по-рядко от симетричната при голям обмен на данни?
answer: Тя е по-малко ефективна при еквивалентно ниво на сигурност
wrong_answers:
  - Тя не гарантира автентичността на съобщенията
  - Изисква няколко публични ключа за всеки обмен
  - Не е съвместим със съвременните комуникационни протоколи
explanation: |
  Асиметричната криптография, макар и мощна за удостоверяване и първоначално криптиране, изисква повече ресурси, което прави използването ѝ неефективно при прехвърляне на значителни количества данни.
reviewed: false
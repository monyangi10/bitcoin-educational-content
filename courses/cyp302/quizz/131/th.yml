question: ทำไมการเข้ารหัสแบบอสมมาตรถึงถูกใช้น้อยกว่าการเข้ารหัสแบบสมมาตรในการแลกเปลี่ยนข้อมูลขนาดใหญ่?
answer: มันมีประสิทธิภาพน้อยกว่าสำหรับระดับความปลอดภัยที่เทียบเท่า
wrong_answers:
  - มันไม่ได้รับรองความถูกต้องของข้อความ
  - ต้องใช้คีย์สาธารณะหลายตัวสำหรับแต่ละการแลกเปลี่ยน
  - มันไม่เข้ากันกับโปรโตคอลการสื่อสารสมัยใหม่
explanation: |
  การเข้ารหัสแบบอสมมาตร แม้ว่าจะมีประสิทธิภาพสำหรับการยืนยันตัวตนและการเข้ารหัสเริ่มต้น แต่ต้องการทรัพยากรมากขึ้น ทำให้การใช้งานไม่เหมาะสมสำหรับการถ่ายโอนข้อมูลจำนวนมาก
reviewed: false
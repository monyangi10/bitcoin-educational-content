question: गणित में मॉड्यूलो ऑपरेशन (mod) क्या दर्शाता है?
answer: भाग (डिवीजन) का शेष
wrong_answers:
  - भाग (डिवीजन) का भागफल
  - शुरुआती संख्या का दोगुना
  - वह संख्या जो बिना शेषफल के विभाजित कर दे
explanation: |
  मॉड्यूलो ऑपरेशन में भाग देने के बाद शेष (remainder) निकाला जाता है, जैसे कि 25 mod 4 का मतलब 1 होता है क्योंकि भाग देने पर शेष 1 बचता है।

question: การดำเนินการโมดูโลในคณิตศาสตร์หมายถึงอะไร?
answer: เศษที่เหลือจากการหาร
wrong_answers:
  - ผลหารของการหาร
  - สองเท่าของจำนวนเริ่มต้น
  - จำนวนที่หารลงตัว
explanation: |
  การดำเนินการโมดูลัสเกี่ยวข้องกับการหาค่าที่เหลือจากการหาร ตัวอย่างเช่น 25 mod 4 เท่ากับ 1 เพราะค่าที่เหลือจากการหารคือ 1
reviewed: false
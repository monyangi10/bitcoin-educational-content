question: Какво представлява операцията модуло в математиката?
answer: Остатъкът от деление
wrong_answers:
  - Коефициентът на деление
  - Два пъти повече от началния брой
  - Числото, което се дели без остатък
explanation: |
  Операцията модуло включва определяне на остатъка от деление, например 25 mod 4 е равно на 1, защото остатъкът от делението е 1.
reviewed: false
question: 추상 대수학에서 대수 구조란 무엇인가요?
answer: 특정 공리를 준수하는 하나 이상의 연산이 포함된 Elements 집합입니다
wrong_answers:
  - 특정 공리를 준수하는 행으로 구성된 소수의 집합입니다
  - 선형 방정식을 풀기 위한 일련의 알고리즘
  - 특정 공리를 준수하여 배열된 무작위 기하학적 변환 그룹
explanation: |
  대수 구조는 덧셈이나 곱셈과 같은 하나 이상의 연산이 특정 공리를 준수하는 정의된 Elements의 집합으로, 수 이론에서 개념을 구조화하는 데 필수적입니다.

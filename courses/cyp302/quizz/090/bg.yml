question: Защо е трудно да се конструира блоково криптиране от поточен шифър?
answer: Тъй като поточните шифри обработват данни непрекъснато
wrong_answers:
  - Тъй като поточните шифри не използват частни ключове
  - Тъй като блоковите режими изискват по-дълги ключове
  - Тъй като поточните шифри винаги са по-бавни
explanation: |
  Поточните шифри са предназначени за непрекъснато криптиране на данни (бит по бит или байт по байт), което усложнява използването им в блоков режим, който изисква обработка на блокове с фиксиран размер.
reviewed: false
question: ทำไมการสร้างการเข้ารหัสแบบบล็อกโหมดจากสตรีมไซเฟอร์ถึงยาก?
answer: เนื่องจากรหัสสตรีมประมวลผลข้อมูลอย่างต่อเนื่อง
wrong_answers:
  - เนื่องจากรหัสสตรีมไม่ได้ใช้กุญแจส่วนตัว
  - เนื่องจากโหมดบล็อกต้องการคีย์ที่ยาวกว่า
  - เนื่องจากรหัสลับแบบสตรีมมักจะช้ากว่าเสมอ
explanation: |
  สตรีมไซเฟอร์ถูกออกแบบมาเพื่อเข้ารหัสข้อมูลอย่างต่อเนื่อง (ทีละบิตหรือทีละไบต์) ซึ่งทำให้การใช้งานในโหมดบล็อกที่ต้องการการประมวลผลในบล็อกขนาดคงที่ซับซ้อนขึ้น
reviewed: false
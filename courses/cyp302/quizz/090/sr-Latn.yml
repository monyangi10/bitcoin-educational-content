question: Zašto je teško konstruisati blok mod enkripcije iz strim šifre (šifre toka)?
answer: Zato što tok šifre obrađuju podatke kontinuirano
wrong_answers:
  - Zato što tok šifre ne koriste privatne ključeve
  - Zato što blok modovi zahtevaju duže ključeve
  - Zato što su tok šifre uvek sporije
explanation: |
  Tok šifre su dizajnirane da kontinuirano šifruju podatke (bit po bit ili bajt po bajt), što otežava njihovu upotrebu u blok modu koji zahteva obradu u blokovima fiksne veličine.
reviewed: true

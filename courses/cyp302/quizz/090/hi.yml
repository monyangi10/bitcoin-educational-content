question: ब्लॉक मोड एन्क्रिप्शन को स्ट्रीम सिफर से कंस्ट्रक्ट करना मुश्किल क्यों है?
answer: क्योंकि स्ट्रीम सिफर डेटा को लगातार प्रोसेस करते हैं
wrong_answers:
  - क्योंकि स्ट्रीम सिफर प्राइवेट की का इस्तेमाल नहीं करते
  - क्योंकि ब्लॉक मोड को लंबी चाबियों की ज़रूरत होती है
  - क्योंकि स्ट्रीम सिफर हमेशा धीमे होते हैं
explanation: |
  स्ट्रीम सिफर डेटा को लगातार (बिट दर बिट या बाइट दर बाइट) एन्क्रिप्ट करने के लिए डिज़ाइन किए गए हैं, जो उनके इस्तेमाल को ब्लॉक मोड में मुश्किल बना देता है जहां फिक्स्ड साइज़ के ब्लॉक्स में प्रोसेसिंग की ज़रूरत होती है।
reviewed: false
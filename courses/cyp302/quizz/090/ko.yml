question: 스트림 암호에서 블록 모드 암호화를 구성하는 것이 어려운 이유는 무엇인가요?
answer: 스트림 암호는 데이터를 지속적으로 처리하기 때문에
wrong_answers:
  - 스트림 암호는 개인 키를 사용하지 않으므로
  - 블록 모드에는 더 긴 키가 필요하기 때문에
  - 스트림 암호는 항상 느리기 때문에
explanation: |
  스트림 암호는 데이터를 연속적으로(비트 단위 또는 바이트 단위) 암호화하도록 설계되었기 때문에 고정된 크기의 블록으로 처리해야 하는 블록 모드에서는 사용이 복잡해집니다.
reviewed: false
question: ผลกระทบของทฤษฎีบทของออยเลอร์ในบริบทของการเข้ารหัสแบบอสมมาตรคืออะไร?
answer: มันทำให้การคำนวณเลขยกกำลังง่ายขึ้น
wrong_answers:
  - มันอนุญาตให้เข้ารหัสข้อความโดยตรง
  - มันถูกใช้เพื่อหาจำนวนเฉพาะ
  - มันถูกใช้เพื่อตรวจสอบความเท่าเทียมกันของตัวเลข
explanation: |
  ในวิทยาการเข้ารหัสแบบอสมมาตร ทฤษฎีบทของออยเลอร์ช่วยให้การคำนวณยกกำลังในโครงร่างเช่น RSA ง่ายขึ้น เนื่องจากมันให้วิธีการในการจัดการการยกกำลังแบบโมดูลาร์
reviewed: false
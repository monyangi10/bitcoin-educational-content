question: यूलर के प्रमेय के असममित क्रिप्टोग्राफी में क्या निहितार्थ हैं?
answer: यह पावर के कैलकुलेशन को आसान बनाता है
wrong_answers:
  - यह संदेशों को सीधे एन्क्रिप्ट करने की सुविधा देता है
  - यह प्राइम नंबर्स ढूंढने के लिए इस्तेमाल होता है
  - यह किसी संख्या की समता (पैरिटी) जांचने के लिए इस्तेमाल होता है
explanation: |
  असममित क्रिप्टोग्राफी में, यूलर का प्रमेय RSA जैसी योजनाओं में घातों की गणना को सरल बनाता है, क्योंकि यह मॉड्यूलर घातांक को संभालने का एक तरीका प्रदान करता है।
reviewed: false
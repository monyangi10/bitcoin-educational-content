question: Какъв формат на пакета е разработила Canonical, за да изолира приложенията и техните зависимости?
answer: Snap
wrong_answers:
  - AppImage
  - Portage
  - RPM
explanation: |
  Форматът Snap, разработен от Canonical, позволява инсталирането на самостоятелен софтуер, който е изолиран от системата и се актуализира независимо.
reviewed: false
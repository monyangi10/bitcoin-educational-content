question: چه فرمتی از بسته را Canonical برای ایزوله کردن برنامه‌ها و وابستگی‌های آن‌ها توسعه داده است؟
answer: ضربه
wrong_answers:
  - AppImage
  - پورتاژ
  - دور در دقیقه (RPM)
explanation: |
  فرمت Snap، توسعه‌یافته توسط Canonical، امکان نصب نرم‌افزارهای مستقل را فراهم می‌کند که از سیستم جدا شده و به‌صورت مستقل به‌روزرسانی می‌شوند.
reviewed: false
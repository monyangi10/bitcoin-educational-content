question: Какой формат пакетов разработала компания Canonical для изоляции приложений и их зависимостей?
answer: Snap
wrong_answers:
  - AppImage
  - Portage
  - RPM
explanation: |
  Формат Snap, разработанный компанией Canonical, позволяет устанавливать автономное программное обеспечение, изолированное от системы и обновляемое самостоятельно.
reviewed: false
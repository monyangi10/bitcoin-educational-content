question: कैनोनिकल ने अनुप्रयोगों और उनकी निर्भरताओं को अलग करने के लिए कौन सा पैकेज प्रारूप विकसित किया है?
answer: स्नैप
wrong_answers:
  - ऐप इमेज
  - भारवाहन
  - आरपीएम
explanation: |
  कैनोनिकल द्वारा विकसित स्नैप प्रारूप, स्व-निहित सॉफ्टवेयर की स्थापना को सक्षम बनाता है, जो सिस्टम से अलग होता है और स्वतंत्र रूप से अद्यतन होता है।
reviewed: false
question: Ni amakuru ayahe ashobora kuboneka muri metadata za EXIF y’ifoto?
answer: Itariki, isaha, ikibanza ca GPS, ubwoko bw’igikoresho, nyeneyo
wrong_answers:
  - Kode y’inkomoko ya sisiteme ya kamera
  - Ijambo ry’ibanga rya Wi-Fi y’umufotozi
  - Inyishu nshasha za antivirus
explanation: |
  Metadata za EXIF y’ifoto ​​akenshi zirimwo amakuru y’ido n’ido yerekeye ifoto na kamera.
reviewed: true

question: ข้อมูลใดบ้างที่มักพบในเมตะดาต้า EXIF ของภาพถ่าย?
answer: วันที่, เวลา, ตำแหน่ง GPS, รุ่นอุปกรณ์, ผู้เขียน
wrong_answers:
  - ซอร์สโค้ดเฟิร์มแวร์กล้อง
  - รหัสผ่าน Wi-Fi ของช่างภาพ
  - ผลการตรวจสอบไวรัสล่าสุด
explanation: |
  ข้อมูลเมตา EXIF ของภาพถ่ายมักจะมีข้อมูลบริบทที่ละเอียดเกี่ยวกับการถ่ายภาพและกล้อง
reviewed: false
question: Какую информацию обычно можно найти в метаданных EXIF фотографии?
answer: Дата, время, GPS-положение, модель устройства, автор
wrong_answers:
  - Исходный код прошивки камеры
  - Пароль Wi-Fi для фотографа
  - Последние результаты работы антивируса
explanation: |
  Метаданные EXIF фотографии часто содержат подробную контекстную информацию о снимке и камере.

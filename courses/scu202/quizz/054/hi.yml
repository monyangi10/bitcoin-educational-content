question: किसी फोटो के EXIF मेटाडेटा में आमतौर पर कौन सी जानकारी पाई जा सकती है?
answer: दिनांक, समय, GPS स्थिति, डिवाइस मॉडल, लेखक
wrong_answers:
  - कैमरा फ़र्मवेयर स्रोत कोड
  - फ़ोटोग्राफ़र का वाई-फ़ाई पासवर्ड
  - नवीनतम एंटीवायरस परिणाम
explanation: |
  किसी फोटो के EXIF मेटाडेटा में अक्सर शॉट और कैमरे के बारे में विस्तृत प्रासंगिक जानकारी होती है।
reviewed: false
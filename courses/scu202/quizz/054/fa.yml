question: چه اطلاعاتی معمولاً در فراداده EXIF یک عکس یافت می‌شود؟
answer: تاریخ، زمان، موقعیت GPS، مدل دستگاه، نویسنده
wrong_answers:
  - کد منبع سیستم‌عامل دوربین
  - رمز عبور Wi-Fi عکاس
  - آخرین نتایج آنتی ویروس
explanation: |
  فراداده EXIF یک عکس اغلب حاوی اطلاعات متنی دقیقی درباره‌ی عکس و دوربین است.
reviewed: false
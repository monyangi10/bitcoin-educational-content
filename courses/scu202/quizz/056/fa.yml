question: کدام موتور رندرینگ از یک Fork از KHTML ایجاد شد تا Safari را تجهیز کند؟
answer: وب‌کیت
wrong_answers:
  - تری‌دنت
  - گکو
  - چشمک زدن
explanation: |
  وب‌کیت یک Fork از KHTML است که توسط اپل برای سافاری از سال ۲۰۰۳ به بعد انتخاب شد و متعاقباً توسط بسیاری از مرورگرها پذیرفته شد.
reviewed: false
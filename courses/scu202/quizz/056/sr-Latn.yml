question: Koji rendering engine je nastao odvajanjem (forkovanjem) KHTML-a i koristi se u Safariju?
answer: WebKit
wrong_answers:
  - Trident
  - Gecko
  - Treptaj
explanation: |
  WebKit je fork od KHTML-a, izabran od strane Apple-a za Safari od 2003. godine nadalje, i naknadno usvojen od strane mnogih pregledača.
reviewed: true

question: सफारी को सुसज्जित करने के लिए KHTML के Fork से कौन सा रेंडरिंग इंजन बनाया गया था?
answer: वेबकिट
wrong_answers:
  - ट्राइडेंट
  - छिपकली
  - पलक झपकाना
explanation: |
  वेबकिट KHTML का Fork है, जिसे 2003 के बाद से एप्पल द्वारा सफारी के लिए चुना गया, और बाद में कई ब्राउज़रों द्वारा अपनाया गया।
reviewed: false
question: Ni iyihe moteri y’uguhindura yaremwe ivuye muri Fork ya KHTML kugira ngo ikoreshe Safari?
answer: Urubuga
wrong_answers:
  - Igikoko
  - Inzoka
  - Gukubita amaso
explanation: |
  WebKit ni Fork ya KHTML, yatowe na Apple ku Safari kuva mu 2003 gushika ubu, hanyuma yemerwa n’abashakashatsi benshi.
reviewed: false
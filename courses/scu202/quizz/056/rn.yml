question: Ni iyihe moteri y’uguhindura yaremwe ivuye muri Fork ya KHTML kugira ngo ikoreshwe na Safari?
answer: WebKit
wrong_answers:
  - Trident
  - Gecko
  - Blink
explanation: |
  WebKit ni Fork ya KHTML, yatowe na Apple kubwa Safari kuva mu 2003 gushika ubu, hanyuma irateba yemerwa n’izindi mucukumbuzi nyinshi.
reviewed: true

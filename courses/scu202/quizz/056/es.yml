question: ¿Qué motor de renderizado se creó a partir de un Fork de KHTML para equipar a Safari?
answer: WebKit
wrong_answers:
  - Trident
  - Gecko
  - Blink
explanation: |
  WebKit es una Fork de KHTML, elegida por Apple para Safari a partir de 2003 y adoptada posteriormente por muchos navegadores.
reviewed: true
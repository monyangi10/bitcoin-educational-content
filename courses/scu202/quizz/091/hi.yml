question: कौन सा प्रोटोकॉल नेटवर्क से जुड़े उपकरणों को गतिशील रूप से एक स्थानीय IP Address प्रदान करता है?
answer: डीएचसीपी
wrong_answers:
  - एचटीटीपी
  - एफ़टीपी
  - डीएनएस
explanation: |
  DHCP स्वचालित रूप से स्थानीय नेटवर्क से जुड़े प्रत्येक नए डिवाइस को एक IP Address प्रदान करता है।
reviewed: false
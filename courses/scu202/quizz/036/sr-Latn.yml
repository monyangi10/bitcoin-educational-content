question: Zašto je preporučljivo ukloniti neiskorišćen ili zastareo softver sa vašeg računara?
answer: Da bi se smanjila površina napada
wrong_answers:
  - Da bi se ubrzala vaša internet konekcija
  - Da bi se poboljšali zaštitni vektori
  - Da biste povećali trajanje baterije
explanation: |
  Što je manje instaliranog softvera, to je manje potencijalnih ranjivosti koje napadači mogu iskoristiti.
reviewed: true

question: Почему рекомендуется удалять с компьютера неиспользуемые или устаревшие программы?
answer: Чтобы уменьшить площадь атаки
wrong_answers:
  - Чтобы ускорить подключение к Интернету
  - Для улучшения защитных векторов
  - Для увеличения срока службы батареи
explanation: |
  Чем меньше установленного программного обеспечения, тем меньше потенциальных уязвимостей, которыми могут воспользоваться злоумышленники.
reviewed: false
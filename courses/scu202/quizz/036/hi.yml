question: अपने कंप्यूटर से अप्रयुक्त या अप्रचलित सॉफ़्टवेयर को हटाना क्यों उचित है?
answer: हमले की सतह को कम करने के लिए
wrong_answers:
  - अपने इंटरनेट कनेक्शन को तेज़ करने के लिए
  - सुरक्षात्मक वेक्टरों में सुधार करने के लिए
  - बैटरी जीवन बढ़ाने के लिए
explanation: |
  जितना कम सॉफ्टवेयर इंस्टॉल किया जाएगा, हमलावरों द्वारा उतनी ही कम संभावित कमजोरियों का फायदा उठाया जा सकेगा।
reviewed: false
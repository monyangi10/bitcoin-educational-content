question: چرا توصیه می‌شود نرم‌افزارهای بلااستفاده یا منسوخ را از رایانه خود حذف کنید؟
answer: برای کاهش سطح حمله
wrong_answers:
  - برای افزایش سرعت اتصال اینترنت خود
  - برای بهبود وکتورهای حفاظتی
  - برای افزایش عمر باتری
explanation: |
  هرچه نرم‌افزار کمتری نصب شود، نقاط ضعف بالقوه کمتری وجود دارد که می‌تواند توسط مهاجمان مورد سوءاستفاده قرار گیرد.
reviewed: false
question: Защо е препоръчително да премахнете неизползвания или остарелия софтуер от компютъра си?
answer: Намаляване на повърхността на атаката
wrong_answers:
  - Ускоряване на връзката с интернет
  - Подобряване на защитните вектори
  - За да увеличите живота на батерията
explanation: |
  Колкото по-малко софтуер е инсталиран, толкова по-малко са потенциалните уязвимости, които могат да бъдат използвани от нападателите.
reviewed: false
question: ทำไมจึงแนะนำให้ลบซอฟต์แวร์ที่ไม่ได้ใช้หรือซอฟต์แวร์ที่ล้าสมัยออกจากคอมพิวเตอร์ของคุณ?
answer: เพื่อลดพื้นผิวการโจมตี
wrong_answers:
  - เพื่อเพิ่มความเร็วในการเชื่อมต่ออินเทอร์เน็ตของคุณ
  - เพื่อปรับปรุงเวกเตอร์ป้องกัน
  - เพื่อเพิ่มอายุการใช้งานแบตเตอรี่
explanation: |
  ซอฟต์แวร์ที่ติดตั้งน้อยลง ความเสี่ยงที่ผู้โจมตีจะใช้ประโยชน์จากช่องโหว่ก็จะน้อยลง
reviewed: false
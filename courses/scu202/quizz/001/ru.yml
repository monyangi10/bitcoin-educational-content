question: Какие методы необходимы для ограничения доступа к вашим данным при работе в Интернете?
answer: Регулярно удаляйте файлы cookie
wrong_answers:
  - Сохраните все печенье
  - Отключите приватный режим браузера
  - Использование устаревшего браузера
explanation: |
  Удаление или ограничение файлов cookie уменьшает слежение за рекламой и сохраняет конфиденциальность при просмотре веб-страниц.
reviewed: false
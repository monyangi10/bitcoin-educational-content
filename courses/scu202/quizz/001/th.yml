question: แนวทางปฏิบัติใดบ้างที่จำเป็นในการจำกัดการเปิดเผยข้อมูลของคุณเมื่อท่องอินเทอร์เน็ต?
answer: ลบคุกกี้เป็นประจำ
wrong_answers:
  - เก็บคุกกี้ทั้งหมด
  - ปิดใช้งานโหมดส่วนตัวของเบราว์เซอร์
  - การใช้เบราว์เซอร์ที่ล้าสมัย
explanation: |
  การลบหรือจำกัดคุกกี้ช่วยลดการติดตามโฆษณาและรักษาความเป็นส่วนตัวระหว่างการท่องเว็บ
reviewed: false
question: Кои практики са от съществено значение за ограничаване на излагането на вашите данни при сърфиране в интернет?
answer: Редовно изтриване на бисквитките
wrong_answers:
  - Запазване на всички бисквитки
  - Деактивиране на частния режим на браузъра
  - Използване на остарял браузър
explanation: |
  Изтриването или ограничаването на "бисквитките" намалява проследяването на реклами и запазва неприкосновеността на личния живот по време на сърфиране в уеб.
reviewed: false
question: Koje prakse su ključne za ograničavanje izloženosti vaših podataka prilikom surfovanja internetom?
answer: Redovno brisanje kolačića
wrong_answers:
  - Čuvanje svih kolačića
  - Onemogućavanje privatnog režima pretraživača
  - Korišćenje zastarelog pregledača
explanation: |
  Brisanje ili ograničavanje kolačića smanjuje praćenje oglašavanja i čuva privatnost tokom pretraživanja interneta.
reviewed: true

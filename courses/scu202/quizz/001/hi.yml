question: इंटरनेट सर्फिंग करते समय अपने डेटा के जोखिम को सीमित करने के लिए कौन सी प्रथाएं आवश्यक हैं?
answer: कुकीज़ नियमित रूप से हटाएँ
wrong_answers:
  - सभी कुकीज़ रखें
  - ब्राउज़र निजी मोड अक्षम करें
  - अप्रचलित ब्राउज़र का उपयोग करना
explanation: |
  कुकीज़ को हटाने या सीमित करने से विज्ञापन ट्रैकिंग कम हो जाती है और वेब ब्राउज़िंग के दौरान गोपनीयता सुरक्षित रहती है।
reviewed: false
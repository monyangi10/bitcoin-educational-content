question: کدام روش‌ها برای محدود کردن افشای داده‌های شما هنگام مرور اینترنت ضروری هستند؟
answer: کوکی‌ها را به‌طور منظم حذف کنید
wrong_answers:
  - همه کوکی‌ها را نگه دارید
  - غیرفعال کردن حالت خصوصی مرورگر
  - استفاده از مرورگر منسوخ‌شده
explanation: |
  حذف یا محدود کردن کوکی‌ها ردیابی تبلیغاتی را کاهش می‌دهد و حریم خصوصی را در هنگام مرور وب حفظ می‌کند.
reviewed: false
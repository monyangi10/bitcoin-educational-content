question: دلیل اصلی اینکه چرا به‌روزرسانی مرورگر شما ضروری است چیست؟
answer: رفع آسیب‌پذیری‌های امنیتی بحرانی
wrong_answers:
  - سرعت بارگذاری صفحه را بهبود بخشید
  - جلوگیری از فیشینگ
  - بهینه‌سازی مصرف حافظه
explanation: |
  به‌روزرسانی‌ها اولویت را به آسیب‌پذیری‌های امنیتی می‌دهند که می‌توانند به یک مهاجم اجازه دهند سیستم شما را به خطر بیندازند.
reviewed: false
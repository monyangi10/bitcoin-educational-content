question: अपने ब्राउज़र को अद्यतन रखना आवश्यक क्यों है, इसका मुख्य कारण क्या है?
answer: गंभीर सुरक्षा कमजोरियों को ठीक करें
wrong_answers:
  - पृष्ठ लोड गति में सुधार करें
  - फ़िशिंग रोकें
  - मेमोरी खपत का अनुकूलन
explanation: |
  अपडेट उन सुरक्षा कमजोरियों को प्राथमिकता देते हैं जो किसी हमलावर को आपके सिस्टम से समझौता करने का मौका दे सकती हैं।
reviewed: false
question: Koji je glavni razlog zašto je važno držati svoj pregledač ažuriranim?
answer: Ispravite kritične bezbednosne ranjivosti
wrong_answers:
  - Poboljšajte brzinu učitavanja stranice
  - Sprečavanje phishinga
  - Optimizacija potrošnje memorije
explanation: |
  Ažuriranja prioritizuju bezbednosne ranjivosti koje bi mogle omogućiti napadaču da ugrozi vaš sistem.

question: Какова основная причина, по которой необходимо поддерживать браузер в актуальном состоянии?
answer: Устранение критических уязвимостей в системе безопасности
wrong_answers:
  - Повышение скорости загрузки страниц
  - Предотвращение фишинга
  - Оптимизация потребления памяти
explanation: |
  Приоритетными обновлениями являются уязвимости в системе безопасности, которые могут позволить злоумышленнику скомпрометировать вашу систему.
reviewed: false
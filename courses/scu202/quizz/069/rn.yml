question: Ni imvo nyamukuru iyihe ituma biba bihambaye ko uguma ushira kugihe mucukumbuzi yawe?
answer: Gukosora ubugoyagoye/integenke bikomeye vy’umutekano
wrong_answers:
  - Kunoza umuvuduko wo kw’ugurura ipaji
  - Gukingira ububeshi bw’udutego (phishing)
  - Gutuma ububiko bukoreshwa neza
explanation: |
  Iyo ushize kugihe mucukumbuzi yawe ishira imbere ubugoyagoye/integenke vy’umutekano vyoshobora gutuma uwutera ashobora guhungabanya sisitemu yawe.
reviewed: true

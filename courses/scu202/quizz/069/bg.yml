question: Коя е основната причина, поради която е важно да поддържате браузъра си актуален?
answer: Коригиране на критични уязвимости в сигурността
wrong_answers:
  - Подобряване на скоростта на зареждане на страницата
  - Предотвратяване на фишинг
  - Оптимизиране на потреблението на памет
explanation: |
  Актуализациите дават приоритет на уязвимостите в сигурността, които могат да позволят на нападателя да компрометира вашата система.

question: การใช้งานหลักของการแบ่งเครือข่ายโดยใช้ VLAN ในเครือข่ายภายในบ้านคืออะไร?
answer: แยกประเภทของเครื่องใช้หรือการใช้งานต่างๆ
wrong_answers:
  - เพิ่มระยะสัญญาณ Wi-Fi สำหรับอุปกรณ์
  - เข้ารหัสการเชื่อมต่อเครือข่ายแต่ละอุปกรณ์แยกกัน
  - เปิดใช้งาน WPA3 โดยอัตโนมัติ
explanation: |
  VLANs สามารถใช้เพื่อแบ่งอุปกรณ์ออกเป็นส่วนๆ จำกัดการแพร่กระจายของการโจมตีระหว่างเซ็กเมนต์
reviewed: false
question: استفاده اصلی از تقسیم‌بندی شبکه مبتنی بر VLAN در یک شبکه خانگی چیست؟
answer: انواع مختلف لوازم یا کاربردها را جدا کنید
wrong_answers:
  - افزایش برد Wi-Fi برای دستگاه‌ها
  - اتصالات شبکه را به صورت جداگانه برای هر دستگاه رمزگذاری کنید
  - فعال‌سازی خودکار WPA3
explanation: |
  VLANها می‌توانند برای تقسیم‌بندی دستگاه‌ها استفاده شوند و گسترش یک حمله بین بخش‌ها را محدود کنند.
reviewed: false
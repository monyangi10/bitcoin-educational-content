question: होम नेटवर्क में VLAN-आधारित नेटवर्क विभाजन का मुख्य उपयोग क्या है?
answer: विभिन्न प्रकार के उपकरणों या उपयोगों को अलग करें
wrong_answers:
  - उपकरणों के लिए वाई-फ़ाई रेंज बढ़ाएँ
  - प्रत्येक डिवाइस के लिए नेटवर्क कनेक्शन को अलग-अलग एन्क्रिप्ट करें
  - WPA3 को स्वचालित रूप से सक्षम करें
explanation: |
  वीएलएएन का उपयोग उपकरणों को अलग-अलग हिस्सों में बांटने के लिए किया जा सकता है, जिससे खंडों के बीच हमले का फैलाव सीमित हो जाता है।
reviewed: false
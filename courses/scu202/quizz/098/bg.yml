question: Каква е основната употреба на мрежовата сегментация, базирана на VLAN, в домашната мрежа?
answer: Изолиране на различни видове уреди или употреби
wrong_answers:
  - Увеличаване на обхвата на Wi-Fi за устройствата
  - Криптиране на мрежовите връзки поотделно за всяко устройство
  - Автоматично активиране на WPA3
explanation: |
  VLAN могат да се използват за разделяне на устройствата, като по този начин се ограничава разпространението на атаката между сегментите.
reviewed: false
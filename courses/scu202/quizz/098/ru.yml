question: Каково основное применение сегментации сети на основе VLAN в домашней сети?
answer: Изолируйте различные типы приборов или использования
wrong_answers:
  - Увеличение радиуса действия Wi-Fi для устройств
  - Шифруйте сетевые подключения индивидуально для каждого устройства
  - Автоматическое включение WPA3
explanation: |
  VLAN могут использоваться для разделения устройств, ограничивая распространение атаки между сегментами.

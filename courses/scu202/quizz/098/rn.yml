question: Ni akamaro akahe nyamukuru k’umuhora ugabuwe hifashishijwe VLAN ku muhora wo muhira?
answer: Gutandukanya ubwoko butandukanye bw’ibikoresho canke ikoreshwa
wrong_answers:
  - Kwongera ubwaguke bwa Wi-Fi ku bikoresho
  - Kunyegeza inzira z’umuhora ku giti cawe kuri buri gikoresho
  - Kwemeza WPA3 ubwavyo
explanation: |
  VLANs zishobora gukoreshwa mu kugabura ibikoresho, bikagabanya amahirwe yo gukwiragira kw’igitero hagati y’ibice.
reviewed: true

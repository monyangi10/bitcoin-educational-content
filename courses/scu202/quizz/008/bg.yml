question: Какъв е основният недостатък на екосистемата на macOS?
answer: Затвореност и зависимост от Apple
wrong_answers:
  - Твърде голяма отвореност на софтуера
  - Слаба оптимизация на графиката
  - Липса на актуализации
explanation: |
  Тясната интеграция на MacOS с хардуера на Apple води до зависимост и обвързаност с фирмената екосистема на марката.
reviewed: false
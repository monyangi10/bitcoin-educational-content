question: اصلی‌ترین نقطه ضعف اکوسیستم macOS چیست؟
answer: حبس و وابستگی به اپل
wrong_answers:
  - بیش از حد باز بودن نرم‌افزار
  - بهینه‌سازی ضعیف گرافیک
  - عدم به‌روزرسانی‌ها
explanation: |
  ادغام نزدیک MacOS با سخت‌افزار اپل منجر به وابستگی و قفل شدن در اکوسیستم اختصاصی این برند می‌شود.
reviewed: false
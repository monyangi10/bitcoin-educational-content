question: macOS पारिस्थितिकी तंत्र की मुख्य कमी क्या है?
answer: एप्पल पर बंधन और निर्भरता
wrong_answers:
  - बहुत अधिक सॉफ्टवेयर खुलापन
  - कमज़ोर ग्राफ़िक्स अनुकूलन
  - अपडेट की कमी
explanation: |
  मैकओएस का एप्पल हार्डवेयर के साथ घनिष्ठ एकीकरण, ब्रांड के स्वामित्व वाले पारिस्थितिकी तंत्र पर निर्भरता और लॉक-इन की ओर ले जाता है।
reviewed: false
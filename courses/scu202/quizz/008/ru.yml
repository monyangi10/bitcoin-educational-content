question: В чем главный недостаток экосистемы macOS?
answer: Замкнутость и зависимость от Apple
wrong_answers:
  - Слишком большая открытость программного обеспечения
  - Слабая оптимизация графики
  - Отсутствие обновлений
explanation: |
  Тесная интеграция macOS с оборудованием Apple приводит к зависимости и привязанности к фирменной экосистеме бренда.

question: Какая служба заменяет ISP DNS для защиты конфиденциальности веб-запросов?
answer: Quad9
wrong_answers:
  - Google DNS
  - DHCP
  - SMTP
explanation: |
  Quad9 - это публичный DNS-сервер, ориентированный на конфиденциальность, который отфильтровывает вредоносные домены и не ведет номинальных журналов.
reviewed: false
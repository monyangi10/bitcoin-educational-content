question: کدام سرویس جایگزین DNS ارائه‌دهنده خدمات اینترنت (ISP) می‌شود تا محرمانگی درخواست‌های وب را حفظ کند؟
answer: Quad9
wrong_answers:
  - گوگل DNS
  - DHCP
  - اس‌ام‌تی‌پی
explanation: |
  Quad9 یک سرور DNS عمومی با تمرکز بر حریم خصوصی است که دامنه‌های مخرب را فیلتر کرده و هیچ لاگ نامی ذخیره نمی‌کند.
reviewed: false
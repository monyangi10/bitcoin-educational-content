question: Koji servis zamenjuje DNS provajdera kako bi zaštitio poverljivost web zahteva?
answer: Quad9
wrong_answers:
  - Google DNS
  - DHCP
  - SMTP
explanation: |
  Quad9 je javni DNS server fokusiran na privatnost, koji filtrira zlonamerne domene i ne čuva nominativne logove (logove sa imenima domena).
reviewed: true

question: Ni iyihe serivisi isubirira ISP DNS kugira ngo ikingire ibanga ry’ivyo usaba ku rubuga?
answer: Quad9
wrong_answers:
  - Google DNS
  - DHCP
  - SMTP
explanation: |
  Quad9 ni seriveri ya DNS ya rusangi yibanda ku buzima bw’ibanga, iyungurura ivyicaro (domains) bibi kandi nta nyandiko z’amazina izigama.
reviewed: true

question: वेब अनुरोधों की गोपनीयता की सुरक्षा के लिए कौन सी सेवा ISP DNS का स्थान लेती है?
answer: क्वाड9
wrong_answers:
  - गूगल डीएनएस
  - डीएचसीपी
  - एसएमटीपी
explanation: |
  क्वाड9 एक गोपनीयता-केंद्रित सार्वजनिक DNS सर्वर है, जो दुर्भावनापूर्ण डोमेन को फ़िल्टर करता है और कोई नामांकित लॉग नहीं रखता है।
reviewed: false
question: Коя услуга замества DNS на ISP, за да защити поверителността на уеб заявките?
answer: Quad9
wrong_answers:
  - Google DNS
  - DHCP
  - SMTP
explanation: |
  Quad9 е публичен DNS сървър с фокус върху неприкосновеността на личния живот, който филтрира злонамерени домейни и не съхранява номинални записи.
reviewed: false
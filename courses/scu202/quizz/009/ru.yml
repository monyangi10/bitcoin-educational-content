question: Какова основная роль операционной системы?
answer: Посредник между оборудованием, пользователем и приложениями
wrong_answers:
  - Интегрированный антивирус
  - Графическое программное обеспечение
  - Сервер мгновенного обмена сообщениями
explanation: |
  Операционная система выступает в качестве центрального программного обеспечения Layer, которое позволяет приложениям и пользователю получать доступ к оборудованию и управлять им.

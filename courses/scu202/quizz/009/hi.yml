question: ऑपरेटिंग सिस्टम की मुख्य भूमिका क्या है?
answer: हार्डवेयर, उपयोगकर्ता और अनुप्रयोगों के बीच मध्यस्थ
wrong_answers:
  - एकीकृत एंटीवायरस
  - ग्राफिक्स सॉफ्टवेयर
  - त्वरित संदेश सर्वर
explanation: |
  ऑपरेटिंग सिस्टम एक केंद्रीय सॉफ्टवेयर Layer के रूप में कार्य करता है जो अनुप्रयोगों और उपयोगकर्ता को हार्डवेयर तक पहुंचने और उसे नियंत्रित करने में सक्षम बनाता है।

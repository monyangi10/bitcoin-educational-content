question: บทบาทหลักของระบบปฏิบัติการคืออะไร?
answer: ตัวกลางระหว่างฮาร์ดแวร์ ผู้ใช้ และแอปพลิเคชัน
wrong_answers:
  - แอนติไวรัสแบบบูรณาการ
  - ซอฟต์แวร์กราฟิก
  - เซิร์ฟเวอร์ส่งข้อความโต้ตอบแบบทันที
explanation: |
  ระบบปฏิบัติการทำหน้าที่เป็นชั้นซอฟต์แวร์กลางที่ช่วยให้แอปพลิเคชันและผู้ใช้สามารถเข้าถึงและควบคุมฮาร์ดแวร์ได้
reviewed: false
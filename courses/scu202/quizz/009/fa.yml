question: نقش اصلی سیستم عامل چیست؟
answer: واسطه بین سخت‌افزار، کاربر و برنامه‌ها
wrong_answers:
  - آنتی‌ویروس یکپارچه
  - نرم‌افزار گرافیکی
  - سرور پیام‌رسان فوری
explanation: |
  سیستم عامل به عنوان یک نرم‌افزار مرکزی Layer عمل می‌کند که به برنامه‌ها و کاربر امکان دسترسی و کنترل سخت‌افزار را می‌دهد.

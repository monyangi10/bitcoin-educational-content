question: Каква е основната роля на операционната система?
answer: Посредник между хардуера, потребителя и приложенията
wrong_answers:
  - Интегрирана антивирусна програма
  - Графичен софтуер
  - Сървър за незабавни съобщения
explanation: |
  Операционната система действа като централен софтуерен слой, който позволява на приложенията и на потребителя да имат достъп до хардуера и да го управляват.
reviewed: false
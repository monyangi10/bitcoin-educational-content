question: Какое устройство служит границей между Интернетом и вашей частной домашней сетью?
answer: Модем-маршрутизатор
wrong_answers:
  - Коммутатор Ethernet
  - NAS-сервер
  - USB-концентратор
explanation: |
  Модем-маршрутизатор соединяет сеть провайдера с вашей локальной сетью и управляет распределением локальных IP-адресов.
reviewed: false
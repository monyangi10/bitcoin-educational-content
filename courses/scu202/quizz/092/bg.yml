question: Кое устройство представлява границата между интернет и частната домашна мрежа?
answer: Модем-маршрутизатор
wrong_answers:
  - Ethernet комутатор
  - NAS сървър
  - USB хъб
explanation: |
  Модемният маршрутизатор свързва мрежата на интернет доставчика с вашата локална мрежа и управлява разпределянето на локалните IP адреси.
reviewed: false
question: อุปกรณ์ใดทำหน้าที่เป็นขอบเขตระหว่างอินเทอร์เน็ตและเครือข่ายภายในบ้านของคุณ?
answer: โมเด็ม-เราเตอร์
wrong_answers:
  - สวิตช์อีเธอร์เน็ต
  - เซิร์ฟเวอร์ NAS
  - ฮับ USB
explanation: |
  โมเด็มเราเตอร์เชื่อมต่อเครือข่าย ISP กับเครือข่ายท้องถิ่นของคุณและจัดการการจัดสรรที่อยู่ IP ท้องถิ่น
reviewed: false
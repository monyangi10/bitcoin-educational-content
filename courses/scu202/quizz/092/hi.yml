question: कौन सा उपकरण इंटरनेट और आपके निजी घरेलू नेटवर्क के बीच सीमा का काम करता है?
answer: मॉडेम-राउटर
wrong_answers:
  - ईथरनेट स्विच
  - NAS सर्वर
  - यूएसबी हब
explanation: |
  मॉडेम राउटर ISP नेटवर्क को आपके स्थानीय नेटवर्क से जोड़ता है और स्थानीय IP पतों के आवंटन का प्रबंधन करता है।
reviewed: false
question: Какой инструмент может анализировать безопасность системы на Linux-машине и предоставлять подробный отчет с рекомендациями?
answer: Линис
wrong_answers:
  - GIMP
  - ufw
  - Синаптический
explanation: |
  Lynis - это комплексный инструмент аудита безопасности для Linux, который сканирует систему на наличие уязвимостей и неправильных конфигураций.
reviewed: false
question: บนเครื่อง Linux เครื่องมือใดที่สามารถวิเคราะห์ความปลอดภัยของระบบและ generate รายงานรายละเอียดพร้อมคำแนะนำ?
answer: Lynis
wrong_answers:
  - GIMP
  - ufw
  - ซินแนปติก
explanation: |
  Lynis เป็นเครื่องมือการตรวจสอบความปลอดภัยที่ครอบคลุมสำหรับ Linux ซึ่งสแกนระบบเพื่อหาช่องโหว่และการกำหนดค่าที่ผิดพลาด
reviewed: false
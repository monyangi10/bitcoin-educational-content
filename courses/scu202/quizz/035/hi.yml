question: लिनक्स मशीन पर, कौन सा टूल सिस्टम सुरक्षा का विश्लेषण कर सकता है और सिफारिशों के साथ एक विस्तृत रिपोर्ट generate बना सकता है?
answer: लिनिस
wrong_answers:
  - तार से पुष्ट किया हुआ फ़ीता
  - यूएफडब्ल्यू
  - synaptic
explanation: |
  लिनिस लिनक्स के लिए एक व्यापक सुरक्षा ऑडिटिंग टूल है, जो सिस्टम को कमजोरियों और गलत कॉन्फ़िगरेशन के लिए स्कैन करता है।
reviewed: false
question: Кой инструмент може да анализира сигурността на системата в машина с Linux и да изготви подробен доклад с препоръки?
answer: Lynis
wrong_answers:
  - GIMP
  - ufw
  - Синаптичен
explanation: |
  Lynis е цялостен инструмент за одит на сигурността за Linux, който сканира системата за уязвимости и неправилни конфигурации.
reviewed: false
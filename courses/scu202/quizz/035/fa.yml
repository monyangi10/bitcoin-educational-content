question: در یک ماشین لینوکس، کدام ابزار می‌تواند امنیت سیستم را تحلیل کرده و یک گزارش دقیق با توصیه‌ها ارائه دهد؟
answer: لینیس
wrong_answers:
  - GIMP
  - ufw
  - سیناپتیک
explanation: |
  Lynis یک ابزار جامع حسابرسی امنیتی برای لینوکس است که سیستم را برای آسیب‌پذیری‌ها و پیکربندی‌های نادرست اسکن می‌کند.
reviewed: false
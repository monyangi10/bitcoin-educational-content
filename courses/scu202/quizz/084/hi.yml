question: गुमनामी के मामले में सिग्नल की मुख्य खामी क्या है?
answer: इसके लिए एक टेलीफोन नंबर का उपयोग आवश्यक है
wrong_answers:
  - यह खुला स्रोत नहीं है
  - यह संदेशों को एक केंद्रीय सर्वर पर संग्रहीत करता है
  - यह एक्सचेंज की गई फ़ाइलों को एन्क्रिप्ट नहीं करता है
explanation: |
  सिग्नल को पंजीकृत करने के लिए एक फोन नंबर की आवश्यकता होती है, जिससे संभावित ट्रेसेबिलिटी उत्पन्न होती है, हालांकि प्रोटोकॉल मजबूत एन्क्रिप्शन सुनिश्चित करता है।

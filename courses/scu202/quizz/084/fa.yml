question: نقص اصلی سیگنال در زمینه ناشناس بودن چیست؟
answer: این نیاز به استفاده از یک شماره تلفن دارد
wrong_answers:
  - این متن متن‌باز نیست
  - پیام‌ها را روی یک سرور مرکزی ذخیره می‌کند
  - این فایل‌های مبادله شده را رمزگذاری نمی‌کند
explanation: |
  سیگنال برای ثبت‌نام نیاز به شماره تلفن دارد که این امر می‌تواند ردیابی احتمالی را معرفی کند، هرچند که پروتکل رمزنگاری قوی را تضمین می‌کند.
reviewed: false
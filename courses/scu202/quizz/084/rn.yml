question: Ni igiki gikomeye Signal ifise kitagenda neza mu bijanye no kutamenyekana?
answer: Isaba uwukoresha inomero ya terefone
wrong_answers:
  - Si isoko yuguruye
  - Ibika ubutumwa kuri seriveri nyamukuru
  - Ntinyegeza amadosiye ahanahanwa
explanation: |
  Signal isaba inomero ya terefone kugira ngo umuntu yiyandikishe, ivyo bikaba bituma igira ubushobozi bwo gukurikirana naho iyo protocole ishobora gutuma habaho uburyo bukomeye bwo kunyegeza.
reviewed: true

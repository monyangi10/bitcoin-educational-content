question: Какъв е основният недостатък на Signal по отношение на анонимността?
answer: Изисква използването на телефонен номер
wrong_answers:
  - Не е с отворен код
  - Съхранява съобщения на централен сървър
  - Той не криптира обменените файлове
explanation: |
  Сигналът изисква телефонен номер, за да се регистрирате, което води до потенциална възможност за проследяване, въпреки че протоколът осигурява силно криптиране.

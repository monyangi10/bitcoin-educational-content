question: Je, ni dosari gani kuu ya Signal linapokuja suala la kutokujulikana?
answer: Inahitaji matumizi ya nambari ya simu
wrong_answers:
  - Sio chanzo wazi
  - Huhifadhi ujumbe kwenye server kuu
  - Haisimbi kwa njia fiche faili zilizobadilishwa
explanation: |
  Signal inahitaji nambari ya simu ili kusajili, ambayo huleta ufuatiliaji unaowezekana ingawa protocol inahakikisha usimbaji fiche thabiti.
reviewed: true

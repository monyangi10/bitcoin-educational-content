question: ข้อบกพร่องหลักของ Signal เมื่อพูดถึงการไม่เปิดเผยตัวตนคืออะไร?
answer: จำเป็นต้องใช้หมายเลขโทรศัพท์
wrong_answers:
  - มันไม่ใช่โอเพ่นซอร์ส
  - มันเก็บข้อความไว้บนเซิร์ฟเวอร์กลาง
  - มันไม่ได้เข้ารหัสไฟล์ที่แลกเปลี่ยน
explanation: |
  Signal ต้องการหมายเลขโทรศัพท์ในการลงทะเบียน ซึ่งอาจนำไปสู่การติดตามได้แม้ว่าพิธีสารจะรับรองการเข้ารหัสที่แข็งแกร่งก็ตาม
reviewed: false
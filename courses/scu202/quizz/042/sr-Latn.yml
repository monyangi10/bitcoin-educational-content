question: Zašto uvek treba proveriti integritet i autentičnost softvera preuzetog sa interneta?
answer: Da biste izbegli instaliranje malvera
wrong_answers:
  - Da bi se poboljšale performanse sistema
  - Da bi se uštedio propusni opseg (eng. bandwith)
  - Da biste ubrzali instalaciju
explanation: |
  Provera integriteta i autentičnosti pomaže u sprečavanju instalacije oštećenog, zaraženog ili nelegitimnog softvera.
reviewed: true

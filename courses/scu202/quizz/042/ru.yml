question: Почему нужно всегда проверять целостность и подлинность программного обеспечения, загруженного из Интернета?
answer: Чтобы избежать установки вредоносных программ
wrong_answers:
  - Для повышения производительности системы
  - Для экономии пропускной способности
  - Чтобы ускорить установку
explanation: |
  Проверка целостности и подлинности помогает предотвратить установку поврежденного, зараженного или нелегитимного программного обеспечения.
reviewed: false
question: ทำไมคุณควรตรวจสอบความสมบูรณ์และความถูกต้องของซอฟต์แวร์ที่ดาวน์โหลดจากอินเทอร์เน็ตเสมอ?
answer: เพื่อหลีกเลี่ยงการติดตั้งมัลแวร์
wrong_answers:
  - เพื่อปรับปรุงประสิทธิภาพของระบบ
  - เพื่อประหยัดแบนด์วิดท์
  - เพื่อเร่งความเร็วในการติดตั้ง
explanation: |
  การตรวจสอบความสมบูรณ์และความถูกต้องช่วยป้องกันการติดตั้งซอฟต์แวร์ที่เสียหาย ติดไวรัส หรือไม่ถูกต้องตามกฎหมาย
reviewed: false
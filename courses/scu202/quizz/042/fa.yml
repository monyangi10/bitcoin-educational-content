question: چرا باید همیشه صحت و اصالت نرم‌افزارهای دانلود شده از اینترنت را بررسی کنید؟
answer: برای جلوگیری از نصب بدافزار
wrong_answers:
  - برای بهبود عملکرد سیستم
  - برای صرفه‌جویی در پهنای باند
  - برای تسریع نصب
explanation: |
  تأیید یکپارچگی و اصالت به جلوگیری از نصب نرم‌افزارهای خراب، آلوده یا غیرقانونی کمک می‌کند.
reviewed: false
question: आपको इंटरनेट से डाउनलोड किए गए सॉफ़्टवेयर की अखंडता और प्रामाणिकता की हमेशा जांच क्यों करनी चाहिए?
answer: मैलवेयर इंस्टॉल होने से बचने के लिए
wrong_answers:
  - सिस्टम प्रदर्शन में सुधार करने के लिए
  - बैंडविड्थ बचाने के लिए
  - स्थापना में तेजी लाने के लिए
explanation: |
  अखंडता और प्रामाणिकता का सत्यापन करने से दूषित, संक्रमित या गैर-वैध सॉफ़्टवेयर की स्थापना को रोकने में मदद मिलती है।
reviewed: false
question: Защо винаги трябва да проверявате целостта и автентичността на софтуера, изтеглен от интернет?
answer: За да избегнете инсталирането на зловреден софтуер
wrong_answers:
  - Подобряване на производителността на системата
  - Спестяване на честотна лента
  - За да ускорите инсталирането
explanation: |
  Проверката на целостта и автентичността помага да се предотврати инсталирането на повреден, заразен или нелегитимен софтуер.
reviewed: false
question: स्थानीय नेटवर्क पैमाने पर DNS अनुरोधों को एन्क्रिप्ट करने के लिए किस प्रकार का प्रोटोकॉल सक्रिय किया जाना चाहिए?
answer: रवींद्र
wrong_answers:
  - एफ़टीपी
  - एसएमबीवी1
  - यूपीएनपी
explanation: |
  DoH (DNS over HTTPS) और DoT (DNS over TLS) DNS अनुरोधों को एन्क्रिप्ट करते हैं, जिससे उन्हें इंटरसेप्ट होने से रोका जा सके।
reviewed: false
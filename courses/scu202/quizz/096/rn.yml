question: Ni irihe tegeko rikwiye gukoreshwa kugira ngo umuntu ashobore kunyegeza ibisabwa vya DNS ku rugero rw’umuhora wo mu karere?
answer: DoH
wrong_answers:
  - FTP
  - SMBv1
  - UPnP
explanation: |
  DoH (DNS kuri HTTPS) na DoT (DNS kuri TLS) zinyegeza ibisabwa vya DNS, bikabuza ko umuntu ashobora kubifata nka ISP canke Leta.
reviewed: true

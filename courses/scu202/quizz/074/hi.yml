question: किस घटना ने गूगल को एंड्रॉयड को टच-सेंसिटिव Interface की ओर पुनः उन्मुख करने के लिए मजबूर किया?
answer: पहले iPhone का विमोचन
wrong_answers:
  - माइक्रोसॉफ्ट द्वारा नोकिया का अधिग्रहण
  - सायनोजेनमॉड का निर्माण
  - प्ले स्टोर का शुभारंभ
explanation: |
  2007 में आईफोन के आगमन के बाद गूगल को एंड्रॉयड पर पुनर्विचार करने के लिए मजबूर होना पड़ा, ताकि इसे टचस्क्रीन के अनुकूल बनाया जा सके, तथा भौतिक कीबोर्ड वाले डिवाइस के विचार को त्याग दिया गया।
reviewed: false
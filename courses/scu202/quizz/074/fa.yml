question: چه رویدادی گوگل را مجبور کرد تا اندروید را به سمت Interface حساس به لمس تغییر جهت دهد؟
answer: عرضه اولین آیفون
wrong_answers:
  - تصاحب مایکروسافت بر نوکیا
  - ایجاد CyanogenMod
  - راه‌اندازی فروشگاه Play
explanation: |
  ورود آیفون در سال 2007 گوگل را مجبور کرد تا اندروید را بازنگری کند تا با صفحه‌نمایش لمسی سازگار شود و ایده دستگاهی با صفحه‌کلید فیزیکی را کنار بگذارد.
reviewed: false
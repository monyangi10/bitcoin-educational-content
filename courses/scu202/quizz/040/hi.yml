question: सभी प्रणालियों पर उपलब्ध कौन सा निःशुल्क टूल किसी फ़ाइल के हस्ताक्षर और सार्वजनिक कुंजी के साथ उसके पत्राचार को सत्यापित करने के लिए इस्तेमाल किया जा सकता है?
answer: जीएनयूपीजी
wrong_answers:
  - वेराक्रिप्ट
  - OpenSSH
  - 7-ज़िप
explanation: |
  GnuPG (gpg) डिजिटल हस्ताक्षर सत्यापन और सार्वजनिक कुंजी प्रबंधन के लिए संदर्भ उपकरण है।
reviewed: false
question: Кой безплатен инструмент, достъпен за всички системи, може да се използва за проверка на подписа на даден файл и съответствието му с публичен ключ?
answer: GnuPG
wrong_answers:
  - VeraCrypt
  - OpenSSH
  - 7-Zip
explanation: |
  GnuPG (gpg) е референтният инструмент за проверка на цифров подпис и управление на публични ключове.
reviewed: false
question: چه ابزاری رایگان، که در تمامی سیستم‌ها در دسترس است، می‌تواند برای تأیید امضای یک فایل و تطابق آن با یک کلید عمومی استفاده شود؟
answer: جی‌پی‌جی
wrong_answers:
  - ورا کریپت
  - اوپن‌اس‌اس‌اچ
  - 7-Zip
explanation: |
  GnuPG (gpg) ابزار مرجع برای تأیید امضای دیجیتال و مدیریت کلید عمومی است.
reviewed: false
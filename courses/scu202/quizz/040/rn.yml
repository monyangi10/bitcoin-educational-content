question: Ni igikoresho ikihe c’ubuntu, kiboneka kuri sisiteme zose, gishobora gukoreshwa mu kugenzura umukono wa dosiye n’ivyo bihuye hakoresheje urufunguzo rwa rusange?
answer: GnuPG
wrong_answers:
  - VeraCrypt
  - OpenSSH
  - 7-Zip
explanation: |
  GnuPG (gpg) ni igikoresho co gukoresha mu kugenzura umukono w'ubuhinga bwa none no gucunga urufunguzo rwa rusange.
reviewed: true

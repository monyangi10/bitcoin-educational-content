question: Какой бесплатный инструмент, доступный на всех системах, можно использовать для проверки подписи файла и ее соответствия открытому ключу?
answer: GnuPG
wrong_answers:
  - VeraCrypt
  - OpenSSH
  - 7-Zip
explanation: |
  GnuPG (gpg) - это эталонный инструмент для проверки цифровой подписи и управления открытыми ключами.
reviewed: false
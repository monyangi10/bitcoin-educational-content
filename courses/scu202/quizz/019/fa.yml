question: توزیع لینوکس چیست؟
answer: یک سیستم‌عامل کامل ساخته شده بر اساس هسته لینوکس
wrong_answers:
  - یک مدیر بسته
  - یک محیط دسکتاپ لینوکس
  - یک اسکریپت نصب خودکار برای سیستم‌عامل لینوکس
explanation: |
  یک توزیع لینوکس هسته، ابزارهای سیستم، نرم‌افزار، بوت‌لودر و مدیریت بسته را یکپارچه می‌کند تا یک سیستم آماده به کار ارائه دهد.

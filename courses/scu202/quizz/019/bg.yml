question: Какво е дистрибуция на Linux?
answer: Пълна операционна система, изградена около ядрото на Linux
wrong_answers:
  - Мениджър на пакети
  - Работна среда на Linux
  - Автоматизиран инсталационен скрипт за операционната система Linux
explanation: |
  Дистрибуцията на Linux обединява ядрото, системните инструменти, софтуера, зареждащото устройство и управлението на пакетите, за да предостави готова за използване система.
reviewed: false
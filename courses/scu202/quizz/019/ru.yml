question: Что такое дистрибутив Linux?
answer: Полноценная операционная система, построенная на базе ядра Linux
wrong_answers:
  - Менеджер пакетов
  - Среда рабочего стола Linux
  - Сценарий автоматической установки операционной системы Linux
explanation: |
  Дистрибутив Linux объединяет ядро, системные инструменты, программное обеспечение, загрузчик и управление пакетами, чтобы предоставить готовую к использованию систему.

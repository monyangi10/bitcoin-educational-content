question: Distribution ya Linux ni iki?
answer: Sisiteme y’ikwije y’ubakiye kuri kernel ya Linux
wrong_answers:
  - Ubutunganirizo bw’amapaki
  - Ikibanza c’ibiro ca Linux
  - Inyandiko yo gushiramwo sisiteme ya Linux ata ruhara ubigizemwo
explanation: |
  Distribution ya Linux irimwo kernel, ibikoresho vya sisiteme, porogarame, bootloader n’ubutunganirizo bw’amapaki kugira ngo haboneke sisiteme iteguriwe gukoreshwa.
reviewed: true

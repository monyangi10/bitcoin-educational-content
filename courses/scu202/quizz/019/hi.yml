question: लिनक्स वितरण क्या है?
answer: लिनक्स कर्नेल के इर्द-गिर्द निर्मित एक संपूर्ण ऑपरेटिंग सिस्टम
wrong_answers:
  - एक पैकेज प्रबंधक
  - एक लिनक्स डेस्कटॉप वातावरण
  - लिनक्स ऑपरेटिंग सिस्टम के लिए एक स्वचालित इंस्टॉलेशन स्क्रिप्ट
explanation: |
  लिनक्स वितरण कर्नेल, सिस्टम टूल्स, सॉफ्टवेयर, बूटलोडर और पैकेज प्रबंधन को एकीकृत करके उपयोग के लिए तैयार सिस्टम प्रदान करता है।
reviewed: false
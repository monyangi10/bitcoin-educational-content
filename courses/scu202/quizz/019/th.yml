question: ลีนุกซ์ดิสทริบิวชันคืออะไร?
answer: ระบบปฏิบัติการที่สมบูรณ์ซึ่งสร้างขึ้นรอบเคอร์เนลของลินุกซ์
wrong_answers:
  - ตัวจัดการแพ็กเกจ
  - สภาพแวดล้อมเดสก์ท็อป Linux
  - สคริปต์การติดตั้งอัตโนมัติสำหรับระบบปฏิบัติการ Linux
explanation: |
  การแจกจ่ายลินุกซ์รวมเคอร์เนล, เครื่องมือระบบ, ซอฟต์แวร์, บูตโหลดเดอร์ และการจัดการแพ็กเกจเพื่อให้ระบบพร้อมใช้งาน
reviewed: false
question: Какое правило резервного копирования рекомендуется для обеспечения устойчивости данных в случае катастрофы?
answer: Иметь 3 копии на 2 разных носителях, в том числе 1 за пределами сайта
wrong_answers:
  - 10 копий, на 5 различных носителях, включая 3 вне сайта
  - 2 копии на 2 разных носителях, 2 из которых вне сайта
  - 4 копии, на 4 различных носителях, включая 2 вне сайта
explanation: |
  Правило 3-2-1 предполагает хранение трех копий данных как минимум на двух разных носителях, включая один, расположенный вне офиса, для защиты от потери, кражи или повреждения данных.
reviewed: false
question: قانون پشتیبان‌گیری توصیه‌شده برای اطمینان از مقاومت داده‌های شما در صورت وقوع یک فاجعه چیست؟
answer: 3 نسخه داشته باشید، روی 2 رسانه مختلف، شامل 1 نسخه خارج از سایت
wrong_answers:
  - ۱۰ نسخه، بر روی ۵ رسانه مختلف، شامل ۳ نسخه خارج از سایت
  - ۲ نسخه، روی ۲ رسانه مختلف، که ۲ تای آن‌ها خارج از سایت باشد
  - ۴ نسخه، بر روی ۴ رسانه مختلف، شامل ۲ نسخه خارج از سایت
explanation: |
  قانون ۳-۲-۱ شامل نگهداری سه نسخه از داده‌های شما، بر روی حداقل دو رسانه مختلف، از جمله یکی در مکانی خارج از سایت، برای محافظت در برابر از دست دادن داده‌ها، سرقت یا فساد است.
reviewed: false
question: กฎการสำรองข้อมูลที่แนะนำเพื่อให้มั่นใจถึงความยืดหยุ่นของข้อมูลของคุณในกรณีที่เกิดภัยพิบัติคืออะไร?
answer: มี 3 สำเนา บนสื่อ 2 ประเภทที่แตกต่างกัน รวมถึง 1 สำเนานอกสถานที่
wrong_answers:
  - 10 ชุดสำเนา, บนสื่อ 5 ประเภทที่แตกต่างกัน, รวมถึง 3 ชุดที่อยู่นอกสถานที่
  - 2 ชุดสำเนา, บนสื่อ 2 ประเภทที่แตกต่างกัน, 2 ชุดที่อยู่นอกสถานที่
  - 4 ชุดสำเนา บนสื่อ 4 ประเภทที่แตกต่างกัน รวมถึง 2 ชุดนอกสถานที่
explanation: |
  กฎ 3-2-1 เกี่ยวข้องกับการเก็บสำรองข้อมูลสามชุด โดยใช้สื่อที่แตกต่างกันอย่างน้อยสองชนิด รวมถึงหนึ่งชุดที่เก็บไว้นอกสถานที่ เพื่อป้องกันการสูญหาย การโจรกรรม หรือการเสียหายของข้อมูล
reviewed: false
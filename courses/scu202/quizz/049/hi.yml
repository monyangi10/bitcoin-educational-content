question: किसी आपदा की स्थिति में आपके डेटा की लचीलापन सुनिश्चित करने के लिए अनुशंसित बैकअप नियम क्या है?
answer: 3 प्रतियाँ, 2 अलग-अलग मीडिया पर, जिनमें से 1 ऑफ-साइट है
wrong_answers:
  - 10 प्रतियाँ, 5 विभिन्न माध्यमों पर, जिनमें 3 ऑफ-साइट भी शामिल हैं
  - 2 प्रतियां, 2 अलग-अलग मीडिया पर, जिनमें से 2 ऑफ-साइट
  - 4 प्रतियां, 4 अलग-अलग मीडिया पर, जिनमें 2 ऑफ-साइट शामिल हैं
explanation: |
  3-2-1 नियम में आपके डेटा की तीन प्रतियां, कम से कम दो अलग-अलग मीडिया पर, जिनमें से एक ऑफ-साइट स्थित है, बनाए रखना शामिल है, ताकि डेटा हानि, चोरी या भ्रष्टाचार से बचा जा सके।
reviewed: false
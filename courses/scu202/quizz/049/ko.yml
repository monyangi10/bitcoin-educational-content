question: 재해 발생 시 데이터의 복원력을 보장하기 위한 권장 백업 규칙은 무엇인가요?
answer: 오프사이트 1부를 포함하여 서로 다른 2개의 미디어에 3부를 준비합니다
wrong_answers:
  - 5가지 미디어에 10부, 오프사이트 3부 포함
  - 서로 다른 미디어에 2부씩, 2부는 외부에 보관합니다
  - 4부, 4가지 미디어에 4부(오프사이트 2부 포함)
explanation: |
  3-2-1 규칙은 데이터 손실, 도난 또는 손상을 방지하기 위해 외부에 있는 미디어를 포함하여 최소 2개의 서로 다른 미디어에 데이터 사본을 3개 보관하는 것을 포함합니다.
reviewed: false
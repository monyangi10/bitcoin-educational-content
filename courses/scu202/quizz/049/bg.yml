question: Кое е препоръчителното правило за архивиране, за да се гарантира устойчивостта на данните в случай на бедствие?
answer: Имате 3 копия на 2 различни носителя, включително 1 извън сайта
wrong_answers:
  - 10 копия на 5 различни носителя, включително 3 извън сайта
  - 2 копия на 2 различни носителя, 2 от които извън сайта
  - 4 копия, на 4 различни носителя, включително 2 извън сайта
explanation: |
  Правилото 3-2-1 включва поддържането на три копия на данните на поне два различни носителя, включително един, разположен извън сайта, за да се предпазите от загуба, кражба или повреда на данните.
reviewed: false
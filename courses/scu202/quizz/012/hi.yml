question: "ओपन सोर्स" शब्द को बढ़ावा देने के लिए 1998 में किस संगठन की स्थापना की गई थी?
answer: ओपन सोर्स इनिशिएटिव (OSI)
wrong_answers:
  - फ्री सॉफ्टवेयर फाउंडेशन (FSF)
  - डेबियन परियोजना
  - मोज़िला फाउंडेशन
explanation: |
  ओएसआई का निर्माण मुक्त सॉफ्टवेयर दर्शन से अलग, कोड खुलेपन के व्यावहारिक, तकनीकी पहलू पर जोर देने के लिए किया गया था।
reviewed: false
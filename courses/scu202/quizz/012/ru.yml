question: Какая организация была основана в 1998 году для продвижения термина "открытый исходный код"?
answer: Инициатива по открытому исходному коду (OSI)
wrong_answers:
  - Фонд свободного программного обеспечения (FSF)
  - Проект Debian
  - Фонд Mozilla
explanation: |
  OSI была создана, чтобы подчеркнуть прагматический, технический аспект открытости кода, в отличие от философии свободного программного обеспечения.
reviewed: false
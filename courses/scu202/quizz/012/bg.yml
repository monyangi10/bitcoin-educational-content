question: Коя организация е основана през 1998 г., за да популяризира термина "отворен код"?
answer: Инициатива за отворен код (OSI)
wrong_answers:
  - Фондация за свободен софтуер (ФСС)
  - Проект Дебиан
  - Фондация Mozilla
explanation: |
  OSI е създаден, за да подчертае прагматичния, технически аспект на отвореността на кода, за разлика от философията на свободния софтуер.
reviewed: false
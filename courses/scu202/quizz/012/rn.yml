question: Ni irihe shirahamwe ryashinzwe mu 1998 kugira ngo ritere imbere ijambo open source?
answer: Igikorwa c'inkomoko yuguruye (OSI)
wrong_answers:
  - Ishirahamwe rya porogaramu z'ubuntu (FSF)
  - Umugambi wa Debian
  - Ishirahamwe rya Mozilla
explanation: |
  OSI yaremewe gushimika ku bijanye n’ubuhinga, ubuhinga bwo gufungura kode, nk’uko bitandukanye n’ubuhinga bwa porogarama y’ubuntu.
reviewed: false
question: Ni ikihe kigo cashinzwe mu 1998 kugira ngo giteze imbere ijambo open source?
answer: Open Source Initiative (OSI)
wrong_answers:
  - Free Software Foundation (FSF)
  - Debian Project
  - Mozilla Foundation
explanation: |
  OSI yaremewe gushimika ku bijanye, n’ubuhinga bwo kwugururira kode bose, nk’uko bitandukanye n’ubuhinga bwa porogarame z’ubuntu.
reviewed: true

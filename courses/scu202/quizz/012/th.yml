question: องค์กรใดก่อตั้งขึ้นในปี 1998 เพื่อส่งเสริมคำว่าโอเพ่นซอร์ส?
answer: โอเพ่นซอร์สอินิชิเอทีฟ (OSI)
wrong_answers:
  - มูลนิธิซอฟต์แวร์เสรี (FSF)
  - Debian Project
  - มูลนิธิ Mozilla
explanation: |
  OSI ถูกสร้างขึ้นเพื่อเน้นย้ำถึงแง่มุมทางเทคนิคและปฏิบัติของการเปิดเผยโค้ด ซึ่งแตกต่างจากปรัชญาซอฟต์แวร์เสรี
reviewed: false
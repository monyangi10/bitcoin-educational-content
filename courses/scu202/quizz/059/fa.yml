question: چه کسی شبکه جهانی وب را اختراع کرد و اولین مرورگر وب را توسعه داد؟
answer: تیم برنرز-لی
wrong_answers:
  - مارک آندریسن
  - جیم کلارک
  - برندان آیک
explanation: |
  تیم برنرز-لی مخترع شبکه جهانی وب است و اولین مرورگر، WorldWideWeb (که اکنون Nexus نامیده می‌شود) را در سال 1990 توسعه داد.
reviewed: false
question: ใครเป็นผู้คิดค้นเวิลด์ไวด์เว็บและพัฒนาเว็บเบราว์เซอร์ตัวแรก?
answer: ทิม เบอร์เนิร์ส-ลี
wrong_answers:
  - มาร์ก อันเดรสเซน
  - จิม คลาร์ก
  - เบรนแดน ไอค์
explanation: |
  ทิม เบอร์เนิร์ส-ลี เป็นผู้คิดค้นเวิลด์ไวด์เว็บและพัฒนาเบราว์เซอร์ตัวแรกชื่อ WorldWideWeb (ปัจจุบันคือ Nexus) ในปี 1990
reviewed: false
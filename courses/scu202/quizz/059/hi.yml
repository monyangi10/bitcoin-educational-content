question: वर्ल्ड वाइड वेब का आविष्कार किसने किया और पहला वेब ब्राउज़र किसने विकसित किया?
answer: टिक बैरनर्स - ली
wrong_answers:
  - मार्क आंद्रेसेन
  - जिम क्लार्क
  - ब्रेंडन आइच
explanation: |
  टिम बर्नर्स-ली वर्ल्ड वाइड वेब के आविष्कारक हैं और उन्होंने 1990 में पहला ब्राउज़र, वर्ल्ड वाइड वेब (अब नेक्सस) विकसित किया था।
reviewed: false
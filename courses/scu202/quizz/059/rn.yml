question: Ni nde yahinguye World Wide Web ( urubuga rwo kw’isi yose) maze akarema mucukumbuzi ya mbere?
answer: Tim Berners-Lee
wrong_answers:
  - Marc Andreessen
  - Jim Clark
  - Brendan Eich
explanation: |
  Tim Berners-Lee niwe yahinguye World Wide Web kandi yateguye mucukumbuzi ya mbere, WorldWideWeb (now Nexus), mu 1990.
reviewed: true

question: Кто изобрел Всемирную паутину и разработал самый первый веб-браузер?
answer: Тим Бернерс-Ли
wrong_answers:
  - Марк Андреессен
  - Джим Кларк
  - Брендан Эйх
explanation: |
  Тим Бернерс-Ли - изобретатель Всемирной паутины, создатель первого браузера WorldWideWeb (ныне Nexus) в 1990 году.

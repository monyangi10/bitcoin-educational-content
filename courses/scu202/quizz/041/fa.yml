question: چه سندی، که اغلب به عنوان SHA256SUMS یا MANIFEST شناخته می‌شود، برای تأیید صحت نرم‌افزار دانلود شده مورد نیاز است؟
answer: فایلی که ردپای نرم‌افزار را فهرست می‌کند
wrong_answers:
  - دفترچه راهنمای کاربر
  - فهرست فایل امضاهای توسعه‌دهندگان
  - کد منبع کامل پروژه
explanation: |
  فایل manifest یا SHA256SUMS شامل Hash هر فایل توزیع‌شده توسط پروژه است و امکان تأیید یکپارچگی آن‌ها را فراهم می‌کند.
reviewed: false
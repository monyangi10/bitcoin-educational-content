question: डाउनलोड किए गए सॉफ़्टवेयर की अखंडता को सत्यापित करने के लिए अक्सर SHA256SUMS या MANIFEST नामक कौन सा दस्तावेज़ आवश्यक होता है?
answer: सॉफ़्टवेयर फ़ुटप्रिंट्स को सूचीबद्ध करने वाली फ़ाइल
wrong_answers:
  - उपयोगकर्ता पुस्तिका
  - डेवलपर्स के हस्ताक्षरों को सूचीबद्ध करने वाली फ़ाइल
  - संपूर्ण परियोजना स्रोत कोड
explanation: |
  मैनिफ़ेस्ट या SHA256SUMS फ़ाइल में परियोजना द्वारा वितरित प्रत्येक फ़ाइल का Hash होता है, तथा उनकी अखंडता को सत्यापित करने में सक्षम बनाता है।
reviewed: false
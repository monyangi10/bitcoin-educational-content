question: Какъв документ, често наричан SHA256SUMS или MANIFEST, е необходим за проверка на целостта на изтегления софтуер?
answer: Файлът със списъка на софтуерните отпечатъци
wrong_answers:
  - Ръководство за потребителя
  - Файлът с подписите на разработчиците
  - Пълният изходен код на проекта
explanation: |
  Файлът манифест или SHA256SUMS съдържа Hash на всеки файл, разпространяван от проекта, и позволява да се провери тяхната цялост.
reviewed: false
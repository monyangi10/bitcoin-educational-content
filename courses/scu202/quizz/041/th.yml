question: เอกสารใดที่มักเรียกว่า SHA256SUMS หรือ MANIFEST ซึ่งจำเป็นสำหรับการตรวจสอบความสมบูรณ์ของซอฟต์แวร์ที่ดาวน์โหลด?
answer: ไฟล์ที่แสดงรายการรอยเท้าของซอฟต์แวร์
wrong_answers:
  - คู่มือผู้ใช้
  - รายชื่อไฟล์ลายเซ็นของนักพัฒนา
  - ซอร์สโค้ดโครงการทั้งหมด
explanation: |
  ไฟล์ manifest หรือ SHA256SUMS ประกอบด้วย Hash ของแต่ละไฟล์ที่แจกจ่ายโดยโครงการ และช่วยให้สามารถตรวจสอบความสมบูรณ์ของไฟล์ได้
reviewed: false
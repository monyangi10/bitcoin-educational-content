question: Какой документ, часто называемый SHA256SUMS или MANIFEST, необходим для проверки целостности загруженного программного обеспечения?
answer: Файл со списком следов программного обеспечения
wrong_answers:
  - Руководство пользователя
  - Файл с подписями разработчиков
  - Полный исходный код проекта
explanation: |
  Манифест или файл SHA256SUMS содержит Hash каждого файла, распространяемого проектом, и позволяет проверить их целостность.
reviewed: false
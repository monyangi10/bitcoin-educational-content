question: โหมดการท่องเว็บแบบส่วนตัวคืออะไร?
answer: มันจำกัดการบันทึกร่องรอยในท้องถิ่น
wrong_answers:
  - มันทำให้การท่องอินเทอร์เน็ตเป็นแบบไม่ระบุตัวตน
  - บล็อกตัวติดตามและสคริปต์ที่เป็นอันตรายทั้งหมด
  - มันลบส่วนขยายที่ใช้งานอยู่
explanation: |
  โหมดส่วนตัวเพียงแค่ป้องกันการบันทึกประวัติและคุกกี้ในเครื่อง แต่ไม่ได้รับประกันความไม่เปิดเผยตัวตนบนอินเทอร์เน็ต
reviewed: false
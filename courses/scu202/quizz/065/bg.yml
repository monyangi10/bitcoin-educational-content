question: Кое твърдение описва най-добре режима на частно сърфиране?
answer: Тя ограничава записването на локални следи
wrong_answers:
  - Това прави сърфирането в интернет анонимно
  - Блокира всички злонамерени тракери и скриптове
  - Той изтрива активните разширения
explanation: |
  Частният режим просто предотвратява локалното записване на историята и бисквитките, но не гарантира анонимност в интернет.
reviewed: false
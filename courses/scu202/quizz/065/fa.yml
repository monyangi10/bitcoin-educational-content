question: کدام عبارت بهترین توصیف از حالت مرور خصوصی را ارائه می‌دهد؟
answer: این ضبط ردپاهای محلی را محدود می‌کند
wrong_answers:
  - اینترنت گردی را ناشناس می‌کند
  - تمام ردیاب‌ها و اسکریپت‌های مخرب را مسدود می‌کند
  - این برنامه افزونه‌های فعال را حذف می‌کند
explanation: |
  حالت خصوصی به سادگی از ثبت محلی تاریخچه و کوکی‌ها جلوگیری می‌کند، اما ناشناس بودن در اینترنت را تضمین نمی‌کند.
reviewed: false
question: Какое утверждение лучше всего описывает режим частного просмотра?
answer: Он ограничивает запись локальных следов
wrong_answers:
  - Это делает интернет-серфинг анонимным
  - Блокирует все вредоносные трекеры и скрипты
  - Он удаляет активные расширения
explanation: |
  Приватный режим просто предотвращает локальное протоколирование истории и файлов cookie, но не гарантирует анонимность в Интернете.

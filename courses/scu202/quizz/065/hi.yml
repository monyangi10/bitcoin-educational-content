question: कौन सा कथन निजी ब्राउज़िंग मोड का सबसे अच्छा वर्णन करता है?
answer: यह स्थानीय निशानों की रिकॉर्डिंग को सीमित करता है
wrong_answers:
  - यह इंटरनेट पर सर्फिंग को गुमनाम बनाता है
  - सभी दुर्भावनापूर्ण ट्रैकर्स और स्क्रिप्ट को ब्लॉक करता है
  - यह सक्रिय एक्सटेंशन हटा देता है
explanation: |
  निजी मोड केवल इतिहास और कुकीज़ की स्थानीय लॉगिंग को रोकता है, लेकिन इंटरनेट पर गुमनामी की गारंटी नहीं देता है।
reviewed: false
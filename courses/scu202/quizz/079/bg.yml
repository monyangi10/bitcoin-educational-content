question: Какъв е основният риск от неактуализиран смартфон?
answer: Става уязвим към известни уязвимости
wrong_answers:
  - Използва повече енергия от батерията
  - Губи връзката си с Wi-Fi
  - Става по-уязвим за фишинг
explanation: |
  Неактуализираният смартфон е изложен на публично коригирани уязвимости, които лесно могат да бъдат използвани от нападателите.
reviewed: false
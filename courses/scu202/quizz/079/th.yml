question: ความเสี่ยงหลักของสมาร์ทโฟนที่ไม่ได้อัปเดตคืออะไร?
answer: มันกลายเป็นช่องโหว่ต่อช่องโหว่ที่รู้จัก
wrong_answers:
  - มันใช้พลังงานแบตเตอรี่มากขึ้น
  - เขาสูญเสียการเชื่อมต่อ Wi-Fi ของเขา
  - มันมีความเสี่ยงต่อการถูกฟิชชิ่งมากขึ้น
explanation: |
  สมาร์ทโฟนที่ไม่ได้อัปเดตจะเสี่ยงต่อช่องโหว่ที่ได้รับการแก้ไขในที่สาธารณะ ซึ่งสามารถถูกโจมตีโดยผู้ไม่หวังดีได้อย่างง่ายดาย
reviewed: false
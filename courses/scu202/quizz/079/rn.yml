question: Ni ikihe kibazo nyamukuru gishobora guterwa na terefone ngendanwa idashirwa kugihe?
answer: Ica igira utunenge tw’umutekano ikaba ishobora gushikiriwa n’ingorane ziwi
wrong_answers:
  - Ikoresha ubushobozi bwinshi bwa bateri
  - Yatakaje Wi-Fi yiwe
  - Ica irushiriza gushikirirwa n’ububeshi bwa phishing
explanation: |
  Terefone ngendanwa idashizwe kugihe iba ifise utu nenge tuzwi dushobora gukoreshwa nabi bitagoranye n’abatera.
reviewed: true

question: Koji je glavni rizik ne ažuriranog pametnog telefona?
answer: Postaje ranjiv na poznate ranjivosti
wrong_answers:
  - Koristi više baterije
  - On gubi Wi-Fi vezu
  - Postaje podložniji phishingu
explanation: |
  Neažurirani pametni telefon izložen je javno ispravljenim ranjivostima koje napadači lako mogu iskoristiti.

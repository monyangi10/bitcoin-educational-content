question: Чем опасен необновленный смартфон?
answer: Он становится уязвимым к известным уязвимостям
wrong_answers:
  - Он потребляет больше энергии аккумулятора
  - Он теряет соединение с Wi-Fi
  - Он становится более уязвимым для фишинга
explanation: |
  Не обновленный смартфон подвержен публично исправленным уязвимостям, которые легко могут быть использованы злоумышленниками.

question: خطر اصلی یک گوشی هوشمند به‌روزرسانی‌نشده چیست؟
answer: در برابر آسیب‌پذیری‌های شناخته‌شده آسیب‌پذیر می‌شود
wrong_answers:
  - از باتری بیشتری استفاده می‌کند
  - او اتصال وای‌فای خود را از دست می‌دهد
  - در برابر فیشینگ آسیب‌پذیرتر می‌شود
explanation: |
  یک گوشی هوشمند به‌روزرسانی‌نشده در معرض آسیب‌پذیری‌های عمومی اصلاح‌شده‌ای قرار دارد که به‌راحتی می‌تواند توسط مهاجمان مورد سوءاستفاده قرار گیرد.
reviewed: false
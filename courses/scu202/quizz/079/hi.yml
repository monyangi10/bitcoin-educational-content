question: बिना अपडेट वाले स्मार्टफोन का मुख्य खतरा क्या है?
answer: यह ज्ञात कमजोरियों के प्रति संवेदनशील हो जाता है
wrong_answers:
  - यह अधिक बैटरी शक्ति का उपयोग करता है
  - उसका वाई-फाई कनेक्शन टूट जाता है
  - यह फ़िशिंग के प्रति अधिक संवेदनशील हो जाता है
explanation: |
  एक अद्यतन न किया गया स्मार्टफोन सार्वजनिक रूप से सही की गई कमजोरियों के संपर्क में रहता है, जिनका हमलावरों द्वारा आसानी से फायदा उठाया जा सकता है।

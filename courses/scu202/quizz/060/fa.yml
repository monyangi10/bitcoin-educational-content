question: کدام مرورگر متن‌باز که توسط یک سازمان غیرانتفاعی توسعه یافته است، پیشرو در استفاده از موتور Gecko است؟
answer: موزیلا فایرفاکس
wrong_answers:
  - شجاع
  - سافاری
  - کروم
explanation: |
  موزیلا فایرفاکس، توسعه‌یافته توسط بنیاد موزیلا، مرورگر پیشرو مبتنی بر Gecko است که به خاطر Commitment به حریم خصوصی شناخته شده است.
reviewed: false
question: Какой браузер с открытым исходным кодом, разработанный некоммерческой организацией, является ведущим представителем движка Gecko?
answer: Mozilla Firefox
wrong_answers:
  - Храбрец
  - Сафари
  - Хром
explanation: |
  Mozilla Firefox, разработанный Mozilla Foundation, - это ведущий браузер на базе Gecko, известный своей неприкосновенностью частной жизни.
reviewed: false
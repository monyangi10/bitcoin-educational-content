question: गैर-लाभकारी संगठन द्वारा विकसित कौन सा ओपन सोर्स ब्राउज़र, गेको इंजन का अग्रणी प्रतिपादक है?
answer: मोज़िला फ़ायरफ़ॉक्स
wrong_answers:
  - बहादुर
  - सफारी
  - क्रोम
explanation: |
  मोज़िला फाउंडेशन द्वारा विकसित मोज़िला फ़ायरफ़ॉक्स, एक अग्रणी गेको-आधारित ब्राउज़र है, जो अपनी Commitment गोपनीयता के लिए प्रसिद्ध है।
reviewed: false
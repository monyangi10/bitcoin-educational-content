question: Ni iyihe mucukumbuzi y’isoko yuguruye, yateguwe n’ishirahamwe ridaharanira inyungu, ari yo irongoye ivyerekeye moteri ya Gecko?
answer: Mozilla Firefox
wrong_answers:
  - Brave
  - Safari
  - Chrome
explanation: |
  Mozilla Firefox, yateguwe n’ishirahamwe Mozilla Foundation, ni mucukumbuzi ikoresha Gecko cane, izwi cane kubera ugushira imbere kubungabunga ubuzima bw’ibanga.
reviewed: true

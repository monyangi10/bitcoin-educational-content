question: Ni ubuhe buryo bwiza bwo gushika ku muhora wawe wo muhira mugihe utari mu karere?
answer: Gukoresha VPN y’umuntu ku giti ciwe
wrong_answers:
  - Kwugurura icambu ca SSH ya rusangi
  - Gukoresha igicu ca router
  - Koresha WPS
explanation: |
  VPN irema inzira inyegeje kugira ngo umuntu ashobore gushika ku muhora wo mu karere atarinze kushira ahabona icambu co teza ingora.
reviewed: true

question: วิธีที่ดีที่สุดในการเข้าถึงเครือข่ายภายในบ้านของคุณจากระยะไกลคืออะไร?
answer: การใช้ VPN ส่วนตัว
wrong_answers:
  - เปิดพอร์ต SSH สาธารณะ
  - เปิดใช้งานคลาวด์เราเตอร์
  - ใช้ WPS
explanation: |
  VPN สร้างอุโมงค์เข้ารหัสเพื่อเข้าถึงเครือข่ายท้องถิ่นโดยไม่เปิดเผยพอร์ตที่สำคัญต่ออินเทอร์เน็ต
reviewed: false
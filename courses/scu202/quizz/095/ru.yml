question: Как лучше всего получить удаленный доступ к домашней сети?
answer: Использование персональной VPN
wrong_answers:
  - Откройте публичный порт SSH
  - Активируйте облако маршрутизатора
  - Используйте WPS
explanation: |
  VPN создает зашифрованный туннель для доступа к локальной сети, не открывая критически важный порт для выхода в Интернет.
reviewed: false
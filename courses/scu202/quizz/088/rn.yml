question: Ni ubuhe butunganyirizo bw’ijambo ry’ibanga bw’isoko yuguruye bukurekurira kubika amakuru yawe yo kwinjira mukarere (ku nyabwonko) bitagombereye igicu(cloud)?
answer: KeePassDX
wrong_answers:
  - LastPass
  - NordPass
  - Google Password Manager
explanation: |
  KeePassDX ikora ishingiye ku madosiye yo mu karere yanyegejwe, ata nkenerwa y’igicu (cloud) canke kwiyandikisha ku ma serivisi ahuriweko.
reviewed: true

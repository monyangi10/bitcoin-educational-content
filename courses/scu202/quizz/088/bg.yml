question: Кой мениджър на пароли с отворен код ви позволява да съхранявате данните си локално, без да се нуждаете от облак?
answer: KeePassDX
wrong_answers:
  - LastPass
  - NordPass
  - Мениджър на пароли в Google
explanation: |
  KeePassDX работи на базата на криптирани локални файлове, без да има нужда от облак или абонамент за централизирана услуга.
reviewed: false
question: Koji menadžer lozinki otvorenog koda vam omogućava da čuvate svoje kredencijale lokalno bez potrebe za cloud-om?
answer: KeePassDX
wrong_answers:
  - LastPass
  - NordPass
  - Google Menadžer Lozinki
explanation: |
  KeePassDX radi na osnovu šifrovanih lokalnih fajlova, bez potrebe za cloud-om ili pretplatom na centralizovanu uslugu.
reviewed: true

question: कौन सा ओपन-सोर्स पासवर्ड मैनेजर आपको क्लाउड की आवश्यकता के बिना अपने क्रेडेंशियल्स को स्थानीय रूप से संग्रहीत करने की सुविधा देता है?
answer: कीपासडीएक्स
wrong_answers:
  - लास्ट पास
  - नॉर्डपास
  - गूगल पासवर्ड मैनेजर
explanation: |
  KeePassDX एन्क्रिप्टेड स्थानीय फाइलों के आधार पर काम करता है, इसके लिए क्लाउड या केंद्रीकृत सेवा की सदस्यता की आवश्यकता नहीं होती।
reviewed: false
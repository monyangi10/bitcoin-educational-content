question: کدام مدیر رمز عبور متن‌باز به شما اجازه می‌دهد تا اعتبارنامه‌های خود را به صورت محلی و بدون نیاز به ابر ذخیره کنید؟
answer: KeePassDX
wrong_answers:
  - LastPass
  - نوردپس
  - مدیر گذرواژه گوگل
explanation: |
  KeePassDX بر اساس فایل‌های محلی رمزگذاری‌شده کار می‌کند، بدون نیاز به ابر یا اشتراک در یک سرویس متمرکز.
reviewed: false
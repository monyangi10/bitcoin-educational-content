question: Какой менеджер паролей с открытым исходным кодом позволяет хранить ваши учетные данные локально, без использования облака?
answer: KeePassDX
wrong_answers:
  - LastPass
  - NordPass
  - Менеджер паролей Google
explanation: |
  KeePassDX работает на основе зашифрованных локальных файлов, без необходимости использования "облака" или подписки на централизованный сервис.
reviewed: false
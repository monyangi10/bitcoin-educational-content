question: Какво е основното ограничение на Telegram по отношение на поверителността на съобщенията?
answer: По подразбиране само обменът на тайни се криптира от край до край
wrong_answers:
  - Той налага анонимна такса за регистрация
  - Тя не гарантира автентичността на получените файлове
  - Няма наличен клиент с отворен код
explanation: |
  По подразбиране съобщенията в Telegram се съхраняват на сървъри на компанията, като само тайните чатове се ползват от криптиране от край до край.
reviewed: false
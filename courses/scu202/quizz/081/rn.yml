question: Ni igiki gikomeye cane Telegram ifise mu bijanye n’ibanga ry’ubutumwa?
answer: Uguhanahana kw'ibanga gusa ni kwo gushirwa mu buryo busanzwe
wrong_answers:
  - Bitegeka amahera yo kwiyandikisha atamenyekana .
  - Ntivyemeza ko amadosiye yaronse ari ay'ukuri
  - Nta mukiriya w'inkomoko yuguruye ariho
explanation: |
  Kubera ko ari vyo, ubutumwa bwa Telegram bubikwa ku ma server y’amashirahamwe, hakaba hariho gusa ibiganiro vy’ibanga vyungukira ku gupfuka amakuru kuva ku mpera kugeza ku mpera.

question: В чем заключается основное ограничение Telegram, когда речь идет о конфиденциальности сообщений?
answer: По умолчанию шифруются только секретные обмены из конца в конец
wrong_answers:
  - Он вводит анонимный регистрационный сбор
  - Он не гарантирует подлинность полученных файлов
  - Клиент с открытым исходным кодом отсутствует
explanation: |
  По умолчанию сообщения Telegram хранятся на серверах компании, а сквозное шифрование применяется только для секретных чатов.
reviewed: false
question: محدودیت اصلی تلگرام در زمینه محرمانگی پیام‌ها چیست؟
answer: فقط تبادلات محرمانه به‌طور پیش‌فرض به‌صورت انتها به انتها رمزگذاری می‌شوند.
wrong_answers:
  - این یک هزینه ثبت‌نام ناشناس اعمال می‌کند
  - این تضمین نمی‌کند که فایل‌های دریافت‌شده معتبر باشند.
  - هیچ کلاینت متن‌بازی در دسترس نیست
explanation: |
  به طور پیش‌فرض، پیام‌های تلگرام بر روی سرورهای شرکت ذخیره می‌شوند و تنها چت‌های مخفی از رمزگذاری سرتاسری بهره‌مند می‌شوند.
reviewed: false
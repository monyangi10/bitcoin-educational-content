question: संदेश गोपनीयता के मामले में टेलीग्राम की मुख्य सीमा क्या है?
answer: केवल गुप्त एक्सचेंज ही डिफ़ॉल्ट रूप से एंड-टू-एंड एन्क्रिप्टेड होते हैं
wrong_answers:
  - यह एक गुमनाम पंजीकरण शुल्क लगाता है
  - यह प्राप्त फ़ाइलों की प्रामाणिकता की गारंटी नहीं देता है
  - कोई ओपन सोर्स क्लाइंट उपलब्ध नहीं है
explanation: |
  डिफ़ॉल्ट रूप से, टेलीग्राम संदेश कंपनी के सर्वर पर संग्रहीत होते हैं, केवल गुप्त चैट को ही एंड-टू-एंड एन्क्रिप्शन का लाभ मिलता है।
reviewed: false
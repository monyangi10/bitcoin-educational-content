question: ข้อจำกัดหลักของ Telegram เมื่อพูดถึงการรักษาความลับของข้อความคืออะไร?
answer: การแลกเปลี่ยนแบบลับเท่านั้นที่ถูกเข้ารหัสแบบ end-to-end โดยค่าเริ่มต้น
wrong_answers:
  - มันกำหนดค่าธรรมเนียมการลงทะเบียนแบบไม่ระบุชื่อ
  - มันไม่ได้รับประกันความถูกต้องของไฟล์ที่ได้รับ
  - ไม่มีไคลเอนต์โอเพ่นซอร์สที่ใช้ได้
explanation: |
  ตามค่าเริ่มต้น ข้อความ Telegram จะถูกเก็บไว้บนเซิร์ฟเวอร์ของบริษัท โดยมีเพียงการแชทลับเท่านั้นที่ได้รับประโยชน์จากการเข้ารหัสแบบ end-to-end
reviewed: false
question: Какое программное обеспечение рекомендуется для прозрачных загрузок?
answer: Бесплатное программное обеспечение
wrong_answers:
  - Собственное программное обеспечение
  - Программное обеспечение в бета-версии
  - Программное обеспечение с интегрированной рекламой
explanation: |
  Программное обеспечение с открытым исходным кодом рекомендуется потому, что его код может быть проверен сообществом, что повышает безопасность и прозрачность.

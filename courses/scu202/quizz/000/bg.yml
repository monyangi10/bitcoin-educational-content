question: Какъв тип софтуер се препоръчва за прозрачни изтегляния?
answer: Безплатен софтуер
wrong_answers:
  - Собствен софтуер
  - Софтуер в бета версия
  - Софтуер с интегрирана реклама
explanation: |
  Софтуерът с отворен код се препоръчва, тъй като неговият код може да бъде одитиран от общността, което повишава сигурността и прозрачността.
reviewed: false
question: Ni ubuhe bwoko bwa porogarame uhanuriwe kuvoma muburyo buciye mu muco?
answer: Porogarame z’ubuntu
wrong_answers:
  - Porogarame y’umuntu
  - Porogarame muri verisiyo ya beta
  - Porogarame irimwo kwamamaza
explanation: |
  Porogarame zuguruye nizo ukwiriye gukoresha kuko kode zazo zishobora gusuzumwa n’abanyagihugu, bigakomeza umutekano n’ugukorera mu muco.
reviewed: true

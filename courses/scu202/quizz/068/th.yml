question: ข้อผิดพลาดด้านความปลอดภัยที่สำคัญใดที่ทำให้เกิดการรั่วไหลของข้อมูลในลักษณะโดมิโน?
answer: การใช้รหัสผ่านเดียวกันซ้ำในหลายเว็บไซต์
wrong_answers:
  - การใช้ VPN สาธารณะ
  - ลบประวัติการเข้าชมบ่อยเกินไป
  - นำทางในโหมดข้อความ
explanation: |
  การใช้รหัสผ่านซ้ำในเว็บไซต์ต่าง ๆ ทำให้ผู้โจมตีสามารถเข้าถึงบัญชีอื่น ๆ ที่ใช้รหัสผ่านเดียวกันได้ ในกรณีที่บริการถูกละเมิด
reviewed: false
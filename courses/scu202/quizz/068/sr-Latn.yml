question: Koja ozbiljna bezbednosna greška omogućava da curenje podataka izazove domino-efekat?
answer: Ponovno korišćenje iste lozinke na više sajtova
wrong_answers:
  - Korišćenje javnog VPN-a
  - Prečesto brisanje istorije pretrage
  - Kretati se kroz sadržaj u tekstualnom režimu
explanation: |
  Ponovno korišćenje lozinke na različitim sajtovima omogućava napadaču, u slučaju kompromitovanja servisa, pristup drugim nalozima sa istom lozinkom.
reviewed: true

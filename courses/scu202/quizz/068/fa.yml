question: کدام خطای امنیتی عمده باعث می‌شود که نشت داده‌ها به اثر دومینو منجر شود؟
answer: استفاده مجدد از همان رمز عبور در سایت‌های متعدد
wrong_answers:
  - استفاده از VPN عمومی
  - حذف تاریخچه مرورگر بیش از حد اغلب
  - در حالت متنی حرکت کنید
explanation: |
  استفاده مجدد از یک رمز عبور در سایت‌های مختلف به مهاجم این امکان را می‌دهد که در صورت به خطر افتادن یک سرویس، به حساب‌های دیگر با همان رمز عبور دسترسی پیدا کند.
reviewed: false
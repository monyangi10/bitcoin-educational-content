question: कौन सी प्रमुख सुरक्षा त्रुटि डेटा लीक को डोमिनो प्रभाव के लिए उजागर करती है?
answer: एक ही पासवर्ड को कई साइटों पर दोबारा इस्तेमाल करना
wrong_answers:
  - सार्वजनिक VPN का उपयोग करना
  - ब्राउज़िंग इतिहास को बार-बार हटाना
  - टेक्स्ट मोड में नेविगेट करें
explanation: |
  विभिन्न साइटों पर एक पासवर्ड का पुनः उपयोग करने से, सेवा से समझौता होने की स्थिति में, हमलावर को उसी पासवर्ड वाले अन्य खातों तक पहुंचने की सुविधा मिल जाती है।
reviewed: false
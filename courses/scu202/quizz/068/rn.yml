question: Ni irihe kosa rikomeye ry’umutekano rituma amakuru asohoka ku ngaruka za domino?
answer: Gusubira gukoresha ijambobanga rimwe ku mbuga nyinshi
wrong_answers:
  - Gukoresha VPN ya bose
  - Gukuraho amateka yo gushakisha kenshi cane
  - Kugendera mu buryo bw'inyandiko
explanation: |
  Gusubira gukoresha ijambobanga ku mbuga zitandukanye bituma uwutera, iyo habaye uguhungabana kw’ibikorwa, ashobora gushika ku zindi konti zifise iryo jambobanga nyene.

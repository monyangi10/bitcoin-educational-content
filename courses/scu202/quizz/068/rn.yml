question: Ni irihe kosa rikomeye ry’umutekano rituma amakuru asohoka ku ngaruka za domino?
answer: Gusubira gukoresha ijambo ry’ibanga rimwe ku mbuga nyinshi
wrong_answers:
  - Gukoresha VPN ya rusange
  - Gufuta amateka y’ivyo urondera kenshi cane
  - Kurondera ku mbuga mu buryo bw’inyandiko
explanation: |
  Gusubira gukoresha ijambo ry’ibanga ku mbuga zitandukanye bituma uwutera, iyo habaye uguhungabana kwa serivisi, ashobora gushika ku zindi konti zifise iryo jambo ry’ibanga nyene.
reviewed: true

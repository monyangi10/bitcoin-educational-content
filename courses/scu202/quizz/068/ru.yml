question: Какая серьезная ошибка в системе безопасности приводит к утечке данных по эффекту домино?
answer: Использование одного и того же пароля на нескольких сайтах
wrong_answers:
  - Использование публичной VPN
  - Слишком часто удаляйте историю посещений
  - Навигация в текстовом режиме
explanation: |
  Повторное использование пароля на разных сайтах позволяет злоумышленнику в случае компрометации сервиса получить доступ к другим учетным записям с тем же паролем.
reviewed: false
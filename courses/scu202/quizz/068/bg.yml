question: Коя сериозна грешка в сигурността води до изтичане на данни и до ефекта на доминото?
answer: Повторно използване на една и съща парола в няколко сайта
wrong_answers:
  - Използване на публична VPN услуга
  - Изтриване на историята на сърфиране твърде често
  - Навигация в текстов режим
explanation: |
  Повторното използване на една парола в различни сайтове позволява на нападателя в случай на компрометиране на услугата да получи достъп до други акаунти със същата парола.
reviewed: false
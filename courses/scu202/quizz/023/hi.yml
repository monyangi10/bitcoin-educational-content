question: GNOME और Xfce द्वारा किस ग्राफिक्स टूलकिट का उपयोग किया जाता है?
answer: जीटीके
wrong_answers:
  - क्यूटी
  - टीकइंटर
  - नमूना
explanation: |
  गनोम, एक्सएफसीई, सिनामन और मेट, जीटीके पर आधारित हैं, जो लिनक्स के अंतर्गत ग्राफिकल यूजर इंटरफेस के लिए समर्पित एक सॉफ्टवेयर लाइब्रेरी है।
reviewed: false
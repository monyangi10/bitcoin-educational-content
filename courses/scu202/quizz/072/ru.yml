question: Как установить альтернативный ROM на смартфон Android?
answer: Разблокировка загрузчика
wrong_answers:
  - Создайте учетную запись Apple
  - Установка специальной SIM-карты
  - Активируйте режим разработчика на iOS
explanation: |
  Разблокировка загрузчика необходима для записи нового образа системы на смартфон Android.
reviewed: false
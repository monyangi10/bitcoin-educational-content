question: Как да инсталирам алтернативен ROM на смартфон с Android?
answer: Отключване на буутлоудъра
wrong_answers:
  - Създаване на акаунт в Apple
  - Инсталиране на специална SIM карта
  - Активиране на режима за разработчици в iOS
explanation: |
  Отключването на буутлоудъра е от съществено значение за записването на ново системно изображение на смартфон с Android.
reviewed: false
question: मैं एंड्रॉइड स्मार्टफोन पर वैकल्पिक ROM कैसे स्थापित करूं?
answer: बूटलोडर अनलॉक करना
wrong_answers:
  - एक Apple खाता बनाएँ
  - एक विशेष सिम कार्ड स्थापित करना
  - iOS पर डेवलपर मोड सक्रिय करें
explanation: |
  एंड्रॉइड स्मार्टफोन में नई सिस्टम इमेज लिखने के लिए बूटलोडर को अनलॉक करना आवश्यक है।
reviewed: false
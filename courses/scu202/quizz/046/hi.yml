question: अपने बैकअप को स्वचालित करते समय, नियमित आधार पर कौन सी आवश्यक सावधानियां बरतनी चाहिए?
answer: परीक्षण बहाली
wrong_answers:
  - अपना इंटरनेट सेवा प्रदाता बदलें
  - अवकाश बैकअप अक्षम करें
  - एन्क्रिप्शन का परीक्षण
explanation: |
  यह सुनिश्चित करने के लिए कि आवश्यकता पड़ने पर फ़ाइलें दूषित या अप्राप्य न हों, नियमित रूप से बैकअप को पुनर्स्थापित करना महत्वपूर्ण है।
reviewed: false
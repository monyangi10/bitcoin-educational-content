question: Wakati wa kufanya nakala zako kiotomatiki, ni tahadhari gani muhimu zinazopaswa kuchukuliwa mara kwa mara?
answer: Marejesho ya mtihani
wrong_answers:
  - Badilisha mtoa huduma wako wa mtandao
  - Zima nakala za likizo
  - Inajaribu usimbaji fiche
explanation: |
  Ni muhimu kurejesha nakala mara kwa mara ili kuhakikisha kuwa faili hazijaharibika au hazipatikani inapohitajika.

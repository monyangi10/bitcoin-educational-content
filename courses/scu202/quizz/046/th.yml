question: เมื่อทำการสำรองข้อมูลอัตโนมัติ มีข้อควรระวังที่จำเป็นอะไรบ้างที่ต้องทำเป็นประจำ?
answer: ทดสอบการกู้คืน
wrong_answers:
  - เปลี่ยนผู้ให้บริการอินเทอร์เน็ตของคุณ
  - ปิดการสำรองข้อมูลในช่วงวันหยุด
  - กำลังทดสอบการเข้ารหัส
explanation: |
  สิ่งสำคัญคือต้องกู้คืนข้อมูลสำรองเป็นประจำเพื่อให้แน่ใจว่าไฟล์จะไม่เสียหายหรือไม่สามารถเข้าถึงได้เมื่อจำเป็น
reviewed: false
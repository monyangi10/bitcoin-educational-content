question: کدام مرورگر متنی، بدون پشتیبانی از گرافیک Interface یا جاوااسکریپت، قدیمی‌ترین است که هنوز نگهداری می‌شود؟
answer: سیاه‌گوش
wrong_answers:
  - مرورگر Mullvad
  - پولی‌پین
  - ویوالدی
explanation: |
  Lynx، که در سال 1992 ظاهر شد، در حالت متنی عمل می‌کند، از جاوااسکریپت پشتیبانی نمی‌کند و هنوز برای اهداف بسیار خاصی استفاده می‌شود.
reviewed: false
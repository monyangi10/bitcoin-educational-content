question: Кой текстов браузър, без поддръжка на графики Interface или JavaScript, е най-старият, който все още се поддържа?
answer: Lynx
wrong_answers:
  - Браузър Mullvad
  - Полипан
  - Вивалди
explanation: |
  Lynx, който се появи през 1992 г., работи в текстов режим, не поддържа JavaScript и все още се използва за много специфични цели.

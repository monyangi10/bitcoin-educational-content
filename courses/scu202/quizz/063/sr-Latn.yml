question: Koji tekstualni pregledač, bez podrške za grafički interfejs ili JavaScript, je najstariji i koji se još uvek održava?
answer: Lynx
wrong_answers:
  - Mullvad Browser
  - Polypane
  - Vivaldi
explanation: |
  Lynx, koji se pojavio 1992. godine, radi u tekstualnom režimu, ne podržava JavaScript i još uvek se koristi za vrlo specifične svrhe.
reviewed: true

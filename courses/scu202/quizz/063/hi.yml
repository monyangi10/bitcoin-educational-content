question: कौन सा टेक्स्ट ब्राउज़र, Interface ग्राफिक्स या जावास्क्रिप्ट समर्थन के बिना, अभी भी सबसे पुराना है?
answer: बनबिलाव
wrong_answers:
  - मुल्वाड ब्राउज़र
  - पॉलीपेन
  - विवाल्डी
explanation: |
  लिंक्स, जो 1992 में आया था, टेक्स्ट मोड में काम करता है, जावास्क्रिप्ट का समर्थन नहीं करता है और अभी भी बहुत विशिष्ट उद्देश्यों के लिए उपयोग किया जाता है।
reviewed: false
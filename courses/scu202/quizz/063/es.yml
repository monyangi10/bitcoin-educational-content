question: ¿Qué navegador de texto, sin gráficos Interface ni soporte JavaScript, es el más antiguo que se mantiene?
answer: Lince
wrong_answers:
  - Navegador Mullvad
  - Polipropano
  - Vivaldi
explanation: |
  Lynx, que apareció en 1992, funciona en modo texto, no admite JavaScript y se sigue utilizando para fines muy específicos.

question: सैंडबॉक्स या वर्चुअल मशीन में एप्लिकेशन चलाने का मुख्य लाभ क्या है?
answer: समझौते के प्रभाव को सीमित करें
wrong_answers:
  - प्रोग्राम निष्पादन में तेजी लाना
  - RAM की खपत कम करें
  - नेटवर्क कनेक्शन की गति बढ़ाएँ
explanation: |
  सैंडबॉक्सिंग और वर्चुअलाइजेशन का उपयोग मुख्य रूप से अनुप्रयोगों या प्रणालियों को संभावित हमलों से अलग करने के लिए किया जाता है।
reviewed: false
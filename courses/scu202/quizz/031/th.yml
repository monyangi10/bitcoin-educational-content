question: ข้อดีหลักของการรันแอปพลิเคชันใน sandbox หรือ virtual machine คืออะไร?
answer: จำกัดผลกระทบจากการประนีประนอม
wrong_answers:
  - เร่งการดำเนินโปรแกรม
  - ลดการใช้ RAM
  - เพิ่มความเร็วในการเชื่อมต่อเครือข่าย
explanation: |
  Sandboxing และการจำลองเสมือนถูกใช้หลักๆ เพื่อแยกแอปพลิเคชันหรือระบบออกจากการโจมตีที่อาจเกิดขึ้น
reviewed: false
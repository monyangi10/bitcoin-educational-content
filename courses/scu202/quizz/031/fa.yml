question: مزیت اصلی اجرای برنامه‌ها در یک سندباکس یا ماشین مجازی چیست؟
answer: محدود کردن تأثیر یک سازش
wrong_answers:
  - اجرای برنامه را تسریع کنید
  - کاهش مصرف RAM
  - افزایش سرعت اتصال شبکه
explanation: |
  سندباکسینگ و مجازی‌سازی عمدتاً برای ایزوله کردن برنامه‌ها یا سیستم‌ها از حملات احتمالی استفاده می‌شوند.
reviewed: false
question: Кое е основното предимство на стартирането на приложения в пясъчна кутия или виртуална машина?
answer: Ограничаване на въздействието на компромиса
wrong_answers:
  - Ускоряване на изпълнението на програмата
  - Намаляване на потреблението на RAM
  - Увеличаване на скоростта на мрежовата връзка
explanation: |
  Сандбоксът и виртуализацията се използват предимно за изолиране на приложения или системи от потенциални атаки.
reviewed: false
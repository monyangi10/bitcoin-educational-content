question: कौन सा वितरण परिवार RPM पैकेज प्रबंधक का उपयोग करता है?
answer: लाल टोपी
wrong_answers:
  - डेबियन
  - मेहराब
  - स्लैकवेयर
explanation: |
  RPM प्रारूप की शुरुआत रेड हैट द्वारा की गई थी और यह फेडोरा, आरएचईएल, सेंटओएस, अल्मालिनक्स, रॉकी लिनक्स और अन्य संबंधित वितरणों का आधार है।
reviewed: false
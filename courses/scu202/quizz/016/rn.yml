question: Ni uwuhe muryango wa distribution ukoresha ubutunganirizo bw’amapaki ya RPM?
answer: Red Hat
wrong_answers:
  - Debian
  - Arch
  - Slackware
explanation: |
  Ubwoko bwa RPM bwatangujwe na Red Hat kandi nibwo shimikiro ya Fedora, RHEL, CentOS, AlmaLinux, Rocky Linux n’izindi distribution.
reviewed: true

question: ‏MicroG چیست که در CalyxOS ادغام شده است؟
answer: یک پیاده‌سازی مجدد رایگان از خدمات گوگل
wrong_answers:
  - یک مدیر مجوزها
  - یک VPN متن‌باز برای اندروید
  - آنتی‌ویروس اختصاصی گوگل
explanation: |
  مایکروG یک جایگزین متن‌باز است که به شما اجازه می‌دهد برنامه‌های وابسته به API گوگل را بدون نصب باینری‌های رسمی اجرا کنید.
reviewed: false
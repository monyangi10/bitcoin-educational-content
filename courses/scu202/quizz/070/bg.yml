question: Какво представлява MicroG, интегриран в CalyxOS?
answer: Безплатно преизпълнение на услугите на Google
wrong_answers:
  - Мениджър на разрешенията
  - VPN услуга с отворен код за Android
  - Собственият антивирус на Google
explanation: |
  MicroG е алтернатива с отворен код, която ви позволява да стартирате зависими от Google API приложения, без да инсталирате официалните двоични файлове.
reviewed: false
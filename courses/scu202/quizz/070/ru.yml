question: Что такое MicroG, интегрированный в CalyxOS?
answer: Бесплатная реализация сервисов Google
wrong_answers:
  - Менеджер разрешений
  - VPN с открытым исходным кодом для Android
  - Собственный антивирус Google
explanation: |
  MicroG - это альтернатива с открытым исходным кодом, позволяющая запускать приложения, зависящие от Google API, без установки официальных двоичных файлов.
reviewed: false
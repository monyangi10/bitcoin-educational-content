question: MicroG คืออะไร ที่ถูกรวมเข้ากับ CalyxOS?
answer: การนำบริการของ Google มาทำใหม่แบบฟรี
wrong_answers:
  - ผู้จัดการสิทธิ์
  - VPN แบบโอเพ่นซอร์สสำหรับ Android
  - โปรแกรมป้องกันไวรัสที่เป็นกรรมสิทธิ์ของ Google
explanation: |
  MicroG เป็นทางเลือกแบบโอเพ่นซอร์สที่ช่วยให้คุณสามารถใช้งานแอปพลิเคชันที่ต้องพึ่งพา Google API ได้โดยไม่ต้องติดตั้งไบนารีอย่างเป็นทางการ
reviewed: false
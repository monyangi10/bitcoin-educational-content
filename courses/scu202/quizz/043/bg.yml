question: Каква е ползата от проверката на PGP подпис върху файл Hash или софтуерен манифест?
answer: Тя гарантира, че файлът идва от официалния източник
wrong_answers:
  - Гарантира инсталиране на софтуер без грешки
  - Гарантира автоматични актуализации на програмата
  - Гарантира, че файлът е пълен и не е променян
explanation: |
  Подписът PGP, валидиран с публичния ключ на разработчика, гарантира, че удостовереният файл произхожда от оригиналния източник.
reviewed: false
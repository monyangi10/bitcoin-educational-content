question: Hash फ़ाइल या सॉफ़्टवेयर मेनिफ़ेस्ट पर PGP हस्ताक्षर सत्यापित करने का क्या लाभ है?
answer: यह गारंटी देता है कि फ़ाइल आधिकारिक स्रोत से आती है
wrong_answers:
  - बग-मुक्त सॉफ़्टवेयर इंस्टॉलेशन की गारंटी देता है
  - यह स्वचालित प्रोग्राम अपडेट की गारंटी देता है
  - यह गारंटी देता है कि फ़ाइल पूरी है और उसमें कोई बदलाव नहीं किया गया है
explanation: |
  डेवलपर की सार्वजनिक कुंजी का उपयोग करके सत्यापित पीजीपी हस्ताक्षर यह सुनिश्चित करता है कि प्रमाणीकृत फ़ाइल मूल स्रोत से आती है।
reviewed: false
question: ประโยชน์ของการตรวจสอบลายเซ็น PGP บนไฟล์ Hash หรือซอฟต์แวร์ manifest คืออะไร?
answer: มันรับประกันว่าไฟล์มาจากแหล่งที่เป็นทางการ
wrong_answers:
  - รับประกันการติดตั้งซอฟต์แวร์ที่ปราศจากข้อบกพร่อง
  - มันรับประกันการอัปเดตโปรแกรมอัตโนมัติ
  - มันรับประกันว่าไฟล์นั้นสมบูรณ์และไม่ได้ถูกแก้ไข
explanation: |
  ลายเซ็น PGP ที่ตรวจสอบโดยใช้กุญแจสาธารณะของนักพัฒนา ช่วยให้มั่นใจได้ว่าไฟล์ที่ผ่านการรับรองมาจากแหล่งที่มาเดิม
reviewed: false
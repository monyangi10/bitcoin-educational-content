question: В чем преимущество проверки подписи PGP на файле Hash или манифесте программного обеспечения?
answer: Это гарантирует, что файл получен из официального источника
wrong_answers:
  - Гарантирует установку программного обеспечения без ошибок
  - Гарантирует автоматическое обновление программ
  - Он гарантирует, что файл завершен и не был изменен
explanation: |
  Подпись PGP, подтвержденная с помощью открытого ключа разработчика, гарантирует, что аутентифицированный файл получен из первоисточника.
reviewed: false
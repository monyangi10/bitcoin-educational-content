question: مزیت تأیید امضای PGP بر روی یک فایل Hash یا مانیفست نرم‌افزار چیست؟
answer: این تضمین می‌کند که فایل از منبع رسمی می‌آید
wrong_answers:
  - نصب نرم‌افزار بدون اشکال را تضمین می‌کند
  - این به‌روزرسانی‌های خودکار برنامه را تضمین می‌کند
  - این تضمین می‌کند که فایل کامل است و تغییر نیافته است
explanation: |
  امضای PGP که با استفاده از کلید عمومی توسعه‌دهنده تأیید شده است، تضمین می‌کند که فایل تأیید شده از منبع اصلی می‌آید.
reviewed: false
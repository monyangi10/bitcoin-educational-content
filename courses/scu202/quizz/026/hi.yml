question: कौन सा कमांड किसी फ़ोल्डर की विस्तृत सामग्री, जिसमें छिपी हुई फ़ाइलें भी शामिल हैं, प्रदर्शित करता है?
answer: एलएस -लाह
wrong_answers:
  - शो-फ़ोल्डर
  - सूची-फ़ाइलें -विस्तृत
  - व्यूडायर -a
explanation: |
  "ls -lah" फाइलों और फ़ोल्डरों को विस्तार से प्रदर्शित करता है, जिसमें छिपी हुई फाइलें (डॉट से शुरू होने वाली) भी शामिल हैं।
reviewed: false
question: Koja komanda prikazuje detaljan sadržaj datateke, uključujući skrivene fajlove?
answer: ls -lah
wrong_answers:
  - show-folder
  - list-files -detailed
  - viewdir -a
explanation: |
  "ls -lah" prikazuje fajlove i foldere u detalje, uključujući skrivene fajlove (koje počinju tačkom).
reviewed: true

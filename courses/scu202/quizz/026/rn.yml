question: Ni ibwirizwa irihe ryerekana ido n’ido ry’ibirimwo mu bubiko bwa dosiye, harimwo n’amadosiye anyegejwe?
answer: ls -lah
wrong_answers:
  - show-folder
  - list-files -detailed
  - viewdir -a
explanation: |
  "ls -lah" yerekana amadosiye n’ubu biko bw’amadosiye ido n’ido, harimwo n’amadosiye anyegejwe (ayo atanguzwa n'akaburungu).
reviewed: true

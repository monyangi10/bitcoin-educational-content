question: کدام دستور محتوای دقیق یک پوشه، از جمله فایل‌های مخفی را نمایش می‌دهد؟
answer: ls -lah
wrong_answers:
  - نمایش-پوشه
  - فهرست-فایل‌ها -جزئیات
  - نمایش‌فهرست -a
explanation: |
  "ls -lah" فایل‌ها و پوشه‌ها را به‌صورت جزئیات نمایش می‌دهد، از جمله فایل‌های مخفی (که با نقطه شروع می‌شوند).
reviewed: false
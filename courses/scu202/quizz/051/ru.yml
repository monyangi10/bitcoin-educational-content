question: Какой инструмент командной строки рекомендуется использовать в Linux для удаления всех метаданных из изображения или PDF-файла?
answer: exiftool
wrong_answers:
  - блокнот
  - nanoexif
  - sudoedit
explanation: |
  exiftool - это мощный инструмент для отображения и удаления метаданных из самых разных файлов (изображений, PDF, аудио и т.д.).
reviewed: false
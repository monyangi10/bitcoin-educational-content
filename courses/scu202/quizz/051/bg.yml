question: Кой инструмент от командния ред се препоръчва за Linux, за да премахнете всички метаданни от файл с изображение или PDF файл?
answer: exiftool
wrong_answers:
  - бележник
  - nanoexif
  - sudoedit
explanation: |
  exiftool е мощен инструмент за показване и премахване на метаданни от най-различни файлове (изображения, PDF файлове, аудио файлове и др.).
reviewed: false
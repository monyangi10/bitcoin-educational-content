question: Koji alat komandne linije se preporučuje na Linux-u za uklanjanje svih metapodataka iz slike ili PDF fajla?
answer: exiftool
wrong_answers:
  - notepad
  - nanoexif
  - sudoedit
explanation: |
  exiftool je moćan alat za prikazivanje i uklanjanje metapodataka iz širokog spektra fajlova (slike, PDF-ovi, audio, itd.).
reviewed: true

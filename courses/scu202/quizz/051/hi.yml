question: लिनक्स में किसी छवि या पीडीएफ फाइल से सभी मेटाडेटा को हटाने के लिए कौन सा कमांड-लाइन टूल अनुशंसित है?
answer: एक्सिफ़टूल
wrong_answers:
  - नोटपैड
  - नैनोएक्सिफ़
  - सुडोएडिट
explanation: |
  एक्सिफटूल विभिन्न प्रकार की फाइलों (छवियां, पीडीएफ, ऑडियो, आदि) से मेटाडेटा प्रदर्शित करने और हटाने के लिए एक शक्तिशाली उपकरण है।
reviewed: false
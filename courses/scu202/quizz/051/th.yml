question: เครื่องมือบรรทัดคำสั่งที่แนะนำสำหรับ Linux เพื่อเอาข้อมูลเมตาทั้งหมดออกจากภาพหรือไฟล์ PDF คืออะไร?
answer: exiftool
wrong_answers:
  - สมุดบันทึก
  - นาโนเอ็กซิฟ
  - sudoedit
explanation: |
  exiftool เป็นเครื่องมือที่ทรงพลังสำหรับการแสดงและลบข้อมูลเมตาจากไฟล์หลากหลายประเภท (ภาพ, PDF, เสียง, ฯลฯ)
reviewed: false
question: ความแตกต่างหลักระหว่างขบวนการซอฟต์แวร์เสรีและโอเพ่นซอร์สคืออะไร?
answer: ให้ความสำคัญกับเสรีภาพหรือประสิทธิภาพทางเทคนิค
wrong_answers:
  - การใช้ภาษา C หรือภาษาแอสเซมบลี
  - การพัฒนาแอปพลิเคชันมือถือแบบเนทีฟหรือพีซี
  - การมีอยู่หรือไม่มีอยู่ของประชาคมระหว่างประเทศ
explanation: |
  ซอฟต์แวร์เสรีเกี่ยวกับเสรีภาพของผู้ใช้; โอเพ่นซอร์สเกี่ยวกับความโปร่งใสและประสิทธิภาพทางเทคนิค
reviewed: false
question: تفاوت عمده بین جنبش نرم‌افزار آزاد و منبع باز چیست؟
answer: اولویت به آزادی یا کارایی فنی داده شود
wrong_answers:
  - استفاده از زبان C یا اسمبلی
  - توسعه برنامه‌های کاربردی موبایل بومی یا PC
  - حضور یا عدم حضور جامعه بین‌المللی
explanation: |
  نرم‌افزار آزاد درباره آزادی کاربر است؛ متن‌باز درباره شفافیت و کارایی فنی است.
reviewed: false
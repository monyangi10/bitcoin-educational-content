question: Jaka jest główna różnica między ruchem wolnego oprogramowania a open source?
answer: Priorytet nadany wolności lub wydajności technicznej
wrong_answers:
  - Wykorzystanie języka C lub asemblera
  - Tworzenie aplikacji mobilnych natywnych lub na PC
  - Obecność lub nieobecność społeczności międzynarodowej
explanation: |
  Wolne oprogramowanie to wolność użytkownika; open source to przejrzystość i wydajność techniczna.
reviewed: false
question: В чем основное различие между движением за свободное программное обеспечение и открытым исходным кодом?
answer: Приоритет отдается свободе или технической эффективности
wrong_answers:
  - Использование языка C или ассемблера
  - Разработка мобильных приложений для нативных или персональных компьютеров
  - Присутствие или отсутствие международного сообщества
explanation: |
  Свободное программное обеспечение - это свобода пользователя; открытый исходный код - это прозрачность и техническая эффективность.
reviewed: false
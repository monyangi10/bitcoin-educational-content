question: Каква е основната разлика между движението за свободен софтуер и отворения код?
answer: Приоритет на свободата или техническата ефективност
wrong_answers:
  - Използване на езика C или асемблер
  - Разработване на мобилни приложения за native или PC
  - Присъствието или отсъствието на международната общност
explanation: |
  Свободният софтуер е свързан със свободата на потребителя, а отвореният код - с прозрачността и техническата ефективност.
reviewed: false
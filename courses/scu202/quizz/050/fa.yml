question: چرا فراداده‌های فایل‌های دیجیتال خطراتی برای حریم خصوصی به همراه دارند؟
answer: آن‌ها می‌توانند اطلاعات حساس را فاش کنند
wrong_answers:
  - آنها باز شدن آنتی‌ویروس را در برخی سیستم‌ها کند می‌کنند.
  - آنها از اشتراک‌گذاری فایل از طریق ایمیل جلوگیری می‌کنند.
  - آنها می‌توانند باج‌افزار میزبانی کنند
explanation: |
  فراداده ممکن است حاوی اطلاعات محرمانه‌ای باشد که هنگام باز کردن فایل قابل مشاهده نیست، مانند مختصات GPS، نام نویسنده، شناسه یا تاریخچه تغییرات، که می‌تواند بدون اطلاع شما مورد سوءاستفاده قرار گیرد.
reviewed: false
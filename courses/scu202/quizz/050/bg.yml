question: Защо метаданните на цифровите файлове представляват риск за неприкосновеността на личния живот?
answer: Могат да разкрият чувствителна информация
wrong_answers:
  - Те забавят отварянето на антивирусната програма в някои системи
  - Те предотвратяват споделянето на файлове чрез имейл
  - Те могат да бъдат хостинг на рансъмуер
explanation: |
  Метаданните могат да съдържат поверителна информация, която не е видима при отварянето на файла, например GPS координати, име на автора, идентификатор или история на модификациите, които могат да бъдат използвани без ваше знание.
reviewed: false
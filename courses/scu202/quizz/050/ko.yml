question: 디지털 파일 메타데이터가 개인정보 보호에 위험을 초래하는 이유는 무엇인가요?
answer: 민감한 정보를 노출할 수 있습니다
wrong_answers:
  - 일부 시스템에서 바이러스 백신 실행 속도가 느려집니다
  - 이메일을 통한 파일 공유를 방지합니다
  - 랜섬웨어를 호스팅할 수 있습니다
explanation: |
  메타데이터에는 GPS 좌표, 작성자 이름, 식별자 또는 수정 내역과 같이 파일을 열었을 때 보이지 않는 기밀 정보가 포함될 수 있으며, 이는 사용자 모르게 악용될 수 있습니다.
reviewed: false
question: Ni kuki metadata ya dosiye y’ubuhinga bwa none obonwa ko ari imbogamizi ku buzima bw’ibanga?
answer: metadata zirashobora kugaragaza amakuru y’agaciro.
wrong_answers:
  - zigendesha buhoro kw’uguruka kwa antivirus kuri sisiteme zimwe zimwe
  - zibuza gusangira dosiye kuri imeyiri
  - zishobora kuba zirimwo ransomware (ibitero vy’incungu)
explanation: |
  Metadata zishobora kubamwo amakuru y’ibanga ataboneka iyo dosiye yuguruwe, nk’amakuru ya GPS, izina ry’umwanditsi, akaranga canke amateka y’ivyo yahinduye, bishobora gukoreshwa ataco ubiziko.
reviewed: true

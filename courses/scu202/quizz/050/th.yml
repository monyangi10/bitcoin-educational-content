question: ทำไมข้อมูลเมตาของไฟล์ดิจิทัลจึงเป็นความเสี่ยงต่อความเป็นส่วนตัว?
answer: พวกเขาสามารถเปิดเผยข้อมูลที่ละเอียดอ่อน
wrong_answers:
  - พวกเขาทำให้การเปิดโปรแกรมป้องกันไวรัสช้าลงในบางระบบ
  - พวกเขาป้องกันการแชร์ไฟล์ผ่านอีเมล
  - พวกเขาสามารถโฮสต์แรนซัมแวร์ได้
explanation: |
  ข้อมูลเมตาอาจมีข้อมูลที่เป็นความลับซึ่งไม่สามารถมองเห็นได้เมื่อเปิดไฟล์ เช่น พิกัด GPS ชื่อผู้เขียน ตัวระบุ หรือประวัติการแก้ไข ซึ่งสามารถถูกนำไปใช้โดยที่คุณไม่รู้ตัว
reviewed: false
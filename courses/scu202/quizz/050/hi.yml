question: डिजिटल फ़ाइल मेटाडेटा गोपनीयता के लिए जोखिम क्यों उत्पन्न करता है?
answer: वे संवेदनशील जानकारी प्रकट कर सकते हैं
wrong_answers:
  - वे कुछ सिस्टम पर एंटीवायरस को खोलने की गति को धीमा कर देते हैं
  - वे ईमेल के माध्यम से फ़ाइल साझाकरण को रोकते हैं
  - वे रैनसमवेयर होस्ट कर सकते हैं
explanation: |
  मेटाडेटा में गोपनीय जानकारी हो सकती है जो फ़ाइल खोलने पर दिखाई नहीं देती, जैसे GPS निर्देशांक, लेखक का नाम, पहचानकर्ता या संशोधन इतिहास, जिसका आपकी जानकारी के बिना फायदा उठाया जा सकता है।
reviewed: false
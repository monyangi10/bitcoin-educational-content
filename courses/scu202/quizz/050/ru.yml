question: Почему метаданные цифровых файлов представляют опасность для конфиденциальности?
answer: Они могут раскрыть конфиденциальную информацию
wrong_answers:
  - Они замедляют открытие антивируса на некоторых системах
  - Они предотвращают обмен файлами по электронной почте
  - На них могут размещаться программы-вымогатели
explanation: |
  Метаданные могут содержать конфиденциальную информацию, которая не видна при открытии файла, например координаты GPS, имя автора, идентификатор или историю модификаций, которые могут быть использованы без вашего ведома.
reviewed: false
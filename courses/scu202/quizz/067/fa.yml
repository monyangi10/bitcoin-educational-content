question: هدف اصلی استفاده از VPN هنگام مرور در شبکه Wi-Fi عمومی چیست؟
answer: ترافیک بین دستگاه و سرور VPN را رمزگذاری کنید
wrong_answers:
  - اتصال اینترنت خود را ناشناس کنید
  - به‌روزرسانی‌ها را به‌صورت خودکار نصب کنید
  - generate گذرواژه‌های قوی
explanation: |
  یک VPN تمام ترافیک شبکه را رمزگذاری می‌کند و از داده‌های شما در برابر رهگیری در شبکه‌های ناامن مانند وای‌فای عمومی محافظت می‌کند.
reviewed: false
question: Какова основная цель VPN при работе в публичной сети Wi-Fi?
answer: Шифрование трафика между устройством и VPN-сервером
wrong_answers:
  - Анонимизация вашего интернет-соединения
  - Автоматическая установка обновлений
  - generate надежные пароли
explanation: |
  VPN шифрует весь сетевой трафик, защищая ваши данные от перехвата в незащищенных сетях, таких как общественный Wi-Fi.

question: วัตถุประสงค์หลักของ VPN เมื่อใช้งานเครือข่าย Wi-Fi สาธารณะคืออะไร?
answer: เข้ารหัสการรับส่งข้อมูลระหว่างอุปกรณ์และเซิร์ฟเวอร์ VPN
wrong_answers:
  - ทำให้การเชื่อมต่ออินเทอร์เน็ตของคุณไม่ระบุตัวตน
  - ติดตั้งการอัปเดตโดยอัตโนมัติ
  - สร้างรหัสผ่านที่แข็งแกร่ง
explanation: |
  VPN เข้ารหัสการรับส่งข้อมูลเครือข่ายทั้งหมด ปกป้องข้อมูลของคุณจากการถูกดักจับบนเครือข่ายที่ไม่ปลอดภัย เช่น Wi-Fi สาธารณะ
reviewed: false
question: सार्वजनिक वाई-फाई नेटवर्क पर सर्फिंग करते समय वीपीएन का मुख्य उद्देश्य क्या है?
answer: डिवाइस और VPN सर्वर के बीच ट्रैफ़िक एन्क्रिप्ट करें
wrong_answers:
  - अपने इंटरनेट कनेक्शन को गुमनाम करें
  - अपडेट स्वचालित रूप से इंस्टॉल करें
  - generate मजबूत पासवर्ड
explanation: |
  वीपीएन सभी नेटवर्क ट्रैफ़िक को एन्क्रिप्ट करता है, तथा आपके डेटा को सार्वजनिक वाई-फाई जैसे असुरक्षित नेटवर्क पर अवरोधन से बचाता है।

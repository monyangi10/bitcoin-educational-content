question: Каква е основната цел на VPN услугата при сърфиране в обществена Wi-Fi мрежа?
answer: Криптиране на трафика между устройството и VPN сървъра
wrong_answers:
  - Анонимизиране на вашата интернет връзка
  - Автоматично инсталиране на актуализации
  - Генериране на силни пароли
explanation: |
  VPN услугата криптира целия мрежов трафик, като защитава данните ви от прихващане в незащитени мрежи, като например обществени Wi-Fi мрежи.
reviewed: false
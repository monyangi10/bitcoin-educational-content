question: Koja je glavna svrha VPN-a kada surfujete javnom Wi-Fi mrežom?
answer: Enkriptujete saobraćaja između uređaja i VPN servera
wrong_answers:
  - Anonimizujete svoju internet vezu
  - Automatski instalirate ažuriranja
  - Generišete jaku lozinku
explanation: |
  VPN šifrira sav mrežni saobraćaj, štiteći vaše podatke od presretanja na nesigurnim mrežama kao što je javni Wi-Fi.
reviewed: true

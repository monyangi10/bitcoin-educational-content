question: Какой браузер предлагает блокировку рекламы и трекеров, защиту от отпечатков пальцев и основан на Chromium?
answer: Храбрец
wrong_answers:
  - Firefox
  - Тор
  - Хром
explanation: |
  Brave по умолчанию оснащен функциями блокировки рекламы, трекеров и расширенной защитой от отпечатков пальцев, и все это на базе Chromium.
reviewed: false
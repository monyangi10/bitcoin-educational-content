question: Ni iyihe mucukumbuzi itanga uburyo bwo guhagarika amatangazo n’ugukurikiranwa, ikagukingira fingerprinting kandi ikaba ishingiye kuri Chromium?
answer: Brave
wrong_answers:
  - Firefox
  - Tor
  - Chrome
explanation: |
  Brave ifise uburyo bwo guhagarika amatangazo, ikakurinda gukurikiranwa na fingerprinting, vyose bishingiye kuri Chromium.
reviewed: true

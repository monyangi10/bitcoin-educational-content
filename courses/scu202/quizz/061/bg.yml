question: Кой браузър предлага блокиране на реклами и проследяващи устройства, защита от пръстови отпечатъци и е базиран на Chromium?
answer: Brave
wrong_answers:
  - Firefox
  - Tor
  - Chrome
explanation: |
  Brave разполага с функции за блокиране на реклами, проследяващи устройства и усъвършенствана защита от пръстови отпечатъци по подразбиране, като всички те са базирани на Chromium.
reviewed: false
question: เบราว์เซอร์ใดที่มีการบล็อกโฆษณาและตัวติดตาม, การป้องกันการพิมพ์ลายนิ้วมือ และใช้พื้นฐานจาก Chromium?
answer: กล้าหาญ
wrong_answers:
  - Firefox
  - ทอร์
  - Chrome
explanation: |
  Brave มีฟีเจอร์บล็อกโฆษณา, ตัวติดตาม และการป้องกันการพิมพ์ลายนิ้วมือขั้นสูงโดยค่าเริ่มต้น ทั้งหมดนี้อิงจาก Chromium
reviewed: false
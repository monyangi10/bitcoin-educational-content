question: कौन सा ब्राउज़र विज्ञापन और ट्रैकर ब्लॉकिंग, फिंगरप्रिंटिंग सुरक्षा प्रदान करता है और क्रोमियम पर आधारित है?
answer: बहादुर
wrong_answers:
  - फ़ायरफ़ॉक्स
  - टो
  - क्रोम
explanation: |
  ब्रेव में डिफ़ॉल्ट रूप से विज्ञापन अवरोधन, ट्रैकर्स और उन्नत फिंगरप्रिंटिंग सुरक्षा की सुविधा है, जो सभी क्रोमियम पर आधारित हैं।
reviewed: false
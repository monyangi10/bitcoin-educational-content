question: บริการแผนที่ใดที่อนุญาตให้ใช้งานแบบออฟไลน์ได้อย่างสมบูรณ์และไม่มีการติดตามโฆษณา?
answer: แผนที่ออร์แกนิกส์
wrong_answers:
  - Google Maps
  - Waze
  - Citymapper
explanation: |
  Organic Maps เป็นแอปพลิเคชันโอเพนซอร์สที่อิงจาก OpenStreetMap ซึ่งทำงานแบบออฟไลน์ โดยไม่มีตัวติดตามหรือการเก็บรวบรวมข้อมูล แตกต่างจากทางเลือกที่เป็นกรรมสิทธิ์
reviewed: false
question: Коя картографска услуга позволява изцяло офлайн използване и не включва проследяване на реклами?
answer: Органични карти
wrong_answers:
  - Карти на Google
  - Waze
  - Citymapper
explanation: |
  Organic Maps е приложение с отворен код, базирано на OpenStreetMap, което работи офлайн, без проследяващи устройства или събиране на данни, за разлика от патентованите алтернативи.
reviewed: false
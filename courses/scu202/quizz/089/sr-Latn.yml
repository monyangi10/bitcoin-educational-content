question: Koja usluga mapiranja omogućava potpuno offline korišćenje i ne uključuje praćenje oglasa?
answer: Organic Maps
wrong_answers:
  - Google Maps
  - Waze
  - Citymapper
explanation: |
  Organic Maps je aplikacija otvorenog koda zasnovana na OpenStreetMap koja radi offline, bez praćenja ili prikupljanja podataka, za razliku od vlasničkih alternativa.
reviewed: false
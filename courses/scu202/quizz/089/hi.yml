question: कौन सी मैपिंग सेवा पूरी तरह से ऑफ़लाइन उपयोग की अनुमति देती है और इसमें कोई विज्ञापन ट्रैकिंग शामिल नहीं है?
answer: जैविक मानचित्र
wrong_answers:
  - गूगल मैप्स
  - वेज़
  - सिटीमैपर
explanation: |
  ऑर्गेनिक मैप्स ओपनस्ट्रीटमैप पर आधारित एक ओपन सोर्स एप्लीकेशन है, जो मालिकाना विकल्पों के विपरीत, ट्रैकर्स या डेटा संग्रह के बिना, ऑफ़लाइन काम करता है।
reviewed: false
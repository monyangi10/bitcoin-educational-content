question: Какой картографический сервис позволяет работать полностью в автономном режиме и не отслеживает рекламу?
answer: Органические карты
wrong_answers:
  - Карты Google
  - Waze
  - Citymapper
explanation: |
  Organic Maps - это приложение с открытым исходным кодом, основанное на OpenStreetMap, которое работает в автономном режиме, без трекеров и сбора данных, в отличие от проприетарных альтернатив.
reviewed: false
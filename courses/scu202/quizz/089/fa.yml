question: کدام سرویس نقشه‌برداری امکان استفاده کاملاً آفلاین را فراهم می‌کند و شامل ردیابی تبلیغاتی نمی‌شود؟
answer: نقشه‌های ارگانیک
wrong_answers:
  - گوگل مپس
  - ویز
  - سیتی‌مپپر
explanation: |
  ‏اورگانیک مپس یک برنامه متن‌باز است که بر اساس OpenStreetMap ساخته شده و به صورت آفلاین کار می‌کند، بدون ردیاب‌ها یا جمع‌آوری داده‌ها، برخلاف گزینه‌های مالکیتی.
reviewed: false
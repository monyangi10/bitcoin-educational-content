question: Коя команда може да се използва за актуализиране на всички пакети в дистрибуция на Ubuntu?
answer: sudo apt update && sudo apt upgrade
wrong_answers:
  - sudo pacman -Syu
  - sudo dnf upgrade
  - sudo update-all
explanation: |
  В Ubuntu (и Debian) командата "sudo apt update && sudo apt upgrade" синхронизира списъка с пакети и инсталира всички налични актуализации.
reviewed: false
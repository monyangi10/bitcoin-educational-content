question: ทำไมถึงควรใช้แอปพลิเคชันไฟร์วอลล์อย่าง NetGuard หรือ RethinkDNS บน Android?
answer: ควบคุมการเชื่อมต่ออินเทอร์เน็ตแต่ละรายการ
wrong_answers:
  - บันทึกข้อมูลทั้งหมดโดยอัตโนมัติ
  - ปลดบล็อกเครือข่าย Wi-Fi ทั้งหมด
  - ถอนการติดตั้งไวรัสใด ๆ
explanation: |
  แอปพลิเคชันเหล่านี้ทำหน้าที่เป็นไฟร์วอลล์ท้องถิ่น ช่วยให้สามารถบล็อกหรืออนุญาตการรับส่งข้อมูลขาออกได้ตามแต่ละแอปพลิเคชัน
reviewed: false
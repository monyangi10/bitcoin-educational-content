question: एंड्रॉइड पर नेटगार्ड या रीथिंकडीएनएस जैसे फ़ायरवॉल एप्लिकेशन का उपयोग क्यों करें?
answer: व्यक्तिगत इंटरनेट कनेक्शन नियंत्रित करें
wrong_answers:
  - सभी डेटा स्वचालित रूप से सहेजें
  - सभी वाई-फ़ाई नेटवर्क अनब्लॉक करें
  - किसी भी वायरस को अनइंस्टॉल करें
explanation: |
  ये अनुप्रयोग स्थानीय फायरवॉल के रूप में कार्य करते हैं, जिससे अनुप्रयोग-दर-अनुप्रयोग आधार पर आउटगोइंग ट्रैफिक को अवरुद्ध या अधिकृत किया जा सकता है।
reviewed: false
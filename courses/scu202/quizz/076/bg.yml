question: Защо да използвате приложение за защитна стена като NetGuard или RethinkDNS в Android?
answer: Контролиране на отделни интернет връзки
wrong_answers:
  - Автоматично запазване на всички данни
  - Деблокиране на всички Wi-Fi мрежи
  - Деинсталиране на всички вируси
explanation: |
  Тези приложения действат като локални защитни стени, като позволяват блокиране или разрешаване на изходящия трафик за всяко отделно приложение.
reviewed: false
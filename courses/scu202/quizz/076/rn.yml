question: Ni kuki ukoresha porogarama y’uruhome rw’umuriro nka NetGuard canke RethinkDNS kuri Android?
answer: Kugenzura amahuriro ya Internet y'umuntu ku giti ciwe
wrong_answers:
  - Bika amakuru yose ubwo nyene
  - Gufungura imihora yose ya Wi-Fi
  - Kuraho virusi yose
explanation: |
  Izo porogaramu zikora nk’ibihome vy’umuriro vyo mu karere, zituma uruja n’uruza rusohoka rushobora guhagarara canke kwemererwa hakurikijwe porogaramu ku yindi.

question: چرا از یک برنامه فایروال مانند NetGuard یا RethinkDNS در اندروید استفاده کنیم؟
answer: کنترل اتصالات اینترنتی فردی
wrong_answers:
  - به‌طور خودکار تمام داده‌ها را ذخیره کن
  - رفع انسداد از همه شبکه‌های وای‌فای
  - هرگونه ویروس را حذف کنید
explanation: |

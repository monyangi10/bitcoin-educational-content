question: แอปพลิเคชันโอเพ่นซอร์สใดที่แนะนำสำหรับการสแกนผลิตภัณฑ์อาหารพร้อมฐานข้อมูลที่ทำงานร่วมกัน?
answer: OpenFoodFacts
wrong_answers:
  - ยูกะ
  - Nutri-Score
  - Foodvisor
explanation: |
  OpenFoodFacts เป็นโครงการที่ฟรีและขับเคลื่อนโดยชุมชน มีความโปร่งใสเกี่ยวกับข้อมูลของตน ในขณะที่ Yuka ใช้โมเดลที่ไม่โปร่งใสและไม่ใช่โอเพนซอร์ส
reviewed: false
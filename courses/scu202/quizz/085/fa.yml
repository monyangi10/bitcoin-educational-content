question: کدام برنامه منبع باز برای اسکن محصولات غذایی با یک پایگاه داده مشارکتی توصیه می‌شود؟
answer: اوپن‌فودفکتس
wrong_answers:
  - یوکا
  - نوتری-اسکور
  - فودوایزر
explanation: |
  OpenFoodFacts یک پروژه رایگان مبتنی بر جامعه است که درباره داده‌های خود شفافیت دارد، در حالی که Yuka بر اساس یک مدل غیرشفاف و غیرمنبع‌باز است.
reviewed: false
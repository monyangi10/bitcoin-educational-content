question: Кое приложение с отворен код се препоръчва за сканиране на хранителни продукти с обща база данни?
answer: OpenFoodFacts
wrong_answers:
  - Юка
  - Nutri-Score
  - Foodvisor
explanation: |
  OpenFoodFacts е безплатен проект, базиран на общността, който е прозрачен по отношение на своите данни, докато Yuka се основава на непрозрачен модел без отворен код.
reviewed: false
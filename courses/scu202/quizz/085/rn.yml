question: Ni iyihe porogarame y’isoko yuguruye uhanuriwe gukoresha mu gupima ibifungurwa ifise urutonde rw’amakuru rw’ubufatanye?
answer: OpenFoodFacts
wrong_answers:
  - Yuka
  - Nutri-Score
  - Foodvisor
explanation: |
  OpenFoodFacts ni umugambi w’ubuntu, ushingiye ku muryango wagutse, ukorera mu muco ku makuru yawo, mu gihe Yuka ishingiye ku kigereranyo c’isoko ituguruye.
reviewed: true

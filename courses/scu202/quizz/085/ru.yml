question: Какое приложение с открытым исходным кодом рекомендуется для сканирования пищевых продуктов с совместной базой данных?
answer: OpenFoodFacts
wrong_answers:
  - Юка
  - Nutri-Score
  - Foodvisor
explanation: |
  OpenFoodFacts - это бесплатный, основанный на сообществе проект, прозрачный в отношении своих данных, в то время как Yuka основана на непрозрачной модели, не имеющей открытого исходного кода.
reviewed: false
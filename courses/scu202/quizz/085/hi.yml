question: सहयोगी डेटाबेस के साथ खाद्य उत्पादों को स्कैन करने के लिए कौन सा ओपन सोर्स एप्लिकेशन अनुशंसित है?
answer: ओपनफूडफैक्ट्स
wrong_answers:
  - युका
  - न्यूट्री-स्कोर
  - फूडविज़र
explanation: |
  ओपनफूडफैक्ट्स एक निःशुल्क, समुदाय-आधारित परियोजना है, जो अपने डेटा के बारे में पारदर्शी है, जबकि युका एक अपारदर्शी, गैर-ओपन सोर्स मॉडल पर आधारित है।
reviewed: false
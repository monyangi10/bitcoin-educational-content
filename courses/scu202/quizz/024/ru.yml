question: Какова основная роль среды рабочего стола Linux?
answer: Предоставьте графику Interface
wrong_answers:
  - Управление запуском системы
  - Компиляция ядра Linux
  - Защита от вирусов
explanation: |
  Среда рабочего стола объединяет визуальные и интерактивные Elements (окна, меню, значки, панели и т. д.), позволяя пользователю графически взаимодействовать с системой.
reviewed: false
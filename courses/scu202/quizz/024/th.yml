question: บทบาทหลักของสภาพแวดล้อมเดสก์ท็อป Linux คืออะไร?
answer: จัดเตรียมกราฟิก Interface
wrong_answers:
  - การจัดการการเริ่มต้นระบบ
  - การคอมไพล์เคอร์เนลของลินุกซ์
  - การป้องกันไวรัส
explanation: |
  สภาพแวดล้อมเดสก์ท็อปรวมกลุ่มองค์ประกอบที่เป็นภาพและการโต้ตอบ (หน้าต่าง, เมนู, ไอคอน, แผงควบคุม, ฯลฯ) เพื่อให้ผู้ใช้สามารถโต้ตอบกับระบบได้ในรูปแบบกราฟิก
reviewed: false
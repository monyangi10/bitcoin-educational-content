question: ¿Cuál es la función principal de un entorno de escritorio Linux?
answer: Proporciona la interfaz gráfica
wrong_answers:
  - Gestión del arranque del sistema
  - Compilación del núcleo Linux
  - Protección contra los virus
explanation: |
  El entorno de escritorio agrupa elementos visuales e interactivos (ventanas, menús, iconos, paneles, etc.) para que el usuario pueda interactuar gráficamente con el sistema.
reviewed: true
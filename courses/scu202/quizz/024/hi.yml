question: लिनक्स डेस्कटॉप वातावरण की मुख्य भूमिका क्या है?
answer: Interface ग्राफिक्स प्रदान करें
wrong_answers:
  - सिस्टम स्टार्टअप का प्रबंधन
  - लिनक्स कर्नेल का संकलन
  - वायरस से बचाव
explanation: |
  डेस्कटॉप वातावरण दृश्य और इंटरैक्टिव Elements (विंडोज़, मेनू, आइकन, पैनल, आदि) को एक साथ समूहित करता है, ताकि उपयोगकर्ता सिस्टम के साथ ग्राफिक रूप से इंटरैक्ट कर सके।
reviewed: false
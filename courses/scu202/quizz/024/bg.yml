question: Каква е основната роля на работната среда на Linux?
answer: Предоставяне на графики Interface
wrong_answers:
  - Управление на стартирането на системата
  - Компилиране на ядрото на Linux
  - Защита от вируси
explanation: |
  Десктоп средата обединява визуални и интерактивни елементи (прозорци, менюта, икони, панели и др.), за да даде възможност на потребителя да взаимодейства графично със системата.

question: نقش اصلی محیط دسکتاپ لینوکس چیست؟
answer: ارائه گرافیک Interface
wrong_answers:
  - مدیریت راه‌اندازی سیستم
  - کامپایل کردن هسته لینوکس
  - محافظت در برابر ویروس‌ها
explanation: |
  محیط دسکتاپ، Elements (پنجره‌ها، منوها، آیکون‌ها، پانل‌ها، و غیره) را به صورت بصری و تعاملی گرد هم می‌آورد تا کاربر بتواند به صورت گرافیکی با سیستم تعامل داشته باشد.
reviewed: false
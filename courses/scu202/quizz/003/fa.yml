question: از انجام چه کارهایی با درایوهای فلش USB باید اجتناب کرد؟
answer: اتصال فلش‌های USB ناشناخته
wrong_answers:
  - از حافظه‌های USB با فرمت NTFS استفاده کنید
  - رمزگذاری فلش‌های USB خودتان
  - از فلش درایوهای USB جدید استفاده کنید
explanation: |
  اتصال یک فلش USB ناشناخته می‌تواند کامپیوتر را به بدافزار آلوده کند یا داده‌های حساس را سرقت کند.
reviewed: false
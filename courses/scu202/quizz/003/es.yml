question: ¿Qué debe evitar hacer con las memorias USB?
answer: Conectar memorias USB de origen desconocido
wrong_answers:
  - Utilizar memorias USB con formato NTFS
  - Cifrar tus propias memorias USB
  - Utilizar memorias USB nuevas
explanation: |
  Conectar una memoria USB desconocida puede infectar el ordenador con malware o robar datos confidenciales.
reviewed: true
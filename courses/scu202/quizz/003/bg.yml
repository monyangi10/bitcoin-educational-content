question: Какво трябва да избягвате да правите с USB флаш памети?
answer: Свързване на непознати USB памети
wrong_answers:
  - Използване на USB памети, форматирани в NTFS
  - Криптиране на собствени USB памети
  - Използване на нови USB флаш памети
explanation: |
  Включването на непозната USB памет може да зарази компютъра със зловреден софтуер или да открадне поверителни данни.
reviewed: false
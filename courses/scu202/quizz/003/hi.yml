question: यूएसबी फ्लैश ड्राइव के साथ आपको क्या करने से बचना चाहिए?
answer: अज्ञात USB स्टिक कनेक्ट करना
wrong_answers:
  - NTFS-स्वरूपित USB स्टिक का उपयोग करें
  - अपनी USB स्टिक को एन्क्रिप्ट करें
  - नए USB फ्लैश ड्राइव का उपयोग करें
explanation: |
  किसी अज्ञात यूएसबी स्टिक को कंप्यूटर में लगाने से कंप्यूटर मैलवेयर से संक्रमित हो सकता है या संवेदनशील डेटा चोरी हो सकता है।
reviewed: false
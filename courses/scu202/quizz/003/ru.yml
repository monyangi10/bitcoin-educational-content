question: Чего не следует делать с USB-накопителями?
answer: Подключение неизвестных USB-накопителей
wrong_answers:
  - Используйте USB-накопители с форматированием NTFS
  - Шифруйте собственные USB-накопители
  - Используйте новые флэш-накопители USB
explanation: |
  Подключение неизвестного USB-накопителя может заразить компьютер вредоносным ПО или украсть конфиденциальные данные.
reviewed: false
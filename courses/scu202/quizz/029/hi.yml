question: उबंटू का कौन सा संस्करण इसकी स्थिरता और समर्थन की लंबाई के लिए शुरुआती लोगों के लिए अनुशंसित है?
answer: एलटीएस (दीर्घकालिक समर्थन)
wrong_answers:
  - रोलिंग रिलीज़
  - पहला संस्करण
  - अल्फा रिलीज़
explanation: |
  उबंटू का एलटीएस संस्करण पांच वर्षों तक चलता है और अधिक स्थिरता प्रदान करता है, जिससे यह नौसिखिए उपयोगकर्ताओं के लिए आदर्श बन जाता है।
reviewed: false
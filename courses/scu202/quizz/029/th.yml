question: เวอร์ชันใดของ Ubuntu ที่แนะนำสำหรับผู้เริ่มต้นเนื่องจากความเสถียรและระยะเวลาการสนับสนุน?
answer: LTS (Long Term Support)
wrong_answers:
  - Rolling Release
  - เวอร์ชันแรก
  - อัลฟ่ารีลีส
explanation: |
  เวอร์ชัน LTS ของ Ubuntu ได้รับการดูแลรักษาเป็นเวลาห้าปีและมีความเสถียรมากขึ้น ทำให้เหมาะสำหรับผู้ใช้มือใหม่
reviewed: false
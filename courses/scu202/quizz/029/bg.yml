question: Коя версия на Ubuntu се препоръчва за начинаещи поради нейната стабилност и продължителност на поддръжката?
answer: LTS (дългосрочна поддръжка)
wrong_answers:
  - Rolling Release
  - Първа версия
  - Алфа версия
explanation: |
  Версията LTS на Ubuntu се поддържа в продължение на пет години и предлага по-голяма стабилност, което я прави идеална за начинаещи потребители.
reviewed: false
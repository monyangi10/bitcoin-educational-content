question: Какая версия Ubuntu рекомендуется для начинающих благодаря своей стабильности и длительности поддержки?
answer: LTS (долгосрочная поддержка)
wrong_answers:
  - Роллинг релиз
  - Первая версия
  - Альфа-релиз
explanation: |
  LTS-версия Ubuntu поддерживается в течение пяти лет и отличается большей стабильностью, что делает ее идеальной для начинающих пользователей.
reviewed: false
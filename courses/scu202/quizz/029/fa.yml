question: کدام نسخه اوبونتو برای مبتدیان به دلیل پایداری و طول مدت پشتیبانی توصیه می‌شود؟
answer: پشتیبانی بلندمدت (LTS)
wrong_answers:
  - انتشار نوردشیب
  - نسخه اول
  - انتشار آلفا
explanation: |
  نسخه LTS اوبونتو به مدت پنج سال نگهداری می‌شود و پایداری بیشتری ارائه می‌دهد، که آن را برای کاربران مبتدی ایده‌آل می‌سازد.
reviewed: false
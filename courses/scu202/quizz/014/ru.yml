question: Кто был двумя главными создателями Unix?
answer: Кен Томпсон и Деннис Ричи
wrong_answers:
  - Ричард Столлман и Линус Торвальдс
  - Эндрю С. Таненбаум и Ларри Юинг
  - Стив Джобс и Билл Гейтс
explanation: |
  Unix была разработана Кеном Томпсоном и Деннисом Ритчи в AT&T Bell Labs в конце 1960-х - начале 1970-х годов.

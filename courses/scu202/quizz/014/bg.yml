question: Кои са двамата основни създатели на Unix?
answer: Кен Томпсън и Денис Ричи
wrong_answers:
  - Ричард Столман и Линус Торвалдс
  - Андрю С. Таненбаум и Лари Юинг
  - Стив Джобс и Бил Гейтс
explanation: |
  Unix е разработен от Кен Томпсън и Денис Ричи в AT&T Bell Labs в края на 60-те и началото на 70-те години на миналия век.

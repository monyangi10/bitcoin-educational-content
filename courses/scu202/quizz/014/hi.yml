question: यूनिक्स के दो मुख्य निर्माता कौन थे?
answer: केन थॉम्पसन और डेनिस रिची
wrong_answers:
  - रिचर्ड स्टॉलमैन और लिनुस टोरवाल्ड्स
  - एंड्रयू एस. टेनेनबाम और लैरी इविंग
  - स्टीव जॉब्स और बिल गेट्स
explanation: |
  यूनिक्स का विकास केन थॉम्पसन और डेनिस रिची ने 1960 के दशक के अंत और 1970 के दशक के प्रारंभ में एटी एंड टी बेल लैब्स में किया था।
reviewed: false
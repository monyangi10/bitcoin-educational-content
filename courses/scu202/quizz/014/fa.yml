question: دو خالق اصلی یونیکس چه کسانی بودند؟
answer: کن تامپسون و دنیس ریچی
wrong_answers:
  - ریچارد استالمن و لینوس توروالدز
  - اندرو اس. تننباوم و لری اوینگ
  - استیو جابز و بیل گیتس
explanation: |
  یونیکس توسط کن تامپسون و دنیس ریچی در آزمایشگاه‌های بل AT&T در اواخر دهه ۱۹۶۰ و اوایل دهه ۱۹۷۰ توسعه یافت.
reviewed: false
question: ใครคือผู้สร้างหลักสองคนของ Unix?
answer: เคน ทอมป์สัน และ เดนนิส ริตชี
wrong_answers:
  - ริชาร์ด สตอลแมน และ ลินุส ทอร์วัลดส์
  - แอนดรูว์ เอส. ทาเนนบอม และ แลร์รี่ อีวิง
  - สตีฟ จ็อบส์ และ บิล เกตส์
explanation: |
  Unix ได้รับการพัฒนาโดย Ken Thompson และ Dennis Ritchie ที่ AT&T Bell Labs ในช่วงปลายทศวรรษ 1960 และต้นทศวรรษ 1970
reviewed: false
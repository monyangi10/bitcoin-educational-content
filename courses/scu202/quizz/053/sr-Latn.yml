question: Koja platforma automatski briše metapodatke kada se fotografija otpremi?
answer: Signal
wrong_answers:
  - Gmail
  - Outlook
  - Vaš blog
explanation: |
  Signal (kao što je i Session i drugi sigurni servisi za razmene poruka) čisti metapodatke deljenih slika kako bi zaštitio privatnost korisnika.
reviewed: true

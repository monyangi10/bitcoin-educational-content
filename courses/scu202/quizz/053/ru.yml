question: Какая платформа автоматически удаляет метаданные при загрузке фотографии?
answer: Сигнал
wrong_answers:
  - Gmail
  - Outlook
  - Ваш блог
explanation: |
  Signal (как и Session и другие сервисы безопасного обмена сообщениями) очищает метаданные общих изображений, чтобы защитить конфиденциальность пользователей.
reviewed: false
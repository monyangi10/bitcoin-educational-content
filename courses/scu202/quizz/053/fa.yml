question: کدام پلتفرم به‌طور خودکار متادیتا را هنگام بارگذاری عکس حذف می‌کند؟
answer: سیگنال
wrong_answers:
  - جیمیل
  - چشم‌انداز
  - وبلاگ شما
explanation: |
  سیگنال (مانند Session و سایر خدمات پیام‌رسانی امن) متادیتای تصاویر به اشتراک‌گذاشته‌شده را پاک می‌کند تا حریم خصوصی کاربران را حفظ کند.
reviewed: false
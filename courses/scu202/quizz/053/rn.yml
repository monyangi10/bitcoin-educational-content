question: Ni uruhe rubuga ruca rufuta metadata iyo ifoto ishizweko?
answer: Signal
wrong_answers:
  - Gmail
  - Outlook
  - Urubuga rwawe
explanation: |
  Signal (nka Session n’izindi serivisi z’ubutumwa butekanye) isukura metadata ku mashusho yasangijwe kugira ngo ikingire ubuzima bw’ibanga bw’abakoresha.
reviewed: true

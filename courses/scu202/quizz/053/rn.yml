question: Ni uruhe rubuga ruca rufuta metadata iyo ifoto ishizweko?
answer: Ikimenyetso
wrong_answers:
  - Gmail
  - Imbonerahamwe
  - Urubuga rwawe
explanation: |
  Signal (nka Session n'izindi serivisi z'ubutumwa butekanye) isukura metadata y'amashusho asangiye kugira ngo ikingire ubuzima bwite bw'abakoresha.

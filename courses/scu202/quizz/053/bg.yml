question: Коя платформа автоматично изтрива метаданните при качване на снимка?
answer: Сигнал
wrong_answers:
  - Gmail
  - Outlook
  - Вашият блог
explanation: |
  Signal (подобно на Session и други услуги за сигурни съобщения) почиства метаданните на споделените изображения, за да защити поверителността на потребителите.
reviewed: false
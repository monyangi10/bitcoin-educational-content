question: कौन सा प्लेटफ़ॉर्म फ़ोटो अपलोड होने पर मेटाडेटा को स्वचालित रूप से हटा देता है?
answer: संकेत
wrong_answers:
  - जीमेल लगीं
  - आउटलुक
  - आपका ब्लॉग
explanation: |
  सिग्नल (सेशन और अन्य सुरक्षित मैसेजिंग सेवाओं की तरह) उपयोगकर्ताओं की गोपनीयता की रक्षा के लिए साझा की गई छवियों के मेटाडेटा को साफ करता है।
reviewed: false
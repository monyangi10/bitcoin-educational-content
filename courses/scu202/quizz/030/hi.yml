question: कौन सा ओपन सोर्स टूल लिनक्स के तहत डिस्क को पूरी तरह से एन्क्रिप्ट कर सकता है?
answer: लुक्स
wrong_answers:
  - BitLocker
  - फ़ाइलवॉल्ट
  - सुपरक्रिप्ट
explanation: |
  LUKS (लिनक्स यूनिफाइड की सेटअप) स्थापना के दौरान पूर्ण डिस्क एन्क्रिप्शन के लिए लिनक्स पर मानक समाधान है।
reviewed: false
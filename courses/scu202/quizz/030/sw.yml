question: Ni zana gani ya chanzo wazi inaweza kusimba diski kikamilifu chini ya Linux?
answer: LUKS
wrong_answers:
  - BitLocker
  - FileVault
  - SuperCrypt
explanation: |
  LUKS (Linux Unified Key Setup) ndiyo suluhisho la kawaida kwenye Linux kwa usimbaji fiche kamili wa diski wakati wa usakinishaji.
reviewed: false
question: कौन सा ब्लिंक-आधारित ब्राउज़र अपनी गति और अनुकूलता के लिए प्रसिद्ध है, लेकिन विज्ञापन उद्देश्यों के लिए भारी मात्रा में उपयोगकर्ता डेटा एकत्र करता है?
answer: क्रोम
wrong_answers:
  - बहादुर
  - फ़ायरफ़ॉक्स
  - टोर ब्राउज़र
explanation: |
  यद्यपि गूगल क्रोम एक शक्तिशाली उपकरण है, लेकिन डिफ़ॉल्ट रूप से यह बहुत सारा व्यक्तिगत डेटा एकत्र करता है, जिसका उपयोग गूगल लक्षित विज्ञापन के लिए करता है।
reviewed: false
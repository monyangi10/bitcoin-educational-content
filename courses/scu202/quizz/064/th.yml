question: เบราว์เซอร์ Blink ใดที่มีชื่อเสียงในด้านความเร็วและความเข้ากันได้ แต่รวบรวมข้อมูลผู้ใช้จำนวนมากเพื่อวัตถุประสงค์ในการโฆษณา?
answer: Chrome
wrong_answers:
  - กล้าหาญ
  - Firefox
  - Tor Browser
explanation: |
  แม้ว่า Google Chrome จะเป็นเครื่องมือที่ทรงพลัง แต่โดยค่าเริ่มต้นมันจะเก็บข้อมูลส่วนบุคคลจำนวนมาก ซึ่ง Google ใช้สำหรับการโฆษณาแบบกำหนดเป้าหมาย
reviewed: false
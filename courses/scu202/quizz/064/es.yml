question: ¿Qué navegador basado en Blink es famoso por su velocidad y compatibilidad, pero recopila cantidades ingentes de datos de los usuarios con fines publicitarios?
answer: Chrome
wrong_answers:
  - Brave
  - Firefox
  - Navegador Tor
explanation: |
  Aunque Google Chrome es una potente herramienta, por defecto recopila una gran cantidad de datos personales, que Google utiliza para la publicidad dirigida.
reviewed: true
question: Какой браузер на базе Blink славится своей скоростью и совместимостью, но собирает огромное количество пользовательских данных для рекламных целей?
answer: Хром
wrong_answers:
  - Храбрец
  - Firefox
  - Браузер Tor
explanation: |
  Хотя Google Chrome является мощным инструментом, по умолчанию он собирает большое количество персональных данных, которые Google использует для целевой рекламы.

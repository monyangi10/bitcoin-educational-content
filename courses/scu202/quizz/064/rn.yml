question: Ni uwuhe mucukumbuzi akoreshwa na Blink azwi cane kubera umuvuduko wayo n’uguhuza, ariko akorakoranya amakuru menshi cane y’abakoresha kugira ngo akoreshe mu kwamamaza?
answer: Chrome
wrong_answers:
  - Intwari
  - Firefox
  - Mucukumbuzi wa Tor
explanation: |
  Naho Google Chrome ari igikoresho gikomeye, mu buryo busanzwe ikorakoranya amakuru menshi y’umuntu ku giti ciwe, ayo Google ikoresha mu kwamamaza abantu.
reviewed: false
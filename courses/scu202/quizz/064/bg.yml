question: Кой браузър, базиран на Blink, е известен със своята скорост и съвместимост, но събира огромни количества потребителски данни за рекламни цели?
answer: Chrome
wrong_answers:
  - Brave
  - Firefox
  - Браузър Tor
explanation: |
  Въпреки че Google Chrome е мощен инструмент, по подразбиране той събира много лични данни, които Google използва за таргетирана реклама.
reviewed: false
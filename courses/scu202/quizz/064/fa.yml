question: کدام مرورگر مبتنی بر Blink به خاطر سرعت و سازگاری‌اش معروف است، اما مقادیر زیادی از داده‌های کاربران را برای اهداف تبلیغاتی جمع‌آوری می‌کند؟
answer: کروم
wrong_answers:
  - شجاع
  - فایرفاکس
  - مرورگر تور
explanation: |
  اگرچه گوگل کروم یک ابزار قدرتمند است، اما به طور پیش‌فرض مقدار زیادی از داده‌های شخصی را جمع‌آوری می‌کند که گوگل از آن برای تبلیغات هدفمند استفاده می‌کند.
reviewed: false
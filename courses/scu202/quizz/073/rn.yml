question: Ni ikihe gice ca Android kiguma ari open source kandi gishobora gusuzumwa n’umuryango wagutse w’abanyagihugu?
answer: AOSP
wrong_answers:
  - Serivisi Ngendanwa za Google (GMS)
  - Play Store
  - iOSP
explanation: |
  Umushinge AOSP wa Android wonyene ni wo w’ubuntu. Serivisi ngendanwa za Google zikoreshwa cane zirigenzurwa na Google gusa.
reviewed: true

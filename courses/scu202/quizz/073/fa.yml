question: کدام مؤلفه اندروید به طور کامل منبع باز و قابل حسابرسی توسط جامعه باقی می‌ماند؟
answer: AOSP
wrong_answers:
  - خدمات موبایل گوگل
  - فروشگاه Play
  - iOSP
explanation: |
  فقط پایه AOSP اندروید رایگان است. خدمات موبایل گوگل که به‌طور گسترده استفاده می‌شوند، مالکیتی و غیرقابل حسابرسی هستند.
reviewed: false
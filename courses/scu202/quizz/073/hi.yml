question: कौन सा एंड्रॉयड घटक पूरी तरह से खुला स्रोत है और समुदाय द्वारा ऑडिट योग्य है?
answer: एओएसपी
wrong_answers:
  - गूगल मोबाइल सेवाएँ
  - प्ले स्टोर
  - आईओएसपी
explanation: |
  केवल एंड्रॉइड का AOSP बेस मुफ़्त है। व्यापक रूप से इस्तेमाल की जाने वाली Google मोबाइल सेवाएँ स्वामित्व वाली और अप्रमाणित हैं।
reviewed: false
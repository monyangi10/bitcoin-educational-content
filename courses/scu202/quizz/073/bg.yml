question: Кой компонент на Android остава изцяло с отворен код и може да бъде одитиран от общността?
answer: AOSP
wrong_answers:
  - Мобилни услуги на Google
  - Магазинът за игри
  - IOSP
explanation: |
  Само базата AOSP на Android е безплатна. Широко използваните мобилни услуги на Google са патентовани и не подлежат на проверка.
reviewed: false
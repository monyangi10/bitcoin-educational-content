question: การดำเนินการใดที่รับรองว่าซอฟต์แวร์ที่ดาวน์โหลดมาไม่ได้ถูกแก้ไขตั้งแต่การเผยแพร่อย่างเป็นทางการ?
answer: การตรวจสอบความสมบูรณ์ผ่าน Hash
wrong_answers:
  - การยืนยันความถูกต้องผ่านลายเซ็นของนักพัฒนา
  - การวิเคราะห์ซอฟต์แวร์ผ่านไฟร์วอลล์
  - การเรียกใช้โปรแกรมในเซฟโหมด
explanation: |
  การตรวจสอบความสมบูรณ์ขึ้นอยู่กับการเปรียบเทียบ Hash ของไฟล์ที่ดาวน์โหลดกับที่เผยแพร่โดยนักพัฒนา การแก้ไขใด ๆ กับไฟล์จะเปลี่ยนแปลง Hash นี้
reviewed: false
question: Koja operacija osigurava da preuzeti softver nije izmenjen od njegove zvanične objave?
answer: Provera integriteta putem heša
wrong_answers:
  - Verifikacija autentičnosti putem potpisa programera
  - Analiza softvera putem firewall-a
  - Pokretanje programa u sigurnom režimu
explanation: |
  Provera integriteta zasniva se na poređenju heša preuzetog fajla sa onim koji je objavio developer. Bilo kakva izmena fajla menja ovaj heš.
reviewed: true

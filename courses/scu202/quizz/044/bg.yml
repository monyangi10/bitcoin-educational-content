question: Коя операция гарантира, че изтегленият софтуер не е бил променян след официалното му публикуване?
answer: Проверка на интегритета чрез Hash
wrong_answers:
  - Проверка на автентичността чрез подпис на разработчика
  - Софтуерен анализ чрез защитна стена
  - Стартиране на програмата в безопасен режим
explanation: |
  Проверката на интегритета се основава на сравняване на Hash на изтегления файл с този, публикуван от разработчика. Всяка модификация на файла променя този Hash.
reviewed: false
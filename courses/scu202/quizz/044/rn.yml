question: Ni igikorwa ikihe gituma ubasha kubona ko porogarame zavuye kuri interineti zitahinduwe kuva zasohoka ku mugaragaro?
answer: Kugenzura ubutungane biciye kuri Hash.
wrong_answers:
  - Kugenzura ukuri biciye ku mukono w’umuhinguzi
  - Isesengura rya porogarame biciye ku ruhome rw’umuriro (firewall)
  - Gukoresha porogarame mu buryo butekanye
explanation: |
  Gusuzuma ubutungane bishingiye ku kugereranya Hash ya dosiye yavomwe kuri interineti n’iyo yasohowe n’uwayikoze. Impinduka yose kuri dosiye ihindura iyi Hash.
reviewed: true

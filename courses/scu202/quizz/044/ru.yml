question: Какая операция гарантирует, что загруженное программное обеспечение не было изменено с момента его официальной публикации?
answer: Проверка целостности с помощью Hash
wrong_answers:
  - Подтверждение подлинности с помощью подписи разработчика
  - Анализ программного обеспечения через брандмауэр
  - Запуск программы в безопасном режиме
explanation: |
  Проверка целостности основана на сравнении Hash загруженного файла с Hash, опубликованным разработчиком. Любая модификация файла изменяет этот Hash.
reviewed: false
question: कौन सा ऑपरेशन यह सुनिश्चित करता है कि डाउनलोड किए गए सॉफ़्टवेयर को उसके आधिकारिक प्रकाशन के बाद से संशोधित नहीं किया गया है?
answer: Hash के माध्यम से अखंडता सत्यापन
wrong_answers:
  - डेवलपर के हस्ताक्षर के माध्यम से प्रामाणिकता का सत्यापन
  - फ़ायरवॉल के माध्यम से सॉफ़्टवेयर विश्लेषण
  - प्रोग्राम को सुरक्षित मोड में चलाना
explanation: |
  अखंडता जाँच डाउनलोड की गई फ़ाइल के Hash की तुलना डेवलपर द्वारा प्रकाशित फ़ाइल से करने पर आधारित है। फ़ाइल में कोई भी संशोधन इस Hash को संशोधित करता है।
reviewed: false
question: چه عملیاتی اطمینان می‌دهد که نرم‌افزار دانلود شده از زمان انتشار رسمی آن تغییر نکرده است؟
answer: تأیید یکپارچگی از طریق Hash
wrong_answers:
  - تأیید اصالت از طریق امضای توسعه‌دهنده
  - تجزیه و تحلیل نرم‌افزار از طریق یک فایروال
  - اجرای برنامه در حالت ایمن
explanation: |
  بررسی یکپارچگی بر اساس مقایسه Hash فایل دانلود شده با آنچه توسط توسعه‌دهنده منتشر شده است، انجام می‌شود. هرگونه تغییر در فایل، این Hash را تغییر می‌دهد.
reviewed: false
question: ¿Qué distribución que continua con soporte se considera la más antigua?
answer: Slackware
wrong_answers:
  - Fedora
  - Gentoo
  - Manjaro
explanation: |
  Slackware, creada en 1993 por Patrick Volkerding, es la distribución de Linux más antigua que sigue activa en la actualidad.
reviewed: true
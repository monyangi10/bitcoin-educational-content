question: Защо повечето устройства с Android се предлагат с предварително инсталирани мобилни услуги на Google?
answer: Производителите трябва да подпишат лицензионно споразумение с Google
wrong_answers:
  - Услуги, изисквани от европейското законодателство
  - Изходният код на GMS е безплатен
  - GMS е задължителна за всички устройства с Linux
explanation: |
  За да могат да се възползват от водещите приложения (Play Store, Maps и др.), производителите трябва да интегрират GMS, което предполага подписване на строги лицензионни споразумения с Google.
reviewed: false
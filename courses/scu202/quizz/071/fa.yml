question: چرا اکثر دستگاه‌های اندرویدی با خدمات موبایل گوگل از پیش نصب‌شده عرضه می‌شوند؟
answer: تولیدکنندگان باید یک توافق‌نامه مجوز با گوگل امضا کنند
wrong_answers:
  - خدمات مورد نیاز توسط قوانین اروپایی
  - کد منبع GMS رایگان است
  - GMS بر روی تمامی دستگاه‌های لینوکس اجباری است.
explanation: |
  برای بهره‌مندی از برنامه‌های پرچمدار (فروشگاه Play، نقشه‌ها و غیره)، تولیدکنندگان باید GMS را یکپارچه کنند که این امر مستلزم امضای توافق‌نامه‌های مجوز سخت‌گیرانه با گوگل است.
reviewed: false
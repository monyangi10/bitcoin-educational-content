question: Ni kuki ibikoresho vyinshi vya Android biza birimwo serivisi ngendanwa za Google (GMS)?
answer: Abahinguzi bategerezwa gusinyana amasezerano y’uruhusha na Google
wrong_answers:
  - Ibikorwa bisabwa n’amategeko y’Uburayi
  - Kode y’isoko ya GMS ni ubuntu
  - GMS ni ngombwa ku bikoresho vyose vya Linux
explanation: |
  Kugira ngo umuntu yungukire kuri porogarame z’agaciro (Play Store, Maps, n’ibindi), abahinguzi bategerezwa gushiramwo GMS, ivyo bikaba bisobanura gusinyana amasezerano akomeye y’uruhusha na Google.
reviewed: true

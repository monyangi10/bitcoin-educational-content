question: ทำไมอุปกรณ์ Android ส่วนใหญ่ถึงมาพร้อมกับ Google Mobile Services ที่ติดตั้งล่วงหน้า?
answer: ผู้ผลิตต้องลงนามในข้อตกลงใบอนุญาตกับ Google
wrong_answers:
  - บริการที่กฎหมายยุโรปกำหนด
  - ซอร์สโค้ด GMS ฟรี
  - GMS เป็นข้อบังคับบนอุปกรณ์ Linux ทั้งหมด
explanation: |
  ในการใช้ประโยชน์จากแอปพลิเคชันหลัก (Play Store, Maps, ฯลฯ) ผู้ผลิตต้องรวม GMS ซึ่งหมายถึงการลงนามในข้อตกลงการอนุญาตที่เข้มงวดกับ Google
reviewed: false
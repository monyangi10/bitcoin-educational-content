question: Почему большинство устройств Android поставляются с предустановленными мобильными сервисами Google?
answer: Производители должны подписать лицензионное соглашение с Google
wrong_answers:
  - Услуги, предусмотренные европейским законодательством
  - Исходный код GMS является бесплатным
  - GMS является обязательным для всех устройств Linux
explanation: |
  Чтобы пользоваться флагманскими приложениями (Play Store, Maps и т. д.), производители должны интегрировать GMS, что подразумевает подписание строгих лицензионных соглашений с Google.
reviewed: false
question: अधिकांश एंड्रॉयड डिवाइसों में गूगल मोबाइल सेवाएं पहले से इंस्टॉल क्यों होती हैं?
answer: निर्माताओं को Google के साथ लाइसेंस समझौते पर हस्ताक्षर करना होगा
wrong_answers:
  - यूरोपीय कानून द्वारा आवश्यक सेवाएँ
  - GMS स्रोत कोड निःशुल्क है
  - सभी लिनक्स उपकरणों पर GMS अनिवार्य है
explanation: |
  प्रमुख अनुप्रयोगों (प्ले स्टोर, मैप्स, आदि) से लाभ उठाने के लिए, निर्माताओं को GMS को एकीकृत करना होगा, जिसका अर्थ है गूगल के साथ सख्त लाइसेंसिंग समझौतों पर हस्ताक्षर करना।
reviewed: false
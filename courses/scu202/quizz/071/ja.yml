question: なぜほとんどのAndroid端末にはGoogleモバイルサービスがプリインストールされているのか？
answer: メーカーはグーグルとライセンス契約を結ぶ必要がある
wrong_answers:
  - 欧州の法律で義務付けられているサービス
  - GMSのソースコードは無料
  - GMSはすべてのLinuxデバイスで必須
explanation: |
  フラッグシップ・アプリケーション（Playストア、マップなど）の恩恵を受けるためには、メーカーはGMSを統合する必要があり、これはグーグルと厳格なライセンス契約を結ぶことを意味する。
reviewed: false
question: Ni iyihe moteri yo guhindura amajambo yakoreshejwe na Internet Explorer kuva kuri verisiyo ya 4 gushika ubu, ikaba yari iganzwa n’isoko mu ntango z’imyaka ya 2000?
answer: Igikoko
wrong_answers:
  - Inzoka
  - Urubuga
  - Gukubita amaso
explanation: |
  Trident, yakozwe na Microsoft, yashizweho na Internet Explorer 4.0 mu 1997, kandi yari iganje ku rubuga mu kiringo ca Internet Explorer yariko irakoresha ubuhinga bwa none.
reviewed: false
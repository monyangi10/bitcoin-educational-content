question: Koji rendering engine je koristio Internet Explorer počev od verzije 4 i koji je dominirao tržištem početkom 2000-ih?
answer: Trident
wrong_answers:
  - Gecko
  - WebKit
  - Blink
explanation: |
  Trident, razvijen od strane Microsofta, predstavljen je sa Internet Explorerom 4.0 1997. godine i dominirao je internetom tokom perioda virtuelnog monopola Internet Explorera.
reviewed: true

question: کدام موتور رندرینگ از نسخه ۴ به بعد توسط اینترنت اکسپلورر استفاده شد و در اوایل دهه ۲۰۰۰ بازار را تحت سلطه خود درآورد؟
answer: تری‌دنت
wrong_answers:
  - گکو
  - وب‌کیت
  - چشمک زدن
explanation: |
  تری‌دنت، که توسط مایکروسافت توسعه داده شد، با اینترنت اکسپلورر 4.0 در سال 1997 معرفی شد و در دوره انحصار مجازی اینترنت اکسپلورر بر وب تسلط داشت.
reviewed: false
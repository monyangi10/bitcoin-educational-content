question: इंटरनेट एक्सप्लोरर द्वारा संस्करण 4 से किस रेंडरिंग इंजन का उपयोग किया गया और 2000 के दशक के प्रारंभ में बाजार पर इसका प्रभुत्व रहा?
answer: ट्राइडेंट
wrong_answers:
  - छिपकली
  - वेबकिट
  - पलक झपकाना
explanation: |
  माइक्रोसॉफ्ट द्वारा विकसित ट्राइडेंट को 1997 में इंटरनेट एक्सप्लोरर 4.0 के साथ पेश किया गया था और इंटरनेट एक्सप्लोरर के आभासी एकाधिकार की अवधि के दौरान इसने वेब पर अपना दबदबा बनाए रखा।
reviewed: false
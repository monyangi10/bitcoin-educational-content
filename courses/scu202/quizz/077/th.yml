question: แอปพลิเคชัน Shelter สำหรับ Android คืออะไร?
answer: สร้างโปรไฟล์แยกเพื่อแบ่งการใช้งาน
wrong_answers:
  - เข้ารหัสข้อมูลโทรศัพท์ทั้งหมดโดยอัตโนมัติ
  - บล็อกสายที่ไม่ต้องการ
  - การติดตั้งแอปพลิเคชันนอก Play Store
explanation: |
  Shelter ช่วยให้คุณใช้ฟังก์ชัน Work Profile เพื่อแยกแอปพลิเคชันและข้อมูลในพื้นที่ที่แยกออกมา
reviewed: false
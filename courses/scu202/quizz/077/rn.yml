question: Porogarame shelter Niki kuri Android?
answer: Igufasha kurema umurongo w’ibikorwa witandukanije kugira ngo ugabure imikoreshereze
wrong_answers:
  - Kunyegeza amakuru yose ya terefone ubwo nyene
  - Guhagarika abaguhamagara udashaka
  - Gushiramwo porogarame hanze ya Play Store
explanation: |
  Shelter iragufasha gukoresha umurongo w’ibikorwa kugira utandukanye porogarame n’amakuru mu kibanza kiri ukwaco.
reviewed: true

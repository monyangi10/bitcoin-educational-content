question: Какво е приложението Shelter за Android?
answer: Създаване на изолиран профил, който да се използва за разделяне
wrong_answers:
  - Автоматично криптиране на всички данни от телефона
  - Блокиране на нежелани повиквания
  - Инсталиране на приложения извън Play Store
explanation: |
  Shelter ви позволява да използвате функцията Work Profile, за да разделите приложенията и данните в изолирано пространство.
reviewed: false
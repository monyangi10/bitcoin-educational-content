question: एंड्रॉइड के लिए शेल्टर एप्लिकेशन क्या है?
answer: उपयोगों को विभाजित करने के लिए एक पृथक प्रोफ़ाइल बनाएँ
wrong_answers:
  - सभी फ़ोन डेटा को स्वचालित रूप से एन्क्रिप्ट करें
  - अवांछित कॉल ब्लॉक करें
  - Play स्टोर के बाहर एप्लिकेशन इंस्टॉल करना
explanation: |
  शेल्टर आपको एक पृथक स्थान में अनुप्रयोगों और डेटा को अलग करने के लिए कार्य प्रोफ़ाइल फ़ंक्शन का उपयोग करने देता है।
reviewed: false
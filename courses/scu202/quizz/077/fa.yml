question: برنامه Shelter برای اندروید چیست؟
answer: یک پروفایل ایزوله برای تقسیم‌بندی استفاده‌ها ایجاد کنید
wrong_answers:
  - به‌طور خودکار تمام داده‌های تلفن را رمزگذاری کنید
  - مسدود کردن تماس‌های ناخواسته
  - نصب برنامه‌ها خارج از فروشگاه Play
explanation: |
  پناهگاه به شما امکان می‌دهد از عملکرد پروفایل کاری برای جداسازی برنامه‌ها و داده‌ها در یک فضای ایزوله استفاده کنید.

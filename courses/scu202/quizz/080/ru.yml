question: Какие самые важные критерии необходимо проверить перед выбором приложения для обмена сообщениями?
answer: Сплошное шифрование и открытый исходный код
wrong_answers:
  - Надежная аутентификация и открытый исходный код
  - Сплошное шифрование и децентрализованные серверы
  - Строгая аутентификация и децентрализованные серверы
explanation: |
  Сквозное шифрование обеспечивает конфиденциальность обмена, а открытый исходный код позволяет проверить правильность реализации этой защиты.

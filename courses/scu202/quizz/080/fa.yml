question: مهم‌ترین معیارهایی که باید قبل از انتخاب یک برنامه پیام‌رسان بررسی کنید چیست؟
answer: رمزگذاری سرتاسری و کد منبع باز
wrong_answers:
  - احراز هویت قوی و کد منبع باز
  - رمزگذاری سرتاسری و سرورهای غیرمتمرکز
  - احراز هویت قوی و سرورهای غیرمتمرکز
explanation: |
  رمزگذاری سرتاسر محرمانگی تبادلات را تضمین می‌کند و متن‌باز بودن امکان بررسی اجرای صحیح این امنیت را فراهم می‌سازد.
reviewed: false
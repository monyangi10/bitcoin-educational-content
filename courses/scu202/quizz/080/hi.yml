question: मैसेजिंग एप्लीकेशन चुनने से पहले जांचने के लिए सबसे महत्वपूर्ण मानदंड क्या हैं?
answer: एंड-टू-एंड एन्क्रिप्शन और ओपन सोर्स कोड
wrong_answers:
  - मजबूत प्रमाणीकरण और खुला स्रोत कोड
  - एंड-टू-एंड एन्क्रिप्शन और विकेन्द्रीकृत सर्वर
  - मजबूत प्रमाणीकरण और विकेन्द्रीकृत सर्वर
explanation: |
  एंड-टू-एंड एन्क्रिप्शन एक्सचेंजों की गोपनीयता सुनिश्चित करता है, और ओपन सोर्स इस सुरक्षा के सही कार्यान्वयन को सत्यापित करना संभव बनाता है।
reviewed: false
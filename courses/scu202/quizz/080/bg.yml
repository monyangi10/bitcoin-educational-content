question: Кои са най-важните критерии, които трябва да се проверят, преди да се избере приложение за изпращане на съобщения?
answer: Криптиране от край до край и код с отворен код
wrong_answers:
  - Силно удостоверяване и код с отворен код
  - Криптиране от край до край и децентрализирани сървъри
  - Силно удостоверяване и децентрализирани сървъри
explanation: |
  Криптирането от край до край гарантира поверителността на обмена, а отвореният код позволява да се провери правилното прилагане на тази защита.
reviewed: false
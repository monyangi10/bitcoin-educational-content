question: เกณฑ์ที่สำคัญที่สุดที่ควรตรวจสอบก่อนเลือกแอปพลิเคชันส่งข้อความคืออะไร?
answer: การเข้ารหัสแบบปลายทางถึงปลายทางและโค้ดโอเพ่นซอร์ส
wrong_answers:
  - การยืนยันตัวตนที่แข็งแกร่งและโค้ดโอเพ่นซอร์ส
  - การเข้ารหัสแบบปลายทางถึงปลายทางและเซิร์ฟเวอร์แบบกระจายศูนย์
  - การยืนยันตัวตนที่แข็งแกร่งและเซิร์ฟเวอร์แบบกระจาย
explanation: |
  การเข้ารหัสแบบ end-to-end ช่วยให้มั่นใจในความลับของการแลกเปลี่ยนข้อมูล และโอเพ่นซอร์สทำให้สามารถตรวจสอบการดำเนินการด้านความปลอดภัยนี้ได้อย่างถูกต้อง
reviewed: false
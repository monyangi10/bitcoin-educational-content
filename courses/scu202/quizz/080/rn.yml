question: Ni ibihe bintu bihambaye cane umuntu akwiye gusuzuma imbere yo guhitamwo porogarama yo gutanga ubutumwa?
answer: Kunyegeza amakuru impera kuyindi (End-to-end encryption) na kode y’isoko y’uguruye (open source)
wrong_answers:
  - Ivyemezo bikomeye na kode y’isoko yuguruye
  - hKunyegeza amakuru impera kuyindi n’amaseriveri akwiragiye
  - Ivyemezo bikomeye n’amaseriveri akwiragiye
explanation: |
  Kunyegeza amakuru impera kuyindi bituma amakuru ahanahanwa aba ibanga, kandi kuba ari open source bituma bishoboka kugenzura ukuntu uwo mutekano ushirwa mu ngiro neza.
reviewed: true

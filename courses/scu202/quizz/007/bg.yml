question: Коя система се отличава с модела си с отворен код, базиран на общността?
answer: GNU/Linux
wrong_answers:
  - Windows
  - macOS
  - Chrome OS
explanation: |
  ГНУ/Линукс е свободен и се разработва от световна общност, което гарантира прозрачност, сигурност и гъвкавост за потребителя.
reviewed: false
question: Ni sisiteme iyahe iza imbere y’izindi kubw’ikigereranyo cayo gishingiye ku muryango wagutse, kandi kikaba isoko y’uguruye(open-source)?
answer: GNU/Linux
wrong_answers:
  - Windows
  - macOS
  - Chrome OS
explanation: |
  GNU/Linux ni ubuntu kandi yateguwe n’umuryango wagutse kw’isi yose, itanga icemezo c’ugukorera mu muco, umutekano n’uburenganzira busesuye ku mukoresha.
reviewed: true

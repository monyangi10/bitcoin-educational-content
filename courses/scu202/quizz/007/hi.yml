question: कौन सी प्रणाली अपने ओपन-सोर्स, समुदाय-आधारित मॉडल के लिए विशिष्ट है?
answer: जीएनयू/लिनक्स
wrong_answers:
  - विंडोज़
  - मैक ओएस
  - क्रोम ओएस
explanation: |
  जीएनयू/लिनक्स निःशुल्क है और विश्वव्यापी समुदाय द्वारा विकसित किया गया है, जो उपयोगकर्ता के लिए पारदर्शिता, सुरक्षा और लचीलेपन की गारंटी देता है।
reviewed: false
question: Какая система выделяется своей открытой моделью, основанной на сообществе?
answer: GNU/Linux
wrong_answers:
  - Windows
  - macOS
  - Chrome OS
explanation: |
  GNU/Linux является свободным и разрабатывается мировым сообществом, гарантируя прозрачность, безопасность и гибкость для пользователя.
reviewed: false
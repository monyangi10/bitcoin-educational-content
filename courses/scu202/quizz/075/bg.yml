question: Какви са основните ограничения на мобилните антивирусни приложения?
answer: Те са ограничени пред лицето на реални заплахи
wrong_answers:
  - Те правят телефона несъвместим с мобилните мрежи
  - Премахват приложенията за изпращане на съобщения
  - Увеличават живота на батерията
explanation: |
  Мобилният антивирусен софтуер не предлага защита срещу фишинг или лоши оторизации и само ограничена защита срещу основните заплахи.
reviewed: false
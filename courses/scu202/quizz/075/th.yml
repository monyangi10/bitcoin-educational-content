question: ข้อจำกัดหลักของแอปพลิเคชันแอนตี้ไวรัสบนมือถือคืออะไร?
answer: พวกเขามีข้อจำกัดเมื่อเผชิญกับภัยคุกคามที่แท้จริง
wrong_answers:
  - พวกเขาทำให้โทรศัพท์ไม่เข้ากันกับเครือข่ายมือถือ
  - พวกเขาลบแอปพลิเคชันการส่งข้อความ
  - พวกเขาเพิ่มอายุการใช้งานแบตเตอรี่
explanation: |
  ซอฟต์แวร์ป้องกันไวรัสบนมือถือไม่สามารถป้องกันการฟิชชิ่งหรือการอนุญาตที่ไม่ดีได้ และมีความปลอดภัยจำกัดต่อภัยคุกคามหลักเท่านั้น
reviewed: false
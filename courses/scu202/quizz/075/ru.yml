question: Каковы основные ограничения мобильных антивирусных приложений?
answer: Они ограничены перед лицом реальных угроз
wrong_answers:
  - Они делают телефон несовместимым с мобильными сетями
  - Они удаляют приложения для обмена сообщениями
  - Они увеличивают время автономной работы
explanation: |
  Мобильные антивирусные программы не защищают от фишинга и неавторизованных пользователей, а также обеспечивают лишь ограниченную защиту от основных угроз.
reviewed: false
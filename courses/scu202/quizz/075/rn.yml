question: Ni ibihe bintu nyamukuru porogarame zikingira umugera nyabwonko za ngendanwa zidashoboye?
answer: Ntizishoboye guhangana n’igitero nyaco
wrong_answers:
  - Bituma terefone idakorana n’imihora y’amaterefone ngendanwa
  - Zikuraho porogarame z’butumwa
  - Birongera ubuzima bwa bateri
explanation: |
  Porogarame zikingira umugera zikoreshwa kuri terefone ngendanwa nta n’uburinzi zitanga ku bijanye n’ububeshi bwa phishing canke uburenganzira bubi, kandi zitanga umutekano muke gusa ku bitero nyamukuru.
reviewed: true

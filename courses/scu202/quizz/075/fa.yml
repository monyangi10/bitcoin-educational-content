question: محدودیت‌های اصلی برنامه‌های آنتی‌ویروس موبایل چیست؟
answer: آنها در برابر تهدیدات واقعی محدود هستند.
wrong_answers:
  - آنها تلفن را با شبکه‌های موبایل ناسازگار می‌کنند.
  - آنها برنامه‌های پیام‌رسانی را حذف می‌کنند
  - آنها عمر باتری را افزایش می‌دهند
explanation: |
  نرم‌افزار آنتی‌ویروس موبایل هیچ محافظتی در برابر فیشینگ یا مجوزهای نادرست ارائه نمی‌دهد و تنها امنیت محدودی در برابر تهدیدات اصلی دارد.
reviewed: false
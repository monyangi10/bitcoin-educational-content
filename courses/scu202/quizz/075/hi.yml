question: मोबाइल एंटीवायरस अनुप्रयोगों की मुख्य सीमाएँ क्या हैं?
answer: वास्तविक खतरों के सामने वे सीमित हैं
wrong_answers:
  - वे फ़ोन को मोबाइल नेटवर्क के साथ असंगत बना देते हैं
  - वे मैसेजिंग एप्लिकेशन हटा देते हैं
  - वे बैटरी जीवन बढ़ाते हैं
explanation: |
  मोबाइल एंटीवायरस सॉफ्टवेयर फ़िशिंग या खराब प्राधिकरणों के विरुद्ध कोई सुरक्षा प्रदान नहीं करता है, तथा मुख्य खतरों के विरुद्ध केवल सीमित सुरक्षा प्रदान करता है।

question: ซอฟต์แวร์ฟรีที่สามารถใช้สร้างไฟล์คอนเทนเนอร์เข้ารหัสที่สามารถเมานต์เหมือนดิสก์เสมือนได้คืออะไร?
answer: VeraCrypt
wrong_answers:
  - KeePassXC
  - Syncthing
  - WinRAR
explanation: |
  VeraCrypt ช่วยให้คุณสร้างคอนเทนเนอร์ที่เข้ารหัสซึ่งสามารถเข้าถึงได้ในรูปแบบดิสก์เสมือนบนระบบปฏิบัติการหลักทั้งหมด
reviewed: false
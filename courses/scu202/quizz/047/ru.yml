question: Какое бесплатное кроссплатформенное программное обеспечение можно использовать для создания зашифрованного файла-контейнера, который можно монтировать как виртуальный диск?
answer: VeraCrypt
wrong_answers:
  - KeePassXC
  - Синхронизация
  - WinRAR
explanation: |
  VeraCrypt позволяет создавать зашифрованные контейнеры, к которым можно обращаться как к виртуальным дискам во всех основных ОС.
reviewed: false
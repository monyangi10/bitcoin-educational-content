question: Кой безплатен междуплатформен софтуер може да се използва за създаване на криптиран контейнерен файл, който може да се монтира като виртуален диск?
answer: VeraCrypt
wrong_answers:
  - KeePassXC
  - Syncthing
  - WinRAR
explanation: |
  VeraCrypt ви позволява да създавате криптирани контейнери, които могат да бъдат достъпни като виртуални дискове във всички основни операционни системи.
reviewed: false
question: چه نرم‌افزار رایگان و چندسکویی می‌تواند برای ایجاد یک فایل کانتینر رمزگذاری‌شده که می‌تواند مانند یک دیسک مجازی نصب شود، استفاده شود؟
answer: ورا کریپت
wrong_answers:
  - KeePassXC
  - سینک‌تینگ
  - وین‌رار
explanation: |
  VeraCrypt به شما اجازه می‌دهد تا کانتینرهای رمزگذاری شده‌ای ایجاد کنید که می‌توانند به عنوان دیسک‌های مجازی در تمامی سیستم‌عامل‌های اصلی دسترسی پیدا کنند.
reviewed: false
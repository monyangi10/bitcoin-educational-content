question: कौन से निःशुल्क, क्रॉस-प्लेटफॉर्म सॉफ्टवेयर का उपयोग एन्क्रिप्टेड कंटेनर फ़ाइल बनाने के लिए किया जा सकता है जिसे वर्चुअल डिस्क की तरह माउंट किया जा सके?
answer: वेराक्रिप्ट
wrong_answers:
  - कीपासएक्ससी
  - सिंकथिंग
  - WinRAR
explanation: |
  वेराक्रिप्ट आपको एन्क्रिप्टेड कंटेनर बनाने की सुविधा देता है, जिसे सभी प्रमुख ऑपरेटिंग सिस्टम पर वर्चुअल डिस्क के रूप में एक्सेस किया जा सकता है।
reviewed: false
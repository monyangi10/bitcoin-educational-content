question: Ni porogarama iyihe y’ubuntu, ikoreshwa kuri sisiteme zose ishobora gukoreshwa mu gukora dosiye ya container inyegejwe ishobora gusomwa muri sisiteme nka disk mpimano?
answer: VeraCrypt
wrong_answers:
  - KeePassXC
  - Syncthing
  - WinRAR
explanation: |
  VeraCrypt ishobora kugufasha gukora ama containers anyegejwe ashobora gukoreshwa nk'ama disks mpimbano ku ma OS yose akomeye.
reviewed: true

question: Коя операционна система доминира на днешния пазар на персонални компютри?
answer: Windows
wrong_answers:
  - macOS
  - GNU/Linux
  - Chrome OS
explanation: |
  Windows има 71% пазарен дял в персоналните компютри благодарение на инсталирането си по подразбиране и обширната софтуерна екосистема.

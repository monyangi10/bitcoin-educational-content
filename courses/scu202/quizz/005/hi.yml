question: आज के पीसी बाजार में किस ऑपरेटिंग सिस्टम का बोलबाला है?
answer: विंडोज़
wrong_answers:
  - मैक ओएस
  - जीएनयू/लिनक्स
  - क्रोम ओएस
explanation: |
  पर्सनल कम्प्यूटरों पर विंडोज़ की 71% बाजार हिस्सेदारी है, जिसका श्रेय इसके डिफॉल्ट इंस्टॉलेशन और व्यापक सॉफ्टवेयर पारिस्थितिकी तंत्र को जाता है।
reviewed: false
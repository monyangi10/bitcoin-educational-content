question: Какая операционная система доминирует на современном рынке ПК?
answer: Windows
wrong_answers:
  - macOS
  - GNU/Linux
  - Chrome OS
explanation: |
  Доля Windows на рынке персональных компьютеров составляет 71% благодаря установке по умолчанию и обширной экосистеме программного обеспечения.
reviewed: false
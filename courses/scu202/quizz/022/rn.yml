question: Ni uwuhe murongo ukoresha ibidukikije vy’ibiro vya Cinnamon ku buryo busanzwe?
answer: Linux
wrong_answers:
  - Ubuntu
  - Debiyani
  - Fedora
explanation: |
  Cinnamon yakozwe n’umugwi wa Linux Mint kugira ngo itange Interface y’ubuhinga bwa none, ya kera, iri hafi ya Windows.

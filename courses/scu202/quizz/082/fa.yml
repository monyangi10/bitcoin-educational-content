question: کدام برنامه معماری به شدت غیرمتمرکز با عدم وجود سرور مرکزی برای مسیریابی پیام ارائه می‌دهد؟
answer: کیت
wrong_answers:
  - تلگرام
  - سیگنال
  - تریما
explanation: |
  کیت بر اساس یک مدل همتا به همتا است که در آن تمام ارتباطات به‌طور مستقیم بین کاربران انجام می‌شود، بدون یک سرور مرکزی، که تضمین‌کننده‌ی مقاومت بالا و محرمانگی است.
reviewed: false
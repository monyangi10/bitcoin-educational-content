question: कौन सा अनुप्रयोग पूर्णतः विकेन्द्रीकृत वास्तुकला प्रदान करता है, जिसमें संदेश रूटिंग के लिए कोई केन्द्रीय सर्वर नहीं है?
answer: कीट
wrong_answers:
  - टेलीग्राम
  - संकेत
  - थ्रीमा
explanation: |
  कीट एक पीयर-टू-पीयर मॉडल पर आधारित है जिसमें सभी संचार बिना किसी केंद्रीय सर्वर के सीधे उपयोगकर्ताओं के बीच होते हैं, जिससे उच्च लचीलापन और गोपनीयता की गारंटी मिलती है।
reviewed: false
question: Кое приложение предлага радикално децентрализирана архитектура без централен сървър за маршрутизиране на съобщенията?
answer: Keet
wrong_answers:
  - Телеграма
  - Сигнал
  - Threema
explanation: |
  Keet се базира на модела peer-to-peer, при който всички комуникации се осъществяват директно между потребителите, без централен сървър, което гарантира висока устойчивост и поверителност.
reviewed: false
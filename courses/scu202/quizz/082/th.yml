question: แอปพลิเคชันใดที่มีสถาปัตยกรรมแบบกระจายอำนาจอย่างสิ้นเชิงโดยไม่มีเซิร์ฟเวอร์กลางสำหรับการกำหนดเส้นทางข้อความ?
answer: Keet
wrong_answers:
  - Telegram
  - Signal
  - Threema
explanation: |
  Keet ใช้โมเดลแบบ peer-to-peer ซึ่งการสื่อสารทั้งหมดจะส่งผ่านโดยตรงระหว่างผู้ใช้ โดยไม่ต้องผ่านเซิร์ฟเวอร์กลาง ทำให้มั่นใจได้ถึงความยืดหยุ่นสูงและความลับในการสื่อสาร
reviewed: false
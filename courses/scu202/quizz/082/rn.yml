question: "Ni iyihe porogarame yubatse mu buryo bukwiragiye ata seriveri nyamukuru yo gutanga ubutumwa?"
answer: "Keet"
wrong_answers:
  - "Telegram"
  - "Signal"
  - "Threema"
explanation: |
  Keet ishingiye ku kigereranyo ca peer-to-peer aho ivy'itumanako vyose bica hagati y'abakoresha, ata server nyamukuru, bikaba vyemeza ukwihangana gukomeye n'ibanga.
reviewed: true

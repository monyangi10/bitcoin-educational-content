question: โปรโตคอลการเข้ารหัส Wi-Fi ใดที่ดีที่สุดสำหรับการรักษาความปลอดภัยเครือข่ายภายในบ้านของคุณ?
answer: WPA3
wrong_answers:
  - WPA
  - WEP
  - Fast BSS
explanation: |
  WPA3 เป็นโปรโตคอลล่าสุดและปลอดภัยที่สุด โดยแก้ไขข้อบกพร่องของเวอร์ชันก่อนหน้าและให้การป้องกันที่ดียิ่งขึ้นต่อการโจมตี
reviewed: false
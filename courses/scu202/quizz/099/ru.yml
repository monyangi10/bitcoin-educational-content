question: Какой протокол шифрования Wi-Fi лучше всего подходит для защиты домашней сети?
answer: WPA3
wrong_answers:
  - WPA
  - WEP
  - Быстрый BSS
explanation: |
  WPA3 - это новейший и наиболее безопасный протокол, в котором исправлены недостатки предыдущих версий и обеспечена более надежная защита от атак.
reviewed: false
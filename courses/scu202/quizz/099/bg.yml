question: Кой протокол за криптиране на Wi-Fi е най-подходящ за защита на домашната ви мрежа?
answer: WPA3
wrong_answers:
  - WPA
  - WEP
  - Бърз BSS
explanation: |
  WPA3 е най-новият и най-сигурен протокол, който коригира недостатъците на предишните версии и предлага по-добра защита срещу атаки.
reviewed: false
question: आपके घरेलू नेटवर्क को सुरक्षित करने के लिए कौन सा वाई-फाई एन्क्रिप्शन प्रोटोकॉल सर्वोत्तम है?
answer: डब्ल्यूपीए3
wrong_answers:
  - डब्ल्यूपीए
  - डब्ल्यूईपी
  - तेज़ बीएसएस
explanation: |
  WPA3 नवीनतम और सबसे सुरक्षित प्रोटोकॉल है, जो पिछले संस्करणों की खामियों को ठीक करता है और हमलों के खिलाफ बेहतर सुरक्षा प्रदान करता है।
reviewed: false
question: Ni uwuhe mugambi watangujwe mu 1983 wo guhingura ubuhinga bwo gukoresha ubuntu bwose?
answer: GNU
wrong_answers:
  - BSD Unix
  - X Idirisha Sisitemu Umugambi
  - Umugambi w'inkomoko yuguruye
explanation: |
  Richard Stallman yatanguje umugambi wa GNU mu mwaka w’1983 kugira ngo akore ubuhinga bwo gukoresha ubuntu bwose.
reviewed: false
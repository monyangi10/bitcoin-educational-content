question: 1983 में पूर्णतः मुक्त ऑपरेटिंग सिस्टम बनाने के लिए कौन सी परियोजना शुरू की गई थी?
answer: जीएनयू
wrong_answers:
  - बीएसडी यूनिक्स
  - एक्स विंडो सिस्टम परियोजना
  - ओपन सोर्स पहल
explanation: |
  रिचर्ड स्टॉलमैन ने 1983 में एक पूर्णतः मुक्त ऑपरेटिंग सिस्टम विकसित करने के लिए GNU परियोजना शुरू की।
reviewed: false
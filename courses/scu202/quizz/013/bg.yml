question: Какъв проект е започнат през 1983 г. за създаване на изцяло свободна операционна система?
answer: GNU
wrong_answers:
  - BSD Unix
  - Проект за системата X Window
  - Инициатива за отворен код
explanation: |
  Ричард Столман стартира проекта GNU през 1983 г., за да разработи напълно свободна операционна система.
reviewed: false
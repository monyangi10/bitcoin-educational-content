question: Какой проект был начат в 1983 году с целью создания полностью свободной операционной системы?
answer: GNU
wrong_answers:
  - BSD Unix
  - Проект X Window System
  - Инициатива по открытому исходному коду
explanation: |
  Ричард Столлман запустил проект GNU в 1983 году, чтобы разработать полностью свободную операционную систему.
reviewed: false
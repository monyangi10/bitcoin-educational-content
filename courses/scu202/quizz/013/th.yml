question: โครงการใดที่เริ่มต้นในปี 1983 เพื่อสร้างระบบปฏิบัติการที่เป็นอิสระอย่างสมบูรณ์?
answer: GNU
wrong_answers:
  - BSD ยูนิกซ์
  - โครงการระบบหน้าต่าง X
  - โอเพ่นซอร์สอินิชิเอทีฟ
explanation: |
  Richard Stallman เปิดตัวโครงการ GNU ในปี 1983 เพื่อพัฒนาระบบปฏิบัติการที่เป็นอิสระอย่างสมบูรณ์
reviewed: false
question: Кой графичен инструмент в Ubuntu улеснява управлението на правилата на защитната стена?
answer: GUFW
wrong_answers:
  - GEdit
  - Nautilus
  - Синаптичен
explanation: |
  GUFW е графичен Interface за защитната стена UFW, който ви позволява да активирате, деактивирате и конфигурирате правила, без да преминавате през терминала.

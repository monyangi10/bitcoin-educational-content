question: เครื่องมือกราฟิกใดใน Ubuntu ที่ทำให้ง่ายต่อการจัดการกฎไฟร์วอลล์?
answer: GUFW
wrong_answers:
  - GEdit
  - นอติลุส
  - ซินแนปติก
explanation: |
  GUFW เป็นส่วนติดต่อกราฟิก Interface สำหรับไฟร์วอลล์ UFW ช่วยให้คุณสามารถเปิดใช้งาน ปิดใช้งาน และกำหนดค่ากฎต่างๆ ได้โดยไม่ต้องผ่านทางเทอร์มินัล
reviewed: false
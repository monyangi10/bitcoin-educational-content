question: उबंटू में कौन सा ग्राफिकल टूल फ़ायरवॉल नियमों को प्रबंधित करना आसान बनाता है?
answer: जीयूएफडब्ल्यू
wrong_answers:
  - जीएडिट
  - नॉटिलस
  - synaptic
explanation: |
  GUFW, UFW फ़ायरवॉल के लिए एक ग्राफ़िकल Interface है, जो आपको टर्मिनल के माध्यम से जाए बिना नियमों को सक्रिय, निष्क्रिय और कॉन्फ़िगर करने में सक्षम बनाता है।

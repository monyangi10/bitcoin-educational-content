question: کدام برنامه ترجمه متن باز با موتورهای مختلف کار می‌کند و متون ترجمه شده شما را جمع‌آوری نمی‌کند؟
answer: ترجمه شما
wrong_answers:
  - ترجمه گوگل
  - دیپ‌ال
  - مترجم مایکروسافت
explanation: |
  TranslateYou به عنوان یک Interface برای چندین موتور عمل می‌کند، بدون ردیابی یا جمع‌آوری داده‌های شخصی، برخلاف خدمات اختصاصی.

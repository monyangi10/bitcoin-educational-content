question: कौन सा ओपन सोर्स अनुवाद एप्लीकेशन विभिन्न इंजनों के साथ काम करता है और आपके अनुवादित पाठों को एकत्रित नहीं करता है?
answer: अनुवाद करेंआप
wrong_answers:
  - गूगल अनुवाद
  - डीपएल
  - माइक्रोसॉफ्ट अनुवादक
explanation: |
  ट्रांसलेटयू कई इंजनों के लिए Interface के रूप में कार्य करता है, मालिकाना सेवाओं के विपरीत, व्यक्तिगत डेटा को ट्रैक या एकत्रित किए बिना।
reviewed: false
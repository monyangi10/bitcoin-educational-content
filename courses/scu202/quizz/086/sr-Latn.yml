question: Koja aplikacija za prevođenje otvorenog koda radi sa različitim engine-ima i ne prikuplja vaše prevedene tekstove?
answer: TranslateYou
wrong_answers:
  - Google Translate
  - DeepL
  - Microsoft Translator
explanation: |
  TranslateYou deluje kao interfejs za nekoliko pretraživača, bez praćenja ili prikupljanja ličnih podataka, za razliku od vlasničkih usluga.
reviewed: true

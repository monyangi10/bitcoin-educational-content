question: วิธีการล็อคหน้าจอที่แนะนำมากที่สุดสำหรับสมาร์ทโฟนคืออะไร?
answer: รหัสผ่านตัวอักษรและตัวเลข
wrong_answers:
  - แผนภาพกราฟิก
  - การจดจำใบหน้า
  - ไม่มีการล็อก
explanation: |
  รหัสผ่านที่เป็นตัวอักษรและตัวเลขให้การต้านทานที่ดีที่สุดต่อความพยายามเข้าถึงโดยไม่ได้รับอนุญาต ซึ่งต่างจากรูปแบบกราฟิกหรือไบโอเมตริกซ์
reviewed: false
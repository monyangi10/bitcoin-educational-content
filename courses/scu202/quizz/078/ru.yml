question: Какой метод блокировки экрана лучше всего подходит для смартфонов?
answer: Буквенно-цифровой пароль
wrong_answers:
  - Графическая диаграмма
  - Распознавание лиц
  - Без блокировки
explanation: |
  Буквенно-цифровые пароли обеспечивают наилучшую устойчивость к попыткам несанкционированного доступа, в отличие от графических схем или биометрии.
reviewed: false
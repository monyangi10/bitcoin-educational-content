question: Кой е най-добрият препоръчителен метод за заключване на екрана на смартфон?
answer: Буквено-цифрова парола
wrong_answers:
  - Графична схема
  - Разпознаване на лица
  - Без заключване
explanation: |
  Буквено-цифровите пароли са най-устойчиви на опити за неоторизиран достъп, за разлика от графичните схеми или биометричните данни.
reviewed: false
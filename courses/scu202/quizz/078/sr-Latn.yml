question: Koji je najbolji preporučeni metod zaključavanja ekrana za pametni telefon?
answer: Alfanumerička lozinka
wrong_answers:
  - Grafički dijagram
  - Prepoznavanje lica
  - Bez zaključavanja
explanation: |
  Alfanumeričke lozinke nude najbolji otpor pokušajima neovlašćenog pristupa, za razliku od grafičkih šema ili biometrije.
reviewed: true

question: स्मार्टफोन के लिए सबसे अच्छी स्क्रीन-लॉकिंग विधि क्या है?
answer: अल्फ़ान्यूमेरिक पासवर्ड
wrong_answers:
  - ग्राफिक आरेख
  - चेहरे की पहचान
  - कोई लॉकिंग नहीं
explanation: |
  ग्राफिकल योजनाओं या बायोमेट्रिक्स के विपरीत, अल्फ़ान्यूमेरिक पासवर्ड अनधिकृत पहुंच प्रयासों के लिए सबसे अच्छा प्रतिरोध प्रदान करते हैं।
reviewed: false
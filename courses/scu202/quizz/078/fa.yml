question: بهترین روش توصیه‌شده برای قفل‌کردن صفحه‌نمایش یک گوشی هوشمند چیست؟
answer: رمز عبور الفبایی-عددی
wrong_answers:
  - نمودار گرافیکی
  - تشخیص چهره
  - بدون قفل کردن
explanation: |
  رمزهای عبور الفبایی-عددی بهترین مقاومت را در برابر تلاش‌های دسترسی غیرمجاز ارائه می‌دهند، برخلاف طرح‌های گرافیکی یا بیومتریک.
reviewed: false
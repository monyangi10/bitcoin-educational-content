question: Какво често трябва да направите след инсталиране на критична актуализация на операционната система, за да приложите изцяло пачовете?
answer: Рестартиране на компютъра
wrong_answers:
  - Възстановяване на паролата
  - Изключване на Wi-Fi мрежата
  - Изтриване на временни файлове
explanation: |
  Някои актуализации на операционната система, като например тези за ядрото или критичните библиотеки, влизат в сила само след рестартиране на машината.
reviewed: false
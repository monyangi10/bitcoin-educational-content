question: Что нужно сделать после установки критического обновления ОС, чтобы полностью применить исправления?
answer: Перезагрузите компьютер
wrong_answers:
  - Сброс пароля
  - Отключите сеть Wi-Fi
  - Удалите временные файлы
explanation: |
  Некоторые обновления операционной системы, например обновления ядра или критических библиотек, вступают в силу только после перезагрузки машины.
reviewed: false
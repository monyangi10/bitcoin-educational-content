question: किसी महत्वपूर्ण OS अद्यतन को स्थापित करने के बाद, पैच को पूरी तरह से लागू करने के लिए आपको अक्सर क्या करने की आवश्यकता होती है?
answer: कंप्यूटर पुनः आरंभ करें
wrong_answers:
  - पासवर्ड रीसेट
  - वाई-फ़ाई नेटवर्क डिस्कनेक्ट करें
  - अस्थायी फ़ाइलें हटाएँ
explanation: |
  कुछ ऑपरेटिंग सिस्टम अपडेट, जैसे कि कर्नेल या महत्वपूर्ण लाइब्रेरीज़ के लिए अपडेट, केवल मशीन रीबूट के बाद ही प्रभावी होते हैं।
reviewed: false
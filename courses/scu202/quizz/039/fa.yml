question: پس از نصب یک به‌روزرسانی مهم سیستم‌عامل، برای اعمال کامل وصله‌ها اغلب چه کاری باید انجام دهید؟
answer: راه‌اندازی مجدد کامپیوتر
wrong_answers:
  - بازنشانی رمز عبور
  - قطع اتصال شبکه Wi-Fi
  - حذف فایل‌های موقت
explanation: |
  برخی از به‌روزرسانی‌های سیستم‌عامل، مانند به‌روزرسانی‌های مربوط به هسته یا کتابخانه‌های حیاتی، تنها پس از راه‌اندازی مجدد دستگاه اعمال می‌شوند.
reviewed: false
question: Nakon instalacije kritične OS nadogradnje, šta često treba da uradite da biste u potpunosti primenili zakrpe?
answer: Ponovo pokrenuti računar
wrong_answers:
  - Resetovati lozinku
  - Isključiti Wi-Fi mrežu
  - Izbrisati privremene datoteke
explanation: |
  Neka ažuriranja operativnog sistema, kao što su ona za kernel ili kritične biblioteke, stupaju na snagu tek nakon ponovnog pokretanja mašine.
reviewed: true

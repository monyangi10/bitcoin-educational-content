question: หลังจากติดตั้งการอัปเดตระบบปฏิบัติการที่สำคัญ คุณมักจะต้องทำอะไรเพื่อให้การแก้ไขมีผลอย่างสมบูรณ์?
answer: รีสตาร์ทคอมพิวเตอร์
wrong_answers:
  - รีเซ็ตรหัสผ่าน
  - ตัดการเชื่อมต่อเครือข่าย Wi-Fi
  - ลบไฟล์ชั่วคราว
explanation: |
  การอัปเดตระบบปฏิบัติการบางอย่าง เช่น การอัปเดตสำหรับเคอร์เนลหรือไลบรารีที่สำคัญ จะมีผลหลังจากรีบูตเครื่องเท่านั้น
reviewed: false
question: ส่วนประกอบใดของสภาพแวดล้อมเดสก์ท็อปที่ใช้ในการนำทางไฟล์และโฟลเดอร์ด้วยสายตา?
answer: ตัวจัดการไฟล์
wrong_answers:
  - ผู้จัดการ Session
  - คอมโพเซอร์ X11
  - ตัวจัดการแพ็กเกจ
explanation: |
  ตัวจัดการไฟล์ (เช่น Nautilus, Dolphin, Thunar) ช่วยให้ผู้ใช้จัดการไฟล์และโฟลเดอร์ผ่านกราฟิก Interface
reviewed: false
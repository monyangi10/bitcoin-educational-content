question: डेस्कटॉप वातावरण के किस घटक का उपयोग फ़ाइलों और फ़ोल्डरों को दृश्य रूप से नेविगेट करने के लिए किया जाता है?
answer: फ़ाइल मैनेजर
wrong_answers:
  - सत्र प्रबंधक
  - संगीतकार X11
  - पैकेज प्रबंधक
explanation: |
  फ़ाइल प्रबंधक (जैसे नॉटिलस, डॉल्फिन, थुनार) उपयोगकर्ता को ग्राफ़िकल Interface के माध्यम से फ़ाइलों और फ़ोल्डरों का प्रबंधन करने की सुविधा देता है।
reviewed: false
question: Кой компонент на работната среда се използва за визуална навигация по файлове и папки?
answer: Файлов мениджър
wrong_answers:
  - Мениджър на сесии
  - Композитор X11
  - Мениджър на пакети
explanation: |
  Файловият мениджър (като Nautilus, Dolphin, Thunar) позволява на потребителя да управлява файлове и папки чрез графичен Interface.
reviewed: false
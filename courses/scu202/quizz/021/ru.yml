question: Какой компонент среды рабочего стола используется для визуальной навигации по файлам и папкам?
answer: Файловый менеджер
wrong_answers:
  - Менеджер сеансов
  - Composer X11
  - Менеджер пакетов
explanation: |
  Файловый менеджер (например, Nautilus, Dolphin, Thunar) позволяет пользователю управлять файлами и папками с помощью графического интерфейса Interface.
reviewed: false
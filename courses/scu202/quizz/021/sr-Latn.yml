question: Koja komponenta desktop okruženja se koristi za vizuelnu navigaciju kroz fajlove i foldere?
answer: Upravljač datotekama
wrong_answers:
  - Upravljač sesijama
  - Kompozitor X11
  - Upravljač paketima
explanation: |
  Upravljač datotekama (kao što su Nautilus, Dolphin, Thunar) omogućava korisniku upravljanje datotekama i fasciklama putem grafičkog Interface.
reviewed: false
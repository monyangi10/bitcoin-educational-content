question: کدام مؤلفه از یک محیط دسکتاپ برای پیمایش بصری فایل‌ها و پوشه‌ها استفاده می‌شود؟
answer: مدیر فایل
wrong_answers:
  - مدیر جلسه
  - آهنگساز X11
  - مدیر بسته
explanation: |
  مدیر فایل (مانند Nautilus، Dolphin، Thunar) به کاربر اجازه می‌دهد تا فایل‌ها و پوشه‌ها را از طریق یک Interface گرافیکی مدیریت کند.
reviewed: false
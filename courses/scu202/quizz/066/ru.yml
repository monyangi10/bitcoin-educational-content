question: Какие локальные данные позволяют рекламодателям отслеживать ваши привычки при посещении различных сайтов?
answer: Сторонние файлы cookie
wrong_answers:
  - Код JavaScript
  - Краеведение
  - Сертификат SSL
explanation: |
  Сторонние файлы cookie, размещаемые внешними рекламными агентствами, используются для отслеживания активности пользователей на различных сайтах и создания рекламного профиля.
reviewed: false
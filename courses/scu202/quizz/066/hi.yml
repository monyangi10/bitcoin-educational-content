question: कौन सा स्थानीय डेटा विज्ञापनदाताओं को एकाधिक साइटों पर आपकी ब्राउज़िंग आदतों को ट्रैक करने में सक्षम बनाता है?
answer: तृतीय-पक्ष कुकीज़
wrong_answers:
  - जावास्क्रिप्ट कोड
  - स्थानीय इतिहास
  - SSL प्रमाणपत्र
explanation: |
  बाह्य विज्ञापन एजेंसियों द्वारा रखे गए तृतीय-पक्ष कुकीज़ का उपयोग विभिन्न साइटों पर उपयोगकर्ता गतिविधि को ट्रैक करने और विज्ञापन प्रोफ़ाइल स्थापित करने के लिए किया जाता है।
reviewed: false
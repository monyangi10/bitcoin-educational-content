question: ข้อมูลท้องถิ่นใดที่ช่วยให้ผู้โฆษณาติดตามพฤติกรรมการท่องเว็บของคุณผ่านหลายเว็บไซต์ได้?
answer: คุกกี้ของบุคคลที่สาม
wrong_answers:
  - โค้ด JavaScript
  - ประวัติศาสตร์ท้องถิ่น
  - ใบรับรอง SSL
explanation: |
  คุกกี้ของบุคคลที่สาม ซึ่งวางโดยหน่วยงานโฆษณาภายนอก ถูกใช้เพื่อติดตามกิจกรรมของผู้ใช้บนเว็บไซต์ต่าง ๆ และสร้างโปรไฟล์โฆษณา
reviewed: false
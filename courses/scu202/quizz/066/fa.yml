question: چه داده‌های محلی به تبلیغ‌کنندگان امکان می‌دهد تا عادات مرور شما را در چندین سایت ردیابی کنند؟
answer: کوکی‌های شخص ثالث
wrong_answers:
  - کد جاوااسکریپت
  - تاریخ محلی
  - گواهی SSL
explanation: |
  کوکی‌های شخص ثالث، که توسط آژانس‌های تبلیغاتی خارجی قرار داده می‌شوند، برای ردیابی فعالیت کاربران در سایت‌های مختلف و ایجاد یک پروفایل تبلیغاتی استفاده می‌شوند.
reviewed: false
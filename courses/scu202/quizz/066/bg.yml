question: Кои местни данни позволяват на рекламодателите да проследяват навиците ви за сърфиране в множество сайтове?
answer: Бисквитки на трети страни
wrong_answers:
  - Код на JavaScript
  - Местна история
  - SSL сертификатът
explanation: |
  Бисквитките на трети страни, поставени от външни рекламни агенции, се използват за проследяване на активността на потребителите в различни сайтове и за създаване на рекламен профил.
reviewed: false
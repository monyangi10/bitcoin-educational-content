question: โครงการใดที่วางรากฐานของอินเทอร์เน็ตสมัยใหม่ในช่วงปลายทศวรรษ 1960?
answer: ARPANET
wrong_answers:
  - เวิลด์ไวด์เว็บ
  - TCP/IP
  - อีเธอร์เน็ต
explanation: |
  ARPANET เป็นเครือข่ายเชื่อมต่อกันแห่งแรก ออกแบบมาเพื่อเชื่อมโยงศูนย์วิจัยหลายแห่ง และเป็นบรรพบุรุษโดยตรงของอินเทอร์เน็ต
reviewed: false
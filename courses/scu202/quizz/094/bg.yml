question: Кой проект полага основите на съвременния интернет в края на 60-те години на миналия век?
answer: ARPANET
wrong_answers:
  - World Wide Web
  - TCP/IP
  - Ethernet
explanation: |
  ARPANET е първата взаимосвързана мрежа, предназначена да свърже няколко изследователски центъра, и е пряк предшественик на интернет.
reviewed: false
question: Какой проект заложил основы современного Интернета в конце 1960-х годов?
answer: ARPANET
wrong_answers:
  - Всемирная паутина
  - TCP/IP
  - Ethernet
explanation: |
  ARPANET была первой объединенной сетью, предназначенной для связи нескольких исследовательских центров, и является прямым предшественником Интернета.
reviewed: false
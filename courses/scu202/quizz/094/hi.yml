question: 1960 के दशक के अंत में किस परियोजना ने आधुनिक इंटरनेट की नींव रखी?
answer: अरपानेट
wrong_answers:
  - वर्ल्ड वाइड वेब
  - टीसीपी/आईपी
  - ईथरनेट
explanation: |
  ARPANET पहला अंतर्संबंधित नेटवर्क था, जिसे कई अनुसंधान केंद्रों को जोड़ने के लिए डिज़ाइन किया गया था, और यह इंटरनेट का प्रत्यक्ष अग्रदूत है।
reviewed: false
question: कौन सी सॉफ्टवेयर श्रेणी कंप्यूटर पर हमलों के लिए सबसे महत्वपूर्ण प्रवेश बिंदुओं में से एक का प्रतिनिधित्व करती है?
answer: वेब ब्राउज़र
wrong_answers:
  - पीडीएफ रीडर
  - पाठ संपादक
  - फ़ाइल प्रबंधक
explanation: |
  वेब ब्राउज़र लगातार बाहरी सामग्री के संपर्क में रहता है, जिससे यह साइबर अपराधियों के लिए प्रमुख आक्रमणकारी बन जाता है।
reviewed: false
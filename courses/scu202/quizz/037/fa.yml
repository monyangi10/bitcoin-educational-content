question: کدام دسته نرم‌افزاری یکی از مهم‌ترین نقاط ورود برای حملات به یک کامپیوتر را نشان می‌دهد؟
answer: مرورگر وب
wrong_answers:
  - خواننده PDF
  - ویرایشگر متن
  - مدیر فایل
explanation: |
  مرورگر وب به طور مداوم در معرض محتوای خارجی قرار دارد و آن را به یک بردار حمله اصلی برای مجرمان سایبری تبدیل می‌کند.
reviewed: false
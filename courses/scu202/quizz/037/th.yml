question: ซอฟต์แวร์ประเภทใดที่เป็นจุดเริ่มต้นที่สำคัญที่สุดสำหรับการโจมตีบนคอมพิวเตอร์?
answer: เว็บเบราว์เซอร์
wrong_answers:
  - The PDF reader
  - โปรแกรมแก้ไขข้อความ
  - ตัวจัดการไฟล์
explanation: |
  เว็บเบราว์เซอร์ถูกเปิดเผยต่อเนื้อหาภายนอกอย่างต่อเนื่อง ทำให้เป็นช่องทางการโจมตีหลักสำหรับอาชญากรไซเบอร์
reviewed: false
question: Ni uruhe rwego rwa porogarama rugereranya kimwe mu bibanza bihambaye cane vyo kwinjiramwo ibitero kuri mudasobwa?
answer: Umucukumbuzi w'urubuga
wrong_answers:
  - Umusomyi wa PDF
  - Umuhinduzi w'inyandiko
  - Umuyobozi wa dosiye
explanation: |
  Uwo mucukumbuzi w’urubuga aguma abona ibintu vyo hanze, ivyo bikaba bituma abasuma bashobora gutera.
reviewed: false
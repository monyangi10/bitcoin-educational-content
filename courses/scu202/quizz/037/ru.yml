question: Какая категория программного обеспечения представляет собой одну из наиболее критичных точек входа для атак на компьютер?
answer: Веб-браузер
wrong_answers:
  - Программа для чтения PDF-файлов
  - Текстовый редактор
  - Файловый менеджер
explanation: |
  Веб-браузер постоянно подвергается воздействию внешнего контента, что делает его основным вектором атаки для злоумышленников.
reviewed: false
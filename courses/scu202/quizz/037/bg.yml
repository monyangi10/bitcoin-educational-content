question: Коя категория софтуер представлява една от най-критичните входни точки за атаки срещу компютъра?
answer: Уеб браузърът
wrong_answers:
  - PDF четецът
  - Текстов редактор
  - Файловият мениджър
explanation: |
  Уеб браузърът е постоянно изложен на външно съдържание, което го прави основен вектор за атаки от страна на киберпрестъпниците.
reviewed: false
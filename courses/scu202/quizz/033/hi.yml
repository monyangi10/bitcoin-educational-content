question: बूट समय पर अहस्ताक्षरित कोड के निष्पादन को रोकने के लिए UEFI में कौन सी प्रणाली सक्षम होनी चाहिए?
answer: सुरक्षित बूट
wrong_answers:
  - तेज़ बूट
  - तेज़ स्टार्टअप
  - विश्वसनीय प्लेटफ़ॉर्म मॉड्यूल (TPM)
explanation: |
  सुरक्षित बूट यह सुनिश्चित करता है कि केवल प्रमाणित सॉफ्टवेयर ही सिस्टम को बूट कर सकता है, जिससे बूटकिट/रूटकिट संक्रमण का जोखिम सीमित हो जाता है।
reviewed: false
question: Какой механизм должен быть включен в UEFI, чтобы предотвратить выполнение неподписанного кода во время загрузки?
answer: Безопасная загрузка
wrong_answers:
  - Быстрая загрузка
  - Быстрый стартап
  - Модуль доверенной платформы (TPM)
explanation: |
  Secure Boot гарантирует, что только проверенное программное обеспечение может загружать систему, тем самым ограничивая риск заражения буткитом/руткитом.
reviewed: false
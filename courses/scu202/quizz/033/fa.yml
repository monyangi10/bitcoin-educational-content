question: چه مکانیزمی باید در UEFI فعال شود تا از اجرای کدهای بدون امضا در زمان بوت جلوگیری کند؟
answer: بوت امن
wrong_answers:
  - بوت سریع
  - راه‌اندازی سریع
  - ماژول پلتفرم قابل اعتماد (TPM)
explanation: |
  بوت امن تضمین می‌کند که فقط نرم‌افزار تأیید شده می‌تواند سیستم را بوت کند و بدین ترتیب خطر عفونت بوت‌کیت/روت‌کیت را محدود می‌کند.
reviewed: false
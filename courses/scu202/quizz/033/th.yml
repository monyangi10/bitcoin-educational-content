question: กลไกใดที่ต้องเปิดใช้งานใน UEFI เพื่อป้องกันการรันโค้ดที่ไม่ได้ลงนามในขณะบูต?
answer: Secure Boot
wrong_answers:
  - บูตเร็ว
  - Fast Startup
  - โมดูลแพลตฟอร์มที่เชื่อถือได้ (TPM)
explanation: |
  Secure Boot ช่วยให้มั่นใจได้ว่าเฉพาะซอฟต์แวร์ที่ผ่านการรับรองเท่านั้นที่สามารถบูตระบบได้ จึงจำกัดความเสี่ยงของการติดเชื้อ bootkit/rootkit
reviewed: false
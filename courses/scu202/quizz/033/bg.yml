question: Кой механизъм трябва да бъде активиран в UEFI, за да се предотврати изпълнението на неподписан код по време на зареждане?
answer: Сигурно стартиране
wrong_answers:
  - Бързо зареждане
  - Бързо стартиране
  - Модул на доверена платформа (TPM)
explanation: |
  Secure Boot гарантира, че само автентифициран софтуер може да стартира системата, като по този начин се ограничава рискът от заразяване с bootkit/rootkit.
reviewed: false
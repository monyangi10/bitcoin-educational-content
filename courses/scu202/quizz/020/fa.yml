question: کدام یک از این محیط‌های دسکتاپ به‌ویژه برای ماشین‌های قدیمی‌تر یا کم‌قدرت‌تر توصیه می‌شود؟
answer: ال‌ایکس‌کیوتی
wrong_answers:
  - گنوم
  - دارچین
  - پلاسما KDE
explanation: |
  ‏LXQt، مانند Xfce، منابع کمی مصرف می‌کند و برای اجرا به‌صورت کارآمد بر روی سخت‌افزار با عملکرد پایین طراحی شده است.
reviewed: false
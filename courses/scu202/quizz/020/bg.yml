question: Коя от тези десктоп среди е особено препоръчителна за по-стари или по-малко мощни машини?
answer: LXQt
wrong_answers:
  - GNOME
  - Канела
  - KDE Plasma
explanation: |
  LXQt, както и Xfce, консумира малко ресурси и е проектиран да работи ефективно на хардуер с ниска производителност.
reviewed: false
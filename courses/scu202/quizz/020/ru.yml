question: Какое из этих окружений рабочего стола особенно рекомендуется для старых или менее мощных машин?
answer: LXQt
wrong_answers:
  - GNOME
  - Корица
  - KDE Plasma
explanation: |
  LXQt, как и Xfce, потребляет мало ресурсов и рассчитан на эффективную работу на низкопроизводительном оборудовании.
reviewed: false
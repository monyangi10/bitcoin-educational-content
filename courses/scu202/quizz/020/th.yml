question: สภาพแวดล้อมเดสก์ท็อปใดที่แนะนำเป็นพิเศษสำหรับเครื่องที่เก่าหรือมีประสิทธิภาพน้อยกว่า?
answer: LXQt
wrong_answers:
  - GNOME
  - อบเชย
  - KDE Plasma
explanation: |
  LXQt เช่นเดียวกับ Xfce ใช้ทรัพยากรน้อยและถูกออกแบบมาให้ทำงานได้อย่างมีประสิทธิภาพบนฮาร์ดแวร์ที่มีประสิทธิภาพต่ำ
reviewed: false
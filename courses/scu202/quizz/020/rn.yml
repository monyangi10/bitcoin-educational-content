question: Ni ikihe kibanza c’ibiro uhanuriwe gukoresha cane cane ku mashini za kera canke zidakomeye cane?
answer: LXQt
wrong_answers:
  - GNOME
  - Cinnamon
  - KDE Plasma
explanation: |
  LXQt, nka Xfce, ikoresha uburyo bw'ibikoresho buke kandi igenewe gukora neza ku bikoresho bidakora neza cane.
reviewed: true

question: کدام موتور رندرینگ امروزه بیشترین استفاده را دارد و اکثر مرورگرهای مدرن را قدرت می‌بخشد؟
answer: چشمک زدن
wrong_answers:
  - گکو
  - تری‌دنت
  - وب‌کیت
explanation: |
  بلینک، که توسط گوگل از یک WebKit Fork توسعه یافته است، امروزه موتور رندر غالب است که کروم، اج، اپرا، بریو، ویوالدی و موارد دیگر را قدرت می‌بخشد.
reviewed: false
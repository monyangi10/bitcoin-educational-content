question: आधिकारिक उबंटू रिपॉजिटरी से सॉफ्टवेयर इंस्टॉल करने के लिए किस कमांड का उपयोग किया जा सकता है?
answer: सुडो एपीटी इंस्टॉल
wrong_answers:
  - सुडो यम इंस्टॉल
  - सुडो स्नैप क्रिएट
  - सॉफ़्टवेयर इंस्टॉल करें
explanation: |
  "sudo apt install" कमांड, उबंटू की मूल विधि, APT पैकेज मैनेजर के माध्यम से एक सॉफ्टवेयर पैकेज स्थापित करता है।
reviewed: false
question: Ni ibwirizwa irihe rishobora gukoreshwa mu gushiramwo porogarame zivuye mu bubiko bwa Ubuntu buzwi?
answer: sudo apt install
wrong_answers:
  - sudo yum install
  - sudo snap create
  - install-software
explanation: |
  Ibwirizwa rya "sudo apt install" rishiramwo pake ya porogarame biciye ku butunganyirizo bw'amapaki bwa APT, uburyo kavukire kuri Ubuntu.
reviewed: true

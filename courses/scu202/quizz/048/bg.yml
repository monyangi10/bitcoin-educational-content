question: Защо криптирането на пълен диск или USB ключ е от решаващо значение за сигурността на вашите данни?
answer: Предотвратява неоторизиран достъп до файлове
wrong_answers:
  - Ускорява четенето и писането на файлове
  - Защита от хардуерна повреда
  - Улеснява споделянето на диска
explanation: |
  Пълното криптиране прави данните напълно неизползваеми без ключа или паролата, дори ако нападателят физически притежава диска.
reviewed: false
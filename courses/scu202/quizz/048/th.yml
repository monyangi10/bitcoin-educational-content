question: ทำไมการเข้ารหัสดิสก์เต็มหรือคีย์ USB จึงมีความสำคัญต่อความปลอดภัยของข้อมูลของคุณ?
answer: มันป้องกันการเข้าถึงไฟล์โดยไม่ได้รับอนุญาต
wrong_answers:
  - เร่งความเร็วในการอ่านและเขียนไฟล์
  - ป้องกันความล้มเหลวของฮาร์ดแวร์
  - มันทำให้การแชร์ดิสก์ง่ายขึ้น
explanation: |
  การเข้ารหัสแบบเต็มทำให้ข้อมูลไม่สามารถใช้งานได้เลยหากไม่มีคีย์หรือรหัสผ่าน แม้ว่าผู้โจมตีจะครอบครองดิสก์ทางกายภาพก็ตาม
reviewed: false
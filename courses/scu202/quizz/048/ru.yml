question: Почему шифрование полного диска или USB-носителя имеет решающее значение для безопасности ваших данных?
answer: Предотвращает несанкционированный доступ к файлам
wrong_answers:
  - Ускоряет чтение и запись файлов
  - Защита от сбоев оборудования
  - Это упрощает совместное использование дисков
explanation: |
  Полное шифрование делает данные полностью непригодными для использования без ключа или пароля, даже если злоумышленник физически завладел диском.
reviewed: false
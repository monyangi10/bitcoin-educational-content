question: आपके डेटा की सुरक्षा के लिए पूर्ण डिस्क या यूएसबी कुंजी एन्क्रिप्शन महत्वपूर्ण क्यों है?
answer: यह फ़ाइलों तक अनधिकृत पहुँच को रोकता है
wrong_answers:
  - फ़ाइल पढ़ने और लिखने की गति बढ़ाता है
  - हार्डवेयर विफलता से सुरक्षा करता है
  - यह डिस्क साझा करना आसान बनाता है
explanation: |
  पूर्ण एन्क्रिप्शन कुंजी या पासवर्ड के बिना डेटा को पूरी तरह से अनुपयोगी बना देता है, भले ही हमलावर के पास डिस्क भौतिक रूप से मौजूद हो।
reviewed: false
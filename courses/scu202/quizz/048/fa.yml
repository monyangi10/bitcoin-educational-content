question: چرا رمزگذاری کامل دیسک یا کلید USB برای امنیت داده‌های شما حیاتی است؟
answer: این از دسترسی غیرمجاز به فایل‌ها جلوگیری می‌کند
wrong_answers:
  - سرعت خواندن و نوشتن فایل را افزایش می‌دهد
  - در برابر خرابی سخت‌افزار محافظت می‌کند
  - این کار اشتراک‌گذاری دیسک را آسان‌تر می‌کند
explanation: |
  رمزگذاری کامل باعث می‌شود داده‌ها بدون کلید یا رمز عبور کاملاً غیرقابل استفاده باشند، حتی اگر مهاجم به‌صورت فیزیکی دیسک را در اختیار داشته باشد.
reviewed: false
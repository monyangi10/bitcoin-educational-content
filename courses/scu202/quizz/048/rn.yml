question: Ni kuki kunyegeza amakuru yose ari kuri disk canke urufunguzo rwa USB ari ngirakamaro ku bijanye n’umutekano w’amakuru yawe?
answer: Bibuza gushika ku madosiye mu buryo butemewe
wrong_answers:
  - Kwihutisha gusoma no kwandika dosiye
  - Birinda ibikoresho kwononekara
  - Bituma gusangira disk vyoroha
explanation: |
  Kunyegeza amakuru yose ari kuri disk bituma amakuru adashobora gukoreshwa ata rufunguzo canke ijambo ry'ibanga, naho uwutera yoba afise iyo disk mu ntoki.
reviewed: true

question: Какова основная функция ядра в операционной системе?
answer: Управление доступом к оборудованию
wrong_answers:
  - Показать рекламу
  - Управление учетными записями пользователей
  - Автоматическая установка приложений
explanation: |
  Ядро организует доступ к оборудованию, одновременное выполнение процессов и безопасность, скрывая от пользователя сложность схемы.
reviewed: false
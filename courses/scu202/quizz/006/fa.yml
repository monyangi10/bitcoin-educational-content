question: وظیفه اصلی هسته در یک سیستم‌عامل چیست؟
answer: مدیریت دسترسی به تجهیزات
wrong_answers:
  - نمایش تبلیغات
  - مدیریت حساب‌های کاربری
  - نصب برنامه‌ها به‌صورت خودکار
explanation: |
  هسته دسترسی به سخت‌افزار، اجرای همزمان فرآیندها و امنیت را هماهنگ می‌کند، در حالی که پیچیدگی مدار را از کاربر پنهان می‌کند.
reviewed: false
question: ऑपरेटिंग सिस्टम में कर्नेल का मुख्य कार्य क्या है?
answer: उपकरणों तक पहुँच प्रबंधित करें
wrong_answers:
  - विज्ञापन दिखाएं
  - उपयोगकर्ता खाते प्रबंधित करें
  - एप्लिकेशन स्वचालित रूप से इंस्टॉल करें
explanation: |
  कर्नेल हार्डवेयर पहुंच, समवर्ती प्रक्रिया निष्पादन और सुरक्षा को व्यवस्थित करता है, जबकि सर्किट जटिलता को उपयोगकर्ता से छुपाता है।

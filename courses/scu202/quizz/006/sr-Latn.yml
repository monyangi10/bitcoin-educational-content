question: Koja je glavna funkcija kernela u operativnom sistemu?
answer: Upravljanje pristupom opremi
wrong_answers:
  - Prikazivanje oglasa
  - Upravljanje korisničkim nalozima
  - Automatski instaliranje aplikacija
explanation: |
  Kernel orkestrira pristup hardveru, istovremeno izvršavanje procesa i bezbednost, dok korisniku skriva složenost električnog kola.
reviewed: true

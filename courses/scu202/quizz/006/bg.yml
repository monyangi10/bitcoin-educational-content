question: Каква е основната функция на ядрото в една операционна система?
answer: Управление на достъпа до оборудване
wrong_answers:
  - Показване на реклами
  - Управление на потребителски акаунти
  - Автоматично инсталиране на приложения
explanation: |
  Ядрото организира достъпа до хардуер, едновременното изпълнение на процеси и сигурността, като същевременно скрива сложността на схемата от потребителя.
reviewed: false
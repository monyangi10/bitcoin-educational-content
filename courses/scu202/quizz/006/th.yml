question: ฟังก์ชันหลักของเคอร์เนลในระบบปฏิบัติการคืออะไร?
answer: จัดการการเข้าถึงอุปกรณ์
wrong_answers:
  - แสดงโฆษณา
  - จัดการบัญชีผู้ใช้
  - ติดตั้งแอปพลิเคชันโดยอัตโนมัติ
explanation: |
  เคอร์เนลจัดการการเข้าถึงฮาร์ดแวร์ การดำเนินการของกระบวนการพร้อมกัน และความปลอดภัย ในขณะที่ซ่อนความซับซ้อนของวงจรจากผู้ใช้
reviewed: false
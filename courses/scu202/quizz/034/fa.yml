question: اولین کاری که باید برای ایمن‌سازی دسترسی به رایانه شخصی خود انجام دهید چیست؟
answer: یک رمز عبور قوی برای جلسه تنظیم کنید
wrong_answers:
  - نصب آنتی‌ویروس
  - پیکربندی فایروال UFW
  - رمزگذاری دیسک را فعال کنید
explanation: |
  رمز عبور جلسه اولین مانع امنیتی برای جلوگیری از دسترسی غیرمجاز به دستگاه شما است، قبل از هر اقدام اضافی دیگر.

question: Что нужно сделать в первую очередь, чтобы защитить доступ к своему персональному компьютеру?
answer: Установите надежный пароль для сеанса
wrong_answers:
  - Установка антивируса
  - Настройка брандмауэра UFW
  - Включить шифрование диска
explanation: |
  Пароль сеанса - это первый барьер безопасности, предотвращающий несанкционированный доступ к вашему компьютеру, перед любыми другими дополнительными мерами.

question: अपने पर्सनल कंप्यूटर तक पहुंच सुरक्षित करने के लिए आपको सबसे पहले क्या करना चाहिए?
answer: एक मजबूत सत्र पासवर्ड सेट करें
wrong_answers:
  - एंटीवायरस स्थापित करना
  - UFW फ़ायरवॉल को कॉन्फ़िगर करना
  - डिस्क एन्क्रिप्शन सक्षम करें
explanation: |
  सत्र पासवर्ड किसी भी अन्य अतिरिक्त उपाय से पहले, आपकी मशीन तक अनधिकृत पहुंच को रोकने के लिए पहला सुरक्षा अवरोध है।
reviewed: false
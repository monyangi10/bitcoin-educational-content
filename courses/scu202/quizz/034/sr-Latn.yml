question: Šta je prva stvar koju treba da uradite kako biste osigurali pristup svom ličnom računaru?
answer: Postavljanje jake lozinke za sesiju
wrong_answers:
  - Instalirate antivirus
  - Konfiguracija UFW firewall-a
  - Omogućavanje šifrovanje diska
explanation: |
  Lozinka sesije je prva sigurnosna barijera za sprečavanje neovlašćenog pristupa vašem uređaju, pre bilo kojih drugih dodatnih mera.
reviewed: true

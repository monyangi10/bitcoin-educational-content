question: สิ่งแรกที่คุณควรทำเพื่อรักษาความปลอดภัยในการเข้าถึงคอมพิวเตอร์ส่วนบุคคลของคุณคืออะไร?
answer: ตั้งรหัสผ่านเซสชันที่แข็งแกร่ง
wrong_answers:
  - การติดตั้งโปรแกรมป้องกันไวรัส
  - กำหนดค่าไฟร์วอลล์ UFW
  - เปิดใช้งานการเข้ารหัสดิสก์
explanation: |
  รหัสผ่านเซสชันเป็นด่านความปลอดภัยแรกในการป้องกันการเข้าถึงเครื่องของคุณโดยไม่ได้รับอนุญาต ก่อนที่จะมีมาตรการเพิ่มเติมอื่น ๆ
reviewed: false
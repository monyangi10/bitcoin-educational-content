question: Ni irihe tegeko rikoreshwa canecane kugira ngo umuntu amenye igikoresho cose kiri kuri Interineti?
answer: IP
wrong_answers:
  - DNS
  - HTTP
  - SMTP
explanation: |
  Iryo Tegeko rya Interineti (IP) canke Internet Protocol mu congereza riha igikoresho cose aderese yihariye kandi rituma packets z’amakuru zishobora gushika ahozija.
reviewed: true

question: Какой протокол в основном используется для идентификации каждой единицы оборудования в Интернете?
answer: IP
wrong_answers:
  - DNS
  - HTTP
  - SMTP
explanation: |
  Протокол Интернета (IP) присваивает каждому устройству уникальный Address и обеспечивает маршрутизацию пакетов данных.
reviewed: false
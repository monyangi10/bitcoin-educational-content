question: इंटरनेट पर प्रत्येक उपकरण की पहचान करने के लिए मुख्यतः किस प्रोटोकॉल का उपयोग किया जाता है?
answer: आई पी
wrong_answers:
  - डीएनएस
  - एचटीटीपी
  - एसएमटीपी
explanation: |
  इंटरनेट प्रोटोकॉल (आईपी) प्रत्येक डिवाइस को एक विशिष्ट Address प्रदान करता है तथा डेटा पैकेटों को रूट करने में सक्षम बनाता है।
reviewed: false
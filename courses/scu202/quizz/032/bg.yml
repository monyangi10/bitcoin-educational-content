question: Кое правило за киберсигурност препоръчва ограничаване на правата на всеки потребител или софтуер до строго необходимото?
answer: Принципът на най-малката привилегия
wrong_answers:
  - Двойно удостоверяване
  - Политика за силна парола
  - Редовно архивиране
explanation: |
  Принципът на най-малките привилегии означава предоставяне само на необходимите права за всяка задача, като по този начин се намалява рискът от компрометиране.
reviewed: false
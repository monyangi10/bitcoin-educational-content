question: Ni sheria gani ya usalama wa mtandao inapendekeza kuweka kikomo haki za kila mtumiaji au programu kwa kile ambacho ni muhimu kabisa?
answer: Kanuni ya upendeleo mdogo
wrong_answers:
  - Uthibitishaji mara mbili
  - Sera thabiti ya nenosiri
  - Hifadhi nakala ya mara kwa mara
explanation: |
  Kanuni ya upendeleo mdogo inamaanisha kutoa haki zinazohitajika tu kwa kila kazi, na hivyo kupunguza hatari ya maelewano.

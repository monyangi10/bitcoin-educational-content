question: กฎความปลอดภัยทางไซเบอร์ใดที่แนะนำให้จำกัดสิทธิ์ของผู้ใช้หรือซอฟต์แวร์แต่ละรายให้เหลือเพียงสิ่งที่จำเป็นอย่างเคร่งครัด?
answer: หลักการสิทธิพิเศษน้อยที่สุด
wrong_answers:
  - การยืนยันตัวตนสองชั้น
  - นโยบายรหัสผ่านที่แข็งแกร่ง
  - การสำรองข้อมูลเป็นประจำ
explanation: |
  หลักการของสิทธิพิเศษน้อยที่สุดหมายถึงการให้สิทธิ์เฉพาะที่จำเป็นสำหรับแต่ละงานเท่านั้น ซึ่งจะช่วยลดความเสี่ยงของการถูกโจมตี
reviewed: false
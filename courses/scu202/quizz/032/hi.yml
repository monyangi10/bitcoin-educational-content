question: कौन सा साइबर सुरक्षा नियम प्रत्येक उपयोगकर्ता या सॉफ्टवेयर के अधिकारों को केवल आवश्यक सीमा तक सीमित करने की अनुशंसा करता है?
answer: न्यूनतम विशेषाधिकार का सिद्धांत
wrong_answers:
  - दोहरा प्रमाणीकरण
  - सशक्त पासवर्ड नीति
  - नियमित बैकअप
explanation: |
  न्यूनतम विशेषाधिकार के सिद्धांत का अर्थ है प्रत्येक कार्य के लिए केवल आवश्यक अधिकार प्रदान करना, जिससे समझौता होने का जोखिम कम हो जाता है।
reviewed: false
question: Koje pravilo sajber bezbednosti preporučuje ograničavanje prava svakog korisnika ili softvera na ono što je strogo neophodno?
answer: Princip najmanjih privilegija
wrong_answers:
  - Dvostruka autentifikacija
  - Pravila za jaku lozinku
  - Redovan bekap
explanation: |
  Princip najmanjih privilegija znači dodeljivanje samo neophodnih prava svakom zadatku, čime se smanjuje rizik od kompromitovanja.
reviewed: true

question: Какое правило кибербезопасности рекомендует ограничить права каждого пользователя или программного обеспечения только тем, что строго необходимо?
answer: Принцип наименьших привилегий
wrong_answers:
  - Двойная аутентификация
  - Политика надежных паролей
  - Регулярное резервное копирование
explanation: |
  Принцип наименьших привилегий означает предоставление только необходимых прав для каждой задачи, что снижает риск компрометации.
reviewed: false
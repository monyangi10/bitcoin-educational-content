question: Ni itegeko irihe ryerekeye umutekano wo kuri Internet risaba ko uburenganzira bw’umuntu wese akoresha canke porogarama wese bugarukira ku vyo ari ngombwa cane?
answer: Ingingo ngenderwako y'agateka gatoyi
wrong_answers:
  - Kwemeza kabiri
  - Ijambobanga rikomeye
  - Gusubiza inyuma ubudasiba
explanation: |
  Ingingo ngenderwako y’agateka gatoyi cane isobanura guha uburenganzira bukenewe gusa ku gikorwa cose, gutyo bikagabanya ingorane zo gusenyera ku mugozi umwe.
reviewed: false
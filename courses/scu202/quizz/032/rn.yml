question: Ni itegeko irihe ryerekeye umutekano wo kuri Internet risaba ko uburenganzira bw’umuntu wese akoresha canke porogarame yose bugarukira kubiri ngombwa cane gusa?
answer: Ihame ry’uburenganzira buke
wrong_answers:
  - Kwemeza uwinjira kabiri
  - Ijambo ry’ibanga rikomeye
  - Gukora ubu biko bw’inyongera (backup) ubudasiba
explanation: |
  Ihame ry’uburenganzira buke risobanura guha uburenganzira bukenewe gusa ku gikorwa cose, gutyo bikagabanya ingorane zo guhunganywa.
reviewed: true

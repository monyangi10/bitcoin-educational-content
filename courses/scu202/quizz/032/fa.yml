question: کدام قانون امنیت سایبری توصیه می‌کند که حقوق هر کاربر یا نرم‌افزار به آنچه که به‌طور دقیق لازم است محدود شود؟
answer: اصل حداقل امتیاز
wrong_answers:
  - احراز هویت دو مرحله‌ای
  - سیاست رمز عبور قوی
  - پشتیبان‌گیری منظم
explanation: |
  اصل حداقل امتیاز به معنای اعطای تنها حقوق لازم به هر وظیفه است، که در نتیجه خطر به خطر افتادن را کاهش می‌دهد.
reviewed: false
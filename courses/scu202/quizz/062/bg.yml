question: Кой браузър гарантира анонимност чрез пренасочване на трафика през децентрализирана мрежа с висока латентност?
answer: Браузър Tor
wrong_answers:
  - Браузър Mullvad
  - Lynx
  - LibreWolf
explanation: |
  Браузърът Tor разчита на мрежата Tor за анонимизиране на сърфирането с цената на значителен спад в производителността.
reviewed: false
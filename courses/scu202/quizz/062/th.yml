question: เบราว์เซอร์ใดที่รับประกันการไม่เปิดเผยตัวตนโดยการเปลี่ยนเส้นทางการรับส่งข้อมูลผ่านเครือข่ายที่กระจายศูนย์แต่มีความหน่วงสูง?
answer: Tor Browser
wrong_answers:
  - Mullvad Browser
  - ลิงซ์
  - LibreWolf
explanation: |
  Tor Browser อาศัยเครือข่าย Tor เพื่อไม่เปิดเผยตัวตนในการท่องเว็บ แต่ต้องแลกกับประสิทธิภาพที่ลดลงอย่างมาก
reviewed: false
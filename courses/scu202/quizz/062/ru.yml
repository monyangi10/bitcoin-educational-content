question: Какой браузер гарантирует анонимность, перенаправляя трафик через децентрализованную сеть с высокой задержкой?
answer: Браузер Tor
wrong_answers:
  - Браузер Mullvad
  - Рысь
  - LibreWolf
explanation: |
  Tor Browser использует сеть Tor для анонимизации просмотра веб-страниц, но при этом значительно снижает производительность.
reviewed: false
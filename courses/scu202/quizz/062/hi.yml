question: कौन सा ब्राउज़र विकेन्द्रीकृत लेकिन उच्च विलंबता नेटवर्क के माध्यम से ट्रैफ़िक को पुनर्निर्देशित करके गुमनामी की गारंटी देता है?
answer: टोर ब्राउज़र
wrong_answers:
  - मुल्वाड ब्राउज़र
  - बनबिलाव
  - लिब्रेवुल्फ़
explanation: |
  टोर ब्राउज़र ब्राउज़िंग को गुमनाम बनाने के लिए टोर नेटवर्क पर निर्भर करता है, जिसके परिणामस्वरूप प्रदर्शन में भारी गिरावट आती है।
reviewed: false
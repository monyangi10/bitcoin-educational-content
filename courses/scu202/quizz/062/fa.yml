question: کدام مرورگر با هدایت ترافیک از طریق یک شبکه غیرمتمرکز اما با تأخیر بالا، ناشناس بودن را تضمین می‌کند؟
answer: مرورگر تور
wrong_answers:
  - مرورگر Mullvad
  - سیاه‌گوش
  - LibreWolf
explanation: |
  مرورگر تور برای ناشناس‌سازی مرور به شبکه تور متکی است، به بهای کاهش قابل توجه در عملکرد.
reviewed: false
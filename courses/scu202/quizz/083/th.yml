question: บริการส่งข้อความใดที่ให้คุณลงทะเบียนโดยไม่ระบุตัวตนอย่างสมบูรณ์ โดยไม่ต้องใช้หมายเลขโทรศัพท์หรือการเข้าสู่ระบบถาวร?
answer: SimpleX Chat
wrong_answers:
  - Signal
  - Telegram
  - WhatsApp
explanation: |
  SimpleX Chat กำจัดแนวคิดของตัวระบุที่ไม่ซ้ำกัน: เพิ่มผู้ติดต่อผ่านลิงก์ชั่วคราวหรือ QR โค้ด และไม่ต้องใช้ข้อมูลส่วนบุคคล
reviewed: false
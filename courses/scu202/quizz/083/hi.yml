question: कौन सी मैसेजिंग सेवा आपको बिना किसी टेलीफोन नंबर या स्थायी लॉगिन के, पूरी तरह गुमनाम रूप से पंजीकरण करने की अनुमति देती है?
answer: सिंपलएक्स चैट
wrong_answers:
  - संकेत
  - टेलीग्राम
  - WhatsApp
explanation: |
  सिंपलएक्स चैट में विशिष्ट पहचानकर्ता की आवश्यकता नहीं होती है: संपर्कों को अल्पकालिक लिंक या क्यूआर कोड के माध्यम से जोड़ा जाता है, तथा किसी व्यक्तिगत डेटा की आवश्यकता नहीं होती है।
reviewed: false
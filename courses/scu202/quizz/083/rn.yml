question: Ni iyihe serivisi y’ubutumwa igufasha kwiyandikisha muburyo utamenyekana, ata nomero ya telefone canke ngo amakuru winjirirako ahoraho?
answer: SimpleX Chat
wrong_answers:
  - Signal
  - Telegram
  - WhatsApp
explanation: |
  SimpleX Chat ikuraho iciyumviro c’akaranga kihariye: abanywanyi bongerwamwo hifashishijwe amahuza y’igihe gito canke amakode ya QR, kandi nta makuru y’umuntu ku giti ciwe asabwa.
reviewed: true

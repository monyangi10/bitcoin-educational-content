  - تلگرام
  - واتس‌اپ
explanation: |
  چت SimpleX مفهوم شناسه‌ی یکتا را کنار می‌گذارد: مخاطبین از طریق لینک‌های موقت یا کدهای QR اضافه می‌شوند و هیچ داده‌ی شخصی مورد نیاز نیست.

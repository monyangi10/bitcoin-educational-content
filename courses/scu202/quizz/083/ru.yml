question: Какой сервис обмена сообщениями позволяет зарегистрироваться полностью анонимно, без номера телефона или постоянного логина?
answer: Чат SimpleX
wrong_answers:
  - Сигнал
  - Telegram
  - WhatsApp
explanation: |
  SimpleX Chat обходится без понятия уникального идентификатора: контакты добавляются с помощью эфемерных ссылок или QR-кодов, и никаких личных данных не требуется.
reviewed: false
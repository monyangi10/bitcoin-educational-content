question: 1995 में किस ब्राउज़र ने जावास्क्रिप्ट पेश किया?
answer: नेटस्केप नेविगेटर
wrong_answers:
  - इंटरनेट एक्सप्लोरर
  - फ़ायरफ़ॉक्स
  - सफारी
explanation: |
  नेटस्केप नेविगेटर ने वेब पेजों पर गतिशील अन्तरक्रियाशीलता को सक्षम करने के लिए 1995 में ब्रेंडन आइच द्वारा विकसित जावास्क्रिप्ट भाषा को एकीकृत किया।
reviewed: false
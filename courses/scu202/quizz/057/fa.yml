question: کدام مرورگر در سال 1995 جاوااسکریپت را معرفی کرد؟
answer: نت‌اسکیپ نویگیتور
wrong_answers:
  - اینترنت اکسپلورر
  - فایرفاکس
  - سافاری
explanation: |
  نت‌اسکیپ نویگیتور زبان جاوااسکریپت را که توسط برندان آیک در سال ۱۹۹۵ توسعه یافته بود، برای ایجاد تعاملات پویا در صفحات وب یکپارچه کرد.
reviewed: false
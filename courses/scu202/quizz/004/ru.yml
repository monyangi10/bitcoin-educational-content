question: Какой вид компьютерной атаки использует мошеннические сообщения для получения информации?
answer: Фишинг
wrong_answers:
  - Ransomware
  - DDoS
  - SQL-инъекция
explanation: |
  Фишинг использует обманчивые электронные письма или сообщения, чтобы заманить людей разгласить конфиденциальную информацию или установить вредоносное ПО.

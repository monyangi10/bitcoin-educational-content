question: چه نوع حمله کامپیوتری از پیام‌های جعلی برای استخراج اطلاعات استفاده می‌کند؟
answer: فیشینگ
wrong_answers:
  - باج‌افزار
  - DDoS
  - تزریق SQL
explanation: |
  فیشینگ از ایمیل‌ها یا پیام‌های فریبنده استفاده می‌کند تا افراد را به افشای اطلاعات محرمانه یا نصب بدافزار ترغیب کند.
reviewed: false
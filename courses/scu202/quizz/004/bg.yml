question: Какъв вид компютърна атака използва измамни съобщения за извличане на информация?
answer: Фишинг
wrong_answers:
  - Рансъмуер
  - DDoS
  - Инжектиране на SQL
explanation: |
  Фишингът използва измамни имейли или съобщения, за да подмами хората да разкрият поверителна информация или да инсталират зловреден софтуер.
reviewed: false
question: किस प्रकार का कंप्यूटर हमला जानकारी निकालने के लिए धोखाधड़ी वाले संदेशों का उपयोग करता है?
answer: फ़िशिंग
wrong_answers:
  - रैंसमवेयर
  - डीडीओएस
  - SQL इंजेक्शन
explanation: |
  फ़िशिंग में लोगों को गोपनीय जानकारी देने या मैलवेयर इंस्टॉल करने के लिए लुभाने हेतु भ्रामक ईमेल या संदेशों का उपयोग किया जाता है।
reviewed: false
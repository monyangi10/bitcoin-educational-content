question: कौन सा ओपन सोर्स वीपीएन एप्लीकेशन ईमेल के बिना अनाम खाता बनाने की अनुमति देता है और Bitcoin भुगतान स्वीकार करता है?
answer: Mullvad
wrong_answers:
  - एक्सप्रेसवीपीएन
  - प्रोटॉन वीपीएन
  - नॉर्डवीपीएन
explanation: |
  मुलवद वीपीएन अपने पूर्णतः गुमनाम खाता निर्माण के लिए जाना जाता है, जिसमें किसी ईमेल या पासवर्ड की आवश्यकता नहीं होती है, तथा यह Bitcoin या नकद में भुगतान स्वीकार करता है।
reviewed: false
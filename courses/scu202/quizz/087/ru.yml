question: Какое приложение VPN с открытым исходным кодом позволяет анонимно создавать учетные записи без электронной почты и принимает платежи Bitcoin?
answer: Mullvad
wrong_answers:
  - ExpressVPN
  - Proton VPN
  - NordVPN
explanation: |
  Mullvad VPN отличается полностью анонимным созданием аккаунта, не требующим ввода электронной почты или пароля, и принимает оплату в Bitcoin или наличными.
reviewed: false
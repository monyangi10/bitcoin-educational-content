question: کدام برنامه VPN متن‌باز امکان ایجاد حساب ناشناس بدون ایمیل را فراهم می‌کند و پرداخت‌های Bitcoin را می‌پذیرد؟
answer: مول‌واد
wrong_answers:
  - ExpressVPN
  - پروتون وی‌پی‌ان
  - NordVPN
explanation: |
  Mullvad VPN به دلیل ایجاد حساب کاملاً ناشناس، بدون نیاز به ایمیل یا رمز عبور، برجسته است و پرداخت با Bitcoin یا نقدی را می‌پذیرد.
reviewed: false
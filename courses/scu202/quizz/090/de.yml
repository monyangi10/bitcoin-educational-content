question: Welcher Netzwerkanschluss wird standardmäßig für P2P-Verbindungen im Bitcoin-Hauptnetz verwendet?
answer: 8333
wrong_answers:
  - 443
  - 22
  - 9050
explanation: |
  Port 8333 ist der Standardport, der von Bitcoin-Knoten für Peer-to-Peer-Verbindungen zu Mainnet verwendet wird.
reviewed: false
question: Ni ikihe cambu (port) c’umuhora gikoreshwa ku buryo busanzwe ku bijanye n’inzira za P2P ku muhora nyamukuru wa Bitcoin?
answer: 8333
wrong_answers:
  - 443
  - 22
  - 9050
explanation: |
  Port(icambu) 8333 ni port isanzwe ikoreshwa na nodes ya Bitcoin ku bijanye n’inzira za Peer-to-Peer kuri Mainnet ya Bitcoin?
reviewed: true

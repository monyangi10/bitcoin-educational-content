question: Bitcoin ana ağındaki P2P bağlantıları için varsayılan olarak hangi ağ bağlantı noktası kullanılır?
answer: 8333
wrong_answers:
  - 443
  - 22
  - 9050
explanation: |
  Port 8333, Bitcoin düğümleri tarafından Mainnet'e eşler arası bağlantılar için kullanılan standart porttur.
reviewed: false
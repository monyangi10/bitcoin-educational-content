question: Bitcoin मुख्य नेटवर्क पर P2P कनेक्शन के लिए डिफ़ॉल्ट रूप से कौन सा नेटवर्क पोर्ट उपयोग किया जाता है?
answer: 8333
wrong_answers:
  - 443
  - 22
  - 9050
explanation: |
  पोर्ट 8333 मानक पोर्ट है जिसका उपयोग Bitcoin नोड्स द्वारा Mainnet से पीयर-टू-पीयर कनेक्शन के लिए किया जाता है।
reviewed: false
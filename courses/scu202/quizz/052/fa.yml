question: چه کاری قبل از به اشتراک‌گذاری یک فایل به صورت آنلاین یا از طریق ایمیل توصیه می‌شود؟
answer: تمام فراداده‌ها را پاک کنید
wrong_answers:
  - تمام فراداده‌ها را رمزگذاری کنید
  - احراز هویت تمام فراداده‌ها
  - تغییر نام تمام فراداده‌ها
explanation: |
  پاکسازی فراداده از افشای ناخواسته اطلاعات حساس هنگام به اشتراک‌گذاری فایل‌ها جلوگیری می‌کند.
reviewed: false
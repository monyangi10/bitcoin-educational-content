question: Что рекомендуется делать, прежде чем делиться файлами в Интернете или по электронной почте?
answer: Очистите все метаданные
wrong_answers:
  - Шифрование всех метаданных
  - Проверка подлинности всех метаданных
  - Переименуйте все метаданные
explanation: |
  Очистка метаданных предотвращает непреднамеренное раскрытие конфиденциальной информации при совместном использовании файлов.
reviewed: false
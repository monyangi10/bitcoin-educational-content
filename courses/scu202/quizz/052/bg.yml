question: Каква практика се препоръчва, преди да споделите даден файл онлайн или по имейл?
answer: Почистване на всички метаданни
wrong_answers:
  - Криптиране на всички метаданни
  - Удостоверяване на автентичността на всички метаданни
  - Преименуване на всички метаданни
explanation: |
  Изчистването на метаданни предотвратява неволното разкриване на чувствителна информация при споделяне на файлове.
reviewed: false
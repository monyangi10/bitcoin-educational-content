question: ควรปฏิบัติอย่างไรบ้างก่อนที่จะแชร์ไฟล์ออนไลน์หรือทางอีเมล?
answer: ล้างข้อมูลเมตาทั้งหมด
wrong_answers:
  - เข้ารหัสข้อมูลเมตาทั้งหมด
  - ยืนยันความถูกต้องของเมตาดาต้าทั้งหมด
  - เปลี่ยนชื่อเมตาดาต้าทั้งหมด
explanation: |
  การล้างข้อมูลเมตาดาท้าช่วยป้องกันการเปิดเผยข้อมูลที่ละเอียดอ่อนโดยไม่ตั้งใจเมื่อแชร์ไฟล์
reviewed: false
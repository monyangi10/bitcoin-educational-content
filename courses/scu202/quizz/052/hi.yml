question: ऑनलाइन या ई-मेल द्वारा फ़ाइल साझा करने से पहले क्या अभ्यास अनुशंसित है?
answer: सभी मेटाडेटा साफ़ करें
wrong_answers:
  - सभी मेटाडेटा एन्क्रिप्ट करें
  - सभी मेटाडेटा को प्रमाणित करें
  - सभी मेटाडेटा का नाम बदलें
explanation: |
  मेटाडेटा क्लींजिंग, फ़ाइलें साझा करते समय संवेदनशील जानकारी के अनजाने प्रकटीकरण को रोकता है।
reviewed: false
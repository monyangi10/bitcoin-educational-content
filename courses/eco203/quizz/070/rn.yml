question: Ni igiki gituma habaho imitunganirize y’imibano nk’uko Bastiat abivuga?
answer: Isoko
wrong_answers:
  - Leta
  - Idini
  - Imigenzo
explanation: |
  Bastiat abona ko isoko ry’uburenganzira ari ryo ry’ukuri rituma habaho imitunganirize y’imibano kuko rituma habaho uguhuza abantu ku giti cabo kandi mu buryo bwiza.
reviewed: false
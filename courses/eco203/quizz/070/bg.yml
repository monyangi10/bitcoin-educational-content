question: Коя е движещата сила на социалната организация според Бастиа?
answer: Пазарът
wrong_answers:
  - Държавата
  - Религия
  - Традициите
explanation: |
  Бастиа вярва, че свободният пазар е истинската движеща сила на социалната организация, тъй като позволява спонтанна и ефективна координация между хората.
reviewed: true

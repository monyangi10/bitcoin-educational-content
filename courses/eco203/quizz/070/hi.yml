question: बस्तियात के अनुसार सामाजिक संगठन की मुख्य प्रेरणा क्या है?
answer: बाज़ार
wrong_answers:
  - राज्य
  - धर्म
  - परंपरा
explanation: |
  बस्तियत का मानना है कि मुक्त बाजार सामाजिक संगठन की असली प्रेरक शक्ति है क्योंकि यह व्यक्तियों के बीच स्वतः और कुशल समन्वय की अनुमति देता है।
reviewed: false
question: แรงขับเคลื่อนของการจัดระเบียบสังคมตามที่บาสเตียตกล่าวคืออะไร?
answer: ตลาด
wrong_answers:
  - รัฐ
  - ศาสนา
  - ประเพณี
explanation: |
  บาสเตียตเชื่อว่าตลาดเสรีเป็นแรงขับเคลื่อนที่แท้จริงของการจัดระเบียบสังคมเพราะมันเอื้อให้เกิดการประสานงานที่เป็นธรรมชาติและมีประสิทธิภาพระหว่างบุคคล
reviewed: false
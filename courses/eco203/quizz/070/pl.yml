question: Co jest siłą napędową organizacji społecznej według Bastiata?
answer: Rynek
wrong_answers:
  - Państwo
  - Religia
  - Tradycja
explanation: |
  Bastiat wierzy, że wolny rynek jest prawdziwą siłą napędową organizacji społecznej, ponieważ pozwala na spontaniczną i skuteczną koordynację między jednostkami.

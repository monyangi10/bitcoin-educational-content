question: बास्तियत के लिए सार्वजनिक खर्च का क्या प्रभाव होता है जब यह कर्ज या करों से वित्तपोषित होता है?
answer: यह निजी क्षेत्र से संसाधनों को हटा देता है
wrong_answers:
  - यह बिना किसी साइड इफेक्ट के डिमांड को बढ़ावा देता है
  - यह उपभोक्ताओं की खरीदारी क्षमता बढ़ाता है
  - अर्थव्यवस्था को चालू रखना बेहद ज़रूरी है
explanation: |
  बास्तियत का तर्क है कि सार्वजनिक खर्च, जो टैक्स या कर्ज़ से पैसे लेकर चलता है, निजी क्षेत्र से पैसा हटा देता है। इससे अर्थव्यवस्था के दूसरे हिस्सों में दौलत बनाने की रफ़्तार धीमी हो जाती है।
reviewed: false
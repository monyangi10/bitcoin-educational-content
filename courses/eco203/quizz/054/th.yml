question: ผลกระทบของการใช้จ่ายสาธารณะสำหรับ Bastiat เมื่อได้รับการสนับสนุนทางการเงินโดยหนี้สินหรือภาษีคืออะไร?
answer: มันเบี่ยงเบนทรัพยากรจากภาคเอกชน
wrong_answers:
  - มันกระตุ้นความต้องการโดยไม่มีผลข้างเคียง
  - มันเพิ่มอำนาจการซื้อของผู้บริโภค
  - จำเป็นอย่างยิ่งที่จะต้องรักษาเศรษฐกิจให้ลอยตัว
explanation: |
  บาสเตียตโต้แย้งว่าการใช้จ่ายของภาครัฐซึ่งได้รับการสนับสนุนผ่านภาษีหรือหนี้สินนั้นเป็นการเบี่ยงเบนเงินทุนจากภาคเอกชน ซึ่งส่งผลให้การสร้างความมั่งคั่งในส่วนอื่นของเศรษฐกิจถูกจำกัด
reviewed: false
question: Какъв е ефектът от публичните разходи за Бастиа, когато те се финансират чрез дълг или данъци?
answer: Пренасочва ресурси от частния сектор
wrong_answers:
  - стимулира търсенето без странични ефекти
  - Увеличава покупателната способност на потребителите
  - Това е от съществено значение за поддържане на икономиката
explanation: |
  Бастиа твърди, че публичните разходи, финансирани чрез данъци или дълг, отклоняват средства от частния сектор, като по този начин ограничават създаването на богатство в други сектори на икономиката.
reviewed: true

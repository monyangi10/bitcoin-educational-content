question: اثر هزینه‌های عمومی برای بَستیا زمانی که از طریق بدهی یا مالیات تأمین مالی می‌شود چیست؟
answer: این منابع را از بخش خصوصی منحرف می‌کند
wrong_answers:
  - بدون عوارض جانبی تقاضا را تحریک می‌کند
  - این قدرت خرید مصرف‌کنندگان را افزایش می‌دهد
  - ضروری است که اقتصاد را سرپا نگه داریم
explanation: |
  باستیا استدلال می‌کند که هزینه‌های عمومی، که از طریق مالیات یا بدهی تأمین می‌شود، منابع مالی را از بخش خصوصی منحرف می‌کند و بدین ترتیب ایجاد ثروت در سایر نقاط اقتصاد را محدود می‌سازد.
reviewed: false
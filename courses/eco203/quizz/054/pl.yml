question: Jaki jest efekt wydatków publicznych dla Bastiata, gdy są one finansowane z długu lub podatków?
answer: Przekierowuje zasoby z sektora prywatnego
wrong_answers:
  - Stymuluje popyt bez skutków ubocznych
  - Zwiększa siłę nabywczą konsumentów
  - Jest to niezbędne do utrzymania gospodarki na powierzchni
explanation: |
  Bastiat argumentował, że wydatki publiczne, finansowane z podatków lub długu, przekierowują fundusze z sektora prywatnego, ograniczając w ten sposób tworzenie bogactwa w innych częściach gospodarki.
reviewed: false
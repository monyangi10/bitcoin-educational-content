question: Wat is voor Bastiat het effect van overheidsuitgaven als ze worden gefinancierd door schulden of belastingen?
answer: Het onttrekt middelen aan de particuliere sector
wrong_answers:
  - Het stimuleert de vraag zonder bijwerkingen
  - Het verhoogt de koopkracht van consumenten
  - Het is essentieel om de economie draaiende te houden
explanation: |
  Bastiat stelt dat overheidsuitgaven, gefinancierd door belastingen of schulden, middelen onttrekken aan de private sector, waardoor de welvaartscreatie elders in de economie wordt beperkt.
reviewed: false
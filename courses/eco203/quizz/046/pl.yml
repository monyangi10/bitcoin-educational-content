question: Jaki jest główny argument Bastiata przeciwko idei wolnego kredytu?
answer: Wszystkie pozostałe odpowiedzi
wrong_answers:
  - Sprzyja wzbogacaniu się banków kosztem osób fizycznych
  - Zachęca do nieodpowiedzialnego zachowania i podejmowania nadmiernego ryzyka
  - Nie pozwala na trwały wzrost siły nabywczej
explanation: |
  Bastiat obala ideę darmowego kredytu, podkreślając, że prowadzi on do nieodpowiedzialnych zachowań finansowych, zwiększonego ryzyka i niezdolności do trwałego zwiększenia siły nabywczej.

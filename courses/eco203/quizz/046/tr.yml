question: Bastiat'nın serbest kredi fikrine karşı temel argümanı nedir?
answer: Diğer tüm cevaplar
wrong_answers:
  - Bireylerin zararına bankaların zenginleşmesini destekliyor
  - Sorumsuz davranışları ve aşırı risk almayı teşvik eder
  - Satın alma gücünde sürdürülebilir bir artışa izin vermiyor
explanation: |
  Bastiat, sorumsuz finansal davranışlara, risklerin artmasına ve satın alma gücünün sürdürülebilir bir şekilde artırılamamasına yol açtığını vurgulayarak serbest kredi fikrini reddeder.
reviewed: false
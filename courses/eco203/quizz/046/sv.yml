question: Vilket är Bastiats huvudargument mot idén om fri kreditgivning?
answer: Alla de andra svaren
wrong_answers:
  - Det gynnar bankernas berikande på bekostnad av enskilda personer
  - Det uppmuntrar till oansvarigt beteende och överdrivet risktagande
  - Den medger inte en hållbar ökning av köpkraften
explanation: |
  Bastiat motsätter sig idén om fri kreditgivning genom att betona att den leder till oansvarigt finansiellt beteende, ökade risker och en oförmåga att öka köpkraften på ett hållbart sätt.
reviewed: false
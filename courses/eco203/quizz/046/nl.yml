question: Wat is Bastiat's belangrijkste argument tegen het idee van gratis krediet?
answer: Alle andere antwoorden
wrong_answers:
  - Het bevordert de verrijking van banken ten koste van individuen
  - Het moedigt onverantwoordelijk gedrag en het nemen van buitensporige risico's aan
  - Het maakt geen duurzame stijging van de koopkracht mogelijk
explanation: |
  Bastiat verwerpt het idee van gratis krediet door te benadrukken dat het leidt tot onverantwoord financieel gedrag, verhoogde risico's en een onvermogen om de koopkracht duurzaam te verhogen.
reviewed: false
question: निःशुल्क ऋण के विचार के विरुद्ध बास्टियाट का मुख्य तर्क क्या है?
answer: अन्य सभी उत्तर
wrong_answers:
  - यह व्यक्तियों की कीमत पर बैंकों को समृद्ध बनाने का पक्षधर है
  - यह गैर-जिम्मेदाराना व्यवहार और अत्यधिक जोखिम लेने को प्रोत्साहित करता है
  - यह क्रय शक्ति में स्थायी वृद्धि की अनुमति नहीं देता
explanation: |
  बास्टियाट ने मुफ्त ऋण के विचार का खंडन करते हुए कहा कि इससे गैर-जिम्मेदार वित्तीय व्यवहार, जोखिम में वृद्धि, तथा क्रय शक्ति में स्थायी वृद्धि करने में असमर्थता पैदा होती है।
reviewed: false
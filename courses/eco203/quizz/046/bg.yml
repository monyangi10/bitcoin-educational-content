question: Какъв е основният аргумент на Бастиа срещу идеята за свободен кредит?
answer: Всички останали отговори
wrong_answers:
  - Тя благоприятства обогатяването на банките за сметка на физическите лица
  - Насърчава безотговорното поведение и поемането на прекомерен риск
  - Тя не позволява устойчиво повишаване на покупателната способност
explanation: |
  Бастиа отхвърля идеята за безплатен кредит, като подчертава, че той води до безотговорно финансово поведение, повишени рискове и невъзможност за устойчиво увеличаване на покупателната способност.

question: ข้อโต้แย้งหลักของ Bastiat ต่อแนวคิดเรื่องเครดิตฟรีคืออะไร?
answer: คำตอบอื่น ๆ ทั้งหมด
wrong_answers:
  - มันเอื้อประโยชน์ต่อการเพิ่มพูนของธนาคารโดยแลกกับผลประโยชน์ของบุคคล
  - มันส่งเสริมพฤติกรรมที่ขาดความรับผิดชอบและการเสี่ยงที่มากเกินไป
  - มันไม่อนุญาตให้มีการเพิ่มขึ้นอย่างยั่งยืนในอำนาจการซื้อ
explanation: |
  บาสเตียตปฏิเสธแนวคิดเรื่องเครดิตฟรีโดยเน้นว่ามันนำไปสู่พฤติกรรมทางการเงินที่ขาดความรับผิดชอบ ความเสี่ยงที่เพิ่มขึ้น และความไม่สามารถที่จะเพิ่มอำนาจการซื้ออย่างยั่งยืน
reviewed: false
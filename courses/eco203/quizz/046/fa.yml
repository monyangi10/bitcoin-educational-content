question: استدلال اصلی بَستیا علیه ایده اعتبار رایگان چیست؟
answer: همه پاسخ‌های دیگر
wrong_answers:
  - این به نفع غنی‌سازی بانک‌ها به هزینه افراد است.
  - این رفتار غیرمسئولانه و ریسک‌پذیری بیش از حد را تشویق می‌کند.
  - این اجازه را برای افزایش پایدار قدرت خرید نمی‌دهد
explanation: |
  باستیا ایده اعتبار رایگان را با برجسته کردن این نکته که منجر به رفتار مالی غیرمسئولانه، افزایش ریسک‌ها و ناتوانی در افزایش پایدار قدرت خرید می‌شود، رد می‌کند.
reviewed: false
question: Wat is het kenmerk van negatieve rechtvaardigheid volgens Bastiat?
answer: Voorkomt dat de rechten van sommigen worden misbruikt door anderen.
wrong_answers:
  - Doet niets en laat geschillen op eigen houtje oplossen.
  - Slecht voor de rechten van beide partijen.
  - Creëert een onevenwicht tussen individuele en collectieve rechten.
explanation: |
  Negatieve rechtvaardigheid bestaat volgens Bastiat uit het voorkomen van misbruik van rechten en beperkt zich dus tot het beschermen van natuurlijke rechten zonder positieve acties op te leggen aan individuen.
reviewed: false
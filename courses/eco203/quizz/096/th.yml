question: ลักษณะของความยุติธรรมเชิงลบตามที่ Bastiat กล่าวคืออะไร?
answer: ป้องกันไม่ให้สิทธิของบางคนถูกแย่งชิงโดยผู้อื่น
wrong_answers:
  - ไม่ทำอะไรและปล่อยให้ข้อพิพาทได้รับการแก้ไขด้วยตัวเอง
  - ไม่ดีต่อสิทธิของทั้งสองฝ่าย
  - สร้างความไม่สมดุลระหว่างสิทธิส่วนบุคคลและสิทธิส่วนรวม
explanation: |
  ความยุติธรรมเชิงลบ, ตามที่บาสเตียตกล่าวไว้, ประกอบด้วยการป้องกันการแย่งชิงสิทธิ, ดังนั้นจึงจำกัดตัวเองในการปกป้องสิทธิตามธรรมชาติโดยไม่บังคับให้บุคคลกระทำการในเชิงบวก
reviewed: false
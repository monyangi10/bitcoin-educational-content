question: Каква е характеристиката на негативната справедливост според Бастиа?
answer: Предотвратява узурпирането на правата на едни от други.
wrong_answers:
  - Не прави нищо и оставя споровете да се решават сами.
  - Лошо за правата и на двете страни.
  - Създава дисбаланс между индивидуалните и колективните права.
explanation: |
  Негативната справедливост, според Бастиа, се състои в предотвратяване на узурпирането на права, като по този начин се ограничава до защита на естествените права, без да налага позитивни действия на индивидите.
reviewed: false
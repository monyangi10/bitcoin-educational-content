question: Koja je karakteristika negativne pravde prema Bastiat-u?
answer: Sprečava da prava nekih budu uzurpirana od strane drugih.
wrong_answers:
  - Ne radi ništa i pušta da se sporovi rešavaju sami od sebe.
  - Loše za prava obe strane.
  - Stvara neravnotežu između individualnih i kolektivnih prava.
explanation: |
  Negativna pravda, prema Bastiat-u, sastoji se u sprečavanju uzurpacije prava, čime se ograničava na zaštitu prirodnih prava bez nametanja pozitivnih akcija pojedincima.

question: ویژگی عدالت منفی از نظر بستیات چیست؟
answer: از غصب حقوق برخی توسط دیگران جلوگیری می‌کند.
wrong_answers:
  - هیچ کاری نمی‌کند و می‌گذارد اختلافات خود به خود حل شوند.
  - برای حقوق هر دو طرف بد است.
  - ایجاد عدم تعادل بین حقوق فردی و جمعی.
explanation: |
  عدالت منفی، به گفته باستیا، شامل جلوگیری از غصب حقوق است و بنابراین خود را به حفاظت از حقوق طبیعی محدود می‌کند بدون اینکه اقدامات مثبتی را بر افراد تحمیل کند.
reviewed: false
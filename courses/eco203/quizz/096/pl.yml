question: Jaka jest cecha negatywnej sprawiedliwości według Bastiata?
answer: Zapobiega uzurpacji praw jednych przez innych.
wrong_answers:
  - Nie robi nic i pozwala na samodzielne rozwiązywanie sporów.
  - Złe dla praw obu stron.
  - Tworzy nierównowagę między prawami indywidualnymi i zbiorowymi.
explanation: |
  Sprawiedliwość negatywna, według Bastiata, polega na zapobieganiu uzurpacji praw, ograniczając się tym samym do ochrony praw naturalnych bez narzucania jednostkom działań pozytywnych.

question: Nk’uko Laffer abivuga, bigenda gute ku mahera yinjira mu misoro iyo ibiciro vy’imisoro vyongerewe birenze urugero?
answer: Bigabanuka
wrong_answers:
  - Birongera .
  - Baguma bashikamye .
  - Bihindukahinduka mu buryo butamenyekana .
explanation: |
  Dukurikije igiharuro ca Laffer, iyo imisoro irengeje urugero, bituma amafaranga yinjira mu misoro agabanuka kubera ko bica intege akazi, ishoramari n’ibikorwa.

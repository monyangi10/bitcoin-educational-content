question: लाफर के अनुसार, जब टैक्स दरों को जरूरत से ज्यादा बढ़ा दिया जाता है, तो टैक्स राजस्व पर क्या असर पड़ता है?
answer: वे कम हो जाते हैं
wrong_answers:
  - वे बढ़ाते हैं
  - वे स्थिर रहते हैं
  - वे अप्रत्याशित रूप से उतार-चढ़ाव करते हैं
explanation: |
  लाफर कर्व के अनुसार, टैक्स दरों में अत्यधिक वृद्धि कर राजस्व में कमी आ जाती है क्योंकि इससे काम करने, निवेश करने और उत्पादन करने में रुचि कम हो जाती है।
reviewed: false
question: به گفته لافر، وقتی نرخ‌های مالیاتی به طور بیش از حد افزایش می‌یابند، چه اتفاقی برای درآمدهای مالیاتی می‌افتد؟
answer: آنها کاهش می‌یابند
wrong_answers:
  - آنها افزایش می‌یابند
  - آنها پایدار می‌مانند
  - آن‌ها به‌طور غیرقابل‌پیش‌بینی نوسان می‌کنند
explanation: |
  بر اساس منحنی لافر، افزایش بیش از حد نرخ‌های مالیاتی منجر به کاهش درآمدهای مالیاتی می‌شود زیرا کار، سرمایه‌گذاری و تولید را دلسرد می‌کند.
reviewed: false
question: Според Лафер какво се случва с данъчните приходи, когато данъчните ставки се увеличават прекомерно?
answer: Те намаляват
wrong_answers:
  - Те увеличават
  - Те остават стабилни
  - Те се колебаят непредсказуемо
explanation: |
  Според кривата на Лафер прекомерното увеличаване на данъчните ставки води до намаляване на данъчните приходи, тъй като обезкуражава работата, инвестициите и производството.
reviewed: false
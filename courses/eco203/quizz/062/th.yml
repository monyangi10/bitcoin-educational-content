question: ตามที่ Laffer กล่าวไว้ เกิดอะไรขึ้นกับรายได้จากภาษีเมื่ออัตราภาษีถูกเพิ่มขึ้นมากเกินไป?
answer: พวกเขาลดลง
wrong_answers:
  - พวกเขาเพิ่มขึ้น
  - พวกเขายังคงมั่นคง
  - พวกเขาผันผวนอย่างไม่สามารถคาดเดาได้
explanation: |
  ตามเส้นโค้งลาฟเฟอร์ การเพิ่มอัตราภาษีมากเกินไปจะนำไปสู่การลดลงของรายได้ภาษี เพราะมันทำให้การทำงาน การลงทุน และการผลิตลดลง
reviewed: false
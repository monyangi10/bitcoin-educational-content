question: محدودیت اصلی مداخله دولت از نظر بستیات چیست؟
answer: کسانی که تصمیمات عمومی می‌گیرند، کسانی نیستند که عواقب آن را متحمل می‌شوند.
wrong_answers:
  - کسانی که تصمیمات عمومی می‌گیرند، بیش از حد عاشق پول هستند
  - کسانی که تصمیمات عمومی می‌گیرند به اندازه کافی باهوش نیستند
  - کسانی که تصمیمات عمومی می‌گیرند، شجاعت ندارند.
explanation: |
  باستیا با انتقاد از مداخله دولت، تأکید می‌کند که تصمیم‌گیرندگان عمومی از پیامدهای تصمیمات خود رنج نمی‌برند، که این امر به انتخاب‌های غیرمسئولانه منجر می‌شود.
reviewed: false
question: ข้อจำกัดหลักของการแทรกแซงของรัฐตามที่บาสเตียต์กล่าวคืออะไร?
answer: ผู้ที่ตัดสินใจในที่สาธารณะไม่ใช่ผู้ที่ต้องรับผลที่ตามมา
wrong_answers:
  - ผู้ที่ตัดสินใจในที่สาธารณะรักเงินมากเกินไป
  - ผู้ที่ตัดสินใจในที่สาธารณะไม่ฉลาดพอ
  - ผู้ที่ตัดสินใจในที่สาธารณะขาดความกล้าหาญ
explanation: |
  บาสเตียตวิจารณ์การแทรกแซงของรัฐโดยเน้นว่าผู้ตัดสินใจสาธารณะไม่ได้รับผลกระทบจากการตัดสินใจของตนเอง ซึ่งนำไปสู่การตัดสินใจที่ขาดความรับผิดชอบ
reviewed: false
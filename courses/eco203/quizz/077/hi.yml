question: बस्तियत के अनुसार राज्य के हस्तक्षेप की मुख्य सीमा क्या है?
answer: जो लोग सार्वजनिक फैसले लेते हैं, उन्हें उसके नतीजे नहीं भुगतने पड़ते।
wrong_answers:
  - जो लोग सार्वजनिक फैसले लेते हैं, वे पैसे से बहुत ज्यादा प्यार करते हैं।
  - जो लोग सार्वजनिक फैसले लेते हैं, वे इतने समझदार नहीं होते
  - जो लोग सार्वजनिक फैसले लेते हैं, उनमें हिम्मत नहीं होती
explanation: |
  बास्तिये राज्य के हस्तक्षेप की आलोचना करते हुए कहते हैं कि सार्वजनिक निर्णय लेने वाले अपने फैसलों के परिणाम भुगतने से बच जाते हैं, जिससे गैर-जिम्मेदाराना चुनाव होते हैं।
reviewed: false
question: Кое е основното ограничение на държавната намеса според Бастиа?
answer: Тези, които вземат публични решения, не са тези, които понасят последствията
wrong_answers:
  - Тези, които вземат решения в публичния сектор, обичат парите твърде много
  - Тези, които взимат публични решения, не са достатъчно умни
  - На тези, които вземат публични решения, им липсва смелост
explanation: |
  Бастиа критикува държавната намеса, като подчертава, че публичните лица, вземащи решения, не понасят последствията от собствените си решения, което води до безотговорни избори.

question: ปรัชญาใดที่เป็นแรงบันดาลใจให้กับวิสัยทัศน์ทางเศรษฐกิจของคอบเดน?
answer: ลัทธิประโยชน์นิยมของเบนแธม
wrong_answers:
  - ลัทธิเสรีนิยมของสมิธ
  - สังคมนิยมของฟูริเยร์
  - ลัทธิเสมอภาคนิยมของรูโซ
explanation: |
  คอบเดนได้รับอิทธิพลจากลัทธิประโยชน์นิยมของเบนแธม ซึ่งให้ความสำคัญกับความเป็นอยู่ที่ดีสำหรับคนจำนวนมากที่สุดผ่านการค้าเสรี
reviewed: false
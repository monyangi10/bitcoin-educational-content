question: Koja filozofija je inspirisala Cobden-ovu ekonomsku viziju?
answer: Bentham-ov utilitarizam
wrong_answers:
  - Smith-ov liberalizam
  - Fourier-ov socijalizam
  - Rousseau-ov egalitarizam
explanation: |
  Cobden je bio pod uticajem Bentam-ovog utilitarizma, koji je vrednovao blagostanje za najveći broj ljudi kroz slobodnu trgovinu.

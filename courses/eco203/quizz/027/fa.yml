question: چه فلسفه‌ای الهام‌بخش دیدگاه اقتصادی کابدن بود؟
answer: فایده‌گرایی بنتام
wrong_answers:
  - لیبرالیسم اسمیت
  - سوسیالیسم فوریه
  - برابری‌خواهی روسو
explanation: |
  کوبدن تحت تأثیر فایده‌گرایی بنتام قرار گرفت که رفاه بیشترین تعداد افراد را از طریق تجارت آزاد ارزش‌گذاری می‌کرد.
reviewed: false
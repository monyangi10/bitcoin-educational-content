question: Коя философия е вдъхновила икономическата визия на Кобдън?
answer: Утилитаризмът на Бентам
wrong_answers:
  - Либерализмът на Смит
  - Социализмът на Фурие
  - Егалитаризмът на Русо
explanation: |
  Кобдън е повлиян от утилитаризма на Бентам, който оценява благосъстоянието на най-голям брой хора чрез свободна търговия.
reviewed: true

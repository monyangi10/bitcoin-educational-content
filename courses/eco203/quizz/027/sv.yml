question: Vilken filosofi låg till grund för Cobdens ekonomiska vision?
answer: Benthams utilitarism
wrong_answers:
  - Smiths liberalism
  - Fouriers socialism
  - Rousseaus egalitarism
explanation: |
  Cobden var influerad av Benthams utilitarism, som värderade välfärd för det största antalet genom frihandel.

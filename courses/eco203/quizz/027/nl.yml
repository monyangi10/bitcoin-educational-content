question: Welke filosofie inspireerde de economische visie van Cobden?
answer: Benthams utilitarisme
wrong_answers:
  - Smiths liberalisme
  - Het socialisme van Fourier
  - Rousseau's egalitarisme
explanation: |
  Cobden werd beïnvloed door Benthams utilitarisme, dat welzijn voor het grootste aantal mensen waardeerde door middel van vrije handel.

question: Jaki główny problem dostrzega Bastiat w wykorzystywaniu podatków do zmniejszania nierówności?
answer: Wszystkie te odpowiedzi są poprawne
wrong_answers:
  - Tworzy zależność od państwa
  - Zniechęca do indywidualnej inicjatywy
  - Może to prowadzić do arbitralności i konfiskaty
explanation: |
  Bastiat krytykuje podatki redystrybucyjne, ponieważ zachęcają one do zależności, zniechęcają do inicjatywy i prowadzą do arbitralności, stanowiąc zalegalizowaną grabież.
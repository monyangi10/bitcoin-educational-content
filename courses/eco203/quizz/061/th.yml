question: ปัญหาหลักที่ Bastiat เห็นในการใช้ภาษีเพื่อลดความไม่เท่าเทียมคืออะไร?
answer: คำตอบทั้งหมดนี้ถูกต้อง
wrong_answers:
  - มันสร้างการพึ่งพิงต่อรัฐ
  - มันกีดกันความคิดริเริ่มส่วนบุคคล
  - มันอาจนำไปสู่ความตามอำเภอใจและการยึดทรัพย์
explanation: |
  บาสเตียตวิจารณ์การเก็บภาษีแบบกระจายรายได้ใหม่เพราะมันส่งเสริมการพึ่งพา, ขัดขวางความคิดริเริ่ม, และนำไปสู่ความไม่แน่นอน, ซึ่งถือเป็นการปล้นที่ถูกกฎหมาย
question: Koji glavni problem Bastiat vidi u korišćenju poreza za smanjenje nejednakosti?
answer: Svi ovi odgovori su tačni
wrong_answers:
  - Stvara zavisnost od države
  - To obeshrabruje individualnu inicijativu
  - To može dovesti do proizvoljnosti i konfiskacije
explanation: |
  Bastiat kritikuje redistributivno oporezivanje jer podstiče zavisnost, obeshrabruje inicijativu i dovodi do proizvoljnosti, čineći ga legalizovanom pljačkom.
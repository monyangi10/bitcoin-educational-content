question: Какъв основен проблем вижда Бастиа в използването на данъците за намаляване на неравенствата?
answer: Всички отговори са верни
wrong_answers:
  - Създава зависимост от държавата
  - не насърчава индивидуалната инициатива
  - може да доведе до произвол и конфискация
explanation: |
  Бастиа критикува преразпределителното данъчно облагане, тъй като то насърчава зависимостта, обезкуражава инициативата и води до произвол, представлявайки узаконен грабеж.
reviewed: true

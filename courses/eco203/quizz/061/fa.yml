question: باسیات چه مشکل اصلی را در استفاده از مالیات برای کاهش نابرابری‌ها می‌بیند؟
answer: همه این پاسخ‌ها درست هستند
wrong_answers:
  - این وابستگی به دولت ایجاد می‌کند
  - این امر ابتکار فردی را دلسرد می‌کند.
  - می‌تواند به خودسری و مصادره منجر شود
explanation: |
  باستیا مالیات بازتوزیعی را نقد می‌کند زیرا باعث وابستگی می‌شود، ابتکار عمل را دلسرد می‌کند و به خودسری منجر می‌شود که به معنای غارت قانونی است.
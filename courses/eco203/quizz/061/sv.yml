question: Vilket huvudproblem ser Bastiat med att använda skatter för att minska ojämlikheter?
answer: Alla dessa svar är korrekta
wrong_answers:
  - Det skapar ett beroende av staten
  - Det motverkar individuella initiativ
  - Det kan leda till godtycke och konfiskation
explanation: |
  Bastiat kritiserar omfördelande beskattning eftersom den uppmuntrar till beroende, motverkar initiativ och leder till godtycke, vilket utgör legaliserad plundring.
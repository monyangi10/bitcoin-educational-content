question: باستیا چه نتیجه‌ای از تأثیر تخریب بر اقتصاد می‌گیرد؟
answer: این به اقتصاد آسیب می‌رساند
wrong_answers:
  - این به اقتصاد سودمند است
  - این به اقتصاد بی‌تأثیر است.
  - این بستگی به وضعیت اقتصادی دارد
explanation: |
  باستیا نشان می‌دهد که تخریب یک بار اقتصادی است زیرا منابع ارزشمند را منحرف می‌کند و هیچ ارزش افزوده‌ای ایجاد نمی‌کند.
reviewed: false
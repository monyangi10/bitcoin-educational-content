question: Welke conclusie trekt Bastiat uit de impact van vernietiging op de economie?
answer: Het is schadelijk voor de economie
wrong_answers:
  - Het is goed voor de economie
  - Het is neutraal voor de economie
  - Het hangt af van de economische situatie
explanation: |
  Bastiat toont aan dat vernietiging een economische last is omdat het kostbare middelen afleidt en geen toegevoegde waarde creëert.
reviewed: false
question: Какъв извод прави Бастиа от въздействието на разрушението върху икономиката?
answer: Той е вреден за икономиката
wrong_answers:
  - Това е от полза за икономиката
  - Той е неутрален за икономиката
  - Зависи от икономическата ситуация
explanation: |
  Бастиа доказва, че разрушението е икономическа тежест, защото отклонява ценни ресурси и не създава добавена стойност.

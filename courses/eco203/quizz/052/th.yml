question: ข้อสรุปที่ Bastiat ได้จากผลกระทบของการทำลายล้างต่อเศรษฐกิจคืออะไร?
answer: มันเป็นอันตรายต่อเศรษฐกิจ
wrong_answers:
  - มันเป็นประโยชน์ต่อเศรษฐกิจ
  - มันเป็นกลางต่อเศรษฐกิจ
  - มันขึ้นอยู่กับสถานการณ์ทางเศรษฐกิจ
explanation: |
  Bastiat แสดงให้เห็นว่าการทำลายล้างเป็นภาระทางเศรษฐกิจเพราะมันเบี่ยงเบนทรัพยากรอันมีค่าและไม่สร้างมูลค่าเพิ่ม
reviewed: false
question: Ni mwandishi mgani anawajibika kimsingi kwa elimu ya Frédéric Bastiat katika uchumi?
answer: Sema
wrong_answers:
  - Turgot
  - Condillac
  - Quesnay
explanation: |
  Frédéric Bastiat anamchukulia Jean-Baptiste Say kama ushawishi mkubwa, hasa kwa mawazo yake juu ya thamani na biashara huria.

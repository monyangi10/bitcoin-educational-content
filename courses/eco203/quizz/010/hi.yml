question: फ्रेडरिक बास्टियाट की अर्थशास्त्र की शिक्षा के लिए मुख्य रूप से कौन सा लेखक जिम्मेदार है?
answer: बोलो
wrong_answers:
  - तुर्गो
  - कॉन्डिलैक
  - क्वेने (Quesnay)
explanation: |
  फ्रेडरिक बास्टिए, जीन-बैप्टिस्ट से को एक बड़ा प्रभाव मानते हैं, खासकर मूल्य और मुक्त व्यापार पर उनके विचारों के लिए।
reviewed: false
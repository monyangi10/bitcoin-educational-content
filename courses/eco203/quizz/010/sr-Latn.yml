question: Koji je autor prvenstveno odgovoran za obrazovanje Frédéric-a Bastiat-a u ekonomiji?
answer: Say
wrong_answers:
  - Turgot
  - Condillac
  - Quesnay
explanation: |
  Frédéric Bastiat smatra Jean-Baptiste Say-a kao veliki uticaj, posebno zbog njegovih ideja o vrednosti i slobodnoj trgovini.

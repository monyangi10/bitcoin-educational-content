question: Vilken författare är huvudansvarig för Frédéric Bastiats utbildning i nationalekonomi?
answer: Säg
wrong_answers:
  - Turgot
  - Condillac
  - Quesnay
explanation: |
  Frédéric Bastiat ser Jean-Baptiste Say som en stor inspirationskälla, särskilt för hans idéer om värde och frihandel.

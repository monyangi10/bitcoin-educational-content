question: Ni uwuhe mwanditsi ari we ahanini ajejwe inyigisho za Frédéric Bastiat mu vy’ubutunzi?
answer: Kuvuga
wrong_answers:
  - Turgot
  - Kondilaki
  - Ikibazo
explanation: |
  Frédéric Bastiat abona ko Jean-Baptiste Say ari we yatumye akora cane cane kubera ivyiyumviro vyiwe ku bijanye n’agaciro n’ubudandaji bwigenga.

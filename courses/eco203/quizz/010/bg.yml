question: Кой автор носи основната отговорност за икономическото образование на Фредерик Бастиа?
answer: Жан-Батист Сей
wrong_answers:
  - Ан Робер Жак Тюрго
  - Етиен Боно де Кондияк
  - Франсоа Кене
explanation: |
  Фредерик Бастиа смята, че Жан-Батист Сей му е оказал голямо влияние, особено заради идеите му за стойността и свободната търговия.
reviewed: true

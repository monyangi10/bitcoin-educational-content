question: موضوع مرکزی که بستیات در کتاب "قانون" توسعه می‌دهد چیست؟
answer: مبارزه با غارت قانونی و دفاع از مالکیت
wrong_answers:
  - دفاع از حقوق اجتماعی و خدمات عمومی
  - مطالعه مزایای آموزش کلاسیک
  - انتقاد انقلاب صنعتی
explanation: |
  در کتاب "قانون"، باستیا غارت قانونی را با مالکیت مقایسه می‌کند و آزادی را به عنوان راه‌حل مشکلات اجتماعی پیشنهاد می‌دهد.
reviewed: false
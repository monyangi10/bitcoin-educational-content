question: Каква основна тема развива Бастиа в книгата си "Законът"?
answer: Борбата срещу законния грабеж и защитата на собствеността
wrong_answers:
  - Защита на социалните права и обществените услуги
  - Изследване на ползите от класическото образование
  - Критика на индустриалната революция
explanation: |
  В "Законът" Бастиа противопоставя юридическия грабеж на собствеността и се застъпва за свободата като решение на социалните проблеми.
reviewed: true

question: Welk centraal thema ontwikkelt Bastiat in zijn boek De Wet?
answer: De strijd tegen legale plundering en de verdediging van eigendom
wrong_answers:
  - De verdediging van sociale rechten en openbare diensten
  - De studie van de voordelen van klassiek onderwijs
  - De kritiek van de industriële revolutie
explanation: |
  In De wet zet Bastiat wettelijke plundering tegenover eigendom en pleit hij voor vrijheid als oplossing voor sociale problemen.

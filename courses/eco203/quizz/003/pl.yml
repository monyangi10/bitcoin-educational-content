question: Jaki główny temat rozwija Bastiat w swojej książce Prawo?
answer: Walka z legalną grabieżą i obrona własności
wrong_answers:
  - Obrona praw socjalnych i usług publicznych
  - Badanie korzyści płynących z edukacji klasycznej
  - Krytyka rewolucji przemysłowej
explanation: |
  W The Law Bastiat przeciwstawia legalną grabież własności i opowiada się za wolnością jako rozwiązaniem problemów społecznych.

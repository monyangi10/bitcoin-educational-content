question: Bastiat anaendeleza mada gani kuu katika kitabu chake The Law?
answer: Mapambano dhidi ya uporaji wa kisheria na ulinzi wa mali
wrong_answers:
  - Utetezi wa haki za kijamii na huduma za umma
  - Utafiti wa faida za elimu ya classical
  - Uhakiki wa mapinduzi ya viwanda
explanation: |
  Katika Sheria, Bastiat anatofautisha uporaji wa kisheria na mali na anatetea uhuru kama suluhisho la matatizo ya kijamii.

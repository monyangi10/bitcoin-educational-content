question: Vilket centralt tema utvecklar Bastiat i sin bok The Law?
answer: Kampen mot legal plundring och försvaret av egendom
wrong_answers:
  - Försvaret av sociala rättigheter och offentliga tjänster
  - Studiet av fördelarna med klassisk utbildning
  - Kritiken av den industriella revolutionen
explanation: |
  I The Law kontrasterar Bastiat laglig plundring mot egendom och förespråkar frihet som lösningen på sociala problem.
reviewed: false
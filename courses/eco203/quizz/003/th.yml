question: ธีมหลักที่บาสเตียตพัฒนาในหนังสือ The Law คืออะไร?
answer: การต่อสู้กับการปล้นสะดมทางกฎหมายและการปกป้องทรัพย์สิน
wrong_answers:
  - การปกป้องสิทธิทางสังคมและบริการสาธารณะ
  - การศึกษาเกี่ยวกับประโยชน์ของการศึกษาคลาสสิก
  - บทวิจารณ์ของการปฏิวัติอุตสาหกรรม
explanation: |
  ใน The Law, Bastiat เปรียบเทียบการปล้นทางกฎหมายกับทรัพย์สินและสนับสนุนเสรีภาพเป็นทางออกสำหรับปัญหาสังคม
reviewed: false
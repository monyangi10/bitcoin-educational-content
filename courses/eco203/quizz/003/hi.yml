question: बास्तियात ने अपनी किताब *द लॉ* में कौन सा मुख्य विषय विकसित किया है?
answer: कानूनी लूट के खिलाफ लड़ाई और संपत्ति की सुरक्षा
wrong_answers:
  - सामाजिक अधिकारों और सार्वजनिक सेवाओं की रक्षा
  - क्लासिकल शिक्षा के फायदों का अध्ययन
  - औद्योगिक क्रांति की आलोचना
explanation: |
  कानून में, बास्टियेट कानूनी लूट और संपत्ति के बीच अंतर दिखाते हैं और सामाजिक समस्याओं का हल आज़ादी को बताते हैं।
reviewed: false
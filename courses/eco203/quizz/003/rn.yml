question: Ni iciyumviro nyamukuru ikihe Bastiat ashira ahabona mu gitabu ciwe Ivyagezwe?
answer: Urugamba rwo kurwanya ubusahuzi bushingiye ku mategeko no kugwanira umutungo .
wrong_answers:
  - Ugukingira uburenganzira bwa muntu n'ibikorwa vya Leta
  - Ukwiga inyungu z'inyigisho za kera
  - Ugunegura ihinduka ry'inganda
explanation: |
  Mu gitabu ciwe citwa The Law, Bastiat aratandukanya gusahura mu buryo butegekanijwe n’amategeko n’itunga, kandi avuga ko umwidegemvyo ari wo muti w’ingorane zo mu kibano.

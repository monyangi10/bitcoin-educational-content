question: कॉम्टे और डुनोयर के अनुसार, वर्गों के बीच संघर्ष का समाधान क्या है?
answer: राज्य को संपत्ति बांटने और नियंत्रित करने से रोकें
wrong_answers:
  - एक क्लास हटा दो
  - संसाधनों को बराबर बांटो
  - वर्ग संघर्ष को बढ़ावा दो
explanation: |
  वे मानते हैं कि शोषण को कम करने का एकमात्र तरीका संपत्ति के वितरण और नियंत्रण पर सरकारी अधिकार को सीमित करना है।
reviewed: false
question: อะไรคือทางออกของความขัดแย้งระหว่างชนชั้นตามที่ Comte และ Dunoyer กล่าวไว้?
answer: ป้องกันไม่ให้รัฐแจกจ่ายและควบคุมทรัพย์สิน
wrong_answers:
  - กำจัดชั้นเรียน
  - แจกจ่ายทรัพยากรอย่างเท่าเทียม
  - ส่งเสริมการต่อสู้ทางชนชั้น
explanation: |
  พวกเขาเชื่อว่าวิธีเดียวที่จะลดการแสวงหาประโยชน์คือการจำกัดอำนาจของรัฐในการจัดสรรและควบคุมทรัพย์สิน
reviewed: false
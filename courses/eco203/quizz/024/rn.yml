question: Nk’uko Comte na Dunoyer babivuga, umuti w’amatati hagati y’imigwi ni uwuhe?
answer: Kubuza Leta gutanga no kugenzura umutungo .
wrong_answers:
  - Gukuraho ishure
  - Gutanga umutungo kimwe
  - Guteza imbere urugamba rw'abanyagihugu
explanation: |
  Bemera ko uburyo bwonyene bwo kugabanya ubusuma ari uguhagarika ububasha bwa Leta bwo gutanga no kugenzura umutungo.

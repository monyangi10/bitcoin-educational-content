question: Какво е решението на конфликта между класите според Конт и Дюноар?
answer: Предотвратяване на разпределянето и контрола върху собствеността от страна на държавата
wrong_answers:
  - Премахване на клас
  - Равномерно разпределение на ресурсите
  - Насърчаване на класовата борба
explanation: |
  Те смятат, че единственият начин да се намали експлоатацията е да се ограничи властта на държавата да разпределя и контролира собствеността.
reviewed: true

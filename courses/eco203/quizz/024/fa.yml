question: راه‌حل به‌نظر کنت و دونویور برای حل تعارض بین طبقات چیست؟
answer: جلوگیری از توزیع و کنترل اموال توسط دولت
wrong_answers:
  - یک کلاس را حذف کنید
  - توزیع منابع به‌طور مساوی
  - ترویج مبارزه طبقاتی
explanation: |
  آن‌ها معتقدند که تنها راه کاهش بهره‌کشی، محدود کردن قدرت دولت در توزیع و کنترل اموال است.
reviewed: false
question: Jakie jest, według Comte'a i Dunoyera, rozwiązanie konfliktu między klasami?
answer: Uniemożliwienie państwu dystrybucji i kontroli własności
wrong_answers:
  - Eliminacja klasy
  - Równomierna dystrybucja zasobów
  - Promowanie walki klasowej
explanation: |
  Uważają oni, że jedynym sposobem na ograniczenie wyzysku jest ograniczenie władzy państwa w zakresie dystrybucji i kontroli własności.

question: Vad är, enligt Comte och Dunoyer, lösningen på konflikten mellan klasserna?
answer: Förhindra staten från att fördela och kontrollera egendom
wrong_answers:
  - Eliminera en klass
  - Fördela resurserna jämnt
  - Främja klasskampen
explanation: |
  De anser att det enda sättet att minska exploateringen är att begränsa statens makt att fördela och kontrollera egendom.
reviewed: false
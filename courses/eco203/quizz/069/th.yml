question: ทำไม Bastiat เชื่อว่าการให้ความรู้แก่ประชาชนด้วยศีลธรรมทางเศรษฐกิจจึงเป็นสิ่งสำคัญ?
answer: เพื่อลดอิทธิพลของผู้แอบอ้างและหลักเศรษฐกิจที่ผิดพลาด
wrong_answers:
  - สอนการกุศลและการเห็นแก่ผู้อื่น
  - เพื่อทำให้ระบบภาษียุติธรรมมากขึ้น
  - เพื่อขจัดความยากจนผ่านทางเศรษฐศาสตร์
explanation: |
  Bastiat มองเห็นในศีลธรรมทางเศรษฐกิจว่าเป็นวิธีลดการบิดเบือนและอิทธิพลของหลักคำสอนที่ผิดพลาดโดยการให้ความรู้แก่สาธารณชนเกี่ยวกับผลกระทบทางเศรษฐกิจที่แท้จริง
reviewed: false
question: Zašto Bastiat veruje da je neophodno prosvetliti građane ekonomskom moralnošću?
answer: Da se smanji uticaj varalica i lažnih ekonomskih doktrina
wrong_answers:
  - Da se podučava milosrđu i altruizmu
  - Da bi poreski sistem bio pravedniji
  - Da se eliminiše siromaštvo kroz ekonomiju
explanation: |
  Bastiat vidi u ekonomskoj moralnosti način da se smanji manipulacija i uticaj lažnih doktrina prosvetljavanjem javnosti o pravim ekonomskim posledicama.

question: Dlaczego Bastiat uważa, że konieczne jest oświecenie obywateli moralnością gospodarczą?
answer: Zmniejszenie wpływu oszustów i fałszywych doktryn ekonomicznych
wrong_answers:
  - Uczyć dobroczynności i altruizmu
  - Aby system podatkowy był bardziej sprawiedliwy
  - Eliminacja ubóstwa poprzez ekonomię
explanation: |
  Bastiat widzi w moralności ekonomicznej sposób na ograniczenie manipulacji i wpływu fałszywych doktryn poprzez oświecenie opinii publicznej na temat prawdziwych konsekwencji ekonomicznych.

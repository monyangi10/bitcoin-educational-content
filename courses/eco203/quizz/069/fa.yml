question: چرا باستیا معتقد است که روشن کردن شهروندان با اخلاق اقتصادی ضروری است؟
answer: برای کاهش تأثیر متقلبان و دکترین‌های اقتصادی نادرست
wrong_answers:
  - آموزش نیکوکاری و نوع‌دوستی
  - برای عادلانه‌تر کردن سیستم مالیاتی
  - برای از بین بردن فقر از طریق اقتصاد
explanation: |
  باستیا در اخلاق اقتصادی راهی برای کاهش دستکاری و تأثیر آموزه‌های نادرست می‌بیند، با آگاه‌سازی عمومی درباره پیامدهای واقعی اقتصادی.
reviewed: false
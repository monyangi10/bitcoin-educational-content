question: Varför anser Bastiat att det är viktigt att upplysa medborgarna om ekonomisk moral?
answer: Att minska inflytandet från bedragare och falska ekonomiska doktriner
wrong_answers:
  - Att lära ut välgörenhet och altruism
  - Att göra skattesystemet mer rättvist
  - Att eliminera fattigdom genom ekonomi
explanation: |
  Bastiat ser i den ekonomiska moralen ett sätt att minska manipulationen och inflytandet från falska doktriner genom att upplysa allmänheten om de verkliga ekonomiska konsekvenserna.
reviewed: false
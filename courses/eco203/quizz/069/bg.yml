question: Защо Бастиа вярва, че е важно да се просвещават гражданите с икономически морал?
answer: Да се намали влиянието на самозванците и фалшивите икономически доктрини
wrong_answers:
  - Да учи на благотворителност и алтруизъм
  - Да направим данъчната система по-справедлива
  - Премахване на бедността чрез икономика
explanation: |
  Бастиа вижда в икономическия морал начин да се намалят манипулациите и влиянието на фалшивите доктрини, като се разяснят на обществото истинските икономически последици.

question: باستیا چه مشکلی را در استدلال حفاظت از شغل شناسایی می‌کند؟
answer: همه این پاسخ‌ها درست هستند
wrong_answers:
  - این بیش از حد ساده‌انگارانه است و پیامدهای بلندمدت را در نظر نمی‌گیرد.
  - این بر اساس یک ایده نادرست از رقابت اقتصادی است
  - از آن برای توجیه اقدامات حمایت‌گرایانه‌ای استفاده می‌شود که به مصرف‌کنندگان آسیب می‌رساند.
explanation: |
  همه پاسخ‌ها صحیح هستند. بَستیا معتقد است که استدلال حفاظت از شغل ساده‌انگارانه است، بر اساس دیدگاه نادرستی از رقابت است و اینکه این استدلال اقدامات حمایت‌گرایانه را به زیان مصرف‌کنندگان توجیه می‌کند.
reviewed: false
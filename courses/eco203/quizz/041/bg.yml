question: Какъв проблем идентифицира Бастиа с аргумента за защита на работното място?
answer: Всички тези отговори са верни
wrong_answers:
  - Тя е твърде опростена и не отчита дългосрочните последици
  - Основава се на фалшива идея за икономическа конкуренция
  - Използва се за оправдаване на протекционистични мерки, които вредят на потребителите
explanation: |
  Всички отговори са верни. Бастиа смята, че аргументът за защита на работните места е опростен, основан на погрешна представа за конкуренцията, и че оправдава протекционистични мерки в ущърб на потребителите.
reviewed: false
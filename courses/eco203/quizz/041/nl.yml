question: Welk probleem identificeert Bastiat met het argument van baanbescherming?
answer: Al deze antwoorden zijn juist
wrong_answers:
  - Het is te simplistisch en houdt geen rekening met de langetermijngevolgen
  - Het is gebaseerd op een verkeerd idee van economische concurrentie
  - Het wordt gebruikt om protectionistische maatregelen te rechtvaardigen die de consument schaden
explanation: |
  Alle antwoorden zijn correct. Bastiat vindt dat het argument van baanbescherming simplistisch is, gebaseerd op een valse visie op concurrentie, en dat het protectionistische maatregelen rechtvaardigt ten nadele van consumenten.
reviewed: false
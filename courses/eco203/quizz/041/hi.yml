question: बस्तियात नौकरी संरक्षण के तर्क में क्या समस्या पहचानते हैं?
answer: ये सारे जवाब सही हैं
wrong_answers:
  - यह बहुत ही साधारण है और लंबे समय के परिणामों को ध्यान में नहीं रखता।
  - यह आर्थिक प्रतिस्पर्धा के एक गलत विचार पर आधारित है।
  - इसका इस्तेमाल उन संरक्षणवादी उपायों को सही ठहराने के लिए किया जाता है जो उपभोक्ताओं को नुकसान पहुँचाते हैं
explanation: |
  सारे जवाब सही हैं। बास्टिये का मानना है कि नौकरी सुरक्षा का तर्क बहुत ही सरल है, जो प्रतिस्पर्धा की गलत समझ पर आधारित है, और यह उपभोक्ताओं के नुकसान के लिए संरक्षणवादी उपायों को सही ठहराता है।
reviewed: false
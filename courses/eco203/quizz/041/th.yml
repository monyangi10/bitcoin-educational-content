question: ปัญหาอะไรที่ Bastiat ระบุเกี่ยวกับข้อโต้แย้งเรื่องการคุ้มครองงาน?
answer: คำตอบทั้งหมดนี้ถูกต้อง
wrong_answers:
  - มันง่ายเกินไปและไม่ได้คำนึงถึงผลกระทบในระยะยาว
  - มันขึ้นอยู่กับแนวคิดที่ผิดเกี่ยวกับการแข่งขันทางเศรษฐกิจ
  - มันถูกใช้เพื่อพิสูจน์มาตรการปกป้องที่ทำร้ายผู้บริโภค
explanation: |
  คำตอบทั้งหมดถูกต้อง Bastiat เชื่อว่าเหตุผลในการปกป้องงานนั้นเป็นเรื่องง่าย ๆ ซึ่งอิงจากมุมมองที่ผิดเกี่ยวกับการแข่งขัน และมันเป็นการให้เหตุผลสำหรับมาตรการปกป้องที่ส่งผลเสียต่อผู้บริโภค
reviewed: false
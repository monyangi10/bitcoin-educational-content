question: Vilket problem identifierar Bastiat med argumentet om anställningsskydd?
answer: Alla dessa svar är korrekta
wrong_answers:
  - Den är alltför förenklad och tar inte hänsyn till de långsiktiga konsekvenserna
  - Den bygger på en falsk idé om ekonomisk konkurrens
  - Den används för att motivera protektionistiska åtgärder som skadar konsumenterna
explanation: |
  Alla svaren är korrekta. Bastiat anser att argumentet om anställningsskydd är förenklat, bygger på en falsk syn på konkurrens och att det rättfärdigar protektionistiska åtgärder på bekostnad av konsumenterna.
reviewed: false
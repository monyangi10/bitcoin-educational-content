question: None Bastiat abona iki ku bijanye n’ivyo abahinguzi b’amabuye y’agaciro basaba?
answer: Aravyanka kuko biteye kubiri n'inyungu rusangi .
wrong_answers:
  - Arabishigikiye kuko ni ngirakamaro kurinda akazi .
  - Ntagira aho abogamiye kuri ico kibazo .
  - Yemera ko abahinguzi b’amabuye y’agaciro bavuga ukuri .
explanation: |
  Bastiat aranegura ivyo abahinguzi b’amabuye y’agaciro basaba, ashimika ku vy’uko uburinzi bufasha inyungu zidasanzwe aho gufasha inyungu rusangi.

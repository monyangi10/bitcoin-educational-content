question: มุมมองของบาสเตียตเกี่ยวกับความต้องการของผู้ผลิตเทียนคืออะไร?
answer: เขาปฏิเสธเพราะมันขัดต่อผลประโยชน์ส่วนรวม
wrong_answers:
  - เขาสนับสนุนเพราะมันสำคัญที่จะปกป้องงาน
  - เขาเป็นกลางในประเด็นนี้
  - เขาเชื่อว่าผู้ผลิตเทียนนั้นถูกต้อง
explanation: |
  บาสเตียตวิจารณ์ข้อเรียกร้องของผู้ผลิตเทียนไข โดยเน้นว่าการคุ้มครองทางการค้าให้ประโยชน์แก่ผลประโยชน์พิเศษโดยเสียค่าใช้จ่ายของผลประโยชน์ทั่วไป
reviewed: false
question: دیدگاه باستیا در مورد تقاضای تولیدکنندگان شمع چیست؟
answer: او آن را رد می‌کند زیرا برخلاف منافع عمومی است.
wrong_answers:
  - او از آن حمایت می‌کند زیرا محافظت از مشاغل مهم است
  - او در این موضوع بی‌طرف است.
  - او معتقد است که تولیدکنندگان شمع درست می‌گویند
explanation: |
  باستیا تقاضای تولیدکنندگان شمع را مورد انتقاد قرار می‌دهد و تأکید می‌کند که حمایت‌گرایی به نفع منافع خاص و به زیان منافع عمومی است.
reviewed: false
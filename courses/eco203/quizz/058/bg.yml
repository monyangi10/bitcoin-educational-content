question: Каква е гледната точка на Бастиа за търсенето на производителите на свещи?
answer: Той я отхвърля, защото противоречи на общия интерес
wrong_answers:
  - Подкрепя я, защото е важно да се защитят работните места
  - Той е неутрален по този въпрос
  - Той смята, че производителите на свещи са прави
explanation: |
  Бастиа критикува искането на производителите на свещи, като подчертава, че протекционизмът служи на специални интереси за сметка на общия интерес.

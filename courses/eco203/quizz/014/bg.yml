question: Как е формулиран законът на Саи според Жан-Батист Саи и Бастиа?
answer: Стоките и услугите се разменят за стоки и услуги
wrong_answers:
  - Supply създава собствено търсене
  - Колкото повече стоки се произвеждат, толкова повече се потребяват
  - Търсенето определя предлагането
explanation: |
  Законът на Сей гласи, че производството на стоки дава възможност за взаимна размяна, като по този начин оценява пазарната икономика.

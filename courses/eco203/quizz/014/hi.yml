question: सई का नियम जीन-बैप्टिस्ट सई और बास्टिएट के अनुसार कैसे व्यक्त किया गया है?
answer: माल और सेवाओं का आदान-प्रदान माल और सेवाओं के बदले किया जाता है
wrong_answers:
  - Supply अपनी खुद की मांग पैदा करता है
  - जितने ज़्यादा सामान बनते हैं, उतना ही ज़्यादा उनका इस्तेमाल होता है
  - मांग Supply तय करती है
explanation: |
  से का नियम कहता है कि माल का उत्पादन आपसी विनिमय को संभव बनाता है, जिससे बाजार अर्थव्यवस्था को महत्व मिलता है।

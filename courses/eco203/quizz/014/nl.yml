question: Hoe wordt de Wet van Say verwoord volgens Jean-Baptiste Say en Bastiat?
answer: Goederen en diensten worden geruild voor goederen en diensten
wrong_answers:
  - Supply creëert zijn eigen vraag
  - Hoe meer goederen er worden geproduceerd, hoe meer ze worden geconsumeerd
  - Vraag bepaalt Supply
explanation: |
  De Wet van Say stelt dat de productie van goederen onderlinge uitwisseling mogelijk maakt, waardoor de markteconomie waardevol wordt.

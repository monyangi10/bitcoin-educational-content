question: กฎของเซย์ (Say's Law) ถูกอธิบายอย่างไรตามที่ Jean-Baptiste Say และ Bastiat?
answer: สินค้าและบริการถูกแลกเปลี่ยนเป็นสินค้าและบริการ
wrong_answers:
  - Supply สร้างความต้องการของตัวเอง
  - ยิ่งผลิตสินค้ามากเท่าไร ยิ่งบริโภคมากเท่านั้น
  - อุปสงค์กำหนดอุปทาน
explanation: |
  กฎของเซย์ระบุว่าการผลิตสินค้าช่วยให้เกิดการแลกเปลี่ยนซึ่งกันและกัน จึงให้คุณค่าต่อเศรษฐกิจตลาด
reviewed: false
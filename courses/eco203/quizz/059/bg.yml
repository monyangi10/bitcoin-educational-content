question: Какво изобличава Бастиа чрез Петицията на свещарите?
answer: Абсурдността на протекционистичните мерки
wrong_answers:
  - Значението на субсидирането на местната промишленост
  - Вредните последици от чуждестранната конкуренция
  - Необходимост от регулиране на цените на светлината
explanation: |
  Чрез тази сатира Бастиа критикува протекционизма, като го довежда до абсурд, показвайки, че тези мерки несправедливо облагодетелстват определени сектори за сметка на потребителите.
reviewed: false
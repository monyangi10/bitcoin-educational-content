question: Bastiat ประณามอะไรผ่านคำร้องของผู้ผลิตเทียน?
answer: ความไร้เหตุผลของมาตรการปกป้องทางการค้า
wrong_answers:
  - ความสำคัญของการอุดหนุนอุตสาหกรรมท้องถิ่น
  - ผลกระทบที่เป็นอันตรายจากการแข่งขันจากต่างประเทศ
  - ความจำเป็นในการควบคุมราคาของแสง
explanation: |
  ผ่านการเสียดสีนี้ Bastiat วิจารณ์การปกป้องทางการค้าโดยผลักดันให้มันไปสู่ความไร้เหตุผล แสดงให้เห็นว่ามาตรการเหล่านี้เอื้อประโยชน์ต่อบางภาคส่วนอย่างไม่เป็นธรรมในขณะที่เป็นภาระต่อผู้บริโภค
reviewed: false
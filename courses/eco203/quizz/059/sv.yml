question: Vad fördömer Bastiat genom ljusmakarnas petition?
answer: Absurditeten i protektionistiska åtgärder
wrong_answers:
  - Vikten av att subventionera lokal industri
  - De skadliga effekterna av utländsk konkurrens
  - Nödvändigheten av att reglera priserna på ljus
explanation: |
  Genom denna satir kritiserar Bastiat protektionismen genom att driva den till det absurda och visa att dessa åtgärder orättvist gynnar vissa sektorer på bekostnad av konsumenten.
reviewed: false
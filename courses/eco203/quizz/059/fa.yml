question: باستیا از طریق "دادخواست شمع‌سازان" چه چیزی را محکوم می‌کند؟
answer: پوچی اقدامات حمایت‌گرایانه
wrong_answers:
  - اهمیت یارانه دادن به صنعت محلی
  - اثرات مضر رقابت خارجی
  - ضرورت تنظیم قیمت‌های نور
explanation: |
  از طریق این طنز، بَستیَت از طریق رساندن آن به حد افراط، از حمایت‌گرایی انتقاد می‌کند و نشان می‌دهد که این اقدامات به ناحق به نفع بخش‌های خاصی به ضرر مصرف‌کننده است.
reviewed: false
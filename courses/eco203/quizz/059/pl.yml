question: Co Bastiat potępia w petycji Candlemakers?
answer: Absurdalność środków protekcjonistycznych
wrong_answers:
  - Znaczenie dotowania lokalnego przemysłu
  - Szkodliwe skutki konkurencji zagranicznej
  - Konieczność regulacji cen światła
explanation: |
  Poprzez tę satyrę Bastiat krytykuje protekcjonizm, doprowadzając go do absurdu, pokazując, że środki te niesprawiedliwie faworyzują niektóre sektory kosztem konsumentów.
reviewed: false
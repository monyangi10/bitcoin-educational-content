question: Šta Bastiat osuđuje kroz Peticiju proizvođača sveća?
answer: Apsurdnost protekcionističkih mera
wrong_answers:
  - Važnost subvencionisanja lokalne industrije
  - Štetni efekti strane konkurencije
  - Potrebno je regulisati cene svetlosti
explanation: |
  Kroz ovu satiru, Bastiat kritikuje protekcionizam dovodeći ga do apsurda, pokazujući da ove mere nepravedno favorizuju određene sektore na račun potrošača.
reviewed: false
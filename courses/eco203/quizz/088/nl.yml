question: Hoe kan gedwongen solidariteit egoïsme aanmoedigen en echte solidariteit verzwakken?
answer: Omdat hoge belastingen en de rol van de staat vrijwillige wederzijdse hulp ontmoedigen
wrong_answers:
  - Omdat mensen irrationeel zijn en de aanname van rationaliteit een lokmiddel is
  - Omdat mensen van nature egoïstisch zijn
  - Omdat publieke solidariteit financiële beperkingen oplegt aan verenigingen
explanation: |
  Valse solidariteit legt zware lasten op en vermindert de ruimte voor vrijwillige solidariteitsacties, wat zelfonttrekking bevordert.
question: Hur kan påtvingad solidaritet uppmuntra själviskhet och försvaga äkta solidaritet?
answer: Eftersom höga skatter och statens roll motverkar frivillig ömsesidig hjälp
wrong_answers:
  - Eftersom människor är irrationella och rationalitetsantagandet är ett lockbete
  - Eftersom människor är naturligt själviska
  - Eftersom offentlig solidaritet innebär ekonomiska begränsningar för föreningar
explanation: |
  Falsk solidaritet innebär tunga bördor och minskar utrymmet för frivilliga solidaritetsåtgärder, vilket främjar självupptagenhet.
question: چگونه همبستگی اجباری می‌تواند خودخواهی را تشویق کرده و همبستگی واقعی را تضعیف کند؟
answer: زیرا مالیات‌های بالا و نقش دولت، کمک‌های متقابل داوطلبانه را دلسرد می‌کند
wrong_answers:
  - زیرا انسان‌ها غیرمنطقی هستند و فرضیه عقلانیت یک فریب است
  - زیرا انسان‌ها ذاتاً خودخواه هستند
  - زیرا همبستگی عمومی محدودیت‌های مالی بر انجمن‌ها تحمیل می‌کند
explanation: |
  همبستگی کاذب بارهای سنگینی را تحمیل می‌کند و فضای اقدامات همبستگی داوطلبانه را کاهش می‌دهد، که باعث ترویج خودکناره‌گیری می‌شود.
question: Как принудителната солидарност може да насърчи егоизма и да отслаби истинската солидарност?
answer: Тъй като високите данъци и ролята на държавата възпрепятстват доброволната взаимопомощ
wrong_answers:
  - Защото хората са ирационални, а предположението за рационалност е примамка
  - Защото хората по природа са егоисти
  - Тъй като обществената солидарност налага финансови ограничения на сдруженията
explanation: |
  Фалшивата солидарност налага големи тежести и намалява пространството за доброволни солидарни действия, което насърчава самооттеглянето.
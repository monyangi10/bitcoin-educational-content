question: การบังคับให้เกิดความเป็นน้ำหนึ่งใจเดียวกันสามารถส่งเสริมความเห็นแก่ตัวและทำให้ความเป็นน้ำหนึ่งใจเดียวกันที่แท้จริงอ่อนแอลงได้อย่างไร?
answer: เนื่องจากภาษีที่สูงและบทบาทของรัฐทำให้การช่วยเหลือซึ่งกันและกันโดยสมัครใจลดลง
wrong_answers:
  - เพราะมนุษย์ไม่มีเหตุผลและสมมติฐานของความมีเหตุผลเป็นสิ่งล่อใจ
  - เพราะมนุษย์มีความเห็นแก่ตัวโดยธรรมชาติ
  - เนื่องจากความเป็นน้ำหนึ่งใจเดียวกันของสาธารณะกำหนดข้อจำกัดทางการเงินต่อสมาคมต่างๆ
explanation: |
  ความเป็นน้ำหนึ่งใจเดียวกันที่ผิดพลาดก่อให้เกิดภาระหนักและลดพื้นที่สำหรับการกระทำที่เป็นน้ำหนึ่งใจเดียวกันโดยสมัครใจ ซึ่งส่งเสริมการถอนตัวเอง
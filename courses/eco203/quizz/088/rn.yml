question: Ni gute ubumwe bw’agahato bushobora kuremesha ubwikunzi no gutuma ubumwe nyakuri bugoyagoya?
answer: Kubera ko imisoro myinshi be n’uruhara rwa Leta bica intege ugufashanya ku bushake .
wrong_answers:
  - Kuko abantu batagira ivyiyumviro kandi ivyiyumviro vy’ivyiyumviro ni uruyeri .
  - Kubera ko abantu mu kameremere kabo bikunda .
  - Kuko ubumwe bwa bose butera ingorane z’amahera amashirahamwe .
explanation: |
  Ubumwe bw’ikinyoma buratera imitwaro iremereye kandi bukagabanya umwanya wo gukora ibikorwa vy’ubumwe bw’ubushake, ivyo bikaba bituma umuntu yikuramwo.
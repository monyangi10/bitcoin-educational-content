question: บทบาทของศีลธรรมทางปรัชญาหรือศาสนาตามที่บาสเตียต์คืออะไร?
answer: เพื่อส่งเสริมให้บุคคลกระทำโดยไม่เห็นแก่ตัว
wrong_answers:
  - เพื่อเปิดเผยผลกระทบด้านลบของการกระทำที่ไม่ดี
  - เพื่อสร้างกฎหมายที่ยุติธรรมและเป็นธรรม
  - เพื่อส่งเสริมการพัฒนาเศรษฐกิจ
explanation: |
  Bastiat มองเห็นในศีลธรรมทางศาสนาหรือปรัชญาเป็นวิธีการส่งเสริมให้บุคคลกระทำโดยไม่เห็นแก่ตัว โดยการเข้าใจถึงผลกระทบเชิงบวกของการกระทำที่ยุติธรรมและมีน้ำใจเพื่อประโยชน์ของสังคม
reviewed: false
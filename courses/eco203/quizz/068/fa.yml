question: نقش اخلاق فلسفی یا دینی از نظر بستیات چیست؟
answer: تشویق افراد به عمل به صورت ایثارگرانه
wrong_answers:
  - برای آشکار کردن پیامدهای منفی اعمال نادرست
  - برای ایجاد قوانین عادلانه و منصفانه
  - برای ترویج توسعه اقتصادی
explanation: |
  باستیا در اخلاق دینی یا فلسفی راهی برای تشویق افراد به عمل بدون خودخواهی می‌بیند، با درک اثرات مثبت اعمال عادلانه و نوع‌دوستانه برای خیر جامعه.
reviewed: false
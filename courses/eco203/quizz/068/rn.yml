question: Ni uruhara uruhe rw’inyifato runtu ya filozofiya canke y’idini nk’uko Bastiat abivuga?
answer: Guhimiriza abantu ku giti cabo gukora ata bwikunzi .
wrong_answers:
  - Kugira ngo umuntu ahishure ingaruka mbi z’ibikorwa bibi .
  - Gushinga amategeko abereye kandi abereye .
  - Guteza imbere ubutunzi
explanation: |
  Bastiat abona mu nyifato runtu y’idini canke ya filozofiya uburyo bwo guhimiriza abantu gukora ata bwikunzi, mu gutahura ingaruka nziza z’ibikorwa vy’ubutungane n’ivy’ubugwaneza ku bw’ineza y’ikibano.

question: Каква е ролята на философския или религиозния морал според Бастиа?
answer: Да насърчаваме хората да действат безкористно
wrong_answers:
  - Разкриване на негативните последици от лошите действия
  - Да създадете честни и справедливи закони
  - Насърчаване на икономическото развитие
explanation: |
  Бастиа вижда в религиозния или философския морал начин да се насърчат хората да действат безкористно, като разберат положителните ефекти от справедливите и алтруистични действия за благото на обществото.

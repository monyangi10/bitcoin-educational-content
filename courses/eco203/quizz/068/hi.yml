question: बस्तियात के अनुसार, दार्शनिक या धार्मिक नैतिकता की भूमिका क्या है?
answer: लोगों को निस्वार्थ भाव से काम करने के लिए प्रोत्साहित करना
wrong_answers:
  - बुरे कामों के नकारात्मक नतीजे बताना
  - निष्पक्ष और न्यायपूर्ण कानून बनाना
  - आर्थिक विकास को बढ़ावा देना
explanation: |
  बास्तियात धार्मिक या दार्शनिक नैतिकता में एक तरीका देखते हैं जो व्यक्तियों को निस्वार्थ भाव से कार्य करने के लिए प्रोत्साहित करता है, यह समझकर कि न्यायपूर्ण और परोपकारी कार्यों का समाज के हित में सकारात्मक प्रभाव पड़ता है।
reviewed: false
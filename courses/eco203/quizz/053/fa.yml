question: باسیات در تحلیل خود از هزینه تخریب، کدام مفهوم اقتصادی را برجسته می‌کند؟
answer: هزینه فرصت
wrong_answers:
  - هزینه نهایی
  - بهره‌وری نهایی
  - هزینه تولید
explanation: |
  باستیا بر اهمیت هزینه فرصت تأکید می‌کند و نشان می‌دهد که منابعی که برای تعمیر تخریب استفاده می‌شوند، می‌توانستند برای ایجاد ثروت در جای دیگری به کار روند.
reviewed: false
question: Коя икономическа концепция изтъква Бастиа в анализа си на цената на разрушението?
answer: алтернативни разходи
wrong_answers:
  - Пределни разходи
  - Пределна производителност
  - Производствени разходи
explanation: |
  Бастиа подчертава значението на алтернативните разходи, като показва, че ресурсите, използвани за поправяне на разрушенията, биха могли да се използват за създаване на богатство на друго място.
reviewed: true

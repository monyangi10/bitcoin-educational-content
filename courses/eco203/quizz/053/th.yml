question: แนวคิดทางเศรษฐกิจใดที่บาสเตียตเน้นในบทวิเคราะห์ของเขาเกี่ยวกับต้นทุนของการทำลายล้าง?
answer: ต้นทุนค่าเสียโอกาส
wrong_answers:
  - ต้นทุนส่วนเพิ่ม
  - ผลิตภาพส่วนเพิ่ม
  - ต้นทุนการผลิต
explanation: |
  บาสเตียตเน้นย้ำถึงความสำคัญของต้นทุนค่าเสียโอกาส โดยแสดงให้เห็นว่าทรัพยากรที่ใช้ในการซ่อมแซมความเสียหายสามารถนำไปใช้สร้างความมั่งคั่งในที่อื่นได้
reviewed: false
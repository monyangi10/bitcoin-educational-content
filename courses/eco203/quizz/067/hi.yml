question: बस्तिया के अनुसार दार्शनिक नैतिकता और आर्थिक नैतिकता में मुख्य अंतर क्या है?
answer: एक दिल से बात करता है, दूसरा दिमाग से
wrong_answers:
  - एक व्यक्तिगत है, दूसरा सामूहिक
  - एक पुराना है, दूसरा नया है
  - एक धार्मिक है, दूसरा धर्मनिरपेक्ष।
explanation: |
  दार्शनिक नैतिकता भावनाओं और व्यक्तिगत सद्गुणों से अपील करती है, जबकि आर्थिक नैतिकता कर्मों के परिणाम दिखाकर तर्कसंगत शिक्षा देने का लक्ष्य रखती है।
reviewed: false
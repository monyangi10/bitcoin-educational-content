question: Koja je glavna razlika između filozofske moralnosti i ekonomske moralnosti prema Bastiat-u?
answer: Jedan se obraća srcu, drugi intelektu
wrong_answers:
  - Jedno je individualno, drugo je kolektivno
  - Jedan je drevan, drugi je moderan
  - Jedan je religiozan, drugi je sekularan
explanation: |
  Filozofska moralnost apeluje na osećanja i lične vrline, dok ekonomska moralnost ima za cilj racionalno obrazovanje demonstriranjem posledica postupaka.
reviewed: false

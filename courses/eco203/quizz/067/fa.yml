question: تفاوت اصلی بین اخلاق فلسفی و اخلاق اقتصادی از نظر بَستیَت چیست؟
answer: یکی قلب را مخاطب قرار می‌دهد، دیگری عقل را
wrong_answers:
  - یکی فردی است، دیگری جمعی
  - یکی باستانی است، دیگری مدرن است
  - یکی مذهبی است، دیگری سکولار است
explanation: |
  اخلاق فلسفی به احساسات و فضیلت شخصی متوسل می‌شود، در حالی که اخلاق اقتصادی هدفش آموزش عقلانی با نشان دادن پیامدهای اعمال است.
reviewed: false
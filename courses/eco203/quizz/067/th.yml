question: ความแตกต่างหลักระหว่างศีลธรรมทางปรัชญาและศีลธรรมทางเศรษฐกิจตามที่บาสเตียคืออะไร?
answer: คนหนึ่งพูดถึงหัวใจ อีกคนพูดถึงสติปัญญา
wrong_answers:
  - หนึ่งคือปัจเจก อีกหนึ่งคือส่วนรวม
  - หนึ่งคือโบราณ อีกหนึ่งคือสมัยใหม่
  - คนหนึ่งเคร่งศาสนา อีกคนหนึ่งเป็นฆราวาส
explanation: |
  ศีลธรรมทางปรัชญาดึงดูดความรู้สึกและคุณธรรมส่วนบุคคล ในขณะที่ศีลธรรมทางเศรษฐกิจมุ่งเน้นการให้การศึกษาอย่างมีเหตุผลโดยการแสดงให้เห็นถึงผลที่ตามมาของการกระทำ
reviewed: false
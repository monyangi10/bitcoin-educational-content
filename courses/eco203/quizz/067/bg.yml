question: Каква е основната разлика между философския морал и икономическия морал според Бастиа?
answer: Едната е насочена към сърцето, а другата - към интелекта
wrong_answers:
  - Едното е индивидуално, другото е колективно
  - Едната е древна, другата - съвременна
  - Едната е религиозна, а другата - светска
explanation: |
  Философският морал апелира към чувствата и личната добродетел, докато икономическият морал има за цел да възпитава рационално, като показва последствията от действията.
reviewed: false
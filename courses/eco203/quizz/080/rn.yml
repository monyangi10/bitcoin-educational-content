question: Ku bwa Frédéric Bastiat, ikibi coba gifise uruhara muri kahise k’abantu?
answer: Ego cane, ikibi si ikintu nyakuri gusa, ariko kandi kirafise uruhara muri kahise no mu bikorwa vy’abantu.
wrong_answers:
  - Oya, ikibi kibwirizwa kurandurwa kugira ngo imibabaro y’abantu ihere.
  - Oya, ikibi si ingorane vy’ukuri, kuko iciyumviro c’ubwigenge ntigishobora guhagarara na co.
  - Oya, ni ngombwa ko umuntu atemera ko ikibi ari ikintu nyakuri.
explanation: |
  Ku bwa Bastiat, ikibi si ikintu nyakuri gusa kidashobora gukurwaho, ariko kandi ni ikintu gifise uruhara rudasanzwe mu gutera imbere kw’abantu n’imibano, kuko gituma umuntu ku giti ciwe yiga kandi agatera imbere.
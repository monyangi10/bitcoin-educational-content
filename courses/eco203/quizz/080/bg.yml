question: Според Фредерик Бастиа зло ли играе роля в човешката история?
answer: Да, злото е не само реалност, но и роля в историята и в човешките действия.
wrong_answers:
  - Не, злото трябва да бъде изкоренено, за да се сложи край на човешкото страдание.
  - Не, злото всъщност не е проблем, защото либералният идеал не може да бъде ограничен от него.
  - Не, важно е да не приемаме злото като реалност.
explanation: |
  За Бастиа злото е не само неизбежна реалност, но и елемент, който има специфична роля в човешката и социалната еволюция, тъй като позволява на хората да се учат и да напредват.
question: Za Frédéric-a Bastiat-a, da li zlo igra ulogu u ljudskoj istoriji?
answer: Da, zlo nije samo definitivna stvarnost već ima i ulogu u istoriji i ljudskom delovanju.
wrong_answers:
  - Ne, zlo mora biti iskorenjeno da bi se okončala ljudska patnja.
  - Ne, zlo zapravo nije problem, jer liberalni ideal ne može biti ograničen njime.
  - Ne, neophodno je ne prihvatiti zlo kao stvarnost.
explanation: |
  Za Bastiat-a, zlo nije samo neizbežna stvarnost već i element koji ima specifičnu ulogu u ljudskoj i društvenoj evoluciji, jer omogućava pojedincima da uče i napreduju.

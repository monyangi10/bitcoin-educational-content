question: बास्तियत के अनुसार, सच्ची एकजुटता की मुख्य विशेषता क्या है?
answer: यह स्वैच्छिक है और कानून द्वारा अनिवार्य नहीं है
wrong_answers:
  - यह टैक्स से फंड किया जाता है
  - यह सामूहिक जरूरतों को पूरा करने के लिए लगाया जाता है
  - यह राज्य द्वारा नियंत्रित किया जाता है ताकि दुरुपयोग रोका जा सके।
explanation: |
  बास्तियत के लिए, असली एकजुटता सिर्फ स्वेच्छा से होने वाले Commitment से ही आ सकती है, जिसमें कोई कानूनी बाध्यता न हो।
question: Wat is volgens Bastiat het belangrijkste kenmerk van echte solidariteit?
answer: Het is vrijwillig en niet wettelijk verplicht
wrong_answers:
  - Het wordt gefinancierd door belastingen
  - Het wordt opgelegd om aan collectieve behoeften te voldoen
  - Het wordt gereguleerd door de staat om misbruik te voorkomen
explanation: |
  Voor Bastiat kan echte solidariteit alleen voortkomen uit een vrijwillige Commitment, vrij van enige wettelijke verplichting.
question: Vad är enligt Bastiat det främsta kännetecknet för sann solidaritet?
answer: Det är frivilligt och inte tvingande enligt lag
wrong_answers:
  - Den finansieras med skattemedel
  - Det införs för att tillgodose kollektiva behov
  - Den regleras av staten för att förhindra missbruk
explanation: |
  För Bastiat kan verklig solidaritet bara komma från en frivillig Commitment, fri från alla rättsliga förpliktelser.
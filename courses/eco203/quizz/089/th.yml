question: ตามที่บาสเตียตกล่าว ลักษณะสำคัญของความเป็นน้ำหนึ่งใจเดียวกันที่แท้จริงคืออะไร?
answer: เป็นไปโดยสมัครใจและไม่ถูกบังคับโดยกฎหมาย
wrong_answers:
  - มันได้รับเงินทุนจากภาษี
  - มันถูกกำหนดขึ้นเพื่อตอบสนองความต้องการร่วมกัน
  - มันถูกควบคุมโดยรัฐเพื่อป้องกันการละเมิด
explanation: |
  สำหรับบัสเตีย ความเป็นน้ำหนึ่งใจเดียวกันที่แท้จริงสามารถเกิดขึ้นได้จากการอุทิศตนโดยสมัครใจ ปราศจากข้อผูกพันทางกฎหมายใด ๆ
question: Коя е основната характеристика на истинската солидарност според Бастиа?
answer: То е доброволно и не е задължително по закон
wrong_answers:
  - Финансира се от данъци
  - Налага се, за да се отговори на колективните нужди
  - Тя се регулира от държавата, за да се предотвратят злоупотреби
explanation: |
  За Бастиа истинската солидарност може да се породи само от доброволен ангажимент, свободен от всякакви правни задължения.
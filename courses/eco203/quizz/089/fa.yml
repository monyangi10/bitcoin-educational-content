question: به گفته باستیا، ویژگی اصلی همبستگی واقعی چیست؟
answer: این داوطلبانه است و به‌موجب قانون اجباری نیست.
wrong_answers:
  - این از طریق مالیات تأمین مالی می‌شود
  - برای برآورده کردن نیازهای جمعی تحمیل می‌شود
  - توسط دولت تنظیم می‌شود تا از سوءاستفاده‌ها جلوگیری شود
explanation: |
  برای بَستیا، همبستگی واقعی تنها می‌تواند از یک Commitment داوطلبانه، بدون هیچ‌گونه تعهد قانونی ناشی شود.
question: Според Бастиа отговорност е принципът на... ?
answer: усъвършенстване
wrong_answers:
  - перфекционизъм
  - постоянство
  - перфектно постижение
explanation: |
  Бастиа разглежда отговорността като принцип на усъвършенстването, което означава, че тя е източник на усъвършенстване и личен напредък чрез уроците на опита.
reviewed: true

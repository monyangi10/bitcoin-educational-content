question: Is verantwoordelijkheid volgens Bastiat een principe van... ?
answer: perfectibiliteit
wrong_answers:
  - perfectie
  - standvastigheid
  - perfecte prestatie
explanation: |
  Bastiat ziet verantwoordelijkheid als een principe van perfectibiliteit, wat betekent dat het een bron is van verbetering en persoonlijke vooruitgang door de lessen van ervaring.

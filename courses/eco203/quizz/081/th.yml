question: ตามที่บาสเตียต ความรับผิดชอบเป็นหลักการของ... ?
answer: ความสมบูรณ์แบบ
wrong_answers:
  - ความสมบูรณ์แบบ
  - ความมั่นคง
  - ความสำเร็จที่สมบูรณ์แบบ
explanation: |
  Bastiat มองว่าความรับผิดชอบเป็นหลักการของความสมบูรณ์แบบ หมายความว่าเป็นแหล่งที่มาของการพัฒนาและความก้าวหน้าส่วนบุคคลผ่านบทเรียนจากประสบการณ์
reviewed: false
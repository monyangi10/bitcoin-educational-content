question: Hur ser Proudhon på egendom och dess fördelning i samhället?
answer: Han ser den ojämlika fördelningen av egendom som en form av stöld
wrong_answers:
  - Han anser att alla former av egendom är legitima och nödvändiga
  - Han vill avskaffa all individuell egendom till förmån för kollektiv Ownership
  - Han anser att egendom är oföränderlig och inte bör ifrågasättas
explanation: |
  Proudhon är känd för uttrycket "egendom är stöld", som syftar till att fördöma den ojämna fördelningen av egendom som en form av social orättvisa, snarare än egendomen i sig.
reviewed: false
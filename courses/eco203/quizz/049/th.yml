question: พราวดองมองทรัพย์สินและการกระจายทรัพย์สินในสังคมอย่างไร?
answer: เขามองว่าการกระจายทรัพย์สินที่ไม่เท่าเทียมกันเป็นรูปแบบหนึ่งของการขโมย
wrong_answers:
  - เขาถือว่าทรัพย์สินทุกรูปแบบเป็นสิ่งที่ถูกต้องและจำเป็น
  - เขาต้องการยกเลิกทรัพย์สินส่วนบุคคลทั้งหมดเพื่อสนับสนุนการเป็นเจ้าของร่วมกัน
  - เขาคิดว่าทรัพย์สินนั้นไม่เปลี่ยนแปลงและไม่ควรถูกตั้งคำถาม
explanation: |
  พรูดองมีชื่อเสียงจากวลี "ทรัพย์สินคือการขโมย" เพื่อประณามการกระจายทรัพย์สินที่ไม่เท่าเทียมกันว่าเป็นรูปแบบหนึ่งของความอยุติธรรมทางสังคม มากกว่าที่จะเป็นทรัพย์สินเอง
reviewed: false
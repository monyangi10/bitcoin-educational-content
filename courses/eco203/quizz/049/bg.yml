question: Как Прудон разглежда собствеността и нейното разпределение в обществото?
answer: Той разглежда неравномерното разпределение на собствеността като форма на кражба
wrong_answers:
  - Той смята всички форми на собственост за легитимни и необходими
  - Иска да премахне всякаква индивидуална собственост в полза на колективна собственост
  - Той смята, че собствеността е неизменна и не бива да се поставя под въпрос
explanation: |
  Прудон е известен с фразата "Собствеността е кражба", с която осъжда неравномерното разпределение на собствеността като форма на социална несправедливост, а не самата собственост.
reviewed: true

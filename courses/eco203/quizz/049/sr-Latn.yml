question: Kako Proudhon gleda na vlasništvo i njegovu raspodelu unutar društva?
answer: On vidi nejednaku raspodelu imovine kao oblik krađe
wrong_answers:
  - On smatra sve oblike svojine kao legitimne i neophodne
  - On želi ukinuti svu individualnu imovinu u korist kolektivnog vlasništva
  - On misli da je vlasništvo nepromenljivo i da ga ne treba dovoditi u pitanje
explanation: |
  Proudhon je poznat po frazi "Vlasništvo je krađa", kako bi osudio nejednaku raspodelu vlasništva kao oblik socijalne nepravde, a ne samo vlasništvo.
reviewed: false

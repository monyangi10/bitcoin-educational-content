question: Proudhon abona gute umutungo n’ugusangira kwawo mu kibano?
answer: Abona ko ugusangira itunga mu buryo butaringaniye ari uburyo bwo kwiba .
wrong_answers:
  - Abona ko ubwoko bwose bw’itunga bubereye kandi bukenewe .
  - Yipfuza gukuraho umutungo wose w’umuntu ku giti ciwe ku neza ya Ownership00 rusangi.
  - Yiyumvira ko umutungo udahinduka kandi ko udakwiye kwibazwa .
explanation: |
  Proudhon azwi cane mu majambo ngo Itunga ni ubusuma, kugira ngo ahakane ukudasangira itunga nk’uburyo bw’akarenganyo mu kibano, aho kwamagana itunga ubwaryo.

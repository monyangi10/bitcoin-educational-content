question: پروودون چگونه به مالکیت و توزیع آن در جامعه نگاه می‌کند؟
answer: او توزیع نابرابر دارایی را به عنوان شکلی از دزدی می‌بیند
wrong_answers:
  - او همه اشکال مالکیت را مشروع و ضروری می‌داند.
  - او می‌خواهد تمام مالکیت‌های فردی را به نفع Ownership جمعی لغو کند.
  - او فکر می‌کند که مالکیت تغییرناپذیر است و نباید مورد سوال قرار گیرد.
explanation: |
  پرودون به خاطر عبارت «مالکیت دزدی است» مشهور است، تا توزیع نابرابر مالکیت را به عنوان شکلی از بی‌عدالتی اجتماعی محکوم کند، نه خود مالکیت.
reviewed: false
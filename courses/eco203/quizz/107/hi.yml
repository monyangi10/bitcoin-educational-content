question: अमेरिका के किस राष्ट्रपति ने अपनी जवानी में कॉर्पोरेट सेमिनारों में बास्टियाट के विचार फैलाए थे?
answer: रोनाल्ड रीगन
wrong_answers:
  - फ्रैंकलिन रूज़वेल्ट
  - जॉर्ज बुश
  - ड्वाइट डी. आइज़नहावर
explanation: |
  रोनाल्ड रीगन, राष्ट्रपति बनने से पहले, जनरल इलेक्ट्रिक के सेमिनारों में बास्टियत और अन्य अर्थशास्त्रियों के उदारवादी विचारों का प्रसार करते थे।
reviewed: false
question: ประธานาธิบดีของสหรัฐอเมริกาคนใดที่ในช่วงวัยหนุ่มได้เผยแพร่แนวคิดของบาสเตียตในสัมมนาของบริษัท?
answer: โรนัลด์ เรแกน
wrong_answers:
  - แฟรงคลิน รูสเวลต์
  - จอร์จ บุช
  - ดไวต์ ดี. ไอเซนฮาวร์
explanation: |
  โรนัลด์ เรแกน ก่อนที่จะเป็นประธานาธิบดี ได้เผยแพร่แนวคิดเสรีนิยมของบาสเตียตและนักเศรษฐศาสตร์คนอื่นๆ ในการสัมมนาสำหรับเจเนอรัลอิเล็กทริก
reviewed: false
question: کدام رئیس‌جمهور ایالات متحده در دوران جوانی خود، ایده‌های بَستیَت را در سمینارهای شرکتی منتشر کرد؟
answer: رونالد ریگان
wrong_answers:
  - فرانکلین روزولت
  - جورج بوش
  - دوایت دی آیزنهاور
explanation: |
  رونالد ریگان، پیش از آنکه رئیس‌جمهور شود، ایده‌های لیبرال بَستیَت و دیگر اقتصاددانان را در سمینارهایی برای جنرال الکتریک منتشر می‌کرد.
reviewed: false
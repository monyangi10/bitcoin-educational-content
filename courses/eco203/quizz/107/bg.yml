question: Кой президент на Съединените щати на младини е разпространявал идеите на Бастиа на корпоративни семинари?
answer: Роналд Рейгън
wrong_answers:
  - Франклин Рузвелт
  - Джордж Буш
  - Дуайт Д. Айзенхауер
explanation: |
  Преди да стане президент, Роналд Рейгън разпространява либералните идеи на Бастиа и други икономисти на семинари за General Electric.
reviewed: false
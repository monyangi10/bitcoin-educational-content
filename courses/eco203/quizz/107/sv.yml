question: Vilken president i USA spred under sin ungdom Bastiats idéer på företagsseminarier?
answer: Ronald Reagan
wrong_answers:
  - Franklin Roosevelt
  - George Bush
  - Dwight D. Eisenhower
explanation: |
  Ronald Reagan spred, innan han blev president, Bastiats och andra ekonomers liberala idéer under seminarier för General Electric.

question: Koji predsednik Sjedinjenih Američkih Država je, tokom svoje mladosti, širio Bastiat-ove ideje na korporativnim seminarima?
answer: Ronald Reagan
wrong_answers:
  - Franklin Roosevelt
  - George Bush
  - Dwight D. Eisenhower
explanation: |
  Ronald Reagan, pre nego što je postao predsednik, širio je liberalne ideje Bastiat-a i drugih ekonomista na seminarima za General Electric.
reviewed: false

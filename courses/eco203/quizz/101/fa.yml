question: به گفته باستیا، بازتوزیع دولتی می‌تواند به چه چیزی منجر شود؟
answer: مشتری‌گرایی
wrong_answers:
  - صلح اجتماعی بلندمدت
  - بهبود در فرصت‌های برابر
  - تحریک پایدار اقتصاد
explanation: |
  برای بَستیَت، توزیع مجدد باعث ایجاد انحرافات اقتصادی و ترویج مشتری‌گرایی می‌شود، به جای اینکه نابرابری‌ها را حل کند.
reviewed: false
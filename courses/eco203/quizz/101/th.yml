question: ตามที่บาสเตียตกล่าว การกระจายรายได้ของรัฐสามารถนำไปสู่การบิดเบือนของทรัพยากรและแรงจูงใจทางเศรษฐกิจ ซึ่งอาจส่งผลให้เกิดการลดลงของประสิทธิภาพและนวัตกรรมในระบบเศรษฐกิจ
answer: ระบบอุปถัมภ์
wrong_answers:
  - สันติภาพทางสังคมในระยะยาว
  - การปรับปรุงโอกาสที่เท่าเทียมกัน
  - การกระตุ้นเศรษฐกิจอย่างยั่งยืน
explanation: |
  สำหรับบาสเตียต การกระจายรายได้ใหม่สร้างความบิดเบือนทางเศรษฐกิจและส่งเสริมระบบอุปถัมภ์ แทนที่จะแก้ไขความไม่เท่าเทียมกัน
reviewed: false
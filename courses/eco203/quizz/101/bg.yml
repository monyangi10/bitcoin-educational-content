question: До какво може да доведе държавното преразпределение според Бастиа?
answer: Клиентелизъм
wrong_answers:
  - Дългосрочен социален мир
  - Подобряване на равните възможности
  - Устойчиво стимулиране на икономиката
explanation: |
  За Бастиа преразпределението създава икономически деформации и насърчава клиентелизма, вместо да решава проблемите на неравенството.
reviewed: false
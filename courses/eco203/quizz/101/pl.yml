question: Do czego może prowadzić państwowa redystrybucja według Bastiata?
answer: Klientelizm
wrong_answers:
  - Długoterminowy pokój społeczny
  - Poprawa w zakresie równych szans
  - Zrównoważona stymulacja gospodarki
explanation: |
  Dla Bastiata redystrybucja powoduje zakłócenia gospodarcze i promuje klientelizm, zamiast rozwiązywać nierówności.

question: Waar kan staatsherverdeling volgens Bastiat toe leiden?
answer: Cliëntelisme
wrong_answers:
  - Sociale vrede op lange termijn
  - Een verbetering in gelijke kansen
  - Duurzame stimulering van de economie
explanation: |
  Voor Bastiat creëert herverdeling economische verstoringen en bevordert het cliëntelisme, in plaats van ongelijkheden op te lossen.
reviewed: false
question: Vad kan statlig omfördelning leda till enligt Bastiat?
answer: Klientelism
wrong_answers:
  - Långsiktig social fred
  - En förbättring av lika möjligheter
  - Hållbar stimulans av ekonomin
explanation: |
  Enligt Bastiat skapar omfördelning ekonomiska snedvridningar och främjar klientelism, snarare än att lösa ojämlikheter.
reviewed: false
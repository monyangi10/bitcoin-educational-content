question: Prema Bastiat-u, državna redistribucija može dovesti do neefikasnosti i nepravde, jer se resursi preusmeravaju od onih koji su ih zaradili ka onima koji ih nisu zaradili, što može obeshrabriti produktivnost i podstaći zavisnost.
answer: Klijentelizam
wrong_answers:
  - Dugoročni društveni mir
  - Poboljšanje jednakih mogućnosti
  - Održiva stimulacija ekonomije
explanation: |
  Za Bastiat-a, redistribucija stvara ekonomske distorzije i podstiče klijentelizam, umesto da rešava nejednakosti.

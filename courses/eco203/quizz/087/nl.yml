question: Waar vind je volgens Bastiat een vorm van authentieke en georganiseerde solidariteit?
answer: in onderlinge hulporganisaties
wrong_answers:
  - in de welvaartsstaat
  - in herverdelingsbeleid
  - in de maatregelen van Bismarck
explanation: |
  Bastiat pleit voor onderlinge hulpmaatschappijen als voorbeeld van echte solidariteit omdat ze gebaseerd zijn op vrijwillige wederzijdse hulp.
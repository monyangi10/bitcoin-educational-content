question: به گفته باستیا، کجا می‌توان شکلی از همبستگی اصیل و سازمان‌یافته را یافت؟
answer: در جوامع کمک متقابل
wrong_answers:
  - در دولت رفاه
  - در سیاست‌های توزیع مجدد
  - در اقدامات بیسمارک
explanation: |
  باستیا برای جوامع کمک متقابل به عنوان نمونه‌ای از همبستگی واقعی تبلیغ می‌کند زیرا آن‌ها بر اساس کمک متقابل داوطلبانه هستند.
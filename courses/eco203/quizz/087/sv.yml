question: Var kan man enligt Bastiat finna en form av äkta och organiserad solidaritet?
answer: i ömsesidiga hjälporganisationer
wrong_answers:
  - i välfärdsstaten
  - i omfördelningspolitiken
  - i Bismarcks åtgärder
explanation: |
  Bastiat förespråkar ömsesidiga hjälporganisationer som ett exempel på verklig solidaritet, eftersom de bygger på frivillig ömsesidig hjälp.
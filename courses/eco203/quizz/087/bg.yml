question: Според Бастиа къде може да се намери форма на автентична и организирана солидарност?
answer: в дружествата за взаимопомощ
wrong_answers:
  - в социалната държава
  - в политиките за преразпределение
  - в мерките на Бисмарк
explanation: |
  Бастиа се застъпва за обществата за взаимопомощ като пример за истинска солидарност, тъй като те се основават на доброволна взаимопомощ.
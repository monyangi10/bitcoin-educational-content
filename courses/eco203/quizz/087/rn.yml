question: Nk’uko Bastiat abivuga, ni hehe umuntu yoronka uburyo bwo gufatanya nyakuri kandi butunganijwe?
answer: mu mashirahamwe y'ugufashanya
wrong_answers:
  - muri Leta y'imibereho myiza
  - mu mategeko yo gusubira gusangira
  - mu bipimo vya Bismarck
explanation: |
  Bastiat avuga ko amashirahamwe y’ugufashanya ari akarorero k’ubumwe nyakuri kuko ashingiye ku gufashanya ku bushake.
question: ผลโดยตรงของนโยบายอัตราดอกเบี้ยต่ำที่ดำเนินการโดยธนาคารกลางตามที่ Bastiat กล่าวคืออะไร?
answer: การเพิ่มขึ้นของการลงทุนที่มีความเสี่ยงและความไม่มั่นคงทางการเงิน
wrong_answers:
  - การเพิ่มขึ้นของอำนาจการซื้อของชนชั้นแรงงาน
  - การลดลงของต้นทุนสินค้าบริโภค
  - การลดความไม่เท่าเทียมกันทางสังคม
explanation: |
  บาสเตียตวิจารณ์นโยบายอัตราดอกเบี้ยต่ำเนื่องจากผลกระทบเชิงลบต่อเสถียรภาพทางการเงิน ซึ่งส่งเสริมการลงทุนที่มีความเสี่ยงและการเก็งกำไร ซึ่งเป็นผลเสียต่อเศรษฐกิจที่แข็งแรง
reviewed: false
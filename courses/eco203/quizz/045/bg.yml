question: Каква е пряката последица от политиката на ниски лихвени проценти, провеждана от централните банки според Бастиа?
answer: Увеличаване на рисковите инвестиции и финансова нестабилност
wrong_answers:
  - Увеличаване на покупателната способност на работническата класа
  - Намаляване на разходите за потребителски стоки
  - Намаляване на социалното неравенство
explanation: |
  Бастиа критикува политиката на ниски лихвени проценти поради отрицателното ѝ въздействие върху финансовата стабилност, която насърчава рискови инвестиции и спекулации в ущърб на здравата икономика.
reviewed: true

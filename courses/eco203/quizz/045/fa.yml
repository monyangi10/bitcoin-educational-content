question: پیامد مستقیم سیاست نرخ بهره پایین که توسط بانک‌های مرکزی اجرا می‌شود، طبق نظر بَستیا چیست؟
answer: افزایش سرمایه‌گذاری‌های پرخطر و بی‌ثباتی مالی
wrong_answers:
  - افزایش قدرت خرید طبقات کارگر
  - کاهش هزینه کالاهای مصرفی
  - کاهش نابرابری‌های اجتماعی
explanation: |
  باستیا سیاست نرخ بهره پایین را به دلیل تأثیر منفی آن بر ثبات مالی، که سرمایه‌گذاری‌های پرخطر و سفته‌بازی را تشویق می‌کند و به زیان یک اقتصاد سالم است، مورد انتقاد قرار می‌دهد.
reviewed: false
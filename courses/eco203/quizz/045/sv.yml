question: Vad är den direkta konsekvensen av centralbankernas lågräntepolitik enligt Bastiat?
answer: En ökning av riskfyllda investeringar och finansiell instabilitet
wrong_answers:
  - En ökning av arbetarklassens köpkraft
  - En minskning av kostnaden för konsumtionsvaror
  - Minskad social ojämlikhet
explanation: |
  Bastiat kritiserar lågräntepolitiken för att den har en negativ inverkan på den finansiella stabiliteten och uppmuntrar till riskfyllda investeringar och spekulation, vilket är till nackdel för en sund ekonomi.
reviewed: false
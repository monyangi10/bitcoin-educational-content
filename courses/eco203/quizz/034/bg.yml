question: Какво е мнението на Бастиа за природата на човека при раждането му?
answer: Собственик
wrong_answers:
  - Slave
  - Добър
  - Покорен
explanation: |
  Бастиа твърди, че човек се ражда собственик, защото притежава правото да използва способностите си, за да задоволява нуждите си.
reviewed: false
question: जन्म के समय मनुष्य की प्रकृति के बारे में बास्टियाट का क्या दृष्टिकोण है?
answer: मालिक
wrong_answers:
  - गुलाम
  - अच्छा
  - विनम्र
explanation: |
  बास्टियाट का मानना ​​है कि मनुष्य जन्म से ही स्वामी होता है, क्योंकि उसके पास अपनी आवश्यकताओं की पूर्ति के लिए अपनी शक्तियों का प्रयोग करने का अधिकार होता है।
reviewed: false
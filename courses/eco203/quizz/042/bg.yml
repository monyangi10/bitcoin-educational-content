question: Какъв е основният ефект на протекционизма върху потребителите?
answer: Увеличава цената на продуктите, които купуват
wrong_answers:
  - Позволява им да купуват продукти с по-високо качество
  - Предлага им по-голям избор от продукти
  - Не оказва влияние върху покупателната им способност
explanation: |
  Протекционизмът налага данъци върху вноса, което оскъпява продуктите за потребителите.
reviewed: true

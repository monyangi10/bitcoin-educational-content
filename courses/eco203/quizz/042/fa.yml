question: اثر اصلی حمایت‌گرایی بر مصرف‌کنندگان چیست؟
answer: این قیمت محصولاتی که آنها می‌خرند را افزایش می‌دهد
wrong_answers:
  - این به آن‌ها اجازه می‌دهد تا محصولات با کیفیت بالاتر بخرند.
  - این به آن‌ها انتخاب گسترده‌تری از محصولات ارائه می‌دهد.
  - این هیچ تأثیری بر قدرت خرید آنها ندارد
explanation: |
  حمایت‌گرایی مالیات‌هایی بر واردات اعمال می‌کند که محصولات را برای مصرف‌کنندگان گران‌تر می‌کند.
reviewed: false
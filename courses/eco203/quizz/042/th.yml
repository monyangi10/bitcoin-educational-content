question: ผลกระทบหลักของการปกป้องทางการค้าต่อผู้บริโภคคืออะไร?
answer: มันเพิ่มราคาของสินค้าที่พวกเขาซื้อ
wrong_answers:
  - มันช่วยให้พวกเขาซื้อสินค้าที่มีคุณภาพสูงขึ้น
  - มันมอบตัวเลือกผลิตภัณฑ์ที่หลากหลายมากขึ้นให้กับพวกเขา
  - มันไม่มีผลกระทบต่ออำนาจการซื้อของพวกเขา
explanation: |
  ลัทธิปกป้องทางการค้าเรียกเก็บภาษีจากการนำเข้า ซึ่งทำให้สินค้ามีราคาแพงขึ้นสำหรับผู้บริโภค
reviewed: false
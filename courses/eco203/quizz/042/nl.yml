question: Wat is het belangrijkste effect van protectionisme op consumenten?
answer: Het verhoogt de prijs van de producten die ze kopen
wrong_answers:
  - Hierdoor kunnen ze producten van hogere kwaliteit kopen
  - Het biedt hen een ruimere keuze aan producten
  - Het heeft geen invloed op hun koopkracht
explanation: |
  Protectionisme legt belastingen op import op, waardoor producten duurder worden voor consumenten.
reviewed: false
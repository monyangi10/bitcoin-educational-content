question: รัฐควรปฏิบัติหน้าที่อะไรบ้างตามที่บาสเตียตกล่าวไว้?
answer: ความมั่นคงภายใน ความมั่นคงภายนอก และความยุติธรรม
wrong_answers:
  - กฎระเบียบ, การกระจายใหม่, และความยุติธรรม
  - ความปลอดภัย ความยุติธรรม และความเสมอภาค
  - การศึกษา สุขภาพ และความยุติธรรม
explanation: |
  Bastiat สนับสนุนบทบาทที่จำกัดของรัฐให้ทำหน้าที่ด้านความมั่นคงภายในและภายนอกและความยุติธรรม เพื่อปกป้องสิทธิธรรมชาติของบุคคล
reviewed: false
question: چه وظایفی باید دولت طبق نظر بستی انجام دهد؟
answer: امنیت داخلی، امنیت خارجی، و عدالت
wrong_answers:
  - مقررات، توزیع مجدد، و عدالت
  - امنیت، عدالت، و برابری
  - آموزش، بهداشت، و عدالت
explanation: |
  باستیا برای نقش محدود دولت در وظایف امنیت داخلی و خارجی و عدالت، به منظور حفاظت از حقوق طبیعی افراد، حمایت می‌کند.
reviewed: false
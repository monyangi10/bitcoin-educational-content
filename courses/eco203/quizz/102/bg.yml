question: Какви функции трябва да изпълнява държавата според Бастиа?
answer: Вътрешна сигурност, външна сигурност и правосъдие
wrong_answers:
  - Регулиране, преразпределение и справедливост
  - Сигурност, справедливост и равенство
  - Образование, здравеопазване и правосъдие
explanation: |
  Бастиа се застъпва за ограничаване на ролята на държавата до функциите на вътрешна и външна сигурност и правосъдие, за защита на естествените права на индивидите.
reviewed: true

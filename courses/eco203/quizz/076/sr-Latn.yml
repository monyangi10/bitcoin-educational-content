question: Prema Bastiat-u, šta etatizam oduzima pojedincima?
answer: Posledice njihovih postupaka
wrong_answers:
  - Od njihovih porodica
  - Od radosti slobodnog eksperimentisanja
  - Od njihovih prijatelja
explanation: |
  Za Bastiat-a, prekomerna intervencija države smanjuje individualnu odgovornost uklanjanjem direktnih posledica postupaka pojedinaca, čime se podstiče neodgovornost.

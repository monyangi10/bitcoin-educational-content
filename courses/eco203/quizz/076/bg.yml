question: Според Бастиа какво отнема на хората етатизмът?
answer: Последиците от техните действия
wrong_answers:
  - От техните семейства
  - От радостите на свободното експериментиране
  - От техните приятели
explanation: |
  Според Бастиа прекомерната държавна намеса намалява индивидуалната отговорност, като премахва преките последици от действията на хората и по този начин насърчава безотговорността.

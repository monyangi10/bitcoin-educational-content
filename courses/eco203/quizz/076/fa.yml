question: با توجه به نظر بَستیا، دولت‌گرایی افراد را از چه چیزی کم می‌کند؟
answer: عواقب اعمال آنها
wrong_answers:
  - از خانواده‌هایشان
  - از لذت‌های آزمایش آزاد
  - از دوستانشان
explanation: |
  برای بَستیا، مداخله بیش از حد دولت، مسئولیت فردی را با حذف پیامدهای مستقیم اعمال افراد کاهش می‌دهد و بدین ترتیب بی‌مسئولیتی را ترویج می‌کند.
reviewed: false
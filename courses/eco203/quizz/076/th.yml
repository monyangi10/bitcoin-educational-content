question: ตามที่บาสเตียตกล่าวไว้ รัฐนิยมลบอะไรออกจากปัจเจกบุคคล?
answer: ผลที่ตามมาจากการกระทำของพวกเขา
wrong_answers:
  - จากครอบครัวของพวกเขา
  - จากความสุขของการทดลองอย่างอิสระ
  - จากเพื่อนของพวกเขา
explanation: |
  สำหรับบาสเตียต์ การแทรกแซงของรัฐที่มากเกินไปลดความรับผิดชอบของบุคคลโดยการลบผลที่ตามมาโดยตรงจากการกระทำของบุคคลนั้น ๆ ซึ่งส่งเสริมความไร้ความรับผิดชอบ
reviewed: false
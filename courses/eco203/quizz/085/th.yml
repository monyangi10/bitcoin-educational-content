question: ความเป็นน้ำหนึ่งใจเดียวกันที่บังคับใช้เป็นความเป็นน้ำหนึ่งใจเดียวกันที่ผิดพลาดได้อย่างไร?
answer: เพราะมันนำไปสู่การให้ในลักษณะที่ไม่สมัครใจ
wrong_answers:
  - เพราะมันไม่ได้ถูกตัดสินด้วยวิถีประชาธิปไตยเสมอไป
  - เพราะว่ามันต้องการการบริหารจัดการมากเกินไป
  - เพราะมันยากที่จะนำไปใช้
explanation: |
  การบังคับให้เกิดความเป็นน้ำหนึ่งใจเดียวกัน ตามที่บาสเตียตกล่าว ไม่สามารถถือว่าเป็นศีลธรรมได้อย่างแท้จริง เพราะมันบังคับให้มีการให้โดยปราศจากความยินยอมโดยสมัครใจ
question: چگونه همبستگی اجباری یک همبستگی کاذب است؟
answer: زیرا این امر به بخشش به شیوه‌ای غیرارادی منجر می‌شود.
wrong_answers:
  - زیرا همیشه به صورت دموکراتیک تصمیم‌گیری نمی‌شود
  - زیرا به مدیریت زیادی نیاز دارد
  - زیرا اعمال آن دشوار است
explanation: |
  همبستگی اجباری، به گفته باستیا، نمی‌تواند واقعاً اخلاقی باشد زیرا بخشش را بدون رضایت داوطلبانه تحمیل می‌کند.
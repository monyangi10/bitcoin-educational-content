question: अनिवार्य एकजुटता झूठी एकजुटता कैसे है?
answer: क्योंकि यह अनैच्छिक तरीके से देने की ओर ले जाता है
wrong_answers:
  - क्योंकि यह हमेशा लोकतांत्रिक तरीके से तय नहीं होता
  - क्योंकि इसके लिए बहुत अधिक प्रशासन की आवश्यकता होती है
  - क्योंकि इसे लागू करना कठिन है
explanation: |
  बास्टियाट के अनुसार, जबरन एकजुटता वास्तव में नैतिक नहीं हो सकती, क्योंकि यह स्वैच्छिक सहमति के बिना दान करने को बाध्य करती है।
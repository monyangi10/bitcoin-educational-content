question: Kako je obavezna solidarnost lažna solidarnost?
answer: Jer vodi ka davanju na nevoljan način
wrong_answers:
  - Zato što nije uvek odlučeno demokratski
  - Zato što zahteva previše administracije
  - Zato što je teško primeniti
explanation: |
  Prisilna solidarnost, prema Bastiat-u, ne može biti zaista moralna jer nameće davanje bez dobrovoljnog pristanka.
reviewed: true

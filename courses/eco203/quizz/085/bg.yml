question: Как задължителната солидарност е фалшива солидарност?
answer: Защото води до недоброволно даряване
wrong_answers:
  - Защото не винаги се решава демократично
  - Защото изисква твърде много администрация
  - Тъй като е трудно да се прилага
explanation: |
  Принудителната солидарност, според Бастиа, не може да бъде истински морална, защото налага даване без доброволно съгласие.
reviewed: true

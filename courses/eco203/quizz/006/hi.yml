question: बस्तीया ने फ्रांस में मुक्त व्यापार को बढ़ावा देने के लिए कौन सी संस्था स्थापित की थी?
answer: व्यापार की स्वतंत्रता के लिए संघ
wrong_answers:
  - स्विंगिंग के लिए संघ
  - मुक्त बाजार संघ (Association for the Free Market)
  - मुक्त प्रतिस्पर्धा के लिए लीग
explanation: |
  बास्तियाँ ने फ्रांस में अपने उदारवादी विचार फैलाने के लिए 'एसोसिएशन फॉर द फ्रीडम ऑफ ट्रेड' की स्थापना की।
reviewed: false
question: Jakie stowarzyszenie Bastiat założył we Francji w celu promowania wolnego handlu?
answer: Stowarzyszenie na rzecz Wolnego Handlu
wrong_answers:
  - Stowarzyszenie na rzecz swingu
  - Stowarzyszenie na rzecz Wolnego Rynku
  - Liga na rzecz wolnej konkurencji
explanation: |
  Bastiat założył Stowarzyszenie na rzecz Wolności Handlu, aby szerzyć swoje liberalne idee we Francji.

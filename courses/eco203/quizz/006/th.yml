question: สมาคมใดที่ Bastiat ก่อตั้งในฝรั่งเศสเพื่อส่งเสริมการค้าเสรี?
answer: สมาคมเพื่อเสรีภาพทางการค้า
wrong_answers:
  - สมาคมสำหรับการสวิง
  - สมาคมเพื่อเสรีภาพทางการตลาด
  - ลีกเพื่อการแข่งขันเสรี
explanation: |
  บัสเตียตได้ก่อตั้งสมาคมเพื่อเสรีภาพทางการค้าเพื่อเผยแพร่แนวคิดเสรีนิยมของเขาในฝรั่งเศส
reviewed: false
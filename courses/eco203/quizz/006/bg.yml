question: Каква асоциация основава Бастиа във Франция, за да насърчава свободната търговия?
answer: Асоциация за свободна търговия
wrong_answers:
  - Асоциация за суинг
  - Асоциация за свободния пазар
  - Лига за свободна конкуренция
explanation: |
  Бастиа основава Асоциацията за свобода на търговията, за да разпространи либералните си идеи във Франция.

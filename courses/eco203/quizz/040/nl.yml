question: Wat is protectionisme volgens Bastiat?
answer: Een vorm van economisch nationalisme gericht op het beperken van buitenlandse concurrentie
wrong_answers:
  - Een economisch beleid gericht op het bevorderen van internationale handel
  - Een strategie om de koopkracht van consumenten te vergroten
  - Een maatregel om kleine lokale bedrijven te steunen
explanation: |
  Bastiat beschrijft protectionisme als een economisch nationalisme dat nationale belangen wil beschermen door buitenlandse concurrentie te beperken.
reviewed: false
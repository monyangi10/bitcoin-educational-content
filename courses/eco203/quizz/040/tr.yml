question: Bastiat'ya göre korumacılık nedir?
answer: Yabancı rekabeti sınırlandırmayı amaçlayan bir ekonomik milliyetçilik biçimi
wrong_answers:
  - Uluslararası ticareti teşvik etmeyi amaçlayan bir ekonomi politikası
  - Tüketicinin satın alma gücünü artırmaya yönelik bir strateji
  - Küçük yerel işletmeleri desteklemek için bir önlem
explanation: |
  Bastiat korumacılığı, yabancı rekabeti sınırlandırarak ulusal çıkarları korumayı amaçlayan bir ekonomik milliyetçilik olarak tanımlamaktadır.

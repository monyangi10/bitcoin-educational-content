question: Šta je protekcionizam prema Bastiat-u?
answer: Oblik ekonomskog nacionalizma usmeren na ograničavanje strane konkurencije
wrong_answers:
  - Ekonomska politika usmerena na promociju međunarodne trgovine
  - Strategija za povećanje kupovne moći potrošača
  - Mera za podršku malim lokalnim preduzećima
explanation: |
  Bastiat opisuje protekcionizam kao ekonomski nacionalizam koji nastoji da zaštiti nacionalne interese ograničavanjem strane konkurencije.

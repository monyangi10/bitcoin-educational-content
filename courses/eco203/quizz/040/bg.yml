question: Какво представлява протекционизмът според Бастиа?
answer: Форма на икономически национализъм, насочена към ограничаване на чуждестранната конкуренция
wrong_answers:
  - Икономическа политика, насочена към насърчаване на международната търговия
  - Стратегия за увеличаване на покупателната способност на потребителите
  - Мярка за подкрепа на малките местни предприятия
explanation: |
  Бастиа описва протекционизма като икономически национализъм, който се стреми да защити националните интереси чрез ограничаване на чуждестранната конкуренция.
reviewed: false
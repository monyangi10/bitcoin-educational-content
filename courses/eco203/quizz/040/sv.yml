question: Vad är protektionism enligt Bastiat?
answer: En form av ekonomisk nationalism som syftar till att begränsa utländsk konkurrens
wrong_answers:
  - En ekonomisk politik som syftar till att främja internationell handel
  - En strategi för att öka konsumenternas köpkraft
  - En åtgärd för att stödja små lokala företag
explanation: |
  Bastiat beskriver protektionism som en ekonomisk nationalism som syftar till att skydda nationella intressen genom att begränsa utländsk konkurrens.

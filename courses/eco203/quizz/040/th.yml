question: การปกป้องตามที่บาสเตียตคืออะไร?
answer: รูปแบบหนึ่งของชาตินิยมทางเศรษฐกิจที่มุ่งจำกัดการแข่งขันจากต่างประเทศ
wrong_answers:
  - นโยบายเศรษฐกิจที่มุ่งส่งเสริมการค้าระหว่างประเทศ
  - กลยุทธ์ในการเพิ่มอำนาจการซื้อของผู้บริโภค
  - มาตรการสนับสนุนธุรกิจท้องถิ่นขนาดเล็ก
explanation: |
  บัสเตียตอธิบายว่าการปกป้องทางการค้าเป็นลัทธิชาตินิยมทางเศรษฐกิจที่พยายามปกป้องผลประโยชน์ของชาติด้วยการจำกัดการแข่งขันจากต่างประเทศ
reviewed: false
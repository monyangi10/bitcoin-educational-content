question: حمایت‌گرایی از نظر بَستیا چیست؟
answer: شکلی از ملی‌گرایی اقتصادی که هدف آن محدود کردن رقابت خارجی است
wrong_answers:
  - یک سیاست اقتصادی با هدف ترویج تجارت بین‌المللی
  - استراتژی برای افزایش قدرت خرید مصرف‌کننده
  - اقدامی برای حمایت از کسب‌وکارهای کوچک محلی
explanation: |
  باستیا حمایت‌گرایی را به‌عنوان یک ملی‌گرایی اقتصادی توصیف می‌کند که به دنبال حفاظت از منافع ملی با محدود کردن رقابت خارجی است.
reviewed: false
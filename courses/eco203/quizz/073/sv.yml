question: Vilken är den viktigaste lärdomen av exemplet med blyertspennan?
answer: Den spontana samordningens roll i ekonomin
wrong_answers:
  - Komplexiteten i industriell produktion
  - Vikten av att veta hur man skriver
  - Nödvändigheten av centraliserad planering
explanation: |
  Exemplet med blyertspennan visar att spontan marknadskoordinering möjliggör produktion av komplexa varor utan centraliserad planering.
reviewed: false
question: Koja je glavna lekcija koju treba naučiti iz primera sa olovkom?
answer: Uloga spontane koordinacije u ekonomiji
wrong_answers:
  - Složenost industrijske proizvodnje
  - Važnost poznavanja pisanja
  - Potreba za centralizovanim planiranjem
explanation: |
  Primer sa olovkom pokazuje da spontana tržišna koordinacija omogućava proizvodnju složenih dobara bez centralizovanog planiranja.

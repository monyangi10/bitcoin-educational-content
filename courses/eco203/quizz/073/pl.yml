question: Jaką lekcję można wyciągnąć z przykładu z ołówkiem?
answer: Rola spontanicznej koordynacji w gospodarce
wrong_answers:
  - Złożoność produkcji przemysłowej
  - Znaczenie umiejętności pisania
  - Konieczność scentralizowanego planowania
explanation: |
  Przykład ołówka pokazuje, że spontaniczna koordynacja rynku pozwala na produkcję złożonych towarów bez scentralizowanego planowania.

question: درس اصلی که می‌توان از مثال مداد گرفت چیست؟
answer: نقش هماهنگی خودجوش در اقتصاد
wrong_answers:
  - پیچیدگی تولید صنعتی
  - اهمیت دانستن نحوه نوشتن
  - ضرورت برنامه‌ریزی متمرکز
explanation: |
  مثال مداد نشان می‌دهد که هماهنگی خودجوش بازار امکان تولید کالاهای پیچیده را بدون برنامه‌ریزی متمرکز فراهم می‌کند.
reviewed: false
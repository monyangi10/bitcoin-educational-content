question: पेंसिल के उदाहरण से मुख्य सीख क्या है?
answer: अर्थव्यवस्था में स्वतः समन्वय की भूमिका
wrong_answers:
  - औद्योगिक उत्पादन की जटिलता
  - लिखना आना कितना ज़रूरी है
  - केंद्रीय योजना की ज़रूरत
explanation: |
  पेंसिल वाला उदाहरण दिखाता है कि बिना किसी केंद्रीय योजना के, खुद-ब-खुद बाज़ार का तालमेल जटिल चीज़ों के उत्पादन को संभव बनाता है।

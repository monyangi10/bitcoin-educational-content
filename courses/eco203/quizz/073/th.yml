question: บทเรียนหลักที่ควรเรียนรู้จากตัวอย่างดินสอคืออะไร?
answer: บทบาทของการประสานงานโดยธรรมชาติในเศรษฐกิจ
wrong_answers:
  - ความซับซ้อนของการผลิตในอุตสาหกรรม
  - ความสำคัญของการรู้วิธีการเขียน
  - ความจำเป็นของการวางแผนแบบรวมศูนย์
explanation: |
  ตัวอย่างดินสอแสดงให้เห็นว่าการประสานงานของตลาดที่เกิดขึ้นเองช่วยให้สามารถผลิตสินค้าที่ซับซ้อนได้โดยไม่ต้องมีการวางแผนจากศูนย์กลาง
reviewed: false
question: Каква е основната поука от примера с молива?
answer: Ролята на спонтанната координация в икономиката
wrong_answers:
  - Сложността на промишленото производство
  - Значението на умението да се пише
  - Необходимостта от централизирано планиране
explanation: |
  Примерът с молива показва, че спонтанната пазарна координация позволява производството на сложни стоки без централизирано планиране.
reviewed: true

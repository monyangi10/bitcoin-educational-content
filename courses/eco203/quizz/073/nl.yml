question: Wat is de belangrijkste les die we kunnen leren van het potloodvoorbeeld?
answer: De rol van spontane coördinatie in de economie
wrong_answers:
  - De complexiteit van industriële productie
  - Het belang van weten hoe je moet schrijven
  - De noodzaak van gecentraliseerde planning
explanation: |
  Het potloodvoorbeeld toont aan dat spontane marktcoördinatie de productie van complexe goederen mogelijk maakt zonder gecentraliseerde planning.
reviewed: false
question: برای بَستیا، آیا حق مالکیت توسط قانون‌گذاری ایجاد می‌شود یا پیش از آن وجود دارد؟
answer: قبل از قانون‌گذاری
wrong_answers:
  - ایجاد شده توسط قانون
  - ایجاد شده توسط اجتماعی Contract
  - وابسته به اراده عمومی
explanation: |
  باستیا حق مالکیت را به عنوان یک حق طبیعی می‌داند که مقدم بر قانون است و قانون باید تنها از آن دفاع کند.
question: За Бастиа правото на собственост се създава от законодателството или го предхожда?
answer: предхожда законодателството
wrong_answers:
  - създадени по силата на законодателството
  - създадени от обществения договор
  - зависи от общата воля
explanation: |
  Бастиа счита правото на собственост за естествено право, което предхожда закона, който трябва само да осигури неговата защита.
question: बस्तिया के लिए, क्या संपत्ति का अधिकार कानून द्वारा बनाया गया है या यह उससे पहले से मौजूद है?
answer: कानून बनने से पहले
wrong_answers:
  - कानून द्वारा बनाया गया
  - सोशल Contract द्वारा बनाया गया
  - सामान्य इच्छा पर निर्भर
explanation: |
  बास्तियात संपत्ति के अधिकार को एक प्राकृतिक अधिकार मानते हैं जो कानून से पहले से मौजूद है, और कानून का काम सिर्फ इसकी रक्षा करना होना चाहिए।
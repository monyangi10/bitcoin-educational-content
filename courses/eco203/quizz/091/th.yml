question: สำหรับบาสเตียต์ สิทธิในทรัพย์สินถูกสร้างขึ้นโดยกฎหมายหรือมีมาก่อนหน้านั้น?
answer: มาก่อนกฎหมาย
wrong_answers:
  - สร้างขึ้นโดยกฎหมาย
  - สร้างขึ้นโดยสัญญาประชาคม
  - ขึ้นอยู่กับเจตจำนงทั่วไป
explanation: |
  บาสเตียตพิจารณาว่าสิทธิในทรัพย์สินเป็นสิทธิตามธรรมชาติที่มีมาก่อนกฎหมาย ซึ่งควรมีหน้าที่เพียงปกป้องสิทธินี้เท่านั้น
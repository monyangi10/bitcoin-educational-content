question: Кой е авторът на "Аз, моливът" и кой е превел на английски език "Законът" на Бастиа?
answer: Леонард Рийд
wrong_answers:
  - Леонард Нимой
  - Леонард Коен
  - Милтън Фридман
explanation: |
  Леонард Рийд е известен с превода на "Законът" на Бастиа на английски език и с популяризирането на творчеството му чрез Фондацията за икономическо образование.
reviewed: true

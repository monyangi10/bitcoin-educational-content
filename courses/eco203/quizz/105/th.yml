question: ผู้เขียน I, Pencil คือใครและใครที่แปล The Law ของ Bastiat เป็นภาษาอังกฤษ?
answer: ลีโอนาร์ด รีด
wrong_answers:
  - ลีโอนาร์ด นิมอย
  - Leonard Cohen
  - มิลตัน ฟรีดแมน
explanation: |
  Leonard Read เป็นที่รู้จักจากการแปล The Law ของ Bastiat เป็นภาษาอังกฤษและการเผยแพร่ผลงานของเขาผ่านมูลนิธิเพื่อการศึกษาเศรษฐศาสตร์
reviewed: false
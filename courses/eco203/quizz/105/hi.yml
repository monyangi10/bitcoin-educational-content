question: आई, पेंसिल के लेखक कौन हैं तथा बास्टियाट के द लॉ का अंग्रेजी में अनुवाद किसने किया है?
answer: लियोनार्ड रीड
wrong_answers:
  - लियोनार्ड निमोय
  - लियोनार्ड कोहेन
  - मिल्टन फ्रीडमैन
explanation: |
  लियोनार्ड रीड को बास्टियाट की पुस्तक द लॉ का अंग्रेजी में अनुवाद करने तथा फाउंडेशन फॉर इकोनॉमिक एजुकेशन के माध्यम से उनके कार्य को लोकप्रिय बनाने के लिए जाना जाता है।
reviewed: false
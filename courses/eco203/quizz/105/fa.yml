question: نویسنده "I, Pencil" و کسی که "قانون" باستیا را به انگلیسی ترجمه کرده است کیست؟
answer: لئونارد رید
wrong_answers:
  - لئونارد نیموی
  - لئونارد کوهن
  - میلتون فریدمن
explanation: |
  لئونارد رید به خاطر ترجمه کتاب "قانون" باستیا به انگلیسی و ترویج آثار او از طریق بنیاد آموزش اقتصادی شناخته شده است.
reviewed: false
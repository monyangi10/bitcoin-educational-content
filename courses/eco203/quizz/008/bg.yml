question: Къде е заседавал Фредерик Бастиа в Националното събрание?
answer: В лявоцентристкия спектър с Алексис дьо Токвил
wrong_answers:
  - Вляво със социалистите
  - Вдясно с монархистите
  - В център-дясно с консервативните либерали
explanation: |
  Бастиа е в лявоцентристкото пространство заедно с Токвил, където защитава индивидуалните свободи.
reviewed: true

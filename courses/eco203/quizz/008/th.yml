question: Frédéric Bastiat นั่งที่ไหนในสภาแห่งชาติ?
answer: ในศูนย์กลาง-ซ้ายกับ Alexis de Tocqueville
wrong_answers:
  - ทางซ้ายกับพวกสังคมนิยม
  - ทางขวากับพวกนิยมกษัตริย์
  - ในศูนย์กลาง-ขวากับกลุ่มเสรีนิยมอนุรักษ์นิยม
explanation: |
  บาสเตียตนั่งอยู่ทางซ้ายกลางกับโทควิลล์ ซึ่งเขาได้ปกป้องเสรีภาพส่วนบุคคล
reviewed: false
question: فردریک باستیا در کجا در مجلس ملی نشسته بود؟
answer: در مرکز-چپ با الکسی دو توکویل
wrong_answers:
  - در سمت چپ با سوسیالیست‌ها
  - در سمت راست با سلطنت‌طلبان
  - در مرکز-راست با لیبرال‌های محافظه‌کار
explanation: |
  باستیا در مرکز-چپ با توکویل نشست، جایی که از آزادی‌های فردی دفاع کرد.
reviewed: false
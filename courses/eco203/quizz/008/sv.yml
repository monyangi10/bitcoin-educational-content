question: Var satt Frédéric Bastiat i nationalförsamlingen?
answer: I mitten-vänster med Alexis de Tocqueville
wrong_answers:
  - Till vänster med socialdemokraterna
  - Till höger med monarkisterna
  - I mitten-höger med de konservativa liberalerna
explanation: |
  Bastiat satt i mitten-vänster med Tocqueville, där han försvarade individuella friheter.

question: Wie ondertekende uiteindelijk een vrijhandelsverdrag met Engeland in 1866, wat een postume overwinning betekende voor Bastiat?
answer: Napoleon III
wrong_answers:
  - Louis-Philippe
  - Charles X
  - Jules Veerboot
explanation: |
  Lang na Bastiat's dood tekende Napoleon III een vrijhandelsverdrag met Engeland, waarmee hij Bastiat's ideaal van vrije handel realiseerde.
reviewed: false
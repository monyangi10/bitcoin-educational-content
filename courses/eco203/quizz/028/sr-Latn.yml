question: Ko je na kraju potpisao sporazum o slobodnoj trgovini sa Engleskom 1866. godine, označavajući posthumnu pobedu za Bastiat-a?
answer: Napoleon III
wrong_answers:
  - Louis-Philippe
  - Charles X
  - Jules Ferry
explanation: |
  Dugo nakon Bastiat-ove smrti, Napoleon III je potpisao sporazum o slobodnoj trgovini sa Engleskom, ostvarujući Bastiat-ov ideal slobodne trgovine.
reviewed: false

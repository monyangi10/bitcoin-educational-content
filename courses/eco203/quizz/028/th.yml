question: ใครที่ลงนามในสนธิสัญญาการค้าเสรีกับอังกฤษในปี 1866 ซึ่งถือเป็นชัยชนะหลังมรณกรรมสำหรับบาสเตียต?
answer: นโปเลียนที่ 3
wrong_answers:
  - หลุยส์-ฟิลิปป์
  - ชาร์ลส์ที่ 10
  - ฌูลส์ แฟร์รี
explanation: |
  นานหลังจากการเสียชีวิตของบาสเตียต์ นโปเลียนที่ 3 ได้ลงนามในสนธิสัญญาการค้าเสรีกับอังกฤษ ซึ่งเป็นการทำให้ความใฝ่ฝันของบาสเตียต์เกี่ยวกับการค้าเสรีเป็นจริง
reviewed: false
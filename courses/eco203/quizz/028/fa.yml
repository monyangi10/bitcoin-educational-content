question: چه کسی در نهایت در سال ۱۸۶۶ یک معاهده تجارت آزاد با انگلستان امضا کرد و یک پیروزی پس از مرگ برای بَستیَت را رقم زد؟
answer: ناپلئون سوم
wrong_answers:
  - لویی-فیلیپ
  - شارل دهم
  - ژول فری
explanation: |
  مدت‌ها پس از مرگ بَستیا، ناپلئون سوم یک معاهده تجارت آزاد با انگلستان امضا کرد و ایده‌آل بَستیا از تجارت آزاد را محقق ساخت.
reviewed: false
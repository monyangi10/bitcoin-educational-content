question: Кой в крайна сметка подписва договор за свободна търговия с Англия през 1866 г., което е посмъртна победа за Бастиа?
answer: Наполеон III
wrong_answers:
  - Луи Филип
  - Чарлз X
  - Джулс Фери
explanation: |
  Дълго след смъртта на Бастиа Наполеон III подписва договор за свободна търговия с Англия, реализирайки идеала на Бастиа за свободна търговия.
reviewed: true

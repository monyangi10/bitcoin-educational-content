question: Vem undertecknade till slut ett frihandelsavtal med England 1866, vilket innebar en postum seger för Bastiat?
answer: Napoleon III
wrong_answers:
  - Louis-Philippe
  - Charles X
  - Jules Ferry
explanation: |
  Långt efter Bastiats död undertecknade Napoleon III ett frihandelsavtal med England och förverkligade därmed Bastiats ideal om frihandel.
reviewed: false
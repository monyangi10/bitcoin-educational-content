question: ทำไม Bastiat ถึงวิจารณ์แนวคิดของภาษีแบบก้าวหน้าและการกระจายรายได้ใหม่?
answer: เพราะมันเปิดโอกาสให้มีการปล้นสะดมอย่างถูกกฎหมายโดยเสียงข้างมากที่เป็นค่าใช้จ่ายของเสียงข้างน้อย
wrong_answers:
  - เพราะมันไม่มีประสิทธิภาพในการสร้างรายได้จากภาษี
  - เพราะมันเป็นประโยชน์ต่อชนชั้นแรงงานเท่านั้น
  - เพราะมันเป็นประโยชน์ต่อบริษัทเอกชนเป็นหลัก
explanation: |
  Bastiat เชื่อว่าภาษีแบบก้าวหน้าที่มีการกระจายใหม่ทำให้คนส่วนใหญ่สามารถแสวงหาผลประโยชน์จากคนส่วนน้อย โดยเปลี่ยนภาษีให้กลายเป็นเครื่องมือของการปล้นสะดมที่ถูกกฎหมาย
reviewed: false
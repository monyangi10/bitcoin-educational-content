question: چرا بستیات مفهوم مالیات تصاعدی بازتوزیعی را نقد می‌کند؟
answer: زیرا این امر به اکثریت اجازه می‌دهد تا به هزینه اقلیت، غارت قانونی انجام دهد.
wrong_answers:
  - زیرا در تولید درآمد مالیاتی بی‌اثر است
  - زیرا این فقط به نفع طبقات کارگر است
  - زیرا این امر عمدتاً به نفع شرکت‌های خصوصی است
explanation: |
  باستیا معتقد است که مالیات تصاعدی بازتوزیعی به اکثریت اجازه می‌دهد تا از اقلیت بهره‌برداری کنند و مالیات را به ابزاری برای غارت قانونی تبدیل می‌کند.
reviewed: false
question: Защо Бастиа критикува концепцията за прогресивен преразпределителен данък?
answer: Защото позволява узаконен грабеж от мнозинството за сметка на малцинството
wrong_answers:
  - Защото е неефективен при генерирането на данъчни приходи
  - Защото е от полза само за работническата класа
  - Тъй като е предимно в полза на частни компании
explanation: |
  Бастиа смята, че прогресивният преразпределителен данък позволява на мнозинството да експлоатира малцинството, превръщайки данъка в инструмент за узаконен грабеж.
reviewed: true

question: باسیات کدام توهم اقتصادی را نقد کرد که در قرن بیستم دوباره ظاهر شد؟
answer: که دولت می‌تواند شغل ایجاد کند
wrong_answers:
  - که بازار به دولت نیاز دارد
  - که بازار می‌تواند خود را تنظیم کند
  - که شرکت‌ها می‌توانند بدون مقررات ثروت ایجاد کنند
explanation: |
  باستیا این ایده را که دولت می‌تواند بدون آسیب رساندن به سایر مشاغل، شغل ایجاد کند، به دلیل تأثیر مالیات‌های لازم برای تأمین مالی این ایجادها، مورد انتقاد قرار داد.
reviewed: false
question: ภาพลวงตาทางเศรษฐกิจที่ Bastiat วิพากษ์วิจารณ์ ซึ่งจะปรากฏขึ้นอีกครั้งในศตวรรษที่ 20 คืออะไร?
answer: ที่รัฐสามารถสร้างงาน
wrong_answers:
  - ว่าตลาดต้องการรัฐ
  - ว่าตลาดสามารถควบคุมตนเองได้
  - ที่บริษัทสามารถสร้างความมั่งคั่งได้โดยไม่มีการควบคุม
explanation: |
  บาสเตียตวิจารณ์แนวคิดที่ว่ารัฐสามารถสร้างงานโดยไม่ทำลายงานอื่น ๆ เนื่องจากผลกระทบของภาษีที่จำเป็นในการสนับสนุนการสร้างเหล่านี้
reviewed: false
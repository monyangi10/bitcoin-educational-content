question: Welke economische illusie bekritiseerde Bastiat, die in de 20e eeuw weer zou opduiken?
answer: Dat de staat banen kan creëren
wrong_answers:
  - Dat de markt de staat nodig heeft
  - Dat de markt zichzelf kan reguleren
  - Dat bedrijven welvaart kunnen creëren zonder regelgeving
explanation: |
  Bastiat bekritiseerde het idee dat de staat banen kon creëren zonder andere banen te schaden vanwege de impact van de belastingen die nodig waren om deze banen te financieren.
reviewed: false
question: Коя икономическа илюзия, критикувана от Бастиа, се появява отново през XX век?
answer: Че държавата може да създава работни места
wrong_answers:
  - Пазарът се нуждае от държавата
  - Че пазарът може да се саморегулира
  - Че компаниите могат да създават богатство без регулиране
explanation: |
  Бастиа критикува идеята, че държавата може да създава работни места, без да вреди на други работни места, поради въздействието на данъците, необходими за финансирането на тези работни места.
reviewed: true

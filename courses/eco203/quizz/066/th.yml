question: สองวิธีในการทำให้การตัดสินของพลเมืองกระจ่างขึ้นตาม Bastiat คืออะไร?
answer: ปรัชญาคุณธรรมและคุณธรรมทางเศรษฐกิจ
wrong_answers:
  - กฎหมายและการศึกษา
  - ศาสนาและวิทยาศาสตร์
  - ประสบการณ์ส่วนตัวและหนังสือ
explanation: |
  บาสเตียตแยกความแตกต่างระหว่างศีลธรรมทางปรัชญา ซึ่งสัมผัสถึงหัวใจ และศีลธรรมทางเศรษฐกิจ ซึ่งให้ความกระจ่างแก่สติปัญญาโดยการแสดงผลที่ตามมาของการกระทำ
reviewed: false
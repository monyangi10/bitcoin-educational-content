question: Кои са двата начина за просветляване на преценката на гражданите според Бастиа?
answer: Философски морал и икономически морал
wrong_answers:
  - Право и образование
  - Религия и наука
  - Личен опит и книги
explanation: |
  Бастиа прави разграничение между философския морал, който докосва сърцето, и икономическия морал, който просвещава интелекта, като показва последствията от действията.
reviewed: false
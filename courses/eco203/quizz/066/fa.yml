question: دو راه برای روشن کردن قضاوت شهروندان از نظر بستیات چیست؟
answer: اخلاق فلسفی و اخلاق اقتصادی
wrong_answers:
  - قانون و آموزش و پرورش
  - دین و علم
  - تجربه شخصی و کتاب‌ها
explanation: |
  باستیا بین اخلاق فلسفی که قلب را لمس می‌کند و اخلاق اقتصادی که با نشان دادن پیامدهای اعمال، عقل را روشن می‌کند، تمایز قائل می‌شود.
reviewed: false
question: Wat zijn volgens Bastiat de twee manieren om het oordeel van burgers te verlichten?
answer: Filosofische moraal en economische moraal
wrong_answers:
  - De wet en onderwijs
  - Religie en wetenschap
  - Persoonlijke ervaring en boeken
explanation: |
  Bastiat maakt onderscheid tussen filosofische moraliteit, die het hart raakt, en economische moraliteit, die het intellect verlicht door de gevolgen van acties te laten zien.
reviewed: false
question: बास्तियात के अनुसार नागरिकों के निर्णय को प्रबुद्ध करने के दो तरीके क्या हैं?
answer: दार्शनिक नैतिकता और आर्थिक नैतिकता
wrong_answers:
  - कानून और शिक्षा
  - धर्म और विज्ञान
  - व्यक्तिगत अनुभव और किताबें
explanation: |
  बास्तियाँ दार्शनिक नैतिकता और आर्थिक नैतिकता के बीच अंतर करते हैं। दार्शनिक नैतिकता दिल को छूती है, जबकि आर्थिक नैतिकता बुद्धि को जगाती है - यह कर्मों के परिणाम दिखाकर समझ प्रदान करती है।
reviewed: false
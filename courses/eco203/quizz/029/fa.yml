question: تأثیر باز بودن اقتصادی، بر اساس ایده‌های کابدن، بر فقر جهانی در ۲۰ سال گذشته چه بوده است؟
answer: فقر به نصف کاهش یافته است
wrong_answers:
  - فقر ۱۰٪ افزایش یافت
  - فقر ثابت ماند
  - فقر ۲۰٪ کاهش یافت.
explanation: |
  کوبدن از باز بودن اقتصادی به عنوان وسیله‌ای برای کاهش فقر حمایت کرد و نتایج مدرن نشان می‌دهند که کاهش قابل توجهی در آن وجود دارد، به ویژه در کشورهایی که به تجارت باز هستند.
reviewed: false
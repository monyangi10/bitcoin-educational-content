question: Wat was het effect van economische openheid, volgens de ideeën van Cobden, op de wereldwijde armoede in de afgelopen 20 jaar?
answer: Armoede is met de helft verminderd
wrong_answers:
  - Armoede met 10% toegenomen
  - Armoede bleef stabiel
  - Armoede is met 20% verminderd
explanation: |
  Cobden pleitte voor economische openheid als middel om armoede te verminderen en moderne resultaten laten een aanzienlijke vermindering van armoede zien, vooral in landen die openstaan voor handel.
reviewed: false
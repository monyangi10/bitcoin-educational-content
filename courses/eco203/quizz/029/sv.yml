question: Vilken inverkan har den ekonomiska öppenheten, enligt Cobdens idéer, haft på den globala fattigdomen under de senaste 20 åren?
answer: Fattigdomen har minskat med hälften
wrong_answers:
  - Fattigdomen ökade med 10%
  - Fattigdomen var fortsatt stabil
  - Fattigdomen minskade med 20%
explanation: |
  Cobden förespråkade ekonomisk öppenhet som ett sätt att minska fattigdomen, och moderna resultat visar en betydande minskning av den, särskilt i länder som är öppna för handel.
reviewed: false
question: ผลกระทบของการเปิดเสรีทางเศรษฐกิจตามแนวคิดของคอบเดนต่อความยากจนทั่วโลกในช่วง 20 ปีที่ผ่านมาเป็นอย่างไร?
answer: ความยากจนลดลงครึ่งหนึ่ง
wrong_answers:
  - ความยากจนเพิ่มขึ้น 10%
  - ความยากจนยังคงมีเสถียรภาพ
  - ความยากจนลดลง 20%
explanation: |
  คอบเดนสนับสนุนความเปิดกว้างทางเศรษฐกิจเป็นวิธีการลดความยากจน และผลลัพธ์ในปัจจุบันแสดงให้เห็นถึงการลดลงอย่างมีนัยสำคัญ โดยเฉพาะในประเทศที่เปิดกว้างต่อการค้า
reviewed: false
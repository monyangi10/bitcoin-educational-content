question: Какво е въздействието на икономическата отвореност, според идеите на Кобдън, върху бедността в света през последните 20 години?
answer: Бедността е намаляла наполовина
wrong_answers:
  - Бедността се е увеличила с 10%
  - Бедността остава стабилна
  - Бедността е намаляла с 20%
explanation: |
  Кобдън се застъпва за икономическата отвореност като средство за намаляване на бедността, а съвременните резултати показват значително намаляване на бедността, особено в страните, отворени за търговия.

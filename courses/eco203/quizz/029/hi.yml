question: कोबडेन के विचारों के अनुसार, पिछले 20 सालों में आर्थिक खुलेपन का वैश्विक गरीबी पर क्या प्रभाव पड़ा है?
answer: गरीबी आधी कम हो गई है
wrong_answers:
  - गरीबी में 10% की बढ़ोतरी हुई
  - गरीबी स्थिर रही
  - गरीबी में 20% की कमी आई
explanation: |
  कोबडेन ने गरीबी कम करने के लिए आर्थिक खुलेपन की वकालत की थी, और आधुनिक नतीजे दिखाते हैं कि खासकर व्यापार के लिए खुले देशों में गरीबी में काफी कमी आई है।
reviewed: false
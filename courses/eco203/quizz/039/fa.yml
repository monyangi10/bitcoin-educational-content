question: اصل حقوقدانان از نظر بَستیا چیست؟
answer: این اصل تقدم قانون بر مالکیت است
wrong_answers:
  - این اصل تقدم مالکیت بر قانون است
  - این اصل برابری در برابر قانون است
  - این حق مالکیت بدون دخالت دولت است
explanation: |
  برای باستیا، اصل حقوق‌دانان، در مقابل اصل اقتصاددانان، قانون را مقدم بر مالکیت قرار می‌دهد، موضعی که او به دلیل پتانسیل آن برای ایجاد بی‌عدالتی‌ها مورد انتقاد قرار می‌دهد.
reviewed: false
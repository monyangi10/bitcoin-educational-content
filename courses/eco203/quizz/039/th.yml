question: หลักการของนักกฎหมายตามที่ Bastiat กล่าวคืออะไร?
answer: มันคือหลักการของการให้กฎหมายมีความสำคัญเหนือทรัพย์สิน
wrong_answers:
  - มันคือหลักการของการให้ความสำคัญกับทรัพย์สินเหนือกฎหมาย
  - มันคือหลักการของความเสมอภาคต่อหน้ากฎหมาย
  - มันคือสิทธิในทรัพย์สินโดยปราศจากการแทรกแซงจากรัฐ
explanation: |
  สำหรับบัสเตีย หลักการของนักกฎหมาย ซึ่งตรงข้ามกับของนักเศรษฐศาสตร์ วางกฎหมายไว้ก่อนทรัพย์สิน ซึ่งเป็นตำแหน่งที่เขาวิจารณ์ว่ามีศักยภาพในการสร้างความอยุติธรรม
reviewed: false
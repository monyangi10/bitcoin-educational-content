question: Какъв е принципът на юристите според Бастиа?
answer: Това е принципът на предимство на правото пред собствеността
wrong_answers:
  - Това е принципът на предимство на собствеността пред закона
  - Това е принципът на равенство пред закона
  - Това е правото на собственост без държавна намеса
explanation: |
  За Бастиа принципът на юристите, в противовес на този на икономистите, поставя правото като предшестващо собствеността - позиция, която той критикува заради потенциала ѝ да установява несправедливост.

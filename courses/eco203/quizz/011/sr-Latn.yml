question: Prema Adam-u Smith-u, zašto tržište funkcioniše?
answer: Zato što se zasniva na ličnom interesu
wrong_answers:
  - Zato što je regulisano
  - Jer je to vrlina
  - Zato što ga nadzire država
explanation: |
  Za Adam-a Smith-a, tržište funkcioniše jer svaki pojedinac deluje u sopstvenom interesu, što prirodno generiše kolektivni prosperitet.

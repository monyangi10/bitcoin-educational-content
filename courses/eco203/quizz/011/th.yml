question: ตามที่อดัม สมิธกล่าวไว้ ทำไมตลาดถึงทำงานได้?
answer: เพราะมันขึ้นอยู่กับผลประโยชน์ส่วนตน
wrong_answers:
  - เพราะมันถูกควบคุม
  - เพราะมันมีคุณธรรม
  - เพราะมันถูกตรวจสอบโดยรัฐ
explanation: |
  สำหรับอดัม สมิธ ตลาดทำงานได้เพราะแต่ละบุคคลกระทำตามผลประโยชน์ของตนเอง ซึ่งโดยธรรมชาติแล้วจะสร้างความเจริญรุ่งเรืองร่วมกัน
reviewed: false
question: طبق نظر آدام اسمیت، چرا بازار کار می‌کند؟
answer: زیرا بر اساس منافع شخصی است
wrong_answers:
  - زیرا تنظیم شده است
  - زیرا که فضیلت‌مند است
  - زیرا توسط دولت نظارت می‌شود
explanation: |
  برای آدام اسمیت، بازار به این دلیل کار می‌کند که هر فرد بر اساس منافع شخصی خود عمل می‌کند، که به طور طبیعی رفاه جمعی را ایجاد می‌کند.
reviewed: false
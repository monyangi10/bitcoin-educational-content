question: Защо според Адам Смит пазарът функционира?
answer: Защото се основава на личния интерес
wrong_answers:
  - Тъй като се регулира
  - Защото е добродетелна
  - Тъй като се наблюдава от държавата
explanation: |
  За Адам Смит пазарът функционира, защото всеки индивид действа в свой собствен интерес, което естествено води до колективен просперитет.
reviewed: true

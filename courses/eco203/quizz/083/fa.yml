question: به گفته باستیا، پیامد مداخله بیش از حد دولت در مسئولیت فردی چیست؟
answer: این مسئولیت را با محافظت از افراد در برابر پیامدهای اعمالشان از بین می‌برد.
wrong_answers:
  - این با ایجاد قوانین بیشتر، مسئولیت فردی را تقویت می‌کند.
  - این امر شهروندان را تشویق می‌کند تا به طور فعال در زندگی عمومی شرکت کنند.
  - این تضمین می‌کند که عدالت اجتماعی به‌طور عادلانه‌تری برقرار شود.
explanation: |
  باستیا معتقد است که مداخله بیش از حد دولت، امکان پذیرش کامل پیامدهای اعمال را از افراد سلب می‌کند که این امر حس مسئولیت‌پذیری آن‌ها را تضعیف می‌کند.
reviewed: false
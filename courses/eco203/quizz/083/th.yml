question: ตามที่บาสเตียตกล่าว ผลที่ตามมาของการแทรกแซงของรัฐที่มากเกินไปต่อความรับผิดชอบของบุคคลคืออะไร?
answer: มันทำลายความรับผิดชอบโดยการปกป้องบุคคลจากผลที่ตามมาของการกระทำของพวกเขา
wrong_answers:
  - มันเสริมสร้างความรับผิดชอบส่วนบุคคลโดยการกำหนดกฎเกณฑ์เพิ่มเติม
  - มันส่งเสริมให้ประชาชนมีส่วนร่วมอย่างแข็งขันในชีวิตสาธารณะ
  - มันรับประกันความยุติธรรมทางสังคมที่เท่าเทียมมากขึ้น
explanation: |
  Bastiat เชื่อว่าการแทรกแซงที่มากเกินไปโดยรัฐทำให้บุคคลสูญเสียโอกาสในการรับผลของการกระทำของตนอย่างเต็มที่ ซึ่งทำให้ความรู้สึกรับผิดชอบของพวกเขาอ่อนแอลง
reviewed: false
question: Според Бастиа какви са последиците от прекомерната намеса на държавата върху индивидуалната отговорност?
answer: Той унищожава отговорността, като предпазва хората от последствията от техните действия
wrong_answers:
  - Тя засилва индивидуалната отговорност чрез въвеждане на повече правила
  - Насърчава гражданите да участват активно в обществения живот
  - Гарантира по-справедлива социална справедливост
explanation: |
  Бастиа вярва, че прекомерната намеса на държавата отнема на хората възможността да поемат изцяло последствията от своите действия, което отслабва чувството им за отговорност.
reviewed: false
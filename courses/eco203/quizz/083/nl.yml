question: Wat is volgens Bastiat het gevolg van overmatige staatsinterventie op individuele verantwoordelijkheid?
answer: Het vernietigt verantwoordelijkheid door individuen af te schermen van de gevolgen van hun acties
wrong_answers:
  - Het versterkt de individuele verantwoordelijkheid door meer regels op te stellen
  - Het moedigt burgers aan om actief deel te nemen aan het openbare leven
  - Het garandeert een rechtvaardigere sociale rechtvaardigheid
explanation: |
  Bastiat is van mening dat overmatige interventie door de staat individuen de mogelijkheid ontneemt om volledig de consequenties van hun daden te aanvaarden, wat hun verantwoordelijkheidsgevoel verzwakt.
reviewed: false
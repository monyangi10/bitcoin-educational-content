question: Kulingana na Bastiat, ni nini matokeo ya uingiliaji kati wa serikali juu ya jukumu la mtu binafsi?
answer: Yanaharibu uwajibikaji kwa kuwakinga watu binafsi kutokana na matokeo ya matendo yao
wrong_answers:
  - Unaimarisha wajibu wa mtu binafsi kwa kuanzisha sheria zaidi
  - Unahimiza wananchi kushiriki kikamilifu katika maisha ya umma
  - Unahakikisha haki ya usawa zaidi ya kijamii
explanation: |
  Bastiat anaamini kwamba kuingilia kupita kiasi kwa serikali kunaondoa kutoka kwa watu binafsi uwezekano wa kuchukua kikamilifu matokeo ya matendo yao, ambayo hudhoofisha hisia zao za uwajibikaji.

question: बस्तियत के अनुसार, अगर सरकार ज़्यादा हस्तक्षेप करती है, तो इसका नतीजा क्या होता है व्यक्तिगत ज़िम्मेदारी पर?
answer: यह लोगों को उनके कर्मों के परिणामों से बचाकर ज़िम्मेदारी को खत्म कर देता है
wrong_answers:
  - यह और नियम बनाकर व्यक्तिगत जिम्मेदारी को मजबूत करता है।
  - यह नागरिकों को सार्वजनिक जीवन में सक्रिय रूप से भाग लेने के लिए प्रोत्साहित करता है।
  - यह एक अधिक न्यायपूर्ण सामाजिक न्याय की गारंटी देता है
explanation: |
  बास्तियत का मानना है कि राज्य का अत्यधिक हस्तक्षेप व्यक्तियों को उनके कार्यों के परिणाम पूरी तरह से स्वीकार करने की संभावना से वंचित कर देता है, जिससे उनकी जिम्मेदारी की भावना कमजोर हो जाती है।

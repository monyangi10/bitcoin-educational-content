question: Vad är nyckeln till mänsklighetens historia enligt Comte och Dunoyer?
answer: Plundring
wrong_answers:
  - Proletariatet
  - Religion
  - Adeln
explanation: |
  Comte och Dunoyer ser plundring, det vill säga våld och exploatering, som den drivande kraften i mänsklighetens historia och som något som påverkar relationerna mellan klasserna.

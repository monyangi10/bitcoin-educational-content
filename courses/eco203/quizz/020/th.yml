question: กุญแจสำคัญของประวัติศาสตร์มนุษย์ตามที่ Comte และ Dunoyer คืออะไร?
answer: ปล้นสะดม
wrong_answers:
  - ชนชั้นกรรมาชีพ
  - ศาสนา
  - ขุนนาง
explanation: |
  Comte และ Dunoyer มองว่าการปล้นสะดม ซึ่งหมายถึงความรุนแรงและการแสวงหาประโยชน์ เป็นแรงผลักดันของประวัติศาสตร์มนุษย์ที่มีอิทธิพลต่อความสัมพันธ์ระหว่างชนชั้น
reviewed: false
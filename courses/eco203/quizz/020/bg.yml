question: Какъв е ключът към човешката история според Конт и Дюноар?
answer: Грабеж
wrong_answers:
  - Пролетариатът
  - Религия
  - Аристокрацията
explanation: |
  Според Конт и Дюноар грабежът, т.е. насилието и експлоатацията, е движещата сила на човешката история, която влияе върху отношенията между класите.

question: Ni igiki gihambaye mu mateka y’abantu nk’uko Comte na Dunoyer babivuga?
answer: Gusahura
wrong_answers:
  - Abanyagihugu
  - Idini
  - Abanyacubahiro
explanation: |
  Comte na Dunoyer babona ko ubusahuzi, bisobanura ubukazi n’ugukoresha nabi, ari vyo bituma amateka y’abantu agira ico akoze, bikaba bigira ico bikoze ku migenderanire iri hagati y’imigwi.
reviewed: false
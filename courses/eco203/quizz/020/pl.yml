question: Jaki jest klucz do historii ludzkości według Comte'a i Dunoyera?
answer: Plądrowanie
wrong_answers:
  - Proletariat
  - Religia
  - Szlachta
explanation: |
  Comte i Dunoyer postrzegają grabież, czyli przemoc i wyzysk, jako siłę napędową ludzkiej historii, wpływającą na relacje między klasami.

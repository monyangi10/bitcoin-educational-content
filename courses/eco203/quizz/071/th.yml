question: "\"มือที่มองไม่เห็น\" ตามที่อดัม สมิธกล่าวถึงคือแนวคิดที่ว่าตลาดเสรีสามารถควบคุมตัวเองได้ผ่านกลไกของอุปสงค์และอุปทาน โดยที่บุคคลที่ทำงานเพื่อผลประโยชน์ส่วนตัวจะส่งผลดีต่อเศรษฐกิจโดยรวมโดยไม่ตั้งใจ"
answer: "กลไกที่ผลประโยชน์ส่วนบุคคลสนับสนุนผลประโยชน์ส่วนรวม"
wrong_answers:
  - "พลังเหนือธรรมชาติที่ชี้นำเศรษฐกิจ"
  - "การสมคบคิดของคนรวยเพื่อแสวงหาผลประโยชน์จากคนจน"
  - "อุปมาเพื่ออธิบายบทบาทของรัฐในเศรษฐกิจ"
explanation: |
  มือที่มองไม่เห็นอธิบายถึงวิธีที่การแสวงหาผลประโยชน์ส่วนตัวในตลาดเสรีมีส่วนช่วยโดยไม่ตั้งใจต่อผลประโยชน์ทั่วไป.
reviewed: false

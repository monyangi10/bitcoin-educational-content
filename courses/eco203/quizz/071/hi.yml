question: एडम स्मिथ के अनुसार अदृश्य हाथ क्या है?
answer: एक तंत्र जिसके द्वारा व्यक्तिगत हित सामान्य हित की सेवा करते हैं
wrong_answers:
  - एक अलौकिक शक्ति जो अर्थव्यवस्था को दिशा देती है
  - गरीबों का शोषण करने की अमीरों की साजिश
  - अर्थव्यवस्था में राज्य की भूमिका का वर्णन करने के लिए एक रूपक
explanation: |
  अदृश्य हाथ यह बताता है कि किस प्रकार मुक्त बाजार में व्यक्तिगत हितों की खोज अनजाने में सामान्य हितों में योगदान देती है।
reviewed: false
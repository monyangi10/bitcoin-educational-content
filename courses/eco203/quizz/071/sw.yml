question: Je, ni mkono upi usioonekana kulingana na Adam Smith?
answer: Utaratibu ambao maslahi ya mtu binafsi hutumikia maslahi kwa jumla
wrong_answers:
  - Nguvu isiyo ya kawaida inayoongoza uchumi
  - Njama ya matajiri kuwanyonya masikini
  - Sitiari kuelezea nafasi ya serikali katika uchumi
explanation: |
  Mkono usioonekana unaelezea jinsi ufuatiliaji wa maslahi ya kibinafsi katika soko huria unachangia maslahi ya jumla bila kukusudia.
reviewed: false

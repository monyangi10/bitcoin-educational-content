question: دست نامرئی از نظر آدام اسمیت چیست؟
answer: مکانیسمی که از طریق آن منافع فردی به منافع عمومی خدمت می‌کند
wrong_answers:
  - یک نیروی ماوراء طبیعی که اقتصاد را هدایت می‌کند
  - توطئه‌ای از سوی ثروتمندان برای بهره‌کشی از فقرا
  - یک استعاره برای توصیف نقش دولت در اقتصاد
explanation: |
  دست نامرئی توصیف می‌کند که چگونه پیگیری منافع شخصی در یک بازار آزاد به‌طور ناخواسته به منافع عمومی کمک می‌کند.
reviewed: false
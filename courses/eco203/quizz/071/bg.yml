question: Какво представлява невидимата ръка според Адам Смит?
answer: Механизъм, чрез който индивидуалните интереси служат на общия интерес
wrong_answers:
  - Свръхестествена сила, която направлява икономиката
  - Конспирация на богатите за експлоатация на бедните
  - Метафора за описание на ролята на държавата в икономиката
explanation: |
  Невидимата ръка описва как преследването на лични интереси в условията на свободен пазар неволно допринася за общия интерес.
reviewed: false
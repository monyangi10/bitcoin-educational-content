question: Ni mapinduzi yapi ambayo Frédéric Bastiat alipitia kama naibu?
answer: Mapinduzi ya 1848
wrong_answers:
  - Mapinduzi ya 1830
  - Mapinduzi ya 1871
  - Mapinduzi ya 1789
explanation: |
  Bastiat alishuhudia mapinduzi ya 1848, ambayo yalianzisha Jamhuri ya Pili na kusababisha kuchaguliwa kwake kama naibu.
reviewed: false

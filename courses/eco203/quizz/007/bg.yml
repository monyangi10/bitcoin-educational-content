question: Коя революция е преживял отблизо Фредерик Бастиа като депутат?
answer: Революцията от 1848 г
wrong_answers:
  - Революцията от 1830 г
  - Революцията от 1871 г
  - Революцията от 1789 г
explanation: |
  Бастиа е свидетел на революцията от 1848 г., която създава Втората република и довежда до избирането му за депутат.
reviewed: true

question: फ्रेडरिक बास्तियत ने किस क्रांति का करीब से अनुभव किया जब वे एक सांसद थे?
answer: 1848 की क्रांति
wrong_answers:
  - 1830 की क्रांति
  - 1871 की क्रांति
  - 1789 की क्रांति
explanation: |
  बस्तियात ने 1848 की क्रांति देखी, जिसने दूसरा गणराज्य स्थापित किया और उन्हें डिप्टी के रूप में चुना गया।
reviewed: false
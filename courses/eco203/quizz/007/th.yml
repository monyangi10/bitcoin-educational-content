question: การปฏิวัติใดที่ Frédéric Bastiat ได้สัมผัสอย่างใกล้ชิดในฐานะสมาชิกสภาผู้แทนราษฎร?
answer: การปฏิวัติปี 1848
wrong_answers:
  - การปฏิวัติปี 1830
  - การปฏิวัติปี 1871
  - การปฏิวัติปี 1789
explanation: |
  บัสเตียตได้เห็นการปฏิวัติในปี 1848 ซึ่งได้ก่อตั้งสาธารณรัฐที่สองและนำไปสู่การเลือกตั้งของเขาเป็นสมาชิกสภาผู้แทนราษฎร
reviewed: false
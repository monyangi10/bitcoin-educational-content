question: Vilken revolution upplevde Frédéric Bastiat på nära håll som deputerad?
answer: Revolutionen 1848
wrong_answers:
  - Revolutionen 1830
  - Revolutionen 1871
  - Revolutionen 1789
explanation: |
  Bastiat blev vittne till revolutionen 1848, som ledde till att den andra republiken grundades och att han valdes till deputerad.

question: Której rewolucji Frédéric Bastiat doświadczył jako deputowany?
answer: Rewolucja 1848 roku
wrong_answers:
  - Rewolucja 1830 r
  - Rewolucja 1871 r
  - Rewolucja 1789 r
explanation: |
  Bastiat był świadkiem rewolucji 1848 roku, która ustanowiła Drugą Republikę i doprowadziła do jego wyboru na deputowanego.

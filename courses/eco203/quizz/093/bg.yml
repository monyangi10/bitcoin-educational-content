question: Как може правото на едно лице на нещо да влезе в конфликт с правото на собственост на друго лице?
answer: Защото изисква да се отнеме от едно лице, за да се даде на друго, като по този начин се създава конфликт на права.
wrong_answers:
  - Защото, получавайки правото си, човек може да насърчи другите да направят същото.
  - Защото човек може да предизвика конфликт, ако не получи това, което иска.
  - Защото тези права се отнасят само до основни права, а не до материални свойства.
explanation: |
  Бастиа подчертава, че правото да се отнемат ресурси от други хора, което пряко засяга правото на собственост.
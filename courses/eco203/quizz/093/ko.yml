question: 한 사람의 권리가 다른 사람의 재산권과 어떻게 충돌할 수 있을까요?
answer: 한 사람에게서 빼앗아 다른 사람에게 주어야 하므로 권리 충돌이 발생하기 때문입니다.
wrong_answers:
  - 자신의 권리를 받음으로써 다른 사람들도 똑같이 행동하도록 독려할 수 있기 때문입니다.
  - 원하는 것을 얻지 못하면 갈등을 일으킬 수 있기 때문입니다.
  - 이러한 권리는 물질적 재산이 아닌 기본권에만 해당하기 때문입니다.
explanation: |
  바스티아트는 타인의 자원을 빼앗을 수 있는 권리는 재산권에 직접적인 영향을 미친다고 강조합니다.
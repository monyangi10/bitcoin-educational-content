question: สิทธิในการทำบางสิ่งสำหรับบุคคลหนึ่งอาจขัดแย้งกับสิทธิในทรัพย์สินของผู้อื่นได้อย่างไร?
answer: เพราะมันต้องเอามาจากคนหนึ่งเพื่อให้กับอีกคนหนึ่ง จึงสร้างความขัดแย้งของสิทธิ
wrong_answers:
  - เพราะเมื่อได้รับสิทธิของตน บุคคลสามารถส่งเสริมให้ผู้อื่นทำเช่นเดียวกันได้
  - เพราะว่าบุคคลสามารถก่อให้เกิดความขัดแย้งได้หากพวกเขาไม่ได้สิ่งที่ต้องการ
  - เพราะสิทธิเหล่านี้เกี่ยวข้องกับสิทธิขั้นพื้นฐานเท่านั้นและไม่ใช่ทรัพย์สินทางวัตถุ
explanation: |
  บาสเตียตเน้นย้ำว่าสิทธิในการจำเป็นต้องนำทรัพยากรจากผู้อื่น ซึ่งส่งผลกระทบโดยตรงต่อสิทธิในทรัพย์สิน
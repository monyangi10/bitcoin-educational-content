question: एक व्यक्ति का किसी चीज़ पर अधिकार दूसरे के संपत्ति अधिकारों से कैसे टकरा सकता है?
answer: क्योंकि इसमें एक व्यक्ति से लेकर दूसरे को देना पड़ता है, जिससे अधिकारों का टकराव पैदा होता है।
wrong_answers:
  - क्योंकि अपना हक पाकर, एक इंसान दूसरों को भी ऐसा करने के लिए प्रेरित कर सकता है।
  - क्योंकि अगर किसी को वह नहीं मिलता जो वह चाहता है, तो वह झगड़ा खड़ा कर सकता है।
  - क्योंकि ये अधिकार सिर्फ मौलिक अधिकारों से जुड़े हैं, न कि भौतिक संपत्तियों से।
explanation: |
  बास्तियत ने इस बात पर जोर दिया है कि अधिकारों का मतलब दूसरों से संसाधन लेना होता है, जिससे संपत्ति के अधिकार सीधे प्रभावित होते हैं।
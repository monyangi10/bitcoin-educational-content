question: Hoe werd onverantwoordelijk bankieren toegestaan?
answer: Door de garanties dat verliezen zouden worden verdeeld in geval van faillissement als gevolg van het roekeloos nemen van risico's
wrong_answers:
  - Door het gebrek aan regelgeving tegen het nemen van roekeloze risico's
  - Door de deregulering van de jaren 90
  - Door het kapitalistische systeem
explanation: |
  Bastiat legt uit dat de belofte van mutualisatie van verliezen banken aanmoedigt om buitensporige risico's te nemen, omdat ze ervan verzekerd zijn gered te worden in geval van een faillissement, wat onverantwoordelijkheid in de hand werkt.
reviewed: false
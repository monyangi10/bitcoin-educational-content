question: Как е допусната банковата безотговорност?
answer: Чрез гаранциите, че загубите ще бъдат взаимствани в случай на фалит поради безразсъдно поемане на риск
wrong_answers:
  - Липса на правила срещу безразсъдното поемане на рискове
  - С дерегулацията през 90-те години
  - От капиталистическата система
explanation: |
  Бастиа обяснява, че обещанието за взаимно поемане на загубите насърчава банките да поемат прекомерни рискове, тъй като те са сигурни, че ще бъдат спасени в случай на фалит, което насърчава безотговорността.
reviewed: false
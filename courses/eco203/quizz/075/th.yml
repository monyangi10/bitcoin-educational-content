question: ความไร้ความรับผิดชอบของธนาคารเกิดขึ้นได้อย่างไร?
answer: โดยการรับประกันว่าความสูญเสียจะถูกแบ่งปันร่วมกันในกรณีที่ล้มละลายเนื่องจากการเสี่ยงที่ประมาท
wrong_answers:
  - จากการขาดกฎระเบียบต่อต้านการเสี่ยงที่ประมาท
  - โดยการยกเลิกกฎระเบียบในยุค 90
  - โดยระบบทุนนิยม
explanation: |
  Bastiat อธิบายว่าคำมั่นสัญญาของการแบ่งปันความสูญเสียร่วมกันกระตุ้นให้ธนาคารรับความเสี่ยงที่มากเกินไป เนื่องจากพวกเขามั่นใจว่าจะได้รับการช่วยเหลือในกรณีที่ล้มเหลว ซึ่งส่งเสริมความไร้ความรับผิดชอบ
reviewed: false
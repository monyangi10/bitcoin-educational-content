question: बैंकिंग में लापरवाही कैसे बर्दाश्त की गई?
answer: नुकसान की गारंटी के तहत, अगर बेपरवाह जोखिम लेने की वजह से दिवालियापन होता है, तो नुकसान साझा किया जाएगा।
wrong_answers:
  - बेलगाम जोखिम उठाने के खिलाफ नियमों की कमी से
  - 90 के दशक में नियमों में ढील देने से
  - पूंजीवादी व्यवस्था के द्वारा
explanation: |
  बास्टियत बताते हैं कि नुकसान को साझा करने का वादा बैंकों को ज़्यादा जोखिम लेने के लिए उकसाता है, क्योंकि उन्हें विफल होने पर बचाए जाने का भरोसा होता है, जो बेजिम्मेदारी को बढ़ावा देता है।
reviewed: false
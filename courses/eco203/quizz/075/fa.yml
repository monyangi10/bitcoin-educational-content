question: چگونه بی‌مسئولیتی بانکی مجاز شد؟
answer: با تضمین‌هایی که در صورت ورشکستگی به دلیل ریسک‌پذیری بی‌پروا، زیان‌ها به صورت مشترک جبران می‌شوند
wrong_answers:
  - به دلیل نبود مقررات علیه ریسک‌پذیری بی‌پروا
  - با مقررات‌زدایی دهه ۹۰
  - توسط سیستم سرمایه‌داری
explanation: |
  باستیا توضیح می‌دهد که وعده همگانی‌سازی زیان‌ها بانک‌ها را تشویق به پذیرش ریسک‌های بیش از حد می‌کند، زیرا آنها مطمئن هستند که در صورت شکست نجات خواهند یافت، که این امر بی‌مسئولیتی را ترویج می‌کند.
reviewed: false
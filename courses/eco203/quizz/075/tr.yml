question: Bankacılık sorumsuzluğuna nasıl izin verildi?
answer: Dikkatsiz risk alma nedeniyle iflas durumunda kayıpların karşılıklı olarak karşılanacağı garantisiyle
wrong_answers:
  - Pervasızca risk almaya karşı düzenlemelerin olmaması
  - 90'lı yılların serbestleşmesi ile
  - Kapitalist sistem tarafından
explanation: |
  Bastiat, zararın karşılıklı olarak karşılanması vaadinin bankaları aşırı risk almaya teşvik ettiğini, çünkü başarısızlık durumunda kurtarılacakları güvencesi verildiğini ve bunun da sorumsuzluğu teşvik ettiğini açıklamaktadır.

question: रूसो के अनुसार, व्यक्तियों पर पाबंदी लगाने का मकसद क्या है?
answer: उन्हें आज़ादी की ओर ले जाना
wrong_answers:
  - उन्हें गुलाम बनाना
  - उन्हें बराबर करने के लिए
  - उन्हें गुलामी में एक करने के लिए
explanation: |
  रूसो का मानना है कि बंधन व्यक्तियों को आज़ादी की ओर ले जा सकता है, उन्हें एक सामूहिक आदर्श की ओर मोड़कर जिसे वे तब अपनाते अगर वे जागरूक होते।

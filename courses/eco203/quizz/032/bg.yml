question: Каква е целта на ограничаването на индивидите според Русо?
answer: Да ги води към свободата
wrong_answers:
  - Да ги поробиш
  - За да ги изравните
  - За да ги обедини в робство
explanation: |
  Русо вярва, че принудата може да насочи индивидите към свободата, като ги води към колективен идеал, който те биха преследвали, ако бяха просветени.
reviewed: false
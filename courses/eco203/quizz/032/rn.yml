question: Nk’uko Rousseau abivuga, intumbero yo guhagarika abantu ni iyihe?
answer: Kugira ngo abajane mu mwidegemvyo .
wrong_answers:
  - Kugira ngo ubagire abaja .
  - Kugira ngo bangana .
  - Kugira ngo babahuze mu buja .
explanation: |
  Rousseau wemera ko uguhatirwa gushobora kuyobora umuntu ku giti ciwe ku mwidegemvyo, mu kubajana ku ciyumviro rusangi bokurikira iyo bazoba bamurikiwe.

question: به گفته روسو، هدف از محدود کردن افراد چیست؟
answer: برای هدایت آنها به سوی آزادی
wrong_answers:
  - برای به بردگی گرفتن آنها
  - برای برابر کردن آنها
  - برای متحد کردن آنها در بندگی
explanation: |
  روسو بر این باور است که محدودیت می‌تواند افراد را به سوی آزادی هدایت کند، با هدایت آنها به سوی یک ایده‌آل جمعی که اگر روشن‌فکر بودند، آن را دنبال می‌کردند.
reviewed: false
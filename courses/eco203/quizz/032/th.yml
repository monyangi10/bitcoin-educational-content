question: ตามที่รูโซกล่าว วัตถุประสงค์ของการจำกัดบุคคลคืออะไร?
answer: เพื่อนำพวกเขาไปสู่เสรีภาพ
wrong_answers:
  - เพื่อกดขี่พวกเขา
  - เพื่อทำให้พวกเขาเท่าเทียมกัน
  - เพื่อรวมพวกเขาในความเป็นทาส
explanation: |
  รูโซเชื่อว่าการจำกัดสามารถนำทางบุคคลไปสู่เสรีภาพ โดยการนำพวกเขาไปสู่แนวคิดร่วมที่พวกเขาจะไล่ตามหากพวกเขาได้รับการตรัสรู้
reviewed: false
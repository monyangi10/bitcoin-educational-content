question: به گفته فردریش هایک، چرا برنامه‌ریزی متمرکز ناکارآمد است؟
answer: نمی‌تواند پیچیدگی تصمیمات اقتصادی را مدیریت کند
wrong_answers:
  - مقدار کالاهای تولید شده را کاهش می‌دهد
  - این امر هزینه‌های تولید را افزایش می‌دهد۔
  - این امر تجارت بین‌المللی را ترویج می‌کند
explanation: |
  هایک توضیح می‌دهد که برنامه‌ریزی متمرکز به دلیل پیچیدگی تصمیمات اقتصادی شکست می‌خورد، که تنها یک بازار آزاد می‌تواند به طور کارآمد هماهنگ کند.
reviewed: false
question: Защо според Фридрих Хайек централизираното планиране е неефективно?
answer: Не може да се справи със сложността на икономическите решения
wrong_answers:
  - Намалява количеството на произведените стоки
  - Увеличава производствените разходи
  - Насърчава международната търговия
explanation: |
  Хайек обяснява, че централизираното планиране е неуспешно поради сложността на икономическите решения, които само свободният пазар може да координира ефективно.

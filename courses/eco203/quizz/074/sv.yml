question: Varför är centraliserad planering ineffektiv, enligt Friedrich Hayek?
answer: Den kan inte hantera komplexiteten i ekonomiska beslut
wrong_answers:
  - Det minskar mängden producerade varor
  - Det ökar produktionskostnaderna
  - Främjar internationell handel
explanation: |
  Hayek förklarar att centraliserad planering misslyckas på grund av komplexiteten i ekonomiska beslut, som endast en fri marknad kan samordna på ett effektivt sätt.

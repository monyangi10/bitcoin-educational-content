question: फ्रेडरिक हायेक के अनुसार, केंद्रीकृत योजना अकुशल क्यों है?
answer: यह आर्थिक निर्णयों की जटिलता को नहीं संभाल सकता
wrong_answers:
  - इससे उत्पादित वस्तुओं की मात्रा कम हो जाती है
  - इससे उत्पादन लागत बढ़ जाती है
  - यह अंतर्राष्ट्रीय व्यापार को बढ़ावा देता है
explanation: |
  हायेक बताते हैं कि केंद्रीकृत योजना आर्थिक निर्णयों की जटिलता के कारण विफल हो जाती है, जिसका समन्वय केवल मुक्त बाजार ही कुशलतापूर्वक कर सकता है।

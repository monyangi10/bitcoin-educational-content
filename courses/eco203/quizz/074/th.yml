question: ตามที่ฟรีดริช ฮาเย็คกล่าว ทำไมการวางแผนแบบรวมศูนย์ถึงไม่มีประสิทธิภาพ?
answer: มันไม่สามารถจัดการกับความซับซ้อนของการตัดสินใจทางเศรษฐกิจได้
wrong_answers:
  - มันลดปริมาณสินค้าที่ผลิต
  - มันเพิ่มต้นทุนการผลิต
  - มันส่งเสริมการค้าระหว่างประเทศ
explanation: |
  ฮาเย็คอธิบายว่าการวางแผนแบบรวมศูนย์ล้มเหลวเนื่องจากความซับซ้อนของการตัดสินใจทางเศรษฐกิจ ซึ่งมีเพียงตลาดเสรีเท่านั้นที่สามารถประสานงานได้อย่างมีประสิทธิภาพ
reviewed: false
question: Nk’uko Friedrich Hayek abivuga, ni kuki ugutegura ibintu mu buryo bumwe bitagira akamaro?
answer: Ntishobora guhangana n’ingingo zigoye z’ubutunzi .
wrong_answers:
  - Bigabanya igitigiri c'ibintu bikoreshwa .
  - Birongera ibiciro vyo gukora
  - Irateza imbere ubudandaji mpuzamakungu .
explanation: |
  Hayek asigura ko igenamigambi ry’ibintu bimwe rishobora kunanirwa kubera ingingo z’ubutunzi zigoye, izo isoko ry’uburenganzira ryonyene rishobora guhuza neza.
reviewed: false
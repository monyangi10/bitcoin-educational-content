question: Waarom is gecentraliseerde planning volgens Friedrich Hayek inefficiënt?
answer: Het kan de complexiteit van economische beslissingen niet aan
wrong_answers:
  - Het vermindert de hoeveelheid geproduceerde goederen
  - Het verhoogt de productiekosten
  - Het bevordert internationale handel
explanation: |
  Hayek legt uit dat gecentraliseerde planning faalt vanwege de complexiteit van economische beslissingen, die alleen een vrije markt efficiënt kan coördineren.

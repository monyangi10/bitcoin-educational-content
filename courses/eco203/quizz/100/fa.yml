question: طبق نظر باستیا، چه کسی معیشت دولت را تأمین می‌کند؟
answer: این شهروندان هستند که دولت را پایدار می‌کنند
wrong_answers:
  - این شهروندان هستند که از دولت ارتزاق می‌کنند
  - این دولت است که ملت را حفظ می‌کند
  - این گروه‌های ذی‌نفع هستند که دولت را حفظ می‌کنند
explanation: |
  باستیا ادعا می‌کند که این شهروندان هستند که از طریق ایجاد ثروت از دولت حمایت می‌کنند و نه برعکس.
reviewed: false
question: ตามที่บาสเตียตกล่าว ใครเป็นผู้สนับสนุนการดำรงชีวิตของรัฐ?
answer: เป็นประชาชนที่ค้ำจุนรัฐ
wrong_answers:
  - เป็นประชาชนที่อาศัยอยู่กับรัฐ
  - มันคือรัฐที่ค้ำจุนชาติ
  - มันคือกลุ่มผลประโยชน์ที่ค้ำจุนรัฐ
explanation: |
  บาสเตียตยืนยันว่าประชาชนเป็นผู้สนับสนุนรัฐผ่านการสร้างความมั่งคั่ง ไม่ใช่ในทางกลับกัน
reviewed: false
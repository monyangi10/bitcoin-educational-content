question: Според Бастиа кой осигурява прехраната на държавата?
answer: Гражданите са тези, които поддържат държавата
wrong_answers:
  - Гражданите са тези, които живеят от държавата
  - Държавата е тази, която поддържа нацията
  - Групите по интереси са тези, които поддържат държавата
explanation: |
  Бастиа твърди, че гражданите са тези, които подкрепят държавата чрез създаването на богатство, а не обратното.
reviewed: true

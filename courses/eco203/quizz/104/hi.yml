question: बस्तियात को सुरक्षा और न्याय से आगे राज्य के हस्तक्षेप पर क्या आपत्ति है?
answer: यह विशेषाधिकारों को बढ़ावा देता है और नागरिक समाज को नुकसान पहुँचाता है
wrong_answers:
  - यह आर्थिक संसाधनों के बेहतर वितरण की अनुमति देता है
  - यह सामाजिक शांति स्थापित करता है और संघर्षों को सीमित करता है।
  - यह धन का न्यायसंगत वितरण सुनिश्चित करता है
explanation: |
  बस्तियत का मानना है कि अत्यधिक राज्य हस्तक्षेप विशेषाधिकार पैदा करता है और निजी पहल को सीमित करके नागरिक समाज को नुकसान पहुँचाता है।
reviewed: false
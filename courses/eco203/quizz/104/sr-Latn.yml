question: Kakvu kritiku Bastiat ima prema državnoj intervenciji izvan bezbednosti i pravde?
answer: Ona podstiče privilegije i šteti civilnom društvu
wrong_answers:
  - Omogućava bolju raspodelu ekonomskih resursa
  - Uspostavlja socijalni mir i ograničava sukobe
  - To garantuje pravičnu raspodelu bogatstva
explanation: |
  Bastiat veruje da prekomerna intervencija države stvara privilegije i šteti civilnom društvu ograničavanjem privatnih inicijativa.

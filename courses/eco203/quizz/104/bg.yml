question: Каква критика отправя Бастиа към държавната намеса извън сферата на сигурността и правосъдието?
answer: Тя насърчава привилегиите и вреди на гражданското общество
wrong_answers:
  - Позволява по-добро разпределение на икономическите ресурси
  - Установява социален мир и ограничава конфликтите
  - Гарантира справедливо разпределение на богатството
explanation: |
  Бастиа смята, че прекомерната държавна намеса създава привилегии и вреди на гражданското общество, като ограничава частните инициативи.
reviewed: true

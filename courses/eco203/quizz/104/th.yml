question: บาสเตียตวิจารณ์การแทรกแซงของรัฐนอกเหนือจากความมั่นคงและความยุติธรรมอย่างไร?
answer: มันส่งเสริมสิทธิพิเศษและทำลายสังคมพลเมือง
wrong_answers:
  - มันช่วยให้การกระจายทรัพยากรทางเศรษฐกิจดีขึ้น
  - มันสร้างสันติภาพทางสังคมและจำกัดความขัดแย้ง
  - มันรับประกันการกระจายความมั่งคั่งอย่างเท่าเทียม
explanation: |
  Bastiat เชื่อว่าการแทรกแซงของรัฐที่มากเกินไปสร้างสิทธิพิเศษและทำลายสังคมพลเมืองโดยการจำกัดการริเริ่มของเอกชน
reviewed: false
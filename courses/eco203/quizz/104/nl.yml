question: Welke kritiek heeft Bastiat op staatsinterventie buiten veiligheid en justitie?
answer: Het bevordert privileges en schaadt de burgermaatschappij
wrong_answers:
  - Het zorgt voor een betere verdeling van economische middelen
  - Het zorgt voor sociale vrede en beperkt conflicten
  - Het garandeert een eerlijke verdeling van rijkdom
explanation: |
  Bastiat gelooft dat overmatige staatsinterventie privileges creëert en de burgermaatschappij schaadt door privé-initiatieven te beperken.
reviewed: false
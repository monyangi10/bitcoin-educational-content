question: باستیا چه انتقادی از مداخله دولت فراتر از امنیت و عدالت دارد؟
answer: این امتیازات را تقویت می‌کند و به جامعه مدنی آسیب می‌رساند
wrong_answers:
  - این امر توزیع بهتر منابع اقتصادی را ممکن می‌سازد.
  - این صلح اجتماعی را برقرار می‌کند و درگیری‌ها را محدود می‌کند
  - این تضمین می‌کند که توزیع ثروت به صورت عادلانه انجام شود
explanation: |
  باستیا معتقد است که مداخله بیش از حد دولت باعث ایجاد امتیازات می‌شود و با محدود کردن ابتکارات خصوصی به جامعه مدنی آسیب می‌رساند.
reviewed: false
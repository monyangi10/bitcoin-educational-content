question: สำหรับบาสเตียต์ วิธีแก้ไขความชั่วร้ายในสังคมคืออะไร?
answer: ในเสรีภาพเอง
wrong_answers:
  - ในเจตจำนงที่จะมีอำนาจ
  - ในการลงโทษโดยระบบตุลาการที่กดขี่และไม่ประนีประนอม
  - ในการแสวงหาความเท่าเทียมที่สมบูรณ์แบบ
explanation: |
  Bastiat เชื่อว่าเสรีภาพที่ควบคู่กับความรับผิดชอบส่วนบุคคลอย่างเต็มที่และสมบูรณ์เป็นวิธีการในการต่อต้านความชั่วร้ายและส่งเสริมการกระทำที่มีความรับผิดชอบและยุติธรรมมากขึ้น
reviewed: false
question: Vad är enligt Bastiat botemedlet mot ondskan i samhället?
answer: I själva friheten
wrong_answers:
  - I viljan till makt
  - Bestraffas av ett repressivt och kompromisslöst rättsväsende
  - I strävan efter perfekt jämlikhet
explanation: |
  Bastiat anser att frihet, i kombination med fullt och helt individuellt ansvar, är ett sätt att motverka ondska och uppmuntra till mer ansvarsfulla och rättvisa handlingar.
reviewed: false
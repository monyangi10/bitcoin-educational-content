question: Според Бастиа какво е решението на проблема със злото в обществото?
answer: В самата свобода
wrong_answers:
  - Във волята за власт
  - Наказание от репресивна и безкомпромисна съдебна система
  - В стремежа си към съвършено равенство
explanation: |
  Бастиа вярва, че свободата, съчетана с пълната и цялостна индивидуална отговорност, е средство за противодействие на злото и за насърчаване на по-отговорни и справедливи действия.
reviewed: false
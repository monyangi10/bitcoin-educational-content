question: Ni ivyiyumviro nyamukuru ibihe Reagan yafashe kuri Bastiat ku bijanye n’ivyo abona ku kibano?
answer: Ubukuru bwa sosiyete sivile n'akamaro k'inshingano z'umuntu ku giti ciwe
wrong_answers:
  - Akamaro ko Leta yinjira mu kurema ubutunzi
  - Uruhara rw'ingenzi rw'amahera Leta ikoresha mu guteza imbere ubutunzi
  - Ivy'ingenzi gutunganya imice yose kugira ngo ntihagire akajagari
explanation: |
  Reagan yashize ivyiyumviro vya Bastiat, nk’inshingano z’umuntu ku giti ciwe n’ubukuru bwa sosiyete civil, mu ciyumviro ciwe c’ubwigenge, aha agaciro Leta ntoyi cane.

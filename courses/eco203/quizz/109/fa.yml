question: ریگان چه ایده‌های کلیدی را از بستی برای دیدگاه خود از جامعه اتخاذ کرد؟
answer: اولویت جامعه مدنی و اهمیت مسئولیت فردی
wrong_answers:
  - اهمیت مداخله دولت در ایجاد ثروت
  - نقش اساسی هزینه‌های عمومی در رشد اقتصادی
  - ضرورت تنظیم همه بخش‌ها برای جلوگیری از هرج و مرج
explanation: |
  ریگان ایده‌هایی از بَستیا، مانند مسئولیت فردی و اولویت جامعه مدنی، را در دیدگاه لیبرال خود گنجاند و به یک دولت حداقلی ارزش قائل بود.
reviewed: false
question: रीगन ने समाज के अपने दृष्टिकोण के लिए बास्टियाट से कौन से प्रमुख विचार अपनाए?
answer: नागरिक समाज की प्रधानता और व्यक्तिगत जिम्मेदारी का महत्व
wrong_answers:
  - धन सृजन में राज्य के हस्तक्षेप का महत्व
  - आर्थिक विकास के लिए सार्वजनिक व्यय की आवश्यक भूमिका
  - अराजकता से बचने के लिए सभी क्षेत्रों को विनियमित करना आवश्यक
explanation: |
  रीगन ने बास्टियाट के विचारों को, जैसे व्यक्तिगत जिम्मेदारी और नागरिक समाज की प्रधानता को, अपने उदारवादी दृष्टिकोण में शामिल किया तथा न्यूनतम राज्य को महत्व दिया।
reviewed: false
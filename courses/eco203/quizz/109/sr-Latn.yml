question: Koje ključne ideje je Reagan usvojio od Bastiat-a za svoju viziju društva?
answer: Primat civilnog društva i važnost individualne odgovornosti
wrong_answers:
  - Važnost državne intervencije u stvaranju bogatstva
  - Suštinska uloga javne potrošnje za ekonomski rast
  - Potrebno je regulisati sve sektore kako bi se izbegao haos
explanation: |
  Reagan je inkorporirao ideje od Bastiat-a, kao što su individualna odgovornost i primat civilnog društva, u svoju liberalnu viziju, vrednujući minimalnu državu.
reviewed: false

question: Jakie kluczowe idee przejął Reagan od Bastiata dla swojej wizji społeczeństwa?
answer: Prymat społeczeństwa obywatelskiego i znaczenie indywidualnej odpowiedzialności
wrong_answers:
  - Znaczenie interwencji państwa w tworzeniu bogactwa
  - Istotna rola wydatków publicznych dla wzrostu gospodarczego
  - Konieczność regulacji wszystkich sektorów w celu uniknięcia chaosu
explanation: |
  Reagan włączył idee Bastiata, takie jak indywidualna odpowiedzialność i prymat społeczeństwa obywatelskiego, do swojej liberalnej wizji, ceniąc państwo minimalne.

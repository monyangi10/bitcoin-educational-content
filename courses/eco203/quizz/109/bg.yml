question: Какви ключови идеи е възприел Рейгън от Бастиа за своята визия за обществото?
answer: Приоритет на гражданското общество и значение на индивидуалната отговорност
wrong_answers:
  - Значение на държавната намеса в създаването на богатство
  - Съществена роля на публичните разходи за икономическия растеж
  - Необходимост от регулиране на всички сектори, за да се избегне хаос
explanation: |
  Рейгън включва идеите на Бастиа, като например индивидуалната отговорност и върховенството на гражданското общество, в своята либерална визия, оценявайки минималната държава.
reviewed: false
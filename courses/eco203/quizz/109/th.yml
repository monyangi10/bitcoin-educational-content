question: แนวคิดสำคัญอะไรที่เรแกนรับมาจากบาสเตียสำหรับวิสัยทัศน์ของเขาต่อสังคม?
answer: ความสำคัญของสังคมพลเมืองและความสำคัญของความรับผิดชอบส่วนบุคคล
wrong_answers:
  - ความสำคัญของการแทรกแซงของรัฐในการสร้างความมั่งคั่ง
  - บทบาทสำคัญของการใช้จ่ายภาครัฐต่อการเติบโตทางเศรษฐกิจ
  - ความจำเป็นในการควบคุมทุกภาคส่วนเพื่อหลีกเลี่ยงความโกลาหล
explanation: |
  เรแกนได้นำแนวคิดจากบาสเตียต เช่น ความรับผิดชอบส่วนบุคคลและความสำคัญของสังคมพลเมือง มาผสมผสานเข้ากับวิสัยทัศน์เสรีนิยมของเขา โดยให้ความสำคัญกับรัฐที่มีบทบาทน้อยที่สุด
reviewed: false
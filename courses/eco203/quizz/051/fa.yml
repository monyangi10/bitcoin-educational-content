question: استدلال اصلی کسانی که معتقدند تخریب ثروت ایجاد می‌کند چیست؟
answer: این شغل ایجاد می‌کند
wrong_answers:
  - این نوآوری را ترویج می‌کند
  - این قدرت خرید را افزایش می‌دهد
  - بهره‌وری را بهبود می‌بخشد
explanation: |
  طرفداران این ایده معتقدند که تخریب با ایجاد کار برای کسانی که تعمیرات را انجام می‌دهند، اشتغال را تحریک می‌کند، دیدگاهی که بَستیا با تأکید بر هزینه‌های فرصت آن را رد می‌کند.
reviewed: false
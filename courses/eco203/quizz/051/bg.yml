question: Какъв е основният аргумент на тези, които вярват, че разрушението създава богатство?
answer: Създава работни места
wrong_answers:
  - Насърчава иновациите
  - Увеличава покупателната способност
  - Подобрява производителността
explanation: |
  Поддръжниците на тази идея смятат, че разрушаването стимулира заетостта, тъй като създава работа за тези, които извършват ремонтите - гледна точка, която Бастиа отхвърля, като подчертава алтернативните разходи.
reviewed: false
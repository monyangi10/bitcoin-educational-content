question: Jaki jest główny argument tych, którzy wierzą, że destrukcja tworzy bogactwo?
answer: Tworzy miejsca pracy
wrong_answers:
  - Promuje innowacyjność
  - Zwiększa siłę nabywczą
  - Zwiększa produktywność
explanation: |
  Zwolennicy tej koncepcji uważają, że niszczenie stymuluje zatrudnienie poprzez generowanie pracy dla tych, którzy przeprowadzają naprawy, perspektywa, którą Bastiat obala, podkreślając koszty alternatywne.
reviewed: false
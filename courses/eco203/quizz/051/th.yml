question: ข้อโต้แย้งหลักของผู้ที่เชื่อว่าการทำลายสร้างความมั่งคั่งคืออะไร?
answer: มันสร้างงาน
wrong_answers:
  - มันส่งเสริมนวัตกรรม
  - มันเพิ่มอำนาจการซื้อ
  - มันช่วยเพิ่มประสิทธิภาพในการทำงาน
explanation: |
  ผู้สนับสนุนแนวคิดนี้เชื่อว่าการทำลายล้างกระตุ้นการจ้างงานโดยการสร้างงานให้กับผู้ที่ดำเนินการซ่อมแซม ซึ่งเป็นมุมมองที่บาสเตียตปฏิเสธโดยเน้นถึงต้นทุนค่าเสียโอกาส
reviewed: false
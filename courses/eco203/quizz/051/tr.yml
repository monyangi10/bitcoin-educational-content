question: Yıkımın zenginlik yarattığına inananların temel argümanı nedir?
answer: İstihdam yaratır
wrong_answers:
  - İnovasyonu teşvik eder
  - Satın alma gücünü artırır
  - Üretkenliği artırır
explanation: |
  Bu fikrin savunucuları, yıkımın onarımları gerçekleştirenler için iş yaratarak istihdamı teşvik ettiğine inanmaktadır; Bastiat'nın fırsat maliyetlerini vurgulayarak reddettiği bir bakış açısıdır bu.
reviewed: false
question: Какво е било мотото на списанието Le Censeur, основано от Конт и Дюноар?
answer: Мир и свобода
wrong_answers:
  - Собственост и свобода
  - Ред и напредък
  - Свобода и равенство
explanation: |
  Списанието Le Censeur, основано от Конт и Дюноар, излиза под мотото "Мир и свобода", което символизира противопоставянето им на произвола на властта.
reviewed: true

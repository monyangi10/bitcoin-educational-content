question: None ikinyamakuru Le Censeur cashinzwe na Comte na Dunoyer cari ikihe civugo?
answer: Amahoro n'umwidegemvyo
wrong_answers:
  - Itunga n'umwidegemvyo
  - Urutonde n'iterambere
  - Umwidegemvyo n'uburinganire
explanation: |
  Ikinyamakuru Le Censeur, cashinzwe na Comte na Dunoyer, cari gifise ijambo ry’ikirundi rivuga ngo Amahoro n’umwidegemvyo, kikaba cari ikigereranyo c’uko barwanya ubutegetsi butagira aho bugarukira.
reviewed: false
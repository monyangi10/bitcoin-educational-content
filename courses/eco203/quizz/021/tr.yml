question: Comte ve Dunoyer tarafından kurulan Le Censeur dergisinin sloganı neydi?
answer: Barış ve özgürlük
wrong_answers:
  - Mülkiyet ve özgürlük
  - Düzen ve ilerleme
  - Özgürlük ve eşitlik
explanation: |
  Comte ve Dunoyer tarafından kurulan Le Censeur dergisi, iktidarın keyfiliğine karşı muhalefetlerini simgeleyen Barış ve özgürlük sloganını taşıyordu.
reviewed: false
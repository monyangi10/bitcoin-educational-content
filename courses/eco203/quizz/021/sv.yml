question: Vad var mottot för tidskriften Le Censeur som grundades av Comte och Dunoyer?
answer: Fred och frihet
wrong_answers:
  - Egendom och frihet
  - Ordning och reda
  - Frihet och jämlikhet
explanation: |
  Tidskriften Le Censeur, som grundades av Comte och Dunoyer, hade mottot Fred och frihet, vilket symboliserade deras motstånd mot maktens godtycke.

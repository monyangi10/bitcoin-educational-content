question: कॉम्टे और डनोयेर द्वारा स्थापित पत्रिका ले सेन्सेर का आदर्श वाक्य क्या था?
answer: शांति और स्वतंत्रता
wrong_answers:
  - संपत्ति और स्वतंत्रता
  - व्यवस्था और प्रगति
  - स्वतंत्रता और समानता
explanation: |
  कॉम्टे और डुनोयेर द्वारा स्थापित पत्रिका ले सेन्सेर का आदर्श वाक्य था शांति और स्वतंत्रता, जो सत्ता की मनमानी के प्रति उनके विरोध का प्रतीक था।
reviewed: false
question: Koja je glavna razlika između Bastiat-ove i Proudhon-ove vizije budućnosti kapitalizma?
answer: Svi ostali odgovori.
wrong_answers:
  - Bastiat je optimističan u pogledu sposobnosti kapitalizma da smanji nejednakosti, dok je Proudhon pesimističan.
  - Bastiat veruje da je kapital faktor emancipacije, dok ga Proudhon vidi kao alat ugnjetavanja.
  - Bastiat zagovara privatnu svojinu, dok Proudhon podržava kolektivno Ownership.
explanation: |
  Bastiatova vizija kapitalizma odlikuje se njegovim optimizmom u vezi sa smanjenjem nejednakosti, vrednovanjem privatne svojine i percepcijom kapitala kao faktora emancipacije, nasuprot Proudhon-ovim pesimističkim i kolektivističkim stavovima.

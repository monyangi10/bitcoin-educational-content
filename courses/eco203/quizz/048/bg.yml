question: Каква е основната разлика между вижданията на Бастиа и на Прудон за бъдещето на капитализма?
answer: Всички отговори са верни.
wrong_answers:
  - Бастиа е оптимист по отношение на способността на капитализма да намали неравенството, докато Прудон е песимист.
  - Бастиа вярва, че капиталът е фактор за еманципация, докато Прудон вижда в него инструмент за потисничество.
  - Бастиа се застъпва за частната собственост, докато Прудон подкрепя колективната собственост.
explanation: |
  Визията на Бастиа за капитализма се отличава с оптимизъм по отношение на намаляването на неравенствата, с оценка на частната собственост и с възприемането на капитала като фактор за еманципация, в противовес на песимистичните и колективистични възгледи на Прудон.
reviewed: true

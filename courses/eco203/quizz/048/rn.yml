question: Ni itandukaniro irihe rikomeye riri hagati y’ivyo Bastiat na Proudhon babonye ku bijanye n’akazoza k’ubu kapitalizimu?
answer: Ibindi vyose ni inyishu.
wrong_answers:
  - Bastiat afise icizigiro ku bushobozi bw’ubu kapitalizimu bwo kugabanya ubusumbane, mu gihe Proudhon we afise icizigiro kibi.
  - Bastiat wemera ko umutungo ari ikintu gituma umuntu yidegemvya, mu gihe Proudhon we abona ko ari igikoresho co guhahaza.
  - Bastiat avuganira umutungo w'abantu ku giti cabo, mu gihe Proudhon ashigikira Ownership rusangi.
explanation: |
  Ivyo Bastiat abona ku bijanye n’ubu kapitalizimu biratandukanye n’uko afise icizigiro co kugabanya ubusumbasumbane, aha agaciro umutungo w’abantu ku giti cabo, n’ukuntu abona ubutunzi nk’ikintu co kwidegemvya, ivyo bikaba binyuranye n’ivyiyumviro vya Proudhon vy’ugucika intege n’ugushira hamwe.

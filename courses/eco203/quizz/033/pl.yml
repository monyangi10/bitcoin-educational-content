question: Skąd według Rousseau bierze się zło w społeczeństwie?
answer: Z nieruchomości
wrong_answers:
  - Od nierówności
  - Od zniewolenia
  - Od indywidualizmu
explanation: |
  Rousseau postrzega własność jako źródło zła społecznego, ponieważ wprowadza ona nierówności i pragnienie dominacji.

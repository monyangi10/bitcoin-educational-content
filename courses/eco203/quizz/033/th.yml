question: ตามที่รูโซกล่าวไว้ ความชั่วร้ายในสังคมมาจากไหน?
answer: จากทรัพย์สิน
wrong_answers:
  - จากความไม่เท่าเทียม
  - จากการรับใช้
  - จากลัทธิปัจเจกนิยม
explanation: |
  รูโซมองว่าทรัพย์สินเป็นแหล่งของความชั่วร้ายทางสังคมเพราะมันนำมาซึ่งความไม่เท่าเทียมกันและความปรารถนาในการครอบงำ
reviewed: false
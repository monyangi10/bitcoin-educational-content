question: نقطه مشترک بین تارتوف و ایده‌های اقتصادی نادرست از نظر بَستیا چیست؟
answer: همه پاسخ‌ها صحیح هستند
wrong_answers:
  - هر دو از ریاکاری برای دستکاری دیگران استفاده می‌کنند.
  - آن‌ها ادعا می‌کنند که برای خیر همگان عمل می‌کنند در حالی که تنها به دنبال منافع خود هستند.
  - آن‌ها از ضعف عقل انسانی سوءاستفاده می‌کنند
explanation: |
  باستیا یک شباهت بین تارتوف و ایده‌های اقتصادی نادرست ترسیم می‌کند و تأکید می‌کند که آن‌ها از طریق ریاکاری دستکاری می‌کنند و از ضعف‌های انسانی برای خدمت به منافع شخصی بهره‌برداری می‌کنند.
reviewed: false
question: Какво е общото между Тартюф и погрешните икономически идеи на Бастиа?
answer: Всички отговори са верни
wrong_answers:
  - И двамата използват лицемерието, за да манипулират другите
  - Те твърдят, че действат за доброто на всички, а в същото време търсят само собствения си интерес
  - Те използват слабостта на човешкия разум
explanation: |
  Бастиа прави паралел между Тартюф и погрешните икономически идеи, като подчертава, че те манипулират чрез лицемерие и използват човешките слабости, за да обслужват лични интереси.
reviewed: true

question: Koja je zajednička tačka između Tartuff-a i pogrešnih ekonomskih ideja prema Bastiat-u?
answer: Svi odgovori su tačni
wrong_answers:
  - Oboje koriste licemerje da manipulišu drugima
  - Oni tvrde da deluju za dobrobit svih, dok zapravo traže samo svoj interes.
  - Oni iskorišćavaju slabost ljudskog razuma
explanation: |
  Bastiat povlači paralelu između Tartuff-a i pogrešnih ekonomskih ideja, ističući da one manipulišu kroz licemerje i iskorišćavaju ljudske slabosti kako bi služile ličnim interesima.

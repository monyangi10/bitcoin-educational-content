question: Jaki jest punkt wspólny między Tartuffe'em a błędnymi ideami ekonomicznymi według Bastiata?
answer: Wszystkie odpowiedzi są poprawne
wrong_answers:
  - Obaj używają hipokryzji do manipulowania innymi
  - Twierdzą, że działają dla dobra wszystkich, podczas gdy dążą jedynie do własnego interesu
  - Wykorzystują słabość ludzkiego rozumu
explanation: |
  Bastiat rysuje paralelę między Tartuffe'em a błędnymi ideami ekonomicznymi, podkreślając, że manipulują one poprzez hipokryzję i wykorzystują ludzkie słabości, aby służyć osobistym interesom.

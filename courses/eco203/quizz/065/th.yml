question: จุดร่วมที่พบได้ระหว่าง Tartuffe และแนวคิดทางเศรษฐกิจที่ผิดพลาดตามที่ Bastiat กล่าวคืออะไร?
answer: คำตอบทั้งหมดถูกต้อง
wrong_answers:
  - ทั้งคู่ใช้ความหน้าซื่อใจคดเพื่อควบคุมผู้อื่น
  - พวกเขาอ้างว่าทำเพื่อประโยชน์ของทุกคนในขณะที่แสวงหาผลประโยชน์ของตนเองเท่านั้น
  - พวกเขาใช้ประโยชน์จากจุดอ่อนของเหตุผลมนุษย์
explanation: |
  บาสเตียต์เปรียบเทียบระหว่างทาร์ทูฟและแนวคิดทางเศรษฐกิจที่ผิดพลาด โดยเน้นว่าพวกเขาจัดการผ่านการเสแสร้งและหาประโยชน์จากจุดอ่อนของมนุษย์เพื่อรับใช้ผลประโยชน์ส่วนตัว
reviewed: false
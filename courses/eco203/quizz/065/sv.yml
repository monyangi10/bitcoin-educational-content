question: Vad är den gemensamma nämnaren mellan Tartuffe och felaktiga ekonomiska idéer enligt Bastiat?
answer: Alla svar är korrekta
wrong_answers:
  - Båda använder hyckleri för att manipulera andra
  - De påstår sig agera för allas bästa men ser bara till sina egna intressen
  - De utnyttjar svagheten i det mänskliga förnuftet
explanation: |
  Bastiat drar en parallell mellan Tartuffe och felaktiga ekonomiska idéer och betonar att de manipulerar genom hyckleri och utnyttjar mänskliga svagheter för att tjäna personliga intressen.
reviewed: false
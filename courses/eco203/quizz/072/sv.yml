question: Vilket är det exempel som Leonard Read använder för att illustrera osynligt samarbete?
answer: Tillverkningen av en penna
wrong_answers:
  - Byggandet av ett hus
  - Tillverkningen av en bil
  - Organisationen av en stad
explanation: |
  Leonard Read använder exemplet med en blyertspenna för att visa hur många individer som samarbetar utan att känna varandra för att producera en enkel vara.
reviewed: false
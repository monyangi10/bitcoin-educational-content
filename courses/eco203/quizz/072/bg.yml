question: Какъв е примерът, използван от Леонард Рийд, за да илюстрира невидимото сътрудничество?
answer: Създаването на молив
wrong_answers:
  - Изграждане на къща
  - Производството на автомобил
  - Организацията на един град
explanation: |
  Леонард Рийд използва примера с молива, за да покаже как много хора си сътрудничат, без да се познават, за да произведат една проста стока.
reviewed: true

question: ตัวอย่างที่ Leonard Read ใช้เพื่ออธิบายความร่วมมือที่มองไม่เห็นคืออะไร?
answer: การทำดินสอ
wrong_answers:
  - การก่อสร้างบ้าน
  - การผลิตรถยนต์
  - การจัดระเบียบของเมือง
explanation: |
  ลีโอนาร์ด รีด ใช้ตัวอย่างของดินสอเพื่อแสดงให้เห็นว่ามีบุคคลจำนวนมากร่วมมือกันโดยไม่รู้จักกันเพื่อผลิตสินค้าง่ายๆ
reviewed: false
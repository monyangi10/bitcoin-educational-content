question: مثالی که لئونارد رید برای نشان دادن همکاری نامرئی استفاده می‌کند چیست؟
answer: ساخت مداد
wrong_answers:
  - ساخت یک خانه
  - تولید یک خودرو
  - سازماندهی یک شهر
explanation: |
  لئونارد رید از مثال یک مداد استفاده می‌کند تا نشان دهد چگونه افراد زیادی بدون اینکه یکدیگر را بشناسند برای تولید یک کالای ساده همکاری می‌کنند.
reviewed: false
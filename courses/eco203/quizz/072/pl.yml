question: Jakiego przykładu użył Leonard Read, aby zilustrować niewidzialną współpracę?
answer: Tworzenie ołówka
wrong_answers:
  - Budowa domu
  - Produkcja samochodu
  - Organizacja miasta
explanation: |
  Leonard Read używa przykładu ołówka, aby zademonstrować, jak wiele osób współpracuje ze sobą, nie znając się nawzajem, w celu wytworzenia prostego dobra.
reviewed: false
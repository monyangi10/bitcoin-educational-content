question: Wat is het uiteindelijke doel van de liberalen van het tijdschrift Le Censeur?
answer: De depolitisering van de samenleving
wrong_answers:
  - De klassenstrijd
  - Verrijking
  - De centralisatie van de staat
explanation: |
  Comte en Dunoyer pleiten voor de depolitisering van de maatschappij, met als doel de staatsinterventie te beperken en de belangen van de producenten prioriteit te geven.
reviewed: false
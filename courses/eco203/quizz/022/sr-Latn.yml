question: Koji je krajnji cilj liberala iz časopisa Le Censeur?
answer: Depolitizacija društva
wrong_answers:
  - Ratni sukob klase
  - Obogaćivanje
  - Centralizacija države
explanation: |
  Comte i Dunoyer zalažu se za depolitizaciju društva, s ciljem ograničavanja intervencije države i davanja prioriteta interesima proizvođača.

question: Каква е крайната цел на либералите от списание Le Censeur?
answer: Деполитизацията на обществото
wrong_answers:
  - Класовата война
  - Обогатяване
  - Централизацията на държавата
explanation: |
  Конт и Дюноа се застъпват за деполитизация на обществото, като се стремят да ограничат държавната намеса и да дадат приоритет на интересите на производителите.
reviewed: false
question: เป้าหมายสูงสุดของกลุ่มเสรีนิยมจากวารสาร Le Censeur คืออะไร?
answer: การลดบทบาททางการเมืองของสังคม
wrong_answers:
  - สงครามชนชั้น
  - การเสริมสร้าง
  - การรวมศูนย์ของรัฐ
explanation: |
  Comte และ Dunoyer สนับสนุนการลดบทบาททางการเมืองของสังคม โดยมุ่งเน้นการจำกัดการแทรกแซงของรัฐและให้ความสำคัญกับผลประโยชน์ของผู้ผลิต
reviewed: false
question: Vad är slutmålet för liberalerna från tidskriften Le Censeur?
answer: Avpolitiseringen av samhället
wrong_answers:
  - Klasskriget
  - Berikning
  - Centralisering av staten
explanation: |
  Comte och Dunoyer förespråkar en avpolitisering av samhället, med målet att begränsa statens ingripande och prioritera producenternas intressen.
reviewed: false
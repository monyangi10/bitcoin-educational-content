question: Ni iciyumviro ikihe kitari co inyigisho za kera zishingiyeko nk’uko Bastiat abivuga?
answer: Iciyumviro c’ububasha bwose bw’umushingamateka .
wrong_answers:
  - Ivyiyumviro vya Platon
  - Iciyumviro c'imvo ya nyuma
  - Iciyumviro c'imibano
explanation: |
  Bastiat aranegura inyigisho za kera kubera ko zishimika ku ciyumviro c’uko umushingamateka ari uwushobora vyose kandi ko ategerezwa guhingura ikibano, iciyumviro kinyuranye n’ingingo ngenderwako ziwe z’umwidegemvyo w’umuntu ku giti ciwe.

question: На какво погрешно схващане почиват класическите изследвания според Бастиа?
answer: Идеята за всемогъществото на законодателя
wrong_answers:
  - Теорията за идеите на Платон
  - Идеята за последната причина
  - Концепцията за органично общество
explanation: |
  Бастиа критикува класическото образование за това, че акцентира върху идеята, че законодателят е всемогъщ и трябва да формира обществото - възглед, който противоречи на неговите принципи за индивидуална свобода.
reviewed: true

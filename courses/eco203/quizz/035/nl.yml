question: Op welke misvatting berusten klassieke studies volgens Bastiat?
answer: Het idee van de almacht van de wetgever
wrong_answers:
  - Plato's theorie van Ideeën
  - Het idee van de uiteindelijke oorzaak
  - Het concept van de organische samenleving
explanation: |
  Bastiat bekritiseert het klassieke onderwijs omdat het de nadruk legt op het idee dat de wetgever almachtig is en de maatschappij moet vormgeven, een opvatting die in strijd is met zijn principes van individuele vrijheid.
reviewed: false
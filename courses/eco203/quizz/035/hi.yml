question: बस्तियात के अनुसार शास्त्रीय अध्ययन किस गलतफहमी पर आधारित हैं?
answer: विधायक की सर्वशक्तिमानता का विचार
wrong_answers:
  - प्लेटो का विचार सिद्धांत
  - अंतिम कारण का विचार
  - ऑर्गेनिक सोसाइटी का कॉन्सेप्ट
explanation: |
  बास्तियात क्लासिकल शिक्षा की आलोचना करते हैं क्योंकि उसमें यह विचार ज़ोर दिया जाता है कि विधायक सर्वशक्तिमान है और समाज को ढालना चाहिए, यह दृष्टिकोण उनके व्यक्तिगत स्वतंत्रता के सिद्धांतों के विपरीत है।
reviewed: false
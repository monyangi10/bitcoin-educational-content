question: ความเข้าใจผิดใดที่การศึกษาคลาสสิกตั้งอยู่บนพื้นฐานตามที่บาสเตียตกล่าว?
answer: แนวคิดเรื่องอำนาจสูงสุดของผู้บัญญัติกฎหมาย
wrong_answers:
  - ทฤษฎีอุดมคติของเพลโต
  - แนวคิดเรื่องสาเหตุสุดท้าย
  - แนวคิดของสังคมอินทรีย์
explanation: |
  บาสเตียตวิจารณ์การศึกษาคลาสสิกที่เน้นย้ำแนวคิดว่าผู้บัญญัติกฎหมายมีอำนาจทุกอย่างและต้องกำหนดรูปแบบสังคม ซึ่งเป็นมุมมองที่ขัดแย้งกับหลักการเสรีภาพส่วนบุคคลของเขา
reviewed: false
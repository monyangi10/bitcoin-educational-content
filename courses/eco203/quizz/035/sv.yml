question: Vilken missuppfattning vilar de klassiska studierna på enligt Bastiat?
answer: Idén om lagstiftarens allsmäktighet
wrong_answers:
  - Platons teori om idéer
  - Idén om den slutliga orsaken
  - Begreppet organiskt samhälle
explanation: |
  Bastiat kritiserar den klassiska utbildningen för att den betonar att lagstiftaren är allsmäktig och måste forma samhället, en uppfattning som strider mot hans principer om individuell frihet.
reviewed: false
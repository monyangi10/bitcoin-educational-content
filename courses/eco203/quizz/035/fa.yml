question: کدام سوء تفاهم به گفته باستیا در مطالعات کلاسیک وجود دارد؟
answer: ایدهٔ قدرت مطلق قانون‌گذار
wrong_answers:
  - نظریه ایده‌های افلاطون
  - ایده علت نهایی
  - مفهوم جامعه ارگانیک
explanation: |
  باستیا آموزش کلاسیک را به دلیل تأکید بر این ایده که قانون‌گذار قادر مطلق است و باید جامعه را شکل دهد، که دیدگاهی مخالف با اصول آزادی فردی اوست، مورد انتقاد قرار می‌دهد.
reviewed: false
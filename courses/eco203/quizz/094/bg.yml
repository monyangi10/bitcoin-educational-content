question: Според Бастиа каква роля трябва да има законът по отношение на правото на собственост?
answer: Да се гарантира защитата на правата на собственост, а не да се създават такива
wrong_answers:
  - Определяне на границите на правото на собственост в съответствие с общата воля
  - Преразпределяне на ресурсите за осигуряване на справедливост между гражданите
  - Защита на собствеността, като същевременно се регулира нейното използване в съответствие с общото благо
explanation: |
  Бастиа разглежда закона като средство за защита на правото на собственост, което според него е естествено право, предшестващо всяко законодателство.
question: สำหรับบาสเตีย กฎหมายควรมีบทบาทอย่างไรเกี่ยวกับสิทธิในทรัพย์สิน?
answer: เพื่อให้มั่นใจในการคุ้มครองสิทธิในทรัพย์สินและไม่สร้างสิทธิเหล่านั้น
wrong_answers:
  - เพื่อกำหนดขอบเขตของสิทธิในทรัพย์สินตามเจตจำนงทั่วไป
  - การกระจายทรัพยากรใหม่เพื่อให้เกิดความเท่าเทียมกันในหมู่พลเมือง
  - เพื่อปกป้องทรัพย์สินในขณะที่ควบคุมการใช้ตามประโยชน์ส่วนรวม
explanation: |
  บาสเตียมองว่ากฎหมายเป็นวิธีการในการปกป้องสิทธิในทรัพย์สิน ซึ่งเขาถือว่าเป็นสิทธิตามธรรมชาติที่มีมาก่อนกฎหมายใดๆ
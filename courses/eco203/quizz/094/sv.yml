question: Vilken roll anser Bastiat att lagen bör ha när det gäller rätten till egendom?
answer: Att säkerställa skyddet för äganderätten och inte att skapa den
wrong_answers:
  - Att fastställa gränserna för äganderätten i enlighet med den allmänna viljan
  - Att omfördela resurser för att säkerställa rättvisa mellan medborgarna
  - Att skydda egendom och samtidigt reglera dess användning i enlighet med allmänintresset
explanation: |
  Bastiat ser lagen som ett medel för att försvara äganderätten, som han anser vara en naturlig rättighet som går före all lagstiftning.
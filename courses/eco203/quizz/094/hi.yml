question: बास्तिया के लिए, संपत्ति के अधिकार के मामले में कानून की क्या भूमिका होनी चाहिए?
answer: संपत्ति के अधिकारों की सुरक्षा सुनिश्चित करने के लिए, न कि उन्हें बनाने के लिए
wrong_answers:
  - संपत्ति के अधिकारों की सीमाएँ सामान्य इच्छा के अनुसार तय करना
  - नागरिकों के बीच समानता सुनिश्चित करने के लिए संसाधनों का पुनर्वितरण करना
  - संपत्ति की सुरक्षा करते हुए सामान्य हित के अनुसार इसके उपयोग को नियंत्रित करना
explanation: |
  बास्टियत कानून को संपत्ति के अधिकार की रक्षा करने का एक साधन मानते हैं, जिसे वह एक प्राकृतिक अधिकार मानते हैं जो किसी भी कानून से पहले से मौजूद होता है।
question: برای بَستیا، قانون چه نقشی باید در رابطه با حق مالکیت داشته باشد؟
answer: برای اطمینان از حفاظت از حقوق مالکیت و نه ایجاد آنها
wrong_answers:
  - برای تعیین حدود حقوق مالکیت بر اساس اراده عمومی
  - توزیع مجدد منابع برای تضمین برابری در میان شهروندان
  - برای حفاظت از مالکیت در حالی که استفاده از آن را بر اساس خیر عمومی تنظیم می‌کند
explanation: |
  باستیا قانون را وسیله‌ای برای دفاع از حق مالکیت می‌بیند، که آن را حقی طبیعی می‌داند که بر هر گونه قانون‌گذاری مقدم است.
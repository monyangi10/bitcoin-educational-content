question: Kwa Bastiat, sheria inapaswa kuwa na jukumu lipi kuhusu haki ya kumiliki mali?
answer: Kuhakikisha ulinzi wa haki za mali na sio kuziunda
wrong_answers:
  - Kuweka mipaka ya haki za mali kulingana na mapenzi ya jumla
  - Kugawanya rasilimali ili kuhakikisha usawa miongoni mwa wananchi
  - Kulinda mali wakati wa kudhibiti matumizi yake kulingana na faida ya kawaida
explanation: |
  Bastiat anaona sheria kama njia ya kutetea haki ya kumiliki mali, ambayo anaona kuwa ni haki ya asili inayotangulia sheria yoyote.

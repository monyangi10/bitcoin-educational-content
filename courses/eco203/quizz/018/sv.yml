question: Vilken form av social organisation anses vara i överensstämmelse med människans slut enligt Tracy?
answer: Fastighet
wrong_answers:
  - Demokrati
  - Löneinkomst
  - Republiken
explanation: |
  Tracy anser att privat egendom är viktig eftersom den gör det möjligt för individen att tillgodose sina behov och fullgöra sina skyldigheter.
reviewed: false
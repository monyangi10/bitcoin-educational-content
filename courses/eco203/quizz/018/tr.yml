question: Tracy tarafından hangi toplumsal örgütlenme biçiminin insanın sonuna uygun olduğu düşünülmektedir?
answer: Mülkiyet
wrong_answers:
  - Demokrasi
  - Ücret kazanımı
  - Cumhuriyet
explanation: |
  Tracy, bireyin ihtiyaçlarını karşılamasına ve görevlerini yerine getirmesine olanak tanıdığı için özel mülkiyeti gerekli görmektedir.
reviewed: false
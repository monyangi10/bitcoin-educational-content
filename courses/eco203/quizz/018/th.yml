question: รูปแบบของการจัดระเบียบทางสังคมที่ถือว่าเป็นไปตามจุดมุ่งหมายของมนุษย์โดย Tracy คืออะไร?
answer: ทรัพย์สิน
wrong_answers:
  - ประชาธิปไตย
  - การหารายได้จากค่าจ้าง
  - สาธารณรัฐ
explanation: |
  Tracy พิจารณาว่าทรัพย์สินส่วนตัวเป็นสิ่งสำคัญเพราะมันช่วยให้บุคคลสามารถตอบสนองความต้องการและปฏิบัติหน้าที่ของตนได้
reviewed: false
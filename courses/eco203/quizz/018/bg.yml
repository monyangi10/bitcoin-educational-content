question: Коя форма на социална организация се смята за съответстваща на целта на човека от Трейси?
answer: Собственост
wrong_answers:
  - Демокрация
  - Получаване на заплата
  - Републиката
explanation: |
  Трейси смята, че частната собственост е от съществено значение, тъй като тя позволява на индивида да посреща нуждите си и да изпълнява задълженията си.
reviewed: false
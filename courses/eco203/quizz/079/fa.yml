question: به گفته باستیا، خطر مداخله بیش از حد دولت برای جامعه چیست؟
answer: این امر مسئولیت فردی را از بین می‌برد و ابتکار خصوصی را محدود می‌کند
wrong_answers:
  - این به رشد اقتصادی و نوآوری کمک می‌کند
  - این تضمین می‌کند که فرصت‌های برابر برای همه فراهم شود
  - این افراد را از عواقب اعمالشان محافظت می‌کند
explanation: |
  برای باستیا، مداخله بیش از حد دولت، خودمختاری افراد را کاهش می‌دهد و توانایی آن‌ها را برای ابتکار عمل محدود می‌کند و در نتیجه مسئولیت‌پذیری و خلاقیت فردی را تضعیف می‌کند.
reviewed: false
question: ตามที่บาสเตียตกล่าวไว้ อันตรายที่การแทรกแซงของรัฐมากเกินไปก่อให้เกิดต่อสังคมคืออะไร?
answer: มันทำลายความรับผิดชอบส่วนบุคคลและจำกัดความคิดริเริ่มส่วนตัว
wrong_answers:
  - มันส่งเสริมการเติบโตทางเศรษฐกิจและนวัตกรรม
  - มันรับประกันโอกาสที่เท่าเทียมกันสำหรับทุกคน
  - มันปกป้องบุคคลจากผลที่ตามมาของการกระทำของพวกเขา
explanation: |
  สำหรับบาสเตียต์ การแทรกแซงของรัฐที่มากเกินไปลดทอนความเป็นอิสระของบุคคลและขัดขวางความสามารถในการริเริ่มของพวกเขา ซึ่งทำให้ความรับผิดชอบและความคิดสร้างสรรค์ของบุคคลอ่อนแอลง
reviewed: false
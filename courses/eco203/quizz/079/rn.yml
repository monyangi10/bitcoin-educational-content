question: Nk’uko Bastiat abivuga, ni akaga akahe Leta yinjiramwo birenze urugero itera ku kibano?
answer: Bisenya inshingano z'umuntu ku giti ciwe kandi bikagabanya ingingo z'umuntu ku giti ciwe .
wrong_answers:
  - Biteza imbere ubutunzi n'ubuhinga bushasha .
  - Bituma umuntu wese aronka amahirwe angana .
  - Bikingira abantu ku giti cabo ingaruka z'ibikorwa vyabo .
explanation: |
  Ku bwa Bastiat, ukwinjira kwa Leta birenze urugero kugabanya ubwigenge bw’umuntu ku giti ciwe, bikabuza ubushobozi bwiwe bwo gufata ingingo, gutyo bikaba bigoyagoya inshingano z’umuntu ku giti ciwe n’ubuhinga bwo kurema.

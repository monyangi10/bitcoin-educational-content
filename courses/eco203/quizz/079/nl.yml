question: Welk gevaar schuilt er volgens Bastiat in overmatige staatsinterventie voor de samenleving?
answer: Het vernietigt individuele verantwoordelijkheid en beperkt privé-initiatief
wrong_answers:
  - Het bevordert economische groei en innovatie
  - Het garandeert gelijke kansen voor iedereen
  - Het beschermt individuen tegen de gevolgen van hun acties
explanation: |
  Voor Bastiat vermindert overmatige staatsinterventie de autonomie van individuen en belemmert het hun vermogen om initiatieven te nemen, waardoor individuele verantwoordelijkheid en creativiteit verzwakken.
reviewed: false
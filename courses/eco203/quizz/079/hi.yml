question: बस्तिया के अनुसार, अत्यधिक राज्य हस्तक्षेप समाज के लिए क्या खतरा पैदा करता है?
answer: यह व्यक्तिगत जिम्मेदारी को नष्ट कर देता है और निजी पहल को सीमित कर देता है
wrong_answers:
  - यह आर्थिक विकास और नवाचार को बढ़ावा देता है
  - यह सबको बराबर मौके देता है
  - यह उनके कर्मों के परिणामों से व्यक्तियों की रक्षा करता है
explanation: |
  बास्तिया के लिए, अत्यधिक राज्य हस्तक्षेप व्यक्तियों की स्वायत्तता को कम करता है और उनकी पहल करने की क्षमता में बाधा डालता है, जिससे व्यक्तिगत ज़िम्मेदारी और रचनात्मकता कमज़ोर होती है।
reviewed: false
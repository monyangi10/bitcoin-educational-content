question: Според Бастиа каква опасност за обществото представлява прекомерната държавна намеса?
answer: Той унищожава индивидуалната отговорност и ограничава частната инициатива
wrong_answers:
  - Насърчава икономическия растеж и иновациите
  - Гарантира равни възможности за всички
  - Тя защитава хората от последиците от техните действия
explanation: |
  Според Бастиа прекомерната държавна намеса намалява автономията на индивидите и възпрепятства способността им да поемат инициативи, като по този начин отслабва индивидуалната отговорност и творчеството.
reviewed: false
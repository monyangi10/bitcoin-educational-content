question: Каква е ролята на индивидуалната отговорност за социалния прогрес според Бастиа?
answer: насърчава хората да бъдат предпазливи и прозорливи
wrong_answers:
  - Насърчава конкуренцията между хората
  - позволява на държавата да взема решения за благото на всички
  - Ограничава възможностите за личностно развитие
explanation: |
  Бастиа твърди, че индивидуалната отговорност води до предпазливост и прозорливост, тъй като всеки трябва да понесе последствията от действията си, което насърчава по-внимателно и отговорно поведение.
reviewed: true

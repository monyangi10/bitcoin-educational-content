question: Je, wajibu wa mtu binafsi katika maendeleo ya kijamii ni upi kwa mujibu wa Bastiat?
answer: Unahimiza watu binafsi kuwa waangalifu na wafadhili
wrong_answers:
  - Unahimiza ushindani kati ya watu binafsi
  - Uaruhusu serikali kufanya maamuzi kwa manufaa ya wote
  - Unapunguza uwezekano wa ukuaji wa kibinafsi
explanation: |
  Bastiat anasema kuwa uwajibikaji wa mtu binafsi huongoza kwa tahadhari na utoaji, kwani kila mtu lazima achukue matokeo ya matendo yake, ambayo huhimiza tabia ya kufikiria na kuwajibika zaidi.

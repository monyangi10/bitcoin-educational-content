question: چرا رومی‌ها مالکیت را صرفاً قراردادی می‌دانستند؟
answer: زیرا آنها برده داشتند
wrong_answers:
  - زیرا آنها قانونی‌گرا بودند
  - زیرا آنها زمین را کشت کردند
  - زیرا آنها سلسله مراتب اجتماعی را در اولویت قرار دادند
explanation: |
  رومیان، که در جامعه‌ای برده‌دار زندگی می‌کردند، به مالکیت به عنوان یک ساختار قانونی نگاه می‌کردند، زیرا بنیان‌های آن‌ها بر اساس غارت و استثمار دیگران بنا شده بود.
reviewed: false
question: Dlaczego Rzymianie uważali własność za czysto konwencjonalną?
answer: Ponieważ mieli niewolników
wrong_answers:
  - Ponieważ byli legalistami
  - Ponieważ uprawiali ziemię
  - Ponieważ priorytetowo traktowali hierarchię społeczną
explanation: |
  Rzymianie, żyjący w społeczeństwie posiadającym niewolników, postrzegali własność jako konstrukcję prawną, ponieważ ich fundamenty opierały się na grabieży i wyzysku innych.

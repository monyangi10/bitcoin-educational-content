question: रोमन लोग संपत्ति को पूरी तरह से परंपरागत क्यों मानते थे?
answer: क्योंकि उनके पास गुलाम थे
wrong_answers:
  - क्योंकि वे कानून के पक्के थे
  - क्योंकि उन्होंने ज़मीन की खेती की थी।
  - क्योंकि उन्होंने सामाजिक ऊँच-नीच को प्राथमिकता दी
explanation: |
  रोमन, जो एक गुलाम-रखने वाले समाज में रहते थे, संपत्ति को एक कानूनी संरचना के रूप में देखते थे, क्योंकि उनकी नींव दूसरों की लूट और शोषण पर आधारित थी।

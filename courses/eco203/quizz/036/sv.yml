question: Varför ansåg romarna att egendom var något rent konventionellt?
answer: För att de hade slavar
wrong_answers:
  - För att de var legalistiska
  - Eftersom de odlade marken
  - För att de prioriterade social hierarki
explanation: |
  Romarna, som levde i ett slavägarsamhälle, betraktade egendom som en juridisk konstruktion, eftersom deras grundvalar byggde på plundring och exploatering av andra.
reviewed: false
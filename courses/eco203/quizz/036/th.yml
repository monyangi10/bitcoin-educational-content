question: ทำไมชาวโรมันถึงมองว่าทรัพย์สินเป็นเพียงเรื่องสมมติ?
answer: เพราะพวกเขามีทาส
wrong_answers:
  - เพราะพวกเขายึดถือกฎหมาย
  - เพราะพวกเขาทำการเพาะปลูกที่ดิน
  - เพราะพวกเขาให้ความสำคัญกับลำดับชั้นทางสังคม
explanation: |
  ชาวโรมันที่อาศัยอยู่ในสังคมที่มีทาส มองทรัพย์สินว่าเป็นโครงสร้างทางกฎหมาย เนื่องจากรากฐานของพวกเขาขึ้นอยู่กับการปล้นสะดมและการแสวงหาประโยชน์จากผู้อื่น
reviewed: false
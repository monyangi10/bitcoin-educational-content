question: Защо римляните са смятали, че собствеността е чисто конвенционална?
answer: Защото са имали роби
wrong_answers:
  - Защото са били законници
  - Защото обработваха земята
  - Тъй като те дават приоритет на социалната йерархия
explanation: |
  Римляните, живеещи в робовладелско общество, разглеждат собствеността като правна конструкция, тъй като основите им се основават на грабежа и експлоатацията на другите.
reviewed: false
question: Kako lažna filantropija doprinosi izopačenju zakona prema Bastiat-u?
answer: Zato što se zapravo zasniva na nizu lažnih prava koja će neko drugi zapravo platiti.
wrong_answers:
  - Zato što želi da natera sve da budu dobri.
  - Jer stavlja mizantrope na vlast.
  - Jer uključuje dobrovoljnu solidarnost.
explanation: |
  Lažna filantropija stvara veštačka prava koja se prevode u obaveze nametnute drugima, čime se zakon izopačuje u instrument pljačke umesto da štiti prirodna prava.

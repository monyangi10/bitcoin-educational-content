question: บาสเตียตกล่าวว่า การทำบุญที่ผิดพลาดมีส่วนทำให้กฎหมายบิดเบือนอย่างไร?
answer: เพราะมันอิงจากสิทธิ์ที่ผิดพลาดซึ่งคนอื่นจะต้องจ่ายให้จริงๆ
wrong_answers:
  - เพราะมันต้องการบังคับให้ทุกคนเป็นคนดี
  - เพราะมันทำให้ผู้ที่เกลียดชังมนุษย์มีอำนาจ
  - เพราะมันรวมถึงความเป็นน้ำหนึ่งใจเดียวกันโดยสมัครใจ
explanation: |
  การทำบุญที่ผิดพลาดสร้างสิทธิเทียมที่แปลเป็นภาระผูกพันที่กำหนดให้ผู้อื่น จึงบิดเบือนกฎหมายให้กลายเป็นเครื่องมือของการปล้นสะดมแทนที่จะปกป้องสิทธิตามธรรมชาติ
reviewed: false
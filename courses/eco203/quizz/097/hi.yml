question: बस्तियात के अनुसार, झूठी परोपकारिता कानून को कैसे भ्रष्ट करती है?
answer: क्योंकि यह असल में झूठे अधिकारों की एक श्रृंखला पर आधारित है जिसकी कीमत किसी और को चुकानी पड़ेगी।
wrong_answers:
  - क्योंकि यह सबको अच्छा बनने के लिए मजबूर करना चाहता है।
  - क्योंकि यह लोगों से नफरत करने वालों को सत्ता में बिठा देता है।
  - क्योंकि इसमें स्वैच्छिक एकजुटता शामिल है।
explanation: |
  झूठी परोपकारिता कृत्रिम अधिकार पैदा करती है, जो दूसरों पर ज़बरदस्ती थोपे गए कर्तव्यों में बदल जाते हैं। इस तरह, कानून प्राकृतिक अधिकारों की रक्षा करने के बजाय लूट का एक औज़ार बन जाता है।
reviewed: false
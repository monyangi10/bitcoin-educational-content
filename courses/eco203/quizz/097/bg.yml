question: Как фалшивата филантропия допринася за изкривяването на закона според Бастиа?
answer: Защото тя всъщност се основава на редица фалшиви права, за които някой друг ще плати.
wrong_answers:
  - Защото иска да принуди всички да бъдат добри.
  - Защото това поставя на власт мизантропи.
  - Защото тя включва доброволна солидарност.
explanation: |
  Фалшивата филантропия създава изкуствени права, които се превръщат в задължения, налагани на другите, като по този начин превръща закона в инструмент за грабеж, а не за защита на естествените права.
reviewed: false
question: Hur bidrar falsk filantropi till att lagen förvanskas enligt Bastiat?
answer: Eftersom den faktiskt bygger på en rad falska rättigheter som någon annan faktiskt kommer att betala för.
wrong_answers:
  - För att den vill tvinga alla att vara goda.
  - För att det ger misantroper makt.
  - För att det inkluderar frivillig solidaritet.
explanation: |
  Falsk filantropi skapar artificiella rättigheter som översätts till skyldigheter som åläggs andra, vilket gör att lagen förvandlas till ett instrument för plundring snarare än att skydda naturliga rättigheter.
reviewed: false
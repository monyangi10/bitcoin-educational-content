question: طبق نظر باستیا، چگونه نیکوکاری کاذب به انحراف قانون کمک می‌کند؟
answer: زیرا در واقع بر اساس مجموعه‌ای از حقوق نادرست است که در واقع شخص دیگری هزینه آن را پرداخت خواهد کرد.
wrong_answers:
  - زیرا می‌خواهد همه را مجبور کند که خوب باشند.
  - زیرا انسان‌گریزها را به قدرت می‌رساند.
  - زیرا شامل همبستگی داوطلبانه است.
explanation: |
  نوع‌دوستی کاذب حقوق مصنوعی ایجاد می‌کند که به تعهداتی تحمیل‌شده بر دیگران تبدیل می‌شود و بدین ترتیب قانون را به ابزاری برای غارت تبدیل می‌کند، به‌جای اینکه از حقوق طبیعی محافظت کند.
reviewed: false
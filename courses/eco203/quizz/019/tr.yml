question: Tracy'ye göre savaşların gerçek alternatifi nedir?
answer: Üretim ve ticaret
wrong_answers:
  - Diplomasi
  - Kültür
  - Siyasi entegrasyon
explanation: |
  Destutt de Tracy, barışçıl üretim ve ticaretin çatışmaları önlemek için sürdürülebilir bir çözüm olduğuna inanmaktadır.

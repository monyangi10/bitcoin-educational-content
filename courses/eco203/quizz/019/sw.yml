question: Kulingana na Tracy, ni upi mbadala halisi wa vita?
answer: Uzalishaji na biashara
wrong_answers:
  - Diplomasia
  - Utamaduni
  - Ushirikiano wa kisiasa
explanation: |
  Destutt de Tracy anaamini kuwa uzalishaji wa amani na biashara ni suluhisho endelevu ili kuepusha migogoro.

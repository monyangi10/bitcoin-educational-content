question: Според дьо Траси каква е истинската алтернатива на войните?
answer: Производство и търговия
wrong_answers:
  - Дипломация
  - Култура
  - Политическа интеграция
explanation: |
  Дестют дьо Траси вярва, че мирното производство и търговия са устойчиво решение за избягване на конфликти.
reviewed: true

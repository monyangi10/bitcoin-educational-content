question: Nk’uko Tracy abivuga, ni igiki nyaco co gusubirira intambara?
answer: Umusaruro n'ubudandaji
wrong_answers:
  - Ubudipolomasi
  - Imico kama
  - Ukwifatanya mu vya politike
explanation: |
  Destutt de Tracy abona ko uguhingura n’ubudandaji mu mahoro ari umuti uramvye wo kwirinda amakimbirane.

question: اگر مالکیت یک نهاد است که توسط اراده عمومی تأسیس شده است، همان‌طور که روسو معتقد است، پیامد آن چیست؟
answer: قانون‌گذار می‌تواند مالکیت را سازماندهی، اصلاح یا حتی لغو کند.
wrong_answers:
  - سپس قانون‌گذار به این کنوانسیون متعهد می‌شود و نمی‌تواند به اموال دست بزند.
  - ژنرال هرگز نمی‌خواهد به اموال دست بزند
  - قانون‌گذار موظف است بدون استثنا از مالکیت محافظت کند
explanation: |
  به گفته روسو، از آنجا که مالکیت از اراده عمومی ناشی می‌شود، می‌توان آن را توسط قانون‌گذار مطابق با همان اراده تغییر داد یا لغو کرد.
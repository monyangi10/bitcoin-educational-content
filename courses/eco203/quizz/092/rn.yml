question: Nimba umutungo ari ikigo gishinzwe n’ubushake rusangi, nk’uko Rousseau avyiyumvira, ingaruka ni izihe?
answer: Umushingamateka arashobora gutunganya, guhindura canke mbere gukuraho umutungo .
wrong_answers:
  - Umushingamateka rero aboheshwa n’iri sezerano kandi ntashobora gukora ku mutungo .
  - Umujenerali ntazokwigera ashaka gukora ku mutungo
  - Umushingamateka asabwa kurinda umutungo ata n’umwe asigaye .
explanation: |
  Nk’uko Rousseau abivuga, kubera ko umutungo ukomoka ku ndagano rusangi, urashobora guhindurwa canke gukurwaho n’umushingamateka hakurikijwe iyo ndagano nyene.
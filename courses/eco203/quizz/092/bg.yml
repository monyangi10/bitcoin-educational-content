question: Ако собствеността е институция, установена от общата воля, както смята Русо, какво следва от това?
answer: Законодателят може да организира, променя или дори да премахне собствеността
wrong_answers:
  - Законодателят е обвързан с тази конвенция и не може да засяга собствеността
  - Общата воля никога не иска да се докосне до собственост
  - Законодателят е длъжен да защитава собствеността без изключение
explanation: |
  Според Русо, тъй като собствеността произтича от общата воля, тя може да бъде променена или премахната от законодателя в съответствие със същата тази воля.
reviewed: true

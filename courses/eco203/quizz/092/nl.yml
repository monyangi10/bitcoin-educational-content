question: Als eigendom een instelling is die door de algemene wil is ingesteld, zoals Rousseau gelooft, wat is dan het gevolg?
answer: De wetgever kan eigendom organiseren, wijzigen of zelfs afschaffen
wrong_answers:
  - De wetgever is dan gebonden aan dit verdrag en kan niet komen aan eigendom
  - De generaal wil nooit eigendom aanraken
  - De wetgever moet eigendom zonder uitzondering beschermen
explanation: |
  Volgens Rousseau kan eigendom, omdat het voortkomt uit de algemene wil, door de wetgever worden gewijzigd of afgeschaft in overeenstemming met diezelfde wil.
question: หากทรัพย์สินเป็นสถาบันที่ก่อตั้งขึ้นโดยเจตจำนงทั่วไป ตามที่รูโซเชื่อ ผลที่ตามมาคืออะไร?
answer: ฝ่ายนิติบัญญัติสามารถจัดระเบียบ แก้ไข หรือแม้กระทั่งยกเลิกทรัพย์สิน
wrong_answers:
  - จากนั้นผู้บัญญัติกฎหมายจะถูกผูกพันตามอนุสัญญานี้และไม่สามารถแตะต้องทรัพย์สินได้
  - นายพลไม่เคยต้องการแตะต้องทรัพย์สิน
  - ฝ่ายนิติบัญญัติต้องปกป้องทรัพย์สินโดยไม่มีข้อยกเว้น
explanation: |
  ตามที่รูโซกล่าว เนื่องจากทรัพย์สินเกิดขึ้นจากเจตจำนงทั่วไป มันสามารถถูกแก้ไขหรือยกเลิกโดยผู้ออกกฎหมายตามเจตจำนงเดียวกันนั้น
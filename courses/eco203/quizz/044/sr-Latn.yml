question: Koji je primarni uzrok društvenih nemira koji je Bastiat identifikovao u svom pismu Cobden-u?
answer: Ekonomsko neznanje javnosti
wrong_answers:
  - Nisko oporezivanje bogatih klasa
  - Uspon velikih industrija
  - Sporost društvenih reformi
explanation: |
  Bastiat pripisuje društvene nemire ekonomskoj neupućenosti, čineći populaciju ranjivom na utopijske ideje socijalizma.

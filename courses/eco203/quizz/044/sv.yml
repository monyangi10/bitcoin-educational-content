question: Vilken är den främsta orsaken till social oro som Bastiat identifierar i sitt brev till Cobden?
answer: Allmänhetens ekonomiska okunskap
wrong_answers:
  - Den låga beskattningen av de rika klasserna
  - Framväxten av stora industrier
  - Långsamheten i sociala reformer
explanation: |
  Bastiat förklarar den sociala oron med ekonomisk okunnighet, vilket gör befolkningen sårbar för socialismens utopiska idéer.
reviewed: false
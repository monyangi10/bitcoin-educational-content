question: علت اصلی ناآرامی‌های اجتماعی که بستیات در نامه‌اش به کابدن شناسایی کرده چیست؟
answer: نادانی اقتصادی عموم مردم
wrong_answers:
  - مالیات پایین طبقات ثروتمند
  - ظهور صنایع بزرگ
  - کندی اصلاحات اجتماعی
explanation: |
  باستیا ناآرامی‌های اجتماعی را به ناآگاهی اقتصادی نسبت می‌دهد و معتقد است که این امر جمعیت را در برابر ایده‌های آرمان‌گرایانه سوسیالیسم آسیب‌پذیر می‌کند.
reviewed: false
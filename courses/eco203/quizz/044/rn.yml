question: Ni igiki nyamukuru gituma haba imigumuko mu kibano Bastiat yerekanye mw’ikete yandikiye Cobden?
answer: Ubujuju bw'ubutunzi bwa bose .
wrong_answers:
  - Imisoro mike y'abatunzi
  - Ukwiyongera kw'inganda zikomeye
  - Ubute bw'ivugurura ry'imibano
explanation: |
  Bastiat avuga ko imigumuko yo mu kibano iterwa n’ubujuju bw’ubutunzi, ivyo bikaba bituma abanyagihugu bashobora gushikirwa n’ivyiyumviro vy’ubuhinga bwa none vy’ubusosiyalisiti.

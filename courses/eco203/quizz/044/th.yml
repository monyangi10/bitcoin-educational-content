question: สาเหตุหลักของความไม่สงบทางสังคมที่ Bastiat ระบุในจดหมายถึง Cobden คืออะไร?
answer: ความไม่รู้ทางเศรษฐกิจของสาธารณชน
wrong_answers:
  - การเก็บภาษีในอัตราต่ำของชนชั้นมั่งคั่ง
  - การเพิ่มขึ้นของอุตสาหกรรมหลัก
  - ความล่าช้าของการปฏิรูปสังคม
explanation: |
  บาสเตียตระบุว่าสาเหตุของความไม่สงบทางสังคมมาจากความไม่รู้ทางเศรษฐกิจ ทำให้ประชากรตกเป็นเหยื่อของแนวคิดยูโทเปียของสังคมนิยม
reviewed: false
question: Коя е основната причина за социалните вълнения, посочена от Бастиа в писмото му до Кобдън?
answer: Икономическото невежество на обществото
wrong_answers:
  - Ниското данъчно облагане на богатите класи
  - Възходът на основните индустрии
  - Бавността на социалните реформи
explanation: |
  Бастиа обяснява социалните вълнения с икономическото невежество, което прави населението уязвимо за утопичните идеи на социализма.
reviewed: true

question: Wat is de belangrijkste oorzaak van sociale onrust die Bastiat noemt in zijn brief aan Cobden?
answer: De economische onwetendheid van het publiek
wrong_answers:
  - De lage belasting van de rijke klassen
  - De opkomst van grote industrieën
  - De traagheid van sociale hervormingen
explanation: |
  Bastiat schrijft sociale onrust toe aan economische onwetendheid, waardoor de bevolking kwetsbaar wordt voor de utopische ideeën van het socialisme.
reviewed: false
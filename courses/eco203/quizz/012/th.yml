question: นวัตกรรมที่สำคัญที่นักเศรษฐศาสตร์สมัยใหม่แนะนำตาม Bastiat คืออะไร?
answer: พวกเขาต้องการฟื้นฟูความสามารถในการกระทำของบุคคล
wrong_answers:
  - พวกเขาต้องการเพิ่มพูนรัฐ
  - พวกเขาต้องการปรับสมดุลการค้า
  - พวกเขาต้องการควบคุมตลาด
explanation: |
  นักเศรษฐศาสตร์สมัยใหม่มุ่งฟื้นฟูความสามารถในการกระทำของบุคคลและส่งเสริมเสรีภาพทางเศรษฐกิจ
reviewed: false
question: Vilken är enligt Bastiat den viktigaste nyheten som moderna ekonomer har introducerat?
answer: De vill återställa individens handlingsförmåga
wrong_answers:
  - De vill berika staten
  - De vill balansera handelsbalansen
  - De vill reglera marknaden
explanation: |
  Moderna ekonomer strävar efter att återställa individens handlingsförmåga och att främja ekonomisk frihet.

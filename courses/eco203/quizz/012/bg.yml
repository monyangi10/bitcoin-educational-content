question: Кое е основното нововъведение, въведено от съвременните икономисти според Бастиа?
answer: Те искат да възстановят способността на индивида за действие
wrong_answers:
  - Те искат да обогатят държавата
  - Те искат да балансират търговския баланс
  - Те искат да регулират пазара
explanation: |
  Съвременните икономисти се стремят да възстановят способността на индивида да действа и да насърчават икономическата свобода.
reviewed: false
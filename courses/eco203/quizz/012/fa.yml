question: نوآوری عمده‌ای که به گفته باستیا توسط اقتصاددانان مدرن معرفی شده چیست؟
answer: آن‌ها می‌خواهند ظرفیت فرد برای اقدام را بازگردانند.
wrong_answers:
  - آنها می‌خواهند دولت را غنی‌سازی کنند
  - آن‌ها می‌خواهند تراز تجاری را متعادل کنند
  - آنها می‌خواهند بازار را تنظیم کنند
explanation: |
  اقتصاددانان مدرن به دنبال بازگرداندن ظرفیت فرد برای اقدام و ترویج آزادی اقتصادی هستند.
reviewed: false
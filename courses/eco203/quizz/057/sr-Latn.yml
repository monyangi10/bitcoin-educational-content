question: Koji je glavni argument koji iznose proizvođači sveća u prilog svom zahtevu?
answer: Potrebа za podrškom nacionalne industrije
wrong_answers:
  - Zaštita za oči
  - Superiorni kvalitet sveća u poređenju sa suncem
  - Visoka cena proizvodnje sveća
explanation: |
  Proizvođači sveća tvrde da je njihov zahtev opravdan potrebom za zaštitom nacionalne industrije, argumentom koji Bastiat koristi da osudi protekcionizam.

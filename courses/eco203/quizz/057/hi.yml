question: मोमबत्ती बनाने वालों का मुख्य तर्क क्या है जो उनके अनुरोध का समर्थन करता है?
answer: राष्ट्रीय उद्योग को समर्थन देने की ज़रूरत
wrong_answers:
  - आँखों की सुरक्षा
  - धूप की तुलना में मोमबत्तियों की बेहतर क्वालिटी
  - मोमबत्ती बनाने की ऊँची कीमत
explanation: |
  मोमबत्ती बनाने वाली कंपनियाँ दावा करती हैं कि उनकी माँग राष्ट्रीय उद्योग की सुरक्षा के लिए जरूरी है, यही तर्क बास्टियेट ने संरक्षणवाद की आलोचना करने के लिए इस्तेमाल किया था।
reviewed: false
question: Какъв е основният аргумент, изтъкнат от производителите на свещи в подкрепа на искането им?
answer: Необходимост от подкрепа за националната индустрия
wrong_answers:
  - Защита на очите
  - По-високото качество на свещите в сравнение със слънцето
  - Високите разходи за производство на свещи
explanation: |
  Производителите на свещи твърдят, че искането им е оправдано от необходимостта да се защити националната индустрия - аргумент, който Бастиа използва, за да осъди протекционизма.
reviewed: false
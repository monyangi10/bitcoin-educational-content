question: Vilket är det viktigaste argumentet som ljustillverkarna lägger fram till stöd för sin begäran?
answer: Behovet av att stödja den nationella industrin
wrong_answers:
  - Ögonskydd
  - Ljusets överlägsna kvalitet jämfört med solen
  - Den höga kostnaden för produktion av stearinljus
explanation: |
  Ljustillverkarna hävdar att deras begäran motiveras av behovet av att skydda den nationella industrin, ett argument som Bastiat använder för att fördöma protektionism.
reviewed: false
question: استدلال اصلی که توسط تولیدکنندگان شمع برای حمایت از درخواستشان مطرح می‌شود چیست؟
answer: نیاز به حمایت از صنعت ملی
wrong_answers:
  - محافظت از چشم
  - کیفیت برتر شمع‌ها در مقایسه با خورشید
  - هزینه بالای تولید شمع
explanation: |
  تولیدکنندگان شمع ادعا می‌کنند که درخواست آن‌ها با نیاز به حفاظت از صنعت ملی توجیه می‌شود، استدلالی که بَستیَت برای محکوم کردن حمایت‌گرایی استفاده می‌کند.
reviewed: false
question: ข้อโต้แย้งหลักที่ผู้ผลิตเทียนเสนอเพื่อสนับสนุนคำขอของพวกเขาคืออะไร?
answer: ความจำเป็นในการสนับสนุนอุตสาหกรรมแห่งชาติ
wrong_answers:
  - การป้องกันดวงตา
  - คุณภาพที่เหนือกว่าของเทียนเมื่อเทียบกับดวงอาทิตย์
  - ต้นทุนการผลิตเทียนที่สูง
explanation: |
  ผู้ผลิตเทียนอ้างว่าคำขอของพวกเขามีเหตุผลโดยความจำเป็นในการปกป้องอุตสาหกรรมภายในประเทศ ซึ่งเป็นข้อโต้แย้งที่ Bastiat ใช้ในการประณามการปกป้องทางการค้า
reviewed: false
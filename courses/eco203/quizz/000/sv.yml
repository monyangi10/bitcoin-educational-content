question: Vilken bok av Frédéric Bastiat var Ronald Reagans favoritbok?
answer: Lagen
wrong_answers:
  - Ekonomiska sofismer
  - Det som är synligt och det som inte är synligt
  - Ekonomisk harmoni
explanation: |
  The Law är det verk av Bastiat som djupt påverkade Ronald Reagan och som symboliserar kampen mot juridisk plundring.
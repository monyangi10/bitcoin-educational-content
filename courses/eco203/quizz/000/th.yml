question: หนังสือเล่มไหนของ Frédéric Bastiat ที่เป็นหนังสือเล่มโปรดของ Ronald Reagan?
answer: กฎหมาย
wrong_answers:
  - Sophisms ทางเศรษฐกิจ
  - สิ่งที่มองเห็นและสิ่งที่มองไม่เห็น
  - ความกลมกลืนทางเศรษฐกิจ
explanation: |
  กฎหมายเป็นผลงานของ Bastiat ที่มีอิทธิพลอย่างลึกซึ้งต่อ Ronald Reagan ซึ่งเป็นสัญลักษณ์ของการต่อสู้กับการปล้นสะดมทางกฎหมาย
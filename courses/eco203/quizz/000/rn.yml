question: Ni igitabu ikihe ca Frédéric Bastiat Ronald Reagan yakunda cane?
answer: Ivyagezwe
wrong_answers:
  - Ubutunzi
  - Ico kiboneka n'ico kitaboneka .
  - Ubutunzi buhuye
explanation: |
  Itegeko ni igitabu ca Bastiat cakoze cane kuri Ronald Reagan, kikaba ari ikigereranyo c’ukurwanya ubusahura bushingiye ku mategeko.
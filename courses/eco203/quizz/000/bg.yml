question: Коя книга на Фредерик Бастиа е любимата на Роналд Рейгън?
answer: Законът
wrong_answers:
  - Икономически софизми
  - Това, което се вижда, и това, което не се вижда
  - Икономически хармонии
explanation: |
  "Законът" е произведението на Бастиа, което оказва дълбоко влияние върху Роналд Рейгън, символизирайки борбата срещу законния грабеж.
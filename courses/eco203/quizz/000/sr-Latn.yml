question: Koja je omiljena knjiga Ronald-a Reagan-a od autora Frédéric-a Bastiat-a?
answer: Zakon
wrong_answers:
  - Ekonomski Sofizmi
  - Ono što se vidi i ono što se ne vidi
  - Ekonomske harmonije
explanation: |
  Zakon je delo od Bastiat-a koje je duboko uticalo na Ronald-a Reagan-a, simbolizujući borbu protiv legalne pljačke.

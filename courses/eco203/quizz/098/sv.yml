question: Vad bör vara syftet med lagen enligt Bastiat?
answer: Att sätta stopp för all plundring.
wrong_answers:
  - Att återbalansera maktförhållanden.
  - Till generate sociala band.
  - Att främja jämlikhet genom omfördelningsrättigheter.
explanation: |
  Enligt Bastiat ska lagen helt enkelt skydda de naturliga rättigheterna genom att förhindra all form av plundring och på så sätt garantera rättvisa för alla.

question: Koja bi trebala biti svrha Zakona prema Bastiat-u?
answer: Da se stane kraj svoj pljački.
wrong_answers:
  - Da se ponovo uspostavi ravnoteža odnosa moći.
  - Za generate društvene obveznice.
  - Da promoviše jednakost kroz redistributivna prava.
explanation: |
  Za Bastiat-a, zakon bi trebalo jednostavno da štiti prirodna prava sprečavanjem bilo kakvog oblika pljačke, čime se obezbeđuje pravedna pravda za sve.

question: هدف قانون از نظر بَستیا چه باید باشد؟
answer: برای پایان دادن به تمام غارت‌ها.
wrong_answers:
  - برای بازتعادل روابط قدرت.
  - به پیوندهای اجتماعی generate.
  - برای ترویج برابری از طریق حقوق توزیعی.
explanation: |
  برای بَستیَت، قانون باید صرفاً با جلوگیری از هرگونه غارت، از حقوق طبیعی محافظت کند و بدین ترتیب عدالت منصفانه برای همه را تضمین نماید.
reviewed: false
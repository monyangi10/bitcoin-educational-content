question: Каква трябва да бъде целта на закона според Бастиа?
answer: Да се сложи край на всички грабежи.
wrong_answers:
  - Да се възстанови равновесието на властовите отношения.
  - За да създадете социални връзки generate.
  - Насърчаване на равенството чрез преразпределителни права.
explanation: |
  За Бастиа законът трябва просто да защитава естествените права, като предотвратява всяка форма на грабеж и по този начин осигурява справедливо правосъдие за всички.

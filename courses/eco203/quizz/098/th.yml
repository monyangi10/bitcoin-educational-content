question: วัตถุประสงค์ของกฎหมายควรเป็นอย่างไรตาม Bastiat?
answer: เพื่อยุติการปล้นสะดมทั้งหมด
wrong_answers:
  - เพื่อปรับสมดุลความสัมพันธ์ทางอำนาจ
  - ถึงพันธบัตรสังคม generate
  - เพื่อส่งเสริมความเท่าเทียมผ่านสิทธิการกระจายใหม่
explanation: |
  สำหรับบัสเตีย กฎหมายควรปกป้องสิทธิธรรมชาติด้วยการป้องกันการปล้นสะดมในทุกรูปแบบ เพื่อให้แน่ใจว่ามีความยุติธรรมที่เป็นธรรมสำหรับทุกคน

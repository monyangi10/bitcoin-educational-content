question: Co Rousseau mówi o przemianie jednostki w obywatela?
answer: Zaczynamy stawać się mężczyznami dopiero wtedy, gdy jesteśmy obywatelami
wrong_answers:
  - Stajemy się obywatelami dopiero od Contract
  - Obywatelami stajemy się dopiero wtedy, gdy jesteśmy równi
  - Uzyskanie obywatelstwa poprzedza obywatelstwo
explanation: |
  Rousseau twierdzi, że jednostka staje się w pełni człowiekiem, przechodząc przez etap bycia obywatelem, łącząc w ten sposób osobiste spełnienie z integracją społeczną.

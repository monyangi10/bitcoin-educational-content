question: Vad säger Rousseau om förvandlingen av individen till medborgare?
answer: Vi börjar bli män först efter att vi har varit medborgare
wrong_answers:
  - Det är först med Contract som vi börjar bli medborgare
  - Vi blir medborgare först efter att ha varit jämlikar
  - Att bli medborgare föregår medborgarskap
explanation: |
  Rousseau hävdar att en individ blir fullt mänsklig genom att gå igenom stadiet att vara medborgare, och kopplar därmed personlig tillfredsställelse till social integration.

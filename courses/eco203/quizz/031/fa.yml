question: روسو درباره تبدیل فرد به شهروند چه می‌گوید؟
answer: ما تنها پس از آنکه شهروند شده‌ایم، شروع به مرد شدن می‌کنیم.
wrong_answers:
  - ما فقط با Contract شروع به تبدیل شدن به شهروند می‌کنیم.
  - ما تنها پس از برابر بودن، شهروند می‌شویم.
  - شهروند شدن مقدم بر تابعیت است
explanation: |
  روسو ادعا می‌کند که یک فرد با گذراندن مرحله شهروند بودن به طور کامل انسان می‌شود و بدین ترتیب تحقق شخصی را به یکپارچگی اجتماعی پیوند می‌دهد.
reviewed: false
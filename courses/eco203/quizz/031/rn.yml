question: None Rousseau avuga iki ku bijanye n’uguhinduka kw’umuntu ku giti ciwe ngo abe umunyagihugu?
answer: Dutangura gusa kuba abagabo tumaze kuba abanyagihugu .
wrong_answers:
  - Dutangura gusa kuba abanyagihugu dufise Contract.
  - Tuba abanyagihugu gusa tumaze kuba abangana .
  - Kuba umunyagihugu bibanza kuba umunyagihugu .
explanation: |
  Rousseau yemeza ko umuntu aba umuntu yuzuye mu guca mu rwego rwo kuba umunyagihugu, gutyo agahuza ukuranguka kw’umuntu ku giti ciwe n’ukwifatanya n’abandi.

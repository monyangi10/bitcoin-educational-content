question: Какво казва Русо за превръщането на индивида в гражданин?
answer: Започваме да ставаме мъже едва след като сме били граждани
wrong_answers:
  - Започваме да ставаме граждани едва с договора
  - Ставаме граждани само след като сме били равни
  - Ставането на гражданин предхожда гражданството
explanation: |
  Русо твърди, че индивидът става пълноценен човек, когато премине през етапа на гражданството, като по този начин свързва личната реализация със социалната интеграция.
reviewed: true

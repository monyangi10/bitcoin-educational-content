question: รูสโซพูดถึงการเปลี่ยนแปลงของบุคคลให้เป็นพลเมืองว่าอย่างไร?
answer: เราจะเริ่มเป็นผู้ชายก็ต่อเมื่อเราได้เป็นพลเมืองแล้วเท่านั้น
wrong_answers:
  - เราเพิ่งเริ่มต้นที่จะเป็นพลเมืองด้วยสัญญา
  - เรากลายเป็นพลเมืองได้ก็ต่อเมื่อเราเป็นผู้เท่าเทียมกันแล้วเท่านั้น
  - การเป็นพลเมืองมาก่อนสัญชาติ
explanation: |
  รูโซยืนยันว่าปัจเจกบุคคลจะกลายเป็นมนุษย์อย่างเต็มที่โดยการผ่านขั้นตอนของการเป็นพลเมือง ซึ่งเชื่อมโยงการเติมเต็มส่วนบุคคลกับการบูรณาการทางสังคม
reviewed: false
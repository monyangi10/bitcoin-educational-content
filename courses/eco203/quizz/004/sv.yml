question: Varför är Frédéric Bastiat idag erkänd som en inflytelserik tänkare, trots att han är relativt okänd?
answer: Han föregrep moderna idéer om den politiska marknaden och laglig plundring.
wrong_answers:
  - Han förespråkade allmän utbildning för alla.
  - Han skrev en avhandling om moderna revolutioner.
  - Han hade ett direkt inflytande på skapandet av socialförsäkringssystemet i Frankrike.
explanation: |
  Bastiat återupptäcks för sina idéer om frihet, äganderätt och sin kritik av laglig utplundring, som ger genklang i moderna utmaningar.
reviewed: false
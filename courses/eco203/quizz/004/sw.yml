question: Kwa nini Frédéric Bastiat anatambuliwa leo kama mwanafikra mwenye ushawishi, licha ya kuwa hajulikani kwa sana?
answer: Alitarajia mawazo ya kisasa kuhusu soko la kisiasa na uporaji wa kisheria.
wrong_answers:
  - Alihimiza elimu ya umma kwa wote.
  - Aliandika risala juu ya mapinduzi ya kisasa.
  - Aliathiri moja kwa moja uundaji wa usalama wa kijamii nchini Ufaransa.
explanation: |
  Bastiat amegunduliwa upya kwa mawazo yake kuhusu uhuru, haki za kumiliki mali, na ukosoaji wake wa uporaji wa kisheria, unaohusiana na changamoto za kisasa.

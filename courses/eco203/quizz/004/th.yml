question: ทำไม Frédéric Bastiat ถึงได้รับการยอมรับในปัจจุบันว่าเป็นนักคิดที่มีอิทธิพล แม้จะไม่ค่อยมีคนรู้จัก?
answer: เขาคาดการณ์แนวคิดสมัยใหม่เกี่ยวกับตลาดการเมืองและการปล้นทางกฎหมาย
wrong_answers:
  - เขาส่งเสริมการศึกษาสาธารณะสำหรับทุกคน
  - เขาเขียนบทความเกี่ยวกับการปฏิวัติสมัยใหม่
  - เขามีอิทธิพลโดยตรงต่อการสร้างระบบประกันสังคมในฝรั่งเศส
explanation: |
  บาสเตียตถูกค้นพบอีกครั้งสำหรับแนวคิดของเขาเกี่ยวกับเสรีภาพ สิทธิในทรัพย์สิน และการวิพากษ์วิจารณ์การปล้นสะดมทางกฎหมาย ซึ่งสอดคล้องกับความท้าทายสมัยใหม่
reviewed: false
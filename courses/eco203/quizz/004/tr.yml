question: Frédéric Bastiat nispeten tanınmamasına rağmen neden bugün etkili bir düşünür olarak kabul ediliyor?
answer: Siyasi pazar ve yasal yağma hakkındaki modern fikirleri öngörmüştür.
wrong_answers:
  - Herkes için kamu eğitimini destekledi.
  - Modern devrimler üzerine bir inceleme yazdı.
  - Fransa'da sosyal güvenliğin oluşturulmasını doğrudan etkilemiştir.
explanation: |
  Bastiat, özgürlük, mülkiyet hakları ve yasal yağma eleştirisi hakkındaki fikirleriyle yeniden keşfedildi ve modern zorluklarla yankılandı.
reviewed: false
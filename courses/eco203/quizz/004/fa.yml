question: چرا فردریک باستیا امروز به عنوان یک متفکر تأثیرگذار شناخته می‌شود، با وجود اینکه نسبتاً ناشناخته است؟
answer: او ایده‌های مدرن درباره بازار سیاسی و غارت قانونی را پیش‌بینی کرد.
wrong_answers:
  - او آموزش عمومی برای همه را ترویج کرد.
  - او رساله‌ای درباره انقلاب‌های مدرن نوشت.
  - او به طور مستقیم بر ایجاد تأمین اجتماعی در فرانسه تأثیر گذاشت.
explanation: |
  باستیا به خاطر ایده‌هایش درباره آزادی، حقوق مالکیت و نقد او از غارت قانونی، که با چالش‌های مدرن همخوانی دارد، دوباره کشف شده است.
reviewed: false
question: 프레데릭 바스티앙이 비교적 알려지지 않았음에도 불구하고 오늘날 영향력 있는 사상가로 인정받는 이유는 무엇일까요?
answer: 그는 정치 시장과 법적 약탈에 대한 현대의 생각을 예상했습니다.
wrong_answers:
  - 그는 모두를 위한 공교육을 장려했습니다.
  - 그는 현대 혁명에 관한 논문을 썼습니다.
  - 그는 프랑스의 사회보장제도 창설에 직접적인 영향을 미쳤습니다.
explanation: |
  바스티아트는 자유와 재산권에 대한 그의 사상과 법적 약탈에 대한 비판으로 현대의 도전에 공감을 불러일으키며 재발견되고 있습니다.
reviewed: false
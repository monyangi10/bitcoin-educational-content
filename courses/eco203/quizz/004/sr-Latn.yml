question: Zašto je Frédéric Bastiat danas prepoznat kao uticajan mislilac, uprkos tome što je relativno nepoznat?
answer: Predvideo je moderne ideje o političkom tržištu i pravnom pljačkanju.
wrong_answers:
  - Promovisao je javno obrazovanje za sve.
  - Napisao je raspravu o modernim revolucijama.
  - On je direktno uticao na stvaranje socijalnog osiguranja u Francuskoj.
explanation: |
  Bastiat je ponovo otkriven zbog svojih ideja o slobodi, pravima vlasništva i kritici legalne pljačke, što odjekuje sa savremenim izazovima.

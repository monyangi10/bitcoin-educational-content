question: Защо днес Фредерик Бастиа е признат за влиятелен мислител, въпреки че е сравнително неизвестен?
answer: Той изпреварва съвременните идеи за политическия пазар и законния грабеж.
wrong_answers:
  - Той насърчава общественото образование за всички.
  - Той пише трактат за съвременните революции.
  - Той оказва пряко влияние върху създаването на социалното осигуряване във Франция.
explanation: |
  Бастиа е преоткрит заради идеите си за свободата, правата на собственост и критиката си на законния грабеж, които намират отклик в съвременните предизвикателства.
reviewed: true

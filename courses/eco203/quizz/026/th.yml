question: คอบเดนกำหนดการผูกขาดขนมปังอย่างไร?
answer: เมื่อขาดแคลนขนมปัง
wrong_answers:
  - ในฐานะสิทธิพิเศษของราชวงศ์
  - ในฐานะภาษีขนมปัง
  - ในฐานะการควบคุมราคา
explanation: |
  คอบเดนใช้คำนี้เพื่อประณามกฎหมายคุ้มครอง โดยยืนยันว่ากฎหมายเหล่านี้จำกัดการเข้าถึงขนมปังโดยการเพิ่มราคาขึ้นอย่างไม่เป็นธรรมชาติ
reviewed: false
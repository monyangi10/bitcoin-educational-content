question: Как Кобдън определя монопола върху хляба?
answer: Тъй като недостигът на хляб
wrong_answers:
  - Като кралска привилегия
  - Като данък върху хляба
  - Като ценови контрол
explanation: |
  Кобдън използва този термин, за да осъди протекционистките закони, твърдейки, че те ограничават достъпа до хляб, като изкуствено повишават цената му.

question: Hur definierade Cobden brödmonopolet?
answer: Som bristen på bröd
wrong_answers:
  - Som ett kungligt privilegium
  - Som en skatt på bröd
  - Som priskontroll
explanation: |
  Cobden använde denna term för att kritisera protektionistiska lagar och hävdade att de begränsade tillgången till bröd genom att på konstgjord väg höja priset.

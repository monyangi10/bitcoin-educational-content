question: کوبدن انحصار نان را چگونه تعریف کرد؟
answer: به دلیل کمبود نان
wrong_answers:
  - به عنوان یک امتیاز سلطنتی
  - به عنوان مالیات بر نان
  - به عنوان کنترل قیمت
explanation: |
  کوبدن از این اصطلاح برای محکوم کردن قوانین حمایت‌گرایانه استفاده کرد و ادعا کرد که این قوانین با افزایش مصنوعی قیمت، دسترسی به نان را محدود می‌کنند.
reviewed: false
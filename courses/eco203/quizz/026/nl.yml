question: Hoe definieerde Cobden het broodmonopolie?
answer: Als de schaarste van brood
wrong_answers:
  - Als koninklijk voorrecht
  - Als belasting op brood
  - Als prijscontrole
explanation: |
  Cobden gebruikte deze term om protectionistische wetten aan te klagen, omdat ze de toegang tot brood beperkten door de prijs kunstmatig te verhogen.
reviewed: false
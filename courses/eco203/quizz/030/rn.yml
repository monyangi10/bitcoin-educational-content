question: Bastiat abona ko Rousseau ari we yatanguje umuhari uwuhe wa politike?
answer: Ubusosiyalisimu
wrong_answers:
  - Ubukomunisita
  - Ugufashanya
  - Ubunyagitugu
explanation: |
  Bastiat abona ko Rousseau ari we yabanjirije ubusosiyalisimu, kubera uburyo yafata abantu bose hamwe, aho umuntu ategerezwa kuyobokera ubushake rusangi.

question: Bastiat anser att Rousseau var föregångare till vilken politisk rörelse?
answer: Socialism
wrong_answers:
  - Kommunism
  - Mutualism
  - Anarkism
explanation: |
  Bastiat ser Rousseau som en föregångare till socialismen på grund av hans kollektiva syn på samhället, där individen måste underkasta sig den allmänna viljan.

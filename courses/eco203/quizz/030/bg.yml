question: Бастиа смята Русо за предшественик на кое политическо движение?
answer: Социализъм
wrong_answers:
  - Комунизъм
  - Взаимност
  - Анархизъм
explanation: |
  Бастиа разглежда Русо като предшественик на социализма заради колективния му подход към обществото, при който индивидът трябва да се подчини на общата воля.

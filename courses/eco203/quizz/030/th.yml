question: บาสเตียตพิจารณาว่ารูโซเป็นบรรพบุรุษของขบวนการทางการเมืองใด?
answer: สังคมนิยม
wrong_answers:
  - คอมมิวนิสต์
  - ภาวะพึ่งพาอาศัยกัน
  - อนาธิปไตย
explanation: |
  บาสเตียต์มองว่ารูโซเป็นผู้บุกเบิกสังคมนิยม เนื่องจากแนวทางการรวมกลุ่มของเขาต่อสังคม ที่ซึ่งบุคคลต้องยอมจำนนต่อเจตจำนงทั่วไป
reviewed: false
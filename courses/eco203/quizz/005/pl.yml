question: Kiedy Frédéric Bastiat odkrył swoje powołanie jako ekonomista?
answer: Podczas podróży do Anglii
wrong_answers:
  - Podczas studiów w Sorèze College
  - Podczas pracy w swojej posiadłości w Landes
  - Podczas debaty w Paryżu
explanation: |
  Bastiat odkrył swoje powołanie jako ekonomista w Anglii, pod wpływem kontaktu z Anti-Corn Law League.
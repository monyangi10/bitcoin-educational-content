question: Кога Фредерик Бастиа открива призванието си на икономист?
answer: По време на пътуване до Англия
wrong_answers:
  - По време на обучението си в колежа Сорез
  - Докато работи в имението си в Ланд
  - По време на дебат в Париж
explanation: |
  Бастиа открива призванието си на икономист в Англия, повлиян от контактите си с Лигата за борба с царевицата.
reviewed: true

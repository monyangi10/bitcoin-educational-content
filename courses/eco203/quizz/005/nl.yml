question: Wanneer ontdekte Frédéric Bastiat zijn roeping als econoom?
answer: Tijdens een reis naar Engeland
wrong_answers:
  - Tijdens zijn studie aan het college van Sorèze
  - Tijdens zijn werk op zijn landgoed in de Landes
  - Tijdens een debat in Parijs
explanation: |
  Bastiat ontdekte zijn roeping als econoom in Engeland, beïnvloed door zijn contact met de Anti-Corn Law League.
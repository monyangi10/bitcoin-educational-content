question: Frédéric Bastiat ค้นพบความสนใจในด้านเศรษฐศาสตร์เมื่อใด?
answer: ระหว่างการเดินทางไปอังกฤษ
wrong_answers:
  - ระหว่างการศึกษาของเขาที่วิทยาลัย Sorèze
  - ขณะทำงานในที่ดินของเขาในแล็นเดส
  - ระหว่างการอภิปรายในปารีส
explanation: |
  บาสเตียตค้นพบการเรียกของเขาในฐานะนักเศรษฐศาสตร์ในอังกฤษ ได้รับอิทธิพลจากการติดต่อกับสมาคมต่อต้านกฎหมายข้าวโพด
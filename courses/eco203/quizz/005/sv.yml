question: När upptäckte Frédéric Bastiat sitt kall som ekonom?
answer: Under en resa till England
wrong_answers:
  - Under sina studier vid Sorèze College
  - Medan han arbetade på sitt gods i Landes
  - Under en debatt i Paris
explanation: |
  Bastiat upptäckte sitt kall som ekonom i England, påverkad av sin kontakt med Anti-Corn Law League.
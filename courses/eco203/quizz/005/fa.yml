question: فردریک باستیا چه زمانی به عنوان یک اقتصاددان به رسالت خود پی برد؟
answer: در طول سفری به انگلستان
wrong_answers:
  - در طول تحصیلاتش در کالج سورز
  - در حالی که در املاکش در لاندس کار می‌کرد
  - در طول یک مناظره در پاریس
explanation: |
  باستیا در انگلستان و تحت تأثیر ارتباط با لیگ ضد قانون ذرت، رسالت خود را به عنوان یک اقتصاددان کشف کرد.
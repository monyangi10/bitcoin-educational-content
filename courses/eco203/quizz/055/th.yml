question: ใครถูกพิจารณาว่าเป็นคู่แข่งที่ไม่เป็นธรรมของผู้ผลิตเทียนในเรื่องนี้?
answer: ดวงอาทิตย์
wrong_answers:
  - ผู้ผลิตเทียนต่างประเทศ
  - ไฟฟ้า
  - ตะเกียงน้ำมัน
explanation: |
  ในงานเสียดสีของเขา Bastiat กล่าวถึงดวงอาทิตย์ว่าเป็นคู่แข่งที่ไม่ยุติธรรม โดยเน้นความไร้เหตุผลของมาตรการปกป้องโดยการพูดเกินจริงถึงข้อเรียกร้องของผู้ผลิตเทียน
reviewed: false
question: Vem anses vara den orättvisa konkurrenten till ljusstöpare i den här berättelsen?
answer: Solen
wrong_answers:
  - Utländska ljustillverkare
  - Elektricitet
  - Oljelampor
explanation: |
  I sin satir hänvisar Bastiat till solen som den orättvisa konkurrenten och belyser absurditeten i protektionistiska åtgärder genom att överdriva ljusstöparnas krav.
reviewed: false
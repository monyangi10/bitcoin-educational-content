question: Кой е считан за нелоялен конкурент на производителите на свещи в тази история?
answer: Слънцето
wrong_answers:
  - Чуждестранни производители на свещи
  - Електричество
  - Маслени лампи
explanation: |
  В сатирата си Бастиа нарича слънцето нелоялен конкурент и подчертава абсурдността на протекционистичните мерки, като преувеличава изискванията на производителите на свещи.
reviewed: false
question: باسیات از چه مفهومی برای توصیف ایدئولوژی توزیع اجباری و غارت قانونی استفاده می‌کند؟
answer: سوسیالیسم
wrong_answers:
  - جمهوری‌خواهی
  - محافظه‌کاری
  - لیبرالیسم
explanation: |
  باستیا سوسیالیسم را به دلیل تمایل آن به استفاده از قانون برای تحمیل توزیع مجدد اجباری که آن را نوعی غارت قانونی می‌داند، مورد انتقاد قرار می‌دهد.
question: แนวคิดใดที่ Bastiat ใช้อธิบายอุดมการณ์ของการกระจายทรัพยากรที่ถูกบังคับและการปล้นสะดมทางกฎหมาย?
answer: สังคมนิยม
wrong_answers:
  - สาธารณรัฐนิยม
  - อนุรักษนิยม
  - ลัทธิเสรีนิยม
explanation: |
  บาสเตียวิจารณ์ลัทธิสังคมนิยมในเรื่องแนวโน้มที่จะใช้กฎหมายเพื่อบังคับให้มีการกระจายทรัพย์สินใหม่ ซึ่งเขามองว่าเป็นรูปแบบหนึ่งของการปล้นที่ถูกกฎหมาย
question: Vilket begrepp använder Bastiat för att beskriva ideologin med påtvingad omfördelning och laglig plundring?
answer: socialism
wrong_answers:
  - republikanism
  - konservatism
  - liberalism
explanation: |
  Bastiat kritiserar socialismen för dess tendens att använda lagen för att tvinga fram omfördelning, vilket han anser vara en form av juridisk plundring.
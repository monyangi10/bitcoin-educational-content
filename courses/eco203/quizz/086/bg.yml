question: Какво понятие използва Бастиа, за да опише идеологията на принудителното преразпределение и законния грабеж?
answer: социализъм
wrong_answers:
  - републиканизъм
  - консерватизъм
  - либерализъм
explanation: |
  Бастиа критикува социализма заради склонността му да използва закона за налагане на принудително преразпределение, което според него е форма на законен грабеж.
reviewed: true

question: Каква молба отправят производителите на свещи към депутатите?
answer: Да се забрани използването на слънцето като източник на светлина
wrong_answers:
  - Увеличаване на данъците върху свещите
  - Затваряне на чуждестранни фабрики за свещи
  - Субсидиране на производството на свещи
explanation: |
  В тази сатира производителите на свещи искат забрана на слънчевата светлина, за да подчертаят абсурдността на някои протекционистки политики.

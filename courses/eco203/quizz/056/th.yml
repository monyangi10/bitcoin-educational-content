question: คำขออะไรที่ผู้ผลิตเทียนทำต่อรองผู้แทน?
answer: ห้ามการใช้ดวงอาทิตย์เป็นแหล่งกำเนิดแสง
wrong_answers:
  - เพื่อเพิ่มภาษีบนเทียน
  - ปิดโรงงานเทียนต่างประเทศ
  - เพื่ออุดหนุนการผลิตเทียน
explanation: |
  ในบทเสียดสีนี้ ผู้ผลิตเทียนร้องขอให้แบนแสงอาทิตย์เพื่อเน้นความไร้สาระของนโยบายปกป้องบางอย่าง
reviewed: false
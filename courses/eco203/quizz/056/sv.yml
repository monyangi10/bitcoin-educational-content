question: Vilken begäran gör ljustillverkare till suppleanterna?
answer: Att förbjuda användningen av solen som ljuskälla
wrong_answers:
  - Att höja skatten på stearinljus
  - Att stänga utländska ljusfabriker
  - Att subventionera tillverkning av stearinljus
explanation: |
  I denna satir begär ljustillverkarna att solljuset ska förbjudas för att belysa det absurda i vissa protektionistiska åtgärder.
reviewed: false
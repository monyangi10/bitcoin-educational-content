question: Z jakim żądaniem producenci świec zwracają się do posłów?
answer: Zakaz używania słońca jako źródła światła
wrong_answers:
  - Zwiększenie podatków od świec
  - Zamknięcie zagranicznych fabryk świec
  - Subsydiowanie produkcji świec
explanation: |
  W tej satyrze producenci świec żądają zakazania światła słonecznego, aby podkreślić absurdalność niektórych polityk protekcjonistycznych.

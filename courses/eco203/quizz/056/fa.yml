question: تولیدکنندگان شمع چه درخواستی از نمایندگان دارند؟
answer: برای ممنوعیت استفاده از خورشید به عنوان منبع نور
wrong_answers:
  - برای افزایش مالیات بر شمع‌ها
  - برای بستن کارخانه‌های شمع‌سازی خارجی
  - برای یارانه دادن به تولید شمع
explanation: |
  در این طنز، تولیدکنندگان شمع درخواست ممنوعیت نور خورشید را می‌دهند تا به پوچی برخی سیاست‌های حمایت‌گرایانه اشاره کنند.
reviewed: false
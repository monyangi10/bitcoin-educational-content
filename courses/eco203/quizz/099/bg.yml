question: Каква е ролята на държавата в една система на естествена свобода според Бастиа?
answer: Да защитава естествените права, като живот, свобода и собственост.
wrong_answers:
  - За да се преразпредели богатството за повече равенство.
  - Налагане на морални ценности чрез закони.
  - Да контролира и регулира всички аспекти на обществото.
explanation: |
  В рамките на естествената свобода Бастиа смята, че държавата трябва да се намесва само за защита на естествените права на хората, без да се намесва в техния личен или икономически избор.
reviewed: true

question: บทบาทของรัฐในระบบเสรีภาพตามธรรมชาติตามที่บาสเตียต์คืออะไร?
answer: เพื่อปกป้องสิทธิตามธรรมชาติ เช่น ชีวิต เสรีภาพ และทรัพย์สิน
wrong_answers:
  - การกระจายความมั่งคั่งใหม่เพื่อความเท่าเทียมมากขึ้น
  - กำหนดค่านิยมทางศีลธรรมผ่านกฎหมาย
  - เพื่อควบคุมและควบคุมทุกแง่มุมของสังคม
explanation: |
  ภายในกรอบของเสรีภาพตามธรรมชาติ Bastiat เชื่อว่ารัฐควรแทรกแซงเพียงเพื่อปกป้องสิทธิธรรมชาติของบุคคล โดยไม่แทรกแซงในทางเลือกส่วนบุคคลหรือเศรษฐกิจของพวกเขา
reviewed: false
question: Wat is de rol van de staat in een systeem van natuurlijke vrijheid volgens Bastiat?
answer: Het beschermen van natuurlijke rechten, zoals leven, vrijheid en eigendom.
wrong_answers:
  - Om rijkdom te herverdelen voor meer gelijkheid.
  - Morele waarden opleggen door middel van wetten.
  - Alle aspecten van de samenleving controleren en reguleren.
explanation: |
  Binnen het kader van natuurlijke vrijheid vindt Bastiat dat de staat alleen moet ingrijpen om de natuurlijke rechten van individuen te beschermen, zonder zich te mengen in hun persoonlijke of economische keuzes.

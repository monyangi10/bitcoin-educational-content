question: Jaka jest rola państwa w systemie naturalnej wolności według Bastiata?
answer: Ochrona praw naturalnych, takich jak życie, wolność i własność.
wrong_answers:
  - Redystrybucja bogactwa dla większej równości.
  - Narzucanie wartości moralnych poprzez prawa.
  - Kontrolować i regulować wszystkie aspekty społeczeństwa.
explanation: |
  W ramach naturalnej wolności Bastiat uważa, że państwo powinno interweniować jedynie w celu ochrony naturalnych praw jednostek, bez ingerowania w ich osobiste lub ekonomiczne wybory.
reviewed: false
question: बस्तिया के अनुसार, प्राकृतिक स्वतंत्रता की व्यवस्था में राज्य की क्या भूमिका है?
answer: प्राकृतिक अधिकारों की रक्षा करने के लिए, जैसे कि जीवन, स्वतंत्रता, और संपत्ति।
wrong_answers:
  - धन को और समानता के लिए फिर से बांटना।
  - कानूनों के जरिए नैतिक मूल्यों को थोपना।
  - समाज के हर पहलू को नियंत्रित और नियमित करना।
explanation: |
  प्राकृतिक स्वतंत्रता के ढांचे में, बास्तियत का मानना है कि सरकार को सिर्फ़ व्यक्तियों के प्राकृतिक अधिकारों की रक्षा के लिए ही हस्तक्षेप करना चाहिए, उनके निजी या आर्थिक फैसलों में दखल दिए बिना।
reviewed: false
question: Vilken är statens roll i ett system med naturlig frihet enligt Bastiat?
answer: Att skydda naturliga rättigheter, såsom liv, frihet och egendom.
wrong_answers:
  - Att omfördela rikedomar för ökad jämlikhet.
  - Att införa moraliska värderingar genom lagar.
  - Att kontrollera och reglera alla aspekter av samhället.
explanation: |
  Inom ramen för den naturliga friheten anser Bastiat att staten endast ska ingripa för att skydda individers naturliga rättigheter, utan att lägga sig i deras personliga eller ekonomiska val.

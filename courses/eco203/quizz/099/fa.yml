question: نقش دولت در یک سیستم آزادی طبیعی از نظر بستیات چیست؟
answer: برای حفاظت از حقوق طبیعی، مانند زندگی، آزادی و مالکیت.
wrong_answers:
  - برای توزیع مجدد ثروت به منظور برابری بیشتر.
  - تحمیل ارزش‌های اخلاقی از طریق قوانین.
  - برای کنترل و تنظیم همه جنبه‌های جامعه.
explanation: |
  در چارچوب آزادی طبیعی، بَستیا معتقد است که دولت باید تنها برای حفاظت از حقوق طبیعی افراد مداخله کند، بدون اینکه در انتخاب‌های شخصی یا اقتصادی آن‌ها دخالت کند.
reviewed: false
question: Ni uruhara uruhe Leta ifise mu bijanye n’urutonde rw’umwidegemvyo w’akameremere nk’uko Bastiat abivuga?
answer: Kugira ngo umuntu akingire uburenganzira bwa muntu, nk’ubuzima, umwidegemvyo n’itunga.
wrong_answers:
  - Kugira ngo ubutunzi busubire gusangira kugira ngo habeho uburinganire bwinshi.
  - Gutegeka ingingo ngenderwako z’inyifato runtu biciye ku mategeko.
  - Kugenzura no gutunganya imice yose y’ikibano.
explanation: |
  Mu rwego rw’umwidegemvyo w’akameremere, Bastiat abona ko Leta ikwiye gusa kwivanga mu vyo kurinda uburenganzira bw’abantu, ataco yivanga mu mahitamwo yabo bwite canke mu vy’ubutunzi.

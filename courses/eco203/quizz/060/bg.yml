question: Какъв е основният проблем на публичните разходи според Бастиа?
answer: Често се губи
wrong_answers:
  - Създава твърде много работни места
  - Това е несправедливо спрямо най-богатите
  - Тя е необходима за функционирането на обществото
explanation: |
  Бастиа счита, че публичните разходи са източник на разхищение, тъй като средствата, конфискувани от хората, често се използват не по предназначение от държавата.

question: Je, ni tatizo gani kuu la matumizi ya umma kulingana na Bastiat?
answer: Mara nyingi hupotea
wrong_answers:
  - Inatengeneza ajira nyingi sana
  - Si haki kwa tajiri zaidi
  - Ni muhimu kwa jamii kufanya kazi
explanation: |
  Bastiat anaona matumizi ya umma kama chanzo cha upotevu kwa sababu pesa zinazochukuliwa kutoka kwa watu binafsi mara nyingi hutumiwa vibaya na serikali.

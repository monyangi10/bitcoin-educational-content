question: مشکل اصلی با هزینه‌های عمومی از نظر بَستیا چیست؟
answer: اغلباً هدر می‌رود
wrong_answers:
  - این تعداد زیادی شغل ایجاد می‌کند
  - این برای ثروتمندترین‌ها ناعادلانه است
  - لازم است که جامعه کار کند
explanation: |
  باستیا هزینه‌های عمومی را منبعی از اتلاف می‌داند زیرا وجوهی که از افراد مصادره می‌شود اغلب توسط دولت به‌درستی استفاده نمی‌شود.
reviewed: false
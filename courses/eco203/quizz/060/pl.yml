question: Jaki jest główny problem z wydatkami publicznymi według Bastiata?
answer: Często się marnuje
wrong_answers:
  - Tworzy zbyt wiele miejsc pracy
  - To niesprawiedliwe wobec najbogatszych
  - Jest to niezbędne do funkcjonowania społeczeństwa
explanation: |
  Bastiat postrzega wydatki publiczne jako źródło marnotrawstwa, ponieważ fundusze skonfiskowane jednostkom są często niewłaściwie wykorzystywane przez państwo.

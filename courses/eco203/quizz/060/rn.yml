question: Ni ikihe kibazo nyamukuru kiri mu gukoresha amahera ya Leta nk’uko Bastiat abivuga?
answer: Kenshi birapfa ubusa .
wrong_answers:
  - Bituma habaho akazi kenshi cane
  - Ntibibereye abatunzi kuruta abandi bose
  - Ni ngombwa kugira ikibano gikore
explanation: |
  Bastiat abona ko amafaranga Leta ikoresha ari isoko y’ubusa kuko amafaranga afatwa abantu ku giti cabo akenshi akoreshwa nabi na Leta.

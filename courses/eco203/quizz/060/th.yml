question: ปัญหาหลักของการใช้จ่ายสาธารณะตามที่ Bastiat กล่าวคืออะไร?
answer: มันมักจะสูญเปล่า
wrong_answers:
  - มันสร้างงานมากเกินไป
  - มันไม่ยุติธรรมต่อผู้ที่ร่ำรวยที่สุด
  - จำเป็นสำหรับสังคมในการทำงาน
explanation: |
  Bastiat มองว่าการใช้จ่ายของภาครัฐเป็นแหล่งของความสิ้นเปลือง เพราะเงินที่ถูกยึดจากบุคคลมักถูกใช้อย่างไม่เหมาะสมโดยรัฐ
reviewed: false
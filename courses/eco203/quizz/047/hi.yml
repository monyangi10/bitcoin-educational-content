question: बस्तिया कैसे पूंजी संचय और मजदूरों की जीवन स्थितियों के बीच संबंध स्थापित करते हैं?
answer: उत्पादन में वृद्धि से कीमतों में कमी और मजदूरी में वृद्धि होती है।
wrong_answers:
  - पूंजी से सामाजिक प्रोजेक्ट्स को फंड मिलता है और सार्वजनिक सेवाओं में सुधार होता है।
  - मजदूर खुद ही पूँजीपति बन जाते हैं और मुनाफ़ा बाँटते हैं।
  - पूंजी से मालिकों पर निर्भरता कम होती है।
explanation: |
  बास्तियात का तर्क है कि पूंजी का संचय उत्पादन बढ़ाता है, जिससे कीमतें कम होती हैं और मजदूरी बढ़ती है, जिससे जीवन स्तर में सुधार होता है।

question: Как Бастиа установява връзката между натрупването на капитал и условията на живот на работниците?
answer: Увеличаването на производството води до намаляване на цените и увеличаване на заплатите.
wrong_answers:
  - Капиталът дава възможност за финансиране на социални проекти и подобряване на обществените услуги.
  - Самите работници стават капиталисти и си поделят печалбите.
  - Капиталът позволява да се намали зависимостта от работодателите.
explanation: |
  Бастиа твърди, че натрупването на капитал увеличава производството, което води до намаляване на цените и увеличаване на заплатите, като по този начин подобрява условията на живот.
reviewed: false
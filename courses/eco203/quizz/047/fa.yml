question: باستیا چگونه ارتباط بین انباشت سرمایه و شرایط زندگی کارگران را برقرار می‌کند؟
answer: افزایش تولید منجر به کاهش قیمت‌ها و افزایش دستمزدها می‌شود.
wrong_answers:
  - سرمایه امکان تأمین مالی پروژه‌های اجتماعی و بهبود خدمات عمومی را فراهم می‌کند.
  - کارگران خود به سرمایه‌داران تبدیل می‌شوند و در سود سهیم می‌شوند.
  - سرمایه امکان کاهش وابستگی به کارفرمایان را فراهم می‌کند.
explanation: |
  باستیا استدلال می‌کند که انباشت سرمایه تولید را افزایش می‌دهد، که منجر به کاهش قیمت‌ها و افزایش دستمزدها می‌شود و در نتیجه شرایط زندگی را بهبود می‌بخشد.
reviewed: false
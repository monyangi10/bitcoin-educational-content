question: บาสเตียตสร้างความเชื่อมโยงระหว่างการสะสมทุนและสภาพความเป็นอยู่ของแรงงานอย่างไร?
answer: การเพิ่มขึ้นของการผลิตนำไปสู่การลดลงของราคาและการเพิ่มขึ้นของค่าจ้าง
wrong_answers:
  - เงินทุนช่วยให้สามารถจัดหาเงินทุนสำหรับโครงการสังคมและการปรับปรุงบริการสาธารณะ
  - คนงานเองกลายเป็นนายทุนและแบ่งปันผลกำไร
  - ทุนช่วยลดการพึ่งพานายจ้าง
explanation: |
  บาสเตียตให้เหตุผลว่าการสะสมทุนเพิ่มการผลิต ซึ่งนำไปสู่การลดลงของราคาและการเพิ่มขึ้นของค่าจ้าง จึงปรับปรุงสภาพความเป็นอยู่ให้ดีขึ้น
reviewed: false
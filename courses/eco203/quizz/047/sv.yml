question: Hur gör Bastiat kopplingen mellan kapitalackumulation och arbetarnas levnadsvillkor?
answer: Den ökade produktionen leder till att priserna sjunker och lönerna stiger.
wrong_answers:
  - Kapitalet gör det möjligt att finansiera sociala projekt och förbättra offentliga tjänster.
  - Arbetarna blir själva kapitalister och delar på vinsten.
  - Kapitalet gör det möjligt att minska beroendet av arbetsgivarna.
explanation: |
  Bastiat menar att kapitalackumulationen ökar produktionen, vilket leder till sänkta priser och höjda löner och därmed förbättrade levnadsvillkor.

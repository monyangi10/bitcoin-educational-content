question: Hoe legt Bastiat het verband tussen kapitaalaccumulatie en de levensomstandigheden van arbeiders?
answer: De productiestijging leidt tot een daling van de prijzen en een stijging van de lonen.
wrong_answers:
  - Kapitaal maakt de financiering van sociale projecten en de verbetering van openbare diensten mogelijk.
  - Arbeiders worden zelf kapitalisten en delen in de winst.
  - Met kapitaal kan de afhankelijkheid van werkgevers worden verminderd.
explanation: |
  Bastiat stelt dat de accumulatie van kapitaal de productie verhoogt, wat leidt tot een daling van de prijzen en een stijging van de lonen, waardoor de levensomstandigheden verbeteren.
reviewed: false
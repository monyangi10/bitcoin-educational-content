question: Bastiat sermaye birikimi ile işçilerin yaşam koşulları arasındaki bağlantıyı nasıl kuruyor?
answer: Üretimdeki artış fiyatlarda düşüşe ve ücretlerde artışa yol açar.
wrong_answers:
  - Sermaye, sosyal projelerin finanse edilmesini ve kamu hizmetlerinin iyileştirilmesini sağlar.
  - İşçilerin kendileri kapitalist olur ve kârı paylaşırlar.
  - Sermaye, işverenlere olan bağımlılığın azalmasını sağlar.
explanation: |
  Bastiat, sermaye birikiminin üretimi artırdığını, bunun da fiyatlarda düşüşe ve ücretlerde artışa yol açarak yaşam koşullarını iyileştirdiğini savunur.

question: In welk populair economisch werk komt Henri Hazlitt terug op Bastiat's gebroken raam voorbeeld?
answer: Economie in één les
wrong_answers:
  - 49 Lessen in Economie
  - Freakonomics
  - De kunst van economie
explanation: |
  Henri Hazlitt gebruikt in Economics in One Lesson het voorbeeld van het gebroken raam om de verborgen gevolgen van economisch beleid te illustreren.
reviewed: false
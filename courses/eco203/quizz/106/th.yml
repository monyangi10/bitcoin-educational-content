question: ในงานเศรษฐศาสตร์ยอดนิยมใดที่ Henri Hazlitt กลับไปพิจารณาตัวอย่างหน้าต่างแตกของ Bastiat?
answer: เศรษฐศาสตร์ในบทเรียนเดียว
wrong_answers:
  - 49 บทเรียนในเศรษฐศาสตร์
  - Freakonomics
  - ศิลปะแห่งเศรษฐศาสตร์
explanation: |
  อองรี ฮาซลิตต์ ในหนังสือ Economics in One Lesson ใช้ตัวอย่างหน้าต่างที่แตกเพื่อแสดงให้เห็นถึงผลที่ตามมาที่ซ่อนอยู่ของนโยบายทางเศรษฐกิจ

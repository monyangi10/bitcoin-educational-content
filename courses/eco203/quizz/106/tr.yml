question: Henri Hazlitt hangi popüler ekonomi eserinde Bastiat'nın kırık pencere örneğini yeniden ele almaktadır?
answer: Tek Derste Ekonomi
wrong_answers:
  - 49 Ekonomi Dersi
  - Freakonomics
  - Ekonomi Sanatı
explanation: |
  Henri Hazlitt, Bir Derste Ekonomi kitabında, ekonomi politikalarının gizli sonuçlarını göstermek için kırık pencere örneğini kullanır.

question: در کدام اثر اقتصادی محبوب، هنری هزلیت به مثال پنجره شکسته باستیا بازمی‌گردد؟
answer: اقتصاد در یک درس
wrong_answers:
  - ۴۹ درس در اقتصاد
  - فریکونومیکس
  - هنر اقتصاد
explanation: |
  هانری هزلت در کتاب "اقتصاد در یک درس"، از مثال پنجره شکسته برای نشان دادن پیامدهای پنهان سیاست‌های اقتصادی استفاده می‌کند.
reviewed: false
question: В кое популярно икономическо произведение Хенри Хазлит се връща към примера за счупения прозорец на Бастиа?
answer: Икономика в един урок
wrong_answers:
  - 49 урока по икономика
  - Freakonomics
  - Изкуството на икономиката
explanation: |
  В книгата си "Икономика в един урок" Хенри Хазлит използва примера със счупения прозорец, за да илюстрира скритите последици от икономическите политики.
reviewed: false
question: ข้อผิดพลาดหลักที่บาสเตียตประณามใน "What Is Seen and What Is Not Seen" คืออะไร?
answer: การทำลายกระตุ้นเศรษฐกิจ
wrong_answers:
  - การทำลายล้างเป็นความโชคร้าย
  - มีเพียงช่างกระจกเท่านั้นที่ได้ประโยชน์จากหน้าต่างที่แตก
  - อุบัติเหตุควรหลีกเลี่ยง
explanation: |
  บาสเตียตวิจารณ์ความเข้าใจผิดที่ว่าการทำลายล้างจะมีผลดีต่อเศรษฐกิจโดยการกระตุ้นเศรษฐกิจ โดยแสดงให้เห็นแทนว่ามันส่งผลให้เกิดการสูญเสียความมั่งคั่งสุทธิ
reviewed: false
question: اشتباه اصلی که بستیات در "آنچه دیده می‌شود و آنچه دیده نمی‌شود" محکوم می‌کند چیست؟
answer: تخریب اقتصاد را تحریک می‌کند
wrong_answers:
  - ویرانی یک بدبختی است
  - فقط شیشه‌بران از پنجره‌های شکسته سود می‌برند
  - باید از حوادث جلوگیری شود
explanation: |
  باستیا این مغالطه را که تخریب می‌تواند با تحریک اقتصاد اثرات اقتصادی مفیدی داشته باشد، نقد می‌کند و در عوض نشان می‌دهد که این امر منجر به کاهش خالص ثروت می‌شود.
reviewed: false
question: बास्टियाट ने 'व्हाट इज़ सीन एंड व्हाट इज़ नॉट सीन' में किस मुख्य भ्रांति की निंदा की है?
answer: विनाश अर्थव्यवस्था को उत्तेजित करता है
wrong_answers:
  - विनाश एक दुर्भाग्य है
  - टूटी खिड़कियों से केवल ग्लेज़ियरों को ही लाभ होता है
  - दुर्घटनाओं से बचना चाहिए
explanation: |
  बास्टियाट इस भ्रांति की आलोचना करते हैं कि विनाश से अर्थव्यवस्था को प्रोत्साहन मिलने से आर्थिक लाभ होगा, जबकि इसके विपरीत वे बताते हैं कि इससे धन की शुद्ध हानि होती है।
reviewed: false
question: Vilken är den viktigaste villfarelsen som Bastiat kritiserar i Vad man ser och vad man inte ser?
answer: Destruktion stimulerar ekonomin
wrong_answers:
  - Förstörelse är en olycka
  - Endast glasmästare tjänar på trasiga fönster
  - Olyckor bör undvikas
explanation: |
  Bastiat kritiserar felslutet att förstörelse skulle ha positiva ekonomiska effekter genom att stimulera ekonomin och visar istället att det leder till en nettoförlust av rikedom.

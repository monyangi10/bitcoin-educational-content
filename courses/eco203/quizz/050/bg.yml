question: Коя е основната заблуда, осъждана от Бастиа в "Какво се вижда и какво не се вижда"?
answer: Разрушаването стимулира икономиката
wrong_answers:
  - Унищожаването е нещастие
  - От счупените прозорци печелят само стъкларите
  - Трябва да се избягват инциденти
explanation: |
  Бастиа критикува заблудата, че разрушаването би имало благоприятен икономически ефект чрез стимулиране на икономиката, като вместо това показва, че то води до нетна загуба на богатство.
reviewed: false
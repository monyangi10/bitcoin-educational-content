question: نقطه مشترک بین حمایت‌گرایان و سوسیالیست‌ها از نظر بَستیا چیست؟
answer: آنها هر دو می‌خواهند بهره‌برداری از بخشی از جمعیت را ترجیح دهند.
wrong_answers:
  - آنها هر دو از آزادی اقتصادی دفاع می‌کنند
  - هر دوی آن‌ها آرزوی برابری اجتماعی بیشتر دارند.
  - هر دوی آنها با مداخله دولت در اقتصاد مخالف هستند.
explanation: |
  باستیا هر دو ایدئولوژی را به خاطر تمایلشان به ترجیح بهره‌کشی یک طبقه توسط طبقه دیگر، به زیان منافع عمومی، مورد انتقاد قرار می‌دهد.
reviewed: false
question: Wat is het gemeenschappelijke punt tussen protectionisten en socialisten volgens Bastiat?
answer: Ze willen allebei de uitbuiting van een deel van de bevolking bevorderen
wrong_answers:
  - Ze verdedigen allebei economische vrijheid
  - Ze willen allebei meer sociale gelijkheid
  - Ze zijn allebei tegen staatsinterventie in de economie
explanation: |
  Bastiat bekritiseert beide ideologieën vanwege hun neiging om de uitbuiting van de ene klasse door de andere te bevorderen, ten koste van het algemeen belang.

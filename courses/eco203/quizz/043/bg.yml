question: Какво е общото между протекционистите и социалистите според Бастиа?
answer: И двамата искат да насърчат експлоатацията на част от населението
wrong_answers:
  - И двамата защитават икономическата свобода
  - И двамата желаят по-голямо социално равенство
  - И двамата се противопоставят на държавната намеса в икономиката
explanation: |
  Бастиа критикува и двете идеологии заради тенденцията им да благоприятстват експлоатацията на една класа от друга в ущърб на общия интерес.

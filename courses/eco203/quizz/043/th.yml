question: จุดร่วมที่พบได้ระหว่างผู้สนับสนุนการคุ้มครองและสังคมนิยมตามที่บาสเตียตกล่าวคืออะไร?
answer: พวกเขาทั้งสองต้องการสนับสนุนการแสวงหาประโยชน์จากประชากรบางส่วน
wrong_answers:
  - พวกเขาทั้งสองปกป้องเสรีภาพทางเศรษฐกิจ
  - พวกเขาทั้งสองปรารถนาความเท่าเทียมทางสังคมที่มากขึ้น
  - พวกเขาทั้งสองต่างคัดค้านการแทรกแซงของรัฐในเศรษฐกิจ
explanation: |
  บาสเตียตวิจารณ์ทั้งสองอุดมการณ์ในเรื่องแนวโน้มที่จะสนับสนุนการแสวงหาประโยชน์จากชนชั้นหนึ่งโดยอีกชนชั้นหนึ่ง ซึ่งเป็นผลเสียต่อผลประโยชน์ทั่วไป
reviewed: false
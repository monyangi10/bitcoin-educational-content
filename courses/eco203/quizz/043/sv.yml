question: Vilken är den gemensamma punkten mellan protektionister och socialister enligt Bastiat?
answer: De vill båda gynna exploateringen av en del av befolkningen
wrong_answers:
  - De försvarar båda ekonomisk frihet
  - De vill båda ha större social jämlikhet
  - De är båda motståndare till statlig inblandning i ekonomin
explanation: |
  Bastiat kritiserar båda ideologierna för deras tendens att gynna exploateringen av en klass av en annan, till förfång för det allmänna intresset.

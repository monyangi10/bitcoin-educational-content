question: โรงเรียนแห่งความคิดในศตวรรษที่ยี่สิบใดที่ Bastiat เป็นผู้บุกเบิก?
answer: ทฤษฎีการเลือกของสาธารณะ
wrong_answers:
  - ทฤษฎีการเติบโตภายใน
  - ทฤษฎีความไม่สมดุล
  - สำนักเศรษฐศาสตร์นีโอคลาสสิก
explanation: |
  บาสเตียทคาดการณ์แนวคิดของการเลือกสาธารณะ โดยแสดงให้เห็นว่ากลุ่มผลประโยชน์มีอิทธิพลต่อรัฐเพื่อให้ได้มาซึ่งสิทธิพิเศษโดยเสียค่าใช้จ่ายของผู้อื่น
reviewed: false
question: کدام مکتب فکری قرن بیستم را باستیا پیش‌بینی می‌کند؟
answer: نظریه انتخاب عمومی
wrong_answers:
  - نظریه رشد درون‌زا
  - نظریه عدم تعادل
  - مکتب نئوکلاسیک اقتصاد
explanation: |
  باستیا ایده‌های انتخاب عمومی را پیش‌بینی کرد و نشان داد که چگونه گروه‌های ذی‌نفع بر دولت تأثیر می‌گذارند تا امتیازاتی را به هزینه دیگران به دست آورند.
reviewed: false
question: Коя мисловна школа на ХХ век предшества Бастиа?
answer: Теория на обществения избор
wrong_answers:
  - Теория на ендогенния растеж
  - Теория на неравновесието
  - Неокласическата икономическа школа
explanation: |
  Бастиа изпреварва идеите на "Обществения избор", показвайки как групите по интереси влияят на държавата, за да получат привилегии за сметка на другите.
reviewed: true

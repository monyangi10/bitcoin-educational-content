question: बीसवीं सदी के किस विचारधारा वाले स्कूल को बास्टिएट ने पहले से ही दिखा दिया था?
answer: जनता का चुनाव सिद्धांत
wrong_answers:
  - अंतर्जात विकास सिद्धांत
  - असंतुलन सिद्धांत
  - अर्थशास्त्र का नव-शास्त्रीय (नियोक्लासिकल) स्कूल
explanation: |
  बास्तियात ने पब्लिक चॉइस के विचारों को पहले ही भांप लिया था, यह दिखाते हुए कि कैसे हित समूह दूसरों की कीमत पर विशेषाधिकार हासिल करने के लिए राज्य को प्रभावित करते हैं।
reviewed: false
question: Którą dwudziestowieczną szkołę myślową prefiguruje Bastiat?
answer: Teoria wyboru publicznego
wrong_answers:
  - Teoria wzrostu endogenicznego
  - Teoria nierównowagi
  - Neoklasyczna szkoła ekonomii
explanation: |
  Bastiat antycypował idee Public Choice, pokazując, w jaki sposób grupy interesu wpływają na państwo, aby uzyskać przywileje kosztem innych.

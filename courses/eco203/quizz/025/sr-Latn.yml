question: Koji je bio glavni cilj Engleske lige 1838. godine?
answer: Borba protiv zakona o kukuruzu
wrong_answers:
  - Borba protiv velikih zemljoposednika
  - PromocijA poljoprivrednih radnika
  - Borba protiv stranih trgovaca
explanation: |
  Engleska liga, inspirisana Ričardom Kobdenom, imala je za cilj ukidanje protekcionističkih zakona o žitu kako bi se promovisala slobodna trgovina i smanjilo siromaštvo.

question: Wat was het belangrijkste doel van de Engelse Liga in 1838?
answer: Tegen de maïswetten
wrong_answers:
  - Tegen de grootgrondbezitters
  - Voor de promotie van landarbeiders
  - Tegen buitenlandse kooplieden
explanation: |
  De English League, geïnspireerd door Richard Cobden, wilde de protectionistische maïswetten afschaffen om de vrije handel te bevorderen en de armoede te verminderen.
reviewed: false
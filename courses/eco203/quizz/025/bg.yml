question: Каква е основната цел на Английската лига през 1838 г.?
answer: Срещу законите за царевицата
wrong_answers:
  - Срещу големите собственици на земя
  - За насърчаване на селскостопанските работници
  - Срещу чуждестранни търговци
explanation: |
  Английската лига, вдъхновена от Ричард Кобдън, има за цел да премахне протекционистичните закони за царевицата, за да насърчи свободната търговия и да намали бедността.
reviewed: false
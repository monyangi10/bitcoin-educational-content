question: Lengo kuu la Ligi ya Kiingereza mnamo 1838 lilikuwa lipi?
answer: Kinyume na sheria za mahindi
wrong_answers:
  - Dhidi ya wamiliki wa ardhi kubwa
  - Kwa ajili ya kukuza wafanyakazi wa kilimo
  - Dhidi ya wafanyabiashara wa kigeni
explanation: |
  Ligi ya Uingereza, iliyoongozwa na Richard Cobden, ililenga kukomesha sheria za mahindi za kulinda ili kukuza biashara huria na kupunguza umaskini.

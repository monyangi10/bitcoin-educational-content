question: هدف اصلی لیگ انگلیسی در سال 1838 چه بود؟
answer: علیه قوانین ذرت
wrong_answers:
  - علیه مالکان بزرگ زمین
  - برای ارتقاء کارگران کشاورزی
  - علیه بازرگانان خارجی
explanation: |
  لیگ انگلیسی، با الهام از ریچارد کوبدن، هدف داشت تا قوانین حمایتی ذرت را لغو کند تا تجارت آزاد را ترویج دهد و فقر را کاهش دهد.
reviewed: false
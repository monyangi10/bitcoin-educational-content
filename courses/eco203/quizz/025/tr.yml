question: 1838'de İngiliz Birliği'nin ana hedefi neydi?
answer: Mısır yasalarına karşı
wrong_answers:
  - Büyük toprak sahiplerine karşı
  - Tarım işçilerinin teşviki için
  - Yabancı tüccarlara karşı
explanation: |
  Richard Cobden'dan ilham alan İngiliz Birliği, serbest ticareti teşvik etmek ve yoksulluğu azaltmak için korumacı mısır yasalarını kaldırmayı amaçlıyordu.
reviewed: false
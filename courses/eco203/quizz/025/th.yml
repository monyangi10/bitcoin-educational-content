question: เป้าหมายหลักของ English League ในปี 1838 คืออะไร?
answer: ต่อต้านกฎหมายข้าวโพด
wrong_answers:
  - ต่อต้านเจ้าของที่ดินรายใหญ่
  - สำหรับการส่งเสริมคนงานเกษตรกรรม
  - ต่อต้านพ่อค้าต่างชาติ
explanation: |
  ลีกอังกฤษ ซึ่งได้รับแรงบันดาลใจจากริชาร์ด คอบเดน มุ่งหมายที่จะยกเลิกกฎหมายคุ้มครองข้าวโพดเพื่อส่งเสริมการค้าเสรีและลดความยากจน
reviewed: false
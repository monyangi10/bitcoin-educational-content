question: Ni igiki cari intumbero nyamukuru y’Ishirahamwe ry’Abongereza mu 1838?
answer: Kurwanya amategeko y'ibigori .
wrong_answers:
  - Ku ba nyen’amatongo manini .
  - Kubera uguteza imbere abakozi bo mu buhinzi .
  - Kurwanya abacuruzi bo mu mahanga .
explanation: |
  Ishirahamwe ry’Abongereza ryari rihumekewe na Richard Cobden, ryari rifise intumbero yo gukuraho amategeko y’ibigori y’abanyagihugu kugira ngo haboneke ubudandaji bwigenga no kugabanya ubukene.

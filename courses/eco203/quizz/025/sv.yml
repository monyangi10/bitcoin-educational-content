question: Vad var huvudmålet för English League 1838?
answer: Mot majslagarna
wrong_answers:
  - Mot de stora markägarna
  - För främjande av jordbruksarbetare
  - Mot utländska köpmän
explanation: |
  English League, som inspirerades av Richard Cobden, hade som mål att avskaffa de protektionistiska majslagarna för att främja frihandel och minska fattigdomen.
reviewed: false
question: बस्तिया संपत्ति की एक अच्छी परिभाषा को कैसे देखते हैं?
answer: इसे कारणों को ध्यान में रखना चाहिए
wrong_answers:
  - इसे प्रभावों को ध्यान में रखना होगा
  - इसे कानून को ध्यान में रखना चाहिए
  - इसे सामाजिक मान्यता पर आधारित होना चाहिए
explanation: |
  बस्तियत का मानना है कि संपत्ति को उसके कारणों, जैसे मेहनत और व्यक्तिगत प्रयास, के आधार पर परिभाषित किया जाना चाहिए, न कि सिर्फ एक कानूनी रचना के रूप में।
reviewed: false
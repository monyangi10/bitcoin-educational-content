question: Каква дефиниция на собствеността смята Бастиа за добра?
answer: Тя трябва да отчита причините
wrong_answers:
  - Тя трябва да отчита последиците
  - Той трябва да вземе предвид закона
  - То трябва да се основава на социално признание
explanation: |
  Бастиа вярва, че собствеността трябва да се определя въз основа на причините за нея, като например труда и личните усилия, а не само като правна конструкция.
reviewed: true

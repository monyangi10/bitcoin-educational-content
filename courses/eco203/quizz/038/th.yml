question: บาสเตียตพิจารณาคำนิยามของทรัพย์สินที่ดีอย่างไร?
answer: มันต้องคำนึงถึงสาเหตุ
wrong_answers:
  - จะต้องคำนึงถึงผลกระทบ
  - จะต้องคำนึงถึงกฎหมาย
  - มันต้องขึ้นอยู่กับการยอมรับทางสังคม
explanation: |
  Bastiat เชื่อว่าทรัพย์สินควรถูกกำหนดตามสาเหตุของมัน เช่น แรงงานและความพยายามส่วนบุคคล มากกว่าที่จะเป็นเพียงโครงสร้างทางกฎหมาย
reviewed: false
question: باستیا چگونه یک تعریف خوب از مالکیت را در نظر می‌گیرد؟
answer: باید علل را در نظر بگیرد
wrong_answers:
  - باید اثرات را در نظر بگیرد
  - باید قانون را در نظر بگیرد
  - باید بر اساس شناخت اجتماعی باشد
explanation: |
  باستیا معتقد است که مالکیت باید بر اساس علل آن، مانند کار و تلاش شخصی، تعریف شود و نه به عنوان یک ساختار قانونی صرف.
reviewed: false
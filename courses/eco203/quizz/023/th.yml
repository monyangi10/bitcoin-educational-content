question: ชนชั้นใดบ้างที่ขัดแย้งกันตามความเห็นของ Comte และ Dunoyer?
answer: ผู้ที่จ่ายภาษีและผู้ที่ใช้ชีวิตจากภาษีเหล่านั้น
wrong_answers:
  - คนงานและนายจ้าง
  - ชนชั้นกระฎุมพีและชนชั้นกรรมาชีพ
  - พ่อค้าและช่างฝีมือ
explanation: |
  Comte และ Dunoyer มองเห็นความขัดแย้งทางชนชั้นระหว่างผู้ผลิตที่ให้เงินทุนผ่านภาษี และผู้ที่ไม่ใช่ผู้ผลิตที่ได้รับประโยชน์จากภาษีเหล่านั้น
reviewed: false
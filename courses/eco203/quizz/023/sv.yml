question: Vilka är de olika klasserna i en konflikt enligt Comte och Dunoyer?
answer: De som betalar skatt och de som lever på den
wrong_answers:
  - Arbetstagarna och arbetsgivarna
  - Borgarklassen och proletärerna
  - Köpmännen och hantverkarna
explanation: |
  Comte och Dunoyer ser klasskonflikten mellan producenterna, som finansierar genom skatter, och icke-producenterna, som drar nytta av dem.
reviewed: false
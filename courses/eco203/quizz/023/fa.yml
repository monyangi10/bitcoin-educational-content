question: طبقات درگیر در تضاد طبق نظر کنت و دونویور کدامند؟
answer: کسانی که مالیات می‌پردازند و کسانی که از آن زندگی می‌کنند
wrong_answers:
  - کارگران و کارفرمایان
  - بورژوازی و پرولتاریا
  - بازرگانان و صنعتگران
explanation: |
  کنت و دونویور تضاد طبقاتی بین تولیدکنندگان که از طریق مالیات‌ها تأمین مالی می‌کنند و غیرتولیدکنندگان که از آن‌ها بهره‌مند می‌شوند را می‌بینند.
reviewed: false
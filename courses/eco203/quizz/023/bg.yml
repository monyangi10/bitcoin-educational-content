question: Кои са класите в конфликт според Конт и Дюноар?
answer: Тези, които плащат данъци, и тези, които живеят от тях
wrong_answers:
  - Работниците и работодателите
  - Буржоазията и пролетариите
  - Търговците и занаятчиите
explanation: |
  Конт и Дюноар виждат класовия конфликт между производителите, които финансират чрез данъците, и непроизводителите, които се възползват от тях.
reviewed: true

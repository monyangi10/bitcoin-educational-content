question: Wie waren de Ideologen die beïnvloed werden door Destutt de Tracy?
answer: Erfgenamen van de fysiocraten
wrong_answers:
  - Voorgangers van Marx
  - Volgelingen van de revolutionaire ideologie
  - Discipelen van Rousseau
explanation: |
  De Ideologen, een groep beïnvloed door Destutt de Tracy, worden beschouwd als erfgenamen van de Fysiocraten en pleiten voor een liberale economie.

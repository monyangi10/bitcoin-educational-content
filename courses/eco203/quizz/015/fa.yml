question: ایدئولوگ‌هایی که تحت تأثیر دستوت دو تراسی بودند چه کسانی بودند؟
answer: وارثان فیزیوکرات‌ها
wrong_answers:
  - پیشگامان مارکس
  - پیروان ایدئولوژی انقلابی
  - مریدان روسو
explanation: |
  ایدئولوگ‌ها، گروهی تحت تأثیر دستوت دو تراسی، به عنوان وارثان فیزیوکرات‌ها در نظر گرفته می‌شوند که از اقتصاد لیبرال حمایت می‌کنند.
reviewed: false
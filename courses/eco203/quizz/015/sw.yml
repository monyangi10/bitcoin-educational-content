question: Je, Wanaitikadi walioshawishiwa na Destutt de Tracy walikuwa akina nani?
answer: Warithi wa Physiocrats
wrong_answers:
  - Watangulizi wa Marx
  - Wafuasi wa itikadi ya mapinduzi
  - Wanafunzi wa Rousseau
explanation: |
  The Ideologues, kundi lililoathiriwa na Destutt de Tracy, wanachukuliwa kuwa warithi wa Fiziokrati, wakitetea uchumi huria.
reviewed: false

question: Кои са идеолозите, повлияни от Дестют дьо Траси?
answer: Наследници на физиократите
wrong_answers:
  - Предшественици на Маркс
  - Последователи на революционната идеология
  - Учениците на Русо
explanation: |
  Идеолозите, група, повлияна от Дестют дьо Траси, се смятат за наследници на физиократите и се застъпват за либерална икономика.
reviewed: false
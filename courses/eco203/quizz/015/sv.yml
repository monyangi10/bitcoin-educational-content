question: Vilka var de ideologer som påverkades av Destutt de Tracy?
answer: Fysiokraternas arvtagare
wrong_answers:
  - Föregångare till Marx
  - Anhängare av den revolutionära ideologin
  - Rousseaus lärjungar
explanation: |
  Ideologerna, en grupp som influerades av Destutt de Tracy, anses vara fysiokraternas arvtagare och förespråkar en liberal ekonomi.

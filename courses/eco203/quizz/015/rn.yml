question: None Abanyavyiyumviro Destutt de Tracy bari bande?
answer: Abazungu b'abanyafiziyokarate
wrong_answers:
  - Ababanjirije Marx
  - Abayoboke b'ingengabitekerezo y'ihinduka
  - Abigishwa ba Rousseau
explanation: |
  Aba Ideologues, ni umugwi wakozweko na Destutt de Tracy, bafatwa nk’abazungu b’aba Physiocrates, bavuganira ubutunzi bw’ubwigenge.

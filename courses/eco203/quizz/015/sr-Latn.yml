question: Ko su bili ideolozi pod uticajem Destutt de Tracy-ja?
answer: Naslednici fiziokrata
wrong_answers:
  - Prekursori Marxa
  - Pristalice revolucionarne ideologije
  - Učenici Rousseau-a
explanation: |
  Ideolozi, grupa pod uticajem Destutt de Tracy-ja, smatraju se naslednicima fiziokrata, zalažući se za liberalnu ekonomiju.

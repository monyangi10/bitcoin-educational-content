question: تعریف مالکیت در لاتین طبق نظر رومیان چه بود؟
answer: حق استفاده و سوءاستفاده
wrong_answers:
  - قانون خاص بر قانون عام تقدم دارد
  - خدمات عمومی باید بر قراردادهای خصوصی ترجیح داده شوند.
  - جمهوری و خصوصی باید جدا شوند
explanation: |
  در قانون روم، jus utendi et abutendi مالکیت را به عنوان حق استفاده و سوءاستفاده تعریف می‌کند و بر استفاده تأکید می‌کند بدون اینکه به علل آن بپردازد.
reviewed: false
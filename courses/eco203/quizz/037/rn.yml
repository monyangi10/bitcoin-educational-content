question: None insobanuro y’itunga yari iyihe mu kilatini nk’uko Abaroma babivuga?
answer: Ubutungane n'ubufasha
wrong_answers:
  - Itegeko ry'umwihariko ryakurwako itegeko rusangi
  - Ibikorwa vya Leta ni amasezerano y'abantu ku giti cabo
  - Igitabu ca bose n'ivy'abantu ku giti cabo biratandukanye
explanation: |
  Mu mategeko y’Abaroma, jus utendi et abutendi isobanura umutungo nk’uburenganzira bwo gukoresha no gukoresha nabi, igashimika ku gukoresha ataco yinjiye mu mpamvu zayo.

question: นิยามของทรัพย์สินในภาษาละตินตามที่ชาวโรมันคืออะไร?
answer: สิทธิในการใช้และการใช้ในทางที่ผิด
wrong_answers:
  - กฎหมายเฉพาะย่อมลบล้างกฎหมายทั่วไป
  - สาธารณูปโภคควรได้รับการพิจารณาเหนือกว่าสัญญาส่วนตัว
  - สาธารณะและส่วนตัวต้องแยกออกจากกัน
explanation: |
  ในกฎหมายโรมัน, jus utendi et abutendi กำหนดทรัพย์สินว่าเป็นสิทธิในการใช้และทำลาย, โดยเน้นการใช้โดยไม่เจาะลึกถึงสาเหตุของมัน.
reviewed: false
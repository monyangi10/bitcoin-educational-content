question: ローマ人によると、ラテン語で財産の定義は何でしたか？
answer: Jus utendi et abutendi
wrong_answers:
  - Lex specialis derogat legi generali
  - Utilitas publica praeferenda est privatorum contractibus
  - Res publica et privatus separanda est
explanation: |
  ローマ法では、「jus utendi et abutendi」は財産を自由に使い、収益を得て、さらには破壊（濫用）する権利と定義しており、その原因に踏み込むことなく使用を強調しています。
reviewed: false

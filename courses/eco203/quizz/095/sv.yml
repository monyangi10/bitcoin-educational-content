question: Vilka är de naturliga antropologiska grunderna för rätten enligt Bastiat?
answer: Liv, frihet och egendom.
wrong_answers:
  - Makt, ojämlikhet och dominans.
  - Frihet, jämlikhet och broderskap.
  - Rättvisa, auktoritet och broderskap.
explanation: |
  Bastiat definierar de naturliga grunderna för lagen som liv, frihet och egendom, tre Elements som existerar före all mänsklig lagstiftning och som utgör grunden för naturliga rättigheter.
reviewed: false
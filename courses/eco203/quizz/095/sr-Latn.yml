question: Koji su prirodni antropološki temelji prava prema Bastiat-u?
answer: Život, sloboda i imovina.
wrong_answers:
  - Moć, nejednakost i dominacija.
  - Sloboda, jednakost i bratstvo.
  - Pravda, autoritet i bratstvo.
explanation: |
  Bastiat definiše prirodne osnove zakona kao život, slobodu i imovinu, tri elementa koja postoje pre bilo kakvog ljudskog zakonodavstva i čine osnovu prirodnih prava.
reviewed: false

question: پایه‌های انسان‌شناختی طبیعی قانون از نظر بَستیات چیست؟
answer: زندگی، آزادی، و مالکیت.
wrong_answers:
  - قدرت، نابرابری، و سلطه.
  - آزادی، برابری، و برادری.
  - عدالت، اقتدار، و برادری.
explanation: |
  باستیا مبانی طبیعی قانون را به عنوان زندگی، آزادی و مالکیت تعریف می‌کند، سه Elements که پیش از هر قانون‌گذاری انسانی وجود دارند و پایه‌های حقوق طبیعی را تشکیل می‌دهند.
reviewed: false
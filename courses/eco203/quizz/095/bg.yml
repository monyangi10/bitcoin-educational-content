question: Какви са естествените антропологични основи на правото според Бастиа?
answer: Живот, свобода и собственост.
wrong_answers:
  - Власт, неравенство и господство.
  - Свобода, равенство и братство.
  - Справедливост, авторитет и братство.
explanation: |
  Бастиа определя естествените основи на правото като живот, свобода и собственост - три елемента, които съществуват преди всяко човешко законодателство и представляват основата на естествените права.

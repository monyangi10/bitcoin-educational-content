question: รากฐานทางมานุษยวิทยาธรรมชาติของกฎหมายตาม Bastiat คืออะไร?
answer: ชีวิต เสรีภาพ และทรัพย์สิน
wrong_answers:
  - อำนาจ, ความไม่เท่าเทียม, และการครอบงำ.
  - เสรีภาพ ความเสมอภาค และภราดรภาพ
  - ความยุติธรรม อำนาจ และภราดรภาพ
explanation: |
  Bastiat กำหนดรากฐานตามธรรมชาติของกฎหมายว่าเป็นชีวิต เสรีภาพ และทรัพย์สิน ซึ่งเป็นองค์ประกอบสามประการที่มีอยู่ก่อนกฎหมายมนุษย์ใด ๆ และเป็นรากฐานของสิทธิตามธรรมชาติ
reviewed: false
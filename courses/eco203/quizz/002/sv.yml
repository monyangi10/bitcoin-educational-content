question: Vad betyder begreppet politisk marknad för Frédéric Bastiat?
answer: Att avhända sig någon annans egendom enligt lag
wrong_answers:
  - Åker och shoppar
  - Vinnande primärval
  - Köp av offentliga tjänster
explanation: |
  Med den politiska marknaden avser Bastiat statens tendens att genom lagstiftning förfoga över andras egendom, ett fenomen som han kritiserar för att vara laglig plundring.
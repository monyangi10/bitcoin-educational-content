question: Какво означава терминът "политически пазар" за Фредерик Бастиа?
answer: Разпореждане с чужда собственост по закон
wrong_answers:
  - Пазаруване
  - Спечелване на първичните избори
  - Закупуване на обществени услуги
explanation: |
  Политическият пазар за Бастиа се отнася до склонността на държавата да се разпорежда с чуждата собственост чрез законодателни средства - явление, което той критикува като законен грабеж.
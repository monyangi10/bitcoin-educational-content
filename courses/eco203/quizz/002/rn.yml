question: Ijambo isoko rya politike risobanura iki kuri Frédéric Bastiat?
answer: Gutanga ivy'uwundi muntu hakurikijwe itegeko
wrong_answers:
  - Kuja gusuma
  - Gutsinda amatora ya mbere
  - Gugura ibikorwa vya Leta
explanation: |
  Isoko rya politike kuri Bastiat ryerekeza ku mpengamiro Leta ifise yo gutanga itunga ry’abandi biciye mu buryo bw’amategeko, ikintu anegura ko ari ugusahura bitegekanijwe n’amategeko.
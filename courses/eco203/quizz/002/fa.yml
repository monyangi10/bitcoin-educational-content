question: اصطلاح بازار سیاسی برای فردریک باستیا به چه معناست؟
answer: واگذاری اموال شخص دیگری طبق قانون
wrong_answers:
  - رفتن به خرید
  - پیروزی در مقدماتی‌ها
  - خرید خدمات عمومی
explanation: |
  بازار سیاسی برای بَستیا به تمایل دولت برای تصرف اموال دیگران از طریق ابزارهای قانونی اشاره دارد، پدیده‌ای که او به عنوان غارت قانونی مورد انتقاد قرار می‌دهد.
question: คำว่า ตลาดการเมือง หมายถึงอะไรสำหรับ Frédéric Bastiat?
answer: กำจัดทรัพย์สินของผู้อื่นตามกฎหมาย
wrong_answers:
  - ไปช้อปปิ้ง
  - ชนะการเลือกตั้งขั้นต้น
  - การซื้อบริการสาธารณะ
explanation: |
  ตลาดการเมืองสำหรับบาสเตียตหมายถึงแนวโน้มของรัฐที่จะจัดการทรัพย์สินของผู้อื่นผ่านวิธีการทางกฎหมาย ซึ่งเป็นปรากฏการณ์ที่เขาวิจารณ์ว่าเป็นการปล้นที่ถูกกฎหมาย
question: Šta termin političko tržište znači za Frédéric-a Bastiat-a?
answer: Da zakonski raspolažete tuđom imovinom
wrong_answers:
  - Odlazak u kupovinu
  - Pobedničke primarne izbore
  - Kupovina javnih usluga
explanation: |
  Političko tržište za Bastiat-a odnosi se na sklonost države da raspolaže tuđom imovinom putem zakonodavnih sredstava, fenomen koji on kritikuje kao legalnu pljačku.
reviewed: true

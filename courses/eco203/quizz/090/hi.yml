question: बस्तिया के अनुसार, संपत्ति का अधिकार और आज़ादी एक-दूसरे से क्यों अलग नहीं हो सकते?
answer: क्योंकि वह संपत्ति के अधिकार को इस तरह परिभाषित करता है कि इसमें पहले अपने व्यक्ति पर, फिर अपने श्रम पर, और अंत में, अपने श्रम के उत्पादों पर स्वतंत्रता से निपटने की आज़ादी शामिल है।
wrong_answers:
  - क्योंकि उसे दोनों के बीच एक विश्लेषणात्मक अंतर स्थापित करने में दिक्कत होती है
  - क्योंकि दोनों ही विधायक की इच्छा से उत्पन्न होते हैं
  - क्योंकि संपत्ति का अधिकार राजनीतिक अधिकारों का ही विस्तार है
explanation: |
  बास्तियत का मानना है कि संपत्ति स्वतंत्रता से जुड़ी हुई है क्योंकि इसमें खुद पर, अपने श्रम पर और अपने श्रम के फलों पर स्वतंत्र रूप से निर्णय लेने की क्षमता शामिल होती है।
question: 바스티아트에 따르면 재산권과 자유는 왜 분리될 수 없는 것일까요?
answer: 그는 재산권을 먼저 자신의 인격, 그다음 자신의 노동력, 마지막으로 자신의 노동의 산물을 처분할 수 있는 자유로 구성된다고 정의했기 때문입니다.
wrong_answers:
  - 이 둘을 분석적으로 구분하는 데 어려움을 겪고 있기 때문입니다
  - 둘 다 입법자의 의지에서 비롯된 것이기 때문입니다
  - 재산권은 정치적 권리의 연장선상에 있기 때문입니다
explanation: |
  바스티앙은 재산이 자신과 노동력, 노동의 결실을 자유롭게 처분할 수 있는 능력을 포함하기 때문에 자유와 연결된다고 생각합니다.
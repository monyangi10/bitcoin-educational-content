question: Защо, според Бастиа, правото на собственост и свободата са неразделни?
answer: Защото той определя правото на собственост като състоящо се от свободата да се разпореждаш първо със собствената си личност, след това с труда си и накрая с продуктите на труда си.
wrong_answers:
  - Тъй като той се опитва да установи аналитично разграничение между двете
  - Защото и двете произтичат от волята на законодателя
  - Тъй като правото на собственост е продължение на политическите права
explanation: |
  Бастиа смята, че собствеността е свързана със свободата, тъй като тя включва способността да се разпореждаш свободно със себе си, с труда си и с плодовете на труда си.
reviewed: true

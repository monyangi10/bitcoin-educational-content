question: Dlaczego, według Bastiata, prawo własności i wolność są nierozłączne?
answer: Ponieważ definiuje on prawo własności jako składające się ze swobody dysponowania najpierw własną osobą, następnie swoją pracą, a na końcu produktami swojej pracy.
wrong_answers:
  - Ponieważ stara się on ustanowić analityczne rozróżnienie między nimi
  - Ponieważ oba wynikają z woli ustawodawcy
  - Ponieważ prawo własności jest rozszerzeniem praw politycznych
explanation: |
  Bastiat uważa, że własność jest powiązana z wolnością, ponieważ obejmuje zdolność do swobodnego dysponowania sobą, swoją pracą i owocami swojej pracy.
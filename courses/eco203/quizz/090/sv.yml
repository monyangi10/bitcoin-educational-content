question: Varför är äganderätten och friheten enligt Bastiat oskiljaktiga?
answer: Han definierar nämligen äganderätten som friheten att först förfoga över sin egen person, sedan över sitt arbete och slutligen över produkterna av sitt arbete.
wrong_answers:
  - Eftersom han har svårt att göra en analytisk åtskillnad mellan de två
  - Eftersom båda härrör från lagstiftarens vilja
  - Eftersom äganderätten är en förlängning av de politiska rättigheterna
explanation: |
  Bastiat anser att egendom är kopplat till frihet eftersom det omfattar förmågan att fritt förfoga över sig själv, sitt arbete och frukterna av sitt arbete.
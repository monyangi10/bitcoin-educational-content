question: Zašto su, prema Bastiat-u, pravo na imovinu i sloboda nerazdvojni?
answer: Jer on definiše pravo na imovinu kao slobodu da se prvo raspolaže sopstvenom osobom, zatim svojim radom, i na kraju, proizvodima svog rada.
wrong_answers:
  - Zato što se bori da uspostavi analitičku razliku između to dvoje
  - Jer obe potiču iz volje zakonodavca
  - Jer pravo na imovinu je produžetak političkih prava
explanation: |
  Bastiat smatra da je svojina povezana sa slobodom jer obuhvata sposobnost slobodnog raspolaganja sobom, svojim radom i plodovima svog rada.
reviewed: true

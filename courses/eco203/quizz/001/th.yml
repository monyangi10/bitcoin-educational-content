question: บุคคลใดที่มีอิทธิพลอย่างเด็ดขาดต่อบาสเตียในแนวคิดการค้าเสรีของเขา?
answer: ริชาร์ด คอบเดน
wrong_answers:
  - อัลฟองส์ เดอ ลามาร์ตีน
  - อัลแบร์ เดอ มุน
  - เบนจามิน คอนสแตนต์
explanation: |
  Richard Cobden ผู้นำของขบวนการการค้าเสรี ได้สร้างแรงบันดาลใจให้กับ Bastiat ในแนวคิดเสรีนิยมทางเศรษฐกิจของเขา
reviewed: false
question: Ni mtu yupi alikuwa na ushawishi mkubwa kwa Bastiat katika mawazo yake ya biashara huria?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Richard Cobden, kiongozi wa vuguvugu la biashara huria, alimtia moyo Bastiat katika mawazo yake ya uliberali wa kiuchumi.
reviewed: false

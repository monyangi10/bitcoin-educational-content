question: Ni uwuhe muntu yari afise akosho kanini kuri Bastiat mu vyiyumviro vyiwe vy’ubudandaji bw’ubuntu?
answer: Richard Cobden
wrong_answers:
  - Alfonsi de Lamartini
  - Alburi de Mun
  - Benyamini Uhoraho
explanation: |
  Richard Cobden, umurongozi w’umuhari w’ubudandaji bwigenga, ni we yatumye Bastiat agira ivyiyumviro vyiwe vy’ukwidegemvya mu vy’ubutunzi.
reviewed: false
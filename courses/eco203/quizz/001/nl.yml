question: Welke persoonlijkheid had een beslissende invloed op Bastiat in zijn vrijhandelsideeën?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Richard Cobden, de leider van de vrijhandelsbeweging, inspireerde Bastiat in zijn ideeën over economisch liberalisme.

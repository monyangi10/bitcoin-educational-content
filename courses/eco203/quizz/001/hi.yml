question: बस्तियात के मुक्त व्यापार के विचारों पर किस व्यक्तित्व का निर्णायक प्रभाव पड़ा?
answer: रिचर्ड कोबडेन
wrong_answers:
  - अल्फोंस डी लामार्टिन
  - अल्बर्ट डी मुन
  - बेंजामिन कॉन्स्टेंट
explanation: |
  फ्री ट्रेड मूवमेंट के नेता रिचर्ड कोबडेन ने बास्टियाट को उनके आर्थिक उदारवादी विचारों में प्रेरित किया।
reviewed: false
question: Vilken personlighet hade ett avgörande inflytande på Bastiat i hans frihandelsidéer?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Richard Cobden, ledaren för frihandelsrörelsen, inspirerade Bastiat i hans idéer om ekonomisk liberalism.

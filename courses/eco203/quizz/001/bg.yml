question: Коя личност е оказала решаващо влияние върху идеите на Бастиа за свободна търговия?
answer: Ричард Кобдън
wrong_answers:
  - Алфонс дьо Ламартин
  - Алберт де Мун
  - Бенджамин Констант
explanation: |
  Ричард Кобдън, лидерът на движението за свободна търговия, вдъхновява Бастиа в идеите му за икономически либерализъм.
reviewed: true

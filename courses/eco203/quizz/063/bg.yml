question: Каква е основната идея на Маргарет Тачър относно кривата на Лафер?
answer: Данъците трябва да бъдат намалени, за да се стимулира икономиката
wrong_answers:
  - Данъците за богатите трябва да се увеличат
  - Високите данъчни ставки трябва да се запазят, за да се финансират обществените услуги
  - Всички данъци трябва да бъдат запазени
explanation: |
  Вдъхновена от кривата на Лафер, Маргарет Тачър се застъпва за намаляване на данъците, за да се стимулира икономическият растеж.

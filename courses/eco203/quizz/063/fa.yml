question: ایده مرکزی مارگارت تاچر در مورد منحنی لافر چیست؟
answer: مالیات‌ها باید کاهش یابند تا اقتصاد تحریک شود
wrong_answers:
  - باید مالیات بر ثروتمندان افزایش یابد
  - نرخ‌های بالای مالیات باید برای تأمین مالی خدمات عمومی حفظ شوند.
  - همه مالیات‌ها باید حفظ شوند
explanation: |
  با الهام از منحنی لافر، مارگارت تاچر از کاهش مالیات‌ها برای تحریک رشد اقتصادی حمایت کرد.
reviewed: false
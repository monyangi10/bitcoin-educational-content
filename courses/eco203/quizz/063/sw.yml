question: Je, ni wazo lipi kuu la Margaret Thatcher kuhusu curve ya Laffer?
answer: Ushuru upunguzwe ili kuchochea uchumi
wrong_answers:
  - Ushuru wa matajiri unapaswa kuongezwa
  - Viwango vya juu vya ushuru vinapaswa kudumishwa ili kufadhili huduma za umma
  - Ushuru wote unapaswa kudumishwa
explanation: |
  Akihamasishwa na mkondo wa Laffer, Margaret Thatcher alitetea kupunguzwa kwa ushuru ili kuchochea ukuaji wa uchumi.
reviewed: false

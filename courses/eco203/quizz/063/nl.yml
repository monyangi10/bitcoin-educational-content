question: Wat is het centrale idee van Margaret Thatcher over de Laffer-curve?
answer: Belastingen moeten omlaag om de economie te stimuleren
wrong_answers:
  - Belastingen op de rijken moeten worden verhoogd
  - Hoge belastingtarieven moeten worden gehandhaafd om openbare diensten te financieren
  - Alle belastingen moeten worden gehandhaafd
explanation: |
  Geïnspireerd door de Laffer-curve pleitte Margaret Thatcher voor belastingverlaging om economische groei te stimuleren.

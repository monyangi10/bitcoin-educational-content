question: แนวคิดหลักของมาร์กาเร็ต แทตเชอร์เกี่ยวกับเส้นโค้งลาฟเฟอร์คืออะไร?
answer: ควรลดภาษีเพื่อกระตุ้นเศรษฐกิจ
wrong_answers:
  - ควรเพิ่มภาษีสำหรับผู้มั่งคั่ง
  - อัตราภาษีที่สูงควรถูกคงไว้เพื่อเป็นทุนสำหรับบริการสาธารณะ
  - ภาษีทั้งหมดควรได้รับการรักษา
explanation: |
  ได้รับแรงบันดาลใจจากเส้นโค้ง Laffer มาร์กาเร็ต แทตเชอร์ สนับสนุนการลดภาษีเพื่อกระตุ้นการเติบโตทางเศรษฐกิจ
reviewed: false
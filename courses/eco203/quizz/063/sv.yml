question: Vad är Margaret Thatchers centrala idé när det gäller Lafferkurvan?
answer: Skatterna bör sänkas för att stimulera ekonomin
wrong_answers:
  - Skatterna för de rika bör höjas
  - Höga skattesatser bör bibehållas för att finansiera offentliga tjänster
  - Alla skatter bör bibehållas
explanation: |
  Inspirerad av Lafferkurvan förespråkade Margaret Thatcher en skattesänkning för att stimulera den ekonomiska tillväxten.

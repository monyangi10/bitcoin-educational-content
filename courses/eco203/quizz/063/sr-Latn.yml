question: Koja je centralna ideja Margaret Thatcher u vezi sa Laffer-ovom krivom?
answer: Poreze treba smanjiti kako bi se stimulisala ekonomija
wrong_answers:
  - Porezi na bogate treba povećati
  - Visoke poreske stope treba održavati kako bi se finansirale javne usluge
  - Svi porezi treba da se zadrže
explanation: |
  Inspirisana Laffer-ovom krivom, Margaret Thatcher se zalagala za smanjenje poreza kako bi podstakla ekonomski rast.
reviewed: false

question: Hur definierar Bastiat ansvar i förhållande till individuell frihet?
answer: Ansvar är skyldigheten att ta konsekvenserna av sina handlingar, oavsett om de är bra eller dåliga.
wrong_answers:
  - Ansvar är Commitment att alltid agera för andras bästa.
  - Ansvar innebär att vissa beslut delegeras till en behörig myndighet.
  - Ansvar är skyldigheten att följa de regler som samhället ställer upp.
explanation: |
  Bastiat ser ansvar som den positiva aspekten av frihet, vilket innebär att varje individ är skyldig att fullt ut ta konsekvenserna av sina val och handlingar.
reviewed: false
question: บาสเตียตนิยามความรับผิดชอบอย่างไรในความสัมพันธ์กับเสรีภาพส่วนบุคคล?
answer: ความรับผิดชอบคือภาระหน้าที่ในการรับผลที่ตามมาจากการกระทำของตนเอง ไม่ว่าจะเป็นผลดีหรือผลร้าย
wrong_answers:
  - ความรับผิดชอบคือการมุ่งมั่นที่จะกระทำเพื่อประโยชน์ของผู้อื่นเสมอ
  - ความรับผิดชอบเกี่ยวข้องกับการมอบหมายการตัดสินใจบางอย่างให้กับผู้มีอำนาจที่มีความสามารถ
  - ความรับผิดชอบคือภาระหน้าที่ในการปฏิบัติตามกฎที่สังคมกำหนด
explanation: |
  Bastiat มองว่าความรับผิดชอบเป็นแง่มุมเชิงบวกของเสรีภาพ โดยบังคับให้แต่ละบุคคลต้องรับผลที่ตามมาจากการเลือกและการกระทำของตนอย่างเต็มที่
reviewed: false
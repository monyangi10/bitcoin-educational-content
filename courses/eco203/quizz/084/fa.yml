question: باستیا مسئولیت را در رابطه با آزادی فردی چگونه تعریف می‌کند؟
answer: مسئولیت تعهدی است برای تحمل پیامدهای اعمال فرد، چه خوب باشند و چه بد.
wrong_answers:
  - مسئولیت Commitment این است که همیشه به نفع دیگران عمل کند.
  - مسئولیت شامل واگذاری برخی تصمیمات به یک مرجع صلاحیت‌دار است.
  - مسئولیت تعهد به پیروی از قوانین تحمیل‌شده توسط جامعه است.
explanation: |
  باستیا مسئولیت را به عنوان جنبه مثبت آزادی می‌بیند که هر فرد را ملزم می‌کند تا به طور کامل پیامدهای انتخاب‌ها و اقدامات خود را بپذیرد.
reviewed: false
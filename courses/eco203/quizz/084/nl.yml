question: Hoe definieert Bastiat verantwoordelijkheid in relatie tot individuele vrijheid?
answer: Verantwoordelijkheid is de verplichting om de gevolgen van iemands daden te dragen, of ze nu goed of slecht zijn.
wrong_answers:
  - Verantwoordelijkheid is de Commitment om altijd te handelen voor het welzijn van anderen.
  - Verantwoordelijkheid houdt in dat bepaalde beslissingen worden gedelegeerd aan een bevoegde autoriteit.
  - Verantwoordelijkheid is de verplichting om de regels van de maatschappij te volgen.
explanation: |
  Bastiat ziet verantwoordelijkheid als het positieve aspect van vrijheid, dat elk individu verplicht om de gevolgen van zijn keuzes en daden volledig op zich te nemen.

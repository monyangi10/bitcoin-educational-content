question: Как Бастиа определя отговорността във връзка с индивидуалната свобода?
answer: Отговорността е задължението да понесеш последствията от действията си, независимо дали те са добри или лоши.
wrong_answers:
  - Отговорността е ангажиментът да действате винаги за доброто на другите.
  - Отговорността включва делегиране на определени решения на компетентен орган.
  - Отговорността е задължението да се спазват правилата, наложени от обществото.
explanation: |
  Бастиа разглежда отговорността като положителен аспект на свободата, който задължава всеки индивид да поеме изцяло последствията от своя избор и действия.
reviewed: false
question: Какую криптографическую технику использует Elements, чтобы скрыть сумму транзакции и при этом обеспечить проверку сети?
answer: Обязательства Педерсена
wrong_answers:
  - Хэширование Merkle Tree
  - Эллиптические кривые подписи
  - Шифрование SHA-256
explanation: |
  Обязательства Педерсена - это особая криптографическая техника, используемая в Elements' Confidential Transactions для сокрытия сумм транзакций. Эти обязательства заменяют видимые суммы криптографическими обязательствами, которые могут быть математически проверены валидаторами без раскрытия фактических значений. В Merkle Tree хэширование используется для организации данных транзакций в блоки, эллиптические кривые подписи используются для авторизации транзакций, а SHA-256 - это алгоритм хэширования, но ни один из них не скрывает суммы транзакций, сохраняя возможность проверки, как это делают обязательства Педерсена.
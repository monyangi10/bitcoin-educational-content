question: Каква криптографска техника използва Elements, за да скрие сумите на трансакциите, като същевременно позволява валидиране на мрежата?
answer: Ангажименти на Pedersen
wrong_answers:
  - Merkle Tree Hashing
  - Елиптични криви подписи
  - Шифроване SHA-256
explanation: |
  Задълженията на Педерсен са специфичната криптографска техника, използвана в Elements' Confidential Transactions за скриване на сумите на трансакциите. Тези ангажименти заменят видимите суми с криптографски ангажименти, които все още могат да бъдат математически проверени от валидаторите, без да разкриват действителните стойности. Merkle Tree Hashing се използва за организиране на данните за транзакциите в блокове, Elliptic Curve Signatures се използват за оторизация на транзакциите, а SHA-256 е хеширащ алгоритъм, но нито един от тях не скрива сумите на транзакциите, като същевременно запазва възможността за валидиране, както правят ангажиментите на Педерсен.
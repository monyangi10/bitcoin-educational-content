question: 네트워크 검증을 허용하면서 거래 금액을 숨기기 위해 Elements은 어떤 암호화 기술을 사용하나요?
answer: 페데르센의 약속
wrong_answers:
  - Merkle Tree 해싱
  - 타원 곡선 서명
  - SHA-256 암호화
explanation: |
  페더슨 커미트먼트는 Elements의 Confidential Transactions에서 거래 금액을 숨기기 위해 사용되는 특정 암호화 기술입니다. 이러한 커미트먼트는 실제 값을 공개하지 않고도 검증자가 수학적으로 검증할 수 있는 암호화 커미트먼트로 가시적인 금액을 대체합니다. Merkle Tree 해싱은 트랜잭션 데이터를 블록으로 구성하는 데 사용되고, 타원 곡선 서명은 트랜잭션 승인에 사용되며, SHA-256은 해싱 알고리즘이지만 페더슨 커밋처럼 검증 기능을 유지하면서 거래 금액을 숨기는 것은 없습니다.
question: Elementsはどのような暗号技術を使って取引金額を隠蔽しながら、ネットワークの検証を可能にしているのか？
answer: ペデルセンのコミットメント
wrong_answers:
  - Merkle Tree ハッシング
  - 楕円曲線署名
  - SHA-256暗号化
explanation: |
  Pedersenコミットメントは、Elements' Confidential Transactionsにおいて取引金額を隠すために使用される特定の暗号技術である。これらのコミットメントは目に見える金額を暗号的なコミットメントに置き換えるもので、実際の値を明らかにすることなく、バリデータが数学的に検証することができる。Merkle Treeのハッシュは取引データをブロック単位で整理するために使用され、楕円曲線署名は取引の承認に使用され、SHA-256はハッシュアルゴリズムであるが、Pedersen Commitmentsのように検証能力を維持しながら取引金額を隠すものはない。
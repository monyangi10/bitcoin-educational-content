question: Elements از چه تکنیک رمزنگاری برای پنهان کردن مقادیر تراکنش در حالی که هنوز اجازه اعتبارسنجی شبکه را می‌دهد، استفاده می‌کند؟
answer: تعهدات پدرسن
wrong_answers:
  - Merkle Tree هشینگ
  - امضاهای منحنی بیضوی
  - رمزگذاری SHA-256
explanation: |
  تعهدات Pedersen تکنیک رمزنگاری خاصی هستند که در Elements' Confidential Transactions برای پنهان کردن مقادیر تراکنش استفاده می‌شوند. این تعهدات مقادیر قابل مشاهده را با تعهدات رمزنگاری جایگزین می‌کنند که همچنان می‌توانند به صورت ریاضی توسط اعتبارسنج‌ها بدون افشای مقادیر واقعی تأیید شوند. هشینگ Merkle Tree برای سازماندهی داده‌های تراکنش در بلوک‌ها استفاده می‌شود، امضاهای منحنی بیضوی برای مجوز تراکنش استفاده می‌شوند، و SHA-256 یک الگوریتم هشینگ است، اما هیچ‌کدام از این‌ها مقادیر تراکنش را در حالی که قابلیت اعتبارسنجی را حفظ می‌کنند، مانند تعهدات Pedersen پنهان نمی‌کنند.
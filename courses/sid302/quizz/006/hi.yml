question: Elements लेन-देन की रकम को छिपाने के लिए कौन सी क्रिप्टोग्राफिक तकनीक का उपयोग करता है, जबकि साथ ही नेटवर्क सत्यापन की अनुमति भी देता है?
answer: पेडरसन प्रतिबद्धताएं
wrong_answers:
  - Merkle Tree हैशिंग
  - अण्डाकार वक्र हस्ताक्षर
  - SHA-256 एन्क्रिप्शन
explanation: |
  पेडरसन कमिटमेंट्स, Elements और Confidential Transactions में लेन-देन की रकम को छिपाने के लिए इस्तेमाल की जाने वाली विशिष्ट क्रिप्टोग्राफिक तकनीक है। ये कमिटमेंट्स दिखाई देने वाली रकम को क्रिप्टोग्राफिक कमिटमेंट्स से बदल देते हैं, जिन्हें वैलिडेटर वास्तविक मूल्यों को प्रकट किए बिना गणितीय रूप से सत्यापित कर सकते हैं। Merkle Tree में लेन-देन डेटा को ब्लॉक में व्यवस्थित करने के लिए हैशिंग का उपयोग किया जाता है, लेन-देन के प्रमाणीकरण के लिए एलिप्टिक कर्व सिग्नेचर का उपयोग किया जाता है, और SHA-256 एक हैशिंग एल्गोरिदम है, लेकिन इनमें से कोई भी पेडरसन कमिटमेंट्स की तरह सत्यापन क्षमता बनाए रखते हुए लेन-देन की रकम को नहीं छिपाता है।
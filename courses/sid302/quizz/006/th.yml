question: เทคนิคการเข้ารหัสแบบใดที่ Elements ใช้เพื่อซ่อนจำนวนธุรกรรมในขณะที่ยังคงอนุญาตให้มีการตรวจสอบเครือข่าย?
answer: คำมั่นสัญญาของ Pedersen
wrong_answers:
  - Merkle Tree การแฮช
  - ลายเซ็นต์เส้นโค้งวงรี
  - การเข้ารหัส SHA-256
explanation: |
  Pedersen Commitments เป็นเทคนิคการเข้ารหัสเฉพาะที่ใช้ใน Elements' Confidential Transactions เพื่อซ่อนจำนวนธุรกรรม คำมั่นสัญญาเหล่านี้แทนที่จำนวนที่มองเห็นได้ด้วยคำมั่นสัญญาทางการเข้ารหัสที่ยังคงสามารถตรวจสอบทางคณิตศาสตร์โดยผู้ตรวจสอบได้โดยไม่เปิดเผยค่าจริง Merkle Tree การแฮชใช้สำหรับจัดระเบียบข้อมูลธุรกรรมในบล็อก ลายเซ็น Elliptic Curve ใช้สำหรับการอนุญาตธุรกรรม และ SHA-256 เป็นอัลกอริธึมการแฮช แต่ไม่มีสิ่งใดที่ซ่อนจำนวนธุรกรรมในขณะที่ยังคงความสามารถในการตรวจสอบได้เหมือนที่ Pedersen Commitments ทำ
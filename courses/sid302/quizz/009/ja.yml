question: Elements、Confidential Transactionsにおけるペデルセン・コミットメントの主な目的は何ですか？
answer: 目に見える取引額を、実際の値を明らかにすることなく検証可能な暗号化されたコミットメントに置き換える。
wrong_answers:
  - Elementsブロックチェーン上で新規に発行されたアセットに対するgenerate固有の64文字の16進数識別子へ
  - 隠された値が有効範囲内の正の整数であることを数学的に証明することで、double-spendingを防ぐ。
  - Bitcoinをメイン・チェーンからElementsサイドチェーンに暗号ペッグ機構で移せるようにする。
explanation: |
  Pedersenコミットメントは、目に見える金額を数学的なコミットメントに置き換えることで、Confidential Transactionsのプライバシーを可能にする中核的な暗号メカニズムである。その同型性により、バリデータは実際の値を見ることなく、インプットとアウトプット＋手数料が等しいことを検証することができる。範囲証明は負の金額を防止し、アセットIDはトークンを識別し、ペッグ機構はクロスチェーン転送を処理するが、これらはいずれも特にペダーセンコミットメントの機能ではない。
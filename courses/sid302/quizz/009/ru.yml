question: Какова основная цель обязательств Педерсена в Elements' Confidential Transactions?
answer: Заменить видимые суммы транзакций криптографическими обязательствами, которые могут быть подтверждены без раскрытия фактических значений
wrong_answers:
  - В generate уникальные 64-символьные шестнадцатеричные идентификаторы для вновь выпущенных активов на блокчейне Elements
  - Чтобы предотвратить double-spending, создайте математические доказательства того, что скрытые значения являются целыми положительными числами в допустимых диапазонах
  - Обеспечение возможности передачи Bitcoin из основной цепочки в побочные цепочки Elements с помощью механизмов криптографической привязки
explanation: |
  Обязательства Педерсена - это основной криптографический механизм, который обеспечивает конфиденциальность в Confidential Transactions, заменяя видимые суммы математическими обязательствами. Благодаря их гомоморфным свойствам валидаторы могут проверить, что вводимые суммы равны выводимым суммам плюс комиссия, не видя фактических значений. Доказательства диапазона предотвращают отрицательные суммы, идентификаторы активов идентифицируют токены, а механизмы привязки обрабатывают межцепочечные переводы, но ни один из этих механизмов не является функцией именно обязательств Педерсена.
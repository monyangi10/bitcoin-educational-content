question: 페더슨 커미트먼트의 주요 목적은 무엇인가요?
answer: 가시적인 트랜잭션 금액을 실제 값을 공개하지 않고 검증할 수 있는 암호화 커미트먼트로 대체하려면 다음과 같이 하세요
wrong_answers:
  - generate 블록체인에서 새로 발행된 자산에 대한 고유 64자 16진수 식별자를 Elements로 변경합니다
  - 숨겨진 값이 유효한 범위 내에서 양의 정수라는 수학적 증명을 생성하여 double-spending를 방지합니다
  - 암호화 페깅 메커니즘을 통해 Bitcoin을 메인 체인에서 Elements 사이드 체인으로 전송할 수 있습니다
explanation: |
  페더슨 커미트먼트는 눈에 보이는 금액을 수학적 커미트먼트로 대체하여 Confidential Transactions에서 프라이버시를 가능하게 하는 핵심 암호화 메커니즘입니다. 동형적 특성으로 인해 검증자는 실제 값을 보지 않고도 입력값과 수수료가 동일한지 확인할 수 있습니다. 범위 증명은 마이너스 금액을 방지하고, 자산 ID는 토큰을 식별하며, 페깅 메커니즘은 체인 간 전송을 처리하지만, 이러한 기능은 페더슨 커미트먼트의 고유한 기능은 아닙니다.
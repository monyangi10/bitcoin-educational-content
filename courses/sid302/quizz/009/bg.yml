question: Каква е основната цел на ангажиментите на Pedersen в Elements' Confidential Transactions?
answer: Замяна на видимите суми на транзакциите с криптографски ангажименти, които могат да бъдат потвърдени, без да се разкриват действителните стойности
wrong_answers:
  - Към generate уникални 64-символни шестнадесетични идентификатори за новоиздадени активи в блокчейна на Elements
  - Предотвратяване на double-spending чрез създаване на математически доказателства, че скритите стойности са цели положителни числа в рамките на валидни диапазони
  - Да се даде възможност за прехвърляне на Bitcoin от основната верига към страничните вериги на Elements чрез криптографски механизми за обвързване
explanation: |
  Ангажиментите на Педерсен са основният криптографски механизъм, който осигурява неприкосновеност на личния живот в Confidential Transactions, като замества видимите суми с математически ангажименти. Благодарение на техните хомоморфни свойства валидаторите могат да проверяват дали входните данни са равни на изходните плюс таксите, без да виждат действителните стойности. Доказателствата за обхват предотвратяват отрицателни суми, идентификаторите на активите идентифицират токените, а механизмите за обвързване се справят с трансферите между веригите, но нито един от тях не е функция конкретно на ангажиментите на Педерсен.
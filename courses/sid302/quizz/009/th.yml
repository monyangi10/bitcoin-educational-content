question: วัตถุประสงค์หลักของ Pedersen Commitments ใน Elements' Confidential Transactions คืออะไร?
answer: แทนที่จำนวนธุรกรรมที่มองเห็นได้ด้วยการผูกพันทางเข้ารหัสที่สามารถตรวจสอบได้โดยไม่เปิดเผยค่าจริง
wrong_answers:
  - ไปยัง generate ตัวระบุฐานสิบหกที่ไม่ซ้ำกัน 64 อักขระสำหรับสินทรัพย์ที่ออกใหม่บนบล็อกเชน Elements
  - เพื่อป้องกัน double-spending โดยการสร้างการพิสูจน์ทางคณิตศาสตร์ว่าค่าที่ซ่อนอยู่เป็นจำนวนเต็มบวกภายในช่วงที่ถูกต้อง
  - เพื่อเปิดใช้งานการโอน Bitcoin จากเชนหลักไปยังเชนข้าง Elements ผ่านกลไกการตรึงด้วยการเข้ารหัสลับ
explanation: |
  Pedersen Commitments เป็นกลไกการเข้ารหัสหลักที่ช่วยให้ความเป็นส่วนตัวใน Confidential Transactions โดยการแทนที่จำนวนที่มองเห็นได้ด้วยการผูกมัดทางคณิตศาสตร์ ด้วยคุณสมบัติ homomorphic ของพวกมัน ผู้ตรวจสอบสามารถยืนยันได้ว่าข้อมูลนำเข้าเท่ากับข้อมูลส่งออกบวกค่าธรรมเนียมโดยไม่ต้องเห็นค่าจริง Range Proofs ป้องกันจำนวนที่เป็นลบ, asset IDs ระบุโทเค็น, และกลไก pegging จัดการการโอนข้ามเชน แต่ไม่มีสิ่งใดที่เป็นหน้าที่ของ Pedersen Commitments โดยเฉพาะเจาะจง
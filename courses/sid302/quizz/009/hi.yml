question: Elements और Confidential Transactions में पेडरसन प्रतिबद्धताओं का प्राथमिक उद्देश्य क्या है?
answer: दृश्यमान लेनदेन राशियों को क्रिप्टोग्राफिक प्रतिबद्धताओं से प्रतिस्थापित करना जिन्हें वास्तविक मूल्यों को प्रकट किए बिना मान्य किया जा सकता है।
wrong_answers:
  - Elements ब्लॉकचेन पर नए जारी किए गए एसेट्स के लिए generate के लिए अद्वितीय 64-अक्षर वाले हेक्साडेसिमल पहचानकर्ता।
  - double-spending को रोकने के लिए, यह साबित करने हेतु गणितीय प्रमाण तैयार करना कि छिपे हुए मान वैध सीमाओं के भीतर धनात्मक पूर्णांक हैं।
  - क्रिप्टोग्राफिक पेगिंग तंत्रों के माध्यम से Bitcoin को मुख्य श्रृंखला से Elements साइडचेन में स्थानांतरित करने में सक्षम बनाना।
explanation: |
  पेडरसन कमिटमेंट्स, Confidential Transactions में गोपनीयता सुनिश्चित करने वाला मुख्य क्रिप्टोग्राफिक तंत्र है, जो दृश्य राशियों को गणितीय प्रतिबद्धताओं से प्रतिस्थापित करता है। इनके समरूप गुणों के कारण, सत्यापनकर्ता वास्तविक मान देखे बिना ही यह सत्यापित कर सकते हैं कि इनपुट, आउटपुट और शुल्क के बराबर हैं। रेंज प्रूफ नकारात्मक राशियों को रोकते हैं, एसेट आईडी टोकन की पहचान करते हैं, और पेगिंग तंत्र क्रॉस-चेन ट्रांसफर को संभालते हैं, लेकिन इनमें से कोई भी पेडरसन कमिटमेंट्स का विशिष्ट कार्य नहीं है।
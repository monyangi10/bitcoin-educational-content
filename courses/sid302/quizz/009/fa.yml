question: هدف اصلی تعهدات پدرسن در Elements' Confidential Transactions چیست؟
answer: جایگزینی مقادیر قابل مشاهده تراکنش با تعهدات رمزنگاری که می‌توانند بدون افشای مقادیر واقعی تأیید شوند
wrong_answers:
  - به generate شناسه‌های هگزادسیمال ۶۴ کاراکتری منحصر به فرد برای دارایی‌های جدید صادر شده بر روی بلاکچین Elements
  - برای جلوگیری از double-spending با ایجاد اثبات‌های ریاضی که مقادیر پنهان اعداد صحیح مثبت در محدوده‌های معتبر هستند
  - برای فعال‌سازی انتقال Bitcoin از زنجیره اصلی به زنجیره‌های جانبی Elements از طریق مکانیزم‌های پگینگ رمزنگاری‌شده
explanation: |
  تعهدات پدرسن مکانیزم رمزنگاری اصلی هستند که با جایگزینی مقادیر قابل مشاهده با تعهدات ریاضی، حریم خصوصی را در Confidential Transactions امکان‌پذیر می‌سازند. به دلیل ویژگی‌های همومورفیک آنها، اعتبارسنج‌ها می‌توانند بدون دیدن مقادیر واقعی، تأیید کنند که ورودی‌ها برابر با خروجی‌ها به علاوه کارمزدها هستند. اثبات‌های محدوده از مقادیر منفی جلوگیری می‌کنند، شناسه‌های دارایی توکن‌ها را شناسایی می‌کنند، و مکانیزم‌های پیوندی انتقال‌های بین زنجیره‌ای را مدیریت می‌کنند، اما هیچ‌کدام از این‌ها به‌طور خاص عملکرد تعهدات پدرسن نیستند.
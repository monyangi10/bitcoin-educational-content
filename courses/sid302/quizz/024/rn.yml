question: Mu nzira y’ugucungera umutungo (AMP) ya Liquid, ni ubuhe buryo bw’ubuhinga bwa mbere bubuza ibikorwa vyo kwubahiriza amategeko y’intumbero imwe mu gihe haguma hagenzurwa n’amategeko ku mitungo ifise ikimenyetso?
answer: Uruhusha rw'imikono myinshi rusaba ko imigwi myinshi yemeza ibikorwa vyo kwubahiriza amategeko nk'uguhagarika amafaranga canke gusubira gutanga ibimenyetso
wrong_answers:
  - Ibimenyetso vy'ubutegetsi vya Smart contract vyemerera abaturage gutora ku ngingo zose zo kwubahiriza amategeko no gukurikiza amategeko
  - Konti z'ububiko zifungiwe n'igihe zihita zikora ibikorwa vyo kwubahiriza amategeko inyuma y'aho ibihe vyo kurindira vyategekanijwe biheze
  - Ivyemezo vy'ubuhinga bw'ibanga aho abavyemeza bategerezwa gushika ku masezerano y'abantu benshi imbere yo gukora igikorwa ico ari co cose co kwubahiriza amategeko
explanation: |
  AMP ikoresha ubugenzuzi bw’imikono myinshi kugira ngo ibikorwa vyo kwubahiriza amategeko bisabe uruhusha rw’abantu benshi, bikabuza umukozi umwe wese gukora ku ruhande rumwe. Ivyo bituma habaho uburyo bwo kugenzura no gupima ibikorwa bihambaye mu gihe haguma hariho ubugenzuzi bujanye n’amategeko busabwa ku mutungo w’inzego. Inyishu zitari zo zidondora uburyo butaboneka muri AMP canke butabereye ku bijanye n’ukubahiriza amategeko agenga ivy’ubutunzi.
question: 在 Liquid 的資產管理平台 (AMP) 中，防止單點失效合規行動，同時維持代幣化資產監管控制的主要技術機制是什麼？
answer: 多重簽名授權需要多方批准凍結資金或重新發行代幣等合規行動
wrong_answers:
  - Smart contract 治理代幣允許社群就所有合規決策和法規執行進行投票
  - 時間鎖定的託管帳戶，可在預先設定的等待期屆滿後，自動執行合規行動
  - 密碼式持股證明共識，驗證者必須先達成多數同意，才能執行任何符合規定的行動
explanation: |
  AMP 使用多重簽名控制，以確保合規行動需要多方授權，防止任何單一員工單方面行事。這可為敏感作業建立制衡系統，同時維持機構資產所需的法規監督。錯誤答案所描述的機制在 AMP 中並不存在，或是不適合受監管的財務合規。
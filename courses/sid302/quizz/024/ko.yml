question: Liquid의 자산 관리 플랫폼(AMP)에서 토큰화된 자산에 대한 규제 통제를 유지하면서 단일 장애 지점 규정 준수 조치를 방지하는 주요 기술적 메커니즘은 무엇인가요?
answer: 여러 당사자가 자금 동결 또는 토큰 재발행과 같은 규정 준수 조치를 승인해야 하는 다중 서명 승인
wrong_answers:
  - 모든 규정 준수 결정 및 규제 집행에 대한 커뮤니티 투표를 허용하는 Smart contract 거버넌스 토큰
  - 미리 정해진 대기 기간이 만료되면 규정 준수 작업을 자동으로 실행하는 시간 잠금 에스크로 계정
  - 규정 준수 조치를 실행하기 전에 검증자가 과반수 동의에 도달해야 하는 암호화된 지분 증명 합의
explanation: |
  AMP는 다중 서명 제어를 사용하여 규정 준수 작업에 여러 당사자의 승인이 필요하도록 하여 한 명의 직원이 일방적으로 행동하는 것을 방지합니다. 이를 통해 기관 자산에 필요한 규제 감독을 유지하면서 민감한 작업에 대한 견제와 균형 시스템을 구축할 수 있습니다. 오답은 AMP에 존재하지 않거나 규제된 금융 규정 준수에 부적절한 메커니즘을 설명하는 것입니다.
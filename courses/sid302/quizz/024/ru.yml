question: Каков основной технический механизм в платформе управления активами (AMP) Liquid, который предотвращает действия по соблюдению нормативных требований в одной точке отказа, сохраняя при этом регуляторный контроль над токенизированными активами?
answer: Авторизация с несколькими подписями, требующая одобрения несколькими сторонами таких действий, как замораживание средств или повторная эмиссия токенов
wrong_answers:
  - Токены управления Smart contract, позволяющие сообществу голосовать по всем решениям, касающимся соблюдения нормативных требований и правоприменения
  - Счета условного депонирования с временной блокировкой, которые автоматически выполняют действия по соблюдению требований по истечении заранее установленных периодов ожидания
  - Криптографический консенсус с доказательством доли, когда валидаторы должны достичь согласия большинства перед выполнением любого действия по соблюдению
explanation: |
  AMP использует контроль с несколькими подписями, чтобы гарантировать, что действия по соблюдению требований требуют разрешения от нескольких сторон, не позволяя одному сотруднику действовать в одностороннем порядке. Это создает систему сдержек и противовесов для конфиденциальных операций, сохраняя при этом нормативный надзор, необходимый для институциональных активов. Неправильные ответы описывают механизмы, которые либо не существуют в AMP, либо не подходят для регулируемого финансового соответствия.
question: 在 Liquid 的资产管理平台 (AMP) 中，防止单点故障合规行动同时保持对代币化资产的监管控制的主要技术机制是什么？
answer: 需要多方批准合规行动（如冻结资金或重新发行代币）的多重签名授权
wrong_answers:
  - Smart contract 治理代币允许社区对所有合规决策和监管执行进行投票
  - 时间锁定代管账户，在预定等待期结束后自动执行合规行动
  - 加密持股证明共识，验证者在执行任何合规行动前必须达成多数协议
explanation: |
  AMP 采用多重签名控制，确保合规行动需要多方授权，防止任何单个员工单方面行事。这为敏感操作创建了一个制衡系统，同时保持了机构资产所需的监管监督。错误答案描述的机制要么不存在于 AMP 中，要么不适合受监管的金融合规。
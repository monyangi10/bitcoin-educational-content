question: در پلتفرم مدیریت دارایی Liquid (AMP)، مکانیزم فنی اصلی که از اقدامات انطباق با نقطه شکست واحد جلوگیری می‌کند و در عین حال کنترل قانونی بر دارایی‌های توکنیزه شده را حفظ می‌کند، چیست؟
answer: مجوز چند امضایی که نیاز به تأیید چندین طرف برای اقدامات انطباقی مانند مسدود کردن وجوه یا صدور مجدد توکن‌ها دارد.
wrong_answers:
  - توکن‌های حاکمیتی Smart contract که امکان رأی‌گیری جامعه در مورد تمام تصمیمات انطباق و اجرای مقررات را فراهم می‌کنند.
  - حساب‌های امانی با زمان قفل‌شده که به‌طور خودکار اقدامات انطباقی را پس از انقضای دوره‌های انتظار از پیش تعیین‌شده اجرا می‌کنند
  - اجماع اثبات سهام رمزنگاری که در آن اعتبارسنج‌ها باید قبل از اجرای هر اقدام انطباقی به توافق اکثریت برسند
explanation: |
  AMP از کنترل چند امضایی برای اطمینان از اینکه اقدامات انطباق نیاز به مجوز از چندین طرف دارند، استفاده می‌کند و از اقدام یک‌جانبه هر کارمند جلوگیری می‌کند. این امر یک سیستم کنترل و توازن برای عملیات حساس ایجاد می‌کند و در عین حال نظارت قانونی مورد نیاز برای دارایی‌های نهادی را حفظ می‌کند. پاسخ‌های نادرست مکانیزم‌هایی را توصیف می‌کنند که یا در AMP وجود ندارند یا برای انطباق مالی تنظیم‌شده نامناسب خواهند بود.
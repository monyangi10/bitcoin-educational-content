question: ในแพลตฟอร์มการจัดการสินทรัพย์ (AMP) ของ Liquid กลไกทางเทคนิคหลักที่ป้องกันการดำเนินการที่มีความเสี่ยงจากจุดเดียวในขณะที่ยังคงรักษาการควบคุมตามกฎระเบียบเหนือสินทรัพย์ที่ถูกโทเค็นคืออะไร?
answer: การอนุมัติแบบหลายลายเซ็นที่ต้องการหลายฝ่ายในการอนุมัติการดำเนินการตามข้อกำหนด เช่น การแช่แข็งเงินทุนหรือการออกโทเค็นใหม่
wrong_answers:
  - โทเค็นการกำกับดูแล Smart contract ที่อนุญาตให้มีการลงคะแนนเสียงของชุมชนในทุกการตัดสินใจด้านการปฏิบัติตามกฎระเบียบและการบังคับใช้กฎหมาย
  - บัญชีเอสโครว์ที่ล็อคเวลาไว้ซึ่งดำเนินการตามข้อกำหนดโดยอัตโนมัติหลังจากช่วงเวลารอคอยที่กำหนดไว้ล่วงหน้าหมดอายุ
  - ฉันทามติการพิสูจน์ด้วยการถือครองคริปโตกราฟฟิกที่ผู้ตรวจสอบต้องบรรลุข้อตกลงส่วนใหญ่ก่อนที่จะดำเนินการใด ๆ ที่เกี่ยวข้องกับการปฏิบัติตามข้อกำหนด
explanation: |
  AMP ใช้การควบคุมแบบ multisignature เพื่อให้แน่ใจว่าการดำเนินการด้านการปฏิบัติตามข้อกำหนดต้องได้รับการอนุมัติจากหลายฝ่าย ป้องกันไม่ให้พนักงานคนใดคนหนึ่งดำเนินการเพียงลำพัง สิ่งนี้สร้างระบบการตรวจสอบและถ่วงดุลสำหรับการดำเนินงานที่ละเอียดอ่อนในขณะที่รักษาการกำกับดูแลตามกฎระเบียบที่จำเป็นสำหรับสินทรัพย์ของสถาบัน คำตอบที่ผิดอธิบายถึงกลไกที่ไม่มีอยู่ใน AMP หรือไม่เหมาะสมสำหรับการปฏิบัติตามข้อกำหนดทางการเงินที่มีการควบคุม
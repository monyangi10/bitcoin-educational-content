question: Liquidのアセット・マネジメント・プラットフォーム（AMP）において、トークン化された資産に対する規制管理を維持しながら、単一障害点によるコンプライアンス・アクションを防止する主な技術的メカニズムは何ですか？
answer: 資金の凍結やトークンの再発行などのコンプライアンス・アクションを複数の関係者が承認する必要があるマルチシグネチャ認証
wrong_answers:
  - Smart contractガバナンス・トークンは、コンプライアンスに関するすべての決定と規制の実施に関するコミュニティの投票を可能にする。
  - あらかじめ設定された待機期間が過ぎると、コンプライアンス・アクションが自動的に実行されるタイムロック式エスクロー口座
  - コンプライアンス・アクションを実行する前に、検証者が過半数の合意に達する必要がある、暗号化されたプルーフ・オブ・ステーク・コンセンサス。
explanation: |
  AMPはマルチシグネチャー・コントロールを使用して、コンプライアンス・アクションに複数の関係者の承認が必要であることを保証し、一人の従業員が一方的に行動することを防ぎます。これにより、機関投資家の資産に求められる規制上の監視を維持しながら、機密性の高い業務に対するチェック・アンド・バランスのシステムが構築される。不正解は、AMPに存在しないか、規制された金融コンプライアンスには不適切なメカニズムについて述べている。
question: Кой е основният технически механизъм в платформата за управление на активи (AMP) на Liquid, който предотвратява действия за спазване на изискванията в една точка на неуспех, като същевременно поддържа регулаторен контрол върху токенизираните активи?
answer: Оторизация с много подписи, изискваща няколко страни да одобрят действия за съответствие като замразяване на средства или преиздаване на токени
wrong_answers:
  - Smart contract токени за управление, които позволяват на общността да гласува за всички решения за съответствие и регулаторно прилагане
  - Депозитни сметки със заключено време, които автоматично изпълняват действия по спазване на изискванията след изтичане на предварително определени периоди на изчакване
  - Криптографско доказателство за консенсус, при което валидаторите трябва да постигнат съгласие с мнозинство, преди да извършат каквото и да е действие за съответствие
explanation: |
  AMP използва контрол с множество подписи, за да гарантира, че действията по спазване на изискванията изискват разрешение от няколко страни, което не позволява на нито един служител да действа едностранно. Това създава система за контрол и баланс на чувствителните операции, като същевременно поддържа регулаторния надзор, необходим за институционалните активи. Грешните отговори описват механизми, които или не съществуват в AMP, или биха били неподходящи за регулирано финансово съответствие.
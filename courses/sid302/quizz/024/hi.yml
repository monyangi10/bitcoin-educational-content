question: Liquid के एसेट मैनेजमेंट प्लेटफॉर्म (AMP) में, वह प्राथमिक तकनीकी तंत्र क्या है जो टोकनाइज्ड एसेट्स पर नियामक नियंत्रण बनाए रखते हुए सिंगल-पॉइंट-ऑफ-फेलियर कंप्लायंस कार्यों को रोकता है?
answer: बहुहस्ताक्षर प्राधिकरण जिसमें कई पक्षों को अनुपालन कार्यों जैसे कि धनराशि को फ्रीज करना या टोकन को पुनः जारी करना आदि को मंजूरी देनी होती है।
wrong_answers:
  - Smart contract गवर्नेंस टोकन समुदाय को सभी अनुपालन निर्णयों और नियामक प्रवर्तन पर मतदान करने की अनुमति देते हैं।
  - समय-सीमित एस्क्रो खाते जो पूर्व निर्धारित प्रतीक्षा अवधि समाप्त होने के बाद स्वचालित रूप से अनुपालन संबंधी कार्रवाई करते हैं
  - क्रिप्टोग्राफिक प्रूफ-ऑफ-स्टेक सहमति जहां सत्यापनकर्ताओं को किसी भी अनुपालन कार्रवाई को निष्पादित करने से पहले बहुमत समझौते पर पहुंचना होगा
explanation: |
  एएमपी यह सुनिश्चित करने के लिए बहु-हस्ताक्षर नियंत्रण का उपयोग करता है कि अनुपालन कार्यों के लिए कई पक्षों से प्राधिकरण की आवश्यकता हो, जिससे किसी भी एक कर्मचारी को एकतरफा कार्रवाई करने से रोका जा सके। यह संस्थागत परिसंपत्तियों के लिए आवश्यक नियामक निरीक्षण को बनाए रखते हुए संवेदनशील संचालन के लिए एक नियंत्रण-संतुलन प्रणाली बनाता है। गलत उत्तर उन तंत्रों का वर्णन करते हैं जो या तो एएमपी में मौजूद नहीं हैं या विनियमित वित्तीय अनुपालन के लिए अनुपयुक्त होंगे।
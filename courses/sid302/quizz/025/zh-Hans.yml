question: 与基于以太坊的代币化平台相比，Liquid 在区块链架构上有哪些根本区别，使其更适合关键任务金融业务？
answer: Liquid 使用 Bitcoin 的 UTXO 模型，该模型提供确定性的交易结果，而以太坊的账户模型可能导致交易失败，但仍会消耗 gas 费用。
wrong_answers:
  - Liquid 采用权益证明共识机制，而以太坊则依赖能耗高的 proof-of-work mining 进行交易验证。
  - "Liquid的联合侧链结构可实现无限的交易吞吐量，而以太坊则受到单链区块大小的限制。"
  - Liquid 通过 Elements 脚本实现本地智能合约功能，而以太坊需要外部虚拟机执行环境
explanation: |
  UTXO 模型的确定性对于金融机构来说至关重要，因为交易要么完全成功，要么失败而不产生任何成本，从而提供可预测的结果。以太坊的账户模型可能会导致交易失败，但仍会消耗气体费用，从而造成运营不确定性和额外成本，这对于可靠性和成本可预测性至关重要的关键任务金融业务来说是不可接受的。
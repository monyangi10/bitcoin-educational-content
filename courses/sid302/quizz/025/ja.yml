question: Liquidは、イーサリアムベースのトークン化プラットフォームと比較して、どのような基本的なブロックチェーンアーキテクチャーの違いがミッションクリティカルな金融業務に適しているのでしょうか？
answer: LiquidはBitcoinのUTXOモデルを使用しており、決定論的な取引結果を提供する。一方、イーサリアムのアカウントモデルでは、取引に失敗してもガス料金は消費される。
wrong_answers:
  - Liquidはプルーフ・オブ・ステーク・コンセンサス・メカニズムで運営され、イーサリアムはエネルギー集約型のproof-of-work miningにトランザクションの検証を依存している。
  - "Liquidの連合サイドチェーン構造は、イーサリアムがシングルチェーンのブロックサイズ制限に制約されているのに対し、無制限の取引スループットを可能にする"
  - LiquidはElementsのスクリプトによってネイティブのスマートコントラクト機能を実装しているが、イーサリアムは外部の仮想マシン実行環境を必要とする。
explanation: |
  UTXOモデルの決定論的な性質は、トランザクションが完全に成功するか、コストなしで失敗するかのいずれかであり、予測可能な結果を提供するため、金融機関にとって極めて重要です。イーサリアムのアカウントモデルでは、失敗したトランザクションでもガス料金が消費される可能性があり、信頼性とコストの予測可能性が最も重要なミッションクリティカルな金融業務では受け入れがたい運用上の不確実性と追加コストが発生します。
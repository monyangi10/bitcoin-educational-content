question: ความแตกต่างพื้นฐานของสถาปัตยกรรมบล็อกเชนที่ทำให้ Liquid เหมาะสมมากกว่าสำหรับการดำเนินงานทางการเงินที่มีความสำคัญต่อภารกิจเมื่อเทียบกับแพลตฟอร์มการโทเค็นที่ใช้ Ethereum คืออะไร?
answer: Liquid ใช้โมเดล UTXO ของ Bitcoin ซึ่งให้ผลลัพธ์ของธุรกรรมที่แน่นอน ในขณะที่โมเดลบัญชีของ Ethereum อาจทำให้เกิดธุรกรรมที่ล้มเหลวแต่ยังคงใช้ค่าธรรมเนียมแก๊ส
wrong_answers:
  - Liquid ทำงานบนกลไกฉันทามติแบบ proof-of-stake ในขณะที่ Ethereum อาศัย proof-of-work mining ที่ใช้พลังงานมากสำหรับการตรวจสอบธุรกรรม
  - "โครงสร้างไซด์เชนแบบเฟเดอเรตของ Liquid ช่วยให้สามารถทำธุรกรรมได้ไม่จำกัด ในขณะที่ Ethereum ถูกจำกัดด้วยขนาดบล็อกของเชนเดียว"
  - Liquid ใช้งานฟังก์ชันสัญญาอัจฉริยะพื้นฐานผ่านการสคริปต์ Elements ในขณะที่ Ethereum ต้องการสภาพแวดล้อมการดำเนินการเครื่องเสมือนภายนอก
explanation: |
  ลักษณะการกำหนดแน่นอนของรุ่น UTXO มีความสำคัญอย่างยิ่งสำหรับสถาบันการเงิน เพราะการทำธุรกรรมจะสำเร็จสมบูรณ์หรือไม่ก็ล้มเหลวโดยไม่มีค่าใช้จ่ายใด ๆ ทำให้ได้ผลลัพธ์ที่คาดการณ์ได้ โมเดลบัญชีของ Ethereum อาจทำให้เกิดการทำธุรกรรมที่ล้มเหลวแต่ยังคงใช้ค่าธรรมเนียมแก๊ส ซึ่งสร้างความไม่แน่นอนในการดำเนินงานและค่าใช้จ่ายเพิ่มเติมที่ไม่สามารถยอมรับได้สำหรับการดำเนินงานทางการเงินที่มีความสำคัญต่อภารกิจซึ่งความน่าเชื่อถือและการคาดการณ์ค่าใช้จ่ายเป็นสิ่งสำคัญสูงสุด
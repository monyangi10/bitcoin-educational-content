question: تفاوت اساسی در معماری بلاکچین که Liquid را برای عملیات مالی حیاتی مناسب‌تر از پلتفرم‌های توکنیزاسیون مبتنی بر اتریوم می‌سازد چیست؟
answer: Liquid از مدل UTXO متعلق به Bitcoin استفاده می‌کند که نتایج تراکنش‌های قطعی را فراهم می‌کند، در حالی که مدل حساب اتریوم می‌تواند منجر به تراکنش‌های ناموفق شود که همچنان هزینه‌های گاز را مصرف می‌کنند.
wrong_answers:
  - Liquid بر روی یک مکانیزم اجماع اثبات سهام عمل می‌کند در حالی که اتریوم برای اعتبارسنجی تراکنش‌ها به proof-of-work mining که انرژی‌بر است، متکی است.
  - "ساختار زنجیره جانبی فدرال Liquid امکان پردازش نامحدود تراکنش‌ها را فراهم می‌کند، در حالی که اتریوم به دلیل محدودیت‌های اندازه بلوک زنجیره واحد محدود شده است"
  - Liquid از طریق اسکریپت‌نویسی Elements قابلیت قرارداد هوشمند بومی را پیاده‌سازی می‌کند، در حالی که اتریوم به محیط‌های اجرایی ماشین مجازی خارجی نیاز دارد.
explanation: |
  ماهیت قطعی مدل UTXO برای مؤسسات مالی بسیار مهم است زیرا تراکنش‌ها یا به‌طور کامل موفق می‌شوند یا بدون هیچ هزینه‌ای شکست می‌خورند و نتایج قابل پیش‌بینی ارائه می‌دهند. مدل حساب اتریوم می‌تواند منجر به تراکنش‌های ناموفقی شود که همچنان هزینه‌های گاز را مصرف می‌کنند و عدم قطعیت عملیاتی و هزینه‌های اضافی ایجاد می‌کنند که برای عملیات مالی حیاتی که در آن قابلیت اطمینان و پیش‌بینی هزینه‌ها بسیار مهم است، غیرقابل قبول هستند.
question: पारंपरिक SegWit v0 HTLC की तुलना में क्रॉस-लेयर स्वैप के लिए MuSig2 के साथ Taproot का उपयोग करने का प्राथमिक लाभ क्या है?
answer: सहकारी स्वैप मानक एकल-हस्ताक्षर लेनदेन के रूप में दिखाई देते हैं, जो पूर्ण गोपनीयता और न्यूनतम ब्लॉक स्पेस उपयोग सुनिश्चित करते हैं।
wrong_answers:
  - Taproot टाइम लॉक की आवश्यकता को समाप्त करता है, जिससे स्वैप पुराने HTLC की तुलना में तेज़ और अधिक कुशल हो जाते हैं।
  - MuSig2 एक साथ कई हैश लॉक का उपयोग करने की अनुमति देता है, जिससे अधिक जटिल बहु-पक्षीय स्वैप व्यवस्थाएं संभव हो पाती हैं।
  - जीडब्ल्यू-3 स्वैप को बिना किसी क्रिप्टोग्राफिक रहस्य को उजागर किए पूरा किया जा सकता है, जबकि पारंपरिक एचटीएलसी में हमेशा प्रीइमेज उजागर होते थे।
explanation: |
  MuSig2 के साथ Taproot कुंजी एकत्रीकरण के माध्यम से HTLC की गोपनीयता में क्रांतिकारी बदलाव लाता है। सहयोगात्मक 'हैप्पी पाथ' में, दोनों पक्ष अपनी कुंजियों को एक एकल एकत्रित सार्वजनिक कुंजी में मिलाते हैं और लेन-देन पर सह-हस्ताक्षर करते हैं। इससे स्वैप एक सामान्य भुगतान से अलग नहीं दिखता, न्यूनतम ब्लॉक स्थान का उपयोग होता है और स्वैप की कोई भी शर्त प्रकट नहीं होती। पुराने SegWit v0 HTLC को संपूर्ण स्क्रिप्ट लॉजिक on-chain प्रकाशित करने की आवश्यकता होती थी, जिससे वे आसानी से पहचाने जा सकते थे और अधिक महंगे थे। अन्य विकल्प गलत हैं: सुरक्षा के लिए टाइम लॉक अभी भी आवश्यक हैं, मल्टीपल हैश लॉक कोई प्रमुख नवाचार नहीं हैं, और धनराशि का दावा करते समय प्रीइमेज अभी भी प्रकट होते हैं।
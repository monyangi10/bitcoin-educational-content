question: 與傳統的 SegWit v0 HTLC 相比，使用 Taproot 搭配 MuSig2 進行跨層交換的主要優勢是什麼？
answer: 合作交換顯示為標準的單一簽章交易，提供完全隱私，並將區塊空間使用量降至最低
wrong_answers:
  - Taproot 不需要時間鎖定，與傳統 HTLC 相比，交換速度更快、效率更高
  - MuSig2 允許同時使用多個雜湊鎖定，可實現更複雜的多方交換安排
  - Taproot 可在不洩露任何加密機密的情況下完成交換，不像傳統 HTLC 總是會暴露預先影像
explanation: |
  使用 MuSig2 的 Taproot 透過金鑰聚合革新了 HTLC 的隱私權。在合作的「快樂路徑」中，雙方將其金鑰結合為單一的聚合公開金鑰，並共同簽署交易。這使得交換與一般付款無異，只需消耗最小的區塊空間，也不會透露任何交換條件。傳統的 SegWit v0 HTLC 需要發佈整個腳本邏輯 on-chain，使得它們很容易被識別，也更昂貴。其他選項是不正確的：時間鎖仍是安全的必要條件，多重哈希鎖並非創新的關鍵，而且在要求資金時仍會揭露預設影像。
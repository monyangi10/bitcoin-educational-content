question: レガシーのSegWit v0 HTLCと比較して、TaprootとMuSig2をクロスレイヤースワップに使用する主な利点は何ですか？
answer: 協調スワップは標準的な単一署名トランザクションとして表示され、完全なプライバシーと最小限のブロックスペースしか使用しません。
wrong_answers:
  - Taprootはタイムロックの必要性を排除し、従来のHTLCよりもスワップを高速かつ効率的に行う。
  - MuSig2では、複数のハッシュロックを同時に使用することができ、より複雑な複数当事者のスワップ協定を可能にする。
  - Taprootのスワップは、常に事前画像を公開する従来のHTLCとは異なり、暗号化された秘密を明かすことなく完了することができる。
explanation: |
  TaprootとMuSig2は、鍵の集約を通じてHTLCのプライバシーに革命をもたらす。協調的な「ハッピー・パス」では、両パーティーはそれぞれの鍵を1つの集約された公開鍵に結合し、トランザクションに共同署名する。これによりスワップは通常の支払いと見分けがつかなくなり、最小限のブロック・スペースしか消費せず、スワップ条件も明らかにならない。レガシーSegWit v0 HTLCはスクリプト・ロジックon-chain全体を公開する必要があり、識別が容易で高価である。他の選択肢は正しくない：時間ロックは依然として安全性のために不可欠であり、複数のハッシュロックは重要な技術革新ではなく、資金を請求する際にプリイメージは依然として明らかにされる。
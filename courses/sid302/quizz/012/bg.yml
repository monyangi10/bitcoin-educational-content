question: Кое е основното предимство на използването на Taproot с MuSig2 за междуслойно разменяне в сравнение с наследените HTLC на SegWit v0?
answer: Кооперативните суапове изглеждат като стандартни транзакции с един подпис, което осигурява пълна поверителност и минимално използване на блоково пространство
wrong_answers:
  - Taproot елиминира нуждата от времеви блокировки, което прави смяната по-бърза и по-ефективна от старите HTLC
  - MuSig2 позволява едновременното използване на няколко хеш-блокировки, което позволява по-сложни споразумения за размяна между няколко страни
  - Смяната на Taproot може да се извърши, без да се разкриват криптографски тайни, за разлика от старите HTLC, които винаги разкриват предварителни изображения
explanation: |
  Taproot с MuSig2 революционизира поверителността на HTLC чрез агрегиране на ключове. При съвместния "щастлив път" двете страни обединяват ключовете си в един обобщен публичен ключ и подписват съвместно транзакцията. Това прави размяната неразличима от обикновено плащане, като консумира минимално блоково пространство и не разкрива условията на размяната. Наследствените SegWit v0 HTLC изискваха публикуване на цялата логика на скрипта on-chain, което ги правеше лесно разпознаваеми и по-скъпи. Другите варианти са некоректни: времевите ключалки остават от съществено значение за безопасността, множеството хеш-ключалки не са ключовото нововъведение и предварителните изображения все още се разкриват при заявяване на средства.
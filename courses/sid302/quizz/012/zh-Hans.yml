question: 与传统的 SegWit v0 HTLC 相比，使用带有 MuSig2 的 Taproot 进行跨层交换的主要优势是什么？
answer: 合作交换显示为标准的单签名交易，提供完全的隐私保护，并将区块空间使用量降至最低
wrong_answers:
  - Taproot 无需时间锁定，与传统 HTLC 相比，交换速度更快，效率更高
  - MuSig2 允许同时使用多个哈希锁，从而实现更复杂的多方交换安排
  - 与总是暴露预图像的传统 HTLC 不同，Taproot 交换可以在不泄露任何密码秘密的情况下完成
explanation: |
  带有 MuSig2 的 Taproot 通过密钥聚合彻底改变了 HTLC 的隐私性。在合作的 "快乐路径 "中，双方将各自的密钥合并成一个单一的聚合公钥，并共同签署交易。这使得交换与普通支付无异，消耗的区块空间最小，而且不会泄露交换条件。传统的 SegWit v0 HTLC 需要发布整个脚本逻辑 on-chain，因此很容易识别，而且成本更高。其他选项都不正确：时间锁仍然是安全的必要条件，多重哈希锁不是关键的创新，在申请资金时仍然会显示预图像。
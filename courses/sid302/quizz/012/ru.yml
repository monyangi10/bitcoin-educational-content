question: В чем основное преимущество использования Taproot с MuSig2 для межслойных обменов по сравнению с устаревшими HTLC SegWit v0?
answer: Кооперативные свопы выглядят как стандартные транзакции с одной подписью, обеспечивая полную конфиденциальность и минимальное использование пространства в блоках
wrong_answers:
  - Taproot исключает необходимость временной блокировки, делая обмен быстрее и эффективнее, чем у традиционных HTLC
  - MuSig2 позволяет одновременно использовать несколько хэш-блокировок, что делает возможным более сложные многосторонние соглашения об обмене
  - Обмен Taproot может быть выполнен без раскрытия криптографических секретов, в отличие от традиционных HTLC, которые всегда раскрывают предварительные изображения
explanation: |
  Taproot с MuSig2 революционизирует конфиденциальность HTLC благодаря объединению ключей. В кооперативном "счастливом пути" обе стороны объединяют свои ключи в единый агрегированный открытый ключ и совместно подписывают транзакцию. Это делает своп неотличимым от обычного платежа, занимая минимум места в блоке и не раскрывая условий свопа. Устаревшие HTLC SegWit v0 требовали публикации всей логики сценария on-chain, что делало их легко идентифицируемыми и более дорогими. Остальные варианты неверны: временные блокировки по-прежнему важны для безопасности, множественные хэш-блокировки не являются ключевым нововведением, а предварительные изображения по-прежнему раскрываются при требовании средств.
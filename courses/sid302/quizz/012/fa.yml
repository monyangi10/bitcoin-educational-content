question: مزیت اصلی استفاده از Taproot با MuSig2 برای مبادلات بین لایه‌ای در مقایسه با HTLCهای قدیمی SegWit v0 چیست؟
answer: مبادله‌های تعاونی به‌صورت تراکنش‌های استاندارد با امضای واحد ظاهر می‌شوند و حریم خصوصی کامل و استفاده حداقلی از فضای بلاک را فراهم می‌کنند
wrong_answers:
  - Taproot نیاز به قفل‌های زمانی را از بین می‌برد و مبادلات را سریع‌تر و کارآمدتر از HTLCهای قدیمی می‌کند.
  - MuSig2 اجازه می‌دهد تا چندین قفل هش به‌طور همزمان استفاده شوند و این امکان را فراهم می‌کند تا ترتیبات مبادله چندطرفه پیچیده‌تری صورت گیرد.
  - مبادله‌های Taproot می‌توانند بدون افشای هیچ‌گونه اسرار رمزنگاری انجام شوند، برخلاف HTLCهای قدیمی که همیشه پیش‌تصاویر را فاش می‌کنند.
explanation: |
  Taproot با MuSig2 حریم خصوصی HTLC را از طریق تجمیع کلید متحول می‌کند. در مسیر همکاری 'مسیر خوشحال'، هر دو طرف کلیدهای خود را به یک کلید عمومی تجمیع‌شده ترکیب کرده و تراکنش را هم‌امضا می‌کنند. این کار باعث می‌شود که مبادله از یک پرداخت معمولی غیرقابل تشخیص باشد، فضای بلاک کمی مصرف کند و شرایط مبادله را فاش نکند. HTLCهای نسخه 0 SegWit قدیمی نیاز به انتشار کل منطق اسکریپت on-chain داشتند که آن‌ها را به راحتی قابل شناسایی و گران‌تر می‌کرد. گزینه‌های دیگر نادرست هستند: قفل‌های زمانی برای ایمنی ضروری باقی می‌مانند، قفل‌های هش متعدد نوآوری اصلی نیستند و پیش‌تصاویر همچنان هنگام ادعای وجوه فاش می‌شوند.
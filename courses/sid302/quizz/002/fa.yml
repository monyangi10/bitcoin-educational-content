question: چند وقت یکبار بلوک‌های جدید در Liquid Network تولید می‌شوند؟
answer: هر دقیقه
wrong_answers:
  - هر ۱۰ دقیقه
  - هر ۳۰ ثانیه
  - هر ۵ دقیقه
explanation: |
  Liquid Network بلوک‌ها را هر دقیقه به صورت دورگرد تعیین‌کننده تولید می‌کند، که بسیار سریع‌تر و قابل پیش‌بینی‌تر از فواصل احتمالی 10 دقیقه‌ای Bitcoin است. این زمان‌بندی دقیق یک دقیقه‌ای برای موارد استفاده شبکه مانند آربیتراژ و تسویه سریع بین‌الاکسچنجی حیاتی است و سرعت مورد نیاز برای عملیات تجاری نهادی را فراهم می‌کند.
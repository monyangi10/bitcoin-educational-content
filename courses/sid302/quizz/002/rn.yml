question: Ni kangahe amabuye mashasha avugwa muri Liquid Network?
answer: Buri munota
wrong_answers:
  - Buri minota 10
  - Buri masegonda 30
  - Buri minota 5
explanation: |
  Liquid Network itanga amabuye buri munota mu buryo bw’uruziga, ivyo bikaba vyihuta cane kandi bishobora gutegekanirwa kuruta ibihe vy’iminota 10 vy’ibishoboka vya Bitcoin. Ico gihe nyaco c’umunota umwe ni ikintu gihambaye cane ku bijanye n’ikoreshwa ry’urubuga nk’ugukemura ibibazo n’ugutorera umuti ibibazo vyihuta hagati y’ubudandaji, bikaba bitanga umuvuduko ukenewe ku bikorwa vy’ubudandaji vy’inzego.
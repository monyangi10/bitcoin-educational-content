question: Колко често се генерират нови блокове в Liquid Network?
answer: Всяка минута
wrong_answers:
  - На всеки 10 минути
  - На всеки 30 секунди
  - На всеки 5 минути
explanation: |
  Liquid Network произвежда блокове на всяка минута по детерминистичен начин с кръгово разпределение, което е много по-бързо и предвидимо от вероятностните 10-минутни интервали на Bitcoin. Това прецизно едноминутно време е от решаващо значение за случаите на използване на мрежата, като арбитраж и бърз междуборсов сетълмент, като осигурява скоростта, необходима за институционалните търговски операции.
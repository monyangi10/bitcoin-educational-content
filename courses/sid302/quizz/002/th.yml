question: บล็อกใหม่ถูกสร้างขึ้นบ่อยแค่ไหนใน Liquid Network?
answer: ทุกนาที
wrong_answers:
  - ทุก ๆ 10 นาที
  - ทุก ๆ 30 วินาที
  - ทุก ๆ 5 นาที
explanation: |
  Liquid Network ผลิตบล็อกทุกนาทีในรูปแบบการหมุนเวียนที่กำหนดไว้ล่วงหน้า ซึ่งเร็วกว่ามากและคาดการณ์ได้มากกว่า Bitcoin ที่มีช่วงเวลา 10 นาทีแบบสุ่ม ความแม่นยำของการจับเวลาหนึ่งนาทีนี้มีความสำคัญต่อกรณีการใช้งานของเครือข่าย เช่น การเก็งกำไรและการชำระบัญชีระหว่างการแลกเปลี่ยนอย่างรวดเร็ว ซึ่งให้ความเร็วที่จำเป็นสำหรับการดำเนินการซื้อขายของสถาบัน
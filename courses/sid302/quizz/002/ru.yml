question: Как часто генерируются новые блоки в Liquid Network?
answer: Каждую минуту
wrong_answers:
  - Каждые 10 минут
  - Каждые 30 секунд
  - Каждые 5 минут
explanation: |
  Liquid Network производит блоки каждую минуту в детерминированном режиме round-robin, что гораздо быстрее и предсказуемее, чем вероятностные 10-минутные интервалы Bitcoin. Такой точный поминутный интервал крайне важен для использования сети в таких случаях, как арбитраж и быстрые межбиржевые расчеты, обеспечивая скорость, необходимую для институциональных торговых операций.
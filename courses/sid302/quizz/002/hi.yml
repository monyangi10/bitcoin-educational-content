question: Liquid Network में नए ब्लॉक कितनी बार उत्पन्न होते हैं?
answer: हर मिनट
wrong_answers:
  - हर 10 मिनट में
  - हर 30 सेकंड में
  - हर 5 मिनट में
explanation: |
  Liquid Network एक निश्चित राउंड-रोबिन तरीके से हर मिनट ब्लॉक उत्पन्न करता है, जो Bitcoin के संभाव्य 10-मिनट के अंतराल की तुलना में कहीं अधिक तेज़ और पूर्वानुमान योग्य है। यह सटीक एक-मिनट का समय नेटवर्क के उपयोग के मामलों जैसे आर्बिट्रेज और तीव्र इंटर-एक्सचेंज सेटलमेंट के लिए महत्वपूर्ण है, जो संस्थागत ट्रेडिंग संचालन के लिए आवश्यक गति प्रदान करता है।
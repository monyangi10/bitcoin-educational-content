question: ライトニング・センド・サブマリン・スワップにおいて、スワップ・プロバイダがライトニングの請求書を支払った後、ロックされたLiquid資金を請求できるようにする特定の暗号化要素は何か？
answer: ライトニング決済の決済前画像は、エスクローされたLiquid資金のロックを解除する暗号キーとして機能する。
wrong_answers:
  - 最初のLiquidロックアップ・トランザクションで生成されたハッシュ・タイムロック契約署名は、次のようなアクセスを提供する。
  - WebSocket接続メタデータには、プロバイダへの資金放出を承認するアンロックキーが含まれる。
  - "スワップ提供者の秘密鍵は、ライトニングの入金確認が取れ次第、自動的に資金のロックを解除する"
explanation: |
  支払いプリイメージは、Lightningによる支払いが正常に完了したことを証明する暗号領収書です。サブマリンスワップでは、このプリイメージはエスクローされた Liquid 資金のロック解除キーとして機能し、アトミック性を保証します。他の選択肢は、必要とされる具体的な支払い証明を提供しない一般的な暗号要素、またはアトミックスワップの信頼性を損なう不正確なメカニズムを説明している。
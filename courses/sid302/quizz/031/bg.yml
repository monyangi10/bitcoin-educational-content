question: Кой специфичен криптографски елемент позволява на доставчика на суап да претендира за блокираните средства на Liquid след плащане на фактурата на Lightning?
answer: Предварителният образ на плащането от плащането Lightning служи като криптографски ключ за отключване на депозираните средства на Liquid
wrong_answers:
  - Подписът на договора за хеш-блокиране във времето, генериран по време на първоначалната транзакция за блокиране на Liquid, осигурява достъп до
  - Метаданните на WebSocket връзката съдържат ключа за отключване, който разрешава освобождаването на средства към доставчика
  - "Частният ключ на доставчика на суап автоматично отключва средствата, след като бъде получено потвърждението за плащане с мълния"
explanation: |
  Предварителният образ на плащането е криптографската разписка, която доказва, че плащането със светкавица е било успешно извършено. При подводните суапове този предварителен образ действа като ключ за отключване на ескроуваните средства по Liquid, като осигурява атомичност - доставчикът на суапа може да претендира за средствата по Liquid само ако действително е платил фактурата по Lightning. Другите варианти описват или общи криптографски елементи, които не осигуряват необходимото специфично доказателство за плащане, или неправилни механизми, които биха компрометирали ненадеждния характер на атомарния суап.
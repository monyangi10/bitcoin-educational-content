question: ใน Lightning Send submarine swap องค์ประกอบการเข้ารหัสเฉพาะที่อนุญาตให้ผู้ให้บริการ swap สามารถเรียกร้องเงิน Liquid ที่ถูกล็อกหลังจากชำระใบแจ้งหนี้ Lightning คืออะไร?
answer: ภาพลักษณ์การชำระเงินจากการชำระเงินผ่าน Lightning ทำหน้าที่เป็นกุญแจเข้ารหัสเพื่อปลดล็อกเงิน Liquid ที่ถูกเก็บไว้ในเอสโครว์
wrong_answers:
  - ลายเซ็นสัญญาล็อคเวลาแฮชที่สร้างขึ้นระหว่างการทำธุรกรรมล็อคอัพ Liquid เริ่มต้นให้การเข้าถึง
  - เมตาดาทาการเชื่อมต่อ WebSocket มีคีย์ปลดล็อกที่อนุญาตให้ปล่อยเงินทุนไปยังผู้ให้บริการ
  - "คีย์ส่วนตัวของผู้ให้บริการสวอปจะปลดล็อกเงินโดยอัตโนมัติเมื่อได้รับการยืนยันการชำระเงินผ่าน Lightning"
explanation: |
  ภาพลักษณ์การชำระเงินเป็นใบเสร็จรับเงินเข้ารหัสที่พิสูจน์ว่าการชำระเงินผ่าน Lightning เสร็จสมบูรณ์แล้ว ในการแลกเปลี่ยนแบบใต้น้ำ ภาพลักษณ์นี้ทำหน้าที่เป็นกุญแจปลดล็อกสำหรับกองทุน Liquid ที่ถูกเก็บไว้ในเอสโครว์ เพื่อให้มั่นใจในความเป็นอะตอม - ผู้ให้บริการแลกเปลี่ยนสามารถเรียกร้องกองทุน Liquid ได้ก็ต่อเมื่อพวกเขาชำระเงินตามใบแจ้งหนี้ Lightning จริง ๆ ตัวเลือกอื่น ๆ อธิบายถึงองค์ประกอบการเข้ารหัสทั่วไปที่ไม่ให้หลักฐานการชำระเงินเฉพาะที่จำเป็น หรือกลไกที่ไม่ถูกต้องที่จะทำลายธรรมชาติที่ไม่ต้องเชื่อถือของการแลกเปลี่ยนอะตอม.
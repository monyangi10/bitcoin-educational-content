question: 라이트닝 전송 서브마린 스왑에서 스왑 제공자가 라이트닝 인보이스를 지불한 후 잠긴 Liquid 자금을 청구할 수 있는 특정 암호화 요소는 무엇인가요?
answer: 라이트닝 결제의 결제 미리보기 이미지는 에스크로된 Liquid 자금을 잠금 해제하는 암호화 키 역할을 합니다
wrong_answers:
  - 초기 Liquid 락업 트랜잭션 중에 생성된 해시 타임록 컨트랙트 서명은 액세스를 제공합니다
  - 웹소켓 연결 메타데이터에는 공급자에게 자금 릴리스를 승인하는 잠금 해제 키가 포함되어 있습니다
  - "라이트닝 결제 확인을 받으면 스왑 제공자의 개인키가 자동으로 자금 잠금을 해제합니다."
explanation: |
  결제 프리이미지는 라이트닝 결제가 성공적으로 완료되었음을 증명하는 암호화 영수증입니다. 서브마린 스왑에서 이 프리이미지는 에스크로된 Liquid 자금의 잠금 해제 키 역할을 하여 원자성을 보장하며, 스왑 제공자는 실제로 라이트닝 인보이스를 지불한 경우에만 Liquid 자금을 청구할 수 있습니다. 다른 옵션은 필요한 구체적인 결제 증명을 제공하지 않는 일반적인 암호화 요소 또는 원자 스왑의 신뢰 없는 특성을 손상시킬 수 있는 잘못된 메커니즘을 설명합니다.
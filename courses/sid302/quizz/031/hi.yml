question: लाइटनिंग सेंड सबमरीन स्वैप में, कौन सा विशिष्ट क्रिप्टोग्राफिक तत्व स्वैप प्रदाता को लाइटनिंग इनवॉइस का भुगतान करने के बाद लॉक किए गए Liquid फंड पर दावा करने की अनुमति देता है?
answer: लाइटनिंग पेमेंट से प्राप्त पेमेंट प्रीइमेज, एस्क्रो में रखे गए Liquid फंड को अनलॉक करने के लिए क्रिप्टोग्राफिक कुंजी के रूप में कार्य करता है।
wrong_answers:
  - प्रारंभिक Liquid लॉक-अप लेनदेन के दौरान उत्पन्न हैश टाइम-लॉक अनुबंध हस्ताक्षर पहुंच प्रदान करता है।
  - वेब सॉकेट कनेक्शन मेटाडेटा में अनलॉक कुंजी होती है जो प्रदाता को धनराशि जारी करने की अनुमति देती है।
  - "स्वैप प्रदाता की निजी कुंजी लाइटनिंग भुगतान की पुष्टि प्राप्त होते ही स्वचालित रूप से धनराशि को अनलॉक कर देती है।"
explanation: |
  भुगतान प्रीइमेज एक क्रिप्टोग्राफिक रसीद है जो यह साबित करती है कि लाइटनिंग भुगतान सफलतापूर्वक पूरा हो गया है। सबमरीन स्वैप में, यह प्रीइमेज एस्क्रो में रखे गए Liquid फंड के लिए अनलॉक कुंजी का काम करती है, जिससे एटॉमिकिटी सुनिश्चित होती है - स्वैप प्रदाता Liquid फंड पर तभी दावा कर सकता है जब उसने वास्तव में लाइटनिंग इनवॉइस का भुगतान किया हो। अन्य विकल्प या तो सामान्य क्रिप्टोग्राफिक तत्वों का वर्णन करते हैं जो आवश्यक भुगतान का विशिष्ट प्रमाण प्रदान नहीं करते हैं, या गलत तंत्रों का वर्णन करते हैं जो एटॉमिक स्वैप की भरोसेमंद प्रकृति से समझौता कर सकते हैं।
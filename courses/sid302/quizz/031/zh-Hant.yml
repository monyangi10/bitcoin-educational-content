question: 在 Lightning Send 海纜交換中，什麼特定的加密元素允許交換提供商在支付 Lightning 發票後索取鎖定的 Liquid 資金？
answer: 來自 Lightning 付款的付款預設影像可作為解鎖託管 Liquid 資金的密碼鑰匙。
wrong_answers:
  - 在初始 Liquid 鎖定交易中產生的散列時間鎖定合約簽章提供存取
  - WebSocket 連線元資料包含授權提供者釋放資金的解鎖金鑰
  - 一旦收到 「閃電 」付款確認，掉期提供者的私密金鑰會自動解鎖資金"
explanation: |
  付款前影像是加密收據，證明 Lightning 付款已成功完成。在海底掉期交易中，此預置圖像作為託管 Liquid 資金的解鎖鑰匙，確保原子性 - 掉期供應商只有在實際支付 Lightning 發票的情況下，才能索取 Liquid 資金。其他選項所描述的不是無法提供所需的特定付款證明的通用加密元素，就是會損害原子交換無信任性質的不正確機制。
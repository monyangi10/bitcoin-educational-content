question: 在 "闪电发送 "海底掉期中，什么特定加密元素允许掉期提供商在支付 "闪电 "发票后要求获得锁定的 Liquid 资金？
answer: 闪电支付的支付预图像是解锁托管 Liquid 资金的加密密钥
wrong_answers:
  - 在最初的 Liquid 锁定交易中生成的哈希时间锁定合同签名提供了以下访问权限
  - WebSocket 连接元数据包含授权向提供商释放资金的解锁密钥
  - 一旦收到 "闪电 "付款确认，掉期提供商的私人密钥就会自动解锁资金。
explanation: |
  付款预图像是证明闪电付款成功完成的加密收据。在海底掉期交易中，该预图像是托管的Liquid资金的解锁密钥，可确保原子性--掉期提供商只有在实际支付了闪电发票后才能要求获得Liquid资金。其他选项要么描述的是通用加密元素，不能提供所需的特定支付证明，要么描述的是不正确的机制，会损害原子互换的无信任性质。
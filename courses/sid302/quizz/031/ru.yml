question: Какой конкретный криптографический элемент в свопе Lightning Send позволяет поставщику свопа требовать заблокированные средства Liquid после оплаты счета Lightning?
answer: Предварительный образ платежа Lightning служит криптографическим ключом для разблокировки депонированных средств Liquid
wrong_answers:
  - Хеш-подпись контракта с временной блокировкой, созданная во время первой транзакции блокировки Liquid, обеспечивает доступ
  - Метаданные соединения WebSocket содержат ключ разблокировки, который разрешает выдачу средств провайдеру
  - "Закрытый ключ своп-провайдера автоматически разблокирует средства после получения подтверждения платежа Lightning"
explanation: |
  Предварительный образ платежа - это криптографическая квитанция, подтверждающая, что платеж Lightning был успешно завершен. В подводных свопах это предварительное изображение действует как ключ разблокировки для депонированных средств Liquid, обеспечивая атомарность - поставщик свопов может требовать средства Liquid только в том случае, если он действительно оплатил счет Lightning. Остальные варианты описывают либо общие криптографические элементы, которые не обеспечивают требуемого конкретного доказательства платежа, либо некорректные механизмы, которые ставят под угрозу недоверие к атомарному свопу.
question: در یک مبادله زیردریایی Lightning Send، کدام عنصر رمزنگاری خاص به ارائه‌دهنده مبادله اجازه می‌دهد تا پس از پرداخت فاکتور Lightning، وجوه قفل‌شده Liquid را مطالبه کند؟
answer: پیش‌تصویر پرداخت از پرداخت لایتنینگ به عنوان کلید رمزنگاری برای باز کردن وجوه Liquid سپرده‌شده عمل می‌کند.
wrong_answers:
  - امضای قرارداد قفل زمانی هش تولید شده در طول تراکنش اولیه قفل Liquid دسترسی فراهم می‌کند
  - فراداده اتصال WebSocket شامل کلید بازگشایی است که آزادسازی وجوه به ارائه‌دهنده را مجاز می‌کند.
  - "کلید خصوصی ارائه‌دهنده سوآپ به‌طور خودکار وجوه را باز می‌کند وقتی تأیید پرداخت لایتنینگ دریافت شود"
explanation: |
  پیش‌تصویر پرداخت، رسید رمزنگاری‌شده‌ای است که ثابت می‌کند یک پرداخت لایتنینگ با موفقیت انجام شده است. در مبادلات زیرآبی، این پیش‌تصویر به عنوان کلید بازگشایی برای وجوه Liquid امانی عمل می‌کند و اتمیسیته را تضمین می‌کند - ارائه‌دهنده مبادله تنها در صورتی می‌تواند وجوه Liquid را مطالبه کند که واقعاً فاکتور لایتنینگ را پرداخت کرده باشد. گزینه‌های دیگر یا عناصر رمزنگاری عمومی را توصیف می‌کنند که اثبات خاص پرداخت مورد نیاز را ارائه نمی‌دهند، یا مکانیزم‌های نادرستی که ماهیت بدون اعتماد مبادله اتمی را به خطر می‌اندازند.
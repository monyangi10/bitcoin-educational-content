question: ความแตกต่างทางสถาปัตยกรรมหลักระหว่าง Blockstream AMP Version 1 และ Version 2 เกี่ยวกับการสร้างธุรกรรมและข้อกำหนดของโหนดคืออะไร?
answer: เวอร์ชัน 2 ย้ายความซับซ้อนไปยังเซิร์ฟเวอร์ซึ่งจัดการการสร้างธุรกรรมและนำเสนอ PSETs ให้กับผู้ออก ทำให้ไม่จำเป็นต้องมีการซิงโครไนซ์ full node
wrong_answers:
  - เวอร์ชัน 2 ต้องการให้ผู้ออกใช้เรียกใช้โหนด Elements หลายโหนดที่ซิงโครไนซ์เพื่อความซ้ำซ้อน ในขณะที่เวอร์ชัน 1 ต้องการเพียงการเชื่อมต่อโหนดเดียวเท่านั้น
  - เวอร์ชัน 2 ย้ายการดำเนินการเข้ารหัสทั้งหมดไปยังฮาร์ดแวร์วอลเล็ตฝั่งไคลเอ็นต์ ในขณะที่เวอร์ชัน 1 ดำเนินการลงนามทั้งหมดบนโครงสร้างพื้นฐานของเซิร์ฟเวอร์
  - เวอร์ชัน 2 กำจัดข้อกำหนดการร่วมลงนามออกไปทั้งหมดและอนุญาตให้โอนแบบเพียร์ทูเพียร์โดยตรง ในขณะที่เวอร์ชัน 1 ต้องการการอนุมัติจากเซิร์ฟเวอร์สำหรับทุกธุรกรรม
explanation: |
  วิวัฒนาการจาก AMP เวอร์ชัน 1 ไปสู่เวอร์ชัน 2 แสดงถึงการเปลี่ยนแปลงพื้นฐานจากโมเดล 'ไคลเอนต์อัจฉริยะ, โครงสร้างพื้นฐานที่ซับซ้อน' ไปสู่แนวทาง 'เซิร์ฟเวอร์อัจฉริยะ, ไคลเอนต์ที่เรียบง่าย' เวอร์ชัน 1 ต้องการให้ผู้ออกบัตรรักษาโหนด Elements ที่ซิงโครไนซ์อย่างเต็มที่และพึ่งพา SDK Green ที่เป็นโมโนลิทิกอย่างมาก ซึ่งสร้างอุปสรรคทางเทคนิคสูง เวอร์ชัน 2 ย้ายความซับซ้อนไปที่ฝั่งเซิร์ฟเวอร์ ซึ่งเซิร์ฟเวอร์ AMP จะจัดการการสร้างธุรกรรม การเลือก UTXO และการคำนวณค่าธรรมเนียม จากนั้นนำเสนอธุรกรรม Elements ที่ลงนามบางส่วน (PSETs) ให้กับผู้ออกบัตรที่ต้องการเพียงลายเซ็นเท่านั้น สิ่งนี้ช่วยขจัดความจำเป็นในการใช้โหนดเต็มรูปแบบและเปิดใช้งานการผสานรวม wallet มาตรฐาน
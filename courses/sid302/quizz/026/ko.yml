question: 트랜잭션 구성 및 노드 요구 사항과 관련하여 블록스트림 AMP 버전 1과 버전 2의 주요 아키텍처 차이점은 무엇인가요?
answer: 버전 2는 트랜잭션 구성을 처리하고 발행자에게 PSET를 제공하는 서버로 복잡성을 이동하여 full node 동기화가 필요하지 않습니다
wrong_answers:
  - 버전 1은 단일 노드 연결만 필요했지만 버전 2는 발행자가 중복성을 위해 동기화된 여러 개의 Elements 노드를 실행해야 합니다
  - 버전 1이 서버 인프라에서 모든 서명 작업을 수행한 반면, 버전 2는 모든 암호화 작업을 클라이언트 측 하드웨어 지갑으로 옮겼습니다
  - 버전 2는 공동 서명 요건을 완전히 없애고 직접 P2P 전송을 허용하며, 버전 1에서는 모든 거래에 대해 서버 승인이 필요했습니다
explanation: |
  AMP 버전 1에서 버전 2로의 진화는 '스마트 클라이언트, 복잡한 인프라' 모델에서 '스마트 서버, 간소화된 클라이언트' 접근 방식으로의 근본적인 전환을 의미합니다. 버전 1에서는 발행사가 완전히 동기화된 Elements 노드를 유지하고 모놀리식 Green SDK에 크게 의존해야 했기 때문에 기술적 장벽이 높았습니다. 버전 2는 AMP 서버가 거래 구성, UTXO 선택, 수수료 계산을 처리하는 서버 측으로 복잡성을 옮긴 다음, 발행자에게 서명만 필요한 부분 서명 Elements 거래(PSET)를 제공합니다. 이렇게 하면 전체 노드가 필요하지 않으며 표준 wallet 통합이 가능합니다.
question: トランザクションの構築とノードの要件に関して、Blockstream AMP バージョン 1 とバージョン 2 の主なアーキテクチャ上の違いは何ですか？
answer: バージョン2は、トランザクションの構築を処理するサーバーに複雑性をシフトし、発行者にPSETを提示することで、full nodeの同期を不要にする。
wrong_answers:
  - バージョン2では、発行者は冗長性のために複数の同期されたElementsノードを実行する必要がある。
  - バージョン2は、すべての暗号処理をクライアント側のハードウェア・ウォレットに移し、バージョン1はすべての署名処理をサーバー・インフラで実行する。
  - バージョン1ではすべての取引にサーバーの承認が必要だったのに対し、バージョン2では連帯保証人の要件が完全に排除され、ピアツーピアの直接送金が可能になった。
explanation: |
  AMPバージョン1からバージョン2への進化は、「スマート・クライアント、複雑なインフラ」モデルから「スマート・サーバー、簡素化されたクライアント」アプローチへの根本的な転換を意味する。バージョン1では、発行者は完全に同期されたElementsノードを維持し、モノリシックなGreen SDKに大きく依存する必要があり、高い技術的障壁がありました。バージョン2では複雑さをサーバーサイドに移し、AMPサーバーがトランザクションの構築、UTXOの選択、手数料計算を行い、署名のみを必要とする部分署名Elementsトランザクション（PSET）を発行者に提示する。これにより、フルノードの必要性がなくなり、標準的なwallet統合が可能になります。
question: Blockstream AMP 版本 1 和版本 2 在交易建構和節點需求方面的主要架構差異是什麼？
answer: 版本 2 將複雜性轉移到伺服器，由伺服器處理交易建置，並向發行者提供 PSET，省去了 full node 同步的需要。
wrong_answers:
  - 版本 2 要求簽發者執行多個同步的 Elements 節點以提供備援，而版本 1 只要求單一節點連線
  - 版本 2 將所有加密作業移至用戶端硬體錢包，而版本 1 則在伺服器基礎架構上執行所有簽署作業
  - 版本 2 完全取消了共同簽署的要求，並允許點對點直接轉帳，而版本 1 則要求每筆交易都經過伺服器授權
explanation: |
  從 AMP 第 1 版到第 2 版的演進代表了從 「智慧型用戶端、複雜基礎架構 」模式到 「智慧型伺服器、簡化用戶端 」方式的根本性轉變。版本 1 要求發行商維護完全同步的 Elements 節點，並嚴重依賴單一的 Green SDK，造成了很高的技術障礙。版本 2 將複雜性轉移到伺服器端，由 AMP 伺服器處理交易建構、UTXO 選擇和費用計算，然後向發行者提供只需簽章的部分簽章 Elements 交易 (PSET)。這樣就不需要完整的節點，並可進行標準的 wallet 整合。
question: ट्रांजैक्शन निर्माण और नोड आवश्यकताओं के संबंध में ब्लॉकस्ट्रीम एएमपी संस्करण 1 और संस्करण 2 के बीच प्राथमिक वास्तुशिल्पीय अंतर क्या है?
answer: संस्करण 2 जटिलता को सर्वर पर स्थानांतरित करता है जो लेनदेन निर्माण को संभालता है और जारीकर्ताओं को PSET प्रस्तुत करता है, जिससे full node सिंक्रोनाइज़ेशन की आवश्यकता समाप्त हो जाती है।
wrong_answers:
  - संस्करण 2 में जारीकर्ताओं को अतिरेक के लिए कई सिंक्रनाइज़्ड Elements नोड्स चलाने की आवश्यकता होती है, जबकि संस्करण 1 में केवल एक नोड कनेक्शन की आवश्यकता होती थी।
  - संस्करण 2 में सभी क्रिप्टोग्राफिक ऑपरेशन क्लाइंट-साइड हार्डवेयर वॉलेट पर स्थानांतरित कर दिए गए हैं, जबकि संस्करण 1 में सभी हस्ताक्षर ऑपरेशन सर्वर इन्फ्रास्ट्रक्चर पर किए जाते थे।
  - संस्करण 2 में सह-हस्ताक्षर की आवश्यकता पूरी तरह से समाप्त कर दी गई है और सीधे पीयर-टू-पीयर ट्रांसफर की अनुमति दी गई है, जबकि संस्करण 1 में प्रत्येक लेनदेन के लिए सर्वर प्राधिकरण की आवश्यकता थी।
explanation: |
  एएमपी संस्करण 1 से संस्करण 2 तक का विकास 'स्मार्ट क्लाइंट, जटिल बुनियादी ढांचा' मॉडल से 'स्मार्ट सर्वर, सरलीकृत क्लाइंट' दृष्टिकोण की ओर एक मौलिक बदलाव को दर्शाता है। संस्करण 1 में जारीकर्ताओं को पूरी तरह से सिंक्रनाइज़्ड Elements नोड्स बनाए रखने और मोनोलिथिक Green SDK पर अत्यधिक निर्भर रहने की आवश्यकता थी, जिससे उच्च तकनीकी बाधाएं उत्पन्न होती थीं। संस्करण 2 जटिलता को सर्वर-साइड पर स्थानांतरित करता है, जहां एएमपी सर्वर लेनदेन निर्माण, UTXO चयन और शुल्क गणना को संभालता है, और फिर जारीकर्ताओं को आंशिक रूप से हस्ताक्षरित Elements लेनदेन (PSETs) प्रस्तुत करता है, जिन पर केवल हस्ताक्षर की आवश्यकता होती है। इससे पूर्ण नोड्स की आवश्यकता समाप्त हो जाती है और मानक wallet एकीकरण सक्षम हो जाता है।
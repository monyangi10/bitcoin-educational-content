question: Каква е основната архитектурна разлика между Blockstream AMP версия 1 и версия 2 по отношение на изграждането на транзакции и изискванията към възлите?
answer: Версия 2 прехвърля сложността към сървъра, който обработва конструирането на транзакциите и представя на издателите PSET, като премахва необходимостта от синхронизиране на full node
wrong_answers:
  - Версия 2 изисква от издателите да използват няколко синхронизирани възела Elements за резервиране, докато версия 1 изискваше само връзка с един възел
  - Версия 2 премества всички криптографски операции в хардуерни портфейли от страна на клиента, докато версия 1 извършва всички операции по подписване в инфраструктурата на сървъра
  - Версия 2 премахва изцяло изискването за съподписване и позволява директни трансфери между равнопоставени партньори, докато версия 1 изискваше оторизация от сървъра за всяка транзакция
explanation: |
  Еволюцията от версия 1 на AMP към версия 2 представлява фундаментална промяна от модела "интелигентен клиент, сложна инфраструктура" към подхода "интелигентен сървър, опростен клиент". Версия 1 изискваше от емитентите да поддържат напълно синхронизирани възли Elements и да разчитат в голяма степен на монолитния SDK Green, което създаваше високи технически бариери. Версия 2 премества сложността откъм сървъра, където AMP сървърът се занимава с конструирането на транзакции, избора на UTXO и изчисляването на таксите, след което представя на издателите частично подписани транзакции Elements (PSET), които изискват само подписи. Това елиминира нуждата от пълни възли и дава възможност за стандартни интеграции на wallet.
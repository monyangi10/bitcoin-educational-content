question: Quelle est la principale différence architecturale entre la version 1 et la version 2 de Blockstream AMP en ce qui concerne la construction des transactions et les exigences relatives aux nœuds ?
answer: La version 2 déplace la complexité vers le serveur qui gère la construction de la transaction et présente aux émetteurs les PSET, éliminant ainsi la nécessité d'une synchronisation full node
wrong_answers:
  - La version 2 exige des émetteurs qu'ils utilisent plusieurs nœuds Elements synchronisés pour assurer la redondance, alors que la version 1 n'exigeait qu'une connexion à un seul nœud
  - La version 2 déplace toutes les opérations cryptographiques vers les portefeuilles matériels côté client, alors que la version 1 effectuait toutes les opérations de signature sur l'infrastructure du serveur
  - La version 2 élimine totalement l'obligation de cosignature et permet des transferts directs de poste à poste, alors que la version 1 exigeait l'autorisation du serveur pour chaque transaction
explanation: |
  L'évolution de la version 1 à la version 2 du PGA représente un changement fondamental d'un modèle "client intelligent, infrastructure complexe" à une approche "serveur intelligent, client simplifié". La version 1 exigeait des émetteurs qu'ils maintiennent des nœuds Elements entièrement synchronisés et qu'ils s'appuient fortement sur le SDK monolithique Green, ce qui créait des obstacles techniques importants. La version 2 déplace la complexité du côté du serveur, où le serveur AMP gère la construction des transactions, la sélection des UTXO et le calcul des frais, puis présente aux émetteurs des transactions Elements partiellement signées (PSET) qui ne requièrent que des signatures. Cela élimine le besoin de nœuds complets et permet des intégrations wallet standard.
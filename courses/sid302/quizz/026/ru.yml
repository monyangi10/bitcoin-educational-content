question: В чем заключается основное архитектурное различие между Blockstream AMP Version 1 и Version 2 в отношении построения транзакций и требований к узлам?
answer: Версия 2 переносит сложность на сервер, который обрабатывает создание транзакций и представляет эмитентам PSET, устраняя необходимость в синхронизации full node
wrong_answers:
  - Версия 2 требует от эмитентов использования нескольких синхронизированных узлов Elements для резервирования, в то время как версия 1 требовала подключения только одного узла
  - Версия 2 переносит все криптографические операции в аппаратные кошельки на стороне клиента, в то время как версия 1 выполняет все операции подписания на серверной инфраструктуре
  - Версия 2 полностью исключает требование подписи и позволяет осуществлять прямые одноранговые переводы, в то время как версия 1 требует авторизации на сервере для каждой транзакции
explanation: |
  Эволюция от AMP версии 1 к версии 2 представляет собой фундаментальный переход от модели "умный клиент, сложная инфраструктура" к подходу "умный сервер, упрощенный клиент". Версия 1 требовала от эмитентов поддерживать полностью синхронизированные узлы Elements и в значительной степени полагаться на монолитный Green SDK, что создавало высокие технические барьеры. В версии 2 вся сложность переносится на сервер, где сервер AMP обрабатывает построение транзакций, выбор UTXO и расчет комиссии, а затем представляет эмитентам частично подписанные транзакции Elements (PSET), для которых требуются только подписи. Это устраняет необходимость в полных узлах и позволяет осуществлять стандартные интеграции wallet.
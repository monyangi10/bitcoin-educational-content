question: تفاوت اصلی معماری بین Blockstream AMP نسخه 1 و نسخه 2 در مورد ساخت تراکنش و نیازهای نود چیست؟
answer: نسخه 2 پیچیدگی را به سرور منتقل می‌کند که ساخت تراکنش را مدیریت کرده و PSETها را به صادرکنندگان ارائه می‌دهد و نیاز به همگام‌سازی full node را از بین می‌برد.
wrong_answers:
  - نسخه ۲ نیاز دارد که صادرکنندگان چندین نود Elements همگام‌سازی‌شده را برای افزونگی اجرا کنند، در حالی که نسخه ۱ تنها به یک اتصال نود واحد نیاز داشت.
  - نسخه ۲ تمام عملیات رمزنگاری را به کیف پول‌های سخت‌افزاری سمت مشتری منتقل می‌کند، در حالی که نسخه ۱ تمام عملیات امضا را بر روی زیرساخت سرور انجام می‌داد.
  - نسخه ۲ به‌طور کامل نیاز به امضای مشترک را حذف می‌کند و انتقال‌های مستقیم همتا به همتا را امکان‌پذیر می‌سازد، در حالی که نسخه ۱ برای هر تراکنش به مجوز سرور نیاز داشت.
explanation: |
  تکامل از نسخه AMP 1 به نسخه 2 نشان‌دهنده یک تغییر اساسی از مدل 'کلاینت هوشمند، زیرساخت پیچیده' به رویکرد 'سرور هوشمند، کلاینت ساده‌شده' است. نسخه 1 نیاز داشت که صادرکنندگان نودهای Elements کاملاً همگام‌سازی شده را نگهداری کنند و به شدت به SDK یکپارچه Green متکی بودند که موانع فنی بالایی ایجاد می‌کرد. نسخه 2 پیچیدگی را به سمت سرور منتقل می‌کند، جایی که سرور AMP ساخت تراکنش، انتخاب UTXO و محاسبه هزینه را مدیریت می‌کند و سپس به صادرکنندگان تراکنش‌های Elements امضا نشده جزئی (PSETs) ارائه می‌دهد که فقط به امضا نیاز دارند. این امر نیاز به نودهای کامل را از بین می‌برد و امکان ادغام‌های استاندارد wallet را فراهم می‌کند.
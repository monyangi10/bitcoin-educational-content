question: Blockstream AMP 第一版和第二版在交易构建和节点要求方面的主要架构区别是什么？
answer: 第 2 版将复杂性转移到服务器，由其处理交易构建，并向发行人提供 PSET，从而消除了 full node 同步的需要
wrong_answers:
  - 第 2 版要求发行机构运行多个同步 Elements 节点以实现冗余，而第 1 版只要求单个节点连接
  - 版本 2 将所有加密操作移至客户端硬件钱包，而版本 1 则在服务器基础设施上执行所有签名操作
  - 第 2 版完全取消了联署要求，允许点对点直接转账，而第 1 版则要求每笔交易都要经过服务器授权
explanation: |
  从 AMP 版本 1 到版本 2 的演变代表着从 "智能客户端、复杂基础设施 "模式到 "智能服务器、简化客户端 "方法的根本性转变。第 1 版要求发行商维护完全同步的 Elements 节点，并严重依赖单片式 Green SDK，这造成了很高的技术障碍。版本 2 将复杂性转移到服务器端，由 AMP 服务器处理交易构建、UTXO 选择和费用计算，然后向发行商提供只需签名的部分签名 Elements 交易（PSET）。这样就不再需要完整的节点，并实现了标准的 wallet 集成。
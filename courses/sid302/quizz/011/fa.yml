question: وقتی یک ارائه‌دهنده خدمات یک فاکتور لایتنینگ را برای تکمیل یک مبادله Liquid-to-Lightning با استفاده از HTLCها پرداخت می‌کند، چه اتفاقی می‌افتد؟
answer: ارائه‌دهنده پیش‌تصویر را از پرداخت لایتنینگ دریافت می‌کند، که سپس می‌تواند از آن برای باز کردن قفل و مطالبه L-BTC از HTLC استفاده کند.
wrong_answers:
  - ارائه‌دهنده باید منتظر بماند تا قفل زمانی منقضی شود تا بتواند به L-BTC قفل‌شده در قرارداد HTLC دسترسی پیدا کند.
  - "مشتری به‌طور خودکار پیش‌تصویر را دریافت می‌کند و از آن برای آزادسازی L-BTC به‌طور مستقیم به Liquid wallet ارائه‌دهنده استفاده می‌کند"
  - قرارداد HTLC به‌طور خودکار اجرا می‌شود و L-BTC را به ارائه‌دهنده منتقل می‌کند بدون اینکه نیاز به هیچ‌گونه اثبات رمزنگاری اضافی باشد.
explanation: |
  HTLCها از طریق اتصال رمزنگاری با استفاده از همان قفل هش در هر دو شبکه، مبادلات اتمی ایجاد می‌کنند. هنگامی که ارائه‌دهنده با موفقیت فاکتور لایتنینگ را پرداخت می‌کند، آن‌ها پیش‌تصویر (راز) را که با قفل هش مطابقت دارد، به دست می‌آورند. این پیش‌تصویر کلید رمزنگاری است که به آن‌ها اجازه می‌دهد L-BTC که قبلاً در HTLC قفل شده بود را باز کنند. گزینه‌های دیگر نادرست هستند زیرا آن‌ها ماهیت اتمی HTLCها را منعکس نمی‌کنند - قفل زمانی تنها یک مکانیزم پشتیبان است، مشتریان توزیع پیش‌تصویر را مدیریت نمی‌کنند، و HTLCها به اثبات رمزنگاری فعال نیاز دارند نه اجرای خودکار.
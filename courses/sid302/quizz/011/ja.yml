question: サービスプロバイダがライトニングに請求書を支払い、HTLCを使用してLiquidからライトニングへのスワップを完了した場合はどうなるのか？
answer: プロバイダーはライトニング決済からプリイメージを受け取り、それを使ってHTLCからL-BTCのロックを解除し、請求することができます。
wrong_answers:
  - プロバイダーは、HTLC契約にロックされたL-BTCにアクセスする前に、時間ロックが切れるのを待たなければならない。
  - "クライアントは自動的にプリイメージを受け取り、それを使ってプロバイダーのLiquid walletに直接L-BTCをリリースする"
  - HTLC契約は自動的に実行され、追加の暗号証明を必要とすることなく、L-BTCをプロバイダに移転する。
explanation: |
  HTLCは、両方のネットワーク上で同じハッシュロックを使用する暗号バインディングによってアトミックスワップを作成する。プロバイダーがライトニング請求書の支払いに成功すると、ハッシュロックと一致するプリイメージ（秘密）を取得する。このプリイメージが暗号キーとなり、HTLCにロックされていたL-BTCのロックを解除することができる。時間ロックはフォールバックメカニズムに過ぎず、クライアントはプリイメージの配布を処理せず、HTLCは自動実行ではなく能動的な暗号証明が必要です。
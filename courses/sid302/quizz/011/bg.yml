question: Какво се случва, когато доставчик на услуги плати фактура на Lightning за извършване на замяна на Liquid със Lightning с помощта на HTLC?
answer: Доставчикът получава предварителен образ от светкавичното плащане, който може да използва, за да отключи и да поиска L-BTC от HTLC
wrong_answers:
  - Доставчикът трябва да изчака изтичането на блокировката на времето, преди да получи достъп до L-BTC, блокирани в договора HTLC
  - "Клиентът автоматично получава предварителния образ и го използва, за да освободи L-BTC директно към Liquid wallet на доставчика"
  - Договорът HTLC се изпълнява автоматично и прехвърля L-BTC на доставчика, без да изисква допълнително криптографско доказателство
explanation: |
  HTLC създават атомарни суапове чрез криптографско свързване, като използват един и същ хеш-ключ в двете мрежи. Когато доставчикът плати успешно фактурата на Lightning, той получава предварителен образ (тайна), който съответства на хеш-замъка. Този предварителен образ е криптографският ключ, който им позволява да отключат L-BTC, който преди това е бил заключен в HTLC. Другите варианти са некоректни, защото не отразяват атомарния характер на HTLC - времевото заключване е само резервен механизъм, клиентите не се справят с разпространението на преизображенията, а HTLC изискват активно криптографско доказателство, а не автоматично изпълнение.
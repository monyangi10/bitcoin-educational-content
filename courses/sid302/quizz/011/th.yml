question: เกิดอะไรขึ้นเมื่อผู้ให้บริการชำระใบแจ้งหนี้ Lightning เพื่อทำการแลกเปลี่ยน Liquid-to-Lightning โดยใช้ HTLCs?
answer: ผู้ให้บริการได้รับภาพก่อนจากการชำระเงินผ่าน Lightning ซึ่งพวกเขาสามารถใช้เพื่อปลดล็อกและเรียกร้อง L-BTC จาก HTLC
wrong_answers:
  - ผู้ให้บริการต้องรอให้การล็อกเวลาหมดอายุก่อนที่พวกเขาจะสามารถเข้าถึง L-BTC ที่ล็อกไว้ในสัญญา HTLC ได้
  - "ไคลเอนต์จะได้รับภาพล่วงหน้าโดยอัตโนมัติและใช้มันเพื่อปล่อย L-BTC โดยตรงไปยัง Liquid wallet ของผู้ให้บริการ"
  - สัญญา HTLC ดำเนินการและโอน L-BTC ไปยังผู้ให้บริการโดยอัตโนมัติโดยไม่ต้องการหลักฐานการเข้ารหัสเพิ่มเติมใดๆ
explanation: |
  HTLCs สร้างการแลกเปลี่ยนแบบอะตอมผ่านการผูกมัดทางเข้ารหัสโดยใช้แฮชล็อคเดียวกันในทั้งสองเครือข่าย เมื่อผู้ให้บริการชำระใบแจ้งหนี้ Lightning สำเร็จ พวกเขาจะได้รับภาพล่วงหน้า (ความลับ) ที่ตรงกับแฮชล็อค ภาพล่วงหน้านี้เป็นกุญแจเข้ารหัสที่ช่วยให้พวกเขาปลดล็อค L-BTC ที่ถูกล็อคไว้ก่อนหน้านี้ใน HTLC ตัวเลือกอื่น ๆ ไม่ถูกต้องเพราะพวกเขาไม่สะท้อนธรรมชาติแบบอะตอมของ HTLCs - การล็อคเวลาเป็นเพียงกลไกสำรองเท่านั้น ลูกค้าไม่ได้จัดการการแจกจ่ายภาพล่วงหน้า และ HTLCs ต้องการการพิสูจน์ทางเข้ารหัสที่ใช้งานอยู่แทนที่จะเป็นการดำเนินการอัตโนมัติ
question: 当服务提供商使用 HTLC 支付 Lightning 发票以完成 Liquid 到 Lightning 的交换时，会发生什么情况？
answer: 提供商收到闪电支付的预图像后，就可以用它来解锁并从 HTLC 申请 L-BTC
wrong_answers:
  - 提供方必须等待时间锁定期满后，才能使用锁定在 HTLC 合同中的 L-BTC
  - "客户端自动接收预图像，并利用它直接向提供方的 Liquid wallet 释放 L-BTC"
  - HTLC 合约自动执行并将 L-BTC 转移给提供者，无需任何额外的加密证明
explanation: |
  HTLC 在两个网络上使用相同的哈希锁，通过加密绑定创建原子交换。当提供商成功支付闪电发票时，他们就会获得与哈希锁匹配的预图像（秘密）。这个预图像就是加密密钥，使他们能够解锁之前锁定在 HTLC 中的 L-BTC 。其他选项是不正确的，因为它们没有反映 HTLC 的原子本质--时间锁只是一种后备机制，客户端不处理预图像分发，而且 HTLC 需要主动加密证明，而不是自动执行。
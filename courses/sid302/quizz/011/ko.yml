question: 서비스 제공업체가 HTLC를 사용하여 Liquid에서 라이트닝으로 스왑을 완료하기 위해 라이트닝 인보이스를 지불하면 어떻게 되나요?
answer: 공급자는 라이트닝 결제에서 프리이미지를 받은 다음, 이를 사용하여 HTLC에서 L-BTC를 잠금 해제하고 청구할 수 있습니다
wrong_answers:
  - 공급자는 시간 잠금이 만료될 때까지 기다려야 HTLC 컨트랙트에 잠긴 L-BTC에 접근할 수 있습니다
  - "클라이언트는 자동으로 프리이미지를 수신하고 이를 사용하여 L-BTC를 공급자의 Liquid wallet로 직접 릴리스합니다."
  - HTLC 컨트랙트는 추가적인 암호화 증명 없이 자동으로 실행되어 L-BTC를 공급자에게 전송합니다
explanation: |
  HTLC는 두 네트워크에서 동일한 해시 잠금을 사용해 암호화 바인딩을 통해 아토믹 스왑을 생성합니다. 공급자가 라이트닝 인보이스를 성공적으로 결제하면 해시 잠금과 일치하는 프리이미지(비밀)를 얻게 됩니다. 이 프리이미지는 이전에 HTLC에 잠겨 있던 L-BTC의 잠금을 해제할 수 있는 암호화 키입니다. 다른 옵션은 HTLC의 원자적 특성을 반영하지 않기 때문에 올바르지 않습니다. 시간 잠금은 대체 메커니즘일 뿐이고, 클라이언트는 프리이미지 배포를 처리하지 않으며, HTLC는 자동 실행이 아닌 활성 암호화 증명을 필요로 합니다.
question: जब कोई सेवा प्रदाता HTLC का उपयोग करके Liquid से लाइटनिंग स्वैप को पूरा करने के लिए लाइटनिंग इनवॉइस का भुगतान करता है तो क्या होता है?
answer: प्रदाता को लाइटनिंग भुगतान से प्रीइमेज प्राप्त होता है, जिसका उपयोग वे HTLC से L-BTC को अनलॉक करने और प्राप्त करने के लिए कर सकते हैं।
wrong_answers:
  - प्रदाता को HTLC अनुबंध में लॉक किए गए L-BTC तक पहुँचने से पहले टाइम लॉक की अवधि समाप्त होने तक प्रतीक्षा करनी होगी।
  - "क्लाइंट स्वचालित रूप से प्रीइमेज प्राप्त करता है और इसका उपयोग करके एल-बीटीसी को सीधे प्रदाता के जीडब्ल्यू-3 जीडब्ल्यू-4 में जारी करता है।"
  - HTLC अनुबंध बिना किसी अतिरिक्त क्रिप्टोग्राफिक प्रमाण की आवश्यकता के स्वचालित रूप से निष्पादित होता है और L-BTC को प्रदाता को हस्तांतरित कर देता है।
explanation: |
  HTLC दोनों नेटवर्कों पर एक ही हैश लॉक का उपयोग करके क्रिप्टोग्राफिक बाइंडिंग के माध्यम से एटॉमिक स्वैप बनाते हैं। जब प्रदाता लाइटनिंग इनवॉइस का सफलतापूर्वक भुगतान करता है, तो उसे हैश लॉक से मेल खाने वाला प्रीइमेज (गुप्त कुंजी) प्राप्त होता है। यह प्रीइमेज ही वह क्रिप्टोग्राफिक कुंजी है जो उन्हें HTLC में पहले से लॉक किए गए L-BTC को अनलॉक करने की अनुमति देती है। अन्य विकल्प गलत हैं क्योंकि वे HTLC की एटॉमिक प्रकृति को नहीं दर्शाते हैं - टाइम लॉक केवल एक बैकअप तंत्र है, क्लाइंट प्रीइमेज वितरण को नियंत्रित नहीं करते हैं, और HTLC को स्वचालित निष्पादन के बजाय सक्रिय क्रिप्टोग्राफिक प्रमाण की आवश्यकता होती है।
question: Что происходит, когда поставщик услуг оплачивает счет Lightning для завершения обмена Liquid на Lightning с помощью HTLC?
answer: Провайдер получает предварительный образ от платежа Lightning, который он может использовать для разблокировки и получения L-BTC от HTLC
wrong_answers:
  - Поставщик должен дождаться истечения срока действия временной блокировки, прежде чем он сможет получить доступ к L-BTC, заблокированным в контракте HTLC
  - "Клиент автоматически получает предварительный образ и использует его для выпуска L-BTC непосредственно на Liquid wallet провайдера"
  - Контракт HTLC автоматически исполняется и переводит L-BTC провайдеру, не требуя никаких дополнительных криптографических доказательств
explanation: |
  HTLC создают атомарные свопы с помощью криптографического связывания, используя один и тот же хэш-лок в обеих сетях. Когда провайдер успешно оплачивает счет Lightning, он получает предварительный образ (секрет), соответствующий хэш-блокировке. Этот предварительный образ является криптографическим ключом, позволяющим разблокировать L-BTC, который ранее был заблокирован в HTLC. Остальные варианты неверны, поскольку не отражают атомарную природу HTLC - временная блокировка является лишь резервным механизмом, клиенты не занимаются распределением преимиджей, а HTLC требуют активного криптографического доказательства, а не автоматического выполнения.
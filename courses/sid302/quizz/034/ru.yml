question: Какой архитектурный механизм позволяет Breez SDK выполнять передачу данных с Liquid на Bitcoin без использования federated peg-аутов или централизованных обменов?
answer: Механизм двойного обмена с одновременными блокировочными транзакциями по обеим цепочкам, где отправитель требует средства Bitcoin, а получатель - средства Liquid
wrong_answers:
  - Единый подводный своп, при котором сначала блокируются средства Bitcoin, а затем предъявляются требования с использованием предварительного изображения платежа Lightning из сделки Liquid
  - Архитектура обратного подводного свопа, в которой Liquid Network выступает в качестве промежуточного моста для подтверждения транзакций Bitcoin mainchain
  - Федеративная система условного депонирования с несколькими подписями, управляемая Boltz, которая координирует атомарные обмены между Liquid и Bitcoin с использованием контрактов с привязкой ко времени
explanation: |
  Механизм dual-swap специально разработан для межцепочечных переводов Bitcoin, предполагающих одновременные блокировочные транзакции в сетях Liquid и Bitcoin. Этот бездоверительный подход позволяет осуществлять прямое мостовое соединение без federated peg-аутов. Другие варианты неверно описывают однонаправленные подводные свопы, искажают роль Liquid Network или неверно предполагают зависимость от федеративных систем, которых SDK явно избегает.
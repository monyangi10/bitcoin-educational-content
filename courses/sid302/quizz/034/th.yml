question: กลไกทางสถาปัตยกรรมใดที่ช่วยให้ Breez SDK สามารถทำการโอนจาก Liquid ไปยัง Bitcoin ได้โดยไม่ต้องพึ่งพา federated peg-outs หรือการแลกเปลี่ยนแบบรวมศูนย์?
answer: กลไกการแลกเปลี่ยนคู่พร้อมกับธุรกรรมการล็อกพร้อมกันบนทั้งสองเชนที่ผู้ส่งอ้างสิทธิ์เงิน Bitcoin และผู้รับอ้างสิทธิ์เงิน Liquid
wrong_answers:
  - การแลกเปลี่ยนเรือดำน้ำครั้งเดียวที่กองทุน Bitcoin ถูกล็อกก่อนและจากนั้นถูกอ้างสิทธิ์โดยใช้ภาพล่วงหน้าการชำระเงิน Lightning จากธุรกรรม Liquid
  - สถาปัตยกรรมการแลกเปลี่ยนเรือดำน้ำย้อนกลับที่ Liquid Network ทำหน้าที่เป็นสะพานกลางในการตรวจสอบธุรกรรม Bitcoin mainchain
  - ระบบเอสโครว์หลายลายเซ็นแบบรวมศูนย์ที่จัดการโดย Boltz ซึ่งประสานการแลกเปลี่ยนอะตอมระหว่าง Liquid และ Bitcoin โดยใช้สัญญาที่ล็อคด้วยเวลา
explanation: |
  กลไกการแลกเปลี่ยนคู่ถูกออกแบบมาโดยเฉพาะสำหรับการโอนข้ามเครือข่าย Bitcoin ซึ่งเกี่ยวข้องกับการทำธุรกรรมล็อคอัพพร้อมกันบนเครือข่าย Liquid และ Bitcoin วิธีการที่ไม่ต้องอาศัยความไว้วางใจนี้ช่วยให้สามารถเชื่อมต่อโดยตรงโดยไม่ต้องใช้ federated peg-outs ตัวเลือกอื่น ๆ อธิบายการแลกเปลี่ยนใต้น้ำทิศทางเดียวอย่างไม่ถูกต้อง บิดเบือนบทบาทของ Liquid Network หรือแนะนำอย่างไม่ถูกต้องถึงการพึ่งพาระบบที่มีการรวมศูนย์ซึ่ง SDK หลีกเลี่ยงอย่างชัดเจน
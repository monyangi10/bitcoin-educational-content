question: چه مکانیزم معماری به Breez SDK امکان می‌دهد تا انتقالات Liquid به Bitcoin را بدون اتکا به federated peg-outs یا صرافی‌های متمرکز انجام دهد؟
answer: یک مکانیزم دوگانه مبادله با تراکنش‌های قفل‌شده همزمان در هر دو زنجیره که در آن فرستنده وجوه Bitcoin را مطالبه می‌کند و گیرنده وجوه Liquid را مطالبه می‌کند.
wrong_answers:
  - یک مبادله زیردریایی که در آن ابتدا وجوه Bitcoin قفل می‌شوند و سپس با استفاده از پیش‌تصویر پرداخت لایتنینگ از تراکنش Liquid مطالبه می‌شوند.
  - یک معماری مبادله معکوس زیردریایی که در آن Liquid Network به عنوان یک پل واسطه برای اعتبارسنجی تراکنش‌های Bitcoin mainchain عمل می‌کند.
  - یک سیستم سپرده‌گذاری چند امضایی فدرال که توسط Boltz مدیریت می‌شود و مبادلات اتمی بین Liquid و Bitcoin را با استفاده از قراردادهای زمان‌قفل هماهنگ می‌کند.
explanation: |
  مکانیسم دوگانه تعویض به‌طور خاص برای انتقال‌های زنجیره‌ای متقابل Bitcoin طراحی شده است که شامل معاملات قفل‌شده همزمان در هر دو شبکه Liquid و Bitcoin می‌باشد. این رویکرد بدون نیاز به اعتماد، امکان پل‌زنی مستقیم را بدون federated peg-outs فراهم می‌کند. گزینه‌های دیگر به‌اشتباه تعویض‌های زیردریایی یک‌جهته را توصیف می‌کنند، نقش Liquid Network را نادرست نشان می‌دهند، یا به‌اشتباه وابستگی به سیستم‌های فدرال را پیشنهاد می‌کنند که SDK به‌طور خاص از آن‌ها اجتناب می‌کند.
question: कौन सा आर्किटेक्चरल तंत्र Breez SDK को federated peg-आउट या केंद्रीकृत एक्सचेंजों पर निर्भर किए बिना Liquid से Bitcoin में डेटा ट्रांसफर करने में सक्षम बनाता है?
answer: एक ड्यूल-स्वैप तंत्र जिसमें दोनों चेन पर एक साथ लॉक-अप लेनदेन होते हैं, जहां प्रेषक Bitcoin फंड का दावा करता है और प्राप्तकर्ता Liquid फंड का दावा करता है।
wrong_answers:
  - एक ही पनडुब्बी अदला-बदली जिसमें पहले Bitcoin फंड लॉक किए जाते हैं और फिर Liquid लेनदेन से लाइटनिंग भुगतान प्रीइमेज का उपयोग करके उन पर दावा किया जाता है।
  - एक रिवर्स सबमरीन स्वैप आर्किटेक्चर जहां Liquid Network, Bitcoin और mainchain लेनदेन को मान्य करने के लिए एक मध्यस्थ पुल के रूप में कार्य करता है।
  - Boltz द्वारा प्रबंधित एक संघबद्ध बहु-हस्ताक्षर एस्क्रो प्रणाली, जो समय-बद्ध अनुबंधों का उपयोग करके Liquid और Bitcoin के बीच परमाणु अदला-बदली का समन्वय करती है।
explanation: |
  ड्यूल-स्वैप तंत्र विशेष रूप से क्रॉस-चेन Bitcoin ट्रांसफ़र के लिए डिज़ाइन किया गया है, जिसमें Liquid और Bitcoin दोनों नेटवर्क पर एक साथ लॉक-अप लेनदेन शामिल हैं। यह ट्रस्टलेस दृष्टिकोण federated peg-आउट के बिना सीधे ब्रिजिंग की अनुमति देता है। अन्य विकल्प सिंगल-डायरेक्शन सबमरीन स्वैप का गलत वर्णन करते हैं, Liquid Network की भूमिका को गलत तरीके से प्रस्तुत करते हैं, या फ़ेडरेटेड सिस्टम पर निर्भरता का गलत सुझाव देते हैं, जिनसे SDK स्पष्ट रूप से बचता है।
question: Breez SDKがfederated pegアウトや集中交換に依存せずにLiquidからBitcoinへの転送を実行できるアーキテクチャ・メカニズムは何ですか？
answer: 送金側がBitcoin資金を請求し、受取側がLiquid資金を請求する、両チェーンでの同時ロックアップ取引を伴うデュアル・スワップ・メカニズム。
wrong_answers:
  - Bitcoin資金が最初にロックされ、その後Liquid取引のライトニング決済前画像を使用して請求されるシングルサブマリンスワップ。
  - Liquid NetworkがBitcoin mainchainトランザクションを検証する仲介ブリッジとして機能するリバース・サブマリン・スワップ・アーキテクチャー
  - Boltzが管理し、LiquidとBitcoinの間でタイムロックされた契約を用いてアトミックスワップを調整する、フェデレートされたマルチシグネチャーのエスクローシステム。
explanation: |
  デュアル・スワップ・メカニズムは、LiquidとBitcoinの両ネットワーク上での同時ロックアップ・トランザクションを含む、クロス・チェーンBitcoin転送のために特別に設計されている。このトラストレス・アプローチは、federated pegアウトを伴わない直接ブリッジングを可能にする。他の選択肢は、単方向の海底スワップを誤って説明したり、Liquid Network の役割を誤って説明したり、SDK が明確に回避している連携システムへの依存を誤って示唆している。
question: Кой архитектурен механизъм позволява на Breez SDK да извършва прехвърляния от Liquid към Bitcoin, без да разчита на federated peg-outs или централизирани обмени?
answer: Механизъм за двойна размяна с едновременни блокиращи транзакции в двете вериги, при който изпращачът претендира за средства Bitcoin, а получателят - за средства Liquid
wrong_answers:
  - Единичен подводен суап, при който първо се блокират средства по Bitcoin, а след това се заявяват с помощта на предварителен образ на плащането "Светкавица" от транзакцията по Liquid
  - Архитектура за обратен подводен суап, при която Liquid Network действа като междинен мост за валидиране на транзакции Bitcoin mainchain
  - Обединена система за ескроу с много подписи, управлявана от Boltz, която координира атомните суапове между Liquid и Bitcoin, като използва договори с фиксирано време
explanation: |
  Механизмът за двойна размяна е специално разработен за прехвърляния между вериги Bitcoin, включващи едновременни транзакции с блокиране в мрежи Liquid и Bitcoin. Този ненадежден подход позволява директно свързване без изключване на federated peg. Другите варианти неправилно описват еднопосочни подводни суапове, представят погрешно ролята на Liquid Network или неправилно предполагат разчитане на обединени системи, които SDK изрично избягва.
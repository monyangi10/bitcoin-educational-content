question: Liquid Network के भीतर प्रयुक्त Bitcoin के प्रतिनिधित्व का नाम क्या है?
answer: जीडब्ल्यू-3 जीडब्ल्यू-2 (एलबीटीसी)
wrong_answers:
  - रैप्ड जीडब्ल्यू-4 (डब्ल्यूबीटीसी)
  - जीडब्ल्यू-5 जीडब्ल्यू-6 (एसबीटीसी)
  - फेडरेटेड जीडब्ल्यू-7 (एफबीटीसी)
explanation: |
  Liquid Bitcoin (LBTC) Liquid साइडचेन पर मौजूद होने पर Bitcoin का सही नाम है। जब उपयोगकर्ता अपने Bitcoin को Liquid से जोड़ते हैं, तो उन्हें LBTC की समतुल्य राशि प्राप्त होती है जिसका उपयोग Liquid Network के भीतर लेनदेन के लिए किया जा सकता है। WBTC एक एथेरियम-आधारित Bitcoin token है, जबकि SBTC और FBTC किसी भी प्रमुख नेटवर्क में उपयोग किए जाने वाले वास्तविक Bitcoin प्रतिनिधित्व नहीं हैं।
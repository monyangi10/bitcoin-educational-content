question: Какъв е основният механизъм за консенсус, използван от Liquid Network?
answer: Федеративен консенсус
wrong_answers:
  - Proof-of-Work
  - Доказателство за вземане
  - Делегирано доказателство за вземане
explanation: |
  Liquid Network функционира по модела на федеративния консенсус, който е коренно различен от системата Bitcoin на Proof-of-Work. При този модел избрана група от петнадесет функционери действа като подписващи блокове, които създават блокове по детерминиран кръгов начин. Proof-of-Work е консенсусният механизъм на Bitcoin, включващ mining, докато Proof-of-Stake и Delegated Proof-of-Stake са консенсусни механизми, използвани от други блокчейн мрежи, но не и от Liquid.
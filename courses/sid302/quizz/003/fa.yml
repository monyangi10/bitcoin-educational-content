question: مکانیزم اجماع اصلی استفاده شده توسط Liquid Network چیست؟
answer: اجماع فدرال
wrong_answers:
  - Proof-of-Work
  - اثبات سهام
  - اثبات سهام واگذار شده
explanation: |
  Liquid Network بر روی یک مدل اجماع فدرال عمل می‌کند، که به‌طور اساسی با سیستم Proof-of-Work در Bitcoin متفاوت است. در این مدل، یک گروه منتخب از پانزده کارگزار به عنوان امضاکنندگان بلوک عمل می‌کنند که بلوک‌ها را به صورت دورگردی قطعی تولید می‌کنند. Proof-of-Work مکانیزم اجماع Bitcoin است که شامل mining می‌شود، در حالی که اثبات سهام و اثبات سهام نمایندگی شده مکانیزم‌های اجماع مورد استفاده توسط سایر شبکه‌های بلاکچین هستند اما نه توسط Liquid.
question: Какой основной механизм консенсуса используется в Liquid Network?
answer: Федеративный консенсус
wrong_answers:
  - Proof-of-Work
  - Proof-of-Stake
  - Делегированный Proof-of-Stake
explanation: |
  Liquid Network работает по модели федеративного консенсуса, которая принципиально отличается от системы Bitcoin, используемой в Proof-of-Work. В этой модели выбранная группа из пятнадцати функционеров выступает в роли подписантов блоков, которые производят блоки в детерминированном режиме по кругу. Proof-of-Work - это механизм консенсуса Bitcoin с участием mining, а Proof-of-Stake и Delegated Proof-of-Stake - механизмы консенсуса, используемые в других блокчейн-сетях, но не в Liquid.
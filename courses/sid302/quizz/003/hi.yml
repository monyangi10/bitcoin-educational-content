question: Liquid Network द्वारा उपयोग किया जाने वाला मुख्य सहमति तंत्र क्या है?
answer: संघबद्ध सहमति
wrong_answers:
  - जीडब्ल्यू-1
  - सबूत के-स्टेक
  - प्रत्यायोजित प्रूफ-ऑफ-स्टेक
explanation: |
  Liquid Network एक फेडरेटेड कंसेंसस मॉडल पर काम करता है, जो Bitcoin के Proof-of-Work सिस्टम से मौलिक रूप से भिन्न है। इस मॉडल में, पंद्रह चयनित पदाधिकारी ब्लॉक हस्ताक्षरकर्ता के रूप में कार्य करते हैं और एक निश्चित राउंड-रोबिन तरीके से ब्लॉक बनाते हैं। Proof-of-Work, Bitcoin का कंसेंसस तंत्र है जिसमें mining शामिल है, जबकि प्रूफ-ऑफ-स्टेक और डेलीगेटेड प्रूफ-ऑफ-स्टेक अन्य ब्लॉकचेन नेटवर्क द्वारा उपयोग किए जाने वाले कंसेंसस तंत्र हैं, लेकिन Liquid द्वारा नहीं।
question: Каково основное назначение механизма обмена ключами ECDH в архитектуре Liquid's Confidential Transactions?
answer: Чтобы позволить отправителям шифровать количество и типы активов с помощью ослепляющего открытого ключа получателя, генерируя при этом проверяемые доказательства диапазона
wrong_answers:
  - Для создания защищенных каналов связи между серверами AMP и клиентами wallet во время процессов авторизации транзакций
  - Для создания общих секретов для регистрации дескрипторов мультиподписей между кошельками и инфраструктурой AMP-сервера
  - Криптографические подписи generate, подтверждающие право собственности на активы без раскрытия информации о закрытом ключе
explanation: |
  Обмен ключами ECDH (Elliptic Curve Diffie-Hellman) в Liquid's Confidential Transactions специально обеспечивает передачу активов с сохранением конфиденциальности, позволяя отправителям шифровать выходные значения транзакций с помощью ослепляющего открытого ключа получателя. Это создает общий секрет, который может расшифровать только получатель с помощью своего закрытого закрывающего ключа, и одновременно генерирует доказательства диапазона, которые позволяют сетевым валидаторам проверять достоверность транзакций, не видя фактических сумм. Другие варианты неверно описывают ECDH как обслуживающий безопасность связи, регистрацию дескрипторов или функции доказательства права собственности, которые выполняются различными криптографическими механизмами в экосистеме Liquid.
question: LiquidのConfidential TransactionsアーキテクチャにおけるECDH鍵交換メカニズムの主な目的は何ですか？
answer: 送信者が、検証可能な範囲証明を生成しながら、受信者の目隠し公開鍵を使用して資産の金額と種類を暗号化できるようにする。
wrong_answers:
  - トランザクション承認プロセスにおいて、AMPサーバーとwalletクライアント間に安全な通信チャネルを確立する。
  - ウォレットとAMPサーバーインフラ間でマルチシグネチャディスクリプタ登録用の共有秘密を作成するため
  - 基礎となる秘密鍵情報を明かすことなく資産の所有権を証明するgenerate暗号署名へ
explanation: |
  LiquidのConfidential TransactionsにおけるECDH（楕円曲線ディフィー・ヘルマン）鍵交換は、特に、送信者が受信者の目隠し公開鍵を使用してトランザクション出力値を暗号化することを可能にすることにより、プライバシーを保護した資産移転を可能にする。これによって、受信者だけが自分の秘密鍵で復号化できる共有秘密が作成され、同時にネットワーク検証者が実際の金額を見ることなく取引の正当性を検証できる範囲証明が生成される。他の選択肢は、ECDHが通信セキュリティ、記述子登録、または所有権証明機能を提供すると誤って記述しているが、これらはLiquidエコシステム内の異なる暗号メカニズムによって処理される。
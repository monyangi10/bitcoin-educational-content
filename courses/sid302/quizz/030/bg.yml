question: Каква е основната цел на механизма за обмен на ключове ECDH в архитектурата Liquid на Confidential Transactions?
answer: Да се даде възможност на изпращачите да криптират количествата и видовете активи, използвайки публичния ключ на получателя, като същевременно генерират проверими доказателства за обхвата
wrong_answers:
  - Създаване на защитени комуникационни канали между сървърите на AMP и клиентите на wallet по време на процесите на оторизация на транзакции
  - Създаване на споделени тайни за регистриране на дескриптори на много подписи между портфейлите и инфраструктурата на сървъра AMP
  - За криптографски подписи generate, които доказват собствеността на активите, без да се разкрива информацията за основния частен ключ
explanation: |
  Обменът на ключове ECDH (Elliptic Curve Diffie-Hellman) в Confidential Transactions на Liquid позволява специално запазване на поверителността при прехвърляне на активи, като позволява на изпращачите да криптират изходните стойности на транзакциите, използвайки ослепителния публичен ключ на получателя. По този начин се създава споделена тайна, която само получателят може да декриптира със своя частен ключ, като едновременно с това се генерират доказателства за обхват, които позволяват на мрежовите валидатори да проверяват валидността на транзакциите, без да виждат действителните суми. Другите варианти неправилно описват ECDH като обслужващ функциите за сигурност на комуникацията, регистрация на дескриптори или доказателства за собственост, които се обработват от различни криптографски механизми в екосистемата Liquid.
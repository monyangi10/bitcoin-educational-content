question: 在 Liquid 的 Confidential Transactions 架構中，ECDH 金鑰交換機制的主要目的是什麼？
answer: 讓寄件者可以使用接收者的致盲公開金鑰加密資產金額和類型，同時產生可驗證的範圍證明
wrong_answers:
  - 在交易授權過程中，建立 AMP 伺服器與 wallet 用戶端之間的安全通訊管道
  - 在錢包和 AMP 伺服器基礎架構之間建立多簽章描述符註冊的共用機密
  - 將 generate 密碼簽章用於證明資產所有權，而不會洩露基本的私密金鑰資訊
explanation: |
  Liquid 的 Confidential Transactions 中的 ECDH（橢圓曲線 Diffie-Hellman）金鑰交換特別透過允許發送者使用接收者的保密公開金鑰加密交易輸出值，以實現保護隱私的資產轉移。這會產生一個共享秘密，只有接收者可以用他們的私人保密金鑰來解密，同時產生範圍證明，讓網路驗證者可以驗證交易的有效性，而無需看到實際金額。其他選項錯誤地將 ECDH 描述為提供通訊安全、描述符註冊或所有權證明功能，這些功能在 Liquid 生態系統中由不同的加密機制處理。
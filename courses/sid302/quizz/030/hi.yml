question: Liquid के Confidential Transactions आर्किटेक्चर में ECDH कुंजी विनिमय तंत्र का प्राथमिक उद्देश्य क्या है?
answer: प्रेषकों को प्राप्तकर्ता की गुप्त सार्वजनिक कुंजी का उपयोग करके परिसंपत्ति राशियों और प्रकारों को एन्क्रिप्ट करने में सक्षम बनाना, साथ ही सत्यापन योग्य रेंज प्रमाण उत्पन्न करना।
wrong_answers:
  - लेनदेन प्राधिकरण प्रक्रियाओं के दौरान एएमपी सर्वरों और जीडब्ल्यू-2 क्लाइंट्स के बीच सुरक्षित संचार चैनल स्थापित करना।
  - वॉलेट और एएमपी सर्वर इन्फ्रास्ट्रक्चर के बीच मल्टीसिग्नेचर डिस्क्रिप्टर पंजीकरण के लिए साझा रहस्य बनाने हेतु
  - generate क्रिप्टोग्राफिक हस्ताक्षरों के लिए जो अंतर्निहित निजी कुंजी की जानकारी प्रकट किए बिना संपत्ति के स्वामित्व को साबित करते हैं
explanation: |
  Liquid के Confidential Transactions में ECDH (एलिप्टिक कर्व डिफि-हेलमैन) कुंजी विनिमय विशेष रूप से गोपनीयता बनाए रखते हुए परिसंपत्ति हस्तांतरण को सक्षम बनाता है। यह प्रेषकों को प्राप्तकर्ता की गुप्त सार्वजनिक कुंजी का उपयोग करके लेनदेन आउटपुट मूल्यों को एन्क्रिप्ट करने की अनुमति देता है। इससे एक साझा रहस्य बनता है जिसे केवल प्राप्तकर्ता ही अपनी निजी गुप्त कुंजी से डिक्रिप्ट कर सकता है। साथ ही, यह रेंज प्रूफ भी उत्पन्न करता है जो नेटवर्क सत्यापनकर्ताओं को वास्तविक राशि देखे बिना लेनदेन की वैधता सत्यापित करने की अनुमति देता है। अन्य विकल्प ECDH को संचार सुरक्षा, विवरण पंजीकरण या स्वामित्व प्रमाण कार्यों के रूप में गलत तरीके से वर्णित करते हैं, जबकि Liquid पारिस्थितिकी तंत्र में इन कार्यों को विभिन्न क्रिप्टोग्राफिक तंत्रों द्वारा नियंत्रित किया जाता है।
question: 在 Liquid 的 Confidential Transactions 架构中，ECDH 密钥交换机制的主要目的是什么？
answer: 使发送方能够使用接收方的致盲公开密钥加密资产数量和类型，同时生成可验证的范围证明
wrong_answers:
  - 在交易授权过程中，在 AMP 服务器和 wallet 客户端之间建立安全通信渠道
  - 为钱包和 AMP 服务器基础设施之间的多重签名描述符注册创建共享秘密
  - 为 generate 加密签名，在不泄露基础私钥信息的情况下证明资产所有权
explanation: |
  Liquid 的 Confidential Transactions 中的 ECDH（椭圆曲线 Diffie-Hellman）密钥交换允许发送方使用接收方的保密公开密钥对交易输出值进行加密，从而专门实现了保护隐私的资产转移。这就创建了一个共享秘密，只有接收方可以用其私人保密密钥解密，同时生成范围证明，使网络验证者可以在不看到实际金额的情况下验证交易的有效性。其他选项错误地将 ECDH 描述为通信安全、描述符注册或所有权证明功能，而这些功能在 Liquid 生态系统中由不同的加密机制处理。
question: هدف اصلی مکانیزم تبادل کلید ECDH در معماری Liquid's Confidential Transactions چیست؟
answer: برای فعال‌سازی ارسال‌کنندگان جهت رمزگذاری مقادیر و انواع دارایی با استفاده از کلید عمومی کورکننده گیرنده در حین تولید اثبات‌های محدوده قابل تأیید
wrong_answers:
  - برای ایجاد کانال‌های ارتباطی امن بین سرورهای AMP و مشتریان wallet در طول فرآیندهای مجوز تراکنش
  - برای ایجاد رازهای مشترک برای ثبت توصیف‌گر چندامضایی بین کیف‌پول‌ها و زیرساخت سرور AMP
  - به امضاهای رمزنگاری generate که مالکیت دارایی را بدون افشای اطلاعات کلید خصوصی زیرین اثبات می‌کنند
explanation: |
  تبادل کلید ECDH (Elliptic Curve Diffie-Hellman) در Liquid به‌طور خاص انتقال دارایی‌های حفظ حریم خصوصی را با اجازه دادن به فرستندگان برای رمزگذاری مقادیر خروجی تراکنش با استفاده از کلید عمومی کورکننده گیرنده فعال می‌کند. این یک راز مشترک ایجاد می‌کند که فقط گیرنده می‌تواند با کلید خصوصی کورکننده خود آن را رمزگشایی کند، در حالی که به‌طور همزمان اثبات‌های محدوده‌ای تولید می‌کند که به اعتبارسنج‌های شبکه اجازه می‌دهد تا اعتبار تراکنش را بدون دیدن مقادیر واقعی تأیید کنند. گزینه‌های دیگر به‌اشتباه ECDH را به‌عنوان خدمت به امنیت ارتباطات، ثبت توصیف‌گر، یا عملکردهای اثبات مالکیت توصیف می‌کنند، که توسط مکانیزم‌های رمزنگاری متفاوتی در اکوسیستم Liquid مدیریت می‌شوند.
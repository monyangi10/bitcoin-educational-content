question: Liquid의 Confidential Transactions 아키텍처에서 ECDH 키 교환 메커니즘의 주요 목적은 무엇인가요?
answer: 발신자가 수신자의 블라인드 공개 키를 사용하여 자산 금액과 유형을 암호화하는 동시에 검증 가능한 범위 증명을 생성할 수 있습니다
wrong_answers:
  - 거래 승인 프로세스 중 AMP 서버와 wallet 클라이언트 간에 안전한 통신 채널을 설정하려면 다음과 같이 하세요
  - 지갑과 AMP 서버 인프라 간에 다중 서명 설명자 등록을 위한 공유 비밀을 생성하려면 다음과 같이 하세요
  - 기본 개인 키 정보를 공개하지 않고 자산 소유권을 증명하는 generate 암호화 서명으로 이동합니다
explanation: |
  특히 Liquid의 Confidential Transactions의 ECDH(타원 곡선 디피-헬만) 키 교환은 발신자가 수신자의 블라인드 공개 키를 사용해 거래 출력값을 암호화함으로써 프라이버시를 보호하는 자산 전송을 가능하게 합니다. 이렇게 하면 수신자만 개인 블라인드 키로 해독할 수 있는 공유 비밀이 생성되며, 동시에 네트워크 검증자가 실제 금액을 보지 않고도 거래 유효성을 확인할 수 있는 범위 증명을 생성할 수 있습니다. 다른 옵션은 ECDH가 통신 보안, 설명자 등록 또는 소유권 증명 기능을 제공하는 것으로 잘못 설명되어 있는데, 이는 Liquid 생태계의 다른 암호화 메커니즘에 의해 처리됩니다.
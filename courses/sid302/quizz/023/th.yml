question: ทำไมการดำเนินการของ Mayfell ในการใช้ตั๋วสัญญาใช้เงินบน Liquid จึงใช้ประโยชน์จาก Confidential Transactions โดยเฉพาะแทนที่จะใช้บันทึกบล็อกเชนที่โปร่งใส?
answer: ข้อกำหนดความเป็นส่วนตัวทางการค้ากำหนดให้จำนวนเงินกู้ยืมสามารถมองเห็นได้เฉพาะผู้ให้กู้และผู้กู้เท่านั้น ในขณะที่ยังคงความสามารถในการตรวจสอบของผู้ตรวจสอบบัญชี
wrong_answers:
  - ข้อกำหนดการปฏิบัติตามกฎระเบียบในเม็กซิโกกำหนดให้ธุรกรรมทางการเงินทั้งหมดต้องถูกซ่อนจากการกำกับดูแลของรัฐบาลและหน่วยงานด้านภาษีอย่างสมบูรณ์
  - บันทึกที่โปร่งใสจะสร้างคอขวดด้านความสามารถในการขยายตัวซึ่งขัดขวางระบบจากการประมวลผลตั๋วสัญญาใช้เงินมากกว่า 25,000 ฉบับอย่างมีประสิทธิภาพ
  - การเปิดเผยจำนวนเงินกู้ต่อสาธารณะจะกระตุ้นเหตุการณ์การเก็บภาษีอัตโนมัติที่ทำให้กระบวนการโทเค็นไม่สามารถทำได้ในทางการเงินสำหรับผู้เข้าร่วม
explanation: |
  Confidential Transactions แก้ปัญหาทางธุรกิจที่สำคัญในด้านการให้สินเชื่อเชิงพาณิชย์: การรักษาความเป็นส่วนตัวที่แข่งขันได้ในขณะที่ยังคงปฏิบัติตามกฎระเบียบ ในการเงินแบบดั้งเดิม จำนวนเงินกู้ระหว่างธุรกิจถือเป็นข้อมูลเชิงพาณิชย์ที่เป็นความลับที่คู่แข่งไม่ควรเข้าถึง แต่ผู้ตรวจสอบบัญชีและหน่วยงานกำกับดูแลจำเป็นต้องตรวจสอบความถูกต้องของบัญชีแยกประเภท Liquid's Confidential Transactions บรรลุความสมดุลนี้โดยการซ่อนจำนวนเงินด้วยการเข้ารหัสจากสาธารณะในขณะที่อนุญาตให้ฝ่ายที่ได้รับอนุญาตตรวจสอบธุรกรรมได้ คำตอบที่ผิดจะบิดเบือนเทคโนโลยี - CT ไม่ได้ซ่อนธุรกรรมจากหน่วยงานกำกับดูแล (ความเป็นส่วนตัวกับความลับ) ไม่ได้แก้ปัญหาด้านความสามารถในการขยายตัว (นั่นเป็นข้อกังวลทางเทคนิคที่แยกต่างหาก) และไม่ได้สร้างกลไกการหลีกเลี่ยงภาษี (เครื่องมือความเป็นส่วนตัวที่ถูกต้องตามกฎหมายไม่หลีกเลี่ยงภาระภาษี)
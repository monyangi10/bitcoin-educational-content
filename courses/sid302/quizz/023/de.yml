question: Warum nutzt Mayfell bei der Implementierung von Schuldscheinen auf Liquid speziell Confidential Transactions und nicht transparente Blockchain-Aufzeichnungen?
answer: Kommerzielle Datenschutzanforderungen verlangen, dass Darlehensbeträge nur für den Kreditgeber und den Kreditnehmer sichtbar sind, während die Möglichkeiten der Überprüfung durch einen Wirtschaftsprüfer erhalten bleiben
wrong_answers:
  - Die Einhaltung der Vorschriften in Mexiko schreibt vor, dass alle Finanztransaktionen vollständig vor der staatlichen Aufsicht und den Steuerbehörden verborgen werden müssen
  - Transparente Datensätze würden zu Engpässen bei der Skalierbarkeit führen, die verhindern, dass das System die erforderlichen mehr als 25.000 Solawechsel effizient verarbeiten kann
  - Die öffentliche Sichtbarkeit von Darlehensbeträgen würde automatische Steuerereignisse auslösen, die den Tokenisierungsprozess für die Teilnehmer finanziell unrentabel machen
explanation: |
  Confidential Transactions löst ein kritisches Geschäftsproblem bei der Kreditvergabe: die Wahrung der Privatsphäre der Wettbewerber bei gleichzeitiger Einhaltung von Vorschriften. Im traditionellen Finanzwesen sind Darlehensbeträge zwischen Unternehmen vertrauliche Geschäftsinformationen, auf die Konkurrenten keinen Zugriff haben sollten, während Wirtschaftsprüfer und Aufsichtsbehörden die Integrität des Hauptbuchs überprüfen müssen. Liquid's Confidential Transactions erreicht dieses Gleichgewicht, indem es Beträge kryptographisch vor der Öffentlichkeit verbirgt, während es autorisierten Parteien erlaubt, Transaktionen zu verifizieren. Die falschen Antworten stellen die Technologie falsch dar - CT verbirgt Transaktionen nicht vor den Aufsichtsbehörden (Privatsphäre vs. Geheimhaltung), löst keine Skalierbarkeitsprobleme (das ist ein separates technisches Problem) und schafft keine Mechanismen zur Steuervermeidung (legitime Datenschutzinstrumente umgehen keine Steuerpflichten).
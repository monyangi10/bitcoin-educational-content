question: 为什么梅菲尔在 Liquid 上实施期票时特别利用 Confidential Transactions 而不是使用透明的区块链记录？
answer: 商业隐私要求贷款金额只对贷款人和借款人可见，同时保留审计员的验证能力
wrong_answers:
  - 墨西哥的合规性规定，所有金融交易都必须完全隐藏起来，不受政府和税务机关的监督
  - 透明记录会造成可扩展性瓶颈，使系统无法高效处理所需的 25 000 多份期票
  - 贷款金额的公开可见性会引发自动征税事件，使代币化过程在财务上对参与者不可行
explanation: |
  Confidential Transactions 解决了商业借贷中的一个关键业务问题：在遵守监管规定的同时维护竞争隐私。在传统金融领域，企业之间的贷款金额属于商业机密信息，竞争对手不应获取，但审计师和监管机构需要验证分类账的完整性。Liquid 的 Confidential Transactions 通过加密技术向公众隐藏金额，同时允许授权方验证交易，从而实现了这种平衡。错误的答案歪曲了这项技术--CT 不会对监管机构隐藏交易（隐私与保密），不会解决可扩展性问题（这是另一个技术问题），也不会创建避税机制（合法的隐私工具不会规避纳税义务）。
question: मेफेल द्वारा Liquid पर प्रॉमिसरी नोट्स के कार्यान्वयन में पारदर्शी ब्लॉकचेन रिकॉर्ड का उपयोग करने के बजाय विशेष रूप से Confidential Transactions का लाभ क्यों उठाया गया है?
answer: व्यावसायिक गोपनीयता संबंधी आवश्यकताओं के अनुसार, ऋण राशि केवल ऋणदाता और ऋण लेने वाले को ही दिखाई देनी चाहिए, साथ ही लेखा परीक्षकों द्वारा सत्यापन की क्षमता भी बरकरार रहनी चाहिए।
wrong_answers:
  - मेक्सिको में नियामक अनुपालन के तहत सभी वित्तीय लेन-देन को सरकारी निगरानी और कर अधिकारियों से पूरी तरह छिपाकर रखना अनिवार्य है।
  - पारदर्शी रिकॉर्ड से स्केलेबिलिटी संबंधी बाधाएं उत्पन्न होंगी जो सिस्टम को आवश्यक 25,000 से अधिक प्रॉमिसरी नोटों को कुशलतापूर्वक संसाधित करने से रोकेंगी।
  - ऋण राशि की सार्वजनिक उपलब्धता स्वचालित कराधान प्रक्रियाओं को सक्रिय कर देगी, जिससे टोकनाइजेशन प्रक्रिया प्रतिभागियों के लिए आर्थिक रूप से अव्यवहार्य हो जाएगी।
explanation: |
  Confidential Transactions वाणिज्यिक ऋण देने की एक महत्वपूर्ण व्यावसायिक समस्या का समाधान करता है: नियामक अनुपालन सुनिश्चित करते हुए प्रतिस्पर्धी गोपनीयता बनाए रखना। पारंपरिक वित्त में, व्यवसायों के बीच ऋण राशि गोपनीय व्यावसायिक जानकारी होती है, जिस तक प्रतिस्पर्धियों की पहुंच नहीं होनी चाहिए, फिर भी लेखा परीक्षकों और नियामकों को खाता बही की सत्यता सत्यापित करने की आवश्यकता होती है। Liquid का Confidential Transactions क्रिप्टोग्राफिक रूप से राशि को जनता से छिपाकर और अधिकृत पक्षों को लेनदेन सत्यापित करने की अनुमति देकर इस संतुलन को प्राप्त करता है। गलत उत्तर प्रौद्योगिकी को गलत तरीके से प्रस्तुत करते हैं - CT नियामकों से लेनदेन को नहीं छिपाता (गोपनीयता बनाम गोपनीयता), स्केलेबिलिटी समस्याओं का समाधान नहीं करता (यह एक अलग तकनीकी चिंता का विषय है), और कर चोरी के तंत्र नहीं बनाता (वैध गोपनीयता उपकरण कर दायित्वों से बचने का काम नहीं करते)।
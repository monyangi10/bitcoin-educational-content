question: なぜメイフェルのLiquidにおける約束手形の実装は、透明なブロックチェーン記録を使用するのではなく、Confidential Transactionsを特に活用しているのか？
answer: 商業プライバシーの要件として、監査人による検証機能を維持しつつ、貸出金額を貸出人と借受人のみに表示することが要求される。
wrong_answers:
  - メキシコの規制コンプライアンスでは、すべての金融取引を政府の監督や税務当局から完全に隠蔽することが義務付けられている。
  - 透明な記録はスケーラビリティのボトルネックとなり、システムが必要とする25,000枚以上の約束手形を効率的に処理することを妨げる。
  - 融資額が公開されると、自動的な課税イベントが発生し、トークン化プロセスは参加者にとって財政的に成り立たなくなる。
explanation: |
  Confidential Transactionsは、商業融資における重要なビジネス上の問題を解決します。それは、規制遵守を可能にしながら、競争上のプライバシーを維持することです。伝統的な金融では、企業間の融資額は競合他社がアクセスすべきではない商業上の機密情報ですが、監査人や規制当局は元帳の整合性を検証する必要があります。LiquidのConfidential Transactionsは、権限を与えられた関係者が取引を検証できるようにする一方で、金額を暗号化して一般から隠すことで、このバランスを実現している。CTは規制当局からトランザクションを隠したり（プライバシーと機密性）、スケーラビリティの問題を解決したり（これは別の技術的な問題である）、租税回避の仕組みを作ったりはしない（正当なプライバシーツールは租税義務を回避しない）。
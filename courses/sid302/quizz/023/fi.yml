question: Miksi Mayfellin Liquid:n velkakirjojen toteuttamisessa käytetään nimenomaan Confidential Transactions:ta sen sijaan, että käytettäisiin läpinäkyviä lohkoketjutietueita?
answer: Kaupalliset tietosuojavaatimukset edellyttävät, että lainamäärät pysyvät näkyvissä vain lainanantajalle ja lainanottajalle, mutta samalla säilytetään tilintarkastajan todentamismahdollisuudet
wrong_answers:
  - Meksikon lainsäädännön noudattaminen edellyttää, että kaikki rahoitustapahtumat on pidettävä täysin salassa valtion valvonnalta ja veroviranomaisilta
  - Läpinäkyvät tietueet aiheuttaisivat skaalautuvuuden pullonkauloja, jotka estäisivät järjestelmää käsittelemästä tehokkaasti yli 25 000 velkakirjaa
  - Lainamäärien julkinen näkyvyys aiheuttaisi automaattisia verotustapahtumia, jotka tekisivät tokenisointiprosessista taloudellisesti kannattamatonta osallistujille
explanation: |
  Confidential Transactions ratkaisee kriittisen liiketoimintaongelman kaupallisessa luotonannossa: yksityisyyden suojan säilyttäminen kilpailukykyisenä ja säännösten noudattaminen. Perinteisessä rahoituksessa yritysten väliset lainasummat ovat luottamuksellisia kaupallisia tietoja, joihin kilpailijoiden ei pitäisi päästä käsiksi, mutta tilintarkastajien ja sääntelyviranomaisten on kuitenkin varmistettava kirjanpidon eheys. Liquid:n Confidential Transactions:lla saavutetaan tämä tasapaino salaamalla määrät julkisuudelta kryptografisesti ja antamalla samalla valtuutetuille osapuolille mahdollisuus todentaa transaktiot. Väärät vastaukset antavat väärän kuvan teknologiasta - CT ei piilota transaktioita sääntelyviranomaisilta (yksityisyys vs. salassapito), ei ratkaise skaalautuvuusongelmia (se on erillinen tekninen ongelma) eikä luo veronkiertomekanismeja (lailliset yksityisyydensuojatyökalut eivät kierrä verovelvoitteita).
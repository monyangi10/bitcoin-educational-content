question: Почему в реализации векселей Mayfell на Liquid используется именно Confidential Transactions, а не прозрачные записи в блокчейне?
answer: Требования коммерческой конфиденциальности требуют, чтобы суммы займов оставались видимыми только для кредитора и заемщика, сохраняя при этом возможность проверки аудитором
wrong_answers:
  - В соответствии с нормативными требованиями Мексики все финансовые операции должны быть полностью скрыты от государственного надзора и налоговых органов
  - Прозрачные записи создадут узкие места в масштабировании, которые не позволят системе эффективно обрабатывать 25 000+ векселей
  - Публичная огласка сумм займов приведет к автоматическому начислению налогов, что сделает процесс токенизации финансово невыгодным для участников
explanation: |
  Confidential Transactions решает важнейшую бизнес-проблему в сфере коммерческого кредитования: сохранение конфиденциальности информации конкурентов при соблюдении нормативных требований. В традиционном финансировании суммы займов между предприятиями являются конфиденциальной коммерческой информацией, к которой не должны иметь доступ конкуренты, однако аудиторам и регулирующим органам необходимо проверять целостность бухгалтерской книги. Liquid's Confidential Transactions достигает этого баланса, криптографически скрывая суммы от общественности и позволяя авторизованным сторонам проверять транзакции. Неправильные ответы искажают суть технологии - КТ не скрывает транзакции от регуляторов (приватность против секретности), не решает проблемы масштабируемости (это отдельная техническая проблема) и не создает механизмов ухода от налогов (законные инструменты приватности не обходят налоговые обязательства).
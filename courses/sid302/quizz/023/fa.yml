question: چرا اجرای سفته‌های Mayfell در Liquid به‌طور خاص از Confidential Transactions استفاده می‌کند و به جای آن از سوابق شفاف بلاکچین استفاده نمی‌کند؟
answer: الزامات حریم خصوصی تجاری ایجاب می‌کند که مبالغ وام تنها برای وام‌دهنده و وام‌گیرنده قابل مشاهده باشد، در حالی که قابلیت‌های تأیید حسابرس حفظ می‌شود.
wrong_answers:
  - مطابقت با مقررات در مکزیک ایجاب می‌کند که تمام تراکنش‌های مالی باید به طور کامل از نظارت دولت و مقامات مالیاتی پنهان بمانند.
  - سوابق شفاف باعث ایجاد گلوگاه‌های مقیاس‌پذیری می‌شوند که مانع از پردازش کارآمد ۲۵,۰۰۰+ سفته مورد نیاز توسط سیستم می‌گردند.
  - قابل مشاهده بودن عمومی مبالغ وام باعث ایجاد رویدادهای مالیاتی خودکار می‌شود که فرآیند توکن‌سازی را برای شرکت‌کنندگان از نظر مالی غیرقابل اجرا می‌کند.
explanation: |
  Confidential Transactions یک مشکل حیاتی در کسب‌وکارهای وام‌دهی تجاری را حل می‌کند: حفظ حریم خصوصی رقابتی در عین رعایت مقررات. در امور مالی سنتی، مبالغ وام بین کسب‌وکارها اطلاعات تجاری محرمانه‌ای هستند که نباید در دسترس رقبا قرار گیرند، اما حسابرسان و ناظران نیاز دارند تا صحت دفتر کل را تأیید کنند. Liquid's Confidential Transactions این تعادل را با پنهان‌سازی رمزنگاری‌شده مبالغ از عموم در حالی که به طرف‌های مجاز اجازه می‌دهد تا تراکنش‌ها را تأیید کنند، برقرار می‌کند. پاسخ‌های نادرست فناوری را نادرست نشان می‌دهند - CT تراکنش‌ها را از ناظران پنهان نمی‌کند (حریم خصوصی در مقابل محرمانگی)، مسائل مقیاس‌پذیری را حل نمی‌کند (این یک نگرانی فنی جداگانه است)، و مکانیزم‌های اجتناب از مالیات ایجاد نمی‌کند (ابزارهای حریم خصوصی مشروع تعهدات مالیاتی را دور نمی‌زنند).
question: Dlaczego implementacja weksli własnych przez Mayfell na Liquid w szczególności wykorzystuje Confidential Transactions zamiast używać przejrzystych zapisów blockchain?
answer: Komercyjne wymogi dotyczące prywatności wymagają, aby kwoty pożyczek pozostawały widoczne tylko dla pożyczkodawcy i pożyczkobiorcy, przy jednoczesnym zachowaniu możliwości weryfikacji przez audytora
wrong_answers:
  - Zgodność z przepisami w Meksyku wymaga, aby wszystkie transakcje finansowe były całkowicie ukryte przed nadzorem rządowym i organami podatkowymi
  - Przejrzyste zapisy stworzyłyby wąskie gardła skalowalności, które uniemożliwiłyby systemowi wydajne przetwarzanie wymaganych ponad 25 000 weksli własnych
  - Publiczna widoczność kwot pożyczek spowodowałaby automatyczne opodatkowanie, które uczyniłoby proces tokenizacji nieopłacalnym finansowo dla uczestników
explanation: |
  Confidential Transactions rozwiązuje krytyczny problem biznesowy w zakresie pożyczek komercyjnych: utrzymanie prywatności konkurencji przy jednoczesnym zapewnieniu zgodności z przepisami. W tradycyjnych finansach, kwoty pożyczek pomiędzy firmami są poufnymi informacjami handlowymi, do których konkurencja nie powinna mieć dostępu, jednak audytorzy i organy regulacyjne muszą weryfikować integralność księgi. Liquid Confidential Transactions osiąga tę równowagę poprzez kryptograficzne ukrywanie kwot przed opinią publiczną, jednocześnie umożliwiając upoważnionym stronom weryfikację transakcji. Błędne odpowiedzi błędnie przedstawiają tę technologię - CT nie ukrywa transakcji przed organami regulacyjnymi (prywatność a tajemnica), nie rozwiązuje kwestii skalowalności (to osobny problem techniczny) i nie tworzy mechanizmów unikania opodatkowania (legalne narzędzia do ochrony prywatności nie obchodzą zobowiązań podatkowych).
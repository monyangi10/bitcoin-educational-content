question: 為什麼 Mayfell 在 Liquid 上實現期票時特別利用 Confidential Transactions 而不是使用透明的區塊鏈記錄？
answer: 商業隱私要求貸款金額僅對貸款人和借款人可見，同時保留審計員驗證能力
wrong_answers:
  - 墨西哥的法規遵從規定，所有金融交易必須完全隱藏，不受政府監督和稅務機關的影響
  - 透明記錄會造成擴充性瓶頸，使系統無法有效率地處理所需的 25,000 多張期票
  - 貸款金額的公開可見性會引發自動課稅事件，使代用幣化過程對參與者而言在財務上不可行
explanation: |
  Confidential Transactions 解決了商業借貸中一個關鍵的商業問題：在維護競爭隱私的同時，還能符合法規要求。在傳統金融業中，企業間的貸款金額是商業機密資訊，競爭對手不應存取，但稽核人員和監管機構需要驗證分類帳的完整性。Liquid 的 Confidential Transactions 藉由加密技術隱藏公開金額，同時允許授權方驗證交易，達到此一平衡。錯誤的答案歪曲了這項技術 - CT 不會對監管機構隱藏交易（隱私與保密），無法解決擴充性問題（那是另一個技術問題），也不會創造避稅機制（合法的隱私工具不會規避稅務義務）。
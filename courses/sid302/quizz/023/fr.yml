question: Pourquoi la mise en œuvre par Mayfell des billets à ordre sur Liquid s'appuie-t-elle spécifiquement sur Confidential Transactions plutôt que d'utiliser des enregistrements transparents de la blockchain ?
answer: Les exigences commerciales en matière de confidentialité imposent que les montants des prêts ne soient visibles que par le prêteur et l'emprunteur, tout en préservant les capacités de vérification des auditeurs
wrong_answers:
  - La conformité réglementaire au Mexique exige que toutes les transactions financières soient totalement dissimulées à la surveillance du gouvernement et aux autorités fiscales
  - Les enregistrements transparents créeraient des goulets d'étranglement qui empêcheraient le système de traiter efficacement les plus de 25 000 billets à ordre requis
  - La visibilité publique des montants des prêts déclencherait des événements fiscaux automatiques qui rendraient le processus de tokenisation financièrement non viable pour les participants
explanation: |
  Confidential Transactions résout un problème commercial crucial dans le domaine des prêts commerciaux : maintenir la confidentialité de la concurrence tout en permettant la conformité à la réglementation. Dans la finance traditionnelle, les montants des prêts entre entreprises sont des informations commerciales confidentielles auxquelles les concurrents ne devraient pas avoir accès, alors que les auditeurs et les régulateurs ont besoin de vérifier l'intégrité du grand livre. Liquid's Confidential Transactions atteint cet équilibre en cachant cryptographiquement les montants au public tout en permettant aux parties autorisées de vérifier les transactions. Les mauvaises réponses donnent une image erronée de la technologie - le TC ne cache pas les transactions aux autorités de régulation (confidentialité vs. secret), ne résout pas les problèmes d'évolutivité (c'est une question technique distincte) et ne crée pas de mécanismes d'évasion fiscale (les outils légitimes de protection de la vie privée ne contournent pas les obligations fiscales).
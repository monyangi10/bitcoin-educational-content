question: Защо прилагането на записи на заповед на Mayfell в Liquid използва именно Confidential Transactions, а не прозрачни записи в блокчейн?
answer: Търговските изисквания за поверителност изискват сумите на заемите да останат видими само за заемодателя и заемополучателя, като същевременно се запазват възможностите за проверка от одитора
wrong_answers:
  - Спазването на нормативните изисквания в Мексико налага всички финансови транзакции да бъдат напълно скрити от държавния надзор и данъчните власти
  - Прозрачните записи ще създадат затруднения в мащабируемостта, които ще попречат на системата да обработва ефикасно необходимите над 25 000 записи на заповед
  - Публичната видимост на сумите на заемите би предизвикала автоматично данъчно облагане, което би направило процеса на токенизация финансово неизгоден за участниците
explanation: |
  Confidential Transactions решава критичен бизнес проблем в търговското кредитиране: поддържане на конкурентна поверителност, като в същото време позволява спазването на регулаторните изисквания. В традиционното финансиране сумите на заемите между предприятията са поверителна търговска информация, до която конкурентите не трябва да имат достъп, но одиторите и регулаторните органи трябва да проверяват целостта на счетоводните книги. Liquid на Confidential Transactions постига този баланс, като криптографски скрива сумите от обществеността, като същевременно позволява на оторизираните страни да проверяват транзакциите. Грешните отговори представят технологията погрешно - ГТ не крие трансакциите от регулаторите (поверителност срещу секретност), не решава проблемите с мащабируемостта (това е отделен технически проблем) и не създава механизми за избягване на данъци (законните инструменти за поверителност не заобикалят данъчните задължения).
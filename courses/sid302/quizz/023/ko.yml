question: 메이펠이 Liquid에서 약속 어음을 구현하면서 투명한 블록체인 기록을 사용하지 않고 특별히 Confidential Transactions을 활용하는 이유는 무엇인가요?
answer: 상업적 개인정보 보호 요구사항에 따라 대출 금액은 감사자 확인 기능을 유지하면서 대출자와 차입자에게만 공개되어야 합니다
wrong_answers:
  - 멕시코의 규정 준수에 따라 모든 금융 거래는 정부 감독 및 세무 당국으로부터 완전히 숨겨야 합니다
  - 투명한 기록은 시스템이 필요한 25,000개 이상의 약속 어음을 효율적으로 처리하지 못하게 하는 확장성 병목 현상을 일으킬 수 있습니다
  - 대출 금액이 공개되면 자동 과세 이벤트가 발생하여 참여자들이 토큰화 프로세스를 재정적으로 실행할 수 없게 됩니다
explanation: |
  Confidential Transactions는 상업 대출의 중요한 비즈니스 문제인 경쟁 프라이버시를 유지하면서 규제를 준수할 수 있도록 지원합니다. 기존 금융에서 기업 간 대출 금액은 경쟁업체가 접근해서는 안 되는 기밀 상업 정보이지만, 감사자와 규제 당국은 원장의 무결성을 확인해야 합니다. Liquid의 Confidential Transactions는 승인된 당사자가 거래를 확인할 수 있도록 하면서도 금액을 암호화하여 대중에게 숨겨 이러한 균형을 유지합니다. CT는 규제 기관으로부터 거래를 숨기지 않으며(프라이버시 대 비밀), 확장성 문제를 해결하지 않으며(이는 별도의 기술적 문제), 조세 회피 메커니즘을 만들지 않습니다(합법적인 프라이버시 도구는 납세 의무를 회피하지 않음).
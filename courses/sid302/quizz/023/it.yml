question: Perché l'implementazione di Mayfell delle cambiali sul Liquid sfrutta specificamente il Confidential Transactions invece di utilizzare i record trasparenti della blockchain?
answer: I requisiti di privacy commerciale richiedono che gli importi dei prestiti rimangano visibili solo al prestatore e al mutuatario, preservando al contempo le capacità di verifica dei revisori
wrong_answers:
  - La conformità normativa in Messico impone che tutte le transazioni finanziarie siano completamente nascoste alla supervisione del governo e alle autorità fiscali
  - I registri trasparenti creerebbero colli di bottiglia di scalabilità che impedirebbero al sistema di elaborare in modo efficiente le oltre 25.000 cambiali richieste
  - La visibilità pubblica degli importi dei prestiti innescherebbe eventi fiscali automatici che renderebbero il processo di tokenizzazione finanziariamente non sostenibile per i partecipanti
explanation: |
  Confidential Transactions risolve un problema critico nel settore dei prestiti commerciali: mantenere la privacy della concorrenza e consentire al contempo la conformità alle normative. Nella finanza tradizionale, gli importi dei prestiti tra aziende sono informazioni commerciali riservate a cui i concorrenti non dovrebbero accedere, ma i revisori e le autorità di regolamentazione devono verificare l'integrità del libro mastro. Il Liquid del Confidential Transactions raggiunge questo equilibrio nascondendo crittograficamente gli importi al pubblico e consentendo alle parti autorizzate di verificare le transazioni. Le risposte sbagliate travisano la tecnologia: la CT non nasconde le transazioni alle autorità di regolamentazione (privacy vs. segretezza), non risolve i problemi di scalabilità (si tratta di un problema tecnico separato) e non crea meccanismi di elusione fiscale (gli strumenti legittimi di privacy non eludono gli obblighi fiscali).
question: Por que razão a implementação de notas promissórias da Mayfell no Liquid utiliza especificamente o Confidential Transactions em vez de utilizar registos transparentes da cadeia de blocos?
answer: Os requisitos de privacidade comercial exigem que os montantes dos empréstimos permaneçam visíveis apenas para o mutuante e o mutuário, preservando as capacidades de verificação do auditor
wrong_answers:
  - A conformidade regulamentar no México obriga a que todas as transacções financeiras sejam completamente ocultas da supervisão governamental e das autoridades fiscais
  - Os registos transparentes criariam estrangulamentos de escalabilidade que impediriam o sistema de processar eficazmente as mais de 25 000 notas promissórias necessárias
  - A visibilidade pública dos montantes dos empréstimos desencadearia eventos de tributação automática que tornariam o processo de tokenização financeiramente inviável para os participantes
explanation: |
  O Confidential Transactions resolve um problema comercial crítico no sector dos empréstimos comerciais: manter a privacidade da concorrência e, ao mesmo tempo, permitir a conformidade regulamentar. Nas finanças tradicionais, os montantes dos empréstimos entre empresas são informações comerciais confidenciais a que os concorrentes não devem aceder, mas os auditores e os reguladores precisam de verificar a integridade do registo. O Liquid do Confidential Transactions consegue este equilíbrio ocultando criptograficamente os montantes do público e permitindo que as partes autorizadas verifiquem as transacções. As respostas erradas deturpam a tecnologia - a CT não oculta transacções dos reguladores (privacidade vs. sigilo), não resolve problemas de escalabilidade (é uma preocupação técnica separada) e não cria mecanismos de evasão fiscal (as ferramentas de privacidade legítimas não contornam as obrigações fiscais).
question: Waarom maakt Mayfell's implementatie van promesses op Liquid specifiek gebruik van Confidential Transactions in plaats van transparante blockchainrecords te gebruiken?
answer: Commerciële privacyvereisten vereisen dat leenbedragen alleen zichtbaar blijven voor kredietverstrekker en kredietnemer, terwijl de controlemogelijkheden voor auditors behouden blijven
wrong_answers:
  - Naleving van de regelgeving in Mexico schrijft voor dat alle financiële transacties volledig verborgen moeten blijven voor overheidstoezicht en belastingautoriteiten
  - Transparante records zouden schaalbaarheidsproblemen veroorzaken waardoor het systeem de vereiste 25.000+ promesses niet efficiënt zou kunnen verwerken
  - Publieke zichtbaarheid van leningbedragen zou automatische belastinggebeurtenissen teweegbrengen die het tokenisproces financieel niet levensvatbaar maken voor deelnemers
explanation: |
  Confidential Transactions lost een kritisch bedrijfsprobleem op in commerciële kredietverlening: het behouden van privacy van concurrenten terwijl naleving van de regelgeving mogelijk is. In de traditionele financiële sector zijn leenbedragen tussen bedrijven vertrouwelijke commerciële informatie waar concurrenten geen toegang toe mogen hebben, terwijl accountants en toezichthouders de integriteit van het grootboek moeten verifiëren. Liquid's Confidential Transactions bereiken deze balans door bedragen cryptografisch te verbergen voor het publiek, terwijl geautoriseerde partijen transacties kunnen verifiëren. De verkeerde antwoorden geven een verkeerd beeld van de technologie - CT verbergt geen transacties voor toezichthouders (privacy vs. geheimhouding), lost geen schaalbaarheidsproblemen op (dat is een apart technisch probleem) en creëert geen belastingontwijkingsmechanismen (legitieme privacytools omzeilen geen belastingverplichtingen).
question: ¿Por qué la implementación de Mayfell de pagarés en Liquid aprovecha específicamente Confidential Transactions en lugar de utilizar registros transparentes de blockchain?
answer: Los requisitos de privacidad comercial exigen que los importes de los préstamos sólo sean visibles para el prestamista y el prestatario, preservando al mismo tiempo la capacidad de verificación de los auditores
wrong_answers:
  - El cumplimiento de la normativa en México exige que todas las transacciones financieras estén completamente ocultas a la supervisión gubernamental y a las autoridades fiscales
  - Los registros transparentes crearían cuellos de botella de escalabilidad que impedirían al sistema procesar los más de 25.000 pagarés necesarios de forma eficiente
  - La visibilidad pública de los importes de los préstamos desencadenaría eventos fiscales automáticos que harían que el proceso de tokenización fuera financieramente inviable para los participantes
explanation: |
  Confidential Transactions resuelve un problema empresarial crítico en los préstamos comerciales: mantener la privacidad de la competencia al tiempo que permite el cumplimiento de la normativa. En las finanzas tradicionales, los importes de los préstamos entre empresas son información comercial confidencial a la que los competidores no deberían tener acceso, pero los auditores y reguladores necesitan verificar la integridad del libro mayor. La Confidential Transactions de Liquid logra este equilibrio ocultando criptográficamente los importes al público y permitiendo al mismo tiempo que las partes autorizadas verifiquen las transacciones. Las respuestas erróneas tergiversan la tecnología: la TC no oculta las transacciones a los reguladores (privacidad frente a secreto), no resuelve problemas de escalabilidad (eso es un problema técnico aparte) y no crea mecanismos de evasión fiscal (las herramientas legítimas de privacidad no eluden las obligaciones fiscales).
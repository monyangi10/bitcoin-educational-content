question: 在 Liquid 的動態聯盟 (Dynafed) 過渡過程中，當功能人員需要更換時，網路組態會發生什麼變化？
answer: 在新組態接管之前，網路會廣播轉換交易，接著是兩週的重疊期
wrong_answers:
  - 在廣播轉換交易後，網路會立即切換到新的功能組態
  - 在任何組態變更發生之前，所有功能人員必須同時投票批准替換
  - 網路需要硬 fork 並暫時關閉，以更新功能清單並重新啟動作業
explanation: |
  動態聯盟可讓 Liquid 透過精心安排的轉換程序，在沒有硬分叉的情況下演進。當需要更換功能時，網路會廣播轉換交易，訊息顯示即將發生的變更。隨後會有兩週的強制重疊期，讓新舊組態共存，以確保無縫連續性。其他選項都是不正確的，因為立即切換會造成網路不穩定的風險，同時投票並非使用的機制，而硬分叉正是 Dynafed 旨在避免的。
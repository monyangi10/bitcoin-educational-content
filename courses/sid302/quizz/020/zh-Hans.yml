question: 在 Liquid 的动态联盟（Dynafed）过渡过程中，当需要更换功能人员时，网络配置会发生什么变化？
answer: 在新配置接管之前，网络会广播一个过渡交易，然后是两周的重叠期
wrong_answers:
  - 网络在广播过渡事务后立即切换到新的功能配置
  - 在进行任何配置更改之前，所有职能部门必须同时投票批准替换
  - 网络需要硬 fork 和临时关闭，以更新功能列表并重新启动运行
explanation: |
  动态联盟允许 Liquid 通过精心策划的过渡过程在没有硬分叉的情况下发展。当需要更换功能时，网络会广播一个过渡事务，发出即将发生变化的信号。随后是两周的强制重叠期，新旧配置共存，确保无缝连续性。其他选项都是不正确的，因为立即切换会带来网络不稳定的风险，同步投票机制也不适用，而 Dynafed 正是为了避免硬分叉而设计的。
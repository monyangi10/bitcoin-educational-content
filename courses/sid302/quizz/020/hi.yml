question: Liquid की डायनेमिक फेडरेशन (डायनाफेड) संक्रमण प्रक्रिया के दौरान जब किसी पदाधिकारी को बदलने की आवश्यकता होती है, तो नेटवर्क कॉन्फ़िगरेशन पर क्या प्रभाव पड़ता है?
answer: नेटवर्क एक ट्रांज़िशन ट्रांज़ैक्शन प्रसारित करता है, जिसके बाद नई कॉन्फ़िगरेशन के लागू होने से पहले दो सप्ताह की ओवरलैप अवधि होती है।
wrong_answers:
  - ट्रांज़िशन ट्रांज़ैक्शन को प्रसारित करने के बाद नेटवर्क तुरंत नए फ़ंक्शनरी कॉन्फ़िगरेशन पर स्विच हो जाता है।
  - किसी भी कॉन्फ़िगरेशन परिवर्तन से पहले सभी पदाधिकारियों को एक साथ मतदान करके प्रतिस्थापन को मंजूरी देनी होगी।
  - नेटवर्क को fork के हार्ड अपडेट और अस्थायी शटडाउन की आवश्यकता है ताकि फंक्शनरी सूची को अपडेट किया जा सके और संचालन को पुनः आरंभ किया जा सके।
explanation: |
  डायनामिक फेडरेशन एक सुनियोजित परिवर्तन प्रक्रिया के माध्यम से Liquid को बिना किसी बड़े बदलाव के विकसित होने की अनुमति देता है। जब किसी पद को बदलने की आवश्यकता होती है, तो नेटवर्क एक परिवर्तन लेनदेन प्रसारित करता है जो आगामी बदलाव का संकेत देता है। इसके बाद अनिवार्य रूप से दो सप्ताह की ओवरलैप अवधि होती है जिसमें पुरानी और नई दोनों संरचनाएं साथ-साथ मौजूद रहती हैं, जिससे निर्बाध निरंतरता सुनिश्चित होती है। अन्य विकल्प गलत हैं क्योंकि तत्काल स्विचिंग से नेटवर्क अस्थिरता का खतरा होता है, एक साथ मतदान की व्यवस्था नहीं की जाती है, और डायनाफेड को विशेष रूप से बड़े बदलावों से बचने के लिए ही डिज़ाइन किया गया था।
question: Liquidのダイナミック・フェデレーション（Dynafed）移行プロセスで、ファンクショナリーの入れ替えが必要になった場合、ネットワーク・コンフィギュレーションはどうなりますか？
answer: ネットワークは移行トランザクションをブロードキャストし、その後、新しいコンフィギュレーションが引き継がれるまで2週間のオーバーラップ期間を設ける
wrong_answers:
  - 移行トランザクションをブロードキャストした後、ネットワークは直ちに新しい機能コンフィギュレーションに切り替わる。
  - 構成が変更される前に、すべてのファンクションが同時に交代を承認する投票を行わなければならない。
  - 機能リストを更新し、オペレーションを再開するためには、ハードforkと一時的なシャットダウンが必要です。
explanation: |
  ダイナミック・フェデレーションは、慎重に調整された移行プロセスを通じて、ハードフォークすることなくLiquidを進化させることを可能にする。機能の入れ替えが必要になると、ネットワークはトランジション・トランザクションをブロードキャストし、来るべき変更を通知する。これに続いて、新旧両方のコンフィギュレーションが共存する2週間のオーバーラップ期間が必須となり、シームレスな継続性が確保される。他の選択肢は、即座の切り替えはネットワークが不安定になる危険性があり、同時投票は使用されるメカニズムではなく、ハードフォークは特にダイナフェッドが回避するために設計されたものであるため、正しくない。
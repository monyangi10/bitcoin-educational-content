question: 기능자를 교체해야 하는 경우 Liquid의 동적 페더레이션(Dynafed) 전환 프로세스 중 네트워크 구성은 어떻게 되나요?
answer: 네트워크는 전환 트랜잭션을 브로드캐스트한 후 새 구성이 적용되기까지 2주간의 오버랩 기간을 거칩니다
wrong_answers:
  - 네트워크는 전환 트랜잭션을 브로드캐스트한 후 즉시 새로운 기능 구성으로 전환합니다
  - 구성 변경이 발생하기 전에 모든 직원은 동시에 투표를 통해 교체를 승인해야 합니다
  - 기능 목록을 업데이트하고 작업을 다시 시작하려면 네트워크에 하드 fork 및 임시 종료가 필요합니다
explanation: |
  동적 연합은 신중하게 조율된 전환 프로세스를 통해 하드 포크 없이 Liquid를 발전시킬 수 있습니다. 기능 교체가 필요한 경우, 네트워크는 다가오는 변경을 알리는 전환 트랜잭션을 브로드캐스트합니다. 그 후 2주간의 필수 오버랩 기간을 통해 이전 구성과 새 구성이 공존하여 원활한 연속성을 보장합니다. 다른 옵션은 즉각적인 전환이 네트워크 불안정의 위험이 있고, 동시 투표가 사용되는 메커니즘이 아니며, 하드포크는 특히 Dynafed가 피하도록 설계된 것이기 때문에 올바르지 않습니다.
question: Что происходит с конфигурацией сети во время процесса перехода к динамической федерации (Dynafed) Liquid, когда требуется замена одного из функционеров?
answer: Сеть передает сообщение о переходном периоде, после чего наступает двухнедельный период, прежде чем новая конфигурация вступит в силу
wrong_answers:
  - После передачи транзакции перехода сеть немедленно переключается на новую функциональную конфигурацию
  - Все функционеры должны одновременно проголосовать за замену, прежде чем произойдут какие-либо изменения в конфигурации
  - Сеть требует жесткого fork и временного отключения для обновления списка функционеров и возобновления работы
explanation: |
  Динамическая федерация позволяет Liquid развиваться без жестких развилок благодаря тщательно организованному процессу перехода. Когда возникает необходимость в замене функционала, сеть передает транзакцию перехода, которая сигнализирует о предстоящем изменении. После этого следует обязательный двухнедельный период наложения, в течение которого сосуществуют старая и новая конфигурации, обеспечивая бесперебойную работу. Другие варианты неверны, поскольку немедленное переключение чревато нестабильностью сети, одновременное голосование не является используемым механизмом, а жесткие развилки - это именно то, чего Dynafed был призван избежать.
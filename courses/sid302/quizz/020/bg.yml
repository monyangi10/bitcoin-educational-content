question: Какво се случва с конфигурацията на мрежата по време на процеса на преход към динамична федерация (Dynafed) на Liquid, когато трябва да се замени функционален служител?
answer: Мрежата излъчва транзакция за преход, последвана от двуседмичен период на застъпване, преди новата конфигурация да поеме управлението
wrong_answers:
  - Мрежата незабавно преминава към новата функционална конфигурация след излъчването на преходната транзакция
  - Всички служители трябва едновременно да гласуват за одобряване на замяната, преди да настъпят промени в конфигурацията
  - Мрежата се нуждае от твърд fork и временно изключване, за да се актуализира списъкът с функционери и да се рестартират операциите
explanation: |
  Динамичната федерация позволява на Liquid да се развива без трудни разклонения чрез внимателно организиран процес на преход. Когато е необходима замяна на функционер, мрежата излъчва транзакция за преход, която сигнализира за предстоящата промяна. Това е последвано от задължителен двуседмичен период на припокриване, в който едновременно съществуват старата и новата конфигурация, като се осигурява безпроблемна приемственост. Другите варианти са неправилни, тъй като незабавната смяна би довела до риск от нестабилност на мрежата, едновременното гласуване не е използваният механизъм, а твърдите разклонения са именно това, което Dynafed е проектиран да избегне.
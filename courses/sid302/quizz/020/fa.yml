question: در طی فرآیند انتقال فدراسیون پویا (Dynafed) در Liquid، چه اتفاقی برای پیکربندی شبکه می‌افتد زمانی که نیاز به جایگزینی یک کارگزار است؟
answer: شبکه یک تراکنش انتقال را پخش می‌کند و به دنبال آن یک دوره همپوشانی دو هفته‌ای قبل از اینکه پیکربندی جدید اعمال شود، انجام می‌شود.
wrong_answers:
  - شبکه بلافاصله پس از پخش تراکنش انتقال، به پیکربندی جدید کارکردی تغییر می‌کند.
  - همه کارگزاران باید به طور همزمان رأی به تأیید جایگزینی بدهند قبل از اینکه هرگونه تغییر پیکربندی رخ دهد
  - شبکه نیاز به یک fork سخت و خاموشی موقت دارد تا لیست عملکردی را به‌روزرسانی کرده و عملیات را از سر بگیرد.
explanation: |
  فدراسیون پویا به Liquid اجازه می‌دهد تا بدون فورک‌های سخت از طریق یک فرآیند انتقال با دقت هماهنگ شده تکامل یابد. هنگامی که نیاز به جایگزینی عملکردی وجود دارد، شبکه یک تراکنش انتقال را پخش می‌کند که تغییرات آینده را نشان می‌دهد. این کار با یک دوره همپوشانی دو هفته‌ای اجباری دنبال می‌شود که در آن هر دو پیکربندی قدیمی و جدید همزمان وجود دارند و تداوم بدون درز را تضمین می‌کنند. گزینه‌های دیگر نادرست هستند زیرا تغییر فوری خطر بی‌ثباتی شبکه را به همراه دارد، رأی‌گیری همزمان مکانیزم مورد استفاده نیست و فورک‌های سخت دقیقاً چیزی است که Dynafed برای جلوگیری از آن طراحی شده است.
question: ระหว่างกระบวนการเปลี่ยนผ่านของ Dynamic Federation (Dynafed) ของ Liquid เมื่อจำเป็นต้องเปลี่ยนผู้ทำหน้าที่ การกำหนดค่าเครือข่ายจะเกิดอะไรขึ้น?
answer: เครือข่ายจะออกอากาศธุรกรรมการเปลี่ยนผ่านตามด้วยช่วงเวลาซ้อนทับสองสัปดาห์ก่อนที่การกำหนดค่าใหม่จะเข้ามาแทนที่
wrong_answers:
  - เครือข่ายจะเปลี่ยนไปใช้การกำหนดค่าฟังก์ชันใหม่ทันทีหลังจากการออกอากาศธุรกรรมการเปลี่ยนแปลง
  - เจ้าหน้าที่ทุกคนต้องลงคะแนนเสียงพร้อมกันเพื่ออนุมัติการเปลี่ยนแปลงก่อนที่จะมีการเปลี่ยนแปลงการกำหนดค่าใด ๆ เกิดขึ้น
  - เครือข่ายต้องการ fork แบบฮาร์ดและการปิดชั่วคราวเพื่ออัปเดตรายชื่อผู้ทำหน้าที่และเริ่มการดำเนินงานใหม่
explanation: |
  Dynamic Federation ช่วยให้ Liquid พัฒนาได้โดยไม่ต้องใช้ฮาร์ดฟอร์กผ่านกระบวนการเปลี่ยนแปลงที่มีการจัดการอย่างรอบคอบ เมื่อจำเป็นต้องเปลี่ยนฟังก์ชันเนอร์ เครือข่ายจะกระจายธุรกรรมการเปลี่ยนแปลงที่ส่งสัญญาณการเปลี่ยนแปลงที่จะเกิดขึ้น จากนั้นจะมีช่วงเวลาซ้อนทับบังคับสองสัปดาห์ที่การกำหนดค่าทั้งเก่าและใหม่อยู่ร่วมกัน เพื่อให้มั่นใจถึงความต่อเนื่องที่ราบรื่น ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะการสลับทันทีจะเสี่ยงต่อความไม่เสถียรของเครือข่าย การลงคะแนนพร้อมกันไม่ใช่กลไกที่ใช้ และฮาร์ดฟอร์กเป็นสิ่งที่ Dynafed ออกแบบมาเพื่อหลีกเลี่ยงโดยเฉพาะ
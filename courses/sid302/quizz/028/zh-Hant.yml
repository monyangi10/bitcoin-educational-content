question: AMP 受規管資產轉移的聯署授權模式所出現的重要操作漏洞是什麼？
answer: 如果 AMP 伺服器無法使用，資產流通會完全暫停，因為每次轉移都需要伺服器共同簽署
wrong_answers:
  - 當多個共同簽字人嘗試同時授權轉帳時，交易費用會成倍增加
  - 共同簽署會將盲點因素暴露給網路觀察者，導致保密交易隱私破壞
  - 當共同簽署機制將私鑰傳輸至 AMP 伺服器時，資產持有人會失去保管控制權
explanation: |
  AMP 的授權模式需要 AMP 伺服器共同簽署每筆資產轉移，因此會產生單點故障。如果伺服器離線，任何交易都無法完成，實際上凍結了所有資產的流動性。其他選項並不正確：費用不會因共同簽署而成倍增加，保密交易隱私保持不變（僅發行者獲得可見性），使用者保留其私人金鑰，而伺服器僅提供授權簽署。
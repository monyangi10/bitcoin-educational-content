question: AMPの規制対象資産移転における共同署名承認モデルから浮かび上がる、業務上の重大な脆弱性とは何か？
answer: すべての送金にはサーバーの共同署名が必要なため、AMPサーバーが利用できなくなった場合、資産の流動性は完全に一時停止します。
wrong_answers:
  - 複数の連帯保証人が同時に送金を承認しようとすると、取引手数料は指数関数的に増加する。
  - 共同署名はネットワーク・オブザーバーに盲目的になる要因を暴露するため、機密取引のプライバシーは崩壊する。
  - 共同署名メカニズムが秘密鍵をAMPサーバーに転送するため、資産保有者は保管管理を失う。
explanation: |
  AMPの承認モデルでは、AMPサーバーがすべての資産移転に署名する必要があるため、単一障害点が発生する。サーバーがオフラインになった場合、取引は完了せず、事実上すべての資産の流動性が凍結される。他の選択肢は正しくない。共同署名によって手数料が指数関数的に増加することはなく、Confidential Transactionのプライバシーはそのまま維持され（発行者のみが可視性を得る）、ユーザーは秘密鍵を保持し、サーバーは認可署名を提供するだけである。
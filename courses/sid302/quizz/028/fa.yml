question: آسیب‌پذیری عملیاتی بحرانی که از مدل مجوز هم‌امضایی AMP برای انتقال دارایی‌های تنظیم‌شده ناشی می‌شود چیست؟
answer: نقدینگی دارایی به‌طور کامل متوقف می‌شود اگر سرور AMP در دسترس نباشد، زیرا هر انتقال نیاز به امضای مشترک سرور دارد.
wrong_answers:
  - هزینه‌های تراکنش به صورت نمایی افزایش می‌یابد زمانی که چندین امضاکننده به طور همزمان تلاش می‌کنند انتقال‌ها را تأیید کنند.
  - حریم خصوصی تراکنش‌های محرمانه از بین می‌رود زیرا امضای مشترک، عوامل کورکننده را به ناظران شبکه فاش می‌کند.
  - دارندگان دارایی کنترل حضانت را از دست می‌دهند زیرا مکانیزم هم‌امضایی کلیدهای خصوصی را به سرور AMP منتقل می‌کند.
explanation: |
  مدل مجوز AMP نیاز دارد که سرور AMP هر انتقال دارایی را هم‌امضا کند، که یک نقطه شکست واحد ایجاد می‌کند. اگر سرور آفلاین شود، هیچ تراکنشی نمی‌تواند تکمیل شود و به طور مؤثر تمام نقدینگی دارایی‌ها را منجمد می‌کند. گزینه‌های دیگر نادرست هستند: هزینه‌ها با هم‌امضایی به صورت نمایی افزایش نمی‌یابند، حریم خصوصی تراکنش‌های محرمانه دست‌نخورده باقی می‌ماند (فقط صادرکننده دید پیدا می‌کند)، و کاربران کلیدهای خصوصی خود را حفظ می‌کنند در حالی که سرور فقط امضاهای مجوز را فراهم می‌کند.
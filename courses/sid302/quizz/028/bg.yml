question: Коя е критичната оперативна уязвимост, която възниква при модела на AMP за разрешаване на съподписване на регулирани прехвърляния на активи?
answer: Ликвидността на активите се спира напълно, ако сървърът на AMP стане недостъпен, тъй като всеки трансфер изисква съподпис от сървъра
wrong_answers:
  - Таксите за транзакциите се увеличават експоненциално, когато няколко съподписващи се опитат да разрешат преводи едновременно
  - Поверителна поверителност на транзакциите се нарушава, тъй като съвместното подписване разкрива ослепителни фактори пред мрежовите наблюдатели
  - Притежателите на активи губят контрол върху съхранението, тъй като механизмът за съвместно подписване прехвърля частните ключове на сървъра на AMP
explanation: |
  Моделът за оторизация на AMP изисква сървърът на AMP да подписва всяко прехвърляне на активи, което създава една единствена точка на провал. Ако сървърът излезе от строя, не могат да бъдат извършени никакви транзакции, което на практика води до замразяване на цялата ликвидност на активите. Другите варианти са некоректни: таксите не се увеличават експоненциално със съподписване, поверителността на поверителните транзакции остава непокътната (само издателят получава видимост) и потребителите запазват частните си ключове, докато сървърът осигурява само подписи за оторизация.
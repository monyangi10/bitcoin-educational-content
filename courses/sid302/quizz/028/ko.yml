question: 규제 대상 자산 전송을 위한 AMP의 공동 서명 승인 모델에서 나타나는 중요한 운영상의 취약점은 무엇인가요?
answer: 모든 전송에는 서버 공동 서명이 필요하므로 AMP 서버를 사용할 수 없게 되면 자산 유동성이 완전히 일시 중지됩니다
wrong_answers:
  - 여러 명의 공동 서명자가 동시에 송금을 승인하려고 하면 거래 수수료가 기하급수적으로 증가합니다
  - 공동 서명은 네트워크 관찰자에게 눈 가리고 아웅하는 요소를 노출하기 때문에 기밀 거래 개인정보 보호가 무너집니다
  - 공동 서명 메커니즘이 개인 키를 AMP 서버로 전송하기 때문에 자산 보유자는 수탁 통제권을 잃게 됩니다
explanation: |
  AMP의 인증 모델에서는 모든 자산 전송에 AMP 서버가 공동 서명해야 하므로 단일 장애 지점이 발생합니다. 서버가 오프라인 상태가 되면 거래가 완료되지 않아 모든 자산 유동성이 사실상 동결됩니다. 다른 옵션은 공동 서명으로 인해 수수료가 기하급수적으로 증가하지 않고, 기밀 거래 개인정보가 그대로 유지되며(발급자만 가시성을 확보), 서버가 인증 서명만 제공하는 동안 사용자는 개인 키를 유지합니다.
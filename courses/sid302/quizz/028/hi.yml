question: विनियमित परिसंपत्ति हस्तांतरण के लिए एएमपी के सह-हस्ताक्षर प्राधिकरण मॉडल से कौन सी महत्वपूर्ण परिचालन संबंधी कमजोरी उभरती है?
answer: यदि एएमपी सर्वर अनुपलब्ध हो जाता है तो परिसंपत्ति की तरलता पूरी तरह से रुक जाती है क्योंकि प्रत्येक हस्तांतरण के लिए सर्वर के सह-हस्ताक्षर की आवश्यकता होती है।
wrong_answers:
  - जब एक से अधिक सह-हस्ताक्षरकर्ता एक साथ हस्तांतरण को अधिकृत करने का प्रयास करते हैं तो लेनदेन शुल्क में तेजी से वृद्धि होती है।
  - गोपनीय लेनदेन की गोपनीयता भंग हो जाती है क्योंकि सह-हस्ताक्षर करने से नेटवर्क पर्यवेक्षकों के लिए ऐसे कारक उजागर हो जाते हैं जो गोपनीयता को छिपाते हैं।
  - सह-हस्ताक्षर तंत्र द्वारा निजी कुंजियों को एएमपी सर्वर पर स्थानांतरित करने के कारण परिसंपत्ति धारक अभिरक्षा नियंत्रण खो देते हैं।
explanation: |
  एएमपी के प्राधिकरण मॉडल के अनुसार, प्रत्येक परिसंपत्ति हस्तांतरण पर एएमपी सर्वर का सह-हस्ताक्षर होना आवश्यक है, जिससे विफलता का एक ही बिंदु बन जाता है। यदि सर्वर ऑफ़लाइन हो जाता है, तो कोई भी लेनदेन पूरा नहीं हो सकता, जिससे परिसंपत्ति की तरलता प्रभावी रूप से रुक जाती है। अन्य विकल्प गलत हैं: सह-हस्ताक्षर के साथ शुल्क में तेजी से वृद्धि नहीं होती है, गोपनीय लेनदेन की गोपनीयता बरकरार रहती है (केवल जारीकर्ता को ही इसकी जानकारी मिलती है), और उपयोगकर्ता अपनी निजी कुंजी अपने पास रखते हैं जबकि सर्वर केवल प्राधिकरण हस्ताक्षर प्रदान करता है।
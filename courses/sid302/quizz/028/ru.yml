question: В чем заключается критическая операционная уязвимость, возникающая при использовании модели авторизации AMP с совместной подписью для регулируемых переводов активов?
answer: Ликвидность активов полностью останавливается, если сервер AMP становится недоступным, так как каждый перевод требует соподписания сервера
wrong_answers:
  - Комиссии за транзакции растут в геометрической прогрессии, когда несколько соподписателей пытаются одновременно авторизовать переводы
  - Конфиденциальность сделок нарушается, поскольку совместное подписание раскрывает наблюдателям в сети ослепляющие факторы
  - Владельцы активов теряют контроль над хранением, поскольку механизм совместного подписания передает закрытые ключи серверу AMP
explanation: |
  Модель авторизации AMP требует, чтобы сервер AMP подписывал каждую передачу активов, что создает единую точку отказа. Если сервер выходит из строя, ни одна транзакция не может быть завершена, что фактически замораживает ликвидность всех активов. Другие варианты неверны: комиссии не растут экспоненциально при совместном подписании, конфиденциальность конфиденциальных транзакций остается нетронутой (видимость получает только эмитент), а пользователи сохраняют свои приватные ключи, в то время как сервер только предоставляет авторизационные подписи.
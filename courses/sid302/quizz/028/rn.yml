question: Ni ubuhe bugoyagoye buhambaye bw’ibikorwa buva ku citegererezo ca AMP co gusinyana uruhusha rwo gutanga umutungo mu buryo butegekanijwe?
answer: Ivy'ubutunzi birahagarara burundu iyo umukozi wa AMP ataboneka kuko ukwimurira kwose bisaba umukono w'umukozi
wrong_answers:
  - Amafaranga y'ugucuruza araduga cane iyo abasinye benshi bagerageza kwemerera kwimurira amafaranga icarimwe
  - Ibanga ry'Ibikorwa vy'Ibanga rirasenyuka kubera ko gusinyana hamwe bigaragaza ibintu bihuma amaso abarorerezi b'urubuga
  - Abafise itunga baratakaza ububasha bwo kuzigama uko uburyo bwo gusinyana burungika imfunguruzo z'ibanga kuri server ya AMP
explanation: |
  Icogereranyo c’ukwemerera ca AMP gisaba ko umukozi wa AMP ashira umukono ku bijanye n’ugutanga umutungo wose, bikaba bituma habaho ikintu kimwe co kunanirwa. Iyo server ivuye ku murongo, nta bikorwa bishobora kurangira, bikaba bishobora guhagarika amafaranga yose y’itunga. Ayandi mahitamwo ntabwo ari meza: amafaranga ntayongera cane iyo umuntu asinye hamwe, ubuzima bwite bw’Ibanga ry’Ibikorwa buraguma ari ubwo nyene (uwutanga gusa ni we abona), kandi abakoresha bagumana imfunguruzo zabo z’ibanga mu gihe umukozi atanga gusa imikono y’uruhusha.
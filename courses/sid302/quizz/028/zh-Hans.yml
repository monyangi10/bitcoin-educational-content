question: AMP 受监管资产转移的联署授权模式在操作上出现的关键漏洞是什么？
answer: 如果 AMP 服务器不可用，资产流动就会完全暂停，因为每次转账都需要服务器联合签名
wrong_answers:
  - 当多个共同签署人试图同时授权转账时，交易费用会成倍增加
  - 共同签署会向网络观察者暴露盲点因素，从而破坏保密交易的私密性
  - 当共同签署机制将私钥转移到 AMP 服务器时，资产持有人将失去监管控制权
explanation: |
  AMP 的授权模式要求 AMP 服务器共同签署每笔资产转让，这就造成了单点故障。如果服务器离线，任何交易都无法完成，从而有效冻结了所有资产的流动性。其他选项都是错误的：费用不会因为共同签署而成倍增加，保密交易隐私保持不变（只有发行方才有可见性），用户保留自己的私钥，而服务器只提供授权签名。
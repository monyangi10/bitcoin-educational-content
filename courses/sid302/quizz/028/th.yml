question: ความเปราะบางในการดำเนินงานที่สำคัญที่เกิดขึ้นจากรูปแบบการอนุมัติการลงนามร่วมของ AMP สำหรับการโอนสินทรัพย์ที่มีการควบคุมคืออะไร?
answer: สภาพคล่องของสินทรัพย์จะหยุดชะงักโดยสมบูรณ์หากเซิร์ฟเวอร์ AMP ไม่พร้อมใช้งานเนื่องจากการโอนทุกครั้งต้องการลายเซ็นร่วมจากเซิร์ฟเวอร์
wrong_answers:
  - ค่าธรรมเนียมการทำธุรกรรมเพิ่มขึ้นอย่างรวดเร็วเมื่อผู้ลงนามร่วมหลายคนพยายามอนุมัติการโอนพร้อมกัน
  - การทำธุรกรรมที่เป็นความลับสูญเสียความเป็นส่วนตัวเนื่องจากการร่วมลงนามเปิดเผยปัจจัยการปิดบังต่อผู้สังเกตการณ์เครือข่าย
  - ผู้ถือสินทรัพย์สูญเสียการควบคุมการดูแลเมื่อกลไกการร่วมลงนามโอนคีย์ส่วนตัวไปยังเซิร์ฟเวอร์ AMP
explanation: |
  โมเดลการอนุญาตของ AMP ต้องการให้เซิร์ฟเวอร์ AMP ร่วมลงนามในทุกการโอนสินทรัพย์ ซึ่งสร้างจุดล้มเหลวเพียงจุดเดียว หากเซิร์ฟเวอร์ออฟไลน์ จะไม่สามารถทำธุรกรรมใดๆ ได้สำเร็จ ซึ่งจะทำให้สภาพคล่องของสินทรัพย์ทั้งหมดหยุดชะงัก ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: ค่าธรรมเนียมไม่ได้เพิ่มขึ้นอย่างทวีคูณกับการร่วมลงนาม ความเป็นส่วนตัวของการทำธุรกรรมที่เป็นความลับยังคงอยู่ (มีเพียงผู้ออกเท่านั้นที่สามารถมองเห็นได้) และผู้ใช้ยังคงรักษากุญแจส่วนตัวของตนไว้ ในขณะที่เซิร์ฟเวอร์ให้เพียงลายเซ็นการอนุญาตเท่านั้น
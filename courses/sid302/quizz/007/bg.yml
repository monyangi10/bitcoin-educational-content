question: Каква е връзката между Elements и Liquid Network?
answer: Liquid е специфичен екземпляр на странична верига Elements, конфигурирана за производствена употреба
wrong_answers:
  - Elements е специфичен екземпляр на Liquid Network, конфигуриран за целите на тестването
  - Liquid и Elements са две конкурентни блокчейн платформи с различни кодови бази
  - "Elements е механизмът за консенсус, който захранва валидирането на блоковете на Liquid Network."
explanation: |
  Elements е софтуерът на платформата за блокчейн с отворен код, а Liquid е специфична реализация или "инстанция" на странична верига Elements, която е конфигурирана за производствена употреба с федеративен модел на консенсус. Мислете за Elements като за базовата технологична рамка, а за Liquid - като за една конкретна мрежа, изградена с помощта на тази рамка. Това е подобно на начина, по който Bitcoin Core е софтуерът, който захранва мрежата Bitcoin - Elements е софтуерният двигател, който захранва Liquid и други персонализирани странични вериги.
question: ความสัมพันธ์ระหว่าง Elements และ Liquid Network คืออะไร?
answer: Liquid เป็นกรณีเฉพาะของไซด์เชน Elements ที่ถูกกำหนดค่าสำหรับการใช้งานในสภาพแวดล้อมการผลิต
wrong_answers:
  - Elements เป็นกรณีเฉพาะของ Liquid Network ที่กำหนดค่าไว้สำหรับการทดสอบ
  - Liquid และ Elements เป็นสองแพลตฟอร์มบล็อกเชนที่แข่งขันกันโดยมีฐานรหัสที่แตกต่างกัน
  - "Elements เป็นกลไกฉันทามติที่ขับเคลื่อนการตรวจสอบบล็อกของ Liquid Network"
explanation: |
  Elements คือซอฟต์แวร์แพลตฟอร์มบล็อกเชนแบบโอเพ่นซอร์ส ในขณะที่ Liquid เป็นการใช้งานเฉพาะหรือ 'instance' ของไซด์เชน Elements ที่ได้รับการกำหนดค่าสำหรับการใช้งานในสภาพแวดล้อมการผลิตด้วยโมเดลฉันทามติแบบสหพันธ์ คิดว่า Elements เป็นกรอบเทคโนโลยีพื้นฐาน และ Liquid เป็นเครือข่ายเฉพาะที่สร้างขึ้นโดยใช้กรอบงานนั้น ซึ่งคล้ายกับวิธีที่ Bitcoin Core เป็นซอฟต์แวร์ที่ขับเคลื่อนเครือข่าย Bitcoin - Elements เป็นเครื่องยนต์ซอฟต์แวร์ที่ขับเคลื่อน Liquid และไซด์เชนที่กำหนดเองอื่น ๆ
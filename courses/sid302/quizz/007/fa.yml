question: رابطه بین Elements و Liquid Network چیست؟
answer: ‏Liquid یک نمونه خاص از زنجیره جانبی Elements است که برای استفاده تولیدی پیکربندی شده است.
wrong_answers:
  - Elements یک نمونه خاص از Liquid Network است که برای اهداف آزمایشی پیکربندی شده است.
  - Liquid و Elements دو پلتفرم بلاکچین رقیب با پایگاه‌های کد متفاوت هستند.
  - "Elements مکانیسم اجماعی است که اعتبارسنجی بلوک Liquid Network را تأمین می‌کند"
explanation: |
  Elements نرم‌افزار پلتفرم بلاک‌چین متن‌باز است، در حالی که Liquid یک پیاده‌سازی خاص یا 'نمونه' از یک زنجیره جانبی Elements است که برای استفاده تولیدی با یک مدل اجماع فدرال تنظیم شده است. Elements را به عنوان چارچوب فناوری زیربنایی در نظر بگیرید و Liquid را به عنوان یک شبکه خاص که با استفاده از آن چارچوب ساخته شده است. این مشابه این است که چگونه Bitcoin Core نرم‌افزاری است که شبکه Bitcoin را قدرت می‌بخشد - Elements موتور نرم‌افزاری است که Liquid و زنجیره‌های جانبی سفارشی دیگر را قدرت می‌بخشد.
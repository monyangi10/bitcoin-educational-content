question: Какова связь между Elements и Liquid Network?
answer: Liquid - это конкретный экземпляр сайдчейна Elements, настроенный для использования в производстве
wrong_answers:
  - Elements - это конкретный экземпляр Liquid Network, сконфигурированный для целей тестирования
  - Liquid и Elements - две конкурирующие блокчейн-платформы с разными кодовыми базами
  - "Elements - это механизм консенсуса, который обеспечивает валидацию блока Liquid Network"
explanation: |
  Elements - это программное обеспечение платформы блокчейна с открытым исходным кодом, а Liquid - это конкретная реализация или "экземпляр" сайдчейна Elements, который был настроен для использования в производстве с федеративной моделью консенсуса. Считайте, что Elements - это технологическая основа, а Liquid - конкретная сеть, построенная на этой основе. Это похоже на то, как Bitcoin Core является программным обеспечением для сети Bitcoin, а Elements - программным движком для Liquid и других пользовательских сайдчейнов.
question: Elements और Liquid Network के बीच क्या संबंध है?
answer: Liquid, Elements साइडचेन का एक विशिष्ट उदाहरण है जिसे उत्पादन उपयोग के लिए कॉन्फ़िगर किया गया है।
wrong_answers:
  - Elements, Liquid Network का एक विशिष्ट उदाहरण है जिसे परीक्षण उद्देश्यों के लिए कॉन्फ़िगर किया गया है।
  - Liquid और Elements दो प्रतिस्पर्धी ब्लॉकचेन प्लेटफॉर्म हैं जिनके कोडबेस अलग-अलग हैं।
  - "Elements वह सर्वसम्मति तंत्र है जो Liquid Network के ब्लॉक सत्यापन को शक्ति प्रदान करता है।"
explanation: |
  Elements ओपन-सोर्स ब्लॉकचेन प्लेटफॉर्म सॉफ्टवेयर है, जबकि Liquid एक विशिष्ट कार्यान्वयन या Elements साइडचेन का 'इंस्टेंस' है जिसे फेडरेटेड कंसेंसस मॉडल के साथ उत्पादन उपयोग के लिए कॉन्फ़िगर किया गया है। Elements को अंतर्निहित प्रौद्योगिकी फ्रेमवर्क और Liquid को उस फ्रेमवर्क का उपयोग करके निर्मित एक विशेष नेटवर्क के रूप में समझें। यह उसी प्रकार है जैसे Bitcoin कोर वह सॉफ्टवेयर है जो Bitcoin नेटवर्क को शक्ति प्रदान करता है - Elements वह सॉफ्टवेयर इंजन है जो Liquid और अन्य कस्टम साइडचेन को शक्ति प्रदान करता है।
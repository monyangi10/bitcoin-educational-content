question: Breez SDK के डेवलपर इंटरफेस में तीन चरणों वाली कनेक्ट, प्रिपेयर और एक्जीक्यूट प्रक्रिया का प्राथमिक उद्देश्य क्या है?
answer: वॉलेट को सिंक्रनाइज़ करके, सभी शुल्कों की गणना पहले से करके और फिर लेनदेन का निर्माण करके जटिल वित्तीय प्रवाहों को मानकीकृत करना।
wrong_answers:
  - किसी भी एटॉमिक ऑपरेशन को शुरू करने से पहले कई स्वैप प्रदाताओं में रिडंडेंट बैकअप कनेक्शन स्थापित करना।
  - क्रॉस-चेन सबमरीन स्वैप लेनदेन में शामिल प्रत्येक नेटवर्क के लिए अलग-अलग क्रिप्टोग्राफिक हस्ताक्षर बनाने के लिए।
  - एस्क्रो तंत्र से धनराशि जारी करने से पहले समय-बद्ध अनुबंधों के विरुद्ध भुगतान पूर्व-छवियों को मान्य करना।
explanation: |
  कनेक्ट, प्रिपेयर, एक्ज़ीक्यूट पैटर्न जटिल ऑपरेशनों को प्रबंधनीय चरणों में विभाजित करके विकास को सरल बनाता है: कनेक्ट वॉलेट को आरंभ करता है और मॉनिटरिंग कनेक्शन स्थापित करता है, प्रिपेयर सभी लागतों की गणना करता है और उन्हें उपयोगकर्ताओं के लिए पारदर्शी रूप से प्रदर्शित करता है, और एक्ज़ीक्यूट वास्तविक लेनदेन निर्माण और प्रसारण को संभालता है। यह मानकीकरण सबमरीन स्वैप और क्रॉस-चेन ऑपरेशनों की अंतर्निहित जटिलता को दूर करता है, जिससे डेवलपर्स के लिए निम्न-स्तरीय विवरणों को प्रबंधित किए बिना Bitcoin कार्यक्षमता को एकीकृत करना आसान हो जाता है।
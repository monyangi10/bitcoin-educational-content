question: هدف اصلی فرآیند سه‌مرحله‌ای Connect، Prepare و Execute در رابط توسعه‌دهنده Breez SDK چیست؟
answer: استانداردسازی جریان‌های مالی پیچیده با همگام‌سازی کیف‌پول‌ها، محاسبه تمامی هزینه‌ها به‌صورت پیش‌پرداخت، و سپس ساخت تراکنش‌ها
wrong_answers:
  - برای ایجاد اتصالات پشتیبان افزونه در میان چندین ارائه‌دهنده مبادله قبل از شروع هر عملیات اتمی
  - برای ایجاد امضاهای رمزنگاری جداگانه برای هر شبکه درگیر در تراکنش‌های مبادله زیرآبی بین زنجیره‌ای
  - برای اعتبارسنجی پیش‌تصاویر پرداخت در برابر قراردادهای زمان‌قفل‌شده قبل از آزادسازی وجوه از مکانیزم‌های امانی
explanation: |
  الگوی Connect, Prepare, Execute توسعه را با تقسیم عملیات پیچیده به مراحل قابل مدیریت ساده می‌کند: Connect کیف پول‌ها را راه‌اندازی کرده و اتصالات نظارتی را برقرار می‌کند، Prepare تمام هزینه‌ها را به‌صورت شفاف برای کاربران محاسبه و نمایش می‌دهد، و Execute به ساخت و پخش تراکنش واقعی می‌پردازد. این استانداردسازی پیچیدگی‌های زیرساختی مبادلات زیرآبی و عملیات زنجیره‌ای متقابل را پنهان می‌کند و به توسعه‌دهندگان امکان می‌دهد تا عملکرد Bitcoin را بدون مدیریت جزئیات سطح پایین ادغام کنند.
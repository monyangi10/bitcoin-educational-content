question: 在 Breez SDK 的開發人員介面中，連接、準備和執行三個步驟的主要目的是什麼？
answer: 透過同步錢包、預先計算所有費用，然後建構交易，將複雜的資金流標準化
wrong_answers:
  - 在啟動任何原子作業之前，在多個交換提供者之間建立備援連接
  - 為跨鏈海底交換交易涉及的每個網路建立獨立的加密簽章
  - 在從託管機制釋放資金之前，針對鎖定時間的合約驗證付款預設影像
explanation: |
  Connect, Prepare, Execute 模式可將複雜的作業分割成易於管理的步驟，從而簡化開發過程：Connect 會初始化錢包並建立監控連線，Prepare 會計算所有成本並透明地顯示給使用者，Execute 則會處理實際的交易建構與廣播。此標準化抽象出海底交換和跨鏈作業的底層複雜性，讓開發人員更容易整合 Bitcoin 功能，而無需管理低階細節。
question: Каква е основната цел на процеса от три стъпки "Свързване, подготовка и изпълнение" в интерфейса за разработчици на Breez SDK?
answer: Стандартизиране на сложни финансови потоци чрез синхронизиране на портфейли, предварително изчисляване на всички такси и след това конструиране на транзакции
wrong_answers:
  - Създаване на излишни резервни връзки в няколко доставчика на суап преди започване на атомични операции
  - Създаване на отделни криптографски подписи за всяка мрежа, участваща в транзакциите за подводен суап между веригите
  - Валидиране на предварителните изображения на плащанията спрямо договорите с фиксиран срок преди освобождаване на средства от механизмите за доверително управление
explanation: |
  Шаблонът "Свързване, подготовка, изпълнение" опростява разработката, като разделя сложните операции на управляеми стъпки: Connect инициализира портфейлите и установява връзки за наблюдение, Prepare изчислява и показва всички разходи прозрачно за потребителите, а Execute обработва действителното изграждане и излъчване на транзакциите. Тази стандартизация абстрахира основната сложност на подводните суапове и операциите между веригите, което улеснява разработчиците да интегрират функционалността на Bitcoin, без да управляват детайлите на ниско ниво.
question: Каково основное назначение трехэтапного процесса Connect, Prepare и Execute в интерфейсе разработчика Breez SDK?
answer: Стандартизация сложных финансовых потоков путем синхронизации кошельков, предварительного расчета всех комиссий и последующего построения транзакций
wrong_answers:
  - Чтобы установить избыточные резервные соединения с несколькими провайдерами подкачки, прежде чем инициировать любые атомарные операции
  - Создание отдельных криптографических подписей для каждой сети, участвующей в межцепочечных подводных своп-транзакциях
  - Проверка предварительных образов платежей по контрактам с временной блокировкой перед выпуском средств из механизмов условного депонирования
explanation: |
  Шаблон Connect, Prepare, Execute упрощает разработку, разбивая сложные операции на управляемые шаги: Connect инициализирует кошельки и устанавливает соединения для мониторинга, Prepare рассчитывает и отображает все затраты прозрачно для пользователей, а Execute обрабатывает фактическое построение транзакций и трансляцию. Такая стандартизация абстрагирует базовую сложность подводных свопов и кросс-цепочечных операций, облегчая разработчикам интеграцию функциональности Bitcoin без управления низкоуровневыми деталями.
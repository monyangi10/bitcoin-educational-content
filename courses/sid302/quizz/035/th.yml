question: วัตถุประสงค์หลักของกระบวนการสามขั้นตอน Connect, Prepare, และ Execute ในอินเทอร์เฟซนักพัฒนาของ Breez SDK คืออะไร?
answer: เพื่อมาตรฐานการไหลของการเงินที่ซับซ้อนโดยการซิงค์กระเป๋าเงิน คำนวณค่าธรรมเนียมทั้งหมดล่วงหน้า และจากนั้นสร้างธุรกรรม
wrong_answers:
  - เพื่อสร้างการเชื่อมต่อสำรองที่ซ้ำซ้อนกับผู้ให้บริการสวอปหลายรายก่อนเริ่มดำเนินการอะตอมมิกใด ๆ
  - สร้างลายเซ็นการเข้ารหัสแยกต่างหากสำหรับแต่ละเครือข่ายที่เกี่ยวข้องในการทำธุรกรรมแลกเปลี่ยนข้ามเครือข่ายแบบใต้น้ำ
  - เพื่อตรวจสอบความถูกต้องของภาพล่วงหน้าการชำระเงินกับสัญญาที่ล็อคเวลา ก่อนที่จะปล่อยเงินจากกลไกเอสโครว์
explanation: |
  รูปแบบ Connect, Prepare, Execute ช่วยให้การพัฒนาง่ายขึ้นโดยการแบ่งการดำเนินการที่ซับซ้อนออกเป็นขั้นตอนที่จัดการได้: Connect ทำการเริ่มต้นกระเป๋าเงินและสร้างการเชื่อมต่อการตรวจสอบ, Prepare คำนวณและแสดงค่าใช้จ่ายทั้งหมดอย่างโปร่งใสต่อผู้ใช้, และ Execute จัดการการสร้างและการกระจายธุรกรรมจริง การมาตรฐานนี้ช่วยลดความซับซ้อนที่อยู่เบื้องหลังของการแลกเปลี่ยนใต้น้ำและการดำเนินการข้ามสายโซ่ ทำให้นักพัฒนาสามารถรวมฟังก์ชัน Bitcoin ได้ง่ายขึ้นโดยไม่ต้องจัดการกับรายละเอียดระดับต่ำ
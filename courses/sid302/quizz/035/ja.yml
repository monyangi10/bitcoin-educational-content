question: Breez SDKの開発者インターフェイスにある、3ステップの接続、準備、実行プロセスの主な目的は何ですか？
answer: ウォレットを同期させ、すべての手数料を前もって計算し、トランザクションを構築することで、複雑な金融フローを標準化する。
wrong_answers:
  - アトミック操作を開始する前に、複数のスワッププロバイダ間で冗長バックアップ接続を確立する。
  - クロス・チェーン・サブマリン・スワップ取引に関与する各ネットワークに対して、個別の暗号署名を作成する。
  - エスクロー機構から資金をリリースする前に、タイムロックされた契約と照合して支払いの事前イメージを検証する。
explanation: |
  Connect、Prepare、Executeパターンは、複雑な操作を管理しやすいステップに分割することで開発を簡素化する：Connectはウォレットを初期化して監視接続を確立し、Prepareはすべてのコストを計算してユーザーに透過的に表示し、Executeは実際のトランザクションの構築とブロードキャストを処理する。この標準化によって、サブマリン・スワップやクロスチェーン・オペレーションの根本的な複雑さが抽象化され、開発者は低レベルの詳細を管理することなくBitcoinの機能を統合しやすくなる。
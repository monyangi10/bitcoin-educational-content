question: Breez SDK의 개발자 인터페이스에서 연결, 준비, 실행의 3단계 프로세스의 주요 목적은 무엇인가요?
answer: 지갑을 동기화하고, 모든 수수료를 미리 계산한 다음, 거래를 구성하여 복잡한 금융 흐름을 표준화합니다
wrong_answers:
  - 아토믹 작업을 시작하기 전에 여러 스왑 제공업체에 걸쳐 중복 백업 연결을 설정하려면 다음과 같이 하세요
  - 크로스체인 서브마린 스왑 거래에 관련된 각 네트워크에 대해 별도의 암호화 서명을 생성하려면 다음과 같이 하세요
  - 에스크로 메커니즘에서 자금을 릴리스하기 전에 시간 제한 계약에 대해 결제 사전 이미지 검증하기
explanation: |
  연결, 준비, 실행 패턴은 복잡한 작업을 관리 가능한 단계로 나누어 개발을 간소화합니다: 연결은 지갑을 초기화하고 모니터링 연결을 설정하며, 준비는 모든 비용을 계산하고 사용자에게 투명하게 표시하고, 실행은 실제 트랜잭션 구성과 브로드캐스팅을 처리합니다. 이러한 표준화는 잠수함 스왑과 크로스체인 운영의 근본적인 복잡성을 추상화하여 개발자가 낮은 수준의 세부 사항을 관리하지 않고도 Bitcoin 기능을 쉽게 통합할 수 있도록 합니다.
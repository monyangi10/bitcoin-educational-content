question: Breez SDK 开发人员界面中的连接、准备和执行三步流程的主要目的是什么？
answer: 通过同步钱包、预先计算所有费用，然后构建交易，使复杂的资金流标准化
wrong_answers:
  - 在启动任何原子操作之前，在多个交换提供商之间建立冗余备份连接
  - 为参与跨链海底互换交易的每个网络创建单独的加密签名
  - 在从托管机制释放资金之前，根据锁定时间的合同验证付款预图像
explanation: |
  连接、准备、执行模式将复杂的操作分解成易于管理的步骤，从而简化了开发过程：连接 "初始化钱包并建立监控连接，"准备 "计算并向用户透明地显示所有成本，"执行 "处理实际的交易构建和广播。这种标准化抽象掉了海底交换和跨链操作的底层复杂性，使开发人员更容易集成 Bitcoin 功能，而无需管理底层细节。
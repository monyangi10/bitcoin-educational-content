question: Liquidの連合コンセンサスモデルでは、ブロックを検証するために必要な機能署名の最小数はいくつで、ネットワークが許容できるノード障害の最大数はいくつですか？
answer: 11シグネチャが必要、最大4ノードの障害に耐えられる
wrong_answers:
  - 8シグネチャが必要、最大7ノードの障害に耐えられる
  - 15シグネチャが必要、最大2ノードの障害に耐えられる
  - 9シグネチャが必要、最大6ノードの障害に耐えられる
explanation: |
  Liquidでは、15人のファンクショナリーのうち少なくとも11人が各ブロックに署名しなければ有効とはならない、11-of-15の閾値システムを採用している。この設計により、最大4ノード（15 - 11 = 4）が故障してもネットワークは動作を継続できる。他のオプションでは、署名のしきい値が正しくないか、耐障害性の計算を間違えている。
question: Каково минимальное количество подписей функционеров, необходимых для подтверждения блока, в модели федеративного консенсуса Liquid, и какое максимальное количество отказов узлов может выдержать сеть?
answer: требуется 11 подписей, допускается до 4 отказов узлов
wrong_answers:
  - требуется 8 подписей, допускается до 7 отказов узлов
  - требуется 15 подписей, допускается до 2 отказов узлов
  - требуется 9 подписей, допускается до 6 отказов узлов
explanation: |
  В Liquid используется пороговая система 11 из 15, при которой каждый блок должны подписать не менее 11 из 15 функционеров, чтобы он считался действительным. Такая конструкция позволяет сети продолжать работу даже при отказе до 4 узлов (15 - 11 = 4). В других вариантах либо указаны неверные пороговые значения подписей, либо неверно рассчитана отказоустойчивость, которая всегда равна общему количеству узлов за вычетом требуемых подписей.
question: Liquid의 연합 합의 모델에서 블록을 검증하는 데 필요한 최소 기능 서명 수는 얼마인가요, 네트워크가 허용할 수 있는 최대 노드 장애 수는 얼마인가요?
answer: 11개의 서명이 필요하며, 최대 4개의 노드 장애를 견딜 수 있습니다
wrong_answers:
  - 8개의 서명이 필요하며 최대 7개의 노드 장애를 견딜 수 있습니다
  - 15개의 서명이 필요하며, 최대 2개의 노드 장애를 견딜 수 있습니다
  - 9개의 서명이 필요하며, 최대 6개의 노드 장애를 견딜 수 있습니다
explanation: |
  Liquid은 15명 중 최소 11명이 각 블록에 서명해야만 유효한 11 대 15 임계값 시스템을 사용합니다. 이 설계를 사용하면 최대 4개의 노드에 장애가 발생하더라도 네트워크가 계속 작동할 수 있습니다(15 - 11 = 4). 다른 옵션은 잘못된 서명 임계값을 제공하거나 항상 총 노드에서 필요한 서명을 뺀 값인 내결함성을 잘못 계산합니다.
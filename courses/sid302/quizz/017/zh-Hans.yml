question: 在 Liquid 的联合共识模型中，验证一个区块所需的最少功能签名数是多少，网络可容忍的最大节点故障数是多少？
answer: 需要 11 个签名，最多可承受 4 个节点故障
wrong_answers:
  - 需要 8 个签名，最多可容忍 7 个节点故障
  - 需要 15 个签名，最多可容忍 2 个节点故障
  - 需要 9 个签名，最多可承受 6 个节点故障
explanation: |
  Liquid 采用 11-15 门限系统，即每个区块必须有 15 个职能人员中的至少 11 个签名才有效。这种设计允许网络在最多 4 个节点出现故障（15 - 11 = 4）的情况下继续运行。其他方案要么提供了不正确的签名阈值，要么错误计算了容错率，而容错率总是总节点数减去所需的签名数。
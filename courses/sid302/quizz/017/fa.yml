question: در مدل اجماع فدرال Liquid، حداقل تعداد امضاهای عملکردی مورد نیاز برای اعتبارسنجی یک بلوک چقدر است و حداکثر تعداد خرابی‌های نود که شبکه می‌تواند تحمل کند چقدر است؟
answer: ۱۱ امضا مورد نیاز است، می‌تواند تا ۴ خرابی نود را تحمل کند.
wrong_answers:
  - 8 امضا مورد نیاز است، می‌تواند تا 7 خرابی نود را تحمل کند.
  - 15 امضا مورد نیاز است، می‌تواند تا 2 خرابی نود را تحمل کند.
  - ۹ امضا مورد نیاز است، می‌تواند تا ۶ خرابی گره را تحمل کند.
explanation: |
  Liquid از یک سیستم آستانه ۱۱ از ۱۵ استفاده می‌کند که در آن حداقل ۱۱ نفر از ۱۵ کارگزار باید هر بلوک را امضا کنند تا معتبر باشد. این طراحی به شبکه اجازه می‌دهد حتی اگر تا ۴ گره از کار بیفتند به کار خود ادامه دهد (۱۵ - ۱۱ = ۴). گزینه‌های دیگر یا آستانه‌های امضای نادرست ارائه می‌دهند یا تحمل خطا را که همیشه برابر با تعداد کل گره‌ها منهای امضاهای مورد نیاز است، اشتباه محاسبه می‌کنند.
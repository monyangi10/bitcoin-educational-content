question: Какъв е минималният брой функционални подписи, необходими за валидиране на даден блок, и какъв е максималният брой откази на възли, които мрежата може да понесе, в модела на Liquid?
answer: необходими са 11 подписа, които могат да понесат до 4 отказа на възли
wrong_answers:
  - необходими са 8 подписа, които могат да понесат до 7 отказа на възли
  - необходими са 15 подписа, които могат да издържат до 2 отказа на възел
  - необходими са 9 подписа, които могат да понесат до 6 отказа на възли
explanation: |
  В Liquid се използва система с праг 11 от 15, при която поне 11 от 15-те служители трябва да подпишат всеки блок, за да бъде той валиден. Тази конструкция позволява на мрежата да продължи да работи дори при отказ на до 4 възела (15 - 11 = 4). Другите варианти или предоставят неправилни прагове на подписите, или изчисляват неправилно устойчивостта на грешки, която винаги е общата стойност на възлите минус необходимите подписи.
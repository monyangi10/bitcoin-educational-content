question: 在 Liquid 的聯邦共識模型中，驗證一個區塊所需的最小功能簽章數量是多少，以及網路可容忍的最大節點故障數量是多少？
answer: 需要 11 個簽章，最多可容忍 4 個節點故障
wrong_answers:
  - 需要 8 個簽章，最多可容忍 7 個節點故障
  - 需要 15 個簽章，最多可容忍 2 個節點故障
  - 需要 9 個簽章，最多可容忍 6 個節點故障
explanation: |
  Liquid 採用 11-15 門檻系統，即每個區塊必須有 15 位功能人員中至少 11 位簽署才有效。即使有 4 個節點發生故障 (15 - 11 = 4)，此設計仍可讓網路繼續運作。其他選項不是提供錯誤的簽名臨界值，就是計算錯誤的容錯能力，容錯能力永遠是節點總數減去所需簽名。
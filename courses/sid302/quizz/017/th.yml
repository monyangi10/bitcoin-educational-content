question: ในโมเดลฉันทามติแบบรวมศูนย์ของ Liquid จำนวนลายเซ็นของผู้ทำหน้าที่ขั้นต่ำที่จำเป็นในการตรวจสอบบล็อกคือเท่าใด และจำนวนความล้มเหลวของโหนดสูงสุดที่เครือข่ายสามารถทนได้คือเท่าใด?
answer: ต้องการลายเซ็น 11 รายชื่อ สามารถทนต่อความล้มเหลวของโหนดได้สูงสุด 4 โหนด
wrong_answers:
  - ต้องการลายเซ็น 8 ราย สามารถทนต่อความล้มเหลวของโหนดได้สูงสุด 7 โหนด
  - ต้องการลายเซ็น 15 รายการ สามารถทนต่อความล้มเหลวของโหนดได้สูงสุด 2 โหนด
  - ต้องการลายเซ็น 9 รายการ สามารถทนต่อความล้มเหลวของโหนดได้สูงสุด 6 โหนด
explanation: |
  Liquid ใช้ระบบเกณฑ์ 11 จาก 15 ซึ่งต้องมีอย่างน้อย 11 จาก 15 เจ้าหน้าที่ลงนามในแต่ละบล็อกเพื่อให้มีผลบังคับใช้ การออกแบบนี้ช่วยให้เครือข่ายสามารถดำเนินการต่อได้แม้ว่าจะมีโหนดล้มเหลวถึง 4 โหนด (15 - 11 = 4) ตัวเลือกอื่น ๆ ให้เกณฑ์การลงนามที่ไม่ถูกต้องหรือคำนวณความทนทานต่อความผิดพลาดผิดพลาด ซึ่งจะเป็นจำนวนโหนดทั้งหมดลบด้วยลายเซ็นที่ต้องการเสมอ
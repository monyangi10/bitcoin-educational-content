question: Liquid के फेडरेटेड कंसेंसस मॉडल में, एक ब्लॉक को मान्य करने के लिए आवश्यक फंक्शनरी सिग्नेचर की न्यूनतम संख्या क्या है, और नेटवर्क अधिकतम कितने नोड विफलताओं को सहन कर सकता है?
answer: 11 हस्ताक्षरों की आवश्यकता है, 4 नोड विफलताओं तक सहन कर सकता है
wrong_answers:
  - 8 हस्ताक्षर आवश्यक हैं, 7 नोड विफलताओं तक सहन कर सकता है
  - 15 हस्ताक्षरों की आवश्यकता है, 2 नोड विफलताओं तक सहन कर सकता है
  - 9 हस्ताक्षर आवश्यक हैं, 6 नोड विफलताओं तक सहन कर सकता है
explanation: |
  Liquid 11 में से 15 की सीमा प्रणाली का उपयोग करता है, जिसमें किसी भी ब्लॉक के वैध होने के लिए कम से कम 15 में से 11 पदाधिकारियों द्वारा हस्ताक्षर किए जाने आवश्यक हैं। यह डिज़ाइन नेटवर्क को 4 नोड्स तक विफल होने पर भी काम करते रहने की अनुमति देता है (15 - 11 = 4)। अन्य विकल्प या तो गलत हस्ताक्षर सीमा प्रदान करते हैं या त्रुटि सहनशीलता की गलत गणना करते हैं, जो हमेशा कुल नोड्स में से आवश्यक हस्ताक्षरों को घटाने पर प्राप्त होती है।
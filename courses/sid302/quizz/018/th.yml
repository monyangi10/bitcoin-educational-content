question: กลไกการเข้ารหัสใดที่ช่วยให้ Liquid Network สามารถตรวจสอบได้ว่าข้อมูลการทำธุรกรรมเท่ากับผลลัพธ์บวกค่าธรรมเนียมโดยไม่เปิดเผยจำนวนที่แท้จริงต่อสาธารณะ?
answer: คำมั่นสัญญาของ Pedersen และการพิสูจน์ช่วง
wrong_answers:
  - Merkle Trees และลายเซ็นดิจิทัล
  - Hash สัญญาที่ล็อคด้วยเวลาและลายเซ็นหลายตัว
  - ลายเซ็นชอร์และสคริปต์ Taproot
explanation: |
  คำมั่นสัญญา Pedersen และการพิสูจน์ช่วงเป็นหลักการเข้ารหัสเฉพาะที่ทำให้ Liquid ของ Confidential Transactions สามารถซ่อนจำนวนเงินในขณะที่ยังคงอนุญาตให้มีการตรวจสอบทางคณิตศาสตร์ได้ คำมั่นสัญญา Pedersen ผูกมัดกับค่าโดยไม่เปิดเผย ในขณะที่การพิสูจน์ช่วงทำให้มั่นใจได้ว่าจำนวนเงินทั้งหมดเป็นจำนวนเต็มบวก ป้องกันไม่ให้ผู้ใช้สร้างเงินผ่านค่าลบ ตัวเลือกอื่นๆ เป็นเครื่องมือเข้ารหัส Bitcoin ที่ถูกต้องตามกฎหมาย แต่ไม่ได้ให้ความสามารถในการปิดบังที่จำเป็นสำหรับการทำธุรกรรมที่เป็นความลับซึ่งจำนวนเงินยังคงถูกซ่อนแต่สามารถตรวจสอบได้
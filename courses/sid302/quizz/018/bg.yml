question: Кой криптографски механизъм позволява на Liquid Network да проверява дали входните данни на трансакциите са равни на изходните плюс таксите, без да разкрива действителните суми публично?
answer: Ангажименти на Педерсен и доказателства за обхват
wrong_answers:
  - Дървета на Меркъл и цифрови подписи
  - Hash Договори с фиксирано време и множество подписи
  - Подписи на Шнорр и скриптове на Taproot
explanation: |
  Ангажиментите на Педерсен и доказателствата за обхват са специфичните криптографски примитиви, които позволяват на Liquid's Confidential Transactions да скрива суми, като същевременно позволява математическа проверка. Задълженията на Педерсен се обвързват криптографски със стойности, без да ги разкриват, докато Доказателствата за обхват гарантират, че всички суми са положителни цели числа, като не позволяват на потребителите да създават пари чрез отрицателни стойности. Другите варианти са легитимни криптографски инструменти Bitcoin, но не осигуряват възможностите за скриване, необходими за поверителни трансакции, при които сумите остават скрити, но могат да бъдат проверени.
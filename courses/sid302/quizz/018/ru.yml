question: Какой криптографический механизм позволяет Liquid Network проверять, что входные данные транзакции равны выходным данным плюс комиссии, не раскрывая реальных сумм общественности?
answer: Обязательства Педерсена и доказательства диапазона
wrong_answers:
  - Деревья Меркле и цифровые подписи
  - Hash Контракты с фиксацией времени и мультиподписи
  - Подписи Шнорра и скрипты Taproot
explanation: |
  Обязательства Педерсена и доказательства диапазона - это особые криптографические примитивы, которые позволяют Liquid's Confidential Transactions скрывать суммы и при этом проводить математическую проверку. Pedersen Commitments криптографически связывают значения, не раскрывая их, а Range Proofs гарантируют, что все суммы являются положительными целыми числами, не позволяя пользователям создавать деньги с помощью отрицательных значений. Другие варианты являются законными криптографическими инструментами Bitcoin, но не обеспечивают возможности ослепления, необходимые для конфиденциальных транзакций, где суммы остаются скрытыми, но поддаются проверке.
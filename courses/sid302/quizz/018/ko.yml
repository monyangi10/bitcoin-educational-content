question: Liquid Network은 어떤 암호화 메커니즘을 통해 실제 금액을 대중에게 공개하지 않고도 거래 입력과 수수료가 동일한지 확인할 수 있나요?
answer: 페더슨 커미트먼트 및 범위 증명
wrong_answers:
  - 머클 트리와 디지털 서명
  - Hash 시간 고정 계약 및 다중 서명
  - 슈노르 서명 및 Taproot 스크립트
explanation: |
  페데르센 커미트먼트와 범위 증명은 Liquid의 Confidential Transactions가 수학적 검증을 허용하면서도 금액을 숨길 수 있게 하는 특정 암호화 기본 요소입니다. 페더슨 커미트먼트는 값을 공개하지 않고 암호학적으로 묶는 반면, 범위 증명은 모든 금액이 양의 정수가 되도록 하여 사용자가 음수 값을 통해 돈을 만들지 못하도록 합니다. 다른 옵션은 합법적인 Bitcoin 암호화 도구이지만 금액을 숨기면서도 검증할 수 있는 기밀 거래에 필요한 블라인드 기능을 제공하지 않습니다.
question: Liquid Networkが、実際の金額を公開することなく、トランザクションのインプットとアウトプット＋手数料が等しいことを検証できる暗号メカニズムは何か？
answer: ペデルセン公約と範囲証明
wrong_answers:
  - メルクルツリーとデジタル署名
  - Hash タイムロック契約とマルチシグネチャー
  - シュナー署名とTaprootスクリプト
explanation: |
  ペデルセン・コミットメントと範囲証明は、LiquidのConfidential Transactionsが数学的検証を可能にしながら金額を隠すことを可能にする、特定の暗号プリミティブである。Pedersenコミットメントは、暗号的に値を明らかにすることなく値にバインドし、Range Proofsは、すべての金額が正の整数であることを保証し、ユーザーが負の値によってお金を作成することを防ぎます。他のオプションはBitcoinの正当な暗号ツールであるが、金額を隠したまま検証可能な秘密取引に必要な目隠し機能を提供しない。
question: वह कौन सा क्रिप्टोग्राफिक तंत्र है जो Liquid Network को यह सत्यापित करने की अनुमति देता है कि लेनदेन में प्राप्त राशि, लागत सहित प्राप्त राशि के बराबर है, और यह सब वास्तविक राशि को जनता के सामने प्रकट किए बिना होता है?
answer: पेडरसन प्रतिबद्धताएं और रेंज प्रमाण
wrong_answers:
  - मर्कल ट्री और डिजिटल हस्ताक्षर
  - Hash टाइम लॉक्ड कॉन्ट्रैक्ट्स और मल्टी-सिग्नेचर
  - श्नोर हस्ताक्षर और Taproot स्क्रिप्ट
explanation: |
  पेडरसन कमिटमेंट्स और रेंज प्रूफ़्स विशिष्ट क्रिप्टोग्राफ़िक प्रिमिटिव्स हैं जो Liquid के Confidential Transactions को गणितीय सत्यापन की अनुमति देते हुए राशियों को छिपाने में सक्षम बनाते हैं। पेडरसन कमिटमेंट्स मूल्यों को प्रकट किए बिना क्रिप्टोग्राफ़िक रूप से उनसे जुड़ जाते हैं, जबकि रेंज प्रूफ़्स यह सुनिश्चित करते हैं कि सभी राशियाँ धनात्मक पूर्णांक हों, जिससे उपयोगकर्ता ऋणात्मक मूल्यों के माध्यम से मुद्रा का निर्माण नहीं कर सकते। अन्य विकल्प वैध Bitcoin क्रिप्टोग्राफ़िक उपकरण हैं, लेकिन गोपनीय लेनदेन के लिए आवश्यक ब्लाइंडिंग क्षमता प्रदान नहीं करते हैं, जहाँ राशियाँ छिपी रहती हैं लेकिन सत्यापन योग्य होती हैं।
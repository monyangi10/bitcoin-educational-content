question: چه مکانیزم رمزنگاری به Liquid Network اجازه می‌دهد تا تأیید کند که ورودی‌های تراکنش برابر با خروجی‌ها به‌علاوه کارمزدها هستند، بدون اینکه مقادیر واقعی را به عموم نشان دهد؟
answer: تعهدات پدرسن و اثبات‌های دامنه
wrong_answers:
  - درخت‌های مرکل و امضاهای دیجیتال
  - Hash قراردادهای قفل زمانی و چند امضایی
  - امضاهای اشنور و اسکریپت‌های Taproot
explanation: |
  تعهدات پدرسن و اثبات‌های محدوده، اصول رمزنگاری خاصی هستند که به Liquid's Confidential Transactions امکان می‌دهند مقادیر را پنهان کنند در حالی که همچنان اجازه تأیید ریاضی را می‌دهند. تعهدات پدرسن به صورت رمزنگاری به مقادیر متصل می‌شوند بدون اینکه آنها را فاش کنند، در حالی که اثبات‌های محدوده تضمین می‌کنند که همه مقادیر اعداد صحیح مثبت هستند و از ایجاد پول از طریق مقادیر منفی توسط کاربران جلوگیری می‌کنند. گزینه‌های دیگر ابزارهای رمزنگاری قانونی Bitcoin هستند اما قابلیت‌های پنهان‌سازی مورد نیاز برای تراکنش‌های محرمانه که در آن مقادیر پنهان اما قابل تأیید باقی می‌مانند را فراهم نمی‌کنند.
question: Elements और Confidential Transactions सिस्टम में उपयोगकर्ताओं को बिना किसी आधार के पैसा बनाने से क्या रोकता है?
answer: श्रेणी प्रमाण जो गणितीय रूप से यह सिद्ध करते हैं कि छिपे हुए मान वैध श्रेणियों के भीतर धनात्मक पूर्णांक हैं
wrong_answers:
  - पेडरसन कमिटमेंट्स क्रिप्टोग्राफिक रूप से लेनदेन राशि को सार्वजनिक कुंजी से जोड़ते हैं।
  - एसेट रजिस्ट्री सत्यापन जो सभी लेनदेन राशियों की पंजीकृत संपत्ति सीमाओं के विरुद्ध जाँच करता है
  - फेडरेटेड कंसेंसस नोड्स जो सभी गोपनीय लेनदेन राशियों को डिक्रिप्ट और सत्यापित करते हैं
explanation: |
  रेंज प्रूफ एक विशिष्ट क्रिप्टोग्राफिक तंत्र है जो उपयोगकर्ताओं को नकारात्मक संख्याओं या अमान्य राशियों का उपयोग करके शून्य से धन बनाने जैसे गोपनीय लेनदेन प्रणालियों का दुरुपयोग करने से रोकता है। जहां पेडरसन कमिटमेंट वास्तविक राशियों को छुपाते हैं, वहीं रेंज प्रूफ यह साबित करके गणितीय अखंडता सुनिश्चित करते हैं कि छिपे हुए मान वैध सीमाओं के भीतर आते हैं। एसेट रजिस्ट्री केवल एसेट आईडी को मानव-पठनीय नामों से मैप करती है और राशियों का सत्यापन नहीं करती है, और फेडरेटेड नोड्स गोपनीय लेनदेन को डिक्रिप्ट नहीं करते हैं - वे वास्तविक मूल्यों को देखे बिना उनका सत्यापन करते हैं।
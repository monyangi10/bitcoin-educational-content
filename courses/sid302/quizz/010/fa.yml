question: چه چیزی مانع از ایجاد پول از هیچ در سیستم Elements' Confidential Transactions توسط کاربران می‌شود؟
answer: اثبات‌های محدوده که به‌طور ریاضی ثابت می‌کنند مقادیر پنهان اعداد صحیح مثبت در محدوده‌های معتبر هستند
wrong_answers:
  - تعهدات Pedersen که مقادیر تراکنش را به‌صورت رمزنگاری به کلیدهای عمومی متصل می‌کنند
  - اعتبارسنجی رجیستری دارایی که تمام مقادیر تراکنش‌ها را با محدودیت‌های دارایی ثبت‌شده بررسی می‌کند
  - گره‌های اجماع فدرال که تمام مقادیر تراکنش‌های محرمانه را رمزگشایی و تأیید می‌کنند
explanation: |
  اثبات‌های محدوده مکانیزم رمزنگاری خاصی هستند که از سوءاستفاده کاربران از سیستم تراکنش محرمانه با استفاده از اعداد منفی یا مقادیر نامعتبر برای ایجاد پول از هیچ جلوگیری می‌کنند. در حالی که تعهدات پدرسن مقادیر واقعی را پنهان می‌کنند، اثبات‌های محدوده با اثبات اینکه مقادیر پنهان در محدوده‌های قانونی قرار دارند، یکپارچگی ریاضی را تضمین می‌کنند. رجیستری دارایی فقط شناسه‌های دارایی را به نام‌های قابل خواندن توسط انسان نگاشت می‌کند و مقادیر را اعتبارسنجی نمی‌کند، و گره‌های فدراسیون تراکنش‌های محرمانه را رمزگشایی نمی‌کنند - آن‌ها را بدون دیدن مقادیر واقعی تأیید می‌کنند.
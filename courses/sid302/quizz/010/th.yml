question: อะไรที่ป้องกันไม่ให้ผู้ใช้สร้างเงินจากอากาศในระบบ Elements' Confidential Transactions?
answer: การพิสูจน์ช่วงที่พิสูจน์ทางคณิตศาสตร์ว่าค่าที่ซ่อนอยู่เป็นจำนวนเต็มบวกภายในช่วงที่ถูกต้อง
wrong_answers:
  - Pedersen Commitments ที่ผูกจำนวนธุรกรรมเข้ากับกุญแจสาธารณะด้วยการเข้ารหัสลับ
  - การตรวจสอบทะเบียนสินทรัพย์ที่ตรวจสอบจำนวนธุรกรรมทั้งหมดกับขีดจำกัดสินทรัพย์ที่ลงทะเบียน
  - โหนดฉันทามติแบบรวมศูนย์ที่ถอดรหัสและตรวจสอบจำนวนธุรกรรมที่เป็นความลับทั้งหมด
explanation: |
  Range Proofs เป็นกลไกการเข้ารหัสเฉพาะที่ป้องกันไม่ให้ผู้ใช้ใช้ประโยชน์จากระบบธุรกรรมที่เป็นความลับโดยใช้ตัวเลขเชิงลบหรือจำนวนที่ไม่ถูกต้องเพื่อสร้างเงินจากความว่างเปล่า ในขณะที่ Pedersen Commitments ซ่อนจำนวนที่แท้จริง Range Proofs จะรับรองความสมบูรณ์ทางคณิตศาสตร์โดยพิสูจน์ว่าค่าที่ซ่อนอยู่ตกอยู่ในช่วงที่ถูกต้องตามกฎหมาย Asset Registry เพียงแค่จับคู่ ID สินทรัพย์กับชื่อที่มนุษย์อ่านได้และไม่ตรวจสอบความถูกต้องของจำนวนเงิน และโหนดที่รวมกันจะไม่ถอดรหัสธุรกรรมที่เป็นความลับ - พวกเขาตรวจสอบโดยไม่เห็นค่าจริง
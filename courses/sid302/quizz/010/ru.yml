question: Что мешает пользователям создавать деньги из воздуха в системе Elements' Confidential Transactions?
answer: Доказательства диапазонов, которые математически доказывают, что скрытые значения являются целыми положительными числами в допустимых диапазонах
wrong_answers:
  - Обязательства Педерсена, которые криптографически связывают суммы транзакций с открытыми ключами
  - Проверка реестра активов, которая сверяет все суммы транзакций с зарегистрированными лимитами активов
  - Объединенные узлы консенсуса, которые расшифровывают и проверяют все конфиденциальные суммы транзакций
explanation: |
  Доказательства диапазона - это особый криптографический механизм, который не позволяет пользователям эксплуатировать систему конфиденциальных транзакций, используя отрицательные числа или недействительные суммы для создания денег из ничего. В то время как обязательства Педерсена скрывают фактические суммы, доказательства диапазона обеспечивают математическую целостность, доказывая, что скрытые значения находятся в пределах законных диапазонов. Реестр активов только сопоставляет идентификаторы активов с человекочитаемыми именами и не проверяет суммы, а узлы федерации не расшифровывают конфиденциальные транзакции - они проверяют их, не видя фактических значений.
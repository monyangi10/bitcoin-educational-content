question: Elements의 Confidential Transactions 시스템에서 사용자가 허공에서 돈을 창출하지 못하는 이유는 무엇인가요?
answer: 숨겨진 값이 유효한 범위 내의 양의 정수임을 수학적으로 증명하는 범위 증명
wrong_answers:
  - 거래 금액을 공개 키에 암호학적으로 묶는 페더슨 커미트먼트
  - 모든 거래 금액을 등록된 자산 한도와 비교하여 확인하는 자산 레지스트리 유효성 검사
  - 모든 기밀 거래 금액을 해독하고 검증하는 연합 컨센서스 노드
explanation: |
  범위 증명은 사용자가 음수나 유효하지 않은 금액을 사용해 무에서 유를 창출하는 방식으로 기밀 거래 시스템을 악용하는 것을 방지하는 특정 암호화 메커니즘입니다. 페더슨 커미트먼트는 실제 금액을 숨기는 반면, 범위 증명은 숨겨진 값이 합법적인 범위 내에 있음을 증명함으로써 수학적 무결성을 보장합니다. 자산 레지스트리는 자산 ID를 사람이 읽을 수 있는 이름에만 매핑하고 금액을 검증하지 않으며, 연합 노드는 기밀 트랜잭션을 해독하지 않고 실제 값을 보지 않고도 트랜잭션을 검증합니다.
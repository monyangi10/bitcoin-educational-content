question: 是什么阻止了用户在 Elements' Confidential Transactions 系统中凭空造钱？
answer: 范围证明 用数学方法证明隐藏值是有效范围内的正整数
wrong_answers:
  - Pedersen 将交易金额与公钥加密绑定的承诺
  - 资产登记验证，根据登记的资产限额检查所有交易金额
  - 联合共识节点，解密并验证所有机密交易金额
explanation: |
  范围证明是一种特定的加密机制，可防止用户利用保密交易系统，使用负数或无效金额无中生有。Pedersen Commitments 隐藏了实际金额，而 Range Proofs 则通过证明隐藏值在合法范围内来确保数学完整性。资产注册处只将资产 ID 映射为人类可读的名称，并不验证金额，联盟节点也不会解密保密交易，而是在不查看实际金额的情况下进行验证。
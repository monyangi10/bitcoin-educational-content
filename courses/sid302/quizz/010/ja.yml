question: Elements'のConfidential Transactionsシステムで、ユーザーが無からお金を生み出すことを妨げるものは何か？
answer: 隠れた値が有効範囲内の正の整数であることを数学的に証明する範囲証明
wrong_answers:
  - 取引金額を公開鍵に暗号的に結びつけるPedersenコミットメント
  - すべての取引金額を登録資産限度額と照合する資産レジストリ検証
  - すべての機密取引額を復号化し検証するフェデレーション型コンセンサス・ノード
explanation: |
  範囲証明は、ユーザーが負の数や無効な金額を使って無からお金を作り出すことによって、秘密取引システムを悪用することを防ぐための特定の暗号メカニズムである。ペダーセン・コミットメントが実際の金額を隠すのに対し、レンジ・プルーフは隠された値が正当な範囲内にあることを証明することで、数学的な整合性を保証します。アセットレジストリはアセットIDを人間が読める名前にマッピングするだけで、金額の検証は行わない。また、連携ノードは秘密取引を復号化せず、実際の値を見ずに検証する。
question: Какво пречи на потребителите да създават пари от въздуха в системата Elements' Confidential Transactions?
answer: Доказателства за диапазона, които математически доказват, че скритите стойности са цели положителни числа в рамките на валидни диапазони
wrong_answers:
  - Задължения, които криптографски обвързват сумите на трансакциите с публични ключове
  - Валидиране на регистъра на активите, при което се проверяват сумите на всички транзакции спрямо регистрираните лимити на активите
  - Обединени възли за консенсус, които декриптират и проверяват всички поверителни суми на транзакциите
explanation: |
  Доказателствата за обхват са специфичен криптографски механизъм, който не позволява на потребителите да използват системата за поверителни трансакции, като използват отрицателни числа или невалидни суми, за да създадат пари от нищото. Докато ангажиментите на Педерсен скриват действителните суми, доказателствата за обхват осигуряват математическа цялост, като доказват, че скритите стойности попадат в легитимни диапазони. Регистърът на активите само съпоставя идентификаторите на активите с имена, които могат да се четат от човека, и не потвърждава сумите, а федеративните възли не декриптират поверителните трансакции - те ги проверяват, без да виждат действителните стойности.
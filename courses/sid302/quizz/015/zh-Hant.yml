question: 在啟用 Taproot 的 HTLC 中，當交換失敗且一方需要透過對抗性路徑收回資金時，Bitcoin 網路會透露哪些資訊？
answer: 只有特定的 Merkle 樹分支包含基金復原所需的雜湊/時間鎖條件
wrong_answers:
  - 「完整的腳本邏輯，包括所有可能的執行路徑和雙方各自的公開金鑰」
  - 在 MuSig2 金鑰組合過程中使用的預先影像秘密和所有彙總的公開金鑰
  - 整個 HTLC 合約條款，包括交換金額、時間範圍，以及 Lightning 和 Liquid 地址。
explanation: |
  Taproot 以 Merkle 樹狀結構組織 HTLC 條件，允許選擇性揭露。當合作失敗時，只有證明資金回收權利所需的特定分支會被揭露，其他合約細節則會繼續隱藏。這與揭露完整腳本的傳統 HTLC 不同，也與完全不揭露腳本細節的合作案例不同。
question: Taprootが有効なHTLCにおいて、スワップが失敗し、一方の当事者が敵対的な経路を通じて資金を回収する必要がある場合、Bitcoinネットワークにはどのような情報が公開されるのか？
answer: 資金回収に必要なハッシュ/タイムロック条件を含む特定のメルクルツリーブランチのみ
wrong_answers:
  - "すべての可能な実行経路と両当事者の個々の公開鍵を含む完全なスクリプトロジック"
  - MuSig2の鍵組み合わせプロセスで使用される、前画像の秘密鍵およびすべての集約された公開鍵。
  - スワップ額、期間、ライトニングとLiquidの両方のアドレスを含むHTLCの契約条件全体
explanation: |
  TaprootはHTLCの条件をメルクル木構造で整理し、選択的な開示を可能にする。協力が失敗した場合、資金を回収する権利を証明するために必要な特定の枝のみが公開され、その他の契約の詳細は隠されたままとなる。これは、完全なスクリプトを公開したレガシーHTLCとは異なり、スクリプトの詳細が全く公開されない協力的なケースとは異なる。
question: ใน Taproot ที่เปิดใช้งาน HTLC ข้อมูลใดที่ถูกเปิดเผยต่อเครือข่าย Bitcoin เมื่อการแลกเปลี่ยนล้มเหลวและฝ่ายหนึ่งต้องการกู้คืนเงินของพวกเขาผ่านเส้นทางที่เป็นปฏิปักษ์?
answer: เฉพาะสาขาของ Merkle tree ที่มีเงื่อนไขการล็อคแฮช/เวลา ที่จำเป็นสำหรับการกู้คืนเงินทุน
wrong_answers:
  - "ตรรกะสคริปต์ที่สมบูรณ์รวมถึงเส้นทางการดำเนินการที่เป็นไปได้ทั้งหมดและคีย์สาธารณะของทั้งสองฝ่าย"
  - ความลับของภาพก่อนและคีย์สาธารณะที่ถูกรวมทั้งหมดที่ใช้ในกระบวนการรวมคีย์ MuSig2
  - เงื่อนไขทั้งหมดของสัญญา HTLC รวมถึงจำนวนการแลกเปลี่ยน กรอบเวลา และที่อยู่ทั้ง Lightning และ Liquid
explanation: |
  Taproot จัดระเบียบเงื่อนไขของ HTLC ในโครงสร้างต้นไม้ Merkle ซึ่งช่วยให้สามารถเปิดเผยข้อมูลได้อย่างเลือกสรร เมื่อการร่วมมือกันล้มเหลว จะมีการเปิดเผยเฉพาะสาขาที่จำเป็นเพื่อพิสูจน์สิทธิ์ในการกู้คืนเงินทุน ในขณะที่รายละเอียดสัญญาอื่นๆ ยังคงถูกซ่อนไว้ ซึ่งแตกต่างจาก HTLC แบบเก่าที่เปิดเผยสคริปต์ทั้งหมด และแตกต่างจากกรณีที่มีการร่วมมือกันซึ่งไม่มีการเปิดเผยรายละเอียดของสคริปต์เลย
question: 在启用了 Taproot 的 HTLC 中，当交换失败，一方需要通过对抗路径收回资金时，Bitcoin 网络会收到哪些信息？
answer: 只有包含基金恢复所需的散列/时间锁定条件的特定 Merkle 树分支
wrong_answers:
  - "完整的脚本逻辑，包括所有可能的执行路径和双方各自的公开密钥"
  - 在 MuSig2 密钥组合过程中使用的预图像密钥和所有聚合公钥
  - 整个 HTLC 合同条款，包括互换金额、时限以及 Lightning 和 Liquid 地址
explanation: |
  Taproot 以梅克尔树结构组织 HTLC 条件，允许选择性披露。当合作失败时，只有证明资金收回权所需的特定分支才会公开，而其他合同细节仍然隐藏。这与传统 HTLC 公开完整脚本的做法不同，也不同于合作案例中完全不公开脚本细节的做法。
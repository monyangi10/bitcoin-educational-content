question: Taproot-सक्षम HTLC में, जब स्वैप विफल हो जाता है और एक पक्ष को विरोधी मार्ग के माध्यम से अपने धन की वसूली करने की आवश्यकता होती है, तो Bitcoin नेटवर्क को कौन सी जानकारी प्रकट होती है?
answer: केवल मर्कल ट्री की उस विशिष्ट शाखा का चयन करें जिसमें फंड रिकवरी के लिए आवश्यक हैश/टाइम लॉक शर्तें शामिल हों।
wrong_answers:
  - "संपूर्ण स्क्रिप्ट लॉजिक जिसमें सभी संभावित निष्पादन पथ और दोनों पक्षों की व्यक्तिगत सार्वजनिक कुंजी शामिल हैं"
  - MuSig2 कुंजी संयोजन प्रक्रिया में उपयोग की जाने वाली प्रीइमेज गुप्त कुंजी और सभी एकत्रित सार्वजनिक कुंजियाँ
  - HTLC अनुबंध की संपूर्ण शर्तें, जिनमें स्वैप राशि, समयसीमा और लाइटनिंग तथा Liquid दोनों के पते शामिल हैं।
explanation: |
  Taproot, HTLC की शर्तों को मर्कल ट्री संरचना में व्यवस्थित करता है, जिससे चयनात्मक प्रकटीकरण संभव होता है। सहयोग विफल होने पर, केवल धन वसूली के अधिकार को साबित करने के लिए आवश्यक विशिष्ट शाखा का ही खुलासा किया जाता है, जबकि अनुबंध के अन्य विवरण गुप्त रखे जाते हैं। यह पुराने HTLC से भिन्न है, जिनमें संपूर्ण स्क्रिप्ट का खुलासा किया जाता था, और उन सहकारी मामलों से भी अलग है जिनमें स्क्रिप्ट का कोई विवरण प्रकट नहीं किया जाता था।
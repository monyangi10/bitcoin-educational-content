question: در یک Taproot فعال شده HTLC، چه اطلاعاتی به شبکه Bitcoin فاش می‌شود زمانی که مبادله شکست می‌خورد و یک طرف نیاز دارد تا از طریق مسیر خصمانه وجوه خود را بازیابی کند؟
answer: فقط شاخه خاص درخت مرکل که شامل شرایط قفل هش/زمان مورد نیاز برای بازیابی وجوه است
wrong_answers:
  - "منطق کامل اسکریپت شامل تمام مسیرهای اجرای ممکن و کلیدهای عمومی فردی هر دو طرف"
  - پیش‌تصویر محرمانه و تمام کلیدهای عمومی تجمیع‌شده که در فرآیند ترکیب کلید MuSig2 استفاده می‌شوند
  - کل شرایط قرارداد HTLC شامل مقادیر مبادله، بازه‌های زمانی، و هر دو آدرس Lightning و Liquid
explanation: |
  Taproot شرایط HTLC را در یک ساختار درخت مرکل سازماندهی می‌کند و امکان افشای انتخابی را فراهم می‌سازد. هنگامی که همکاری شکست می‌خورد، تنها شاخه خاصی که برای اثبات حق بازیابی وجوه لازم است، فاش می‌شود، در حالی که سایر جزئیات قرارداد پنهان می‌مانند. این برخلاف HTLCهای قدیمی است که اسکریپت‌های کامل را افشا می‌کردند و با موارد همکاری که در آن هیچ جزئیات اسکریپتی فاش نمی‌شود، متفاوت است.
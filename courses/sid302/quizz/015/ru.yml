question: В сети HTLC с поддержкой Taproot какая информация передается в сеть Bitcoin, когда своп не удается и одной из сторон необходимо вернуть свои средства через состязательный путь?
answer: Только конкретная ветвь дерева Меркла, содержащая условия хэш/временной блокировки, необходимые для восстановления фонда
wrong_answers:
  - "Полная логика сценария, включая все возможные пути выполнения и индивидуальные открытые ключи обеих сторон"
  - Секрет предварительного изображения и все агрегированные открытые ключи, используемые в процессе комбинирования ключей MuSig2
  - Все условия контракта HTLC, включая суммы свопов, сроки, а также адреса Lightning и Liquid
explanation: |
  Taproot организует условия HTLC в структуру дерева Меркла, позволяя выборочно раскрывать информацию. При неудачном сотрудничестве раскрывается только конкретная ветвь, необходимая для доказательства права на возврат средств, а остальные детали контракта остаются скрытыми. Это отличается от старых HTLC, которые раскрывали полные сценарии, и от кооперативных случаев, когда детали сценария вообще не раскрываются.
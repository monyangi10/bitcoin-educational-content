question: Taproot이 활성화된 HTLC에서 스왑이 실패하고 한 당사자가 적대적 경로를 통해 자금을 회수해야 할 때 Bitcoin 네트워크에 어떤 정보가 공개되나요?
answer: 자금 복구에 필요한 해시/시간 잠금 조건을 포함하는 특정 머클 트리 브랜치만
wrong_answers:
  - "가능한 모든 실행 경로와 양 당사자의 개별 공개 키를 포함한 전체 스크립트 로직"
  - MuSig2 키 조합 프로세스에 사용된 사전 이미지 비밀 및 모든 집계된 공개 키
  - 스왑 금액, 기간, 라이트닝 및 Liquid 주소를 포함한 전체 HTLC 계약 조건
explanation: |
  Taproot는 HTLC 조건을 머클 트리 구조로 구성하여 선택적으로 공개할 수 있도록 합니다. 협력이 실패하면 자금 회수 권리를 증명하는 데 필요한 특정 지점만 공개되고 다른 계약 세부 사항은 숨겨집니다. 이는 전체 스크립트를 공개하던 기존 HTLC와 다르며, 스크립트 세부 정보가 전혀 공개되지 않는 협력 사례와도 다릅니다.
question: Каква информация се разкрива на мрежата Bitcoin, когато размяната се провали и една от страните трябва да възстанови средствата си по пътя на противника?
answer: Само конкретният клон от дървото на Меркъл, съдържащ условията за заключване на хеш/време, необходими за възстановяване на средства
wrong_answers:
  - "Пълната логика на скрипта, включително всички възможни пътища за изпълнение и индивидуалните публични ключове на двете страни"
  - Тайната на предварителния образ и всички обобщени публични ключове, използвани в процеса на комбиниране на ключове MuSig2
  - Цялото съдържание на договора HTLC, включително сумите на суапа, сроковете и адресите на Lightning и Liquid
explanation: |
  Taproot организира условията на HTLC в структура на дърво на Меркъл, което позволява селективно разкриване. При неуспешно сътрудничество се разкрива само конкретният клон, необходим за доказване на правото за възстановяване на средства, докато другите подробности по договора остават скрити. Това е различно от наследените HTLC, които разкриваха пълни сценарии, и се различава от случаите на сътрудничество, при които изобщо не се разкриват никакви подробности за сценария.
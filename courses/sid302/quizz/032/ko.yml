question: Breez SDK 아키텍처에서 리버스 서브마린 스왑이 실패하거나 시간이 초과되면 어떻게 되나요?
answer: SDK는 자동으로 환불 트랜잭션을 구성하고 브로드캐스트하여 사용자의 wallet에 자금을 반환합니다
wrong_answers:
  - 스왑 제공업체가 24시간 이내에 사용자 개입이 필요한 복구 프로세스를 수동으로 시작합니다
  - 자금은 Lightning Network 연결이 복구될 때까지 영구적으로 잠겨 있습니다
  - 사용자가 수동으로 Boltz 아웃 트랜잭션을 트리거하려면 federated peg 지원팀에 문의해야 합니다
explanation: |
  Breez SDK는 자동화된 환불 관리를 중요한 안전 메커니즘으로 구현합니다. 스왑이 실패하거나 시간이 초과되면 SDK는 모든 스왑 상태를 모니터링하고 사용자 개입 없이 자동으로 복구 프로세스를 처리합니다. 이를 통해 시간 제한 계약의 복잡성을 줄이고 자금이 영구적으로 손실되지 않도록 보장합니다. 다른 옵션은 수동 개입이 필요하거나 영구적인 자금 손실을 가정하거나 자동화된 시스템에 존재하지 않는 프로세스를 포함하기 때문에 올바르지 않습니다.
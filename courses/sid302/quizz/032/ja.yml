question: Breez SDKアーキテクチャで、リバース・サブマリン・スワップが失敗したりタイムアウトした場合はどうなりますか？
answer: SDKは、ユーザーのwalletに資金を返却するための返金トランザクションを自動的に構築し、ブロードキャストする。
wrong_answers:
  - スワッププロバイダが手動でリカバリープロセスを開始し、24時間以内にユーザーの介入が必要
  - Lightning Networkの接続が回復するまで、資金は永久にロックされたままである。
  - federated peg-outトランザクションを手動でトリガーするには、Boltzサポートに連絡する必要があります。
explanation: |
  Breez SDKは、重要な安全メカニズムとして自動払い戻し管理を実装しています。スワップが失敗またはタイムアウトした場合、SDKはすべてのスワップ状態を監視し、ユーザーの介入なしに自動的に回復プロセスを処理します。これにより、タイムロック契約の複雑さが抽象化され、資金が永久に失われることはありません。他の選択肢は、手動介入を必要とするか、恒久的な資金喪失を想定するか、自動化システムに存在しないプロセスを含むため、正しくない。
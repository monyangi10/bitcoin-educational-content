question: 在 Breez SDK 架构中，当反向潜艇交换失败或超时时会发生什么情况？
answer: SDK 自动构建和广播退款交易，将资金返还给用户的 wallet
wrong_answers:
  - 交换提供商在 24 小时内手动启动需要用户干预的恢复程序
  - 在 Lightning Network 连接恢复之前，资金将被永久锁定
  - 用户必须联系 Boltz 支持人员才能手动触发 federated peg-out 交易
explanation: |
  Breez SDK 将自动退款管理作为一项重要的安全机制。当交换失败或超时时，SDK 会监控所有交换状态，并自动处理恢复过程，无需用户干预。这就抽象化了时间锁定合约的复杂性，确保资金不会永久损失。其他选项都是不正确的，因为它们要么需要人工干预，要么假定资金永久损失，要么涉及自动系统中不存在的流程。
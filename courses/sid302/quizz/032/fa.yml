question: وقتی که یک مبادله معکوس زیردریایی در معماری Breez SDK شکست می‌خورد یا زمان آن به پایان می‌رسد، چه اتفاقی می‌افتد؟
answer: SDK به‌طور خودکار یک تراکنش بازپرداخت را ایجاد و پخش می‌کند تا وجوه را به wallet کاربر بازگرداند.
wrong_answers:
  - ارائه‌دهنده مبادله به‌صورت دستی فرآیند بازیابی را آغاز می‌کند که نیاز به مداخله کاربر در عرض ۲۴ ساعت دارد.
  - بودجه‌ها به‌طور دائمی قفل می‌مانند تا زمانی که اتصال Lightning Network بازیابی شود.
  - کاربر باید با پشتیبانی Boltz تماس بگیرد تا به صورت دستی یک تراکنش federated peg-out را فعال کند.
explanation: |
  SDK Breez مدیریت بازپرداخت خودکار را به عنوان یک مکانیزم ایمنی حیاتی پیاده‌سازی می‌کند. هنگامی که مبادلات شکست می‌خورند یا زمان آن‌ها به پایان می‌رسد، SDK تمام وضعیت‌های مبادله را نظارت کرده و فرآیند بازیابی را به‌طور خودکار و بدون دخالت کاربر مدیریت می‌کند. این کار پیچیدگی قراردادهای زمان‌دار را از بین می‌برد و اطمینان می‌دهد که وجوه هرگز به‌طور دائمی از دست نمی‌روند. گزینه‌های دیگر نادرست هستند زیرا یا نیاز به دخالت دستی دارند، فرض می‌کنند که وجوه به‌طور دائمی از دست رفته‌اند، یا شامل فرآیندهایی هستند که در سیستم خودکار وجود ندارند.
question: Что происходит, когда обратный подводный своп терпит неудачу или завершается в архитектуре Breez SDK?
answer: SDK автоматически создает и транслирует транзакцию возврата средств для возврата средств на wallet пользователя
wrong_answers:
  - Поставщик подкачки вручную запускает процесс восстановления, требующий вмешательства пользователя, в течение 24 часов
  - Средства остаются постоянно заблокированными до тех пор, пока не будет восстановлено соединение Lightning Network
  - Пользователь должен связаться со службой поддержки Boltz, чтобы вручную запустить транзакцию federated peg-out
explanation: |
  В Breez SDK реализовано автоматическое управление возвратом в качестве критически важного механизма безопасности. Когда свопы терпят неудачу или истекают по времени, SDK отслеживает все состояния свопов и автоматически обрабатывает процесс восстановления без вмешательства пользователя. Это устраняет сложность контрактов с временной блокировкой и гарантирует, что средства никогда не будут потеряны безвозвратно. Другие варианты неверны, поскольку они либо требуют ручного вмешательства, либо предполагают постоянную потерю средств, либо включают процессы, которых нет в автоматизированной системе.
question: Breez SDK आर्किटेक्चर में रिवर्स सबमरीन स्वैप विफल होने या टाइम आउट होने पर क्या होता है?
answer: SDK स्वचालित रूप से रिफंड लेनदेन का निर्माण करता है और उसे प्रसारित करता है ताकि उपयोगकर्ता के wallet खाते में धनराशि वापस की जा सके।
wrong_answers:
  - स्वैप प्रदाता मैन्युअल रूप से एक रिकवरी प्रक्रिया शुरू करता है जिसके लिए उपयोगकर्ता को 24 घंटों के भीतर हस्तक्षेप करना आवश्यक होता है।
  - Lightning Network कनेक्शन बहाल होने तक धनराशि स्थायी रूप से अवरुद्ध रहेगी।
  - उपयोगकर्ता को federated peg-आउट लेनदेन को मैन्युअल रूप से शुरू करने के लिए Boltz समर्थन से संपर्क करना होगा।
explanation: |
  Breez SDK एक महत्वपूर्ण सुरक्षा तंत्र के रूप में स्वचालित रिफंड प्रबंधन को लागू करता है। स्वैप विफल होने या समय समाप्त होने पर, SDK सभी स्वैप स्थितियों की निगरानी करता है और उपयोगकर्ता के हस्तक्षेप के बिना स्वचालित रूप से रिकवरी प्रक्रिया को संभालता है। यह समय-बद्ध अनुबंधों की जटिलता को दूर करता है और सुनिश्चित करता है कि धनराशि कभी भी स्थायी रूप से नष्ट न हो। अन्य विकल्प गलत हैं क्योंकि उनमें या तो मैन्युअल हस्तक्षेप की आवश्यकता होती है, स्थायी धनराशि हानि मान ली जाती है, या ऐसी प्रक्रियाएं शामिल होती हैं जो स्वचालित प्रणाली में मौजूद नहीं हैं।
question: Какво се случва, когато обратната подмяна на подводницата е неуспешна или не работи в архитектурата Breez SDK?
answer: SDK автоматично конструира и излъчва транзакция за възстановяване на средства, за да върне средства в wallet на потребителя
wrong_answers:
  - Доставчикът на суап ръчно инициира процес на възстановяване, изискващ намесата на потребителя в рамките на 24 часа
  - Средствата остават трайно блокирани до възстановяването на връзката Lightning Network
  - Потребителят трябва да се свърже с поддръжката на Boltz, за да задейства ръчно транзакция federated peg-out
explanation: |
  В Breez SDK е внедрено автоматизирано управление на възстановяванията като критичен механизъм за безопасност. Когато суаповете се провалят или изтичат, SDK следи всички състояния на суаповете и автоматично обработва процеса на възстановяване без намесата на потребителя. По този начин се абстрахира от сложността на договорите с блокирано време и се гарантира, че средствата никога не се губят окончателно. Другите варианти са неправилни, защото или изискват ръчна намеса, или предполагат постоянна загуба на средства, или включват процеси, които не съществуват в автоматизираната система.
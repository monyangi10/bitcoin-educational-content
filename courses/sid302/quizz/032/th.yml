question: จะเกิดอะไรขึ้นเมื่อการแลกเปลี่ยนเรือดำน้ำย้อนกลับล้มเหลวหรือหมดเวลาในสถาปัตยกรรม Breez SDK?
answer: SDK จะสร้างและกระจายธุรกรรมการคืนเงินโดยอัตโนมัติเพื่อคืนเงินให้กับ wallet ของผู้ใช้
wrong_answers:
  - ผู้ให้บริการสวอปเริ่มกระบวนการกู้คืนด้วยตนเองซึ่งต้องการการแทรกแซงจากผู้ใช้ภายใน 24 ชั่วโมง
  - เงินทุนจะถูกล็อกอย่างถาวรจนกว่าจะมีการคืนค่าการเชื่อมต่อ Lightning Network
  - ผู้ใช้ต้องติดต่อฝ่ายสนับสนุน Boltz เพื่อเรียกใช้ธุรกรรม federated peg-out ด้วยตนเอง
explanation: |
  Breez SDK นำเสนอการจัดการการคืนเงินอัตโนมัติเป็นกลไกความปลอดภัยที่สำคัญ เมื่อการแลกเปลี่ยนล้มเหลวหรือหมดเวลา SDK จะตรวจสอบสถานะการแลกเปลี่ยนทั้งหมดและจัดการกระบวนการกู้คืนโดยอัตโนมัติโดยไม่ต้องมีการแทรกแซงจากผู้ใช้ ซึ่งจะช่วยลดความซับซ้อนของสัญญาที่ล็อคด้วยเวลาและรับประกันว่าเงินจะไม่สูญหายอย่างถาวร ตัวเลือกอื่น ๆ ไม่ถูกต้องเพราะพวกเขาต้องการการแทรกแซงด้วยตนเอง, สมมติว่าการสูญเสียเงินถาวร, หรือเกี่ยวข้องกับกระบวนการที่ไม่มีอยู่ในระบบอัตโนมัติ
question: クロスレイヤースワップの両当事者が取引を成功させるか、資金を失うことなく失敗することを保証するものは何か？
answer: 両方のネットワークで同じハッシュロックが使用され、スワップレッグ間の暗号バインディングが作成される。
wrong_answers:
  - タイムロックにより、両ネットワークが取引を確認するまで、どちらか一方の当事者が資金を請求することができない。
  - MuSig2のキー・アグリゲーションでは、資金を移動させる前に両当事者の連署が必要となる
  - "Taprootのスクリプト・パスは、1つのネットワークが完了しなかった場合、自動的にトランザクションを逆転させる"
explanation: |
  クロスレイヤースワップのアトミックな性質は、両方のネットワークで同一のハッシュロックを使用することに依存している。受信者が一方のレイヤーで資金を要求するために秘密のプリイメージを公開すると、同じ秘密が送信者によって可視化され、もう一方のレイヤーで相互の資金を要求するために使用できるようになる。この暗号バインディングにより、両者が資金を得るか、あるいはどちらも得られないかのアトミック性が保証され、トラストレス・スワップにおけるカウンターパーティ・リスクが排除される。
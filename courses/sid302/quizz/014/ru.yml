question: Что гарантирует, что обе стороны в межслойном свопе либо успешно завершат сделку, либо обе потерпят неудачу без потери средств?
answer: В обеих сетях используется один и тот же хэш-замок, создающий криптографическую привязку между ногами свопа
wrong_answers:
  - Временные блокировки не позволяют ни одной из сторон требовать средства до тех пор, пока обе сети не подтвердят транзакции
  - Агрегация ключей MuSig2 требует совместной подписи обеих сторон перед перемещением средств
  - "Скриптовый путь Taproot автоматически меняет транзакции на противоположные, если одна из сетей не завершилась"
explanation: |
  Атомарный характер межслойных обменов основан на использовании идентичных хэш-замков в обеих сетях. Когда получатель раскрывает секретное предварительное изображение для получения средств на одном уровне, этот же секрет становится видимым и используемым отправителем для получения ответных средств на другом уровне. Эта криптографическая привязка обеспечивает атомарность - либо обе стороны получают свои средства, либо ни одна, что устраняет риск контрагента в бездоверительном обмене.
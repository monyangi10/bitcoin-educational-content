question: 교차 레이어 스왑의 양 당사자가 거래를 성공적으로 완료하거나 둘 다 자금 손실 없이 실패하는 것을 보장하는 것은 무엇인가요?
answer: 두 네트워크에서 동일한 해시 잠금이 사용되어 스왑 레그 사이에 암호화 바인딩을 생성합니다
wrong_answers:
  - 시간 잠금은 양쪽 네트워크가 거래를 확인할 때까지 어느 한쪽이 자금을 청구할 수 없도록 합니다
  - MuSig2 키 집계는 자금을 이동하기 전에 양 당사자가 공동 서명해야 합니다
  - "Taproot의 스크립트 경로는 한 네트워크가 완료되지 않으면 트랜잭션을 자동으로 반전시킵니다."
explanation: |
  교차 레이어 스왑의 원자적 특성은 두 네트워크에서 동일한 해시 잠금을 사용하는 것에 의존합니다. 수신자가 한 계층에서 자금을 청구하기 위해 비밀 프리이미지를 공개하면, 발신자가 다른 계층에서 상호 자금을 청구할 때 동일한 비밀이 공개되어 사용할 수 있습니다. 이러한 암호화 바인딩은 양쪽 당사자가 자금을 받거나 받지 못하는 원자성을 보장하여 신뢰 없는 스왑에서 거래 상대방의 위험을 제거합니다.
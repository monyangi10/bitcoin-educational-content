question: چه چیزی تضمین می‌کند که هر دو طرف در یک مبادله بین لایه‌ای یا به‌طور موفقیت‌آمیز تراکنش را تکمیل کنند یا هر دو بدون از دست دادن وجوه شکست بخورند؟
answer: از همان قفل هش در هر دو شبکه استفاده می‌شود و پیوند رمزنگاری بین بخش‌های مبادله ایجاد می‌کند.
wrong_answers:
  - قفل‌های زمانی از ادعای هر یک از طرفین بر روی وجوه جلوگیری می‌کنند تا زمانی که هر دو شبکه تراکنش‌ها را تأیید کنند.
  - تجمیع کلید MuSig2 نیاز دارد که هر دو طرف قبل از انتقال هرگونه وجهی هم‌امضا کنند.
  - "مسیر اسکریپت Taproot به‌طور خودکار تراکنش‌ها را معکوس می‌کند اگر یک شبکه نتواند کامل شود"
explanation: |
  ماهیت اتمی مبادلات بین لایه‌ای به استفاده از قفل‌های هش یکسان در هر دو شبکه متکی است. هنگامی که گیرنده برای دریافت وجوه در یک لایه، پیش‌تصویر مخفی را فاش می‌کند، همان راز برای فرستنده قابل مشاهده و استفاده می‌شود تا وجوه متقابل را در لایه دیگر دریافت کند. این پیوند رمزنگاری اتمی بودن را تضمین می‌کند - یا هر دو طرف وجوه خود را دریافت می‌کنند یا هیچ‌کدام، که ریسک طرف مقابل را در مبادلات بدون اعتماد از بین می‌برد.
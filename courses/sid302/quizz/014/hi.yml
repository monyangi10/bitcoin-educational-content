question: क्रॉस-लेयर स्वैप में यह कैसे सुनिश्चित होता है कि दोनों पक्ष या तो सफलतापूर्वक लेनदेन पूरा कर लें या दोनों बिना धन खोए असफल हो जाएं?
answer: दोनों नेटवर्कों पर एक ही हैश लॉक का उपयोग किया जाता है, जिससे स्वैप लेग्स के बीच क्रिप्टोग्राफिक बंधन बनता है।
wrong_answers:
  - टाइम लॉक किसी भी पक्ष को तब तक धनराशि पर दावा करने से रोकता है जब तक कि दोनों नेटवर्क लेनदेन की पुष्टि नहीं कर देते।
  - MuSig2 कुंजी एकत्रीकरण के लिए किसी भी धनराशि के हस्तांतरण से पहले दोनों पक्षों को सह-हस्ताक्षर करना आवश्यक है।
  - "यदि एक नेटवर्क लेनदेन पूरा करने में विफल रहता है तो Taproot का स्क्रिप्ट पथ स्वचालित रूप से लेनदेन को उलट देता है।"
explanation: |
  क्रॉस-लेयर स्वैप की परमाणु प्रकृति दोनों नेटवर्कों पर समान हैश लॉक के उपयोग पर निर्भर करती है। जब प्राप्तकर्ता एक लेयर पर धनराशि प्राप्त करने के लिए गुप्त प्रीइमेज प्रकट करता है, तो वही गुप्त लॉक प्रेषक को दूसरी लेयर पर पारस्परिक धनराशि प्राप्त करने के लिए दिखाई देता है और वह इसका उपयोग कर सकता है। यह क्रिप्टोग्राफिक बंधन परमाणुता सुनिश्चित करता है - या तो दोनों पक्षों को उनकी धनराशि प्राप्त होती है या किसी को नहीं, जिससे ट्रस्टलेस स्वैप में प्रतिपक्ष जोखिम समाप्त हो जाता है।
question: อะไรที่ทำให้มั่นใจได้ว่าทั้งสองฝ่ายใน cross-layer swap จะทำธุรกรรมสำเร็จหรือทั้งคู่ล้มเหลวโดยไม่สูญเสียเงินทุน?
answer: ใช้แฮชล็อคเดียวกันในทั้งสองเครือข่าย สร้างการผูกมัดทางการเข้ารหัสระหว่างขาแลกเปลี่ยน
wrong_answers:
  - ตัวล็อคเวลา (Time locks) ป้องกันไม่ให้ฝ่ายใดฝ่ายหนึ่งเรียกร้องเงินจนกว่าทั้งสองเครือข่ายจะยืนยันการทำธุรกรรม
  - การรวมคีย์ MuSig2 ต้องการให้ทั้งสองฝ่ายร่วมลงนามก่อนที่จะสามารถย้ายเงินได้
  - "เส้นทางสคริปต์ของ Taproot จะย้อนกลับธุรกรรมโดยอัตโนมัติหากเครือข่ายหนึ่งล้มเหลวในการดำเนินการให้เสร็จสิ้น"
explanation: |
  ลักษณะเชิงอะตอมของการแลกเปลี่ยนข้ามเลเยอร์ขึ้นอยู่กับการใช้ล็อคแฮชที่เหมือนกันในทั้งสองเครือข่าย เมื่อผู้รับเปิดเผยภาพล่วงหน้าของความลับเพื่อเรียกร้องเงินทุนในเลเยอร์หนึ่ง ความลับเดียวกันนั้นจะกลายเป็นที่มองเห็นและใช้งานได้โดยผู้ส่งเพื่อเรียกร้องเงินทุนตอบแทนในอีกเลเยอร์หนึ่ง การผูกมัดทางเข้ารหัสนี้ทำให้มั่นใจในความเป็นอะตอม - ทั้งสองฝ่ายจะได้รับเงินทุนของพวกเขาหรือไม่มีฝ่ายใดได้รับเลย ซึ่งช่วยขจัดความเสี่ยงของคู่สัญญาในการแลกเปลี่ยนที่ไม่ต้องพึ่งพาความไว้วางใจ
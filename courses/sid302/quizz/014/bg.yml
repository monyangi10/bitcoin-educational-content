question: Какво гарантира, че и двете страни в междуслойната размяна или ще завършат успешно транзакцията, или и двете ще я провалят, без да загубят средства?
answer: В двете мрежи се използва един и същ хеш-ключ, който създава криптографска връзка между разменните части
wrong_answers:
  - Времевите блокировки не позволяват на никоя от страните да претендира за средства, докато и двете мрежи не потвърдят транзакциите
  - Агрегирането на ключове MuSig2 изисква и двете страни да се подпишат, преди да бъдат прехвърлени средства
  - "Пътят на скрипта на Taproot автоматично обръща транзакциите, ако една мрежа не успее да завърши"
explanation: |
  Атомарният характер на междуслойните размени се основава на използването на идентични хеш-блокировки в двете мрежи. Когато получателят разкрие тайния предварителен образ, за да поиска средства на един слой, същата тайна става видима и използвана от изпращача, за да поиска реципрочни средства на другия слой. Това криптографско обвързване осигурява атомичност - или и двете страни получават средствата си, или никоя от тях не ги получава, като по този начин се елиминира рискът от контрагента при суаповете без доверие.
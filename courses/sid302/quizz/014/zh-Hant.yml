question: 如何確保跨層交換中的雙方都能成功完成交易，或雙方都失敗而不會造成資金損失？
answer: 兩個網路使用相同的散列鎖，在交換腳位之間建立加密綁定
wrong_answers:
  - 時間鎖可防止任何一方索取資金，直到兩個網路都確認交易為止
  - MuSig2 金鑰聚合需要雙方共同簽署，才能移動任何資金
  - 「如果一個網路無法完成，Taproot 的腳本路徑會自動反向交易」
explanation: |
  跨層交換的原子性依靠在兩個網路中使用相同的雜湊鎖定。當接收方揭示秘密預映像以索取一層的資金時，相同的秘密就會變得可見，並可由寄件方用於索取另一層的對等資金。這種加密綁定確保了原子性 - 雙方都能獲得資金，或者雙方都不能獲得資金，消除了無信任交換中的交易對手風險。
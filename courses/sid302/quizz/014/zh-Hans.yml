question: 如何确保跨层互换的双方要么成功完成交易，要么都失败而不损失资金？
answer: 两个网络使用相同的哈希锁，在交换脚之间建立加密绑定
wrong_answers:
  - 在两个网络确认交易之前，时间锁阻止任何一方索要资金
  - MuSig2 密钥聚合要求双方共同签署后才能转移资金
  - "如果一个网络无法完成，Taproot 的脚本路径会自动反转交易"
explanation: |
  跨层交换的原子性依赖于在两个网络中使用相同的哈希锁。当接收方揭示秘密预图像以在一层索要资金时，发送方也能看到并使用相同的秘密在另一层索要对等资金。这种加密绑定确保了原子性--要么双方都获得资金，要么双方都没有，从而消除了无信任交换中的交易对手风险。
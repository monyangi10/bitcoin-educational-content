question: یک توسعه‌دهنده می‌خواهد صدور دارایی را بر روی Elements بدون وابستگی‌های خارجی یا انتظار برای تأیید بلاک‌ها آزمایش کند - از کدام پیکربندی باید استفاده کند؟
answer: زنجیره=elementsregtest را تنظیم کنید تا یک محیط آزمایشی محلی با تولید فوری بلاک ایجاد کنید
wrong_answers:
  - زنجیره=liquidv1 را تنظیم کنید تا به شبکه اصلی Liquid برای آزمایش فوری متصل شوید
  - از دستور issueasset RPC با فلگ --testmode برای توسعه‌ی ایزوله استفاده کنید.
  - "زنجیره=bitcoin-regtest را پیکربندی کنید تا به ویژگی‌های Elements در محیط آزمایشی Bitcoin دسترسی پیدا کنید"
explanation: |
  پیکربندی elementsregtest یک محیط آزمایش رگرسیون محلی ایجاد می‌کند که در آن توسعه‌دهندگان می‌توانند با استفاده از دستوراتی مانند generateblock، بلاک‌های generate را به‌طور فوری ایجاد کنند و به آن‌ها اجازه می‌دهد تا صدور دارایی و ویژگی‌های دیگر را بدون انتظار برای تأیید شبکه یا وابستگی به نودهای خارجی آزمایش کنند. تنظیم chain=liquidv1 به شبکه تولید Liquid متصل می‌شود که زمان بلاک ۱ دقیقه‌ای و وابستگی‌های خارجی دارد. دستور issueasset فاقد پرچم --testmode است و bitcoin-regtest برای Bitcoin Core است، نه عملکرد Elements.
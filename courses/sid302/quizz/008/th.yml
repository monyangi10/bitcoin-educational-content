question: นักพัฒนาต้องการทดสอบการออกสินทรัพย์บน Elements โดยไม่ต้องพึ่งพาภายนอกหรือรอการยืนยันบล็อก - ควรใช้การกำหนดค่าใด?
answer: ตั้งค่า chain=elementsregtest เพื่อสร้างสภาพแวดล้อมการทดสอบในเครื่องที่มีการสร้างบล็อกทันที
wrong_answers:
  - ตั้งค่า chain=liquidv1 เพื่อเชื่อมต่อกับเครือข่ายหลัก Liquid สำหรับการทดสอบทันที
  - ใช้คำสั่ง issueasset RPC พร้อมกับแฟล็ก --testmode สำหรับการพัฒนาแบบแยกตัว
  - "กำหนดค่า chain=bitcoin-regtest เพื่อเข้าถึงฟีเจอร์ Elements ในสภาพแวดล้อมทดสอบของ Bitcoin"
explanation: |
  การกำหนดค่า elementsregtest สร้างสภาพแวดล้อมการทดสอบการถดถอยในเครื่องที่นักพัฒนาสามารถ generate บล็อกได้ทันทีโดยใช้คำสั่งเช่น generateblock ทำให้พวกเขาสามารถทดสอบการออกสินทรัพย์และคุณสมบัติอื่น ๆ ได้โดยไม่ต้องรอการยืนยันจากเครือข่ายหรือพึ่งพาโหนดภายนอก การตั้งค่า chain=liquidv1 จะเชื่อมต่อกับเครือข่ายการผลิต Liquid ซึ่งมีเวลาบล็อก 1 นาทีและการพึ่งพาภายนอก คำสั่ง issueasset ไม่มีธง --testmode และ bitcoin-regtest สำหรับ Bitcoin Core ไม่ใช่ฟังก์ชัน Elements
question: एक डेवलपर बाहरी निर्भरताओं के बिना या ब्लॉक पुष्टिकरण की प्रतीक्षा किए बिना Elements पर परिसंपत्ति जारी करने का परीक्षण करना चाहता है - उन्हें किस कॉन्फ़िगरेशन का उपयोग करना चाहिए?
answer: तत्काल ब्लॉक जनरेशन के साथ स्थानीय परीक्षण वातावरण बनाने के लिए chain=elementsregtest सेट करें।
wrong_answers:
  - तत्काल परीक्षण के लिए मुख्य Liquid नेटवर्क से कनेक्ट करने के लिए chain=liquidv1 सेट करें
  - पृथक विकास के लिए --testmode फ़्लैग के साथ issueasset RPC कमांड का उपयोग करें।
  - "Bitcoin के परीक्षण वातावरण में Elements सुविधाओं तक पहुँचने के लिए chain=bitcoin-regtest को कॉन्फ़िगर करें"
explanation: |
  elementsregtest कॉन्फ़िगरेशन एक स्थानीय रिग्रेशन टेस्टिंग वातावरण बनाता है जहाँ डेवलपर generateblock जैसे कमांड का उपयोग करके generate ब्लॉक तुरंत बना सकते हैं। इससे वे नेटवर्क पुष्टिकरण की प्रतीक्षा किए बिना या बाहरी नोड्स पर निर्भर हुए बिना एसेट जारी करने और अन्य सुविधाओं का परीक्षण कर सकते हैं। chain=liquidv1 सेट करने से प्रोडक्शन Liquid नेटवर्क से कनेक्ट होता है, जिसमें 1 मिनट का ब्लॉक टाइम और बाहरी निर्भरताएँ होती हैं। issueasset कमांड में --testmode फ़्लैग नहीं है, और bitcoin-regtest Bitcoin कोर के लिए है, न कि Elements कार्यक्षमता के लिए।
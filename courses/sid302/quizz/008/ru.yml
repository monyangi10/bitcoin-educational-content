question: Разработчик хочет протестировать выпуск активов на Elements без внешних зависимостей или ожидания подтверждений блока - какую конфигурацию ему следует использовать?
answer: Установите chain=elementsregtest, чтобы создать локальную среду тестирования с мгновенной генерацией блоков
wrong_answers:
  - Установите chain=liquidv1 для подключения к основной сети Liquid для немедленного тестирования
  - Для изолированной разработки используйте команду issueasset RPC с флагом --testmode
  - "Настройте chain=bitcoin-regtest для доступа к функциям Elements в тестовой среде Bitcoin"
explanation: |
  Конфигурация elementsregtest создает локальную среду регрессионного тестирования, в которой разработчики могут мгновенно создавать блоки generate с помощью команд типа generateblock, что позволяет им тестировать выдачу активов и другие функции, не дожидаясь подтверждения сети или зависимости от внешних узлов. Установка chain=liquidv1 подключает к производственной сети Liquid, которая имеет 1-минутное время блокировки и внешние зависимости. У команды issueasset нет флага --testmode, а bitcoin-regtest предназначен для Bitcoin Core, а не для функциональности Elements.
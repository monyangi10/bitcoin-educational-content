question: Một nhà phát triển muốn thử nghiệm việc phát hành tài sản trên Elements mà không cần phụ thuộc vào các yếu tố bên ngoài hoặc chờ xác nhận khối - họ nên sử dụng cấu hình nào?
answer: Đặt chain=elementsregtest để tạo môi trường kiểm thử cục bộ với khả năng tạo khối tức thì.
wrong_answers:
  - Đặt chain=liquidv1 để kết nối với mạng Liquid chính để kiểm tra ngay lập tức.
  - Sử dụng lệnh issueasset RPC với cờ --testmode để phát triển độc lập.
  - "Cấu hình chain=bitcoin-regtest để truy cập các tính năng của Elements trong môi trường thử nghiệm của Bitcoin"
explanation: |
  Cấu hình elementsregtest tạo ra một môi trường kiểm thử hồi quy cục bộ, nơi các nhà phát triển có thể tạo khối generate ngay lập tức bằng các lệnh như generateblock, cho phép họ kiểm tra việc phát hành tài sản và các tính năng khác mà không cần chờ xác nhận mạng hoặc phụ thuộc vào các nút bên ngoài. Thiết lập chain=liquidv1 kết nối với mạng Liquid đang hoạt động, có thời gian tạo khối là 1 phút và phụ thuộc vào các nút bên ngoài. Lệnh issueasset không có cờ --testmode, và bitcoin-regtest dành cho Bitcoin Core, chứ không phải chức năng của Elements.
question: Разработчикът иска да тества издаването на активи в Elements без външни зависимости или без да чака потвърждения за блокове - коя конфигурация трябва да използва?
answer: Задайте chain=elementsregtest, за да създадете локална среда за тестване с незабавно генериране на блокове
wrong_answers:
  - Задайте chain=liquidv1, за да се свържете с основната мрежа Liquid за незабавно тестване
  - Използвайте командата issueasset RPC с флаг --testmode за изолирана разработка
  - "Конфигуриране на верига=bitcoin-regtest за достъп до функциите на Elements в тестовата среда на Bitcoin"
explanation: |
  Конфигурацията elementsregtest създава локална среда за тестване на регресия, в която разработчиците могат да generate блокове незабавно с помощта на команди като generateblock, което им позволява да тестват издаването на активи и други функции, без да чакат потвърждения от мрежата или да зависят от външни възли. Задаването на chain=liquidv1 свързва към производствената мрежа Liquid, която има 1-минутно време за блокове и външни зависимости. Командата issueasset няма флаг --testmode, а bitcoin-regtest е за ядрото на Bitcoin, а не за функционалността на Elements.
question: Blockstream AMPのブラインディング・アーキテクチャにおいて、トランザクションの有効性検証を維持しながら資産額の暗号化を可能にする暗号メカニズムは何ですか？
answer: 暗号化された値を明かすことなくトランザクションの有効性を検証する範囲証明を用いた楕円曲線ディフィー・ヘルマン鍵交換
wrong_answers:
  - 計算の完全性を証明しながら取引量を隠蔽するコミットメントスキームによるゼロ知識SNARK
  - 暗号的な監査可能性を維持しながら、送信者の身元を難読化するステルスアドレスによるリング署名
  - 暗号化されたトランザクション・データに対する数学的操作を可能にする、メルクルツリー・コミットメントによる同形暗号化
explanation: |
  AMPはECDH鍵交換を使用し、送信者は受信者の見えない公開鍵を使用して資産額を暗号化し、値を公開することなく取引の正当性を数学的に検証する範囲証明を生成する。これはSNARK（計算証明）、リング署名（匿名性重視）、ホモモーフィック暗号化（暗号化されたデータに対する計算）とは異なる。
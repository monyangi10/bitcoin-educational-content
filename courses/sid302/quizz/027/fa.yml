question: در معماری کورسازی Blockstream AMP، چه مکانیزم رمزنگاری امکان رمزگذاری مقدار دارایی را فراهم می‌کند در حالی که تأیید اعتبار تراکنش حفظ می‌شود؟
answer: تبادل کلید دیفی-هلمن با منحنی بیضوی با اثبات‌های محدوده که اعتبار تراکنش را بدون افشای مقادیر رمزگذاری شده تأیید می‌کند
wrong_answers:
  - اثبات‌های SNARK بدون دانش با طرح‌های تعهد که مقادیر تراکنش را پنهان می‌کنند در حالی که یکپارچگی محاسباتی را اثبات می‌کنند
  - امضاهای حلقه‌ای با آدرس‌های مخفی که هویت فرستنده را پنهان می‌کنند در حالی که قابلیت حسابرسی رمزنگاری را حفظ می‌کنند
  - رمزنگاری همومورفیک با تعهدات درخت مرکل که عملیات ریاضی بر روی داده‌های تراکنش رمزگذاری‌شده را امکان‌پذیر می‌سازد
explanation: |
  AMP از تبادل کلید ECDH استفاده می‌کند که در آن فرستندگان مقادیر دارایی را با استفاده از کلیدهای عمومی کورکننده گیرندگان رمزگذاری می‌کنند و اثبات‌های محدوده‌ای تولید می‌کنند که به‌صورت ریاضی اعتبار تراکنش را بدون افشای مقادیر تأیید می‌کنند. این با SNARKs (اثبات‌های محاسباتی)، امضاهای حلقه‌ای (تمرکز بر ناشناس بودن) یا رمزگذاری همومورفیک (محاسبه بر روی داده‌های رمزگذاری‌شده) متفاوت است - AMP به‌طور خاص به تراکنش‌های محرمانه اما قابل تأیید نیاز دارد.
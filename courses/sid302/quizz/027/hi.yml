question: ब्लॉकस्ट्रीम एएमपी की ब्लाइंडिंग आर्किटेक्चर में, कौन सा क्रिप्टोग्राफिक तंत्र लेनदेन की वैधता सत्यापन को बनाए रखते हुए परिसंपत्ति राशि एन्क्रिप्शन को सक्षम बनाता है?
answer: एलिप्टिक कर्व डिफि-हेलमैन कुंजी विनिमय जिसमें रेंज प्रूफ शामिल हैं जो एन्क्रिप्टेड मानों को प्रकट किए बिना लेनदेन की वैधता को सत्यापित करते हैं।
wrong_answers:
  - शून्य-ज्ञान वाले SNARK जिनमें प्रतिबद्धता योजनाएं लेनदेन राशि को छिपाते हुए कम्प्यूटेशनल अखंडता को साबित करती हैं।
  - गुप्त पतों के साथ रिंग हस्ताक्षर जो क्रिप्टोग्राफिक ऑडिटेबिलिटी को बनाए रखते हुए प्रेषक की पहचान को छिपाते हैं।
  - मर्कल ट्री कमिटमेंट के साथ होमोमॉर्फिक एन्क्रिप्शन जो एन्क्रिप्टेड लेनदेन डेटा पर गणितीय संचालन को सक्षम बनाता है
explanation: |
  AMP ECDH कुंजी विनिमय का उपयोग करता है, जिसमें प्रेषक प्राप्तकर्ता की गोपनीय सार्वजनिक कुंजियों का उपयोग करके परिसंपत्ति राशियों को एन्क्रिप्ट करते हैं, जिससे रेंज प्रूफ उत्पन्न होते हैं जो मूल्यों को उजागर किए बिना लेनदेन की वैधता को गणितीय रूप से सत्यापित करते हैं। यह SNARKs (गणनात्मक प्रमाण), रिंग हस्ताक्षर (अनामता पर केंद्रित) या होमोमोर्फिक एन्क्रिप्शन (एन्क्रिप्टेड डेटा पर गणना) से भिन्न है - AMP को विशेष रूप से गोपनीय लेकिन सत्यापन योग्य लेनदेन की आवश्यकता होती है।
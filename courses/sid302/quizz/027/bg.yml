question: Кой криптографски механизъм в архитектурата на Blockstream AMP позволява криптиране на размера на активите, като същевременно поддържа проверка на валидността на трансакциите?
answer: Обмен на ключове Elliptic Curve Diffie-Hellman с доказателства за обхват, които проверяват валидността на транзакциите, без да разкриват криптираните стойности
wrong_answers:
  - SNARKs с нулево знание и схеми за поемане на задължения, които скриват сумите на транзакциите, като същевременно доказват изчислителна цялост
  - Пръстеновидни подписи със скрити адреси, които скриват самоличността на подателя, като същевременно запазват криптографската одитируемост
  - Хомоморфно криптиране с ангажименти за дърво на Меркъл, които позволяват математически операции върху криптираните данни за транзакции
explanation: |
  AMP използва обмен на ключове ECDH, при който изпращачите криптират сумите на активите, като използват публичните ключове на получателите, генерирайки доказателства за обхвата, които математически проверяват валидността на трансакциите, без да разкриват стойностите. Това се различава от SNARK (изчислителни доказателства), пръстеновидни подписи (фокус върху анонимността) или хомоморфно криптиране (изчисления върху криптирани данни) - AMP се нуждае конкретно от поверителни, но проверими трансакции.
question: "ในสถาปัตยกรรมการปิดบังของ Blockstream AMP กลไกการเข้ารหัสลับใดที่ช่วยให้การเข้ารหัสจำนวนสินทรัพย์เป็นไปได้ในขณะที่ยังคงรักษาการตรวจสอบความถูกต้องของธุรกรรม?"
answer: "การแลกเปลี่ยนกุญแจ Elliptic Curve Diffie-Hellman พร้อมด้วยการพิสูจน์ช่วงที่ตรวจสอบความถูกต้องของธุรกรรมโดยไม่เปิดเผยค่าที่เข้ารหัส"
wrong_answers:
  - "Zero-knowledge SNARKs ที่มี commitment schemes ที่ซ่อนจำนวนธุรกรรมในขณะที่พิสูจน์ความสมบูรณ์ของการคำนวณ"
  - "ลายเซ็นวงแหวนพร้อมที่อยู่ลับที่ปกปิดตัวตนของผู้ส่งในขณะที่ยังคงความสามารถในการตรวจสอบทางเข้ารหัส"
  - "การเข้ารหัสแบบโฮโมมอร์ฟิกด้วยการยืนยันต้นไม้เมอร์เคิลที่ช่วยให้สามารถดำเนินการทางคณิตศาสตร์บนข้อมูลธุรกรรมที่เข้ารหัส"
explanation: |
  AMP ใช้การแลกเปลี่ยนกุญแจ ECDH ที่ผู้ส่งเข้ารหัสจำนวนสินทรัพย์โดยใช้กุญแจสาธารณะบอดของผู้รับ สร้างหลักฐานช่วงที่ตรวจสอบความถูกต้องของธุรกรรมทางคณิตศาสตร์โดยไม่เปิดเผยค่า ซึ่งแตกต่างจาก SNARKs (หลักฐานการคำนวณ), ลายเซ็นวงแหวน (เน้นความไม่ระบุตัวตน), หรือการเข้ารหัสแบบโฮโมมอร์ฟิก (การคำนวณบนข้อมูลที่เข้ารหัส) - AMP ต้องการธุรกรรมที่เป็นความลับแต่สามารถตรวจสอบได้โดยเฉพาะเจาะจง

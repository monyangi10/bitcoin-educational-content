question: 在 Blockstream AMP 的致盲架構中，什麼加密機制可在維持交易有效性驗證的同時，實現資產金額加密？
answer: 橢圓曲線 Diffie-Hellman 金鑰交換具有範圍證明，可驗證交易的有效性，而不會洩露加密值
wrong_answers:
  - 零知識 SNARK 與承諾方案，可隱藏交易金額，同時證明計算完整性
  - 具有隱藏地址的環狀簽章，可混淆寄件者身份，同時維持加密的可稽核性
  - 具備 merkle 樹狀承諾的同態加密，可對加密的交易資料進行數學運算
explanation: |
  AMP 使用 ECDH 金鑰交換，寄件者使用收件者的保密公開金鑰加密資產金額，產生範圍證明，以數學方式驗證交易的有效性，而不會暴露價值。這與 SNARKs (計算證明)、環狀簽名 (匿名重點) 或同態加密 (加密資料的計算) 不同 - AMP 特別需要保密但可驗證的交易。
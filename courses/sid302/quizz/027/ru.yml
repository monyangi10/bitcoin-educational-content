question: Какой криптографический механизм в архитектуре блокчейна Blockstream AMP обеспечивает шифрование суммы активов при сохранении проверки действительности транзакций?
answer: Обмен ключами по эллиптической кривой Диффи-Хеллмана с доказательствами диапазона, которые проверяют действительность транзакций без раскрытия зашифрованных значений
wrong_answers:
  - SNARK с нулевым знанием и схемами обязательств, которые скрывают суммы транзакций, доказывая при этом вычислительную целостность
  - Кольцевые подписи со скрытыми адресами, которые позволяют скрыть личность отправителя, сохраняя при этом возможность криптографического аудита
  - Гомоморфное шифрование с фиксацией мерклового дерева, позволяющее выполнять математические операции над зашифрованными данными транзакций
explanation: |
  AMP использует обмен ключами ECDH, при котором отправители шифруют суммы активов, используя ослепляющие открытые ключи получателей, генерируя доказательства диапазона, которые математически проверяют действительность транзакций без раскрытия значений. Это отличается от SNARK (вычислительные доказательства), кольцевых подписей (фокус на анонимности) или гомоморфного шифрования (вычисления на зашифрованных данных) - AMP нужны именно конфиденциальные, но проверяемые транзакции.
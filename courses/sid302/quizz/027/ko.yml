question: 블록스트림 AMP의 블라인드 아키텍처에서 거래 유효성 검증을 유지하면서 자산 금액 암호화를 가능하게 하는 암호화 메커니즘은 무엇인가요?
answer: 암호화된 값을 공개하지 않고 거래 유효성을 검증하는 범위 증명 기능을 갖춘 타원 곡선 디피-헬만 키 거래소
wrong_answers:
  - 계산 무결성을 증명하는 동시에 거래 금액을 숨기는 약정 체계를 갖춘 영지식 SNARK
  - 암호화 감사 가능성을 유지하면서 발신자 신원을 난독화하는 스텔스 주소가 포함된 링 서명
  - 암호화된 트랜잭션 데이터에 대한 수학적 연산을 가능하게 하는 머클 트리 커밋을 사용한 동형 암호화
explanation: |
  AMP는 발신자가 수신자의 블라인드 공개 키를 사용하여 자산 금액을 암호화하는 ECDH 키 교환을 사용하여 값을 노출하지 않고 거래 유효성을 수학적으로 검증하는 범위 증명을 생성합니다. 이는 SNARK(계산 증명), 링 서명(익명성에 중점을 둔) 또는 동형 암호화(암호화된 데이터에 대한 계산)와는 다르며, AMP는 특히 기밀이지만 검증 가능한 거래가 필요합니다.
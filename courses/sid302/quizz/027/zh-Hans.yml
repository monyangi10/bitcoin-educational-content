question: 在 Blockstream AMP 的加密架构中，什么加密机制能够在保持交易有效性验证的同时实现资产金额加密？
answer: 带有范围证明的椭圆曲线 Diffie-Hellman 密钥交换，可在不泄露加密值的情况下验证交易有效性
wrong_answers:
  - 零知识 SNARK 与承诺方案，在证明计算完整性的同时隐藏交易金额
  - 具有隐身地址的环形签名，可在保持加密可审计性的同时混淆发件人身份
  - 带有梅克尔树承诺的同态加密，可对加密交易数据进行数学运算
explanation: |
  AMP 使用 ECDH 密钥交换，发送方使用接收方的盲公钥加密资产数额，生成范围证明，在不暴露数值的情况下从数学角度验证交易的有效性。这不同于 SNARKs（计算证明）、环形签名（注重匿名性）或同态加密（对加密数据进行计算）--AMP 特别需要保密但可验证的交易。
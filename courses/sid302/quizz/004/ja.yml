question: Liquidが取引金額と資産タイプを一般公開から隠すことを可能にする暗号機能とは？
answer: Confidential Transactions (CT)
wrong_answers:
  - ハードウェア・セキュリティ・モジュール（HSM）
  - ダイナミック・フェデレーション（Dynafed）プロトコル
  - ペグアウト認証キー（PAKs）
explanation: |
  Confidential Transactions（CT）は、Liquidを可能にする暗号機能であり、公開台帳から資産の種類と取引金額を隠す一方で、ネットワークが取引の正当性を検証することを可能にする。これにより、金融機関にとって不可欠な商業的プライバシーが提供される。ハードウェア・セキュリティ・モジュールは秘密鍵を保護する物理的なデバイスであり、Dynafedプロトコルはフェデレーションの変更を管理し、PAKはペグアウト・プロセスを制御する。
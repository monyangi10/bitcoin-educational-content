question: คุณลักษณะการเข้ารหัสใดที่ช่วยให้ Liquid ซ่อนจำนวนธุรกรรมและประเภทสินทรัพย์จากการมองเห็นสาธารณะ?
answer: Confidential Transactions (CT)
wrong_answers:
  - โมดูลความปลอดภัยฮาร์ดแวร์ (HSMs)
  - โปรโตคอล Dynamic Federation (Dynafed)
  - คีย์การอนุญาต Peg-out (PAKs)
explanation: |
  Confidential Transactions (CT) เป็นคุณสมบัติการเข้ารหัสที่ช่วยให้ Liquid สามารถซ่อนประเภทสินทรัพย์และจำนวนธุรกรรมจากบัญชีแยกประเภทสาธารณะ ในขณะที่ยังคงอนุญาตให้เครือข่ายตรวจสอบความถูกต้องของธุรกรรมได้ ซึ่งให้ความเป็นส่วนตัวทางการค้าที่จำเป็นสำหรับสถาบันต่างๆ Hardware Security Modules เป็นอุปกรณ์ทางกายภาพที่รักษาความปลอดภัยของคีย์ส่วนตัว โปรโตคอล Dynafed จัดการการเปลี่ยนแปลงของสหพันธ์ และ PAKs ควบคุมกระบวนการ peg-out - ไม่มีสิ่งใดในนี้ที่ซ่อนรายละเอียดธุรกรรมจากการมองเห็นของสาธารณะ
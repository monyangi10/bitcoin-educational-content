question: Какая криптографическая функция позволяет Liquid скрывать суммы транзакций и типы активов от посторонних глаз?
answer: Confidential Transactions (CT)
wrong_answers:
  - Аппаратные модули безопасности (HSM)
  - Протокол динамической федерации (Dynafed)
  - Ключи авторизации (PAK)
explanation: |
  Confidential Transactions (CT) - это криптографическая функция, которая позволяет Liquid скрывать типы активов и суммы транзакций от публичной бухгалтерской книги, но при этом позволяет сети проверять действительность транзакций. Это обеспечивает коммерческую конфиденциальность, необходимую для учреждений. Аппаратные модули безопасности - это физические устройства, обеспечивающие защиту закрытых ключей, протокол Dynafed управляет изменениями в федерации, а PAK контролируют процесс вывода из сети - ни один из этих способов не скрывает детали транзакций от посторонних глаз.
question: کدام ویژگی رمزنگاری به Liquid اجازه می‌دهد تا مقادیر تراکنش و انواع دارایی‌ها را از دید عموم پنهان کند؟
answer: Confidential Transactions (CT)
wrong_answers:
  - ماژول‌های امنیتی سخت‌افزاری (HSMs)
  - پروتکل فدراسیون داینامیک (Dynafed)
  - کلیدهای مجوز Peg-out (PAKs)
explanation: |
  ویژگی رمزنگاری Confidential Transactions (CT) این امکان را به Liquid می‌دهد که انواع دارایی‌ها و مقادیر تراکنش‌ها را از دفتر کل عمومی پنهان کند، در حالی که همچنان به شبکه اجازه می‌دهد تا اعتبار تراکنش را تأیید کند. این امر حریم خصوصی تجاری ضروری برای مؤسسات را فراهم می‌کند. ماژول‌های امنیتی سخت‌افزاری دستگاه‌های فیزیکی هستند که کلیدهای خصوصی را ایمن می‌کنند، پروتکل Dynafed تغییرات فدراسیون را مدیریت می‌کند، و PAKها فرآیند peg-out را کنترل می‌کنند - هیچ‌یک از این‌ها جزئیات تراکنش را از دید عمومی پنهان نمی‌کنند.
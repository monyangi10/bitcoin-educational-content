question: Коя криптографска функция позволява на Liquid да скрие сумите на трансакциите и видовете активи от публичен поглед?
answer: Confidential Transactions (CT)
wrong_answers:
  - Хардуерни модули за сигурност (HSM)
  - Протокол за динамична федерация (Dynafed)
  - Ключове за оторизация на Peg-out (PAK)
explanation: |
  Confidential Transactions (CT) е криптографската функция, която позволява на Liquid да скрие видовете активи и сумите на трансакциите от публичната счетоводна книга, като същевременно позволява на мрежата да проверява валидността на трансакциите. Това осигурява търговска поверителност, която е от съществено значение за институциите. Модулите за хардуерна сигурност са физически устройства, които защитават частните ключове, протоколът Dynafed управлява промените във федерацията, а PAK контролират процеса на изтегляне - никой от тях не скрива подробностите за трансакциите от публичния поглед.
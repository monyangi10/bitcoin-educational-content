question: Liquid की कौन सी क्रिप्टोग्राफिक विशेषता इसे लेनदेन की रकम और परिसंपत्ति के प्रकार को सार्वजनिक रूप से छिपाने की अनुमति देती है?
answer: जीडब्ल्यू-1 (सीटी)
wrong_answers:
  - हार्डवेयर सुरक्षा मॉड्यूल (एचएसएम)
  - डायनामिक फेडरेशन (डायनाफेड) प्रोटोकॉल
  - पेग-आउट प्राधिकरण कुंजी (पीएके)
explanation: |
  Confidential Transactions (CT) एक क्रिप्टोग्राफिक विशेषता है जो Liquid को सार्वजनिक बहीखाते से परिसंपत्ति प्रकारों और लेनदेन राशि को छिपाने में सक्षम बनाती है, जबकि नेटवर्क को लेनदेन की वैधता सत्यापित करने की अनुमति भी देती है। यह संस्थानों के लिए आवश्यक व्यावसायिक गोपनीयता प्रदान करता है। हार्डवेयर सुरक्षा मॉड्यूल भौतिक उपकरण हैं जो निजी कुंजियों को सुरक्षित रखते हैं, डायनाफेड प्रोटोकॉल संघ परिवर्तनों का प्रबंधन करता है, और PAK पेग-आउट प्रक्रिया को नियंत्रित करते हैं - इनमें से कोई भी लेनदेन विवरण को सार्वजनिक दृश्य से नहीं छुपाता है।
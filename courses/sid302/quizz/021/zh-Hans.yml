question: 与传统金融系统相比，Liquid 的 2 分钟结算时间的主要业务优势是什么？
answer: 实现原子结算，交货和付款同时进行，从而降低交易对手风险
wrong_answers:
  - 在资产交易中无需遵守监管规定和 KYC 要求
  - 可无限制地扩展高频交易，且无需支付任何交易费用
  - 通过内置的做市商算法自动发现价格
explanation: |
  Liquid 的 2 分钟结算可实现原子结算，这对降低交易对手风险至关重要，因为交易双方可同时收到欠款，消除了一方可能违约的缺口。而传统的 T+2 结算则会产生一个存在交易对手风险的窗口。其他选择并不正确：Liquid 仍要求通过 AMP 合规，有交易费用和规模限制，并且不提供自动做市。
question: Ni akarusho akahe k’ubudandaji k’intango igihe co gutanga amahera c’iminota 2 ca Liquid gitanga kuruta uburyo bwa kera bwo gutanga amahera?
answer: Kugabanya ingorane z'abafatanyabikorwa mu gutuma habaho ugusezerana kw'ibintu aho gutanga no kwishura bibera icarimwe
wrong_answers:
  - Ikuraho ivy'uko hakenewe kwubahiriza amategeko n'ibisabwa vya KYC mu bucuruzi bw'itunga
  - Kwemerera ubucuruzi butagira aho bugarukira ku bucuruzi bw'incuro nyinshi ata mahera yo gucuruza
  - Bishoboza kuvumbura igiciro ubwavyo biciye mu buhinga bwo gukora isoko
explanation: |
  Iminota 2 ya Liquid ishobora gusezerana, ivyo bikaba ari ngirakamaro mu kugabanya ingorane z’abagenzi kubera ko bompi baronka ivyo bafise umwenda icarimwe, bikaba bikuraho itandukaniro aho uruhande rumwe rushobora gutakaza. Ivy’ugusezerana vya kera vya T+2 bituma haba idirisha aho ingorane z’abafatanyabikorwa ziri. Ayandi mahitamwo ntabwo ari meza: Liquid iracari isaba kwubahiriza amategeko biciye muri AMP, irafise amafaranga y’ugucuruza n’imipaka yo gupima, kandi ntitanga ugukora isoko ry’ubuhinga.
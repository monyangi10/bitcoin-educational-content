question: مزیت اصلی کسب‌وکار که زمان تسویه ۲ دقیقه‌ای Liquid نسبت به سیستم‌های مالی سنتی فراهم می‌کند چیست؟
answer: با کاهش ریسک طرف مقابل از طریق امکان تسویه اتمی که در آن تحویل و پرداخت به‌طور همزمان انجام می‌شود، ریسک کاهش می‌یابد.
wrong_answers:
  - نیاز به رعایت مقررات و الزامات KYC در تجارت دارایی را از بین می‌برد
  - امکان مقیاس‌پذیری نامحدود برای معاملات با فرکانس بالا بدون هیچ‌گونه کارمزد تراکنش را فراهم می‌کند
  - امکان کشف قیمت خودکار از طریق الگوریتم‌های بازارسازی داخلی را فراهم می‌کند
explanation: |
  تسویه ۲ دقیقه‌ای Liquid امکان تسویه اتمی را فراهم می‌کند که برای کاهش ریسک طرف مقابل حیاتی است زیرا هر دو طرف به طور همزمان آنچه را که به آنها تعلق می‌گیرد دریافت می‌کنند و شکافی که ممکن است یک طرف نکول کند را از بین می‌برد. تسویه سنتی T+2 یک بازه زمانی ایجاد می‌کند که در آن ریسک طرف مقابل وجود دارد. گزینه‌های دیگر نادرست هستند: Liquid همچنان نیاز به رعایت از طریق AMP دارد، دارای کارمزد تراکنش و محدودیت‌های مقیاس‌پذیری است و بازارسازی خودکار ارائه نمی‌دهد.
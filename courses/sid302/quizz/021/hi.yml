question: जीडब्ल्यू-0 के 2 मिनट के निपटान समय का परंपरागत वित्तीय प्रणालियों पर प्राथमिक व्यावसायिक लाभ क्या है?
answer: एक ही समय में डिलीवरी और भुगतान होने पर एटॉमिक सेटलमेंट को सक्षम करके प्रतिपक्ष जोखिम को कम करता है।
wrong_answers:
  - एसेट ट्रेडिंग में नियामक अनुपालन और केवाईसी आवश्यकताओं की जरूरत खत्म हो जाती है।
  - यह बिना किसी लेनदेन शुल्क के उच्च-आवृत्ति ट्रेडिंग के लिए असीमित स्केलेबिलिटी की अनुमति देता है।
  - अंतर्निहित मार्केट मेकिंग एल्गोरिदम के माध्यम से स्वचालित मूल्य निर्धारण को सक्षम बनाता है।
explanation: |
  Liquid का 2 मिनट का निपटान स्वचालित निपटान को सक्षम बनाता है, जो प्रतिपक्ष जोखिम को कम करने के लिए महत्वपूर्ण है क्योंकि दोनों पक्षों को एक साथ उनका बकाया प्राप्त होता है, जिससे किसी एक पक्ष द्वारा डिफ़ॉल्ट करने की संभावना समाप्त हो जाती है। पारंपरिक T+2 निपटान प्रतिपक्ष जोखिम की संभावना को कम करता है। अन्य विकल्प गलत हैं: Liquid में अभी भी AMP के माध्यम से अनुपालन की आवश्यकता होती है, इसमें लेनदेन शुल्क और स्केलिंग सीमाएं हैं, और यह स्वचालित बाजार निर्माण प्रदान नहीं करता है।
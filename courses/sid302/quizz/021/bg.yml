question: Кое е основното бизнес предимство, което предоставя двуминутното време за сетълмент на Liquid в сравнение с традиционните финансови системи?
answer: Намалява риска от контрагента, като позволява атомен сетълмент, при който доставката и плащането се извършват едновременно
wrong_answers:
  - Премахва необходимостта от спазване на регулаторните изисквания и изискванията за KYC при търговията с активи
  - Позволява неограничена мащабируемост за високочестотна търговия без такси за транзакции
  - Позволява автоматично откриване на цени чрез вградени алгоритми за създаване на пазари
explanation: |
  Двуминутният сетълмент на Liquid позволява атомен сетълмент, който е от решаващо значение за намаляване на риска от контрагента, тъй като и двете страни получават дължимото едновременно, като се елиминира разликата, при която едната страна може да не изпълни задълженията си. Традиционният сетълмент T+2 създава прозорец, в който съществува риск за контрагента. Другите варианти са некоректни: Liquid все още изисква спазване на изискванията чрез AMP, има такси за трансакции и лимити за мащабиране и не осигурява автоматично поддържане на пазара.
question: 與傳統金融系統相比，Liquid 的 2 分鐘結算時間所提供的主要業務優勢是什麼？
answer: 透過原子交收（交收與付款同時進行）降低交易對手風險
wrong_answers:
  - 免除資產交易中的法規遵循和 KYC 要求
  - 允許高頻交易的無限擴充能力，無需任何交易費用
  - 透過內建的市場莊家演算法，可自動發現價格
explanation: |
  Liquid 的 2 分鐘交割可實現原子交割，這對於降低交易對手風險至關重要，因為交易雙方會同時收到他們應得的款項，消除了一方可能違約的缺口。傳統的 T+2 結算會造成交易對手風險存在的空窗期。其他選項是不正確的：Liquid 仍然需要透過 AMP 達成合規性，有交易費用和縮放限制，而且不提供自動做市。
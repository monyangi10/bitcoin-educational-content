question: Liquid의 2분 정산 시간이 기존 금융 시스템에 비해 제공하는 주요 비즈니스 이점은 무엇인가요?
answer: 인도와 결제가 동시에 이루어지는 원자 결제를 활성화하여 거래 상대방 리스크를 줄입니다
wrong_answers:
  - 자산 거래에서 규제 준수 및 KYC 요건 필요성 제거
  - 거래 수수료 없이 고빈도 거래를 위한 무제한 확장성 허용
  - 내장된 시장 조성 알고리즘을 통해 자동 가격 발견 가능
explanation: |
  Liquid의 2분 정산은 원자 정산을 가능하게 하며, 양 당사자가 동시에 받아야 할 금액을 받기 때문에 한 당사자가 채무 불이행할 수 있는 공백을 없애 거래 상대방 위험을 줄이는 데 매우 중요합니다. 기존의 T+2 결제는 거래 상대방 위험이 존재하는 창을 만듭니다. Liquid은 여전히 AMP를 통한 규정 준수가 필요하고 거래 수수료와 규모 제한이 있으며 자동 시장조성 기능을 제공하지 않는다는 점에서 다른 옵션은 올바르지 않습니다.
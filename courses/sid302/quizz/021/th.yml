question: ข้อได้เปรียบทางธุรกิจหลักที่เวลาในการชำระบัญชี 2 นาทีของ Liquid มอบให้เหนือกว่าระบบการเงินแบบดั้งเดิมคืออะไร?
answer: ลดความเสี่ยงของคู่สัญญาโดยการเปิดใช้งานการชำระบัญชีแบบอะตอมที่การส่งมอบและการชำระเงินเกิดขึ้นพร้อมกัน
wrong_answers:
  - กำจัดความจำเป็นในการปฏิบัติตามกฎระเบียบและข้อกำหนด KYC ในการซื้อขายสินทรัพย์
  - อนุญาตให้ขยายขนาดได้ไม่จำกัดสำหรับการซื้อขายความถี่สูงโดยไม่มีค่าธรรมเนียมการทำธุรกรรม
  - เปิดใช้งานการค้นหาราคาอัตโนมัติผ่านอัลกอริทึมการสร้างตลาดในตัว
explanation: |
  การชำระบัญชีภายใน 2 นาทีของ Liquid ช่วยให้เกิดการชำระบัญชีแบบอะตอมิก ซึ่งมีความสำคัญในการลดความเสี่ยงของคู่สัญญาเพราะทั้งสองฝ่ายจะได้รับสิ่งที่พวกเขาควรได้รับพร้อมกัน ทำให้ไม่มีช่องว่างที่ฝ่ายใดฝ่ายหนึ่งอาจผิดนัดชำระหนี้ การชำระบัญชีแบบ T+2 แบบดั้งเดิมสร้างช่องว่างที่มีความเสี่ยงของคู่สัญญา ตัวเลือกอื่นๆ ไม่ถูกต้อง: Liquid ยังคงต้องการการปฏิบัติตามข้อกำหนดผ่าน AMP มีค่าธรรมเนียมการทำธุรกรรมและข้อจำกัดในการขยายขนาด และไม่ได้ให้บริการการทำตลาดอัตโนมัติ
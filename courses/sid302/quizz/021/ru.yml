question: Какое основное преимущество для бизнеса дает 2-минутное время расчетов в Liquid по сравнению с традиционными финансовыми системами?
answer: Снижение риска контрагента благодаря возможности атомарных расчетов, когда поставка и оплата происходят одновременно
wrong_answers:
  - Устраняет необходимость соблюдения нормативных требований и требований KYC при торговле активами
  - Обеспечивает неограниченную масштабируемость для высокочастотной торговли без каких-либо транзакционных издержек
  - Обеспечивает автоматическое обнаружение цен благодаря встроенным алгоритмам создания рынка
explanation: |
  2-минутные расчеты Liquid позволяют осуществлять атомарные расчеты, что крайне важно для снижения риска контрагента, поскольку обе стороны получают причитающееся им одновременно, устраняя разрыв, при котором одна из сторон может объявить дефолт. Традиционные расчеты T+2 создают окно, в котором существует риск контрагента. Другие варианты неверны: Liquid по-прежнему требует соблюдения требований через AMP, имеет комиссии за транзакции и лимиты масштабирования, а также не обеспечивает автоматический маркет-мейкинг.
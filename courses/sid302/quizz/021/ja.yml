question: Liquidの2分という決済時間が、従来の金融システムに対して提供する主なビジネス上の利点は何ですか？
answer: 受渡しと支払いが同時に行われるアトミック決済を可能にすることで、カウンターパーティーリスクを軽減。
wrong_answers:
  - 資産取引におけるコンプライアンスやKYCの必要性を排除します。
  - 取引手数料なしで高頻度取引を可能にする無制限のスケーラビリティ
  - 内蔵のマーケット・メイキング・アルゴリズムによる自動価格発見が可能
explanation: |
  Liquidの2分決済はアトミック決済を可能にし、カウンターパーティーリスクを軽減する上で極めて重要です。これは、両当事者が同時に支払うべきものを受け取るため、一方の当事者がデフォルトに陥る可能性のあるギャップをなくすことができるからです。従来のT+2決済では、カウンターパーティ・リスクが存在する隙間が生じます。Liquidは依然としてAMPによるコンプライアンスが必要で、取引手数料とスケーリング制限があり、自動的なマーケットメイキングは提供されません。
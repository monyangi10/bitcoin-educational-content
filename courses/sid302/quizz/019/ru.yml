question: Что отличает регулируемые активы от нерегулируемых в системе собственных активов Liquid?
answer: Для перемещения регулируемых активов требуется вторая подпись на сервере авторизации, что позволяет обеспечить соответствие требованиям KYC/AML
wrong_answers:
  - Регулируемые активы используют смарт-контракты, а нерегулируемые - простые звонки RPC для эмиссии
  - Регулируемые активы подкреплены резервами Bitcoin, в то время как нерегулируемые активы существуют только в сайдчейне
  - Для создания регулируемых активов требуется одобрение функционеров, в то время как нерегулируемые активы могут быть выпущены без разрешения
explanation: |
  В архитектуре Liquid регулируемые и нерегулируемые активы можно выпускать без разрешения, используя простые вызовы RPC без смарт-контрактов. Ключевое различие заключается в их перемещении: регулируемые активы используют платформу управления активами Blockstream (AMP) для обеспечения соответствия требованиям, требуя дополнительной авторизационной подписи перед передачей, в то время как нерегулируемые активы могут свободно перемещаться без подобных ограничений.
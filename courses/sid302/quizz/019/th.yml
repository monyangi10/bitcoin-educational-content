question: อะไรที่ทำให้สินทรัพย์ที่มีการควบคุมแตกต่างจากสินทรัพย์ที่ไม่มีการควบคุมในระบบสินทรัพย์พื้นเมืองของ Liquid?
answer: สินทรัพย์ที่ถูกควบคุมต้องการลายเซ็นที่สองจากเซิร์ฟเวอร์การอนุญาตก่อนที่จะสามารถย้ายได้ ซึ่งช่วยให้เป็นไปตามข้อกำหนด KYC/AML
wrong_answers:
  - สินทรัพย์ที่ถูกควบคุมใช้สัญญาอัจฉริยะในขณะที่สินทรัพย์ที่ไม่ได้ถูกควบคุมใช้การเรียก RPC แบบง่ายสำหรับการออก
  - สินทรัพย์ที่ถูกควบคุมได้รับการสนับสนุนโดยสำรอง Bitcoin ในขณะที่สินทรัพย์ที่ไม่ได้ควบคุมมีอยู่เฉพาะในไซด์เชน
  - สินทรัพย์ที่ถูกควบคุมต้องได้รับการอนุมัติจากเจ้าหน้าที่สำหรับการสร้าง ในขณะที่สินทรัพย์ที่ไม่ถูกควบคุมสามารถออกได้โดยไม่ต้องขออนุญาต
explanation: |
  ในสถาปัตยกรรมของ Liquid ทั้งสินทรัพย์ที่ถูกควบคุมและไม่ถูกควบคุมสามารถออกได้โดยไม่มีข้อจำกัดโดยใช้การเรียก RPC ที่ง่ายดายโดยไม่ต้องใช้สัญญาอัจฉริยะ ความแตกต่างหลักอยู่ที่การเคลื่อนไหวของพวกมัน: สินทรัพย์ที่ถูกควบคุมใช้แพลตฟอร์มการจัดการสินทรัพย์ของ Blockstream (AMP) เพื่อบังคับใช้การปฏิบัติตามข้อกำหนดโดยต้องการลายเซ็นการอนุญาตเพิ่มเติมก่อนการโอน ในขณะที่สินทรัพย์ที่ไม่ถูกควบคุมสามารถเคลื่อนไหวได้อย่างอิสระโดยไม่มีข้อจำกัดดังกล่าว
question: 在 Liquid 的原生资产系统中，受监管资产与不受监管资产有何区别？
answer: 受监管资产在移动前需要授权服务器的二次签名，从而实现 KYC/AML 合规性
wrong_answers:
  - 受监管资产使用智能合约，而不受监管资产则使用简单的 RPC 调用发行
  - 受监管资产由 Bitcoin 储备支持，而不受监管资产仅存在于侧链上
  - 受监管的资产需要职能部门批准才能创建，而不受监管的资产则可以不经许可发行
explanation: |
  在 Liquid 的架构中，受监管和不受监管的资产都可以使用简单的 RPC 调用进行无权限发行，无需智能合约。关键区别在于它们的移动：受监管资产利用 Blockstream 的资产管理平台（AMP）来强制合规，在转移前需要额外的授权签名，而不受监管资产则可以自由移动，不受此类限制。
question: Liquid की मूल परिसंपत्ति प्रणाली में विनियमित परिसंपत्तियों को अनियमित परिसंपत्तियों से क्या अलग करता है?
answer: विनियमित संपत्तियों को स्थानांतरित करने से पहले एक प्राधिकरण सर्वर से दूसरे हस्ताक्षर की आवश्यकता होती है, जिससे केवाईसी/एएमएल अनुपालन सुनिश्चित होता है।
wrong_answers:
  - विनियमित परिसंपत्तियां स्मार्ट अनुबंधों का उपयोग करती हैं जबकि अनियमित परिसंपत्तियां जारी करने के लिए सरल RPC कॉल का उपयोग करती हैं।
  - विनियमित परिसंपत्तियाँ Bitcoin भंडार द्वारा समर्थित होती हैं, जबकि अनियमित परिसंपत्तियाँ केवल साइडचेन पर मौजूद होती हैं।
  - नियमबद्ध संपत्तियों के निर्माण के लिए पदाधिकारी की स्वीकृति आवश्यक होती है, जबकि अनियमित संपत्तियों को बिना अनुमति के जारी किया जा सकता है।
explanation: |
  Liquid की संरचना में, विनियमित और अनियमित दोनों प्रकार की संपत्तियों को स्मार्ट अनुबंधों के बिना सरल RPC कॉल का उपयोग करके बिना अनुमति के जारी किया जा सकता है। मुख्य अंतर उनके संचलन में है: विनियमित संपत्तियां ब्लॉकस्ट्रीम के एसेट मैनेजमेंट प्लेटफॉर्म (AMP) का उपयोग करके हस्तांतरण से पहले एक अतिरिक्त प्राधिकरण हस्ताक्षर की आवश्यकता द्वारा अनुपालन सुनिश्चित करती हैं, जबकि अनियमित संपत्तियां ऐसी किसी भी पाबंदी के बिना स्वतंत्र रूप से स्थानांतरित हो सकती हैं।
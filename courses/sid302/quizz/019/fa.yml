question: چه چیزی دارایی‌های تنظیم‌شده را از دارایی‌های غیرتنظیم‌شده در سیستم دارایی بومی Liquid متمایز می‌کند؟
answer: دارایی‌های تنظیم‌شده نیاز به امضای دوم از یک سرور مجاز دارند قبل از اینکه بتوانند منتقل شوند، که امکان رعایت KYC/AML را فراهم می‌کند.
wrong_answers:
  - دارایی‌های تنظیم‌شده از قراردادهای هوشمند استفاده می‌کنند در حالی که دارایی‌های تنظیم‌نشده از تماس‌های ساده RPC برای صدور استفاده می‌کنند.
  - دارایی‌های تنظیم‌شده توسط ذخایر Bitcoin پشتیبانی می‌شوند، در حالی که دارایی‌های تنظیم‌نشده فقط در زنجیره جانبی وجود دارند.
  - دارایی‌های تنظیم‌شده نیاز به تأیید مقامات برای ایجاد دارند، در حالی که دارایی‌های غیرتنظیمی می‌توانند بدون نیاز به مجوز صادر شوند.
explanation: |
  در معماری Liquid، هم دارایی‌های تنظیم‌شده و هم دارایی‌های تنظیم‌نشده می‌توانند به‌صورت بدون مجوز با استفاده از تماس‌های ساده RPC و بدون قراردادهای هوشمند صادر شوند. تفاوت اصلی در حرکت آن‌هاست: دارایی‌های تنظیم‌شده از پلتفرم مدیریت دارایی Blockstream (AMP) برای اجرای تطابق با نیاز به امضای مجوز اضافی قبل از انتقال استفاده می‌کنند، در حالی که دارایی‌های تنظیم‌نشده می‌توانند بدون چنین محدودیت‌هایی آزادانه حرکت کنند.
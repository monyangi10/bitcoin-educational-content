question: Liquid의 기본 자산 시스템에서 규제 자산과 비규제 자산의 차이점은 무엇인가요?
answer: 규제 대상 자산은 이동하기 전에 인증 서버의 두 번째 서명이 필요하므로 KYC/AML 규정을 준수할 수 있습니다
wrong_answers:
  - 규제 대상 자산은 스마트 컨트랙트를 사용하는 반면, 비규제 대상 자산은 간단한 RPC 콜을 사용하여 발행합니다
  - 규제 자산은 Bitcoin 준비금으로 뒷받침되는 반면, 비규제 자산은 사이드체인에만 존재합니다
  - 규제 대상 자산은 생성 시 기능적 승인이 필요하지만, 비규제 대상 자산은 허가 없이 발행할 수 있습니다
explanation: |
  Liquid의 아키텍처에서는 규제 자산과 비규제 자산 모두 스마트 콘트랙트 없이 간단한 RPC 호출을 사용하여 허가 없이 발행할 수 있습니다. 규제 대상 자산은 블록스트림의 자산 관리 플랫폼(AMP)을 활용하여 전송 전에 추가 승인 서명을 요구함으로써 규정을 준수하도록 하는 반면, 비규제 자산은 이러한 제한 없이 자유롭게 이동할 수 있다는 점이 가장 큰 차이점입니다.
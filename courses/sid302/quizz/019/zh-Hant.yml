question: 在 Liquid 的本機資產系統中，受監管資產與不受監管資產有什麼區別？
answer: 受監管資產需要授權伺服器的第二個簽章才能移動，以符合 KYC/AML 規範
wrong_answers:
  - 受監管的資產使用智慧型契約，而不受監管的資產則使用簡單的 RPC 撥號發行
  - 受監管的資產由 Bitcoin 儲備支持，而不受監管的資產僅存在於側鏈上
  - 受規範的資產需要職能人員批准才能建立，而不受規範的資產則可以不經許可而發行。
explanation: |
  在 Liquid 的架構中，受監管和不受監管的資產都可以使用簡單的 RPC call 無須智慧合約就能無限制地發行。關鍵差異在於它們的移動：受監管資產利用 Blockstream 的資產管理平台 (AMP) 執行合規性，在轉移前需要額外的授權簽章，而不受監管資產則可以自由移動，不受此類限制。
question: По какво се различават регулираните от нерегулираните активи в системата за местни активи на Liquid?
answer: Регулираните активи изискват втори подпис от сървър за оторизация, преди да бъдат преместени, което позволява спазването на KYC/AML
wrong_answers:
  - Регулираните активи използват интелигентни договори, а нерегулираните - обикновени покани за издаване на RPC
  - Регулираните активи са обезпечени с резерви Bitcoin, докато нерегулираните активи съществуват само в страничната верига
  - За създаването на регулирани активи се изисква одобрение от длъжностно лице, докато нерегулираните активи могат да се издават без разрешение
explanation: |
  В архитектурата на Liquid регулирани и нерегулирани активи могат да се емитират без разрешение, като се използват прости повиквания на RPC без интелигентни договори. Ключовата разлика е в тяхното движение: регулираните активи използват платформата за управление на активи на Blockstream (AMP), за да наложат съответствие, като изискват допълнителен подпис за разрешение преди прехвърляне, докато нерегулираните активи могат да се движат свободно без такива ограничения.
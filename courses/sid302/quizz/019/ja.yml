question: Liquidのネイティブ・アセット・システムにおける規制資産と非規制資産の違いは何ですか？
answer: 規制対象資産は、移動する前に認証サーバーからの2つ目の署名が必要であり、KYC/AMLコンプライアンスを可能にする。
wrong_answers:
  - 規制対象資産はスマートコントラクトを使用し、規制対象外資産はシンプルなRPCコールを使用して発行する。
  - 規制された資産はBitcoinの埋蔵量に裏打ちされ、規制されていない資産はサイドチェーン上にのみ存在する。
  - 規制された資産は、官僚の承認が必要だが、規制されていない資産は無許可で発行できる。
explanation: |
  Liquidのアーキテクチャでは、規制対象資産も規制対象外資産も、スマートコントラクトを使用せずにシンプルなRPCコールを使用して許可なく発行することができます。規制対象アセットはBlockstreamのアセット・マネジメント・プラットフォーム(AMP)を利用し、移転前に追加の承認署名を要求することでコンプライアンスを強化する一方、非規制対象アセットはそのような制限なしに自由に移動できる。
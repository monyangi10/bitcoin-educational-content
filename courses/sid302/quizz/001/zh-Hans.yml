question: 在 Liquid Network 中验证一个区块需要多少个功能签名？
answer: 15 名官员中至少有 11 名必须签字
wrong_answers:
  - 15 名职能人员中至少有 8 名必须签名
  - 15 名职能人员中至少有 10 名必须签字
  - 15 名官员中至少有 12 名必须签字
explanation: |
  Liquid Network 要求 15 个职能部门中至少有 11 个部门的签名来验证一个区块，即三分之二加一的阈值。这一特定要求既能确保达成强有力的共识，又能防止任何小团体控制网络。其他选项都是不正确的：8 个签名对安全来说太少，10 个签名达不到三分之二的门槛，12 个签名对正常运行来说限制太多。
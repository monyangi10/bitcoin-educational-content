question: برای اعتبارسنجی یک بلوک در Liquid Network به چند امضای کارگزار نیاز است؟
answer: حداقل 11 نفر از 15 نفر از مسئولین باید امضا کنند
wrong_answers:
  - حداقل ۸ نفر از ۱۵ کارگزار باید امضا کنند
  - حداقل 10 نفر از 15 کارگزار باید امضا کنند
  - حداقل ۱۲ نفر از ۱۵ کارگزار باید امضا کنند
explanation: |
  Liquid Network نیاز به امضای حداقل 11 نفر از 15 کارگزار دارد تا یک بلوک را معتبر کند، که نشان‌دهنده آستانه دو سوم به علاوه یک است. این الزام خاص اطمینان از اجماع قوی را فراهم می‌کند و از کنترل شبکه توسط یک گروه کوچک جلوگیری می‌کند. گزینه‌های دیگر نادرست هستند: 8 امضا برای امنیت بسیار کم خواهد بود، 10 امضا به آستانه دو سوم نمی‌رسد و 12 امضا برای عملیات عادی به‌طور غیرضروری محدودکننده خواهد بود.
question: ต้องการลายเซ็นของเจ้าหน้าที่กี่คนในการยืนยันบล็อกใน Liquid Network?
answer: อย่างน้อย 11 จาก 15 เจ้าหน้าที่ต้องลงนาม
wrong_answers:
  - อย่างน้อย 8 จาก 15 เจ้าหน้าที่ต้องลงนาม
  - อย่างน้อย 10 จาก 15 เจ้าหน้าที่ต้องลงนาม
  - อย่างน้อย 12 จาก 15 เจ้าหน้าที่ต้องลงนาม
explanation: |
  Liquid Network ต้องการลายเซ็นจากเจ้าหน้าที่อย่างน้อย 11 คนจากทั้งหมด 15 คนเพื่อยืนยันบล็อก ซึ่งแสดงถึงเกณฑ์สองในสามบวกหนึ่ง ข้อกำหนดเฉพาะนี้ช่วยให้มั่นใจถึงฉันทามติที่แข็งแกร่งในขณะที่ป้องกันไม่ให้กลุ่มเล็ก ๆ ควบคุมเครือข่าย ตัวเลือกอื่น ๆ นั้นไม่ถูกต้อง: 8 ลายเซ็นจะน้อยเกินไปสำหรับความปลอดภัย, 10 จะไม่ถึงเกณฑ์สองในสาม, และ 12 จะเป็นข้อจำกัดที่ไม่จำเป็นสำหรับการดำเนินงานปกติ
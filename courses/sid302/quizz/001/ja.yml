question: Liquid Networkで1つのブロックを検証するのに必要なファンクショナリー・シグネチャーの数は？
answer: 15人中少なくとも11人が署名すること
wrong_answers:
  - 15人のファンクショナリーのうち少なくとも8人が署名しなければならない。
  - 15人のファンクショナリーのうち少なくとも10人が署名しなければならない。
  - 15人のファンクショナリーのうち少なくとも12人が署名しなければならない。
explanation: |
  Liquid Networkでは、ブロックを検証するために15人のファンクショナリーのうち少なくとも11人からの署名が必要であり、これは3分の2に1を加えた閾値に相当する。これは、3分の2＋1という閾値に相当する。この特定の要件は、強固なコンセンサスを保証すると同時に、小さなグループによるネットワークの支配を防ぐものである。他の選択肢は正しくない。8人の署名ではセキュリティ上少なすぎるし、10人では3分の2の閾値を満たさない。
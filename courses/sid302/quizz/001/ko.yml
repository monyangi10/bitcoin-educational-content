question: Liquid Network에서 블록의 유효성을 검사하려면 몇 개의 기능 서명이 필요하나요?
answer: 15명 중 최소 11명이 서명해야 합니다
wrong_answers:
  - 15명 중 8명 이상이 서명해야 합니다
  - 15명 중 10명 이상이 서명해야 합니다
  - 15명 중 12명 이상이 서명해야 합니다
explanation: |
  Liquid Network은 블록을 검증하기 위해 15명 중 최소 11명의 서명이 필요하며, 이는 3분의 2에 1을 더한 임계값에 해당합니다. 이 특정 요건은 강력한 합의를 보장하는 동시에 소수의 그룹이 네트워크를 통제하는 것을 방지합니다. 다른 옵션은 보안을 위해 8개 서명은 너무 적고, 10개는 3분의 2 임계값을 충족하지 못하며, 12개는 정상적인 운영을 불필요하게 제한하는 등 올바르지 않습니다.
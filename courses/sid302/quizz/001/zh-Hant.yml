question: 在 Liquid Network 中，驗證一個區塊需要多少個功能簽章？
answer: 15 位功能人員中至少有 11 位必須簽署
wrong_answers:
  - 15 位功能人員中至少有 8 位必須簽署
  - 15 位功能人員中至少有 10 位必須簽署
  - 15 位功能人員中至少有 12 位必須簽署
explanation: |
  Liquid Network 需要 15 位功能人員中至少 11 位的簽名來驗證一個區塊，也就是三分之二加一的門檻。此特定要求可確保強大的共識，同時防止任何小團體控制網路。其他選項都是不正確的：8 個簽名對安全性而言太少，10 個簽名無法達到三分之二的門檻，而 12 個簽名對正常運作而言則是不必要的限制。
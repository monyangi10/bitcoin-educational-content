question: Сколько подписей функционеров требуется для подтверждения блока в Liquid Network?
answer: По меньшей мере 11 из 15 функционеров должны подписать
wrong_answers:
  - Не менее 8 из 15 функционеров должны подписать
  - Не менее 10 из 15 функционеров должны подписать
  - По меньшей мере 12 из 15 функционеров должны подписать
explanation: |
  Liquid Network требует подписей не менее 11 из 15 функционеров для подтверждения блока, что представляет собой порог в две трети плюс один. Это особое требование обеспечивает надежный консенсус, не позволяя небольшой группе контролировать сеть. Остальные варианты неверны: 8 подписей будет слишком мало для безопасности, 10 не будут соответствовать порогу в две трети, а 12 будут излишне ограничивать нормальную работу.
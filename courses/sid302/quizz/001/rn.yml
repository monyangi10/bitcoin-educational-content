question: Ni imikono ingahe y’abakozi isabwa kugira ngo umuntu yemeze ko igice kiri muri Liquid Network?
answer: Nibura abakozi 11 kuri 15 bategerezwa gusinya
wrong_answers:
  - Nibura abakozi 8 kuri 15 bategerezwa gusinya
  - Nibura abakozi 10 kuri 15 bategerezwa gusinya
  - Nibura abakozi 12 kuri 15 bategerezwa gusinya
explanation: |
  Liquid Network isaba imikono y’abakozi 11 muri 15 kugira ngo yemeze igice, kikaba kigereranya ibice bibiri vya gatatu hamwe n’urugero rumwe. Ico gisabwa kidasanzwe kiratuma habaho ukwiyumvikana gukomeye mu gihe kibuza umugwi mutoyi uwo ari wo wose kugenzura urubuga. Ayandi mahitamwo ntabwo ari meza: imikono 8 yoba ari mike cane ku bijanye n’umutekano, 10 ntiyoshika ku rugero rw’ibice bibiri vya gatatu, kandi 12 yoba ari uburenganzira budakenewe ku bikorwa bisanzwe.
question: Liquid Network में किसी ब्लॉक को मान्य करने के लिए कितने पदाधिकारी हस्ताक्षरों की आवश्यकता होती है?
answer: 15 पदाधिकारियों में से कम से कम 11 को हस्ताक्षर करने होंगे
wrong_answers:
  - 15 पदाधिकारियों में से कम से कम 8 के हस्ताक्षर आवश्यक हैं।
  - 15 पदाधिकारियों में से कम से कम 10 को हस्ताक्षर करने होंगे।
  - 15 पदाधिकारियों में से कम से कम 12 को हस्ताक्षर करने होंगे।
explanation: |
  Liquid Network के अनुसार, किसी ब्लॉक को मान्य करने के लिए 15 पदाधिकारियों में से कम से कम 11 के हस्ताक्षर आवश्यक हैं, जो दो-तिहाई से अधिक की सीमा को दर्शाता है। यह विशेष आवश्यकता मजबूत सहमति सुनिश्चित करती है और साथ ही किसी भी छोटे समूह को नेटवर्क को नियंत्रित करने से रोकती है। अन्य विकल्प गलत हैं: सुरक्षा के लिए 8 हस्ताक्षर बहुत कम होंगे, 10 हस्ताक्षर दो-तिहाई की सीमा को पूरा नहीं करेंगे, और 12 हस्ताक्षर सामान्य संचालन के लिए अनावश्यक रूप से प्रतिबंधात्मक होंगे।
question: Колко подписа на служители са необходими за валидиране на блок в Liquid Network?
answer: Най-малко 11 от 15-те служители трябва да подпишат
wrong_answers:
  - Най-малко 8 от 15-те служители трябва да подпишат
  - Най-малко 10 от 15-те служители трябва да подпишат
  - Най-малко 12 от 15-те служители трябва да подпишат
explanation: |
  Liquid Network изисква подписите на поне 11 от 15-те функционери, за да се утвърди даден блок, което представлява праг от две трети плюс една. Това специфично изискване осигурява стабилен консенсус, като същевременно не позволява на никоя малка група да контролира мрежата. Другите варианти са неправилни: 8 подписа биха били твърде малко за сигурността, 10 не биха достигнали прага от две трети, а 12 биха били ненужно рестриктивни за нормалните операции.
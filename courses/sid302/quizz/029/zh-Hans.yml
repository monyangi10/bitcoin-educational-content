question: 与标准的 Liquid Network 交易相比，投资者在参与 Blockstream AMP 资产生态系统时必须接受哪些基本权衡？
answer: 尽管对其他用户保持隐私，但资产发行人仍可完全看到其持有的资产和交易历史记录
wrong_answers:
  - 共同签署授权机制需要额外的计算开销，因此交易费用较高
  - 交易速度降低，因为所有转账在确认前都必须通过中央合规服务器进行验证
  - 资产可转移性有限，因为 AMP 代币只能发送到同一监管辖区内预先批准的钱包中
explanation: |
  正确答案指出了 AMP 的核心隐私权衡：在 Confidential Transactions 维护用户间隐私的同时，AMP 资产允许发行人完全了解 unblinded 以符合监管要求。错误答案描述的是操作限制（费用、速度、可转让性），而不是 AMP 区别于标准 Liquid 完全保密模式的基本透明度折衷。
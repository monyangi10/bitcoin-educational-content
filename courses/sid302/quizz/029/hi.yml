question: मानक Liquid Network लेनदेन की तुलना में ब्लॉकस्ट्रीम एएमपी परिसंपत्ति पारिस्थितिकी तंत्र में भाग लेने पर निवेशकों को किस मूलभूत समझौते को स्वीकार करना होगा?
answer: अन्य उपयोगकर्ताओं से गोपनीयता बनाए रखते हुए भी, परिसंपत्ति जारीकर्ता को उनकी होल्डिंग्स और लेनदेन इतिहास की पूरी जानकारी उपलब्ध होती है।
wrong_answers:
  - सह-हस्ताक्षर प्राधिकरण तंत्रों के लिए आवश्यक अतिरिक्त गणनात्मक लागत के कारण लेनदेन शुल्क अधिक होता है।
  - सभी हस्तांतरणों की पुष्टि से पहले केंद्रीकृत अनुपालन सर्वरों के माध्यम से सत्यापन किए जाने के कारण लेनदेन की गति धीमी हो जाती है।
  - एएमपी टोकन की हस्तांतरणीयता सीमित है क्योंकि इन्हें केवल उसी नियामक क्षेत्राधिकार के भीतर पूर्व-अनुमोदित वॉलेट में ही भेजा जा सकता है।
explanation: |
  सही उत्तर AMP की मूल गोपनीयता संबंधी दुविधा को दर्शाता है: Confidential Transactions उपयोगकर्ता-से-उपयोगकर्ता गोपनीयता बनाए रखता है, जबकि AMP परिसंपत्तियाँ जारीकर्ताओं को नियामक अनुपालन के लिए unblinded की पूर्ण दृश्यता प्रदान करती हैं। गलत उत्तर परिचालन संबंधी बाधाओं (शुल्क, गति, हस्तांतरणीयता) का वर्णन करते हैं, न कि उस मूलभूत पारदर्शिता संबंधी समझौते का जो AMP को मानक Liquid के पूर्णतः गोपनीय मॉडल से अलग करता है।
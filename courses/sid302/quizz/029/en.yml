question: What fundamental trade-off must investors accept when participating in Blockstream AMP asset ecosystems compared to standard Liquid Network transactions?
answer: Complete visibility of their holdings and transaction history to the asset issuer despite maintaining privacy from other users
wrong_answers:
  - Higher transaction fees due to the additional computational overhead required for co-signing authorization mechanisms
  - Reduced transaction speed because all transfers must be validated through centralized compliance servers before confirmation
  - Limited asset transferability since AMP tokens can only be sent to pre-approved wallets within the same regulatory jurisdiction
explanation: |
  The correct answer identifies AMP's core privacy trade-off: while Confidential Transactions maintain user-to-user privacy, AMP assets allow issuers complete unblinded visibility for regulatory compliance. The wrong answers describe operational constraints (fees, speed, transferability) rather than the fundamental transparency compromise that distinguishes AMP from standard Liquid's fully confidential model.

question: นักลงทุนต้องยอมรับการแลกเปลี่ยนพื้นฐานอะไรเมื่อเข้าร่วมในระบบนิเวศสินทรัพย์ Blockstream AMP เมื่อเทียบกับธุรกรรมมาตรฐาน Liquid Network?
answer: การมองเห็นที่สมบูรณ์ของการถือครองและประวัติการทำธุรกรรมของพวกเขาต่อผู้ออกสินทรัพย์แม้จะรักษาความเป็นส่วนตัวจากผู้ใช้อื่น
wrong_answers:
  - ค่าธรรมเนียมการทำธุรกรรมที่สูงขึ้นเนื่องจากภาระการคำนวณเพิ่มเติมที่จำเป็นสำหรับกลไกการอนุมัติร่วมลงนาม
  - ความเร็วในการทำธุรกรรมลดลงเนื่องจากการโอนทั้งหมดต้องได้รับการตรวจสอบผ่านเซิร์ฟเวอร์การปฏิบัติตามข้อกำหนดแบบรวมศูนย์ก่อนการยืนยัน
  - การโอนสินทรัพย์ที่จำกัดเนื่องจากโทเค็น AMP สามารถส่งได้เฉพาะไปยังวอลเล็ตที่ได้รับการอนุมัติล่วงหน้าในเขตอำนาจศาลเดียวกันเท่านั้น
explanation: |
  คำตอบที่ถูกต้องระบุถึงการแลกเปลี่ยนความเป็นส่วนตัวหลักของ AMP: ในขณะที่ Confidential Transactions รักษาความเป็นส่วนตัวระหว่างผู้ใช้กับผู้ใช้ ทรัพย์สินของ AMP อนุญาตให้ผู้ออกมีความสามารถในการมองเห็น unblinded อย่างสมบูรณ์เพื่อให้เป็นไปตามข้อกำหนดด้านกฎระเบียบ คำตอบที่ผิดอธิบายถึงข้อจำกัดในการดำเนินงาน (ค่าธรรมเนียม, ความเร็ว, การโอนย้าย) แทนที่จะเป็นการประนีประนอมด้านความโปร่งใสพื้นฐานที่ทำให้ AMP แตกต่างจากโมเดล Liquid ที่เป็นความลับอย่างสมบูรณ์แบบมาตรฐาน
question: سرمایه‌گذاران هنگام مشارکت در اکوسیستم‌های دارایی Blockstream AMP در مقایسه با تراکنش‌های استاندارد Liquid Network باید چه مبادله بنیادی را بپذیرند؟
answer: قابلیت مشاهده کامل دارایی‌ها و تاریخچه تراکنش‌ها برای صادرکننده دارایی، در حالی که حریم خصوصی از سایر کاربران حفظ می‌شود.
wrong_answers:
  - هزینه‌های تراکنش بالاتر به دلیل سربار محاسباتی اضافی مورد نیاز برای مکانیزم‌های مجوز امضای مشترک
  - کاهش سرعت تراکنش به دلیل اینکه تمام انتقال‌ها باید قبل از تأیید از طریق سرورهای متمرکز تطابق‌پذیری اعتبارسنجی شوند
  - انتقال محدود دارایی از آنجا که توکن‌های AMP فقط می‌توانند به کیف‌پول‌های از پیش تأیید شده در همان حوزه قضایی ارسال شوند.
explanation: |
  پاسخ صحیح، مبادله اصلی حریم خصوصی AMP را شناسایی می‌کند: در حالی که Confidential Transactions حریم خصوصی کاربر به کاربر را حفظ می‌کند، دارایی‌های AMP به صادرکنندگان امکان دید کامل unblinded را برای رعایت مقررات می‌دهد. پاسخ‌های نادرست محدودیت‌های عملیاتی (هزینه‌ها، سرعت، قابلیت انتقال) را توصیف می‌کنند، نه سازش اساسی شفافیت که AMP را از مدل کاملاً محرمانه استاندارد Liquid متمایز می‌کند.
question: Какъв фундаментален компромис трябва да приемат инвеститорите, когато участват в екосистемите за активи Blockstream AMP, в сравнение със стандартните транзакции Liquid Network?
answer: Пълна видимост на притежаваните от тях активи и историята на транзакциите към емитента на активите, въпреки че запазват неприкосновеността на личния си живот от други потребители
wrong_answers:
  - По-високи такси за транзакции поради допълнителните изчислителни разходи, необходими за механизмите за оторизация на съвместното подписване
  - Намалена скорост на транзакциите, тъй като всички трансфери трябва да бъдат валидирани чрез централизирани сървъри за съответствие преди потвърждаване
  - Ограничена възможност за прехвърляне на активи, тъй като AMP токените могат да се изпращат само до предварително одобрени портфейли в рамките на същата регулаторна юрисдикция
explanation: |
  Правилният отговор идентифицира основния компромис на AMP по отношение на поверителността: докато Confidential Transactions запазва поверителността между потребителите, активите на AMP позволяват на издателите пълна видимост на unblinded за спазване на нормативните изисквания. Неправилните отговори описват оперативните ограничения (такси, скорост, възможност за прехвърляне), а не фундаменталния компромис с прозрачността, който отличава AMP от напълно поверителния модел на стандартния Liquid.
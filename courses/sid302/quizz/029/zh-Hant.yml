question: 與標準的 Liquid Network 交易相比，投資人在參與 Blockstream AMP 資產生態系統時，必須接受哪些基本的取捨？
answer: 儘管對其他使用者保持隱私，但對資產發行商而言，他們持有的資產和交易歷史完全可見
wrong_answers:
  - 由於共同簽署授權機制需要額外的計算開銷，因此交易費用較高
  - 交易速度降低，因為所有轉帳都必須在確認前透過中央合規伺服器進行驗證
  - 有限的資產轉移能力，因為 AMP 代幣只能傳送到同一監管管轄區內預先核准的錢包中
explanation: |
  正確答案指出 AMP 的核心隱私權權衡：在 Confidential Transactions 保護使用者對使用者隱私權的同時，AMP 資產可讓發行商完全瞭解 unblinded，以符合法規。錯誤答案描述的是操作限制 (費用、速度、可轉移性)，而非 AMP 有別於標準 Liquid 完全保密模式的基本透明度折衷。
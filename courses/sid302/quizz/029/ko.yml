question: 투자자가 블록스트림 AMP 자산 생태계에 참여할 때 표준 Liquid Network 거래와 비교하여 어떤 근본적인 절충안을 받아들여야 하나요?
answer: 다른 사용자로부터 프라이버시를 유지하면서도 자산 발행자에게 보유 자산과 거래 내역을 완벽하게 공개합니다
wrong_answers:
  - 공동 서명 인증 메커니즘에 필요한 추가 계산 오버헤드로 인해 거래 수수료가 높아집니다
  - 모든 전송은 확인 전에 중앙 집중식 규정 준수 서버를 통해 검증되어야 하므로 트랜잭션 속도 감소
  - AMP 토큰은 동일한 규제 관할권 내에서 사전 승인된 지갑으로만 전송할 수 있으므로 자산 전송이 제한됩니다
explanation: |
  정답은 AMP의 핵심 프라이버시 절충안을 설명합니다: Confidential Transactions은 사용자 간 프라이버시를 유지하는 반면, AMP 자산은 발행자가 규제 준수를 위해 완전한 unblinded 가시성을 확보할 수 있도록 합니다. 오답은 AMP를 표준 Liquid의 완전 기밀 모델과 구별하는 근본적인 투명성 타협이 아닌 운영상의 제약(수수료, 속도, 전송 가능성)을 설명합니다.
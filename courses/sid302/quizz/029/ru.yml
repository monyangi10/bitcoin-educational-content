question: На какой фундаментальный компромисс должны пойти инвесторы, участвуя в экосистемах активов Blockstream AMP по сравнению со стандартными транзакциями Liquid Network?
answer: Полная видимость их владения и истории операций для эмитента активов, несмотря на сохранение конфиденциальности от других пользователей
wrong_answers:
  - Более высокие комиссии за транзакции из-за дополнительных вычислительных затрат, необходимых для механизмов совместной авторизации
  - Снижение скорости транзакций, поскольку все переводы перед подтверждением должны пройти проверку на централизованных серверах соответствия нормативным требованиям
  - Ограниченная возможность передачи активов, поскольку токены AMP могут быть отправлены только на предварительно одобренные кошельки в пределах одной регуляторной юрисдикции
explanation: |
  Правильный ответ определяет основной компромисс между приватностью AMP: в то время как Confidential Transactions сохраняют приватность от пользователя к пользователю, активы AMP позволяют эмитентам получить полную видимость unblinded для соблюдения нормативных требований. Неправильные ответы описывают операционные ограничения (плата, скорость, возможность передачи), а не фундаментальный компромисс прозрачности, который отличает AMP от стандартной полностью конфиденциальной модели Liquid.
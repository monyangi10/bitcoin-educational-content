question: ブロックストリームのAMPアセット・エコシステムに参加する際、投資家は標準的なLiquid Network取引と比較して、どのような基本的トレードオフを受け入れなければならないのか？
answer: 他のユーザーからのプライバシーを保ちつつも、保有資産と取引履歴を資産発行会社に完全に可視化する。
wrong_answers:
  - 共同署名承認メカニズムに必要な計算オーバーヘッドが追加されるため、取引手数料が高くなる。
  - すべての送金は、確認前に集中管理されたコンプライアンス・サーバーで検証される必要があるため、トランザクション速度が低下。
  - AMPトークンは、同じ規制管轄内の事前承認されたウォレットにのみ送信できるため、資産の移転可能性は限定的である。
explanation: |
  正しい答えは、AMPの中核となるプライバシーのトレードオフを特定するものである。Confidential Transactionsがユーザー間のプライバシーを維持する一方で、AMPの資産は規制遵守のために発行者にunblindedの完全な可視性を提供する。誤答は、AMPを標準的なLiquidの完全機密モデルと区別する基本的な透明性の妥協点ではなく、運用上の制約（手数料、スピード、移転可能性）について述べている。
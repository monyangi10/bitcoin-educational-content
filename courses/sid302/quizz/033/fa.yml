question: محدودیت اساسی قابلیت‌های تراکنش SDK Breez Liquid که آن را از یک نود کامل Lightning Network متمایز می‌کند چیست؟
answer: نمی‌تواند تراکنش‌های مستقیم Lightning-to-Lightning یا Bitcoin-to-Bitcoin را انجام دهد زیرا به‌طور انحصاری با Liquid به‌عنوان پایگاه اصلی خود عمل می‌کند.
wrong_answers:
  - نمی‌تواند مبادلات اتمی بین شبکه‌های بلاکچین مختلف را به دلیل عدم پشتیبانی از قراردادهای هوشمند بین زنجیره‌ای انجام دهد.
  - "به دلیل محدودیت‌های اندازه تراکنش داخلی Liquid Network، نمی‌تواند تراکنش‌هایی بزرگ‌تر از 0.1 BTC را پردازش کند"
  - نمی‌تواند بدون اتصال به اینترنت کار کند زیرا نیاز به همگام‌سازی مداوم با سرورهای متمرکز Breez دارد.
explanation: |
  SDK به‌طور صریح به‌عنوان 'ابزاری کاملاً متمرکز بر Liquid' توصیف شده است که با Liquid به‌عنوان 'پایگاه اصلی' خود عمل می‌کند. این ابزار تنها از سه عملیات خاص پشتیبانی می‌کند: Liquid-to-Liquid، Liquid-to-Lightning و Liquid-to-Bitcoin. برخلاف یک نود کامل Lightning که می‌تواند پرداخت‌ها را بین کانال‌های Lightning مسیریابی کند، SDK Breez نمی‌تواند تراکنش‌های مستقیم Lightning-to-Lightning را انجام دهد، که این امر آن را به‌طور اساسی از زیرساخت‌های سنتی Lightning متمایز می‌کند.
question: Breez Liquid SDKのトランザクション機能の基本的な制限で、Lightning Networkノードと異なる点は何ですか？
answer: Liquidをホームベースとするため、Lightning同士の直接取引やBitcoin同士の取引はできない。
wrong_answers:
  - クロスチェーンのスマート・コントラクトがサポートされていないため、異なるブロックチェーン・ネットワーク間のアトミック・スワップを扱うことができない。
  - 「Liquid Networkに内蔵されたトランザクションサイズの制限により、0.1BTCを超えるトランザクションは処理できない。
  - 集中管理されたBreezサーバーと常に同期する必要があるため、インターネット接続なしでは動作しない。
explanation: |
  SDKは、Liquidを「ホームベース」として動作する「厳密にLiquid中心のツール」と明示されている。このSDKは、3つの特定の操作のみをサポートする：LiquidからLiquid、Liquidからライトニング、LiquidからBitcoinです。ライトニング・チャネル間で決済をルーティングできる完全なライトニング・ノードとは異なり、Breez SDKはライトニングからライトニングへの直接トランザクションを実行できないため、従来のライトニング・インフラストラクチャとは根本的に異なる。
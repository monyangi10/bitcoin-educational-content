question: ข้อจำกัดพื้นฐานของความสามารถในการทำธุรกรรมของ Breez Liquid SDK ที่ทำให้แตกต่างจากโหนด Lightning Network เต็มรูปแบบคืออะไร?
answer: ไม่สามารถทำธุรกรรมแบบ Lightning-to-Lightning หรือ Bitcoin-to-Bitcoin ได้โดยตรงเนื่องจากทำงานร่วมกับ Liquid เป็นฐานหลักเท่านั้น
wrong_answers:
  - ไม่สามารถจัดการการแลกเปลี่ยนอะตอมระหว่างเครือข่ายบล็อกเชนที่แตกต่างกันได้เนื่องจากขาดการสนับสนุนสัญญาอัจฉริยะข้ามเครือข่าย
  - "ไม่สามารถดำเนินการธุรกรรมที่มีขนาดใหญ่กว่า 0.1 BTC ได้เนื่องจากข้อจำกัดขนาดธุรกรรมที่ติดตั้งในตัวของ Liquid Network"
  - ไม่สามารถทำงานได้หากไม่มีการเชื่อมต่ออินเทอร์เน็ตเนื่องจากต้องการการซิงโครไนซ์อย่างต่อเนื่องกับเซิร์ฟเวอร์ Breez ส่วนกลาง
explanation: |
  SDK ได้รับการอธิบายอย่างชัดเจนว่าเป็น 'เครื่องมือที่เน้น Liquid อย่างเคร่งครัด' ซึ่งทำงานร่วมกับ Liquid เป็น 'ฐานหลัก' รองรับเฉพาะสามการดำเนินการเฉพาะ: Liquid-to-Liquid, Liquid-to-Lightning และ Liquid-to-Bitcoin แตกต่างจากโหนด Lightning เต็มรูปแบบที่สามารถส่งผ่านการชำระเงินระหว่างช่องทาง Lightning ได้ SDK ของ Breez ไม่สามารถทำธุรกรรม Lightning-to-Lightning โดยตรงได้ ทำให้แตกต่างอย่างพื้นฐานจากโครงสร้างพื้นฐาน Lightning แบบดั้งเดิม
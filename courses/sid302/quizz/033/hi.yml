question: Breez Liquid SDK की लेनदेन क्षमताओं की वह मूलभूत सीमा क्या है जो इसे पूर्ण Lightning Network नोड से अलग करती है?
answer: यह लाइटनिंग से लाइटनिंग या Bitcoin से Bitcoin के बीच सीधे लेनदेन नहीं कर सकता क्योंकि यह पूरी तरह से Liquid को अपने मुख्य केंद्र के रूप में उपयोग करता है।
wrong_answers:
  - क्रॉस-चेन स्मार्ट कॉन्ट्रैक्ट सपोर्ट की कमी के कारण यह विभिन्न ब्लॉकचेन नेटवर्क के बीच एटॉमिक स्वैप को हैंडल नहीं कर सकता है।
  - "Liquid Network में अंतर्निहित लेनदेन आकार सीमाओं के कारण यह 0.1 BTC से बड़े लेनदेन को संसाधित नहीं कर सकता है।"
  - यह इंटरनेट कनेक्टिविटी के बिना काम नहीं कर सकता क्योंकि इसे केंद्रीकृत Breez सर्वरों के साथ निरंतर सिंक्रनाइज़ेशन की आवश्यकता होती है।
explanation: |
  SDK को स्पष्ट रूप से 'सख्ती से Liquid-केंद्रित उपकरण' के रूप में वर्णित किया गया है जो Liquid को अपने 'होम बेस' के रूप में उपयोग करता है। यह केवल तीन विशिष्ट कार्यों का समर्थन करता है: Liquid से Liquid, Liquid से लाइटनिंग और Liquid से Bitcoin। एक पूर्ण लाइटनिंग नोड के विपरीत जो लाइटनिंग चैनलों के बीच भुगतान को रूट कर सकता है, Breez SDK सीधे लाइटनिंग-से-लाइटनिंग लेनदेन नहीं कर सकता है, जो इसे पारंपरिक लाइटनिंग इन्फ्रास्ट्रक्चर से मौलिक रूप से भिन्न बनाता है।
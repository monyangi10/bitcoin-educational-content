question: В чем заключается фундаментальное ограничение транзакционных возможностей Breez Liquid SDK, которое отличает его от полноценного узла Lightning Network?
answer: Он не может осуществлять прямые сделки между Молнией и Молнией или между Bitcoin и Bitcoin, поскольку работает исключительно с Liquid в качестве своей домашней базы
wrong_answers:
  - Он не может обрабатывать атомарные свопы между различными сетями блокчейна из-за отсутствия поддержки межцепочечных смарт-контрактов
  - "Он не может обрабатывать транзакции размером более 0,1 BTC из-за встроенных в Liquid Network ограничений на размер транзакции"
  - Он не может работать без подключения к Интернету, поскольку требует постоянной синхронизации с централизованными серверами Breez
explanation: |
  SDK явно описывается как "строго ориентированный на Liquid инструмент", который работает с Liquid в качестве "домашней базы" Он поддерживает только три специфические операции: Liquid-to-Liquid, Liquid-to-Lightning и Liquid-to-Bitcoin. В отличие от полноценного узла Lightning, который может маршрутизировать платежи между каналами Lightning, Breez SDK не может выполнять прямые транзакции Lightning-to-Lightning, что делает его принципиально отличным от традиционной инфраструктуры Lightning.
question: Кое е основното ограничение на възможностите за транзакции на Breez Liquid SDK, което го отличава от пълен възел Lightning Network?
answer: Той не може да извършва преки транзакции от Lightning към Lightning или от Bitcoin към Bitcoin, тъй като работи изключително с Liquid като своя начална база
wrong_answers:
  - Той не може да се справи с атомни суапове между различни блокчейн мрежи поради липсата на поддръжка на интелигентни договори между вериги
  - "Той не може да обработва транзакции, по-големи от 0,1 BTC, поради вградените в Liquid Network ограничения за размера на транзакциите"
  - Тя не може да работи без връзка с интернет, тъй като изисква постоянна синхронизация с централизираните сървъри Breez
explanation: |
  SDK е изрично описан като "строго Liquid-ориентиран инструмент", който работи с Liquid като своя "домашна база" Той поддържа само три специфични операции: Liquid-към-Liquid, Liquid-към-Lightning и Liquid-към-Bitcoin. За разлика от пълноценния възел на Lightning, който може да маршрутизира плащания между каналите на Lightning, Breez SDK не може да извършва директни транзакции от Lightning към Lightning, което го прави коренно различен от традиционната инфраструктура на Lightning.
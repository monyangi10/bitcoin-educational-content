question: Taprootが有効なHTLCにおいて、両者が協力してクロスレイヤースワップを完了させることに合意した場合、何が起こるのか？
answer: MuSig2を通じて集約された公開鍵を使って共同署名し、標準的な単一署名による支払いと見分けがつかないトランザクションを作成する。
wrong_answers:
  - 彼らは、ネットワーク検証のために、ハッシュとタイムロックon-chainを含む完全なスクリプトを公開する必要があります。
  - 必要な特定のMerkleツリーブランチのみを公開し、集約されたキーはオブザーバーから隠します。
  - 各レイヤーで別々のトランザクションを同時にブロードキャストし、鍵の集約なしにアトミックな決済を保証する。
explanation: |
  Taprootにおける協調的な「キーパス」によって、当事者はMuSig2を使ってそれぞれの鍵を1つの集約された公開鍵にまとめることができる。両者が合意すれば、ブロックチェーン上の標準的な支払いと同じように見える取引に共同署名するだけである。これにより、スクリプトロジックが明らかにされず、最小限のブロックスペースしか消費されないため、最大限のプライバシーと効率が得られる。他の選択肢は、レガシーなHTLCの動作や敵対的なスクリプトパスのシナリオを誤って記述している。
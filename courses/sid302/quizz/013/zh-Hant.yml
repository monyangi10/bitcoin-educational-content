question: 在啟用 Taproot 的 HTLC 中，當雙方合作同意完成跨層交換時會發生什麼情況？
answer: 他們透過 MuSig2 使用各自的彙總公開金鑰共同簽署，建立與標準單一簽署付款無異的交易。
wrong_answers:
  - 他們必須揭露包含哈希值和時間鎖的完整腳本 on-chain 以進行網路驗證
  - 他們只發佈所需的特定 Merkle 樹分支，同時對觀察者隱藏彙總金鑰。
  - 它們在每一層同時廣播獨立的交易，以確保原子結算，而無需金鑰彙集
explanation: |
  Taproot 中的合作「金鑰路徑」允許各方使用 MuSig2 將其金鑰合併為單一的聚合公開金鑰。當雙方同意時，他們只需共同簽署交易，這與區塊鏈上的任何標準付款完全相同。這提供了最大的隱私和效率，因為沒有任何腳本邏輯會被揭露，消耗最小的區塊空間。其他選項不正確地描述了傳統的 HTLC 行為或敵對腳本路徑情境。
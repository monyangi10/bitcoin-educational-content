question: Что происходит в Taproot с поддержкой HTLC, когда обе стороны совместно соглашаются завершить обмен между уровнями?
answer: Они совместно подписывают свои агрегированные открытые ключи через MuSig2, создавая транзакцию, неотличимую от стандартного платежа с одной подписью
wrong_answers:
  - Они должны раскрыть полный скрипт, содержащий хэш и временные замки on-chain для проверки сети
  - Они публикуют только конкретную ветвь дерева Меркле, а агрегированный ключ скрывают от наблюдателей
  - Они транслируют отдельные транзакции на каждом уровне одновременно, чтобы обеспечить атомарные расчеты без агрегирования ключей
explanation: |
  Кооперативный "путь к ключу" в Taproot позволяет сторонам объединить свои ключи в единый агрегированный открытый ключ с помощью MuSig2. Если оба согласны, они просто подписывают транзакцию, которая выглядит идентично любому стандартному платежу в блокчейне. Это обеспечивает максимальную конфиденциальность и эффективность, поскольку не раскрывается логика сценария, занимая минимум места в блоке. Другие варианты неверно описывают либо унаследованное поведение HTLC, либо сценарий враждебного пути скрипта.
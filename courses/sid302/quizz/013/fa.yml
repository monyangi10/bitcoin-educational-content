question: در یک Taproot فعال شده HTLC، چه اتفاقی می‌افتد وقتی هر دو طرف به صورت تعاونی توافق می‌کنند تا تبادل بین لایه‌ای را کامل کنند؟
answer: آن‌ها با استفاده از کلید عمومی تجمیع‌شده خود از طریق MuSig2 هم‌امضا می‌کنند و تراکنشی ایجاد می‌کنند که از یک پرداخت استاندارد با امضای واحد قابل تشخیص نیست.
wrong_answers:
  - آنها باید فیلمنامه کامل حاوی هش و قفل‌های زمانی on-chain را برای تأیید شبکه فاش کنند.
  - آن‌ها فقط شاخه خاص درخت مرکل مورد نیاز را منتشر می‌کنند در حالی که کلید تجمیع‌شده را از دید ناظران پنهان نگه می‌دارند.
  - آن‌ها تراکنش‌های جداگانه‌ای را به‌طور همزمان در هر لایه پخش می‌کنند تا تسویه اتمی بدون تجمیع کلید را تضمین کنند.
explanation: |
  مسیر کلید تعاونی در Taproot به طرفین اجازه می‌دهد تا کلیدهای خود را با استفاده از MuSig2 به یک کلید عمومی تجمیع شده تبدیل کنند. هنگامی که هر دو موافقت می‌کنند، به سادگی تراکنش را هم‌امضا می‌کنند که به صورت یک پرداخت استاندارد در بلاکچین ظاهر می‌شود. این امر حداکثر حریم خصوصی و کارایی را فراهم می‌کند زیرا هیچ منطق اسکریپتی فاش نمی‌شود و فضای بلاک حداقلی مصرف می‌شود. گزینه‌های دیگر به اشتباه رفتار قدیمی HTLC یا سناریوی مسیر اسکریپت خصمانه را توصیف می‌کنند.
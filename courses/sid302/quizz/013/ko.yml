question: Taproot 지원 HTLC에서 양 당사자가 교차 레이어 스왑을 완료하는 데 협력하면 어떻게 되나요?
answer: 이들은 MuSig2를 통해 통합된 공개 키를 사용하여 공동 서명하여 표준 단일 서명 결제와 구별할 수 없는 거래를 생성합니다
wrong_answers:
  - 네트워크 확인을 위해 해시 및 시간 잠금 on-chain가 포함된 전체 스크립트를 공개해야 합니다
  - 관찰자에게는 집계된 키를 숨긴 채 필요한 특정 머클 트리 분기만 게시합니다
  - 키 집계 없이 원자 결제를 보장하기 위해 각 레이어에서 동시에 별도의 트랜잭션을 브로드캐스트합니다
explanation: |
  Taproot의 협력적 "키 경로"를 통해 당사자들은 MuSig2를 사용하여 키를 하나의 통합된 공개 키로 결합할 수 있습니다. 두 사람이 모두 동의하면 거래에 공동 서명하기만 하면 되며, 이는 블록체인의 모든 표준 결제와 동일하게 보입니다. 이는 스크립트 로직이 드러나지 않고 최소한의 블록 공간을 차지하므로 개인정보 보호와 효율성을 극대화합니다. 다른 옵션은 레거시 HTLC 동작 또는 적대적 스크립트 경로 시나리오를 잘못 설명합니다.
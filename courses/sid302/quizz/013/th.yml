question: ใน Taproot ที่เปิดใช้งาน HTLC จะเกิดอะไรขึ้นเมื่อทั้งสองฝ่ายตกลงร่วมกันที่จะทำการสลับข้ามเลเยอร์ให้เสร็จสิ้น?
answer: พวกเขาร่วมลงนามโดยใช้กุญแจสาธารณะที่รวมกันผ่าน MuSig2 สร้างธุรกรรมที่ไม่สามารถแยกแยะได้จากการชำระเงินด้วยลายเซ็นเดียวมาตรฐาน
wrong_answers:
  - พวกเขาต้องเปิดเผยสคริปต์ทั้งหมดที่มีแฮชและล็อคเวลา on-chain สำหรับการตรวจสอบเครือข่าย
  - พวกเขาเผยแพร่เฉพาะสาขาของต้นไม้ Merkle ที่จำเป็นในขณะที่ซ่อนคีย์ที่รวมไว้จากผู้สังเกตการณ์
  - พวกเขาออกอากาศธุรกรรมแยกกันในแต่ละเลเยอร์พร้อมกันเพื่อให้แน่ใจว่าการชำระบัญชีเป็นอะตอมโดยไม่ต้องรวมคีย์
explanation: |
  "key path" ที่ทำงานร่วมกันใน Taproot ช่วยให้ฝ่ายต่างๆ รวมคีย์ของพวกเขาเป็นคีย์สาธารณะรวมเดียวโดยใช้ MuSig2 เมื่อทั้งสองฝ่ายเห็นพ้องต้องกัน พวกเขาก็เพียงแค่ร่วมลงนามในธุรกรรม ซึ่งจะปรากฏเหมือนกับการชำระเงินมาตรฐานใดๆ บนบล็อกเชน สิ่งนี้ให้ความเป็นส่วนตัวและประสิทธิภาพสูงสุดเนื่องจากไม่มีการเปิดเผยตรรกะของสคริปต์ ใช้พื้นที่บล็อกน้อยที่สุด ตัวเลือกอื่นๆ อธิบายพฤติกรรม HTLC แบบเก่าหรือสถานการณ์เส้นทางสคริปต์ที่เป็นปฏิปักษ์อย่างไม่ถูกต้อง
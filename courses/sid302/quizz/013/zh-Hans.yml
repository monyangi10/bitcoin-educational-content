question: 在启用了 Taproot 的 HTLC 中，如果双方合作同意完成跨层交换，会发生什么情况？
answer: 他们通过 MuSig2 使用各自的聚合公开密钥共同签名，创建的交易与标准的单一签名支付无异
wrong_answers:
  - 他们必须披露包含哈希值和时间锁 on-chain 的完整脚本，以便进行网络验证
  - 它们只公布所需的特定梅克尔树分支，同时对观察者隐藏聚合密钥
  - 它们在每一层同时广播单独的交易，以确保原子结算，而无需密钥聚合
explanation: |
  Taproot 中的合作 "密钥路径 "允许各方使用 MuSig2 将其密钥合并为一个单一的聚合公钥。当双方都同意时，他们只需共同签署交易，这看起来与区块链上的任何标准支付都是一样的。由于不会泄露脚本逻辑，只需占用极少的区块空间，因此能最大限度地保护隐私和提高效率。其他选项错误地描述了传统的 HTLC 行为或对抗脚本路径场景。
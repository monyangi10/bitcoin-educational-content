question: Какво се случва, когато двете страни се съгласят съвместно да извършат размяна между слоевете в HTLC с активиран Taproot?
answer: Те се подписват съвместно, като използват своя обобщен публичен ключ чрез MuSig2, създавайки транзакция, която е неразличима от стандартно плащане с един подпис
wrong_answers:
  - Те трябва да разкрият пълния скрипт, съдържащ хеш и времеви ключалки on-chain за проверка на мрежата
  - Те публикуват само необходимия конкретен клон на дървото на Меркъл, като запазват обобщения ключ скрит за наблюдателите
  - Те излъчват отделни транзакции на всеки слой едновременно, за да осигурят атомен сетълмент без агрегиране на ключове
explanation: |
  Кооперативният "път на ключа" в Taproot позволява на страните да комбинират своите ключове в един обобщен публичен ключ, използвайки MuSig2. Когато и двамата са съгласни, те просто подписват съвместно транзакцията, която изглежда идентична с всяко стандартно плащане в блокчейна. Това осигурява максимална неприкосновеност на личния живот и ефективност, тъй като не се разкрива логиката на скрипта, като се изразходва минимално блоково пространство. Другите варианти некоректно описват или наследеното поведение на HTLC, или сценария на недоброжелателен скриптов път.
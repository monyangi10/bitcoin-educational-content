question: Taproot-सक्षम HTLC में, क्या होता है जब दोनों पक्ष सहयोगात्मक रूप से क्रॉस-लेयर स्वैप को पूरा करने के लिए सहमत होते हैं?
answer: वे MuSig2 के माध्यम से अपनी संयुक्त सार्वजनिक कुंजी का उपयोग करके सह-हस्ताक्षर करते हैं, जिससे एक ऐसा लेनदेन बनता है जो मानक एकल-हस्ताक्षर भुगतान से अप्रभेद्य होता है।
wrong_answers:
  - उन्हें नेटवर्क सत्यापन के लिए हैश और टाइम लॉक on-chain सहित संपूर्ण स्क्रिप्ट का खुलासा करना होगा।
  - वे केवल आवश्यक मर्कल ट्री शाखा को ही प्रकाशित करते हैं, जबकि समग्र कुंजी को पर्यवेक्षकों से छिपाकर रखते हैं।
  - वे कुंजी एकत्रीकरण के बिना परमाणु निपटान सुनिश्चित करने के लिए प्रत्येक स्तर पर अलग-अलग लेनदेन को एक साथ प्रसारित करते हैं।
explanation: |
  Taproot में सहयोगात्मक "की पाथ" पार्टियों को MuSig2 का उपयोग करके अपनी कुंजियों को एक एकल एकत्रित सार्वजनिक कुंजी में संयोजित करने की अनुमति देता है। जब दोनों सहमत होते हैं, तो वे केवल लेनदेन पर सह-हस्ताक्षर करते हैं, जो ब्लॉकचेन पर किसी भी मानक भुगतान के समान दिखाई देता है। यह अधिकतम गोपनीयता और दक्षता प्रदान करता है क्योंकि कोई स्क्रिप्ट लॉजिक प्रकट नहीं होता है, जिससे न्यूनतम ब्लॉक स्थान का उपयोग होता है। अन्य विकल्प या तो पुराने HTLC व्यवहार या विरोधी स्क्रिप्ट पाथ परिदृश्य का गलत वर्णन करते हैं।
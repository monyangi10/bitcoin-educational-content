question: Bitcoin에서 Liquid로 페그인하는 과정 중 102 확인 대기 기간의 주된 목적은 무엇인가요?
answer: L-BTC를 발행하기 전에 Bitcoin 블록체인의 재구성으로부터 보호하기 위해
wrong_answers:
  - 연합이 사용자 신원 및 규정 준수를 확인할 수 있는 충분한 시간을 확보하기 위해 다음과 같이 합니다
  - Liquid 네트워크가 들어오는 트랜잭션을 처리할 수 있는 충분한 용량을 확보하려면 다음과 같이 하세요
  - 연맹 회원사로부터 15명 중 11명의 다중 서명 승인을 받을 수 있는 시간 제공
explanation: |
  102 확인 대기 기간(약 17시간)은 Bitcoin 블록체인의 재구성을 방지하기 위해 특별히 설계되었습니다. Bitcoin는 확률적 완결성을 기반으로 운영되기 때문에 블록이 재구성되어 거래가 무효화될 가능성은 항상 존재합니다. 102번의 확인을 기다림으로써 시스템은 연합 주소로 자금을 보내는 Bitcoin 트랜잭션이 깊숙이 묻혀서 되돌릴 가능성이 극히 낮아지도록 합니다. 이렇게 하면 Liquid에서 L-BTC가 발행되었지만 기본 Bitcoin 거래가 개편으로 인해 취소되는 시나리오를 방지할 수 있습니다. 다른 옵션은 신원 확인이 자동화된 페그인 프로세스의 일부가 아니며, 네트워크 용량이 이러한 지연을 필요로 하는 제한 요소가 아니며, 15개 중 11개의 다중 서명 인증이 페그인이 아닌 페그아웃에 사용되기 때문에 올바르지 않습니다.
question: هدف اصلی دوره انتظار تأیید 102 در طول فرآیند peg-in از Bitcoin به Liquid چیست؟
answer: برای محافظت در برابر سازماندهی مجدد بلاکچین Bitcoin قبل از ضرب L-BTC
wrong_answers:
  - برای فراهم کردن زمان کافی جهت تأیید هویت کاربر و تطابق توسط فدراسیون
  - برای اطمینان از اینکه شبکه Liquid ظرفیت کافی برای پردازش تراکنش‌های ورودی دارد
  - برای فراهم کردن زمان برای مجوز چندامضایی ۱۵-از-۱۱ از اعضای فدراسیون
explanation: |
  دوره انتظار ۱۰۲ تأیید (تقریباً ۱۷ ساعت) به‌طور خاص برای محافظت در برابر سازماندهی مجدد بلاکچین Bitcoin طراحی شده است. از آنجا که Bitcoin بر اساس نهایی‌سازی احتمالی عمل می‌کند، همیشه احتمال کمی وجود دارد که بلوک‌ها مجدداً سازماندهی شوند و احتمالاً تراکنش‌ها را باطل کنند. با انتظار برای ۱۰۲ تأیید، سیستم اطمینان حاصل می‌کند که تراکنش Bitcoin که وجوه را به آدرس فدراسیون ارسال می‌کند، به‌طور عمیقی دفن شده و احتمالاً به‌هیچ‌وجه معکوس نمی‌شود. این از سناریویی جلوگیری می‌کند که در آن L-BTC بر روی Liquid ضرب می‌شود اما تراکنش زیرین Bitcoin به دلیل سازماندهی مجدد معکوس می‌شود. گزینه‌های دیگر نادرست هستند زیرا: تأیید هویت بخشی از فرآیند خودکار peg-in نیست، ظرفیت شبکه عامل محدودکننده‌ای نیست که چنین تأخیرهایی را نیاز داشته باشد، و مجوز ۱۱ از ۱۵ چندامضایی برای peg-outs استفاده می‌شود، نه peg-ins.
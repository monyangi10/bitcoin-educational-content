question: 在從 Bitcoin 到 Liquid 的掛接過程中，102 確認等待期的主要目的是什麼？
answer: 在鑄造 L-BTC 前，防止 Bitcoin 區塊鏈重組
wrong_answers:
  - 允許聯盟有足夠的時間驗證使用者的身分和合規性
  - 以確保 Liquid 網路有足夠的容量處理進入的交易
  - 為聯盟成員的 11-15 項聯署授權提供時間
explanation: |
  102 確認等待期（約 17 小時）是專門為防止 Bitcoin 區塊鏈重組而設計的。由於 Bitcoin 以概率最終性作為運作基礎，因此區塊總有小概率會被重組，可能導致交易無效。透過等待 102 次確認，系統可確保向聯邦地址發送資金的 Bitcoin 交易被深埋，極不可能被逆轉。這可以防止出現 L-BTC 在 Liquid 上鑄造，但底層的 Bitcoin 交易卻因為重組而被逆轉的情況。其他選項是錯誤的，因為：身份驗證不是自動掛鈎流程的一部分，網路容量不是需要這種延遲的限制因素，11-of-15 多重簽名授權用於掛出，而不是掛入。
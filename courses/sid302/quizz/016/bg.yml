question: Каква е основната цел на периода на изчакване от 102 потвърждения по време на процеса на свързване от Bitcoin към Liquid?
answer: За защита срещу реорганизации на блокчейн Bitcoin преди добиването на L-BTC
wrong_answers:
  - Предоставяне на достатъчно време на федерацията за проверка на самоличността на потребителя и на съответствието
  - За да се гарантира, че мрежата Liquid има достатъчен капацитет за обработка на входящата транзакция
  - За да се осигури време за многостранното разрешение на 11 от 15 подписа от членовете на федерацията
explanation: |
  Периодът на изчакване на 102 потвърждения (приблизително 17 часа) е специално разработен, за да предпазва от реорганизации на блокчейн Bitcoin. Тъй като Bitcoin функционира на базата на вероятностна окончателност, винаги съществува малък шанс блоковете да бъдат реорганизирани, което потенциално може да доведе до невалидност на трансакциите. Като изчаква 102 потвърждения, системата гарантира, че транзакцията на Bitcoin, с която се изпращат средства на адреса на федерацията, е дълбоко заровена и е изключително малко вероятно да бъде отменена. Така се предотвратява сценарият, при който L-BTC се изсича в Liquid, но основната транзакция в Bitcoin се анулира поради реорганизация. Другите варианти са некоректни, защото: проверката на самоличността не е част от автоматизирания процес на peg-in, капацитетът на мрежата не е ограничаващ фактор, който изисква такива забавяния, а многозначното разрешение 11 от 15 се използва за peg-out, а не за peg-in.
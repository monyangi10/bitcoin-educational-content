question: BitcoinからLiquidへのペグインプロセスにおける102の確認待ち期間の主な目的は何ですか？
answer: L-BTCを鋳造する前に、Bitcoinのブロックチェーン再編成から保護する。
wrong_answers:
  - フェデレーションがユーザーの身元およびコンプライアンスを確認するのに十分な時間を確保すること。
  - Liquidネットワークが着信トランザクションを処理するのに十分な容量を持っていることを確認する。
  - 連盟加盟国からの15人中11人の多署名承認に時間を割くため
explanation: |
  102の確認待ち期間（約17時間）は、Bitcoinブロックチェーンの再編成から保護するために特別に設計されている。Bitcoinは確率的最終性で作動するため、ブロックが再編成される可能性は常に少なからずあり、取引が無効になる可能性がある。102回の確認を待つことで、システムは連合アドレスに資金を送るBitcoinトランザクションが深く埋没し、取り消される可能性が極めて低いことを保証する。これにより、LiquidにL-BTCが鋳造されたにもかかわらず、Bitcoinの取引が再編成によって取り消されるというシナリオを防ぐことができる。なぜなら、本人確認は自動ペグインプロセスの一部ではなく、ネットワーク容量はそのような遅延を必要とする制限要因ではなく、11-of-15のマルチシグ認証はペグインではなくペグアウトに使用されるからです。
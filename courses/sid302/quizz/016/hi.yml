question: Bitcoin से Liquid तक की पेग-इन प्रक्रिया के दौरान 102 पुष्टिकरण प्रतीक्षा अवधि का प्राथमिक उद्देश्य क्या है?
answer: एल-बीटीसी मिंट करने से पहले जीडब्ल्यू-2 ब्लॉकचेन पुनर्गठन से बचाव के लिए
wrong_answers:
  - फेडरेशन को उपयोगकर्ता की पहचान और अनुपालन को सत्यापित करने के लिए पर्याप्त समय देने हेतु।
  - यह सुनिश्चित करने के लिए कि Liquid नेटवर्क में आने वाले लेनदेन को संसाधित करने के लिए पर्याप्त क्षमता हो।
  - संघ के सदस्यों से 15 में से 11 बहु-हस्ताक्षर प्राधिकरण के लिए समय प्रदान करने हेतु
explanation: |
  102 पुष्टिकरणों की प्रतीक्षा अवधि (लगभग 17 घंटे) विशेष रूप से Bitcoin ब्लॉकचेन पुनर्गठन से सुरक्षा के लिए डिज़ाइन की गई है। चूंकि Bitcoin संभाव्य अंतिमता पर काम करता है, इसलिए ब्लॉक के पुनर्गठन की थोड़ी संभावना हमेशा बनी रहती है, जिससे लेनदेन अमान्य हो सकते हैं। 102 पुष्टिकरणों की प्रतीक्षा करके, सिस्टम यह सुनिश्चित करता है कि फेडरेशन पते पर धनराशि भेजने वाला Bitcoin लेनदेन पूरी तरह से सुरक्षित है और इसके उलट होने की संभावना बहुत कम है। यह उस स्थिति को रोकता है जहां L-BTC को Liquid पर ढाला जाता है, लेकिन पुनर्गठन के कारण अंतर्निहित Bitcoin लेनदेन उलट जाता है। अन्य विकल्प गलत हैं क्योंकि: पहचान सत्यापन स्वचालित पेग-इन प्रक्रिया का हिस्सा नहीं है, नेटवर्क क्षमता ऐसी देरी की आवश्यकता वाला सीमित कारक नहीं है, और 11-में-15 मल्टीसिग प्राधिकरण का उपयोग पेग-आउट के लिए किया जाता है, न कि पेग-इन के लिए।
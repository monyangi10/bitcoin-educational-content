question: 在从 Bitcoin 到 Liquid 的挂接过程中，102 次确认等待期的主要目的是什么？
answer: 在铸造 L-BTC 之前防止 Bitcoin 区块链重组
wrong_answers:
  - 让联盟有足够的时间验证用户身份和合规性
  - 确保 Liquid 网络有足够的能力处理输入的交易
  - 为联合会成员的 11-15 联署授权提供时间
explanation: |
  102 个确认等待期（约 17 小时）是专门为防止 Bitcoin 区块链重组而设计的。由于 Bitcoin 以概率终结的方式运行，因此区块链总有可能被重组，从而使交易失效。通过等待 102 次确认，系统可以确保向联邦地址发送资金的 Bitcoin 交易被深埋，极不可能被逆转。这就避免了在 Liquid 上铸造 L-BTC 但底层 Bitcoin 交易因重组而被逆转的情况。其他选项都不正确，因为：身份验证并不是自动挂钩流程的一部分，网络容量并不是需要这种延迟的限制因素，11-of-15 多重签名授权用于挂钩退出，而不是挂钩输入。
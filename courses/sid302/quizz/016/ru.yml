question: Какова основная цель периода ожидания подтверждения 102 во время процесса привязки от Bitcoin к Liquid?
answer: Для защиты от реорганизации блокчейна Bitcoin перед майнингом L-BTC
wrong_answers:
  - Предоставление федерации достаточного времени для проверки личности пользователя и соответствия требованиям
  - Чтобы убедиться, что сеть Liquid имеет достаточную пропускную способность для обработки входящей транзакции
  - Предоставить время для получения разрешения от членов федерации в количестве 11 из 15 подписей
explanation: |
  Период ожидания 102 подтверждений (около 17 часов) специально разработан для защиты от реорганизации блокчейна Bitcoin. Поскольку Bitcoin работает на основе вероятностного финализма, всегда есть небольшая вероятность того, что блоки могут быть реорганизованы, что может привести к аннулированию транзакций. Ожидая 102 подтверждения, система гарантирует, что транзакция Bitcoin, отправляющая средства на адрес федерации, глубоко зарыта и крайне маловероятно, что она может быть отменена. Это предотвращает сценарий, при котором L-BTC чеканится на Liquid, но лежащая в основе транзакция Bitcoin отменяется из-за реорганизации. Другие варианты неверны, поскольку: проверка личности не является частью автоматизированного процесса привязки, пропускная способность сети не является ограничивающим фактором, требующим таких задержек, а мультисиговая авторизация 11 из 15 используется для привязки, а не для привязки.
question: วัตถุประสงค์หลักของระยะเวลารอการยืนยัน 102 ครั้งในกระบวนการ peg-in จาก Bitcoin ถึง Liquid คืออะไร?
answer: เพื่อป้องกันการจัดระเบียบใหม่ของบล็อกเชน Bitcoin ก่อนการสร้าง L-BTC
wrong_answers:
  - เพื่อให้มีเวลาเพียงพอสำหรับสหพันธ์ในการตรวจสอบตัวตนของผู้ใช้และการปฏิบัติตามข้อกำหนด
  - เพื่อให้แน่ใจว่าเครือข่าย Liquid มีความสามารถเพียงพอในการประมวลผลธุรกรรมที่เข้ามา
  - เพื่อให้เวลาในการอนุมัติแบบหลายลายเซ็น 11 จาก 15 จากสมาชิกสหพันธ์
explanation: |
  ระยะเวลารอการยืนยัน 102 ครั้ง (ประมาณ 17 ชั่วโมง) ถูกออกแบบมาโดยเฉพาะเพื่อป้องกันการจัดระเบียบใหม่ของบล็อกเชน Bitcoin เนื่องจาก Bitcoin ทำงานบนความแน่นอนเชิงความน่าจะเป็น จึงมีโอกาสเล็กน้อยที่บล็อกอาจถูกจัดระเบียบใหม่ ซึ่งอาจทำให้ธุรกรรมไม่ถูกต้องได้ โดยการรอการยืนยัน 102 ครั้ง ระบบจะมั่นใจได้ว่าธุรกรรม Bitcoin ที่ส่งเงินไปยังที่อยู่ของสหพันธ์ถูกฝังลึกและมีโอกาสน้อยมากที่จะถูกย้อนกลับ ซึ่งจะป้องกันสถานการณ์ที่ L-BTC ถูกสร้างขึ้นบน Liquid แต่ธุรกรรม Bitcoin ที่อยู่เบื้องหลังถูกย้อนกลับเนื่องจากการจัดระเบียบใหม่ ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ: การยืนยันตัวตนไม่ใช่ส่วนหนึ่งของกระบวนการ peg-in อัตโนมัติ ความจุของเครือข่ายไม่ใช่ปัจจัยจำกัดที่ต้องการความล่าช้าเช่นนี้ และการอนุญาต multisig 11-of-15 ถูกใช้สำหรับ peg-outs ไม่ใช่ peg-ins
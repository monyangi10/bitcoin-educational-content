question: Koje su tri opcije servera dostupne u Sparrow-u?
answer: Javni Server, Bitcoin Core, Privatni Electrum
wrong_answers:
  - RPC Direct, VPN, Tor
  - Full node, Light Node, Mobile Node
  - Core RPC, Lightning, ElectrumX
explanation: |
  Sparrow nudi tri izbora servera: Javni Server, Bitcoin Core (RPC), i Privatni Electrum.
reviewed: true

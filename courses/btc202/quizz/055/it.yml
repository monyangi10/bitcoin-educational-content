question: Quali sono le tre opzioni di server disponibili in Sparrow?
answer: Server pubblico, Bitcoin Core, Private Electrum
wrong_answers:
  - RPC Diretto, VPN, Tor
  - Full node, Light node, Mobile node
  - Core RPC, Lightning, ElectrumX
explanation: |
  Sparrow offre tre scelte di server: Server pubblico, Bitcoin Core (RPC) e Private Electrum.
reviewed: true

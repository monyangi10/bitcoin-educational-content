question: Quais são as três opções de servidor disponíveis no Sparrow?
answer: Servidor Público, Bitcoin core, Electrum Privado
wrong_answers:
  - RPC Direto, VPN, Tor
  - Full node, Nó Ligeiro, Nó Móvel
  - Core RPC, Lightning, ElectrumX
explanation: |
  O Sparrow oferece três opções de servidor: Servidor público, Bitcoin core (RPC) e Electrum privado.
reviewed: true
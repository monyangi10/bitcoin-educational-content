question: Кои резервни копия са необходими за възстановяване на възел в Lightning?
answer: фраза и SCB
wrong_answers:
  - фраза и файл txindex
  - фраза и публичен IP адрес
  - фраза и 2FA
explanation: |
  Възстановяването на възел в Lightning изисква както фраза, така и SCB (статично архивиране на канали), без което не могат да бъдат възстановени средствата на каналите.
reviewed: true

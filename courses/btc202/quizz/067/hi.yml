question: लाइटनिंग नोड को पुनर्स्थापित करने के लिए कौन से बैकअप आवश्यक हैं?
answer: seed और SCB
wrong_answers:
  - seed और txindex फ़ाइल
  - seed और सार्वजनिक IP Address
  - seed और 2FA
explanation: |
  लाइटनिंग नोड को पुनर्स्थापित करने के लिए seed और SCB (स्टेटिक चैनल बैकअप) दोनों की आवश्यकता होती है, जिसके बिना चैनल फंड को पुनर्प्राप्त नहीं किया जा सकता है।
reviewed: true
question: Cadangan mana yang diperlukan untuk memulihkan node Lightning?
answer: seed dan SCB
wrong_answers:
  - seed dan file txindex
  - seed dan IP publik Address
  - seed dan 2FA
explanation: |
  Memulihkan node Lightning memerlukan seed dan SCB (Static Channel Backup / Cadangan Saluran Statis), yang tanpanya dana saluran tidak dapat dipulihkan.
reviewed: true

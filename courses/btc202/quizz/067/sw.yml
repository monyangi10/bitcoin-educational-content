question: Ni nakala zipi zinahitajika ili kurejesha nodi ya Umeme?
answer: seed na SCB
wrong_answers:
  - seed na faili ya txindex
  - seed na IP Address ya umma 
  - seed na 2FA
explanation: |
  Kurejesha node ya Lightning kunahitaji seed na SCB (Hifadhi Nakala ya Kituo Tuli), bila ambayo pesa za kituo haziwezi kurejeshwa.
reviewed: true

question: आपके मिनी-पीसी में Dust के संचय से उत्पन्न मुख्य जोखिम क्या है?
answer: प्रोसेसर थ्रॉटलिंग
wrong_answers:
  - Blockchain ब्लॉक हटाना
  - डिस्क भ्रष्टाचार
  - कम RAM क्षमता
explanation: |
  Dust वेंटिलेशन को अवरुद्ध करता है, ओवरहीटिंग का कारण बनता है, तथा थ्रॉटलिंग की ओर ले जाता है, जिससे प्रोसेसर की कार्यक्षमता कम हो जाती है।
reviewed: true
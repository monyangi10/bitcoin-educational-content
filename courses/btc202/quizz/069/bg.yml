question: Какъв е основният риск, свързан с натрупването на прах във вашия мини компютър?
answer: Заглушаване на процесора
wrong_answers:
  - Изтриване на блок Blockchain
  - Повреда на диска
  - Намален капацитет на RAM
explanation: |
  Dust блокира вентилацията, причинява прегряване и води до дроселиране, което намалява ефективността на процесора.
reviewed: true
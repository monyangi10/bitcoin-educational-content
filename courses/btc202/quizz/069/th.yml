question: ความเสี่ยงหลักที่เกิดจากการสะสมของฝุ่นในมินิพีซีของคุณคืออะไร?
answer: การควบคุมความเร็วของโปรเซสเซอร์
wrong_answers:
  - การลบบล็อก Blockchain
  - การเสียหายของดิสก์
  - ความจุ RAM ลดลง
explanation: |
  Dust ขัดขวางการระบายอากาศ ทำให้เกิดความร้อนสูงเกินไป และนำไปสู่การลดความเร็ว ซึ่งลดประสิทธิภาพของโปรเซสเซอร์
reviewed: true
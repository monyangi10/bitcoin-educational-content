question: Какой основной риск представляет накопление Dust в вашем мини-ПК?
answer: Дросселирование процессора
wrong_answers:
  - Делеция блока Blockchain
  - Повреждение диска
  - Уменьшение объема оперативной памяти
explanation: |
  Dust блокирует вентиляцию, вызывает перегрев и приводит к дросселированию, снижая эффективность процессора.
reviewed: true
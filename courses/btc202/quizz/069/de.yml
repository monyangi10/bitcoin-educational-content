question: Was ist das Hauptrisiko, das durch die Ansammlung von Staub in deinem Mini-PC entsteht?
answer: Drosselung des Prozessors
wrong_answers:
  - Löschung von Blockchain Blöcken
  - Beschädigung der Festplatte
  - Reduzierte RAM-Kapazität
explanation: |
  Staub blockiert die Belüftung, verursacht Überhitzung und führt zu Drosselung, was die Effizienz des Prozessors verringert.
reviewed: true

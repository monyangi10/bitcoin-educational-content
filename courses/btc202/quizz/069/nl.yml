question: Wat is het grootste risico van de ophoping van stof in je mini-pc?
answer: Processor efficientievermindering
wrong_answers:
  - Blockchain blok verwijderen
  - Schijfbeschadiging
  - Verminderde RAM-capaciteit
explanation: |
  Stof blokkeert de ventilatie, veroorzaakt oververhitting en leidt tot throttling, waardoor de processor minder efficiënt werkt.
reviewed: true

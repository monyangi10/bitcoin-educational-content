question: Koji je glavni rizik od nakupljanja prašine u vašem mini-PC-ju?
answer: Ograničavanje procesora
wrong_answers:
  - Brisanje blokova iz blockchaina 
  - Oštećenje diska
  - Smanjenje kapaciteta RAM-a
explanation: |
  Prašina blokira ventilaciju, uzrokuje pregrevanje i dovodi do usporavanja, smanjujući efikasnost procesora.
reviewed: true

question: Qual è il rischio principale rappresentato dall'accumulo di Dust nel vostro mini-PC?
answer: Strozzatura del processore
wrong_answers:
  - Eliminazione del blocco Blockchain
  - Corruzione del disco
  - Capacità RAM ridotta
explanation: |
  Il Dust blocca la ventilazione, provoca il surriscaldamento e porta al throttling, riducendo l'efficienza del processore.
reviewed: true
question: خطر اصلی ناشی از تجمع Dust در مینی‌پی‌سی شما چیست؟
answer: کاهش سرعت پردازنده
wrong_answers:
  - حذف بلوک Blockchain
  - خرابی دیسک
  - ظرفیت کاهش‌یافته RAM
explanation: |
  Dust تهویه را مسدود می‌کند، باعث گرمای بیش از حد می‌شود و منجر به کاهش سرعت می‌شود که کارایی پردازنده را کاهش می‌دهد.
reviewed: true
question: Perché un singolo wallet non è considerato un partecipante al network Bitcoin?
answer: Perché non convalida le transazioni o i blocchi
wrong_answers:
  - Perché non è in grado di gestire le chiavi private generate
  - Perché non è in grado di creare indirizzi Bitcoin
  - Perché non convalida le transazioni o gli indirizzi
explanation: |
  Un wallet non convalida direttamente blocchi e transazioni; si limita a gestire le chiavi e dipende dai nodi per il resto.
reviewed: true

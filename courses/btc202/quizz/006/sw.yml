question: Kwa nini Wallet moja haizingatiwi mshiriki wa mtandao wa Bitcoin?
answer: Kwa sababu haidhibitishi miamala au block
wrong_answers:
  - Kwa sababu haiwezi generate funguo za faragha
  - Kwa sababu haiwezi kuunda Wallet za Bitcoin
  - Kwa sababu haidhibitishi mauzo au anwani
explanation: |
  Wallet haidhibitishi moja kwa moja blocks na miamala; inasimamia funguo tu na inategemea node kwa zingine.
reviewed: true

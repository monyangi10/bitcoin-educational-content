question: Почему одиночный Wallet не считается участником сети Bitcoin?
answer: Поскольку он не проверяет транзакции и блоки
wrong_answers:
  - Поскольку он не может использовать закрытые ключи generate
  - Потому что он не может создавать адреса Bitcoin
  - Потому что он не подтверждает продажи или адреса
explanation: |
  Wallet не занимается непосредственной проверкой блоков и транзакций; он просто управляет ключами, а все остальное зависит от узлов.
reviewed: true
question: چرا یک Wallet به عنوان یک شرکت‌کننده در شبکه Bitcoin در نظر گرفته نمی‌شود؟
answer: زیرا تراکنش‌ها یا بلوک‌ها را اعتبارسنجی نمی‌کند
wrong_answers:
  - زیرا نمی‌تواند کلیدهای خصوصی generate را
  - زیرا نمی‌تواند آدرس‌های Bitcoin ایجاد کند
  - زیرا فروش یا آدرس‌ها را تأیید نمی‌کند
explanation: |
  یک Wallet به طور مستقیم بلاک‌ها و تراکنش‌ها را اعتبارسنجی نمی‌کند؛ بلکه فقط کلیدها را مدیریت کرده و برای بقیه موارد به نودها وابسته است.
reviewed: true
question: Защо един портфейл не се счита за участник в мрежата Bitcoin?
answer: Тъй като не валидира транзакции или блокове
wrong_answers:
  - Тъй като не може да използва частни ключове
  - Защото не може да създава адреси Bitcoin
  - Защото не валидира продажби или адреси
explanation: |
  Портфейлът не валидира директно блокове и транзакции; той просто управлява ключовете, а останалото зависи от възлите.
reviewed: true

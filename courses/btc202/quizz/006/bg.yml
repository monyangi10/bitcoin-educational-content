question: Защо един wallet не се счита за участник в мрежата Bitcoin?
answer: Тъй като не валидира транзакции или блокове
wrong_answers:
  - Тъй като не може да използва частни ключове generate
  - Защото не може да създава адреси Bitcoin
  - Защото не валидира продажби или адреси
explanation: |
  wallet не валидира директно блокове и транзакции; той просто управлява ключовете, а за останалото зависи от възлите.
reviewed: true
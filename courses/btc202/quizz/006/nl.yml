question: Waarom wordt een enkele wallet niet beschouwd als een deelnemer aan het Bitcoin netwerk?
answer: Omdat het geen transacties of blokken valideert
wrong_answers:
  - Omdat het geen privésleutels kan aanmaken
  - Omdat het geen Bitcoin adressen kan aanmaken
  - Omdat het geen verkoop of adressen valideert
explanation: |
  Een wallet valideert blokken en transacties niet direct; het beheert alleen de sleutels en is voor de rest afhankelijk van de nodes.
reviewed: true

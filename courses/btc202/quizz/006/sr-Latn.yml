question: Zašto se jedan novčanik ne smatra učesnikom Bitcoin mreže?
answer: Zato što ne validira transakcije ili blokove
wrong_answers:
  - Zato što ne može generisati privatne ključeve
  - Zato što ne može da kreira Bitcoin adrese
  - Zato što ne validira prodaje ili adrese
explanation: |
  Novčanik ne validira direktno blokove i transakcije; on jednostavno upravlja ključevima i zavisi od čvorova za ostalo.
reviewed: true

question: ทำไม wallet เดี่ยวถึงไม่ถือว่าเป็นผู้เข้าร่วมเครือข่าย Bitcoin?
answer: เพราะมันไม่ได้ตรวจสอบธุรกรรมหรือบล็อก
wrong_answers:
  - เนื่องจากไม่สามารถใช้คีย์ส่วนตัว generate
  - เนื่องจากไม่สามารถสร้างที่อยู่ Bitcoin
  - เพราะมันไม่ตรวจสอบยอดขายหรือที่อยู่
explanation: |
  wallet ไม่ได้ตรวจสอบบล็อกและธุรกรรมโดยตรง; มันเพียงแค่จัดการคีย์และพึ่งพาโหนดสำหรับส่วนที่เหลือเท่านั้น
reviewed: true
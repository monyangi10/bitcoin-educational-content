question: एक एकल Wallet को Bitcoin नेटवर्क भागीदार क्यों नहीं माना जाता है?
answer: क्योंकि यह लेनदेन या ब्लॉक को मान्य नहीं करता है
wrong_answers:
  - क्योंकि यह generate निजी कुंजियाँ नहीं बना सकता
  - क्योंकि यह Bitcoin पते नहीं बना सकता
  - क्योंकि यह बिक्री या पते को मान्य नहीं करता है
explanation: |
  Wallet सीधे तौर पर ब्लॉकों और लेनदेन को मान्य नहीं करता है; यह केवल कुंजियों का प्रबंधन करता है और बाकी के लिए नोड्स पर निर्भर करता है।
reviewed: true
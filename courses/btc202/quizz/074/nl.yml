question: Welke gegevensstructuur vat de transacties in een blok samen?
answer: De Merkle Tree
wrong_answers:
  - De Hash UTXO tabel
  - Het peers.dat bestand
  - Het assumeutxo register
explanation: |
  De transacties in een blok worden vastgelegd in een Merkle Tree, waarvan de root is opgenomen in de koptekst van het blok om de integriteit van het blok te waarborgen.
reviewed: true

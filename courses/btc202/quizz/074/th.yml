question: โครงสร้างข้อมูลใดที่สรุปธุรกรรมในบล็อก?
answer: ต้นไม้เมอร์เคิล
wrong_answers:
  - ตาราง Hash UTXO
  - ไฟล์ peers.dat
  - The assumeutxo register
explanation: |
  ธุรกรรมในบล็อกจะถูกบันทึกลงในต้นไม้เมอร์เคิล โดยรากของต้นไม้จะถูกรวมอยู่ในส่วนหัวของบล็อกเพื่อให้มั่นใจในความสมบูรณ์ของบล็อก
reviewed: true
question: Koja struktura podataka rezimira transakcije u bloku?
answer: Merkle Tree
wrong_answers:
  - UTXO hash tabela
  - Datoteka peers.dat
  - Registar assumeutxo
explanation: |
  Transakcije unutar bloka se smeštaju u Merkle tree, a koren stabla se upisuje u zaglavlje bloka radi garantovanja integriteta.
reviewed: true

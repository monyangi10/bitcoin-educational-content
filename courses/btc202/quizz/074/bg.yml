question: Коя структура от данни обобщава транзакциите в даден блок?
answer: Дървото на Меркъл
wrong_answers:
  - Таблицата Hash UTXO
  - Файлът peers.dat
  - Регистърът assumeutxo
explanation: |
  Транзакциите в даден блок се предават в дърво на Меркъл, чийто корен е включен в заглавието на блока, за да се гарантира целостта на блока.
reviewed: true
question: Welche Datenstruktur fasst die Transaktionen in einem Block zusammen?
answer: Der Merkle Tree
wrong_answers:
  - Die Hash-UTXO-Tabelle
  - Die Datei peers.dat
  - Das Register assumeutxo
explanation: |
  Die Transaktionen eines Blocks werden in einem Merkle Tree übertragen, dessen Wurzel im Blockheader enthalten ist, um die Integrität des Blocks zu gewährleisten.
reviewed: true

question: कौन सी डेटा संरचना ब्लॉक में लेनदेन का सारांश प्रस्तुत करती है?
answer: जीडब्ल्यू-0
wrong_answers:
  - Hash UTXO तालिका
  - Peers.dat फ़ाइल
  - assumeutxo रजिस्टर
explanation: |
  किसी ब्लॉक में लेनदेन Merkle Tree के लिए प्रतिबद्ध होते हैं, जिसका मूल ब्लॉक की अखंडता सुनिश्चित करने के लिए ब्लॉक हेडर में शामिल किया जाता है।
reviewed: true
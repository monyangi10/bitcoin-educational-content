question: Какво е заглавието на Бялата книга на биткойн, публикувана през 2008 г. от Сатоши Накамото?
answer: "Биткойн: Електронна парична система от типа Peer-to-Peer"
wrong_answers:
  - Биткойн Децентрализирана система за цифрово злато
  - Биткойн Бъдещето на парите
  - Биткойн Мрежа за плащане, базирана на блокчейн
explanation: |
  Бялата книга на Биткойн, "Bitcoin A Peer-to-Peer Electronic Cash System", е публикувана през 2008 г. от Сатоши Накамото.
reviewed: true

question: Какво е заглавието на Бялата книга на Satoshi Nakamoto, публикувана през 2008 г.?
answer: Bitcoin Електронна парична система от типа Peer-to-Peer
wrong_answers:
  - Bitcoin Децентрализирана система за цифрово злато
  - Bitcoin Бъдещето на парите
  - Bitcoin Мрежа за плащане, базирана на Blockchain
explanation: |
  Satoshi Бялата книга на Накамото, Bitcoin A Peer-to-Peer Electronic Cash System, е публикувана през 2008 г.
reviewed: true
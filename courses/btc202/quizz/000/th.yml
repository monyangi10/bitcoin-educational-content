question: ชื่อของเอกสารไวท์เปเปอร์ของ Satoshi Nakamoto ที่เผยแพร่ในปี 2008 คืออะไร?
answer: Bitcoin ระบบเงินสดอิเล็กทรอนิกส์แบบเพียร์ทูเพียร์
wrong_answers:
  - Bitcoin ระบบทองคำดิจิทัลแบบกระจายศูนย์
  - Bitcoin อนาคตของเงิน
  - Bitcoin เครือข่ายการชำระเงินที่ใช้ Blockchain
explanation: |
  Satoshi เอกสารไวท์เปเปอร์ของนากาโมโตะ, Bitcoin ระบบเงินสดอิเล็กทรอนิกส์แบบเพียร์ทูเพียร์, ถูกตีพิมพ์ในปี 2008.
reviewed: true
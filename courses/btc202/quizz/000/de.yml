question: Wie lautet der Titel von Satoshi Nakamotos 2008 veröffentlichtem Whitepaper?
answer: Bitcoin Ein elektronisches Peer-to-Peer-Cash-System
wrong_answers:
  - Bitcoin Ein dezentrales digitales Goldsystem
  - Bitcoin Die Zukunft des Geldes
  - Bitcoin Ein Blockchain-basiertes Zahlungsnetzwerk
explanation: |
  Satoshi Nakamotos Whitepaper, Bitcoin Ein elektronisches Peer-to-Peer-Cash-System, wurde 2008 veröffentlicht.
reviewed: true

question: Koji je naslov Satoshi Nakamoto-ovog White Paper-a objavljenog 2008?
answer: Bitcoin Peer-to-Peer elektronski gotovinski sistem 
wrong_answers:
  - Bitcoin Decentralizovani digitalni zlatni sistem
  - Bitcoin Budućnost novca
  - Bitcoin: Mreža plaćanja zasnovana na blokčejnu
explanation: |
  Satoshi Nakamoto-ov White Paper, Bitcoin Peer-to-Peer elektronski gotovinski sistem, je objavljen 2008. Peer-to-peer je mreža ravnopravnih čvorova bez centralnog posrednika.
reviewed: true

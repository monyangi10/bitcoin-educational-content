question: Qual è il titolo del White Paper di Satoshi Nakamoto pubblicato nel 2008?
answer: Bitcoin un sistema di contanti elettronici Peer-to-Peer
wrong_answers:
  - Bitcoin un sistema di oro digitale decentralizzato
  - Bitcoin il futuro del denaro
  - Bitcoin una rete di pagamento basata sulla blockchain
explanation: |
  Il White Paper di Satoshi Nakamoto, Bitcoin A Peer-to-Peer Electronic Cash System, è stato pubblicato nel 2008.
reviewed: true

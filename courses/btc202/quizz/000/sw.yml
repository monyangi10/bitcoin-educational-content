question: Je, ni kichwa gani cha whitepaper ya Satoshi Nakamoto iliyochapishwa mwaka wa 2008?
answer: Bitcoin Mfumo wa Pesa wa Kielektroniki wa Peer-to-Peer
wrong_answers:
  - Bitcoin A Mfumo wa Dhahabu wa Dijitali uliowekwa madarakani
  - Bitcoin Mustakabali wa Pesa
  - Mtandao wa Malipo wa Bitcoin A Blockchain
explanation: |
  Whitepaper ya Satoshi Nakamoto, Bitcoin A Peer-to-Peer Electronic Cash System, ilichapishwa mwaka wa 2008.
reviewed: true

question: 2008 में प्रकाशित Satoshi नाकामोतो के श्वेत पत्र का शीर्षक क्या है?
answer: Bitcoin एक पीयर-टू-पीयर इलेक्ट्रॉनिक कैश सिस्टम
wrong_answers:
  - Bitcoin एक विकेन्द्रीकृत डिजिटल गोल्ड सिस्टम
  - Bitcoin धन का भविष्य
  - Bitcoin एक Blockchain-आधारित भुगतान नेटवर्क
explanation: |
  Satoshi नाकामोतो का श्वेत पत्र, Bitcoin एक पीयर-टू-पीयर इलेक्ट्रॉनिक कैश सिस्टम, 2008 में प्रकाशित हुआ था।
reviewed: true
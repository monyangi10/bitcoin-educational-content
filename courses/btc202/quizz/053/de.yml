question: Welcher optionale Index kann in Bitcoin Core aktiviert werden, um eine Transaktion anhand deiner txid zu finden?
answer: txindex
wrong_answers:
  - addrindex
  - blockindex
  - elektrumindex
explanation: |
  Die Option txindex=1 wird verwendet, um eine Transaktion anhand seines eindeutigen Bezeichners (txid) abzufragen.
reviewed: true

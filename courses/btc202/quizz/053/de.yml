question: Welcher optionale Index kann in Bitcoin core aktiviert werden, um eine Transaktion anhand ihres txid zu finden?
answer: txindex
wrong_answers:
  - addrindex
  - blockindex
  - elektrumindex
explanation: |
  Die Option txindex=1 wird verwendet, um eine Transaktion anhand ihres eindeutigen Bezeichners (txid) abzufragen.
reviewed: true
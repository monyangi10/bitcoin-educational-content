question: Bitcoin core में कौन सा वैकल्पिक सूचकांक सक्रिय किया जा सकता है ताकि txid द्वारा लेनदेन का पता लगाया जा सके?
answer: txindex
wrong_answers:
  - addrindex
  - ब्लॉकइंडेक्स
  - इलेक्ट्रमइंडेक्स
explanation: |
  txindex=1 विकल्प का उपयोग किसी लेनदेन को उसके विशिष्ट पहचानकर्ता (txid) द्वारा क्वेरी करने के लिए किया जाता है।
reviewed: true
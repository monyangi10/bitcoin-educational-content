question: Quel paramètre du bitcoin.conf limite la taille de la mempool en Mo ?
answer: maxmempool
wrong_answers:
  - totalmempool
  - mempoolexpiry
  - mempoolsize
explanation: |
  maxmempool fixe la taille maximale de la mempool (300 Mo par défaut). Lorsqu’elle est pleine, les transactions moins rémunératrices sont expulsées.
reviewed: true 

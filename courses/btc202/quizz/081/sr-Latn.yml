question: Koji parametar Bitcoin.conf ograničava veličinu mempool-a u MB?
answer: maxmempool
wrong_answers:
  - totalmempool
  - mempoolexpiry
  - mempoolsize
explanation: |
  Parametar maxmempool postavlja maksimalnu veličinu mempool-a (300 MB po defaultu). Kada se popuni, iz mempool-a se uklanjaju transakcije koje plaćaju manje naknade.
reviewed: true

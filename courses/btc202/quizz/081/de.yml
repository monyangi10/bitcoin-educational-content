question: Welcher bitcoin.conf-Parameter begrenzt die Größe des Mempools in MB?
answer: maxmempool
wrong_answers:
  - totalmempool
  - mempoolexpiry
  - mempoolsize
explanation: |
  maxmempool legt die maximale Größe des Mempools fest (standardmäßig 300 MB). Wenn er voll ist, werden weniger profitable Transaktionen ausgeschlossen.
reviewed: true

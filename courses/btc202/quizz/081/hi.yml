question: कौन सा Bitcoin.conf पैरामीटर MB में Mempool के आकार को सीमित करता है?
answer: मैक्समेमपूल
wrong_answers:
  - टोटलमेमपूल
  - मेमपूलएक्सपायरी
  - मेमपूलसाइज़
explanation: |
  maxmempool Mempool का अधिकतम आकार (डिफ़ॉल्ट रूप से 300 MB) निर्धारित करता है। जब यह भर जाता है, तो कम लाभ वाले लेनदेन निकाल दिए जाते हैं।
reviewed: true
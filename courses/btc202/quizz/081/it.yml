question: Quale parametro di Bitcoin.conf limita la dimensione della Mempool in MB?
answer: maxmempool
wrong_answers:
  - totalmempool
  - mempoolexpiry
  - mempoolsize
explanation: |
  maxmempool imposta la dimensione massima della Mempool (300 MB per impostazione predefinita). Quando è pieno, le transazioni meno redditizie vengono espulse.
reviewed: true

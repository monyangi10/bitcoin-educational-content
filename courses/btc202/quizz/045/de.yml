question: Welche Schritte müssen durchgeführt werden, bevor UmbrelOS installiert werden kann?
answer: Erstellen eines bootfähigen USB-Stick mit dem Image
wrong_answers:
  - Kompilieren des Bitcoin Core-Quellcodes
  - Formatieren der Blockchain
  - Erstellen eines Konto auf umbrel.com
explanation: |
  Die Installation beginnt mit der Vorbereitung eines bootfähigen USB-Sticks mit UmbrelOS über Balena Etcher.
reviewed: true

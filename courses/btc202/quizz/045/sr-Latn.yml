question: Koji koraci moraju biti završeni pre nego što se UmbrelOS može instalirati?
answer: Kreiranje butabilnog USB-a sa instalacionom slikom (image fajlom)
wrong_answers:
  - Kompajliranje izvornog koda Bitcoin Core-a
  - Formatiranje Blockchain-a
  - Kreiranje naloga na umbrel.com
explanation: |
  Instalacija počinje pripremom butabilnog USB uređaja sa UmbrelOS-om pomoću programa Balena Etcher.
reviewed: true

question: ความแตกต่างหลักระหว่างการใช้งานแบบดิบและ node-in-a-box คืออะไร?
answer: การมีอยู่ของอินเทอร์เฟซและแอปพลิเคชันแบบบูรณาการ
wrong_answers:
  - ความเข้ากันได้ของเครือข่าย
  - Blockchain ขนาดที่เก็บบนดิสก์
  - โปรโตคอลและสกุลเงินที่ใช้
explanation: |
  การติดตั้งแบบดิบจะติดตั้งเฉพาะซอฟต์แวร์ของโหนดเท่านั้น ในขณะที่โหนดในกล่องจะเพิ่มอินเทอร์เฟซ, ร้านค้าแอป, และบริการที่รวมอยู่ด้วย
reviewed: true
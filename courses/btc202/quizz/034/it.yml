question: Qual è la differenza principale tra un'implementazione grezza e un node-in-a-box?
answer: La presenza di un'interfaccia e di applicazioni integrate
wrong_answers:
  - Compatibilità di rete
  - Dimensione della blockchain memorizzata su disco
  - Il protocollo e la valuta utilizzati
explanation: |
  Un'implementazione grezza installa solo il software del nodo, mentre un nodo-in-a-box aggiunge un'interfaccia, un app store e servizi integrati.
reviewed: true

question: रॉ कार्यान्वयन और नोड-इन-ए-बॉक्स के बीच मुख्य अंतर क्या है?
answer: Interface और एकीकृत अनुप्रयोगों की उपस्थिति
wrong_answers:
  - नेटवर्क संगतता
  - डिस्क पर संग्रहीत Blockchain आकार
  - प्रयुक्त प्रोटोकॉल और मुद्रा
explanation: |
  एक कच्चा कार्यान्वयन केवल नोड सॉफ्टवेयर स्थापित करता है, जबकि एक नोड-इन-ए-बॉक्स एक Interface, एक ऐप स्टोर और एकीकृत सेवाएं जोड़ता है।
reviewed: true
question: تفاوت اصلی بین یک پیاده‌سازی خام و یک نود-در-یک-جعبه چیست؟
answer: حضور Interface و برنامه‌های یکپارچه
wrong_answers:
  - سازگاری شبکه
  - اندازه Blockchain ذخیره‌شده بر روی دیسک
  - پروتکل و ارز استفاده شده
explanation: |
  یک پیاده‌سازی خام تنها نرم‌افزار نود را نصب می‌کند، در حالی که یک نود-در-یک-باکس یک Interface، یک فروشگاه اپلیکیشن و خدمات یکپارچه را اضافه می‌کند.
reviewed: true
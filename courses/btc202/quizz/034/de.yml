question: Was ist der Hauptunterschied zwischen einer Rohimplementierung und einer Node-in-a-Box Lösung?
answer: Das Vorhandensein eines Interface und integrierter Anwendungen
wrong_answers:
  - Netzwerkompatibilität 
  - Blockchain-Größe, welche auf der Festplatte gespeichert wird
  - Das verwendete Protokoll und die Währung
explanation: |
  Bei einer Rohimplementierung wird nur die Node Software installiert, während bei einem Node-in-a-Box ein Interface, ein App Store und integrierte Dienste hinzugefügt werden.
reviewed: true

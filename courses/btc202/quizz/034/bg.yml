question: Каква е основната разлика между грубата имплементация и готовия пакет?
answer: Наличието на интерфейс и интегрирани приложения
wrong_answers:
  - Мрежова съвместимост
  - размера на блокчейна, съхраняван на диска
  - Използван протокол и валута
explanation: |
  При грубата имплементация се инсталира само софтуерът на възела, а при готовия пакет се добавят интерфейс, магазин за приложения и интегрирани услуги.
reviewed: true

question: Каква е основната разлика между суровото изпълнение и възела в кутията?
answer: Наличието на интерфейс и интегрирани приложения
wrong_answers:
  - Мрежова съвместимост
  - Blockchain размер, съхраняван на диска
  - Използван протокол и валута
explanation: |
  При суровото изпълнение се инсталира само софтуерът на възела, а при възела в кутия се добавят интерфейс, магазин за приложения и интегрирани услуги.
reviewed: true
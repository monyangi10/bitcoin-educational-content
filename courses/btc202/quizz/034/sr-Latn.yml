question: Koja je glavna razlika između sirove implementacije i node-in-a-box?
answer: Prisustvo grafičkog interfejsa i integrisanih aplikacija
wrong_answers:
  - Kompatibilnost mreže
  - Veličina Blockchain sačuvana na disku
  - Protokol i valuta koja se koristi
explanation: |
  Sirova implementacija instalira samo softver čvora, dok čvor-u-kutiji dodaje grafički interfejs, App Store i integrisane servere.
reviewed: true

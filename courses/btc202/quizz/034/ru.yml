question: В чем основная разница между сырой реализацией и node-in-a-box?
answer: Наличие Interface и интегрированных приложений
wrong_answers:
  - Совместимость с сетью
  - Размер Blockchain хранится на диске
  - Используемый протокол и валюта
explanation: |
  При необработанной реализации устанавливается только программное обеспечение узла, в то время как узел-в-коробке добавляет Interface, App Store и интегрированные сервисы.
reviewed: true
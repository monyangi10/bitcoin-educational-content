question: Kuna tofauti gani kuu kati ya utekelezaji mbichi na nodi-ndani-sanduku?
answer: Uwepo wa Interface na programu zilizojumuishwa
wrong_answers:
  - Utangamano wa mtandao
  - Saizi ya Blockchain iliyohifadhiwa kwenye diski
  - Protocol na sarafu iliyotumika
explanation: |
  Utekelezaji ghafi husakinisha programu ya node pekee, ilhali node ndani ya kisanduku huongeza Interface, Duka la Programu na huduma zilizounganishwa.
reviewed: true

question: Jaka jest główna różnica między surową implementacją a node-in-a-box?
answer: Obecność Interface i zintegrowanych aplikacji
wrong_answers:
  - Kompatybilność sieciowa
  - Rozmiar Blockchain zapisany na dysku
  - Stosowany protokół i waluta
explanation: |
  Surowa implementacja instaluje tylko oprogramowanie węzła, podczas gdy node-in-a-box dodaje Interface, App Store i zintegrowane usługi.
reviewed: true
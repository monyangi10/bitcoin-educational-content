question: Kuna tofauti gani ya kiuchumi kati ya node na Miner?
answer: Miner inapokea tuzo, node haina faida ya moja kwa moja
wrong_answers:
  - Node inapokea ada, Miner inapokea ruzuku ya kuzuia
  - Node inapokea tuzo, Miner haina faida ya moja kwa moja
  - Wote wawili hupokea tuzo sawa
explanation: |
  Miners hupokea tuzo (ruzuku na ada), ambapo node haileti faida ya moja kwa moja ya kifedha kwa mtumiaji wake.
reviewed: true

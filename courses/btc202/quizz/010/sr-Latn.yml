question: Koja je ekonomska razlika između čvora i rudara?
answer: Rudar prima nagrade, čvor nema direktnu dobit
wrong_answers:
  - Čvor prima naknadu, rudar prima blok grant
  - Čvor prima nagrade, rudar nema direktnu dobit
  - Oboje primaju iste nagrade
explanation: |
  Rudari primaju nagrade (subvencije i naknade), dok čvor ne donosi direktnu finansijsku korist svom korisniku.
reviewed: true

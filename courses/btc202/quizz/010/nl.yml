question: Wat is het economische verschil tussen een node en een miner?
answer: De miner ontvangt beloningen, de node heeft geen directe winst
wrong_answers:
  - Node ontvangt vergoeding, miner ontvangt bloksubsidie
  - De node ontvangt beloningen, de miner heeft geen directe winst
  - Beide ontvangen dezelfde awards
explanation: |
  Miners ontvangen beloningen (subsidies en vergoedingen), terwijl een node geen direct financieel voordeel oplevert voor zijn gebruiker.
reviewed: true

question: В чем экономическая разница между узлом и Miner?
answer: Miner получает вознаграждение, узел не имеет прямой выгоды
wrong_answers:
  - Узел получает плату, Miner получает блочный грант
  - Узел получает вознаграждение, Miner не имеет прямой выгоды
  - Оба получают одинаковые награды
explanation: |
  Майнеры получают вознаграждение (субсидии и сборы), в то время как узел не приносит прямой финансовой выгоды своему пользователю.
reviewed: true
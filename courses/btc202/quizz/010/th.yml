question: ความแตกต่างทางเศรษฐกิจระหว่างโหนดและนักขุดคืออะไร?
answer: คนขุดได้รับรางวัล โหนดไม่มีผลประโยชน์โดยตรง
wrong_answers:
  - โหนดได้รับค่าธรรมเนียม, นักขุดได้รับบล็อกแกรนท์
  - โหนดได้รับรางวัล นักขุดไม่มีผลประโยชน์โดยตรง
  - ทั้งคู่ได้รับรางวัลเดียวกัน
explanation: |
  คนขุดได้รับรางวัล (เงินอุดหนุนและค่าธรรมเนียม) ในขณะที่โหนดไม่ได้นำประโยชน์ทางการเงินโดยตรงมาสู่ผู้ใช้ของมัน
reviewed: true
question: ¿Cuál es la diferencia económica entre un nodo y un minero?
answer: El Minero recibe recompensas, el nodo no tiene ganancia directa
wrong_answers:
  - El nodo recibe una tasa, el minero recibe una subvención en bloque
  - El nodo recibe recompensas, el minero no tiene ganancia directa
  - Ambos reciben los mismos premios
explanation: |
  Los mineros reciben recompensas (subvenciones y tasas), mientras que un nodo no aporta ningún beneficio económico directo a su usuario.
reviewed: true

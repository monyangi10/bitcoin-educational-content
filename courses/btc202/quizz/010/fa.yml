question: تفاوت اقتصادی بین یک نود و یک Miner چیست؟
answer: Miner پاداش دریافت می‌کند، نود سود مستقیمی ندارد
wrong_answers:
  - گره هزینه دریافت می‌کند، Miner کمک هزینه بلوک دریافت می‌کند
  - گره پاداش دریافت می‌کند، Miner سود مستقیمی ندارد
  - هر دو جوایز یکسانی دریافت می‌کنند
explanation: |
  ماینرها پاداش‌هایی (یارانه‌ها و کارمزدها) دریافت می‌کنند، در حالی که یک نود هیچ سود مالی مستقیمی برای کاربر خود به همراه ندارد.
reviewed: true
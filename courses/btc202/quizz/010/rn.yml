question: Ni itandukaniro irihe ry’ubutunzi hagati ya node na Miner?
answer: Miner ironka ingororano, iyo node nta nyungu itaziguye ifise
wrong_answers:
  - Node yaronse amafaranga, Miner yaronse infashanyo
  - Ico gice kironka impembo, Miner nta nyungu itaziguye ifise
  - Bompi baronka ibihembo bimwe .
explanation: |
  Abacukuzi b’amabuye y’agaciro bararonka impembo (infashanyo n’amahera), mu gihe node nta nyungu y’amahera itaziguye izana ku wuyikoresha.
reviewed: true
question: Каква е икономическата разлика между възел и миньор?
answer: Миньорът получава възнаграждения, но възелът няма пряка печалба
wrong_answers:
  - Възелът получава такса, а миньорът - безвъзмездна помощ за блок
  - Възелът получава награди, а миньорът няма пряка печалба
  - И двамата получават еднакви награди
explanation: |
  Миньорите получават възнаграждения (субсидии и такси), докато даден възел не носи пряка финансова полза на своя потребител.
reviewed: true
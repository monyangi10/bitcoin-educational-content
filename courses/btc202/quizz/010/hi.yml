question: नोड और Miner के बीच आर्थिक अंतर क्या है?
answer: Miner को पुरस्कार प्राप्त होता है, नोड को कोई प्रत्यक्ष लाभ नहीं होता
wrong_answers:
  - नोड को शुल्क प्राप्त होता है, Miner को ब्लॉक अनुदान प्राप्त होता है
  - नोड को पुरस्कार प्राप्त होता है, Miner को कोई प्रत्यक्ष लाभ नहीं होता
  - दोनों को एक ही पुरस्कार प्राप्त हुआ
explanation: |
  खनिकों को पुरस्कार (सब्सिडी और शुल्क) प्राप्त होते हैं, जबकि नोड अपने उपयोगकर्ता को कोई प्रत्यक्ष वित्तीय लाभ नहीं पहुंचाता है।
reviewed: true
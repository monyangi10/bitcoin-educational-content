question: Apa perbedaan ekonomis antara node dan Miner?
answer: Miner menerima hadiah, node tidak memiliki keuntungan langsung
wrong_answers:
  - Node menerima biaya, Miner menerima hibah blok
  - Node menerima hadiah, Miner tidak memiliki keuntungan langsung
  - Keduanya menerima penghargaan yang sama
explanation: |
  Miner menerima imbalan (subsidi dan biaya), sedangkan node tidak memberikan keuntungan finansial secara langsung kepada penggunanya.
reviewed: true

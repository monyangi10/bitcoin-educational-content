question: Quelle est la différence économique entre un nœud et un mineur ?
answer: Le mineur reçoit des récompenses, le nœud aucun gain direct
wrong_answers:
  - Le nœud reçoit les frais, le mineur la subvention de bloc
  - Le nœud reçoit des récompenses, le mineur aucun gain direct
  - Les deux reçoivent les mêmes récompenses
explanation: |
  Les mineurs perçoivent des récompenses (subvention et frais), alors qu’un nœud n’apporte aucun bénéfice financier direct pour son utilisateur.
reviewed: true 

question: What's the economic difference between a node and a miner?
answer: A miner receives rewards; a node has no direct gain
wrong_answers:
  - A node receives fee; a miner receives block grant
  - A node receives rewards; a miner has no direct gain
  - Both receive the same awards
explanation: |
  Miners receive rewards (subsidies and fees), whereas a node brings no direct financial benefit to its user.
reviewed: true

question: Was ist der wirtschaftliche Unterschied zwischen einer Node und einem Miner?
answer: Der Miner erhält Belohnungen, die Node erhält keinen direkten Gewinn
wrong_answers:
  - Die Node erhält Gebühren, der Miner erhält eine Blocksubvention
  - Die Node erhält Belohnungen, der Miner bekommt keinen direkten Gewinn
  - Beide erhalten die gleichen Belohnungen
explanation: |
  Miner erhalten Belohnungen (Subventionen und Gebühren), während eine Node ihrem Nutzer keinen direkten finanziellen Nutzen bringt.
reviewed: true

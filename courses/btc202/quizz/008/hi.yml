question: Bitcoin Wallet का मुख्य कार्य क्या है?
answer: निजी कुंजियों का भंडारण और प्रबंधन
wrong_answers:
  - संपूर्ण Blockchain को संग्रहीत और प्रबंधित करें
  - ब्लॉक वैधता की जाँच करें
  - रिले नेटवर्क लेनदेन
explanation: |
  Bitcoin Wallet निजी कुंजियों का प्रबंधन करता है जो बिटकॉइन को खर्च करने में सक्षम बनाती हैं, लेकिन नोड का कार्य नहीं करती हैं।
reviewed: true
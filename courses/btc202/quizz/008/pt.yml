question: Qual é a principal função de um Bitcoin Wallet?
answer: Armazenamento e gestão de chaves privadas
wrong_answers:
  - Armazenar e gerir o Blockchain completo
  - Verificar a validade do bloco
  - Transacções de rede de retransmissão
explanation: |
  Um Bitcoin Wallet gere as chaves privadas que permitem gastar bitcoins, mas não desempenha as funções de um nó.
reviewed: true
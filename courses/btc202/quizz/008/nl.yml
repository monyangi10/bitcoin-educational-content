question: Wat is de belangrijkste functie van een Bitcoin Wallet?
answer: Privé sleutels opslaan en beheren
wrong_answers:
  - De volledige Blockchain opslaan en beheren
  - Controleer de geldigheid van het blok
  - Relay-netwerktransacties
explanation: |
  Een Bitcoin Wallet beheert de private sleutels waarmee bitcoins kunnen worden uitgegeven, maar voert niet de functies van een knooppunt uit.
reviewed: true
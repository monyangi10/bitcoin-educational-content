question: Каква е основната функция на Bitcoin wallet?
answer: Съхраняване и управление на частни ключове
wrong_answers:
  - Съхранявайте и управлявайте целия Blockchain
  - Проверка на валидността на блока
  - Релейни мрежови транзакции
explanation: |
  Bitcoin wallet управлява частните ключове, които позволяват изразходването на биткойни, но не изпълнява функциите на възел.
reviewed: true
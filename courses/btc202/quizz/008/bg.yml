question: Каква е основната функция на Bitcoin портфейла?
answer: Съхраняване и управление на частни ключове
wrong_answers:
  - Съхранявайте и управлявайте целия блокчейн
  - Проверка на валидността на блока
  - Релейни мрежови транзакции
explanation: |
  Биткойн портфейлът управлява частните ключове, които позволяват изразходването на биткойни, но не изпълнява функциите на възел.
reviewed: true

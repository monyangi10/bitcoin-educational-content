question: หน้าที่หลักของ Bitcoin wallet คืออะไร?
answer: การจัดเก็บและจัดการคีย์ส่วนตัว
wrong_answers:
  - จัดเก็บและจัดการ Blockchain ทั้งหมด
  - ตรวจสอบความถูกต้องของบล็อก
  - ธุรกรรมเครือข่ายรีเลย์
explanation: |
  Bitcoin wallet จัดการคีย์ส่วนตัวที่ช่วยให้สามารถใช้จ่ายบิตคอยน์ได้ แต่ไม่ได้ทำหน้าที่ของโหนด
reviewed: true
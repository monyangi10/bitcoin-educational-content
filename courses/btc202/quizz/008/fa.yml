question: عملکرد اصلی یک Bitcoin Wallet چیست؟
answer: ذخیره و مدیریت کلیدهای خصوصی
wrong_answers:
  - ذخیره و مدیریت کامل Blockchain
  - بررسی اعتبار بلوک
  - تراکنش‌های شبکه رله
explanation: |
  یک Bitcoin Wallet کلیدهای خصوصی را که امکان خرج کردن بیت‌کوین‌ها را فراهم می‌کنند مدیریت می‌کند، اما عملکردهای یک نود را انجام نمی‌دهد.
reviewed: true
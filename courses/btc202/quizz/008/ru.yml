question: Какова основная функция Bitcoin Wallet?
answer: Хранение и управление закрытыми ключами
wrong_answers:
  - Храните и управляйте полным комплектом Blockchain
  - Проверка валидности блока
  - Транзакции в ретрансляционной сети
explanation: |
  Bitcoin Wallet управляет закрытыми ключами, которые позволяют тратить биткоины, но не выполняет функции узла.
reviewed: true
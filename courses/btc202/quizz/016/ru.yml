question: Кто был последним главным сопровождающим Bitcoin core до того, как эта роль была упразднена в 2023 году?
answer: Владимир Дж. Ван Дер Лаан
wrong_answers:
  - Гэвин Андресен
  - Питер Вуйль
  - Satoshi Накамото
explanation: |
  Владимир Дж. Ван Дер Лаан занимал эту должность с 2014 по 2023 год, сменив Гэвина Андресена и предшествуя прекращению его деятельности.
reviewed: true
question: Ko je bio poslednji glavni održavalac Bitcoin Core-a pre nego što je ova uloga ukinuta 2023. godine?
answer: Wladimir J. Van Der Laan
wrong_answers:
  - Gavin Andresen
  - Pieter Wuille
  - Satoshi Nakamoto
explanation: |
  Wladimir J. Van Der Laan je ovu funkciju vršio od 2014. do 2023, nasledivši Gavina Andresena, pre nego što je uloga ukinuta.
reviewed: true

question: Кой беше последният главен поддържащ на ядрото на Bitcoin преди тази роля да бъде премахната през 2023 г.?
answer: Владимир Й. Ван Дер Лаан
wrong_answers:
  - Гавин Андресен
  - Питер Вуйе
  - Satoshi Nakamoto
explanation: |
  Владимир Й. Ван Дер Лаан заемаше тази длъжност от 2014 г. до 2023 г., наследявайки Гавин Андресен и преди прекратяването на длъжността.
reviewed: true
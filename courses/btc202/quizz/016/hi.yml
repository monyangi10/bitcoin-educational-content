question: 2023 में इस भूमिका को समाप्त किए जाने से पहले अंतिम Bitcoin core मुख्य अनुरक्षक कौन था?
answer: व्लादिमीर जे. वैन डेर लायन
wrong_answers:
  - गेविन एंड्रेसन
  - पीटर वुइले
  - Satoshi नाकामोटो
explanation: |
  व्लादिमीर जे. वान डेर लायन ने 2014 से 2023 तक यह पद संभाला, वे गेविन एंड्रेसन के उत्तराधिकारी थे और इस पद को समाप्त कर दिया गया था।
reviewed: true
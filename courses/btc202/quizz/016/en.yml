question: Who was the last Bitcoin core main maintainer before this role was abolished in 2023?
answer: Wladimir J. Van Der Laan
wrong_answers:
  - Gavin Andresen
  - Pieter Wuille
  - Satoshi Nakamoto
explanation: |
  Wladimir J. Van Der Laan held this role from 2014 to 2023, after Gavin Andresen and before the role was discontinued.

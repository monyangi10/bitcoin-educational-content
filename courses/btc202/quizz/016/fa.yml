question: آخرین نگهدارنده اصلی Bitcoin core قبل از لغو این نقش در سال 2023 چه کسی بود؟
answer: ولادیمیر جی. ون در لان
wrong_answers:
  - گوین آندرسن
  - پیتر ویل
  - Satoshi ناکاموتو
explanation: |
  ولادیمیر جی. ون در لان این نقش را از سال ۲۰۱۴ تا ۲۰۲۳ بر عهده داشت و جانشین گوین آندرسن شد و قبل از توقف این نقش بود.
reviewed: true
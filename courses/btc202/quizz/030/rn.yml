question: Ni akamaro akahe nyamukuru k’urudodo-mu-sandugu ku gushirwa mu ngiro kw’ibintu bitagiramwo ivyatsi?
answer: Gushiramwo vyoroshe no gucunga porogaramu zihuriweko
wrong_answers:
  - Gusuzuma bikomeye amategeko y'ubumwe
  - Ushobora gushika kuri Blockchain ata bubiko
  - Uguhuza n’iyindi mafaranga atari Bitcoin.
explanation: |
  Node-in-a-box yorosha gushiramwo no gucunga ibikorwa vyinshi vy'inyongera biciye ku Interface yunze ubumwe.
reviewed: true
question: Koja je glavna prednost node-in-a-box u odnosu na sirovu implementaciju?
answer: Pojednostavljena instalacija i integrisano upravljanje aplikacijama
wrong_answers:
  - Stroža verifikacija pravila konsenzusa
  - Direktan pristup Blockchain-u bez skladištenja
  - Kompatibilnost sa valutom koja nije Bitcoin
explanation: |
  Node-in-a-box ili u prevodu čvor-u-kutiji pojednostavljuje instalaciju i upravljanje brojnim pomoćnim aplikacijama putem jedinstvenog grafičkog interfejsa.
reviewed: true

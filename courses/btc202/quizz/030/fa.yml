question: مزیت اصلی یک "گره در جعبه" نسبت به پیاده‌سازی خام چیست؟
answer: نصب آسان و مدیریت یکپارچه برنامه
wrong_answers:
  - راستی‌آزمایی سختگیرانه‌تر قوانین اجماع
  - دسترسی مستقیم به Blockchain بدون ذخیره‌سازی
  - سازگاری با ارزی غیر از Bitcoin
explanation: |
  گره-در-یک-جعبه نصب و مدیریت برنامه‌های جانبی متعدد را از طریق یک Interface یکپارچه ساده می‌کند.
reviewed: true
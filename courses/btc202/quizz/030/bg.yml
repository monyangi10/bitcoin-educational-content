question: Кое е основното предимство на възел в кутия пред необработеното изпълнение?
answer: Лесна инсталация и интегрирано управление на приложенията
wrong_answers:
  - По-строга проверка на правилата за консенсус
  - Директен достъп до Blockchain без съхранение
  - Съвместимост с валута, различна от Bitcoin
explanation: |
  Възелът в кутията опростява инсталирането и управлението на многобройни допълнителни приложения чрез унифициран Interface.
reviewed: true
question: ¿Cuál es la principal ventaja de un node-in-a-box frente a una aplicación sin procesar?
answer: Fácil instalación y gestión integrada de aplicaciones
wrong_answers:
  - Verificación más estricta de las normas de consenso
  - Acceso directo a Blockchain sin almacenamiento
  - Compatibilidad con una moneda distinta de Bitcoin
explanation: |
  El node-in-a-box simplifica la instalación y gestión de numerosas aplicaciones auxiliares a través de una interfaz unificada.
reviewed: true

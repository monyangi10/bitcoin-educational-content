question: Какво може да прави параметърът dbcache в Bitcoin Core?
answer: Разпределяне на RAM за ускоряване на IBD
wrong_answers:
  - Определяне на размера на блокчейна
  - Регулиране на максималната трудност на копаене
  - Ограничаване на броя на свързаните партньори
explanation: |
  Параметърът dbcache увеличава пространството в паметта, използвано за временно съхранение на набора UTXO, което може да ускори процеса на първоначална синхронизация.
reviewed: true

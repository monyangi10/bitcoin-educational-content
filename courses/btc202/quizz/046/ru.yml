question: Что может делать параметр dbcache в Bitcoin core?
answer: Выделите оперативную память для ускорения IBD
wrong_answers:
  - Определите размер Blockchain
  - Настройка максимальной сложности Mining
  - Ограничьте количество подключенных пиров
explanation: |
  Параметр dbcache увеличивает объем памяти, используемой для временного хранения набора UTXO, что может ускорить процесс начальной синхронизации.
reviewed: true
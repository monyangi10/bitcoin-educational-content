question: پارامتر dbcache در Bitcoin core چه کاری می‌تواند انجام دهد؟
answer: اختصاص دادن RAM برای تسریع IBD
wrong_answers:
  - اندازه Blockchain را تعریف کنید.
  - تنظیم حداکثر سختی Mining
  - تعداد همتایان متصل را محدود کنید
explanation: |
  پارامتر dbcache فضای حافظه‌ای را که برای ذخیره موقت مجموعه UTXO استفاده می‌شود، افزایش می‌دهد که می‌تواند فرآیند همگام‌سازی اولیه را تسریع کند.
reviewed: true
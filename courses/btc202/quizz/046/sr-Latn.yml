question: Šta može parametar dbcache da uradi u Bitcoin Core-u?
answer: Dodeli RAM za ubrzanje IBD
wrong_answers:
  - Definiše veličinu Blockchain-a
  - Podesi maksimalnu težinu rudarenja
  - Ograniči broj povezanih čvorova
explanation: |
  Parametar dbcache povećava memorijski prostor koji se koristi za privremeno skladištenje UTXO seta, što može ubrzati početni proces sinhronizacije.
reviewed: true

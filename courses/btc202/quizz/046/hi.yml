question: Bitcoin core में dbcache पैरामीटर क्या कर सकता है?
answer: IBD को गति देने के लिए RAM आवंटित करें
wrong_answers:
  - Blockchain आकार परिभाषित करें
  - अधिकतम Mining कठिनाई समायोजित करें
  - कनेक्टेड पीयर्स की संख्या सीमित करें
explanation: |
  dbcache पैरामीटर UTXO सेट को अस्थायी रूप से संग्रहीत करने के लिए उपयोग किए जाने वाले मेमोरी स्थान को बढ़ाता है, जो प्रारंभिक सिंक्रनाइज़ेशन प्रक्रिया को तेज कर सकता है।
reviewed: true
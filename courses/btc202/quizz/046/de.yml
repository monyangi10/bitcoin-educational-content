question: Was bewirkt der dbcache-Parameter in Bitcoin Core?
answer: Zuweisung von RAM zur Beschleunigung des IBD
wrong_answers:
  - Blockchain-Größe definieren
  - Anpassung der maximalen Mining-Schwierigkeit
  - Begrenzung der Anzahl der verbundenen Peers
explanation: |
  Der Parameter dbcache vergrößert den Speicherplatz, der für die vorübergehende Speicherung des UTXO-Set verwendet wird, was den anfänglichen Synchronisierungsprozess beschleunigen kann.
reviewed: true

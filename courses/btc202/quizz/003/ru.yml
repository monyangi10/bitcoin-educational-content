question: Как пишет Эрик Воскуил в книге "Криптоэкономика", на чем основана безопасность Bitcoin?
answer: Об отдельных людях
wrong_answers:
  - На Blockchain
  - О мощности Hash
  - О криптографии
explanation: |
  Эрик Воскуил объясняет, что безопасность Bitcoin зависит прежде всего от людей, которые рискуют, обслуживая систему.
reviewed: true
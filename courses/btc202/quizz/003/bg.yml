question: Според Ерик Воскуил в книгата "Криптоикономика" на какво се основава сигурността на Bitcoin?
answer: физически лица
wrong_answers:
  - блокчейн
  - мощността на хеша
  - криптографията
explanation: |
  Ерик Воскуил обяснява, че сигурността на Bitcoin зависи преди всичко от хората, които поемат рискове, за да поддържат системата.
reviewed: true

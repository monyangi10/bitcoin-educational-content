question: क्रिप्टोइकॉनॉमिक्स पुस्तक में एरिक वोस्कुइल के अनुसार, Bitcoin की सुरक्षा किस पर आधारित है?
answer: व्यक्तियों पर
wrong_answers:
  - Blockchain पर
  - Hash पावर के बारे में
  - क्रिप्टोग्राफी के बारे में
explanation: |
  एरिक वोस्कुइल बताते हैं कि Bitcoin की सुरक्षा मुख्य रूप से उन लोगों पर निर्भर करती है जो सिस्टम को बनाए रखने के लिए जोखिम उठाते हैं।
reviewed: true
question: Secondo Eric Voskuil nel libro Cryptoeconomics, su cosa si basa la sicurezza di Bitcoin?
answer: Sui singoli
wrong_answers:
  - Sulla blockchain
  - Informazioni sulla potenza hash
  - Informazioni sulla crittografia
explanation: |
  Eric Voskuil spiega che la sicurezza di Bitcoin si basa soprattutto sulle persone che si assumono i rischi per la manutenzione del sistema.
reviewed: true

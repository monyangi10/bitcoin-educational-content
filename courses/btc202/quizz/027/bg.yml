question: Какво е особеното на SPV възела?
answer: Той запазва само заглавията на блоковете
wrong_answers:
  - Той запазва целия блокчейн
  - Той съхранява само най-новите блокове
  - Той запазва само комплекта UTXO, но не и блокчейна
explanation: |
  SPV възелът проверява транзакциите чрез заглавия на блокове и доказателства на Меркъл, без да съхранява пълните данни.
reviewed: true

question: Какво е особеното на SPV възела?
answer: Той запазва само заглавията на блоковете
wrong_answers:
  - Той запазва целия блок Blockchain, тъй като блокът Genesis
  - Той съхранява само най-новите блокове
  - Той запазва само комплекта UTXO, но не и Blockchain
explanation: |
  SPV възел проверява транзакциите чрез заглавия на блокове и доказателства на Меркъл, без да съхранява пълните данни.
reviewed: true
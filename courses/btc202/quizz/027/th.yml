question: อะไรที่พิเศษเกี่ยวกับโหนด SPV?
answer: มันเก็บรักษาไว้เฉพาะส่วนหัวของบล็อก
wrong_answers:
  - มันยังคงรักษา Blockchain ทั้งหมดตั้งแต่บล็อก Genesis
  - มันเก็บเฉพาะบล็อกล่าสุดเท่านั้น
  - มันเก็บเฉพาะชุด UTXO เท่านั้น ไม่ใช่ Blockchain
explanation: |
  โหนด SPV ตรวจสอบธุรกรรมผ่านส่วนหัวของบล็อกและหลักฐานเมอร์เคิล โดยไม่ต้องจัดเก็บข้อมูลทั้งหมด
reviewed: true
question: एसपीवी नोड की क्या विशेषता है?
answer: यह केवल ब्लॉक हेडर को ही बरकरार रखता है
wrong_answers:
  - यह Genesis ब्लॉक के बाद से संपूर्ण Blockchain को बरकरार रखता है
  - यह केवल नवीनतम ब्लॉकों को संग्रहीत करता है
  - यह केवल UTXO सेट रखता है, Blockchain नहीं
explanation: |
  एसपीवी नोड संपूर्ण डेटा संग्रहीत किए बिना, ब्लॉक हेडर और मर्कल प्रूफ के माध्यम से लेनदेन को सत्यापित करता है।
reviewed: true
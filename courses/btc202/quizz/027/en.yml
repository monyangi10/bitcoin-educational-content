question: What's special about an SPV node?
answer: It retains only the block headers
wrong_answers:
  - It retains the entire blockchain since the Genesis block
  - It stores only the most recent blocks
  - It only keeps the UTXO set, not the blockchain
explanation: |
  An SPV node verifies transactions via block headers and Merkle proofs, without storing the complete data.
reviewed: true

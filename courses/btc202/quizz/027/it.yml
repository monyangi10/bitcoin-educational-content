question: Cosa c'è di speciale in un nodo SPV?
answer: Conserva solo gli header del blocco
wrong_answers:
  - Conserva l'intera blockchain dal blocco genesis
  - Memorizza solo i blocchi più recenti
  - Mantiene solo il set UTXO, non la blockchain
explanation: |
  Un nodo SPV verifica le transazioni attraverso le intestazioni dei blocchi e le Merkle proofs, senza memorizzare i dati completi.
reviewed: true

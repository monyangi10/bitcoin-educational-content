question: Šta je posebno u vezi sa SPV čvorom?
answer: Zadržava samo zaglavlja blokova
wrong_answers:
  - Zadržava ceo Blockchain od Genesis bloka
  - Čuva samo najnovije blokove
  - Održava samo UTXO set, ne Blockchain.
explanation: |
  SPV čvor proverava transakcije putem zaglavlja blokova i Merkle dokaza, bez čuvanja kompletnih podataka.
reviewed: true
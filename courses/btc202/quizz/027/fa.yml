question: چه چیزی در مورد یک نود SPV خاص است؟
answer: فقط سرصفحه‌های بلوک را حفظ می‌کند
wrong_answers:
  - این شامل کل Blockchain از زمان بلوک Genesis می‌شود.
  - فقط جدیدترین بلوک‌ها را ذخیره می‌کند
  - فقط مجموعه UTXO را نگه می‌دارد، نه Blockchain را.
explanation: |
  یک نود SPV تراکنش‌ها را از طریق هدرهای بلاک و اثبات‌های مرکل، بدون ذخیره‌سازی داده‌های کامل، تأیید می‌کند.
reviewed: true
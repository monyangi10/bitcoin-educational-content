question: Что особенного в узле SPV?
answer: Он сохраняет только головные части блока
wrong_answers:
  - Он сохраняет весь Blockchain, начиная с блока Genesis
  - В нем хранятся только самые последние блоки
  - Он сохраняет только набор UTXO, но не Blockchain
explanation: |
  Узел SPV проверяет транзакции по заголовкам блоков и доказательствам Меркла, не сохраняя полные данные.
reviewed: true
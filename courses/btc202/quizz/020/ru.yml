question: Что произойдет, если блок нарушит правила консенсуса?
answer: Она немедленно отвергается узлами
wrong_answers:
  - Он хранится в Mempool и ожидает проверки
  - Он передается только узлами, которые принимают другие правила
  - Она подтверждается только кошельками
explanation: |
  Узлы систематически отклоняют любой блок, который не соответствует правилам консенсуса.
reviewed: true
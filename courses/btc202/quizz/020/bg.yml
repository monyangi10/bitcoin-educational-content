question: Какво се случва, ако даден блок наруши правилата на консенсуса?
answer: Веднага се отхвърля от възлите
wrong_answers:
  - Съхранява се в Mempool в очакване на валидиране
  - Предава се само от възли, които приемат други правила
  - валидира се само от портфейлите
explanation: |
  Възлите систематично отхвърлят всеки блок, който не отговаря на правилата за консенсус.
reviewed: true

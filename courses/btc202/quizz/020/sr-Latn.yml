question: Šta se dešava ako blok krši pravila konsenzusa?
answer: Čvorovi ga odmah odbacuju
wrong_answers:
  - Čuva se u Mempool-u i čeka na validaciju
  - Prenose ga samo čvorovi koji prihvataju druga pravila
  - Potvrđen je samo od strane novčanika
explanation: |
  Čvorovi sistematski odbacuju svaki blok koji nije u skladu sa pravilima konsenzusa.
reviewed: true

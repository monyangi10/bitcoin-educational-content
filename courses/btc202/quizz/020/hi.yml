question: यदि कोई ब्लॉक सर्वसम्मति नियमों का उल्लंघन करता है तो क्या होगा?
answer: इसे नोड्स द्वारा तुरंत अस्वीकार कर दिया जाता है
wrong_answers:
  - इसे सत्यापन की प्रतीक्षा में Mempool में संग्रहीत किया जाता है
  - यह केवल उन नोड्स द्वारा रिले किया जाता है जो अन्य नियमों को स्वीकार करते हैं
  - यह केवल वॉलेट द्वारा ही मान्य है
explanation: |
  नोड्स किसी भी ब्लॉक को व्यवस्थित रूप से अस्वीकार कर देते हैं जो सर्वसम्मति नियमों का पालन नहीं करता है।
reviewed: true
question: اگر یک بلوک قوانین اجماع را نقض کند، چه اتفاقی می‌افتد؟
answer: بلافاصله توسط نودها رد می‌شود.
wrong_answers:
  - در Mempool در انتظار اعتبارسنجی ذخیره شده است
  - این تنها توسط نودهایی که قوانین دیگر را می‌پذیرند منتقل می‌شود.
  - فقط توسط کیف‌پول‌ها تأیید می‌شود.
explanation: |
  گره‌ها به‌طور سیستماتیک هر بلوکی را که با قوانین اجماع مطابقت نداشته باشد، رد می‌کنند.
reviewed: true
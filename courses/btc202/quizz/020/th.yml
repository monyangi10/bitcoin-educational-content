question: จะเกิดอะไรขึ้นหากบล็อกละเมิดกฎฉันทามติ?
answer: มันถูกปฏิเสธโดยโหนดทันที
wrong_answers:
  - มันถูกเก็บไว้ใน Mempool รอการตรวจสอบ
  - มันถูกส่งต่อโดยโหนดที่ยอมรับกฎอื่น ๆ เท่านั้น
  - มันได้รับการยืนยันโดยกระเป๋าเงินเท่านั้น
explanation: |
  โหนดจะปฏิเสธบล็อกใด ๆ ที่ไม่เป็นไปตามกฎฉันทามติอย่างเป็นระบบ
reviewed: true
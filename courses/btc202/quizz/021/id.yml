question: Faktor apa yang menentukan pengaruh sebuah node pada aturan konsensus?
answer: Bobot ekonomisnya
wrong_answers:
  - Jumlah koneksi keluarnya
  - Senioritas dalam jaringan
  - Tidak ada, karena setiap node memiliki satu suara
explanation: |
  Pengaruh pada aturan konsensus tergantung pada aktivitas ekonomi yang didukung oleh simpul tersebut, bukan jumlahnya.
reviewed: true
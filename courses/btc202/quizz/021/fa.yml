question: چه عاملی تأثیر یک نود بر قوانین اجماع را تعیین می‌کند؟
answer: وزن اقتصادی آن
wrong_answers:
  - تعداد اتصالات خروجی آن
  - ارشدیت در شبکه
  - هیچ چیز، زیرا هر گره یک رأی دارد
explanation: |
  تأثیر بر قوانین اجماع به فعالیت اقتصادی پشتیبانی‌شده توسط نود بستگی دارد، نه به تعداد آن.
reviewed: true
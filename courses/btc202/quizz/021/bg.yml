question: Кой фактор определя влиянието на даден възел върху правилата за консенсус?
answer: Икономическата му тежест
wrong_answers:
  - Броят на изходящите му връзки
  - Стаж в мрежата
  - Нищо, защото всеки възел има един глас
explanation: |
  Влиянието върху правилата за консенсус зависи от икономическата дейност, поддържана от възела, а не от неговия брой.
reviewed: true
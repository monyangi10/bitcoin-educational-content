question: ปัจจัยใดที่กำหนดอิทธิพลของโหนดต่อกฎฉันทามติ?
answer: น้ำหนักทางเศรษฐกิจของมัน
wrong_answers:
  - จำนวนการเชื่อมต่อขาออกของมัน
  - อาวุโสในเครือข่าย
  - ไม่มีอะไร เพราะแต่ละโหนดมีหนึ่งเสียง
explanation: |
  อิทธิพลต่อกฎฉันทามติขึ้นอยู่กับกิจกรรมทางเศรษฐกิจที่สนับสนุนโดยโหนด ไม่ใช่จำนวนของมัน
reviewed: true
question: Какой фактор определяет влияние узла на правила консенсуса?
answer: Его экономический вес
wrong_answers:
  - Количество исходящих соединений
  - Стаж работы в сети
  - Ничего, потому что каждый узел имеет один голос
explanation: |
  Влияние на правила консенсуса зависит от экономической активности, поддерживаемой узлом, а не от его количества.
reviewed: true
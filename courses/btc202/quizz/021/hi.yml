question: कौन सा कारक सर्वसम्मति नियमों पर नोड के प्रभाव को निर्धारित करता है?
answer: इसका आर्थिक भार
wrong_answers:
  - इसके आउटगोइंग कनेक्शनों की संख्या
  - नेटवर्क में वरिष्ठता
  - कुछ नहीं, क्योंकि प्रत्येक नोड के पास एक वोट होता है
explanation: |
  सर्वसम्मति नियमों पर प्रभाव नोड द्वारा समर्थित आर्थिक गतिविधि पर निर्भर करता है, न कि उसकी संख्या पर।
reviewed: true
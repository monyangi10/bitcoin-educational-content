question: Welcher Faktor bestimmt den Einfluss einer Node auf die Konsensregeln?
answer: Sein wirtschaftliches Gewicht
wrong_answers:
  - Die Anzahl der ausgehenden Verbindungen
  - Dienstalter im Netzwerk
  - Nichts, denn jede Node hat eine Stimme
explanation: |
  Der Einfluss auf die Konsensregeln hängt von der Wirtschaftstätigkeit ab, die von der Node unterstützt wird.
reviewed: true

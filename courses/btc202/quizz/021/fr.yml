question: Quel facteur détermine l’influence d’un nœud sur les règles de consensus ?
answer: Son poids économique
wrong_answers:
  - Son nombre de connexions sortantes
  - Son ancienneté dans le réseau
  - Rien, car chaque nœud dispose d'un droit de vote
explanation: |
  L’influence sur les règles de consensus dépend de l’activité économique soutenue par le nœud, et non de leur nombre.
reviewed: false

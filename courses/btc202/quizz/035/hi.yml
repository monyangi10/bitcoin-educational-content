question: बिजली की विफलता की स्थिति में नोड की सुरक्षा के लिए किस घटक की सिफारिश की जाती है?
answer: एक इन्वर्टर
wrong_answers:
  - एक दूसरा ग्राफिक्स कार्ड
  - एक अतिरिक्त राउटर
  - एक यूएसबी हब
explanation: |
  इन्वर्टर बिजली की विफलता की स्थिति में अचानक शटडाउन को रोकता है और नोड की स्थिरता की रक्षा करता है।
reviewed: true
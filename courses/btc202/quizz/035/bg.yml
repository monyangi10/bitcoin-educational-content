question: Кой компонент се препоръчва за защита на възел в случай на прекъсване на захранването?
answer: Инвертор
wrong_answers:
  - Втора графична карта
  - Допълнителен маршрутизатор
  - USB концентратор
explanation: |
  Инверторът предотвратява внезапни изключвания в случай на прекъсване на електрозахранването и защитава стабилността на възела.
reviewed: true
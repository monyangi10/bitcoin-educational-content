question: Какой компонент рекомендуется для защиты узла в случае отключения питания?
answer: Инвертор
wrong_answers:
  - Вторая видеокарта
  - Дополнительный маршрутизатор
  - USB-концентратор
explanation: |
  Инвертор предотвращает внезапные отключения в случае сбоя питания и обеспечивает стабильность работы узла.
reviewed: true
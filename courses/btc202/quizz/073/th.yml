question: ฟังก์ชันของพารามิเตอร์ assumevalid ใน Bitcoin core คืออะไร?
answer: เพิกเฉยต่อการตรวจสอบสคริปต์ก่อนบล็อกอ้างอิง
wrong_answers:
  - ละเว้นการตรวจสอบ proof-of-work ก่อนบล็อกอ้างอิง
  - ละเว้นการตรวจสอบส่วนหัวก่อนบล็อกอ้างอิง
  - บังคับใช้ Tor สำหรับการค้นหาเพียร์
explanation: |
  Assumevalid ช่วยเพิ่มความเร็วให้กับ IBD โดยการไม่ตรวจสอบสคริปต์ก่อนบล็อกที่รู้จัก ในขณะที่ยังคงการตรวจสอบอื่นๆ ทั้งหมด
reviewed: true
question: Какова функция параметра assumevalid в Bitcoin core?
answer: Игнорирование проверки сценария перед блоком ссылок
wrong_answers:
  - Игнорирование проверки Proof-of-Work перед опорным блоком
  - Игнорирование проверки заголовка перед блоком ссылки
  - Принудительное использование Tor для обнаружения сверстников
explanation: |
  Assumevalid ускоряет работу IBD, игнорируя проверку скрипта перед известным блоком и сохраняя при этом все остальные проверки.
reviewed: true
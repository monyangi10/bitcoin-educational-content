question: Каква е функцията на параметъра assumevalid в Bitcoin core?
answer: Игнориране на проверката на скрипта преди референтен блок
wrong_answers:
  - Игнориране на проверката на proof-of-work преди референтен блок
  - Игнориране на проверката на заглавието преди референтен блок
  - Принудително използване на Tor за откриване на връстници
explanation: |
  Функцията Assumevalid ускорява IBD, като игнорира проверката на скрипта преди известен блок, като запазва всички останали проверки.
reviewed: true
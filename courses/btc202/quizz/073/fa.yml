question: عملکرد پارامتر assumevalid در Bitcoin core چیست؟
answer: نادیده گرفتن تأیید اسکریپت قبل از یک بلوک مرجع
wrong_answers:
  - اعتبار Proof-of-Work را قبل از یک بلوک مرجع نادیده بگیرید.
  - نادیده گرفتن تأیید هدر قبل از بلوک مرجع
  - اجبار تور برای کشف همتا
explanation: |
  فرض‌اعتبار با نادیده گرفتن تأیید اسکریپت قبل از یک بلوک شناخته‌شده، در حالی که تمام اعتبارسنجی‌های دیگر را حفظ می‌کند، IBD را تسریع می‌بخشد.
reviewed: true
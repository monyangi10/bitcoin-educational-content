question: Je, ni kazi gani ya kigezo halali katika Bitcoin core?
answer: Puuza uthibitishaji wa hati kabla ya block ya marejeleo
wrong_answers:
  - Puuza uthibitishaji wa Proof-of-Work kabla ya kizuizi cha marejeleo
  - Puuza uthibitishaji wa kichwa kabla ya block ya marejeleo
  - Lazimisha Tor kwa ugunduzi wa peer
explanation: |
  Assumevalid huharakisha IBD kwa kupuuza uthibitishaji wa hati kabla ya block inayojulikana, huku ikihifadhi uthibitishaji mwingine wote.
reviewed: true

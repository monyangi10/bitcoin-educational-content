question: Was ist die Funktion des Parameters assumevalid in Bitcoin core?
answer: Skriptüberprüfung vor einem Referenzblock ignorieren
wrong_answers:
  - Proof-of-Work-Überprüfung vor einem Referenzblock ignorieren
  - Kopfverifizierung vor einem Referenzblock ignorieren
  - Erzwinge Tor für Peer Discovery
explanation: |
  Assumevalid beschleunigt IBD, indem es die Skriptverifizierung vor einem bekannten Block ignoriert, während alle anderen Validierungen beibehalten werden.
reviewed: true
question: Koja je funkcija assumevalid parametra u Bitcoin Core-u?
answer: Ignorisanje verifikacije skripti pre određenog referentnog bloka
wrong_answers:
  - Ignorisanje Proof-of-Work verifikacije pre određenog referentnog bloka
  - Ignorisanje provere zaglavlja pre određenog referentnog bloka
  - Primorati čvor da koristi Tor za pronalaženje drugih čvorova na mreži
explanation: |
  Assumevalid ubrzava IBD ignorišući verifikaciju skripti pre određenog referentnog bloka, dok zadržava sve ostale validacije.
reviewed: true

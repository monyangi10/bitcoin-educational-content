question: Bitcoin core में assumevalid पैरामीटर का कार्य क्या है?
answer: संदर्भ ब्लॉक से पहले स्क्रिप्ट सत्यापन को अनदेखा करें
wrong_answers:
  - संदर्भ ब्लॉक से पहले Proof-of-Work सत्यापन को अनदेखा करें
  - संदर्भ ब्लॉक से पहले हेडर सत्यापन को अनदेखा करें
  - सहकर्मी खोज के लिए टोर को बाध्य करें
explanation: |
  Assumevalid किसी ज्ञात ब्लॉक से पहले स्क्रिप्ट सत्यापन को अनदेखा करके IBD को गति प्रदान करता है, जबकि अन्य सभी सत्यापनों को बरकरार रखता है।
reviewed: true
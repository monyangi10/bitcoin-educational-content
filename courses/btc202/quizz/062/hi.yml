question: कौन सा अम्ब्रेल एप्लिकेशन आपको उन्नत Interface के साथ अपने लाइटनिंग नोड को प्रबंधित करने देता है?
answer: बिजली की सवारी
wrong_answers:
  - बीटीसीपे लाइटनिंग
  - नोस्ट्र रिले
  - बिटफीड
explanation: |
  राइड द लाइटनिंग और थंडरहब लाइटनिंग नोड के प्रबंधन के लिए एक पूर्ण वेब-आधारित Interface प्रदान करते हैं।
reviewed: true
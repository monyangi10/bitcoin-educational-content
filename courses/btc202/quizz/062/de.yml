question: Mit welcher Umbrel-Anwendung kannst du deine Lightning Node mit einem erweiterten Interface verwalten?
answer: Ride The Lightning
wrong_answers:
  - BTCPay-Blitz
  - Nostr-Relais
  - Bitfeed
explanation: |
  Ride The Lightning und ThunderHub bieten ein komplettes webbasiertes Interface für die Verwaltung einer Lightning Node.
reviewed: true

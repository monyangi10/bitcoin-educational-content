question: Quale applicazione Umbrel consente di gestire il nodo Lightning con un'interfaccia avanzata?
answer: Ride The Lightning
wrong_answers:
  - BTCPay Lightning
  - Nostr Relay
  - Bitfeed
explanation: |
  Ride The Lightning e ThunderHub offrono un'interfaccia completa basata sul web per l'amministrazione di un nodo Lightning.
reviewed: true

question: Кое приложение на Umbrel ви позволява да управлявате възел в Lightning с усъвършенстван интерфейс?
answer: Ride The Lightning
wrong_answers:
  - BTCPay Lightning
  - Nostr Relay
  - Bitfeed
explanation: |
  Ride The Lightning и ThunderHub предлагат пълен уеб базиран интерфейс за администриране на възел в Lightning.
reviewed: true

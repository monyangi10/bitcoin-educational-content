question: Koji je podrazumevani broj odlaznih veza koje Bitcoin Core čvor održava?
answer: 10
wrong_answers:
  - 2
  - 4
  - 3
explanation: |
  Bitcoin Core održava 10 odlaznih veza po podrazumevanim postavkama (8 full releja čvorova (prosleđuju i transakcije i blokove) i 2 samo za blok-relej).
reviewed: true

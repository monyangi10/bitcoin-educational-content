question: Ni ubuhe bwoko bw’imashini yerekanwa nk’uburyo bwiza bwo gusenyera ku mugozi umwe ku bijanye n’urudodo rwo mu nzu rwa Bitcoin?
answer: PC ntoyi y'ubwoko bwa NUC
wrong_answers:
  - Mudasobwa y'iminwe
  - Mudasobwa ikomeye cane
  - Igikoresho co gukina
explanation: |
  Ama PC mato mato (NUC, Tiny, OptiPlex Micro...) akoresha amashanyarazi make, ni ay’ukwizigirwa, kandi yoroshe guhindura, ivyo bikaba bituma ari yo meza cane.
reviewed: true
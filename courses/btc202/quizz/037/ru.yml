question: Какой тип машины представляется наилучшим компромиссом для домашнего узла Bitcoin?
answer: Мини-ПК типа NUC
wrong_answers:
  - Портативный компьютер
  - Суперкомпьютер
  - Игровая приставка
explanation: |
  Мини-ПК (NUC, Tiny, OptiPlex Micro...) отличаются низким энергопотреблением, надежностью и простотой адаптации, что делает их идеальным компромиссом.
reviewed: true
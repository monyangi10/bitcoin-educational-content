question: چه نوع ماشینی به عنوان بهترین سازش برای یک نود خانگی Bitcoin ارائه شده است؟
answer: یک مینی‌کامپیوتر نوع NUC
wrong_answers:
  - کامپیوتر لپ‌تاپ
  - یک ابررایانه
  - یک کنسول بازی
explanation: |
  مینی‌پی‌سی‌ها (NUC، Tiny، OptiPlex Micro...) مصرف برق کمی دارند، قابل اعتماد هستند و به راحتی قابل تطبیق‌اند، که آن‌ها را به یک سازش ایده‌آل تبدیل می‌کند.
reviewed: true
question: Bitcoin होम नोड के लिए किस प्रकार की मशीन सर्वोत्तम विकल्प के रूप में प्रस्तुत की जाती है?
answer: एक NUC-प्रकार का मिनी-पीसी
wrong_answers:
  - लैपटॉप कंप्यूटर
  - एक सुपर कंप्यूटर
  - एक गेम कंसोल
explanation: |
  मिनी-पीसी (एनयूसी, टाइनी, ऑप्टिप्लेक्स माइक्रो...) कम बिजली खपत वाले, विश्वसनीय और अनुकूलन में आसान होते हैं, जो उन्हें आदर्श विकल्प बनाता है।
reviewed: true
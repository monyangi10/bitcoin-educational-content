question: Кой тип машина е представен като най-добрия компромис за домашен възел Bitcoin?
answer: Миникомпютър от типа NUC
wrong_answers:
  - Преносим компютър
  - Суперкомпютър
  - Конзола за игри
explanation: |
  Миникомпютрите (NUC, Tiny, OptiPlex Micro...) са с ниска консумация на енергия, надеждни и лесни за адаптиране, което ги прави идеален компромис.
reviewed: true
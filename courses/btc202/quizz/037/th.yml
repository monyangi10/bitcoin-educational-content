question: เครื่องประเภทใดที่นำเสนอเป็นการประนีประนอมที่ดีที่สุดสำหรับโหนดบ้าน Bitcoin?
answer: มินิพีซีประเภท NUC
wrong_answers:
  - แล็ปท็อปคอมพิวเตอร์
  - ซูเปอร์คอมพิวเตอร์
  - เครื่องเล่นเกมคอนโซล
explanation: |
  Mini-PCs (NUC, Tiny, OptiPlex Micro...) มีการใช้พลังงานต่ำ, เชื่อถือได้, และปรับตัวได้ง่าย ทำให้เป็นทางเลือกที่เหมาะสมที่สุด
reviewed: true
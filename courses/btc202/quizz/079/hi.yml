question: नई फ़ाइल बनाने से पहले blkNNNNN.dat फ़ाइल का अधिकतम आकार क्या है?
answer: 128 एमबी
wrong_answers:
  - 256 एमबी
  - 256 गीगाबाइट
  - 128 गीगाबाइट
explanation: |
  blkNNNNN.dat फ़ाइलें ब्लॉकों को क्रमिक रूप से संग्रहीत करती हैं और Bitcoin core द्वारा अगले ब्लॉक को खोलने से पहले लगभग 128 MiB के आकार तक पहुँच जाती हैं।
reviewed: true
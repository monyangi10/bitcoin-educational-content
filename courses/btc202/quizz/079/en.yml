question: What is the maximum size of a blkNNNNN.dat file before a new file is created?
answer: 128 MiB
wrong_answers:
  - 256 MiB
  - 256 GiB
  - 128 GiB
explanation: |
  The blkNNNNN.dat files store the blocks sequentially and reach a size of around 128 MiB before Bitcoin Core opens the next one.
reviewed: true

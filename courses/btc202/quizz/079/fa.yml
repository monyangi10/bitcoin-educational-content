question: حداکثر اندازه یک فایل blkNNNNN.dat قبل از ایجاد یک فایل جدید چقدر است؟
answer: ۱۲۸ مگابایت
wrong_answers:
  - ۲۵۶ مگابایت
  - ۲۵۶ گیگابایت
  - ۱۲۸ گیگابایت
explanation: |
  فایل‌های blkNNNNN.dat بلوک‌ها را به صورت متوالی ذخیره می‌کنند و به اندازه‌ای حدود 128 مگابایت می‌رسند قبل از اینکه Bitcoin core فایل بعدی را باز کند.
reviewed: true
question: Какъв е максималният размер на файла blkNNNNN.dat, преди да бъде създаден нов файл?
answer: 128 MiB
wrong_answers:
  - 256 MiB
  - 256 гигабайта
  - 128 GiB
explanation: |
  Файловете blkNNNNN.dat съхраняват блоковете последователно и достигат размер от около 128 MiB, преди ядрото Bitcoin да отвори следващия.
reviewed: true
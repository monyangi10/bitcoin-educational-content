question: Tahap mana yang merupakan bagian dari peran Miner?
answer: Membentuk blok kandidat dari Mempool
wrong_answers:
  - Validasi seluruh Blockchain dari Mempool
  - Membuat alamat Bitcoin untuk pengguna
  - Menyimpan kunci pribadi untuk Wallet
explanation: |
  Miner memilih transaksi dari Mempool dan membangun blok kandidat, yang akan divalidasi oleh Proof of Work.
reviewed: true

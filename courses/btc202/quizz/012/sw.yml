question: Ni hatua gani ni sehemu ya jukumu la mtoto mdogo?
answer: Kujenga block ya mgombea kutoka Mempool
wrong_answers:
  - Thibitisha Blockchain nzima kutoka Mempool
  - Unda anwani za Bitcoin kwa watumiaji
  - Hifadhi funguo za kibinafsi za pochi
explanation: |
  Miner huchagua shughuli kutoka kwa Mempool na kuunda block ya mgombea, ambacho anajaribu kuhalalisha na Proof of Work.
reviewed: true

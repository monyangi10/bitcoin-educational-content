question: ขั้นตอนใดเป็นส่วนหนึ่งของบทบาทของคนงานเหมือง?
answer: กำลังสร้างบล็อกผู้สมัครจาก Mempool
wrong_answers:
  - ยืนยันความถูกต้องของ Blockchain ทั้งหมดจาก Mempool
  - สร้างที่อยู่ Bitcoin สำหรับผู้ใช้
  - จัดเก็บคีย์ส่วนตัวสำหรับกระเป๋าสตางค์
explanation: |
  คนขุดเหมืองเลือกธุรกรรมจาก Mempool และสร้างบล็อกผู้สมัคร ซึ่งเขาพยายามตรวจสอบโดย proof of work.
reviewed: true
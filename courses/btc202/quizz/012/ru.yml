question: Какой этап входит в роль несовершеннолетнего?
answer: Создание блока-кандидата из Mempool
wrong_answers:
  - Проверьте весь Blockchain из Mempool
  - Создание адресов Bitcoin для пользователей
  - Храните закрытые ключи для кошельков
explanation: |
  Miner выбирает транзакции из Mempool и строит блок-кандидат, который пытается подтвердить Proof of Work.
reviewed: true
question: Welche Phase gehört zu den Aufgaben eines Miners?
answer: Aufbau eines Kandidatenblocks aus dem Mempool
wrong_answers:
  - Validierung der gesamten Blockchain aus dem Mempool
  - Bitcoin-Adressen für Benutzer erstellen
  - Private Schlüssel für Wallets speichern
explanation: |
  Ein Miner wählt Transaktionen aus dem Mempool aus und erstellt einen Kandidatenblock, den er versucht, durch Proof-of-Work zu validieren.
reviewed: true

question: Кой етап е част от ролята на миньора?
answer: Изграждане на кандидат-блок от Mempool (непотвърдените транзакции)
wrong_answers:
  - Утвърждаване на целия блокчейн
  - Създаване на Bitcoin адреси за потребителите
  - Съхраняване на частни ключове за портфейли
explanation: |
  Миньорът избира транзакции от Mempool и изгражда кандидат блок, който се опитва да валидира с proof of work.
reviewed: true

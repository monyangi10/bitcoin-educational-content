question: Кой етап е част от ролята на непълнолетния?
answer: Изграждане на кандидат-блок от Mempool
wrong_answers:
  - Утвърждаване на целия Blockchain от Mempool
  - Създаване на Bitcoin адреси за потребителите
  - Съхраняване на частни ключове за портфейли
explanation: |
  Миньорът избира транзакции от Mempool и изгражда кандидат блок, който се опитва да валидира от proof of work.
reviewed: true
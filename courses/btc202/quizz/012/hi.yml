question: कौन सा चरण नाबालिग की भूमिका का हिस्सा है?
answer: Mempool से एक उम्मीदवार ब्लॉक का निर्माण
wrong_answers:
  - Mempool से संपूर्ण Blockchain को मान्य करें
  - उपयोगकर्ताओं के लिए Bitcoin पते बनाएँ
  - वॉलेट के लिए निजी कुंजियाँ संग्रहीत करें
explanation: |
  Miner, Mempool से लेनदेन का चयन करता है और एक उम्मीदवार ब्लॉक बनाता है, जिसे वह Proof of Work द्वारा सत्यापित करने का प्रयास करता है।
reviewed: true
question: Quale fase fa parte del ruolo di un miner?
answer: Costruire un blocco candidato dalla Mempool
wrong_answers:
  - Convalidare l'intera blockchain da Mempool
  - Creare indirizzi Bitcoin per gli utenti
  - Memorizzare le chiavi private per i wallet
explanation: |
  Un miner seleziona le transazioni dalla Mempool e costruisce un blocco candidato, che tenta di convalidare da parte della Proof of Work.
reviewed: true

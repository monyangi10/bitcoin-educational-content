question: Welke fase maakt deel uit van de rol van een miner?
answer: Een kandidaat-blok bouwen vanuit de Mempool
wrong_answers:
  - Valideer de hele Blockchain van de Mempool
  - Bitcoin adressen aanmaken voor gebruikers
  - Privé sleutels voor portefeuilles opslaan
explanation: |
  Een Miner selecteert transacties uit de Mempool en bouwt een kandidaatblok, dat hij probeert te valideren door Proof of Work.
reviewed: true

question: अम्ब्रेल पर स्थापित नोस्ट्र रिले की क्या भूमिका है?
answer: अपने प्रकाशनों को स्थानीय स्तर पर होस्ट करें
wrong_answers:
  - Bitcoin लेनदेन की जाँच करें
  - अपने संपर्कों के साथ नोस्ट्र चैनल बनाएं
  - Blockchain Nostr का स्थानीय बैकअप
explanation: |
  अम्ब्रेल पर नोस्ट्र रिले डेटा को स्थानीय स्तर पर होस्ट करने में सक्षम बनाता है, जिससे उपलब्धता और संप्रभुता की गारंटी मिलती है।
reviewed: true
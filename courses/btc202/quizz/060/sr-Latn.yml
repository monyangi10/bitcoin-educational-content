question: Koja je uloga Nostr releja instaliranog na Umbrelu?
answer: Hostovanje svojih publikacija lokalno
wrong_answers:
  - Provera Bitcoin transakcije
  - Kreiranje Nostr kanala sa svojim kontaktima
  - Lokalna rezervna kopija Nostr Blockchain-a
explanation: |
  Nostr relej na Umbrelu omogućava da se podaci hostuju lokalno, garantujući dostupnost i suverenitet.
reviewed: true

question: Каква е ролята на релето Nostr, инсталирано в Umbrel?
answer: Хоствайте локално своите публикации
wrong_answers:
  - Проверка на транзакциите Bitcoin
  - Създаване на канали на Nostr с вашите контакти
  - Локално резервно копие на Blockchain Nostr
explanation: |
  Релето на Nostr в Umbrel дава възможност за локално хостване на данни, което гарантира наличност и суверенитет.
reviewed: true
question: บทบาทของรีเลย์ Nostr ที่ติดตั้งบน Umbrel คืออะไร?
answer: โฮสต์สิ่งพิมพ์ของคุณในท้องถิ่น
wrong_answers:
  - ตรวจสอบธุรกรรม Bitcoin
  - สร้างช่อง Nostr กับผู้ติดต่อของคุณ
  - การสำรองข้อมูลในเครื่องของ Blockchain Nostr
explanation: |
  รีเลย์ Nostr บน Umbrel ช่วยให้ข้อมูลถูกโฮสต์ในท้องถิ่น รับประกันความพร้อมใช้งานและอธิปไตย
reviewed: true
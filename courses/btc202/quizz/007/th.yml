question: wallet ต้องทำอย่างไรเพื่อดูสถานะของ Blockchain?
answer: เชื่อมต่อกับโหนดในเครื่องหรือโหนดระยะไกล
wrong_answers:
  - ถามกระเป๋าเงินอื่นๆ ในเครือข่าย
  - สัมภาษณ์นักขุดเครือข่าย
  - เชื่อมต่อกับแพลตฟอร์มแลกเปลี่ยนออนไลน์
explanation: |
  wallet ต้องเชื่อมต่อกับโหนดเพื่อเข้าถึงสถานะ Blockchain และกระจายธุรกรรมของมัน
reviewed: true
question: Что нужно сделать Wallet, чтобы просмотреть статус Blockchain?
answer: Подключение к локальному или удаленному узлу
wrong_answers:
  - Спрашивайте у других кошельков в сети
  - Интервьюирование сетевых майнеров
  - Подключение к онлайн-платформе Exchange
explanation: |
  Wallet должен подключиться к узлу, чтобы получить доступ к статусу Blockchain и транслировать свои транзакции.
reviewed: true
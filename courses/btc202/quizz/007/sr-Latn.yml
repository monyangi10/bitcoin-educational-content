question: Šta novčanik treba da uradi da bi video blokčejn status?
answer: Poveže se na lokalni ili udaljeni čvor
wrong_answers:
  - Pita druge novčanike u mreži
  - Šalje upite rudarima u mreži
  - Poveže se na online menjačnice
explanation: |
  Novčanik mora se povezati na čvor da bi pristupio blokčejn statusu i emitovao svoje transakcije.
reviewed: true

question: Blockchain की स्थिति देखने के लिए Wallet को क्या करना होगा?
answer: किसी स्थानीय या दूरस्थ नोड से कनेक्ट करें
wrong_answers:
  - नेटवर्क में अन्य वॉलेट्स से पूछें
  - नेटवर्क माइनर्स का साक्षात्कार
  - ऑनलाइन Exchange प्लेटफ़ॉर्म से कनेक्ट करें
explanation: |
  Wallet को Blockchain स्थिति तक पहुंचने और अपने लेनदेन को प्रसारित करने के लिए नोड से जुड़ना होगा।
reviewed: true
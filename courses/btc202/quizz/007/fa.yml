question: یک Wallet برای مشاهده وضعیت Blockchain چه کاری باید انجام دهد؟
answer: به یک نود محلی یا راه دور متصل شوید
wrong_answers:
  - از کیف‌پول‌های دیگر در شبکه بپرسید
  - مصاحبه با استخراج‌کنندگان شبکه
  - به یک پلتفرم آنلاین Exchange متصل شوید.
explanation: |
  یک Wallet باید به یک نود متصل شود تا به وضعیت Blockchain دسترسی پیدا کند و تراکنش‌های خود را پخش کند.
reviewed: true
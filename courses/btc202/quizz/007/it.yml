question: Cosa deve fare un wallet per visualizzare lo stato della blockchain?
answer: Collegarsi a un nodo locale o remoto
wrong_answers:
  - Chiedere ad altri portafogli del network
  - Intervistare i minatori del network
  - Collegarsi a una piattaforma Exchange online
explanation: |
  Un wallet deve connettersi a un nodo per accedere allo stato della blockchain e trasmettere le proprie transazioni.
reviewed: true

question: Ni igiki Wallet ikeneye gukora kugira ngo abone ikibanza ca Blockchain?
answer: Huza ku nzira yo mu karere canke kure
wrong_answers:
  - Baza ayandi ma wallet ari ku rubuga
  - Kubaza abacukuzi b'amabuye y'agaciro
  - Huza n'urubuga rwa Exchange
explanation: |
  Wallet itegerezwa kwifatanya n’urudodo kugira ngo igere ku rwego rwa Blockchain no gutangaza ibikorwa vyayo.
reviewed: true
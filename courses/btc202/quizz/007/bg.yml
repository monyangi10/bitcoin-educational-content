question: Какво трябва да направи wallet, за да види състоянието на Blockchain?
answer: Свързване с локален или отдалечен възел
wrong_answers:
  - Попитайте други портфейли в мрежата
  - Интервюиране на мрежови миньори
  - Свързване с онлайн платформа за обмен
explanation: |
  wallet трябва да се свърже с възел, за да получи достъп до състоянието на Blockchain и да излъчи своите транзакции.
reviewed: true
question: Какво трябва да направите в портфейла, за да видите състоянието на блокчейна?
answer: Да се свържете с локален или отдалечен възел
wrong_answers:
  - Да попитате други портфейли в мрежата
  - Да Интервюирате мрежови миньори
  - Да се свържете с онлайн платформа за обмен
explanation: |
  Портфейл трябва да се свърже с възел, за да получи достъп до състоянието на блокчейна и да излъчи своите транзакции.
reviewed: true

question: Kada korisnik mora instalirati indeksator?
answer: Da bi pokrenuo istraživač blokova (eng. Block explorer)
wrong_answers:
  - Da bi samostalno rudario blokove
  - Da bi aktivirao Lightning Network
  - Da bi potpisao transakcije
explanation: |
  Indeksator postaje neophodan za napredne upotrebe, kao što je lokalni istraživač (explorer).
reviewed: true

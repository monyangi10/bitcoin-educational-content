question: Кога потребителят трябва да инсталира индексатор?
answer: Стартиране на блоков изследовател
wrong_answers:
  - За блокове mining
  - Активиране на Lightning Network
  - Подписване на транзакции
explanation: |
  Индексиращият модул става незаменим за разширени употреби, като например локален изследовател.
reviewed: true
question: उपयोगकर्ता को इंडेक्सर कब स्थापित करना चाहिए?
answer: Block explorer चलाने के लिए
wrong_answers:
  - Mining ब्लॉक के लिए स्वयं को
  - Lightning Network को सक्रिय करने के लिए
  - लेनदेन पर हस्ताक्षर करने के लिए
explanation: |
  स्थानीय एक्सप्लोरर जैसे उन्नत उपयोगों के लिए इंडेक्सर अपरिहार्य हो जाता है।
reviewed: true
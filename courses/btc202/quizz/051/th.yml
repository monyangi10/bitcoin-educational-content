question: เมื่อใดที่ผู้ใช้ต้องติดตั้งตัวจัดทำดัชนี?
answer: ในการเรียกใช้บล็อกเอ็กซ์พลอเรอร์
wrong_answers:
  - สำหรับ mining บล็อกตัวเอง
  - ในการเปิดใช้งาน Lightning Network
  - เพื่อลงนามธุรกรรม
explanation: |
  ตัวจัดทำดัชนีกลายเป็นสิ่งที่ขาดไม่ได้สำหรับการใช้งานขั้นสูง เช่น นักสำรวจท้องถิ่น
reviewed: true
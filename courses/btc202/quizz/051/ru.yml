question: Когда пользователь должен установить индексатор?
answer: Чтобы запустить Block explorer
wrong_answers:
  - Для блоков Mining самостоятельно
  - Чтобы активировать Lightning Network
  - Для подписания транзакций
explanation: |
  Индексатор становится незаменимым для расширенного использования, например, в качестве локального проводника.
reviewed: true
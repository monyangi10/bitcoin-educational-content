question: Wann muss ein Benutzer einen Indexer installieren?
answer: Wenn ein Block Explorer genutzt werden soll 
wrong_answers:
  - Um selbst Blöcke zu minen
  - Um das Lightning Network zu aktivieren
  - Transaktionen zu signieren
explanation: |
  Für fortgeschrittene Anwendungen, wie z. B. einen lokalen Explorer, ist ein Indexer unverzichtbar.
reviewed: true

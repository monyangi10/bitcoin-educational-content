question: Koja aplikacija za samostalno hostovanje (eng. self-hosting) može biti instalirana putem Umbrel-a?
answer: Nextcloud
wrong_answers:
  - Google Drive
  - Dropbox
  - OneDrive
explanation: |
  Umbrel nudi App Store sa uslugama samostalnog hostovanja, kao što je Nextcloud, za samostalno čuvanje i sinhronizaciju fajlova.
reviewed: true

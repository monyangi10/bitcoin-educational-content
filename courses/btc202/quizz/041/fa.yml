question: کدام برنامه‌های میزبانی شخصی را می‌توان از طریق Umbrel نصب کرد؟
answer: Nextcloud
wrong_answers:
  - گوگل درایو
  - دراپ‌باکس
  - وان‌درایو
explanation: |
  آمبرل یک فروشگاه اپلیکیشن با خدمات میزبانی شخصی ارائه می‌دهد، مانند نکست‌کلود، برای ذخیره و همگام‌سازی فایل‌ها توسط خودتان.
reviewed: true
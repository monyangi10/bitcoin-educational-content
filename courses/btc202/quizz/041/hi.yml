question: कौन से स्व-होस्टिंग अनुप्रयोग अम्ब्रेल के माध्यम से स्थापित किए जा सकते हैं?
answer: नेक्स्टक्लाउड
wrong_answers:
  - गूगल हाँकना
  - ड्रॉपबॉक्स
  - एक अभियान
explanation: |
  अम्ब्रेल स्वयं-होस्टिंग सेवाओं के साथ एक ऐप स्टोर प्रदान करता है, जैसे कि नेक्स्टक्लाउड, जिससे आप स्वयं फाइलों को संग्रहीत और सिंक्रनाइज़ कर सकते हैं।
reviewed: true
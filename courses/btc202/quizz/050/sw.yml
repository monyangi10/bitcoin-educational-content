question: Ni protocol gani inayotumiwa na Electrs na Fulcrum kuunganisha wallet?
answer: Electrum
wrong_answers:
  - RPC MAPUMZIKO
  - JSON API
  - Umeme gRPC
explanation: |
  Vifurushi hivi vya programu hufichua server ya Electrum, kiwango kinachotumiwa na Wallets nyingi kama vile Sparrow au Electrum Wallet.
reviewed: true

question: Wat is het protocol dat wordt gebruikt door Electrs en Fulcrum om wallets te verbinden?
answer: Electrum
wrong_answers:
  - RPC REST
  - JSON API
  - Lightning gRPC
explanation: |
  Deze softwarepakketten exposeren een Electrum server, de standaard die door veel wallets zoals Sparrow of Electrum Wallet wordt gebruikt.
reviewed: true

question: Koji protokol koriste Electrs i Fulcrum za povezivanje novčanika?
answer: Elektrum
wrong_answers:
  - RPC ODMOR
  - JSON API
  - Munja gRPC
explanation: |
  Ovi softverski paketi pokreću Electrum server, standard koji koriste mnogi novčanici kao što su Sparrow ili Electrum novčanici.
reviewed: true

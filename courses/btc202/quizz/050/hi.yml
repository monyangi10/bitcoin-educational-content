question: वॉलेट्स को जोड़ने के लिए इलेक्ट्रस और फुलक्रम द्वारा किस प्रोटोकॉल का उपयोग किया जाता है?
answer: एलेक्ट्रम
wrong_answers:
  - RPC रेस्ट
  - JSON एपीआई
  - लाइटनिंग gRPC
explanation: |
  ये सॉफ्टवेयर पैकेज एक इलेक्ट्रम सर्वर को प्रदर्शित करते हैं, जो कि Sparrow या इलेक्ट्रम Wallet जैसे कई वॉलेट्स द्वारा उपयोग किया जाने वाला मानक है।
reviewed: true
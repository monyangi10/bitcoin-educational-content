question: Welches Protokoll wird von Electrs und Fulcrum für die Verbindung von Geldbörsen verwendet?
answer: Elektrum
wrong_answers:
  - RPC REST
  - JSON-API
  - Blitzschlag gRPC
explanation: |
  Diese Softwarepakete stellen einen Electrum-Server zur Verfügung, den Standard, der von vielen Geldbörsen wie Sparrow oder Electrum Wallet verwendet wird.
reviewed: true
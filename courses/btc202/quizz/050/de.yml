question: Welches Protokoll wird von Electrs und Fulcrum für die Verbindung von Wallets verwendet?
answer: Electrum
wrong_answers:
  - RPC REST
  - JSON-API
  - Lightning gRPC
explanation: |
  Diese Softwarepakete stellen einen Electrum-Server zur Verfügung, den Standard, der von vielen Wallets wie Sparrow oder Electrum Wallet verwendet wird.
reviewed: true

question: Qual è il protocollo utilizzato da Electrs e Fulcrum per collegare i wallet?
answer: Electrum
wrong_answers:
  - RPC REST
  - API JSON
  - Lightning gRPC
explanation: |
  Questi pacchetti software espongono un server Electrum, lo standard utilizzato da molti wallet, come Sparrow o Electrum Wallet.
reviewed: true

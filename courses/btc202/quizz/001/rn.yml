question: Ni igiki twita umugwi w’amamashini akoresha ugushirwa mu ngiro kwa Bitcoin kandi ahuye?
answer: Urubuga rwa Bitcoin
wrong_answers:
  - Amasezerano ya Bitcoin
  - Ifaranga rya Bitcoin
  - Ivyo Blockchain Bitcoin.
explanation: |
  Urubuga rwa Bitcoin rugizwe n’ibice vyose bihuye, kimwe cose kikaba gikoresha uburyo butandukanye bwo gushirwa mu ngiro kw’itegeko.
reviewed: true
question: Wie nennt man die Menge der Rechner, auf denen eine Bitcoin-Implementierung läuft und die miteinander verbunden sind?
answer: Das Bitcoin-Netzwerk
wrong_answers:
  - Das Bitcoin-Protokoll
  - Bitcoin Währung
  - Die Bitcoin-Blockchain
explanation: |
  Das Bitcoin-Netzwerk umfasst alle angeschlossenen Nodes, von denen jede eine eigene Implementierung des Protokolls verwendet.
reviewed: true

question: Как наричаме множеството от машини, на които е инсталирана имплементация на Биткойн и които са свързани помежду си?
answer: Мрежата Биткойн
wrong_answers:
  - Протоколът Биткойн
  - Валута Биткойн
  - Блокчейн Биткойн
explanation: |
  Мрежата Биткойн се състои от всички свързани възли, всеки от които работи с отделна имплементация на протокола.
reviewed: true

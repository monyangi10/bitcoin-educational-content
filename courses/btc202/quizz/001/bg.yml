question: Как наричаме множеството от машини, на които е инсталирана реализация на Bitcoin и които са свързани помежду си?
answer: Мрежата Bitcoin
wrong_answers:
  - Протоколът Bitcoin
  - Валута Bitcoin
  - Blockchain Bitcoin
explanation: |
  Мрежата Bitcoin се състои от всички свързани възли, всеки от които работи с отделна реализация на протокола.
reviewed: true
question: Come si chiama l'insieme di macchine che eseguono un'implementazione di Bitcoin e che sono collegate tra loro?
answer: Il network Bitcoin
wrong_answers:
  - Il protocollo Bitcoin
  - Valuta Bitcoin
  - La blockchain Bitcoin
explanation: |
  Il network Bitcoin comprende tutti i nodi collegati, ognuno dei quali esegue un'implementazione distinta del protocollo.
reviewed: true

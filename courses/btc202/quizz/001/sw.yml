question: Tunaitaje seti ya mashine zinazoendesha utekelezaji wa Bitcoin na kuunganishwa kwa kila mmoja?
answer: Bitcoin Network
wrong_answers:
  - protocol ya Bitcoin
  - sarafu ya Bitcoin
  - Blockchain Bitcoin
explanation: |
  Mtandao wa Bitcoin unajumuisha node zote zilizounganishwa, kila moja inatekeleza utekelezaji tofauti wa protocol.
reviewed: true

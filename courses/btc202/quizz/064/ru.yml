question: Какова основная причина установки локального Block explorer, такого как Mempool.Space, на Umbrel?
answer: Сохраняйте конфиденциальность и используйте данные из собственного узла
wrong_answers:
  - Ускорение начальной синхронизации Bitcoin core
  - Увеличение объема памяти, доступной для блоков
  - Получение каналов Lightning
explanation: |
  Локальный Block explorer предотвращает утечку IP-адресов и опирается на ваши собственные проверенные данные, гарантируя конфиденциальность и надежность.
reviewed: true
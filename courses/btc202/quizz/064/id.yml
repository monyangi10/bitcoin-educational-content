question: Apa alasan utama untuk memasang Block explorer lokal seperti Mempool.Space pada Umbrel?
answer: Menjaga kerahasiaan dan menggunakan data dari node Anda sendiri
wrong_answers:
  - Mempercepat sinkronisasi Bitcoin core awal
  - Meningkatkan kapasitas penyimpanan yang tersedia untuk blok
  - Mendapatkan saluran Lightning
explanation: |
  Block explorer lokal mencegah kebocoran IP dan mengandalkan data Anda sendiri yang telah divalidasi, sehingga menjamin kerahasiaan dan keandalan.
reviewed: true
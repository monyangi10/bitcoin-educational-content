question: Каква е основната причина за инсталирането на локален блок експлорър като Mempool.Space на Umbrel?
answer: Запазване на поверителността и използване на данни от собствения ви възел
wrong_answers:
  - Ускоряване на първоначалната синхронизация на Bitcoin core
  - Увеличаване на наличния капацитет за съхранение на блокове
  - Получаване на канали за светкавици
explanation: |
  Локалният блок експлорър предотвратява изтичането на IP адреси и разчита на собствените ви валидирани данни, като гарантира поверителност и надеждност.
reviewed: true

question: Qual è la ragione principale per installare un block explorer locale come Mempool.Space su Umbrel?
answer: Preservare la riservatezza e utilizzare i dati del proprio nodo
wrong_answers:
  - Accelerare la sincronizzazione iniziale di Bitcoin Core
  - Aumentare la capacità di archiviazione disponibile per i blocchi
  - Ottenere i canali Lightning
explanation: |
  Un Block explorer locale impedisce le fughe di IP e si basa sui dati convalidati dall'utente, garantendo riservatezza e affidabilità.
reviewed: true

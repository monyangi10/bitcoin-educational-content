question: Koji je glavni razlog za instaliranje lokalnog istraživača blokova (eng. Block explorer) kao što je Mempool.Space na Umbrel?
answer: Čuvanje poverljivost i korišćenje podataka sa sopstvenog čvora.
wrong_answers:
  - Ubrzavanje početne Bitcoin Core sinhronizacije
  - Povećanje kapaciteta skladištenja dostupnog za blokove
  - Dobijanje Lightning kanala
explanation: |
  Lokalni istraživač blokova sprečava otrkivanje vaše IP adrese i oslanja se na vaše sopstvene validirane podatke, čime se obezbeđuju privatnost i pouzdanost.
reviewed: true

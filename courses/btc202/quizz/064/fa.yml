question: دلیل اصلی برای نصب یک Block explorer محلی مانند Mempool.Space بر روی Umbrel چیست؟
answer: حفظ محرمانگی و استفاده از داده‌های نود خودتان
wrong_answers:
  - سرعت بخشیدن به همگام‌سازی اولیه Bitcoin core
  - افزایش ظرفیت ذخیره‌سازی موجود برای بلوک‌ها
  - دریافت کانال‌های Lightning
explanation: |
  یک Block explorer محلی از نشت IP جلوگیری می‌کند و به داده‌های تأیید شده شما متکی است، که محرمانگی و قابلیت اطمینان را تضمین می‌کند.
reviewed: true
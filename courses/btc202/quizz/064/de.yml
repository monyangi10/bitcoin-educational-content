question: Was ist der Hauptgrund für die Installation eines lokalen Block Explorer wie Mempool.Space auf Umbrel?
answer: Wahrung der Vertraulichkeit und Verwendung von Daten deiner eigenen Node
wrong_answers:
  - Beschleunigung der anfänglichen Bitcoin Core-Synchronisierung
  - Erhöhung der für Blöcke verfügbaren Speicherkapazität
  - Erstellung von Lightning Channels 
explanation: |
  Ein lokaler Block Explorer verhindert IP-Lecks und stützt sich auf deine eigenen validierten Daten, wodurch Vertraulichkeit und Zuverlässigkeit gewährleistet werden.
reviewed: true

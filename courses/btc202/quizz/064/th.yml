question: เหตุผลหลักในการติดตั้ง local block explorer เช่น Mempool.Space บน Umbrel คืออะไร?
answer: รักษาความลับและใช้ข้อมูลจากโหนดของคุณเอง
wrong_answers:
  - เร่งความเร็วในการซิงโครไนซ์ Bitcoin core เริ่มต้น
  - เพิ่มความจุในการจัดเก็บที่มีอยู่สำหรับบล็อก
  - รับช่องทาง Lightning
explanation: |
  ตัวสำรวจบล็อกในท้องถิ่นป้องกันการรั่วไหลของ IP และพึ่งพาข้อมูลที่คุณตรวจสอบแล้วเอง รับประกันความลับและความน่าเชื่อถือ
reviewed: true
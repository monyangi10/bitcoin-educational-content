question: Wat is de belangrijkste reden om een lokale block explorer zoals Mempool.Space op Umbrel te installeren?
answer: Behoud vertrouwelijkheid en gebruik gegevens van je eigen node
wrong_answers:
  - Versnel de initiële Bitcoin Core synchronisatie
  - De beschikbare opslagcapaciteit voor blokken vergroten
  - Lightning-kanalen krijgen
explanation: |
  Een lokale block explorer voorkomt IP-lekken en vertrouwt op je eigen gevalideerde gegevens, waardoor vertrouwelijkheid en betrouwbaarheid gegarandeerd zijn.
reviewed: true

question: अम्ब्रेल पर Mempool.Space जैसे स्थानीय Block explorer को स्थापित करने का मुख्य कारण क्या है?
answer: गोपनीयता बनाए रखें और अपने नोड से डेटा का उपयोग करें
wrong_answers:
  - प्रारंभिक Bitcoin core तुल्यकालन को गति दें
  - ब्लॉकों के लिए उपलब्ध भंडारण क्षमता बढ़ाएँ
  - लाइटनिंग चैनल प्राप्त करना
explanation: |
  स्थानीय Block explorer आईपी लीक को रोकता है और आपके स्वयं के सत्यापित डेटा पर निर्भर करता है, जिससे गोपनीयता और विश्वसनीयता की गारंटी मिलती है।
reviewed: true
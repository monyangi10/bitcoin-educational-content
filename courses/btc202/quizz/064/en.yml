question: What's the main reason for installing a local block explorer like Mempool.Space on Umbrel?
answer: Preserve confidentiality and use data from your own node
wrong_answers:
  - Speed up initial Bitcoin core synchronization
  - Increase the storage capacity available for blocks
  - Getting Lightning channels
explanation: |
  A local block explorer prevents IP leaks and relies on your own validated data, guaranteeing confidentiality and reliability.
reviewed: true

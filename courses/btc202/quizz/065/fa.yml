question: اولین قدم در صورت بروز باگ در Umbrel چیست؟
answer: بسته تشخیصی generate
wrong_answers:
  - Bitcoin core را مجدداً نصب کنید و IBD را دوباره انجام دهید.
  - پاک کردن حافظه پنهان
  - غیرفعال کردن احراز هویت دو مرحله‌ای (2FA)
explanation: |
  در صورت بروز مشکل، ما با ایجاد یک بسته تشخیصی در بخش عیب‌یابی برای تحلیل مسئله و نگهداری سوابق شروع می‌کنیم.
reviewed: true
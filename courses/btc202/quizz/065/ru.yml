question: Что нужно сделать в первую очередь в случае обнаружения ошибки на Umbrel?
answer: generate диагностический пучок
wrong_answers:
  - Переустановите Bitcoin core и повторно выполните IBD
  - Очистить кэш
  - Отключить 2FA
explanation: |
  В случае возникновения проблемы мы начинаем с создания диагностического пакета в разделе устранения неполадок, чтобы проанализировать проблему и сохранить данные.
reviewed: true
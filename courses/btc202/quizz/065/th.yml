question: ขั้นตอนแรกที่ควรทำเมื่อพบข้อบกพร่องบน Umbrel คืออะไร?
answer: สร้างชุดการวินิจฉัย
wrong_answers:
  - ติดตั้ง Bitcoin Core ใหม่และทำ IBD อีกครั้ง
  - ล้างแคช
  - ปิดการใช้งาน 2FA
explanation: |
  ในกรณีที่เกิดปัญหา เราจะเริ่มต้นด้วยการสร้างชุดวินิจฉัยในส่วนการแก้ไขปัญหาเพื่อวิเคราะห์ปัญหาและเก็บบันทึกข้อมูล
reviewed: true
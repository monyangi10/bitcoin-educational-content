question: Qual è il primo passo da compiere in caso di bug su Umbrel?
answer: generare un pacchetto di diagnostica
wrong_answers:
  - Reinstallare Bitcoin Core e rifare l'IBD
  - Cancella la cache
  - Disattivare 2FA
explanation: |
  In caso di problemi, si inizia con la generazione di un pacchetto di diagnostica nella sezione di risoluzione dei problemi per analizzare il problema e mantenere una traccia.
reviewed: true

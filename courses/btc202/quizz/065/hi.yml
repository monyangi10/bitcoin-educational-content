question: अम्ब्रेल पर बग की स्थिति में पहला कदम क्या उठाया जाना चाहिए?
answer: generate एक डायग्नोस्टिक्स बंडल
wrong_answers:
  - Bitcoin core को पुनः स्थापित करें और IBD को पुनः करें
  - कैश को साफ़ करें
  - 2FA अक्षम करें
explanation: |
  किसी समस्या की स्थिति में, हम समस्या का विश्लेषण करने और रिकॉर्ड बनाए रखने के लिए समस्या निवारण अनुभाग में डायग्नोस्टिक्स बंडल तैयार करके शुरुआत करते हैं।
reviewed: true
question: Каква е първата стъпка, която трябва да предприемете в случай на грешка в Umbrel?
answer: Генериране на пакет за диагностика
wrong_answers:
  - Преинсталиране на ядрото на Bitcoin и повторно въвеждане на IBD
  - Изчистване на кеша
  - Деактивиране на 2FA
explanation: |
  В случай на проблем започваме с генериране на диагностичен пакет в раздела за отстраняване на неизправности, за да анализираме проблема и да поддържаме запис.
reviewed: true
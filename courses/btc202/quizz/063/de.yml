question: Welche zwei Lightning Netzwerk-Implementierungen sind bei Umbrel verfügbar?
answer: LND und Core Lightning
wrong_answers:
  - Electrs und Fulcrum
  - Bitcoin Core und Bitcoin Knots
  - Ride The Lightning und ThunderHub
explanation: |
  Umbrel lässt dir die Wahl zwischen LND und Core Lightning als Implementierungen des Lightning Netzwerks.
reviewed: true

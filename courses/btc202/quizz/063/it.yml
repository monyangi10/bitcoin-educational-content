question: Quali sono le due implementazioni di Lightning Network disponibili su Umbrel?
answer: LND e Core Lightning
wrong_answers:
  - Electrs e Fulcrum
  - Bitcoin Core e Bitcoin Knots
  - Ride The Lightning e ThunderHub
explanation: |
  Umbrel consente di scegliere tra il LND e il Core Lightning come implementazioni del Lightning Network.
reviewed: true

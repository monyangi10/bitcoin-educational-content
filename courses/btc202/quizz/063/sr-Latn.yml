question: Koje su dve implementacije Lightning Network-a dostupne na Umbrelu?
answer: LND i Core Lightning
wrong_answers:
  - Electrs i Fulcrum
  - Bitcoin Core i Bitcoin Knots
  - Ride The Lightning i ThunderHub
explanation: |
  Umbrel omogućava izbor između LND-a i Core Lightning-a kao implementacije Lightning Network-a.
reviewed: true

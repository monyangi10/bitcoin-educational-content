question: Koje dve komponente su distribuirane sa Bitcoin Core-om od verzije 0.5?
answer: Bitcoin-qt i bitcoind
wrong_answers:
  - Bitcoin-cli i Bitcoin-gui
  - Bitcoin-Miner i Bitcoin-Wallet
  - Bitcoin-core i Bitcoin-node
explanation: |
  Od verzije 0.5, Bitcoin Core uključuje grafički interfejs (Bitcoin-qt) i komandno-linijski interfejs (bitcoind).
reviewed: true

question: Welke database houdt een Bitcoin node lokaal bij om ongebruikte output bij te houden?
answer: De UTXO set
wrong_answers:
  - De Mempool
  - De Blockchain
  - De wallet geschiedenis
explanation: |
  De node bewaart de UTXO set, de set van niet uitgegeven outputs die beschikbaar zijn voor toekomstige transacties.
reviewed: true

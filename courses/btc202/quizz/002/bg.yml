question: Каква база данни поддържа локално възел на Биткойн, за да следи неизхарчените биткойни?
answer: UTXO
wrong_answers:
  - Mempool
  - Blockchain
  - История на портфейла
explanation: |
  Възелът съхранява информация относно UTXO, които представляват набор от неизхарчени изходи от предишни транзакции, достъпни за бъдещо транзактиране.
reviewed: true

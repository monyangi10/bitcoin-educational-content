question: Каква база данни поддържа локално възелът Bitcoin, за да следи неизразходваната продукция?
answer: Комплектът UTXO
wrong_answers:
  - Mempool
  - Blockchain
  - История на Wallet
explanation: |
  Възелът съхранява набор UTXO, който представлява набор от неизползвани изходи, достъпни за бъдещи транзакции.
reviewed: true
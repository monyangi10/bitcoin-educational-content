question: Bitcoin नोड अप्रयुक्त आउटपुट को ट्रैक करने के लिए स्थानीय स्तर पर कौन सा डेटाबेस रखता है?
answer: UTXO सेट
wrong_answers:
  - जीडब्ल्यू-2
  - जीडब्ल्यू-3
  - Wallet का इतिहास
explanation: |
  नोड UTXO सेट रखता है, जो भविष्य के लेनदेन के लिए उपलब्ध अप्रयुक्त आउटपुट का सेट है।
reviewed: true
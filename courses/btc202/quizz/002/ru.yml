question: Какая база данных хранится на узле Bitcoin для отслеживания неизрасходованного выхода?
answer: Набор UTXO
wrong_answers:
  - Mempool
  - Blockchain
  - История Wallet
explanation: |
  Узел хранит набор UTXO, который представляет собой набор неизрасходованных выходов, доступных для будущих транзакций.
reviewed: true
question: Quale database conserva un nodo Bitcoin localmente per tenere traccia dell'output non speso?
answer: Il set UTXO
wrong_answers:
  - La Mempool
  - La Blockchain
  - La storia del wallet
explanation: |
  Il nodo conserva l'insieme UTXO, ovvero l'insieme di output non spesi disponibili per transazioni future.
reviewed: true

question: Nani hudumisha servers za DNS seed zinazotumiwa kwa ugunduzi wa awali wa programu zingine?
answer: Watengenezaji wa mfumo wa ikolojia
wrong_answers:
  - Watoa huduma za mtandao
  - Satoshi Nakamoto
  - Mining pools
explanation: |
  Seeds za DNS hudumishwa na wasanidi programu wanaojulikana (Wuille, Corallo, Dashjr, n.k.) na hutoa IP za nodile amilifu ili kuanzisha miunganisho.
reviewed: true

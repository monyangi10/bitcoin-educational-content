question: Chi gestisce i server DNS seed utilizzati per il rilevamento iniziale dei peer?
answer: Sviluppatori di ecosistemi
wrong_answers:
  - Fornitori di servizi Internet
  - Satoshi Nakamoto
  - Piscine Mining
explanation: |
  I semi DNS sono gestiti da sviluppatori noti (Wuille, Corallo, Dashjr, ecc.) e forniscono IP di nodi attivi per avviare le connessioni.
reviewed: true
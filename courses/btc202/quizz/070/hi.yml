question: प्रारंभिक पीयर डिस्कवरी के लिए उपयोग किए जाने वाले DNS seed सर्वर का रखरखाव कौन करता है?
answer: पारिस्थितिकी तंत्र डेवलपर्स
wrong_answers:
  - इंटरनेट सेवा प्रदाता
  - Satoshi नाकामोटो
  - Mining पूल
explanation: |
  DNS बीजों का रखरखाव सुप्रसिद्ध डेवलपर्स (वुइले, कोरालो, डैशज्र, आदि) द्वारा किया जाता है तथा ये कनेक्शन आरंभ करने के लिए सक्रिय नोड IP प्रदान करते हैं।
reviewed: true
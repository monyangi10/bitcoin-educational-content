question: Wer verwaltet die DNS-Seed-Server, die für die anfängliche Peer-Ermittlung verwendet werden?
answer: Ökosystem-Entwickler
wrong_answers:
  - Internetdienstanbieter
  - Satoshi Nakamoto
  - Mining-Pools
explanation: |
  DNS-Seeds werden von bekannten Entwicklern (Wuille, Corallo, Dashjr usw.) verwaltet und stellen aktive Node-IPs zur Verfügung, um Verbindungen zu initiieren.
reviewed: true

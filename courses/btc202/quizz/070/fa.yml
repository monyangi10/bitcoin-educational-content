question: چه کسی سرورهای DNS seed را که برای کشف اولیه همتا استفاده می‌شوند، نگهداری می‌کند؟
answer: توسعه‌دهندگان اکوسیستم
wrong_answers:
  - ارائه‌دهندگان خدمات اینترنت
  - Satoshi ناکاموتو
  - استخرهای Mining
explanation: |
  بذرهای DNS توسط توسعه‌دهندگان معروف (Wuille، Corallo، Dashjr، و غیره) نگهداری می‌شوند و آدرس‌های IP نودهای فعال را برای شروع اتصالات فراهم می‌کنند.
reviewed: true
question: Кто обслуживает серверы DNS seed, используемые для первоначального обнаружения пиров?
answer: Разработчики экосистемы
wrong_answers:
  - Интернет-провайдеры
  - Satoshi Накамото
  - Бассейны Mining
explanation: |
  DNS-семена поддерживаются известными разработчиками (Wuille, Corallo, Dashjr и др.) и предоставляют активные IP-адреса узлов для инициирования соединений.
reviewed: true
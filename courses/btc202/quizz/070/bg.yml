question: Кой поддържа DNS сървърите seed, използвани за първоначално откриване на партньор?
answer: Разработчици на екосистеми
wrong_answers:
  - Доставчици на интернет услуги
  - Satoshi Nakamoto
  - Басейни Mining
explanation: |
  Семената на DNS се поддържат от добре познати разработчици (Wuille, Corallo, Dashjr и др.) и предоставят IP адреси на активни възли за иницииране на връзки.
reviewed: true
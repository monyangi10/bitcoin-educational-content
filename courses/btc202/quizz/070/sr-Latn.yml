question: Ko održava DNS seed servere koji se koriste za početno otkrivanje peer-a?
answer: Programeri ekosistema
wrong_answers:
  - Internet provajderi usluga
  - Satoshi Nakamoto
  - Rudarski bazeni
explanation: |
  DNS seed servere održavaju poznati Bitcoin developeri (Wuille, Corallo, Dashjr itd.), a služe za dobijanje IP adresa aktivnih čvorova radi uspostavljanja prvih veza na mreži.
reviewed: true

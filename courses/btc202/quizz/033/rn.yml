question: Ni nde ariko arabungabunga umugambi wa Bitcoin Knots?
answer: Luke Dashjr
wrong_answers:
  - Gavin Andresen
  - Wladimir J. Van Der Laan
  - Pieter Wuille
explanation: |
  Bitcoin Knots itunganywa na Luke Dashjr kandi ikora nk'umukiriya wa mbere w'iyindi nzira ya Bitcoin core.
reviewed: true

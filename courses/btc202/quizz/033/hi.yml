question: Bitcoin Knots परियोजना का रखरखाव कौन कर रहा है?
answer: ल्यूक डैश जूनियर
wrong_answers:
  - गेविन एंड्रेसन
  - व्लादिमीर जे. वैन डेर लायन
  - पीटर वुइले
explanation: |
  Bitcoin Knots का रखरखाव ल्यूक डैशज्र द्वारा किया जाता है और यह Bitcoin core के प्राथमिक वैकल्पिक ग्राहक के रूप में कार्य करता है।
reviewed: true
question: Chi ha inventato il concetto di verifica semplificata dei pagamenti (SPV)?
answer: Satoshi Nakamoto
wrong_answers:
  - Hal Finney
  - Adam Back
  - Pieter Wuille
explanation: |
  L'SPV(Simplified Payment Verification) è presentato nella parte 8 del White Paper di Satoshi Nakamoto.
reviewed: true

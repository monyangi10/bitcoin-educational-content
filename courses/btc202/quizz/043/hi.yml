question: अम्ब्रेल होम और अम्ब्रेलओएस में क्या अंतर है?
answer: अम्ब्रेल होम एक पूर्व-स्थापित मिनी-सर्वर है, अम्ब्रेलओएस एक स्वयं-स्थापित इंस्टॉलेशन है
wrong_answers:
  - अम्ब्रेल होम मुफ़्त है, अम्ब्रेलओएस नहीं
  - अम्ब्रेल होम Bitcoin का समर्थन नहीं करता; अम्ब्रेलओएस करता है
  - अम्ब्रेल होम ओपन सोर्स है, जबकि अम्ब्रेलओएस मालिकाना है
explanation: |
  अम्ब्रेल होम को पहले से ही स्थापित अम्ब्रेलओएस के साथ बेचा जाता है, जबकि अम्ब्रेलओएस को आपके अपने हार्डवेयर पर स्वयं स्थापित किया जा सकता है।
reviewed: true
question: आपके अम्ब्रेल तक पहुंच की सुरक्षा के लिए कौन से सुरक्षा उपाय दृढ़ता से अनुशंसित हैं?
answer: लंबा पासवर्ड और 2FA सक्रियण
wrong_answers:
  - दोहरी SSD भंडारण
  - RPC पोर्ट को सादे पाठ में खोलें
  - लंबा पासवर्ड और SSH सक्रियण
explanation: |
  एक मजबूत पासवर्ड और दो-कारक प्रमाणीकरण (2FA) का संयोजन प्रभावी रूप से Interface अम्ब्रेल तक पहुंच की सुरक्षा करता है।
reviewed: true
question: Какви мерки за сигурност се препоръчват, за да се защити достъпът до вашия Umbrel?
answer: Активиране на дълга парола и 2FA
wrong_answers:
  - Двойно SSD съхранение
  - Отваряне на порт RPC в обикновен текст
  - Дълга парола и активиране на SSH
explanation: |
  Комбинацията от силна парола и двуфакторно удостоверяване (2FA) ефективно защитава достъпа до Umbrel.
reviewed: true

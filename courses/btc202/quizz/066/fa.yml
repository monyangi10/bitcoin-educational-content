question: چه اقدامات امنیتی به شدت توصیه می‌شود تا دسترسی به Umbrel شما محافظت شود؟
answer: رمز عبور طولانی و فعال‌سازی 2FA
wrong_answers:
  - ذخیره‌سازی SSD دوگانه
  - پورت RPC را به صورت متن ساده باز کنید
  - رمز عبور طولانی و فعال‌سازی SSH
explanation: |
  ترکیب یک رمز عبور قوی و احراز هویت دو مرحله‌ای (2FA) به طور مؤثری از دسترسی به Interface Umbrel محافظت می‌کند.
reviewed: true
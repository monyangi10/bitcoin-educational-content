question: Koje mere bezbednosti se snažno preporučuju za zaštitu pristupa vašem Umbrelu?
answer: Dugačka lozinka i aktivacija 2FA
wrong_answers:
  - Čuvanje podataka na dva SSD-a
  - Otvaranje RPC porta bez enkripcije
  - Dugačka lozinka i aktivacija SSH-a
explanation: |
  Kombinacija jake lozinke i dvofaktorske autentifikacije (2FA) efikasno štiti pristup Umbrel interfejsu.
reviewed: true

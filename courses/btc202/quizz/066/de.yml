question: Welche Sicherheitsmaßnahmen werden dringend empfohlen, um den Zugang zu deinem Umbrel zu schützen?
answer: Langes Passwort und 2FA-Aktivierung
wrong_answers:
  - Dualer SSD-Speicher
  - RPC-Port unverschlüsselt öffnen
  - Langes Passwort und SSH-Aktivierung
explanation: |
  Die Kombination aus einem starken Passwort und einer Zwei-Faktor-Authentifizierung (2FA) schützt den Zugang zum Umbrel Interface effektiv.
reviewed: true

question: Кой софтуер съчетава функциите на възел и портфейл
answer: Bitcoin Core
wrong_answers:
  - Sparrow wallet
  - Ashigaru
  - Wallet от Satoshi
explanation: |
  За разлика от други софтуерни пакети, които са само софтуер за управление на портфейл, Bitcoin Core действа едновременно като възел и портфейл.
reviewed: true

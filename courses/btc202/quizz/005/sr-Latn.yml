question: Koji softver kombinuje funkcije potpuni čvor i novčanik?
answer: Bitcoin Core
wrong_answers:
  - Sparrow wallet
  - Ašigaru
  - Wallet od Satoshi
explanation: |
  Bitcoin Core deluje i kao full node i kao novčanik, za razliku od drugih softverskih paketa, koji su samo softver za upravljanje novčanikom.
reviewed: true

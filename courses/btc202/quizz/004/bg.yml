question: Какво е възел в Bitcoin?
answer: Компютър, на който е инсталиран софтуер с протокола Bitcoin
wrong_answers:
  - Хардуерен портфейл, реализиращ мрежата Bitcoin
  - Миньор, който произвежда нови блокове за Bitcoin
  - Централен сървър за управление на мрежата Bitcoin и потвърждаване на транзакциите
explanation: |
  Възел на Bitcoin е компютър, на който е инсталиран софтуер, например Bitcoin Core, който прилага протокола и участва в мрежата на Bitcoin.
reviewed: true

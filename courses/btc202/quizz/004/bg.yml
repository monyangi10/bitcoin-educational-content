question: Какво е възел Bitcoin?
answer: Компютър, на който е инсталиран софтуер, реализиращ протокола Bitcoin
wrong_answers:
  - Хардуерен wallet, реализиращ мрежата Bitcoin
  - Миньор, който произвежда нови блокове за Bitcoin
  - Централен сървър за управление на мрежата Bitcoin и потвърждаване на транзакциите
explanation: |
  Възел на Bitcoin е компютър, на който е инсталиран софтуер, например Bitcoin Core, който прилага протокола и участва в мрежата Bitcoin.
reviewed: true
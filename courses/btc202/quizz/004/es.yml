question: ¿Qué es un nodo Bitcoin?
answer: Un ordenador que ejecuta software que implementa el protocolo Bitcoin
wrong_answers:
  - Una Hardware Wallet implementando la red Bitcoin
  - Un Minero produciendo nuevos bloques para Bitcoin
  - Un servidor central que gestiona la red Bitcoin y la confirmación de las transacciones
explanation: |
  Un nodo Bitcoin es un ordenador que ejecuta un software, como Bitcoin core, que implementa el protocolo y participa en la red Bitcoin.
reviewed: true

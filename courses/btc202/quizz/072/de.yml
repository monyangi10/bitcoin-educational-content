question: Welcher Mechanismus kann verwendet werden, um einen Schnappschuss des UTXO-Sets zu laden, um eine Node schnell nutzbar zu machen?
answer: assumeutxo
wrong_answers:
  - assumechainstate
  - txindex
  - notxindex
explanation: |
  Assumeutxo lädt einen Schnappschuss des UTXO-Sets, um die Node schnell zum Laufen zu bringen, während das komplette UTXO-Set im Hintergrund neu aufgebaut wird.
reviewed: true

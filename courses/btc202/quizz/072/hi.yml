question: किसी नोड को शीघ्रता से उपयोग योग्य बनाने के लिए UTXO सेट का स्नैपशॉट लोड करने हेतु किस तंत्र का उपयोग किया जा सकता है?
answer: मान लेंutxo
wrong_answers:
  - मान लेंचेनस्टेट
  - txindex
  - नॉटएक्सइंडेक्स
explanation: |
  Assumeutxo नोड को शीघ्रता से चालू करने के लिए UTXO सेट का स्नैपशॉट लोड करता है, जबकि पृष्ठभूमि में संपूर्ण UTXO सेट का पुनर्निर्माण करता है।
reviewed: true
question: Какой механизм можно использовать для загрузки моментального снимка набора UTXO, чтобы быстро сделать узел пригодным для использования?
answer: assumeutxo
wrong_answers:
  - предположить, что государство
  - txindex
  - notxindex
explanation: |
  Assumeutxo загружает моментальный снимок набора UTXO, чтобы быстро запустить узел, а полный набор UTXO восстанавливает в фоновом режиме.
reviewed: true
question: Koji mehanizam se može koristiti za učitavanje instant-snimka (eng. snapshot) UTXO seta kako bi čvor brzo bio upotrebljiv?
answer: assumeutxo
wrong_answers:
  - assumechainstate
  - txindex
  - notxindex
explanation: |
 Assumeutxo učitava instant-snimak UTXO baze kako bi čvor bio brzo operativan, dok se u pozadini rekonstruiše kompletan UTXO set.
reviewed: true

question: Какъв механизъм може да се използва за зареждане на моментна снимка на набора UTXO, за да може възелът да се използва бързо?
answer: assumeutxo
wrong_answers:
  - предполагам, че
  - txindex
  - notxindex
explanation: |
  Assumeutxo зарежда моментна снимка на комплекта UTXO, за да може възелът да заработи бързо, като същевременно възстановява пълния комплект UTXO във фонов режим.
reviewed: true
question: Welk mechanisme kan gebruikt worden om een snapshot van de UTXO set te laden om een node snel bruikbaar te maken?
answer: assumeutxo
wrong_answers:
  - assumechainstate
  - txindex
  - notxindex
explanation: |
  Assumeutxo laadt een snapshot van de UTXO set om de node snel aan de praat te krijgen, terwijl de complete UTXO set op de achtergrond wordt heropgebouwd.
reviewed: true

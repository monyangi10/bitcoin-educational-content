question: Welche Datenbank wird in blocks/index/ verwendet, um Block-Metadaten zu speichern?
answer: LevelDB
wrong_answers:
  - SQLite
  - RocksDB
  - Berkeley DB
explanation: |
  Bitcoin core verwendet LevelDB in blocks/index/, um Blöcke zu indizieren, was die Suche und den Service für Peers beschleunigt.
reviewed: true
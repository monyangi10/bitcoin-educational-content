question: Ni hifadhidata gani inatumika katika blocks/index/ kuhifadhi metadata ya kuzuia?
answer: LevelDB
wrong_answers:
  - SQLite
  - RocksDB
  - Berkeley DB
explanation: |
  Bitcoin core hutumia LevelDB katika blocks/index/ kuweka vizuizi vya faharasa, kuharakisha utafutaji wake na huduma kwa wenzao.
reviewed: true

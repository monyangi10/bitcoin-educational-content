question: ब्लॉक मेटाडेटा को संग्रहीत करने के लिए blocks/index/ में किस डेटाबेस का उपयोग किया जाता है?
answer: लेवलडीबी
wrong_answers:
  - SQLite
  - रॉकएसडीबी
  - बर्कले डीबी
explanation: |
  Bitcoin core, ब्लॉकों को अनुक्रमित करने के लिए, लेवलडीबी का उपयोग करता है, जिससे इसकी खोज और समकक्षों को सेवा में तेजी आती है।
reviewed: true
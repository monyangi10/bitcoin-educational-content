question: Welchen Zweck erfüllen die Dateien revNNNNN.dat, die neben blkNNNN.dat gespeichert sind?
answer: Wiederherstellung des UTXO-Satzes bei der Reorganisation
wrong_answers:
  - Wiederherstellung von UTXO, das während einer Hard Fork eingestellt wurde
  - Wiederherstellung von Mempool während Hard Fork
  - Wiederherstellung von Mempool während einer Umstrukturierung
explanation: |
  Jede revNNNNN.dat enthält die Daten, die erforderlich sind, um die Auswirkungen eines Blocks auf den UTXO-Satz rückgängig zu machen, was die Verwaltung von Reorganisationen erleichtert.
reviewed: true
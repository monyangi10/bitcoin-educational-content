question: Qual è lo scopo dei file revNNNN.dat memorizzati insieme a blkNNNN.dat?
answer: Ripristino del UTXO impostato durante la riorganizzazione
wrong_answers:
  - Ripristino delle UTXO impostato durante un hard fork
  - Ripristino della Mempool durante il hard fork
  - Ripristino della Mempool durante una riorganizzazione
explanation: |
  Ogni revNNNNN.dat contiene i dati necessari per annullare gli effetti di un blocco sull'insieme UTXO, facilitando la gestione delle riorganizzazioni.
reviewed: true

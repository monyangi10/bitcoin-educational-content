question: blkNNNNN.dat के साथ संग्रहीत revNNNNN.dat फ़ाइलों का उद्देश्य क्या है?
answer: पुनर्गठन के दौरान UTXO सेट को पुनर्स्थापित करें
wrong_answers:
  - Hard Fork के दौरान UTXO सेट को पुनर्स्थापित करें
  - Hard Fork के दौरान Mempool को पुनर्स्थापित करें
  - पुनर्गठन के दौरान Mempool को पुनर्स्थापित करना
explanation: |
  प्रत्येक revNNNNN.dat में UTXO सेट पर किसी ब्लॉक के प्रभाव को पूर्ववत करने के लिए आवश्यक डेटा होता है, जिससे पुनर्गठन का प्रबंधन आसान हो जाता है।
reviewed: true
question: Каква е целта на файловете revNNNNN.dat, съхранявани заедно с blkNNNNN.dat?
answer: Възстановяване на UTXO, зададен по време на реорганизацията
wrong_answers:
  - Възстановяване на UTXO, зададен по време на Hard Fork
  - Възстановяване на Mempool по време на Hard Fork
  - Възстановяване на Mempool по време на реорганизация
explanation: |
  Всеки revNNNNN.dat съдържа данните, необходими за отмяна на ефектите на даден блок върху набора UTXO, което улеснява управлението на реорганизациите.
reviewed: true
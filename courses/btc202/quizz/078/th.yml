question: วัตถุประสงค์ของไฟล์ revNNNNN.dat ที่เก็บไว้ควบคู่กับ blkNNNNN.dat คืออะไร?
answer: คืนค่า UTXO ที่ตั้งไว้ระหว่างการจัดระเบียบใหม่
wrong_answers:
  - กู้คืน UTXO ที่ตั้งค่าไว้ระหว่าง Hard Fork
  - คืนค่า Mempool ระหว่าง Hard Fork
  - การคืนค่า Mempool ระหว่างการปรับโครงสร้างใหม่
explanation: |
  ไฟล์ revNNNNN.dat แต่ละไฟล์ประกอบด้วยข้อมูลที่จำเป็นในการยกเลิกผลกระทบของบล็อกบนชุด UTXO ทำให้ง่ายต่อการจัดการการจัดระเบียบใหม่
reviewed: true
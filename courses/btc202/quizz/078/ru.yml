question: Каково назначение файлов revNNNNN.dat, хранящихся вместе с файлами blkNNNNN.dat?
answer: Восстановление UTXO, установленного во время реорганизации
wrong_answers:
  - Восстановление UTXO, установленного во время Hard Fork
  - Восстановление ГВ-4 во время ГВ-3
  - Восстановление Mempool во время реорганизации
explanation: |
  Каждый revNNNNNN.dat содержит данные, необходимые для отмены влияния блока на набор UTXO, что упрощает управление реорганизациями.
reviewed: true
question: В чем разница между правилами консенсуса и правилами эстафеты?
answer: Консенсус определяет действительность, способствует распространению транзакций
wrong_answers:
  - Консенсус определяет плату, эстафета определяет адреса
  - Консенсус управляет Blockchain, ретранслятор управляет закрытыми ключами
  - Консенсус выбирает майнеров, ретранслятор выбирает торговцев
explanation: |
  Правила консенсуса определяют, что является действительным в Bitcoin, а правила ретрансляции управляют транзакциями между узлами.
reviewed: true
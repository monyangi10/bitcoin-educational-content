question: ความแตกต่างระหว่างกฎฉันทามติและกฎการส่งต่อคืออะไร?
answer: ฉันทามติกำหนดความถูกต้อง ถ่ายทอดการแพร่กระจายของธุรกรรม
wrong_answers:
  - ฉันทามติ กำหนดค่าธรรมเนียม, รีเลย์ กำหนดที่อยู่
  - ฉันทามติจัดการ Blockchain, รีเลย์จัดการคีย์ส่วนตัว
  - ฉันทามติเลือกคนขุด, รีเลย์เลือกพ่อค้า
explanation: |
  กฎฉันทามติกำหนดสิ่งที่ถูกต้องใน Bitcoin ในขณะที่กฎการถ่ายทอดจัดการธุรกรรมระหว่างโหนด
reviewed: true
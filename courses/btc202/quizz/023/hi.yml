question: सर्वसम्मति नियमों और रिले नियमों के बीच क्या अंतर है?
answer: आम सहमति वैधता को परिभाषित करती है, लेन-देन के प्रसार को प्रसारित करती है
wrong_answers:
  - आम सहमति शुल्क को परिभाषित करती है, रिले पते को परिभाषित करता है
  - सर्वसम्मति Blockchain का प्रबंधन करती है, रिले निजी कुंजियों का प्रबंधन करती है
  - सर्वसम्मति से खननकर्ताओं का चयन होता है, रिले द्वारा व्यापारियों का चयन होता है
explanation: |
  आम सहमति नियम यह निर्धारित करते हैं कि Bitcoin में क्या मान्य है, जबकि रिले नियम नोड्स के बीच लेनदेन का प्रबंधन करते हैं।
reviewed: true
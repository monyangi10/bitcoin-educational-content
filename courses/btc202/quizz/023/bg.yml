question: Каква е разликата между правилата за консенсус и правилата за разпространение?
answer: Консенсусът определя валидността на транзакцията, не и нейното разпространение в мрежата
wrong_answers:
  - Консенсусът определя таксите, разпространението определя адресите
  - Консенсусът управлява блокчейна, разпространението управлява частните ключове
  - Консенсусът избира миньори, а разпространението - търговци
explanation: |
  Правилата за консенсус определят какво е валидно в Биткойн, а правилата за разпространение управляват транзакциите между възлите.
reviewed: true

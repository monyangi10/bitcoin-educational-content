question: Каква е разликата между правилата за консенсус и правилата за предаване?
answer: Консенсусът определя валидността, предава разпространението на транзакциите
wrong_answers:
  - Консенсусът определя таксите, ретранслаторът определя адресите
  - Консенсусът управлява Blockchain, ретранслаторът управлява частните ключове
  - Консенсусът избира миньори, а релето - търговци
explanation: |
  Правилата за консенсус определят какво е валидно в Bitcoin, а правилата за ретранслация управляват транзакциите между възлите.
reviewed: true
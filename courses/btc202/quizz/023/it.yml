question: Qual è la differenza tra le regole del consenso e le regole di relay?
answer: Il consenso definisce la validità, il relay la diffusione delle transazioni
wrong_answers:
  - Il consenso definisce le tariffe, il relay gli indirizzi
  - Il consenso gestisce la blockchain, il relay gestisce le chiavi private
  - Il consenso sceglie i miner, il relay sceglie i commercianti
explanation: |
  Le regole del consenso determinano ciò che è valido nel Bitcoin, mentre le regole del relay gestiscono le transazioni tra i nodi.
reviewed: true

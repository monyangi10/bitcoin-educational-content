question: تفاوت بین قوانین اجماع و قوانین رله چیست؟
answer: اجماع اعتبار را تعریف می‌کند، انتشار تراکنش‌ها را منتقل می‌کند
wrong_answers:
  - اجماع هزینه‌ها را تعریف می‌کند، رله آدرس‌ها را تعریف می‌کند
  - اجماع Blockchain را مدیریت می‌کند، رله کلیدهای خصوصی را مدیریت می‌کند
  - اجماع ماینرها را انتخاب می‌کند، رله بازرگانان را انتخاب می‌کند
explanation: |
  قوانین اجماع تعیین می‌کنند چه چیزی در Bitcoin معتبر است، در حالی که قوانین رله تراکنش‌ها بین نودها را مدیریت می‌کنند.
reviewed: true
question: Apa perbedaan antara aturan konsensus dan aturan relai?
answer: Konsensus mendefinisikan validitas, menyampaikan difusi transaksi
wrong_answers:
  - Konsensus menentukan biaya, relai menentukan alamat
  - Konsensus mengelola Blockchain, relai mengelola kunci privat
  - Konsensus memilih miner, relai memilih pedagang
explanation: |
  Aturan konsensus menentukan apa yang valid dalam Bitcoin, sementara aturan relai mengatur transaksi antar node.
reviewed: true

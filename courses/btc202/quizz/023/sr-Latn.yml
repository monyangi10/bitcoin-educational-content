question: Koja je razlika između pravila konsenzusa i pravila prosleđivanja (relej)?
answer: Konsenzus pravila definiše validnost, pravila prosleđivanja određuju difuziju transakcija
wrong_answers:
  - Konsenzus definiše naknade, relej definiše adrese
  - Konsenzus upravlja Blockchain-om, relej upravlja privatnim ključevima
  - Konsenzus bira rudare, relej bira trgovce
explanation: |
  Pravila konsenzusa određuju šta je validno u Bitcoinu, dok pravila releja regulišu kako se transakcije prosleđuju između čvorova.
reviewed: true

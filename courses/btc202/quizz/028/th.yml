question: อะไรที่ทำให้โหนด pruned แตกต่างจาก full node?
answer: มันค่อยๆ กำจัดบล็อกเก่าออกไป
wrong_answers:
  - มันไม่ตรวจสอบความถูกต้องของธุรกรรมที่เก่ากว่า
  - ไม่สามารถถ่ายทอดบล็อกทั้งหมดได้
  - มันไม่ได้เก็บสำเนาท้องถิ่นของ Blockchain ไว้ มีเพียงชุด UTXO เท่านั้น
explanation: |
  โหนด pruned ตรวจสอบความถูกต้องของเชนทั้งหมด แต่เก็บรักษาเฉพาะส่วนที่เป็นบล็อกล่าสุดเพื่อจำกัดการจัดเก็บข้อมูลของมัน
reviewed: true
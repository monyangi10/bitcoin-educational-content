question: Чем узел pruned отличается от узла Full node?
answer: Он постепенно устраняет старые блоки
wrong_answers:
  - Он не проверяет старые транзакции
  - Он не может передавать целые блоки
  - Он не хранит локальную копию Blockchain, только набор UTXO
explanation: |
  Узел pruned проверяет всю цепочку, но сохраняет только недавнюю часть блоков, чтобы ограничить их хранение.
reviewed: true
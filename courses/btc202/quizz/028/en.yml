question: What makes a pruned node different from a full node?
answer: It gradually eliminates the old blocks
wrong_answers:
  - It does not validate older transactions
  - It cannot relay entire blocks
  - It does not keep any local copy of the blockchain, only the UTXO set
explanation: |
  The pruned node validates the entire chain, but retains only a recent portion of the blocks to limit its storage.
reviewed: true

question: По какво се различава олекотена версия на възел спрямо пълната?
answer: Постепенно премахва старите блокове
wrong_answers:
  - Не потвърждава по-стари трансакции
  - Не може да предава цели блокове
  - Той не съхранява локално копие на блокчейн, а само набор от UTXO
explanation: |
  олекотената версия на възел валидира цялата верига, но запазва само скорошна част от блоковете, за да ограничи съхранението им.
reviewed: true

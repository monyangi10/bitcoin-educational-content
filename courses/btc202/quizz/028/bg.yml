question: По какво се различава възел pruned от възел full node?
answer: Постепенно премахва старите блокове
wrong_answers:
  - Не потвърждава по-стари трансакции
  - Не може да предава цели блокове
  - Той не съхранява локално копие на Blockchain, а само набор UTXO
explanation: |
  Възелът pruned валидира цялата верига, но запазва само скорошна част от блоковете, за да ограничи съхранението им.
reviewed: true
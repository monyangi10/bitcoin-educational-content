question: Cosa differenzia un pruned node da un full node?
answer: Elimina gradualmente i vecchi blocchi
wrong_answers:
  - Non convalida le transazioni più vecchie
  - Non può trasmettere interi blocchi
  - Non conserva alcuna copia locale della blockchain, ma solo l'insieme UTXO
explanation: |
  Il pruned node convalida l'intera catena, ma conserva solo una parte recente dei blocchi per limitarne l'archiviazione.
reviewed: true

question: چه چیزی یک گره pruned را از یک Full node متمایز می‌کند؟
answer: به تدریج بلوک‌های قدیمی را حذف می‌کند
wrong_answers:
  - این تراکنش‌های قدیمی‌تر را تأیید نمی‌کند.
  - نمی‌تواند بلوک‌های کامل را انتقال دهد
  - هیچ نسخه محلی از Blockchain نگه نمی‌دارد، فقط مجموعه UTXO را نگه می‌دارد.
explanation: |
  گره pruned کل زنجیره را اعتبارسنجی می‌کند، اما تنها بخش اخیر بلوک‌ها را برای محدود کردن فضای ذخیره‌سازی خود نگه می‌دارد.
reviewed: true
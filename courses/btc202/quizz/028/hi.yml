question: pruned नोड को Full node से क्या अलग बनाता है?
answer: यह धीरे-धीरे पुराने अवरोधों को समाप्त कर देता है
wrong_answers:
  - यह पुराने लेनदेन को मान्य नहीं करता
  - यह संपूर्ण ब्लॉकों को रिले नहीं कर सकता
  - यह Blockchain की कोई स्थानीय प्रतिलिपि नहीं रखता है, केवल UTXO सेट रखता है
explanation: |
  pruned नोड संपूर्ण श्रृंखला को मान्य करता है, लेकिन इसके भंडारण को सीमित करने के लिए ब्लॉकों के केवल हाल के हिस्से को ही बरकरार रखता है।
reviewed: true
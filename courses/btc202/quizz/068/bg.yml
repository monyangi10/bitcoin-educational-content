question: Кои са трите основни предимства на редовните актуализации на операционната система и приложенията?
answer: Безопасност, надеждност, функционалност
wrong_answers:
  - Скорост, анонимност, съвместимост
  - Сигурност, памет, съхранение
  - Конфиденциалност, функционалност, надеждност
explanation: |
  Актуализациите осигуряват защита от уязвимости, съвместимост с еволюции и нови функции и надеждност на системата.
reviewed: true
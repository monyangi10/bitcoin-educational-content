question: नियमित ओएस और ऐप अपडेट के तीन मुख्य लाभ क्या हैं?
answer: सुरक्षा, विश्वसनीयता, कार्यक्षमता
wrong_answers:
  - गति, गुमनामी, अनुकूलता
  - सुरक्षा, मेमोरी, भंडारण
  - गोपनीयता, कार्यक्षमता, विश्वसनीयता
explanation: |
  अद्यतन कमजोरियों के विरुद्ध सुरक्षा, विकास और नई सुविधाओं के साथ संगतता, तथा सिस्टम विश्वसनीयता सुनिश्चित करते हैं।
reviewed: true
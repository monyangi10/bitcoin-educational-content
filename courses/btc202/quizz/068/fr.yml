question: Quels sont les trois principaux bénéfices des mises à jour régulières de l'OS et des apps ?
answer: Sécurité, fiabilité, fonctionnalité
wrong_answers:
  - Vitesse, anonymat, compatibilité
  - Sécurité, mémoire, stockage
  - Confidentialité, fonctionnalité, fiabilité
explanation: |
  Les mises à jour assurent la sécurité contre les vulnérabilités, la compatibilité avec les évolutions et nouvelles fonctionnalités, et la fiabilité du système.
reviewed: true 

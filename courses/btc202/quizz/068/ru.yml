question: Каковы три основных преимущества регулярного обновления ОС и приложений?
answer: Безопасность, надежность, функциональность
wrong_answers:
  - Скорость, анонимность, совместимость
  - Безопасность, память, хранение
  - Конфиденциальность, функциональность, надежность
explanation: |
  Обновления обеспечивают защиту от уязвимостей, совместимость с эволюциями и новыми функциями, а также надежность системы.
reviewed: true
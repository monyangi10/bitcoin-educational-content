question: ประโยชน์หลักสามประการของการอัปเดตระบบปฏิบัติการและแอปพลิเคชันอย่างสม่ำเสมอคืออะไร?
answer: ความปลอดภัย, ความน่าเชื่อถือ, การทำงาน
wrong_answers:
  - ความเร็ว, การไม่เปิดเผยตัวตน, ความเข้ากันได้
  - ความปลอดภัย, หน่วยความจำ, การจัดเก็บข้อมูล
  - การรักษาความลับ, การทำงาน, ความน่าเชื่อถือ
explanation: |
  การอัปเดตช่วยให้มั่นใจถึงความปลอดภัยจากช่องโหว่ ความเข้ากันได้กับการพัฒนาและฟีเจอร์ใหม่ ๆ และความน่าเชื่อถือของระบบ
reviewed: true
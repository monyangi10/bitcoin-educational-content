question: تفاوت عمده بین Electrs و Fulcrum چیست؟
answer: الکترس فشرده‌تر است، فولکروم قدرتمندتر است
wrong_answers:
  - الکترس رایگان نیست، فولکروم رایگان است
  - فولکروم از پروتکل الکتروم پشتیبانی نمی‌کند
  - الکترس مالکیتی است، فولکروم متن‌باز است
explanation: |
  الکترس فضای دیسک کمتری استفاده می‌کند، در حالی که فولکروم سریع‌تر به درخواست‌ها پاسخ می‌دهد اما منابع بیشتری مصرف می‌کند.
reviewed: true
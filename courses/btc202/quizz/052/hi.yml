question: इलेक्ट्रस और फुलक्रम के बीच मुख्य अंतर क्या है?
answer: इलेक्ट्र्स अधिक कॉम्पैक्ट है, फुलक्रम अधिक शक्तिशाली है
wrong_answers:
  - इलेक्ट्र्स मुफ़्त नहीं है, फुलक्रम मुफ़्त है
  - फुलक्रम इलेक्ट्रम प्रोटोकॉल का समर्थन नहीं करता है
  - इलेक्ट्र्स मालिकाना है, फुलक्रम खुला स्रोत है
explanation: |
  इलेक्ट्रस कम डिस्क स्थान का उपयोग करता है, जबकि फुलक्रम अनुरोधों पर तेजी से प्रतिक्रिया करता है, लेकिन अधिक संसाधनों का उपभोग करता है।
reviewed: true
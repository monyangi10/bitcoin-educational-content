question: Ni ubuhinga ubuhe Umbrel ikoresha mu gutandukanya no gucunga ibikorwa vyayo?
answer: Ibikoresho vya Docker
wrong_answers:
  - Imashini zisanzwe
  - Inyandiko za Bash
  - Amatsinda ya Kubernetes
explanation: |
  Buri porogaramu muri Umbrel ikoreshwa mu gitereko ca Docker, ishoboza uburongozi bwigenga no kwitandukanya.
reviewed: true
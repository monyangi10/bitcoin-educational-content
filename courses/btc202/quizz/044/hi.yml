question: अम्ब्रेल अपने अनुप्रयोगों को अलग करने और प्रबंधित करने के लिए किस तकनीक का उपयोग करता है?
answer: डॉकर कंटेनर
wrong_answers:
  - वर्चुअलबॉक्स वर्चुअल मशीनें
  - बैश स्क्रिप्ट
  - कुबेरनेट्स क्लस्टर
explanation: |
  अम्ब्रेल में प्रत्येक अनुप्रयोग एक डॉकर कंटेनर में चलता है, जिससे स्वतंत्र प्रबंधन और अलगाव संभव होता है।
reviewed: true
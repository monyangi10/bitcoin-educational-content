question: Umbrel از چه فناوری برای ایزوله‌سازی و مدیریت برنامه‌های خود استفاده می‌کند؟
answer: کانتینرهای داکر
wrong_answers:
  - ماشین‌های مجازی VirtualBox
  - اسکریپت‌های بش
  - خوشه‌های کوبرنتیس
explanation: |
  هر برنامه در Umbrel در یک کانتینر Docker اجرا می‌شود که مدیریت مستقل و جداسازی را امکان‌پذیر می‌سازد.
reviewed: true
question: Ni nini sifa kuu ya Full node?
answer: Inapakua na kuhalalisha Blockchain nzima
wrong_answers:
  - Inabakiza vichwa vya block pekee
  - Inafuta blocks za zamani baada ya uthibitishaji
  - Inategemea node nyingine ili kuthibitisha shughuli
explanation: |
  Full node huhifadhi Blockchain nzima na inathibitisha kila block na muamala kwa kujitegemea.
reviewed: true

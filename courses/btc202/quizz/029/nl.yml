question: Wat is het belangrijkste kenmerk van een full node?
answer: Het downloadt en valideert de volledige blockchain
wrong_answers:
  - Alleen de headers van het blok blijven behouden
  - Het verwijdert oude blokken na verificatie
  - Het is afhankelijk van een andere ode om transacties te valideren
explanation: |
  De full node behoudt de volledige blockchain en valideert elk blok en elke transactie onafhankelijk.
reviewed: true

question: Каква е основната характеристика на full node?
answer: Той изтегля и валидира целия Blockchain
wrong_answers:
  - Тя запазва само заглавията на блоковете
  - Изтрива стари блокове след проверка
  - Той зависи от друг възел за валидиране на транзакциите
explanation: |
  full node запазва целия Blockchain и валидира независимо всеки блок и транзакция.
reviewed: true
question: Каква е основната характеристика на full node?
answer: изтегля и валидира целия блокчейн
wrong_answers:
  - запазва само заглавията на блоковете
  - Изтрива стари блокове след проверка
  - зависи от друг възел за валидиране на транзакциите
explanation: |
  full node запазва целия блокчейн и валидира независимо всички блокове и транзакции.

question: Full node की मुख्य विशेषता क्या है?
answer: यह संपूर्ण Blockchain को डाउनलोड और सत्यापित करता है
wrong_answers:
  - यह केवल ब्लॉक हेडर को ही बरकरार रखता है
  - यह सत्यापन के बाद पुराने ब्लॉकों को हटा देता है
  - यह लेनदेन को मान्य करने के लिए दूसरे नोड पर निर्भर करता है
explanation: |
  Full node संपूर्ण Blockchain को बरकरार रखता है तथा प्रत्येक ब्लॉक और लेनदेन को स्वतंत्र रूप से मान्य करता है।
reviewed: true
question: Какова основная характеристика Full node?
answer: Он загружает и проверяет весь Blockchain
wrong_answers:
  - Он сохраняет только головные части блока
  - Он удаляет старые блоки после проверки
  - Он зависит от другого узла для подтверждения транзакций
explanation: |
  Full node сохраняет весь Blockchain и проверяет каждый блок и транзакцию независимо.
reviewed: true
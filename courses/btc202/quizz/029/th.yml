question: ลักษณะเด่นของ full node คืออะไร?
answer: มันดาวน์โหลดและตรวจสอบความถูกต้องของ Blockchain ทั้งหมด
wrong_answers:
  - มันเก็บรักษาไว้เฉพาะส่วนหัวของบล็อก
  - มันลบบล็อกเก่าหลังจากการตรวจสอบ
  - ขึ้นอยู่กับโหนดอื่นในการตรวจสอบธุรกรรม
explanation: |
  full node รักษา Blockchain ทั้งหมดและตรวจสอบความถูกต้องของแต่ละบล็อกและธุรกรรมอย่างอิสระ
reviewed: true
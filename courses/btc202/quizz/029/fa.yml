question: ویژگی اصلی یک Full node چیست؟
answer: کل Blockchain را دانلود و اعتبارسنجی می‌کند.
wrong_answers:
  - فقط سرآیندهای بلوک را حفظ می‌کند
  - پس از تأیید، بلوک‌های قدیمی را حذف می‌کند.
  - این به یک نود دیگر برای اعتبارسنجی تراکنش‌ها وابسته است.
explanation: |
  Full node کل Blockchain را حفظ می‌کند و هر بلوک و تراکنش را به‌طور مستقل اعتبارسنجی می‌کند.
reviewed: true
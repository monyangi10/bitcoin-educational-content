question: Koja je glavna karakteristika full node-a (kompletnog čvora)?
answer: Preuzima i validira ceo Blockchain
wrong_answers:
  - Zadržava samo zaglavlja blokova
  - Briše stare blokove nakon verifikacije
  - Zavisi od drugog čvora za validaciju transakcija
explanation: |
  Full node zadržava ceo Blockchain i validira svaki blok i transakciju nezavisno.
reviewed: true

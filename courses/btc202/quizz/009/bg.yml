question: Каква е основната функция на възел Bitcoin?
answer: Запазване на Blockchain и валидиране на транзакции и блокове
wrong_answers:
  - Съхраняване на частни ключове и изграждане на транзакции
  - Създаване на нови адреси за потребителите
  - Конвертиране на биткойни във фиатни валути
explanation: |
  Възел Bitcoin поддържа копие на Blockchain и участва в потвърждаването и предаването на транзакции и блокове.
reviewed: true
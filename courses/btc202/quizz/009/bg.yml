question: Каква е основната функция на възела в Биткойн?
answer: Запазване на блокчейна и валидиране на транзакции и блокове
wrong_answers:
  - Съхраняване на частни ключове и изграждане на транзакции
  - Създаване на нови адреси за потребителите
  - Конвертиране на биткойни във фиатни валути
explanation: |
  Възелът в Биткойн поддържа копие на блокчейна и участва в потвърждаването и предаването на транзакции и блокове.
reviewed: true

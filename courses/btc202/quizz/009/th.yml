question: ฟังก์ชันหลักของโหนด Bitcoin คืออะไร?
answer: บันทึก Blockchain และตรวจสอบธุรกรรมและบล็อก
wrong_answers:
  - จัดเก็บคีย์ส่วนตัวและสร้างธุรกรรม
  - สร้างที่อยู่ใหม่สำหรับผู้ใช้
  - แปลงบิตคอยน์เป็นสกุลเงินเฟียต
explanation: |
  โหนด Bitcoin รักษาสำเนาของ Blockchain และมีส่วนร่วมในการตรวจสอบและส่งต่อธุรกรรมและบล็อก
reviewed: true
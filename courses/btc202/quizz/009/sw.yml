question: Je, kazi kuu ya node ya Bitcoin ni ipi?
answer: Okoa Blockchain na uthibitishe shughuli na vizuizi
wrong_answers:
  - Hifadhi funguo za kibinafsi na ufanye miamala
  - Unda address mpya za watumiaji
  - Badilisha bitcoins kuwa sarafu za fiat
explanation: |
  Node ya Bitcoin hudumisha nakala ya Blockchain na inashiriki katika kuthibitisha na kusambaza miamala na blocks.
reviewed: true

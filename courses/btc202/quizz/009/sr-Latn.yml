question: Koja je glavna funkcija Bitcoin čvora?
answer: Čuvanje kopije Blockchain-a i validacija transakcija i blokova
wrong_answers:
  - Čuvanje privatnih ključeva i kreiranje transakcije
  - Kreiranje nove adrese za korisnike
  - Pretvaranje bitkoina u fiat valute
explanation: |
  Bitcoin čvor čuva kopiju Blockchain-a i učestvuje u validaciji i prenosu transakcija i blokova.
reviewed: true

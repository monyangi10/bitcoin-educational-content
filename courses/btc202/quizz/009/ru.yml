question: Какова основная функция узла Bitcoin?
answer: Сохраните Blockchain и проверьте транзакции и блоки
wrong_answers:
  - Храните закрытые ключи и создавайте транзакции
  - Создание новых адресов для пользователей
  - Конвертируйте биткоины в фиатные валюты
explanation: |
  Узел Bitcoin хранит копию Blockchain и участвует в проверке и передаче транзакций и блоков.

question: Was ist die Hauptfunktion einer Bitcoin Node?
answer: Die Blockchain speichern und Transaktionen und Blöcke validieren
wrong_answers:
  - Private Schlüssel speichern und Transaktionen erstellen
  - Neue Adressen für Benutzer anlegen
  - Bitcoins in Fiat-Währungen umwandeln
explanation: |
  Eine Bitcoin Node unterhält eine Kopie der Blockchain und ist an der Validierung und Weiterleitung von Transaktionen und Blöcken beteiligt.
reviewed: true

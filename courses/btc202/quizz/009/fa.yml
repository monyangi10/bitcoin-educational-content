question: عملکرد اصلی یک گره Bitcoin چیست؟
answer: ذخیره Blockchain و اعتبارسنجی تراکنش‌ها و بلوک‌ها
wrong_answers:
  - کلیدهای خصوصی را ذخیره کنید و تراکنش‌ها را بسازید
  - ایجاد آدرس‌های جدید برای کاربران
  - تبدیل بیت‌کوین به ارزهای فیات
explanation: |
  یک نود Bitcoin یک کپی از Blockchain را نگه می‌دارد و در اعتبارسنجی و انتقال تراکنش‌ها و بلوک‌ها مشارکت می‌کند.
reviewed: true
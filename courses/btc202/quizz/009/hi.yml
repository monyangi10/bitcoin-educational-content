question: Bitcoin नोड का मुख्य कार्य क्या है?
answer: Blockchain को सहेजें और लेनदेन और ब्लॉक को मान्य करें
wrong_answers:
  - निजी कुंजियाँ संग्रहीत करें और लेनदेन बनाएँ
  - उपयोगकर्ताओं के लिए नए पते बनाएँ
  - बिटकॉइन को फिएट मुद्राओं में परिवर्तित करें
explanation: |
  Bitcoin नोड, Blockchain की एक प्रति बनाए रखता है तथा लेन-देन और ब्लॉकों के सत्यापन और रिले करने में भाग लेता है।
reviewed: true
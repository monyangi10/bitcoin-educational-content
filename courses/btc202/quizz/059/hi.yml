question: Bitcoin core तक दूर से पहुंचने का सबसे अच्छा तरीका क्या है?
answer: RPC पोर्ट को उजागर करना
wrong_answers:
  - टोर का उपयोग करना
  - वीपीएन का उपयोग करना
  - इलेक्ट्रम सर्वर को उजागर करना
explanation: |
  RPC पोर्ट को अनएन्क्रिप्टेड रूप में उजागर करना एक बड़ा सुरक्षा जोखिम प्रस्तुत करता है। Tor या VPN बेहतर है।
reviewed: true
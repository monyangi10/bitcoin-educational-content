question: Какъв е най-добрият начин за отдалечен достъп до Bitcoin core?
answer: Разкриване на порта RPC
wrong_answers:
  - Използване на Tor
  - Използване на VPN услуга
  - Излагане на сървър Electrum
explanation: |
  Излагането на порта RPC без криптиране представлява сериозен риск за сигурността. За предпочитане е използването на Tor или VPN.
reviewed: true

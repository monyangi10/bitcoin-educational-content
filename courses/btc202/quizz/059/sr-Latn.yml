question: Koja metoda se ne preporučuje za daljinski pristup Bitcoin Core-u?
answer: Ostavljanje RPC porta javno dostupnim bez zaštite (u čistom tekstu)
wrong_answers:
  - Korišćenje Tor-a
  - Korišćenje VPN-a
  - Stavljanje Electrum server javno dostupnim
explanation: |
  Javno izlaganje RPC porta bez enkripcije predstavlja veliki bezbednosni rizik. Tor ili VPN su poželjni.
reviewed: true

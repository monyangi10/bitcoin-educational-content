question: Ni ipi njia bora ya kufikia Bitcoin core kwa mbali?
answer: Inafichua port ya RPC
wrong_answers:
  - Kwa kutumia Tor
  - Kutumia VPN
  - Kufichua server ya Electrum
explanation: |
  Kufichua mlango wa RPC ambao haujasimbwa huleta hatari kubwa ya usalama. Tor au VPN ni vyema.
reviewed: true

question: Каков наилучший способ удаленного доступа к Bitcoin core?
answer: Раскрытие порта RPC
wrong_answers:
  - Использование Tor
  - Использование VPN
  - Раскрытие сервера Electrum
explanation: |
  Незашифрованный порт RPC представляет собой серьезный риск для безопасности. Предпочтительнее использовать Tor или VPN.
reviewed: true
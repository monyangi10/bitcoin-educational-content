question: วิธีที่ดีที่สุดในการเข้าถึง Bitcoin Core จากระยะไกลคืออะไร?
answer: เปิดเผยพอร์ต RPC
wrong_answers:
  - การใช้ Tor
  - การใช้ VPN
  - การเปิดเผยเซิร์ฟเวอร์ Electrum
explanation: |
  การเปิดเผยพอร์ต RPC โดยไม่มีการเข้ารหัสเป็นความเสี่ยงด้านความปลอดภัยที่สำคัญ ควรใช้ Tor หรือ VPN
reviewed: true
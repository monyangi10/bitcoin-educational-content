question: Защо размерът на UTXO има тенденция да нараства структурно с течение на времето?
answer: Всяко плащане обикновено създава две нови UTXO
wrong_answers:
  - Конвенционалните плащания не консумират UTXO на входа
  - Всеки Fork умножава броя на съществуващите UTXOs
  - Броят на биткойните, които могат да бъдат създадени, е безкраен
explanation: |
  Платежната транзакция консумира един UTXO и често пресъздава два (плащане + ресто), което увеличава общия размер на UTXO.
reviewed: true

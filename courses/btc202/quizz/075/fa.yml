question: چرا اندازه مجموعه UTXO به مرور زمان به صورت ساختاری تمایل به رشد دارد؟
answer: هر پرداخت به طور کلی دو UTXO جدید ایجاد می‌کند
wrong_answers:
  - پرداخت‌های متعارف هیچ UTXO در ورودی مصرف نمی‌کنند.
  - هر Fork تعداد UTXOهای موجود را چند برابر می‌کند
  - تعداد بیت‌کوین‌هایی که می‌توان ایجاد کرد بی‌نهایت است.
explanation: |
  یک تراکنش پرداخت یک UTXO مصرف می‌کند و اغلب دو (پرداخت + Exchange) ایجاد می‌کند، که اندازه کل مجموعه را افزایش می‌دهد.
reviewed: true
question: ทำไมขนาดของชุด UTXO จึงมีแนวโน้มที่จะเติบโตเชิงโครงสร้างเมื่อเวลาผ่านไป?
answer: การชำระเงินแต่ละครั้งมักจะสร้าง UTXO ใหม่สองรายการ
wrong_answers:
  - การชำระเงินแบบดั้งเดิมไม่ใช้ UTXO ในการป้อนข้อมูล
  - แต่ละ Fork คูณจำนวน UTXO ที่มีอยู่
  - จำนวนบิตคอยน์ที่สามารถสร้างได้มีจำนวนจำกัด
explanation: |
  ธุรกรรมการชำระเงินใช้ UTXO หนึ่งรายการและมักจะสร้างสองรายการใหม่ (การชำระเงิน + การแลกเปลี่ยน) ซึ่งทำให้ขนาดรวมของชุดเพิ่มขึ้น
reviewed: true
question: Почему размер набора UTXO имеет тенденцию к структурному росту с течением времени?
answer: Каждый платеж, как правило, создает два новых UTXO
wrong_answers:
  - Обычные платежи не потребляют ни одного ГВт-1 на входе
  - Каждый Fork умножает количество существующих UTXO
  - Количество биткоинов, которые можно создать, бесконечно
explanation: |
  Платежная транзакция потребляет один UTXO и часто воссоздает два (платеж + Exchange), увеличивая общий размер набора.
reviewed: true
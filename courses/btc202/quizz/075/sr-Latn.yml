question: Zašto veličina UTXO seta teži da strukturalno raste tokom vremena?
answer: Svaka uplata obično stvara dva nova UTXO-a
wrong_answers:
  - Konvencionalna plaćanja ne troše UTXO na ulazu
  - Svaki fork množi broj postojećih UTXO-a
  - Broj bitkoina koji se može stvoriti je beskonačan
explanation: |
  Transakcija plaćanja troši jedan UTXO i često rekreira dva (plaćanje + kusur), povećavajući ukupnu veličinu UTXO seta.
reviewed: true

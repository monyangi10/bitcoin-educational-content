question: Warum nimmt der Umfang des UTXO-Sets mit der Zeit strukturell zu?
answer: Mit jeder Zahlung werden im Allgemeinen zwei neue UTXOs geschaffen
wrong_answers:
  - Konventionelle Zahlungen verbrauchen keine UTXO als Input
  - Jede Fork vervielfacht die Anzahl der vorhandenen UTXOs
  - Die Anzahl der Bitcoins, die erzeugt werden können, ist unbegrenzt
explanation: |
  Eine Zahlungstransaktion verbraucht einen UTXO und erzeugt oft zwei neue (Zahlung + Wechselgeld), was die Gesamtgröße des UTXO-Sets aufbläht.
reviewed: true

question: UTXO सेट का आकार समय के साथ संरचनात्मक रूप से क्यों बढ़ता है?
answer: प्रत्येक भुगतान आम तौर पर दो नए UTXO बनाता है
wrong_answers:
  - पारंपरिक भुगतानों में UTXO इनपुट की कोई खपत नहीं होती
  - प्रत्येक Fork मौजूदा UTXOs की संख्या को गुणा करता है
  - बनाए जा सकने वाले बिटकॉइन की संख्या अनंत है
explanation: |
  एक भुगतान लेनदेन में एक UTXO का उपयोग होता है और अक्सर दो (भुगतान + Exchange) का पुनः निर्माण होता है, जिससे सेट का कुल आकार बढ़ जाता है।
reviewed: true
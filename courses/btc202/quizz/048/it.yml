question: Quale comando recupera l'IP locale Address di Umbrel se l'accesso tramite umbrel.local fallisce?
answer: hostname -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --show
  - netstat -umbrel
explanation: |
  In caso di problemi di rilevamento, è possibile utilizzare il comando hostname -I sul dispositivo Umbrel per scoprire il suo IP locale.
reviewed: true

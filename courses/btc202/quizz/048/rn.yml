question: Ni irihe tegeko rigarura IP y'aho hantu Address y'Umbrel yawe iyo gushika ku umbrel.local bidashoboka?
answer: hostname -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --show
  - netstat -umbrel
explanation: |
  Mu gihe habaye ingorane zo kumenya, ushobora gukoresha itegeko ry'izina ry'umushitsi -I ku mashini ya Umbrel kugira ngo umenye IP yayo yo mu karere.
reviewed: true

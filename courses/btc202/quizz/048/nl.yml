question: Welk commando haalt het lokale IP Address van je Umbrel op als toegang via umbrel.local mislukt?
answer: hostnaam -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --weergeven
  - netstat -umbrel
explanation: |
  Bij detectieproblemen kunt u het commando hostname -I op de Umbrel-machine gebruiken om het lokale IP-adres te achterhalen.
reviewed: true
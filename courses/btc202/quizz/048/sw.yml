question: Ni amri gani hupata IP ya ndani Address ya Mwavuli wako ikiwa ufikiaji kupitia umbrel.local utashindwa?
answer: hostname -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --show
  - netstat -umbrel
explanation: |
  Katika tukio la matatizo ya kugundua, unaweza kutumia jina la mwenyeji -I amri kwenye mashine ya Umbrel ili kujua IP yake ya ndani.
reviewed: true

question: Which command retrieves the local IP address of your Umbrel if access via umbrel.local fails?
answer: hostname -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --show
  - netstat -umbrel
explanation: |
  In the event of detection problems, you can use the hostname -I command on the Umbrel machine to find out its local IP.
reviewed: true

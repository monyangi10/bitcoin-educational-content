question: यदि umbrel.local के माध्यम से पहुंच विफल हो जाती है, तो कौन सा कमांड आपके अम्ब्रेल के स्थानीय IP Address को पुनः प्राप्त करता है?
answer: hostname -I
wrong_answers:
  - ifconfig -usb
  - umbrel-ip --show
  - netstat -umbrel
explanation: |
  पहचान संबंधी समस्याओं की स्थिति में, आप अम्ब्रेल मशीन पर होस्टनाम -I कमांड का उपयोग करके उसका स्थानीय आईपी पता कर सकते हैं।
reviewed: true

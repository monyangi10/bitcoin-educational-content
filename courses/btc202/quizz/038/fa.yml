question: چرا یک HDD برای یک نود Bitcoin توصیه نمی‌شود؟
answer: زیرا این به طور قابل توجهی IBD و استفاده عمومی را کند می‌کند
wrong_answers:
  - زیرا نمی‌تواند فایل‌های Blockchain را ذخیره کند
  - زیرا انرژی بسیار کمی مصرف می‌کند و خطر انفجار دارد
  - زیرا با Bitcoin core ناسازگار است
explanation: |
  دیسک‌های مکانیکی عملکرد را محدود می‌کنند، به طور قابل توجهی IBD را طولانی می‌کنند و تحت بار گره به سرعت فرسوده می‌شوند.
reviewed: true
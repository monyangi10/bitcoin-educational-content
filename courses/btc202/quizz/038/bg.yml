question: Защо не се препоръчва използването на твърд диск за възел Bitcoin?
answer: Тъй като значително забавя IBD и общата употреба
wrong_answers:
  - Тъй като не може да съхранява файлове Blockchain
  - Защото консумира твърде малко енергия и рискува да се взриви
  - Защото е несъвместим с Bitcoin Core
explanation: |
  Механичните дискове ограничават производителността, удължават значително IBD и се износват бързо при натоварване на възела.
reviewed: true
question: Pourquoi un HDD est-il déconseillé pour un nœud Bitcoin ?
answer: Car il ralentit fortement l’IBD et l’usage général
wrong_answers:
  - Car il ne peut pas stocker de fichiers blockchain
  - Car il consomme trop peu d’énergie et risque d'exploser
  - Car il est incompatible avec Bitcoin Core
explanation: |
  Les disques mécaniques limitent les performances, allongent énormément l’IBD et s’usent vite sous la charge d’un nœud.
reviewed: false

question: Bitcoin नोड के लिए HDD की अनुशंसा क्यों नहीं की जाती है?
answer: क्योंकि यह आईबीडी और सामान्य उपयोग को काफी धीमा कर देता है
wrong_answers:
  - क्योंकि यह Blockchain फ़ाइलें संग्रहीत नहीं कर सकता
  - क्योंकि इसमें बहुत कम ऊर्जा की खपत होती है और विस्फोट का खतरा रहता है
  - क्योंकि यह Bitcoin core के साथ असंगत है
explanation: |
  यांत्रिक डिस्क प्रदर्शन को सीमित कर देती हैं, आईबीडी को काफी लम्बा कर देती हैं, तथा नोड लोड के तहत शीघ्र ही खराब हो जाती हैं।
reviewed: true
question: Почему для узла Bitcoin не рекомендуется использовать жесткий диск?
answer: Поскольку он значительно замедляет развитие IBD и общего использования
wrong_answers:
  - Поскольку он не может хранить файлы Blockchain
  - Потому что он потребляет слишком мало энергии и рискует взорваться
  - Потому что он несовместим с Bitcoin core
explanation: |
  Механические диски ограничивают производительность, значительно удлиняют IBD и быстро изнашиваются при узловой нагрузке.
reviewed: true
question: ทำไมไม่แนะนำให้ใช้ HDD สำหรับโหนด Bitcoin?
answer: เพราะมันทำให้ IBD และการใช้งานทั่วไปช้าลงอย่างมาก
wrong_answers:
  - เนื่องจากไม่สามารถจัดเก็บไฟล์ Blockchain
  - เพราะมันใช้พลังงานน้อยเกินไปและเสี่ยงต่อการระเบิด
  - เนื่องจากไม่เข้ากันกับ Bitcoin Core
explanation: |
  ดิสก์กลไกจำกัดประสิทธิภาพ ยืดระยะเวลา IBD อย่างมาก และสึกหรออย่างรวดเร็วภายใต้ภาระของโหนด
reviewed: true
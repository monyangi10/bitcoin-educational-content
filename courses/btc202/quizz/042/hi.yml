question: अम्ब्रेलओएस किस लाइसेंस के तहत वितरित किया जाता है?
answer: पॉलीफॉर्म गैर-वाणिज्यिक 1.0
wrong_answers:
  - एमआईटी
  - जीपीएलव3
  - अपाचे 2.0
explanation: |
  अम्ब्रेलओएस को पॉलीफॉर्म नॉनकमर्शियल 1.0 लाइसेंस के तहत जारी किया गया है, जो व्यक्तिगत उपयोग की अनुमति देता है लेकिन वाणिज्यिक उपयोग को प्रतिबंधित करता है।
reviewed: true
question: UmbrelOS được phân phối theo giấy phép nào?
answer: PolyForm Phi thương mại 1.0
wrong_answers:
  - Viện Công nghệ Massachusetts
  - GPLv3
  - Apache 2.0
explanation: |
  umbrelOS được phát hành theo giấy phép PolyForm Noncommercial 1.0, cho phép sử dụng cá nhân nhưng cấm sử dụng cho mục đích thương mại.
reviewed: true
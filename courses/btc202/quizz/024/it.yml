question: Qual è il rischio se un wallet dipende da un nodo di terze parti?
answer: Rischio di sorveglianza e censura
wrong_answers:
  - Rischio di double-spending automatico
  - Rischio di perdita delle chiavi private
  - Rischio di perdita e monitoraggio
explanation: |
  Un nodo di terze parti può analizzare o bloccare le vostre transazioni, o addirittura associare i vostri dati alla vostra identità.
reviewed: true

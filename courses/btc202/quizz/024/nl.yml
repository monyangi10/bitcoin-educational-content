question: Wat is het risico als een wallet afhankelijk is van een node van een derde partij?
answer: Risico van toezicht en censuur
wrong_answers:
  - Risico op automatische double-spending
  - Risico op verlies van privésleutels
  - Risico op verlies en controle
explanation: |
  Een externe node kan je transacties analyseren of blokkeren, of zelfs je gegevens koppelen aan je identiteit.
reviewed: true

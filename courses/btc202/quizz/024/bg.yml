question: Какъв е рискът, ако wallet зависи от възел на трета страна?
answer: Риск от наблюдение и цензура
wrong_answers:
  - Риск от автоматичен double-spending
  - Риск от загуба на частни ключове
  - Риск от загуба и наблюдение
explanation: |
  Възел на трета страна може да анализира или блокира трансакциите ви или дори да свърже данните ви с вашата самоличност.
reviewed: true
question: Каков риск, если Wallet зависит от узла стороннего производителя?
answer: Риск слежки и цензуры
wrong_answers:
  - Риск автоматического Double-spending
  - Риск потери закрытых ключей
  - Риск потери и мониторинг
explanation: |
  Сторонний узел может анализировать или блокировать ваши транзакции и даже связывать ваши данные с вашей личностью.
reviewed: true
question: Was ist das Risiko, wenn eine Wallet von einer Node eines Drittanbieters abhängt?
answer: Gefahr von Überwachung und Zensur
wrong_answers:
  - Risiko der automatischen Double-spending
  - Risiko des Verlusts privater Schlüssel
  - Verlustrisiko und Überwachung
explanation: |
  Eine fremde Node kann deine Transaktionen analysieren oder blockieren oder sogar deine Daten mit deiner Identität in Verbindung bringen.
reviewed: true

question: ความเสี่ยงคืออะไรหาก wallet ขึ้นอยู่กับโหนดของบุคคลที่สาม?
answer: ความเสี่ยงของการเฝ้าระวังและการเซ็นเซอร์
wrong_answers:
  - ความเสี่ยงของ double-spending อัตโนมัติ
  - ความเสี่ยงในการสูญเสียกุญแจส่วนตัว
  - ความเสี่ยงของการสูญเสียและการติดตามผล
explanation: |
  โหนดของบุคคลที่สามสามารถวิเคราะห์หรือบล็อกธุรกรรมของคุณ หรือแม้กระทั่งเชื่อมโยงข้อมูลของคุณกับตัวตนของคุณ
reviewed: true
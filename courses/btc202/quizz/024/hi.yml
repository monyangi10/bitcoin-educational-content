question: यदि Wallet किसी तृतीय-पक्ष नोड पर निर्भर करता है तो जोखिम क्या है?
answer: निगरानी और सेंसरशिप का जोखिम
wrong_answers:
  - स्वचालित Double-spending का जोखिम
  - निजी कुंजी खोने का जोखिम
  - हानि का जोखिम और निगरानी
explanation: |
  एक तृतीय-पक्ष नोड आपके लेन-देन का विश्लेषण या अवरोधन कर सकता है, या यहां तक ​​कि आपके डेटा को आपकी पहचान के साथ जोड़ सकता है।
reviewed: true
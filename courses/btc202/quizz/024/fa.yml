question: خطر چیست اگر یک Wallet به یک نود شخص ثالث وابسته باشد؟
answer: خطر نظارت و سانسور
wrong_answers:
  - خطر Double-spending خودکار
  - خطر از دست دادن کلیدهای خصوصی
  - ریسک از دست دادن و نظارت
explanation: |
  یک نود شخص ثالث می‌تواند تراکنش‌های شما را تحلیل یا مسدود کند، یا حتی داده‌های شما را با هویتتان مرتبط سازد.
reviewed: true
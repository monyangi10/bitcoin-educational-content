question: Cộng đồng Umbrel hoạt động tích cực nhất ở đâu?
answer: Trên Discord và diễn đàn trực tuyến
wrong_answers:
  - Trên Instagram
  - Trên LinkedIn và diễn đàn trực tuyến
  - Trên IRC
explanation: |
  Umbrel có một cộng đồng rất năng động trên Discord và trên diễn đàn trực tuyến, nơi người dùng Exchange giúp đỡ và hỗ trợ.
reviewed: true
question: सबसे अधिक सक्रिय अम्ब्रेल समुदाय कहां है?
answer: डिस्कॉर्ड और ऑनलाइन फ़ोरम पर
wrong_answers:
  - Instagram पर
  - लिंक्डइन और ऑनलाइन फ़ोरम पर
  - आईआरसी पर
explanation: |
  अम्ब्रेल का डिस्कॉर्ड और उसके ऑनलाइन फोरम पर एक बहुत सक्रिय समुदाय है, जहां उपयोगकर्ता Exchange सहायता और समर्थन करते हैं।
reviewed: true
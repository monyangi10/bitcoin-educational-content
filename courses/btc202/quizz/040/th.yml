question: ชุมชน Umbrel ที่มีความเคลื่อนไหวมากที่สุดอยู่ที่ไหน?
answer: บน Discord และฟอรัมออนไลน์
wrong_answers:
  - บนอินสตาแกรม
  - บน LinkedIn และฟอรัมออนไลน์
  - บน IRC
explanation: |
  Umbrel มีชุมชนที่มีความเคลื่อนไหวมากบน Discord และบนฟอรัมออนไลน์ของมัน ซึ่งผู้ใช้แลกเปลี่ยนความช่วยเหลือและการสนับสนุนกัน
reviewed: true
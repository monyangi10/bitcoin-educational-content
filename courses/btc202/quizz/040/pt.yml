question: Onde se encontra a comunidade Umbrel mais ativa?
answer: Sobre o Discord e o fórum em linha
wrong_answers:
  - No Instagram
  - Sobre o LinkedIn e o fórum em linha
  - No IRC
explanation: |
  A Umbrel tem uma comunidade muito ativa no Discord e no seu fórum online, onde os utilizadores Exchange ajudam e apoiam.

question: Quelle méthode simple permet de connecter un portefeuille mobile à Electrs via Umbrel ?
answer: Scanner le QR code Tor
wrong_answers:
  - Télécharger un fichier cookie
  - Importer la clé privée
  - Copier le fichier wallet.dat
explanation: |
  Umbrel permet de scanner directement le QR code Tor fourni par Electrs pour configurer la connexion mobile.
reviewed: true 

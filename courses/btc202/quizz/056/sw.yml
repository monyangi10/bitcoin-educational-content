question: Je, ni ipi njia rahisi zaidi ya kuunganisha simu ya mkononi ya Wallet kwa Electrs kupitia Umbrel?
answer: Changanua msimbo wa Tor QR
wrong_answers:
  - Pakua faili ya kuki
  - Ingiza ufunguo wa kibinafsi
  - Nakili faili ya Wallet.dat
explanation: |
  Umbrel hukuruhusu kuchanganua moja kwa moja msimbo wa Tor QR uliotolewa na Electrs ili kusanidi muunganisho wako wa rununu.
reviewed: true
question: अम्ब्रेल के माध्यम से मोबाइल Wallet को इलेक्ट्रस से जोड़ने का सबसे आसान तरीका क्या है?
answer: Tor QR कोड स्कैन करें
wrong_answers:
  - कुकी फ़ाइल डाउनलोड करें
  - निजी कुंजी आयात करें
  - Wallet.dat फ़ाइल की प्रतिलिपि बनाएँ
explanation: |
  अम्ब्रेल आपको अपने मोबाइल कनेक्शन को कॉन्फ़िगर करने के लिए इलेक्ट्रस द्वारा प्रदान किए गए टोर क्यूआर कोड को सीधे स्कैन करने की अनुमति देता है।
reviewed: true
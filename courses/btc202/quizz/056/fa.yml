question: آسان‌ترین راه برای اتصال یک موبایل Wallet به Electrs از طریق Umbrel چیست؟
answer: کد QR تور را اسکن کنید
wrong_answers:
  - دانلود فایل کوکی
  - کلید خصوصی را وارد کنید
  - کپی کردن فایل Wallet.dat
explanation: |
  آمبرل به شما این امکان را می‌دهد که به‌طور مستقیم کد QR تور ارائه‌شده توسط Electrs را برای پیکربندی اتصال موبایل خود اسکن کنید.
reviewed: true
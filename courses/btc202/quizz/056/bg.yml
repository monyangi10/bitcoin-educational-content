question: Какъв е най-лесният начин за свързване на мобилен портфейл към Electrs чрез Umbrel?
answer: Сканиране на QR кода на Tor
wrong_answers:
  - Изтегляне на файл с бисквитки
  - Импортиране на частен ключ
  - Копирайте файла Wallet.dat
explanation: |
  Umbrel ви позволява директно да сканирате Tor QR кода, предоставен от Electrs, за да конфигурирате мобилната си връзка.
reviewed: true

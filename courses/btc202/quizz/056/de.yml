question: Wie lässt sich eine mobile Wallet am einfachsten über Umbrel an Electrs anschließen?
answer: Scannen des Tor QR-Codes
wrong_answers:
  - Herunterladen einer Cookie-Datei
  - Importieren desPrivaten Schlüssel
  - Kopieren der Datei Wallet.dat
explanation: |
  Umbrel ermöglicht es dir, den von Electrs bereitgestellten Tor-QR-Code direkt zu scannen, um deine mobile Verbindung zu konfigurieren.
reviewed: true

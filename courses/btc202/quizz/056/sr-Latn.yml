question: Koji je najlakši način da povežete mobilni novčanik sa Electrs putem Umbrel-a?
answer: Skeniranjem Tor QR koda
wrong_answers:
  - Preuzimanje datoteke kolačića
  - Importovanje privatnog ključa
  - Kopiranjem Wallet.dat datoteke
explanation: |
  Umbrel vam omogućava da direktno skenirate Tor QR kod koji pruža Electrs za konfiguraciju vaše mobilne veze.
reviewed: true

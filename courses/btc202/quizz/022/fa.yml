question: طبق نظریه تراوش، عبور از آستانه بحرانی چه چیزی را تضمین می‌کند؟
answer: انتشار تراکنش در سراسر شبکه
wrong_answers:
  - ایجاد فوری یک بلوک جدید
  - سرکوب خودکار هزینه توسط نودها
  - مسدود کردن یک تراکنش توسط شبکه
explanation: |
  به محض اینکه آستانه نفوذ عبور کند، یک تراکنش تقریباً به صورت لحظه‌ای در سراسر شبکه Bitcoin منتشر می‌شود.
reviewed: true
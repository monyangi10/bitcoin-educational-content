question: Согласно теории перколяции, что обеспечивает превышение критического порога?
answer: Распространение транзакций по сети
wrong_answers:
  - Немедленное создание нового блока
  - Автоматическое подавление затрат на узлах
  - Блокирование транзакции сетью
explanation: |
  Как только порог перколяции превышен, транзакция практически мгновенно распространяется по сети Bitcoin.
reviewed: true
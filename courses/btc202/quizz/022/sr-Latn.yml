question: Prema teoriji perkolacije, šta obezbeđuje prekoračenje kritičnog praga?
answer: Propagaciju transakcije kroz mrežu
wrong_answers:
  - Trenutno kreiranje novog bloka
  - Automatsko suzbijanje troškova pomoću čvorova
  - Blokiranje transakcije od strane mreže
explanation: |
  Jednom kada je prag perkolacije premašen, transakcija se širi gotovo trenutno kroz Bitcoin mrežu.
reviewed: true

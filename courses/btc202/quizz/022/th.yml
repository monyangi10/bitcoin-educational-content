question: ตามทฤษฎีการซึมผ่าน การเกินเกณฑ์วิกฤตจะทำให้มั่นใจในอะไร?
answer: การแพร่กระจายของธุรกรรมทั่วทั้งเครือข่าย
wrong_answers:
  - การสร้างบล็อกใหม่ทันที
  - การลดต้นทุนอัตโนมัติโดยโหนด
  - การบล็อกธุรกรรมโดยเครือข่าย
explanation: |
  เมื่อเกินเกณฑ์การซึมผ่านแล้ว การทำธุรกรรมจะแพร่กระจายเกือบจะทันทีทั่วทั้งเครือข่าย Bitcoin
reviewed: true
question: अंतःस्त्राव सिद्धांत के अनुसार, महत्वपूर्ण सीमा पार करने से क्या सुनिश्चित होता है?
answer: पूरे नेटवर्क में लेनदेन का प्रसार
wrong_answers:
  - एक नए ब्लॉक का तत्काल निर्माण
  - नोड्स द्वारा स्वचालित लागत दमन
  - नेटवर्क द्वारा लेनदेन को अवरुद्ध करना
explanation: |
  एक बार जब परकोलेशन सीमा पार हो जाती है, तो लेनदेन लगभग तुरंत ही पूरे Bitcoin नेटवर्क में प्रसारित हो जाता है।
reviewed: true
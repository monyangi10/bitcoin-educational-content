question: Secondo la teoria della percolazione, cosa garantisce il superamento della soglia critica?
answer: Propagazione delle transazioni in tutto il network
wrong_answers:
  - Creazione immediata di un nuovo blocco
  - Soppressione automatica dei costi da parte dei nodi
  - Blocco di una transazione da parte del network
explanation: |
  Una volta superata la soglia di percolazione, una transazione si propaga quasi istantaneamente in tutto il network Bitcoin.
reviewed: true

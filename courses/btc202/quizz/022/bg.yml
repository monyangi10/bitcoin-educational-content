question: Според теорията за перколацията какво гарантира превишаването на критичния праг?
answer: Разпространение на транзакциите в мрежата
wrong_answers:
  - Незабавно създаване на нов блок
  - Автоматично потискане на разходите от възлите
  - Блокиране на транзакция от мрежата
explanation: |
  След като прагът на перколация бъде надхвърлен, дадена транзакция се разпространява почти мигновено в мрежата Bitcoin.
reviewed: true
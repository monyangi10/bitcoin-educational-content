question: Dushingiye ku ciyumviro c’uguca mu mazi (percolation theory), kurenga urugero rw’agaciro bituma umuntu agira iki?
answer: Ugukwiragizwa kw'ibikorwa ku rubuga rwose
wrong_answers:
  - Ubwo nyene kurema ububiko bushasha
  - Guhagarika igiciro ubwavyo n'ibice
  - Guhagarika ubucuruzi n'urubuga
explanation: |
  Iyo umuntu arengeje urugero rw’ugusohoka, igikorwa kirakwiragira hafi mu kanya nk’ako gukubita mu nzira yose ya Bitcoin.
reviewed: true
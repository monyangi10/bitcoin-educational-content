question: आजकल Bitcoin का कुशलतापूर्वक खनन करने के लिए किस प्रकार के उपकरणों का उपयोग किया जाता है?
answer: जीडब्ल्यू-1
wrong_answers:
  - क्लासिक सीपीयू
  - जीपीयू
  - एफपीजीए
explanation: |
  आजकल, Bitcoin और Mining का उपयोग ASICs के माध्यम से किया जाता है। ये SHA-256 एल्गोरिथम के लिए विशेष चिप्स हैं।
reviewed: true
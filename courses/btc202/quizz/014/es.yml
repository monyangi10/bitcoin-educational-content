question: ¿Qué combinaba el software original de Bitcoin en 2009?
answer: Wallet, arco y menor
wrong_answers:
  - Nodo, Miner y Block explorer
  - Wallet, chopper, y Miner
  - Miner y Mining pool
explanation: |
  El software original de Bitcoin integraba las funciones de Wallet, nodo y Miner en un único programa.
reviewed: true
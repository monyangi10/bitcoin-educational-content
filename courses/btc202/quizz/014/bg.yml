question: Какво комбинира оригиналният софтуер Bitcoin през 2009 г.?
answer: Wallet, лък и минор
wrong_answers:
  - Възел, миньор и изследовател на блокове
  - Wallet, хеликоптер и миньор
  - Басейн Miner и mining
explanation: |
  Първоначалният софтуер Bitcoin интегрира функциите на wallet, възела и миньора в една програма.
reviewed: true
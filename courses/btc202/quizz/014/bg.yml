question: Какво комбинира оригиналният софтуер Bitcoin през 2009 г.?
answer: портфейл, възел и миньор
wrong_answers:
  - Възел, миньор и изследовател на блокове
  - портфейл, хеликоптер и миньор
  - Миньорски басейн
explanation: |
  Първоначалният софтуер Bitcoin интегрира функциите на портфейл, възел и миньор в една програма.
reviewed: true

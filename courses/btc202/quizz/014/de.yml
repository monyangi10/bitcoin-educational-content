question: Was hat die ursprüngliche Bitcoin-Software im Jahr 2009 kombiniert?
answer: Wallet, Node und Miner
wrong_answers:
  - Node, Miner und Block-Explorer
  - Wallet und Miner
  - Miner und Mining Pool
explanation: |
  Die ursprüngliche Bitcoin-Software integrierte Wallet-, Node- und Miner-Funktionen in einem einzigen Programm.
reviewed: true

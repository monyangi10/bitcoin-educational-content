question: Perché un miner ha bisogno di un nodo Bitcoin?
answer: Per interagire con il network e distribuire i propri blocchi
wrong_answers:
  - Per le firme digitali generate
  - Per inserire l'indirizzo di consegna nella Coinbase Transaction
  - Per ridurre la difficoltà del mining
explanation: |
  I miner utilizzano un nodo per comunicare con il network, trasmettere i loro blocchi e ricevere le transazioni.
reviewed: true

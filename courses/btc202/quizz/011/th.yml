question: ทำไมนักขุดถึงต้องการโหนด Bitcoin?
answer: โต้ตอบกับเครือข่ายและแจกจ่ายบล็อกของคุณ
wrong_answers:
  - ถึงลายเซ็นดิจิทัล generate
  - ในการป้อนที่อยู่จัดส่งของคุณในธุรกรรม coinbase
  - เพื่อลดความยากของ mining
explanation: |
  นักขุดใช้โหนดในการสื่อสารกับเครือข่าย ส่งบล็อกของพวกเขา และรับธุรกรรม
reviewed: true
question: Защо един миньор се нуждае от възел?
answer: Взаимодействие с мрежата и разпространение на изкопаните от него блокове
wrong_answers:
  - За да генерира цифрови подписи
  - Въвеждане на адреса за доставка в транзакцията в coinbase
  - Да се намали трудността на копаене
explanation: |
  Миньорите използват възел, за да комуникират с мрежата, да предават своите блокове и да получават транзакции.
reviewed: true

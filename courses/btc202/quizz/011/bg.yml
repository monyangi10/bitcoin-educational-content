question: Защо един миньор се нуждае от възел Bitcoin?
answer: Взаимодействие с мрежата и разпространение на вашите блокове
wrong_answers:
  - За цифрови подписи generate
  - Въвеждане на адреса за доставка в транзакцията в coinbase
  - Да се намали трудността на mining
explanation: |
  Миньорите използват възел, за да комуникират с мрежата, да предават своите блокове и да получават транзакции.
reviewed: true
question: Miner को Bitcoin नोड की आवश्यकता क्यों है?
answer: नेटवर्क के साथ बातचीत करने और अपने ब्लॉक वितरित करने के लिए
wrong_answers:
  - generate डिजिटल हस्ताक्षरों के लिए
  - अपनी डिलीवरी Address को Coinbase Transaction में दर्ज करने के लिए
  - Mining की कठिनाई को कम करने के लिए
explanation: |
  खनिक नेटवर्क के साथ संचार करने, अपने ब्लॉकों को प्रेषित करने और लेनदेन प्राप्त करने के लिए नोड का उपयोग करते हैं।
reviewed: true
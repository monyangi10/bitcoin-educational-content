question: Zašto rudarima treba Bitcoin čvor?
answer: Da bi komunicirali sa mrežom i distribuirali svoje blokove
wrong_answers:
  - Za generisanje digitalnog potpisa
  - Da unesu vašu adresu za isplatu u coinbase transakciju
  - Da bi smanjili težinu rudarenja
explanation: |
  Rudari koriste čvor za komunikaciju sa mrežom, prenos svojih blokova i primanje transakcija.
reviewed: true

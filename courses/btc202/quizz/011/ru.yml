question: Зачем узлу Miner нужен узел Bitcoin?
answer: Чтобы взаимодействовать с сетью и распространять свои блоки
wrong_answers:
  - К цифровым подписям generate
  - Чтобы ввести свою доставку Address в Coinbase Transaction
  - Чтобы уменьшить сложность Mining
explanation: |
  Майнеры используют узел для связи с сетью, передачи своих блоков и получения транзакций.
reviewed: true
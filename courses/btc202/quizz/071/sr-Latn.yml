question: Koje datoteke čvor prvo konsultuje da pronađe svoje stare peer-ove pri ponovnom pokretanju?
answer: anchors.dat i peers.dat
wrong_answers:
  - Mempool.dat i peers.dat
  - Mempool.dat i ip.dat
  - ip.dat i anchors.dat
explanation: |
  Bitcoin Core prvo konsultuje anchors.dat (prethodni odlazni čvorovi), zatim peers.dat (knjiga poznatih adresa) da bi se ponovo povezao.
reviewed: true

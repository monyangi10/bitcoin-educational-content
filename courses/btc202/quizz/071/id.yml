question: File mana yang dituju oleh node pertama kali untuk menemukan peers yang lama saat reboot?
answer: anchors.dat dan peers.dat
wrong_answers:
  - Mempool.dat dan peers.dat
  - Mempool.dat dan ip.dat
  - ip.dat dan jangkar.dat
explanation: |
  Bitcoin core pertama-tama menuju ke file anchors.dat (peers yang keluar sebelumnya), kemudian peers.dat (Address book yang dikenal) untuk terhubung kembali.
reviewed: true

question: В кои файлове ползва възелът първоначално, за да намери старите си връзки при рестартиране?
answer: anchors.dat и peers.dat
wrong_answers:
  - Mempool.dat и peers.dat
  - Mempool.dat и ip.dat
  - ip.dat и anchors.dat
explanation: |
  Bitcoin core възел първоначално ползва anchors.dat (предишни изходящи връстници), а след това с peers.dat (известна адресна книга), за да възстанови връзката.
reviewed: true

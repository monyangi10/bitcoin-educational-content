question: В кои файлове първо се консултира възелът, за да намери старите си връстници при рестартиране?
answer: anchors.dat и peers.dat
wrong_answers:
  - Mempool.dat и peers.dat
  - Mempool.dat и ip.dat
  - ip.dat и anchors.dat
explanation: |
  Ядрото на Bitcoin първо се консултира с anchors.dat (предишни изходящи връстници), а след това с peers.dat (известна адресна книга), за да възстанови връзката.
reviewed: true
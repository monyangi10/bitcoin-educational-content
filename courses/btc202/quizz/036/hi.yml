question: मिनी-पीसी की तुलना में समर्पित लैपटॉप का क्या लाभ है?
answer: इसकी बैटरी इन्वर्टर का काम करती है
wrong_answers:
  - यह शांत है
  - यह लंबे समय तक चलता है
  - यह कम ऊर्जा की खपत करता है
explanation: |
  लैपटॉप की बैटरी एक प्राकृतिक यूपीएस के रूप में कार्य करती है, जो बिजली कटौती की स्थिति में अचानक रुकने से बचाती है।
reviewed: true
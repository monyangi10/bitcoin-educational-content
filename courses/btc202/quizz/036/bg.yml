question: Какво е предимството на специализиран лаптоп пред мини компютър?
answer: Батерията му действа като инвертор
wrong_answers:
  - По-тихо е
  - Издържа по-дълго
  - Консумира по-малко енергия
explanation: |
  Батерията на лаптопа действа като естествен UPS, като предотвратява внезапни спирания в случай на прекъсване на електрозахранването.
reviewed: true
question: ข้อดีของแล็ปท็อปเฉพาะทางเหนือมินิพีซีคืออะไร?
answer: แบตเตอรี่ของมันทำหน้าที่เป็นอินเวอร์เตอร์
wrong_answers:
  - มันเงียบกว่า
  - มันใช้งานได้นานขึ้น
  - มันใช้พลังงานน้อยลง
explanation: |
  แบตเตอรี่ของแล็ปท็อปทำหน้าที่เป็น UPS ตามธรรมชาติ ป้องกันการหยุดทำงานอย่างกะทันหันในกรณีที่ไฟฟ้าดับ
reviewed: true
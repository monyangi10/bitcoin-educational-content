question: مزیت یک لپ‌تاپ اختصاصی نسبت به یک مینی‌پی‌سی چیست؟
answer: باتری آن به عنوان یک اینورتر عمل می‌کند.
wrong_answers:
  - ساکت‌تر است
  - بیشتر دوام می‌آورد
  - انرژی کمتری مصرف می‌کند
explanation: |
  باتری لپ‌تاپ به عنوان یک UPS طبیعی عمل می‌کند و از توقف ناگهانی در صورت قطع برق جلوگیری می‌کند.
reviewed: true
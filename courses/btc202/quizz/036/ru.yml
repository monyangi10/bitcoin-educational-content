question: В чем преимущество специализированного ноутбука перед мини-ПК?
answer: Его батарея работает как инвертор
wrong_answers:
  - Это тише
  - Дольше сохраняется
  - Потребляет меньше энергии
explanation: |
  Батарея ноутбука действует как естественный ИБП, предотвращая внезапные остановки в случае отключения электричества.
reviewed: true
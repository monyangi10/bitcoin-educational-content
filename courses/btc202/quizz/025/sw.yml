question: Ni wakati gani fundo la pruned ni shida kwa Wallet?
answer: Wakati wa kurejesha Wallet ya zamani
wrong_answers:
  - Wakati wa kuunda mapokezi mapya Address
  - Wakati wa kutuma muamala wa hivi majuzi
  - Wakati wa kuchagua kiasi cha ada
explanation: |
  Node ya pruned haihifadhi blocks za zamani, ambazo inaweza kuzuia shughuli za zamani zisikaguliwe wakati wa kurejesha.
reviewed: true

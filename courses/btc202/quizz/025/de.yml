question: Wann ist eine Pruned-Node ein Problem für eine Wallet?
answer: Bei der Restaurierung einer alten Wallet
wrong_answers:
  - Beim Erstellen einer neuen Empfangs Addresse
  - Beim Senden einer neuen Transaktion
  - Bei der Auswahl der Gebühren
explanation: |
  Ein Pruned-Node speichert keine alten Blöcke, was dazu führen kann, dass vergangene Transaktionen während der Wiederherstellung nicht gescannt werden können.
reviewed: true

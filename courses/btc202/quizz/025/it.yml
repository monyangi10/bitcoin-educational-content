question: Quando un pruned node è un problema per un wallet?
answer: Quando si ripristina un vecchio wallet
wrong_answers:
  - Quando si crea una nuovo indirizzo di ricezione
  - Quando si invia una transazione recente
  - Quando si seleziona l'importo delle fee
explanation: |
  Un pruned node non conserva i vecchi blocchi, il che potrebbe impedire la scansione delle transazioni passate durante il ripristino.
reviewed: true

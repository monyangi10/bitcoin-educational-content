question: Kada je pruned čvor problem za novčanik?
answer: Kada obnavljate stari novčanik
wrong_answers:
  - Kada kreirate novu adresu za prijem
  - Kada šaljete nedavnu transakciju
  - Kada birate iznos naknade
explanation: |
  Pruned čvor ne zadržava stare blokove, što može sprečiti skeniranje prošlih transakcija tokom obnavljanja novčanika.
reviewed: true

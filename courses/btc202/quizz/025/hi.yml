question: pruned गाँठ कब Wallet के लिए समस्या बन जाती है?
answer: पुराने Wallet को पुनर्स्थापित करते समय
wrong_answers:
  - नया रिसेप्शन बनाते समय Address
  - हाल ही का लेनदेन भेजते समय
  - शुल्क राशि का चयन करते समय
explanation: |
  pruned नोड पुराने ब्लॉकों को बरकरार नहीं रखता है, जो पुनर्स्थापना के दौरान पिछले लेनदेन को स्कैन होने से रोक सकता है।
reviewed: true
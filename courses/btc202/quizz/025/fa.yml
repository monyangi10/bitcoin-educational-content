question: چه زمانی گره pruned برای Wallet مشکل‌ساز است؟
answer: هنگام بازسازی یک Wallet قدیمی
wrong_answers:
  - هنگام ایجاد یک پذیرش جدید Address
  - هنگام ارسال یک تراکنش اخیر
  - هنگام انتخاب مبلغ هزینه
explanation: |
  یک گره pruned بلوک‌های قدیمی را نگه نمی‌دارد، که ممکن است مانع از اسکن تراکنش‌های گذشته در طول بازیابی شود.
reviewed: true
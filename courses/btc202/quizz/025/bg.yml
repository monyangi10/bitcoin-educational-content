question: Кога възел pruned е проблем за wallet?
answer: При възстановяване на стар wallet
wrong_answers:
  - При създаване на нов адрес за приемане
  - При изпращане на скорошна транзакция
  - При избора на размера на таксата
explanation: |
  Възел pruned не запазва стари блокове, което може да попречи на сканирането на минали транзакции по време на възстановяването.
reviewed: true
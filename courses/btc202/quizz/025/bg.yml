question: Кога е проблем да имаме олекотена версия на възел говорейки за портфейла ни?
answer: При възстановяване на стар портфейл
wrong_answers:
  - При създаване на нов адрес за приемане
  - При изпращане на скорошна транзакция
  - При избора на размера на таксата
explanation: |
  Pruned node (олекотен възел) не пази история за старите блокове, което може да попречи на сканирането на минали транзакции по време на възстановяването.
reviewed: true

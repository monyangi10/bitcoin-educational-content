question: Когда узел pruned становится проблемой для Wallet?
answer: При восстановлении старого Wallet
wrong_answers:
  - При создании нового приема Address
  - При отправке недавней транзакции
  - При выборе суммы сбора
explanation: |
  Узел pruned не сохраняет старые блоки, что может препятствовать сканированию прошлых транзакций при восстановлении.
reviewed: true
question: เมื่อใดที่โหนด pruned เป็นปัญหาสำหรับ wallet?
answer: เมื่อทำการบูรณะ wallet เก่า
wrong_answers:
  - เมื่อสร้างที่อยู่ต้อนรับใหม่
  - เมื่อส่งธุรกรรมล่าสุด
  - เมื่อเลือกจำนวนค่าธรรมเนียม
explanation: |
  โหนด pruned ไม่เก็บบล็อกเก่า ซึ่งอาจป้องกันไม่ให้ธุรกรรมที่ผ่านมาได้รับการสแกนระหว่างการกู้คืน
reviewed: true
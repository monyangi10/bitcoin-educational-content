question: कौन सा वितरण रास्पबेरी पाई के लिए सबसे उपयुक्त है, क्योंकि यह विशेष रूप से हल्का है?
answer: रास्पीब्लिट्ज़
wrong_answers:
  - छाता
  - माईनोड
  - प्रारंभ9
explanation: |
  रास्पीब्लिट्ज को रास्पबेरी पाई के लिए अनुकूलित किया गया है और यह हल्का बना हुआ है, जबकि अम्ब्रेल इन मशीनों के लिए बहुत भारी हो गया है।
reviewed: true
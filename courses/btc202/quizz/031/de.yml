question: Welche Distribution ist am besten für den Raspberry Pi geeignet, da er besonders leichtgewichtig ist?
answer: RaspiBlitz
wrong_answers:
  - Umbrel
  - MyNode
  - Start9
explanation: |
  RaspiBlitz ist für den Raspberry Pi optimiert und bleibt leichtgewichtig, im Gegensatz zu Umbrel, das für diese Maschinen zu umfangreich geworden ist.
reviewed: true

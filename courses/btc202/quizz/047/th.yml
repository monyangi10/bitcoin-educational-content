question: มีมาตรการรักษาความปลอดภัยใดบ้างที่แนะนำอย่างยิ่งเมื่อสร้างบัญชี Umbrel?
answer: เปิดใช้งาน 2FA
wrong_answers:
  - ปิดใช้งานรหัสผ่าน
  - การใช้รหัส PIN
  - ปิดการเชื่อมต่อทั้งหมด
explanation: |
  การยืนยันตัวตนสองขั้นตอน (2FA) เพิ่มการป้องกันเพิ่มเติมและแนะนำอย่างยิ่ง โดยเฉพาะเมื่อใช้โหนด Lightning หรือการโฮสต์ด้วยตนเองที่มีความอ่อนไหว
reviewed: true
question: Какви мерки за сигурност се препоръчват при създаването на акаунт в Umbrel?
answer: Активиране на 2FA
wrong_answers:
  - Деактивиране на паролата
  - Използване на ПИН код
  - Деактивиране на всички връзки
explanation: |
  Функцията 2FA добавя допълнителна защита и е силно препоръчителна, особено когато използвате възел Lightning или чувствителен самостоятелен хостинг.
reviewed: true
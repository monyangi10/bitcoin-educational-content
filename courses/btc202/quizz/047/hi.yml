question: अम्ब्रेल खाता बनाते समय कौन से सुरक्षा उपाय दृढ़तापूर्वक अनुशंसित हैं?
answer: 2FA सक्रिय करें
wrong_answers:
  - पासवर्ड अक्षम करें
  - पिन कोड का उपयोग करना
  - सभी कनेक्शन अक्षम करें
explanation: |
  2FA अतिरिक्त सुरक्षा प्रदान करता है और इसकी अत्यधिक अनुशंसा की जाती है, विशेष रूप से लाइटनिंग नोड या संवेदनशील स्व-होस्टिंग का उपयोग करते समय।
reviewed: true
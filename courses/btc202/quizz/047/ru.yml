question: Какие меры безопасности настоятельно рекомендуются при создании учетной записи Umbrel?
answer: Активируйте 2FA
wrong_answers:
  - Отключить пароль
  - Использование PIN-кода
  - Отключить все соединения
explanation: |
  2FA добавляет дополнительную защиту и настоятельно рекомендуется, особенно при использовании узла Lightning или чувствительного самохостинга.
reviewed: true
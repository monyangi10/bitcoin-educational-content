question: هنگام ایجاد یک حساب Umbrel، چه تدابیر امنیتی به شدت توصیه می‌شود؟
answer: احراز هویت دو مرحله‌ای را فعال کنید
wrong_answers:
  - غیرفعال کردن رمز عبور
  - استفاده از کد PIN
  - همه اتصالات را غیرفعال کنید
explanation: |
  احراز هویت دو مرحله‌ای (2FA) حفاظت اضافی ارائه می‌دهد و به شدت توصیه می‌شود، به‌ویژه هنگام استفاده از یک نود لایتنینگ یا میزبانی حساس خود.
reviewed: true
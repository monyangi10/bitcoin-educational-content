question: Koje mere bezbednosti se toplo preporučuju prilikom kreiranja Umbrel naloga?
answer: Aktiviranje 2FA
wrong_answers:
  - Onemogućavanje lozinke
  - Korišćenje PIN koda
  - Onemogućavanja svih veza
explanation: |
  2FA dodaje dodatnu zaštitu i toplo se preporučuje, posebno kada koristite Lightning čvor ili self-hosting osetljivih podataka.
reviewed: true

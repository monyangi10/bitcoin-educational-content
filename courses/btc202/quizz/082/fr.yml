question: Quelle est la valeur par défaut de minrelaytxfee dans Bitcoin Core ?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0.1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee est fixé par défaut à 0.00001 BTC/kvB, soit 1 sat/vB, en dessous duquel les transactions ne sont pas relayées.
reviewed: true 

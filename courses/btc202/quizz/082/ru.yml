question: Каково значение по умолчанию для minrelaytxfee в Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  по умолчанию minrelaytxfee составляет 0,00001 BTC/kvB, или 1 sat/vB, ниже которого транзакции не передаются.
reviewed: true
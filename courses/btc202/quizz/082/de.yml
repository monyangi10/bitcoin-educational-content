question: Was ist der Standardwert für minrelaytxfee in Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee ist standardmäßig auf 0,00001 BTC/kvB oder 1 sat/vB eingestellt, darunter werden keine Transaktionen weitergeleitet.
reviewed: true
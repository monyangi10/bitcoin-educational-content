question: Wat is de standaardwaarde voor minrelaytxfee in Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 zat/vB)
explanation: |
  minrelaytxfee is standaard 0,00001 BTC/kvB, of 1 sat/vB, waaronder transacties niet worden doorgegeven.
reviewed: true
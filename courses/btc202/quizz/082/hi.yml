question: Bitcoin core में minrelaytxfee का डिफ़ॉल्ट मान क्या है?
answer: 0.00001 बीटीसी/केवीबी (1 सैट/वीबी)
wrong_answers:
  - 0.0001 बीटीसी/केवीबी (10 सैट/वीबी)
  - 0.000001 बीटीसी/केवीबी (0.1 सैट/वीबी)
  - 0.00002 बीटीसी/केवीबी (2 सैट/वीबी)
explanation: |
  minrelaytxfee डिफ़ॉल्ट रूप से 0.00001 BTC/kvB या 1 sat/vB होता है, जिसके नीचे लेनदेन रिले नहीं किया जाता है।
reviewed: true
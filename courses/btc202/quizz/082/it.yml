question: Qual è il valore predefinito per minrelaytxfee in Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  il valore predefinito di minrelaytxfee è 0,00001 BTC/kvB, o 1 sat/vB, al di sotto del quale le transazioni non vengono trasmesse.
reviewed: true
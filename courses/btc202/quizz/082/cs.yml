question: Jaká je výchozí hodnota minrelaytxfee v Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee je ve výchozím nastavení 0,00001 BTC/kvB nebo 1 sat/vB, pod kterou se transakce nepředávají.
reviewed: true
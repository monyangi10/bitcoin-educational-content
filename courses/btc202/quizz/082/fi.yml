question: Mikä on minrelaytxfee-arvon oletusarvo Bitcoin core:ssa?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee on oletusarvoisesti 0,00001 BTC/kvB tai 1 sat/vB, jonka alittavat maksutapahtumat eivät välity.
reviewed: true
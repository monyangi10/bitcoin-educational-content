question: Bitcoin core'da minrelaytxfee için varsayılan değer nedir?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee varsayılan olarak 0.00001 BTC/kvB veya 1 sat/vB'dir ve bunun altında işlemler aktarılmaz.
reviewed: true
question: ¿Cuál es el valor por defecto de minrelaytxfee en Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee por defecto a 0.00001 BTC/kvB, o 1 sat/vB, por debajo del cual las transacciones no son retransmitidas.
reviewed: true
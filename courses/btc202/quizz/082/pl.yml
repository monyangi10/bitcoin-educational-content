question: Jaka jest domyślna wartość minrelaytxfee w Bitcoin core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0,1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee domyślnie wynosi 0,00001 BTC/kvB lub 1 sat/vB, poniżej którego transakcje nie są przekazywane.
reviewed: true
question: Каква е стойността по подразбиране за minrelaytxfee в Bitcoin Core?
answer: 0.00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0.0001 BTC/kvB (10 sat/vB)
  - 0.000001 BTC/kvB (0.1 sat/vB)
  - 0.00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee по подразбиране е 0,00001 BTC/kvB или 1 sat/vB, под което транзакциите не се предават.
reviewed: true
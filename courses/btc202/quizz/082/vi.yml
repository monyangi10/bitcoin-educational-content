question: Giá trị mặc định cho minrelaytxfee trong Bitcoin core là gì?
answer: 0,00001 BTC/kvB (1 sat/vB)
wrong_answers:
  - 0,0001 BTC/kvB (10 sat/vB)
  - 0,000001 BTC/kvB (0,1 sat/vB)
  - 0,00002 BTC/kvB (2 sat/vB)
explanation: |
  minrelaytxfee mặc định là 0,00001 BTC/kvB hoặc 1 sat/vB, dưới mức này các giao dịch sẽ không được chuyển tiếp.
reviewed: true
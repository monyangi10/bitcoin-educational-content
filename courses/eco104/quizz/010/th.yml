question: วัตถุประสงค์ของโหนดในเครือข่าย Bitcoin คืออะไร?
answer: เพื่อรักษาและความปลอดภัยของบล็อกเชน
wrong_answers:
  - ในการประมวลผลธุรกรรม
  - เพื่อเสนอและดำเนินการเปลี่ยนแปลงในฐานรหัส Bitcoin
  - เพื่อแข่งขันกับนักขุดรายอื่น
explanation: |
  Nodes มีความสำคัญต่อความสมบูรณ์และความปลอดภัยของเครือข่าย Bitcoin 
  พวกเขาทำหน้าที่เป็นผู้รักษาประตูของระบบ เพื่อให้แน่ใจว่าการทำธุรกรรม 
  ได้รับการประมวลผลอย่างถูกต้องและเป็นไปตามกฎเกณฑ์
reviewed: true
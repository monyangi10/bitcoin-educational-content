question: Bitcoin नेटवर्क में नोड्स का क्या उद्देश्य है?
answer: Blockchain को बनाए रखने और सुरक्षित करने के लिए
wrong_answers:
  - लेन-देन प्रोसेस करने के लिए
  - Bitcoin कोडबेस में बदलाव सुझाना और लागू करना
  - दूसरे माइनरों से मुकाबला करने के लिए
explanation: |
  नोड्स Bitcoin नेटवर्क की सुरक्षा और मजबूती के लिए बेहद जरूरी हैं।
  वे सिस्टम के गेटकीपर की तरह काम करते हैं, यह सुनिश्चित करते हुए कि लेन-देन
  सही तरीके से और नियमों के अनुसार प्रोसेस किए जाते हैं।
reviewed: true
question: Какво е предназначението на възлите в мрежата Bitcoin?
answer: Поддържане и защита на блокчейна
wrong_answers:
  - За обработка на транзакции
  - Предлагане и въвеждане на промени в кодовата база на Bitcoin
  - За да се конкурират с други миньори
explanation: |
  Възлите са от съществено значение за целостта и сигурността на мрежата Bitcoin.
  Те служат като пазачи на системата, като гарантират, че транзакциите
  се обработват точно и в съответствие с правилата.
reviewed: true

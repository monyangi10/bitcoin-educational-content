question: Каква е една от причините Bitcoin да консумира енергия чрез копаенето?
answer: Да осигури мощен защитен механизъм срещу централизацията
wrong_answers:
  - Поскъпване на използването на Bitcoin
  - Намаляване на стойността му чрез увеличаване на разходите за енергия
  - Възпиране на присъединяването на нови потребители към мрежата
explanation: |
  Една от причините Bitcoin да консумира енергия чрез копаене е
  да осигури мощен защитен механизъм срещу централизацията и
  неправомерно манипулиране. Разпределената мрежа от миньори помага да се предотврати
  централизираните структури да кооперират мрежата или да манипулират правилата в своя полза.
reviewed: true

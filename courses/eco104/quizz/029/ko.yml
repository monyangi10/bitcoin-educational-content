question: Mining을 통해 Bitcoin이 에너지를 소비하는 동기 중 하나는 무엇인가요?
answer: 중앙 집중화에 대한 강력한 방어 메커니즘 제공
wrong_answers:
  - Bitcoin를 더 비싸게 사용하려면
  - 에너지 비용 증가로 인한 가치 감소
  - 신규 사용자가 네트워크에 참여하지 못하도록 하려면 다음과 같이 하세요
explanation: |
  Bitcoin가 Mining를 통해 에너지를 소비하는 이유 중 하나는 다음과 같습니다
  중앙 집중화에 대한 강력한 방어 메커니즘을 제공하고
  강력한 방어 메커니즘을 제공하기 위함입니다. 분산된 채굴자 네트워크는
  중앙화된 주체가 네트워크를 공동 운영하거나 자신에게 유리하도록 규칙을 조작하는 것을 방지합니다.
reviewed: true
question: Bitcoin, Mining के जरिए ऊर्जा का उपभोग करने के पीछे एक प्रेरणा क्या है?
answer: केंद्रीकरण के खिलाफ एक ताकतवर सुरक्षा तंत्र प्रदान करने के लिए
wrong_answers:
  - Bitcoin को इस्तेमाल करने में और महंगा बनाने के लिए
  - इसकी वैल्यू कम करने के लिए एनर्जी कॉस्ट बढ़ाना
  - नए यूज़र्स को नेटवर्क में शामिल होने से हतोत्साहित करने के लिए
explanation: |
  Bitcoin द्वारा Mining के माध्यम से ऊर्जा खपत करने के कारणों में से एक है
  केंद्रीकरण के खिलाफ एक शक्तिशाली सुरक्षा तंत्र प्रदान करता है
  अनुचित हेरफेर। माइनर्स का वितरित नेटवर्क रोकने में मदद करता है
  केंद्रीकृत संस्थाएँ नेटवर्क को अपने कब्जे में लेने या नियमों को अपने फायदे के लिए बदलने से रोकना।
reviewed: true
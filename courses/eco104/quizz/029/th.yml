question: หนึ่งในแรงจูงใจเบื้องหลัง Bitcoin ที่บริโภคพลังงานผ่าน mining คืออะไร?
answer: เพื่อให้กลไกการป้องกันที่ทรงพลังต่อการรวมศูนย์
wrong_answers:
  - เพื่อทำให้ Bitcoin มีค่าใช้จ่ายในการใช้งานสูงขึ้น
  - เพื่อลดมูลค่าของมันโดยการเพิ่มค่าใช้จ่ายด้านพลังงาน
  - เพื่อกีดกันผู้ใช้ใหม่จากการเข้าร่วมเครือข่าย
explanation: |
  หนึ่งในเหตุผลที่ Bitcoin ใช้พลังงานผ่าน mining คือเพื่อให้กลไกการป้องกันที่ทรงพลังต่อการรวมศูนย์และการบิดเบือนที่ไม่เหมาะสม เครือข่ายที่กระจายของนักขุดช่วยป้องกันไม่ให้หน่วยงานรวมศูนย์เข้าครอบครองเครือข่ายหรือบิดเบือนกฎให้เป็นประโยชน์ต่อพวกเขา
reviewed: true
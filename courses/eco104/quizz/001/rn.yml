question: Ni igiki muri ibi bikurikira gikenewe kugira ngo umuntu ashobore gukora neza mu bijanye n’uguhinduranya?
answer: Guhura kabiri kw'ivyo umuntu yipfuza
wrong_answers:
  - Igice ca konti rusangi
  - Ubuyobozi bwa banki nkuru
  - Uburinganire bukeyi busabwa
explanation: |
  Mu buryo bwo guhinduranya, ugucuruza bibera ata guca ku ruhande hagati y’abantu babiri bahinduranya ibintu canke . 
  ibikorwa ata gukoresha amahera. Gucuruza neza bisaba ko haba uguhuza kabiri kw’ 
  ashaka, bisobanura ko abo bompi bategerezwa kuba bafise ico uwundi ashaka gucuruza.
reviewed: true
question: 다음 중 물물교환 시스템에서 성공적인 거래를 위해 필요한 것은 무엇인가요?
answer: 두 가지 욕구의 우연
wrong_answers:
  - 공통 계정 단위
  - 중앙 은행 기관
  - 최소 잔액 요구 사항
explanation: |
  물물교환 시스템에서 거래는 두 당사자 간에 직접 상품이나 서비스를 교환하는 방식으로 이루어집니다
  서비스를 교환합니다. 성공적인 거래를 위해서는 두 가지 조건이 일치해야 합니다
  즉, 두 당사자 모두 상대방이 거래하고자 하는 것을 가지고 있어야 합니다.
reviewed: true
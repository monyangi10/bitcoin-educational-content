question: Кое от изброените е необходимо за успешна транзакция в бартерна система?
answer: Двойно съвпадение на желанията
wrong_answers:
  - Обща разчетна единица
  - Централен банков орган
  - Изискване за минимален баланс
explanation: |
  При бартерната система транзакциите се осъществяват директно между две страни, които разменят стоки или
  услуги, без да се използват пари. Успешната транзакция изисква двойно съвпадение на
  желания, което означава, че и двете страни трябва да имат нещо, което другата страна иска да размени.
reviewed: true
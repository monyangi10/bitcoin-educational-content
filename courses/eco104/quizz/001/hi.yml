question: निम्नलिखित में से क्या बार्टर प्रणाली में एक सफल लेन-देन के लिए ज़रूरी है?
answer: दोहरी इच्छाओं का संयोग
wrong_answers:
  - एक आम खाता इकाई
  - एक केंद्रीय बैंकिंग प्राधिकरण
  - न्यूनतम शेष राशि की आवश्यकता
explanation: |
  बार्टर सिस्टम में, दो पार्टियाँ सीधे सामान या सेवाओं का आदान-प्रदान करके लेन-देन करती हैं।
  पैसे के बिना सेवाएँ। एक सफल लेन-देन के लिए दोहरे संयोग की आवश्यकता होती है।
  चाहिए, मतलब दोनों पक्षों के पास कुछ ऐसा होना चाहिए जो दूसरा पार्टी ट्रेड करना चाहता हो।
reviewed: true
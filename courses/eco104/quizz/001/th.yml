question: สิ่งใดต่อไปนี้ที่จำเป็นสำหรับการทำธุรกรรมที่ประสบความสำเร็จในระบบแลกเปลี่ยน?
answer: ความบังเอิญสองเท่าของความต้องการ
wrong_answers:
  - หน่วยบัญชีทั่วไป
  - หน่วยงานกลางด้านการธนาคาร
  - ข้อกำหนดยอดเงินขั้นต่ำ
explanation: |
  ในระบบแลกเปลี่ยนสินค้า การทำธุรกรรมเกิดขึ้นโดยตรงระหว่างสองฝ่ายที่แลกเปลี่ยนสินค้า 
  หรือบริการโดยไม่ใช้เงิน การทำธุรกรรมที่ประสบความสำเร็จต้องการความบังเอิญสองเท่า 
  ของความต้องการ หมายความว่าทั้งสองฝ่ายต้องมีบางสิ่งที่อีกฝ่ายต้องการแลกเปลี่ยน
reviewed: true
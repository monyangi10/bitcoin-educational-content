question: Какво представлява Halving в контекста на Bitcoin?
answer: Функция в кода на Bitcoin, която намалява наполовина наградата за mining на всеки четири години
wrong_answers:
  - Процес на увеличаване на глобалното приемане на Bitcoin
  - Механизъм, който не позволява на стойността на Bitcoin да се срине
  - Термин, използван за описание на събитието, при което цената на Bitcoin скача до небето
explanation: |
  Намаляването наполовина е функция в кода на Bitcoin, която намалява mining
  на половина приблизително на всеки четири години. Това събитие засяга
  приходите на миньорите и оказва натиск за повишаване на цената на биткойн.
reviewed: true
question: Halving คืออะไรในบริบทของ Bitcoin?
answer: คุณสมบัติในโค้ดของ Bitcoin ที่ลดรางวัล mining ลงครึ่งหนึ่งทุกสี่ปี
wrong_answers:
  - กระบวนการเพิ่มการยอมรับ Bitcoin ในระดับโลก
  - กลไกที่ป้องกันไม่ให้มูลค่าของ Bitcoin พังทลาย
  - คำที่ใช้เพื่ออธิบายเหตุการณ์เมื่อราคาของ Bitcoin พุ่งสูงขึ้น
explanation: |
  การลดลงครึ่งหนึ่งเป็นคุณสมบัติในโค้ดของ Bitcoin ที่ลดรางวัล mining ลงครึ่งหนึ่งประมาณทุกสี่ปี เหตุการณ์นี้มีผลกระทบต่อรายได้ของนักขุดและกดดันให้ราคาของบิตคอยน์สูงขึ้น
reviewed: true
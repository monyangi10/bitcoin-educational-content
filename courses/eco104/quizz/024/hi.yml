question: Halving, Bitcoin के संदर्भ में क्या है?
answer: Bitcoin के कोड में एक फीचर जो हर चार साल में Mining का इनाम आधा कर देता है
wrong_answers:
  - Bitcoin के वैश्विक अपनाव को बढ़ाने की एक प्रक्रिया
  - एक ऐसी व्यवस्था जो Bitcoin के मूल्य को गिरने से रोकती है
  - एक शब्द जिसका इस्तेमाल उस घटना को बताने के लिए किया जाता है जब Bitcoin की कीमत आसमान छूने लगती है
explanation: |
  Halving, Bitcoin के कोड में एक फीचर है जो Mining को काट देता है
  हर चार साल में लगभग आधा इनाम मिलता है। यह घटना प्रभावित करती है
  खनिकों की आमदनी बढ़ती है और Bitcoin की कीमत पर ऊपर की ओर दबाव पड़ता है।
reviewed: true
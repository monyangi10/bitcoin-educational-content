question: ¿Cómo se crea nuevo bitcoin y se introduce en circulación?
answer: A través de la minería como recompensa por agregar nuevas transacciones a la blockchain
wrong_answers:
  - A través de la emisión de una autoridad centralizada
  - Comprándolos en intercambios de Bitcoin
  - Recibiéndolos como tasas de transacción
explanation: |
  El nuevo bitcoin se introduce en circulación a través de un proceso llamado minería. Los mineros compiten entre sí para agregar nuevas transacciones a la blockchain. A cambio de su trabajo, los mineros son recompensados con bitcoin recién creado. Este proceso también verifica y asegura las transacciones en la red de Bitcoin.
reviewed: true

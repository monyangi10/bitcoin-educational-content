question: บิตคอยน์ใหม่ถูกสร้างและนำเข้าสู่การหมุนเวียนอย่างไร?
answer: ผ่าน mining เป็นรางวัลสำหรับการเพิ่มธุรกรรมใหม่ลงในบล็อกเชน
wrong_answers:
  - ผ่านการออกโดยหน่วยงานกลาง
  - โดยการซื้อจากการแลกเปลี่ยน Bitcoin
  - โดยการรับเป็นค่าธรรมเนียมการทำธุรกรรม
explanation: |
  บิตคอยน์ใหม่ถูกนำเข้าสู่การหมุนเวียนผ่านกระบวนการที่เรียกว่า mining นักขุดแข่งขันกันเพื่อเพิ่มธุรกรรมใหม่ลงในบล็อกเชน เพื่อแลกกับการทำงานของพวกเขา นักขุดจะได้รับรางวัลเป็นบิตคอยน์ที่สร้างขึ้นใหม่ กระบวนการนี้ยังช่วยยืนยันและรักษาความปลอดภัยของธุรกรรมบนเครือข่าย Bitcoin
reviewed: true
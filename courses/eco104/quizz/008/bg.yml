question: Как се създават и пускат в обращение нови биткойни?
answer: Чрез копаене, като награда за добавяне на нови трансакции в блокчейна
wrong_answers:
  - Чрез издаването на централизиран орган
  - Като ги закупите от борсите на Bitcoin
  - Като ги получавате като такси за транзакции
explanation: |
  Нови биткойни се въвеждат в обращение чрез процес, наречен копаене.
  Миньорите се конкурират помежду си, за да добавят нови транзакции в блокчейна.
  В замяна на работата си миньорите се възнаграждават с новосъздадени биткойни.
  Този процес също така проверява и осигурява транзакциите в мрежата Bitcoin.
reviewed: true

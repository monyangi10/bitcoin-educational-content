question: नए Bitcoin कैसे बनाए जाते हैं और परिचालन में लाए जाते हैं?
answer: Blockchain में नए लेन-देन जोड़ने के इनाम के रूप में Mining के माध्यम से
wrong_answers:
  - एक केंद्रीय प्राधिकरण द्वारा जारी करने के माध्यम से
  - Bitcoin एक्सचेंज से खरीदकर
  - उन्हें लेन-देन शुल्क के रूप में प्राप्त करके
explanation: |
  नए Bitcoin को Mining नामक प्रक्रिया के जरिए चलन में लाया जाता है।
  माइनर्स एक-दूसरे के साथ Blockchain में नए ट्रांजैक्शन जोड़ने के लिए प्रतिस्पर्धा करते हैं।
  Exchange में अपने काम के लिए, माइनर्स को नए बनाए गए Bitcoin से इनाम मिलता है।
  यह प्रक्रिया Bitcoin नेटवर्क पर लेन-देन को सत्यापित और सुरक्षित भी करती है।
reviewed: true
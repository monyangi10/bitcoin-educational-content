question: ビットコインはどのように新規に発行され、流通に乗るのですか？
answer: ブロックチェーンに新しいトランザクションを追加する報酬としてのマイニングを通じて
wrong_answers:
  - 中央集権的な機関の発行を通じて
  - ビットコイン取引所から購入することによって
  - トランザクション手数料として受け取ることによって
explanation: |
  新しいビットコインは、マイニングと呼ばれるプロセスを通じて流通に乗ります。
  マイナーは、ブロックチェーンに新しいトランザクションを追加するために互いに競争します。
  その作業の交換として、マイナーは新しく発行されたビットコインで報酬を受け取ります。
  このプロセスは、ビットコインネットワーク上の取引を検証し、セキュリティを確保する役割も果たします。
reviewed: true

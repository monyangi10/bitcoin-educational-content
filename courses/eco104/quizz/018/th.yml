question: ข้อจำกัดที่สำคัญที่บุคคลต้องเผชิญในช่วงวิกฤตการล้มละลายของรัฐบาลกรีกในปี 2015 คืออะไร?
answer: การปฏิรูปธนาคารที่เข้มงวดเกินไปซึ่งถูกบังคับใช้โดยรัฐบาล
wrong_answers:
  - การเข้าถึงบริการธนาคารดิจิทัลที่จำกัด
  - ความผันผวนของสกุลเงินดิจิทัลเช่น Bitcoin
  - การขาดแคลนสกุลเงินกายภาพ (เงินสด)
explanation: |
  ในช่วงวิกฤตการณ์ล้มละลายของรัฐบาลกรีกในปี 2015 ธนาคารถูกปิด การถอนเงินจากตู้เอทีเอ็มถูกจำกัด และส่วนสำคัญของเงินฝากธนาคารของบุคคลถูกถอนออกโดยรัฐบาลเพื่อเป็นทุนในการบริหารการเงินที่ขาดความรับผิดชอบ เหตุการณ์นี้เน้นย้ำถึงความเสี่ยงที่เกี่ยวข้องกับการมีเงินอยู่ในระบบธนาคารแบบดั้งเดิม
reviewed: true
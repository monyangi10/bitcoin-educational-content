question: Кое беше същественото ограничение, с което се сблъскаха физическите лица по време на кризата с банкрута на гръцкото правителство през 2015 г.?
answer: Наложена от правителството реформа на банковата система.
wrong_answers:
  - Ограничен достъп до цифрови банкови услуги
  - Волатилността на цифровите валути като Bitcoin
  - Недостиг на физическа валута (пари в брой)
explanation: |
  По време на кризата с фалита на гръцкото правителство през 2015 г. банките бяха затворени,
  Тегленията от банкомати бяха ограничени, както и значителна част от парите на физическите лица
  от банковите депозити, за да финансира фискалната безотговорност.
  Това събитие открои рисковете, свързани с притежаването на пари в рамките на традиционната банкова система.
reviewed: true

question: 2015년 그리스 정부의 국가 부도 위기 당시 개인이 직면한 중요한 한계는 무엇이었나요?
answer: 정부의 강압적인 은행 개혁.
wrong_answers:
  - 디지털 뱅킹 서비스에 대한 제한된 액세스
  - Bitcoin과 같은 디지털 화폐의 변동성
  - 실물 화폐(현금) 부족
explanation: |
  2015년 그리스 정부의 국가 부도 위기 당시 은행은 문을 닫았습니다,
  ATM 인출이 제한되었고, 개인이 보유한 은행 예금의 상당 부분이
  은행 예금의 상당 부분을 정부가 무책임한 재정 지원을 위해 인출했습니다.
  이 사건은 전통적인 은행 시스템에 돈을 보관하는 것과 관련된 위험을 강조했습니다.
reviewed: true
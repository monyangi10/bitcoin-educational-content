question: Wat was een belangrijke beperking voor individuen tijdens de faillissementscrisis van de Griekse overheid in 2015?
answer: Overdreven bankhervorming opgelegd door de overheid.
wrong_answers:
  - Beperkte toegang tot digitale bankdiensten
  - De volatiliteit van digitale valuta zoals Bitcoin
  - Een tekort aan fysiek geld (contant geld)
explanation: |
  Tijdens de faillissementscrisis van de Griekse regering in 2015 werden banken gesloten,
  Geldautomaten beperkt en werd een aanzienlijk deel van de banktegoeden van particulieren door de overheid opgenomen om de budgettaire onverantwoordelijkheid te financieren
  bankdeposito's van particulieren werd door de overheid opgenomen om budgettaire onverantwoordelijkheid te financieren.
  Deze gebeurtenis benadrukte de risico's die gepaard gaan met het aanhouden van geld binnen het traditionele banksysteem.
reviewed: true
question: 2015 में ग्रीक सरकार के दिवालिया होने के संकट के दौरान लोगों को क्या एक बड़ी समस्या का सामना करना पड़ा था?
answer: सरकार द्वारा थोपा गया दबंग बैंकिंग सुधार।
wrong_answers:
  - डिजिटल बैंकिंग सेवाओं तक सीमित पहुँच
  - जीडब्ल्यू-0 जैसी डिजिटल करेंसी की अस्थिरता
  - भौतिक मुद्रा (नकदी) की कमी
explanation: |
  2015 में यूनानी सरकार के दिवालिया होने के संकट के दौरान, बैंक बंद हो गए थे,
  ATM से पैसे निकालने पर पाबंदी थी, और लोगों का एक बड़ा हिस्सा...
  सरकार ने बैंक जमाओं से पैसे निकाल लिए ताकि वो अपने फिजूलखर्ची वाले कामों को पूरा कर सके।
  इस घटना ने पारंपरिक बैंकिंग प्रणाली में पैसे रखने से जुड़े जोखिमों को उजागर किया।
reviewed: true
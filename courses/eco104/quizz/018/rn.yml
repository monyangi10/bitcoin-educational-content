question: Ni ikihe kintu gihambaye abantu bashikiwe n’ingorane mu gihe Leta y’Ubugiriki yariko irasenyuka mu 2015?
answer: Ivugurura ry’amabanki ry’agahomerabunwa ryategetswe na leta.
wrong_answers:
  - Uburyo buke bwo gukoresha banki za digitale
  - Uguhinduka kw’amafaranga y’ubuhinga bwa none nka Bitcoin.
  - Ubukene bw'amafaranga y'umubiri (amahera)
explanation: |
  Mu gihe Leta y’Ubugiriki yariko irasenyuka mu 2015, amabanki yarafunzwe, . 
  Ivyo gukura amahera muri ATM vyari bike, kandi igice kinini c’abantu ku giti cabo’ 
  amafaranga yari yabitswe muri banki yarakuwe na leta kugira ngo ifashe mu gutanga amahera y’ukutagira inshingano mu vy’ubutunzi.
  Ico kintu carashize ahabona ingorane zijanye n’ukugira amahera afashwe mu buryo bwa kera bwo gukoresha amabanki.
reviewed: true
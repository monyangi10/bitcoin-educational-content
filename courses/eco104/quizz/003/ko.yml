question: 상품 화폐에 비해 금속 주화의 장점은 무엇인가요?
answer: 더 튼튼해졌습니다
wrong_answers:
  - 내재적 가치가 더 높았습니다
  - 이동이 더 쉬워졌습니다
  - 위조에 취약하지 않았습니다
explanation: |
   금속 화폐, 특히 금과 은은 상품 화폐보다 내구성이 더 뛰어납니다.
   귀금속은 시간이 지나도 변질되는 경향이 적기 때문에 다음과 같은 용도에 이상적입니다
   장기 보관에 이상적입니다. 이러한 내구성은 또한 다음과 같은 유용성에도 기여했습니다
   계정 단위인 Exchange의 매개체이자 가치 저장 수단으로 유용하게 사용되었습니다.
reviewed: true
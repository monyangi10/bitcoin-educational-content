question: Jedna prednost metalnog novca u odnosu na robni novac bila je njegova trajnost i lakša prenosivost.
answer: Bilo je izdržljivije
wrong_answers:
  - Imalo je veću intrinzičnu vrednost
  - Bilo je lakše prenosivo
  - Nije bilo sklono falsifikovanju
explanation: |
   Metalni novac, posebno zlato i srebro, bio je izdržljiviji od robnog novca. Plemeniti metali su manje skloni propadanju tokom vremena, što ih čini idealnim za dugoročno čuvanje vrednosti. Ova izdržljivost je takođe doprinela njihovoj korisnosti kao sredstva Exchange, jedinice obračuna i čuvara vrednosti.
reviewed: true
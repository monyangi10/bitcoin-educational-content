question: Какво е било предимството на металните монети пред стоковите пари?
answer: Той е по-издръжлив
wrong_answers:
  - Има по-висока вътрешна стойност
  - Той е по-лесно преносим
  - Не е податлив на фалшифициране
explanation: |
   Металните пари, особено златото и среброто, са били по-трайни от стоковите пари.
   Благородните метали са по-малко податливи на разрушаване с течение на времето, което ги прави идеални за
   за дългосрочно съхранение на стойността. Тази издръжливост допринася и за полезността им като
   средство за размяна, разчетна единица и средство за съхранение на стойност.
reviewed: true
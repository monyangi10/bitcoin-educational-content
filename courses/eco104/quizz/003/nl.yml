question: Wat was een voordeel van metalen munten ten opzichte van goederengeld?
answer: Het was duurzamer
wrong_answers:
  - Het had een hogere intrinsieke waarde
  - Het was gemakkelijker te vervoeren
  - Het was niet gevoelig voor vervalsing
explanation: |
   Metalen geld, vooral goud en zilver, was duurzamer dan goederengeld.
   Edele metalen zijn na verloop van tijd minder onderhevig aan bederf, waardoor ze ideaal zijn voor
   langetermijnopslag van waarde. Deze duurzaamheid droeg ook bij aan hun nut als
   een medium voor Exchange, een rekeneenheid en een opslagplaats van waarde.
reviewed: true
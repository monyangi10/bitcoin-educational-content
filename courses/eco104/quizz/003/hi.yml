question: धातु के सिक्कों का एक फायदा यह था कि वे वस्तु-मुद्रा (commodity money) के मुकाबले ज़्यादा टिकाऊ और आसानी से ले जाने वाले होते थे।
answer: वो और ज़्यादा टिकाऊ था
wrong_answers:
  - इसका आंतरिक मूल्य ज़्यादा था
  - यह ज्यादा आसानी से ले जाने योग्य था
  - यह नकली बनाने के लिए आसान नहीं था
explanation: |
   धातु के पैसे, खासकर सोना और चाँदी, सामान के पैसे से ज़्यादा टिकाऊ होते थे।
   कीमती धातुएं समय के साथ खराब होने से कम प्रभावित होती हैं, जिससे वे आदर्श होती हैं...
   मूल्य का लंबे समय तक भंडारण। यह टिकाऊपन भी उनकी उपयोगिता को बढ़ाता था।
   Exchange का एक माध्यम, लेखांकन की एक इकाई, और मूल्य का भंडार।
reviewed: true
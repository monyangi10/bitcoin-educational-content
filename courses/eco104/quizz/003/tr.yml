question: Metal sikkenin emtia paraya göre bir avantajı neydi?
answer: Daha dayanıklıydı
wrong_answers:
  - Daha yüksek bir içsel değere sahipti
  - Daha kolay taşınabilirdi
  - Sahteciliğe eğilimli değildi
explanation: |
   Metalik para, özellikle de altın ve gümüş, emtia parasından daha dayanıklıydı.
   Değerli metaller zaman içinde bozulmaya daha az eğilimlidir, bu da onları aşağıdakiler için ideal hale getirir
   değerin uzun süreli depolanması. Bu dayanıklılık, aynı zamanda şu amaçlarla kullanılmalarına da katkıda bulunmuştur
   gW-0 aracı, bir hesap birimi ve bir değer deposu.
reviewed: true
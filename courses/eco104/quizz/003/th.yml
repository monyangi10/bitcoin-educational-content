question: ข้อดีอย่างหนึ่งของเหรียญโลหะเหนือเงินสินค้าโภคภัณฑ์คืออะไร?
answer: มันทนทานมากขึ้น
wrong_answers:
  - มันมีมูลค่าที่แท้จริงสูงกว่า
  - มันสามารถขนส่งได้ง่ายกว่า
  - มันไม่เสี่ยงต่อการปลอมแปลง
explanation: |
   เงินโลหะ โดยเฉพาะทองคำและเงิน มีความทนทานมากกว่าเงินสินค้า 
   โลหะมีค่ามีแนวโน้มที่จะเสื่อมสภาพน้อยลงเมื่อเวลาผ่านไป ทำให้เหมาะสำหรับ
   การเก็บรักษามูลค่าในระยะยาว ความทนทานนี้ยังช่วยให้พวกมันมีประโยชน์ในฐานะ
   สื่อกลางในการแลกเปลี่ยน หน่วยวัดมูลค่า และการเก็บรักษามูลค่า
reviewed: true
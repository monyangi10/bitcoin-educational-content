question: टेक्स्ट में बताए गए स्टेबलकॉइन के मुख्य प्रकार क्या हैं?
answer: फिएट-बैक्ड, कमोडिटी-बैक्ड और एल्गोरिदमिक स्टेबलकॉइन्स।
wrong_answers:
  - डिजिटल और फिजिकल स्टेबलकॉइन्स
  - केंद्रीकृत और विकेंद्रीकृत स्टेबलकॉइन्स
  - बैंकों द्वारा समर्थित स्टेबलकॉइन और व्यक्तियों द्वारा समर्थित स्टेबलकॉइन
explanation: |
  पिछले अध्यायों में हमने स्टेबलकॉइन के तीन मुख्य प्रकार देखे हैं;
  फिएट-बैक्ड स्टेबलकॉइन्स, जो पारंपरिक मुद्राओं द्वारा समर्थित होते हैं
  अमेरिकी डॉलर की तरह; कमोडिटी-बैक्ड स्टेबलकॉइन, जो समर्थित होते हैं
  सोना या तेल जैसी वस्तुएं; और एल्गोरिदमिक स्टेबलकॉइन्स, जो निर्भर करते हैं
  एक नियमों या एल्गोरिदम के सेट पर अपनी वैल्यू बनाए रखने के लिए। हालांकि,
  यह बताता है कि सफल एल्गोरिदमिक स्टेबलकॉइन अभी तक बाजार में नहीं आए हैं।
reviewed: true
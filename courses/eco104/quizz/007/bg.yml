question: Какво е въздействието на печатането на повече пари върху покупателната способност на дадена валута?
answer: Влошаване на покупателната способност на валутата
wrong_answers:
  - Повишаване на покупателната способност на валутата
  - Няма въздействие
  - Повече пари = по-голяма покупателна способност
explanation: |
  Когато централните банки решат да печатат пари, те не могат просто да създадат повече стойност.
  За да могат тези новонапечатани пари да струват нещо, тяхната стойност трябва да идва от
  притежателите на предишната валута.
  Представете си паричното предлагане като пица и си представете, че тя е разрязана на четири парчета.
  Удвояването на паричното предлагане не е равносилно на удвояване на количеството пица.
  Вместо това то би било равносилно на разрязване на тези четири парчета наполовина, за да се създаде
  осем парчета. Не сме получили допълнителна пица. Просто имаме повече парчета,
  всяка по-малка по размер. Следователно, когато печатаме повече пари, ние обезценяваме парите
  които вече съществуват.
reviewed: true
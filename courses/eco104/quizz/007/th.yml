question: ผลกระทบของการพิมพ์เงินเพิ่มต่ออำนาจการซื้อของสกุลเงินคืออะไร?
answer: การเสื่อมถอยของอำนาจการซื้อของสกุลเงิน
wrong_answers:
  - การเพิ่มขึ้นของอำนาจการซื้อของสกุลเงิน
  - ไม่มีผลกระทบ
  - เงินมากขึ้น = อำนาจการซื้อมากขึ้น
explanation: |
  เมื่อธนาคารกลางตัดสินใจพิมพ์เงิน พวกเขาไม่สามารถสร้างมูลค่าเพิ่มได้ง่ายๆ 
  สำหรับเงินที่พิมพ์ใหม่นี้จะมีค่า มูลค่าของมันต้องมาจากผู้ถือสกุลเงินก่อนหน้า 
  ลองนึกถึงปริมาณเงินเป็นพิซซ่า และจินตนาการว่ามันถูกตัดเป็นสี่ชิ้น 
  การเพิ่มปริมาณเงินเป็นสองเท่าไม่เท่ากับการเพิ่มปริมาณพิซซ่าเป็นสองเท่า 
  แต่จะเท่ากับการตัดสี่ชิ้นนั้นออกเป็นครึ่งหนึ่งเพื่อสร้างแปดชิ้น 
  เราไม่ได้มีพิซซ่าเพิ่มขึ้นแต่อย่างใด เราแค่มีชิ้นมากขึ้น แต่ละชิ้นมีขนาดเล็กลง 
  ดังนั้น เมื่อเราพิมพ์เงินเพิ่ม เราจะลดค่าของเงินที่มีอยู่แล้วในระบบ
reviewed: true
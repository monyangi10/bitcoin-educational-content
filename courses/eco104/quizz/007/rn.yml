question: Ni ingaruka izihe gucapura amahera menshi ku bushobozi bw’amahera bwo kugura?
answer: Ugusenyuka kw'ubushobozi bwo kugura bw'amafaranga
wrong_answers:
  - Ukwiyongera kw'ubushobozi bwo kugura bw'amafaranga
  - Nta ngaruka
  - Amahera menshi = ubushobozi bwo kugura bwinshi
explanation: |
  Iyo amabanki akomeye afashe ingingo yo gucapura amahera, ntashobora gusa gutuma haba agaciro kanini. 
  Kugira ngo ayo mahera aherutse gucapwa agire agaciro, agaciro kayo gategerezwa kuva ku . 

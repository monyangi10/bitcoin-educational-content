question: 印製更多的貨幣對貨幣的購買力有什麼影響？
answer: 貨幣購買力下降
wrong_answers:
  - 貨幣購買力上升
  - 無影響
  - 更多的錢 = 更強的購買力
explanation: |
  當中央銀行決定印鈔票時，他們不能簡單地創造更多價值。
  為了讓這些新印的錢有價值，其價值必須來自於
  以前的貨幣持有人。
  把錢 Supply 當成披薩，想像它被切成四片。
  將 Supply 的資金增加一倍，並不等於披薩的數量增加一倍。
  取而代之，等於將這四片切成兩半，創造出
  八片。我們並沒有增加任何披薩。我們只是多了幾片而已、
  每種貨幣的體積都會變小。因此，當我們印更多的錢時，錢就會貶值。
  已經存在。
reviewed: true
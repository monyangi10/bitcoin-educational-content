question: 화폐를 더 많이 찍어내면 통화의 구매력에 어떤 영향이 있나요?
answer: 통화 구매력 하락
wrong_answers:
  - 통화 구매력 상승
  - 영향 없음
  - 더 많은 돈 = 더 큰 구매력
explanation: |
  중앙은행이 화폐를 찍어내기로 결정할 때 단순히 더 많은 가치를 창출할 수는 없습니다.
  새로 인쇄된 화폐가 가치를 가지려면 그 화폐의 가치가
  이전 화폐 보유자들로부터 나와야 합니다.
  Supply이라는 화폐를 피자라고 생각하고 피자를 네 조각으로 잘랐다고 상상해 보세요.
  Supply 화폐를 두 배로 늘리는 것은 피자의 양을 두 배로 늘리는 것과 같지 않습니다.
  대신 네 조각을 반으로 잘라서
  8조각이 됩니다. 우리는 피자를 추가로 얻지 못합니다. 단지 조각이 더 많아졌을 뿐입니다,
  크기가 더 작아졌을 뿐입니다. 따라서 우리가 더 많은 돈을 찍어내면 이미 존재하는 돈의 가치가
  이미 존재하는 화폐의 가치를 떨어뜨립니다.
reviewed: true
question: 자금을 동결할 수 있음에도 불구하고 중앙화된 스테이블코인의 장점은 무엇인가요?
answer: 특정 시나리오에서 사용자를 보호하기 위해 신속하게 대응할 수 있습니다
wrong_answers:
  - 완벽한 탈중앙화 및 보안을 제공합니다
  - 어떠한 규제나 개입의 대상이 아닙니다
  - 법 집행 기관으로부터 독립적으로 운영됩니다
explanation: |
  중앙화된 스테이블코인은 사용자에게 가장 이익이 될 때 개입할 수 있습니다
  사용자와 시스템의 전반적인 안정성에 가장 이익이 될 때
  동결된 자금이 소비자 보호와 해커의 이익을 막기 위해
  소비자를 보호하고 해커의 이익을 막는 데 사용되었습니다.
reviewed: true
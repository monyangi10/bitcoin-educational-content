question: Ni inyungu imwe iyihe y’ama stablecoins ashizwe hamwe naho ashobora guhagarika amahera?
answer: Bashobora kwishura ningoga kugira ngo bakingire abakoresha mu bihe bimwebimwe
wrong_answers:
  - Batanga ukwegereza ubutegetsi abaturage bose n'umutekano .
  - Nta mabwirizwa canke ngo bafate ingingo .
  - Bakora bigenga ku bajejwe gukurikiza amategeko .
explanation: |
  Ivyuma bikomeye vy'imbere mu gihugu birafise ubushobozi bwo kwinjiramwo . 
  iyo ari mu nyungu z'abakoresha n'ugushikama muri rusangi . 
  y’urwo rutonde, nk’uko vyerekanwa n’ingero aho amahera yafunzwe yari . 
  ikoreshwa mu kurinda abaguzi no kubuza abasuma kuronka inyungu.
reviewed: true
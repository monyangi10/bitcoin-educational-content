question: केंद्रीकृत स्टेबलकॉइन का एक फायदा क्या है, भले ही वे फंड्स को फ्रीज़ कर सकते हों?
answer: वे कुछ खास स्थितियों में यूजर्स की सुरक्षा के लिए तुरंत जवाब दे सकते हैं।
wrong_answers:
  - वे पूरी तरह से विकेंद्रीकरण और सुरक्षा प्रदान करते हैं
  - वे किसी भी नियम या हस्तक्षेप के अधीन नहीं हैं
  - वे कानून प्रवर्तन से स्वतंत्र रूप से काम करते हैं
explanation: |
  केंद्रीकृत स्टेबलकॉइन में हस्तक्षेप करने की क्षमता होती है
  जब यूजर्स के सर्वोत्तम हित में हो और समग्र स्थिरता के लिए अच्छा हो
  सिस्टम की, जैसा कि उन उदाहरणों से पता चलता है जहां जमा हुए फंड थे
  उपभोक्ताओं की सुरक्षा के लिए और हैकर्स को फायदा उठाने से रोकने के लिए इस्तेमाल किया जाता है।
reviewed: true
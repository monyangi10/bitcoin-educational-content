question: Кое е предимството на централизираните стейбълкойни, въпреки възможността за замразяване на средства?
answer: Те могат да реагират бързо, за да защитят потребителите в определени ситуации
wrong_answers:
  - Те предлагат пълна децентрализация и сигурност
  - Те не подлежат на никакви разпоредби или интервенции
  - Те работят независимо от правоприлагащите органи
explanation: |
  Централизираните стейбълкойни имат възможност да се намесват
  когато това е в най-добрия интерес на потребителите и на цялостната стабилност
  на системата, както показват примери, при които замразени средства са
  използвани, за да се защитят потребителите и да се попречи на хакерите да се възползват.
reviewed: true

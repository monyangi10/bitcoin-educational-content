question: टेदर के विभिन्न स्टेबलकॉइन्स अस्थिर अर्थव्यवस्थाओं में व्यक्तियों को वित्तीय स्वतंत्रता कैसे देते हैं?
answer: स्थिर Exchange दरों वाली मुद्राओं तक पहुंच प्रदान करके
wrong_answers:
  - भौतिक नकदी की जरूरत को खत्म करके
  - बचत पर ज़्यादा ब्याज देकर
  - वैश्विक लेन-देन को तुरंत संभव बनाकर
explanation: |
  टेदर के विभिन्न स्टेबलकॉइन अमेरिकी डॉलर जैसी स्थिर संपत्तियों से जुड़े हुए हैं।
  डॉलर या सोना। यह स्थिरता अस्थिर अर्थव्यवस्थाओं में लोगों को
  अपने पैसे को एक ऐसी मुद्रा में ले जाना जो उसी के अधीन नहीं है
  महंगाई दरों को नियंत्रित करके, उनकी बचत की कीमत बनाए रखने में मदद मिलती है।
reviewed: true
question: Ni gute amafaranga atandukanye ya Tether afasha mu kwidegemvya mu vy’amahera ku bantu ku giti cabo mu bihugu bitagira ubutunzi?
answer: Mu gutanga uburyo bwo kuronka amafaranga afise ibiciro bihoraho vya Exchange
wrong_answers:
  - Mu gukuraho ivy’ugukenera amahera y’umubiri .
  - Mu gutanga inyungu nyinshi ku vyo uzigamye
  - Mu gushoboza amafaranga y'isi yose ahita
explanation: |
  Ivyuma bitandukanye vya Tether bishingiye ku bintu bikomeye nka Amerika 
  idolari canke inzahabu. Ukwo gushikama gutuma abantu bari mu bukungu butashikamye . 
  kwimurira amahera yabo mu mafaranga atajanye n’ivyo nyene . 
  n’ibipimo vy’ugutera imbere kw’ibiciro, bikabafasha kuguma bafise agaciro k’amahera bazigamye.
reviewed: true
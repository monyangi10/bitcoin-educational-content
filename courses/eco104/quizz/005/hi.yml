question: मुद्रास्फीति (इन्फ्लेशन) समय के साथ वेतनभोगियों की खरीदारी क्षमता को कैसे प्रभावित करती है?
answer: महँगाई खरीदने की ताकत को कम कर देती है क्योंकि मजदूरी अक्सर असली महँगाई दर से पीछे रह जाती है।
wrong_answers:
  - महँगाई से खरीदारी की ताकत बढ़ती है क्योंकि मजदूरी कीमतों से ज्यादा तेजी से बढ़ती है।
  - महंगाई का खरीदारी की क्षमता पर कोई असर नहीं पड़ता।
  - महंगाई सिर्फ उन लोगों की खरीदने की ताकत को प्रभावित करती है जो फाइनेंशियल मार्केट्स में निवेश करते हैं।
explanation: |
  महंगाई से उपभोक्ता कीमतों में लगातार बढ़ोतरी होती है, जिससे खरीदने की क्षमता कम हो जाती है।
  मजदूरों की ताकत कम हो जाती है क्योंकि उनकी मजदूरी महंगाई की असली दर से पीछे रह जाती है।
  इससे कमाई करने वालों के लिए अपने लंबे समय के बचत के लक्ष्यों को हासिल करना मुश्किल हो जाता है
  और अपने जीवन स्तर को बनाए रखें।
reviewed: true
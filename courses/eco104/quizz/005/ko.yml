question: 인플레이션은 시간이 지남에 따라 임금 근로자의 구매력에 어떤 영향을 미치나요?
answer: 인플레이션은 임금이 실제 물가 상승률보다 뒤처지는 경우가 많기 때문에 구매력을 약화시킵니다.
wrong_answers:
  - 인플레이션은 임금이 물가보다 빠르게 상승함에 따라 구매력을 증가시킵니다.
  - 인플레이션은 구매력에 영향을 미치지 않습니다.
  - 인플레이션은 금융 시장에 투자하는 사람들의 구매력에만 영향을 미칩니다.
explanation: |
  인플레이션은 소비자 물가의 지속적인 상승으로 이어져 임금 근로자의 구매력을 약화시킵니다
  임금 근로자의 임금은 일반적으로 실제 물가 상승률에 뒤처지기 때문에 구매력이 약화됩니다.
  이로 인해 임금 근로자는 장기적인 저축 목표를 달성하기 어렵고
  생활 수준을 유지하기 어렵게 만듭니다.
reviewed: true
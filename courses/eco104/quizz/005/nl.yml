question: Hoe beïnvloedt inflatie de koopkracht van loontrekkenden in de loop der tijd?
answer: Inflatie tast de koopkracht aan omdat lonen vaak achterblijven bij de werkelijke inflatie.
wrong_answers:
  - Inflatie verhoogt de koopkracht als de lonen sneller stijgen dan de prijzen.
  - Inflatie heeft geen effect op de koopkracht.
  - Inflatie heeft alleen invloed op de koopkracht van degenen die investeren in financiële markten.
explanation: |
  Inflatie leidt tot een aanhoudende stijging van de consumentenprijzen, waardoor de koopkracht van loontrekkers wordt uitgehold
  koopkracht van loontrekkenden omdat hun loon meestal achterblijft bij de werkelijke inflatie.
  Dit maakt het moeilijk voor loontrekkers om hun langetermijnspaardoelen te bereiken en hun levensstandaard op peil te houden
  en hun levensstandaard te behouden.
reviewed: true
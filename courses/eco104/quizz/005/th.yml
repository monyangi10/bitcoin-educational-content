question: อัตราเงินเฟ้อส่งผลกระทบต่อกำลังซื้อของผู้มีรายได้จากค่าแรงอย่างไรเมื่อเวลาผ่านไป?
answer: อัตราเงินเฟ้อกัดกร่อนกำลังซื้อเนื่องจากค่าจ้างมักจะล้าหลังอัตราเงินเฟ้อที่แท้จริง
wrong_answers:
  - อัตราเงินเฟ้อเพิ่มอำนาจการซื้อเมื่อค่าจ้างเพิ่มขึ้นเร็วกว่าราคา
  - อัตราเงินเฟ้อไม่มีผลต่ออำนาจการซื้อ
  - อัตราเงินเฟ้อมีผลกระทบต่ออำนาจการซื้อเฉพาะผู้ที่ลงทุนในตลาดการเงินเท่านั้น
explanation: |
  อัตราเงินเฟ้อทำให้ราคาสินค้าผู้บริโภคเพิ่มขึ้นอย่างต่อเนื่อง ส่งผลให้กำลังซื้อของผู้มีรายได้จากค่าจ้างลดลง เนื่องจากค่าจ้างมักจะตามไม่ทันอัตราเงินเฟ้อที่แท้จริง สิ่งนี้ทำให้ผู้มีรายได้จากค่าจ้างบรรลุเป้าหมายการออมระยะยาวได้ยาก และรักษามาตรฐานการครองชีพของตนเอง
reviewed: true
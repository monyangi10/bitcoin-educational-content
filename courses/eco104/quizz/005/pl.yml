question: Jak inflacja wpływa na siłę nabywczą pracowników w czasie?
answer: Inflacja zmniejsza siłę nabywczą, ponieważ płace często pozostają w tyle za rzeczywistą stopą inflacji.
wrong_answers:
  - Inflacja zwiększa siłę nabywczą, ponieważ płace rosną szybciej niż ceny.
  - Inflacja nie ma wpływu na siłę nabywczą.
  - Inflacja wpływa jedynie na siłę nabywczą tych, którzy inwestują na rynkach finansowych.

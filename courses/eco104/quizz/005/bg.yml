question: Как инфлацията се отразява на покупателната способност на работниците с течение на времето?
answer: Инфлацията намалява покупателната способност, тъй като заплатите често изостават от действителния темп на инфлация.
wrong_answers:
  - Инфлацията увеличава покупателната способност, тъй като заплатите нарастват по-бързо от цените.
  - Инфлацията не оказва влияние върху покупателната способност.
  - Инфлацията засяга покупателната способност само на тези, които инвестират на финансовите пазари.
explanation: |
  Инфлацията води до трайно повишаване на потребителските цени, което намалява покупателната способност на населението
  покупателната способност на наетите лица, тъй като заплатите им обикновено изостават от действителния темп на инфлация.
  Това затруднява постигането на дългосрочните цели за спестяване от страна на работещите на заплата
  и да поддържат стандарта си на живот.
reviewed: true
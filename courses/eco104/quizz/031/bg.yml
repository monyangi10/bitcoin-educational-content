question: Коя е основната причина за краткосрочната волатилност на цените на стейбълкойните?
answer: Ниски нива на ликвидност на борсите
wrong_answers:
  - Липса на резерви за посрещане на нуждите от изтегляне
  - Хакове, които компрометират стейбълкойна
  - Отписване на стейбълкойна
explanation: |
  Краткосрочната волатилност на цените на стейбълкойните често е резултат от
  на проблеми с ликвидността, при които по-малките борси може да нямат възможност да
  да посрещнат търсенето на клиентите, което води до временни колебания на цените.
reviewed: true

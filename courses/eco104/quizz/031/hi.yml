question: स्टेबलकॉइन्स में शॉर्ट-टर्म प्राइस वोलेटिलिटी का मुख्य कारण क्या है?
answer: एक्सचेंजों पर तरलता का स्तर कम है
wrong_answers:
  - निकासी की मांग पूरी करने के लिए रिजर्व की कमी
  - हैक्स जिसने स्टेबलकॉइन को कमज़ोर कर दिया
  - स्टेबलकॉइन का डिपेगिंग
explanation: |
  स्टेबलकॉइन में अल्पकालिक कीमतों में उतार-चढ़ाव अक्सर होता है क्योंकि
  लिक्विडिटी की समस्याओं के कारण, छोटे एक्सचेंजों में क्षमता की कमी हो सकती है
  ग्राहकों की मांग को पूरा करने के लिए, जिससे अस्थायी कीमतों में उतार-चढ़ाव होता है।
reviewed: true
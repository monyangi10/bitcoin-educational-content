question: เหตุผลหลักสำหรับความผันผวนของราคาระยะสั้นในสเตเบิลคอยน์คืออะไร?
answer: ระดับสภาพคล่องต่ำในตลาดแลกเปลี่ยน
wrong_answers:
  - ขาดเงินสำรองเพื่อตอบสนองความต้องการถอนเงิน
  - แฮ็กที่ทำลายเสถียรภาพของสเตเบิลคอยน์
  - การหลุดจากการตรึงของสเตเบิลคอยน์
explanation: |
  ความผันผวนของราคาในระยะสั้นของ stablecoins มักเป็นผลมาจากปัญหาสภาพคล่อง ซึ่งการแลกเปลี่ยนที่เล็กกว่าอาจขาดความสามารถในการตอบสนองความต้องการของลูกค้า ทำให้เกิดความผันผวนของราคาในช่วงเวลาสั้น ๆ
reviewed: true
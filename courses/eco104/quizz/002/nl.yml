question: Wat is het historische verband tussen geld en grondstoffen zoals goud?
answer: Goud is schaars en wordt algemeen aanvaard als waardeopslagplaats
wrong_answers:
  - Goud maakt geld aantrekkelijker
  - Goud is gemakkelijk deelbaar
  - Goud is uniek
explanation: |
  Gezien de wereldwijde schaarste van goud en de aanzienlijke investering die nodig is
  om goud te delven, te raffineren en op te slaan, is goud altijd verhandeld tegen een premie boven andere geldsoorten
  andere vormen van geld.
reviewed: true
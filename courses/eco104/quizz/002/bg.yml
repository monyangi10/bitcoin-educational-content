question: Каква е историческата връзка между парите и стоките като златото?
answer: Златото е рядко срещано и широко прието като средство за съхранение на стойност
wrong_answers:
  - Златото прави парите по-привлекателни
  - Златото е лесно делимо
  - Златото е уникално
explanation: |
  Като се има предвид глобализираната рядкост на златото в природата и значителните инвестиции, които се изискват
  за неговото добиване, рафиниране и съхранение, златото постоянно се търгува с премия над
  други форми на пари.
reviewed: true
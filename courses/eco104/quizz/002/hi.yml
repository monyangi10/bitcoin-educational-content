question: पैसे और सोने जैसी चीज़ों के बीच ऐतिहासिक कनेक्शन क्या है?
answer: सोना दुर्लभ है और मूल्य संचय के रूप में व्यापक रूप से स्वीकार किया जाता है।
wrong_answers:
  - सोना पैसे को और भी आकर्षक बना देता है
  - सोना आसानी से बाँटा जा सकता है
  - सोना अनोखा है
explanation: |
  सोने की प्राकृतिक रूप से दुनिया भर में कमी और इसमें किए जाने वाले बड़े निवेश को देखते हुए
  मेरे लिए, सोना खोदना, साफ करना और स्टोर करना हमेशा से प्रीमियम दर पर ही ट्रेड हुआ है...
  पैसे के अन्य रूप।
reviewed: true
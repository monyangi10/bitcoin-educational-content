question: ความเชื่อมโยงทางประวัติศาสตร์ระหว่างเงินและสินค้าโภคภัณฑ์เช่นทองคำคืออะไร?
answer: ทองคำมีอยู่อย่างจำกัดและได้รับการยอมรับอย่างกว้างขวางว่าเป็นที่เก็บมูลค่า
wrong_answers:
  - ทองทำให้เงินดูน่าดึงดูดยิ่งขึ้น
  - ทองคำสามารถแบ่งแยกได้ง่าย
  - ทองคำมีเอกลักษณ์เฉพาะตัว
explanation: |
  เนื่องจากความหายากของทองคำในธรรมชาติทั่วโลกและการลงทุนที่สำคัญที่จำเป็นในการขุด, กลั่น, และเก็บรักษา ทองคำจึงมีการซื้อขายที่ราคาสูงกว่ารูปแบบอื่น ๆ ของเงินอย่างต่อเนื่อง
reviewed: true
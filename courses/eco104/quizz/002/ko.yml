question: 화폐와 금과 같은 상품 사이의 역사적 연관성은 무엇인가요?
answer: 금은 희소성이 높고 가치 저장 수단으로 널리 인정받고 있습니다
wrong_answers:
  - 금은 돈을 더 매력적으로 보이게 합니다
  - 금은 쉽게 나눌 수 있습니다
  - 금은 독특합니다
explanation: |
  금의 세계화된 희소성과 채굴, 정제, 저장에 필요한 막대한 투자
  채굴, 정제, 저장에 상당한 투자가 필요하기 때문에 금은 다른 형태의 화폐에 비해
  다른 형태의 화폐보다 높은 프리미엄으로 거래되어 왔습니다.
reviewed: true
question: ข้อได้เปรียบหลักของการใช้กระเป๋าเงินแบบไม่รับฝากสำหรับการจัดเก็บ Bitcoin คืออะไร?
answer: ความปลอดภัยและความเป็นส่วนตัวที่เพิ่มขึ้น
wrong_answers:
  - การเข้าถึง Bitcoin ได้อย่างง่ายดาย
  - ค่าธรรมเนียมการทำธุรกรรมที่ต่ำลง
  - ไม่จำเป็นต้องใช้รหัสผ่าน
explanation: |
  กระเป๋าเงินที่ไม่ใช่การคุมขังคือที่ที่คุณเป็นผู้ดูแลเงินของคุณเพียงผู้เดียว หมายความว่าคุณมีการควบคุมเต็มที่เหนือกุญแจส่วนตัวของคุณ ดังนั้น กระเป๋าเงินที่ไม่ใช่การคุมขังจึงมีระดับความปลอดภัยและความเป็นส่วนตัวสูงกว่ากระเป๋าเงินที่มีการคุมขัง เนื่องจากคุณเป็นผู้รับผิดชอบเพียงคนเดียวต่อความปลอดภัยของเงินของคุณ
reviewed: true
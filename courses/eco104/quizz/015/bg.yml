question: Кое е основното предимство на използването на портфейли, които не се съхраняват от физически лица, за съхранение на Bitcoin?
answer: Повишена сигурност и поверителност
wrong_answers:
  - Лесен достъп до Bitcoin
  - По-ниски такси за транзакции
  - Няма нужда от парола
explanation: |
  Портфейлите, които не са на отговорно пазене, са тези, в които вие сте единственият попечител на средствата си,
  което означава, че имате пълен контрол върху частните си ключове. Следователно,
  портфейлите, които не са попечителски, предлагат по-високо ниво на сигурност и поверителност
  в сравнение с попечителските портфейли, тъй като само вие сте отговорни за сигурността на вашите средства.
reviewed: true
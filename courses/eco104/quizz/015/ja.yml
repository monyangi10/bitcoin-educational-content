question: ビットコインの保管にノンカストディアルウォレットを使用する主な利点は何ですか？
answer: セキュリティとプライバシーの向上
wrong_answers:
  - ビットコインへの簡単なアクセス
  - 低いトランザクション手数料
  - パスワード不要
explanation: |
  ノンカストディアルウォレットでは、あなた自身が資金の唯一の管理者であるため、秘密鍵を完全に制御できます。したがって、資金の安全を自分自身だけが責任を持つことから、ノンカストディアルウォレットはカストディアルウォレットよりも高いレベルのセキュリティとプライバシーを提供します。
reviewed: true

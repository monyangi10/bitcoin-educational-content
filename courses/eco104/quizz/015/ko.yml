question: Bitcoin 보관에 비위탁 지갑을 사용하면 어떤 이점이 있나요?
answer: 보안 및 개인정보 보호 강화
wrong_answers:
  - Bitcoin에 쉽게 액세스
  - 거래 수수료 절감
  - 비밀번호가 필요 없습니다
explanation: |
  비수탁 지갑은 사용자가 자금의 유일한 관리인인 지갑입니다,
  즉, 개인 키를 완전히 제어할 수 있습니다. 따라서
  비수탁 지갑은 수탁 지갑보다 더 높은 수준의 보안과 프라이버시를 제공합니다
  자금의 안전에 대한 책임은 오직 본인에게 있기 때문입니다.
reviewed: true
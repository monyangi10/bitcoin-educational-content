question: Какво е значението на цитата от "Таймс" от 03 януари 2009 г., "Канцлерът на ръба на втора помощ за банките", в първия блок на Bitcoin?
answer: Той подчертава способността на финансовата ни система да социализира загубите
wrong_answers:
  - Това е знак за признателността на Satoshi към вестник The Times
  - Той дава чудесен пример за това как спасителните мерки са били от полза за нашето общество
  - Той ни показва способността на Bitcoin да съхранява съобщения в блокчейна
explanation: |
  Това е препратка към [статия] във вестник Times (https://www.thetimes.co.uk/article/chancellor-alistair-darling-on-brink-of-second-bailout-for-banks-n9l382mn62h), отразяваща Satoshi
  опасения, че банките се ангажират с рисково поведение, без да
  последици за тях и че загубите ще бъдат разпределени между притежателите на валута.
reviewed: true
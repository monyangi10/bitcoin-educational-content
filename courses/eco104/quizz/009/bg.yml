question: Какво е значението на цитата от Таймс от 03 януари 2009 г., "Канцлерът на ръба на втора помощ за банките", в първия блок на Bitcoin?
answer: Той подчертава способността на финансовата ни система да социализира загубите
wrong_answers:
  - Това е знак за признателността на Satoshi към вестник The Times
  - дава чудесен пример за това как спасителните мерки са били от полза за нашето общество
  - показва способността на Bitcoin да съхранява съобщения в блокчейна
explanation: |
  Това е препратка към статия във вестник Таймс, отразяваща опасенията на Satoshi, че банките се ангажират с рисково поведение, без
  последици за тях и че загубите ще бъдат разпределени между притежателите на валутата.
reviewed: true

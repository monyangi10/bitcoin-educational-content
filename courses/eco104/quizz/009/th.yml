question: ความสำคัญของคำพูดจาก The Times 03/Jan/2009, Chancellor on brink of second bailout for banks, ในบล็อก Bitcoin แรกคืออะไร?
answer: มันเน้นความสามารถของระบบการเงินของเราในการทำให้การขาดทุนเป็นเรื่องของสังคม
wrong_answers:
  - มันแสดงถึงความชื่นชมของ Satoshi ต่อหนังสือพิมพ์ The Times
  - มันเป็นตัวอย่างที่ดีว่าการช่วยเหลือทางการเงินได้เป็นประโยชน์ต่อสังคมของเราอย่างไร
  - มันแสดงให้เราเห็นถึงความสามารถของ Bitcoin ในการเก็บข้อความในบล็อกเชน
explanation: |
  นี่คือการอ้างอิงถึง [บทความ](https: //www.thetimes.co.uk/article/chancellor-alistair-darling-on-brink-of-second-bailout-for-banks-n9l382mn62h) ในหนังสือพิมพ์ Times ที่สะท้อนถึงความกังวลของ Satoshi ว่าธนาคารมีส่วนร่วมในพฤติกรรมที่มีความเสี่ยง โดยแทบไม่มีผลกระทบต่อพวกเขา และว่าความสูญเสียจะถูกแบ่งปันในหมู่ผู้ถือสกุลเงิน
reviewed: true
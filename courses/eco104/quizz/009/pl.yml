question: Jakie znaczenie ma cytat z The Times 03/Jan/2009 Kanclerz na krawędzi drugiego bailoutu dla banków w pierwszym bloku Bitcoin?
answer: Podkreśla to zdolność naszego systemu finansowego do uspołeczniania strat

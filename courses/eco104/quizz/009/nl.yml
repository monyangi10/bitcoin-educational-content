question: Wat is de betekenis van het citaat The Times 03/Jan/2009 Kanselier op rand van tweede bailout voor banken in eerste Bitcoin blok?
answer: Het benadrukt het vermogen van ons financiële systeem om verliezen te socialiseren
wrong_answers:
  - Het betekent Satoshi's waardering voor de krant The Times
  - Het geeft een geweldig voorbeeld van hoe reddingsoperaties onze samenleving ten goede zijn gekomen
  - Het toont ons de mogelijkheid van Bitcoin om berichten op te slaan in de Blockchain
explanation: |
  Dit is een verwijzing naar een krantenartikel in de Times (https://www.thetimes.co.uk/article/chancellor-alistair-darling-on-brink-of-second-bailout-for-banks-n9l382mn62h) waarin de bezorgdheid van Satoshi wordt weerspiegeld over het feit dat banken risicovol gedrag vertoonden en er weinig aandacht was voor de risico's die ze namen
  bezorgdheid dat banken zich bezighielden met risicovol gedrag, met weinig
  gevolgen voor hen, en dat verliezen zouden worden verdeeld onder de houders van valuta.
reviewed: true
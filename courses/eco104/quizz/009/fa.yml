question: اهمیت نقل‌قول "The Times 03/Jan/2009 Chancellor on brink of second bailout for banks" در اولین بلوک Bitcoin چیست؟
answer: این امر توانایی سیستم مالی ما در اجتماعی کردن زیان‌ها را برجسته می‌کند
wrong_answers:
  - این نشان‌دهنده قدردانی Satoshi از روزنامه The Times است
  - این یک مثال عالی از چگونگی بهره‌مندی جامعه ما از کمک‌های مالی ارائه می‌دهد.
  - این به ما توانایی Bitcoin برای ذخیره پیام‌ها در Blockchain را نشان می‌دهد.
explanation: |
  این یک ارجاع به [مقاله](https://www.thetimes.co.uk/article/chancellor-alistair-darling-on-brink-of-second-bailout-for-banks-n9l382mn62h) روزنامه تایمز است که نگرانی‌های Satoshi را منعکس می‌کند مبنی بر اینکه بانک‌ها درگیر رفتارهای پرخطر هستند، بدون اینکه پیامدی برای آن‌ها داشته باشد و زیان‌ها بین دارندگان ارز تقسیم خواهد شد.
reviewed: true
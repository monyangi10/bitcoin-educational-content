question: Каква е трилемата на блокчейн в сферата на криптовалутите?
answer: Компромисът между мащабируемост, сигурност и децентрализация при криптовалутите
wrong_answers:
  - Характеристика на Bitcoin, която дава приоритет на децентрализацията и сигурността пред мащабируемостта
  - Трудността при определянето на траекторията и стойностите на криптовалутите
  - Ограниченията на технологията на Bitcoin в сравнение с други криптовалути
explanation: |
  Концепцията за блокчейн трилемата е идеята, че криптовалутите
  трябва да дават приоритет на две от трите важни характеристики: мащабируемост,
  сигурност и децентрализация. Bitcoin дава приоритет на децентрализацията и сигурността,
  което се отразява на нейната мащабируемост, но тя все пак я постига чрез алтернативни средства.
reviewed: true
question: "ปัญหาสามเหลี่ยมของบล็อกเชน" ในโลกของสกุลเงินดิจิทัลคืออะไร?
answer: การแลกเปลี่ยนระหว่างความสามารถในการขยายตัว, ความปลอดภัย, และการกระจายศูนย์ในสกุลเงินดิจิทัล
wrong_answers:
  - ลักษณะเฉพาะของ Bitcoin ที่ให้ความสำคัญกับการกระจายอำนาจและความปลอดภัยมากกว่าความสามารถในการขยายตัว
  - ความยากลำบากในการกำหนดทิศทางและมูลค่าของสกุลเงินดิจิทัล
  - ข้อจำกัดของเทคโนโลยี Bitcoin เมื่อเปรียบเทียบกับสกุลเงินดิจิทัลอื่น ๆ
explanation: |
  แนวคิดของปัญหาสามเหลี่ยมบล็อกเชนคือแนวคิดที่ว่าสกุลเงินดิจิทัลต้องให้ความสำคัญกับสองในสามลักษณะที่สำคัญ: ความสามารถในการขยายตัว, ความปลอดภัย, และการกระจายอำนาจ Bitcoin ให้ความสำคัญกับการกระจายอำนาจและความปลอดภัย ซึ่งส่งผลต่อความสามารถในการขยายตัว แต่ยังคงบรรลุเป้าหมายผ่านวิธีการทางเลือกอื่นๆ
reviewed: true
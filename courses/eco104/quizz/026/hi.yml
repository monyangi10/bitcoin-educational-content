question: क्रिप्टोकरेंसी की दुनिया में Blockchain ट्राइलेमा क्या है?
answer: क्रिप्टोकरेंसी में स्केलेबिलिटी, सुरक्षा और विकेंद्रीकरण के बीच ट्रेड-ऑफ (समझौता) होता है।
wrong_answers:
  - Bitcoin की एक खासियत यह है कि यह स्केलेबिलिटी के बजाय विकेंद्रीकरण और सुरक्षा को प्राथमिकता देता है।
  - क्रिप्टोकरेंसी के रास्ते और मूल्यों को समझने में मुश्किल
  - Bitcoin की तकनीक की सीमाएँ अन्य क्रिप्टोकरेंसी की तुलना में
explanation: |
  Blockchain ट्राइलेम्मा का कॉन्सेप्ट यह है कि क्रिप्टोकरेंसी...
  तीन महत्वपूर्ण विशेषताओं में से दो को प्राथमिकता देनी होगी; स्केलेबिलिटी,
  सुरक्षा, और विकेंद्रीकरण। Bitcoin विकेंद्रीकरण और सुरक्षा को प्राथमिकता देता है,
  जो इसके स्केलेबिलिटी को प्रभावित करता है, लेकिन फिर भी यह वैकल्पिक तरीकों से इसे हासिल कर लेता है।
reviewed: true
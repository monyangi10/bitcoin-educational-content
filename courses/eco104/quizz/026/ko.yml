question: 암호화폐 영역에서 Blockchain 트릴레마란 무엇인가요?
answer: 암호화폐의 확장성, 보안, 탈중앙화 사이의 절충점
wrong_answers:
  - 확장성보다 탈중앙화 및 보안을 우선시하는 Bitcoin의 특징
  - 암호화폐의 궤적과 가치 결정의 어려움
  - 다른 암호화폐와 비교한 Bitcoin의 기술 한계
explanation: |
  Blockchain 트릴레마의 개념은 암호화폐는
  는 세 가지 중요한 특성 중 두 가지를 우선시해야 한다는 개념입니다,
  보안, 탈중앙화입니다. Bitcoin는 탈중앙화와 보안을 우선시합니다,
  확장성에 영향을 미치지만, 여전히 다른 수단을 통해 확장성을 달성합니다.
reviewed: true
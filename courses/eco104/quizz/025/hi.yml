question: यह तर्क कि Bitcoin बेकार है क्योंकि यह किसी चीज़ से समर्थित नहीं है, गलत क्यों है?
answer: वैल्यू सब्जेक्टिव होती है और लोगों की मान्यताओं और अनुभवों पर आधारित होती है।
wrong_answers:
  - जीडब्ल्यू-1 सोने से बैक्ड है, जिससे इसकी अपनी एक अंतर्निहित वैल्यू होती है।
  - Bitcoin की कीमत इसकी कम उपलब्धता और सुरक्षा फीचर्स से तय होती है।
  - जीडब्ल्यू-3 की कीमत सरकारों और बैंकों द्वारा इसकी स्वीकृति पर आधारित है।
explanation: |
  वैल्यू सब्जेक्टिव होती है और देखने वाले की नज़र में होती है। Bitcoin वैल्यूएबल है।
  क्योंकि लोग ऐसा मानते हैं, बिल्कुल वैसे ही जैसे कला कीमती हो सकती है, भले ही...
  कैनवास और पेंट से बना होना। यह तर्क कि मुद्रा को किसी चीज़ से समर्थित होना चाहिए...
  कुछ मूल्यवान चीज़ ग़लत है, क्योंकि अमेरिकी डॉलर जैसी फ़िएट मुद्राओं का मूल्य
  डॉलर भरोसे और विश्वास पर भी आधारित है।
reviewed: true
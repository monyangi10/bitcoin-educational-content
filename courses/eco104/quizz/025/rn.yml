question: Ni kuki iyo mpamvu ivuga ko Bitcoin ataco imaze kubera ko ata kintu na kimwe ishigikiwe n’agasembwa?
answer: Agaciro ni ikintu umuntu yiyumvira kandi gishingiye ku vyizerwa n’ivyo abantu baciyemwo.
wrong_answers:
  - Bitcoin ishigikiwe n’inzahabu, ivyo bikaba biyiha agaciro kavukire.
  - Agaciro ka Bitcoin kagenwa n’ubukene bwayo be n’ibintu vy’umutekano wayo.
  - Agaciro ka Bitcoin gashingiye ku kwemerwa kwayo na leta n’amabanki.
explanation: |
  Agaciro ni ikintu umuntu yiyumvira kandi kiri mu maso y’uwukibona. Bitcoin ni agaciro 
  kuko abantu bemera ko ari ukwo biri, nk’uko nyene ubuhinga bushobora kuba bw’agaciro naho . 
  kuba ikozwe mu mpuzu n’irangi. Iciyumviro c’uko amafaranga ategerezwa gushigikirwa n’ 
  ikintu c'agaciro ntikibereye, nk'agaciro k'amafaranga y'amahera nk'aya Amerika . 
  idolari rishingiye ku kwizigira no kwemera na vyo nyene.
reviewed: true
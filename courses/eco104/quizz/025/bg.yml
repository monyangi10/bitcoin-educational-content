question: Защо аргументът, че Bitcoin е безполезен, защото не е подкрепен с нищо, е погрешен?
answer: Ценността е субективна и се основава на убежденията и опита на хората.
wrong_answers:
  - Bitcoin е обезпечен със злато, което му придава присъща стойност.
  - Стойността на Bitcoin се определя от неговата рядкост и характеристики за сигурност.
  - Стойността на Bitcoin се основава на приемането му от правителствата и банките.
explanation: |
  Стойността е субективна и зависи от очите на наблюдателя. Bitcoin е ценен
  защото хората вярват, че е такъв, точно както изкуството може да бъде ценно въпреки
  че е направено от платно и боя. Аргументът, че валутата трябва да бъде подкрепена от
  нещо ценно, е неточен, тъй като стойността на фиатни валути като
  долара, също се основават на доверие и вяра.
reviewed: true

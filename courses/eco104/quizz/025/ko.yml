question: Bitcoin이 결함이 없기 때문에 가치가 없다는 주장이 왜 쓸모없을까요?
answer: 가치는 주관적이며 사람들의 신념과 경험에 기반합니다.
wrong_answers:
  - Bitcoin은 금으로 뒷받침되어 고유한 가치를 지니고 있습니다.
  - Bitcoin의 가치는 희소성과 보안 기능에 의해 결정됩니다.
  - Bitcoin의 가치는 정부와 은행의 수용 여부에 따라 결정됩니다.
explanation: |
  가치는 주관적이며 보는 사람의 눈에 따라 달라집니다. Bitcoin는 가치가 있습니다
  사람들이 그렇게 믿기 때문에 가치가 있는 것입니다
  캔버스와 물감으로 만들어졌음에도 불구하고. 화폐가 가치 있는 무언가에 의해 뒷받침되어야 한다는 주장은
  가치 있는 무언가가 뒷받침되어야 한다는 주장은 부정확합니다. 미국 달러와 같은 법정 화폐의 가치는
  달러와 같은 법정화폐의 가치도 신뢰와 믿음에 기반하기 때문입니다.
reviewed: true
question: 為什麼說 Bitcoin 一文不值是因為它沒有任何東西支持的論點有瑕疵？
answer: 價值是主觀的，以人們的信念和經驗為基礎。
wrong_answers:
  - Bitcoin 由黃金支持，因此具有固有價值。
  - Bitcoin 的價值取決於其稀有性和安全特性。
  - Bitcoin 的價值取決於政府和銀行對它的接受程度。
explanation: |
  價值是主觀的，而且在觀賞者眼中。Bitcoin 是有價值的
  因為人們相信它是這樣，就像藝術可以是有價值的，儘管
  由帆布和油漆製成。貨幣必須以
  價值的東西是不準確的，因為像美國這樣的法定貨幣的價值是不準確的。
  美元也是基於信任和信念。
reviewed: true
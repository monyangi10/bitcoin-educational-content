question: Bitcoin 與由中央銀行或政府控制的傳統貨幣有何差異？
answer: 全部
wrong_answers:
  - Bitcoin 需要礦工、節點和開發者之間的協作
  - Bitcoin 允許任何人參與網路並擔任重要角色
  - Bitcoin 依賴分散的共識系統
explanation: |
  Bitcoin 與傳統法定貨幣的區別在於它是一種
  三個重要角色與社區之間的合作努力。
  節點作為守門員，可確保網路的完整性和安全性。
  礦工負責處理交易和維護 Blockchain。
  開發人員是 Bitcoin 社群中技術高超的成員，他們共同合作
  以維護和改善為網路提供動力的軟體。
  社群透過 Bitcoin 的使用，賦予它價值。
  這些角色對 Bitcoin 的功能和成功都是不可或缺的。
  數位貨幣。透過將這些關鍵任務委託給主要參與者，Bitcoin 可以
  作為一個分散、安全、透明且負責任的 Exchange 媒介運作，為
  所有使用者，使其與我們今天使用的集中式貨幣有顯著的不同。
reviewed: true
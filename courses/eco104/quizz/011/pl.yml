question: Co odróżnia Bitcoin od tradycyjnych walut kontrolowanych przez banki centralne lub rządy?
answer: Wszystkie
wrong_answers:
  - Bitcoin wymaga współpracy między górnikami, węzłami i deweloperami
  - Bitcoin umożliwia każdemu uczestnictwo w sieci i pełnienie kluczowych ról
  - Bitcoin opiera się na zdecentralizowanym systemie konsensusu
explanation: |

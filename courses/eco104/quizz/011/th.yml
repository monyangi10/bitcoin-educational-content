question: อะไรที่ทำให้ Bitcoin แตกต่างจากสกุลเงินแบบดั้งเดิมที่ถูกควบคุมโดยธนาคารกลางหรือรัฐบาล?
answer: ทั้งหมด
wrong_answers:
  - Bitcoin ต้องการความร่วมมือระหว่างนักขุด โหนด และนักพัฒนา
  - Bitcoin อนุญาตให้ทุกคนเข้าร่วมในเครือข่ายและทำหน้าที่สำคัญ
  - Bitcoin อาศัยระบบฉันทามติแบบกระจายศูนย์
explanation: |
  สิ่งที่ทำให้ Bitcoin แตกต่างจากสกุลเงินเฟียตแบบดั้งเดิมคือความพยายามร่วมกันระหว่างสามบทบาทสำคัญและชุมชน โหนดทำหน้าที่เป็นผู้รักษาประตูเพื่อให้แน่ใจถึงความสมบูรณ์และความปลอดภัยของเครือข่าย นักขุดมีหน้าที่ในการประมวลผลธุรกรรมและรักษาบล็อกเชน นักพัฒนาเป็นสมาชิกที่มีทักษะสูงของชุมชน Bitcoin ที่ทำงานร่วมกันเพื่อรักษาและปรับปรุงซอฟต์แวร์ที่ขับเคลื่อนเครือข่าย ชุมชนผ่านการใช้ Bitcoin เป็นสิ่งที่ให้คุณค่าแก่สกุลเงินนี้ แต่ละบทบาทเหล่านี้มีความสำคัญต่อการทำงานและความสำเร็จของ Bitcoin ในฐานะสกุลเงินดิจิทัล โดยการมอบหมายงานที่สำคัญเหล่านี้ให้กับผู้เล่นหลัก Bitcoin สามารถทำงานเป็นสื่อกลางในการแลกเปลี่ยนที่กระจายอำนาจ ปลอดภัย โปร่งใส และรับผิดชอบสำหรับผู้ใช้ทุกคน ทำให้แตกต่างอย่างมากจากสกุลเงินที่รวมศูนย์ที่เราใช้ในปัจจุบัน
reviewed: true
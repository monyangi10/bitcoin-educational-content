question: Какво отличава Bitcoin от традиционните валути, контролирани от централни банки или правителствата?
answer: Всички отговори
wrong_answers:
  - Bitcoin изисква сътрудничество между миньори, възли и разработчици
  - Bitcoin позволява на всеки да участва в мрежата и да изпълнява ключови роли
  - Bitcoin разчита на децентрализирана система за консенсус
explanation: |
  Това, което отличава Bitcoin от традиционните фиатни валути, е
  съвместните усилия на три основни роли и общността.
  Възлите осигуряват целостта и сигурността на мрежата, като служат като пазачи.
  Миньорите отговарят за обработката на трансакциите и поддържането на блокчейна.
  Разработчиците са висококвалифицирани членове на общността на Bitcoin, които работят заедно
  за да поддържат и подобряват софтуера, който захранва мрежата.
  Общността, чрез използването на Bitcoin, е това, което й придава стойност.
  Всяка от тези роли е от съществено значение за функционалността и успеха на Bitcoin като
  цифрова валута. Чрез възлагането на тези важни задачи на ключовите участници Bitcoin може
  да функционира като децентрализирано, сигурно, прозрачно и отговорно средство за размяна на
  всички потребители, което я прави значително по-различна от централизираните валути, които използваме днес.
reviewed: true

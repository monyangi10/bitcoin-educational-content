question: Bitcoin और पारंपरिक मुद्राओं में क्या अंतर है जो केंद्रीय बैंकों या सरकारों द्वारा नियंत्रित होती हैं?
answer: उन सभी को
wrong_answers:
  - जीडब्ल्यू-1 को माइनर्स, नोड्स और डेवलपर्स के बीच सहयोग की जरूरत है
  - जीडब्ल्यू-2 नेटवर्क में किसी को भी भाग लेने और महत्वपूर्ण भूमिकाएं निभाने की अनुमति देता है
  - Bitcoin एक विकेंद्रीकृत सहमति प्रणाली पर निर्भर करता है।
explanation: |
  Bitcoin और पारंपरिक फिएट करेंसी में फर्क यह है कि यह एक...  

(नोट: अनुवाद यहाँ अधूरा छोड़ दिया गया है क्योंकि मूल वाक्य भी अधूरा था। यदि पूरा वाक्य प्रदान किया जाए, तो मैं उसी के अनुसार पूरा अनुवाद कर दूँगा।)
  तीन ज़रूरी भूमिकाओं और समुदाय के बीच सामूहिक प्रयास।
  नोड्स गेटकीपर की तरह काम करके नेटवर्क की सुरक्षा और सत्यता को सुनिश्चित करते हैं।
  माइनर्स लेन-देन को प्रोसेस करने और Blockchain को मेन्टेन रखने के लिए ज़िम्मेदार होते हैं।
  डेवलपर्स Bitcoin समुदाय के बेहद हुनरमंद सदस्य हैं जो मिलकर काम करते हैं
  नेटवर्क को चलाने वाले सॉफ्टवेयर को बनाए रखने और सुधारने के लिए।
  कम्युनिटी, Bitcoin के इस्तेमाल से ही, इसकी वैल्यू बनती है।
  ये सभी भूमिकाएँ Bitcoin की कार्यक्षमता और सफलता के लिए बेहद ज़रूरी हैं।
  डिजिटल करेंसी। इन महत्वपूर्ण कामों को मुख्य खिलाड़ियों को सौंपकर, Bitcoin कर सकता है
  एक विकेंद्रीकृत, सुरक्षित, पारदर्शी और जवाबदेह माध्यम के रूप में Exchange का संचालन करें
  सभी यूज़र्स के लिए, जो आजकल हम जो केंद्रीकृत करेंसी इस्तेमाल करते हैं, उससे काफी अलग है।
reviewed: true
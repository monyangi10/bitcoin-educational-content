question: Bitcoin이 중앙은행이나 정부가 통제하는 기존 통화와 다른 점은 무엇인가요?
answer: 모두
wrong_answers:
  - Bitcoin은 채굴자, 노드, 개발자 간의 협력이 필요합니다
  - Bitcoin는 누구나 네트워크에 참여하여 주요 역할을 수행할 수 있습니다
  - Bitcoin는 탈중앙화된 합의 시스템에 의존합니다
explanation: |
  Bitcoin가 기존 법정화폐와 다른 점은 다음과 같습니다
  세 가지 필수 역할과 커뮤니티 간의 협력적 노력이라는 점입니다.
  노드는 게이트키퍼 역할을 통해 네트워크의 무결성과 보안을 보장합니다.
  채굴자는 트랜잭션을 처리하고 Blockchain를 유지 관리합니다.
  개발자는 Bitcoin 커뮤니티의 고도로 숙련된 구성원으로서 함께 협력하여
  네트워크를 구동하는 소프트웨어를 유지 관리하고 개선합니다.
  커뮤니티는 Bitcoin의 사용을 통해 그 가치를 부여합니다.
  이러한 각 역할은 Bitcoin의 기능과 성공에 필수적입니다
  디지털 화폐로서. 이러한 중요한 작업을 핵심 플레이어에게 맡김으로써 Bitcoin는 다음과 같은 이점을 누릴 수 있습니다
  탈중앙화되고, 안전하고, 투명하며, 책임감 있는 Exchange의 매체로 운영됩니다
  오늘날 우리가 사용하는 중앙화된 통화와는 확연히 다른 방식으로 운영될 수 있습니다.
reviewed: true
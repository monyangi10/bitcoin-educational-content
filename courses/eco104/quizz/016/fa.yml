question: هنگام گرفتن حضانت شخصی، اولین کاری که باید برای به حداقل رساندن خطر از دست دادن انجام دهید چیست؟
answer: پشتیبان‌گیری از عبارت بازیابی Wallet خود را به seed انجام دهید
wrong_answers:
  - کلیدهای خصوصی خود را با یک شخص مورد اعتماد به اشتراک بگذارید
  - عبارت بازیابی seed خود را یادداشت کرده و در رایانه خود ذخیره کنید.
  - غیرفعال کردن احراز هویت دو مرحله‌ای (2FA)
explanation: |
  اول و مهم‌تر از همه، هنگام گرفتن حضانت شخصی، از Wallet خود پشتیبان تهیه کنید. کیف پول‌های سخت‌افزاری با یک عبارت بازیابی seed ارائه می‌شوند، مجموعه‌ای از کلمات که می‌توانند برای بازیابی کلیدهای خصوصی شما در صورت گم شدن یا آسیب دیدن دستگاه شما استفاده شوند. یک نسخه فیزیکی، مانند یک [صفحه فلزی seed](https://coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/) از این عبارت seed ایجاد کنید و آن را در مکانی امن نگهداری کنید. مهم است که این عبارت بازیابی seed را ایمن نگه دارید. هرگز آن را با کسی به اشتراک نگذارید.
reviewed: true
question: स्व-संरक्षण लेते समय, नुकसान के जोखिम को न्यूनतम करने के लिए आपको सबसे पहले क्या करना चाहिए?
answer: अपने Wallet पुनर्प्राप्ति seed वाक्यांश का बैकअप लें
wrong_answers:
  - अपनी निजी कुंजियाँ किसी विश्वसनीय पक्ष के साथ साझा करें
  - अपने पुनर्प्राप्ति seed वाक्यांश को नोट करें और इसे अपने कंप्यूटर पर संग्रहीत करें
  - दो-कारक प्रमाणीकरण (2FA) अक्षम करें
explanation: |
  सबसे पहले और सबसे महत्वपूर्ण बात, स्व-संरक्षण लेते समय अपने Wallet का बैकअप लें। हार्डवेयर वॉलेट में रिकवरी seed वाक्यांश होता है, शब्दों का एक सेट जिसका उपयोग आपके डिवाइस के खो जाने या क्षतिग्रस्त होने की स्थिति में आपकी निजी कुंजियों को पुनर्प्राप्त करने के लिए किया जा सकता है। इस seed वाक्यांश की एक भौतिक प्रतिलिपि बनाएँ, जैसे कि धातु [seed प्लेट](https://coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/), और इसे सुरक्षित स्थान पर संग्रहीत करें। इस रिकवरी seed वाक्यांश को सुरक्षित रखना महत्वपूर्ण है। इसे कभी भी किसी के साथ साझा न करें।
reviewed: true
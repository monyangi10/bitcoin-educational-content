question: सेल्फ-कस्टडी शुरू करते समय, नुकसान के खतरे को कम करने के लिए सबसे पहले आपको क्या करना चाहिए?  

**जवाब:** सबसे पहले अपने प्राइवेट की (private key) को सुरक्षित और गुप्त रखें! इसे कभी भी किसी के साथ शेयर न करें और न ही डिजिटल फॉर्म (जैसे स्क्रीनशॉट, ईमेल, क्लाउड) में सेव करें। इसे ऑफलाइन तरीके से (जैसे पेपर वॉलेट या हार्डवेयर वॉलेट) स्टोर करें।
answer: अपने Wallet रिकवरी वाक्यांश seed का बैकअप लें
wrong_answers:
  - अपने निजी कुंजियाँ किसी भरोसेमंद पार्टी के साथ साझा करें
  - अपनी रिकवरी seed फ्रेज़ नोट कर लो और उसे अपने कंप्यूटर पर सेव कर लो।
  - दो-चरणीय प्रमाणीकरण (2FA) बंद करें
explanation: |
  सबसे पहले, जब आप खुद अपने Wallet की ज़िम्मेदारी ले रहे हों तो उसका बैकअप ज़रूर बना लें।
  हार्डवेयर वॉलेट्स के साथ एक रिकवरी seed फ्रेज़ आता है, यानी शब्दों का एक सेट जो
  इसका इस्तेमाल आपके प्राइवेट कीज़ को रिकवर करने के लिए किया जा सकता है अगर आपका डिवाइस खो जाए या खराब हो जाए।
  Create a physical copy, such as a metal [seed plate](https: //coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/), of this seed phrase and

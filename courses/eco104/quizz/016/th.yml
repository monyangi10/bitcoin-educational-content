question: เมื่อทำการดูแลทรัพย์สินด้วยตนเอง สิ่งแรกที่คุณควรทำเพื่อลดความเสี่ยงของการสูญเสียคืออะไร?
answer: สำรองวลีการกู้คืน wallet ของคุณ seed
wrong_answers:
  - แบ่งปันคีย์ส่วนตัวของคุณกับบุคคลที่เชื่อถือได้
  - จดบันทึกวลีการกู้คืน seed ของคุณและเก็บไว้ในคอมพิวเตอร์ของคุณ
  - ปิดการยืนยันตัวตนสองขั้นตอน (2FA)
explanation: |
  ก่อนอื่นและสำคัญที่สุด ให้สำรองข้อมูล wallet ของคุณเมื่อทำการเก็บรักษาด้วยตนเอง
  กระเป๋าเงินฮาร์ดแวร์มาพร้อมกับวลีการกู้คืน seed ซึ่งเป็นชุดคำที่สามารถใช้กู้คืนคีย์ส่วนตัวของคุณในกรณีที่อุปกรณ์ของคุณสูญหายหรือเสียหาย
  สร้างสำเนาทางกายภาพ เช่น [แผ่นโลหะ seed](https: //coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/) ของวลี seed นี้และเก็บไว้ในที่ปลอดภัย สิ่งสำคัญคือต้องเก็บวลีการกู้คืน seed นี้ให้ปลอดภัย 
  ห้ามแชร์กับใครเด็ดขาด
reviewed: true
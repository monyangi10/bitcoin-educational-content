question: Wat is het eerste wat je moet doen om het risico op verlies te minimaliseren?
answer: Maak een back-up van je Wallet herstel seed zin
wrong_answers:
  - Deel uw privésleutels met een vertrouwde partij
  - Noteer je seed herstelzin en bewaar deze op je computer
  - Twee-factor authenticatie (2FA) uitschakelen
explanation: |
  Eerst en vooral, maak een back-up van je Wallet wanneer je zelf in bewaring neemt.
  Hardware wallets worden geleverd met een seed herstelzin, een set woorden die
  gebruikt kunnen worden om je private keys te herstellen in geval van verlies of beschadiging van je apparaat.
  Maak een fysieke kopie, zoals een metalen [seed-plaat](https://coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/), van deze seed-zin en bewaar deze op een veilige plaats
  bewaar het op een veilige plaats. Het is belangrijk om deze herstel seed zin veilig te bewaren.
  Deel het NOOIT met iemand.
reviewed: true
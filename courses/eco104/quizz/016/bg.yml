question: Какво е първото нещо, което трябва да направите, за да сведете до минимум риска от загуба, когато поемате грижа за себе си?
answer: Създаване на резервно копие на фразата wallet за възстановяване seed
wrong_answers:
  - Споделяне на частните ключове с доверена страна
  - Запишете фразата си за възстановяване seed и я запазете на компютъра си
  - Деактивиране на двуфакторното удостоверяване (2FA)
explanation: |
  На първо място, когато поемате отговорност за себе си, направете резервно копие на своя wallet.
  Хардуерните портфейли се доставят с фраза за възстановяване seed - набор от думи, които
  могат да се използват за възстановяване на частните ключове в случай на загуба или повреда на устройството.
  Създайте физическо копие, например метална [seed пластина](https: //coincodex.com/article/23147/best-metal-crypto-wallets-for-seed-phrase-storage/), на тази seed фраза и
  съхранявайте я на сигурно място. Важно е тази фраза за възстановяване seed да се съхранява на сигурно място.
  НИКОГА не я споделяйте с никого.
reviewed: true
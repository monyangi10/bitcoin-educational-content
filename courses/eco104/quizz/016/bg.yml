question: Какво е първото нещо, което трябва да направите, за да сведете до минимум риска от загуба, когато поемате грижа за себе си?
answer: Създаване на резервно копие на сийд фразата за възстановяване
wrong_answers:
  - Споделяне на частните ключове с доверена страна
  - Запишете фразата си за възстановяване и я запазете на компютъра си
  - Деактивиране на двуфакторното удостоверяване (2FA)
explanation: |
  На първо място, когато поемате отговорност за себе си, направете резервно копие на своя портфейл.
  Хардуерните портфейли се доставят с фраза за възстановяване - набор от думи, които
  могат да се използват за възстановяване на частните ключове в случай на загуба или повреда на устройството.
  Създайте физическо копие, например метална пластина, на тази фраза и
  съхранявайте я на сигурно място. Важно е тази фраза за възстановяване да се съхранява на сигурно място.
  НИКОГА не я споделяйте с никого.
reviewed: true

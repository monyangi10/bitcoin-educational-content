question: Каква е ролята на частните ключове в транзакциите Bitcoin?
answer: Те се използват за подписване и оторизиране на трансакции.
wrong_answers:
  - Те се използват за проверка на автентичността на трансакциите.
  - Те се използват за криптиране на данните за трансакциите.
  - Те се споделят публично с цел прозрачност.
explanation: |
  Частните ключове са основен компонент на транзакциите Bitcoin.
  Те се използват за подписване и оторизиране на транзакции, като осигуряват доказателство
  собственост и гарантират, че само собственикът може да харчи своите биткойни.
reviewed: true
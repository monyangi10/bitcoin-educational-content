question: Bitcoin 트랜잭션에서 개인 키의 역할은 무엇인가요?
answer: 거래에 서명하고 승인하는 데 사용됩니다.
wrong_answers:
  - 거래의 진위 여부를 확인하는 데 사용됩니다.
  - 거래 데이터를 암호화하는 데 사용됩니다.
  - 투명성을 위해 공개적으로 공유됩니다.
explanation: |
  개인 키는 Bitcoin 트랜잭션의 필수 구성 요소입니다.
  개인 키는 거래에 서명하고 승인하는 데 사용되며, Ownership의 증거를 제공하고
  증거를 제공하고 소유자만 Bitcoin를 사용할 수 있도록 하는 데 사용됩니다.
reviewed: true
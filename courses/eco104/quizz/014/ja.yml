question: ビットコイントランザクションにおける秘密鍵の役割は何ですか？
answer: トランザクションの署名と認証に使用されます。
wrong_answers:
  - トランザクションの真正性を検証するために使用されます。
  - トランザクションデータを暗号化するために使用されます。
  - 透明性のために公開されて共有されます。
explanation: |
  秘密鍵はビットコイントランザクションの不可欠な要素です。
  これらはトランザクションの署名と認証に使用され、所有権の証明を提供し、
  所有者のみが自分のビットコインを使えるようにします。
reviewed: true

question: บทบาทของกุญแจส่วนตัวในธุรกรรม Bitcoin คืออะไร?
answer: พวกเขาถูกใช้เพื่อเซ็นและอนุมัติธุรกรรม
wrong_answers:
  - พวกเขาถูกใช้เพื่อยืนยันความถูกต้องของธุรกรรม
  - พวกเขาถูกใช้ในการเข้ารหัสข้อมูลการทำธุรกรรม
  - พวกเขาถูกแชร์ต่อสาธารณะเพื่อความโปร่งใส
explanation: |
  คีย์ส่วนตัวเป็นส่วนประกอบที่สำคัญของธุรกรรม Bitcoin
  ใช้ในการลงนามและอนุมัติธุรกรรม โดยให้หลักฐาน
  การเป็นเจ้าของและรับรองว่าเฉพาะเจ้าของเท่านั้นที่สามารถใช้จ่ายบิตคอยน์ของตนได้
reviewed: true
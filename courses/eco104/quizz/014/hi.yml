question: Bitcoin लेनदेन में प्राइवेट कीज़ की क्या भूमिका है?
answer: वे लेन-देन पर हस्ताक्षर करने और उन्हें अधिकृत करने के लिए इस्तेमाल किए जाते हैं।
wrong_answers:
  - वे लेन-देन की असली होने की पुष्टि करने के लिए इस्तेमाल किए जाते हैं।
  - वे लेन-देन के डेटा को एन्क्रिप्ट करने के लिए इस्तेमाल होते हैं।
  - वे पारदर्शिता के लिए सार्वजनिक रूप से साझा किए जाते हैं।
explanation: |
  प्राइवेट कीज़ Bitcoin लेन-देन का एक जरूरी हिस्सा हैं।
  वे लेन-देन पर हस्ताक्षर करने और उन्हें अधिकृत करने के लिए इस्तेमाल किए जाते हैं, जो सबूत प्रदान करते हैं
  जीडब्ल्यू-2 की और यह सुनिश्चित करना कि केवल मालिक ही अपने जीडब्ल्यू-3 खर्च कर सकता है।
reviewed: true
question: Какъв процент от общия обем на транзакциите в Bitcoin е използван за незаконна дейност?
answer: По-малко от 1%
wrong_answers:
  - 2-4%
  - Повече от 5%
  - Не е известно
explanation: |
  Според доклад на Chainalysis през 2020 г. незаконната дейност само
  съставлява около 0,34% от всички транзакции по Bitcoin.
reviewed: true
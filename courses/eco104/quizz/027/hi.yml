question: Bitcoin के कुल लेन-देन की मात्रा का कितना प्रतिशत अवैध गतिविधियों के लिए इस्तेमाल किया गया है?
answer: 1% से कम
wrong_answers:
  - २-४%
  - 5% से ज़्यादा
  - यह अज्ञात है
explanation: |
  Chainalysis की 2020 की एक रिपोर्ट के मुताबिक, अवैध गतिविधियाँ सिर्फ़
  जीडब्ल्यू-1 के सभी लेन-देन का लगभग 0.34% हिस्सा है।
reviewed: true
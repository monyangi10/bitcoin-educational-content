question: มีการใช้กี่เปอร์เซ็นต์ของปริมาณธุรกรรมทั้งหมดของ Bitcoin สำหรับกิจกรรมที่ผิดกฎหมาย?
answer: น้อยกว่า 1%
wrong_answers:
  - 2-4%
  - มากกว่า 5%
  - ไม่ทราบ
explanation: |
  ตามรายงานของ Chainalysis ในปี 2020 กิจกรรมที่ผิดกฎหมายคิดเป็นเพียงประมาณ 0.34% ของธุรกรรม Bitcoin ทั้งหมด
reviewed: true
question: स्टेबलकॉइन, जैसे कि USDt, अपनी वैल्यू को रिलेटिवली स्टेबल कैसे बनाए रखते हैं?
answer: वे एक स्थिर संपत्ति या मुद्रा से जुड़े हुए हैं।
wrong_answers:
  - वे किसी केंद्रीय प्राधिकरण या सरकार द्वारा समर्थित हैं।
  - वे सुरक्षित लेन-देन के लिए Blockchain टेक्नोलॉजी पर भरोसा करते हैं।
  - वे दूसरी क्रिप्टोकरेंसी की तरह उतार-चढ़ाव के शिकार होते हैं।
explanation: |
  स्टेबलकॉइन्स अपनी वैल्यू को स्थिर रखने के लिए किसी चीज़ से जुड़े (पेग्ड) होते हैं।
  एक और स्थिर संपत्ति या मुद्रा में, जैसे कि अमेरिकी डॉलर या सोना।
  यह पेगिंग दूसरे मुद्राओं के साथ जुड़ी उतार-चढ़ाव को कम करने में मदद करती है।
  डिजिटल एसेट्स जैसे Bitcoin.
reviewed: true
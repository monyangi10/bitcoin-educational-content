question: USDt와 같은 스테이블코인은 어떻게 상대적인 가치 안정성을 확보할 수 있을까요?
answer: 안정적인 자산이나 통화에 고정되어 있습니다.
wrong_answers:
  - 중앙 기관이나 정부의 지원을 받습니다.
  - 이들은 안전한 거래를 위해 Blockchain 기술을 사용합니다.
  - 다른 암호화폐와 마찬가지로 변동이 있을 수 있습니다.
explanation: |
  스테이블코인은 달러나 금과 같은 더 안정적인 자산이나 통화에 연동되어
  미국 달러나 금과 같은 보다 안정적인 자산이나 통화에 고정되어 상대적인 안정성을 유지합니다.
  이러한 페깅은 종종 다른 디지털 자산과 관련된 변동성을 완화하는 데 도움이 됩니다
  변동성을 완화하는 데 도움이 됩니다.
reviewed: true
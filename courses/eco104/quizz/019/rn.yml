question: Ni gute amafaranga adahinduka, nka USDt, ashika ku gushikama mu gaciro?
answer: Bishirwa ku mutungo canke amahera ahamye.
wrong_answers:
  - Bishigikirwa n’ubutegetsi buhambaye canke intwaro.
  - Bizigira ubuhinga bwa Blockchain kugira ngo bashobore gukorana n’abandi ata nkomanzi.
  - Bishobora guhinduka nk’uko bigenda ku bindi bice vy’amahera vy’amahera.
explanation: |
  Ibiceri bigumye biguma bishikamye mu gaciro mu gushirwako 
  ku mutungo canke amahera ahagaze neza kuruta, nk’idolari ry’Amerika canke inzahabu.
  Ivyo bifasha kugabanya ukuntu ibintu bihinduka kenshi bifitaniye isano n’ibindi . 
  ivy’ubuhinga bwa none nka Bitcoin.
reviewed: true
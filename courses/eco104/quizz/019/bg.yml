question: Как стабилните монети, като USDt, постигат относителна стабилност на стойността?
answer: Те са обвързани със стабилен актив или валута.
wrong_answers:
  - Те са подкрепени от централен орган или правителство.
  - Те разчитат на блокчейн технологията за сигурни трансакции.
  - Те са обект на колебания, подобно на други криптовалути.
explanation: |
  Стабилните монети поддържат относителна стабилност на стойността си, като са обвързани
  към по-стабилен актив или валута, като например щатския долар или златото.
  Това обвързване помага да се смекчи нестабилността, която често се свързва с други
  цифрови активи като Bitcoin.
reviewed: true
question: Stablecoins เช่น USDt รักษาเสถียรภาพของมูลค่าได้อย่างไร?
answer: พวกเขาถูกตรึงกับสินทรัพย์หรือสกุลเงินที่มีเสถียรภาพ
wrong_answers:
  - พวกเขาได้รับการสนับสนุนจากหน่วยงานกลางหรือรัฐบาล
  - พวกเขาพึ่งพาเทคโนโลยีบล็อกเชนสำหรับการทำธุรกรรมที่ปลอดภัย
  - พวกเขามีความผันผวนคล้ายกับสกุลเงินดิจิทัลอื่น ๆ
explanation: |
  Stablecoins รักษาความเสถียรของมูลค่าโดยการผูกกับสินทรัพย์หรือสกุลเงินที่มีเสถียรภาพมากกว่า เช่น ดอลลาร์สหรัฐหรือทองคำ การผูกนี้ช่วยลดความผันผวนที่มักเกี่ยวข้องกับสินทรัพย์ดิจิทัลอื่น ๆ เช่น Bitcoin.
reviewed: true
question: Bitcoin के नेटवर्क में पारंपरिक वित्तीय प्रणालियों पर क्या फायदा है?
answer: विकेंद्रीकरण और सुरक्षा
wrong_answers:
  - महंगाई दरों में बढ़ोतरी
  - बिचौलियों पर निर्भरता
  - लेन-देन पर केंद्रीकृत नियंत्रण
explanation: |
  Bitcoin का विकेंद्रीकृत नेटवर्क एक सुरक्षित और कुशल तरीका प्रदान करता है
  बीच में किसी बिचौलिए या तीसरे पक्ष की जरूरत के बिना लेन-देन करें। यह
  सेंसरशिप और लेन-देन में अनधिकृत बदलाव का खतरा कम करता है,
  और साथ ही प्राइवेसी भी बढ़ाता है।
reviewed: true
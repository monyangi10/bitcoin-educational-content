question: Какво предимство предлага мрежата на Bitcoin пред традиционните финансови системи?
answer: Децентрализация и сигурност
wrong_answers:
  - Повишени нива на инфлация
  - Зависимост от посредници
  - Централизиран контрол върху транзакциите
explanation: |
  Децентрализираната мрежа на Bitcoin осигурява сигурен и ефективен начин за
  транзакции без нужда от посредници или трети страни. Тази
  намалява риска от цензура и неоторизирани промени в транзакциите,
  както и увеличава неприкосновеността на личния живот.
reviewed: true
question: क्या कोई भी Bitcoin कोड को कॉपी कर सकता है?
answer: हाँ, लेकिन तुम Bitcoin नेटवर्क का वैल्यू कॉपी नहीं कर सकते।
wrong_answers:
  - हाँ और तुम Bitcoin नेटवर्क का वैल्यू भी कॉपी करोगे
  - नहीं और आप Bitcoin नेटवर्क का मान कॉपी कर सकते हैं
  - नहीं, क्योंकि Bitcoin कोड क्लोज्ड-सोर्स है
explanation: |
  जबकि Bitcoin का कोड ओपन सोर्स है और इसे कॉपी किया जा सकता है,
  Bitcoin की वैल्यू इसके कोड से नहीं मिलती। यह मिलती है
  इसका उपयोगकर्ताओं का नेटवर्क और समय के साथ बना विश्वास व अपनापन।
reviewed: true
question: Може ли някой да дублира кода Bitcoin?
answer: Да, но не можете да копирате стойността на мрежата Bitcoin
wrong_answers:
  - Да, и ще копирате и стойността на мрежата Bitcoin
  - Не, но можете да копирате стойността на мрежата Bitcoin
  - Не, защото кодът на Bitcoin е със затворен код
explanation: |
  Въпреки че кодът на Bitcoin е с отворен код и може да бъде копиран,
  стойността на Bitcoin не произтича от неговия код. Тя се дължи на
  неговата мрежа от потребители и доверието и приемането, които е изградил с течение на времето.
reviewed: true
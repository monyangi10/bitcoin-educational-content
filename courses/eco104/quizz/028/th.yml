question: มีใครสามารถทำซ้ำโค้ด Bitcoin ได้ไหม?
answer: ใช่ แต่คุณไม่สามารถคัดลอกค่าของเครือข่าย Bitcoin ได้
wrong_answers:
  - ใช่ และคุณจะคัดลอกค่าของเครือข่าย Bitcoin ด้วย
  - ไม่ และคุณสามารถคัดลอกค่าของเครือข่าย Bitcoin ได้
  - ไม่, เพราะว่าโค้ด Bitcoin เป็นโอเพ่นซอร์ส
explanation: |
  ในขณะที่โค้ดของ Bitcoin เป็นโอเพ่นซอร์สและสามารถคัดลอกได้ 
  แต่คุณค่าของ Bitcoin ไม่ได้มาจากโค้ดของมัน มันมาจาก 
  เครือข่ายของผู้ใช้และความไว้วางใจและการยอมรับที่ได้สร้างขึ้นมาตลอดเวลา
reviewed: true
question: Кои са основните видове стабилни монети, споменати в текста?
answer: Стабилни монети, обезпечени с фиат, стоки и алгоритмични стабилни монети.
wrong_answers:
  - Цифрови и физически стабилни монети
  - Централизирани и децентрализирани стабилни монети
  - Стабилни монети, обезпечени от банки, и стабилни монети, обезпечени от физически лица
explanation: |
  В предишните глави разгледахме три основни вида стабилни монети;
  стабилни монети, обезпечени с фиат, които са обезпечени с традиционни валути
  като щатския долар; стоково обезпечени стабилни монети, които са обезпечени от
  стоки като злато или петрол; и алгоритмични стабилни монети, които разчитат на
  на набор от правила или алгоритми, за да поддържат стойността си. Въпреки това,
  отбелязва, че успешните алгоритмични стабилни монети все още не са се появили на пазара.
reviewed: true
question: Кои са основните видове стейбълкойни, споменати в текста?
answer: стейбълкойни, обезпечени с фиат, стоки и алгоритмични.
wrong_answers:
  - Цифрови и физически
  - Централизирани и децентрализирани
  - обезпечени от банки и от физически лица
explanation: |
  В предишните глави разгледахме три основни вида стейбълкойни;
  обезпечени с фиатни валути, които са обезпечени с традиционни валути
  като щатския долар; стоково обезпечени, които са обезпечени от
  стоки като злато или петрол; и алгоритмични, които разчитат на
  на набор от правила или алгоритми, за да поддържат стойността си. Въпреки това,
  успешните алгоритмични стейбълкойни все още не са се появили на пазара.
reviewed: true

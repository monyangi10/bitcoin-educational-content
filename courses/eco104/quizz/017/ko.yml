question: 본문에서 언급된 스테이블코인의 주요 유형은 무엇인가요?
answer: 법정화폐 기반, 상품 기반, 알고리즘 기반 스테이블코인.
wrong_answers:
  - 디지털 및 실물 스테이블 코인
  - 중앙화 및 탈중앙화 스테이블코인
  - 은행이 지원하는 스테이블코인과 개인이 지원하는 스테이블코인
explanation: |
  이전 장에서 우리는 세 가지 주요 유형의 스테이블코인을 살펴보았습니다;
  미국 달러와 같은 전통적인 통화로 뒷받침되는 법정화폐 기반 스테이블코인
  미국 달러와 같은 전통적인 통화로 뒷받침되는 명목 화폐 기반 스테이블코인; 금이나 석유와 같은 상품으로 뒷받침되는
  금이나 석유와 같은 상품; 그리고 일련의 규칙이나 알고리즘에 의존하는
  일련의 규칙이나 알고리즘에 의존하는 알고리즘 기반 스테이블코인. 하지만
  성공적인 알고리즘 스테이블코인은 아직 시장에 출시되지 않았다고 지적합니다.
reviewed: true
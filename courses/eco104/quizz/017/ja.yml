question: コースで言及されている主な種類のステーブルコインは何ですか？
answer: 法定通貨担保、商品担保、およびアルゴリズム型ステーブルコイン。
wrong_answers:
  - デジタルおよび物理的ステーブルコイン
  - 中央集権型および分散型ステーブルコイン
  - 銀行によって担保されたステーブルコインと個人によって担保されたステーブルコイン
explanation: |
  前章では、3つの主な種類のステーブルコインを見てきました。法定通貨担保型ステーブルコインは、米ドルのような伝統的な通貨によって担保されています。商品（コモディティ）担保型ステーブルコインは、金や石油のような商品によって担保されています。そして、アルゴリズム型ステーブルコインは、その価値を維持するために一連のルールやアルゴリズムに依存しています。ただし、成功したアルゴリズム型ステーブルコインが市場に出るには至っていないことに注意してください。
reviewed: true

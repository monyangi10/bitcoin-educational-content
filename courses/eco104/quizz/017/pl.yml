question: Jakie są główne rodzaje stablecoinów wspomniane w tekście?
answer: Stablecoiny fiat, towarowe i algorytmiczne.
wrong_answers:
  - Cyfrowe i fizyczne stablecoiny
  - Scentralizowane i zdecentralizowane stablecoiny
  - Stablecoiny wspierane przez banki i stablecoiny wspierane przez osoby fizyczne
explanation: |
  W poprzednich rozdziałach widzieliśmy trzy główne rodzaje stablecoinów;
  stablecoiny oparte na walutach fiducjarnych, które są zabezpieczone tradycyjnymi walutami
  jak dolar amerykański; stablecoiny oparte na towarach, które są wspierane przez
  towarami, takimi jak złoto lub ropa naftowa; oraz stablecoiny algorytmiczne, które opierają się na
  na zestawie reguł lub algorytmów w celu utrzymania ich wartości. Jednakże,
  zauważa jednak, że skuteczne algorytmiczne stablecoiny nie trafiły jeszcze na rynek.
reviewed: true
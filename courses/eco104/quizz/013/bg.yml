question: По какъв начин Bitcoin е от полза за хората в разкъсвани от войни или нестабилни държави?
answer: позволява съхранение на стойност по децентрализиран и сигурен начин, който е по-устойчив на кражби
wrong_answers:
  - Позволява достъп до традиционни банкови услуги
  - Предоставя физически актив, който може да увеличи стойността си
  - осигурява защита срещу дефлация
explanation: |
  В разкъсвани от война или нестабилни страни хората могат да се затруднят в
  достъпа си до традиционните банкови услуги или да се изправят пред риска от кражба или
  конфискация на материални активи. Bitcoin позволява на хората да съхраняват стойност
  по децентрализиран и сигурен начин, без да са необходими посредници
  или физически активи, уязвими от рискове като инфлация, кражба или конфискация.
reviewed: true

question: Bitcoin은 전쟁으로 폐허가 되거나 불안정한 국가에 있는 개인에게 어떤 혜택을 제공하나요?
answer: 탈중앙화되고 안전한 방식으로 가치를 저장하여 도난에 대한 저항력을 높일 수 있습니다
wrong_answers:
  - 기존 은행 서비스를 이용할 수 있습니다
  - 가치를 높일 수 있는 물리적 자산을 제공합니다
  - 디플레이션에 대한 보호 기능 제공
explanation: |
  전쟁으로 폐허가 되거나 불안정한 국가에서는 개인이 다음과 같은 어려움을 겪을 수 있습니다
  전통적인 은행 서비스를 이용하거나 도난의 위험에 직면하거나
  물리적 자산의 몰수 위험에 직면할 수 있습니다. Bitcoin을 사용하면 개인이 중개자 없이도
  중개자 없이도 탈중앙화되고 안전한 방식으로 가치를 저장할 수 있습니다
  또는 인플레이션, 도난, 몰수 등의 위험에 취약한 물리적 자산 없이도 분산되고 안전한 방식으로 가치를 저장할 수 있습니다.
reviewed: true
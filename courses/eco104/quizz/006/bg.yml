question: Защо днес е много по-трудно да се купи жилище, отколкото през 80-те години на миналия век?
answer: Понижените лихвени проценти правят дълга по-примамлив, а инфлацията
wrong_answers:
  - Инфлация и наемни нива
  - Нарастващите разходи за живот и ръстът на населението
  - Липсата на имоти и потиснатите лихвени проценти правят дълга по-примамлив
explanation: |
  Докато инфлацията обезценява покупателната способност на валутата ни и я прави

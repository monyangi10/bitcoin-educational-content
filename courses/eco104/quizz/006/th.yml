question: ทำไมการซื้อบ้านในปัจจุบันถึงยากกว่าช่วงปี 1980?
answer: อัตราดอกเบี้ยที่ถูกกดดันทำให้หนี้น่าสนใจมากขึ้นและเงินเฟ้อ
wrong_answers:
  - อัตราเงินเฟ้อและอัตราค่าเช่า
  - ค่าครองชีพที่เพิ่มสูงขึ้นและการเติบโตของประชากร
  - การขาดแคลนอสังหาริมทรัพย์และอัตราดอกเบี้ยที่ถูกกดดันทำให้หนี้สินน่าสนใจมากขึ้น
explanation: |
  ในขณะที่เงินเฟ้อกำลังลดค่ากำลังซื้อของสกุลเงินของเรา ทำให้การออมยากขึ้น อัตราดอกเบี้ยที่ถูกกดดันทำให้การบริโภคหนี้น่าสนใจยิ่งขึ้น เมื่อค่าใช้จ่ายของเงินทุนถูกมาก ผู้คนกู้ยืมเกินความสามารถของตน นำเงินทุนเข้าสู่สินทรัพย์มากขึ้น และทำให้ราคาสูงขึ้น
reviewed: true
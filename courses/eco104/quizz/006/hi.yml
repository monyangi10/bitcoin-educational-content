question: आज घर खरीदना 1980s के मुकाबले इतना मुश्किल क्यों है?
answer: दबाए हुए ब्याज दरें कर्ज़ को और आकर्षक बना देती हैं और मुद्रास्फीति
wrong_answers:
  - महँगाई और किराया दरें
  - जीवनयापन की बढ़ती लागत और जनसंख्या वृद्धि
  - प्रॉपर्टी की कमी और दबे हुए ब्याज दरों की वजह से कर्ज़ ज़्यादा आकर्षक लग रहा है।
explanation: |
  जब मुद्रास्फीति हमारी मुद्रा की क्रय शक्ति को कम कर रही है, तो यह
  सेविंग करना मुश्किल हो रहा है, दबे हुए ब्याज़ दर कर्ज़े की खपत बढ़ा रहे हैं
  ज़्यादा आकर्षक। जब पूंजी की लागत इतनी सस्ती होती है, तो लोग ज़रूरत से ज़्यादा उधार ले लेते हैं।
  उनके पास जो भी पैसा है, वो संपत्तियों में डाल रहे हैं, जिससे कीमतें बढ़ रही हैं।
reviewed: true
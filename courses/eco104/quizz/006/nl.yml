question: Waarom is het tegenwoordig veel moeilijker om een huis te kopen dan in de jaren 1980?
answer: Onderdrukte rentetarieven maken schulden aanlokkelijker en inflatie
wrong_answers:
  - Inflatie en huurprijzen
  - De stijgende kosten van levensonderhoud en bevolkingsgroei
  - Gebrek aan eigendommen en onderdrukte rentetarieven maken schulden aantrekkelijker
explanation: |
  Terwijl de inflatie de koopkracht van onze munt devalueert, waardoor het
  moeilijker wordt om te sparen, maken onderdrukte rentetarieven schuldconsumptie
  aantrekkelijker. Als de kosten van kapitaal zo laag zijn, lenen mensen meer dan ze kunnen betalen
  waardoor ze meer kapitaal in activa steken en de prijzen opdrijven.
reviewed: true
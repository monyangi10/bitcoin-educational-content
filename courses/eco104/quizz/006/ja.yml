question: なぜ今日、1980年代に比べて家を購入することが遥かに難しいのでしょうか？
answer: 金利が抑制されると、借入がより魅力的になり、インフレを招きやすくなるため
wrong_answers:
  - インフレと家賃相場のため
  - 生活費の高騰と人口増加のため
  - 物件不足と抑制された金利が、借入を魅力的にするため
explanation: |
  インフレーションが私たちの通貨の購買力を減少させ、貯蓄を難しくしている一方で、
  抑制された金利が借金の消費をより魅力的にしています。
  資本コストが非常に安いとき、人々は自分の手段を超えて借り入れ、
  より多くの資本を資産に流入させ、価格を押し上げます。
reviewed: true

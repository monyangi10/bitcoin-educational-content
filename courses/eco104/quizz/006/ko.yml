question: 1980년대보다 오늘날 주택 구입이 훨씬 더 어려운 이유는 무엇인가요?
answer: 억제된 이자율은 부채를 더욱 유혹하고 인플레이션을 유발합니다
wrong_answers:
  - 인플레이션 및 임대료
  - 생활비 상승과 인구 증가
  - 부동산 부족과 억제된 이자율로 인해 부채에 대한 유혹이 커지고 있습니다
explanation: |
  인플레이션은 통화의 구매력을 떨어뜨려 저축을 어렵게 만들고 있지만
  저축을 어렵게 만드는 반면, 저금리로 인해 부채 소비는
  더욱 유혹적입니다. 자본 비용이 너무 저렴하면 사람들은 자신의 능력을 넘어서는
  더 많은 자본을 자산에 투자하고 물가를 상승시킵니다.
reviewed: true
question: एक स्थिर मुद्रा (stablecoin) अपने निर्धारित मूल्य से ऊपर किस परिस्थिति में कारोबार हो सकती है?
answer: जब स्टेबलकॉइन की मांग Exchange की क्षमता से अधिक हो जाती है
wrong_answers:
  - जब स्टेबलकॉइन जारीकर्ता फंड फ्रीज कर देता है
  - जब स्टेबलकॉइन पूरी तरह से नकद भंडार द्वारा समर्थित होता है
  - जब यूजर्स की तरफ से जोरदार सेलिंग प्रेशर होता है
explanation: |
  स्टेबलकॉइन अपने निर्धारित मूल्य से ऊपर कारोबार कर सकते हैं जब
  स्टेबलकॉइन की मांग Exchange की क्षमता से ज़्यादा हो गई है
  ग्राहकों की मांगों को पूरा करना, आमतौर पर छोटे एक्सचेंजों पर।
reviewed: true
question: ステーブルコインがそのペッグ価格よりも高く取引されるシナリオはどのような場合ですか？
answer: ステーブルコインへの需要が取引所の容量を超えた場合
wrong_answers:
  - ステーブルコインの発行者が資金を凍結した場合
  - ステーブルコインが現金準備金で完全に裏付けられている場合
  - ユーザーからの強い売り圧力がある場合
explanation: |
  ステーブルコインがそのペッグ価格よりも高く取引されるのは、
  ステーブルコインへの需要が顧客の要求を満たす取引所の能力を超えた場合です。
  これは典型的には小規模な取引所で発生します。
reviewed: true

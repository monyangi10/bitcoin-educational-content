question: При какъв сценарий стабилните монети могат да се търгуват над фиксираната си цена?
answer: Когато търсенето на стабилни монети надхвърли капацитета на даден обмен
wrong_answers:
  - Когато емитентът на стабилни монети замразява средства
  - Когато стабилните монети са напълно обезпечени с парични резерви
  - Когато има силен натиск от страна на потребителите за продажба
explanation: |
  Стабилните монети могат да се търгуват над фиксираната си цена, когато
  търсенето на стабилни монети превишава капацитета на борсата да
  обикновено на по-малки борси.
reviewed: true
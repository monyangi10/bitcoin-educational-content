question: При какъв сценарий стейбълкойните могат да се търгуват над фиксираната си цена?
answer: Когато търсенето на стейбълкойни надхвърли капацитета на даден обмен
wrong_answers:
  - Когато емитентът на стейбълкойни замразява средства
  - Когато стейбълкойните са напълно обезпечени с парични резерви
  - Когато има силен натиск от страна на потребителите за продажба
explanation: |
  стейбълкойните могат да се търгуват над фиксираната си цена, когато
  търсенето на превишава капацитета на борсата,
  обикновено на по-малки борси.
reviewed: true

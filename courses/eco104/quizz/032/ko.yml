question: 어떤 시나리오에서 스테이블코인이 고정 가격 이상으로 거래될 수 있을까요?
answer: 스테이블코인에 대한 수요가 Exchange의 용량을 초과하는 경우
wrong_answers:
  - 스테이블코인 발행자가 자금을 동결하는 경우
  - 스테이블코인이 현금 보유량으로 완전히 뒷받침되는 경우
  - 사용자로부터 강력한 판매 압력이 있는 경우
explanation: |
  스테이블코인은 고정된 가격 이상으로 거래될 수 있습니다
  스테이블 코인에 대한 수요가 Exchange의 수용 능력을 초과할 때
  일반적으로 소규모 거래소에서 고객 수요를 충족할 수 있습니다.
reviewed: true
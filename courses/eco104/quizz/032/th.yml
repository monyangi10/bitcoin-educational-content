question: ในสถานการณ์ใดที่สเตเบิลคอยน์อาจซื้อขายสูงกว่าราคาที่ตรึงไว้?
answer: เมื่อความต้องการสำหรับ stablecoins เกินความสามารถของการแลกเปลี่ยน
wrong_answers:
  - เมื่อผู้ออกเหรียญ Stablecoin ระงับเงินทุน
  - เมื่อสเตเบิลคอยน์ได้รับการสนับสนุนอย่างเต็มที่ด้วยเงินสดสำรอง
  - เมื่อมีแรงขายที่รุนแรงจากผู้ใช้
explanation: |
  Stablecoins สามารถซื้อขายสูงกว่าราคาที่ตรึงไว้เมื่อความต้องการ stablecoins เกินความสามารถของการแลกเปลี่ยนในการตอบสนองความต้องการของลูกค้า ซึ่งมักเกิดขึ้นในตลาดแลกเปลี่ยนขนาดเล็กกว่า
reviewed: true
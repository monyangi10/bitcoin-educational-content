question: Коя е причината, поради която фиатната валута води до централизиран контрол?
answer: Тя позволява на правителствата да контролират паричното предлагане и лихвените проценти.
wrong_answers:
  - Тя е обезпечена с физически стоки като злато и сребро.
  - Той е устойчив на инфлация.
  - Тя насърчава децентрализираните финансови системи.
explanation: |
  Фиатната валута дава на правителствата възможност да контролират паричното предлагане и
  лихвените проценти, което им позволява да влияят на икономическата активност и в резултат на това
  централизиран контрол.
reviewed: true
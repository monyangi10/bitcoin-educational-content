question: เหตุผลหนึ่งที่สกุลเงินเฟียตนำไปสู่การควบคุมแบบรวมศูนย์คือการที่รัฐบาลหรือธนาคารกลางมีอำนาจในการกำหนดและควบคุมปริมาณเงินในระบบเศรษฐกิจ
answer: มันช่วยให้รัฐบาลสามารถควบคุมปริมาณเงินและอัตราดอกเบี้ยได้
wrong_answers:
  - มันได้รับการสนับสนุนโดยสินค้าโภคภัณฑ์ทางกายภาพเช่นทองคำและเงิน
  - มันต้านทานต่อเงินเฟ้อ
  - มันส่งเสริมระบบการเงินแบบกระจายอำนาจ
explanation: |
  สกุลเงินเฟียตให้รัฐบาลมีอำนาจในการควบคุมปริมาณเงินและอัตราดอกเบี้ย ทำให้พวกเขาสามารถมีอิทธิพลต่อกิจกรรมทางเศรษฐกิจและส่งผลให้เกิดการควบคุมแบบรวมศูนย์
reviewed: true
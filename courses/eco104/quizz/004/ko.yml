question: 법정화폐가 중앙 집중식 통제로 이어지는 이유 중 하나는 무엇인가요?
answer: 이를 통해 정부는 Supply 화폐와 이자율을 통제할 수 있습니다.
wrong_answers:
  - 금과 은과 같은 실물 상품으로 뒷받침됩니다.
  - 인플레이션에 강합니다.
  - 탈중앙화 금융 시스템을 장려합니다.
explanation: |
  법정 화폐는 정부가 화폐를 통제할 수 있는 권한을 부여합니다
  금리를 통제할 수 있는 권한을 부여하여 경제 활동에 영향을 미치고 결과적으로
  중앙 집중식 통제를 가능하게 합니다.
reviewed: true
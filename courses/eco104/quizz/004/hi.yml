question: एक कारण यह है कि फिएट करेंसी से केंद्रीकृत नियंत्रण क्यों होता है?
answer: यह सरकारों को पैसे Supply और ब्याज दरों पर नियंत्रण करने की अनुमति देता है।
wrong_answers:
  - यह सोने और चांदी जैसी भौतिक वस्तुओं द्वारा समर्थित है।
  - यह महँगाई के खिलाफ मजबूत है।
  - यह विकेंद्रित वित्तीय प्रणालियों को प्रोत्साहित करता है।
explanation: |
  फिएट करेंसी सरकारों को पैसे Supply को कंट्रोल करने की ताक़त देती है और
  ब्याज दरें, जिससे वे आर्थिक गतिविधि को प्रभावित कर सकते हैं और इसका परिणाम होता है
  केंद्रीकृत नियंत्रण में।
reviewed: true
question: Кое от следните неща НЕ е една от трите основни функции на парите?
answer: Източник на енергия
wrong_answers:
  - Съхранение на стойност
  - Средство за размяна
  - Счетоводна единица
explanation: |
  Трите основни функции на парите са съхранение на стойност, средство за размяна,
  и разчетна единица. Източникът на енергия не е функция на парите.
reviewed: true

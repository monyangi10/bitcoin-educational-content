question: ข้อใดต่อไปนี้ไม่ใช่หนึ่งในสามหน้าที่สำคัญของเงิน?
answer: แหล่งพลังงาน
wrong_answers:
  - ร้านค้าแห่งมูลค่า
  - สื่อของ Exchange
  - หน่วยของบัญชี
explanation: |
  ฟังก์ชันที่สำคัญสามประการของเงินคือ การเก็บรักษามูลค่า, สื่อกลางในการแลกเปลี่ยน, 
  และหน่วยวัดมูลค่า. แหล่งพลังงานไม่ใช่ฟังก์ชันของเงิน.
reviewed: true
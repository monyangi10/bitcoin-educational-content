question: Wat is een reden waarom het belangrijk is om grondig onderzoek te doen voordat je een stablecoin vertrouwt?
answer: Sommige stablecoins missen transparantie en zorgvuldigheid
wrong_answers:
  - Aan stablecoins zijn geen risico's verbonden
  - Stablecoins zijn altijd volledig gedekt door reserves
  - Sommige stablecoins worden gereguleerd door de overheid
explanation: |
  Niet alle stablecoins bieden dezelfde mate van transparantie.
  Daarom is het belangrijk om grondig onderzoek te doen
  voordat je aanzienlijke rijkdom toevertrouwt aan een bepaalde stablecoin.
reviewed: true
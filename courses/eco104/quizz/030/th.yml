question: เหตุผลหนึ่งที่สำคัญว่าทำไมการทำวิจัยอย่างละเอียดก่อนที่จะไว้วางใจใน stablecoin คืออะไร?
answer: Stablecoin บางสกุลขาดความโปร่งใสและความรอบคอบ
wrong_answers:
  - Stablecoins ไม่มีความเสี่ยงที่เกี่ยวข้อง
  - Stablecoins ได้รับการสนับสนุนอย่างเต็มที่ด้วยทุนสำรองเสมอ
  - Stablecoin บางสกุลได้รับการควบคุมโดยรัฐบาล
explanation: |
  ไม่ใช่ทุก stablecoin ที่มีระดับความโปร่งใสเท่ากัน 
  ดังนั้นจึงเป็นสิ่งสำคัญที่จะต้องทำการวิจัยอย่างละเอียด 
  ก่อนที่จะไว้วางใจทรัพย์สินจำนวนมากกับ stablecoin ใด ๆ โดยเฉพาะ
reviewed: true
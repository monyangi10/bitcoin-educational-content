question: 스테이블코인을 신뢰하기 전에 철저한 조사를 하는 것이 중요한 이유는 무엇인가요?
answer: 일부 스테이블코인은 투명성과 성실성이 부족합니다
wrong_answers:
  - 스테이블코인은 관련 위험이 없습니다
  - 스테이블코인은 항상 준비금에 의해 전액 지원됩니다
  - 일부 스테이블코인은 정부의 규제를 받습니다
explanation: |
  모든 스테이블코인이 동일한 수준의 투명성을 제공하는 것은 아닙니다.
  따라서 특정 스테이블코인에 상당한 자산을 맡기기 전에
  특정 스테이블코인에 상당한 자산을 맡기기 전에 철저한 조사를 수행하는 것이 중요합니다.
reviewed: true
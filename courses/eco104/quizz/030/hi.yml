question: एक स्टेबलकॉइन पर भरोसा करने से पहले अच्छी तरह रिसर्च करना क्यों ज़रूरी है? एक वजह ये है कि कुछ स्टेबलकॉइन्स के पीछे पर्याप्त संपत्ति या रिज़र्व नहीं होता, जिससे उनकी वैल्यू अचानक गिर सकती है!
answer: कुछ स्टेबलकॉइन में पारदर्शिता और सावधानी की कमी होती है
wrong_answers:
  - स्टेबलकॉइन में कोई जोखिम नहीं होता है
  - स्टेबलकॉइन हमेशा रिजर्व से पूरी तरह बैक्ड होते हैं
  - कुछ स्टेबलकॉइन सरकार द्वारा रेगुलेटेड होते हैं
explanation: |
  सभी स्टेबलकॉइन एक जैसी पारदर्शिता नहीं देते।
  इसलिए, अच्छी तरह से रिसर्च करना ज़रूरी है
  किसी भी खास स्टेबलकॉइन पर बड़ी रकम सौंपने से पहले।
reviewed: true
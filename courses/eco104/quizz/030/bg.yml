question: Коя е причината, поради която е важно да проведете задълбочено проучване, преди да се доверите на даден стабилен монетник?
answer: При някои стабилни монети липсват прозрачност и усърдие
wrong_answers:
  - Стабилните монети не са свързани с рискове
  - Стабилните монети винаги са напълно обезпечени с резерви
  - Някои стабилни монети се регулират от правителството
explanation: |
  Не всички стабилни монети предлагат еднакво ниво на прозрачност.
  Ето защо е важно да проведете задълбочено проучване
  преди да поверите значително богатство на конкретен стабилен Bitcoin.
reviewed: true
question: Коя е причината, поради която е важно да проведете задълбочено проучване, преди да се доверите на даден стейбълкойн?
answer: При някои стейбълкойни липсват прозрачност и усърдие
wrong_answers:
  - стейбълкойните не са свързани с рискове
  - стейбълкойните винаги са напълно обезпечени с резерви
  - Някои стейбълкойни се регулират от правителството
explanation: |
  Не всички стейбълкойни предлагат еднакво ниво на прозрачност.
  Ето защо е важно да проведете задълбочено проучване
  преди да поверите значително богатство на конкретен стейбълкойн.
reviewed: true

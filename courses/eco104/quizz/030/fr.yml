question: Quelle est une raison pour laquelle il est important de réaliser une recherche approfondie avant de faire confiance à un stablecoin ?
answer: Certains stablecoins manquent de transparence et de diligence
wrong_answers:
  - Les stablecoins n'ont aucun risque associé
  - Les stablecoins sont toujours entièrement soutenus par des réserves
  - Certains stablecoins sont régulés par le gouvernement
explanation: |
  Tous les stablecoins n'offrent pas le même niveau de transparence.
  Par conséquent, il est important de réaliser une recherche approfondie
  avant de confier une richesse significative à un stablecoin en particulier.
reviewed: true

question: บทบาทหลักของคีย์ส่วนตัวในระบบ Bitcoin คืออะไร?
answer: ลงนามธุรกรรมเพื่อตอบสนองสคริปต์
wrong_answers:
  - ทำหน้าที่เป็นตัวระบุเพื่อรับบิตคอยน์
  - จัดเก็บเงินอย่างปลอดภัยบนบล็อกเชน
  - สร้างสคริปต์ล็อกเพื่อป้องกันบิตคอยน์
explanation: |
  คีย์ส่วนตัวถูกใช้ในการเซ็นชื่อธุรกรรมเพื่อตอบสนองสคริปต์และปลดล็อกบิตคอยน์
reviewed: true
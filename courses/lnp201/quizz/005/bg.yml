question: Каква е основната роля на частния ключ в системата Bitcoin?
answer: Подписване на транзакции за удовлетворяване на скрипт
wrong_answers:
  - Служи като идентификатор за получаване на биткойни
  - Съхранявайте средствата сигурно в блокчейна
  - Създаване на скриптове за заключване за защита на биткойни
explanation: |
  Частният ключ се използва за подписване на транзакции, за да се удовлетвори скрипт и да се отключат биткойните.
reviewed: true
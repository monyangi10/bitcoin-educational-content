question: Koja je primarna uloga privatnog ključa u Bitcoin sistemu?
answer: Služi za potpisivanje transakcije radi ispunjavanja uslova skripte
wrong_answers:
  - Služi kao identifikator za primanje bitkoina
  - Služi za čuvanje sredstva sigurno na Blockchain-u
  - Služi za kreiranje skripte zaključavanja za zaštitu bitkoina
explanation: |
  Privatni ključ se koristi za potpisivanje transakcija kako bi se zadovoljila skripta i otključali bitkoini.
reviewed: true

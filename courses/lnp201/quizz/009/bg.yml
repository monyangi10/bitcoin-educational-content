question: Какво прави скриптът за заключване в транзакция Bitcoin?
answer: Тя налага специфични условия за изразходване на свързаните с нея средства
wrong_answers:
  - Автоматично изпраща средствата на няколко адреса
  - Определя стойността на UTXO, която ще бъде създадена
  - Временно блокира средствата, за да предотврати прекомерното им изразходване
explanation: |
  Сценарият за заключване налага условия, като например подписване с частен ключ, за да се отключат и използват средствата в дадена транзакция.
reviewed: true
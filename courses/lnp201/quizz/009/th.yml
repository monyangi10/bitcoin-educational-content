question: ในธุรกรรม Bitcoin สคริปต์ล็อกทำหน้าที่อะไร?
answer: มันกำหนดเงื่อนไขเฉพาะในการใช้จ่ายเงินที่เกี่ยวข้อง
wrong_answers:
  - มันจะส่งเงินไปยังที่อยู่หลายแห่งโดยอัตโนมัติ
  - มันกำหนดมูลค่าของ UTXO ที่จะสร้างขึ้น
  - มันล็อคเงินชั่วคราวเพื่อป้องกันการใช้จ่ายเกินตัว
explanation: |
  สคริปต์ล็อกกำหนดเงื่อนไข เช่น การเซ็นด้วยกุญแจส่วนตัว เพื่อปลดล็อกและใช้เงินในธุรกรรม
reviewed: true
question: Bitcoin लेन-देन में, लॉकिंग स्क्रिप्ट क्या करती है?
answer: यह संबंधित धनराशि खर्च करने के लिए खास शर्तें लागू करता है
wrong_answers:
  - यह अपने आप फंड्स को कई पतों पर भेज देता है।
  - यह UTXO बनाने का मूल्य तय करता है
  - यह ज़्यादा खर्च होने से रोकने के लिए फंड्स को अस्थायी तौर पर लॉक कर देता है।
explanation: |
  लॉकिंग स्क्रिप्ट कुछ शर्तें लगाती है, जैसे कि प्राइवेट की के साथ साइन करना, ताकि ट्रांजैक्शन में फंड्स को अनलॉक और इस्तेमाल किया जा सके।
reviewed: false
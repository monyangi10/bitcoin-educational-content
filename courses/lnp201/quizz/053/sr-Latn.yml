question: Zašto posrednički čvor mora održavati dobru distribuciju likvidnosti u svojim kanalima?
answer: Da maksimizuje broj plaćanja koja može usmeriti
wrong_answers:
  - Da smanji naknade za transakcije
  - Da izbegne otvaranje novih kanala
  - Da ograniči upotrebu Bitcoin Blockchain
explanation: |
  Posrednički čvor ima za cilj da usmeri što više uplata kako bi prikupio naknade, što zahteva dobru raspodelu likvidnosti na obe strane kanala kako bi osigurao kapacitet za usmeravanje.
reviewed: true

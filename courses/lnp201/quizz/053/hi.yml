question: राउटर को अपने चैनल्स में अच्छा लिक्विडिटी डिस्ट्रीब्यूशन क्यों मेन्टेन करना चाहिए?
answer: भुगतानों की अधिकतम संख्या को रूट करने के लिए
wrong_answers:
  - लेन-देन शुल्क कम करने के लिए
  - नए चैनल खोलने से बचने के लिए
  - Bitcoin और Blockchain के उपयोग को सीमित करने के लिए
explanation: |
  एक राउटर का मकसद ज्यादा से ज्यादा पेमेंट्स को रूट करके फीस इकट्ठा करना होता है, इसके लिए चैनल्स के दोनों तरफ लिक्विडिटी का अच्छा बंटवारा जरूरी होता है ताकि रूटिंग क्षमता बनी रहे।
reviewed: false
question: Защо маршрутизаторът трябва да поддържа добро разпределение на ликвидността в своите канали?
answer: За да увеличи максимално броя на плащанията, които може да насочи
wrong_answers:
  - Намаляване на таксите за транзакции
  - За да избегнете откриването на нови канали
  - Ограничаване на използването на блокчейн Bitcoin
explanation: |
  Маршрутизаторът има за цел да пренасочи възможно най-много плащания за събиране на такси, което изисква добро разпределение на ликвидността от двете страни на каналите, за да се осигури капацитет за маршрутизиране.
reviewed: true
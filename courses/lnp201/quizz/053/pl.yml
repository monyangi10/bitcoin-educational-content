question: Dlaczego router musi utrzymywać dobrą dystrybucję płynności w swoich kanałach?
answer: Aby zmaksymalizować liczbę płatności, które może przekierować
wrong_answers:
  - Aby zmniejszyć opłaty transakcyjne
  - Aby uniknąć otwierania nowych kanałów
  - Aby ograniczyć korzystanie z Bitcoin Blockchain
explanation: |
  Router ma na celu przekierowanie jak największej liczby płatności w celu pobrania opłat, co wymaga dobrego rozkładu płynności po obu stronach kanałów, aby zapewnić przepustowość routingu.
reviewed: false
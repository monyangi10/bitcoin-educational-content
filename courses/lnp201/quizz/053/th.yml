question: ทำไมเราเตอร์ต้องรักษาการกระจายสภาพคล่องที่ดีในช่องของมัน?
answer: เพื่อเพิ่มจำนวนการชำระเงินที่สามารถส่งต่อได้สูงสุด
wrong_answers:
  - เพื่อลดค่าธรรมเนียมการทำธุรกรรม
  - เพื่อหลีกเลี่ยงการเปิดช่องทางใหม่
  - เพื่อจำกัดการใช้บล็อกเชน Bitcoin
explanation: |
  เราเตอร์มีเป้าหมายที่จะส่งผ่านการชำระเงินให้ได้มากที่สุดเพื่อเก็บค่าธรรมเนียม ซึ่งต้องการการกระจายสภาพคล่องที่ดีทั้งสองด้านของช่องทางเพื่อให้มั่นใจในความสามารถในการส่งผ่าน
reviewed: true
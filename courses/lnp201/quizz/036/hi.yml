question: HTLC प्राप्तकर्ता को धन प्राप्त करने के लिए क्या शर्त पूरी करनी होगी?
answer: उन्हें भुगतान को अनलॉक करने के लिए एक गुप्त कोड (प्रीइमेज) देना होगा।
wrong_answers:
  - उन्हें हर बिचौलिए नोड के रूटिंग शुल्क को स्वीकार करना ही होगा।
  - उन्हें एक नया Commitment Transaction पर हस्ताक्षर करना होगा।
  - उन्हें फंड्स वापस लेने से पहले टाइमलॉक के खत्म होने का इंतज़ार करना होगा।
explanation: |
  HTLC में फंड प्राप्त करने के लिए, प्राप्तकर्ता को एक खास पासवर्ड देना होगा जो Hash द्वारा सुरक्षित भुगतान को अनलॉक करने की अनुमति देता है।
reviewed: false
question: Koji uslov mora biti ispunjen da primalac HTLC dobije sredstva?
answer: Moraju obezbediti tajnu (preimage) da otključaju plaćanje.
wrong_answers:
  - Moraju prihvatiti naknade za usmeravanje svakog posredničkog čvora.
  - Moraju potpisati novu obavezujuću transakciju.
  - Moraju sačekati da istekne period vremenskog zaključavanje pre nego što preuzmu sredstva.
explanation: |
  Da bi primio sredstva u HTLC, primalac mora obezbediti određenu tajnu koja omogućava otključavanje uplate osigurane hešom.
reviewed: true

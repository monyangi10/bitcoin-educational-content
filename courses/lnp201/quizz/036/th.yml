question: เงื่อนไขใดที่ต้องปฏิบัติตามเพื่อให้ผู้รับ HTLC ได้รับเงิน?
answer: พวกเขาต้องให้ความลับ (preimage) เพื่อปลดล็อกการชำระเงิน
wrong_answers:
  - พวกเขาต้องยอมรับค่าธรรมเนียมการกำหนดเส้นทางของแต่ละโหนดตัวกลาง
  - พวกเขาต้องลงนามใน commitment transaction ใหม่
  - พวกเขาต้องรอให้เวลาล็อคหมดอายุก่อนที่จะดึงเงินออกมาได้
explanation: |
  ในการรับเงินในรูปแบบ HTLC ผู้รับจะต้องให้ความลับเฉพาะที่ช่วยปลดล็อกการชำระเงินที่ถูกป้องกันด้วยแฮช
reviewed: true
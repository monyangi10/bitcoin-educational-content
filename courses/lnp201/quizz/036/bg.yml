question: Кое условие трябва да бъде изпълнено, за да може получателят на HTLC да получи средствата?
answer: Те трябва да предоставят тайна (предварителен образ), за да отключат плащането.
wrong_answers:
  - Те трябва да приемат таксите за маршрутизация на всеки междинен възел.
  - Те трябва да подпишат нов commitment transaction.
  - Те трябва да изчакат изтичането на срока на блокиране, преди да изтеглят средствата.
explanation: |
  За да получи средствата в HTLC, получателят трябва да предостави специфична тайна, която позволява отключване на плащането, гарантирано от хеша.
reviewed: true
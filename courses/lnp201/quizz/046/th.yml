question: ในใบแจ้งหนี้ Lightning คำว่า lnbc ในส่วนที่มนุษย์อ่านได้หมายถึงอะไร?
answer: มันบ่งชี้ถึงธุรกรรม Lightning บนบล็อกเชน Bitcoin
wrong_answers:
  - ใบแจ้งหนี้นี้ใช้ได้เฉพาะบนเครือข่ายทดสอบ Bitcoin เท่านั้น
  - ใบแจ้งหนี้ถูกเข้ารหัสใน bech32
  - นั่นคือธุรกรรม on-chain
explanation: |
  คำนำหน้า 'lnbc' หมายความว่าใบแจ้งหนี้นี้เป็นสำหรับการทำธุรกรรม Lightning บนเครือข่าย Bitcoin ไม่ใช่บนเครือข่ายอื่น
reviewed: true
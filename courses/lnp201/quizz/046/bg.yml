question: Какво означава префиксът lnbc в частта, която може да се чете от човека, във фактура Lightning?
answer: Той показва транзакция Lightning в блокчейна Bitcoin
wrong_answers:
  - Фактурата е валидна само за тестовата мрежа Bitcoin
  - Фактурата е кодирана в bech32
  - Че става въпрос за сделка on-chain
explanation: |
  Префиксът "lnbc" означава, че фактурата е за транзакция с мълния в мрежата Bitcoin, а не в друга мрежа.
reviewed: true
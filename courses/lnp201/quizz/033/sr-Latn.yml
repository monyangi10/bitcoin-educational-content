question: Šta podrazumeva onion routing (rutiranje) u Lightning mreži?
answer: To znači da svaki posredni čvor poznaje samo svoje neposredne susede na putu.
wrong_answers:
  - Direktan prenos sredstava sa čvora na čvor znajući konačnog primaoca
  - Podrazumeva nezavisno izračunavanje naknade za svaki posrednički čvor
  - Slanje sredstva svim čvorovima na putu istovremeno
explanation: |
  Onion rutiranje znači da svaki posrednički čvor zna samo prethodni i sledeći čvor, čime se čuva poverljivost krajnjeg primaoca.
reviewed: true

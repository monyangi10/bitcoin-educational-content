question: Какво включва маршрутизацията с луковици в Lightning Network?
answer: Това означава, че всеки междинен възел познава само непосредствените си съседи по пътя.
wrong_answers:
  - Директно предаване на средства от възел на възел, като се знае крайният получател
  - Изчисляване на таксите за всеки междинен възел поотделно
  - Изпращане на средства до всички възли по пътя едновременно
explanation: |
  Маршрутизацията с луковици означава, че всеки междинен възел знае само предишния и следващия възел, като по този начин се запазва поверителността на крайния получател.
reviewed: true
question: Lightning Network의 어니언 라우팅에는 어떤 것이 있나요?
answer: 즉, 각 중간 노드는 경로에서 가장 가까운 이웃 노드만 알고 있습니다.
wrong_answers:
  - 최종 수취인을 알고 노드에서 노드로 직접 자금을 전송하는 경우
  - 각 중간 노드에 대한 수수료를 독립적으로 계산하려면 다음과 같이 하세요
  - 경로의 모든 노드에 동시에 자금을 보내려면 다음과 같이 하세요
explanation: |
  어니언 라우팅은 각 중간 노드가 이전 노드와 다음 노드만 알 수 있으므로 최종 수신자의 기밀성이 유지됩니다.
reviewed: true
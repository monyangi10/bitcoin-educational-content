question: Lightning Network में ऑनियन राउटिंग का क्या मतलब है?
answer: इसका मतलब है कि हर बीच का नोड सिर्फ अपने पास वाले पड़ोसियों को ही पहचानता है जो रास्ते में हैं।
wrong_answers:
  - नोड से नोड को सीधे फंड ट्रांसफर करना, जबकि अंतिम प्राप्तकर्ता को जानते हुए
  - हर बीच के नोड के लिए फीस अलग-अलग कैलकुलेट करने के लिए
  - सभी नोड्स को रास्ते में एक साथ फंड भेजने के लिए
explanation: |
  प्याज़ रूटिंग का मतलब है कि हर बीच वाला नोड सिर्फ पिछले और अगले नोड को ही जानता है, जिससे आखिरी प्राप्तकर्ता की गोपनीयता बनी रहती है।

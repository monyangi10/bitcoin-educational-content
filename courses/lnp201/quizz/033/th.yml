question: การกำหนดเส้นทางแบบหัวหอมใน Lightning Network เกี่ยวข้องกับอะไร?
answer: มันหมายความว่าแต่ละโหนดกลางจะรู้จักเฉพาะเพื่อนบ้านที่อยู่ติดกันบนเส้นทางเท่านั้น
wrong_answers:
  - เพื่อส่งเงินโดยตรงจากโหนดหนึ่งไปยังอีกโหนดหนึ่งโดยรู้ผู้รับปลายทาง
  - คำนวณค่าธรรมเนียมสำหรับโหนดกลางแต่ละโหนดอย่างอิสระ
  - เพื่อส่งเงินไปยังโหนดทั้งหมดบนเส้นทางพร้อมกัน
explanation: |
  การกำหนดเส้นทางแบบหัวหอมหมายความว่าแต่ละโหนดกลางจะรู้เพียงโหนดก่อนหน้าและโหนดถัดไปเท่านั้น จึงรักษาความลับของผู้รับสุดท้าย
reviewed: true
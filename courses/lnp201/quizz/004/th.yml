question: Lightning Network อนุญาตอะไรเมื่อเทียบกับธุรกรรมแบบดั้งเดิมบนบล็อกเชน Bitcoin?
answer: การทำธุรกรรมที่รวดเร็วพร้อมค่าธรรมเนียมขั้นต่ำ
wrong_answers:
  - ธุรกรรมที่ไม่ระบุตัวตนและไม่สามารถติดตามได้
  - ธุรกรรมในปริมาณมากโดยไม่มีข้อจำกัดด้านปริมาณ
  - ธุรกรรมระหว่างบล็อกเชนต่าง ๆ
explanation: |
  Lightning Network ช่วยให้การทำธุรกรรมรวดเร็วและมีต้นทุนต่ำผ่านช่องทางการชำระเงิน off-chain ซึ่งแตกต่างจากการทำธุรกรรมปกติบนบล็อกเชน
reviewed: true
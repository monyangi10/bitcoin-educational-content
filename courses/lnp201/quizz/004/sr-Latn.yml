question: Šta omogućava Lightning mreža u poređenju sa tradicionalnim transakcijama na Bitcoin Blockchain-u?
answer: Brze transakcije sa minimalnim naknadama
wrong_answers:
  - Anonimne transakcije i transakcije bez mogućnosti praćenja
  - Transakcije u velikim količinama bez ograničenja veličine
  - Transakcije između različitih blokčeinova
explanation: |
  Lightning mreža omogućava brze i niskotarifne transakcije putem off-chain platnih kanala, što se razlikuje od regularnih transakcija na Blockchain-u.
reviewed: true

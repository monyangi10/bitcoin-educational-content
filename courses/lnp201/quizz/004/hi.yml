question: Lightning Network, पारंपरिक Bitcoin और Blockchain लेनदेन की तुलना में क्या अनुमति देता है?  

(नोट: Lightning Network, Blockchain, Bitcoin जैसे टेक्निकल टर्म्स को हिंदी में अनुवादित नहीं किया गया है क्योंकि ये सिस्टम/प्लेटफ़ॉर्म के नाम हैं। अगर कोई विशेष कॉन्टेक्स्ट हो तो बताएं तो और सटीक अनुवाद किया जा सके।)
answer: तेज़ लेन-देन, कम फीस के साथ
wrong_answers:
  - गुमनाम और पता न लगा पाने वाले लेन-देन
  - बड़ी मात्रा में लेनदेन बिना किसी मात्रा सीमा के
  - अलग-अलग ब्लॉकचेन के बीच लेन-देन
explanation: |
  Lightning Network, off-chain पेमेंट चैनल्स के जरिए तेज़ और सस्ते लेन-देन को संभव बनाता है, जो Blockchain पर होने वाले आम लेन-देन से अलग है।
reviewed: false
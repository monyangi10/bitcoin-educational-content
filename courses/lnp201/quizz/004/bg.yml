question: Какво позволява Lightning Network в сравнение с традиционните транзакции в блокчейна Bitcoin?
answer: Бързи транзакции с минимални такси
wrong_answers:
  - Анонимни и непроследими транзакции
  - Транзакции в големи количества без ограничения на обема
  - Транзакции между различни блокчейн вериги
explanation: |
  Lightning Network дава възможност за бързи и евтини трансакции чрез каналите за плащане off-chain, които се различават от обикновените трансакции в блокчейн.
reviewed: true
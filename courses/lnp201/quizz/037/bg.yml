question: Какво се случва, ако плащането чрез HTLC не бъде извършено в рамките на определеното време?
answer: Плащането се анулира и средствата се връщат на изпращача.
wrong_answers:
  - Плащането се съхранява от последния междинен възел
  - Средствата се разпределят между всички възли по пътя
  - Средствата са окончателно блокирани
explanation: |
  Ако срокът на HTLC изтече, без тайната да бъде разкрита, плащането се анулира и средствата се връщат на изпращача, като по този начин се предотвратява задържането на средствата от който и да е междинен възел.
reviewed: true
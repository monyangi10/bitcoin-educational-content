question: จะเกิดอะไรขึ้นหากการชำระเงินผ่าน HTLC ไม่เสร็จสิ้นภายในเวลาที่กำหนด?
answer: การชำระเงินถูกยกเลิก และเงินถูกส่งคืนให้กับผู้ส่ง
wrong_answers:
  - การชำระเงินถูกเก็บไว้โดยโหนดตัวกลางสุดท้าย
  - เงินทุนจะถูกแจกจ่ายไปยังโหนดทั้งหมดในเส้นทาง
  - เงินถูกบล็อกอย่างถาวร
explanation: |
  หาก HTLC หมดอายุโดยที่ความลับไม่ได้ถูกเปิดเผย การชำระเงินจะถูกยกเลิก และเงินจะถูกส่งคืนให้กับผู้ส่ง ซึ่งจะป้องกันไม่ให้โหนดตัวกลางใดๆ เก็บเงินไว้
reviewed: true
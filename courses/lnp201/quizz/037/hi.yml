question: अगर HTLC के जरिए भुगतान निर्धारित समय में पूरा नहीं होता है तो क्या होगा?
answer: भुगतान रद्द कर दिया गया है और धन वापस भेजने वाले को लौटा दिया जाएगा।
wrong_answers:
  - भुगतान आखिरी बिचौलिए नोड के पास रखा जाता है
  - फंड्स रास्ते में सभी नोड्स को बांट दिए जाते हैं
  - फंड्स को हमेशा के लिए ब्लॉक कर दिया गया है
explanation: |
  अगर HTLC का समय खत्म हो जाता है और राज़ (secret) खुलासा नहीं होता है, तो भुगतान रद्द हो जाता है और पैसे वापस भेजने वाले को चले जाते हैं। इस तरह, कोई भी बीच का नोड (intermediary node) पैसे अपने पास नहीं रख सकता।
reviewed: false
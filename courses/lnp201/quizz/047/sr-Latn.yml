question: Koja je uloga LNURL-a u Lightning transakcijama?
answer: Da pojednostavi interakciju između čvorova i Lightning aplikacija
wrong_answers:
  - Da olakša kreiranje kanala za svaku uplatu
  - Da osigura poverljivost informacija o plaćanju
  - Da automatski izračuna naknade za transakcije
explanation: |
  LNURL je komunikacioni protokol dizajniran da pojednostavi interakcije, kao što su povlačenja i plaćanja, između čvorova i Lightning aplikacija.
reviewed: true

question: LNURL का रोल Lightning ट्रांजैक्शन्स में क्या है?
answer: नोड्स और लाइटनिंग एप्लिकेशन्स के बीच इंटरैक्शन को सरल बनाने के लिए
wrong_answers:
  - भुगतान के लिए हर चैनल बनाने में मदद करें
  - भुगतान की जानकारी की गोपनीयता सुनिश्चित करें
  - लेन-देन शुल्क अपने आप हिसाब करो
explanation: |
  LNURL एक कम्युनिकेशन प्रोटोकॉल है जो नोड्स और लाइटनिंग एप्लिकेशन्स के बीच इंटरैक्शन को आसान बनाने के लिए बनाया गया है, जैसे कि पैसे निकालना और भुगतान करना।

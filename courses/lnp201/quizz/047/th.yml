question: บทบาทของ LNURL ในการทำธุรกรรม Lightning คืออะไร?
answer: เพื่อทำให้การโต้ตอบระหว่างโหนดและแอปพลิเคชัน Lightning ง่ายขึ้น
wrong_answers:
  - อำนวยความสะดวกในการสร้างช่องทางสำหรับการชำระเงินแต่ละครั้ง
  - รับรองความลับของข้อมูลการชำระเงิน
  - คำนวณค่าธรรมเนียมการทำธุรกรรมโดยอัตโนมัติ
explanation: |
  LNURL เป็นโปรโตคอลการสื่อสารที่ออกแบบมาเพื่อทำให้การโต้ตอบ เช่น การถอนเงินและการชำระเงิน ระหว่างโหนดและแอปพลิเคชัน Lightning ง่ายขึ้น
reviewed: true
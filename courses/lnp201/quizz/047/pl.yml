question: Jaka jest rola LNURL w transakcjach Lightning?
answer: Uproszczenie interakcji między węzłami i aplikacjami Lightning
wrong_answers:
  - Ułatwienie tworzenia kanałów dla każdej płatności
  - Zapewnienie poufności informacji o płatnościach
  - Automatyczne obliczanie opłat transakcyjnych
explanation: |
  LNURL to protokół komunikacyjny zaprojektowany w celu uproszczenia interakcji, takich jak wypłaty i płatności, między węzłami a aplikacjami Lightning.
reviewed: true

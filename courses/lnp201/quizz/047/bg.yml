question: Каква е ролята на LNURL в транзакциите Lightning?
answer: Опростяване на взаимодействието между възлите и приложенията Lightning
wrong_answers:
  - Улесняване на създаването на канали за всяко плащане
  - Гарантиране на поверителността на информацията за плащанията
  - Автоматично изчисляване на таксите за транзакции
explanation: |
  LNURL е протокол за комуникация, предназначен за опростяване на взаимодействията между възлите и приложенията на Lightning, като например тегления и плащания.
reviewed: true
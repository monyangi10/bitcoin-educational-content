question: लाइटनिंग Invoice का मुख्य काम क्या है?
answer: भेजने वाले नोड से भुगतान का अनुरोध करें
wrong_answers:
  - बिना On-Chain ट्रांजैक्शन के पैसे भेजें
  - चैनल पर HTLCs को सक्रिय करें
  - एक नया लाइटनिंग चैनल खोलो
explanation: |
  एक लाइटनिंग जीडब्ल्यू-3 एक भुगतान अनुरोध है, जिसे प्राप्त करने वाला नोड भेजने वाले नोड को Lightning Network पर भुगतान शुरू करने के लिए भेजता है।
reviewed: false
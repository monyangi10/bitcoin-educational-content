question: Каква е основната функция на фактурата Lightning?
answer: Искане за плащане от изпращащия възел
wrong_answers:
  - Изпращане на средства без транзакция on-chain
  - Активиране на HTLC в канал
  - Отваряне на нов канал Lightning
explanation: |
  Мълниеносната фактура е заявка за плащане, предадена от получаващия възел на изпращащия възел за иницииране на плащане по Lightning Network.
reviewed: true
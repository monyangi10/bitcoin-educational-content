question: Lightning Network은 어떻게 직접 연결되지 않은 노드에 자금을 송금할 수 있나요?
answer: 중개 노드를 통해 결제를 라우팅하여
wrong_answers:
  - 각 노드 간에 On-Chain 트랜잭션을 사용하여
  - 임시 채널을 자동으로 설정하여
  - 다중 서명 주소로 직접 자금을 송금하는 방법
explanation: |
  Lightning Network를 사용하면 송금인과 수취인 사이에 직접 채널을 연결하지 않고도 여러 중개 노드를 통해 결제를 라우팅할 수 있습니다.
reviewed: true
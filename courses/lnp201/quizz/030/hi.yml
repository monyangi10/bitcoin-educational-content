question: Lightning Network कैसे एक नोड को फंड भेजने की अनुमति देता है जो सीधे जुड़ा नहीं है?
answer: भुगतान को बिचौलियों (इंटरमीडिएरी नोड्स) के जरिए भेजकर
wrong_answers:
  - हर नोड के बीच On-Chain लेन-देन का उपयोग करके
  - एक्सीडेंटली एक अस्थायी चैनल स्थापित करके
  - मल्टीसिग्नेचर एड्रेस के साथ सीधे फंड भेजकर
explanation: |
  Lightning Network भुगतान को कई बीच के नोड्स के माध्यम से रूट करने में सक्षम बनाता है, भेजने वाले और प्राप्तकर्ता के बीच सीधे चैनल की आवश्यकता के बिना।
reviewed: false
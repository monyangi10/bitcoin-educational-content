question: Как Lightning Network позволява изпращането на средства до възел, който не е пряко свързан?
answer: Чрез маршрутизиране на плащането през междинни възли
wrong_answers:
  - Чрез използване на транзакции on-chain между всеки възел
  - Чрез автоматично създаване на временен канал
  - Чрез директно изпращане на средствата с адреси с множество подписи
explanation: |
  Lightning Network дава възможност за маршрутизиране на плащане през няколко междинни възела, без да е необходим директен канал между изпращача и получателя.
reviewed: true
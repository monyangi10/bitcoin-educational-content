question: Lightning Network อนุญาตให้ส่งเงินไปยังโหนดที่ไม่ได้เชื่อมต่อโดยตรงได้อย่างไร?
answer: โดยการส่งผ่านการชำระเงินผ่านโหนดตัวกลาง
wrong_answers:
  - โดยใช้ธุรกรรม on-chain ระหว่างแต่ละโหนด
  - โดยการสร้างช่องทางชั่วคราวโดยอัตโนมัติ
  - โดยการส่งเงินโดยตรงด้วยที่อยู่หลายลายเซ็น
explanation: |
  Lightning Network ช่วยให้สามารถกำหนดเส้นทางการชำระเงินผ่านโหนดตัวกลางหลายตัว โดยไม่จำเป็นต้องมีช่องทางตรงระหว่างผู้ส่งและผู้รับ
reviewed: true
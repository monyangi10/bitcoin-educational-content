question: अगर बॉब ने ऐलिस को 30,000 सतोशी के लिए Invoice भेज दिया तो क्या होगा?
answer: Alice ने चैनल में Bob को 30,000 सतोशी ट्रांसफर करने के लिए एक Commitment Transaction बनाया।
wrong_answers:
  - ऐलिस को यह ट्रांसफर करने के लिए एक नया चैनल खोलना होगा।
  - बॉब को अपने Wallet में 30,000 सातोशी अपने-आप मिल जाते हैं।
  - Invoice का भुगतान Bitcoin पर On-Chain लेन-देन के माध्यम से किया जाता है।
explanation: |
  जब बॉब ऐलिस को Invoice भेजता है, तो वह फंड के वितरण को एडजस्ट करने के लिए एक नया Commitment Transaction बनाकर साइन करती है, जिससे चैनल में 30,000 सैटोशी ट्रांसफर हो जाते हैं।

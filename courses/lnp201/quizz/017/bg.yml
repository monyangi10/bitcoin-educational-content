question: Какво се случва, ако Bob изпрати фактура на Alice за 30 000 сатоши?
answer: Alice създава commitment transaction, за да прехвърли 30 000 сатоши към Bob в канала.
wrong_answers:
  - Alice трябва да отвори нов канал, за да извърши това прехвърляне.
  - Bob автоматично получава 30 000 сатоши в своя wallet.
  - Фактурата се заплаща чрез транзакция on-chain в Bitcoin.
explanation: |
  Когато Bob изпраща фактура на Alice, тя създава и подписва нов commitment transaction, за да коригира разпределението на средствата, като по този начин прехвърля 30 000 сатоши в канала.
reviewed: true
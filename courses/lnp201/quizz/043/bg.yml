question: Каква информация може да включи Bob във фактурата, за да улесни маршрутизирането?
answer: Близки канали с достатъчна ликвидност или наличие на частни канали
wrong_answers:
  - Частният ключ на междинните възли
  - Пълната карта на всички канали на мрежата
  - Точното количество налична ликвидност за всеки канал
explanation: |
  Като посочва близките канали с ликвидност или разкрива частни канали, Bob помага на Alice да избере маршрути с по-голяма вероятност за успех.
reviewed: true
question: ข้อมูลใดบ้างที่ Bob สามารถรวมไว้ในใบแจ้งหนี้เพื่ออำนวยความสะดวกในการกำหนดเส้นทาง?
answer: ช่องทางใกล้เคียงที่มีสภาพคล่องเพียงพอหรือการมีอยู่ของช่องทางส่วนตัว
wrong_answers:
  - คีย์ส่วนตัวของโหนดกลาง
  - แผนที่สมบูรณ์ของช่องทั้งหมดในเครือข่าย
  - จำนวนสภาพคล่องที่มีอยู่สำหรับแต่ละช่องทาง
explanation: |
  โดยการระบุช่องทางใกล้เคียงที่มีสภาพคล่องหรือเปิดเผยช่องทางส่วนตัว Bob ช่วยให้ Alice เลือกเส้นทางที่มีโอกาสประสบความสำเร็จมากขึ้น
reviewed: true
question: बॉब Invoice में रूटिंग को आसान बनाने के लिए कौन सी जानकारी शामिल कर सकता है?
answer: पास के चैनल जिनमें पर्याप्त लिक्विडिटी हो या प्राइवेट चैनल्स का होना
wrong_answers:
  - इंटरमीडिएट नोड्स की प्राइवेट की
  - नेटवर्क के सभी चैनलों का पूरा नक्शा
  - हर चैनल के लिए उपलब्ध लिक्विडिटी की सटीक राशि
explanation: |
  बॉब ने पास के लिक्विडिटी वाले चैनल्स या प्राइवेट चैनल्स के बारे में बताकर ऐलिस को सफलता की बेहतर संभावना वाले रूट्स चुनने में मदद की।
reviewed: false
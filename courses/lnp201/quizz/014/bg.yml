question: Каква е последната стъпка за отваряне на канал в Lightning Network?
answer: Публикуване на транзакцията за депозит в блокчейна на Bitcoin
wrong_answers:
  - Подпишете транзакция за изтегляне, за да възстановите средствата
  - Изпращане на съобщение за потвърждение на отварянето до другата страна
  - Проверка на баланса на средствата на всеки участник
explanation: |
  Последната стъпка за отваряне на канал е да се публикува транзакцията за депозит в блокчейна, с което каналът се отваря официално.
reviewed: true
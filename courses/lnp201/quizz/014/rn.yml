question: Ni intambwe iyihe ya nyuma yo gufungura umurongo kuri Lightning Network?
answer: Gutangaza ivy’ugushiramwo amahera ku rupapuro rwa Bitcoin Blockchain.
wrong_answers:
  - Sinya amasezerano yo gukuraho amahera kugira ngo ubone amahera
  - Wohereze ubutumwa bwo kwemeza ko ufunguye ku rundi ruhande
  - Kugenzura uburinganire bw'amahera y'umwe wese mu bari muri iyo nama
explanation: |
  Intambwe ya nyuma yo gufungura umurongo ni ugutangaza ivy’ugushiramwo amahera kuri Blockchain, iyo na yo ikaba ari yo ifungura umurongo ku mugaragaro.
reviewed: false
question: ขั้นตอนสุดท้ายในการเปิดช่องบน Lightning Network คืออะไร?
answer: เผยแพร่ธุรกรรมการฝากบนบล็อกเชน Bitcoin
wrong_answers:
  - ลงนามในธุรกรรมการถอนเพื่อกู้คืนเงินทุน
  - ส่งข้อความยืนยันการเปิดให้กับอีกฝ่าย
  - ตรวจสอบยอดเงินคงเหลือของผู้เข้าร่วมแต่ละคน
explanation: |
  ขั้นตอนสุดท้ายในการเปิดช่องทางคือการเผยแพร่ธุรกรรมการฝากบนบล็อกเชน ซึ่งจะเปิดช่องทางอย่างเป็นทางการ
reviewed: true
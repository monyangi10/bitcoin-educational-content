question: Lightning Network पर चैनल खोलने का आखिरी स्टेप क्या है?
answer: जमा लेनदेन को Bitcoin Blockchain पर प्रकाशित करें
wrong_answers:
  - फंड वापस पाने के लिए एक निकासी लेनदेन पर साइन करें
  - दूसरे पक्ष को खुलने की पुष्टि संदेश भेजें
  - प्रत्येक प्रतिभागी के धन का शेष सत्यापित करें
explanation: |
  चैनल खोलने का आखिरी कदम है डिपॉजिट ट्रांजैक्शन को Blockchain पर पब्लिश करना, जिससे चैनल आधिकारिक तौर पर खुल जाता है।

question: Каква е основната цел на HTLC в Lightning Network?
answer: Да се осигурят сигурни преводи на плащания чрез междинни възли, без да се изисква доверие в тях
wrong_answers:
  - Намаляване на таксите за транзакции за всяко плащане чрез междинни възли
  - Увеличаване на капацитета на всеки канал за плащане
  - Установяване на директни връзки между всички мрежови възли с техните доверителни
explanation: |
  HTLC (Hashed Time-Locked Contracts) гарантират, че всеки междинен възел прехвърля плащането, без да задържа средствата, тъй като може да ги отключи само при завършване на трансакцията до крайния получател.
reviewed: true
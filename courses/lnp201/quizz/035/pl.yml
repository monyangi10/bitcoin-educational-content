question: Jaki jest główny cel kontraktów HTLC w sieci Lightning?
answer: Umożliwienie bezpiecznych transferów płatności za pośrednictwem węzłów pośredniczących bez wymogu zaufania im
wrong_answers:
  - Zmniejszenie opłat transakcyjnych za każdą płatność za pośrednictwem węzłów pośredniczących
  - Zwiększenie przepustowości każdego kanału płatności
  - Ustanowienie bezpośrednich połączeń między wszystkimi węzłami sieci, którym się ufa
explanation: |
  Kontrakty HTLC (Hashed Time-Locked Contracts) zapewniają, że każdy węzeł pośredniczący przekaże płatność bez zatrzymywania środków, ponieważ może je odblokować tylko poprzez zakończenie transakcji u ostatecznego odbiorcy.

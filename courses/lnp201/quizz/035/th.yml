question: เป้าหมายหลักของ HTLCs ใน Lightning Network คืออะไร?
answer: เพื่อเปิดใช้งานการโอนเงินที่ปลอดภัยผ่านโหนดตัวกลางโดยไม่ต้องเชื่อถือในโหนดเหล่านั้น
wrong_answers:
  - เพื่อลดค่าธรรมเนียมการทำธุรกรรมสำหรับการชำระเงินแต่ละครั้งผ่านโหนดตัวกลาง
  - เพื่อเพิ่มความจุของแต่ละช่องทางการชำระเงิน
  - เพื่อสร้างการเชื่อมต่อโดยตรงระหว่างโหนดเครือข่ายทั้งหมดด้วยความไว้วางใจของพวกเขา
explanation: |
  HTLCs (Hashed Time-Locked Contracts) ช่วยให้มั่นใจได้ว่าแต่ละโหนดตัวกลางจะโอนเงินโดยไม่เก็บรักษาเงินไว้ เนื่องจากสามารถปลดล็อกได้โดยการทำธุรกรรมให้เสร็จสมบูรณ์จนถึงผู้รับปลายทางเท่านั้น
reviewed: true
question: Lightning Network에서 HTLC의 주요 목표는 무엇인가요?
answer: 중개 노드를 신뢰하지 않고도 중개 노드를 통해 안전하게 결제 전송할 수 있습니다
wrong_answers:
  - 중개 노드를 통한 각 결제의 거래 수수료를 줄이기 위해
  - 각 결제 채널의 용량을 늘리려면
  - 모든 네트워크 노드 간에 신뢰를 바탕으로 직접 연결을 설정하려면 다음과 같이 하세요
explanation: |
  HTLC(해시된 시간 고정 계약)는 각 중개 노드가 최종 수취인까지 거래를 완료해야만 잠금을 해제할 수 있으므로 자금을 보유하지 않고 송금할 수 있습니다.
reviewed: true
question: Lightning Network में HTLCs (Hashed Timelock Contracts) का मुख्य लक्ष्य क्या है?
answer: भरोसेमंद भुगतान ट्रांसफर को बीच के नोड्स के जरिए सुरक्षित बनाने के लिए, बिना उन पर भरोसा किए
wrong_answers:
  - इंटरमीडिएरी नोड्स के जरिए हर भुगतान पर लेन-देन शुल्क कम करने के लिए
  - हर भुगतान चैनल की क्षमता बढ़ाने के लिए
  - सभी नेटवर्क नोड्स के बीच सीधे कनेक्शन स्थापित करने के लिए उनके भरोसे के साथ
explanation: |
  HTLCs (हैश्ड टाइम-लॉक्ड कॉन्ट्रैक्ट्स) यह सुनिश्चित करते हैं कि हर बीच का नोड पेमेंट ट्रांसफर करेगा बिना फंड्स रोके, क्योंकि वह अंतिम प्राप्तकर्ता तक ट्रांजैक्शन पूरा करके ही इन्हें अनलॉक कर सकता है।

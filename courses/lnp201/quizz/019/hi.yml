question: Commitment Transaction सिस्टम Lightning चैनल के प्रतिभागियों को क्या गारंटी देता है?
answer: कि हर कोई अपने पैसे वापस पा सकता है बस आखिरी साइन किए गए ट्रांजैक्शन को पब्लिश करके
wrong_answers:
  - कि लेन-देन Bitcoin Blockchain पर दिखाई देते हैं
  - कि चैनल की क्षमता हर लेन-देन के साथ बढ़ती है
  - वह फीस दोनों प्रतिभागियों के बीच बांटी जाती है।
explanation: |
  हस्ताक्षरित Commitment लेन-देन यह सुनिश्चित करते हैं कि अगर चैनल बंद हो जाता है, तो हर भागीदार नवीनतम संस्करण प्रकाशित करके अपने फंड वापस पा सकता है।

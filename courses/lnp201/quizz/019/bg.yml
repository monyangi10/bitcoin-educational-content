question: Какво гарантира системата commitment transaction на участниците в канала Lightning?
answer: Че всеки може да възстанови средствата си чрез публикуване на последната подписана транзакция
wrong_answers:
  - Транзакциите са видими в блокчейна на Bitcoin
  - Капацитетът на канала се увеличава с всяка транзакция
  - Таксите се разпределят между двамата участници
explanation: |
  Подписаните транзакции за поемане на задължения гарантират, че всеки участник може да възстанови средствата си чрез публикуване на последната версия в случай на закриване на канала.
reviewed: true
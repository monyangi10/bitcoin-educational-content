question: ระบบ commitment transaction รับประกันอะไรให้กับผู้เข้าร่วมของช่องทาง Lightning?
answer: ที่แต่ละคนสามารถกู้คืนเงินของพวกเขาได้โดยการเผยแพร่ธุรกรรมที่ลงนามล่าสุด
wrong_answers:
  - ธุรกรรมเหล่านั้นสามารถมองเห็นได้บนบล็อกเชน Bitcoin
  - ความจุของช่องเพิ่มขึ้นในแต่ละธุรกรรม
  - ว่าค่าธรรมเนียมถูกแบ่งระหว่างผู้เข้าร่วมทั้งสอง
explanation: |
  ธุรกรรมที่ลงนามแล้วช่วยให้ผู้เข้าร่วมแต่ละคนสามารถกู้คืนเงินของตนได้โดยการเผยแพร่เวอร์ชันล่าสุดในกรณีที่ช่องทางปิด
reviewed: true
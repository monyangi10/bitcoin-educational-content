question: В коя ситуация се използва принудително затваряне на канал?
answer: Когато една от страните вече не отговаря
wrong_answers:
  - Когато е необходимо да се увеличи капацитетът на канала
  - Когато блокировката на времето е недостатъчна
  - Когато таксите за трансакции са твърде високи
explanation: |
  Принудителното прекратяване се използва като крайна мярка, ако една от страните, например поради технически проблем, вече не отговаря на съобщенията на другата.
reviewed: true
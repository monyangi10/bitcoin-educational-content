question: ในสถานการณ์ใดที่มีการใช้การปิดช่องทางบังคับ?
answer: เมื่อฝ่ายใดฝ่ายหนึ่งไม่ตอบสนองอีกต่อไป
wrong_answers:
  - เมื่อความจุของช่องทางจำเป็นต้องเพิ่มขึ้น
  - เมื่อการล็อกเวลาไม่เพียงพอ
  - เมื่อค่าธรรมเนียมการทำธุรกรรมสูงเกินไป
explanation: |
  การปิดบังคับถูกใช้เป็นทางเลือกสุดท้ายหากฝ่ายใดฝ่ายหนึ่ง เช่น เนื่องจากปัญหาทางเทคนิค ไม่ตอบสนองต่อข้อความของอีกฝ่ายหนึ่งอีกต่อไป
reviewed: true
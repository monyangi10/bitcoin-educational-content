question: किस स्थिति में चैनल का जबरन बंद किया जाता है?
answer: जब एक पक्ष अब जवाब नहीं देता
wrong_answers:
  - जब चैनल की क्षमता बढ़ाने की जरूरत हो
  - जब टाइमलॉक पर्याप्त नहीं होता
  - जब ट्रांजैक्शन फीस बहुत ज्यादा हो जाती है
explanation: |
  जबरदस्ती बंद करना आखिरी विकल्प के रूप में इस्तेमाल किया जाता है अगर कोई एक पक्ष, जैसे कि तकनीकी समस्या की वजह से, दूसरे के संदेशों का जवाब नहीं देता।
reviewed: false
question: commitment transaction ในช่องทาง Lightning สะท้อนถึงอะไร?
answer: การกระจายเงินทุนใหม่ระหว่างสองพรรค
wrong_answers:
  - จำนวนธุรกรรมทั้งหมดที่ทำขึ้น
  - จำนวนค่าธรรมเนียมที่ต้องชำระสำหรับการทำธุรกรรม
  - การเปิดช่องทางการชำระเงินใหม่
explanation: |
  commitment transaction แสดงถึงการกระจายเงินทุนในช่องทางปัจจุบันหลังจากแต่ละธุรกรรม Lightning แต่จะไม่ถูกเผยแพร่บนบล็อกเชนตราบใดที่ช่องทางยังคงเปิดอยู่
reviewed: true
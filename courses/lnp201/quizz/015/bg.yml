question: Какво отразява commitment transaction в канал за светкавици?
answer: Новото разпределение на средствата между двете страни
wrong_answers:
  - Общият брой на извършените транзакции
  - Размерът на таксите, които трябва да се платят за транзакцията
  - Откриване на нов канал за плащане
explanation: |
  commitment transaction представлява текущото разпределение на средствата в канала след всяка транзакция с мълния, но не се публикува в блокчейна, докато каналът е отворен.
reviewed: true
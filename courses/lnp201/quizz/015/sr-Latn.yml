question: Šta odražava Commitment Transaction (obavezujuća transakcija) u Lightning kanalu?
answer: Novu raspodelu sredstava između dve strane
wrong_answers:
  - Ukupan broj izvršenih transakcija
  - Iznos naknada koje treba platiti za transakciju
  - Otvaranje novog kanala plaćanja
explanation: |
  Commitment Transaction predstavlja trenutnu raspodelu sredstava u kanalu nakon svake Lightning transakcije, ali nije objavljen na Blockchain-u sve dok kanal ostaje otvoren.
reviewed: true

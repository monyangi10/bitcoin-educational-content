question: त्रिकोण खोलने की तकनीक (Triangle Opening Technique) भाग लेने वाले नोड्स को क्या हासिल करने में मदद करती है?
answer: हर चैनल में आने वाली और बाहर जाने वाली लिक्विडिटी
wrong_answers:
  - कम की गई रूटिंग फीस
  - बिना पुष्टि के असीमित लेन-देन
  - हर दूसरे नेटवर्क नोड के साथ सीधा कनेक्शन
explanation: |
  त्रिकोण खोलने की तकनीक से हर नोड को संतुलित लिक्विडिटी मिलती है, चाहे वह आने वाली हो या जाने वाली, कई प्रतिभागियों के बीच चैनलों का एक लूप बनाकर।
reviewed: false
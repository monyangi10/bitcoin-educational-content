question: Какво позволява техниката за отваряне на триъгълник да постигне на участващите възли?
answer: Входяща и изходяща ликвидност във всеки канал
wrong_answers:
  - Намалени такси за маршрутизиране
  - Неограничен брой транзакции без потвърждение
  - Директна връзка с всеки друг мрежов възел
explanation: |
  Техниката за отваряне на триъгълник позволява на всеки възел да постигне балансирана ликвидност, както входяща, така и изходяща, като образува верига от канали между няколко участници.
reviewed: true
question: เทคนิคการเปิดสามเหลี่ยมช่วยให้โหนดที่เข้าร่วมสามารถบรรลุอะไรได้บ้าง?
answer: สภาพคล่องขาเข้าและขาออกในแต่ละช่องทาง
wrong_answers:
  - ลดค่าธรรมเนียมการกำหนดเส้นทาง
  - จำนวนธุรกรรมไม่จำกัดโดยไม่ต้องยืนยัน
  - ลิงก์โดยตรงกับโหนดเครือข่ายอื่นทุกโหนด
explanation: |
  เทคนิคการเปิดสามเหลี่ยมช่วยให้แต่ละโหนดสามารถบรรลุสภาพคล่องที่สมดุล ทั้งขาเข้าและขาออก โดยการสร้างวงของช่องทางระหว่างผู้เข้าร่วมหลายคน
reviewed: true
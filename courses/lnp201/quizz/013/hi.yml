question: अगर ऐलिस ने बॉब का सिग्नेचर वापसी लेनदेन के लिए नहीं लिया तो क्या होगा?
answer: वह अपने Address मल्टीसिग्नेचर में जमा किए गए फंड तक पहुंच खोने का जोखिम उठा रही है।
wrong_answers:
  - वह अब Lightning Network पर बॉब के साथ बातचीत नहीं कर सकती।
  - चैनल सीमित क्षमता के साथ खुलता है
  - बॉब को चैनल में फंड्स अपने आप मिल जाते हैं
explanation: |
  बॉब के साइन के बिना निकासी लेन-देन पर, एलिस अपने फंड्स को वापस पाने की गारंटी नहीं दे सकती अगर कोई समस्या आती है, जिससे पैसे खोने का खतरा होता है।
reviewed: false
question: จะเกิดอะไรขึ้นหาก Alice ไม่ได้รับลายเซ็นของ Bob สำหรับการทำธุรกรรมการถอน?
answer: เธอเสี่ยงที่จะสูญเสียการเข้าถึงเงินทุนที่ฝากไว้ในที่อยู่หลายลายเซ็น
wrong_answers:
  - เธอไม่สามารถสื่อสารกับ Bob บน Lightning Network ได้อีกต่อไป
  - ช่องเปิดด้วยความจุที่จำกัด
  - Bob รับเงินในช่องทางโดยอัตโนมัติ
explanation: |
  หากไม่มีลายเซ็นของ Bob ในการทำธุรกรรมการถอนเงิน Alice ไม่สามารถรับประกันการกู้คืนเงินของเธอในกรณีที่เกิดปัญหา ซึ่งก่อให้เกิดความเสี่ยงต่อการสูญเสีย
reviewed: true
question: Co się stanie, jeśli Alicja nie uzyska podpisu Boba dla transakcji wypłaty?
answer: Ryzykuje utratę dostępu do swoich środków zdeponowanych pod adresem wielopodpisowym
wrong_answers:
  - Nie może już komunikować się z Bobem w sieci Lightning
  - Kanał otwiera się z ograniczoną przepustowością
  - Bob automatycznie otrzymuje środki w kanale
explanation: |
  Bez podpisu Boba na transakcji wypłaty, Alicja nie może zapewnić sobie odzyskania swoich środków w przypadku wystąpienia problemu, co stwarza ryzyko ustraty środków.
reviewed: false

question: Какво се случва, ако Alice не получи подписа на Bob за операцията по изтегляне?
answer: Тя рискува да загуби достъп до средствата си, депозирани на адреса с много подписи
wrong_answers:
  - Тя вече не може да комуникира с Bob на Lightning Network
  - Каналът се отваря с ограничен капацитет
  - Bob автоматично получава средствата в канала
explanation: |
  Без подписа на Bob върху транзакцията за теглене Alice не може да гарантира възстановяването на средствата си в случай на проблем, което създава риск от загуба.
reviewed: true
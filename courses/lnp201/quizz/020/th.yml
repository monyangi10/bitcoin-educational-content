question: ความเสี่ยงหลักในธุรกรรมการผูกพันบน Lightning Network คืออะไร?
answer: เผยแพร่ธุรกรรมเก่าเพื่อเรียกคืนเงินเพิ่มเติม
wrong_answers:
  - ลืมเซ็นชื่อในแบบฟอร์ม commitment transaction
  - ส่งเงินไปยังช่องทางอื่นโดยไม่ได้ตั้งใจ
  - การบล็อกธุรกรรมด้วยการตั้งเวลาที่ไม่เหมาะสม
explanation: |
  ความเสี่ยงหลักคือฝ่ายหนึ่งอาจพยายามโกงโดยการเผยแพร่ commitment transaction เก่า ซึ่งอาจทำให้พวกเขาเรียกคืนเงินที่พวกเขาไม่มีอีกต่อไปได้
reviewed: true
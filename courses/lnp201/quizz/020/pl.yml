question: Jakie jest główne ryzyko w transakcjach zobowiązujących w sieci Lightning?
answer: Opublikowanie starej transakcji w celu odzyskania większej ilości środków
wrong_answers:
  - Zapomnienie o podpisaniu transakcji zobowiązującej
  - Przypadkowe wysłanie środków do innego kanału
  - Zablokowanie transakcji nieodpowiednią blokadą czasową
explanation: |
  Główne ryzyko polega na tym, że jedna ze stron może próbować oszukiwać, publikując starą transakcję zobowiązującą, co może pozwolić jej odzyskać środki, których już nie posiada.
reviewed: true

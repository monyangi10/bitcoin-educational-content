question: Какъв е основният риск при транзакциите за поемане на задължения по Lightning Network?
answer: Публикуване на стара транзакция за възстановяване на повече средства
wrong_answers:
  - Забравяне на подписването на commitment transaction
  - Случайно изпращане на средства към друг канал
  - Блокиране на транзакцията с неподходящ timelock
explanation: |
  Основният риск е, че някоя от страните може да се опита да измами, като публикува стар commitment transaction, което може да ѝ позволи да възстанови средства, които вече не притежава.
reviewed: true
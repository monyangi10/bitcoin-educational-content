question: Koji je glavni rizik sa obavezujućim transakcijama na Lightning mreži?
answer: Objavljivanje stare transakcije radi povraćaja više sredstava
wrong_answers:
  - Zaboravljanje da se potpiše obavezujuća transakcija
  - Slučajno slanje sredstava na drugi kanal
  - Blokiranje transakcije sa neodgovarajućim vremenskim zaključavanjem
explanation: |
  Glavni rizik je da strana može pokušati da prevari objavljivanjem stare obavezujuće transakcije, što bi im moglo omogućiti da povrate sredstva koja više nemaju.
reviewed: true

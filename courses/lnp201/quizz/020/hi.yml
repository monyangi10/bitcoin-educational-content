question: Commitment ट्रांजैक्शन में Lightning Network पर मुख्य जोखिम क्या है?
answer: पुराने लेन-देन को फिर से प्रकाशित करके अधिक धन वापस लेना
wrong_answers:
  - Commitment Transaction पर साइन करना भूल गए
  - गलती से दूसरे चैनल को पैसे भेज देना
  - अनुचित टाइमलॉक के साथ लेन-देन को ब्लॉक करना
explanation: |
  मुख्य खतरा यह है कि कोई पार्टी पुराना Commitment Transaction जारी करके धोखा देने की कोशिश कर सकती है, जिससे वे उन फंड्स को वापस ले सकते हैं जो अब उनके पास नहीं हैं।

question: ऑनियन रूटिंग पेमेंट करने के लिए सेंडिंग नोड को कौन सी जानकारी पता होनी चाहिए?
answer: नेटवर्क टोपोलॉजी और प्राप्तकर्ता तक का पूरा रूट
wrong_answers:
  - केवल अगला इंटरमीडिएट नोड
  - हर चैनल की क्षमता
  - पथ पर हर नोड का क्रिप्टोग्राफिक सिग्नेचर
explanation: |
  भेजने वाले नोड को रिसीवर तक का रास्ता कैलकुलेट करने के लिए नेटवर्क टोपोलॉजी की जानकारी होनी चाहिए, ताकि वो सबसे अच्छा रास्ता चुन सके।
reviewed: false
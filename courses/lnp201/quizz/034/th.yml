question: ข้อมูลใดที่โหนดส่งต้องทราบเพื่อดำเนินการชำระเงินแบบ onion routing?
answer: โทโพโลยีเครือข่ายและเส้นทางที่สมบูรณ์ไปยังผู้รับ
wrong_answers:
  - เฉพาะโหนดกลางถัดไป
  - ความจุของแต่ละช่อง
  - ลายเซ็นการเข้ารหัสของแต่ละโหนดบนเส้นทาง
explanation: |
  โหนดที่ส่งต้องทราบโครงสร้างเครือข่ายเพื่อคำนวณเส้นทางไปยังผู้รับ ทำให้สามารถเลือกเส้นทางที่เหมาะสมที่สุดได้
reviewed: true
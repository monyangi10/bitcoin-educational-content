question: Каква информация трябва да знае изпращащият възел, за да извърши плащане по маршрута onion?
answer: Топологията на мрежата и пълният маршрут до получателя
wrong_answers:
  - Само следващият междинен възел
  - Капацитетът на всеки канал
  - Криптографският подпис на всеки възел по пътя
explanation: |
  Изпращащият възел трябва да познава топологията на мрежата, за да изчисли маршрута до получателя, което му позволява да избере най-оптималния път.
reviewed: true
question: บทบาทของค่าธรรมเนียมการกำหนดเส้นทางใน Lightning Network คืออะไร?
answer: เพื่อจูงใจโหนดตัวกลางให้จัดหาสภาพคล่องของพวกเขาสำหรับการโอนเงิน
wrong_answers:
  - เพื่อจำกัดจำนวนธุรกรรมบนเครือข่าย
  - เพื่อให้แน่ใจว่าแต่ละช่องทางมีเงินทุนเพียงพอ
  - ในการคำนวณเส้นทางที่สั้นที่สุดโดยอัตโนมัติ
explanation: |
  ค่าธรรมเนียมการกำหนดเส้นทางถูกใช้เพื่อชดเชยโหนดตัวกลางที่ส่งต่อการชำระเงินโดยการเสนอความคล่องตัวของพวกเขาเพื่อให้สามารถโอนเงินผ่านเครือข่ายได้
reviewed: true
question: Lightning Network में रूटिंग फीस की क्या भूमिका है?
answer: भुगतानों के हस्तांतरण के लिए मध्यस्थ नोड्स को अपनी तरलता प्रदान करने के लिए प्रोत्साहित करने के लिए
wrong_answers:
  - नेटवर्क पर लेन-देन की संख्या को सीमित करने के लिए
  - यह सुनिश्चित करने के लिए कि हर चैनल के पास पर्याप्त फंड हो
  - स्वचालित रूप से सबसे छोटा रास्ता निकालने के लिए
explanation: |
  रूटिंग फीस का इस्तेमाल उन बिचौलिए नोड्स को मुआवजा देने के लिए किया जाता है जो पेमेंट को आगे भेजते हैं और नेटवर्क पर फंड ट्रांसफर को संभव बनाने के लिए अपनी लिक्विडिटी (तरलता) प्रदान करते हैं।

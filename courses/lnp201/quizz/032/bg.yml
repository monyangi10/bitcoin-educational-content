question: Каква е ролята на таксите за маршрутизация в Lightning Network?
answer: Стимулиране на междинните възли да предоставят своята ликвидност за прехвърляне на плащания
wrong_answers:
  - Ограничаване на броя на транзакциите в мрежата
  - Да се гарантира, че всеки канал разполага с достатъчно средства
  - Автоматично изчисляване на най-краткия път
explanation: |
  Таксите за маршрутизиране се използват за компенсиране на междинните възли, които препредават плащанията, като предлагат своята ликвидност, за да позволят прехвърлянето на средства в мрежата.
reviewed: true
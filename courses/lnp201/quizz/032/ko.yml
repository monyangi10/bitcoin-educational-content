question: Lightning Network에서 라우팅 수수료의 역할은 무엇인가요?
answer: 중개 노드가 결제 전송을 위해 유동성을 제공하도록 인센티브를 제공합니다
wrong_answers:
  - 네트워크의 트랜잭션 수를 제한하려면 다음과 같이 하세요
  - 각 채널에 충분한 자금이 있는지 확인하려면
  - 최단 경로를 자동으로 계산하려면 다음과 같이 하세요
explanation: |
  라우팅 수수료는 네트워크에서 자금을 송금할 수 있도록 유동성을 제공하여 결제를 중계하는 중개 노드에 보상을 제공하는 데 사용됩니다.
reviewed: true
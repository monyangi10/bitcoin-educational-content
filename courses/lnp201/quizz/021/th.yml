question: ไทม์ล็อคป้องกันการโกงในธุรกรรมการให้คำมั่นสัญญาอย่างไร?
answer: มันป้องกันไม่ให้ฝ่ายที่กระทำผิดเรียกคืนเงินของพวกเขาทันที
wrong_answers:
  - มันคืนเงินให้กับผู้โกงโดยอัตโนมัติ
  - มันยกเลิกการทำธุรกรรมในกรณีที่มีการพยายามโกง
  - มันบล็อกการใช้คีย์เพิกถอน
explanation: |
  การล็อกเวลา (timelock) กำหนดความล่าช้าในระหว่างที่ผู้โกงไม่สามารถดึงเงินของตนกลับมาได้ ทำให้อีกฝ่ายมีโอกาสตอบสนอง
reviewed: true
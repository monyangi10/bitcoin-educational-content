question: По какъв начин таймлокът предпазва от измама при транзакциите за поемане на задължения?
answer: Тя не позволява на нарушителя да получи незабавно своите средства
wrong_answers:
  - Тя автоматично възстановява средствата на измамника
  - Той отменя транзакцията в случай на опит за измама
  - Блокира използването на ключа за отзоваване
explanation: |
  Заключването на времето налага забавяне, през което измамникът не може да получи средствата си, като по този начин дава възможност на другата страна да реагира.
reviewed: true
question: Commitment लेनदेन में टाइमलॉक कैसे धोखाधड़ी से बचाता है?
answer: यह अपराधी पक्ष को तुरंत अपने फंड वापस लेने से रोकता है।
wrong_answers:
  - यह अपने आप धोखेबाज को पैसे वापस कर देता है।
  - अगर कोई धोखा देने की कोशिश करता है तो यह लेन-देन रद्द कर देता है
  - यह रिवोकेशन की को ब्लॉक कर देता है
explanation: |
  टाइमलॉक एक देरी लगाता है जिस दौरान धोखेबाज अपने फंड्स वापस नहीं ले सकता, जिससे दूसरे पक्ष को जवाब देने का मौका मिलता है।
reviewed: false
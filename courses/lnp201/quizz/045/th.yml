question: ฟีเจอร์ LNURL-withdraw ช่วยให้ผู้ใช้สามารถทำอะไรได้บ้าง?
answer: ถอนเงินจากบริการโดยการสแกนคิวอาร์โค้ด
wrong_answers:
  - ทำการชำระเงินโดยตรงโดยไม่มีค่าธรรมเนียมการโอน
  - เชื่อมต่อ Lightning wallet ของพวกเขาโดยไม่ต้องใช้รหัสผ่าน
  - ส่งเงินโดยไม่ต้องยืนยันผู้รับ
explanation: |
  LNURL-withdraw ช่วยให้ผู้ใช้สามารถถอนเงินจากบริการได้โดยการสแกน QR code ซึ่งทำให้กระบวนการถอนเงินง่ายขึ้น
reviewed: true
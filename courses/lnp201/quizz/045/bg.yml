question: Какво позволява на потребителите да правят функцията LNURL-withdraw?
answer: Изтегляне на средства от услуга чрез сканиране на QR код
wrong_answers:
  - Направете директно плащане без такси за маршрутизиране
  - Свързване на техния Lightning wallet без парола
  - Изпращане на средства без потвърждение от получателя
explanation: |
  LNURL-withdraw позволява на потребителите да теглят средства от дадена услуга чрез сканиране на QR код, като по този начин опростява процеса на теглене.
reviewed: true
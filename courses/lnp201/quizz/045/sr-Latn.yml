question: Šta omogućava funkcija LNURL-withdraw korisnicima da urade?
answer: Povlačenje sredstava sa servisa skeniranjem QR koda
wrong_answers:
  - Izvršavanje direktnog plaćanja bez naknada za usmeravanje.
  - Povezivanje njihov Lightning novčanika bez lozinke
  - Slanje sredstava bez potvrde primaoca
explanation: |
  LNURL-withdraw omogućava korisnicima da povuku sredstva sa servisa skeniranjem QR koda, čime se pojednostavljuje proces povlačenja.
reviewed: true

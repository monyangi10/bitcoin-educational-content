question: LNURL-withdraw की सुविधा यूजर्स को क्या करने की अनुमति देती है?  

(व्यावहारिक हिंदी अनुवाद: यह फीचर यूजर्स को अपने वॉलेट से पैसे निकालने के लिए एक स्पेशल लिंक या QR कोड जनरेट करने देता है, बिना किसी को अपना वॉलेट एड्रेस बताए। सीधे शब्दों में - "सुरक्षित तरीके से पैसे निकालने का आसान तरीका!")  

*Note: टेक्निकल टर्म "LNURL-withdraw" को उसके ओरिजिनल फॉर्म में ही रखा गया है क्योंकि यह लाइटनिंग नेटवर्क का स्पेसिफिक फंक्शन है।*
answer: क्यूआर कोड स्कैन करके सेवा से पैसे निकालें
wrong_answers:
  - बिना रूटिंग शुल्क के सीधा भुगतान करें
  - उनका लाइटनिंग जीडब्ल्यू-0 बिना पासवर्ड के कनेक्ट करें
  - बिना प्राप्तकर्ता की पुष्टि के धन भेजें
explanation: |
  LNURL-withdraw यूजर्स को एक QR कोड स्कैन करके सर्विस से पैसे निकालने की सुविधा देता है, जिससे निकासी की प्रक्रिया आसान हो जाती है।
reviewed: false
question: अगर HTLC एक्टिव वाला चैनल जबरदस्ती बंद कर दिया जाए तो क्या होगा?
answer: HTLC को Commitment लेन-देन में एक आउटपुट के रूप में शामिल किया गया है।
wrong_answers:
  - जीडब्ल्यू-3 अपने आप कैंसिल हो जाता है।
  - फंड्स को पिछले नोड्स में वापस बांट दिया जाता है।
  - चैनल को बंद नहीं किया जा सकता जब तक HTLC एक्सपायर नहीं हो जाता।
explanation: |
  जबरन बंदी के दौरान, लंबित HTLCs को Commitment लेनदेन में आउटपुट के रूप में दिखाया जाता है, जिससे उनके निष्पादन या वापसी को परिभाषित शर्तों के अनुसार सुनिश्चित किया जाता है।
reviewed: false
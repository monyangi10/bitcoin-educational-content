question: จะเกิดอะไรขึ้นหากช่องที่มี HTLC ที่ใช้งานอยู่ถูกปิดโดยบังคับ?
answer: HTLC รวมอยู่ในธุรกรรมการผูกพันในฐานะผลลัพธ์
wrong_answers:
  - HTLC ถูกยกเลิกโดยอัตโนมัติ
  - เงินทุนจะถูกแจกจ่ายใหม่ไปยังโหนดก่อนหน้า
  - ไม่สามารถปิดช่องทางได้จนกว่า HTLC จะหมดอายุ
explanation: |
  ในระหว่างการปิดบังคับ HTLCs ที่รอดำเนินการจะถูกแสดงเป็นผลลัพธ์ในธุรกรรมการผูกมัด ซึ่งจะช่วยให้มั่นใจได้ว่าการดำเนินการหรือการคืนจะเป็นไปตามเงื่อนไขที่กำหนด
reviewed: true
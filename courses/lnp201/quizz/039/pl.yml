question: Co się stanie, jeśli kanał z aktywnym kontraktem HTLC zostanie przymusowo zamknięty?
answer: Kontrakt HTLC jest dołączany do transakcji zobowiązującej jako dane wyjściowe.
wrong_answers:
  - KOntrakt HTLC zostanie automatycznie anulowany.
  - Środki są redystrybuowane do poprzednich węzłów.
  - Kanał nie może zostać zamknięty przed upływem HTLC.
explanation: |
  Podczas wymuszonego zamknięcia, oczekujące kontrakty HTLC są reprezentowane jako wyjścia w transakcjach zobowiązujących, zapewniając w ten sposób ich wykonanie lub zwrot zgodnie ze zdefiniowanymi warunkami.
reviewed: true

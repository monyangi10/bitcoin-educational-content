question: Какво се случва, ако канал с активен HTLC бъде затворен принудително?
answer: HTLC се включва в транзакциите за поемане на задължения като резултат.
wrong_answers:
  - HTLC се анулира автоматично.
  - Средствата се преразпределят към предишните възли.
  - Каналът не може да бъде затворен, докато не изтече HTLC.
explanation: |
  По време на принудително затваряне чакащите HTLC се представят като изходи в транзакциите за поемане на задължения, като по този начин се гарантира тяхното изпълнение или връщане в съответствие с определените условия.
reviewed: true
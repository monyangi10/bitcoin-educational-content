question: HTLCs (Hashed Timelock Contracts) में टाइमलॉक क्या भूमिका निभाता है?
answer: यह भुगतान पूरा करने के लिए रद्द होने से पहले एक समयसीमा देता है
wrong_answers:
  - यह चैनल की क्षमता को बढ़ा देता है
  - यह लेन-देन में Layer की प्राइवेसी जोड़ता है
  - यह हर बीच के नोड के लिए अतिरिक्त शुल्क लगाता है
explanation: |
  टाइमलॉक HTLC को पूरा करने के लिए एक समयसीमा लगाता है, जो ट्रांजैक्शन के फेल होने पर फंड्स को रिकवर करने की अनुमति देता है, इस अवधि के बाद पेमेंट को कैंसिल करके।
reviewed: false
question: Каква роля играе времевият механизъм в работата на HTLC?
answer: Предоставя се срок за извършване на плащането преди анулиране
wrong_answers:
  - Увеличава капацитета на използвания канал
  - Той добавя ниво на поверителност към транзакцията
  - Той прилага допълнителни такси за всеки междинен възел
explanation: |
  Времевата блокировка налага срок за завършване на HTLC, като позволява възстановяване на средствата, ако транзакцията не е успешна, чрез отмяна на плащането след изтичане на този срок.
reviewed: true
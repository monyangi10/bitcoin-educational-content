question: บทบาทของ timelock ในการทำงานของ HTLCs คืออะไร?
answer: มันให้กรอบเวลาสำหรับการชำระเงินก่อนที่จะถูกยกเลิก
wrong_answers:
  - มันเพิ่มความจุของช่องทางที่ใช้
  - มันเพิ่มชั้นของความเป็นส่วนตัวให้กับการทำธุรกรรม
  - มีการเรียกเก็บค่าธรรมเนียมเพิ่มเติมสำหรับแต่ละโหนดตัวกลาง
explanation: |
  การล็อกเวลา (timelock) กำหนดกรอบเวลาในการทำ HTLC ให้เสร็จสมบูรณ์ โดยอนุญาตให้กู้คืนเงินได้หากการทำธุรกรรมไม่สำเร็จ โดยการยกเลิกการชำระเงินหลังจากช่วงเวลานี้
reviewed: true
question: Кога commitment transaction се публикува в блокчейна Bitcoin?
answer: В крайна сметка, когато каналът е затворен
wrong_answers:
  - Веднага след всеки трансфер в канала
  - Преди всеки нов commitment transaction
  - При изчерпване на наличните средства
explanation: |
  Транзакциите Commitment се създават и подписват за всяка промяна в разпределението, но в крайна сметка се публикуват в блокчейна само при затваряне на канала.
reviewed: true
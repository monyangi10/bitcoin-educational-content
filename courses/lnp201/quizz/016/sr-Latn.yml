question: Kada je Commitment Transaction objavljen na Bitcoin Blockchain?
answer: Na kraju kada je kanal zatvoren
wrong_answers:
  - Odmah nakon svakog prenosa u kanalu
  - Pre svakog novog Commitment Transaction
  - Kada su raspoloživa sredstva iscrpljena
explanation: |
  Commitment transakcije se kreiraju i potpisuju za svaku promenu u alokaciji, ali se objavljuju na Blockchain samo u slučaju zatvaranja kanala.

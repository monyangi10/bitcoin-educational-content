question: เมื่อใดที่ commitment transaction ถูกเผยแพร่บนบล็อกเชน Bitcoin?
answer: ในที่สุด เมื่อช่องทางถูกปิด
wrong_answers:
  - ทันทีหลังจากการโอนแต่ละครั้งในช่องทาง
  - ก่อนแต่ละ commitment transaction ใหม่
  - เมื่อเงินทุนที่มีอยู่หมดลง
explanation: |
  ธุรกรรม Commitment ถูกสร้างและลงนามสำหรับการเปลี่ยนแปลงในการจัดสรรแต่ละครั้ง แต่จะถูกเผยแพร่บนบล็อกเชนเมื่อปิดช่องทางเท่านั้น
reviewed: true
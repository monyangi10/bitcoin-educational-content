question: Защо е трудно за предавателния възел да оцени точната ликвидност на канала?
answer: Тъй като само двамата участници знаят точното разпределение на средствата
wrong_answers:
  - Тъй като общият капацитет на каналите постоянно се променя
  - Тъй като таксите на междинните възли не се публикуват
  - Тъй като каналите се затварят автоматично след всяка транзакция
explanation: |
  Точното разпределение на средствата в канала е видимо само за двата участващи възела, което не позволява на другите възли да оценят наличната ликвидност за маршрутизиране.
reviewed: true
question: ทำไมโหนดที่ส่งถึงยากที่จะประมาณสภาพคล่องที่แน่นอนของช่องทาง?
answer: เพราะมีเพียงผู้เข้าร่วมสองคนเท่านั้นที่รู้การกระจายเงินทุนที่แน่นอน
wrong_answers:
  - เนื่องจากความจุรวมของช่องทางมีการเปลี่ยนแปลงอยู่ตลอดเวลา
  - เนื่องจากค่าธรรมเนียมของโหนดตัวกลางไม่ได้รับการเผยแพร่
  - เนื่องจากช่องทางจะปิดโดยอัตโนมัติหลังจากแต่ละธุรกรรม
explanation: |
  การกระจายเงินทุนที่แม่นยำในช่องทางจะมองเห็นได้เฉพาะกับโหนดที่เข้าร่วมสองโหนดเท่านั้น ซึ่งป้องกันไม่ให้โหนดอื่นๆ ประมาณการสภาพคล่องที่มีอยู่สำหรับการกำหนดเส้นทาง
reviewed: true
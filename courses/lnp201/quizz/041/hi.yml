question: एक ट्रांसमिटिंग नोड के लिए चैनल की एकदम सटीक लिक्विडिटी का अंदाज़ा लगाना मुश्किल क्यों होता है?
answer: क्योंकि सिर्फ दोनों हिस्सेदारों को ही फंड के बँटवारे की सही जानकारी होती है
wrong_answers:
  - क्योंकि चैनलों की कुल क्षमता लगातार बदल रही है
  - क्योंकि बिचौलिया नोड्स की फीस प्रकाशित नहीं की जाती
  - क्योंकि चैनल हर लेन-देन के बाद अपने आप बंद हो जाते हैं
explanation: |
  चैनल में फंड का सटीक वितरण सिर्फ दो भाग लेने वाले नोड्स को ही दिखाई देता है, जिससे दूसरे नोड्स रूटिंग के लिए उपलब्ध लिक्विडिटी का अंदाजा नहीं लगा पाते।
reviewed: false
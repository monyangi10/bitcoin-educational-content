question: คีย์เพิกถอนอนุญาตให้ทำอะไรในกรณีที่มีการโกง?
answer: กู้คืนเงินทั้งหมดโดยการลงโทษผู้โกง
wrong_answers:
  - ยกเลิก commitment transaction
  - เพิ่มความจุของช่องสัญญาณเป็นสองเท่า
  - ป้องกันการทำธุรกรรมเพิ่มเติมในช่องทาง
explanation: |
  คีย์เพิกถอนช่วยให้ฝ่ายที่ได้รับความเสียหายสามารถกู้คืนเงินทั้งหมดได้ในกรณีที่อีกฝ่ายพยายามโกง
reviewed: true
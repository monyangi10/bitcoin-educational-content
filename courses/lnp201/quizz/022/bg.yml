question: Какво позволява ключът за оттегляне да се направи в случай на измама?
answer: Възстановяване на всички средства чрез наказване на измамника
wrong_answers:
  - Отмяна на commitment transaction
  - Удвояване на капацитета на канала
  - Предотвратяване на всякакви по-нататъшни транзакции в канала
explanation: |
  Ключът за отмяна позволява на потърпевшата страна да възстанови всички средства в случай на опит за измама от страна на другата страна.
reviewed: true
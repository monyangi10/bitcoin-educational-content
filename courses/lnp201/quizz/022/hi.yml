question: रिवोकेशन की (Revocation Key) चीटिंग (Cheating) के केस में क्या करने की अनुमति देती है?
answer: धोखेबाज को सजा देकर सारे पैसे वापस ले लो
wrong_answers:
  - Commitment Transaction को कैंसिल कर दो
  - चैनल की क्षमता दोगुनी कर दो
  - चैनल में और कोई लेन-देन रोक दो
explanation: |
  रिवोकेशन की (revocation key) से पीड़ित पक्ष को धोखा देने की कोशिश होने पर सारे फंड वापस पाने का अधिकार मिलता है।
reviewed: false
question: Какви са ограниченията за размера на непрякото плащане в Lightning Network?
answer: Най-малката налична ликвидност в канала на избрания път
wrong_answers:
  - Броят на участващите междинни възли
  - Общият капацитет на Lightning Network
  - Таксите за маршрутизиране, определени от всеки възел
explanation: |
  Максималната сума, която може да се прехвърли с непряко плащане, зависи от най-ниската налична ликвидност в използваните канали, тъй като всеки канал трябва да коригира средствата на всяка страна.
reviewed: true
question: อะไรที่จำกัดจำนวนของการชำระเงินทางอ้อมบน Lightning Network?
answer: สภาพคล่องที่เล็กที่สุดที่มีอยู่ในช่องทางของเส้นทางที่เลือก
wrong_answers:
  - จำนวนโหนดตัวกลางที่เกี่ยวข้อง
  - ความจุรวมของ Lightning Network
  - ค่าธรรมเนียมการกำหนดเส้นทางที่ตั้งค่าโดยแต่ละโหนด
explanation: |
  จำนวนเงินสูงสุดที่การชำระเงินทางอ้อมสามารถโอนได้ขึ้นอยู่กับสภาพคล่องต่ำสุดที่มีอยู่ในช่องทางที่ใช้ เนื่องจากแต่ละช่องทางต้องปรับเงินทุนในแต่ละด้าน
reviewed: true
question: Lightning Network पर अप्रत्यक्ष भुगतान की राशि को क्या सीमित करता है?
answer: चुने हुए रास्ते के चैनल में उपलब्ध सबसे छोटी लिक्विडिटी
wrong_answers:
  - बीच में शामिल नोड्स की संख्या
  - Lightning Network की कुल क्षमता
  - हर नोड द्वारा तय की गई रूटिंग फीस
explanation: |
  इंडायरेक्ट पेमेंट से ट्रांसफर की जा सकने वाली अधिकतम राशि इस्तेमाल किए गए चैनलों में उपलब्ध सबसे कम लिक्विडिटी पर निर्भर करती है, क्योंकि हर चैनल को दोनों तरफ के फंड्स को एडजस्ट करना पड़ता है।
reviewed: false
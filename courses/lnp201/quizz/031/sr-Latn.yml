question: Šta ograničava iznos indirektnog plaćanja na Lightning mreži?
answer: Najmanja likvidnost dostupna u kanalu odabranog puta
wrong_answers:
  - Broj uključenih posredničkih čvorova 
  - Ukupni kapacitet Lightning mreže
  - Naknade za usmeravanje koje postavlja svaki čvor
explanation: |
  Maksimalni iznos koji indirektno plaćanje može preneti zavisi od najniže dostupne likvidnosti u korišćenim kanalima, jer svaki kanal mora prilagoditi sredstva na svakoj strani.
reviewed: true

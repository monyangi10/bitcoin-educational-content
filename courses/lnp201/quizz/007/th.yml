question: ทำไม UTXOs มักถูกเปรียบเทียบกับธนบัตร?
answer: พวกเขาต้องถูกใช้จ่ายทั้งหมด
wrong_answers:
  - สามารถใช้งานได้หลายครั้งจนกว่าจะหมด
  - พวกเขาสามารถใช้งานได้เฉพาะในธุรกรรมบางประเภทเท่านั้น
  - พวกเขาแสดงถึงจำนวนบิตคอยน์ที่แน่นอนและคงที่
explanation: |
  เช่นเดียวกับธนบัตร UTXO ต้องถูกใช้จ่ายทั้งหมดในธุรกรรมหนึ่งครั้ง และส่วนเกินใด ๆ จะถูกส่งคืนให้กับผู้ส่งเป็นเงินทอน
reviewed: true
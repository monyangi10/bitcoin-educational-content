question: UTXOs को अक्सर बैंकनोट्स से क्यों तुलना की जाती है?
answer: उन्हें पूरी तरह से खर्च किया जाना चाहिए
wrong_answers:
  - वे कई बार इस्तेमाल किए जा सकते हैं जब तक कि खत्म न हो जाएं
  - वे सिर्फ कुछ खास लेन-देन में ही इस्तेमाल किए जा सकते हैं
  - वे बिटकॉइन की छोटी निश्चित मात्रा को दर्शाते हैं
explanation: |
  एक बैंकनोट की तरह, UTXO को भी पूरा का पूरा लेन-देन में खर्च करना पड़ता है, और बचा हुआ बैलेंस वापस भेजने वाले को चेंज के तौर पर मिल जाता है।
reviewed: false
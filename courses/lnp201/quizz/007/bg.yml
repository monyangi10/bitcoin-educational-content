question: Защо UTXO често се сравняват с банкноти?
answer: Те трябва да се изразходват изцяло
wrong_answers:
  - Могат да се използват многократно до изчерпване на количествата
  - Те могат да се използват само при някои специфични операции
  - Те представляват малки фиксирани суми биткойни
explanation: |
  Подобно на банкнотата, UTXO трябва да се изразходва изцяло при транзакция, а излишъкът се връща на подателя като дребни пари.
reviewed: true
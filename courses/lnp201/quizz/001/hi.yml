question: एक पेमेंट चैनल में, चैनल की क्षमता क्या होती है?
answer: दोनों प्रतिभागियों के पास कुल जितने फंड हो सकते हैं वो Exchange
wrong_answers:
  - चैनल कितने समय तक खुला रह सकता है
  - एक प्रतिभागी एक ही लेन-देन में अधिकतम कितनी राशि भेज सकता है
  - एक चैनल एक दिन में कितने लेन-देन सपोर्ट कर सकता है
explanation: |
  चैनल की क्षमता दोनों प्रतिभागियों के कुल फंड से मेल खाती है और संभावित लेन-देन तय करने के लिए स्थिर रहती है।

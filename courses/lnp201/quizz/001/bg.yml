question: Какъв е капацитетът на канала за плащания?
answer: Общата сума на средствата, които двамата участници могат да обменят
wrong_answers:
  - Срокът, за който каналът може да остане отворен
  - Максималната сума, която един участник може да изпрати в рамките на една транзакция
  - Броят на транзакциите, които каналът може да поддържа на ден
explanation: |
  Капацитетът на канала съответства на общия размер на средствата на двамата участници и остава фиксиран, за да определи възможните обмени.
reviewed: true
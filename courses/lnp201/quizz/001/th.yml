question: ในช่องทางการชำระเงิน ความจุของช่องทางคืออะไร?
answer: จำนวนเงินทั้งหมดที่ผู้เข้าร่วมทั้งสองสามารถแลกเปลี่ยนได้
wrong_answers:
  - ระยะเวลาที่ช่องสามารถเปิดอยู่ได้
  - จำนวนสูงสุดที่ผู้เข้าร่วมสามารถส่งได้ในธุรกรรมเดียว
  - จำนวนธุรกรรมที่ช่องทางสามารถรองรับได้ต่อวัน
explanation: |
  ความจุของช่องสอดคล้องกับเงินทุนทั้งหมดของผู้เข้าร่วมทั้งสองและยังคงคงที่เพื่อกำหนดการแลกเปลี่ยนที่เป็นไปได้
reviewed: true
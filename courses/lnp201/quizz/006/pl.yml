question: Czym jest UTXO w kontekście Bitcoina?
answer: Niewydane bitcoiny powiązane ze skryptem
wrong_answers:
  - W pełni potwierdzona transakcja w łańcuchu bloków
  - Klucz publiczny, który generuje adresy Bitcoin
  - Ilość bitcoinów podzielona na wiele części
explanation: |
  UTXO, czyli Unspent Transaction Output, to niewydana kwota transakcji, reprezentująca określoną ilość bitcoinów, którą posiadacz może wykorzystać.
reviewed: false

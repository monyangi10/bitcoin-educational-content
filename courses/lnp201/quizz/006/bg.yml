question: Какво е UTXO в контекста на Bitcoin?
answer: Част от неизразходваните биткойни, свързана с даден скрипт
wrong_answers:
  - Напълно потвърдена транзакция в блокчейна
  - Публичен ключ, който генерира Bitcoin адреси
  - Сума биткойн, разделена на няколко части
explanation: |
  UTXO или Unspent Transaction Output е неизразходвана транзакция, която представлява определено количество биткойни, които притежателят може да използва.
reviewed: true
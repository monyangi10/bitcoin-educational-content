question: UTXO คืออะไรในบริบทของ Bitcoin?
answer: ชิ้นส่วนของบิตคอยน์ที่ยังไม่ได้ใช้ที่เกี่ยวข้องกับสคริปต์
wrong_answers:
  - ธุรกรรมที่ได้รับการยืนยันอย่างสมบูรณ์บนบล็อกเชน
  - คีย์สาธารณะที่สร้างที่อยู่ Bitcoin
  - จำนวนบิตคอยน์ที่แบ่งออกเป็นหลายส่วน
explanation: |
  UTXO หรือ Unspent Transaction Output คือเอาต์พุตของธุรกรรมที่ยังไม่ได้ใช้ ซึ่งแสดงถึงจำนวนบิตคอยน์ที่ผู้ถือสามารถใช้ได้
reviewed: true
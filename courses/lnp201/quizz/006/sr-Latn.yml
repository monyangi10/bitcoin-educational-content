question: Šta je UTXO u kontekstu Bitcoin-a?
answer: Deo nepotrošenih bitkoina povezanih sa skriptom
wrong_answers:
  - Potpuno potvrđena transakcija na Blockchain-u
  - Javni ključ koji generiše Bitcoin adrese
  - Iznos bitkoina podeljen na više delova
explanation: |
  UTXO, ili neutrošeni izlaz transakcije, je neutrošeni izlaz transakcije, koji predstavlja određenu količinu bitkoina koju vlasnik može koristiti.
reviewed: true

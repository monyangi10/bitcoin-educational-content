question: UTXO, Bitcoin के संदर्भ में क्या है?
answer: एक स्क्रिप्ट से जुड़े बिना खर्च किए गए बिटकॉइन का एक टुकड़ा
wrong_answers:
  - Blockchain पर पूरी तरह से कन्फर्म हुआ ट्रांजैक्शन
  - Bitcoin पतों को जनरेट करने वाली एक पब्लिक की
  - Bitcoin की रकम को कई हिस्सों में बाँट दिया गया
explanation: |
  UTXO, यानी Unspent Transaction Output, एक अनस्पेंट ट्रांजेक्शन आउटपुट है, जो बिटकॉइन की एक खास रकम को दर्शाता है जिसे होल्डर इस्तेमाल कर सकता है।
reviewed: false
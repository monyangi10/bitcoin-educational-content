question: Koji je prvi korak u otvaranju Lightning kanala između dva učesnika?
answer: Razmenjivanje poruka koje sadrže iznose i javne ključeve
wrong_answers:
  - Odmah objavljivanje transakciju depozita na Blockchain-u
  - Kreiranje 2/2 višepotpisne adrese bez prethodne razmene
  - Potpisivanje transakciju povlačenja pre razmene javnih ključeva
explanation: |
  Otvaranje kanala počinje sa razmenom poruka između dve strane, gde dele iznose koje žele da ulože i svoje javne ključeve.
reviewed: true

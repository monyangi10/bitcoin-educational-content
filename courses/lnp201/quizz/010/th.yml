question: ขั้นตอนแรกในการเปิดช่องทาง Lightning ระหว่างผู้เข้าร่วมสองคนคืออะไร?
answer: ข้อความ Exchange ที่มีจำนวนและกุญแจสาธารณะ
wrong_answers:
  - เผยแพร่ธุรกรรมการฝากบนบล็อกเชนทันที
  - สร้างที่อยู่มัลติซิกเนเจอร์ 2/2 โดยไม่ต้องแลกเปลี่ยนล่วงหน้า
  - ลงนามในธุรกรรมการถอนก่อนการแลกเปลี่ยนคีย์สาธารณะ
explanation: |
  การเปิดช่องทางเริ่มต้นด้วยการแลกเปลี่ยนข้อความระหว่างทั้งสองฝ่าย ซึ่งพวกเขาจะแบ่งปันจำนวนเงินที่ต้องการจะผูกพันและกุญแจสาธารณะของพวกเขา
reviewed: true
question: Jaki jest pierwszy krok do otwarcia kanału Lightning między dwoma uczestnikami?
answer: Wymiana wiadomości zawierającej kwoty i klucze publiczne
wrong_answers:
  - Natychmiastowa publikacja transakcji depozytowej w łańcuchu bloków
  - Utworzenie adresu wielopodpisowego 2/2 bez wcześniejszej interakcji
  - Podpisanie transakcji wypłaty przed wymianą kluczy publicznych
explanation: |
  Otwarcie kanału rozpoczyna się od wymiany wiadomości między dwiema stronami, w których dzielą się one kwotami, które chcą przelać, oraz swoimi kluczami publicznymi.

question: Коя е първата стъпка при откриването на канал Lightning между двама участници?
answer: Exchange съобщения, съдържащи сумите и публичните ключове
wrong_answers:
  - Незабавно публикуване на транзакция за депозит в блокчейна
  - Създаване на адрес с много подписи 2/2 без предварителен обмен
  - Подписване на транзакцията за изтегляне преди обмена на публични ключове
explanation: |
  Откриването на канал започва с обмен на съобщения между двете страни, в които те споделят сумите, които искат да предадат, и своите публични ключове.
reviewed: true
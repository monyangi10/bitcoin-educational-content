question: Koji je glavni cilj Lightning mreže?
answer: Poboljšanje Bitcoin skalabilnosti kako bi se omogućila brza i niskotroškovna plaćanja
wrong_answers:
  - Eliminisanje transakcionih naknada na Bitcoin Blockchain-u
  - Kreiranje Bitcoin alternative za plaćanja visoke vrednosti.
  - Pojednostavljenje razmene između različitih kriptovaluta
explanation: |
  Lightning mreža ima za cilj da poboljša Bitcoin skalabilnost omogućavanjem brzih i jeftinih transakcija putem off-chain platnih kanala.
reviewed: true

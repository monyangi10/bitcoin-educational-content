question: เป้าหมายหลักของ Lightning Network คืออะไร?
answer: เพื่อปรับปรุงความสามารถในการขยายตัวของ Bitcoin เพื่อให้สามารถชำระเงินได้อย่างรวดเร็วและมีต้นทุนต่ำ
wrong_answers:
  - กำจัดค่าธรรมเนียมการทำธุรกรรมบนบล็อกเชน Bitcoin
  - สร้างทางเลือกแทน Bitcoin สำหรับการชำระเงินมูลค่าสูง
  - ทำให้การแลกเปลี่ยนระหว่างสกุลเงินดิจิทัลต่าง ๆ ง่ายขึ้น
explanation: |
  Lightning Network มีเป้าหมายเพื่อเพิ่มความสามารถในการขยายตัวของ Bitcoin โดยการทำให้การทำธุรกรรมผ่านช่องทางการชำระเงิน off-chain รวดเร็วและประหยัดค่าใช้จ่าย
reviewed: true
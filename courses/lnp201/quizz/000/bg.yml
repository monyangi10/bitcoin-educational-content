question: Каква е основната цел на Lightning Network?
answer: Подобряване на мащабируемостта на Bitcoin, за да се осигурят бързи и евтини плащания
wrong_answers:
  - Премахване на таксите за транзакции в блокчейна Bitcoin
  - Създаване на алтернатива на Bitcoin за плащания с висока стойност
  - Опростяване на обмена между различни криптовалути
explanation: |
  Lightning Network има за цел да подобри мащабируемостта на Bitcoin, като даде възможност за бързи и евтини транзакции чрез каналите за плащане на off-chain.
reviewed: true
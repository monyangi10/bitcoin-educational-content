question: Ni itegeko nyamukuru irihe ku bijanye n’amahera uwuriko aragira uruhara ashobora kohereza mu muhora wo kwishura?
answer: Bashobora gusa kohereza ayo mahera bavuye ku ruhande rwabo rw’umuhora.
wrong_answers:
  - Bashobora kohereza gushika ku gice c’ubushobozi bwose bw’uwo muhora.
  - Bashobora kohereza amahera yose, igihe cose habaye amasezerano imbere y’aho.
  - Bashobora kugurana amahera ku ruhande rw’uwundi bari muri iyo nama iyo bikenewe.
explanation: |
  Buri wese mu bari muri iyo nama aragabanywa n’ingero y’amasatoshi afise mu muyoboro kugira ngo akoreshe amafaranga yiwe, ivyo bikaba bituma amahera yama apfutse.

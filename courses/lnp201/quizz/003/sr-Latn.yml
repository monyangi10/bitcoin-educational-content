question: Koje je glavno pravilo u vezi sa sredstvima koje učesnik može poslati u platnom kanalu?
answer: Oni mogu poslati sredstva samo sa svoje strane kanala.
wrong_answers:
  - Oni mogu poslati do polovine ukupnog kapaciteta kanala.
  - Mogu poslati bilo koji iznos, sve dok postoji prethodni dogovor.
  - Oni mogu pozajmiti sredstva sa strane drugog učesnika ako je potrebno.
explanation: |
  Svaki učesnik je ograničen iznosom satoshija koje poseduje u kanalu za svoje transakcije, čime se obezbeđuje da su sredstva uvek pokrivena.
reviewed: true

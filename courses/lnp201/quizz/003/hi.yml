question: भुगतान चैनल में एक प्रतिभागी कितने फंड भेज सकता है, इसका मुख्य नियम क्या है?
answer: वे चैनल के अपने हिस्से से ही पैसे भेज सकते हैं।
wrong_answers:
  - वे चैनल की कुल क्षमता का आधे तक भेज सकते हैं।
  - वे कोई भी रकम भेज सकते हैं, बस पहले से एक सहमति होनी चाहिए।
  - वे ज़रूरत पड़ने पर दूसरे प्रतिभागी की तरफ से पैसे उधार ले सकते हैं।
explanation: |
  हर भागीदार अपने चैनल में जितने सैटोशी रखता है, उसी हद तक अपने लेन-देन के लिए सीमित होता है, यह सुनिश्चित करते हुए कि फंड हमेशा कवर रहें।
reviewed: false
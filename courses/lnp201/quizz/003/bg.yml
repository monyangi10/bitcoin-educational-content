question: Кое е основното правило за средствата, които участникът може да изпрати в платежен канал?
answer: Те могат да изпращат средства само от своята страна на канала.
wrong_answers:
  - Те могат да изпращат до половината от общия капацитет на канала.
  - Те могат да изпратят всякаква сума, стига да има предварително споразумение.
  - При необходимост те могат да заемат средства от страната на другия участник.
explanation: |
  Всеки участник е ограничен до сумата от сатоши, която държи в канала за своите транзакции, което гарантира, че средствата винаги са покрити.
reviewed: true
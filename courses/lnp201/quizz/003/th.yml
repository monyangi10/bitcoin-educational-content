question: กฎหลักเกี่ยวกับเงินทุนที่ผู้เข้าร่วมสามารถส่งในช่องทางการชำระเงินคืออะไร?
answer: พวกเขาสามารถส่งเงินได้เฉพาะจากฝั่งของพวกเขาเองในช่องทางเท่านั้น
wrong_answers:
  - พวกเขาสามารถส่งได้ถึงครึ่งหนึ่งของความจุทั้งหมดของช่องทาง
  - พวกเขาสามารถส่งจำนวนเท่าใดก็ได้ ตราบใดที่มีข้อตกลงล่วงหน้า
  - พวกเขาสามารถยืมเงินจากฝั่งของผู้เข้าร่วมคนอื่นได้หากจำเป็น
explanation: |
  ผู้เข้าร่วมแต่ละคนถูกจำกัดด้วยจำนวนซาโตชิที่พวกเขาถืออยู่ในช่องทางสำหรับการทำธุรกรรมของพวกเขา เพื่อให้แน่ใจว่าเงินทุนจะได้รับการคุ้มครองเสมอ
reviewed: true
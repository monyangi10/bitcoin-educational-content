question: Какво може да направи Bob, ако открие опит за измама от страна на Alice по време на затварянето на канала?
answer: Използване на ключа за оттегляне за възстановяване на всички средства
wrong_answers:
  - Отмяна на Alice на commitment transaction
  - Постоянно затваряне на канала без възможност за повторно отваряне
  - Заявете само половината от наличните средства
explanation: |
  В случай на измама Bob може да използва ключа за оттегляне, за да възстанови всички средства от канала, като по този начин накаже Alice за нейния опит.
reviewed: true
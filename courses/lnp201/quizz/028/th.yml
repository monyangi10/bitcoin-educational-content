question: Bob สามารถทำอะไรได้บ้างหากเขาตรวจพบความพยายามของ Alice ในการโกงระหว่างการปิดช่องทาง?
answer: ใช้กุญแจเพิกถอนเพื่อกู้คืนเงินทั้งหมด
wrong_answers:
  - ยกเลิก Alice's commitment transaction
  - ปิดช่องอย่างถาวรโดยไม่มีตัวเลือกให้เปิดใหม่
  - เรียกร้องเฉพาะครึ่งหนึ่งของเงินทุนที่มีอยู่
explanation: |
  ในกรณีที่มีการโกง Bob สามารถใช้กุญแจเพิกถอนเพื่อกู้คืนเงินทั้งหมดจากช่องทางได้ ซึ่งจะเป็นการลงโทษ Alice สำหรับความพยายามของเธอ
reviewed: true
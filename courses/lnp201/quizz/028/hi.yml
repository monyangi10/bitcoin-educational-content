question: अगर बॉब को चैनल बंद करते समय ऐलिस के धोखा देने की कोशिश का पता चलता है, तो वह क्या कर सकता है?
answer: रिवोकेशन की (revocation key) का इस्तेमाल करके सारे फंड्स वापस ले लो
wrong_answers:
  - ऐलिस का Commitment Transaction कैंसिल कर दो
  - चैनल को हमेशा के लिए बंद कर दो, फिर से खोलने का कोई विकल्प नहीं
  - उपलब्ध धन का सिर्फ आधा ही दावा करें
explanation: |
  धोखाधड़ी की स्थिति में, बॉब चैनल से सारे फंड वापस लेने के लिए रिवोकेशन की (revocation key) का इस्तेमाल कर सकता है, जिससे ऐलिस को उसकी कोशिश की सज़ा मिल जाती है।
reviewed: false
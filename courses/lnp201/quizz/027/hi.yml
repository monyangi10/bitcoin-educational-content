question: मजबूरी में बंद करना कम पसंदीदा क्यों है?
answer: यह धीमा है और फीस भी ज़्यादा हो सकती है
wrong_answers:
  - इसे Satoshi नाकामोटो से अधिकृत करने की जरूरत है
  - यह बाद में चैनल को फिर से बनाने के लिए मजबूर करता है
  - यह रिवोकेशन की (revocation key) का इस्तेमाल रोकता है।
explanation: |
  जबरदस्त बंद करना कम पसंदीदा है क्योंकि इसमें टाइमलॉक शामिल होता है, जो प्रक्रिया को धीमा कर देता है, और फीस भी अनुचित हो सकती है क्योंकि उन्हें चैनल के बनने के समय तय किया गया था।

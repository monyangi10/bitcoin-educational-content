question: Защо принудителното затваряне е по-малко желателно?
answer: Тя е по-бавна и таксите може да са неподходящи
wrong_answers:
  - Изисква разрешение от Satoshi Nakamoto
  - Това налага пресъздаването на канала по-късно
  - Предотвратява използването на ключа за отзоваване
explanation: |
  Принудителното затваряне е по-малко желателно, тъй като включва блокиране на времето, което забавя процеса, а таксите може да са неподходящи, тъй като са били определени по време на създаването на канала.
reviewed: true
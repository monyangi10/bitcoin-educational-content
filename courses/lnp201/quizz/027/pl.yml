question: Dlaczego zamknięcie wymuszone jest mniej pożądane?
answer: Jest wolniejsze, a opłaty mogą być nieodpowiednie
wrong_answers:
  - Wymaga autoryzacji Satoshiego Nakamoto
  - Wymusza późniejsze odtworzenie kanału
  - Zapobiega użyciu klucza odwołania
explanation: |
  Zamknięcie wymuszone jest mniej pożądane, ponieważ zawiera blokadę czasową, która spowalnia proces, a opłaty mogą być nieodpowiednie, ponieważ zostały ustalone w momencie tworzenia kanału.

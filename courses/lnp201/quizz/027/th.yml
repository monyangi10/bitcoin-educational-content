question: ทำไมการปิดกิจการโดยบังคับถึงไม่น่าพึงประสงค์?
answer: มันช้ากว่า และค่าธรรมเนียมอาจไม่เหมาะสม
wrong_answers:
  - ต้องได้รับอนุญาตจาก Satoshi Nakamoto
  - มันบังคับให้สร้างช่องใหม่ในภายหลัง
  - มันป้องกันการใช้กุญแจเพิกถอน
explanation: |
  การปิดแบบบังคับเป็นสิ่งที่ไม่พึงประสงค์มากกว่าเพราะมันรวมถึงการล็อคเวลา ซึ่งทำให้กระบวนการช้าลง และค่าธรรมเนียมอาจไม่เหมาะสมเนื่องจากถูกกำหนดไว้ในเวลาที่สร้างช่องทาง
reviewed: true
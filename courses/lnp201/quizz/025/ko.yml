question: Lightning Network에서 채널을 닫는 세 가지 방법은 무엇인가요?
answer: 협력적 폐쇄, 강제 폐쇄, 부정 행위로 인한 폐쇄
wrong_answers:
  - 빠른 폐쇄, 느린 폐쇄, 이중 서명을 통한 폐쇄
  - 안전한 폐쇄, 자동 폐쇄, 자금 손실로 인한 폐쇄
  - 직접 폐쇄, 간접 폐쇄, 클레임을 통한 폐쇄
explanation: |
  당사자가 합의하는 협력적 종결, 한 당사자의 응답이 없는 강제 종결, 한 당사자가 이전 거래를 게시하려고 시도하는 부정 행위를 통한 종결의 세 가지 방법이 있습니다.
reviewed: true
question: Кои са трите метода за затваряне на канал в Lightning Network?
answer: Закриване в сътрудничество, принудително закриване, закриване с измама
wrong_answers:
  - Бързо затваряне, бавно затваряне, затваряне с двоен подпис
  - Сигурно закриване, автоматизирано закриване, закриване със загуба на средства
  - Пряко приключване, непряко приключване, приключване с претенция
explanation: |
  Съществуват три метода: кооперативно приключване, при което страните се споразумяват; принудително приключване без отговор от една от страните; и приключване с измама, при което една от страните се опитва да публикува стара транзакция.
reviewed: true
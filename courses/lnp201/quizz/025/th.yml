question: วิธีการปิดช่องสัญญาณบน Lightning Network มีอะไรบ้าง?
answer: การปิดกิจการแบบร่วมมือ, การปิดกิจการแบบบังคับ, การปิดกิจการแบบทุจริต
wrong_answers:
  - การปิดอย่างรวดเร็ว, การปิดอย่างช้า, การปิดด้วยลายเซ็นคู่
  - การปิดที่ปลอดภัย, การปิดอัตโนมัติ, การปิดที่สูญเสียเงินทุน
  - การปิดโดยตรง, การปิดโดยอ้อม, การปิดพร้อมการเรียกร้อง
explanation: |
  มีสามวิธี: การปิดร่วมมือกัน ซึ่งทั้งสองฝ่ายตกลงกัน; การปิดบังคับโดยไม่มีการตอบสนองจากฝ่ายหนึ่ง; และการปิดด้วยการโกง ซึ่งฝ่ายหนึ่งพยายามที่จะเผยแพร่ธุรกรรมเก่า
reviewed: true
question: कौन सी सेवा चैनल के दूसरी तरफ लिक्विडिटी को मूव करने की अनुमति देती है, जबकि फंड्स On-Chain को वापस लिया जा रहा हो?
answer: लूप आउट
wrong_answers:
  - की-सेंड
  - एलएनयूआरएल
  - कॉइनस्वैप
explanation: |
  लाइटनिंग लैब्स का लूप आउट सर्विस On-Chain Blockchain से लाइटनिंग चैनल से फंड ट्रांसफर करने में मदद करता है, जिससे मेन चेन पर बिटकॉइन वापस लेते समय रिसीविंग कैपेसिटी ऑप्टिमाइज़ होती है।
reviewed: false
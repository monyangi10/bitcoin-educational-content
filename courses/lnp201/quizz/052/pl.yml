question: Która usługa umożliwia przenoszenie płynności na przeciwną stronę kanału przy jednoczesnym odzyskiwaniu środków on-chain?
answer: Loop Out
wrong_answers:
  - Keysend
  - LNURL
  - CoinSwap
explanation: |
  Usługa Loop Out firmy Lightning Labs umożliwia transfer środków z kanału Lightning do łańcucha bloków, optymalizując w ten sposób pojemność odbiorczą podczas pobierania bitcoinów w głównym łańcuchu.
reviewed: true

question: Коя услуга позволява преместване на ликвидност към противоположната страна на канала, като същевременно се изтеглят средства on-chain?
answer: Излизане от контура
wrong_answers:
  - Keysend
  - LNURL
  - CoinSwap
explanation: |
  Услугата Loop Out на Lightning Labs позволява прехвърляне на средства от канал на Lightning към блокчейна on-chain, като по този начин се оптимизира капацитетът за получаване на биткойни в основната верига.
reviewed: true
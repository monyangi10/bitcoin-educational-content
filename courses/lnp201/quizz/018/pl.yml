question: W jaki sposób tworzony jest nowy stan kanału po każdym przelewie?
answer: Tworząc nową transkację zobowiązującą ze zaktualizowaną dystrybucją środków
wrong_answers:
  - Księgując transakcję on-chain po każdym przelewie
  - Zwiększając całkowitą przepustowość kanału
  - Zamykając i ponownie otwierając kanał po każdej transakcji
explanation: |
  Każda transakcja w ramach kanału aktualizuje stan kanału o nową transakcję zobowiązującą, odzwierciedlając bieżący podział środków między dwoma uczestnikami.
reviewed: true

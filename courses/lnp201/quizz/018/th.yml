question: สถานะช่องใหม่ถูกสร้างขึ้นอย่างไรหลังจากการโอนแต่ละครั้ง?
answer: โดยการสร้าง commitment transaction ใหม่ด้วยการกระจายที่อัปเดตแล้ว
wrong_answers:
  - โดยการโพสต์ธุรกรรม on-chain หลังจากการโอนแต่ละครั้ง
  - โดยการเพิ่มความจุทั้งหมดของช่องทาง
  - โดยการปิดและเปิดช่องใหม่หลังจากแต่ละธุรกรรม
explanation: |
  ธุรกรรมแต่ละรายการภายในช่องทางจะอัปเดตสถานะของช่องทางด้วย commitment transaction ใหม่ ซึ่งสะท้อนถึงการกระจายเงินทุนปัจจุบันระหว่างผู้เข้าร่วมทั้งสองฝ่าย
reviewed: true
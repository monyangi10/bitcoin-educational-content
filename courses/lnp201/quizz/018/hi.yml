question: हर ट्रांसफर के बाद नया चैनल स्टेट कैसे बनता है?
answer: एक नया Commitment Transaction बनाकर जिसमें अपडेटेड डिस्ट्रीब्यूशन है
wrong_answers:
  - हर ट्रांसफर के बाद On-Chain ट्रांजैक्शन पोस्ट करके
  - चैनल की कुल क्षमता बढ़ाकर
  - हर लेन-देन के बाद चैनल को बंद करके और फिर से खोलकर
explanation: |
  चैनल के अंदर हर लेन-देन चैनल की स्थिति को एक नए Commitment Transaction से अपडेट करता है, जो दोनों भागीदारों के बीच फंड के वर्तमान वितरण को दर्शाता है।

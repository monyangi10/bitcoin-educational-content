question: Как се създава ново състояние на канала след всяко прехвърляне?
answer: Създаване на нов commitment transaction с актуализираната дистрибуция
wrong_answers:
  - Чрез осчетоводяване на транзакция on-chain след всеки трансфер
  - Чрез увеличаване на общия капацитет на канала
  - Чрез затваряне и повторно отваряне на канала след всяка транзакция
explanation: |
  Всяка транзакция в рамките на канала актуализира състоянието на канала с нов commitment transaction, който отразява текущото разпределение на средствата между двамата участници.
reviewed: true
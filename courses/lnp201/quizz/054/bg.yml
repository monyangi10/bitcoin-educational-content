question: Какъв вид ликвидност трябва да управлява продавачът в Lightning Network, за да приема плащания?
answer: Входяща ликвидност
wrong_answers:
  - Изходяща ликвидност
  - Висок общ капацитет на канала
  - Висок баланс на on-chain
explanation: |
  За да получава плащания, продавачът трябва да има входяща ликвидност, т.е. да разполага със средства от другата страна на канала, за да може да приема плащания.
reviewed: true
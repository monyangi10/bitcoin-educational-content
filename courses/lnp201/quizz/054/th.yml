question: ผู้ขายบน Lightning Network ต้องจัดการสภาพคล่องประเภทใดเป็นหลักเพื่อรับชำระเงิน?
answer: สภาพคล่องที่เข้ามา
wrong_answers:
  - สภาพคล่องขาออก
  - ความจุช่องสัญญาณรวมสูง
  - ยอดคงเหลือ on-chain สูง
explanation: |
  ในการรับชำระเงิน ผู้ขายจำเป็นต้องมีสภาพคล่องขาเข้า หมายความว่าต้องมีเงินทุนพร้อมใช้งานในฝั่งตรงข้ามของช่องทางเพื่อให้พวกเขาสามารถรับชำระเงินได้
reviewed: true
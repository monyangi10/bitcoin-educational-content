question: Lightning Network पर सेलर को पेमेंट स्वीकार करने के लिए मुख्य रूप से किस तरह की लिक्विडिटी मैनेज करनी चाहिए?
answer: आने वाली नकदी
wrong_answers:
  - बाहर जाने वाली तरलता
  - एक उच्च कुल चैनल क्षमता
  - एक हाई On-Chain बैलेंस
explanation: |
  भुगतान प्राप्त करने के लिए, एक विक्रेता के पास इनकमिंग लिक्विडिटी (आने वाली नकदी) होनी चाहिए, यानी चैनल के दूसरी तरफ फंड उपलब्ध होने चाहिए ताकि वे भुगतान स्वीकार कर सकें।
reviewed: false
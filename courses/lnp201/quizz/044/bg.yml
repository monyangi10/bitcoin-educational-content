question: Какво прави изпращащият възел, когато маршрутът на плащане се провали поради недостатъчна ликвидност?
answer: Опитва друг маршрут, докато намери функционален
wrong_answers:
  - Той автоматично изпраща искане за възстановяване на средства до получателя
  - Затваря канала и създава нов директен канал
  - Той изисква от междинните възли да увеличат своята ликвидност
explanation: |
  Когато даден маршрут е неуспешен, изпращащият възел опитва други алтернативни маршрути, докато не намери функционален път или докато не изчерпи всички възможности.
reviewed: true
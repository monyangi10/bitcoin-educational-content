question: जब भुगतान का रास्ता कम लिक्विडिटी की वजह से फेल हो जाता है, तो भेजने वाला नोड क्या करता है?
answer: यह दूसरा रास्ता आज़माता है जब तक कि कोई काम करने वाला रास्ता नहीं मिल जाता
wrong_answers:
  - यह स्वचालित रूप से प्राप्तकर्ता को धनवापसी का अनुरोध भेज देता है
  - यह चैनल को बंद कर देता है और एक नया सीधा चैनल बनाता है
  - यह बिचौलिया नोड्स से उनकी लिक्विडिटी बढ़ाने के लिए कहता है
explanation: |
  जब कोई रूट फेल हो जाता है, तो भेजने वाला नोड दूसरे वैकल्पिक रूट्स को ट्राई करता है जब तक कि कोई काम करने वाला रास्ता न मिल जाए, या फिर सारे ऑप्शन्स खत्म न हो जाएं।
reviewed: false
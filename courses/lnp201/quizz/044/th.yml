question: โหนดที่ส่งจะทำอย่างไรเมื่อเส้นทางการชำระเงินล้มเหลวเนื่องจากสภาพคล่องไม่เพียงพอ?
answer: มันพยายามเส้นทางอื่นจนกว่าจะพบเส้นทางที่ใช้งานได้
wrong_answers:
  - มันจะส่งคำขอคืนเงินไปยังผู้รับโดยอัตโนมัติ
  - มันปิดช่องและสร้างช่องทางตรงใหม่
  - มันขอให้โหนดตัวกลางเพิ่มสภาพคล่องของพวกเขา
explanation: |
  เมื่อเส้นทางล้มเหลว โหนดที่ส่งจะพยายามเส้นทางทางเลือกอื่น ๆ จนกว่าจะพบเส้นทางที่ใช้งานได้หรือหมดตัวเลือกทั้งหมด
reviewed: true
question: आखिर एलिस और बॉब Commitment ट्रांजैक्शन्स के लिए अपने राज Exchange क्यों करते हैं?
answer: अगर दूसरा पक्ष कोई पुराना लेन-देन प्रकाशित करता है, तो हर किसी को खुद को बचाने का मौका देना
wrong_answers:
  - चैनल की क्षमता बढ़ाने के लिए
  - एक-दूसरे को फंड्स तक पहुंच से रोकने के लिए
  - फंड को बराबर बांटना
explanation: |
  पिछले लेन-देन के बदले में राज़ों का आदान-प्रदान करने से हर भागीदार को धोखा देने की कोशिश (पुराने लेन-देन को प्रकाशित करके) करने पर दूसरे को सज़ा देने का मौका मिलता है।
reviewed: false
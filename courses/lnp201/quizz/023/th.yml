question: ทำไม Alice และ Bob ถึงแลกเปลี่ยนความลับของพวกเขาสำหรับธุรกรรมที่เคยให้คำมั่นไว้ก่อนหน้านี้?
answer: เพื่อให้แต่ละคนสามารถป้องกันตนเองได้หากอีกฝ่ายเผยแพร่ธุรกรรมเก่า
wrong_answers:
  - เพื่อเพิ่มความจุของช่องทาง
  - เพื่อปิดกั้นการเข้าถึงเงินทุนของกันและกัน
  - แบ่งเงินทุนอย่างเท่าเทียมกัน
explanation: |
  การแลกเปลี่ยนความลับสำหรับธุรกรรมก่อนหน้านี้ทำให้ผู้เข้าร่วมแต่ละคนสามารถลงโทษอีกฝ่ายในกรณีที่มีความพยายามโกงโดยการเผยแพร่ธุรกรรมเก่า
reviewed: true
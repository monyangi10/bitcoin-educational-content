question: Dlaczego Alice i Bob Exchange mają swoje sekrety dla poprzednich transakcji Commitment?
answer: Aby umożliwić każdemu z nich ochronę, jeśli drugi opublikuje starą transakcję
wrong_answers:
  - Aby zwiększyć przepustowość kanału
  - Blokowanie sobie nawzajem dostępu do funduszy
  - Aby podzielić fundusze po równo
explanation: |
  Wymiana sekretów dotyczących poprzednich transakcji pozwala każdemu uczestnikowi ukarać drugiego w przypadku próby oszustwa poprzez opublikowanie starej transakcji.
reviewed: false
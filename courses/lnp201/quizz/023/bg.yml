question: Защо Alice и Bob обменят тайните си за предишни транзакции за поемане на задължения?
answer: За да може всеки от тях да се защити, ако другият публикува стара транзакция
wrong_answers:
  - Увеличаване на капацитета на канала
  - Да блокират взаимно достъпа си до средствата
  - Да се разделят средствата поравно
explanation: |
  Размяната на тайни за предишни транзакции позволява на всеки участник да накаже другия в случай на опит за измама чрез публикуване на стара транзакция.
reviewed: true
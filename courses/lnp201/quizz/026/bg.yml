question: Кой метод за затваряне на канали е най-икономичен и бърз?
answer: Приключване на сътрудничеството
wrong_answers:
  - Принудително затваряне
  - Затваряне с измама
  - Никой не е по-икономичен и бърз
explanation: |
  Съвместното затваряне е най-бързият и икономичен метод, тъй като и двете страни се съгласяват да затворят канала, като коригират таксите в зависимост от пазарните условия.
reviewed: true
question: सबसे सस्ता और तेज़ चैनल बंद करने का तरीका कौन सा है?
answer: सहकारी समापन
wrong_answers:
  - जबरन बंदी
  - धोखे के साथ समाप्ति
  - कोई भी इतना किफायती और तेज़ नहीं है
explanation: |
  सहकारी बंदी सबसे तेज़ और किफायती तरीका है क्योंकि दोनों पक्ष चैनल बंद करने पर सहमत होते हैं, और मार्केट के हालात के मुताबिक फीस में समायोजन करते हैं।
reviewed: false
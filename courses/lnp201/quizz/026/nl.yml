question: Welke methode om kanalen te sluiten is het voordeligst en snelst?
answer: Coöperatieve sluiting
wrong_answers:
  - Gedwongen sluiting
  - Afsluiting met valsspelen
  - Geen enkele is zuiniger en sneller
explanation: |
  Coöperatieve afsluiting is de snelste en voordeligste methode omdat beide partijen overeenkomen om het kanaal af te sluiten, waarbij de vergoedingen worden aangepast aan de marktomstandigheden.
reviewed: false
question: วิธีการปิดช่องทางใดที่ประหยัดและรวดเร็วที่สุด?
answer: การปิดร่วมมือ
wrong_answers:
  - การปิดบังคับ
  - การปิดฉากด้วยการนอกใจ
  - ไม่มีใครที่ประหยัดและรวดเร็วกว่า
explanation: |
  การปิดแบบร่วมมือกันเป็นวิธีที่เร็วที่สุดและประหยัดที่สุดเพราะทั้งสองฝ่ายตกลงที่จะปิดช่องทาง โดยปรับค่าธรรมเนียมตามสภาพตลาด
reviewed: true
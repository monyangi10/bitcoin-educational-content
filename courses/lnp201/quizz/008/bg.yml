question: Как работи адресът с много подписи 2/2 в Bitcoin?
answer: Необходими са два подписа, за да се отключат и изразходват средствата.
wrong_answers:
  - Тя позволява изразходването на средствата само с един от двата ключа.
  - Тя разрешава транзакции само в определени случаи на заключване.
  - Той се използва само за изпращане на средства на публични адреси.
explanation: |
  Многоподписният адрес 2/2 изисква подписите на двете участващи страни, за да бъдат изразходвани средствата, което се използва за сигурността на каналите за мълнии.
reviewed: true
question: Kako funkcioniše 2/2 višepotpisna adresa u Bitcoin-u?
answer: Za otključavanje i trošenje sredstava potrebna su dva potpisa.
wrong_answers:
  - Omogućava trošenje sredstava sa samo jednim od dva ključa.
  - Odobrava transakcije samo u određenim slučajevima zaključavanja.
  - Koristi se samo za slanje sredstava na javne adrese.
explanation: |
  2/2 višepotpisna adresa zahteva potpise obe uključene strane kako bi sredstva bila potrošena, što se koristi za sigurnost Lightning kanala.
reviewed: true

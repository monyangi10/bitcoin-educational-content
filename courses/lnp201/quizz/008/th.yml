question: ที่อยู่แบบ multisignature 2/2 ใน Bitcoin ทำงานอย่างไร?
answer: ต้องใช้ลายเซ็นสองลายเพื่อปลดล็อกและใช้จ่ายเงินทุน
wrong_answers:
  - มันอนุญาตให้ใช้จ่ายเงินด้วยกุญแจเพียงหนึ่งในสองดอก
  - มันอนุญาตให้ทำธุรกรรมเฉพาะในกรณีที่มีการล็อกเท่านั้น
  - มันถูกใช้เพื่อส่งเงินไปยังที่อยู่สาธารณะเท่านั้น
explanation: |
  ที่อยู่มัลติซิกเนเจอร์ 2/2 ต้องการลายเซ็นของทั้งสองฝ่ายที่เกี่ยวข้องเพื่อให้สามารถใช้จ่ายเงินได้ ซึ่งใช้เพื่อความปลอดภัยของช่องทาง Lightning
reviewed: true
question: 2/2 다중 서명 Address은 Bitcoin에서 어떻게 작동하나요?
answer: 자금을 잠금 해제하고 사용하려면 두 번의 서명이 필요합니다.
wrong_answers:
  - 두 개의 키 중 하나만 사용하여 자금을 사용할 수 있습니다.
  - 특정 잠금의 경우에만 거래를 승인합니다.
  - 공개 주소로 자금을 송금할 때만 사용됩니다.
explanation: |
  2/2 다중 서명 Address는 라이트닝 채널의 보안을 위해 사용되는 자금 지출을 위해 관련 당사자 모두의 서명이 필요합니다.
reviewed: true
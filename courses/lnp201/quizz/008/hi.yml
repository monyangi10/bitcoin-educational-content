question: एक 2/2 मल्टीसिग्नेचर Address, Bitcoin में कैसे काम करता है?
answer: इसे अनलॉक करने और फंड खर्च करने के लिए दो हस्ताक्षर चाहिए।
wrong_answers:
  - यह फंड्स को दोनों में से सिर्फ एक की (key) से खर्च करने की अनुमति देता है।
  - यह केवल लॉकिंग के खास मामलों में ही लेन-देन की अनुमति देता है।
  - यह सिर्फ पब्लिक एड्रेस पर पैसे भेजने के लिए इस्तेमाल होता है।
explanation: |
  एक 2/2 मल्टीसिग्नेचर Address में फंड खर्च करने के लिए दोनों पार्टियों के सिग्नेचर की जरूरत होती है, जो लाइटनिंग चैनल्स की सुरक्षा के लिए इस्तेमाल किया जाता है।
reviewed: false
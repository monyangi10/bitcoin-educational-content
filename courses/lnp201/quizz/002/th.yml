question: หาก Alice ส่ง 40,000 ซาโตชิไปยัง Bob จากช่องทางการชำระเงินที่เธอมี 100,000 ซาโตชิในตอนแรก เธอจะเหลือเงินเท่าไหร่หลังจากการทำธุรกรรม?
answer: 60,000 ซาโตชิ
wrong_answers:
  - 30,000 ซาโตชิ
  - 40,000 ซาโตชิ
  - 140,000 ซาโตชิ
explanation: |
  หลังจากส่ง 40,000 ซาโตชิ ยอดคงเหลือของ Alice ในช่องทางคือ 60,000 ซาโตชิ
reviewed: true
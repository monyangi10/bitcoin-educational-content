question: अगर ऐलिस ने बॉब को 40,000 सातोशी भेजे एक पेमेंट चैनल से जहां उसके पास शुरुआत में 100,000 सातोशी थे, तो ट्रांजैक्शन के बाद उसके पास कितने फंड बचे?  

**कैलकुलेशन:**  
शुरुआती बैलेंस: 100,000 सातोशी  
भेजी गई रकम: 40,000 सातोशी  
बचा हुआ बैलेंस: 100,000 - 40,000 = **60,000 सातोशी**  

जवाब: ऐलिस के पास अब **60,000 सातोशी** बचे हैं।
answer: 60,000 सतोशी
wrong_answers:
  - 30,000 सातोशी
  - 40,000 सातोशी
  - 1,40,000 सतोशी
explanation: |
  40,000 सतोशी भेजने के बाद, ऐलिस का चैनल में बैलेंस 60,000 सतोशी रह गया है।

question: Ако Alice изпрати 40 000 сатоши на Bob от платежен канал, в който първоначално има 100 000 сатоши, колко средства й остават след транзакцията?
answer: 60,000 сатоши
wrong_answers:
  - 30 000 сатоши
  - 40 000 сатоши
  - 140 000 сатоши
explanation: |
  След изпращането на 40 000 сатоши балансът на Alice в канала е 60 000 сатоши.
reviewed: true
question: ทำไมผู้ขายอาจทำการชำระเงินปลอมในช่องทาง?
answer: เพื่อย้ายสภาพคล่องไปยังฝั่งตรงข้าม
wrong_answers:
  - เพื่อลดค่าธรรมเนียมการกำหนดเส้นทาง
  - เพื่อเพิ่มความจุรวมของช่องทางของพวกเขา
  - เพื่อล็อคเงินทุนในระยะยาว
explanation: |
  โดยการทำการชำระเงินที่สมมติขึ้น ผู้ขายจะย้ายสภาพคล่องจากฝั่งของตนไปยังฝั่งตรงข้ามของช่องทาง ทำให้มีความสามารถในการรับการชำระเงินที่เข้ามาได้มากขึ้น
reviewed: true
question: Защо продавачът може да извърши фиктивно плащане в канала?
answer: Преместване на течността на противоположната страна
wrong_answers:
  - Намаляване на таксите за маршрутизиране
  - Увеличаване на общия капацитет на техните канали
  - За да блокирате средства в дългосрочен план
explanation: |
  Като извършва фиктивно плащане, продавачът прехвърля ликвидност от своята страна към противоположната страна на канала, като по този начин освобождава входящ капацитет за получаване на плащания.
reviewed: true
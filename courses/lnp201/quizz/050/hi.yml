question: एक विक्रेता चैनल में नकली भुगतान क्यों कर सकता है?
answer: लिक्विडिटी को विपरीत दिशा में ले जाने के लिए
wrong_answers:
  - रूटिंग फीस कम करने के लिए
  - अपने चैनलों की कुल क्षमता बढ़ाने के लिए
  - लंबे समय के लिए धन को लॉक करना
explanation: |
  एक काल्पनिक भुगतान करके, एक विक्रेता अपनी तरफ से चैनल के दूसरी तरफ तरलता (लिक्विडिटी) को शिफ्ट कर देता है, जिससे भुगतान प्राप्त करने के लिए इनकमिंग क्षमता खुल जाती है।

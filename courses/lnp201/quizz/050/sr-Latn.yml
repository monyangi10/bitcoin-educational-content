question: Zašto bi prodavac izvršio fiktivno plaćanje u kanalu?
answer: Radi premeštanja likvidnost na suprotnu stranu
wrong_answers:
  - Zbog smanjivanja troškova rutiranja
  - Radi povećanja ukupnog kapaciteta svojih kanala
  - Zbog zaključavanja sredstava na duži rok
explanation: |
  Pravljenjem fiktivne uplate, prodavac premešta likvidnost sa svoje strane na suprotnu stranu kanala, čime oslobađa dolazni kapacitet za primanje uplata.
reviewed: true

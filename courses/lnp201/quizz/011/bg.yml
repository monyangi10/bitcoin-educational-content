question: Защо Alice създава транзакция за теглене, преди да публикува транзакцията за депозит?
answer: Да получи средствата си в случай на проблем с Bob
wrong_answers:
  - Увеличаване на капацитета на канала с всяка транзакция
  - Извършване на транзакция Lightning веднага след отваряне
  - Да се позволи на Bob да изразходва средствата директно
explanation: |
  Alice създава транзакция за изтегляне, за да получи средствата си, ако възникне проблем с Bob, като по този начин гарантира сигурността на депозита си.
reviewed: true
question: Alice이 입금 트랜잭션을 게시하기 전에 출금 트랜잭션을 생성하는 이유는 무엇인가요?
answer: Bob에 문제가 발생한 경우 자금을 회수하기 위해
wrong_answers:
  - 각 트랜잭션마다 채널의 용량을 늘리려면 다음과 같이 하세요
  - 라이트닝 트랜잭션을 오픈 직후에 수행하려면 다음과 같이 하세요
  - Bob가 자금을 직접 사용할 수 있도록 하려면 다음과 같이 하세요
explanation: |
  Alice은 Bob에 문제가 발생하면 자금을 회수하기 위해 출금 거래를 생성하여 예치금의 안전을 보장합니다.
reviewed: true
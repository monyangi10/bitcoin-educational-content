question: ทำไม Alice ถึงสร้างธุรกรรมการถอนก่อนที่จะเผยแพร่ธุรกรรมการฝาก?
answer: เพื่อเรียกคืนเงินของเธอในกรณีที่มีปัญหากับ Bob
wrong_answers:
  - เพื่อเพิ่มความจุของช่องทางในแต่ละธุรกรรม
  - ทำธุรกรรม Lightning ทันทีหลังจากเปิด
  - เพื่ออนุญาตให้ Bob ใช้จ่ายเงินโดยตรง
explanation: |
  Alice สร้างธุรกรรมการถอนเงินเพื่อดึงเงินของเธอคืนหากเกิดปัญหากับ Bob เพื่อให้มั่นใจในความปลอดภัยของเงินฝากของเธอ
reviewed: true
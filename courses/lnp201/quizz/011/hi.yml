question: ऐलिस डिपॉजिट ट्रांजैक्शन पब्लिश करने से पहले व्हिड्रॉल ट्रांजैक्शन क्यों बनाती है?
answer: अगर बॉब के साथ कोई दिक्कत हो तो उसके पैसे वापस पाने के लिए
wrong_answers:
  - हर लेन-देन के साथ चैनल की क्षमता बढ़ाने के लिए
  - खोलते ही तुरंत एक लाइटनिंग लेनदेन करने के लिए
  - बॉब को सीधे फंड खर्च करने की अनुमति देने के लिए
explanation: |
  ऐलिस ने अपने पैसे वापस लेने के लिए एक ट्रांजैक्शन बनाया, अगर बॉब के साथ कोई दिक्कत होती है। इससे उसके जमा किए पैसे सुरक्षित रहते हैं।
reviewed: false
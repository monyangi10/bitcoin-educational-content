question: Zašto Alisa kreira transakciju povlačenja pre nego što objavi transakciju depozita?
answer: Da povrati svoja sredstva u slučaju problema sa Bobom
wrong_answers:
  - Da poveća kapacitet kanala sa svakom transakcijom
  - Da izvrši Lightning transakciju odmah nakon otvaranja
  - Da bi Bobu omogućila da direktno troši sredstva
explanation: |
  Alisa kreira transakciju povlačenja kako bi povratila svoja sredstva ako dođe do problema sa Bobom, čime osigurava sigurnost svog depozita.
reviewed: true

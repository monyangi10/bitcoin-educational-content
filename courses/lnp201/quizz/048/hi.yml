question: Keysend टेक्नोलॉजी कैसे बिना Invoice के फंड ट्रांसफर को संभव बनाती है?
answer: भेजने वाला HTLCs में एक गुप्त कोड बनाता है ताकि पैसे खोले जा सकें।
wrong_answers:
  - प्राप्तकर्ता ट्रांसफर को वैध करने के लिए एक Hash जनरेट करता है।
  - भुगतान सीधे भेजने वाले और प्राप्त करने वाले के बीच एक चैनल के जरिए वैलिडेट किया जाता है।
  - फंड्स बिना किसी अतिरिक्त सुरक्षा के सीधे जमा कर दिए जाते हैं
explanation: |
  की-सेंड भेजने वाले को generate में HTLCs के अंदर एक गुप्त संदेश छुपाने की अनुमति देता है, जिससे प्राप्तकर्ता बिना Invoice जारी किए ही फंड्स को अनलॉक कर सकता है।

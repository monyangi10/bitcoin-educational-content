question: เทคโนโลยี Keysend ช่วยให้การโอนเงินโดยไม่ต้องมีใบแจ้งหนี้ได้อย่างไร?
answer: ผู้ส่งสร้างความลับใน HTLCs เพื่อปลดล็อกเงินทุน
wrong_answers:
  - ผู้รับสร้างแฮชเพื่อยืนยันการโอน
  - การชำระเงินได้รับการตรวจสอบผ่านช่องทางโดยตรงระหว่างผู้ส่งและผู้รับ
  - เงินจะถูกโอนเข้าบัญชีโดยตรงโดยไม่มีการรักษาความปลอดภัยเพิ่มเติม
explanation: |
  Keysend อนุญาตให้ผู้ส่งไปยัง generate ฝังความลับใน HTLCs ทำให้ผู้รับสามารถปลดล็อกเงินได้โดยไม่ต้องออกใบแจ้งหนี้
reviewed: true
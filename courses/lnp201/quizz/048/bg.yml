question: Как технологията Keysend позволява прехвърляне на средства без фактура?
answer: Изпращачът генерира тайна в HTLC, за да отключи средствата
wrong_answers:
  - Получателят генерира хеш, за да потвърди трансфера
  - Плащането се валидира по директен канал между изпращача и получателя
  - Средствата се превеждат директно, без да се изисква допълнителна сигурност
explanation: |
  Keysend позволява на изпращача да generate тайна, вградена в HTLC, което позволява на получателя да отключи средствата, без да е издал фактура.
reviewed: true
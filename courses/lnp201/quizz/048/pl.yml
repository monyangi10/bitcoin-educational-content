question: W jaki sposób technologia Keysend umożliwia transfer środków bez faktury?
answer: Nadawca generuje sekret w kontrakcie HTLC, aby odblokować środki
wrong_answers:
  - Odbiorca generuje hasz w celu zatwierdzenia przelewu
  - Płatność jest zatwierdzana za pośrednictwem bezpośredniego kanału między nadawcą a odbiorcą
  - Środki są zasilane bezpośrednio bez dodatkowych zabezpieczeń
explanation: |
  Keysend pozwala nadawcy na wygenerowanie sekretu osadzonego w HTLC, umożliwiając odbiorcy odblokowanie środków bez wydawania faktury.

question: บทบาทหลักของโหนดที่ส่งในเส้นทางบน Lightning Network คืออะไร?
answer: คำนวณเส้นทางทั้งหมดไปยังผู้รับ
wrong_answers:
  - จัดเก็บข้อมูลสภาพคล่องของช่องทางทั้งหมดในเครือข่าย
  - กำหนดค่าธรรมเนียมการทำธุรกรรมสำหรับแต่ละโหนดตัวกลาง
  - สื่อสารโดยตรงกับโหนดตัวกลางทั้งหมด
explanation: |
  โหนดที่ส่งมีหน้าที่ในการคำนวณเส้นทางทั้งหมดไปยังผู้รับ เนื่องจากโหนดตัวกลางจะรู้จักเพียงเพื่อนบ้านที่อยู่ใกล้เคียงเท่านั้น
reviewed: true
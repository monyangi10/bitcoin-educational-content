question: Lightning Network पर रूटिंग में सेंडिंग नोड (भेजने वाले नोड) की मुख्य भूमिका क्या है?
answer: पूरा रास्ता प्राप्तकर्ता तक कैलकुलेट करें
wrong_answers:
  - नेटवर्क के सभी चैनलों की लिक्विडिटी जानकारी स्टोर करें
  - हर बिचौलिया नोड के लेन-देन शुल्क का पता लगाएं
  - सभी बिचौलिया नोड्स के साथ सीधे संवाद करें
explanation: |
  भेजने वाला नोड प्राप्तकर्ता तक के पूरे रूट की गणना करने के लिए जिम्मेदार होता है, क्योंकि बीच के नोड्स को सिर्फ अपने पड़ोसी नोड का ही पता होता है।
reviewed: false
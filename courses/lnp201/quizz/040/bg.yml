question: Каква е основната роля на изпращащия възел в маршрутизацията в Lightning Network?
answer: Изчисляване на пълния маршрут до получателя
wrong_answers:
  - Съхранявайте информацията за ликвидността на всички канали на мрежата
  - Определяне на таксите за транзакции за всеки междинен възел
  - Комуникирайте директно с всички междинни възли
explanation: |
  Изпращащият възел е отговорен за изчисляването на целия маршрут до получателя, тъй като междинните възли познават само непосредствения си съсед.
reviewed: true
question: Какъв критерий може да помогне на даден възел да избере ефективен маршрут за плащане?
answer: Вероятността за успех въз основа на общия капацитет на каналите
wrong_answers:
  - Географското разстояние между възлите
  - Наличието на възли с ниско ниво на таксите
  - Брой плащания, извършени от целевия възел
explanation: |
  Общият капацитет на каналите може да показва по-голяма вероятност за успех, тъй като предполага по-голяма наличност на ликвидност за сделките.
reviewed: true
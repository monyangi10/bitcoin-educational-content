question: เกณฑ์ใดที่สามารถช่วยให้โหนดเลือกเส้นทางการชำระเงินที่มีประสิทธิภาพ?
answer: ความน่าจะเป็นของความสำเร็จขึ้นอยู่กับความจุรวมของช่องทาง
wrong_answers:
  - ระยะทางทางภูมิศาสตร์ระหว่างโหนด
  - การมีอยู่ของโหนดที่มีระดับค่าธรรมเนียมต่ำ
  - จำนวนการชำระเงินที่ทำโดยโหนดเป้าหมาย
explanation: |
  ความจุทั้งหมดของช่องทางสามารถบ่งบอกถึงความน่าจะเป็นของความสำเร็จที่สูงขึ้น เนื่องจากแสดงถึงความพร้อมใช้งานของสภาพคล่องสำหรับการทำธุรกรรมที่มากขึ้น
reviewed: true
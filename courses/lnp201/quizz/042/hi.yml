question: एक नोड किस आधार पर एक कुशल भुगतान रूट चुन सकता है?
answer: चैनलों की कुल क्षमता के आधार पर सफलता की संभावना
wrong_answers:
  - नोड्स के बीच की भौगोलिक दूरी
  - कम फीस स्तर वाले नोड्स की मौजूदगी
  - लक्ष्य नोड द्वारा किए गए भुगतानों की संख्या
explanation: |
  चैनलों की कुल क्षमता सफलता की अधिक संभावना को दर्शा सकती है, क्योंकि यह लेन-देन के लिए तरलता की अधिक उपलब्धता का संकेत देती है।
reviewed: false
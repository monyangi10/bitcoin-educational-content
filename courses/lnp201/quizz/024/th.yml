question: ผลรวมของการใช้ timelock และ revocation key บน commitment transactions คืออะไร?
answer: พวกเขายับยั้งผู้เข้าร่วมจากการโกงโดยการเสนอการลงโทษทันที
wrong_answers:
  - พวกเขาลดความจุของช่องทางในกรณีที่มีการโกง
  - พวกเขาจะล็อคเงินของฝ่ายที่มีความผิดโดยอัตโนมัติ
  - พวกเขาบังคับให้เปิดช่องทางใหม่หากธุรกรรมไม่ถูกต้อง
explanation: |
  การล็อกเวลาและกุญแจเพิกถอนช่วยยับยั้งผู้เข้าร่วมจากการโกงโดยการรับรองว่าความพยายามใด ๆ ในการโกงจะส่งผลให้เกิดการสูญเสียเงินทันทีสำหรับฝ่ายที่มีความผิด
reviewed: true
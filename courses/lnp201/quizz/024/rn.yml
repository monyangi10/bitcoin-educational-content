question: Ni ingaruka izihe zihurikiye hamwe z’ugufunga igihe n’urufunguzo rwo gukuraho ku bikorwa vya Commitment?
answer: Babuza abaje muri iyo nama guhenda mu gutanga igihano gica gica .
wrong_answers:
  - Bagabanya ubushobozi bw'umurongo mu gihe hoba hariho ubuhendanyi
  - Bica bifunga amahera y'uwagirizwa .
  - Bahatira gufungura umurongo mushasha iyo amafaranga atari yo .
explanation: |
  Igihe co gufunga n’urufunguzo rwo gukuraho bibuza abaje mu nama guhenda mu kumenya neza ko ukugerageza kwose kwo guhenda bituma uwukoze icaha ahita atakaza amahera.

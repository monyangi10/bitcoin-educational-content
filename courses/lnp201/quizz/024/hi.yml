question: Commitment लेनदेन पर टाइमलॉक और रिवोकेशन की (Revocation Key) का संयुक्त प्रभाव क्या है?
answer: वे भागीदारों को धोखा देने से रोकने के लिए तुरंत सज़ा देने का प्रस्ताव रखते हैं।
wrong_answers:
  - धोखाधड़ी की स्थिति में वे चैनल की क्षमता को कम कर देते हैं।
  - वो अपने-आप दोषी पक्ष के फंड्स को लॉक कर देते हैं
  - वे एक नया चैनल खोलने के लिए मजबूर करते हैं अगर लेन-देन गलत हो
explanation: |
  टाइमलॉक और रिवोकेशन की (revocation key) मदद से पार्टिसिपेंट्स को चीटिंग से रोका जाता है, क्योंकि अगर कोई धोखा देने की कोशिश करता है तो गलती करने वाले पक्ष के फंड्स तुरंत जब्त हो जाते हैं।
reviewed: false
question: 타임락과 해지 키가 Commitment 트랜잭션에 미치는 영향은 무엇인가요?
answer: 즉각적인 처벌을 통해 참가자의 부정행위를 방지합니다
wrong_answers:
  - 부정행위가 발생하면 채널의 용량이 줄어듭니다
  - 유죄 판결을 받은 당사자의 자금을 자동으로 잠급니다
  - 거래가 올바르지 않은 경우 새 채널을 강제로 열게 됩니다
explanation: |
  타임락과 취소 키는 부정행위를 시도할 경우 부정행위를 저지른 당사자에게 즉시 자금이 손실되도록 함으로써 참가자의 부정행위를 방지합니다.
reviewed: true
question: Какъв е комбинираният ефект на времевия блокаж и ключа за отмяна върху транзакциите за поемане на задължения?
answer: Те възпират участниците да мамят, като предлагат незабавно наказание
wrong_answers:
  - Те намаляват капацитета на канала в случай на измама
  - Те автоматично блокират средствата на виновната страна
  - Те налагат отварянето на нов канал, ако транзакцията е неправилна
explanation: |
  Ключът за блокиране на времето и ключът за отмяна възпират участниците от измама, като гарантират, че всеки опит за измама води до незабавна загуба на средства за виновната страна.
reviewed: true
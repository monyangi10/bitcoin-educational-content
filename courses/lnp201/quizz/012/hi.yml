question: एक लाइटनिंग चैनल ऑफिशियली कब खुलता है?
answer: जब डिपॉजिट ट्रांजैक्शन Bitcoin Blockchain पर कन्फर्म हो जाता है
wrong_answers:
  - जैसे ही प्रतिभागियों के बीच पब्लिक कीज़ का आदान-प्रदान हो जाता है
  - जब निकासी लेनदेन दोनों पक्षों द्वारा हस्ताक्षरित हो जाता है
  - जैसे ही 2/2 मल्टीसिग्नेचर Address बन जाता है
explanation: |
  चैनल को खुला माना जाता है जब डिपॉजिट ट्रांजैक्शन Bitcoin ब्लॉक में शामिल हो जाता है और एक निश्चित संख्या में कन्फर्मेशन्स प्राप्त कर लेता है।
reviewed: false
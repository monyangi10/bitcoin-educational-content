question: Кога е официално отворен каналът Lightning?
answer: Когато транзакцията с депозита се потвърди в блокчейна Bitcoin
wrong_answers:
  - Веднага след като публичните ключове бъдат разменени между участниците
  - Когато транзакцията за изтегляне е подписана от двете страни
  - Веднага след създаването на адреса с много подписи 2/2
explanation: |
  Каналът се счита за отворен, след като транзакцията по депозита е включена в блок Bitcoin и е достигнала определен брой потвърждения.
reviewed: true
question: เมื่อใดที่ช่อง Lightning เปิดอย่างเป็นทางการ?
answer: เมื่อธุรกรรมการฝากได้รับการยืนยันบนบล็อกเชน Bitcoin
wrong_answers:
  - ทันทีที่มีการแลกเปลี่ยนกุญแจสาธารณะระหว่างผู้เข้าร่วม
  - เมื่อธุรกรรมการถอนเงินได้รับการลงนามโดยทั้งสองฝ่าย
  - ทันทีที่สร้างที่อยู่มัลติซิกเนเจอร์ 2/2
explanation: |
  ช่องทางจะถือว่าเปิดเมื่อธุรกรรมการฝากได้รับการรวมในบล็อก Bitcoin และได้รับการยืนยันจำนวนหนึ่งแล้ว
reviewed: true
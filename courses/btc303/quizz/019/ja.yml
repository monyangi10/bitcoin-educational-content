question: Bitcoinの取引における匿名性と仮名性の主な違いは何ですか？
answer: Bitcoinのような仮名システムでは、支払いは仮名間でトレースできるが、匿名システムではトレースは存在しない。
wrong_answers:
  - 偽名システムは実名を使用し、匿名システムはすべての取引に偽名を使用する。
  - 匿名システムは公開鍵を必要とするが、偽名システムは識別のために秘密鍵のみを使用する。
  - "仮名システムは取引額を隠すが、匿名システムは送信者の身元を隠すだけである"
explanation: |
  Bitcoinは匿名ではなく仮名であり、アドレス（仮名）間の取引はすべてブロックチェーン上で追跡可能だからだ。真に匿名性の高いシステムでは、資金の出所や行き先の追跡は不可能であり、理論的にはゼロ知識証明によって実現できる。しかし、Bitcoinの透明性によって、誰もが異なるアドレス間のビットコインの流れを追うことができるようになり、匿名ではなく仮名となる。Bitcoinにおける仮名とは、公開鍵に由来するアドレスであり、任意のユーザー名や実際のIDではない。
question: 在 Bitcoin 交易中，匿名和假名的主要區別是什麼？
answer: 在假名系統（如 Bitcoin）中，可追蹤假名之間的付款，而在匿名系統中則不存在任何追蹤。
wrong_answers:
  - 偽匿名系統使用真實姓名，而匿名系統使用假名進行所有交易
  - 匿名系統需要公開金鑰，而假名系統只使用私人金鑰進行識別
  - 「偽匿名系統隱藏交易金額，而匿名系統只隱藏發送人身份」
explanation: |
  Bitcoin 是假名，而非匿名，因為地址（假名）之間的所有交易在區塊鏈上都是可追蹤的。在真正的匿名系統中，錢從哪裡來，到哪裡去，都無法追蹤，理論上可以透過零知識證明實現。然而，Bitcoin 的透明度允許任何人跟蹤比特幣在不同地址之間的流動，使其成為偽匿名而非匿名。Bitcoin 中的假名是由公開金鑰衍生出來的地址，而不是任意的使用者名稱或真實身份。
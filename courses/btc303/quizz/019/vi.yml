question: Sự khác biệt chính giữa ẩn danh và ẩn danh trong bối cảnh giao dịch Bitcoin là gì?
answer: Trong các hệ thống ẩn danh như Bitcoin, các khoản thanh toán có thể được theo dõi giữa các ẩn danh, trong khi trong các hệ thống ẩn danh không có dấu vết nào tồn tại
wrong_answers:
  - Hệ thống bí danh sử dụng tên thật trong khi hệ thống ẩn danh sử dụng tên giả cho tất cả các giao dịch
  - Hệ thống ẩn danh yêu cầu khóa công khai trong khi hệ thống ẩn danh chỉ sử dụng khóa riêng để nhận dạng
  - "Hệ thống ẩn danh ẩn số tiền giao dịch trong khi hệ thống ẩn danh chỉ ẩn danh tính của người gửi"
explanation: |
  Bitcoin là giả danh, không phải ẩn danh, vì tất cả các giao dịch giữa các địa chỉ (bút danh) đều có thể theo dõi trên blockchain. Trong một hệ thống thực sự ẩn danh, sẽ không có dấu vết nào về nguồn gốc hoặc nơi tiền được chuyển đến, điều này về mặt lý thuyết có thể đạt được thông qua bằng chứng không kiến thức. Tuy nhiên, tính minh bạch của Bitcoin cho phép bất kỳ ai cũng có thể theo dõi dòng chảy của bitcoin giữa các địa chỉ khác nhau, khiến nó trở thành giả danh thay vì ẩn danh. Các bút danh trong Bitcoin là các địa chỉ được lấy từ khóa công khai, chứ không phải tên người dùng tùy ý hoặc danh tính thực.
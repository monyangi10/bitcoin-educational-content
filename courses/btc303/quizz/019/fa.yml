question: تفاوت اصلی بین ناشناس بودن و استفاده از نام مستعار در زمینه تراکنش‌های Bitcoin چیست؟
answer: در سیستم‌های با نام مستعار مانند Bitcoin، پرداخت‌ها می‌توانند بین نام‌های مستعار ردیابی شوند، در حالی که در سیستم‌های ناشناس هیچ ردی وجود ندارد.
wrong_answers:
  - سیستم‌های با نام مستعار از نام‌های واقعی استفاده می‌کنند در حالی که سیستم‌های ناشناس از نام‌های جعلی برای تمام تراکنش‌ها استفاده می‌کنند.
  - سیستم‌های ناشناس به کلیدهای عمومی نیاز دارند در حالی که سیستم‌های مستعار فقط از کلیدهای خصوصی برای شناسایی استفاده می‌کنند.
  - "سیستم‌های با نام مستعار مقدار تراکنش‌ها را پنهان می‌کنند در حالی که سیستم‌های ناشناس فقط هویت فرستنده را پنهان می‌کنند"
explanation: |
  ‏Bitcoin مستعار است، نه ناشناس، زیرا تمام تراکنش‌ها بین آدرس‌ها (نام‌های مستعار) در بلاکچین قابل ردیابی هستند. در یک سیستم واقعاً ناشناس، هیچ اثری از اینکه پول از کجا آمده یا به کجا می‌رود وجود نخواهد داشت، که به‌طور نظری می‌تواند از طریق اثبات‌های دانش صفر به دست آید. با این حال، شفافیت Bitcoin به هر کسی اجازه می‌دهد جریان بیت‌کوین‌ها بین آدرس‌های مختلف را دنبال کند، که آن را مستعار به جای ناشناس می‌سازد. نام‌های مستعار در Bitcoin آدرس‌هایی هستند که از کلیدهای عمومی مشتق شده‌اند، نه نام‌های کاربری دلخواه یا هویت‌های واقعی.
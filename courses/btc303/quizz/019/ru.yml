question: В чем основная разница между анонимностью и псевдонимностью в контексте транзакций Bitcoin?
answer: В псевдонимных системах, таких как Bitcoin, платежи можно проследить между псевдонимами, в то время как в анонимных системах никаких следов не существует
wrong_answers:
  - Псевдонимные системы используют настоящие имена, в то время как анонимные системы используют поддельные имена для всех транзакций
  - Анонимные системы требуют открытых ключей, в то время как псевдонимные системы используют для идентификации только закрытые ключи
  - "Псевдонимные системы скрывают суммы транзакций, в то время как анонимные системы скрывают только личность отправителя"
explanation: |
  Bitcoin является псевдонимной, а не анонимной, потому что все транзакции между адресами (псевдонимами) можно отследить в блокчейне. В истинно анонимной системе не было бы никаких следов того, откуда пришли деньги и куда они уходят, что теоретически можно было бы достичь с помощью доказательств нулевого знания. Однако прозрачность Bitcoin позволяет любому проследить за движением биткоинов между различными адресами, что делает ее скорее псевдонимной, чем анонимной. Псевдонимы в Bitcoin - это адреса, полученные из открытых ключей, а не произвольные имена пользователей или реальные личности.
question: Ni irihe tandukaniro rikomeye riri hagati y’ukutamenyekana n’ukutamenyekana mu bijanye n’ibikorwa vya Bitcoin?
answer: Mu mirongo y’amazina y’uruyeri nka Bitcoin, amahera ashobora gukurikirana hagati y’amazina y’uruyeri, mu gihe mu mirongo y’amazina y’uruyeri ata gukurikirana .
wrong_answers:
  - Sisitemu z'amazina y'ibinyoma zikoresha amazina nyayo mu gihe sisitemu zitazwi zikoresha amazina y'ibinyoma ku bikorwa vyose
  - Sisitemu zitazwi zisaba imfunguruzo za bose mu gihe sisitemu zitazwi zikoresha imfunguruzo z'ibanga gusa kugira zimenyekane
  - "Imirongo y'amazina y'uruyeri ihisha amafaranga y'ibikorwa mu gihe imirongo y'amazina y'uruyeri ihisha gusa akaranga k'uwarungitse"
explanation: |
  Bitcoin ni izina ry’uruyeri, si izina ry’uruyeri, kuko amafaranga yose akoreshwa hagati y’amaderesi (amazina y’uruyeri) ashobora gukurikiranywa ku rubuga rwa blockchain. Mu buryo bw’ukuri butazwi, nta n’akarongo k’aho amahera yava canke aho aja, ivyo bikaba vyoshobora gushikwako biciye ku bimenyamenya vy’ubumenyi butagiramwo. Ariko rero, ukuntu Bitcoin igaragara neza bituma umuntu wese ashobora gukurikirana uruja n’uruza rw’ama bitcoins hagati y’amaderesi atandukanye, bikaba bituma iba izina ry’ikinyoma aho kuba izina ry’ikinyoma. Amazina y’uruyeri ari muri Bitcoin ni amaderesi akomoka ku mfunguruzo za bose, si amazina y’abakoresha canke akaranga nyakuri.
question: Каква е основната разлика между анонимността и псевдонимността в контекста на транзакциите Bitcoin?
answer: В псевдонимните системи като Bitcoin плащанията могат да бъдат проследени между псевдоними, докато в анонимните системи няма следи
wrong_answers:
  - Псевдоанонимните системи използват истински имена, докато анонимните системи използват фалшиви имена за всички транзакции
  - Анонимните системи изискват публични ключове, докато псевдонимните системи използват само частни ключове за идентификация
  - "Псевдоанонимните системи крият сумите на транзакциите, докато анонимните системи крият само самоличността на изпращача"
explanation: |
  Bitcoin е псевдонимна, а не анонимна, тъй като всички транзакции между адреси (псевдоними) могат да бъдат проследени в блокчейна. В една наистина анонимна система няма да има следа откъде идват парите и къде отиват, което теоретично може да се постигне чрез доказателства за нулево знание. Прозрачността на Bitcoin обаче позволява на всеки да проследи потока от биткойни между различни адреси, което я прави по-скоро псевдонимна, отколкото анонимна. Псевдонимите в Bitcoin са адреси, получени от публични ключове, а не произволни потребителски имена или реални самоличности.
reviewed: false

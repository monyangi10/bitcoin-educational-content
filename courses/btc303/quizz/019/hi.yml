question: Bitcoin लेनदेन के संदर्भ में गुमनामी और छद्मनामता के बीच मुख्य अंतर क्या है?
answer: Bitcoin जैसी छद्मनाम प्रणालियों में, छद्मनामों के बीच भुगतान का पता लगाया जा सकता है, जबकि अनाम प्रणालियों में कोई निशान मौजूद नहीं होता है
wrong_answers:
  - छद्मनाम प्रणालियाँ वास्तविक नामों का उपयोग करती हैं जबकि अनाम प्रणालियाँ सभी लेनदेन के लिए नकली नामों का उपयोग करती हैं
  - अनाम प्रणालियों को सार्वजनिक कुंजियों की आवश्यकता होती है, जबकि छद्मनाम प्रणालियाँ पहचान के लिए केवल निजी कुंजियों का उपयोग करती हैं
  - "छद्मनाम प्रणालियाँ लेन-देन की राशि छिपाती हैं जबकि अनाम प्रणालियाँ केवल प्रेषक की पहचान छिपाती हैं"
explanation: |
  Bitcoin छद्मनाम है, गुमनाम नहीं, क्योंकि पतों (छद्मनामों) के बीच सभी लेन-देन ब्लॉकचेन पर ट्रेस किए जा सकते हैं। एक वास्तविक गुमनाम प्रणाली में, इस बात का कोई पता नहीं चलेगा कि पैसा कहाँ से आया है या कहाँ जा रहा है, जिसे सैद्धांतिक रूप से शून्य-ज्ञान प्रमाणों के माध्यम से प्राप्त किया जा सकता है। हालाँकि, Bitcoin की पारदर्शिता किसी को भी विभिन्न पतों के बीच बिटकॉइन के प्रवाह का पता लगाने की अनुमति देती है, जिससे यह गुमनाम के बजाय छद्मनाम बन जाता है। Bitcoin में छद्मनाम सार्वजनिक कुंजियों से प्राप्त पते हैं, न कि मनमाने उपयोगकर्ता नाम या वास्तविक पहचान।

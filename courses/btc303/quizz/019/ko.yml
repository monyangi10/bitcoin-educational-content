question: Bitcoin 거래의 맥락에서 익명성과 가명의 주요 차이점은 무엇인가요?
answer: Bitcoin과 같은 가명 시스템에서는 가명 간 결제 추적이 가능하지만 익명 시스템에서는 추적이 존재하지 않습니다
wrong_answers:
  - 익명 시스템은 모든 거래에 실명을 사용하는 반면, 가명 시스템은 가명을 사용합니다
  - 익명 시스템에는 공개 키가 필요한 반면, 익명 시스템에는 개인 키만 식별에 사용합니다
  - "익명 시스템은 발신자의 신원만 숨기는 반면, 가명 시스템은 거래 금액을 숨긴다"
explanation: |
  주소(가명) 간의 모든 거래는 블록체인에서 추적할 수 있기 때문에 Bitcoin는 익명이 아닌 가명입니다. 진정한 익명 시스템에서는 돈이 어디에서 왔는지, 어디로 가는지 추적할 수 없으며, 이론적으로는 영지식 증명을 통해 이를 달성할 수 있습니다. 그러나 Bitcoin는 투명성을 통해 누구나 서로 다른 주소 간의 비트코인 흐름을 추적할 수 있으므로 익명성이 아닌 가명성이라고 할 수 있습니다. Bitcoin의 가명은 임의의 사용자 이름이나 실제 신원이 아닌 공개 키에서 파생된 주소입니다.
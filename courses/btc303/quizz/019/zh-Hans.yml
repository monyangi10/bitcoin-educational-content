question: 在 Bitcoin 交易中，匿名和假名的主要区别是什么？
answer: 在 Bitcoin 等假名系统中，付款可以在假名之间进行追踪，而在匿名系统中则无迹可寻
wrong_answers:
  - 伪匿名系统使用真实姓名，而匿名系统的所有交易都使用假名字
  - 匿名系统需要公钥，而假名系统只使用私钥进行识别
  - "伪匿名系统隐藏交易金额，而匿名系统只隐藏发送者的身份"
explanation: |
  Bitcoin 是假名，而不是匿名，因为地址（假名）之间的所有交易在区块链上都是可追踪的。在真正的匿名系统中，钱从哪里来，到哪里去，都无法追踪，理论上可以通过零知识证明来实现。然而，Bitcoin 的透明度允许任何人跟踪比特币在不同地址之间的流动，使其成为假名而非匿名。Bitcoin 中的假名是源于公钥的地址，而不是任意的用户名或真实身份。
reviewed: false

question: 在比特币交易中，匿名性和假名性的主要区别是什么？
answer: 在比特币等假名性系统中，付款可以在假名之间进行追踪，而在匿名系统中则无迹可寻
wrong_answers:
  - 假名系统使用真实姓名，而匿名系统的所有交易都使用假名字
  - 匿名系统需要公钥，而假名系统只使用私钥进行识别
  - 假名系统隐藏交易金额，而匿名系统只隐藏发送者的身份
explanation: |
  比特币是假名的，而不是匿名的，因为地址（假名）之间的所有交易在区块链上都是可追踪的。在真正的匿名系统中，钱的来源和交易接收者，都无法追踪，理论上可以通过零知识证明来实现。然而，比特币的透明度允许任何人跟踪比特币在不同地址之间的流动，使其成为假名而非匿名的系统。比特币中的假名是源于公钥的地址，而不是任意的用户名或真实身份。

question: ความแตกต่างหลักระหว่างการไม่เปิดเผยตัวตนและการใช้นามแฝงในบริบทของธุรกรรม Bitcoin คืออะไร?
answer: ในระบบนามแฝงเช่น Bitcoin การชำระเงินสามารถถูกติดตามระหว่างนามแฝงได้ ในขณะที่ในระบบนิรนามจะไม่มีร่องรอยใดๆ
wrong_answers:
  - ระบบนามแฝงใช้ชื่อจริงในขณะที่ระบบนิรนามใช้ชื่อปลอมสำหรับธุรกรรมทั้งหมด
  - ระบบนิรนามต้องการกุญแจสาธารณะในขณะที่ระบบนามแฝงใช้เพียงกุญแจส่วนตัวสำหรับการระบุตัวตน
  - "ระบบนามแฝงซ่อนจำนวนธุรกรรมในขณะที่ระบบนิรนามซ่อนเฉพาะตัวตนของผู้ส่ง"
explanation: |
  Bitcoin เป็นนามแฝง ไม่ใช่ไม่ระบุตัวตน เพราะธุรกรรมทั้งหมดระหว่างที่อยู่ (นามแฝง) สามารถติดตามได้บนบล็อกเชน ในระบบที่ไม่ระบุตัวตนอย่างแท้จริง จะไม่มีร่องรอยของที่มาหรือที่ไปของเงิน ซึ่งในทางทฤษฎีสามารถทำได้ผ่านการพิสูจน์แบบ zero-knowledge อย่างไรก็ตาม ความโปร่งใสของ Bitcoin ช่วยให้ใครก็ตามสามารถติดตามการไหลของบิตคอยน์ระหว่างที่อยู่ต่างๆ ได้ ทำให้เป็นนามแฝงมากกว่าที่จะไม่ระบุตัวตน นามแฝงใน Bitcoin คือที่อยู่ที่ได้มาจากกุญแจสาธารณะ ไม่ใช่ชื่อผู้ใช้ตามอำเภอใจหรือข้อมูลระบุตัวตนจริง
reviewed: false
question: Ni ingaruka iyihe y’intango iyo ibisabwa vyo gukurura Bitcoin Core bifata igihe kirekire cane imbere y’uko bihurizwa hamwe mu bubiko n’ababicungera?
answer: Birerekana ko ata basubiramwo bariho kugira ngo basuzume amahinduka yategekanijwe mu mategeko .
wrong_answers:
  - "Birerekana ko ababibungabunga bariko baragabanya n'ibigirankana inzira y'iterambere rya Bitcoin"
  - "Birerekana ko amahinduka ategekanijwe mu vy'ukuri adahuye n'amategeko y'ubumwe ya Bitcoin".
  - "Birahishura ko urubuga rwa GitHub rufise imipaka y'ubuhinga bwo gukoresha codebase ya Bitcoin"
explanation: |
  Dushingiye ku birimwo mu gice, ibisabwa vyo gukurura bifata igihe kirekire kugira ngo bihurizwe hamwe ahanini bivuye ku kubura isubiramwo, ivyo bikaba biva ku basubiramwo badahagije aho kuva ku nzitizi z’abacungera canke ibibazo vy’ubuhinga. Uburyo bwo gusubiramwo ni ngirakamaro cane ku mutekano wa Bitcoin, kuko butuma kode iba nziza kandi bukabuza amahinduka mabi. Ico kibazo kiriho kubera ko gusubiramwo kode y’ubuhinga buhambaye bisaba ubuhinga n’igihe, ivyo bikaba bituma abasubiramwo bafise ubushobozi baba umutungo mutoyi mu bijanye n’iterambere.
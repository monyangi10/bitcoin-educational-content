question: Каковы основные последствия того, что запросы Bitcoin Core очень долго хранятся в репозитории, прежде чем мейнтейнеры их объединят?
answer: Это указывает на нехватку рецензентов, способных оценить предлагаемые изменения в коде
wrong_answers:
  - "Это свидетельствует о том, что сопровождающие намеренно замедляют процесс разработки Bitcoin"
  - "Это показывает, что предлагаемые изменения в корне несовместимы с правилами консенсуса Bitcoin"
  - "Выяснилось, что платформа GitHub имеет технические ограничения для работы с кодовой базой Bitcoin"
explanation: |
  Согласно содержанию главы, слияние запросов на исправление занимает много времени в основном из-за отсутствия рецензирования, которое происходит из-за недостаточного количества рецензентов, а не из-за препятствий со стороны сопровождающих или технических проблем. Процесс рецензирования очень важен для безопасности Bitcoin, поскольку он обеспечивает качество кода и предотвращает злонамеренные изменения. Это узкое место существует потому, что рецензирование сложного криптографического кода требует опыта и времени, что делает квалифицированных рецензентов дефицитным ресурсом в процессе разработки.
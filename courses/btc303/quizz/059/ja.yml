question: ビットコインコアのプルリクエストが、メンテナーによってリポジトリにマージされるまでに非常に長い時間がかかる場合、どのような理由が考えられるか？
answer: 提案されたコード変更を評価できるレビュアーが不足していることを示している
wrong_answers:
  - ビットコイン開発プロセスを意図的に遅らせていることを示している
  - この変更案はビットコインのコンセンサスルールと根本的に相容れないものであることを示している
  - ビットコインのコードベースを扱うには、GitHubプラットフォームには技術的な限界があることを明らかにしている
explanation: |
  この章の内容によると、プルリクエストがマージされるまでに長い時間がかかるのは、主にレビューの不足が原因であり、これはメンテナーの妨害や技術的な問題ではなく、レビュアーの不足に起因している。レビュー・プロセスは、コードの品質を保証し、悪意ある変更を防止するため、ビットコインのセキュリティにとって極めて重要である。このようなボトルネックが存在するのは、複雑な暗号コードのレビューには専門知識と時間が必要であり、有能なレビュアーが開発プロセスにおいて希少なリソースとなっているためである。
reviewed: false

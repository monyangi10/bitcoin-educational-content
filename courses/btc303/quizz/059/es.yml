question: ¿Cuál es la principal consecuencia de que las solicitudes de modificación del núcleo de Bitcoin tarden mucho tiempo en ser incorporadas al repositorio por los mantenedores?
answer: Indica la falta de revisores disponibles para evaluar los cambios de código propuestos
wrong_answers:
  - "Demuestra que los mantenedores están ralentizando deliberadamente el proceso de desarrollo de Bitcoin"
  - "Demuestra que los cambios propuestos son fundamentalmente incompatibles con las normas consensuadas de Bitcoin"
  - "Revela que la plataforma GitHub tiene limitaciones técnicas para manejar la base de código de Bitcoin"
explanation: |
  Según el contenido del capítulo, los pull requests tardan mucho en fusionarse debido principalmente a la falta de revisión, que se debe a la insuficiencia de revisores más que a la obstrucción de los mantenedores o a problemas técnicos. El proceso de revisión es crucial para la seguridad de Bitcoin, ya que garantiza la calidad del código y evita cambios malintencionados. Este cuello de botella existe porque la revisión de código criptográfico complejo requiere experiencia y tiempo, por lo que los revisores cualificados son un recurso escaso en el proceso de desarrollo.
question: जब Bitcoin कोर पुल अनुरोधों को अनुरक्षकों द्वारा रिपोजिटरी में विलय करने से पहले बहुत लंबा समय लगता है, तो इसका प्राथमिक परिणाम क्या होता है?
answer: यह प्रस्तावित कोड परिवर्तनों का मूल्यांकन करने के लिए समीक्षकों की कमी को इंगित करता है
wrong_answers:
  - "यह दर्शाता है कि अनुरक्षक जानबूझकर Bitcoin की विकास प्रक्रिया को धीमा कर रहे हैं"
  - "इससे पता चलता है कि प्रस्तावित परिवर्तन मूलतः Bitcoin के सर्वसम्मति नियमों के साथ असंगत हैं।"
  - "इससे पता चलता है कि GitHub प्लेटफ़ॉर्म में Bitcoin के कोडबेस को संभालने के लिए तकनीकी सीमाएँ हैं"
explanation: |
  अध्याय की सामग्री के अनुसार, पुल अनुरोधों को मर्ज होने में लंबा समय लगता है, मुख्यतः समीक्षा की कमी के कारण, जो अनुरक्षकों की रुकावट या तकनीकी समस्याओं के बजाय अपर्याप्त समीक्षकों के कारण होता है। समीक्षा प्रक्रिया Bitcoin की सुरक्षा के लिए महत्वपूर्ण है, क्योंकि यह कोड की गुणवत्ता सुनिश्चित करती है और दुर्भावनापूर्ण परिवर्तनों को रोकती है। यह अड़चन इसलिए है क्योंकि जटिल क्रिप्टोग्राफ़िक कोड की समीक्षा के लिए विशेषज्ञता और समय की आवश्यकता होती है, जिससे विकास प्रक्रिया में योग्य समीक्षकों की कमी हो जाती है।
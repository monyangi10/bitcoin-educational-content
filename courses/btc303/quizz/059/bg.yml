question: Каква е основната последица от това, че заявките за изтегляне на Bitcoin Core отнемат много време, преди да бъдат обединени в хранилището от поддържащите?
answer: Това показва, че липсват рецензенти, които да оценят предложените промени в кодекса
wrong_answers:
  - Това показва, че поддръжниците умишлено забавят процеса на разработка на Bitcoin
  - Той показва, че предложените промени са фундаментално несъвместими с консенсусните правила на Bitcoin
  - Това разкрива, че платформата GitHub има технически ограничения за работа с базата данни на Bitcoin
explanation: |
  Според съдържанието на главата обединяването на заявките за придърпване отнема много време главно поради липсата на преглед, което се дължи по-скоро на недостатъчен брой рецензенти, отколкото на пречки от страна на администраторите или на технически проблеми. Процесът на преглед е от решаващо значение за сигурността на Bitcoin, тъй като осигурява качеството на кода и предотвратява злонамерени промени. Това затруднение съществува, тъй като прегледът на сложния криптографски код изисква експертни познания и време, поради което квалифицираните рецензенти са ограничен ресурс в процеса на разработване.
reviewed: true

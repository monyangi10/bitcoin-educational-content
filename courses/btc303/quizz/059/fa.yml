question: پیامد اصلی زمانی که درخواست‌های کشش Bitcoin Core مدت زمان زیادی طول می‌کشد تا توسط نگهدارندگان به مخزن ادغام شوند چیست؟
answer: این نشان‌دهنده کمبود بازبینان موجود برای ارزیابی تغییرات پیشنهادی کد است.
wrong_answers:
  - "این نشان می‌دهد که نگهدارندگان عمداً فرآیند توسعه Bitcoin را کند می‌کنند"
  - "این نشان می‌دهد که تغییرات پیشنهادی به‌طور اساسی با قوانین اجماع Bitcoin ناسازگار هستند"
  - "این نشان می‌دهد که پلتفرم GitHub محدودیت‌های فنی برای مدیریت کدبیس Bitcoin دارد"
explanation: |
  بر اساس محتوای فصل، درخواست‌های کشش عمدتاً به دلیل کمبود بررسی، که ناشی از کمبود بازبین‌ها است و نه مانع‌تراشی نگهدارنده یا مشکلات فنی، زمان زیادی برای ادغام می‌برند. فرآیند بررسی برای امنیت Bitcoin حیاتی است، زیرا کیفیت کد را تضمین می‌کند و از تغییرات مخرب جلوگیری می‌کند. این گلوگاه به این دلیل وجود دارد که بررسی کد رمزنگاری پیچیده نیاز به تخصص و زمان دارد و بازبین‌های واجد شرایط یک منبع کمیاب در فرآیند توسعه هستند.
reviewed: false

question: 當 Bitcoin Core 拉取請求需要很長時間才會被維護者合併到儲存庫時，主要的後果是什麼？
answer: 這表示缺乏可用的審核人員來評估建議的程式碼變更
wrong_answers:
  - 「這顯示維護者故意拖慢 Bitcoin 的開發進度」
  - 「這表明建議的變更與 Bitcoin 的共識規則根本不相容」
  - 「它揭示了 GitHub 平台在處理 Bitcoin 的代碼庫方面存在技術限制」
explanation: |
  根據該章節的內容，pull request 需要很長的時間才能合併，主要原因是審查不足，而審查不足的原因是審查人員不足，而非維護者阻礙或技術問題。審查流程對 Bitcoin 的安全性至關重要，因為它可以確保程式碼品質，並防止惡意變更。這個瓶頸的存在是因為檢閱複雜的密碼程式碼需要專業知識和時間，使得合格的檢閱人員成為開發過程中的稀有資源。
reviewed: false

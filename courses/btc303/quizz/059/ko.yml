question: Bitcoin 코어 풀 리퀘스트가 관리자에 의해 리포지토리에 병합되기까지 매우 오랜 시간이 걸리면 어떤 주요 결과가 발생하나요?
answer: 제안된 코드 변경 사항을 평가할 수 있는 검토자가 부족함을 나타냅니다
wrong_answers:
  - "유지 관리자가 고의적으로 Bitcoin의 개발 프로세스를 늦추고 있다는 것을 보여줍니다."
  - "제안된 변경 사항이 Bitcoin의 합의 규칙과 근본적으로 양립할 수 없음을 보여줍니다."
  - "GitHub 플랫폼이 Bitcoin의 코드베이스를 처리하는 데 기술적 한계가 있음이 드러났습니다."
explanation: |
  이 장의 내용에 따르면 풀 리퀘스트가 병합되는 데 오랜 시간이 걸리는 이유는 주로 검토가 부족하기 때문이며, 이는 관리자의 방해나 기술적 문제보다는 검토자의 부족에서 비롯됩니다. 검토 프로세스는 코드 품질을 보장하고 악의적인 변경을 방지하므로 Bitcoin의 보안에 매우 중요합니다. 복잡한 암호화 코드를 검토하려면 전문 지식과 시간이 필요하기 때문에 개발 프로세스에서 자격을 갖춘 검토자가 부족하기 때문에 이러한 병목 현상이 발생합니다.
reviewed: false

question: ผลที่ตามมาหลักเมื่อคำขอดึง Bitcoin Core ใช้เวลานานมากก่อนที่จะถูกรวมเข้ากับที่เก็บโดยผู้ดูแลคืออะไร?
answer: มันบ่งชี้ถึงการขาดแคลนผู้ตรวจสอบที่พร้อมจะประเมินการเปลี่ยนแปลงโค้ดที่เสนอ
wrong_answers:
  - "มันแสดงให้เห็นว่าผู้ดูแลกำลังชะลอกระบวนการพัฒนา Bitcoin อย่างจงใจ"
  - "มันแสดงให้เห็นว่าการเปลี่ยนแปลงที่เสนอไม่สอดคล้องกับกฎฉันทามติของ Bitcoin โดยพื้นฐาน"
  - "มันเผยให้เห็นว่าแพลตฟอร์ม GitHub มีข้อจำกัดทางเทคนิคในการจัดการฐานรหัสของ Bitcoin"
explanation: |
  ตามเนื้อหาของบท การดึงคำขอใช้เวลานานในการรวมเข้าด้วยกันเนื่องจากขาดการตรวจสอบ ซึ่งเกิดจากการขาดแคลนผู้ตรวจสอบมากกว่าการขัดขวางของผู้ดูแลหรือปัญหาทางเทคนิค กระบวนการตรวจสอบมีความสำคัญต่อความปลอดภัยของ Bitcoin เนื่องจากช่วยให้มั่นใจในคุณภาพของโค้ดและป้องกันการเปลี่ยนแปลงที่เป็นอันตราย คอขวดนี้เกิดขึ้นเพราะการตรวจสอบโค้ดการเข้ารหัสที่ซับซ้อนต้องการความเชี่ยวชาญและเวลา ทำให้ผู้ตรวจสอบที่มีคุณสมบัติเหมาะสมเป็นทรัพยากรที่หายากในกระบวนการพัฒนา
reviewed: false
question: ตามการอภิปรายในบทเกี่ยวกับความเข้ากันได้ของ Bitcoin, fork แบบซอฟต์ให้ความเข้ากันได้ประเภทใด?
answer: ทั้งความเข้ากันได้ไปข้างหน้าและถอยหลัง ทำให้เข้ากันได้อย่างสมบูรณ์
wrong_answers:
  - ความเข้ากันได้ย้อนหลังเท่านั้น อนุญาตให้ซอฟต์แวร์ใหม่ประมวลผลข้อมูลเก่า
  - ความเข้ากันได้เฉพาะข้างหน้าเท่านั้น อนุญาตให้ซอฟต์แวร์เก่าประมวลผลข้อมูลใหม่
  - ไม่รองรับความเข้ากันได้ทั้งไปข้างหน้าและย้อนหลัง ต้องการการอัปเดตระบบทั้งหมด
explanation: |
  บทนี้ระบุไว้อย่างชัดเจนว่า 'การเปลี่ยนแปลงกฎเกณฑ์ของ Bitcoin จะถูกเรียกว่าเป็น soft fork หากมันเข้ากันได้อย่างสมบูรณ์' โดยกำหนดว่าเข้ากันได้อย่างสมบูรณ์หมายถึงเข้ากันได้ทั้งไปข้างหน้าและย้อนหลัง ความเข้ากันได้ไปข้างหน้าหมายถึงซอฟต์แวร์เก่าสามารถประมวลผลข้อมูลจากเวอร์ชันใหม่กว่าได้โดยการละเว้นส่วนที่ไม่เข้าใจ ในขณะที่ความเข้ากันได้ย้อนหลังหมายถึงซอฟต์แวร์ใหม่สามารถประมวลผลข้อมูลเก่าได้ ความเข้ากันได้ทั้งสองด้านนี้คือสิ่งที่ทำให้ soft forks เป็นกลไกการอัปเกรดที่ต้องการสำหรับ Bitcoin เนื่องจากไม่ทำให้ระบบที่มีอยู่เสียหายขณะเปิดใช้งานฟังก์ชันใหม่
reviewed: false
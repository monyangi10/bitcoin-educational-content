question: Според обсъждането на съвместимостта на Bitcoin в главата, какъв тип съвместимост осигурява мекото разклонение?
answer: Съвместимост напред и назад, което я прави напълно съвместима
wrong_answers:
  - Само обратна съвместимост, която позволява на новия софтуер да обработва стари данни
  - Само предварителна съвместимост, която позволява на стария софтуер да обработва нови данни
  - Нито пряка, нито обратна съвместимост, което изисква пълни актуализации на системата
explanation: |
  В главата ясно се посочва, че "Промяна в консенсусните правила на Bitcoin се счита за мекото разклонение, ако е напълно съвместима" Тя определя пълната съвместимост като съвместима както напред, така и назад. Съвместимостта напред означава, че старият софтуер може да обработва данни от по-нови версии, като игнорира частите, които не разбира, докато обратната съвместимост означава, че новият софтуер може да обработва стари данни. Тази двойна съвместимост е това, което прави софтуерите с вилици предпочитан механизъм за обновяване за Bitcoin, тъй като те не нарушават съществуващите системи, като същевременно позволяват нова функционалност.
reviewed: true

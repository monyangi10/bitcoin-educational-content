question: 根据本章对 Bitcoin 兼容性的讨论，软 fork 提供哪种类型的兼容性？
answer: 向前和向后兼容性，使其完全兼容
wrong_answers:
  - 只有向后兼容性，允许新软件处理旧数据
  - 仅向前兼容，允许旧软件处理新数据
  - 既不向前兼容，也不向后兼容，需要对系统进行全面更新
explanation: |
  该章明确指出，"对 Bitcoin 共识规则的修改，如果完全兼容，就可以说是软 fork。它将完全兼容定义为既向前兼容又向后兼容。前向兼容意味着旧版本软件可以通过忽略其不理解的部分来处理新版本的数据，而后向兼容则意味着新软件可以处理旧数据。这种双重兼容性使软分叉成为 Bitcoin 的首选升级机制，因为它们在启用新功能的同时不会破坏现有系统。
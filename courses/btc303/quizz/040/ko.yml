question: 이 장의 Bitcoin 호환성에 대한 설명에 따르면 소프트 fork은 어떤 유형의 호환성을 제공하나요?
answer: 포워드 및 백워드 호환성을 모두 지원하여 완벽한 호환성을 제공합니다
wrong_answers:
  - 이전 버전과의 호환성만 지원하여 새 소프트웨어가 이전 데이터를 처리할 수 있습니다
  - 이전 버전 소프트웨어가 새로운 데이터를 처리할 수 있는 역호환성만 제공
  - 이전 버전과 호환되지 않으므로 전체 시스템 업데이트가 필요합니다
explanation: |
  이 장에는 'Bitcoin 합의 규칙에 대한 변경이 완전히 호환되는 경우 소프트 fork라고 합니다'라고 명확하게 명시되어 있습니다 이 장에서는 완전 호환성을 포워드 호환성과 백워드 호환성으로 정의합니다. 이전 버전과의 호환성은 이전 소프트웨어가 이해하지 못하는 부분을 무시하고 최신 버전의 데이터를 처리할 수 있다는 의미이고, 하위 호환성은 새로운 소프트웨어가 이전 데이터를 처리할 수 있다는 의미입니다. 이러한 이중 호환성 덕분에 소프트 포크는 기존 시스템을 손상시키지 않으면서도 새로운 기능을 구현할 수 있어 Bitcoin의 업그레이드 메커니즘으로 선호되고 있습니다.
question: Согласно обсуждению совместимости Bitcoin в этой главе, какой тип совместимости обеспечивает мягкий fork?
answer: Прямая и обратная совместимость, что делает его полностью совместимым
wrong_answers:
  - Только обратная совместимость, позволяющая новому программному обеспечению обрабатывать старые данные
  - Только прямая совместимость, позволяющая старому программному обеспечению обрабатывать новые данные
  - Ни прямой, ни обратной совместимости, что требует полного обновления системы
explanation: |
  В главе четко сказано: "Изменение правил консенсуса Bitcoin считается мягким fork, если оно полностью совместимо" Полная совместимость определяется как прямая и обратная совместимость. Прямая совместимость означает, что старое программное обеспечение может обрабатывать данные из новых версий, игнорируя непонятные ему части, а обратная совместимость означает, что новое программное обеспечение может обрабатывать старые данные. Именно эта двойная совместимость делает софт-форки предпочтительным механизмом обновления для Bitcoin, поскольку они не ломают существующие системы и в то же время обеспечивают новую функциональность.

question: Bitcoin संगतता के अध्याय की चर्चा के अनुसार, सॉफ्ट fork किस प्रकार की संगतता प्रदान करता है?
answer: आगे और पीछे दोनों तरह की संगतता, जिससे यह पूरी तरह से संगत हो जाता है
wrong_answers:
  - केवल पश्चगामी संगतता, नए सॉफ्टवेयर को पुराने डेटा को संसाधित करने की अनुमति देना
  - केवल अग्रगामी संगतता, पुराने सॉफ्टवेयर को नए डेटा को संसाधित करने की अनुमति देना
  - न तो आगे और न ही पीछे की संगतता, पूर्ण सिस्टम अपडेट की आवश्यकता
explanation: |
  अध्याय में स्पष्ट रूप से कहा गया है कि "Bitcoin सहमति नियमों में कोई भी परिवर्तन, यदि वह पूर्णतः संगत हो, तो उसे सॉफ्ट fork कहा जाता है।" यह पूर्णतः संगत को अग्रगामी और पश्चगामी, दोनों तरह से संगत के रूप में परिभाषित करता है। अग्रगामी संगतता का अर्थ है कि पुराना सॉफ़्टवेयर नए संस्करणों के डेटा को उन भागों को अनदेखा करके संसाधित कर सकता है जिन्हें वह नहीं समझता, जबकि पश्चगामी संगतता का अर्थ है कि नया सॉफ़्टवेयर पुराने डेटा को संसाधित कर सकता है। यही दोहरी संगतता सॉफ्ट फ़ोर्क्स को Bitcoin के लिए पसंदीदा अपग्रेड मैकेनिज़्म बनाती है, क्योंकि वे नई कार्यक्षमता को सक्षम करते हुए मौजूदा सिस्टम को नष्ट नहीं करते हैं।
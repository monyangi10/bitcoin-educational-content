question: 根據本章對 Bitcoin 相容性的討論，軟版 fork 提供何種類型的相容性？
answer: 兼具向前與向後相容性，使其完全相容
wrong_answers:
  - 只有向後相容性，允許新軟體處理舊資料
  - 僅向前相容，允許舊軟體處理新資料
  - 既不向前也不向後相容，需要完整的系統更新
explanation: |
  該章節明確指出，「對 Bitcoin 共識規則的變更，如果是完全相容的，則稱為軟性 fork。它將完全相容定義為前向與後向相容。前向相容是指舊的軟體可以忽略它不瞭解的部分來處理較新版本的資料，而後向相容是指新的軟體可以處理舊的資料。這種雙重相容性使軟分叉成為 Bitcoin 的首選升級機制，因為它們在啟用新功能的同時不會破壞現有系統。
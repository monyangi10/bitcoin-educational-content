question: Welche Art von Kompatibilität bietet ein weicher fork, wie im Kapitel über die Bitcoin-Kompatibilität beschrieben?
answer: Vorwärts- und Rückwärtskompatibilität und damit volle Kompatibilität
wrong_answers:
  - Nur Abwärtskompatibilität, so dass neue Software alte Daten verarbeiten kann
  - Nur Vorwärtskompatibilität, damit alte Software neue Daten verarbeiten kann
  - Weder Aufwärts- noch Abwärtskompatibilität, was eine vollständige Aktualisierung des Systems erfordert
explanation: |
  In dem Kapitel heißt es eindeutig: Eine Änderung der Bitcoin-Konsensregeln wird als weiche fork bezeichnet, wenn sie vollständig kompatibel ist Vollständig kompatibel bedeutet, dass sie sowohl vorwärts- als auch rückwärtskompatibel ist. Vorwärtskompatibilität bedeutet, dass alte Software Daten aus neueren Versionen verarbeiten kann, indem sie Teile ignoriert, die sie nicht versteht, während Rückwärtskompatibilität bedeutet, dass neue Software alte Daten verarbeiten kann. Diese doppelte Kompatibilität macht Soft Forks zum bevorzugten Upgrade-Mechanismus für Bitcoin, da sie bestehende Systeme nicht zerstören und gleichzeitig neue Funktionen ermöglichen.
reviewed: false

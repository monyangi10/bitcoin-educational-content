question: بر اساس بحث فصل در مورد سازگاری Bitcoin، یک fork نرم چه نوع سازگاری ارائه می‌دهد؟
answer: هم سازگاری رو به جلو و هم سازگاری رو به عقب، که آن را به‌طور کامل سازگار می‌کند.
wrong_answers:
  - فقط سازگاری معکوس، اجازه می‌دهد نرم‌افزار جدید داده‌های قدیمی را پردازش کند
  - فقط سازگاری رو به جلو، اجازه به نرم‌افزار قدیمی برای پردازش داده‌های جدید
  - نه سازگاری به جلو و نه سازگاری به عقب، نیازمند به‌روزرسانی کامل سیستم
explanation: |
  این فصل به وضوح بیان می‌کند که 'تغییری در قوانین اجماع Bitcoin به عنوان یک fork نرم گفته می‌شود اگر کاملاً سازگار باشد.' این تعریف کاملاً سازگار به معنای سازگاری هم به جلو و هم به عقب است. سازگاری به جلو به این معناست که نرم‌افزار قدیمی می‌تواند داده‌های نسخه‌های جدیدتر را با نادیده گرفتن بخش‌هایی که نمی‌فهمد پردازش کند، در حالی که سازگاری به عقب به این معناست که نرم‌افزار جدید می‌تواند داده‌های قدیمی را پردازش کند. این سازگاری دوگانه همان چیزی است که فورک‌های نرم را به مکانیزم ارتقاء ترجیحی برای Bitcoin تبدیل می‌کند، زیرا سیستم‌های موجود را نمی‌شکند و در عین حال قابلیت‌های جدید را فعال می‌کند.

question: Dushingiye ku kiganiro co mu kigabane kivuga ku bijanye n’uguhuza Bitcoin, ni ubuhe bwoko bw’uguhuza fork yoroshe itanga?
answer: Ivyo vyose bihuye n’imbere n’inyuma, bikaba bituma bihuye bimwe bishitse .
wrong_answers:
  - Gusubira inyuma gusa, kwemerera porogaramu nshasha gukora amakuru ya kera
  - Imbere gusa ihuye, kwemerera porogaramu ya kera gukora amakuru mashasha
  - Nta n'imbere canke inyuma bihuye, bisaba guhindura sisitemu yose
explanation: |
  Ico kigabane kivuga neza yuko 'Ihinduka ry'amategeko y'ubumwe bwa Bitcoin rivugwa ko ari fork yoroshe iyo ihuye neza.' Bisobanura guhuza bimwe bishitse nk’uguhuza imbere n’inyuma. Guhuza imbere bisigura ko porogarama ya kera ishobora gukora amakuru ava muri verisiyo nshasha mu kwirengagiza ibice idatahura, mu gihe guhuza inyuma bisigura ko porogarama nshasha ishobora gukora amakuru ya kera. Ukwo guhuza kabiri nivyo bituma amaforogo yoroshe aba uburyo bwo guhindura Bitcoin, kuko adaca uburyo busanzweho mu gihe ashoboza ibikorwa bishasha.

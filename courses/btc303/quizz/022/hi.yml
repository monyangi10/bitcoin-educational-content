question: ब्लॉकचेन गोपनीयता की दो मुख्य समस्याएं क्या हैं जिन्हें Satoshi नाकामोटो ने Bitcoin श्वेतपत्र में पहचाना है?
answer: Address पुन उपयोग और पता क्लस्टरिंग
wrong_answers:
  - लेनदेन शुल्क और पुष्टिकरण में देरी
  - दोहरा खर्च और हैश टकराव
  - नेटवर्क संकुलन और mining केंद्रीकरण
explanation: |
  Bitcoin श्वेतपत्र के खंड 7 में, Satoshi नाकामोटो ने पते के पुन: उपयोग और पता क्लस्टरिंग को ब्लॉकचेन गोपनीयता की मुख्य समस्याओं के रूप में पहचाना। Address पुन: उपयोग तब होता है जब एक ही पते का कई बार उपयोग किया जाता है, जिससे लेनदेन को एक ही उपयोगकर्ता से जोड़ना आसान हो जाता है। Address क्लस्टरिंग यह निर्धारित करने की क्षमता को संदर्भित करता है कि विभिन्न पते एक ही स्वामी के हैं, विशेष रूप से बहु-इनपुट लेनदेन के माध्यम से, जिससे पता चलता है कि सभी इनपुट एक ही व्यक्ति द्वारा नियंत्रित थे। अन्य विकल्प Bitcoin में तकनीकी या परिचालन संबंधी चुनौतियाँ हैं, लेकिन वे गोपनीयता के मुद्दे नहीं हैं जिनकी श्वेतपत्र में Satoshi द्वारा विशेष रूप से चर्चा की गई है।
reviewed: false

question: 中本聪在比特币白皮书中指出的区块链隐私的两大问题是什么？
answer: 地址重复使用和地址群集
wrong_answers:
  - 交易费用和确认延迟
  - 双重支付和哈希碰撞
  - 网络拥塞和挖矿中心化
explanation: |
  在比特币白皮书第 7 节中，中本聪认为地址重用和地址聚类是主要的区块链隐私问题。地址重复使用发生在同一地址被多次使用的情况下，这样就很容易识别出某个交易的用户。地址聚类指的是确定不同地址属于同一所有者的能力，特别是通过多输入交易揭示所有输入由同一人控制。其他选项是比特币的技术或操作挑战，但不是中本聪在白皮书中特别讨论的隐私问题。

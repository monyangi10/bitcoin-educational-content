question: Je, ni matatizo gani mawili makuu ya faragha ya blockchain ambayo Satoshi Nakamoto ilibainisha kwenye karatasi nyeupe ya Bitcoin?
answer: Kutumia tena Address na kuunganisha anwani
wrong_answers:
  - Ada za muamala na ucheleweshaji wa uthibitishaji
  - Matumizi mara mbili na migongano ya hashi
  - Msongamano wa mtandao na uwekaji kati wa mining
explanation: |
  Katika sehemu ya 7 ya karatasi nyeupe ya Bitcoin, Satoshi Nakamoto ilibainisha utumiaji upya wa anwani na mkusanyiko wa anwani kama matatizo makuu ya faragha ya blockchain. Utumiaji tena wa Address hutokea wakati anwani ile ile inatumiwa mara nyingi, hivyo kurahisisha kuunganisha miamala na mtumiaji yuleyule. Address clustering inarejelea uwezo wa kubainisha kuwa anwani tofauti ni za mmiliki mmoja, hasa kupitia miamala ya pembejeo nyingi ambayo inaonyesha kuwa ingizo zote zilidhibitiwa na mtu mmoja. Chaguo zingine ni changamoto za kiufundi au za kiutendaji katika Bitcoin lakini si masuala ya faragha yanayojadiliwa haswa na Satoshi kwenye karatasi nyeupe.

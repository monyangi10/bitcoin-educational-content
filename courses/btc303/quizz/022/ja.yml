question: BitcoinホワイトペーパーでSatoshiナカモトが指摘したブロックチェーンのプライバシーの2つの主な問題点とは？
answer: Addressの再利用とアドレス・クラスタリング
wrong_answers:
  - 取引手数料と確認の遅れ
  - 二重支出とハッシュの衝突
  - ネットワークの混雑とminingの集中化
explanation: |
  Bitcoinホワイトペーパーの7節で、Satoshiナカモトはアドレスの再利用とアドレスのクラスタリングがブロックチェーンのプライバシーの主な問題であると指摘している。Address再利用は、同じアドレスが複数回使用されることで発生し、トランザクションを同じユーザーに結びつけることが容易になる。Addressクラスタリングとは、異なるアドレスが同じ所有者に属していることを判断する能力のことで、特にすべての入力が同一人物によって制御されたことを明らかにする複数入力トランザクションを指す。その他の選択肢は、Bitcoin における技術的または運用上の課題であるが、ホワイトペーパーの Satoshi で特に議論されているプライバシーの問題ではない。
question: ビットコインホワイトペーパーでサトシ・ナカモトが指摘したブロックチェーンにおけるプライバシーの2つの主な問題点とは？
answer: アドレスの再利用とアドレス・クラスタリング
wrong_answers:
  - トランザクション手数料と確認の遅れ
  - 二重支払いとハッシュの衝突
  - ネットワークの混雑とマイニングの集中化
explanation: |
  ビットコインホワイトペーパーの7節で、サトシ・ナカモトはアドレスの再利用とアドレスのクラスタリングがブロックチェーンのプライバシーの主な問題であると指摘している。アドレス再利用は、同じアドレスが複数回使用されることで発生し、トランザクションを同じユーザーに結びつけることが容易になる。アドレスクラスタリングとは、異なるアドレスが同じ所有者に属していることを判断する能力のことで、特にすべての入力が同一人物によって制御されたことを明らかにする複数入力トランザクションを指す。その他の選択肢は、ビットコインにおける技術的または運用上の課題であるが、サトシのホワイトペーパーで特に議論されているプライバシーの問題ではない。
reviewed: false

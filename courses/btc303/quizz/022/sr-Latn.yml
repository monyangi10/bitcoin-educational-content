question: Koja su dva glavna problema privatnosti na blockchainu koja je Satoshi Nakamoto identifikovao u Bitcoin whitepaper-u?
answer: Ponovna upotreba adresa i grupisanje adresa
wrong_answers:
  - Naknade za transakcije i kašnjenja u potvrdi
  - Dvostruko trošenje i sudari heševa
  - Zagušenje mreže i centralizacija rudarenja
explanation: |
  U odeljku 7 Bitcoin whitepaper-a, Satoshi Nakamoto je identifikovao ponovnu upotrebu adresa i grupisanje adresa kao glavne probleme privatnosti na blockchainu.
  Ponovna upotreba adresa se dešava kada se ista adresa koristi više puta, što olakšava povezivanje transakcija sa istim korisnikom. Grupisanje adresa se odnosi 
  na mogućnost utvrđivanja da različite adrese pripadaju istom vlasniku, posebno kroz transakcije sa više ulaza koje otkrivaju da su svi ulazi kontrolisani 
  od strane iste osobe. Ostale opcije su tehnički ili operativni izazovi u Bitcoinu, ali nisu problemi privatnosti koje je Satoshi posebno razmatrao u whitepaper-u.
reviewed: true

question: دو مشکل اصلی حریم خصوصی بلاکچین که Satoshi Nakamoto در مقاله سفید Bitcoin شناسایی کرده است چیست؟
answer: استفاده مجدد از Address و خوشه‌بندی آدرس‌ها
wrong_answers:
  - هزینه‌های تراکنش و تأخیرهای تأییدیه
  - دوبار خرج کردن و برخورد هش
  - ازدحام شبکه و تمرکز mining
explanation: |
  در بخش 7 از وایت‌پیپر Bitcoin، ناکاموتو در Satoshi استفاده مجدد از آدرس و خوشه‌بندی آدرس را به عنوان مشکلات اصلی حریم خصوصی بلاکچین شناسایی کرد. استفاده مجدد از Address زمانی رخ می‌دهد که یک آدرس چندین بار استفاده شود و این امر پیوند دادن تراکنش‌ها به یک کاربر را آسان می‌کند. خوشه‌بندی Address به توانایی تعیین این که آدرس‌های مختلف به یک مالک تعلق دارند اشاره دارد، به ویژه از طریق تراکنش‌های چند ورودی که نشان می‌دهند تمام ورودی‌ها توسط یک شخص کنترل می‌شدند. گزینه‌های دیگر چالش‌های فنی یا عملیاتی در Bitcoin هستند اما مشکلات حریم خصوصی که به طور خاص توسط Satoshi در وایت‌پیپر مورد بحث قرار گرفته‌اند، نیستند.
reviewed: false

question: Ni ingorane zibiri nyamukuru izihe z’ubuzima bwite bwa blockchain Satoshi Nakamoto yerekanye mu gitabu cera ca Bitcoin?
answer: Address gusubira gukoresha no gukoranya aderesi
wrong_answers:
  - Amafaranga y'ugucuruza n'ugucererwa kwemeza
  - Gukoresha amahera kabiri n'ugutombokana kwa hash
  - Uguhagarara kw'urubuga n'ugushira hamwe mining
explanation: |
  Mu gice ca 7 c’igitabu cera ca Bitcoin, Satoshi Nakamoto yerekanye ko gusubira gukoresha amaderesi no gukoranya amaderesi ari vyo bibazo nyamukuru vy’ubuzima bwite bwa blockchain. Gusubira gukoresha Address bishika iyo aderesi imwe ikoreshejwe incuro nyinshi, bikaba vyoroshe guhuza amafaranga n’uwukoresha umwe. Address clustering yerekeza ku bushobozi bwo kumenya ko amaderesi atandukanye ari aya nyen’umuntu umwe, cane cane biciye mu bikorwa vy’ubudandaji vy’ibintu vyinshi vyerekana ko ibintu vyose vyinjizwa vyagenzurwa n’umuntu umwe. Ibindi bishobora gukoreshwa ni ingorane z’ubuhinga canke z’imikorere muri Bitcoin ariko si ibibazo vy’ubuzima bwite vyavuzwe cane cane na Satoshi mu gitabu cera.
question: ปัญหาหลักสองประการของความเป็นส่วนตัวของบล็อกเชนที่ Satoshi Nakamoto ระบุในเอกสารไวท์เปเปอร์ Bitcoin คืออะไร?
answer: การใช้ซ้ำ Address และการจัดกลุ่มที่อยู่
wrong_answers:
  - ค่าธรรมเนียมการทำธุรกรรมและความล่าช้าในการยืนยัน
  - การใช้จ่ายซ้ำซ้อนและการชนกันของแฮช
  - ความแออัดของเครือข่ายและการรวมศูนย์ mining
explanation: |
  ในส่วนที่ 7 ของเอกสารไวท์เปเปอร์ Bitcoin, Satoshi Nakamoto ได้ระบุว่าการใช้ที่อยู่ซ้ำและการจัดกลุ่มที่อยู่เป็นปัญหาหลักของความเป็นส่วนตัวในบล็อกเชน การใช้ที่อยู่ Address ซ้ำเกิดขึ้นเมื่อมีการใช้ที่อยู่เดียวกันหลายครั้ง ทำให้ง่ายต่อการเชื่อมโยงธุรกรรมกับผู้ใช้คนเดียวกัน การจัดกลุ่ม Address หมายถึงความสามารถในการระบุว่าที่อยู่ต่าง ๆ เป็นของเจ้าของเดียวกัน โดยเฉพาะอย่างยิ่งผ่านธุรกรรมหลายอินพุตที่เผยให้เห็นว่าอินพุตทั้งหมดถูกควบคุมโดยบุคคลเดียวกัน ตัวเลือกอื่น ๆ เป็นความท้าทายทางเทคนิคหรือการดำเนินงานใน Bitcoin แต่ไม่ใช่ปัญหาความเป็นส่วนตัวที่ Satoshi กล่าวถึงโดยเฉพาะในเอกสารไวท์เปเปอร์
reviewed: false
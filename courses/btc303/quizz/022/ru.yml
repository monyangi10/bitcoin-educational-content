question: Какие две основные проблемы приватности блокчейна обозначил Satoshi Накамото в документе Bitcoin?
answer: Повторное использование Address и кластеризация адресов
wrong_answers:
  - Комиссии за транзакции и задержки с подтверждением
  - Двойные расходы и хэш-коллизии
  - Перегруженность сети и централизация mining
explanation: |
  В разделе 7 "Белой книги Bitcoin" Satoshi Накамото назвал повторное использование адресов и кластеризацию адресов основными проблемами конфиденциальности блокчейна. Address повторное использование происходит, когда один и тот же адрес используется несколько раз, что позволяет легко связать транзакции с одним и тем же пользователем. Кластеризация Address означает возможность определить, что разные адреса принадлежат одному и тому же владельцу, в частности, благодаря транзакциям с несколькими входами, которые показывают, что все входы контролировались одним и тем же человеком. Остальные варианты представляют собой технические или операционные проблемы в Bitcoin, но не являются вопросами конфиденциальности, которые конкретно рассматриваются в Satoshi в техническом документе.

question: Jaké jsou dva hlavní problémy soukromí blockchainu, které Satoshi Nakamoto identifikoval ve whitepaperu Bitcoin?
answer: Opakované použití a seskupování adres Address
wrong_answers:
  - Poplatky za transakce a zpoždění potvrzení
  - Dvojí utrácení a kolize hash
  - Přetížení sítě a centralizace mining
explanation: |
  V části 7 dokumentu Bitcoin whitepaper Satoshi Nakamoto označil za hlavní problémy s ochranou soukromí v blockchainu opakované použití adres a shlukování adres. K opakovanému použití adresy Address dochází, když je stejná adresa použita vícekrát, což usnadňuje propojení transakcí se stejným uživatelem. Address clustering se týká možnosti určit, že různé adresy patří stejnému vlastníkovi, zejména prostřednictvím transakcí s více vstupy, které odhalí, že všechny vstupy byly ovládány stejnou osobou. Ostatní možnosti jsou technickými nebo provozními problémy v Bitcoin, ale nejsou otázkami ochrany soukromí, o nichž se v bílé knize konkrétně hovoří v Satoshi.

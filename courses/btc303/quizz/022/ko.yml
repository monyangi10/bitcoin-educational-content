question: Satoshi 나카모토가 Bitcoin 백서에서 밝힌 블록체인 프라이버시의 두 가지 주요 문제점은 무엇인가요?
answer: Address 재사용 및 주소 클러스터링
wrong_answers:
  - 거래 수수료 및 확인 지연
  - 이중 지출 및 해시 충돌
  - 네트워크 혼잡 및 mining 중앙 집중화
explanation: |
  Bitcoin 백서의 섹션 7에서 Satoshi 나카모토는 주소 재사용과 주소 클러스터링을 주요 블록체인 개인정보 보호 문제로 파악했습니다. Address 재사용은 동일한 주소가 여러 번 사용될 때 발생하며, 동일한 사용자에게 트랜잭션을 쉽게 연결할 수 있게 해줍니다. Address 클러스터링은 특히 모든 입력이 동일한 사람에 의해 제어되었음을 드러내는 다중 입력 거래를 통해 서로 다른 주소가 동일한 소유자에게 속해 있음을 확인할 수 있는 기능을 말합니다. 다른 옵션은 Bitcoin의 기술적 또는 운영상의 문제이지만 백서에서 Satoshi에서 구체적으로 논의한 개인정보 보호 문제는 아닙니다.
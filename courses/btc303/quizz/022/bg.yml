question: Кои са двата основни проблема с поверителността на блокчейна, които Satoshi Nakamoto идентифицира в Бялата книга на Bitcoin?
answer: Повторно използване на адреси и групирането на адреси
wrong_answers:
  - Такси за транзакции и забавяне на потвърждението
  - Двойно харчене и колизии при хеш
  - Претоварване на мрежата и централизация на копаенето
explanation: |
  В раздел 7 на Бялата книга на Bitcoin Satoshi Nakamoto определи повторната употреба на адреси и групирането на адреси като основните проблеми с поверителността на блокчейна. Повторното използване на адрес се случва, когато един и същ адрес се използва многократно, което улеснява свързването на трансакциите с един и същ потребител. Групирането на адреси се отнася до възможността да се определи, че различни адреси принадлежат на един и същ собственик, особено чрез транзакции с няколко входни UTXO, които разкриват, че всички входове са били контролирани от едно и също лице. Другите варианти са технически или оперативни предизвикателства в Bitcoin, но не са въпроси, свързани с неприкосновеността на личния живот, които се обсъждат конкретно от Satoshi в информационния документ.
reviewed: true

question: Что конкретно устраняет необходимость в цифровых транзакциях благодаря свойству Bitcoin "не доверять"?
answer: Доверенные третьи стороны для обработки и подтверждения транзакций
wrong_answers:
  - Аппаратные и программные компоненты для работы узлов Bitcoin
  - Криптографические алгоритмы для защиты закрытых ключей и подписей
  - Механизмы сетевого консенсуса для согласования действительных блоков
explanation: |
  Свойство Bitcoin, заключающееся в отсутствии доверия, устраняет необходимость в доверенных третьих сторонах, таких как банки или финансовые учреждения, для обработки и подтверждения транзакций. Как объяснил Satoshi Накамото в техническом описании Bitcoin, традиционная коммерция опирается на финансовые учреждения, выступающие в качестве доверенных посредников, но дизайн Bitcoin позволяет системе корректно функционировать без доверенных сторон благодаря децентрализованному механизму консенсуса. Другие варианты представляют собой существенные технические компоненты, которые по-прежнему требуются Bitcoin: для участия в системе по-прежнему необходимо аппаратное/программное обеспечение, криптографическая безопасность остается основополагающей, а сетевой консенсус - это то, как Bitcoin добивается отсутствия доверия, а не то, что он устраняет.

question: ویژگی بدون نیاز به اعتماد Bitcoin به طور خاص نیاز به چه چیزی را در تراکنش‌های دیجیتال از بین می‌برد؟
answer: طرف‌های ثالث مورد اعتماد برای پردازش و اعتبارسنجی تراکنش‌ها
wrong_answers:
  - اجزاء سخت‌افزاری و نرم‌افزاری برای اجرای نودهای Bitcoin
  - الگوریتم‌های رمزنگاری برای ایمن‌سازی کلیدهای خصوصی و امضاها
  - مکانیزم‌های اجماع شبکه برای توافق بر روی بلوک‌های معتبر
explanation: |
  ویژگی بدون نیاز به اعتماد Bitcoin به‌طور خاص نیاز به واسطه‌های مورد اعتماد مانند بانک‌ها یا مؤسسات مالی برای پردازش و اعتبارسنجی تراکنش‌ها را از بین می‌برد. همان‌طور که Satoshi ناکاموتو در وایت‌پیپر Bitcoin توضیح داد، تجارت سنتی به مؤسسات مالی به‌عنوان واسطه‌های مورد اعتماد متکی است، اما طراحی Bitcoin به سیستم اجازه می‌دهد بدون هیچ‌گونه طرف مورد اعتمادی از طریق مکانیزم اجماع غیرمتمرکز خود به‌درستی عمل کند. گزینه‌های دیگر نشان‌دهنده اجزای فنی ضروری هستند که Bitcoin همچنان به آن‌ها نیاز دارد - شما همچنان به سخت‌افزار/نرم‌افزار برای مشارکت نیاز دارید، امنیت رمزنگاری همچنان اساسی است و اجماع شبکه روشی است که Bitcoin از طریق آن به بی‌نیازی از اعتماد دست می‌یابد، نه چیزی که آن را حذف کند.
reviewed: false

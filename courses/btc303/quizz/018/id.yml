question: Apa yang secara khusus dihilangkan oleh properti tanpa kepercayaan Bitcoin dalam transaksi digital?
answer: Pihak ketiga tepercaya untuk memproses dan memvalidasi transaksi
wrong_answers:
  - Komponen perangkat keras dan perangkat lunak untuk menjalankan node Bitcoin
  - Algoritme kriptografi untuk mengamankan kunci dan tanda tangan pribadi
  - Mekanisme konsensus jaringan untuk menyepakati blok yang valid
explanation: |
  Sifat trustless dari Bitcoin secara khusus menghilangkan kebutuhan akan pihak ketiga yang tepercaya seperti bank atau lembaga keuangan untuk memproses dan memvalidasi transaksi. Seperti yang dijelaskan oleh Satoshi Nakamoto dalam whitepaper Bitcoin, perdagangan tradisional bergantung pada lembaga keuangan yang berfungsi sebagai perantara tepercaya, tetapi desain Bitcoin memungkinkan sistem berfungsi dengan baik tanpa pihak tepercaya melalui mekanisme konsensus yang terdesentralisasi. Opsi lainnya mewakili komponen teknis penting yang masih dibutuhkan oleh Bitcoin - Anda masih membutuhkan perangkat keras/perangkat lunak untuk berpartisipasi, keamanan kriptografi tetap menjadi hal yang fundamental, dan konsensus jaringan adalah cara Bitcoin mencapai kepercayaan, bukan sesuatu yang dihilangkan.

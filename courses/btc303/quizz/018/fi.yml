question: Mitä Bitcoin:n luototon ominaisuus nimenomaan poistaa digitaalisten liiketoimien tarpeellisuuden?
answer: Luotetut kolmannet osapuolet käsittelevät ja validoivat liiketoimet
wrong_answers:
  - Laitteisto- ja ohjelmistokomponentit Bitcoin-solmujen käyttämistä varten
  - Salausalgoritmit yksityisten avainten ja allekirjoitusten suojaamiseksi
  - Verkon konsensusmekanismit kelvollisten lohkojen sopimiseksi
explanation: |
  Bitcoin:n luotettava ominaisuus eliminoi nimenomaan sen, että pankkien tai rahoituslaitosten kaltaiset luotettavat kolmannet osapuolet eivät enää tarvitse transaktioiden käsittelyä ja validointia. Kuten Satoshi Nakamoto selitti Bitcoin:n whitepaperissa, perinteinen kaupankäynti perustuu rahoituslaitoksiin, jotka toimivat luotettavina välittäjinä, mutta Bitcoin:n suunnittelun ansiosta järjestelmä toimii oikein ilman luotettavia osapuolia sen hajautetun konsensusmekanismin ansiosta. Muut vaihtoehdot edustavat olennaisia teknisiä komponentteja, joita Bitcoin edelleen vaatii - osallistumiseen tarvitaan edelleen laitteistoa/ohjelmistoa, salausturva on edelleen olennaisen tärkeää, ja verkkokonsensus on Bitcoin:n keino, jolla Bitcoin:n avulla saavutetaan luottamuksen puute, eikä se poista sitä.
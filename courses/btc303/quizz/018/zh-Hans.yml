question: Bitcoin 的无信任属性具体消除了数字交易中的哪些需求？
answer: 处理和验证交易的可信第三方
wrong_answers:
  - 运行 Bitcoin 节点的硬件和软件组件
  - 确保私人密钥和签名安全的加密算法
  - 就有效区块达成一致的网络共识机制
explanation: |
  Bitcoin 的无信任属性特别消除了银行或金融机构等可信第三方处理和验证交易的需要。正如 Satoshi Nakamoto 在 Bitcoin 白皮书中解释的那样，传统商业依赖于金融机构作为可信中介，但 Bitcoin 的设计通过去中心化的共识机制，允许系统在没有任何可信方的情况下正常运行。其他选项代表了 Bitcoin 仍然需要的基本技术组件--你仍然需要硬件/软件来参与，加密安全仍然是基础，网络共识是 Bitcoin 实现无信任的方式，而不是它所消除的东西。
reviewed: false

question: ビットコインのトラストレス・プロパティは、デジタル・トランザクションにおいて具体的に何を不要にするのか？
answer: トランザクションの処理と検証を行う信頼できる第三者機関
wrong_answers:
  - ビットコインノードを稼動させるためのハードウェアとソフトウェア・コンポーネント
  - 秘密鍵と署名を保護する暗号アルゴリズム
  - 有効なブロックに合意するためのネットワーク・コンセンサス・メカニズム
explanation: |
  ビットコインのトラストレス特性は特に、銀行や金融機関のような信頼できる第三者が取引を処理し検証する必要性を排除している。サトシ・ナカモトがビットコインホワイトペーパーで説明しているように、伝統的な商取引は金融機関が信頼できる仲介者として機能することに依存しているが、ビットコインは、その分散型コンセンサス・メカニズムによって、信頼できる当事者がいなくてもシステムが正しく機能することを可能にデザインされている。他の選択肢は、ビットコインが依然として必要とする本質的な技術的要素を表している。参加するためにはハードウェア／ソフトウェアが必要であることに変わりはなく、暗号化セキュリティは依然として基本であり、ネットワーク・コンセンサスはビットコインが排除するものではなく、ビットコんがトラストレスを達成する方法なのである。

question: Je, mali isiyoaminika ya Bitcoin inaondoa nini haswa hitaji la shughuli za kidijitali?
answer: Wahusika wengine wanaoaminika kuchakata na kuthibitisha miamala
wrong_answers:
  - Vifaa na vipengele vya programu vya kuendesha nodi za Bitcoin
  - Algorithms ya kriptografia ili kupata funguo na saini za kibinafsi
  - Mbinu za makubaliano ya mtandao kukubaliana juu ya vizuizi halali
explanation: |
  Mali isiyoaminika ya Bitcoin huondoa hitaji la washirika wengine wanaoaminika kama vile benki au taasisi za fedha ili kuchakata na kuthibitisha miamala. Kama vile Satoshi Nakamoto ilivyoeleza katika karatasi nyeupe ya Bitcoin, biashara ya jadi inategemea taasisi za fedha zinazofanya kazi kama wapatanishi wanaoaminika, lakini muundo wa Bitcoin unaruhusu mfumo kufanya kazi kwa usahihi bila wahusika wowote wanaoaminika kupitia utaratibu wake wa makubaliano yaliyogatuliwa. Chaguo zingine zinawakilisha vipengee muhimu vya kiufundi ambavyo Bitcoin bado inahitaji - bado unahitaji maunzi/programu ili kushiriki, usalama wa kriptografia unasalia kuwa msingi, na makubaliano ya mtandao ni jinsi Bitcoin inafanikisha kutokuwa na uaminifu badala ya kitu inachoondoa.

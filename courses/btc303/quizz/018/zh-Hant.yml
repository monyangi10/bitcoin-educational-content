question: Bitcoin 的無信任屬性具體消除了數位交易中的什麼需求？
answer: 可信賴的第三方處理和驗證交易
wrong_answers:
  - 運行 Bitcoin 節點的硬體與軟體元件
  - 加密演算法可確保私人金鑰和簽名的安全
  - 協定有效區塊的網路共識機制
explanation: |
  Bitcoin 的無信任屬性特別消除了銀行或金融機構等可信第三方處理和驗證交易的需要。正如 Satoshi Nakamoto 在 Bitcoin 白皮書中所解釋的，傳統商業依賴於金融機構作為可信賴的中介，但 Bitcoin 的設計透過其分散式共識機制，允許系統在沒有任何可信賴方的情況下正常運作。其他選項代表 Bitcoin 仍然需要的基本技術元件 - 您仍然需要硬體/軟體來參與，密碼安全性仍然是最基本的，而網路共識是 Bitcoin 達成無信任的方式，而不是它所消除的東西。
reviewed: false

question: Bitcoin की भरोसेमंद संपत्ति डिजिटल लेनदेन में विशेष रूप से किसकी आवश्यकता को समाप्त करती है?
answer: लेनदेन को संसाधित करने और मान्य करने के लिए विश्वसनीय तृतीय पक्ष
wrong_answers:
  - Bitcoin नोड्स को चलाने के लिए हार्डवेयर और सॉफ्टवेयर घटक
  - निजी कुंजियों और हस्ताक्षरों को सुरक्षित करने के लिए क्रिप्टोग्राफ़िक एल्गोरिदम
  - मान्य ब्लॉकों पर सहमति के लिए नेटवर्क सहमति तंत्र
explanation: |
  Bitcoin की विश्वसनीय विशेषताएँ लेनदेन को संसाधित और सत्यापित करने के लिए बैंकों या वित्तीय संस्थानों जैसे विश्वसनीय तृतीय पक्षों की आवश्यकता को विशेष रूप से समाप्त कर देती हैं। जैसा कि Satoshi नाकामोतो ने Bitcoin श्वेतपत्र में बताया है, पारंपरिक वाणिज्य विश्वसनीय मध्यस्थों के रूप में वित्तीय संस्थानों पर निर्भर करता है, लेकिन Bitcoin का डिज़ाइन अपने विकेन्द्रीकृत सहमति तंत्र के माध्यम से सिस्टम को बिना किसी विश्वसनीय पक्ष के भी सही ढंग से कार्य करने की अनुमति देता है। अन्य विकल्प आवश्यक तकनीकी घटकों का प्रतिनिधित्व करते हैं जिनकी Bitcoin को अभी भी आवश्यकता है - आपको भाग लेने के लिए अभी भी हार्डवेयर/सॉफ़्टवेयर की आवश्यकता है, क्रिप्टोग्राफ़िक सुरक्षा मूलभूत बनी हुई है, और नेटवर्क सहमति वह तरीका है जिससे Bitcoin विश्वसनीयता प्राप्त करता है, न कि वह जिसे वह समाप्त करता है।

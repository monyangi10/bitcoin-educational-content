question: 当矿工连接到带宽和连接性更强的 mining 矿池，以避免在区块大小增加期间出现陈旧区块时，Bitcoin 网络的主要负面影响是什么？
answer: 它降低了 mining 的去中心化程度，因为小型矿工会被推向拥有卓越基础设施的大型矿池
wrong_answers:
  - 它增加了 mining 运算的计算难度，使区块更难求解
  - 为保持网络连接，必须支付额外的交易费用
  - 它降低了网络的总哈希率，因为矿工将资源用于连接，而不是 mining
explanation: |
  该章解释说，当区块大小增加时，传播时间也会增加，从而导致更多的陈旧区块。为了避免过期区块带来的区块奖励损失，矿工会寻找带宽和连接性更好的矿池。这就促使矿工转向规模更大、连接性更好的矿池，从而降低了 mining 的分散性。其他选项都是错误的：无论矿池的连接性如何，难度都会自动调整，连接成本不会产生额外的交易费用，矿工加入连接性更好的矿池时不会降低哈希率。
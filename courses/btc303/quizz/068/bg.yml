question: Когато миньорите се свързват към пуловете mining с по-голяма честотна лента и свързаност, за да избегнат застояване на блоковете през периодите на увеличени размери на блоковете, каква е основната отрицателна последица за мрежата Bitcoin?
answer: Тя намалява децентрализацията на mining, тъй като по-малките миньори са изтласкани към по-големи пулове с по-добра инфраструктура
wrong_answers:
  - Увеличава изчислителната трудност на операциите mining, като прави блоковете по-трудни за решаване
  - Създава допълнителни такси за транзакции, които трябва да се плащат за поддържане на мрежовата свързаност
  - Това намалява общата скорост на хеширане в мрежата, тъй като миньорите изразходват ресурси за свързаност вместо за mining
explanation: |
  В главата е обяснено, че когато размерът на блоковете се увеличава, времето за разпространение се увеличава, което води до повече застояли блокове. За да избегнат загубата на блокови възнаграждения от застояли блокове, миньорите търсят пулове с по-добра пропускателна способност и свързаност. Това тласка миньорите към по-големи, добре свързани пулове, което намалява децентрализацията на mining. Другите варианти са неправилни: трудността се регулира автоматично независимо от свързаността на пуловете, разходите за свързаност не създават допълнителни такси за транзакции и миньорите не намаляват скоростта на хеш, когато се присъединяват към по-добре свързани пулове.
reviewed: false

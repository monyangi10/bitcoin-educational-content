question: Когато миньорите се свързват към миньорски басейни с по-голяма честотна лента и свързаност, за да избегнат застояване на блоковете през периодите на увеличени размери на блоковете, каква е основната отрицателна последица за мрежата Bitcoin?
answer: Тя намалява децентрализацията на копаене, тъй като по-малките миньори са изтласкани към по-големи басейни с по-добра инфраструктура
wrong_answers:
  - Увеличава изчислителната трудност на операциите, като прави блоковете по-трудни за решаване
  - Създава допълнителни такси за транзакции, които трябва да се плащат за поддържане на мрежовата свързаност
  - Това намалява общата скорост на хеширане в мрежата, тъй като миньорите изразходват ресурси за свързаност вместо за копаене
explanation: |
  В главата е обяснено, че когато размерът на блоковете се увеличава, времето за разпространение се увеличава, което води до повече застояли блокове. За да избегнат загубата на блокови възнаграждения от застояли блокове, миньорите търсят басейни с по-добра пропускателна способност и свързаност. Това тласка миньорите към по-големи, добре свързани басейни, което намалява децентрализацията на копаенето. Другите варианти са неправилни: трудността се регулира автоматично независимо от свързаността на басейните, разходите за свързаност не създават допълнителни такси за транзакции и миньорите не намаляват скоростта на хеш, когато се присъединяват към по-добре свързани басейни.
reviewed: true

question: जब माइनर्स, ब्लॉक आकार में वृद्धि की अवधि के दौरान पुराने ब्लॉकों से बचने के लिए अधिक बैंडविड्थ और कनेक्टिविटी के साथ mining पूल से जुड़ते हैं, तो Bitcoin नेटवर्क के लिए प्राथमिक नकारात्मक परिणाम क्या होता है?
answer: यह mining विकेंद्रीकरण को कम करता है क्योंकि छोटे खनिकों को बेहतर बुनियादी ढांचे वाले बड़े पूल की ओर धकेला जाता है
wrong_answers:
  - यह mining परिचालनों की गणना संबंधी कठिनाई को बढ़ाता है, जिससे ब्लॉकों को हल करना कठिन हो जाता है
  - इससे अतिरिक्त लेनदेन शुल्क लगता है जिसका भुगतान नेटवर्क कनेक्टिविटी बनाए रखने के लिए करना पड़ता है
  - यह नेटवर्क की कुल हैश दर को कम कर देता है क्योंकि खनिक mining के बजाय कनेक्टिविटी पर संसाधन खर्च करते हैं
explanation: |
  अध्याय में बताया गया है कि जब ब्लॉक का आकार बढ़ता है, तो प्रसार समय भी बढ़ता है, जिससे ज़्यादा पुराने ब्लॉक बनते हैं। पुराने ब्लॉकों से मिलने वाले ब्लॉक रिवॉर्ड खोने से बचने के लिए, माइनर्स बेहतर बैंडविड्थ और कनेक्टिविटी वाले पूल्स की तलाश करते हैं। इससे माइनर्स बड़े, अच्छी तरह से जुड़े पूल्स की ओर बढ़ते हैं, जिससे mining विकेंद्रीकरण कम होता है। अन्य विकल्प गलत हैं: पूल कनेक्टिविटी की परवाह किए बिना कठिनाई अपने आप समायोजित हो जाती है, कनेक्टिविटी लागत अतिरिक्त लेनदेन शुल्क नहीं लगाती है, और बेहतर कनेक्टेड पूल्स में शामिल होने पर माइनर्स हैश रेट कम नहीं करते हैं।
question: Kui kaevandajad ühenduvad suurema ribalaiuse ja ühenduvusega mining-pooltega, et vältida aegunud plokke suurenenud plokimahu ajal, siis milline on peamine negatiivne tagajärg Bitcoin-võrgule?
answer: See vähendab mining detsentraliseerimist, kuna väiksemaid kaevandajaid surutakse suuremate basseinide poole, millel on parem infrastruktuur
wrong_answers:
  - See suurendab mining operatsioonide arvutuslikku raskust, muutes plokkide lahendamise raskemaks
  - See tekitab täiendavaid tehingutasusid, mida tuleb maksta võrguühenduse säilitamiseks
  - See vähendab võrgu üldist hash-kiirust, kuna kaevurid kulutavad ressursse ühenduvusele, mitte mining-le
explanation: |
  Peatükis selgitatakse, et kui plokkide suurus suureneb, suureneb ka paljundusaeg, mis toob kaasa rohkem aegunud plokke. Selleks, et vältida aegunud plokkidest tuleneva tasu kaotamist, otsivad kaevandajad parema ribalaiuse ja ühenduvusega basseinid. See sunnib kaevandajaid liikuma suuremate, hästi ühendatud basseinide poole, vähendades mining detsentraliseeritust. Teised valikud on valed: raskusaste kohandub automaatselt, sõltumata basseinide ühenduvusest, ühenduvuskulud ei tekita täiendavaid tehingutasusid ja kaevandajad ei vähenda hash-kiirust, kui nad liituvad paremini ühendatud basseinidega.
reviewed: false

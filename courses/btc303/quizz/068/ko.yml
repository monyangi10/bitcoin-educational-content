question: 채굴자가 블록 크기가 증가하는 기간 동안 오래된 블록을 피하기 위해 더 큰 대역폭과 연결성을 갖춘 mining 풀에 연결할 경우, Bitcoin 네트워크에 미치는 주요 부정적인 결과는 무엇인가요?
answer: 소규모 채굴자들이 우수한 인프라를 갖춘 대규모 풀로 몰리면서 mining 탈중앙화가 감소합니다
wrong_answers:
  - mining 연산의 계산 난이도가 증가하여 블록을 풀기가 더 어려워집니다
  - 네트워크 연결을 유지하기 위해 지불해야 하는 추가 거래 수수료가 발생합니다
  - 채굴자가 mining 대신 연결에 리소스를 사용하므로 네트워크의 총 해시 속도가 감소합니다
explanation: |
  이 장에서는 블록 크기가 커지면 전파 시간이 증가하여 오래된 블록이 더 많이 발생한다고 설명합니다. 오래된 블록으로 인해 블록 보상을 잃지 않기 위해 채굴자는 대역폭과 연결성이 더 좋은 풀을 찾게 됩니다. 이로 인해 채굴자들은 더 크고 연결성이 좋은 풀로 몰리게 되며, mining 탈중앙화는 감소하게 됩니다. 다른 옵션은 풀 연결에 관계없이 난이도가 자동으로 조정되고, 연결 비용으로 인해 추가 거래 수수료가 발생하지 않으며, 채굴자가 더 나은 연결 풀에 참여할 때 해시 비율이 감소하지 않는다는 점에서 올바르지 않습니다.
question: Когда майнеры подключаются к пулам mining с большей пропускной способностью и связью, чтобы избежать залежавшихся блоков в периоды увеличения размера блоков, каковы основные негативные последствия для сети Bitcoin?
answer: Это снижает децентрализацию mining, поскольку мелкие майнеры подталкиваются к более крупным пулам с превосходной инфраструктурой
wrong_answers:
  - Это увеличивает вычислительную сложность операций mining, делая блоки более трудноразрешимыми
  - Это создает дополнительные комиссии за транзакции, которые необходимо оплачивать для поддержания сетевого соединения
  - Это снижает общий хэшрейт сети, так как майнеры тратят ресурсы на соединение вместо mining
explanation: |
  В главе объясняется, что при увеличении размера блока время распространения увеличивается, что приводит к увеличению количества неактуальных блоков. Чтобы не потерять вознаграждение за неработающие блоки, майнеры ищут пулы с лучшей пропускной способностью и связью. Это подталкивает майнеров к большим, хорошо связанным пулам, что снижает децентрализацию mining. Другие варианты неверны: сложность регулируется автоматически, независимо от подключения пула, затраты на подключение не создают дополнительных комиссий за транзакции, и майнеры не снижают хэшрейт при присоединении к пулам с лучшим подключением.
reviewed: false

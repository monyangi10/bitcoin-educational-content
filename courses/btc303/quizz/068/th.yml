question: เมื่อคนขุดเหมืองเชื่อมต่อกับกลุ่ม mining ที่มีแบนด์วิดท์และการเชื่อมต่อที่ดีกว่าเพื่อหลีกเลี่ยงบล็อกที่ล้าสมัยในช่วงที่ขนาดบล็อกเพิ่มขึ้น ผลกระทบด้านลบหลักสำหรับเครือข่าย Bitcoin คืออะไร?
answer: มันลดการกระจายอำนาจของ mining เนื่องจากนักขุดรายย่อยถูกผลักดันไปสู่กลุ่มที่ใหญ่กว่าซึ่งมีโครงสร้างพื้นฐานที่เหนือกว่า
wrong_answers:
  - มันเพิ่มความยากในการคำนวณของการดำเนินการ mining ทำให้บล็อกแก้ไขได้ยากขึ้น
  - มันสร้างค่าธรรมเนียมการทำธุรกรรมเพิ่มเติมที่ต้องจ่ายเพื่อรักษาการเชื่อมต่อเครือข่าย
  - มันลดอัตราแฮชรวมของเครือข่ายเนื่องจากนักขุดใช้ทรัพยากรในการเชื่อมต่อแทนที่จะเป็น mining
explanation: |
  บทนี้อธิบายว่าเมื่อขนาดบล็อกเพิ่มขึ้น เวลาการแพร่กระจายก็เพิ่มขึ้น ทำให้เกิดบล็อกที่ล้าสมัยมากขึ้น เพื่อหลีกเลี่ยงการสูญเสียรางวัลบล็อกจากบล็อกที่ล้าสมัย นักขุดจึงมองหากลุ่มที่มีแบนด์วิดท์และการเชื่อมต่อที่ดีกว่า สิ่งนี้ผลักดันให้นักขุดไปสู่กลุ่มที่ใหญ่กว่าและเชื่อมต่อได้ดีขึ้น ลดการกระจายตัวของ mining ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: ความยากจะปรับโดยอัตโนมัติโดยไม่คำนึงถึงการเชื่อมต่อของกลุ่ม ค่าใช้จ่ายในการเชื่อมต่อไม่ได้สร้างค่าธรรมเนียมการทำธุรกรรมเพิ่มเติม และนักขุดไม่ได้ลดอัตราแฮชเมื่อเข้าร่วมกลุ่มที่เชื่อมต่อได้ดีกว่า
reviewed: false
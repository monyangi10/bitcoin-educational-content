question: Iyo abacukuzi b’amabuye y’agaciro bahuye n’ibidengeri vya mining bifise uburebure bw’uruja n’uruza n’uburyo bwo gukorana kugira ngo birinde amabuye y’agaciro mu bihe vy’ugukura kw’ubunini bw’amabuye, ni ingaruka mbi iyihe y’intango ku rubuga rwa Bitcoin?
answer: Bigabanya ukwegereza ubutegetsi mining uko abacukuzi batobato basunikwa baja mu bidengeri bininibinini bifise ibikorwa remezo vyiza cane .
wrong_answers:
  - Birongera ingorane zo gukoresha ubuhinga bwa mining bituma amabuye agora gutorera umuti .
  - Bituma habaho amafaranga y'inyongera y'ugucuruza ategerezwa kurihwa kugira ngo umuntu akomeze gukorana n'urubuga .
  - Bigabanya igipimo cose c’uruja n’uruza rw’urubuga uko abacukuzi bakoresha ubutunzi ku guhuza aho gukoresha mining.
explanation: |
  Ico kigabane kirasigura yuko iyo ubunini bw’amabuye bugenda buragwira, igihe co gukwiragira kigenda kirushiriza, ivyo bikaba bituma haba amabuye menshi ashaje. Kugira ngo ntibatakaze ingororano z’amabuye y’agaciro, abacukuzi barondera ibidengeri bifise uburebure bwiza n’uburyo bwo gukorana. Ivyo bituma abacukuzi b’amabuye y’agaciro baja mu bidengeri bininibinini kandi bifatanye neza, bikagabanya ugusenyura ubutegetsi kwa mining. Ayandi mahitamwo ntabwo ari meza: ingorane irahinduka ubwayo ataco ifatiye ku guhuza kw’ibidengeri, ibiciro vy’uguhuza ntibituma haba amafaranga y’inyongera y’ugucuruza, kandi abacukuzi ntibagabanya igipimo ca hash iyo bifatanya n’ibidengeri bihuye neza.
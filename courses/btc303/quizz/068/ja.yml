question: ブロックサイズが増加する期間中、マイナーがより大きな帯域幅と接続性を持つマイニングプールに接続し、陳腐化したブロックを回避する場合、ビットコイン・ネットワークにとって主にどのような悪影響があるか？
answer: 小規模なマイナーが優れたインフラを持つ大規模なプールに押され、マイニングの分散化が減少する
wrong_answers:
  - マイニングの計算難易度が上がり、ブロックを解くのが難しくなる
  - ネットワーク接続を維持するために支払わなければならない追加のトランザクション手数料が発生する
  - マイナーがマイニングの代わりに接続にリソースを費やすため、ネットワークの総ハッシュレートが低下する
explanation: |
  この章では、ブロックサイズが大きくなると伝搬時間が長くなり、ステイルブロックが増えることを説明している。ステイルブロックによるブロック報酬の損失を避けるため、マイナーは帯域幅と接続性がより良いプールを求める。このため、マイナーはより大規模で接続性の高いプールに向かうようになり、マイニングの分散化が抑制される。他の選択肢は正しくない：難易度はプールの接続性に関係なく自動的に調整され、接続性コストは追加のトランザクション手数料を生み出さず、マイナーは接続性の良いプールに参加してもハッシュレートを下げない。
reviewed: false

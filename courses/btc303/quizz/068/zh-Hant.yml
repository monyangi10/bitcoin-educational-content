question: 當礦工在區塊大小增加期間，為了避免陳舊區塊而連線到具有更大頻寬和連線性的 mining 區塊池時，Bitcoin 網路的主要負面後果是什麼？
answer: 它減少了 mining 的分散性，因為較小的礦工會被推向擁有優異基礎設施的較大池。
wrong_answers:
  - 它增加了 mining 運算的計算難度，使得區塊更難解
  - 它產生了額外的交易費用，必須支付這些費用才能維持網路連線。
  - 這會降低網路的總雜湊率，因為礦工會將資源花在連線上，而不是 mining
explanation: |
  本章說明，當區塊大小增加時，傳播時間也會增加，導致更多的陳舊區塊。為了避免因區塊過時而損失區塊獎勵，礦工會尋找帶寬和連線性較佳的區塊池。這將礦工推向更大、連接性更好的池，從而降低 mining 的分散性。其他選項是錯誤的，無論連結性如何，困難度都會自動調整，連結成本不會產生額外的交易費用，而且礦工加入連結性較佳的池時，不會降低哈希率。
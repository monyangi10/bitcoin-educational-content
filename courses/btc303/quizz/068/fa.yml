question: هنگامی که ماینرها برای جلوگیری از بلاک‌های منسوخ در دوره‌های افزایش اندازه بلاک‌ها به استخرهای mining با پهنای باند و اتصال بیشتر متصل می‌شوند، پیامد منفی اصلی برای شبکه Bitcoin چیست؟
answer: این امر تمرکززدایی mining را کاهش می‌دهد زیرا ماینرهای کوچکتر به سمت استخرهای بزرگتر با زیرساخت‌های برتر سوق داده می‌شوند.
wrong_answers:
  - این امر دشواری محاسباتی عملیات mining را افزایش می‌دهد و حل بلوک‌ها را سخت‌تر می‌کند.
  - این هزینه‌های تراکنش اضافی ایجاد می‌کند که باید برای حفظ اتصال شبکه پرداخت شوند.
  - این باعث کاهش نرخ هش کل شبکه می‌شود زیرا ماینرها منابع خود را به جای mining صرف اتصال می‌کنند.
explanation: |
  این فصل توضیح می‌دهد که وقتی اندازه بلوک‌ها افزایش می‌یابد، زمان‌های انتشار نیز افزایش می‌یابد که منجر به بلوک‌های منسوخ بیشتری می‌شود. برای جلوگیری از از دست دادن پاداش بلوک‌ها به دلیل بلوک‌های منسوخ، ماینرها به دنبال استخرهایی با پهنای باند و اتصال بهتر هستند. این امر ماینرها را به سمت استخرهای بزرگ‌تر و بهتر متصل سوق می‌دهد و تمرکززدایی mining را کاهش می‌دهد. گزینه‌های دیگر نادرست هستند: سختی به‌طور خودکار تنظیم می‌شود، صرف‌نظر از اتصال استخر، هزینه‌های اتصال هزینه‌های تراکنش اضافی ایجاد نمی‌کند و ماینرها هنگام پیوستن به استخرهای بهتر متصل، نرخ هش را کاهش نمی‌دهند.
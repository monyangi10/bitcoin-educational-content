question: بر اساس نقد رگنار لیفتاسیر، روایت‌های ساده‌انگارانه Bitcoin مانند 'فقط HODL' چه مشکلی برای اکوسیستم Bitcoin ایجاد می‌کنند؟
answer: آنها به مونو‌مانیاهایی تبدیل می‌شوند که باعث می‌شوند کاربران جنبه‌های مهم‌تری مانند امنیت و استفاده بدون نیاز به اعتماد را نادیده بگیرند.
wrong_answers:
  - "آن‌ها فعالیت‌های تجاری بیش از حد را تشویق می‌کنند که قیمت و پویایی‌های بازار Bitcoin را بی‌ثبات می‌کند"
  - آن‌ها انتظارات نادرستی درباره بازدهی‌های تضمین‌شده ایجاد می‌کنند که منجر به بررسی و مداخله نظارتی می‌شود.
  - آنها استفاده از صرافی‌های متمرکز را ترویج می‌کنند که دارایی‌های Bitcoin را در خدمات امانی متمرکز می‌کند.
explanation: |
  لیفثاسیر این روایت‌های ساده‌انگارانه را به‌عنوان 'مونومانیا' تعریف می‌کند - تمرکز بیش از حد بر یک ایده‌ی واحد که باعث می‌شود افراد به ملاحظات احتمالاً مهم‌تر بی‌توجهی کنند. با تمرکز تنها بر نگه‌داری Bitcoin، کاربران ممکن است جنبه‌های حیاتی مانند روش‌های امنیتی مناسب، خودنگهداری، یا استفاده از Bitcoin به‌صورت بدون اعتماد را نادیده بگیرند. گزینه‌های دیگر، در حالی که ممکن است مشکل‌ساز باشند، نقد خاص لیفثاسیر درباره پیام‌رسانی ساده‌انگارانه Bitcoin نیستند.
reviewed: false

question: Dushingiye ku vyo Ragnar Lifthasir yaneguye, ni ingorane iyihe inkuru zoroheje za Bitcoin nka ‘HODL gusa’ zitera ku bidukikije vya Bitcoin?
answer: Bica bihinduka monomanias zituma abakoresha birengagiza ibintu bihambaye kuruta nk’umutekano n’ugukoresha ata kwizigirwa .
wrong_answers:
  - "Baremesha ibikorwa vy'ubudandaji birenze urugero bitera ingorane igiciro ca Bitcoin n'imigenderanire y'isoko"
  - Bituma habaho ivyizigiro vy’ikinyoma ku bijanye n’inyungu zizemewe zituma habaho isuzuma ry’amategeko n’ugufasha .
  - Batera imbere ikoreshwa ry'ubucuruzi ry'imbere mu gihugu ryibanda ku migabane ya Bitcoin mu bikorwa vyo kubungabunga .
explanation: |
  Lifthasir asobanura izo nkuru zoroheje nk’‘ugukunda ibintu bimwe’ - kwibanda cane ku ciyumviro kimwe bituma abantu birengagiza ibintu bihambaye kuruta. Mu kwibanda gusa ku gufata Bitcoin, abakoresha boshobora kwirengagiza ibintu bihambaye nk’imigenzo ibereye y’umutekano, ukwizigama, canke gukoresha Bitcoin mu buryo butagiramwo icizigiro. Ibindi bihitamwo, naho bishobora kuba ingorane, si vyo Lifthasir anegura ku bijanye n’ubutumwa bwa Bitcoin bworoshe cane.
reviewed: false

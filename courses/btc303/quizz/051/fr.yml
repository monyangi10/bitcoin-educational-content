question: D'après la critique de Ragnar Lifthasir, quel problème les récits simplistes de Bitcoin comme "juste HODL" créent-ils pour l'écosystème de Bitcoin ?
answer: Ils deviennent des monomanies qui amènent les utilisateurs à négliger des aspects plus importants tels que la sécurité et l'utilisation sans confiance
wrong_answers:
  - "Ils encouragent une activité commerciale excessive qui déstabilise le prix du Bitcoin et la dynamique du marché
  - Ils créent de fausses attentes en matière de garantie de rendement, ce qui conduit à un examen et à une intervention des autorités de régulation
  - Ils encouragent l'utilisation d'un système d'échange centralisé qui concentre les avoirs du Bitcoin dans des services de garde
explanation: |
  Lifthasir définit ces récits simplistes comme des "monomanies" - une focalisation excessive sur une seule idée qui amène les gens à négliger des considérations sans doute plus importantes. En se concentrant uniquement sur la détention de Bitcoin, les utilisateurs peuvent négliger des aspects critiques tels que les pratiques de sécurité adéquates, l'autodétention ou l'utilisation de Bitcoin sans confiance. Les autres options, bien que potentiellement problématiques, ne sont pas la critique spécifique que Lifthasir fait à propos de la simplification excessive des messages sur la Bitcoin.
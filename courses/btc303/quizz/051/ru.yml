question: Согласно критике Рагнара Лифтасира, какую проблему для экосистемы Bitcoin создают упрощенные повествования типа "просто HODL"?
answer: Они превращаются в мономанию, которая заставляет пользователей упускать из виду такие важные аспекты, как безопасность и надежность использования
wrong_answers:
  - "Они поощряют чрезмерную торговую активность, которая дестабилизирует цену Bitcoin и динамику рынка"
  - Они создают ложные ожидания относительно гарантированной доходности, что приводит к контролю и вмешательству регулирующих органов
  - Они способствуют централизованному использованию биржи, которая концентрирует запасы Bitcoin в кастодиальных службах
explanation: |
  Лифтасир называет такие упрощенные рассказы "мономанией" - чрезмерной сосредоточенностью на одной идее, которая заставляет людей упускать из виду, возможно, более важные соображения. Сосредоточившись только на удержании Bitcoin, пользователи могут пренебречь такими важными аспектами, как надлежащие методы безопасности, самоохрана или использование Bitcoin в условиях отсутствия доверия. Другие варианты, хотя и являются потенциально проблематичными, не вызывают у Лифтасира особой критики по поводу чрезмерно упрощенной подачи информации о Bitcoin.
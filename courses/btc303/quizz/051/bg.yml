question: Според критиката на Рагнар Лифтхасир, какъв проблем създават опростените разкази за Bitcoin като "просто HODL" за екосистемата на Bitcoin?
answer: Те се превръщат в мономания, която кара потребителите да пренебрегват по-важни аспекти като сигурността и безпогрешното използване
wrong_answers:
  - "Те насърчават прекомерната търговска дейност, която дестабилизира цената на Bitcoin и динамиката на пазара"
  - Те създават фалшиви очаквания за гарантирана възвръщаемост, които водят до регулаторен контрол и намеса
  - Те насърчават централизираното използване на обмена, което концентрира притежанията на Bitcoin в попечителски услуги
explanation: |
  Лифтхасир определя тези опростени разкази като "мономания" - прекомерно съсредоточаване върху една идея, което кара хората да пренебрегват по-важни съображения. Фокусирайки се единствено върху притежаването на Bitcoin, потребителите могат да пренебрегнат критични аспекти като подходящи практики за сигурност, самонаблюдение или използване на Bitcoin по начин, който не буди доверие. Другите варианти, макар и потенциално проблематични, не са конкретната критика, която Лифтхасир отправя към прекалено опростените съобщения за Bitcoin.
reviewed: false

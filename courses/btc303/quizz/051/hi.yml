question: राग्नर लिफथासिर की आलोचना के अनुसार, 'केवल HODL' जैसी सरल Bitcoin कथाएं Bitcoin पारिस्थितिकी तंत्र के लिए क्या समस्या उत्पन्न करती हैं?
answer: वे एकोन्माद बन जाते हैं जिसके कारण उपयोगकर्ता सुरक्षा और अविश्वसनीय उपयोग जैसे अधिक महत्वपूर्ण पहलुओं को नजरअंदाज कर देते हैं
wrong_answers:
  - "वे अत्यधिक व्यापारिक गतिविधि को प्रोत्साहित करते हैं जो Bitcoin की कीमत और बाजार की गतिशीलता को अस्थिर करता है"
  - वे गारंटीकृत रिटर्न के बारे में झूठी उम्मीदें पैदा करते हैं जिसके कारण नियामक जांच और हस्तक्षेप होता है
  - वे केंद्रीकृत विनिमय उपयोग को बढ़ावा देते हैं जो Bitcoin होल्डिंग्स को कस्टोडियल सेवाओं में केंद्रित करता है
explanation: |
  लिफ़्टहासिर इन सरलीकृत आख्यानों को 'मोनोमेनिया' कहते हैं - एक ही विचार पर अत्यधिक ध्यान केंद्रित करना जिसके कारण लोग संभवतः अधिक महत्वपूर्ण बातों को नज़रअंदाज़ कर देते हैं। केवल Bitcoin को धारण करने पर ध्यान केंद्रित करके, उपयोगकर्ता उचित सुरक्षा उपायों, स्व-संरक्षण, या Bitcoin का अविश्वसनीय तरीके से उपयोग जैसे महत्वपूर्ण पहलुओं की उपेक्षा कर सकते हैं। अन्य विकल्प, हालांकि संभावित रूप से समस्याग्रस्त हैं, वे लिफ़्टहासिर द्वारा अति-सरलीकृत Bitcoin संदेश के बारे में की गई विशिष्ट आलोचना नहीं हैं।

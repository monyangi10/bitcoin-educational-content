question: Jaký problém podle kritiky Ragnara Lifthasira vytvářejí zjednodušená vyprávění o Bitcoin jako "jen HODL" pro ekosystém Bitcoin?
answer: Stávají se monománií, která způsobuje, že uživatelé přehlížejí důležitější aspekty, jako je bezpečnost a nedůvěryhodné používání
wrong_answers:
  - "Podporují nadměrnou obchodní aktivitu, která destabilizuje cenu a dynamiku trhu s Bitcoin."
  - Vytvářejí falešná očekávání ohledně zaručených výnosů, která vedou k regulační kontrole a zásahům
  - Podporují centralizované využívání burzy, které soustřeďuje držbu Bitcoin v úschovných službách
explanation: |
  Lifthasir definuje tato zjednodušená vyprávění jako "monománii" - přílišné zaměření na jednu myšlenku, které způsobuje, že lidé přehlížejí pravděpodobně důležitější úvahy. Tím, že se uživatelé soustředí pouze na držení Bitcoin, mohou zanedbávat kritické aspekty, jako jsou správné bezpečnostní postupy, vlastní úschova nebo používání Bitcoin bez důvěry. Ostatní možnosti jsou sice potenciálně problematické, ale nepředstavují specifickou kritiku, kterou Lifthasir vznáší ohledně příliš zjednodušených zpráv Bitcoin.
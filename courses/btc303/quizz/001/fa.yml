question: هدف اصلی تمرکززدایی در Bitcoin چیست؟
answer: برای دستیابی به مقاومت در برابر سانسور
wrong_answers:
  - برای افزایش سرعت پردازش تراکنش
  - برای کاهش هزینه‌های مصرف انرژی
  - برای ساده‌سازی رابط کاربری
explanation: |
  غیرمتمرکزسازی در Bitcoin عمدتاً برای دستیابی به مقاومت در برابر سانسور عمل می‌کند، به این معنی که هیچ نهاد واحدی نمی‌تواند تراکنش‌ها را کنترل، مسدود یا دستکاری کند. این به‌طور صریح در متن بیان شده است: 'غیرمتمرکزسازی وسیله‌ای برای دستیابی به مقاومت در برابر سانسور است.' گزینه‌های دیگر نادرست هستند زیرا غیرمتمرکزسازی در واقع Bitcoin را کندتر و از نظر انرژی‌برتر از سیستم‌های متمرکز می‌کند و سیستم را پیچیده‌تر می‌کند نه ساده‌تر. مقاومت در برابر سانسور چیزی است که Bitcoin را از سیستم‌های پولی سنتی متمایز می‌کند و مانع از آن می‌شود که دولت‌ها یا دیگر مقامات آن را تعطیل کنند یا کنترل کنند که چه کسی می‌تواند از آن استفاده کند.
reviewed: false

question: Каква е основната цел на децентрализацията в Bitcoin?
answer: За постигане на устойчивост на цензурата
wrong_answers:
  - Увеличаване на скоростта на обработка на транзакциите
  - Да се намалят разходите за потребление на енергия
  - Опростяване на потребителския интерфейс
explanation: |
  Децентрализацията в Bitcoin служи предимно за постигане на устойчивост на цензура, което означава, че нито един субект не може да контролира, блокира или манипулира трансакциите. Това е изрично посочено в текста: "Децентрализацията е средство за постигане на устойчивост на цензура" Другите варианти са неправилни, защото децентрализацията всъщност прави Bitcoin по-бавна и по-енергоемка от централизираните системи и прави системата по-сложна, а не по-проста. Устойчивостта на цензура е това, което отличава Bitcoin от традиционните парични системи и не позволява на правителства или други органи да я закрият или да контролират кой може да я използва.
reviewed: false

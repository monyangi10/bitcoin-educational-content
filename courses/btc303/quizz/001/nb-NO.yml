question: Hva er hovedformålet med desentralisering i Bitcoin?
answer: For å oppnå sensurmotstand
wrong_answers:
  - For å øke hastigheten på transaksjonsbehandlingen
  - For å redusere energiforbrukskostnadene
  - For å forenkle brukergrensesnittet
explanation: |
  Desentralisering i Bitcoin tjener først og fremst til å oppnå sensurresistens, noe som betyr at ingen enkelt enhet kan kontrollere, blokkere eller manipulere transaksjoner. Dette står eksplisitt i teksten: "Desentralisering er et middel for å oppnå sensurresistens" De andre alternativene er feil fordi desentralisering faktisk gjør Bitcoin tregere og mer energikrevende enn sentraliserte systemer, og det gjør systemet mer komplekst i stedet for enklere. Sensurresistens er det som skiller Bitcoin fra tradisjonelle pengesystemer og hindrer myndigheter i å stenge det ned eller kontrollere hvem som kan bruke det.
reviewed: false

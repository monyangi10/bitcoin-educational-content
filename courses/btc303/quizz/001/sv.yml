question: Vad är det primära syftet med decentralisering i Bitcoin?
answer: För att uppnå censurmotstånd
wrong_answers:
  - För att öka hastigheten på transaktionshanteringen
  - Att minska kostnaderna för energiförbrukning
  - För att förenkla användargränssnittet
explanation: |
  Decentralisering i Bitcoin tjänar främst till att uppnå censurresistens, vilket innebär att ingen enskild enhet kan kontrollera, blockera eller manipulera transaktioner. Detta anges uttryckligen i texten: "Decentralisering är ett sätt att uppnå censurresistens De andra alternativen är felaktiga eftersom decentralisering faktiskt gör Bitcoin långsammare och mer energikrävande än centraliserade system, och det gör systemet mer komplext snarare än enklare. Censurresistens är det som skiljer Bitcoin från traditionella penningsystem och hindrar regeringar eller andra myndigheter från att stänga ner det eller kontrollera vem som kan använda det.
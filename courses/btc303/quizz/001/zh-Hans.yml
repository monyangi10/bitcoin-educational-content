question: Bitcoin 中权力下放的主要目的是什么？
answer: 实现抵制审查
wrong_answers:
  - 提高交易处理速度
  - 降低能耗成本
  - 简化用户界面
explanation: |
  Bitcoin 中的去中心化主要是为了实现抵制审查，这意味着没有一个实体可以控制、阻止或操纵交易。文本中明确指出了这一点："去中心化是实现抵制审查的一种手段"。其他选项都不正确，因为去中心化实际上会使 Bitcoin 比中心化系统更慢、更耗能，而且会使系统更复杂而不是更简单。抗审查是 Bitcoin 与传统货币系统的不同之处，它可以防止政府或其他当局关闭或控制谁可以使用它。

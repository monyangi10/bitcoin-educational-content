question: ¿Cuál es el principal objetivo de la descentralización en Bitcoin?
answer: Para lograr la resistencia a la censura
wrong_answers:
  - Para aumentar la velocidad de procesamiento de las transacciones
  - Reducir los costes de consumo de energía
  - Para simplificar la interfaz de usuario
explanation: |
  La descentralización en Bitcoin sirve principalmente para lograr la resistencia a la censura, lo que significa que ninguna entidad puede controlar, bloquear o manipular las transacciones. Esto se afirma explícitamente en el texto: "La descentralización es un medio para lograr la resistencia a la censura" Las otras opciones son incorrectas porque la descentralización en realidad hace que Bitcoin sea más lento y consuma más energía que los sistemas centralizados, y hace que el sistema sea más complejo en lugar de más simple. La resistencia a la censura es lo que diferencia a Bitcoin de los sistemas monetarios tradicionales e impide que los gobiernos u otras autoridades lo cierren o controlen quién puede utilizarlo.
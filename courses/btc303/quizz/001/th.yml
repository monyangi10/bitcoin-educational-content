question: วัตถุประสงค์หลักของการกระจายอำนาจใน Bitcoin คืออะไร?
answer: เพื่อให้เกิดความต้านทานการเซ็นเซอร์
wrong_answers:
  - เพื่อเพิ่มความเร็วในการประมวลผลธุรกรรม
  - เพื่อลดค่าใช้จ่ายในการใช้พลังงาน
  - เพื่อทำให้ส่วนติดต่อผู้ใช้เรียบง่ายขึ้น
explanation: |
  การกระจายอำนาจใน Bitcoin มีวัตถุประสงค์หลักเพื่อให้เกิดความต้านทานการเซ็นเซอร์ ซึ่งหมายความว่าไม่มีหน่วยงานใดสามารถควบคุม บล็อก หรือจัดการธุรกรรมได้ ข้อความนี้ระบุไว้อย่างชัดเจนว่า 'การกระจายอำนาจเป็นวิธีการเพื่อให้เกิดความต้านทานการเซ็นเซอร์' ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะการกระจายอำนาจทำให้ Bitcoin ช้าลงและใช้พลังงานมากกว่าระบบที่มีศูนย์กลาง และทำให้ระบบซับซ้อนขึ้นแทนที่จะง่ายขึ้น ความต้านทานการเซ็นเซอร์คือสิ่งที่แยก Bitcoin ออกจากระบบเงินแบบดั้งเดิมและป้องกันไม่ให้รัฐบาลหรือหน่วยงานอื่นๆ ปิดระบบหรือควบคุมว่าใครสามารถใช้งานได้
reviewed: false
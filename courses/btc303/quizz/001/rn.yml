question: Ni iyihe ntumbero nyamukuru y’ugusenyura ubutegetsi muri Bitcoin?
answer: Kugira ngo umuntu ashike ku kurwanya ugucengera
wrong_answers:
  - Kugira ngo wongere umuvuduko wo gukora amafaranga
  - Kugira ngo ugabanye igiciro c'inguvu
  - Kugira ngo woroshe ikigaragara c'ukoresha
explanation: |
  Ukwegereza ubutegetsi abaturage muri Bitcoin bifasha cane cane gushika ku kurwanya ugucengera, ivyo bikaba bisobanura ko ata kigo na kimwe gishobora kugenzura, guhagarika canke gukoresha nabi ibikorwa vy’ubudandaji. Ivyo bivugwa neza muri ico canditswe ngo: 'Ukwegereza ubutegetsi abaturage ni uburyo bwo gushika ku kurwanya ubugenzuzi.' Ayandi mahitamwo ntabwo ari meza kuko kwegereza ubutegetsi mu vy’ukuri bituma Bitcoin igenda buhoro kandi ikoresha inguvu nyinshi kuruta uburyo bwo gukoresha ubutegetsi hagati, kandi bituma uburyo bugenda buhoro aho kuba bworoshe. Uguhangana n’ugucengera ni co gitandukanya Bitcoin n’imirongo y’amahera ya kera kandi kikabuza intwaro canke izindi nzego kuyifunga canke kugenzura abashobora kuyikoresha.

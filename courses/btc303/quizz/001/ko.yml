question: Bitcoin에서 탈중앙화의 주요 목적은 무엇인가요?
answer: 검열 저항을 달성하려면
wrong_answers:
  - 트랜잭션 처리 속도를 높이려면
  - 에너지 소비 비용을 줄이려면
  - 사용자 인터페이스를 단순화하려면
explanation: |
  Bitcoin의 탈중앙화는 주로 검열 저항성을 달성하는 데 사용되며, 이는 어떤 단일 주체도 거래를 통제, 차단 또는 조작할 수 없음을 의미합니다. 이는 '탈중앙화는 검열 저항성을 달성하기 위한 수단입니다'라는 문구에 명시되어 있습니다 탈중앙화는 실제로 중앙화된 시스템보다 더 느리고 에너지 집약적이며, 시스템을 더 단순하게 만드는 것이 아니라 더 복잡하게 만들기 때문에 다른 옵션은 올바르지 않습니다. 검열 저항성은 Bitcoin을 기존 화폐 시스템과 구분하는 요소이며, 정부나 기타 당국이 이를 폐쇄하거나 사용자를 통제하지 못하도록 합니다.
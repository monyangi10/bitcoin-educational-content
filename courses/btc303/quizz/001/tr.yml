question: Bitcoin'da ademi merkeziyetçiliğin temel amacı nedir?
answer: Sansüre karşı direnç elde etmek için
wrong_answers:
  - İşlem işleme hızını artırmak için
  - Enerji tüketim maliyetlerini azaltmak için
  - Kullanıcı arayüzünü basitleştirmek için
explanation: |
  Bitcoin'deki ademi merkeziyetçilik öncelikle sansüre karşı direnç sağlamaya hizmet eder; bu da tek bir varlığın işlemleri kontrol edemeyeceği, engelleyemeyeceği veya manipüle edemeyeceği anlamına gelir. Bu durum metinde açıkça belirtilmiştir: 'Ademi merkeziyetçilik sansüre karşı direnç elde etmek için bir araçtır' Diğer seçenekler yanlıştır çünkü ademi merkeziyetçilik aslında Bitcoin'i merkezi sistemlere göre daha yavaş ve daha enerji yoğun hale getirir ve sistemi basitleştirmek yerine daha karmaşık hale getirir. Sansüre direnç, Bitcoin'i geleneksel para sistemlerinden ayıran ve hükümetlerin ya da diğer yetkililerin onu kapatmasını ya da kimlerin kullanabileceğini kontrol etmesini engelleyen şeydir.
question: 在 Bitcoin 中，分權的主要目的是什麼？
answer: 實現抵制審查
wrong_answers:
  - 提高交易處理速度
  - 降低能源消耗成本
  - 簡化使用者介面
explanation: |
  Bitcoin 中的去中心化主要是為了實現抵制審查，這意味著沒有任何單一實體可以控制、封鎖或操縱交易。這一點在文中有明確陳述：「去中心化是實現抵制審查的一種手段。其他選項都不對，因為分散化實際上會讓 Bitcoin 比集中式系統更慢、更耗能，而且會讓系統更複雜，而不是更簡單。抗檢查是 Bitcoin 與傳統貨幣系統的區別，可防止政府或其他主管機關關閉 Bitcoin 或控制誰可以使用 Bitcoin。
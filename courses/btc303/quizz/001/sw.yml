question: Je, madhumuni ya msingi ya ugatuaji katika Bitcoin ni yapi?
answer: Ili kufikia upinzani wa udhibiti
wrong_answers:
  - Ili kuongeza kasi ya usindikaji wa shughuli
  - Ili kupunguza gharama za matumizi ya nishati
  - Ili kurahisisha kiolesura cha mtumiaji
explanation: |
  Ugatuaji katika Bitcoin hutumika hasa kufikia upinzani wa udhibiti, ambayo ina maana kwamba hakuna huluki moja inayoweza kudhibiti, kuzuia, au kuendesha shughuli. Hii imeelezwa kwa uwazi katika maandishi: 'Ugatuaji ni njia ya kufikia upinzani wa udhibiti.' Chaguzi zingine si sahihi kwa sababu ugatuaji hufanya Bitcoin kuwa polepole na inayotumia nishati nyingi kuliko mifumo ya serikali kuu, na inafanya mfumo kuwa mgumu zaidi badala ya kuwa rahisi. Upinzani wa udhibiti ndio unaotenganisha Bitcoin kutoka kwa mifumo ya kawaida ya pesa na kuzuia serikali au mamlaka zingine kuizima au kudhibiti ni nani anayeweza kuitumia.
question: Mis on Bitcoin detsentraliseerimise peamine eesmärk?
answer: Tsensuurivastase võitluse saavutamiseks
wrong_answers:
  - Tehingute töötlemise kiiruse suurendamiseks
  - Energiatarbimise kulude vähendamiseks
  - Kasutajaliidese lihtsustamiseks
explanation: |
  Bitcoin detsentraliseerimise eesmärk on eelkõige saavutada tsensuurikindlus, mis tähendab, et ükski üksus ei saa kontrollida, blokeerida või manipuleerida tehinguid. See on tekstis selgesõnaliselt öeldud: "Detsentraliseerimine on vahend tsensuurivastase võitluse saavutamiseks" Teised valikud on valed, sest detsentraliseerimine muudab Bitcoin tegelikult aeglasemaks ja energiamahukamaks kui tsentraliseeritud süsteemid ning muudab süsteemi pigem keerulisemaks kui lihtsamaks. Tsensuurikindlus on see, mis eristab Bitcoin traditsioonilistest rahasüsteemidest ja takistab valitsustel või muudel asutustel seda sulgeda või kontrollida, kes seda kasutada saavad.
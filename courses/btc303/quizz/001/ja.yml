question: ビットコインにおける分散化の主な目的は何ですか？
answer: 検閲への抵抗を実現するため
wrong_answers:
  - トランザクション処理速度を向上するため
  - エネルギー消費コストを削減するため
  - ユーザーインターフェイスをシンプルにするため
explanation: |
  ビットコインにおける分散化は、主に検閲耐性を実現するために機能する。つまり、単一の主体がトランザクションを制御、ブロック、操作することはできないということだ。これは本文中に「分散化は検閲耐性を達成するための手段である」と明記されている。非中央集権化はビットコインを中央集権型システムよりも実際に遅く、エネルギー集約型にし、システムをシンプルにするのではなく、より複雑にするので、他の選択肢は正しくない。検閲耐性は、ビットコインを従来の貨幣システムと区別するものであり、政府やその他の当局がビットコインを停止したり、誰が使用できるかをコントロールしたりするのを防ぐものである。

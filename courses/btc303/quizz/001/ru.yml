question: Какова основная цель децентрализации в Bitcoin?
answer: Чтобы добиться устойчивости к цензуре
wrong_answers:
  - Для повышения скорости обработки транзакций
  - Снижение затрат на потребление энергии
  - Чтобы упростить пользовательский интерфейс
explanation: |
  Децентрализация в Bitcoin служит в первую очередь для достижения устойчивости к цензуре, что означает, что ни один субъект не может контролировать, блокировать или манипулировать транзакциями. Это прямо указано в тексте: "Децентрализация - это средство для достижения устойчивости к цензуре" Другие варианты неверны, потому что децентрализация фактически делает Bitcoin медленнее и энергоемче, чем централизованные системы, и делает систему сложнее, а не проще. Устойчивость к цензуре - это то, что отличает Bitcoin от традиционных денежных систем и не позволяет правительствам или другим властям закрывать ее или контролировать тех, кто может ее использовать.
question: Bitcoin में विकेंद्रीकरण का प्राथमिक उद्देश्य क्या है?
answer: सेंसरशिप प्रतिरोध प्राप्त करने के लिए
wrong_answers:
  - लेनदेन प्रसंस्करण गति बढ़ाने के लिए
  - ऊर्जा खपत लागत को कम करने के लिए
  - उपयोगकर्ता इंटरफ़ेस को सरल बनाने के लिए
explanation: |
  Bitcoin में विकेंद्रीकरण मुख्य रूप से सेंसरशिप प्रतिरोध प्राप्त करने के लिए है, जिसका अर्थ है कि कोई भी एकल इकाई लेनदेन को नियंत्रित, अवरुद्ध या हेरफेर नहीं कर सकती। पाठ में यह स्पष्ट रूप से कहा गया है: 'विकेंद्रीकरण सेंसरशिप प्रतिरोध प्राप्त करने का एक साधन है।' अन्य विकल्प गलत हैं क्योंकि विकेंद्रीकरण वास्तव में Bitcoin को केंद्रीकृत प्रणालियों की तुलना में धीमा और अधिक ऊर्जा-गहन बनाता है, और यह प्रणाली को सरल बनाने के बजाय अधिक जटिल बनाता है। सेंसरशिप प्रतिरोध ही Bitcoin को पारंपरिक मुद्रा प्रणालियों से अलग करता है और सरकारों या अन्य प्राधिकारियों को इसे बंद करने या यह नियंत्रित करने से रोकता है कि इसका उपयोग कौन कर सकता है।

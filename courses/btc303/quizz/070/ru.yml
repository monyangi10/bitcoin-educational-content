question: Какая фундаментальная характеристика отличает данное в книге определение масштабирования Bitcoin от распространенных альтернативных определений, используемых в пространстве Bitcoin?
answer: Он явно требует сохранения устойчивости к цензуре в качестве ограничения при увеличении пропускной способности
wrong_answers:
  - Он сосредоточен исключительно на увеличении пропускной способности блокчейн-транзакций, а не на повышении эффективности
  - Приоритет отдается развитию многоуровневой архитектуры, а не любым модификациям базового протокола блокчейна
  - При этом акцент делается на снижении вычислительных требований к узлам, а не на увеличении пропускной способности сети
explanation: |
  В книге дается определение масштабирования как "увеличения пропускной способности Bitcoin без ущерба для его цензуроустойчивости", что явно включает ограничение цензуроустойчивости. Это отличает его от других определений, которые фокусируются исключительно на увеличении пропускной способности транзакций, повышении эффективности или многоуровневых системах без учета сохранения фундаментальных свойств Bitcoin. Требование устойчивости к цензуре гарантирует, что решения по масштабированию не будут подрывать основное ценностное предложение Bitcoin - быть недоверенной, децентрализованной системой, которую не может контролировать ни один субъект.
reviewed: false

question: 本書のBitcoinスケーリングの定義が、Bitcoin空間で使用される一般的な代替定義と異なる基本的特徴は何か？
answer: 利用容量を増やす一方で、制約として検閲への耐性を維持することを明確に要求している
wrong_answers:
  - 効率性の向上よりも、ブロックチェーンのトランザクション処理能力を高めることだけに焦点を当てている。
  - ベースとなるブロックチェーン・プロトコルの修正よりも、レイヤード・アーキテクチャの開発を優先する。
  - ネットワーク容量を拡大するよりも、ノードの計算量を減らすことに重点を置いている。
explanation: |
  本書では、スケーリングを「検閲耐性を損なうことなくBitcoinの利用容量を増やすこと」と定義し、検閲耐性制約を明確に含めている。これは、Bitcoinの基本的な特性の維持を考慮することなく、トランザクション容量の増加、効率の改善、レイヤー化されたシステムのみに焦点を当てた他の定義とは異なる。検閲耐性要件は、スケーリング・ソリューションが、いかなる単一事業体によっても制御されることのない信頼性のない分散型システムであるというBitcoinの中核的価値命題を損なわないことを保証する。
question: ลักษณะพื้นฐานที่แยกความแตกต่างของคำจำกัดความของการปรับขนาด Bitcoin ในหนังสือจากคำจำกัดความทางเลือกทั่วไปที่ใช้ในพื้นที่ Bitcoin คืออะไร?
answer: มันต้องการอย่างชัดเจนในการรักษาความต้านทานการเซ็นเซอร์เป็นข้อจำกัดในขณะที่เพิ่มความจุการใช้งาน
wrong_answers:
  - มุ่งเน้นเฉพาะการเพิ่มปริมาณธุรกรรมบล็อกเชนแทนที่จะปรับปรุงประสิทธิภาพ
  - มันให้ความสำคัญกับการพัฒนาโครงสร้างสถาปัตยกรรมแบบชั้นมากกว่าการปรับเปลี่ยนใด ๆ ต่อโปรโตคอลบล็อกเชนพื้นฐาน
  - มันเน้นการลดความต้องการในการคำนวณสำหรับโหนดแทนที่จะขยายความจุของเครือข่าย
explanation: |
  หนังสือเล่มนี้นิยามการขยายขนาดว่า 'การเพิ่มความจุการใช้งานของ Bitcoin โดยไม่ลดทอนความต้านทานการเซ็นเซอร์' ซึ่งรวมถึงข้อจำกัดความต้านทานการเซ็นเซอร์อย่างชัดเจน สิ่งนี้ทำให้แตกต่างจากคำจำกัดความอื่น ๆ ที่มุ่งเน้นเฉพาะการเพิ่มความจุของธุรกรรม การปรับปรุงประสิทธิภาพ หรือระบบแบบชั้นโดยไม่พิจารณาการรักษาคุณสมบัติพื้นฐานของ Bitcoin ข้อกำหนดความต้านทานการเซ็นเซอร์ทำให้มั่นใจได้ว่าโซลูชันการขยายขนาดจะไม่บ่อนทำลายข้อเสนอคุณค่าหลักของ Bitcoin ในการเป็นระบบที่ไม่ต้องพึ่งพาความไว้วางใจและกระจายอำนาจที่ไม่สามารถควบคุมโดยหน่วยงานเดียวได้
reviewed: false
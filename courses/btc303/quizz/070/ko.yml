question: 이 책에서 정의한 Bitcoin 스케일링에 대한 정의가 Bitcoin 공간에서 사용되는 일반적인 대체 정의와 구별되는 근본적인 특징은 무엇인가요?
answer: 사용 용량을 늘리면서 검열 저항을 제약 조건으로 명시적으로 유지해야 합니다
wrong_answers:
  - 효율성 개선보다는 블록체인 트랜잭션 처리량 증가에만 집중합니다
  - 기본 블록체인 프로토콜의 수정보다 계층화된 아키텍처 개발이 우선시됩니다
  - 네트워크 용량 확장보다는 노드에 대한 컴퓨팅 요구 사항을 줄이는 데 중점을 둡니다
explanation: |
  이 책에서는 확장을 '검열 저항성을 손상시키지 않고 Bitcoin의 사용 용량을 늘리는 것'으로 정의하며, 여기에는 검열 저항성 제약이 명시적으로 포함되어 있습니다. 이는 Bitcoin의 기본 속성의 보존을 고려하지 않고 거래 용량 증가, 효율성 개선 또는 계층화된 시스템에만 초점을 맞춘 다른 정의와 차별화됩니다. 검열 저항성 요건은 확장 솔루션이 단일 주체에 의해 통제될 수 없는 신뢰 없는 탈중앙화 시스템이라는 Bitcoin의 핵심 가치 제안을 훼손하지 않도록 보장합니다.

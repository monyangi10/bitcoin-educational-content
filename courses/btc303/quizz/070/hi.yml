question: कौन सी मूलभूत विशेषता पुस्तक की Bitcoin स्केलिंग की परिभाषा को Bitcoin स्पेस में प्रयुक्त सामान्य वैकल्पिक परिभाषाओं से अलग करती है?
answer: इसमें स्पष्ट रूप से सेंसरशिप प्रतिरोध को एक बाधा के रूप में बनाए रखने की आवश्यकता है, जबकि उपयोग क्षमता में वृद्धि की जानी चाहिए।
wrong_answers:
  - यह विशेष रूप से दक्षता में सुधार के बजाय ब्लॉकचेन लेनदेन थ्रूपुट को बढ़ाने पर केंद्रित है
  - यह आधार ब्लॉकचेन प्रोटोकॉल में किसी भी संशोधन की तुलना में स्तरित वास्तुकला विकास को प्राथमिकता देता है
  - यह नेटवर्क क्षमता का विस्तार करने के बजाय नोड्स के लिए कम्प्यूटेशनल आवश्यकताओं को कम करने पर जोर देता है
explanation: |
  पुस्तक स्केलिंग को 'सेंसरशिप प्रतिरोध से समझौता किए बिना Bitcoin की उपयोग क्षमता बढ़ाने' के रूप में परिभाषित करती है, जिसमें सेंसरशिप प्रतिरोध की बाध्यता स्पष्ट रूप से शामिल है। यह इसे अन्य परिभाषाओं से अलग करता है जो केवल लेन-देन क्षमता में वृद्धि, दक्षता में सुधार, या स्तरित प्रणालियों पर ध्यान केंद्रित करती हैं, बिना Bitcoin के मूलभूत गुणों के संरक्षण पर विचार किए। सेंसरशिप प्रतिरोध की आवश्यकता यह सुनिश्चित करती है कि स्केलिंग समाधान Bitcoin के मूल मूल्य प्रस्ताव को कमज़ोर न करें, जो एक विश्वसनीय, विकेन्द्रीकृत प्रणाली है जिसे किसी एक इकाई द्वारा नियंत्रित नहीं किया जा सकता।
reviewed: false

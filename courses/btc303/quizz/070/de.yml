question: Welches grundlegende Merkmal unterscheidet die Definition der Bitcoin-Skalierung in diesem Buch von den üblichen alternativen Definitionen, die im Bitcoin-Bereich verwendet werden?
answer: Sie erfordert ausdrücklich die Beibehaltung der Zensurresistenz als Einschränkung bei gleichzeitiger Erhöhung der Nutzungskapazität
wrong_answers:
  - Sie konzentriert sich ausschließlich auf die Steigerung des Transaktionsdurchsatzes der Blockchain und nicht auf Effizienzverbesserungen
  - Sie gibt der Entwicklung einer mehrschichtigen Architektur den Vorrang vor Änderungen am Basisprotokoll der Blockchain
  - Der Schwerpunkt liegt auf der Verringerung des Rechenaufwands für die Knotenpunkte und nicht auf der Erweiterung der Netzkapazität
explanation: |
  Das Buch definiert Skalierung als "Erhöhung der Nutzungskapazität von Bitcoin ohne Beeinträchtigung seiner Zensurresistenz", was ausdrücklich die Einschränkung der Zensurresistenz einschließt. Dies unterscheidet sie von anderen Definitionen, die sich ausschließlich auf die Erhöhung der Transaktionskapazität, Effizienzsteigerungen oder geschichtete Systeme konzentrieren, ohne die Erhaltung der grundlegenden Eigenschaften von Bitcoin zu berücksichtigen. Die Anforderung der Zensurresistenz stellt sicher, dass Skalierungslösungen nicht das zentrale Wertversprechen von Bitcoin untergraben, nämlich ein vertrauensloses, dezentrales System zu sein, das nicht von einer einzelnen Einheit kontrolliert werden kann.
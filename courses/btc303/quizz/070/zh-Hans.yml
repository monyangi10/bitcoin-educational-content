question: 本书对比特币扩展比例的定义与比特币领域常用的其他定义相比，有哪些基本特征？
answer: 它明确要求在提高使用能力的同时，保持抵制审查的约束性
wrong_answers:
  - 它只关注提高区块链交易吞吐量，而不是提高效率
  - 它优先考虑分层架构开发，而不是对基础区块链协议进行任何修改
  - 它强调降低节点的计算要求，而不是扩大网络容量
explanation: |
  该书将扩展定义为 "在不影响比特币抗审查能力的情况下提高其使用能力"，其中明确包括抗审查约束。这使它有别于其他定义，后者只关注交易容量的增加、效率的提高或分层系统，而不考虑比特币基本特性的保护。抗审查要求可确保扩展解决方案不会破坏比特币的核心价值主张，即它是一个不受任何单一实体控制的无信任、去中心化系统。

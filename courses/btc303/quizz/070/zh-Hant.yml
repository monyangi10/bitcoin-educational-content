question: 本書對 Bitcoin Scaling 的定義與 Bitcoin 領域中常用的替代定義有何基本特徵？
answer: 它明確要求在增加使用容量的同時，維持抗檢查作為一種約束
wrong_answers:
  - 它專注於提高區塊鏈交易吞吐量，而非改善效率
  - 它優先進行分層架構開發，而非對基本區塊鏈通訊協定進行任何修改。
  - 它強調降低節點的運算需求，而非擴充網路容量
explanation: |
  本書將擴充定義為「在不影響 Bitcoin 抗檢查能力的前提下，增加 Bitcoin 的使用容量」，其中明確包含了抗檢查約束。這與其他只注重交易容量增加、效率提升或分層系統，而不考慮 Bitcoin 基本屬性保存的定義有所區別。抗檢查性要求可確保擴充解決方案不會破壞 Bitcoin 的核心價值主張，即成為不受任何單一實體控制的無信任、分散式系統。
reviewed: false

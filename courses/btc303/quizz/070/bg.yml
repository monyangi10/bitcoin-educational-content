question: Коя основна характеристика отличава определението за мащабируемост на Bitcoin, дадено в книгата, от обичайните алтернативни определения, използвани в пространството на Bitcoin?
answer: Тя изрично изисква запазване на устойчивостта на цензурата като ограничение, като същевременно се увеличава капацитетът за използване
wrong_answers:
  - Тя се фокусира изключително върху увеличаване на пропускателната способност на блокчейн транзакциите, а не върху подобряване на ефективността
  - Тя дава приоритет на разработването на многопластова архитектура пред всякакви модификации на базовия протокол на блокчейн
  - Тя набляга на намаляването на изчислителните изисквания към възлите, а не на увеличаването на капацитета на мрежата
explanation: |
  В книгата мащабируемост се определя като "увеличаване на капацитета за използване на Bitcoin, без да се нарушава неговата устойчивост на цензура", което изрично включва ограничението за устойчивост на цензура. Това я отличава от други определения, които се фокусират единствено върху увеличаването на капацитета на транзакциите, подобряването на ефективността или многослойните системи, без да се отчита запазването на фундаменталните свойства на Bitcoin. Изискването за устойчивост на цензура гарантира, че решенията за мащабируемост не подкопават основното ценностно предложение на Bitcoin - да бъде децентрализирана система без нужда от доверие, която не може да бъде контролирана от нито един субект.
reviewed: true

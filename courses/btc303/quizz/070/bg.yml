question: Коя основна характеристика отличава определението за мащабиране на Bitcoin, дадено в книгата, от обичайните алтернативни определения, използвани в пространството на Bitcoin?
answer: Тя изрично изисква запазване на устойчивостта на цензурата като ограничение, като същевременно се увеличава капацитетът за използване
wrong_answers:
  - Той се фокусира изключително върху увеличаване на пропускателната способност на блокчейн транзакциите, а не върху подобряване на ефективността
  - Той дава приоритет на разработването на многопластова архитектура пред всякакви модификации на базовия протокол на блокчейн
  - Той набляга на намаляването на изчислителните изисквания към възлите, а не на увеличаването на капацитета на мрежата
explanation: |
  В книгата мащабирането се определя като "увеличаване на капацитета за използване на Bitcoin, без да се нарушава неговата устойчивост на цензура", което изрично включва ограничението за устойчивост на цензура. Това я отличава от други определения, които се фокусират единствено върху увеличаването на капацитета на транзакциите, подобряването на ефективността или многослойните системи, без да се отчита запазването на фундаменталните свойства на Bitcoin. Изискването за устойчивост на цензура гарантира, че решенията за мащабиране не подкопават основното ценностно предложение на Bitcoin - да бъде децентрализирана система без доверие, която не може да бъде контролирана от нито един субект.
reviewed: false

question: Ni sifa gani ya kimsingi inayotofautisha ufafanuzi wa kitabu wa kuongeza Bitcoin kutoka kwa ufafanuzi mbadala wa kawaida unaotumiwa katika nafasi ya Bitcoin?
answer: Inahitaji kwa uwazi kudumisha upinzani wa udhibiti kama kikwazo huku ikiongeza uwezo wa utumiaji
wrong_answers:
  - Inalenga pekee katika kuongeza upitishaji wa muamala wa blockchain badala ya uboreshaji wa ufanisi
  - Inaweka kipaumbele maendeleo ya usanifu wa tabaka juu ya marekebisho yoyote kwa itifaki ya msingi ya blockchain
  - Inasisitiza kupunguza mahitaji ya hesabu kwa nodi badala ya kupanua uwezo wa mtandao
explanation: |
  Kitabu hiki kinafafanua kuongeza kama 'kuongeza uwezo wa matumizi wa Bitcoin bila kuathiri upinzani wake wa udhibiti,' ambayo inajumuisha kwa uwazi kikwazo cha upinzani wa udhibiti. Hii inaitofautisha na fasili zingine zinazozingatia tu ongezeko la uwezo wa kufanya miamala, uboreshaji wa ufanisi, au mifumo iliyopangwa bila kuzingatia uhifadhi wa sifa za kimsingi za Bitcoin. Masharti ya kupinga udhibiti huhakikisha kuwa suluhu za kuongeza viwango hazikatishi pendekezo la msingi la Bitcoin la kuwa mfumo usioaminika, uliogatuliwa ambao hauwezi kudhibitiwa na huluki yoyote.
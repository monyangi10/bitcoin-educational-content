question: چه ویژگی اساسی تعریف کتاب از مقیاس‌بندی Bitcoin را از تعاریف جایگزین رایج در فضای Bitcoin متمایز می‌کند؟
answer: این به‌طور صریح نیاز به حفظ مقاومت در برابر سانسور به‌عنوان یک محدودیت در حالی که ظرفیت استفاده را افزایش می‌دهد، دارد.
wrong_answers:
  - این به طور انحصاری بر افزایش توان عملیاتی تراکنش‌های بلاکچین تمرکز دارد تا بهبودهای کارایی.
  - این توسعه معماری لایه‌ای را بر هرگونه تغییرات در پروتکل بلاکچین پایه اولویت می‌دهد.
  - این بر کاهش نیازهای محاسباتی برای نودها به جای گسترش ظرفیت شبکه تأکید دارد.
explanation: |
  این کتاب مقیاس‌پذیری را به‌عنوان «افزایش ظرفیت استفاده از Bitcoin بدون به خطر انداختن مقاومت در برابر سانسور» تعریف می‌کند که به‌طور صریح شامل محدودیت مقاومت در برابر سانسور است. این تعریف آن را از تعاریف دیگر که تنها بر افزایش ظرفیت تراکنش، بهبود کارایی یا سیستم‌های لایه‌ای بدون در نظر گرفتن حفظ ویژگی‌های بنیادی Bitcoin تمرکز دارند، متمایز می‌کند. الزام مقاومت در برابر سانسور تضمین می‌کند که راه‌حل‌های مقیاس‌پذیری ارزش اصلی Bitcoin را که یک سیستم غیرمتمرکز و بدون نیاز به اعتماد است و نمی‌تواند توسط هیچ نهاد واحدی کنترل شود، تضعیف نمی‌کنند.
reviewed: false

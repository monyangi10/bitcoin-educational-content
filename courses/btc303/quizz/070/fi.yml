question: Mikä olennainen piirre erottaa kirjassa esitetyn Bitcoin-skaalauksen määritelmän Bitcoin-alan yleisistä vaihtoehtoisista määritelmistä?
answer: Se edellyttää nimenomaisesti sensuurin vastustamisen säilyttämistä rajoituksena samalla kun käyttökapasiteettia lisätään
wrong_answers:
  - Se keskittyy yksinomaan lohkoketjutransaktioiden läpimenon lisäämiseen eikä tehokkuuden parantamiseen
  - Siinä asetetaan monikerroksisen arkkitehtuurin kehittäminen etusijalle peruslohkoketjuprotokollan muutoksiin nähden
  - Siinä korostetaan solmujen laskentavaatimusten vähentämistä verkkokapasiteetin laajentamisen sijaan
explanation: |
  Kirjassa määritellään skaalautuminen seuraavasti: "Bitcoin:n käyttökapasiteetin kasvattaminen sensuurinsietokykyä vaarantamatta", mikä sisältää nimenomaisesti sensuurinsietokykyä koskevan rajoituksen. Tämä erottaa sen muista määritelmistä, joissa keskitytään pelkästään transaktiokapasiteetin kasvattamiseen, tehokkuuden parantamiseen tai kerrostettuihin järjestelmiin ottamatta huomioon Bitcoin:n perusominaisuuksien säilymistä. Sensuurinkestävyysvaatimus varmistaa, että skaalautumisratkaisut eivät heikennä Bitcoin:n keskeistä arvolupausta olla luototon, hajautettu järjestelmä, jota mikään yksittäinen taho ei voi hallita.
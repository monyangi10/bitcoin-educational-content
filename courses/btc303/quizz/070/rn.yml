question: Ni ikihe kintu nyamukuru gitandukanya insobanuro y’igitabu y’ugupima Bitcoin n’insobanuro zisanzwe zikoreshwa mu kibanza ca Bitcoin?
answer: Bisaba cane ko umuntu aguma arwanya ugucengera nk’intambamyi mu gihe yongera ubushobozi bwo gukoresha .
wrong_answers:
  - Ishimikiye cane ku kwongerera ubushobozi bwo gukorana n’ibindi bihimba vy’umubiri aho kwibanda ku gutera imbere mu bijanye n’ubushobozi .
  - Ishira imbere iterambere ry'ubwubatsi buteye imbere ku guhindura kwose ku bijanye n'amasezerano ya blockchain y'ishimikiro
  - Ishimika ku kugabanya ibisabwa mu gukoresha ubuhinga bwa node aho kwagura ubushobozi bw'urubuga .
explanation: |
  Ico gitabu gisobanura ko ugupima ari ‘kwongera ubushobozi bwo gukoresha Bitcoin ataco bihinduye ku bushobozi bwayo bwo guhangana n’ugucengera,’ ivyo bikaba birimwo mu buryo butomoye uburenganzira bwo guhangana n’ugucengera. Ivyo birayitandukanya n’izindi nsobanuro zishimika gusa ku kwongerekana kw’ubushobozi bwo gukora, ku gutera imbere mu bijanye n’ubushobozi, canke ku buryo buteye imbere ataco bwiyumviriye ku kuzigama imiterere y’ishimikiro ya Bitcoin. Igisabwa co kurwanya ugucengera kiratuma inyishu zo gupima zidahungabanya iciyumviro c’agaciro nyamukuru ca Bitcoin co kuba uburyo butagira icizigiro, bushizwe ahantu hamwe, budashobora kugenzurwa n’ikigo na kimwe.
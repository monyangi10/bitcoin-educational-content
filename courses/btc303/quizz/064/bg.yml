question: Според компромиса между пропускателна способност и децентрализация, разгледан от Грегъри Максуел, какво се случва, когато използването на ресурсите на Bitcoin блокчейн стане твърде голямо в сравнение с наличната технология?
answer: Bitcoin губи конкурентни предимства в сравнение с наследените системи, тъй като валидирането става твърде скъпо, изключвайки много потребители и принуждавайки ги да се доверят отново на системата
wrong_answers:
  - Bitcoin става по-сигурна, тъй като само най-отдадените потребители с мощен хардуер могат да участват във валидирането, създавайки по-силна мрежа
  - Bitcoin автоматично настройва алгоритъма си за трудност, за да намали изискванията за ресурси и да поддържа еднакво ниво на децентрализация за всички участници
  - Bitcoin се разделя на множество паралелни вериги, за да разпредели изчислителното натоварване, като същевременно поддържа същите гаранции за сигурност за всички потребители
explanation: |
  Максуел идентифицира фундаментален компромис, при който прекомерните изисквания за ресурси подтикват потребителите към доверени трети страни, а не към независимо валидиране. Когато разходите за валидиране станат прекомерно високи, потребителите не могат да си позволят да работят с пълни възли и трябва да разчитат на други, което подкопава ненадеждния характер на Bitcoin. Неправилните отговори неправилно предполагат благоприятни резултати (повишена сигурност, автоматични корекции или поддържани гаранции), когато високото използване на ресурси всъщност налага централизация и доверителни зависимости.
reviewed: false

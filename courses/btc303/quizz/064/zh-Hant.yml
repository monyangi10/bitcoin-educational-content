question: 根據 Gregory Maxwell 所討論的吞吐量與去中心化之間的權衡，當 Bitcoin 區塊鏈的資源使用量相對於可用技術而言變得太大時，會發生什麼情況？
answer: 與傳統系統相比，Bitcoin 喪失了競爭優勢，因為驗證成本過高，導致許多使用者被拒之門外，並迫使信任回到系統中。
wrong_answers:
  - Bitcoin 變得更安全，因為只有擁有強大硬體的最專注使用者才能參與驗證，創造出更強大的網路
  - Bitcoin 會自動調整其難度演算法，以降低資源需求，並維持所有參與者相同的分散程度
  - Bitcoin 會分割成多個平行鏈，以分散計算負載，同時為所有使用者維持相同的安全保證
explanation: |
  Maxwell 發現了一個基本的取捨問題，過高的資源需求將使用者推向可信賴的第三方，而非獨立驗證。當驗證成本過高時，使用者就無法負擔運行完整的節點，而必須仰賴他人，這就會破壞 Bitcoin 的無信任本質。錯誤的答案錯誤地暗示了有利的結果 (增加安全性、自動調整或維持保證)，而高資源使用率實際上迫使集中化和信任依賴。
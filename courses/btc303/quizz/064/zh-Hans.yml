question: 根据格雷戈里-麦克斯韦尔（Gregory Maxwell）讨论的吞吐量和去中心化之间的权衡，当 Bitcoin 区块链的资源使用量相对于现有技术而言过大时，会发生什么情况？
answer: 与传统系统相比，Bitcoin 失去了竞争优势，因为验证成本过高，许多用户被拒之门外，不得不重新信任系统
wrong_answers:
  - Bitcoin 变得更加安全，因为只有拥有强大硬件的最专业用户才能参与验证，从而创建一个更强大的网络
  - Bitcoin 自动调整其难度算法，以减少资源需求，并在所有参与者中保持相同的分散程度
  - Bitcoin 分成多个并行链，以分散计算负荷，同时为所有用户提供相同的安全保证
explanation: |
  麦克斯韦发现了一个基本的权衡问题，即过多的资源需求将用户推向可信第三方，而不是独立验证。当验证成本过高时，用户就无力运行全节点，必须依赖他人，这就破坏了 Bitcoin 的无信任特性。错误答案错误地暗示了有益的结果（提高安全性、自动调整或维持保证），而高资源使用率实际上迫使集中化和信任依赖。
reviewed: false

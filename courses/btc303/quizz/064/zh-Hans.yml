question: 根据 Gregory Maxwell 讨论的吞吐量和去中心化之间的权衡，当比特币区块链的资源使用量相对于现有技术而言过大时，会发生什么情况？
answer: 与传统系统相比，比特币失去了竞争优势，因为验证成本过高，许多用户被拒之门外，不得不重新信任系统
wrong_answers:
  - 比特币变得更加安全，因为只有拥有强大硬件的最专业用户才能参与验证，从而创建一个更强大的网络
  - 比特币自动调整其难度算法，以减少资源需求，并在所有参与者中保持相同的分散程度
  - 比特币分成多个并行链，以分散计算负荷，同时为所有用户提供相同的安全保证
explanation: |
  Maxwell 指出了一个根本性的权衡：当系统对资源的需求过高时，用户会被迫依赖受信任的第三方，而不是进行独立验证。当验证成本变得过于高昂时，用户将无法自行运行全节点，不得不依赖他人，从而削弱了比特币的无信任性特性。该题的错误答案错误地暗示了有益的结果（提高安全性、自动调整或维持保证），而高资源需求会导致中心化和信任依赖的出现。

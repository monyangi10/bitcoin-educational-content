question: Según el equilibrio entre rendimiento y descentralización analizado por Gregory Maxwell, ¿qué ocurre cuando el uso de recursos de la blockchain Bitcoin es demasiado grande en relación con la tecnología disponible?
answer: Bitcoin pierde ventajas competitivas frente a los sistemas heredados porque la validación resulta demasiado costosa, lo que excluye a muchos usuarios y obliga a volver a confiar en el sistema
wrong_answers:
  - Bitcoin es más segura porque sólo los usuarios más dedicados y con hardware más potente pueden participar en la validación, lo que crea una red más sólida
  - Bitcoin ajusta automáticamente su algoritmo de dificultad para reducir las necesidades de recursos y mantener el mismo nivel de descentralización entre todos los participantes
  - Bitcoin se divide en varias cadenas paralelas para distribuir la carga computacional manteniendo las mismas garantías de seguridad para todos los usuarios
explanation: |
  Maxwell identificó una disyuntiva fundamental en la que los excesivos requisitos de recursos empujan a los usuarios a recurrir a terceros de confianza en lugar de a la validación independiente. Cuando los costes de validación se vuelven prohibitivos, los usuarios no pueden permitirse ejecutar nodos completos y deben confiar en otros, lo que socava la naturaleza no fiable de Bitcoin. Las respuestas erróneas sugieren incorrectamente resultados beneficiosos (mayor seguridad, ajustes automáticos o mantenimiento de las garantías) cuando en realidad el elevado uso de recursos fuerza la centralización y las dependencias de confianza.
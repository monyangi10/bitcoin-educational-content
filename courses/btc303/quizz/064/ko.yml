question: 그레고리 맥스웰이 논의한 처리량과 탈중앙화 사이의 트레이드오프에 따르면, 사용 가능한 기술에 비해 Bitcoin 블록체인의 리소스 사용량이 너무 많아지면 어떻게 될까요?
answer: Bitcoin은 검증에 너무 많은 비용이 들기 때문에 레거시 시스템에 비해 경쟁 우위를 잃게 되고, 많은 사용자가 비용을 지불하고 시스템에 신뢰를 다시 강요받게 됩니다
wrong_answers:
  - 강력한 하드웨어를 갖춘 가장 헌신적인 사용자만 검증에 참여할 수 있기 때문에 Bitcoin의 보안이 더욱 강화되어 더욱 강력한 네트워크를 만들 수 있습니다
  - Bitcoin는 리소스 요구 사항을 줄이고 모든 참가자에게 동일한 수준의 탈중앙화를 유지하기 위해 난이도 알고리즘을 자동으로 조정합니다
  - Bitcoin는 여러 개의 병렬 체인으로 분할하여 모든 사용자에게 동일한 보안 보장을 유지하면서 계산 부하를 분산합니다
explanation: |
  맥스웰은 과도한 리소스 요구 사항으로 인해 사용자가 독립적인 검증이 아닌 신뢰할 수 있는 제3자에게 의존하게 되는 근본적인 트레이드 오프가 발생한다는 사실을 파악했습니다. 검증 비용이 엄청나게 높아지면 사용자는 전체 노드를 운영할 여력이 없어 다른 업체에 의존해야 하며, 이는 Bitcoin의 신뢰 없는 특성을 약화시킵니다. 오답은 높은 리소스 사용량이 실제로 중앙 집중화 및 신뢰 종속성을 강요하는 경우 유익한 결과(보안 강화, 자동 조정 또는 보증 유지)를 잘못 제시합니다.
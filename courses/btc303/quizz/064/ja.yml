question: グレゴリー・マクスウェルが議論したスループットと分散化のトレードオフによれば、ビットコイン・ブロックチェーンのリソース使用量が利用可能な技術に比べて大きくなりすぎるとどうなるのだろうか？
answer: ビットコインは伝統的なシステムと比較して競争上の優位性を失うが、これは検証コストがかかりすぎるためであり、多くのユーザーを排除し、システムに信頼性を戻さざるを得なくなる
wrong_answers:
  - ビットコインは、強力なハードウェアを持つ最も熱心なユーザーのみが検証に参加できるため、より強固なネットワークが構築され、安全性が高まる
  - ビットコインは難易度アルゴリズムを自動的に調整することで、必要なリソースを削減し、すべての参加者が同じレベルの分散化を維持する
  - ビットコインは複数の並列チェーンに分割され、すべてのユーザーに対して同じセキュリティ保証を維持しながら、計算負荷を分散する
explanation: |
  Maxwellは、過大なリソース要件がユーザーを独立した検証ではなく、信頼できるサードパーティーへと向かわせる根本的なトレードオフを特定した。検証コストが法外になると、ユーザーはフルノードを走らせる余裕がなくなり、他者に頼らざるを得なくなり、ビットコインのトラストレスな性質が損なわれる。間違った答えは、高いリソース使用量が実際には集中化と信頼依存を強いるのに、有益な結果（セキュリティの向上、自動調整、保証の維持）を誤って示唆している。

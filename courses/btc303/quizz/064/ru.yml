question: В соответствии с компромиссом между пропускной способностью и децентрализацией, о котором говорил Грегори Максвелл, что произойдет, когда потребление ресурсов блокчейна Bitcoin станет слишком большим по сравнению с имеющимися технологиями?
answer: Bitcoin теряет конкурентные преимущества по сравнению с унаследованными системами, поскольку проверка становится слишком дорогостоящей, вытесняя многих пользователей и заставляя их снова доверять системе
wrong_answers:
  - Bitcoin становится более безопасным, поскольку только самые преданные пользователи с мощным оборудованием могут участвовать в проверке, создавая более сильную сеть
  - Bitcoin автоматически настраивает алгоритм сложности, чтобы снизить потребность в ресурсах и сохранить одинаковый уровень децентрализации для всех участников
  - Bitcoin разделяется на несколько параллельных цепочек, чтобы распределить вычислительную нагрузку, сохраняя при этом одинаковые гарантии безопасности для всех пользователей
explanation: |
  Максвелл выявил фундаментальный компромисс, когда чрезмерные требования к ресурсам толкают пользователей к доверенным третьим лицам, а не к независимой проверке. Когда стоимость проверки становится непомерно высокой, пользователи не могут позволить себе запустить полные узлы и вынуждены полагаться на других, что подрывает бездоверительную природу Bitcoin. Неправильные ответы неверно предполагают положительные результаты (повышенная безопасность, автоматические настройки или поддерживаемые гарантии), в то время как высокое использование ресурсов на самом деле вынуждает к централизации и доверительным зависимостям.

question: Kulingana na ubadilishanaji kati ya matokeo na ugatuaji uliojadiliwa na Gregory Maxwell, nini hufanyika wakati matumizi ya rasilimali ya Bitcoin blockchain inakuwa kubwa sana ikilinganishwa na teknolojia inayopatikana?
answer: Bitcoin inapoteza faida za kiushindani ikilinganishwa na mifumo ya urithi kwa sababu uthibitishaji unakuwa wa gharama kubwa, kuwagharimu watumiaji wengi na kulazimisha uaminifu kwenye mfumo.
wrong_answers:
  - Bitcoin inakuwa salama zaidi kwa sababu watumiaji waliojitolea zaidi walio na maunzi yenye nguvu pekee ndio wanaweza kushiriki katika uthibitishaji, na hivyo kuunda mtandao imara zaidi
  - Bitcoin hurekebisha kiotomatiki algoriti yake ya ugumu ili kupunguza mahitaji ya rasilimali na kudumisha kiwango sawa cha ugatuaji kwa washiriki wote.
  - Bitcoin inagawanyika katika minyororo mingi sambamba ili kusambaza mzigo wa kukokotoa huku ikidumisha dhamana sawa za usalama kwa watumiaji wote.
explanation: |
  Maxwell alibainisha mabadilishano ya kimsingi ambapo mahitaji mengi ya rasilimali yanasukuma watumiaji kuelekea watu wengine wanaoaminika badala ya uthibitishaji huru. Wakati gharama za uthibitishaji zinapokuwa nyingi, watumiaji hawawezi kumudu kutumia nodi kamili na lazima wategemee wengine, na kudhoofisha tabia ya uaminifu ya Bitcoin. Majibu yasiyo sahihi yanapendekeza kwa njia isiyo sahihi matokeo ya manufaa (ongezeko la usalama, marekebisho ya kiotomatiki, au uhakikisho uliodumishwa) wakati matumizi ya juu ya rasilimali yanalazimisha utegemezi wa kati na uaminifu.

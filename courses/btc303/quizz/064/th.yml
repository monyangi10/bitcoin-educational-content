question: ตามการแลกเปลี่ยนระหว่างปริมาณงานและการกระจายอำนาจที่กล่าวถึงโดย Gregory Maxwell จะเกิดอะไรขึ้นเมื่อการใช้ทรัพยากรของบล็อกเชน Bitcoin มากเกินไปเมื่อเทียบกับเทคโนโลยีที่มีอยู่?
answer: Bitcoin สูญเสียความได้เปรียบในการแข่งขันเมื่อเทียบกับระบบเดิมเนื่องจากการตรวจสอบความถูกต้องมีค่าใช้จ่ายสูงเกินไป ทำให้ผู้ใช้หลายรายไม่สามารถเข้าถึงได้และบังคับให้ความไว้วางใจกลับเข้าสู่ระบบ
wrong_answers:
  - Bitcoin มีความปลอดภัยมากขึ้นเพราะมีเพียงผู้ใช้ที่ทุ่มเทที่สุดที่มีฮาร์ดแวร์ที่ทรงพลังเท่านั้นที่สามารถเข้าร่วมในการตรวจสอบความถูกต้อง สร้างเครือข่ายที่แข็งแกร่งขึ้น
  - Bitcoin ปรับอัลกอริธึมความยากโดยอัตโนมัติเพื่อลดความต้องการทรัพยากรและรักษาระดับการกระจายอำนาจให้เท่าเทียมกันในหมู่ผู้เข้าร่วมทั้งหมด
  - Bitcoin แยกออกเป็นหลายสายโซ่ขนานเพื่อกระจายภาระการคำนวณในขณะที่ยังคงรักษาการรับประกันความปลอดภัยเดียวกันสำหรับผู้ใช้ทุกคน
explanation: |
  Maxwell ระบุถึงการแลกเปลี่ยนพื้นฐานที่ความต้องการทรัพยากรมากเกินไปผลักดันให้ผู้ใช้หันไปหาบุคคลที่สามที่เชื่อถือได้แทนที่จะเป็นการตรวจสอบอิสระ เมื่อค่าใช้จ่ายในการตรวจสอบกลายเป็นสิ่งที่ห้ามปราม ผู้ใช้ไม่สามารถที่จะรันโหนดเต็มรูปแบบได้และต้องพึ่งพาผู้อื่น ซึ่งบ่อนทำลายธรรมชาติที่ไม่ต้องพึ่งพาความไว้วางใจของ Bitcoin คำตอบที่ผิดแนะนำผลลัพธ์ที่เป็นประโยชน์อย่างไม่ถูกต้อง (ความปลอดภัยที่เพิ่มขึ้น การปรับอัตโนมัติ หรือการรับประกันที่ยังคงอยู่) เมื่อการใช้ทรัพยากรมากจริง ๆ แล้วบังคับให้เกิดการรวมศูนย์และการพึ่งพาความไว้วางใจ
reviewed: false
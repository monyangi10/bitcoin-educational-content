question: با توجه به مبادله بین توان عملیاتی و تمرکززدایی که توسط گریگوری مکسول مورد بحث قرار گرفته است، چه اتفاقی می‌افتد زمانی که استفاده از منابع بلاکچین Bitcoin نسبت به فناوری موجود بیش از حد شود؟
answer: سیستم Bitcoin مزایای رقابتی خود را در مقایسه با سیستم‌های قدیمی از دست می‌دهد زیرا اعتبارسنجی بسیار پرهزینه می‌شود، بسیاری از کاربران را از دست می‌دهد و اعتماد را به سیستم بازمی‌گرداند.
wrong_answers:
  - Bitcoin امن‌تر می‌شود زیرا تنها کاربران بسیار متعهد با سخت‌افزار قدرتمند می‌توانند در اعتبارسنجی شرکت کنند و یک شبکه قوی‌تر ایجاد می‌کنند.
  - Bitcoin به‌طور خودکار الگوریتم سختی خود را تنظیم می‌کند تا نیازهای منابع را کاهش داده و همان سطح از تمرکززدایی را در میان همه شرکت‌کنندگان حفظ کند.
  - Bitcoin به چندین زنجیره موازی تقسیم می‌شود تا بار محاسباتی را توزیع کند و در عین حال همان تضمین‌های امنیتی را برای همه کاربران حفظ کند.
explanation: |
  مکسول یک مبادله اساسی را شناسایی کرد که در آن نیازهای بیش از حد منابع کاربران را به سمت اشخاص ثالث قابل اعتماد سوق می‌دهد تا اعتبارسنجی مستقل. هنگامی که هزینه‌های اعتبارسنجی غیرقابل تحمل می‌شود، کاربران نمی‌توانند از گره‌های کامل استفاده کنند و باید به دیگران تکیه کنند، که این امر به ماهیت بدون اعتماد Bitcoin آسیب می‌زند. پاسخ‌های نادرست به اشتباه نتایج مفید (افزایش امنیت، تنظیمات خودکار، یا تضمین‌های حفظ شده) را پیشنهاد می‌کنند، در حالی که استفاده بالای منابع در واقع تمرکز و وابستگی به اعتماد را تحمیل می‌کند.
question: ग्रेगरी मैक्सवेल द्वारा चर्चा किए गए थ्रूपुट और विकेंद्रीकरण के बीच व्यापार-बंद के अनुसार, क्या होता है जब Bitcoin ब्लॉकचेन का संसाधन उपयोग उपलब्ध तकनीक के सापेक्ष बहुत अधिक हो जाता है?
answer: Bitcoin, पुरानी प्रणालियों की तुलना में प्रतिस्पर्धात्मक लाभ खो देता है, क्योंकि सत्यापन बहुत महंगा हो जाता है, जिससे कई उपयोगकर्ता बाहर हो जाते हैं और सिस्टम पर भरोसा कम हो जाता है।
wrong_answers:
  - Bitcoin अधिक सुरक्षित हो जाता है क्योंकि केवल शक्तिशाली हार्डवेयर वाले सबसे समर्पित उपयोगकर्ता ही सत्यापन में भाग ले सकते हैं, जिससे एक मजबूत नेटवर्क बनता है
  - Bitcoin संसाधन आवश्यकताओं को कम करने और सभी प्रतिभागियों में विकेंद्रीकरण के समान स्तर को बनाए रखने के लिए अपने कठिनाई एल्गोरिदम को स्वचालित रूप से समायोजित करता है
  - Bitcoin सभी उपयोगकर्ताओं के लिए समान सुरक्षा गारंटी बनाए रखते हुए कम्प्यूटेशनल लोड को वितरित करने के लिए कई समानांतर श्रृंखलाओं में विभाजित हो जाता है
explanation: |
  मैक्सवेल ने एक बुनियादी समझौता बताया जहाँ अत्यधिक संसाधन आवश्यकताएँ उपयोगकर्ताओं को स्वतंत्र सत्यापन के बजाय विश्वसनीय तृतीय पक्षों की ओर धकेलती हैं। जब सत्यापन की लागत अत्यधिक हो जाती है, तो उपयोगकर्ता पूर्ण नोड्स चलाने का जोखिम नहीं उठा सकते और उन्हें दूसरों पर निर्भर रहना पड़ता है, जिससे Bitcoin की अविश्वसनीय प्रकृति कमज़ोर हो जाती है। गलत उत्तर गलत तरीके से लाभकारी परिणामों (बढ़ी हुई सुरक्षा, स्वचालित समायोजन, या अनुरक्षित गारंटी) का सुझाव देते हैं, जबकि उच्च संसाधन उपयोग वास्तव में केंद्रीकरण और विश्वास निर्भरता को बल देता है।
reviewed: false

question: Gemäß dem von Gregory Maxwell erörterten Kompromiss zwischen Durchsatz und Dezentralisierung stellt sich die Frage, was passiert, wenn der Ressourcenverbrauch der Bitcoin-Blockchain im Verhältnis zur verfügbaren Technologie zu groß wird
answer: Bitcoin verliert Wettbewerbsvorteile im Vergleich zu Altsystemen, weil die Validierung zu kostspielig wird, wodurch viele Nutzer ausgeschlossen werden und das Vertrauen in das System zurückgeworfen wird
wrong_answers:
  - Bitcoin wird sicherer, weil nur die engagiertesten Nutzer mit leistungsfähiger Hardware an der Validierung teilnehmen können, wodurch ein stärkeres Netz entsteht
  - Bitcoin passt seinen Schwierigkeitsalgorithmus automatisch an, um den Ressourcenbedarf zu reduzieren und das gleiche Maß an Dezentralisierung für alle Teilnehmer aufrechtzuerhalten
  - Bitcoin teilt sich in mehrere parallele Ketten auf, um die Rechenlast zu verteilen und gleichzeitig dieselben Sicherheitsgarantien für alle Benutzer aufrechtzuerhalten
explanation: |
  Maxwell hat einen grundlegenden Kompromiss identifiziert, bei dem übermäßige Ressourcenanforderungen die Nutzer eher zu vertrauenswürdigen Dritten als zu einer unabhängigen Validierung drängen. Wenn die Validierungskosten unerschwinglich werden, können es sich die Nutzer nicht mehr leisten, vollständige Knoten zu betreiben und müssen sich auf andere verlassen, wodurch der vertrauenslose Charakter von Bitcoin untergraben wird. Die falschen Antworten suggerieren fälschlicherweise vorteilhafte Ergebnisse (erhöhte Sicherheit, automatische Anpassungen oder aufrechterhaltene Garantien), obwohl ein hoher Ressourcenverbrauch in Wirklichkeit eine Zentralisierung und Vertrauensabhängigkeit erzwingt.
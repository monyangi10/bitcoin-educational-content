question: Кой е основният недостатък на доверените финансови системи, който се цели да бъде решен с дизайна на Bitcoin?
answer: Невъзможност за извършване на напълно необратими транзакции поради изискванията за посредничество при спорове
wrong_answers:
  - Високото потребление на енергия, необходимо за обработката на електронни плащания чрез банки
  - Ограниченият брой транзакции, които финансовите институции могат да обработват в секунда
  - Изискването клиентите да предоставят прекомерно много лични документи за самоличност
explanation: |
  Според Satoshi Nakamoto в Бялата книга на Bitcoin традиционните финансови системи страдат от фундаменталната слабост, че не са възможни напълно необратими трансакции, тъй като финансовите институции трябва да посредничат при спорове. Това създава каскада от проблеми: увеличаване на разходите по трансакциите поради посредничеството, елиминиране на малките случайни трансакции и разпростиране на изискванията за доверие в цялата система. Другите варианти, макар и да са потенциално приложими за финансовите системи, не са основният проблем, който конкретно се разглежда в проекта за липса на доверие в Bitcoin. Нововъведението на Bitcoin позволява окончателен сетълмент, без да се изисква доверена трета страна да сторнира транзакциите.
reviewed: true

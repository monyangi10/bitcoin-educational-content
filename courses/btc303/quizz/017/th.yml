question: ข้อเสียหลักของระบบการเงินที่เชื่อถือได้ซึ่งการออกแบบที่ไม่ต้องเชื่อถือของ Bitcoin มุ่งแก้ไขคืออะไร?
answer: การไม่สามารถทำธุรกรรมที่ไม่สามารถย้อนกลับได้อย่างสมบูรณ์เนื่องจากข้อกำหนดในการไกล่เกลี่ยข้อพิพาท
wrong_answers:
  - การใช้พลังงานสูงที่จำเป็นสำหรับการประมวลผลการชำระเงินอิเล็กทรอนิกส์ผ่านธนาคาร
  - จำนวนธุรกรรมที่สามารถดำเนินการได้ต่อวินาทีโดยสถาบันการเงินมีจำนวนจำกัด
  - ข้อกำหนดให้ลูกค้าจัดเตรียมเอกสารระบุตัวตนส่วนบุคคลที่มากเกินไป
explanation: |
  ตามที่ Satoshi Nakamoto กล่าวไว้ในเอกสารขาว Bitcoin ระบบการเงินแบบดั้งเดิมมีจุดอ่อนพื้นฐานที่การทำธุรกรรมที่ไม่สามารถย้อนกลับได้อย่างสมบูรณ์นั้นเป็นไปไม่ได้ เพราะสถาบันการเงินต้องเป็นผู้ไกล่เกลี่ยข้อพิพาท ซึ่งก่อให้เกิดปัญหาต่างๆ ตามมา: ต้นทุนการทำธุรกรรมที่เพิ่มขึ้นเนื่องจากการไกล่เกลี่ย, การกำจัดธุรกรรมเล็กๆ ที่ไม่เป็นทางการ, และการแพร่กระจายของข้อกำหนดด้านความเชื่อมั่นทั่วทั้งระบบ ตัวเลือกอื่นๆ แม้อาจเกี่ยวข้องกับระบบการเงิน แต่ไม่ใช่ปัญหาหลักที่การออกแบบที่ไม่ต้องการความเชื่อมั่นของ Bitcoin มุ่งเน้นแก้ไข นวัตกรรมของ Bitcoin คือการทำให้การชำระเงินขั้นสุดท้ายเป็นไปได้โดยไม่ต้องอาศัยบุคคลที่สามที่เชื่อถือได้ในการย้อนกลับธุรกรรม
reviewed: false
question: Jaka jest główna wada zaufanych systemów finansowych, którą ma rozwiązać projekt Bitcoin?
answer: Niemożność dokonywania całkowicie nieodwracalnych transakcji ze względu na wymogi dotyczące mediacji w sporach
wrong_answers:
  - Wysokie zużycie energii wymagane do przetwarzania płatności elektronicznych za pośrednictwem banków
  - Ograniczona liczba transakcji, które mogą być przetwarzane na sekundę przez instytucje finansowe
  - Wymóg dostarczania przez klientów nadmiernych dokumentów tożsamości
explanation: |
  Według Satoshi Nakamoto w Bitcoin whitepaper, tradycyjne systemy finansowe cierpią z powodu fundamentalnej słabości polegającej na tym, że całkowicie nieodwracalne transakcje nie są możliwe, ponieważ instytucje finansowe muszą pośredniczyć w sporach. Powoduje to kaskadę problemów: zwiększone koszty transakcji z powodu mediacji, eliminację małych przypadkowych transakcji i rozprzestrzenianie się wymogów zaufania w całym systemie. Inne opcje, choć potencjalnie istotne dla systemów finansowych, nie są podstawową kwestią, do której odnosi się projekt Bitcoin. Innowacją Bitcoin jest umożliwienie ostatecznego rozliczenia bez konieczności odwracania transakcji przez zaufaną stronę trzecią.
reviewed: false

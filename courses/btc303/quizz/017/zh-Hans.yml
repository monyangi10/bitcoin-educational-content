question: Bitcoin 的无信任设计所要解决的信任金融系统的主要缺点是什么？
answer: 由于争端调解要求，无法进行完全不可逆转的交易
wrong_answers:
  - 通过银行处理电子支付所需的高能耗
  - 金融机构每秒可处理的交易数量有限
  - 要求客户提供过多的个人身份证件
explanation: |
  根据 Satoshi Nakamoto 在 Bitcoin 白皮书中的说法，传统金融体系存在一个根本性的弱点，即由于金融机构必须调解纠纷，因此不可能进行完全不可逆的交易。这就造成了一连串的问题：调解导致交易成本增加、小额偶然交易被淘汰、信任要求在整个系统中扩散。其他方案虽然可能与金融系统有关，但并不是 Bitcoin 无信任设计所专门解决的核心问题。Bitcoin 的创新之处在于实现最终结算，而不需要可信的第三方来逆转交易。
reviewed: false

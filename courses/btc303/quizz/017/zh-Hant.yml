question: Bitcoin 的無信任設計旨在解決信任金融系統的主要缺點是什麼？
answer: 由於爭議調解的要求，無法進行完全不可逆轉的交易
wrong_answers:
  - 透過銀行處理電子付款所需的高能源消耗
  - 金融機構每秒可處理的交易數量有限
  - 要求客戶提供過多的個人身份證明文件
explanation: |
  根據 Satoshi Nakamoto 在 Bitcoin 白皮書中的說法，傳統金融系統有一個基本弱點，就是完全不可逆轉的交易是不可能的，因為金融機構必須調解糾紛。這造成了一連串的問題：因調解而增加的交易成本、小型隨意交易的淘汰，以及信任需求在整個系統中的擴散。其他選項雖然可能與金融系統相關，但並非 Bitcoin 無信任設計特別要解決的核心問題。Bitcoin 的創新之處在於不需要可信賴的第三方來扭轉交易，即可實現最終結算。
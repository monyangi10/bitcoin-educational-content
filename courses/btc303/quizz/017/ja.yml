question: Bitcoinのトラストレスデザインが解決しようとする、信頼された金融システムの主な欠点とは何か？
answer: 紛争調停要件により、完全に非可逆的な取引を行うことができない。
wrong_answers:
  - 銀行を通じた電子決済処理に必要なエネルギー消費量の多さ
  - 金融機関が1秒間に処理できる取引数には限りがある。
  - 顧客に過度な本人確認書類の提出を求めること
explanation: |
  BitcoinホワイトペーパーのSatoshiナカモトによれば、従来の金融システムは、金融機関が紛争を調停しなければならないため、完全に非可逆的な取引ができないという根本的な弱点を抱えている。これは、仲介による取引コストの増加、気軽な少額取引の排除、システム全体への信用要件の拡散といった問題の連鎖を引き起こす。他の選択肢は、金融システムに関連する可能性はあるものの、Bitcoinのトラストレス設計が特に取り組む中核的な問題ではない。Bitcoinの革新性は、信頼できる第三者が取引を取り消すことなく最終決済を可能にすることである。
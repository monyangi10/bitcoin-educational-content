question: Ni ikihe kibazo nyamukuru c’uburyo bw’ivy’ubutunzi bwizigirwa umugambi wa Bitcoin utagira icizigiro ugamije gutorera umuti?
answer: Kudashobora gukora amasezerano adashobora gusubirwamwo kubera ibisabwa mu guhuza amatati
wrong_answers:
  - Inguvu nyinshi zikenewe kugira ngo umuntu ashobore kwishura biciye mu mabanki
  - Umubare muto w'ibikorwa bishobora gukorwa ku segonda n'ibigo vy'imari
  - Igisabwa ku bakiriya gutanga ivyangombwa vy'irangamuntu birenze urugero
explanation: |
  Nk’uko Satoshi Nakamoto abivuga mu gitabu cera ca Bitcoin, uburyo bw’ivy’imari bwa kera burashikirwa n’intege nke y’ishimikiro y’uko amafaranga adashobora gusubirwamwo rwose adashoboka kubera ko ibigo vy’imari bitegerezwa guhuza amatati. Ivyo bituma haba ingorane nyinshi: ukwiyongera kw’ibiciro vy’ibikorwa bitewe n’ubuhuza, ugukuraho ibikorwa bitobito vy’ibikorwa vy’ubudandaji, n’ugukwiragira kw’ibisabwa vyo kwizigira muri sisitemu yose. Ibindi bihitamwo, naho bishobora kuba bifitaniye isano n’imirongo y’ivy’ubutunzi, si co kibazo nyamukuru umugambi wa Bitcoin utagira icizigiro uvuga canecane. Ico gishasha ca Bitcoin kiriko kiratuma habaho uguheba amahera y’iherezo ata muntu agira gatatu yizigirwa asubiza inyuma amafaranga.

question: विश्वसनीय वित्तीय प्रणालियों का मुख्य नुकसान क्या है जिसे Bitcoin के विश्वसनीय डिजाइन का लक्ष्य हल करना है?
answer: विवाद मध्यस्थता आवश्यकताओं के कारण पूरी तरह से अपरिवर्तनीय लेनदेन करने में असमर्थता
wrong_answers:
  - बैंकों के माध्यम से इलेक्ट्रॉनिक भुगतान के प्रसंस्करण के लिए आवश्यक उच्च ऊर्जा खपत
  - वित्तीय संस्थाओं द्वारा प्रति सेकंड संसाधित किए जा सकने वाले लेनदेन की सीमित संख्या
  - ग्राहकों को अत्यधिक व्यक्तिगत पहचान दस्तावेज उपलब्ध कराने की आवश्यकता
explanation: |
  Bitcoin श्वेतपत्र में Satoshi नाकामोतो के अनुसार, पारंपरिक वित्तीय प्रणालियाँ इस मूलभूत कमज़ोरी से ग्रस्त हैं कि पूरी तरह से अपरिवर्तनीय लेनदेन संभव नहीं हैं क्योंकि वित्तीय संस्थानों को विवादों में मध्यस्थता करनी होती है। इससे कई समस्याएँ पैदा होती हैं: मध्यस्थता के कारण बढ़ी हुई लेनदेन लागत, छोटे-मोटे आकस्मिक लेनदेन का उन्मूलन, और पूरे सिस्टम में विश्वास की आवश्यकताओं का प्रसार। अन्य विकल्प, वित्तीय प्रणालियों के लिए संभावित रूप से प्रासंगिक होते हुए भी, वह मुख्य समस्या नहीं हैं जिसका Bitcoin का विश्वास-रहित डिज़ाइन विशेष रूप से समाधान करता है। Bitcoin का नवाचार लेनदेन को उलटने के लिए किसी विश्वसनीय तृतीय पक्ष की आवश्यकता के बिना अंतिम निपटान को सक्षम बनाता है।
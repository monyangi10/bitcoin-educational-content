question: Какой основной недостаток доверенных финансовых систем призван устранить дизайн без доверия Bitcoin?
answer: Невозможность совершения полностью необратимых сделок из-за требований к посредничеству при разрешении споров
wrong_answers:
  - Высокое потребление энергии, необходимое для обработки электронных платежей через банки
  - Ограниченное количество транзакций, которые финансовые учреждения могут обрабатывать в секунду
  - Требование к клиентам предоставлять излишние документы, удостоверяющие личность
explanation: |
  Согласно Satoshi Накамото, описанному в документе Bitcoin, традиционные финансовые системы страдают от фундаментального недостатка: полностью необратимые транзакции невозможны, поскольку финансовые учреждения должны выступать посредниками в спорах. Это создает каскад проблем: увеличение стоимости транзакций из-за посредничества, устранение мелких случайных транзакций и распространение требований доверия на всю систему. Другие варианты, хотя и потенциально актуальны для финансовых систем, не являются основной проблемой, которую решает дизайн без доверия Bitcoin. Инновация Bitcoin заключается в том, что она позволяет осуществлять окончательные расчеты, не требуя доверенной третьей стороны для отмены транзакций.

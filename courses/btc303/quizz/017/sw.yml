question: Je, ni hasara gani kuu ya mifumo ya fedha inayoaminika ambayo muundo usioaminika wa Bitcoin unalenga kutatua?
answer: Kutoweza kufanya miamala isiyoweza kutenduliwa kabisa kutokana na mahitaji ya upatanishi wa migogoro
wrong_answers:
  - Matumizi ya juu ya nishati yanayohitajika kwa usindikaji wa malipo ya kielektroniki kupitia benki
  - Idadi ndogo ya miamala ambayo inaweza kuchakatwa kwa sekunde na taasisi za fedha
  - Sharti la wateja kutoa hati nyingi za kitambulisho cha kibinafsi
explanation: |
  Kulingana na Satoshi Nakamoto katika karatasi nyeupe ya Bitcoin, mifumo ya jadi ya kifedha inakabiliwa na udhaifu wa kimsingi kwamba miamala isiyoweza kutenduliwa kabisa haiwezekani kwa sababu taasisi za kifedha lazima zisuluhishe mizozo. Hili huzua msururu wa matatizo: kuongezeka kwa gharama za muamala kutokana na upatanishi, kukomesha shughuli ndogo za kawaida, na kuenea kwa mahitaji ya uaminifu katika mfumo mzima. Chaguo zingine, ingawa zinafaa kwa mifumo ya kifedha, sio suala la msingi ambalo muundo usioaminika wa Bitcoin hushughulikia haswa. Ubunifu wa Bitcoin unawezesha suluhu la mwisho bila kuhitaji mtu mwingine anayeaminika kutengua miamala.

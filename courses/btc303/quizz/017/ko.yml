question: Bitcoin의 무신뢰 설계가 해결하고자 하는 신뢰할 수 있는 금융 시스템의 주요 단점은 무엇인가요?
answer: 분쟁 조정 요건으로 인해 완전히 되돌릴 수 없는 거래를 할 수 없는 경우
wrong_answers:
  - 은행을 통한 전자 결제 처리에 필요한 높은 에너지 소비량
  - 금융 기관에서 초당 처리할 수 있는 거래의 제한 수
  - 고객이 과도한 개인 신분증을 제공해야 하는 경우
explanation: |
  Bitcoin 백서의 Satoshi 나카모토에 따르면, 기존 금융 시스템은 금융 기관이 분쟁을 중재해야 하기 때문에 완전한 비가역적 거래가 불가능하다는 근본적인 약점을 가지고 있습니다. 이로 인해 중개로 인한 거래 비용 증가, 소액 소액 거래의 제거, 시스템 전체에 걸친 신뢰 요건의 확산 등 일련의 문제가 발생하게 됩니다. 다른 옵션들은 잠재적으로 금융 시스템과 관련이 있지만, Bitcoin의 신뢰 없는 설계가 구체적으로 해결하는 핵심 문제는 아닙니다. Bitcoin의 혁신은 신뢰할 수 있는 제3자가 거래를 취소할 필요 없이 최종 결제를 가능하게 합니다.
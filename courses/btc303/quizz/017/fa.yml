question: عیب اصلی سیستم‌های مالی مورد اعتماد که طراحی بدون اعتماد Bitcoin به حل آن می‌پردازد چیست؟
answer: ناتوانی در انجام تراکنش‌های کاملاً غیرقابل برگشت به دلیل نیاز به میانجی‌گری در اختلافات
wrong_answers:
  - مصرف بالای انرژی مورد نیاز برای پردازش پرداخت‌های الکترونیکی از طریق بانک‌ها
  - تعداد محدود تراکنش‌هایی که می‌توانند در هر ثانیه توسط مؤسسات مالی پردازش شوند
  - الزام مشتریان به ارائه مدارک شناسایی شخصی بیش از حد
explanation: |
  طبق گفته Satoshi ناکاموتو در وایت‌پیپر Bitcoin، سیستم‌های مالی سنتی از ضعف بنیادی رنج می‌برند که تراکنش‌های کاملاً غیرقابل برگشت ممکن نیستند زیرا مؤسسات مالی باید در اختلافات میانجی‌گری کنند. این امر باعث ایجاد مشکلات زنجیره‌ای می‌شود: افزایش هزینه‌های تراکنش به دلیل میانجی‌گری، حذف تراکنش‌های کوچک و عادی، و گسترش نیاز به اعتماد در سراسر سیستم. گزینه‌های دیگر، هرچند ممکن است به سیستم‌های مالی مرتبط باشند، اما مسئله اصلی که طراحی بدون نیاز به اعتماد Bitcoin به طور خاص به آن می‌پردازد نیستند. نوآوری Bitcoin امکان تسویه نهایی بدون نیاز به یک شخص ثالث مورد اعتماد برای برگشت تراکنش‌ها را فراهم می‌کند.
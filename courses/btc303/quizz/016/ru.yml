question: Какие системы могут быть построены на основе базового слоя Bitcoin, не требующего доверия, в соответствии с описанной моделью безопасности?
answer: На его основе можно строить как недоверенные, так и доверенные системы
wrong_answers:
  - На ее основе можно строить только надежные системы
  - Только доверенные системы могут быть построены на его основе
  - Никакие дополнительные системы не могут быть построены поверх него
explanation: |
  Базовый слой Bitcoin, не требующий доверия, обеспечивает основу, которая позволяет гибко строить различные типы систем поверх него. Как объяснил Мэтт Коралло, хотя вы не можете строить недоверенные системы поверх доверенных систем, вы можете строить доверенные системы (например, кошельки хранителей) поверх недоверенных систем. Это означает, что бездоверительная основа Bitcoin поддерживает как бездоверительные приложения, так и доверенные сервисы, предоставляя разработчикам систем свободу выбора подходящих компромиссов без принуждения к таким компромиссам всех остальных пользователей базового слоя.
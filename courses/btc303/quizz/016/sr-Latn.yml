question: Kakvi sistemi mogu biti izgrađeni na Bitcoin-ovom sloju bez poverenja prema opisanom modelu bezbednosti?
answer: Sistemi sa i bez poverenja mogu biti izgrađeni na njemu
wrong_answers:
  - Samo sistemi bez poverenja mogu biti izgrađeni na njemu
  - Samo pouzdani sistemi mogu biti izgrađeni na njemu
  - Na njega se ne mogu izgraditi dodatni sistemi
explanation: |
  Osnovni sloj Bitcoina bez poverenja pruža osnovu koja omogućava fleksibilnost u izgradnji različitih tipova sistema iznad. Kao što je Matt Corallo objasnio, 
  dok ne možete izgraditi sisteme bez poverenja povrh sistema sa poverenjem, možete izgraditi sisteme sa poverenjem (kao što su kustodijal novčanici)
  povrh sistema bez poverenja. To znači da osnovna Bitcoin struktura bez poverenja podržava i aplikacije bez poverenja i usluge sa poverenjem, 
  dajući dizajnerima sistema slobodu da biraju odgovarajuće kompromise bez nametanja istih kompromisa svima ostalima koji koriste osnovni sloj.
reviewed: true

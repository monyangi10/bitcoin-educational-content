question: Ni ubuhe bwoko bw’imirongo ishobora kwubakwa hejuru y’uruzitiro rw’ishimikiro rwa Bitcoin rutagira icizigiro hakurikijwe uburyo bw’umutekano bwavuzwe?
answer: Uburyo bwose butagira icizigiro n’ubwizigirwa burashobora kwubakwa hejuru yayo .
wrong_answers:
  - Uburyo butagira icizigiro ni bwo bwonyene bushobora kwubakwa hejuru yayo .
  - Uburyo bwizigirwa bwonyene ni bwo bushobora kwubakwa hejuru yayo .
  - Nta yindi mirongo ishobora kwubakwa hejuru yayo .
explanation: |
  Igipande c’ishimikiro ca Bitcoin kitagira icizigiro gitanga umushinge utuma umuntu ashobora guhindura uko abona ibintu mu kwubaka ubwoko butandukanye bw’imirongo hejuru. Nk’uko Matt Corallo yabisiguye, naho udashobora kwubaka uburyo butagira icizigiro hejuru y’uburyo bwizigirwa, urashobora kwubaka uburyo bwizigirwa (nk’amasakoshi y’ububiko) hejuru y’uburyo butagira icizigiro. Ivyo bisigura ko umushinge wa Bitcoin utagira icizigiro ushigikira ibikorwa bitagira icizigiro be n’ibikorwa vyizigirwa, bikaba biha abahinguzi ba sisitemu umwidegemvyo wo guhitamwo ivyiza bikwiye ata guhatira ivyo vyiyumviro nyene ku bandi bose bakoresheje urugero rw’ishimikiro.
question: 根據所述的安全模型，可以在 Bitcoin 的無信任基礎層之上建立哪種類型的系統？
answer: 無信賴與可信賴的系統都可以在其上建立
wrong_answers:
  - 只有無信賴的系統才能在其上建立
  - 只有受信任的系統才能在其上建立
  - 無法在其上建立其他系統
explanation: |
  Bitcoin 的無信任基層提供了一個基礎，讓您可以靈活地在上面建立不同類型的系統。正如 Matt Corallo 所解釋的，雖然您無法在可信系統之上建置不可信系統，但您可以在不可信系統之上建置可信系統 (例如保管式錢包)。這表示 Bitcoin 的無信任基礎同時支援無信任應用程式和可信賴服務，讓系統設計人員可以自由選擇適當的取捨，而不會強迫其他使用基礎層的人做出相同的取捨。
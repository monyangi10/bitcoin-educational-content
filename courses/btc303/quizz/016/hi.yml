question: वर्णित सुरक्षा मॉडल के अनुसार Bitcoin की ट्रस्टलेस आधार परत के शीर्ष पर किस प्रकार की प्रणालियाँ बनाई जा सकती हैं?
answer: इसके ऊपर भरोसेमंद और विश्वसनीय दोनों तरह की प्रणालियाँ बनाई जा सकती हैं
wrong_answers:
  - इसके ऊपर केवल अविश्वसनीय प्रणालियाँ ही बनाई जा सकती हैं
  - इसके ऊपर केवल विश्वसनीय प्रणालियाँ ही बनाई जा सकती हैं
  - इसके ऊपर कोई अतिरिक्त प्रणाली नहीं बनाई जा सकती
explanation: |
  Bitcoin की ट्रस्टलेस बेस लेयर एक ऐसा आधार प्रदान करती है जो विभिन्न प्रकार के सिस्टम को शीर्ष पर बनाने में लचीलापन प्रदान करता है। जैसा कि मैट कोरालो ने समझाया, हालाँकि आप विश्वसनीय सिस्टम के ऊपर ट्रस्टलेस सिस्टम नहीं बना सकते, लेकिन आप ट्रस्टलेस सिस्टम के ऊपर विश्वसनीय सिस्टम (जैसे कस्टोडियल वॉलेट) बना सकते हैं। इसका मतलब है कि Bitcoin का ट्रस्टलेस फाउंडेशन ट्रस्टलेस एप्लिकेशन और ट्रस्टेड सर्विसेज, दोनों का समर्थन करता है, जिससे सिस्टम डिज़ाइनरों को बेस लेयर का उपयोग करने वाले अन्य सभी लोगों पर समान ट्रेड-ऑफ़ थोपे बिना उपयुक्त ट्रेड-ऑफ़ चुनने की स्वतंत्रता मिलती है।
reviewed: false

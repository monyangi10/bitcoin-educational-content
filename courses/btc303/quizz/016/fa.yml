question: بر اساس مدل امنیتی توصیف شده، چه نوع سیستم‌هایی می‌توانند بر روی لایه پایه بدون اعتماد Bitcoin ساخته شوند؟
answer: هم سیستم‌های بدون نیاز به اعتماد و هم سیستم‌های مبتنی بر اعتماد می‌توانند بر روی آن ساخته شوند.
wrong_answers:
  - فقط سیستم‌های بدون نیاز به اعتماد می‌توانند بر روی آن ساخته شوند
  - فقط سیستم‌های مورد اعتماد می‌توانند بر روی آن ساخته شوند
  - هیچ سیستم اضافی نمی‌تواند بر روی آن ساخته شود.
explanation: |
  لایه پایه بدون اعتماد Bitcoin یک پایه‌ای فراهم می‌کند که امکان انعطاف‌پذیری در ساخت انواع مختلف سیستم‌ها را بر روی آن فراهم می‌سازد. همان‌طور که مت کورالو توضیح داد، در حالی که نمی‌توانید سیستم‌های بدون اعتماد را بر روی سیستم‌های مورد اعتماد بسازید، می‌توانید سیستم‌های مورد اعتماد (مانند کیف‌پول‌های حضانتی) را بر روی سیستم‌های بدون اعتماد بسازید. این بدان معناست که پایه بدون اعتماد Bitcoin از هر دو برنامه‌های بدون اعتماد و خدمات مورد اعتماد پشتیبانی می‌کند و به طراحان سیستم آزادی می‌دهد تا مبادلات مناسب را انتخاب کنند بدون اینکه این مبادلات را به دیگران که از لایه پایه استفاده می‌کنند تحمیل کنند.
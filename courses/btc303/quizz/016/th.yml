question: ระบบประเภทใดบ้างที่สามารถสร้างขึ้นบนชั้นฐานที่ไม่ต้องเชื่อถือของ Bitcoin ตามโมเดลความปลอดภัยที่อธิบายไว้?
answer: ทั้งระบบที่ไม่ต้องใช้ความไว้วางใจและระบบที่ต้องใช้ความไว้วางใจสามารถสร้างขึ้นบนพื้นฐานของมันได้
wrong_answers:
  - ระบบที่ปราศจากความเชื่อถือเท่านั้นที่สามารถสร้างขึ้นบนพื้นฐานของมัน
  - ระบบที่เชื่อถือได้เท่านั้นที่สามารถสร้างขึ้นบนพื้นฐานของมัน
  - ไม่สามารถสร้างระบบเพิ่มเติมบนระบบนี้ได้
explanation: |
  ฐานชั้นล่างที่ไม่ต้องพึ่งพาความไว้วางใจของ Bitcoin มอบพื้นฐานที่ช่วยให้มีความยืดหยุ่นในการสร้างระบบประเภทต่างๆ บนพื้นฐานนี้ ตามที่ Matt Corallo อธิบายไว้ แม้ว่าคุณไม่สามารถสร้างระบบที่ไม่ต้องพึ่งพาความไว้วางใจบนระบบที่ต้องพึ่งพาความไว้วางใจได้ แต่คุณสามารถสร้างระบบที่ต้องพึ่งพาความไว้วางใจ (เช่น กระเป๋าเงินที่มีการดูแล) บนระบบที่ไม่ต้องพึ่งพาความไว้วางใจได้ ซึ่งหมายความว่าพื้นฐานที่ไม่ต้องพึ่งพาความไว้วางใจของ Bitcoin สนับสนุนทั้งแอปพลิเคชันที่ไม่ต้องพึ่งพาความไว้วางใจและบริการที่ต้องพึ่งพาความไว้วางใจ ทำให้นักออกแบบระบบมีอิสระในการเลือกการแลกเปลี่ยนที่เหมาะสมโดยไม่บังคับให้การแลกเปลี่ยนนั้นๆ กับทุกคนที่ใช้ฐานชั้นล่างนี้
reviewed: false
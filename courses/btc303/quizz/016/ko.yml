question: 설명된 보안 모델에 따라 Bitcoin의 신뢰할 수 없는 기본 계층 위에 어떤 유형의 시스템을 구축할 수 있나요?
answer: 신뢰할 수 없는 시스템과 신뢰할 수 있는 시스템을 모두 그 위에 구축할 수 있습니다
wrong_answers:
  - 신뢰할 수 없는 시스템만이 그 위에 구축될 수 있습니다
  - 신뢰할 수 있는 시스템만이 그 위에 구축될 수 있습니다
  - 그 위에 추가 시스템을 구축할 수 없습니다
explanation: |
  Bitcoin의 무신뢰 베이스 레이어는 그 위에 다양한 유형의 시스템을 유연하게 구축할 수 있는 기반을 제공합니다. 매트 코랄로가 설명했듯이 신뢰할 수 있는 시스템 위에 신뢰할 수 없는 시스템을 구축할 수는 없지만, 신뢰할 수 없는 시스템 위에 신뢰할 수 있는 시스템(예: 커스터디 월렛)을 구축할 수는 있습니다. 즉, Bitcoin의 트러스트리스 기반은 트러스트리스 애플리케이션과 트러스티드 서비스를 모두 지원하므로 시스템 설계자는 베이스 레이어를 사용하는 다른 모든 사용자에게 동일한 트러스트리스를 강요하지 않고도 적절한 절충안을 자유롭게 선택할 수 있습니다.
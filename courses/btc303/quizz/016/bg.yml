question: Какъв тип системи могат да бъдат изградени върху базовия слой без доверие на Bitcoin в съответствие с описания модел за сигурност?
answer: Върху него могат да се изграждат както ненадеждни, така и надеждни системи
wrong_answers:
  - Върху него могат да се изграждат само системи без доверие
  - Върху него могат да се изграждат само надеждни системи
  - Върху нея не могат да се изграждат допълнителни системи
explanation: |
  Безпроблемният базов слой на Bitcoin осигурява основа, която позволява гъвкаво изграждане на различни видове системи върху него. Както обясни Мат Корало, макар че не можете да изграждате ненадеждни системи върху надеждни системи, можете да изграждате надеждни системи (като портфейли за попечителство) върху ненадеждни системи. Това означава, че недоверителната основа на Bitcoin поддържа както недоверителни приложения, така и доверени услуги, като дава на системните проектанти свободата да избират подходящи компромиси, без да налагат същите компромиси на всички останали, които използват базовия слой.
reviewed: false

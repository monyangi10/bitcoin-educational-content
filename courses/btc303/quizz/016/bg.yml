question: Какъв тип системи могат да бъдат изградени върху базовия слой без нужда от доверие на Bitcoin в съответствие с описания модел за сигурност?
answer: Върху него могат да се изграждат както такива без нужда от доверие, така и обратното
wrong_answers:
  - Върху него могат да се изграждат само системи без доверие
  - Върху него могат да се изграждат само доверени системи
  - Върху нея не могат да се изграждат допълнителни системи
explanation: |
  Базовият слой на Bitcoin без нужда от доверие осигурява основа, която позволява гъвкаво изграждане на различни видове системи върху него. Както обясни Мат Корало, макар че не можете да изграждате системи без нужда от доверие върху доверени системи, можете да изграждате надеждни системи (като попечителски портфейли) върху системи без нужда от доверие. Това означава, че основата на Bitcoin поддържа всякакви приложения, като това дава на системните проектанти свободата да избират подходящи компромиси, без да налагат същите компромиси на всички останали, които използват базовия слой.
reviewed: true

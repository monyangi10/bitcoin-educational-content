question: 根据所描述的安全模型，在 Bitcoin 的无信任基础层之上可以构建什么类型的系统？
answer: 可在其基础上构建无信任系统和可信系统
wrong_answers:
  - 只有无信任的系统才能建立在它之上
  - 只有受信任的系统才能在其上构建
  - 不能在其上建立其他系统
explanation: |
  Bitcoin 的无信任基础层为在其上构建不同类型的系统提供了灵活性。正如 Matt Corallo 解释的那样，虽然不能在可信系统之上构建不可信系统，但可以在不可信系统之上构建可信系统（如托管钱包）。这意味着，Bitcoin 的无信任基础既支持无信任应用，也支持可信服务，让系统设计者可以自由选择适当的权衡，而不会将同样的权衡强加给使用基础层的其他人。
reviewed: false

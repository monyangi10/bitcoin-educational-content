question: 根据所描述的安全模型，在 Bitcoin 的无信任基础层之上可以构建什么类型的系统？
answer: 可在其基础上构建无信任和受信任系统
wrong_answers:
  - 只有无信任的系统才能在其上构建
  - 只有受信任的系统才能在其上构建
  - 不能在其上建立其他系统
explanation: |
  比特币的无信任基础层为在其上构建不同类型的系统提供了灵活性。正如 Matt Corallo 解释的内容，虽然不能在受信系统之上构建无信任系统，但可以在无信任系统之上构建受信任系统（如托管钱包）。这意味着，比特币的无信任基础既支持无信任应用，也支持受信任服务，让系统设计者可以自由选择适当的权衡，而不并不会让所有使用基础层的人都被迫接受同样的权衡。

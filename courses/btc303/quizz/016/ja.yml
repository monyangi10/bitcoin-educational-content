question: Bitcoinのトラストレス・ベースレイヤーの上に、どのようなシステムを構築することができるのか？
answer: トラストレス・システムもトラステッド・システムも、その上に構築することができる。
wrong_answers:
  - その上に構築できるのは、信頼のないシステムだけである。
  - その上に構築できるのは、信頼できるシステムだけである。
  - その上に追加のシステムを構築することはできない。
explanation: |
  Bitcoinのトラストレス・ベースレイヤーは、様々なタイプのシステムを柔軟に構築できる基盤を提供する。マット・コラロが説明したように、トラストド・システムの上にトラストレス・システムを構築することはできないが、トラストレス・システムの上に（カストディアル・ウォレットのような）トラストド・システムを構築することはできる。つまり、Bitcoinのトラストレス基盤は、トラストレスアプリケーションとトラストドサービスの両方をサポートし、システム設計者に、基盤レイヤーを使用する他のすべての人に同じトレードオフを強いることなく、適切なトレードオフを選択する自由を与える。
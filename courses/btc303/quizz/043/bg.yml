question: Какво основно подчертава концепцията за хармония Bitcoin, описана чрез аналогията на Дейвид Хардинг, за функционирането на мрежата?
answer: Хиляди пълноценни възли проверяват независимо транзакциите, за да постигнат хармонично споразумение, без да се изисква доверие между операторите
wrong_answers:
  - Пуловете Mining трябва да координират усилията си, за да пеят една и съща песен и да произвеждат блокове в синхронизирана хармония
  - Разработчиците на Bitcoin трябва да постигнат единодушен консенсус, преди да приложат каквито и да било промени или подобрения на протокола
  - Всички потребители на Bitcoin трябва да се споразумеят за валидността на транзакциите чрез демократичен процес на гласуване, за да се поддържа стабилността на мрежата
explanation: |
  Аналогията с хармонията на Дейвид Хардинг подчертава, че силата на Bitcoin идва от хиляди независими пълноценни възли, всеки от които работи отделно за проверка на транзакциите, създавайки хармонично споразумение за състоянието на главната книга, без да е необходимо някой оператор на възел да се доверява на другите. Това се сравнява с хор, в който всеки член пее самостоятелно, но заедно създават красива хармония. Неправилните отговори тълкуват погрешно тази концепция, като предполагат изисквания за координация между миньори, разработчици или потребители, което противоречи на фундаменталния принцип на независима проверка, който прави Bitcoin ненадежден и децентрализиран.
reviewed: false

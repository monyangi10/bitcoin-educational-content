question: แนวคิดของ Bitcoin harmony ตามที่อธิบายผ่านการเปรียบเทียบของ David Harding เน้นย้ำอะไรเป็นหลักเกี่ยวกับการดำเนินงานของเครือข่าย?
answer: โหนดเต็มหลายพันโหนดตรวจสอบธุรกรรมอย่างอิสระเพื่อให้บรรลุข้อตกลงที่สอดคล้องกันโดยไม่ต้องการความไว้วางใจระหว่างผู้ดำเนินการ
wrong_answers:
  - กลุ่ม Mining ต้องประสานความพยายามของพวกเขาในการร้องเพลงเดียวกันและผลิตบล็อกในความสามัคคีที่สอดคล้องกัน
  - นักพัฒนา Bitcoin จำเป็นต้องบรรลุฉันทามติเป็นเอกฉันท์ก่อนที่จะดำเนินการเปลี่ยนแปลงหรืออัปเกรดโปรโตคอลใด ๆ
  - ผู้ใช้ Bitcoin ทุกคนต้องยอมรับความถูกต้องของธุรกรรมผ่านกระบวนการลงคะแนนเสียงแบบประชาธิปไตยเพื่อรักษาเสถียรภาพของเครือข่าย
explanation: |
  อุปมาอุปไมยของ David Harding เกี่ยวกับความกลมกลืนเน้นย้ำว่าความแข็งแกร่งของ Bitcoin มาจากโหนดเต็มรูปแบบอิสระนับพันที่ทำงานแยกกันเพื่อตรวจสอบธุรกรรม สร้างข้อตกลงที่กลมกลืนเกี่ยวกับสถานะบัญชีแยกประเภทโดยไม่จำเป็นต้องให้ผู้ดำเนินการโหนดไว้วางใจผู้อื่น สิ่งนี้เปรียบเสมือนคอรัสที่สมาชิกแต่ละคนร้องเพลงอย่างอิสระแต่สร้างความกลมกลืนที่สวยงามร่วมกัน คำตอบที่ผิดจะตีความแนวคิดนี้ผิดโดยแนะนำข้อกำหนดการประสานงานระหว่างนักขุด นักพัฒนา หรือผู้ใช้ ซึ่งขัดแย้งกับหลักการพื้นฐานของการตรวจสอบอิสระที่ทำให้ Bitcoin ไร้ความไว้วางใจและกระจายอำนาจ
reviewed: false
question: デビッド・ハーディングのアナロジーを通して語られるビットコインの調和というコンセプトは、ネットワークの運営について主に何を強調しているのだろうか？
answer: 数千のフルノードがトランザクションを独自に検証し、オペレーター間の信頼関係を必要とせずに調和のとれた合意を達成する
wrong_answers:
  - マイニングプールは、同じ歌を歌い、同期したハーモニーでブロックを生成するために、それぞれの努力を調整する
  - ビットコイン開発者は、プロトコルの変更やアップグレードを実施する前に、全会一致のコンセンサスを得る必要がある
  - ネットワークの安定性を維持するために、すべてのビットコインユーザーは民主的な投票プロセスを通じてトランザクションの有効性に同意しなければならない
explanation: |
  デビッド・ハーディングのハーモニーの例えは、ビットコインの強さが、何千もの独立したフルノードがそれぞれ別々にトランザクションの検証を行い、どのノードオペレータも他者を信頼する必要なく、台帳の状態について調和の取れた合意を生み出すことに由来することを強調している。これは、各メンバーが独立して歌いながらも、共に美しいハーモニーを奏でるコーラスに例えられている。誤答は、マイナー、開発者、ユーザー間の協調要件を示唆することでこの概念を誤って解釈しており、ビットコインを信頼性のない分散型にしている独立した検証という基本原則に反している。
reviewed: false

question: 데이비드 하딩의 비유를 통해 설명한 Bitcoin 조화의 개념은 네트워크 운영과 관련하여 주로 무엇을 강조하나요?
answer: 수천 개의 풀 노드가 독립적으로 트랜잭션을 검증하여 운영자 간의 신뢰 없이도 조화로운 합의를 달성합니다
wrong_answers:
  - Mining 풀은 같은 노래를 부르고 동기화 된 하모니로 블록을 생성하기 위해 노력을 조정해야합니다
  - Bitcoin 개발자는 프로토콜 변경 또는 업그레이드를 구현하기 전에 만장일치로 합의를 이루어야 합니다
  - 모든 Bitcoin 사용자는 네트워크 안정성을 유지하기 위해 민주적인 투표 절차를 통해 거래 유효성에 동의해야 합니다
explanation: |
  데이비드 하딩의 하모니 비유는 Bitcoin의 강점이 수천 개의 독립적인 풀 노드가 각각 개별적으로 거래를 검증하고, 노드 운영자가 다른 노드를 신뢰할 필요 없이 원장 상태에 대한 조화로운 합의를 만들어내는 데서 나온다는 점을 강조합니다. 이는 각 멤버가 독립적으로 노래하지만 함께 아름다운 하모니를 만들어내는 합창단에 비유할 수 있습니다. 오답은 이 개념을 잘못 해석하여 채굴자, 개발자 또는 사용자 간의 조정 요구 사항을 제시하며, 이는 Bitcoin를 신뢰할 수 없고 탈중앙화되게 하는 독립적 검증의 기본 원칙과 모순됩니다.
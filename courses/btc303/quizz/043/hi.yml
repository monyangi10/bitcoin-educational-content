question: डेविड हार्डिंग के उदाहरण के माध्यम से वर्णित Bitcoin सामंजस्य की अवधारणा, नेटवर्क के संचालन के बारे में मुख्य रूप से क्या जोर देती है?
answer: हजारों पूर्ण नोड्स स्वतंत्र रूप से लेनदेन का सत्यापन करते हैं ताकि ऑपरेटरों के बीच विश्वास की आवश्यकता के बिना सामंजस्यपूर्ण समझौता प्राप्त किया जा सके
wrong_answers:
  - Mining पूल को एक ही गीत गाने और समकालिक सामंजस्य में ब्लॉक बनाने के लिए अपने प्रयासों का समन्वय करना चाहिए
  - Bitcoin डेवलपर्स को किसी भी प्रोटोकॉल परिवर्तन या अपग्रेड को लागू करने से पहले सर्वसम्मति तक पहुंचने की आवश्यकता है
  - नेटवर्क स्थिरता बनाए रखने के लिए सभी Bitcoin उपयोगकर्ताओं को लोकतांत्रिक मतदान प्रक्रिया के माध्यम से लेनदेन की वैधता पर सहमत होना होगा
explanation: |
  डेविड हार्डिंग की सामंजस्यता की उपमा इस बात पर ज़ोर देती है कि Bitcoin की ताकत हज़ारों स्वतंत्र पूर्ण नोड्स से आती है, जो लेन-देन सत्यापित करने के लिए अलग-अलग काम करते हैं, जिससे किसी भी नोड ऑपरेटर को दूसरों पर भरोसा किए बिना, लेज़र स्थिति के बारे में सामंजस्यपूर्ण सहमति बनती है। इसकी तुलना एक कोरस से की जा सकती है जहाँ प्रत्येक सदस्य स्वतंत्र रूप से गाता है लेकिन साथ मिलकर सुंदर सामंजस्य स्थापित करता है। गलत उत्तर इस अवधारणा की गलत व्याख्या करते हैं, जिसमें माइनर्स, डेवलपर्स या उपयोगकर्ताओं के बीच समन्वय की आवश्यकता का सुझाव दिया जाता है, जो स्वतंत्र सत्यापन के मूल सिद्धांत का खंडन करता है जो Bitcoin को अविश्वसनीय और विकेन्द्रीकृत बनाता है।
reviewed: false

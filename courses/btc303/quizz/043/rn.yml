question: Ni igiki iciyumviro c’uguhuza Bitcoin, nk’uko kidondorwa biciye mu kigereranyo ca David Harding, gishimika canecane ku bijanye n’ingene urubuga rukora?
answer: Ibihumbi vy'ibice vyuzuye vyigenga bigenzura amafaranga kugira ngo bishike ku masezerano ahuye ataco bisaba kwizigirana hagati y'abakoresha
wrong_answers:
  - Ivyo bidengeri vya Mining bitegerezwa guhuza utwigoro twavyo kugira ngo biririmbe ururirimbo rumwe kandi bivemwo amabuye mu buryo buhuye .
  - Abahinguzi ba Bitcoin barakeneye gushika ku ciyumviro kimwe imbere yo gushiramwo amahinduka yose y'amasezerano canke ivyiza
  - Abakoresha Bitcoin bose bategerezwa kwemeranya ku vyerekeye ukuri kw'ibikorwa biciye mu nzira y'amatora ya demokarasi kugira ngo urubuga rugume rudahungabana
explanation: |
  Igereranyo ry’uguhuza rya David Harding rishimika ku vy’uko inkomezi za Bitcoin zikomoka ku bihumbi vy’ibihimba vy’umubiri vyuzuye vyigenga, kimwe cose gikora ukwaco kugira ngo kigenzure amafaranga, kigatuma haba amasezerano y’uguhuza ku bijanye n’ingene igitabu c’amahera kimeze ata n’umwe akoresha ibihimba akeneye kwizigira abandi. Ivyo bigereranywa n’umugwi w’abaririmvyi aho umwe wese muri bo aririmba yigenga mugabo akazana uguhuza neza bari kumwe. Inyishu zitari zo zisobanura nabi ico ciyumviro mu gutanga iciyumviro c’ibisabwa vyo guhuza ibikorwa hagati y’abacukuzi, abategura canke abakoresha, ivyo bikaba bivuguruza ingingo ngenderwako y’ishimikiro y’ukugenzura kwigenga ituma Bitcoin idashobora kwizigirwa kandi ikaba yegerejwe.
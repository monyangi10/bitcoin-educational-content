question: مفهوم هارمونی Bitcoin، همان‌طور که از طریق قیاس دیوید هاردینگ توصیف شده است، عمدتاً بر چه چیزی درباره عملکرد شبکه تأکید دارد؟
answer: هزاران نود کامل به‌طور مستقل تراکنش‌ها را تأیید می‌کنند تا به توافق هماهنگ برسند بدون اینکه نیازی به اعتماد بین اپراتورها باشد.
wrong_answers:
  - استخرهای Mining باید تلاش‌های خود را هماهنگ کنند تا همان آهنگ را بخوانند و بلوک‌ها را در هماهنگی همزمان تولید کنند.
  - توسعه‌دهندگان Bitcoin باید قبل از اجرای هرگونه تغییر یا ارتقاء پروتکل به اجماع کامل برسند.
  - همه کاربران Bitcoin باید از طریق یک فرآیند رأی‌گیری دموکراتیک بر اعتبار تراکنش توافق کنند تا پایداری شبکه حفظ شود.
explanation: |
  تشبیه هارمونی دیوید هاردینگ تأکید می‌کند که قدرت Bitcoin از هزاران نود کامل مستقل ناشی می‌شود که هر کدام به‌طور جداگانه برای تأیید تراکنش‌ها کار می‌کنند و توافق هماهنگی درباره وضعیت دفتر کل ایجاد می‌کنند بدون اینکه هیچ اپراتور نودی نیاز به اعتماد به دیگران داشته باشد. این به یک گروه کر تشبیه شده است که هر عضو به‌طور مستقل می‌خواند اما با هم هارمونی زیبایی تولید می‌کنند. پاسخ‌های نادرست این مفهوم را با پیشنهاد نیاز به هماهنگی بین ماینرها، توسعه‌دهندگان یا کاربران اشتباه تفسیر می‌کنند، که با اصل اساسی تأیید مستقل که Bitcoin را بدون نیاز به اعتماد و غیرمتمرکز می‌سازد، در تضاد است.
reviewed: false

question: 透過 David Harding 的比喻所描述的 Bitcoin 和諧概念，主要強調網路運作的什麼？
answer: 數以千計的完整節點可獨立驗證交易，達成和諧協議，無需操作者之間的信任
wrong_answers:
  - Mining 池必須協調彼此的努力，唱同一首歌，以同步和諧的方式產生區塊
  - 在實施任何通訊協定變更或升級之前，Bitcoin 開發人員需要達成一致共識
  - 所有 Bitcoin 使用者必須透過民主投票程序同意交易的有效性，以維持網路的穩定性
explanation: |
  David Harding 的和諧比喻強調，Bitcoin 的優勢來自數以千計的獨立完整節點，每個節點都各自驗證交易，在不需要信任其他節點操作者的情況下，創造出和諧共識的帳本狀態。這被比喻為合唱團，每個成員獨立演唱，但卻能共同創造出美妙的和聲。錯誤的答案曲解了這個概念，暗示了礦工、開發者或使用者之間的協調要求，這與獨立驗證的基本原則相矛盾，而獨立驗證的原則使得 Bitcoin 無需信賴和去中心化。
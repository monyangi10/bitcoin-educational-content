question: Co koncept harmonie Bitcoin, popsaný prostřednictvím analogie Davida Hardinga, především zdůrazňuje o fungování sítě?
answer: Tisíce plnohodnotných uzlů nezávisle ověřují transakce, aby bylo dosaženo harmonické dohody bez nutnosti důvěry mezi operátory
wrong_answers:
  - Skupiny Mining musí koordinovat své úsilí, aby zpívaly stejnou píseň a vytvářely bloky v synchronizované harmonii
  - Vývojáři Bitcoin musí dosáhnout jednomyslného konsensu před zavedením jakýchkoli změn nebo aktualizací protokolu
  - Všichni uživatelé Bitcoin musí souhlasit s platností transakcí prostřednictvím demokratického hlasování, aby byla zachována stabilita sítě
explanation: |
  David Harding v analogii s harmonií zdůrazňuje, že síla Bitcoin vychází z tisíců nezávislých plnohodnotných uzlů, z nichž každý pracuje samostatně na ověřování transakcí, a vytváří tak harmonickou dohodu o stavu účetní knihy, aniž by kterýkoli provozovatel uzlu musel důvěřovat ostatním. To přirovnává ke sboru, kde každý člen zpívá samostatně, ale společně vytváří krásnou harmonii. Špatné odpovědi tento koncept dezinterpretují tím, že naznačují požadavky na koordinaci mezi těžaři, vývojáři nebo uživateli, což je v rozporu se základním principem nezávislého ověřování, díky němuž je Bitcoin nedůvěryhodný a decentralizovaný.
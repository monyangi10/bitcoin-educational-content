question: Mida rõhutab Bitcoin harmoonia kontseptsioon, mida David Hardingi analoogia kaudu kirjeldatakse, eelkõige võrgu toimimise kohta?
answer: Tuhanded täielikud sõlmed kontrollivad iseseisvalt tehinguid, et saavutada harmooniline kokkulepe ilma operaatorite vahelise usalduse vajaduseta
wrong_answers:
  - Mining poolid peavad kooskõlastama oma jõupingutused, et laulda sama laulu ja toota plokke sünkroonselt
  - Bitcoin arendajad peavad jõudma üksmeelele enne protokolli muudatuste või uuenduste rakendamist
  - Kõik Bitcoin kasutajad peavad võrgu stabiilsuse säilitamiseks nõustuma tehingu kehtivusega demokraatliku hääletamise teel
explanation: |
  David Hardingi harmoonia analoogia rõhutab, et Bitcoin tugevus tuleneb tuhandetest sõltumatutest täisnoodidest, mis töötavad igaüks eraldi tehingute kontrollimiseks, luues harmoonilise kokkuleppe pearaamatu seisu kohta, ilma et ükski sõlmeoperaator peaks teisi usaldama. Seda võrreldakse kooriga, kus iga liige laulab iseseisvalt, kuid loob üheskoos ilusa harmoonia. Valed vastused tõlgendavad seda kontseptsiooni valesti, viidates kaevurite, arendajate või kasutajate vahelistele kooskõlastusnõuetele, mis on vastuolus sõltumatu kontrollimise aluspõhimõttega, mis muudab Bitcoin usaldusteta ja detsentraliseerituks.
reviewed: false

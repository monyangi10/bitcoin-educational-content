question: Je, dhana ya upatanifu wa Bitcoin, kama inavyofafanuliwa kupitia mlinganisho wa David Harding, inasisitiza nini hasa kuhusu utendakazi wa mtandao?
answer: Maelfu ya nodi kamili huthibitisha shughuli kwa uhuru ili kufikia makubaliano yenye usawa bila kuhitaji uaminifu kati ya waendeshaji.
wrong_answers:
  - Mabwawa ya Mining lazima yaratibu juhudi zao za kuimba wimbo sawa na kutoa vizuizi kwa upatanishi uliosawazishwa.
  - Wasanidi wa Bitcoin wanahitaji kufikia makubaliano kwa pamoja kabla ya kutekeleza mabadiliko yoyote ya itifaki au uboreshaji
  - Watumiaji wote wa Bitcoin lazima wakubaliane kuhusu uhalali wa ununuzi kupitia mchakato wa kidemokrasia wa kupiga kura ili kudumisha uthabiti wa mtandao
explanation: |
  Ulinganifu wa maelewano wa David Harding unasisitiza kuwa nguvu za Bitcoin hutoka kwa maelfu ya nodi kamili zinazojitegemea kila moja ikifanya kazi kivyake ili kuthibitisha miamala, na kuunda makubaliano ya usawa kuhusu hali ya leja bila mwendeshaji wa nodi yoyote kuhitaji kuamini wengine. Hii inalinganishwa na kwaya ambapo kila mshiriki huimba kivyake lakini hutokeza maelewano mazuri pamoja. Majibu yasiyo sahihi yanatafsiri vibaya dhana hii kwa kupendekeza mahitaji ya uratibu kati ya wachimbaji, watengenezaji, au watumiaji, jambo ambalo linakinzana na kanuni ya msingi ya uthibitishaji huru unaofanya Bitcoin kutokuwa na imani na kugawanywa.

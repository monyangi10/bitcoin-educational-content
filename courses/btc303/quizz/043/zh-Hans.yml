question: 通过 David Harding 的比喻，比特币和谐的概念主要强调了网络运行的哪些方面？
answer: 数千个全节点独立验证交易，无需运营者之间的信任即可达成和谐协议
wrong_answers:
  - 矿池必须协调努力，唱同一首歌，同步和谐地生成区块
  - 在实施任何协议变更或升级之前，比特币开发者需要达成一致共识
  - 所有比特币用户必须通过民主投票程序就交易有效性达成一致，以保持网络稳定性
explanation: |
  David Harding 的和谐比喻强调，比特币的力量来自于成千上万个独立的全节点，每个节点都在单独验证交易，从而就分类账状态达成和谐协议，而无需任何节点运行者信任他人。这就好比一个合唱团，每个成员都独立演唱，但却能共同奏出美妙的和声。错误答案曲解了这一概念，表示矿工、开发者或用户之间需要协调，这与独立验证的基本原则相矛盾，而独立验证正是比特币无信任和去中心化的关键。

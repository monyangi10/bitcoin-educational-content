question: 通过戴维-哈丁的比喻，Bitcoin 和谐的概念主要强调了网络运行的哪些方面？
answer: 数千个全节点独立验证交易，无需运营商之间的信任即可达成和谐协议
wrong_answers:
  - Mining池必须协调努力，唱同一首歌，同步和谐地生产区块
  - 在实施任何协议变更或升级之前，Bitcoin 开发人员需要达成一致共识
  - 所有 Bitcoin 用户必须通过民主投票程序就交易有效性达成一致，以保持网络稳定
explanation: |
  戴维-哈丁（David Harding）的和谐比喻强调，Bitcoin 的力量来自于成千上万个独立的完整节点，每个节点都在单独验证交易，从而就分类账状态达成和谐协议，而无需任何节点操作员信任他人。这就好比一个合唱团，每个成员都独立演唱，但却能共同奏出美妙的和声。错误答案曲解了这一概念，暗示矿工、开发者或用户之间需要协调，这与独立验证的基本原则相矛盾，而独立验证正是 Bitcoin 无信任和去中心化的原因。
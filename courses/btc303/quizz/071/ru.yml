question: Какова была основная критика, прозвучавшая в самом первом отклике на объявление Satoshi Накамото о выпуске документа Bitcoin в списке рассылки Cryptography?
answer: Оказалось, что предлагаемая система не может быть масштабирована до требуемых размеров
wrong_answers:
  - Используемые криптографические алгоритмы были недостаточно безопасны для финансовых приложений
  - Одноранговая архитектура делает систему уязвимой для сетевых атак
  - Механизм консенсуса потребует слишком много вычислительной энергии, чтобы быть практичным
explanation: |
  В первом же предложении первого электронного письма, полученного в ответ на объявление Satoshi о Bitcoin, было сказано: "Похоже, она не масштабируется до нужного размера" Это показывает, что проблемы масштабирования существовали с самых первых публичных обсуждений Bitcoin, еще до запуска сети. Другие варианты, хотя и являются потенциально обоснованными проблемами для криптовалютной системы, не были в центре внимания этого первоначального ответа, который сразу же определил масштабируемость как основную проблему предложения Satoshi.
question: ビットコインホワイトペーパーを発表したサトシ・ナカモトに対して、暗号メーリングリストに寄せられた最初のメールでの批判は何だったか？
answer: 提案されたシステムは、必要なサイズに拡張できないこと
wrong_answers:
  - 使用された暗号アルゴリズムは、金融用途には十分な安全性を備えていないこと
  - ピアツーピア（P2P）のアーキテクチャは、システムをネットワーク攻撃に対して脆弱にすること
  - コンセンサス・メカニズムは、実用的でないほど多くの計算エネルギーを消費すること
explanation: |
  サトシのビットコインホワイトペーパー発表に対する最初の電子メール返信の最初の一文には、『必要なサイズにスケールしないようだ』と具体的に書かれている。これは、ビットコイン初期の公開ディスカッションから、ネットワークがローンチする前から、スケーリングの懸念が存在していたことを示している。他の選択肢は、暗号通貨システムにとって潜在的に有効な懸念ではあるが、サトシの提案の主要な問題点であるスケーラビリティを即座に特定したその最初の反応の焦点ではなかった。
reviewed: false

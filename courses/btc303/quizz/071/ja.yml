question: Bitcoinホワイトペーパーを発表したSatoshiナカモトに対して、暗号メーリングリストに寄せられた最初のメールでの批判は何だったのだろうか？
answer: 提案されたシステムは、必要なサイズに拡張できなかったようだ。
wrong_answers:
  - 使用された暗号アルゴリズムは、金融用途には十分な安全性を備えていなかった。
  - ピアツーピアのアーキテクチャーは、システムをネットワーク攻撃に対して脆弱にする。
  - コンセンサス・メカニズムは、実用的でないほど多くの計算エネルギーを消費する。
explanation: |
  SatoshiのBitcoinホワイトペーパーの発表に対する最初の電子メールの返信の最初の一文には、『必要なサイズにスケールしないようだ』と具体的に書かれている。これは、Bitcoinの初期の公開ディスカッションから、ネットワークがローンチする前から、スケーリングの懸念が存在していたことを示している。他の選択肢は、暗号通貨システムにとって潜在的に有効な懸念ではあるが、Satoshiの提案の主要な問題点であるスケーラビリティを即座に特定したその最初の反応の焦点ではなかった。
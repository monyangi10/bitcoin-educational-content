question: اولین انتقادی که در پاسخ ایمیل به اعلامیه ناکاموتو درباره وایت‌پیپر Bitcoin در لیست پستی رمزنگاری مطرح شد، چه بود؟
answer: سیستم پیشنهادی به نظر نمی‌رسید که به اندازه مورد نیاز مقیاس‌پذیر باشد.
wrong_answers:
  - الگوریتم‌های رمزنگاری استفاده‌شده به اندازه کافی برای برنامه‌های مالی امن نبودند.
  - معماری همتا به همتا سیستم را در برابر حملات شبکه آسیب‌پذیر می‌کند
  - مکانیزم اجماع انرژی محاسباتی زیادی مصرف می‌کند تا عملی باشد.
explanation: |
  اولین جمله از اولین پاسخ ایمیل به اعلامیه وایت‌پیپر Bitcoin توسط Satoshi به‌طور خاص بیان کرد 'به نظر نمی‌رسد که به اندازه مورد نیاز مقیاس‌پذیر باشد.' این نشان می‌دهد که نگرانی‌های مربوط به مقیاس‌پذیری از اولین بحث‌های عمومی Bitcoin وجود داشته است، حتی قبل از راه‌اندازی شبکه. گزینه‌های دیگر، در حالی که ممکن است نگرانی‌های معتبری برای یک سیستم ارز دیجیتال باشند، تمرکز آن پاسخ اولیه نبودند، که بلافاصله مقیاس‌پذیری را به عنوان مسئله اصلی با پیشنهاد Satoshi شناسایی کرد.
reviewed: false

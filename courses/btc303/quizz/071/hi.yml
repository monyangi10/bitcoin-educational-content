question: क्रिप्टोग्राफी मेलिंग सूची पर Satoshi नाकामोटो की Bitcoin श्वेतपत्र की घोषणा के पहले ईमेल प्रतिक्रिया में उठाई गई प्राथमिक आलोचना क्या थी?
answer: प्रस्तावित प्रणाली अपेक्षित आकार के अनुरूप नहीं प्रतीत हुई
wrong_answers:
  - उपयोग किए गए क्रिप्टोग्राफ़िक एल्गोरिदम वित्तीय अनुप्रयोगों के लिए पर्याप्त रूप से सुरक्षित नहीं थे
  - पीयर-टू-पीयर आर्किटेक्चर सिस्टम को नेटवर्क हमलों के प्रति संवेदनशील बना देगा
  - आम सहमति तंत्र व्यावहारिक होने के लिए बहुत अधिक कम्प्यूटेशनल ऊर्जा की खपत करेगा
explanation: |
  Satoshi के Bitcoin श्वेतपत्र की घोषणा पर पहली ईमेल प्रतिक्रिया के पहले ही वाक्य में स्पष्ट रूप से कहा गया था, "ऐसा लगता है कि यह आवश्यक आकार के अनुरूप नहीं है।" इससे पता चलता है कि Bitcoin की शुरुआती सार्वजनिक चर्चाओं से ही, नेटवर्क के लॉन्च होने से पहले ही, स्केलिंग संबंधी चिंताएँ मौजूद थीं। अन्य विकल्प, हालाँकि क्रिप्टोकरेंसी सिस्टम के लिए संभावित रूप से वैध चिंताएँ थीं, उस प्रारंभिक प्रतिक्रिया का केंद्र बिंदु नहीं थे, जिसने तुरंत ही स्केलेबिलिटी को Satoshi के प्रस्ताव के साथ प्राथमिक मुद्दे के रूप में पहचान लिया।
question: 中本聪在密码学邮件列表上公布比特币白皮书后，第一封回复邮件提出的主要批评是什么？
answer: 所提议的系统似乎无法达到所需的规模
wrong_answers:
  - 所使用的加密算法对于金融应用来说不够安全
  - 点对点结构会使系统容易受到网络攻击
  - 共识机制会消耗过多的计算能量，不切实际
explanation: |
  针对中本聪的比特币白皮书公告的第一封邮件回复的第一句话就明确指出 "它似乎无法扩展到所需的规模"。这表明，从比特币最早的公开讨论开始，甚至在网络启动之前，就存在着扩展问题。其他选项虽然有可能成为加密货币系统的合理顾虑，但并不是最初回复的重点，因为最初回复立即指出可扩展性是中本聪提议的主要问题。

question: Satoshi 나카모토가 크립토그래피 메일링 리스트에 Bitcoin 백서를 발표했을 때 첫 번째 이메일 답변에서 제기된 주요 비판은 무엇인가요?
answer: 제안된 시스템이 필요한 크기로 확장되지 않는 것 같았습니다
wrong_answers:
  - 사용된 암호화 알고리즘은 금융 애플리케이션에 충분히 안전하지 않았습니다
  - 피어 투 피어 아키텍처는 시스템을 네트워크 공격에 취약하게 만들 수 있습니다
  - 합의 메커니즘은 너무 많은 계산 에너지를 소비하여 실용적이지 않습니다
explanation: |
  Satoshi의 Bitcoin 백서 발표에 대한 첫 번째 이메일 답변의 첫 문장은 '필요한 규모로 확장되지 않을 것 같다'고 구체적으로 언급했습니다 이는 네트워크가 출시되기 전인 Bitcoin의 초기 공개 토론에서부터 확장에 대한 우려가 존재했음을 보여줍니다. 다른 옵션들은 암호화폐 시스템에 대해 잠재적으로 타당한 우려가 될 수 있지만, 확장성을 Satoshi의 제안의 주요 문제로 즉시 파악한 초기 대응의 초점은 아니었습니다.
reviewed: false

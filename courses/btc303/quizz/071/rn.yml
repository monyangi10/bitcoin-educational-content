question: Ni igiki ca mbere cavuzwe mu nyishu ya mbere y’iposita ku bijanye n’itangazo rya Satoshi Nakamoto ry’igitabu cera ca Bitcoin kiri ku rutonde rw’abarungika ubutumwa rwa Cryptography?
answer: Uburyo bwashikirijwe ntibwabonetse ko bugera ku bunini busabwa
wrong_answers:
  - Ubuhinga bwo gukingira amakuru bwakoreshejwe ntibwari butekanye bihagije ku bikorwa vy'ivy'amahera
  - Ubwubatsi bw'urunganwe bwotuma iyo sisitemu ishobora guterwa n'ibitero vy'urubuga
  - Uburyo bwo kwumvikana bwokoresha inguvu nyinshi cane kugira ngo bube ngirakamaro
explanation: |
  Invugo ya mbere y'inyishu ya mbere y'iposita ku itangazo ry'igitabu cera ca Satoshi ca Bitcoin yavuze mu buryo bwihariye ko 'bisa n'ibidashika ku rugero rukenewe.' Ivyo vyerekana ko ivyiyumviro vyo gutera imbere vyariho kuva mu biganiro vya mbere vya Bitcoin, mbere n’imbere y’uko iyo nzira itanguzwa. Ibindi bihitamwo, naho bishobora kuba ari ivyiyumviro vy’ukuri ku bijanye n’uburyo bw’amahera y’ibanga, ntivyari ikintu nyamukuru c’iyo nyishu ya mbere, yaciye igaragaza ko ubushobozi bwo gutera imbere ari co kibazo nyamukuru kiri mu ciyumviro ca Satoshi.
reviewed: false

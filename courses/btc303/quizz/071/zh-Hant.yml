question: Satoshi Nakamoto 在 Cryptography 郵件列表上公佈 Bitcoin 白皮書時，第一封回應的電子郵件中提出的主要批評是什麼？
answer: 建議的系統似乎無法擴充至所需的規模
wrong_answers:
  - 所使用的密碼演算法對於金融應用程式而言，安全性不足
  - 對等架構將使系統容易受到網路攻擊
  - 共識機制將會消耗過多的計算能量，因此不切實際
explanation: |
  對 Satoshi 的 Bitcoin 白皮書公告的第一封電子郵件回應的第一句話就特別指出「它似乎無法擴充到所需的規模。這顯示 Bitcoin 最早的公開討論，甚至在網路推出之前，就已經存在擴充的疑慮。其他選項儘管對加密貨幣系統而言可能是有效的疑慮，但卻不是最初回應的重點，該回應立即將擴充性視為 Satoshi 提案的主要問題。
reviewed: false

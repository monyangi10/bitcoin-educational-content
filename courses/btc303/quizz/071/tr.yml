question: Satoshi Nakamoto'nun Kriptografi e-posta listesinde Bitcoin teknik incelemesini duyurmasına verilen ilk e-posta yanıtında dile getirilen temel eleştiri neydi?
answer: Önerilen sistem gerekli boyuta göre ölçeklendirilmiş görünmüyordu
wrong_answers:
  - Kullanılan kriptografik algoritmalar finansal uygulamalar için yeterince güvenli değildi
  - Eşler arası mimari, sistemi ağ saldırılarına karşı savunmasız hale getirecektir
  - Mutabakat mekanizması pratik olamayacak kadar fazla hesaplama enerjisi tüketecektir
explanation: |
  Satoshi'ün Bitcoin whitepaper duyurusuna verilen ilk e-posta yanıtının ilk cümlesi özellikle 'gerekli boyuta ölçeklenemiyor gibi görünüyor' şeklindeydi Bu, ölçeklendirme endişelerinin Bitcoin'nin en erken kamuya açık tartışmalarından itibaren, hatta ağ başlatılmadan önce bile var olduğunu göstermektedir. Diğer seçenekler, bir kripto para sistemi için potansiyel olarak geçerli endişeler olsa da, ölçeklenebilirliği Satoshi'ün teklifiyle ilgili birincil sorun olarak hemen tanımlayan bu ilk yanıtın odak noktası değildi.
reviewed: false

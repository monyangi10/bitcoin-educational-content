question: Quelle a été la principale critique formulée dans le tout premier courriel de réponse à l'annonce par Satoshi Nakamoto du livre blanc Bitcoin sur la liste de diffusion Cryptography ?
answer: Le système proposé ne semble pas pouvoir être adapté à la taille requise
wrong_answers:
  - Les algorithmes cryptographiques utilisés n'étaient pas suffisamment sûrs pour les applications financières
  - L'architecture peer-to-peer rendrait le système vulnérable aux attaques du réseau
  - Le mécanisme de consensus consommerait trop d'énergie de calcul pour être pratique
explanation: |
  La toute première phrase du premier courriel de réponse à l'annonce du livre blanc Bitcoin de Satoshi indiquait spécifiquement "il ne semble pas s'adapter à la taille requise" Cela montre que les problèmes de mise à l'échelle existaient dès les premières discussions publiques sur Bitcoin, avant même le lancement du réseau. Les autres options, bien que potentiellement valables pour un système de crypto-monnaie, n'étaient pas au centre de cette première réponse, qui identifiait immédiatement l'évolutivité comme le principal problème de la proposition de Satoshi.
reviewed: false

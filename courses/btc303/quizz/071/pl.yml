question: Jaki był główny zarzut podniesiony w pierwszej e-mailowej odpowiedzi na ogłoszenie Satoshi Nakamoto o białej księdze Bitcoin na liście mailingowej Cryptography?
answer: Proponowany system nie wydaje się skalować do wymaganego rozmiaru
wrong_answers:
  - Zastosowane algorytmy kryptograficzne nie były wystarczająco bezpieczne dla aplikacji finansowych
  - Architektura peer-to-peer sprawia, że system jest podatny na ataki sieciowe
  - Mechanizm konsensusu zużywałby zbyt dużo energii obliczeniowej, aby był praktyczny
explanation: |
  Już w pierwszym zdaniu pierwszej odpowiedzi e-mail na Satoshi Bitcoin Whitepaper ogłoszono, że "nie wydaje się, aby skalował się do wymaganego rozmiaru" Pokazuje to, że obawy dotyczące skalowania istniały od najwcześniejszych publicznych dyskusji Bitcoin, jeszcze przed uruchomieniem sieci. Inne opcje, choć potencjalnie ważne dla systemu kryptowalut, nie były przedmiotem zainteresowania tej początkowej odpowiedzi, która natychmiast zidentyfikowała skalowalność jako główny problem związany z propozycją Satoshi.
reviewed: false

question: Lời chỉ trích chính được nêu ra trong email phản hồi đầu tiên về thông báo của Satoshi Nakamoto về sách trắng Bitcoin trên danh sách gửi thư về Mật mã là gì?
answer: Hệ thống được đề xuất dường như không mở rộng được đến kích thước cần thiết
wrong_answers:
  - Các thuật toán mật mã được sử dụng không đủ an toàn cho các ứng dụng tài chính
  - Kiến trúc ngang hàng sẽ khiến hệ thống dễ bị tấn công mạng
  - Cơ chế đồng thuận sẽ tiêu tốn quá nhiều năng lượng tính toán để có thể thực hiện được
explanation: |
  Câu đầu tiên trong email phản hồi đầu tiên cho thông báo sách trắng Bitcoin của Satoshi đã nêu rõ "dường như nó không thể mở rộng đến quy mô cần thiết". Điều này cho thấy những lo ngại về khả năng mở rộng đã tồn tại ngay từ những thảo luận công khai đầu tiên của Bitcoin, thậm chí trước khi mạng lưới ra mắt. Các lựa chọn khác, mặc dù có thể là những lo ngại chính đáng đối với một hệ thống tiền điện tử, nhưng không phải là trọng tâm của phản hồi ban đầu đó, mà ngay lập tức xác định khả năng mở rộng là vấn đề chính trong đề xuất của Satoshi.
reviewed: false

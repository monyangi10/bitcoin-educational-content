question: Ni ukosoaji gani wa kimsingi uliotolewa katika jibu la kwanza kabisa la barua pepe kwa tangazo la Satoshi Nakamoto la karatasi nyeupe ya Bitcoin kwenye orodha ya barua pepe ya Cryptography?
answer: Mfumo uliopendekezwa haukuonekana kufikia ukubwa unaohitajika
wrong_answers:
  - Algoriti za kriptografia zilizotumika hazikuwa salama vya kutosha kwa matumizi ya kifedha
  - Usanifu wa rika-kwa-rika utafanya mfumo kuwa hatarini kwa mashambulizi ya mtandao
  - Utaratibu wa maafikiano ungetumia nishati nyingi sana ya hesabu kuwa ya vitendo
explanation: |
  Sentensi ya kwanza kabisa ya jibu la kwanza la barua pepe kwa tangazo la karatasi nyeupe la Satoshi la Bitcoin lilisema haswa 'haionekani kufikia ukubwa unaohitajika.' Hii inaonyesha kuwa wasiwasi wa kuongeza ulikuwepo kutoka kwa mijadala ya kwanza ya umma ya Bitcoin, hata kabla ya mtandao kuzinduliwa. Chaguzi zingine, ingawa huenda zikawa ni maswala halali kwa mfumo wa cryptocurrency, hazikuwa lengo la jibu hilo la awali, ambalo lilibainisha mara moja upunguzaji kama suala la msingi na pendekezo la Satoshi.
reviewed: false

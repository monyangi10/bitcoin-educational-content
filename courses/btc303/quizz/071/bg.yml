question: Каква беше основната критика, повдигната в първия имейл отговор на съобщението на Satoshi Nakamoto за бялата книга Bitcoin в пощенския списък Cryptography?
answer: Предложената система не изглежда да се мащабира до необходимия размер
wrong_answers:
  - Използваните криптографски алгоритми не са достатъчно сигурни за финансови приложения
  - Архитектурата peer-to-peer би направила системата уязвима за мрежови атаки
  - Механизмът за консенсус би изразходвал твърде много изчислителна енергия, за да бъде практичен
explanation: |
  Още в първото изречение на първия имейл отговор на съобщението за Bitcoin на Satoshi се казваше, че "изглежда, че не може да се мащабира до необходимия размер" Това показва, че опасенията за мащабиране са съществували още от първите публични обсъждания на Bitcoin, дори преди стартирането на мрежата. Другите варианти, макар и потенциално основателни опасения за една криптовалутна система, не бяха във фокуса на този първоначален отговор, който веднага определи мащабируемостта като основен проблем на предложението на Satoshi.
reviewed: false

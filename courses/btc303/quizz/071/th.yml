question: คำวิจารณ์หลักที่ถูกยกขึ้นในอีเมลตอบกลับครั้งแรกต่อการประกาศของ Satoshi Nakamoto เกี่ยวกับเอกสารไวท์เปเปอร์ Bitcoin ในรายชื่อผู้รับจดหมาย Cryptography คืออะไร?
answer: ระบบที่เสนอไม่ปรากฏว่าขยายขนาดได้ตามที่ต้องการ
wrong_answers:
  - อัลกอริธึมการเข้ารหัสที่ใช้ไม่ปลอดภัยเพียงพอสำหรับการใช้งานทางการเงิน
  - สถาปัตยกรรมแบบเพียร์ทูเพียร์จะทำให้ระบบมีความเสี่ยงต่อการโจมตีเครือข่าย
  - กลไกฉันทามติจะใช้พลังงานการคำนวณมากเกินไปจนไม่สามารถใช้งานได้จริง
explanation: |
  ประโยคแรกของการตอบกลับอีเมลครั้งแรกต่อการประกาศเอกสารไวท์เปเปอร์ของ Bitcoin โดย Satoshi ระบุไว้อย่างชัดเจนว่า 'มันดูเหมือนจะไม่สามารถขยายขนาดได้ตามที่ต้องการ' ซึ่งแสดงให้เห็นว่ามีความกังวลเกี่ยวกับการขยายขนาดตั้งแต่การสนทนาสาธารณะครั้งแรกของ Bitcoin แม้กระทั่งก่อนที่เครือข่ายจะเปิดตัว ตัวเลือกอื่น ๆ แม้ว่าอาจจะเป็นข้อกังวลที่ถูกต้องสำหรับระบบสกุลเงินดิจิทัล แต่ก็ไม่ใช่จุดสนใจของการตอบกลับครั้งแรกนั้น ซึ่งระบุปัญหาการขยายขนาดเป็นประเด็นหลักของข้อเสนอของ Satoshi ทันที
reviewed: false
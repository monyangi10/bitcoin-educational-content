question: Какъв е проблемният подход, използван от Satoshi при внедряването на твърдо разклонение, който разработчиците на Bitcoin никога не биха използвали днес?
answer: Скриване на нарушаващата промяна в коммит с подвеждащо описание, което не дава индикации за промени в правилата за консенсус
wrong_answers:
  - Внедряване на твърдо разклонение без предварително публично обявяване или комуникация с общността на Bitcoin
  - Комбиниране на множество твърди разклонения в едно издание без подходящо тестване или процеси на преглед от общността
  - Незабавно активиране на твърдо разклонение, без да се осигури достатъчно време на потребителите да обновят софтуера на възлите си
explanation: |
  Според анализа на Ерик Ломброзо проблематичният подход на Satoshi е бил прикриването на промяна, нарушаваща консенсуса, в коммит с подвеждащо описание, в което се споменава само "reverted makefile.unix wx-config version 0.3.6", без да се посочват нарушаващите промени. Тази практика на скриване на критични консенсусни промени в безобидно изглеждащи коммити би се считала за неприемлива според днешните стандарти, където прозрачността и ясната комуникация за консенсусните промени са основни принципи на разработката на Bitcoin.
reviewed: true

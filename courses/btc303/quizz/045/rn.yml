question: Ni ubuhe buryo bw’ingorane Satoshi yakoresheje igihe yashira mu ngiro fork ikomeye abahinguzi ba Bitcoin batazokwigera bakoresha muri iki gihe?
answer: Guhisha ihinduka ry'ugusenyuka mu masezerano n'insobanuro izimiza itatanga ikimenyetso c'ihinduka ry'itegeko ry'ubumwe
wrong_answers:
  - Gushira mu ngiro fork ikomeye ata n’itangazo ry’abantu bose canke umenyesha umuryango wa Bitcoin imbere y’igihe .
  - Gufatanya amaforogo menshi akomeye mu gusohora kumwe ata kigeragezo ciza canke uburyo bwo gusubiramwo abarundi
  - Gukoresha fork ikomeye ubwo nyene ata guha abakoresha umwanya uhagije wo guhindura porogarama yabo y'ibihimba .
explanation: |
  Dushingiye ku icegeranyo ca Eric Lombrozo, uburyo bwa Satoshi bwari ubw’ingorane bwari ubwo kwiyoberanya ihinduka ry’ugusenyura amasezerano mu bijanye n’ugusezerana n’insobanuro izimiza ivuga gusa ‘reverted makefile.unix wx-config version 0.3.6’ ata kimenyetso na kimwe c’ihinduka ry’ugusenyura. Uwo mugenzo wo guhisha amahinduka ahambaye y’amasezerano mu masezerano asa n’ataco amaze, wobonwa ko udashobora kwemerwa n’ingingo mfatirwako z’ubu, aho uguserukira abantu mu mucyo no gutangaza neza amahinduka y’amasezerano ari ingingo ngenderwako z’ishimikiro z’iterambere rya Bitcoin.
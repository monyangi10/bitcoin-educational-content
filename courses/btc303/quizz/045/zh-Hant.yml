question: Satoshi 在實作硬體 fork 時使用了什麼有問題的方法，而 Bitcoin 開發人員今天絕對不會使用？
answer: 將破壞性變更隱藏在具有誤導性描述的提交中，沒有指出共識規則的修改
wrong_answers:
  - 在未事先向 Bitcoin 社群公佈或溝通的情況下，硬性執行 fork
  - 在沒有適當測試或社群審查程序的情況下，將多個硬分叉合併為單一版本
  - 立即啟動硬體 fork，而沒有提供使用者足夠的時間來升級節點軟體
explanation: |
  根據 Eric Lombrozo 的分析，Satoshi 的問題在於將破壞共識的變更隱藏在提交中，並使用誤導性的描述，只提到「revoted makefile.unix wx-config version 0.3.6」，卻沒有任何破壞變更的說明。以現今的標準來看，這種將重要的共識修改隱藏在看起來無傷大雅的提交中的做法是不可接受的，因為在 Bitcoin 開發中，共識修改的透明度和明確溝通是基本原則。
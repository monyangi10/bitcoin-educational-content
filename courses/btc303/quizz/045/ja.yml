question: ビットコイン開発者が今日決して使わないようなハードフォークを実装する際、サトシはどのような問題に直面したのだろうか？
answer: コンセンサスルールの修正について、誤解を招くような記述をしたコミットの中に、ブレークチェンジを隠した
wrong_answers:
  - ハードフォークを、ビットコインコミュニティへの事前のアナウンスやコミュニケーションなしに実施する
  - 適切なテストやコミュニティ・レビューのプロセスを経ずに、複数のハードフォークを1つのリリースにまとめる
  - ユーザーがノード・ソフトウェアをアップグレードするための十分な時間を与えずに、ハードフォークを直ちにアクティブ化する
explanation: |
  Eric Lombrozoの分析によると、サトシの問題のあるやり方は、コンセンサスを破るような変更を、「makefile.unix wx-config version 0.3.6を差し戻した」というような誤解を招くような説明だけで、その変更点を示すことなくコミットで隠していた。重要な合意事項の変更を無害に見えるコミットで隠すというこのやり方は、合意事項の変更に関する透明性と明確なコミュニケーションがビットコイン開発の基本原則である今日の基準では、容認できないと考えられる。
reviewed: false

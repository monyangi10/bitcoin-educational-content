question: Cách tiếp cận có vấn đề mà Satoshi đã sử dụng khi triển khai fork khó mà các nhà phát triển Bitcoin sẽ không bao giờ sử dụng ngày nay là gì?
answer: Ẩn thay đổi đột ngột trong một cam kết bằng mô tả gây hiểu lầm không đưa ra dấu hiệu về sửa đổi quy tắc đồng thuận
wrong_answers:
  - Triển khai fork khó mà không có bất kỳ thông báo công khai hoặc thông báo nào cho cộng đồng Bitcoin trước đó
  - Kết hợp nhiều hard fork thành một bản phát hành duy nhất mà không có quy trình kiểm tra hoặc đánh giá cộng đồng phù hợp
  - Kích hoạt fork cứng ngay lập tức mà không cung cấp cho người dùng đủ thời gian để nâng cấp phần mềm nút của họ
explanation: |
  Theo phân tích của Eric Lombrozo, cách tiếp cận có vấn đề của Satoshi là che giấu một thay đổi phá vỡ sự đồng thuận trong một commit bằng một mô tả gây hiểu lầm, chỉ đề cập đến "đã hoàn nguyên makefile.unix wx-config phiên bản 0.3.6" mà không có bất kỳ dấu hiệu nào cho thấy những thay đổi này. Việc che giấu các sửa đổi đồng thuận quan trọng trong các commit trông có vẻ vô hại này sẽ bị coi là không thể chấp nhận được theo các tiêu chuẩn ngày nay, khi tính minh bạch và truyền đạt rõ ràng về các thay đổi đồng thuận là những nguyên tắc cơ bản của quá trình phát triển Bitcoin.

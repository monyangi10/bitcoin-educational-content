question: हार्ड fork को कार्यान्वित करते समय Satoshi ने कौन सा समस्याग्रस्त दृष्टिकोण अपनाया था, जिसे आज Bitcoin डेवलपर्स कभी भी उपयोग नहीं करेंगे?
answer: किसी प्रतिबद्धता में महत्वपूर्ण परिवर्तन को भ्रामक विवरण के साथ छिपाना, जिससे सर्वसम्मति नियम संशोधनों का कोई संकेत नहीं मिलता
wrong_answers:
  - Bitcoin समुदाय को पहले से कोई सार्वजनिक घोषणा या संचार किए बिना हार्ड fork को लागू करना
  - उचित परीक्षण या सामुदायिक समीक्षा प्रक्रियाओं के बिना एकाधिक हार्ड फोर्क्स को एक ही रिलीज़ में संयोजित करना
  - उपयोगकर्ताओं को अपने नोड सॉफ्टवेयर को अपग्रेड करने के लिए पर्याप्त समय दिए बिना हार्ड fork को तुरंत सक्रिय करना
explanation: |
  एरिक लोम्ब्रोज़ो के विश्लेषण के अनुसार, Satoshi का समस्यात्मक तरीका एक कमिट में आम सहमति तोड़ने वाले बदलाव को एक भ्रामक विवरण के साथ छिपाना था, जिसमें केवल 'reverted makefile.unix wx-config संस्करण 0.3.6' का उल्लेख था, बिना किसी बदलाव का संकेत दिए। महत्वपूर्ण आम सहमति संशोधनों को हानिरहित दिखने वाले कमिट में छिपाने की यह प्रथा आज के मानकों के अनुसार अस्वीकार्य मानी जाएगी, जहाँ आम सहमति परिवर्तनों के बारे में पारदर्शिता और स्पष्ट संचार Bitcoin विकास के मूलभूत सिद्धांत हैं।
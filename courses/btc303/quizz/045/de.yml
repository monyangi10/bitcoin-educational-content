question: Welchen problematischen Ansatz verfolgte Satoshi bei der Implementierung eines harten fork, den die Bitcoin-Entwickler heute niemals verwenden würden?
answer: Verstecken der bahnbrechenden Änderung in einem Commit mit einer irreführenden Beschreibung, die keinen Hinweis auf die Änderungen der Konsensregeln gab
wrong_answers:
  - Einführung des harten fork ohne vorherige öffentliche Ankündigung oder Mitteilung an die Bitcoin-Gemeinschaft
  - Zusammenfassen mehrerer Hard Forks zu einer einzigen Version ohne ordnungsgemäße Tests oder Überprüfung durch die Gemeinschaft
  - Sofortige Aktivierung des harten fork, ohne den Nutzern genügend Zeit zu geben, ihre Knotensoftware zu aktualisieren
explanation: |
  Nach Eric Lombrozos Analyse bestand der problematische Ansatz von Satoshi darin, eine konsensbrechende Änderung in einem Commit mit einer irreführenden Beschreibung zu verschleiern, die nur "reverted makefile.unix wx-config version 0.3.6" ohne jeden Hinweis auf die konsensbrechenden Änderungen erwähnte. Diese Praxis, kritische konsensbrechende Änderungen in harmlos aussehenden Commits zu verstecken, wäre nach heutigen Maßstäben inakzeptabel, da Transparenz und klare Kommunikation über konsensbrechende Änderungen grundlegende Prinzipien der Bitcoin Entwicklung sind.
question: Какой проблемный подход использовала Satoshi при реализации сложного fork, который разработчики Bitcoin никогда бы не использовали сегодня?
answer: Скрытие разрушающего изменения в коммите с вводящим в заблуждение описанием, которое не давало никаких указаний на изменения правил консенсуса
wrong_answers:
  - Внедрение жесткого fork без предварительного публичного объявления или сообщения сообществу Bitcoin
  - Объединение нескольких жестких форков в один релиз без надлежащего тестирования или процесса рецензирования сообществом
  - Немедленная активация жесткого fork без предоставления пользователям достаточного времени для обновления программного обеспечения узла
explanation: |
  Согласно анализу Эрика Ломброзо, проблемный подход Satoshi заключался в маскировке изменений, нарушающих консенсус, в коммите с вводящим в заблуждение описанием, в котором упоминалось только "reverted makefile.unix wx-config version 0.3.6" без какого-либо указания на разрушающие изменения. Такая практика сокрытия критических консенсусных изменений в безобидно выглядящих фиксах считалась бы неприемлемой по сегодняшним стандартам, где прозрачность и ясное сообщение о консенсусных изменениях являются фундаментальными принципами разработки Bitcoin.
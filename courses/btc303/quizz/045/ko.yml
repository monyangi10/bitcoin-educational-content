question: Satoshi이 오늘날 Bitcoin 개발자는 절대 사용하지 않을 하드 fork를 구현할 때 사용한 문제적 접근 방식은 무엇이었나요?
answer: 합의 규칙 수정에 대한 표시가 없는 오해의 소지가 있는 설명으로 커밋의 획기적인 변경 사항을 숨기는 행위
wrong_answers:
  - 사전에 Bitcoin 커뮤니티에 공개 발표나 커뮤니케이션 없이 어려운 fork를 구현하는 경우
  - 적절한 테스트나 커뮤니티 검토 프로세스 없이 여러 하드 포크를 단일 릴리스로 결합하는 행위
  - 사용자에게 노드 소프트웨어를 업그레이드할 충분한 시간을 제공하지 않고 하드 fork를 즉시 활성화합니다
explanation: |
  에릭 롬브로조의 분석에 따르면, Satoshi의 문제가 되는 접근 방식은 커밋에서 합의를 깨는 변경 사항을 아무런 표시 없이 'makefile.unix wx-config 버전 0.3.6을 되돌림'이라고만 언급하는 잘못된 설명으로 위장하는 것이었습니다. 무해해 보이는 커밋에 중요한 합의 변경 사항을 숨기는 이러한 관행은 합의 변경에 대한 투명성과 명확한 커뮤니케이션이 Bitcoin 개발의 기본 원칙인 오늘날의 기준에서는 용납할 수 없는 행위로 간주됩니다.

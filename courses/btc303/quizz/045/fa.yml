question: رویکرد مشکل‌ساز Satoshi چه بود زمانی که یک fork سخت را پیاده‌سازی کرد که توسعه‌دهندگان Bitcoin هرگز امروزه از آن استفاده نمی‌کنند؟
answer: پنهان کردن تغییرات شکسته در یک کامیت با توضیح گمراه‌کننده که هیچ نشانه‌ای از اصلاحات قوانین اجماع نمی‌داد
wrong_answers:
  - اجرای سخت fork بدون هیچ‌گونه اعلام عمومی یا ارتباط با جامعه Bitcoin از قبل
  - ترکیب چندین هارد فورک در یک نسخه واحد بدون آزمایش مناسب یا فرآیندهای بازبینی جامعه
  - فعال‌سازی فوری fork سخت بدون ارائه زمان کافی به کاربران برای ارتقاء نرم‌افزار نود خود
explanation: |
  بر اساس تحلیل اریک لومبروزو، رویکرد مشکل‌ساز Satoshi پنهان کردن تغییری که اجماع را می‌شکند در یک کامیت با توضیح گمراه‌کننده بود که تنها به 'reverted makefile.unix wx-config version 0.3.6' اشاره کرده بود، بدون هیچ نشانه‌ای از تغییرات شکستن اجماع. این روش پنهان کردن اصلاحات مهم اجماع در کامیت‌هایی که بی‌ضرر به نظر می‌رسند، با استانداردهای امروزی که شفافیت و ارتباط واضح درباره تغییرات اجماع اصول اساسی توسعه Bitcoin هستند، غیرقابل قبول تلقی می‌شود.
reviewed: false

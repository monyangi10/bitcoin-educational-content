question: แนวทางที่มีปัญหาที่ Satoshi ใช้เมื่อดำเนินการ fork ที่ยากซึ่งนักพัฒนา Bitcoin จะไม่ใช้ในปัจจุบันคืออะไร?
answer: ซ่อนการเปลี่ยนแปลงที่ทำลายในคอมมิตด้วยคำอธิบายที่ทำให้เข้าใจผิดซึ่งไม่ได้บ่งบอกถึงการแก้ไขกฎความเห็นพ้องต้องกัน
wrong_answers:
  - การดำเนินการ fork อย่างเข้มงวดโดยไม่มีการประกาศหรือสื่อสารต่อชุมชน Bitcoin ล่วงหน้า
  - การรวมฮาร์ดฟอร์คหลายๆ ครั้งเข้าด้วยกันในรุ่นเดียวโดยไม่มีการทดสอบหรือกระบวนการตรวจสอบจากชุมชนอย่างเหมาะสม
  - การเปิดใช้งาน fork อย่างรวดเร็วโดยไม่ให้เวลาผู้ใช้เพียงพอในการอัปเกรดซอฟต์แวร์โหนดของพวกเขา
explanation: |
  จากการวิเคราะห์ของ Eric Lombrozo วิธีการที่มีปัญหาของ Satoshi คือการปลอมแปลงการเปลี่ยนแปลงที่ทำลายฉันทามติในคอมมิตที่มีคำอธิบายที่ทำให้เข้าใจผิด โดยกล่าวถึงเพียง 'reverted makefile.unix wx-config version 0.3.6' โดยไม่มีการบ่งบอกถึงการเปลี่ยนแปลงที่ทำลายฉันทามติ การปฏิบัตินี้ในการซ่อนการแก้ไขฉันทามติที่สำคัญในคอมมิตที่ดูไม่มีพิษภัยจะถือว่าไม่เป็นที่ยอมรับตามมาตรฐานในปัจจุบัน ซึ่งความโปร่งใสและการสื่อสารที่ชัดเจนเกี่ยวกับการเปลี่ยนแปลงฉันทามติเป็นหลักการพื้นฐานของการพัฒนา Bitcoin
reviewed: false
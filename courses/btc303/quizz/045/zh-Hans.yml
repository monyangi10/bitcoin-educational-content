question: 中本聪在实现硬分叉时使用了什么有问题的方法，而比特币开发者今天绝不会使用这种方法？
answer: 在提交中隐藏破坏性修改，并使用误导性描述，没有说明共识规则的修改情况
wrong_answers:
  - 在未事先向比特币社区发布任何公告或进行任何沟通的情况下，实施硬分叉
  - 将多个硬分叉合并为一个版本，而不进行适当的测试或社区审查流程
  - 立即激活硬分叉，不给用户足够的时间升级节点软件
explanation: |
  根据 Eric Lombrozo 的分析，中本聪当时的问题做法是将破坏共识的更改隐藏在提交（commit）中，而提交说明只提到“reverted makefile.unix wx-config version 0.3.6”，完全没有说明涉及的共识性变动。这种将关键的共识修改隐藏在看似无害的提交中的做法，按照今天的标准是不可接受的，因为在比特币开发中，共识修改的透明度和清晰交流是基本原则。

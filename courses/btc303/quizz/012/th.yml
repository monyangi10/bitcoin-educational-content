question: ตามบทนี้ ข้อจำกัดหลักที่แม้แต่ full node ก็ไม่สามารถปกป้องคุณได้คืออะไร?
answer: การเขียนซ้ำของเชนที่อาจใช้จ่ายซ้ำธุรกรรมของคุณ
wrong_answers:
  - ซอฟต์แวร์ที่เป็นอันตรายขโมยคีย์ส่วนตัวของคุณจากหน่วยความจำ
  - "บล็อกที่ไม่ถูกต้องที่ไม่เป็นไปตามกฎฉันทามติของ Bitcoin"
  - ตารางการออกเหรียญที่ไม่ถูกต้องละเมิดโปรโตคอล
explanation: |
  แม้ว่า full node จะสามารถยืนยันได้ว่าบล็อกต่างๆ ปฏิบัติตามกฎของฉันทามติ ป้องกันการออกเหรียญที่ไม่ถูกต้อง และตรวจจับการละเมิดโปรโตคอล แต่ก็ไม่สามารถป้องกันการเขียนซ้ำของเชนที่นักขุดจัดระเบียบบล็อกเชนใหม่เพื่อใช้ธุรกรรมซ้ำซ้อน บทนี้ระบุไว้อย่างชัดเจนว่าไม่ว่าซอฟต์แวร์ของคุณจะก้าวหน้าเพียงใด คุณยังคงต้องเชื่อมั่นว่าบล็อกที่มีเหรียญของคุณจะไม่ถูกเขียนซ้ำ นี่คือเหตุผลที่กลไกการป้องกันของ Bitcoin อาศัยการรอการยืนยันหลายครั้งเพื่อลดความน่าจะเป็นของการเขียนซ้ำของเชนให้อยู่ในระดับที่ยอมรับได้
reviewed: false
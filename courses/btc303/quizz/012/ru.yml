question: Согласно главе, какое главное ограничение, от которого не может защитить даже full node?
answer: Переписывание цепочек, которое может привести к двойному расходованию ваших средств
wrong_answers:
  - Вредоносные программы крадут ваши закрытые ключи из памяти
  - "Недействительные блоки, которые не соответствуют правилам консенсуса Bitcoin"
  - Неправильные графики выдачи монет, нарушающие протокол
explanation: |
  Хотя full node может проверить соответствие блоков правилам консенсуса, предотвратить недействительную эмиссию монет и обнаружить нарушения протокола, он не может предотвратить переписывание цепи, когда майнеры реорганизуют блокчейн, чтобы дважды провести транзакции. В главе специально оговаривается, что независимо от того, насколько совершенным является ваше программное обеспечение, вы все равно должны верить, что блоки, содержащие ваши монеты, не будут переписаны. Именно поэтому защитный механизм Bitcoin основан на ожидании нескольких подтверждений, чтобы снизить вероятность перезаписи цепочки до приемлемого уровня.
reviewed: false

question: 根據本章所述，即使是 full node 也無法保護您的主要限制是什麼？
answer: 可能雙重花費您的交易的鏈重寫
wrong_answers:
  - 惡意軟體從記憶體竊取您的私人密碼匙
  - 「不遵循 Bitcoin 共識規則的無效區塊」
  - 違反協議的不正確硬幣發行時間表
explanation: |
  雖然 full node 可以驗證區塊是否遵循共識規則、防止無效的代幣發行，並偵測違反協定的情況，但它無法防止礦工重組區塊鏈以重複花費交易的重寫鏈。本章特別指出，無論您的軟體有多先進，您仍必須相信包含您的硬幣的區塊不會被改寫。這就是為什麼 Bitcoin 的防禦機制依賴於等待多次確認，將區塊鏈重寫的概率降低到可接受的程度。
question: अध्याय के अनुसार, वह मुख्य सीमा क्या है जिससे full node भी आपकी रक्षा नहीं कर सकता?
answer: चेन रीराइट्स जो आपके लेन-देन को दोगुना कर सकते हैं
wrong_answers:
  - दुर्भावनापूर्ण सॉफ़्टवेयर आपकी निजी कुंजियों को मेमोरी से चुरा रहा है
  - "अमान्य ब्लॉक जो Bitcoin के सर्वसम्मति नियमों का पालन नहीं करते हैं"
  - प्रोटोकॉल का उल्लंघन करते हुए गलत सिक्का जारी करने का कार्यक्रम
explanation: |
  हालाँकि full node यह सत्यापित कर सकता है कि ब्लॉक सर्वसम्मति नियमों का पालन करते हैं, अमान्य कॉइन जारी होने से रोकते हैं, और प्रोटोकॉल उल्लंघनों का पता लगाते हैं, लेकिन यह चेन रीराइट को नहीं रोक सकता जहाँ माइनर्स ब्लॉकचेन को दोहरे-खर्च वाले लेनदेन के लिए पुनर्गठित करते हैं। इस अध्याय में स्पष्ट रूप से कहा गया है कि आपका सॉफ़्टवेयर चाहे कितना भी उन्नत क्यों न हो, आपको यह विश्वास रखना चाहिए कि आपके कॉइन वाले ब्लॉक रीराइट नहीं होंगे। यही कारण है कि Bitcoin का सुरक्षा तंत्र चेन रीराइट की संभावना को स्वीकार्य स्तर तक कम करने के लिए कई पुष्टिकरणों की प्रतीक्षा करने पर निर्भर करता है।
reviewed: false

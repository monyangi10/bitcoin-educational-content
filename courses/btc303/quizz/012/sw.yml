question: Kulingana na sura hiyo, ni kizuizi gani kuu ambacho hata full node haiwezi kukukinga?
answer: Msururu huandika upya ambayo inaweza kutumia maradufu miamala yako
wrong_answers:
  - Programu hasidi inayoiba funguo zako za kibinafsi kutoka kwa kumbukumbu
  - "Vizuizi batili ambavyo havifuati sheria za makubaliano za Bitcoin"
  - Ratiba zisizo sahihi za utoaji wa sarafu zinazokiuka itifaki
explanation: |
  Ingawa full node inaweza kuthibitisha kuwa vizuizi vinafuata sheria za makubaliano, kuzuia utoaji wa sarafu batili, na kugundua ukiukaji wa itifaki, haiwezi kuzuia uandikaji upya wa mnyororo ambapo wachimbaji hupanga upya blockchain ili kutumia miamala maradufu. Sura hiyo inasema haswa kwamba haijalishi programu yako ni ya juu kiasi gani, lazima bado uamini kuwa vizuizi vilivyo na sarafu zako hazitaandikwa upya. Hii ndiyo sababu utaratibu wa ulinzi wa Bitcoin unategemea kusubiri uthibitisho mwingi ili kupunguza uwezekano wa kuandika upya kwa mnyororo hadi kiwango kinachokubalika.
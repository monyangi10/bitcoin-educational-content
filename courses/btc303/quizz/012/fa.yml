question: طبق فصل، محدودیت اصلی که حتی یک full node نمی‌تواند شما را از آن محافظت کند چیست؟
answer: بازنویسی زنجیره‌ای که می‌تواند تراکنش‌های شما را دوبار خرج کند
wrong_answers:
  - بدافزار در حال سرقت کلیدهای خصوصی شما از حافظه
  - "بلوک‌های نامعتبری که از قوانین اجماع Bitcoin پیروی نمی‌کنند"
  - برنامه‌های صدور سکه نادرست که پروتکل را نقض می‌کنند
explanation: |
  در حالی که full node می‌تواند تأیید کند که بلاک‌ها از قوانین اجماع پیروی می‌کنند، از صدور نامعتبر سکه جلوگیری کند و تخلفات پروتکل را شناسایی کند، نمی‌تواند از بازنویسی زنجیره جلوگیری کند، جایی که ماینرها بلاک‌چین را برای دوباره خرج کردن تراکنش‌ها سازماندهی می‌کنند. این فصل به‌طور خاص بیان می‌کند که مهم نیست نرم‌افزار شما چقدر پیشرفته است، شما همچنان باید اعتماد کنید که بلاک‌هایی که حاوی سکه‌های شما هستند بازنویسی نخواهند شد. به همین دلیل است که مکانیزم دفاعی Bitcoin بر انتظار برای تأییدیه‌های متعدد تکیه می‌کند تا احتمال بازنویسی زنجیره را به سطح قابل قبولی کاهش دهد.
reviewed: false

question: 根据这一章，即使是全节点也无法保护您的主要限制是什么？
answer: 区块链重写可能会重复花费您的交易
wrong_answers:
  - 从内存中窃取私人密钥的恶意软件
  - 不遵循比特币共识规则的无效区块
  - 违反协议的错误比特币发行时间表
explanation: |
  虽然全节点可以验证区块是否遵循共识规则、防止无效比特币的发行并检测违反协议的情况，但它无法防止矿工重组区块链以重复花费交易的重写链行为。该章特别指出，无论您的软件有多先进，您仍然必须相信包含您的比特币的区块不会被改写。这就是为什么比特币的防御机制依赖于等待多次确认，以将区块链重写的概率降低到可接受的水平。

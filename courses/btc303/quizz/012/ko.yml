question: 이 장에 따르면 full node으로도 보호할 수 없는 주요 제한 사항은 무엇인가요?
answer: 트랜잭션을 이중으로 소비할 수 있는 체인 재작성
wrong_answers:
  - 메모리에서 개인 키를 훔치는 악성 소프트웨어
  - "Bitcoin의 합의 규칙을 따르지 않는 유효하지 않은 블록"
  - 프로토콜을 위반하는 잘못된 코인 발행 일정
explanation: |
  full node는 블록이 합의 규칙을 따르는지 확인하고, 잘못된 코인 발행을 방지하며, 프로토콜 위반을 감지할 수 있지만, 채굴자가 블록체인을 재구성하여 거래를 이중으로 기록하는 체인 재작성을 방지할 수는 없습니다. 이 장에서는 특히 소프트웨어가 아무리 발전하더라도 코인이 포함된 블록이 재작성되지 않을 것이라고 믿어야 한다고 명시하고 있습니다. 그렇기 때문에 Bitcoin의 방어 메커니즘은 체인 재작성 확률을 허용 가능한 수준으로 낮추기 위해 여러 번의 확인을 기다리는 데 의존합니다.
question: Jaké je podle kapitoly hlavní omezení, před kterým vás neochrání ani full node?
answer: Přepisování řetězců, které by mohlo zdvojnásobit výdaje na transakce
wrong_answers:
  - Škodlivý software kradoucí vaše soukromé klíče z paměti
  - "Neplatné bloky, které nedodržují pravidla konsensu Bitcoin"
  - Nesprávný harmonogram emise mincí porušující protokol
explanation: |
  Ačkoli full node může ověřit, zda bloky dodržují pravidla konsensu, zabránit vydávání neplatných mincí a odhalit porušení protokolu, nemůže zabránit přepisování řetězce, kdy těžaři reorganizují blockchain za účelem dvojího utrácení transakcí. Kapitola výslovně uvádí, že bez ohledu na to, jak pokročilý je váš software, musíte stále věřit, že bloky obsahující vaše mince nebudou přepsány. Proto se obranný mechanismus Bitcoin spoléhá na čekání na vícenásobné potvrzení, aby se pravděpodobnost přepsání řetězce snížila na přijatelnou úroveň.
reviewed: false

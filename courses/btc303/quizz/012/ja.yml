question: この章によると、full nodeでも守れない主な制限とは何か？
answer: トランザクションを二重に消費する可能性のあるチェーンの書き換え
wrong_answers:
  - 悪意のあるソフトウェアがメモリから秘密鍵を盗む
  - "Bitcoinのコンセンサスルールに従わない無効ブロック"
  - プロトコル違反の不正なコイン発行スケジュール
explanation: |
  full nodeは、ブロックがコンセンサスルールに従っていることを検証し、無効なコインの発行を防ぎ、プロトコル違反を検出することはできるが、マイナーたちがブロックチェーンを再編成して取引を二重に行うチェーンの書き換えを防ぐことはできない。この章では特に、ソフトウェアがいかに高度であっても、自分のコインを含むブロックが書き換えられないことを信頼しなければならないと述べている。これが、Bitcoinの防御メカニズムが、チェーン書き換えの確率を許容可能なレベルまで下げるために、複数の確認を待つことに依存している理由である。
reviewed: false

question: Според главата, кое е основното ограничение, от което дори пълен възел не може да ви защити?
answer: Презаписване на блокчейна, което може да доведе до двойно изразходване на транзакциите ви
wrong_answers:
  - Злонамерен софтуер, който краде частните ви ключове от паметта
  - Невалидни блокове, които не следват правилата за консенсус на Bitcoin
  - Неправилни графици за емитиране на монети в нарушение на протокола
explanation: |
  Въпреки че пълният възел може да провери дали блоковете следват правилата на консенсуса, да предотврати издаването на невалидни монети и да открие нарушения на протокола, той не може да предотврати пренаписването на блокчейна, при което миньорите го реорганизират, за да изразходват двойно транзакциите. В главата изрично се посочва, че независимо от това колко усъвършенстван е софтуерът ви, все пак трябва да се доверите, че блоковете, съдържащи вашите монети, няма да бъдат пренаписани. Ето защо защитният механизъм на Bitcoin разчита на изчакване на множество потвърждения, за да намали вероятността за презаписване на веригата до приемливо ниво.
reviewed: true

question: ในบริบทของ validationless mining ความเสี่ยงด้านความปลอดภัยหลักที่นักขุดเผชิญเมื่อพวกเขาเลื่อนการตรวจสอบบล็อกเต็มรูปแบบเพื่อหลีกเลี่ยงบล็อกที่ล้าสมัยคืออะไร?
answer: พวกเขาเสี่ยงที่จะสร้างบนบล็อกเชนที่ไม่ถูกต้องชั่วคราว เสียพลังการคำนวณบนเชนที่จะถูกปฏิเสธในที่สุด
wrong_answers:
  - พวกเขาเสี่ยงที่จะถูกปฏิเสธบล็อกของตนเองโดยเครือข่ายเนื่องจากการตรวจสอบความถูกต้องของธุรกรรมก่อนหน้านี้ไม่สมบูรณ์
  - พวกเขาเสี่ยงที่จะสูญเสียรางวัล mining อย่างถาวรเพราะ mining ที่ไม่มีการตรวจสอบถือเป็นการละเมิดโปรโตคอล
  - พวกเขาเสี่ยงต่อการสร้างการโจมตีแบบใช้จ่ายซ้ำสองครั้งเพราะไม่สามารถยืนยันได้ว่าธุรกรรมที่เข้ามานั้นถูกต้อง
explanation: |
  เมื่อคนขุดเหมืองฝึกฝนการตรวจสอบแบบไม่ใช้การตรวจสอบ mining พวกเขาจะตรวจสอบเฉพาะ proof-of-work ในส่วนหัวของบล็อกและเริ่มต้น mining ทันทีบนบล็อกนั้นในขณะที่ดาวน์โหลดและตรวจสอบบล็อกทั้งหมดไปพร้อมกัน ความเสี่ยงที่สำคัญคือพวกเขาอาจกำลังสร้างบนบล็อกที่ไม่ถูกต้อง ซึ่งหมายความว่าความพยายามในการคำนวณของพวกเขาถูกใช้ไปกับสาขาของบล็อกเชนที่จะถูกปฏิเสธเมื่อพบว่าบล็อกนั้นไม่ถูกต้อง สิ่งนี้บ่อนทำลายความปลอดภัยของเครือข่ายเพราะพลังของ mining ส่วนหนึ่งไม่ได้มีส่วนร่วมกับสายโซ่ที่แข็งแกร่งที่สุด ซึ่งเป็นกลไกความปลอดภัยพื้นฐานของ Bitcoin
reviewed: false
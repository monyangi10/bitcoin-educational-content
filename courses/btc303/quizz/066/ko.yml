question: 검증 없는 mining의 맥락에서, 채굴자가 오래된 블록을 피하기 위해 전체 블록 검증을 연기할 때 직면하는 주요 보안 위험은 무엇인가요?
answer: 일시적으로 유효하지 않은 블록체인을 구축하여 결국 거부될 체인에 연산 능력을 낭비할 위험이 있습니다
wrong_answers:
  - 이전 거래의 불완전한 검증으로 인해 네트워크에서 자체 블록이 거부될 위험이 있습니다
  - 무검증 mining은 프로토콜 위반으로 간주되므로 mining 보상을 영구적으로 상실할 위험이 있습니다
  - 들어오는 거래가 합법적인지 확인할 수 없기 때문에 이중 지출 공격이 발생할 위험이 있습니다
explanation: |
  채굴자가 무검증 mining를 수행할 때, 블록 헤더의 proof-of-work만 확인하고 그 위에 즉시 mining를 시작하면서 전체 블록을 다운로드하고 동시에 유효성을 검사합니다. 심각한 위험은 유효하지 않은 블록 위에 구축될 수 있다는 것인데, 이는 유효하지 않은 블록이 발견되면 거부될 블록체인 브랜치에 계산 노력이 낭비된다는 것을 의미합니다. 이는 mining 전력의 일부가 Bitcoin의 기본 보안 메커니즘인 가장 강력한 유효 체인에 기여하지 않기 때문에 네트워크 보안을 약화시킵니다.

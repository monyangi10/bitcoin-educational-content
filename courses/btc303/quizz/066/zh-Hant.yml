question: 在無驗證 mining 的背景下，當礦工為了避免陳舊區塊而延遲完整區塊驗證時，他們面臨的主要安全風險是什麼？
answer: 他們冒著暫時建立在無效區塊鏈上的風險，在一個最終會被拒絕的區塊鏈上浪費計算能力。
wrong_answers:
  - 由於之前的交易驗證不完整，他們可能會冒著自己的區塊被網路拒絕的風險。
  - 他們有可能永久失去 mining 獎勵，因為無效 mining 被視為違反協定
  - 由於無法驗證收到的交易是否合法，因此有可能造成雙重花費攻擊。
explanation: |
  當礦工執行無驗證 mining 時，他們只會檢查區塊標頭中的 proof-of-work，並立即在其上啟動 mining，同時並行下載和驗證整個區塊。關鍵的風險是他們可能會建立在無效區塊上，這意味著他們的計算努力會浪費在區塊鏈分支上，而一旦無效區塊被發現，這個分支就會被剔除。這會破壞網路安全性，因為 mining 的部分能量並未對最強的有效鏈做出貢獻，而這正是 Bitcoin 的基本安全機制。
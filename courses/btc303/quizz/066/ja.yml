question: バリデーションレスのマイニングの文脈において、マイナーがブロックの陳腐化を避けるために完全なブロックのバリデーションを延期した場合に直面する主なセキュリティリスクは何か？
answer: 一時的に無効なブロックチェーンを構築し、最終的に拒否されるチェーンに計算能力を浪費するリスクがある
wrong_answers:
  - 過去のトランザクションの検証が不完全なため、自分のブロックがネットワークに拒否されるリスクがある
  - マイニングの無効化はプロトコル違反とみなされるため、マイニング報酬を永久に失うリスクがある
  - 入ってくるトランザクションが正当なものであることを検証できないため、二重支払い攻撃を引き起こすリスクがある
explanation: |
  マイナーがバリデーションレスのマイニングを実践する場合、ブロックヘッダのプルーフ・オブ・ワーク（PoW） だけをチェックし、ブロック全体を並行してダウンロードしてバリデーションしながら、その上で直ちにマイニングを開始する。重大なリスクは、無効なブロックの上に構築される可能性があることだ。つまり、無効なブロックが発見された時点で拒否されるブロックチェーンの分岐のために、彼らの計算努力が無駄に費やされることになる。これはマイニングのパワーの一部が、ビットコインの基本的なセキュリティ・メカニズムである最も強固で有効なチェーンに寄与していないため、ネットワークのセキュリティを損なうことになる。
reviewed: false

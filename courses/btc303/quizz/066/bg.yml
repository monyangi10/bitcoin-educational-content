question: В контекста на mining без валидиране, какъв е основният риск за сигурността, пред който са изправени миньорите, когато отлагат пълното валидиране на блокове, за да избегнат застояли блокове?
answer: Те рискуват да създадат временно невалидна блокчейн, като хабят изчислителна мощ за верига, която в крайна сметка ще бъде отхвърлена
wrong_answers:
  - Те рискуват техните собствени блокове да бъдат отхвърлени от мрежата поради непълно потвърждаване на предишни транзакции
  - Те рискуват да загубят окончателно наградите си за mining, тъй като невалидирането на mining се счита за нарушение на протокола
  - Те рискуват да създадат атаки за двойно харчене, тъй като не могат да проверят дали входящите транзакции са легитимни
explanation: |
  Когато миньорите практикуват mining без валидиране, те проверяват само proof-of-work в заглавието на блока и веднага започват mining върху него, като паралелно изтеглят и валидират целия блок. Критичният риск се състои в това, че те могат да изграждат върху невалиден блок, което означава, че изчислителните им усилия се губят за клон на блокчейн, който ще бъде отхвърлен, след като невалидният блок бъде открит. Това подкопава сигурността на мрежата, тъй като част от мощността на mining не допринася за най-силната валидна верига, която е основният механизъм за сигурност на Bitcoin.
reviewed: false

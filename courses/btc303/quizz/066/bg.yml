question: В контекста на копаене без валидиране, какъв е основният риск за сигурността, пред който са изправени миньорите, когато отлагат пълното валидиране на блокове, за да избегнат застояли блокове?
answer: Те рискуват да създадат временно невалиден блокчейн, като хабят изчислителна мощ за верига, която в крайна сметка ще бъде отхвърлена
wrong_answers:
  - Те рискуват техните собствени блокове да бъдат отхвърлени от мрежата поради непълно потвърждаване на предишни транзакции
  - Те рискуват да загубят окончателно наградите си за копаене, тъй като копаене без валидиране се счита за нарушение на протокола
  - Те рискуват да създадат атаки за двойно харчене, тъй като не могат да проверят дали входящите транзакции са легитимни
explanation: |
  Когато миньорите практикуват копаене без валидиране, те проверяват само proof-of-work в заглавието на блока и веднага започват да копаят върху него, като паралелно изтеглят и валидират целия блок. Критичният риск се състои в това, че те могат да изграждат върху невалиден блок, което означава, че изчислителните им усилия се губят за клон на блокчейн, който ще бъде отхвърлен, след като невалидният блок бъде открит. Това подкопава сигурността на мрежата, тъй като част от мощността на копаене не допринася за най-силната валидна верига, която е основният механизъм за сигурност на Bitcoin.
reviewed: true

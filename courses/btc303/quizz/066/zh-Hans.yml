question: 在无验证挖矿（Validationless mining）的背景下，当矿工推迟完整区块验证以避免陈旧区块时，他们面临的主要安全风险是什么？
answer: 他们冒着暂时建立在无效区块链上的风险，在最终会被拒绝的链上浪费计算能力
wrong_answers:
  - 由于对之前交易的验证不完整，他们可能会面临自己的区块被网络拒绝的风险
  - 他们有可能永久失去挖矿奖励，因为无效挖矿被视为违反协议的行为
  - 它们有可能造成双重支付攻击，因为它们无法验证收到的交易是否合法
explanation: |
  当矿工采用无验证挖矿时，他们只检查区块头中的工作证明，然后立即在其基础上进行挖矿，同时并行下载和验证整个区块。关键风险在于，他们可能会在无效区块上进行构建，这意味着他们会浪费计算努力会在区块链分支上，而一旦发现无效区块，该分支就会被剔除。这就破坏了网络安全，因为挖矿的部分能量没有为最强有效链做出贡献，而最强有效链正是比特币的基本安全机制。

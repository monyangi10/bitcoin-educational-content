question: В контексте mining без валидации, каков основной риск безопасности, которому подвергаются майнеры, когда они откладывают полную валидацию блока, чтобы избежать появления неработающих блоков?
answer: Они рискуют временно строить на недействительном блокчейне, тратя вычислительные мощности на цепь, которая в итоге будет отвергнута
wrong_answers:
  - Они рискуют тем, что их собственные блоки будут отклонены сетью из-за неполной проверки предыдущих транзакций
  - Они рискуют навсегда лишиться наград за mining, потому что отсутствие валидации mining считается нарушением протокола
  - Они рискуют создать атаки "двойной траты", поскольку не могут проверить законность входящих транзакций
explanation: |
  Когда майнеры практикуют mining без валидации, они проверяют только proof-of-work в заголовке блока и сразу же запускают mining поверх него, параллельно загружая и валидируя весь блок. Критический риск заключается в том, что они могут строить на недействительном блоке, то есть их вычислительные усилия тратятся на ветку блокчейна, которая будет отклонена, как только обнаружится недействительный блок. Это подрывает безопасность сети, поскольку часть мощности mining не способствует созданию самой сильной валидной цепочки, которая является основополагающим механизмом безопасности Bitcoin.
reviewed: false

question: सत्यापन रहित mining के संदर्भ में, प्राथमिक सुरक्षा जोखिम क्या है जिसका सामना खनिकों को करना पड़ता है, जब वे पुराने ब्लॉकों से बचने के लिए पूर्ण ब्लॉक सत्यापन को स्थगित कर देते हैं?
answer: वे अस्थायी रूप से एक अमान्य ब्लॉकचेन पर निर्माण करने का जोखिम उठाते हैं, जिससे एक ऐसी श्रृंखला पर कम्प्यूटेशनल शक्ति बर्बाद होती है जिसे अंततः अस्वीकार कर दिया जाएगा
wrong_answers:
  - पिछले लेनदेन के अधूरे सत्यापन के कारण नेटवर्क द्वारा उनके अपने ब्लॉक को अस्वीकृत किए जाने का जोखिम रहता है
  - वे अपने mining पुरस्कारों को स्थायी रूप से खोने का जोखिम उठाते हैं क्योंकि सत्यापन रहित mining को प्रोटोकॉल उल्लंघन माना जाता है
  - वे दोहरे खर्च वाले हमले पैदा करने का जोखिम उठाते हैं क्योंकि वे यह सत्यापित नहीं कर सकते कि आने वाले लेनदेन वैध हैं
explanation: |
  जब माइनर्स सत्यापन रहित mining का उपयोग करते हैं, तो वे ब्लॉक हेडर में केवल proof-of-work की जाँच करते हैं और तुरंत उसके ऊपर mining शुरू कर देते हैं, साथ ही पूरे ब्लॉक को डाउनलोड और सत्यापित भी करते हैं। गंभीर जोखिम यह है कि वे किसी अमान्य ब्लॉक पर निर्माण कर रहे होंगे, जिसका अर्थ है कि उनका कंप्यूटिंग प्रयास एक ब्लॉकचेन शाखा पर बर्बाद हो रहा है जिसे अमान्य ब्लॉक का पता चलने पर अस्वीकार कर दिया जाएगा। यह नेटवर्क सुरक्षा को कमज़ोर करता है क्योंकि mining की शक्ति का एक हिस्सा सबसे मज़बूत मान्य श्रृंखला में योगदान नहीं दे रहा है, जो Bitcoin का मूलभूत सुरक्षा तंत्र है।
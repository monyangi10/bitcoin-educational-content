question: Nel contesto di mining senza convalida, qual è il rischio principale per la sicurezza che i minatori affrontano quando rimandano la convalida completa dei blocchi per evitare blocchi stantii?
answer: Rischiano di costruire temporaneamente su una blockchain non valida, sprecando potenza di calcolo su una catena che alla fine verrà rifiutata
wrong_answers:
  - Rischiano di vedersi rifiutare i propri blocchi dalla rete a causa di una convalida incompleta delle transazioni precedenti
  - Rischiano di perdere le ricompense del mining in modo permanente, perché la mancata convalida del mining è considerata una violazione del protocollo
  - Rischiano di creare attacchi di doppia spesa perché non possono verificare che le transazioni in entrata siano legittime
explanation: |
  Quando i minatori praticano il mining senza convalida, controllano solo il proof-of-work nell'intestazione del blocco e iniziano immediatamente il mining sopra di esso, scaricando e convalidando l'intero blocco in parallelo. Il rischio critico è che possano costruire su un blocco non valido, il che significa che il loro sforzo computazionale viene sprecato su un ramo della blockchain che verrà rifiutato una volta scoperto il blocco non valido. Questo mina la sicurezza della rete perché una parte della potenza del mining non contribuisce alla catena valida più forte, che è il meccanismo di sicurezza fondamentale del Bitcoin.
question: Trong bối cảnh mining không xác thực, rủi ro bảo mật chính mà thợ đào phải đối mặt khi họ hoãn xác thực toàn bộ khối để tránh các khối cũ là gì?
answer: Họ có nguy cơ xây dựng trên một blockchain không hợp lệ tạm thời, lãng phí sức mạnh tính toán trên một chuỗi cuối cùng sẽ bị từ chối
wrong_answers:
  - Họ có nguy cơ bị mạng từ chối các khối của mình do xác thực không đầy đủ các giao dịch trước đó
  - Họ có nguy cơ mất phần thưởng mining vĩnh viễn vì mining không xác thực được coi là vi phạm giao thức
  - Họ có nguy cơ tạo ra các cuộc tấn công chi tiêu gấp đôi vì họ không thể xác minh rằng các giao dịch đến là hợp pháp
explanation: |
  Khi thợ đào thực hành mining không xác thực, họ chỉ kiểm tra proof-of-work trong tiêu đề khối và ngay lập tức khởi động mining trên đó trong khi tải xuống và xác thực toàn bộ khối song song. Rủi ro nghiêm trọng là họ có thể đang xây dựng trên một khối không hợp lệ, nghĩa là công sức tính toán của họ bị lãng phí vào một nhánh blockchain sẽ bị từ chối khi khối không hợp lệ được phát hiện. Điều này làm suy yếu an ninh mạng vì một phần sức mạnh của mining không đóng góp vào chuỗi hợp lệ mạnh nhất, vốn là cơ chế bảo mật cơ bản của Bitcoin.

question: در زمینه mining بدون اعتبارسنجی، خطر امنیتی اصلی که ماینرها با آن مواجه می‌شوند زمانی است که اعتبارسنجی کامل بلاک را به تعویق می‌اندازند تا از بلاک‌های منسوخ جلوگیری کنند، چیست؟
answer: آن‌ها خطر ساختن بر روی یک بلاک‌چین نامعتبر به‌طور موقت را می‌پذیرند و توان محاسباتی را بر روی زنجیره‌ای که در نهایت رد خواهد شد، هدر می‌دهند.
wrong_answers:
  - آن‌ها خطر رد شدن بلوک‌های خود توسط شبکه را به دلیل اعتبارسنجی ناقص تراکنش‌های قبلی دارند.
  - آن‌ها خطر از دست دادن پاداش‌های mining خود را به‌طور دائمی دارند زیرا mining بدون اعتبارسنجی به‌عنوان نقض پروتکل در نظر گرفته می‌شود.
  - آن‌ها خطر ایجاد حملات دوبار خرج کردن را دارند زیرا نمی‌توانند تأیید کنند که تراکنش‌های ورودی معتبر هستند.
explanation: |
  وقتی ماینرها از mining بدون اعتبارسنجی استفاده می‌کنند، فقط proof-of-work در هدر بلاک را بررسی کرده و بلافاصله mining را بر روی آن شروع می‌کنند، در حالی که به صورت موازی بلاک کامل را دانلود و اعتبارسنجی می‌کنند. ریسک بحرانی این است که ممکن است آن‌ها در حال ساختن بر روی یک بلاک نامعتبر باشند، به این معنی که تلاش محاسباتی آن‌ها بر روی شاخه‌ای از بلاکچین که پس از کشف بلاک نامعتبر رد خواهد شد، هدر می‌رود. این امر امنیت شبکه را تضعیف می‌کند زیرا بخشی از قدرت mining به قوی‌ترین زنجیره معتبر که مکانیزم امنیتی اساسی Bitcoin است، کمک نمی‌کند.
reviewed: false

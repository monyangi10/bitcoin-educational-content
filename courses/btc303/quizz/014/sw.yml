question: Je, Satoshi Nakamoto inatambua tatizo gani katika mifumo ya jadi ya kifedha katika utangulizi wa karatasi nyeupe ya Bitcoin?
answer: Taasisi za kifedha haziwezi kuepuka upatanishi wa migogoro, na kufanya miamala isiyoweza kutenduliwa kuwa haiwezekani
wrong_answers:
  - Benki hutoza ada nyingi ambazo hufanya miamala yote ya kielektroniki kutokuwa na faida kwa watumiaji
  - Kampuni za kadi ya mkopo zinakataa kushughulikia malipo ya bidhaa za kidijitali na huduma za mtandaoni
  - Kanuni za serikali zinazuia taasisi za fedha kufanya kazi katika mipaka ya kimataifa
explanation: |
  Satoshi inabainisha mahsusi kuwa taasisi za fedha zinazotumika kama washirika wengine wanaoaminika haziwezi kuepuka kupatanisha mizozo, ambayo huzuia kabisa miamala isiyoweza kutenduliwa. Hii husababisha udhaifu wa asili katika muundo unaotegemea uaminifu, huongeza gharama kupitia upatanishi, na huwalazimisha wafanyabiashara kuwa waangalifu na wateja. Chaguzi zingine zinaelezea shida tofauti ambazo hazijatajwa katika uchanganuzi wa Satoshi wa mifumo ya kawaida ya malipo.
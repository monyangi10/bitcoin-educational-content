question: Masalah apa dengan sistem keuangan tradisional yang diidentifikasi oleh Satoshi Nakamoto dalam pengantar whitepaper Bitcoin?
answer: Lembaga keuangan tidak dapat menghindari mediasi perselisihan, sehingga transaksi yang sepenuhnya tidak dapat dibatalkan menjadi tidak mungkin
wrong_answers:
  - Bank mengenakan biaya berlebihan yang membuat semua transaksi elektronik tidak menguntungkan bagi konsumen
  - Perusahaan kartu kredit menolak memproses pembayaran untuk barang digital dan layanan online
  - Peraturan pemerintah mencegah lembaga keuangan beroperasi melintasi batas-batas internasional
explanation: |
  Satoshi secara khusus mengidentifikasi bahwa lembaga keuangan yang berperan sebagai pihak ketiga tepercaya tidak dapat menghindari mediasi perselisihan, sehingga transaksi tidak dapat dibatalkan. Hal ini menciptakan kelemahan yang melekat pada model berbasis kepercayaan, meningkatkan biaya melalui mediasi, dan memaksa pedagang untuk berhati-hati terhadap pelanggan. Opsi-opsi lainnya menjelaskan masalah-masalah berbeda yang tidak disebutkan dalam analisis Satoshi tentang sistem pembayaran tradisional.

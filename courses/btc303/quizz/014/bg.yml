question: Какъв проблем с традиционните финансови системи идентифицира Satoshi Nakamoto във въведението на бялата книга на Bitcoin?
answer: Финансовите институции не могат да избегнат посредничеството в спорове, което прави невъзможни напълно необратими транзакции
wrong_answers:
  - Банките начисляват прекомерни такси, които правят всички електронни транзакции нерентабилни за потребителите
  - Компаниите за кредитни карти отказват да обработват плащания за цифрови стоки и онлайн услуги
  - Правителствените разпоредби не позволяват на финансовите институции да работят в чужбина
explanation: |
  Satoshi изрично посочва, че финансовите институции, които служат като доверени трети страни, не могат да избегнат посредничеството при спорове, което предотвратява напълно необратими транзакции. Това създава присъщи слабости на модела, основан на доверие, увеличава разходите за посредничество и принуждава търговците да бъдат предпазливи към клиентите. Другите варианти описват различни проблеми, които не са споменати в анализа на традиционните платежни системи.
reviewed: true

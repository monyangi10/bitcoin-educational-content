question: Welches Problem mit traditionellen Finanzsystemen identifiziert Satoshi Nakamoto in der Einleitung des Bitcoin-Whitepapers?
answer: Die Finanzinstitute kommen nicht umhin, Streitigkeiten zu schlichten, was völlig unumkehrbare Transaktionen unmöglich macht
wrong_answers:
  - Die Banken verlangen überhöhte Gebühren, die alle elektronischen Transaktionen für die Verbraucher unrentabel machen
  - Kreditkartenunternehmen weigern sich, Zahlungen für digitale Waren und Online-Dienste zu bearbeiten
  - Staatliche Vorschriften hindern Finanzinstitute daran, grenzüberschreitend tätig zu werden
explanation: |
  Satoshi weist ausdrücklich darauf hin, dass Finanzinstitute, die als vertrauenswürdige Dritte fungieren, nicht umhin können, Streitigkeiten zu schlichten, was völlig unumkehrbare Transaktionen verhindert. Dies führt zu inhärenten Schwächen des vertrauensbasierten Modells, erhöht die Kosten durch die Schlichtung und zwingt die Händler dazu, gegenüber den Kunden vorsichtig zu sein. Die anderen Optionen beschreiben verschiedene Probleme, die in der Satoshi-Analyse der traditionellen Zahlungssysteme nicht erwähnt werden.
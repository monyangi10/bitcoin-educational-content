question: Satoshi Nakamoto 在 Bitcoin 白皮书介绍中指出了传统金融系统的什么问题？
answer: 金融机构无法避免调解纠纷，使得完全不可逆转的交易成为不可能
wrong_answers:
  - 银行收费过高，导致所有电子交易对消费者无利可图
  - 信用卡公司拒绝处理数字商品和在线服务的付款
  - 政府法规阻止金融机构跨国经营
explanation: |
  Satoshi 特别指出，作为受信任第三方的金融机构不能避免调解纠纷，这将阻止完全不可逆转的交易。这给基于信任的模式带来了固有的弱点，通过调解增加了成本，并迫使商家对客户保持警惕。其他方案描述了 Satoshi 在分析传统支付系统时未提及的不同问题。
reviewed: false

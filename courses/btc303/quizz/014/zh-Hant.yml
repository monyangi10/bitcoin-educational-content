question: Satoshi Nakamoto 在 Bitcoin 白皮書介紹中指出了傳統金融系統的什麼問題？
answer: 金融機構無法避免調解爭議，使得完全不可逆轉的交易成為不可能
wrong_answers:
  - 銀行收取過高的費用，使得所有電子交易對消費者而言都無利可圖
  - 信用卡公司拒絕處理數位商品和線上服務的付款
  - 政府法規阻止金融機構跨國經營
explanation: |
  Satoshi 特別指出，擔任可信賴第三方的金融機構無法避免調解糾紛，因而無法進行完全不可逆轉的交易。這造成了以信任為基礎的模式的固有弱點，透過調解增加了成本，並迫使商家對客戶保持警惕。其他方案描述了 Satoshi 在分析傳統支付系統時未提及的不同問題。
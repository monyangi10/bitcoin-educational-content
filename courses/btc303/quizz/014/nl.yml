question: Welk probleem met traditionele financiële systemen signaleert Satoshi Nakamoto in de inleiding van de Bitcoin whitepaper?
answer: Financiële instellingen kunnen zich niet onttrekken aan bemiddeling bij geschillen, waardoor volledig onomkeerbare transacties onmogelijk worden
wrong_answers:
  - Banken brengen buitensporige kosten in rekening die alle elektronische transacties onrendabel maken voor consumenten
  - Creditcardmaatschappijen weigeren betalingen te verwerken voor digitale goederen en online diensten
  - Overheidsvoorschriften verhinderen dat financiële instellingen grensoverschrijdend werken
explanation: |
  Satoshi geeft specifiek aan dat financiële instellingen die optreden als vertrouwde derde partij niet kunnen voorkomen dat ze bemiddelen bij geschillen, wat volledig onomkeerbare transacties voorkomt. Dit creëert inherente zwakheden in het op vertrouwen gebaseerde model, verhoogt de kosten door bemiddeling en dwingt handelaren om op hun hoede te zijn voor klanten. De andere opties beschrijven verschillende problemen die niet genoemd worden in Satoshi's analyse van traditionele betalingssystemen.
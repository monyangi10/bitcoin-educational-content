question: چه مشکلی با سیستم‌های مالی سنتی توسط Satoshi ناکاموتو در مقدمه مقاله سفید Bitcoin شناسایی شده است؟
answer: مؤسسات مالی نمی‌توانند از میانجی‌گری در اختلافات اجتناب کنند، که انجام تراکنش‌های کاملاً غیرقابل برگشت را غیرممکن می‌سازد.
wrong_answers:
  - بانک‌ها هزینه‌های گزافی دریافت می‌کنند که تمام تراکنش‌های الکترونیکی را برای مصرف‌کنندگان غیرسودآور می‌کند.
  - شرکت‌های کارت اعتباری از پردازش پرداخت‌ها برای کالاهای دیجیتال و خدمات آنلاین خودداری می‌کنند.
  - مقررات دولتی مانع از فعالیت مؤسسات مالی در مرزهای بین‌المللی می‌شود.
explanation: |
  Satoshi به‌طور خاص مشخص می‌کند که مؤسسات مالی که به عنوان اشخاص ثالث مورد اعتماد عمل می‌کنند نمی‌توانند از میانجی‌گری در اختلافات اجتناب کنند، که این امر مانع از انجام تراکنش‌های کاملاً غیرقابل برگشت می‌شود. این موضوع ضعف‌های ذاتی در مدل مبتنی بر اعتماد ایجاد می‌کند، هزینه‌ها را از طریق میانجی‌گری افزایش می‌دهد و بازرگانان را مجبور می‌کند که نسبت به مشتریان محتاط باشند. گزینه‌های دیگر مشکلات متفاوتی را توصیف می‌کنند که در تحلیل Satoshi از سیستم‌های پرداخت سنتی ذکر نشده‌اند.
question: Ni ingorane iyihe y’imirongo y’ivy’ubutunzi ya kera Satoshi Nakamoto abona mu ntangamarara y’igitabu cera ca Bitcoin?
answer: Ibigo vy’imari ntibishobora kwirinda guhuza amatati, ivyo bikaba bituma amafaranga adashobora gusubirwamwo rwose adashoboka .
wrong_answers:
  - Amabanki asaba amahera menshi cane atuma amafaranga yose akoreshwa mu buhinga bwa none ata co amaze ku baguzi .
  - Amashirahamwe y'amakarata y'inguzanyo yanse kwishura ibintu vy'ubuhinga bwa none n'ibikorwa vyo kuri interineti
  - Amabwirizwa ya Leta abuza ibigo vy'imari gukora hirya no hino y'imipaka mpuzamakungu
explanation: |
  Satoshi yerekana canecane ko ibigo vy’imari bikora nk’abantu bizigira bidashobora kwirinda guhuza amatati, ivyo bikaba bibuza amafaranga adashobora gusubirwamwo rwose. Ivyo bituma habaho intege nke zisanzwe mu citegererezo gishingiye ku kwizigirana, bikongera ibiciro biciye mu guhuza, kandi bikaba bihatira abacuruzi kwirinda abakiriya. Ayandi mahitamwo adondora ingorane zitandukanye zitavuzwe mu icegeranyo ca Satoshi c’uburyo bwo kwishura bwa kera.
reviewed: false

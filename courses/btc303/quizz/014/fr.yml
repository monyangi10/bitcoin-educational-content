question: Quel problème lié aux systèmes financiers traditionnels Satoshi Nakamoto identifie-t-il dans l'introduction du livre blanc Bitcoin ?
answer: Les institutions financières ne peuvent éviter la médiation des litiges, ce qui rend les transactions totalement irréversibles impossibles
wrong_answers:
  - Les banques facturent des frais excessifs qui rendent toutes les transactions électroniques non rentables pour les consommateurs
  - Les sociétés de cartes de crédit refusent de traiter les paiements pour les biens numériques et les services en ligne
  - Les réglementations gouvernementales empêchent les institutions financières d'opérer au-delà des frontières internationales
explanation: |
  La Satoshi précise que les institutions financières qui font office de tiers de confiance ne peuvent pas éviter la médiation des litiges, ce qui empêche les transactions totalement irréversibles. Cela crée des faiblesses inhérentes au modèle basé sur la confiance, augmente les coûts de médiation et oblige les commerçants à se méfier de leurs clients. Les autres options décrivent des problèmes différents qui ne sont pas mentionnés dans l'analyse de Satoshi des systèmes de paiement traditionnels.
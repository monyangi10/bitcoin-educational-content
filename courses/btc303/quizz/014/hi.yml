question: Satoshi नाकामोटो ने Bitcoin श्वेतपत्र परिचय में पारंपरिक वित्तीय प्रणालियों में किस समस्या की पहचान की है?
answer: वित्तीय संस्थाएं विवादों में मध्यस्थता से बच नहीं सकतीं, जिससे पूरी तरह अपरिवर्तनीय लेनदेन असंभव हो जाता है
wrong_answers:
  - बैंक अत्यधिक शुल्क वसूलते हैं जिससे उपभोक्ताओं के लिए सभी इलेक्ट्रॉनिक लेनदेन लाभहीन हो जाते हैं
  - क्रेडिट कार्ड कंपनियां डिजिटल वस्तुओं और ऑनलाइन सेवाओं के लिए भुगतान संसाधित करने से इनकार करती हैं
  - सरकारी नियम वित्तीय संस्थाओं को अंतर्राष्ट्रीय सीमाओं के पार काम करने से रोकते हैं
explanation: |
  Satoshi स्पष्ट रूप से इस बात की पहचान करता है कि विश्वसनीय तृतीय पक्ष के रूप में कार्य करने वाले वित्तीय संस्थान विवादों में मध्यस्थता से बच नहीं सकते, जिससे पूरी तरह से अपरिवर्तनीय लेनदेन बाधित होते हैं। इससे विश्वास-आधारित मॉडल में अंतर्निहित कमज़ोरियाँ पैदा होती हैं, मध्यस्थता की लागत बढ़ती है, और व्यापारियों को ग्राहकों से सावधान रहने के लिए मजबूर होना पड़ता है। अन्य विकल्प उन विभिन्न समस्याओं का वर्णन करते हैं जिनका उल्लेख Satoshi के पारंपरिक भुगतान प्रणालियों के विश्लेषण में नहीं किया गया है।

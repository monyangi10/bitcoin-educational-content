question: Jaki problem z tradycyjnymi systemami finansowymi identyfikuje Satoshi Nakamoto we wstępie do Bitcoin whitepaper?
answer: Instytucje finansowe nie mogą uniknąć mediacji w sporach, uniemożliwiając całkowicie nieodwracalne transakcje
wrong_answers:
  - Banki pobierają nadmierne opłaty, które sprawiają, że wszystkie transakcje elektroniczne są nieopłacalne dla konsumentów
  - Firmy obsługujące karty kredytowe odmawiają przetwarzania płatności za towary cyfrowe i usługi online
  - Regulacje rządowe uniemożliwiają instytucjom finansowym działanie ponad granicami międzynarodowymi
explanation: |
  Satoshi wyraźnie wskazuje, że instytucje finansowe działające jako zaufane strony trzecie nie mogą uniknąć mediacji w sporach, co zapobiega całkowicie nieodwracalnym transakcjom. Stwarza to nieodłączne słabości modelu opartego na zaufaniu, zwiększa koszty poprzez mediację i zmusza sprzedawców do zachowania ostrożności wobec klientów. Pozostałe opcje opisują różne problemy, o których nie wspomniano w analizie Satoshi dotyczącej tradycyjnych systemów płatności.
reviewed: false

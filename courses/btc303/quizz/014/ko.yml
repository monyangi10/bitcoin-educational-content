question: Satoshi 나카모토는 Bitcoin 백서 소개에서 기존 금융 시스템의 어떤 문제점을 지적했나요?
answer: 금융 기관은 분쟁 중재를 피할 수 없으므로 완전히 되돌릴 수 없는 거래가 불가능합니다
wrong_answers:
  - 은행이 과도한 수수료를 부과하여 모든 전자 거래가 소비자에게 이익이 되지 않는 경우
  - 신용카드 회사가 디지털 상품 및 온라인 서비스에 대한 결제 처리를 거부하는 경우
  - 정부 규제로 인해 금융 기관이 국경을 넘어 영업할 수 없는 경우
explanation: |
  Satoshi는 특히 신뢰할 수 있는 제3자 역할을 하는 금융 기관이 분쟁 중재를 피할 수 없으므로 완전히 되돌릴 수 없는 거래를 방지할 수 없다고 명시하고 있습니다. 이로 인해 신뢰 기반 모델에 내재된 약점이 발생하고 중재를 통한 비용이 증가하며 판매자가 고객을 경계하게 됩니다. 다른 옵션은 Satoshi의 기존 결제 시스템 분석에서 언급되지 않은 다른 문제점을 설명합니다.

question: Какую проблему традиционных финансовых систем обозначил Satoshi Накамото во введении к Bitcoin?
answer: Финансовые учреждения не могут избежать посредничества в спорах, что делает невозможными полностью необратимые сделки
wrong_answers:
  - Банки взимают чрезмерные комиссии, которые делают все электронные операции невыгодными для потребителей
  - Компании, выпускающие кредитные карты, отказываются обрабатывать платежи за цифровые товары и онлайн-услуги
  - Государственное регулирование не позволяет финансовым учреждениям работать через международные границы
explanation: |
  В Satoshi особо отмечается, что финансовые учреждения, выступающие в качестве доверенных третьих сторон, не могут избежать посредничества в спорах, что предотвращает полностью необратимые транзакции. Это создает недостатки, присущие модели, основанной на доверии, увеличивает затраты на посредничество и заставляет торговцев настороженно относиться к клиентам. Другие варианты описывают различные проблемы, не упомянутые в анализе традиционных платежных систем в Satoshi.
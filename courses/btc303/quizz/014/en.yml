question: What problem with traditional financial systems does Satoshi Nakamoto identify in the Bitcoin whitepaper introduction?
answer: Financial institutions cannot avoid mediating disputes, making completely non-reversible transactions impossible
wrong_answers:
  - Banks charge excessive fees that make all electronic transactions unprofitable for consumers
  - Credit card companies refuse to process payments for digital goods and online services
  - Government regulations prevent financial institutions from operating across international borders
explanation: |
  Satoshi specifically identifies that financial institutions serving as trusted third parties cannot avoid mediating disputes, which prevents completely non-reversible transactions. This creates inherent weaknesses in the trust-based model, increases costs through mediation, and forces merchants to be wary of customers. The other options describe different problems not mentioned in Satoshi's analysis of traditional payment systems.

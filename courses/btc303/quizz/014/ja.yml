question: Bitcoinホワイトペーパーの冒頭で、Satoshiナカモトが指摘した従来の金融システムの問題点とは？
answer: 金融機関は紛争の仲介を避けることができず、完全に非可逆的な取引は不可能となる。
wrong_answers:
  - 銀行は過剰な手数料を請求し、すべての電子取引が消費者にとって採算の合わないものとなっている。
  - クレジットカード会社、デジタル商品やオンラインサービスの支払い処理を拒否
  - 政府の規制により、金融機関は国境を越えて活動できない
explanation: |
  Satoshiは特に、信頼された第三者としての金融機関が紛争を調停することを避けることができず、完全に非可逆的な取引を妨げることを指摘している。これは、信頼に基づくモデルに固有の弱点を生み出し、仲介によるコストを増加させ、加盟店に顧客に対する警戒心を強いる。他の選択肢は、Satoshi の従来の決済システムに関する分析では言及されなかった異なる問題について述べている。
reviewed: false

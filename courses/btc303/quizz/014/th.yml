question: ปัญหาอะไรกับระบบการเงินแบบดั้งเดิมที่ Satoshi Nakamoto ระบุในบทนำของเอกสารสีขาว Bitcoin?
answer: สถาบันการเงินไม่สามารถหลีกเลี่ยงการไกล่เกลี่ยข้อพิพาทได้ ทำให้การทำธุรกรรมที่ไม่สามารถย้อนกลับได้อย่างสมบูรณ์เป็นไปไม่ได้
wrong_answers:
  - ธนาคารเรียกเก็บค่าธรรมเนียมที่สูงเกินไปซึ่งทำให้การทำธุรกรรมทางอิเล็กทรอนิกส์ทั้งหมดไม่เป็นประโยชน์สำหรับผู้บริโภค
  - บริษัทบัตรเครดิตปฏิเสธที่จะดำเนินการชำระเงินสำหรับสินค้าดิจิทัลและบริการออนไลน์
  - กฎระเบียบของรัฐบาลป้องกันไม่ให้สถาบันการเงินดำเนินการข้ามพรมแดนระหว่างประเทศ
explanation: |
  Satoshi ระบุอย่างชัดเจนว่าสถาบันการเงินที่ทำหน้าที่เป็นบุคคลที่สามที่เชื่อถือได้ไม่สามารถหลีกเลี่ยงการไกล่เกลี่ยข้อพิพาทได้ ซึ่งป้องกันไม่ให้เกิดธุรกรรมที่ไม่สามารถย้อนกลับได้อย่างสมบูรณ์ สิ่งนี้สร้างจุดอ่อนโดยธรรมชาติในรูปแบบที่อิงตามความเชื่อถือ เพิ่มค่าใช้จ่ายผ่านการไกล่เกลี่ย และบังคับให้ผู้ค้าต้องระมัดระวังลูกค้า ตัวเลือกอื่น ๆ อธิบายปัญหาที่แตกต่างกันซึ่งไม่ได้กล่าวถึงในบทวิเคราะห์ของ Satoshi เกี่ยวกับระบบการชำระเงินแบบดั้งเดิม
reviewed: false
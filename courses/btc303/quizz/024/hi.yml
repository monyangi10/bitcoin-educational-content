question: Bitcoin द्वारा वर्णनात्मक उपयोगकर्ता नामों के स्थान पर सार्वजनिक कुंजियों से प्राप्त पतों को छद्म नामों के रूप में उपयोग करने का प्राथमिक कारण क्या है?
answer: ब्लॉकचेन पंजीकरण की आवश्यकता के बिना सुरक्षित ऑफ़लाइन पता निर्माण सक्षम करने के लिए
wrong_answers:
  - ब्लॉकचेन पर लेनदेन को पूरी तरह से गुमनाम और अप्राप्य बनाना
  - लेनदेन सत्यापन के लिए आवश्यक कम्प्यूटेशनल शक्ति को कम करने के लिए
  - एकाधिक लेनदेन में एक ही छद्म नाम के असीमित पुन: उपयोग की अनुमति देना
explanation: |
  Bitcoin सार्वजनिक कुंजियों से प्राप्त पतों को छद्म नामों के रूप में उपयोग करता है क्योंकि यह प्रणाली उपयोगकर्ताओं को ब्लॉकचेन पर पहले पंजीकरण किए बिना सुरक्षित रूप से ऑफ़लाइन नए पते बनाने की अनुमति देती है। वर्णनात्मक उपयोगकर्ता नामों का उपयोग करने के लिए ब्लॉकचेन पर उपयोगकर्ता नाम और सार्वजनिक कुंजी के बीच संबंध की घोषणा करनी होगी, जिससे शुल्क लगेगा, ब्लॉकचेन का आकार बढ़ेगा और सुरक्षा कम होगी। इसके अतिरिक्त, उपयोगकर्ता नाम पुन: उपयोग को प्रोत्साहित करेंगे (गोपनीयता में कमी) और प्रतिरूपण के जोखिम पैदा करेंगे। पता-आधारित प्रणाली Bitcoin के सुचारू संचालन के लिए आवश्यक क्रिप्टोग्राफ़िक सुरक्षा को बनाए रखते हुए इन समस्याओं को दूर करती है।
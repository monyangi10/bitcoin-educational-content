question: Jaký je hlavní důvod, proč systém Bitcoin používá adresy odvozené z veřejných klíčů jako pseudonymy namísto popisných uživatelských jmen?
answer: Umožnění bezpečného vytváření offline adres bez nutnosti registrace v blockchainu
wrong_answers:
  - Aby byly transakce v blockchainu zcela anonymní a nedohledatelné
  - Snížení výpočetního výkonu potřebného k ověření transakcí
  - Umožnit neomezené opakované použití stejného pseudonymu při více transakcích
explanation: |
  Bitcoin používá adresy odvozené z veřejných klíčů jako pseudonymy, protože tento systém umožňuje uživatelům bezpečně vytvářet nové adresy offline, aniž by je museli nejprve registrovat v blockchainu. Použití popisných uživatelských jmen by vyžadovalo oznámení vazby mezi uživatelským jménem a veřejným klíčem v blockchainu, což by znamenalo náklady na poplatky, nafouknutí blockchainu a snížení bezpečnosti. Uživatelská jména by navíc podporovala opakované použití (snižovala by soukromí) a vytvářela by riziko zosobnění. Systém založený na adresách tyto problémy odstraňuje a zároveň zachovává kryptografické zabezpečení potřebné pro správné fungování Bitcoin.
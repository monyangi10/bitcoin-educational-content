question: Bitcoin에서 설명적인 사용자 이름 대신 공개 키에서 파생된 주소를 가명으로 사용하는 주된 이유는 무엇인가요?
answer: 블록체인 등록 없이도 안전한 오프라인 주소 생성 가능
wrong_answers:
  - 블록체인에서 거래를 완전히 익명으로 처리하고 추적할 수 없게 하려면 다음과 같이 하세요
  - 거래 확인에 필요한 컴퓨팅 파워를 줄이려면 다음과 같이 하세요
  - 여러 거래에서 동일한 가명을 무제한으로 재사용하려면 다음과 같이 하세요
explanation: |
  Bitcoin은 공개키에서 파생된 주소를 가명으로 사용하기 때문에 사용자가 블록체인에 먼저 등록할 필요 없이 오프라인에서 새 주소를 안전하게 생성할 수 있습니다. 설명형 사용자 아이디를 사용하려면 사용자 아이디와 공개키 사이의 링크를 블록체인에 알려야 하므로 수수료가 발생하고, 블록체인의 규모가 커지며, 보안이 약화될 수 있습니다. 또한 사용자명은 재사용을 조장하고(개인정보 보호가 약화됨) 사칭 위험을 초래할 수 있습니다. 주소 기반 시스템은 이러한 문제를 해결하면서 Bitcoin이 제대로 작동하는 데 필요한 암호화 보안을 유지합니다.
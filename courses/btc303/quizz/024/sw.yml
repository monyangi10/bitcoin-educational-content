question: Ni nini sababu ya msingi ya Bitcoin kutumia anwani zinazotokana na funguo za umma kama majina bandia badala ya majina ya maelezo ya watumiaji?
answer: Ili kuwezesha uundaji salama wa anwani ya nje ya mtandao bila kuhitaji usajili wa blockchain
wrong_answers:
  - Kufanya shughuli zisizojulikana kabisa na zisizoweza kupatikana kwenye blockchain
  - Ili kupunguza nguvu ya kukokotoa inayohitajika kwa uthibitishaji wa muamala
  - Ili kuruhusu utumiaji tena usio na kikomo wa jina bandia sawa katika shughuli nyingi za malipo
explanation: |
  Bitcoin hutumia anwani zinazotokana na funguo za umma kama majina bandia kwa sababu mfumo huu unaruhusu watumiaji kuunda kwa usalama anwani mpya nje ya mtandao bila kuhitaji kuzisajili kwenye blockchain kwanza. Kutumia majina ya maelezo ya mtumiaji kungehitaji kutangaza kiungo kati ya jina la mtumiaji na ufunguo wa umma kwenye blockchain, ambayo ingegharimu ada, kuzuia blockchain, na kupunguza usalama. Zaidi ya hayo, majina ya watumiaji yanaweza kuhimiza matumizi tena (kupunguza faragha) na kuunda hatari za uigaji. Mfumo unaotegemea anwani huondoa matatizo haya huku ukidumisha usalama wa kriptografia unaohitajika ili Bitcoin ifanye kazi vizuri.
question: Коя е основната причина Bitcoin да използва адреси, получени от публични ключове, като псевдоними вместо описателни потребителски имена?
answer: Да се даде възможност за сигурно създаване на офлайн адреси, без да се изисква регистрация на блокчейна
wrong_answers:
  - Да направите транзакциите напълно анонимни и непроследими в блокчейна
  - За да се намали изчислителната мощност, необходима за проверка на транзакциите
  - Позволяване на неограничена повторна употреба на един и същ псевдоним при множество трансакции
explanation: |
  Bitcoin използва адреси, получени от публични ключове, като псевдоними, тъй като тази система позволява на потребителите да създават сигурно нови адреси офлайн, без да е необходимо първо да ги регистрират в блокчейна. Използването на описателни потребителски имена би изисквало обявяване на връзката между потребителското име и публичния ключ в блокчейна, което би оскъпило таксите, би раздуло блокчейна и би намалило сигурността. Освен това потребителските имена биха насърчили повторната употреба (намалявайки неприкосновеността на личния живот) и биха създали рискове от олицетворяване. Системата, базирана на адреси, елиминира тези проблеми, като същевременно поддържа криптографската сигурност, необходима за правилното функциониране на Bitcoin.
reviewed: true

question: Bitcoinが、記述的なユーザー名ではなく、公開鍵に由来するアドレスを仮名として使用する主な理由は何ですか？
answer: ブロックチェーン登録を必要とせず、安全なオフラインアドレス作成を可能にする。
wrong_answers:
  - ブロックチェーン上で取引を完全に匿名化し、追跡不可能にする。
  - トランザクションの検証に必要な計算能力を削減する。
  - 複数の取引で同じ仮名を無制限に再利用できるようにする。
explanation: |
  Bitcoinでは公開鍵に由来するアドレスを仮名として使用しているが、これはこのシステムにより、ユーザーが最初にブロックチェーンに登録することなく、オフラインで安全に新しいアドレスを作成できるためである。説明的なユーザー名を使用すると、ユーザー名と公開鍵のリンクをブロックチェーン上で公表する必要があり、手数料がかかり、ブロックチェーンが肥大化し、セキュリティが低下する。さらに、ユーザーネームは再利用を促し（プライバシーを低下させ）、なりすましのリスクを生む。アドレスベースのシステムは、Bitcoinが適切に機能するために必要な暗号セキュリティを維持しながら、これらの問題を排除する。
question: Какова основная причина, по которой Bitcoin использует адреса, полученные из открытых ключей, в качестве псевдонимов, а не описательных имен пользователей?
answer: Обеспечение безопасного создания автономных адресов без необходимости регистрации в блокчейне
wrong_answers:
  - Сделать транзакции полностью анонимными и неотслеживаемыми в блокчейне
  - Для снижения вычислительной мощности, необходимой для проверки транзакций
  - Разрешить неограниченное повторное использование одного и того же псевдонима в нескольких транзакциях
explanation: |
  Bitcoin использует в качестве псевдонимов адреса, полученные из открытых ключей, поскольку эта система позволяет пользователям безопасно создавать новые адреса в автономном режиме без необходимости их предварительной регистрации в блокчейне. Использование описательных имен пользователей потребовало бы объявления связи между именем пользователя и публичным ключом в блокчейне, что привело бы к расходам на оплату, раздуло бы блокчейн и снизило безопасность. Кроме того, имена пользователей будут способствовать повторному использованию (что снизит конфиденциальность) и создаст риск имперсонации. Система, основанная на адресах, устраняет эти проблемы, сохраняя при этом криптографическую безопасность, необходимую для нормального функционирования Bitcoin.

question: Apa alasan utama Bitcoin menggunakan alamat yang berasal dari kunci publik sebagai nama samaran dan bukan nama pengguna deskriptif?
answer: Untuk mengaktifkan pembuatan alamat offline yang aman tanpa memerlukan registrasi blockchain
wrong_answers:
  - Untuk membuat transaksi sepenuhnya anonim dan tidak dapat dilacak di blockchain
  - Untuk mengurangi daya komputasi yang dibutuhkan untuk verifikasi transaksi
  - Untuk mengizinkan penggunaan ulang nama samaran yang sama tanpa batas di beberapa transaksi
explanation: |
  Bitcoin menggunakan alamat yang berasal dari kunci publik sebagai nama samaran karena sistem ini memungkinkan pengguna untuk membuat alamat baru secara offline dengan aman tanpa perlu mendaftarkannya di blockchain terlebih dahulu. Menggunakan nama pengguna deskriptif akan membutuhkan pengumuman hubungan antara nama pengguna dan kunci publik pada blockchain, yang akan memakan biaya, membebani blockchain, dan mengurangi keamanan. Selain itu, nama pengguna akan mendorong penggunaan ulang (mengurangi privasi) dan menciptakan risiko peniruan. Sistem berbasis alamat menghilangkan masalah ini dengan tetap menjaga keamanan kriptografi yang dibutuhkan agar Bitcoin dapat berfungsi dengan baik.
reviewed: false

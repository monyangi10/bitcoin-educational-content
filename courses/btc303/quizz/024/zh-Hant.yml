question: Bitcoin 使用源自公開金鑰的位址作為假名，而非描述性使用者名稱的主要原因是什麼？
answer: 無需註冊區塊鏈即可安全地建立離線地址
wrong_answers:
  - 讓交易在區塊鏈上完全匿名且無法追蹤
  - 為了降低交易驗證所需的計算能力
  - 允許在多筆交易中無限重複使用同一假名
explanation: |
  Bitcoin 使用源自公開金鑰的地址作為假名，因為此系統可讓使用者安全地離線建立新地址，而不需要先在區塊鏈上註冊。使用描述性使用者名稱需要在區塊鏈上公佈使用者名稱與公開金鑰之間的連結，這將會花費成本、臃腫區塊鏈並降低安全性。此外，使用者名稱會鼓勵重複使用 (降低隱私權)，並造成冒充的風險。基於位址的系統可消除這些問題，同時維持 Bitcoin 正常運作所需的密碼安全性。
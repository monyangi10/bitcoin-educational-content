question: Qual é a principal razão pela qual o Bitcoin utiliza endereços derivados de chaves públicas como pseudónimos em vez de nomes de utilizador descritivos?
answer: Permitir a criação segura de endereços offline sem necessidade de registo na cadeia de blocos
wrong_answers:
  - Tornar as transacções completamente anónimas e indetectáveis na cadeia de blocos
  - Para reduzir a potência computacional necessária para a verificação das transacções
  - Permitir a reutilização ilimitada do mesmo pseudónimo em várias transacções
explanation: |
  O Bitcoin utiliza endereços derivados de chaves públicas como pseudónimos porque este sistema permite que os utilizadores criem com segurança novos endereços offline sem necessidade de os registar primeiro na blockchain. A utilização de nomes de utilizador descritivos exigiria o anúncio da ligação entre o nome de utilizador e a chave pública na cadeia de blocos, o que custaria taxas, incharia a cadeia de blocos e reduziria a segurança. Além disso, os nomes de utilizador encorajariam a reutilização (reduzindo a privacidade) e criariam riscos de personificação. O sistema baseado em endereço elimina esses problemas, mantendo a segurança criptográfica necessária para que o Bitcoin funcione corretamente.
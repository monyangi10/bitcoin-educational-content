question: دلیل اصلی که Bitcoin از آدرس‌های مشتق شده از کلیدهای عمومی به عنوان نام مستعار به جای نام‌های کاربری توصیفی استفاده می‌کند چیست؟
answer: برای فعال‌سازی ایجاد آدرس آفلاین امن بدون نیاز به ثبت‌نام در بلاک‌چین
wrong_answers:
  - برای انجام تراکنش‌ها به‌صورت کاملاً ناشناس و غیرقابل‌ردیابی در بلاک‌چین
  - برای کاهش قدرت محاسباتی مورد نیاز برای تأیید تراکنش
  - اجازه دادن به استفاده نامحدود از همان نام مستعار در چندین تراکنش
explanation: |
  ‏Bitcoin از آدرس‌هایی که از کلیدهای عمومی مشتق شده‌اند به عنوان نام مستعار استفاده می‌کند زیرا این سیستم به کاربران اجازه می‌دهد تا به صورت امن آدرس‌های جدید را به صورت آفلاین ایجاد کنند بدون اینکه نیاز به ثبت آنها در بلاکچین داشته باشند. استفاده از نام‌های کاربری توصیفی نیازمند اعلام ارتباط بین نام کاربری و کلید عمومی در بلاکچین است که هزینه‌بر بوده، بلاکچین را حجیم می‌کند و امنیت را کاهش می‌دهد. علاوه بر این، نام‌های کاربری باعث تشویق به استفاده مجدد (کاهش حریم خصوصی) و ایجاد خطرات جعل هویت می‌شوند. سیستم مبتنی بر آدرس این مشکلات را از بین می‌برد و در عین حال امنیت رمزنگاری مورد نیاز برای عملکرد صحیح Bitcoin را حفظ می‌کند.
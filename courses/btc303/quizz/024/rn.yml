question: Ni igiki nyamukuru gituma Bitcoin ikoresha amaderesi akomoka ku mfunguruzo za bose nk’amazina y’uruyeri aho gukoresha amazina y’abakoresha adondora?
answer: Kugira ngo ushobore gukora aderesi itekanye ataco usaba kwiyandikisha
wrong_answers:
  - Kugira ngo amafaranga atamenyekane kandi ntashobora gukurikirana kuri blockchain
  - Kugabanya ubushobozi bwo gukoresha ubuhinga bwa none bukenewe kugira ngo umuntu asuzume ibikorwa
  - Kwemera gusubira gukoresha izina ry'uruyeri rimwe mu bikorwa vyinshi
explanation: |
  Bitcoin ikoresha amaderesi akomoka ku mfunguruzo za bose nk’amazina y’uruyeri kuko iyo sisitemu ituma abakoresha bashobora guhingura amaderesi mashasha ata nkomanzi ataco bakeneye kuyandika kuri blockchain mbere. Gukoresha amazina y’abakoresha adondora vyosaba gutangaza isano hagati y’izina ry’abakoresha n’urufunguzo rwa bose kuri blockchain, ivyo vyotuma umuntu atanga amahera, akavyura blockchain, kandi akagabanya umutekano. Ikindi, amazina y’abakoresha yoremesha gusubira gukoresha (kugabanya ubuzima bwite) no gutuma haba ingorane zo kwigira umuntu. Ubuhinga bushingiye kuri aderesi burakuraho izo ngorane mu gihe buguma bufise umutekano w’ivy’ubuhinga bwa none ukenewe kugira ngo Bitcoin ikore neza.

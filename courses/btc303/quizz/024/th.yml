question: เหตุผลหลักที่ Bitcoin ใช้ที่อยู่ที่ได้มาจากกุญแจสาธารณะเป็นนามแฝงแทนที่จะเป็นชื่อผู้ใช้ที่มีคำอธิบายคืออะไร?
answer: เพื่อเปิดใช้งานการสร้างที่อยู่แบบออฟไลน์อย่างปลอดภัยโดยไม่ต้องลงทะเบียนบล็อกเชน
wrong_answers:
  - เพื่อทำให้การทำธุรกรรมเป็นแบบไม่ระบุตัวตนและไม่สามารถติดตามได้บนบล็อกเชน
  - เพื่อลดพลังการคำนวณที่จำเป็นสำหรับการตรวจสอบธุรกรรม
  - เพื่ออนุญาตให้ใช้ชื่อแฝงเดียวกันซ้ำได้ไม่จำกัดในหลายธุรกรรม
explanation: |
  Bitcoin ใช้ที่อยู่ที่ได้มาจากกุญแจสาธารณะเป็นนามแฝง เพราะระบบนี้อนุญาตให้ผู้ใช้สร้างที่อยู่ใหม่อย่างปลอดภัยแบบออฟไลน์โดยไม่จำเป็นต้องลงทะเบียนบนบล็อกเชนก่อน การใช้ชื่อผู้ใช้ที่อธิบายได้จะต้องประกาศการเชื่อมโยงระหว่างชื่อผู้ใช้และกุญแจสาธารณะบนบล็อกเชน ซึ่งจะมีค่าใช้จ่าย ทำให้บล็อกเชนใหญ่ขึ้น และลดความปลอดภัย นอกจากนี้ ชื่อผู้ใช้จะส่งเสริมการใช้งานซ้ำ (ลดความเป็นส่วนตัว) และสร้างความเสี่ยงในการปลอมแปลง ระบบที่ใช้ที่อยู่ช่วยขจัดปัญหาเหล่านี้ในขณะที่ยังคงรักษาความปลอดภัยทางการเข้ารหัสที่จำเป็นสำหรับ Bitcoin ให้ทำงานได้อย่างถูกต้อง
reviewed: false
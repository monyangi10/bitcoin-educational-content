question: 比特币使用公钥生成的地址作为假名而不是描述性用户名的主要原因是什么？
answer: 无需区块链注册即可安全创建离线地址
wrong_answers:
  - 使区块链上的交易完全匿名且无法追踪
  - 减少交易验证所需的计算能力
  - 允许在多项交易中无限制地重复使用同一假名
explanation: |
  比特币使用源自公钥的地址作为假名，因为该系统允许用户安全地离线创建新地址，而无需先在区块链上注册。使用描述性用户名需要在区块链上公布用户名和公钥之间的链接，这将会产生费用，使区块链变得臃肿，并降低安全性。此外，用户名会鼓励重复使用（降低隐私性），并带来冒名顶替的风险。基于地址的系统可以消除这些问题，同时保持比特币正常运行所需的加密安全性。

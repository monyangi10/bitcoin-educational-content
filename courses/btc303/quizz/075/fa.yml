question: بر اساس دیدگاه گریگوری ماکسول در ارزیابی شدت آسیب‌پذیری، توسعه‌دهندگان باید چه رویکردی را در ارزیابی تأثیر بالقوه مسائل امنیتی کشف‌شده اتخاذ کنند؟
answer: آسیب‌پذیری‌ها را به‌عنوان جدی‌تر از آنچه در حال حاضر شناخته شده‌اند در نظر بگیرید و فرض کنید که حتی اگر به نظر دشوار برای بهره‌برداری باشند، می‌توانند به‌راحتی قابل بهره‌برداری باشند.
wrong_answers:
  - فقط بر تأثیر قابل مشاهده فوری تمرکز کنید و آسیب‌پذیری‌ها را بر اساس روش‌های بهره‌برداری شناخته شده فعلی دسته‌بندی کنید.
  - اولویت‌بندی آسیب‌پذیری‌ها بر اساس پیچیدگی فنی آن‌ها و به تأخیر انداختن رفع مشکلاتی که به نظر می‌رسد به‌طور نظری دشوار برای بهره‌برداری هستند.
  - هر آسیب‌پذیری را به‌صورت جداگانه ارزیابی کنید، بدون در نظر گرفتن اینکه چگونه مسائل جزئی متعدد ممکن است با هم ترکیب شده و خطرات امنیتی عمده‌ای ایجاد کنند.
explanation: |
  مکسول استدلال می‌کند که توسعه‌دهندگان باید آسیب‌پذیری‌ها را جدی‌تر از آنچه به نظر می‌رسند در نظر بگیرند، زیرا مسائل سخت برای بهره‌برداری می‌توانند با تکنیک مناسب به مسائل پیش‌پاافتاده تبدیل شوند و مشکلات ظاهراً جزئی می‌توانند به تهدیدات جدی تبدیل شوند. او تأکید می‌کند که باگ‌های ساده عملکردی می‌توانند برای تقسیم شبکه و امکان حملات double-spending مورد سوءاستفاده قرار گیرند. این رویکرد محافظه‌کارانه اذعان دارد که توسعه‌دهندگان ممکن است در ابتدا پتانسیل کامل بهره‌برداری از یک آسیب‌پذیری را درک نکنند، بنابراین عاقلانه است که به جای دست‌کم گرفتن تهدید، بدترین سناریو را فرض کنند.

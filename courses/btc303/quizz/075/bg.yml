question: Според гледната точка на Грегъри Максуел относно оценката на сериозността на уязвимостите какъв подход трябва да прилагат разработчиците, когато оценяват потенциалното въздействие на откритите проблеми със сигурността?
answer: Третиране на уязвимостите като по-сериозни от известните в момента и приемане, че те могат да бъдат лесно експлоатирани, дори ако изглеждат трудни за експлоатиране
wrong_answers:
  - Съсредоточете се само върху непосредственото забележимо въздействие и категоризирайте уязвимостите въз основа на известните понастоящем методи за експлоатация
  - Приоритизиране на уязвимостите въз основа на тяхната техническа сложност и забавяне на поправките за проблеми, които изглеждат теоретично трудни за използване
  - Оценяване на всяка уязвимост поотделно, без да се отчита как множество незначителни проблеми могат да се комбинират, за да създадат големи рискове за сигурността
explanation: |
  Максуел твърди, че разработчиците трябва да се отнасят към уязвимостите като към по-сериозни, отколкото изглеждат, тъй като трудните за експлоатиране проблеми могат да се превърнат в тривиални с помощта на правилната техника, а на пръв поглед незначителни проблеми могат да се превърнат в сериозни заплахи. Той подчертава, че обикновените грешки в производителността могат да бъдат използвани като оръжие за разделяне на мрежата и за атаки double-spending. Този консервативен подход признава, че разработчиците може първоначално да не разбират пълния потенциал за експлоатация на дадена уязвимост, поради което е разумно да се приеме най-лошият сценарий, вместо да се подценява заплахата.
reviewed: true

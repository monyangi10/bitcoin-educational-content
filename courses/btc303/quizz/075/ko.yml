question: 취약성 심각도 평가에 대한 그레고리 맥스웰의 관점에 따르면, 개발자는 발견된 보안 문제의 잠재적 영향을 평가할 때 어떤 접근 방식을 취해야 할까요?
answer: 취약점을 현재 알려진 것보다 더 심각한 것으로 간주하고 익스플로잇하기 어려워 보이더라도 쉽게 익스플로잇할 수 있다고 가정합니다
wrong_answers:
  - 즉각적으로 관찰 가능한 영향에만 집중하고 현재 알려진 익스플로잇 방법에 따라 취약점을 분류합니다
  - 기술적 복잡성에 따라 취약점의 우선 순위를 정하고 이론적으로 악용하기 어려워 보이는 문제에 대한 수정을 지연시킵니다
  - 여러 사소한 문제가 결합되어 주요 보안 위험을 초래할 수 있다는 점을 고려하지 않고 각 취약점을 개별적으로 평가합니다
explanation: |
  맥스웰은 개발자가 취약점을 겉으로 보이는 것보다 더 심각하게 다루어야 한다고 주장합니다. 왜냐하면 올바른 기술을 사용하면 악용하기 어려운 문제도 사소한 문제가 될 수 있고, 사소해 보이는 문제가 심각한 위협으로 확대될 수 있기 때문입니다. 그는 단순한 성능 버그를 무기화하여 네트워크를 분할하고 double-spending 공격을 가능하게 할 수 있다고 강조합니다. 이러한 보수적인 접근 방식은 개발자가 처음에는 취약점의 악용 가능성을 완전히 이해하지 못할 수 있으므로 위협을 과소평가하기보다는 최악의 시나리오를 가정하는 것이 현명하다는 점을 인정합니다.
question: Welchen Ansatz sollten Entwickler nach Gregory Maxwells Ansicht zur Bewertung des Schweregrads von Schwachstellen wählen, wenn sie die potenziellen Auswirkungen von entdeckten Sicherheitsproblemen bewerten?
answer: Schwachstellen als schwerwiegender zu behandeln, als sie derzeit bekannt sind, und davon auszugehen, dass sie leicht ausgenutzt werden können, auch wenn sie schwer ausnutzbar zu sein scheinen
wrong_answers:
  - Konzentrieren Sie sich nur auf die unmittelbar feststellbaren Auswirkungen und kategorisieren Sie die Schwachstellen auf der Grundlage ihrer derzeit bekannten Ausnutzungsmethoden
  - Priorisierung von Schwachstellen auf der Grundlage ihrer technischen Komplexität und Verzögerung der Behebung von Problemen, die theoretisch schwer auszunutzen sind
  - Jede Schwachstelle isoliert bewerten, ohne zu berücksichtigen, wie mehrere kleinere Probleme zu größeren Sicherheitsrisiken führen können
explanation: |
  Maxwell argumentiert, dass Entwickler Schwachstellen als schwerwiegender ansehen sollten, als sie erscheinen, weil schwer auszunutzende Probleme mit der richtigen Technik trivial werden können und scheinbar geringfügige Probleme zu ernsthaften Bedrohungen eskalieren können. Er betont, dass einfache Leistungsfehler als Waffe eingesetzt werden können, um das Netzwerk zu partitionieren und double-spending-Angriffe zu ermöglichen. Mit diesem konservativen Ansatz wird anerkannt, dass Entwickler anfangs möglicherweise nicht das volle Ausnutzungspotenzial einer Schwachstelle verstehen, so dass es ratsam ist, vom schlimmsten Fall auszugehen, anstatt die Bedrohung zu unterschätzen.
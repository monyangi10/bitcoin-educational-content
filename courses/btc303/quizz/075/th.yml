question: ตามมุมมองของ Gregory Maxwell เกี่ยวกับการประเมินความรุนแรงของช่องโหว่ นักพัฒนาควรใช้วิธีการใดเมื่อประเมินผลกระทบที่อาจเกิดขึ้นจากปัญหาด้านความปลอดภัยที่ค้นพบ?
answer: ปฏิบัติต่อช่องโหว่ต่างๆ ว่ามีความรุนแรงมากกว่าที่ทราบในปัจจุบัน และสมมติว่าช่องโหว่เหล่านั้นอาจถูกโจมตีได้ง่าย แม้ว่าจะดูเหมือนยากต่อการโจมตีก็ตาม
wrong_answers:
  - มุ่งเน้นเฉพาะผลกระทบที่สังเกตได้ทันทีและจัดประเภทช่องโหว่ตามวิธีการโจมตีที่ทราบในปัจจุบัน
  - จัดลำดับความสำคัญของช่องโหว่ตามความซับซ้อนทางเทคนิคและชะลอการแก้ไขปัญหาที่ดูเหมือนจะยากต่อการโจมตีในทางทฤษฎี
  - ประเมินช่องโหว่แต่ละรายการแยกกันโดยไม่พิจารณาว่าปัญหาเล็กน้อยหลายๆ อย่างอาจรวมกันเพื่อสร้างความเสี่ยงด้านความปลอดภัยที่สำคัญได้อย่างไร
explanation: |
  Maxwell โต้แย้งว่านักพัฒนาควรจัดการกับช่องโหว่ด้วยความรุนแรงมากกว่าที่เห็น เพราะปัญหาที่ดูเหมือนยากต่อการโจมตีสามารถกลายเป็นเรื่องง่ายด้วยเทคนิคที่เหมาะสม และปัญหาที่ดูเหมือนเล็กน้อยสามารถบานปลายกลายเป็นภัยคุกคามที่ร้ายแรงได้ เขาเน้นย้ำว่าบั๊กด้านประสิทธิภาพที่เรียบง่ายสามารถถูกนำมาใช้เป็นอาวุธเพื่อแบ่งเครือข่ายและเปิดทางให้กับการโจมตี double-spending แนวทางที่ระมัดระวังนี้ยอมรับว่านักพัฒนาอาจไม่เข้าใจศักยภาพในการโจมตีของช่องโหว่อย่างเต็มที่ในตอนแรก ทำให้การสมมติสถานการณ์ที่เลวร้ายที่สุดเป็นเรื่องที่รอบคอบมากกว่าการประเมินภัยคุกคามต่ำเกินไป
reviewed: false
question: 根据 Gregory Maxwell 关于漏洞严重性评估的观点，开发者在评估已发现安全问题的潜在影响时应采取什么方法？
answer: 将漏洞视为比目前已知的更严重的漏洞，并假定它们很容易被利用，即使它们看起来很难被利用
wrong_answers:
  - 只关注直接可观察到的影响，并根据当前已知的利用方法对漏洞进行分类
  - 根据技术复杂性确定漏洞的优先级，延迟修复理论上难以利用的问题
  - 孤立地评估每个漏洞，而不考虑多个小问题如何可能结合起来造成重大安全风险
explanation: |
  Maxwell 认为，开发者应将漏洞视为比表面看起来更严重的问题，因为难以利用的问题可以通过正确的技术变得微不足道，而看似次要的问题可能升级为严重的威胁。他强调，简单的性能漏洞可以被用来分割网络，实现双重支付攻击。这种谨慎策略认识到，开发者初期可能不明白漏洞的全部威胁，因此更安全的做法是按最坏情况处理，而非掉以轻心。

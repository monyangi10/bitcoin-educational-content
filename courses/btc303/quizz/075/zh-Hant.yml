question: 根據 Gregory Maxwell 對於弱點嚴重性評估的觀點，開發人員在評估已發現安全問題的潛在影響時，應該採取什麼方法？
answer: 將漏洞視為比目前已知更嚴重的漏洞，並假設它們很容易被利用，即使它們看起來很難被利用
wrong_answers:
  - 只專注於可立即觀察到的影響，並根據目前已知的利用方法將弱點分類
  - 依據技術複雜性排定弱點的優先順序，並延遲修復理論上難以利用的問題
  - 單獨評估每個弱點，而不考慮多個次要問題如何結合起來造成重大的安全風險
explanation: |
  Maxwell 認為，開發人員應該將漏洞視為比表面看來更嚴重的問題，因為難以攻擊的問題只要有正確的技術就能變得微不足道，而看似次要的問題也可能升級為嚴重的威脅。他強調，簡單的效能錯誤可以被武器化，以分割網路並啟用 double-spending 攻擊。這種保守的方法承認開發人員一開始可能不瞭解漏洞的完整開發潛力，因此假設最壞的情況比低估威脅來得謹慎。
reviewed: false

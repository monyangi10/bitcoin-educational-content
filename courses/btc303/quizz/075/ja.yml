question: 脆弱性の重大度評価に関するグレゴリー・マクスウェルの見解によると、発見されたセキュリティ問題の潜在的な影響を評価するとき、開発者はどのようなアプローチをとるべきか？
answer: 現在知られているよりも深刻な脆弱性として扱い、悪用が困難に見える脆弱性であっても、容易に悪用される可能性があると想定する。
wrong_answers:
  - 直ちに観測可能な影響のみに焦点を当て、現在知られている悪用方法に基づいて脆弱性を分類する。
  - 技術的な複雑さに基づいて脆弱性の優先順位を決め、理論的に悪用が困難と思われる問題の修正を遅らせる。
  - 複数の些細な問題が組み合わさって重大なセキュリティリスクを引き起こす可能性を考慮せずに、各脆弱性を単独で評価する。
explanation: |
  マクスウェルは、脆弱性は見た目以上に深刻なものとして扱うべきだと主張する。なぜなら、攻略が難しい問題も、適切なテクニックを使えば些細なものになり、一見些細な問題が深刻な脅威へとエスカレートする可能性があるからだ。彼は、単純なパフォーマンス・バグがネットワークを分割し、double-spending攻撃を可能にする武器になり得ることを強調している。この保守的なアプローチは、開発者が脆弱性の完全な悪用の可能性を当初は理解していない可能性があることを認め、脅威を過小評価するのではなく、最悪のシナリオを想定することが賢明であるとしている。
question: भेद्यता गंभीरता मूल्यांकन पर ग्रेगरी मैक्सवेल के दृष्टिकोण के अनुसार, खोजे गए सुरक्षा मुद्दों के संभावित प्रभाव का मूल्यांकन करते समय डेवलपर्स को क्या दृष्टिकोण अपनाना चाहिए?
answer: कमजोरियों को वर्तमान में ज्ञात से अधिक गंभीर मानें और यह मान लें कि उनका आसानी से दोहन किया जा सकता है, भले ही उनका दोहन करना कठिन प्रतीत हो
wrong_answers:
  - केवल तत्काल देखे जा सकने वाले प्रभाव पर ध्यान केंद्रित करें और कमजोरियों को उनके वर्तमान ज्ञात शोषण विधियों के आधार पर वर्गीकृत करें
  - तकनीकी जटिलता के आधार पर कमजोरियों को प्राथमिकता दें और उन समस्याओं के समाधान में देरी करें जिनका फायदा उठाना सैद्धांतिक रूप से कठिन लगता है
  - प्रत्येक भेद्यता का अलग-अलग मूल्यांकन करें, बिना यह विचार किए कि कैसे अनेक छोटी-छोटी समस्याएं मिलकर बड़ी सुरक्षा जोखिम पैदा कर सकती हैं
explanation: |
  मैक्सवेल का तर्क है कि डेवलपर्स को कमज़ोरियों को उनकी प्रतीति से कहीं अधिक गंभीर मानना ​​चाहिए क्योंकि सही तकनीक से शोषण करने में मुश्किल समस्याएँ भी मामूली हो सकती हैं, और छोटी लगने वाली समस्याएँ गंभीर खतरों में बदल सकती हैं। वह इस बात पर ज़ोर देते हैं कि साधारण प्रदर्शन संबंधी बगों का इस्तेमाल नेटवर्क को विभाजित करने और double-spending हमलों को सक्षम करने के लिए किया जा सकता है। यह रूढ़िवादी दृष्टिकोण इस बात को स्वीकार करता है कि डेवलपर्स शुरुआत में किसी कमज़ोरी की पूरी शोषण क्षमता को नहीं समझ पाते हैं, इसलिए खतरे को कम आंकने के बजाय सबसे खराब स्थिति का अनुमान लगाना समझदारी है।

question: Enligt Gregory Maxwells perspektiv på bedömning av sårbarheters allvarlighetsgrad, vilket tillvägagångssätt bör utvecklare använda när de utvärderar den potentiella effekten av upptäckta säkerhetsproblem?
answer: Behandla sårbarheter som allvarligare än vad som för närvarande är känt och anta att de lätt kan utnyttjas även om de verkar svåra att utnyttja
wrong_answers:
  - Fokusera endast på den omedelbart observerbara effekten och kategorisera sårbarheter baserat på deras nuvarande kända exploateringsmetoder
  - Prioritera sårbarheter baserat på deras tekniska komplexitet och vänta med att åtgärda problem som teoretiskt sett verkar svåra att utnyttja
  - Utvärdera varje sårbarhet isolerat utan att beakta hur flera mindre problem kan kombineras för att skapa stora säkerhetsrisker
explanation: |
  Maxwell menar att utvecklare bör betrakta sårbarheter som allvarligare än de verkar eftersom svårutnyttjade problem kan bli triviala med rätt teknik, och till synes mindre problem kan eskalera till allvarliga hot. Han betonar att enkla prestandabuggar kan användas som vapen för att partitionera nätverket och möjliggöra double-spending-attacker. Detta konservativa förhållningssätt innebär att utvecklarna kanske inte förstår den fulla potentialen i en sårbarhet, vilket gör det klokt att utgå från det värsta tänkbara scenariot snarare än att underskatta hotet.
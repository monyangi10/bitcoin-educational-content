question: Gregory Maxwell'in güvenlik açığı önem derecesi değerlendirmesine ilişkin bakış açısına göre, geliştiriciler keşfedilen güvenlik sorunlarının potansiyel etkisini değerlendirirken hangi yaklaşımı benimsemelidir?
answer: Güvenlik açıklarını şu anda bilinenden daha ciddi olarak ele alın ve istismar edilmeleri zor görünse bile kolayca istismar edilebileceklerini varsayın
wrong_answers:
  - Yalnızca hemen gözlemlenebilir etkiye odaklanın ve güvenlik açıklarını bilinen mevcut istismar yöntemlerine göre kategorize edin
  - Güvenlik açıklarını teknik karmaşıklıklarına göre önceliklendirin ve teorik olarak istismar edilmesi zor görünen sorunlar için düzeltmeleri geciktirin
  - Birden fazla küçük sorunun nasıl bir araya gelerek büyük güvenlik riskleri oluşturabileceğini dikkate almadan her bir güvenlik açığını tek başına değerlendirmek
explanation: |
  Maxwell, geliştiricilerin güvenlik açıklarını göründüklerinden daha ciddi olarak ele almaları gerektiğini, çünkü istismar edilmesi zor sorunların doğru teknikle önemsiz hale gelebileceğini ve görünüşte küçük sorunların ciddi tehditlere dönüşebileceğini savunuyor. Basit performans hatalarının ağı bölmek ve double-spending saldırılarını mümkün kılmak için silah haline getirilebileceğini vurguluyor. Bu muhafazakar yaklaşım, geliştiricilerin başlangıçta bir güvenlik açığının tam istismar potansiyelini anlamayabileceğini kabul eder ve tehdidi hafife almak yerine en kötü senaryoyu varsaymayı ihtiyatlı hale getirir.

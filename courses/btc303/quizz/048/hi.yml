question: व्यवहार में प्रभावी ढंग से काम करने के बावजूद Bitcoin की सुरक्षा को औपचारिक रूप से साबित करना व्यावहारिक रूप से असंभव क्यों है?
answer: सिस्टम की जटिलता और अस्पष्ट प्रकृति औपचारिक सुरक्षा प्रमाणों को अव्यवहारिक बना देती है, जबकि स्पष्ट मान्यताओं वाले सरल प्रोटोकॉल ऐसा नहीं कर पाते।
wrong_answers:
  - Bitcoin डेवलपर्स लचीलापन बनाए रखने और भविष्य में प्रोटोकॉल संशोधनों की अनुमति देने के लिए जानबूझकर औपचारिक प्रमाणों से बचते हैं
  - असतत लघुगणक समस्या और क्रिप्टोग्राफ़िक मान्यताएँ वर्तमान गणितीय प्रमाण तकनीकों के लिए बहुत उन्नत हैं
  - औपचारिक सुरक्षा प्रमाण विरोधियों के लिए कमजोरियों को उजागर कर देंगे, इसलिए उन्हें मुख्य डेवलपर्स द्वारा वर्गीकृत रखा जाता है
explanation: |
  जैसा कि जेम्सन लोप बताते हैं, Bitcoin को इसकी अंतर्निहित जटिलता और अस्पष्ट प्रकृति के कारण किसी औपचारिक रूप से परिभाषित विनिर्देश या सुरक्षा मॉडल के बिना बनाया गया था। स्पष्ट सुरक्षा मान्यताओं वाले हस्ताक्षर प्रोटोकॉल जैसी सरल प्रणालियों के विपरीत, Bitcoin में क्रिप्टोग्राफी, अर्थशास्त्र, खेल सिद्धांत और मानव व्यवहार सहित कई परस्पर क्रियाशील घटक शामिल हैं। यह जटिलता सुरक्षा के औपचारिक गणितीय प्रमाण बनाना असंभव बना देती है, भले ही यह प्रणाली वास्तविक दुनिया में व्यावहारिक सुरक्षा का प्रदर्शन करती हो।
reviewed: false

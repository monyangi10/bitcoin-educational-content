question: 為什麼儘管 Bitcoin 在實務上行之有效，但實際上卻無法正式證明其安全性？
answer: 系統的複雜性和模糊性使得正式的安全性證明並不可行，這與具有明確假設的簡單通訊協定不同
wrong_answers:
  - Bitcoin 開發人員刻意避免正式證明，以維持彈性，並允許未來的通訊協定修改
  - 離散對數問題和密碼假設對目前的數學證明技術而言太過先進
  - 正式的安全性證明會向對手揭露弱點，因此核心開發人員會將其保密。
explanation: |
  正如 Jameson Lopp 所說，由於 Bitcoin 本身的複雜性和模糊性，因此在建立 Bitcoin 時並沒有正式定義的規格或安全模型。與簽章協定等有明確安全假設的簡單系統不同，Bitcoin 涉及多種互動元件，包括密碼學、經濟學、博弈理論和人類行為。這種複雜性使得我們無法建立正式的安全數學證明，儘管系統透過實際運作證明了實際的安全性。
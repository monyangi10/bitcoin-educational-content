question: Porque é que é praticamente impossível provar formalmente a segurança do Bitcoin, apesar de funcionar eficazmente na prática?
answer: A complexidade e a natureza nebulosa do sistema tornam inviáveis as provas formais de segurança, ao contrário dos protocolos mais simples com pressupostos claros
wrong_answers:
  - Os criadores do Bitcoin evitam intencionalmente as provas formais para manter a flexibilidade e permitir futuras modificações do protocolo
  - O problema do logaritmo discreto e os pressupostos criptográficos são demasiado avançados para as actuais técnicas de prova matemática
  - As provas formais de segurança revelariam vulnerabilidades aos adversários, pelo que são mantidas confidenciais pelos programadores principais
explanation: |
  Como explica Jameson Lopp, o Bitcoin foi construído sem uma especificação formalmente definida ou modelo de segurança devido à sua complexidade inerente e natureza nebulosa. Ao contrário de sistemas mais simples, como os protocolos de assinatura, que têm pressupostos de segurança bem definidos, o Bitcoin envolve múltiplos componentes que interagem entre si, incluindo criptografia, economia, teoria dos jogos e comportamento humano. Esta complexidade impossibilita a criação de provas matemáticas formais de segurança, embora o sistema demonstre segurança prática através do funcionamento no mundo real.

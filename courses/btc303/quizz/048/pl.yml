question: Dlaczego praktycznie niemożliwe jest formalne udowodnienie bezpieczeństwa Bitcoin, mimo że działa on skutecznie w praktyce?
answer: Złożoność i mglisty charakter systemu sprawiają, że formalne dowody bezpieczeństwa są niewykonalne, w przeciwieństwie do prostszych protokołów z jasnymi założeniami
wrong_answers:
  - Twórcy Bitcoin celowo unikają formalnych dowodów, aby zachować elastyczność i umożliwić przyszłe modyfikacje protokołu
  - Problem logarytmu dyskretnego i założenia kryptograficzne są zbyt zaawansowane dla obecnych technik dowodu matematycznego
  - Formalne dowody bezpieczeństwa ujawniłyby luki w zabezpieczeniach przeciwnikom, więc są one utrzymywane w tajemnicy przez deweloperów rdzenia
explanation: |
  Jak wyjaśnia Jameson Lopp, Bitcoin został zbudowany bez formalnie zdefiniowanej specyfikacji lub modelu bezpieczeństwa ze względu na jego nieodłączną złożoność i mglistą naturę. W przeciwieństwie do prostszych systemów, takich jak protokoły podpisywania, które mają jasne założenia dotyczące bezpieczeństwa, Bitcoin obejmuje wiele współdziałających ze sobą komponentów, w tym kryptografię, ekonomię, teorię gier i ludzkie zachowanie. Ta złożoność uniemożliwia stworzenie formalnych matematycznych dowodów bezpieczeństwa, mimo że system demonstruje praktyczne bezpieczeństwo poprzez działanie w świecie rzeczywistym.
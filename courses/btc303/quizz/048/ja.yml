question: Bitcoinが実際に有効に機能しているにもかかわらず、その安全性を公式に証明することが事実上不可能なのはなぜか？
answer: システムの複雑さと漠然とした性質は、明確な仮定を持つ単純なプロトコルとは異なり、形式的なセキュリティ証明を実行不可能にする。
wrong_answers:
  - Bitcoinの開発者は、柔軟性を維持し、将来のプロトコルの修正を可能にするために、意図的に正式な証明を避けている
  - 離散対数問題と暗号の仮定は、現在の数学的証明技術では高度すぎる。
  - 形式的なセキュリティ証明は、敵対者に脆弱性を明らかにしてしまうので、コア開発者は機密にしている。
explanation: |
  ジェイムソン・ロップが説明するように、Bitcoinは、その本質的な複雑さと漠然とした性質のために、正式に定義された仕様やセキュリティ・モデルなしに構築された。署名プロトコルのようにセキュリティの前提が明確な単純なシステムとは異なり、Bitcoinは暗号学、経済学、ゲーム理論、人間行動学など複数の相互作用する要素を含んでいる。この複雑さは、システムが実際の運用を通じて実用的なセキュリティを実証しているにもかかわらず、セキュリティの公式な数学的証明を作成することを不可能にしている。
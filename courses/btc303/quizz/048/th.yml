question: ทำไมจึงแทบจะเป็นไปไม่ได้เลยที่จะพิสูจน์ความปลอดภัยของ Bitcoin อย่างเป็นทางการแม้ว่ามันจะทำงานได้อย่างมีประสิทธิภาพในทางปฏิบัติ?
answer: ความซับซ้อนและลักษณะที่ไม่ชัดเจนของระบบทำให้การพิสูจน์ความปลอดภัยอย่างเป็นทางการเป็นไปไม่ได้ ต่างจากโปรโตคอลที่ง่ายกว่าซึ่งมีสมมติฐานที่ชัดเจน
wrong_answers:
  - นักพัฒนา Bitcoin จงใจหลีกเลี่ยงการพิสูจน์อย่างเป็นทางการเพื่อรักษาความยืดหยุ่นและอนุญาตให้มีการปรับเปลี่ยนโปรโตคอลในอนาคต
  - ปัญหาลอการิทึมแบบไม่ต่อเนื่องและสมมติฐานการเข้ารหัสลับนั้นซับซ้อนเกินไปสำหรับเทคนิคการพิสูจน์ทางคณิตศาสตร์ในปัจจุบัน
  - การพิสูจน์ความปลอดภัยอย่างเป็นทางการจะเปิดเผยช่องโหว่ให้กับฝ่ายตรงข้าม ดังนั้นจึงถูกเก็บเป็นความลับโดยนักพัฒนาหลัก
explanation: |
  ตามที่ Jameson Lopp อธิบาย Bitcoin ถูกสร้างขึ้นโดยไม่มีการกำหนดสเปคหรือโมเดลความปลอดภัยอย่างเป็นทางการเนื่องจากความซับซ้อนและลักษณะที่ไม่ชัดเจน แตกต่างจากระบบที่ง่ายกว่าเช่นโปรโตคอลการลงนามที่มีสมมติฐานความปลอดภัยที่ชัดเจน Bitcoin เกี่ยวข้องกับส่วนประกอบที่มีปฏิสัมพันธ์กันหลายอย่างรวมถึงการเข้ารหัสลับ เศรษฐศาสตร์ ทฤษฎีเกม และพฤติกรรมมนุษย์ ความซับซ้อนนี้ทำให้ไม่สามารถสร้างหลักฐานทางคณิตศาสตร์อย่างเป็นทางการเกี่ยวกับความปลอดภัยได้ แม้ว่าระบบจะแสดงให้เห็นถึงความปลอดภัยในทางปฏิบัติผ่านการดำเนินงานในโลกจริงก็ตาม
reviewed: false
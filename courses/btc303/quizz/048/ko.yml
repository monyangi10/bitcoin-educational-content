question: Bitcoin이 실제로 효과적으로 작동함에도 불구하고 공식적으로 보안을 증명하는 것이 사실상 불가능한 이유는 무엇인가요?
answer: 시스템의 복잡성과 모호한 특성으로 인해 명확한 가정을 가진 단순한 프로토콜과 달리 공식적인 보안 증명이 불가능합니다
wrong_answers:
  - Bitcoin 개발자는 유연성을 유지하고 향후 프로토콜 수정을 허용하기 위해 의도적으로 공식 증명을 피합니다
  - 이산 로그 문제와 암호학적 가정은 현재의 수학적 증명 기법으로는 너무 고차원적입니다
  - 공식적인 보안 증명을 하면 공격자에게 취약점이 노출될 수 있으므로 핵심 개발자에 의해 기밀로 유지됩니다
explanation: |
  제임슨 롭의 설명에 따르면, Bitcoin는 내재된 복잡성과 모호한 특성으로 인해 공식적으로 정의된 사양이나 보안 모델 없이 구축되었습니다. 보안 가정이 명확한 서명 프로토콜과 같은 단순한 시스템과 달리 Bitcoin에는 암호화, 경제학, 게임 이론, 인간 행동 등 여러 가지 상호 작용하는 구성 요소가 포함되어 있습니다. 이러한 복잡성 때문에 시스템이 실제 작동을 통해 실질적인 보안을 입증하더라도 보안에 대한 공식적인 수학적 증명을 만드는 것은 불가능합니다.

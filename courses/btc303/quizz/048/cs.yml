question: Proč je prakticky nemožné formálně prokázat bezpečnost Bitcoin, přestože v praxi funguje efektivně?
answer: Složitost systému a jeho mlhavá povaha znemožňují formální důkazy bezpečnosti, na rozdíl od jednodušších protokolů s jasnými předpoklady
wrong_answers:
  - Vývojáři Bitcoin se záměrně vyhýbají formálním důkazům, aby zachovali flexibilitu a umožnili budoucí úpravy protokolu
  - Problém diskrétního logaritmu a kryptografické předpoklady jsou příliš pokročilé pro současné matematické důkazní techniky
  - Formální důkazy bezpečnosti by protivníkům odhalily zranitelnosti, proto je vývojáři jádra utajují
explanation: |
  Jak vysvětluje Jameson Lopp, systém Bitcoin byl vytvořen bez formálně definované specifikace nebo bezpečnostního modelu kvůli své vlastní složitosti a mlhavé povaze. Na rozdíl od jednodušších systémů, jako jsou podpisové protokoly, které mají jasně stanovené bezpečnostní předpoklady, Bitcoin zahrnuje více vzájemně se ovlivňujících složek včetně kryptografie, ekonomie, teorie her a lidského chování. Tato složitost znemožňuje vytvoření formálních matematických důkazů bezpečnosti, přestože systém prokazuje praktickou bezpečnost prostřednictvím reálného provozu.

question: Ni kuki mu vy’ukuri bidashoboka kwemeza mu buryo butegekanijwe umutekano wa Bitcoin naho ikora neza mu bikorwa?
answer: Uko ubuhinga butoroshe kandi buteye ubwoba bituma ibimenyamenya vy’umutekano bidashoboka, bitandukanye n’amategeko yoroshe afise ivyiyumviro bitomoye
wrong_answers:
  - Abahinguzi ba Bitcoin baririnda n'ibigirankana ibimenyamenya bitegekanijwe kugira ngo bagume bafise ubushobozi bwo guhindura ibintu kandi bashobore guhindura amasezerano muri kazoza
  - Ikibazo ca logarithme n'ivyiyumviro vy'ubuhinga bwa none birateye imbere cane ku buhinga bwo gutanga ibimenyamenya vy'imibare
  - Ivyemezo vy’umutekano vyemewe vyokwerekana ubugoyagoye ku bansi, rero bigumwa mu rwego rw’abahinguzi b’ingenzi
explanation: |
  Nk’uko Jameson Lopp abisigura, Bitcoin yubatswe ata n’imwe isobanuwe neza canke ata n’itegeko ry’umutekano kubera uburemere bwayo n’uburyo buteye ubwoba. Udakunze uburyo bworoshe nk’ugusinya amasezerano afise ivyiyumviro vy’umutekano bitomoye, Bitcoin irimwo ibice vyinshi bikorana harimwo ubuhinga bwo gukingira amakuru, ubutunzi, inyigisho y’imikino, n’inyifato y’umuntu. Ukwo gusobanuka gutuma bidashoboka kurema ibimenyamenya vy’imibare vyemewe vy’umutekano, naho nyene iyo nzira yerekana umutekano ukora biciye mu bikorwa vy’ukuri.

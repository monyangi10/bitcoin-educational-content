question: 为什么尽管 Bitcoin 在实践中行之有效，但实际上却无法正式证明其安全性？
answer: 系统的复杂性和模糊性使得正式的安全证明变得不可行，这与具有明确假设的简单协议不同
wrong_answers:
  - Bitcoin 开发人员有意避免正式证明，以保持灵活性，并允许未来对协议进行修改
  - 离散对数问题和密码假设对于目前的数学证明技术而言过于先进
  - 正式的安全证明会向对手暴露漏洞，因此核心开发人员将其保密
explanation: |
  正如詹姆森-洛普（Jameson Lopp）所解释的，由于 Bitcoin 本身的复杂性和模糊性，因此在构建 Bitcoin 时没有正式定义的规范或安全模型。与签名协议等具有明确安全假设的简单系统不同，Bitcoin 涉及多个相互作用的组成部分，包括密码学、经济学、博弈论和人类行为。这种复杂性使其无法创建正式的安全数学证明，尽管该系统通过现实世界的运行证明了实际的安全性。
reviewed: false

question: ¿Qué tipo de ataque implica que una única entidad controle varios nodos para que aparezcan como varias entidades, y por qué no es eficaz contra el mecanismo de consenso de Bitcoin?
answer: Ataque Sybil; es ineficaz porque Bitcoin utiliza la potencia de cálculo de proof-of-work para el consenso en lugar de contar los nodos
wrong_answers:
  - "Ataque Eclipse; es ineficaz porque Bitcoin cifra todas las comunicaciones de los nodos mediante protocolos criptográficos avanzados"
  - "Ataque de denegación de servicio; es ineficaz porque Bitcoin redistribuye automáticamente el tráfico por los nodos sanos de la red"
  - "Ataque de ingeniería social; es ineficaz porque los desarrolladores de Bitcoin utilizan métodos de verificación formal para evitar la manipulación"
explanation: |
  Un ataque Sybil se produce cuando una entidad controla varios nodos para hacerse pasar por muchas entidades distintas. Sin embargo, este ataque es ineficaz contra Bitcoin porque la red no se basa en el recuento de nodos ni en la votación democrática entre los participantes de la red. En su lugar, Bitcoin utiliza el consenso proof-of-work, en el que la potencia de cálculo (hashpower) determina las decisiones de la red, no el número de nodos. Esto hace imposible que un atacante gane influencia simplemente haciendo funcionar muchos nodos sin los recursos computacionales correspondientes.

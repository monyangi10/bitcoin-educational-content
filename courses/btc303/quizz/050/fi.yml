question: Minkälaisessa hyökkäyksessä yksi taho kontrolloi useita solmuja esiintyäkseen useina tahoina, ja miksi se ei ole tehokas Bitcoin:n konsensusmekanismia vastaan?
answer: Sybil-hyökkäys; se on tehoton, koska Bitcoin käyttää proof-of-work:n laskentatehoa konsensukseen sen sijaan, että laskisi solmuja
wrong_answers:
  - "Eclipse-hyökkäys; se on tehoton, koska Bitcoin salaa kaiken solmujen viestinnän kehittyneiden salausprotokollien avulla"
  - "Palvelunestohyökkäys; se on tehoton, koska Bitcoin jakaa liikenteen automaattisesti uudelleen verkon terveiden solmujen välillä"
  - "Sosiaalisen suunnittelun hyökkäys; se on tehoton, koska Bitcoin:n kehittäjät käyttävät muodollisia todentamismenetelmiä manipuloinnin estämiseksi"
explanation: |
  Sybil-hyökkäys tapahtuu, kun yksi taho hallitsee useita solmuja ja naamioituu moneksi erilliseksi tahoksi. Tämä hyökkäys on kuitenkin tehoton Bitcoin:ää vastaan, koska verkko ei perustu solmujen laskentaan tai demokraattiseen äänestykseen verkon osallistujien kesken. Sen sijaan Bitcoin käyttää proof-of-work-konsensusta, jossa laskentateho (hashpower) määrittää verkon päätökset, ei solmujen lukumäärä. Tämän vuoksi hyökkääjän on mahdotonta saada vaikutusvaltaa yksinkertaisesti käyttämällä monia solmuja ilman vastaavia laskentaresursseja.
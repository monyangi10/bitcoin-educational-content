question: Loại tấn công nào liên quan đến một thực thể duy nhất kiểm soát nhiều nút để xuất hiện dưới dạng nhiều thực thể và tại sao nó không hiệu quả với cơ chế đồng thuận của Bitcoin?
answer: Tấn công Sybil; nó không hiệu quả vì Bitcoin sử dụng sức mạnh tính toán của proof-of-work để đồng thuận thay vì đếm các nút
wrong_answers:
  - "Tấn công Eclipse; nó không hiệu quả vì Bitcoin mã hóa tất cả các liên lạc của nút bằng các giao thức mật mã tiên tiến"
  - "Tấn công từ chối dịch vụ; không hiệu quả vì Bitcoin tự động phân phối lại lưu lượng trên các nút khỏe mạnh trong mạng"
  - "Tấn công kỹ thuật xã hội; nó không hiệu quả vì các nhà phát triển Bitcoin sử dụng các phương pháp xác minh chính thức để ngăn chặn thao túng"
explanation: |
  Tấn công Sybil xảy ra khi một thực thể kiểm soát nhiều nút để ngụy trang thành nhiều thực thể riêng biệt. Tuy nhiên, tấn công này không hiệu quả với Bitcoin vì mạng không dựa vào việc đếm số nút hay bỏ phiếu dân chủ giữa những người tham gia mạng. Thay vào đó, Bitcoin sử dụng cơ chế đồng thuận proof-of-work, trong đó sức mạnh tính toán (hashpower) quyết định các quyết định của mạng, chứ không phải số lượng nút. Điều này khiến kẻ tấn công không thể gây ảnh hưởng chỉ bằng cách chạy nhiều nút mà không có đủ tài nguyên tính toán tương ứng.
question: Какъв тип атака включва един субект, който контролира множество възли, за да изглежда като множество субекти, и защо тя не е ефективна срещу механизма за консенсус на Bitcoin?
answer: Атака от типа "Sybil"; тя е неефективна, тъй като Bitcoin използва изчислителната мощ на proof-of-work за постигане на консенсус, а не за преброяване на възлите
wrong_answers:
  - "Атака на Eclipse; тя е неефективна, защото Bitcoin криптира всички комуникации на възлите с помощта на усъвършенствани криптографски протоколи"
  - "Атака за отказ на услуга; тя е неефективна, защото Bitcoin автоматично преразпределя трафика между здрави възли в мрежата"
  - "Атака на социалното инженерство; тя е неефективна, защото разработчиците на Bitcoin използват методи за формална проверка, за да предотвратят манипулирането"
explanation: |
  Атаката на Сибил се случва, когато едно лице контролира множество възли, за да се маскира като много отделни лица. Тази атака обаче е неефективна срещу Bitcoin, тъй като мрежата не разчита на преброяване на възли или демократично гласуване сред участниците в мрежата. Вместо това Bitcoin използва консенсус proof-of-work, при който изчислителната мощ (hashpower) определя решенията в мрежата, а не броя на възлите. Това прави невъзможно за атакуващия да получи влияние просто чрез пускането на много възли без съответните изчислителни ресурси.
reviewed: false

question: Ni ubuhe bwoko bw’igitero bujanye n’ikintu kimwe kigenzura amanode menshi kugira ngo kigaragare nk’ibigo vyinshi, kandi ni kuki kitagira akamaro ku buryo bwo kwumvikana bwa Bitcoin?
answer: Igitero ca Sybil; ntaco bimaze kuko Bitcoin ikoresha ubushobozi bwo guharura proof-of-work kugira ngo umuntu yemerane aho kubara amanode
wrong_answers:
  - "Igitero c'Ukwiragira; ntaco kimaze kuko Bitcoin ipfuka amakuru yose y'ivy'itumanaho ikoresheje amasezerano ateye imbere"
  - "Igitero co kwanka gutanga ubufasha; ntaco bimaze kuko Bitcoin ihita itanga uruja n'uruza ku nzira zifise amagara meza mu rubuga"
  - "Igitero c'ubuhinga bw'imibano; ntaco kimaze kuko abakora Bitcoin bakoresha uburyo bwo kugenzura busanzwe kugira ngo ntibakoreshe nabi"
explanation: |
  Igitero ca Sybil kiba iyo ikintu kimwe kigenzura ama node menshi kugira ngo kibe nk’ibintu vyinshi bitandukanye. Ariko rero, ico gitero ntaco kimaze kuri Bitcoin kuko iyo nzira ntiyizigira guharura amanode canke gutora mu buryo bwa demokarasi mu bari muri iyo nzira. Ahubwo, Bitcoin ikoresha ubumwe bwa proof-of-work aho ububasha bwo guharura (hashpower) bugena ingingo z’uruja n’uruza, atari umubare w’ibihimba. Ivyo bituma uwutera adashobora kuronka ububasha mu gukoresha gusa ama node menshi ata bikoresho vy’ibarabara bihuye.

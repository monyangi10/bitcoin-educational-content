question: การโจมตีประเภทใดที่เกี่ยวข้องกับเอนทิตีเดียวที่ควบคุมโหนดหลายโหนดเพื่อให้ปรากฏเป็นเอนทิตีหลายตัว และทำไมมันถึงไม่มีประสิทธิภาพต่อกลไกฉันทามติของ Bitcoin?
answer: การโจมตี Sybil; มันไม่มีประสิทธิภาพเพราะ Bitcoin ใช้พลังการประมวลผลของ proof-of-work สำหรับการทำฉันทามติแทนที่จะนับจำนวนโหนด
wrong_answers:
  - "การโจมตีแบบ Eclipse; มันไม่มีประสิทธิภาพเพราะ Bitcoin เข้ารหัสการสื่อสารของโหนดทั้งหมดโดยใช้โปรโตคอลการเข้ารหัสขั้นสูง"
  - "การโจมตีแบบปฏิเสธการให้บริการ; มันไม่มีประสิทธิภาพเพราะ Bitcoin จะกระจายการจราจรไปยังโหนดที่มีสุขภาพดีในเครือข่ายโดยอัตโนมัติ"
  - "การโจมตีทางวิศวกรรมสังคม; มันไม่มีประสิทธิภาพเพราะนักพัฒนา Bitcoin ใช้วิธีการตรวจสอบอย่างเป็นทางการเพื่อป้องกันการปลอมแปลง"
explanation: |
  การโจมตี Sybil เกิดขึ้นเมื่อหน่วยงานหนึ่งควบคุมโหนดหลายโหนดเพื่อแสร้งทำเป็นหลายหน่วยงานแยกกัน อย่างไรก็ตาม การโจมตีนี้ไม่มีประสิทธิภาพต่อ Bitcoin เพราะเครือข่ายไม่ได้พึ่งพาการนับจำนวนโหนดหรือการลงคะแนนเสียงแบบประชาธิปไตยในหมู่ผู้เข้าร่วมเครือข่าย แต่ Bitcoin ใช้ฉันทามติของ proof-of-work ที่พลังการคำนวณ (hashpower) เป็นตัวกำหนดการตัดสินใจของเครือข่าย ไม่ใช่จำนวนโหนด ซึ่งทำให้เป็นไปไม่ได้ที่ผู้โจมตีจะมีอิทธิพลเพียงแค่การรันโหนดจำนวนมากโดยไม่มีทรัพยากรการคำนวณที่สอดคล้องกัน
reviewed: false
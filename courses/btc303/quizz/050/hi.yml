question: किस प्रकार के हमले में एक ही इकाई कई नोड्स को नियंत्रित करके उन्हें कई इकाइयों के रूप में प्रदर्शित करती है, तथा यह Bitcoin के सर्वसम्मति तंत्र के विरुद्ध प्रभावी क्यों नहीं है?
answer: सिबिल हमला; यह अप्रभावी है क्योंकि Bitcoin नोड्स की गिनती करने के बजाय सहमति के लिए proof-of-work कंप्यूटिंग शक्ति का उपयोग करता है
wrong_answers:
  - "एक्लिप्स हमला; यह अप्रभावी है क्योंकि Bitcoin उन्नत क्रिप्टोग्राफ़िक प्रोटोकॉल का उपयोग करके सभी नोड संचारों को एन्क्रिप्ट करता है"
  - "सेवा अस्वीकार हमला; यह अप्रभावी है क्योंकि Bitcoin स्वचालित रूप से नेटवर्क में स्वस्थ नोड्स में ट्रैफ़िक को पुनर्वितरित करता है"
  - "सोशल इंजीनियरिंग हमला; यह अप्रभावी है क्योंकि Bitcoin डेवलपर्स हेरफेर को रोकने के लिए औपचारिक सत्यापन विधियों का उपयोग करते हैं"
explanation: |
  सिबिल हमला तब होता है जब एक इकाई कई नोड्स को नियंत्रित करके कई अलग-अलग इकाइयों का रूप धारण कर लेती है। हालाँकि, यह हमला Bitcoin के विरुद्ध अप्रभावी है क्योंकि नेटवर्क नोड्स की गिनती या नेटवर्क प्रतिभागियों के बीच लोकतांत्रिक मतदान पर निर्भर नहीं करता है। इसके बजाय, Bitcoin, proof-of-work सर्वसम्मति का उपयोग करता है जहाँ कंप्यूटिंग शक्ति (हैशपावर) नेटवर्क के निर्णयों को निर्धारित करती है, न कि नोड्स की संख्या। इससे किसी हमलावर के लिए बिना संबंधित कंप्यूटिंग संसाधनों के कई नोड्स चलाकर प्रभाव प्राप्त करना असंभव हो जाता है।
reviewed: false

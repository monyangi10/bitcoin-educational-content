question: Jaký typ útoku spočívá v tom, že jedna entita ovládá více uzlů, aby se tvářily jako více entit, a proč není účinný proti konsenzuálnímu mechanismu Bitcoin?
answer: Sybilův útok; je neúčinný, protože Bitcoin využívá výpočetní výkon proof-of-work ke konsensu, nikoli k počítání uzlů
wrong_answers:
  - "Útok Eclipse; je neúčinný, protože Bitcoin šifruje veškerou komunikaci s uzly pomocí pokročilých kryptografických protokolů."
  - "Útok typu Denial-of-Service; je neúčinný, protože Bitcoin automaticky přerozděluje provoz mezi zdravé uzly v síti."
  - "Útok sociálního inženýrství; je neúčinný, protože vývojáři Bitcoin používají formální metody ověřování, aby zabránili manipulaci."
explanation: |
  K útoku Sybil dochází, když jedna entita ovládá více uzlů a vydává se za mnoho samostatných entit. Tento útok je však proti Bitcoin neúčinný, protože síť nespoléhá na počítání uzlů nebo demokratické hlasování mezi účastníky sítě. Místo toho Bitcoin využívá konsenzus proof-of-work, kde o rozhodnutích sítě rozhoduje výpočetní výkon (hashpower), nikoli počet uzlů. To znemožňuje útočníkovi získat vliv pouhým spuštěním mnoha uzlů bez odpovídajících výpočetních zdrojů.
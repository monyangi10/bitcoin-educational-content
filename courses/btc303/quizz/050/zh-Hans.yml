question: 哪种类型的攻击涉及单个实体控制多个节点以显示为多个实体，为什么它对比特币的共识机制无效？
answer: 女巫攻击（Sybil Attack）；由于比特币使用工作证明的计算能力达成共识，而不是计算节点，因此无效
wrong_answers:
  - 日蚀攻击（Eclipse Attack）；这是无效的，因为比特币使用先进的加密协议对所有节点通信进行加密
  - 拒绝服务攻击；由于比特币会自动在网络中的健康节点上重新分配流量，因此攻击无效
  - 社会工程攻击；这是无效的，因为比特币开发者使用正式验证方法来防止操纵
explanation: |
  当一个实体控制多个节点以伪装成多个独立实体时，就会发生女巫攻击。但是，这种攻击对比特币无效，因为该网络并不依赖于节点计数或网络参与者之间的民主投票。相反，比特币采用的是工作证明共识，由计算能力决定网络决策，而不是节点数量。这使得攻击者不可能仅仅通过运行许多没有相应计算资源的节点来获得影响力。

question: 哪种类型的攻击涉及单个实体控制多个节点以显示为多个实体，为什么它对 Bitcoin 的共识机制无效？
answer: 假冒者攻击；由于 Bitcoin 使用 proof-of-work 的计算能力达成共识，而不是计算节点，因此无效
wrong_answers:
  - "Eclipse攻击；这是无效的，因为Bitcoin使用先进的加密协议对所有节点通信进行加密"
  - "拒绝服务攻击；由于 Bitcoin 会自动在网络中的健康节点上重新分配流量，因此攻击无效"
  - "社会工程学攻击；这是无效的，因为 Bitcoin 开发人员使用正式验证方法来防止操纵"
explanation: |
  当一个实体控制多个节点以伪装成多个独立实体时，就会发生 Sybil 攻击。但是，这种攻击对 Bitcoin 无效，因为该网络并不依赖于节点计数或网络参与者之间的民主投票。相反，Bitcoin 采用的是 proof-of-work 共识，由计算能力（hashpower）决定网络决策，而不是节点数量。这使得攻击者不可能仅仅通过运行许多没有相应计算资源的节点来获得影响力。
reviewed: false

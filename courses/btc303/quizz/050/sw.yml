question: Ni aina gani ya shambulio linalohusisha huluki moja inayodhibiti nodi nyingi kuonekana kama huluki nyingi, na kwa nini haifai dhidi ya utaratibu wa makubaliano wa Bitcoin?
answer: Shambulio la Sybil; haifanyi kazi kwa sababu Bitcoin hutumia nguvu ya kompyuta ya proof-of-work kwa makubaliano badala ya kuhesabu nodi.
wrong_answers:
  - "Shambulio la Eclipse; haifanyi kazi kwa sababu Bitcoin husimba mawasiliano yote ya nodi kwa kutumia itifaki za hali ya juu za siri"
  - "Shambulio la kunyimwa huduma; halifanyi kazi kwa sababu Bitcoin inasambaza tena trafiki kwenye maeneo yenye afya kwenye mtandao"
  - "Shambulio la uhandisi wa kijamii; haifanyi kazi kwa sababu watengenezaji wa Bitcoin hutumia njia rasmi za uthibitishaji ili kuzuia udanganyifu"
explanation: |
  Shambulio la Sybil hutokea wakati huluki moja inadhibiti nodi nyingi ili kugeuza huluki nyingi tofauti. Hata hivyo, shambulio hili halifanyi kazi dhidi ya Bitcoin kwa sababu mtandao hautegemei kuhesabu nodi au upigaji kura wa kidemokrasia kati ya washiriki wa mtandao. Badala yake, Bitcoin hutumia makubaliano ya proof-of-work ambapo nguvu ya kompyuta (hashpower) huamua maamuzi ya mtandao, si idadi ya nodi. Hii inafanya kuwa haiwezekani kwa mshambulizi kupata ushawishi kwa kuendesha nodi nyingi bila rasilimali za hesabu zinazolingana.
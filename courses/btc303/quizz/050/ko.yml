question: 단일 엔티티가 여러 노드를 제어하여 여러 엔티티로 보이게 하는 공격에는 어떤 유형이 있으며, Bitcoin의 합의 메커니즘에 효과적이지 않은 이유는 무엇인가요?
answer: 시빌 공격; Bitcoin는 노드를 계산하는 것이 아니라 합의를 위해 proof-of-work 컴퓨팅 파워를 사용하기 때문에 효과적이지 않습니다
wrong_answers:
  - "이클립스 공격, Bitcoin는 고급 암호화 프로토콜을 사용하여 모든 노드 통신을 암호화하기 때문에 효과적이지 않습니다."
  - "서비스 거부 공격, Bitcoin가 네트워크의 정상 노드에 트래픽을 자동으로 재분배하기 때문에 효과적이지 않습니다."
  - "소셜 엔지니어링 공격, Bitcoin 개발자는 조작을 방지하기 위해 공식적인 검증 방법을 사용하기 때문에 효과적이지 않습니다."
explanation: |
  시빌 공격은 한 개체가 여러 개의 노드를 제어하여 여러 개의 개별 개체로 가장할 때 발생합니다. 그러나 이 공격은 네트워크가 노드 수나 네트워크 참여자 간의 민주적 투표에 의존하지 않기 때문에 Bitcoin에는 효과적이지 않습니다. 대신, Bitcoin은 노드 수가 아닌 컴퓨팅 파워(해시파워)가 네트워크 결정을 결정하는 proof-of-work 합의를 사용합니다. 따라서 공격자는 해당 컴퓨팅 리소스 없이 많은 노드를 실행하는 것만으로 영향력을 행사할 수 없습니다.

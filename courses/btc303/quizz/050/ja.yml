question: また、なぜBitcoinのコンセンサスメカニズムに対して有効でないのか？
answer: シビル攻撃。Bitcoinはノードを数えるのではなく、proof-of-workの計算能力をコンセンサスのために使用するため、効果はない。
wrong_answers:
  - 「Bitcoinは高度な暗号プロトコルを使ってすべてのノード通信を暗号化するため、エクリプス攻撃は無効である。
  - 「サービス拒否攻撃。Bitcoinはネットワーク内の健全なノードにトラフィックを自動的に再分配するので効果がない。
  - "ソーシャル・エンジニアリング攻撃。Bitcoinの開発者は形式的な検証方法で操作を防いでいるため、効果はない"
explanation: |
  シビル攻撃は、1つのエンティティが複数のノードをコントロールし、多くの別個のエンティティになりすますことで発生する。しかし、Bitcoinはノードのカウントやネットワーク参加者の民主的な投票に依存していないため、この攻撃はBitcoinに対して効果がない。Bitcoinでは、ノードの数ではなく、計算能力（ハッシュパワー）がネットワークの決定を決定するproof-of-workコンセンサスを採用している。このため、攻撃者は、対応する計算資源を持たないノードを多数走らせるだけで、影響力を得ることは不可能である。
question: 単一の主体が複数のノードを制御して、あたかも複数の主体のように見せかける攻撃の種類は何ですか？また、なぜその攻撃はビットコインのコンセンサス・メカニズムに対して有効ではないのですか？
answer: シビル攻撃：ビットコインはノード数を数えるのではなく、プルーフ・オブ・ワーク（PoW）による計算能力で合意形成を行うため、この攻撃は効果がありません
wrong_answers:
  - ビットコインは高度な暗号プロトコルを使ってすべてのノード通信を暗号化するため、エクリプス攻撃は無効である
  - サービス拒否攻撃：ビットコインはネットワーク内の健全なノードにトラフィックを自動的に再分配するので効果がない
  - ソーシャル・エンジニアリング攻撃：ビットコインの開発者は形式的な検証方法で操作を防いでいるため、効果はない
explanation: |
  シビル攻撃は、1つの主体が複数のノードをコントロールし、多くの別個の主体になりすますことで発生する。しかし、ビットコインはノードのカウントやネットワーク参加者の民主的な投票に依存していないため、この攻撃はビットコインに対して効果がない。ビットコインでは、ノードの数ではなく、計算能力（ハッシュパワー）がネットワークの決定を決定するプルーフ・オブ・ワーク（PoW）コンセンサスを採用している。このため、攻撃者は、対応する計算資源を持たないノードを多数走らせるだけで、影響力を得ることは不可能である。
reviewed: false

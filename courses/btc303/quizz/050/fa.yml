question: چه نوع حمله‌ای شامل یک نهاد واحد است که چندین گره را کنترل می‌کند تا به عنوان چندین نهاد ظاهر شود، و چرا این حمله علیه مکانیزم اجماع Bitcoin مؤثر نیست؟
answer: حمله Sybil؛ این حمله بی‌اثر است زیرا Bitcoin از قدرت محاسباتی proof-of-work برای اجماع استفاده می‌کند و نه شمارش نودها.
wrong_answers:
  - "حمله خورشیدی؛ این بی‌اثر است زیرا Bitcoin تمام ارتباطات نودها را با استفاده از پروتکل‌های رمزنگاری پیشرفته رمزگذاری می‌کند"
  - "حمله انکار سرویس؛ این بی‌اثر است زیرا Bitcoin به‌طور خودکار ترافیک را در میان گره‌های سالم شبکه توزیع مجدد می‌کند"
  - "حمله مهندسی اجتماعی؛ این بی‌اثر است زیرا توسعه‌دهندگان Bitcoin از روش‌های تأیید رسمی برای جلوگیری از دستکاری استفاده می‌کنند"
explanation: |
  حمله سیبیل زمانی رخ می‌دهد که یک موجودیت چندین گره را کنترل می‌کند تا به عنوان چندین موجودیت جداگانه ظاهر شود. با این حال، این حمله علیه Bitcoin بی‌اثر است زیرا شبکه به شمارش گره‌ها یا رأی‌گیری دموکراتیک بین شرکت‌کنندگان شبکه متکی نیست. در عوض، Bitcoin از اجماع proof-of-work استفاده می‌کند که در آن قدرت محاسباتی (قدرت هش) تصمیمات شبکه را تعیین می‌کند، نه تعداد گره‌ها. این امر باعث می‌شود که یک مهاجم نتواند صرفاً با اجرای گره‌های متعدد بدون منابع محاسباتی مربوطه، نفوذ کسب کند.
reviewed: false

question: Dushingiye ku nsobanuro yatanzwe ku bijanye n’ugupima Bitcoin, ni ubuhe buryo BUTAZOBA bubereye nk’ugupima kwemewe?
answer: Kwongera ubushobozi bwo gutanga amafaranga mu gusaba abakoresha kwizigira abakora ivy'ugutanga amafaranga menshi
wrong_answers:
  - Gukora ivyinjijwe mu gucuruza bikoresha bytes nke biciye mu migambi myiza yo gushiramwo amakuru
  - Gushira mu ngiro inyishu z’ubwubatsi zifise ibice vyubaka amategeko hejuru ya Bitcoin.
  - Kunoza ibikorwa vyo kugenzura umukono kugira ngo ushobore gukora amabuye vyihuta
explanation: |
  Ico gice gisobanura neza ko ugupima Bitcoin ari 'kwongera ubushobozi bwo gukoresha Bitcoin ataco bihinduye ku bushobozi bwayo bwo gucengera.' Inyishu ibereye irarenga kuri iyo nsobanuro kubera ko gusaba abakoresha kwizigira abakora ivy’ugutanga amahera bahurikiye hamwe bitera ingorane ata guca ku ruhande ubushobozi bwa Bitcoin bwo kurwanya ugucengera - igitekerezo c’agaciro nyamukuru. Inyishu zitari zo zose zigereranya uburyo bwo gupima bubereye bwavuzwe mu kigabane: gushiramwo amakuru neza bigabanya ikoreshwa ry’ibikoresho, inyishu zitandukanye zituma habaho ubushobozi bwo kwongerako mu gihe umuntu azigama imiterere y’urugero rw’ishimikiro, kandi ugusuzuma neza umukono bituma umuntu akora neza ata guhuza ibintu hagati.
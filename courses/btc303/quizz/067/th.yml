question: ตามคำจำกัดความที่ให้ไว้สำหรับการปรับขนาด Bitcoin วิธีการใดที่ไม่ถือว่าเป็นการปรับขนาดที่ถูกต้อง?
answer: การเพิ่มปริมาณธุรกรรมโดยการให้ผู้ใช้เชื่อถือผู้ประมวลผลการชำระเงินแบบรวมศูนย์สำหรับธุรกรรมส่วนใหญ่
wrong_answers:
  - การทำให้ข้อมูลนำเข้าของธุรกรรมใช้ไบต์น้อยลงผ่านรูปแบบการเข้ารหัสที่มีประสิทธิภาพมากขึ้น
  - การใช้งานโซลูชันสถาปัตยกรรมแบบเลเยอร์ที่สร้างโปรโตคอลบน Bitcoin
  - ปรับปรุงประสิทธิภาพการตรวจสอบลายเซ็นเพื่อประมวลผลบล็อกให้เร็วขึ้น
explanation: |
  บทนี้กำหนดการปรับขนาด Bitcoin อย่างชัดเจนว่า 'การเพิ่มความสามารถในการใช้งานของ Bitcoin โดยไม่ลดทอนความต้านทานการเซ็นเซอร์' คำตอบที่ถูกต้องละเมิดคำจำกัดความนี้เพราะการที่ต้องให้ผู้ใช้ไว้วางใจผู้ประมวลผลการชำระเงินแบบรวมศูนย์นั้นเป็นการลดทอนความต้านทานการเซ็นเซอร์ของ Bitcoin ซึ่งเป็นข้อเสนอคุณค่าหลัก คำตอบที่ผิดทั้งหมดแสดงถึงแนวทางการปรับขนาดที่ถูกต้องตามที่กล่าวถึงในบท: การเข้ารหัสที่มีประสิทธิภาพช่วยลดการใช้ทรัพยากร, โซลูชันแบบเลเยอร์ช่วยเพิ่มความสามารถเพิ่มเติมในขณะที่รักษาคุณสมบัติของเลเยอร์ฐาน, และการปรับปรุงการตรวจสอบลายเซ็นช่วยเพิ่มประสิทธิภาพโดยไม่ต้องแลกกับการรวมศูนย์
reviewed: false
question: Согласно определению, данному для масштабирования Bitcoin, какой подход не будет считаться законным масштабированием?
answer: Увеличение пропускной способности транзакций за счет того, что пользователи должны доверять централизованным платежным процессорам для большинства операций
wrong_answers:
  - За счет более эффективных схем кодирования транзакционные входы используют меньше байтов
  - Реализация многоуровневых архитектурных решений, которые строят протоколы поверх Bitcoin
  - Повышение производительности проверки подписи для более быстрой обработки блоков
explanation: |
  В главе дано четкое определение масштабирования Bitcoin: "Увеличение возможностей использования Bitcoin без ущерба для устойчивости к цензуре" Правильный ответ нарушает это определение, поскольку требование к пользователям доверять централизованным платежным процессорам напрямую ставит под угрозу устойчивость Bitcoin к цензуре - основное ценностное предложение. Все неправильные ответы представляют собой законные подходы к масштабированию, упомянутые в главе: эффективное кодирование снижает потребление ресурсов, многоуровневые решения позволяют увеличить емкость, сохраняя свойства базового слоя, а улучшенная проверка подписи повышает производительность без компромиссов с централизацией.
reviewed: false

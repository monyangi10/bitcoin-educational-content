question: Theo định nghĩa được đưa ra cho việc mở rộng quy mô Bitcoin, cách tiếp cận nào KHÔNG được coi là mở rộng quy mô hợp pháp?
answer: Tăng thông lượng giao dịch bằng cách yêu cầu người dùng tin tưởng vào bộ xử lý thanh toán tập trung cho hầu hết các giao dịch
wrong_answers:
  - Việc tạo ra các đầu vào giao dịch sử dụng ít byte hơn thông qua các chương trình mã hóa hiệu quả hơn
  - Triển khai các giải pháp kiến trúc phân lớp xây dựng các giao thức trên Bitcoin
  - Cải thiện hiệu suất xác minh chữ ký để xử lý khối nhanh hơn
explanation: |
  Chương này định nghĩa rõ ràng việc mở rộng quy mô Bitcoin là "tăng khả năng sử dụng của Bitcoin mà không ảnh hưởng đến khả năng chống kiểm duyệt". Câu trả lời đúng vi phạm định nghĩa này vì việc yêu cầu người dùng tin tưởng trực tiếp vào bộ xử lý thanh toán tập trung sẽ làm giảm khả năng chống kiểm duyệt của Bitcoin - một giá trị cốt lõi. Tất cả các câu trả lời sai đều thể hiện các phương pháp mở rộng quy mô hợp lệ được đề cập trong chương: mã hóa hiệu quả giúp giảm mức sử dụng tài nguyên, các giải pháp phân lớp cho phép tăng thêm dung lượng trong khi vẫn bảo toàn các đặc tính của lớp cơ sở, và việc xác minh chữ ký được cải thiện giúp nâng cao hiệu suất mà không phải đánh đổi tập trung hóa.
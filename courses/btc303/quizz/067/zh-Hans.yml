question: 根据比特币扩展的定义，哪种方法不属于合法扩展？
answer: 通过要求用户在大多数交易中信任集中式支付处理器，提高交易吞吐量
wrong_answers:
  - 通过更高效的编码方案，减少交易输入所使用的字节数
  - 实施在比特币基础上构建协议的分层架构解决方案
  - 提高签名验证性能，加快区块处理速度
explanation: |
  本章明确将比特币扩展定义为 "在不影响其抗审查能力的情况下提高比特币的使用能力"。正确答案之所以违背这一定义，是因为让用户信任中心化支付处理方会直接损害比特币的抗审查特性——这正是比特币的核心价值所在。而错误选项中提到的几种方法都是本章认可的合法扩展方式：更高效的编码能减少资源消耗，分层方案可在保持底层特性的同时提升容量，改进签名验证性能则能在不引入中心化权衡的前提下提高处理速度。

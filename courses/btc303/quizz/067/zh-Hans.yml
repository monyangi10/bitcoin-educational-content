question: 根据 Bitcoin 缩放的定义，哪种方法不属于合法缩放？
answer: 通过要求用户在大多数交易中信任集中式支付处理器，提高交易吞吐量
wrong_answers:
  - 通过更高效的编码方案，减少交易输入所使用的字节数
  - 实施在 Bitcoin 基础上构建协议的分层架构解决方案
  - 提高签名验证性能，加快区块处理速度
explanation: |
  本章明确将 Bitcoin 扩展定义为 "在不影响其抗审查能力的情况下提高 Bitcoin 的使用能力"。正确答案违反了这一定义，因为要求用户信任集中式支付处理器直接损害了 Bitcoin 的抗审查能力--这是 Bitcoin 的核心价值主张。错误答案都代表了本章中提到的合法扩展方法：高效编码减少了资源使用，分层解决方案在保留基础层特性的同时实现了额外容量，改进的签名验证在不牺牲集中化的情况下提高了性能。
reviewed: false

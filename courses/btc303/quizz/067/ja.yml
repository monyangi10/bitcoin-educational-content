question: Bitcoinのスケーリングの定義によると、どのアプローチが正当なスケーリングと認められないか？
answer: ほとんどのトランザクションについて、集中型の決済プロセッサーを信頼するようユーザーに求めることで、トランザクションのスループットを向上させる。
wrong_answers:
  - より効率的なエンコーディングスキームにより、トランザクション入力に使用するバイト数を少なくする。
  - Bitcoinの上にプロトコルを構築するレイヤード・アーキテクチャ・ソリューションの実装
  - 署名検証のパフォーマンスを向上させ、ブロックの処理を高速化
explanation: |
  この章では、Bitcoinのスケーリングを「検閲への耐性を損なうことなくBitcoinの利用容量を増やすこと」と明確に定義しています。正解はこの定義に反しています。なぜなら、中央集権的な支払いプロセッサーを信頼することをユーザーに要求することは、Bitcoinの検閲耐性、つまり核となる価値提案を直接的に損なうからです。間違った答えはすべて、この章で述べられている正当なスケーリング・アプローチを表しています。効率的なエンコーディングはリソースの使用量を削減し、レイヤード・ソリューションは基本レイヤの特性を維持しながら追加容量を可能にし、改善された署名検証は集中化のトレードオフなしにパフォーマンスを向上させます。

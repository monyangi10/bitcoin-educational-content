question: ビットコインのスケーリングの定義によると、どのアプローチが正当なスケーリングと認められないか？
answer: ほとんどのトランザクションについて、集中型の決済プロセッサーを信頼するようユーザーに求めることで、トランザクションのスループットを向上させる
wrong_answers:
  - より効率的なエンコーディングスキームにより、トランザクション入力に使用するバイト数を少なくする
  - ビットコイン上にプロトコルを構築するレイヤード・アーキテクチャ・ソリューションを実装する
  - 署名検証のパフォーマンスを向上させ、ブロックの処理を高速化する
explanation: |
  この章では、ビットコインのスケーリングを「検閲への耐性を損なうことなくビットコインの利用容量を増やすこと」と明確に定義しています。正解はこの定義に反しています。なぜなら、中央集権的な支払いプロセッサーを信頼することをユーザーに要求することは、ビットコインの検閲耐性、つまり核となる価値提案を直接的に損なうからです。間違った答えはすべて、この章で述べられている正当なスケーリング・アプローチを表しています。効率的なエンコーディングはリソースの使用量を削減し、レイヤード・ソリューションは基本レイヤーの特性を維持しながら追加容量を可能にし、改善された署名検証は集中化のトレードオフなしにパフォーマンスを向上させます。

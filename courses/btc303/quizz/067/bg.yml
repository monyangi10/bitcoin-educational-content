question: Според определението, предоставено за мащабиране на Bitcoin, кой подход НЕ може да се квалифицира като законно мащабиране?
answer: Увеличаване на пропускателната способност на транзакциите чрез изискване потребителите да се доверяват на централизирани процесори за плащане за повечето транзакции
wrong_answers:
  - Използване на по-малко байтове за въвеждане на транзакции чрез по-ефективни схеми за кодиране
  - Внедряване на решения с многослойна архитектура, които изграждат протоколи върху Bitcoin
  - Подобряване на производителността на проверката на подписа за по-бърза обработка на блоковете
explanation: |
  В главата изрично се дефинира мащабирането на Bitcoin като "увеличаване на капацитета за използване на Bitcoin, без да се нарушава неговата устойчивост на цензура" Правилният отговор нарушава тази дефиниция, тъй като изискването потребителите да се доверяват на централизирани платежни процесори пряко компрометира устойчивостта на Bitcoin към цензура - основно ценностно предложение. Всички грешни отговори представляват легитимни подходи за мащабиране, споменати в главата: ефективното кодиране намалява използването на ресурсите, многослойните решения позволяват допълнителен капацитет, като запазват свойствата на основния слой, а подобрената проверка на подписа повишава производителността без компромиси с централизацията.
reviewed: false

question: According to the definition provided for Bitcoin scaling, which approach would NOT qualify as legitimate scaling?
answer: Increasing transaction throughput by requiring users to trust centralized payment processors for most transactions
wrong_answers:
  - Making transaction inputs use fewer bytes through more efficient encoding schemes
  - Implementing layered architecture solutions that build protocols on top of Bitcoin
  - Improving signature verification performance to process blocks faster
explanation: |
  The chapter explicitly defines Bitcoin scaling as 'increasing Bitcoin's usage capacity without compromising its censorship resistance.' The correct answer violates this definition because requiring users to trust centralized payment processors directly compromises Bitcoin's censorship resistance - a core value proposition. The wrong answers all represent legitimate scaling approaches mentioned in the chapter: efficient encoding reduces resource usage, layered solutions enable additional capacity while preserving the base layer's properties, and improved signature verification enhances performance without centralization trade-offs.

question: بر اساس تعریفی که برای مقیاس‌بندی Bitcoin ارائه شده است، کدام رویکرد به عنوان مقیاس‌بندی قانونی شناخته نمی‌شود؟
answer: افزایش توان عملیاتی تراکنش با الزام کاربران به اعتماد به پردازشگرهای پرداخت متمرکز برای اکثر تراکنش‌ها
wrong_answers:
  - استفاده از طرح‌های کدگذاری کارآمدتر برای کاهش تعداد بایت‌های ورودی تراکنش‌ها
  - پیاده‌سازی راه‌حل‌های معماری لایه‌ای که پروتکل‌ها را بر روی Bitcoin ایجاد می‌کنند
  - بهبود عملکرد تأیید امضا برای پردازش سریع‌تر بلوک‌ها
explanation: |
  این فصل به‌طور صریح مقیاس‌بندی Bitcoin را به‌عنوان 'افزایش ظرفیت استفاده از Bitcoin بدون به خطر انداختن مقاومت در برابر سانسور آن' تعریف می‌کند. پاسخ صحیح این تعریف را نقض می‌کند زیرا نیاز کاربران به اعتماد به پردازشگرهای پرداخت متمرکز، مستقیماً مقاومت در برابر سانسور Bitcoin را که یک پیشنهاد ارزش اصلی است، به خطر می‌اندازد. پاسخ‌های نادرست همگی نمایانگر رویکردهای مقیاس‌بندی مشروعی هستند که در فصل ذکر شده‌اند: کدگذاری کارآمد مصرف منابع را کاهش می‌دهد، راه‌حل‌های لایه‌ای ظرفیت اضافی را در حالی که ویژگی‌های لایه پایه را حفظ می‌کنند، امکان‌پذیر می‌سازند و بهبود تأیید امضا عملکرد را بدون مصالحه‌های متمرکزسازی افزایش می‌دهد.
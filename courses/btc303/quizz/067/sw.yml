question: Kulingana na ufafanuzi uliotolewa wa kuongeza Bitcoin, ni njia gani HAITAhitimu kama kuongeza halali?
answer: Kuongezeka kwa utendakazi kwa kuwahitaji watumiaji kuamini wasindikaji wa malipo wa kati kwa shughuli nyingi
wrong_answers:
  - Kutengeneza pembejeo za muamala hutumia baiti chache kupitia mifumo ya usimbaji yenye ufanisi zaidi
  - Utekelezaji wa ufumbuzi wa usanifu wa tabaka ambao huunda itifaki juu ya Bitcoin
  - Kuboresha utendakazi wa uthibitishaji wa sahihi ili kuchakata vizuizi haraka
explanation: |
  Sura hii inafafanua kwa uwazi kuongeza kwa Bitcoin kama 'kuongeza uwezo wa matumizi wa Bitcoin bila kuathiri upinzani wake wa udhibiti.' Jibu sahihi linakiuka ufafanuzi huu kwa sababu kuhitaji watumiaji kuamini vichakataji vya malipo ya kati kunaathiri moja kwa moja upinzani wa udhibiti wa Bitcoin - pendekezo kuu la thamani. Majibu yasiyo sahihi yote yanawakilisha mbinu halali za kuongeza ukubwa zilizotajwa katika sura: usimbaji ufaao hupunguza matumizi ya rasilimali, suluhu zenye tabaka huwezesha uwezo wa ziada wakati wa kuhifadhi sifa za safu ya msingi, na uthibitishaji wa saini ulioboreshwa huboresha utendaji kazi bila ubadilishanaji wa biashara kati.
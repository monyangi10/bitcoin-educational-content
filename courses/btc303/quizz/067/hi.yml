question: Bitcoin स्केलिंग के लिए दी गई परिभाषा के अनुसार, कौन सा दृष्टिकोण वैध स्केलिंग के रूप में योग्य नहीं होगा?
answer: अधिकांश लेन-देन के लिए उपयोगकर्ताओं को केंद्रीकृत भुगतान प्रोसेसर पर भरोसा करने की आवश्यकता के माध्यम से लेन-देन प्रवाह में वृद्धि
wrong_answers:
  - अधिक कुशल एन्कोडिंग योजनाओं के माध्यम से लेनदेन इनपुट में कम बाइट्स का उपयोग करना
  - Bitcoin के शीर्ष पर प्रोटोकॉल बनाने वाले स्तरित आर्किटेक्चर समाधानों को लागू करना
  - ब्लॉकों को तेजी से संसाधित करने के लिए हस्ताक्षर सत्यापन प्रदर्शन में सुधार
explanation: |
  अध्याय स्पष्ट रूप से Bitcoin स्केलिंग को 'सेंसरशिप प्रतिरोध से समझौता किए बिना Bitcoin की उपयोग क्षमता को बढ़ाने' के रूप में परिभाषित करता है। सही उत्तर इस परिभाषा का उल्लंघन करता है क्योंकि उपयोगकर्ताओं को केंद्रीकृत भुगतान प्रोसेसर पर भरोसा करने की आवश्यकता सीधे तौर पर Bitcoin के सेंसरशिप प्रतिरोध से समझौता करती है - जो एक मूल मूल्य प्रस्ताव है। सभी गलत उत्तर अध्याय में उल्लिखित वैध स्केलिंग दृष्टिकोणों का प्रतिनिधित्व करते हैं: कुशल एन्कोडिंग संसाधन उपयोग को कम करती है, स्तरित समाधान आधार परत के गुणों को संरक्षित करते हुए अतिरिक्त क्षमता सक्षम करते हैं, और बेहतर हस्ताक्षर सत्यापन केंद्रीकरण समझौतों के बिना प्रदर्शन को बढ़ाता है।
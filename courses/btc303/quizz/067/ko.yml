question: Bitcoin 스케일링에 대해 제공된 정의에 따르면, 어떤 접근 방식이 합법적인 스케일링으로 인정되지 않나요?
answer: 사용자가 대부분의 거래에서 중앙 집중식 결제 프로세서를 신뢰하도록 하여 거래 처리량 증가
wrong_answers:
  - 보다 효율적인 인코딩 체계를 통해 트랜잭션 입력에 더 적은 바이트를 사용하도록 만들기
  - Bitcoin 위에 프로토콜을 구축하는 계층화된 아키텍처 솔루션 구현
  - 서명 확인 성능을 개선하여 블록 처리 속도 향상
explanation: |
  이 장에서는 Bitcoin 확장을 '검열 저항성을 손상시키지 않으면서 Bitcoin의 사용 용량을 늘리는 것'으로 명시적으로 정의하고 있습니다 정답은 사용자에게 중앙화된 결제 프로세서를 신뢰하도록 요구하는 것은 핵심 가치 제안인 Bitcoin의 검열 저항성을 직접적으로 훼손하기 때문에 이 정의에 위배됩니다. 오답은 모두 이 장에서 언급한 합법적인 확장 방식을 나타냅니다: 효율적인 인코딩은 리소스 사용량을 줄이고, 계층화된 솔루션은 기본 계층의 속성을 유지하면서 추가 용량을 제공하며, 향상된 서명 검증은 중앙 집중화 트레이드오프 없이 성능을 향상시킵니다.
reviewed: false

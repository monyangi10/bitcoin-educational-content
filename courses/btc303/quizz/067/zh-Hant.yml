question: 根據 Bitcoin 擴充所提供的定義，哪種方法不符合合法擴充的資格？
answer: 透過要求使用者信任集中式付款處理器來處理大部分交易，以增加交易吞吐量
wrong_answers:
  - 透過更有效率的編碼方案，讓交易輸入使用更少的位元組
  - 實施在 Bitcoin 之上建立通訊協定的分層架構解決方案
  - 改善簽章驗證效能，以更快的速度處理區塊
explanation: |
  本章明確地將 Bitcoin 的擴充定義為「在不影響其抗審查性的前提下增加 Bitcoin 的使用容量」。正確的答案違反了這個定義，因為要求使用者信任集中式付款處理器會直接損害 Bitcoin 的抗檢查能力 - 這是核心價值主張。錯誤的答案都代表本章中提到的合法擴充方法：有效率的編碼可降低資源使用量、分層解決方案可在保留基礎層特性的同時增加容量，以及改良的簽章驗證可在不犧牲集中化的情況下提升效能。
reviewed: false

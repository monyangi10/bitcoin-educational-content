question: Volgens de definitie van Bitcoin schaling, welke benadering zou NIET in aanmerking komen als legitieme schaling?
answer: De doorvoer van transacties verhogen door gebruikers te verplichten om voor de meeste transacties te vertrouwen op gecentraliseerde betalingsverwerkers
wrong_answers:
  - Transactie-inputs minder bytes laten gebruiken door efficiëntere coderingsschema's
  - Gelaagde architectuuroplossingen implementeren die protocollen bouwen bovenop Bitcoin
  - Prestaties van handtekeningverificatie verbeteren om blokken sneller te verwerken
explanation: |
  Het hoofdstuk definieert Bitcoin schalen expliciet als 'het verhogen van de gebruikscapaciteit van Bitcoin zonder de censuurbestendigheid in gevaar te brengen' Het juiste antwoord is in strijd met deze definitie, omdat de eis dat gebruikers vertrouwen moeten hebben in gecentraliseerde betalingsverwerkers direct afbreuk doet aan de censuurbestendigheid van Bitcoin - een kernpropositie. De foute antwoorden vertegenwoordigen allemaal legitieme schaalbenaderingen die in het hoofdstuk worden genoemd: efficiënte codering vermindert het gebruik van bronnen, gelaagde oplossingen maken extra capaciteit mogelijk met behoud van de eigenschappen van de basislaag en verbeterde verificatie van handtekeningen verbetert de prestaties zonder in te leveren op centralisatie.
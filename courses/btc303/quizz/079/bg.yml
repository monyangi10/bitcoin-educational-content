question: Според рамката за отговорно разкриване на информация коя е основната стратегическа причина за предоставяне на кръпки на уязвимости на разработчиците на алткойни едва след като поправките са широко разпространени в мрежата Bitcoin?
answer: За да се предотврати възможността нападателите да използват същата уязвимост в Bitcoin, докато алткойните се поправят
wrong_answers:
  - За да запазим конкурентното предимство на Bitcoin пред алтернативните криптовалути
  - За да се гарантира, че разработчиците на алткойни имат достатъчно време да разберат и правилно да приложат поправките
  - За да се избегнат проблеми, свързани с правната отговорност, които биха могли да възникнат от преждевременно оповестяване на проекти на трети страни
explanation: |
  Стратегията за определяне на времето отразява подход, при който мрежата на Bitcoin трябва да бъде защитена, преди да се помогне на другите. Ако алткойните бяха уведомени едновременно, нападателите биха могли да проучат имплементациите на алткойните или да ги експлоатират, за да разберат уязвимостта, след което потенциално да атакуват възлите на Bitcoin, които все още не са надградени. Последователният подход осигурява широка защита на Bitcoin, преди да се разшири помощта за други мрежи, като свежда до минимум възможността за използване на уязвимостта в цялата екосистема.
reviewed: true

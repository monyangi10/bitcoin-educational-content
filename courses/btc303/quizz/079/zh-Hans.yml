question: 根据负责任的披露框架，在比特币网络广泛部署漏洞补丁之后，才向山赛币开发者提供漏洞补丁的主要战略原因是什么？
answer: 为防止攻击者利用比特币上的相同漏洞，同时对山赛币进行修补
wrong_answers:
  - 保持比特币相对于其他加密货币实现方式的竞争优势
  - 为确保代币开发者有足够的时间理解并正确实施修复措施
  - 避免因过早向第三方项目披露信息而产生法律责任问题
explanation: |
  这种时间策略反映了一种安全第一的方法，即必须先保护比特币的网络，然后再帮助其他网络。如果同时通知山赛币方，攻击者可能会研究替代币的实现或利用它们来了解漏洞，然后可能攻击尚未升级的比特币节点。顺序方法可确保在向其他网络提供帮助之前，比特币得到广泛保护，从而最大限度地减少整个生态系统的漏洞利用窗口。

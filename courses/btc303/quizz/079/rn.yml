question: Dushingiye ku ntumbero yo gutangaza amakuru afise inshingano, ni iyihe mpamvu nyamukuru yo gutanga ibice vy’ubugoyagoye ku bategura altcoin gusa inyuma y’aho ibikosorwa bishizweho cane mu rubuga rwa Bitcoin?
answer: Kugira ngo abatera ntibakoreshe ubugoyagoye nk’ubwo kuri Bitcoin mu gihe altcoins ziriko zirashirwako .
wrong_answers:
  - "Kugira ngo Bitcoin igumye ifise akamaro ko guhiganwa ku yindi nzira yo gukoresha amafaranga y'ibanga"
  - Kugira ngo abahinguzi ba altcoin bafise umwanya uhagije wo gutahura no gushira mu ngiro neza ivyo bakosora .
  - Kugira ngo twirinde ibibazo vy’uburenganzira bishobora guterwa n’ugutangaza imbere y’igihe ku migambi y’uwundi muntu
explanation: |
  Ingamba y’igihe yerekana uburyo bwo gushingira intahe umutekano aho urubuga rwa Bitcoin rutegerezwa kurindwa imbere yo gufasha abandi. Iyo altcoins zimenyeshwa icarimwe, abatera boshobora kwiga ingene altcoin zishirwa mu ngiro canke bakazikoresha kugira ngo batahure ubugoyagoye, hanyuma bagatera node za Bitcoin zitaratera imbere. Uburyo bwo gukurikirana buratuma Bitcoin ishobora gukingirwa cane imbere y’uko yagura imfashanyo ku yindi mihora, bikagabanya idirisha ry’ugukoresha nabi ubugoyagoye mu bidukikije vyose.
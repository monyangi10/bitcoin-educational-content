question: 根據負責任的披露框架，在 Bitcoin 網路廣泛部署修補程式後，才提供漏洞修補程式給替代幣開發者的主要策略原因是什麼？
answer: 為了防止攻擊者利用 Bitcoin 上的相同漏洞，而altcoins 正在安裝修補程式
wrong_answers:
  - 「維持 Bitcoin 相較於其他加密貨幣實作的競爭優勢」
  - 為確保特幣開發者有足夠時間了解並妥善執行修正
  - 避免過早向第三方專案揭露可能產生的法律責任問題
explanation: |
  這個時間策略反映了安全第一的方法，即在幫助其他人之前，必須先保護 Bitcoin 的網路。如果同時通知其他代幣，攻擊者可能會研究其他代幣的實作或利用它們來了解漏洞，然後可能攻擊尚未升級的 Bitcoin 節點。循序漸進的方式可確保 Bitcoin 在擴大對其他網路的協助之前，獲得廣泛的保護，將整個生態系統的漏洞利用窗口降至最低。
reviewed: false

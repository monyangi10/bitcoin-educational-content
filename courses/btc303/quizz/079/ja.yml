question: 責任ある情報開示のフレームワークによると、Bitcoinネットワークに修正パッチが広く展開された後にのみ、アルトコイン開発者に脆弱性パッチを提供する主な戦略的理由は何でしょうか？
answer: アルトコインのパッチが適用されている間に、攻撃者がBitcoinで同じ脆弱性を悪用するのを防ぐため。
wrong_answers:
  - "代替暗号通貨実装に対するBitcoinの競争優位性を維持するため"
  - アルトコインの開発者が修正を理解し、適切に実装するための十分な時間を確保する。
  - 第三者プロジェクトへの早すぎる開示から生じうる法的責任問題を回避するため
explanation: |
  このタイミング戦略は、他を助ける前にBitcoinのネットワークを保護しなければならないという、セキュリティ優先のアプローチを反映している。もしアルトコインが同時に通知された場合、攻撃者は脆弱性を理解するためにアルトコインの実装を研究したり、悪用したりすることができ、その後、まだアップグレードしていないBitcoinのノードを攻撃する可能性がある。逐次的なアプローチは、他のネットワークへの支援を拡大する前にBitcoinの広範な保護を保証し、エコシステム全体で脆弱性を悪用する窓を最小限に抑える。
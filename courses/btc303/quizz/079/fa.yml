question: طبق چارچوب افشای مسئولانه، دلیل استراتژیک اصلی برای ارائه وصله‌های آسیب‌پذیری به توسعه‌دهندگان آلت‌کوین تنها پس از استقرار گسترده‌ی اصلاحات در شبکه Bitcoin چیست؟
answer: برای جلوگیری از سوءاستفاده مهاجمان از همان آسیب‌پذیری در Bitcoin در حالی که آلت‌کوین‌ها در حال پچ شدن هستند
wrong_answers:
  - "برای حفظ مزیت رقابتی Bitcoin نسبت به پیاده‌سازی‌های جایگزین ارزهای دیجیتال"
  - برای اطمینان از اینکه توسعه‌دهندگان آلت‌کوین زمان کافی برای درک و اجرای صحیح اصلاحات دارند
  - برای جلوگیری از مسائل مسئولیت قانونی که ممکن است از افشای زودهنگام به پروژه‌های شخص ثالث ناشی شود
explanation: |
  استراتژی زمان‌بندی یک رویکرد امنیت‌محور را منعکس می‌کند که در آن شبکه Bitcoin باید قبل از کمک به دیگران محافظت شود. اگر آلت‌کوین‌ها به‌طور همزمان مطلع می‌شدند، مهاجمان می‌توانستند پیاده‌سازی‌های آلت‌کوین را مطالعه کنند یا از آن‌ها سوءاستفاده کنند تا آسیب‌پذیری را درک کنند و سپس به گره‌های Bitcoin که هنوز به‌روزرسانی نشده‌اند، حمله کنند. رویکرد متوالی اطمینان می‌دهد که حفاظت گسترده Bitcoin قبل از گسترش کمک به شبکه‌های دیگر انجام می‌شود و پنجره بهره‌برداری از آسیب‌پذیری در سراسر اکوسیستم را به حداقل می‌رساند.
reviewed: false

question: 책임 있는 공개 프레임워크에 따르면, Bitcoin 네트워크에 수정 사항이 널리 배포된 후에야 알트코인 개발자에게 취약성 패치를 제공하는 주된 전략적 이유는 무엇인가요?
answer: 알트코인이 패치되는 동안 공격자가 Bitcoin에서 동일한 취약점을 악용하는 것을 방지하려면 다음과 같이 하세요
wrong_answers:
  - "대체 암호화폐 구현에 비해 Bitcoin의 경쟁 우위를 유지하기 위해"
  - 알트코인 개발자가 수정 사항을 이해하고 올바르게 구현할 수 있는 충분한 시간을 확보하기 위해 다음과 같이 합니다
  - 타사 프로젝트에 대한 조기 공개로 인해 발생할 수 있는 법적 책임 문제를 피하려면 다음과 같이 하세요
explanation: |
  이 타이밍 전략은 다른 사람들을 돕기 전에 Bitcoin의 네트워크를 먼저 보호해야 한다는 보안 우선 접근 방식을 반영합니다. 알트코인이 동시에 알림을 받는다면 공격자는 알트코인 구현을 연구하거나 취약점을 파악하기 위해 이를 악용한 다음 아직 업그레이드하지 않은 Bitcoin 노드를 공격할 수 있습니다. 순차적 접근 방식은 다른 네트워크로 지원을 확대하기 전에 Bitcoin의 광범위한 보호를 보장하여 생태계 전반의 취약점 악용 기간을 최소화합니다.

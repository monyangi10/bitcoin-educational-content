question: Quali sono i due aspetti principali della decentralizzazione in Bitcoin?
answer: Decentralizzazione dei miner e decentralizzazione dei full node
wrong_answers:
  - Decentralizzazione delle transazioni e decentralizzazione dei wallet
  - Decentralizzazione della rete e decentralizzazione del protocollo
  - Decentralizzazione degli utenti e decentralizzazione degli sviluppatori
explanation: |
  La decentralizzazione di Bitcoin ha due componenti chiave: la decentralizzazione dei miner e la decentralizzazione dei full node. La decentralizzazione dei miner significa che l'elaborazione e l'ordine delle transazioni non sono controllati da una singola entità, ma piuttosto da un collettivo dinamico di miner che possono entrare o uscire liberamente. La decentralizzazione dei full node si riferisce alla convalida dei blocchi effettuata ai margini della rete dagli utenti stessi, piuttosto che da autorità fidate. Questi due aspetti lavorano insieme per ottenere la resistenza alla censura: i miner impediscono l'ordinamento centralizzato delle transazioni, mentre i full node assicurano la convalida senza fiducia della blockchain.
reviewed: true

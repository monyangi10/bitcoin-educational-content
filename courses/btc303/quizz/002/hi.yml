question: Bitcoin में विकेंद्रीकरण के दो प्रमुख पहलू क्या हैं?
answer: Miner विकेंद्रीकरण और full node विकेंद्रीकरण
wrong_answers:
  - लेनदेन विकेंद्रीकरण और wallet विकेंद्रीकरण
  - नेटवर्क विकेंद्रीकरण और प्रोटोकॉल विकेंद्रीकरण
  - उपयोगकर्ता विकेंद्रीकरण और डेवलपर विकेंद्रीकरण
explanation: |
  Bitcoin के विकेंद्रीकरण के दो प्रमुख घटक हैं: माइनर विकेंद्रीकरण और full node विकेंद्रीकरण। Miner विकेंद्रीकरण का अर्थ है कि लेन-देन प्रक्रिया और क्रम किसी एक इकाई द्वारा नियंत्रित नहीं होता, बल्कि माइनर्स के एक गतिशील समूह द्वारा नियंत्रित होता है जो स्वतंत्र रूप से जुड़ या छोड़ सकते हैं। Full node विकेंद्रीकरण का अर्थ है नेटवर्क के किनारे पर ब्लॉकों का सत्यापन विश्वसनीय अधिकारियों के बजाय स्वयं उपयोगकर्ताओं द्वारा किया जाना। ये दोनों पहलू सेंसरशिप प्रतिरोध प्राप्त करने के लिए मिलकर काम करते हैं - माइनर्स केंद्रीकृत लेन-देन क्रम को रोकते हैं जबकि पूर्ण नोड्स ब्लॉकचेन के अविश्वसनीय सत्यापन को सुनिश्चित करते हैं।

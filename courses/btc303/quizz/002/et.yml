question: Millised on Bitcoin detsentraliseerimise kaks peamist aspekti?
answer: Miner detsentraliseerimine ja full node detsentraliseerimine
wrong_answers:
  - Tehingute detsentraliseerimine ja wallet detsentraliseerimine
  - Võrgu detsentraliseerimine ja protokollide detsentraliseerimine
  - Kasutaja detsentraliseerimine ja arendaja detsentraliseerimine
explanation: |
  Bitcoin detsentraliseerimisel on kaks põhikomponenti: kaevurite detsentraliseerimine ja full node detsentraliseerimine. Miner detsentraliseerimine tähendab, et tehingute töötlemist ja tellimist ei kontrolli ükski üksus, vaid pigem kaevurite dünaamiline kollektiiv, kes võivad vabalt liituda või lahkuda. Full node detsentraliseerimine viitab sellele, et plokkide valideerimine toimub võrgu servas kasutajate endi, mitte usaldusväärsete asutuste poolt. Need kaks aspekti töötavad koos, et saavutada tsensuurikindlus - kaevandajad takistavad tsentraliseeritud tehingukorraldust, samas kui täielikud sõlmed tagavad plokiahela usalduseta valideerimise.
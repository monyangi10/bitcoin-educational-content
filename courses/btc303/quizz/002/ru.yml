question: Каковы два основных аспекта децентрализации в Bitcoin?
answer: Децентрализация ГВ-2 и децентрализация ГВ-1
wrong_answers:
  - Децентрализация операций и децентрализация wallet
  - Децентрализация сети и децентрализация протокола
  - Децентрализация пользователей и децентрализация разработчиков
explanation: |
  Децентрализация Bitcoin состоит из двух ключевых компонентов: децентрализация майнеров и децентрализация full node. Децентрализация Miner означает, что обработка и упорядочивание транзакций не контролируется каким-либо одним субъектом, а скорее динамическим коллективом майнеров, которые могут свободно присоединяться или покидать сеть. Децентрализация Full node означает, что проверка блоков осуществляется на границе сети самими пользователями, а не доверенными лицами. Эти два аспекта работают вместе для достижения устойчивости к цензуре - майнеры предотвращают централизованное упорядочивание транзакций, а полные узлы обеспечивают беспричинную валидацию блокчейна.
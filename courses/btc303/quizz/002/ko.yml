question: Bitcoin에서 탈중앙화의 두 가지 주요 측면은 무엇인가요?
answer: Miner 탈중앙화 및 full node 탈중앙화
wrong_answers:
  - 트랜잭션 탈중앙화 및 wallet 탈중앙화
  - 네트워크 탈중앙화 및 프로토콜 탈중앙화
  - 사용자 탈중앙화 및 개발자 탈중앙화
explanation: |
  Bitcoin의 탈중앙화에는 채굴자 탈중앙화와 full node 탈중앙화라는 두 가지 핵심 요소가 있습니다. Miner 탈중앙화는 트랜잭션 처리와 주문이 단일 주체에 의해 통제되는 것이 아니라, 자유롭게 참여하거나 탈퇴할 수 있는 역동적인 채굴자 집단에 의해 제어되는 것을 의미합니다. Full node 탈중앙화는 신뢰할 수 있는 기관이 아닌 사용자가 직접 네트워크의 엣지에서 블록을 검증하는 것을 의미합니다. 이 두 가지 측면이 함께 작용하여 검열 저항성을 달성합니다. 채굴자는 중앙화된 거래 주문을 방지하고 풀 노드는 신뢰할 수 없는 블록체인의 유효성 검사를 보장합니다.

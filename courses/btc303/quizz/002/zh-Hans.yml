question: 比特币中去中心化的两个主要方面是什么？
answer: 矿工去中心化和全节点去中心化
wrong_answers:
  - 交易去中心化和钱包去中心化
  - 网络去中心化和协议去中心化
  - 用户去中心化和开发者去中心化
explanation: |
  Bitcoin 的去中心化有两个关键组成部分：矿工去中心化和 full node 去中心化。Miner 去中心化指的是交易处理和排序不受任何单一实体控制，而是由可以自由加入或退出的矿工动态集体控制。Full node 去中心化指的是在网络边缘由用户自己而不是受信任的机构对区块进行验证。这两个方面共同作用，实现了抗审查--矿工防止中心化的交易排序，而全节点则确保区块链的无信任验证。

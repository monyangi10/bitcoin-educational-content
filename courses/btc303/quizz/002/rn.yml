question: Ni ibihe bintu bibiri bihambaye vyo kwegereza ubutegetsi abaturage muri Bitcoin?
answer: Miner kwegereza ubutegetsi abaturage na full node kwegereza ubutegetsi abaturage
wrong_answers:
  - Ukwegereza ubucuruzi n'ukwegereza ubucuruzi wallet
  - Ukwegereza ubutegetsi urubuga n'ukwegereza ubutegetsi amasezerano
  - Kwegera abakoresha n'abategura
explanation: |
  Ukwegereza ubutegetsi kwa Bitcoin gufise ibice bibiri vy’ingenzi: ukwegereza ubutegetsi abacukuzi b’amabuye y’agaciro n’ukwegereza ubutegetsi aba full node. Miner decentralization bisigura ko ugutunganya ibikorwa n’ugusaba bitagenzurwa n’ikigo kimwe, ahubwo bigenzurwa n’umugwi w’abacukuzi b’amabuye y’agaciro bashobora kwinjira canke kuvayo mu mwidegemvyo. Full node decentralization yerekeza ku kwemeza ama blocs akorwa ku mpera y’urubuga n’abakoresha ubwabo, aho gukorwa n’ubutegetsi bwizigiwe. Ivyo bice bibiri bikorana kugira ngo bishike ku guhangana n’ugucengera - abacukuzi babuza gutegeka ibikorwa vy’ubudandaji bihurikiye hamwe mu gihe amanode yuzuye atuma ivyemezo vy’ubuhinga bwa blockchain bitagira icizigiro.
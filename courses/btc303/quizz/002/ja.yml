question: ビットコインにおける分散化の2大側面とは？
answer: マイナーの分散化とフルノードの分散化
wrong_answers:
  - トランザクションの分散化とウォレットの分散化
  - ネットワークの分散化とプロトコルの分散化
  - ユーザーの分散化と開発者の分散化
explanation: |
  ビットコインの分散化には2つの重要な要素があります：マイナーの分散化とフルノードの分散化です。マイナーの分散化とは、トランザクションの処理と順序付けが単一の主体によって管理されるのではなく、自由に出入りできるマイナーの動的な集団によって行われることを意味します。フルノードの分散化とは、ブロックの検証が、信頼できる権威ではなく、ネットワークの末端でユーザー自身によって行われることを指します。これら二つの側面は、検閲耐性を達成するために協力して機能します。マイナーは中央集権的なトランザクション順序付けを防ぎ、フルノードはブロックチェーンの信頼性のない検証を保証します。

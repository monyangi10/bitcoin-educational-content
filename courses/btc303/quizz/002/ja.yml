question: Bitcoinにおける地方分権の2大側面とは？
answer: Miner分散化とfull node分散化
wrong_answers:
  - 取引の分散化とwalletの分散化
  - ネットワークの分散化とプロトコルの分散化
  - ユーザー分散と開発者分散
explanation: |
  Bitcoinの分散化には2つの重要な要素がある：マイナーの分散化とfull nodeの分散化である。Minerの分散化とは、トランザクションの処理と発注が単一のエンティティによって制御されるのではなく、自由に参加したり離脱したりできるマイナーのダイナミックな集合体によって制御されることを意味する。Full nodeの非中央集権化とは、ブロックの検証が信頼された当局によってではなく、ユーザー自身によってネットワークのエッジで実行されることを指す。マイナーは中央集権的な取引発注を防ぎ、フルノードはブロックチェーンの信頼できる検証を保証する。
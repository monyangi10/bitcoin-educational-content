question: สองแง่มุมหลักของการกระจายอำนาจใน Bitcoin คืออะไร?
answer: การกระจายอำนาจ Miner และการกระจายอำนาจ full node
wrong_answers:
  - การกระจายอำนาจของธุรกรรมและการกระจายอำนาจของ wallet
  - การกระจายศูนย์ของเครือข่ายและการกระจายศูนย์ของโปรโตคอล
  - การกระจายอำนาจของผู้ใช้และการกระจายอำนาจของนักพัฒนา
explanation: |
  การกระจายศูนย์ของ Bitcoin มีสององค์ประกอบหลัก: การกระจายศูนย์ของนักขุดและการกระจายศูนย์ของ full node การกระจายศูนย์ของ Miner หมายความว่าการประมวลผลและการจัดลำดับธุรกรรมไม่ได้ถูกควบคุมโดยหน่วยงานเดียว แต่เป็นการรวมตัวแบบไดนามิกของนักขุดที่สามารถเข้าร่วมหรือออกได้อย่างอิสระ การกระจายศูนย์ของ Full node หมายถึงการตรวจสอบบล็อกที่ดำเนินการที่ขอบของเครือข่ายโดยผู้ใช้เอง แทนที่จะเป็นโดยหน่วยงานที่เชื่อถือได้ องค์ประกอบทั้งสองนี้ทำงานร่วมกันเพื่อให้เกิดการต้านทานการเซ็นเซอร์ - นักขุดป้องกันการจัดลำดับธุรกรรมแบบรวมศูนย์ ในขณะที่โหนดเต็มรูปแบบรับรองการตรวจสอบบล็อกเชนที่ไม่ต้องพึ่งพาความไว้วางใจ
reviewed: false
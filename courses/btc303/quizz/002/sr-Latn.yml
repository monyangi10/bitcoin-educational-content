question: Koja su dva glavna aspekta decentralizacije u Bitcoinu?
answer: Decentralizacija rudara i full node decentralizacija
wrong_answers:
  - Decentralizacija transakcija i decentralizacija novčanika
  - Decentralizacija mreže i decentralizacija protokola
  - Decentralizacija korisnika i decentralizacija programera
explanation: |
  Decentralizacija Bitcoina ima dve ključne komponente: decentralizaciju rudara i decentralizaciju full node-ova. Decentralizacija rudara znači da obrada i 
  redosled transakcija nisu pod kontrolom nijednog pojedinačnog entiteta, već dinamičnog kolektiva rudara koji mogu slobodno da se pridruže ili napuste mrežu. 
  Decentralizacija full node-ova odnosi se na validaciju blokova koja se obavlja na ivici mreže od strane samih korisnika, umesto od strane pouzdanih autoriteta.
  Ova dva aspekta zajedno rade na postizanju otpornosti na cenzuru - rudari sprečavaju centralizovano određivanje redosleda transakcija, dok puni čvorovi
  obezbeđuju validaciju blokčejna bez potrebe za poverenjem.
reviewed: true

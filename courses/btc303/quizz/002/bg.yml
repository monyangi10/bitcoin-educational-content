question: Кои са двата основни аспекта на децентрализацията в Bitcoin?
answer: Децентрализация на миньорите и децентрализация на възлите
wrong_answers:
  - Децентрализация на транзакциите и децентрализация на портфейлите
  - Децентрализация на мрежата и децентрализация на протокола
  - Децентрализация на потребителите и децентрализация на разработчиците
explanation: |
  Децентрализацията на Bitcoin има два ключови компонента: децентрализация на миньорите и децентрализация на възлите. Децентрализацията на миньорите означава, че обработката и нареждането на транзакциите не се контролира от едно лице, а от динамичен колектив от миньори, които могат да се присъединяват или напускат свободно. Децентрализацията възлите се отнася до валидирането на блоковете, което се извършва на границата на мрежата от самите потребители, а не от доверени органи. Тези два аспекта работят заедно, за да се постигне устойчивост на цензура - миньорите предотвратяват централизираното нареждане на трансакциите, докато пълноценните възли осигуряват недоверително валидиране на блокчейна.
reviewed: true

question: Кои са двата основни аспекта на децентрализацията в Bitcoin?
answer: Децентрализация на Miner и децентрализация на full node
wrong_answers:
  - Децентрализация на транзакциите и децентрализация на wallet
  - Децентрализация на мрежата и децентрализация на протокола
  - Децентрализация на потребителите и децентрализация на разработчиците
explanation: |
  Децентрализацията на Bitcoin има два ключови компонента: децентрализация на миньорите и децентрализация на full node. Децентрализацията на Miner означава, че обработката и нареждането на транзакциите не се контролира от едно лице, а от динамичен колектив от миньори, които могат да се присъединяват или напускат свободно. Децентрализацията Full node се отнася до валидирането на блоковете, което се извършва на границата на мрежата от самите потребители, а не от доверени органи. Тези два аспекта работят заедно, за да се постигне устойчивост на цензура - миньорите предотвратяват централизираното нареждане на трансакциите, докато пълноценните възли осигуряват недоверително валидиране на блокчейна.
reviewed: false

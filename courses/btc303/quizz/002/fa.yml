question: دو جنبه اصلی تمرکززدایی در Bitcoin چیست؟
answer: غیرمتمرکزسازی Miner و غیرمتمرکزسازی full node
wrong_answers:
  - غیرمتمرکزسازی تراکنش و غیرمتمرکزسازی wallet
  - غیرمتمرکزسازی شبکه و غیرمتمرکزسازی پروتکل
  - غیرمتمرکزسازی کاربر و غیرمتمرکزسازی توسعه‌دهنده
explanation: |
  غیرمتمرکزسازی Bitcoin دارای دو جزء کلیدی است: غیرمتمرکزسازی ماینر و غیرمتمرکزسازی full node. غیرمتمرکزسازی Miner به این معناست که پردازش و ترتیب‌دهی تراکنش‌ها توسط هیچ نهاد واحدی کنترل نمی‌شود، بلکه توسط یک جمع پویا از ماینرها که می‌توانند آزادانه به شبکه بپیوندند یا آن را ترک کنند، انجام می‌شود. غیرمتمرکزسازی Full node به اعتبارسنجی بلاک‌ها توسط خود کاربران در لبه شبکه اشاره دارد، به جای اینکه توسط مقامات مورد اعتماد انجام شود. این دو جنبه با هم کار می‌کنند تا مقاومت در برابر سانسور را به دست آورند - ماینرها از ترتیب‌دهی متمرکز تراکنش‌ها جلوگیری می‌کنند در حالی که نودهای کامل اعتبارسنجی بدون اعتماد به بلاکچین را تضمین می‌کنند.
reviewed: false

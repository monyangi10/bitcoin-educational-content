question: Bitcoin 中的權力下放有哪兩個主要方面？
answer: Miner 下放和 full node 下放
wrong_answers:
  - 交易分散和 wallet 分散
  - 網路分散與通訊協定分散
  - 使用者分散與開發者分散
explanation: |
  Bitcoin 的去中心化有兩個關鍵組成部分：礦工去中心化和 full node 去中心化。Miner 去中心化是指交易處理和排序不受任何單一實體控制，而是由可以自由加入或退出的動態礦工集體控制。Full node 去中心化指的是區塊的驗證由使用者自己在網路邊緣執行，而不是由受信任的機構執行。這兩個方面共同作用以達到抗檢查的目的 - 礦工防止中心化的交易排序，而完整節點則確保區塊鏈的無信任驗證。

question: Какой фундаментальный принцип позволяет разработчикам создавать такие системы, как Lightning Network, CoinJoin и OpenTimestamps, поверх Bitcoin, не обращаясь за одобрением?
answer: Безразрешительная разработка позволяет любому человеку создавать протоколы и приложения на Bitcoin, не требуя разрешения от какого-либо центрального органа
wrong_answers:
  - Лицензирование открытого исходного кода требует, чтобы все производные работы были автоматически одобрены и интегрированы в основной репозиторий Bitcoin Core
  - Лицензия MIT требует, чтобы все проекты, основанные на Bitcoin, перед развертыванием получали явное разрешение от команды разработчиков Bitcoin Core
  - Правила консенсуса автоматически подтверждают и авторизуют любой новый протокол, созданный на основе Bitcoin, через процесс верификации блокчейна
explanation: |
  Безразрешительная разработка - правильный ответ, потому что это основополагающий принцип, который позволяет любому строить на базе Bitcoin, не спрашивая разрешения. Неправильные ответы неверны, потому что: лицензирование открытого кода не требует автоматического одобрения или интеграции в Bitcoin Core; лицензия MIT фактически предоставляет широкие разрешения, не требуя одобрения разработчиков; правила консенсуса проверяют транзакции и блоки, а не протоколы более высокого уровня, построенные поверх Bitcoin.
reviewed: false

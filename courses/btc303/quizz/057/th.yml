question: หลักการพื้นฐานที่อนุญาตให้นักพัฒนาสร้างระบบเช่น Lightning Network, CoinJoin และ OpenTimestamps บน Bitcoin โดยไม่ต้องขออนุมัติคืออะไร?
answer: การพัฒนาแบบไม่ต้องขออนุญาตช่วยให้ใครก็ตามสามารถสร้างโปรโตคอลและแอปพลิเคชันบน Bitcoin ได้โดยไม่ต้องขออนุญาตจากหน่วยงานกลางใด ๆ
wrong_answers:
  - การอนุญาตให้ใช้สิทธิ์โอเพ่นซอร์สต้องการให้ผลงานที่ดัดแปลงทั้งหมดได้รับการอนุมัติและรวมเข้ากับที่เก็บหลัก Bitcoin Core โดยอัตโนมัติ
  - The MIT License mandates that all Bitcoin-based projects must receive explicit permission from the Bitcoin Core development team before deployment
  - กฎฉันทามติตรวจสอบและอนุมัติโปรโตคอลใหม่ใด ๆ ที่สร้างขึ้นบน Bitcoin โดยอัตโนมัติผ่านกระบวนการตรวจสอบบล็อกเชน
explanation: |
  การพัฒนาแบบไม่ต้องขออนุญาตเป็นคำตอบที่ถูกต้องเพราะเป็นหลักการพื้นฐานที่อนุญาตให้ใครก็ตามสามารถสร้างบน Bitcoin ได้โดยไม่ต้องขออนุญาต คำตอบที่ผิดนั้นไม่ถูกต้องเพราะ: การอนุญาตแบบโอเพ่นซอร์สไม่ได้ต้องการการอนุมัติอัตโนมัติหรือการรวมเข้ากับ Bitcoin Core; ใบอนุญาต MIT จริงๆ แล้วให้สิทธิ์กว้างๆ โดยไม่ต้องการการอนุมัติจากนักพัฒนา; และกฎฉันทามติใช้ในการตรวจสอบธุรกรรมและบล็อก ไม่ใช่โปรโตคอลระดับสูงที่สร้างขึ้นบน Bitcoin
reviewed: false
question: Lightning Network、コインジョイン、OpenTimestampsのようなシステムをビットコインの上に、承認を求めることなく開発することを可能にする基本原則は何か？
answer: パーミッションレス開発により、中央主体の認可を必要とせず、誰でもビットコイン上でプロトコルやアプリケーションを構築できる
wrong_answers:
  - オープンソースライセンスでは、すべての派生作品が自動的に承認され、ビットコインコアのメインリポジトリに統合される必要がある
  - MITライセンスは、すべてのビットコインベースのプロジェクトが、デプロイ前にビットコインコア開発チームから明示的な許可を得ることを義務付けている
  - コンセンサスルールは、ブロックチェーンの検証プロセスを通じて、ビットコイン上に構築された新しいプロトコルを自動的に検証し、承認する
explanation: |
  パーミッションレス開発は正しい答えです。なぜなら、パーミッションレス開発は、誰もが許可を求めることなくビットコインを構築することを可能にする基本原則だからだ。なぜなら、オープンソースのライセンスは、自動的な承認やビットコインコアへの統合を必要としないからである。MITライセンスは、開発者の承認を必要とせずに、実際に広範な許可を与えている。
reviewed: false

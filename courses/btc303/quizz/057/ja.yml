question: Lightning Network、CoinJoin、OpenTimestampsのようなシステムをBitcoinの上に、承認を求めることなく開発することを可能にする基本原則は何か？
answer: パーミッションレス開発により、中央当局の認可を必要とせず、誰でもBitcoin上でプロトコルやアプリケーションを構築できる。
wrong_answers:
  - オープンソースライセンスでは、すべての派生作品が自動的に承認され、Bitcoin Coreのメインリポジトリに統合される必要があります。
  - MITライセンスは、すべてのBitcoinベースのプロジェクトが、デプロイ前にBitcoin Core開発チームから明示的な許可を得ることを義務付けています。
  - コンセンサス・ルールは、ブロックチェーンの検証プロセスを通じて、Bitcoinの上に構築された新しいプロトコルを自動的に検証し、承認する。
explanation: |
  パーミッションレス開発は正しい答えです。なぜなら、パーミッションレス開発は、誰もが許可を求めることなくBitcoinを構築することを可能にする基本原則だからです。なぜなら、オープンソースのライセンスは、自動的な承認やBitcoinコアへの統合を必要としないからである。MITライセンスは、開発者の承認を必要とせずに、実際に広範な許可を与えている。
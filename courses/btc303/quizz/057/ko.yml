question: 개발자가 승인을 받지 않고 Bitcoin 위에 Lightning Network, CoinJoin, 오픈타임스탬프와 같은 시스템을 만들 수 있는 기본 원칙은 무엇인가요?
answer: 무허가 개발을 통해 중앙 기관의 승인 없이도 누구나 Bitcoin에서 프로토콜과 애플리케이션을 구축할 수 있습니다
wrong_answers:
  - 오픈 소스 라이선스는 모든 파생 저작물이 자동으로 승인되고 기본 Bitcoin Core 리포지토리에 통합되도록 요구합니다
  - MIT 라이선스에 따르면 모든 Bitcoin 기반 프로젝트는 배포 전에 Bitcoin 코어 개발팀의 명시적인 허가를 받아야 합니다
  - 합의 규칙은 블록체인 검증 프로세스를 통해 Bitcoin 위에 구축된 모든 새로운 프로토콜을 자동으로 검증하고 승인합니다
explanation: |
  비허가 개발은 누구나 허가를 요청하지 않고도 Bitcoin을 기반으로 빌드할 수 있는 기본 원칙이므로 정답입니다. 오답은 오픈 소스 라이선스는 자동 승인이나 Bitcoin 코어로의 통합을 요구하지 않으며, MIT 라이선스는 실제로 개발자의 승인 없이 광범위한 권한을 부여하고, 합의 규칙은 Bitcoin 위에 구축된 상위 프로토콜이 아닌 거래와 블록을 검증하기 때문에 정답이 아닙니다.
reviewed: false

question: कौन सा मूलभूत सिद्धांत डेवलपर्स को बिना अनुमोदन प्राप्त किए Bitcoin के शीर्ष पर Lightning Network, CoinJoin और ओपनटाइमस्टैम्प जैसी प्रणालियां बनाने की अनुमति देता है?
answer: अनुमति रहित विकास किसी भी व्यक्ति को किसी केंद्रीय प्राधिकरण से प्राधिकरण की आवश्यकता के बिना Bitcoin पर प्रोटोकॉल और एप्लिकेशन बनाने में सक्षम बनाता है
wrong_answers:
  - ओपन सोर्स लाइसेंसिंग के लिए सभी व्युत्पन्न कार्यों को स्वचालित रूप से अनुमोदित और मुख्य Bitcoin कोर रिपोजिटरी में एकीकृत किया जाना आवश्यक है
  - एमआईटी लाइसेंस के अनुसार सभी Bitcoin-आधारित परियोजनाओं को तैनाती से पहले Bitcoin कोर विकास टीम से स्पष्ट अनुमति प्राप्त करनी होगी
  - सर्वसम्मति नियम ब्लॉकचेन सत्यापन प्रक्रिया के माध्यम से Bitcoin पर निर्मित किसी भी नए प्रोटोकॉल को स्वचालित रूप से मान्य और अधिकृत करते हैं
explanation: |
  अनुमति रहित विकास सही उत्तर है क्योंकि यह मूलभूत सिद्धांत है जो किसी को भी बिना अनुमति मांगे Bitcoin पर निर्माण करने की अनुमति देता है। गलत उत्तर गलत हैं क्योंकि: ओपन सोर्स लाइसेंसिंग के लिए स्वचालित अनुमोदन या Bitcoin कोर में एकीकरण की आवश्यकता नहीं होती है; MIT लाइसेंस वास्तव में डेवलपर्स की अनुमति के बिना व्यापक अनुमतियाँ प्रदान करता है; और सर्वसम्मति नियम लेनदेन और ब्लॉक को मान्य करते हैं, न कि Bitcoin पर निर्मित उच्च-स्तरीय प्रोटोकॉल को।
reviewed: false

question: Que princípio fundamental permite que os programadores criem sistemas como o Lightning Network, o CoinJoin e o OpenTimestamps sobre o Bitcoin sem pedir aprovação?
answer: O desenvolvimento sem permissões permite que qualquer pessoa crie protocolos e aplicações no Bitcoin sem necessitar de autorização de qualquer autoridade central
wrong_answers:
  - O licenciamento de fonte aberta exige que todos os trabalhos derivados sejam automaticamente aprovados e integrados no repositório principal do Bitcoin Core
  - A licença MIT obriga a que todos os projectos baseados no Bitcoin recebam permissão explícita da equipa de desenvolvimento do Bitcoin Core antes de serem implementados
  - As regras de consenso validam e autorizam automaticamente qualquer novo protocolo construído sobre o Bitcoin através do processo de verificação da cadeia de blocos
explanation: |
  O desenvolvimento sem permissão é a resposta correta porque é o princípio fundamental que permite a qualquer pessoa construir sobre o Bitcoin sem pedir permissão. As respostas erradas são incorrectas porque: o licenciamento de código aberto não requer aprovação automática ou integração no Bitcoin Core; a Licença MIT concede permissões amplas sem requerer aprovação dos programadores; e as regras de consenso validam transacções e blocos, não protocolos de nível superior construídos sobre o Bitcoin.

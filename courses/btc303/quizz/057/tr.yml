question: Hangi temel ilke geliştiricilerin onay almadan Bitcoin üzerinde Lightning Network, CoinJoin ve OpenTimestamps gibi sistemler oluşturmasına izin verir?
answer: İzinsiz geliştirme, herhangi bir merkezi otoriteden yetkilendirme gerektirmeden herkesin Bitcoin üzerinde protokoller ve uygulamalar oluşturmasına olanak tanır
wrong_answers:
  - Açık kaynak lisansı, tüm türev çalışmaların otomatik olarak onaylanmasını ve ana Bitcoin Çekirdek deposuna entegre edilmesini gerektirir
  - MIT Lisansı, tüm Bitcoin tabanlı projelerin dağıtımdan önce Bitcoin Çekirdek geliştirme ekibinden açık izin almasını zorunlu kılar
  - Mutabakat kuralları, blok zinciri doğrulama süreci aracılığıyla Bitcoin üzerine inşa edilen herhangi bir yeni protokolü otomatik olarak doğrular ve yetkilendirir
explanation: |
  İzinsiz geliştirme doğru cevaptır çünkü bu, herkesin izin istemeden Bitcoin üzerine inşa etmesine olanak tanıyan temel ilkedir. Yanlış cevaplar yanlıştır çünkü: açık kaynak lisansı otomatik onay veya Bitcoin Çekirdeğine entegrasyon gerektirmez; MIT Lisansı aslında geliştiricilerin onayını gerektirmeden geniş izinler verir; ve mutabakat kuralları, Bitcoin'nin üzerine inşa edilen daha üst düzey protokolleri değil, işlemleri ve blokları doğrular.
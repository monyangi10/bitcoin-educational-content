question: چه اصل بنیادی به توسعه‌دهندگان اجازه می‌دهد تا سیستم‌هایی مانند Lightning Network، CoinJoin و OpenTimestamps را بر روی Bitcoin ایجاد کنند بدون اینکه نیاز به تأیید داشته باشند؟
answer: توسعه بدون نیاز به مجوز به هر کسی اجازه می‌دهد تا پروتکل‌ها و برنامه‌ها را بر روی Bitcoin بسازد بدون اینکه نیاز به مجوز از هیچ مرجع مرکزی داشته باشد.
wrong_answers:
  - مجوز منبع باز نیاز دارد که تمام آثار مشتق به‌طور خودکار تأیید و در مخزن اصلی Bitcoin Core ادغام شوند.
  - مجوز MIT ایجاب می‌کند که تمام پروژه‌های مبتنی بر Bitcoin باید قبل از استقرار، مجوز صریح از تیم توسعه هسته Bitcoin دریافت کنند.
  - قوانین اجماع به‌طور خودکار هر پروتکل جدیدی را که بر روی Bitcoin ساخته شده است، از طریق فرآیند تأیید بلاک‌چین اعتبارسنجی و تأیید می‌کنند.
explanation: |
  توسعه بدون نیاز به مجوز پاسخ صحیح است زیرا این اصل بنیادی به هر کسی اجازه می‌دهد تا بدون درخواست مجوز بر روی Bitcoin بسازد. پاسخ‌های نادرست اشتباه هستند زیرا: مجوز منبع باز نیاز به تأیید یا ادغام خودکار در هسته Bitcoin ندارد؛ مجوز MIT در واقع مجوزهای گسترده‌ای را بدون نیاز به تأیید از سوی توسعه‌دهندگان اعطا می‌کند؛ و قوانین اجماع تراکنش‌ها و بلوک‌ها را اعتبارسنجی می‌کنند، نه پروتکل‌های سطح بالاتری که بر روی Bitcoin ساخته شده‌اند.
reviewed: false

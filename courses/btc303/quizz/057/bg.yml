question: Кой основен принцип позволява на разработчиците да създават системи като Lightning Network, CoinJoin и OpenTimestamps върху Bitcoin, без да искат одобрение?
answer: Разработката без разрешения позволява на всеки да създава протоколи и приложения в Bitcoin, без да изисква разрешение от централен орган
wrong_answers:
  - Лицензирането на отворен код изисква всички производни произведения да бъдат автоматично одобрени и интегрирани в основното хранилище на Bitcoin Core
  - Лицензът MIT задължава всички проекти, базирани на Bitcoin, да получат изрично разрешение от екипа на разработчиците на ядрото на Bitcoin преди внедряване
  - Правилата за консенсус автоматично потвърждават и разрешават всеки нов протокол, изграден върху Bitcoin, чрез процеса на верификация на блокчейн
explanation: |
  Разработката без разрешение е правилният отговор, защото това е основният принцип, който позволява на всеки да изгражда върху Bitcoin, без да иска разрешение. Грешните отговори са неправилни, защото: лицензирането на отворен код не изисква автоматично одобрение или интегриране в ядрото на Bitcoin; лицензът MIT всъщност дава широки разрешения, без да изисква одобрение от разработчиците; правилата за консенсус потвърждават транзакциите и блоковете, а не протоколите от по-високо ниво, изградени върху Bitcoin.
reviewed: false

question: Welches Grundprinzip erlaubt es Entwicklern, Systeme wie Lightning Network, CoinJoin und OpenTimestamps auf der Grundlage von Bitcoin zu erstellen, ohne eine Genehmigung einzuholen?
answer: Die erlaubnisfreie Entwicklung ermöglicht es jedem, Protokolle und Anwendungen auf Bitcoin zu erstellen, ohne eine Genehmigung von einer zentralen Behörde zu benötigen
wrong_answers:
  - Die Open-Source-Lizenzierung erfordert, dass alle abgeleiteten Werke automatisch genehmigt und in das Haupt-Repository von Bitcoin Core integriert werden
  - Die MIT-Lizenz schreibt vor, dass alle Bitcoin-basierten Projekte vor dem Einsatz die ausdrückliche Genehmigung des Bitcoin-Kernentwicklungsteams erhalten müssen
  - Konsensregeln validieren und autorisieren automatisch jedes neue Protokoll, das auf Bitcoin aufbaut, durch den Blockchain-Verifizierungsprozess
explanation: |
  Die erlaubnisfreie Entwicklung ist die richtige Antwort, weil sie das Grundprinzip ist, das es jedem erlaubt, auf Bitcoin aufzubauen, ohne um Erlaubnis zu fragen. Die falschen Antworten sind falsch, denn: Open-Source-Lizenzen erfordern keine automatische Genehmigung oder Integration in den Bitcoin-Kern; die MIT-Lizenz gewährt tatsächlich weitreichende Genehmigungen, ohne dass eine Genehmigung von den Entwicklern erforderlich ist; und Konsensregeln validieren Transaktionen und Blöcke, nicht Protokolle auf höherer Ebene, die auf Bitcoin aufbauen.
reviewed: false

question: Jaký základní princip umožňuje vývojářům vytvářet systémy jako Lightning Network, CoinJoin a OpenTimestamps nad Bitcoin, aniž by museli žádat o schválení?
answer: Vývoj bez oprávnění umožňuje komukoli vytvářet protokoly a aplikace na Bitcoin bez nutnosti autorizace od centrální autority
wrong_answers:
  - Licence na otevřený zdrojový kód vyžadují, aby všechny odvozené práce byly automaticky schváleny a začleněny do hlavního úložiště Bitcoin Core
  - Licence MIT nařizuje, že všechny projekty založené na Bitcoin musí před nasazením získat výslovné povolení od vývojového týmu Bitcoin Core
  - Pravidla konsensu automaticky ověřují a autorizují jakýkoli nový protokol vytvořený nad Bitcoin prostřednictvím procesu ověřování blockchainu
explanation: |
  Správnou odpovědí je vývoj bez povolení, protože jde o základní princip, který umožňuje komukoli stavět na Bitcoin bez žádosti o povolení. Nesprávné odpovědi jsou nesprávné, protože: licencování open source nevyžaduje automatické schválení nebo začlenění do jádra Bitcoin; licence MIT ve skutečnosti poskytuje široká oprávnění, aniž by vyžadovala souhlas vývojářů; a pravidla konsensu ověřují transakce a bloky, nikoli protokoly vyšší úrovně postavené nad Bitcoin.
reviewed: false

question: Qual è la differenza fondamentale tra sovvenzione dei blocchi e commissioni di transazione in termini di chi sostiene in ultima analisi il costo della sicurezza della rete di Bitcoin?
answer: I costi dei sussidi ai blocchi sono sostenuti dai detentori attraverso l'inflazione monetaria, mentre le commissioni di transazione sono pagate da chi spende
wrong_answers:
  - I costi di sovvenzione dei blocchi sono pagati dai minatori attraverso le spese per le attrezzature, mentre le commissioni di transazione sono a carico degli operatori dei nodi
  - I costi di sovvenzione dei blocchi sono condivisi equamente tra tutti i partecipanti alla rete, mentre le commissioni di transazione riguardano solo le grandi istituzioni
  - I costi di sovvenzione dei blocchi sono sostenuti dalle borse attraverso le commissioni di negoziazione, mentre le commissioni di transazione sono pagate dai fornitori di wallet
explanation: |
  Come ha osservato Paul Sztorc, la sovvenzione dei blocchi e le commissioni di transazione hanno una natura fondamentalmente diversa. La sovvenzione in blocco rappresenta la creazione di nuovi bitcoin, che diluisce l'offerta esistente e costa effettivamente a tutti i possessori di bitcoin attraverso l'inflazione monetaria. Al contrario, le commissioni di transazione sono pagamenti diretti effettuati dagli utenti che desiderano effettuare transazioni, il che significa che chi spende sostiene direttamente questo costo. Il capitolo illustra questa transizione, mostrando come i costi della sicurezza si spostino dai detentori agli spendaccioni man mano che la sovvenzione dei blocchi diminuisce nel tempo.

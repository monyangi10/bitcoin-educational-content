question: Mis on peamine erinevus plokksubsiidiumide ja tehingutasude vahel selles osas, kes lõpuks kannab Bitcoin võrgu turvalisuse kulud?
answer: Plokkide subsideerimise kulud kannavad omanikud läbi rahalise inflatsiooni, samal ajal kui tehingutasud maksavad kulutajad
wrong_answers:
  - Blokisubsiidiumide kulud maksavad kaevandajad seadmete kulude kaudu, samas kui tehingutasud kannavad sõlmede operaatorid
  - Blokisubsiidiumide kulud jagunevad võrdselt kõigi võrgus osalejate vahel, samas kui tehingutasud mõjutavad ainult suuri asutusi
  - Blokisubsiidiumide kulud kannavad börsid kauplemistasude kaudu, samas kui tehingutasusid maksavad wallet teenusepakkujad
explanation: |
  Nagu Paul Sztorc märkis, on plokkide subsideerimine ja tehingutasud oma olemuselt põhimõtteliselt erinevad. Blokisubsiidium kujutab endast uute bitcoinide loomist, mis lahjendab olemasolevat pakkumist ja läheb kõigile bitcoinide omanikele rahainflatsiooni kaudu tegelikult maksma. Seevastu tehingutasud on otsesed maksed, mida teevad kasutajad, kes soovivad tehinguid teha, mis tähendab, et kulutajad kannavad selle kulu otse. Peatükk illustreerib seda üleminekut, näidates, kuidas turvakulud nihkuvad omanikelt kulutajatele, kui plokisubsiidium aja jooksul väheneb.
reviewed: false

question: Bitcoin의 네트워크 보안 비용을 궁극적으로 누가 부담하느냐는 측면에서 블록 보조금과 트랜잭션 수수료의 주요 차이점은 무엇인가요?
answer: 블록 보조금 비용은 화폐 인플레이션을 통해 보유자가 부담하고, 거래 수수료는 지출자가 지불합니다
wrong_answers:
  - 블록 보조금 비용은 채굴자가 장비 비용을 통해 지불하고, 거래 수수료는 노드 운영자가 부담합니다
  - 블록 보조금 비용은 모든 네트워크 참여자에게 균등하게 분배되며, 거래 수수료는 대형 기관에만 영향을 미칩니다
  - 블록 보조금 비용은 거래소가 거래 수수료를 통해 부담하고, 거래 수수료는 wallet 공급자가 지불합니다
explanation: |
  폴 슈토르크가 언급했듯이, 블록 보조금과 거래 수수료는 근본적으로 성격이 다릅니다. 블록 보조금은 새로운 비트코인 생성을 의미하며, 이는 기존 공급량을 희석하고 화폐 인플레이션을 통해 모든 비트코인 보유자에게 사실상 비용을 부과합니다. 반면, 거래 수수료는 거래를 원하는 사용자가 직접 지불하는 것으로, 소비자가 이 비용을 직접 부담합니다. 이 장에서는 시간이 지남에 따라 블록 보조금이 감소함에 따라 보안 비용이 보유자에서 소비자로 어떻게 이동하는지를 보여줍니다.

question: ब्लॉक सब्सिडी और लेनदेन शुल्क के बीच मुख्य अंतर क्या है, इस संदर्भ में कि अंततः Bitcoin की नेटवर्क सुरक्षा की लागत कौन वहन करता है?
answer: ब्लॉक सब्सिडी की लागत मौद्रिक मुद्रास्फीति के माध्यम से धारकों द्वारा वहन की जाती है, जबकि लेनदेन शुल्क का भुगतान व्ययकर्ताओं द्वारा किया जाता है
wrong_answers:
  - ब्लॉक सब्सिडी लागत का भुगतान खनिकों द्वारा उपकरण व्यय के माध्यम से किया जाता है, जबकि लेनदेन शुल्क नोड ऑपरेटरों द्वारा वहन किया जाता है
  - ब्लॉक सब्सिडी लागत सभी नेटवर्क प्रतिभागियों के बीच समान रूप से साझा की जाती है, जबकि लेनदेन शुल्क केवल बड़े संस्थानों को प्रभावित करता है
  - ब्लॉक सब्सिडी लागत का वहन एक्सचेंजों द्वारा ट्रेडिंग शुल्क के माध्यम से किया जाता है, जबकि लेनदेन शुल्क का भुगतान wallet प्रदाताओं द्वारा किया जाता है
explanation: |
  जैसा कि पॉल स्टोर्क ने बताया, ब्लॉक सब्सिडी और लेनदेन शुल्क मूल रूप से अलग-अलग प्रकृति के हैं। ब्लॉक सब्सिडी नए बिटकॉइन निर्माण का प्रतिनिधित्व करती है, जो मौजूदा आपूर्ति को कम करती है और मौद्रिक मुद्रास्फीति के माध्यम से सभी बिटकॉइन धारकों को प्रभावी रूप से नुकसान पहुँचाती है। इसके विपरीत, लेनदेन शुल्क उन उपयोगकर्ताओं द्वारा किया जाने वाला प्रत्यक्ष भुगतान है जो लेनदेन करना चाहते हैं, जिसका अर्थ है कि खर्च करने वाले सीधे इस लागत को वहन करते हैं। यह अध्याय इस परिवर्तन को दर्शाता है कि समय के साथ ब्लॉक सब्सिडी कम होने पर सुरक्षा लागत धारकों से खर्च करने वालों पर कैसे स्थानांतरित होगी।

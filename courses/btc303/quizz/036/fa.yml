question: تفاوت اصلی بین یارانه بلوک و کارمزد تراکنش‌ها در این است که چه کسی در نهایت هزینه امنیت شبکه Bitcoin را متحمل می‌شود؟
answer: هزینه‌های یارانه بلوک توسط دارندگان از طریق تورم پولی تحمل می‌شود، در حالی که کارمزدهای تراکنش توسط خرج‌کنندگان پرداخت می‌شود.
wrong_answers:
  - هزینه‌های یارانه بلوک توسط ماینرها از طریق هزینه‌های تجهیزات پرداخت می‌شود، در حالی که کارمزدهای تراکنش توسط اپراتورهای نود متحمل می‌شود.
  - هزینه‌های یارانه بلوک به طور مساوی بین همه شرکت‌کنندگان شبکه تقسیم می‌شود، در حالی که کارمزدهای تراکنش تنها بر مؤسسات بزرگ تأثیر می‌گذارد.
  - هزینه‌های یارانه بلوک توسط صرافی‌ها از طریق کارمزدهای معاملاتی تأمین می‌شود، در حالی که هزینه‌های تراکنش توسط ارائه‌دهندگان wallet پرداخت می‌شود.
explanation: |
  همان‌طور که پل سزتورک اشاره کرد، یارانه بلاک و کارمزد تراکنش‌ها از نظر ماهیت اساساً متفاوت هستند. یارانه بلاک نشان‌دهنده ایجاد بیت‌کوین جدید است که عرضه موجود را رقیق می‌کند و به‌طور مؤثر از طریق تورم پولی برای همه دارندگان بیت‌کوین هزینه‌بر است. در مقابل، کارمزد تراکنش‌ها پرداخت‌های مستقیمی هستند که توسط کاربرانی که می‌خواهند تراکنش انجام دهند، صورت می‌گیرد، به این معنی که هزینه را مستقیماً مصرف‌کنندگان متحمل می‌شوند. این فصل این انتقال را نشان می‌دهد و توضیح می‌دهد که چگونه هزینه‌های امنیتی با کاهش یارانه بلاک در طول زمان از دارندگان به مصرف‌کنندگان منتقل خواهد شد.
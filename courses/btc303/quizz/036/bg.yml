question: Каква е основната разлика между блоковата субсидия и таксите за трансакции по отношение на това кой в крайна сметка поема разходите за сигурността на мрежата Bitcoin?
answer: Разходите за блокови субсидии се поемат от притежателите чрез парична инфлация, докато таксите за транзакции се плащат от лицата, които харчат
wrong_answers:
  - Разходите за субсидиране на блоковете се заплащат от миньорите чрез разходите за оборудване, докато таксите за транзакции се поемат от операторите на възли
  - Разходите за субсидиране на блоковете се разпределят поравно между всички участници в мрежата, докато таксите за транзакциите засягат само големите институции
  - Разходите за блокови субсидии се поемат от борсите чрез таксите за търговия, докато таксите за транзакции се плащат от доставчиците на портфейли
explanation: |
  Както отбеляза Пол Шторк, блоковата субсидия и таксите за транзакции са коренно различни по своята същност. Блоковата субсидия представлява създаване на нови биткойни, което разводнява съществуващото предлагане и ефективно оскъпява всички притежатели на биткойни чрез парична инфлация. За разлика от тях таксите за трансакции са преки плащания, извършвани от потребителите, които искат да извършват трансакции, което означава, че харчещите поемат тези разходи директно. Главата илюстрира този преход, като показва как разходите за сигурност ще се прехвърлят от притежателите към харчещите, тъй като субсидията за блокове намалява с течение на времето.
reviewed: true

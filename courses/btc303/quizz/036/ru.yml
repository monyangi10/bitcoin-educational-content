question: В чем ключевое различие между субсидированием блокчейна и комиссией за транзакции с точки зрения того, кто в конечном итоге несет расходы на обеспечение безопасности сети Bitcoin?
answer: Расходы на субсидирование блокчейна несут держатели за счет денежной инфляции, а комиссионные за транзакции платят те, кто тратит
wrong_answers:
  - Расходы на субсидирование блокчейна оплачиваются майнерами за счет расходов на оборудование, в то время как транзакционные сборы несут операторы узлов
  - Расходы на субсидирование блокчейна распределяются поровну между всеми участниками сети, в то время как плата за транзакции затрагивает только крупные учреждения
  - Расходы по субсидированию блокчейна несут биржи за счет торговых сборов, а транзакционные сборы оплачивают провайдеры wallet
explanation: |
  Как отметил Пол Шторк, субсидии на блокчейн и плата за транзакции принципиально отличаются по своей природе. Субсидия на блокчейн представляет собой создание новых биткоинов, что размывает существующее предложение и фактически обходится всем держателям биткоинов в виде денежной инфляции. В отличие от этого, плата за транзакции - это прямые платежи пользователей, которые хотят совершить транзакцию, а значит, расходы несут непосредственно те, кто их совершает. Глава иллюстрирует этот переход, показывая, как затраты на обеспечение безопасности будут переходить от держателей к расходующим средства по мере того, как субсидия на блокчейн со временем будет уменьшаться.

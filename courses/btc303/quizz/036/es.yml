question: ¿Cuál es la diferencia clave entre la subvención de bloques y las comisiones por transacción en términos de quién soporta en última instancia el coste de la seguridad de la red de Bitcoin?
answer: Los costes de la subvención en bloque los sufragan los titulares a través de la inflación monetaria, mientras que las comisiones de transacción las pagan los gastadores
wrong_answers:
  - Los costes de subvención de bloques los pagan los mineros a través de los gastos de equipamiento, mientras que las comisiones por transacción corren a cargo de los operadores de nodos
  - Los costes de subvención de bloques se reparten por igual entre todos los participantes en la red, mientras que las comisiones por transacción sólo afectan a las grandes instituciones
  - Los costes de la subvención de bloques los sufragan las bolsas a través de las comisiones de negociación, mientras que las comisiones de transacción las pagan los proveedores de wallet
explanation: |
  Como señaló Paul Sztorc, la subvención por bloque y las comisiones por transacción son de naturaleza fundamentalmente diferente. La subvención por bloque representa la creación de nuevos bitcoins, lo que diluye la oferta existente y supone un coste efectivo para todos los titulares de bitcoins a través de la inflación monetaria. Por el contrario, las tasas de transacción son pagos directos realizados por los usuarios que desean realizar transacciones, lo que significa que los gastadores soportan este coste directamente. El capítulo ilustra esta transición mostrando cómo los costes de seguridad pasarán de los titulares a los gastadores a medida que la subvención por bloque disminuya con el tiempo.

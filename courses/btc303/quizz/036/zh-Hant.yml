question: 就誰最終承擔 Bitcoin 的網路安全成本而言，區塊補貼和交易費用的關鍵差異是什麼？
answer: 區塊補貼成本由持有者透過貨幣通貨膨脹來承擔，而交易費用則由花費者支付
wrong_answers:
  - 區塊補貼成本由礦工透過設備支出支付，而交易費用則由節點運營商承擔
  - 區塊補貼成本由所有網路參與者平均分擔，而交易費用只影響大型機構
  - 區塊補貼成本由交易所透過交易費承擔，而交易費則由 wallet 供應商支付。
explanation: |
  正如 Paul Sztorc 指出，區塊補貼和交易費用在本質上是不同的。區塊補貼代表了新的比特幣產生，稀釋了現有的供應，並通過貨幣膨脹有效地使所有比特幣持有者付出代價。相比之下，交易費用是由想要交易的用戶直接支付的，這意味著花費者直接承擔了這一成本。本章將說明這個轉變，顯示當區塊補貼隨著時間減少時，安全成本如何從持有者轉移到花費者。
reviewed: false

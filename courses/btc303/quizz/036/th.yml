question: ความแตกต่างที่สำคัญระหว่าง block subsidy และ transaction fees ในแง่ของผู้ที่รับภาระค่าใช้จ่ายของความปลอดภัยของเครือข่าย Bitcoin ในที่สุดคืออะไร?
answer: ต้นทุนเงินอุดหนุนบล็อกถูกแบกรับโดยผู้ถือผ่านเงินเฟ้อทางการเงิน ในขณะที่ค่าธรรมเนียมการทำธุรกรรมจะจ่ายโดยผู้ใช้จ่าย
wrong_answers:
  - ต้นทุนการอุดหนุนบล็อกถูกจ่ายโดยนักขุดผ่านค่าใช้จ่ายของอุปกรณ์ ในขณะที่ค่าธรรมเนียมการทำธุรกรรมถูกแบกรับโดยผู้ดำเนินการโหนด
  - ต้นทุนการอุดหนุนบล็อกถูกแบ่งปันอย่างเท่าเทียมกันระหว่างผู้เข้าร่วมเครือข่ายทั้งหมด ในขณะที่ค่าธรรมเนียมการทำธุรกรรมมีผลกระทบเฉพาะกับสถาบันขนาดใหญ่เท่านั้น
  - ต้นทุนการอุดหนุนบล็อกถูกแบกรับโดยการแลกเปลี่ยนผ่านค่าธรรมเนียมการซื้อขาย ในขณะที่ค่าธรรมเนียมการทำธุรกรรมจะจ่ายโดยผู้ให้บริการ wallet
explanation: |
  ตามที่ Paul Sztorc ได้กล่าวไว้ การอุดหนุนบล็อกและค่าธรรมเนียมการทำธุรกรรมนั้นมีลักษณะที่แตกต่างกันโดยพื้นฐาน การอุดหนุนบล็อกหมายถึงการสร้างบิตคอยน์ใหม่ ซึ่งทำให้ปริมาณที่มีอยู่ลดลงและมีค่าใช้จ่ายต่อผู้ถือบิตคอยน์ทั้งหมดผ่านเงินเฟ้อทางการเงิน ในทางตรงกันข้าม ค่าธรรมเนียมการทำธุรกรรมเป็นการชำระเงินโดยตรงที่ทำโดยผู้ใช้ที่ต้องการทำธุรกรรม ซึ่งหมายความว่าผู้ใช้ที่ใช้จ่ายจะต้องรับภาระค่าใช้จ่ายนี้โดยตรง บทนี้แสดงให้เห็นถึงการเปลี่ยนแปลงนี้โดยแสดงให้เห็นว่าค่าใช้จ่ายด้านความปลอดภัยจะเปลี่ยนจากผู้ถือไปยังผู้ใช้จ่ายอย่างไรเมื่อการอุดหนุนบล็อกลดลงตามกาลเวลา
reviewed: false
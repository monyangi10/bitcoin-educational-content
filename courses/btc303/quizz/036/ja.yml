question: ビットコインネットワークのセキュリティコストを最終的に誰が負担するかという点で、ブロック報酬とトランザクション手数料の決定的な違いは何ですか？
answer: ブロック報酬のコストは貨幣インフレを通じて保有者が負担し、トランザクション手数料は消費者が負担する
wrong_answers:
  - ブロック報酬のコストはマイナーが設備費用を通じて負担し、トランザクション手数料はノードオペレーターが負担する
  - ブロック報酬のコストは、すべてのネットワーク参加者間で均等に分配される
  - ブロック報酬のコストは取引手数料を通じて取引所が負担し、トランザクション手数料はウォレットプロバイダーが負担する
explanation: |
  Paul Sztorcが指摘するように、ブロック報酬とトランザクション手数料は根本的に性質が異なる。ブロック報酬は新たなビットコインの生成を意味し、既存の供給量を希薄化させ、通貨インフレを通じてすべてのビットコイン保有者に実質的な負担を強いる。対照的に、トランザクション手数料は取引を望むユーザーが直接支払うものであり、消費者がこのコストを直接負担することを意味する。この章では、ブロック報酬が時間の経過とともに減少するにつれて、セキュリティコストがどのように保有者から使用者にシフトするかを示しながら、この推移を説明する。

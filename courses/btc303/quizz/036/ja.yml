question: Bitcoinのネットワークセキュリティのコストを最終的に誰が負担するかという点で、ブロック補助金と取引手数料の決定的な違いは何ですか？
answer: ブロック補助金のコストは、貨幣インフレを通じて保有者が負担し、取引手数料は消費者が負担する。
wrong_answers:
  - ブロック補助コストは採掘者が設備費用を通じて負担し、取引手数料はノードオペレータが負担する。
  - ブロック補助金のコストは、すべてのネットワーク参加者間で均等に分配される。
  - ブロック補助金のコストは取引手数料を通じて取引所が負担し、取引手数料はwalletプロバイダーが負担する。
explanation: |
  Paul Sztorc氏が指摘するように、ブロック補助金と取引手数料は根本的に性質が異なる。ブロック補助金は新たなビットコインの創出を意味し、既存の供給量を希薄化させ、通貨インフレを通じてすべてのビットコイン保有者に実質的な負担を強いる。対照的に、取引手数料は取引を望むユーザーが直接支払うものであり、消費者がこのコストを直接負担することを意味する。この章では、ブロック補助金が時間の経過とともに減少するにつれて、セキュリティコストがどのように保有者から使用者にシフトするかを示しながら、この推移を説明する。
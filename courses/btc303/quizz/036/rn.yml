question: Ni itandukaniro irihe rikomeye hagati y’infashanyo y’amabarabara n’amahera y’ibikorwa mu bijanye n’uwuzoheza yikorera igiciro c’umutekano w’urubuga rwa Bitcoin?
answer: Ibiciro vy’infashanyo y’amabuye yishurwa n’ababifise biciye mu gutera imbere kw’amahera, mu gihe amafaranga y’ugucuruza yishurwa n’abakoresha
wrong_answers:
  - Ibiciro vy’infashanyo y’amabuye vyishyurwa n’abacukuzi biciye mu bikoresho, mu gihe amafaranga y’ugucuruza yishurwa n’abakoresha amabuye y’agaciro .
  - Ibiciro vy’infashanyo y’amabarabara bigabanywa ku rugero rungana hagati y’abafatanyabikorwa bose, mu gihe amafaranga y’ugucuruza agira ico akoze ku bigo binini gusa .
  - Ibiciro vy’infashanyo y’amabarabara vyishurwa n’amashirahamwe y’ubudandaji biciye mu mahera y’ubudandaji, mu gihe amahera y’ubudandaji yishurwa n’abatanga wallet .
explanation: |
  Nk’uko Paul Sztorc yabivuze, infashanyo y’amabarabara n’amahera y’ugucuruza biratandukanye cane. Infashanyo y’amabuye igereranya uguhingura bitcoin nshasha, ivyo bikaba bigabanya ubushobozi bwo gutanga bitcoin kandi bikaba bitwara abafise bitcoin bose biciye mu gutera imbere kw’amahera. Mu buryo bunyuranye, amafaranga y’ugucuruza ni amahera ataco akora atangwa n’abakoresha bashaka gucuruza, bisobanura ko abakoresha ari bo bikorera iyo nzira ataco baciyeko. Ikigabane kirerekana iyo mpinduka kigaragaza ingene amafaranga y’umutekano azova ku bafise akaja ku bakoresha uko infashanyo y’amabuye igabanuka uko igihe kigenda kirarenga.
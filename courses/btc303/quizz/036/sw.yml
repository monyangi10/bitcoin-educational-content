question: Je! ni tofauti gani kuu kati ya ruzuku ya kuzuia na ada za miamala katika suala la nani atabeba gharama ya usalama wa mtandao wa Bitcoin?
answer: Gharama za ruzuku ya vitalu hulipwa na wamiliki kupitia mfumuko wa bei wa fedha, wakati ada za miamala hulipwa na watumiaji.
wrong_answers:
  - Gharama za ruzuku ya kuzuia hulipwa na wachimbaji kupitia gharama za vifaa, wakati ada za miamala hulipwa na waendeshaji wa nodi.
  - Gharama za kuzuia ruzuku zinashirikiwa kwa usawa kati ya washiriki wote wa mtandao, wakati ada za miamala zinaathiri tu taasisi kubwa
  - Gharama za ruzuku ya kuzuia hulipwa na ubadilishaji kupitia ada za biashara, wakati ada za miamala hulipwa na watoa huduma wa wallet.
explanation: |
  Kama Paul Sztorc alivyobainisha, ruzuku ya kuzuia na ada za miamala ni tofauti kimsingi. Ruzuku ya block inawakilisha uundaji mpya wa bitcoin, ambayo hupunguza usambazaji uliopo na kuwagharimu wamiliki wote wa bitcoin kupitia mfumuko wa bei wa pesa. Kinyume chake, ada za muamala ni malipo ya moja kwa moja yanayofanywa na watumiaji wanaotaka kufanya miamala, kumaanisha kwamba watumiaji wanaotumia pesa ndio hubeba gharama hii moja kwa moja. Sura hii inaonyesha mabadiliko haya yanayoonyesha jinsi gharama za usalama zitakavyobadilika kutoka kwa wamiliki hadi watumiaji matumizi kadri ruzuku ya kuzuia inavyopungua kwa muda.
question: Qual é a principal diferença entre o subsídio por bloco e as taxas de transação em termos de quem, em última análise, suporta o custo da segurança da rede da Bitcoin?
answer: Os custos dos subsídios por bloco são suportados pelos detentores através da inflação monetária, enquanto as taxas de transação são pagas pelos utilizadores
wrong_answers:
  - Os custos de subsídio de bloco são pagos pelos mineiros através de despesas de equipamento, enquanto as taxas de transação são suportadas pelos operadores de nós
  - Os custos do subsídio de bloco são partilhados igualmente entre todos os participantes na rede, enquanto as taxas de transação apenas afectam as grandes instituições
  - Os custos de subvenção de blocos são suportados pelas bolsas através de comissões de negociação, enquanto as comissões de transação são pagas pelos fornecedores de wallet
explanation: |
  Como observou Paul Sztorc, o subsídio por bloco e as taxas de transação são de natureza fundamentalmente diferente. O subsídio por bloco representa a criação de novos bitcoins, o que dilui a oferta existente e custa efetivamente a todos os detentores de bitcoins através da inflação monetária. Em contrapartida, as taxas de transação são pagamentos diretos efectuados pelos utilizadores que pretendem efetuar transacções, o que significa que os utilizadores suportam este custo diretamente. O capítulo ilustra esta transição mostrando como os custos de segurança passarão dos detentores para os utilizadores à medida que o subsídio por bloco diminui ao longo do tempo.

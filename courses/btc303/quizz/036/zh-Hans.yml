question: 就最终由谁承担 Bitcoin 网络安全成本而言，区块补贴和交易费之间的主要区别是什么？
answer: 区块补贴成本由持有者通过货币通胀承担，而交易费用则由支出者支付
wrong_answers:
  - 区块补贴成本由矿工通过设备开支支付，而交易费用则由节点运营商承担
  - 区块补贴成本由所有网络参与者均摊，而交易费用只影响大型机构
  - 区块补贴成本由交易所通过交易费承担，而交易费则由 wallet 提供商支付
explanation: |
  正如保罗-斯托克（Paul Sztorc）所指出的，区块补贴和交易费用在本质上是不同的。区块补贴代表了新比特币的产生，稀释了现有的比特币供应，并通过货币通胀使所有比特币持有者付出代价。与此相反，交易费是想要交易的用户直接支付的费用，这意味着花费者直接承担了这一成本。本章对这一转变进行了说明，展示了随着区块补贴的逐渐减少，安全成本如何从持有者转移到花费者身上。
reviewed: false

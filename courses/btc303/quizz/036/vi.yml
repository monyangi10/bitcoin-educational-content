question: Sự khác biệt chính giữa trợ cấp khối và phí giao dịch về việc ai là người cuối cùng chịu chi phí bảo mật mạng của Bitcoin là gì?
answer: Chi phí trợ cấp khối được người nắm giữ gánh chịu thông qua lạm phát tiền tệ, trong khi phí giao dịch được người chi trả
wrong_answers:
  - Chi phí trợ cấp khối được thợ đào chi trả thông qua chi phí thiết bị, trong khi phí giao dịch do người vận hành nút chịu.
  - Chi phí trợ cấp khối được chia đều cho tất cả những người tham gia mạng, trong khi phí giao dịch chỉ ảnh hưởng đến các tổ chức lớn
  - Chi phí trợ cấp khối được các sàn giao dịch chi trả thông qua phí giao dịch, trong khi phí giao dịch được thanh toán bởi các nhà cung cấp wallet
explanation: |
  Như Paul Sztorc đã lưu ý, trợ cấp khối và phí giao dịch về cơ bản khác nhau về bản chất. Trợ cấp khối đại diện cho việc tạo ra bitcoin mới, làm loãng nguồn cung hiện có và trên thực tế gây thiệt hại cho tất cả người nắm giữ bitcoin thông qua lạm phát tiền tệ. Ngược lại, phí giao dịch là khoản thanh toán trực tiếp do người dùng muốn giao dịch thực hiện, nghĩa là người chi trả phải chịu chi phí này trực tiếp. Chương này minh họa sự chuyển đổi này, cho thấy chi phí bảo mật sẽ chuyển từ người nắm giữ sang người chi trả như thế nào khi trợ cấp khối giảm dần theo thời gian.
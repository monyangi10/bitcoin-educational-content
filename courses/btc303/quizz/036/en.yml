question: What is the key difference between block subsidy and transaction fees in terms of who ultimately bears the cost of Bitcoin's network security?
answer: Block subsidy costs are borne by holders through monetary inflation, while transaction fees are paid by spenders
wrong_answers:
  - Block subsidy costs are paid by miners through equipment expenses, while transaction fees are borne by node operators
  - Block subsidy costs are shared equally between all network participants, while transaction fees only affect large institutions
  - Block subsidy costs are borne by exchanges through trading fees, while transaction fees are paid by wallet providers
explanation: |
  As Paul Sztorc noted, block subsidy and transaction fees are fundamentally different in nature. The block subsidy represents new bitcoin creation, which dilutes the existing supply and effectively costs all bitcoin holders through monetary inflation. In contrast, transaction fees are direct payments made by users who want to transact, meaning spenders bear this cost directly. The chapter illustrates this transition showing how security costs will shift from holders to spenders as the block subsidy diminishes over time.

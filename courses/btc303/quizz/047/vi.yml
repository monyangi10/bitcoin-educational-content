question: Theo chiến thuật của Sổ tay thực địa phá hoại đơn giản, kẻ thù có thể phá vỡ quy trình phát triển mở của Bitcoin hiệu quả nhất bằng cách nào?
answer: Bằng cách xâm nhập vào các cuộc thảo luận để ngăn cản tiến trình thông qua những mối quan tâm vô tận về các vấn đề không liên quan và nhắc lại các cuộc tranh luận đã được giải quyết
wrong_answers:
  - "Bằng cách phát động các cuộc tấn công từ chối dịch vụ phân tán vào máy tính cá nhân và máy chủ của các nhà phát triển Bitcoin Core"
  - Bằng cách hối lộ các nhóm mining để từ chối các bản cập nhật phần mềm và duy trì các phiên bản cũ hơn của giao thức vô thời hạn
  - Bằng cách tạo ra các loại tiền điện tử cạnh tranh cung cấp các tính năng tốt hơn để thu hút các nhà phát triển khỏi các dự án Bitcoin
explanation: |
  Sổ tay Thực địa Phá hoại Đơn giản đã phác thảo các chiến thuật xâm nhập nhằm phá hoại các tổ chức từ bên trong, bao gồm cả việc trì hoãn tiến độ thông qua những lo ngại không liên quan và khơi lại các cuộc thảo luận đã được giải quyết. Vì việc phát triển Bitcoin mở cho tất cả mọi người, các chiến thuật kỹ thuật xã hội này đặt ra một mối đe dọa thực sự. Các lựa chọn khác đại diện cho các cuộc tấn công từ bên ngoài thay vì các phương pháp phá hoại nội bộ được mô tả trong sổ tay, tập trung vào việc khai thác tính chất mở và hợp tác của quy trình phát triển Bitcoin.
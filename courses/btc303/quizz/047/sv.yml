question: Enligt taktiken i Simple Sabotage Field Manual, hur kan en motståndare mest effektivt störa Bitcoin:s öppna utvecklingsprocess?
answer: Genom att infiltrera diskussioner för att hindra framsteg genom ändlösa frågor om irrelevanta frågor och upprepning av avgjorda debatter
wrong_answers:
  - "Genom att starta distribuerade överbelastningsattacker mot Bitcoin Core-utvecklarnas persondatorer och servrar"
  - Genom att muta mining-pooler att avvisa programuppdateringar och behålla äldre versioner av protokollet på obestämd tid
  - Genom att skapa konkurrerande kryptovalutor som erbjuder bättre funktioner för att dra bort utvecklare från Bitcoin-projekt
explanation: |
  I Simple Sabotage Field Manual beskrivs infiltrationstaktik för att störa organisationer inifrån, inklusive att stoppa framsteg genom irrelevanta frågor och att återupprepa avslutade diskussioner. Eftersom Bitcoin-utvecklingen är öppen för alla utgör denna sociala ingenjörstaktik ett verkligt hot. De andra alternativen representerar externa attacker snarare än de interna sabotagemetoder som beskrivs i manualen, som fokuserar på att utnyttja den öppna, samarbetsinriktade karaktären hos Bitcoin:s utvecklingsprocess.
question: According to the Simple Sabotage Field Manual tactics, how might an adversary most effectively disrupt Bitcoin's open development process?
answer: By infiltrating discussions to stall progress through endless concerns about irrelevant issues and rehashing settled debates
wrong_answers:
  - "By launching distributed denial-of-service attacks against Bitcoin Core developers' personal computers and servers"
  - By bribing mining pools to reject software updates and maintain older versions of the protocol indefinitely
  - By creating competing cryptocurrencies that offer better features to draw developers away from Bitcoin projects
explanation: |
  The Simple Sabotage Field Manual outlined infiltration tactics for disrupting organizations from within, including stalling progress through irrelevant concerns and rehashing settled discussions. Since Bitcoin development is open to anyone, these social engineering tactics pose a real threat. The other options represent external attacks rather than the internal sabotage methods described in the manual, which focus on exploiting the open, collaborative nature of Bitcoin's development process.

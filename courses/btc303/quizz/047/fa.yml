question: بر اساس تاکتیک‌های دفترچه راهنمای خرابکاری ساده، یک دشمن چگونه می‌تواند به طور مؤثر فرآیند توسعه باز Bitcoin را مختل کند؟
answer: با نفوذ به بحث‌ها برای متوقف کردن پیشرفت از طریق نگرانی‌های بی‌پایان درباره مسائل نامربوط و بازگویی مجدد مناظرات حل‌شده
wrong_answers:
  - "با راه‌اندازی حملات انکار سرویس توزیع‌شده علیه رایانه‌ها و سرورهای شخصی توسعه‌دهندگان اصلی Bitcoin"
  - با رشوه دادن به استخرهای mining برای رد به‌روزرسانی‌های نرم‌افزاری و حفظ نسخه‌های قدیمی‌تر پروتکل به‌طور نامحدود
  - با ایجاد ارزهای دیجیتال رقابتی که ویژگی‌های بهتری ارائه می‌دهند تا توسعه‌دهندگان را از پروژه‌های Bitcoin دور کنند
explanation: |
  دفترچه راهنمای ساده خرابکاری، تاکتیک‌های نفوذ برای مختل کردن سازمان‌ها از درون را تشریح کرده است، از جمله متوقف کردن پیشرفت از طریق نگرانی‌های بی‌ربط و بازنگری بحث‌های حل‌شده. از آنجا که توسعه Bitcoin برای همه باز است، این تاکتیک‌های مهندسی اجتماعی تهدیدی واقعی محسوب می‌شوند. گزینه‌های دیگر نشان‌دهنده حملات خارجی هستند نه روش‌های خرابکاری داخلی که در دفترچه توصیف شده‌اند، که بر بهره‌برداری از ماهیت باز و مشارکتی فرآیند توسعه Bitcoin تمرکز دارند.
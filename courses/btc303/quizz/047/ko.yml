question: 단순 사보타주 현장 매뉴얼 전술에 따르면, 공격자가 Bitcoin의 공개 개발 프로세스를 가장 효과적으로 방해할 수 있는 방법은 무엇인가요?
answer: 관련 없는 이슈에 대한 끝없는 우려를 통해 토론에 침투하여 진전을 지연시키고 이미 해결된 논쟁을 재탕하는 것
wrong_answers:
  - "Bitcoin 코어 개발자의 개인 컴퓨터와 서버에 대한 분산 서비스 거부 공격을 시작하여"
  - mining 풀을 매수하여 소프트웨어 업데이트를 거부하고 이전 버전의 프로토콜을 무기한 유지하도록 합니다
  - 더 나은 기능을 제공하는 경쟁 암호화폐를 만들어 개발자들을 Bitcoin 프로젝트에서 멀어지게 할 수 있습니다
explanation: |
  단순 사보타주 현장 매뉴얼은 관련 없는 우려를 통해 진행을 지연시키고 합의된 논의를 다시 해시하는 등 내부에서 조직을 교란하기 위한 침투 전술을 설명합니다. Bitcoin 개발은 누구에게나 개방되어 있기 때문에 이러한 사회 공학 전술은 실질적인 위협이 됩니다. 다른 옵션은 매뉴얼에 설명된 내부 방해 행위가 아닌 외부 공격으로, Bitcoin 개발 프로세스의 개방적이고 협력적인 특성을 악용하는 데 중점을 둡니다.

question: 根据《简单破坏现场手册》的战术，对手如何才能最有效地破坏 Bitcoin 的开放式开发流程？
answer: 通过无休止地关注不相关的问题和重复已经解决的辩论，渗透到讨论中，从而阻碍进展
wrong_answers:
  - "对 Bitcoin 核心开发人员的个人电脑和服务器发动分布式拒绝服务攻击"
  - 通过贿赂 mining 池拒绝软件更新，无限期地保留旧版本的协议
  - 通过创建竞争性加密货币，提供更好的功能，吸引开发者离开 Bitcoin 项目
explanation: |
  简单破坏实战手册》概述了从内部破坏组织的渗透策略，包括通过无关紧要的问题和重提已经解决的讨论来拖延进展。由于 Bitcoin 的开发对任何人都是开放的，这些社会工程学策略构成了真正的威胁。其他选择代表的是外部攻击，而不是手册中描述的内部破坏方法，后者侧重于利用 Bitcoin 开发过程的开放性和协作性。
reviewed: false

question: Según las tácticas del Manual de Campo del Sabotaje Simple, ¿cómo podría un adversario interrumpir con mayor eficacia el proceso de desarrollo abierto de Bitcoin?
answer: Infiltrándose en las discusiones para paralizar los avances mediante interminables preocupaciones sobre cuestiones irrelevantes y reeditando debates ya zanjados
wrong_answers:
  - "Lanzando ataques distribuidos de denegación de servicio contra los ordenadores personales y servidores de los desarrolladores de Bitcoin Core"
  - Sobornando a los consorcios mining para que rechacen las actualizaciones de software y mantengan indefinidamente versiones antiguas del protocolo
  - Creando criptomonedas competidoras que ofrezcan mejores prestaciones para alejar a los desarrolladores de los proyectos Bitcoin
explanation: |
  El Manual de Campo del Sabotaje Simple describe tácticas de infiltración para desbaratar organizaciones desde dentro, incluyendo la paralización del progreso mediante preocupaciones irrelevantes y la repetición de discusiones ya resueltas. Dado que el desarrollo de Bitcoin está abierto a cualquiera, estas tácticas de ingeniería social suponen una amenaza real. Las otras opciones representan ataques externos en lugar de los métodos de sabotaje interno descritos en el manual, que se centran en explotar la naturaleza abierta y colaborativa del proceso de desarrollo de Bitcoin.
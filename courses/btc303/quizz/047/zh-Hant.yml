question: 根據《簡單破壞實戰手冊》的戰術，敵人如何才能最有效地破壞 Bitcoin 的開放式開發流程？
answer: 滲入討論，透過無止境地關注不相干的問題和重複已解決的辯論來拖延進展
wrong_answers:
  - 「透過對 Bitcoin Core 開發人員的個人電腦和伺服器發動分散式拒絕服務攻擊」
  - 透過收買 mining pool 來拒絕軟體更新，並無限期地維持舊版本的通訊協定
  - 透過創造競爭性的加密貨幣，提供更好的功能來吸引開發人員離開 Bitcoin 專案
explanation: |
  簡易破壞實戰手冊》概述了從內部瓦解組織的滲透策略，包括透過無關緊要的疑慮和重提已成定局的討論來拖延進度。由於 Bitcoin 開發對任何人都是開放的，因此這些社會工程策略構成了真正的威脅。其他選項代表外部攻擊，而非手冊中描述的內部破壞方法，其重點在於利用 Bitcoin 開發過程的開放、協作性質。
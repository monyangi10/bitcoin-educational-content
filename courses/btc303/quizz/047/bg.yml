question: Как според тактиката на полевия наръчник по саботаж противникът може най-ефективно да наруши отворения процес на разработка на Bitcoin?
answer: Като се намесва в дискусиите, за да спира напредъка чрез безкрайни притеснения по несъществени въпроси и повтаряне на вече приключили дебати
wrong_answers:
  - Чрез провеждане на разпределени атаки за отказ на услуга срещу личните компютри и сървърите на разработчиците на ядрото Bitcoin
  - Чрез подкупване на миньорски басейни да отхвърлят актуализациите на софтуера и да поддържат по-стари версии на протокола за неопределено време
  - Чрез създаване на конкурентни криптовалути, които предлагат по-добри функции, за да привлекат разработчиците от проектите Bitcoin
explanation: |
  В "Наръчник за саботаж" са описани тактики за проникване в организациите отвътре, включително забавяне на напредъка чрез несъществени проблеми и преекспониране на приключили дискусии. Тъй като разработката на Bitcoin е отворена за всеки, тези тактики на социално инженерство представляват реална заплаха. Другите варианти представляват по-скоро външни атаки, отколкото вътрешните методи за саботаж, описани в наръчника, които се фокусират върху използването на отворения, съвместен характер на процеса на разработка на Bitcoin.
reviewed: true

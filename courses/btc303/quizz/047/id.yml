question: Menurut taktik Manual Lapangan Sabotase Sederhana, bagaimana cara musuh paling efektif mengganggu proses pengembangan terbuka Bitcoin?
answer: Dengan menyusup ke dalam diskusi untuk menghambat kemajuan melalui kekhawatiran yang tak berkesudahan tentang isu-isu yang tidak relevan dan mengulang perdebatan yang sudah selesai
wrong_answers:
  - "Dengan meluncurkan serangan denial-of-service terdistribusi terhadap komputer pribadi dan server pengembang Bitcoin Core"
  - Dengan menyuap kumpulan mining untuk menolak pembaruan perangkat lunak dan mempertahankan versi protokol yang lebih lama tanpa batas waktu
  - Dengan menciptakan mata uang kripto yang bersaing yang menawarkan fitur yang lebih baik untuk menarik pengembang menjauh dari proyek Bitcoin
explanation: |
  Buku Panduan Lapangan Sabotase Sederhana menguraikan taktik infiltrasi untuk mengganggu organisasi dari dalam, termasuk mengulur-ulur kemajuan melalui masalah yang tidak relevan dan mengulang diskusi yang sudah selesai. Karena pengembangan Bitcoin terbuka untuk siapa saja, taktik rekayasa sosial ini menimbulkan ancaman nyata. Opsi lainnya mewakili serangan eksternal daripada metode sabotase internal yang dijelaskan dalam manual, yang berfokus pada eksploitasi sifat kolaboratif dan terbuka dari proses pengembangan Bitcoin.
reviewed: false

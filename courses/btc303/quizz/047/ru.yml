question: В соответствии с тактикой "Простого полевого руководства по саботажу", как противник мог бы наиболее эффективно нарушить процесс открытой разработки Bitcoin?
answer: Вмешиваясь в дискуссии, чтобы затормозить прогресс путем бесконечного беспокойства по несущественным вопросам и пересказывания устоявшихся дебатов
wrong_answers:
  - Запуская распределенные атаки типа отказ в обслуживании на персональные компьютеры и серверы разработчиков Bitcoin Core
  - Подкупая пулы mining, чтобы они отказывались от обновлений программного обеспечения и поддерживали старые версии протокола в течение неопределенного времени
  - Создавая конкурирующие криптовалюты, которые предлагают лучшие возможности, чтобы отвлечь разработчиков от проектов Bitcoin
explanation: |
  В "Полевом руководстве по простому саботажу" изложена тактика проникновения в организации, позволяющая разрушить их изнутри, в том числе затормозить прогресс за счет неактуальных проблем и повторного обсуждения уже решенных вопросов. Поскольку разработка Bitcoin открыта для всех желающих, эти тактики социальной инженерии представляют реальную угрозу. Другие варианты представляют собой внешние атаки, а не методы внутреннего саботажа, описанные в руководстве, которые направлены на использование открытого, совместного характера процесса разработки Bitcoin.
reviewed: false

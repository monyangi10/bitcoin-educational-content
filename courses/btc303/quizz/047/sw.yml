question: Kulingana na mbinu za Mwongozo wa Uga wa Uharibifu Rahisi, ni kwa jinsi gani adui anaweza kuvuruga kwa ufanisi zaidi mchakato wa uendelezaji wazi wa Bitcoin?
answer: Kwa kupenyeza mijadala ili kukwamisha maendeleo kupitia mahangaiko yasiyoisha kuhusu maswala yasiyo na umuhimu na kurekebisha upya mijadala iliyosuluhishwa.
wrong_answers:
  - "Kwa kuzindua mashambulizi ya kunyimwa huduma yaliyosambazwa dhidi ya kompyuta na seva za watengenezaji wa Bitcoin Core"
  - Kwa kuhonga vikundi vya mining ili kukataa masasisho ya programu na kudumisha matoleo ya zamani ya itifaki kwa muda usiojulikana.
  - Kwa kuunda sarafu-fiche shindani ambazo hutoa vipengele bora vya kuwavuta wasanidi programu mbali na miradi ya Bitcoin
explanation: |
  Mwongozo wa Uga wa Uharibifu Rahisi uliainisha mbinu za upenyezaji kwa ajili ya kutatiza mashirika kutoka ndani, ikiwa ni pamoja na kukwama kwa maendeleo kupitia maswala yasiyo na umuhimu na kurekebisha upya majadiliano yaliyosuluhishwa. Kwa kuwa ukuzaji wa Bitcoin uko wazi kwa mtu yeyote, mbinu hizi za uhandisi wa kijamii husababisha tishio la kweli. Chaguzi zingine zinawakilisha mashambulio ya nje badala ya mbinu za hujuma za ndani zilizofafanuliwa katika mwongozo, ambazo zinalenga kutumia uwazi, asili ya ushirikiano wa mchakato wa ukuzaji wa Bitcoin.

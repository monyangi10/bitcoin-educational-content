question: 簡易妨害工作フィールドマニュアル』の戦術によれば、敵はBitcoinのオープンな開発プロセスをどのように妨害するのが最も効果的なのだろうか？
answer: 議論に潜り込み、無関係な問題について延々と悩んだり、決着済みの議論を蒸し返したりすることで、議論の進展を妨げる。
wrong_answers:
  - "Bitcoinコアの開発者のパソコンやサーバーに対して分散型サービス拒否攻撃を仕掛けることによって"
  - miningプールに賄賂を送り、ソフトウェアのアップデートを拒否させ、古いバージョンのプロトコルを無期限に維持させる。
  - Bitcoinプロジェクトから開発者を引き離すため、より優れた機能を提供する競合暗号通貨を作る。
explanation: |
  単純な妨害工作の実戦マニュアル』には、無関係な懸念事項によって進捗を遅らせたり、解決済みの議論を蒸し返したりするなど、内部から組織を混乱させるための潜入戦術が概説されている。Bitcoinの開発は誰にでも開かれているため、このようなソーシャル・エンジニアリング戦術は現実的な脅威となる。その他の選択肢は、マニュアルに記載されている内部破壊工作の手法というよりは、外部からの攻撃であり、Bitcoinの開発プロセスのオープンで協力的な性質を悪用することに焦点を当てている。
reviewed: false

question: ตามคู่มือ Simple Sabotage Field Manual กลยุทธ์ที่ฝ่ายตรงข้ามอาจใช้เพื่อขัดขวางกระบวนการพัฒนาแบบเปิดของ Bitcoin อย่างมีประสิทธิภาพที่สุดคืออะไร?
answer: โดยการแทรกซึมการสนทนาเพื่อหยุดความก้าวหน้าผ่านความกังวลที่ไม่มีที่สิ้นสุดเกี่ยวกับประเด็นที่ไม่เกี่ยวข้องและการนำการถกเถียงที่ได้ข้อสรุปแล้วกลับมาพูดใหม่
wrong_answers:
  - "โดยการเปิดตัวการโจมตีแบบปฏิเสธการให้บริการแบบกระจายไปยังคอมพิวเตอร์ส่วนบุคคลและเซิร์ฟเวอร์ของนักพัฒนาหลัก Bitcoin"
  - โดยการติดสินบนกลุ่ม mining ให้ปฏิเสธการอัปเดตซอฟต์แวร์และรักษาเวอร์ชันเก่าของโปรโตคอลไว้ไม่มีกำหนด
  - โดยการสร้างสกุลเงินดิจิทัลที่แข่งขันกันซึ่งมีคุณสมบัติที่ดีกว่าเพื่อดึงดูดนักพัฒนาออกจากโครงการ Bitcoin
explanation: |
  คู่มือการก่อวินาศกรรมอย่างง่ายได้สรุปกลยุทธ์การแทรกซึมเพื่อทำลายองค์กรจากภายใน รวมถึงการหยุดชะงักความก้าวหน้าผ่านข้อกังวลที่ไม่เกี่ยวข้องและการพูดคุยซ้ำในประเด็นที่ได้ข้อสรุปแล้ว เนื่องจากการพัฒนา Bitcoin เปิดให้ทุกคนเข้าร่วม กลยุทธ์วิศวกรรมสังคมเหล่านี้จึงเป็นภัยคุกคามที่แท้จริง ตัวเลือกอื่น ๆ แสดงถึงการโจมตีจากภายนอกแทนที่จะเป็นวิธีการก่อวินาศกรรมภายในที่อธิบายไว้ในคู่มือ ซึ่งเน้นการใช้ประโยชน์จากธรรมชาติที่เปิดกว้างและร่วมมือกันของกระบวนการพัฒนา Bitcoin
reviewed: false
question: Dushingiye ku mayeri yo mu gitabu ca Simple Sabotage Field Manual, ni gute umwansi yoshobora guhungabanya neza cane inzira y’iterambere rya Bitcoin?
answer: Mu kwinjira mu biganiro kugira ngo bahagarike iterambere biciye mu bibazo bitagira iherezo ku bibazo bitagira akamaro no gusubiramwo impaka zatunganijwe .
wrong_answers:
  - "Mu gutera ibitero vy'ukwihakana ibikorwa ku mudasobwa n'ama server y'abahinguzi ba Bitcoin Core"
  - Mu guha ibiturire amashirahamwe ya mining kugira ngo yanke guhindura porogarama no kubungabunga verisiyo za kera z'amasezerano ibihe bidahera
  - Mu kurema amafaranga y’ivy’ubuhinga bwa none atanga ibintu vyiza kuruta kugira ngo akure abahinguzi kure y’imigambi ya Bitcoin .
explanation: |
  Igitabo citwa Simple Sabotage Field Manual carashize ahabona ubuhinga bwo kwinjira mu miryango buva imbere, harimwo no guhagarika iterambere biciye mu bibazo bitagira akamaro no gusubiramwo ibiganiro vyari vyaratunganijwe. Kubera ko gutegura Bitcoin bishobora gukorwa n’umuntu wese, ayo mayeri y’ubuhinga bwo gukorana n’abantu aratera akaga nyakuri. Ayandi mahitamwo agereranya ibitero vyo hanze aho guserukira uburyo bwo gusenya bwo mu mutima buvugwa muri ico gitabu, bwibanda ku gukoresha uburyo bwo gutegura Bitcoin bufunguye kandi bukorana.
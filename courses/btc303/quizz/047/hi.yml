question: सरल तोड़फोड़ फील्ड मैनुअल रणनीति के अनुसार, एक विरोधी सबसे प्रभावी ढंग से Bitcoin की खुली विकास प्रक्रिया को कैसे बाधित कर सकता है?
answer: अप्रासंगिक मुद्दों पर अंतहीन चिंताओं के माध्यम से प्रगति को रोकने के लिए चर्चाओं में घुसपैठ करना और तय बहसों को फिर से शुरू करना
wrong_answers:
  - "Bitcoin कोर डेवलपर्स के व्यक्तिगत कंप्यूटरों और सर्वरों के विरुद्ध वितरित सेवा निषेध हमले शुरू करके"
  - सॉफ्टवेयर अपडेट को अस्वीकार करने और प्रोटोकॉल के पुराने संस्करणों को अनिश्चित काल तक बनाए रखने के लिए mining पूल को रिश्वत देकर
  - बेहतर सुविधाएँ प्रदान करने वाली प्रतिस्पर्धी क्रिप्टोकरेंसी बनाकर, डेवलपर्स को Bitcoin परियोजनाओं से दूर करना
explanation: |
  सिंपल सैबोटेज फील्ड मैनुअल में संगठनों में भीतर से बाधा डालने के लिए घुसपैठ की रणनीतियों की रूपरेखा दी गई है, जिसमें अप्रासंगिक चिंताओं के माध्यम से प्रगति को रोकना और तयशुदा चर्चाओं को दोहराना शामिल है। चूँकि Bitcoin का विकास किसी के लिए भी खुला है, इसलिए ये सोशल इंजीनियरिंग रणनीतियाँ एक वास्तविक खतरा पैदा करती हैं। अन्य विकल्प मैनुअल में वर्णित आंतरिक तोड़फोड़ विधियों के बजाय बाहरी हमलों का प्रतिनिधित्व करते हैं, जो Bitcoin की विकास प्रक्रिया की खुली, सहयोगी प्रकृति का फायदा उठाने पर केंद्रित हैं।
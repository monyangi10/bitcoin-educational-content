question: Bitcoin Coreが配布されているMITライセンスによると、派生作品の配布に関してどのような制限がありますか？
answer: 派生作品は、元のソフトウェアのライセンスと同じ条件の下で配布されなければならない。
wrong_answers:
  - 派生作品は商業的に販売することはできず、常に無料で配布されなければならない。
  - 二次的著作物の配布には、Bitcoinコアの開発者の書面による明示的な許可が必要です。
  - 派生作品には、オリジナルのBitcoinコアのブランディングが含まれていなければならず、リネームやリブランディングはできません。
explanation: |
  MITライセンスは、派生作品がオリジナルのソフトウェアと同じライセンス条項の下で配布されることを要求しており、オープンソースの性質が保たれることを保証しています。これは、商業的な販売を禁止するものでもなく(誤答1)、開発者の許可を必要とするものでもなく(誤答2)、オリジナルのブランドを維持することを義務づけるものでもありません(誤答3)。ライセンスは、改変や派生作品が同じ条件の下で許可されなければならないことを明記しており、Lightning Networkやサイドチェーンのようなイノベーションを可能にする許可不要の開発モデルを維持している。
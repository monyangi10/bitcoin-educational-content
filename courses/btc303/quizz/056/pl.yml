question: Zgodnie z licencją MIT, na której rozpowszechniany jest Bitcoin Core, jakie ograniczenie istnieje w odniesieniu do rozpowszechniania utworów pochodnych?
answer: Utwory pochodne muszą być rozpowszechniane na tych samych warunkach, co licencja oryginalnego oprogramowania
wrong_answers:
  - Utwory pochodne nie mogą być sprzedawane komercyjnie i muszą być zawsze rozpowszechniane bezpłatnie
  - Prace pochodne wymagają wyraźnej pisemnej zgody deweloperów Bitcoin Core przed dystrybucją
  - Utwory pochodne muszą zawierać oryginalną markę Bitcoin Core i nie mogą być przemianowywane ani rebrandowane
explanation: |
  Licencja MIT wymaga, aby prace pochodne były rozpowszechniane na tych samych warunkach licencyjnych, co oryginalne oprogramowanie, zapewniając zachowanie charakteru open source. Nie zabrania to sprzedaży komercyjnej (błędna odpowiedź 1), nie wymaga zgody deweloperów (błędna odpowiedź 2) i nie nakazuje zachowania oryginalnej marki (błędna odpowiedź 3). Licencja wyraźnie stanowi, że modyfikacje i prace pochodne muszą być dozwolone na tych samych warunkach, utrzymując model rozwoju bez zezwoleń, który umożliwia innowacje, takie jak Lightning Network i łańcuchy boczne.
reviewed: false

question: एमआईटी लाइसेंस के अनुसार जिसके अंतर्गत Bitcoin कोर वितरित किया जाता है, व्युत्पन्न कार्यों के वितरण के संबंध में क्या प्रतिबंध मौजूद हैं?
answer: व्युत्पन्न कार्यों को मूल सॉफ़्टवेयर के लाइसेंस के समान शर्तों के तहत वितरित किया जाना चाहिए
wrong_answers:
  - व्युत्पन्न कार्यों को व्यावसायिक रूप से नहीं बेचा जा सकता है और उन्हें हमेशा निःशुल्क वितरित किया जाना चाहिए
  - व्युत्पन्न कार्यों को वितरण से पहले Bitcoin कोर डेवलपर्स से स्पष्ट लिखित अनुमति की आवश्यकता होती है
  - व्युत्पन्न कार्यों में मूल Bitcoin कोर ब्रांडिंग शामिल होनी चाहिए और उनका नाम बदला या पुनः ब्रांड नहीं किया जा सकता
explanation: |
  एमआईटी लाइसेंस के अनुसार, व्युत्पन्न कार्यों को मूल सॉफ़्टवेयर के समान लाइसेंस शर्तों के अंतर्गत वितरित किया जाना आवश्यक है, ताकि ओपन सोर्स प्रकृति को संरक्षित रखा जा सके। यह व्यावसायिक बिक्री पर प्रतिबंध नहीं लगाता (गलत उत्तर 1), डेवलपर्स की अनुमति की आवश्यकता नहीं है (गलत उत्तर 2), और मूल ब्रांडिंग को बनाए रखने की अनिवार्यता नहीं रखता (गलत उत्तर 3)। लाइसेंस में स्पष्ट रूप से कहा गया है कि संशोधनों और व्युत्पन्न कार्यों को समान शर्तों के अंतर्गत अनुमति दी जानी चाहिए, और अनुमति रहित विकास मॉडल को बनाए रखना चाहिए जो Lightning Network और साइडचेन जैसे नवाचारों को सक्षम बनाता है।

question: Согласно лицензии MIT, по которой распространяется Bitcoin Core, какое ограничение существует в отношении распространения производных работ?
answer: Производные работы должны распространяться на тех же условиях, что и лицензия оригинального программного обеспечения
wrong_answers:
  - Производные произведения не могут продаваться на коммерческой основе и всегда должны распространяться бесплатно
  - Для распространения производных произведений требуется явное письменное разрешение разработчиков Bitcoin Core
  - Производные работы должны содержать оригинальный брендинг Bitcoin Core и не могут быть переименованы или ребрендированы
explanation: |
  Лицензия MIT требует, чтобы производные работы распространялись на тех же лицензионных условиях, что и оригинальное программное обеспечение, обеспечивая сохранение природы открытого исходного кода. Это не запрещает коммерческую продажу (неправильный ответ 1), не требует разрешения от разработчиков (неправильный ответ 2) и не обязывает сохранять оригинальный брендинг (неправильный ответ 3). В лицензии специально оговаривается, что модификации и производные работы должны быть разрешены на тех же условиях, поддерживая модель разработки без разрешений, которая позволяет внедрять такие инновации, как Lightning Network и сайдчейн.

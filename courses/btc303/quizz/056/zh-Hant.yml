question: 根據 Bitcoin Core 所採用的 MIT 授權條款，對於衍生作品的散佈有什麼限制？
answer: 衍生作品的發行條款必須與原始軟體的授權條款相同
wrong_answers:
  - 衍生作品不得作商業銷售，且必須永遠免費散布
  - 衍生作品在散佈前，必須獲得 Bitcoin Core 開發者的明確書面許可
  - 衍生作品必須包含原始的 Bitcoin Core 品牌，不得重新命名或重新命名
explanation: |
  MIT 授權條款要求衍生作品必須依照與原始軟體相同的授權條款散佈，以確保保留開放原始碼的本質。這並不禁止商業銷售 (錯誤答案 1)，不需要開發者的許可 (錯誤答案 2)，也不強制保留原始品牌 (錯誤答案 3)。許可證特別聲明，必須允許在相同的條款下進行修改和衍生作品，維持無需許可的開發模式，讓 Lightning Network 和側鏈等創新得以實現。
reviewed: false

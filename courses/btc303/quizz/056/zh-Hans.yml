question: 根据发布 Bitcoin Core 所依据的 MIT 许可，在发布衍生作品方面存在哪些限制？
answer: 派生作品的发布条款必须与原始软件的许可条款相同
wrong_answers:
  - 衍生作品不得进行商业销售，必须始终免费分发
  - 派生作品在发布前需获得 Bitcoin 核心开发人员的明确书面许可
  - 衍生作品必须包含 Bitcoin 核心的原始品牌，不得重命名或重新命名
explanation: |
  MIT 许可要求衍生作品在与原始软件相同的许可条款下发布，以确保保留开放源代码的性质。这并不禁止商业销售（错误答案 1），不需要开发者的许可（错误答案 2），也不强制要求保留原始品牌（错误答案 3）。许可证明确规定，必须允许在相同条款下进行修改和衍生作品，从而保持了无许可开发模式，使 Lightning Network 和侧链等创新成为可能。
reviewed: false

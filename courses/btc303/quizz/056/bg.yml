question: Според лиценза MIT, под който се разпространява ядрото на Bitcoin, какво ограничение съществува по отношение на разпространението на производни произведения?
answer: Производните произведения трябва да се разпространяват при същите условия като лиценза на оригиналния софтуер
wrong_answers:
  - Производните произведения не могат да се продават с търговска цел и винаги трябва да се разпространяват безплатно
  - Производните произведения изискват изрично писмено разрешение от разработчиците на ядрото на Bitcoin преди разпространение
  - Производните произведения трябва да включват оригиналната марка Bitcoin Core и не могат да бъдат преименувани или ребрандирани
explanation: |
  Лицензът MIT изисква производните произведения да се разпространяват при същите лицензни условия като оригиналния софтуер, което гарантира запазването на характера на софтуера с отворен код. Това не забранява търговската продажба (грешен отговор 1), не изисква разрешение от разработчиците (грешен отговор 2) и не задължава запазването на оригиналната марка (грешен отговор 3). В лиценза изрично се посочва, че модификациите и производните произведения трябва да бъдат разрешени при същите условия, като се запазва моделът на разработване без разрешение, който дава възможност за иновации като Lightning Network и страничните вериги.
reviewed: false

question: Bitcoin Core가 배포되는 MIT 라이선스에 따르면 파생 저작물의 배포와 관련하여 어떤 제한이 있나요?
answer: 파생 저작물은 원본 소프트웨어의 라이선스와 동일한 조건으로 배포해야 합니다
wrong_answers:
  - 파생된 저작물은 상업적으로 판매할 수 없으며 항상 무료로 배포해야 합니다
  - 파생 저작물은 배포 전에 Bitcoin Core 개발자의 명시적인 서면 허가가 필요합니다
  - 파생 저작물에는 반드시 원본 Bitcoin Core 브랜딩이 포함되어야 하며, 이름을 변경하거나 브랜드를 변경할 수 없습니다
explanation: |
  MIT 라이선스는 파생 저작물을 원본 소프트웨어와 동일한 라이선스 조건에 따라 배포하여 오픈 소스 성격을 유지하도록 요구합니다. 이는 상업적 판매를 금지하지 않으며(오답 1), 개발자의 허가를 요구하지 않고(오답 2), 오리지널 브랜딩 유지를 의무화하지도 않습니다(오답 3). 라이선스에는 수정 및 파생 저작물도 동일한 조건으로 허용되어야 한다고 명시되어 있으며, Lightning Network 및 사이드체인과 같은 혁신을 가능하게 하는 허가 없는 개발 모델을 유지합니다.

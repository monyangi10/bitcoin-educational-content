question: طبق مجوز MIT که تحت آن Bitcoin Core توزیع می‌شود، چه محدودیتی در مورد توزیع آثار مشتق وجود دارد؟
answer: آثار مشتق باید تحت همان شرایط مجوز نرم‌افزار اصلی توزیع شوند.
wrong_answers:
  - آثار مشتق نمی‌توانند به صورت تجاری فروخته شوند و باید همیشه به صورت رایگان توزیع شوند.
  - آثار مشتق نیاز به اجازه کتبی صریح از توسعه‌دهندگان اصلی Bitcoin قبل از توزیع دارند.
  - آثار مشتق باید شامل برند اصلی Bitcoin Core باشند و نمی‌توانند تغییر نام داده یا دوباره برند شوند.
explanation: |
  مجوز MIT ایجاب می‌کند که آثار مشتق شده تحت همان شرایط مجوز به عنوان نرم‌افزار اصلی توزیع شوند، و اطمینان حاصل شود که ماهیت منبع باز حفظ می‌شود. این مجوز فروش تجاری را ممنوع نمی‌کند (پاسخ اشتباه 1)، نیازی به اجازه از توسعه‌دهندگان ندارد (پاسخ اشتباه 2)، و الزام به حفظ برند اصلی ندارد (پاسخ اشتباه 3). این مجوز به طور خاص بیان می‌کند که اصلاحات و آثار مشتق شده باید تحت همان شرایط مجاز باشند، و مدل توسعه بدون نیاز به مجوز را که نوآوری‌هایی مانند Lightning Network و زنجیره‌های جانبی را ممکن می‌سازد، حفظ می‌کند.
question: According to the MIT License under which Bitcoin Core is distributed, what restriction exists regarding the distribution of derived works?
answer: Derived works must be distributed under the same terms as the license of the original software
wrong_answers:
  - Derived works cannot be sold commercially and must always be distributed free of charge
  - Derived works require explicit written permission from Bitcoin Core developers before distribution
  - Derived works must include the original Bitcoin Core branding and cannot be renamed or rebranded
explanation: |
  The MIT License requires that derived works be distributed under the same license terms as the original software, ensuring the open source nature is preserved. This doesn't prohibit commercial sale (wrong answer 1), doesn't require permission from developers (wrong answer 2), and doesn't mandate keeping original branding (wrong answer 3). The license specifically states that modifications and derived works must be allowed under the same terms, maintaining the permissionless development model that enables innovation like Lightning Network and sidechains.

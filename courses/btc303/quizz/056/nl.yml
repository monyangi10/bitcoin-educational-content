question: Volgens de MIT-licentie waaronder Bitcoin Core gedistribueerd wordt, welke beperking bestaat er met betrekking tot de distributie van afgeleide werken?
answer: Afgeleide werken moeten gedistribueerd worden onder dezelfde voorwaarden als de licentie van de originele software
wrong_answers:
  - Afgeleide werken mogen niet commercieel worden verkocht en moeten altijd gratis worden verspreid
  - Afgeleide werken vereisen expliciete schriftelijke toestemming van Bitcoin Core-ontwikkelaars vóór verspreiding
  - Afgeleide werken moeten het originele Bitcoin Core logo bevatten en mogen niet hernoemd of gerebrand worden
explanation: |
  De MIT-licentie vereist dat afgeleide werken worden verspreid onder dezelfde licentievoorwaarden als de originele software, zodat het open source-karakter behouden blijft. Dit verbiedt geen commerciële verkoop (fout antwoord 1), vereist geen toestemming van ontwikkelaars (fout antwoord 2) en verplicht niet tot het behouden van de originele branding (fout antwoord 3). De licentie stelt specifiek dat aanpassingen en afgeleide werken onder dezelfde voorwaarden moeten worden toegestaan, waardoor het toestemmingsvrije ontwikkelingsmodel dat innovatie zoals Lightning Network en sidechains mogelijk maakt, behouden blijft.
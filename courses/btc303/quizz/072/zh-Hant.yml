question: 根據 Gregory Maxwell 的分析，在 Bitcoin 擴充的討論中，是什麼造成基本的權衡，迫使使用者朝向可信賴的服務？
answer: 過高的資源使用率會淘汰驗證者，而用於解決爭議的區塊空間存取費用又過高。
wrong_answers:
  - 增加交易吞吐量與在不同大小的池中維持足夠的 mining 盈利能力之間的衝突
  - 實施獨立證件升級與保留與傳統 wallet 軟體的向後相容性之間的緊張關係
  - 第 2 層解決方案與第 3 層擴充方法之間對有限開發資源與社區支援的競爭
explanation: |
  Maxwell 發現了一個雙面問題，Bitcoin 在這兩個方向上都失去了優勢：如果資源使用量相對於可用技術而言過高，驗證的成本就會過高，並將使用者擯諸門外，他們就必須依賴可信的協力廠商，而非獨立驗證。相反地，如果容量太低，交易方法效率不高，存取區塊鏈解決爭議的成本就會過高，再次將使用者推向可信賴的服務。這就形成了擴充解決方案必須掌握的微妙平衡。
question: Selon l'analyse de Gregory Maxwell, qu'est-ce qui crée le compromis fondamental qui oblige les utilisateurs à se tourner vers des services de confiance dans les discussions sur la mise à l'échelle du Bitcoin ?
answer: L'utilisation de ressources excessivement élevées exclut les validateurs et l'accès à l'espace disque pour la résolution des litiges est excessivement coûteux
wrong_answers:
  - Le conflit entre l'augmentation du débit des transactions et le maintien d'une rentabilité mining adéquate pour différentes tailles de pools
  - La tension entre la mise en œuvre de mises à jour séparées des témoins et la préservation de la compatibilité ascendante avec l'ancien logiciel wallet
  - La concurrence entre les solutions à deux niveaux et les approches à échelle on-chain pour des ressources de développement et un soutien communautaire limités
explanation: |
  Maxwell a identifié un problème à double face où le Bitcoin perd ses avantages dans les deux sens : si l'utilisation des ressources est trop élevée par rapport à la technologie disponible, la validation devient trop coûteuse et exclut les utilisateurs qui doivent alors s'en remettre à des tiers de confiance au lieu de valider de manière indépendante. Inversement, si la capacité est trop faible et que les méthodes de transaction sont inefficaces, l'accès à la blockchain pour la résolution des litiges devient prohibitif, ce qui pousse à nouveau les utilisateurs vers des services de confiance. Il s'agit là d'un équilibre délicat que les solutions de mise à l'échelle doivent respecter.
reviewed: false

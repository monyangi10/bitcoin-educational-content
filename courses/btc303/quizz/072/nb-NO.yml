question: Ifølge Gregory Maxwells analyse, hva er det som skaper den grunnleggende avveiningen som tvinger brukerne til å velge betrodde tjenester i diskusjoner om Bitcoin-skalering?
answer: Både for høy ressursbruk som utkonkurrerer validatorer, og for dyr tilgang til blokkplass for tvisteløsning
wrong_answers:
  - Konflikten mellom å øke transaksjonsgjennomstrømningen og å opprettholde tilstrekkelig mining-lønnsomhet på tvers av ulike bassengstørrelser
  - Spenningen mellom å implementere segregerte vitneoppgraderinger og å bevare bakoverkompatibilitet med eldre wallet-programvare
  - Konkurransen mellom lag to-løsninger og on-chain-skaleringsmetoder om begrensede utviklingsressurser og støtte fra samfunnet
explanation: |
  Maxwell identifiserte et tosidig problem der Bitcoin mister sine fordeler i begge retninger: Hvis ressursbruken er for høy i forhold til tilgjengelig teknologi, blir validering for kostbart og priser ut brukere som da må stole på pålitelige tredjeparter i stedet for å validere på egen hånd. Motsatt, hvis kapasiteten er for lav og transaksjonsmetodene er ineffektive, blir det uoverkommelig dyrt å få tilgang til blokkjeden for tvisteløsning, noe som igjen presser brukerne mot betrodde tjenester. Dette skaper en hårfin balanse som skaleringsløsninger må navigere i.
reviewed: false

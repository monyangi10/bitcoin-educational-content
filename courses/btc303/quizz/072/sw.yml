question: Kulingana na uchanganuzi wa Gregory Maxwell, ni nini huanzisha biashara ya kimsingi ambayo inawalazimisha watumiaji kuelekea huduma zinazoaminika katika mijadala ya kuongeza viwango vya Bitcoin?
answer: Utumiaji wa juu kupita kiasi wa rasilimali huweka bei ya vithibitishaji na ufikiaji wa nafasi ya kuzuia ghali zaidi kwa utatuzi wa mizozo
wrong_answers:
  - Mgogoro kati ya kuongeza upitishaji wa shughuli na kudumisha faida ya kutosha ya mining katika saizi tofauti za bwawa.
  - Mvutano kati ya kutekeleza uboreshaji wa mashahidi uliotengwa na kuhifadhi utangamano wa nyuma na programu ya urithi ya wallet
  - Ushindani kati ya suluhu za tabaka-mbili na mbinu za kuongeza on-chain kwa rasilimali chache za maendeleo na usaidizi wa jamii
explanation: |
  Maxwell alitambua tatizo la pande mbili ambapo Bitcoin inapoteza manufaa yake katika pande zote mbili: ikiwa utumiaji wa rasilimali ni wa juu sana ikilinganishwa na teknolojia inayopatikana, uthibitishaji unakuwa wa gharama kubwa sana na kuwagharimu watumiaji ambao lazima wategemee washirika wengine wanaoaminika badala ya kuthibitisha kwa kujitegemea. Kinyume chake, ikiwa uwezo ni mdogo sana na mbinu za muamala hazifai, kufikia blockchain kwa utatuzi wa mizozo inakuwa ghali sana, tena kusukuma watumiaji kuelekea huduma zinazoaminika. Hii inaunda usawa mzuri ambao suluhisho za kuongeza lazima zipitie.

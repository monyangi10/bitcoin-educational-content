question: 根据 Gregory Maxwell 的分析，在比特币扩展讨论中，什么造成了迫使用户依赖受信任服务的根本性权衡？
answer: 过高的资源使用率淘汰了验证器，而用于解决争议的区块空间访问成本又过高
wrong_answers:
  - 提高交易吞吐量与在不同规模的数据池中保持足够的挖矿盈利能力之间的矛盾
  - 实施隔离见证升级与保持与传统钱包软件的向后兼容性之间的矛盾
  - 第二层解决方案与第三层全球战略扩展方法对有限发展资源和社区支持的竞争
explanation: |
  Maxwell 发现了一个双面问题，即比特币在两个方向上都失去了优势：如果资源使用量相对于可用技术而言过高，验证的成本就会过高，从而使用户不得不依赖可信的第三方，而不是独立验证。相反，如果容量过低，交易方式效率低下，访问区块链解决争议的成本就会过高，从而再次将用户依赖第三方服务。这就形成了一种微妙的平衡，扩展解决方案必须把握好这一平衡。

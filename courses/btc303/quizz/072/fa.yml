question: بر اساس تحلیل گریگوری ماکسول، چه چیزی باعث ایجاد مبادله بنیادی می‌شود که کاربران را در بحث‌های مقیاس‌گذاری Bitcoin به سمت خدمات مورد اعتماد سوق می‌دهد؟
answer: هم قیمت‌گذاری بیش از حد بالای استفاده از منابع که اعتبارسنج‌ها را از دور خارج می‌کند و هم دسترسی بیش از حد گران به فضای بلاک برای حل اختلافات
wrong_answers:
  - تضاد بین افزایش توان عملیاتی تراکنش و حفظ سودآوری مناسب mining در اندازه‌های مختلف استخر
  - تنش بین اجرای ارتقاءهای شاهد جدا شده و حفظ سازگاری معکوس با نرم‌افزار قدیمی wallet
  - رقابت بین راه‌حل‌های لایه دوم و رویکردهای مقیاس‌گذاری on-chain برای منابع توسعه محدود و حمایت جامعه
explanation: |
  مکسول یک مشکل دو طرفه را شناسایی کرد که در آن Bitcoin مزایای خود را در هر دو جهت از دست می‌دهد: اگر استفاده از منابع نسبت به فناوری موجود بیش از حد باشد، اعتبارسنجی بسیار پرهزینه می‌شود و کاربران را مجبور می‌کند به جای اعتبارسنجی مستقل، به اشخاص ثالث مورد اعتماد تکیه کنند. برعکس، اگر ظرفیت بسیار کم باشد و روش‌های تراکنش ناکارآمد باشند، دسترسی به بلاکچین برای حل اختلافات بسیار گران می‌شود و دوباره کاربران را به سمت خدمات مورد اعتماد سوق می‌دهد. این یک تعادل ظریف ایجاد می‌کند که راه‌حل‌های مقیاس‌پذیری باید آن را مدیریت کنند.
question: グレゴリー・マクスウェルの分析によれば、Bitcoinのスケーリングの議論において、ユーザーを信頼できるサービスに向かわせる根本的なトレードオフを生み出すものは何か？
answer: 過剰なリソース使用はバリデーターを排除し、紛争解決のためのブロックスペースへのアクセスは高価になる
wrong_answers:
  - トランザクション・スループットの向上と、プール・サイズの違いによる適切なmining収益性の維持の相克
  - 分離された立会人アップグレードの実施と、レガシーwalletソフトウェアとの後方互換性の維持との間の緊張関係
  - 限られた開発資源とコミュニティの支援をめぐる、レイヤー・ツー・ソリューションとon-chainスケーリング・アプローチの競争
explanation: |
  Maxwell氏は、Bitcoinが双方向で利点を失う両面的な問題を指摘した。利用可能な技術に対してリソースの使用量が多すぎる場合、検証はコストがかかりすぎ、独立して検証する代わりに信頼できる第三者に頼らざるを得なくなるユーザーを排除してしまう。逆に、キャパシティが低すぎ、取引方法が非効率的であれば、紛争解決のためにブロックチェーンにアクセスすることは法外に高価になり、再びユーザーを信頼できるサービスに押しやることになる。これは、スケーリング・ソリューションがナビゲートしなければならない微妙なバランスを生み出している。
question: Според анализа на Грегъри Максуел какво създава основния компромис, който принуждава потребителите да се насочат към доверени услуги в дискусиите за мащабируемост на Bitcoin?
answer: Прекалено високо използване на ресурси, което изключва валидаторите, и прекалено скъп достъп до блоково пространство за разрешаване на спорове
wrong_answers:
  - Конфликтът между увеличаването на пропускателната способност на транзакциите и поддържането на адекватна рентабилност за копаене при различни размери на басейните
  - Напрежението между внедряването на отделно обновяване на свидетелите и запазването на обратната съвместимост с наследения софтуер
  - Състезанието между решенията от второ ниво и подходите за on-chain мащабируемост за ограничени ресурси за развитие и подкрепа от общността
explanation: |
  Максуел идентифицира двустранен проблем, при който Bitcoin губи предимствата си и в двете посоки: ако използването на ресурси е твърде високо в сравнение с наличната технология, валидирането става твърде скъпо и изтласква потребителите, които след това трябва да разчитат на доверени трети страни, вместо да валидират самостоятелно. И обратното, ако капацитетът е твърде нисък и методите за транзакции са неефективни, достъпът до блокчейн за разрешаване на спорове става прекалено скъп, което отново тласка потребителите към доверени услуги. Това създава деликатен баланс, в който трябва да се ориентират решенията за мащабируемост.
reviewed: true

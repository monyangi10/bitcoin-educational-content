question: Согласно анализу Грегори Максвелла, что создает фундаментальный компромисс, который заставляет пользователей обращаться к доверенным сервисам при обсуждении масштабирования Bitcoin?
answer: Как чрезмерно высокое использование ресурсов выбивает валидаторы из колеи, так и чрезмерно дорогой доступ к блочному пространству для разрешения споров
wrong_answers:
  - Конфликт между увеличением пропускной способности транзакций и поддержанием адекватной рентабельности mining при различных размерах пула
  - Противоречие между внедрением раздельной модернизации свидетелей и сохранением обратной совместимости с устаревшим программным обеспечением wallet
  - Конкуренция между решениями второго уровня и подходами к масштабированию ГВ-3 за ограниченные ресурсы развития и поддержку сообщества
explanation: |
  Максвелл выявил двустороннюю проблему, при которой Bitcoin теряет свои преимущества в обоих направлениях: если использование ресурсов слишком велико по сравнению с доступной технологией, проверка становится слишком дорогой и вытесняет пользователей, которые вынуждены полагаться на доверенные третьи стороны вместо того, чтобы проверять самостоятельно. И наоборот, если мощность слишком мала, а методы транзакций неэффективны, доступ к блокчейну для разрешения споров становится непомерно дорогим, что опять же толкает пользователей к доверенным сервисам. Таким образом, создается хрупкий баланс, на который должны ориентироваться решения по масштабированию.
reviewed: false

question: ग्रेगरी मैक्सवेल के विश्लेषण के अनुसार, वह मूलभूत समझौता क्या है जो Bitcoin स्केलिंग चर्चाओं में उपयोगकर्ताओं को विश्वसनीय सेवाओं की ओर जाने के लिए बाध्य करता है?
answer: अत्यधिक उच्च संसाधन उपयोग के कारण सत्यापनकर्ताओं की लागत बढ़ जाती है, तथा विवाद समाधान के लिए ब्लॉक स्पेस तक पहुंच अत्यधिक महंगी हो जाती है।
wrong_answers:
  - विभिन्न पूल आकारों में लेनदेन थ्रूपुट बढ़ाने और पर्याप्त mining लाभप्रदता बनाए रखने के बीच संघर्ष
  - पृथक साक्षी उन्नयन को लागू करने और विरासत wallet सॉफ्टवेयर के साथ पश्चगामी संगतता को बनाए रखने के बीच तनाव
  - सीमित विकास संसाधनों और सामुदायिक समर्थन के लिए लेयर-टू समाधानों और on-chain स्केलिंग दृष्टिकोणों के बीच प्रतिस्पर्धा
explanation: |
  मैक्सवेल ने एक दोहरी समस्या की पहचान की जहाँ Bitcoin दोनों दिशाओं में अपने लाभ खो देता है: यदि उपलब्ध तकनीक की तुलना में संसाधनों का उपयोग बहुत अधिक है, तो सत्यापन बहुत महंगा हो जाता है और उपयोगकर्ताओं को इससे वंचित होना पड़ता है, जिन्हें स्वतंत्र रूप से सत्यापन करने के बजाय विश्वसनीय तृतीय पक्षों पर निर्भर रहना पड़ता है। इसके विपरीत, यदि क्षमता बहुत कम है और लेन-देन के तरीके अक्षम हैं, तो विवाद समाधान के लिए ब्लॉकचेन तक पहुँच अत्यधिक महंगी हो जाती है, जिससे उपयोगकर्ता फिर से विश्वसनीय सेवाओं की ओर धकेले जाते हैं। इससे एक नाजुक संतुलन बनता है जिसे स्केलिंग समाधानों को पार करना होगा।
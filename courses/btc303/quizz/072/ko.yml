question: 그레고리 맥스웰의 분석에 따르면, Bitcoin 확장 논의에서 사용자들이 신뢰할 수 있는 서비스를 선택하게 만드는 근본적인 트레이드오프는 무엇일까요?
answer: 지나치게 높은 리소스 사용량으로 인해 검증자의 가격이 책정되고 분쟁 해결을 위한 블록 공간 액세스가 지나치게 비싸집니다
wrong_answers:
  - 다양한 풀 규모에서 트랜잭션 처리량 증가와 적절한 mining 수익성 유지 사이의 상충 문제
  - 분리된 증인 업그레이드 구현과 레거시 wallet 소프트웨어와의 하위 호환성 유지 사이의 긴장감
  - 제한된 개발 리소스 및 커뮤니티 지원을 위한 레이어 2 솔루션과 on-chain 확장 접근 방식 간의 경쟁
explanation: |
  맥스웰은 사용 가능한 기술에 비해 리소스 사용량이 너무 많으면 검증에 너무 많은 비용이 들기 때문에 사용자가 독립적으로 검증하는 대신 신뢰할 수 있는 제3자에게 의존해야 하는 양면적인 문제를 발견했습니다. 반대로 용량이 너무 적고 거래 방식이 비효율적이라면 분쟁 해결을 위해 블록체인에 액세스하는 비용이 엄청나게 높아져 사용자들은 다시 신뢰할 수 있는 서비스를 찾게 됩니다. 이는 확장 솔루션이 반드시 해결해야 하는 미묘한 균형을 만들어냅니다.
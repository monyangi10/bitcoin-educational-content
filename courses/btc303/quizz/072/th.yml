question: ตามการวิเคราะห์ของ Gregory Maxwell อะไรคือการแลกเปลี่ยนพื้นฐานที่บังคับให้ผู้ใช้หันไปใช้บริการที่เชื่อถือได้ในการสนทนาเกี่ยวกับการปรับขนาด Bitcoin?
answer: ทั้งการใช้ทรัพยากรมากเกินไปที่ทำให้ผู้ตรวจสอบไม่สามารถเข้าถึงได้ และการเข้าถึงพื้นที่บล็อกที่มีราคาแพงเกินไปสำหรับการแก้ไขข้อพิพาท
wrong_answers:
  - ความขัดแย้งระหว่างการเพิ่มปริมาณธุรกรรมและการรักษาความสามารถในการทำกำไรของ mining ให้เพียงพอในขนาดพูลที่แตกต่างกัน
  - ความตึงเครียดระหว่างการดำเนินการอัปเกรดพยานแยกส่วนและการรักษาความเข้ากันได้ย้อนหลังกับซอฟต์แวร์ wallet รุ่นเก่า
  - การแข่งขันระหว่างโซลูชันเลเยอร์สองและแนวทางการปรับขนาด on-chain สำหรับทรัพยากรการพัฒนาที่จำกัดและการสนับสนุนจากชุมชน
explanation: |
  แมกซ์เวลล์ระบุปัญหาที่มีสองด้านซึ่ง Bitcoin สูญเสียข้อได้เปรียบในทั้งสองทิศทาง: หากการใช้ทรัพยากรมากเกินไปเมื่อเทียบกับเทคโนโลยีที่มีอยู่ การตรวจสอบความถูกต้องจะมีค่าใช้จ่ายสูงเกินไปและทำให้ผู้ใช้ต้องพึ่งพาบุคคลที่สามที่เชื่อถือได้แทนที่จะตรวจสอบด้วยตนเอง ในทางกลับกัน หากความจุต่ำและวิธีการทำธุรกรรมไม่มีประสิทธิภาพ การเข้าถึงบล็อกเชนเพื่อการแก้ไขข้อพิพาทจะมีค่าใช้จ่ายสูงเกินไปอีกครั้ง ทำให้ผู้ใช้ต้องพึ่งพาบริการที่เชื่อถือได้ สิ่งนี้สร้างสมดุลที่ละเอียดอ่อนที่โซลูชันการปรับขนาดต้องนำทาง
reviewed: false
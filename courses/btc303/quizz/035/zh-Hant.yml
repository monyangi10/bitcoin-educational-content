question: 擁有 x% 哈希率的不誠實礦工，透過重新 mining 上一個區塊加上一個新區塊，成功執行費用狙擊的數學概率公式是什麼？
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  正確的公式是 (x/(1-x))^2，因為費用狙擊需要礦工成功挖出兩個連續的區塊，以取代之前的區塊，再加上延長區塊鏈。mining 針對誠實的礦工挖出一個區塊的概率是 x/(1-x)，由於必須連續挖出兩個區塊，所以這個概率是平方。其他公式在數學上是可信的，但代表不同的概率情況，不符合收費狙擊的特定要求，不誠實的礦工必須連續兩次克服誠實的網路。

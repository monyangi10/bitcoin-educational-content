question: 해시율이 x%인 부정직한 채굴자가 이전 블록과 새 블록을 다시 mining으로 만들어 수수료 저격에 성공할 수 있는 수학적 확률 공식은 무엇인가요?
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  수수료 저격은 채굴자가 이전 블록을 대체하고 체인을 확장하기 위해 두 블록을 연속으로 성공적으로 채굴해야 하므로 올바른 공식은 (x/(1-x))^2입니다. 정직한 채굴자에 대한 mining 한 블록의 확률은 x/(1-x)이며, 두 블록을 연속적으로 채굴해야 하므로 이 확률은 제곱됩니다. 다른 공식은 수학적으로 그럴듯하지만, 부정직한 채굴자가 정직한 네트워크를 두 번 연속으로 이겨야 하는 수수료 스나이핑의 특정 요건과 일치하지 않는 다른 확률 시나리오를 나타냅니다.
reviewed: false

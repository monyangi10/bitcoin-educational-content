question: Каква е формулата за математическа вероятност недобросъвестен миньор с х процента хешрейт да изпълни успешно таксуване чрез повторно копаене на предишния блок плюс нов блок?
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  Правилната формула е (x/(1-x))^2, тъй като таксуването изисква миньорът да добие успешно два последователни блока, за да замени предишния блок и да удължи веригата. Вероятността за копаене на един блок срещу честни миньори е x/(1-x) и тъй като трябва да се добият два последователни блока, тази вероятност е квадратна. Другите формули са математически правдоподобни, но представляват различни вероятностни сценарии, които не съответстват на специфичните изисквания на таксуването на снайпери, при което нечестният миньор трябва да преодолее честната мрежа два пъти последователно.
reviewed: true

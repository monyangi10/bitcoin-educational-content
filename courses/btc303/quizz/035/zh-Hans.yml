question: 算力占全网 x% 的不诚实矿工，要想通过重新挖掘上一个区块并再挖出一个新区块来实施费用狙击攻击，其成功的数学概率公式是什么？
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  正确的公式是 (x/(1-x))^2，因为服用狙击要求矿工连续成功挖出两个区块，以替换前一个区块并延长链条。针对诚实矿工挖出一个区块的挖矿概率是 x/(1-x)，由于必须连续挖出两个区块，因此该概率是该值的平方值。其他公式在数学上是可信的，但代表了不同的概率情况，与费用狙击的具体要求不符，在费用狙击中，不诚实的矿工必须连续两次战胜诚实的网络。

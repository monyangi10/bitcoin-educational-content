question: 一个哈希率为 x% 的不诚实矿工通过重新 mining 前一个区块加上一个新区块，成功执行收费狙击的数学概率公式是什么？
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  正确的公式是 (x/(1-x))^2，因为收费狙击要求矿工连续成功挖出两个区块，以替换前一个区块并延长链条。针对诚实矿工开采一个区块的 mining 概率是 x/(1-x)，由于必须连续开采两个区块，因此该概率是平方。其他公式在数学上是可信的，但代表了不同的概率情况，与收费狙击的具体要求不符，在收费狙击中，不诚实的矿工必须连续两次战胜诚实的网络。
reviewed: false

question: x प्रतिशत हैश दर वाले बेईमान माइनर के लिए पिछले ब्लॉक के साथ-साथ एक नए ब्लॉक को पुनः mining करके फीस स्निपिंग को सफलतापूर्वक निष्पादित करने की गणितीय संभाव्यता सूत्र क्या है?
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  सही सूत्र (x/(1-x))^2 है क्योंकि फ़ी स्निपिंग के लिए माइनर को पिछले ब्लॉक को बदलने और चेन को आगे बढ़ाने के लिए लगातार दो ब्लॉकों का सफलतापूर्वक खनन करना आवश्यक है। ईमानदार माइनर्स के विरुद्ध mining के एक ब्लॉक की संभावना x/(1-x) है, और चूँकि दो ब्लॉकों का लगातार खनन किया जाना आवश्यक है, इसलिए यह संभावना वर्गाकार है। अन्य सूत्र गणितीय रूप से प्रशंसनीय हैं, लेकिन अलग-अलग संभाव्यता परिदृश्यों का प्रतिनिधित्व करते हैं जो फ़ी स्निपिंग की विशिष्ट आवश्यकताओं से मेल नहीं खाते, जहाँ बेईमान माइनर को लगातार दो बार ईमानदार नेटवर्क को पार करना होता है।

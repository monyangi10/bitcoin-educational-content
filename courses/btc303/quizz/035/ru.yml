question: Какова математическая формула вероятности того, что нечестный майнер с хэшрейтом x процентов успешно выполнит fee sniping, перегенералив предыдущий блок плюс новый блок?
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  Правильная формула - (x/(1-x))^2, потому что платный снайпинг требует от майнера успешной добычи двух последовательных блоков, чтобы заменить предыдущий блок и продлить цепочку. Вероятность mining одного блока против честных майнеров равна x/(1-x), а поскольку два блока должны быть добыты последовательно, эта вероятность возводится в квадрат. Другие формулы математически правдоподобны, но представляют собой различные вероятностные сценарии, которые не соответствуют специфическим требованиям fee sniping, где нечестный майнер должен дважды подряд преодолеть честную сеть.
question: فرمول احتمال ریاضی برای یک ماینر ناصادق با نرخ هش x درصد برای اجرای موفقیت‌آمیز fee sniping با بازسازی بلوک قبلی به علاوه یک بلوک جدید چیست؟
answer: \((\frac{x}{1-x})^2\)
wrong_answers:
  - \( \frac{x^2}{1-x} \)
  - (1-x)^2/x
  - \( \frac{x}{(1-x)^2} \)
explanation: |
  فرمول صحیح (x/(1-x))^2 است زیرا برای انجام fee sniping، یک ماینر باید دو بلاک متوالی را با موفقیت استخراج کند تا بلاک قبلی را جایگزین کرده و زنجیره را گسترش دهد. احتمال mining یک بلاک در برابر ماینرهای صادق x/(1-x) است و از آنجا که دو بلاک باید متوالی استخراج شوند، این احتمال به توان دو می‌رسد. فرمول‌های دیگر از نظر ریاضی ممکن هستند اما سناریوهای احتمالی متفاوتی را نشان می‌دهند که با نیازهای خاص fee sniping مطابقت ندارند، جایی که ماینر ناصادق باید دو بار متوالی بر شبکه صادق غلبه کند.
reviewed: false

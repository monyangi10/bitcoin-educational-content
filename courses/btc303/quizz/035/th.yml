question: สูตรความน่าจะเป็นทางคณิตศาสตร์สำหรับนักขุดที่ไม่ซื่อสัตย์ที่มีอัตราแฮช x เปอร์เซ็นต์ในการดำเนินการ fee sniping โดยการ re-mining บล็อกก่อนหน้าพร้อมกับบล็อกใหม่คืออะไร?
answer: \((\frac{x}{1-x})^2\)
wrong_answers:
  - \( \frac{x^2}{1-x} \)
  - \((1-x)^2/x\)
  - \( \frac{x}{(1-x)^2} \)
explanation: |
  สูตรที่ถูกต้องคือ (x/(1-x))^2 เพราะการโจมตีด้วยค่าธรรมเนียมต้องการให้คนขุดเหมืองประสบความสำเร็จในการขุดบล็อกสองบล็อกติดต่อกันเพื่อแทนที่บล็อกก่อนหน้าและขยายสายโซ่ ความน่าจะเป็นของ mining หนึ่งบล็อกต่อคนขุดเหมืองที่ซื่อสัตย์คือ x/(1-x) และเนื่องจากต้องขุดสองบล็อกติดต่อกัน ความน่าจะเป็นนี้จึงถูกยกกำลังสอง สูตรอื่น ๆ นั้นมีความเป็นไปได้ทางคณิตศาสตร์แต่แสดงถึงสถานการณ์ความน่าจะเป็นที่แตกต่างกันซึ่งไม่ตรงกับข้อกำหนดเฉพาะของการโจมตีด้วยค่าธรรมเนียม ที่คนขุดเหมืองที่ไม่ซื่อสัตย์ต้องเอาชนะเครือข่ายที่ซื่อสัตย์สองครั้งติดต่อกัน
reviewed: false
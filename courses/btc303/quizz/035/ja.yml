question: xパーセントのハッシュレートを持つ不正なマイナーが、前のブロックに新しいブロックを加えて再マイニングすることによって手数料スナイピングを成功させる数学的確率式は何ですか？
answer: (x/(1-x))^2
wrong_answers:
  - x^2/(1-x)
  - (1-x)^2/x
  - x/(1-x)^2
explanation: |
  手数料スナイピングを行うには、マイナーが2つのブロックを連続してマイニングし、前のブロックの置き換えとチェーンの延長に成功する必要があるため、正しい式は(x/(1-x))^2である。正直なマイナーに対して1ブロックをマイニングする確率はx/(1-x)であり、2ブロックを連続してマイニングしなければならないので、この確率は2乗される。他の公式は数学的にはもっともらしいが、異なる確率シナリオを表しており、不正なマイナーが正直なネットワークを2回続けて打ち負かさなければならない手数料スナイピングの特定の要件にはマッチしない。

question: Bitcoin ने कौन सी समस्या हल की जिसे पिछली डिजिटल मुद्राएं हल करने में विफल रहीं?
answer: विकेन्द्रीकृत तरीके से double-spending समस्या
wrong_answers:
  - पीयर-टू-पीयर नेटवर्क में एन्क्रिप्शन समस्या
  - डिजिटल लेनदेन के लिए भंडारण समस्या
  - ऑनलाइन भुगतान में गति की समस्या
explanation: |
  Bitcoin की सफलता double-spending समस्या को बिना किसी केंद्रीय प्राधिकरण की आवश्यकता के हल करने में थी। double-spending समस्या किसी व्यक्ति को एक ही डिजिटल मुद्रा को दो बार खर्च करने से रोकने की चुनौती है। पिछली डिजिटल मुद्राएँ इसलिए विफल रहीं क्योंकि वे केंद्रीय सर्वर या विश्वसनीय प्राधिकरणों पर निर्भर थीं, जिससे वे सेंसरशिप और एकल विफलता बिंदुओं के प्रति संवेदनशील हो गईं। Bitcoin ने proof-of-work का उपयोग करके अपने पीयर-टू-पीयर वितरित टाइमस्टैम्प सर्वर के माध्यम से इस समस्या का समाधान किया, जिससे नेटवर्क बिना किसी केंद्रीय नियंत्रण के लेनदेन क्रम पर सहमत हो सका।

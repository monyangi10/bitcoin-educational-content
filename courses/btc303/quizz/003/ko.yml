question: 이전의 디지털 화폐가 해결하지 못한 문제를 Bitcoin는 어떤 방식으로 해결했나요?
answer: 탈중앙화 방식의 double-spending 문제
wrong_answers:
  - 피어 투 피어 네트워크의 암호화 문제
  - 디지털 트랜잭션의 스토리지 문제
  - 온라인 결제의 속도 문제
explanation: |
  Bitcoin의 돌파구는 중앙 기관 없이도 double-spending 문제를 해결하는 것이었습니다. double-spending 문제는 동일한 디지털 코인을 두 번 사용하는 것을 방지하는 문제입니다. 이전의 디지털 화폐는 중앙 서버나 신뢰할 수 있는 기관에 의존하여 검열과 단일 장애 지점에 취약했기 때문에 실패했습니다. Bitcoin는 proof-of-work를 사용하는 P2P 분산 타임스탬프 서버를 통해 이 문제를 해결하여 네트워크가 중앙 통제 없이 거래 순서에 동의할 수 있도록 했습니다.

question: Bitcoin แก้ปัญหาอะไรที่สกุลเงินดิจิทัลก่อนหน้านี้ไม่สามารถแก้ไขได้?
answer: ปัญหา double-spending ในรูปแบบการกระจายอำนาจ
wrong_answers:
  - ปัญหาการเข้ารหัสในเครือข่ายเพียร์ทูเพียร์
  - ปัญหาการจัดเก็บสำหรับธุรกรรมดิจิทัล
  - ปัญหาความเร็วในการชำระเงินออนไลน์
explanation: |
  ความก้าวหน้าของ Bitcoin คือการแก้ปัญหา double-spending โดยไม่ต้องการอำนาจกลาง ปัญหา double-spending คือความท้าทายในการป้องกันไม่ให้ใครใช้เหรียญดิจิทัลเดียวกันซ้ำ สกุลเงินดิจิทัลก่อนหน้านี้ล้มเหลวเพราะพวกเขาพึ่งพาเซิร์ฟเวอร์กลางหรืออำนาจที่เชื่อถือได้ ทำให้พวกเขาเสี่ยงต่อการถูกเซ็นเซอร์และจุดล้มเหลวเดียว Bitcoin แก้ปัญหานี้ผ่านเซิร์ฟเวอร์ประทับเวลาแบบกระจาย peer-to-peer โดยใช้ proof-of-work ทำให้เครือข่ายสามารถตกลงในการจัดลำดับธุรกรรมโดยไม่ต้องมีการควบคุมจากศูนย์กลางใด ๆ
reviewed: false
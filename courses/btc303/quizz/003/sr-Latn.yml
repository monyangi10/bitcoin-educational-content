question: Koji problem je rešio Bitcoin koji prethodne digitalne valute nisu uspele da reše?
answer: Problem dvostruke potropnje na decentralizovan način
wrong_answers:
  - Problem enkripcije u peer-to-peer mrežama
  - Problem skladištenja za digitalne transakcije
  - Problem brzine u onlajn plaćanjima
explanation: |
  Proboj Bitcoina bilo je rešavanje problema dvostruke potrošnje bez potrebe za centralnim autoritetom. Problem dvostruke potrošnje je izazov sprečavanja
  nekoga da potroši isti digitalni novčić dva puta. Prethodne digitalne valute nisu uspele jer su se oslanjale na centralne servere ili pouzdane autoritete, 
  što ih je činilo ranjivim na cenzuru i jedinstvene tačke kvara. Bitcoin je ovo rešio putem svog peer-to-peer distribuiranog servera vremenskih oznaka 
  koristeći proof-of-work, omogućavajući mreži da se složi oko redosleda transakcija bez ikakve centralne kontrole.
reviewed: true

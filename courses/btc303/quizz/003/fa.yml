question: Bitcoin چه مشکلی را حل کرد که ارزهای دیجیتال قبلی نتوانستند به آن بپردازند؟
answer: مشکل double-spending به صورت غیرمتمرکز
wrong_answers:
  - مشکل رمزگذاری در شبکه‌های همتا به همتا
  - مشکل ذخیره‌سازی برای تراکنش‌های دیجیتال
  - مشکل سرعت در پرداخت‌های آنلاین
explanation: |
  پیشرفت Bitcoin حل مشکل double-spending بدون نیاز به یک مرجع مرکزی بود. مشکل double-spending چالش جلوگیری از خرج کردن دوباره یک سکه دیجیتال توسط یک نفر است. ارزهای دیجیتال قبلی به دلیل وابستگی به سرورهای مرکزی یا مراجع مورد اعتماد شکست خوردند، زیرا این وابستگی‌ها آن‌ها را در معرض سانسور و نقاط شکست واحد قرار می‌داد. Bitcoin این مشکل را از طریق سرور زمان‌بندی توزیع‌شده همتا به همتا با استفاده از proof-of-work حل کرد و به شبکه اجازه داد تا بدون هیچ کنترل مرکزی بر روی ترتیب تراکنش‌ها توافق کند.
reviewed: false

question: Какую проблему решила Bitcoin, которую не смогли решить предыдущие цифровые валюты?
answer: Децентрализованное решение проблемы double-spending
wrong_answers:
  - Проблема шифрования в одноранговых сетях
  - Проблема хранения цифровых транзакций
  - Проблема скорости в онлайн-платежах
explanation: |
  Прорывом Bitcoin стало решение проблемы double-spending без необходимости создания центрального органа власти. Проблема double-spending заключается в том, чтобы не дать кому-то потратить одну и ту же цифровую монету дважды. Предыдущие цифровые валюты потерпели неудачу, потому что они зависели от центральных серверов или доверенных органов, что делало их уязвимыми для цензуры и единых точек отказа. Bitcoin решила эту проблему с помощью однорангового распределенного сервера временных меток, использующего proof-of-work, что позволяет сети согласовывать порядок транзакций без какого-либо центрального контроля.
reviewed: false

question: Hvilket problem løste Bitcoin som tidligere digitale valutaer ikke klarte å løse?
answer: double-spending-problemet på en desentralisert måte
wrong_answers:
  - Krypteringsproblemet i peer-to-peer-nettverk
  - Lagringsproblemet for digitale transaksjoner
  - Hastighetsproblemet ved nettbetalinger
explanation: |
  Bitcoins gjennombrudd var å løse double-spending-problemet uten å kreve en sentral myndighet. double-spending-problemet er utfordringen med å forhindre at noen bruker den samme digitale mynten to ganger. Tidligere digitale valutaer mislyktes fordi de var avhengige av sentrale servere eller betrodde autoriteter, noe som gjorde dem sårbare for sensur og single points of failure. Bitcoin løste dette ved hjelp av en peer-to-peer-distribuert tidsstempelserver som bruker proof-of-work, slik at nettverket kan bli enige om transaksjonsrekkefølgen uten noen sentral kontroll.
reviewed: false

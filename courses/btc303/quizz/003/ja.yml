question: Bitcoinは、これまでのデジタル通貨が解決できなかったどのような問題を解決したのだろうか？
answer: 分散型のdouble-spending問題
wrong_answers:
  - ピアツーピアネットワークにおける暗号化問題
  - デジタル取引の保管問題
  - オンライン決済におけるスピードの問題
explanation: |
  Bitcoinのブレークスルーは、中央当局を必要とせずにdouble-spending問題を解決することだった。double-spending問題とは、誰かが同じデジタルコインを2度使うことを防ぐという課題である。これまでのデジタル通貨は、中央のサーバーや信頼できる当局に依存していたため、検閲や単一障害点の影響を受けやすく、失敗に終わっていた。Bitcoinは、proof-of-workを利用したピアツーピアの分散型タイムスタンプサーバーによってこれを解決し、中央のコントロールなしにネットワークが取引順序に合意することを可能にした。
reviewed: false

question: ビットコインは、これまでのデジタル通貨が解決できなかったどのような問題を解決したのだろうか？
answer: 分散型における二重支払い問題
wrong_answers:
  - ピアツーピア（P2P） ネットワークにおける暗号化問題
  - デジタル取引における保管問題
  - オンライン決済におけるスピードの問題
explanation: |
  ビットコインのブレークスルーは、中央主体を必要とせずに二重支払い問題を解決することだった。二重支払い問題とは、誰かが同じデジタルコインを2度使うことを防ぐという課題である。これまでのデジタル通貨は、中央のサーバーや信頼できる主体に依存していたため、検閲や単一障害点の影響を受けやすく、失敗に終わっていた。ビットコインは、プルーフ・オブ・ワーク（PoW）を利用したピアツーピア（P2P）の分散型タイムスタンプサーバーによってこれを解決し、中央のコントロールなしにネットワークがトランザクション順序に合意することを可能にした。
reviewed: false

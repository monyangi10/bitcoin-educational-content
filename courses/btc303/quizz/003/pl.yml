question: Jaki problem rozwiązał Bitcoin, którego nie udało się rozwiązać poprzednim walutom cyfrowym?
answer: Problem double-spending w sposób zdecentralizowany
wrong_answers:
  - Problem szyfrowania w sieciach peer-to-peer
  - Problem z przechowywaniem transakcji cyfrowych
  - Problem z szybkością płatności online
explanation: |
  Przełomem w Bitcoin było rozwiązanie problemu double-spending bez konieczności posiadania centralnego organu. Problem double-spending polega na uniemożliwieniu komuś wydania tej samej monety cyfrowej dwukrotnie. Poprzednie waluty cyfrowe zawiodły, ponieważ opierały się na centralnych serwerach lub zaufanych organach, co czyniło je podatnymi na cenzurę i pojedyncze punkty awarii. Bitcoin rozwiązał ten problem dzięki rozproszonemu serwerowi znaczników czasu peer-to-peer wykorzystującemu proof-of-work, umożliwiając sieci uzgodnienie kolejności transakcji bez żadnej centralnej kontroli.
reviewed: false

question: Какъв проблем реши Bitcoin, който предишните цифрови валути не успяха да решат?
answer: Проблемът с double-spending по децентрализиран начин
wrong_answers:
  - Проблемът с криптирането в мрежите peer-to-peer
  - Проблемът със съхранението на цифрови транзакции
  - Проблемът със скоростта при онлайн плащанията
explanation: |
  Пробивът на Bitcoin беше решаването на проблема с double-spending, без да е необходим централен орган. Проблемът с double-spending се състои в това да се попречи на някой да похарчи една и съща цифрова монета два пъти. Предишните цифрови валути се провалиха, защото разчитаха на централни сървъри или доверени органи, което ги правеше уязвими към цензура и единични точки на провал. Bitcoin реши този проблем чрез своя разпределен peer-to-peer сървър за времеви печати, използвайки proof-of-work, което позволява на мрежата да се споразумее за подреждането на трансакциите без централен контрол.
reviewed: true

question: Nk’uko Gregory Maxwell abivuga, ni kubera iki gukingira ivy’amahera ari ngirakamaro kugira ngo isoko ry’uburenganzira rikore neza?
answer: Kubera ko ubudandaji butashobora gushinga neza ibiciro canke guhiganwa nimba abagurisha, abaguzi be n’abahiganwa bashobora kubona ivyo bacuruza vyose .
wrong_answers:
  - Kubera ko bibuza Leta gutegeka no gutanga imisoro ku bikorwa vy’ubudandaji n’ibikorwa vy’ubudandaji .
  - Kubera ko bituma abacuruzi bashobora guhisha ibikorwa bitemewe n’amategeko no kwirinda kwubahiriza ibisabwa mu gutanga raporo y’ivy’amahera .
  - Kubera ko bituma amashirahamwe ashobora gukoresha nabi ibiciro vy’isoko ataco abajejwe gucungera ibiciro babimenye .
explanation: |
  Gregory Maxwell avuga ko ubuzima bwite bw’ivy’amahera ari ikintu gihambaye cane kugira ngo isoko ry’ubuntu ribe ryiza kubera ko ubucuruzi bukeneye ubuzima bwite bw’ibikorwa kugira ngo bukore neza. Iyo abagurisha n’abaguzi bashobora kubona ibintu vyose bigurishwa, ubudandaji buratakaza ububasha bwo guhanahana amakuru kandi ntibushobora gushinga ibiciro bihuye n’ibindi. Na vyo nyene, nimba abahiganwa bashobora gukurikirana ivy’ugucuruza n’ivy’ubudandaji, amashirahamwe ntashobora guhiganwa ku buryo bungana. Ayandi mahitamwo ntabwo ari meza kubera ko ingingo ya Maxwell yibanda ku bikorwa vy’ubudandaji bibereye no ku gutuma isoko rikora neza, atari ku kwirinda amategeko, guhisha ibikorwa bitemewe n’amategeko canke gukoresha nabi isoko.

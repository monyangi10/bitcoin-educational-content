question: ग्रेगरी मैक्सवेल के अनुसार, मुक्त बाजार के कुशल संचालन के लिए वित्तीय गोपनीयता क्यों आवश्यक है?
answer: क्योंकि यदि आपूर्तिकर्ता, ग्राहक और प्रतिस्पर्धी उनके सभी लेन-देन देख सकते हैं तो व्यवसाय प्रभावी रूप से कीमतें निर्धारित नहीं कर सकते हैं या प्रतिस्पर्धा नहीं कर सकते हैं
wrong_answers:
  - क्योंकि यह व्यापारिक लेनदेन और वाणिज्यिक गतिविधियों के सरकारी विनियमन और कराधान को रोकता है
  - क्योंकि यह व्यवसायों को अवैध गतिविधियों को छिपाने और वित्तीय रिपोर्टिंग आवश्यकताओं के अनुपालन से बचने की अनुमति देता है
  - क्योंकि यह कंपनियों को नियामक प्राधिकरणों की जानकारी के बिना बाजार मूल्यों में हेरफेर करने में सक्षम बनाता है
explanation: |
  ग्रेगरी मैक्सवेल का तर्क है कि मुक्त बाज़ार की दक्षता के लिए वित्तीय गोपनीयता अत्यंत महत्वपूर्ण है क्योंकि व्यवसायों को प्रभावी ढंग से संचालन के लिए लेन-देन की गोपनीयता की आवश्यकता होती है। यदि आपूर्तिकर्ता और ग्राहक सभी लेन-देन देख सकते हैं, तो व्यवसाय बातचीत की शक्ति खो देते हैं और प्रतिस्पर्धी मूल्य निर्धारित नहीं कर पाते। इसी प्रकार, यदि प्रतिस्पर्धी बिक्री और व्यावसायिक लेन-देन पर नज़र रख सकते हैं, तो कंपनियाँ समान स्तर पर प्रतिस्पर्धा नहीं कर पातीं। अन्य विकल्प गलत हैं क्योंकि मैक्सवेल का तर्क वैध व्यावसायिक संचालन और बाज़ार दक्षता पर केंद्रित है, न कि विनियमन से बचने, अवैध गतिविधियों को छिपाने या बाज़ार में हेरफेर करने पर।

question: Kulingana na Gregory Maxwell, kwa nini faragha ya kifedha ni muhimu kwa uendeshaji bora wa soko huria?
answer: Kwa sababu biashara haziwezi kuweka bei vizuri au kushindana ikiwa wasambazaji, wateja na washindani wanaweza kuona shughuli zao zote.
wrong_answers:
  - Kwa sababu inazuia udhibiti wa serikali na ushuru wa shughuli za biashara na shughuli za kibiashara
  - Kwa sababu inaruhusu biashara kuficha shughuli haramu na kuepuka kutii mahitaji ya kuripoti fedha
  - Kwa sababu inawezesha makampuni kuendesha bei za soko bila kutambuliwa na mamlaka za udhibiti
explanation: |
  Gregory Maxwell anahoji kuwa faragha ya kifedha ni muhimu kwa ufanisi wa soko huria kwa sababu biashara zinahitaji faragha ya shughuli ili kufanya kazi kwa ufanisi. Ikiwa wasambazaji na wateja wanaweza kuona shughuli zote, biashara hupoteza uwezo wa kujadiliana na haziwezi kuweka bei shindani. Vile vile, ikiwa washindani wanaweza kufuatilia mauzo na shughuli za biashara, makampuni hayawezi kushindana kwa masharti sawa. Chaguzi nyingine si sahihi kwa sababu hoja ya Maxwell inalenga utendakazi halali wa biashara na ufanisi wa soko, si kuepuka udhibiti, kuficha shughuli haramu au udukuzi wa soko.
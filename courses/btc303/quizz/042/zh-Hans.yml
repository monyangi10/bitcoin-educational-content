question: 在 Segwit 升级过程中，Shaolinfry 提出用户激活软分叉（UASF）机制的主要原因是什么？
answer: 尽管得到了绝大多数用户的支持，但矿工们并没有发出支持 Segwit 的信号，从而造成了僵局
wrong_answers:
  - 现有的软分叉机制速度太慢，需要更快的启动时间表
  - 硬分叉被认为风险太大，需要一种新的软分叉方法来保证安全
  - Bitcoin Core 开发者要求提供一种替代方案，以减少他们在升级方面的责任
explanation: |
  据该章介绍，2016 年 10 月 Segwit 激活码发布时，比特币用户中出现了压倒性的支持，但矿工们并没有发出支持升级的信号，这使得激活工作停滞不前，看不到任何解决方案。这就需要一种不依赖矿工信号的替代机制，于是 Shaolinfry 提出了 UASF 这一解决方案，用经济多数执行来代替哈希率激活。

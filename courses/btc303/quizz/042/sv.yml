question: Vad var det främsta skälet till att Shaolinfry föreslog mekanismen User Activated Soft Fork (UASF) under Segwit-uppgraderingsprocessen?
answer: Gruvarbetare signalerade inte stöd för Segwit trots överväldigande användarstöd, vilket skapade ett dödläge
wrong_answers:
  - Den befintliga mjuka fork-mekanismen var för långsam och krävde en snabbare tidslinje för aktivering
  - Hard-gafflar ansågs vara för riskabla och en ny mjuk fork-metod behövdes för säkerheten
  - Bitcoin Core-utvecklarna begärde ett alternativ för att minska sitt ansvar för uppgraderingar
explanation: |
  Enligt kapitlet, när Segwit-aktiveringskoden släpptes i oktober 2016, fanns det ett överväldigande stöd bland Bitcoin-användare, men gruvarbetare signalerade inte stöd för uppgraderingen, vilket stoppade aktiveringen utan någon lösning i sikte. Detta skapade behovet av en alternativ mekanism som inte förlitade sig på gruvsignalering, vilket ledde Shaolinfry att föreslå UASF som en lösning som skulle använda ekonomisk majoritetsverkställighet istället för hashkraftaktivering.
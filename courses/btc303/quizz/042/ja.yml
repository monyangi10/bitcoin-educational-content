question: Segwitのアップグレードプロセスにおいて、Shaolinfryがユーザー起動型ソフトフォーク（UASF）メカニズムを提案した主な理由は何ですか？
answer: ユーザーの圧倒的な支持にもかかわらず、マイナーはSegwitのサポートを表明せず、膠着状態に陥ったため
wrong_answers:
  - 既存のソフトフォークメカニズムでは時間がかかりすぎるため、より迅速なアクティベーション・タイムラインが必要だったため
  - ハードフォークはリスクが高すぎると考えられ、安全性のために新しいソフトフォーク方式が必要だったため
  - ビットコインコア開発者は、アップグレードにおける責任を軽減するための代替案を要求したため
explanation: |
  同章によると、2016年10月にSegwitのアクティベーションコードが公開された際、ビットコインユーザーの間では圧倒的な支持があったが、マイナーはアップグレードへの支持を表明せず、解決策が見えないままアクティベーションが停滞した。このため、マイナーのシグナルに依存しない代替メカニズムが必要となり、Shaolinfryは、ハッシュパワーのアクティベーションの代わりに経済的多数決を利用するソリューションとしてUASFを提案するに至った。
reviewed: false

question: เหตุผลหลักที่ Shaolinfry เสนอกลไก User Activated Soft Fork (UASF) ในระหว่างกระบวนการอัปเกรด Segwit คืออะไร?
answer: คนขุดเหมืองไม่ได้ส่งสัญญาณสนับสนุน Segwit แม้ว่าผู้ใช้จะสนับสนุนอย่างท่วมท้น ทำให้เกิดทางตัน
wrong_answers:
  - กลไก fork แบบนุ่มที่มีอยู่เดิมช้าเกินไปและต้องการไทม์ไลน์การเปิดใช้งานที่เร็วขึ้น
  - ฮาร์ดฟอร์กถูกพิจารณาว่าเสี่ยงเกินไปและจำเป็นต้องมีวิธีการซอฟต์ fork ใหม่เพื่อความปลอดภัย
  - นักพัฒนาแกนกลาง Bitcoin ขอทางเลือกเพื่อลดความรับผิดชอบในการอัปเกรด
explanation: |
  ตามบทนี้ เมื่อโค้ดการเปิดใช้งาน Segwit ถูกปล่อยออกมาในเดือนตุลาคม 2016 มีการสนับสนุนอย่างท่วมท้นในหมู่ผู้ใช้ Bitcoin แต่คนขุดแร่ไม่ได้ส่งสัญญาณสนับสนุนการอัปเกรด ซึ่งทำให้การเปิดใช้งานหยุดชะงักโดยไม่มีการแก้ไขในสายตา สิ่งนี้สร้างความจำเป็นสำหรับกลไกทางเลือกที่ไม่ต้องพึ่งพาการส่งสัญญาณของคนขุดแร่ นำไปสู่การที่ Shaolinfry เสนอ UASF เป็นทางออกที่จะใช้การบังคับใช้โดยเสียงข้างมากทางเศรษฐกิจแทนการเปิดใช้งานด้วยพลังแฮช
reviewed: false
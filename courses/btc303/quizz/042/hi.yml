question: सेगविट अपग्रेड प्रक्रिया के दौरान शाओलिनफ्राई ने यूजर एक्टिवेटेड Soft Fork (UASF) तंत्र का प्रस्ताव क्यों रखा?
answer: भारी उपयोगकर्ता समर्थन के बावजूद माइनर्स सेगविट के लिए समर्थन का संकेत नहीं दे रहे थे, जिससे गतिरोध पैदा हो रहा था
wrong_answers:
  - मौजूदा सॉफ्ट fork तंत्र बहुत धीमा था और इसके लिए तेज़ सक्रियण समय-सीमा की आवश्यकता थी
  - Hard फोर्क्स को बहुत जोखिम भरा माना गया और सुरक्षा के लिए एक नई सॉफ्ट fork विधि की आवश्यकता थी
  - Bitcoin कोर डेवलपर्स ने अपग्रेड में अपनी जिम्मेदारी कम करने के लिए एक विकल्प का अनुरोध किया
explanation: |
  अध्याय के अनुसार, जब अक्टूबर 2016 में सेगविट एक्टिवेशन कोड जारी किया गया था, तो Bitcoin उपयोगकर्ताओं के बीच इसका ज़बरदस्त समर्थन था, लेकिन माइनर्स ने अपग्रेड के लिए समर्थन का संकेत नहीं दिया, जिससे एक्टिवेशन रुक गया और कोई समाधान नज़र नहीं आ रहा था। इससे एक वैकल्पिक तंत्र की आवश्यकता पैदा हुई जो माइनर सिग्नलिंग पर निर्भर न हो, जिसके कारण शाओलिनफ़्री ने यूएएसएफ को एक ऐसे समाधान के रूप में प्रस्तावित किया जो हैश पावर एक्टिवेशन के बजाय आर्थिक बहुमत प्रवर्तन का उपयोग करेगा।
reviewed: false

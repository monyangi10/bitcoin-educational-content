question: Shaolinfry'nin Segwit yükseltme sürecinde Kullanıcı Etkinleştirilmiş Soft Fork (UASF) mekanizmasını önermesinin temel nedeni neydi?
answer: Madenciler, yoğun kullanıcı desteğine rağmen Segwit için destek sinyali vermeyerek bir çıkmaz yarattı
wrong_answers:
  - Mevcut yumuşak fork mekanizması çok yavaştı ve daha hızlı bir aktivasyon zaman çizelgesi gerektiriyordu
  - Hard çatalları çok riskli olarak değerlendirildi ve güvenlik için yeni bir yumuşak fork yöntemine ihtiyaç duyuldu
  - Bitcoin Çekirdek geliştiricileri, yükseltmelerdeki sorumluluklarını azaltmak için bir alternatif talep ettiler
explanation: |
  Bölüme göre, Segwit aktivasyon kodu Ekim 2016'da yayınlandığında, Bitcoin kullanıcıları arasında büyük bir destek vardı, ancak madenciler yükseltme için destek sinyali vermedi ve bu da görünürde bir çözüm olmadan aktivasyonu durdurdu. Bu durum, madencilerin sinyal vermesine dayanmayan alternatif bir mekanizma ihtiyacını doğurdu ve Shaolinfry'nin hash gücü aktivasyonu yerine ekonomik çoğunluk uygulamasını kullanacak bir çözüm olarak UASF'yi önermesine yol açtı.
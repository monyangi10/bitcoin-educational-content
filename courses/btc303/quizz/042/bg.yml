question: Каква беше основната причина, поради която Shaolinfry предложи механизма User Activated Soft Fork (UASF) по време на процеса на обновяване на Segwit?
answer: Миньорите не сигнализираха за поддръжка на Segwit въпреки огромната подкрепа на потребителите, което доведе до патова ситуация
wrong_answers:
  - Съществуващото меко разклонение бе твърде бавно като процес и изискваше по-бърз график за активиране
  - твърдите разклонения бяха счетени за твърде рискови и за безопасността беше необходим ново меко такова
  - Разработчиците на Bitcoin core поискаха алтернатива за намаляване на отговорността им за модернизацията
explanation: |
  Според главата, когато кодът за активиране на Segwit е бил пуснат през октомври 2016 г., е имало огромна подкрепа сред потребителите на Bitcoin, но миньорите не са сигнализирали за подкрепа на ъпгрейда, което е забавило активирането, без да се вижда решение. Това породи нуждата от алтернативен механизъм, който не разчита на сигнализиране от страна на миньорите, което накара Шаолинфри да предложи UASF като решение, което ще използва прилагане на икономическото мнозинство вместо активиране на хеш мощността.
reviewed: true

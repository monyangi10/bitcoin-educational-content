question: Какова была основная причина, по которой Shaolinfry предложила механизм User Activated Soft Fork (UASF) в процессе обновления Segwit?
answer: Майнеры не сигнализировали о поддержке Segwit, несмотря на подавляющую поддержку пользователей, создавая тупиковую ситуацию
wrong_answers:
  - Существующий мягкий механизм fork был слишком медленным и требовал более быстрого времени активации
  - Вилки Hard считались слишком рискованными, и для обеспечения безопасности требовался новый мягкий метод fork
  - Разработчики ядра Bitcoin запросили альтернативу, чтобы снизить свою ответственность за модернизацию
explanation: |
  Согласно главе, когда код активации Segwit был выпущен в октябре 2016 года, пользователи Bitcoin поддержали его, но майнеры не подали сигнал о поддержке обновления, что затормозило активацию, и решение не было найдено. В результате возникла необходимость в альтернативном механизме, который не зависел бы от сигналов майнеров, и Шаолиньфри предложил UASF в качестве решения, которое использовало бы принуждение экономического большинства вместо активации хэш-мощности.
question: 세그윗 업그레이드 과정에서 샤오린프라이가 사용자 활성화 Soft Fork(UASF) 메커니즘을 제안한 주된 이유는 무엇인가요?
answer: 압도적인 사용자 지지에도 불구하고 채굴자들이 세그윗에 대한 지지를 표명하지 않아 교착 상태가 지속되고 있습니다
wrong_answers:
  - 기존의 소프트 fork 메커니즘은 너무 느려서 더 빠른 활성화 타임라인이 필요했습니다
  - Hard 포크는 너무 위험하다고 여겨져 안전을 위해 새로운 소프트 fork 방식이 필요했습니다
  - Bitcoin 코어 개발자들은 업그레이드에 대한 책임을 줄이기 위한 대안을 요청했습니다
explanation: |
  이 챕터에 따르면, 2016년 10월 세그윗 활성화 코드가 공개되었을 때 Bitcoin 사용자들 사이에서 압도적인 지지를 받았지만 채굴자들이 업그레이드에 대한 지지 신호를 보내지 않았고, 이로 인해 활성화는 해결의 실마리를 찾지 못한 채 지연되었습니다. 이로 인해 채굴자 신호에 의존하지 않는 대체 메커니즘이 필요하게 되었고, 샤오린프리는 해시 파워 활성화 대신 경제적 다수결 시행을 사용하는 솔루션으로 UASF를 제안하게 되었습니다.

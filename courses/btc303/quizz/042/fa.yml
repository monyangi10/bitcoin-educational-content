question: دلیل اصلی که شائولین‌فری مکانیزم User Activated Soft Fork (UASF) را در طول فرآیند ارتقاء سگویت پیشنهاد داد چه بود؟
answer: معدن‌چیان با وجود حمایت گسترده کاربران، از Segwit حمایت نمی‌کردند و این وضعیت به بن‌بست رسیده بود.
wrong_answers:
  - مکانیزم نرم fork موجود بسیار کند بود و به یک جدول زمانی فعال‌سازی سریع‌تر نیاز داشت.
  - چنگال‌های Hard بیش از حد پرخطر تلقی می‌شدند و یک روش نرم fork جدید برای ایمنی مورد نیاز بود.
  - توسعه‌دهندگان هسته Bitcoin درخواست جایگزینی برای کاهش مسئولیت خود در ارتقاءها کردند.
explanation: |
  طبق این فصل، زمانی که کد فعال‌سازی Segwit در اکتبر ۲۰۱۶ منتشر شد، حمایت گسترده‌ای در میان کاربران Bitcoin وجود داشت، اما ماینرها حمایت خود را از ارتقاء اعلام نکردند که این امر باعث توقف فعال‌سازی بدون هیچ راه‌حلی در چشم‌انداز شد. این وضعیت نیاز به یک مکانیزم جایگزین که به سیگنال‌دهی ماینرها متکی نباشد را ایجاد کرد، که منجر به پیشنهاد UASF توسط Shaolinfry به عنوان راه‌حلی شد که به جای فعال‌سازی با قدرت هش، از اجرای اکثریت اقتصادی استفاده کند.
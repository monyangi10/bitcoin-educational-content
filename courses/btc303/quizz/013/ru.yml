question: Согласно презентации Мэтта Коралло, каково соотношение между недоверенными и доверенными системами в архитектуре Bitcoin?
answer: Вы можете строить доверенные системы поверх недоверенных, но не недоверенные системы поверх доверенных
wrong_answers:
  - Вы можете строить недоверенные системы поверх доверенных, но не доверенные системы поверх недоверенных
  - Системы без доверия и с доверием могут быть построены друг на друге без каких-либо архитектурных ограничений
  - Trustless и доверенные системы должны работать независимо друг от друга, их нельзя накладывать друг на друга
explanation: |
  Основная идея Мэтта Коралло заключается в том, что базовый уровень Bitcoin, не требующий доверия, обеспечивает гибкость при проектировании систем. Такой бездоверительный фундамент, как протокол Bitcoin, позволяет разработчикам создавать доверенные сервисы (например, хранимые кошельки) на более высоких уровнях, сохраняя при этом базовые гарантии безопасности. Однако обратное невозможно - вы не сможете создать действительно недоверенные системы, если сама основа требует доверия, поскольку любые недоверенные свойства будут подорваны уязвимостями доверенного базового слоя.
reviewed: false

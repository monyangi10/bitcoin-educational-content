question: Prema prezentaciji Matta Corall-a, kakav je odnos između sistema bez poverenja i sistema sa poverenjem u Bitcoin arhitekturi?
answer: Možete izgraditi pouzdane sisteme na vrhu sistema bez poverenja, ali ne i sisteme bez poverenja na vrhu pouzdanih sistema.
wrong_answers:
  - Možete izgraditi sisteme bez poverenja na vrhu pouzdanih sistema, ali ne i pouzdane sisteme na vrhu sistema bez poverenja.
  - I sistemi bez poverenja i sistemi sa poverenjem mogu biti izgrađeni jedan na drugom bez ikakvih arhitektonskih ograničenja
  - Sistemi bez poverenja i pouzdani sistemi moraju raditi nezavisno i ne mogu biti slojeviti jedan na drugi.
explanation: |
  Ključni uvid Matta Coralla je da Bitcoin-ov sloj bez poverenja omogućava fleksibilnost u dizajnu sistema. Osnovni sloj bez poverenja, kao što je
  Bitcoin-ov protokol, omogućava programerima da kreiraju pouzdane usluge (kao što su kastodijalni novčanici zahtevaju poverenje u treću stranu) na višim slojevima, dok zadržavaju osnovne 
  sigurnosne garancije. Međutim, obrnuto je nemoguće - ne možete kreirati sisteme bez poverenja ako sama osnova zahteva poverenje, jer bi bilo koja 
  svojstva bez poverenja bila narušena ranjivostima pouzdanog osnovnog sloja.
reviewed: true

question: マット・コラロのプレゼンテーションによると、Bitcoinのアーキテクチャにおけるトラストレス・システムとトラステッド・システムの関係は？
answer: 信頼できないシステムの上に信頼できるシステムを構築することはできるが、信頼できるシステムの上に信頼できないシステムを構築することはできない。
wrong_answers:
  - 信頼できるシステムの上に信頼できないシステムを構築することはできるが、信頼できないシステムの上に信頼できるシステムを構築することはできない。
  - トラストレスシステムもトラストドシステムも、アーキテクチャ上の制限なしに、互いの上に構築することができる。
  - Trustlessとトラステッド・システムは独立して動作しなければならず、互いに重ねることはできない。
explanation: |
  マット・コラロの重要な洞察は、Bitcoinのトラストレス・ベースレイヤーがシステム設計の柔軟性を可能にするということだ。Bitcoinのプロトコルのようなトラストレス・ファンデーションによって、開発者は基盤となるセキュリティ保証を維持したまま、（カストディアル・ウォレットのような）信頼できるサービスをより高いレイヤーで作ることができる。しかし、その逆は不可能である。基盤自体が信頼を必要とする場合、真にトラストレスなシステムを作ることはできない。トラストレスの特性は、信頼された基盤層の脆弱性によって損なわれてしまうからだ。

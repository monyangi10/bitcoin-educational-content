question: マット・コラロのプレゼンテーションによると、ビットコインの構造的なトラストレス・システムとトラステッド・システムの関係は？
answer: トラストレス・システムの上にトラステッド・システムを構築することはできるが、トラステッド・システムの上にトラストレス・システムを構築することはできない
wrong_answers:
  - トラステッド・システムの上にトラストレス・システムを構築することはできるがトラストレス・システムの上にトラステッド・システムを構築することはできない
  - トラストレス・システムもトラステッド・システムも、構造上の制限なしに、互いの上に構築することができる
  - トラストレスとトラステッド・システムは独立して動作しなければならず、互いに重ねることはできない
explanation: |
  マット・コラロの重要な洞察は、ビットコインのトラストレス・ベースレイヤーがシステム設計の柔軟性を可能にするということだ。ビットコイン・プロトコルのようなトラストレス・ファンデーションによって、開発者は基盤となるセキュリティ保証を維持したまま、（カストディアル・ウォレットのような）信頼できるサービスをより高いレイヤーで作ることができる。しかし、その逆は不可能である。基盤自体が信頼を必要とする場合、真にトラストレスなシステムを作ることはできない。トラストレスの特性は、信頼された基盤層の脆弱性によって損なわれてしまうからだ。

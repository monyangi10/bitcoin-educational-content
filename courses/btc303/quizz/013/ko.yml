question: 매트 코랄로의 발표에 따르면 Bitcoin의 아키텍처에서 신뢰할 수 없는 시스템과 신뢰할 수 있는 시스템의 관계는 무엇인가요?
answer: 신뢰할 수 없는 시스템 위에 신뢰할 수 있는 시스템을 구축할 수는 있지만 신뢰할 수 있는 시스템 위에 신뢰할 수 없는 시스템을 구축할 수는 없습니다
wrong_answers:
  - 신뢰할 수 있는 시스템 위에 신뢰할 수 없는 시스템을 구축할 수는 있지만 신뢰할 수 없는 시스템 위에 신뢰할 수 있는 시스템을 구축할 수는 없습니다
  - 신뢰할 수 없는 시스템과 신뢰할 수 있는 시스템 모두 아키텍처 제한 없이 서로 위에 구축할 수 있습니다
  - Trustless과 신뢰할 수 있는 시스템은 독립적으로 작동해야 하며 서로 겹쳐서 사용할 수 없습니다
explanation: |
  매트 코랄로의 핵심 인사이트는 Bitcoin의 무신뢰 기반 레이어가 시스템 설계에 유연성을 제공한다는 것입니다. Bitcoin 프로토콜과 같은 무신뢰 기반은 개발자가 기본 보안 보장을 유지하면서 상위 계층에서 신뢰할 수 있는 서비스(예: 커스터디 월렛)를 만들 수 있게 해줍니다. 그러나 그 반대의 경우는 불가능합니다. 재단 자체에 신뢰가 필요한 경우, 신뢰할 수 없는 속성은 신뢰할 수 있는 기본 계층의 취약성에 의해 약화될 수 있기 때문에 진정한 의미의 신뢰 없는 시스템을 만들 수 없습니다.

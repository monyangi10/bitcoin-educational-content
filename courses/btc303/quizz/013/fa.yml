question: بر اساس ارائه مت کورالو، رابطه بین سیستم‌های بدون نیاز به اعتماد و سیستم‌های مبتنی بر اعتماد در معماری Bitcoin چیست؟
answer: شما می‌توانید سیستم‌های قابل اعتماد را بر روی یک سیستم غیرقابل اعتماد بسازید، اما نمی‌توانید سیستم‌های غیرقابل اعتماد را بر روی سیستم‌های قابل اعتماد بسازید.
wrong_answers:
  - شما می‌توانید سیستم‌های بدون نیاز به اعتماد را بر روی سیستم‌های قابل اعتماد بسازید، اما نمی‌توانید سیستم‌های قابل اعتماد را بر روی سیستم‌های بدون نیاز به اعتماد بسازید.
  - هم سیستم‌های بدون نیاز به اعتماد و هم سیستم‌های مبتنی بر اعتماد می‌توانند بدون هیچ محدودیت معماری بر روی یکدیگر ساخته شوند.
  - Trustless و سیستم‌های مورد اعتماد باید به‌صورت مستقل عمل کنند و نمی‌توانند بر روی یکدیگر لایه‌بندی شوند.
explanation: |
  بینش کلیدی مت کورالو این است که لایه پایه بدون نیاز به اعتماد Bitcoin انعطاف‌پذیری در طراحی سیستم را ممکن می‌سازد. یک پایه بدون نیاز به اعتماد مانند پروتکل Bitcoin به توسعه‌دهندگان اجازه می‌دهد تا خدمات قابل اعتماد (مانند کیف‌پول‌های حضانتی) را در لایه‌های بالاتر ایجاد کنند در حالی که تضمین‌های امنیتی زیربنایی حفظ می‌شود. با این حال، عکس این موضوع غیرممکن است - شما نمی‌توانید سیستم‌های واقعاً بدون نیاز به اعتماد ایجاد کنید اگر پایه خود نیاز به اعتماد داشته باشد، زیرا هر ویژگی بدون نیاز به اعتماد توسط آسیب‌پذیری‌های لایه پایه قابل اعتماد تضعیف می‌شود.
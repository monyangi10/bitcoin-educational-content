question: ตามการนำเสนอของ Matt Corallo ความสัมพันธ์ระหว่างระบบที่ไม่ต้องเชื่อถือ (trustless) และระบบที่ต้องเชื่อถือ (trusted) ในสถาปัตยกรรมของ Bitcoin คืออะไร?
answer: คุณสามารถสร้างระบบที่เชื่อถือได้บนระบบที่ไม่ต้องการความเชื่อถือ แต่ไม่สามารถสร้างระบบที่ไม่ต้องการความเชื่อถือบนระบบที่เชื่อถือได้
wrong_answers:
  - คุณสามารถสร้างระบบที่ไม่ต้องการความไว้วางใจบนระบบที่ต้องการความไว้วางใจได้ แต่ไม่สามารถสร้างระบบที่ต้องการความไว้วางใจบนระบบที่ไม่ต้องการความไว้วางใจได้
  - ทั้งระบบที่ไม่ต้องการความไว้วางใจและระบบที่ต้องการความไว้วางใจสามารถสร้างขึ้นบนพื้นฐานของกันและกันได้โดยไม่มีข้อจำกัดทางสถาปัตยกรรมใด ๆ
  - Trustless และระบบที่เชื่อถือได้ต้องทำงานอย่างอิสระและไม่สามารถซ้อนทับกันได้
explanation: |
  ข้อมูลเชิงลึกที่สำคัญของ Matt Corallo คือชั้นฐานที่ไม่ต้องเชื่อถือของ Bitcoin ช่วยให้เกิดความยืดหยุ่นในการออกแบบระบบ พื้นฐานที่ไม่ต้องเชื่อถือเช่นโปรโตคอลของ Bitcoin ช่วยให้นักพัฒนาสามารถสร้างบริการที่เชื่อถือได้ (เช่น กระเป๋าเงินที่มีการดูแล) บนชั้นที่สูงขึ้นในขณะที่ยังคงรักษาการรับประกันความปลอดภัยพื้นฐาน อย่างไรก็ตาม สิ่งที่ตรงกันข้ามเป็นไปไม่ได้ - คุณไม่สามารถสร้างระบบที่ไม่ต้องเชื่อถือได้อย่างแท้จริงหากพื้นฐานนั้นต้องการความเชื่อถือ เนื่องจากคุณสมบัติที่ไม่ต้องเชื่อถือใด ๆ จะถูกบ่อนทำลายโดยช่องโหว่ของชั้นฐานที่เชื่อถือได้
reviewed: false
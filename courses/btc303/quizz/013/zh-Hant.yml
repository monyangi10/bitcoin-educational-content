question: 根據 Matt Corallo 的簡報，在 Bitcoin 的架構中，無信任系統與信任系統之間的關係為何？
answer: 您可以在無信任系統之上建立信任系統，但無法在信任系統之上建立無信任系統。
wrong_answers:
  - 您可以在可信系統之上建立不可信系統，但不可在不可信系統之上建立可信系統。
  - 無信賴與可信賴系統都可以建立在彼此之上，不受任何架構限制
  - Trustless 與可信賴系統必須獨立運作，不能相互分層
explanation: |
  Matt Corallo 的主要見解是，Bitcoin 的無信任基礎層可讓系統設計更具彈性。像 Bitcoin 協定這樣的無信任基礎，允許開發人員在更高層次上建立可信賴的服務 (例如保管錢包)，同時保留底層的安全性保證。然而，反過來是不可能的 - 如果基礎本身需要信任，您就無法建立真正無信任的系統，因為任何無信任的屬性都會被可信基礎層的漏洞所破壞。
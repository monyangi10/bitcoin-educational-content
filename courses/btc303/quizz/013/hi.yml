question: मैट कोरालो की प्रस्तुति के अनुसार, Bitcoin की वास्तुकला में विश्वसनीय और भरोसेमंद प्रणालियों के बीच क्या संबंध है?
answer: आप एक अविश्वसनीय प्रणाली के ऊपर विश्वसनीय प्रणाली बना सकते हैं, लेकिन विश्वसनीय प्रणालियों के ऊपर अविश्वसनीय प्रणाली नहीं बना सकते।
wrong_answers:
  - आप विश्वसनीय प्रणालियों के ऊपर विश्वसनीय प्रणालियाँ बना सकते हैं, लेकिन विश्वसनीय प्रणालियों के ऊपर विश्वसनीय प्रणालियाँ नहीं बना सकते
  - बिना किसी वास्तुशिल्पीय सीमा के, दोनों प्रकार की विश्वसनीय और भरोसेमंद प्रणालियों को एक दूसरे के ऊपर बनाया जा सकता है
  - Trustless और विश्वसनीय प्रणालियों को स्वतंत्र रूप से संचालित होना चाहिए और उन्हें एक दूसरे के ऊपर स्तरित नहीं किया जा सकता
explanation: |
  मैट कोरलो की मुख्य अंतर्दृष्टि यह है कि Bitcoin की ट्रस्टलेस बेस लेयर सिस्टम डिज़ाइन में लचीलापन प्रदान करती है। Bitcoin प्रोटोकॉल जैसा एक ट्रस्टलेस फ़ाउंडेशन डेवलपर्स को अंतर्निहित सुरक्षा गारंटी को बनाए रखते हुए उच्चतर परतों पर विश्वसनीय सेवाएँ (जैसे कस्टोडियल वॉलेट) बनाने की अनुमति देता है। हालाँकि, इसका उल्टा असंभव है - यदि फ़ाउंडेशन को ही विश्वास की आवश्यकता है, तो आप वास्तव में ट्रस्टलेस सिस्टम नहीं बना सकते, क्योंकि किसी भी ट्रस्टलेस गुण को विश्वसनीय बेस लेयर की कमजोरियों द्वारा कमज़ोर कर दिया जाएगा।
question: 根据 Matt Corallo 的介绍，在 Bitcoin 的架构中，无信任系统和可信系统之间的关系是什么？
answer: 你可以在不可信系统之上建立可信系统，但不能在可信系统之上建立不可信系统
wrong_answers:
  - 您可以在可信系统之上构建不可信系统，但不能在不可信系统之上构建可信系统
  - 无信任系统和受信任系统可以相互构建，不受任何架构限制
  - Trustless 和可信系统必须独立运行，不能相互叠加
explanation: |
  Matt Corallo 的主要见解是，Bitcoin 的无信任基础层可以实现系统设计的灵活性。像 Bitcoin 协议这样的无信任基础允许开发人员在更高层次上创建可信服务（如托管钱包），同时保留底层安全保证。然而，反过来是不可能的--如果基础本身需要信任，你就无法创建真正的无信任系统，因为任何无信任属性都会被可信基础层的漏洞所破坏。
reviewed: false

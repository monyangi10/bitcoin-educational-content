question: 根据 Matt Corallo 的介绍，在比特币的架构中，无信任系统和受信系统之间的关系是什么？
answer: 您可以在无信任系统之上建立受信任系统，但不能在受信任系统之上建立无信任系统
wrong_answers:
  - 您可以在可信系统之上构建不可信系统，但不能在不可信系统之上构建可信系统
  - 无信任系统和受信任系统可以相互构建，不受任何架构限制
  - 无信任和受信系统必须独立运行，不能相互叠加
explanation: |
  Matt Corallo 的主要见解是，比特币的无信任基础层可以实现系统设计的灵活性。像比特币协议这样的无信任基础允许开发者在更高层次上创建受信任服务（如托管钱包），同时保留底层安全保证。然而，反过来的设计方式是不可能的--如果基础本身需要信任，您就无法创建真正的无信任系统，因为任何无信任属性都会被受信任信基础层的漏洞所破坏。

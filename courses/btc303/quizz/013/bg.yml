question: Според презентацията на Мат Корало каква е връзката между системите без нужда от доверие и тези с що се отнася до Bitcoin?
answer: Можете да изграждате системи базирани на доверие върху система, която не се нуждае от такова
wrong_answers:
  - Можете да изграждате системи без нужда от доверие върху такива, при които е нужно
  - И двата типа могат да се изграждат една върху друга без никакви архитектурни ограничения
  - И двата типа трябва да работят независимо и не могат да се наслагват една върху друга
explanation: |
  Ключовото прозрение на Мат Корало е, че базовият слой без нужда от доверие позволява гъвкавост при проектирането на системата. Основа без нужда от доверие, каквато е протоколът на Bitcoin, позволява на разработчиците да създават услуги с присъщо доверие в тях (като попечителски портфейли) на по-високи слоеве, като запазват базовите гаранции за сигурност. Обратното обаче е невъзможно - не можете да създавате наистина ненадеждни системи, ако самата основа изисква доверие, тъй като всички ненадеждни свойства биха били подкопани от уязвимостите на базовия слой.
reviewed: true

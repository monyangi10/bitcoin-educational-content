question: Според презентацията на Мат Корало каква е връзката между ненадеждните и надеждните системи в архитектурата на Bitcoin?
answer: Можете да изграждате надеждни системи върху ненадеждна система, но не и ненадеждни системи върху надеждни системи
wrong_answers:
  - Можете да изграждате ненадеждни системи върху надеждни системи, но не и надеждни системи върху ненадеждни системи
  - Както ненадеждните, така и надеждните системи могат да се изграждат една върху друга без никакви архитектурни ограничения
  - Trustless и надеждните системи трябва да работят независимо и не могат да се наслагват една върху друга
explanation: |
  Ключовото прозрение на Мат Корало е, че базовият слой без доверие на Bitcoin позволява гъвкавост при проектирането на системата. Безнадеждната основа, каквато е протоколът на Bitcoin, позволява на разработчиците да създават надеждни услуги (като попечителски портфейли) на по-високи слоеве, като запазват базовите гаранции за сигурност. Обратното обаче е невъзможно - не можете да създавате наистина ненадеждни системи, ако самата основа изисква доверие, тъй като всички ненадеждни свойства биха били подкопани от уязвимостите на надеждния базов слой.
reviewed: false

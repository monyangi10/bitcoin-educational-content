question: وقتی Bitcoin به عنوان یک سیستم با نام مستعار توصیف می‌شود و نه یک سیستم ناشناس، به چه معناست؟
answer: کاربران می‌توانند بین نام‌های مستعارشان ردیابی شوند، اما هویت واقعی آن‌ها به‌طور مستقیم فاش نمی‌شود.
wrong_answers:
  - کاربران به هیچ وجه قابل ردیابی نیستند و تراکنش‌های آن‌ها به‌طور کامل از دید پنهان است.
  - کاربران باید نام واقعی خود را ثبت کنند اما می‌توانند از آدرس‌های جعلی برای تراکنش‌ها استفاده کنند.
  - کاربران کاملاً ناشناس هستند و هیچ راهی برای اتصال تراکنش‌ها به یکدیگر وجود ندارد.
explanation: |
  ماهیت مستعار Bitcoin به این معناست که در حالی که کاربران تحت نام‌های مستعار (آدرس‌هایی که از کلیدهای عمومی مشتق شده‌اند) فعالیت می‌کنند، تراکنش‌های آن‌ها همچنان می‌تواند در بلاکچین ردیابی و بین این نام‌های مستعار مرتبط شود. این با ناشناس بودن واقعی متفاوت است، جایی که تراکنش‌ها هیچ ارتباط قابل ردیابی باقی نمی‌گذارند. در Bitcoin، شما می‌توانید جریان وجوه بین آدرس‌ها را دنبال کنید، اما هویت واقعی پشت آن آدرس‌ها به‌طور مستقیم فاش نمی‌شود مگر اینکه کسی به‌طور داوطلبانه آن را افشا کند یا اشتباهاتی مرتکب شود که اطلاعات خصوصی‌اش را فاش کند.

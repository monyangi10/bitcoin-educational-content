question: ビットコインを匿名システムではなく、仮名システムと表現する意味は？
answer: 利用者はペンネーム間で追跡できるが、本当の身元が直接明らかになることはないため
wrong_answers:
  - ユーザーの追跡は一切不可能で、トランザクションは完全に隠蔽されるため
  - 利用者は実名を登録しなければならないが、トランザクションには偽の住所を使用できるため
  - ユーザーは完全に匿名であり、いかなるトランザクションも結びつけることはできないため
explanation: |
  ビットコインの仮名性とは、ユーザーが仮名（公開鍵に由来するアドレス）で操作していても、その取引を追跡し、ブロックチェーン上の仮名間でリンクできることを意味する。これは、取引が追跡可能なつながりをまったく残さない真の匿名性とは異なる。ビットコインでは、アドレス間の資金の流れを追うことはできるが、誰かが自発的に開示したり、個人情報が漏れるようなミスを犯さない限り、アドレスの背後にある現実世界の身元が直接明らかになることはない。
reviewed: false

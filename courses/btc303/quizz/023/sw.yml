question: Inamaanisha nini wakati Bitcoin inaelezewa kama mfumo usiojulikana badala ya mfumo usiojulikana?
answer: Watumiaji wanaweza kufuatiliwa kati ya majina yao bandia, lakini utambulisho wao halisi haujafichuliwa moja kwa moja
wrong_answers:
  - Watumiaji hawawezi kufuatiliwa hata kidogo na miamala yao imefichwa kabisa isionekane
  - Watumiaji lazima wasajili majina yao halisi lakini wanaweza kutumia anwani bandia kufanya miamala
  - Watumiaji hawatambuliki kabisa na hakuna njia ya kuunganisha miamala yoyote pamoja
explanation: |
  Asili ya jina bandia ya Bitcoin inamaanisha kuwa wakati watumiaji wanafanya kazi kwa kutumia majina bandia (anwani zinazotokana na funguo za umma), miamala yao bado inaweza kufuatiliwa na kuunganishwa kati ya majina haya bandia kwenye blockchain. Hii inatofautiana na kutokujulikana kwa kweli, ambapo miamala haitaacha miunganisho inayoweza kufuatiliwa hata kidogo. Katika Bitcoin, unaweza kufuata mtiririko wa pesa kati ya anwani, lakini utambulisho wa ulimwengu halisi wa anwani hizo hauonyeshwi moja kwa moja isipokuwa mtu afichue kwa hiari yake au afanye makosa ambayo yanavuja maelezo yake ya faragha.
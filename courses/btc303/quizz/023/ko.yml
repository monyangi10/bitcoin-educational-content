question: Bitcoin이 익명 시스템이 아닌 가명 시스템으로 설명된다는 것은 무엇을 의미하나요?
answer: 사용자는 가명을 통해 추적할 수 있지만 실제 신원은 직접적으로 드러나지 않습니다
wrong_answers:
  - 사용자 추적이 전혀 불가능하며 거래 내역이 완전히 숨겨집니다
  - 사용자는 실명을 등록해야 하지만 거래 시 가짜 주소를 사용할 수 있습니다
  - 사용자는 완전히 익명으로 처리되며 거래를 서로 연결할 수 없습니다
explanation: |
  Bitcoin의 익명성은 사용자가 가명(공개 키에서 파생된 주소)으로 활동하는 동안에도 블록체인에서 이러한 가명 간의 거래를 추적하고 연결할 수 있다는 것을 의미합니다. 이는 거래가 전혀 추적 가능한 연결을 남기지 않는 진정한 익명성과는 다릅니다. Bitcoin에서는 주소 간의 자금 흐름을 추적할 수 있지만, 누군가가 자발적으로 공개하거나 실수로 개인 정보를 유출하지 않는 한 해당 주소의 실제 신원은 직접적으로 드러나지 않습니다.
reviewed: false

question: जब Bitcoin को अनाम प्रणाली के बजाय छद्मनाम प्रणाली के रूप में वर्णित किया जाता है तो इसका क्या अर्थ होता है?
answer: उपयोगकर्ताओं को उनके छद्म नामों से पहचाना जा सकता है, लेकिन उनकी वास्तविक पहचान सीधे तौर पर उजागर नहीं की जाती है
wrong_answers:
  - उपयोगकर्ताओं का पता नहीं लगाया जा सकता और उनके लेन-देन पूरी तरह से छिपे रहते हैं
  - उपयोगकर्ताओं को अपना वास्तविक नाम पंजीकृत कराना होगा, लेकिन वे लेनदेन के लिए नकली पते का उपयोग कर सकते हैं
  - उपयोगकर्ता पूरी तरह से गुमनाम हैं और किसी भी लेनदेन को आपस में जोड़ने का कोई तरीका नहीं है
explanation: |
  Bitcoin की छद्मनाम प्रकृति का अर्थ है कि भले ही उपयोगकर्ता छद्मनामों (सार्वजनिक कुंजियों से प्राप्त पते) के तहत काम करते हों, फिर भी उनके लेन-देन का पता लगाया जा सकता है और ब्लॉकचेन पर इन छद्मनामों के बीच लिंक किया जा सकता है। यह वास्तविक गुमनामी से अलग है, जहाँ लेन-देन कोई भी पता लगाने योग्य संबंध नहीं छोड़ते। Bitcoin में, आप पतों के बीच धन के प्रवाह का पता लगा सकते हैं, लेकिन उन पतों के पीछे की वास्तविक पहचान सीधे तौर पर तब तक प्रकट नहीं होती जब तक कि कोई स्वेच्छा से इसका खुलासा न करे या ऐसी गलतियाँ न करे जिससे उसकी निजी जानकारी लीक हो जाए।
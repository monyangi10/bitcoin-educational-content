question: 當 Bitcoin 被描述為假名系統而非匿名系統時，這代表什麼？
answer: 使用者可在假名之間被追蹤，但其真實身分不會被直接揭露
wrong_answers:
  - 使用者完全無法被追蹤，他們的交易也完全隱藏不見
  - 使用者必須註冊真實姓名，但可以使用虛假地址進行交易
  - 使用者完全匿名，無法將任何交易連結在一起
explanation: |
  Bitcoin 的假名性質意味著，當使用者以假名 (源自公開金鑰的地址) 進行交易時，他們的交易仍可在區塊鏈上的這些假名之間被追蹤和連結。這與真正的匿名性不同，在真正的匿名性下，交易完全不會留下任何可追蹤的連結。在 Bitcoin 中，您可以追蹤地址之間的資金流向，但這些地址背後的真實身份不會直接被揭露，除非有人自願揭露或犯錯洩露其私人資訊。
reviewed: false

question: Was bedeutet es, wenn Bitcoin als pseudonymes System und nicht als anonymes System bezeichnet wird?
answer: Die Nutzer können anhand ihrer Pseudonyme zurückverfolgt werden, aber ihre wirkliche Identität wird nicht direkt preisgegeben
wrong_answers:
  - Die Nutzer können nicht zurückverfolgt werden und ihre Transaktionen bleiben vollständig verborgen
  - Die Nutzer müssen sich mit ihrem echten Namen registrieren, können aber für Transaktionen falsche Adressen verwenden
  - Die Nutzer sind völlig anonym und haben keine Möglichkeit, Transaktionen miteinander in Verbindung zu bringen
explanation: |
  Der pseudonyme Charakter von Bitcoin bedeutet, dass die Nutzer zwar unter Pseudonymen (Adressen, die von öffentlichen Schlüsseln abgeleitet sind) agieren, ihre Transaktionen aber dennoch zurückverfolgt und zwischen diesen Pseudonymen in der Blockchain verknüpft werden können. Dies unterscheidet sich von echter Anonymität, bei der Transaktionen überhaupt keine nachvollziehbaren Verbindungen hinterlassen würden. Bei Bitcoin können Sie den Geldfluss zwischen den Adressen verfolgen, aber die reale Identität hinter diesen Adressen wird nicht direkt offengelegt, es sei denn, jemand gibt sie freiwillig preis oder macht Fehler, die seine privaten Informationen preisgeben.
reviewed: false

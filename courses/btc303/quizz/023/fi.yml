question: Mitä tarkoittaa, kun Bitcoin:ta kuvataan pikemminkin pseudonyymiksi kuin anonyymiksi järjestelmäksi?
answer: Käyttäjät voidaan jäljittää salanimiensä perusteella, mutta heidän todelliset henkilöllisyytensä eivät paljastu suoraan
wrong_answers:
  - Käyttäjiä ei voida jäljittää lainkaan ja heidän tapahtumansa ovat täysin piilossa
  - Käyttäjien on rekisteröitävä oikeat nimensä, mutta he voivat käyttää väärennettyjä osoitteita liiketoimia varten
  - Käyttäjät ovat täysin anonyymejä, eikä tapahtumia voida yhdistää toisiinsa
explanation: |
  Bitcoin:n pseudonyymi luonne tarkoittaa, että vaikka käyttäjät toimivat pseudonyymeillä (julkisista avaimista johdetuilla osoitteilla), heidän transaktioitaan voidaan silti jäljittää ja yhdistää näiden pseudonyymien välillä lohkoketjussa. Tämä eroaa todellisesta anonymiteetistä, jossa transaktioista ei jäisi lainkaan jäljitettäviä yhteyksiä. Bitcoin:ssä voi seurata osoitteiden välisiä rahavirtoja, mutta osoitteiden takana oleva todellinen henkilöllisyys ei paljastu suoraan, ellei joku vapaaehtoisesti paljasta sitä tai tee virheitä, jotka vuotavat hänen yksityisiä tietojaan.
reviewed: false

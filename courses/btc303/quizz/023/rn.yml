question: None iyo Bitcoin idondowe nk’urutonde rw’amazina y’uruyeri aho kuba urutonde rw’izina ry’uruyeri bisobanura iki?
answer: Abakoresha barashobora gukurikirana hagati y’amazina yabo y’uruyeri, ariko akaranga kabo nyakuri ntikamenyekana ata guca ku ruhande
wrong_answers:
  - Abakoresha ntibashobora gukurikirana na gato kandi amafaranga yabo aranyegezwa rwose kugira ngo ntibaboneke
  - Abakoresha bategerezwa kwandika amazina yabo nyayo ariko bashobora gukoresha aderesi z'ibinyoma mu gucuruza
  - Abakoresha ntibamenyekana rwose nta buryo bwo guhuza amafaranga yose hamwe
explanation: |
  Kamere ya Bitcoin y’amazina y’uruyeri bisigura ko naho abakoresha bakora bakoresheje amazina y’uruyeri (amaderesi akomoka ku mfunguruzo za bose), amafaranga yabo arashobora gukurikirana no guhuzwa hagati y’ayo mazina y’uruyeri ku rubuga rwa blockchain. Ivyo bitandukanye n’ukutamenyekana vy’ukuri, aho amafaranga yoshobora gusiga ata sano ryo gukurikirana. Muri Bitcoin, urashobora gukurikirana ingene amahera agenda hagati y’amaderesi, ariko akaranga nyakuri kari inyuma y’ayo maderesi ntikamenyekana ata guca ku ruhande kiretse umuntu abimenyesheje ku bushake canke akoze amakosa atuma amakuru yiwe bwite asohoka.

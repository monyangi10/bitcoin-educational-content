question: Что означает, когда Bitcoin описывается как псевдонимная, а не анонимная система?
answer: Пользователей можно отследить по их псевдонимам, но их настоящие личности напрямую не раскрываются
wrong_answers:
  - Пользователей вообще невозможно отследить, а их транзакции полностью скрыты от посторонних глаз
  - Пользователи должны регистрировать свои настоящие имена, но могут использовать для транзакций фальшивые адреса
  - Пользователи полностью анонимны и не могут связать между собой ни одну транзакцию
explanation: |
  Псевдонимность Bitcoin означает, что, хотя пользователи работают под псевдонимами (адресами, полученными из открытых ключей), их транзакции все равно можно отследить и связать между собой в блокчейне. Это отличается от истинной анонимности, когда транзакции вообще не оставляют следов. В Bitcoin можно проследить движение средств между адресами, но реальная личность, стоящая за этими адресами, не раскрывается напрямую, если только кто-то не раскроет ее добровольно или не допустит ошибку, которая приведет к утечке его частной информации.

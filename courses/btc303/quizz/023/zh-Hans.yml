question: Bitcoin 被描述为假名系统，而不是匿名系统，这意味着什么？
answer: 可以通过假名追踪用户，但不会直接暴露其真实身份
wrong_answers:
  - 根本无法追踪用户，他们的交易也完全被隐藏起来
  - 用户必须注册真实姓名，但可以使用假地址进行交易
  - 用户完全匿名，无法将任何交易联系在一起
explanation: |
  Bitcoin 的匿名性意味着，虽然用户使用假名（由公共密钥生成的地址）进行操作，但他们的交易仍然可以在区块链上的这些假名之间被追踪和链接。这与真正的匿名性不同，在真正的匿名性下，交易根本不会留下任何可追溯的联系。在 Bitcoin 中，你可以追踪地址之间的资金流，但这些地址背后的真实身份不会直接暴露，除非有人主动披露或犯错泄露了自己的私人信息。
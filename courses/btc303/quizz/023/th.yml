question: เมื่อ Bitcoin ถูกอธิบายว่าเป็นระบบนามแฝงแทนที่จะเป็นระบบนิรนาม หมายความว่าอย่างไร?
answer: ผู้ใช้สามารถถูกติดตามระหว่างนามแฝงของพวกเขา แต่ตัวตนที่แท้จริงของพวกเขาจะไม่ถูกเปิดเผยโดยตรง
wrong_answers:
  - ผู้ใช้ไม่สามารถถูกติดตามได้เลยและธุรกรรมของพวกเขาถูกซ่อนจากการมองเห็นอย่างสมบูรณ์
  - ผู้ใช้ต้องลงทะเบียนด้วยชื่อจริง แต่สามารถใช้ที่อยู่ปลอมสำหรับการทำธุรกรรมได้
  - ผู้ใช้จะไม่ระบุตัวตนอย่างสมบูรณ์โดยไม่มีวิธีการเชื่อมโยงธุรกรรมใด ๆ เข้าด้วยกัน
explanation: |
  ลักษณะการใช้นามแฝงของ Bitcoin หมายความว่าในขณะที่ผู้ใช้ดำเนินการภายใต้นามแฝง (ที่อยู่ที่ได้มาจากกุญแจสาธารณะ) การทำธุรกรรมของพวกเขายังคงสามารถถูกติดตามและเชื่อมโยงระหว่างนามแฝงเหล่านี้บนบล็อกเชนได้ ซึ่งแตกต่างจากการไม่เปิดเผยตัวตนอย่างแท้จริง ที่การทำธุรกรรมจะไม่ทิ้งร่องรอยการเชื่อมโยงใดๆ เลย ใน Bitcoin คุณสามารถติดตามการไหลของเงินระหว่างที่อยู่ต่างๆ ได้ แต่ตัวตนในโลกจริงที่อยู่เบื้องหลังที่อยู่เหล่านั้นจะไม่ถูกเปิดเผยโดยตรง เว้นแต่จะมีคนเปิดเผยโดยสมัครใจหรือทำผิดพลาดที่ทำให้ข้อมูลส่วนตัวรั่วไหล
reviewed: false
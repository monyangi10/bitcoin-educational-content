question: Hva betyr det når Bitcoin beskrives som et pseudonymt system i stedet for et anonymt system?
answer: Brukerne kan spores mellom pseudonymene sine, men deres virkelige identitet avsløres ikke direkte
wrong_answers:
  - Brukerne kan ikke spores i det hele tatt, og transaksjonene deres er helt skjult for innsyn
  - Brukerne må registrere sine virkelige navn, men kan bruke falske adresser for transaksjoner
  - Brukerne er helt anonyme, og det er ikke mulig å koble transaksjonene sammen
explanation: |
  Bitcoins pseudonyme natur betyr at selv om brukerne opererer under pseudonymer (adresser avledet fra offentlige nøkler), kan transaksjonene deres fortsatt spores og kobles mellom disse pseudonymene i blokkjeden. Dette skiller seg fra ekte anonymitet, der transaksjonene ikke etterlater noen sporbare forbindelser i det hele tatt. I Bitcoin kan du følge pengestrømmen mellom adresser, men den virkelige identiteten bak disse adressene avsløres ikke direkte, med mindre noen frivillig avslører den eller gjør feil som lekker privat informasjon.
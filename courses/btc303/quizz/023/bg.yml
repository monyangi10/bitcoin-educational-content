question: Какво означава, когато Bitcoin се описва като псевдоанонимна система, а не като анонимна система?
answer: Потребителите могат да бъдат проследени чрез техните псевдоними, но истинската им самоличност не се разкрива директно
wrong_answers:
  - Потребителите изобщо не могат да бъдат проследени, а транзакциите им са напълно скрити от погледа
  - Потребителите трябва да регистрират истинските си имена, но могат да използват фалшиви адреси за транзакции
  - Потребителите са напълно анонимни, без възможност за свързване на транзакциите
explanation: |
  Псевдоанонимният характер на Bitcoin означава, че докато потребителите работят под псевдоними (адреси, получени от публични ключове), техните трансакции все още могат да бъдат проследени и свързани между тези псевдоними в блокчейна. Това се различава от истинската анонимност, при която трансакциите не биха оставили никакви проследими връзки. В Bitcoin можете да проследите потока на средствата между адресите, но реалната самоличност зад тези адреси не се разкрива директно, освен ако някой не я разкрие доброволно или не направи грешки, които да доведат до изтичане на личната му информация.
reviewed: true

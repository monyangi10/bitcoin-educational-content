question: Welke oplossing stelt Satoshi Nakamoto volgens het Bitcoin whitepaper voor om het double-spending probleem op te lossen?
answer: Een peer-to-peer gedistribueerde tijdstempelserver met computationeel bewijs van chronologische transactievolgorde
wrong_answers:
  - Een gecentraliseerde server met drempelhandtekeningen van meerdere vertrouwde autoriteiten
  - Een federatie van vaste servers waar een meerderheid elke transactie moet goedkeuren
  - Een blinde handtekening systeem met centrale vertrouwde partij voor het voorkomen van dubbele uitgaven
explanation: |
  Satoshi Nakamoto stelde specifiek voor om een 'peer-to-peer gedistribueerde tijdstempelserver te gebruiken voor generate het berekenen van bewijs van de chronologische volgorde van transacties', zoals vermeld in het Bitcoin whitepaper. Het sleutelwoord is 'gedistribueerd', wat betekent dat er geen centraal controlepunt is. De foute antwoorden staan voor eerdere mislukte pogingen tot digitaal geld die vertrouwden op gecentraliseerde of semi-gecentraliseerde benaderingen, wat ze kwetsbaar maakte voor censuur en mislukking - precies de problemen die Bitcoin moest oplossen door echte decentralisatie.
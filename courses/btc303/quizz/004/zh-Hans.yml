question: 根据比特币白皮书，中本聪提出了什么方案来解决 double-spending 问题？
answer: 使用按时间顺序交易的计算证明的点对点分布式时间戳服务器
wrong_answers:
  - 集中式服务器，具有来自多个受信任机构的阈值签名
  - 由固定服务器组成的联盟，每笔交易必须由多数人批准
  - 带中央受托方的盲签名系统，用于防止双重消费
explanation: |
  Satoshi 中本聪在 Bitcoin 白皮书中特别提议使用 "点对点分布式时间戳服务器，对交易的时间顺序进行 generate 计算证明"。关键词是 "分布式"，意思是没有中央控制点。错误答案代表了早期数字货币的失败尝试，这些尝试依赖于中心化或半中心化的方法，容易受到审查和失败的影响，而 Bitcoin 正是要通过真正的去中心化来解决这些问题。
reviewed: false

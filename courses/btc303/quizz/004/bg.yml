question: Какво решение предлага Satoshi Nakamoto за решаване на проблема double-spending според документа Bitcoin?
answer: Сървър за разпределени времеви печати от типа peer-to-peer, използващ изчислително доказателство за хронологичния ред на транзакциите
wrong_answers:
  - Централизиран сървър с прагови подписи от множество доверени органи
  - Федерация от фиксирани сървъри, при която мнозинството трябва да одобрява всяка транзакция
  - Система за сляп подпис с централна доверена страна за предотвратяване на двойни разходи
explanation: |
  Satoshi Накамото изрично предложи да се използва "разпределен сървър за времеви маркери между равнопоставени потребители за generate изчислително доказателство за хронологичния ред на трансакциите", както е посочено в белия лист Bitcoin. Ключовата дума е "разпределен", което означава, че няма централна точка за контрол. Неправилните отговори представляват предишни неуспешни опити за цифрови пари, които разчитаха на централизирани или полуцентрализирани подходи, което ги правеше уязвими за цензура и провал - точно проблемите, които Bitcoin е създаден да реши чрез истинска децентрализация.
reviewed: false

question: Согласно документу Bitcoin, какое решение предлагает Satoshi Накамото для решения проблемы double-spending?
answer: Одноранговый распределенный сервер временных меток, использующий вычислительное доказательство хронологического порядка транзакций
wrong_answers:
  - Централизованный сервер с пороговыми подписями от нескольких доверенных органов
  - Объединение фиксированных серверов, где большинство должно одобрить каждую транзакцию
  - Система слепой подписи с центральной доверенной стороной для предотвращения двойных трат
explanation: |
  Satoshi Накамото предложил использовать "одноранговый распределенный сервер временных меток для generate вычислительного доказательства хронологического порядка транзакций", как указано в документе Bitcoin. Ключевое слово - "распределенный", что означает отсутствие центрального пункта управления. Неправильные ответы представляют собой предыдущие неудачные попытки создания цифровых денег, которые опирались на централизованные или полуцентрализованные подходы, что делало их уязвимыми для цензуры и неудач - именно те проблемы, которые Bitcoin призвана решить с помощью настоящей децентрализации.
reviewed: false

question: Bitcoin श्वेतपत्र के अनुसार, Satoshi नाकामोटो ने double-spending समस्या को हल करने के लिए क्या समाधान प्रस्तावित किया है?
answer: कालानुक्रमिक लेनदेन क्रम के कम्प्यूटेशनल प्रमाण का उपयोग करने वाला एक पीयर-टू-पीयर वितरित टाइमस्टैम्प सर्वर
wrong_answers:
  - एकाधिक विश्वसनीय प्राधिकारियों से सीमांत हस्ताक्षरों वाला एक केंद्रीकृत सर्वर
  - निश्चित सर्वरों का एक संघ जहां प्रत्येक लेनदेन को बहुमत से अनुमोदित किया जाना चाहिए
  - दोहरे व्यय की रोकथाम के लिए केंद्रीय विश्वसनीय पक्ष के साथ एक अंध हस्ताक्षर प्रणाली
explanation: |
  Satoshi नाकामोतो ने विशेष रूप से Bitcoin श्वेतपत्र में बताए अनुसार, 'लेनदेन के कालानुक्रमिक क्रम के generate कम्प्यूटेशनल प्रमाण के लिए पीयर-टू-पीयर वितरित टाइमस्टैम्प सर्वर' का उपयोग करने का प्रस्ताव रखा। मुख्य शब्द 'वितरित' है, जिसका अर्थ है नियंत्रण का कोई केंद्रीय बिंदु नहीं। गलत उत्तर डिजिटल मुद्रा के पहले के असफल प्रयासों को दर्शाते हैं जो केंद्रीकृत या अर्ध-केंद्रीकृत तरीकों पर निर्भर थे, जिससे वे सेंसरशिप और विफलता के प्रति संवेदनशील हो गए थे - ठीक वही समस्याएँ जिन्हें Bitcoin को वास्तविक विकेंद्रीकरण के माध्यम से हल करने के लिए डिज़ाइन किया गया था।
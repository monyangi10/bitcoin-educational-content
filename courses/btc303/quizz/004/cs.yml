question: Jaké řešení navrhuje podle bílé knihy Bitcoin Nakamoto Satoshi k vyřešení problému double-spending?
answer: Distribuovaný server časových razítek peer-to-peer využívající výpočetní důkaz chronologického pořadí transakcí
wrong_answers:
  - Centralizovaný server s prahovými podpisy od více důvěryhodných autorit
  - Federace pevných serverů, kde každou transakci musí schválit většina
  - Systém slepého podpisu s centrální důvěryhodnou stranou pro prevenci dvojího utrácení
explanation: |
  Satoshi Nakamoto konkrétně navrhl použití "peer-to-peer distribuovaného serveru časových razítek pro generate výpočetní důkaz chronologického pořadí transakcí", jak je uvedeno v Bitcoin whitepaper. Klíčovým slovem je "distribuovaný", což znamená bez centrálního řídicího bodu. Špatné odpovědi představují dřívější neúspěšné pokusy o digitální peníze, které se spoléhaly na centralizované nebo částečně centralizované přístupy, což je činilo zranitelnými vůči cenzuře a selhání - přesně ty problémy, které měl Bitcoin vyřešit prostřednictvím skutečné decentralizace.
question: ตามเอกสารไวท์เปเปอร์ Bitcoin, Satoshi Nakamoto เสนอวิธีแก้ปัญหา double-spending อย่างไร?
answer: เซิร์ฟเวอร์ประทับเวลาที่กระจายแบบเพียร์ทูเพียร์โดยใช้การพิสูจน์การคำนวณของลำดับการทำธุรกรรมตามลำดับเวลา
wrong_answers:
  - เซิร์ฟเวอร์แบบรวมศูนย์ที่มีลายเซ็นเกณฑ์จากหน่วยงานที่เชื่อถือได้หลายแห่ง
  - สหพันธ์ของเซิร์ฟเวอร์ที่ต้องได้รับการอนุมัติจากส่วนใหญ่ในแต่ละธุรกรรม
  - ระบบลายเซ็นต์แบบไม่เห็นสำหรับการป้องกันการใช้จ่ายซ้ำด้วยฝ่ายที่เชื่อถือได้กลาง
explanation: |
  Satoshi นากาโมโตะเสนอการใช้ 'เซิร์ฟเวอร์ประทับเวลาแบบกระจายเพียร์ทูเพียร์ไปยัง generate หลักฐานการคำนวณของลำดับเวลาในการทำธุรกรรม' ตามที่ระบุไว้ในเอกสารไวท์เปเปอร์ Bitcoin คำสำคัญคือ 'กระจาย' ซึ่งหมายถึงไม่มีจุดควบคุมกลาง คำตอบที่ผิดแสดงถึงความพยายามที่ล้มเหลวก่อนหน้านี้ในการสร้างเงินดิจิทัลที่พึ่งพาวิธีการแบบรวมศูนย์หรือกึ่งรวมศูนย์ ซึ่งทำให้พวกเขาเสี่ยงต่อการถูกเซ็นเซอร์และล้มเหลว - ซึ่งเป็นปัญหาที่ Bitcoin ถูกออกแบบมาเพื่อแก้ไขผ่านการกระจายอำนาจอย่างแท้จริง
reviewed: false
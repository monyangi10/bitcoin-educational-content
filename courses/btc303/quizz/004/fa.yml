question: طبقاً به وایت‌پیپر Bitcoin، چه راه‌حلی را Satoshi ناکاموتو برای حل مشکل double-spending پیشنهاد می‌کند؟
answer: یک سرور زمان‌سنج توزیع‌شده همتا به همتا با استفاده از اثبات محاسباتی ترتیب زمانی تراکنش‌ها
wrong_answers:
  - یک سرور متمرکز با امضاهای آستانه‌ای از چندین مرجع مورد اعتماد
  - فدراسیونی از سرورهای ثابت که در آن اکثریت باید هر تراکنش را تأیید کنند
  - یک سیستم امضای کور با یک طرف مرکزی مورد اعتماد برای جلوگیری از دوبار خرج کردن
explanation: |
  Satoshi ناکاموتو به طور خاص پیشنهاد استفاده از یک 'سرور زمان‌سنج توزیع‌شده همتا به همتا برای generate اثبات محاسباتی ترتیب زمانی تراکنش‌ها' را همان‌طور که در وایت‌پیپر Bitcoin ذکر شده است، ارائه داد. کلمه کلیدی 'توزیع‌شده' است، به این معنی که هیچ نقطه کنترل مرکزی وجود ندارد. پاسخ‌های نادرست نشان‌دهنده تلاش‌های ناموفق قبلی برای پول دیجیتال هستند که به رویکردهای متمرکز یا نیمه‌متمرکز متکی بودند و آن‌ها را در برابر سانسور و شکست آسیب‌پذیر می‌کردند - دقیقاً مشکلاتی که Bitcoin برای حل آن‌ها از طریق تمرکززدایی واقعی طراحی شده بود.
reviewed: false

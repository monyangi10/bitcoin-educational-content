question: Bitcoin 백서에 따르면 Satoshi 나카모토는 double-spending 문제를 해결하기 위해 어떤 해결책을 제안하나요?
answer: 시간순 거래 순서의 계산 증명을 사용하는 피어 투 피어 분산 타임스탬프 서버
wrong_answers:
  - 신뢰할 수 있는 여러 기관의 임계값 서명이 있는 중앙 집중식 서버
  - 과반수가 각 트랜잭션을 승인해야 하는 고정 서버 연합
  - 이중 지출 방지를 위한 중앙 신뢰 기관을 통한 블라인드 서명 시스템
explanation: |
  Satoshi 나카모토는 Bitcoin 백서에 명시된 대로 'P2P 분산 타임스탬프 서버를 통해 거래의 시간 순서에 대한 generate 계산 증명'을 사용할 것을 구체적으로 제안했습니다. 핵심 단어는 '분산'으로, 중앙 통제 지점이 없다는 뜻입니다. 오답은 중앙화 또는 반중앙화 접근 방식에 의존해 검열과 실패에 취약했던 이전의 디지털 화폐 시도가 실패했음을 나타내며, 이는 바로 Bitcoin가 진정한 탈중앙화를 통해 해결하고자 했던 문제와 정확히 일치합니다.
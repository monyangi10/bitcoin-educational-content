question: Bitcoinのホワイトペーパーによると、Satoshiの中本はdouble-spendingの問題を解決するためにどのようなソリューションを提案しているのだろうか？
answer: 時系列トランザクション順序の計算論的証明を用いたピアツーピア分散タイムスタンプサーバ
wrong_answers:
  - 複数の信頼できる当局からの閾値署名を持つ集中型サーバー
  - 各トランザクションを多数決で承認しなければならない固定サーバーの連合体
  - 二重支出を防止するための、中央の信頼できるパーティによるブラインド署名システム
explanation: |
  Satoshiナカモトは、Bitcoinホワイトペーパーに記載されているように、「generateトランザクションの時系列順序の計算証明のためのピアツーピアの分散タイムスタンプサーバー」を使用することを特に提案した。キーワードは「分散型」であり、中央の制御ポイントがないことを意味している。誤答は、中央集権的あるいは半中央集権的なアプローチに依存したデジタルマネーの以前の失敗例を表しており、検閲や失敗に対して脆弱であった。
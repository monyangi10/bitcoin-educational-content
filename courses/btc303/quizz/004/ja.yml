question: ビットコイン・ホワイトペーパーによると、サトシ・ナカモトは二重支払い問題を解決するためにどのようなソリューションを提案しているのだろうか？
answer: トランザクションの時系列順序の計算証明生成を用いたピアツーピア（P2P）分散タイムスタンプサーバ
wrong_answers:
  - 複数の信頼できる主体からの閾値署名を持つ集中型サーバー
  - 各トランザクションを多数決で承認しなければならない固定サーバーの連合体
  - 二重支払いを防止するための中央の信頼できる主体によるブラインド署名システム
explanation: |
  サトシ・ナカモトは、ビットコイン・ホワイトペーパーに記載されているように、「トランザクションの時系列順序の計算証明生成のためのピアツーピア（P2P）の分散型タイムスタンプサーバー」を使用することを特に提案した。キーワードは「分散化」であり、中央の制御主体がないことを意味している。誤答は、中央集権的あるいは半中央集権的なアプローチに依存したデジタルマネーの以前の失敗例を表しており、検閲や失敗に対して脆弱であった。
reviewed: false

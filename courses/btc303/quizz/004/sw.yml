question: Kulingana na karatasi nyeupe ya Bitcoin, Satoshi Nakamoto inapendekeza suluhisho gani kutatua tatizo la double-spending?
answer: Seva ya muhuri ya nyakati iliyosambazwa kati-kwa-rika kwa kutumia uthibitisho wa kimahesabu wa mpangilio wa shughuli za mfuatano
wrong_answers:
  - Seva ya kati iliyo na saini za kiwango cha juu kutoka kwa mamlaka nyingi zinazoaminika
  - Shirikisho la seva zisizobadilika ambapo wengi lazima waidhinishe kila shughuli
  - Mfumo usio na saini na chama kikuu kinachoaminika kwa uzuiaji wa matumizi maradufu
explanation: |
  Satoshi Nakamoto ilipendekeza mahususi kutumia 'seva ya muhuri ya nyakati iliyosambazwa kati-kwa-rika kwa generate uthibitisho wa kimahesabu wa mpangilio wa shughuli za shughuli' kama ilivyobainishwa kwenye karatasi nyeupe ya Bitcoin. Neno kuu ni 'kusambazwa,' kumaanisha hakuna sehemu kuu ya udhibiti. Majibu yasiyo sahihi yanawakilisha majaribio yaliyofeli ya awali ya pesa za kidijitali ambayo yaliegemea kwenye mbinu za kati au nusu kati, ambazo ziliwafanya kuwa katika hatari ya kudhibitiwa na kutofaulu - haswa shida za Bitcoin iliundwa kutatua kupitia ugatuaji wa kweli.
reviewed: false

question: 숙련된 개발자가 특정 취약점에 대한 정보 없이 취약점 패치를 검토하게 하는 주된 목적은 무엇인가요?
answer: 패치가 잠재적 공격자로부터 취약점을 적절히 숨기는지 테스트하려면 다음과 같이 하세요
wrong_answers:
  - "패치가 코드베이스에 새로운 버그를 도입하지 않도록 하기 위해"
  - 패치가 적절한 코딩 표준 및 규칙을 따르고 있는지 확인하려면 다음과 같이 하세요
  - 패치가 충분한 성능 향상을 제공하는지 확인하려면 다음과 같이 하세요
explanation: |
  책임 있는 공개 관행에 따르면 개발자는 취약점에 대한 정보를 받지 못한 숙련된 개발자에게 패치를 제공하여 패치가 무엇을 수정하는지 식별하도록 요청함으로써 패치가 충분히 잘 위장되었는지 테스트합니다. 이러한 전문가가 패치가 취약점을 수정한다는 사실을 알고도 취약점을 발견하지 못한다면 잠재적인 공격자에게 잘 숨겨져 있을 가능성이 높습니다. 패치 자체가 취약점을 드러내어 잠재적으로 악의적인 악용을 가능하게 할 수 있기 때문에 이는 매우 중요합니다. 다른 옵션은 코드 검토의 중요한 측면이기는 하지만 취약점 관리에서 이 특정 관행의 주된 목적은 아닙니다.
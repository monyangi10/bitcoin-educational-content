question: Je, ni nini madhumuni ya msingi ya kuwafanya wasanidi programu wakague kiraka cha athari bila kufahamishwa kuhusu athari mahususi?
answer: Ili kupima kama kiraka kinaficha ipasavyo uwezekano wa kuathiriwa na washambuliaji watarajiwa
wrong_answers:
  - "Ili kuhakikisha kuwa kiraka hakitanguliza hitilafu mpya kwenye msingi wa kanuni"
  - Ili kuthibitisha kuwa kiraka kinafuata viwango na kanuni zinazofaa za usimbaji
  - Ili kuthibitisha kuwa kiraka hutoa uboreshaji wa kutosha wa utendakazi
explanation: |
  Kulingana na utendakazi wa ufichuzi unaowajibika, wasanidi programu hujaribu kama kiraka kimefichwa vya kutosha kwa kuwapa wasanidi programu wazoefu ambao hawajaarifiwa kuhusu athari, wakiwauliza kutambua kile kinachorekebisha. Iwapo wataalamu hawa hawataweza kutambua uwezekano wa kuathiriwa hata wakijua kiraka kusuluhisha, kuna uwezekano kuwa umefichwa vyema dhidi ya washambuliaji wanaoweza kuwashambulia. Hili ni muhimu kwa sababu viraka vyenyewe vinaweza kufichua udhaifu, unaoweza kuwezesha unyonyaji hasidi. Chaguzi zingine, ingawa vipengele muhimu vya ukaguzi wa kanuni, sio madhumuni ya kimsingi ya mazoezi haya mahususi katika usimamizi wa athari.
question: Каква е основната цел на това опитни разработчици да преглеждат кръпка на уязвимост, без да са информирани за конкретната уязвимост?
answer: Тестване на това дали кръпката адекватно прикрива уязвимостта от потенциални нападатели
wrong_answers:
  - "За да се гарантира, че кръпката не въвежда нови грешки в базата данни"
  - Проверка на спазването на стандартите и конвенциите за кодиране на кръпката
  - За да потвърдите, че кръпката осигурява достатъчно подобрения в производителността
explanation: |
  Според практиките за отговорно разкриване на информация разработчиците проверяват дали дадена кръпка е била достатъчно добре прикрита, като я предоставят на опитни разработчици, които не са били информирани за уязвимостта, и ги молят да определят какво поправя тя. Ако тези експерти не могат да открият уязвимостта, дори да знаят, че кръпката я отстранява, тя вероятно е добре прикрита от потенциалните нападатели. Това е от решаващо значение, тъй като самите кръпки могат да разкрият уязвимости, което потенциално позволява злонамерено използване. Другите опции, макар и важни аспекти на прегледа на кода, не са основната цел на тази специфична практика в управлението на уязвимостите.
reviewed: false

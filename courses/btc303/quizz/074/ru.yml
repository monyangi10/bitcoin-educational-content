question: Какова основная цель того, чтобы опытные разработчики просматривали патч для уязвимости, не будучи информированными о конкретной уязвимости?
answer: Чтобы проверить, достаточно ли патч скрывает уязвимость от потенциальных злоумышленников
wrong_answers:
  - "Чтобы гарантировать, что патч не внесет новых ошибок в кодовую базу"
  - Чтобы убедиться, что патч соответствует стандартам и соглашениям по кодированию
  - Чтобы убедиться, что патч обеспечивает достаточное повышение производительности
explanation: |
  Согласно практике ответственного раскрытия информации, разработчики проверяют, достаточно ли хорошо замаскирован патч, предоставляя его опытным разработчикам, которые не были проинформированы об уязвимости, и просят их определить, что именно он исправляет. Если эти эксперты не могут обнаружить уязвимость, даже зная, что патч ее устраняет, то, скорее всего, она хорошо замаскирована от потенциальных злоумышленников. Это очень важно, поскольку сами патчи могут раскрывать уязвимости, потенциально позволяя злоумышленникам их использовать. Другие варианты, хотя и являются важными аспектами проверки кода, не являются основной целью этой специфической практики управления уязвимостями.
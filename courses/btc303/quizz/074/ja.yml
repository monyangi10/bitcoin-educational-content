question: 経験豊富な開発者が具体的な脆弱性を知らされずに脆弱性パッチをレビューする主な目的は何ですか？
answer: パッチが潜在的な攻撃者から脆弱性を適切に隠しているかどうかをテストする。
wrong_answers:
  - "パッチがコードベースに新たなバグをもたらさないようにするため"
  - パッチが適切なコーディング標準と規約に従っていることを確認する。
  - パッチが十分なパフォーマンス向上をもたらすことを確認する
explanation: |
  責任ある情報開示の慣行によれば、開発者は、脆弱性を知らされていない経験豊富な開発者にパッチを提供し、そのパッチが何を修正したのかを特定するよう求めることで、パッチが十分に偽装されているかどうかをテストする。もしこれらの専門家が、パッチが脆弱性を修正していることを知っていても脆弱性を発見できなければ、それは潜在的な攻撃者から十分に隠蔽されている可能性が高い。なぜなら、パッチ自体が脆弱性を明らかにし、悪意のある悪用を可能にする可能性があるからだ。他のオプションは、コードレビューの重要な側面ではあるが、脆弱性管理におけるこの特定のプラクティスの主な目的ではない。
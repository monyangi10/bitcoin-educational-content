question: Qual é o principal objetivo de ter programadores experientes a rever uma correção de vulnerabilidade sem serem informados da vulnerabilidade específica?
answer: Para testar se a correção esconde adequadamente a vulnerabilidade de potenciais atacantes
wrong_answers:
  - "Para garantir que a correção não introduz novos erros na base de código"
  - Para verificar se o patch segue as normas e convenções de codificação adequadas
  - Para confirmar que a correção proporciona melhorias de desempenho suficientes
explanation: |
  De acordo com as práticas de divulgação responsável, os programadores testam se uma correção foi suficientemente bem disfarçada, fornecendo-a a programadores experientes que não tenham sido informados da vulnerabilidade, pedindo-lhes que identifiquem o que esta corrige. Se estes especialistas não conseguirem detetar a vulnerabilidade, mesmo sabendo que um patch a corrige, é provável que esteja bem escondida de potenciais atacantes. Isto é crucial porque os próprios patches podem revelar vulnerabilidades, permitindo potencialmente a exploração maliciosa. As outras opções, embora sejam aspectos importantes da revisão de código, não são o objetivo principal desta prática específica na gestão de vulnerabilidades.
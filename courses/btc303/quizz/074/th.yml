question: วัตถุประสงค์หลักของการให้ผู้พัฒนาที่มีประสบการณ์ตรวจสอบแพตช์ช่องโหว่โดยไม่แจ้งช่องโหว่เฉพาะคืออะไร?
answer: เพื่อทดสอบว่าแพทช์สามารถปกปิดช่องโหว่จากผู้โจมตีที่อาจเกิดขึ้นได้อย่างเพียงพอหรือไม่
wrong_answers:
  - "เพื่อให้แน่ใจว่าแพตช์จะไม่แนะนำบั๊กใหม่เข้าสู่ฐานโค้ด"
  - เพื่อตรวจสอบว่าแพตช์เป็นไปตามมาตรฐานและแนวทางการเขียนโค้ดที่ถูกต้อง
  - เพื่อยืนยันว่าแพตช์นั้นให้การปรับปรุงประสิทธิภาพที่เพียงพอ
explanation: |
  ตามแนวทางการเปิดเผยข้อมูลอย่างรับผิดชอบ นักพัฒนาจะทดสอบว่าแพตช์นั้นถูกปกปิดได้ดีพอหรือไม่โดยการให้แพตช์นั้นกับนักพัฒนาที่มีประสบการณ์ซึ่งยังไม่ได้รับข้อมูลเกี่ยวกับช่องโหว่ และขอให้พวกเขาระบุว่าแพตช์นั้นแก้ไขอะไร หากผู้เชี่ยวชาญเหล่านี้ไม่สามารถระบุช่องโหว่ได้แม้จะรู้ว่าแพตช์นั้นแก้ไขช่องโหว่ ก็มีแนวโน้มว่าช่องโหว่นั้นถูกปกปิดได้ดีจากผู้โจมตีที่อาจเกิดขึ้น นี่เป็นสิ่งสำคัญเพราะแพตช์เองสามารถเปิดเผยช่องโหว่ได้ ซึ่งอาจทำให้เกิดการโจมตีที่เป็นอันตรายได้ ตัวเลือกอื่น ๆ แม้จะเป็นแง่มุมที่สำคัญของการตรวจสอบโค้ด แต่ไม่ใช่วัตถุประสงค์หลักของการปฏิบัตินี้ในด้านการจัดการช่องโหว่โดยเฉพาะ
reviewed: false
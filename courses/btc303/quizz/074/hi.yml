question: विशिष्ट भेद्यता के बारे में सूचित किए बिना अनुभवी डेवलपर्स से भेद्यता पैच की समीक्षा करवाने का प्राथमिक उद्देश्य क्या है?
answer: यह जांचने के लिए कि क्या पैच संभावित हमलावरों से भेद्यता को पर्याप्त रूप से छुपाता है
wrong_answers:
  - "यह सुनिश्चित करने के लिए कि पैच कोडबेस में नए बग न लाये"
  - यह सत्यापित करने के लिए कि पैच उचित कोडिंग मानकों और परंपराओं का पालन करता है
  - यह पुष्टि करने के लिए कि पैच पर्याप्त प्रदर्शन सुधार प्रदान करता है
explanation: |
  ज़िम्मेदार प्रकटीकरण प्रथाओं के अनुसार, डेवलपर्स यह जाँचते हैं कि किसी पैच को पर्याप्त रूप से छिपाया गया है या नहीं। इसके लिए वे इसे उन अनुभवी डेवलपर्स को देते हैं जिन्हें उस भेद्यता के बारे में जानकारी नहीं है और उनसे पूछते हैं कि यह क्या ठीक करता है। अगर ये विशेषज्ञ यह जानते हुए भी कि पैच उसे ठीक करता है, भेद्यता का पता नहीं लगा पाते हैं, तो संभवतः यह संभावित हमलावरों से अच्छी तरह छिपा हुआ है। यह महत्वपूर्ण है क्योंकि पैच स्वयं भेद्यताओं को उजागर कर सकते हैं, जिससे संभावित रूप से दुर्भावनापूर्ण शोषण संभव हो सकता है। अन्य विकल्प, कोड समीक्षा के महत्वपूर्ण पहलू होते हुए भी, भेद्यता प्रबंधन में इस विशिष्ट अभ्यास का प्राथमिक उद्देश्य नहीं हैं।
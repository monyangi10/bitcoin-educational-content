question: 讓有經驗的開發人員在未獲知特定弱點的情況下審查弱點修補程式的主要目的是什麼？
answer: 測試修補程式是否能充分隱藏潛在攻擊者無法察覺的弱點
wrong_answers:
  - 「確保修補程式不會在程式碼中引入新的錯誤」
  - 驗證修補程式是否遵循正確的編碼標準與慣例
  - 確認修補程式提供足夠的效能改善
explanation: |
  根據負責任的揭露實務，開發人員會將修補程式提供給未獲知該漏洞的資深開發人員，要求他們找出修補程式修正了哪些漏洞，以測試修補程式是否已偽裝得足夠好。如果這些專家即使知道修補程式修復了漏洞，也無法發現該漏洞，那麼該漏洞很可能已對潛在攻擊者隱藏得很好。這一點非常重要，因為修補程式本身可能會揭露弱點，從而使惡意攻擊得逞。其他選項雖然是程式碼檢閱的重要方面，但並不是弱點管理這項特定作法的主要目的。
reviewed: false

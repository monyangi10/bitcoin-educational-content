question: Jaki jest główny cel zlecania doświadczonym deweloperom sprawdzania poprawek luk w zabezpieczeniach bez posiadania informacji o konkretnej luce?
answer: Aby sprawdzić, czy łatka odpowiednio ukrywa lukę przed potencjalnymi atakującymi
wrong_answers:
  - "Aby upewnić się, że łatka nie wprowadzi nowych błędów do bazy kodu"
  - Aby sprawdzić, czy poprawka jest zgodna z odpowiednimi standardami i konwencjami kodowania
  - Aby potwierdzić, że poprawka zapewnia wystarczającą poprawę wydajności
explanation: |
  Zgodnie z praktykami odpowiedzialnego ujawniania informacji, deweloperzy testują, czy łatka została wystarczająco dobrze ukryta, dostarczając ją doświadczonym deweloperom, którzy nie zostali poinformowani o luce, prosząc ich o zidentyfikowanie tego, co naprawia. Jeśli eksperci nie są w stanie wykryć luki, nawet wiedząc, że łatka ją naprawia, jest ona prawdopodobnie dobrze ukryta przed potencjalnymi atakującymi. Ma to kluczowe znaczenie, ponieważ same łatki mogą ujawniać luki w zabezpieczeniach, potencjalnie umożliwiając ich złośliwe wykorzystanie. Inne opcje, choć są ważnymi aspektami przeglądu kodu, nie są głównym celem tej konkretnej praktyki w zarządzaniu podatnościami.
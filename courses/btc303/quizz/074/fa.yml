question: هدف اصلی از بررسی یک وصله آسیب‌پذیری توسط توسعه‌دهندگان با تجربه، بدون اطلاع از آسیب‌پذیری خاص، ارزیابی کیفیت و اثربخشی وصله به صورت بی‌طرفانه و شناسایی هرگونه مشکل یا نقص احتمالی در پیاده‌سازی آن است.
answer: برای آزمایش اینکه آیا وصله به‌طور کافی آسیب‌پذیری را از مهاجمان احتمالی پنهان می‌کند
wrong_answers:
  - "برای اطمینان از اینکه وصله باگ‌های جدیدی به کدبیس وارد نمی‌کند"
  - برای تأیید اینکه وصله از استانداردها و قراردادهای کدنویسی مناسب پیروی می‌کند
  - برای تأیید اینکه وصله بهبودهای عملکردی کافی را فراهم می‌کند
explanation: |
  طبق رویه‌های افشای مسئولانه، توسعه‌دهندگان بررسی می‌کنند که آیا یک وصله به‌خوبی پنهان شده است یا خیر، با ارائه آن به توسعه‌دهندگان با تجربه‌ای که از آسیب‌پذیری مطلع نشده‌اند و از آنها می‌خواهند که مشخص کنند چه چیزی را اصلاح می‌کند. اگر این کارشناسان نتوانند آسیب‌پذیری را شناسایی کنند حتی با دانستن اینکه یک وصله آن را برطرف می‌کند، احتمالاً به‌خوبی از دید مهاجمان بالقوه پنهان شده است. این امر حیاتی است زیرا خود وصله‌ها می‌توانند آسیب‌پذیری‌ها را آشکار کنند و به‌طور بالقوه امکان سوءاستفاده مخرب را فراهم کنند. گزینه‌های دیگر، در حالی که جنبه‌های مهمی از بررسی کد هستند، هدف اصلی این رویه خاص در مدیریت آسیب‌پذیری نیستند.
reviewed: false

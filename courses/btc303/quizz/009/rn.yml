question: Ni igiki Gregory Maxwell abona ko ari ikibazo gikomeye kuri Bitcoin kuruta ibitero vya 51%?
answer: Abantu batatahura canke ngo bakingire imitungo ya Bitcoin yo kwegereza ubutegetsi abaturage
wrong_answers:
  - Abacukuzi b'amabuye y'agaciro bibanda ku nguvu nyinshi cane zo gukoresha mudasobwa ahantu hamwe
  - Amabwirizwa ya Leta abuza ibikorwa vya Bitcoin mining
  - "Ibibazo vy'ubuhinga mu mirongo y'ubuhinga bwa Bitcoin"
explanation: |
  Dushingiye ku vyo Gregory Maxwell yanditse kuri Reddit vyavuzwe muri iki kigabane, naho ibitero 51% biriho nk’ikintu gihangayikishije, ingorane nini cane ni uko abakoresha Bitcoin batazotahura, batazokwitwararika, canke ngo bakingire imiterere y’ugusenyura ubutegetsi ituma Bitcoin igira agaciro kuruta ubundi buryo bwo kwegereza ubutegetsi hagati. Ivyo ni kubera ko kwegereza ubutegetsi abaturage ari vyo bituma Bitcoin ishobora guhangana n’ugucengera - ikintu nyamukuru kiyitandukanya n’imirongo y’amahera ya kera. Iyo abantu batakingira neza ivyo bintu, Bitcoin yoshobora buhoro buhoro guca mu gisagara kimwe gushika aho ugucengera bishoboka, bigasambura igice kinini c’agaciro kayo. Ibindi bishobora gukorwa, naho bishobora gutera amaganya, si vyo Maxwell yerekanye vyihariye ko ari vyo bishobora gutuma Bitcoin iroranirwa mu kiringo kirekire.
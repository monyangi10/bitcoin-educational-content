question: 그레고리 맥스웰은 51% 공격보다 Bitcoin의 더 큰 위험 요소로 무엇을 꼽았나요?
answer: Bitcoin의 탈중앙화 속성을 이해하지 못하거나 보호하지 않는 사람들
wrong_answers:
  - 한 곳에 너무 많은 컴퓨팅 파워를 집중하는 채굴자
  - Bitcoin mining 운영을 막는 정부 규제
  - "Bitcoin의 암호화 알고리즘의 기술적 취약점"
explanation: |
  이 장에서 인용한 Gregory Maxwell의 Reddit 게시물에 따르면 이론적으로 51% 공격이 우려되는 것은 사실이지만, 훨씬 더 큰 위험은 Bitcoin 사용자가 중앙화된 대안보다 Bitcoin의 가치를 높이는 탈중앙화 특성을 이해하거나 관심을 갖지 않거나 보호하지 않을 것이라는 점입니다. 탈중앙화는 Bitcoin의 검열 저항성을 제공하는 요소이자 기존 화폐 시스템과의 주요 차별화 요소이기 때문입니다. 사람들이 이러한 특성을 적극적으로 보호하지 않으면 검열이 가능해질 때까지 Bitcoin는 점차 중앙화되어 가치 제안의 대부분을 파괴할 수 있습니다. 다른 옵션들은 잠재적인 우려는 있지만, 맥스웰이 Bitcoin의 장기적인 성공에 더 큰 위협이 될 것이라고 구체적으로 밝힌 것은 아닙니다.

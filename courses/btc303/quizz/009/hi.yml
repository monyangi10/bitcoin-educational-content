question: ग्रेगरी मैक्सवेल ने Bitcoin के लिए 51% हमलों से बड़ा खतरा क्या बताया है?
answer: लोग Bitcoin के विकेंद्रीकरण गुणों को नहीं समझ रहे हैं या उनकी रक्षा नहीं कर रहे हैं
wrong_answers:
  - खनिक एक ही स्थान पर अत्यधिक कंप्यूटिंग शक्ति केंद्रित कर रहे हैं
  - Bitcoin mining संचालन को रोकने वाले सरकारी नियम
  - "Bitcoin के क्रिप्टोग्राफ़िक एल्गोरिदम में तकनीकी कमज़ोरियाँ"
explanation: |
  अध्याय में उद्धृत ग्रेगरी मैक्सवेल के रेडिट पोस्ट के अनुसार, जहाँ 51% हमले सैद्धांतिक रूप से चिंता का विषय हैं, वहीं इससे भी बड़ा जोखिम यह है कि Bitcoin के उपयोगकर्ता उन विकेंद्रीकरण गुणों को नहीं समझेंगे, उनकी परवाह नहीं करेंगे, या उनकी सुरक्षा नहीं करेंगे जो Bitcoin को केंद्रीकृत विकल्पों की तुलना में मूल्यवान बनाते हैं। ऐसा इसलिए है क्योंकि विकेंद्रीकरण ही Bitcoin को सेंसरशिप से बचाता है - जो इसे पारंपरिक मुद्रा प्रणालियों से अलग करता है। अगर लोग इन गुणों की सक्रिय रूप से रक्षा नहीं करते हैं, तो Bitcoin धीरे-धीरे केंद्रीकृत होता जाएगा जब तक कि सेंसरशिप संभव न हो जाए, जिससे इसका अधिकांश मूल्य प्रस्ताव नष्ट हो जाएगा। अन्य विकल्प, हालाँकि संभावित चिंताएँ हैं, लेकिन मैक्सवेल ने Bitcoin की दीर्घकालिक सफलता के लिए उन्हें विशेष रूप से बड़ा खतरा नहीं बताया है।

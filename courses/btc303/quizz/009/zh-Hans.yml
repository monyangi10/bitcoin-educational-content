question: 格雷戈里-麦克斯韦认为什么比 51% 攻击对 Bitcoin 的风险更大？
answer: 人们不理解或不保护 Bitcoin 的分散特性
wrong_answers:
  - 矿工将过多计算能力集中在一个地方
  - 阻止 Bitcoin mining 作业的政府法规
  - "Bitcoin加密算法中的技术漏洞"
explanation: |
  根据本章引用的格雷戈里-麦克斯韦尔在 Reddit 上的帖子，虽然 51% 的攻击在理论上是存在的，但更大的风险是 Bitcoin 用户不会理解、关心或保护去中心化特性，而这些特性使得 Bitcoin 比中心化替代品更有价值。这是因为去中心化是 Bitcoin 抵御审查的能力所在，也是它与传统货币系统的关键区别所在。如果人们不积极保护这些特性，Bitcoin 就会逐渐中心化，直到审查成为可能，从而破坏其大部分价值主张。其他方案虽然有潜在的问题，但并不是麦克斯韦特别指出的对 Bitcoin 长期成功的更大威胁。
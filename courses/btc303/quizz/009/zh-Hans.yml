question: Gregory Maxwell 认为什么比 51% 攻击对比特币的风险更大？
answer: 人们不理解或不保护比特币的去中心化特性
wrong_answers:
  - 矿工将过多计算能力集中在一个地方
  - 阻止比特币挖矿的政府法规
  - 比特币加密算法中的技术漏洞
explanation: |
  根据本章引用的 Gregory Maxwell 在 Reddit 上的帖子，虽然 51% 的攻击在理论上是存在的，但更大的风险是比特币用户不会理解、关心或保护去中心化特性，而这些特性使得比特币比中心化方案更有价值。这是因为去中心化是比特币抵御审查的能力所在，也是它与传统货币系统的关键区别所在。如果人们不积极保护这些特性，比特币就会逐渐中心化，直到审查成为可能，从而破坏其大部分价值主张。其他方案虽然有潜在的问题，但并不是 Maxwell 特别指出的对比特币长期成功的更大威胁。

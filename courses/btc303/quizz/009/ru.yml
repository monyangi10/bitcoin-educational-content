question: Что, по мнению Грегори Максвелла, представляет большую опасность для Bitcoin, чем атаки на 51%?
answer: Люди не понимают и не защищают свойства децентрализации Bitcoin
wrong_answers:
  - Майнеры концентрируют слишком много вычислительных мощностей в одном месте
  - Государственные нормативные акты, препятствующие деятельности ГВ-2 ГВ-3
  - "Технические уязвимости в криптографических алгоритмах Bitcoin"
explanation: |
  Согласно сообщению Грегори Максвелла на Reddit, приведенному в этой главе, хотя атаки на 51 % теоретически возможны, гораздо больший риск заключается в том, что пользователи Bitcoin не поймут, не позаботятся и не защитят свойства децентрализации, которые делают Bitcoin ценнее централизованных альтернатив. Это происходит потому, что именно децентрализация обеспечивает устойчивость Bitcoin к цензуре - ее ключевое отличие от традиционных денежных систем. Если люди не будут активно защищать эти свойства, Bitcoin может постепенно стать централизованной, пока цензура не станет возможной, что уничтожит большую часть ее ценностного предложения. Другие варианты, хотя и являются потенциальными проблемами, не являются тем, что Максвелл специально определил как большую угрозу для долгосрочного успеха Bitcoin.
reviewed: false

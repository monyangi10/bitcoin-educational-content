question: Je, Gregory Maxwell anabainisha nini kama hatari kubwa kwa mashambulizi ya Bitcoin kuliko 51%?
answer: Watu hawaelewi au kulinda sifa za ugatuaji za Bitcoin
wrong_answers:
  - Wachimbaji wakizingatia nguvu nyingi za kompyuta katika eneo moja
  - Kanuni za serikali zinazozuia uendeshaji wa Bitcoin mining
  - "Udhaifu wa kiufundi katika algoriti za kriptografia za Bitcoin"
explanation: |
  Kulingana na chapisho la Reddit la Gregory Maxwell lililotajwa katika sura hii, wakati mashambulizi ya 51% yapo kama wasiwasi wa kinadharia, hatari kubwa zaidi ni kwamba watumiaji wa Bitcoin hawataelewa, hawajali, au kulinda sifa za ugatuaji ambazo hufanya Bitcoin kuwa ya thamani zaidi ya njia mbadala za kati. Hii ni kwa sababu ugatuaji ndio hutoa upinzani wa udhibiti wa Bitcoin - kitofautishi chake kikuu kutoka kwa mifumo ya kawaida ya pesa. Ikiwa watu hawatalinda sifa hizi kikamilifu, Bitcoin inaweza kuwekwa kati hatua kwa hatua hadi udhibiti utakapowezekana, na kuharibu pendekezo lake la thamani. Chaguzi zingine, ingawa wasiwasi unaowezekana, sio zile ambazo Maxwell alibainisha haswa kama tishio kubwa kwa mafanikio ya muda mrefu ya Bitcoin.
reviewed: false

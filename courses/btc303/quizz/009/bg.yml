question: Какво според Грегъри Максуел представлява по-голям риск за Bitcoin от 51% атаки?
answer: Хора, които не разбират или не защитават децентрализационните свойства на Bitcoin
wrong_answers:
  - Миньорите концентрират твърде много изчислителна мощ на едно място
  - Правителствени разпоредби, възпрепятстващи операции по Bitcoin копаене
  - Технически уязвимости в криптографските алгоритми на Bitcoin
explanation: |
  Според публикацията на Грегъри Максуел в Reddit, цитирана в главата, макар че 51% атаки съществуват като теоретичен проблем, много по-големият риск е, че потребителите на Bitcoin няма да разберат, да се погрижат или да защитят свойствата на децентрализацията, които правят Bitcoin ценен в сравнение с централизираните алтернативи. Това е така, защото децентрализацията е това, което осигурява устойчивостта на Bitcoin на цензура - нейното ключово отличие от традиционните парични системи. Ако хората не защитават активно тези свойства, Bitcoin може постепенно да се централизира, докато цензурата стане възможна, унищожавайки по-голямата част от нейната стойност. Другите варианти, макар и потенциални проблеми, не са това, което Максуел специално определи като по-голяма заплаха за дългосрочния успех на Bitcoin.
reviewed: true

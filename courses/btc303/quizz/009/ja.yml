question: グレゴリー・マクスウェルは、ビットコインにとって51％攻撃よりも大きなリスクは何だと考えているのか？
answer: ビットコインの分散化特性を理解しない、守らない人々
wrong_answers:
  - マイナーの計算能力が一箇所に集中しすぎていること
  - ビットコインマイニングの運用を妨げる政府規制
  - ビットコインの暗号アルゴリズムの技術的脆弱性
explanation: |
  本章で引用されているグレゴリー・マクスウェルによるRedditへの投稿によれば、51％攻撃は理論的な懸念として存在するが、はるかに大きなリスクは、ビットコインユーザーが、中央集権的な代替手段よりもビットコインの価値を高めている分散化の特性を理解せず、気にかけず、守らないことである。というのも、分散化こそがビットコインの検閲耐性、つまり伝統的な貨幣システムとの重要な差別化要因だからだ。もし人々がこれらの特性を積極的に守らなければ、ビットコインは検閲が可能になるまで徐々に中央集権化され、その価値提案のほとんどを破壊してしまうかもしれない。他の選択肢は、潜在的な懸念事項ではあるが、マックスウェルがビットコインの長期的な成功にとってより大きな脅威であると特に指摘したものではない。
reviewed: false

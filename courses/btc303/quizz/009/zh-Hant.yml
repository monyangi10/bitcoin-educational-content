question: Gregory Maxwell 認為對 Bitcoin 而言，什麼比 51% 攻擊的風險更大？
answer: 人們不瞭解或保護 Bitcoin 的分散特性
wrong_answers:
  - 礦工將過度的運算能力集中在一個地方
  - 阻止 Bitcoin mining 作業的政府法規
  - 「Bitcoin加密演算法中的技術漏洞」
explanation: |
  根據本章引用的 Gregory Maxwell 在 Reddit 發表的文章，雖然 51% 的攻擊在理論上是存在的，但更大的風險是 Bitcoin 使用者不瞭解、不關心或不保護去中心化的特性，而這些特性讓 Bitcoin 比中心化的替代方案更有價值。這是因為去中心化提供了 Bitcoin 抵抗審查的能力，也就是與傳統貨幣系統的主要差異。如果人們不積極保護這些特性，Bitcoin 可能會逐漸變得集中化，直到審查成為可能，從而破壞其大部分的價值主張。其他選項雖然有潛在的隱憂，但並不是 Maxwell 特別指出的對 Bitcoin 長期成功的更大威脅。
reviewed: false

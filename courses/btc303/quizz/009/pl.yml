question: Co według Gregory'ego Maxwella stanowi większe zagrożenie dla Bitcoin niż ataki 51%?
answer: Ludzie nie rozumiejący lub nie chroniący właściwości decentralizacyjnych Bitcoin
wrong_answers:
  - Górnicy koncentrujący zbyt wiele mocy obliczeniowej w jednym miejscu
  - Przepisy rządowe uniemożliwiające operacje Bitcoin mining
  - "Luki techniczne w algorytmach kryptograficznych Bitcoin"
explanation: |
  Zgodnie z postem Gregory'ego Maxwella na Reddicie cytowanym w rozdziale, podczas gdy ataki 51% istnieją jako teoretyczna obawa, znacznie większym ryzykiem jest to, że użytkownicy Bitcoin nie zrozumieją, nie będą dbać ani chronić właściwości decentralizacji, które sprawiają, że Bitcoin jest cenniejszy niż scentralizowane alternatywy. Decentralizacja jest bowiem tym, co zapewnia Bitcoin odporność na cenzurę - jego kluczowym wyróżnikiem na tle tradycyjnych systemów pieniężnych. Jeśli ludzie nie będą aktywnie chronić tych właściwości, Bitcoin może stopniowo stać się scentralizowany, aż cenzura stanie się możliwa, niszcząc większość jego propozycji wartości. Inne opcje, choć potencjalnie niepokojące, nie są tym, co Maxwell konkretnie zidentyfikował jako większe zagrożenie dla długoterminowego sukcesu Bitcoin.
reviewed: false

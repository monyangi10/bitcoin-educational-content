question: گرگوری ماکسول چه چیزی را به عنوان خطری بزرگ‌تر از حملات 51 درصدی برای Bitcoin شناسایی می‌کند؟
answer: افرادی که ویژگی‌های غیرمتمرکز بودن Bitcoin را درک نمی‌کنند یا از آن محافظت نمی‌کنند
wrong_answers:
  - معدن‌چیان تمرکز بیش از حد قدرت محاسباتی در یک مکان
  - مقررات دولتی جلوگیری از عملیات Bitcoin mining
  - "آسیب‌پذیری‌های فنی در الگوریتم‌های رمزنگاری Bitcoin"
explanation: |
  بر اساس پست ردیت گریگوری ماکسول که در این فصل ذکر شده است، در حالی که حملات ۵۱٪ به عنوان یک نگرانی نظری وجود دارند، خطر بسیار بزرگ‌تر این است که کاربران Bitcoin ممکن است ویژگی‌های تمرکززدایی که Bitcoin را نسبت به گزینه‌های متمرکز ارزشمند می‌کند، درک نکنند، به آن اهمیت ندهند یا از آن محافظت نکنند. این به این دلیل است که تمرکززدایی همان چیزی است که مقاومت در برابر سانسور Bitcoin را فراهم می‌کند - تمایز کلیدی آن از سیستم‌های پولی سنتی. اگر مردم به طور فعال از این ویژگی‌ها محافظت نکنند، Bitcoin می‌تواند به تدریج متمرکز شود تا زمانی که سانسور ممکن شود و بیشتر ارزش پیشنهادی آن از بین برود. گزینه‌های دیگر، در حالی که نگرانی‌های بالقوه‌ای هستند، چیزی نیستند که ماکسول به طور خاص به عنوان تهدید بزرگ‌تر برای موفقیت بلندمدت Bitcoin شناسایی کرده باشد.
reviewed: false

question: Hva mener Gregory Maxwell utgjør en større risiko for Bitcoin enn 51 %-angrep?
answer: Folk forstår ikke eller beskytter ikke Bitcoins desentraliserende egenskaper
wrong_answers:
  - Gruvearbeidere konsentrerer for mye datakraft på ett sted
  - Offentlige reguleringer som hindrer Bitcoin mining-operasjoner
  - "Tekniske sårbarheter i Bitcoins kryptografiske algoritmer"
explanation: |
  Ifølge Gregory Maxwells Reddit-innlegg, som er sitert i kapittelet, er 51 %-angrep et teoretisk problem, men den langt større risikoen er at Bitcoin-brukere ikke forstår, bryr seg om eller beskytter desentraliseringsegenskapene som gjør Bitcoin verdifullt i forhold til sentraliserte alternativer. Dette er fordi desentralisering er det som gir Bitcoins sensurmotstand - den viktigste forskjellen fra tradisjonelle pengesystemer. Hvis folk ikke aktivt beskytter disse egenskapene, kan Bitcoin gradvis bli sentralisert helt til sensur blir mulig, noe som ødelegger det meste av verdiforslaget. De andre alternativene kan være problematiske, men det er ikke det Maxwell spesifikt identifiserte som den største trusselen mot Bitcoins langsiktige suksess.
question: 如果用户将 Bitcoin 交易验证外包给第三方，而不是运行自己的全节点，会发生什么情况？
answer: 由于独立执行网络规则的人越来越少，Bitcoin 的去中心化功能变得越来越弱
wrong_answers:
  - 对所有网络参与者而言，Bitcoin 交易变得更快、更高效
  - Bitcoin 网络会自动创建更多的 mining 节点，以补偿丢失的验证
  - 第三方服务获得在正常发行时间表之外创建新比特币的能力
explanation: |
  当用户不运行自己的完整节点时，他们就会将执行 Bitcoin 规则的权力外包给其他人。这削弱了 Bitcoin 的去中心化，因为验证交易和区块的独立方减少了。正如戴维-哈丁（David Harding）所解释的那样，这就造成了这样一种情况：少数矿工和服务提供商可能会为未验证的用户修改 Bitcoin 的规则，而这些用户将无法与运行完整验证节点的用户进行交易，因为他们拒绝接受这些规则修改。
reviewed: false

question: 如果用户让第三方结构进行比特币交易验证，而不用自己运行的全节点来验证，会发生什么情况？
answer: 由于独立执行网络规则的人越来越少，比特币的去中心化功能变得越来越弱
wrong_answers:
  - 对所有网络参与者而言，比特币交易变得更快、更高效
  - 比特币网络会自动创建更多的挖矿节点，以补偿丢失的验证
  - 第三方服务可以不按照正常发行时间表挖出比特币
explanation: |
  当用户不运行自己的全节点时，他们就会信任第三方机构或个人执行比特币规则。这削弱了比特币的去中心化，因为验证交易和区块的独立方减少了。正如 David Harding 所解释的内容，这就造成了这样一种情况：少数矿工和服务提供商可能会为未验证的用户修改比特币的规则，而这些用户将无法与运行能完整验证的节点的用户进行交易，因为他们拒绝接受这些规则修改。

question: Que se passe-t-il lorsque les utilisateurs confient la vérification de leurs transactions Bitcoin à des tiers au lieu d'exploiter leurs propres nœuds complets ?
answer: La décentralisation de Bitcoin s'affaiblit car moins de personnes appliquent les règles du réseau de manière indépendante
wrong_answers:
  - Les transactions Bitcoin deviennent plus rapides et plus efficaces pour tous les participants au réseau
  - Le réseau Bitcoin crée automatiquement plus de nœuds mining pour compenser la perte de validation
  - Les services tiers acquièrent la capacité de créer de nouveaux bitcoins au-delà du calendrier normal d'émission
explanation: |
  Lorsque les utilisateurs ne gèrent pas leurs propres nœuds complets, ils confient à d'autres le pouvoir d'appliquer les règles de la Bitcoin. Cela affaiblit la décentralisation de Bitcoin, car moins de parties indépendantes valident les transactions et les blocs. Comme l'explique David Harding, cela crée une situation dans laquelle un petit nombre de mineurs et de fournisseurs de services pourraient potentiellement modifier les règles de la Bitcoin pour les utilisateurs qui ne les vérifient pas, alors que ces utilisateurs seraient incapables de faire des transactions avec des personnes qui gèrent des nœuds de validation complets et qui rejettent ces changements de règles.

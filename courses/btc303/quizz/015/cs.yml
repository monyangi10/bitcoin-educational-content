question: Co se stane, když uživatelé zadají ověřování transakcí Bitcoin třetím stranám místo toho, aby provozovali vlastní úplné uzly?
answer: Decentralizace Bitcoin se oslabuje, protože méně lidí nezávisle prosazuje pravidla sítě
wrong_answers:
  - Transakce Bitcoin jsou rychlejší a efektivnější pro všechny účastníky sítě
  - Síť Bitcoin automaticky vytvoří další uzly mining, aby nahradila ztracenou validaci
  - Služby třetích stran získají možnost vytvářet nové bitcoiny nad rámec běžného emisního plánu
explanation: |
  Pokud uživatelé neprovozují své vlastní uzly, přenechávají svou pravomoc prosazovat pravidla Bitcoin jiným uživatelům. To oslabuje decentralizaci Bitcoin, protože transakce a bloky ověřuje méně nezávislých stran. Jak vysvětluje David Harding, vzniká tak situace, kdy by malý počet těžařů a poskytovatelů služeb mohl potenciálně měnit pravidla Bitcoin pro neověřující uživatele, zatímco tito uživatelé by nemohli provádět transakce s lidmi provozujícími plné validační uzly, kteří tyto změny pravidel odmítají.
reviewed: false

question: Что произойдет, если пользователи передадут проверку транзакций Bitcoin третьим лицам вместо того, чтобы запустить собственные полноценные узлы?
answer: Децентрализация Bitcoin ослабевает, поскольку все меньше людей самостоятельно следят за соблюдением правил сети
wrong_answers:
  - Транзакции Bitcoin становятся быстрее и эффективнее для всех участников сети
  - Сеть Bitcoin автоматически создает больше узлов mining, чтобы компенсировать потерянную валидацию
  - Сторонние сервисы получают возможность создавать новые биткоины вне обычного графика эмиссии
explanation: |
  Когда пользователи не управляют своими собственными узлами, они передают свои полномочия по обеспечению соблюдения правил Bitcoin другим. Это ослабляет децентрализацию Bitcoin, поскольку меньше независимых сторон проверяют транзакции и блоки. Как объясняет Дэвид Хардинг, это создает ситуацию, когда небольшое количество майнеров и поставщиков услуг потенциально могут изменить правила Bitcoin для пользователей, не прошедших проверку, в то время как эти пользователи не смогут совершать сделки с людьми, управляющими полными узлами проверки, которые отвергают эти изменения правил.
reviewed: false

question: Ni nini hufanyika wakati watumiaji wanatoa uthibitishaji wa miamala yao ya Bitcoin kwa wahusika wengine badala ya kuendesha nodi zao kamili?
answer: Ugatuaji wa Bitcoin unadhoofika kadiri watu wachache wanavyotekeleza sheria za mtandao kwa kujitegemea
wrong_answers:
  - Shughuli za Bitcoin huwa za haraka na bora zaidi kwa washiriki wote wa mtandao
  - Mtandao wa Bitcoin huunda kiotomatiki nodi zaidi za mining ili kufidia uthibitisho uliopotea
  - Huduma za watu wa tatu hupata uwezo wa kuunda bitcoins mpya zaidi ya ratiba ya kawaida ya utoaji
explanation: |
  Wakati watumiaji hawaendeshi nodi zao kamili, wanatoa uwezo wao wa kutekeleza sheria za Bitcoin kwa wengine. Hii inadhoofisha ugatuaji wa Bitcoin kwa sababu ni vyama vichache huru vinavyothibitisha miamala na vizuizi. Kama David Harding anavyoeleza, hii inaleta hali ambapo idadi ndogo ya wachimbaji na watoa huduma wanaweza kubadilisha sheria za Bitcoin kwa watumiaji wasiothibitisha, wakati watumiaji hao hawataweza kufanya miamala na watu wanaoendesha nodi kamili za uthibitishaji ambao wanakataa mabadiliko hayo ya sheria.

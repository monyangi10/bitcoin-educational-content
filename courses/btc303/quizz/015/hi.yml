question: क्या होता है जब उपयोगकर्ता अपने स्वयं के पूर्ण नोड्स चलाने के बजाय अपने Bitcoin लेनदेन सत्यापन को तीसरे पक्ष को आउटसोर्स करते हैं?
answer: Bitcoin का विकेंद्रीकरण कमजोर हो जाता है क्योंकि कम लोग स्वतंत्र रूप से नेटवर्क नियमों को लागू करते हैं
wrong_answers:
  - सभी नेटवर्क प्रतिभागियों के लिए Bitcoin लेनदेन अधिक तेज़ और कुशल हो गए हैं
  - Bitcoin नेटवर्क खोए हुए सत्यापन की भरपाई के लिए स्वचालित रूप से अधिक mining नोड्स बनाता है
  - तृतीय-पक्ष सेवाओं को सामान्य जारीकरण समय से परे नए बिटकॉइन बनाने की क्षमता प्राप्त होती है
explanation: |
  जब उपयोगकर्ता अपने स्वयं के पूर्ण नोड नहीं चलाते हैं, तो वे Bitcoin के नियमों को लागू करने की अपनी शक्ति दूसरों को सौंप देते हैं। यह Bitcoin के विकेंद्रीकरण को कमज़ोर करता है क्योंकि कम स्वतंत्र पक्ष ही लेन-देन और ब्लॉकों का सत्यापन कर रहे होते हैं। जैसा कि डेविड हार्डिंग बताते हैं, इससे एक ऐसी स्थिति पैदा होती है जहाँ कुछ ही माइनर और सेवा प्रदाता गैर-सत्यापन करने वाले उपयोगकर्ताओं के लिए Bitcoin के नियमों को संभावित रूप से बदल सकते हैं, जबकि वे उपयोगकर्ता उन पूर्ण सत्यापन नोड चलाने वाले लोगों के साथ लेन-देन करने में असमर्थ होंगे जो उन नियम परिवर्तनों को अस्वीकार करते हैं।
question: وقتی کاربران تأیید تراکنش Bitcoin خود را به جای اجرای نودهای کامل خود به اشخاص ثالث واگذار می‌کنند، چه اتفاقی می‌افتد؟
answer: غیرمتمرکز بودن Bitcoin ضعیف‌تر می‌شود زیرا افراد کمتری قوانین شبکه را به‌طور مستقل اجرا می‌کنند.
wrong_answers:
  - تراکنش‌های Bitcoin برای همه شرکت‌کنندگان شبکه سریع‌تر و کارآمدتر می‌شوند.
  - شبکه Bitcoin به‌طور خودکار گره‌های mining بیشتری ایجاد می‌کند تا از دست دادن اعتبارسنجی را جبران کند.
  - خدمات شخص ثالث توانایی ایجاد بیت‌کوین‌های جدید فراتر از برنامه صدور عادی را به دست می‌آورند
explanation: |
  وقتی کاربران گره‌های کامل خود را اجرا نمی‌کنند، قدرت خود برای اجرای قوانین Bitcoin را به دیگران واگذار می‌کنند. این امر باعث تضعیف تمرکززدایی Bitcoin می‌شود زیرا تعداد کمتری از طرف‌های مستقل در حال اعتبارسنجی تراکنش‌ها و بلوک‌ها هستند. همان‌طور که دیوید هاردینگ توضیح می‌دهد، این وضعیت را ایجاد می‌کند که تعداد کمی از ماینرها و ارائه‌دهندگان خدمات می‌توانند به‌طور بالقوه قوانین Bitcoin را برای کاربران غیرمعتبر تغییر دهند، در حالی که آن کاربران قادر به انجام تراکنش با افرادی که گره‌های اعتبارسنجی کامل را اجرا می‌کنند و آن تغییرات قوانین را رد می‌کنند، نخواهند بود.
reviewed: false

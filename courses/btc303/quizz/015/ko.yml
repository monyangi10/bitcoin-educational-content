question: 사용자가 자체적으로 풀 노드를 운영하는 대신 제3자에게 Bitcoin 트랜잭션 검증을 아웃소싱하면 어떻게 되나요?
answer: 네트워크 규칙을 독립적으로 시행하는 사람이 줄어들면서 Bitcoin의 탈중앙화가 약화됩니다
wrong_answers:
  - 모든 네트워크 참여자에게 더 빠르고 효율적인 Bitcoin 트랜잭션 제공
  - Bitcoin 네트워크는 손실된 유효성 검사를 보완하기 위해 자동으로 더 많은 mining 노드를 생성합니다
  - 타사 서비스는 일반적인 발행 일정을 넘어 새로운 비트코인을 생성할 수 있는 능력을 얻습니다
explanation: |
  사용자가 직접 풀 노드를 운영하지 않는 경우, Bitcoin의 규칙을 집행하는 권한을 다른 사람에게 아웃소싱하게 됩니다. 이는 트랜잭션과 블록을 검증하는 독립적인 당사자의 수가 줄어들기 때문에 Bitcoin의 탈중앙화를 약화시킵니다. 데이비드 하딩이 설명한 것처럼, 이는 소수의 채굴자와 서비스 제공자가 검증하지 않는 사용자를 위해 Bitcoin의 규칙을 변경할 수 있는 상황을 만들며, 해당 사용자는 이러한 규칙 변경을 거부하는 풀 검증 노드를 운영하는 사람들과 거래할 수 없게 됩니다.
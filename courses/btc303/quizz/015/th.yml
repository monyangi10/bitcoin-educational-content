question: จะเกิดอะไรขึ้นเมื่อผู้ใช้จ้างบุคคลที่สามตรวจสอบธุรกรรม Bitcoin แทนที่จะรันโหนดเต็มของตนเอง?
answer: การกระจายอำนาจของ Bitcoin อ่อนแอลงเมื่อมีคนน้อยลงที่บังคับใช้กฎของเครือข่ายอย่างอิสระ
wrong_answers:
  - ธุรกรรม Bitcoin กลายเป็นเร็วขึ้นและมีประสิทธิภาพมากขึ้นสำหรับผู้เข้าร่วมเครือข่ายทั้งหมด
  - เครือข่าย Bitcoin สร้างโหนด mining เพิ่มขึ้นโดยอัตโนมัติเพื่อชดเชยการตรวจสอบที่สูญหาย
  - บริการของบุคคลที่สามได้รับความสามารถในการสร้างบิตคอยน์ใหม่เกินกว่ากำหนดการออกปกติ
explanation: |
  เมื่อผู้ใช้ไม่ได้รันโหนดเต็มของตนเอง พวกเขาจะมอบอำนาจในการบังคับใช้กฎของ Bitcoin ให้กับผู้อื่น สิ่งนี้ทำให้การกระจายอำนาจของ Bitcoin อ่อนแอลงเพราะมีฝ่ายอิสระน้อยลงที่ทำการตรวจสอบธุรกรรมและบล็อก ตามที่ David Harding อธิบาย สถานการณ์นี้สร้างเงื่อนไขที่ผู้ขุดและผู้ให้บริการจำนวนน้อยสามารถเปลี่ยนแปลงกฎของ Bitcoin สำหรับผู้ใช้ที่ไม่ทำการตรวจสอบ ในขณะที่ผู้ใช้เหล่านั้นจะไม่สามารถทำธุรกรรมกับผู้ที่รันโหนดการตรวจสอบเต็มที่ปฏิเสธการเปลี่ยนแปลงกฎเหล่านั้นได้
reviewed: false
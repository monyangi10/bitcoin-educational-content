question: ビットコイン・トランザクションの検証を、自らフルノードを稼動させるのではなく、サードパーティに委託するとどうなるのか？
answer: ビットコインの分散化は、ネットワークルールを自ら実施する人が少なくなるにつれて弱まる
wrong_answers:
  - ビットコイン・トランザクションは、すべてのネットワーク参加者にとってより速く、より効率的になる
  - ビットコイン・ネットワークは、失われた検証を補うために、自動的にマイニングノードを増やす
  - サードパーティ性のサービスが、通常の発行スケジュールを超えて新しいビットコインを生成する能力を獲得する
explanation: |
  ユーザーが自分のノードをフル稼働させない場合、ビットコインのルールを執行する力を他人に委託することになる。これにより、トランザクションやブロックを検証する独立した主体が少なくなるため、ビッtコインの分散化が弱まる。デビッド・ハーディングが説明するように、これは少数のマイナーやサービス・プロバイダーが、検証を行わないユーザーのためにビットコインのルールを変更する可能性がある一方で、それらのユーザーは、そのようなルール変更を拒否する完全検証ノードを実行している人々と取引することができないという状況を生み出す。
reviewed: false

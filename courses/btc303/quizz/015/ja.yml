question: Bitcoinのトランザクション検証を、自社でフルノードを稼動させるのではなく、サードパーティに委託するとどうなるのか？
answer: Bitcoinの非中央集権は、ネットワークのルールを独自に実施する人が少なくなるにつれて弱まる。
wrong_answers:
  - Bitcoinトランザクションは、すべてのネットワーク参加者にとってより速く、より効率的になる。
  - Bitcoinネットワークは、失われた検証を補うために、自動的にminingノードを増やす。
  - サードパーティのサービスが、通常の発行スケジュールを超えて新しいビットコインを作成する能力を獲得する。
explanation: |
  ユーザーが自分のノードをフル稼働させない場合、Bitcoinのルールを執行する力を他人に委託することになる。これにより、取引やブロックを検証する独立した当事者が少なくなるため、Bitcoinの分散化が弱まる。デビッド・ハーディング氏が説明するように、これは少数のマイナーやサービス・プロバイダーが、検証を行わないユーザーのためにBitcoinのルールを変更する可能性がある一方で、それらのユーザーは、そのようなルール変更を拒否する完全検証ノードを実行している人々と取引することができないという状況を生み出す。
reviewed: false

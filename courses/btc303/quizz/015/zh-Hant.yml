question: 如果使用者將 Bitcoin 交易驗證工作外包給第三方，而非執行自己的完整節點，會發生什麼情況？
answer: 由於獨立執行網路規則的人越來越少，Bitcoin 的分散性變得越來越弱。
wrong_answers:
  - 對所有網路參與者而言，Bitcoin 交易變得更快、更有效率
  - Bitcoin 網路會自動建立更多的 mining 節點，以補償失去的驗證
  - 第三方服務獲得在正常發行時間表之外創造新比特幣的能力
explanation: |
  當使用者不運行自己的完整節點時，他們會將執行 Bitcoin 規則的權力外判給其他人。這會削弱 Bitcoin 的分散性，因為驗證交易和區塊的獨立方較少。正如 David Harding 所解釋的，這會造成一種情況，即少數礦工和服務供應商有可能為非驗證使用者更改 Bitcoin 的規則，而這些使用者將無法與運行完整驗證節點的人進行交易，而這些人會拒絕這些規則更改。
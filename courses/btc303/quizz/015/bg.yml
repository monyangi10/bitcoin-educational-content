question: Какво се случва, когато потребителите възлагат проверката на транзакциите в Bitcoin на трети страни, вместо да управляват свои собствени пълни възли?
answer: Децентрализацията на Bitcoin отслабва, тъй като по-малко хора прилагат правилата на мрежата независимо
wrong_answers:
  - Транзакциите Bitcoin стават по-бързи и по-ефективни за всички участници в мрежата
  - Мрежата Bitcoin автоматично създава повече възли mining, за да компенсира загубеното валидиране
  - Услугите на трети страни получават възможност да създават нови биткойни извън обичайния график за емитиране
explanation: |
  Когато потребителите не управляват свои собствени пълноценни възли, те прехвърлят правомощията си за прилагане на правилата на Bitcoin на други. Това отслабва децентрализацията на Bitcoin, тъй като по-малко независими страни потвърждават транзакциите и блоковете. Както обяснява Дейвид Хардинг, това създава ситуация, при която малък брой миньори и доставчици на услуги могат потенциално да променят правилата на Bitcoin за потребителите, които не проверяват, докато тези потребители няма да могат да извършват трансакции с хора, управляващи възли за пълно валидиране, които отхвърлят тези промени в правилата.
reviewed: false

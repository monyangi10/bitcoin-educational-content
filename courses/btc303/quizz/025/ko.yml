question: Bitcoin을 사용할 때 개인 금융 정보가 유출될 수 있는 두 가지 주요 방법은 무엇인가요?
answer: 블록체인 분석을 통한 온체인 및 감청 통신을 통한 off-chain
wrong_answers:
  - wallet 소프트웨어 버그 및 mining 풀 데이터 유출을 통해
  - 거래소 해킹 및 정부 감시 프로그램을 통해
  - 소셜 미디어 게시물 및 공개 거래 공지를 통해
explanation: |
  이 장의 내용에 따르면 개인 데이터는 크게 두 가지 방식으로 유출될 수 있습니다: on-chain와 off-chain. 온체인 유출은 거래 패턴, 주소 재사용, 클러스터링을 통해 금융 정보가 드러날 수 있는 퍼블릭 블록체인의 분석을 통해 발생합니다. 오프체인 유출은 악의적인 행위자가 인터넷 통신을 가로채거나 다른 비블록체인 수단을 통해 발생합니다. 오답은 Bitcoin 생태계의 실제 보안 문제를 언급하고 있지만, 자료에 설명된 대로 개인정보 유출이 어떻게 발생하는지에 대한 근본적인 분류를 나타내지는 않습니다.
reviewed: false

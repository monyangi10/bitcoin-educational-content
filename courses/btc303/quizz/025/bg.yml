question: Кои са двата основни начина, по които може да изтече лична финансова информация при използването на Bitcoin?
answer: On-chain чрез анализ на блокчейн и off-chain чрез прихванати комуникации
wrong_answers:
  - Чрез софтуерни грешки в wallet и нарушения на данните в басейна на mining
  - Чрез хакерски атаки и правителствени програми за наблюдение
  - Чрез публикации в социалните медии и публични съобщения за сделки
explanation: |
  Според съдържанието на главата личните данни могат да изтекат по два основни начина: on-chain и off-chain. Изтичането по веригата се случва чрез анализ на публичната блокчейн, където моделите на транзакции, повторното използване на адреси и клъстерирането могат да разкрият финансова информация. Изтичането извън веригата се случва, когато злонамерени участници прихващат интернет комуникации или чрез други средства, които не са свързани с блокчейн. Въпреки че грешните отговори споменават реални проблеми, свързани със сигурността в екосистемата Bitcoin, те не представляват фундаменталната категоризация на начините, по които се случва изтичането на лични данни, както е изложено в материала.
reviewed: false

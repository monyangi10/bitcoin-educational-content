question: Каковы два основных способа утечки частной финансовой информации при использовании Bitcoin?
answer: On-chain через анализ блокчейна и off-chain через перехваченные коммуникации
wrong_answers:
  - Благодаря ошибкам в программном обеспечении wallet и утечке данных из бассейна mining
  - Через взломы бирж и правительственные программы слежки
  - Через сообщения в социальных сетях и публичные объявления о сделках
explanation: |
  Согласно содержанию главы, утечка конфиденциальных данных может происходить двумя основными способами: on-chain и off-chain. Утечки на цепочке происходят через анализ публичного блокчейна, где шаблоны транзакций, повторное использование адресов и кластеризация могут раскрыть финансовую информацию. Утечки вне цепочки происходят, когда злоумышленники перехватывают интернет-коммуникации или используют другие способы, не связанные с блокчейном. Хотя неправильные ответы упоминают реальные проблемы безопасности в экосистеме Bitcoin, они не отражают фундаментальную классификацию того, как происходят утечки конфиденциальной информации, изложенную в материале.
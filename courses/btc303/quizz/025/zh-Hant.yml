question: 使用 Bitcoin 時，私人財務資訊洩漏的兩種主要方式是什麼？
answer: 透過區塊鏈分析進行鏈上分析，以及透過攔截通訊進行 off-chain 分析
wrong_answers:
  - 透過 wallet 軟體錯誤和 mining 池資料外洩
  - 透過交易所駭客和政府監控程式
  - 透過社交媒體貼文和公共交易公告
explanation: |
  根據本章內容，隱私資料主要有兩種洩漏方式：on-chain 和 off-chain。鏈上洩漏是透過分析公開區塊鏈發生的，其中交易模式、位址重複使用和聚類可以揭露財務資訊。當惡意行為者截取網際網路通訊或透過其他非區塊鏈方式時，就會發生鍊外洩漏。雖然錯誤答案提到 Bitcoin 生態系統中真正的安全問題，但它們並不代表材料中概述的隱私洩漏發生方式的基本分類。
reviewed: false

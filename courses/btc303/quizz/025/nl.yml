question: Wat zijn de twee belangrijkste manieren waarop financiële privégegevens kunnen uitlekken bij het gebruik van Bitcoin?
answer: On-chain via blockchainanalyse en off-chain via onderschepte communicatie
wrong_answers:
  - Door wallet softwarebugs en mining inbreuken op zwembadgegevens
  - Via beurshacks en surveillanceprogramma's van de overheid
  - Via berichten op sociale media en aankondigingen van openbare transacties
explanation: |
  Volgens de inhoud van het hoofdstuk kunnen privégegevens op twee manieren uitlekken: on-chain en off-chain. On-chain lekken ontstaan door analyse van de publieke blockchain, waar transactiepatronen, hergebruik van adressen en clustering financiële informatie kunnen onthullen. Lekken buiten de keten gebeuren wanneer kwaadwillende actoren internetcommunicatie onderscheppen of via andere niet-blockchain middelen. Hoewel de foute antwoorden echte beveiligingsproblemen in het Bitcoin ecosysteem vermelden, vertegenwoordigen ze niet de fundamentele categorisatie van hoe privacylekken zich voordoen zoals beschreven in het materiaal.
reviewed: false

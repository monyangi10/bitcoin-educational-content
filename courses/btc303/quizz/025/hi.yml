question: Bitcoin का उपयोग करते समय निजी वित्तीय जानकारी लीक होने के दो मुख्य तरीके क्या हैं?
answer: ब्लॉकचेन विश्लेषण के माध्यम से ऑन-चेन और इंटरसेप्टेड संचार के माध्यम से off-chain
wrong_answers:
  - wallet सॉफ्टवेयर बग और mining पूल डेटा उल्लंघनों के माध्यम से
  - एक्सचेंज हैक और सरकारी निगरानी कार्यक्रमों के माध्यम से
  - सोशल मीडिया पोस्ट और सार्वजनिक लेनदेन घोषणाओं के माध्यम से
explanation: |
  अध्याय की सामग्री के अनुसार, निजी डेटा दो मुख्य तरीकों से लीक हो सकता है: on-chain और off-chain। ऑन-चेन लीक सार्वजनिक ब्लॉकचेन के विश्लेषण के माध्यम से होते हैं, जहाँ लेन-देन के पैटर्न, पते का पुन: उपयोग और क्लस्टरिंग वित्तीय जानकारी का खुलासा कर सकते हैं। ऑफ-चेन लीक तब होते हैं जब दुर्भावनापूर्ण तत्व इंटरनेट संचार को बाधित करते हैं या अन्य गैर-ब्लॉकचेन माध्यमों से। हालाँकि गलत उत्तर Bitcoin पारिस्थितिकी तंत्र में वास्तविक सुरक्षा चिंताओं का उल्लेख करते हैं, लेकिन वे सामग्री में बताए गए गोपनीयता लीक के मूल वर्गीकरण का प्रतिनिधित्व नहीं करते हैं।
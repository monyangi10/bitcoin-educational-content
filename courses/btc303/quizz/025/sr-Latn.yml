question: Koja su dva glavna načina na koja privatne finansijske informacije mogu procureti kada se koristi Bitcoin?
answer: On-chain kroz analizu blockchaina i off-chain kroz presretnute komunikacije
wrong_answers:
  - Putem grešaka u softveru novčanika i curenja podataka iz rudarskih bazena
  - Kroz napade na kripto-berze i državne programe nadzora
  - Kroz objave na društvenim mrežama i javne najave transakcija
explanation: |
  Prema sadržaju poglavlja, privatni podaci mogu procuriti na dva osnovna načina: on-chain i off-chain. Curenja podataka na blokčejnu (on-chain) dešava se kroz 
  analizu javnog blockchaina, gde obrasci transakcija, ponovna upotreba adresa i klasterizacija mogu otkriti finansijske informacije. Curenje van lanca dešava 
  se kada zlonamerni akteri presreću internet komunikacije ili kroz druge metode koje nisu povezane sa blockchainom. Iako pogrešni odgovori pominju stvarne 
  bezbednosne zabrinutosti u Bitcoin ekosistemu, oni ne predstavljaju osnovnu kategorizaciju kako dolazi do curenja privatnosti kako je navedeno u materijalu.
reviewed: true

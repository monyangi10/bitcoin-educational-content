question: Koja su dva glavna načina na koja privatne finansijske informacije mogu procureti kada se koristi Bitcoin?
answer: On-chain kroz analizu blockchaina i off-chain kroz presretnute komunikacije
wrong_answers:
  - Kroz wallet softverske greške i mining povrede podataka bazena
  - Putem razmene hakova i vladinih programa nadzora
  - Kroz objave na društvenim mrežama i javne najave transakcija
explanation: |
  Prema sadržaju poglavlja, privatni podaci mogu procuriti na dva osnovna načina: on-chain i off-chain. Curenje na lancu dešava se kroz analizu javnog blockchaina, gde obrasci transakcija, ponovna upotreba adresa i klasterizacija mogu otkriti finansijske informacije. Curenje van lanca dešava se kada zlonamerni akteri presreću internet komunikacije ili kroz druge metode koje nisu povezane sa blockchainom. Iako pogrešni odgovori pominju stvarne bezbednosne zabrinutosti u Bitcoin ekosistemu, oni ne predstavljaju osnovnu kategorizaciju kako dolazi do curenja privatnosti kako je navedeno u materijalu.

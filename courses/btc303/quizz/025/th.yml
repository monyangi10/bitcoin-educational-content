question: สองวิธีหลักที่ข้อมูลการเงินส่วนตัวสามารถรั่วไหลเมื่อใช้ Bitcoin คืออะไร?
answer: บนเชนผ่านการวิเคราะห์บล็อกเชนและ off-chain ผ่านการสื่อสารที่ถูกดักฟัง
wrong_answers:
  - ผ่านข้อบกพร่องของซอฟต์แวร์ wallet และการละเมิดข้อมูลพูล mining
  - ผ่านการแฮ็กการแลกเปลี่ยนและโปรแกรมการสอดแนมของรัฐบาล
  - ผ่านโพสต์ในโซเชียลมีเดียและการประกาศธุรกรรมสาธารณะ
explanation: |
  ตามเนื้อหาของบทนี้ ข้อมูลส่วนตัวสามารถรั่วไหลได้สองวิธีหลัก: on-chain และ off-chain การรั่วไหลบนเชนเกิดขึ้นผ่านการวิเคราะห์บล็อกเชนสาธารณะ ซึ่งรูปแบบการทำธุรกรรม การใช้ที่อยู่ซ้ำ และการจัดกลุ่มสามารถเปิดเผยข้อมูลทางการเงินได้ การรั่วไหลนอกเชนเกิดขึ้นเมื่อผู้ไม่หวังดีดักจับการสื่อสารทางอินเทอร์เน็ตหรือผ่านวิธีการอื่นที่ไม่ใช่บล็อกเชน ในขณะที่คำตอบที่ผิดกล่าวถึงข้อกังวลด้านความปลอดภัยที่แท้จริงในระบบนิเวศ Bitcoin แต่พวกเขาไม่ได้แสดงถึงการจัดหมวดหมู่พื้นฐานของวิธีการที่การรั่วไหลของข้อมูลส่วนตัวเกิดขึ้นตามที่ระบุไว้ในเนื้อหา
reviewed: false
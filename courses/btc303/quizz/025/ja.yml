question: ビットコイン利用時に、プライベートな財務情報が漏洩する主な2つの原因とは何か？
answer: ブロックチェーン分析によるオンチェーンと、傍受した通信によるオフチェーン
wrong_answers:
  - ウォレットのソフトウェア・バグとマイニングプールのデータ流出
  - 取引所のハッキングや政府の監視プログラム
  - ソーシャルメディアへの投稿やパブリックトランザクションに関するアナウンス
explanation: |
  本章の内容によれば、個人情報の漏洩には主に2つの方法がある：オンチェーンとオフチェーンである。オンチェーン・リークはパブリック・ブロックチェーンの分析を通じて起こり、トランザクションパターン、アドレスの再利用、クラスタリングによって財務情報が明らかになる可能性がある。オフチェーン・リークは、悪意のあるアクターがインターネット通信を傍受したり、他の非ブロックチェーン手段を通じて起こる。誤答はビットコインのエコシステムにおける実際のセキュリティ上の懸念に言及しているが、資料に概説されているようなプライバシー漏えいが起こる基本的な分類を表しているわけではない。
reviewed: false

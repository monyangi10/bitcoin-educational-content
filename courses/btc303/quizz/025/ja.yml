question: Bitcoinを利用する際、個人的な財務情報が漏れる可能性がある主な2つの方法とは？
answer: ブロックチェーン分析によるオンチェーン、通信傍受によるoff-chain
wrong_answers:
  - walletのソフトウェア・バグとminingのプール・データ流出を通じて
  - 取引所のハッキングや政府の監視プログラムを通じて
  - ソーシャルメディアへの投稿や公的取引に関するアナウンスを通じて
explanation: |
  本章の内容によれば、個人情報の漏洩には主に2つの方法がある：on-chainとoff-chainである。オンチェーンリークはパブリックブロックチェーンの分析を通じて起こり、取引パターン、アドレスの再利用、クラスタリングによって財務情報が明らかになる可能性がある。オフチェーンでのリークは、悪意のあるアクターがインターネット通信を傍受したり、他の非ブロックチェーン手段を通じて起こる。誤答はBitcoinのエコシステムにおける実際のセキュリティ上の懸念に言及しているが、資料に概説されているようなプライバシー漏えいの起こり方の基本的な分類を表しているわけではない。
question: Quali sono i due modi principali in cui le informazioni finanziarie private possono trapelare quando si usa Bitcoin?
answer: On-chain attraverso l'analisi della blockchain e off-chain attraverso le comunicazioni intercettate
wrong_answers:
  - Attraverso i bug del software wallet e le violazioni dei dati delle mining pool
  - Tramite attacchi agli exchange e programmi di sorveglianza governativa
  - Attraverso post sui social media e annunci di transazioni pubbliche
explanation: |
  Secondo il contenuto del capitolo, i dati privati possono trapelare in due modi principali: on-chain e off-chain. Le fughe di dati on-chain si verificano attraverso l'analisi della blockchain pubblica, dove i modelli di transazione, il riutilizzo degli indirizzi e il clustering possono rivelare informazioni finanziarie. Le fughe di dati off-chain si verificano quando attori malintenzionati intercettano le comunicazioni via Internet o attraverso altri mezzi non legati alla blockchain. Sebbene le risposte sbagliate facciano riferimento a problemi di sicurezza reali nell'ecosistema Bitcoin, non rappresentano la categorizzazione fondamentale di come si verificano le fughe di dati sulla privacy, come indicato nel materiale.
reviewed: true

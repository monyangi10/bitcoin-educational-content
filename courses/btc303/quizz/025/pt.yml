question: Quais são as duas principais formas de fuga de informações financeiras privadas quando se utiliza o Bitcoin?
answer: On-chain através da análise da cadeia de blocos e off-chain através de comunicações interceptadas
wrong_answers:
  - Através dos erros de software do wallet e das violações de dados da piscina do mining
  - Através de piratas informáticos e programas de vigilância governamental
  - Através de publicações nas redes sociais e anúncios de transacções públicas
explanation: |
  De acordo com o conteúdo do capítulo, a fuga de dados privados pode ocorrer de duas formas principais: on-chain e off-chain. As fugas on-chain ocorrem através da análise da blockchain pública, onde os padrões de transação, a reutilização de endereços e o agrupamento podem revelar informações financeiras. As fugas fora da cadeia ocorrem quando agentes maliciosos interceptam comunicações na Internet ou através de outros meios não relacionados com a cadeia de blocos. Embora as respostas erradas mencionem preocupações reais de segurança no ecossistema Bitcoin, elas não representam a categorização fundamental de como os vazamentos de privacidade ocorrem, conforme descrito no material.
question: Jaké jsou dva hlavní způsoby úniku soukromých finančních informací při používání Bitcoin?
answer: On-chain prostřednictvím analýzy blockchainu a off-chain prostřednictvím zachycené komunikace
wrong_answers:
  - Chyby v softwaru wallet a narušení dat v bazénu mining
  - Prostřednictvím hackerských útoků na burzy a vládních sledovacích programů
  - Prostřednictvím příspěvků na sociálních sítích a veřejných oznámení o transakcích
explanation: |
  Podle obsahu kapitoly mohou soukromá data uniknout dvěma základními způsoby: on-chain a off-chain. K únikům v řetězci dochází prostřednictvím analýzy veřejného blockchainu, kdy vzory transakcí, opakované použití adres a shlukování mohou odhalit finanční informace. K únikům mimo řetězec dochází, když záškodníci zachytí internetovou komunikaci nebo jinými prostředky mimo blockchain. Ačkoli špatné odpovědi zmiňují skutečné bezpečnostní problémy v ekosystému Bitcoin, nepředstavují základní kategorizaci způsobů, jak dochází k únikům soukromí, jak je uvedeno v materiálu.

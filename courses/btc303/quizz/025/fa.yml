question: دو روش اصلی که اطلاعات مالی خصوصی می‌تواند هنگام استفاده از Bitcoin نشت کند چیست؟
answer: از طریق تحلیل بلاک‌چین و off-chain از طریق ارتباطات رهگیری‌شده
wrong_answers:
  - از طریق اشکالات نرم‌افزار wallet و نقض داده‌های استخر mining
  - از طریق هک‌های تبادل و برنامه‌های نظارتی دولتی
  - از طریق پست‌های رسانه‌های اجتماعی و اعلامیه‌های عمومی تراکنش‌ها
explanation: |
  بر اساس محتوای فصل، داده‌های خصوصی می‌توانند به دو روش اصلی نشت کنند: on-chain و off-chain. نشت‌های زنجیره‌ای از طریق تحلیل بلاکچین عمومی رخ می‌دهند، جایی که الگوهای تراکنش، استفاده مجدد از آدرس و خوشه‌بندی می‌توانند اطلاعات مالی را فاش کنند. نشت‌های خارج از زنجیره زمانی اتفاق می‌افتند که عوامل مخرب ارتباطات اینترنتی را رهگیری کنند یا از طریق روش‌های غیر بلاکچینی دیگر. در حالی که پاسخ‌های نادرست به نگرانی‌های واقعی امنیتی در اکوسیستم Bitcoin اشاره می‌کنند، اما نمایانگر دسته‌بندی اساسی نحوه وقوع نشت‌های حریم خصوصی نیستند که در این مطالب توضیح داده شده است.
question: بر اساس چارچوب افشای مسئولانه مورد بحث، دلیل اصلی که توسعه‌دهندگان از رفع فوری آسیب‌پذیری‌های غیر بحرانی در Bitcoin Core اجتناب می‌کنند چیست؟
answer: برای جلوگیری از اینکه خود وصله ماهیت آسیب‌پذیری را قبل از استقرار گسترده فاش کند
wrong_answers:
  - برای فراهم کردن زمان کافی به توسعه‌دهندگان آلت‌کوین برای اجرای ابتدا اصلاحات مستقل خودشان
  - برای فعال‌سازی تست جامع در سراسر استخرهای مختلف mining قبل از انتشار هرگونه به‌روزرسانی امنیتی
  - برای حفظ سازگاری با نسخه‌های قدیمی‌تر نود که نمی‌توانند وصله‌های اضطراری را مدیریت کنند
explanation: |
  پاسخ صحیح به یک پارادوکس مهم در وصله‌های امنیتی اشاره می‌کند: خود اصلاح می‌تواند آسیب‌پذیری را آشکار کند. این فصل تأکید می‌کند که توسعه‌دهندگان باید وصله‌ها را با دقت پنهان کنند زیرا انتشار فوری آن‌ها ممکن است آسیب‌پذیری را به مهاجمان نشان دهد قبل از اینکه بیشتر گره‌ها محافظت شوند. پاسخ‌های نادرست، اگرچه قابل قبول هستند، اما اولویت‌ها را نادرست نشان می‌دهند: اطلاع‌رسانی آلت‌کوین پس از استقرار شبکه Bitcoin اتفاق می‌افتد، آزمایش استخر mining نگرانی اصلی برای مسائل غیر بحرانی نیست، و سازگاری معکوس زمان‌بندی وصله‌های امنیتی را تعیین نمی‌کند.
question: According to the responsible disclosure framework discussed, what is the primary reason developers avoid immediately patching non-critical vulnerabilities in Bitcoin Core?
answer: To prevent the patch itself from revealing the vulnerability's nature before widespread deployment occurs
wrong_answers:
  - To allow sufficient time for altcoin developers to implement their own independent fixes first
  - To enable comprehensive testing across different mining pools before releasing any security updates
  - To maintain backwards compatibility with older node versions that cannot handle emergency patches
explanation: |
  The correct answer highlights a crucial paradox in security patching: the fix itself can expose the vulnerability. The chapter emphasizes that developers must carefully disguise patches because publishing them immediately might reveal the vulnerability to attackers before most nodes are protected. The wrong answers, while plausible, misrepresent the priorities: altcoin notification happens after Bitcoin network deployment, mining pool testing isn't the primary concern for non-critical issues, and backwards compatibility doesn't drive the timing of security patches.
reviewed: false

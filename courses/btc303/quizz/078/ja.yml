question: 責任ある情報開示の枠組みによると、開発者がビットコインコアの重要でない脆弱性に直ちにパッチを当てることを避ける主な理由は何ですか？
answer: 広範囲に配備される前に、パッチ自体が脆弱性の性質を明らかにするのを防ぐため
wrong_answers:
  - アルトコインの開発者が独自に修正を実施するための十分な時間を確保するため
  - セキュリティ・アップデートをリリースする前に、異なるマイニングプールで包括的なテストを行えるようにするため
  - 緊急パッチを処理できない古いバージョンのノードとの後方互換性を維持するため
explanation: |
  正解は、セキュリティパッチにおける重要なパラドックスを浮き彫りにしている。この章では、パッチをすぐに公開すると、ほとんどのノードが保護される前に攻撃者に脆弱性が知られてしまう可能性があるため、開発者はパッチを慎重に偽装しなければならないことを強調している。アルトコインの通知はビットコイン・ネットワーク展開の後に行われ、マイニングプールのテストは重要でない問題に対する主要な関心事ではなく、後方互換性はセキュリティパッチのタイミングを左右しない。
reviewed: false

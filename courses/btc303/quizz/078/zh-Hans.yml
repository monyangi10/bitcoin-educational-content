question: 根据所讨论的责任披露框架，开发人员避免立即修补 Bitcoin Core 中非关键漏洞的主要原因是什么？
answer: 防止补丁本身在广泛部署前暴露漏洞的性质
wrong_answers:
  - 为了让替代币开发者有足够的时间先实施自己的独立修复程序
  - 在发布任何安全更新之前，对不同的 mining 数据库进行全面测试
  - 与无法处理紧急修补程序的旧版本节点保持向后兼容
explanation: |
  正确答案强调了安全补丁中的一个重要悖论：修复本身就可能暴露漏洞。本章强调，开发人员必须小心伪装补丁，因为立即发布补丁可能会在大多数节点得到保护之前向攻击者暴露漏洞。错误的答案虽然有一定道理，但却歪曲了优先顺序：altcoin 通知发生在 Bitcoin 网络部署之后，mining 池测试并不是非关键问题的主要关注点，而向后兼容性也不会影响安全补丁的时间安排。
reviewed: false

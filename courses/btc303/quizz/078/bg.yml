question: Според обсъжданата рамка за отговорно оповестяване коя е основната причина разработчиците да избягват незабавното поправяне на некритични уязвимости в ядрото на Bitcoin?
answer: За да се предотврати разкриването на същността на уязвимостта от самата кръпка преди широкото ѝ внедряване
wrong_answers:
  - За да се даде достатъчно време на разработчиците на алткойни първо да въведат свои собствени независими поправки
  - За да се даде възможност за цялостно тестване на различни пулове на mining, преди да се пуснат актуализации на сигурността
  - За поддържане на обратна съвместимост с по-стари версии на възли, които не могат да обработват аварийни кръпки
explanation: |
  Правилният отговор подчертава един важен парадокс при поправките на сигурността: самата поправка може да разкрие уязвимостта. В главата се подчертава, че разработчиците трябва внимателно да прикриват поправките, защото незабавното им публикуване може да разкрие уязвимостта на нападателите, преди повечето възли да са защитени. Неправилните отговори, макар и правдоподобни, представят погрешно приоритетите: уведомяването за алткойн става след разгръщането на мрежата в Bitcoin, тестването на пула в mining не е основна грижа за некритични проблеми, а обратната съвместимост не определя времето на поправките за сигурност.
reviewed: false

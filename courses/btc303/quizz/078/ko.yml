question: 논의된 책임 있는 공개 프레임워크에 따르면, 개발자가 Bitcoin Core에서 중요하지 않은 취약점을 즉시 패치하지 않는 주된 이유는 무엇인가요?
answer: 패치가 광범위하게 배포되기 전에 취약점의 특성이 드러나지 않도록 하려면 다음과 같이 하세요
wrong_answers:
  - 알트코인 개발자가 먼저 자체적인 수정 사항을 구현할 수 있는 충분한 시간을 갖도록 하기 위해 다음을 수행합니다
  - 보안 업데이트를 릴리스하기 전에 여러 mining 풀에서 포괄적인 테스트를 수행하려면 다음과 같이 하세요
  - 긴급 패치를 처리할 수 없는 이전 노드 버전과의 하위 호환성을 유지하려면 다음과 같이 하세요
explanation: |
  정답은 보안 패치의 중요한 역설, 즉 패치 자체가 취약점을 노출시킬 수 있다는 점을 강조합니다. 이 장에서는 개발자가 패치를 즉시 게시하면 대부분의 노드가 보호되기 전에 공격자에게 취약점이 노출될 수 있으므로 패치를 신중하게 위장해야 한다고 강조합니다. 오답은 그럴듯하지만 우선순위를 잘못 표현하고 있습니다. 알트코인 알림은 Bitcoin 네트워크 배포 이후에 발생하고, mining 풀 테스트는 중요하지 않은 문제에 대한 주요 관심사가 아니며, 하위 호환성은 보안 패치 타이밍을 결정하지 않습니다.
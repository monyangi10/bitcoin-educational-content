question: Согласно рассмотренной схеме ответственного раскрытия информации, какова основная причина, по которой разработчики избегают немедленного исправления некритичных уязвимостей в Bitcoin Core?
answer: Чтобы предотвратить раскрытие природы уязвимости в самом патче до его широкого распространения
wrong_answers:
  - Чтобы дать разработчикам альткоинов достаточно времени для самостоятельной реализации исправлений, сначала
  - Чтобы обеспечить всестороннее тестирование различных пулов mining перед выпуском обновлений безопасности
  - Для поддержания обратной совместимости с более старыми версиями узла, которые не могут обрабатывать аварийные исправления
explanation: |
  Правильный ответ подчеркивает важный парадокс в исправлениях безопасности: само исправление может раскрыть уязвимость. В главе подчеркивается, что разработчики должны тщательно маскировать патчи, поскольку их немедленная публикация может раскрыть уязвимость злоумышленникам до того, как большинство узлов будут защищены. Неправильные ответы, хотя и правдоподобны, неверно отражают приоритеты: уведомление об альткоинах происходит после развертывания сети Bitcoin, тестирование пула mining не является первоочередной задачей для некритичных проблем, а обратная совместимость не определяет время выпуска патчей безопасности.
reviewed: false

question: चर्चा किए गए जिम्मेदार प्रकटीकरण ढांचे के अनुसार, डेवलपर्स द्वारा Bitcoin कोर में गैर-महत्वपूर्ण कमजोरियों को तुरंत पैच करने से बचने का प्राथमिक कारण क्या है?
answer: व्यापक परिनियोजन से पहले पैच द्वारा भेद्यता की प्रकृति को प्रकट करने से रोकना
wrong_answers:
  - ऑल्टकॉइन डेवलपर्स को पहले अपने स्वयं के स्वतंत्र सुधारों को लागू करने के लिए पर्याप्त समय देने के लिए
  - किसी भी सुरक्षा अद्यतन को जारी करने से पहले विभिन्न mining पूलों में व्यापक परीक्षण को सक्षम करना
  - पुराने नोड संस्करणों के साथ पश्चगामी संगतता बनाए रखने के लिए जो आपातकालीन पैच को संभाल नहीं सकते
explanation: |
  सही उत्तर सुरक्षा पैचिंग में एक महत्वपूर्ण विरोधाभास को उजागर करता है: फिक्स स्वयं ही भेद्यता को उजागर कर सकता है। अध्याय इस बात पर ज़ोर देता है कि डेवलपर्स को पैच को सावधानीपूर्वक छिपाना चाहिए क्योंकि उन्हें तुरंत प्रकाशित करने से अधिकांश नोड्स सुरक्षित होने से पहले ही हमलावरों के लिए भेद्यता प्रकट हो सकती है। गलत उत्तर, यद्यपि प्रशंसनीय हैं, प्राथमिकताओं को गलत तरीके से प्रस्तुत करते हैं: ऑल्टकॉइन अधिसूचना Bitcoin नेटवर्क परिनियोजन के बाद होती है, mining पूल परीक्षण गैर-महत्वपूर्ण समस्याओं के लिए प्राथमिक चिंता का विषय नहीं है, और पश्चगामी संगतता सुरक्षा पैच के समय को निर्धारित नहीं करती है।
question: ตามกรอบการเปิดเผยข้อมูลอย่างรับผิดชอบที่ได้กล่าวถึง เหตุผลหลักที่นักพัฒนาหลีกเลี่ยงการแก้ไขช่องโหว่ที่ไม่สำคัญใน Bitcoin Core ทันทีคืออะไร?
answer: เพื่อป้องกันไม่ให้แพตช์เองเปิดเผยลักษณะของช่องโหว่ก่อนที่จะมีการใช้งานอย่างแพร่หลาย
wrong_answers:
  - เพื่อให้มีเวลาเพียงพอสำหรับนักพัฒนา altcoin ในการดำเนินการแก้ไขปัญหาของตนเองก่อน
  - เพื่อเปิดใช้งานการทดสอบอย่างครอบคลุมในกลุ่ม mining ที่แตกต่างกันก่อนที่จะปล่อยการอัปเดตความปลอดภัยใด ๆ
  - เพื่อรักษาความเข้ากันได้ย้อนหลังกับเวอร์ชันของโหนดที่เก่ากว่าซึ่งไม่สามารถจัดการกับแพตช์ฉุกเฉินได้
explanation: |
  คำตอบที่ถูกต้องเน้นย้ำถึงความขัดแย้งที่สำคัญในด้านการแก้ไขความปลอดภัย: การแก้ไขเองสามารถเปิดเผยช่องโหว่ได้ บทนี้เน้นว่าผู้พัฒนาต้องปลอมแปลงแพตช์อย่างระมัดระวังเพราะการเผยแพร่ทันทีอาจเปิดเผยช่องโหว่ให้กับผู้โจมตีก่อนที่โหนดส่วนใหญ่จะได้รับการป้องกัน คำตอบที่ผิด แม้ว่าจะดูสมเหตุสมผล แต่ก็แสดงลำดับความสำคัญผิด: การแจ้งเตือน altcoin เกิดขึ้นหลังจากการปรับใช้เครือข่าย Bitcoin การทดสอบพูล mining ไม่ใช่ข้อกังวลหลักสำหรับปัญหาที่ไม่สำคัญ และความเข้ากันได้ย้อนหลังไม่ได้เป็นตัวกำหนดเวลาของการแก้ไขความปลอดภัย
reviewed: false
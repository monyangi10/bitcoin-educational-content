question: 根據所討論的責任揭露架構，開發人員避免立即修補 Bitcoin Core 中的非關鍵漏洞的主要原因是什麼？
answer: 為了防止修補程式本身在廣泛部署之前揭露漏洞的性質
wrong_answers:
  - 為了讓替代幣開發者有足夠的時間先執行他們自己獨立的修正
  - 在發佈任何安全更新之前，在不同的 mining 池中進行全面測試
  - 與無法處理緊急修補程式的舊版節點維持向下相容性
explanation: |
  正確答案突顯了安全修補程式中的一個重要悖論：修補程式本身可能會暴露弱點。本章強調，開發人員必須小心偽裝修補程式，因為立即發布修補程式可能會在大部分節點受到保護之前，讓攻擊者發現漏洞。錯誤的答案雖然看似合理，但卻歪曲了優先順序：altcoin 通知發生在 Bitcoin 網路部署之後，mining 池測試不是非關鍵問題的首要考量，而向下相容性也不會驅使安全修補程式的時機。
question: Mis teeb Bitcoin tehingutöötluse tsensuurikindlaks?
answer: Tehingute tellimine toimub kollektiivselt dünaamilise kaevurite kogumi poolt, millega igaüks võib liituda või lahkuda
wrong_answers:
  - Tehingute valideerimine on krüpteeritud täiustatud krüptograafiliste protokollidega, mida valitsused ei saa murda
  - Tehinguandmeid hoitakse mitmes varundusserveris, mida kontrollivad erinevad usaldusväärsed organisatsioonid
  - Tehingutasusid kohandatakse automaatselt, et vältida tsentraliseeritud asutuste majandusrünnakuid
explanation: |
  Bitcoin saavutab tsensuurikindluse kaevurite detsentraliseerimise abil, kus tehingu tellimine toimub kollektiivselt kõigi kaevurite poolt, kes otsustavad osaleda. See loob dünaamilise süsteemi, kus igaüks võib mining protsessiga vabalt liituda või sellest lahkuda, kõrvaldades kõik üksikud kontrollpunktid, mida võidakse survestada tehingute tsenseerimiseks. Valed vastused kirjeldavad tehnilisi omadusi, usaldusväärseid osapooli või majandusmehhanisme, mis ei käsitle tehingu töötlemise detsentraliseeritud kontrolli põhiküsimust.
reviewed: false

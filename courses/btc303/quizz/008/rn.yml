question: Ni igiki gituma Bitcoin ishobora guhangana n’ugucengera?
answer: Gutegeka ibikorwa vy'ubudandaji bikorwa hamwe n'umugwi w'abacukuzi b'amabuye y'agaciro umuntu wese ashobora kwifatanya canke akavayo .
wrong_answers:
  - Kwemeza ibikorwa vy'ubudandaji bishizwe mu buryo buteye imbere hakoreshejwe amategeko ateye imbere y'ubuhinga bwa none Leta zidashobora guca .
  - Amadosiye y'ibikorwa abikwa kuri server nyinshi zigenzurwa n'imiryango itandukanye yizewe
  - Amafaranga y'ugucuruza arahindurwa ubwo nyene kugira ngo ntihagire ibitero vy'ubutunzi biva ku butegetsi bushingiye ku butegetsi .
explanation: |
  Bitcoin ishika ku kurwanya ugucengera biciye mu kwegereza ubutegetsi abacukuzi, aho gutegeka ibikorwa vy’ubudandaji bikorwa hamwe n’abacukuzi bose bahisemwo kugira uruharamwo. Ivyo bituma haba uburyo bukomeye aho umuntu wese ashobora kwinjira canke kuva mu nzira ya mining yidegemvya, bikaba bikuraho ikintu na kimwe co kugenzura coshobora guhatwa kugira ngo giceceke amafaranga. Inyishu zitari zo zidondora ibiranga ubuhinga, abantu bizigira, canke uburyo bw’ubutunzi butavuga ku kibazo nyamukuru c’ubugenzuzi bushingiye ku nzego zitandukanye ku bijanye n’ugukora ibikorwa vy’ubudandaji.

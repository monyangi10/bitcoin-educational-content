question: چه چیزی باعث می‌شود پردازش تراکنش‌های Bitcoin در برابر سانسور مقاوم باشد؟
answer: ترتیب تراکنش‌ها به‌صورت جمعی توسط مجموعه‌ای پویا از ماینرها انجام می‌شود که هر کسی می‌تواند به آن بپیوندد یا آن را ترک کند.
wrong_answers:
  - اعتبارسنجی تراکنش با استفاده از پروتکل‌های رمزنگاری پیشرفته‌ای رمزگذاری می‌شود که دولت‌ها نمی‌توانند آن را بشکنند.
  - سوابق تراکنش‌ها بر روی چندین سرور پشتیبان ذخیره می‌شوند که توسط سازمان‌های معتبر مختلف کنترل می‌شوند.
  - هزینه‌های تراکنش به‌طور خودکار تنظیم می‌شوند تا از حملات اقتصادی توسط مقامات متمرکز جلوگیری شود.
explanation: |
  Bitcoin با تمرکززدایی از ماینرها به مقاومت در برابر سانسور دست می‌یابد، جایی که ترتیب‌دهی تراکنش‌ها به‌صورت جمعی توسط تمام ماینرهایی که تصمیم به مشارکت می‌گیرند انجام می‌شود. این یک سیستم پویا ایجاد می‌کند که در آن هر کسی می‌تواند به‌صورت آزادانه به فرآیند mining بپیوندد یا از آن خارج شود و هرگونه نقطه کنترل واحدی که ممکن است تحت فشار برای سانسور تراکنش‌ها قرار گیرد را از بین می‌برد. پاسخ‌های نادرست ویژگی‌های فنی، طرف‌های مورد اعتماد یا مکانیزم‌های اقتصادی را توصیف می‌کنند که به مسئله اصلی کنترل غیرمتمرکز بر پردازش تراکنش‌ها نمی‌پردازند.
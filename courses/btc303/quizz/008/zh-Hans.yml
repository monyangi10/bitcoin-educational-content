question: 是什么让 Bitcoin 的交易处理具有抗审查能力？
answer: 交易排序由一组动态矿工集体完成，任何人都可以加入或退出
wrong_answers:
  - 交易验证采用先进的加密协议进行加密，政府无法破解
  - 交易记录存储在由不同可信组织控制的多个备份服务器上
  - 自动调整交易费用，防止中央机构的经济攻击
explanation: |
  Bitcoin 通过矿工去中心化实现抗审查功能，即交易排序由所有选择参与的矿工集体执行。这就创造了一个动态系统，任何人都可以自由加入或退出 mining 进程，从而消除了任何可能被迫审查交易的单点控制。错误答案描述的是技术特征、受信任方或经济机制，并没有解决交易处理的分散控制这一核心问题。
reviewed: false

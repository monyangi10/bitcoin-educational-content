question: Что делает обработку транзакций в Bitcoin устойчивой к цензуре?
answer: Упорядочивание транзакций осуществляется коллективно динамическим набором майнеров, к которому может присоединиться или покинуть любой желающий
wrong_answers:
  - Подтверждение транзакций шифруется с использованием передовых криптографических протоколов, которые не могут быть взломаны государственными органами
  - Записи транзакций хранятся на нескольких серверах резервного копирования, контролируемых различными доверенными организациями
  - Плата за транзакции автоматически корректируется для предотвращения экономических атак со стороны централизованных органов власти
explanation: |
  Устойчивость к цензуре в Bitcoin достигается за счет децентрализации майнеров, когда заказ транзакций осуществляется коллективно всеми майнерами, решившими принять в нем участие. Это создает динамичную систему, в которой каждый может свободно присоединиться к процессу mining или покинуть его, устраняя единую точку контроля, на которую можно было бы оказать давление с целью цензурирования транзакций. Неправильные ответы описывают технические особенности, доверенные стороны или экономические механизмы, которые не решают основной проблемы децентрализованного контроля над обработкой транзакций.
question: อะไรทำให้การประมวลผลธุรกรรมของ Bitcoin ต้านทานการเซ็นเซอร์?
answer: การจัดลำดับธุรกรรมดำเนินการโดยกลุ่มนักขุดที่เปลี่ยนแปลงได้ซึ่งใครก็สามารถเข้าร่วมหรือออกได้
wrong_answers:
  - การตรวจสอบธุรกรรมถูกเข้ารหัสโดยใช้โปรโตคอลการเข้ารหัสขั้นสูงที่รัฐบาลไม่สามารถถอดรหัสได้
  - บันทึกธุรกรรมถูกเก็บไว้บนเซิร์ฟเวอร์สำรองหลายตัวที่ควบคุมโดยองค์กรที่เชื่อถือได้ต่าง ๆ
  - ค่าธรรมเนียมการทำธุรกรรมจะถูกปรับโดยอัตโนมัติเพื่อป้องกันการโจมตีทางเศรษฐกิจจากหน่วยงานที่มีอำนาจรวมศูนย์
explanation: |
  Bitcoin บรรลุความต้านทานการเซ็นเซอร์ผ่านการกระจายศูนย์ของนักขุด โดยการจัดลำดับธุรกรรมจะดำเนินการร่วมกันโดยนักขุดทุกคนที่เลือกเข้าร่วม ซึ่งสร้างระบบที่มีความยืดหยุ่นที่ใครก็สามารถเข้าร่วมหรือออกจากกระบวนการ mining ได้อย่างอิสระ กำจัดจุดควบคุมเดียวที่อาจถูกกดดันให้เซ็นเซอร์ธุรกรรม คำตอบที่ผิดอธิบายถึงคุณสมบัติทางเทคนิค ฝ่ายที่เชื่อถือได้ หรือกลไกทางเศรษฐกิจที่ไม่แก้ไขปัญหาหลักของการควบคุมแบบกระจายศูนย์ในการประมวลผลธุรกรรม
reviewed: false
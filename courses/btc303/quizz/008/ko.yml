question: Bitcoin의 트랜잭션 처리 검열에 저항하는 이유는 무엇인가요?
answer: 트랜잭션 주문은 누구나 참여하거나 탈퇴할 수 있는 동적 채굴자 집합에 의해 집합적으로 수행됩니다
wrong_answers:
  - 거래 유효성 검사는 정부가 해독할 수 없는 고급 암호화 프로토콜을 사용하여 암호화됩니다
  - 거래 기록은 서로 다른 신뢰할 수 있는 조직에서 관리하는 여러 백업 서버에 저장됩니다
  - 중앙 집중식 기관의 경제적 공격을 방지하기 위해 거래 수수료가 자동으로 조정됩니다
explanation: |
  Bitcoin은 참여를 선택한 모든 채굴자가 공동으로 거래 주문을 수행하는 채굴자 탈중앙화를 통해 검열 저항성을 달성합니다. 이는 누구나 mining 프로세스에 자유롭게 참여하거나 탈퇴할 수 있는 역동적인 시스템을 만들어 거래를 검열하도록 압력을 가할 수 있는 단일 통제 지점을 제거합니다. 오답은 거래 처리에 대한 탈중앙화된 통제라는 핵심 문제를 다루지 않는 기술적 특징, 신뢰할 수 있는 당사자 또는 경제적 메커니즘을 설명하는 것입니다.

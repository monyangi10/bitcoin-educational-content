question: Bitcoin के लेन-देन प्रसंस्करण को सेंसरशिप-प्रतिरोधी क्या बनाता है?
answer: लेन-देन का क्रम सामूहिक रूप से खनिकों के एक गतिशील समूह द्वारा किया जाता है, जिसमें कोई भी शामिल हो सकता है या छोड़ सकता है
wrong_answers:
  - लेन-देन सत्यापन उन्नत क्रिप्टोग्राफ़िक प्रोटोकॉल का उपयोग करके एन्क्रिप्ट किया जाता है जिसे सरकारें तोड़ नहीं सकतीं
  - लेन-देन रिकॉर्ड विभिन्न विश्वसनीय संगठनों द्वारा नियंत्रित कई बैकअप सर्वरों पर संग्रहीत किए जाते हैं
  - केंद्रीकृत प्राधिकरणों से आर्थिक हमलों को रोकने के लिए लेनदेन शुल्क स्वचालित रूप से समायोजित किए जाते हैं
explanation: |
  Bitcoin, माइनर विकेंद्रीकरण के माध्यम से सेंसरशिप प्रतिरोध प्राप्त करता है, जहाँ लेन-देन का क्रम सभी माइनर्स द्वारा सामूहिक रूप से किया जाता है जो इसमें भाग लेना चाहते हैं। यह एक गतिशील प्रणाली बनाता है जहाँ कोई भी mining प्रक्रिया में स्वतंत्र रूप से शामिल हो सकता है या छोड़ सकता है, जिससे किसी भी एकल नियंत्रण बिंदु को समाप्त कर दिया जाता है जिस पर लेन-देन को सेंसर करने का दबाव हो सकता है। गलत उत्तर तकनीकी विशेषताओं, विश्वसनीय पक्षों, या आर्थिक तंत्रों का वर्णन करते हैं जो लेन-देन प्रसंस्करण पर विकेंद्रीकृत नियंत्रण के मूल मुद्दे को संबोधित नहीं करते हैं।

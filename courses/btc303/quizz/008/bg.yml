question: Какво прави обработката на транзакции в Bitcoin устойчива на цензура?
answer: Нареждането на транзакциите се извършва колективно от динамичен набор от миньори, към които всеки може да се присъедини или да напусне
wrong_answers:
  - Валидирането на транзакциите се криптира с помощта на усъвършенствани криптографски протоколи, които правителствата не могат да разбият
  - Записите на транзакциите се съхраняват на множество сървъри за архивиране, контролирани от различни доверени организации
  - Таксите за транзакции се коригират автоматично, за да се предотвратят икономически атаки от страна на централизирани органи
explanation: |
  Bitcoin постига устойчивост на цензура чрез децентрализация на миньорите, при която нареждането на транзакции се извършва колективно от всички миньори, които решат да участват. Това създава динамична система, в която всеки може да се присъедини или да напусне свободно процеса на копаене, като елиминира всяка единствена точка на контрол, която би могла да бъде принудена да цензурира трансакциите. Грешните отговори описват технически характеристики, доверени страни или икономически механизми, които не решават основния въпрос за децентрализирания контрол върху обработката на транзакциите.
reviewed: true

question: Bitcoinのトランザクション処理が検閲に強いのはなぜか？
answer: トランザクションの発注は、誰でも参加したり脱退したりできるマイナーの動的な集合によって集団的に行われる。
wrong_answers:
  - トランザクションの検証は、政府が解読できない高度な暗号化プロトコルを使用して暗号化されます。
  - 取引記録は、信頼できる異なる組織が管理する複数のバックアップ・サーバーに保存される。
  - 中央集権からの経済攻撃を防ぐため、取引手数料は自動的に調整される。
explanation: |
  Bitcoinはマイナーの分散化によって検閲への耐性を実現しており、取引の発注は参加を選択したすべてのマイナーによって一括して行われる。これにより、誰もが自由にminingプロセスに参加したり離脱したりできるダイナミックなシステムが構築され、トランザクションを検閲するよう圧力をかけられる可能性のある単一のコントロールポイントが排除される。間違った答えは、取引処理に対する分散制御という核心的な問題に対処していない技術的特徴、信頼される当事者、または経済的メカニズムについて述べている。
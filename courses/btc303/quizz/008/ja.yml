question: ビットコインのトランザクション処理が検閲に強いのはなぜか？
answer: トランザクションの順位付けは、誰でも参加したり脱退したりできるマイナーの動的な集合によって集団的に行われるため
wrong_answers:
  - トランザクションの検証は、政府が解読できない高度な暗号化プロトコルを使用して暗号化されるため
  - トランザクション記録は、信頼できる異なる組織が管理する複数のバックアップ・サーバーに保存されるため
  - 中央集権主体からの経済攻撃を防ぐため、トランザクション手数料は自動的に調整されるため
explanation: |
  ビットコインはマイナーの分散化によって検閲への耐性を実現しており、トランザクションの順位付けは参加を選択したすべてのマイナーによって一括して行われる。これにより、誰もが自由にマイニングプロセスに参加したり離脱したりできるダイナミックなシステムが構築され、トランザクションを検閲するよう圧力をかけられる可能性のある単一の管理主体が排除される。間違った答えは、トランザクション処理に対する分散制御という核心的な問題に対処していない技術的特徴、信頼される主体者、または経済的メカニズムについて述べている。

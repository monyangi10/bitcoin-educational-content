question: 是什麼讓 Bitcoin 的交易處理具有抗檢查能力？
answer: 交易排序由任何人都可以加入或退出的動態礦工集體執行
wrong_answers:
  - 交易驗證採用政府無法破解的先進加密通訊協定進行加密
  - 交易記錄儲存在由不同可信組織控制的多個備份伺服器上
  - 交易費用會自動調整，以防止中央機關的經濟攻擊
explanation: |
  Bitcoin 透過礦工去中心化來達成抵制審查的目的，交易排序由所有選擇參與的礦工集體進行。這創造了一個動態系統，任何人都可以自由加入或退出 mining 流程，消除了任何可能受到壓力而審查交易的單點控制。錯誤答案所描述的技術功能、可信賴的各方或經濟機制，並未解決交易處理分散控制的核心問題。
reviewed: false

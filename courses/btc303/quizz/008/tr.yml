question: Bitcoin'ın işlem sürecini sansüre karşı dirençli kılan nedir?
answer: İşlem sıralaması, herkesin katılabileceği veya ayrılabileceği dinamik bir madenci grubu tarafından kolektif olarak gerçekleştirilir
wrong_answers:
  - İşlem doğrulaması, hükümetlerin kıramayacağı gelişmiş kriptografik protokoller kullanılarak şifrelenir
  - İşlem kayıtları farklı güvenilir kuruluşlar tarafından kontrol edilen birden fazla yedekleme sunucusunda saklanır
  - İşlem ücretleri, merkezi otoritelerin ekonomik saldırılarını önlemek için otomatik olarak ayarlanır
explanation: |
  Bitcoin, işlem sıralamasının katılmayı seçen tüm madenciler tarafından kolektif olarak gerçekleştirildiği madenci ademi merkeziyetçiliği yoluyla sansüre karşı direnç sağlar. Bu, herkesin mining sürecine özgürce katılabileceği veya ayrılabileceği dinamik bir sistem yaratır ve işlemleri sansürlemek için baskı yapılabilecek herhangi bir tek kontrol noktasını ortadan kaldırır. Yanlış cevaplar teknik özellikleri, güvenilir tarafları ya da ekonomik mekanizmaları tanımlamakta olup işlemlerin merkezi olmayan bir şekilde kontrol edilmesine ilişkin temel sorunu ele almamaktadır.

question: What makes Bitcoin's transaction processing censorship-resistant?
answer: Transaction ordering is performed collectively by a dynamic set of miners that anyone can join or leave
wrong_answers:
  - Transaction validation is encrypted using advanced cryptographic protocols that governments cannot break
  - Transaction records are stored on multiple backup servers controlled by different trusted organizations
  - Transaction fees are automatically adjusted to prevent economic attacks from centralized authorities
explanation: |
  Bitcoin achieves censorship resistance through miner decentralization, where transaction ordering is carried out collectively by all miners who choose to participate. This creates a dynamic system where anyone can join or leave the mining process freely, eliminating any single point of control that could be pressured to censor transactions. The wrong answers describe technical features, trusted parties, or economic mechanisms that don't address the core issue of decentralized control over transaction processing.
reviewed: false

question: Bitcoin Core 的 GitHub 儲存庫與全球數以千計的其他相同儲存庫副本相比，被認為是特別的主要原因是什麼？
answer: 它是社會公認的 Bitcoin 發展焦點，而非因為任何技術優勢。
wrong_answers:
  - 它包含認證 Bitcoin Core 正式版本和更新的密碼金鑰
  - 它具有其他儲存庫副本無法複製的專屬技術功能和權限
  - 作為 Bitcoin 代碼的唯一權威來源，它受到 MIT 許可證的法律保護。
explanation: |
  正如 Jameson Lopp 所說，Bitcoin Core 的 GitHub 儲存庫在技術上與全球數以千計的其他副本完全相同，但已經成為社會公認的開發協調焦點。它沒有任何特殊的技術功能、加密認證機制或法律保護，使其更為優越。MIT 授權條款實際上確保任何人都可以自由複製和重新散佈程式碼。如果這個儲存庫消失了，社群只會在其他地方建立一個新的焦點，證明它的重要性純粹是社會慣例，而非技術上的必要性。
reviewed: false

question: เหตุผลหลักที่ทำให้ที่เก็บข้อมูล GitHub ของ Bitcoin Core ถือว่าเป็นพิเศษเมื่อเทียบกับสำเนาอื่นๆ นับพันของที่เก็บข้อมูลเดียวกันทั่วโลกคืออะไร?
answer: มันทำหน้าที่เป็นจุดศูนย์กลางที่ได้รับการยอมรับทางสังคมสำหรับการพัฒนา Bitcoin ไม่ใช่เนื่องจากความเหนือกว่าทางเทคนิคใด ๆ
wrong_answers:
  - มันมีคีย์การเข้ารหัสที่รับรองความถูกต้องของการเผยแพร่และอัปเดต Bitcoin Core อย่างเป็นทางการ
  - มีคุณสมบัติทางเทคนิคและสิทธิ์พิเศษที่สำเนาคลังข้อมูลอื่นไม่สามารถทำซ้ำได้
  - ได้รับการคุ้มครองตามกฎหมายโดยใบอนุญาต MIT ในฐานะแหล่งข้อมูลที่มีอำนาจเพียงหนึ่งเดียวของรหัส Bitcoin
explanation: |
  ตามที่ Jameson Lopp อธิบายไว้ ที่เก็บ GitHub ของ Bitcoin Core นั้นมีความเหมือนทางเทคนิคกับสำเนาอื่น ๆ นับพันทั่วโลก แต่ได้กลายเป็นจุดศูนย์กลางที่ได้รับการยอมรับทางสังคมสำหรับการประสานงานการพัฒนา มันไม่มีคุณสมบัติทางเทคนิคพิเศษ กลไกการรับรองความถูกต้องด้วยการเข้ารหัส หรือการคุ้มครองทางกฎหมายที่ทำให้มันเหนือกว่า ใบอนุญาต MIT จริง ๆ แล้วทำให้มั่นใจได้ว่าทุกคนสามารถคัดลอกและแจกจ่ายโค้ดได้อย่างอิสระ หากที่เก็บนี้หายไป ชุมชนก็จะสร้างจุดศูนย์กลางใหม่ที่อื่น ซึ่งแสดงให้เห็นว่าความสำคัญของมันเป็นเพียงการยอมรับทางสังคมมากกว่าความจำเป็นทางเทคนิค
reviewed: false
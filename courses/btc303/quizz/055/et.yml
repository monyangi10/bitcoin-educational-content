question: Mis on peamine põhjus, miks Bitcoin Core'i GitHubi repositooriumi peetakse eriliseks võrreldes tuhandete teiste sama repositooriumi koopiatega kogu maailmas?
answer: See on ühiskondlikult tunnustatud Bitcoin arengu keskpunkt, mitte tehnilise paremuse tõttu
wrong_answers:
  - See sisaldab krüptograafilisi võtmeid, mis tõendavad Bitcoin Core'i ametlike versioonide ja uuenduste autentsust
  - Sellel on eksklusiivsed tehnilised funktsioonid ja õigused, mida teised repositooriumi koopiad ei saa korrata
  - See on õiguslikult kaitstud MIT litsentsiga kui Bitcoin koodi ainus autoriteetne allikas
explanation: |
  Nagu Jameson Lopp selgitab, on Bitcoin Core'i GitHubi repositoorium tehniliselt identne tuhandete teiste koopiatega kogu maailmas, kuid sellest on saanud sotsiaalselt aktsepteeritud keskpunkt arenduse koordineerimiseks. Sellel ei ole erilisi tehnilisi omadusi, krüptograafilisi autentimismehhanisme ega õiguslikke kaitsemeetmeid, mis muudaksid selle paremaks. MIT-litsents tagab tegelikult, et igaüks võib koodi vabalt kopeerida ja levitada. Kui see repositoorium kaoks, looks kogukond lihtsalt uue keskuse mujal, mis näitab, et selle tähtsus on puhtalt sotsiaalne konventsioon, mitte tehniline vajadus.
reviewed: false

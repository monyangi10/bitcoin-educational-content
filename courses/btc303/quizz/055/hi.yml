question: वह मुख्य कारण क्या है कि Bitcoin Core की GitHub रिपॉजिटरी को विश्व भर में मौजूद उसी रिपॉजिटरी की हजारों अन्य प्रतियों की तुलना में विशेष माना जाता है?
answer: यह किसी तकनीकी श्रेष्ठता के कारण नहीं, बल्कि Bitcoin विकास के लिए सामाजिक रूप से मान्यता प्राप्त केंद्र बिंदु के रूप में कार्य करता है
wrong_answers:
  - इसमें क्रिप्टोग्राफ़िक कुंजियाँ हैं जो आधिकारिक Bitcoin कोर रिलीज़ और अपडेट को प्रमाणित करती हैं
  - इसमें विशिष्ट तकनीकी विशेषताएं और अनुमतियाँ हैं जिन्हें अन्य रिपॉजिटरी प्रतियाँ दोहरा नहीं सकतीं
  - यह Bitcoin कोड के एकमात्र आधिकारिक स्रोत के रूप में MIT लाइसेंस द्वारा कानूनी रूप से संरक्षित है
explanation: |
  जैसा कि जेम्सन लोप बताते हैं, Bitcoin Core का GitHub रिपॉजिटरी तकनीकी रूप से दुनिया भर में मौजूद हज़ारों अन्य रिपॉजिटरी के समान है, लेकिन यह विकास समन्वय के लिए सामाजिक रूप से स्वीकृत केंद्र बिंदु बन गया है। इसमें कोई विशेष तकनीकी विशेषताएँ, क्रिप्टोग्राफ़िक प्रमाणीकरण तंत्र या कानूनी सुरक्षा नहीं है जो इसे श्रेष्ठ बनाती हो। MIT लाइसेंस वास्तव में यह सुनिश्चित करता है कि कोई भी कोड को स्वतंत्र रूप से कॉपी और पुनर्वितरित कर सकता है। यदि यह रिपॉजिटरी गायब हो जाती है, तो समुदाय कहीं और एक नया केंद्र बिंदु स्थापित कर देगा, जिससे यह प्रदर्शित होगा कि इसका महत्व तकनीकी आवश्यकता से ज़्यादा विशुद्ध रूप से सामाजिक परंपरा है।
reviewed: false

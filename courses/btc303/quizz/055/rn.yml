question: Ni igiki nyamukuru gituma ububiko bwa Bitcoin Core bwa GitHub bubonwa ko ari ubudasanzwe ugereranyije n’izindi kopi ibihumbi n’ibihumbi z’ububiko bumwe kw’isi yose?
answer: Ikora nk’ikibanza cemewe mu kibano c’iterambere rya Bitcoin, atari kubera ubusumbasumbane ubwo ari bwo bwose mu vy’ubuhinga .
wrong_answers:
  - Irimwo imfunguruzo z'ububiko zishingira intahe ibisohotse n'ivyavuguruwe vya Bitcoin Core yemewe .
  - Ifise ibiranga ubuhinga n'uburenganzira bwihariye izindi kopi z'ububiko zidashobora kwisubiriza .
  - Irindwa n'amategeko n'uruhusha rwa MIT nk'inkomoko yonyene y'uburenganzira ya kode ya Bitcoin .
explanation: |
  Nk’uko Jameson Lopp abisigura, ububiko bwa Bitcoin Core bwa GitHub burasa mu buryo bw’ubuhinga n’izindi kopi ibihumbi n’ibihumbi kw’isi yose, ariko bwacitse ikibanza cemewe n’abantu co guhuza iterambere. Nta bintu bidasanzwe vy’ubuhinga bifise, uburyo bwo kwemeza ko umuntu ari we, canke uburinzi bushingiye ku mategeko bituma iruta izindi. Uruhusha rwa MIT mu vy’ukuri ruratuma umuntu wese ashobora gukopa no gusubira gutanga kode ataco yishisha. Iyo ubwo bubiko buzimangana, umuryango woshinga gusa ikibanza gishasha co gushimikirako ahandi, kigaragaza ko akamaro kayo ari uguhuza abantu gusa aho kuba ivy’ubuhinga.
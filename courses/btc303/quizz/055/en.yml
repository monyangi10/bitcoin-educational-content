question: What is the primary reason why Bitcoin Core's GitHub repository is considered special compared to the thousands of other copies of the same repository worldwide?
answer: It serves as a socially recognized focal point for Bitcoin development, not due to any technical superiority
wrong_answers:
  - It contains cryptographic keys that authenticate official Bitcoin Core releases and updates
  - It has exclusive technical features and permissions that other repository copies cannot replicate
  - It is legally protected by the MIT License as the sole authoritative source of Bitcoin code
explanation: |
  As Jameson Lopp explains, Bitcoin Core's GitHub repository is technically identical to thousands of other copies worldwide, but has become the socially accepted focal point for development coordination. It has no special technical features, cryptographic authentication mechanisms, or legal protections that make it superior. The MIT License actually ensures anyone can copy and redistribute the code freely. If this repository disappeared, the community would simply establish a new focal point elsewhere, demonstrating that its importance is purely social convention rather than technical necessity.

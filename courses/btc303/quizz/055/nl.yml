question: Wat is de belangrijkste reden waarom de GitHub repository van Bitcoin Core als speciaal wordt beschouwd in vergelijking met de duizenden andere kopieën van dezelfde repository wereldwijd?
answer: Het dient als een sociaal erkend brandpunt voor Bitcoin ontwikkeling, niet vanwege enige technische superioriteit
wrong_answers:
  - Het bevat cryptografische sleutels die officiële Bitcoin Core releases en updates verifiëren
  - Het heeft exclusieve technische functies en rechten die andere archiefkopieën niet kunnen repliceren
  - Het is wettelijk beschermd door de MIT Licentie als de enige gezaghebbende bron van Bitcoin code
explanation: |
  Zoals Jameson Lopp uitlegt, is Bitcoin Core's GitHub repository technisch identiek aan duizenden andere kopieën wereldwijd, maar is het sociaal geaccepteerde middelpunt geworden voor ontwikkelingscoördinatie. Het heeft geen speciale technische eigenschappen, cryptografische authenticatiemechanismen of wettelijke beschermingen die het superieur maken. De MIT Licentie zorgt er eigenlijk voor dat iedereen de code vrij kan kopiëren en herdistribueren. Als dit archief zou verdwijnen, zou de gemeenschap gewoon ergens anders een nieuw centrum oprichten, wat aantoont dat het belang ervan eerder een sociale conventie is dan een technische noodzaak.
reviewed: false

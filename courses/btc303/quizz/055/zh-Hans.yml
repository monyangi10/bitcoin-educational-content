question: Bitcoin Core 的 GitHub 代码库与全球数以千计的其他相同代码库相比显得与众不同的主要原因是什么？
answer: 它是社会公认的 Bitcoin 开发协调中心，而不是因为它有任何技术优势
wrong_answers:
  - 它包含验证 Bitcoin Core 正式发布和更新的加密密钥
  - 它具有其他版本库副本无法复制的独有技术功能和权限
  - 作为比特币代码的唯一权威来源，它受 MIT 许可的法律保护
explanation: |
  正如 Jameson Lopp 所解释的，Bitcoin Core 的 GitHub 存储库在技术上与全球成千上万个其他副本完全相同，但已成为社会公认的开发协调焦点。它没有任何特殊的技术功能、加密认证机制或法律保护措施使其更胜一筹。MIT 许可实际上确保了任何人都可以自由复制和重新发布代码。如果这个资源库消失了，社区只会在其他地方建立一个新的协调中心，这表明它的重要性纯粹是社会习俗而非技术需要。

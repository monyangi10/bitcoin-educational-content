question: BitcoinコアのGitHubリポジトリが、世界中に何千とある同じリポジトリのコピーと比べて特別だと考えられている主な理由は何ですか？
answer: 技術的な優位性によるものではなく、社会的に認められたBitcoin開発の中心地として機能している。
wrong_answers:
  - Bitcoin Coreの公式リリースとアップデートを認証する暗号鍵が含まれています。
  - 他のリポジトリコピーでは複製できない、独自の技術的な機能と権限があります。
  - Bitcoinコードの唯一の権威あるソースとして、MITライセンスによって法的に保護されています。
explanation: |
  ジェイムソン・ロップが説明するように、BitcoinコアのGitHubリポジトリは、技術的には世界中の他の何千ものコピーと同じだが、開発調整のための社会的に認められた中心的な場所になっている。BitcoinコアのGitHubリポジトリには、特別な技術的機能、暗号認証メカニズム、法的保護など、Bitcoinコアの優位性を示すものは何もない。実際にMITライセンスは、誰もが自由にコードをコピーし、再配布できることを保証している。もしこのリポジトリがなくなれば、コミュニティは別の場所に新たな中心点を設けるだけで、その重要性が技術的な必要性ではなく、純粋に社会的な慣習であることを示すだろう。
reviewed: false

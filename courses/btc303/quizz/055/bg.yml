question: Коя е основната причина, поради която хранилището на Bitcoin Core в GitHub се смята за специално в сравнение с хилядите други копия на същото хранилище по света?
answer: Той служи като социално признат център за развитие на Bitcoin, а не поради техническо превъзходство
wrong_answers:
  - То съдържа криптографски ключове, които удостоверяват официалните версии и актуализации на ядрото на Bitcoin
  - То има изключителни технически характеристики и разрешения, които другите копия на хранилището не могат да възпроизведат
  - То е правно защитен от лиценза MIT като единствен авторитетен източник на кода на Bitcoin
explanation: |
  Както обяснява Джеймсън Лоп, хранилището на Bitcoin Core в GitHub е технически идентично с хиляди други копия по света, но се е превърнало в социално приета координационна точка за разработване. То не притежава специални технически характеристики, криптографски механизми за удостоверяване или правна защита, които да го правят по-добро. Лицензът MIT всъщност гарантира, че всеки може да копира и разпространява кода свободно. Ако това хранилище изчезне, общността просто ще създаде нова фокусна точка на друго място, което показва, че значението му е по-скоро социална конвенция, отколкото техническа необходимост.
reviewed: true

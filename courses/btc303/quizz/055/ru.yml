question: По какой причине репозиторий Bitcoin Core на GitHub считается особенным по сравнению с тысячами других копий того же репозитория по всему миру?
answer: Он служит социально признанным центром развития Bitcoin, а не благодаря какому-либо техническому превосходству
wrong_answers:
  - Он содержит криптографические ключи, удостоверяющие подлинность официальных релизов и обновлений Bitcoin Core
  - Он обладает эксклюзивными техническими возможностями и разрешениями, которые не могут быть воспроизведены другими копиями репозитория
  - Он юридически защищен лицензией MIT как единственный авторитетный источник кода Bitcoin
explanation: |
  Как объясняет Джеймсон Лопп, репозиторий Bitcoin Core на GitHub технически идентичен тысячам других копий по всему миру, но стал общепринятым центром координации разработки. У него нет никаких особых технических возможностей, криптографических механизмов аутентификации или юридических защит, которые бы делали его лучше. Лицензия MIT фактически гарантирует, что любой может свободно копировать и распространять код. Если бы этот репозиторий исчез, сообщество просто создало бы новый координационный центр в другом месте, продемонстрировав, что его важность - это чисто социальная условность, а не техническая необходимость.
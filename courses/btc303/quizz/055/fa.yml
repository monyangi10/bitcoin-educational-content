question: دلیل اصلی اینکه چرا مخزن GitHub هسته Bitcoin در مقایسه با هزاران نسخه دیگر از همان مخزن در سراسر جهان خاص تلقی می‌شود چیست؟
answer: این به عنوان یک نقطه کانونی اجتماعی شناخته شده برای توسعه Bitcoin عمل می‌کند، نه به دلیل برتری فنی.
wrong_answers:
  - حاوی کلیدهای رمزنگاری است که انتشارها و به‌روزرسانی‌های رسمی Bitcoin Core را تأیید می‌کنند.
  - دارای ویژگی‌ها و مجوزهای فنی انحصاری است که نسخه‌های دیگر مخزن نمی‌توانند تکرار کنند.
  - این به صورت قانونی توسط مجوز MIT به عنوان تنها منبع معتبر کد Bitcoin محافظت می‌شود.
explanation: |
  همان‌طور که جیمسون لوپ توضیح می‌دهد، مخزن GitHub هسته Bitcoin از نظر فنی با هزاران نسخه دیگر در سراسر جهان یکسان است، اما به عنوان نقطه کانونی پذیرفته شده اجتماعی برای هماهنگی توسعه تبدیل شده است. این مخزن هیچ ویژگی فنی خاص، مکانیزم‌های احراز هویت رمزنگاری یا حفاظت‌های قانونی که آن را برتر کند، ندارد. مجوز MIT در واقع تضمین می‌کند که هر کسی می‌تواند کد را آزادانه کپی و توزیع کند. اگر این مخزن ناپدید شود، جامعه به سادگی یک نقطه کانونی جدید در جای دیگری ایجاد می‌کند و نشان می‌دهد که اهمیت آن صرفاً یک قرارداد اجتماعی است و نه یک ضرورت فنی.
reviewed: false

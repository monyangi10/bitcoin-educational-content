question: 전 세계 수천 개의 다른 동일한 리포지토리 사본과 비교하여 Bitcoin Core의 GitHub 리포지토리가 특별하다고 여겨지는 주된 이유는 무엇인가요?
answer: 기술적 우월성 때문이 아니라 사회적으로 인정받는 Bitcoin 개발의 구심점 역할을 합니다
wrong_answers:
  - 여기에는 공식 Bitcoin Core 릴리스 및 업데이트를 인증하는 암호화 키가 포함되어 있습니다
  - 다른 리포지토리 사본이 복제할 수 없는 독점적인 기술 기능과 권한이 있습니다
  - Bitcoin 코드의 유일한 권위 있는 소스인 MIT 라이선스에 의해 법적으로 보호됩니다
explanation: |
  제임슨 롭의 설명에 따르면 Bitcoin Core의 GitHub 저장소는 기술적으로는 전 세계 수천 개의 다른 저장소와 동일하지만 사회적으로 인정받는 개발 조율의 중심점이 되었습니다. 특별한 기술적 특징이나 암호화 인증 메커니즘, 법적 보호 장치가 없기 때문에 더 우수합니다. MIT 라이선스는 실제로 누구나 자유롭게 코드를 복사하고 재배포할 수 있도록 보장합니다. 만약 이 저장소가 사라진다면 커뮤니티는 다른 곳에 새로운 구심점을 마련할 것이며, 이는 기술적 필요성보다는 순전히 사회적 관습이 중요하다는 것을 증명하는 것입니다.
question: Minkä tietyn teknisen ominaisuuden Satoshi:n kova fork loi vahingossa, joka mahdollisti tulevat pehmeät fork-päivitykset?
answer: Skriptioperaattorit OP_NOP1 - OP_NOP10 opkoodit
wrong_answers:
  - BIP65:n ja BIP113:n aktivointimekanismit kaivostyöntekijöiden signaloinnissa
  - Konsensusmuutosten yhteensopivuus eteenpäin ja taaksepäin
  - Käyttäjän aktivoima pehmeä fork (UASF) lippupäivän aktivointijärjestelmä
explanation: |
  Eric Lombrozon analyysin mukaan Satoshi:n kova fork (josta tiedotettiin huonosti ja joka piilotettiin makefile-muutoksia koskevaan toimitukseen) loi vahingossa OP_NOP1-OP_NOP10-opcodit. Nämä "no operation" -koodit oli suunniteltu siten, että ne eivät tee mitään, kun ne suoritetaan, mutta ne tarjosivat paikanvarauskoodeja, joita voitiin myöhemmin käyttää uudelleen uusiin toimintoihin pehmeiden haarojen avulla. Tämä osoittautui ennakoivaksi, sillä OP_NOP2:sta tuli OP_CHECKLOCKTIMEVERIFY (BIP65) ja OP_NOP3:sta OP_CHECKSEQUENCEVERIFY (BIP112). Muut vaihtoehdot ovat virheellisiä, koska BIP65 ja BIP113 olivat päivityksiä, joissa käytettiin näitä opkoodeja eikä luotu niitä, yhteensopivuuspuitteet ovat pikemminkin käsitteellinen lähestymistapa kuin tekninen ominaisuus, ja UASF ehdotettiin paljon myöhemmin Segwit-kiistan aikana.
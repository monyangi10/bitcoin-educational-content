question: Satoshiのハードforkが、将来のソフトforkのアップグレードを可能にするために、うっかり作ってしまった具体的な技術的機能とは？
answer: スクリプト演算子 OP_NOP1～OP_NOP10 オペコード
wrong_answers:
  - マイナーのシグナル伝達におけるBIP65とBIP113の活性化メカニズム
  - コンセンサス変更の前方互換性と後方互換性の枠組み
  - ユーザー起動型ソフトfork（UASF）旗日起動システム
explanation: |
  Eric Lombrozoの分析によると、Satoshiのハードfork（これはmakefileの変更に関するコミットでうまく伝えられず隠されていた）は、OP_NOP1からOP_NOP10までのオペコードを不注意に作成した。これらの「操作なし」コードは、実行されても何もしないように設計されていたが、後にソフトフォークによって新しい機能に再利用できるプレースホルダーを提供するものだった。OP_NOP2がOP_CHECKLOCKTIMEVERIFY（BIP65）に、OP_NOP3がOP_CHECKSEQUENCEVERIFY（BIP112）になったように、これは先見の明があった。BIP65とBIP113は、これらのオペコードを作成するのではなく、使用するアップグレードであり、互換性フレームワークは技術的な機能ではなく概念的なアプローチであり、UASFはSegwit論争の中でかなり後に提案されたものであるため、他の選択肢は正しくありません。
question: 中本聪的硬分叉无意中创造了什么具体的技术特征，使得日后能够进行软分叉升级？
answer: 脚本运算符 OP_NOP1 至 OP_NOP10 操作码
wrong_answers:
  - 矿工信号的 BIP65 和 BIP113 激活机制
  - 共识变更的前向和后向兼容性框架
  - 用户激活软分叉 (UASF) 截止日期激活系统
explanation: |
  根据 Eric Lombrozo 的分析，中本聪的硬分叉（沟通不畅，隐藏在关于 makefile 更改的提交中）无意中创建了 OP_NOP1 到 OP_NOP10 操作码。这些 "无操作" 代码的设计目的是在执行时不做任何操作，但它们提供了占位符，日后可以通过软分叉重新利用这些占位符来引进新功能。事实证明这是有先见之明的，因为 OP_NOP2 变成了 OP_CHECKLOCKTIMEVERIFY（BIP65），OP_NOP3 变成了 OP_CHECKSEQUENCEVERIFY（BIP112）。该题的其他选项是不正确的，因为 BIP65 和 BIP113 是使用这些操作码而不是创建这些操作码的升级版本，兼容性框架是一种概念方法而不是技术特性，而且 UASF 是在 Segwit 争议期间提出的，时间要晚得多。

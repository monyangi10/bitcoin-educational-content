question: Каква специфична техническа характеристика е създадена по невнимание от твърдия fork на Satoshi, която е позволила бъдещи подобрения на мекия fork?
answer: Операторите на скрипта OP_NOP1 до OP_NOP10 опкодове
wrong_answers:
  - Механизмите за активиране на BIP65 и BIP113 за сигнализиране на минералите
  - Рамка за предварителна и обратна съвместимост за промени в консенсуса
  - Активираната от потребителя система за активиране на ден на флага fork (UASF)
explanation: |
  Според анализа на Ерик Ломброзо, твърдата Satoshi fork (която е била зле комуникирана и скрита в коммит за промени в makefile) по невнимание е създала опкодовете OP_NOP1 до OP_NOP10. Тези кодове "без операция" са били предназначени да не правят нищо, когато се изпълняват, но са осигурявали заместители, които по-късно са можели да бъдат използвани за нова функционалност чрез меки разклонения. Това се оказа прозорливо, тъй като OP_NOP2 се превърна в OP_CHECKLOCKTIMEVERIFY (BIP65), а OP_NOP3 - в OP_CHECKSEQUENCEVERIFY (BIP112). Другите варианти са неправилни, тъй като BIP65 и BIP113 бяха надстройките, които използваха тези опкодове, а не ги създадоха, рамката за съвместимост е концептуален подход, а не техническа характеристика, а UASF беше предложена много по-късно по време на спора за Segwit.
reviewed: false

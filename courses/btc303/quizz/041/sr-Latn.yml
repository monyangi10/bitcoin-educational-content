question: Koju je konkretnu tehničku karakteristiku Satošijev hard fork nenamerno stvorio, a koja je omogućila buduće soft fork nadogradnje?
answer: Script operatori OP_NOP1 do OP_NOP10 (op-kodovi)
wrong_answers:
  - Mehanizmi aktivacije BIP65 i BIP113 za signalizaciju rudara
  - Mehanizam za kompatibilnost unapred i unazad za promene u konsenzusu
  - Sistem aktivacije soft fork-a koji pokreću korisnici (UASF) na unapred određen dan – tzv. flag day
explanation: |
  Prema analizi Erica Lombroza, Satošijev hard fork (koji je bio loše komuniciran i skriven u izmeni vezanoj za promene makefile-a) nenamerno je stvorio 
  OP_NOP1 do OP_NOP10 opkodove. Ovi 'no operation' kodovi su dizajnirani da ne rade ništa kada se izvrše, ali su obezbedili mesta koja bi kasnije mogla 
  biti preusmerena za novu funkcionalnost kroz soft forkove. Ovo se pokazalo kao pronicljivo, jer je OP_NOP2 postao OP_CHECKLOCKTIMEVERIFY (BIP65) a 
  OP_NOP3 postao OP_CHECKSEQUENCEVERIFY (BIP112). Ostale opcije su netačne jer su BIP65 i BIP113 bili nadogradnje koje su koristile ove opkodove umesto 
  da ih kreiraju, mehanizam za kompatibilnost je konceptualni pristup, a ne tehnička karakteristika, a UASF je predložen mnogo kasnije tokom kontroverze oko Segwita.
reviewed: true

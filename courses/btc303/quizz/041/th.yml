question: คุณลักษณะทางเทคนิคเฉพาะที่ Satoshi สร้างขึ้นโดยไม่ได้ตั้งใจซึ่งทำให้สามารถอัปเกรด fork แบบซอฟต์ในอนาคตได้คืออะไร?
answer: ตัวดำเนินการสคริปต์ OP_NOP1 ถึง OP_NOP10 opcodes
wrong_answers:
  - กลไกการเปิดใช้งาน BIP65 และ BIP113 สำหรับการส่งสัญญาณของนักขุด
  - กรอบความเข้ากันได้ไปข้างหน้าและถอยหลังสำหรับการเปลี่ยนแปลงฉันทามติ
  - ผู้ใช้เปิดใช้งานระบบเปิดใช้งานธงวัน fork (UASF) แบบนุ่มนวล
explanation: |
  ตามการวิเคราะห์ของ Eric Lombrozo, Satoshi's hard fork (ซึ่งถูกสื่อสารอย่างไม่ดีและถูกซ่อนใน commit เกี่ยวกับการเปลี่ยนแปลง makefile) ได้สร้าง OP_NOP1 ถึง OP_NOP10 opcodes โดยไม่ได้ตั้งใจ โค้ด 'no operation' เหล่านี้ถูกออกแบบมาให้ไม่ทำอะไรเมื่อถูกดำเนินการ แต่พวกมันให้ที่ว่างที่สามารถนำไปใช้ใหม่สำหรับฟังก์ชันใหม่ผ่าน soft forks ในภายหลัง สิ่งนี้พิสูจน์ให้เห็นถึงความเฉลียวฉลาด เนื่องจาก OP_NOP2 กลายเป็น OP_CHECKLOCKTIMEVERIFY (BIP65) และ OP_NOP3 กลายเป็น OP_CHECKSEQUENCEVERIFY (BIP112) ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ BIP65 และ BIP113 เป็นการอัปเกรดที่ใช้ opcodes เหล่านี้แทนที่จะสร้างมันขึ้นมา กรอบความเข้ากันได้เป็นแนวคิดเชิงแนวทางมากกว่าคุณสมบัติทางเทคนิค และ UASF ถูกเสนอในภายหลังมากในช่วงความขัดแย้งของ Segwit
reviewed: false
question: Satoshi के हार्ड fork ने अनजाने में कौन सी विशिष्ट तकनीकी विशेषता उत्पन्न कर दी, जिससे भविष्य में सॉफ्ट fork अपग्रेड संभव हो सका?
answer: स्क्रिप्ट ऑपरेटर OP_NOP1 से OP_NOP10 ऑपकोड
wrong_answers:
  - माइनर सिग्नलिंग के लिए BIP65 और BIP113 सक्रियण तंत्र
  - आम सहमति परिवर्तनों के लिए अग्रगामी और पश्चगामी संगतता ढांचा
  - उपयोगकर्ता द्वारा सक्रिय सॉफ्ट fork (UASF) ध्वज दिवस सक्रियण प्रणाली
explanation: |
  एरिक लोम्ब्रोज़ो के विश्लेषण के अनुसार, Satoshi के हार्ड fork (जिसकी सूचना ठीक से नहीं दी गई थी और जो मेकफ़ाइल परिवर्तनों के बारे में एक कमिट में छिपा हुआ था) ने अनजाने में OP_NOP1 से OP_NOP10 ऑपकोड बना दिए। ये 'नो ऑपरेशन' कोड निष्पादित होने पर कुछ भी न करने के लिए डिज़ाइन किए गए थे, लेकिन ये ऐसे प्लेसहोल्डर प्रदान करते थे जिन्हें बाद में सॉफ्ट फ़ोर्क्स के माध्यम से नई कार्यक्षमता के लिए पुन: उपयोग किया जा सकता था। यह दूरदर्शी साबित हुआ, क्योंकि OP_NOP2 OP_CHECKLOCKTIMEVERIFY (BIP65) बन गया और OP_NOP3 OP_CHECKSEQUENCEVERIFY (BIP112) बन गया। अन्य विकल्प गलत हैं क्योंकि BIP65 और BIP113 ऐसे अपग्रेड थे जिन्होंने इन ऑपकोड को बनाने के बजाय उनका उपयोग किया, संगतता ढाँचा एक तकनीकी विशेषता के बजाय एक वैचारिक दृष्टिकोण है, और UASF का प्रस्ताव सेगविट विवाद के दौरान बहुत बाद में दिया गया था।
question: Satoshi의 하드 fork이 실수로 만들어낸 특정 기술 기능으로 인해 향후 소프트 fork 업그레이드가 가능했던 것은 무엇인가요?
answer: 스크립트 연산자 OP_NOP1 ~ OP_NOP10 옵코드
wrong_answers:
  - 채굴자 신호 전달을 위한 BIP65 및 BIP113 활성화 메커니즘
  - 합의 변경을 위한 포워드 및 백워드 호환성 프레임워크
  - 사용자가 활성화한 소프트 fork(UASF) 깃발의 날 활성화 시스템
explanation: |
  에릭 롬브로조의 분석에 따르면, Satoshi의 하드 fork(메이크파일 변경에 대한 커밋에 제대로 전달되지 않고 숨겨져 있던)은 실수로 OP_NOP1에서 OP_NOP10까지의 옵코드를 생성했습니다. 이 '동작 없음' 코드는 실행 시 아무 일도 하지 않도록 설계되었지만, 나중에 소프트 포크를 통해 새로운 기능으로 용도를 변경할 수 있는 자리 표시자를 제공했습니다. OP_NOP2가 OP_CHECKLOCKTIMEVERIFY(BIP65)로, OP_NOP3가 OP_CHECKSEQUENCEVERIFY(BIP112)로 바뀌면서 이는 선견지명이었음이 증명되었습니다. 다른 옵션은 BIP65와 BIP113이 이러한 옵코드를 만든 것이 아니라 이를 사용한 업그레이드였고, 호환성 프레임워크는 기술적 기능이 아닌 개념적 접근 방식이며, UASF는 세그윗 논쟁 중에 훨씬 나중에 제안되었기 때문에 잘못된 것입니다.
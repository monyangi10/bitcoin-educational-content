question: ویژگی فنی خاصی که Satoshi به طور ناخواسته در fork سخت ایجاد کرد که ارتقاءهای آینده fork نرم را ممکن ساخت، چه بود؟
answer: اپ‌کدهای Script operators OP_NOP1 تا OP_NOP10
wrong_answers:
  - مکانیسم‌های فعال‌سازی BIP65 و BIP113 برای سیگنال‌دهی ماینر
  - چارچوب سازگاری رو به جلو و عقب برای تغییرات اجماع
  - کاربر سیستم فعال‌سازی روز پرچم نرم fork (UASF) را فعال کرد
explanation: |
  بر اساس تحلیل اریک لومبروزو، Satoshi's hard fork (که به‌طور ضعیفی ارتباط برقرار شد و در یک commit درباره تغییرات makefile پنهان شد) به‌طور ناخواسته کدهای OP_NOP1 تا OP_NOP10 را ایجاد کرد. این کدهای 'بدون عملیات' طراحی شده بودند تا هنگام اجرا هیچ کاری انجام ندهند، اما به عنوان جایگزین‌هایی عمل کردند که می‌توانستند بعداً از طریق soft forks برای عملکرد جدید استفاده شوند. این امر پیش‌بینی‌گرانه بود، زیرا OP_NOP2 به OP_CHECKLOCKTIMEVERIFY (BIP65) و OP_NOP3 به OP_CHECKSEQUENCEVERIFY (BIP112) تبدیل شد. گزینه‌های دیگر نادرست هستند زیرا BIP65 و BIP113 ارتقاءهایی بودند که از این کدها استفاده کردند و نه اینکه آنها را ایجاد کنند، چارچوب سازگاری یک رویکرد مفهومی است و نه یک ویژگی فنی، و UASF خیلی بعدتر در جریان جنجال Segwit پیشنهاد شد.
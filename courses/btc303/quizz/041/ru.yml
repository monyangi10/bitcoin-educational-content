question: Какую специфическую техническую особенность непреднамеренно создал жесткий fork в Satoshi, которая позволила в будущем обновить мягкий fork?
answer: Операторы сценария OP_NOP1 - OP_NOP10 опкоды
wrong_answers:
  - Механизмы активации BIP65 и BIP113 для сигнализации минеров
  - Система прямой и обратной совместимости для консенсусных изменений
  - Активируемая пользователем система дневной активации флага Soft fork (UASF)
explanation: |
  Согласно анализу Эрика Ломброзо, жесткий Satoshi в fork (который был плохо проинформирован и скрыт в коммите об изменениях makefile) непреднамеренно создал опкоды OP_NOP1 - OP_NOP10. Эти коды "без операции" были предназначены для того, чтобы ничего не делать при выполнении, но они обеспечивали место, которое впоследствии могло быть использовано для новой функциональности через soft forks. Это оказалось верным, так как OP_NOP2 стал OP_CHECKLOCKTIMEVERIFY (BIP65), а OP_NOP3 - OP_CHECKSEQUENCEVERIFY (BIP112). Другие варианты неверны, поскольку BIP65 и BIP113 были обновлениями, которые использовали эти опкоды, а не создавали их, рамки совместимости - это концептуальный подход, а не техническая особенность, а UASF был предложен гораздо позже, во время споров о Segwit.
reviewed: false

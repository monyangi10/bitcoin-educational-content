question: Според изчисленията на Питер Вуиле какво е максималното теоретично количество Bitcoin, което някога ще съществува, след като всички монети бъдат добити?
answer: 20,999,999.9769 BTC
wrong_answers:
  - 21,000,000.0000 BTC точно
  - 20,999,817.3131 BTC
  - 20,500,000.0000 BTC приблизително
explanation: |
  Питер Вуиле изчисли, че теоретичният максимум на предлагането е 20 999 999,9769 BTC, което е малко по-малко от често цитираните 21 милиона. Това се дължи на специфичния график за намаляване наполовина и закръгляне в кода на Bitcoin. Цифрата 21 милиона е закръгление. Цифрата 20 999 817,3131 представлява действителното предлагане в обращение след отчитане на загубените монети и грешките на миньорите до определен блок, а не теоретичния максимум.
reviewed: true

question: 根据 Pieter Wuille 的计算，当所有硬币都挖完后，Bitcoin 的最大理论数量是多少？
answer: 20,999,999.9769 比特币
wrong_answers:
  - 21,000,000.0000 BTC 整数
  - 20,999,817.3131 比特币
  - 约 20,500,000.0000 BTC
explanation: |
  根据 Pieter Wuille 的计算，理论最大供应量为 20,999,999.9769 BTC，略低于通常所说的 2,100 万。这是由于 Bitcoin 代码中特定的减半时间表和四舍五入造成的。2,100 万只是四舍五入后的近似值。20,999,817.3131这个数字代表的是在考虑了丢失的硬币和mining在特定区块前的错误后的实际流通量，而不是理论上的最大值。
reviewed: false

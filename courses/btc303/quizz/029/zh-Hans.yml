question: 根据 Pieter Wuille 的计算，当所有比特币都挖完后，比特币的最大理论数量是多少？
answer: 20,999,999.9769
wrong_answers:
  - 21,000,000.0000
  - 20,999,817.3131
  - 约 20,500,000.0000
explanation: |
  根据 Pieter Wuille 的计算，理论最大供应量为 20,999,999.9769 BTC，略低于通常所说的 2100 万。这一差异源于比特币代码中的减半机制与舍入规则。2100 万只是四舍五入后的近似值。20,999,817.3131 这个数字代表的是在考虑了丢失的比特币和挖矿在特定区块前的错误后的实际流通量，而不是理论上的最大值。

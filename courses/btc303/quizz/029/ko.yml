question: 피터 우일의 계산에 따르면, 모든 코인이 채굴되면 이론적으로 존재할 수 있는 최대 Bitcoin의 양은 얼마인가요?
answer: 20,999,999.9769 BTC
wrong_answers:
  - 정확히 21,000,000.0000 BTC
  - 20,999,817.3131 BTC
  - 약 20,500,000.0000 BTC
explanation: |
  피터 우일은 이론상 최대 공급량은 20,999,999.9769 BTC로, 일반적으로 인용되는 2,100만 개보다 약간 적다고 계산했습니다. 이는 Bitcoin의 특정 반감기 일정과 코드의 반올림 때문입니다. 2,100만 개라는 수치는 반올림한 근사치입니다. 20,999,817.3131개는 이론적 최대치가 아닌 특정 블록까지 분실된 코인과 mining 오류를 고려한 실제 유통량을 나타냅니다.
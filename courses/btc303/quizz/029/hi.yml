question: पीटर वुइले की गणना के अनुसार, सभी सिक्कों के खनन हो जाने के बाद Bitcoin की अधिकतम सैद्धांतिक मात्रा क्या होगी?
answer: 20,999,999.9769 बीटीसी
wrong_answers:
  - 21,000,000.0000 BTC ठीक
  - 20,999,817.3131 बीटीसी
  - लगभग 20,500,000.0000 BTC
explanation: |
  पीटर वुइल ने गणना की कि सैद्धांतिक अधिकतम आपूर्ति 20,999,999.9769 बीटीसी है, जो आमतौर पर उद्धृत 21 मिलियन से थोड़ी कम है। यह Bitcoin के कोड में विशिष्ट हाफिंग शेड्यूल और राउंडिंग के कारण है। 21 मिलियन का आँकड़ा एक गोल अनुमान है। 20,999,817.3131 का आँकड़ा एक विशिष्ट ब्लॉक तक खोए हुए सिक्कों और mining त्रुटियों को ध्यान में रखते हुए वास्तविक परिसंचारी आपूर्ति को दर्शाता है, न कि सैद्धांतिक अधिकतम को।
reviewed: false

question: ピーテル・ウイールの計算によると、すべてのコインが採掘された後に存在するBitcoinの理論上の最大量は？
answer: 20,999,999.9769 BTC
wrong_answers:
  - 正確には21,000,000.0000 BTC
  - 20,999,817.3131 BTC
  - 約20,500,000.0000 BTC
explanation: |
  Pieter Wuille氏の計算では、理論上の最大供給量は20,999,999.9769BTCであり、一般的に言われている2,100万より若干少ない。これはBitcoinのコードにおける特定の半減スケジュールと四捨五入によるものである。2100万という数字は四捨五入された近似値である。20,999,817.3131という数字は、理論上の最大値ではなく、特定のブロックまでの紛失コインとminingのエラーを考慮した後の実際の流通供給量を表しています。
question: ピーテル・ウイールの計算によると、すべてのコインがマイニングされた後に存在するビットコインの理論上の最大供給量は？
answer: 20,999,999.9769 BTC
wrong_answers:
  - 21,000,000.0000 BTC
  - 20,999,817.3131 BTC
  - 20,500,000.0000 BTC
explanation: |
  ピーテル・ウイールの計算では、理論上の最大供給量は20,999,999.9769 BTCであり、一般的に言われている2,100万より若干少ない。これはビットコインのコードにおける特定の半減期スケジュールの四捨五入によるものである。2,100万という数字は四捨五入された近似値である。20,999,817.3131という数字は、理論上の最大値ではなく、特定のブロックまでの紛失コインとマイニングのエラーを考慮した後の実際の流通供給量を表しています。
reviewed: false

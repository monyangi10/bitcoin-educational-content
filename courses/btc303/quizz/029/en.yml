question: According to Pieter Wuille's calculations, what is the maximum theoretical amount of Bitcoin that will ever exist once all coins are mined?
answer: 20,999,999.9769 BTC
wrong_answers:
  - 21,000,000.0000 BTC exactly
  - 20,999,817.3131 BTC
  - 20,500,000.0000 BTC approximately
explanation: |
  Pieter Wuille calculated that the theoretical maximum supply is 20,999,999.9769 BTC, which is slightly less than the commonly cited 21 million. This is due to the specific halving schedule and rounding in Bitcoin's code. The 21 million figure is a rounded approximation. The 20,999,817.3131 figure represents the actual circulating supply after accounting for lost coins and mining errors up to a specific block, not the theoretical maximum.

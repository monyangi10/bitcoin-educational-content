question: Wie hoch ist nach den Berechnungen von Pieter Wuille die maximale theoretische Menge an Bitcoin, die jemals existieren wird, wenn alle Münzen abgebaut sind?
answer: 20.999.999,9769 BTC
wrong_answers:
  - 21.000.000,0000 BTC genau
  - 20.999.817,3131 BTC
  - 20.500.000,0000 BTC ungefähr
explanation: |
  Pieter Wuille hat errechnet, dass das theoretische Maximalangebot 20.999.999,9769 BTC beträgt, was etwas weniger ist als die allgemein genannten 21 Millionen. Dies ist auf den spezifischen Halbierungsplan und die Rundung im Code von Bitcoin zurückzuführen. Die Zahl von 21 Millionen ist ein gerundeter Näherungswert. Die Zahl 20.999.817,3131 stellt den tatsächlichen Umlauf dar, nachdem verlorene Münzen und mining-Fehler bis zu einem bestimmten Block berücksichtigt wurden, und nicht das theoretische Maximum.
reviewed: false

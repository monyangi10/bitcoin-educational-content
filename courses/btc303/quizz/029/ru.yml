question: Согласно расчетам Питера Вуйля, каково максимальное теоретическое количество Bitcoin, которое когда-либо будет существовать после того, как все монеты будут добыты?
answer: 20,999,999.9769 BTC
wrong_answers:
  - 21,000,000.0000 BTC точно
  - 20,999,817.3131 BTC
  - 20,500,000.0000 BTC примерно
explanation: |
  Питер Вуйль подсчитал, что теоретический максимальный объем предложения составляет 20 999 999,9769 BTC, что несколько меньше, чем часто упоминаемый 21 миллион. Это связано с особым графиком уменьшения вдвое и округлением в коде Bitcoin. Цифра 21 миллион - это округленное приближение. Цифра 20 999 817,3131 представляет собой фактический объем циркулирующего предложения после учета потерянных монет и ошибок mining до определенного блока, а не теоретический максимум.
reviewed: false

question: بر اساس محاسبات پیتر ویل، حداکثر مقدار نظری Bitcoin که پس از استخراج تمام سکه‌ها وجود خواهد داشت چقدر است؟
answer: ۲۰,۹۹۹,۹۹۹.۹۷۶۹ BTC
wrong_answers:
  - ۲۱,۰۰۰,۰۰۰٫۰۰۰۰ BTC دقیقا
  - ۲۰,۹۹۹,۸۱۷.۳۱۳۱ BTC
  - تقریباً ۲۰,۵۰۰,۰۰۰٫۰۰۰۰ BTC
explanation: |
  پیتِر وویله محاسبه کرد که حداکثر عرضه نظری ۲۰,۹۹۹,۹۹۹.۹۷۶۹ بیت‌کوین است که کمی کمتر از ۲۱ میلیون ذکر شده است. این به دلیل برنامه نصف شدن خاص و گرد کردن در کد Bitcoin است. عدد ۲۱ میلیون یک تقریب گرد شده است. عدد ۲۰,۹۹۹,۸۱۷.۳۱۳۱ نمایانگر عرضه واقعی در گردش پس از محاسبه سکه‌های گم‌شده و خطاهای mining تا یک بلوک خاص است، نه حداکثر نظری.
reviewed: false

question: ตามการคำนวณของ Pieter Wuille ปริมาณสูงสุดทางทฤษฎีของ Bitcoin ที่จะมีอยู่เมื่อเหรียญทั้งหมดถูกขุดแล้วคือเท่าใด?
answer: 20,999,999.9769 BTC
wrong_answers:
  - 21,000,000.0000 BTC เป๊ะ
  - 20,999,817.3131 BTC
  - ประมาณ 20,500,000.0000 BTC
explanation: |
  Pieter Wuille คำนวณว่าอุปทานสูงสุดตามทฤษฎีคือ 20,999,999.9769 BTC ซึ่งน้อยกว่าที่มักกล่าวถึงว่า 21 ล้านเล็กน้อย นี่เป็นผลมาจากตารางการลดลงครึ่งหนึ่งที่เฉพาะเจาะจงและการปัดเศษในโค้ดของ Bitcoin ตัวเลข 21 ล้านเป็นการประมาณการที่ปัดเศษ ตัวเลข 20,999,817.3131 แสดงถึงอุปทานหมุนเวียนจริงหลังจากคำนึงถึงเหรียญที่สูญหายและข้อผิดพลาดของ mining จนถึงบล็อกเฉพาะ ไม่ใช่อุปทานสูงสุดตามทฤษฎี
reviewed: false
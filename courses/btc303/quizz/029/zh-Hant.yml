question: 根據 Pieter Wuille 的計算，當所有硬幣都被挖出後，Bitcoin 的最大理論數量是多少？
answer: 20,999,999.9769 Btc
wrong_answers:
  - 21,000,000.0000 BTC 整數
  - 20,999,817.3131 Btc
  - 約 20,500,000.0000 BTC
explanation: |
  Pieter Wuille 計算出，理論上的最大供應量為 20,999,999.9769 BTC，略低於一般所說的 2,100 萬。這是由於 Bitcoin 代碼中特定的減半時間表和四捨五入造成的。2,100 萬這個數字是四捨五入的近似值。20,999,817.3131 這個數字代表的是計入遺失的硬幣和 mining 錯誤後直到特定區塊的實際流通量，而不是理論上的最大值。
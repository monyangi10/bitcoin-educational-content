question: 이 책의 정의에 따르면 검열 저항을 유지하면서 합법적인 Bitcoin 확장을 나타내는 시나리오는 무엇인가요?
answer: 트랜잭션 입력 크기를 줄이는 보다 공간 효율적인 서명 확인 알고리즘 구현
wrong_answers:
  - 사용자들이 중앙화된 거래소로 거래를 이전하도록 유도하여 on-chain 거래량을 줄입니다
  - 자동 거래 필터링을 구현하여 특정 유형의 경제 활동의 우선순위 지정
  - 트랜잭션을 보다 효율적으로 처리할 수 있는 정부 승인 유효성 검사 노드 만들기
explanation: |
  이 책에서는 Bitcoin 확장을 '검열 저항성을 손상시키지 않으면서 Bitcoin의 사용 용량을 늘리는 것'으로 정의합니다 공간 효율적인 서명 검증은 탈중앙화를 유지하면서 트랜잭션이 더 적은 바이트를 사용하게 함으로써 이 정의에 직접적으로 부합합니다. 중앙화된 거래소는 신뢰할 수 있는 제3자를 도입하고, 거래 필터링은 검열 메커니즘을 생성하며, 정부 승인 노드는 검증 권한을 중앙 집중화한다는 오답은 모두 검열 저항성을 손상시킵니다. 진정한 확장은 Bitcoin의 핵심 속성을 유지하면서 효율성을 개선합니다.
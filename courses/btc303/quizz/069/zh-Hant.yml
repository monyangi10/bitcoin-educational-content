question: 根據書中的定義，哪種情況代表合法的 Bitcoin 擴張，同時保留審查的抵抗力？
answer: 實施更節省空間的簽章驗證演算法，減少交易輸入大小
wrong_answers:
  - 鼓勵使用者將交易移轉至集中式交易所，以減少 on-chain 交易量
  - 實施自動交易篩選，優先處理特定類型的經濟活動
  - 建立政府認可的驗證節點，可更有效率地處理交易
explanation: |
  這本書將 Bitcoin 的擴充定義為「在不影響其抗審查能力的情況下，增加 Bitcoin 的使用容量」。節省空間的簽名驗證直接符合這個定義，它讓交易使用更少的位元組，同時維持分散性。錯誤的答案都會影響其抗審查性：集中式交換引入可信賴的第三方、交易過濾創造審查機制，以及政府批准的節點集中驗證權限。真正的擴充可保留 Bitcoin 的核心特性，同時提高效率。
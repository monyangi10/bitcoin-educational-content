question: この本の定義によれば、検閲への耐性を保ちつつ、正当なビットコインの規模拡大を表すシナリオはどれか？
answer: トランザクションの入力サイズを削減する、よりスペース効率の高い署名検証アルゴリズムの実装
wrong_answers:
  - オンチェーンのトランザクション量を減らすため、中央集権的な取引所への取引移行をユーザーに促す
  - 特定の種類の経済活動を優先する自動取引フィルタリングの導入
  - トランザクションをより効率的に処理できる、政府公認の検証ノードの作成
explanation: |
  この本では、ビットコインのスケーリングを「検閲への耐性を損なうことなくビットコインの使用容量を増やすこと」と定義している。スペース効率の良い署名検証は、分散化を維持しながらトランザクションの使用バイト数を少なくすることで、この定義に直接適合する。中央集権的な取引所は信頼できる第三者機関を導入し、トランザクションフィルタリングは検閲メカニズムを作り出し、政府承認ノードは検証権限を集中化する。真のスケーリングは、効率を向上させながらビットコインの核となる特性を維持する。
reviewed: false

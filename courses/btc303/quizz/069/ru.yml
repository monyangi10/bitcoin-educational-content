question: Согласно определению, данному в книге, какой сценарий представляет собой законное масштабирование Bitcoin при сохранении цензурной устойчивости?
answer: Реализация более экономичных алгоритмов проверки подписи, позволяющих уменьшить размер входных данных транзакции
wrong_answers:
  - Поощрение пользователей к переводу транзакций на централизованные биржи для снижения объема on-chain
  - Внедрение автоматической фильтрации транзакций для определения приоритетности определенных видов экономической деятельности
  - Создание одобренных правительством узлов проверки, которые могут обрабатывать транзакции более эффективно
explanation: |
  В книге дается определение масштабирования Bitcoin как "увеличение возможностей использования Bitcoin без ущерба для его устойчивости к цензуре" Пространственно эффективная проверка подписи напрямую соответствует этому определению, заставляя транзакции использовать меньше байт при сохранении децентрализации. Все неправильные ответы ставят под угрозу устойчивость к цензуре: централизованные биржи вводят доверенные третьи стороны, фильтрация транзакций создает механизмы цензуры, а одобренные правительством узлы централизуют полномочия по проверке. Истинное масштабирование сохраняет основные свойства Bitcoin, повышая при этом эффективность.
reviewed: false

question: با توجه به تعریف کتاب، کدام سناریو نمایانگر مقیاس‌بندی قانونی Bitcoin است در حالی که مقاومت در برابر سانسور را حفظ می‌کند؟
answer: پیاده‌سازی الگوریتم‌های تأیید امضا با فضای کارآمدتر که اندازه ورودی تراکنش‌ها را کاهش می‌دهند
wrong_answers:
  - تشویق کاربران به انتقال تراکنش‌ها به صرافی‌های متمرکز برای کاهش حجم on-chain
  - پیاده‌سازی فیلترگذاری خودکار تراکنش‌ها برای اولویت‌بندی انواع خاصی از فعالیت‌های اقتصادی
  - ایجاد نودهای اعتبارسنجی مورد تأیید دولت که می‌توانند تراکنش‌ها را به‌طور کارآمدتری پردازش کنند
explanation: |
  این کتاب مقیاس‌گذاری Bitcoin را به عنوان 'افزایش ظرفیت استفاده از Bitcoin بدون به خطر انداختن مقاومت در برابر سانسور' تعریف می‌کند. تأیید امضای فضای‌کارآمد به طور مستقیم با این تعریف مطابقت دارد زیرا تراکنش‌ها را با استفاده از بایت‌های کمتر انجام می‌دهد در حالی که تمرکززدایی را حفظ می‌کند. پاسخ‌های نادرست همگی مقاومت در برابر سانسور را به خطر می‌اندازند: مبادلات متمرکز، طرف‌های ثالث مورد اعتماد را معرفی می‌کنند، فیلتر کردن تراکنش‌ها مکانیزم‌های سانسور ایجاد می‌کند و گره‌های تأیید شده توسط دولت، اعتبارسنجی را متمرکز می‌کنند. مقیاس‌گذاری واقعی، ویژگی‌های اصلی Bitcoin را حفظ کرده و در عین حال کارایی را بهبود می‌بخشد.
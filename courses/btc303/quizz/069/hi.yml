question: पुस्तक की परिभाषा के अनुसार, कौन सा परिदृश्य सेंसरशिप प्रतिरोध को संरक्षित करते हुए वैध Bitcoin स्केलिंग का प्रतिनिधित्व करता है?
answer: अधिक स्थान-कुशल हस्ताक्षर सत्यापन एल्गोरिदम को लागू करना जो लेनदेन इनपुट आकार को कम करता है
wrong_answers:
  - on-chain वॉल्यूम को कम करने के लिए उपयोगकर्ताओं को केंद्रीकृत एक्सचेंजों में लेनदेन स्थानांतरित करने के लिए प्रोत्साहित करना
  - कुछ प्रकार की आर्थिक गतिविधियों को प्राथमिकता देने के लिए स्वचालित लेनदेन फ़िल्टरिंग को लागू करना
  - सरकार द्वारा अनुमोदित सत्यापन नोड्स का निर्माण करना जो लेनदेन को अधिक कुशलता से संसाधित कर सकें
explanation: |
  पुस्तक Bitcoin स्केलिंग को 'सेंसरशिप प्रतिरोध से समझौता किए बिना Bitcoin की उपयोग क्षमता को बढ़ाने' के रूप में परिभाषित करती है। स्थान-कुशल हस्ताक्षर सत्यापन, विकेंद्रीकरण को बनाए रखते हुए लेनदेन को कम बाइट्स का उपयोग करके इस परिभाषा पर पूरी तरह खरा उतरता है। सभी गलत उत्तर सेंसरशिप प्रतिरोध से समझौता करते हैं: केंद्रीकृत एक्सचेंज विश्वसनीय तृतीय पक्षों को शामिल करते हैं, लेनदेन फ़िल्टरिंग सेंसरशिप तंत्र बनाती है, और सरकार द्वारा अनुमोदित नोड्स सत्यापन प्राधिकरण को केंद्रीकृत करते हैं। वास्तविक स्केलिंग Bitcoin के मूल गुणों को संरक्षित रखते हुए दक्षता में सुधार करती है।
reviewed: false

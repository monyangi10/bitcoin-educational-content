question: Milline stsenaarium kujutab raamatu määratluse kohaselt endast legitiimset Bitcoin skaleerimist, säilitades samal ajal tsensuurivastase võitluse?
answer: Ruumitõhusamate allkirja kontrollimise algoritmide rakendamine, mis vähendavad tehingu sisendi suurust
wrong_answers:
  - Kasutajate julgustamine tehingute tsentraliseeritud börsidele üleviimiseks, et vähendada on-chain mahtu
  - Tehingute automaatse filtreerimise rakendamine, et seada teatud liiki majandustegevused esikohale
  - Valitsuse poolt heakskiidetud valideerimissõlmede loomine, mis suudavad tehinguid tõhusamalt töödelda
explanation: |
  Raamatus defineeritakse Bitcoin skaleerimist kui "Bitcoin kasutusvõimsuse suurendamist ilma tsensuurikindluse vähenemiseta" Ruumitõhus allkirja kontrollimine sobib otseselt selle määratlusega, kuna tehingud kasutavad vähem baite, säilitades samal ajal detsentraliseerituse. Kõik valed vastused seavad ohtu tsensuurikindluse: tsentraliseeritud börsid toovad sisse usaldusväärsed kolmandad osapooled, tehingute filtreerimine loob tsensuurimehhanisme ja valitsuse poolt heakskiidetud sõlmed tsentraliseerivad valideerimisautoriteeti. Tõeline skaleerimine säilitab Bitcoin põhiomadused, parandades samal ajal tõhusust.
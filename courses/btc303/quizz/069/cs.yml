question: Který scénář podle definice v knize představuje legitimní škálování Bitcoin při zachování cenzurního odporu?
answer: Implementace prostorově úspornějších algoritmů pro ověřování podpisů, které snižují velikost vstupních transakcí
wrong_answers:
  - Podpora uživatelů k migraci transakcí na centralizované burzy, aby se snížil objem on-chain
  - Zavedení automatického filtrování transakcí za účelem upřednostnění určitých typů hospodářské činnosti
  - Vytvoření vládou schválených validačních uzlů, které mohou efektivněji zpracovávat transakce
explanation: |
  Kniha definuje škálování Bitcoin jako "zvyšování kapacity použití Bitcoin bez ohrožení jeho odolnosti vůči cenzuře" Prostorově efektivní ověřování podpisů přímo odpovídá této definici, protože transakce využívají méně bajtů při zachování decentralizace. Všechny špatné odpovědi ohrožují odolnost vůči cenzuře: centralizované výměny zavádějí důvěryhodné třetí strany, filtrování transakcí vytváří cenzurní mechanismy a uzly schválené vládou centralizují ověřovací autoritu. Skutečné škálování zachovává základní vlastnosti Bitcoin a zároveň zvyšuje efektivitu.
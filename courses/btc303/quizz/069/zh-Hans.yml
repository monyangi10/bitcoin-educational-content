question: 根据书中的定义，哪种情况代表了合法的 Bitcoin 扩展，同时保留了对审查的抵制？
answer: 实施空间效率更高的签名验证算法，减少交易输入大小
wrong_answers:
  - 鼓励用户将交易转移到集中式交易所，以减少 on-chain 交易量
  - 实施自动交易过滤，优先处理某些类型的经济活动
  - 创建政府批准的验证节点，更高效地处理交易
explanation: |
  该书将 Bitcoin 扩展定义为 "在不影响其抗审查能力的情况下提高 Bitcoin 的使用能力"。具有空间效率的签名验证直接符合这一定义，它使交易使用更少的字节，同时保持去中心化。错误的答案都会影响其抗审查能力：中心化交易所引入了可信第三方，交易过滤建立了审查机制，政府批准的节点集中了验证权限。真正的扩展保留了 Bitcoin 的核心特性，同时提高了效率。
reviewed: false

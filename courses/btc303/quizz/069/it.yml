question: Secondo la definizione del libro, quale scenario rappresenta il legittimo ridimensionamento del Bitcoin preservando la resistenza alla censura?
answer: Implementazione di algoritmi di verifica delle firme più efficienti dal punto di vista spaziale che riducono le dimensioni degli input delle transazioni
wrong_answers:
  - Incoraggiare gli utenti a migrare le transazioni verso gli scambi centralizzati per ridurre il volume del on-chain
  - Implementare il filtraggio automatico delle transazioni per dare priorità a determinati tipi di attività economica
  - Creare nodi di convalida approvati dal governo in grado di elaborare le transazioni in modo più efficiente
explanation: |
  Il libro definisce lo scaling del Bitcoin come "l'aumento della capacità di utilizzo del Bitcoin senza compromettere la sua resistenza alla censura" La verifica delle firme efficiente dal punto di vista spaziale si adatta direttamente a questa definizione, facendo sì che le transazioni utilizzino meno byte pur mantenendo la decentralizzazione. Le risposte sbagliate compromettono tutte la resistenza alla censura: gli scambi centralizzati introducono terze parti fidate, il filtraggio delle transazioni crea meccanismi di censura e i nodi approvati dal governo accentrano l'autorità di convalida. Il vero scaling preserva le proprietà fondamentali del Bitcoin, migliorando al contempo l'efficienza.
question: ตามคำจำกัดความของหนังสือ สถานการณ์ใดที่แสดงถึงการปรับขนาด Bitcoin ที่ถูกต้องตามกฎหมายในขณะที่ยังคงรักษาความต้านทานการเซ็นเซอร์?
answer: การใช้อัลกอริธึมการตรวจสอบลายเซ็นที่มีประสิทธิภาพด้านพื้นที่มากขึ้นเพื่อลดขนาดข้อมูลการทำธุรกรรม
wrong_answers:
  - กระตุ้นให้ผู้ใช้ย้ายการทำธุรกรรมไปยังศูนย์กลางการแลกเปลี่ยนเพื่อ ลดปริมาณ on-chain
  - การใช้การกรองธุรกรรมอัตโนมัติเพื่อจัดลำดับความสำคัญของกิจกรรมทางเศรษฐกิจบางประเภท
  - การสร้างโหนดการตรวจสอบที่ได้รับการอนุมัติจากรัฐบาลที่สามารถประมวลผลธุรกรรมได้อย่างมีประสิทธิภาพมากขึ้น
explanation: |
  หนังสือกำหนด Bitcoin scaling ว่า 'การเพิ่มความสามารถในการใช้งานของ Bitcoin โดยไม่ลดทอนความต้านทานการเซ็นเซอร์' การตรวจสอบลายเซ็นที่ใช้พื้นที่อย่างมีประสิทธิภาพตรงกับคำจำกัดความนี้โดยทำให้ธุรกรรมใช้ไบต์น้อยลงในขณะที่ยังคงการกระจายอำนาจ คำตอบที่ผิดทั้งหมดลดทอนความต้านทานการเซ็นเซอร์: การแลกเปลี่ยนแบบรวมศูนย์แนะนำบุคคลที่สามที่เชื่อถือได้, การกรองธุรกรรมสร้างกลไกการเซ็นเซอร์, และโหนดที่ได้รับการอนุมัติจากรัฐบาลรวมศูนย์อำนาจการตรวจสอบ การขยายตัวที่แท้จริงรักษาคุณสมบัติหลักของ Bitcoin ในขณะที่ปรับปรุงประสิทธิภาพ
reviewed: false
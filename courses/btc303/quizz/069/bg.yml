question: Според определението в книгата кой сценарий представлява легитимно мащабиране на Bitcoin, като същевременно се запазва устойчивостта на цензурата?
answer: Прилагане на алгоритми за проверка на подписи, които са по-ефективни по отношение на пространството и намаляват размера на входните данни за транзакциите
wrong_answers:
  - Насърчаване на потребителите да прехвърлят транзакциите към централизирани борси, за да се намали обемът на on-chain
  - Прилагане на автоматично филтриране на транзакциите с цел приоритизиране на определени видове икономическа дейност
  - Създаване на одобрени от правителството възли за валидиране, които могат да обработват транзакциите по-ефективно
explanation: |
  В книгата мащабирането на Bitcoin се определя като "увеличаване на капацитета за използване на Bitcoin, без да се нарушава неговата устойчивост на цензура" Пространствено ефективната проверка на подписи пряко отговаря на това определение, като прави така, че транзакциите да използват по-малко байтове, като същевременно поддържа децентрализацията. Всички грешни отговори компрометират устойчивостта на цензура: централизираните борси въвеждат доверени трети страни, филтрирането на транзакциите създава механизми за цензура, а одобрените от правителството възли централизират органа за валидиране. Истинското мащабиране запазва основните свойства на Bitcoin, като същевременно подобрява ефективността.
reviewed: false

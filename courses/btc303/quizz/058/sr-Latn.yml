question: Prema zahtevima definicije otvorenog koda, šta se mora desiti kada je izvorni kod namerno zamaskiran u distribuciji softvera otvorenog koda?
answer: Namerno zamaskiran izvorni kod krši principe otvorenog koda i nije dozvoljen
wrong_answers:
  - Zamaskiran kod mora biti praćen detaljnom dokumentacijom koja objašnjava njegovu funkcionalnost
  - Zamaskiran kod je prihvatljiv sve dok su obezbeđeni i kompajlirani binarni fajlovi
  - Zamaskiran kod mora biti dostupan putem posebnog preuzimanja uz troškove reprodukcije
explanation: |
  Definicija otvorenog koda eksplicitno navodi da 'namerno zamaskiran izvorni kod nije dozvoljen.' Ovo je osnovni zahtev jer maskiranje sprečava smisleno
  ispitivanje, modifikaciju i razumevanje koda, što poništava osnovne svrhe softvera otvorenog koda. Izvorni kod mora biti u 'preferiranom obliku u kojem bi 
  programer modifikovao program,' što čini maskiranje nekompatibilnim sa principima otvorenog koda bez obzira na dokumentaciju ili metode distribucije.
reviewed: true

question: 오픈 소스 정의 요건에 따르면 오픈 소스 소프트웨어 배포에서 소스 코드가 의도적으로 난독화된 경우 어떤 일이 발생하나요?
answer: 의도적으로 난독화된 소스 코드는 오픈 소스 원칙에 위배되며 허용되지 않습니다
wrong_answers:
  - 난독화된 코드에는 해당 기능을 설명하는 자세한 문서가 첨부되어야 합니다
  - 난독화된 코드는 컴파일된 바이너리도 제공되는 한 허용됩니다
  - 난독화된 코드는 복제 비용과 함께 별도의 다운로드를 통해 제공해야 합니다
explanation: |
  오픈 소스 정의에는 '의도적으로 난독화된 소스 코드는 허용되지 않는다'고 명시적으로 명시되어 있습니다 난독화는 코드에 대한 의미 있는 조사, 수정 및 이해를 방해하여 오픈 소스 소프트웨어의 핵심 목적을 무력화하기 때문에 이는 기본적인 요건입니다. 소스 코드는 '프로그래머가 프로그램을 수정할 때 선호하는 형태'여야 하므로 문서나 배포 방식에 관계없이 난독화는 오픈 소스 원칙과 양립할 수 없습니다.
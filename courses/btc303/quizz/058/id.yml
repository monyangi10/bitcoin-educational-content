question: Menurut persyaratan definisi open source, apa yang harus dilakukan ketika kode sumber sengaja dikaburkan dalam distribusi perangkat lunak open source?
answer: Kode sumber yang sengaja dikaburkan melanggar prinsip-prinsip open source dan tidak diperbolehkan
wrong_answers:
  - Kode yang dikaburkan harus disertai dengan dokumentasi terperinci yang menjelaskan fungsinya
  - Kode yang dikaburkan dapat diterima selama binari yang dikompilasi juga disediakan
  - Kode yang dikaburkan harus tersedia melalui unduhan terpisah dengan biaya reproduksi
explanation: |
  Definisi open source secara eksplisit menyatakan bahwa 'kode sumber yang disamarkan dengan sengaja tidak diperbolehkan' Ini adalah persyaratan mendasar karena pengaburan mencegah pemeriksaan, modifikasi, dan pemahaman yang berarti terhadap kode, yang mengalahkan tujuan utama perangkat lunak sumber terbuka. Kode sumber harus dalam 'bentuk yang disukai oleh pemrogram untuk memodifikasi program,' sehingga penyamaran tidak sesuai dengan prinsip-prinsip open source terlepas dari dokumentasi atau metode distribusi.

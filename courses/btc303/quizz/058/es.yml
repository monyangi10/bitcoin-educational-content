question: Según los requisitos de la definición de código abierto, ¿qué debe ocurrir cuando se ofusca deliberadamente el código fuente en una distribución de software de código abierto?
answer: El código fuente deliberadamente ofuscado viola los principios del código abierto y no está permitido
wrong_answers:
  - El código ofuscado debe ir acompañado de documentación detallada que explique su funcionalidad
  - El código ofuscado es aceptable siempre que también se proporcionen los binarios compilados
  - El código ofuscado debe estar disponible a través de una descarga independiente con costes de reproducción
explanation: |
  La definición de código abierto establece explícitamente que "no se permite el código fuente deliberadamente ofuscado" Se trata de un requisito fundamental, ya que la ofuscación impide el escrutinio, la modificación y la comprensión del código, lo que va en contra de los objetivos centrales del software de código abierto. El código fuente debe estar en "la forma preferida en la que un programador modificaría el programa", lo que hace que la ofuscación sea incompatible con los principios del código abierto, independientemente de la documentación o los métodos de distribución.

question: 根據開放原始碼的定義要求，當原始碼在開放原始碼軟體發行版中被刻意混淆時，必須如何處理？
answer: 刻意混淆的原始碼違反開放原始碼原則，是不允許的
wrong_answers:
  - 混淆程式碼必須附有詳細的說明文件，解釋其功能
  - 只要同時提供編譯後的二進位檔，就可以接受混淆程式碼
  - 混淆程式碼必須透過單獨下載提供，並附有複製費用
explanation: |
  開放原始碼的定義明確指出「不允許故意混淆原始碼」。這是最基本的要求，因為混淆會妨礙對程式碼有意義的檢查、修改和理解，這違反了開放原始碼軟體的核心目的。原始碼必須採用「程式設計師修改程式的首選形式」，因此不論文件或散佈方式為何，混淆都不符合開放原始碼原則。

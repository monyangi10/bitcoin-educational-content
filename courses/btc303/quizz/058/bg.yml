question: Какво трябва да се случи според изискванията за дефиниция на отворен код, когато изходният код е умишлено замаскиран в софтуерна дистрибуция с отворен код?
answer: Умишлено замаскираният изходен код нарушава принципите на отворения код и не е разрешен
wrong_answers:
  - Обфускуваният код трябва да бъде придружен от подробна документация, обясняваща неговата функционалност
  - Обфускуираният код е приемлив, стига да се предоставят и компилирани двоични файлове
  - Обфускулираният код трябва да бъде достъпен чрез отделно изтегляне с разходи за възпроизвеждане
explanation: |
  В определението за отворен код изрично се посочва, че "умишлено затъмнен изходен код не е разрешен" Това е основно изискване, тъй като забулването пречи на смисленото разглеждане, модифициране и разбиране на кода, което е в разрез с основните цели на софтуера с отворен код. Изходният код трябва да бъде в "предпочитаната форма, в която програмистът би модифицирал програмата", което прави забулването несъвместимо с принципите на отворения код, независимо от документацията или методите на разпространение.
reviewed: false

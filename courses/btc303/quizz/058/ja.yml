question: オープンソースの定義要件によると、オープンソースソフトウェアの配布においてソースコードが意図的に難読化された場合、何が起こらなければならないのでしょうか？
answer: 意図的に難読化されたソースコードは、オープンソースの原則に違反し、許可されません。
wrong_answers:
  - 難読化されたコードには、その機能を説明する詳細な文書が添付されていなければならない。
  - 難読化されたコードは、コンパイルされたバイナリも提供される限り許容される。
  - 難読化されたコードは、複製費用を伴う別個のダウンロードを通じて入手できるようにしなければならない。
explanation: |
  オープン・ソースの定義では、「意図的に難読化されたソース・コードは許可されない」と明示されています。難読化は、コードの意味のある精査、修正、理解を妨げ、オープン・ソース・ソフトウェアの核心的な目的を打ち破ってしまうため、これは基本的な要件である。ソースコードは、「プログラマがプログラムを修正する際に好ましい形式」でなければならず、難読化は、文書や配布方法に関係なく、オープンソースの原則と両立しない。
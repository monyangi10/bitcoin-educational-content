question: オープンソースの定義要件によると、オープンソース・ソフトウェアの配布においてソースコードが意図的に難読化された場合、どのように対応されるべきか？
answer: 意図的に難読化されたソースコードは、オープンソースの原則に違反し、許可されるべきでない
wrong_answers:
  - 難読化されたコードには、その機能を説明する詳細な文書が添付されていなければならない
  - 難読化されたコードは、コンパイルされたバイナリも提供される限り許容されなければならない
  - 難読化されたコードは、複製費用を伴う別個のダウンロードを通じて入手できるようにしなければならない
explanation: |
  オープンソースの定義では、「意図的に難読化されたソースコードは許可されない」と明示されています。難読化は、コードの意味のある精査、修正、理解を妨げ、オープンソース・ソフトウェアの核心的な目的を打ち破ってしまうため、これは基本的な要件である。ソースコードは、「プログラマーがプログラムを修正する際に好ましい形式」でなければならず、難読化は、文書や配布方法に関係なく、オープンソースの原則と両立しない。
reviewed: false

question: طبق الزامات تعریف منبع باز، چه اتفاقی باید بیفتد وقتی کد منبع به‌طور عمدی در یک توزیع نرم‌افزار منبع باز مبهم می‌شود؟
answer: کد منبع عمداً مبهم شده اصول منبع باز را نقض می‌کند و مجاز نیست
wrong_answers:
  - کد مبهم باید همراه با مستندات دقیقی باشد که عملکرد آن را توضیح دهد.
  - کد مبهم قابل قبول است به شرطی که فایل‌های باینری کامپایل‌شده نیز ارائه شوند.
  - کد مبهم باید از طریق یک دانلود جداگانه با هزینه‌های تولید در دسترس قرار گیرد
explanation: |
  تعریف منبع باز به‌طور صریح بیان می‌کند که 'کد منبع عمداً مبهم مجاز نیست.' این یک الزام اساسی است زیرا ابهام مانع از بررسی دقیق، اصلاح و درک کد می‌شود که اهداف اصلی نرم‌افزار منبع باز را نقض می‌کند. کد منبع باید به‌صورت 'فرم ترجیحی که یک برنامه‌نویس برنامه را اصلاح می‌کند' باشد، که ابهام را با اصول منبع باز ناسازگار می‌سازد، صرف‌نظر از روش‌های مستندسازی یا توزیع.
reviewed: false

question: ओपन सोर्स परिभाषा आवश्यकताओं के अनुसार, जब ओपन सोर्स सॉफ्टवेयर वितरण में स्रोत कोड को जानबूझकर अस्पष्ट किया जाता है, तो क्या होना चाहिए?
answer: जानबूझकर अस्पष्ट किया गया स्रोत कोड खुले स्रोत सिद्धांतों का उल्लंघन करता है और इसकी अनुमति नहीं है
wrong_answers:
  - अस्पष्ट कोड के साथ उसकी कार्यक्षमता को समझाने वाला विस्तृत दस्तावेज़ होना चाहिए
  - अस्पष्ट कोड तब तक स्वीकार्य है जब तक संकलित बाइनरी भी प्रदान की जाती हैं
  - अस्पष्ट कोड को पुनरुत्पादन लागत के साथ एक अलग डाउनलोड के माध्यम से उपलब्ध कराया जाना चाहिए
explanation: |
  ओपन सोर्स परिभाषा में स्पष्ट रूप से कहा गया है कि 'जानबूझकर अस्पष्ट किए गए सोर्स कोड की अनुमति नहीं है।' यह एक मूलभूत आवश्यकता है क्योंकि अस्पष्टीकरण कोड की सार्थक जाँच, संशोधन और समझ को रोकता है, जो ओपन सोर्स सॉफ़्टवेयर के मूल उद्देश्यों को विफल करता है। सोर्स कोड 'उस पसंदीदा रूप में होना चाहिए जिसमें एक प्रोग्रामर प्रोग्राम को संशोधित करेगा,' जिससे अस्पष्टीकरण, दस्तावेज़ीकरण या वितरण विधियों की परवाह किए बिना, ओपन सोर्स सिद्धांतों के साथ असंगत हो जाता है।

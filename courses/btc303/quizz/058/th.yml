question: ตามข้อกำหนดของคำจำกัดความโอเพ่นซอร์ส จะต้องทำอย่างไรเมื่อซอร์สโค้ดถูกทำให้ยุ่งเหยิงโดยเจตนาในซอฟต์แวร์โอเพ่นซอร์ส?
answer: ซอร์สโค้ดที่ถูกทำให้คลุมเครือโดยเจตนาละเมิดหลักการของโอเพนซอร์สและไม่ได้รับอนุญาต
wrong_answers:
  - โค้ดที่ถูกทำให้คลุมเครือต้องมาพร้อมกับเอกสารประกอบที่มีรายละเอียดอธิบายการทำงานของมัน
  - โค้ดที่ถูกทำให้คลุมเครือสามารถยอมรับได้ตราบใดที่มีการจัดเตรียมไบนารีที่คอมไพล์แล้วด้วย
  - โค้ดที่ถูกทำให้คลุมเครือต้องสามารถดาวน์โหลดได้ผ่านการดาวน์โหลดแยกต่างหากพร้อมค่าใช้จ่ายในการทำซ้ำ
explanation: |
  คำจำกัดความของโอเพนซอร์สระบุไว้อย่างชัดเจนว่า 'ไม่อนุญาตให้ใช้ซอร์สโค้ดที่ถูกทำให้เข้าใจยากโดยเจตนา' นี่เป็นข้อกำหนดพื้นฐานเพราะการทำให้เข้าใจยากจะป้องกันการตรวจสอบ การแก้ไข และความเข้าใจในโค้ดอย่างมีความหมาย ซึ่งขัดต่อวัตถุประสงค์หลักของซอฟต์แวร์โอเพนซอร์ส ซอร์สโค้ดต้องอยู่ใน 'รูปแบบที่โปรแกรมเมอร์ต้องการแก้ไขโปรแกรม' ทำให้การทำให้เข้าใจยากไม่สอดคล้องกับหลักการของโอเพนซอร์สไม่ว่าจะเป็นวิธีการจัดทำเอกสารหรือการแจกจ่ายก็ตาม
reviewed: false
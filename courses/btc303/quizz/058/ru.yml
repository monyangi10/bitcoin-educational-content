question: Согласно требованиям к определению открытого исходного кода, что должно произойти, если исходный код намеренно завуалирован в дистрибутиве открытого программного обеспечения?
answer: Преднамеренное затуманивание исходного кода нарушает принципы открытого исходного кода и не допускается
wrong_answers:
  - Обфусцированный код должен сопровождаться подробной документацией, объясняющей его функциональность
  - Обфусцированный код допустим при условии, что будут предоставлены скомпилированные двоичные файлы
  - Обфусцированный код должен быть доступен в виде отдельной загрузки с указанием стоимости воспроизведения
explanation: |
  В определении открытого исходного кода прямо говорится, что "преднамеренная обфускация исходного кода не допускается" Это фундаментальное требование, поскольку обфускация препятствует осмысленному изучению, модификации и пониманию кода, что противоречит основным целям программного обеспечения с открытым исходным кодом. Исходный код должен быть представлен в "предпочтительной форме, в которой программист мог бы модифицировать программу", что делает обфускацию несовместимой с принципами открытого исходного кода независимо от документации или методов распространения.
question: Mikä on ensisijainen syy siihen, että lohkokokojen kasvattaminen johtaa vanhentuneiden lohkojen suuremmalle todennäköisyydelle Bitcoin mining:ssä?
answer: Suurempien lohkojen leviäminen ja validointi verkossa vie enemmän aikaa, mikä luo pidempiä ikkunoita, joissa louhijat työskentelevät vanhentuneiden lohkoketjuvihjeiden parissa
wrong_answers:
  - Suuremmat lohkot vaativat enemmän laskentatehoa louhintaan, minkä vuoksi louhijoiden on käytettävä kauemmin aikaa kelvollisten proof-of-work -ratkaisujen löytämiseen
  - "Suuremmat lohkokoot vähentävät vaikeusasteen säätömekanismin tehokkuutta, mikä johtaa arvaamattomiin lohkojen ajoitusväleihin."
  - Suuremmat lohkot aiheuttavat enemmän transaktiokonflikteja kilpailevien lohkojen välille, mikä vaikeuttaa sen määrittämistä, mikä lohko tulisi hyväksyä
explanation: |
  Oikea vastaus tunnistaa vanhentuneiden lohkojen taustalla olevan ydinmekanismin. Kun lohkot ovat suurempia, ne vaativat enemmän kaistanleveyttä siirtyäkseen solmujen välillä ja enemmän aikaa validointiin. Tämän pidennetyn etenemisajan aikana useat louhijat voivat löytää kilpailevia lohkoja samalta korkeudelta, koska ne eivät ole vielä saaneet uusinta lohkoa. Tämä aiheuttaa kilpajuoksutilanteen, jossa vain yksi lohko voidaan lopulta hyväksyä, jolloin muut lohkot ovat vanhentuneita. Väärissä vastauksissa tämä etenemisongelma sekoitetaan mining-vaikeuksiin, konsensusmekanismeihin tai transaktioristiriitoihin, jotka ovat erillisiä huolenaiheita vanhentuneita lohkoja aiheuttavasta ajoitusongelmasta.
question: 블록 크기를 늘리면 Bitcoin mining에서 오래된 블록이 발생할 확률이 높아지는 주된 이유는 무엇인가요?
answer: 블록이 클수록 네트워크 전체에 전파되고 검증되는 데 더 많은 시간이 걸리며, 채굴자가 오래된 블록체인 팁을 작업하는 기간이 길어집니다
wrong_answers:
  - 블록이 클수록 채굴에 더 많은 연산 능력이 필요하므로 채굴자가 유효한 proof-of-work 솔루션을 찾는 데 더 오랜 시간이 걸립니다
  - "블록 크기가 커지면 난이도 조정 메커니즘의 효과가 감소하여 블록 타이밍 간격을 예측할 수 없게 됩니다."
  - 블록이 클수록 경쟁 블록 간에 더 많은 트랜잭션 충돌이 발생하여 어떤 블록을 수락해야 하는지 결정하기가 더 어려워집니다
explanation: |
  정답은 오래된 블록의 핵심 메커니즘을 파악하는 것입니다. 블록이 커지면 노드 간에 전송하는 데 더 많은 대역폭이 필요하고 검증하는 데 더 많은 시간이 소요됩니다. 이 긴 전파 기간 동안 여러 채굴자는 아직 최신 블록을 받지 못했기 때문에 같은 높이에서 경쟁하는 블록을 발견할 수 있습니다. 이로 인해 궁극적으로 하나의 블록만 승인될 수 있는 경쟁 조건이 생성되어 다른 블록은 부실해질 수 있습니다. 오답은 이 전파 문제를 오래된 블록을 유발하는 타이밍 문제와는 별개의 문제인 mining 난이도, 합의 메커니즘 또는 트랜잭션 충돌과 혼동하고 있습니다.

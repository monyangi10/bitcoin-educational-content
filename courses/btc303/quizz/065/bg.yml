question: Коя е основната причина, поради която увеличаването на размера на блоковете води до по-голяма вероятност за застояване на блокове?
answer: По-големите блокове отнемат повече време за разпространение и валидиране в мрежата, което създава по-дълги прозорци, в които миньорите работят по остарели блокчейн версии
wrong_answers:
  - По-големите блокове изискват повече изчислителна мощност за добив, което кара миньорите да изразходват повече време за намиране на валидни решения за proof-of-work
  - Увеличените размери на блоковете намаляват ефективността на механизма за регулиране на трудността, което води до непредсказуеми интервали от време между блоковете
  - По-големите блокове създават повече конфликти между конкурентните блокове, което затруднява определянето на блока, който трябва да бъде приет
explanation: |
  Правилният отговор идентифицира основния механизъм, който стои зад застоялите блокове. Когато блоковете са по-големи, те изискват повече честотна лента за прехвърляне между възлите и повече време за валидиране. По време на този удължен период на разпространение няколко миньори могат да намерят конкурентни блокове на една и съща височина, тъй като все още не са получили най-новия блок. Това създава условие за надпревара, при което само един блок може да бъде приет в крайна сметка, което прави останалите застояли. Грешните отговори объркват този проблем с разпространението с трудността на копаене, механизмите за консенсус или конфликтите на транзакциите, които са отделни проблеми от проблема с времето, който причинява застояли блокове.
reviewed: true

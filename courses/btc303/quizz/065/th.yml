question: เหตุผลหลักที่การเพิ่มขนาดบล็อกนำไปสู่ความน่าจะเป็นที่สูงขึ้นของบล็อกที่ล้าสมัยใน Bitcoin mining คืออะไร?
answer: บล็อกที่ใหญ่ขึ้นใช้เวลามากขึ้นในการกระจายและตรวจสอบความถูกต้องทั่วทั้งเครือข่าย ทำให้เกิดหน้าต่างที่ยาวขึ้นที่นักขุดทำงานบนปลายบล็อกเชนที่ล้าสมัย
wrong_answers:
  - บล็อกที่ใหญ่ขึ้นต้องการพลังการคำนวณมากขึ้นในการขุด ทำให้คนขุดใช้เวลานานขึ้นในการหาวิธีแก้ปัญหา proof-of-work ที่ถูกต้อง
  - "ขนาดบล็อกที่เพิ่มขึ้นลดประสิทธิภาพของกลไกการปรับความยาก ทำให้ช่วงเวลาของบล็อกไม่สามารถคาดเดาได้"
  - บล็อกที่ใหญ่ขึ้นสร้างความขัดแย้งในการทำธุรกรรมมากขึ้นระหว่างบล็อกที่แข่งขันกัน ทำให้ยากขึ้นในการตัดสินใจว่าควรยอมรับบล็อกใด
explanation: |
  คำตอบที่ถูกต้องระบุถึงกลไกหลักที่อยู่เบื้องหลังบล็อกที่ล้าสมัย เมื่อบล็อกมีขนาดใหญ่ขึ้น พวกเขาต้องการแบนด์วิดท์มากขึ้นในการถ่ายโอนระหว่างโหนดและใช้เวลามากขึ้นในการตรวจสอบ ในช่วงเวลาการแพร่กระจายที่ยาวนานนี้ นักขุดหลายคนอาจพบว่ามีบล็อกที่แข่งขันกันในระดับเดียวกันเนื่องจากพวกเขายังไม่ได้รับบล็อกล่าสุด สิ่งนี้สร้างเงื่อนไขการแข่งขันที่มีเพียงบล็อกเดียวเท่านั้นที่สามารถได้รับการยอมรับในที่สุด ทำให้บล็อกอื่นๆ ล้าสมัย คำตอบที่ผิดสับสนปัญหาการแพร่กระจายนี้กับความยากลำบากของ mining กลไกการทำฉันทามติ หรือความขัดแย้งของธุรกรรม ซึ่งเป็นข้อกังวลที่แยกต่างหากจากปัญหาด้านเวลาที่ทำให้เกิดบล็อกที่ล้าสมัย
reviewed: false
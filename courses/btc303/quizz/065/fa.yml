question: دلیل اصلی که افزایش اندازه بلوک‌ها منجر به احتمال بالاتر بلوک‌های منسوخ در Bitcoin mining می‌شود چیست؟
answer: بلوک‌های بزرگ‌تر زمان بیشتری برای انتشار و اعتبارسنجی در سراسر شبکه نیاز دارند و پنجره‌های طولانی‌تری ایجاد می‌کنند که در آن ماینرها روی نکات بلاکچین قدیمی کار می‌کنند.
wrong_answers:
  - بلوک‌های بزرگ‌تر به قدرت محاسباتی بیشتری برای استخراج نیاز دارند، که باعث می‌شود استخراج‌کنندگان زمان بیشتری را صرف یافتن راه‌حل‌های معتبر proof-of-work کنند.
  - "افزایش اندازه بلوک‌ها اثربخشی مکانیزم تنظیم سختی را کاهش می‌دهد و منجر به فواصل زمانی غیرقابل پیش‌بینی بلوک می‌شود"
  - بلوک‌های بزرگ‌تر باعث ایجاد تعارضات تراکنش بیشتری بین بلوک‌های رقیب می‌شوند و تعیین اینکه کدام بلوک باید پذیرفته شود را دشوارتر می‌کنند.
explanation: |
  پاسخ صحیح مکانیزم اصلی پشت بلوک‌های بی‌اعتبار را شناسایی می‌کند. وقتی بلوک‌ها بزرگ‌تر هستند، برای انتقال بین نودها به پهنای باند بیشتری نیاز دارند و زمان بیشتری برای اعتبارسنجی می‌طلبند. در طول این دوره انتشار طولانی، ممکن است چندین ماینر بلوک‌های رقابتی در همان ارتفاع پیدا کنند زیرا هنوز بلوک جدید را دریافت نکرده‌اند. این وضعیت یک رقابت ایجاد می‌کند که در آن تنها یک بلوک می‌تواند در نهایت پذیرفته شود و بقیه بی‌اعتبار می‌شوند. پاسخ‌های نادرست این مسئله انتشار را با دشواری mining، مکانیزم‌های اجماع یا تعارضات تراکنش اشتباه می‌گیرند، که این‌ها نگرانی‌های جداگانه‌ای از مشکل زمانی هستند که باعث بلوک‌های بی‌اعتبار می‌شود.
question: ビットコイン、マイニングにおいて、ブロックサイズを大きくするとブロックが陳腐化する確率が高くなる主な理由は？
answer: より大きなブロックは、ネットワーク全体に伝搬し、検証するのに時間がかかり、マイナーたちが古いブロックチェーンのヒントに取り組むウィンドウが長くなる
wrong_answers:
  - より大きなブロックはマイニングにより多くの計算能力を必要とするため、マイナーは有効なプルーフ・オブ・ワーク（PoW）解決策を見つけるのに長い時間を費やすことになる
  - ブロックサイズが大きくなると、難易度調整メカニズムの効果が低下し、ブロックのタイミング間隔が予測できなくなる
  - ブロックが大きいと、競合するブロック間でトランザクションの競合が発生し、どのブロックを受け入れるべきかの判断が難しくなる
explanation: |
  正解は、ステール・ブロックの背後にある中核的なメカニズムを示している。ブロックが大きくなると、ノード間の転送により多くの帯域幅が必要となり、検証により多くの時間がかかる。この長い伝播期間中、複数のマイナーが最新のブロックをまだ受け取っていないため、同じ高さで競合するブロックを見つける可能性がある。これにより、最終的に1つのブロックしか受け入れられず、他のブロックが陳腐化するという競合状態が発生する。間違った答えは、この伝播の問題をマイニングの難易度、コンセンサスメカニズム、またはトランザクションの競合と混同しており、これらはステイルブロックを引き起こすタイミングの問題とは別の懸念事項である。
reviewed: false

question: प्राथमिक कारण क्या है कि ब्लॉक आकार बढ़ाने से Bitcoin mining में पुराने ब्लॉक की संभावना बढ़ जाती है?
answer: बड़े ब्लॉकों को नेटवर्क में प्रसारित और मान्य होने में अधिक समय लगता है, जिससे लंबी विंडो बनती है जहां खनिक पुरानी ब्लॉकचेन युक्तियों पर काम करते हैं
wrong_answers:
  - बड़े ब्लॉकों के खनन के लिए अधिक कम्प्यूटेशनल शक्ति की आवश्यकता होती है, जिसके कारण खनिकों को वैध proof-of-work समाधान खोजने में अधिक समय लगता है
  - "ब्लॉक आकार में वृद्धि से कठिनाई समायोजन तंत्र की प्रभावशीलता कम हो जाती है, जिसके परिणामस्वरूप ब्लॉक समय अंतराल अप्रत्याशित हो जाता है"
  - बड़े ब्लॉक प्रतिस्पर्धी ब्लॉकों के बीच अधिक लेनदेन संघर्ष पैदा करते हैं, जिससे यह निर्धारित करना कठिन हो जाता है कि किस ब्लॉक को स्वीकार किया जाना चाहिए
explanation: |
  सही उत्तर पुराने ब्लॉकों के पीछे की मूल प्रक्रिया को दर्शाता है। जब ब्लॉक बड़े होते हैं, तो उन्हें नोड्स के बीच स्थानांतरण के लिए अधिक बैंडविड्थ और सत्यापन के लिए अधिक समय की आवश्यकता होती है। इस विस्तारित प्रसार अवधि के दौरान, कई माइनर्स को समान ऊँचाई पर प्रतिस्पर्धी ब्लॉक मिल सकते हैं क्योंकि उन्हें अभी तक नवीनतम ब्लॉक प्राप्त नहीं हुआ है। इससे एक रेस कंडीशन उत्पन्न होती है जहाँ अंततः केवल एक ही ब्लॉक स्वीकार किया जा सकता है, जिससे अन्य सभी पुराने हो जाते हैं। गलत उत्तर इस प्रसार समस्या को mining कठिनाई, सहमति तंत्र, या लेन-देन संघर्षों से जोड़ते हैं, जो पुराने ब्लॉकों का कारण बनने वाली समय समस्या से अलग चिंताएँ हैं।
reviewed: false

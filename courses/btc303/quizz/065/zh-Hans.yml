question: 在 Bitcoin mining 中，区块大小的增加导致出现陈旧区块的概率增加的主要原因是什么？
answer: 较大的区块需要更多时间在网络中传播和验证，这就为矿工在过时的区块链提示上工作创造了更长的时间窗口。
wrong_answers:
  - 更大的区块需要更强的计算能力来挖掘，导致矿工需要花费更长的时间来寻找有效的 proof-of-work 解决方案
  - "增加区块大小会降低难度调整机制的有效性，导致无法预测的区块时间间隔"
  - 较大的区块会在相互竞争的区块之间产生更多的交易冲突，从而难以确定哪个区块应被接受
explanation: |
  正确答案指出了陈旧区块背后的核心机制。区块越大，在节点之间传输所需的带宽就越大，验证所需的时间也就越长。在这一延长的传播期间，多个矿工可能会在同一高度发现相互竞争的区块，因为他们还没有收到最新的区块。这就产生了一个竞赛条件，最终只能接受一个区块，使其他区块变得陈旧。错误答案将这一传播问题与 mining 难度、共识机制或交易冲突混为一谈，而这些问题与导致区块过期的时间问题是不同的。
reviewed: false

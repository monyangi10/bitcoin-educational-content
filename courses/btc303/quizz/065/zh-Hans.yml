question: 为什么增大区块大小会导致比特币挖矿中出现更高概率的“过期区块”（stale blocks）？
answer: 区块越大，在全网传播和验证所需的时间越长，从而形成更长的时间窗口，使矿工可能在过期的区块链分支上继续挖矿。
wrong_answers:
  - 区块越大，挖矿所需的计算能力越高，矿工寻找有效工作量证明的时间也更长。
  - 区块大小增加会削弱难度调整机制的有效性，导致出块时间间隔变得不可预测。
  - 区块变大后，竞争区块之间的交易冲突更多，因而更难判断哪个区块应被接受。
explanation: |
  正确答案指出了产生过期区块的核心机制。区块变大后，需要更多带宽在节点间传输，也需要更长时间完成验证。在这段传播延迟期间，可能有多个矿工在尚未收到最新区块的情况下同时挖出新区块，导致同高度的区块竞争。最终只有一个区块会被接受，其余的则成为过期区块。错误选项混淆了这一传播延迟问题与挖矿难度、共识机制或交易冲突等其他概念，而这些并不是造成过期区块的真正原因。

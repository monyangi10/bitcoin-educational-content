question: 在 Bitcoin mining 中，增加區塊大小會導致較高的陳舊區塊概率，主要原因是什麼？
answer: 較大的區塊需要更多的時間在整個網路中傳播和驗證，從而創造了更長的時間窗口，讓礦工在過時的區塊鏈提示上工作。
wrong_answers:
  - 較大的區塊需要更多的計算能力來開採，導致開採人員需要花更長的時間來尋找有效的 proof-of-work 解決方案
  - 「增加區塊大小會降低難度調整機制的效能，導致無法預測的區塊時間間隔」
  - 較大的區塊會在相互競爭的區塊之間產生更多的交易衝突，使其更難確定哪一個區塊應該被接受
explanation: |
  正確答案指出陳舊區塊背後的核心機制。當區塊較大時，它們需要更多的頻寬在節點間傳輸，並需要更多的時間來驗證。在這段延長的傳播期間，多個礦工可能會在同一高度發現競爭區塊，因為他們尚未收到最新的區塊。這會造成競爭狀態，最終只能接受一個區塊，使得其他區塊變得陳舊。錯誤答案將此傳播問題與 mining 難度、共識機制或交易衝突混為一談，而這些問題與造成陳舊區塊的時間問題是兩回事。
reviewed: false

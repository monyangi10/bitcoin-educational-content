question: 根据 Pieter Wuille 的定义，在分布式系统中，"无信任 "指的是什么？
answer: 无需任何受信任方即可正常运行的系统
wrong_answers:
  - 用户无法信任任何参与者或验证者的系统
  - 消除一切形式信任（包括软件和硬件）的系统
  - 任何人都无法撤销或质疑交易的系统
explanation: |
  Trustless 特指分布式系统无需任何受信任方即可正常运行的技术特性。这不同于消除所有信任（你仍然信任你的软件/硬件）或防止逆转（Bitcoin 交易可以通过链重写逆转）。该术语也不意味着用户不能信任参与者--相反，系统的正确性并不取决于对参与者的信任。
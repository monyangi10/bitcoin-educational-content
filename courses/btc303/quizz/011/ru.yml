question: Согласно определению Питера Вуйля, что означает "без доверия" в контексте распределенных систем?
answer: Система, для корректной работы которой не требуются доверенные лица
wrong_answers:
  - Система, в которой пользователи не могут доверять ни одному из участников или валидаторов
  - Система, исключающая все формы доверия, включая программное и аппаратное обеспечение
  - Система, в которой транзакции не могут быть отменены или оспорены кем-либо
explanation: |
  Trustless относится именно к техническому свойству, когда распределенная система может корректно функционировать, не требуя доверенных сторон. Это отличается от устранения всякого доверия (вы все равно доверяете своему программному/аппаратному обеспечению) или предотвращения обратного хода (транзакции Bitcoin могут быть отменены путем переписывания цепочки). Этот термин также не означает, что пользователи не могут доверять участникам - скорее, корректность системы не зависит от доверия к ним.
question: 피터 우일의 정의에 따르면 분산 시스템에서 '신뢰할 수 없다'는 것은 무엇을 의미할까요?
answer: 신뢰할 수 있는 당사자가 없어도 제대로 작동하는 시스템
wrong_answers:
  - 사용자가 참가자 또는 검증자를 신뢰할 수 없는 시스템
  - 소프트웨어와 하드웨어를 포함한 모든 형태의 신뢰를 제거하는 시스템
  - 누구도 거래를 되돌리거나 이의를 제기할 수 없는 시스템
explanation: |
  Trustless은 특히 신뢰할 수 있는 당사자 없이도 분산 시스템이 올바르게 작동할 수 있는 기술적 속성을 의미합니다. 이는 모든 신뢰를 제거(소프트웨어/하드웨어를 여전히 신뢰)하거나 되돌릴 수 없도록 하는 것과는 다릅니다(Bitcoin 트랜잭션은 체인 재작성을 통해 되돌릴 수 있음). 또한 이 용어는 사용자가 참여자를 신뢰할 수 없다는 뜻이 아니라, 시스템의 정확성이 참여자를 신뢰하는 것에 달려 있지 않다는 의미입니다.
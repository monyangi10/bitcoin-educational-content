question: 根據 Pieter Wuille 的定義，在分散式系統中，「無信任」是指什麼？
answer: 不需要任何受信任方即可正常運作的系統
wrong_answers:
  - 使用者無法信任任何參與者或驗證者的系統
  - 消除所有形式信任（包括軟體和硬體）的系統
  - 任何人都無法推翻或反駁交易的系統
explanation: |
  Trustless 特指一種技術屬性，分佈式系統可以在不需要任何受信任方的情況下正常運作。這與消除所有信任（您仍然信任您的軟體/硬體）或防止逆轉（Bitcoin 交易可透過鏈重寫逆轉）不同。這個詞也不表示使用者不能信任參與者 - 而是系統的正確性並不取決於是否信任參與者。
reviewed: false

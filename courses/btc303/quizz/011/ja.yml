question: Pieter Wuilleの定義によれば、分散化システムの文脈で「トラストレス」とは何を意味するのか？
answer: 正しく機能するために信頼された主体を必要としないシステム
wrong_answers:
  - 参加者や検証者の誰も信用できないシステム
  - ソフトウェア、ハードウェアを含むあらゆる形態の信頼を排除するシステム
  - トランザクションの取り消しや異議申し立てが誰にもできないシステム
explanation: |
  トラストレスとは、特に分散化システムが信頼できる主体を必要とせずに正しく機能する技術的特性を指す。これは、すべての信頼を排除すること（ソフトウェアやハードウェアはまだ信頼できる）や、逆転を防ぐこと（ビットコイン・トランザクションはチェーンの書き換えによって逆転できる）とは異なる。また、この用語は、ユーザーが参加者を信頼できないという意味ではなく、システムの正しさが参加者の信頼に依存しないという意味である。
reviewed: false

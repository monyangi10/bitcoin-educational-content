question: Според определението на Pieter Wuille какво означава "без нужда от доверие" в контекста на разпределените системи?
answer: Система, която не изисква доверени трети страни, за да функционира правилно
wrong_answers:
  - Система, в която потребителите не могат да се доверят на никой от участниците или валидаторите
  - Система, която елиминира всички форми на доверие, включително софтуер и хардуер
  - Система, при която транзакциите не могат да бъдат отменени или оспорени от никого
explanation: |
  Trustless се отнася конкретно до техническо свойство, при което разпределената система може да функционира правилно, без да изисква доверени трети страни. Това е различно от премахването на всякакво доверие (все още се доверявате на софтуера/хардуера си) или предотвратяването на обратни транзакции (транзакциите в Bitcoin могат да бъдат обърнати чрез презаписване на веригата). Терминът също така не означава, че потребителите не могат да се доверяват на участниците - по-скоро коректността на системата не зависи от доверието към тях.
reviewed: true

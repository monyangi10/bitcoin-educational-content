question: طبق تعریف پیتر ویلی، 'بدون نیاز به اعتماد' در زمینه سیستم‌های توزیع‌شده به چه معناست؟
answer: سیستمی که برای عملکرد صحیح به هیچ طرف معتمدی نیاز ندارد
wrong_answers:
  - سیستمی که در آن کاربران نمی‌توانند به هیچ‌یک از شرکت‌کنندگان یا اعتبارسنج‌ها اعتماد کنند
  - سیستمی که تمام اشکال اعتماد از جمله نرم‌افزار و سخت‌افزار را حذف می‌کند
  - سیستمی که در آن تراکنش‌ها نمی‌توانند توسط هیچ‌کس معکوس یا مورد اختلاف قرار گیرند
explanation: |
  Trustless به‌طور خاص به ویژگی فنی اشاره دارد که در آن یک سیستم توزیع‌شده می‌تواند بدون نیاز به هیچ طرف قابل اعتمادی به‌درستی عمل کند. این با حذف کامل اعتماد (شما هنوز به نرم‌افزار/سخت‌افزار خود اعتماد دارید) یا جلوگیری از برگشت‌ها (تراکنش‌های Bitcoin می‌توانند از طریق بازنویسی زنجیره معکوس شوند) متفاوت است. این اصطلاح همچنین به این معنا نیست که کاربران نمی‌توانند به شرکت‌کنندگان اعتماد کنند - بلکه، درستی سیستم به اعتماد به آن‌ها وابسته نیست.
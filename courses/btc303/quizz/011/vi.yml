question: Theo định nghĩa của Pieter Wuille, "không cần tin cậy" có nghĩa là gì trong bối cảnh hệ thống phân tán?
answer: Một hệ thống không yêu cầu bất kỳ bên đáng tin cậy nào hoạt động chính xác
wrong_answers:
  - Một hệ thống mà người dùng không thể tin tưởng bất kỳ người tham gia hoặc người xác thực nào
  - Một hệ thống loại bỏ mọi hình thức tin cậy bao gồm cả phần mềm và phần cứng
  - Một hệ thống mà các giao dịch không thể bị đảo ngược hoặc tranh chấp bởi bất kỳ ai
explanation: |
  Trustless đề cập cụ thể đến một đặc tính kỹ thuật cho phép một hệ thống phân tán có thể hoạt động chính xác mà không cần bất kỳ bên thứ ba đáng tin cậy nào. Điều này khác với việc loại bỏ hoàn toàn sự tin cậy (bạn vẫn tin tưởng phần mềm/phần cứng của mình) hoặc ngăn chặn việc đảo ngược (các giao dịch Bitcoin có thể được đảo ngược thông qua việc viết lại chuỗi). Thuật ngữ này cũng không có nghĩa là người dùng không thể tin tưởng người tham gia - mà đúng hơn, tính chính xác của hệ thống không phụ thuộc vào việc tin tưởng họ.
reviewed: false

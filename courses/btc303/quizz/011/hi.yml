question: पीटर वुइले की परिभाषा के अनुसार, वितरित प्रणालियों के संदर्भ में 'विश्वासहीन' का क्या अर्थ है?
answer: एक ऐसी प्रणाली जिसे सही ढंग से काम करने के लिए किसी विश्वसनीय पक्ष की आवश्यकता नहीं होती
wrong_answers:
  - एक ऐसी प्रणाली जहाँ उपयोगकर्ता किसी भी प्रतिभागी या सत्यापनकर्ता पर भरोसा नहीं कर सकते
  - एक ऐसी प्रणाली जो सॉफ्टवेयर और हार्डवेयर सहित सभी प्रकार के विश्वास को समाप्त कर देती है
  - एक ऐसी प्रणाली जिसमें लेनदेन को किसी के द्वारा भी उलटा या विवादित नहीं किया जा सकता
explanation: |
  Trustless विशेष रूप से एक तकनीकी विशेषता को संदर्भित करता है जहाँ एक वितरित प्रणाली किसी भी विश्वसनीय पक्ष की आवश्यकता के बिना सही ढंग से कार्य कर सकती है। यह सभी विश्वासों को समाप्त करने (आप अभी भी अपने सॉफ़्टवेयर/हार्डवेयर पर भरोसा करते हैं) या उलटफेर को रोकने (Bitcoin लेनदेन को श्रृंखला पुनर्लेखन के माध्यम से उलटा जा सकता है) से अलग है। इस शब्द का अर्थ यह भी नहीं है कि उपयोगकर्ता प्रतिभागियों पर भरोसा नहीं कर सकते - बल्कि, सिस्टम की शुद्धता उन पर भरोसा करने पर निर्भर नहीं करती है।
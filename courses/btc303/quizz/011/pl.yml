question: Zgodnie z definicją Pietera Wuille'a, co oznacza "brak zaufania" w kontekście systemów rozproszonych?
answer: System, który do poprawnego działania nie wymaga żadnych zaufanych stron
wrong_answers:
  - System, w którym użytkownicy nie mogą ufać żadnemu z uczestników lub walidatorów
  - System, który eliminuje wszelkie formy zaufania, w tym oprogramowanie i sprzęt
  - System, w którym transakcje nie mogą być przez nikogo cofnięte ani zakwestionowane
explanation: |
  Trustless odnosi się konkretnie do właściwości technicznej, w której system rozproszony może działać poprawnie bez konieczności posiadania zaufanych stron. Różni się to od wyeliminowania wszelkiego zaufania (nadal ufasz swojemu oprogramowaniu / sprzętowi) lub zapobiegania odwróceniu (transakcje Bitcoin można odwrócić poprzez przepisanie łańcucha). Termin ten nie oznacza również, że użytkownicy nie mogą ufać uczestnikom - poprawność systemu nie zależy od zaufania do nich.
reviewed: false

question: ตามคำจำกัดความของ Pieter Wuille 'trustless' ในบริบทของระบบกระจายหมายถึงอะไร?
answer: ระบบที่ไม่ต้องการบุคคลที่เชื่อถือได้ใดๆ ในการทำงานอย่างถูกต้อง
wrong_answers:
  - ระบบที่ผู้ใช้ไม่สามารถไว้วางใจผู้เข้าร่วมใด ๆ หรือผู้ตรวจสอบ
  - ระบบที่กำจัดรูปแบบของความไว้วางใจทั้งหมดรวมถึงซอฟต์แวร์และฮาร์ดแวร์
  - ระบบที่ไม่สามารถย้อนกลับหรือโต้แย้งธุรกรรมได้โดยใครก็ตาม
explanation: |
  Trustless หมายถึงคุณสมบัติทางเทคนิคที่ระบบกระจายสามารถทำงานได้อย่างถูกต้องโดยไม่ต้องพึ่งพาบุคคลที่เชื่อถือได้ใด ๆ ซึ่งแตกต่างจากการกำจัดความไว้วางใจทั้งหมด (คุณยังคงไว้วางใจซอฟต์แวร์/ฮาร์ดแวร์ของคุณ) หรือการป้องกันการย้อนกลับ (ธุรกรรม Bitcoin สามารถย้อนกลับได้ผ่านการเขียนใหม่ของเชน) คำนี้ยังไม่ได้หมายความว่าผู้ใช้ไม่สามารถไว้วางใจผู้เข้าร่วมได้ - แต่ความถูกต้องของระบบไม่ได้ขึ้นอยู่กับการไว้วางใจพวกเขา
reviewed: false
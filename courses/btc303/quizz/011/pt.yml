question: De acordo com a definição de Pieter Wuille, o que significa "sem confiança" no contexto dos sistemas distribuídos?
answer: Um sistema que não necessita de terceiros de confiança para funcionar corretamente
wrong_answers:
  - Um sistema em que os utilizadores não podem confiar em nenhum dos participantes ou validadores
  - Um sistema que elimina todas as formas de confiança, incluindo software e hardware
  - Um sistema em que as transacções não podem ser revertidas ou contestadas por ninguém
explanation: |
  O Trustless refere-se especificamente a uma propriedade técnica em que um sistema distribuído pode funcionar corretamente sem necessitar de quaisquer partes de confiança. Isto é diferente de eliminar toda a confiança (continua a confiar no seu software/hardware) ou de impedir reversões (as transacções Bitcoin podem ser revertidas através de reescritas da cadeia). O termo também não significa que os utilizadores não possam confiar nos participantes - pelo contrário, a correção do sistema não depende da confiança neles.
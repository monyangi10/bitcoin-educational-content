question: Mekanisme apa yang memastikan batas pasokan Bitcoin ditegakkan tanpa memerlukan kepercayaan pada otoritas pusat?
answer: Node penuh yang menjalankan kode verifikasi yang secara otomatis menolak blok dengan transaksi coinbase yang tidak valid
wrong_answers:
  - Algoritme konsensus terdistribusi yang membutuhkan persetujuan mayoritas untuk setiap perubahan pasokan
  - Kriptografi proof-of-work yang secara matematis mencegah pembuatan koin berlebih
  - Validator jaringan yang memberikan suara untuk keabsahan transaksi melalui proses yang demokratis
explanation: |
  Batas suplai Bitcoin diberlakukan melalui node penuh yang menjalankan kode verifikasi untuk memeriksa setiap transaksi coinbase blok terhadap aturan konsensus. Bahkan jika beberapa node berubah menjadi jahat dan menerima blok yang tidak valid dengan hadiah yang berlebihan, node yang jujur akan mengabaikannya dan melanjutkan rantai yang valid. Hal ini menciptakan sebuah sistem tanpa kepercayaan di mana Anda tidak perlu mempercayai individu atau otoritas mana pun - Anda hanya perlu menjalankan kode yang memverifikasi aturan yang diikuti, membuat jaringan secara kolektif aman dari upaya penggelembungan pasokan.
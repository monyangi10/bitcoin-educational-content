question: どのようなメカニズムが、中央主体を信頼することなく、ビットコインの供給制限を確実に実施するのか？
answer: 無効なコインベース（Coinbase）・トランザクションのあるブロックを自動的に拒否する検証コードを実行しているフルノード
wrong_answers:
  - 供給量の変更には過半数の承認が必要な分散型コンセンサス・アルゴリズム
  - 余剰コインの生成を数学的に防止する暗号プルーフ・オブ・ワーク（PoW）
  - 民主的プロセスを通じてトランザクションの有効性に投票するネットワーク・バリデーター
explanation: |
  ビットコインの供給制限は、すべてのブロックのコインベース・トランザクションをコンセンサスルールと照合する検証コードを実行する完全なノードによって実施される。一部のノードが悪意を持って無効なブロックを受け入れ、過剰な報酬を受け取ったとしても、正直なノードはそれらを無視し、有効なチェーンを継続するだけです。このため、個人や権威を信頼する必要がなく、ルールが守られていることを検証するコードを実行するだけで済むトラストレス・システムが構築され、供給インフレの試みに対してネットワークが集合的に安全になる。
reviewed: false

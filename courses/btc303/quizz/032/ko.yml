question: 중앙 기관에 대한 신뢰 없이 Bitcoin의 공급 제한을 시행할 수 있는 메커니즘은 무엇인가요?
answer: 유효하지 않은 코인베이스 트랜잭션이 포함된 블록을 자동으로 거부하는 검증 코드를 실행하는 전체 노드
wrong_answers:
  - 공급 변경에 대해 과반수의 승인이 필요한 분산 합의 알고리즘
  - 과도한 코인 생성을 수학적으로 방지하는 암호화 proof-of-work
  - 민주적 절차를 통해 거래 유효성에 투표하는 네트워크 검증자
explanation: |
  Bitcoin의 공급 제한은 모든 블록의 코인베이스 거래를 합의 규칙에 따라 확인하는 검증 코드를 실행하는 풀 노드를 통해 시행됩니다. 일부 노드가 악의적으로 변해 과도한 보상이 포함된 유효하지 않은 블록을 수락하더라도, 정직한 노드는 이를 무시하고 유효한 체인을 계속 진행합니다. 이렇게 하면 개인이나 기관을 신뢰할 필요 없이 규칙이 준수되고 있는지 확인하는 코드만 실행하면 되는 신뢰 없는 시스템이 만들어지며, 네트워크는 공급 인플레이션 시도로부터 총체적으로 안전해집니다.
reviewed: false

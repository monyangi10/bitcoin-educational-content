question: چه مکانیزمی تضمین می‌کند که محدودیت عرضه Bitcoin بدون نیاز به اعتماد به هیچ مرجع مرکزی اجرا شود؟
answer: نودهای کامل که کد تأیید را اجرا می‌کنند و به‌طور خودکار بلاک‌هایی با تراکنش‌های کوین‌بیس نامعتبر را رد می‌کنند
wrong_answers:
  - یک الگوریتم اجماع توزیع‌شده که نیاز به تأیید اکثریت برای هرگونه تغییر در عرضه دارد
  - proof-of-work رمزنگاری که به‌طور ریاضی از ایجاد سکه‌های اضافی جلوگیری می‌کند
  - اعتبارسنج‌های شبکه که از طریق یک فرآیند دموکراتیک بر اعتبار تراکنش‌ها رأی می‌دهند
explanation: |
  حد عرضه Bitcoin از طریق نودهای کامل که کد تأیید را اجرا می‌کنند تا تراکنش کوین‌بیس هر بلوک را با قوانین اجماع بررسی کنند، اعمال می‌شود. حتی اگر برخی نودها مخرب شوند و بلوک‌های نامعتبر با پاداش‌های بیش از حد را بپذیرند، نودهای صادق به سادگی آن‌ها را نادیده می‌گیرند و با زنجیره معتبر ادامه می‌دهند. این یک سیستم بدون نیاز به اعتماد ایجاد می‌کند که در آن نیازی به اعتماد به هیچ فرد یا مرجعی ندارید - تنها نیاز است کدی را اجرا کنید که تأیید کند قوانین رعایت می‌شوند، و این شبکه را به صورت جمعی در برابر تلاش‌های تورم عرضه ایمن می‌سازد.
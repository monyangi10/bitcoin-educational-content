question: Ni ubuhe buryo butuma umupaka w’ivyo Bitcoin itanga ushirwa mu ngiro ata kwizigira ubutegetsi bwo hagati busaba?
answer: Ivyuma vyuzuye bikoresha kode y'igenzura ihita yanse amabuye n'ibikorwa bitagira akamaro vya coinbase
wrong_answers:
  - Uburyo bwo kwumvikana busanzwe busaba kwemezwa na benshi ku mahinduka yose yo gutanga
  - Cryptographic proof-of-work ibuza mu mibare kurema ibiceri birenze urugero
  - Abagenzuzi b'urubuga batora ku kwemeza kw'ibikorwa biciye mu nzira ya demokarasi
explanation: |
  Igitigiri c’ugutanga ca Bitcoin gishirwa mu ngiro biciye ku nzira zishitse zikoresha kode y’ukugenzura kugira ngo zisuzume ubucuruzi bw’amahera y’ibarabara ryose n’amategeko y’uguhurizako. Naho ama node amwe amwe yohinduka akabi maze yemera ama blocs atagira akamaro afise impembo zirenze urugero, ama node y’ukuri azovyirengagiza gusa maze abandanye n’uruzitiro rufise akamaro. Ivyo bituma haba uburyo butagira icizigiro aho udakeneye kwizigira umuntu canke ubutegetsi ubwo ari bwo bwose - ukeneye gusa gukoresha kode igenzura ko amategeko ariko arakurikizwa, bigatuma urubuga rwose rukingira ivy’ugutera imbere kw’ibiciro.

question: Quel mécanisme garantit que la limite d'approvisionnement de Bitcoin est respectée sans qu'il soit nécessaire de faire confiance à une autorité centrale ?
answer: Nœuds complets exécutant un code de vérification qui rejette automatiquement les blocs contenant des transactions coinbase invalides
wrong_answers:
  - Un algorithme de consensus distribué qui requiert l'approbation de la majorité pour toute modification de l'offre
  - Cryptographie proof-of-work qui empêche mathématiquement la création de pièces excédentaires
  - Les validateurs de réseau qui votent sur la validité des transactions par le biais d'un processus démocratique
explanation: |
  La limite d'approvisionnement de Bitcoin est appliquée par des nœuds complets qui exécutent un code de vérification pour contrôler la transaction coinbase de chaque bloc par rapport aux règles du consensus. Même si certains nœuds deviennent malveillants et acceptent des blocs invalides avec des récompenses excessives, les nœuds honnêtes les ignoreront simplement et continueront avec la chaîne valide. Cela crée un système sans confiance où il n'est pas nécessaire de faire confiance à un individu ou à une autorité - il suffit d'exécuter un code qui vérifie que les règles sont respectées, ce qui rend le réseau collectivement sûr contre les tentatives d'inflation de l'offre.
reviewed: false

question: Какъв механизъм гарантира, че ограничението на предлагането на Bitcoin се прилага, без да се изисква доверие в централен орган?
answer: Пълни възли с код за проверка, който автоматично отхвърля блокове с невалидни транзакции
wrong_answers:
  - Алгоритъм за разпределен консенсус, който изисква одобрение с мнозинство за всякакви промени в доставките
  - Криптографски proof-of-work, който математически предотвратява създаването на излишни монети
  - Мрежови валидатори, които гласуват за валидността на транзакциите чрез демократичен процес
explanation: |
  Ограничението на предлагането на Bitcoin се налага чрез пълни възли, които изпълняват код за проверка, за да проверят coinbase транзакцията на всеки блок спрямо правилата на консенсуса. Дори ако някои възли станат злонамерени и приемат невалидни блокове с прекомерни възнаграждения, честните възли просто ще ги игнорират и ще продължат с валидната верига. По този начин се създава система без доверие, при която не е необходимо да се доверявате на някое лице или орган - необходимо е само да стартирате код, който проверява спазването на правилата, което прави мрежата колективно защитена срещу опити за инфлация на предлагането.
reviewed: true

question: 有什麼機制可以確保 Bitcoin 的供應量限制在不需要信任任何中央機關的情況下得以執行？
answer: 完整節點執行驗證碼，自動拒絕無效的 coinbase 交易區塊
wrong_answers:
  - 分散式共識演算法，任何供應變更都需要大多數人同意
  - 加密 proof-of-work 在數學上可防止產生過量硬幣
  - 透過民主程序對交易有效性進行投票的網路驗證員
explanation: |
  Bitcoin 的供應限制是透過執行驗證碼的完整節點來強制執行，以根據共識規則檢查每個區塊的 coinbase 交易。即使有些節點變得惡意，接受過多獎勵的無效區塊，誠實的節點也會直接忽略它們，繼續有效的鏈。這創造了一個無信任的系統，您不需要信任任何個人或機構 - 您只需要執行驗證代碼來驗證規則是否被遵守，使網路整體安全，避免供應膨脹的企圖。
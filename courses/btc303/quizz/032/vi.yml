question: Cơ chế nào đảm bảo giới hạn cung cấp của Bitcoin được thực thi mà không cần phải tin tưởng vào bất kỳ cơ quan trung ương nào?
answer: Các nút đầy đủ chạy mã xác minh tự động từ chối các khối có giao dịch coinbase không hợp lệ
wrong_answers:
  - Một thuật toán đồng thuận phân tán đòi hỏi sự chấp thuận của đa số đối với bất kỳ thay đổi cung cấp nào
  - proof-of-work mã hóa dùng toán học để ngăn chặn việc tạo ra các đồng tiền thừa
  - Các trình xác thực mạng bỏ phiếu về tính hợp lệ của giao dịch thông qua một quy trình dân chủ
explanation: |
  Giới hạn nguồn cung của Bitcoin được thực thi thông qua các nút đầy đủ chạy mã xác minh để kiểm tra giao dịch coinbase của từng khối so với các quy tắc đồng thuận. Ngay cả khi một số nút trở nên độc hại và chấp nhận các khối không hợp lệ với phần thưởng quá mức, các nút trung thực sẽ đơn giản bỏ qua chúng và tiếp tục với chuỗi hợp lệ. Điều này tạo ra một hệ thống không cần tin cậy, nơi bạn không cần phải tin tưởng bất kỳ cá nhân hay cơ quan nào - bạn chỉ cần chạy mã xác minh các quy tắc đang được tuân thủ, giúp mạng lưới được bảo mật tổng thể trước các nỗ lực lạm phát nguồn cung.

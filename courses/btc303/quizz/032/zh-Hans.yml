question: 什么机制能确保 Bitcoin 的供应限制得到执行，而不需要信任任何中央机构？
answer: 全节点运行验证码，自动拒绝无效的 coinbase 交易区块
wrong_answers:
  - 分布式共识算法，任何供应变化都需要多数人批准
  - 加密 proof-of-work 从数学上防止产生多余的硬币
  - 通过民主程序对交易有效性进行投票的网络验证器
explanation: |
  Bitcoin 的供应限制是通过运行验证代码的完整节点来执行的，这些节点会根据共识规则检查每个区块的币基交易。即使有些节点变成了恶意节点，接受了奖励过高的无效区块，诚实的节点也会直接忽略它们，继续执行有效链。这就创建了一个无需信任任何个人或机构的无信任系统--你只需运行代码来验证规则是否被遵守，从而使网络共同抵御供应膨胀的企图。
question: कौन सी प्रणाली यह सुनिश्चित करती है कि Bitcoin की आपूर्ति सीमा को किसी केंद्रीय प्राधिकरण पर विश्वास किए बिना लागू किया जाए?
answer: पूर्ण नोड्स सत्यापन कोड चला रहे हैं जो अमान्य कॉइनबेस लेनदेन वाले ब्लॉकों को स्वचालित रूप से अस्वीकार कर देता है
wrong_answers:
  - एक वितरित सर्वसम्मति एल्गोरिथ्म जिसे किसी भी आपूर्ति परिवर्तन के लिए बहुमत की स्वीकृति की आवश्यकता होती है
  - क्रिप्टोग्राफ़िक proof-of-work जो ​​गणितीय रूप से अतिरिक्त सिक्कों के निर्माण को रोकता है
  - नेटवर्क सत्यापनकर्ता जो लोकतांत्रिक प्रक्रिया के माध्यम से लेनदेन की वैधता पर मतदान करते हैं
explanation: |
  Bitcoin की आपूर्ति सीमा पूर्ण नोड्स के माध्यम से लागू की जाती है जो प्रत्येक ब्लॉक के कॉइनबेस लेनदेन को सर्वसम्मति नियमों के विरुद्ध जाँचने के लिए सत्यापन कोड चलाते हैं। भले ही कुछ नोड्स दुर्भावनापूर्ण हो जाएँ और अत्यधिक पुरस्कारों वाले अमान्य ब्लॉक स्वीकार कर लें, ईमानदार नोड्स उन्हें अनदेखा कर देंगे और मान्य श्रृंखला के साथ जारी रहेंगे। यह एक अविश्वसनीय प्रणाली बनाता है जहाँ आपको किसी व्यक्ति या प्राधिकरण पर भरोसा करने की आवश्यकता नहीं है - आपको केवल नियमों के पालन की पुष्टि करने वाला कोड चलाने की आवश्यकता है, जिससे नेटवर्क सामूहिक रूप से आपूर्ति वृद्धि के प्रयासों से सुरक्षित हो जाता है।
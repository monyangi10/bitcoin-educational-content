question: Какой механизм обеспечивает соблюдение лимита поставок Bitcoin, не требуя доверия к какому-либо центральному органу?
answer: Полные узлы с кодом верификации, который автоматически отклоняет блоки с недействительными транзакциями coinbase
wrong_answers:
  - Алгоритм распределенного консенсуса, требующий одобрения большинством голосов для любых изменений в поставках
  - Криптографическая proof-of-work, которая математически предотвращает создание избыточных монет
  - Сетевые валидаторы, которые голосуют за валидность транзакций посредством демократического процесса
explanation: |
  Ограничение предложения Bitcoin обеспечивается за счет полных узлов, которые запускают код верификации для проверки каждой транзакции блока coinbase на соответствие правилам консенсуса. Даже если некоторые узлы окажутся злонамеренными и примут недействительные блоки с завышенным вознаграждением, честные узлы просто проигнорируют их и продолжат работу с действующей цепочкой. Таким образом, создается система без доверия, в которой не нужно доверять какому-либо лицу или органу власти - достаточно запустить код, проверяющий соблюдение правил, что делает сеть коллективно защищенной от попыток раздувания предложения.

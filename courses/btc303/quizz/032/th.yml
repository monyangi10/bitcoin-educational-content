question: กลไกใดที่รับประกันการจำกัดอุปทานของ Bitcoin โดยไม่ต้องพึ่งพาความไว้วางใจในหน่วยงานกลางใด ๆ?
answer: โหนดเต็มที่รันโค้ดยืนยันที่ปฏิเสธบล็อกที่มีธุรกรรม coinbase ไม่ถูกต้องโดยอัตโนมัติ
wrong_answers:
  - อัลกอริธึมฉันทามติแบบกระจายที่ต้องการการอนุมัติจากเสียงข้างมากสำหรับการเปลี่ยนแปลงอุปทานใด ๆ
  - Cryptographic proof-of-work ที่ป้องกันการสร้างเหรียญเกินจำนวนด้วยคณิตศาสตร์
  - ผู้ตรวจสอบเครือข่ายที่ลงคะแนนเสียงเกี่ยวกับความถูกต้องของธุรกรรมผ่านกระบวนการประชาธิปไตย
explanation: |
  ขีดจำกัดการจัดหาของ Bitcoin ถูกบังคับใช้ผ่านโหนดเต็มที่รันโค้ดการตรวจสอบเพื่อเช็คการทำธุรกรรมของ coinbase ในแต่ละบล็อกตามกฎของฉันทามติ แม้ว่าโหนดบางส่วนจะกลายเป็นอันตรายและยอมรับบล็อกที่ไม่ถูกต้องที่มีรางวัลเกินกำหนด โหนดที่ซื่อสัตย์จะเพิกเฉยต่อบล็อกเหล่านั้นและดำเนินการต่อกับเชนที่ถูกต้อง สิ่งนี้สร้างระบบที่ไม่ต้องพึ่งพาความไว้วางใจที่คุณไม่จำเป็นต้องเชื่อถือบุคคลหรือหน่วยงานใด ๆ - คุณเพียงแค่ต้องรันโค้ดที่ตรวจสอบว่ากฎถูกปฏิบัติตาม ทำให้เครือข่ายมีความปลอดภัยร่วมกันต่อความพยายามในการเพิ่มอุปทานเกินกำหนด
reviewed: false
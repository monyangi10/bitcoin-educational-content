question: В чем основное техническое отличие репозитория Bitcoin Core на GitHub от тысяч других копий того же репозитория, распространенных по всему миру?
answer: Технической разницы нет, она служит социальным центром развития удобств
wrong_answers:
  - Репозиторий GitHub содержит криптографические подписи, удостоверяющие, что это официальная версия
  - Репозиторий GitHub имеет специальные привилегии фиксации, которые предотвращают несанкционированные изменения кодовой базы
  - В репозитории GitHub хранится мастер-ключ, который проверяет все остальные копии репозитория по всему миру
explanation: |
  Согласно анализу Джеймсона Лоппа, приведенному в этой главе, репозиторий Bitcoin Core на GitHub технически идентичен всем остальным копиям. Его значение чисто социальное - он стал центром координации разработки. Репозиторий служит скорее для удобства, чем для технического авторитета, и если бы он исчез, то естественным образом возник бы новый координационный центр. Это свидетельствует о децентрализованной природе Bitcoin, где ни одно хранилище не имеет технического превосходства над другими.

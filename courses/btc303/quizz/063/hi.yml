question: Bitcoin Core के GitHub रिपॉजिटरी और वैश्विक स्तर पर वितरित उसी रिपॉजिटरी की हजारों अन्य प्रतियों के बीच प्राथमिक तकनीकी अंतर क्या है?
answer: इसमें कोई तकनीकी अंतर नहीं है; यह विकास की सुविधा के लिए एक सामाजिक केंद्र बिंदु के रूप में कार्य करता है
wrong_answers:
  - GitHub रिपॉजिटरी में क्रिप्टोग्राफ़िक हस्ताक्षर हैं जो इसे आधिकारिक संस्करण के रूप में प्रमाणित करते हैं
  - GitHub रिपॉजिटरी में विशेष प्रतिबद्ध विशेषाधिकार हैं जो कोडबेस में अनधिकृत संशोधनों को रोकते हैं
  - GitHub रिपॉजिटरी एक मास्टर कुंजी बनाए रखती है जो दुनिया भर में अन्य सभी रिपॉजिटरी प्रतियों को मान्य करती है
explanation: |
  अध्याय में उद्धृत जेम्सन लोप के विश्लेषण के अनुसार, Bitcoin कोर का GitHub रिपॉजिटरी तकनीकी रूप से अन्य सभी प्रतियों के समान है। इसका महत्व विशुद्ध रूप से सामाजिक है - यह विकास समन्वय का केंद्र बिंदु बन गया है। यह रिपॉजिटरी तकनीकी प्राधिकरण के बजाय सुविधा का विषय है, और यदि यह गायब हो जाता है, तो स्वाभाविक रूप से एक नया केंद्र बिंदु उभरेगा। यह Bitcoin की विकेन्द्रीकृत प्रकृति को दर्शाता है जहाँ किसी भी एक रिपॉजिटरी का दूसरों पर तकनीकी प्रभुत्व नहीं है।
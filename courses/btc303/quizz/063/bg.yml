question: Каква е основната техническа разлика между хранилището на Bitcoin Core в GitHub и хилядите други копия на същото хранилище, разпространени в световен мащаб?
answer: Няма техническа разлика; тя служи като социален център за развитие
wrong_answers:
  - Хранилището на GitHub съдържа криптографски подписи, които го удостоверяват като официална версия
  - Хранилището на GitHub има специални привилегии за предаване, които предотвратяват неоторизирани промени в базата данни
  - Хранилището на GitHub поддържа главен ключ, който валидира всички останали копия на хранилището по света
explanation: |
  Според анализа на Джеймсън Лоп, цитиран в главата, хранилището на Bitcoin Core в GitHub е технически идентично с всички останали копия. Значението му е чисто социално - то се е превърнало в централна точка за координация на разработката. Хранилището служи по-скоро за удобство, отколкото за технически авторитет, и ако изчезне, естествено ще се появи нова фокусна точка. Това показва децентрализирания характер на Bitcoin, при който нито едно хранилище няма техническо превъзходство над другите.
reviewed: false

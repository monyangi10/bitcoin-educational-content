question: ความแตกต่างทางเทคนิคหลักระหว่างที่เก็บ GitHub ของ Bitcoin Core และสำเนาอื่น ๆ นับพันของที่เก็บเดียวกันที่แจกจ่ายทั่วโลกคืออะไร?
answer: ไม่มีความแตกต่างทางเทคนิค; มันทำหน้าที่เป็นจุดศูนย์กลางทางสังคมเพื่อความสะดวกในการพัฒนา
wrong_answers:
  - ที่เก็บ GitHub มีลายเซ็นการเข้ารหัสที่ยืนยันว่าเป็นเวอร์ชันอย่างเป็นทางการ
  - ที่เก็บ GitHub มีสิทธิพิเศษในการคอมมิตที่ป้องกันการแก้ไขที่ไม่ได้รับอนุญาตในฐานรหัส
  - ที่เก็บ GitHub มีคีย์หลักที่ตรวจสอบความถูกต้องของสำเนาที่เก็บอื่น ๆ ทั่วโลก
explanation: |
  ตามการวิเคราะห์ของ Jameson Lopp ที่อ้างถึงในบทนี้ ที่เก็บ GitHub ของ Bitcoin Core นั้นมีความเหมือนกันทางเทคนิคกับสำเนาอื่น ๆ ทั้งหมด ความสำคัญของมันเป็นเรื่องทางสังคมล้วน ๆ - มันได้กลายเป็นจุดศูนย์กลางสำหรับการประสานงานการพัฒนา ที่เก็บนี้ทำหน้าที่เป็นเรื่องของความสะดวกสบายมากกว่าการมีอำนาจทางเทคนิค และหากมันหายไป จุดศูนย์กลางใหม่ก็จะเกิดขึ้นตามธรรมชาติ สิ่งนี้แสดงให้เห็นถึงธรรมชาติแบบกระจายอำนาจของ Bitcoin ที่ไม่มีที่เก็บใดมีอำนาจทางเทคนิคเหนือกว่าที่เก็บอื่น ๆ
reviewed: false
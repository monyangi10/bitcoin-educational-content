question: Bitcoin Core 的 GitHub 代码库与分布在全球的成千上万个相同代码库的其他副本之间的主要技术区别是什么？
answer: 在技术上没有区别；它是促进发展的社会重点。
wrong_answers:
  - GitHub 仓库包含加密签名，可证明其为正式版本
  - GitHub 仓库具有特殊的提交权限，可防止对代码库进行未经授权的修改
  - GitHub 仓库维护一个主密钥，用于验证全球所有其他仓库副本
explanation: |
  根据本章引用的 Jameson Lopp 的分析，Bitcoin Core 的 GitHub 仓库在技术上与所有其他副本完全相同。它的意义纯粹是社会性的--它已成为开发协调的重点。如果它消失了，自然会有新的协调中心出现。这表明了比特币的去中心化特性，没有任何单一代码仓库在技术上凌驾于其他副本之上。

question: Bitcoin Core 的 GitHub 儲存庫與分佈在全球的其他數千個相同儲存庫副本之間的主要技術差異是什麼？
answer: 沒有技術上的差異；它是發展便利的社會焦點。
wrong_answers:
  - GitHub 儲存庫包含加密簽章，可驗證其為官方版本
  - GitHub 倉庫具有特殊的提交權限，可防止未經授權修改程式碼庫
  - GitHub 儲存庫維護一個主密鑰，用以驗證全球所有其他儲存庫副本
explanation: |
  根據本章引用的 Jameson Lopp 的分析，Bitcoin Core 的 GitHub 儲存庫在技術上與所有其他副本完全相同。它的意義純粹是社會性的 - 它已成為開發協調的焦點。儲存庫的作用是方便而非技術權威，如果它消失了，自然會有新的焦點出現。這顯示出 Bitcoin 的分散性，沒有一個儲存庫在技術上凌駕於其他儲存庫。
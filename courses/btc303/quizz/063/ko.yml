question: Bitcoin Core의 GitHub 리포지토리와 전 세계에 배포된 수천 개의 다른 동일한 리포지토리 사본 간의 주요 기술적 차이점은 무엇인가요?
answer: 기술적인 차이는 없으며, 개발 편의를 위한 사회적 구심점 역할을 합니다
wrong_answers:
  - GitHub 리포지토리에는 공식 버전임을 인증하는 암호화 서명이 포함되어 있습니다
  - GitHub 리포지토리에는 코드베이스에 대한 무단 수정을 방지하는 특별한 커밋 권한이 있습니다
  - GitHub 리포지토리는 전 세계의 다른 모든 리포지토리 사본의 유효성을 검사하는 마스터 키를 유지합니다
explanation: |
  이 장에서 인용한 제임슨 롭의 분석에 따르면 Bitcoin Core의 GitHub 리포지토리는 기술적으로 다른 모든 사본과 동일합니다. 이 리포지토리의 중요성은 순전히 사회적이며, 개발 조정의 중심이 되었습니다. 리포지토리는 기술적 권한보다는 편의성의 문제로 작용하며, 리포지토리가 사라지면 자연스럽게 새로운 구심점이 등장할 것입니다. 이는 하나의 리포지토리가 다른 리포지토리보다 기술적 우위를 차지하지 않는 Bitcoin의 탈중앙화된 특성을 보여줍니다.

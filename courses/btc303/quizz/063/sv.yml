question: Vad är den primära tekniska skillnaden mellan Bitcoin Core's GitHub-arkiv och de tusentals andra kopiorna av samma arkiv som distribueras globalt?
answer: Det finns ingen teknisk skillnad; det fungerar som en social kontaktpunkt för utveckling av bekvämlighet
wrong_answers:
  - GitHub-förvaret innehåller kryptografiska signaturer som autentiserar det som den officiella versionen
  - GitHub-arkivet har särskilda commit-privilegier som förhindrar obehöriga ändringar av kodbasen
  - GitHub-förvaret upprätthåller en huvudnyckel som validerar alla andra förvarskopior över hela världen
explanation: |
  Enligt Jameson Lopps analys som citeras i kapitlet är Bitcoin Core's GitHub-arkiv tekniskt identiskt med alla andra kopior. Dess betydelse är rent social - det har blivit en central punkt för utvecklingssamordning. Förvaret fungerar som en bekvämlighetsfråga snarare än teknisk auktoritet, och om det försvann skulle en ny kontaktpunkt naturligtvis dyka upp. Detta visar på Bitcoin:s decentraliserade natur där ingen enskild databas har teknisk överlägsenhet över andra.
reviewed: false

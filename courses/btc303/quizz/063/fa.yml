question: تفاوت فنی اصلی بین مخزن GitHub هسته Bitcoin و هزاران نسخه دیگر از همان مخزن که به صورت جهانی توزیع شده‌اند چیست؟
answer: هیچ تفاوت فنی وجود ندارد؛ این به عنوان یک نقطه کانونی اجتماعی برای راحتی توسعه عمل می‌کند
wrong_answers:
  - مخزن GitHub شامل امضاهای رمزنگاری است که آن را به عنوان نسخه رسمی تأیید می‌کند.
  - مخزن GitHub دارای امتیازات ویژه‌ای برای تعهدات است که از تغییرات غیرمجاز در پایگاه کد جلوگیری می‌کند.
  - مخزن GitHub یک کلید اصلی را نگه می‌دارد که تمام نسخه‌های دیگر مخزن در سراسر جهان را تأیید می‌کند.
explanation: |
  بر اساس تحلیل جیمسون لاپ که در این فصل ذکر شده است، مخزن GitHub هسته Bitcoin از نظر فنی با تمام نسخه‌های دیگر یکسان است. اهمیت آن صرفاً اجتماعی است - این مخزن به نقطه تمرکز هماهنگی توسعه تبدیل شده است. این مخزن به عنوان یک مسئله راحتی عمل می‌کند نه اقتدار فنی، و اگر ناپدید شود، یک نقطه تمرکز جدید به طور طبیعی ظهور خواهد کرد. این موضوع ماهیت غیرمتمرکز Bitcoin را نشان می‌دهد که در آن هیچ مخزن واحدی برتری فنی بر دیگران ندارد.
reviewed: false

question: ビットコインコアのGitHubリポジトリと、世界中に分散している何千もの同じリポジトリの主な技術的な違いは何ですか？
answer: 技術的な違いはなく、発展のための社会的な中心点として機能している
wrong_answers:
  - GitHubリポジトリには、公式バージョンであることを認証する暗号署名が含まれている
  - GitHubリポジトリには、コードベースへの不正な変更を防ぐ特別なコミット権限がある
  - GitHubリポジトリは、世界中の他のリポジトリコピーを検証するマスターキーを保持している
explanation: |
  本章で引用したジェイムソン・ロップの分析によれば、ビットコインコアのGitHubリポジトリは、技術的には他のすべてのコピーと同一である。その意義は純粋に社会的なものであり、開発調整の中心となっている。このリポジトリは、技術的な権威というよりも、利便性の問題として機能しており、もしこのリポジトリがなくなれば、新しい中心的な場所が自然に現れるのみである。このことは、ビットコインが分散型であり、単一のリポジトリが他に対して技術的に優位に立つことがないことを示している。
reviewed: false

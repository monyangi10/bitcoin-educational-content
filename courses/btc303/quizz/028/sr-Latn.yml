question: Koja je primarna zabrinutost u vezi sa fee sniping-om kada se Bitcoin-ova blok subvencija približi nuli?
answer: Rudari mogu smatrati da je isplativije reogranizovati prethodne blokove sa visokim naknadama nego rudariti nove blokove
wrong_answers:
  - Naknade za transakcije postat će preskupe da bi ih obični korisnici mogli priuštiti za Bitcoin transakcije
  - Ukupna ponuda bitcoina premašiće 21 milion zbog povećanih podsticaja za rudarenje
  - Rudari će potpuno zaustaviti rudarenje jer same naknade za transakcije ne mogu pokriti troškove električne energije
explanation: |
  Fee sniping se dešava kada rudari pokušavaju ponovo da rudare prethodne blokove koji su sadržali transakcije sa visokim naknadama, umesto da pošteno 
  produžavaju lanac. Ovo postaje ekonomski racionalno kada naknade u prethodnom bloku značajno premašuju one u trenutnom mempool-u. Iako je verovatnoća 
  uspeha manja nego kod poštenog rudarenja, potencijalna nagrada može biti mnogo veća. Ovo ponašanje je posebno zabrinjavajuće jer može stvoriti lančani efekat 
  gde više rudara učestvuje u nepoštenim praksama, što na kraju ugrožava sigurnosni model Bitcoina kada se subvencije za blokove smanje.
reviewed: true

question: نگرانی اصلی با fee sniping زمانی که یارانه بلاک Bitcoin به صفر نزدیک می‌شود چیست؟
answer: ممکن است استخراج‌کنندگان دریابند که بازنویسی بلوک‌های قبلی با کارمزدهای بالا سودآورتر از mining بلوک‌های جدید باشد.
wrong_answers:
  - هزینه‌های تراکنش برای کاربران عادی جهت انجام تراکنش‌های Bitcoin بیش از حد گران خواهد شد.
  - عرض کل Bitcoin به دلیل افزایش مشوق‌های mining از 21 میلیون فراتر خواهد رفت.
  - ماینرها به طور کامل mining را متوقف خواهند کرد زیرا کارمزدهای تراکنش به تنهایی نمی‌تواند هزینه‌های برق را پوشش دهد.
explanation: |
  وقتی که ماینرها تلاش می‌کنند تا بلاک‌های قبلی که شامل تراکنش‌های با کارمزد بالا بودند را دوباره استخراج کنند به جای اینکه زنجیره را به‌طور صادقانه گسترش دهند، به این عمل "ربودن کارمزد" گفته می‌شود. این کار زمانی از نظر اقتصادی منطقی می‌شود که کارمزدها در یک بلاک قبلی به‌طور قابل توجهی بیشتر از کارمزدهای موجود در ممپول فعلی باشد. در حالی که احتمال موفقیت کمتر از mining صادقانه است، پاداش بالقوه می‌تواند بسیار بیشتر باشد. این رفتار به‌ویژه نگران‌کننده است زیرا می‌تواند یک اثر آبشاری ایجاد کند که در آن ماینرهای بیشتری به رفتارهای ناصادقانه روی می‌آورند و در نهایت مدل امنیتی Bitcoin را زمانی که یارانه‌های بلاک کاهش می‌یابد، تهدید می‌کند.
reviewed: false

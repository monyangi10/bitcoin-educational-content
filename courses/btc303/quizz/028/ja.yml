question: ビットコインのブロック報酬がゼロに近づいた時、手数料スナイピングの主な懸念事項は何か？
answer: マイナーは、マイニングの新しいブロックよりも、手数料の高い過去のブロックを書き換えた方が儲かると考えるかもしれないこと
wrong_answers:
  - トランザクション手数料が高くなり、一般ユーザーはビットコイン取引を行う余裕がなくなるかもしれないこと
  - マイニングのインセンティブ増加により、ビットコインの総供給量が2,100万を超えるかもしれないこと
  - トランザクション手数料だけでは電気代を賄えないため、マイナーはマイニングを完全に止めるかもしれないこと
explanation: |
  手数料スナイピングは、高手数料のトランザクションが含まれる以前のブロックをマイニングし直そうとする場合に発生する。これは、以前のブロック手数料が現在のメンプール（メモリープール）の手数料を大幅に上回ると、経済合理的になる。成功する確率は正直なマイニングより低いが、潜在的な報酬ははるかに高くなる可能性がある。この行動は、より多くのマイナーが不正な行為を行うだろうというカスケード効果を生み出し、最終的にブロック報酬が減少したときにビットコインのセキュリティモデルを脅かす可能性があるため、特に懸念される。
reviewed: false

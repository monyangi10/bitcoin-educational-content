question: Bitcoinのブロック補助金がゼロに近づいた時、料金スニピングの何が一番の懸念材料なのか？
answer: マイナーは、miningの新しいブロックよりも、手数料の高い過去のブロックを書き換えた方が儲かると考えるかもしれない。
wrong_answers:
  - 取引手数料が高くなり、一般ユーザーはBitcoin取引を行う余裕がなくなる。
  - miningのインセンティブ増加により、Bitcoinの総供給量は2,100万ドルを超える。
  - 取引手数料だけでは電気代を賄えないため、マイナーはminingを完全に止めるだろう
explanation: |
  フィー・スナイピングは、高フィーのトランザクションが含まれる以前のブロックを採掘し直そうとする場合に発生する。これは、以前のブロックの手数料が現在のメンプールの手数料を大幅に上回ると、経済的に合理的になる。成功する確率は正直なminingより低いが、潜在的な報酬ははるかに高くなる可能性がある。この行動は、より多くのマイナーが不正な行為を行うというカスケード効果を生み出し、最終的にブロック補助金が減少したときにBitcoinのセキュリティモデルを脅かす可能性があるため、特に懸念される。
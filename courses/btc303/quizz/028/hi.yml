question: जब Bitcoin की ब्लॉक सब्सिडी शून्य के करीब पहुंच जाती है, तो शुल्क कटौती के संबंध में प्राथमिक चिंता क्या है?
answer: खनिकों को mining नए ब्लॉकों के बजाय उच्च शुल्क के साथ पिछले ब्लॉकों को फिर से लिखना अधिक लाभदायक लग सकता है
wrong_answers:
  - नियमित उपयोगकर्ताओं के लिए Bitcoin लेनदेन शुल्क बहुत महंगा हो जाएगा
  - mining प्रोत्साहनों में वृद्धि के कारण Bitcoin की कुल आपूर्ति 21 मिलियन से अधिक हो जाएगी
  - खनिक mining को पूरी तरह से बंद कर देंगे क्योंकि अकेले लेनदेन शुल्क से बिजली की लागत को कवर नहीं किया जा सकता है
explanation: |
  शुल्क स्निपिंग तब होती है जब माइनर्स ईमानदारी से चेन का विस्तार करने के बजाय, उच्च-शुल्क वाले लेनदेन वाले पिछले ब्लॉक्स को फिर से माइन करने का प्रयास करते हैं। यह आर्थिक रूप से तर्कसंगत तब हो जाता है जब पिछले ब्लॉक में शुल्क वर्तमान मेमपूल की तुलना में काफी अधिक हो। हालाँकि सफलता की संभावना ईमानदार mining की तुलना में कम है, लेकिन संभावित इनाम बहुत अधिक हो सकता है। यह व्यवहार विशेष रूप से चिंताजनक है क्योंकि यह एक कैस्केड प्रभाव पैदा कर सकता है जहाँ अधिक माइनर्स बेईमानी से काम करते हैं, जो अंततः ब्लॉक सब्सिडी कम होने पर Bitcoin के सुरक्षा मॉडल के लिए खतरा बन जाता है।
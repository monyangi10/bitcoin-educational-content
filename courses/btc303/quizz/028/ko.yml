question: Bitcoin의 블록 보조금이 0에 가까워질 때 수수료 스나이핑의 주요 우려 사항은 무엇인가요?
answer: 채굴자는 mining 새 블록보다 높은 수수료로 이전 블록을 재작성하는 것이 더 수익성이 높을 수 있습니다
wrong_answers:
  - 거래 수수료가 너무 비싸져 일반 사용자가 Bitcoin 거래를 감당할 수 없게 됩니다
  - Bitcoin 인센티브 증가로 인해 mining의 총 공급량은 2,100만 개를 초과할 것입니다
  - 채굴자들은 거래 수수료만으로는 전기 비용을 충당할 수 없기 때문에 mining를 완전히 중단할 것입니다
explanation: |
  수수료 스나이핑은 채굴자가 정직하게 체인을 확장하지 않고 수수료가 높은 거래가 포함된 이전 블록을 다시 채굴하려고 시도할 때 발생합니다. 이는 이전 블록의 수수료가 현재 멤풀의 수수료를 크게 초과할 때 경제적으로 합리적입니다. 정직한 mining보다 성공 확률은 낮지만, 잠재적인 보상은 훨씬 더 높을 수 있습니다. 이러한 행동은 특히 우려스러운데, 더 많은 채굴자가 부정행위에 참여하여 블록 보조금이 줄어들면 궁극적으로 Bitcoin의 보안 모델을 위협하는 캐스케이드 효과를 일으킬 수 있기 때문입니다.

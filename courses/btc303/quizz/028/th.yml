question: ความกังวลหลักเกี่ยวกับการแย่งชิงค่าธรรมเนียมเมื่อเงินอุดหนุนบล็อกของ Bitcoin เข้าใกล้ศูนย์คืออะไร?
answer: นักขุดอาจพบว่ามันมีกำไรมากกว่าที่จะเขียนบล็อกก่อนหน้าที่มีค่าธรรมเนียมสูงใหม่แทนที่จะเป็นบล็อกใหม่ mining
wrong_answers:
  - ค่าธรรมเนียมการทำธุรกรรมจะมีราคาแพงเกินไปสำหรับผู้ใช้ทั่วไปที่จะสามารถจ่ายได้สำหรับการทำธุรกรรม Bitcoin
  - อุปทานรวมของ Bitcoin จะเกิน 21 ล้านเนื่องจากแรงจูงใจของ mining ที่เพิ่มขึ้น
  - นักขุดจะหยุด mining โดยสิ้นเชิงเพราะค่าธรรมเนียมการทำธุรกรรมเพียงอย่างเดียวไม่สามารถครอบคลุมค่าไฟฟ้าได้
explanation: |
  การแย่งค่าธรรมเนียมเกิดขึ้นเมื่อคนขุดเหมืองพยายามที่จะขุดบล็อกก่อนหน้าที่มีธุรกรรมค่าธรรมเนียมสูงอีกครั้งแทนที่จะขยายเชนอย่างซื่อสัตย์ สิ่งนี้กลายเป็นเรื่องที่มีเหตุผลทางเศรษฐกิจเมื่อค่าธรรมเนียมในบล็อกก่อนหน้าสูงกว่าค่าธรรมเนียมในเมมพูลปัจจุบันอย่างมาก แม้ว่าความน่าจะเป็นที่จะประสบความสำเร็จจะต่ำกว่าการขุด mining อย่างซื่อสัตย์ แต่รางวัลที่เป็นไปได้อาจสูงกว่ามาก พฤติกรรมนี้น่ากังวลเป็นพิเศษเพราะสามารถสร้างผลกระทบแบบลูกโซ่ที่ทำให้คนขุดเหมืองมากขึ้นมีส่วนร่วมในพฤติกรรมที่ไม่ซื่อสัตย์ ซึ่งในที่สุดจะคุกคามโมเดลความปลอดภัยของ Bitcoin เมื่อเงินอุดหนุนบล็อกลดลง
reviewed: false
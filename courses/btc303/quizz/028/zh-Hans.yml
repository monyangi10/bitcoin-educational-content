question: 当 Bitcoin 的区块补贴趋近于零时，收费狙击的主要问题是什么？
answer: 矿工可能会发现，用高额费用重写以前的区块比 mining 新区块更有利可图
wrong_answers:
  - 交易费用将变得过于昂贵，普通用户无法负担 Bitcoin 交易费用
  - 由于 mining 奖励措施的增加，Bitcoin 的总供应量将超过 2 100 万。
  - 矿工将完全停止 mining，因为仅靠交易费无法弥补电费成本
explanation: |
  当矿工试图重新挖掘包含高手续费交易的前一个区块，而不是诚实地延长链时，就会发生手续费狙击。当前一个区块的手续费大大超过当前内存池的手续费时，这种行为在经济上就变得合理了。虽然成功的概率低于诚实的 mining，但潜在的回报可能要高得多。这种行为尤其令人担忧，因为它会产生连带效应，让更多矿工参与不诚实行为，最终在区块补贴减少时威胁到 Bitcoin 的安全模式。
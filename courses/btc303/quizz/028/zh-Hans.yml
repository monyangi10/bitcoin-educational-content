question: 当比特币的区块补贴趋近于零时，费用狙击的主要问题是什么？
answer: 矿工可能会发现，重写包含高额手续费的先前区块，比继续挖掘新块更有利润。
wrong_answers:
  - 交易费用将变得过于昂贵，普通用户无法负担比特币交易费用
  - 由于挖矿奖励措施的增加，比特币的总供应量将超过 2100 万。
  - 矿工将完全停止挖矿，因为仅靠交易费无法弥补电费成本
explanation: |
  当矿工试图重新挖掘包含高手续费交易的前一个区块，而不是诚实地延长链时，就会发生费用狙击（Fee sniping）。当前一个区块的手续费大大超过当前内存池的手续费时，这种行为在经济上就变得合理了。虽然成功的概率低于诚实的挖矿，但潜在的回报可能要高得多。这种行为尤其令人担忧，因为它会产生连带效应，让更多矿工参与不诚实行为，最终在区块补贴减少时威胁到比特币的安全模式。

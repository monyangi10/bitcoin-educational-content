question: Какво е основното притеснение от определянето на таксите, когато субсидията за блок на Bitcoin се приближава до нула?
answer: Миньорите може да сметнат, че е по-изгодно да пренаписват предишни блокове с високи такси, отколкото да създават нови блокове mining
wrong_answers:
  - Таксите за транзакции ще станат твърде скъпи, за да могат обикновените потребители да си позволят транзакции Bitcoin
  - Общото предлагане на Bitcoin ще надхвърли 21 милиона поради увеличените стимули за mining
  - Миньорите ще спрат изцяло mining, защото само таксите за транзакции не могат да покрият разходите за електроенергия
explanation: |
  "Fee sniping" се случва, когато миньорите се опитват да изкопаят отново предишни блокове, които са съдържали транзакции с високи такси, вместо честно да удължат веригата. Това става икономически рационално, когато таксите в предишен блок значително надвишават тези в текущия мемпул. Макар че вероятността за успех е по-малка от тази на честните mining, потенциалното възнаграждение може да бъде много по-високо. Това поведение е особено обезпокоително, защото може да създаде каскаден ефект, при който повече миньори да се включат в нечестни практики, което в крайна сметка да застраши модела за сигурност на Bitcoin, когато субсидиите за блокове намалеят.

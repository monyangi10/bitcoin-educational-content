question: 當 Bitcoin 的區塊補貼接近零時，費用狙擊的主要顧慮是什麼？
answer: 礦工們可能會發現，用高昂的費用重寫以前的區塊比 mining 新區塊更有利可圖
wrong_answers:
  - 交易費用將變得太昂貴，一般使用者無法負擔 Bitcoin 交易費用
  - 由於 mining 激勵措施的增加，Bitcoin 的總供應量將超過 2,100 萬個
  - 礦工將完全停止 mining，因為單靠交易費用無法彌補電力成本
explanation: |
  當礦工試圖重新挖掘包含高費用交易的先前區塊，而不是誠實地延長鏈時，就會發生費用狙擊。當先前區塊中的費用顯著超過當前 Mempool 中的費用時，這種行為在經濟上就變得合理。雖然成功的機率比誠實的 mining 低，但潛在的報酬可能高得多。這種行為尤其令人擔憂，因為它可能會造成連鎖效應，讓更多的礦工從事不誠實的行為，當區塊補助減少時，最終會威脅到 Bitcoin 的安全模式。
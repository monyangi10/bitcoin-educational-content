question: Wat is de grootste zorg bij fee sniping als de bloksubsidie van Bitcoin de nul nadert?
answer: Miners vinden het misschien winstgevender om eerdere blokken met hoge vergoedingen te herschrijven in plaats van mining nieuwe blokken te schrijven
wrong_answers:
  - Transactiekosten worden te duur voor gewone gebruikers om zich Bitcoin transacties te kunnen veroorloven
  - Het totale aanbod van Bitcoin zal meer dan 21 miljoen bedragen als gevolg van de toegenomen stimuleringsmaatregelen voor mining
  - Miners zullen volledig stoppen met mining omdat transactiekosten alleen de elektriciteitskosten niet kunnen dekken
explanation: |
  Fee sniping treedt op wanneer miners proberen om vorige blokken die transacties met hoge vergoedingen bevatten opnieuw te delven in plaats van de keten eerlijk uit te breiden. Dit wordt economisch rationeel wanneer de vergoedingen in een vorig blok aanzienlijk hoger zijn dan die in de huidige mempool. Hoewel de kans op succes lager is dan bij eerlijk mining, kan de potentiële beloning veel hoger zijn. Dit gedrag is vooral zorgwekkend omdat het een cascade-effect kan creëren waarbij meer miners oneerlijke praktijken toepassen, wat uiteindelijk het veiligheidsmodel van Bitcoin bedreigt wanneer de bloksubsidies afnemen.
reviewed: false

question: Je, ni jambo gani la msingi la udukuzi wa ada wakati ruzuku ya block ya Bitcoin inakaribia sifuri?
answer: Wachimbaji madini wanaweza kupata faida zaidi kuandika vitalu vya awali kwa ada ya juu badala ya vitalu vipya vya mining.
wrong_answers:
  - Ada za muamala zitakuwa ghali sana kwa watumiaji wa kawaida kumudu miamala ya Bitcoin
  - Ugavi wa jumla wa Bitcoin utazidi milioni 21 kutokana na kuongezeka kwa motisha za mining
  - Wachimbaji madini watasimamisha mining kabisa kwa sababu ada za miamala pekee haziwezi kulipia gharama za umeme
explanation: |
  Ubaguzi wa ada hutokea wakati wachimbaji wanapojaribu kuchimba tena vitalu vya awali ambavyo vilikuwa na miamala ya ada ya juu badala ya kupanua mnyororo kwa uaminifu. Hii inakuwa sawa kiuchumi wakati ada katika block iliyotangulia inazidi kwa kiasi kikubwa zile za mempool ya sasa. Ingawa uwezekano wa kufaulu ni wa chini kuliko uaminifu wa mining, thawabu inayowezekana inaweza kuwa kubwa zaidi. Tabia hii inahusu hasa kwa sababu inaweza kuleta athari ambapo wachimbaji madini wengi hujihusisha na vitendo vya kukosa uaminifu, na hatimaye kutishia mtindo wa usalama wa Bitcoin wakati ruzuku ya vitalu inapungua.
reviewed: false

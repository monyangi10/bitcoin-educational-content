question: Какъв е конкретният проблем с меките вилици fork на BIP66, който Shaolinfry цитира като доказателство срещу активираните от миньори меки вилици?
answer: 95% от hashrate сигнализираха за готовност, но около половината от тях всъщност не потвърждаваха обновените правила и добиваха невалиден блок
wrong_answers:
  - Миньорите отказаха да сигнализират за поддръжка въпреки огромното търсене от страна на потребителите, което доведе до отлагане на надстройката за неопределено време
  - Малък процент миньори наложиха вето на обновяването за цялата мрежа въпреки подкрепата на мнозинството потребители
  - Надстройката доведе до трайно разделяне на веригата, тъй като миньорите и потребителите не бяха съгласни с подробностите по изпълнението
explanation: |
  Инцидентът с BIP66 разкри критичен недостатък на активираните от миньори "меки вилици": сигнализирането за готовност не гарантира действителното валидиране. Въпреки че 95 % от миньорите са посочили, че са готови за надстройката, приблизително половината не са валидирали правилно новите правила и погрешно са добивали в невалиден блок. Това показа, че сигнализирането на хеш мощността може да бъде подвеждащо и не гарантира правилното изпълнение, което беше един от ключовите аргументи на Шаолинфри за предлагането на активирани от потребителите Soft вилици като по-надежден механизъм за надграждане.
reviewed: false

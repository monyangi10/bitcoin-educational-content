question: ปัญหาเฉพาะกับ BIP66 soft fork ที่ Shaolinfry อ้างถึงเป็นหลักฐานต่อต้านการทำ soft forks ที่ถูกกระตุ้นโดยนักขุดคืออะไร?
answer: 95% ของ hashrate แสดงความพร้อม แต่ประมาณครึ่งหนึ่งไม่ได้ตรวจสอบกฎที่อัปเกรดแล้วจริง ๆ และทำการขุดบนบล็อกที่ไม่ถูกต้อง
wrong_answers:
  - คนขุดเหมืองปฏิเสธที่จะส่งสัญญาณสนับสนุนแม้ว่าจะมีความต้องการจากผู้ใช้มากมาย ทำให้อัปเกรดหยุดชะงักอย่างไม่มีกำหนด
  - คนงานเหมืองส่วนน้อยคัดค้านการอัปเกรดสำหรับเครือข่ายทั้งหมดแม้ว่าจะได้รับการสนับสนุนจากผู้ใช้ส่วนใหญ่
  - การอัปเกรดทำให้เกิดการแยกโซ่อย่างถาวรเนื่องจากนักขุดและผู้ใช้ไม่เห็นด้วยกับรายละเอียดการดำเนินการ
explanation: |
  เหตุการณ์ BIP66 เปิดเผยข้อบกพร่องที่สำคัญในซอฟต์ฟอร์กที่เปิดใช้งานโดยนักขุด: การส่งสัญญาณความพร้อมไม่ได้รับประกันการตรวจสอบที่แท้จริง แม้ว่า 95% ของนักขุดจะระบุว่าพวกเขาพร้อมสำหรับการอัปเกรด แต่ประมาณครึ่งหนึ่งไม่ได้ตรวจสอบกฎใหม่อย่างถูกต้องและขุดบนบล็อกที่ไม่ถูกต้องโดยไม่ตั้งใจ สิ่งนี้แสดงให้เห็นว่าการส่งสัญญาณพลังแฮชอาจทำให้เข้าใจผิดและไม่ได้รับประกันการดำเนินการที่ถูกต้อง ซึ่งเป็นหนึ่งในข้อโต้แย้งสำคัญของ Shaolinfry ในการเสนอ User Activated Soft Forks เป็นกลไกการอัปเกรดที่น่าเชื่อถือมากขึ้น
reviewed: false
question: مشکل خاص با BIP66 soft fork که Shaolinfry به عنوان مدرکی علیه فورک‌های نرم فعال‌شده توسط ماینرها ذکر کرد چه بود؟
answer: ٪۹۵ از hashrate آمادگی را اعلام کردند اما حدود نیمی از آنها در واقع قوانین ارتقاء یافته را تأیید نمی‌کردند و بر روی یک بلوک نامعتبر استخراج کردند.
wrong_answers:
  - معدن‌چیان با وجود تقاضای فراوان کاربران از اعلام حمایت خودداری کردند و این امر باعث شد که ارتقاء به طور نامحدود متوقف شود.
  - درصد کمی از ماینرها ارتقاء شبکه را با وجود حمایت اکثریت کاربران وتو کردند.
  - ارتقاء باعث ایجاد یک انشعاب دائمی زنجیره شد زیرا ماینرها و کاربران بر سر جزئیات پیاده‌سازی اختلاف نظر داشتند.
explanation: |
  حادثه BIP66 یک نقص بحرانی در فورک‌های نرم‌افزاری فعال‌شده توسط ماینرها را آشکار کرد: اعلام آمادگی تضمینی برای اعتبارسنجی واقعی نیست. با وجود اینکه 95٪ از ماینرها اعلام کردند که برای ارتقاء آماده هستند، تقریباً نیمی از آن‌ها به درستی قوانین جدید را اعتبارسنجی نمی‌کردند و به اشتباه بر روی یک بلاک نامعتبر استخراج کردند. این نشان داد که اعلام آمادگی از طریق قدرت هش می‌تواند گمراه‌کننده باشد و تضمینی برای اجرای صحیح نیست، که یکی از استدلال‌های کلیدی Shaolinfry برای پیشنهاد فورک‌های Soft فعال‌شده توسط کاربر به عنوان یک مکانیزم ارتقاء قابل‌اعتمادتر بود.
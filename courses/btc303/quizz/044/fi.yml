question: Mikä oli se erityinen ongelma BIP66:n soft fork:n kanssa, jonka Shaolinfry mainitsi todisteena kaivostyöläisten aktivoimia soft forkeja vastaan?
answer: 95 % hashrate:stä ilmoitti valmiudesta, mutta noin puolet ei oikeastaan validoinut päivitettyjä sääntöjä ja louhi virheellisen lohkon päälle
wrong_answers:
  - Kaivostyöntekijät kieltäytyivät antamasta tukisignaalia käyttäjien valtavasta kysynnästä huolimatta, mikä aiheutti päivityksen pysähtymisen loputtomiin
  - Pieni osa louhijoista torjui koko verkon päivityksen käyttäjien enemmistön tuesta huolimatta
  - Päivitys aiheutti pysyvän ketjun jakautumisen, koska louhijat ja käyttäjät olivat eri mieltä toteutuksen yksityiskohdista
explanation: |
  BIP66-tapaus paljasti kriittisen puutteen louhijoiden aktivoimissa pehmeissä haarukoissa: valmiuden ilmoittaminen ei takaa todellista validointia. Vaikka 95 prosenttia louhijoista ilmoitti olevansa valmiita päivitykseen, noin puolet ei validoinut uusia sääntöjä kunnolla ja louhi virheellisesti epäkelpoa lohkoa. Tämä osoitti, että hash-tehon signalointi voi olla harhaanjohtavaa eikä takaa asianmukaista täytäntöönpanoa, mikä oli yksi Shaolinfryn tärkeimmistä argumenteista, joiden perusteella hän ehdotti käyttäjäaktivoituja Soft-haaroja luotettavammaksi päivitysmekanismiksi.
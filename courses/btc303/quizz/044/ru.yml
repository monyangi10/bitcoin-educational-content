question: В чем заключалась конкретная проблема с BIP66 soft fork, которую Шаолинфри привел в качестве доказательства против мягких вилок, активируемых шахтерами?
answer: 95% hashrate сигнализировали о готовности, но примерно половина не подтвердила обновленные правила и майнила на недействительном блоке
wrong_answers:
  - Майнеры отказались подать сигнал о поддержке, несмотря на огромный спрос со стороны пользователей, что привело к задержке обновления на неопределенный срок
  - Небольшой процент майнеров наложил вето на обновление всей сети, несмотря на поддержку большинства пользователей
  - Обновление привело к постоянному расколу цепи, поскольку майнеры и пользователи разошлись во мнениях относительно деталей реализации
explanation: |
  Инцидент с BIP66 выявил критический недостаток мягких форков, активируемых майнерами: сигнал о готовности не гарантирует фактической валидации. Несмотря на то, что 95 % майнеров заявили о своей готовности к обновлению, примерно половина не проверила должным образом новые правила и по ошибке добыла недействительный блок. Это продемонстрировало, что сигнал о хэш-мощности может вводить в заблуждение и не гарантирует правильного применения, что было одним из ключевых аргументов Шаолиньфри, предложившего активируемые пользователем форки Soft в качестве более надежного механизма обновления.
reviewed: false

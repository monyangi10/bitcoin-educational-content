question: 샤오린프라이가 채굴자 활성화 소프트포크에 대한 증거로 인용한 BIP66 소프트 fork의 구체적인 문제점은 무엇인가요?
answer: gW-1의 95%가 준비 신호를 보냈지만 약 절반은 실제로 업그레이드된 규칙을 검증하지 않았고 유효하지 않은 블록에서 채굴되었습니다
wrong_answers:
  - 채굴자들이 압도적인 사용자 수요에도 불구하고 지원 신호를 거부하여 업그레이드가 무기한 중단되었습니다
  - 사용자의 대다수 지지에도 불구하고 소수의 채굴자가 전체 네트워크의 업그레이드에 거부권을 행사했습니다
  - 업그레이드로 인해 채굴자와 사용자가 구현 세부 사항에 동의하지 않아 영구적인 체인 분할이 발생했습니다
explanation: |
  BIP66 사건은 채굴자 활성화 소프트 포크의 중대한 결함을 드러냈습니다. 준비 완료 신호가 실제 검증을 보장하지 않는다는 것입니다. 95%의 채굴자가 업그레이드 준비가 되었다고 밝혔지만, 약 절반은 새로운 규칙을 제대로 검증하지 않았고 유효하지 않은 블록에서 실수로 채굴을 진행했습니다. 이는 해시 파워 시그널링이 오해를 불러일으킬 수 있고 적절한 구현을 보장하지 못한다는 것을 보여주었으며, 이는 샤오린 프라이가 보다 안정적인 업그레이드 메커니즘으로 사용자 활성화 Soft 포크를 제안한 주요 논거 중 하나였습니다.
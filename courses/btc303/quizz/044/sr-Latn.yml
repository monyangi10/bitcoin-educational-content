question: Koji je bio specifičan problem sa BIP66 soft fork-om koji je Shaolinfry naveo kao dokaz protiv soft forkova aktiviranih od strane rudara?
answer: 95% hashrate je signaliziralo spremnost, ali otprilike polovina zapravo nije validirala nadograđena pravila i rudareno je na nevažećem bloku
wrong_answers:
  - Rudari su odbili da signaliziraju podršku uprkos ogromnoj potražnji korisnika, što je uzrokovalo da nadogradnja bude neodređeno odložena
  - Mali procenat rudara stavio je veto na nadogradnju za celu mrežu uprkos većinskoj podršci korisnika
  - Nadogradnja je izazvala trajno razdvajanje lanca jer se rudari i korisnici nisu složili oko detalja implementacije
explanation: |
  Incident BIP66 otkrio je kritičnu manu u soft fork-ovima aktiviranim od strane rudara: signalizacija spremnosti ne garantuje stvarnu validaciju. 
  Iako je 95% rudara naznačilo da su spremni za nadogradnju, otprilike polovina nije pravilno validirala nova pravila i greškom su rudili na nevažećem bloku.
  Ovo je pokazalo da signalizacija hash snage može biti obmanjujuća i ne osigurava pravilnu implementaciju, što je bio jedan od ključnih argumenata Shaolinfry-a 
  za predlaganje User Activated Soft Forks (soft forkovi aktivirani od strane korisnika) kao pouzdanijeg mehanizma nadogradnje.
reviewed: true

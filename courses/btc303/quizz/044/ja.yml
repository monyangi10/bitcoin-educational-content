question: シャオリンフライが鉱山労働者用ソフトフォークを否定する証拠として挙げたBIP66ソフトforkの具体的な問題点は何だったのか？
answer: hashrateの95％は準備完了のシグナルを出したが、約半数はアップグレードされたルールを実際に検証しておらず、無効なブロックに採掘された。
wrong_answers:
  - ユーザーからの圧倒的な要望にもかかわらず、マイナーはサポートを拒否したため、アップグレードは無期限に停滞した。
  - ユーザーからの多数の支持にもかかわらず、ごく一部のマイナーがネットワーク全体のアップグレードに拒否反応を示した。
  - このアップグレードは、マイナーとユーザーの間で実装の詳細について意見が対立したため、恒久的なチェーンの分裂を引き起こした。
explanation: |
  BIP66事件は、マイナーが作動させるソフトフォークに重大な欠陥があることを明らかにした。95%のマイナーがアップグレードの準備ができていることを示していたにもかかわらず、約半数が新しいルールを適切に検証しておらず、誤って無効なブロックでマイニングを行った。これは、ハッシュパワーのシグナリングが誤解を招く可能性があり、適切な実装を保証しないことを実証したもので、Shaolinfry氏がより信頼性の高いアップグレードメカニズムとしてユーザー起動型Softフォークを提案した主な論拠の1つでした。
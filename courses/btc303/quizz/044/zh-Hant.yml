question: Shaolinfry 引用 BIP66 軟性 fork 作為反對礦工啟動式軟叉的證據，那麼 BIP66 軟性 fork 的具體問題是什麼？
answer: 95% 的 hashrate 發出準備就緒的訊號，但約有一半的 hashrate 並未實際驗證升級後的規則，而是在無效區塊上進行挖採。
wrong_answers:
  - 儘管使用者需求龐大，但礦工仍拒絕發出支援訊號，導致升級無限期停滯不前
  - 儘管得到大多數使用者的支持，一小部分礦工否決了整個網路的升級
  - 由於礦工和使用者在執行細節上有分歧，升級導致了永久性的鏈分裂
explanation: |
  BIP66 事件揭露了礦工啟動軟叉的一個關鍵缺陷：發出準備就緒的信號並不能保證實際驗證。儘管 95% 的礦工表示已為升級做好準備，但仍有約一半的礦工未正確驗證新規則，並誤在無效區塊上挖礦。這證明了雜湊能量信號可能會產生誤導，並不能確保正確執行，這也是 Shaolinfry 提出使用者啟動 Soft 叉作為更可靠的升級機制的主要論據之一。
reviewed: false

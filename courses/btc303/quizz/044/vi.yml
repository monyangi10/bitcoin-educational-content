question: Vấn đề cụ thể với BIP66 soft fork mà Shaolinfry trích dẫn làm bằng chứng chống lại soft fork do thợ đào kích hoạt là gì?
answer: 95% hashrate đã báo hiệu sự sẵn sàng nhưng khoảng một nửa không thực sự xác thực các quy tắc đã nâng cấp và khai thác trên một khối không hợp lệ
wrong_answers:
  - Các thợ đào đã từ chối phát tín hiệu hỗ trợ mặc dù nhu cầu của người dùng rất lớn, khiến quá trình nâng cấp bị đình trệ vô thời hạn
  - Một tỷ lệ nhỏ thợ đào đã phủ quyết việc nâng cấp cho toàn bộ mạng lưới mặc dù phần lớn người dùng đều ủng hộ
  - Bản nâng cấp đã gây ra sự chia tách chuỗi vĩnh viễn vì thợ đào và người dùng không đồng ý về các chi tiết triển khai
explanation: |
  Sự cố BIP66 đã tiết lộ một lỗ hổng nghiêm trọng trong soft fork do thợ đào kích hoạt: việc báo hiệu sẵn sàng không đảm bảo xác thực thực tế. Mặc dù 95% thợ đào cho biết họ đã sẵn sàng cho việc nâng cấp, nhưng khoảng một nửa trong số họ đã không xác thực đúng các quy tắc mới và đã khai thác nhầm trên một khối không hợp lệ. Điều này chứng minh rằng việc báo hiệu sức mạnh băm có thể gây hiểu lầm và không đảm bảo việc triển khai đúng cách, đây là một trong những lập luận chính của Shaolinfry khi đề xuất sử dụng User Activated Soft Fork như một cơ chế nâng cấp đáng tin cậy hơn.
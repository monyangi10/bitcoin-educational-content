question: Shaolinfry 将 BIP66 软分叉作为反对矿工启动软叉的证据，那么 BIP66 软分叉的具体问题是什么？
answer: 95% 的哈希率发出了准备就绪的信号，但约有一半的哈希率并未真正验证升级后的规则，而是在无效区块上挖矿
wrong_answers:
  - 尽管用户需求巨大，但矿工拒绝发出支持信号，导致升级无限期停滞不前
  - 尽管得到了大多数用户的支持，但一小部分矿工否决了整个网络的升级
  - 由于矿工和用户在实施细节上存在分歧，升级导致了永久性的链分裂
explanation: |
  BIP66 事件暴露了矿工激活软分叉的一个关键缺陷：发出准备就绪的信号并不能保证实际验证。尽管 95% 的矿工表示他们已为升级做好准备，但仍有大约一半的矿工没有正确验证新规则，错误地在无效区块上挖矿。这表明，哈希率信号可能会产生误导，并不能确保正确实施，而这正是 Shaolinfry 提出用户激活软叉作为更可靠的升级机制的关键论据之一。

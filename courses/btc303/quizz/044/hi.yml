question: BIP66 सॉफ्ट fork में क्या विशिष्ट समस्या थी जिसे शाओलिनफ्राई ने माइनर-एक्टिवेटेड सॉफ्ट फोर्क्स के विरुद्ध साक्ष्य के रूप में उद्धृत किया था?
answer: hashrate का 95% भाग तैयार होने का संकेत दे रहा था, लेकिन लगभग आधा भाग वास्तव में उन्नत नियमों को मान्य नहीं कर रहा था और अमान्य ब्लॉक पर खनन किया गया था
wrong_answers:
  - उपयोगकर्ताओं की भारी मांग के बावजूद माइनर्स ने समर्थन देने से इनकार कर दिया, जिसके कारण अपग्रेड अनिश्चित काल के लिए रुक गया
  - उपयोगकर्ताओं के बहुमत समर्थन के बावजूद, कुछ ही प्रतिशत खनिकों ने पूरे नेटवर्क के उन्नयन पर रोक लगा दी
  - उन्नयन के कारण श्रृंखला में स्थायी विभाजन हो गया क्योंकि खनिक और उपयोगकर्ता कार्यान्वयन विवरण पर असहमत थे
explanation: |
  BIP66 घटना ने माइनर-एक्टिवेटेड सॉफ्ट फ़ोर्क्स में एक गंभीर खामी उजागर की: सिग्नलिंग रेडीनेस वास्तविक सत्यापन की गारंटी नहीं देता। 95% माइनर्स द्वारा अपग्रेड के लिए तैयार होने का संकेत देने के बावजूद, लगभग आधे माइनर्स नए नियमों का ठीक से सत्यापन नहीं कर रहे थे और गलती से एक अमान्य ब्लॉक पर माइनिंग कर रहे थे। इससे यह साबित हुआ कि हैश पावर सिग्नलिंग भ्रामक हो सकती है और उचित कार्यान्वयन सुनिश्चित नहीं करती है, जो कि शाओलिनफ़्री द्वारा यूजर एक्टिवेटेड Soft फ़ोर्क्स को एक अधिक विश्वसनीय अपग्रेड तंत्र के रूप में प्रस्तावित करने के प्रमुख तर्कों में से एक था।
reviewed: false

question: Qual era il problema specifico con il soft fork BIP66 che Shaolinfry ha citato come prova contro i soft fork attivate dai miner?
answer: Il 95% dell'hashrate ha segnalato la disponibilità, ma circa la metà non ha effettivamente convalidato le regole aggiornate e ha estratto su un blocco non valido
wrong_answers:
  - I miner si sono rifiutati di segnalare il supporto nonostante l'enorme richiesta degli utenti, causando uno stallo indefinito dell'aggiornamento
  - Una piccola percentuale di miner ha posto il veto all'aggiornamento per l'intera rete, nonostante il sostegno della maggioranza degli utenti
  - L'aggiornamento ha causato una spaccatura permanente della catena perché miner e utenti non erano d'accordo sui dettagli dell'implementazione
explanation: |
  L'incidente di BIP66 ha rivelato un difetto critico nei soft fork attivati dai miner: la segnalazione della disponibilità non garantisce l'effettiva convalida. Nonostante il 95% dei miner abbia indicato di essere pronto per l'aggiornamento, circa la metà non ha convalidato correttamente le nuove regole e ha erroneamente minato su un blocco non valido. Ciò ha dimostrato che la segnalazione della potenza di hashing può essere fuorviante e non garantisce una corretta implementazione, che era uno degli argomenti chiave di Shaolinfry per proporre i soft fork attivate dall'utente come meccanismo di aggiornamento più affidabile.
reviewed: true

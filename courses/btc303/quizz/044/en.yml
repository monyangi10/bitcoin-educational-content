question: What was the specific problem with the BIP66 soft fork that Shaolinfry cited as evidence against miner-activated soft forks?
answer: 95% of hashrate signaled readiness but about half wasn't actually validating the upgraded rules and mined upon an invalid block
wrong_answers:
  - Miners refused to signal support despite overwhelming user demand, causing the upgrade to stall indefinitely
  - A small percentage of miners vetoed the upgrade for the entire network despite majority support from users
  - The upgrade caused a permanent chain split because miners and users disagreed on the implementation details
explanation: |
  The BIP66 incident revealed a critical flaw in miner-activated soft forks: signaling readiness doesn't guarantee actual validation. Despite 95% of miners indicating they were ready for the upgrade, approximately half weren't properly validating the new rules and mistakenly mined on an invalid block. This demonstrated that hash power signaling can be misleading and doesn't ensure proper implementation, which was one of Shaolinfry's key arguments for proposing User Activated Soft Forks as a more reliable upgrade mechanism.
reviewed: false

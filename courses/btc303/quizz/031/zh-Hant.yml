question: 當整體補助接近零時，Bitcoin 的安全成本結構會發生什麼根本性的變化？
answer: 安全成本由持有者透過貨幣通貨膨脹支付，轉為由消費者透過交易費用支付
wrong_answers:
  - 安全成本從由礦工透過硬體投資支付，轉為由節點透過耗電支付
  - 安全成本由交易所透過交易費支付，轉為由 wallet 供應商透過服務費支付
  - 安全成本從開發人員透過程式碼維護支付，轉為使用者透過網路參與支付
explanation: |
  本章清楚說明，今天，持有者透過貨幣通貨膨脹（透過區塊補貼創造新幣）為 Bitcoin 的安全性付費，但在未來，當區塊補貼接近零時，花費者將透過交易費用為安全性付費。這代表著誰來負擔維護網路安全成本的根本性經濟轉變，從新幣創造為 mining 提供資金的模式，轉變為交易費用必須為礦工提供足夠的誘因以保障網路安全的模式。
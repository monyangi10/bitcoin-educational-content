question: 当整笔补贴趋近于零时，比特币的安全成本结构会发生什么根本变化？
answer: 安全成本由持有者通过货币通胀支付，转为由花费者通过交易费支付
wrong_answers:
  - 安全成本从矿工通过硬件投资支付转变为节点通过电力消耗支付
  - 安全成本从交易所通过交易费支付转向钱包提供商通过服务费支付
  - 安全成本从开发者通过代码维护支付转变为用户通过网络参与支付
explanation: |
  这一章清楚地说明，目前，比特币持有者通过货币通胀（即区块补贴产生的新币）来支付网络安全成本；但在未来，当区块补贴逐渐趋近于零时，支付者将通过交易手续费来承担这部分成本。这标志着比特币安全模型的一个根本性经济转变——从“由新币发行资助挖矿”的模式，过渡到“依靠交易手续费为矿工提供足够激励以维护网络安全”的模式。

question: 当整笔补贴趋近于零时，Bitcoin 的安全成本结构会发生什么根本变化？
answer: 安全成本由持有者通过货币通胀支付，转为由花费者通过交易费支付
wrong_answers:
  - 安全成本从矿工通过硬件投资支付转变为节点通过电力消耗支付
  - 安全成本从交易所通过交易费支付转向 wallet 提供商通过服务费支付
  - 安全成本从开发人员通过代码维护支付转变为用户通过网络参与支付
explanation: |
  这一章清楚地说明，今天，持有者通过货币通胀（通过区块补贴创造新币）为 Bitcoin 的安全性买单，但在未来，当区块补贴趋近于零时，花费者将通过交易费为安全性买单。这意味着谁来承担维护网络安全的成本发生了根本性的经济转变，从新币创造为 mining 提供资金的模式转变为交易费必须为矿工提供足够的激励来确保网络安全的模式。
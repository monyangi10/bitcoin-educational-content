question: Какие фундаментальные изменения происходят в структуре затрат на безопасность Bitcoin по мере приближения блочной субсидии к нулю?
answer: Затраты на безопасность переходят от оплаты держателями за счет денежной инфляции к оплате тратящими за счет комиссии за транзакции
wrong_answers:
  - Затраты на безопасность переходят от майнеров за счет инвестиций в оборудование к узлам за счет потребления электроэнергии
  - Расходы на обеспечение безопасности переходят от оплаты биржами за счет торговых сборов к оплате провайдерами wallet за счет сервисных сборов
  - Затраты на безопасность смещаются с разработчиков, которые оплачивают сопровождение кода, на пользователей, которые оплачивают участие в сети
explanation: |
  В главе четко объясняется, что сегодня держатели платят за безопасность Bitcoin за счет денежной инфляции (новые монеты создаются за счет субсидирования блока), но в будущем, когда субсидирование блока приблизится к нулю, пользователи будут платить за безопасность за счет комиссии за транзакции. Это представляет собой фундаментальный экономический сдвиг в том, кто несет расходы на поддержание безопасности сети, переход от модели, в которой создание новых монет финансирует mining, к модели, в которой плата за транзакции должна обеспечивать достаточный стимул для майнеров обеспечивать безопасность сети.
question: 블록 보조금이 0에 가까워짐에 따라 Bitcoin의 보안 비용 구조에는 어떤 근본적인 변화가 발생하나요?
answer: 보안 비용은 화폐 인플레이션을 통해 보유자가 지불하는 방식에서 거래 수수료를 통해 지출자가 지불하는 방식으로 전환됩니다
wrong_answers:
  - 보안 비용은 하드웨어 투자를 통해 채굴자가 지불하는 방식에서 전기 소비를 통해 노드가 지불하는 방식으로 전환됩니다
  - 보안 비용은 거래소가 거래 수수료를 통해 지불하는 것에서 wallet 공급자가 서비스 요금을 통해 지불하는 것으로 전환됩니다
  - 보안 비용은 코드 유지 관리를 통해 개발자가 지불하는 것에서 네트워크 참여를 통해 사용자가 지불하는 것으로 전환됩니다
explanation: |
  이 장에서는 현재 보유자는 화폐 인플레이션(블록 보조금을 통해 생성되는 새로운 코인)을 통해 Bitcoin의 보안 비용을 지불하지만, 블록 보조금이 0에 가까워지는 미래에는 거래 수수료를 통해 보안 비용을 지불하게 될 것이라고 명확하게 설명합니다. 이는 네트워크 보안 유지 비용을 누가 부담하는지에 대한 근본적인 경제적 변화를 의미하며, 새로운 코인 생성으로 mining에 자금을 지원하던 모델에서 거래 수수료가 채굴자에게 네트워크 보안에 대한 충분한 인센티브를 제공해야 하는 모델로 전환되는 것입니다.

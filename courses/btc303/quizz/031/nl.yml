question: Welke fundamentele verschuiving treedt op in de kostenstructuur van Bitcoin wanneer de bloksubsidie bijna nul is?
answer: Beveiligingskosten verschuiven van betaling door houders via monetaire inflatie naar betaling door besteders via transactiekosten
wrong_answers:
  - Beveiligingskosten verschuiven van betaald door miners via hardware-investeringen naar betaald door nodes via elektriciteitsverbruik
  - Beveiligingskosten verschuiven van betaling door beurzen via handelsvergoedingen naar betaling door wallet aanbieders via servicekosten
  - Beveiligingskosten worden niet langer betaald door ontwikkelaars via het onderhoud van code, maar door gebruikers via netwerkdeelname
explanation: |
  Het hoofdstuk legt duidelijk uit dat houders vandaag betalen voor de veiligheid van Bitcoin via monetaire inflatie (nieuwe munten worden gecreëerd via bloksubsidie), maar in de toekomst, wanneer de bloksubsidie nul benadert, zullen spenders betalen voor de veiligheid via transactiekosten. Dit betekent een fundamentele economische verschuiving in wie de kosten draagt voor het handhaven van de veiligheid van het netwerk, van een model waarbij de creatie van nieuwe munten mining financiert naar een model waarbij transactievergoedingen voldoende stimulans moeten bieden voor mijnwerkers om het netwerk te beveiligen.
reviewed: false

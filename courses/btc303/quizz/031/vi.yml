question: Sự thay đổi cơ bản nào sẽ xảy ra trong cấu trúc chi phí bảo mật của Bitcoin khi trợ cấp khối gần bằng 0?
answer: Chi phí bảo mật chuyển từ việc người nắm giữ phải trả thông qua lạm phát tiền tệ sang việc người chi trả phải trả thông qua phí giao dịch
wrong_answers:
  - Chi phí bảo mật chuyển từ việc thợ đào phải trả thông qua đầu tư phần cứng sang việc các nút phải trả thông qua mức tiêu thụ điện
  - Chi phí bảo mật chuyển từ việc được các sàn giao dịch chi trả thông qua phí giao dịch sang việc được các nhà cung cấp wallet chi trả thông qua phí dịch vụ
  - Chi phí bảo mật chuyển từ việc các nhà phát triển phải trả thông qua việc bảo trì mã sang việc người dùng phải trả thông qua việc tham gia mạng lưới
explanation: |
  Chương này giải thích rõ ràng rằng hiện nay, người nắm giữ trả phí bảo mật cho Bitcoin thông qua lạm phát tiền tệ (tiền mới được tạo ra thông qua trợ cấp khối), nhưng trong tương lai, khi trợ cấp khối tiến gần đến mức 0, người dùng sẽ trả phí bảo mật thông qua phí giao dịch. Điều này thể hiện một sự thay đổi kinh tế cơ bản về việc ai là người chịu chi phí duy trì an ninh mạng, chuyển từ mô hình tạo tiền mới để tài trợ cho mining sang mô hình mà phí giao dịch phải tạo ra động lực đủ lớn để thợ đào bảo mật mạng lưới.
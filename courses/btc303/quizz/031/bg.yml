question: Каква фундаментална промяна настъпва в структурата на разходите за сигурност на Bitcoin, когато блоковата субсидия се доближи до нула?
answer: Разходите за сигурност се прехвърлят от тези, които се плащат от притежателите чрез парична инфлация, към тези, които се плащат от харчещите чрез такси за транзакции
wrong_answers:
  - Разходите за сигурност се прехвърлят от тези, които се плащат от миньорите чрез инвестиции в хардуер, към тези, които се плащат от възлите чрез потреблението на електроенергия
  - Разходите за сигурност се прехвърлят от заплащане от борсите чрез такси за търговия към заплащане от доставчиците на wallet чрез такси за услуги
  - Разходите за сигурност се прехвърлят от заплащане от страна на разработчиците чрез поддръжка на кода към заплащане от страна на потребителите чрез участие в мрежата
explanation: |
  В главата ясно е обяснено, че днес притежателите плащат за сигурността на Bitcoin чрез парична инфлация (създаване на нови монети чрез блокова субсидия), но в бъдеще, когато блоковата субсидия се доближи до нула, харчещите ще плащат за сигурността чрез такси за транзакции. Това представлява фундаментална икономическа промяна в това кой поема разходите за поддържане на сигурността на мрежата, като се преминава от модел, при който създаването на нови монети финансира mining, към такъв, при който таксите за транзакции трябва да осигуряват достатъчен стимул за миньорите да осигуряват сигурността на мрежата.

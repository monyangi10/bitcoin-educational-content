question: چه تغییر بنیادی در ساختار هزینه امنیتی Bitcoin رخ می‌دهد وقتی که یارانه بلوک به صفر نزدیک می‌شود؟
answer: هزینه‌های امنیتی از پرداخت توسط دارندگان از طریق تورم پولی به پرداخت توسط خرج‌کنندگان از طریق کارمزد تراکنش تغییر می‌کند.
wrong_answers:
  - هزینه‌های امنیتی از پرداخت توسط ماینرها از طریق سرمایه‌گذاری در سخت‌افزار به پرداخت توسط نودها از طریق مصرف برق تغییر می‌کند.
  - هزینه‌های امنیتی از پرداخت توسط صرافی‌ها از طریق کارمزدهای معاملاتی به پرداخت توسط ارائه‌دهندگان wallet از طریق هزینه‌های خدمات تغییر می‌کند.
  - هزینه‌های امنیتی از پرداخت توسط توسعه‌دهندگان از طریق نگهداری کد به پرداخت توسط کاربران از طریق مشارکت در شبکه تغییر می‌کند.
explanation: |
  این فصل به وضوح توضیح می‌دهد که امروزه، دارندگان از طریق تورم پولی (ایجاد سکه‌های جدید از طریق یارانه بلاک) برای امنیت Bitcoin پرداخت می‌کنند، اما در آینده زمانی که یارانه بلاک به صفر نزدیک می‌شود، خرج‌کنندگان از طریق کارمزد تراکنش‌ها برای امنیت پرداخت خواهند کرد. این نشان‌دهنده یک تغییر اقتصادی بنیادی در این است که چه کسی هزینه حفظ امنیت شبکه را متحمل می‌شود، از مدلی که ایجاد سکه جدید mining را تأمین مالی می‌کند به مدلی که کارمزد تراکنش‌ها باید انگیزه کافی برای ماینرها برای تأمین امنیت شبکه فراهم کند، حرکت می‌کند.
reviewed: false

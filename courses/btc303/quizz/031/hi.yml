question: ब्लॉक सब्सिडी शून्य के करीब पहुंचने पर Bitcoin की सुरक्षा लागत संरचना में क्या मौलिक बदलाव होता है?
answer: सुरक्षा लागत का भुगतान धारकों द्वारा मौद्रिक मुद्रास्फीति के माध्यम से किए जाने से बदलकर व्ययकर्ताओं द्वारा लेनदेन शुल्क के माध्यम से किया जाने लगा है
wrong_answers:
  - सुरक्षा लागत का भुगतान खननकर्ताओं द्वारा हार्डवेयर निवेश के माध्यम से किए जाने से बदलकर नोड्स द्वारा बिजली की खपत के माध्यम से किया जाने लगा है
  - सुरक्षा लागत का भुगतान एक्सचेंजों द्वारा ट्रेडिंग शुल्क के माध्यम से किए जाने के स्थान पर wallet प्रदाताओं द्वारा सेवा शुल्क के माध्यम से किया जाने लगा है
  - सुरक्षा लागत का भुगतान कोड रखरखाव के माध्यम से डेवलपर्स द्वारा किए जाने से बदलकर नेटवर्क भागीदारी के माध्यम से उपयोगकर्ताओं द्वारा किया जाने लगा है
explanation: |
  अध्याय स्पष्ट रूप से बताता है कि आज, धारक Bitcoin की सुरक्षा के लिए मौद्रिक मुद्रास्फीति (ब्लॉक सब्सिडी के माध्यम से बनाए जा रहे नए कॉइन) के माध्यम से भुगतान करते हैं, लेकिन भविष्य में जब ब्लॉक सब्सिडी शून्य के करीब पहुँच जाएगी, तो खर्च करने वाले लेनदेन शुल्क के माध्यम से सुरक्षा के लिए भुगतान करेंगे। यह एक मौलिक आर्थिक बदलाव का प्रतिनिधित्व करता है कि नेटवर्क सुरक्षा बनाए रखने की लागत कौन वहन करेगा, एक ऐसे मॉडल से जहाँ नए कॉइन निर्माण mining को वित्तपोषित करते हैं, एक ऐसे मॉडल की ओर जहाँ लेनदेन शुल्क को नेटवर्क को सुरक्षित करने के लिए खनिकों को पर्याप्त प्रोत्साहन प्रदान करना चाहिए।
reviewed: false

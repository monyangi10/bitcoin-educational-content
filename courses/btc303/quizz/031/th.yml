question: การเปลี่ยนแปลงพื้นฐานอะไรเกิดขึ้นในโครงสร้างต้นทุนความปลอดภัยของ Bitcoin เมื่อการอุดหนุนบล็อกเข้าใกล้ศูนย์?
answer: ค่าใช้จ่ายด้านความปลอดภัยเปลี่ยนจากการที่ผู้ถือจ่ายผ่านเงินเฟ้อทางการเงินไปเป็นการที่ผู้ใช้จ่ายผ่านค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - ค่าใช้จ่ายด้านความปลอดภัยเปลี่ยนจากการที่นักขุดจ่ายผ่านการลงทุนในฮาร์ดแวร์ไปเป็นการที่โหนดจ่ายผ่านการใช้ไฟฟ้า
  - ค่าใช้จ่ายด้านความปลอดภัยเปลี่ยนจากการชำระโดยการแลกเปลี่ยนผ่านค่าธรรมเนียมการซื้อขายไปเป็นการชำระโดยผู้ให้บริการ wallet ผ่านค่าบริการ
  - ค่าใช้จ่ายด้านความปลอดภัยเปลี่ยนจากการที่นักพัฒนาจ่ายผ่านการบำรุงรักษาโค้ดไปเป็นการที่ผู้ใช้จ่ายผ่านการมีส่วนร่วมในเครือข่าย
explanation: |
  บทนี้อธิบายอย่างชัดเจนว่าในปัจจุบัน ผู้ถือครองจ่ายค่าความปลอดภัยของ Bitcoin ผ่านการเงินเฟ้อ (การสร้างเหรียญใหม่ผ่านการอุดหนุนบล็อก) แต่ในอนาคตเมื่อการอุดหนุนบล็อกเข้าใกล้ศูนย์ ผู้ใช้จ่ายจะจ่ายค่าความปลอดภัยผ่านค่าธรรมเนียมการทำธุรกรรม นี่แสดงถึงการเปลี่ยนแปลงทางเศรษฐกิจพื้นฐานในผู้ที่รับภาระค่าใช้จ่ายในการรักษาความปลอดภัยของเครือข่าย โดยเปลี่ยนจากโมเดลที่การสร้างเหรียญใหม่เป็นทุนให้กับ mining ไปสู่โมเดลที่ค่าธรรมเนียมการทำธุรกรรมต้องให้แรงจูงใจเพียงพอสำหรับนักขุดในการรักษาความปลอดภัยของเครือข่าย
reviewed: false
question: ブロック補助金がゼロに近づくにつれて、Bitcoinの安全保障コスト構造にどのような根本的な変化が生じるのか？
answer: 安全保障コストは、貨幣インフレを通じて保有者が負担するものから、取引手数料を通じて消費者が負担するものへと変化する。
wrong_answers:
  - セキュリティコストは、ハードウェアへの投資を通じて採掘者が負担するものから、電力消費を通じてノードが負担するものへと変化する。
  - セキュリティ・コストは、取引手数料を通じて取引所が負担するものから、サービス料を通じてwalletプロバイダーが負担するものへとシフトする。
  - セキュリティ・コストは、コードのメンテナンスを通じて開発者が負担するものから、ネットワークへの参加を通じてユーザーが負担するものへと変化する。
explanation: |
  この章では、現在、保有者はマネタリーインフレ（ブロック補助金によって新しいコインが生み出されること）を通じてBitcoinのセキュリティの代金を支払っているが、将来、ブロック補助金がゼロに近づくと、消費者は取引手数料を通じてセキュリティの代金を支払うことになると明確に説明している。これは、ネットワークのセキュリティを維持するコストを誰が負担するかという根本的な経済的転換を意味し、新しいコインの創出がminingの資金源となるモデルから、取引手数料がマイナーがネットワークを安全に保つための十分なインセンティブを提供しなければならないモデルへと移行する。
reviewed: false

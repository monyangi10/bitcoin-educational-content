question: ブロック報酬がゼロに近づくにつれて、ビットコインのセキュリティコスト構造にどのような根本的な変化が生じるのか？
answer: セキュリティコストは、貨幣インフレを通じて保有者が負担するものから、トランザクション手数料を通じて消費者が負担するものへと変化する
wrong_answers:
  - セキュリティコストは、ハードウェアへの投資を通じて採掘者が負担するものから、電力消費を通じてノードが負担するものへと変化する
  - セキュリティコストは、トランザクション手数料を通じて取引所が負担するものから、サービス料を通じてウォレットプロバイダーが負担するものへとシフトする
  - セキュリティコストは、コードのメンテナンスを通じて開発者が負担するものから、ネットワークへの参加を通じてユーザーが負担するものへと変化する
explanation: |
  この章では、現在、保有者はマネタリーインフレ（ブロック報酬によって新しいコインが生み出されること）を通じてビットコインのセキュリティコストを支払っているが、将来、ブロック報酬がゼロに近づくと、消費者はトランザクション手数料を通じてセキュリティコストを支払うことになると明確に説明している。これは、ネットワーク・セキュリティを維持するコストを誰が負担するかという根本的な経済的転換を意味し、新しいコインの創出がマイニングの資金源となるモデルから、トランザクション手数料がマイナーに対してネットワークを安全に保つための十分なインセンティブを提供しなければならないモデルへと移行する。
reviewed: false

question: Hva er den primære utfordringen som gjør publisering av sårbarhetsoppdateringer for Bitcoin spesielt komplisert sammenlignet med tradisjonelle sentraliserte programvaresystemer?
answer: Selve oppdateringskoden kan avsløre sårbarheten for potensielle angripere som analyserer endringene
wrong_answers:
  - Den desentraliserte naturen betyr at det ikke finnes noen sentral myndighet til å koordinere timingen for utplassering av oppdateringer
  - "Bitcoins konsensusmekanisme krever flertallsgodkjenning før sikkerhetsoppdateringer kan implementeres"
  - Åpen kildekode betyr at alle sårbarheter må offentliggjøres før det utvikles oppdateringer
explanation: |
  Teksten fremhever spesielt at utviklere må være ekstremt forsiktige når de publiserer oppdateringer, fordi "oppdateringen i seg selv kan avsløre sårbarheten" Dette skaper en unik utfordring der løsningen utilsiktet kan avsløre problemet. Det fjerde kulepunktet beskriver hvordan Bitcoin-utviklere tester om en oppdatering er "godt nok kamuflert" ved å la erfarne utviklere gå gjennom den uten å kjenne til den spesifikke sårbarheten. Hvis disse ekspertene ikke kan identifisere sårbarheten i oppdateringen, anses den som trygg å distribuere. De andre alternativene er feil: Det er koordinering gjennom Bitcoin Core-vedlikeholdere, konsensus er ikke påkrevd for oppdateringer, og sårbarheter holdes private under ansvarlig offentliggjøring.
reviewed: false

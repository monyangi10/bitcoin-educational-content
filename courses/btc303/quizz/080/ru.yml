question: В чем заключается основная проблема, которая делает публикацию исправлений уязвимостей для Bitcoin особенно сложной по сравнению с традиционными централизованными системами программного обеспечения?
answer: Сам код патча может раскрыть уязвимость потенциальным злоумышленникам, которые проанализируют изменения
wrong_answers:
  - Децентрализованный характер означает отсутствие центрального органа, который бы координировал сроки установки патчей
  - "Механизм консенсуса Bitcoin требует одобрения большинством голосов перед внедрением любых исправлений безопасности"
  - Открытый исходный код означает, что все уязвимости должны быть публично раскрыты, прежде чем будут разработаны исправления
explanation: |
  В тексте особо подчеркивается, что разработчики должны быть крайне осторожны при публикации патчей, поскольку "сам патч может выдать уязвимость" Это создает уникальную проблему, когда решение может непреднамеренно раскрыть проблему. Четвертый пункт описывает, как разработчики Bitcoin проверяют, достаточно ли хорошо "замаскирован" патч: опытные разработчики проверяют его, не зная конкретной уязвимости. Если эти эксперты не могут выявить уязвимость в патче, он считается безопасным для развертывания. Остальные варианты неверны: координация осуществляется через сопровождающих Bitcoin Core, консенсус для патчей не требуется, а уязвимости сохраняются в тайне при ответственном раскрытии.
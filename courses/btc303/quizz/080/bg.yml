question: Кое е основното предизвикателство, което прави публикуването на пачове за уязвимости за Bitcoin особено сложно в сравнение с традиционните централизирани софтуерни системи?
answer: Самият код на кръпката може да разкрие уязвимостта на потенциални нападатели, които анализират промените
wrong_answers:
  - Децентрализираният характер означава, че няма централен орган, който да координира времето за внедряване на кръпките
  - "Механизмът за консенсус на Bitcoin изисква одобрение от мнозинството, преди да бъдат въведени каквито и да било поправки на сигурността"
  - Характерът на отворения код означава, че всички уязвимости трябва да бъдат разкрити публично, преди да бъдат разработени кръпки
explanation: |
  В текста специално се подчертава, че разработчиците трябва да бъдат изключително внимателни при публикуването на кръпки, тъй като "самата кръпка може да издаде уязвимостта" Това създава уникално предизвикателство, при което решението може по невнимание да разкрие проблема. Четвъртата подточка описва как разработчиците на Bitcoin проверяват дали дадена кръпка е "достатъчно добре замаскирана", като карат опитни разработчици да я прегледат, без да знаят конкретната уязвимост. Ако тези експерти не могат да идентифицират уязвимостта от кръпката, тя се счита за безопасна за внедряване. Другите варианти са неправилни: има координация чрез поддържащите ядрото на Bitcoin, не се изисква консенсус за кръпките и уязвимостите се пазят в тайна по време на отговорното им разкриване.
reviewed: false

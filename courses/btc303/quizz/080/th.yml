question: อะไรคือความท้าทายหลักที่ทำให้การเผยแพร่แพตช์ช่องโหว่สำหรับ Bitcoin ซับซ้อนเป็นพิเศษเมื่อเทียบกับระบบซอฟต์แวร์แบบรวมศูนย์แบบดั้งเดิม?
answer: โค้ดแพตช์เองสามารถเปิดเผยช่องโหว่ให้กับผู้โจมตีที่มีศักยภาพที่วิเคราะห์การเปลี่ยนแปลงได้
wrong_answers:
  - ลักษณะที่กระจายอำนาจหมายความว่าไม่มีหน่วยงานกลางในการประสานเวลาการปรับใช้แพตช์
  - "กลไกฉันทามติของ Bitcoin ต้องการการอนุมัติจากเสียงข้างมากก่อนที่จะสามารถดำเนินการแพตช์ความปลอดภัยใด ๆ ได้"
  - ลักษณะโอเพ่นซอร์สหมายความว่าช่องโหว่ทั้งหมดต้องถูกเปิดเผยต่อสาธารณะก่อนที่จะมีการพัฒนาแพตช์
explanation: |
  ข้อความนี้เน้นย้ำเป็นพิเศษว่านักพัฒนาต้องระมัดระวังอย่างยิ่งเมื่อเผยแพร่แพตช์เพราะ 'ตัวแพตช์เองอาจเปิดเผยช่องโหว่ได้' สิ่งนี้สร้างความท้าทายที่ไม่เหมือนใครซึ่งวิธีแก้ปัญหาอาจเปิดเผยปัญหาโดยไม่ได้ตั้งใจ จุดบูลเล็ตที่สี่อธิบายว่านักพัฒนา Bitcoin ทดสอบว่าแพตช์ 'ถูกปลอมแปลงได้ดีพอ' หรือไม่โดยให้นักพัฒนาที่มีประสบการณ์ตรวจสอบโดยไม่ทราบช่องโหว่เฉพาะ หากผู้เชี่ยวชาญเหล่านี้ไม่สามารถระบุช่องโหว่จากแพตช์ได้ ถือว่าปลอดภัยที่จะนำไปใช้ ตัวเลือกอื่นๆ ไม่ถูกต้อง: มีการประสานงานผ่านผู้ดูแล Bitcoin Core ไม่จำเป็นต้องมีฉันทามติสำหรับแพตช์ และช่องโหว่จะถูกเก็บเป็นความลับในระหว่างการเปิดเผยอย่างรับผิดชอบ
reviewed: false
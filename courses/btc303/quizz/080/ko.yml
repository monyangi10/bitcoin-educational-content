question: 기존의 중앙 집중식 소프트웨어 시스템과 비교하여 Bitcoin에 대한 취약성 패치를 게시하는 것이 특히 복잡하게 만드는 주요 과제는 무엇인가요?
answer: 패치 코드 자체는 변경 사항을 분석하는 잠재적 공격자에게 취약점을 노출할 수 있습니다
wrong_answers:
  - 분산된 특성으로 인해 패치 배포 시기를 조정할 중앙 기관이 없습니다
  - "Bitcoin의 합의 메커니즘은 보안 패치를 적용하기 전에 과반수의 승인이 필요합니다."
  - 오픈 소스의 특성상 패치가 개발되기 전에 모든 취약점을 공개적으로 공개해야 합니다
explanation: |
  이 텍스트는 특히 '패치 자체가 취약점을 제공할 수 있으므로' 개발자가 패치를 게시할 때 매우 주의해야 한다는 점을 강조합니다 이는 솔루션이 의도치 않게 문제를 노출할 수 있는 독특한 문제를 야기합니다. 네 번째 요점은 Bitcoin 개발자가 특정 취약점을 모르는 상태에서 숙련된 개발자에게 패치를 검토하게 하여 패치가 '충분히 잘 위장되었는지'를 테스트하는 방법을 설명합니다. 이러한 전문가가 패치에서 취약점을 식별하지 못하면 배포해도 안전한 것으로 간주합니다. 다른 옵션은 올바르지 않습니다. Bitcoin 코어 유지 관리자를 통한 조정이 있고, 패치를 위해 합의가 필요하지 않으며, 책임 있는 공개 기간 동안 취약점을 비공개로 유지합니다.

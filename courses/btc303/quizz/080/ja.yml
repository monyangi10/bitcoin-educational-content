question: ビットコインの脆弱性パッチの公開を、従来の中央集権的なソフトウェアシステムと比べて特に複雑にしている主な課題は何か？
answer: パッチのコード自体が、変更を分析する潜在的な攻撃者に脆弱性を明らかにする可能性がある
wrong_answers:
  - 非中央集権的な性質は、パッチ展開のタイミングを調整する中央主体が存在しないことを意味する
  - ビットコインのコンセンサス・メカニズムでは、セキュリティ・パッチを実装する前に過半数の承認が必要となる
  - オープンソースの性質上、パッチが開発される前にすべての脆弱性が公開されなければならない
explanation: |
  この文章では、開発者がパッチを公開する際には細心の注意を払う必要があることを特に強調している。これは、解決策が不注意に問題を露呈してしまうというユニークな課題を生み出す。第4の箇条書きでは、ビットコインの開発者が、パッチが「十分に偽装されているかどうか」を、経験豊富な開発者に特定の脆弱性を知らない状態でレビューしてもらうことによってテストする方法を説明している。これらの専門家がパッチから脆弱性を特定できなければ、そのパッチはデプロイしても安全だとみなされる。他の選択肢は間違っている: ビットコインコアのメンテナーを通じて調整が行われ、パッチにコンセンサスは要求されず、脆弱性は責任ある情報公開の間、非公開にされる。

question: Ni ingorane iyihe nyamukuru ituma gusohora ibice vy’ubugoyagoye vya Bitcoin bigorana cane ugereranije n’uburyo bwa kera bwo gukoresha porogarama zihurikiye hamwe?
answer: Ico gitabu ubwaco gishobora kwerekana ubugoyagoye ku bashobora gutera abasesangura amahinduka .
wrong_answers:
  - Ukwegereza ubutegetsi bisigura ko ata butegetsi buhambaye bwo guhuza igihe co gushiramwo ibice
  - "Uburyo bwo kwumvikana bwa Bitcoin busaba kwemezwa n'abantu benshi imbere y'uko habaho uburyo bwo gucungera umutekano"
  - Kamere y'inkomoko yuguruye bisigura ko ubugoyagoye bwose butegerezwa gutangazwa ku mugaragaro imbere y'uko ama patch ategurwa
explanation: |
  Ico canditswe kirerekana canecane ko abahinguzi bategerezwa kwitwararika cane igihe basohora ama patch kubera ko 'ama patch ubwayo yoshobora gutanga ubugoyagoye.' Ivyo bituma haba ingorane idasanzwe aho umuti ushobora gushira ahabona ingorane ataco wiyumviriye. Iciyumviro ca kane c’amasasu kidondora ingene abahinguzi ba Bitcoin bagerageza nimba igice c’umubiri ‘carihishijwe neza bihagije’ mu gutuma abahinguzi bazi utuntu n’utundi bakisubiramwo batazi aho gishobora guhungabana. Iyo abo bahinga badashobora kumenya ubugoyagoye buva ku gipande, bifatwa ko ataco bitwaye gukoresha. Ayandi mahitamwo ntabwo ari meza: hariho uguhuza biciye mu bacungezi ba Bitcoin Core, ukwiyumvikana ntigusabwa ku bijanye n’ibipande, kandi ubushobozi bwo guhungabana burabikwa mu bwiherero mu gihe co gutangaza amakuru.

question: वह प्राथमिक चुनौती क्या है जो पारंपरिक केंद्रीकृत सॉफ्टवेयर प्रणालियों की तुलना में Bitcoin के लिए भेद्यता पैच प्रकाशित करना विशेष रूप से जटिल बनाती है?
answer: पैच कोड स्वयं ही परिवर्तनों का विश्लेषण करने वाले संभावित हमलावरों के लिए भेद्यता को उजागर कर सकता है
wrong_answers:
  - विकेन्द्रीकृत प्रकृति का अर्थ है कि पैच परिनियोजन समय का समन्वय करने के लिए कोई केंद्रीय प्राधिकरण नहीं है
  - "Bitcoin के सर्वसम्मति तंत्र को किसी भी सुरक्षा पैच को लागू करने से पहले बहुमत की मंजूरी की आवश्यकता होती है"
  - ओपन-सोर्स प्रकृति का अर्थ है कि पैच विकसित करने से पहले सभी कमजोरियों का सार्वजनिक रूप से खुलासा किया जाना चाहिए
explanation: |
  पाठ में विशेष रूप से इस बात पर ज़ोर दिया गया है कि डेवलपर्स को पैच प्रकाशित करते समय बेहद सावधानी बरतनी चाहिए क्योंकि 'पैच स्वयं ही भेद्यता का खुलासा कर सकता है।' यह एक अनूठी चुनौती पैदा करता है जहाँ समाधान अनजाने में समस्या को उजागर कर सकता है। चौथा बिंदु बताता है कि Bitcoin डेवलपर्स कैसे अनुभवी डेवलपर्स से विशिष्ट भेद्यता को जाने बिना इसकी समीक्षा करवाकर यह जांचते हैं कि पैच को 'काफी अच्छी तरह से छिपाया गया है' या नहीं। अगर ये विशेषज्ञ पैच से भेद्यता की पहचान नहीं कर पाते हैं, तो इसे लागू करना सुरक्षित माना जाता है। अन्य विकल्प गलत हैं: Bitcoin कोर अनुरक्षकों के माध्यम से समन्वय होता है, पैच के लिए आम सहमति की आवश्यकता नहीं होती है, और ज़िम्मेदारी से प्रकटीकरण के दौरान भेद्यताएँ गोपनीय रखी जाती हैं।
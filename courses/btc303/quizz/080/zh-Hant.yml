question: 與傳統的集中式軟體系統相比，Bitcoin 發佈漏洞修補程式特別複雜的主要挑戰是什麼？
answer: 修補程式碼本身會向分析變更的潛在攻擊者揭露漏洞
wrong_answers:
  - 分散的性質意味著沒有中央機關來協調修補程式的部署時序
  - 「Bitcoin 的共識機制需要多數人同意，才能執行任何安全修補程式」
  - 開放原始碼的性質意味著所有的弱點都必須先公開揭露，才能開發修補程式
explanation: |
  文中特別強調，開發人員在發佈修補程式時必須非常謹慎，因為「修補程式本身可能會洩露漏洞」。這造成了一個獨特的挑戰，解決方案可能會在不經意間暴露問題。第四點描述 Bitcoin 開發人員如何測試修補程式是否「偽裝得夠好」，方法是讓有經驗的開發人員在不知道特定漏洞的情況下審查修補程式。如果這些專家無法從修補程式中辨識出漏洞，就認為可以安全部署。其他選項是錯誤的: 透過 Bitcoin 核心維護者進行協調，修補程式不需要達成共識，在負責任的揭露過程中，弱點是保密的。
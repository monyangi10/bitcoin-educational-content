question: چالش اصلی که انتشار وصله‌های آسیب‌پذیری برای Bitcoin را به‌ویژه پیچیده‌تر از سیستم‌های نرم‌افزاری متمرکز سنتی می‌کند چیست؟
answer: کد پچ می‌تواند آسیب‌پذیری را به مهاجمان احتمالی که تغییرات را تحلیل می‌کنند، نشان دهد.
wrong_answers:
  - ماهیت غیرمتمرکز به این معناست که هیچ مرجع مرکزی برای هماهنگی زمان‌بندی استقرار وصله وجود ندارد.
  - "مکانیزم اجماع Bitcoin نیاز به تأیید اکثریت دارد قبل از اینکه هرگونه وصله امنیتی اعمال شود"
  - ماهیت متن‌باز به این معناست که تمام آسیب‌پذیری‌ها باید به‌صورت عمومی افشا شوند قبل از اینکه وصله‌ها توسعه یابند
explanation: |
  متن به‌طور خاص تأکید می‌کند که توسعه‌دهندگان باید هنگام انتشار وصله‌ها بسیار محتاط باشند زیرا 'خود وصله ممکن است آسیب‌پذیری را فاش کند.' این چالشی منحصر به فرد ایجاد می‌کند که در آن راه‌حل می‌تواند به‌طور ناخواسته مشکل را آشکار کند. نقطه گلوله چهارم توضیح می‌دهد که چگونه توسعه‌دهندگان Bitcoin بررسی می‌کنند که آیا یک وصله به‌خوبی 'پنهان شده است' یا خیر، با این روش که توسعه‌دهندگان با تجربه آن را بدون دانستن آسیب‌پذیری خاص بررسی می‌کنند. اگر این کارشناسان نتوانند آسیب‌پذیری را از وصله شناسایی کنند، آن را ایمن برای استقرار می‌دانند. گزینه‌های دیگر نادرست هستند: هماهنگی از طریق نگهدارندگان اصلی Bitcoin انجام می‌شود، اجماع برای وصله‌ها لازم نیست و آسیب‌پذیری‌ها در طول افشای مسئولانه خصوصی نگه داشته می‌شوند.
reviewed: false

question: 与传统的中心化软件系统相比，比特币发布漏洞补丁特别复杂的主要挑战是什么？
answer: 补丁代码本身会向分析更改的潜在攻击者暴露漏洞
wrong_answers:
  - 去中心化特性意味着没有中央机构来协调补丁的部署时机
  - 比特币的共识机制要求在实施任何安全补丁前获得多数人的批准
  - 开放源代码的性质意味着在开发修补程序之前，必须公开披露所有漏洞
explanation: |
  文中特别强调，开发者在发布补丁时必须格外谨慎，因为 "补丁本身可能会泄露漏洞"。这就形成了一个独特的挑战，即解决方案可能在无意中暴露问题。第四点描述了比特币开发者如何通过让有经验的开发者在不知道具体漏洞的情况下审查补丁，来测试补丁是否 "足够掩饰"。如果这些专家不能从补丁中识别出漏洞，就可以认为可以安全部署。其他选项都不正确：Bitcoin Core 维护者会进行协调，补丁不需要达成共识，漏洞在负责任的披露期间是保密的。

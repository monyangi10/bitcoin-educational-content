question: 세그윗 업그레이드가 이전 Bitcoin 업그레이드와 다른 주요 이슈는 무엇인가요?
answer: 압도적인 사용자 지지에도 불구하고 채굴자가 지원 신호를 보내지 않아 활성화 프로세스가 지연되었습니다
wrong_answers:
  - 업그레이드에는 일반적인 소프트 fork 구현 방식이 아닌 하드 fork이 필요했습니다
  - Segwit 코드의 기술적 버그가 해결될 때까지 안전한 배포를 방해했습니다
  - 경제 노드는 거래 수수료 증가에 대한 우려로 업그레이드를 거부했습니다
explanation: |
  세그윗 업그레이드는 Bitcoin 사용자들 사이에서 압도적인 지지를 받았지만 채굴자들이 업그레이드에 대한 지지 신호를 보내지 않는 조정 문제에 직면했기 때문에 독특했습니다. 이로 인해 일반적인 채굴자가 활성화하는 소프트 fork 메커니즘을 통해 업그레이드가 활성화될 수 없는 교착 상태가 발생했습니다. 이전의 업그레이드는 사용자와 채굴자 모두의 지지를 받았기 때문에 비교적 수월하게 진행되었습니다. 이러한 상황으로 인해 채굴자 신호에 의존하지 않는 대체 활성화 메커니즘으로 사용자 활성화 Soft 포크(UASF)가 제안되었고, 이는 Bitcoin 생태계의 다양한 이해관계자 간의 긴장감을 부각시켰습니다.
question: مسئله اصلی که ارتقاء Segwit را از ارتقاءهای قبلی Bitcoin متمایز کرد چه بود؟
answer: معدن‌چیان با وجود حمایت گسترده کاربران، از اعلام حمایت خودداری کردند و فرآیند فعال‌سازی را متوقف کردند.
wrong_answers:
  - ارتقاء نیاز به یک fork سخت به جای روش پیاده‌سازی معمول fork نرم داشت.
  - اشکالات فنی در کد Segwit مانع از استقرار ایمن شدند تا زمانی که برطرف شدند
  - گره‌های اقتصادی به دلیل نگرانی‌ها درباره افزایش کارمزد تراکنش‌ها، ارتقاء را رد کردند
explanation: |
  ارتقاء Segwit منحصر به فرد بود زیرا با مشکلی در هماهنگی مواجه شد که در آن حمایت گسترده‌ای در میان کاربران Bitcoin وجود داشت، اما ماینرها از اعلام حمایت برای ارتقاء خودداری کردند. این وضعیت بن‌بستی ایجاد کرد که در آن ارتقاء نمی‌توانست از طریق مکانیزم معمول نرم fork فعال شود. ارتقاءهای قبلی نسبتاً بدون دردسر بودند زیرا هم حمایت کاربران و هم ماینرها را داشتند. این وضعیت منجر به پیشنهاد فورک‌های Soft فعال شده توسط کاربر (UASF) به عنوان یک مکانیزم فعال‌سازی جایگزین شد که به سیگنال‌دهی ماینرها متکی نبود و تنش بین ذینفعان مختلف در اکوسیستم Bitcoin را برجسته کرد.
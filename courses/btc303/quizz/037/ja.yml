question: SegWitのアップグレードがこれまでのビットコインのアップグレードと異なる主な問題は何だったのでしょうか？
answer: ユーザーからの圧倒的な支持を得たにもかかわらず、マイナーは支持を表明せず、アクティベーション・プロセスを停滞させた
wrong_answers:
  - アップグレードには、通常のソフトフォークではなく、ハードフォークが必要だった
  - Segwitコードに技術的なバグがあり、それが解決されるまで安全な展開ができなかった
  - 経済的なノードはトランザクション手数料の増加を懸念してアップグレードを拒否した
explanation: |
  Segwitのアップグレードがユニークだったのは、ビットコインユーザーの間では圧倒的な支持があったにもかかわらず、マイナーがアップグレードへの支持を表明しないという調整問題に直面したからです。このため、アップグレードは通常のマイナーが作動させるソフトフォーク・メカニズムで作動させることができないという膠着状態に陥った。これまでのアップグレードは、ユーザーとマイナーの両方のサポートがあったため、比較的手間がかからなかった。この状況は、ビットコインエコシステムにおけるさまざまな利害関係者間の緊張を浮き彫りにし、マイナーのシグナルに依存しない代替活性化メカニズムとして、ユーザー活性化ソフトフォーク（UASF）の提案につながった。
reviewed: false

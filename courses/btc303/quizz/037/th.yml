question: ปัญหาหลักที่ทำให้การอัปเกรด Segwit แตกต่างจากการอัปเกรด Bitcoin ก่อนหน้านี้คืออะไร?
answer: นักขุดไม่ได้ส่งสัญญาณสนับสนุนแม้ว่าจะมีการสนับสนุนจากผู้ใช้เป็นจำนวนมาก ทำให้กระบวนการเปิดใช้งานหยุดชะงัก
wrong_answers:
  - การอัปเกรดต้องใช้วิธีการติดตั้ง fork แบบแข็งแทนที่จะเป็นวิธีการติดตั้ง fork แบบนุ่มตามปกติ
  - ข้อบกพร่องทางเทคนิคในโค้ด Segwit ขัดขวางการใช้งานอย่างปลอดภัยจนกว่าจะได้รับการแก้ไข
  - โหนดเศรษฐกิจปฏิเสธการอัปเกรดเนื่องจากความกังวลเกี่ยวกับค่าธรรมเนียมการทำธุรกรรมที่เพิ่มขึ้น
explanation: |
  การอัปเกรด Segwit มีความพิเศษเพราะเผชิญกับปัญหาการประสานงานที่มีการสนับสนุนอย่างท่วมท้นในหมู่ผู้ใช้ Bitcoin แต่คนขุดเหมืองปฏิเสธที่จะส่งสัญญาณสนับสนุนการอัปเกรด ซึ่งสร้างสถานการณ์ชะงักงันที่การอัปเกรดไม่สามารถเปิดใช้งานผ่านกลไก fork ที่คนขุดเหมืองเปิดใช้งานได้ การอัปเกรดก่อนหน้านี้ค่อนข้างราบรื่นเพราะมีการสนับสนุนทั้งจากผู้ใช้และคนขุดเหมือง สถานการณ์นี้นำไปสู่การเสนอ User Activated Soft Forks (UASF) เป็นกลไกการเปิดใช้งานทางเลือกที่ไม่ต้องพึ่งพาการส่งสัญญาณจากคนขุดเหมือง ซึ่งเน้นให้เห็นถึงความตึงเครียดระหว่างผู้มีส่วนได้ส่วนเสียต่าง ๆ ในระบบนิเวศ Bitcoin
reviewed: false
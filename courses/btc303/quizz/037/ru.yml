question: Что в первую очередь отличало обновление Segwit от предыдущих обновлений Bitcoin?
answer: Майнеры не подавали сигналов в службу поддержки, несмотря на огромную поддержку пользователей, что затормозило процесс активации
wrong_answers:
  - Для обновления потребовался жесткий fork вместо обычного мягкого метода реализации fork
  - Технические ошибки в коде Segwit препятствовали безопасному развертыванию до их устранения
  - Экономические узлы отказались от обновления из-за опасений по поводу увеличения комиссии за транзакции
explanation: |
  Уникальность обновления Segwit заключалась в том, что оно столкнулось с проблемой координации: пользователи Bitcoin поддерживали его в подавляющем большинстве случаев, но майнеры отказывались сигнализировать о поддержке обновления. Это создало патовую ситуацию, когда обновление не могло активироваться через обычный механизм мягкого fork, активируемый майнерами. Предыдущие обновления проходили относительно безболезненно, поскольку их поддерживали и пользователи, и майнеры. Эта ситуация привела к предложению User Activated Soft Forks (UASF) в качестве альтернативного механизма активации, который не зависел от сигналов майнеров, что подчеркивает напряженность между различными заинтересованными сторонами в экосистеме Bitcoin.
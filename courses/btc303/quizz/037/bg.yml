question: Кой беше основният проблем, който направи надстройката Segwit различна от предишните надстройки на Bitcoin?
answer: Миньорите не подадоха сигнал за поддръжка въпреки огромната подкрепа на потребителите, което забави процеса на активиране
wrong_answers:
  - Актуализацията изискваше твърд fork вместо обичайния мек метод за прилагане на fork
  - Техническите грешки в кода на Segwit не позволяваха безопасното им внедряване, докато не бъдат отстранени
  - Икономическите възли отхвърлиха ъпгрейда поради опасения за повишени такси за транзакции
explanation: |
  Надграждането на Segwit беше уникално, защото се сблъска с проблем с координацията, при който имаше огромна подкрепа сред потребителите на Bitcoin, но миньорите отказаха да сигнализират за подкрепата на надграждането. Това създаде патова ситуация, при която надстройката не можеше да се активира чрез нормалния механизъм за мека активация на fork от страна на миньорите. Предишните обновявания бяха сравнително безболезнени, защото имаха подкрепата както на потребителите, така и на миньорите. Тази ситуация доведе до предложението за активирани от потребителя вилици Soft (UASF) като алтернативен механизъм за активиране, който не разчита на сигнализацията от миньори, подчертавайки напрежението между различните заинтересовани страни в екосистемата на Bitcoin.
reviewed: false

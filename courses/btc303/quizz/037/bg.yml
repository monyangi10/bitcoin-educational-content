question: Кой беше основният проблем, който направи Segwit ъпдейта различен от предишните меки разклонения на Bitcoin?
answer: Миньорите не подадоха сигнал за поддръжка въпреки огромната подкрепа на потребителите, което забави процеса на активиране
wrong_answers:
  - Актуализацията изискваше твърдо разклонение вместо обичайния метод за прилагане на меко такова
  - Техническите грешки в кода на Segwit не позволяваха безопасното им внедряване, докато не бъдат отстранени
  - Икономическите възли отхвърлиха ъпгрейда поради опасения за повишени такси за транзакции
explanation: |
  Надграждането на Segwit беше уникално, защото се сблъска с проблем с координацията, при който имаше огромна подкрепа сред потребителите на Bitcoin, но миньорите отказаха да сигнализират за подкрепа. Това създаде патова ситуация, при която надстройката не можеше да се активира чрез нормалния механизъм за мека активация на разклонение от страна на миньорите. Предишните обновявания бяха сравнително безболезнени, защото имаха подкрепата както на потребителите, така и на миньорите. Тази ситуация доведе до предложението за меко разклонение активирано от потребителите (UASF) като алтернативен механизъм за активиране, който не разчита на сигнализацията от миньори, подчертавайки напрежението между различните заинтересовани страни в екосистемата на Bitcoin.
reviewed: true

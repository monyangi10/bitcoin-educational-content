question: Segwit 升级与以往的 Bitcoin 升级不同的主要问题是什么？
answer: 尽管得到了绝大多数用户的支持，但矿工们没有发出支持信号，导致激活进程停滞不前
wrong_answers:
  - 升级需要硬 fork，而不是通常的软 fork 实施方法
  - Segwit 代码中的技术错误在解决之前无法安全部署
  - 经济节点因担心交易费用增加而拒绝升级
explanation: |
  Segwit 升级之所以独特，是因为它面临着一个协调问题：Bitcoin 用户压倒性地支持升级，但矿工却拒绝发出支持升级的信号。这就造成了一种僵局，升级无法通过正常的矿工激活软 fork 机制激活。以前的升级由于同时得到用户和矿工的支持，所以相对比较容易。这种情况导致了用户激活 Soft 叉（UASF）作为不依赖矿工信号的替代激活机制的提议，凸显了 Bitcoin 生态系统中不同利益相关者之间的紧张关系。
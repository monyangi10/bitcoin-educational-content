question: Qual è stato il problema principale che ha reso l'aggiornamento Segwit diverso dai precedenti aggiornamenti di Bitcoin?
answer: I miner non hanno segnalato il supporto nonostante l'enorme sostegno degli utenti, bloccando il processo di attivazione
wrong_answers:
  - L'aggiornamento ha richiesto un hard fork invece del consueto metodo di implementazione tramite soft fork 
  - I bug tecnici nel codice Segwit hanno impedito una distribuzione sicura fino a quando non sono stati risolti
  - I nodi economici hanno rifiutato l'aggiornamento a causa delle preoccupazioni legate all'aumento delle commissioni di transazione
explanation: |
  L'aggiornamento Segwit è stato unico perché ha affrontato un problema di coordinamento: c'era un sostegno schiacciante da parte degli utenti di Bitcoin, ma i miner si sono rifiutati di segnalare il supporto per l'aggiornamento. Questo ha creato una situazione di stallo in cui l'aggiornamento non poteva attivarsi attraverso il normale meccanismo soft fork attivato dai miner. Gli aggiornamenti precedenti erano stati relativamente indolori perché godevano del supporto di utenti e miner. Questa situazione ha portato alla proposta di User Activated Soft Forks (UASF) come meccanismo di attivazione alternativo che non si basa sulla segnalazione dei miner, mettendo in evidenza la tensione tra i diversi partecipanti nell'ecosistema Bitcoin.
reviewed: true

question: Segwit 升級與之前的 Bitcoin 升級不同的主要問題是什麼？
answer: 儘管有龐大的使用者支持，但礦工沒有發出支持訊號，導致啟動程序停滯不前
wrong_answers:
  - 升級需要使用硬式 fork，而非一般的軟式 fork 實作方法
  - Segwit 程式碼中的技術錯誤在解決之前無法安全部署
  - 經濟節點因擔心交易費用增加而拒絕升級
explanation: |
  Segwit 升級是獨一無二的，因為它面臨一個協調問題，即 Bitcoin 使用者之間有壓倒性的支持，但礦工卻拒絕發出支持升級的信號。這造成了一個僵局，升級無法透過正常的礦工啟動軟 fork 機制來啟動。之前的升級因為有使用者和礦工的雙重支持，所以相對來說並不痛苦。這種情況導致提出使用者啟動 Soft 叉子 (UASF) 作為不依賴礦工信號的替代啟動機制，突顯了 Bitcoin 生態系統中不同利害關係人之間的緊張關係。
reviewed: false

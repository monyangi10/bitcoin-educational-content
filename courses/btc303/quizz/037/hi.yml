question: वह प्राथमिक मुद्दा क्या था जिसने सेगविट अपग्रेड को पिछले Bitcoin अपग्रेड से अलग बना दिया?
answer: भारी उपयोगकर्ता समर्थन के बावजूद खनिकों ने समर्थन का संकेत नहीं दिया, जिससे सक्रियण प्रक्रिया रुक गई
wrong_answers:
  - उन्नयन के लिए सामान्य सॉफ्ट fork कार्यान्वयन पद्धति के बजाय हार्ड fork की आवश्यकता थी
  - सेगविट कोड में तकनीकी त्रुटियों के कारण सुरक्षित तैनाती में बाधा उत्पन्न हुई, जब तक कि उनका समाधान नहीं कर लिया गया
  - आर्थिक नोड्स ने लेनदेन शुल्क में वृद्धि की चिंताओं के कारण अपग्रेड को अस्वीकार कर दिया
explanation: |
  सेगविट अपग्रेड अद्वितीय था क्योंकि इसमें समन्वय की समस्या थी जहाँ Bitcoin उपयोगकर्ताओं के बीच भारी समर्थन था, लेकिन माइनर्स ने अपग्रेड के लिए समर्थन का संकेत देने से इनकार कर दिया। इससे एक गतिरोध की स्थिति पैदा हो गई जहाँ अपग्रेड सामान्य माइनर-सक्रिय सॉफ्ट fork तंत्र के माध्यम से सक्रिय नहीं हो सका। पिछले अपग्रेड अपेक्षाकृत आसान थे क्योंकि उनमें उपयोगकर्ता और माइनर दोनों का समर्थन था। इस स्थिति के कारण, एक वैकल्पिक सक्रियण तंत्र के रूप में उपयोगकर्ता सक्रिय Soft फोर्क्स (UASF) का प्रस्ताव आया जो माइनर सिग्नलिंग पर निर्भर नहीं था, जिसने Bitcoin पारिस्थितिकी तंत्र में विभिन्न हितधारकों के बीच तनाव को उजागर किया।
question: 에릭 보스퀼의 저항의 공리에 따르면, Bitcoin이 시스템으로서 의미를 가지려면 어떤 기본 가정을 받아들여야 할까요?
answer: 시스템이 국가 통제에 저항하는 것이 가능하다는 것
wrong_answers:
  - 네트워크 해시파워의 대부분은 항상 정직하게 유지됩니다
  - 암호화 알고리즘은 양자 컴퓨팅에 의해 결코 깨지지 않을 것입니다
  - 사용자는 항상 편의성보다 탈중앙화를 우선시할 것입니다
explanation: |
  저항의 공리는 시스템이 국가의 통제에 저항할 수 있다고 가정하며, 이는 무허가 화폐로서 Bitcoin의 목적의 기초가 됩니다. 이 가정이 없다면 Bitcoin은 필연적으로 국가에 의해 통제될 수밖에 없기 때문에 전체 전제가 무너집니다. 다른 옵션은 Bitcoin의 보안과 관련이 있지만, 국가 통제에 대한 저항이 가능하다는 철학적 토대를 구체적으로 다루는 보스쿠일의 저항 공리에는 포함되지 않습니다.
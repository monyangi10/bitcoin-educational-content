question: 根據 Eric Voskuil 的阻力公理，Bitcoin 作為一個系統必須接受什麼基本假設？
answer: 系統有可能抗拒國家控制
wrong_answers:
  - 大多數網路擁有者永遠保持誠實
  - 量子運算永遠無法破解密碼演算法
  - 使用者始終會優先使用分散式服務而非便利性服務
explanation: |
  抵抗公理假設系統可以抵抗國家控制，這是 Bitcoin 作為無允許貨幣目的的基礎。如果沒有這個假設，Bitcoin 的整個前提就會崩塌，因為它將不可避免地受到國家的控制。其他選項雖然與 Bitcoin 的安全性有關，但不屬於 Voskuil 的抵抗公理的一部分，該公理特別針對抵抗國家控制是可能的這個哲學基礎。
reviewed: false

question: ตามหลักการของการต่อต้านของ Eric Voskuil ข้อสมมติฐานพื้นฐานที่ต้องยอมรับเพื่อให้ Bitcoin มีความหมายในฐานะระบบคืออะไร?
answer: เป็นไปได้ที่ระบบจะต่อต้านการควบคุมของรัฐ
wrong_answers:
  - ที่พลังแฮชของเครือข่ายส่วนใหญ่จะยังคงซื่อสัตย์เสมอ
  - อัลกอริธึมการเข้ารหัสจะไม่มีวันถูกทำลายโดยการคำนวณควอนตัม
  - ที่ผู้ใช้จะให้ความสำคัญกับการกระจายอำนาจมากกว่าความสะดวกสบายเสมอ
explanation: |
  สมมติฐานของการต่อต้านถือว่าระบบสามารถต้านทานการควบคุมของรัฐได้ ซึ่งเป็นพื้นฐานของวัตถุประสงค์ของ Bitcoin ในฐานะเงินที่ไม่ต้องขออนุญาต หากไม่มีสมมติฐานนี้ พื้นฐานทั้งหมดของ Bitcoin จะพังทลายลงเนื่องจากจะถูกควบคุมโดยรัฐอย่างหลีกเลี่ยงไม่ได้ ตัวเลือกอื่น ๆ แม้จะเกี่ยวข้องกับความปลอดภัยของ Bitcoin แต่ก็ไม่ใช่ส่วนหนึ่งของสมมติฐานของการต่อต้านของ Voskuil ซึ่งกล่าวถึงพื้นฐานทางปรัชญาที่ว่าการต่อต้านการควบคุมของรัฐนั้นเป็นไปได้
reviewed: false
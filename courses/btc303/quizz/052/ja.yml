question: エリック・ヴォスクイルの「抵抗の公理」によれば、ビットコインがシステムとして意味を持つためには、どのような基本的前提が受け入れられなければならないのか？
answer: システムが国家統制に抵抗することは可能であるという前提
wrong_answers:
  - ネットワーク・ハッシュパワーの大半は常に正直であり続けるという前提
  - 量子コンピューターによって暗号アルゴリズムが破られることはないという前提
  - ユーザーは常に利便性よりも分散化を優先するという前提
explanation: |
  抵抗の公理は、システムが国家のコントロールに抵抗できることを前提としている。これは、パーミッションレス・マネーとしてのビットコインの目的の基礎となるものだ。この前提がなければ、ビットコインは必然的に国家にコントロールされることになるため、ビットコインの前提全体が崩れてしまう。他の選択肢は、ビットコインの安全性には関係するが、ヴォスクイルの抵抗の公理には含まれていない。それは特に、国家統制への抵抗が可能であるという哲学的基礎を扱うものである。
reviewed: false

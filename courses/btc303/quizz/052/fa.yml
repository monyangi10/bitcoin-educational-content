question: طبق اصل مقاومت اریک وسکیل، چه فرض اساسی باید پذیرفته شود تا Bitcoin به عنوان یک سیستم معنادار باشد؟
answer: این امکان وجود دارد که یک سیستم در برابر کنترل دولتی مقاومت کند.
wrong_answers:
  - که اکثریت قدرت هش شبکه همیشه صادق باقی خواهد ماند
  - که الگوریتم‌های رمزنگاری هرگز توسط محاسبات کوانتومی شکسته نخواهند شد
  - که کاربران همیشه تمرکززدایی را بر راحتی اولویت خواهند داد
explanation: |
  اصل مقاومت فرض می‌کند که سیستم‌ها می‌توانند در برابر کنترل دولتی مقاومت کنند، که این امر برای هدف Bitcoin به عنوان پول بدون نیاز به مجوز اساسی است. بدون این فرض، کل مبنای Bitcoin فرو می‌ریزد زیرا به ناچار توسط دولت‌ها کنترل می‌شود. گزینه‌های دیگر، در حالی که به امنیت Bitcoin مربوط هستند، بخشی از اصل مقاومت ووسکویل نیستند، که به طور خاص به پایه فلسفی که مقاومت در برابر کنترل دولتی ممکن است، می‌پردازد.
reviewed: false

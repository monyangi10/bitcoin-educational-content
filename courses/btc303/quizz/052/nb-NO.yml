question: Hvilken grunnleggende antakelse må aksepteres for at Bitcoin skal gi mening som system, ifølge Eric Voskuils motstandsaksiom?
answer: At det er mulig for et system å motstå statlig kontroll
wrong_answers:
  - At majoriteten av nettverkets hashpower alltid vil forbli ærlig
  - At kryptografiske algoritmer aldri vil kunne brytes av kvantecomputere
  - At brukerne alltid vil prioritere desentralisering fremfor bekvemmelighet
explanation: |
  Aksiomet om motstand forutsetter at systemer kan motstå statlig kontroll, noe som er grunnleggende for Bitcoins formål som tillatelsesløse penger. Uten denne forutsetningen kollapser hele Bitcoins premiss, siden den uunngåelig vil bli kontrollert av stater. De andre alternativene er relevante for Bitcoins sikkerhet, men er ikke en del av Voskuils motstandsaksiom, som spesifikt tar for seg det filosofiske grunnlaget for at det er mulig å motstå statlig kontroll.
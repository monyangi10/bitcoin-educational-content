question: Prema aksiomu otpora Erika Voskuila, koja osnovna pretpostavka mora biti prihvaćena da bi Bitcoin imao smisla kao sistem?
answer: Da je moguće da sistem odoli državnoj kontroli
wrong_answers:
  - Da će većina mrežne hash snage uvek ostati poštena
  - Da kriptografski algoritmi nikada neće biti razbijeni kvantnim računarima
  - Da će korisnici uvek davati prednost decentralizaciji nad praktičnošću
explanation: |
  Aksiom otpora pretpostavlja da sistemi mogu da se odupru državnoj kontroli, što je osnovno za svrhu Bitcoina kao novca bez dozvole. Bez ove pretpostavke, 
  cela premisa Bitcoina bi se srušila jer bi ga države neizbežno kontrolisale. Druge opcije, iako relevantne za bezbednost Bitcoina, nisu deo Voskuilovog aksioma
  otpora, koji se specifično bavi filozofskom osnovom da je otpor državnoj kontroli moguć.
reviewed: true

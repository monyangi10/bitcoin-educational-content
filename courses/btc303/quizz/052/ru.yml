question: Согласно аксиоме сопротивления Эрика Воскуила, какое фундаментальное предположение должно быть принято, чтобы Bitcoin имела смысл как система?
answer: Что система может сопротивляться государственному контролю
wrong_answers:
  - Большая часть сетевого хэш-бэка всегда будет оставаться честной
  - Что криптографические алгоритмы никогда не будут взломаны квантовыми вычислениями
  - Пользователи всегда будут отдавать предпочтение децентрализации перед удобством
explanation: |
  Аксиома сопротивления предполагает, что системы могут противостоять государственному контролю, что является основополагающим для цели Bitcoin как безразрешительных денег. Без этого предположения вся предпосылка Bitcoin рушится, поскольку она неизбежно будет контролироваться государствами. Другие варианты, хотя и имеют отношение к безопасности Bitcoin, не являются частью аксиомы сопротивления Воскуила, которая специально рассматривает философский фундамент того, что сопротивление государственному контролю возможно.
reviewed: false

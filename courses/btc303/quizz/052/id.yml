question: Menurut aksioma resistensi Eric Voskuil, asumsi dasar apa yang harus diterima agar Bitcoin masuk akal sebagai sebuah sistem?
answer: Bahwa mungkin saja suatu sistem menolak kontrol negara
wrong_answers:
  - Bahwa mayoritas hashpower jaringan akan selalu jujur
  - Bahwa algoritma kriptografi tidak akan pernah bisa dipecahkan oleh komputasi kuantum
  - Bahwa pengguna akan selalu memprioritaskan desentralisasi daripada kenyamanan
explanation: |
  Aksioma perlawanan mengasumsikan bahwa sistem dapat melawan kontrol negara, yang merupakan dasar dari tujuan Bitcoin sebagai uang tanpa izin. Tanpa asumsi ini, seluruh premis Bitcoin akan runtuh karena pasti akan dikontrol oleh negara. Opsi-opsi lain, meskipun relevan dengan keamanan Bitcoin, bukan merupakan bagian dari aksioma perlawanan Voskuil, yang secara khusus membahas fondasi filosofis bahwa perlawanan terhadap kontrol negara itu mungkin.
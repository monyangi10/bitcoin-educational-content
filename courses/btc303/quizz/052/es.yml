question: Según el axioma de resistencia de Eric Voskuil, ¿qué supuesto fundamental debe aceptarse para que Bitcoin tenga sentido como sistema?
answer: Que es posible que un sistema resista el control del Estado
wrong_answers:
  - Que la mayoría del hashpower de la red siempre será honesto
  - La informática cuántica nunca podrá romper los algoritmos criptográficos
  - Que los usuarios siempre priorizarán la descentralización sobre la comodidad
explanation: |
  El axioma de la resistencia asume que los sistemas pueden resistir el control estatal, lo que es fundamental para el propósito de Bitcoin como dinero sin permiso. Sin este supuesto, toda la premisa de Bitcoin se derrumba, ya que estaría inevitablemente controlada por los Estados. Las otras opciones, aunque relevantes para la seguridad de Bitcoin, no forman parte del axioma de resistencia de Voskuil, que aborda específicamente el fundamento filosófico de que la resistencia al control estatal es posible.
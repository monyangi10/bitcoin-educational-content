question: 根据 Eric Voskuil 的抵抗公理（axiom of resistnace），要使比特币成为一个合理的系统，必须接受什么基本假设？
answer: 一个系统有可能抵制国家控制
wrong_answers:
  - 大多数网络力量将始终保持诚实
  - 量子计算永远无法破解加密算法
  - 用户总是优先考虑去中心化而非便利性
explanation: |
  抵抗公理假定系统可以抵制国家控制，这是比特币作为无许可货币的根本目的。如果没有这个假设，比特币的整个前提就会崩溃，因为它将不可避免地受到国家的控制。其他选项虽然与比特币的安全性有关，但并不属于沃斯奎尔的抵抗公理，该公理专门论述了抵抗国家控制是可能的这一哲学基础。

question: Welche Grundannahme muss nach Eric Voskuils Axiom des Widerstands akzeptiert werden, damit Bitcoin als System Sinn macht?
answer: Dass es möglich ist, dass sich ein System der staatlichen Kontrolle entzieht
wrong_answers:
  - Dass die Mehrheit der Netzwerk-Hashpower immer ehrlich bleiben wird
  - Dass kryptografische Algorithmen niemals durch Quantencomputer gebrochen werden können
  - Dass die Nutzer immer die Dezentralisierung der Bequemlichkeit vorziehen werden
explanation: |
  Das Axiom des Widerstands geht davon aus, dass Systeme staatlicher Kontrolle widerstehen können, was für den Zweck von Bitcoin als erlaubnisfreies Geld grundlegend ist. Ohne diese Annahme bricht die gesamte Prämisse von Bitcoin zusammen, da es unweigerlich von Staaten kontrolliert werden würde. Die anderen Optionen sind zwar für die Sicherheit von Bitcoin relevant, aber nicht Teil von Voskuils Axiom des Widerstands, das sich speziell mit der philosophischen Grundlage befasst, dass Widerstand gegen staatliche Kontrolle möglich ist.
reviewed: false

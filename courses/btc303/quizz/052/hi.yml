question: एरिक वोस्कुइल के प्रतिरोध के सिद्धांत के अनुसार, Bitcoin को एक प्रणाली के रूप में सार्थक बनाने के लिए कौन सी मौलिक धारणा को स्वीकार किया जाना चाहिए?
answer: यह संभव है कि कोई व्यवस्था राज्य नियंत्रण का विरोध कर सके
wrong_answers:
  - नेटवर्क हैशपावर का अधिकांश भाग हमेशा ईमानदार रहेगा
  - क्रिप्टोग्राफ़िक एल्गोरिदम को क्वांटम कंप्यूटिंग द्वारा कभी नहीं तोड़ा जा सकेगा
  - उपयोगकर्ता हमेशा सुविधा की तुलना में विकेंद्रीकरण को प्राथमिकता देंगे
explanation: |
  प्रतिरोध का सिद्धांत यह मानता है कि प्रणालियाँ राज्य नियंत्रण का विरोध कर सकती हैं, जो Bitcoin के अनुमति-रहित मुद्रा के उद्देश्य का आधार है। इस धारणा के बिना, Bitcoin का पूरा आधार ही ध्वस्त हो जाता है क्योंकि यह अनिवार्य रूप से राज्यों द्वारा नियंत्रित होगा। अन्य विकल्प, Bitcoin की सुरक्षा के लिए प्रासंगिक होते हुए भी, वोस्कुइल के प्रतिरोध के सिद्धांत का हिस्सा नहीं हैं, जो विशेष रूप से इस दार्शनिक आधार को संबोधित करता है कि राज्य नियंत्रण का प्रतिरोध संभव है।
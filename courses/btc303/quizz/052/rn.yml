question: Dushingiye ku ciyumviro ca Eric Voskuil c’uko umuntu ashobora kurwanya, ni ikihe ciyumviro nyamukuru gitegerezwa kwemerwa kugira ngo Bitcoin igire insiguro nk’urutonde?
answer: Ko bishoboka ko uburyo bwo kurwanya ubugenzuzi bwa Leta .
wrong_answers:
  - Ko igice kinini c'urubuga rwa hashpower kizokwama ari inzirabugunge .
  - Ubwo buhinga bwo gukora amakuru y'ibanga ntibuzokwigera bumenagurwa n'ubuhinga bwo gukoresha ubuhinga bwa quantum .
  - Uko abakoresha bazokwama bashira imbere kwegereza ubutegetsi abaturage kuruta uko bimeze
explanation: |
  Iciyumviro c’ukurwanya ciyumvira ko ubuhinga bushobora kurwanya ubugenzuzi bwa Leta, ivyo bikaba ari vyo bishingiyeko intumbero ya Bitcoin nk’amahera atagira uruhusha. Iyo ataco vyiyumviro, ikibanza cose ca Bitcoin kirasenyuka kuko ata kabuza coba kigenzurwa n’ibihugu. Ibindi bihitamwo, naho bifitaniye isano n’umutekano wa Bitcoin, ntibiri mu ciyumviro ca Voskuil co kurwanya, kivuga cane cane umushinge wa filozofiya w’uko kurwanya ubutegetsi bwa Leta bishoboka.
reviewed: false

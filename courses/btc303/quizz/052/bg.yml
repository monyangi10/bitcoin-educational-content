question: Според аксиомата на съпротивлението на Ерик Воскуил кое фундаментално допускане трябва да се приеме, за да има смисъл Bitcoin като система?
answer: Че е възможно една система да се противопостави на държавния контрол
wrong_answers:
  - Че по-голямата част от мрежата винаги ще остане честна
  - Криптографските алгоритми никога няма да бъдат разбити от квантовите изчисления
  - Потребителите винаги ще дават предимство на децентрализацията пред удобството
explanation: |
  Аксиомата за съпротивата предполага, че системите могат да се противопоставят на държавния контрол, което е в основата на целта на Bitcoin като пари без разрешение. Без това допускане цялата предпоставка на Bitcoin се срива, тъй като тя неизбежно ще бъде контролирана от държавите. Другите варианти, макар и да са от значение за сигурността на Bitcoin, не са част от аксиомата за съпротива на Воскуил, която се отнася конкретно до философската основа, че е възможна съпротива срещу държавния контрол.
reviewed: false

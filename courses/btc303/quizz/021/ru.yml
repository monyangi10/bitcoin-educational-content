question: Что служит псевдонимами в системе псевдонимов Bitcoin?
answer: Адреса, полученные из открытых ключей
wrong_answers:
  - "Описательные имена пользователей вроде "watchme1984""
  - Закрытые ключи хранятся в кошельках
  - Идентификаторы транзакций в блокчейне
explanation: |
  В качестве псевдонимов в Bitcoin используются адреса, полученные из открытых ключей, а не произвольные имена пользователей или другие идентификаторы. Этот выбор служит нескольким важным целям: он устраняет необходимость предварительной регистрации псевдонимов в блокчейне, снижает стимулы для повторного использования одного и того же псевдонима, позволяет избежать ненужного раздувания блокчейна и значительно затрудняет злоумышленникам выдавать себя за других. Использование описательных имен пользователей потребовало бы системы регистрации и создало бы уязвимости в системе безопасности, в то время как закрытые ключи должны оставаться в тайне, а идентификаторы транзакций служат другой цели в системе.
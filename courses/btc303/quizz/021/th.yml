question: อะไรที่ทำหน้าที่เป็นนามแฝงในระบบนามแฝงของ Bitcoin?
answer: ที่อยู่ที่ได้มาจากกุญแจสาธารณะ
wrong_answers:
  - "ชื่อผู้ใช้เชิงบรรยายเช่น 'watchme1984'"
  - คีย์ส่วนตัวที่เก็บไว้ในกระเป๋าเงิน
  - รหัสธุรกรรมบนบล็อกเชน
explanation: |
  Bitcoin ใช้ที่อยู่ที่ได้มาจากกุญแจสาธารณะเป็นนามแฝงแทนที่จะใช้ชื่อผู้ใช้หรือรหัสประจำตัวอื่น ๆ แบบสุ่ม การออกแบบนี้มีวัตถุประสงค์สำคัญหลายประการ: มันกำจัดความจำเป็นในการลงทะเบียนนามแฝงล่วงหน้าบนบล็อกเชน ลดแรงจูงใจในการใช้นามแฝงเดิมซ้ำ หลีกเลี่ยงการบวมของบล็อกเชนที่ไม่จำเป็น และทำให้ยากขึ้นมากสำหรับผู้ไม่หวังดีที่จะปลอมตัวเป็นผู้อื่น การใช้งานชื่อผู้ใช้ที่อธิบายได้จะต้องมีระบบการลงทะเบียนและสร้างช่องโหว่ด้านความปลอดภัย ในขณะที่กุญแจส่วนตัวต้องคงความลับและรหัสธุรกรรมมีวัตถุประสงค์ที่แตกต่างกันในระบบ
reviewed: false
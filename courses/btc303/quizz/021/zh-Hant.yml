question: 在 Bitcoin 的假名系統中，什麼可作為假名？
answer: 源自公開金鑰的位址
wrong_answers:
  - "描述性的使用者名稱，如 'watchme1984'"
  - 儲存在錢包中的私人密碼匙
  - 區塊鏈上的交易 ID
explanation: |
  Bitcoin 使用源自公開金鑰的位址作為假名，而非任意的使用者名稱或其他識別資訊。這項設計選擇可達到多項重要目的：無需事先在區塊鏈上註冊假名、減少重複使用相同假名的誘因、避免不必要的區塊鏈臃腫，並讓惡意行為者更難冒充他人。使用描述性使用者名稱需要註冊系統，並會造成安全漏洞，而私密金鑰必須保密，交易 ID 在系統中也有不同的用途。
reviewed: false

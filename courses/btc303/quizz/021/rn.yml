question: Ni igiki gikora nk’amazina y’uruyeri muri sisitemu y’amazina y’uruyeri ya Bitcoin?
answer: Aderesi zikomoka ku mfunguruzo za bose
wrong_answers:
  - "Amazina y'abakoresha adondora nka 'watchme1984'"
  - Imfunguruzo z'ibanga zibitswe mu masakoshi
  - Indangamuntu z'ubucuruzi ku rubuga rwa blockchain
explanation: |
  Bitcoin ikoresha amaderesi akomoka ku mfunguruzo za bose nk’amazina y’uruyeri aho gukoresha amazina y’abakoresha canke ibindi bimenyetso. Iryo hitamwo ry’umugambi rifise intumbero nyinshi zihambaye: rikuraho ivy’uko umuntu akeneye kwandika amazina y’uruyeri imbere y’igihe ku rubuga rwa blockchain, rigabanya inguvu zituma umuntu asubira gukoresha iryo zina ry’uruyeri nyene, ririnda gutera ivyatsi bidakenewe, kandi rituma bigorana cane ko abakora ivy’ububisha bigira nk’abandi. Gukoresha amazina y’abakoresha adondora vyosaba uburyo bwo kwandika no gutuma habaho ubugoyagoye mu bijanye n’umutekano, mu gihe imfunguruzo z’ibanga zitegerezwa kuguma ari ibanga kandi ID z’ibikorwa zikora intumbero itandukanye muri ubwo buryo.

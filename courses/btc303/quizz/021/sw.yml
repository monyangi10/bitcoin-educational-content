question: Ni nini hutumika kama majina bandia katika mfumo wa majina bandia wa Bitcoin?
answer: Anwani zinazotokana na funguo za umma
wrong_answers:
  - "Majina ya maelezo ya mtumiaji kama 'watchme1984'"
  - Funguo za kibinafsi zilizohifadhiwa kwenye pochi
  - Vitambulisho vya muamala kwenye blockchain
explanation: |
  Bitcoin hutumia anwani zinazotokana na vitufe vya umma kama majina bandia badala ya majina ya watumiaji kiholela au vitambulishi vingine. Chaguo hili la muundo hutumikia madhumuni mengi muhimu: huondoa hitaji la kusajili majina bandia mapema kwenye blockchain, hupunguza motisha ya kutumia tena jina la uwongo, huepuka kizuizi kisicho cha lazima, na hufanya iwe vigumu zaidi kwa watendaji hasidi kuiga wengine. Kutumia majina ya maelezo ya mtumiaji kutahitaji mfumo wa usajili na kuunda athari za kiusalama, ilhali funguo za faragha lazima zisalie kuwa siri na vitambulisho vya muamala vitatumika kwa madhumuni tofauti katika mfumo.
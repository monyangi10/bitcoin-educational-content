question: Bitcoin की छद्मनाम प्रणाली में छद्मनाम के रूप में क्या कार्य करता है?
answer: सार्वजनिक कुंजियों से प्राप्त पते
wrong_answers:
  - "'watchme1984' जैसे वर्णनात्मक उपयोगकर्ता नाम"
  - वॉलेट में संग्रहीत निजी कुंजियाँ
  - ब्लॉकचेन पर लेनदेन आईडी
explanation: |
  Bitcoin, मनमाने उपयोगकर्ता नामों या अन्य पहचानकर्ताओं के बजाय, सार्वजनिक कुंजियों से प्राप्त पतों को छद्म नामों के रूप में उपयोग करता है। यह डिज़ाइन विकल्प कई महत्वपूर्ण उद्देश्यों की पूर्ति करता है: यह ब्लॉकचेन पर पहले से छद्म नामों को पंजीकृत करने की आवश्यकता को समाप्त करता है, उसी छद्म नाम का बार-बार उपयोग करने के प्रोत्साहन को कम करता है, अनावश्यक ब्लॉकचेन विस्तार से बचाता है, और दुर्भावनापूर्ण व्यक्तियों के लिए दूसरों का प्रतिरूपण करना बहुत कठिन बना देता है। वर्णनात्मक उपयोगकर्ता नामों का उपयोग करने के लिए एक पंजीकरण प्रणाली की आवश्यकता होगी और सुरक्षा कमज़ोरियाँ पैदा होंगी, जबकि निजी कुंजियाँ गुप्त रहनी चाहिए और लेनदेन आईडी सिस्टम में एक अलग उद्देश्य पूरा करती हैं।

question: Какво служи като псевдоним в псевдоанонимната Bitcoin система?
answer: Адреси, получени от публични ключове
wrong_answers:
  - Описателни потребителски имена като watchme1984
  - Частни ключове, съхранявани в портфейли
  - Идентификатори на трансакциите в блокчейна
explanation: |
  Bitcoin използва адреси, получени от публични ключове, като псевдоними, а не произволни потребителски имена или други идентификатори. Този избор служи за няколко важни цели: премахва необходимостта от предварителна регистрация на псевдоними в блокчейна, намалява стимулите за повторно използване на един и същ псевдоним, избягва ненужното раздуване на блокчейна и прави много по-трудно за злонамерените участници да се представят за други. Използването на описателни потребителски имена би изисквало система за регистрация и би създало уязвимости в сигурността, докато частните ключове трябва да останат в тайна, а идентификаторите на трансакциите служат за различна цел в системата.
reviewed: true

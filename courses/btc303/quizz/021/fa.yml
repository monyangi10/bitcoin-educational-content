question: چه چیزی به عنوان نام مستعار در سیستم نام مستعار Bitcoin عمل می‌کند؟
answer: آدرس‌هایی که از کلیدهای عمومی استخراج شده‌اند
wrong_answers:
  - "نام‌های کاربری توصیفی مانند 'watchme1984'"
  - کلیدهای خصوصی ذخیره‌شده در کیف‌پول‌ها
  - شناسه‌های تراکنش در بلاکچین
explanation: |
  Bitcoin از آدرس‌هایی که از کلیدهای عمومی به‌عنوان نام‌های مستعار به‌جای نام‌های کاربری دلخواه یا شناسه‌های دیگر مشتق شده‌اند، استفاده می‌کند. این انتخاب طراحی چندین هدف مهم را دنبال می‌کند: نیاز به ثبت نام‌های مستعار از پیش در بلاکچین را از بین می‌برد، انگیزه‌ها برای استفاده مجدد از همان نام مستعار را کاهش می‌دهد، از تورم غیرضروری بلاکچین جلوگیری می‌کند و جعل هویت دیگران توسط بازیگران مخرب را بسیار دشوارتر می‌سازد. استفاده از نام‌های کاربری توصیفی نیاز به یک سیستم ثبت‌نام دارد و آسیب‌پذیری‌های امنیتی ایجاد می‌کند، در حالی که کلیدهای خصوصی باید محرمانه بمانند و شناسه‌های تراکنش در سیستم هدف متفاوتی را دنبال می‌کنند.
reviewed: false

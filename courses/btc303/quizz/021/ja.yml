question: ビットコインの仮名システムでは、何が仮名になるのか？
answer: 公開鍵に由来するアドレス
wrong_answers:
  - watchme1984のような説明的なユーザー名
  - ウォレットに保管された秘密鍵
  - ブロックチェーン上のトランザクションID
explanation: |
  ビットコインでは、任意のユーザー名やその他の識別子ではなく、公開鍵に由来するアドレスを仮名として使用する。この設計上の選択には複数の重要な目的がある。仮名をブロックチェーンに事前に登録する必要がなくなり、同じ仮名を再利用するインセンティブが減り、不必要なブロックチェーンの肥大化を避け、悪意のある行為者が他人になりすますことがはるかに難しくなる。一方、秘密鍵は秘密のままでなければならず、トランザクションIDはシステムにおいて別の役割を果たす。
reviewed: false

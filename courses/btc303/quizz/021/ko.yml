question: Bitcoin의 가명 시스템에서 가명 역할을 하는 것은 무엇인가요?
answer: 공개 키에서 파생된 주소
wrong_answers:
  - "'watchme1984'와 같은 설명적인 사용자 아이디"
  - 지갑에 저장된 개인 키
  - 블록체인의 거래 ID
explanation: |
  Bitcoin은 임의의 사용자 이름이나 기타 식별자 대신 공개 키에서 파생된 주소를 가명으로 사용합니다. 이러한 설계 선택은 블록체인에 가명을 미리 등록할 필요가 없고, 동일한 가명을 재사용하는 인센티브를 줄이며, 불필요한 블록체인 부풀리기를 방지하고, 악의적인 행위자가 다른 사람을 사칭하기 훨씬 더 어렵게 만드는 등 여러 중요한 목적을 달성합니다. 설명형 사용자명을 사용하려면 등록 시스템이 필요하고 보안 취약점이 발생하며, 개인 키는 비밀로 유지되어야 하고 트랜잭션 ID는 시스템에서 다른 용도로 사용됩니다.

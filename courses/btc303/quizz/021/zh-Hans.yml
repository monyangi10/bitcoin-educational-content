question: 在 Bitcoin 的假名系统中，什么可以作为假名？
answer: 公共密钥生成的地址
wrong_answers:
  - "描述性用户名，如'watchme1984'"
  - 存储在钱包中的私人密钥
  - 区块链上的交易 ID
explanation: |
  Bitcoin 使用源于公钥的地址作为假名，而不是任意用户名或其他标识符。这种设计选择有多个重要目的：它消除了事先在区块链上注册假名的需要，减少了重复使用相同假名的动机，避免了不必要的区块链臃肿，并使恶意行为者更难冒充他人。使用描述性用户名需要注册系统，会产生安全漏洞，而私钥必须保密，交易 ID 在系统中的作用也不同。
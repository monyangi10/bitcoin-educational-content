question: Bitcoin'ın takma ad sisteminde takma ad olarak ne kullanılır?
answer: Açık anahtarlardan türetilen adresler
wrong_answers:
  - "'watchme1984' gibi tanımlayıcı kullanıcı adları"
  - Cüzdanlarda saklanan özel anahtarlar
  - Blok zincirindeki işlem kimlikleri
explanation: |
  Bitcoin, rasgele kullanıcı adları veya diğer tanımlayıcılar yerine açık anahtarlardan türetilen adresleri takma ad olarak kullanır. Bu tasarım tercihi birçok önemli amaca hizmet eder: takma adların blok zincirine önceden kaydedilmesi ihtiyacını ortadan kaldırır, aynı takma adın tekrar kullanılmasına yönelik teşvikleri azaltır, gereksiz blok zinciri şişkinliğini önler ve kötü niyetli aktörlerin başkalarını taklit etmesini çok daha zor hale getirir. Açıklayıcı kullanıcı adlarının kullanılması bir kayıt sistemi gerektirecek ve güvenlik açıkları yaratacaktır, özel anahtarların gizli kalması gerekirken işlem kimlikleri sistemde farklı bir amaca hizmet eder.
question: Was dient als Pseudonym im Pseudonymsystem von Bitcoin?
answer: Von öffentlichen Schlüsseln abgeleitete Adressen
wrong_answers:
  - "Beschreibende Benutzernamen wie 'watchme1984'"
  - In Geldbörsen gespeicherte private Schlüssel
  - Transaktions-IDs in der Blockchain
explanation: |
  Bitcoin verwendet von öffentlichen Schlüsseln abgeleitete Adressen als Pseudonyme und nicht beliebige Benutzernamen oder andere Identifikatoren. Diese Entscheidung dient mehreren wichtigen Zwecken: Sie macht eine vorherige Registrierung von Pseudonymen in der Blockchain überflüssig, verringert die Anreize zur Wiederverwendung desselben Pseudonyms, vermeidet eine unnötige Aufblähung der Blockchain und erschwert es böswilligen Akteuren, sich für andere auszugeben. Die Verwendung beschreibender Benutzernamen würde ein Registrierungssystem erfordern und Sicherheitslücken schaffen, während private Schlüssel geheim bleiben müssen und Transaktions-IDs einem anderen Zweck im System dienen.
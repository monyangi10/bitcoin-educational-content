question: Wat dient als pseudoniem in het pseudoniemsysteem van Bitcoin?
answer: Adressen afgeleid van openbare sleutels
wrong_answers:
  - "Beschrijvende gebruikersnamen zoals 'watchme1984'"
  - Privé sleutels opgeslagen in portemonnees
  - Transactie-ID's op de blockchain
explanation: |
  Bitcoin gebruikt adressen afgeleid van publieke sleutels als pseudoniemen in plaats van willekeurige gebruikersnamen of andere identificatoren. Deze ontwerpkeuze dient meerdere belangrijke doelen: het elimineert de noodzaak om pseudoniemen vooraf te registreren op de blockchain, vermindert de stimulans voor hergebruik van hetzelfde pseudoniem, vermijdt onnodige blockchain bloat en maakt het veel moeilijker voor kwaadwillende actoren om zich voor te doen als anderen. Het gebruik van beschrijvende gebruikersnamen zou een registratiesysteem vereisen en kwetsbaarheden in de beveiliging creëren, terwijl privésleutels geheim moeten blijven en transactie-ID's een ander doel dienen in het systeem.
question: अध्याय के अनुसार, Bitcoin सर्वसम्मति नियम परिवर्तनों में सॉफ्ट fork को हार्ड fork से क्या अलग करता है?
answer: एक सॉफ्ट fork पूरी तरह से संगत है (आगे और पीछे दोनों संगत) जबकि एक हार्ड fork केवल पीछे संगत है
wrong_answers:
  - एक सॉफ्ट fork को माइनर सिग्नलिंग एक्टिवेशन की आवश्यकता होती है जबकि एक हार्ड fork को फ्लैग डे एक्टिवेशन की आवश्यकता होती है
  - एक सॉफ्ट fork मौजूदा ऑपकोड को बदलता है जबकि एक हार्ड fork केवल OP_NOP1-OP_NOP10 जैसे नए ऑपकोड जोड़ता है
  - सॉफ्ट fork को गुप्त रूप से कमिट्स में लागू किया जा सकता है, जबकि हार्ड fork के लिए सार्वजनिक घोषणा की आवश्यकता होती है
explanation: |
  यह अध्याय संगतता के प्रकारों को स्पष्ट रूप से परिभाषित करता है: अग्रगामी संगतता पुराने सॉफ़्टवेयर को अज्ञात भागों को अनदेखा करके नए डेटा को संसाधित करने की अनुमति देती है, जबकि पश्चगामी संगतता नए सॉफ़्टवेयर को पुराने डेटा को संसाधित करने की अनुमति देती है। एक सॉफ्ट fork दोनों प्रकार की संगतता बनाए रखता है, जिससे यह पूरी तरह से संगत हो जाता है। एक हार्ड fork केवल पश्चगामी संगतता बनाए रखता है, जिसका अर्थ है कि नया सॉफ़्टवेयर पुराने डेटा को संसाधित कर सकता है, लेकिन पुराना सॉफ़्टवेयर अपग्रेड किए गए सिस्टम से नए डेटा को संसाधित नहीं कर सकता। यह अंतर Bitcoin अपग्रेड तंत्र को समझने और नेटवर्क सामंजस्य बनाए रखने के लिए सॉफ्ट फ़ोर्क्स को प्राथमिकता देने के कारणों को समझने के लिए महत्वपूर्ण है।

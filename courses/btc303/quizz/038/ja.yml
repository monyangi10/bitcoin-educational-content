question: 章によると、Bitcoinのコンセンサスルール変更において、ソフトforkとハードforkの違いは何ですか？
answer: ソフトforkは完全互換（前方互換と後方互換の両方）だが、ハードforkは後方互換のみである。
wrong_answers:
  - ソフトforkは採掘者の信号による起動を必要とし、ハードforkは旗日起動を使用する
  - ソフトforkは既存のオペコードを変更するが、ハードforkはOP_NOP1-OP_NOP10のような新しいオペコードを追加するだけである。
  - ソフトなforkはコミットで密かに実装できるが、ハードなforkは公表が必要だ。
explanation: |
  この章では、互換性の種類を明確に定義している。前方互換性とは、古いソフトウェアが未知の部分を無視して新しいデータを処理することであり、後方互換性とは、新しいソフトウェアが古いデータを処理することである。ソフト fork は両方の互換性を維持し、完全な互換性を持つ。ハードforkは後方互換性しか維持しないので、新しいソフトは古いデータを処理できるが、古いソフトはアップグレードシステムからの新しいデータを処理できない。この区別は、Bitcoin のアップグレード・メカニズムを理解する上で極めて重要であり、なぜソフト・フォークがネットワークの調和を維持する上で好ましいのか、という理由でもある。

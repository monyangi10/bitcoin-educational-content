question: 이 장에 따르면 Bitcoin 합의 규칙 변경에서 소프트 fork과 하드 fork의 차이점은 무엇인가요?
answer: 소프트 fork는 완전 호환(포워드 및 레거시 호환 모두)이 가능한 반면 하드 fork는 레거시 호환만 가능합니다
wrong_answers:
  - 소프트 fork는 채굴자 신호 활성화가 필요하지만 하드 fork는 깃발 날 활성화를 사용합니다
  - 소프트 fork는 기존 옵코드를 변경하는 반면, 하드 fork는 OP_NOP1-OP_NOP10과 같은 새로운 옵코드만 추가합니다
  - 소프트 fork는 커밋에서 비밀리에 구현할 수 있지만 하드 fork는 공개 발표가 필요합니다
explanation: |
  이 장에서는 호환성 유형을 명확하게 정의합니다. 포워드 호환성은 이전 소프트웨어가 알 수 없는 부분을 무시하고 새로운 데이터를 처리할 수 있도록 하는 반면, 백워드 호환성은 새로운 소프트웨어가 이전 데이터를 처리할 수 있도록 합니다. 소프트 fork은 두 가지 유형의 호환성을 모두 유지하여 완벽한 호환성을 제공합니다. 하드 fork은 이전 버전과의 호환성만 유지하므로 새 소프트웨어는 이전 데이터를 처리할 수 있지만 이전 소프트웨어는 업그레이드된 시스템의 새 데이터를 처리할 수 없습니다. 이 구분은 Bitcoin 업그레이드 메커니즘을 이해하고 네트워크 조화를 유지하기 위해 소프트 포크가 선호되는 이유를 이해하는 데 매우 중요합니다.
question: طبق این فصل، چه چیزی یک fork نرم را از یک fork سخت در تغییرات قوانین اجماع Bitcoin متمایز می‌کند؟
answer: یک fork نرم به‌طور کامل سازگار است (هم به‌صورت پیشرو و هم به‌صورت پسرو سازگار است) در حالی که یک fork سخت فقط به‌صورت پسرو سازگار است.
wrong_answers:
  - یک fork نرم نیاز به فعال‌سازی با سیگنال‌دهی ماینر دارد در حالی که یک fork سخت از فعال‌سازی روز پرچم استفاده می‌کند
  - یک fork نرم، اپکدهای موجود را تغییر می‌دهد در حالی که یک fork سخت تنها اپکدهای جدیدی مانند OP_NOP1-OP_NOP10 اضافه می‌کند.
  - یک fork نرم می‌تواند به‌طور مخفیانه در کامیت‌ها پیاده‌سازی شود، در حالی که یک fork سخت نیاز به اعلام عمومی دارد.
explanation: |
  این فصل به وضوح انواع سازگاری را تعریف می‌کند: سازگاری رو به جلو به نرم‌افزار قدیمی اجازه می‌دهد تا داده‌های جدید را با نادیده گرفتن بخش‌های ناشناخته پردازش کند، در حالی که سازگاری به عقب به نرم‌افزار جدید اجازه می‌دهد تا داده‌های قدیمی را پردازش کند. یک fork نرم هر دو نوع سازگاری را حفظ می‌کند و آن را به طور کامل سازگار می‌سازد. یک fork سخت تنها سازگاری به عقب را حفظ می‌کند، به این معنی که نرم‌افزار جدید می‌تواند داده‌های قدیمی را پردازش کند اما نرم‌افزار قدیمی نمی‌تواند داده‌های جدید از سیستم ارتقاء یافته را پردازش کند. این تمایز برای درک مکانیزم‌های ارتقاء Bitcoin و دلیل ترجیح فورک‌های نرم برای حفظ هماهنگی شبکه بسیار مهم است.
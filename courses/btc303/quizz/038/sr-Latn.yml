question: Prema poglavlju, šta razlikuje soft fork od hard forka u promenama konsenzusnih pravila Bitcoina?
answer: Soft fork je potpuno kompatibilan (i unapred i unazad kompatibilan), dok je hard fork samo unazad kompatibilan.
wrong_answers:
  - Soft fork zahteva aktivaciju signalizacijom rudara dok hard fork koristi aktivaciju na određeni dan
  - Soft fork menja postojeće opkode dok hard fork samo dodaje nove opkode kao što su OP_NOP1-OP_NOP10
  - Soft fork može biti implementiran tajno u commit-ovima dok hard fork zahteva javno objavljivanje
explanation: |
  Poglavlje jasno definiše tipove kompatibilnosti: forward (unapred) kompatibilnost omogućava starom softveru da obrađuje nove podatke ignorišući nepoznate delove,
  dok backward (unazad) kompatibilnost omogućava novom softveru da obrađuje stare podatke. Soft fork održava oba tipa kompatibilnosti, čineći ga potpuno kompatibilnim.
  Hard fork održava samo backward kompatibilnost, što znači da novi softver može obrađivati stare podatke, ali stari softver ne može obrađivati nove podatke iz nadograđenog sistema. 
  Ova razlika je ključna za razumevanje Bitcoin mehanizama nadogradnje i zašto su soft forkovi preferirani za održavanje harmonije mreže.
reviewed: true

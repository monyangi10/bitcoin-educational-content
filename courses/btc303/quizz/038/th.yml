question: ตามบทนี้ อะไรที่ทำให้ fork แบบนุ่มนวลแตกต่างจาก fork แบบแข็งในกฎการเปลี่ยนแปลงฉันทามติของ Bitcoin?
answer: fork แบบนุ่มเข้ากันได้อย่างสมบูรณ์ (ทั้งไปข้างหน้าและย้อนหลัง) ในขณะที่ fork แบบแข็งเข้ากันได้เฉพาะย้อนหลังเท่านั้น
wrong_answers:
  - fork แบบนุ่มต้องการการเปิดใช้งานสัญญาณของคนขุดแร่ ในขณะที่ fork แบบแข็งใช้การเปิดใช้งานแบบวันธง
  - fork แบบนุ่มนวลจะเปลี่ยนรหัสปฏิบัติการที่มีอยู่ ในขณะที่ fork แบบแข็งจะเพิ่มรหัสปฏิบัติการใหม่เท่านั้น เช่น OP_NOP1-OP_NOP10
  - fork แบบนุ่มนวลสามารถนำไปใช้ในคอมมิตได้อย่างลับๆ ในขณะที่ fork แบบแข็งต้องมีการประกาศต่อสาธารณะ
explanation: |
  บทนี้กำหนดประเภทความเข้ากันได้อย่างชัดเจน: ความเข้ากันได้ไปข้างหน้า (forward compatibility) ช่วยให้ซอฟต์แวร์เก่าสามารถประมวลผลข้อมูลใหม่ได้โดยการละเว้นส่วนที่ไม่รู้จัก ในขณะที่ความเข้ากันได้ย้อนหลัง (backward compatibility) ช่วยให้ซอฟต์แวร์ใหม่สามารถประมวลผลข้อมูลเก่าได้ fork แบบนุ่มนวล (soft fork) รักษาทั้งสองประเภทของความเข้ากันได้ ทำให้มันเข้ากันได้อย่างเต็มที่ fork แบบแข็ง (hard fork) รักษาเฉพาะความเข้ากันได้ย้อนหลัง หมายความว่าซอฟต์แวร์ใหม่สามารถประมวลผลข้อมูลเก่าได้ แต่ซอฟต์แวร์เก่าไม่สามารถประมวลผลข้อมูลใหม่จากระบบที่อัปเกรดได้ ความแตกต่างนี้มีความสำคัญอย่างยิ่งในการทำความเข้าใจกลไกการอัปเกรด Bitcoin และเหตุใดการแยกแบบนุ่มนวล (soft forks) จึงเป็นที่นิยมในการรักษาความกลมกลืนของเครือข่าย
reviewed: false
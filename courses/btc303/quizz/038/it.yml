question: Secondo il capitolo, cosa distingue un soft fork da un hard fork nelle modifiche alle regole di consenso di Bitcoin?
answer: Un soft fork è completamente compatibile (sia nel futuro che nel passato), mentre un hardk fork è compatibile solo al passato
wrong_answers:
  - Un soft fork richiede l'attivazione del segnale del miner, mentre un hard fork utilizza il flag day activation
  - Un soft fork modifica gli opcode esistenti, mentre un hard fork aggiunge solo nuovi opcode come OP_NOP1-OP_NOP10
  - Un soft fork può essere implementato segretamente nei codice, mentre un hard fork richiede un annuncio pubblico
explanation: |
  Il capitolo definisce chiaramente i tipi di compatibilità: la compatibilità futura permette al vecchio software di elaborare i nuovi dati ignorando le parti sconosciute, mentre la retrocompatibilità permette al nuovo software di elaborare i vecchi dati. Un soft fork mantiene entrambi i tipi di compatibilità, rendendolo completamente compatibile. Un hard fork mantiene solo la retrocompatibilità, il che significa che il nuovo software può elaborare i vecchi dati ma il vecchio software non può elaborare i nuovi dati del sistema aggiornato. Questa distinzione è fondamentale per comprendere i meccanismi di aggiornamento di Bitcoin e perché i soft fork sono preferibili per mantenere l'armonia della rete.
reviewed: true

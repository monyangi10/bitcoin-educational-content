question: 根據本章所述，在 Bitcoin 共識規則變更中，軟性 fork 與硬性 fork 的區別為何？
answer: 軟版 fork 是完全相容的（向前和向後相容），而硬版 fork 僅向後相容。
wrong_answers:
  - 軟式 fork 需要礦工信號啟動，而硬式 fork 則使用旗日啟動。
  - 軟 fork 會變更現有的操作碼，而硬 fork 只會新增 OP_NOP1-OP_NOP10 之類的操作碼。
  - 軟性 fork 可以在提交中秘密實作，而硬性 fork 則需要公開宣告
explanation: |
  本章明確定義了相容性類型：前向相容性允許舊軟體忽略未知部分來處理新資料，而後向相容性則允許新軟體處理舊資料。軟版 fork 維持這兩種相容性，使其完全相容。硬式 fork 只維持向後相容性，這表示新軟體可以處理舊資料，但舊軟體無法處理升級系統的新資料。這個區別對於了解 Bitcoin 升級機制以及為何軟分叉是維持網路和諧性的首選是非常重要的。
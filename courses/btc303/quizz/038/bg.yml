question: Според главата, какво отличава мек fork от твърд fork в консенсусните промени на правилата на Bitcoin?
answer: Мекият fork е напълно съвместим (както напред, така и назад), докато твърдият fork е съвместим само назад
wrong_answers:
  - Мекият fork изисква активиране на сигнал от миньор, докато твърдият fork използва активиране в деня на флага
  - Мекият fork променя съществуващите опкодове, докато твърдият fork добавя само нови опкодове като OP_NOP1-OP_NOP10
  - мек fork може да бъде приложен тайно в ревизиите, докато твърд fork изисква публично обявяване
explanation: |
  В главата ясно са дефинирани видовете съвместимост: пряката съвместимост позволява на стария софтуер да обработва нови данни, като пренебрегва неизвестни части, а обратната съвместимост позволява на новия софтуер да обработва стари данни. Софтуерът fork поддържа и двата типа съвместимост, което го прави напълно съвместим. Твърдият fork поддържа само обратна съвместимост, което означава, че новият софтуер може да обработва стари данни, но старият софтуер не може да обработва нови данни от обновената система. Това разграничение е от решаващо значение за разбирането на механизмите за надграждане на Bitcoin и защо меките разклонения са предпочитани за поддържане на мрежовата хармония.

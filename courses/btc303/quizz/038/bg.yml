question: Според главата, какво отличава меко разклонение от твърдо такова в консенсусните промени на правилата на Bitcoin?
answer: Мекото е напълно съвместимо (както напред, така и назад), докато твърдото е съвместимо само назад
wrong_answers:
  - Мекото разклонение изисква активиране на сигнал от миньор, докато твърдото използва активиране в деня на флага
  - Мекото разклонениеМекият fork променя съществуващите опкодове, докато твърдото добавя само нови опкодове като OP_NOP1-OP_NOP10
  - Мекото разклонение може да бъде приложено тайно в ревизиите, докато твърдото изисква публично обявяване
explanation: |
  В главата ясно са дефинирани видовете съвместимост: пряката съвместимост позволява на стария софтуер да обработва нови данни, като пренебрегва неизвестни части, а обратната съвместимост позволява на новия софтуер да обработва стари данни. Мекото разклонение поддържа и двата типа съвместимост, което го прави напълно съвместим. Твърдото поддържа само обратна съвместимост, което означава, че новият софтуер може да обработва стари данни, но старият софтуер не може да обработва нови данни от обновената система. Това разграничение е от решаващо значение за разбирането на механизмите за надграждане на Bitcoin и защо меките разклонения са предпочитани за поддържане на мрежовата хармония.
reviewed: true

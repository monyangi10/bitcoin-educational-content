question: Согласно главе, что отличает мягкий fork от жесткого fork в изменениях правил консенсуса Bitcoin?
answer: Мягкий fork полностью совместим (и вперед, и назад), а жесткий fork - только назад
wrong_answers:
  - Мягкий fork требует активации сигнала шахтера, в то время как жесткий fork использует активацию дня флага
  - Мягкий fork изменяет существующие опкоды, в то время как жесткий fork добавляет только новые опкоды, такие как OP_NOP1-OP_NOP10
  - Мягкий fork может быть реализован тайно в коммитах, в то время как жесткий fork требует публичного объявления
explanation: |
  В главе четко определены типы совместимости: прямая совместимость позволяет старому программному обеспечению обрабатывать новые данные, игнорируя неизвестные части, а обратная совместимость позволяет новому программному обеспечению обрабатывать старые данные. Мягкий fork поддерживает оба типа совместимости, что делает его полностью совместимым. Жесткий fork поддерживает только обратную совместимость, то есть новое ПО может обрабатывать старые данные, но старое ПО не может обрабатывать новые данные из обновленной системы. Это различие очень важно для понимания механизмов обновления Bitcoin и того, почему мягкие развилки предпочтительнее для поддержания гармонии сети.

question: 根据该章节，在 Bitcoin 共识规则变更中，软 fork 和硬 fork 的区别是什么？
answer: 软 fork 完全兼容（向前和向后兼容），而硬 fork 仅向后兼容
wrong_answers:
  - 软式 fork 需要矿工信号激活，而硬式 fork 则使用旗日激活
  - 软 fork 更改现有的操作码，而硬 fork 只增加新的操作码，如 OP_NOP1-OP_NOP10
  - 软性 fork 可以在提交中秘密实施，而硬性 fork 则需要公开宣布
explanation: |
  该章明确定义了兼容性类型：前向兼容性允许旧软件忽略未知部分来处理新数据，而后向兼容性允许新软件处理旧数据。软版 fork 可同时保持这两种类型的兼容性，因此是完全兼容的。硬 fork 只保持向后兼容性，这意味着新软件可以处理旧数据，但旧软件无法处理升级系统中的新数据。这一区别对于理解 Bitcoin 升级机制以及软分叉为何更适合于保持网络和谐至关重要。
reviewed: false

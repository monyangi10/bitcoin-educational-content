question: 根据该章节，在比特币共识规则变更中，软分叉和硬分叉的区别是什么？
answer: 软分叉完全兼容（向前和向后兼容），而硬分叉仅向后兼容
wrong_answers:
  - 软分叉需要矿工信号激活，而硬分叉则使用截止日期（flag day）
  - 软分叉更改现有的操作码，而硬分叉只增加新的操作码，如 OP_NOP1-OP_NOP10
  - 软分叉可以在提交中秘密实施，而硬分叉则需要公开宣布
explanation: |
  该章明确定义了兼容性类型：向前兼容性允许旧软件忽略未知部分来处理新数据，而向后兼容性允许新软件处理旧数据。软分叉可同时保持这两种类型的兼容性，因此是完全兼容的。硬分叉只保持向后兼容性，这意味着新软件可以处理旧数据，但旧软件无法处理升级系统中的新数据。这一区别对于理解比特币升级机制以及软分叉为何更适合于保持网络和谐至关重要。

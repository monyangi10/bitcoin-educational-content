question: ユーザー起動型ソフトフォーク（UASF）に関するShaolinfryの議論によると、アップグレードの実装に関するマイナー起動型ソフトフォークの主な問題は何ですか？
answer: ハッシュレートのごく一部が、全員のアップグレードを拒否することができ、アップグレードの慣性を生み出す
wrong_answers:
  - マイナーは、多数決合意を通じて、ソフトフォークの実施後にアクティベーションを取り消すことができる
  - 経済的なノードは、マイナーが起動の合図を送ると、検証ルールの制御を失う
  - ソフトフォークの変更は永続的なものとなり、マイナーが一度有効にすると変更できない
explanation: |
  Shaolinfryは、マイナーのシグナリングが自然な拒否権システムを作り出し、ハッシュレートのわずかな割合でさえ、ネットワーク全体に対するアップグレードの有効化を妨げる可能性があることを明らかにした。この「アップグレードの慣性」は、マイニングがより分散化されるにつれて問題となり、有益なプロトコルの改善をブロックする可能性がある。他のオプションは、ソフトフォークがどのように機能するかを誤って伝えています。マイナーが一方的にアクティベーションを取り消すことはできず、経済的なノードは検証権限を保持し、ソフトフォークは理論上、その後のアップグレードによって修正することができます。
reviewed: false

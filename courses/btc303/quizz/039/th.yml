question: ตามข้อโต้แย้งของ Shaolinfry สำหรับ User Activated Soft Forks (UASF) ปัญหาหลักของการใช้ miner-activated soft forks ในการอัปเกรดคืออะไร?
answer: เปอร์เซ็นต์เล็กน้อยของ hashrate สามารถยับยั้งการอัปเกรดสำหรับทุกคน ทำให้เกิดความเฉื่อยในการอัปเกรด
wrong_answers:
  - นักขุดสามารถย้อนกลับการเปิดใช้งาน fork แบบนุ่มนวลหลังจากการดำเนินการผ่านฉันทามติส่วนใหญ่
  - โหนดเศรษฐกิจสูญเสียการควบคุมกฎการตรวจสอบเมื่อคนขุดแร่ส่งสัญญาณการเปิดใช้งาน
  - การเปลี่ยนแปลง Soft fork จะกลายเป็นถาวรและไม่สามารถแก้ไขได้เมื่อคนขุดเหมืองเปิดใช้งาน
explanation: |
  Shaolinfry ระบุว่าการส่งสัญญาณของนักขุดสร้างระบบยับยั้งตามธรรมชาติที่แม้แต่เปอร์เซ็นต์เล็กน้อยของ hashrate ก็สามารถป้องกันการอัปเกรดจากการเปิดใช้งานสำหรับเครือข่ายทั้งหมดได้ 'แรงเฉื่อยในการอัปเกรด' นี้กลายเป็นปัญหามากขึ้นเมื่อ mining มีการกระจายอำนาจมากขึ้น ซึ่งอาจขัดขวางการปรับปรุงโปรโตคอลที่เป็นประโยชน์ ตัวเลือกอื่น ๆ แสดงให้เห็นถึงการทำงานของ soft forks อย่างไม่ถูกต้อง - นักขุดไม่สามารถย้อนกลับการเปิดใช้งานได้โดยลำพัง โหนดเศรษฐกิจยังคงมีอำนาจในการตรวจสอบ และ soft forks สามารถแก้ไขได้ตามทฤษฎีผ่านการอัปเกรดในภายหลัง
reviewed: false
question: طبق استدلال Shaolinfry برای فورک‌های User Activated Soft (UASF)، مشکل اصلی فورک‌های نرم‌افزاری فعال‌شده توسط ماینرها در مورد اجرای ارتقاء چیست؟
answer: درصد کمی از hashrate می‌تواند ارتقاءها را برای همه وتو کند و این باعث ایجاد اینرسی در ارتقاء می‌شود.
wrong_answers:
  - ماینرها می‌توانند فعال‌سازی‌های نرم fork را پس از اجرا از طریق اجماع اکثریت معکوس کنند.
  - گره‌های اقتصادی کنترل بر قوانین اعتبارسنجی را از دست می‌دهند وقتی که ماینرها فعال‌سازی را اعلام می‌کنند
  - تغییرات Soft و fork دائمی می‌شوند و پس از فعال‌سازی توسط ماینرها قابل تغییر نیستند.
explanation: |
  شاولینفری تشخیص داد که سیگنال‌دهی ماینرها یک سیستم وتوی طبیعی ایجاد می‌کند که حتی درصد کمی از hashrate می‌تواند مانع از فعال‌سازی ارتقاءها برای کل شبکه شود. این 'اینرسی ارتقاء' با غیرمتمرکزتر شدن mining مشکل‌سازتر می‌شود و ممکن است مانع از بهبودهای مفید پروتکل شود. گزینه‌های دیگر نحوه کارکرد فورک‌های نرم را نادرست نشان می‌دهند - ماینرها نمی‌توانند به‌طور یک‌جانبه فعال‌سازی‌ها را معکوس کنند، نودهای اقتصادی همچنان اختیار اعتبارسنجی را دارند و فورک‌های نرم می‌توانند به‌طور نظری از طریق ارتقاءهای بعدی اصلاح شوند.
reviewed: false

question: 샤오린프라이의 사용자 활성화 Soft 포크(UASF) 주장에 따르면, 업그레이드 구현과 관련하여 채굴자 활성화 소프트포크의 주요 문제점은 무엇인가요?
answer: 소수의 hashrate이 모든 사람의 업그레이드를 거부할 수 있어 업그레이드 관성이 생깁니다
wrong_answers:
  - 채굴자는 구현 후 다수 합의를 통해 소프트 fork 활성화를 되돌릴 수 있습니다
  - 채굴자가 활성화 신호를 보내면 경제 노드는 유효성 검사 규칙에 대한 통제권을 잃게 됩니다
  - Soft fork 변경 사항은 영구적으로 적용되며 채굴자가 활성화하면 수정할 수 없습니다
explanation: |
  샤오린프리는 채굴자 시그널링이 자연스러운 거부권 시스템을 생성하여 hashrate의 일부라도 전체 네트워크에서 업그레이드가 활성화되는 것을 막을 수 있음을 확인했습니다. 이러한 '업그레이드 관성'은 mining가 더욱 탈중앙화될수록 더욱 문제가 되며, 잠재적으로 유익한 프로토콜 개선을 차단할 수 있습니다. 다른 옵션은 채굴자가 일방적으로 활성화를 되돌릴 수 없고, 경제 노드가 검증 권한을 보유하며, 이론적으로 후속 업그레이드를 통해 소프트 포크를 수정할 수 있다는 소프트 포크의 작동 방식을 잘못 설명합니다.
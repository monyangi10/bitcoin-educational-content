question: Dushingiye ku ciyumviro ca Shaolinfry ku bijanye n’amaforogo ya Soft akoreshwa n’abakoresha (UASF), ni ikibazo ikihe nyamukuru kiri ku maforogo yoroshe akoreshwa n’abacukuzi ku bijanye n’ugushirwa mu ngiro kw’ivugurura?
answer: Ijanisha ritoyi rya hashrate rishobora guhagarika ugusubiramwo ku muntu wese, bikazana inertia y'ugusubiramwo
wrong_answers:
  - Abacukuzi bashobora guhindura ibikorwa vyoroshe vya fork inyuma yo gushirwa mu ngiro biciye ku kwumvikana kw'abantu benshi
  - Ivyuma vy'ubutunzi biratakaza ububasha ku mategeko y'ukwemeza igihe abacukuzi batanga ikimenyetso co gukora
  - Soft Amahinduka ya fork aba ayahoraho kandi ntashobora guhindurwa iyo abacukuzi bamaze kuyakoresha
explanation: |
  Shaolinfry yerekanye ko gutanga ikimenyetso c’abacukuzi bituma habaho uburyo bwo guhagarika aho mbere n’agace gatoyi k’ijana ka hashrate gashobora kubuza ivyiza gukoreshwa ku rubuga rwose. Uwo 'upgrade inertia' urarushiriza kuba ingorane uko mining irushiriza kwegereza, bishobora kubuza gutera imbere kw'amasezerano y'ingirakamaro. Ibindi bihitamwo bigaragaza nabi ingene amaforoko yoroshe akora - abacukuzi ntibashobora guhindura ibikorwa ku ruhande rumwe, ama node y’ubutunzi aguma afise ububasha bwo kwemeza, kandi amaforoko yoroshe arashobora guhindurwa biciye mu guhindura ibintu bikurikira.

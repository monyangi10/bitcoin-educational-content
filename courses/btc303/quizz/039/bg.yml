question: Според аргумента на Шаолинфри за активираните от потребителите Soft вилици (UASF), какъв е основният проблем с активираните от миньори софт вилици по отношение на прилагането на ъпгрейд?
answer: Малък процент от hashrate може да наложи вето върху подобренията за всички, създавайки инерция при подобренията
wrong_answers:
  - Миньорите могат да обърнат активирането на меки fork след изпълнението им чрез консенсус с мнозинство
  - Икономическите възли губят контрол върху правилата за валидиране, когато миньорите подадат сигнал за активиране
  - Soft fork промените стават постоянни и не могат да бъдат променяни, след като миньорите ги активират
explanation: |
  Шаолинфри установи, че сигнализирането от страна на миньорите създава естествена система за вето, при която дори малък процент hashrate може да попречи на активирането на подобрения за цялата мрежа. Тази "инерция на ъпгрейда" става все по-проблематична, когато mining стане по-децентрализирана, като потенциално блокира полезни подобрения на протокола. Другите варианти представят погрешно начина, по който работят "меките вилици" - миньорите не могат да отменят едностранно активирането, икономическите възли запазват правомощията си за валидиране, а "меките вилици" теоретично могат да бъдат модифицирани чрез последващи надстройки.
reviewed: false

question: Според аргумента на Шаолинфри за меко разклонение активирано от потребителите (UASF), какъв е основният проблем с активираните от миньори меки разклонения по отношение на прилагането на ъпгрейд?
answer: Малък процент от хашрейта може да наложи вето върху подобренията за всички, създавайки инерция при подобренията
wrong_answers:
  - Миньорите могат да обърнат активирането на меко разклонение след изпълнението им чрез консенсус с мнозинство
  - Икономическите възли губят контрол върху правилата за валидиране, когато миньорите подадат сигнал за активиране
  - промените от меко разклонение стават постоянни и не могат да бъдат променяни, след като миньорите ги активират
explanation: |
  Шаолинфри установи, че сигнализирането от страна на миньорите създава естествена система за вето, при която дори малък процент хашрейта може да попречи на активирането на подобрения за цялата мрежа. Тази "инерция на ъпгрейда" става все по-проблематична, когато копаенето стане по-децентрализирано, като потенциално блокира полезни подобрения на протокола. Другите варианти представят погрешно начина, по който работят "меките разклонения" - миньорите не могат да отменят едностранно активирането, икономическите възли запазват правомощията си за валидиране, а "меките разклонения" теоретично могат да бъдат модифицирани чрез последващи надстройки.
reviewed: true

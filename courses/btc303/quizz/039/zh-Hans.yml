question: 根据 Shaolinfry 对用户激活 Soft 叉（UASF）的论证，矿工激活软叉在升级实施方面的主要问题是什么？
answer: 一小部分 hashrate 可以否决所有人的升级，形成升级惯性
wrong_answers:
  - 矿工可通过多数共识，在 fork 软激活实施后进行逆转
  - 当矿工发出激活信号时，经济节点失去对验证规则的控制
  - 一旦矿工激活，Soft fork 变更将成为永久性的，不可修改
explanation: |
  Shaolinfry 发现，矿工信号创造了一个天然的否决系统，即使一小部分 hashrate 也能阻止整个网络激活升级。随着 mining 变得更加分散，这种 "升级惰性 "会变得更加棘手，可能会阻碍有益的协议改进。其他方案歪曲了软分叉的工作原理--矿工不能单方面逆转激活，经济节点保留验证权限，软分叉理论上可以通过后续升级进行修改。
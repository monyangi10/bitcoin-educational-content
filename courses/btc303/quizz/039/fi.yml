question: Shaolinfryn käyttäjän aktivoimia Soft-haarukoita (UASF) koskevan argumentin mukaan mikä on kaivostyöläisten aktivoimien pehmeiden haarukoiden suurin ongelma päivitysten toteuttamisen suhteen?
answer: Pieni osa hashrate:n jäsenistä voi kieltää kaikkien päivitykset, mikä luo päivitystarvetta
wrong_answers:
  - Louhijat voivat peruuttaa pehmeän fork:n aktivoinnit täytäntöönpanon jälkeen enemmistön konsensuksen avulla
  - Taloussolmut menettävät validointisääntöjen hallinnan, kun louhijat antavat aktivointisignaalin
  - Soft fork muutoksista tulee pysyviä, eikä niitä voida muuttaa, kun kaivostyöläiset ovat aktivoineet ne
explanation: |
  Shaolinfry havaitsi, että kaivostyöläisten signalointi luo luonnollisen veto-järjestelmän, jossa jopa pieni osa hashrate:stä voi estää päivitysten aktivoinnin koko verkossa. Tämä "päivitysinertia" muuttuu ongelmallisemmaksi, kun mining:sta tulee hajautetumpi, mikä saattaa estää hyödyllisiä protokollan parannuksia. Muut vaihtoehdot antavat väärän kuvan siitä, miten pehmeät haarautumat toimivat - louhijat eivät voi peruuttaa aktivointeja yksipuolisesti, taloussolmut säilyttävät validointivaltuudet, ja pehmeät haarautumat voidaan teoriassa muuttaa myöhemmillä päivityksillä.
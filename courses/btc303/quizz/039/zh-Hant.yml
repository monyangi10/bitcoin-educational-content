question: 根據 Shaolinfry 對使用者啟動 Soft 叉 (UASF) 的論點，關於升級實作，礦工啟動軟叉的主要問題是什麼？
answer: 一小部分 hashrate 可以否決所有人的升級，造成升級慣性
wrong_answers:
  - 透過大多數共識，礦工可以在實施後逆轉軟 fork 啟用
  - 當礦工發出訊號啟動時，經濟節點失去對驗證規則的控制
  - Soft fork 變更一旦由礦工啟動，即成為永久變更，無法修改
explanation: |
  Shaolinfry 發現，礦工信號創造了一個天然的否決系統，即使是一小部分的 hashrate 也能阻止整個網路啟動升級。當 mining 變得更分散時，這種「升級慣性」會變得更有問題，可能會阻礙有利的通訊協定改進。其他選項歪曲了軟分叉的運作方式 - 礦工不能單方面逆轉啟動，經濟節點保留驗證權限，而且理論上軟分叉可以透過後續升級進行修改。
question: उपयोगकर्ता सक्रिय Soft फोर्क्स (UASF) के लिए शाओलिनफ्राई के तर्क के अनुसार, अपग्रेड कार्यान्वयन के संबंध में माइनर-सक्रिय सॉफ्ट फोर्क्स के साथ मुख्य समस्या क्या है?
answer: hashrate का एक छोटा प्रतिशत सभी के लिए उन्नयन को वीटो कर सकता है, जिससे उन्नयन जड़ता पैदा होती है
wrong_answers:
  - बहुमत की सहमति से कार्यान्वयन के बाद खनिक सॉफ्ट fork सक्रियण को उलट सकते हैं
  - जब खनिक सक्रियण का संकेत देते हैं तो आर्थिक नोड्स सत्यापन नियमों पर नियंत्रण खो देते हैं
  - Soft fork परिवर्तन स्थायी हो जाते हैं और खनिकों द्वारा उन्हें सक्रिय करने के बाद उन्हें संशोधित नहीं किया जा सकता
explanation: |
  शाओलिनफ़्री ने पहचाना कि माइनर सिग्नलिंग एक स्वाभाविक वीटो प्रणाली बनाता है जहाँ hashrate का एक छोटा सा प्रतिशत भी पूरे नेटवर्क के लिए अपग्रेड को सक्रिय होने से रोक सकता है। यह 'अपग्रेड जड़ता' mining के अधिक विकेंद्रीकृत होने के साथ और अधिक समस्याग्रस्त हो जाती है, जिससे संभावित रूप से लाभकारी प्रोटोकॉल सुधार अवरुद्ध हो सकते हैं। अन्य विकल्प सॉफ्ट फ़ोर्क्स के काम करने के तरीके को गलत तरीके से प्रस्तुत करते हैं - माइनर्स एकतरफा रूप से सक्रियण को उलट नहीं सकते, आर्थिक नोड्स सत्यापन प्राधिकरण बनाए रखते हैं, और सॉफ्ट फ़ोर्क्स को सैद्धांतिक रूप से बाद के अपग्रेड के माध्यम से संशोधित किया जा सकता है।
reviewed: false

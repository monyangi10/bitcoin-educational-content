question: Согласно аргументам Shaolinfry в пользу активируемых пользователями форков Soft (UASF), в чем основная проблема активируемых майнерами софтфорков с точки зрения реализации апгрейда?
answer: Небольшой процент hashrate может наложить вето на апгрейды для всех, создавая инерцию апгрейдов
wrong_answers:
  - Майнеры могут отменить активацию мягкого fork после его внедрения с помощью консенсуса большинства
  - Экономические узлы теряют контроль над правилами проверки, когда майнеры подают сигнал об активации
  - Изменения Soft fork становятся постоянными и не могут быть изменены после их активации шахтерами
explanation: |
  Шаолинфри определил, что сигналы майнеров создают естественную систему вето, когда даже небольшой процент hashrate может предотвратить активацию обновлений для всей сети. Эта "инерция обновления" становится все более проблематичной по мере того, как mining становится более децентрализованной, потенциально блокируя полезные улучшения протокола. Другие варианты искажают принцип работы мягких форков: майнеры не могут отменить активацию в одностороннем порядке, экономические узлы сохраняют полномочия по проверке, а мягкие форки теоретически могут быть изменены в ходе последующих обновлений.
question: Jaký je podle Shaolinfryho argumentu pro uživatelsky aktivované vidlice Soft (UASF) hlavní problém s těžařsky aktivovanými softwarovými vidlicemi, pokud jde o implementaci aktualizace?
answer: Malé procento hashrate může vetovat upgrady pro všechny, což vytváří setrvačnost upgradů
wrong_answers:
  - Těžaři mohou po provedení aktivace soft fork většinovým konsensem zvrátit její průběh
  - Ekonomické uzly ztrácejí kontrolu nad validačními pravidly, když těžaři signalizují aktivaci
  - Změny Soft fork se stávají trvalými a nelze je měnit, jakmile je horníci aktivují
explanation: |
  Shaolinfry zjistil, že signalizace horníků vytváří přirozený systém veta, kdy i malé procento hashrate může zabránit aktivaci upgradů pro celou síť. Tato "setrvačnost při upgradu" se stává problematičtější s tím, jak se mining stává více decentralizovaným, což může blokovat prospěšná vylepšení protokolu. Ostatní varianty zkreslují fungování soft forků - těžaři nemohou jednostranně zvrátit aktivaci, ekonomické uzly si zachovávají validační autoritu a soft forky lze teoreticky upravovat prostřednictvím následných upgradů.
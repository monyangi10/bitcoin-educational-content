question: Prema Shaolinfryjevom argumentu za soft forkove koje aktiviraju korisnici (UASF), u čemu je glavni problem soft forkova koje aktiviraju rudari kada je reč o sprovođenju nadogradnji?
answer: Mali procenat hashrate-a može da stavi veto na nadogradnje za sve, stvarajući inerciju nadogradnji
wrong_answers:
  - Rudari mogu poništiti soft fork aktivacije nakon implementacije kroz većinski konsenzus
  - Ekonomski čvorovi gube kontrolu nad pravilima validacije kada rudari signaliziraju aktivaciju
  - Soft fork promene postaju trajne i ne mogu se menjati kada ih rudari aktiviraju
explanation: |
  Shaolinfry je identifikovao da signalizacija rudara stvara prirodni veto sistem gde čak i mali procenat hashrate-a može sprečiti aktivacije nadogradnji za 
  celu mrežu. Ova 'inercija nadogradnje' postaje problematičnija kako rudarenje postaje decentralizovaniji, potencijalno blokirajući korisna poboljšanja protokola. 
  Druge opcije pogrešno predstavljaju kako soft forkovi funkcionišu - rudari ne mogu jednostrano poništiti aktivacije, ekonomski čvorovi zadržavaju autoritet validacije,
  a soft forkovi se teoretski mogu modifikovati kroz naknadne nadogradnje.
reviewed: true

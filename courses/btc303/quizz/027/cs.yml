question: Co se podle této kapitoly stane, když budete nedbale zacházet s vlastními postupy ochrany osobních údajů Bitcoin?
answer: Může také omezit soukromí ostatních uživatelů Bitcoin
wrong_answers:
  - Ovlivňuje pouze vaše vlastní transakce a nemá žádný dopad na ostatní
  - Díky tomu je celá síť Bitcoin pro všechny bezpečnější
  - Pomáhá zlepšit celkovou anonymitu systému Bitcoin
explanation: |
  Soukromí Bitcoin je mezi uživateli vzájemně propojeno. Pokud jedna osoba nedbá na ochranu soukromí, může to mít negativní dopad na soukromí ostatních uživatelů, se kterými provádí transakce. K tomu dochází, protože vzory transakcí, shlukování adres a další techniky analýzy blockchainu mohou odhalit informace o více stranách zapojených do transakcí. Kapitola zdůrazňuje, že opatření na ochranu soukromí, která přijmete, nechrání jen vás samotné - pomáhají také chránit širší komunitu Bitcoin, čímž se ochrana soukromí stává kolektivní odpovědností, nikoli pouze individuální záležitostí.
reviewed: false

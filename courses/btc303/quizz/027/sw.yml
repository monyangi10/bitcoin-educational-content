question: Kulingana na sura hiyo, ni nini hufanyika unapokuwa mzembe na desturi zako za faragha za Bitcoin?
answer: Inaweza kupunguza ufaragha wa watumiaji wengine wa Bitcoin pia
wrong_answers:
  - Inaathiri tu miamala yako mwenyewe na haina athari kwa wengine
  - Inafanya mtandao mzima wa Bitcoin kuwa salama zaidi kwa kila mtu
  - Inasaidia kuboresha kutokujulikana kwa jumla kwa mfumo wa Bitcoin
explanation: |
  Faragha ya Bitcoin imeunganishwa kati ya watumiaji. Mtu mmoja anapozembea na desturi zake za faragha, inaweza kuathiri vibaya faragha ya watumiaji wengine wanaotumiana nao. Hii hutokea kwa sababu mifumo ya muamala, mkusanyiko wa anwani, na mbinu zingine za uchanganuzi wa blockchain zinaweza kufichua maelezo kuhusu wahusika wengi wanaohusika katika miamala. Sura hii inasisitiza kwamba hatua za faragha unazochukua hazijikindi tu - pia husaidia kulinda jumuiya pana ya Bitcoin, na kufanya faragha kuwa jukumu la pamoja badala ya wasiwasi wa mtu binafsi tu.
question: Според тази глава какво се случва, когато сте небрежни към собствените си практики за поверителност на Bitcoin?
answer: Това може да намали поверителността на други потребители на Bitcoin
wrong_answers:
  - То засяга само вашите собствени транзакции и не оказва влияние върху другите
  - Това прави цялата мрежа Bitcoin по-сигурна за всички
  - Той помага за подобряване на цялостната анонимност на системата Bitcoin
explanation: |
  Поверителността на Bitcoin е взаимосвързана между потребителите. Когато едно лице е небрежно към практиките си за защита на личните данни, това може да окаже отрицателно въздействие върху личните данни на други потребители, с които то извършва транзакции. Това се случва, защото моделите на трансакциите, клъстерирането на адреси и други техники за анализ на блокчейн могат да разкрият информация за множество страни, участващи в трансакциите. В главата се подчертава, че мерките за защита на личните данни, които предприемате, не защитават само вас самите - те помагат и за защитата на по-широката Bitcoin общност, превръщайки защитата на личните данни в колективна отговорност, а не само в индивидуална грижа.
reviewed: false

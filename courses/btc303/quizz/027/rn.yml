question: Dushingiye ku gice, bigenda gute iyo utagira ico witwararika ku migenzo yawe bwite y’ubuzima bwite bwa Bitcoin?
answer: Bishobora kugabanya ubuzima bwite bw'abandi bakoresha Bitcoin na bo nyene .
wrong_answers:
  - Bigira ingaruka gusa ku bikorwa vyawe kandi nta ngaruka bigira ku bandi .
  - Bituma urubuga rwose rwa Bitcoin rutekanye kuri bose .
  - Bifasha gutuma ubuhinga bwa Bitcoin butamenyekana muri rusangi .
explanation: |
  Bitcoin ubuzima bwite burahuye hagati y’abakoresha. Iyo umuntu umwe ari umunyaruyeri mu migenzo yiwe y’ubuzima bwite, birashobora kugira ingaruka mbi ku buzima bwite bw’abandi bakoresha bakorana na bo. Ivyo bishika kubera ko uburyo bwo gukorana, gukoranya amaderesi, n’ubundi buryo bwo gusesangura blockchain bishobora guhishura amakuru yerekeye abantu benshi bari mu bikorwa. Ikigabane gishimika ku vy’uko ingingo z’ubuzima bwite ufata zitarinda wewe nyene gusa - zifasha kandi mu kurinda umuryango wagutse wa Bitcoin, zigatuma ubuzima bwite buba inshingano rusangi aho kuba ikintu c’umuntu ku giti ciwe gusa.

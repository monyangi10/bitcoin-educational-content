question: طبق فصل، وقتی که در رعایت حریم خصوصی Bitcoin خود بی‌دقتی می‌کنید، چه اتفاقی می‌افتد؟
answer: می‌تواند حریم خصوصی سایر کاربران Bitcoin را نیز کاهش دهد.
wrong_answers:
  - این تنها بر تراکنش‌های خودتان تأثیر می‌گذارد و هیچ تأثیری بر دیگران ندارد.
  - این باعث می‌شود که کل شبکه Bitcoin برای همه امن‌تر شود.
  - این به بهبود کلی ناشناس بودن سیستم Bitcoin کمک می‌کند.
explanation: |
  حریم خصوصی Bitcoin در میان کاربران به هم پیوسته است. وقتی یک نفر در رعایت اصول حریم خصوصی سهل‌انگاری می‌کند، می‌تواند به طور منفی بر حریم خصوصی سایر کاربرانی که با آن‌ها تراکنش دارند تأثیر بگذارد. این اتفاق می‌افتد زیرا الگوهای تراکنش، خوشه‌بندی آدرس و سایر تکنیک‌های تحلیل بلاکچین می‌توانند اطلاعاتی درباره چندین طرف درگیر در تراکنش‌ها فاش کنند. این فصل تأکید می‌کند که اقدامات حریم خصوصی که انجام می‌دهید فقط از خودتان محافظت نمی‌کند - بلکه به محافظت از جامعه گسترده‌تر Bitcoin نیز کمک می‌کند و حریم خصوصی را به یک مسئولیت جمعی تبدیل می‌کند نه فقط یک نگرانی فردی.
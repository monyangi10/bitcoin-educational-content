question: Prema poglavlju, šta se dešava kada ste neoprezni sa sopstvenim praksama zaštite privatnosti u Bitcoinu?
answer: To takođe može smanjiti privatnost drugih korisnika Bitcoinu
wrong_answers:
  - To utiče samo na vaše transakcije i nema uticaja na druge.
  - To čini celu Bitcoin mrežu sigurnijom za sve.
  - To pomaže u poboljšanju ukupne anonimnosti Bitcoin sistema
explanation: |
  Privatnost Bitcoina je međusobno povezana među korisnicima. Kada jedna osoba ne vodi računa o svojim praksama privatnosti, to može negativno uticati na 
  privatnost drugih korisnika sa kojima obavlja transakcije. Ovo se dešava zato što obrasci transakcija, grupisanje adresa i druge tehnike analize blockchaina
  mogu otkriti informacije o više strana uključenih u transakcije. Poglavlje naglašava da mere privatnosti koje preduzimate ne štite samo vas - one takođe pomažu
  u zaštiti šire Bitcoin zajednice, čineći privatnost kolektivnom odgovornošću, a ne samo individualnom brigom.
reviewed: true

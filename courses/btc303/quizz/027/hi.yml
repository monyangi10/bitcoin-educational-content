question: अध्याय के अनुसार, क्या होता है जब आप अपनी Bitcoin गोपनीयता प्रथाओं के प्रति लापरवाह होते हैं?
answer: यह अन्य Bitcoin उपयोगकर्ताओं की गोपनीयता को भी कम कर सकता है
wrong_answers:
  - यह केवल आपके अपने लेन-देन को प्रभावित करता है और दूसरों पर इसका कोई प्रभाव नहीं पड़ता
  - यह संपूर्ण Bitcoin नेटवर्क को सभी के लिए अधिक सुरक्षित बनाता है
  - यह Bitcoin प्रणाली की समग्र गुमनामी को बेहतर बनाने में मदद करता है
explanation: |
  Bitcoin गोपनीयता उपयोगकर्ताओं के बीच परस्पर जुड़ी हुई है। जब कोई व्यक्ति अपनी गोपनीयता प्रथाओं में लापरवाही बरतता है, तो यह उन अन्य उपयोगकर्ताओं की गोपनीयता पर नकारात्मक प्रभाव डाल सकता है जिनके साथ वह लेन-देन करता है। ऐसा इसलिए होता है क्योंकि लेन-देन के पैटर्न, पता क्लस्टरिंग और अन्य ब्लॉकचेन विश्लेषण तकनीकें लेन-देन में शामिल कई पक्षों के बारे में जानकारी प्रकट कर सकती हैं। यह अध्याय इस बात पर ज़ोर देता है कि आपके द्वारा अपनाए गए गोपनीयता उपाय न केवल आपकी सुरक्षा करते हैं - बल्कि व्यापक Bitcoin समुदाय की सुरक्षा में भी मदद करते हैं, जिससे गोपनीयता केवल एक व्यक्तिगत चिंता के बजाय एक सामूहिक ज़िम्मेदारी बन जाती है।
question: 이 장에 따르면 Bitcoin 개인정보 보호 관행에 부주의할 경우 어떤 일이 발생하나요?
answer: 다른 Bitcoin 사용자의 개인정보도 보호할 수 있습니다
wrong_answers:
  - 본인 거래에만 영향을 미치며 다른 거래에는 영향을 미치지 않습니다
  - 전체 Bitcoin 네트워크의 보안을 강화합니다
  - Bitcoin 시스템의 전반적인 익명성을 개선하는 데 도움이 됩니다
explanation: |
  Bitcoin 개인정보는 사용자 간에 서로 연결되어 있습니다. 한 사람이 개인정보 보호 관행을 소홀히 하면 거래하는 다른 사용자의 개인정보에 부정적인 영향을 미칠 수 있습니다. 이는 거래 패턴, 주소 클러스터링 및 기타 블록체인 분석 기술을 통해 거래에 관련된 여러 당사자에 대한 정보가 드러날 수 있기 때문에 발생합니다. 이 장에서는 여러분이 취하는 개인정보 보호 조치가 여러분 자신만을 보호하는 것이 아니라 더 넓은 Bitcoin 커뮤니티를 보호하는 데 도움이 되며, 개인정보 보호는 개인의 문제가 아닌 공동의 책임이라는 점을 강조합니다.
question: Peatüki kohaselt, mis juhtub, kui olete hooletu oma Bitcoin privaatsustavade suhtes?
answer: See võib vähendada ka teiste Bitcoin kasutajate privaatsust
wrong_answers:
  - See mõjutab ainult teie enda tehinguid ja ei mõjuta teisi
  - See muudab kogu Bitcoin võrgu kõigi jaoks turvalisemaks
  - See aitab parandada Bitcoin süsteemi üldist anonüümsust
explanation: |
  Bitcoin privaatsus on kasutajate vahel ühendatud. Kui üks inimene on hooletu oma privaatsustavade osas, võib see negatiivselt mõjutada teiste kasutajate privaatsust, kellega ta tehinguid teeb. See juhtub seetõttu, et tehingumustrid, aadresside rühmitamine ja muud plokiahela analüüsimeetodid võivad paljastada teavet mitme tehingutes osaleva osapoole kohta. Peatükis rõhutatakse, et võetud privaatsusmeetmed ei kaitse mitte ainult teid ennast - need aitavad kaitsta ka laiemat Bitcoin kogukonda, muutes privaatsuse pigem kollektiivseks vastutuseks kui ainult individuaalseks mureks.
reviewed: false

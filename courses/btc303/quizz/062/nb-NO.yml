question: I henhold til definisjonen av åpen kildekode, hva er det nødvendige forholdet mellom avledede verk og deres lisensvilkår sammenlignet med den opprinnelige programvaren?
answer: Avledede verk må kunne distribueres under samme vilkår som lisensen til den opprinnelige programvaren
wrong_answers:
  - Avledede verk må distribueres under mer restriktive lisensvilkår enn den opprinnelige programvaren
  - Avledede verk må utgis under en helt annen lisens som er inkompatibel med den opprinnelige
  - Avledede verk kan bare distribueres under proprietære lisenser som krever betaling av royalties
explanation: |
  Definisjonen av åpen kildekode sier eksplisitt at "lisensen må tillate modifikasjoner og avledede verk, og må tillate at de distribueres under de samme vilkårene som lisensen for den opprinnelige programvaren" Dette sikrer at avledede verk opprettholder de samme frihetene som originalen, og forhindrer at noen tar åpen kildekode og gjør den proprietær. De andre alternativene bryter med dette grunnleggende prinsippet ved enten å begrense friheten eller endre lisenskompatibiliteten.

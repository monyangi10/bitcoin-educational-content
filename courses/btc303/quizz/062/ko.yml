question: 오픈 소스 정의에 따르면 파생 저작물과 라이선스 조건은 원본 소프트웨어와 비교하여 어떤 관계가 필요한가요?
answer: 파생 저작물은 원본 소프트웨어의 라이선스와 동일한 조건으로 배포할 수 있어야 합니다
wrong_answers:
  - 파생 저작물은 원본 소프트웨어보다 더 제한적인 라이선스 조건에 따라 배포해야 합니다
  - 파생 저작물은 원본과 호환되지 않는 완전히 다른 라이선스에 따라 공개해야 합니다
  - 파생된 저작물은 로열티를 지불해야 하는 독점 라이선스에 의해서만 배포할 수 있습니다
explanation: |
  오픈 소스 정의에는 '라이선스는 수정 및 파생 저작물을 허용해야 하며, 원본 소프트웨어의 라이선스와 동일한 조건으로 배포할 수 있도록 허용해야 한다'고 명시되어 있습니다 이는 파생 저작물이 원본과 동일한 자유를 유지하도록 보장하여 누군가가 오픈 소스 코드를 가져와 독점적으로 사용하는 것을 방지합니다. 다른 옵션은 자유를 제한하거나 라이선스 호환성을 변경함으로써 이 기본 원칙에 위배됩니다.
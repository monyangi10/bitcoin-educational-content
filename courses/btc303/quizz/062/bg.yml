question: Според определението за отворен код каква е необходимата връзка между производните произведения и техните лицензионни условия в сравнение с оригиналния софтуер?
answer: Производните произведения трябва да могат да се разпространяват при същите условия като лиценза на оригиналния софтуер
wrong_answers:
  - Производните произведения трябва да се разпространяват при по-ограничителни лицензионни условия от тези на оригиналния софтуер
  - Производните произведения трябва да бъдат публикувани под напълно различен лиценз, който е несъвместим с оригинала
  - Производните произведения могат да се разпространяват само по лицензи за собственост, които изискват заплащане на авторски права
explanation: |
  В определението за отворен код изрично се посочва, че "лицензът трябва да позволява модификации и производни произведения и да позволява те да се разпространяват при същите условия като лиценза на оригиналния софтуер" Това гарантира, че производните произведения запазват същите свободи като оригинала, като по този начин се предотвратява възможността някой да вземе код с отворен код и да го превърне в собственост. Другите варианти нарушават този основен принцип, като или ограничават свободата, или променят съвместимостта на лицензите.
reviewed: false

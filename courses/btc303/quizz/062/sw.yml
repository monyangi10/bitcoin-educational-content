question: Kulingana na ufafanuzi wa chanzo huria, ni uhusiano gani unaohitajika kati ya kazi zinazotolewa na masharti yao ya leseni ikilinganishwa na programu asili?
answer: Kazi zinazotolewa lazima ziruhusiwe kusambazwa chini ya masharti sawa na leseni ya programu asili
wrong_answers:
  - Kazi zinazotokana lazima zisambazwe chini ya masharti ya leseni yenye vikwazo zaidi kuliko programu asili
  - Kazi zinazotokana lazima zitolewe chini ya leseni tofauti kabisa ambayo haioani na ya asili
  - Kazi zinazotokana zinaweza tu kusambazwa chini ya leseni za umiliki zinazohitaji malipo ya mrabaha
explanation: |
  Ufafanuzi wa chanzo huria unasema kwa uwazi kwamba 'leseni lazima iruhusu marekebisho na kazi zinazotolewa, na lazima iruhusu kusambazwa chini ya masharti sawa na leseni ya programu asili.' Hii inahakikisha kwamba kazi zinazotokana na kazi hudumisha uhuru sawa na za awali, kuzuia mtu kuchukua msimbo wa chanzo huria na kuufanya umiliki. Chaguo zingine zinakiuka kanuni hii ya msingi kwa kuzuia uhuru au kubadilisha uoanifu wa leseni.
reviewed: false

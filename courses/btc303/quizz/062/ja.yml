question: オープンソースの定義によれば、オリジナルのソフトウェアと比較して、派生作品とそのライセンス条項の間にはどのような関係が求められるのか？
answer: 派生作品は、元のソフトウェアのライセンスと同じ条件で配布することが許可されていなければならない
wrong_answers:
  - 派生作品は、元のソフトウェアよりも制限の厳しいライセンス条件の下で配布されなければならない
  - 派生作品は、オリジナルと互換性のない、まったく別のライセンスでリリースされなければならない
  - 派生作品は、使用料の支払いを要求する所有権のあるライセンスの下でのみ配布されなければならない
explanation: |
  オープンソースの定義では、「ライセンスは、改変や派生作品を認め、それらをオリジナル・ソフトウェアのライセンスと同じ条件の下で配布することを認めなければならない」と明記している。これは、派生作品がオリジナルと同じ自由を維持することを保証し、誰かがオープンソース・コードを持ち出し、それをプロプライエタリにすることを防ぎます。他の選択肢は、自由を制限するか、ライセンスの互換性を変更することによって、この基本原則に違反している。
reviewed: false

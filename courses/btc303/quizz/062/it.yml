question: Secondo la definizione di open source, qual è il rapporto richiesto tra le opere derivate e i loro termini di licenza rispetto al software originale?
answer: Le opere derivate devono poter essere distribuite secondo gli stessi termini della licenza del software originale
wrong_answers:
  - Le opere derivate devono essere distribuite secondo termini di licenza più restrittivi rispetto al software originale
  - Le opere derivate devono essere rilasciate sotto una licenza completamente diversa e incompatibile con l'originale
  - Le opere derivate possono essere distribuite solo con licenze proprietarie che richiedono il pagamento di royalties
explanation: |
  La definizione di open source afferma esplicitamente che "la licenza deve consentire le modifiche e le opere derivate, e deve permettere loro di essere distribuite secondo gli stessi termini della licenza del software originale" Questo garantisce che le opere derivate mantengano le stesse libertà dell'originale, impedendo a qualcuno di prendere il codice open source e renderlo proprietario. Le altre opzioni violano questo principio fondamentale, limitando la libertà o modificando la compatibilità delle licenze.
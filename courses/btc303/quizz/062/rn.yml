question: Dushingiye ku nsobanuro y’inkomoko yuguruye, ni ubuhe bucuti busabwa hagati y’ibikorwa bikomoka ku bindi n’amasezerano y’uruhusha rwavyo ugereranyije na porogarama y’intango?
answer: Ibikorwa biva ku bindi bitegerezwa kwemererwa gukwiragizwa hakurikijwe amategeko amwe n'uruhusha rwa porogarama y'umwimerere .
wrong_answers:
  - Ibikorwa bivako bitegerezwa gukwiragizwa hakurikijwe amabwirizwa y'uruhusha akomeye kuruta porogaramu y'umwimerere
  - Ibikorwa biva ku bindi bitegerezwa gusohorwa bifise uruhusha rutandukanye rwose n'urw'umwimerere .
  - Ibikorwa biva ku bindi bishobora gukwiragizwa gusa hakurikijwe uruhusha rw'ubuhinga rusaba kwishura amafaranga y'uburenganzira .
explanation: |
  Insobanuro y'inkomoko yuguruye ivuga neza ko 'uruhusha rutegerezwa kwemera guhindura n'ibikorwa bivako, kandi rutegerezwa kwemera ko bikwiragizwa hakurikijwe amajambo amwe n'uruhusha rwa porogarama y'intango.' Ivyo bituma ibikorwa bikomoka ku bindi biguma bifise umwidegemvyo nk’uw’umwimerere, bikaba bibuza umuntu gufata kode y’inkomoko yuguruye akayigira iyawe. Ayandi mahitamwo ararenga kuri iyo ngingo ngenderwako y’ishimikiro mu guhagarika umwidegemvyo canke mu guhindura ukuntu uruhusha ruhuye.
question: 根据开源定义，衍生作品与原始软件在许可条款上必须具有什么样的关系？
answer: 必须允许派生作品按照与原始软件许可相同的条款进行发布
wrong_answers:
  - 派生作品的发布必须遵守比原始软件更严格的许可条款
  - 派生作品必须在与原作不兼容的完全不同的许可证下发布
  - 衍生作品只能在需要支付版税的专有许可下发行
explanation: |
  开放源代码的定义明确指出，许可证必须允许修改和衍生作品，并且必须允许它们按照与原始软件许可证相同的条款进行发布。'这确保了衍生作品保持与原版软件相同的自由，防止有人利用开放源代码使其成为专有软件。其他方案要么限制了自由，要么改变了许可证的兼容性，从而违反了这一基本原则。

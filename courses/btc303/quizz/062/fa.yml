question: طبق تعریف منبع باز، چه رابطه‌ای باید بین آثار مشتق و شرایط مجوز آن‌ها در مقایسه با نرم‌افزار اصلی وجود داشته باشد؟
answer: آثار مشتق باید مجاز باشند که تحت همان شرایط مجوز نرم‌افزار اصلی توزیع شوند.
wrong_answers:
  - آثار مشتق باید تحت شرایط مجوز محدودتر از نرم‌افزار اصلی توزیع شوند.
  - آثار مشتق باید تحت یک مجوز کاملاً متفاوت که با مجوز اصلی ناسازگار است منتشر شوند.
  - آثار مشتق فقط می‌توانند تحت مجوزهای اختصاصی که نیاز به پرداخت حق امتیاز دارند توزیع شوند.
explanation: |
  تعریف منبع باز به‌طور صریح بیان می‌کند که 'مجوز باید اجازه‌ی اصلاحات و آثار مشتق را بدهد و باید اجازه دهد که آن‌ها تحت همان شرایط مجوز نرم‌افزار اصلی توزیع شوند.' این امر تضمین می‌کند که آثار مشتق همان آزادی‌های اثر اصلی را حفظ کنند و از این‌که کسی کد منبع باز را گرفته و آن را اختصاصی کند، جلوگیری می‌کند. گزینه‌های دیگر این اصل اساسی را با محدود کردن آزادی یا تغییر سازگاری مجوز نقض می‌کنند.
reviewed: false

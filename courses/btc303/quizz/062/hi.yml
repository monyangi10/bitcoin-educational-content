question: ओपन सोर्स परिभाषा के अनुसार, मूल सॉफ्टवेयर की तुलना में व्युत्पन्न कार्यों और उनकी लाइसेंसिंग शर्तों के बीच आवश्यक संबंध क्या है?
answer: व्युत्पन्न कार्यों को मूल सॉफ़्टवेयर के लाइसेंस के समान शर्तों के तहत वितरित करने की अनुमति दी जानी चाहिए
wrong_answers:
  - व्युत्पन्न कार्यों को मूल सॉफ़्टवेयर की तुलना में अधिक प्रतिबंधात्मक लाइसेंसिंग शर्तों के तहत वितरित किया जाना चाहिए
  - व्युत्पन्न कार्यों को पूरी तरह से अलग लाइसेंस के तहत जारी किया जाना चाहिए जो मूल के साथ असंगत हो
  - व्युत्पन्न कार्यों को केवल मालिकाना लाइसेंस के तहत वितरित किया जा सकता है जिसके लिए रॉयल्टी का भुगतान करना आवश्यक है
explanation: |
  ओपन सोर्स की परिभाषा स्पष्ट रूप से कहती है कि 'लाइसेंस को संशोधनों और व्युत्पन्न कार्यों की अनुमति देनी चाहिए, और उन्हें मूल सॉफ़्टवेयर के लाइसेंस के समान शर्तों के तहत वितरित करने की अनुमति देनी चाहिए।' यह सुनिश्चित करता है कि व्युत्पन्न कार्यों को मूल सॉफ़्टवेयर के समान ही स्वतंत्रताएँ प्राप्त हों, जिससे किसी को ओपन सोर्स कोड को लेकर उसे मालिकाना बनाने से रोका जा सके। अन्य विकल्प या तो स्वतंत्रता को प्रतिबंधित करके या लाइसेंसिंग संगतता को बदलकर इस मूलभूत सिद्धांत का उल्लंघन करते हैं।
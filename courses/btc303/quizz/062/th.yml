question: ตามคำจำกัดความของโอเพ่นซอร์ส ความสัมพันธ์ที่จำเป็นระหว่างผลงานที่ดัดแปลงและเงื่อนไขการอนุญาตใช้งานของพวกเขาเมื่อเทียบกับซอฟต์แวร์ต้นฉบับคืออะไร?
answer: อนุญาตให้นำงานที่ดัดแปลงไปแจกจ่ายภายใต้เงื่อนไขเดียวกันกับใบอนุญาตของซอฟต์แวร์ต้นฉบับ
wrong_answers:
  - งานที่ดัดแปลงต้องแจกจ่ายภายใต้เงื่อนไขการอนุญาตที่เข้มงวดกว่าซอฟต์แวร์ต้นฉบับ
  - ผลงานที่ดัดแปลงต้องเผยแพร่ภายใต้สัญญาอนุญาตที่แตกต่างอย่างสิ้นเชิงซึ่งไม่เข้ากันกับต้นฉบับ
  - งานที่ดัดแปลงสามารถแจกจ่ายได้เฉพาะภายใต้ใบอนุญาตที่เป็นกรรมสิทธิ์ซึ่งต้องชำระค่าลิขสิทธิ์เท่านั้น
explanation: |
  คำจำกัดความของโอเพ่นซอร์สระบุไว้อย่างชัดเจนว่า 'ใบอนุญาตต้องอนุญาตให้มีการแก้ไขและสร้างงานที่ดัดแปลง และต้องอนุญาตให้แจกจ่ายภายใต้เงื่อนไขเดียวกันกับใบอนุญาตของซอฟต์แวร์ต้นฉบับ' สิ่งนี้ทำให้มั่นใจได้ว่างานที่ดัดแปลงจะรักษาเสรีภาพเช่นเดียวกับต้นฉบับ ป้องกันไม่ให้ใครบางคนนำโค้ดโอเพ่นซอร์สไปทำให้เป็นกรรมสิทธิ์ ตัวเลือกอื่น ๆ ละเมิดหลักการพื้นฐานนี้โดยการจำกัดเสรีภาพหรือเปลี่ยนความเข้ากันได้ของใบอนุญาต
reviewed: false
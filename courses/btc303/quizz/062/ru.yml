question: Согласно определению открытого исходного кода, какое отношение должно быть между производными работами и их лицензионными условиями по сравнению с оригинальным программным обеспечением?
answer: Производные работы должны быть разрешены к распространению на тех же условиях, что и лицензия оригинального программного обеспечения
wrong_answers:
  - Производные произведения должны распространяться на условиях более ограниченного лицензирования, чем оригинальное программное обеспечение
  - Производные произведения должны выпускаться под совершенно другой лицензией, несовместимой с оригинальной
  - Производные произведения могут распространяться только по лицензиям, требующим выплаты авторских отчислений
explanation: |
  В определении открытого исходного кода прямо говорится, что "лицензия должна разрешать модификации и производные работы и позволять распространять их на тех же условиях, что и лицензия исходного программного обеспечения" Это гарантирует, что производные работы сохраняют те же свободы, что и оригинал, не позволяя кому-то взять открытый исходный код и сделать его собственностью. Другие варианты нарушают этот фундаментальный принцип, либо ограничивая свободу, либо изменяя совместимость лицензий.
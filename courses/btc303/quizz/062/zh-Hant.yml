question: 根據開放原始碼的定義，與原始軟體相比，衍生作品及其授權條款之間的關係為何？
answer: 衍生作品必須允許在與原始軟體許可證相同的條款下散布
wrong_answers:
  - 衍生作品必須依照比原始軟體更嚴格的授權條款散佈
  - 衍生作品必須以與原始作品不相容的完全不同的授權釋出。
  - 衍生作品只能在需要支付版稅的專屬授權下發行
explanation: |
  開放原始碼的定義明確指出，「許可證必須允許修改和衍生作品，並且必須允許它們在與原始軟體的許可證相同的條款下散布。這可確保衍生作品能維持與原始作品相同的自由，防止有人將開放源碼變為專屬軟體。其他的選擇違反了這個基本原則，不是限制自由就是改變授權的相容性。
reviewed: false

question: 根据开放源代码的定义，在将开放源代码软件作为软件发布合集的一部分进行再发布时，关于费用的主要要求是什么？
answer: 许可不得要求对此类销售收取特许权使用费或其他费用
wrong_answers:
  - 必须收取合理的复制成本，以支付开发费用
  - 允许收取版税，但不得超过发行价的 5
  - 可能需要缴纳管理费，但仅适用于商业性再分发
explanation: |
  开放源码的定义在 自由再分发 中明确指出，许可证不得要求对这种销售收取版税或其他费用。这意味着开放源码软件必须可以自由再分发，而不强制收取费用或版税。其他选项错误地暗示允许收取各种费用，这违反了定义开放源码软件的自由再分发的基本原则。
reviewed: false

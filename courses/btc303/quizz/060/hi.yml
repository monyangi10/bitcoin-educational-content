question: ओपन सोर्स परिभाषा के अनुसार, समग्र सॉफ्टवेयर वितरण के भाग के रूप में ओपन सोर्स सॉफ्टवेयर को पुनर्वितरित करते समय शुल्क के संबंध में प्राथमिक आवश्यकता क्या है?
answer: लाइसेंस में ऐसी बिक्री के लिए रॉयल्टी या अन्य शुल्क की आवश्यकता नहीं होगी
wrong_answers:
  - विकास व्यय को कवर करने के लिए उचित पुनरुत्पादन लागत वसूल की जानी चाहिए
  - रॉयल्टी शुल्क की अनुमति है, लेकिन यह वितरण मूल्य के 5% से अधिक नहीं होना चाहिए
  - प्रशासनिक शुल्क की आवश्यकता हो सकती है, लेकिन केवल वाणिज्यिक पुनर्वितरण के लिए
explanation: |
  ओपन सोर्स की परिभाषा में 'मुक्त पुनर्वितरण' के अंतर्गत स्पष्ट रूप से कहा गया है कि 'लाइसेंस के तहत ऐसी बिक्री के लिए रॉयल्टी या अन्य शुल्क की आवश्यकता नहीं होगी।' इसका अर्थ है कि ओपन सोर्स सॉफ़्टवेयर बिना किसी अनिवार्य शुल्क या रॉयल्टी के स्वतंत्र रूप से पुनर्वितरित किया जा सकता है। अन्य विकल्प गलत तरीके से यह सुझाव देते हैं कि विभिन्न प्रकार के शुल्कों की अनुमति है, जो मुक्त पुनर्वितरण के मूल सिद्धांत का उल्लंघन करेगा जो ओपन सोर्स सॉफ़्टवेयर को परिभाषित करता है।
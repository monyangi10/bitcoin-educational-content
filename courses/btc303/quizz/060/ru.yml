question: Согласно определению открытого исходного кода, какое основное требование предъявляется к оплате при распространении программного обеспечения с открытым исходным кодом в составе совокупного дистрибутива программного обеспечения?
answer: Лицензия не требует роялти или других сборов за такую продажу
wrong_answers:
  - Для покрытия расходов на разработку должна взиматься разумная стоимость воспроизведения
  - Роялти разрешены, но не должны превышать 5% от цены распространения
  - Может потребоваться административная плата, но только за коммерческое распространение
explanation: |
  В определении открытого исходного кода в разделе "Свободное распространение" четко сказано: "Лицензия не должна требовать роялти или других платежей за такую продажу" Это означает, что программное обеспечение с открытым исходным кодом должно свободно распространяться без обязательных платежей или роялти. Другие варианты неверно предполагают, что разрешены различные виды платы, что нарушает основополагающий принцип свободного распространения, определяющий программное обеспечение с открытым исходным кодом.
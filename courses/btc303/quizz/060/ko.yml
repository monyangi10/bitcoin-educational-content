question: 오픈 소스 정의에 따르면, 총 소프트웨어 배포의 일부로 오픈 소스 소프트웨어를 재배포할 때 수수료와 관련된 주요 요건은 무엇인가요?
answer: 라이선스는 그러한 판매에 대해 로열티 또는 기타 수수료를 요구하지 않습니다
wrong_answers:
  - 개발 비용을 충당하기 위해 합리적인 복제 비용을 청구해야 합니다
  - 로열티 수수료는 허용되지만 배포 가격의 5%를 초과해서는 안 됩니다
  - 상업적 재배포의 경우에만 관리 수수료가 필요할 수 있습니다
explanation: |
  오픈 소스 정의에는 '무료 재배포'에 '라이선스는 로열티 또는 기타 비용을 요구하지 않는다'고 명시적으로 명시되어 있습니다 즉, 오픈 소스 소프트웨어는 의무적인 수수료나 로열티 없이 자유롭게 재배포할 수 있어야 합니다. 다른 옵션은 다양한 유형의 수수료가 허용된다고 잘못 제안하고 있으며, 이는 오픈 소스 소프트웨어를 정의하는 무료 재배포의 기본 원칙에 위배됩니다.

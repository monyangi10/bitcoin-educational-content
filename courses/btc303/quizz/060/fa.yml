question: طبق تعریف منبع باز، الزام اصلی در مورد هزینه‌ها هنگام توزیع مجدد نرم‌افزار منبع باز به عنوان بخشی از یک توزیع نرم‌افزار تجمیعی چیست؟
answer: مجوز نباید برای چنین فروشی حق امتیاز یا هزینه دیگری را مطالبه کند
wrong_answers:
  - هزینه تولید معقولی باید برای پوشش هزینه‌های توسعه دریافت شود
  - هزینه‌های حق امتیاز مجاز هستند اما نباید از ۵٪ قیمت توزیع تجاوز کنند
  - ممکن است هزینه‌های اداری لازم باشد اما فقط برای توزیع‌های تجاری.
explanation: |
  تعریف منبع باز به‌طور صریح تحت عنوان 'توزیع مجدد رایگان' بیان می‌کند که 'مجوز نباید نیاز به حق امتیاز یا هزینه دیگری برای چنین فروشی داشته باشد.' این بدان معناست که نرم‌افزار منبع باز باید بدون هزینه‌های اجباری یا حق امتیاز به‌صورت رایگان قابل توزیع مجدد باشد. گزینه‌های دیگر به‌اشتباه پیشنهاد می‌کنند که انواع مختلفی از هزینه‌ها مجاز هستند، که این امر با اصل اساسی توزیع مجدد رایگان که نرم‌افزار منبع باز را تعریف می‌کند، مغایرت دارد.
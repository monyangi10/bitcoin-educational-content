question: Според определението за отворен код кое е основното изискване по отношение на таксите, когато се разпространява софтуер с отворен код като част от обща дистрибуция на софтуер?
answer: Лицензът не изисква лицензионно възнаграждение или друга такса за такава продажба
wrong_answers:
  - Трябва да се начислява разумна цена за възпроизвеждане, за да се покрият разходите за разработване
  - Разрешени са такси за авторски права, но те не трябва да надвишават 5% от цената на дистрибуцията
  - Възможно е да се изискват административни такси, но само за търговско разпространение
explanation: |
  В определението за отворен код в частта "Свободно разпространение" изрично се посочва, че "Лицензът не изисква лицензионно възнаграждение или друга такса за такава продажба" Това означава, че софтуерът с отворен код трябва да може да се разпространява свободно, без задължителни такси или роялти. Другите варианти неправилно предполагат, че са разрешени различни видове такси, което би нарушило основния принцип на свободно разпространение, който определя софтуера с отворен код.
reviewed: false

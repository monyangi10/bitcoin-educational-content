question: オープンソースの定義によると、ソフトウェア・ディストリビューションの一部としてオープンソースソフトウェアを再配布する場合、ロイヤルティに関する主な要件は何ですか？
answer: 当該ライセンスは、当該販売に対するロイヤルティまたはその他の手数料を要求しないものとする
wrong_answers:
  - 開発費を賄うために、合理的な複製費用を請求しなければならない
  - ロイヤルティは認められるが、販売価格の5％を超えてはならない
  - 営利目的の再配布に限り、事務手数料が必要となる場合がある
explanation: |
  オープンソースの定義では、「自由な再配布」の項目で、「ライセンスは、そのような販売に対して、ロイヤリティまたはその他の料金を要求してはならない」と明示されている。これは、オープンソース・ソフトウェアは、強制的な使用料やロイヤルティなしに自由に再配布できなければならないことを意味する。他の選択肢は、様々な種類の手数料が許可されていることを誤って示唆しており、オープンソース・ソフトウェアを定義する自由な再配布という基本原則に違反することになる。

question: Kulingana na ufafanuzi wa chanzo huria, ni hitaji gani la msingi kuhusu ada wakati wa kusambaza tena programu huria kama sehemu ya usambazaji wa jumla wa programu?
answer: Leseni haitahitaji mrahaba au ada nyingine kwa mauzo hayo
wrong_answers:
  - Gharama ya kutosha ya uzazi lazima itozwe ili kufidia gharama za maendeleo
  - Ada za mrabaha zinaruhusiwa lakini zisizidi 5% ya bei ya usambazaji
  - Ada za usimamizi zinaweza kuhitajika lakini kwa ugawaji upya wa kibiashara pekee
explanation: |
  Ufafanuzi wa chanzo huria unasema kwa uwazi chini ya 'Ugawaji upya Bila Malipo' kwamba 'Leseni haitahitaji mrabaha au ada nyingine kwa mauzo hayo.' Hii inamaanisha kuwa programu huria lazima isambazwe tena bila malipo ya lazima au mrabaha. Chaguo zingine zinapendekeza kimakosa kwamba aina mbalimbali za ada zinaruhusiwa, jambo ambalo litakiuka kanuni ya msingi ya ugawaji upya bila malipo ambayo inafafanua programu huria.
reviewed: false

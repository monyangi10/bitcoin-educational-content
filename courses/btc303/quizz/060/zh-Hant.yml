question: 根據開放原始碼的定義，當重新散佈開放原始碼軟體作為整體軟體散佈的一部份時，關於費用的主要要求是什麼？
answer: 該許可不得要求對此類銷售收取版稅或其他費用。
wrong_answers:
  - 必須收取合理的複製費用，以支付開發費用
  - 允許收取版稅，但不得超過分銷價格的 5
  - 可能需要行政費用，但僅限於商業再散佈
explanation: |
  開放原始碼的定義在「自由再散布」一節明確指出：「授權許可證不得要求此類銷售收取版稅或其他費用。這表示開放原始碼軟體必須可以自由地再散佈，而無須強制收取費用或版權費。其他選項錯誤地暗示允許收取各種費用，這將違反定義開放源碼軟體的自由再散布基本原則。
reviewed: false

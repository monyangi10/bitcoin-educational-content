question: ตามคำจำกัดความของโอเพ่นซอร์ส ข้อกำหนดหลักเกี่ยวกับค่าธรรมเนียมเมื่อแจกจ่ายซอฟต์แวร์โอเพ่นซอร์สอีกครั้งเป็นส่วนหนึ่งของการแจกจ่ายซอฟต์แวร์รวมคืออะไร?
answer: ใบอนุญาตจะต้องไม่เรียกเก็บค่าลิขสิทธิ์หรือค่าธรรมเนียมอื่นใดสำหรับการขายดังกล่าว
wrong_answers:
  - ต้องมีการเรียกเก็บค่าธรรมเนียมการทำซ้ำที่สมเหตุสมผลเพื่อครอบคลุมค่าใช้จ่ายในการพัฒนา
  - ค่าลิขสิทธิ์ได้รับอนุญาตแต่ต้องไม่เกิน 5% ของราคาจำหน่าย
  - อาจมีการเรียกเก็บค่าธรรมเนียมการบริหาร แต่เฉพาะสำหรับการแจกจ่ายเชิงพาณิชย์เท่านั้น
explanation: |
  คำจำกัดความของโอเพ่นซอร์สระบุไว้อย่างชัดเจนภายใต้ 'การแจกจ่ายฟรี' ว่า 'ใบอนุญาตจะต้องไม่กำหนดค่าลิขสิทธิ์หรือค่าธรรมเนียมอื่นใดสำหรับการขายดังกล่าว' ซึ่งหมายความว่า ซอฟต์แวร์โอเพ่นซอร์สจะต้องสามารถแจกจ่ายได้อย่างอิสระโดยไม่มีค่าธรรมเนียมบังคับหรือค่าลิขสิทธิ์ ตัวเลือกอื่น ๆ ที่แนะนำว่ามีการอนุญาตค่าธรรมเนียมประเภทต่าง ๆ นั้นไม่ถูกต้อง ซึ่งจะเป็นการละเมิดหลักการพื้นฐานของการแจกจ่ายฟรีที่กำหนดซอฟต์แวร์โอเพ่นซอร์ส
reviewed: false
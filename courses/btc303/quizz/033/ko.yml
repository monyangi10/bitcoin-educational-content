question: BIP42에 따라 Bitcoin의 블록 보조금이 0에 도달하는 대략적인 시기는 언제인가요?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  이 챕터에 따르면, BIP42는 매우 장기적인 인플레이션 버그를 수정하여 2140년경에 블록 보조금이 0에 도달할 수 있도록 했습니다. 이 시기가 되면 Bitcoin은 보조금 기반 보상 시스템에서 순수 수수료 기반 시스템으로 전환되어 네트워크 보안 비용을 인플레이션을 통해 지불하는 보유자에서 거래 수수료를 통해 지불하는 소비자로 근본적으로 바뀌게 됩니다.
reviewed: false

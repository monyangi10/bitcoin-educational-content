question: BIP42によると、Bitcoinのブロック補助金がゼロになるおおよその年は？
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  同章によると、BIP42は超長期的なインフレのバグを修正し、ブロック補助金が2140年頃にゼロになることを保証している。これは、Bitcoinが補助金ベースの報酬システムから純粋な手数料ベースのシステムに移行するタイミングであり、ネットワーク・セキュリティ・コストをカバーする方法を、保有者がインフレを通じて支払うことから、消費者が取引手数料を通じて支払うことに根本的に変更する。
reviewed: false

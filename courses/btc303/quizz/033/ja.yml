question: BIP42によると、ビットコインのブロック報酬がゼロになるおおよその年は？
answer: 2140年
wrong_answers:
  - 2100年
  - 2064年
  - 2160年
explanation: |
  同章によると、BIP42は超長期的なインフレのバグを修正し、ブロック報酬が2140年頃にゼロになることを保証している。これは、ビットコインが補助金ベースの報酬システムから純粋な手数料ベースのシステムに移行するタイミングであり、ネットワークのセキュリティ・コストをカバーする方法を、保有者がインフレを通じて支払うことから、消費者がトランザクション手数料を通じて支払うことに根本的に変更する。
reviewed: false

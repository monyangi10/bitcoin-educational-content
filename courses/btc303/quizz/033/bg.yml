question: Коя ще бъде приблизителната година, в която блоковата субсидия за Bitcoin ще достигне нула съгласно BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Според главата в BIP42 е отстранена много дългосрочна грешка, свързана с инфлацията, и се гарантира, че блоковата субсидия ще достигне нула около 2140 г. Тогава Bitcoin ще премине от система за възнаграждение, базирана на субсидии, към система, базирана изцяло на такси, като коренно ще се промени начинът на покриване на разходите за мрежова сигурност - от такива, които плащат чрез инфлацията, към такива, които харчат чрез такси за транзакции.
reviewed: false

question: تقریباً چه سالی یارانه بلوک Bitcoin طبق BIP42 به صفر می‌رسد؟
answer: ۲۱۴۰
wrong_answers:
  - ۲۱۰۰
  - ۲۰۶۴
  - ۲۱۶۰
explanation: |
  بر اساس این فصل، BIP42 یک باگ تورمی بلندمدت را برطرف کرد و تضمین می‌کند که یارانه بلاک تا حدود سال 2140 به صفر خواهد رسید. این زمانی است که Bitcoin از یک سیستم پاداش مبتنی بر یارانه به یک سیستم کاملاً مبتنی بر کارمزد انتقال می‌یابد، که به طور اساسی نحوه پوشش هزینه‌های امنیت شبکه را از پرداخت از طریق تورم توسط دارندگان به پرداخت از طریق کارمزد تراکنش توسط خرج‌کنندگان تغییر می‌دهد.
reviewed: false

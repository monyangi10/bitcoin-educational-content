question: Ni uwuhe mwaka uzoba ugereranijwe igihe infashanyo y’amabarabara ya Bitcoin izoshika kuri zero hakurikijwe BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Dushingiye ku gice, BIP42 yarakosoye ikibazo c’ugutera imbere kw’ibiciro kw’igihe kirekire cane kandi igaragaza ko infashanyo y’amabuye izoshika kuri zero nko mu mwaka w’2140. Ico gihe ni ho Bitcoin izova ku buryo bwo gutanga impembo ishingiye ku nkunga ikaja ku buryo bushingiye ku mahera gusa, igahindura cane ingene abafise umutekano w’urubuga bashobora gutanga amafaranga biciye ku mahera y’ugutera imbere kw’ibiciro.
reviewed: false

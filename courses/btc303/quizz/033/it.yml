question: Quale sarà l'anno approssimativo in cui la ricompensa del blocco di Bitcoin raggiungerà lo zero secondo il BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Secondo il capitolo, il BIP42 ha risolto un bug di inflazione a lunghissimo termine e garantisce che la ricompensa dei blocchi raggiungerà lo zero intorno all'anno 2140. A questo punto Bitcoin passerà da un sistema di ricompense basato su sovvenzioni a un sistema puramente basato su commissioni, cambiando radicalmente il modo in cui i costi della sicurezza della rete vengono coperti, passando dai detentori che pagano attraverso l'inflazione agli utenti che pagano attraverso le commissioni di transazione.
reviewed: true

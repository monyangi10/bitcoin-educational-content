question: BIP42 के अनुसार वह अनुमानित वर्ष कौन सा होगा जब Bitcoin की ब्लॉक सब्सिडी शून्य पर पहुंच जाएगी?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  अध्याय के अनुसार, BIP42 ने एक बहुत ही दीर्घकालिक मुद्रास्फीति बग को ठीक किया और यह सुनिश्चित किया कि ब्लॉक सब्सिडी वर्ष 2140 के आसपास शून्य पर पहुंच जाएगी। यह वह समय होगा जब Bitcoin सब्सिडी-आधारित पुरस्कार प्रणाली से पूरी तरह से शुल्क-आधारित प्रणाली में परिवर्तित हो जाएगा, जिससे मूल रूप से नेटवर्क सुरक्षा लागतों को कवर करने के तरीके में बदलाव आएगा, जो धारकों द्वारा मुद्रास्फीति के माध्यम से भुगतान करने से लेकर खर्च करने वालों द्वारा लेनदेन शुल्क के माध्यम से भुगतान करने तक होगा।

question: ปีประมาณไหนที่เงินอุดหนุนบล็อกของ Bitcoin จะถึงศูนย์ตาม BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  ตามบทที่กล่าวถึง BIP42 ได้แก้ไขข้อบกพร่องด้านเงินเฟ้อในระยะยาวมากและทำให้แน่ใจว่าการอุดหนุนบล็อกจะถึงศูนย์ประมาณปี 2140 นี่คือเมื่อ Bitcoin จะเปลี่ยนจากระบบรางวัลที่อิงตามการอุดหนุนไปสู่ระบบที่อิงตามค่าธรรมเนียมอย่างเดียว ซึ่งเปลี่ยนแปลงพื้นฐานวิธีการครอบคลุมค่าใช้จ่ายด้านความปลอดภัยของเครือข่ายจากผู้ถือที่จ่ายผ่านเงินเฟ้อไปยังผู้ใช้ที่จ่ายผ่านค่าธรรมเนียมการทำธุรกรรม
reviewed: false
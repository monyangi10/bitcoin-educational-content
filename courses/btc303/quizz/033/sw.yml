question: Je, itakuwa mwaka gani wa makadirio wakati ruzuku ya block ya Bitcoin itafikia sifuri kulingana na BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Kulingana na sura hiyo, BIP42 ilirekebisha mdudu wa mfumuko wa bei wa muda mrefu sana na inahakikisha ruzuku ya kuzuia itafikia sifuri karibu mwaka wa 2140. Huu ndio wakati Bitcoin itabadilika kutoka kwa mfumo wa malipo ya msingi wa ruzuku hadi mfumo wa msingi wa ada, kimsingi kubadilisha jinsi gharama za usalama wa mtandao zinavyolipwa kutoka kwa wamiliki wanaolipa kupitia mfumuko wa bei hadi kwa watumiaji wanaolipa.
reviewed: false

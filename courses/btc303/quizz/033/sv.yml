question: Vilket är det ungefärliga år då Bitcoin:s blockbidrag når noll enligt BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Enligt kapitlet fixade BIP42 en mycket långsiktig inflationsbugg och säkerställer att blockbidraget når noll runt år 2140. Det är då Bitcoin kommer att övergå från ett subventionsbaserat belöningssystem till ett rent avgiftsbaserat system, vilket i grunden förändrar hur nätverkssäkerhetskostnader täcks från innehavare som betalar genom inflation till spenders som betalar genom transaktionsavgifter.

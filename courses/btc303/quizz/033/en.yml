question: What will be the approximate year when Bitcoin's block subsidy reaches zero according to BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  According to the chapter, BIP42 fixed a very-long-term inflation bug and ensures the block subsidy will reach zero around the year 2140. This is when Bitcoin will transition from a subsidy-based reward system to a purely fee-based system, fundamentally changing how network security costs are covered from holders paying through inflation to spenders paying through transaction fees.

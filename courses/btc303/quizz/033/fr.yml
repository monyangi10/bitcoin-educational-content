question: Quelle sera l'année approximative où la subvention globale de Bitcoin atteindra zéro selon le BIP42 ?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Selon le chapitre, le BIP42 a corrigé un bug d'inflation à très long terme et garantit que la subvention de la blockchain atteindra zéro vers l'année 2140. C'est à ce moment-là que la Bitcoin passera d'un système de récompense basé sur les subventions à un système purement payant, ce qui modifiera fondamentalement la façon dont les coûts de sécurité du réseau sont couverts, les détenteurs payant par le biais de l'inflation et les dépensiers payant par le biais des frais de transaction.

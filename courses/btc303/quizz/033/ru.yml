question: В каком году, согласно BIP42, субсидия на блок Bitcoin достигнет нуля?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Согласно главе, в BIP42 исправлена ошибка, связанная с инфляцией в течение очень долгого времени, и субсидии на блокчейн достигнут нуля примерно в 2140 году. Именно тогда Bitcoin перейдет от системы вознаграждений, основанной на субсидиях, к системе, основанной исключительно на сборах, что коренным образом изменит способ покрытия расходов на безопасность сети: держатели будут платить за счет инфляции, а тратящие - за счет сборов за транзакции.
question: ¿Cuál será el año aproximado en que la subvención en bloque de Bitcoin llegue a cero según el PIF42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Según el capítulo, el BIP42 solucionó un error de inflación a muy largo plazo y garantiza que el subsidio por bloque llegará a cero en torno al año 2140. Será entonces cuando Bitcoin pase de un sistema de recompensas basado en subsidios a un sistema basado exclusivamente en comisiones, lo que supondrá un cambio fundamental en el modo en que se cubren los costes de seguridad de la red, pasando de que los titulares paguen a través de la inflación a que los gastadores paguen a través de las comisiones por transacción.
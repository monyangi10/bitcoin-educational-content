question: Mikä on noin vuosi, jolloin Bitcoin:n lohkotuki saavuttaa nollan BIP42:n mukaan?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Luvun mukaan BIP42:ssa korjattiin hyvin pitkäaikainen inflaatiovika ja varmistetaan, että lohkotuki on nolla noin vuonna 2140. Silloin Bitcoin siirtyy tukeen perustuvasta palkitsemisjärjestelmästä puhtaasti maksuperusteiseen järjestelmään, mikä muuttaa perusteellisesti tapaa, jolla verkon turvallisuuskustannukset katetaan, kun haltijat maksavat inflaation kautta ja tuhlaajat maksavat transaktiomaksujen kautta.
reviewed: false

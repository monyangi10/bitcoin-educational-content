question: Koja će biti približna godina kada će subvencija bloka Bitcoin dostići nulu prema BIP42?
answer: 2140
wrong_answers:
  - 2100
  - 2064
  - 2160
explanation: |
  Prema poglavlju, BIP42 je ispravio dugoročni problem inflacije i osigurava da će subvencija za blok dostići nulu oko godine 2140. Tada će Bitcoin preći sa sistema nagrađivanja zasnovanog na subvencijama na sistem zasnovan isključivo na naknadama, što će fundamentalno promeniti način na koji se pokrivaju troškovi sigurnosti mreže, prelazeći sa plaćanja putem inflacije od strane vlasnika na plaćanje putem transakcijskih naknada od strane potrošača.

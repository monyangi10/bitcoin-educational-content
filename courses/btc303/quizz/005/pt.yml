question: A que se refere especificamente a descentralização dos mineiros no Bitcoin?
answer: A ordenação das transacções é realizada coletivamente por um conjunto dinâmico de mineiros e não por uma única entidade
wrong_answers:
  - A validação dos blocos é distribuída por várias autoridades de confiança em vez de um servidor central
  - As recompensas do mining são distribuídas igualmente entre todos os participantes na rede Bitcoin
  - O hardware do mining é fabricado por diferentes empresas para evitar a monopolização do equipamento
explanation: |
  A descentralização Miner significa especificamente que a ordem das transacções não é controlada por uma única entidade ou grupo fixo, mas sim por um coletivo de mineiros que podem aderir ou abandonar livremente. Isto é diferente da validação de blocos (que está relacionada com a descentralização full node), da distribuição de prémios ou do fabrico de hardware. A natureza dinâmica do coletivo mining - onde qualquer pessoa pode participar sem autorização - é o que torna o Bitcoin resistente à censura e impede que uma única parte controle as transacções que são incluídas nos blocos.
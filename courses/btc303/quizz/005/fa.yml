question: تمرکززدایی ماینرها در Bitcoin به طور خاص به چه چیزی اشاره دارد؟
answer: ترتیب تراکنش‌ها به‌صورت جمعی توسط مجموعه‌ای پویا از ماینرها انجام می‌شود و نه توسط یک نهاد واحد.
wrong_answers:
  - اعتبارسنجی بلوک‌ها به جای یک سرور مرکزی، در میان چندین مرجع معتبر توزیع شده است.
  - پاداش‌های mining به طور مساوی بین همه شرکت‌کنندگان در شبکه Bitcoin توزیع می‌شوند.
  - سخت‌افزار mining توسط شرکت‌های مختلف تولید می‌شود تا از انحصار تجهیزات جلوگیری شود.
explanation: |
  غیرمتمرکزسازی Miner به‌طور خاص به این معناست که ترتیب‌دهی تراکنش‌ها توسط هیچ نهاد یا گروه ثابتی کنترل نمی‌شود، بلکه توسط جمعی از ماینرها که می‌توانند آزادانه به آن بپیوندند یا از آن خارج شوند، انجام می‌گیرد. این با اعتبارسنجی بلاک (که به غیرمتمرکزسازی full node مربوط است)، توزیع پاداش، یا تولید سخت‌افزار متفاوت است. ماهیت پویا جمع mining - جایی که هر کسی می‌تواند بدون نیاز به اجازه شرکت کند - چیزی است که Bitcoin را در برابر سانسور مقاوم می‌سازد و از کنترل یک طرف واحد بر اینکه کدام تراکنش‌ها در بلاک‌ها گنجانده شوند، جلوگیری می‌کند.
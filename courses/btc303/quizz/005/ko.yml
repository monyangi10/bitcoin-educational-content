question: Bitcoin에서 채굴자 탈중앙화란 구체적으로 무엇을 의미하나요?
answer: 트랜잭션 주문은 단일 주체가 아닌 동적인 채굴자 집합에 의해 집합적으로 수행됩니다
wrong_answers:
  - 블록 검증은 하나의 중앙 서버가 아닌 신뢰할 수 있는 여러 기관에 분산됩니다
  - mining 보상은 Bitcoin 네트워크의 모든 참가자에게 균등하게 분배됩니다
  - mining 하드웨어는 장비 독점을 방지하기 위해 여러 회사에서 제조합니다
explanation: |
  Miner 탈중앙화는 구체적으로 거래 주문을 단일 주체나 고정된 그룹이 통제하는 것이 아니라, 자유롭게 참여하거나 탈퇴할 수 있는 채굴자 집단이 통제하는 것을 의미합니다. 이는 블록 검증(full node 탈중앙화와 관련된), 보상 분배 또는 하드웨어 제조와는 다릅니다. 누구나 허가 없이 참여할 수 있는 mining 집단의 역동적인 특성 때문에 Bitcoin는 검열에 강하며, 어느 한 당사자가 블록에 포함될 거래를 통제하지 못하도록 합니다.
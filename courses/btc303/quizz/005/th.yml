question: การกระจายศูนย์ของนักขุดใน Bitcoin หมายถึงอะไรโดยเฉพาะ?
answer: การจัดลำดับธุรกรรมดำเนินการโดยกลุ่มนักขุดที่เปลี่ยนแปลงได้อย่างรวมกัน แทนที่จะเป็นโดยหน่วยงานเดียว
wrong_answers:
  - การตรวจสอบความถูกต้องของบล็อกถูกกระจายไปยังหน่วยงานที่เชื่อถือได้หลายแห่งแทนที่จะเป็นเซิร์ฟเวอร์กลางเพียงแห่งเดียว
  - รางวัล mining ถูกแจกจ่ายอย่างเท่าเทียมกันในหมู่ผู้เข้าร่วมทั้งหมดในเครือข่าย Bitcoin
  - ฮาร์ดแวร์ mining ผลิตโดยบริษัทต่างๆ เพื่อป้องกันการผูกขาดอุปกรณ์
explanation: |
  Miner การกระจายอำนาจหมายถึงการที่การจัดลำดับธุรกรรมไม่ได้ถูกควบคุมโดยหน่วยงานเดียวหรือกลุ่มที่กำหนด แต่เป็นการควบคุมโดยกลุ่มนักขุดที่สามารถเข้าร่วมหรือออกได้อย่างอิสระ ซึ่งแตกต่างจากการตรวจสอบบล็อก (ซึ่งเกี่ยวข้องกับการกระจายอำนาจของ full node), การแจกจ่ายรางวัล, หรือการผลิตฮาร์ดแวร์ ลักษณะพลวัตของกลุ่ม mining - ที่ใครก็สามารถเข้าร่วมได้โดยไม่ต้องขออนุญาต - เป็นสิ่งที่ทำให้ Bitcoin ทนทานต่อการเซ็นเซอร์และป้องกันไม่ให้ฝ่ายใดฝ่ายหนึ่งควบคุมว่าธุรกรรมใดจะถูกบรรจุในบล็อก
reviewed: false
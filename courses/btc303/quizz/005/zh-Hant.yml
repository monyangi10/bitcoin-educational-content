question: 在 Bitcoin 中，礦工分散化具體指的是什麼？
answer: 交易的排序是由一群動態的礦工集體執行，而非單一實體
wrong_answers:
  - 區塊的驗證分散在多個受信任的機構，而不是一個中央伺服器
  - mining 獎勵平均分配給 Bitcoin 網路中的所有參與者
  - mining 硬體由不同公司製造，以防止設備壟斷
explanation: |
  Miner 分散化特指交易排序不受任何單一實體或固定團體控制，而是由可自由加入或退出的礦工集體控制。這與區塊驗證 (與 full node 去中心化有關)、獎勵分發或硬件製造不同。mining 集團的動態性質 - 任何人都可以不經允許而參與 - 是 Bitcoin 可抵抗審查的原因，並可防止任何單方控制哪些交易會被包含在區塊中。

question: À quoi la décentralisation des mineurs fait-elle spécifiquement référence dans Bitcoin ?
answer: L'ordre des transactions est effectué collectivement par un ensemble dynamique de mineurs plutôt que par une entité unique
wrong_answers:
  - La validation des blocs est répartie entre plusieurs autorités de confiance au lieu d'un serveur central
  - Les récompenses de la mining sont réparties de manière égale entre tous les participants du réseau Bitcoin
  - Le matériel mining est fabriqué par différentes entreprises afin d'éviter la monopolisation de l'équipement
explanation: |
  La décentralisation Miner signifie spécifiquement que l'ordre des transactions n'est pas contrôlé par une entité unique ou un groupe fixe, mais plutôt par un collectif de mineurs qui peuvent librement se joindre ou se retirer. Cela diffère de la validation des blocs (qui est liée à la décentralisation full node), de la distribution des récompenses ou de la fabrication du matériel. La nature dynamique du collectif mining - où tout le monde peut participer sans autorisation - est ce qui rend le Bitcoin résistant à la censure et empêche une seule partie de contrôler les transactions qui sont incluses dans les blocs.
reviewed: false

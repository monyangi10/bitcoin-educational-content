question: Что конкретно подразумевается под децентрализацией майнеров в Bitcoin?
answer: Упорядочивание транзакций осуществляется коллективно динамическим набором майнеров, а не одной организацией
wrong_answers:
  - Проверка блоков распределяется между несколькими доверенными органами вместо одного центрального сервера
  - Вознаграждения mining поровну распределяются между всеми участниками сети Bitcoin
  - Аппаратура mining производится различными компаниями для предотвращения монополизации оборудования
explanation: |
  Децентрализация Miner означает, что заказ транзакций контролируется не каким-то одним субъектом или фиксированной группой, а коллективом майнеров, которые могут свободно присоединяться или уходить. Это отличается от проверки блоков (что относится к децентрализации full node), распределения вознаграждений или производства оборудования. Динамическая природа коллектива mining, где любой может участвовать без разрешения, - это то, что делает Bitcoin устойчивой к цензуре и не позволяет какой-либо одной стороне контролировать, какие транзакции попадают в блоки.

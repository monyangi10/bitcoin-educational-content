question: Bitcoin में माइनर विकेंद्रीकरण का विशेष रूप से क्या अर्थ है?
answer: लेन-देन का क्रम एकल इकाई के बजाय खनिकों के एक गतिशील समूह द्वारा सामूहिक रूप से किया जाता है
wrong_answers:
  - ब्लॉकों का सत्यापन एक केंद्रीय सर्वर के बजाय कई विश्वसनीय प्राधिकरणों में वितरित किया जाता है
  - mining पुरस्कार Bitcoin नेटवर्क के सभी प्रतिभागियों के बीच समान रूप से वितरित किए जाते हैं
  - उपकरणों के एकाधिकार को रोकने के लिए mining हार्डवेयर का निर्माण विभिन्न कंपनियों द्वारा किया जाता है
explanation: |
  Miner विकेंद्रीकरण का विशिष्ट अर्थ है कि लेन-देन क्रम किसी एक इकाई या निश्चित समूह द्वारा नियंत्रित नहीं होता, बल्कि खनिकों के एक समूह द्वारा नियंत्रित होता है जो स्वतंत्र रूप से शामिल हो सकते हैं या छोड़ सकते हैं। यह ब्लॉक सत्यापन (जो full node विकेंद्रीकरण से संबंधित है), पुरस्कार वितरण, या हार्डवेयर निर्माण से भिन्न है। mining समूह की गतिशील प्रकृति - जहाँ कोई भी बिना अनुमति के भाग ले सकता है - Bitcoin को सेंसरशिप-प्रतिरोधी बनाती है और किसी भी एक पक्ष को यह नियंत्रित करने से रोकती है कि कौन से लेन-देन ब्लॉक में शामिल किए जाएँ।
reviewed: false

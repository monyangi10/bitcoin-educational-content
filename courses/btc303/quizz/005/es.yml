question: ¿A qué se refiere específicamente la descentralización minera en Bitcoin?
answer: La ordenación de las transacciones la realiza colectivamente un conjunto dinámico de mineros en lugar de una única entidad
wrong_answers:
  - La validación de los bloques se distribuye entre varias autoridades de confianza en lugar de un servidor central
  - Las recompensas de mining se distribuyen equitativamente entre todos los participantes de la red Bitcoin
  - El hardware de mining lo fabrican distintas empresas para evitar la monopolización de los equipos
explanation: |
  La descentralización minera significa específicamente que la ordenación de las transacciones no está controlada por una única entidad o grupo fijo, sino por un colectivo de mineros que pueden unirse o abandonar libremente. Esto es diferente de la validación de bloques (relacionada con la descentralización full node), la distribución de recompensas o la fabricación de hardware. La naturaleza dinámica del colectivo mining -en el que cualquiera puede participar sin permiso- es lo que hace que Bitcoin sea resistente a la censura e impide que una sola parte controle qué transacciones se incluyen en los bloques.

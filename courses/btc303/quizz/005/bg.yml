question: За какво конкретно се отнася децентрализацията на миньорите в Bitcoin?
answer: Подреждането на транзакциите се извършва колективно от динамичен набор от миньори, а не от един субект
wrong_answers:
  - Валидирането на блоковете се разпределя между множество доверени органи вместо един централен сървър
  - Наградите на миньорите се разпределят поравно между всички участници в мрежата Bitcoin
  - Хардуерът на миньорите се произвежда от различни компании, за да се предотврати монополизирането на оборудването
explanation: |
  Децентрализацията на миньорите конкретно означава, че нареждането на транзакциите не се контролира от едно лице или фиксирана група, а от колектив от миньори, които могат свободно да се присъединяват или да напускат. Това е различно от валидирането на блокове (което е свързано с децентрализацията на възлите), разпределението на възнагражденията или производството на хардуер. Динамичният характер на копаене - в който всеки може да участва без разрешение - е това, което прави Bitcoin устойчив на цензура и не позволява на нито една страна да контролира кои транзакции се включват в блоковете.
reviewed: true

question: マイナーの分散化とは、ビットコインでは具体的に何を指すのですか？
answer: トランザクションの順序付けは、単一の主体ではなく、マイナーの動的なセットによって集団的に実行されること
wrong_answers:
  - ブロックの検証は、1つの中央サーバーではなく、複数の信頼できる機関に分散化されること
  - マイニング報酬は、ビットコイン・ネットワークの全参加者に均等に分配されること
  - マイニング・ハードウェアは、機器の独占を防ぐため、さまざまな企業が製造していること
explanation: |
  マイナーの分散化とは具体的には、トランザクションの順序付けが単一の事業体や固定グループによって管理されるのではなく、自由に参加したり脱退したりできるマイナーの集団によって管理されることを意味する。これはブロックの検証（フルノードの分散化に関連する）や報酬の分配、ハードウェアの製造とは異なる。誰もが許可なく参加できるマイニング集団の動的な性質が、ビットコインを検閲に強いものにしており、どのトランザクションがブロックに含まれるかを単一の主体がコントロールすることを防いでいる。
reviewed: false

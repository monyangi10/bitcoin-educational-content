question: マイナーの分散化とは、Bitcoinでは具体的に何を指すのですか？
answer: トランザクションの順序付けは、単一のエンティティではなく、マイナーの動的なセットによって集団的に実行される。
wrong_answers:
  - ブロックの検証は、1つの中央サーバーではなく、複数の信頼できる機関に分散される。
  - miningの報酬は、Bitcoinネットワークの全参加者に均等に分配される。
  - miningのハードウェアは、機器の独占を防ぐため、さまざまな企業が製造している
explanation: |
  Minerの分散化とは具体的には、トランザクションの発注が単一の事業体や固定グループによって管理されるのではなく、自由に参加したり脱退したりできるマイナーの集団によって管理されることを意味する。これはブロックの検証（full nodeの分散化に関連する）や報酬の分配、ハードウェアの製造とは異なる。誰もが許可なく参加できるmining集団の動的な性質が、Bitcoinを検閲に強いものにしており、どの取引がブロックに含まれるかを単一の当事者がコントロールすることを防いでいる。
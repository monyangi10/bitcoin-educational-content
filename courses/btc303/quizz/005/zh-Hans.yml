question: Bitcoin 中的矿工分散化具体指的是什么？
answer: 交易排序由一组动态矿工集体执行，而不是由单一实体执行
wrong_answers:
  - 区块验证分布在多个可信机构，而不是一个中央服务器上
  - mining 的奖励在 Bitcoin 网络的所有参与者之间平均分配
  - mining 硬件由不同公司生产，以防止设备垄断
explanation: |
  Miner 去中心化具体指交易排序不受任何单一实体或固定团体控制，而是由可以自由加入或退出的矿工集体控制。这与区块验证（与 full node 去中心化有关）、奖励分配或硬件制造不同。mining 集体的动态性质--任何人都可以未经许可参与--使得 Bitcoin 可以抵制审查，并防止任何一方控制哪些交易被纳入区块。
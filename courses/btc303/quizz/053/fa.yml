question: چه چیزی فرضیات امنیتی Bitcoin را از سیستم‌های امنیتی فیزیکی سنتی مانند ساختمان‌ها متمایز می‌کند؟
answer: Bitcoin باید به تمام نقاط ضعف شناخته شده رسیدگی کند زیرا دشمنان آنلاین ناشناس هستند و از هرگونه آسیب‌پذیری سوءاستفاده خواهند کرد.
wrong_answers:
  - Bitcoin به اثبات‌های ریاضی متکی است، در حالی که ساختمان‌ها به موانع فیزیکی و اجرای قانون وابسته‌اند.
  - "امنیت Bitcoin بر اساس مشوق‌های اقتصادی است در حالی که ساختمان‌ها از بازدارندگی از طریق اقدامات امنیتی قابل مشاهده استفاده می‌کنند"
  - Bitcoin از امضاهای رمزنگاری برای حفاظت استفاده می‌کند، در حالی که ساختمان‌ها به سیستم‌های کنترل دسترسی و نظارت متکی هستند.
explanation: |
  تفاوت کلیدی این است که سیستم‌های آنلاین مانند Bitcoin با دشمنان ناشناس مواجه هستند که به طور اجتناب‌ناپذیر از هر ضعف شناخته‌شده‌ای سوءاستفاده خواهند کرد، برخلاف سیستم‌های فیزیکی که می‌توانیم مقداری ریسک را بپذیریم زیرا مرتکبان قابل شناسایی و پیگرد قانونی هستند. همان‌طور که اندرو پولسترا اشاره کرد، به صورت آنلاین ما از تجمل بازدارندگی اجرای قانون برخوردار نیستیم - اگر امکان آسیب رساندن به سیستم به صورت خصمانه وجود داشته باشد، بازیگران ناشناس این کار را انجام خواهند داد. این امر Bitcoin را مجبور می‌کند تا به همه آسیب‌پذیری‌ها رسیدگی کند، به جای اینکه ریسک‌های محاسبه‌شده را بپذیرد.
reviewed: false

question: Ni nini kinachotofautisha mawazo ya usalama ya Bitcoin na yale ya mifumo ya kawaida ya usalama kama vile majengo?
answer: Bitcoin lazima ishughulikie udhaifu wote unaojulikana kwa sababu wapinzani wa mtandaoni hawatambuliki na watatumia udhaifu wowote.
wrong_answers:
  - Bitcoin inategemea uthibitisho wa hisabati wakati majengo yanategemea vikwazo vya kimwili na utekelezaji wa sheria.
  - "Usalama wa Bitcoin unategemea motisha za kiuchumi huku majengo yakitumia vizuizi kupitia hatua zinazoonekana za usalama"
  - Bitcoin hutumia saini za siri kwa ulinzi huku majengo yanategemea udhibiti wa ufikiaji na mifumo ya ufuatiliaji
explanation: |
  Tofauti kuu ni kwamba mifumo ya mtandaoni kama vile Bitcoin inakabiliana na wapinzani wasiojulikana ambao bila shaka watatumia udhaifu wowote unaojulikana, tofauti na mifumo ya kimwili ambapo tunaweza kukubali hatari fulani kwa sababu wahalifu wanaweza kutambuliwa na kufunguliwa mashtaka. Kama Andrew Poelstra alivyobainisha, mtandaoni hatuna anasa ya kuzuia utekelezaji wa sheria - ikiwezekana kuumiza mfumo, watendaji wasiojulikana watafanya hivyo. Hii inalazimisha Bitcoin kushughulikia udhaifu wote badala ya kukubali hatari zilizokokotwa.
question: Какво отличава предпоставките за сигурност на Bitcoin от тези на традиционните системи за физическа сигурност, като например сградите?
answer: Bitcoin трябва да адресира всички известни слабости, тъй като онлайн противниците са анонимни и ще се възползват от всяка уязвимост
wrong_answers:
  - Bitcoin разчита на математически доказателства, докато сградите зависят от физически бариери и правоприлагане
  - Сигурността на Bitcoin се основава на икономически стимули, докато сградите използват възпиране чрез видими мерки за сигурност
  - Bitcoin използва криптографски подписи за защита, докато сградите разчитат на системи за контрол на достъпа и наблюдение
explanation: |
  Ключовата разлика е, че онлайн системите като Bitcoin са изправени пред анонимни противници, които неизбежно ще се възползват от всяка известна слабост, за разлика от физическите системи, при които можем да приемем известен риск, тъй като извършителите могат да бъдат идентифицирани и подведени под отговорност. Както отбеляза Андрю Поелстра, онлайн не разполагаме с лукса на възпиращите мерки на правоприлагащите органи - ако е възможно да се навреди на системата по неприятелски начин, анонимните участници ще го направят. Това принуждава Bitcoin да се справи с всички уязвимости, вместо да приема пресметнати рискове.
reviewed: true

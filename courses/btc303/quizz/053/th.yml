question: อะไรที่ทำให้ข้อสมมติฐานด้านความปลอดภัยของ Bitcoin แตกต่างจากระบบความปลอดภัยทางกายภาพแบบดั้งเดิมเช่นอาคาร?
answer: Bitcoin ต้องแก้ไขจุดอ่อนที่ทราบทั้งหมดเพราะผู้ไม่หวังดีทางออนไลน์นั้นไม่เปิดเผยตัวตนและจะใช้ประโยชน์จากช่องโหว่ใด ๆ
wrong_answers:
  - Bitcoin อาศัยหลักฐานทางคณิตศาสตร์ ในขณะที่อาคารพึ่งพาอุปสรรคทางกายภาพและการบังคับใช้กฎหมาย
  - "ความปลอดภัยของ Bitcoin ขึ้นอยู่กับแรงจูงใจทางเศรษฐกิจ ในขณะที่อาคารใช้การยับยั้งผ่านมาตรการรักษาความปลอดภัยที่มองเห็นได้"
  - Bitcoin ใช้ลายเซ็นดิจิทัลเพื่อการป้องกัน ในขณะที่อาคารพึ่งพาระบบควบคุมการเข้าถึงและระบบตรวจสอบ
explanation: |
  ความแตกต่างที่สำคัญคือระบบออนไลน์เช่น Bitcoin ต้องเผชิญกับผู้ไม่หวังดีที่ไม่เปิดเผยตัวตนซึ่งจะหาประโยชน์จากจุดอ่อนที่รู้จักอย่างหลีกเลี่ยงไม่ได้ ต่างจากระบบทางกายภาพที่เราสามารถยอมรับความเสี่ยงบางอย่างได้เพราะผู้กระทำผิดสามารถถูกระบุตัวและดำเนินคดีได้ ดังที่ Andrew Poelstra ได้กล่าวไว้ว่า ในโลกออนไลน์เราไม่มีความหรูหราของการยับยั้งโดยการบังคับใช้กฎหมาย - หากสามารถทำร้ายระบบในเชิงลบได้ ผู้กระทำที่ไม่เปิดเผยตัวตนจะทำเช่นนั้น สิ่งนี้บังคับให้ Bitcoin ต้องจัดการกับช่องโหว่ทั้งหมดแทนที่จะยอมรับความเสี่ยงที่คำนวณได้
reviewed: false
question: Bitcoin 的安全假設與建築物等傳統實體安全系統有何不同？
answer: Bitcoin 必須處理所有已知的弱點，因為線上的對手是匿名的，他們會利用任何弱點
wrong_answers:
  - Bitcoin 依賴數學證明，而建築物則依賴實體屏障和執法。
  - 「Bitcoin的安全性以經濟獎勵為基礎，而建築物則透過可見的安全措施來使用威脅」
  - Bitcoin 使用加密簽章進行保護，而建築物則依賴存取控制和監視系統
explanation: |
  關鍵的區別在於，Bitcoin 之類的線上系統所面對的是匿名的對手，他們無可避免地會利用任何已知的弱點，這與實體系統不同，在實體系統中，我們可以接受一些風險，因為犯罪者可以被識別並起訴。正如 Andrew Poelstra 所指出的，我們在線上沒有執法威脅 - 如果有可能對系統造成傷害，匿名者就會這麼做。這迫使 Bitcoin 必須處理所有弱點，而不是接受經過計算的風險。
reviewed: false

question: Bitcoinのセキュリティの前提が、ビルのような伝統的な物理的セキュリティ・システムと異なる点は？
answer: Bitcoinは、オンライン上の敵は匿名であり、どのような脆弱性も悪用するため、既知のすべての弱点に対処する必要がある。
wrong_answers:
  - Bitcoinは数学的証明に依存しているが、ビルは物理的バリアと法執行に依存している
  - 「Bitcoinのセキュリティーは経済的インセンティブに基づくが、ビルは目に見えるセキュリティー対策で抑止力を発揮する。
  - Bitcoinは暗号署名を用いて保護する一方、ビルは入退室管理と監視システムに依存している。
explanation: |
  重要な違いは、Bitcoinのようなオンラインシステムは、加害者を特定し起訴することができるため、ある程度のリスクを受け入れることができる物理的なシステムとは異なり、既知の弱点を必然的に悪用する匿名の敵対者に直面しているということである。アンドリュー・ポエルストラが指摘したように、オンラインでは法執行機関による抑止の余裕がない。このため、Bitcoinは計算されたリスクを受け入れるのではなく、すべての脆弱性に対処することを余儀なくされる。
reviewed: false

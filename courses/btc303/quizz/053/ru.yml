question: Что отличает принципы безопасности Bitcoin от традиционных систем физической безопасности, таких как здания?
answer: Bitcoin должен устранить все известные слабые места, поскольку сетевые противники анонимны и могут использовать любую уязвимость
wrong_answers:
  - Bitcoin опирается на математические доказательства, в то время как здания зависят от физических барьеров и правоохранительных органов
  - "Безопасность Bitcoin основана на экономических стимулах, в то время как здания используют сдерживание с помощью видимых мер безопасности"
  - Bitcoin использует криптографические подписи для защиты, в то время как здания полагаются на системы контроля доступа и мониторинга
explanation: |
  Ключевое различие заключается в том, что онлайн-системы, подобные Bitcoin, сталкиваются с анонимными противниками, которые неизбежно воспользуются любой известной слабостью, в отличие от физических систем, где мы можем принять некоторый риск, потому что преступников можно идентифицировать и привлечь к ответственности. Как отметил Эндрю Поэлстра, в онлайне у нас нет роскоши сдерживания со стороны правоохранительных органов - если есть возможность нанести вред системе, анонимные участники сделают это. Это заставляет Bitcoin устранять все уязвимости, а не принимать просчитанные риски.
reviewed: false

question: Bitcoin의 보안 가정이 빌딩과 같은 기존의 물리적 보안 시스템과 다른 점은 무엇인가요?
answer: 온라인 공격자는 익명으로 활동하며 모든 취약점을 악용할 수 있으므로 Bitcoin은 알려진 모든 취약점을 해결해야 합니다
wrong_answers:
  - Bitcoin는 수학적 증명에 의존하는 반면, 건물은 물리적 장벽과 법 집행에 의존합니다
  - "Bitcoin의 보안은 경제적 인센티브에 기반하는 반면 건물은 가시적인 보안 조치를 통해 억지력을 사용합니다."
  - Bitcoin는 건물이 액세스 제어 및 모니터링 시스템에 의존하는 동안 보호를 위해 암호화 서명을 사용합니다
explanation: |
  중요한 차이점은 가해자를 식별하고 기소할 수 있어 어느 정도 위험을 감수할 수 있는 물리적 시스템과 달리, Bitcoin와 같은 온라인 시스템은 알려진 약점을 악용할 수밖에 없는 익명의 공격자에 직면한다는 점입니다. 앤드류 포엘스트라가 지적했듯이, 온라인에서는 법 집행 기관의 억지력이 없기 때문에 시스템에 악의적인 피해를 입힐 수 있다면 익명의 공격자가 이를 실행할 것입니다. 따라서 Bitcoin는 계산된 위험을 받아들이는 대신 모든 취약점을 해결해야 합니다.
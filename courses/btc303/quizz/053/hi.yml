question: Bitcoin की सुरक्षा धारणाएं, इमारतों जैसी पारंपरिक भौतिक सुरक्षा प्रणालियों से किस प्रकार भिन्न हैं?
answer: Bitcoin को सभी ज्ञात कमजोरियों को दूर करना होगा क्योंकि ऑनलाइन विरोधी गुमनाम होते हैं और किसी भी कमजोरी का फायदा उठा सकते हैं
wrong_answers:
  - Bitcoin गणितीय प्रमाणों पर निर्भर करता है जबकि इमारतें भौतिक बाधाओं और कानून प्रवर्तन पर निर्भर करती हैं
  - "Bitcoin की सुरक्षा आर्थिक प्रोत्साहनों पर आधारित है, जबकि इमारतें दृश्य सुरक्षा उपायों के माध्यम से निवारण का उपयोग करती हैं।"
  - Bitcoin सुरक्षा के लिए क्रिप्टोग्राफ़िक हस्ताक्षरों का उपयोग करता है जबकि इमारतें प्रवेश नियंत्रण और निगरानी प्रणालियों पर निर्भर करती हैं
explanation: |
  मुख्य अंतर यह है कि Bitcoin जैसी ऑनलाइन प्रणालियों को अज्ञात विरोधियों का सामना करना पड़ता है जो किसी भी ज्ञात कमज़ोरी का फ़ायदा उठाएँगे, जबकि भौतिक प्रणालियों में हम कुछ जोखिम स्वीकार कर सकते हैं क्योंकि अपराधियों की पहचान की जा सकती है और उन पर मुकदमा चलाया जा सकता है। जैसा कि एंड्रयू पोएलस्ट्रा ने कहा, ऑनलाइन हमारे पास कानून प्रवर्तन निरोधक की सुविधा नहीं है - अगर सिस्टम को प्रतिकूल रूप से नुकसान पहुँचाना संभव है, तो अज्ञात लोग ऐसा कर देंगे। यह Bitcoin को सोचे-समझे जोखिम स्वीकार करने के बजाय सभी कमज़ोरियों को दूर करने के लिए मजबूर करता है।
reviewed: false

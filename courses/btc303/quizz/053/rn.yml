question: Ni igiki gitandukanya ivyiyumviro vy’umutekano vya Bitcoin n’ivy’imirongo y’umutekano y’umubiri nk’inyubakwa?
answer: Bitcoin itegerezwa gutorera umuti intege nke zose zizwi kuko abansi bo kuri Internet ntibamenyekana kandi bazokoresha ubugoyagoye bwose .
wrong_answers:
  - Bitcoin ishingiye ku bimenyamenya vy’imibare mu gihe inyubakwa zishingiye ku nzitizi z’umubiri n’ugukurikiza amategeko .
  - "Umutekano wa Bitcoin ushingiye ku nkunga z'ubutunzi mu gihe inyubakwa zikoresha uburyo bwo guhagarika umutekano biciye mu ngingo z'umutekano ziboneka".
  - Bitcoin ikoresha imikono y'ibanga kugira ngo ikingirwe mu gihe inyubakwa zishingiye ku buryo bwo kugenzura no kugenzura ingene umuntu ashobora gushika
explanation: |
  Itandukaniro rikomeye ni uko ubuhinga bwo kuri internet nka Bitcoin buhura n’abansi batazwi bazokoresha ata kabuza intege nke iyo ari yo yose izwi, bitandukanye n’ubuhinga bwo ku mubiri aho dushobora kwemera ingorane zimwe zimwe kuko ababikoze bashobora kumenyekana no gukurikiranwa. Nk’uko Andrew Poelstra yabivuze, kuri internet nta n’ubutunzi dufise bwo guhagarika abajejwe gukurikiza amategeko - nimba bishoboka gukomeretsa urutonde mu buryo bw’abansi, abakinnyi batazwi bazobikora. Ivyo bihatira Bitcoin gutorera umuti ingorane zose aho kwemera ingorane ziharuwe.
question: Bitcoin 的安全假设与建筑物等传统物理安全系统的安全假设有何不同？
answer: Bitcoin 必须解决所有已知的弱点，因为在线对手是匿名的，他们会利用任何漏洞
wrong_answers:
  - Bitcoin 依靠的是数学证明，而建筑物依靠的是物理障碍和执法
  - "Bitcoin 的安全基于经济激励措施，而建筑物则通过明显的安全措施发挥威慑作用"
  - Bitcoin 使用加密签名进行保护，而建筑物则依靠出入控制和监控系统
explanation: |
  关键的区别在于，像 Bitcoin 这样的在线系统面对的是匿名对手，他们不可避免地会利用任何已知的弱点，而物理系统则不同，我们可以接受一定的风险，因为犯罪者是可以被识别和起诉的。正如安德鲁-波尔斯特拉（Andrew Poelstra）所指出的，在网络上，我们没有执法威慑力--如果有可能对系统造成负面伤害，匿名者就会这么做。这就迫使 Bitcoin 必须解决所有漏洞，而不是接受精心策划的风险。
reviewed: false

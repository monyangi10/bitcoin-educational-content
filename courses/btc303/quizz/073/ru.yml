question: В соответствии с практикой ответственного раскрытия информации Bitcoin Core, когда следует публично раскрывать информацию об уязвимости после развертывания исправления?
answer: После того как более 80 % узлов Bitcoin развернут исправления
wrong_answers:
  - Сразу после выхода исправления, чтобы предотвратить ложные предположения о безопасности
  - После того как все основные альткоины будут уведомлены и обновят свои реализации
  - После стандартного 90-дневного периода эмбарго, независимо от статуса развертывания
explanation: |
  Bitcoin Core следует графику раскрытия информации, основанному на развертывании, а не на фиксированном периоде времени. Порог в 80 % гарантирует, что большая часть сети будет защищена до того, как злоумышленники смогут узнать об уязвимости из публичного раскрытия. Такой подход ставит безопасность сети выше произвольных сроков, поскольку преждевременное раскрытие информации может подвергнуть оставшиеся 20 % узлов целенаправленным атакам. Другие варианты представляют собой обычную практику традиционной защиты программного обеспечения, но не учитывают децентрализованную природу Bitcoin, где пользователи должны добровольно обновлять свои узлы.
reviewed: false

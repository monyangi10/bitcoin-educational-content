question: Според практиките за отговорно оповестяване на Bitcoin Core кога трябва да се оповестява публично информация за уязвимост след внедряване на поправка?
answer: След като повече от 80% от възлите Bitcoin са внедрили поправките
wrong_answers:
  - Веднага след пускането на кръпката, за да се предотвратят погрешни предположения за сигурност
  - След като всички основни алткойни са били уведомени и са актуализирали реализациите си
  - След стандартен 90-дневен период на ембарго, независимо от статуса на разгръщане
explanation: |
  Bitcoin Core следва график за оповестяване, основан на разгръщането, а не на фиксиран период от време. Прагът от 80% гарантира, че по-голямата част от мрежата е защитена, преди нападателите да научат за уязвимостта от публично оповестяване. Този подход дава приоритет на сигурността на мрежата пред произволните срокове, тъй като преждевременното разкриване може да изложи останалите 20% от възлите на целенасочени атаки. Другите варианти представляват общи практики в традиционната софтуерна сигурност, но не отчитат децентрализирания характер на Bitcoin, където потребителите трябва доброволно да обновяват своите възли.
reviewed: true

question: ตามแนวทางการเปิดเผยข้อมูลอย่างรับผิดชอบของ Bitcoin Core ควรเปิดเผยรายละเอียดช่องโหว่ต่อสาธารณะเมื่อใดหลังจากที่มีการแก้ไขปัญหาแล้ว?
answer: หลังจากที่โหนด Bitcoin มากกว่า 80% ได้ติดตั้งการแก้ไขแล้ว
wrong_answers:
  - ทันทีหลังจากที่แพตช์ถูกปล่อยออกมาเพื่อป้องกันการสันนิษฐานด้านความปลอดภัยที่ผิดพลาด
  - หลังจากที่เหรียญทางเลือกหลักทั้งหมดได้รับการแจ้งเตือนและอัปเดตการใช้งานของพวกเขาแล้ว
  - หลังจากช่วงระยะเวลาการห้ามเผยแพร่มาตรฐาน 90 วันโดยไม่คำนึงถึงสถานะการปรับใช้
explanation: |
  Bitcoin Core ปฏิบัติตามไทม์ไลน์การเปิดเผยข้อมูลตามการปรับใช้แทนที่จะเป็นช่วงเวลาที่กำหนดไว้ล่วงหน้า เกณฑ์ 80% ช่วยให้มั่นใจได้ว่าส่วนใหญ่ของเครือข่ายได้รับการป้องกันก่อนที่ผู้โจมตีจะสามารถเรียนรู้เกี่ยวกับช่องโหว่จากการเปิดเผยต่อสาธารณะ วิธีการนี้ให้ความสำคัญกับความปลอดภัยของเครือข่ายมากกว่ากำหนดเวลาที่ไม่แน่นอน เนื่องจากการเปิดเผยข้อมูลก่อนเวลาอันควรอาจทำให้ 20% ของโหนดที่เหลือเสี่ยงต่อการถูกโจมตีโดยตรง ตัวเลือกอื่น ๆ แสดงถึงแนวทางปฏิบัติทั่วไปในความปลอดภัยของซอฟต์แวร์แบบดั้งเดิม แต่ไม่ได้คำนึงถึงลักษณะการกระจายอำนาจของ Bitcoin ที่ผู้ใช้ต้องอัปเกรดโหนดของตนโดยสมัครใจ
reviewed: false
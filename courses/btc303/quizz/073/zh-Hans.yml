question: 根据 Bitcoin Core 负责任的披露实践，在部署漏洞修复程序后，何时应公开披露漏洞细节？
answer: 超过 80% 的 Bitcoin 节点部署了修复程序后
wrong_answers:
  - 补丁发布后立即使用，以防止错误的安全假设
  - 在所有主要的替代币都收到通知并更新了其实施方案之后
  - 在 90 天标准禁运期之后，无论部署状况如何
explanation: |
  Bitcoin Core 遵循基于部署的披露时间表，而不是固定的时间段。80% 的阈值可确保在攻击者从公开披露中了解到漏洞之前，绝大多数网络得到保护。这种方法优先考虑的是网络安全，而不是任意的时间期限，因为过早披露可能会使剩余的 20% 节点受到有针对性的攻击。其他方案代表了传统软件安全的常见做法，但没有考虑到 Bitcoin 的去中心化特性，即用户必须自愿升级其节点。
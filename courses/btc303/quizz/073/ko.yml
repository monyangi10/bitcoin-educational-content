question: Bitcoin Core의 책임 있는 공개 관행에 따르면 취약점 세부 정보는 수정 사항이 배포된 후 언제 공개되어야 하나요?
answer: Bitcoin 노드의 80% 이상이 수정 사항을 배포한 후
wrong_answers:
  - 잘못된 보안 가정을 방지하기 위해 패치가 릴리스된 직후에 다음을 수행합니다
  - 모든 주요 알트코인이 알림을 받고 구현을 업데이트한 후
  - 배포 상태와 관계없이 90일간의 표준 금지 기간이 지난 후
explanation: |
  Bitcoin Core는 고정된 기간이 아닌 배포 기반 공개 타임라인을 따릅니다. 80% 임계값은 공격자가 취약점이 공개되기 전에 네트워크의 대다수를 보호할 수 있도록 합니다. 이 접근 방식은 조기 공개로 인해 나머지 20%의 노드가 표적 공격에 노출될 수 있으므로 임의의 타임라인보다 네트워크 보안을 우선시합니다. 다른 옵션은 기존 소프트웨어 보안의 일반적인 관행을 나타내지만 사용자가 자발적으로 노드를 업그레이드해야 하는 Bitcoin의 탈중앙화 특성을 고려하지 않습니다.
reviewed: false

question: Dushingiye ku migenzo ya Bitcoin Core yo gutangaza amakuru mu buryo bubereye, ni ryari amakuru yerekeye ubugoyagoye akwiye gutangazwa ku mugaragaro inyuma y’aho hashizweho igisubizo?
answer: Inyuma y’aho ibice birenga 80% vy’ibice vya Bitcoin bishizeho ivyo gukosora
wrong_answers:
  - Ubwo nyene inyuma y'aho igipande kisohokeye kugira ngo ntihagire ivyiyumviro vy'ibinyoma vyerekeye umutekano .
  - Inyuma y'aho ama altcoins akomeye yose amenyeshejwe kandi akavugurura ingene ashirwa mu ngiro .
  - Inyuma y'igihe c'iminsi 90 c'uburenganzira ataco bimaze
explanation: |
  Bitcoin Core ikurikira igihe co gutangaza amakuru gishingiye ku gushirwaho aho gukurikira igihe gitegekanijwe. Ico kigereranyo c’ibice 80 kw’ijana gituma igice kinini c’urubuga kirindwa imbere y’uko abatera bamenya ivyerekeye ubugoyagoye buva ku gutangaza abantu bose. Ubu buryo bushira imbere umutekano w’urubuga ku bihe bitari vyo, kuko gutangaza imbere y’igihe bishobora gutuma 20% vy’ibihimba bisigaye bishikirwa n’ibitero vy’intumbero. Ibindi bihitamwo bigereranya ibikorwa bisanzwe mu mutekano wa porogarama za kera ariko ntibifata ingingo ku kamere ka Bitcoin ko kwegereza abantu aho abakoresha bategerezwa guhindura ku bushake amanode yabo.

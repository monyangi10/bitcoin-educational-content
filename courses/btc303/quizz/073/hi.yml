question: Bitcoin कोर की जिम्मेदार प्रकटीकरण प्रथाओं के अनुसार, किसी सुधार को लागू करने के बाद भेद्यता विवरण को सार्वजनिक रूप से कब प्रकट किया जाना चाहिए?
answer: 80% से अधिक Bitcoin नोड्स द्वारा सुधारों को लागू करने के बाद
wrong_answers:
  - गलत सुरक्षा धारणाओं को रोकने के लिए पैच जारी होने के तुरंत बाद
  - सभी प्रमुख altcoins को सूचित कर दिया गया है और उनके कार्यान्वयन को अद्यतन कर दिया गया है
  - तैनाती की स्थिति की परवाह किए बिना मानक 90-दिवसीय प्रतिबंध अवधि के बाद
explanation: |
  Bitcoin कोर किसी निश्चित समयावधि के बजाय परिनियोजन-आधारित प्रकटीकरण समय-सीमा का पालन करता है। 80% सीमा यह सुनिश्चित करती है कि हमलावरों को सार्वजनिक प्रकटीकरण से भेद्यता के बारे में पता चलने से पहले ही नेटवर्क का अधिकांश भाग सुरक्षित हो जाए। यह दृष्टिकोण मनमाने समय-सीमाओं की तुलना में नेटवर्क सुरक्षा को प्राथमिकता देता है, क्योंकि समय से पहले प्रकटीकरण शेष 20% नोड्स को लक्षित हमलों के लिए उजागर कर सकता है। अन्य विकल्प पारंपरिक सॉफ़्टवेयर सुरक्षा में सामान्य प्रथाओं का प्रतिनिधित्व करते हैं, लेकिन Bitcoin की विकेंद्रीकृत प्रकृति को ध्यान में नहीं रखते हैं जहाँ उपयोगकर्ताओं को स्वेच्छा से अपने नोड्स को अपग्रेड करना होता है।

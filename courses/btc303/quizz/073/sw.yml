question: Kulingana na desturi za kuwajibika za ufichuzi za Bitcoin Core, ni lini maelezo ya kuathiriwa yanapaswa kufichuliwa hadharani baada ya kurekebisha kutumwa?
answer: Baada ya zaidi ya 80% ya nodi za Bitcoin kupeleka marekebisho
wrong_answers:
  - Mara tu baada ya kiraka kutolewa ili kuzuia mawazo ya uwongo ya usalama
  - Baada ya altcoins zote kuu zimearifiwa na kusasisha utekelezaji wao
  - Baada ya muda wa kawaida wa vikwazo vya siku 90 bila kujali hali ya kupelekwa
explanation: |
  Bitcoin Core inafuata rekodi ya matukio ya ufumbuzi kulingana na matumizi badala ya muda maalum. Kiwango cha juu cha 80% huhakikisha kwamba sehemu kubwa ya mtandao inalindwa kabla ya wavamizi kujifunza kuhusu uwezekano wa kuathiriwa kutokana na ufichuzi wa umma. Mbinu hii hutanguliza usalama wa mtandao dhidi ya kalenda za matukio kiholela, kwani ufichuzi wa mapema unaweza kufichua asilimia 20 iliyobaki ya nodi kwa mashambulizi yanayolengwa. Chaguo zingine zinawakilisha mazoea ya kawaida katika usalama wa programu za kitamaduni lakini hazizingatii asili ya ugatuzi ya Bitcoin ambapo watumiaji lazima wasasishe nodi zao kwa hiari.
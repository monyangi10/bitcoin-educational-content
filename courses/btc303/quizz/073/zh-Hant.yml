question: 根據 Bitcoin Core 負責任的揭露實務，在部署修補程式後，何時應該公開揭露弱點的詳細資訊？
answer: 超過 80% 的 Bitcoin 節點部署修復程式後
wrong_answers:
  - 在修補程式發佈後，立即防止錯誤的安全假設
  - 在所有主要的替代幣都收到通知並更新其實作之後
  - 在標準的 90 天禁運期之後，無論部署狀態如何
explanation: |
  Bitcoin Core 遵循基於部署的公開時間線，而非固定的時間段。80% 的臨界值可確保絕大多數的網路在攻擊者從公開揭露中得知漏洞之前就受到保護。此方法將網路安全性放在優先順序，而非任意的時間線，因為過早公開可能會讓其餘 20% 的節點暴露於有針對性的攻擊。其他選項代表傳統軟體安全的常見做法，但沒有考慮到 Bitcoin 的分散性質，使用者必須自願升級節點。
reviewed: false

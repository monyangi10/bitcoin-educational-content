question: Bitcoin Coren vastuullisten julkistamiskäytäntöjen mukaan, milloin haavoittuvuuden yksityiskohdat pitäisi julkistaa korjauksen käyttöönoton jälkeen?
answer: Kun yli 80 prosenttia Bitcoin-solmuista on ottanut korjaukset käyttöön, on
wrong_answers:
  - Heti korjauksen julkaisun jälkeen, jotta vältytään vääriltä turvallisuusoletuksilta
  - Kun kaikki tärkeimmät altcoinit ovat saaneet ilmoituksen ja päivittäneet toteutuksensa
  - Normaalin 90 päivän embargojakson jälkeen, riippumatta siitä, missä asemassa hän on
explanation: |
  Bitcoin Core noudattaa pikemminkin käyttöönottoon perustuvaa julkistamisaikataulua kuin kiinteää ajanjaksoa. 80 prosentin kynnysarvo varmistaa, että suurin osa verkosta on suojattu ennen kuin hyökkääjät saavat tietää haavoittuvuudesta julkisesta paljastuksesta. Tämä lähestymistapa asettaa verkkoturvallisuuden mielivaltaisia aikarajoja tärkeämmäksi, sillä ennenaikainen paljastaminen voisi altistaa loput 20 prosenttia solmuista kohdennetuille hyökkäyksille. Muut vaihtoehdot edustavat perinteisen ohjelmistoturvallisuuden yleisiä käytäntöjä, mutta niissä ei oteta huomioon Bitcoin:n hajautettua luonnetta, jossa käyttäjien on päivitettävä solmujaan vapaaehtoisesti.

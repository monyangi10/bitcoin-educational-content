question: طبق رویه‌های افشای مسئولانه Bitcoin Core، جزئیات آسیب‌پذیری‌ها چه زمانی باید پس از اعمال یک اصلاحیه به‌صورت عمومی افشا شوند؟
answer: پس از اینکه بیش از 80٪ از نودهای Bitcoin اصلاحات را پیاده‌سازی کرده‌اند
wrong_answers:
  - بلافاصله پس از انتشار وصله برای جلوگیری از فرضیات نادرست امنیتی
  - پس از اینکه تمام آلت‌کوین‌های اصلی مطلع شده و پیاده‌سازی‌های خود را به‌روزرسانی کردند
  - پس از یک دوره تحریم استاندارد ۹۰ روزه بدون توجه به وضعیت استقرار
explanation: |
  هسته Bitcoin از یک جدول زمانی افشاگری مبتنی بر استقرار پیروی می‌کند نه یک دوره زمانی ثابت. آستانه 80% اطمینان می‌دهد که بخش عمده‌ای از شبکه محافظت می‌شود قبل از اینکه مهاجمان بتوانند از افشای عمومی درباره آسیب‌پذیری مطلع شوند. این رویکرد امنیت شبکه را بر جدول‌های زمانی دلخواه اولویت می‌دهد، زیرا افشای زودهنگام می‌تواند 20% باقی‌مانده از نودها را در معرض حملات هدفمند قرار دهد. گزینه‌های دیگر نمایانگر روش‌های معمول در امنیت نرم‌افزار سنتی هستند اما به ماهیت غیرمتمرکز Bitcoin که در آن کاربران باید به‌طور داوطلبانه نودهای خود را ارتقا دهند، توجه نمی‌کنند.
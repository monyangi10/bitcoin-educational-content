question: Bitcoin Coreの責任ある情報公開のプラクティスによると、脆弱性の詳細は、修正プログラムが配布された後、いつ公開されるべきでしょうか？
answer: Bitcoinノードの80%以上が修正プログラムを導入した後
wrong_answers:
  - パッチがリリースされた直後は、誤ったセキュリティの思い込みを防ぐため
  - すべての主要アルトコインに通知され、実装が更新された後
  - 派遣状況にかかわらず、標準的な90日間の禁輸期間後
explanation: |
  Bitcoin Coreは、固定された期間ではなく、デプロイメントに基づいた公開スケジュールに従っている。80%の閾値は、攻撃者が公開から脆弱性を知る前に、ネットワークの大部分が保護されることを保証する。このアプローチは、任意のスケジュールよりもネットワークのセキュリティを優先する。早すぎる公開は、残りの20％のノードを標的型攻撃にさらす可能性があるからだ。他の選択肢は、伝統的なソフトウェア・セキュリティにおける一般的な慣行を表しているが、ユーザーが自発的にノードをアップグレードしなければならないBitcoinの分散型性質を考慮していない。
reviewed: false

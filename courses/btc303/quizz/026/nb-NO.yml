question: Hva refererer personvern i blokkjeder spesifikt til i forbindelse med Bitcoin?
answer: Informasjonen du oppgir ved å handle på blokkjeden
wrong_answers:
  - Kryptering av private nøkler som er lagret i wallet
  - Beskyttelse av internettforbindelsen din mens du bruker Bitcoin
  - Anonymiteten som oppnås ved å bruke flere wallet-adresser
explanation: |
  Blockchain-personvern refererer spesifikt til informasjonen du avslører ved å handle på blokkjeden, som gjelder for alle transaksjoner du sender og mottar. Dette er noe annet enn wallet-kryptering (som beskytter lagrede nøkler), internettforbindelsessikkerhet (som er off-chain-personvern) eller misoppfatningen om at flere adresser gir anonymitet. Personvernslekkasjer i kjeden oppstår gjennom gjenbruk av adresser og klyngedannelse, der transaksjoner kan kobles sammen for å avsløre mønstre om brukernes økonomiske aktiviteter.
reviewed: false

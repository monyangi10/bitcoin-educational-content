question: Je, faragha ya blockchain inarejelea nini hasa katika muktadha wa Bitcoin?
answer: Habari unayofichua kwa kufanya miamala kwenye blockchain
wrong_answers:
  - Usimbaji fiche wa vitufe vya faragha vilivyohifadhiwa kwenye wallet yako
  - Ulinzi wa muunganisho wako wa intaneti unapotumia Bitcoin
  - Kutokujulikana kunatolewa kwa kutumia anwani nyingi za wallet
explanation: |
  Faragha ya Blockchain inarejelea mahususi taarifa unayofichua kwa kufanya miamala kwenye blockchain, ambayo inatumika kwa miamala yote unayotuma na kupokea. Hii ni tofauti na usimbaji fiche wa wallet (ambayo hulinda funguo zilizohifadhiwa), usalama wa muunganisho wa intaneti (ambayo ni faragha ya off-chain), au dhana potofu kwamba anwani nyingi hutoa kutokujulikana. Uvujaji wa faragha kwenye mtandao hutokea kwa kutumia tena anwani na kuunganisha, ambapo miamala inaweza kuunganishwa ili kufichua mifumo kuhusu shughuli za kifedha za watumiaji.

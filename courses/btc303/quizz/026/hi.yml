question: Bitcoin के संदर्भ में ब्लॉकचेन गोपनीयता विशेष रूप से क्या संदर्भित करती है?
answer: ब्लॉकचेन पर लेनदेन करके आप जो जानकारी प्रकट करते हैं
wrong_answers:
  - आपके wallet में संग्रहीत निजी कुंजियों का एन्क्रिप्शन
  - Bitcoin का उपयोग करते समय आपके इंटरनेट कनेक्शन की सुरक्षा
  - एकाधिक wallet पतों का उपयोग करके प्रदान की गई गुमनामी
explanation: |
  Blockchain गोपनीयता विशेष रूप से ब्लॉकचेन पर लेनदेन के दौरान आपके द्वारा प्रकट की गई जानकारी को संदर्भित करती है, जो आपके द्वारा भेजे और प्राप्त किए गए सभी लेनदेन पर लागू होती है। यह wallet एन्क्रिप्शन (जो संग्रहीत कुंजियों की सुरक्षा करता है), इंटरनेट कनेक्शन सुरक्षा (जो off-chain गोपनीयता है), या इस गलत धारणा से अलग है कि कई पते गुमनामी प्रदान करते हैं। ऑन-चेन गोपनीयता लीक पते के पुन: उपयोग और क्लस्टरिंग के माध्यम से होती है, जहाँ लेनदेन को एक साथ जोड़कर उपयोगकर्ताओं की वित्तीय गतिविधियों के पैटर्न का पता लगाया जा सकता है।

question: حریم خصوصی بلاکچین به طور خاص در زمینه Bitcoin به چه معناست؟
answer: اطلاعاتی که با انجام تراکنش در بلاک‌چین افشا می‌کنید
wrong_answers:
  - رمزگذاری کلیدهای خصوصی ذخیره‌شده در wallet شما
  - محافظت از اتصال اینترنت شما هنگام استفاده از Bitcoin
  - ناشناس بودن ارائه شده با استفاده از چندین آدرس wallet
explanation: |
  حریم خصوصی Blockchain به طور خاص به اطلاعاتی اشاره دارد که شما با انجام تراکنش در بلاکچین افشا می‌کنید، که این امر برای تمام تراکنش‌هایی که ارسال و دریافت می‌کنید صدق می‌کند. این با رمزنگاری wallet (که از کلیدهای ذخیره شده محافظت می‌کند)، امنیت اتصال اینترنت (که حریم خصوصی off-chain است)، یا این تصور غلط که آدرس‌های متعدد ناشناس بودن را فراهم می‌کنند، متفاوت است. نشت‌های حریم خصوصی در زنجیره از طریق استفاده مجدد از آدرس و خوشه‌بندی رخ می‌دهد، جایی که تراکنش‌ها می‌توانند به هم مرتبط شوند تا الگوهایی درباره فعالیت‌های مالی کاربران را فاش کنند.
reviewed: false

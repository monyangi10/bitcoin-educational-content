question: 在 Bitcoin 的背景下，區塊鏈隱私權具體指的是什麼？
answer: 您在區塊鏈上進行交易時披露的資訊
wrong_answers:
  - 儲存於您 wallet 中的私人密碼匙加密
  - 使用 Bitcoin 時保護您的網際網路連線
  - 使用多個 wallet 位址所提供的匿名性
explanation: |
  Blockchain 隱私權特指您在區塊鏈上進行交易時披露的資訊，適用於您發送和接收的所有交易。這與 wallet 加密（保護儲存的金鑰）、網際網路連線安全（屬於 off-chain 隱私權），或誤以為多重位址可提供匿名性不同。鏈上隱私洩漏是透過位址重複使用和聚類發生的，交易可以連結在一起，揭露使用者財務活動的模式。
reviewed: false

question: Na šta se konkretno odnosi privatnost blockchaina u kontekstu Bitcoin?
answer: Informacije koje otkrivate transakcijama na blockchainu
wrong_answers:
  - Šifrovanje privatnih ključeva sačuvanih u vašem wallet
  - Zaštita vaše internet konekcije prilikom korišćenja Bitcoin
  - Anonimnost koju pruža korišćenje više wallet adresa
explanation: |
  Blockchain privatnost se odnosi specifično na informacije koje otkrivate transakcijama na blockchain-u, što se primenjuje na sve transakcije koje šaljete i primate. Ovo je različito od wallet enkripcije (koja štiti sačuvane ključeve), sigurnosti internet konekcije (što je off-chain privatnost), ili pogrešnog shvatanja da više adresa pruža anonimnost. Curenje privatnosti na lancu dešava se kroz ponovnu upotrebu adresa i klasterizaciju, gde transakcije mogu biti povezane kako bi se otkrili obrasci o finansijskim aktivnostima korisnika.
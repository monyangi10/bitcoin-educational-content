question: Bitcoinの文脈でブロックチェーンのプライバシーとは具体的に何を指すのか？
answer: ブロックチェーン上での取引によって開示される情報
wrong_answers:
  - walletに保存された秘密鍵の暗号化
  - Bitcoin使用中のインターネット接続の保護
  - 複数のwalletアドレスを使用することで提供される匿名性
explanation: |
  Blockchainプライバシーとは、特にブロックチェーン上で取引を行うことで開示される情報のことで、送受信するすべての取引に適用される。これはwalletの暗号化（保存された鍵を保護する）やインターネット接続のセキュリティ（これはoff-chainのプライバシーである）、あるいは複数のアドレスが匿名性を提供するという誤解とは異なる。オンチェーンでのプライバシーの漏えいは、アドレスの再利用やクラスタリングによって起こる。
question: ビットコインの文脈でブロックチェーンのプライバシーとは具体的に何を指すのか？
answer: ブロックチェーン上でのトランザクションによって開示される情報
wrong_answers:
  - ウォレットに保存された秘密鍵の暗号化
  - ビットコイン使用中のインターネット接続の保護
  - 複数のウォレットアドレスを使用することで提供される匿名性
explanation: |
  ブロックチェーンのプライバシーとは、特にブロックチェーン上でトランザクションを行うことで開示される情報のことで、送受信するすべてのトランザクションに適用される。これはウォレットの暗号化（保存された鍵を保護する）やインターネット接続のセキュリティ（これはオフチェーンのプライバシーである）、あるいは複数のアドレスが匿名性を提供するという誤解とは異なる。オンチェーンでのプライバシーの漏えいは、アドレスの再利用やクラスタリングによって起こる。
reviewed: false

question: บล็อกเชนความเป็นส่วนตัวหมายถึงอะไรในบริบทของ Bitcoin?
answer: ข้อมูลที่คุณเปิดเผยโดยการทำธุรกรรมบนบล็อกเชน
wrong_answers:
  - การเข้ารหัสคีย์ส่วนตัวที่เก็บไว้ใน wallet ของคุณ
  - การป้องกันการเชื่อมต่ออินเทอร์เน็ตของคุณขณะใช้ Bitcoin
  - การไม่เปิดเผยตัวตนที่ได้รับจากการใช้ที่อยู่ wallet หลายรายการ
explanation: |
  Blockchain privacy หมายถึงข้อมูลที่คุณเปิดเผยโดยการทำธุรกรรมบนบล็อกเชน ซึ่งใช้กับธุรกรรมทั้งหมดที่คุณส่งและรับ สิ่งนี้แตกต่างจากการเข้ารหัส wallet (ซึ่งปกป้องคีย์ที่เก็บไว้), ความปลอดภัยของการเชื่อมต่ออินเทอร์เน็ต (ซึ่งเป็นความเป็นส่วนตัวของ off-chain), หรือความเข้าใจผิดที่ว่าการมีหลายที่อยู่จะให้ความเป็นนิรนาม การรั่วไหลของความเป็นส่วนตัวบนเชนเกิดขึ้นผ่านการใช้ที่อยู่ซ้ำและการจัดกลุ่ม ซึ่งธุรกรรมสามารถเชื่อมโยงกันเพื่อเปิดเผยรูปแบบเกี่ยวกับกิจกรรมทางการเงินของผู้ใช้
reviewed: false
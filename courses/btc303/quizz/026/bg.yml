question: Какво конкретно се отнася до поверителността на блокчейн в контекста на Bitcoin?
answer: Информацията, която разкривате, като извършвате транзакции в блокчейн
wrong_answers:
  - Криптиране на частните ключове, съхранявани във вашия wallet
  - Защита на вашата интернет връзка при използване на Bitcoin
  - Анонимността, осигурена чрез използване на няколко адреса wallet
explanation: |
  Защитата на личните данни в Blockchain се отнася конкретно до информацията, която разкривате, като извършвате трансакции в блокчейн, което важи за всички трансакции, които изпращате и получавате. Това е различно от криптирането wallet (което защитава съхраняваните ключове), сигурността на интернет връзката (което е поверителност off-chain) или погрешното схващане, че множеството адреси осигуряват анонимност. Изтичането на поверителност във веригата се случва чрез повторното използване на адреси и клъстерирането, при което трансакциите могат да бъдат свързани помежду си, за да се разкрият модели за финансовите дейности на потребителите.
reviewed: false

question: Bitcoin의 맥락에서 블록체인 프라이버시란 구체적으로 무엇을 의미하나요?
answer: 블록체인에서 거래하여 공개하는 정보
wrong_answers:
  - wallet에 저장된 개인 키의 암호화
  - Bitcoin 사용 중 인터넷 연결 보호
  - 여러 wallet 주소를 사용하여 익명성 제공
explanation: |
  Blockchain 개인정보 보호는 블록체인에서 거래할 때 공개하는 정보를 구체적으로 말하며, 이는 주고받는 모든 거래에 적용됩니다. 이는 저장된 키를 보호하는 wallet 암호화, 인터넷 연결 보안(off-chain 개인정보 보호)이나 여러 개의 주소가 익명성을 제공한다는 오해와는 다릅니다. 온체인 개인정보 유출은 주소 재사용과 클러스터링을 통해 발생하며, 트랜잭션이 서로 연결되어 사용자의 금융 활동 패턴이 드러날 수 있습니다.

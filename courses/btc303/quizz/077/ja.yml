question: Bitcoinのセキュリティ脆弱性対応における「開示」と「公表」の重要な違いは何ですか？
answer: 公開とは、潜在的な攻撃者に脆弱性を公に知らせることである。
wrong_answers:
  - 情報公開は重要な脆弱性を対象とし、公表は悪用されにくい非重要な脆弱性を対象とする
  - 情報公開ではBitcoinコアの開発者に通知し、情報公開ではアルトコインや他の実装チームに通知する。
  - 情報公開は即座の対応とパッチを必要とするが、公表は通常の開発フローを通じた段階的な修正を可能にする。
explanation: |
  グレゴリー・マクスウェルは、メーリングリストでの議論の中で、この重要な違いを強調している。ディスクロージャーとは、ソフトウェアのメンテナ（ベンダー）が修正に取り組めるように、脆弱性を内々に知らせる責任ある行為を指す。しかし、公開とは、脆弱性情報を一般に公開することであり、潜在的な攻撃者に悪用方法を効果的に知らせることを意味する。この区別は非常に重要である。なぜなら、情報公開はシステムの保護に役立つが、時期尚早の公開は、悪意ある行為者が適切な防御策が講じられる前に脆弱性を悪用することを可能にし、害をもたらす可能性があるからである。
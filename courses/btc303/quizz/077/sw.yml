question: Je! ni tofauti gani kuu kati ya 'kufichua' na 'uchapishaji' katika muktadha wa kushughulikia athari za usalama za Bitcoin?
answer: Ufumbuzi ni kumfahamisha mchuuzi kwa faragha, huku uchapishaji ukifanya uwezekano wa kuathirika kujulikana hadharani kwa washambuliaji watarajiwa.
wrong_answers:
  - Ufichuaji ni wa udhaifu mkubwa, ilhali uchapishaji ni wa udhaifu usio muhimu ambao ni vigumu kuutumia.
  - Ufichuzi unahusisha kuwaarifu watengenezaji wa Bitcoin Core, huku uchapishaji unahusisha kuwafahamisha altcoin na timu nyingine za utekelezaji.
  - Ufumbuzi unahitaji hatua na viraka mara moja, huku uchapishaji huruhusu marekebisho ya taratibu kupitia mtiririko wa kawaida wa usanidi
explanation: |
  Gregory Maxwell alisisitiza tofauti hii muhimu katika majadiliano ya orodha ya wanaopokea barua pepe. Ufumbuzi hurejelea kitendo cha kuwajibika cha kuwafahamisha wasimamizi wa programu kwa faragha (mchuuzi) kuhusu uwezekano wa kuathirika ili waweze kufanyia kazi kurekebisha. Uchapishaji, hata hivyo, unamaanisha kufanya taarifa ya uwezekano wa kuathiriwa ipatikane hadharani, ambayo huwafahamisha washambuliaji watarajiwa kuhusu unyonyaji. Tofauti hii ni muhimu kwa sababu ingawa ufichuzi husaidia kulinda mfumo, uchapishaji wa mapema unaweza kusababisha madhara kwa kuwawezesha watendaji hasidi kutumia athari kabla ya ulinzi wa kutosha kuwekwa.

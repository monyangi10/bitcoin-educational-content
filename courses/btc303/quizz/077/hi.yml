question: Bitcoin सुरक्षा भेद्यता प्रबंधन के संदर्भ में 'प्रकटीकरण' और 'प्रकाशन' के बीच मुख्य अंतर क्या है?
answer: प्रकटीकरण का अर्थ है विक्रेता को निजी तौर पर सूचित करना, जबकि प्रकाशन का अर्थ है संभावित हमलावरों को सार्वजनिक रूप से भेद्यता से अवगत कराना
wrong_answers:
  - प्रकटीकरण गंभीर कमजोरियों के लिए है, जबकि प्रकाशन गैर-गंभीर कमजोरियों के लिए है जिनका फायदा उठाना कठिन है
  - प्रकटीकरण में Bitcoin कोर डेवलपर्स को सूचित करना शामिल है, जबकि प्रकाशन में altcoin और अन्य कार्यान्वयन टीमों को सूचित करना शामिल है
  - प्रकटीकरण के लिए तत्काल कार्रवाई और पैच की आवश्यकता होती है, जबकि प्रकाशन के लिए सामान्य विकास प्रवाह के माध्यम से क्रमिक सुधार की अनुमति होती है
explanation: |
  ग्रेगरी मैक्सवेल ने मेलिंग सूची पर चर्चा के दौरान इस महत्वपूर्ण अंतर पर ज़ोर दिया। प्रकटीकरण, सॉफ़्टवेयर अनुरक्षकों (विक्रेता) को किसी भेद्यता के बारे में निजी तौर पर सूचित करने के ज़िम्मेदाराना कार्य को संदर्भित करता है ताकि वे उसका समाधान ढूंढ सकें। हालाँकि, प्रकाशन का अर्थ है भेद्यता की जानकारी को सार्वजनिक रूप से उपलब्ध कराना, जिससे संभावित हमलावरों को शोषण के बारे में प्रभावी रूप से जानकारी मिल जाती है। यह अंतर महत्वपूर्ण है क्योंकि प्रकटीकरण सिस्टम की सुरक्षा में मदद करता है, लेकिन समय से पहले प्रकाशन से नुकसान हो सकता है क्योंकि इससे दुर्भावनापूर्ण तत्व पर्याप्त सुरक्षा उपायों के लागू होने से पहले ही भेद्यता का फायदा उठा सकते हैं।

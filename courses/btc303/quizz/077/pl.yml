question: Jakie jest kluczowe rozróżnienie między "ujawnieniem" a "publikacją" w kontekście obsługi luk w zabezpieczeniach Bitcoin?
answer: Ujawnienie to poinformowanie dostawcy prywatnie, podczas gdy publikacja to publiczne udostępnienie luki potencjalnym atakującym
wrong_answers:
  - Ujawnienie dotyczy luk krytycznych, podczas gdy publikacja dotyczy luk niekrytycznych, które są trudniejsze do wykorzystania
  - Ujawnienie obejmuje powiadomienie deweloperów Bitcoin Core, podczas gdy publikacja obejmuje poinformowanie altcoinów i innych zespołów wdrożeniowych
  - Ujawnienie wymaga natychmiastowych działań i poprawek, podczas gdy publikacja pozwala na stopniowe wprowadzanie poprawek w normalnym toku rozwoju
explanation: |
  Gregory Maxwell podkreślił to kluczowe rozróżnienie w dyskusji na liście mailingowej. Ujawnienie odnosi się do odpowiedzialnego działania polegającego na prywatnym poinformowaniu opiekunów oprogramowania (dostawcy) o luce, aby mogli pracować nad poprawką. Publikacja oznacza natomiast upublicznienie informacji o luce, co skutecznie informuje potencjalnych atakujących o exploicie. To rozróżnienie ma kluczowe znaczenie, ponieważ podczas gdy ujawnienie pomaga chronić system, przedwczesna publikacja może wyrządzić szkody, umożliwiając złośliwym podmiotom wykorzystanie luki, zanim zostaną wdrożone odpowiednie zabezpieczenia.
question: 在处理 Bitcoin 安全漏洞时，"披露 "和 "公布 "之间的主要区别是什么？
answer: 披露是私下通知供应商，而公布是向潜在攻击者公开漏洞
wrong_answers:
  - 披露是针对关键漏洞，而公布是针对较难利用的非关键漏洞
  - 披露涉及通知 Bitcoin 核心开发人员，而公布涉及通知替代币和其他实施团队
  - 披露要求立即采取行动并打补丁，而公布则允许通过正常的开发流程逐步修复问题
explanation: |
  Gregory Maxwell 在邮件列表讨论中强调了这一关键区别。披露是指私下将漏洞信息告知软件维护者（供应商），以便他们进行修复的负责任的行为。而公布则是指公开漏洞信息，从而有效地告知潜在攻击者有关漏洞利用的信息。这一区别至关重要，因为公开有助于保护系统，而过早公布则会造成危害，使恶意行为者在适当的防御措施到位之前利用漏洞。
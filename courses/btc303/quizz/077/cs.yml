question: Jaký je klíčový rozdíl mezi "zveřejněním" a "zveřejněním" v kontextu řešení bezpečnostních zranitelností Bitcoin?
answer: Odhalení je soukromé informování dodavatele, zatímco zveřejnění je veřejné zpřístupnění zranitelnosti potenciálním útočníkům
wrong_answers:
  - Zveřejnění se týká kritických zranitelností, zatímco zveřejnění nekritických zranitelností, které je obtížnější zneužít
  - Zveřejnění zahrnuje informování vývojářů Bitcoin Core, zatímco zveřejnění zahrnuje informování altcoinových a dalších implementačních týmů
  - Zveřejnění vyžaduje okamžitou akci a opravy, zatímco zveřejnění umožňuje postupné opravy v rámci běžného vývoje
explanation: |
  Gregory Maxwell zdůraznil tento zásadní rozdíl v diskusi v mailing listu. Odhalení se týká zodpovědného činu, kterým je soukromé informování správců softwaru (dodavatele) o zranitelnosti, aby mohli pracovat na její opravě. Zveřejnění však znamená, že informace o zranitelnosti jsou veřejně dostupné, což potenciální útočníky účinně informuje o možnosti zneužití. Toto rozlišení je zásadní, protože zatímco zveřejnění pomáhá chránit systém, předčasné zveřejnění může způsobit škodu tím, že umožní záškodníkům zneužít zranitelnost dříve, než bude zavedena odpovídající obrana.

question: Bitcoin 보안 취약점 처리의 맥락에서 '공개'와 '공개'의 주요 차이점은 무엇인가요?
answer: 공개는 공급업체에 비공개로 알리는 것이고, 공개는 잠재적 공격자에게 공개적으로 취약점을 알리는 것입니다
wrong_answers:
  - 공개는 중요한 취약점에 대한 것이고, 공개는 악용하기 어려운 중요하지 않은 취약점에 대한 것입니다
  - 공개에는 Bitcoin 코어 개발자에게 알리는 것이 포함되며, 게시에는 알트코인 및 기타 구현 팀에게 알리는 것이 포함됩니다
  - 공개는 즉각적인 조치와 패치가 필요하지만, 비공개는 정상적인 개발 흐름을 통해 점진적으로 수정할 수 있습니다
explanation: |
  그레고리 맥스웰은 메일링 리스트 토론에서 이 중요한 차이점을 강조했습니다. 공개는 소프트웨어 유지 관리자(공급업체)가 취약점을 수정할 수 있도록 비공개적으로 취약점에 대해 알리는 책임 있는 행위를 말합니다. 그러나 공개는 취약점 정보를 공개적으로 제공하는 것을 의미하며, 이를 통해 잠재적 공격자에게 익스플로잇에 대한 정보를 효과적으로 알릴 수 있습니다. 공개는 시스템을 보호하는 데 도움이 되지만, 너무 일찍 공개하면 악의적인 공격자가 적절한 방어 수단이 마련되기 전에 취약점을 악용할 수 있게 되어 피해가 발생할 수 있으므로 이 구분은 매우 중요합니다.
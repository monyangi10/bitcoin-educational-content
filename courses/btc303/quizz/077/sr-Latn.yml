question: Koja je ključna razlika između 'otkrivanja' i 'objavljivanja' u kontekstu rukovanja sigurnosnim ranjivostima Bitcoin?
answer: Otkrivanje je informisanje prodavca privatno, dok je objavljivanje činjenje ranjivosti poznatom potencijalnim napadačima javno.
wrong_answers:
  - Otkrivanje je za kritične ranjivosti, dok je objavljivanje za nekritične ranjivosti koje je teže iskoristiti.
  - Otkrivanje uključuje obaveštavanje Bitcoin Core programera, dok objavljivanje podrazumeva informisanje altcoin timova i timova za druge implementacije.
  - Otkrivanje zahteva hitnu akciju i zakrpe, dok objavljivanje omogućava postepene popravke kroz normalan tok razvoja.
explanation: |
  Gregory Maxwell je naglasio ovu ključnu razliku u diskusiji na mailing listi. Otkrivanje se odnosi na odgovoran čin privatnog informisanja održavaoca softvera 
  (prodavca) o ranjivosti kako bi mogli raditi na popravci. Objavljivanje, međutim, znači javno dostupno objavljivanje informacija o ranjivosti, što efektivno 
  informiše potencijalne napadače o iskorišćavanju ranjivosti. Ova razlika je kritična jer dok otkrivanje pomaže u zaštiti sistema, preuranjeno objavljivanje 
  može prouzrokovati štetu omogućavajući zlonamernim akterima da iskoriste ranjivost pre nego što se postave adekvatne odbrane.
reviewed: true

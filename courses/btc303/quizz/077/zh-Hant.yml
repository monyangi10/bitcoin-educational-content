question: 在處理 Bitcoin 安全漏洞的情況下，「揭露」與「公佈」之間的主要區別是什麼？
answer: 揭露是私下通知廠商，而公佈是公開讓潛在攻擊者知道此漏洞
wrong_answers:
  - 揭露是針對重要的弱點，而公佈是針對較難被利用的非重要弱點
  - 披露涉及通知 Bitcoin Core 開發人員，而公佈則涉及通知替代幣和其他實作團隊。
  - 揭露需要立即採取行動和修補程式，而公開則允許透過正常的開發流程逐步修補。
explanation: |
  Gregory Maxwell 在郵寄清單討論中強調這個關鍵的區別。揭露是指負責任地私下告知軟體維護者 (廠商) 有關漏洞的資訊，讓他們可以進行修補。而公開則是指將漏洞資訊公開，讓潛在的攻擊者知道漏洞的利用方法。這個區別是很重要的，因為公開有助於保護系統，但過早公開可能會造成傷害，讓惡意的行為者在適當的防禦措施到位之前就能利用漏洞。
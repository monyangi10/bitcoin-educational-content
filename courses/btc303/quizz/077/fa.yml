question: تفاوت کلیدی بین 'افشا' و 'انتشار' در زمینه مدیریت آسیب‌پذیری امنیتی Bitcoin چیست؟
answer: افشاگری به معنای اطلاع‌رسانی به فروشنده به صورت خصوصی است، در حالی که انتشار به معنای عمومی کردن آسیب‌پذیری برای مهاجمان احتمالی است.
wrong_answers:
  - افشا برای آسیب‌پذیری‌های بحرانی است، در حالی که انتشار برای آسیب‌پذیری‌های غیر بحرانی است که بهره‌برداری از آن‌ها دشوارتر است.
  - افشا شامل اطلاع‌رسانی به توسعه‌دهندگان اصلی Bitcoin است، در حالی که انتشار شامل اطلاع‌رسانی به تیم‌های آلت‌کوین و سایر پیاده‌سازی‌ها می‌شود.
  - افشاگری نیاز به اقدام فوری و وصله‌ها دارد، در حالی که انتشار اجازه می‌دهد تا از طریق جریان عادی توسعه به تدریج اصلاحات انجام شود.
explanation: |
  گرگوری ماکسول این تمایز حیاتی را در بحث لیست پستی برجسته کرد. افشا به عمل مسئولانه اطلاع‌رسانی خصوصی به نگهدارندگان نرم‌افزار (فروشنده) درباره یک آسیب‌پذیری اشاره دارد تا آنها بتوانند روی یک راه‌حل کار کنند. اما انتشار به معنای در دسترس قرار دادن عمومی اطلاعات آسیب‌پذیری است که به طور مؤثر مهاجمان بالقوه را درباره بهره‌برداری مطلع می‌کند. این تمایز بسیار مهم است زیرا در حالی که افشا به حفاظت از سیستم کمک می‌کند، انتشار زودهنگام می‌تواند با فراهم کردن امکان سوءاستفاده برای بازیگران مخرب، قبل از اینکه دفاع‌های کافی در محل قرار گیرد، آسیب برساند.
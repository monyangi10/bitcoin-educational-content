question: Что означает децентрализация full node в Bitcoin?
answer: Проверка блоков осуществляется на границе сети пользователями, а не доверенными лицами
wrong_answers:
  - Обработка транзакций распределяется между несколькими пулами mining, а не одной организацией
  - Правила протокола Bitcoin определяются распределенной группой разработчиков ядра
  - Закрытые ключи хранятся на нескольких устройствах, а не на одном wallet
explanation: |
  Децентрализация Full node означает, что проверка блоков (данных, которые добывают майнеры) происходит на границе сети отдельными пользователями, управляющими своими собственными узлами, а не полагающимися на несколько доверенных органов для проверки транзакций. Это отличается от децентрализации майнеров, которая занимается упорядочиванием и обработкой транзакций. Другие варианты путают децентрализацию full node с распределением mining, структурами управления или практиками безопасности, но ни один из них не отражает основную концепцию распределенной проверки блоков участниками сети.
reviewed: false

question: การกระจายอำนาจ full node ใน Bitcoin หมายถึงอะไร?
answer: การตรวจสอบความถูกต้องของบล็อกจะดำเนินการที่ขอบของเครือข่ายโดยผู้ใช้ ไม่ใช่โดยหน่วยงานที่เชื่อถือได้
wrong_answers:
  - การประมวลผลธุรกรรมถูกกระจายไปในหลายกลุ่ม mining แทนที่จะเป็นหน่วยงานเดียว
  - กฎระเบียบของโปรโตคอล Bitcoin ถูกตัดสินโดยกลุ่มนักพัฒนาหลักที่กระจายตัว
  - คีย์ส่วนตัวถูกเก็บไว้ในอุปกรณ์หลายเครื่องแทนที่จะเป็น wallet เดียว
explanation: |
  การกระจายอำนาจของ Full node หมายถึงการที่การตรวจสอบบล็อก (ข้อมูลที่นักขุดสร้างขึ้น) เกิดขึ้นที่ขอบของเครือข่ายโดยผู้ใช้แต่ละคนที่รันโหนดของตนเอง แทนที่จะพึ่งพาหน่วยงานที่เชื่อถือได้เพียงไม่กี่แห่งในการตรวจสอบธุรกรรม นี่แตกต่างจากการกระจายอำนาจของนักขุด ซึ่งเกี่ยวข้องกับการจัดลำดับและประมวลผลธุรกรรม ตัวเลือกอื่น ๆ สับสนระหว่างการกระจายอำนาจของ full node กับการกระจาย mining โครงสร้างการกำกับดูแล หรือแนวทางปฏิบัติด้านความปลอดภัย แต่ไม่มีตัวเลือกใดที่จับแนวคิดหลักของการตรวจสอบบล็อกแบบกระจายโดยผู้เข้าร่วมเครือข่ายได้
reviewed: false
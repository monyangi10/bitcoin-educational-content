question: full nodeの地方分権とは、Bitcoinでは何を指すのか？
answer: ブロックの検証は、信頼された当局ではなく、ユーザーによってネットワークのエッジで実行される。
wrong_answers:
  - トランザクション処理は単一のエンティティではなく、複数のminingプールに分散される。
  - Bitcoinプロトコルのルールは、コア開発者の分散グループによって決定される
  - 秘密鍵は、単一のwalletではなく、複数のデバイスにまたがって保存される。
explanation: |
  Full nodeの非中央集権化とは、ブロック（マイナーによって生成されるデータ）の検証が、トランザクションの検証を少数の信頼できる当局に依存するのではなく、各自のノードを運営する個々のユーザーによってネットワークのエッジで行われることを意味する。これは、トランザクションの順序付けと処理を扱うマイナー分散化とは異なる。他の選択肢はfull node分散化をmining分散化、ガバナンス構造、セキュリティ慣行と混同しているが、いずれもネットワーク参加者による分散ブロック検証という中核概念を捉えていない。
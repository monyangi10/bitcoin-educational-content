question: フルノードの分散化とは、ビットコインでは何を指すのか？
answer: ブロックの検証は、信頼された当局ではなく、ユーザーによってネットワークのエッジで実行されること
wrong_answers:
  - トランザクション処理は単一の主体ではなく、複数のマイニングプールに分散されること
  - ビットコインのプロトコルルールは、コア開発者の分散化グループによって決定されること
  - 秘密鍵は、単一のウォレットではなく、複数のデバイスにまたがって保存されること
explanation: |
  フルノードの分散化とは、ブロック（マイナーによって生成されるデータ）の検証が、トランザクションの検証を少数の信頼できる当局に依存するのではなく、各自のノードを運営する個々のユーザーによってネットワークのエッジで行われることを意味する。これは、トランザクションの順序付けと処理を扱うマイナーの分散化とは異なる。他の選択肢はフルノードの分散化をマイニングの分散化、ガバナンス構造、セキュリティ慣行と混同しているが、いずれもネットワーク参加者による分散的なブロック検証という中核概念を捉えていない。

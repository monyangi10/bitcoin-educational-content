question: Hva refererer full node-desentralisering til i Bitcoin?
answer: Validering av blokker utføres i utkanten av nettverket av brukerne, ikke av betrodde myndigheter
wrong_answers:
  - Transaksjonsbehandlingen er fordelt på flere mining-pooler i stedet for én enkelt enhet
  - Bitcoin-protokollreglene bestemmes av en distribuert gruppe av kjerneutviklere
  - Private nøkler lagres på flere enheter i stedet for på én enkelt wallet
explanation: |
  Full node-desentralisering betyr at valideringen av blokker (dataene som utvinnerne produserer) skjer i utkanten av nettverket av individuelle brukere som driver sine egne noder, i stedet for å stole på at noen få betrodde autoriteter verifiserer transaksjoner. Dette skiller seg fra desentralisering av utvinnere, som omhandler bestilling og behandling av transaksjoner. De andre alternativene forveksler full node-desentralisering med mining-distribusjon, styringsstrukturer eller sikkerhetspraksis, men ingen av dem fanger opp kjernekonseptet med distribuert blokkvalidering utført av nettverksdeltakere.
reviewed: false

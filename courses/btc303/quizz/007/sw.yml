question: Je, ugatuzi wa full node unarejelea nini katika Bitcoin?
answer: Uthibitishaji wa vitalu unafanywa kando ya mtandao na watumiaji, sio na mamlaka zinazoaminika
wrong_answers:
  - Uchakataji wa muamala unasambazwa kati ya madimbwi mengi ya mining badala ya huluki moja
  - Sheria za itifaki ya Bitcoin huamuliwa na kikundi kilichosambazwa cha watengenezaji msingi
  - Vifunguo vya faragha huhifadhiwa kwenye vifaa vingi badala ya wallet moja
explanation: |
  Ugatuaji wa Full node unamaanisha kuwa uthibitishaji wa vitalu (data ambayo wachimbaji huzalisha) hufanyika kando ya mtandao na watumiaji binafsi wanaoendesha nodi zao, badala ya kutegemea mamlaka chache zinazoaminika kuthibitisha miamala. Hii ni tofauti na ugatuaji wa wachimbaji madini, ambao unahusika na kuagiza na usindikaji wa shughuli. Chaguo zingine huchanganya ugatuaji wa full node na usambazaji wa mining, miundo ya utawala, au mazoea ya usalama, lakini hakuna inayonakili dhana ya msingi ya uthibitishaji wa kuzuia kusambazwa na washiriki wa mtandao.

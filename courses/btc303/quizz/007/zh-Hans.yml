question: 在比特币中，全节点去中心化指的是什么？
answer: 区块验证在网络边缘由用户而非可信机构进行
wrong_answers:
  - 交易处理由多个矿池分布式进行，而不是由单一实体完成
  - 比特币协议规则由核心开发者组成的分布式小组决定
  - 私钥在多台设备上而不是单一的保存
explanation: |
  Full node 去中心化是指区块（矿工产生的数据）的验证在网络边缘由运行自己节点的个人用户进行，而不是依靠少数可信机构来验证交易。这有别于矿工去中心化，后者涉及交易排序和处理。其他方案将 full node 去中心化与 mining 分配、治理结构或安全实践混为一谈，但都没有抓住由网络参与者进行分布式区块验证的核心概念。

question: عدم تمرکز full node در Bitcoin به چه چیزی اشاره دارد؟
answer: اعتبارسنجی بلوک‌ها در لبه شبکه توسط کاربران انجام می‌شود، نه توسط مقامات مورد اعتماد.
wrong_answers:
  - پردازش تراکنش بین چندین استخر mining توزیع شده است و نه یک نهاد واحد
  - قوانین پروتکل Bitcoin توسط گروهی توزیع‌شده از توسعه‌دهندگان اصلی تعیین می‌شود.
  - کلیدهای خصوصی به جای یک wallet واحد، در چندین دستگاه ذخیره می‌شوند.
explanation: |
  غیرمتمرکزسازی Full node به این معناست که اعتبارسنجی بلاک‌ها (داده‌هایی که ماینرها تولید می‌کنند) در لبه شبکه توسط کاربران فردی که نودهای خود را اجرا می‌کنند، انجام می‌شود، به جای اینکه به چند مرجع مورد اعتماد برای تأیید تراکنش‌ها تکیه شود. این با غیرمتمرکزسازی ماینر که به ترتیب‌دهی و پردازش تراکنش‌ها می‌پردازد، متفاوت است. گزینه‌های دیگر غیرمتمرکزسازی full node را با توزیع mining، ساختارهای حکومتی یا شیوه‌های امنیتی اشتباه می‌گیرند، اما هیچ‌کدام مفهوم اصلی اعتبارسنجی بلاک توزیع‌شده توسط شرکت‌کنندگان شبکه را به‌درستی بیان نمی‌کنند.
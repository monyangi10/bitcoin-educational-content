question: Bitcoin में full node विकेंद्रीकरण का क्या अर्थ है?
answer: ब्लॉकों का सत्यापन नेटवर्क के किनारे पर उपयोगकर्ताओं द्वारा किया जाता है, विश्वसनीय प्राधिकारियों द्वारा नहीं
wrong_answers:
  - लेन-देन प्रसंस्करण एकल इकाई के बजाय कई mining पूलों के बीच वितरित किया जाता है
  - Bitcoin प्रोटोकॉल नियम कोर डेवलपर्स के एक वितरित समूह द्वारा तय किए जाते हैं
  - निजी कुंजियाँ एकल wallet के बजाय कई उपकरणों में संग्रहीत की जाती हैं
explanation: |
  Full node विकेंद्रीकरण का अर्थ है कि ब्लॉक (माइनर्स द्वारा उत्पादित डेटा) का सत्यापन नेटवर्क के किनारे पर व्यक्तिगत उपयोगकर्ताओं द्वारा अपने स्वयं के नोड्स चलाकर किया जाता है, न कि लेनदेन के सत्यापन के लिए कुछ विश्वसनीय प्राधिकरणों पर निर्भर रहना पड़ता है। यह माइनर विकेंद्रीकरण से अलग है, जो लेनदेन के क्रम और प्रसंस्करण से संबंधित है। अन्य विकल्प full node विकेंद्रीकरण को mining वितरण, शासन संरचनाओं या सुरक्षा प्रथाओं के साथ भ्रमित करते हैं, लेकिन इनमें से कोई भी नेटवर्क प्रतिभागियों द्वारा वितरित ब्लॉक सत्यापन की मूल अवधारणा को नहीं समझता है।
question: Mida tähendab full node detsentraliseerimine Bitcoin-s?
answer: Blokkide valideerimine toimub võrgu servas kasutajate, mitte usaldusväärsete asutuste poolt
wrong_answers:
  - Tehingute töötlemine on jaotatud mitme mining-pooli vahel, mitte ühe üksuse vahel
  - Bitcoin protokolli reeglite üle otsustab tuumikarendajate hajutatud rühm
  - Privaatseid võtmeid hoitakse ühe wallet asemel mitmes seadmes
explanation: |
  Full node detsentraliseerimine tähendab, et plokkide (andmete, mida kaevandajad toodavad) valideerimine toimub võrgu servas üksikute kasutajate poolt, kes kasutavad oma sõlmi, selle asemel, et tugineda tehingute kontrollimisel mõnele usaldusväärsele asutusele. See erineb kaevandajate detsentraliseerimisest, mis tegeleb tehingute tellimise ja töötlemisega. Teised valikud ajavad full node detsentraliseerimise segi mining jaotamise, juhtimisstruktuuride või turvapraktikatega, kuid ükski neist ei haara võrguosaliste poolt teostatava jaotatud plokkide valideerimise põhikontseptsiooni.
reviewed: false

question: За какво се отнася децентрализацията на възлитe в Bitcoin?
answer: Валидирането на блоковете се извършва на границата на мрежата от потребителите, а не от доверени органи
wrong_answers:
  - Обработката на транзакциите се разпределя между множество миньорски басейни, а не между една единица
  - Правилата на протокола Bitcoin се определят от разпределена група от разработчици на ядрото
  - Частните ключове се съхраняват на няколко устройства вместо на един портфейл
explanation: |
  Децентрализацията на възлитe означава, че валидирането на блоковете (данните, които миньорите произвеждат) се извършва на границата на мрежата от отделни потребители, които управляват свои собствени възли, вместо да се разчита на няколко доверени органа за проверка на трансакциите. Това е различно от децентрализацията на миньорите, която се занимава с нареждането и обработката на трансакциите. Другите варианти смесват децентрализацията на възлите с разпределението на копаене, структурите за управление или практиките за сигурност, но нито един от тях не улавя основната концепция за разпределена проверка на блокове от участниците в мрежата.
reviewed: true

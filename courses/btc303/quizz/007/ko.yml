question: Bitcoin에서 full node 탈중앙화는 무엇을 의미하나요?
answer: 블록 검증은 신뢰할 수 있는 기관이 아닌 사용자에 의해 네트워크 엣지에서 수행됩니다
wrong_answers:
  - 트랜잭션 처리는 단일 엔티티가 아닌 여러 mining 풀로 분산됩니다
  - Bitcoin 프로토콜 규칙은 핵심 개발자로 구성된 분산된 그룹에 의해 결정됩니다
  - 개인 키는 단일 wallet가 아닌 여러 장치에 저장됩니다
explanation: |
  Full node 탈중앙화는 블록(채굴자가 생성하는 데이터)의 검증이 소수의 신뢰할 수 있는 기관에 의존하여 거래를 검증하는 것이 아니라, 개별 사용자가 자신의 노드를 운영하는 네트워크의 엣지에서 이루어짐을 의미합니다. 이는 트랜잭션 주문 및 처리를 처리하는 채굴자 탈중앙화와는 구별됩니다. 다른 옵션은 full node 탈중앙화와 mining 분산, 거버넌스 구조 또는 보안 관행을 혼동하지만, 네트워크 참여자에 의한 분산 블록 검증이라는 핵심 개념을 포착하지 못합니다.
question: 根据负责任的披露实践，发现 Bitcoin 等分散式系统漏洞的安全研究人员面临的主要道德困境是什么？
answer: 既要通知责任方，又要避免向可能利用漏洞的潜在恶意行为者披露，在两者之间取得平衡
wrong_answers:
  - 决定是通过漏洞赏金计划从漏洞发现中获利，还是将信息无偿捐献给社区
  - 在先向政府部门报告与直接向软件开发团队报告之间做出选择，以避免监管复杂化
  - 在同意向开发者披露信息之前，确定发现漏洞的适当经济补偿
explanation: |
  负责任的披露所面临的核心道德挑战是透明度与安全性之间的微妙平衡。研究人员必须确保在解决漏洞的同时，不会无意中为恶意利用提供路线图。这就需要与开发人员仔细协调，合理安排披露时间，并考虑更广泛的生态系统影响。其他选项主要关注财务或监管方面的问题，这些问题虽然可能与之相关，但并不是负责任的披露实践中所概述的主要道德困境。
reviewed: false

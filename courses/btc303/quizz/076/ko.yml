question: 책임 있는 공개 관행에 따르면, Bitcoin과 같은 탈중앙화 시스템에서 취약점을 발견하는 보안 연구자들이 직면하는 주요 윤리적 딜레마는 무엇인가요?
answer: 취약점을 악용할 수 있는 잠재적 악의적 행위자에게 공개하지 않으면서도 책임 있는 당사자에게 알릴 필요성 간의 균형 유지
wrong_answers:
  - 버그 바운티 프로그램을 통해 취약점 발견으로 수익을 얻을지, 커뮤니티에 무료로 정보를 기부할지 결정하기
  - 정부 당국에 먼저 보고하는 것과 소프트웨어 개발 팀에 직접 보고하는 것 중 선택하여 규제 복잡성을 피하세요
  - 개발자에게 정보를 공개하는 데 동의하기 전에 취약점 발견에 대한 적절한 금전적 보상 결정
explanation: |
  책임감 있는 공개에 있어 핵심적인 윤리적 과제는 투명성과 보안 사이의 미묘한 균형입니다. 연구자들은 실수로 악의적인 악용을 위한 로드맵을 제공하지 않으면서 취약점을 해결해야 합니다. 여기에는 개발자와 신중하게 조율하고, 공개 시기를 적절히 조정하며, 더 광범위한 생태계에 미치는 영향을 고려하는 것이 포함됩니다. 다른 옵션은 잠재적으로 관련성이 있지만 책임 있는 공개 관행에서 설명하는 주요 윤리적 딜레마는 아닌 재무 또는 규제 문제에 초점을 맞추는 것입니다.

question: 根據負責任的揭露實務，發現 Bitcoin 等分散式系統弱點的安全研究人員所面臨的主要道德困境是什麼？
answer: 既要通知責任方，又要避免揭露給可能利用漏洞的潛在惡意行為者，兩者之間要取得平衡
wrong_answers:
  - 決定是否透過漏洞賞金計畫從漏洞發現中獲利，或是將資訊免費捐贈給社群
  - 在先向政府機關報告與直接向軟體開發團隊報告之間做出選擇，以避免法規的複雜性
  - 在同意向開發人員揭露資訊之前，先決定發現弱點的適當經濟補償
explanation: |
  負責任揭露的核心道德挑戰是透明度與安全性之間的微妙平衡。研究人員必須確保在解決弱點的同時，不會無意中提供惡意利用的路線圖。這包括與開發人員小心協調、適當地安排揭露時間，以及考慮更廣泛的生態系統影響。其他選項著重於財務或法規方面的考量，這些考量雖然可能相關，但並非負責任揭露實務所概述的主要道德困境。
reviewed: false

question: Dushingiye ku migenzo yo gutangaza amakuru mu buryo bubereye, ni ikihe kibazo nyamukuru c’inyifato runtu gishikirwa n’abashakashatsi mu vy’umutekano bavumbura ubugoyagoye mu mice yegerejwe nka Bitcoin?
answer: Gushiramwo uburinganire ku nkenerwa yo kumenyesha ababijejwe mu gihe umuntu yirinda kubimenyesha abashobora kuba bafise ububisha boshobora gukoresha nabi ubugoyagoye .
wrong_answers:
  - Gufata ingingo yo kuronka inyungu mu kuvumbura ubugoyagoye biciye mu migambi y’ubuntu bw’ibikoko canke gutanga amakuru ku buntu ku kibano
  - Guhitamwo hagati yo gutanga raporo ku butegetsi bwa Leta ubwa mbere no gutanga raporo ku bajejwe gutegura porogarama kugira ngo wirinde ingorane zijanye n’amategeko .
  - Kumenya indishi y’amahera ikwiye y’ukuvumbura ubugoyagoye imbere yo kwemera gutanga amakuru ku bategura .
explanation: |
  Ingorane nyamukuru y’inyifato runtu mu gutangaza amakuru mu buryo bubereye ni uburinganire buhambaye hagati y’uguseruka n’umutekano. Abashakashatsi bategerezwa gukora vyose kugira ngo ivyiyumviro bishobora gutuma umuntu agira ingorane zitorerwa umuti ataco bivuze mu gutanga ikarita y’inzira yo gukoresha nabi. Ivyo birimwo guhuza neza n’abategura, gutangaza igihe kibereye, no kwihweza ingaruka zagutse z’ibidukikije. Ayandi mahitamwo yibanda ku vyerekeye amafaranga canke ivyerekeye amategeko, naho bishobora kuba bihambaye, si vyo bitera ingorane nyamukuru y’inyifato runtu yerekanwa mu migenzo yo gutangaza amakuru mu buryo bubereye.

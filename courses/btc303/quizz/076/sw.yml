question: Kulingana na desturi za ufichuzi zinazowajibika, ni tatizo gani la msingi la kimaadili linalokabiliwa na watafiti wa usalama wanaogundua udhaifu katika mifumo iliyogatuliwa kama vile Bitcoin?
answer: Kusawazisha hitaji la kufahamisha wahusika huku ikiepuka kufichuliwa kwa watendaji wenye nia mbaya ambao wanaweza kutumia udhaifu huo.
wrong_answers:
  - Kuamua kama utafaidika kutokana na ugunduzi wa uwezekano wa kuathiriwa kupitia programu za fadhila za hitilafu au kuchangia maelezo bila malipo kwa jumuiya.
  - Kuchagua kati ya kuripoti kwa mamlaka za serikali kwanza dhidi ya kuripoti moja kwa moja kwa timu ya ukuzaji programu ili kuepusha matatizo ya udhibiti.
  - Kuamua fidia inayofaa ya kifedha kwa ugunduzi wa mazingira magumu kabla ya kukubali kufichua maelezo kwa wasanidi programu.
explanation: |
  Changamoto kuu ya kimaadili katika ufichuzi unaowajibika ni uwiano kati ya uwazi na usalama. Watafiti lazima wahakikishe kuwa udhaifu unashughulikiwa bila kukusudia kutoa ramani ya njia ya unyonyaji hasidi. Hii inahusisha kuratibu kwa makini na wasanidi programu, ufichuzi wa muda ipasavyo, na kuzingatia athari pana zaidi ya mfumo ikolojia. Chaguzi zingine zinazingatia maswala ya kifedha au ya udhibiti ambayo, ingawa yanaweza kuwa muhimu, sio shida kuu ya kimaadili iliyoainishwa katika utendakazi wa ufichuzi unaowajibika.
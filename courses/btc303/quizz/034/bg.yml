question: Коя е основната причина, поради която действителното предлагане на Bitcoin в обращение ще бъде значително по-ниско от теоретичния максимум от приблизително 21 милиона BTC?
answer: Изгубени частни ключове, кражба на портфейли и монети, изпратени на грешни адреси, трайно изваждат биткойни от обращение
wrong_answers:
  - Корекциите на трудността на копаене автоматично намаляват общото предлагане, за да се запази недостигът във времето
  - Таксите за транзакциите се изгарят по време на обработката, като постепенно намаляват наличните биткойни
  - Протоколът Bitcoin автоматично блокира монети, които не са се движили продължително време, за да предотврати инфлацията
explanation: |
  Ако теоретичният максимум е 20 999 999.9769 BTC, реално използваемото предлагане е значително по-ниско поради човешки грешки и загуби. Загубените частни ключове правят биткойните окончателно недостъпни, портфейлите биват откраднати или забравени, а понякога монетите се изпращат към невалидни адреси. Тези фактори водят до трайно намаляване на предлагането, което е в полза на оставащите притежатели, както отбелязва Сатоши: изгубените монети увеличават стойността на монетите на другите.
reviewed: false

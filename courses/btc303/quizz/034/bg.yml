question: Коя е основната причина, поради която действителното предлагане на Bitcoin в обращение ще бъде значително по-ниско от теоретичния максимум от приблизително 21 милиона BTC?
answer: Изгубени частни ключове, кражба на wallet и монети, изпратени на грешни адреси, трайно изваждат биткойни от обращение
wrong_answers:
  - Корекциите на трудността на Mining автоматично намаляват общото предлагане, за да се запази недостигът във времето
  - Таксите за транзакциите се изгарят по време на обработката, като постепенно намаляват наличните биткойни
  - "Протоколът Bitcoin автоматично блокира монети, които не са се движили продължително време, за да предотврати инфлацията"
explanation: |
  В главата е обяснено, че макар теоретичният максимум да е около 20 999 817 BTC, действителното количество, което може да се използва, е много по-малко поради човешки грешки и загуби. Загубените частни ключове правят биткойните трайно недостъпни, портфейлите се крадат или забравят, а монетите понякога се изпращат на невалидни адреси. Тези фактори създават постоянно намаляване на предлагането, което е от полза за останалите притежатели, тъй като Satoshi отбеляза, че изгубените монети правят монетите на всички останали по-ценни.
reviewed: false

question: เหตุผลหลักที่ทำให้ปริมาณหมุนเวียนจริงของ Bitcoin ต่ำกว่าค่าสูงสุดทางทฤษฎีที่ประมาณ 21 ล้าน BTC อย่างมีนัยสำคัญคืออะไร?
answer: กุญแจส่วนตัวที่สูญหาย, การโจรกรรม wallet, และเหรียญที่ส่งไปยังที่อยู่ผิดจะทำให้บิตคอยน์ถูกนำออกจากการหมุนเวียนอย่างถาวร
wrong_answers:
  - การปรับความยาก Mining จะลดปริมาณทั้งหมดโดยอัตโนมัติเพื่อรักษาความขาดแคลนเมื่อเวลาผ่านไป
  - ค่าธรรมเนียมการทำธุรกรรมจะถูกเผาไหม้ระหว่างการประมวลผล ลดปริมาณบิตคอยน์ที่มีอยู่ลงอย่างค่อยเป็นค่อยไป
  - "โปรโตคอล Bitcoin จะล็อคเหรียญที่ไม่ได้เคลื่อนไหวเป็นเวลานานโดยอัตโนมัติเพื่อป้องกันเงินเฟ้อ"
explanation: |
  ในขณะที่ทฤษฎีสูงสุดคือ 20,999,999.9769 BTC แต่ปริมาณที่ใช้งานได้จริงนั้นต่ำกว่ามากเนื่องจากข้อผิดพลาดของมนุษย์และการสูญเสีย กุญแจส่วนตัวที่สูญหายทำให้บิตคอยน์ไม่สามารถเข้าถึงได้อย่างถาวร กระเป๋าเงินถูกขโมยหรือถูกลืม และบางครั้งเหรียญถูกส่งไปยังที่อยู่ที่ไม่ถูกต้อง ปัจจัยเหล่านี้นำไปสู่การลดลงของปริมาณอย่างถาวรซึ่งเป็นประโยชน์ต่อผู้ถือครองที่เหลืออยู่ ดังที่ Satoshi ได้กล่าวไว้ว่า: เหรียญที่สูญหายเพิ่มมูลค่าให้กับเหรียญอื่น ๆ
reviewed: false
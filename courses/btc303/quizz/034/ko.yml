question: Bitcoin의 실제 유통량이 이론상 최대치인 약 2,100만 BTC보다 현저히 낮은 주된 이유는 무엇인가요?
answer: 개인 키 분실, wallet 도난, 잘못된 주소로 전송된 코인은 비트코인을 유통에서 영구적으로 제거합니다
wrong_answers:
  - Mining 난이도 조정은 시간이 지남에 따라 희소성을 유지하기 위해 총 공급량을 자동으로 줄입니다
  - 거래 수수료는 처리 중에 소각되어 사용 가능한 비트코인 공급량이 점차 감소합니다
  - "Bitcoin 프로토콜은 인플레이션을 방지하기 위해 장시간 움직이지 않는 코인을 자동으로 잠급니다."
explanation: |
  이 장에서는 이론적 최대 공급량은 약 20,999,817 BTC이지만, 사람의 실수나 분실 등으로 인해 실제 사용 가능한 공급량은 훨씬 적다고 설명합니다. 개인 키를 분실하면 비트코인에 영구적으로 액세스할 수 없게 되고, 지갑을 도난당하거나 잊어버리기도 하며, 잘못된 주소로 코인이 전송되는 경우도 있습니다. 이러한 요인으로 인해 영구적인 공급 감소가 발생하여 남은 보유자에게 이익이 되며, Satoshi는 분실된 코인은 다른 모든 사람의 코인 가치를 높인다고 지적했습니다.

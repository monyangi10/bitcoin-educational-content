question: Bitcoin'ın gerçek dolaşımdaki arzının teorik maksimum olan yaklaşık 21 milyon BTC'den önemli ölçüde düşük olmasının ana nedeni nedir?
answer: Kayıp özel anahtarlar, wallet hırsızlığı ve yanlış adreslere gönderilen madeni paralar bitcoinleri dolaşımdan kalıcı olarak kaldırıyor
wrong_answers:
  - Mining zorluk ayarlamaları, zaman içinde kıtlığı korumak için toplam arzı otomatik olarak azaltır
  - İşlem ücretleri, işlem sırasında yakılarak mevcut bitcoin arzını kademeli olarak azaltır
  - "Bitcoin protokolü, enflasyonu önlemek için uzun süre hareket etmeyen madeni paraları otomatik olarak kilitler"
explanation: |
  Bu bölümde, teorik olarak maksimum 20,999,817 BTC olsa da, insan hatası ve kayıplar nedeniyle gerçek kullanılabilir arzın çok daha düşük olduğu açıklanmaktadır. Kayıp özel anahtarlar bitcoinleri kalıcı olarak erişilemez hale getirmekte, cüzdanlar çalınmakta ya da unutulmakta ve coinler bazen geçersiz adreslere gönderilmektedir. Bu faktörler, Satoshi'ün kayıp coinlerin diğer herkesin coinlerini daha değerli hale getirdiğini belirttiği gibi, kalan sahiplere fayda sağlayan kalıcı arz azalması yaratır.

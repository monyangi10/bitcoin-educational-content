question: Hva er hovedgrunnen til at den faktiske sirkulasjonsmengden av Bitcoin vil være betydelig lavere enn det teoretiske maksimumet på ca. 21 millioner BTC?
answer: Tapte private nøkler, wallet-tyveri og mynter sendt til feil adresser fjerner bitcoins permanent fra sirkulasjon
wrong_answers:
  - Mining vanskelighetsgrader reduserer automatisk det totale tilbudet for å opprettholde knapphet over tid
  - Transaksjonsgebyrer blir brent under behandlingen, noe som gradvis reduserer den tilgjengelige bitcoin-beholdningen
  - "Bitcoin-protokollen låser automatisk mynter som ikke har beveget seg i lengre perioder for å forhindre inflasjon"
explanation: |
  Selv om det teoretiske maksimumet er 20 999 999.9769 BTC, er den reelt brukbare tilførselen langt lavere på grunn av menneskelige feil og tap. Tapte private nøkler gjør bitcoins permanent utilgjengelige, lommebøker blir stjålet eller glemt, og mynter sendes av og til til ugyldige adresser. Disse faktorene fører til en varig reduksjon i tilførselen som kommer de gjenværende innehaverne til gode, slik Satoshi påpekte: tapte mynter øker verdien av andres mynter.
reviewed: false

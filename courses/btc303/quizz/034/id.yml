question: Apa alasan utama mengapa suplai Bitcoin yang beredar akan jauh lebih rendah daripada maksimum teoretis sekitar 21 juta BTC?
answer: Kunci pribadi yang hilang, pencurian wallet, dan koin yang dikirim ke alamat yang salah secara permanen menghapus bitcoin dari peredaran
wrong_answers:
  - Penyesuaian tingkat kesulitan Mining secara otomatis mengurangi total pasokan untuk menjaga kelangkaan dari waktu ke waktu
  - Biaya transaksi dibakar selama pemrosesan, secara bertahap mengurangi pasokan bitcoin yang tersedia
  - "Protokol Bitcoin secara otomatis mengunci koin yang tidak bergerak dalam waktu lama untuk mencegah inflasi"
explanation: |
  Bab ini menjelaskan bahwa meskipun jumlah maksimum teoretisnya adalah sekitar 20.999.817 BTC, jumlah pasokan yang dapat digunakan sebenarnya jauh lebih rendah karena kesalahan manusia dan kehilangan. Kunci pribadi yang hilang membuat bitcoin tidak dapat diakses secara permanen, dompet dicuri atau dilupakan, dan koin terkadang dikirim ke alamat yang tidak valid. Faktor-faktor ini menciptakan pengurangan pasokan permanen yang menguntungkan pemegang yang tersisa, seperti yang dicatat oleh Satoshi bahwa koin yang hilang membuat koin orang lain menjadi lebih berharga.
reviewed: false

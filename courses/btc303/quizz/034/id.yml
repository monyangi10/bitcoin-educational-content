question: Apa alasan utama mengapa suplai Bitcoin yang beredar akan jauh lebih rendah daripada maksimum teoretis sekitar 21 juta BTC?
answer: Kunci pribadi yang hilang, pencurian wallet, dan koin yang dikirim ke alamat yang salah secara permanen menghapus bitcoin dari peredaran
wrong_answers:
  - Penyesuaian tingkat kesulitan Mining secara otomatis mengurangi total pasokan untuk menjaga kelangkaan dari waktu ke waktu
  - Biaya transaksi dibakar selama pemrosesan, secara bertahap mengurangi pasokan bitcoin yang tersedia
  - "Protokol Bitcoin secara otomatis mengunci koin yang tidak bergerak dalam waktu lama untuk mencegah inflasi"
explanation: |
  Meskipun maksimum teoretisnya adalah 20 999 999.9769 BTC, pasokan nyata yang dapat digunakan jauh lebih rendah akibat kesalahan manusia dan kehilangan. Kunci privat yang hilang membuat bitcoin tidak dapat diakses secara permanen, dompet dicuri atau dilupakan, dan koin terkadang dikirim ke alamat yang tidak valid. Faktor-faktor ini menyebabkan pengurangan pasokan secara permanen yang menguntungkan para pemegang yang tersisa, sebagaimana dicatat oleh Satoshi: koin yang hilang meningkatkan nilai koin milik orang lain.
reviewed: false

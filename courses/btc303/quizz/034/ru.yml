question: Какова основная причина, по которой фактическое оборотное предложение Bitcoin будет значительно ниже теоретического максимума, составляющего около 21 миллиона BTC?
answer: Потеря приватных ключей, кража wallet и отправка монет на неправильные адреса навсегда выводят биткоины из обращения
wrong_answers:
  - Регулировка сложности Mining автоматически уменьшает общее предложение, чтобы поддерживать дефицит в течение долгого времени
  - Плата за транзакции сжигается в процессе обработки, постепенно уменьшая доступный запас биткоинов
  - "Протокол Bitcoin автоматически блокирует монеты, которые не двигались в течение длительного времени, чтобы предотвратить инфляцию"
explanation: |
  В главе объясняется, что, хотя теоретический максимум составляет около 20 999 817 BTC, реальный полезный запас гораздо меньше из-за человеческих ошибок и потерь. Потерянные приватные ключи делают биткоины навсегда недоступными, кошельки крадут или забывают, а монеты иногда отправляют на недействительные адреса. Эти факторы приводят к постоянному сокращению предложения, что выгодно оставшимся держателям, поскольку, как отметил Satoshi, потерянные монеты делают стоимость всех остальных монет выше.
reviewed: false

question: ビットコインの実際の流通量が、理論上の最大供給量である2,100万BTCを大幅に下回る主な理由は何か？
answer: 秘密鍵の紛失、ウォレットの盗難、間違ったアドレスに送られたコインにより、ビットコインは永久的に流通しなくなるため
wrong_answers:
  - マイニング難易度調整により、総供給量が自動的に減少し、希少性が長期にわたって維持されるため
  - トランザクション手数料は処理中に燃やされ、利用可能なビットコインの供給量は徐々に減少するため
  - ビットコインプロトコルは、長期間動かなかったコインを自動的にロックし、インフレを防ぐため
explanation: |
  理論上の上限が20 999 999.9769 BTCであるとしても、人為的なミスや損失により、実際に利用可能な供給量ははるかに少ない。失われた秘密鍵はビットコインを永久にアクセス不能にし、ウォレットは盗まれたり忘れられたりし、コインが無効なアドレスに送られることもある。これらの要因は供給量の恒久的な減少を招き、残存する保有者に利益をもたらす。サトシが指摘したように、失われたコインは他のコインの価値を高めるのである。
reviewed: false

question: Bitcoinの実際の流通量が、理論上の最大供給量である約2100万BTCを大幅に下回る主な理由は何か？
answer: 秘密鍵の紛失、walletの盗難、間違ったアドレスに送られたコインにより、ビットコインは永久に流通しなくなる
wrong_answers:
  - Miningの難易度調整により、総供給量が自動的に減少し、希少性が長期にわたって維持される。
  - 取引手数料は処理中に燃やされ、利用可能なビットコインの供給量は徐々に減少する。
  - 「Bitcoinプロトコルは、長期間動かなかったコインを自動的にロックし、インフレを防ぐ。
explanation: |
  この章では、理論上の最大供給量は約20,999,817BTCだが、人為的ミスや紛失により、実際に使用可能な供給量はもっと少ないと説明している。秘密鍵の紛失によってビットコインに永久にアクセスできなくなったり、ウォレットが盗まれたり忘れられたり、コインが無効なアドレスに送られたりすることがある。Satoshiは、紛失したコインは他の人のコインの価値を高めると指摘している。
reviewed: false

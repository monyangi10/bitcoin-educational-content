question: Was ist der Hauptgrund dafür, dass das tatsächlich im Umlauf befindliche Angebot an Bitcoin deutlich unter dem theoretischen Maximum von etwa 21 Millionen BTC liegen wird?
answer: Verlorene private Schlüssel, wallet-Diebstahl und an falsche Adressen gesendete Münzen ziehen Bitcoins dauerhaft aus dem Verkehr
wrong_answers:
  - Mining-Schwierigkeitsanpassungen reduzieren automatisch das Gesamtangebot, um die Knappheit über die Zeit aufrechtzuerhalten
  - Transaktionsgebühren werden während der Verarbeitung verbrannt, wodurch der verfügbare Bitcoin-Vorrat allmählich abnimmt
  - "Das Bitcoin-Protokoll sperrt automatisch Münzen, die über einen längeren Zeitraum nicht bewegt wurden, um eine Inflation zu verhindern
explanation: |
  In diesem Kapitel wird erklärt, dass das theoretische Maximum bei etwa 20.999.817 BTC liegt, die tatsächlich nutzbare Menge jedoch aufgrund von menschlichem Versagen und Verlusten viel geringer ist. Verlorene private Schlüssel machen Bitcoins dauerhaft unzugänglich, Wallets werden gestohlen oder vergessen, und Münzen werden manchmal an ungültige Adressen geschickt. Diese Faktoren führen zu einer permanenten Angebotsverringerung, die den verbleibenden Inhabern zugute kommt, da laut Satoshi verlorene Münzen den Wert der Münzen aller anderen erhöhen.
question: دلیل اصلی اینکه عرضه در گردش واقعی Bitcoin به طور قابل توجهی کمتر از حداکثر تئوری تقریباً 21 میلیون BTC خواهد بود چیست؟
answer: کلیدهای خصوصی گم‌شده، سرقت wallet، و ارسال سکه‌ها به آدرس‌های اشتباه به طور دائمی بیت‌کوین‌ها را از گردش خارج می‌کنند.
wrong_answers:
  - تنظیمات سختی Mining به‌طور خودکار عرضه کل را کاهش می‌دهند تا کمیابی را در طول زمان حفظ کنند.
  - هزینه‌های تراکنش در حین پردازش سوزانده می‌شوند و به تدریج عرضه بیت‌کوین موجود را کاهش می‌دهند.
  - "پروتکل Bitcoin به‌طور خودکار سکه‌هایی را که برای مدت طولانی جابجا نشده‌اند قفل می‌کند تا از تورم جلوگیری کند"
explanation: |
  این فصل توضیح می‌دهد که در حالی که حداکثر تئوریک حدود 20,999,817 بیت‌کوین است، عرضه واقعی قابل استفاده به دلیل خطای انسانی و از دست رفتن بسیار کمتر است. کلیدهای خصوصی گمشده بیت‌کوین‌ها را به طور دائمی غیرقابل دسترسی می‌کنند، کیف‌پول‌ها دزدیده یا فراموش می‌شوند و گاهی اوقات سکه‌ها به آدرس‌های نامعتبر ارسال می‌شوند. این عوامل کاهش دائمی عرضه را ایجاد می‌کنند که به نفع دارندگان باقی‌مانده است، زیرا Satoshi اشاره کرد که سکه‌های گمشده باعث می‌شوند سکه‌های دیگران ارزش بیشتری پیدا کنند.
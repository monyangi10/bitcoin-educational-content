question: मुख्य कारण क्या है कि Bitcoin की वास्तविक परिसंचारी आपूर्ति लगभग 21 मिलियन BTC की सैद्धांतिक अधिकतम से काफी कम होगी?
answer: निजी कुंजियों का खो जाना, wallet की चोरी, और गलत पतों पर भेजे गए सिक्के बिटकॉइन को प्रचलन से स्थायी रूप से हटा देते हैं
wrong_answers:
  - Mining कठिनाई समायोजन समय के साथ कमी बनाए रखने के लिए स्वचालित रूप से कुल आपूर्ति को कम कर देता है
  - प्रसंस्करण के दौरान लेनदेन शुल्क का भुगतान किया जाता है, जिससे उपलब्ध बिटकॉइन आपूर्ति धीरे-धीरे कम हो जाती है
  - "Bitcoin प्रोटोकॉल उन सिक्कों को स्वचालित रूप से लॉक कर देता है जो मुद्रास्फीति को रोकने के लिए लंबे समय तक नहीं चले हैं"
explanation: |
  यद्यपि सैद्धांतिक अधिकतम 20 999 999.9769 BTC है, मानवीय त्रुटियों और हानियों के कारण वास्तविक उपयोग योग्य आपूर्ति कहीं कम है। खोई हुई निजी कुंजियाँ बिटकॉइन को स्थायी रूप से अप्राप्य बना देती हैं, वॉलेट चोरी हो जाते हैं या भुला दिए जाते हैं, और कभी-कभी सिक्के अमान्य पतों पर भेज दिए जाते हैं। ये कारक आपूर्ति में स्थायी कमी लाते हैं, जिसका लाभ शेष धारकों को होता है, जैसा कि सातोशी ने उल्लेख किया: खोए हुए सिक्के अन्य सिक्कों के मूल्य को बढ़ाते हैं।
reviewed: false

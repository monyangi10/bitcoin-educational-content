question: Wat is de belangrijkste reden waarom de werkelijke circulerende voorraad Bitcoin aanzienlijk lager zal zijn dan het theoretische maximum van ongeveer 21 miljoen BTC?
answer: Verloren privésleutels, wallet diefstal en munten die naar verkeerde adressen worden gestuurd halen bitcoins voorgoed uit de circulatie
wrong_answers:
  - Mining moeilijkheidsaanpassingen verminderen automatisch het totale aanbod om de schaarste in de tijd te handhaven
  - Transactiekosten worden verbrand tijdens de verwerking, waardoor de beschikbare bitcoinvoorraad geleidelijk afneemt
  - "Het Bitcoin protocol vergrendelt automatisch munten die langere tijd niet bewogen hebben om inflatie te voorkomen."
explanation: |
  Hoewel het theoretische maximum 20 999 999.9769 BTC bedraagt, is het werkelijk bruikbare aanbod veel lager door menselijke fouten en verliezen. Verloren privésleutels maken bitcoins definitief ontoegankelijk, wallets worden gestolen of vergeten, en munten worden soms naar ongeldige adressen gestuurd. Deze factoren leiden tot een permanente vermindering van het aanbod, wat ten goede komt aan de resterende houders, zoals Satoshi opmerkte: verloren munten verhogen de waarde van de munten van anderen.
reviewed: false

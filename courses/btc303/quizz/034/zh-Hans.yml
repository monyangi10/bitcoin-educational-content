question: Bitcoin 的实际流通供应量将大大低于约 2 100 万 BTC 的理论最大值的主要原因是什么？
answer: 私人密钥丢失、wallet 被盗以及比特币被发送到错误地址，都会使比特币永久退出流通
wrong_answers:
  - Mining 难度调整会自动减少总供应量，以长期保持稀缺性
  - 交易费用在处理过程中被烧掉，从而逐渐减少可用的比特币供应量
  - "Bitcoin协议自动锁定长期未移动的硬币，以防止通货膨胀"
explanation: |
  这一章解释说，虽然理论上的最大值约为 20,999,817 BTC，但由于人为错误和丢失，实际可用供应量要低得多。私人密钥丢失会导致比特币永久无法访问，钱包被盗或遗忘，比特币有时会被发送到无效地址。Satoshi 指出，丢失的比特币会让其他人的比特币变得更值钱。
reviewed: false

question: 比特币的实际流通供应量将大大低于约 2100 万比特币的理论最大值的主要原因是什么？
answer: 私人密钥丢失、钱包被盗以及比特币被发送到错误地址，都会使比特币永久退出流通
wrong_answers:
  - 挖矿难度调整会自动减少总供应量，以长期保持稀缺性
  - 交易费用在处理过程中被烧掉，从而逐渐减少可用的比特币供应量
  - 比特币协议自动锁定长期未被使用的硬币，以防止通货膨胀
explanation: |
  即使理论上的最大值为 20 999 999.9769 BTC，由于人为错误和损失，实际可用的供应量也要低得多。丢失的私钥使比特币永久无法访问，钱包被盗或被遗忘，且有时币会被发送到无效地址。这些因素导致供应量的永久性减少，从而使剩余持有者受益，正如中本聪所指出的那样：丢失的币会提高其他币的价值。
reviewed: false

question: Bitcoin 的實際流通供應量將明顯低於約 2,100 萬 BTC 的理論最大值的主要原因是什麼？
answer: 遺失私密金鑰、wallet 盜竊、以及寄送至錯誤地址的硬幣，都會使比特幣永久退出流通。
wrong_answers:
  - Mining 難度調整自動減少總供應量，以維持長時間的稀缺性
  - 交易費用會在處理過程中被燒掉，逐漸減少可用的比特幣供應。
  - 「Bitcoin協定會自動鎖定長時間未動的硬幣，以防止通貨膨脹」
explanation: |
  該章節解釋，雖然理論上的最大值約為 20,999,817 BTC，但由於人為錯誤和遺失，實際可用的供應量要低得多。私人密碼匙遺失會導致比特幣永久無法存取，錢包會被盜或遺忘，有時比特幣會被寄到無效的地址。這些因素造成永久供應量減少，對剩餘的持有者有利，正如 Satoshi 指出，遺失的硬幣讓其他人的硬幣更有價值。
reviewed: false

question: Jaki jest główny powód, dla którego błędy wydajności w Bitcoin mogą być potencjalnie wykorzystane do tworzenia partycji sieciowych według ekspertów ds. bezpieczeństwa?
answer: Błędy wydajności mogą być strategicznie rozmieszczone w celu oddzielenia określonych górników i giełd od reszty sieci, umożliwiając ataki typu double-spend
wrong_answers:
  - Błędy w wydajności wpływają przede wszystkim na czas potwierdzenia transakcji, czyniąc sieć zawodną dla sprzedawców i użytkowników
  - Błędy wydajnościowe zużywają nadmierne zasoby obliczeniowe, zmuszając węzły do wyłączenia i zmniejszając decentralizację sieci
  - Błędy wydajności powodują wycieki pamięci, które ostatecznie powodują awarię węzłów, prowadząc do tymczasowej niestabilności sieci i zmniejszonej szybkości mieszania
explanation: |
  Gregory Maxwell ostrzegł w szczególności, że błędy w wydajności, gdy są fachowo wdrożone, mogą zostać wykorzystane do strategicznego podziału sieci - na przykład oddzielenia "górnika A i giełdy B" do jednej partycji, podczas gdy wszyscy inni przechodzą do innej, tworząc warunki do ataków podwójnych wydatków. Pokazuje to, dlaczego pozornie drobne kwestie powinny być traktowane jako potencjalnie poważne, ponieważ mogą być uzbrojone w wyrafinowane sposoby, które nie są od razu oczywiste.
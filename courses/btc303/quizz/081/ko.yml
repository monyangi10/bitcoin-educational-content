question: 보안 전문가들에 따르면 Bitcoin의 성능 버그가 잠재적으로 네트워크 파티션을 생성하는 데 무기화될 수 있는 주된 이유는 무엇인가요?
answer: 특정 채굴자와 거래소를 나머지 네트워크에서 분리하기 위해 전략적으로 성능 버그를 배포하여 이중 지출 공격을 가능하게 할 수 있습니다
wrong_answers:
  - 성능 버그는 주로 거래 확인 시간에 영향을 미쳐 판매자와 사용자가 네트워크를 신뢰할 수 없게 만듭니다
  - 성능 버그는 과도한 컴퓨팅 리소스를 소모하여 노드를 강제 종료하고 네트워크 탈중앙화를 저해합니다
  - 성능 버그로 인해 메모리 누수가 발생하면 결국 노드가 충돌하여 일시적인 네트워크 불안정성과 해시율 감소로 이어집니다
explanation: |
  그레고리 맥스웰은 특히 성능 버그가 전문적으로 배포되면 네트워크를 전략적으로 분할하는 데 사용될 수 있다고 경고했습니다. 예를 들어 '채굴자 A와 거래소 B'를 한 파티션으로 분리하고 다른 사람들은 다른 파티션으로 이동하여 이중 지출 공격을 위한 조건을 만들 수 있습니다. 이는 겉보기에 사소해 보이는 문제가 즉각적으로 드러나지 않는 정교한 방식으로 무기화될 수 있기 때문에 잠재적으로 심각한 문제로 취급해야 하는 이유를 보여줍니다.
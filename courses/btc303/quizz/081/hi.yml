question: सुरक्षा विशेषज्ञों के अनुसार, Bitcoin में प्रदर्शन संबंधी त्रुटियों को नेटवर्क विभाजन बनाने के लिए हथियार के रूप में इस्तेमाल किए जाने का मुख्य कारण क्या है?
answer: प्रदर्शन संबंधी त्रुटियों को रणनीतिक रूप से विशिष्ट खनिकों और एक्सचेंजों को शेष नेटवर्क से अलग करने के लिए तैनात किया जा सकता है, जिससे दोहरे खर्च वाले हमले संभव हो सकते हैं
wrong_answers:
  - प्रदर्शन संबंधी त्रुटियां मुख्य रूप से लेनदेन की पुष्टि के समय को प्रभावित करती हैं, जिससे नेटवर्क व्यापारियों और उपयोगकर्ताओं के लिए अविश्वसनीय हो जाता है
  - प्रदर्शन संबंधी बग अत्यधिक कम्प्यूटेशनल संसाधनों का उपभोग करते हैं, जिससे नोड्स बंद हो जाते हैं और नेटवर्क विकेंद्रीकरण कम हो जाता है
  - प्रदर्शन संबंधी बग मेमोरी लीक उत्पन्न करते हैं जो अंततः नोड्स को क्रैश कर देते हैं, जिससे अस्थायी नेटवर्क अस्थिरता और कम हैश दर उत्पन्न होती है
explanation: |
  ग्रेगरी मैक्सवेल ने विशेष रूप से चेतावनी दी थी कि प्रदर्शन संबंधी बग, जब कुशलता से तैनात किए जाते हैं, तो नेटवर्क को रणनीतिक रूप से विभाजित करने के लिए इस्तेमाल किए जा सकते हैं - उदाहरण के लिए, 'माइनर A और एक्सचेंज B' को एक विभाजन में अलग करना जबकि बाकी सभी दूसरे में चले जाते हैं, जिससे दोहरे खर्च वाले हमलों के लिए परिस्थितियाँ पैदा होती हैं। यह दर्शाता है कि मामूली दिखने वाले मुद्दों को संभावित रूप से गंभीर क्यों माना जाना चाहिए, क्योंकि उन्हें ऐसे परिष्कृत तरीकों से हथियार बनाया जा सकता है जो तुरंत स्पष्ट नहीं होते।
question: เหตุผลหลักที่บั๊กด้านประสิทธิภาพใน Bitcoin สามารถถูกนำไปใช้เป็นอาวุธเพื่อสร้างการแบ่งเครือข่ายตามที่ผู้เชี่ยวชาญด้านความปลอดภัยกล่าวคืออะไร?
answer: บั๊กด้านประสิทธิภาพสามารถถูกนำมาใช้เชิงกลยุทธ์เพื่อแยกนักขุดและการแลกเปลี่ยนเฉพาะออกจากเครือข่ายที่เหลือ ทำให้สามารถโจมตีแบบใช้จ่ายซ้ำซ้อนได้
wrong_answers:
  - ข้อบกพร่องด้านประสิทธิภาพส่งผลกระทบต่อเวลายืนยันธุรกรรมเป็นหลัก ทำให้เครือข่ายไม่น่าเชื่อถือสำหรับผู้ค้าและผู้ใช้
  - ข้อบกพร่องด้านประสิทธิภาพใช้ทรัพยากรการคำนวณมากเกินไป ทำให้โหนดต้องปิดตัวลงและลดการกระจายอำนาจของเครือข่าย
  - ข้อบกพร่องด้านประสิทธิภาพสร้างการรั่วไหลของหน่วยความจำที่ในที่สุดจะทำให้โหนดล่ม ซึ่งนำไปสู่ความไม่เสถียรของเครือข่ายชั่วคราวและอัตราแฮชที่ลดลง
explanation: |
  Gregory Maxwell เตือนอย่างเฉพาะเจาะจงว่าบั๊กด้านประสิทธิภาพ เมื่อถูกใช้งานอย่างเชี่ยวชาญ สามารถถูกใช้เพื่อแบ่งเครือข่ายอย่างมีกลยุทธ์ได้ - ตัวอย่างเช่น การแยก 'นักขุด A และการแลกเปลี่ยน B' ออกเป็นหนึ่งพาร์ทิชัน ในขณะที่คนอื่นๆ ถูกแยกไปอีกพาร์ทิชันหนึ่ง สร้างเงื่อนไขสำหรับการโจมตีแบบใช้จ่ายซ้ำสองครั้ง สิ่งนี้แสดงให้เห็นว่าทำไมปัญหาที่ดูเหมือนเล็กน้อยควรถูกพิจารณาว่ารุนแรงได้ เนื่องจากสามารถถูกใช้เป็นอาวุธในวิธีที่ซับซ้อนซึ่งไม่ชัดเจนในทันที
reviewed: false
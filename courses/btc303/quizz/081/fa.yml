question: دلیل اصلی که کارشناسان امنیتی معتقدند باگ‌های عملکردی در Bitcoin می‌توانند به طور بالقوه برای ایجاد تقسیم‌بندی شبکه مورد استفاده قرار گیرند چیست؟
answer: باگ‌های عملکردی می‌توانند به‌طور استراتژیک برای جدا کردن ماینرها و صرافی‌های خاص از بقیه شبکه استفاده شوند و حملات دوبار خرج کردن را ممکن سازند.
wrong_answers:
  - باگ‌های عملکردی عمدتاً بر زمان‌های تأیید تراکنش تأثیر می‌گذارند و شبکه را برای بازرگانان و کاربران غیرقابل‌اعتماد می‌کنند.
  - باگ‌های عملکردی منابع محاسباتی بیش از حد مصرف می‌کنند، که باعث خاموش شدن نودها و کاهش تمرکززدایی شبکه می‌شود.
  - باگ‌های عملکردی باعث ایجاد نشت حافظه می‌شوند که در نهایت گره‌ها را خراب می‌کند و منجر به ناپایداری موقت شبکه و کاهش نرخ هش می‌شود.
explanation: |
  گرگوری ماکسول به‌طور خاص هشدار داد که باگ‌های عملکردی، زمانی که به‌طور ماهرانه‌ای به‌کار گرفته شوند، می‌توانند برای تقسیم‌بندی شبکه به‌طور استراتژیک استفاده شوند - به‌عنوان مثال، جدا کردن 'ماینر A و صرافی B' به یک بخش در حالی که بقیه به بخش دیگری می‌روند، شرایطی برای حملات دوبار خرج کردن ایجاد می‌کند. این نشان می‌دهد که چرا مسائل به‌ظاهر جزئی باید به‌عنوان مشکلات بالقوه جدی در نظر گرفته شوند، زیرا می‌توانند به روش‌های پیچیده‌ای که بلافاصله آشکار نیستند، به‌عنوان سلاح استفاده شوند.
reviewed: false

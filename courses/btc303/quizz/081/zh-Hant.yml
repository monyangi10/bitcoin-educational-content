question: 根據安全專家的說法，Bitcoin 的效能 bug 有可能被武器化以建立網路分割區，主要原因是什麼？
answer: 可以策略性地部署效能錯誤，將特定的礦工和交易所與網路的其他部分分開，從而進行雙重花費攻擊
wrong_answers:
  - 效能錯誤主要影響交易確認時間，使商家和使用者無法可靠使用網路
  - 效能錯誤會消耗過多的計算資源，迫使節點關閉，降低網路分散性
  - 效能錯誤會產生記憶體洩漏，最終導致節點當機，導致暫時的網路不穩定和散列率降低
explanation: |
  Gregory Maxwell 特別警告說，如果經過專業部署，效能 bug 可以被用來策略性地分割網路 - 例如將「礦工 A 和交換商 B」分開到一個分割區，而其他人則進入另一個分割區，為雙重花費攻擊創造條件。這說明了為什麼看似次要的問題應當被視為潛在的嚴重問題，因為它們可以用複雜的方式被武器化，而不會立即顯現出來。
reviewed: false

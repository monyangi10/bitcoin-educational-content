question: 根据安全专家的观点，为什么比特币中的性能漏洞可能被利用来制造网络分区攻击？
answer: 性能漏洞可以被有策略地利用，将特定的矿工和交易所与网络其他部分隔离，从而实施双重支付攻击。
wrong_answers:
  - 性能缺陷主要影响交易确认时间，使商家和用户无法可靠地使用网络
  - 性能缺陷会消耗过多计算资源，迫使节点关闭，降低网络去中心化的程度
  - 性能错误会造成内存泄漏，最终导致节点崩溃，造成暂时的网络不稳定和哈希率降低
explanation: |
  Gregory Maxwell 特别警告说，性能漏洞在经过专业部署后，可以被用来对网络进行战略分区--例如，将“矿工 A 与交易所 B”隔离在一个分区，而其他节点处于另一个分区，从而创造出双重支付攻击的条件。这表明即使是看似轻微的问题，也应被视为潜在的严重威胁，因为它们可能以不易察觉的方式被武器化利用。

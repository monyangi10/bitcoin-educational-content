question: Mis on peamine põhjus, et Bitcoin jõudlusvead on turvaekspertide sõnul potentsiaalselt relvana kasutatavad võrgueraldiste loomiseks?
answer: Tulemuslikkuse vigu saab strateegiliselt kasutada, et eraldada konkreetsed kaevandajad ja börsid ülejäänud võrgustikust, võimaldades topeltkulutuste rünnakuid
wrong_answers:
  - Tegevusvigad mõjutavad peamiselt tehingu kinnitamise aega, muutes võrgu kaupmeeste ja kasutajate jaoks ebausaldusväärseks
  - Tulemusvigad tarbivad liigselt arvutusressursse, sundides sõlmi sulgema ja vähendades võrgu detsentraliseeritust
  - Jõudlusvead tekitavad mälulekkeid, mis lõpuks kukutavad sõlmed, põhjustades ajutist võrgu ebastabiilsust ja vähendades hash-kiirust
explanation: |
  Gregory Maxwell hoiatas konkreetselt, et oskuslikult rakendades saab tulemuslikkuse vigu kasutada võrgu strateegiliseks jaotamiseks - näiteks eraldades "kaevandaja A ja vahetuse B" ühte ossa, samal ajal kui kõik teised lähevad teise, luues tingimused topeltkulutuste rünnakuteks. See näitab, miks näiliselt väiksemaid probleeme tuleks käsitleda potentsiaalselt tõsiste probleemidena, kuna neid saab kasutada relvana keerukal viisil, mis ei ole kohe ilmne.
reviewed: false

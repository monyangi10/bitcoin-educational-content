question: セキュリティの専門家によれば、ビットコインのパフォーマンス・バグがネットワーク・パーティションを作成する武器になる可能性がある主な理由は何だろうか？
answer: 性能バグを戦略的に展開することで、特定のマイナーや取引所を他のネットワークから切り離し、二重支払い攻撃を可能にすることができる
wrong_answers:
  - パフォーマンスのバグは主にトランザクションの確認時間に影響し、ネットワークを加盟店やユーザーにとって信頼性の低いものにしている
  - パフォーマンスのバグにより計算リソースが過剰に消費され、ノードがシャットダウンを余儀なくされ、ネットワークの分散化が低下する
  - パフォーマンスのバグによりメモリーリークが生じ、最終的にノードがクラッシュし、一時的にネットワークが不安定になり、ハッシュレートが低下する
explanation: |
  グレゴリー・マクスウェルは特に、パフォーマンス・バグが巧妙に展開された場合、ネットワークを戦略的に分割するために使用することができると警告している。例えば、『マイナーAと取引所B』を1つのパーティションに分け、他の全員が別のパーティションに入ることで、二重支払い攻撃の条件を作り出すことができる。これは、一見些細な問題であっても、すぐに明らかにならない巧妙な方法で武器化される可能性があるため、深刻になる可能性があるものとして扱うべき理由を示している。

question: Je, ni sababu gani ya msingi inayofanya hitilafu za utendakazi katika Bitcoin kuwa na silaha ili kuunda sehemu za mtandao kulingana na wataalamu wa usalama?
answer: Hitilafu za utendakazi zinaweza kutumwa kimkakati ili kutenganisha wachimbaji mahususi na ubadilishanaji kutoka kwa mtandao mwingine, hivyo kuwezesha mashambulizi ya kutumia mara mbili.
wrong_answers:
  - Hitilafu za utendakazi huathiri hasa nyakati za uthibitishaji wa shughuli, na kufanya mtandao kutokuwa wa kutegemewa kwa wafanyabiashara na watumiaji.
  - Hitilafu za utendakazi hutumia rasilimali nyingi za hesabu, na kulazimisha nodi kuzima na kupunguza ugatuaji wa mtandao.
  - Hitilafu za utendakazi huunda uvujaji wa kumbukumbu ambao hatimaye huharibu nodi za kuacha kufanya kazi, na kusababisha kuyumba kwa mtandao kwa muda na kupunguza kasi ya hashi.
explanation: |
  Gregory Maxwell alionya haswa kwamba hitilafu za utendakazi, zinapotumwa kwa ustadi, zinaweza kutumika kugawa mtandao kimkakati - kwa mfano, kutenganisha 'mchimba madini A na kubadilishana B' katika kizigeu kimoja huku kila mtu akienda kwenye nyingine, na hivyo kuunda hali ya mashambulizi ya kutumia mara mbili. Hii inaonyesha ni kwa nini masuala yanayoonekana kuwa madogo yanapaswa kushughulikiwa kuwa magumu zaidi, kwani yanaweza kuwekewa silaha kwa njia za hali ya juu ambazo hazionekani mara moja.
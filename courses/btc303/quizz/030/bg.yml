question: Според гледната точка на Satoshi Nakamoto какъв ефект имат изгубените биткойни върху останалите монети в обращение?
answer: Те правят монетите на всички останали малко по-скъпи като дарение за всички
wrong_answers:
  - Те намаляват сигурността на мрежата, като намаляват общата стойност на наличните награди за mining
  - Те създават дефлационен натиск, който с течение на времето дестабилизира паричната система
  - Те трябва да бъдат заменени чрез допълнителни mining, за да се поддържа предвиденото ниво на снабдяване
explanation: |
  Satoshi Nakamoto обясни, че изгубените монети функционират като дарение за всички останали притежатели на биткойни, като правят техните монети по-ценни поради намаленото ефективно предлагане. Това е положителен дефлационен ефект, а не дестабилизираща сила. Изгубените монети не влияят на възнагражденията по mining, тъй като те идват от новоизсечени монети и транзакционни такси, а не от съществуващото предлагане. Протоколът на Bitcoin не замества изгубените монети - те остават трайно извън обращение, което всъщност облагодетелства останалите притежатели чрез увеличаване на недостига.
reviewed: false

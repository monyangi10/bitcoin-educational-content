question: 根据 Satoshi Nakamoto 的观点，丢失的比特币会对流通中的剩余比特币产生什么影响？
answer: 他们让其他人的硬币价值略微提高，作为对大家的捐赠
wrong_answers:
  - 它们降低了 mining 奖赏的可用总值，从而降低了网络安全性。
  - 它们会造成通货紧缩的压力，从而长期破坏货币体系的稳定
  - 必须通过额外的 mining 进行替换，以保持预定的供应水平
explanation: |
  Satoshi Nakamoto 解释说，丢失的比特币对所有其他比特币持有者起到了捐赠的作用，由于有效供应量减少，他们的比特币变得更有价值。这是一种积极的通货紧缩效应，而不是破坏稳定的力量。丢失的比特币不会影响 mining 的奖励，因为这些奖励来自新铸造的比特币和交易费用，而不是现有的比特币供应量。Bitcoin 的协议不会取代丢失的硬币--它们会永久性地退出流通，这实际上会通过增加稀缺性使剩余的持有者受益。
reviewed: false

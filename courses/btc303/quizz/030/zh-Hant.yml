question: 根據 Satoshi Nakamoto 的觀點，遺失的比特幣對流通中的剩餘比特幣有什麼影響？
answer: 他們讓其他人的硬幣價值稍微提高，作為對大家的捐獻
wrong_answers:
  - 它們會降低 mining 報酬的可用總值，從而降低網路安全性。
  - 它們會造成通貨緊縮的壓力，久而久之會破壞貨幣體系的穩定性。
  - 必須透過額外的 mining 進行更換，以維持預期的供給水平
explanation: |
  Satoshi Nakamoto 解釋說，丟失的錢幣對所有其他比特幣持有者有捐獻的功能，由於有效供應減少，他們的錢幣變得更有價值。這是一種正面的通縮效應，而不是一種不穩定的力量。丟失的比特幣不會影響 mining 的獎勵，因為這些獎勵來自於新鑄造的比特幣和交易費用，而不是來自於現有的供應。Bitcoin 的協定不會取代遺失的硬幣 - 它們會永遠停止流通，這會增加硬幣的稀有性，讓剩餘的硬幣持有者受惠。
reviewed: false

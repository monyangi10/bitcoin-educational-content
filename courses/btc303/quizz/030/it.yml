question: Secondo la prospettiva di Satoshi Nakamoto, che effetto hanno i bitcoin persi sulle altre monete in circolazione?
answer: Fanno sì che le monete di tutti gli altri valgano un po' di più come donazione a tutti
wrong_answers:
  - Riducono la sicurezza della rete diminuendo il valore totale disponibile per le ricompense di mining
  - Creano una pressione deflazionistica che nel tempo destabilizza il sistema monetario
  - Devono essere sostituiti con altro mining per mantenere il livello di fornitura previsto
explanation: |
  Satoshi Nakamoto ha spiegato che le monete perse funzionano come una donazione a tutti gli altri possessori di bitcoin, rendendo le loro monete più preziose a causa della riduzione dell'offerta effettiva. Si tratta di un effetto deflazionistico positivo, non di una forza destabilizzante. Le monete perse non influiscono sulle ricompense del mining, poiché queste provengono dalle monete di nuovo conio e dalle commissioni di transazione, non dall'offerta esistente. Il protocollo di Bitcoin non sostituisce le monete perse: esse rimangono permanentemente fuori dalla circolazione, il che in realtà avvantaggia i detentori rimanenti attraverso una maggiore scarsità.
reviewed: true

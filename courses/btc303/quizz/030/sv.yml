question: Enligt Satoshi Nakamotos perspektiv, vilken effekt har förlorade bitcoins på de återstående mynten i omlopp?
answer: De gör alla andras mynt något mer värda som en donation till alla
wrong_answers:
  - De minskar nätverkssäkerheten genom att minska det totala värdet som är tillgängligt för mining-belöningar
  - De skapar ett deflationistiskt tryck som destabiliserar det monetära systemet över tid
  - De måste ersättas genom ytterligare mining för att upprätthålla den avsedda leveransnivån
explanation: |
  Satoshi Nakamoto förklarade att förlorade mynt fungerar som en donation till alla andra bitcoininnehavare genom att göra deras mynt mer värdefulla på grund av det minskade effektiva utbudet. Detta är en positiv deflationseffekt, inte en destabiliserande kraft. Förlorade mynt påverkar inte mining-belöningar eftersom de kommer från nypräglade mynt och transaktionsavgifter, inte från det befintliga utbudet. Bitcoin:s protokoll ersätter inte förlorade mynt - de förblir permanent ur cirkulation, vilket faktiskt gynnar kvarvarande innehavare genom ökad knapphet.
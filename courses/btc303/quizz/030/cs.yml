question: Jaký vliv mají ztracené bitcoiny podle Satoshi Nakamota na zbývající mince v oběhu?
answer: Díky nim mají mince všech ostatních o něco vyšší hodnotu jako příspěvek všem
wrong_answers:
  - Snižují bezpečnost sítě tím, že snižují celkovou hodnotu, která je k dispozici pro odměny mining
  - Vytvářejí deflační tlak, který časem destabilizuje měnový systém
  - Pro udržení zamýšlené úrovně zásobování je třeba je nahradit dodatečným mining
explanation: |
  Satoshi Nakamoto vysvětlil, že ztracené mince fungují jako dar všem ostatním držitelům bitcoinů, protože jejich mince jsou díky snížené efektivní nabídce hodnotnější. Jedná se o pozitivní deflační efekt, nikoliv o destabilizující sílu. Ztracené mince nemají vliv na odměny mining, protože ty pocházejí z nově vyražených mincí a transakčních poplatků, nikoli ze stávající nabídky. Protokol Bitcoin nenahrazuje ztracené mince - ty zůstávají trvale mimo oběh, z čehož ve skutečnosti těží zbývající držitelé díky zvýšenému nedostatku.

question: जीडब्ल्यू-0 नाकामोतो के दृष्टिकोण के अनुसार, खोए हुए बिटकॉइन का प्रचलन में शेष सिक्कों पर क्या प्रभाव पड़ता है?
answer: वे हर किसी के सिक्कों को दान के रूप में थोड़ा अधिक मूल्यवान बना देते हैं
wrong_answers:
  - वे mining पुरस्कारों के लिए उपलब्ध कुल मूल्य को कम करके नेटवर्क सुरक्षा को कम करते हैं
  - वे अपस्फीतिकारी दबाव पैदा करते हैं जो समय के साथ मौद्रिक प्रणाली को अस्थिर कर देता है
  - इच्छित आपूर्ति स्तर को बनाए रखने के लिए उन्हें अतिरिक्त mining के माध्यम से प्रतिस्थापित किया जाना चाहिए
explanation: |
  Satoshi नाकामोतो ने बताया कि खोए हुए सिक्के अन्य सभी बिटकॉइन धारकों के लिए दान का काम करते हैं क्योंकि ये कम प्रभावी आपूर्ति के कारण उनके सिक्कों को अधिक मूल्यवान बनाते हैं। यह एक सकारात्मक अपस्फीतिकारी प्रभाव है, न कि कोई अस्थिरकारी बल। खोए हुए सिक्के mining के पुरस्कारों को प्रभावित नहीं करते क्योंकि वे नए खनन किए गए सिक्कों और लेनदेन शुल्क से आते हैं, मौजूदा आपूर्ति से नहीं। Bitcoin का प्रोटोकॉल खोए हुए सिक्कों की जगह नहीं लेता - वे स्थायी रूप से प्रचलन से बाहर रहते हैं, जिससे वास्तव में बढ़ी हुई कमी के माध्यम से शेष धारकों को लाभ होता है।

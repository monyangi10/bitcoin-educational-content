question: Satoshi 나카모토의 관점에 따르면, 분실된 비트코인은 유통 중인 나머지 코인에 어떤 영향을 미칠까요?
answer: 다른 모든 사람의 코인을 기부금으로 약간 더 가치 있게 만듭니다
wrong_answers:
  - mining 보상으로 사용할 수 있는 총 가치가 감소하여 네트워크 보안이 저하됩니다
  - 시간이 지남에 따라 통화 시스템을 불안정하게 만드는 디플레이션 압력이 발생합니다
  - 의도한 공급 수준을 유지하려면 추가 mining를 통해 교체해야 합니다
explanation: |
  Satoshi 나카모토는 손실된 코인은 유효 공급량 감소로 인해 코인의 가치를 높여 다른 모든 비트코인 보유자에게 기부하는 역할을 한다고 설명했습니다. 이는 디플레이션이 아닌 긍정적인 디플레이션 효과입니다. 손실된 코인은 기존 공급량이 아닌 새로 발행된 코인과 거래 수수료에서 나오기 때문에 mining 보상에는 영향을 미치지 않습니다. Bitcoin의 프로토콜은 분실된 코인을 대체하지 않으며, 영구적으로 유통되지 않으므로 오히려 희소성이 증가하여 남은 보유자에게 이익이 됩니다.

question: Prema perspektivi Satoshi Nakamota, izgubljeni bitkoini povećavaju vrednost preostalih kovanica u opticaju.
answer: Oni čine da novčići svih ostalih vrede nešto više kao donacija svima
wrong_answers:
  - Oni smanjuju mrežnu sigurnost smanjenjem ukupne vrednosti dostupne za mining nagrade
  - Oni stvaraju deflatorni pritisak koji destabilizuje monetarni sistem tokom vremena
  - Moraju biti zamenjeni dodatnim mining kako bi se održao planirani nivo snabdevanja.
explanation: |
  Satoshi Nakamoto je objasnio da izgubljeni novčići funkcionišu kao donacija svim ostalim vlasnicima bitcoina tako što čine njihove novčiće vrednijim zbog smanjenog efektivnog snabdevanja. Ovo je pozitivan deflatorni efekat, a ne destabilizirajuća sila. Izgubljeni novčići ne utiču na mining nagrade jer one dolaze iz novoizdatih novčića i naknada za transakcije, a ne iz postojećeg snabdevanja. Protokol Bitcoin ne zamenjuje izgubljene novčiće - oni ostaju trajno van opticaja, što zapravo koristi preostalim vlasnicima kroz povećanu oskudicu.

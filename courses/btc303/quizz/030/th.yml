question: ตามมุมมองของ Satoshi Nakamoto, การสูญเสียบิตคอยน์มีผลอย่างไรต่อเหรียญที่เหลืออยู่ในระบบหมุนเวียน?
answer: พวกเขาทำให้เหรียญของคนอื่นๆ มีค่ามากขึ้นเล็กน้อยเป็นการบริจาคให้กับทุกคน
wrong_answers:
  - พวกเขาลดความปลอดภัยของเครือข่ายโดยการลดมูลค่ารวมที่มีอยู่สำหรับรางวัล mining
  - พวกเขาสร้างแรงกดดันจากภาวะเงินฝืดที่ทำให้ระบบการเงินไม่มั่นคงเมื่อเวลาผ่านไป
  - พวกเขาจะต้องถูกแทนที่ด้วย mining เพิ่มเติมเพื่อรักษาระดับการจัดหาที่ตั้งใจไว้
explanation: |
  Satoshi Nakamoto อธิบายว่าเหรียญที่สูญหายทำหน้าที่เป็นการบริจาคให้กับผู้ถือบิตคอยน์คนอื่น ๆ โดยทำให้เหรียญของพวกเขามีมูลค่าเพิ่มขึ้นเนื่องจากอุปทานที่มีประสิทธิภาพลดลง นี่เป็นผลกระทบเงินฝืดในเชิงบวก ไม่ใช่แรงที่ทำให้ไม่เสถียร เหรียญที่สูญหายไม่ส่งผลกระทบต่อรางวัล mining เนื่องจากรางวัลเหล่านั้นมาจากเหรียญที่เพิ่งสร้างใหม่และค่าธรรมเนียมการทำธุรกรรม ไม่ใช่จากอุปทานที่มีอยู่ โปรโตคอลของ Bitcoin ไม่ได้แทนที่เหรียญที่สูญหาย - พวกมันยังคงอยู่นอกการหมุนเวียนอย่างถาวร ซึ่งจริง ๆ แล้วเป็นประโยชน์ต่อผู้ถือที่เหลือผ่านความขาดแคลนที่เพิ่มขึ้น
reviewed: false
question: از دیدگاه Satoshi ناکاموتو، بیت‌کوین‌های گمشده چه تأثیری بر روی سکه‌های باقی‌مانده در گردش دارند؟
answer: آن‌ها ارزش سکه‌های دیگران را کمی بیشتر می‌کنند به عنوان یک اهدا به همه.
wrong_answers:
  - آنها امنیت شبکه را با کاهش ارزش کل موجود برای پاداش‌های mining کاهش می‌دهند.
  - آن‌ها فشار کاهش‌دهنده‌ای ایجاد می‌کنند که به مرور زمان سیستم پولی را بی‌ثبات می‌کند.
  - آنها باید از طریق mining اضافی جایگزین شوند تا سطح عرضه مورد نظر حفظ شود.
explanation: |
  Satoshi ناکاموتو توضیح داد که سکه‌های گمشده به عنوان یک کمک به سایر دارندگان بیت‌کوین عمل می‌کنند، زیرا با کاهش عرضه مؤثر، ارزش سکه‌های آن‌ها را افزایش می‌دهند. این یک اثر مثبت تورم‌زدا است، نه یک نیروی بی‌ثبات‌کننده. سکه‌های گمشده بر پاداش‌های mining تأثیری ندارند زیرا این پاداش‌ها از سکه‌های تازه ضرب‌شده و کارمزدهای تراکنش می‌آیند، نه از عرضه موجود. پروتکل Bitcoin سکه‌های گمشده را جایگزین نمی‌کند - آن‌ها به طور دائمی از گردش خارج می‌شوند، که در واقع به نفع دارندگان باقی‌مانده از طریق افزایش کمیابی است.
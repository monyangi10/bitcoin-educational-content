question: Как, с точки зрения Satoshi Nakamoto, потерянные биткоины влияют на оставшиеся в обращении монеты?
answer: В качестве пожертвования всем остальным они делают их монеты немного дороже
wrong_answers:
  - Они снижают безопасность сети, уменьшая общую стоимость, доступную для вознаграждений mining
  - Они создают дефляционное давление, которое со временем дестабилизирует денежную систему
  - Для поддержания запланированного уровня поставок их необходимо заменять с помощью дополнительных mining
explanation: |
  ГВ-4 Накамото объяснил, что потерянные монеты действуют как пожертвование для всех остальных держателей биткоинов, делая их монеты более ценными из-за сокращения эффективного предложения. Это положительный дефляционный эффект, а не дестабилизирующая сила. Потерянные монеты не влияют на вознаграждение в mining, поскольку оно формируется за счет вновь отчеканенных монет и комиссии за транзакции, а не за счет существующего предложения. Протокол Bitcoin не заменяет потерянные монеты - они навсегда выходят из обращения, что на самом деле выгодно оставшимся держателям за счет увеличения дефицита.
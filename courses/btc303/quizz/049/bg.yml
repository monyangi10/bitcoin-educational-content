question: Според подхода на противниковото мислене коя е основната причина, поради която всички известни слабости в Bitcoin трябва да бъдат отстранени, а не да се приеме определено ниво на риск?
answer: Bitcoin работи в псевдонимна онлайн среда, в която противниците могат да се възползват от слабите места, без да бъдат заловени или подведени под отговорност
wrong_answers:
  - "Формалният модел за сигурност на Bitcoin изисква математическо доказателство, че всички потенциални вектори на атака са елиминирани."
  - Разпределеният характер на Bitcoin означава, че дори малки слабости могат да се превърнат в каскадни откази на цялата система във всички възли
  - "Фиксираното предлагане на Bitcoin прави икономически невъзможно поемането на загуби от успешни атаки, за разлика от традиционните финансови системи."
explanation: |
  Правилният отговор отразява ключовото прозрение на Андрю Поелстра за онлайн системите в сравнение с физическите. За разлика от сградите, където приемаме известен риск и разчитаме на правоприлагащите органи, Bitcoin работи в псевдонимна среда, където нападателите могат да действат без видимост и последствия. Тази фундаментална разлика означава, че всяка известна слабост неизбежно ще бъде използвана, което прави цялостната сигурност по-скоро съществена, отколкото незадължително управление на риска.
reviewed: false

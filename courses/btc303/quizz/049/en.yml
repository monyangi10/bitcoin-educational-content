question: According to the adversarial thinking approach, what is the primary reason why all known weaknesses in Bitcoin must be addressed rather than accepting some level of risk?
answer: Bitcoin operates in a pseudonymous online environment where adversaries can exploit weaknesses without being caught or held accountable
wrong_answers:
  - "Bitcoin's formal security model requires mathematical proof that all potential attack vectors have been eliminated"
  - The distributed nature of Bitcoin means that even small weaknesses can cascade into system-wide failures across all nodes
  - "Bitcoin's fixed supply makes it economically unfeasible to absorb losses from successful attacks unlike traditional financial systems"
explanation: |
  The correct answer reflects Andrew Poelstra's key insight about online systems versus physical ones. Unlike buildings where we accept some risk and rely on law enforcement, Bitcoin operates in a pseudonymous environment where attackers can act without visibility or consequences. This fundamental difference means every known weakness will inevitably be exploited, making comprehensive security essential rather than optional risk management.

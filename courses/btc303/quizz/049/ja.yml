question: 攻撃的思考アプローチによれば、ビットコインの既知の弱点すべてに対処しなければならない最大の理由は何か？
answer: ビットコインは、攻撃者が捕まることなく、また責任を問われることなく弱点を突くことができる偽名オンライン環境で運営されているため
wrong_answers:
  - ビットコインの正式なセキュリティ・モデルは、潜在的な攻撃ベクトルがすべて排除されていることを数学的に証明する必要があるため
  - ビットコインが分散型であることは、小さな弱点がすべてのノードに連鎖してシステム全体の障害につながる可能性があることを意味するため
  - ビットコインは供給量が固定されているため、従来の金融システムとは異なり、攻撃成功による損失を吸収することは経済的に不可能であるため
explanation: |
  正解は、アンドリュー・ポエルストラのオンラインシステムと物理的なシステムについての重要な洞察を反映している。私たちがある程度のリスクを受け入れ、法執行機関に頼る建物とは異なり、ビットコインは攻撃者が可視性や結果なしに行動できる擬似的な環境で運営されている。この根本的な違いは、あらゆる既知の弱点が必然的に悪用されることを意味し、包括的なセキュリティはオプションのリスク管理ではなく、不可欠なものとなる。

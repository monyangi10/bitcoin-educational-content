question: بر اساس رویکرد تفکر خصمانه، دلیل اصلی اینکه چرا باید به تمام نقاط ضعف شناخته شده در Bitcoin پرداخته شود به جای پذیرش سطحی از ریسک چیست؟
answer: Bitcoin در یک محیط آنلاین با نام مستعار فعالیت می‌کند که در آن دشمنان می‌توانند از ضعف‌ها سوءاستفاده کنند بدون اینکه گرفتار شوند یا پاسخگو باشند.
wrong_answers:
  - "مدل امنیتی رسمی Bitcoin نیازمند اثبات ریاضی است که تمامی مسیرهای حمله احتمالی حذف شده‌اند"
  - ماهیت توزیع‌شده Bitcoin به این معناست که حتی ضعف‌های کوچک می‌توانند به شکست‌های سیستم‌گسترده در تمام گره‌ها منجر شوند.
  - "عرض ثابت Bitcoin آن را از نظر اقتصادی غیرممکن می‌سازد که زیان‌های ناشی از حملات موفق را مانند سیستم‌های مالی سنتی جذب کند"
explanation: |
  پاسخ صحیح، بینش کلیدی اندرو پولسترا درباره سیستم‌های آنلاین در مقابل سیستم‌های فیزیکی را منعکس می‌کند. برخلاف ساختمان‌ها که در آن‌ها مقداری ریسک را می‌پذیریم و به اجرای قانون تکیه می‌کنیم، Bitcoin در محیطی با نام مستعار عمل می‌کند که در آن مهاجمان می‌توانند بدون دیده شدن یا پیامدها عمل کنند. این تفاوت اساسی به این معناست که هر ضعف شناخته‌شده‌ای به‌طور اجتناب‌ناپذیری مورد سوءاستفاده قرار خواهد گرفت، و امنیت جامع ضروری است نه مدیریت ریسک اختیاری.
reviewed: false

question: Согласно подходу, основанному на состязательном мышлении, какова основная причина, по которой все известные слабые места в Bitcoin должны быть устранены, а не принят некоторый уровень риска?
answer: Bitcoin работает в псевдонимной онлайн-среде, где противники могут использовать слабые места, не будучи пойманными или привлеченными к ответственности
wrong_answers:
  - "Формальная модель безопасности Bitcoin требует математического доказательства того, что все потенциальные векторы атак устранены"
  - Распределенная природа Bitcoin означает, что даже небольшие слабые места могут привести к отказу всей системы на всех узлах
  - "Фиксированное предложение Bitcoin делает экономически нецелесообразным поглощение потерь от успешных атак, в отличие от традиционных финансовых систем"
explanation: |
  Правильный ответ отражает ключевую мысль Эндрю Поэлстры о сравнении онлайн-систем с физическими. В отличие от зданий, где мы принимаем определенный риск и полагаемся на правоохранительные органы, Bitcoin работает в псевдонимной среде, где злоумышленники могут действовать незаметно и без последствий. Это фундаментальное отличие означает, что каждая известная слабость неизбежно будет использована, что делает комплексную безопасность необходимым, а не дополнительным управлением рисками.
reviewed: false

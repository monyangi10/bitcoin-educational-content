question: 根據對抗性思考方法，必須解決 Bitcoin 中所有已知弱點，而不是接受某種程度風險的主要原因是什麼？
answer: Bitcoin 在偽匿名的線上環境中運作，對手可以利用弱點而不被抓到或追究責任
wrong_answers:
  - 「Bitcoin 的正式安全模型需要數學證明已消除所有潛在的攻擊媒介」
  - Bitcoin 的分散式特性意味著，即使是很小的弱點，也可能連鎖造成跨越所有節點的全系統故障。
  - 「與傳統金融系統不同，Bitcoin 的固定供應使其在經濟上無法吸收成功攻擊所造成的損失」
explanation: |
  正確的答案反映了 Andrew Poelstra 對線上系統與實體系統的主要見解。在建築物中，我們接受一定的風險並依賴執法機關，但 Bitcoin 則不同，它是在一個假名的環境中運作，攻擊者可以在不被察覺或不承擔任何後果的情況下採取行動。這個根本性的差異意味著每個已知的弱點都不可避免地會被利用，因此全面的安全性是必要的，而不是可有可无的風險管理。
question: 根据对抗性思维方法，必须解决 Bitcoin 中所有已知弱点而不是接受某种程度风险的主要原因是什么？
answer: Bitcoin 在匿名在线环境中运行，对手可以利用这些弱点而不被发现或追究责任
wrong_answers:
  - "Bitcoin 的正式安全模型要求用数学方法证明所有潜在的攻击载体都已被消除。
  - Bitcoin 的分布式特性意味着，即使是很小的弱点，也可能导致所有节点出现全系统故障
  - "与传统金融系统不同，Bitcoin 的固定供应量使其在经济上无法吸收攻击成功造成的损失"
explanation: |
  正确答案反映了安德鲁-波尔斯特拉（Andrew Poelstra）关于在线系统与实体系统的关键见解。与我们接受一定风险并依赖执法的建筑物不同，Bitcoin 是在一个匿名环境中运行的，攻击者可以在不被察觉或不承担后果的情况下采取行动。这一本质区别意味着每个已知的弱点都将不可避免地被利用，这就使得全面的安全管理变得必不可少，而不是可有可无。
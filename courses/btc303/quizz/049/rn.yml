question: Dushingiye ku buryo bwo kwiyumvira bw’abansi, ni imvo nyamukuru iyihe ituma intege nke zose zizwi muri Bitcoin zitegerezwa gutorwa umuti aho kwemera urugero runaka rw’akaga?
answer: Bitcoin ikorera mu kibanza co kuri Internet c’amazina y’uruyeri aho abansi bashobora gukoresha intege nke batafashwe canke ngo babazwe .
wrong_answers:
  - "Icitegererezo c'umutekano ca Bitcoin gisaba ikimenyamenya c'imibare c'uko ibitero vyose bishobora gutera vyakuweho"
  - Uko Bitcoin ikwiragiye bisigura ko mbere n’intege nke ntoyi zishobora gutera zigahinduka ukunanirwa kw’urutonde rwose mu bice vyose .
  - "Ivyo Bitcoin itanga bihoraho bituma mu vy'ubutunzi bidashoboka gufata ibihombo biva ku bitero vyiza bitandukanye n'uburyo bwa kera bw'ivy'ubutunzi"
explanation: |
  Inyishu ibereye yerekana ubumenyi nyamukuru bwa Andrew Poelstra ku bijanye n’ubuhinga bwo kuri Internet n’ubuhinga bwo ku mubiri. Udakunze inyubakwa aho twemera ingorane zimwe zimwe kandi twizigira abajejwe gukurikiza amategeko, Bitcoin ikorera mu kibanza c’amazina y’uruyeri aho abatera bashobora gukora ataco babona canke ngo bagire ingaruka. Iryo tandukaniro ry’ishimikiro risobanura ko intege nke zose zizwi zizokoreshwa ata kabuza, bigatuma umutekano wuzuye uba ngombwa aho gucungera ingorane ataco bimaze.

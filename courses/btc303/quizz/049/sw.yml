question: Kulingana na mkabala wa kufikiria pinzani, ni sababu gani ya msingi kwa nini udhaifu wote unaojulikana katika Bitcoin lazima ushughulikiwe badala ya kukubali kiwango fulani cha hatari?
answer: Bitcoin hufanya kazi katika mazingira ya mtandaoni yasiyojulikana ambapo wapinzani wanaweza kutumia udhaifu bila kukamatwa au kuwajibishwa.
wrong_answers:
  - "Mtindo rasmi wa usalama wa Bitcoin unahitaji uthibitisho wa kihisabati kwamba vekta zote zinazoweza kushambulia zimeondolewa"
  - Asili iliyosambazwa ya Bitcoin inamaanisha kuwa hata udhaifu mdogo unaweza kuingia katika kushindwa kwa mfumo mzima kwenye nodi zote.
  - "Ugavi wa kudumu wa Bitcoin hufanya iwe vigumu kiuchumi kuchukua hasara kutokana na mashambulizi yaliyofanikiwa tofauti na mifumo ya jadi ya kifedha"
explanation: |
  Jibu sahihi linaonyesha ufahamu muhimu wa Andrew Poelstra kuhusu mifumo ya mtandaoni dhidi ya ile ya kimwili. Tofauti na majengo ambapo tunakubali hatari fulani na kutegemea sheria, Bitcoin hufanya kazi katika mazingira yasiyojulikana ambapo wavamizi wanaweza kutenda bila kuonekana au matokeo. Tofauti hii ya kimsingi inamaanisha kuwa kila udhaifu unaojulikana utatumiwa vibaya, na hivyo kufanya usalama wa kina kuwa muhimu badala ya usimamizi wa hatari wa hiari.

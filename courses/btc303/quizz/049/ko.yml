question: 적대적 사고 접근법에 따르면, Bitcoin의 알려진 모든 약점을 어느 정도의 위험을 감수하는 대신 해결해야 하는 주된 이유는 무엇인가요?
answer: Bitcoin은 공격자가 적발되거나 책임을 지지 않고 약점을 악용할 수 있는 익명의 온라인 환경에서 작동합니다
wrong_answers:
  - "Bitcoin의 공식 보안 모델은 모든 잠재적 공격 벡터가 제거되었다는 수학적 증명이 필요합니다."
  - Bitcoin의 분산된 특성으로 인해 작은 취약점도 모든 노드에서 시스템 전체 장애로 연쇄적으로 발생할 수 있습니다
  - "Bitcoin는 공급이 고정되어 있어 기존 금융 시스템과 달리 공격 성공으로 인한 손실을 경제적으로 흡수할 수 없습니다."
explanation: |
  정답은 온라인 시스템과 물리적 시스템에 대한 앤드류 포엘스트라의 핵심 인사이트를 반영한 것입니다. 어느 정도 위험을 감수하고 법 집행 기관에 의존하는 건물과 달리 Bitcoin는 공격자가 가시성이나 결과 없이 행동할 수 있는 익명의 환경에서 운영됩니다. 이러한 근본적인 차이로 인해 알려진 모든 약점이 악용될 수밖에 없으므로 포괄적인 보안은 위험 관리의 선택이 아닌 필수입니다.
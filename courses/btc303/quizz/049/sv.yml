question: Vad är det främsta skälet till att alla kända svagheter i Bitcoin måste åtgärdas i stället för att acceptera en viss risknivå, enligt det kontradiktoriska synsättet?
answer: Bitcoin verkar i en pseudonym onlinemiljö där motståndare kan utnyttja svagheter utan att bli upptäckta eller ställda till svars
wrong_answers:
  - "Bitcoin:s formella säkerhetsmodell kräver matematiskt bevis för att alla potentiella attackvektorer har eliminerats"
  - Bitcoin:s distribuerade natur innebär att även små svagheter kan leda till systemomfattande fel i alla noder
  - "Bitcoin:s fasta tillgång gör det ekonomiskt ogenomförbart att absorbera förluster från framgångsrika attacker till skillnad från traditionella finansiella system"
explanation: |
  Det korrekta svaret återspeglar Andrew Poelstras viktigaste insikt om onlinesystem jämfört med fysiska system. Till skillnad från byggnader där vi accepterar en viss risk och förlitar oss på brottsbekämpning, verkar Bitcoin i en pseudonym miljö där angripare kan agera utan insyn eller konsekvenser. Denna grundläggande skillnad innebär att varje känd svaghet oundvikligen kommer att utnyttjas, vilket gör omfattande säkerhet till en nödvändighet snarare än en valfri riskhantering.
question: प्रतिकूल चिंतन दृष्टिकोण के अनुसार, प्राथमिक कारण क्या है कि Bitcoin में सभी ज्ञात कमजोरियों को संबोधित किया जाना चाहिए, न कि कुछ स्तर का जोखिम स्वीकार किया जाना चाहिए?
answer: Bitcoin एक छद्म नाम वाले ऑनलाइन वातावरण में काम करता है, जहाँ विरोधी पकड़े जाने या जवाबदेह ठहराए बिना कमजोरियों का फायदा उठा सकते हैं
wrong_answers:
  - "Bitcoin के औपचारिक सुरक्षा मॉडल के लिए गणितीय प्रमाण की आवश्यकता है कि सभी संभावित आक्रमणकारी वेक्टरों को समाप्त कर दिया गया है"
  - Bitcoin की वितरित प्रकृति का अर्थ है कि छोटी-छोटी कमज़ोरियाँ भी सभी नोड्स में सिस्टम-व्यापी विफलताओं का कारण बन सकती हैं
  - "Bitcoin की निश्चित आपूर्ति के कारण पारंपरिक वित्तीय प्रणालियों के विपरीत सफल हमलों से होने वाले नुकसान को सहना आर्थिक रूप से अव्यवहारिक है।"
explanation: |
  सही उत्तर एंड्रयू पोल्स्ट्रा की ऑनलाइन बनाम भौतिक प्रणालियों के बारे में महत्वपूर्ण अंतर्दृष्टि को दर्शाता है। इमारतों के विपरीत, जहाँ हम कुछ जोखिम स्वीकार करते हैं और कानून प्रवर्तन पर निर्भर रहते हैं, Bitcoin एक छद्म नाम वाले वातावरण में काम करता है जहाँ हमलावर बिना किसी दृश्यता या परिणाम के कार्य कर सकते हैं। इस मूलभूत अंतर का अर्थ है कि हर ज्ञात कमज़ोरी का अनिवार्य रूप से फायदा उठाया जाएगा, जिससे व्यापक सुरक्षा वैकल्पिक जोखिम प्रबंधन के बजाय आवश्यक हो जाती है।
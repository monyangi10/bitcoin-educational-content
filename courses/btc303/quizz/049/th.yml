question: ตามแนวคิดการคิดเชิงปฏิปักษ์ เหตุผลหลักที่ทำไมจุดอ่อนทั้งหมดใน Bitcoin ต้องได้รับการแก้ไขแทนที่จะยอมรับระดับความเสี่ยงบางอย่างคืออะไร?
answer: Bitcoin ปฏิบัติการในสภาพแวดล้อมออนไลน์ที่ใช้นามแฝงซึ่งฝ่ายตรงข้ามสามารถใช้ประโยชน์จากจุดอ่อนโดยไม่ถูกจับหรือรับผิดชอบ
wrong_answers:
  - "โมเดลความปลอดภัยอย่างเป็นทางการของ Bitcoin ต้องการการพิสูจน์ทางคณิตศาสตร์ว่าทุกเวกเตอร์การโจมตีที่เป็นไปได้ถูกกำจัดออกไปแล้ว"
  - ลักษณะที่กระจายตัวของ Bitcoin หมายความว่าแม้แต่จุดอ่อนเล็กๆ ก็สามารถลุกลามเป็นความล้มเหลวทั่วทั้งระบบในทุกโหนดได้
  - "อุปทานคงที่ของ Bitcoin ทำให้ไม่สามารถดูดซับความสูญเสียจากการโจมตีที่ประสบความสำเร็จได้ในเชิงเศรษฐกิจ แตกต่างจากระบบการเงินแบบดั้งเดิม"
explanation: |
  คำตอบที่ถูกต้องสะท้อนถึงความเข้าใจที่สำคัญของ Andrew Poelstra เกี่ยวกับระบบออนไลน์เมื่อเทียบกับระบบทางกายภาพ แตกต่างจากอาคารที่เรายอมรับความเสี่ยงบางอย่างและพึ่งพาการบังคับใช้กฎหมาย Bitcoin ดำเนินการในสภาพแวดล้อมที่ไม่ระบุตัวตนซึ่งผู้โจมตีสามารถกระทำการโดยไม่มีการมองเห็นหรือผลกระทบ ความแตกต่างพื้นฐานนี้หมายความว่าจุดอ่อนที่รู้จักทุกจุดจะถูกใช้ประโยชน์อย่างหลีกเลี่ยงไม่ได้ ทำให้การรักษาความปลอดภัยที่ครอบคลุมเป็นสิ่งจำเป็นแทนที่จะเป็นการจัดการความเสี่ยงที่เลือกได้
reviewed: false
question: Hva kreves for å bruke Bitcoin på en tillitsløs måte i henhold til protokollutformingen?
answer: Kjører en fullstendig validerende Bitcoin-node for å verifisere alle blokker og transaksjoner selv
wrong_answers:
  - Bruk av en anerkjent kryptovalutabørs med sterke sikkerhetstiltak og forsikring
  - Stole på flere pålitelige tredjepartstjenester for å kryssverifisere transaksjonsinformasjon
  - Installere verifisert wallet-programvare fra offisielle kilder med digitale signaturer
explanation: |
  For å bruke Bitcoin tillitsløst må du kjøre en fullstendig validerende Bitcoin-node som uavhengig verifiserer at alle blokker følger konsensusreglene, kontrollerer tidsplanen for myntutstedelse og forhindrer dobbeltbruk. Dette sikrer at du ikke utkontrakterer verifisering til andre, og opprettholder den tillitsløse egenskapen. Bruk av børser eller tredjepartstjenester betyr at du stoler på at andre forteller deg sannheten om blokkjedetilstanden. Selv om verifisert programvare er viktig for sikkerheten, eliminerer det ikke behovet for din egen valideringsnode for å oppnå ekte tillitsløshet i Bitcoin-systemet.
reviewed: false

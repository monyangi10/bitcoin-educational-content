question: Theo thiết kế giao thức, cần phải có những gì để sử dụng Bitcoin một cách không cần tin cậy?
answer: Chạy một nút Bitcoin xác thực đầy đủ để tự mình xác minh tất cả các khối và giao dịch
wrong_answers:
  - Sử dụng sàn giao dịch tiền điện tử uy tín với các biện pháp bảo mật và bảo hiểm mạnh mẽ
  - Dựa vào nhiều dịch vụ của bên thứ ba đáng tin cậy để xác minh chéo thông tin giao dịch
  - Cài đặt phần mềm wallet đã được xác minh từ các nguồn chính thức có chữ ký số
explanation: |
  Để sử dụng Bitcoin một cách không cần tin cậy, bạn phải chạy một nút Bitcoin xác thực đầy đủ, nút này sẽ tự động xác minh tất cả các khối tuân theo các quy tắc đồng thuận, kiểm tra lịch phát hành coin và ngăn chặn chi tiêu kép. Điều này đảm bảo bạn không thuê ngoài việc xác minh cho người khác, duy trì tính chất không cần tin cậy. Sử dụng các sàn giao dịch hoặc dịch vụ của bên thứ ba đồng nghĩa với việc tin tưởng người khác sẽ cung cấp cho bạn thông tin chính xác về trạng thái blockchain. Mặc dù phần mềm đã được xác minh rất quan trọng đối với bảo mật, nhưng nó không loại bỏ nhu cầu sử dụng nút xác thực của riêng bạn để đạt được tính không cần tin cậy thực sự trong hệ thống Bitcoin.
question: प्रोटोकॉल डिज़ाइन के अनुसार Bitcoin को भरोसेमंद तरीके से उपयोग करने के लिए क्या आवश्यक है?
answer: सभी ब्लॉकों और लेन-देनों को स्वयं सत्यापित करने के लिए पूर्णतः मान्य Bitcoin नोड चलाना
wrong_answers:
  - मजबूत सुरक्षा उपायों और बीमा के साथ एक प्रतिष्ठित क्रिप्टोकरेंसी एक्सचेंज का उपयोग करना
  - लेन-देन की जानकारी को क्रॉस-सत्यापित करने के लिए कई विश्वसनीय तृतीय-पक्ष सेवाओं पर निर्भर रहना
  - डिजिटल हस्ताक्षरों के साथ आधिकारिक स्रोतों से सत्यापित wallet सॉफ़्टवेयर स्थापित करना
explanation: |
  Bitcoin का भरोसेमंद तरीके से इस्तेमाल करने के लिए, आपको एक पूरी तरह से मान्य Bitcoin नोड चलाना होगा जो स्वतंत्र रूप से सभी ब्लॉकों की पुष्टि करता हो और सर्वसम्मति नियमों का पालन करता हो, कॉइन जारी करने के शेड्यूल की जाँच करता हो, और दोहरे खर्च को रोकता हो। यह सुनिश्चित करता है कि आप सत्यापन का काम दूसरों को न सौंपें, जिससे भरोसेमंद गुण बना रहे। एक्सचेंज या तृतीय-पक्ष सेवाओं का उपयोग करने का अर्थ है ब्लॉकचेन की स्थिति के बारे में सच्चाई बताने के लिए दूसरों पर भरोसा करना। हालाँकि सत्यापित सॉफ़्टवेयर सुरक्षा के लिए महत्वपूर्ण है, लेकिन यह Bitcoin सिस्टम में वास्तविक भरोसेमंदता हासिल करने के लिए आपके अपने सत्यापन नोड की आवश्यकता को समाप्त नहीं करता है।
reviewed: false

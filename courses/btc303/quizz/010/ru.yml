question: Что требуется для использования Bitcoin без доверия в соответствии с дизайном протокола?
answer: Запуск полностью валидирующего узла Bitcoin для самостоятельной проверки всех блоков и транзакций
wrong_answers:
  - Использование авторитетной криптовалютной биржи с надежными мерами безопасности и страхованием
  - Использование нескольких доверенных сторонних сервисов для перекрестной проверки информации о транзакциях
  - Установка проверенного программного обеспечения wallet из официальных источников с цифровыми подписями
explanation: |
  Чтобы использовать Bitcoin без доверия, вы должны запустить полностью верифицирующий узел Bitcoin, который независимо проверяет, что все блоки соответствуют правилам консенсуса, проверяет график выпуска монет и предотвращает двойные траты. Это гарантирует, что вы не передадите верификацию другим, сохраняя свойство недоверия. Использование бирж или сторонних сервисов означает, что вы доверяете другим людям говорить вам правду о состоянии блокчейна. Хотя верифицированное программное обеспечение важно для безопасности, оно не отменяет необходимости в собственном узле верификации для достижения истинной бездоверенности в системе Bitcoin.
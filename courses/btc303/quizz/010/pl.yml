question: Co jest wymagane do korzystania z Bitcoin w sposób pozbawiony zaufania zgodnie z projektem protokołu?
answer: Uruchomienie w pełni walidującego węzła Bitcoin w celu samodzielnej weryfikacji wszystkich bloków i transakcji
wrong_answers:
  - Korzystanie z renomowanej giełdy kryptowalut z silnymi środkami bezpieczeństwa i ubezpieczeniem
  - Poleganie na wielu zaufanych usługach stron trzecich w celu wzajemnej weryfikacji informacji o transakcjach
  - Instalowanie zweryfikowanego oprogramowania wallet z oficjalnych źródeł z podpisami cyfrowymi
explanation: |
  Aby korzystać z Bitcoin bez zaufania, musisz uruchomić w pełni walidujący węzeł Bitcoin, który niezależnie weryfikuje, czy wszystkie bloki są zgodne z zasadami konsensusu, sprawdza harmonogram emisji monet i zapobiega podwójnym wydatkom. Gwarantuje to, że nie zlecasz weryfikacji innym podmiotom, utrzymując właściwość braku zaufania. Korzystanie z giełd lub usług stron trzecich oznacza zaufanie innym, że powiedzą ci prawdę o stanie łańcucha bloków. Chociaż zweryfikowane oprogramowanie jest ważne dla bezpieczeństwa, nie eliminuje ono potrzeby posiadania własnego węzła walidacyjnego, aby osiągnąć prawdziwą niezawodność w systemie Bitcoin.

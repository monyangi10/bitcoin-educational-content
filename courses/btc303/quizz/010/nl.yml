question: Wat is er nodig om Bitcoin op een vertrouwensloze manier te gebruiken volgens het protocolontwerp?
answer: Een volledig validerende Bitcoin node draaien om alle blokken en transacties zelf te verifiëren
wrong_answers:
  - Een gerenommeerde cryptocurrency exchange gebruiken met sterke beveiligingsmaatregelen en verzekeringen
  - Vertrouwen op meerdere betrouwbare diensten van derden om transactiegegevens kruiselings te verifiëren
  - Geverifieerde wallet software installeren van officiële bronnen met digitale handtekeningen
explanation: |
  Om Bitcoin zonder vertrouwen te gebruiken, moet je een volledig validerende Bitcoin node draaien die onafhankelijk verifieert of alle blokken de consensusregels volgen, het uitgifteschema van munten controleert en dubbele uitgaven voorkomt. Dit zorgt ervoor dat je de verificatie niet uitbesteedt aan anderen, waardoor de vertrouwensloze eigenschap behouden blijft. Het gebruik van exchanges of diensten van derden betekent dat je erop vertrouwt dat anderen je de waarheid vertellen over de toestand van de blockchain. Hoewel geverifieerde software belangrijk is voor de veiligheid, elimineert het niet de noodzaak voor uw eigen validatieknooppunt om echte vertrouwensloosheid in het Bitcoin systeem te bereiken.

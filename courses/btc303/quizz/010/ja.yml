question: プロトコル設計に従ってBitcoinをトラストレスに使うために必要なことは？
answer: Bitcoinノードを完全に検証し、すべてのブロックとトランザクションを自分で検証する。
wrong_answers:
  - 強固なセキュリティ対策と保険を備えた、信頼できる暗号通貨取引所を利用する。
  - 取引情報を相互検証するために、複数の信頼できる第三者サービスに依存する。
  - デジタル署名のある公式ソースから検証済みのwalletソフトウェアをインストールする
explanation: |
  Bitcoinをトラストレスに利用するためには、すべてのブロックがコンセンサスルールに従っていることを独自に検証し、コインの発行スケジュールをチェックし、二重支出を防ぐ完全検証型のBitcoinノードを実行する必要があります。これにより、検証を外部に委託することなく、トラストレスの特性を維持することができます。取引所やサードパーティのサービスを利用するということは、ブロックチェーンの状態について真実を教えてくれる他者を信頼するということです。検証済みソフトウェアはセキュリティ上重要ですが、Bitcoinシステムで真のトラストレスを達成するために、独自の検証ノードの必要性を排除するものではありません。
reviewed: false

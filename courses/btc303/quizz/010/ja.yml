question: プロトコル設計に従ってビットコインをトラストレスに使うために必要なことは？
answer: ビットコインノードを完全に検証し、すべてのブロックとトランザクションを自分で検証すること
wrong_answers:
  - 強固なセキュリティ対策と保険を備えた、信頼できる暗号通貨取引所を利用すること
  - 取引情報を相互検証するために、複数の信頼できる第三者サービスに依存すること
  - デジタル署名のある公式ソースから検証済みウォレット・ソフトウェアをインストールすること
explanation: |
  ビットコインをトラストレスに利用するためには、すべてのブロックがコンセンサスルールに従っていることを自ら検証し、コインの発行スケジュールをチェックし、二重支払いを防ぐ完全検証型のビットコインノードを実行する必要があります。これにより、検証を外部に委託することなく、トラストレスの特性を維持することができます。取引所やサードパーティのサービスを利用するということは、ブロックチェーンの状態について真実を教えてくれる他者を信頼するということです。検証済みソフトウェアはセキュリティ上重要ですが、ビットコインシステムで真のトラストレスを達成するために、独自の検証ノードの必要性を排除するものではありません。

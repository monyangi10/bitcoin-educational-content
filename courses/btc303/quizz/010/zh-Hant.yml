question: 根據通訊協定設計，以無信賴的方式使用 Bitcoin 需要哪些條件？
answer: 執行完全驗證的 Bitcoin 節點，自行驗證所有區塊和交易
wrong_answers:
  - 使用具有強大安全措施和保險的知名加密貨幣交易所
  - 依賴多個可信賴的第三方服務來交叉驗證交易資訊
  - 安裝經認證的 wallet 軟體，該軟體來自具有數位簽章的官方來源
explanation: |
  若要無信任地使用 Bitcoin，您必須運行一個完全驗證的 Bitcoin 節點，該節點會獨立驗證所有區塊是否遵循共識規則、檢查硬幣發行時間表，並防止雙重花費。這可確保您不會將驗證外包給他人，以維持無信任屬性。使用交易所或第三方服務意味著相信他人會告訴您區塊鏈狀態的真相。雖然驗證軟體對安全性很重要，但並不能消除您自己的驗證節點，以達到 Bitcoin 系統的真正無信任。
reviewed: false

question: برای استفاده از Bitcoin به صورت بدون نیاز به اعتماد طبق طراحی پروتکل، چه چیزی لازم است؟
answer: اجرای یک نود Bitcoin با اعتبارسنجی کامل برای تأیید تمام بلوک‌ها و تراکنش‌ها به‌صورت شخصی
wrong_answers:
  - استفاده از یک صرافی معتبر ارز دیجیتال با تدابیر امنیتی قوی و بیمه
  - اتکا به چندین خدمات شخص ثالث معتبر برای تأیید متقابل اطلاعات تراکنش
  - نصب نرم‌افزار تأیید شده wallet از منابع رسمی با امضاهای دیجیتال
explanation: |
  برای استفاده از Bitcoin به صورت بدون نیاز به اعتماد، باید یک نود Bitcoin کاملاً معتبر را اجرا کنید که به‌طور مستقل تأیید می‌کند تمام بلاک‌ها از قوانین اجماع پیروی می‌کنند، برنامه انتشار سکه را بررسی می‌کند و از دوبار خرج کردن جلوگیری می‌کند. این کار تضمین می‌کند که تأیید را به دیگران واگذار نمی‌کنید و خاصیت بدون نیاز به اعتماد را حفظ می‌کنید. استفاده از صرافی‌ها یا خدمات شخص ثالث به معنای اعتماد به دیگران برای گفتن حقیقت درباره وضعیت بلاکچین است. در حالی که نرم‌افزار تأیید شده برای امنیت مهم است، اما نیاز به نود اعتبارسنجی خودتان را برای دستیابی به بی‌اعتمادی واقعی در سیستم Bitcoin از بین نمی‌برد.
reviewed: false

question: 根据协议设计，以无信任方式使用 Bitcoin 需要哪些条件？
answer: 运行完全验证型 Bitcoin 节点，自行验证所有区块和交易
wrong_answers:
  - 使用具有强大安全措施和保险的知名加密货币交易所
  - 依靠多个可信的第三方服务交叉验证交易信息
  - 从官方来源安装经过验证并带有数字签名的 wallet 软件
explanation: |
  要无信任地使用 Bitcoin，您必须运行一个完全验证的 Bitcoin 节点，该节点可独立验证所有区块是否遵循共识规则、检查硬币发行时间表并防止重复支出。这样可以确保您不会将验证工作外包给他人，从而保持无信任属性。使用交易所或第三方服务意味着相信他人会告诉你区块链状态的真相。虽然经过验证的软件对安全性很重要，但它并不能消除你对自己的验证节点的需求，从而在 Bitcoin 系统中实现真正的无信任。
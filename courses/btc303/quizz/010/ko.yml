question: 프로토콜 설계에 따라 신뢰가 필요 없는 방식으로 Bitcoin을 사용하려면 무엇이 필요하나요?
answer: 모든 블록과 트랜잭션을 직접 검증하기 위해 완전 검증 Bitcoin 노드를 실행합니다
wrong_answers:
  - 강력한 보안 조치와 보험을 갖춘 평판이 좋은 암호화폐 거래소 이용하기
  - 신뢰할 수 있는 여러 타사 서비스에 의존하여 거래 정보를 교차 검증합니다
  - 디지털 서명이 있는 공식 출처의 검증된 wallet 소프트웨어 설치
explanation: |
  Bitcoin를 신뢰 없이 사용하려면 모든 블록이 합의 규칙을 따르는지 독립적으로 검증하고, 코인 발행 일정을 확인하고, 이중 지출을 방지하는 완전 검증 Bitcoin 노드를 실행해야 합니다. 이렇게 하면 다른 사람에게 검증을 아웃소싱하지 않고 신뢰할 수 없는 자산을 유지할 수 있습니다. 거래소나 타사 서비스를 사용한다는 것은 블록체인 상태에 대한 진실을 알려줄 다른 사람을 신뢰한다는 의미입니다. 검증된 소프트웨어는 보안에 중요하지만, Bitcoin 시스템에서 진정한 무신뢰성을 달성하기 위해 자체 검증 노드의 필요성을 없애지는 못합니다.

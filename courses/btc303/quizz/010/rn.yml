question: Ni igiki gikenewe kugira ngo umuntu akoreshe Bitcoin mu buryo butagira icizigiro hakurikijwe umugambi w’amasezerano?
answer: Gukoresha urudodo rwa Bitcoin rwemeza neza kugira ngo ugenzure amabuye yose n'ibikorwa vyose wewe nyene
wrong_answers:
  - Gukoresha ubucuruzi bw'amahera y'ibanga buzwi cane bufise ingingo zikomeye zo gucungera umutekano n'ubwishingizi
  - Kwizigira serivisi nyinshi zizewe z'uwundi muntu kugira ngo usuzume amakuru y'ibikorwa
  - Gushiramwo porogaramu ya wallet yagenzuwe iva ku masoko yemewe n'imikono ya digitale
explanation: |
  Kugira ngo ukoreshe Bitcoin ata kwizigira, utegerezwa gukoresha urudodo rwa Bitcoin rwemeza rwose rugenzura rwigenga amabuye yose akurikiza amategeko y’uguhurizako, rugenzura urutonde rwo gutanga ibiceri, kandi rugabuza gukoresha amahera kabiri. Ivyo bituma udatanga ivy’ugusuzuma ku bandi, ugakomeza umutungo utagira icizigiro. Gukoresha ubuhinga bwo guhinduranya canke ibikorwa vy’abandi bisigura kwizigira abandi ngo bakubwire ukuri ku bijanye n’igihugu ca blockchain. Naho porogarama zigenzuwe zihambaye ku mutekano, ntizikuraho ivy’uko ukeneye urudodo rwawe bwite rwo kwemeza kugira ngo ushikire ukutagira icizigiro nyakuri muri sisitemu ya Bitcoin.

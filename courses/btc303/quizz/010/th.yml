question: อะไรที่จำเป็นต้องใช้ Bitcoin ในลักษณะที่ไม่ต้องเชื่อถือกันตามการออกแบบโปรโตคอล?
answer: การรันโหนด Bitcoin ที่ตรวจสอบความถูกต้องอย่างเต็มรูปแบบเพื่อยืนยันบล็อกและธุรกรรมทั้งหมดด้วยตัวคุณเอง
wrong_answers:
  - การใช้แพลตฟอร์มแลกเปลี่ยนสกุลเงินดิจิทัลที่มีชื่อเสียงพร้อมมาตรการรักษาความปลอดภัยที่แข็งแกร่งและการประกันภัย
  - การพึ่งพาบริการบุคคลที่สามที่เชื่อถือได้หลายแห่งเพื่อยืนยันข้อมูลการทำธุรกรรมข้ามกัน
  - ติดตั้งซอฟต์แวร์ wallet ที่ผ่านการตรวจสอบจากแหล่งที่เป็นทางการพร้อมลายเซ็นดิจิทัล
explanation: |
  ในการใช้ Bitcoin โดยไม่ต้องพึ่งพาความไว้วางใจ คุณต้องรันโหนด Bitcoin ที่ตรวจสอบความถูกต้องอย่างเต็มที่ ซึ่งจะตรวจสอบบล็อกทั้งหมดอย่างอิสระว่าปฏิบัติตามกฎฉันทามติ ตรวจสอบตารางการออกเหรียญ และป้องกันการใช้จ่ายซ้ำ สิ่งนี้ทำให้มั่นใจได้ว่าคุณจะไม่ส่งต่อการตรวจสอบไปยังผู้อื่น รักษาคุณสมบัติที่ไม่ต้องพึ่งพาความไว้วางใจ การใช้การแลกเปลี่ยนหรือบริการของบุคคลที่สามหมายถึงการไว้วางใจผู้อื่นในการบอกความจริงเกี่ยวกับสถานะของบล็อกเชน แม้ว่าซอฟต์แวร์ที่ผ่านการตรวจสอบแล้วจะมีความสำคัญต่อความปลอดภัย แต่ก็ไม่สามารถขจัดความจำเป็นในการมีโหนดการตรวจสอบของคุณเองเพื่อให้บรรลุความไม่ต้องพึ่งพาความไว้วางใจอย่างแท้จริงในระบบ Bitcoin
reviewed: false
question: Ni ikihe kintu nyamukuru kiranga inzira y’iterambere rya Bitcoin gituma ishobora gushikirwa canecane n’ubuhinga bwo kwinjira mu gihugu buvugwa mu bitabu vy’ugusambura mu gihe c’intambara?
answer: Iterambere rya Bitcoin ryugururiye umuntu wese kugira uruharamwo ata barinzi b'irembo .
wrong_answers:
  - Iterambere rya Bitcoin ryishimikije umugwi mutoyi w'abajejwe ivy'ubuhinga bw'ishimikiro bizigirwa
  - Iterambere rya Bitcoin risaba kwemezwa na Leta kugira ngo hagire amahinduka akomeye
  - Iterambere rya Bitcoin rikoresha kode y'inkomoko yugarijwe igabanya intererano zo hanze
explanation: |
  Inzira y’iterambere ry’abantu bose ya Bitcoin, naho ari imwe mu nkomezi zayo zikomeye zo kwegereza ubutegetsi abaturage no gukorera mu mucyo, na yo nyene iratuma haba uguhungabana kw’abansi. Kubera ko umuntu wese ashobora kuja mu biganiro, gutanga ivyiyumviro vy’ihinduka, no kwifatanya n’ivyo gusubiramwo ataco akeneye uruhusha canke ivyemezo, abatera bitanze barashobora gukoresha ukwo gufunguka. Bashobora guhagarika iterambere biciye mu kwitwararika bitagira iherezo ku bibazo bitagira akamaro, bagahanahana amakuru ku majambo nyayo, bagasubiramwo ibiganiro vyatunganijwe, canke bagakoresha ‘ibitero vya Sybil mu kibano’ bakoresheje akaranga kenshi k’ibinyoma kugira ngo bareme ivyiyumviro vy’ikinyoma vy’ukurwanya. Ukwo gufungura gutandukanye cane n’ibigereranyo vy’iterambere vyugarijwe bifise abacungera amarembo canke uburyo bwo kwemeza bushobora gucungera abakozi babi.
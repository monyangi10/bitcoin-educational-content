question: ویژگی کلیدی فرآیند توسعه Bitcoin که آن را به‌ویژه در برابر تاکتیک‌های نفوذی که در کتابچه‌های راهنمای خرابکاری زمان جنگ توصیف شده‌اند آسیب‌پذیر می‌کند چیست؟
answer: توسعه Bitcoin برای هر کسی بدون نگهبانان باز است تا در آن شرکت کند.
wrong_answers:
  - توسعه Bitcoin به گروه کوچکی از نگهدارندگان اصلی مورد اعتماد متکی است
  - توسعه Bitcoin نیاز به تأیید رسمی دولت برای تغییرات عمده دارد
  - توسعه Bitcoin از کد منبع بسته استفاده می‌کند که مشارکت‌های خارجی را محدود می‌کند.
explanation: |
  فرآیند توسعه باز Bitcoin، در حالی که یکی از بزرگترین نقاط قوت آن برای تمرکززدایی و شفافیت است، همچنین باعث ایجاد آسیب‌پذیری در برابر نفوذ دشمنانه می‌شود. از آنجا که هر کسی می‌تواند در بحث‌ها شرکت کند، تغییرات را پیشنهاد دهد و در فرآیند بررسی بدون نیاز به مجوز یا مدارک شرکت کند، مهاجمان متعهد می‌توانند از این باز بودن سوءاستفاده کنند. آنها می‌توانند با نگرانی‌های بی‌پایان درباره مسائل نامربوط، چانه‌زنی بر سر واژه‌پردازی‌های دقیق، تکرار بحث‌های حل‌شده، یا استفاده از 'حملات اجتماعی Sybil' با استفاده از هویت‌های جعلی متعدد برای ایجاد تصورات نادرست از مقاومت، پیشرفت را متوقف کنند. این باز بودن به شدت با مدل‌های توسعه بسته که دارای نگهبانان یا فرآیندهای تأیید هستند که می‌توانند بازیگران بد را فیلتر کنند، در تضاد است.
reviewed: false

question: Quelle caractéristique clé du processus de développement du Bitcoin le rend particulièrement vulnérable aux tactiques d'infiltration décrites dans les manuels de sabotage en temps de guerre ?
answer: Le développement de Bitcoin est ouvert à tous, sans passer par des gardiens
wrong_answers:
  - Le développement de Bitcoin repose sur un petit groupe de mainteneurs de confiance
  - Le développement de Bitcoin nécessite l'approbation formelle du gouvernement pour les changements majeurs
  - Le développement de Bitcoin utilise un code fermé qui limite les contributions externes
explanation: |
  Le processus de développement ouvert du Bitcoin, tout en étant l'une de ses plus grandes forces en matière de décentralisation et de transparence, crée également une vulnérabilité à l'infiltration des adversaires. Puisque tout le monde peut participer aux discussions, proposer des changements et s'engager dans le processus de révision sans avoir besoin de permission ou d'informations d'identification, les attaquants dévoués peuvent exploiter cette ouverture. Ils peuvent bloquer les progrès par des préoccupations interminables sur des questions non pertinentes, marchander sur des formulations précises, réitérer des discussions déjà réglées ou déployer des "attaques sociales Sybil" en utilisant de multiples fausses identités pour créer de fausses impressions de résistance. Cette ouverture contraste fortement avec les modèles de développement fermés qui ont des gardiens ou des processus d'approbation qui pourraient filtrer les mauvais acteurs.
question: Đặc điểm chính nào trong quá trình phát triển Bitcoin khiến nó đặc biệt dễ bị tổn thương trước các chiến thuật xâm nhập được mô tả trong sách hướng dẫn phá hoại thời chiến?
answer: Sự phát triển của Bitcoin mở cửa cho bất kỳ ai tham gia mà không cần người gác cổng
wrong_answers:
  - Sự phát triển của Bitcoin phụ thuộc vào một nhóm nhỏ những người bảo trì cốt lõi đáng tin cậy
  - Sự phát triển của Bitcoin đòi hỏi sự chấp thuận chính thức của chính phủ đối với những thay đổi lớn
  - Quá trình phát triển Bitcoin sử dụng mã nguồn đóng, hạn chế các đóng góp từ bên ngoài
explanation: |
  Quy trình phát triển mở của Bitcoin, mặc dù là một trong những điểm mạnh nhất của nó về tính phi tập trung và minh bạch, nhưng cũng tạo ra lỗ hổng cho sự xâm nhập của đối thủ. Vì bất kỳ ai cũng có thể tham gia thảo luận, đề xuất thay đổi và tham gia vào quá trình đánh giá mà không cần sự cho phép hay thông tin xác thực, những kẻ tấn công chuyên nghiệp có thể lợi dụng tính cởi mở này. Chúng có thể trì hoãn tiến độ bằng cách gây ra những lo ngại liên tục về các vấn đề không liên quan, mặc cả về cách diễn đạt chính xác, nhắc lại các cuộc thảo luận đã được thống nhất, hoặc triển khai "các cuộc tấn công Sybil xã hội" bằng cách sử dụng nhiều danh tính giả để tạo ra ấn tượng sai lệch về sự phản kháng. Tính cởi mở này hoàn toàn trái ngược với các mô hình phát triển đóng, vốn có những người gác cổng hoặc quy trình phê duyệt có thể lọc ra những kẻ xấu.

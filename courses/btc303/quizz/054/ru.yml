question: Какая ключевая особенность процесса разработки Bitcoin делает ее особенно уязвимой для тактики проникновения, описанной в руководствах по диверсиям военного времени?
answer: Разработка Bitcoin открыта для всех желающих и не имеет привратников
wrong_answers:
  - Разработка Bitcoin опирается на небольшую группу доверенных сопровождающих ядра
  - Для разработки Bitcoin требуется официальное разрешение правительства на внесение существенных изменений
  - При разработке Bitcoin используется закрытый исходный код, ограничивающий поступление внешних материалов
explanation: |
  Открытый процесс разработки Bitcoin, являясь одним из его самых сильных сторон в плане децентрализации и прозрачности, также создает уязвимость для проникновения противника. Поскольку любой может участвовать в обсуждениях, предлагать изменения и участвовать в процессе рассмотрения, не требуя разрешения или полномочий, преданные злоумышленники могут воспользоваться этой открытостью. Они могут затормозить прогресс, бесконечно обсуждая несущественные вопросы, споря о точных формулировках, повторяя уже пройденный этап обсуждения, или развернуть "социальные атаки Sybil", используя множество фальшивых имен, чтобы создать ложное впечатление сопротивления. Такая открытость резко контрастирует с закрытыми моделями разработки, в которых есть привратники или процессы утверждения, способные отсеять недобросовестных участников.
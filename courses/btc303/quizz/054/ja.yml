question: ビットコインの開発プロセスで、戦時中の破壊工作マニュアルに記載されている潜入戦術に特に脆弱であるという重要な特徴は何か？
answer: ビットコイン開発は、ゲートキーパーなしで誰でも参加できる
wrong_answers:
  - ビットコイン開発は、信頼できるコアメンテナーの小さなグループに依存している
  - ビットコイン開発では、大幅な変更には政府の正式な承認が必要である
  - ビットコイン開発は、外部からの貢献を制限するクローズドなソースコードを使用している
explanation: |
  ビットコインのオープンな開発プロセスは、非中央集権化と透明性のための最大の長所である一方で、攻撃的な侵入に対する脆弱性も生み出している。誰もが議論に参加し、変更を提案し、許可や証明書を必要とせずにレビュープロセスに関与することができるため、熱心な攻撃者はこのオープン性を悪用することができる。彼らは、無関係な問題に対する際限のない懸念によって進行を遅らせたり、正確な文言をめぐって駆け引きしたり、決着済みの議論を繰り返したり、複数の偽のIDを使って「ソーシャル・シビル攻撃」を展開し、抵抗勢力であるという誤った印象を植え付けたりすることができる。このオープンさは、悪質な行為者を排除するゲートキーパーや承認プロセスを持つクローズドな開発モデルとは対照的である。

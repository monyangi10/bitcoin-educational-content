question: Bitcoin의 개발 과정에서 어떤 주요 특징이 전시 교란 매뉴얼에 설명된 침투 전술에 특히 취약한가?
answer: Bitcoin 개발은 게이트키퍼 없이 누구나 참여할 수 있습니다
wrong_answers:
  - Bitcoin 개발은 신뢰할 수 있는 소수의 핵심 유지보수자 그룹에 의존합니다
  - Bitcoin 개발에는 주요 변경 사항에 대한 정부의 공식 승인이 필요합니다
  - Bitcoin 개발은 외부 기여를 제한하는 비공개 소스 코드를 사용합니다
explanation: |
  Bitcoin의 개방형 개발 프로세스는 탈중앙화와 투명성을 위한 가장 큰 강점 중 하나이지만, 동시에 공격자의 침입에 대한 취약성을 초래하기도 합니다. 누구나 허가나 자격 증명 없이 토론에 참여하고, 변경 사항을 제안하고, 검토 과정에 참여할 수 있기 때문에 전문 공격자는 이러한 개방성을 악용할 수 있습니다. 관련 없는 이슈에 대한 끝없는 우려를 통해 진행을 지연시키거나, 정확한 표현을 놓고 흥정하거나, 합의된 토론을 반복하거나, 여러 개의 가짜 신원을 사용하여 '소셜 시빌 공격'을 전개하여 저항하는 것처럼 거짓 인상을 심어줄 수 있습니다. 이러한 개방성은 나쁜 행위자를 걸러낼 수 있는 게이트키퍼나 승인 프로세스가 있는 폐쇄적인 개발 모델과 극명한 대조를 이룹니다.
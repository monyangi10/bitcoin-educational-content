question: Bitcoin की विकास प्रक्रिया की कौन सी प्रमुख विशेषता इसे युद्धकालीन तोड़फोड़ मैनुअल में वर्णित घुसपैठ की रणनीति के प्रति विशेष रूप से कमजोर बनाती है?
answer: Bitcoin का विकास बिना किसी गेटकीपर के किसी भी व्यक्ति के लिए खुला है।
wrong_answers:
  - Bitcoin विकास विश्वसनीय कोर अनुरक्षकों के एक छोटे समूह पर निर्भर करता है
  - Bitcoin के विकास में बड़े बदलावों के लिए औपचारिक सरकारी अनुमोदन की आवश्यकता है
  - Bitcoin विकास बंद-स्रोत कोड का उपयोग करता है जो बाहरी योगदान को सीमित करता है
explanation: |
  Bitcoin की खुली विकास प्रक्रिया, विकेंद्रीकरण और पारदर्शिता के लिए इसकी सबसे बड़ी खूबियों में से एक होने के साथ-साथ, प्रतिकूल घुसपैठ के प्रति भी संवेदनशील है। चूँकि कोई भी बिना अनुमति या प्रमाण-पत्र के चर्चाओं में भाग ले सकता है, परिवर्तनों का प्रस्ताव रख सकता है और समीक्षा प्रक्रिया में शामिल हो सकता है, इसलिए समर्पित हमलावर इस खुलेपन का फायदा उठा सकते हैं। वे अप्रासंगिक मुद्दों पर अंतहीन चिंताओं के ज़रिए प्रगति को रोक सकते हैं, सटीक शब्दों पर बहस कर सकते हैं, तयशुदा चर्चाओं को दोहरा सकते हैं, या प्रतिरोध का झूठा प्रभाव पैदा करने के लिए कई नकली पहचानों का इस्तेमाल करके 'सोशल सिबिल हमले' कर सकते हैं। यह खुलापन बंद विकास मॉडलों से बिल्कुल अलग है, जिनमें द्वारपाल या अनुमोदन प्रक्रियाएँ होती हैं जो बुरे लोगों को छांट सकती हैं।
question: Bitcoin 開發過程中的哪個關鍵特性使其特別容易受到戰時破壞手冊中描述的滲透策略的影響？
answer: Bitcoin 開發是開放給任何人參與的，沒有守門人
wrong_answers:
  - Bitcoin 的開發仰賴一小群值得信賴的核心維護人員
  - Bitcoin 發展的重大變更需要政府的正式批准
  - Bitcoin 開發使用限制外部貢獻的封閉式原始碼
explanation: |
  Bitcoin 的開放式開發流程是其最大的優勢之一，可以讓開發過程更分散、更透明，但同時也容易受到攻擊者的滲透。由於任何人都可以參與討論、提出變更建議、參與審查過程，而不需要許可或認證，因此專門的攻擊者可以利用這種開放性。他們可以透過無休止地關注不相干的問題、糾纏於精確的措辭、重複已確定的討論，或部署「社群 Sybil 攻擊」，使用多重虛假身份來製造反抗的假象，從而拖延進度。這種開放性與封閉式開發模式形成強烈對比，因為封閉式開發模式設有守門人或核准程序，可以篩選出不良行為者。
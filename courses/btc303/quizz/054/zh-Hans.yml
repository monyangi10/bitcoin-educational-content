question: Bitcoin 在开发过程中的哪个关键特征使其特别容易受到战时破坏手册中描述的渗透战术的影响？
answer: Bitcoin 的开发是开放的，任何人都可以参与，没有把关人
wrong_answers:
  - Bitcoin 的开发依赖于一小群值得信赖的核心维护者
  - Bitcoin 的开发需要政府正式批准重大变更
  - Bitcoin 开发使用封闭源代码，限制外部贡献
explanation: |
  Bitcoin 的开放式开发流程是其去中心化和透明度的最大优势之一，但同时也容易受到敌对势力的渗透。由于任何人都可以参与讨论、提出修改意见并参与审查过程，而无需获得许可或证书，因此专门的攻击者可以利用这种开放性。他们可以通过对不相关问题的无休止的关注、对精确措辞的讨价还价、重申已确定的讨论内容来阻挠进展，或使用多个假身份部署 "社会西比尔攻击"，以制造抵制的假象。这种开放性与封闭的开发模式形成鲜明对比，后者有把关人或审批程序，可以过滤掉不良行为者。
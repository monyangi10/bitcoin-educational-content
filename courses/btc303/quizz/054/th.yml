question: ลักษณะสำคัญใดของกระบวนการพัฒนา Bitcoin ที่ทำให้มันมีความเสี่ยงต่อกลยุทธ์การแทรกซึมที่อธิบายไว้ในคู่มือการก่อวินาศกรรมในช่วงสงคราม?
answer: การพัฒนา Bitcoin เปิดให้ทุกคนเข้าร่วมได้โดยไม่มีผู้คุมกฎ
wrong_answers:
  - การพัฒนา Bitcoin ขึ้นอยู่กับกลุ่มผู้ดูแลหลักที่เชื่อถือได้กลุ่มเล็ก ๆ
  - การพัฒนา Bitcoin ต้องได้รับการอนุมัติอย่างเป็นทางการจากรัฐบาลสำหรับการเปลี่ยนแปลงที่สำคัญ
  - การพัฒนา Bitcoin ใช้โค้ดแบบปิดที่จำกัดการมีส่วนร่วมจากภายนอก
explanation: |
  กระบวนการพัฒนาแบบเปิดของ Bitcoin แม้จะเป็นหนึ่งในจุดแข็งที่สุดสำหรับการกระจายอำนาจและความโปร่งใส แต่ก็สร้างช่องโหว่ต่อการแทรกซึมของฝ่ายตรงข้ามได้ เนื่องจากใครก็ตามสามารถเข้าร่วมการสนทนา เสนอการเปลี่ยนแปลง และมีส่วนร่วมในกระบวนการตรวจสอบโดยไม่ต้องขออนุญาตหรือมีคุณสมบัติ ผู้โจมตีที่มุ่งมั่นสามารถใช้ประโยชน์จากความเปิดกว้างนี้ได้ พวกเขาสามารถชะลอความก้าวหน้าผ่านความกังวลที่ไม่มีที่สิ้นสุดเกี่ยวกับประเด็นที่ไม่เกี่ยวข้อง ต่อรองคำที่แม่นยำ ย้ำการสนทนาที่ได้ข้อสรุปแล้ว หรือใช้ 'การโจมตี Sybil ทางสังคม' โดยใช้ตัวตนปลอมหลายตัวเพื่อสร้างความประทับใจที่ผิดพลาดของการต่อต้าน ความเปิดกว้างนี้แตกต่างอย่างมากกับโมเดลการพัฒนาแบบปิดที่มีผู้คุมหรือกระบวนการอนุมัติที่สามารถกรองผู้กระทำผิดออกไปได้
reviewed: false
question: Коя ключова характеристика на процеса на разработка на Bitcoin го прави особено уязвим за тактиките за проникване, описани в наръчниците за саботаж по време на война?
answer: Разработката на Bitcoin е отворена за всеки, който може да участва в нея, без да има "пазачи"
wrong_answers:
  - Разработката на Bitcoin разчита на малка група доверени поддръжници
  - Разработването на Bitcoin изисква официално одобрение от правителството за големи промени
  - Разработката на Bitcoin използва код със затворен код, който ограничава външния принос
explanation: |
  Отвореният процес на разработване на Bitcoin, макар и да е едно от най-големите предимства за децентрализация и прозрачност, също така създава уязвимост за проникване на противници. Тъй като всеки може да участва в дискусиите, да предлага промени и да участва в процеса на преглед, без да се нуждае от разрешение или пълномощия, специализирани нападатели могат да се възползват от тази откритост. Те могат да забавят напредъка чрез безкрайни опасения по несъществени въпроси, да се пазарят за точни формулировки, да повтарят приключили дискусии или да прилагат "социални атаки на Сибил", използвайки множество фалшиви самоличности, за да създадат фалшиво впечатление за съпротива. Тази отвореност рязко контрастира със затворените модели на развитие, които имат пазачи или процеси на одобрение, които биха могли да филтрират лошите участници.
reviewed: true

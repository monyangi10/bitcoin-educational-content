question: 根據所討論的開放原始碼原則，讓使用者能夠驗證 Bitcoin 軟體「如宣傳般運作」的基本要求是什麼？
answer: 使用者必須可以不受限制地存取他們想要驗證的軟體的原始碼
wrong_answers:
  - 使用者在存取驗證工具前，必須先取得 Bitcoin Core 維護人員的許可
  - 使用者必須支付合理的費用，才能從官方來源取得編譯的驗證二進位檔
  - 使用者必須依賴可信開發人員的加密簽章來驗證軟體行為
explanation: |
  本章明確指出，使用者若要驗證 Bitcoin 軟體「是否如宣傳般運作」，就必須不受限制地取得原始碼。這直接與「不要相信，要驗證」原則和開放原始碼定義對原始碼可用性的要求相連。錯誤的答案違反了核心開放原始碼原則：要求許可違反了自由存取原則，支付費用違反了無成本散佈的要求，而僅依賴簽章則破壞了開放原始碼所提供的透過檢查來驗證的能力。
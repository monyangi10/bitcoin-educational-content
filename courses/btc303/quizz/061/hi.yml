question: वह मूलभूत आवश्यकता क्या है जो उपयोगकर्ताओं को यह सत्यापित करने में सक्षम बनाती है कि Bitcoin सॉफ्टवेयर चर्चा किए गए ओपन सोर्स सिद्धांतों के अनुसार 'विज्ञापित के अनुसार काम करता है'?
answer: उपयोगकर्ताओं को उस सॉफ़्टवेयर के स्रोत कोड तक अप्रतिबंधित पहुंच होनी चाहिए जिसे वे सत्यापित करना चाहते हैं
wrong_answers:
  - सत्यापन टूल तक पहुँचने से पहले उपयोगकर्ताओं को Bitcoin कोर अनुरक्षकों से अनुमति लेनी होगी
  - आधिकारिक स्रोतों से संकलित सत्यापन बाइनरी तक पहुंचने के लिए उपयोगकर्ताओं को उचित शुल्क का भुगतान करना होगा
  - उपयोगकर्ताओं को सॉफ़्टवेयर व्यवहार को मान्य करने के लिए विश्वसनीय डेवलपर्स के क्रिप्टोग्राफ़िक हस्ताक्षरों पर भरोसा करना चाहिए
explanation: |
  अध्याय में स्पष्ट रूप से कहा गया है कि उपयोगकर्ताओं को यह सत्यापित करने के लिए कि Bitcoin सॉफ़्टवेयर 'विज्ञापित के अनुसार काम करता है', उनके पास स्रोत कोड तक अप्रतिबंधित पहुँच होनी चाहिए। यह सीधे तौर पर 'भरोसा मत करो, सत्यापित करो' सिद्धांत और स्रोत कोड की उपलब्धता के लिए ओपन सोर्स परिभाषा की आवश्यकता से जुड़ा है। गलत उत्तर मूल ओपन सोर्स सिद्धांतों का खंडन करते हैं: अनुमति की आवश्यकता मुक्त पहुँच सिद्धांत का उल्लंघन करती है, शुल्क का भुगतान निःशुल्क वितरण आवश्यकता के विपरीत है, और केवल हस्ताक्षरों पर निर्भर रहने से ओपन सोर्स द्वारा प्रदान की जाने वाली सत्यापन-द्वारा-निरीक्षण क्षमता कमज़ोर हो जाती है।
question: ข้อกำหนดพื้นฐานที่ช่วยให้ผู้ใช้สามารถตรวจสอบได้ว่า Bitcoin ซอฟต์แวร์ 'ทำงานตามที่โฆษณาไว้' ตามหลักการของโอเพ่นซอร์สที่กล่าวถึงคืออะไร?
answer: ผู้ใช้ต้องมีสิทธิ์เข้าถึงซอร์สโค้ดของซอฟต์แวร์ที่ต้องการตรวจสอบได้อย่างไม่มีข้อจำกัด
wrong_answers:
  - ผู้ใช้ต้องได้รับอนุญาตจากผู้ดูแลหลักของ Bitcoin ก่อนที่จะเข้าถึงเครื่องมือการตรวจสอบ
  - ผู้ใช้ต้องชำระค่าธรรมเนียมที่สมเหตุสมผลเพื่อเข้าถึงไบนารีการตรวจสอบที่คอมไพล์จากแหล่งที่เป็นทางการ
  - ผู้ใช้ต้องพึ่งพาลายเซ็นดิจิทัลจากนักพัฒนาที่เชื่อถือได้เพื่อยืนยันพฤติกรรมของซอฟต์แวร์
explanation: |
  บทนี้ระบุไว้อย่างชัดเจนว่าเพื่อให้ผู้ใช้สามารถตรวจสอบว่า Bitcoin ซอฟต์แวร์ 'ทำงานตามที่โฆษณาไว้' พวกเขาต้องมีการเข้าถึงซอร์สโค้ดอย่างไม่จำกัด สิ่งนี้เชื่อมโยงโดยตรงกับหลักการ 'อย่าเชื่อ, ตรวจสอบ' และข้อกำหนดของการเปิดเผยซอร์สโค้ดตามนิยามของโอเพ่นซอร์ส คำตอบที่ผิดขัดแย้งกับหลักการพื้นฐานของโอเพ่นซอร์ส: การต้องขออนุญาตละเมิดหลักการการเข้าถึงฟรี, การจ่ายค่าธรรมเนียมขัดแย้งกับข้อกำหนดการแจกจ่ายโดยไม่มีค่าใช้จ่าย, และการพึ่งพาลายเซ็นเพียงอย่างเดียวบ่อนทำลายความสามารถในการตรวจสอบผ่านการตรวจสอบที่โอเพ่นซอร์สให้บริการ
reviewed: false
question: 議論されているオープンソースの原則に従って、Bitcoinのソフトウェアが「宣伝されたとおりに動作する」ことをユーザーが検証できるようにするための基本的な要件は何ですか？
answer: ユーザーは、検証したいソフトウェアのソースコードに無制限にアクセスできなければならない。
wrong_answers:
  - 検証ツールにアクセスする前に、Bitcoinコアのメンテナーの許可を得る必要があります。
  - 公式ソースからコンパイルされた検証用バイナリにアクセスするには、ユーザーは相応の料金を支払わなければならない。
  - ユーザーは、ソフトウェアの動作を検証するために、信頼できる開発者の暗号署名に頼らなければならない。
explanation: |
  この章では、ユーザーがBitcoinソフトウェアが「宣伝されたとおりに動く」ことを検証するためには、ソースコードに無制限にアクセスできなければならないと明言しています。これは、'Don't Trust, Verify'の原則と、オープンソースの定義がソースコードの入手可能性を要求していることに直結します。間違った答えは、オープンソースの核となる原則と矛盾しています。許可を必要とすることは、フリーアクセスの原則に違反し、料金を支払うことは、無償配布の要件と矛盾し、署名のみに依存することは、オープンソースが提供する検査による検証能力を損ないます。

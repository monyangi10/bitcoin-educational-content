question: Кое е основното изискване, което позволява на потребителите да проверят дали софтуерът Bitcoin "работи, както е обявено", в съответствие с обсъжданите принципи на отворения код?
answer: Потребителите трябва да имат неограничен достъп до изходния код на софтуера, който искат да проверят
wrong_answers:
  - Преди да получат достъп до инструментите за проверка, потребителите трябва да получат разрешение от поддръжниците на Bitcoin Core
  - Потребителите трябва да платят разумна такса за достъп до компилираните двоични файлове за проверка от официални източници
  - Потребителите трябва да разчитат на криптографски подписи от доверени разработчици, за да потвърдят поведението на софтуера
explanation: |
  В главата изрично се посочва, че за да могат потребителите да проверят дали софтуерът Bitcoin "работи, както е обявено", те трябва да имат неограничен достъп до изходния код. Това е пряко свързано с принципа "Не се доверявай, а проверявай" и с изискването за достъпност на изходния код в определението за отворен код. Неправилните отговори противоречат на основните принципи на отворения код: изискването за разрешение нарушава принципа за свободен достъп, заплащането на такси противоречи на изискването за безплатно разпространение, а разчитането единствено на подписи подкопава възможността за проверка чрез инспекция, която отвореният код предоставя.
reviewed: true

question: 사용자가 Bitcoin 소프트웨어가 논의된 오픈 소스 원칙에 따라 '광고된 대로 작동하는지' 확인할 수 있는 기본 요건은 무엇인가요?
answer: 사용자는 확인하려는 소프트웨어의 소스 코드에 제한 없이 액세스할 수 있어야 합니다
wrong_answers:
  - 사용자는 검증 도구에 액세스하기 전에 Bitcoin Core 관리자의 허가를 받아야 합니다
  - 사용자는 공식 소스에서 컴파일된 검증 바이너리에 액세스하려면 합리적인 수수료를 지불해야 합니다
  - 사용자는 신뢰할 수 있는 개발자의 암호화 서명에 의존하여 소프트웨어 동작을 검증해야 합니다
explanation: |
  이 장에서는 사용자가 Bitcoin 소프트웨어가 '광고된 대로 작동하는지' 검증하려면 소스 코드에 제한 없이 액세스할 수 있어야 한다고 명시적으로 명시하고 있습니다. 이는 '신뢰하지 말고 검증하라'는 원칙과 소스 코드 가용성에 대한 오픈 소스 정의의 요구 사항과 직접적으로 연결됩니다. 허가를 요구하는 것은 무료 액세스 원칙에 위배되고, 비용을 지불하는 것은 무료 배포 요건에 위배되며, 서명에만 의존하는 것은 오픈소스가 제공하는 검증-검사 기능을 약화시키는 등 오답은 오픈소스의 핵심 원칙과 모순됩니다.
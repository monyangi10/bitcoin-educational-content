question: Je, ni hitaji gani la kimsingi linalowawezesha watumiaji kuthibitisha kuwa programu ya Bitcoin 'inafanya kazi kama inavyotangazwa' kulingana na kanuni za chanzo huria zinazojadiliwa?
answer: Watumiaji lazima wawe na ufikiaji usio na kikomo wa msimbo wa chanzo wa programu wanayotaka kuthibitisha
wrong_answers:
  - Watumiaji lazima wapate ruhusa kutoka kwa watunzaji wa Bitcoin Core kabla ya kufikia zana za uthibitishaji
  - Watumiaji lazima walipe ada inayofaa kufikia jozi za uthibitishaji zilizokusanywa kutoka kwa vyanzo rasmi
  - Watumiaji lazima wategemee sahihi za kriptografia kutoka kwa wasanidi wanaoaminika ili kudhibitisha tabia ya programu
explanation: |
  Sura hiyo inaeleza kwa uwazi kwamba ili watumiaji waweze kuthibitisha programu ya Bitcoin 'inafanya kazi kama inavyotangazwa,' ni lazima wawe na ufikiaji usio na kikomo wa msimbo wa chanzo. Hii inaunganishwa moja kwa moja na kanuni ya 'Usiamini, Thibitisha' na mahitaji ya ufafanuzi wa chanzo huria kwa upatikanaji wa msimbo wa chanzo. Majibu yasiyo sahihi yanakinzana na kanuni za msingi za chanzo huria: kuhitaji ruhusa kunakiuka kanuni ya ufikiaji bila malipo, kulipa ada kunakinzana na hitaji la usambazaji wa kutolipa gharama, na kutegemea sahihi tu kunadhoofisha uwezo wa ukaguzi wa uthibitishaji unaotolewa na chanzo huria.
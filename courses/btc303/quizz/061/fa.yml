question: الزامات اساسی که به کاربران امکان می‌دهد تا تأیید کنند که نرم‌افزار Bitcoin "همان‌طور که تبلیغ شده کار می‌کند" طبق اصول منبع باز چیست؟
answer: کاربران باید به کد منبع نرم‌افزاری که می‌خواهند تأیید کنند، دسترسی نامحدود داشته باشند.
wrong_answers:
  - کاربران باید قبل از دسترسی به ابزارهای تأیید، از نگهدارندگان اصلی Bitcoin اجازه بگیرند.
  - کاربران باید برای دسترسی به باینری‌های تأیید شده‌ی کامپایل شده از منابع رسمی، هزینه‌ی معقولی پرداخت کنند.
  - کاربران باید برای اعتبارسنجی رفتار نرم‌افزار به امضاهای رمزنگاری‌شده از توسعه‌دهندگان مورد اعتماد تکیه کنند.
explanation: |
  این فصل به‌صراحت بیان می‌کند که برای کاربران جهت تأیید اینکه نرم‌افزار Bitcoin "همان‌طور که تبلیغ شده کار می‌کند"، باید دسترسی نامحدود به کد منبع داشته باشند. این موضوع مستقیماً به اصل "اعتماد نکنید، تأیید کنید" و الزام تعریف منبع باز برای دسترسی به کد منبع متصل می‌شود. پاسخ‌های نادرست با اصول اصلی منبع باز در تضاد هستند: نیاز به اجازه، اصل دسترسی آزاد را نقض می‌کند، پرداخت هزینه‌ها با الزام توزیع بدون هزینه در تضاد است، و تکیه صرف بر امضاها، قابلیت تأیید از طریق بازرسی که منبع باز فراهم می‌کند را تضعیف می‌کند.
reviewed: false

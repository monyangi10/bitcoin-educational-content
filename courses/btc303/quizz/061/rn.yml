question: Ni igiki gikenewe cane gituma abakoresha bashobora kugenzura ko porogarama ya Bitcoin ‘ikora nk’uko yamamajwe’ hakurikijwe ingingo ngenderwako z’ubuhinga bufunguye zavuzweko?
answer: Abakoresha bategerezwa kuba bafise uburenganzira butagira aho bugarukira bwo gukoresha kode y'inkomoko ya porogaramu bipfuza kugenzura
wrong_answers:
  - Abakoresha bategerezwa kuronka uruhusha rw'abacungera Bitcoin Core imbere yo gushika ku bikoresho vyo kugenzura
  - Abakoresha bategerezwa kwishura amahera akwiye kugira ngo bashobore kuronka amakuru y'igenzura yashizwe hamwe avuye mu masoko yemewe
  - Abakoresha bategerezwa kwizigira imikono y'ibanga y'abahinguzi bizigira kugira ngo bemeze inyifato ya porogaramu
explanation: |
  Ico kigabane kivuga neza yuko kugira ngo abakoresha bashobore kugenzura ko porogarama ya Bitcoin ‘ikora nk’uko yamamajwe,’ bategerezwa kuba bafise uburenganzira bwo gukoresha kode y’inkomoko ata nkomanzi. Ivyo bihuza ataco bimaze n'ingingo ngenderwako y''Ntukizere, Suzuma' n'ibisabwa n'insobanuro y'inkomoko yuguruye kugira ngo kode y'inkomoko iboneke. Inyishu zitari zo zivuguruza ingingo ngenderwako nyamukuru z’inkomoko yuguruye: gusaba uruhusha bivuguruza ingingo ngenderwako y’ugushikira ku buntu, kwishura amahera bivuguruza igisabwa co gutanga ataco bimaze, kandi kwizigira gusa imikono birahungabanya ubushobozi bwo kugenzura-biciye mu gusuzuma inkomoko yuguruye itanga.

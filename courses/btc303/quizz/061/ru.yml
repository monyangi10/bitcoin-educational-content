question: Каково фундаментальное требование, позволяющее пользователям убедиться, что программное обеспечение Bitcoin "работает так, как заявлено", в соответствии с обсуждаемыми принципами открытого исходного кода?
answer: Пользователи должны иметь неограниченный доступ к исходному коду программного обеспечения, которое они хотят проверить
wrong_answers:
  - Пользователи должны получить разрешение от сопровождающих Bitcoin Core, прежде чем получить доступ к инструментам проверки
  - Пользователи должны платить разумную плату за доступ к скомпилированным проверочным двоичным файлам из официальных источников
  - Пользователи должны полагаться на криптографические подписи от доверенных разработчиков для подтверждения поведения программного обеспечения
explanation: |
  В главе прямо говорится, что для того, чтобы пользователи могли убедиться в том, что программное обеспечение Bitcoin "работает так, как заявлено", они должны иметь неограниченный доступ к исходному коду. Это напрямую связано с принципом "Не доверяй, а проверяй" и требованием доступности исходного кода в определении открытого исходного кода. Неправильные ответы противоречат основным принципам открытого исходного кода: требование разрешения нарушает принцип свободного доступа, выплата вознаграждения противоречит требованию бесплатного распространения, а опора исключительно на подписи подрывает возможность проверки через инспектирование, которую предоставляет открытый исходный код.
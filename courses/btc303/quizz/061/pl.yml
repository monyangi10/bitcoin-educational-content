question: Jaki jest podstawowy wymóg, który umożliwia użytkownikom sprawdzenie, czy oprogramowanie Bitcoin "działa zgodnie z reklamą" zgodnie z omówionymi zasadami open source?
answer: Użytkownicy muszą mieć nieograniczony dostęp do kodu źródłowego oprogramowania, które chcą zweryfikować
wrong_answers:
  - Użytkownicy muszą uzyskać pozwolenie od opiekunów Bitcoin Core przed uzyskaniem dostępu do narzędzi weryfikacyjnych
  - Użytkownicy muszą uiścić odpowiednią opłatę, aby uzyskać dostęp do skompilowanych weryfikacyjnych plików binarnych z oficjalnych źródeł
  - Użytkownicy muszą polegać na podpisach kryptograficznych zaufanych deweloperów, aby zweryfikować zachowanie oprogramowania
explanation: |
  Rozdział ten wyraźnie stwierdza, że aby użytkownicy mogli zweryfikować, czy oprogramowanie Bitcoin "działa zgodnie z reklamą", muszą mieć nieograniczony dostęp do kodu źródłowego. Łączy się to bezpośrednio z zasadą "Nie ufaj, weryfikuj" i wymogiem definicji open source dotyczącym dostępności kodu źródłowego. Złe odpowiedzi są sprzeczne z podstawowymi zasadami open source: wymaganie pozwolenia narusza zasadę wolnego dostępu, uiszczanie opłat jest sprzeczne z wymogiem bezpłatnej dystrybucji, a poleganie wyłącznie na podpisach podważa możliwość weryfikacji poprzez inspekcję, którą zapewnia open source.
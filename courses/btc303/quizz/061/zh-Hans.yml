question: 使用户能够根据所讨论的开放源码原则验证比特币软件是否 “如广告宣传的那样运行” 的基本要求是什么？
answer: 用户必须能够不受限制地访问他们希望验证的软件的源代码
wrong_answers:
  - 用户在访问验证工具前必须获得 Bitcoin Core 维护者的许可
  - 用户必须支付合理的费用，才能从官方来源获取经编译的验证二进制文件
  - 用户必须依靠受信任开发者的加密签名来验证软件行为
explanation: |
  该章明确指出，用户要验证比特币软件 "如广告宣传的那样运行"，就必须能够不受限制地访问源代码。这与 "不要信任，要验证" 原则和开放源代码定义中对源代码可用性的要求直接相关。错误的答案违背了开放源代码的核心原则：要求许可违反了自由访问原则，支付费用违背了无成本分发的要求，而仅仅依赖签名则破坏了开放源代码所提供的通过检查进行验证的能力。

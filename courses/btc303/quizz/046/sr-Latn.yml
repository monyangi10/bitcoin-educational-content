question: Šta čini onlajn sisteme kao što je Bitcoin fundamentalno različitim od fizičkih sistema kada je reč o pretnjama od strane protivnika?
answer: Onlajn sistemi suočavaju se sa pseudonimnim i anonimnim protivnicima koji mogu iskoristiti bilo koju slabost bez da budu vidljivi ili uhvaćeni.
wrong_answers:
  - Online sistemi imaju složenije kriptografske algoritme koji su teži za analizu sigurnosnih ranjivosti.
  - Fizički sistemi mogu biti zaštićeni od strane organa reda, dok se onlajn sistemi oslanjaju samo na matematičke dokaze.
  - Online sistemi obrađuju transakcije brže, što olakšava protivnicima da pokrenu koordinisane napade.
explanation: |
  Ključna razlika koju ističe Andrew Poelstra je da fizički sistemi mogu da se oslanjaju na sprovođenje zakona i vidljivost protivnika kako bi odvratili napade,
  čak i prihvatajući neke rizike poput spaljivanja zgrada. Međutim, onlajn sistemi poput Bitcoina funkcionišu u okruženju gde protivnici mogu delovati pod 
  pseudonimom ili anonimno, povezivati se sa bilo kog mesta i iskorišćavati slabosti bez identifikacije ili hvatanja. Ova fundamentalna razlika znači da sve 
  poznate slabosti u Bitcoinu moraju biti rešene, jer će ih neizbežno iskoristiti nevidljivi protivnici koji se ne suočavaju sa posledicama u stvarnom svetu.
reviewed: true

question: Чем онлайновые системы, такие как Bitcoin, принципиально отличаются от физических систем, когда речь идет о враждебных угрозах?
answer: Онлайн-системы сталкиваются с псевдонимными и анонимными противниками, которые могут использовать любую слабость, не будучи замеченными или пойманными
wrong_answers:
  - Онлайн-системы имеют более сложные криптографические алгоритмы, которые сложнее проанализировать на предмет уязвимостей в системе безопасности
  - Физические системы могут быть защищены правоохранительными органами, в то время как онлайн-системы полагаются только на математические доказательства
  - Онлайн-системы быстрее обрабатывают транзакции, что облегчает противникам проведение скоординированных атак
explanation: |
  Ключевое различие, на которое обратил внимание Эндрю Поэлстра, заключается в том, что физические системы могут полагаться на правоохранительные органы и видимость противников для предотвращения атак, даже принимая на себя некоторые риски, например сжигание зданий. Однако онлайн-системы, такие как Bitcoin, работают в среде, где противники могут действовать псевдонимно или анонимно, подключаться из любого места и использовать слабые места, не будучи идентифицированными или пойманными. Это фундаментальное различие означает, что все известные слабые места Bitcoin должны быть устранены, поскольку они неизбежно будут использованы невидимыми противниками, которым не грозят реальные последствия.
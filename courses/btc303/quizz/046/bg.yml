question: Какво прави онлайн системи като Bitcoin коренно различни от физическите системи, когато става въпрос за враждебни заплахи?
answer: Онлайн системите се сблъскват с псевдонимни и анонимни противници, които могат да се възползват от всяка слабост, без да бъдат забелязани или уловени
wrong_answers:
  - Онлайн системите имат по-сложни криптографски алгоритми, които е по-трудно да се анализират за уязвимости в сигурността
  - Физическите системи могат да бъдат защитени от правоприлагащите органи, докато онлайн системите разчитат само на математически доказателства
  - Онлайн системите обработват транзакциите по-бързо, което улеснява противниците да извършват координирани атаки
explanation: |
  Ключовото разграничение, подчертано от Андрю Поелстра, е, че физическите системи могат да разчитат на правоприлагащите органи и на видимостта на противниците, за да предотвратят атаки, дори да приемат някои рискове, като например опожаряването на сгради. Онлайн системите като Bitcoin обаче работят в среда, в която противниците могат да действат псевдонимно или анонимно, да се свързват отвсякъде и да използват слабости, без да бъдат идентифицирани или заловени. Тази фундаментална разлика означава, че всички известни слабости в Bitcoin трябва да бъдат отстранени, тъй като те неизбежно ще бъдат използвани от невидими противници, които не са изправени пред никакви реални последствия.
reviewed: false

question: อะไรที่ทำให้ระบบออนไลน์อย่าง Bitcoin แตกต่างอย่างพื้นฐานจากระบบทางกายภาพเมื่อพูดถึงภัยคุกคามจากฝ่ายตรงข้าม?
answer: ระบบออนไลน์ต้องเผชิญกับศัตรูที่ใช้นามแฝงและไม่เปิดเผยตัวตนซึ่งสามารถหาประโยชน์จากจุดอ่อนใด ๆ โดยไม่ถูกมองเห็นหรือจับได้
wrong_answers:
  - ระบบออนไลน์มีอัลกอริธึมการเข้ารหัสที่ซับซ้อนมากขึ้นซึ่งยากต่อการวิเคราะห์หาช่องโหว่ด้านความปลอดภัย
  - ระบบทางกายภาพสามารถได้รับการปกป้องโดยการบังคับใช้กฎหมาย ในขณะที่ระบบออนไลน์พึ่งพาเพียงแค่การพิสูจน์ทางคณิตศาสตร์เท่านั้น
  - ระบบออนไลน์ประมวลผลธุรกรรมได้เร็วขึ้น ทำให้ฝ่ายตรงข้ามสามารถเปิดการโจมตีแบบประสานงานได้ง่ายขึ้น
explanation: |
  ความแตกต่างที่สำคัญที่ Andrew Poelstra เน้นคือระบบทางกายภาพสามารถพึ่งพาการบังคับใช้กฎหมายและการมองเห็นของฝ่ายตรงข้ามเพื่อยับยั้งการโจมตี แม้จะยอมรับความเสี่ยงบางอย่างเช่นอาคารถูกเผาทำลาย อย่างไรก็ตาม ระบบออนไลน์เช่น Bitcoin ดำเนินการในสภาพแวดล้อมที่ฝ่ายตรงข้ามสามารถกระทำโดยใช้นามแฝงหรือไม่ระบุตัวตน เชื่อมต่อจากที่ใดก็ได้ และใช้ประโยชน์จากจุดอ่อนโดยไม่ถูกระบุหรือจับได้ ความแตกต่างพื้นฐานนี้หมายความว่าจุดอ่อนที่รู้จักทั้งหมดใน Bitcoin ต้องได้รับการแก้ไข เนื่องจากจะถูกใช้ประโยชน์โดยฝ่ายตรงข้ามที่มองไม่เห็นซึ่งไม่ต้องเผชิญกับผลกระทบในโลกแห่งความเป็นจริง
reviewed: false
question: چه چیزی سیستم‌های آنلاین مانند Bitcoin را از نظر تهدیدات خصمانه به‌طور اساسی از سیستم‌های فیزیکی متمایز می‌کند؟
answer: سیستم‌های آنلاین با دشمنان مستعار و ناشناس مواجه هستند که می‌توانند بدون دیده شدن یا گرفتار شدن، از هر ضعفی سوءاستفاده کنند.
wrong_answers:
  - سیستم‌های آنلاین دارای الگوریتم‌های رمزنگاری پیچیده‌تری هستند که تحلیل آسیب‌پذیری‌های امنیتی در آن‌ها دشوارتر است.
  - سیستم‌های فیزیکی می‌توانند توسط اجرای قانون محافظت شوند در حالی که سیستم‌های آنلاین تنها به اثبات‌های ریاضی تکیه می‌کنند
  - سیستم‌های آنلاین تراکنش‌ها را سریع‌تر پردازش می‌کنند و این امر باعث می‌شود که مخالفان بتوانند حملات هماهنگ‌شده‌ای را راحت‌تر انجام دهند.
explanation: |
  تمایز کلیدی که توسط اندرو پولسترا برجسته شده است این است که سیستم‌های فیزیکی می‌توانند به اجرای قانون و قابل مشاهده بودن دشمنان برای جلوگیری از حملات تکیه کنند، حتی برخی از ریسک‌ها مانند سوختن ساختمان‌ها را بپذیرند. با این حال، سیستم‌های آنلاین مانند Bitcoin در محیطی عمل می‌کنند که در آن دشمنان می‌توانند به صورت مستعار یا ناشناس عمل کنند، از هر جایی متصل شوند و از ضعف‌ها بدون شناسایی یا گرفتار شدن سوءاستفاده کنند. این تفاوت اساسی به این معناست که تمام ضعف‌های شناخته شده در Bitcoin باید برطرف شوند، زیرا به طور اجتناب‌ناپذیری توسط دشمنان نامرئی که با هیچ پیامد واقعی در دنیای واقعی مواجه نمی‌شوند، مورد سوءاستفاده قرار خواهند گرفت.
reviewed: false

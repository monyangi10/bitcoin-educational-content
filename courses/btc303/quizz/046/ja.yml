question: Bitcoinのようなオンラインシステムは、敵対的な脅威という点で、物理的なシステムとは根本的に何が違うのでしょうか？
answer: オンラインシステムは偽名や匿名の敵に直面しており、彼らは人目につかず、捕まることなく、あらゆる弱点を突くことができる。
wrong_answers:
  - オンライン・システムは暗号アルゴリズムが複雑で、セキュリティの脆弱性を分析するのが難しい。
  - 物理的システムは法執行機関によって保護されるが、オンライン・システムは数学的証明のみに依存する。
  - オンラインシステムはトランザクションの処理を高速化し、敵対勢力による組織的攻撃を容易にする。
explanation: |
  アンドリュー・ポエルストラが強調した重要な違いは、物理的なシステムは、法執行機関や敵の可視性に頼って攻撃を抑止することができ、建物が全焼するようなリスクも受け入れることができるということだ。しかし、Bitcoinのようなオンライン・システムは、敵が偽名や匿名で行動し、どこからでも接続でき、特定されたり捕まったりすることなく弱点を突くことができる環境で作動する。この根本的な違いは、Bitcoinの既知の弱点が、現実世界では何の影響も受けない目に見えない敵に悪用されることが避けられないため、すべて対処しなければならないことを意味する。
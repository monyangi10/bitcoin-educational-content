question: Ni igiki gituma ubuhinga bwo kuri Internet nka Bitcoin butandukanye cane n’ubuhinga bwo ku mubiri iyo bije ku bijanye n’iterabwoba ry’abansi?
answer: Sisitemu zo kuri Internet zihura n’abansi b’ibinyoma n’abatazwi bashobora gukoresha intege nke iyo ari yo yose bataboneka canke ngo bafatwe .
wrong_answers:
  - Sisitemu zo kuri interineti zifise ubuhinga bugoranye cane bwo gukora amakuru y'ibanga kandi bigoye gusuzuma kugira ngo umenye ko hariho ubugoyagoye bwo mu mutekano
  - Uburyo buboneka burashobora kurindwa n'abajejwe gukurikiza amategeko mu gihe uburyo bwo kuri Internet bwishingikiriza gusa ku bimenyamenya vy'imibare .
  - Uburyo bwo kuri internet burakora amafaranga vyihuta bigatuma vyoroha ku bansi gutera ibitero bihuje
explanation: |
  Itandukaniro nyamukuru ryashizwe ahabona na Andrew Poelstra ni uko uburyo bwo gukora bushobora kwizigira abajejwe gukurikiza amategeko no kuboneka kw’abansi kugira ngo bahagarike ibitero, mbere no kwemera ingorane zimwe zimwe nk’inyubakwa ziturirwa. Ariko rero, ubuhinga bwo kuri Internet nka Bitcoin bukora mu kibanza aho abansi bashobora gukora mu mazina y’uruyeri canke ata mazina yabo, bagahuza bari aho bari hose, bagakoresha intege nke batamenyekanye canke ngo bafatwe. Iryo tandukaniro ry’ishimikiro risobanura ko intege nke zose zizwi muri Bitcoin zitegerezwa gutorwa umuti, kuko zizokoreshwa ata kabuza n’abansi bataboneka batagira ingaruka z’ukuri.
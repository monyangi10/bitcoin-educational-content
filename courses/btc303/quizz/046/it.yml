question: Cosa rende i sistemi online come Bitcoin fondamentalmente diversi dai sistemi fisici quando si tratta di minacce avversarie?
answer: I sistemi online devono affrontare avversari pseudonimi e anonimi che possono sfruttare qualsiasi punto debole senza essere visibili o scoperti
wrong_answers:
  - I sistemi online hanno algoritmi crittografici più complessi, più difficili da analizzare per individuare eventuali vulnerabilità di sicurezza
  - I sistemi fisici possono essere protetti dalle forze dell'ordine, mentre i sistemi online si basano solo su prove matematiche
  - I sistemi online elaborano le transazioni più velocemente, facilitando il lancio di attacchi coordinati da parte degli avversari
explanation: |
  La distinzione chiave evidenziata da Andrew Poelstra è che i sistemi fisici possono fare affidamento sulle forze dell'ordine e sulla visibilità degli avversari per scoraggiare gli attacchi, accettando anche alcuni rischi come l'incendio degli edifici. Tuttavia, i sistemi online come Bitcoin operano in un ambiente in cui gli avversari possono agire in modo pseudonimo o anonimo, collegarsi da qualsiasi luogo e ogni punto debole senza essere identificati o essere scoperti. Questa differenza fondamentale significa che tutte le vulnerabilità note di Bitcoin devono essere affrontate, poiché saranno inevitabilmente sfruttate da avversari invisibili che non affrontano conseguenze nel mondo reale.
reviewed: true

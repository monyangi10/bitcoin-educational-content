question: 在對抗威脅方面，Bitcoin 之類的線上系統與實體系統有何根本不同？
answer: 線上系統面臨假名和匿名的對手，他們可以利用任何弱點而不被發現或抓到
wrong_answers:
  - 線上系統的加密演算法較為複雜，較難分析出安全漏洞
  - 實體系統可以受到執法機關的保護，而線上系統只依賴數學證明
  - 線上系統處理交易的速度更快，讓對手更容易發動協調攻擊
explanation: |
  Andrew Poelstra 強調的關鍵區別在於，實體系統可以仰賴執法單位和對手的能見度來阻止攻擊，甚至接受一些風險，例如建築物被燒毀。然而，Bitcoin 等線上系統的運作環境中，對手可以假名或匿名行事，從任何地方連線，並利用弱點而不會被識別或抓到。這個根本性的差異意味著 Bitcoin 中所有已知的弱點都必須加以處理，因為這些弱點難免會被隱形的敵人利用，而這些敵人在現實世界中不會面臨任何後果。
reviewed: false

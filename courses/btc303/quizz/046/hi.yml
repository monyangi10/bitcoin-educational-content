question: जब प्रतिकूल खतरों की बात आती है तो Bitcoin जैसी ऑनलाइन प्रणालियां भौतिक प्रणालियों से मौलिक रूप से भिन्न क्यों होती हैं?
answer: ऑनलाइन प्रणालियों को छद्मनाम और अनाम विरोधियों का सामना करना पड़ता है जो बिना दिखाई दिए या पकड़े गए किसी भी कमजोरी का फायदा उठा सकते हैं
wrong_answers:
  - ऑनलाइन प्रणालियों में अधिक जटिल क्रिप्टोग्राफ़िक एल्गोरिदम होते हैं जिनका सुरक्षा कमजोरियों के लिए विश्लेषण करना कठिन होता है
  - भौतिक प्रणालियों को कानून प्रवर्तन द्वारा संरक्षित किया जा सकता है जबकि ऑनलाइन प्रणालियाँ केवल गणितीय प्रमाणों पर निर्भर करती हैं
  - ऑनलाइन प्रणालियाँ लेन-देन को तेजी से संसाधित करती हैं, जिससे विरोधियों के लिए समन्वित हमले करना आसान हो जाता है
explanation: |
  एंड्रयू पोल्स्ट्रा द्वारा उजागर किया गया मुख्य अंतर यह है कि भौतिक प्रणालियाँ हमलों को रोकने के लिए कानून प्रवर्तन और विरोधियों की दृश्यता पर निर्भर रह सकती हैं, यहाँ तक कि इमारतों के जलने जैसे कुछ जोखिम भी उठा सकती हैं। हालाँकि, Bitcoin जैसी ऑनलाइन प्रणालियाँ ऐसे वातावरण में काम करती हैं जहाँ विरोधी छद्म नाम से या गुमनाम रूप से कार्य कर सकते हैं, कहीं से भी जुड़ सकते हैं, और बिना पहचाने या पकड़े गए कमज़ोरियों का फायदा उठा सकते हैं। इस मूलभूत अंतर का अर्थ है कि Bitcoin की सभी ज्ञात कमज़ोरियों को दूर किया जाना चाहिए, क्योंकि अदृश्य विरोधियों द्वारा अनिवार्य रूप से उनका फायदा उठाया जाएगा, जिन्हें वास्तविक दुनिया में कोई परिणाम नहीं भुगतना पड़ेगा।

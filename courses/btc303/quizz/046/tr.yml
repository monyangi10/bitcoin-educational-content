question: Düşmanca tehditler söz konusu olduğunda Bitcoin gibi çevrimiçi sistemleri fiziksel sistemlerden temelde farklı kılan nedir?
answer: Çevrimiçi sistemler, görünmeden veya yakalanmadan herhangi bir zayıflıktan yararlanabilecek sahte ve anonim düşmanlarla karşı karşıyadır
wrong_answers:
  - Çevrimiçi sistemler, güvenlik açıkları açısından analiz edilmesi daha zor olan daha karmaşık kriptografik algoritmalara sahiptir
  - Fiziksel sistemler kolluk kuvvetleri tarafından korunabilirken, çevrimiçi sistemler yalnızca matematiksel kanıtlara dayanır
  - Çevrimiçi sistemler işlemleri daha hızlı gerçekleştirerek düşmanların koordineli saldırılar düzenlemesini kolaylaştırır
explanation: |
  Andrew Poelstra tarafından vurgulanan temel ayrım, fiziksel sistemlerin saldırıları caydırmak için kolluk kuvvetlerine ve düşmanların görünürlüğüne güvenebileceği, hatta binaların yakılması gibi bazı riskleri kabul edebileceğidir. Ancak Bitcoin gibi çevrimiçi sistemler, düşmanların takma isimle ya da anonim olarak hareket edebildiği, her yerden bağlanabildiği ve tespit edilmeden ya da yakalanmadan zayıflıklardan yararlanabildiği bir ortamda çalışır. Bu temel fark, Bitcoin'deki bilinen tüm zayıflıkların ele alınması gerektiği anlamına gelir, çünkü bunlar kaçınılmaz olarak gerçek dünyada hiçbir sonuçla karşılaşmayan görünmez düşmanlar tarafından istismar edilecektir.
question: Bitcoin와 같은 온라인 시스템이 적대적 위협과 관련하여 물리적 시스템과 근본적으로 다른 점은 무엇일까요?
answer: 온라인 시스템에는 눈에 띄지 않거나 잡히지 않고 약점을 악용할 수 있는 익명의 공격자가 존재합니다
wrong_answers:
  - 온라인 시스템에는 보안 취약점을 분석하기 어려운 더 복잡한 암호화 알고리즘이 있습니다
  - 물리적 시스템은 법 집행 기관의 보호를 받을 수 있는 반면, 온라인 시스템은 수학적 증명에만 의존합니다
  - 온라인 시스템은 트랜잭션을 더 빠르게 처리하여 공격자가 조직적인 공격을 더 쉽게 실행할 수 있습니다
explanation: |
  앤드류 포엘스트라가 강조한 주요 차이점은 물리적 시스템은 법 집행 기관과 공격자의 가시성에 의존하여 공격을 억제할 수 있으며, 심지어 건물이 불에 타는 등의 위험을 감수할 수도 있다는 점입니다. 그러나 Bitcoin과 같은 온라인 시스템은 공격자가 익명 또는 가명으로 행동하고, 어디서든 접속할 수 있으며, 식별되거나 적발되지 않고 약점을 악용할 수 있는 환경에서 작동합니다. 이러한 근본적인 차이점은 Bitcoin의 알려진 모든 취약점을 해결해야 한다는 것을 의미하며, 이러한 취약점은 눈에 보이지 않는 공격자가 악용할 수 있지만 실제 결과는 나타나지 않습니다.
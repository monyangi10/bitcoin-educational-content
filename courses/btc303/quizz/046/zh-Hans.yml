question: 在对抗性威胁方面，Bitcoin 这样的在线系统与物理系统有何本质区别？
answer: 在线系统面临着假名和匿名对手，他们可以利用任何弱点而不被发现或抓住
wrong_answers:
  - 在线系统的加密算法更复杂，更难分析安全漏洞
  - 物理系统可以受到执法部门的保护，而在线系统只能依靠数学证明
  - 在线系统处理交易的速度更快，使对手更容易发动协同攻击
explanation: |
  安德鲁-波尔斯特拉（Andrew Poelstra）强调的关键区别在于，物理系统可以依靠执法和对手的能见度来阻止攻击，甚至可以接受一些风险，如建筑物被烧毁。然而，像 Bitcoin 这样的在线系统的运行环境中，对手可以匿名或匿名行动，从任何地方连接，并利用弱点而不被识别或抓获。这一根本区别意味着必须解决 Bitcoin 中的所有已知弱点，因为这些弱点不可避免地会被隐形对手利用，而他们不会面临任何现实世界的后果。
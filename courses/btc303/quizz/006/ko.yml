question: Bitcoin 이전에 초기 디지털 화폐 시도가 실패로 돌아간 주요 취약점은 무엇인가요?
answer: 검열되거나 종료될 수 있는 중앙 서버에 의존했습니다
wrong_answers:
  - 거래 보안을 위해 부적절한 암호화 알고리즘을 사용했습니다
  - 트랜잭션을 효율적으로 처리할 수 있는 충분한 컴퓨팅 성능이 부족했습니다
  - 적절한 사용자 인증 메커니즘을 구현하지 못했습니다
explanation: |
  초기의 디지털 화폐는 거래 처리와 검증을 중앙 서버에 의존했기 때문에 실패했습니다. 이 장에서 설명했듯이, 정부나 다른 공격자가 이러한 중앙 장애 지점을 쉽게 검열, 통제 또는 차단할 수 있었기 때문에 이러한 중앙 집중화는 "아킬레스건"이 되었습니다. 페더레이션에서 여러 서버를 사용하려고 해도 각 서버가 "하나씩 실패하거나 실패하도록 만들 수 있기 때문에" 시스템이 여전히 취약했습니다 Bitcoin는 분산형 proof-of-work 시스템을 통해 중앙 권한의 필요성을 제거함으로써 이 문제를 해결했습니다.
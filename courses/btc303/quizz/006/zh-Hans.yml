question: 在 Bitcoin 之前，导致早期数字货币尝试失败的主要漏洞是什么？
answer: 它们依赖的中央服务器可能被审查或关闭
wrong_answers:
  - 他们使用不适当的加密算法来保证交易安全
  - 它们缺乏足够的计算能力，无法高效处理交易
  - 他们未能实施适当的用户身份验证机制
explanation: |
  早期的数字货币之所以失败，是因为它们依赖中央服务器进行交易处理和验证。正如本章所述，这种集中化成为了它们的 "致命弱点"，因为政府或其他对手可以轻易地审查、控制或关闭这些中央故障点。即使尝试在一个联盟中使用多个服务器，系统仍然很容易受到攻击，因为每个服务器都可能 "一个接一个地失效或被制造失效"。Bitcoin 通过其分散的 proof-of-work 系统消除了对任何中央机构的需求，从而解决了这一问题。
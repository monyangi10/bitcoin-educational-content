question: آسیب‌پذیری اصلی که باعث شکست تلاش‌های اولیه برای ارز دیجیتال قبل از Bitcoin شد چیست؟
answer: آن‌ها به سرورهای مرکزی متکی بودند که می‌توانستند سانسور یا خاموش شوند
wrong_answers:
  - آن‌ها از الگوریتم‌های رمزنگاری ناکافی برای امنیت تراکنش استفاده کردند.
  - آن‌ها قدرت محاسباتی کافی برای پردازش کارآمد تراکنش‌ها نداشتند.
  - آن‌ها نتوانستند مکانیزم‌های احراز هویت کاربر مناسب را پیاده‌سازی کنند
explanation: |
  ارزهای دیجیتال اولیه شکست خوردند زیرا برای پردازش و اعتبارسنجی تراکنش‌ها به سرورهای مرکزی وابسته بودند. همان‌طور که در فصل توضیح داده شد، این تمرکز به "پاشنه آشیل" آن‌ها تبدیل شد زیرا دولت‌ها یا سایر دشمنان می‌توانستند به راحتی این نقاط مرکزی ضعف را سانسور، کنترل یا تعطیل کنند. حتی تلاش‌ها برای استفاده از چندین سرور در یک فدراسیون همچنان سیستم را آسیب‌پذیر نگه می‌داشت زیرا هر سرور می‌توانست "یکی یکی از کار بیفتد یا از کار انداخته شود." Bitcoin این مشکل را با حذف نیاز به هرگونه مرجع مرکزی از طریق سیستم غیرمتمرکز proof-of-work حل کرد.
question: В чем заключается основная уязвимость, из-за которой первые попытки создания цифровых валют потерпели неудачу до Bitcoin?
answer: Они опирались на центральные серверы, которые можно было подвергнуть цензуре или отключить
wrong_answers:
  - Они использовали неадекватные криптографические алгоритмы для обеспечения безопасности транзакций
  - Им не хватало вычислительной мощности для эффективной обработки транзакций
  - Они не смогли внедрить надлежащие механизмы аутентификации пользователей
explanation: |
  Первые цифровые валюты потерпели неудачу, потому что их обработка и проверка транзакций зависели от центральных серверов. Как объясняется в этой главе, такая централизация стала их "ахиллесовой пятой", поскольку правительства или другие противники могли легко цензурировать, контролировать или отключать эти центральные точки отказа. Даже попытки использовать несколько серверов в федерации все равно оставляли систему уязвимой, поскольку каждый сервер мог "выйти из строя или быть выведенным из строя один за другим" Bitcoin решила эту проблему, устранив необходимость в центральном органе власти с помощью своей децентрализованной системы proof-of-work.
reviewed: false

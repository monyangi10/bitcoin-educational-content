question: 在 Bitcoin 之前，導致早期數位貨幣嘗試失敗的主要漏洞是什麼？
answer: 它們依賴中央伺服器，而這些伺服器可能會被審查或關閉
wrong_answers:
  - 他們使用不適當的加密演算法來保障交易安全
  - 他們缺乏足夠的運算能力來有效率地處理交易
  - 他們未能實施適當的使用者驗證機制
explanation: |
  早期的數位貨幣之所以失敗，是因為它們依賴中央伺服器進行交易處理和驗證。正如本章所解釋的，這種集中化成為了它們的 「阿基里斯之踵」，因為政府或其他敵人可以輕易地審查、控制或關閉這些中央故障點。即使嘗試在一個聯盟中使用多台伺服器，系統仍然很容易受到攻擊，因為每台伺服器都可能「逐一失效，或被逐一失效」。Bitcoin 透過其分散式的 proof-of-work 系統消除了對任何中央機構的需求，從而解決了這個問題。
reviewed: false

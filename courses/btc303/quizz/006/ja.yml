question: ビットコインの前進として、初期のデジタル通貨の試みが失敗した主な脆弱性は何ですか？
answer: 検閲やシャットダウンが可能な中央サーバーに依存していたため
wrong_answers:
  - トランザクションのセキュリティに不十分な暗号アルゴリズムを使用していたため
  - トランザクションを効率的に処理するための十分なコンピューティング・パワーが不足していたため
  - 適切なユーザー認証の仕組みを導入しなかったため
explanation: |
  初期のデジタル通貨が失敗したのは、トランザクション処理と検証を中央サーバーに依存していたからだ。この章で説明されているように、政府やその他の攻撃者は、これらの単一障害点を簡単に検閲、制御、シャットダウンできるため、この中央集権化が「アキレス腱」となっていた。フェデレーションで複数のサーバーを使おうとしても、各サーバーが "一台ずつ故障したり、故障させられたり"する可能性があるため、システムは依然として脆弱なままだった。ビットコインは、分散型プルーフ・オブ・ワーク（PoW）システムによって中央主体の必要性を排除することで、これを解決した。

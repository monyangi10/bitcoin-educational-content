question: Bitcoinの前に、初期のデジタル通貨の試みが失敗した主な脆弱性は何ですか？
answer: 検閲やシャットダウンが可能な中央サーバーに依存していた
wrong_answers:
  - トランザクションのセキュリティに不十分な暗号アルゴリズムを使用していた。
  - トランザクションを効率的に処理するための十分なコンピューティング・パワーが不足していた。
  - 適切なユーザー認証の仕組みを導入しなかった
explanation: |
  初期のデジタル通貨が失敗したのは、取引処理と検証を中央サーバーに依存していたからだ。この章で説明されているように、政府やその他の敵対者は、これらの中央障害点を簡単に検閲、制御、シャットダウンできるため、この中央集権化が「アキレス腱」となった。フェデレーションで複数のサーバーを使おうとしても、各サーバーが "一台ずつ故障したり、故障させられたり "する可能性があるため、システムは依然として脆弱なままだった。Bitcoinは、分散型proof-of-workシステムによって中央当局の必要性を排除することで、これを解決した。
reviewed: false

question: ช่องโหว่หลักที่ทำให้ความพยายามในสกุลเงินดิจิทัลยุคแรกๆ ล้มเหลวก่อน Bitcoin คืออะไร?
answer: พวกเขาพึ่งพาเซิร์ฟเวอร์กลางที่อาจถูกเซ็นเซอร์หรือปิดตัวลง
wrong_answers:
  - พวกเขาใช้การเข้ารหัสที่ไม่เพียงพอสำหรับความปลอดภัยของธุรกรรม
  - พวกเขาขาดพลังการประมวลผลที่เพียงพอในการดำเนินการธุรกรรมอย่างมีประสิทธิภาพ
  - พวกเขาล้มเหลวในการนำกลไกการยืนยันตัวตนของผู้ใช้ที่เหมาะสมมาใช้
explanation: |
  สกุลเงินดิจิทัลในยุคแรกๆ ล้มเหลวเพราะพวกมันพึ่งพาเซิร์ฟเวอร์กลางในการประมวลผลและตรวจสอบธุรกรรม ดังที่อธิบายไว้ในบทนี้ การรวมศูนย์กลายเป็น "จุดอ่อน" ของพวกมัน เพราะรัฐบาลหรือฝ่ายตรงข้ามอื่นๆ สามารถเซ็นเซอร์ ควบคุม หรือปิดจุดล้มเหลวเหล่านี้ได้อย่างง่ายดาย แม้แต่ความพยายามที่จะใช้เซิร์ฟเวอร์หลายตัวในสหพันธ์ก็ยังทำให้ระบบมีความเสี่ยง เนื่องจากแต่ละเซิร์ฟเวอร์สามารถ "ล้มเหลว หรือถูกทำให้ล้มเหลว ทีละตัว" Bitcoin แก้ปัญหานี้โดยการกำจัดความจำเป็นในการมีอำนาจกลางใดๆ ผ่านระบบ proof-of-work ที่กระจายอำนาจ
reviewed: false
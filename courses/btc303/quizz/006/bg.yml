question: Коя е основната уязвимост, която доведе до неуспех на първите опити за цифрова валута преди Bitcoin?
answer: Те разчитат на централизирани сървъри, които могат да бъдат цензурирани или изключени
wrong_answers:
  - Използвали са неподходящи криптографски алгоритми за сигурност на транзакциите
  - Не разполагаха с достатъчна изчислителна мощ за ефективна обработка на транзакциите
  - Не са успели да приложат подходящи механизми за удостоверяване на потребителите
explanation: |
  Първите цифрови валути се провалиха, защото зависеха от централни сървъри за обработка и валидиране на трансакциите. Както е обяснено в главата, тази централизация се превърна в тяхната "ахилесова пета", защото правителствата или други противници можеха лесно да цензурират, контролират или изключват тези централни точки на отказ. Дори опитите за използване на множество сървъри в рамките на федерацията все още правят системата уязвима, тъй като всеки сървър може да "откаже или да бъде принуден да откаже един по един" Bitcoin реши този проблем, като премахна необходимостта от централен орган чрез децентрализираната си система proof-of-work.
reviewed: true

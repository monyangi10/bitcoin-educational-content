question: वह मुख्य कमजोरी क्या थी जिसके कारण Bitcoin से पहले डिजिटल मुद्रा के प्रारंभिक प्रयास विफल हो गए?
answer: वे केंद्रीय सर्वरों पर निर्भर थे जिन्हें सेंसर किया जा सकता था या बंद किया जा सकता था
wrong_answers:
  - उन्होंने लेनदेन सुरक्षा के लिए अपर्याप्त क्रिप्टोग्राफ़िक एल्गोरिदम का उपयोग किया
  - उनके पास लेनदेन को कुशलतापूर्वक संसाधित करने के लिए पर्याप्त कंप्यूटिंग शक्ति का अभाव था
  - वे उचित उपयोगकर्ता प्रमाणीकरण तंत्र को लागू करने में विफल रहे
explanation: |
  शुरुआती डिजिटल मुद्राएँ इसलिए असफल रहीं क्योंकि वे लेन-देन प्रसंस्करण और सत्यापन के लिए केंद्रीय सर्वरों पर निर्भर थीं। जैसा कि इस अध्याय में बताया गया है, यह केंद्रीकरण उनकी "दुखती एड़ी" बन गया क्योंकि सरकारें या अन्य विरोधी विफलता के इन केंद्रीय बिंदुओं को आसानी से सेंसर, नियंत्रित या बंद कर सकते थे। यहाँ तक कि एक संघ में कई सर्वरों का उपयोग करने के प्रयास भी प्रणाली को असुरक्षित बनाए रखते थे क्योंकि प्रत्येक सर्वर "एक-एक करके विफल हो सकता था, या विफल कराया जा सकता था।" Bitcoin ने अपने विकेन्द्रीकृत proof-of-work सिस्टम के माध्यम से किसी भी केंद्रीय प्राधिकरण की आवश्यकता को समाप्त करके इस समस्या का समाधान किया।
question: За коя книга Мирабо е хвърлен в затвора?
answer: Теория на данъчното облагане
wrong_answers:
  - L'Ami des Hommes
  - Есе за същността на търговията като цяло
  - Социалният Contract
explanation: |
  Мирабо е вкаран в затвора заради "Теория на данъка" - труд, в който критикува френската данъчна система.
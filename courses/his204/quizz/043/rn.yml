question: None Mirabeau yafunzwe kubera igitabu ikihe?
answer: Ivyiyumviro vyerekeye imisoro
wrong_answers:
  - Mugenzi w'abantu
  - Inyandiko ku kamere k'ubudandaji muri rusangi
  - Ivy’Imibano Contract.
explanation: |
  Mirabeau yafunzwe kubera igitabu ciwe citwa « La Théorie de l’Impôt », igitabu yaneguyemwo uburyo bwo gutanga imisoro mu Bufaransa.
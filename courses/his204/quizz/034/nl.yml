question: Wie van deze auteurs was bijzonder geïnspireerd door Gournay?
answer: Turgot
wrong_answers:
  - Josiah Kind
  - François Quesnay
  - Adam Smith
explanation: |
  Turgot werd sterk beïnvloed door de ideeën van Gournay, vooral zijn verdediging van economische vrijheid en zijn kritiek op staatsinterventie.
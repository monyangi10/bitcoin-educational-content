question: Кой от тези автори е бил особено вдъхновен от Гурне?
answer: Турго
wrong_answers:
  - Джосая Чайлд
  - Франсоа Кесне
  - Адам Смит
explanation: |
  Турго е силно повлиян от идеите на Гурне, особено от неговата защита на икономическата свобода и критиката му на държавната намеса.
reviewed: true

question: Mu ciyumviro ca Joseph A. Schumpeter, ni igiki Dupont de Nemours yabuze mu kazi kiwe ko kuba umuhinga mu vy’ubutunzi?
answer: Amahirwe yo kwihakana ukuyoboka Physiocrats
wrong_answers:
  - Amahirwe yo guhakana ubugenzi yari afitaniye na Turgot .
  - Amahirwe yo kwiheba uburyo bwacu bwa laissez-faire
  - Kwemerwa n'urunganwe
explanation: |
  Schumpeter yumvise ko Dupont de Nemours yama ari umwizigirwa ku bijanye na Physiocracy, kandi ko atigeze ahakana ivyo yemera, mbere n’igihe vyari bigoye kubigira.
reviewed: true

question: Mu ciyumviro ca Joseph A. Schumpeter, ni igiki Dupont de Nemours yabuze mu kazi kiwe ko kuba umuhinga mu vy’ubutunzi?
answer: Amahirwe yo kwihakana ubudahemuka bwiwe bwa Fiziyokarasi
wrong_answers:
  - Amahirwe yo guhakana ubugenzi yari afise na Turgot .
  - Amahirwe yo kwiheba uburyo bwacu bwo kwirekura
  - Kwemerwa n'urunganwe
explanation: |
  Schumpeter yumvise ko Dupont de Nemours yama ari umwizigirwa ku bijanye n’ubutegetsi bw’umubiri, kandi ko atigeze ahakana ivyo yemera, mbere n’igihe vyari bigoye kubigira.
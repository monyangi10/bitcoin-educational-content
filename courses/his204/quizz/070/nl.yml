question: Wat miste Dupont de Nemours volgens Joseph A. Schumpeter in zijn carrière als econoom?
answer: Kansen om zijn fysiocratische trouw te ontkennen
wrong_answers:
  - Mogelijkheden om zijn vriendschap met Turgot te ontkennen
  - Kansen om onze laissez-faire benadering af te zweren
  - Collegiale erkenning
explanation: |
  Schumpeter vond dat Dupont de Nemours altijd trouw was geweest aan de fysiocratie en dat hij zijn overtuigingen nooit had verloochend, zelfs niet als dat moeilijk was.
question: Според Джоузеф А. Шумпетер какво е липсвало на Дюпон дьо Немур в кариерата му на икономист?
answer: Възможности да отрече физиократичната си принадлежност
wrong_answers:
  - Възможности да отрече приятелството си с Турго
  - Възможности да се откажем от подхода laissez-faire
  - Признание от колегите
explanation: |
  Шумпетер смята, че Дюпон дьо Немур винаги е бил верен на физиокрацията и че никога не се е отричал от убежденията си, дори когато е било трудно да го направи.
question: Кой преди маркиз д'Арженсон развива идеята за Лесе-фер?
answer: Боагилбер
wrong_answers:
  - Вобан
  - Кантийон
  - Колбер
explanation: |
  Пиер Льо Пезан дьо Боагилбер се смята за предшественик на Лесе-фер заради защитата му на икономическата свобода и критиките му срещу прекомерната държавна намеса в икономиката.
reviewed: true

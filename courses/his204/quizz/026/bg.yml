question: Кой преди маркиз д'Арженсон развива идеята за laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Вобан
  - Cantillon
  - Colbert
explanation: |
  Пиер Льо Пезан дьо Боагилбер се смята за предшественик на laissez-faire заради защитата му на икономическата свобода и критиките му срещу прекомерната държавна намеса в икономиката.
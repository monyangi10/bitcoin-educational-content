question: Marquis d'Argenson'dan önce laissez-faire fikrini kim geliştirmiştir?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert, ekonomik özgürlüğü savunması ve ekonomiye aşırı devlet müdahalesini eleştirmesi nedeniyle laissez-faire'in öncülerinden biri olarak kabul edilmektedir.
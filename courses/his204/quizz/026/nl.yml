question: Wie ontwikkelde vóór de Markies d'Argenson het idee van laissez-faire?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert wordt beschouwd als een voorloper van laissez-faire vanwege zijn verdediging van economische vrijheid en zijn kritiek op overmatige staatsinterventie in de economie.
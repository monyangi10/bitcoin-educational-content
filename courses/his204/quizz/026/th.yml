question: ก่อนหน้ามาร์ควิส ดาร์เจนซง ใครเป็นผู้พัฒนาแนวคิดของเลสเซแฟร์?
answer: Boisguilbert
wrong_answers:
  - โวบัง
  - แคนทิยง
  - โคลเบิร์ต
explanation: |
  Pierre Le Pesant de Boisguilbert ถือเป็นผู้บุกเบิกแนวคิดเสรีนิยมทางเศรษฐกิจเนื่องจากการปกป้องเสรีภาพทางเศรษฐกิจและการวิพากษ์วิจารณ์การแทรกแซงของรัฐที่มากเกินไปในเศรษฐกิจ
question: Imbere ya Marquis d’Argenson, ni nde yashizeho iciyumviro co kurekura umuntu?
answer: Boyiguyiberti
wrong_answers:
  - Vauban
  - Cantillon
  - Kolbert
explanation: |
  Pierre Le Pesant de Boisguilbert abonwa nk’uwatanguje uburenganzira bwo kwidegemvya mu vy’ubutunzi kubera ukuntu yaburanira umwidegemvyo w’ubutunzi, no ku vyo yanegura ko Leta yinjira mu bukungu birenze urugero.
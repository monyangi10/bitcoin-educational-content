question: Imbere ya Marquis d’Argenson, ni nde yashizeho iciyumviro co kurekura umuntu?
answer: Boisguilbert
wrong_answers:
  - Vauban
  - Cantillon
  - Colbert
explanation: |
  Pierre Le Pesant de Boisguilbert abonwa nk’uwatanguje laissez-faire kubera ukuntu yaburanira umwidegemvyo w’ubutunzi, no ku vyo yanegura ko Leta yinjira mu bukungu birenze urugero.
reviewed: true

question: คำวิจารณ์ของเขาต่อพระราชบัญญัติ Caisse d'Escompte ในเดือนพฤศจิกายน ค.ศ. 1789 คืออะไร?
answer: มันเป็นการจัดตั้งแบบผูกขาดที่ต้องปฏิบัติตามกฎของการแข่งขันเสรี
wrong_answers:
  - มันสร้างสถาบันที่จะส่งเสริมการจัดหาเงินทุนสำหรับสงครามเชิงรุก
  - มันรบกวนการออกใบมอบหมาย
  - มันเอื้อประโยชน์ต่อคนรวย
explanation: |
  ดูปองต์ เดอ เนมูร์ วิพากษ์วิจารณ์การผูกขาดที่มอบให้แก่ Caisse d'Escompte โดยเชื่อว่ามันขัดขวางการแข่งขันเสรีและทำลายเศรษฐกิจ
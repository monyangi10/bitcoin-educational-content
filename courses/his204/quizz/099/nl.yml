question: Wat was zijn kritiek op de Caisse d'Escompte Act van november 1789?
answer: Het is een monopolistische instelling die zich moet houden aan de regels van vrije concurrentie
wrong_answers:
  - Het richt een instelling op die de financiering van offensieve oorlogen zal aanmoedigen
  - Het verstoort de uitgifte van assignaten
  - Het bevoordeelt de rijken
explanation: |
  Dupont de Nemours bekritiseerde het monopolie dat aan de Caisse d'Escompte was verleend omdat hij vond dat het de vrije concurrentie belemmerde en schadelijk was voor de economie.
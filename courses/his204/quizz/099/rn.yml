question: Ni igiki yaneguye itegeko rya Caisse d’Escompte ryo muri MUnyonyo mu 1789?
answer: Ni ikigo gitwagwa n'abantu bamwe gitegerezwa kubahiriza amategeko n'uguhiganwa mu bwigenge .
wrong_answers:
  - Rishiraho ikigo kizoremesha ugutanga amahera y'intambara z'ibitero .
  - Bihungabanya ugutanga ama kw'ayo mafaranga(assignats) .
  - Iha agaciro cane abatunzi .
explanation: |
  Dupont de Nemours yaraneguye uburenganzira bwahawe Caisse d’Escompte, yiyumvira ko bubangamira uguhiganwa mu mwidegemvyo kandi bugatuma ubutunzi buhungabana.
reviewed: true

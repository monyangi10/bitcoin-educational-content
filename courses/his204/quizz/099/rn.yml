question: Ni igiki yaneguye itegeko rya Caisse d’Escompte ryo mu kwezi kwa 11 mu 1789?
answer: Ni ikigo gifise uburenganzira bwo kwubahiriza amategeko y'uguhiganwa mu mwidegemvyo .
wrong_answers:
  - Rishiraho ikigo kizoremesha ugutanga amahera y'intambara z'ibitero .
  - Bihungabanya ugutanga ama assignats .
  - Irakunda abatunzi .
explanation: |
  Dupont de Nemours yaraneguye uburenganzira bwo gukora ibintu vyose bwahawe Caisse d’Escompte, yiyumvira ko bubangamira uguhiganwa mu mwidegemvyo kandi bugatuma ubutunzi buhungabana.
question: Каква е критиката му към Закона за ескортите от ноември 1789 г.?
answer: Това е монополно предприятие, което трябва да се подчинява на правилата на свободната конкуренция
wrong_answers:
  - Създава институция, която ще насърчава финансирането на нападателни войни
  - То нарушава издаването на цесии
  - Тя облагодетелства богатите
explanation: |
  Дюпон дьо Немур критикува монопола, предоставен на Caisse d'Escompte, като смята, че той възпрепятства свободната конкуренция и вреди на икономиката.
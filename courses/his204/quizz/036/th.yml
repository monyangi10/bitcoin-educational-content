question: อะไรที่พิเศษเกี่ยวกับงานเขียนของกลุ่มกูร์เนย์?
answer: เหล่านี้ส่วนใหญ่เป็นการแปลของนักเขียนต่างประเทศ
wrong_answers:
  - พวกเขาทั้งหมดเป็นงานเขียนที่ปกป้องเสรีนิยมทางเศรษฐกิจ
  - เหล่านี้คือบทความเกี่ยวกับการศึกษาทางวิทยาศาสตร์ของเศรษฐศาสตร์
  - เหล่านี้คือแผ่นพับเสียดสี
explanation: |
  Cercle de Gournay เป็นที่รู้จักในการแปลผลงานทางเศรษฐกิจภาษาอังกฤษและดัตช์ ช่วยเผยแพร่แนวคิดเสรีนิยมในฝรั่งเศส
question: Какво е особеното в трудовете на кръга "Гурнай"?
answer: Това са предимно преводи на чужди автори
wrong_answers:
  - Всички те са трудове в защита на икономическия либерализъм
  - Това са трактати за научното изследване на икономиката
  - Това са сатирични памфлети
explanation: |
  Кръгът дьо Гурнай е известен с преводите на английски и холандски икономически трудове, които спомагат за разпространението на либералните идеи във Франция.
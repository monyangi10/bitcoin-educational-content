question: Ni igiki kidasanzwe ku vyanditswe n'umuzingi wa Gournay?
answer: Ivyo ahanini ni ubuhinduzi bw'abanditsi bo mu mahanga .
wrong_answers:
  - Vyose ni inyandiko ziburanira uburenganzira bw'ubutunzi .
  - Ivyo ni ibitabu vyerekeye inyigisho za siyansi z'ubutunzi .
  - Ivyo ni udutabu tw'ugushinyagurira .
explanation: |
  Iryo shirahamwe ryitwa cercle de Gournay rizwi cane mu guhindura ibitabu vy’ubutunzi vyo mu congereza no mu giholandi, bikaba bifasha gukwiragiza ivyiyumviro vy’ubwigenge mu Bufaransa.
reviewed: true

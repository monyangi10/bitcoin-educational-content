question: Welke van deze auteurs zat tijdens de Revolutie niet in de Assemblee?
answer: De Markies van Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  De markies de Mirabeau, hoewel een invloedrijke fysiocraat, zetelde niet in de Assemblée tijdens de Revolutie. François Quesnay was al overleden.
question: По време на Революцията кой от тези автори не е участвал в Асамблеята?
answer: Маркиз дьо Мирабо
wrong_answers:
  - Дюпон дьо Немур
  - Louis-Paul Abeille
  - Франсоа Кеснай
explanation: |
  Маркиз дьо Мирабо, въпреки че е влиятелен физиократ, не участва в Асамблеята по време на Революцията. Франсоа Кесне вече е починал.
question: По време на Революцията кой от тези автори не е участвал в Асамблеята?
answer: Маркиз дьо Мирабо
wrong_answers:
  - Дюпон дьо Немур
  - Луи-Пол Абей
  - Франсоа Кене
explanation: |
  Маркиз дьо Мирабо, въпреки че е влиятелен физиократ, не участва в Асамблеята по време на Революцията. Франсоа Кене вече е починал.
reviewed: true

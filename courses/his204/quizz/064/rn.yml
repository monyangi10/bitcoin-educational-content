question: Mu gihe c’Impinduka, ni nde muri abo banditsi atigeze yicara mw'ikoraniro?
answer: The Marquis de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marquis de Mirabeau, naho yari umuhinga w'umu Physiocrats afise ububasha, ntiyicara mw'ikoraniro mu gihe c’Impinduka. François Quesnay yari amaze gupfa.
reviewed: true

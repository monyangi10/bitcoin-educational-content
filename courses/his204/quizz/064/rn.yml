question: Mu gihe c’Impinduka, ni nde muri abo banditsi aticara mu Nteko?
answer: Umukuru w'igisagara ca Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Ludoviko-Pawulo Abeyi
  - Faransuwa Keseni
explanation: |
  Marquis de Mirabeau, naho yari umuhinga mu vy’umubiri afise ububasha, ntiyicara mu Nteko mu gihe c’Impinduka. François Quesnay yari amaze gupfa.
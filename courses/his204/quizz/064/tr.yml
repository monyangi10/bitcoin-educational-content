question: Devrim sırasında bu yazarlardan hangisi Meclis'te yer almamıştır?
answer: Marki de Mirabeau
wrong_answers:
  - Dupont de Nemours
  - Louis-Paul Abeille
  - François Quesnay
explanation: |
  Marki de Mirabeau, etkili bir fizyokrat olmasına rağmen Devrim sırasında Meclis'te yer almamıştır. François Quesnay çoktan vefat etmişti.
question: ในช่วงการปฏิวัติ ผู้เขียนคนใดในนี้ไม่ได้เข้าร่วมในสภา?
answer: มาร์ควิส เดอ มิราโบ
wrong_answers:
  - ดูปองต์ เดอ เนมูร์
  - หลุยส์-ปอล อาเบยล์
  - ฟร็องซัว เกส์เน่
explanation: |
  มาร์ควิส เดอ มิราโบ แม้จะเป็นนักสรีรศาสตร์ที่มีอิทธิพล แต่ก็ไม่ได้เข้าร่วมในสมัชชาระหว่างการปฏิวัติ ฟรองซัวส์ เกซเนย์ ได้เสียชีวิตไปแล้ว
question: None Marquis d’Argenson yagereranije ikibano n’iki?
answer: Ku ruzi, rutemba mu buryo busanzwe ata mategeko yinjiramwo .
wrong_answers:
  - Ku mw’ishamba, aho itegeko ry’abakomeye gusa ari ryo riganza .
  - Ku muzinga w’inzuki, aho udukoko twose dukora nk’uko twipfuza, ivyo bikaba bituma bose bamererwa neza .
  - Imashini igoye cane isaba guhora itunganywa
explanation: |
  Marquis d’Argenson yagereranije ikibano n’uruzi, ashimika ku kamaro ko kureka ibintu bikagenda nk’uko bisanzwe, ata Leta yinjiramwo birenze urugero. Yarizera ko ubutunzi bufise amategeko yabwo, kandi ko ari vyiza kuyabaha aho kugerageza kuyagenzura.
question: มาร์ควิส ดาร์เจนซงเปรียบเทียบสังคมกับอะไร?
answer: ถึงแม่น้ำ ซึ่งไหลอย่างเป็นธรรมชาติโดยปราศจากการแทรกแซงของกฎหมาย
wrong_answers:
  - ไปยังป่าดงดิบ ที่ซึ่งมีเพียงกฎของผู้แข็งแกร่งที่สุดเท่านั้นที่ครองราชย์
  - ไปยังรังผึ้ง ที่ซึ่งแมลงแต่ละตัวทำหน้าที่ตามความสนใจของตนเอง ส่งผลให้เกิดความเป็นอยู่ที่ดีร่วมกันของทุกคน
  - เครื่องจักรที่ซับซ้อนซึ่งต้องการการบำรุงรักษาอย่างต่อเนื่อง
explanation: |
  มาร์ควิส ดาร์เจนซง เปรียบเทียบสังคมกับแม่น้ำ โดยเน้นย้ำถึงความสำคัญของการปล่อยให้สิ่งต่าง ๆ ดำเนินไปตามธรรมชาติ โดยไม่ต้องมีการแทรกแซงจากรัฐมากเกินไป เขาเชื่อว่าเศรษฐกิจมีข้อบังคับของตัวเอง และควรเคารพข้อบังคับเหล่านั้นมากกว่าพยายามควบคุมมัน
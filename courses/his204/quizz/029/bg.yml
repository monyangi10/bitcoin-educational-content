question: С какво сравнява обществото маркиз д'Арженсон?
answer: За река, която тече естествено, без намесата на закони
wrong_answers:
  - В джунглата, където властва само законът на най-силния
  - На пчелен кошер, в който всяко насекомо действа според собствените си интереси, което води до общото благополучие на всички
  - Сложна машина, изискваща постоянна поддръжка
explanation: |
  Маркиз д'Арженсон сравнява обществото с река, подчертавайки значението на това да се остави нещата да се развиват естествено, без прекомерна държавна намеса. Той вярва, че икономиката има свои собствени закони и че е за предпочитане да ги спазваме, вместо да се опитваме да ги контролираме.
reviewed: true

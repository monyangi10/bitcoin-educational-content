question: Waar vergeleek de Markies d'Argenson de samenleving mee?
answer: Naar een rivier, die natuurlijk stroomt zonder tussenkomst van wetten
wrong_answers:
  - Naar een jungle, waar alleen het recht van de sterkste heerst
  - Naar een bijenkorf, waar elk insect handelt volgens zijn eigen belangen, resulterend in het algemeen welzijn van allen
  - Een complexe machine die voortdurend onderhoud vereist
explanation: |
  De Markies d'Argenson vergeleek de maatschappij met een rivier en benadrukte het belang om dingen hun natuurlijke loop te laten nemen, zonder overmatige staatsinterventie. Hij geloofde dat de economie haar eigen wetten had en dat het beter was deze te respecteren dan te proberen ze te controleren.
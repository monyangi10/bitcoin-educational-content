question: Marquis d'Argenson toplumu neye benzetiyordu?
answer: Yasaların müdahalesi olmadan doğal olarak akan bir nehre
wrong_answers:
  - Sadece en güçlünün yasasının hüküm sürdüğü bir ormana
  - Her bir böceğin kendi çıkarlarına göre hareket ettiği ve bunun sonucunda herkesin ortak refahının sağlandığı bir arı kovanına
  - Sürekli bakım gerektiren karmaşık bir makine
explanation: |
  Marquis d'Argenson toplumu bir nehre benzeterek, aşırı devlet müdahalesi olmaksızın olayları doğal akışına bırakmanın önemini vurgulamıştır. Ekonominin kendi yasaları olduğuna ve bunları kontrol etmeye çalışmak yerine bunlara saygı göstermenin tercih edileceğine inanıyordu.
question: 아르젠송 후작은 사회를 무엇에 비유했나요?
answer: 법의 개입 없이 자연스레 흐르는 강을 향해
wrong_answers:
  - 강자의 법칙만이 지배하는 정글에서
  - 벌집은 각 곤충이 자신의 이익에 따라 행동하여 모두의 공동 복지를 가져옵니다
  - 지속적인 유지보수가 필요한 복잡한 기계
explanation: |
  다겐송 후작은 사회를 강에 비유하며 과도한 국가 개입 없이 자연스러운 흐름에 맡기는 것이 중요하다고 강조했습니다. 그는 경제에는 고유한 법칙이 있으며, 이를 통제하기보다는 존중하는 것이 바람직하다고 믿었습니다.
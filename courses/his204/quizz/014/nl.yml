question: Met welke theorie is Boisguilbert niet gecrediteerd?
answer: Geen van deze antwoorden is geschikt
wrong_answers:
  - De werkloosheidstheorie van Keynes
  - Marxistische klassentheorie
  - De theorie van consumptiegeleid herstel
explanation: |
  Aan Boisguilbert worden voorlopers van Keynes' theorie van latente werkloosheid, Marx' klassentheorie en de theorie van consumptiegeleid herstel toegeschreven, hoewel hij deze theorieën niet zo expliciet formuleerde.
question: ทฤษฎีใดที่ Boisguilbert ไม่ได้รับเครดิต?
answer: ไม่มีคำตอบใดที่เหมาะสม
wrong_answers:
  - ทฤษฎีการว่างงานต่ำของเคนส์
  - ทฤษฎีชนชั้นมาร์กซิสต์
  - ทฤษฎีการฟื้นตัวที่นำโดยการบริโภค
explanation: |
  Boisguilbert ได้รับการยกย่องว่าเป็นผู้บุกเบิกแนวคิดที่นำไปสู่ทฤษฎีการว่างงานของ Keynes, ทฤษฎีชนชั้นของ Marx และทฤษฎีการฟื้นตัวที่นำโดยการบริโภค แม้ว่าเขาจะไม่ได้สร้างทฤษฎีเหล่านี้อย่างชัดเจนก็ตาม
question: Коя теория не е била приписана на Боагилбер?
answer: Нито един от тези отговори не е подходящ
wrong_answers:
  - Теория на Кейнс за недостатъчната заетост
  - Марксистка теория на класите
  - Теория за възстановяване, водено от потреблението
explanation: |
  На Боагилбер се приписват идеи, предшестващи теорията на Кейнс за непълната заетост, класовата теория на Маркс и теорията за възстановяване, водено от потреблението, въпреки че той не формулира тези теории толкова ясно.
reviewed: true

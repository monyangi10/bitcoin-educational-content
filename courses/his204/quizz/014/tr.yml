question: Boisguilbert'in hangi teorisine itibar edilmemiştir?
answer: Bu cevapların hiçbiri uygun değildir
wrong_answers:
  - Keynes'in eksik istihdam teorisi
  - Marksist sınıf teorisi
  - Tüketim öncülüğünde toparlanma teorisi
explanation: |
  Boisguilbert, Keynes'in eksik istihdam teorisine, Marx'ın sınıf teorisine ve tüketim öncülüğünde toparlanma teorisine öncülük eden fikirlere sahip olmakla birlikte, bu teorileri açık bir şekilde formüle etmemiştir.
question: Кои са принципите на маркиз д'Арженсон, които Адам Смит споделя?
answer: Разделение на труда и личен интерес
wrong_answers:
  - Лесе-фер и личен интерес
  - Лесе-фер и разделение на труда
  - Разделение на труда и протекционизъм
explanation: |
  Маркиз д'Арженсон изпреварва някои от ключовите идеи на Адам Смит, като разделението на труда и ролята на личния интерес във функционирането на икономиката. Смит развива тези идеи по-систематично в "Богатството на народите".
reviewed: true

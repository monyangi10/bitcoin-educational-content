question: Wat zijn de principes van de Markies d'Argenson die Adam Smith deelt?
answer: Arbeidsverdeling en eigenbelang
wrong_answers:
  - Laissez faire en eigenbelang
  - Laissez faire en arbeidsverdeling
  - Arbeidsverdeling en protectionisme
explanation: |
  De Markies d'Argenson liep vooruit op enkele van de belangrijkste ideeën van Adam Smith, zoals de arbeidsverdeling en de rol van eigenbelang in het functioneren van de economie. Smith ontwikkelde deze ideeën systematischer in "The Wealth of Nations".
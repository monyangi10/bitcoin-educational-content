question: Ni ingingo ngenderwako izihe za Marquis d’Argenson Adamu Smith asangiye?
answer: Ugucapura ibikorwa n'inyungu z'umuntu ku giti ciwe
wrong_answers:
  - Ukwidegemvya n'inyungu z'umuntu ubwiwe
  - Ukwidegemvya no kugabanya ibikorwa
  - Ugucapura ibikorwa n'uburinzi
explanation: |
  Marquis d’Argenson yari yiteze bimwe mu vyiyumviro nyamukuru vya Adamu Smith, nk’ugucapura ibikorwa n’uruhara rw’inyungu z’umuntu ku giti ciwe mu migenderanire y’ubutunzi. Smith yashize imbere ivyo vyiyumviro mu buryo butunganye cane mu gitabu ciwe citwa "Ubutunzi bw'amahanga".
question: Quels sont les principes du marquis d’Argenson qu’on retrouve chez Adam Smith
answer: La division du travail et l’intérêt personnel
wrong_answers:
  - Le laissez-faire et l’intérêt personnel
  - Le laissez-faire et la division du travail
  - Le division du travail et le protectionisme
explanation: |
  Le marquis d'Argenson a anticipé des idées clés d'Adam Smith, comme la division du travail et le rôle de l'intérêt personnel dans le fonctionnement de l'économie. Smith a développé ces idées de manière plus systématique dans "La Richesse des Nations".

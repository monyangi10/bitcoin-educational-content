question: Adam Smith'in paylaştığı Marquis d'Argenson'un ilkeleri nelerdir?
answer: İş bölümü ve kişisel çıkar
wrong_answers:
  - Laissez faire ve kişisel çıkar
  - Laissez faire ve iş bölümü
  - İş bölümü ve korumacılık
explanation: |
  Marquis d'Argenson, Adam Smith'in iş bölümü ve kişisel çıkarların ekonominin işleyişindeki rolü gibi bazı temel fikirlerini öngörmüştür. Smith bu fikirleri "Ulusların Zenginliği" adlı eserinde daha sistematik bir şekilde geliştirmiştir.
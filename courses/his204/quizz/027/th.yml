question: หลักการของ Marquis d'Argenson ที่ Adam Smith มีร่วมกันคืออะไร?
answer: การแบ่งงานและผลประโยชน์ส่วนตน
wrong_answers:
  - ปล่อยให้เป็นไปตามธรรมชาติและผลประโยชน์ส่วนตน
  - ปล่อยให้เป็นไปตามธรรมชาติและการแบ่งงาน
  - การแบ่งงานและการปกป้องทางการค้า
explanation: |
  มาร์ควิส ดาร์เจนซง ได้คาดการณ์แนวคิดสำคัญบางประการของอดัม สมิธ เช่น การแบ่งงานกันทำ และบทบาทของผลประโยชน์ส่วนตนในการทำงานของเศรษฐกิจ สมิธได้พัฒนาแนวคิดเหล่านี้อย่างเป็นระบบมากขึ้นใน "The Wealth of Nations"
question: ทำไม ตามที่สาวกของโคลแบร์กล่าวไว้ การค้าถึงเป็นสงครามที่ไม่มีวันสิ้นสุด?
answer: ประเทศต่าง ๆ สามารถร่ำรวยขึ้นได้เพียงแค่ค่าใช้จ่ายของกันและกันเท่านั้น
wrong_answers:
  - เรือรบจำเป็นสำหรับการสนับสนุนการค้า
  - การค้าเจริญรุ่งเรืองที่สุดในช่วงสงคราม
  - การค้าเป็นการแข่งขันอย่างต่อเนื่องเพื่อแย่งชิงทรัพยากร
explanation: |
  ในมุมมองของลัทธิพาณิชยนิยม ความมั่งคั่งของโลกถือว่าเป็นปริมาณที่คงที่ ดังนั้น การที่ประเทศหนึ่งร่ำรวยขึ้นจึงต้องแลกมาด้วยความเสียหายของประเทศอื่น ๆ จึงเกิดแนวคิดของ "สงครามเศรษฐกิจ" ที่ถาวร
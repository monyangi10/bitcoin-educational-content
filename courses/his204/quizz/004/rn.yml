question: Nk’uko abigishwa ba Colbert babivuga, ni kubera iki ubudandaji ari intambara idahera?
answer: Amahanga ashobora gutunga gusa ku giciro c'ayandi .
wrong_answers:
  - Ubwato bw'intambara burakenewe kugira ngo bufashe ubudandaji .
  - Ubudandaji buratera imbere cane mu bihe vy'intambara .
  - Ubudandaji ni uguhiganwa guhoraho kubera ubutunzi .
explanation: |
  Mu vyo abacuruzi babona, ubutunzi bwo kw’isi bufatwa nk’igitigiri kidahinduka. Ku bw'ivyo, ugutunganywa kw'igihugu kimwe ni ngombwa ko gutakaza abandi, ni co gituma habaho iciyumviro c'"intambara y'ubutunzi" ihoraho.
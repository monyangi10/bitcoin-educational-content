question: Waarom is de handel volgens Colberts leerlingen een eeuwigdurende oorlog?
answer: Naties kunnen alleen rijk worden ten koste van elkaar
wrong_answers:
  - Oorlogsschepen zijn nodig om de handel te ondersteunen
  - Handel bloeit het meest in tijden van oorlog
  - Handel is een constante strijd om grondstoffen
explanation: |
  In de mercantilistische visie wordt de rijkdom van de wereld beschouwd als een vaste hoeveelheid. Bijgevolg gaat de verrijking van de ene natie noodzakelijkerwijs ten koste van de andere, vandaar het idee van een permanente "economische oorlog".
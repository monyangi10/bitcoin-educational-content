question: Защо, според учениците на Колбер, търговията е вечна война?
answer: Нациите могат да забогатеят само за сметка на другите
wrong_answers:
  - Военните кораби са необходими за подпомагане на търговията
  - Търговията процъфтява най-много по време на война
  - Търговията е постоянна конкуренция за ресурси
explanation: |
  В меркантилистката визия световното богатство се смята за фиксирана величина. Следователно обогатяването на една нация задължително е за сметка на други, откъдето идва и идеята за постоянна "икономическа война".
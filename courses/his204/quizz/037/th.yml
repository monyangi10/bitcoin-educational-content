question: ผู้เขียนคนใดต่อไปนี้ไม่ได้เป็นสมาชิกของกลุ่ม Gournay?
answer: ดูปองต์ เดอ เนมูร์ส
wrong_answers:
  - เวรอง เดอ ฟอร์บอนแนส์
  - Turgot
  - อดัม สมิธ
explanation: |
  ดูปองต์ เดอ เนมูร์ เป็นนักเศรษฐศาสตร์แนวฟิสิโอแครต ไม่ใช่สมาชิกของกลุ่มกูร์เนย์ นักฟิสิโอแครตมีแนวคิดที่ใกล้เคียงกับกลุ่มกูร์เนย์ แต่พวกเขาเป็นกลุ่มที่แตกต่างกัน
question: Ni nde muri abo banditsi atari mu mugwi wa Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours yari umuhinga w'umu physiocrat, ntiyari mu bagize umugwi wa Gournay. Abanyabwenge b’ivy’umubiri bari bafise ivyiyumviro bimeze nk’ivy’umugwi wa Gournay, ariko bari bafise umugwi udasanzwe.
reviewed: true

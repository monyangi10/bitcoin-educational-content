question: Ni nde muri abo banditsi atari mu mugwi wa Gournay?
answer: Dupont de Nemours
wrong_answers:
  - Ibara ry'i Forbonnais
  - Turgot
  - Adamu Smith
explanation: |
  Dupont de Nemours yari umuhinga mu vy’umubiri, ntiyari mu bagize umugwi wa Gournay. Abanyabwenge b’ivy’umubiri bari bafise ivyiyumviro bimeze nk’ivy’umugwi wa Gournay, ariko bari bafise umugwi udasanzwe.
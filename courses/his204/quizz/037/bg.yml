question: Кой от тези автори не принадлежи към кръга на Гурнай?
answer: Дюпон дьо Немур
wrong_answers:
  - Véron de Forbonnais
  - Турго
  - Адам Смит
explanation: |
  Дюпон дьо Немур е физиократ, а не член на кръга Гурнай. Физиократите са имали идеи, близки до тези на кръга "Гурнай", но са образували отделна група.
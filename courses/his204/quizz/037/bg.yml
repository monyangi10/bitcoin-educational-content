question: Кой от тези автори не принадлежи към кръга на Гурне?
answer: Дюпон дьо Немур
wrong_answers:
  - Верон дьо Форбоне
  - Турго
  - Адам Смит
explanation: |
  Дюпон дьо Немур е физиократ, а не член на кръга Гурне. Физиократите са имали идеи, близки до тези на кръга Гурне, но са образували отделна група.
reviewed: true

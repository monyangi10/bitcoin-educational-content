question: Welke van deze auteurs behoort niet tot de Gournay-kring?
answer: Dupont de Nemours
wrong_answers:
  - Véron de Forbonnais
  - Turgot
  - Adam Smith
explanation: |
  Dupont de Nemours was een fysiocraat, geen lid van de Gournay-kring. De fysiocraten hadden ideeën die dicht bij die van Gournay lagen, maar ze vormden een aparte groep.
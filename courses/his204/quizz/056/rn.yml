question: Ku ba Physiocrates, ni irihe tandukaniro riri hagati y’uguhingura n’akarusho?
answer: Umuhinguzi n’umucuruzi barashobora kunguka, ariko umurimyi ni we wenyene atanga umwimbu, kuko umusaruro ni uguhingura ibintu ngirakamaro .
wrong_answers:
  - Abahinguzi n’abacuruzi boshobora kutagira inyungu. Umurimyi wenyene niwe ashobora kuronka inyungu(uburusho)(bwi)nyinshi cane.
  - Umurimyi arashobora kuronka amafaranga, ariko umuhinguzi n’umucuruzi ni bo bonyene batanga umwimbu, kuko guhingura ni ugutanga igikorwa .
  - Umusaruro n'akarusho ni bimwe.
explanation: |
  Aba Physiocrats bemera ko uburimyi bwonyene ari bwo butanga umwimbu, kuko ari bwo burema ibintu bishasha. Inganda n’ubudandaji vyabonwa ko ari ibikorwa bitagira akamaro, kubera ko vyahindura gusa canke bikakuraho ubutunzi bwariho.
reviewed: true

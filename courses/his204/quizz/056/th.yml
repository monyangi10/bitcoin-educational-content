question: สำหรับกลุ่มฟิสิโอแครต ความแตกต่างระหว่างการผลิตและกำไรคืออะไร?
answer: นักอุตสาหกรรมและพ่อค้าสามารถชนะได้ แต่มีเพียงเกษตรกรเท่านั้นที่ผลิต เพราะการผลิตคือการสร้างสรรค์วัตถุที่มีประโยชน์
wrong_answers:
  - ผู้ผลิตและผู้ค้าอาจไม่มีกำไร เฉพาะการเกษตรเท่านั้นที่จำเป็นต้องนำมาซึ่งกำไร
  - ชาวนาสามารถหารายได้ แต่มีเพียงนักอุตสาหกรรมและพ่อค้าเท่านั้นที่ผลิต เพราะการผลิตคือการให้บริการ
  - การผลิตและกำไรคือสิ่งเดียวกัน
explanation: |
  พวกฟิสิโอแครตเชื่อว่าเฉพาะการเกษตรเท่านั้นที่เป็นการผลิตที่แท้จริง เนื่องจากมันสร้างสสารใหม่ อุตสาหกรรมและการพาณิชย์ถูกมองว่าเป็นกิจกรรมที่ปราศจากผลผลิต เพราะเพียงแค่เปลี่ยนแปลงหรือย้ายที่ความมั่งคั่งที่มีอยู่แล้ว
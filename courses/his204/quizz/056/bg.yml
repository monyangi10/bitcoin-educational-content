question: Каква е разликата между производство и печалба за физиократите?
answer: Индустриалецът и търговецът могат да спечелят, но само фермерът произвежда, защото производството е създаване на полезна материя
wrong_answers:
  - Производителите и търговците може да не реализират печалба. Само селското стопанство задължително носи печалба.
  - Земеделецът може да печели, но само индустриалецът и търговецът произвеждат, защото да произвеждаш означава да предоставяш услуга
  - Производство и печалба са едно и също нещо
explanation: |
  Физиократите смятат, че само земеделието е продуктивно, тъй като създава нова материя. Промишлеността и търговията се смятат за безплодни дейности, тъй като те само трансформират или изместват съществуващото богатство.
reviewed: true

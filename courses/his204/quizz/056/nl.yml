question: Wat is voor de fysiocraten het verschil tussen productie en winst?
answer: De industrieel en de handelaar kunnen winnen, maar alleen de boer produceert, want productie is het creëren van nuttige materie
wrong_answers:
  - Fabrikanten en handelaren mogen geen winst maken. Alleen landbouw levert noodzakelijkerwijs winst op.
  - De boer kan verdienen, maar alleen de industrieel en de handelaar produceren, want produceren is een dienst leveren
  - Productie en winst zijn hetzelfde
explanation: |
  De Fysiocraten geloofden dat alleen landbouw productief was, omdat het nieuwe materie creëerde. Industrie en handel werden gezien als steriele activiteiten, omdat ze bestaande rijkdom slechts transformeerden of verdrongen.
question: 피지오크라트에게 생산과 이윤의 차이점은 무엇인가요?
answer: 산업가와 상인이 이길 수 있지만 생산은 유용한 물질의 창조이기 때문에 농부 만이 생산합니다
wrong_answers:
  - 제조업체와 상인은 이익을 얻지 못할 수도 있습니다. 농업만이 반드시 수익을 창출합니다.
  - 생산은 서비스를 제공하는 것이기 때문에 농부는 돈을 벌 수 있지만 생산은 산업가와 상인 만이 할 수 있습니다
  - 생산과 수익은 같은 것입니다
explanation: |
  피지오크라트들은 새로운 물질을 만들어내는 농업만이 생산적이라고 믿었습니다. 산업과 상업은 기존의 부를 변형하거나 대체할 뿐이므로 무미건조한 활동으로 간주했습니다.
question: Защо теорията на Кондиляк осигурява значителна подкрепа за принципа на свободната търговия?
answer: Защото, ако търговията винаги е взаимноизгодна, няма смисъл да я ограничаваме или забраняваме чрез митниците
wrong_answers:
  - Защото Кондилак доказва чрез изчисления, че свободната търговия обогатява нацията повече от протекционизма
  - Защото Кондилак доказа, че свободната търговия е полезна за мира
  - Защото Кондиляк е бил приятел на Адам Смит
explanation: |
  Теорията на Кондиляк твърди, че размяната е взаимноизгодна, тъй като всяка страна се отказва от това, което цени най-малко, за да получи това, което цени най-много. Следователно не е необходимо да се ограничава или забранява търговията чрез мита или други ограничения.
reviewed: true

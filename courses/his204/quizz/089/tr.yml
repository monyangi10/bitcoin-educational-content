question: Condillac'ın teorisi serbest ticaret ilkesi için neden önemli bir destek sağlıyor?
answer: Çünkü ticaret her zaman karşılıklı yarar sağlıyorsa, gümrükler yoluyla sınırlamanın veya yasaklamanın bir anlamı yoktur
wrong_answers:
  - Çünkü Condillac, serbest ticaretin bir ulusu korumacılıktan daha fazla zenginleştirdiğini hesaplayarak göstermiştir
  - Çünkü Condillac serbest ticaretin barış için iyi olduğunu kanıtladı
  - Çünkü Condillac, Adam Smith'in arkadaşıydı
explanation: |
  Condillac'ın teorisi, her bir tarafın en çok değer verdiği şeyi elde etmek için en az değer verdiği şeyden vazgeçmesi nedeniyle Exchange'ın karşılıklı olarak faydalı olduğunu savunur. Sonuç olarak, gümrükler veya diğer kısıtlamalar yoluyla ticareti sınırlamaya veya yasaklamaya gerek yoktur.
question: ทำไมทฤษฎีของ Condillac จึงให้การสนับสนุนอย่างมากต่อหลักการของการค้าเสรี?
answer: เพราะถ้าการค้าเป็นประโยชน์ร่วมกันเสมอ ก็ไม่มีเหตุผลที่จะจำกัดหรือห้ามมันผ่านทางศุลกากร
wrong_answers:
  - เพราะ Condillac แสดงให้เห็นโดยการคำนวณว่าการค้าเสรีทำให้ประเทศมั่งคั่งมากกว่าการปกป้องทางการค้า
  - เพราะ Condillac พิสูจน์แล้วว่าการค้าเสรีเป็นผลดีต่อสันติภาพ
  - เพราะ Condillac เป็นเพื่อนของ Adam Smith
explanation: |
  ทฤษฎีของ Condillac ยืนยันว่าการแลกเปลี่ยนเป็นประโยชน์ร่วมกัน เนื่องจากแต่ละฝ่ายสละสิ่งที่มีค่าน้อยที่สุดเพื่อให้ได้สิ่งที่มีค่ามากที่สุด ดังนั้นจึงไม่มีความจำเป็นที่จะจำกัดหรือห้ามการค้าโดยผ่านศุลกากรหรือข้อจำกัดอื่น ๆ
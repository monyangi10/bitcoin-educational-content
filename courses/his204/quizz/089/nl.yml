question: Waarom biedt Condillacs theorie veel steun voor het principe van vrije handel?
answer: Want als handel altijd voordelig is voor beide partijen, dan heeft het geen zin om deze te beperken of te verbieden via de douane
wrong_answers:
  - Omdat Condillac door berekening aantoonde dat vrije handel een natie meer verrijkt dan protectionisme
  - Omdat Condillac bewees dat vrije handel goed is voor de vrede
  - Omdat Condillac een vriend was van Adam Smith
explanation: |
  De theorie van Condillac stelt dat Exchange wederzijds voordelig is, omdat elke partij opgeeft wat ze het minst waardeert om te verkrijgen wat ze het meest waardeert. Bijgevolg is het niet nodig om de handel te beperken of te verbieden door middel van douane- of andere beperkingen.
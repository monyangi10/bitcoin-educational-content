question: Pourquoi la théorie de Condillac apporte un appui considérable au principe du libre-échange ?
answer: Parce que si les échanges sont toujours mutuellement avantageux, il est inutile des les limiter ou les interdire par les douanes
wrong_answers:
  - Parce que Condillac a montré par le calcul que le libre-échange enrichit plus une nation que le protectionnisme
  - Parce que Condillac a prouvé que le libre-échange est favorable à la paix
  - Parce que Condillac était un ami d'Adam Smith
explanation: |
  La théorie de Condillac soutient que l'échange est mutuellement avantageux, car chaque partie cède ce qu'elle valorise le moins pour obtenir ce qu'elle valorise le plus. Par conséquent, il est inutile de limiter ou d'interdire les échanges par des douanes ou d'autres restrictions.

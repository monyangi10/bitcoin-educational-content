question: 콘딜락의 이론이 자유무역 원칙에 상당한 지지를 받는 이유는 무엇인가요?
answer: 무역이 항상 상호 이익이 된다면 세관을 통해 무역을 제한하거나 금지할 필요가 없기 때문입니다
wrong_answers:
  - 콘딜락은 자유무역이 보호주의보다 국가를 더 풍요롭게 한다는 사실을 계산을 통해 보여주었습니다
  - 콘딜락은 자유무역이 평화에 도움이 된다는 것을 증명했습니다
  - 콘딜락은 아담 스미스의 친구였기 때문에
explanation: |
  콘딜락의 이론에 따르면 각 당사자는 가장 가치 있는 것을 얻기 위해 가장 가치 없는 것을 포기하기 때문에 Exchange은 상호 이익이 됩니다. 따라서 세관이나 기타 규제를 통해 거래를 제한하거나 금지할 필요가 없습니다.
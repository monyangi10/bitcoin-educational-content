question: Welk beroemd boek heeft de de Gournay groep mogelijk gemaakt?
answer: Essay over de aard van handel in het algemeen door Richard Cantillon
wrong_answers:
  - Politieke verhandelingen van David Hume
  - Handelsverdragen van Josiah Child
  - Machiavelli's Prins
explanation: |
  Le cercle de Gournay droeg bij aan de postume publicatie van Cantillons "Essai", een belangrijk werk over economisch denken.
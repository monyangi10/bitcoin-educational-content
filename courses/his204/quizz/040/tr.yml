question: De Gournay grubu hangi ünlü kitabın yayınlanmasını sağlamıştır?
answer: Richard Cantillon tarafından genel olarak ticaretin doğası üzerine deneme
wrong_answers:
  - David Hume'un Siyasi Söylemleri
  - Josiah Child'ın Ticaret Antlaşmaları
  - Machiavelli'nin Prensi
explanation: |
  Le cercle de Gournay, Cantillon'un önemli bir ekonomik düşünce eseri olan "Essai "nin ölümünden sonra yayınlanmasına katkıda bulunmuştur.
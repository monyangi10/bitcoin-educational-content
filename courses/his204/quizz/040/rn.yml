question: Ni igitabu ikihe kizwi cane umugwi wa de Gournay watumye gisohoka?
answer: Inyandiko ku kamere k'ubudandaji muri rusangi yanditswe na Richard Cantillon
wrong_answers:
  - Insiguro za politike za David Hume
  - Amasezerano y'ubudandaji ya Yosiya Child
  - Umuganwa wa Makiyaveli
explanation: |
  Le cercle de Gournay yarafashije mu gusohora igitabu ca Cantillon citwa "Essai", igitabu gikomeye c'ivyiyumviro vy'ubutunzi inyuma y'urupfu rwiwe.
question: หนังสือเล่มใดที่กลุ่ม de Gournay ช่วยให้ได้รับการตีพิมพ์?
answer: เรียงความเกี่ยวกับธรรมชาติของการพาณิชย์โดยทั่วไป โดย Richard Cantillon
wrong_answers:
  - การสนทนาทางการเมืองของเดวิด ฮูม
  - สนธิสัญญาการค้าของ Josiah Child
  - เจ้าชายของมาคิอาเวลลี
explanation: |
  Le cercle de Gournay มีส่วนร่วมในการตีพิมพ์ผลงานหลังมรณกรรมของ Cantillon เรื่อง "Essai" ซึ่งเป็นผลงานสำคัญทางความคิดทางเศรษฐศาสตร์
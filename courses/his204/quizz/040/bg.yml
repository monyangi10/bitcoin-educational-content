question: Коя е известната книга, чието издаване е подпомогнато от групата на дьо Гурнай?
answer: Есе за същността на търговията като цяло от Ричард Кантильон
wrong_answers:
  - Политическите дискурси на Дейвид Хюм
  - Търговски договори на Джосая Чайлд
  - Принцът на Макиавели
explanation: |
  Le cercle de Gournay допринася за посмъртното публикуване на "Essai" на Кантильон - основен труд на икономическата мисъл.
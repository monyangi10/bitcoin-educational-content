question: Защо е наречен Дюпон дьо Немур, въпреки че е роден като Пиер-Самуел Дю Пон?
answer: За да се разграничи от другите Дюпонтови от Асамблеята от 1789 г
wrong_answers:
  - Той е благороден по произход
  - Жени се за графиня дьо Немур
  - Това беше псевдоним
explanation: |
  "дьо Немур" е добавено към името на Пиер-Самуел Дюпон, за да се различава от другите Дюпон, които са били членове на Асамблеята на конституцията през 1789 г.
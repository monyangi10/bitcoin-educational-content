question: Pierre-Samuel Du Pont olarak doğmuş olmasına rağmen neden Dupont de Nemours olarak anılıyordu?
answer: Onu 1789 Meclisi'nin diğer Dupont'larından ayırmak için
wrong_answers:
  - Kökeni asildir
  - Nemours Kontesi ile evlendi
  - Bu bir takma addı
explanation: |
  "de Nemours" Pierre-Samuel Dupont'un adına, onu 1789'da Assemblée Constitante'de yer alan diğer Dupont'lardan ayırmak için eklenmiştir.
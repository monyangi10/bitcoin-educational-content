question: Waarom werd hij Dupont de Nemours genoemd, ook al was hij geboren als Pierre-Samuel Du Pont?
answer: Om hem te onderscheiden van de andere Duponts van de Assemblée van 1789
wrong_answers:
  - Hij is nobel van afkomst
  - Hij trouwde met de Gravin de Nemours
  - Het was een pseudoniem
explanation: |
  "de Nemours" werd toegevoegd aan de naam van Pierre-Samuel Dupont om hem te onderscheiden van de andere Duponts die in 1789 zitting hadden in de Assemblée Constitante.
question: ทำไมเขาถึงถูกเรียกว่า Dupont de Nemours ทั้งๆ ที่เขาเกิดชื่อ Pierre-Samuel Du Pont?
answer: เพื่อแยกแยะเขาจาก Duponts คนอื่น ๆ ในสมัชชา 1789
wrong_answers:
  - เขามีเชื้อสายสูงศักดิ์
  - เขาแต่งงานกับเคาน์เตสเดอเนมูร์
  - มันเป็นนามปากกา
explanation: |
  "de Nemours" ถูกเพิ่มเข้าไปในชื่อของ Pierre-Samuel Dupont เพื่อแยกแยะเขาจาก Dupont คนอื่น ๆ ที่นั่งใน Assemblée Constitante ในปี 1789
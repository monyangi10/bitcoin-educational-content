question: Защо казваме, че при размяна винаги даваме по-малко, за да получим повече?
answer: Защото винаги се отказваме от нещо, което ценим по-малко, за нещо, което ценим повече
wrong_answers:
  - Защото това е игра на глупаци, в която продаваме продуктите си за повече, отколкото струват
  - Тъй като парите имат стойност, всяка продажба е обогатяване
  - Защото продавачите винаги са по-умни от купувачите
explanation: |
  Ние даваме това, което ценим по-малко, за да получим това, което ценим повече, като размяната е взаимноизгодна.
reviewed: true

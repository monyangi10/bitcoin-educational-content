question: Waarom zeggen we dat we in Exchange altijd minder geven om meer te ontvangen?
answer: Omdat we altijd iets opgeven waar we minder waarde aan hechten voor iets waar we meer waarde aan hechten
wrong_answers:
  - Omdat het een spel voor gekken is, waarbij we onze producten verkopen voor meer dan ze waard zijn
  - Omdat geld waarde heeft, is elke verkoop een verrijking
  - Omdat verkopers altijd slimmer zijn dan kopers
explanation: |
  We geven wat we minder waarderen om te krijgen wat we meer waarderen, waardoor de Exchange wederzijds voordelig is.
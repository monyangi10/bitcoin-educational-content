question: Ni kuki tuvuga ko muri Exchange twama dutanga bike kugira ngo turonke vyinshi?
answer: Kuko twama duheba ikintu duha agaciro gato kugira ngo turonke ikintu duha agaciro kanini .
wrong_answers:
  - Kuko ni urukino rw’ibijuju, aho tugurisha ibintu vyacu ku giciro kirenze ico bifise
  - Kubera ko amahera afise agaciro, ugurisha kwose ni ugutunga
  - Kuko abagurisha bama ari abanyabwenge kurusha abaguzi .
explanation: |
  Turatanga ivyo duha agaciro gatoyi kugira ngo turonke ivyo duha agaciro cane, ivyo bikaba bituma Exchange igira akamaro kuri bose.
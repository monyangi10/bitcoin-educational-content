question: ทำไมเราถึงพูดว่าในการแลกเปลี่ยนเรามักจะให้น้อยกว่าเพื่อรับมากกว่า?
answer: เพราะเรามักจะยอมสละสิ่งที่เรามองว่ามีค่าน้อยกว่าเพื่อสิ่งที่เรามองว่ามีค่ามากกว่าเสมอ
wrong_answers:
  - เพราะมันเป็นเกมของคนโง่ ที่เราขายสินค้าของเราในราคาที่สูงกว่ามูลค่าที่แท้จริง
  - เพราะว่าเงินมีค่า การขายทุกครั้งจึงเป็นการเพิ่มพูน
  - เพราะผู้ขายมักฉลาดกว่าผู้ซื้อเสมอ
explanation: |
  เราให้สิ่งที่เรามองว่ามีค่าน้อยกว่าเพื่อให้ได้สิ่งที่เรามองว่ามีค่ามากกว่า ทำให้การแลกเปลี่ยนเป็นประโยชน์ร่วมกัน
question: Exchange에서는 항상 더 많은 것을 받기 위해 더 적게 준다고 말하는 이유는 무엇인가요?
answer: 우리는 항상 더 가치 있는 것을 위해 덜 가치 있는 것을 포기하기 때문입니다
wrong_answers:
  - 가치보다 비싼 가격에 제품을 판매하는 바보의 게임이기 때문입니다
  - 돈에는 가치가 있기 때문에 모든 판매는 풍요로워집니다
  - 판매자는 항상 구매자보다 똑똑하기 때문에
explanation: |
  우리는 더 가치 있는 것을 얻기 위해 덜 가치 있는 것을 내어주며 상호 이익이 되는 Exchange을 만듭니다.
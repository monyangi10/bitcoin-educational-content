question: Как се описва свободата на търговията според заглавието на книгата на Льо Тросн?
answer: Винаги полезен, никога вреден
wrong_answers:
  - Винаги изгодно и винаги полезно
  - Често изгодно, винаги морално
  - Понякога печеливши, понякога вредни
explanation: |
  Льо Тросн пише "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", в която защитава свободната търговия като винаги полезна и никога вредна за обществото.
reviewed: true

question: Hoe wordt volgens de titel van een boek van Le Trosne de vrijheid van handel beschreven?
answer: Altijd nuttig, nooit schadelijk
wrong_answers:
  - Altijd winstgevend en altijd nuttig
  - Vaak winstgevend, altijd moreel
  - Soms winstgevend, soms schadelijk
explanation: |
  Le Trosne schreef "De l'intérêt social, par rapport à la valeur, à la circulation, à l'industrie et au commerce intérieur et extérieur", waarin hij vrije handel verdedigt als altijd nuttig en nooit schadelijk voor de maatschappij.
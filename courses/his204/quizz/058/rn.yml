question: Dukurikije umutwe w’igitabu canditswe na Le Trosne, umwidegemvyo wo gucuruza udondorwa gute?
answer: Igihe cose ni ngirakamaro, ntiyigera igira nabi
wrong_answers:
  - Igihe cose bifise inyungu kandi bimaze igihe cose bifise akamaro
  - Akenshi biragira inyungu, vyama bifise inyifato runtu
  - Rimwe na rimwe biratuma umuntu agira inyungu, rimwe na rimwe biragira nabi
explanation: |
  Le Trosne yanditse mu gitabu ciwe citwa « Inyungu y’imibano, ku bijanye n’agaciro, ku nzira y’ubudandaji, ku bijanye n’inganda n’ubudandaji bwo mu mutima no hanze », aho aburanira ubudandaji bwigenga ko buhora ari ngirakamaro kandi ko butazokwigera bugira ico bukoze ku kibano.
question: Dukurikije umutwe w’igitabu canditswe na Le Trosne, umwidegemvyo wo gucuruza uvugwa gute?
answer: Igihe cose kiba gikenewe, nticigera kiba kibi(conona)
wrong_answers:
  - Igihe cose bigira inyungu kandi iminsi yose cama gikenewe
  - Akenshi bizana uturusho, iminsi yose bizana umunezero
  - Rimwe na rimwe biratuma umuntu akuramwo uturusho, rimwe na rimwe bironona
explanation: |
  Le Trosne yanditse mu gitabu ciwe citwa « Inyungu y’imibano, ufatiye ku gaciro n’agaciro, ku nzira y’ubudandaji, ku bijanye n’inganda n’ubudandaji bwo mu mutima no hanze », aho aburanira ubudandaji bwigenga ko buhora ari ngirakamaro kandi ko butazokwigera bugira ico bukoze ku kibano.
reviewed: true

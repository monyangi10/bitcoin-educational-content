question: Каква е тезата, залегнала в краткия роман "Chinki, histoire cochininoise", приложима за други страни?
answer: Че корпоративните разпоредби пречат на мъжете да работят и обезкуражават усилията им
wrong_answers:
  - Че Кочинчина е пример за либерално управление
  - Че търговията със зърно трябва да бъде свободна през всички пристанища
  - Кочинчина е страна, богата на природни ресурси
explanation: |
  "Чинки" критикува корпоративните разпоредби, които възпрепятстват икономическата дейност и обезкуражават индивидуалната инициатива.
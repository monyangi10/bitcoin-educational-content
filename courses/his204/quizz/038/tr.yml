question: Chinki, histoire cochininoise adlı kısa romanın ardında yatan ve diğer ülkeler için de geçerli olan tez nedir?
answer: Kurumsal düzenlemelerin erkekleri çalışmaktan alıkoyması ve çaba göstermekten vazgeçirmesi
wrong_answers:
  - Cochinchina'nın liberal bir hükümet örneği olması
  - Tahıl ticaretinin tüm limanlarda serbest olması gerektiği
  - Cochinchina doğal kaynaklar açısından zengin bir ülkedir
explanation: |
  "Chinki" ekonomik faaliyetleri engelleyen ve bireysel inisiyatifi caydıran kurumsal düzenlemeleri eleştiriyor.
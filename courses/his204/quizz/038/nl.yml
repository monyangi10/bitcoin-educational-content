question: Welke these achter de korte roman Chinki, histoire cochininoise is van toepassing op andere landen?
answer: Dat bedrijfsregels mannen verhinderen te werken en inspanningen ontmoedigen
wrong_answers:
  - Dat Cochinchina een voorbeeld is van liberaal bestuur
  - Dat de graanhandel vrij moet zijn via alle havens
  - Cochinchina is een land dat rijk is aan natuurlijke hulpbronnen
explanation: |
  "Chinki" bekritiseert bedrijfsregels die economische activiteit belemmeren en individueel initiatief ontmoedigen.
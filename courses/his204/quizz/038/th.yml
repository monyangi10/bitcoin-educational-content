question: วิทยานิพนธ์เบื้องหลังนวนิยายสั้นเรื่อง Chinki, histoire cochininoise, ที่สามารถประยุกต์ใช้กับประเทศอื่นๆ ได้คืออะไร?
answer: กฎระเบียบของบริษัทที่ป้องกันไม่ให้ผู้ชายทำงานและกีดกันความพยายาม
wrong_answers:
  - ที่โคชินไชน่าเป็นตัวอย่างของรัฐบาลเสรีนิยม
  - การค้าข้าวต้องเสรีผ่านทุกท่าเรือ
  - Cochinchina เป็นประเทศที่อุดมไปด้วยทรัพยากรธรรมชาติ
explanation: |
  "Chinki" วิจารณ์กฎระเบียบของบริษัทที่ขัดขวางกิจกรรมทางเศรษฐกิจและกีดกันความคิดริเริ่มของบุคคล
question: Ni igiki ciyumviro kiri inyuma y’igitabu kigufi citwa Chinki, kahise ka cochininoise, gishobora gukoreshwa mu bindi bihugu?
answer: Ko amabwirizwa y’amashirahamwe abuza abagabo gukora kandi agaca intege utwigoro .
wrong_answers:
  - Ubu Cochinchina ni akarorero k'intwaro y'ubwigenge .
  - Ko ubudandaji bw'ibinyantete butegerezwa kuba bwidegemvya biciye ku vyambu vyose .
  - Cochinchina ni igihugu gifise ubutunzi bwinshi .
explanation: |
  "Chinki" aranegura amategeko y'amashirahamwe abangamira ibikorwa vy'ubutunzi kandi agaca intege umuntu ku giti ciwe.
reviewed: true

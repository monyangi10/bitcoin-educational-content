question: Waarom verbleef François Quesnay in Versailles, in de entresol van de appartementen van Madame de Pompadour?
answer: Hij was haar persoonlijke arts
wrong_answers:
  - Het was een van haar favorieten
  - Hij zocht haar bescherming en voordelen
  - Hij was haar financieel adviseur
explanation: |
  Quesnay was de lijfarts van Madame de Pompadour, wat hem bevoorrechte toegang tot het hof gaf en hem in staat stelde politieke beslissingen te beïnvloeden.
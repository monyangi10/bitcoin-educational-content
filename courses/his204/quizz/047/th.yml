question: ทำไม François Quesnay ถึงพักอยู่ที่แวร์ซายส์ ในห้องใต้หลังคาของอพาร์ตเมนต์ของมาดามเดอปงปาดูร์?
answer: เขาเป็นแพทย์ประจำตัวของเธอ
wrong_answers:
  - มันเป็นหนึ่งในสิ่งที่เธอชื่นชอบ
  - เขาแสวงหาการปกป้องและผลประโยชน์จากเธอ
  - เขาเป็นที่ปรึกษาทางการเงินของเธอ
explanation: |
  Quesnay เป็นแพทย์ส่วนตัวของมาดามเดอปงปาดูร์ ซึ่งทำให้เขาเข้าถึงราชสำนักได้อย่างมีสิทธิพิเศษและสามารถมีอิทธิพลต่อการตัดสินใจทางการเมืองได้
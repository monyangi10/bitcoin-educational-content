question: Ni kuki François Quesnay yagumye i Versailles, mu nzu y’imbere y’amazu ya Madamu de Pompadour?
answer: Yari umuganga wiwe bwite .
wrong_answers:
  - Ni kimwe muvyo yakunda cane .
  - Yaramurondeye uburinzi n’ivyiza .
  - Yari umujanama wiwe mu vy'amahera .
explanation: |
  Quesnay yari umuganga wa Madame de Pompadour, ivyo bikaba vyatuma agira agateka ko kuja mu rubanza, kandi bikamufasha kugira ico akoze ku ngingo za politike.
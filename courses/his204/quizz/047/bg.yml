question: Защо Франсоа Кесне е отседнал във Версай, в антрето на апартамента на мадам дьо Помпадур?
answer: Той е бил неин личен лекар
wrong_answers:
  - Беше един от любимите й
  - Той потърси нейната защита и ползи
  - Той е бил неин финансов съветник
explanation: |
  Кесне е личен лекар на мадам дьо Помпадур, което му осигурява привилегирован достъп до двора и му позволява да влияе върху политическите решения.
question: Pourquoi François Quesnay logeait-il à Versailles, dans l’entresol des appartements de Madame de Pompadour ?
answer: Il était son médecin personnel
wrong_answers:
  - C’était l’une de ses favorites
  - Il cherchait auprès d’elle protection et avantages
  - Il était son conseiller financier
explanation: |
  Quesnay était le médecin personnel de Madame de Pompadour, ce qui lui donnait un accès privilégié à la Cour et lui permettait d'influencer les décisions politiques.

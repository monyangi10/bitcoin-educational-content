question: François Quesnay neden Versailles'da, Madame de Pompadour'un dairesinin girişinde kalmıştır?
answer: Onun kişisel doktoruydu
wrong_answers:
  - En sevdiklerinden biriydi
  - Onun korumasını ve yardımlarını istedi
  - Onun mali danışmanıydı
explanation: |
  Quesnay, Madame de Pompadour'un özel doktoruydu ve bu da ona saraya ayrıcalıklı erişim ve siyasi kararları etkileme imkânı veriyordu.
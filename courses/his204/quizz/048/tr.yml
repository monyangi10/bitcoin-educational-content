question: 1757 yılında Fizyokrasi doğdu. Quesnay Encyclopédie'de hangi iki makaleyi yayınlamıştır?
answer: Çiftçiler ve Tahıllar
wrong_answers:
  - Para ve tarıma ilgi
  - Arazi ekimi ve ürün rotasyonu
  - Vergiler ve Ticaret
explanation: |
  Quesnay, Diderot ve d'Alembert'in Encyclopédie'sinde "Çiftçiler" ve "Tahıllar" maddelerini yayınlayarak fizyokrasinin bir ekonomik düşünce okulu olarak doğuşuna işaret etti.
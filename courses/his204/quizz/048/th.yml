question: ปี 1757 เป็นปีที่กำเนิดลัทธิฟิสิโอเครซี ควอเนย์ได้ตีพิมพ์บทความสองบทในสารานุกรมคืออะไร?
answer: เกษตรกรและธัญพืช
wrong_answers:
  - ความสนใจในเงินและการเกษตร
  - การเพาะปลูกที่ดินและการหมุนเวียนพืชผล
  - ภาษีและการค้า
explanation: |
  Quesnay ได้ตีพิมพ์บทความ "Farmers" และ "Grains" ในสารานุกรมของ Diderot และ d'Alembert ซึ่งเป็นการเริ่มต้นของลัทธิฟิสิโอเครซีในฐานะสำนักความคิดทางเศรษฐศาสตร์
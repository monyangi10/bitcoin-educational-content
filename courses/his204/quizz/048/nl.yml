question: 1757 markeerde de geboorte van de Fysiocratie. Welke twee artikelen publiceerde Quesnay in de Encyclopédie?
answer: Boeren en granen
wrong_answers:
  - Interesse in geld en landbouw
  - Landbewerking en vruchtwisseling
  - Belastingen en handel
explanation: |
  Quesnay publiceerde de artikelen "Boeren" en "Graan" in de Encyclopédie van Diderot en d'Alembert en markeerde daarmee de geboorte van de fysiocratie als economische denkschool.
question: през 1757 г. се ражда физиокрацията. Кои две статии публикува Кеснай в Енциклопедията?
answer: Фермери и зърно
wrong_answers:
  - Интерес към парите и селското стопанство
  - Обработка на земята и сеитбооборот
  - Данъци и търговия
explanation: |
  Кеснай публикува статиите "Земеделци" и "Зърно" в енциклопедията на Дидро и д'Алембер, с което поставя началото на физиокрацията като школа в икономическата мисъл.
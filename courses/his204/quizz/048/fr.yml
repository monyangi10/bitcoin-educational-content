question: 1757 marque la naissance de la Physiocratie, quels sont les deux articles que publie Quesnay dans l’Encyclopédie ?
answer: Fermiers et Grains
wrong_answers:
  - Intérêt de l’argent et Agriculture
  - Culture des terres et Assolement
  - Impôts et Commerce
explanation: |
  Quesnay a publié les articles "Fermiers" et "Grains" dans l'Encyclopédie de Diderot et d'Alembert, marquant ainsi la naissance de la physiocratie en tant qu'école de pensée économique.

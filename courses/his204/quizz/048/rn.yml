question: 1757 ni haba ivuka rya Physiocracy. Ni izihe ngingo zibiri Quesnay yasohoye muri Encyclopédie?
answer: Abarimyi n'ibinyantete(Farmers and Grains)
wrong_answers:
  - Inyungu mu mahera no mu burimyi .
  - Ukurima ubutaka no guhinduranya ibiterwa
  - Amakori n'ubudandaji
explanation: |
  Quesnay yasohoye ingingo zivuga ngo « Abarimyi » na « Ibinyantete » mu gitabu ca Diderot na d’Alembert citwa Encyclopédie, ivyo bikaba ari vyo bimenyesha ivuka ry’ubutegetsi bwa Physiocracy.
reviewed: true

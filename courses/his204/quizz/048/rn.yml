question: 1757 ni ho havuka ubutegetsi bwa Fiziyokarasi. Ni ingingo zibiri izihe Quesnay yasohoye muri Encyclopédie?
answer: Abarimyi n'intete
wrong_answers:
  - Inyungu mu mahera no mu buhinzi .
  - Uguhinga ubutaka no guhinduranya ibiterwa
  - Imisoro n'ubudandaji
explanation: |
  Quesnay yasohoye ingingo zivuga ngo « Abarimyi » na « Intete » mu gitabu ca Diderot na d’Alembert citwa Encyclopédie, ivyo bikaba ari vyo bimenyesha ivuka ry’ubutegetsi bw’umubiri nk’ishure ry’ivyiyumviro vy’ubutunzi.
question: Imbere y’ubutunzi, umwuga wa Quesnay wo kuvura wari uwuhe?
answer: Umuganga abaga
wrong_answers:
  - Umuganga w'amenyo
  - Umuforoma
  - Umuganga w'imiti
explanation: |
  François Quesnay yari umuganga abaga imbere y’uko aba umuhinga mu vy’ubutunzi. Yari mbere umuganga w’abaganga ba Madamu de Pompadour.
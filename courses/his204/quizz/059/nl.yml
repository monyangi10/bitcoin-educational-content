question: Wat stelde Dupont de Nemours in een wetsvoorstel aan de grondwetgevende vergadering voor om te verbieden?
answer: Offensieve oorlogen
wrong_answers:
  - Handelsoorlogen
  - Defensieve oorlogen
  - Alle oorlogen
explanation: |
  Dupont de Nemours stelde, in lijn met fysiocratische principes, voor om offensieve oorlogen te verbieden omdat hij ze schadelijk achtte voor de economische welvaart en het welzijn van de bevolking.
question: ในร่างกฎหมายที่ยื่นต่อสภาร่างรัฐธรรมนูญ Dupont de Nemours เสนอให้ห้ามอะไร?
answer: สงครามเชิงรุก
wrong_answers:
  - สงครามการค้า
  - สงครามป้องกันตัว
  - สงครามทั้งหมด
explanation: |
  ดูปองต์ เดอ เนมูร์ส สอดคล้องกับหลักการของฟิสิโอแครติก ได้เสนอให้ห้ามสงครามที่เป็นการรุกราน เนื่องจากเขาเห็นว่ามันเป็นอันตรายต่อความเจริญรุ่งเรืองทางเศรษฐกิจและความเป็นอยู่ที่ดีของประชากร
question: Dupont de Nemours, Kurucu Meclis'e sunduğu bir yasa tasarısında neyin yasaklanmasını öneriyordu?
answer: Saldırgan savaşlar
wrong_answers:
  - Ticaret savaşları
  - Savunma savaşları
  - Tüm savaşlar
explanation: |
  Dupont de Nemours, fizyokratik ilkeler doğrultusunda, ekonomik refah ve nüfusun refahı için zararlı olduğunu düşündüğü saldırı savaşlarının yasaklanmasını önerdi.
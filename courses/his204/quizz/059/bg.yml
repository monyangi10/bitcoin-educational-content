question: Какво предлага Дюпон дьо Немур да бъде забранено в законопроект, внесен в Учредителното събрание?
answer: Настъпателни войни
wrong_answers:
  - Търговски войни
  - Отбранителни войни
  - Всички войни
explanation: |
  Дюпон дьо Немур, в съответствие с физиократичните принципи, предлага забрана на нападателните войни, тъй като ги смята за вредни за икономическия просперитет и благосъстоянието на населението.
question: Ekonomik özgürlüğün savunucuları olan Fizyokratlar neden demokrasiye karşı büyük bir şüpheci olarak kaldılar?
answer: Demokrasi potansiyel olarak azınlığın çoğunluk tarafından köleleştirilmesidir
wrong_answers:
  - Monarşi demokrasiden daha az maliyetlidir
  - Fizyokratlar, Kral'ın sarayının birçok üst düzey üyesini saflarında sayıyordu
  - İnsanların bilinçli kararlar veremeyecek kadar cahil olduğunu düşünüyorlardı
explanation: |
  Fizyokratlar, demokrasinin çoğunluğun çıkarları için azınlığın çıkarlarının feda edileceği çoğunluğun tiranlığına yol açacağından korkuyorlardı. Onlar, rasyonel kararlar alabilen ve herkesin haklarını savunabilen aydınlanmış bir hükümeti tercih ediyorlardı.
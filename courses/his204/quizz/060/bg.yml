question: Защо физиократите, защитници на икономическата свобода, са останали големи скептици на демокрацията?
answer: Демокрацията е потенциално поробване на малцинството от мнозинството
wrong_answers:
  - Монархията е по-евтина от демокрацията
  - Сред физиократите има няколко високопоставени членове на кралския двор
  - Смятаха, че хората са твърде невежи, за да вземат информирани решения
explanation: |
  Физиократите се опасяват, че демокрацията ще доведе до тирания на мнозинството, при която интересите на малцинството ще бъдат пожертвани в полза на мнозинството. Те предпочитат просветено правителство, способно да взема рационални решения и да защитава правата на всички.
question: ทำไมพวกฟีซีโอแครต ผู้ปกป้องเสรีภาพทางเศรษฐกิจ ถึงยังคงเป็นผู้สงสัยในประชาธิปไตยอย่างมาก?
answer: ประชาธิปไตยอาจเป็นการกดขี่ชนกลุ่มน้อยโดยเสียงข้างมาก
wrong_answers:
  - ระบอบกษัตริย์มีค่าใช้จ่ายน้อยกว่าประชาธิปไตย
  - พวกฟิสิโอแครตมีสมาชิกหลายคนที่เป็นสมาชิกระดับสูงของราชสำนัก
  - พวกเขาคิดว่าผู้คนไม่รู้มากพอที่จะตัดสินใจอย่างมีข้อมูล
explanation: |
  พวกฟิสิโอแครตกลัวว่าประชาธิปไตยจะนำไปสู่การปกครองแบบเผด็จการของเสียงข้างมาก ซึ่งผลประโยชน์ของเสียงข้างน้อยจะถูกสังเวยเพื่อประโยชน์ของเสียงข้างมาก พวกเขาชอบรัฐบาลที่มีความรู้ความเข้าใจ สามารถตัดสินใจอย่างมีเหตุผลและปกป้องสิทธิของทุกคน
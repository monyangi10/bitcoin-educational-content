question: Waarom bleven de fysiocraten, verdedigers van economische vrijheid, grote sceptici van democratie?
answer: Democratie is in potentie de onderwerping van de minderheid door de meerderheid
wrong_answers:
  - Monarchie is minder duur dan democratie
  - De Fysiocraten telden onder hun gelederen een aantal hooggeplaatste leden van het hof van de koning
  - Ze dachten dat mensen te onwetend waren om weloverwogen beslissingen te nemen
explanation: |
  De Fysiocraten vreesden dat democratie zou leiden tot de tirannie van de meerderheid, waarbij de belangen van de minderheid zouden worden opgeofferd ten gunste van de meerderheid. Zij gaven de voorkeur aan een verlichte regering, die in staat was om rationele beslissingen te nemen en de rechten van iedereen te verdedigen.
question: Pourquoi les Physiocrates, défenseurs de la liberté en économie, sont restés de grands sceptiques face à la démocratie ?
answer: La démocratie est potentiellement l’asservissement de la minorité par la majorité
wrong_answers:
  - La monarchie est un système moins coûteux que la démocratie
  - Les Physiocrates comptaient dans leur rang plusieurs hauts personnages de la cour du Roi
  - Ils pensaient que le peuple était trop ignorant pour prendre des décisions éclairées
explanation: |
  Les Physiocrates craignaient que la démocratie ne conduise à la tyrannie de la majorité, où les intérêts de la minorité seraient sacrifiés au profit de la majorité. Ils préféraient un gouvernement éclairé, capable de prendre des décisions rationnelles et de défendre les droits de tous.

question: Ni kuki aba Fiziyokarate, ababuranira umwidegemvyo w’ubutunzi, bagumye ari abakekeranya cane kuri demokarasi?
answer: Demokarasi ni uguhindura abantu bake mu buja n'abantu benshi .
wrong_answers:
  - Ubwami ntibuzimvye cane kuruta demokarasi .
  - Abafiziyokarate baharura mu nzego zabo abantu benshi bo mu rwego rwo hejuru bo mu ngoro y’Umwami .
  - Biyumvira ko abantu ari ubujuju cane ku buryo badashobora gufata ingingo zishingiye ku makuru .
explanation: |
  Abafiziyokarate batinya ko demokarasi yotuma haba ububisha bw’abantu benshi, aho inyungu z’abantu bake zizotangwa kugira ngo benshi baronke inyungu. Bahisemwo intwaro imurikiwe, ishobora gufata ingingo zishingiye ku vyiyumviro no kugwanira uburenganzira bwa bose.
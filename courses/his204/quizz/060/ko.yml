question: 경제적 자유의 수호자인 피지오크라트들은 왜 민주주의에 대한 회의론자로 남았을까요?
answer: 민주주의는 잠재적으로 다수에 의한 소수의 노예화가 될 수 있습니다
wrong_answers:
  - 군주제는 민주주의보다 비용이 적게 듭니다
  - 피지오크라트들은 왕실의 고위급 인사들을 그들의 계급에 포함시켰습니다
  - 그들은 사람들이 너무 무지해서 정보에 입각한 결정을 내리기 어렵다고 생각했습니다
explanation: |
  피지오크라트들은 민주주의가 다수의 이익을 위해 소수의 이익이 희생되는 다수의 횡포로 이어질 것을 우려했습니다. 그들은 합리적인 결정을 내리고 모두의 권리를 옹호할 수 있는 계몽된 정부를 선호했습니다.
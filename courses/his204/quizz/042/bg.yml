question: От кой автор се опира Мирабо в L'Ami des Hommes?
answer: Франсоа Кеснай
wrong_answers:
  - Венсан дьо Гурнай
  - Ричард Кантильон
  - Адам Смит
explanation: |
  Мирабо се вдъхновява от идеите на Франсоа Кесне и физиокрацията, които подчертават значението на земеделието и икономическата свобода.
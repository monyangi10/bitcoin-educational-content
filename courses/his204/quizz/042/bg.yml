question: На кой автор се опира Мирабо в L'Ami des Hommes?
answer: Франсоа Кене
wrong_answers:
  - Венсан дьо Гурне
  - Ришар Кантийон
  - Адам Смит
explanation: |
  Мирабо се вдъхновява от идеите на Франсоа Кене и физиокрацията, които подчертават значението на земеделието и икономическата свобода.
reviewed: true

question: Mirabeau L'Ami des Hommes'da hangi yazardan yararlanıyor?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau, tarımın ve ekonomik özgürlüğün önemini vurgulayan François Quesnay ve fizyokrasi fikirlerinden ilham aldı.
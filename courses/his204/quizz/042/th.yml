question: ผู้แต่งคนใดที่ Mirabeau อ้างอิงใน L'Ami des Hommes?
answer: ฟร็องซัว เกส์แน
wrong_answers:
  - วินเซนต์ เดอ กูร์เนย์
  - ริชาร์ด แคนทิลลอน
  - อดัม สมิธ
explanation: |
  มิราโบได้รับแรงบันดาลใจจากแนวคิดของฟรองซัวส์ เกซเนย์และลัทธิฟีซิโอเครซี ซึ่งเน้นย้ำถึงความสำคัญของการเกษตรและเสรีภาพทางเศรษฐกิจ
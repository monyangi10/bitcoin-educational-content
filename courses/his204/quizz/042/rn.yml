question: Ni uwuhe mwanditsi Mirabeau akoresha mu gitabu ciwe citwa L’Ami des Hommes?
answer: Faransuwa Keseni
wrong_answers:
  - Vinsenti de Gournay
  - Rishari Kantiloni
  - Adamu Smith
explanation: |
  Mirabeau yahumekewe n’ivyiyumviro vya François Quesnay n’ivy’ubutegetsi bw’umubiri, ivyo bikaba vyashimika ku kamaro k’uburimyi n’umwidegemvyo mu vy’ubutunzi.
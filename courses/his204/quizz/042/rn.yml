question: Ni uwuhe mwanditsi Mirabeau yisunze mu gitabu ciwe citwa L’Ami des Hommes?
answer:  François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau yahumekewe n’ivyiyumviro vya François Quesnay n’ivy’ubutegetsi bw’aba physiocrats, ivyo bikaba vyashimika ku kamaro k’uburimyi n’umwidegemvyo mu vy’ubutunzi.
reviewed: true

question: Uit welke auteur put Mirabeau in L'Ami des Hommes?
answer: François Quesnay
wrong_answers:
  - Vincent de Gournay
  - Richard Cantillon
  - Adam Smith
explanation: |
  Mirabeau werd geïnspireerd door de ideeën van François Quesnay en de fysiocratie, die het belang van landbouw en economische vrijheid benadrukten.
question: ทำไมเขาถึงคิดว่าการลักลอบนำเข้าสินค้าถึงแพร่หลายในฝรั่งเศส?
answer: เนื่องจากกฎระเบียบป้องกันการค้าขายสินค้าบางประเภทอย่างถูกกฎหมาย ทำให้เกิดตลาดคู่ขนาน
wrong_answers:
  - เพราะฝรั่งเศสมีคนยากจนมากมาย ทรัพยากรเดียวของพวกเขาคือการลักลอบนำเข้า
  - เพราะการอพยพของโปรเตสแตนต์เป็นแหล่งเพาะพันธุ์สำหรับสินค้าหนีภาษี
  - เพราะเจ้าหน้าที่ศุลกากรทุจริต
explanation: |
  Gournay เชื่อว่าการควบคุมที่มากเกินไปส่งเสริมการลักลอบนำเข้าโดยการสร้างตลาดคู่ขนานสำหรับสินค้าที่การค้าถูกห้ามหรือถูกเก็บภาษีอย่างหนัก
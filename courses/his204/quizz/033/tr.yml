question: Neden kaçakçılığın Fransa'da bu kadar yaygın olduğunu düşünüyor?
answer: Düzenlemeler bazı malların yasal ticaretini engellediğinden, paralel bir pazarın açılması
wrong_answers:
  - Fransa'da çok sayıda yoksul insan olduğu için tek kaynakları kaçakçılık
  - Çünkü Protestan göçü kaçakçılık için bir üreme alanıdır
  - Çünkü gümrük memurları rüşvetçidir
explanation: |
  Gournay, aşırı düzenlemelerin, ticareti yasaklanan veya ağır vergilendirilen mallar için paralel pazarlar yaratarak kaçakçılığı teşvik ettiğine inanıyordu.
question: Ni kuki yibaza ko ubucuruzi bw’ibinyoma bugwiriye cane mu Bufaransa?
answer: Kubera ko amabwirizwa abuza ubudandaji bw’ibintu bimwebimwe mu buryo butegekanijwe n’amategeko, ivyo bikaba bituma haba isoko rihuye n’iryo .
wrong_answers:
  - Kubera ko Ubufaransa bufise abakene benshi cane, ikintu conyene bafise ni ubusuma .
  - Kubera ko ukwimuka kw’Abaporoti ari ahantu ho kuvyara ibintu bitemewe .
  - Kuko abakozi ba duwani barya ibiturire .
explanation: |
  Gournay yarizera yuko amategeko arenze urugero aremesha ubusuma mu kurema amasoko asa n’ayo y’ibicuruzwa ubudandaji bwavyo bwari bubujijwe canke bukoreshwa cane.
reviewed: true

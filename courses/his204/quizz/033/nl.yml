question: Waarom denkt hij dat smokkel zo wijdverbreid is in Frankrijk?
answer: Omdat de regelgeving de legale handel in bepaalde goederen verhindert, kan het openen van een parallelle markt
wrong_answers:
  - Omdat Frankrijk zoveel arme mensen heeft, is hun enige bron het smokkelen
  - Omdat protestantse emigratie een broedplaats is voor smokkelwaar
  - Omdat douanebeambten corrupt zijn
explanation: |
  Gournay geloofde dat buitensporige regulering smokkel aanmoedigde door parallelle markten te creëren voor goederen waarvan de handel verboden of zwaar belast was.
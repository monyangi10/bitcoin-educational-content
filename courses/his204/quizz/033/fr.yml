question: Pourquoi, selon lui, la contrebande est-elle si développée en France ?
answer: Parce que les règlements empêchent le commerce légal de certaines marchandises, et ouvrent un marché parallèle
wrong_answers:
  - Parce que la France ayant beaucoup de pauvres, ils n’ont d’autres ressources que la contrebande
  - Parce que l’émigration protestante est un vivier de la contrebande
  - Parce que les douaniers sont corrompus
explanation: |
  Gournay pensait que la réglementation excessive encourageait la contrebande en créant des marchés parallèles pour les marchandises dont le commerce était interdit ou fortement taxé.

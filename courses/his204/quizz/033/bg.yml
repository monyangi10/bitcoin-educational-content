question: Защо смята, че контрабандата е толкова разпространена във Франция?
answer: Тъй като нормативната уредба възпрепятства законната търговия с определени стоки, отварянето на паралелен пазар
wrong_answers:
  - Тъй като във Франция има толкова много бедни хора, единственият им ресурс е контрабандата
  - Тъй като протестантската емиграция е хранителна среда за контрабанда
  - Защото митническите служители са корумпирани
explanation: |
  Гурнай смята, че прекомерното регулиране насърчава контрабандата, тъй като създава паралелни пазари за стоки, чиято търговия е забранена или обложена с високи данъци.
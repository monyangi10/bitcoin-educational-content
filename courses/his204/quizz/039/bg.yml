question: През кое десетилетие е действал кръгът "Гурнай"?
answer: Десетилетието на 1750 г
wrong_answers:
  - 40-те години на XIX век
  - 60-те години на XIX в
  - 70-те години на XIX век
explanation: |
  Кръгът на Гурнай е активен през 50-те години на XIX в. - период на интелектуално брожение във Франция.
question: Wat of wie moet er volgens Boisguilbert vrij blijven?
answer: Natuur, d.w.z. de natuurlijke orde der dingen
wrong_answers:
  - Macht, d.w.z. de koning, zijn raad en ministers
  - Mannen, d.w.z. boeren, ambachtslieden en arbeiders
  - Financiële markten
explanation: |
  Boisguilbert was een voorstander van de natuurlijke orde en laissez-faire. Hij geloofde dat de economie aan haar lot moest worden overgelaten, zonder overmatige staatsinterventie, zodat de natuurlijke orde der dingen zich kon ontvouwen en welvaart gegarandeerd kon worden.
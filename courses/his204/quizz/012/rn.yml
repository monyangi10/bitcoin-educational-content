question: Nk’uko Boisguilbert abivuga, ni igiki canke ni nde akwiye gusigara yidegemvya?
answer: Kamere, ni ukuvuga urutonde rw'ibintu
wrong_answers:
  - Ububasha, ni ukuvuga Umwami, inama yiwe n’abaminisitiri
  - Abagabo, ni ukuvuga abarimyi, abahinguzi b’ibintu n’abakozi
  - Amasoko y'ivy'amahera
explanation: |
  Boisguilbert yari uwuburanira urutonde rw’ibintu vy’akameremere be n’uburenganzira bwo kwirekura. Yarizera ko ubutunzi bukwiye kurekurwa nk’uko bushaka, ata n’umwe Leta yinjiramwo birenze urugero, kugira ngo urutonde rw’ibintu rw’akameremere rushobore gutera imbere no gutuma haba uguterimbere.
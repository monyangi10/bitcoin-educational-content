question: Boisguilbert'e göre, ne ya da kim özgür bırakılmalıdır?
answer: Doğa, yani şeylerin doğal düzeni
wrong_answers:
  - Güç, yani Kral, konseyi ve bakanları
  - Erkekler, yani köylüler, zanaatkarlar ve işçiler
  - Finansal piyasalar
explanation: |
  Boisguilbert doğal düzenin ve laissez-faire'in savunucusuydu. Ekonominin aşırı devlet müdahalesi olmaksızın kendi haline bırakılması gerektiğine, böylece doğal düzenin ortaya çıkmasına ve refahın garanti altına alınmasına izin verilmesi gerektiğine inanıyordu.
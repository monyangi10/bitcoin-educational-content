question: Според Боагилбер какво или кого трябва да се остави свободно?
answer: Природата, т.е. естественият ред на нещата
wrong_answers:
  - Властта, т.е. кралят, неговият съвет и министрите
  - Мъже, т.е. селяни, занаятчии и работници
  - Финансови пазари
explanation: |
  Боагилбер е привърженик на естествения ред и на принципа Лесе-фер. Той вярва, че икономиката трябва да бъде оставена на самотек, без прекомерна държавна намеса, за да се даде възможност на естествения ред на нещата да се развие и да гарантира просперитет.
reviewed: true

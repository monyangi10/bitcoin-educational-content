question: За какъв вид данък се застъпва Вобан в своите трудове?
answer: Пропорционален данък всеки трябва да дава еднакъв процент от дохода си на държавата
wrong_answers:
  - Прогресивно данъчно облагане - данъчната ставка за богатите трябва да е по-висока от тази за бедните
  - Плоска данъчна ставка - независимо от доходите ви, всяка година плащате една и съща сума на държавата
  - Регресивно данъчно облагане Данъчните ставки за бедните трябва да са по-високи от тези за богатите
explanation: |
  Вобан се застъпва за пропорционален данък - "кралски десятък", който се състои в събиране на една десета (10%) от доходите на всички французи, независимо от социалния им статус. Той вярва, че този данък ще бъде по-справедлив и по-ефективен от съществуващата данъчна система.
question: วอบันสนับสนุนภาษีประเภทใดในงานเขียนของเขา?
answer: ภาษีตามสัดส่วน ทุกคนต้องให้เปอร์เซ็นต์เดียวกันของรายได้ของตนแก่รัฐ
wrong_answers:
  - การเก็บภาษีแบบก้าวหน้า อัตราภาษีสำหรับคนรวยต้องสูงกว่าคนจน
  - ภาษีอัตราเดียวไม่ว่ารายได้ของคุณจะเป็นเท่าใด คุณจ่ายจำนวนเงินเท่ากันในแต่ละปีให้กับรัฐบาล
  - อัตราภาษีถอยหลัง อัตราภาษีสำหรับคนจนต้องสูงกว่าผู้มั่งคั่ง
explanation: |
  โวบังเสนอภาษีแบบสัดส่วนที่เรียกว่า "ภาษีสิบชักหนึ่งของราชวงศ์" ซึ่งประกอบด้วยการเก็บภาษีสิบเปอร์เซ็นต์ (10%) ของรายได้ของชาวฝรั่งเศสทุกคน โดยไม่คำนึงถึงสถานะทางสังคมของพวกเขา เขาเชื่อว่าภาษีนี้จะยุติธรรมและมีประสิทธิภาพมากกว่าระบบภาษีที่มีอยู่เดิม
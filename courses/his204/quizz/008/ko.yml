question: 보반은 저서에서 어떤 유형의 세금을 옹호했나요?
answer: 모든 사람이 소득의 동일한 비율을 국가에 기부해야 하는 비례세
wrong_answers:
  - 누진세 부자에 대한 세율은 가난한 사람에 대한 세율보다 높아야합니다
  - 소득에 관계없이 매년 동일한 금액을 정부에 납부하는 정액세입니다
  - 빈곤층에 대한 역진적 과세 세율은 부유층보다 높아야 합니다
explanation: |
  보방은 사회적 지위에 관계없이 모든 프랑스 국민에게 소득의 10분의 1(10%)을 부과하는 비례세, 즉 '왕실 십일조'를 주장했습니다. 그는 이 세금이 기존 세금 제도보다 더 공정하고 효율적일 것이라고 믿었습니다.
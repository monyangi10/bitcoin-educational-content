question: Ni ikori ryo mu bwoko ubuhe Vauban yashigikira mu vyanditswe vyiwe?
answer: Ikori ugereranijwe umuntu wese ategerezwa guha ry'amahera yiwe .
wrong_answers:
  - Ikori itera imbere igipimo c'amakori ku batunzi kigomba kuba kinini kuruta ico ku bakene .
  - Ikori w’igiciro kimwe utitaye ku vyo winjiza, uriha Leta amahera amwe buri mwaka .
  - Ikori y'inyuma y'ikori ku bakene itegerezwa kuba hejuru y'iyo ku batunzi .
explanation: |
  Vauban yaremeje ko habaho amakori ugereranijwe, ari wo "royal tithe", ukaba wari ugusaba ica cumi (10%) c'amahera abafaransa bose baronka, ata kuraba ikibanza bafise mu kibano. Yari yizeye ko uwo amakori woba ubereye kandi ukora neza kuruta uburyo bwo gutanga amakori bwariho.
reviewed: true

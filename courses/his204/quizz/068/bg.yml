question: Защо Дюпон дьо Немур е бил толкова изключителна фигура във физиократичната школа?
answer: Той е най-младият
wrong_answers:
  - Той беше най-възрастният
  - Той беше най-богатият
  - Той беше най-красноречивият
explanation: |
  Дюпон дьо Немур е един от най-младите членове на физиократичната школа, което му позволява да направи дълга и забележителна политическа и икономическа кариера.
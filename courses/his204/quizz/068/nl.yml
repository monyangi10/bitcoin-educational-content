question: Waarom was Dupont de Nemours zo'n uitzonderlijke figuur in de fysiocratische school?
answer: Hij was de jongste
wrong_answers:
  - Hij was de oudste
  - Hij was de rijkste
  - Hij was de meest welbespraakte
explanation: |
  Dupont de Nemours was een van de jongste leden van de fysiocratische school, waardoor hij een lange en eminente politieke en economische carrière kon opbouwen.
question: Dupont de Nemours fizyokrat okulda neden bu kadar istisnai bir figürdü?
answer: O en genç olanıydı
wrong_answers:
  - O en yaşlı olanıydı
  - O en zengin kişiydi
  - O en güzel konuşan kişiydi
explanation: |
  Dupont de Nemours, fizyokrat ekolün en genç üyelerinden biriydi ve bu sayede uzun ve seçkin bir siyasi ve ekonomik kariyere sahip oldu.
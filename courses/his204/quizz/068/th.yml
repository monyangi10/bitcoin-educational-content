question: ทำไมดูปองต์ เดอ เนมูร์ถึงเป็นบุคคลที่โดดเด่นในโรงเรียนฟิสิโอแครต?
answer: เขาเป็นคนที่อายุน้อยที่สุด
wrong_answers:
  - เขาเป็นคนที่อายุมากที่สุด
  - เขาเป็นคนที่รวยที่สุด
  - เขาเป็นคนที่พูดจาคล่องแคล่วที่สุด
explanation: |
  ดูปองต์ เดอ เนมูร์ เป็นหนึ่งในสมาชิกที่อายุน้อยที่สุดของสำนักฟิสิโอเครติก ซึ่งทำให้เขามีโอกาสเพลิดเพลินกับอาชีพทางการเมืองและเศรษฐกิจที่ยาวนานและโดดเด่น
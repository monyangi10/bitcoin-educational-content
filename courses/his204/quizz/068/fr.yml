question: Pour quelle raison Dupont de Nemours était une personnalité exceptionnelle au sein de l’école physiocratique ?
answer: Il était le plus jeune
wrong_answers:
  - Il était le plus vieux
  - Il était le plus riche
  - Il était le plus éloquent
explanation: |
  Dupont de Nemours était l'un des plus jeunes membres de l'école physiocratique, ce qui lui a permis d'avoir une longue et brillante carrière politique et économique.

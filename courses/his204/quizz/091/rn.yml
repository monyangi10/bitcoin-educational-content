question: Ni uwuhe munyavyaha azwi cane Condorcet yaburaniye?
answer: Le chevalier de la Barre
wrong_answers:
  - Jean Calas
  - Louis Mandrin
  - The Count of Lally
explanation: |
  Condorcet yaburaniye Chevalier de la Barre, umusore yari yaciriwe urubanza rwo gupfa gubera gutuka Imana.
reviewed: true

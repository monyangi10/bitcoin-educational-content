question: Boisguilbert มีอะไรที่เหมือนกับ Vauban?
answer: สำหรับการบรรยายถึงความทุกข์ยากของผู้คนในชนบทอย่างละเอียดและสำหรับการเสนอภาษีตามสัดส่วนสำหรับทุกคน
wrong_answers:
  - สำหรับการบรรยายถึงความทุกข์ยากของผู้คนในชนบทอย่างละเอียด และสำหรับการเริ่มต้นอาชีพของเขาในฐานะนักเขียน
  - สำหรับการเสนอภาษีแบบสัดส่วนสำหรับทุกคนและสำหรับการเป็นรัฐมนตรีว่าการกระทรวงการคลัง
  - การเคยเป็นรัฐมนตรีว่าการกระทรวงการคลังและการเริ่มต้นด้วยอาชีพวรรณกรรม
explanation: |
  ปีแอร์ เลอ เปซองต์, เซอร์ เดอ บัวกิลแบร์, เช่นเดียวกับโวบอง, เป็นผู้สังเกตการณ์ที่เฉียบแหลมเกี่ยวกับความทุกข์ยากของชาวนาและเสนอการปฏิรูปภาษีที่อิงตามภาษีแบบสัดส่วน อย่างไรก็ตาม, ต่างจากโคลแบร์, ทั้งบัวกิลแบร์และโวบองไม่ได้เป็นรัฐมนตรีว่าการกระทรวงการคลัง
question: 부아길베르와 보반의 공통점은 무엇인가요?
answer: 농촌 사람들의 비참함을 자세히 설명하고 모든 사람에게 비례 세금을 제안한 것에 대해
wrong_answers:
  - 농촌 사람들의 비참함을 길게 묘사하고 작가로서의 경력을 시작한 것에 대해
  - 모두를 위한 비례세를 제안하고 재무부 장관을 지낸 것에 대해
  - 재무부 장관을 지냈고 문학 경력으로 시작했다는 것은
explanation: |
  피에르 르 페상, 부아길베르 시르는 보방과 마찬가지로 농민의 고통을 예리하게 관찰하고 비례세를 기반으로 한 조세 개혁을 제안했습니다. 하지만 콜베르와 달리 부아길베르나 보방은 재무장관이 아니었습니다.
question: Wat heeft Boisguilbert gemeen met Vauban?
answer: Voor het uitvoerig beschrijven van de ellende van de plattelandsbevolking en voor het voorstellen van een proportionele belasting voor iedereen
wrong_answers:
  - Voor het uitvoerig beschrijven van de ellende van de plattelandsbevolking, en voor het beginnen van zijn carrière als schrijver
  - Omdat hij een proportionele belasting voor iedereen heeft voorgesteld en minister van Financiën is geweest
  - Minister van Financiën zijn geweest en een literaire carrière zijn begonnen
explanation: |
  Pierre Le Pesant, sieur de Boisguilbert, was net als Vauban een scherp waarnemer van de ellende van de boeren en stelde een belastinghervorming voor op basis van een proportionele belasting. In tegenstelling tot Colbert waren Boisguilbert en Vauban echter geen ministers van Financiën.
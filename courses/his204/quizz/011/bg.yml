question: Какво е общото между Боагилбер и Вобан?
answer: Tова, че е описал подробно мизерията на хората в селските райони и е предложил пропорционален данък за всички
wrong_answers:
  - Tова, че е описал подробно мизерията на селските хора и е започнал кариерата си на писател
  - Tова, че е предложил пропорционален данък за всички и че е бил министър на финансите
  - Да бъдеш министър на финансите и да започнеш литературна кариера
explanation: |
  Пиер Льо Пезан, сие дьо Боагилбер, също като Вобан, е бил внимателен наблюдател на мизерията на селяните и предлага данъчна реформа, основана на пропорционален данък. Въпреки това, за разлика от Колбер, нито Боагилбер, нито Вобан са били министри на финансите.
reviewed: true

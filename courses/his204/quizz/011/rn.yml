question: None Boisguilbert na Vauban bahuriye ku ki?
answer: Kubera ko yari yaradondoye mu buryo burambuye amagorwa y’abantu bo mu misozi be n’uko yasavye ko bose bahabwa umusoro ungana .
wrong_answers:
  - Kubera ko yari yaradondoye mu buryo burambuye amagorwa y’abantu bo mu misozi, kandi ko yari yatanguye igikorwa ciwe co kwandika .
  - Kubera ko yasavye ko bose bahabwa umusoro ugereranijwe no kubera ko yari umushikiranganji w’ivy’imari .
  - Kuba yari umushikiranganji w’ivy’amafaranga kandi akaba yaratanguye gukora ubuhinga bwo kwandika .
explanation: |
  Pierre Le Pesant, seur de Boisguilbert, nka Vauban, yari umuntu yihweza cane amagorwa y’abarimyi, aca asaba ko habaho ihinduka ry’imisoro rishingiye ku misoro iringaniye. Ariko rero, mu buryo butandukanye n’uko Colbert yari, Boisguilbert canke Vauban ntibari abashikiranganji b’ivy’amahera.
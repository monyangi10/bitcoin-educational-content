question: Mirabeau a eu un rôle actif au sein de l’école physiocratique. Qui a-t-il notamment converti ?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau a converti Dupont de Nemours à la physiocratie, ce qui a permis à ce dernier de devenir un des principaux défenseurs de cette école de pensée.

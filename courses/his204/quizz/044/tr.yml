question: Mirabeau fizyokrat okulda aktif bir rol oynadı. Özellikle kimleri dönüştürdü?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau, Dupont de Nemours'u fizyokrasiye dönüştürerek, Dupont'un bu düşünce ekolünün önde gelen savunucularından biri olmasını sağladı.
question: Mirabeau yarafise uruhara runini mw’ishure ry’ubuhinga bwa physiocratic. Ni nde canecane yahinduye?
answer:  Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau yahinduye Dupont de Nemours ngo abe umunyapolitike w'umu physiocrat, ivyo bikaba vyatumye uwo wa nyuma aba umuvugizi mukuru w’iryo shure ry’ivyiyumviro.
reviewed: true

question: Mirabeau yarafise uruhara runini mw’ishure ry’ubuhinga bw’umubiri. Ni nde canecane yahinduye?
answer: Dupont de Nemours
wrong_answers:
  - Faransuwa Keseni
  - Turgot
  - Adamu Smith
explanation: |
  Mirabeau yahinduye Dupont de Nemours ngo abe umunyapolitike w’ivy’umubiri, ivyo bikaba vyatumye uwo wa nyuma aba umuvugizi mukuru w’iryo shure ry’ivyiyumviro.
question: Mirabeau speelde een actieve rol in de fysiocratische school. Wie bekeerde hij in het bijzonder?
answer: Dupont de Nemours
wrong_answers:
  - François Quesnay
  - Turgot
  - Adam Smith
explanation: |
  Mirabeau bekeerde Dupont de Nemours tot de fysiocratie, waardoor deze laatste een belangrijke voorstander van deze denkschool kon worden.
question: Мирабо играе активна роля във физиократичната школа. Кого по-конкретно е обърнал към вярата?
answer: Дюпон дьо Немур
wrong_answers:
  - Франсоа Кене
  - Турго
  - Адам Смит
explanation: |
  Мирабо обръща Дюпон дьо Немур към физиокрацията, което позволява на последния да се превърне във водещ привърженик на тази мисловна школа.
reviewed: true

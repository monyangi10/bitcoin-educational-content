question: Mirabeau มีบทบาทอย่างแข็งขันในโรงเรียนฟิสิโอแครต เขาเปลี่ยนใจใครเป็นพิเศษ?
answer: ดูปองต์ เดอ เนอมูร์
wrong_answers:
  - ฟร็องซัว เกซเน่
  - Turgot
  - อดัม สมิธ
explanation: |
  Mirabeau ได้เปลี่ยน Dupont de Nemours ให้หันมาสนับสนุนลัทธิฟิสิโอเครซี ทำให้เขากลายเป็นผู้สนับสนุนชั้นนำของแนวคิดนี้
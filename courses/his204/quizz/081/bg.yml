question: В коя френска провинция Турго за пръв път експериментира с принципите на икономическия либерализъм?
answer: Лимузен
wrong_answers:
  - Британи
  - Елзас
  - Нормандия
explanation: |
  Турго е интендант на Лимузен, бедна и изолирана провинция, където провежда редица икономически реформи, вдъхновени от либерализма.
reviewed: true

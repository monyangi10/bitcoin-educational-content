question: In welke Franse provincie experimenteerde Turgot voor het eerst met zijn principes van het economisch liberalisme?
answer: Limousin
wrong_answers:
  - Brittany
  - De Elzas
  - Normandië
explanation: |
  Turgot was intendant van Limousin, een arme en geïsoleerde provincie, waar hij een aantal economische hervormingen doorvoerde die geïnspireerd waren door het liberalisme.
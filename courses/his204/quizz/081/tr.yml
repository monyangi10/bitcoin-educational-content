question: Turgot, ekonomik liberalizm ilkelerini ilk olarak hangi Fransız eyaletinde denemiştir?
answer: Limousin
wrong_answers:
  - Brittany
  - L'Alsace
  - Normandiya
explanation: |
  Turgot, yoksul ve izole bir eyalet olan Limousin'in yöneticisiydi ve burada liberalizmden ilham alan bir dizi ekonomik reform uyguladı.
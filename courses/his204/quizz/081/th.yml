question: ในจังหวัดใดของฝรั่งเศสที่ Turgot ได้ทดลองใช้หลักการเสรีนิยมทางเศรษฐกิจของเขาเป็นครั้งแรก?
answer: ลิมูแซ็ง
wrong_answers:
  - บริตทานี
  - L'Alsace
  - นอร์มังดี
explanation: |
  Turgot เป็นผู้ตรวจราชการของ Limousin ซึ่งเป็นจังหวัดที่ยากจนและโดดเดี่ยว ที่นั่นเขาได้ดำเนินการปฏิรูปเศรษฐกิจหลายประการที่ได้รับแรงบันดาลใจจากลัทธิเสรีนิยม
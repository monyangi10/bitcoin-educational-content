question: Ni mu ntara iyihe y’Ubufaransa Turgot yageragerejemwo ubwa mbere ingingo ngenderwako ziwe z’ukwidegemvya mu vy’ubutunzi?
answer: Limousin
wrong_answers:
  - Bretagne
  - Alsace
  - Normandie
explanation: |
  Turgot yari umukuru w’intara ya Limousin, intara y’abakene kandi iri ukwayo, aho yashize mu ngiro amahinduka menshi mu vy’ubutunzi yisunze n’uburenganzira bwo kwidegemvya.
reviewed: true

question: Ni mu ntara iyihe y’Ubufaransa Turgot yagerageje ubwa mbere ingingo ngenderwako ziwe z’ukwidegemvya mu vy’ubutunzi?
answer: Limuzine
wrong_answers:
  - Bretagne
  - Alsace
  - Normandie
explanation: |
  Turgot yari umukuru w’intara ya Limousin, intara y’abakene kandi iri ukwayo, aho yashize mu ngiro amahinduka menshi mu vy’ubutunzi yahumekewe n’uburenganzira bwo kwidegemvya.
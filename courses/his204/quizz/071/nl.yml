question: Welke filosoof schreef in de Ephémérides du Citoyen, het tijdschrift van de Fysiocraten?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot leverde bijdragen aan de "Éphémérides du Citoyen", het tijdschrift van de Fysiocraten, en schreef artikelen over economische en sociale onderwerpen.
question: Ni uwuhe munyabwenge yanditse mu kinyamakuru Ephémérides du Citoyen, ikinyamakuru c’aba Physiocrats?
answer: Diderot
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Diderot yaratanze umusanzu mu kinyamakuru "Éphémérides du Citoyen", yandika ingingo zijanye n'ubutunzi n'imibano.
reviewed: true

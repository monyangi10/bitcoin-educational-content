question: Ni uwuhe munyabwenge yanditse mu kinyamakuru Ephémérides du Citoyen, ikinyamakuru c’abanyabwenge b’ivy’umubiri?
answer: Diderote
wrong_answers:
  - Voltaire
  - Kondorseti
  - Rouso
explanation: |
  Diderot yaratanze umusanzu mu kinyamakuru "Éphémérides du Citoyen", yandika ingingo zijanye n'ubutunzi n'imibano.
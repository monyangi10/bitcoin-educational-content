question: None ikinyamakuru ca Fiziyokarate citwa iki?
answer: Ivyo bimenyetso vy'i Citoyen
wrong_answers:
  - Ivyiyumviro vy'abantu
  - Umwenegihugu mushasha
  - Ikinyamakuru c'abahinga mu vy'ubutunzi
explanation: |
  Ikinyamakuru c'abafiziyokarate cari "Les Éphémérides du Citoyen", ikinyamakuru bashiramwo ivyiyumviro vyabo n'isesengura ry'ubutunzi.
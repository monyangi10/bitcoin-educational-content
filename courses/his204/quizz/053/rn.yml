question: None ikinyamakuru ca Physiocrates citwa iki?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Ivyiyumviro vy'abantu(Les Ephémérides du Peuple)
  - Umwenegihugu mushasha(The New Citizen)
  - Ikinyamakuru c'abahinga mu vy'ubutunzi(Le Journal des Économistes)
explanation: |
  Ikinyamakuru c'ba physiocrates cari "Les Éphémérides du Citoyen", ikinyamakuru bashiramwo ivyiyumviro vyabo n'isesangura ry'ubutunzi.
reviewed: true

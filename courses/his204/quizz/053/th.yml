question: ชื่อวารสารของกลุ่มฟีซีโอเครตส์คืออะไร?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - พลเมืองใหม่
  - Le Journal des Économistes
explanation: |
  หนังสือพิมพ์ของกลุ่มฟีซีโอแครตคือ "Les Éphémérides du Citoyen" ซึ่งเป็นวารสารที่พวกเขาใช้เผยแพร่แนวคิดและการวิเคราะห์ทางเศรษฐกิจของพวกเขา
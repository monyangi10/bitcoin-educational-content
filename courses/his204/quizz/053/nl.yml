question: Wat is de naam van het tijdschrift van Physiocrates?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - De volksverhuizers
  - De Nieuwe Burger
  - Journal des Économistes
explanation: |
  De krant van de Fysiocraten was "Les Éphémérides du Citoyen", een tijdschrift waarin ze hun ideeën en economische analyses verspreidden.
question: Как се нарича списанието на физиократите?
answer: Les Ephémérides du Citoyen
wrong_answers:
  - Les Ephémérides du Peuple
  - Le Nouveau Citoyen
  - Le Journal des Économistes
explanation: |
  Вестникът на физиократите е "Les Éphémérides du Citoyen" - периодично издание, в което те разпространяват своите идеи и икономически анализи.
reviewed: true

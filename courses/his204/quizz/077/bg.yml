question: Кой икономист е възхвалявал Турго?
answer: Венсан дьо Гурнай
wrong_answers:
  - Франсоа Кеснай
  - Маркиз д'Арженсон
  - Адам Смит
explanation: |
  Турго пише хвалебствени слова за Венсан дьо Гурнай, като подчертава ролята му на пионер на икономическия либерализъм и влиянието му върху френската икономическа мисъл.
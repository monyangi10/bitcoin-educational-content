question: Ni uwuhe muhinga mu vy’ubutunzi Turgot yashimagije?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - The Marquis d'Argenson
  - Adam Smith
explanation: |
  Turgot yanditse ashimagiza Vincent de Gournay, ashimika ku ruhara rwiwe rwo kuba uwahagarariye uburenganzira bwo kwidegemvya mu vy’ubutunzi no ku ntererano yagize ku vyiyumviro vy’ubutunzi vy’Abafaransa.
reviewed: true

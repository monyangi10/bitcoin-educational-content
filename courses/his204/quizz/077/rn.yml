question: Ni uwuhe muhinga mu vy’ubutunzi Turgot yashimagije?
answer: Vinsenti de Gournay
wrong_answers:
  - Faransuwa Keseni
  - Umukuru w'igisagara
  - Adamu Smith
explanation: |
  Turgot yanditse ashimagiza Vincent de Gournay, ashimika ku ruhara rwiwe rwo kuba umutsimvyi w’uburenganzira bwo kwidegemvya mu vy’ubutunzi no ku nkunga yagize ku vyiyumviro vy’ubutunzi vy’Abafaransa.
question: นักเศรษฐศาสตร์คนใดที่ Turgot ชื่นชม?
answer: วินเซนต์ เดอ กูร์เนย์
wrong_answers:
  - ฟร็องซัว เกซเน่
  - มาร์ควิส ดาร์เจนซง
  - อดัม สมิธ
explanation: |
  Turgot เขียนยกย่อง Vincent de Gournay โดยเน้นบทบาทของเขาในฐานะผู้บุกเบิกเสรีนิยมทางเศรษฐกิจและอิทธิพลของเขาต่อความคิดทางเศรษฐกิจของฝรั่งเศส
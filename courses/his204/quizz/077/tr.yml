question: Turgot hangi ekonomisti övmüştür?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - Marki d'Argenson
  - Adam Smith
explanation: |
  Turgot, Vincent de Gournay'i öven yazılarında onun ekonomik liberalizmin öncüsü olarak rolünü ve Fransız ekonomik düşüncesi üzerindeki etkisini vurgulamıştır.
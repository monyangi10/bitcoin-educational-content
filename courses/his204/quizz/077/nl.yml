question: Welke econoom prees Turgot?
answer: Vincent de Gournay
wrong_answers:
  - François Quesnay
  - De markies d'Argenson
  - Adam Smith
explanation: |
  Turgot schreef vol lof over Vincent de Gournay en benadrukte zijn rol als pionier van het economisch liberalisme en zijn invloed op het Franse economische denken.
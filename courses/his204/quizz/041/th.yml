question: ตีพิมพ์โดยไม่ระบุชื่อ L'Ami des Hommes ได้สร้างความประทับใจอย่างมากจนในตอนแรกถูกระบุว่าเป็นผลงานของ ?
answer: มองเตสกิเออ
wrong_answers:
  - โวลแตร์
  - ดีเดอโรต์
  - รูโซ
explanation: |
  L'Ami des Hommes ถูกระบุว่าเป็นผลงานของมงแต็สกีเยอในตอนแรกเนื่องจากสไตล์และความสำคัญของมัน ก่อนที่จะมีการค้นพบว่าผู้เขียนที่แท้จริงคือมาร์ควิส เดอ มิราโบ
question: L'Ami des Hommes werd anoniem gepubliceerd en maakte zoveel indruk dat het aanvankelijk werd toegeschreven aan ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  L'Ami des Hommes werd eerst toegeschreven aan Montesquieu vanwege zijn stijl en belang, voordat werd ontdekt dat de auteur eigenlijk de Markies de Mirabeau was.
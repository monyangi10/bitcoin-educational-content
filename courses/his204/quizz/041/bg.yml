question: Публикувана анонимно, книгата L'Ami des Hommes прави такова впечатление, че първоначално е приписвана на ?
answer: Монтескьо
wrong_answers:
  - Voltaire
  - Дидро
  - Rousseau
explanation: |
  Първоначално L'Ami des Hommes се приписва на Монтескьо заради стила и значението му, преди да се установи, че авторът всъщност е маркиз дьо Мирабо.
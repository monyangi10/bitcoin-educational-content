question: Igitabu L’Ami des Hommes casohowe ata wuzi, carateye imbere cane ku buryo mu ntango cavuzwe ko ari ?
answer: Monteskiye
wrong_answers:
  - Voltaire
  - Diderote
  - Rouso
explanation: |
  Igitabo ca L’Ami des Hommes cabanje gushirwa kuri Montesquieu kubera uburyo caco n’akamaro kaco, imbere y’uko bimenyekana ko umwanditsi waco mu vy’ukuri ari Marquis de Mirabeau.
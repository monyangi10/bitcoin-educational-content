question: Igitabu L’Ami des Hommes casohowe bitamenyekanye cane, carateye imbere cane ku buryo bwari bumenyerewe kuri ?
answer: Montesquieu
wrong_answers:
  - Voltaire
  - Diderot
  - Rousseau
explanation: |
  Igitabo ca L’Ami des Hommes cabanje gushirwa kuri Montesquieu kubera uburyo caco n’akamaro kaco, imbere y’uko bimenyekana ko umwanditsi waco mu vy’ukuri ari Marquis de Mirabeau.
reviewed: true

question: 1774 yılında Fizyokratlar hangi olayın ardından büyük bir başarı elde ettiler?
answer: Turgot'nun Bakanlığa gelişi
wrong_answers:
  - Dupont de Nemours'un Meclis'e gelişi
  - Dupont de Nemours'un Bakanlığa gelişi
  - Turgot'nun Meclis'e gelişi
explanation: |
  Turgot'nun 1774'te bakanlığa gelmesi Fizyokratlar için bir başarı oldu, çünkü fikirlerinin ateşli bir destekçisiydi ve bazı önerilerini uyguladı.
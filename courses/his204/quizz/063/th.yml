question: ในปี 1774 กลุ่มฟีซิโอแครตได้รับความสำเร็จอย่างมากหลังจากเหตุการณ์ใด?
answer: การมาถึงของตูร์โกต์ที่กระทรวง
wrong_answers:
  - การมาถึงของดูปองต์ เดอ เนมูร์ที่สมัชชา
  - การมาถึงของดูปองต์ เดอ เนมูร์ ที่กระทรวง
  - การมาถึงของเทอร์โกต์ที่สมัชชา
explanation: |
  การมาถึงของตูร์โกต์ที่กระทรวงในปี 1774 ถือเป็นความสำเร็จสำหรับกลุ่มฟิสิโอแครต เนื่องจากเขาเป็นผู้สนับสนุนอย่างแรงกล้าต่อแนวคิดของพวกเขาและได้นำคำแนะนำบางประการของพวกเขาไปปฏิบัติ
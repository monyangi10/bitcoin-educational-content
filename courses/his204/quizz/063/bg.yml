question: След кое събитие през 1774 г. физиократите се радват на голям успех?
answer: Пристигането на Турго в Министерството
wrong_answers:
  - Пристигането на Дюпон дьо Немур в Асамблеята
  - Пристигането на Дюпон дьо Немур в Министерството
  - Пристигане на Турго в Асамблеята
explanation: |
  Пристигането на Турго в министерството през 1774 г. е успех за физиократите, тъй като той е горещ поддръжник на техните идеи и изпълнява някои от препоръките им.
reviewed: true

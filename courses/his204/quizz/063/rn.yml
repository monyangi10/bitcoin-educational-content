question: Mu 1774, aba Physiocrats barateye imbere cane bivuye ku kintu ikihe cabaye?
answer: Ugushika kwa Turgot mu bushikiranganji
wrong_answers:
  - Ugushika kwa Dupont de Nemours mw'koraniro .
  - Ugushika kwa Dupont de Nemours mu bushikiranganji .
  - Ugushika kwa Turgot mw'ikoraniro .
explanation: |
  Igihe Turgot yashika mu bushikiranganji mu 1774, vyatumye aba Physiocrats baroranirwa, kuko yari uwushigikiye cane ivyiyumviro vyabo kandi agashira mu ngiro bimwebimwe mu vyiyumviro vyabo.
reviewed: true

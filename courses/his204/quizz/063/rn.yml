question: Mu 1774, aba Fiziyokarate bararoraniwe cane hakurikijwe ikintu ikihe cabaye?
answer: Ugushika kwa Turgot muri Minisitere
wrong_answers:
  - Ugushika kwa Dupont de Nemours mw'Ikoraniro .
  - Ugushika kwa Dupont de Nemours muri Minisitere .
  - Turgot yashitse mw'Ikoraniro .
explanation: |
  Igihe Turgot yashika mu busuku mu 1774, vyatumye aba Fiziyokarate baroranirwa, kuko yari uwushigikiye cane ivyiyumviro vyabo kandi agashira mu ngiro bimwebimwe mu vyiyumviro vyabo.
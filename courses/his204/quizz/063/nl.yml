question: In 1774 hadden de Fysiocraten groot succes na welke gebeurtenis?
answer: Turgots aankomst op het ministerie
wrong_answers:
  - De komst van Dupont de Nemours naar de Assembly
  - De komst van Dupont de Nemours naar het ministerie
  - Turgots aankomst bij de Assemblee
explanation: |
  Turgots komst naar het ministerie in 1774 betekende een succes voor de Fysiocraten, want hij was een fervent aanhanger van hun ideeën en implementeerde een aantal van hun aanbevelingen.
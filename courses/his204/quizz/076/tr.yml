question: Turgot'nun dehasını açıklayan üç faktör nedir?
answer: Ailesinin kökeni, yaşadığı dönem, entelektüel erken gelişmişliği
wrong_answers:
  - Aile kökeni, arkadaş çevresi, serveti
  - Zaman, serveti, kardeşinin ünü
  - Karizması, hitabeti, kararlılığı
explanation: |
  Turgot'nun aile kökenleri, soylu ve nüfuzlu bir aileye mensup olması, entelektüel mayalanmanın ve reform arzusunun damgasını vurduğu dönem ve ekonomik ve siyasi bilgiye hızla hakim olmasını sağlayan entelektüel önceliği, onun parlaklığına katkıda bulunmuştur.
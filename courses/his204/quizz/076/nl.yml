question: Welke drie factoren verklaren de genialiteit van Turgot?
answer: Zijn familiale afkomst, de tijden, zijn intellectuele vroegrijpheid
wrong_answers:
  - Zijn familiale afkomst, zijn netwerk van vrienden, zijn rijkdom
  - De tijden, zijn fortuin, de reputatie van zijn broer
  - Zijn charisma, zijn welsprekendheid, zijn vastberadenheid
explanation: |
  De familieafkomst van Turgot, zijn lidmaatschap van een adellijke en invloedrijke familie, de periode die gekenmerkt werd door intellectuele gisting en een verlangen naar hervormingen, en zijn intellectuele vroegrijpheid, waardoor hij zich snel economische en politieke kennis eigen kon maken, droegen allemaal bij aan zijn genialiteit.
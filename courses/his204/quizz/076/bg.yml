question: Кои три фактора обясняват гениалността на Турго?
answer: Семейният му произход, времето, интелектуалната му изостаналост
wrong_answers:
  - Семейният му произход, мрежата му от приятели, богатството му
  - Времената, състоянието му, репутацията на брат му
  - Харизмата му, красноречието му, решителността му
explanation: |
  Семейният произход на Турго, принадлежността му към благородническо и влиятелно семейство, периодът, белязан от интелектуално брожение и желание за реформи, както и интелектуалната му бързина, която му позволява бързо да овладее икономическите и политическите познания, допринасят за неговия блясък.
reviewed: true

question: Ni ibintu bitatu ibihe bisigura ubukerebutsi Turgot yari afise?
answer: Inkomoko y'umuryango wiwe, ibihe, ubukerebutsi bwiwe
wrong_answers:
  - Inkomoko y'umuryango wiwe, uruja n'uruza rw'abagenzi biwe, ubutunzi bwiwe
  - Ibihe, ubutunzi bwiwe, izina rya mwenewabo
  - Ubuhinga bwiwe, ubuhinga bwiwe bwo kuvuga neza, umwiyemezo wiwe
explanation: |
  Inkomoko y’umuryango wa Turgot, kuba yari mu muryango w’icubahiro kandi w’abanyacubahiro, igihe yarimwo ugutera imbere kw’ubwenge n’icipfuzo co guhindura ibintu, be n’ubwenge bwiwe bwari buteye imbere, ivyo bikaba vyatumye ashobora kwihuta kumenya ivy’ubutunzi n’ivy’ubutegetsi, vyose vyatumye aba umunyabwenge cane.
question: Кой герой представлява липсващото звено между Боагилбер и физиократите?
answer: Венсан дьо Гурнай
wrong_answers:
  - Voltaire
  - Турго
  - Colbert
explanation: |
  Винсент дьо Гурнай оказва влияние както върху Боагилбер, така и върху физиократите, като разпространява либерални идеи и критикува прекомерната държавна намеса в икономиката.
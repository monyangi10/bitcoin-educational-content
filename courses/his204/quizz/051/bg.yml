question: Кой герой представлява липсващото звено между Боагилбер и физиократите?
answer: Венсан дьо Гурне
wrong_answers:
  - Волтер
  - Турго
  - Колбер
explanation: |
  Винсент дьо Гурне оказва влияние както върху Боагилбер, така и върху физиократите, като разпространява либерални идеи и критикува прекомерната държавна намеса в икономиката.
reviewed: true

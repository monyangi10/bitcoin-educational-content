question: Welk personage vertegenwoordigt de ontbrekende schakel tussen Boisguilbert en de Fysiocraten?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay beïnvloedde zowel Boisguilbert als de Fysiocraten, verspreidde liberale ideeën en bekritiseerde overmatige staatsinterventie in de economie.
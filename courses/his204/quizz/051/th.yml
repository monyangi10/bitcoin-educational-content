question: ตัวละครใดที่เป็นตัวเชื่อมที่ขาดหายไประหว่าง Boisguilbert และ Physiocrats?
answer: วินเซนต์ เดอ กูร์เนย์
wrong_answers:
  - โวลแตร์
  - Turgot
  - โคลเบิร์ต
explanation: |
  วินเซนต์ เดอ กูร์เนย์ มีอิทธิพลต่อทั้งบัวส์กิลแบร์และกลุ่มฟิสิโอแครต โดยเผยแพร่แนวคิดเสรีนิยมและวิพากษ์วิจารณ์การแทรกแซงของรัฐในเศรษฐกิจที่มากเกินไป
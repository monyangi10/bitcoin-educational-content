question: Ni ikihe kigereranyo kigereranya ihuriro ribuze hagati ya Boisguilbert n’aba Physiocrats?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay yaragize ico akoze kuri Boisguilbert no ku ba Physiocrats, akwiragiza ivyiyumviro vy’ubwigenge yongera anegura ukuntu Leta yinjira mu bijanye n'ubutunzi birenze urugero .
reviewed: true

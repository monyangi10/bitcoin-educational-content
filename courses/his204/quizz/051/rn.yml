question: Ni ikihe kigereranyo kigereranya urufatiro rwabuze hagati ya Boisguilbert n’aba Fiziyokarate?
answer: Vinsenti de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Kolbert
explanation: |
  Vincent de Gournay yaragize ico akoze kuri Boisguilbert no ku ba Physiocrates, akwiragiza ivyiyumviro vy’ubwigenge yongera anegura ukuntu Leta yinjira mu bukungu birenze urugero.
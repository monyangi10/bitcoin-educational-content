question: Boisguilbert ve Fizyokratlar arasındaki kayıp halkayı hangi karakter temsil eder?
answer: Vincent de Gournay
wrong_answers:
  - Voltaire
  - Turgot
  - Colbert
explanation: |
  Vincent de Gournay hem Boisguilbert'i hem de Fizyokratları etkilemiş, liberal fikirleri yaymış ve devletin ekonomiye aşırı müdahalesini eleştirmiştir.
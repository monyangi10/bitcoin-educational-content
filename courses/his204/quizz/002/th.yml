question: รัฐมนตรีของซัลลีคือกษัตริย์องค์ใด?
answer: อองรีที่ 4
wrong_answers:
  - หลุยส์ที่ 14
  - หลุยส์ที่ 15
  - หลุยส์ที่ 13
explanation: |
  มักซีมีเลียง เดอ เบทูน ดยุคแห่งซุลลี เป็นรัฐมนตรีหลักของอองรีที่ 4 เขามีบทบาทสำคัญในการฟื้นฟูการเงินของราชวงศ์และการฟื้นตัวทางเศรษฐกิจของราชอาณาจักรหลังสงครามศาสนา
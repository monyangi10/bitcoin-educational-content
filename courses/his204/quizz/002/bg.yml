question: На кой крал Максимилиан дьо Бетюн, херцог дьо Сюли, е бил министър?
answer: Анри IV
wrong_answers:
  - Луи XIV
  - Луи XV
  - Луи XIII
explanation: |
  Максимилиан дьо Бетюн, херцог дьо Сюли, е главният министър на Анри IV. Той изиграва ключова роля за възстановяването на кралските финанси и икономическото възстановяване на кралството след Религиозните войни.
reviewed: true

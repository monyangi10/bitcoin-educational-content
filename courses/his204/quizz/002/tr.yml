question: Sully'nin bakanı hangi kraldı?
answer: Henri IV
wrong_answers:
  - Louis XIV
  - Louis XV
  - Louis XIII
explanation: |
  Maximilien de Béthune, Sully Dükü, Henri IV'ün başbakanıydı. Din Savaşları'ndan sonra kraliyet maliyesinin restorasyonunda ve krallığın ekonomik iyileşmesinde kilit rol oynamıştır.
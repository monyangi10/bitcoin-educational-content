question: Ni uwuhe mwami yari umushikiranganji wa Sully?
answer: Henri IV
wrong_answers:
  - Ludoviko XIV
  - Ludoviko XV
  - Ludoviko XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, yari umushikiranganji mukuru wa Henri IV. Yaragize uruhara runini mu gusubizaho amafaranga y’ubwami no mu gusubizaho ubutunzi bw’ubwami inyuma y’Intambara z’Idini.
reviewed: true

question: Ni uwuhe mwami yari umusuku wa Suli?
answer: Henri wa kane
wrong_answers:
  - Ludoviko XIV
  - Ludoviko XV
  - Ludoviko XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, yari umushikiranganji mukuru wa Henri wa kane. Yaragize uruhara runini mu gusubizaho amafaranga y’ubwami no mu gusubizaho ubutunzi bw’ubwami inyuma y’Intambara z’Idini.
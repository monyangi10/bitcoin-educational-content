question: Welke koning was de minister van Sully?
answer: Hendrik IV
wrong_answers:
  - Lodewijk XIV
  - Lodewijk XV
  - Lodewijk XIII
explanation: |
  Maximilien de Béthune, Duc de Sully, was de belangrijkste minister van Henri IV. Hij speelde een sleutelrol in het herstel van de koninklijke financiën en het economische herstel van het koninkrijk na de Godsdienstoorlogen.
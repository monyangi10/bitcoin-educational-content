question: Voltaire L'Homme aux quarante écus'da neyi ele alıyor?
answer: Fizyokratların vergi teorisi
wrong_answers:
  - Fizyokratların para teorisi
  - Fizyokratların siyaset teorisi
  - Fizyokratların değer teorisi
explanation: |
  Voltaire, Fizyokratların toprak üzerinden tek vergi alınması önerisiyle alay ettiği felsefi bir öykü olan "L'Homme aux quarante écus "da Fizyokratların vergi teorisini eleştirir.
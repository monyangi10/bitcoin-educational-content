question: โวลแตร์จัดการกับอะไรใน L'Homme aux quarante écus?
answer: ทฤษฎีภาษีของฟิสิโอแครต
wrong_answers:
  - ทฤษฎีการเงินของฟิสิโอแครต
  - ทฤษฎีการเมืองของฟิสิโอแครต
  - ทฤษฎีมูลค่าของฟิสิโอแครต
explanation: |
  โวลแตร์วิจารณ์ทฤษฎีภาษีของกลุ่มฟีซิโอแครตใน "L'Homme aux quarante écus" ซึ่งเป็นนิทานเชิงปรัชญาที่เขาเยาะเย้ยข้อเสนอภาษีเดี่ยวบนที่ดินของกลุ่มฟีซิโอแครต
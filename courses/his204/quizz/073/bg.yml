question: С какво се занимава Волтер в L'Homme aux quarante écus?
answer: Данъчната теория на физиократите
wrong_answers:
  - Паричната теория на физиократите
  - Политическата теория на физиократите
  - Теория за стойността на физиократите
explanation: |
  Волтар критикува данъчната теория на физиократите в "Човекът с четирите краища" - философски разказ, в който той осмива предложения от физиократите единен данък върху земята.
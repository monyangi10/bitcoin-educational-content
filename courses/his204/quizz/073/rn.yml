question: Ni igiki Voltaire akora mu gitabu L’Homme aux écus?
answer: Ivyiyumviro vy'imisoro vy'abanyafiziyokarate
wrong_answers:
  - Ivyiyumviro vy'amahera vy'abanyafiziyokarate
  - Ivyiyumviro vya politike vy'abanyafiziyokarate
  - Ivyiyumviro vy'agaciro vy'abanyafiziyokarate
explanation: |
  Voltaire anegura inyigisho y'imisoro y'abafiziyokarate mu gitabu "L'Homme aux quarante écus", inkuru ya filozofiya aho atwengera mw'ijigo umusoro umwe abafiziyokarate bashaka ku butaka.
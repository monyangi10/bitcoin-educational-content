question: Ni igiki Voltaire atangura mu gitabu L’Homme aux écus?
answer: Ivyiyumviro vy'amakori vy'aba Physiocrats
wrong_answers:
  - Ivyiyumviro vy'amahera vy'aba Physiocrats
  - Ivyiyumviro vya politike vy'aba Physiocrats
  - Ivyiyumviro vy'agaciro vy'aba Physiocrats
explanation: |
  Voltaire anegura inyigisho y'amakori y'aba Physiocrats mu gitabu "L'Homme aux quarante écus", inkuru ya filozofiya aho atwengera mw'ijigo umusoro umwe aba Physiocrats bashaka ku butaka.
reviewed: true

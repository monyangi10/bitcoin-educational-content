question: Wat pakt Voltaire aan in L'Homme aux quarante écus?
answer: De belastingtheorie van de fysiocraten
wrong_answers:
  - De monetaire theorie van de fysiocraten
  - De politieke theorie van de fysiocraten
  - De waardetheorie van de fysiocraten
explanation: |
  Voltaire bekritiseert de belastingtheorie van de Fysiocraten in "L'Homme aux quarante écus", een filosofisch verhaal waarin hij de spot drijft met de door de Fysiocraten voorgestelde enkele belasting op land.
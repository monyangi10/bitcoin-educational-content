question: Ni nde yise Cantillon uwashinze ubutunzi?
answer: Murray Rothbard
wrong_answers:
  - Yozefu A. Shumpeteri
  - Mariko Bilawugi
  - Adamu Smith
explanation: |
  Murray Rothbard, umuhinga mu vy’ubutunzi wo mw’ishure ryo muri Otirishiya, yise Richard Cantillon uwashinze ubutunzi kubera uburyo bushasha yakoresheje be n’intererano zihambaye yatanze mu vy’ubutunzi.
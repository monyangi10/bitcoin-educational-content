question: Wie noemde Cantillon de grondlegger van de economie?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Murray Rothbard, een econoom van de Oostenrijkse school, noemde Richard Cantillon de grondlegger van de economie vanwege zijn innovatieve aanpak en belangrijke bijdragen aan de economische theorie.
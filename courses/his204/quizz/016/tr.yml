question: Cantillon'a ekonominin kurucusu diyen kimdi?
answer: Murray Rothbard
wrong_answers:
  - Joseph A. Schumpeter
  - Mark Blaug
  - Adam Smith
explanation: |
  Avusturya ekolünden bir iktisatçı olan Murray Rothbard, yenilikçi yaklaşımı ve iktisat teorisine yaptığı önemli katkılar nedeniyle Richard Cantillon'u iktisat biliminin kurucusu olarak adlandırmıştır.
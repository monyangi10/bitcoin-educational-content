question: ใครเรียก Cantillon ว่าผู้ก่อตั้งเศรษฐศาสตร์?
answer: เมอร์เรย์ รอธบาร์ด
wrong_answers:
  - โจเซฟ เอ. ชุมปีเตอร์
  - มาร์ค บลอก
  - อดัม สมิธ
explanation: |
  เมอร์เรย์ รอธบาร์ด นักเศรษฐศาสตร์แห่งสำนักออสเตรีย เรียกริชาร์ด แคนทิลลอนว่าเป็นผู้ก่อตั้งเศรษฐศาสตร์เนื่องจากวิธีการที่เป็นนวัตกรรมและการมีส่วนร่วมที่สำคัญของเขาต่อทฤษฎีเศรษฐศาสตร์
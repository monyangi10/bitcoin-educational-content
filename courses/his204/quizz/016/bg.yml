question: Кой нарича Кантильон основател на икономиката?
answer: Мъри Ротбард
wrong_answers:
  - Джоузеф А. Шумпетер
  - Марк Блауг
  - Адам Смит
explanation: |
  Мъри Ротбард, икономист от австрийската школа, нарича Ричард Кантильон основател на икономиката заради новаторския му подход и важния му принос към икономическата теория.
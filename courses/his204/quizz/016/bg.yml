question: Кой счита Кантийон за основател на икономиката?
answer: Мъри Ротбард
wrong_answers:
  - Джоузеф А. Шумпетер
  - Марк Блауг
  - Адам Смит
explanation: |
  Мъри Ротбард, икономист от австрийската школа, нарича Ришар Кантийон основател на икономиката заради новаторския му подход и важния му принос към икономическата теория.
reviewed: true

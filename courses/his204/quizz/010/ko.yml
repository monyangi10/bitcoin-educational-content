question: 보반에 따르면 모든 사람이 세금을 내는 것이 옳고 당연한 이유는 무엇일까요?
answer: 국가가 모든 사람에게 서비스를 제공하기 때문에 모든 사람이 비용을 부담하는 것은 공평합니다
wrong_answers:
  - 국가는 전체 국민에게 한꺼번에 세금을 부과하여 더 많은 세금을 모을 수 있기 때문입니다
  - 모든 사람은 삶의 과정에서 때때로 부자가되고 때로는 가난하기 때문에 모든 사람에게 균일하게 세금을 부과하는 것이 좋습니다
  - 전쟁 자금을 조달하고 왕국의 위대함을 보장하는 데 도움이 되기 때문입니다
explanation: |
  보방은 모든 시민이 안보, 사법, 인프라 같은 국가 서비스의 혜택을 받는 만큼 세금은 보편적이어야 한다고 믿었습니다. 따라서 그는 모든 사람이 자신의 능력에 따라 재정에 기여하는 것이 공정하다고 생각했습니다.
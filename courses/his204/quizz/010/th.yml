question: ทำไมตามที่โวบังกล่าวถึงการที่ทุกคนควรจ่ายภาษีเป็นสิ่งที่ถูกต้องและเป็นธรรมชาติ?
answer: เนื่องจากรัฐให้บริการแก่ทุกคน จึงเป็นธรรมที่ทุกคนควรมีส่วนร่วมในการจ่ายค่าบริการเหล่านั้น
wrong_answers:
  - เพราะรัฐสามารถเพิ่มรายได้มากขึ้นโดยการเก็บภาษีจากประชากรทั้งหมดในคราวเดียว
  - เพราะทุกคนบางครั้งก็ร่ำรวยและบางครั้งก็ยากจนในช่วงชีวิตของพวกเขา การเก็บภาษีทุกคนอย่างเท่าเทียมกันจึงดีกว่า
  - เพราะมันช่วยสนับสนุนการเงินสำหรับสงครามและรับประกันความยิ่งใหญ่ของราชอาณาจักร
explanation: |
  โวบองเชื่อว่าการเก็บภาษีควรเป็นสากล เนื่องจากพลเมืองทุกคนได้รับประโยชน์จากบริการของรัฐ เช่น ความปลอดภัย ความยุติธรรม และโครงสร้างพื้นฐาน ดังนั้นเขาจึงเห็นว่าเป็นธรรมที่ทุกคนควรมีส่วนร่วมในการจัดหาทุนตามความสามารถของตน
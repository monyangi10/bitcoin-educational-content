question: Nk’uko Vauban abivuga, ni kubera iki ari vyiza kandi ari ibisanzwe ko umuntu wese ariha imisoro?
answer: Kubera ko Leta itanga ibikorwa vyayo kuri bose, birabereye gusa ko umuntu wese atanga umusanzu wo kubihemba
wrong_answers:
  - Kuko Leta ishobora guteranya vyinshi mu gusoresha abanyagihugu bose icarimwe .
  - Kubera ko umuntu wese rimwe na rimwe aba umutunzi rimwe na rimwe akaba umukene mu nzira y’ubuzima bwiwe, ni vyiza ko umuntu wese akorwako imisoro imwe .
  - Kuko bifasha mu gutanga amahera y’intambara no gutuma ubwami bugira ubukuru .
explanation: |
  Vauban yarizera ko imisoro ikwiye kuba iya bose, kuko abanyagihugu bose bungukira ku bikorwa vya Leta nk’umutekano, ubutungane n’ibikorwa remezo. Yabonye rero ko ari vyiza ko umuntu wese atanga amahera yiwe akurikije ubushobozi afise.
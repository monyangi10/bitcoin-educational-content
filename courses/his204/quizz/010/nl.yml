question: Waarom is het volgens Vauban juist en vanzelfsprekend dat iedereen belasting betaalt?
answer: Omdat de staat zijn diensten aan iedereen aanbiedt, is het niet meer dan eerlijk dat iedereen meebetaalt
wrong_answers:
  - Omdat de staat meer kan opbrengen door de hele bevolking in één keer te belasten
  - Omdat iedereen in de loop van zijn leven soms rijk en soms arm is, is het beter om iedereen uniform te belasten
  - Omdat het helpt oorlogen te financieren en de grootsheid van het koninkrijk te garanderen
explanation: |
  Vauban vond dat belastingen universeel moesten zijn, omdat alle burgers profiteerden van staatsdiensten zoals veiligheid, justitie en infrastructuur. Hij vond het daarom eerlijk dat iedereen naar draagkracht bijdroeg aan de financiering ervan.
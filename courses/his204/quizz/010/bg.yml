question: Защо, според Вобан, е правилно и естествено всеки да плаща данъци?
answer: Тъй като държавата предлага услугите си на всички, справедливо е всеки да участва в заплащането им
wrong_answers:
  - Защото държавата може да събере повече пари, като обложи цялото население наведнъж
  - Тъй като през живота си всеки е ту богат, ту беден, по-добре е всички да бъдат облагани еднакво
  - Защото помага за финансирането на войни и за осигуряване на величието на кралството
explanation: |
  Вобан смята, че данъчното облагане трябва да бъде универсално, тъй като всички граждани се ползват от държавните услуги, като сигурност, правосъдие и инфраструктура. Ето защо той смята, че е справедливо всеки да допринася за тяхното финансиране според възможностите си.
reviewed: true

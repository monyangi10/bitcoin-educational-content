question: เหตุการณ์ใดบ้างที่ดูปงต์ เดอ เนมูร์มีส่วนร่วมในช่วงการปฏิวัติฝรั่งเศส?
answer: สมัชชาร่างรัฐธรรมนูญและการร่าง "cahiers de doléances
wrong_answers:
  - การร่าง cahiers de doléances และการบุกโจมตีบาสตีย์
  - การบุกยึดคุกบาสตีย์และสภาร่างรัฐธรรมนูญ
  - เที่ยวบินของพระมหากษัตริย์และสภาร่างรัฐธรรมนูญ
explanation: |
  ดูปองต์ เดอ เนมูร์ มีส่วนร่วมในสภาร่างรัฐธรรมนูญและการร่าง cahiers de doléances โดยมีบทบาทสำคัญในช่วงแรกของการปฏิวัติฝรั่งเศส
question: Ni ibihe bihe Dupont de Nemours yagize uruhara mu gihe c’Impinduka y’Abafaransa?
answer: Inama Nshingamateka n'ugutegura « cahiers de doléances ».
wrong_answers:
  - Gutegura cahiers de doléances no gufata Bastille
  - Ugufatwa kwa Bastille n'Inama Nshingamateka .
  - Uguhunga kw’Umwami n’Inama Nshingamateka
explanation: |
  Dupont de Nemours yarifatanije mu nama nshingamateka no mu gutegura ayo cahiers de doléances, yarafise uruhara runini mu misi ya mbere y’Impinduka y’Abafaransa.
reviewed: true

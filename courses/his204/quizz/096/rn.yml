question: Ni ibihe bintu muri ivyo Dupont de Nemours yagize uruhara mu gihe c’Impinduka y’Abafaransa?
answer: Inama Nshingamateka n'ugutegura « cahiers de doléances ».
wrong_answers:
  - Gutegura amakete y'imbabazi no gutera igisagara ca Bastille
  - Igitero ca Bastille n'Inama Nshingamateka .
  - Uguhunga kw’Umwami n’Inama Nshingamateka
explanation: |
  Dupont de Nemours yarifatanije mu nama nshingamateka no mu gutegura ama cahiers de doléances, yarafise uruhara runini mu misi ya mbere y’Impinduka y’Abafaransa.
question: Dupont de Nemours Fransız Devrimi sırasında bu olaylardan hangisine katılmıştır?
answer: Kurucu Meclis ve "cahiers de doléances" taslaklarının hazırlanması
wrong_answers:
  - Cahiers de doléances'ın hazırlanması ve Bastille'in basılması
  - Bastille Baskını ve Kurucu Meclis
  - Kral'ın uçuşu ve Kurucu Meclis
explanation: |
  Dupont de Nemours, Kurucu Meclis'te ve cahiers de doléances'ın hazırlanmasında yer alarak Fransız Devrimi'nin ilk günlerinde önemli bir rol oynadı.
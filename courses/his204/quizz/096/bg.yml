question: В кое от тези събития Дюпон дьо Немур участва по време на Френската революция?
answer: Учредителното събрание и изготвянето на "cahiers de doléances"
wrong_answers:
  - Изготвянето на "cahiers de doléances" и щурмуването на Бастилията
  - Щурмуването на Бастилията и Учредителното събрание
  - Полетът на краля и Учредителното събрание
explanation: |
  Дюпон дьо Немур участва в Учредителното събрание и в съставянето на сборника "cahiers de doléances", като играе важна роля в първите дни на Френската революция.
reviewed: true

question: Aan welke van deze gebeurtenissen nam Dupont de Nemours deel tijdens de Franse Revolutie?
answer: De grondwetgevende vergadering en het opstellen van "cahiers de doléances
wrong_answers:
  - Het opstellen van de cahiers de doléances en de bestorming van de Bastille
  - De bestorming van de Bastille en de Grondwetgevende Vergadering
  - De vlucht van de koning en de grondwetgevende vergadering
explanation: |
  Dupont de Nemours nam deel aan de Constituerende Vergadering en het opstellen van de cahiers de doléances, en speelde een belangrijke rol in de begindagen van de Franse Revolutie.
question: Abbé Galiani, Fizyokratlara ve onların tahıl ticaretinin serbestliği tezine hangi edebi formda saldırmıştır?
answer: Diyalog
wrong_answers:
  - Roman
  - Şiir
  - Test
explanation: |
  Galiani, farklı karakterler arasında diyaloglar şeklinde yazdığı "Dialogues sur le commerce des blés" adlı eserinde Fizyokratları eleştirmiştir.
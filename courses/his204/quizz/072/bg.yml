question: В каква литературна форма абат Галиани атакува физиократите и тяхната теза за свободата на търговията със зърно?
answer: Диалог
wrong_answers:
  - Романът
  - Поезия
  - Тестът
explanation: |
  Галиани критикува физиократите в своите "Диалози за търговията с блянове" - произведение, написано под формата на диалози между различни герои.
question: В каква литературна форма абат Галиани атакува физиократите и тяхната теза за свободата на търговията със зърно?
answer: Диалог
wrong_answers:
  - Роман
  - Поезия
  - Тест
explanation: |
  Галиани критикува физиократите в своите "Dialogues sur le commerce des blés" - произведение, написано под формата на диалози между различни герои.
reviewed: true

question: In welke literaire vorm viel Abbé Galiani de Fysiocraten en hun stelling over de vrijheid van graanhandel aan?
answer: Dialoog
wrong_answers:
  - De roman
  - Poëzie
  - De test
explanation: |
  Galiani bekritiseerde de Fysiocraten in zijn "Dialogues sur le commerce des blés", een werk geschreven in de vorm van dialogen tussen verschillende personages.
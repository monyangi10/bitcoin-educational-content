question: ในรูปแบบวรรณกรรมใดที่ Abbé Galiani โจมตีกลุ่มฟีซีโอแครตและวิทยานิพนธ์ของพวกเขาเกี่ยวกับเสรีภาพในการค้าข้าว?
answer: บทสนทนา
wrong_answers:
  - นวนิยาย
  - บทกวี
  - การทดสอบ
explanation: |
  กาลิอานิวิจารณ์พวกฟีซีโอแครตใน "Dialogues sur le commerce des blés" ซึ่งเป็นงานเขียนในรูปแบบของบทสนทนาระหว่างตัวละครต่าง ๆ
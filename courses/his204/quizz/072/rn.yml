question: Ni mu buryo ubuhe bw’inyandiko Abbé Galiani yateye aba Physiocrates n’inyigisho yabo yerekeye umwidegemvyo wo gucuruza intete?
answer: Ikiganiro
wrong_answers:
  - Igitabo
  - Ivyese
  - Ikigeragezo
explanation: |
  Galiani yaraneguye abafiziyokarate mu gitabu ciwe citwa "Dialogues sur le commerce des blés", igitabu canditswe mu buryo bw'ibiganiro hagati y'abantu batandukanye.
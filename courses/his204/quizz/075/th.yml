question: ทำไมจึงกล่าวได้ว่านักปรัชญาแห่งยุคเรืองปัญญามีบทบาทที่แตกต่างในการพัฒนาเศรษฐศาสตร์การเมือง?
answer: พวกเขาทั้งเฉลิมฉลองและประณามหลักการของมัน
wrong_answers:
  - พวกเขาเพิ่งเริ่มสนใจวิทยาศาสตร์นี้เมื่ออายุมากแล้ว
  - บางคนเป็นนักเศรษฐศาสตร์อย่างชัดเจน คนอื่น ๆ เป็นฝ่ายตรงข้ามของพวกเขา
  - พวกเขาเน้นทฤษฎีมากเกินไปและไม่ค่อยมีความเป็นปฏิบัติเท่าที่ควร
explanation: |
  นักปรัชญาแห่งยุคเรืองปัญญามีมุมมองที่หลากหลายเกี่ยวกับเศรษฐกิจการเมือง ทั้งในแง่บวกและวิจารณ์ บางคนปกป้องหลักการของเสรีนิยมทางเศรษฐกิจ ในขณะที่คนอื่นเตือนถึงอันตรายของความไม่เท่าเทียมและการแสวงหาผลประโยชน์
question: Защо може да се каже, че философите на Просвещението са изиграли противоположна роля в развитието на политическата икономия?
answer: Те както възхваляват, така и осъждат неговите принципи
wrong_answers:
  - Те започват да се интересуват от тази наука едва в края на живота си
  - Някои от тях са ясни икономисти, други - техни опоненти
  - Те бяха твърде теоретични и недостатъчно практични
explanation: |
  Философите на Просвещението са имали различни възгледи за политическата икономия - както положителни, така и критични. Някои от тях защитават принципите на икономическия либерализъм, докато други предупреждават за опасностите от неравенството и експлоатацията.
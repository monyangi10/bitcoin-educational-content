question: Ni kubera iki twovuga yuko abanyabwenge bo mu gihe c’Umuco bagize uruhara rutandukanye mu guteza imbere ubutunzi bwa politike?
answer: Bompi barahimbaza kandi baracira urubanza ingingo ngenderwako zayo .
wrong_answers:
  - Batanguye gukunda iyo siyansi bakiri bato cane .
  - Bamwe ni abahinga mu vy’ubutunzi bigaragara, abandi ni ababarwanya .
  - Vyari vy'ivyiyumviro cane kandi ntivyari bihagije
explanation: |
  Abanyabwenge bo mu gihe c’Umuco bari bafise ivyiyumviro bitandukanye ku bijanye n’ubutunzi bwa politike, ivyo bikaba ari vyiza be n’ibibi. Bamwebamwe barwanira ingingo ngenderwako z’uburenganzira bwo kwidegemvya mu vy’ubutunzi, abandi na bo bagabisha ku kaga gashobora guterwa n’ubusumbasumbane n’ugukoresha nabi abantu.
question: Ni kubera iki twokwemeza yuko abafilozofe bo mu gihe c’Umuco bagize uruhara rutandukanye mu guteza imbere ubutunzi bwa politike?
answer: Bompi bararyoherewe kandi baratera ivyatsi ingingo ngenderwako zayo .
wrong_answers:
  - Batanguye gukunda iyo siyansi batevye cane mu buzima bwabo .
  - Bamwe ni abahinga mu vy’ubutunzi bigaragara, abandi bari abo bahanganye .
  - Vyari vy'ivyiyumviro vyo mu majambo ntibabishira mu ngiro cane
explanation: |
  Abafilozofe bo mu gihe c’Umuco bari bafise ivyiyumviro bitandukanye ku bijanye n’ubutunzi bwa politike, ivyo bikaba ari vyiza be n’ibibi. Bamwebamwe barwanira ingingo ngenderwako z’uburenganzira bwo kwidegemvya mu vy’ubutunzi, abandi na bo bagabisha ku kajagari gashobora guterwa n’ubusumbasumbane n’ugukoresha nabi abantu.
reviewed: true

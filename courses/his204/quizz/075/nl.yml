question: Waarom kan worden gezegd dat de filosofen van de Verlichting een contrasterende rol hebben gespeeld in de ontwikkeling van de politieke economie?
answer: Ze vierden en veroordeelden haar principes
wrong_answers:
  - Ze raakten pas laat in hun leven geïnteresseerd in deze wetenschap
  - Sommigen zijn duidelijk economen, anderen hun tegenstanders
  - Ze waren te theoretisch en niet praktisch genoeg
explanation: |
  De filosofen van de Verlichting hadden verschillende opvattingen over politieke economie, zowel positief als kritisch. Sommigen verdedigden de principes van het economisch liberalisme, terwijl anderen waarschuwden voor de gevaren van ongelijkheid en uitbuiting.
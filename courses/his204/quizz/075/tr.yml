question: Aydınlanma filozoflarının ekonomi politiğin gelişiminde zıt bir rol oynadıkları neden söylenebilir?
answer: İlkelerini hem kutladılar hem de kınadılar
wrong_answers:
  - Bu bilimle ancak hayatlarının çok geç dönemlerinde ilgilenmeye başladılar
  - Bazıları açıkça ekonomisttir, diğerleri ise muhalifleri
  - Çok teoriktiler ve yeterince pratik değillerdi
explanation: |
  Aydınlanma filozofları, politik ekonomi konusunda hem olumlu hem de eleştirel çeşitli görüşlere sahipti. Bazıları ekonomik liberalizmin ilkelerini savunurken, diğerleri eşitsizlik ve sömürünün tehlikelerine karşı uyarıda bulunmuştur.
question: 계몽주의 철학자들이 정치 경제의 발전에서 대조적인 역할을 했다고 말할 수 있는 이유는 무엇일까요?
answer: 그들은 모두 그 원칙을 축하하고 비난했습니다
wrong_answers:
  - 그들은 아주 늦게 이 과학에 관심을 갖게 되었습니다
  - 어떤 이들은 분명히 경제학자이고, 어떤 이들은 그들의 반대자입니다
  - 너무 이론적이고 실용적이지 못했습니다
explanation: |
  계몽주의 철학자들은 정치 경제에 대해 호의적이기도 하고 비판적이기도 한 다양한 견해를 가졌습니다. 일부는 경제적 자유주의의 원칙을 옹호했고, 다른 일부는 불평등과 착취의 위험에 대해 경고했습니다.
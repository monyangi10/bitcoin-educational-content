question: Кои са трите финансови императива, изложени от Турго в прочутото му писмо до Луи XVI, когато се присъединява към Генералния съвет (Contrôle Général)?
answer: Не е обявен в несъстоятелност. Без увеличение на данъците. Никакви заеми
wrong_answers:
  - Няма реформа. Без нови данъци. Никакви нови закони.
  - Няма нова война. Без увеличение на данъците. Никакви заеми
  - Без ненужни разходи. Без привилегии. Никакво фаворизиране.
explanation: |
  Трите императива на Турго бяха: никакъв фалит, никакво увеличение на данъците, никакви заеми. Той смята, че тези три принципа са от съществено значение за възстановяване на държавните финанси и съживяване на икономиката.
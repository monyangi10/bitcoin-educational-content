question: Turgot'nun Contrôle Général'e katıldığında Louis XVI'ya yazdığı ünlü mektubunda öne sürdüğü üç mali zorunluluk nedir?
answer: İflas yok. Vergi artışı yok. Borçlanma yok
wrong_answers:
  - Reform yok. Yeni vergi yok. Yeni kanunlar yok.
  - Yeni bir savaş yok. Vergi artışı yok. Borçlanma yok
  - Gereksiz harcamalar yok. Ayrıcalık yok. İltimas yok.
explanation: |
  Turgot'nun üç zorunluluğu şunlardı: iflas yok, vergi artışı yok, borçlanma yok. Bu üç ilkenin devletin mali durumunu düzeltmek ve ekonomiyi canlandırmak için gerekli olduğuna inanıyordu.
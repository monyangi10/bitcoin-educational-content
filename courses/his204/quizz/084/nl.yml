question: Wat zijn de drie financiële vereisten die Turgot naar voren bracht in zijn beroemde brief aan Lodewijk XVI toen hij lid werd van de Contrôle Général?
answer: Geen faillissement. Geen belastingverhogingen. Geen lenen
wrong_answers:
  - Geen hervorming. Geen nieuwe belastingen. Geen nieuwe wetten.
  - Geen nieuwe oorlog. Geen belastingverhogingen. Geen leningen
  - Geen onnodige uitgaven. Geen privileges. Geen vriendjespolitiek.
explanation: |
  De drie vereisten van Turgot waren: geen faillissement, geen belastingverhogingen, geen leningen. Hij geloofde dat deze drie principes essentieel waren om de financiën van de staat te herstellen en de economie nieuw leven in te blazen.
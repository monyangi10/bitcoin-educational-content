question: 투르고가 콘트롤 제네랄에 합류하면서 루이 16세에게 보낸 유명한 편지에서 제시한 세 가지 재정적 의무는 무엇일까요?
answer: 파산은 없습니다. 세금 인상 없음. 차입금 없음
wrong_answers:
  - 개혁은 없습니다. 새로운 세금도 없습니다. 새로운 법률도 없습니다.
  - 새로운 전쟁은 없습니다. 세금 인상은 없습니다. 차입금 없음
  - 불필요한 비용이 없습니다. 특권이 없습니다. 편애도 없습니다.
explanation: |
  투르고의 세 가지 원칙은 파산 금지, 세금 인상 금지, 차입 금지였습니다. 그는 이 세 가지 원칙이 국가 재정을 회복하고 경제를 되살리는 데 필수적이라고 믿었습니다.
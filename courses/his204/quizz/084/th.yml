question: ข้อบังคับทางการเงินสามประการที่ Turgot เสนอในจดหมายที่มีชื่อเสียงถึง Louis XVI เมื่อเขาเข้าร่วม Contrôle Général คืออะไร?
answer: ไม่มีการล้มละลาย ไม่มีการขึ้นภาษี ไม่มีการกู้ยืม
wrong_answers:
  - ไม่มีการปฏิรูป ไม่มีภาษีใหม่ ไม่มีการออกกฎหมายใหม่
  - ไม่มีสงครามใหม่ ไม่มีการขึ้นภาษี ไม่มีการกู้ยืม
  - ไม่มีค่าใช้จ่ายที่ไม่จำเป็น ไม่มีสิทธิพิเศษ ไม่มีการลำเอียง
explanation: |
  ข้อบังคับสามประการของ Turgot คือ: ไม่มีการล้มละลาย, ไม่มีการขึ้นภาษี, ไม่มีการกู้ยืม เขาเชื่อว่าหลักการทั้งสามนี้เป็นสิ่งสำคัญในการฟื้นฟูการเงินของรัฐและฟื้นฟูเศรษฐกิจ
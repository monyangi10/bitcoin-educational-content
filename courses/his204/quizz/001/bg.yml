question: В края на XVII в. кой министър се превръща в еталон за държавниците, когато става дума за икономика?
answer: Colbert
wrong_answers:
  - Турго
  - Съли
  - Mazarin
explanation: |
  Колбер, министър на финансите на Луи XIV, оставя отпечатък върху епохата си с интервенционистка икономическа политика, известна като колбертизъм, насочена към развитие на френската промишленост и търговия. Действията му служат като модел за много европейски държавници.
question: Mu mpera z’ikinjana ca 17, ni uwuhe mushikiranganji yacitse ikintu abategetsi bakoresha mu bijanye n’ubutunzi?
answer: Kolbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarini
explanation: |
  Colbert, umushikiranganji w’ivy’amafaranga wa Louis XIV, yarasize ikimenyetso ciwe mu gihe ciwe n’ingingo ngenderwako y’ubutunzi y’ugufasha abantu izwi kw’izina rya Colbertisme, ikaba yari igamije guteza imbere inganda n’ubudandaji vy’Ubufaransa. Ivyo yakoze vyabaye akarorero ku bakuru b’igihugu benshi bo mu Buraya.
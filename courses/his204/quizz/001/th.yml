question: ในช่วงปลายศตวรรษที่ 17 รัฐมนตรีคนใดกลายเป็นแบบอย่างสำหรับนักการเมืองเมื่อพูดถึงเศรษฐศาสตร์?
answer: โคลเบิร์ต
wrong_answers:
  - เทอร์ก็อต
  - ซัลลี่
  - มาซาแร็ง
explanation: |
  Colbert รัฐมนตรีว่าการกระทรวงการคลังของพระเจ้าหลุยส์ที่ 14 ได้ทิ้งร่องรอยไว้ในยุคของเขาด้วยนโยบายเศรษฐกิจแบบแทรกแซงที่รู้จักกันในชื่อ Colbertism ซึ่งมุ่งเน้นไปที่การพัฒนาอุตสาหกรรมและการค้าของฝรั่งเศส การกระทำของเขาเป็นแบบอย่างให้กับรัฐบุรุษยุโรปหลายคน
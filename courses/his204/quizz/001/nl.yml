question: Welke minister werd aan het einde van de 17e eeuw de referentie voor staatslieden op het gebied van economie?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Colbert, de minister van Financiën van Lodewijk XIV, drukte zijn stempel op zijn tijd met een interventionistisch economisch beleid dat bekend staat als het Colbertisme, gericht op de ontwikkeling van de Franse industrie en handel. Zijn acties dienden als voorbeeld voor veel Europese staatslieden.
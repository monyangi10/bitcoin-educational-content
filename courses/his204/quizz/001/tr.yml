question: 17. yüzyılın sonunda hangi bakan ekonomi söz konusu olduğunda devlet adamlarının referansı haline gelmiştir?
answer: Colbert
wrong_answers:
  - Turgot
  - Sully
  - Mazarin
explanation: |
  Louis'nin maliye bakanı Colbert, Fransız sanayi ve ticaretini geliştirmeyi amaçlayan ve Colbertizm olarak bilinen müdahaleci ekonomi politikasıyla dönemine damgasını vurmuştur. Onun eylemleri birçok Avrupalı devlet adamı için bir model oluşturdu.
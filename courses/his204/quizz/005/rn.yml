question: Ni ubuhe buryo bwo gutegeka akazi n’inganda bwari bufise mu gihe c’ubutegetsi bwa kera?
answer: Amajana y'amabwirizwa y'ubwoko bwose bw'inganda
wrong_answers:
  - Itegeko rusangi ry'ibikorwa vy'ubutunzi
  - Ingingo zimwezimwe zishobora guhindurwa, zigasiga umwidegemvyo mwinshi wo gukora no gukora .
  - Kubura amategeko rwose, guha umwidegemvyo umuntu ku giti ciwe
explanation: |
  Intwaro ya kera yari irangwa n’urutonde rw’amashirahamwe n’amabwirizwa akomeye agenga ibikorwa n’inganda. Ubudandaji bwose bwari bufise amategeko yihariye, akenshi akaba ari ay’ido n’ido cane, yatuma haba uguhiganwa n’uguhingura ibintu bishasha.
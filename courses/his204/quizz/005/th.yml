question: รูปแบบของการควบคุมงานและอุตสาหกรรมภายใต้ระบอบ Ancien Régime เป็นอย่างไร?
answer: กฎระเบียบหลายร้อยข้อสำหรับทุกประเภทของอุตสาหกรรม
wrong_answers:
  - รหัสทั่วไปสำหรับกิจกรรมทางเศรษฐกิจ
  - บทบัญญัติที่ค่อนข้างยืดหยุ่น ทำให้มีอิสระมากมายสำหรับการทำงานและอุตสาหกรรม
  - การขาดกฎเกณฑ์โดยสิ้นเชิง เปิดโอกาสให้ความคิดริเริ่มของแต่ละบุคคล
explanation: |
  ระบอบ Ancien Régime มีลักษณะเด่นคือระบบกิลด์และกฎระเบียบที่เข้มงวดในการควบคุมการทำงานและอุตสาหกรรม แต่ละอาชีพถูกกำหนดด้วยกฎเฉพาะที่มักมีรายละเอียดสูง ซึ่งจำกัดการแข่งขันและนวัตกรรม
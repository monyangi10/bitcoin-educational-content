question: Каква е била формата на регулиране на труда и индустрията по време на Стария режим?
answer: Стотици нормативни актове за всеки вид индустрия
wrong_answers:
  - Общ кодекс за икономическа дейност
  - Някои сравнително гъвкави разпоредби, които оставят много свобода за работа и индустрия
  - Пълно отсъствие на правила, което дава свобода на индивидуалната инициатива
explanation: |
  Старият режим се характеризира със система от гилдии и строги правила за работа и индустрия. Всеки занаят е бил подчинен на специфични, често много подробни правила, които са ограничавали конкуренцията и иновациите.
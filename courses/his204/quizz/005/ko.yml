question: 앙시앵 레짐 하에서 노동과 산업에 대한 규제는 어떤 형태를 취했나요?
answer: 모든 유형의 산업을 위한 수백 개의 규정
wrong_answers:
  - 경제 활동에 대한 일반적인 규범
  - 업무와 업계에 충분한 자유를 보장하는 상당히 유연한 조항이 있습니다
  - 규칙이 전혀 없으므로 개인의 주도권을 자유롭게 발휘할 수 있습니다
explanation: |
  고대 레짐은 길드 시스템과 일과 산업에 적용되는 엄격한 규정이 특징이었습니다. 각 거래에는 경쟁과 혁신을 제한하는 구체적이고 매우 상세한 규칙이 적용되었습니다.
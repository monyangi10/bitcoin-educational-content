question: Ancien Régime döneminde çalışma ve sanayinin düzenlenmesi nasıl bir şekil aldı?
answer: Her tür sektöre yönelik yüzlerce yönetmelik
wrong_answers:
  - Ekonomik faaliyetler için genel bir kod
  - Oldukça esnek bazı hükümler, iş ve endüstri için bol miktarda özgürlük bırakıyor
  - Kuralların tamamen yokluğu, bireysel inisiyatifin serbest bırakılması
explanation: |
  Ancien Régime, loncalar sistemi ve iş ve sanayiyi yöneten katı düzenlemelerle karakterize ediliyordu. Her ticaret, rekabeti ve yeniliği sınırlayan belirli ve genellikle oldukça ayrıntılı kurallara tabiydi.
question: Welke vorm had de regulering van werk en industrie onder het Ancien Régime?
answer: Honderden voorschriften voor elk type industrie
wrong_answers:
  - Een algemene code voor economische activiteit
  - Enkele vrij flexibele bepalingen, die veel vrijheid laten voor werk en industrie
  - Een totale afwezigheid van regels, waardoor individueel initiatief de vrije loop krijgt
explanation: |
  Het Ancien Régime werd gekenmerkt door een systeem van gilden en strenge regels voor werk en industrie. Elke handel was onderworpen aan specifieke, vaak zeer gedetailleerde regels die concurrentie en innovatie beperkten.
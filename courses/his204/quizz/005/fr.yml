question: Sous l’Ancien Régime, sous quelle forme se présente la réglementation du travail et de l’industrie ?
answer: De centaines de règlements pour chaque type d’industrie
wrong_answers:
  - D’un code général pour l’activité économique
  - De quelques dispositions assez souples, laissant une grande liberté au travail et à l’industrie
  - D'une absence totale de règles, laissant libre cours à l'initiative individuelle
explanation: |
  L'Ancien Régime était caractérisé par un système de corporations et de réglementations très strictes qui encadraient le travail et l'industrie. Chaque métier était soumis à des règles spécifiques, souvent très détaillées, qui limitaient la concurrence et l'innovation.

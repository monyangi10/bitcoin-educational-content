question: Boisguilbert yasubiye gusohora igitabu ciwe citwa Details de l’Upfaransa mu 1696 afise umutwe uwuhe?
answer: Ubufaransa bwasambutse ku ngoma ya Ludoviko XIV, n’uwuhe n’ingene, afise uburyo bwo kubusubizaho .
wrong_answers:
  - Ubufaransa bwasambutse ku ngoma ya Ludoviko XIV, kubera iki n’ingene, n’ibiharuro bishigikiye .
  - Ubufaransa bwacitsemwo ibice ku ngoma ya Ludoviko XIV, n’imice iyihe n’igituma, n’ingene bwosubira kubufatanya
  - Ubufaransa bwarateye imbere ku ngoma ya Ludoviko XIV, kubera nde n’ingene bwateye imbere, hakaba hariho ingero zitomoye .
explanation: |
  Umutwe wuzuye w'igitabu ciwe casubiwemwo mu 1696 ni "Ubufaransa bwasambutse n'umwami wa Ludoviko XIV, n'ibivugwako, gushika mu bindi bihugu vy'ugusubirana". Iryo zina ry’icubahiro ryerekana ukuntu Boisguilbert yanegura cane politike y’ubutunzi ya Louis XIV.
question: Boisguilbert yasubiye gusohora igitabu ciwe citwa Détail de la France mu 1696 gifise umutwe uwuhe?
answer: Ubufaransa bwasambutse ku ngoma ya Louis XI(France ruined under the reign of Louis XIV), n’uwuhe n’ingene, afise uburyo bwo kubugarukirako .
wrong_answers:
  - Ubufaransa bwasambutse ku ngoma ya  Louis XI, kubera iki n’ingene, n’ibiharuro bishigikiye .
  - Ubufaransa bwacitsemwo ibice ku ngoma ya  Louis XI, n’imice iyihe n’igituma, n’ingene bwosubira kubufatanya
  - Ubufaransa bwarateye imbere ku ngoma ya  Louis XI, kubera nde n’ingene bwateye imbere?(ingero zitomoye) .
explanation: |
  Umutwe wuzuye w'igitabu ciwe casubiwemwo mu 1696 ni "Ubufaransa bwasambutse n'umwami wa Ludoviko XIV, n'ibivugwako, gushika mu bindi bihugu vy'ugusubirana". Iryo zina ry’icubahiro ryerekana ukuntu Boisguilbert yanegura cane politike y’ubutunzi ya Louis XIV.
reviewed: true

question: Boisguilbert republished his "Détail de la France" under the title "Le Factum de la France" in 1696.
answer: ฝรั่งเศสถูกทำลายภายใต้การปกครองของหลุยส์ที่ 14 โดยใครและอย่างไร พร้อมวิธีการฟื้นฟู
wrong_answers:
  - ฝรั่งเศสล่มสลายภายใต้การครองราชย์ของพระเจ้าหลุยส์ที่ 14 ทำไมและอย่างไร พร้อมตัวเลขสนับสนุน
  - ฝรั่งเศสแบ่งแยกในช่วงการครองราชย์ของพระเจ้าหลุยส์ที่ 14 โดยกลุ่มใดและทำไม และจะรวมเป็นหนึ่งอีกครั้งได้อย่างไร
  - ฝรั่งเศสเจริญรุ่งเรืองภายใต้การปกครองของพระเจ้าหลุยส์ที่ 14 ขอบคุณใครและอย่างไร พร้อมตัวอย่างที่ชัดเจน
explanation: |
  ชื่อเต็มของการตีพิมพ์ผลงานของเขาใหม่ในปี 1696 คือ "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". ชื่อนี้สะท้อนถึงการวิพากษ์วิจารณ์อย่างรุนแรงของ Boisguilbert ต่อการนโยบายเศรษฐกิจของหลุยส์ที่ 14
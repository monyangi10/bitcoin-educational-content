question: Под какво заглавие Боагилбер преиздава своята Détail de la France през 1696 г.?
answer: Франция, разрушена по времето на Луи XIV, от кого и как, със средствата за нейното възстановяване
wrong_answers:
  - Франция е разорена по времето на Луи XIV, защо и как, с фигури в подкрепа
  - Франция се разделя по време на управлението на Луи XIV, от кои фракции и защо, и как да се обедини отново
  - Франция процъфтява при управлението на Луи XIV, благодарение на кого и как, с конкретни примери
explanation: |
  Пълното заглавие на преизданието на труда му през 1696 г. наистина е "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Това заглавие отразява яростната критика на Боагилбер към икономическата политика на Луи XIV.
reviewed: true

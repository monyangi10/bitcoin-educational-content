question: Onder welke titel publiceerde Boisguilbert zijn Détail de la France opnieuw in 1696?
answer: Frankrijk geruïneerd onder het bewind van Lodewijk XIV, door wie en hoe, met de middelen om het te herstellen
wrong_answers:
  - Frankrijk geruïneerd onder het bewind van Lodewijk XIV, waarom en hoe, met ondersteunende cijfers
  - Frankrijk verdeeld tijdens het bewind van Lodewijk XIV, door welke facties en waarom, en hoe het weer te verenigen
  - Frankrijk bloeide onder het bewind van Lodewijk XIV, dankzij wie en hoe, met concrete voorbeelden
explanation: |
  De volledige titel van de heruitgave van zijn werk in 1696 is inderdaad "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir". Deze titel weerspiegelt Boisguilberts felle kritiek op het economische beleid van Lodewijk XIV.
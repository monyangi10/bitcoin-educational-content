question: Boisguilbert 1696'da Détail de la France'ı hangi başlık altında yeniden yayımladı?
answer: Louis döneminde mahvolmuş Fransa, kimler tarafından ve nasıl mahvoldu?
wrong_answers:
  - Louis döneminde mahvolmuş Fransa, neden ve nasıl, destekleyici figürlerle birlikte
  - Fransa 14. Louis döneminde hangi gruplar tarafından, neden bölündü ve bir kez daha nasıl birleştirilebilir?
  - Fransa 14. Louis döneminde kimler sayesinde ve nasıl zenginleşti, somut örneklerle
explanation: |
  Çalışmasının 1696'da yeniden basımının tam başlığı gerçekten de "La France ruinée sous le règne de Louis XIV, par qui et comment, avec les moyens de la rétablir "dir. Bu başlık Boisguilbert'in 14. Louis'nin ekonomi politikasına yönelik şiddetli eleştirilerini yansıtmaktadır.
question: 부아길베르는 1696년에 어떤 제목으로 데테일 드 라 프랑스를 다시 출판했나요?
answer: 루이 14 세의 통치하에 폐허가 된 프랑스, 누구에 의해 어떻게, 어떻게 복원 할 수 있었습니까?
wrong_answers:
  - 루이 14 세의 통치하에 망한 프랑스, 그 이유와 방법, 지원 수치와 함께
  - 루이 14 세 통치 기간 동안 분열 된 프랑스, 어떤 파벌과 이유, 그리고 다시 한 번 통일하는 방법
  - 루이 14 세의 통치하에 번영 한 프랑스, 누구 덕분에 어떻게 번영했는지 구체적인 사례를 들어 설명합니다
explanation: |
  1696년에 출간된 그의 작품의 전체 제목은 실제로 "루이 14세의 통치 아래서 망가진 프랑스, 파르퀴외르, 레 모옌 드 라 레타블뤼"입니다. 이 제목은 루이 14세의 경제 정책에 대한 부아길베르의 신랄한 비판을 반영합니다.
question: Ni amahanga ayahe Vincent de Gournay asaba ko yoba akarorero?
answer: Ubwongereza n'Ubuholandi
wrong_answers:
  - Ubuholandi n'Ubusuwisi
  - Ekose n'Ubwongereza
  - Esupanye na Portugal
explanation: |
  Gournay yarashima cane ubutunzi bwo mu Bwongereza no mu Buholandi, kuko bwari bufise umwidegemvyo mwinshi kandi bukaba bwari bufasha ubudandaji kuruta ubw’Ubufaransa.
reviewed: true

question: Welke landen stelt Vincent de Gournay voor als model?
answer: Engeland en Nederland
wrong_answers:
  - Nederland en Zwitserland
  - Schotland en Engeland
  - Spanje en Portugal
explanation: |
  Gournay bewonderde de economische systemen van Engeland en Nederland, die liberaler en handelsvriendelijker waren dan die van Frankrijk.
question: Vincent de Gournay hangi ulusları model olarak öneriyor?
answer: İngiltere ve Hollanda
wrong_answers:
  - Hollanda ve İsviçre
  - İskoçya ve İngiltere
  - İspanya ve Portekiz
explanation: |
  Gournay, Fransa'ya kıyasla daha liberal ve ticaret dostu olan İngiltere ve Hollanda'nın ekonomik sistemlerine hayranlık duyuyordu.
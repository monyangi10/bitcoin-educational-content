question: Кои нации Венсан дьо Гурне предлага като модели?
answer: Англия и Холандия
wrong_answers:
  - Холандия и Швейцария
  - Шотландия и Англия
  - Испания и Португалия
explanation: |
  Гурне се възхищава от икономическите системи на Англия и Холандия, които са по-либерални и благоприятни за търговията от тези на Франция.
reviewed: true

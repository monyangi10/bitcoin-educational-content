question: Fizyokrasiden esinlenen ekonomik reformlar hangi ülkelerde uygulanmıştır?
answer: Fransa, İtalya, Almanya
wrong_answers:
  - İngiltere, Fransa, Almanya
  - Hollanda, İtalya, İsveç
  - İspanya, Portekiz, Rusya
explanation: |
  Fizyokratik reformlar Fransa, İtalya ve Almanya'da denenmiş, ancak yerleşik çıkarların muhalefeti nedeniyle genellikle kısa ömürlü olmuştur.
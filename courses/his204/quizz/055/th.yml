question: ในประเทศใดบ้างที่มีการนำการปฏิรูปเศรษฐกิจที่ได้รับแรงบันดาลใจจากลัทธิฟิสิโอเครซีไปใช้?
answer: ฝรั่งเศส, อิตาลี, เยอรมนี
wrong_answers:
  - อังกฤษ, ฝรั่งเศส, เยอรมนี
  - ฮอลแลนด์, อิตาลี, สวีเดน
  - สเปน, โปรตุเกส, รัสเซีย
explanation: |
  การปฏิรูปทางเศรษฐกิจแบบฟิสิโอแครตถูกพยายามในฝรั่งเศส อิตาลี และเยอรมนี แต่บ่อยครั้งที่มีอายุสั้นเนื่องจากการต่อต้านจากผลประโยชน์ที่มีอยู่เดิม
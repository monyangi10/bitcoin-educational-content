question: In welke landen werden de economische hervormingen geïnspireerd door de Fysiocratie toegepast?
answer: Frankrijk, Italië, Duitsland
wrong_answers:
  - Engeland, Frankrijk, Duitsland
  - Nederland, Italië, Zweden
  - Spanje, Portugal, Rusland
explanation: |
  Fysiocratische hervormingen werden geprobeerd in Frankrijk, Italië en Duitsland, maar waren vaak van korte duur door de tegenstand van gevestigde belangen.
question: В кои страни са били приложени икономическите реформи, вдъхновени от физиокрацията?
answer: Франция, Италия, Германия
wrong_answers:
  - Англия, Франция, Германия
  - Холандия, Италия, Швеция
  - Испания, Португалия, Русия
explanation: |
  Опити за физиократични реформи са правени във Франция, Италия и Германия, но те често са били краткотрайни поради съпротивата на утвърдени интереси.
question: Ni mu bihugu ibihe ivugurura ry’ubutunzi ryahumekewe na Physiocracy ryakoreshejwe?
answer: Ubufaransa, Ubutaliyano, Ubudage
wrong_answers:
  - Ubwongereza, Ubufaransa, Ubudage
  - Ubuholandi, Ubutaliyano, Suède
  - Esupanye, Portigal, Uburusiya
explanation: |
  Impinduka z’ubuhinga bwa none zageragejwe mu Bufaransa, mu Butaliyano no mu Budagi, ariko kenshi ntizamara igihe gito kubera ukurwanywa n’inyungu zashinzwe.
question: Ni mu bihugu ibihe vyimpinduka mu butunzi ryisunze ivyiyumviro vya Physiocracy ryakoreshejwe?
answer: Ubufaransa, Ubutaliyano, Ubudagi
wrong_answers:
  - Ubwongereza, Ubufaransa, Ubudagi
  - Ubuholandi, Ubutaliyano, Suède
  - Esupanye, Portigal, Uburusiya
explanation: |
  Impinduka za Physiocratic z’ubuhinga bwa none zageragejwe mu Bufaransa, mu Butaliyano no mu Budagi, ariko kenshi zamara igihe gito kubera ukurwanywa n’inyungu zikeneye.
reviewed: true

question: Ni nde yarungitse Mercier de la Rivière mu Burusiya kugira ngo afashe Catherine wa kabiri guhindura amategeko yiwe?
answer: Diderote
wrong_answers:
  - Voltaire
  - Turgot
  - Ikibazo
explanation: |
  Diderot, uwaguma yandikirana na Catherine II, yararemesheje uwo Catherine guhamagara Mercier de la Rivière kugira ngo afashe mu guhindura amategeko y’Uburusiya.
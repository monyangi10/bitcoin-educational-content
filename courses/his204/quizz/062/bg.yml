question: Кой изпраща Мерсие дьо ла Ривиер в Русия, за да помогне на Екатерина II да реформира законите си?
answer: Дидро
wrong_answers:
  - Волтер
  - Турго
  - Кене
explanation: |
  Дидро, който поддържал кореспонденция с Екатерина II, насърчил последната да се обърне към Мерсие дьо ла Ривиер с молба да помогне за реформирането на руското законодателство.
reviewed: true

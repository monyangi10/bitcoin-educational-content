question: Mercier de la Rivière'i 2. Katerina'nın yasalarında reform yapmasına yardımcı olması için Rusya'ya kim gönderdi?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Katerina ile yazışmalarını sürdüren Diderot, Katerina'yı Mercier de la Rivière'i Rus mevzuatının reformuna yardımcı olması için çağırmaya teşvik etti.
question: Wie stuurde Mercier de la Rivière naar Rusland om Catharina II te helpen haar wetten te hervormen?
answer: Diderot
wrong_answers:
  - Voltaire
  - Turgot
  - Quesnay
explanation: |
  Diderot, die een briefwisseling onderhield met Catharina II, moedigde haar aan om Mercier de la Rivière te vragen om te helpen bij de hervorming van de Russische wetgeving.
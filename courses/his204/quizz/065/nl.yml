question: Waar ontmoetten Adam Smith en de fysiocraten elkaar?
answer: In Parijs
wrong_answers:
  - In Glasgow
  - In Londen
  - Ze hebben elkaar nooit ontmoet
explanation: |
  Adam Smith ontmoette de Fysiocraten in Parijs tijdens een reis door Europa. Hij werd beïnvloed door hun ideeën, maar ontwikkelde ook zijn eigen economische theorie, die in sommige opzichten afweek van de Fysiocratie.
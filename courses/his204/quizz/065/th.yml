question: อดัม สมิธ และกลุ่มฟิสิโอแครตพบกันที่ไหน?
answer: ในปารีส
wrong_answers:
  - ในกลาสโกว์
  - ในลอนดอน
  - พวกเขาไม่เคยพบกัน
explanation: |
  อดัม สมิธ พบกับกลุ่มฟิสิโอแครตในปารีสระหว่างการเดินทางไปยุโรป เขาได้รับอิทธิพลจากแนวคิดของพวกเขา แต่ก็พัฒนาทฤษฎีเศรษฐศาสตร์ของตนเอง ซึ่งแตกต่างจากฟิสิโอแครซีในบางแง่มุม
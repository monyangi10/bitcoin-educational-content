question: None Adamu Smith n’abafiziyokarate bahuriye hehe?
answer: I Paris
wrong_answers:
  - I Glasgow
  - I Londres
  - Ntibigeze bahura
explanation: |
  Adamu Smith yahuye n’aba Fiziyokarate i Paris mu rugendo yari afise rwo kuja i Buraya. Yarakozweko n’ivyiyumviro vyabo, ariko kandi yarateguye inyigisho yiwe bwite y’ubutunzi, itandukanye n’iya Physiocracy mu buryo bumwe bumwe.
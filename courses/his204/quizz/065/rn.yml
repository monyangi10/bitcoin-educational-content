question: None Adamu Smith n’aba Physiocrats bahuriye hehe?
answer: I Paris
wrong_answers:
  - I Glasgow
  - I Londres
  - Ntibigeze bahura
explanation: |
  Adamu Smith yahuye n’aba Physiocrats i Paris mu rugendo yagiriye i Buraya. Yarakozweko n’ivyiyumviro vyabo, ariko kandi yarateguye inyigisho yiwe bwite y’ubutunzi, itandukanye n’iya Physiocracy mu buryo bumwe bumwe.
reviewed: true

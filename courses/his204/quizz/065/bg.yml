question: Къде се срещат Адам Смит и физиократите?
answer: В Париж
wrong_answers:
  - В Глазгоу
  - В Лондон
  - Те никога не са се срещали
explanation: |
  Адам Смит се запознава с физиократите в Париж по време на пътуване в Европа. Той е повлиян от техните идеи, но разработва и своя собствена икономическа теория, която в някои отношения се различава от тази на физиократите.
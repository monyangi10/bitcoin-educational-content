question: Adam Smith ve Fizyokratlar nerede buluştu?
answer: Paris'te
wrong_answers:
  - Glasgow'da
  - Londra'da
  - Hiç tanışmadılar
explanation: |
  Adam Smith, Avrupa'ya yaptığı bir gezi sırasında Paris'te Fizyokratlarla tanıştı. Onların fikirlerinden etkilendi, ancak bazı açılardan Fizyokrasi'den farklı olan kendi ekonomik teorisini de geliştirdi.
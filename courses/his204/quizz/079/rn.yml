question: Mu kete ciwe ciwe citwa letre sur la marque des fers, Turgot aserura iciyumviro c’uko bidashoboka ko umuntu amenya neza kuruta uko isoko rimenya. Ni uwuhe muhinga mu vy’ubutunzi wo muri Otirishiya yavyiteje imbere mu kinjana ca 20?
answer: Fridiriki Hayek
wrong_answers:
  - Carl umukozi
  - Murray Rothbard
  - Luduwiki voni Mises
explanation: |
  Hayek yateye imbere iciyumviro co "kuvumbura igiciro" n'isoko, hakurikijwe ivyo isoko ari inzira yo kuvumbura amakuru kandi ibiciro ni ingaruka y'ugukorana kwa Supply n'ivyo umuntu asaba.
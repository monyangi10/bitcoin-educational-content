question: ในจดหมายของเขาเกี่ยวกับเครื่องหมายของเหล็ก Turgot แสดงความคิดว่ามันเป็นไปไม่ได้ที่จะรู้ดีกว่าตลาด นักเศรษฐศาสตร์ชาวออสเตรียคนใดที่พัฒนาความคิดนี้ในศตวรรษที่ 20?
answer: ฟรีดริช ฮาเย็ค
wrong_answers:
  - คาร์ล เมงเกอร์
  - เมอร์เรย์ รอธบาร์ด
  - ลุดวิก ฟอน มีเซส
explanation: |
  ฮาเย็คพัฒนาแนวคิดเรื่อง "การค้นหาราคา" โดยตลาด ซึ่งตามแนวคิดนี้ ตลาดเป็นกระบวนการค้นหาข้อมูลและราคาคือผลลัพธ์ของการโต้ตอบระหว่างอุปสงค์และอุปทาน
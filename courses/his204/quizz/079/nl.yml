question: In zijn lettre sur la marque des fers uit Turgot het idee dat het onmogelijk is om het beter te weten dan de markt. Welke Oostenrijkse econoom ontwikkelde dit in de 20e eeuw?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek ontwikkelde het idee van "prijsontdekking" door de markt, volgens welke de markt een proces van informatieontdekking is en prijzen het resultaat zijn van de wisselwerking tussen Supply en vraag.
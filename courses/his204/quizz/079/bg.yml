question: В своето писмо "Lettre sur la marque des fers" Турго изразява идеята, че е невъзможно да се знае по-добре от пазара. Кой австрийски икономист я развива през XX век?
answer: Фридрих Хайек
wrong_answers:
  - Карл Менгер
  - Мъри Ротбард
  - Лудвиг фон Мизес
explanation: |
  Хайек развива идеята за "определяне на цените" от пазара, според която пазарът е процес на откриване на информация, а цените са резултат от взаимодействието между търсенето и предлагането.
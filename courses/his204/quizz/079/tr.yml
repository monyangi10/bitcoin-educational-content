question: Turgot, lettre sur la marque des fers adlı eserinde, piyasanın bildiğinden daha iyisini bilmenin mümkün olmadığı fikrini dile getirir. Bunu 20. yüzyılda hangi Avusturyalı iktisatçı geliştirmiştir?
answer: Friedrich Hayek
wrong_answers:
  - Carl Menger
  - Murray Rothbard
  - Ludwig von Mises
explanation: |
  Hayek, piyasanın bir bilgi keşfi süreci olduğu ve fiyatların Supply ile talebin etkileşiminin bir sonucu olduğu piyasa tarafından "fiyat keşfi" fikrini geliştirmiştir.
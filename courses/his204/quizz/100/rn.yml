question: Ni irihe banki ari ryo ry’iherezo ry’amahitamwo yakozwe mu 1789, ayo Dupont de Nemours yavuze ko arwanya?
answer: Banki y'Ubufaransa
wrong_answers:
  - Banki yo kuzigama
  - Inguzanyo y'uburimyi
  - Banki Nkuru y'Uburayi
explanation: |
  Banki y’Ubufaransa ni ingaruka y’amahitamwo yakozwe mu 1789, ayo Dupont de Nemours yaneguye ko yatumye ububasha bw’ivy’ubutunzi bushirwa hamwe birenze urugero, Leta na yo ikaba yinjira mu bukungu birenze urugero.
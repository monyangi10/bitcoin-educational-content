question: Ni iyihe banki ari ryo ry’iherezo ry’amahitamwo yakozwe mu 1789, arwanya ayo Dupont de Nemours yakujije?
answer: Banki y'Ubufaransa
wrong_answers:
  - Agasandugu ko kuziganya
  - Ingurane y'uburimyi
  - Banki Nkuru y'Uburayi
explanation: |
  Banki y’Ubufaransa ni ingaruka y’amahitamwo yakozwe mu 1789, ayo Dupont de Nemours yaneguye ko yatumye ukugendura ubutunzi bushirwa hamwe birenze urugero, Leta na yo ikaba yinjira mu butunzi birenze urugero.
reviewed: true

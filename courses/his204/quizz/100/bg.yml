question: Коя банкова институция е крайната последица от избора, направен през 1789 г., срещу който Дюпон дьо Немур се обяви?
answer: Banque de France
wrong_answers:
  - The Savings Bank
  - Crédit Agricole
  - The European Central Bank
explanation: |
  Banque de France е следствие от избора, направен през 1789 г., който Дюпон дьо Немур критикува, че е довел до прекомерна централизация на финансовата власт и прекомерна държавна намеса в икономиката.
reviewed: true

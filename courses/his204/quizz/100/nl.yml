question: Welke bankinstelling is het uiteindelijke gevolg van de keuzes die in 1789 werden gemaakt en waar Dupont de Nemours zich tegen uitsprak?
answer: Franse bank
wrong_answers:
  - De Spaarbank
  - Landbouwkrediet
  - De Europese Centrale Bank
explanation: |
  De Banque de France is een gevolg van de keuzes die in 1789 werden gemaakt en die Dupont de Nemours bekritiseerde omdat ze zouden leiden tot overmatige centralisatie van de financiële macht en overmatige staatsbemoeienis met de economie.
question: สถาบันการเงินใดที่เป็นผลลัพธ์สูงสุดจากการตัดสินใจในปี 1789 ซึ่ง Dupont de Nemours ได้ออกมาพูดต่อต้าน?
answer: ธนาคารแห่งประเทศฝรั่งเศส
wrong_answers:
  - ธนาคารออมสิน
  - Crédit Agricole
  - ธนาคารกลางยุโรป
explanation: |
  Banque de France เป็นผลมาจากการตัดสินใจในปี 1789 ซึ่ง Dupont de Nemours วิพากษ์วิจารณ์ว่าทำให้เกิดการรวมศูนย์อำนาจทางการเงินมากเกินไปและการแทรกแซงของรัฐในเศรษฐกิจมากเกินไป
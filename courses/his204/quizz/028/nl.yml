question: Wat zou de staat volgens Markies d'Argenson moeten zijn?
answer: Een minimale staat die moet zorgen voor veiligheid, justitie, geld en infrastructuur
wrong_answers:
  - Een beschermende staat, die kooplieden en ambachtslieden beschermt
  - De staat heeft geen legitimiteit; hij mag geen diensten aanbieden
  - Een interventionistische staat, die alle aspecten van het economische leven moet reguleren
explanation: |
  De markies d'Argenson was voorstander van een minimale staat, die zich beperkte tot essentiële functies zoals veiligheid, justitie, valuta en infrastructuur. Hij geloofde dat de staat individuen vrij moest laten om te handelen in de economische sfeer.
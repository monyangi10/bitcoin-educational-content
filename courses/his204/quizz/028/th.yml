question: ในแนวคิดของ Marquis d'Argenson รัฐควรเป็นอย่างไร?
answer: รัฐขนาดเล็กที่สุด ต้องจัดให้มีความมั่นคง ความยุติธรรม สกุลเงิน และโครงสร้างพื้นฐาน
wrong_answers:
  - รัฐที่คุ้มครอง ปกป้องพ่อค้าและช่างฝีมือ
  - รัฐไม่มีความชอบธรรม; มันต้องไม่ให้บริการใด ๆ
  - รัฐแทรกแซงซึ่งต้องควบคุมทุกด้านของชีวิตเศรษฐกิจ
explanation: |
  Marquis d'Argenson สนับสนุนรัฐที่มีขนาดเล็กที่สุด โดยจำกัดตัวเองให้ทำหน้าที่ที่จำเป็น เช่น ความมั่นคง ความยุติธรรม สกุลเงิน และโครงสร้างพื้นฐาน เขาเชื่อว่ารัฐควรปล่อยให้บุคคลมีเสรีภาพในการดำเนินการในด้านเศรษฐกิจ
question: Dans la conception du marquis d’Argenson, que doit être l’Etat ?
answer: Un Etat minimal, il doit pourvoir à la sécurité, à la justice, à la monnaie et aux infrastructures
wrong_answers:
  - Un Etat protecteur, il doit protéger les marchands et les artisans
  - L’Etat n’a aucune légitimité, il ne doit offrir aucun service
  - Un Etat interventionniste, il doit réguler tous les aspects de la vie économique
explanation: |
  Le marquis d'Argenson était favorable à un État minimal, se limitant à ses fonctions essentielles, telles que la sécurité, la justice, la monnaie et les infrastructures. Il pensait que l'État devait laisser les individus libres d'agir dans le domaine économique.

question: Каква трябва да бъде държавата според концепцията на маркиз д'Арженсон?
answer: Минимална държава, която трябва да осигурява сигурност, правосъдие, валута и инфраструктура
wrong_answers:
  - Защитна държава, която защитава търговците и занаятчиите
  - Държавата няма легитимност; тя не трябва да предлага никакви услуги
  - Интервенционистка държава, която трябва да регулира всички аспекти на икономическия живот
explanation: |
  Маркиз д'Арженсон е привърженик на минималната държава, която се ограничава до основни функции като сигурност, правосъдие, валута и инфраструктура. Той смята, че държавата трябва да остави на индивидите свободата да действат в икономическата сфера.
reviewed: true

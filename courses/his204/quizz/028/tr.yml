question: Marquis d'Argenson'un anlayışına göre Devlet ne olmalıdır?
answer: Minimal bir devlet, güvenlik, adalet, para birimi ve altyapı sağlamalıdır
wrong_answers:
  - Tüccarları ve zanaatkârları koruyan koruyucu bir devlet
  - Devletin meşruiyeti yoktur; hiçbir hizmet sunmamalıdır
  - Ekonomik yaşamın tüm yönlerini düzenlemek zorunda olan müdahaleci bir devlet
explanation: |
  Marquis d'Argenson, kendisini güvenlik, adalet, para birimi ve altyapı gibi temel işlevlerle sınırlayan minimal bir devletten yanaydı. Devletin bireyleri ekonomik alanda hareket etmeleri için özgür bırakması gerektiğine inanıyordu.
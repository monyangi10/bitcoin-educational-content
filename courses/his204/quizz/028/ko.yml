question: 다겐손 후작의 개념에서 국가는 무엇이어야 할까요?
answer: 최소한의 국가는 보안, 정의, 통화 및 인프라를 제공해야 합니다
wrong_answers:
  - 상인과 장인을 보호하는 보호 국가
  - 국가는 정당성이 없으므로 어떠한 서비스도 제공해서는 안 됩니다
  - 경제 생활의 모든 측면을 규제해야 하는 개입주의 국가
explanation: |
  다겐손 후작은 국가는 안보, 사법, 통화, 인프라 등 필수적인 기능으로 제한하는 최소한의 국가를 선호했습니다. 그는 국가는 개인이 경제 영역에서 자유롭게 활동할 수 있도록 해야 한다고 믿었습니다.
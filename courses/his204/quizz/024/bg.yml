question: Какво предлага абат дьо Сен-Пиер, за да гарантира мира между народите?
answer: Другите 3 отговора наведнъж
wrong_answers:
  - Създаване на съвет на нациите
  - Създаване на обща армия
  - Да прибягват до арбитраж в случай на спорове
explanation: |
  Абат дьо Сен-Пиер предлага серия от мерки за гарантиране на мира, включително съвет на нациите, обща армия и арбитраж. Той вярва, че тези институции ще помогнат за мирното разрешаване на конфликтите и ще предотвратят войните.
reviewed: true

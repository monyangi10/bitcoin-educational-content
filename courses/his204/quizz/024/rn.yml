question: Ni igiki Petero mweranda asaba ko haba amahoro hagati y’amahanga?
answer: Ibindi bisubizo 3 rimwe .
wrong_answers:
  - Gushinga inama y’amahanga .
  - Gushinga ingabo rusangi .
  - Gukoresha ubukemurampaka mu gihe habaye amatati
explanation: |
  Abbé de Saint-Pierre yasavye urutonde rw’ingingo zo gutuma haba amahoro, harimwo inama y’ibihugu, ingabo rusangi n’ubukemurampaka. Yarizera ko izo nzego zofasha gutorera umuti amatati mu mahoro no gukingira intambara.
question: Wat stelt Sint-Pieter voor om vrede tussen naties te garanderen?
answer: De 3 andere antwoorden tegelijk
wrong_answers:
  - Een raad van naties vormen
  - Een gemeenschappelijk leger opzetten
  - Een beroep kunnen doen op arbitrage bij geschillen
explanation: |
  De Abbé de Saint-Pierre stelde een reeks maatregelen voor om vrede te garanderen, waaronder een raad van naties, een gemeenschappelijk leger en arbitrage. Hij geloofde dat deze instellingen conflicten vreedzaam zouden oplossen en oorlogen zouden voorkomen.
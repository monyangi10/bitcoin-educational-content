question: Aziz Petrus uluslar arasında barışı sağlamak için ne öneriyor?
answer: Diğer 3 cevap aynı anda
wrong_answers:
  - Bir uluslar konseyi oluşturmak
  - Ortak bir ordu kurmak
  - Anlaşmazlık durumunda tahkime başvurabilme
explanation: |
  Abbé de Saint-Pierre barışı güvence altına almak için bir uluslar konseyi, ortak bir ordu ve hakemlik de dahil olmak üzere bir dizi önlem önerdi. Bu kurumların çatışmaların barışçıl yollarla çözülmesine ve savaşların önlenmesine yardımcı olacağına inanıyordu.
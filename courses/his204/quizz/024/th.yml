question: นักบุญเปโตรเสนออะไรเพื่อรับประกันสันติภาพระหว่างประเทศ?
answer: คำตอบอื่นๆ อีก 3 ข้อในครั้งเดียว
wrong_answers:
  - จัดตั้งสภาแห่งชาติ
  - จัดตั้งกองทัพร่วม
  - ใช้การอนุญาโตตุลาการในกรณีที่มีข้อพิพาท
explanation: |
  Abbé de Saint-Pierre เสนอชุดมาตรการเพื่อรับประกันสันติภาพ รวมถึงสภาแห่งชาติ กองทัพร่วม และการอนุญาโตตุลาการ เขาเชื่อว่าสถาบันเหล่านี้จะช่วยแก้ไขความขัดแย้งอย่างสันติและป้องกันสงคราม
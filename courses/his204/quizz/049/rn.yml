question: None ijambo Physiocracy rikomoka hehe?
answer: Bisobanura intwaro y’ibidukikije, ryakoreshejwe ubwa mbere nk’umutwe w’igitabu c’ingingo za Quesnay .
wrong_answers:
  - Bisobanura "urukundo rw'ibidukikije", ni ryo zina ryafashwe n'umugwi w'abahinga mu vy'uburimyi basa n'abagira bahinduke abahinga mu vy'ubutunzi vuba cane.
  - Izina ryahawe n’Abagiriki kugira ngo bavuge politike y’ubutunzi, ryafashwe na Quesnay kugira ngo bite izina ubuhinga bushasha bw’ubutunzi .
  - Iri jambo ryashizweho na Voltaire kugira ngo atwenge ivyiyumviro vya Quesnay .
explanation: |
  Ijambo "Physiocracy" risobanura "intwaro y'ibidukikije" kandi ryakoreshejwe na Quesnay mu kwerekana inyigisho yiwe y'ubutunzi, iyo nyigisho yashimika ku kamaro k'uburimyi n'urutonde rw'ibidukikije.
reviewed: true

question: Fizyokrasi terimi nereden geliyor?
answer: Doğa yönetimi anlamına gelen bu kavram ilk olarak Quesnay tarafından bir makale derlemesinin başlığı olarak kullanılmıştır
wrong_answers:
  - Doğa sevgisi anlamına gelen bu isim, kısa süre sonra ekonomist olacak olan bir grup tarım uzmanı tarafından benimsenmiştir
  - Yunanlılar tarafından ekonomi politikasını tanımlamak için verilen bu isim, Quesnay tarafından yeni ekonomi bilimini adlandırmak için benimsenmiştir
  - Bu terim Voltaire tarafından Quesnay'in fikirleriyle alay etmek için ortaya atılmıştır
explanation: |
  "Fizyokrasi" terimi "doğa yönetimi" anlamına gelir ve Quesnay tarafından tarımın ve doğal düzenin önemini vurgulayan ekonomik doktrinini belirtmek için kullanılmıştır.

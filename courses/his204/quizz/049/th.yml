question: คำว่า Physiocracy มาจากไหน?
answer: หมายถึงรัฐบาลของธรรมชาติ มันถูกใช้ครั้งแรกเป็นชื่อของคอลเลกชันบทความโดย Quesnay
wrong_answers:
  - หมายถึงความรักในธรรมชาติ มันเป็นชื่อที่ถูกนำมาใช้โดยกลุ่มนักเกษตรศาสตร์ที่ในไม่ช้าจะกลายเป็นนักเศรษฐศาสตร์
  - ชื่อที่ชาวกรีกตั้งขึ้นเพื่อกำหนดนโยบายเศรษฐกิจ มันถูกนำมาใช้โดย Quesnay เพื่อเรียกวิทยาศาสตร์ใหม่ของเศรษฐศาสตร์
  - คำนี้ถูกบัญญัติโดยโวลแตร์เพื่อเยาะเย้ยแนวคิดของเกซเน่
explanation: |
  คำว่า "Physiocracy" หมายถึง "การปกครองของธรรมชาติ" และถูกใช้โดย Quesnay เพื่อกำหนดหลักเศรษฐศาสตร์ของเขา ซึ่งเน้นความสำคัญของการเกษตรและระเบียบธรรมชาติ
question: Waar komt de term Fysiocratie vandaan?
answer: Het betekent 'regering van de natuur' en werd voor het eerst gebruikt als titel van een verzameling artikelen van Quesnay
wrong_answers:
  - Het betekent "liefde voor de natuur" en was de naam die werd aangenomen door een groep landbouwkundigen die al snel economen zouden worden
  - Een naam die door de Grieken werd gegeven om economisch beleid aan te duiden en die door Quesnay werd gebruikt om de nieuwe economische wetenschap een naam te geven
  - Deze term werd bedacht door Voltaire om de spot te drijven met Quesnay's ideeën
explanation: |
  De term "Fysiocratie" betekent "regering van de natuur" en werd door Quesnay gebruikt om zijn economische doctrine aan te duiden, die het belang van landbouw en de natuurlijke orde benadrukte.
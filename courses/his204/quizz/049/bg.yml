question: Откъде идва терминът "физиокрация"?
answer: Означава управление на природата и за първи път е използвано като заглавие на сборник статии от Кеснай
wrong_answers:
  - Това име, което означава любов към природата, е възприето от група агрономи, които скоро стават икономисти
  - Названието е дадено от гърците за обозначаване на икономическата политика и е възприето от Кеснай за наименование на новата икономическа наука
  - Този термин е въведен от Волтер, за да осмее идеите на Кесне
explanation: |
  Терминът "физиокрация" означава "управление на природата" и е използван от Кеснай за обозначаване на неговата икономическа доктрина, която подчертава значението на земеделието и естествения ред.
question: Where does the term Physiocracy come from?
answer: Meaning government of nature, it was first used as the title of a collection of articles by Quesnay
wrong_answers:
  - Meaning love of nature, it was the name adopted by a group of agronomists who were soon to become economists
  - A name given by the Greeks to designate economic policy, it was taken up by Quesnay to name the new science of economics
  - This term was coined by Voltaire to mock Quesnay's ideas
explanation: |
  The term "Physiocracy" means "government of nature" and was used by Quesnay to designate his economic doctrine, which emphasized the importance of agriculture and the natural order.

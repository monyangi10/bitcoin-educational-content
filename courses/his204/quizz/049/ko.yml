question: 피지오크라시라는 용어는 어디에서 유래했나요?
answer: 자연의 정부라는 뜻으로, 퀘스네의 글 모음집 제목으로 처음 사용되었습니다
wrong_answers:
  - '자연에 대한 사랑'이라는 뜻의 이 이름은 곧 경제학자가 될 한 그룹의 농학자들에 의해 채택된 이름입니다
  - 그리스인들이 경제 정책을 지칭하기 위해 붙인 이 이름은 퀘스네가 새로운 경제학의 이름을 짓기 위해 사용했습니다
  - 이 용어는 볼테르가 퀘네의 사상을 조롱하기 위해 만든 용어입니다
explanation: |
  "피지오크라시"라는 용어는 "자연의 정부"라는 뜻으로, 퀘스네가 농업과 자연 질서의 중요성을 강조한 그의 경제 교리를 지칭하는 데 사용했습니다.
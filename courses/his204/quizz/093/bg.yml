question: Каква е причината за неуспеха на Турго, която Кондорсе изтъква?
answer: Той беше твърде абсолютен в принципите си
wrong_answers:
  - Беше твърде неумел в политическите маневри
  - Физическата му конституция е твърде слаба
  - Той беше твърде млад
explanation: |
  Кондорсе смята, че Турго е твърде твърд в принципите си и не желае да прави компромиси.
reviewed: true

question: Condorcet, Turgot'nun başarısızlığı için hangi nedeni göstermiştir?
answer: Prensiplerinde çok katıydı
wrong_answers:
  - Siyasi manevralar konusunda çok yeteneksizdi
  - Fiziksel yapısı çok zayıftı
  - O çok gençti
explanation: |
  Condorcet, Turgot'nun ilkelerinde çok katı ve uzlaşmaya isteksiz olduğunu düşünüyordu.
question: Ni imvo iyihe Condorcet yatanze mu gusiogura ukunanirwa kwae Turgot?
answer: Yari umuntu ahagarira cane ingingo ngenerwako ziwe .
wrong_answers:
  - Yari atagira ubuhinga bwinshi cane mu bijanye no gukoresha politike .
  - Uko umubiri wiwe wari wubatse ntiyari akomeye cane .
  - Yari muto cane
explanation: |
  Condorcet yumvise ko Turgot akaze cane mu ngingo ngenderwako ziwe kandi ko atashaka kuvuguruzwa.
reviewed: true

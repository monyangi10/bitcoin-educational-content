question: เหตุผลอะไรที่ Condorcet ให้สำหรับความล้มเหลวของ Turgot?
answer: เขายึดมั่นในหลักการของเขามากเกินไป
wrong_answers:
  - เขาขาดทักษะในการเคลื่อนไหวทางการเมือง
  - ร่างกายของเขาอ่อนแอเกินไป
  - เขายังเด็กเกินไป
explanation: |
  Condorcet รู้สึกว่า Turgot มีหลักการที่เข้มงวดเกินไปและไม่เต็มใจที่จะประนีประนอม
question: Welke reden gaf Condorcet voor het falen van Turgot?
answer: Hij was te absoluut in zijn principes
wrong_answers:
  - Hij was te ongeschoold in politiek gemanoeuvreer
  - Zijn fysieke gesteldheid was te zwak
  - Hij was te jong
explanation: |
  Condorcet vond dat Turgot te star was in zijn principes en niet bereid was tot compromissen.
question: Welke kritiek uitte Quesnay op zijn discipelen?
answer: Hun sektarische aard
wrong_answers:
  - Hun buitensporige liberalisme
  - Hun zelfgenoegzaamheid met de macht van Louis XV
  - Hun gebrek aan wetenschappelijke nauwkeurigheid
explanation: |
  Quesnay bekritiseerde zijn volgelingen om hun sektarisme en gebrek aan openheid voor andere ideeën. Hij vreesde dat hun dogmatisme de verspreiding van de fysiocratie in de weg zou staan.
question: คำวิจารณ์ที่ Quesnay มีต่อศิษย์ของเขาคืออะไร?
answer: ลักษณะนิกายของพวกเขา
wrong_answers:
  - ลัทธิเสรีนิยมที่มากเกินไปของพวกเขา
  - ความพึงพอใจของพวกเขากับอำนาจของหลุยส์ที่ 15
  - การขาดความเข้มงวดทางวิทยาศาสตร์ของพวกเขา
explanation: |
  Quesnay วิจารณ์ผู้ติดตามของเขาเกี่ยวกับความเป็นนิกายและการขาดความเปิดกว้างต่อแนวคิดอื่น ๆ เขากลัวว่าความเชื่อมั่นที่แข็งกร้าวของพวกเขาจะขัดขวางการแพร่กระจายของลัทธิฟิสิโอเครซี
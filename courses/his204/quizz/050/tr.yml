question: Quesnay öğrencilerine hangi eleştirileri yöneltti?
answer: Mezhepçi yapıları
wrong_answers:
  - Aşırı liberalizmleri
  - Louis'nin gücünden duydukları hoşnutluk
  - Bilimsel titizlikten yoksun olmaları
explanation: |
  Quesnay, takipçilerini mezhepçilikleri ve diğer fikirlere açık olmamaları nedeniyle eleştirmiştir. Onların dogmatizminin fizyokrasinin yayılmasını engelleyeceğinden korkuyordu.
question: Каква критика отправя Кене към своите ученици?
answer: Сектантският им характер
wrong_answers:
  - Техният прекомерен либерализъм
  - Доволството им от властта на Луи XV
  - Липсата на научна строгост в тях
explanation: |
  Кене критикува последователите си за сектантството и липсата на отвореност към други идеи. Той се опасява, че техният догматизъм ще попречи на разпространението на физиокрацията.
reviewed: true

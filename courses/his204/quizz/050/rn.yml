question: Ni ibiki Quesnay yaneguye abigishwa biwe?
answer: Kamere yabo y’amadini .
wrong_answers:
  - Ukwidegemvya kwabo birenze urugero .
  - Ukwishimira kwabo ububasha bwa Louis XV .
  - Kubura uburindutsi bwabo mu vya siyansi .
explanation: |
  Quesnay yaraneguye abayoboke biwe kubera ko bari bafise amacakubiri be n’uko batakunda ibindi vyiyumviro. Yaratinya yuko inyigisho zabo zotuma ubutegetsi bw’abanyagihugu butakwiragira.
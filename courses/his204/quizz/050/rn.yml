question: Ni ibiki Quesnay yaneguye abigishwa biwe?
answer: Kamere k'igisata bakoreramwo .
wrong_answers:
  - Ukwidegemvya kwabo birenze urugero .
  - Ukwishimira kwabo kw'intwaro ya Louis XV .
  - Kubura ijunja muri siyansi .
explanation: |
  Quesnay yaraneguye abayoboke biwe kubera ko bari bafise amacakubiri be n’uko batakunda ibindi vyiyumviro. Yaratinya yuko inyigisho zabo zotuma ubutegetsi bwa Physiocraticy budakwiragira.
reviewed: true

question: เหตุการณ์ใดที่เขาเป็นร่วมสมัยซึ่งเป็นแรงบันดาลใจให้กับทฤษฎีเศรษฐศาสตร์ของ Cantillon?
answer: ความล้มเหลวของระบบของจอห์น ลอว์
wrong_answers:
  - วิกฤตเศรษฐกิจครั้งใหญ่ในปี 1705-1707
  - สงครามระหว่างฝรั่งเศสและฮอลแลนด์
  - การปฏิวัติอังกฤษ
explanation: |
  Cantillon ได้เห็นการล่มสลายของระบบของ Law และวิเคราะห์สาเหตุและผลกระทบใน "Essai sur la nature du commerce en général" เหตุการณ์นี้มีอิทธิพลอย่างลึกซึ้งต่อความคิดทางเศรษฐศาสตร์ของเขาและความเข้าใจเกี่ยวกับปรากฏการณ์ทางการเงิน
question: Ni igiki cabaye yari mu gihe caco catumye Cantillon agira inyigisho y’ubutunzi?
answer: Ukunanirwa kw’urutonde rwa John Law
wrong_answers:
  - Ico kibazo gikomeye c’ubutunzi co mu 1705-1707
  - Intambara hagati y'Ubufaransa n'Ubuholandi .
  - Impinduka y'Abongereza
explanation: |
  Cantillon yarabonye ukuntu uburyo bw'amategeko bwasenyutse, aca asesangura imvo n'ingaruka zabwo mu gitabu ciwe citwa "Essai sur la nature du commerce en général". Ico kintu cabaye caragize ico gikoze cane ku vyiyumviro vyiwe vy’ubutunzi no ku kuntu yatahura ibintu vy’amahera.
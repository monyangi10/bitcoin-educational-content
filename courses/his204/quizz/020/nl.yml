question: Wat was de gebeurtenis die Cantillons economische theorie inspireerde?
answer: Het falen van het systeem van John Law
wrong_answers:
  - De grote economische crisis van 1705-1707
  - De oorlog tussen Frankrijk en Nederland
  - De Engelse revolutie
explanation: |
  Cantillon was getuige van de ineenstorting van het systeem van Law en analyseerde de oorzaken en gevolgen in zijn "Essai sur la nature du commerce en général". Deze gebeurtenis beïnvloedde zijn economische denken en zijn begrip van monetaire fenomenen diepgaand.
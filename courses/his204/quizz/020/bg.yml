question: Кое е събитието, на което той е бил съвременник и което е вдъхновило икономическата теория на Кантийон?
answer: Провалът на системата на Джон Лоу
wrong_answers:
  - Голямата икономическа криза от 1705-1707 г
  - Войната между Франция и Холандия
  - Английската революция
explanation: |
  Кантийон става свидетел на краха на системата на Лоу и анализира причините и последиците от него в своя труд "Essai sur la nature du commerce en général". Това събитие оказва дълбоко влияние върху икономическото му мислене и разбирането му за паричните явления.
reviewed: true

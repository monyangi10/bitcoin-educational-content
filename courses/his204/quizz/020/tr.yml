question: Cantillon'un ekonomi teorisine ilham veren ve çağdaşı olduğu olay neydi?
answer: John Law'ın sisteminin başarısızlığı
wrong_answers:
  - 1705-1707 yılları arasındaki büyük ekonomik kriz
  - Fransa ve Hollanda arasındaki savaş
  - İngiliz Devrimi
explanation: |
  Cantillon, Law sisteminin çöküşüne tanık olmuş ve bunun nedenlerini ve sonuçlarını "Essai sur la nature du commerce en général" adlı eserinde analiz etmiştir. Bu olay onun ekonomik düşüncesini ve parasal olgulara ilişkin anlayışını derinden etkilemiştir.
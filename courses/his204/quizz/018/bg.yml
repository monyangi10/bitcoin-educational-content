question: Какво представляват ефектите на Кантийон?
answer: Увеличаването на количеството пари в дадена страна влияе върху разпределението на доходите
wrong_answers:
  - Увеличаването на количеството пари оказва влияние върху поведението на хората
  - Увеличаването на количеството пари оказва влияние върху размера на публичния дълг
  - Увеличаването на количеството пари няма значителен ефект
explanation: |
  Ефектът на Кантийон описва как увеличаването на паричното предлагане влияе по различен начин върху цените и доходите в различните сектори на икономиката. Вливането на нови пари не се разпределя равномерно, което води до изкривявания и неравенства.
reviewed: true

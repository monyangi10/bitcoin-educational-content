question: Wat zijn Cantilloneffecten?
answer: Het verhogen van de hoeveelheid geld in een land beïnvloedt de inkomensverdeling
wrong_answers:
  - Het verhogen van de hoeveelheid geld heeft invloed op het gedrag van mensen
  - Het verhogen van de hoeveelheid geld heeft invloed op de hoogte van de staatsschuld
  - Het verhogen van de hoeveelheid geld heeft geen significant effect
explanation: |
  Cantillon-effecten beschrijven hoe een stijging van de geldhoeveelheid Supply een verschillend effect heeft op prijzen en inkomens in verschillende sectoren van de economie. De injectie van nieuw geld wordt niet gelijkmatig verdeeld, waardoor verstoringen en ongelijkheden ontstaan.
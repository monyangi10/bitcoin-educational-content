question: ผลกระทบแคนทิลลอนคืออะไร?
answer: การเพิ่มปริมาณเงินในประเทศส่งผลต่อการกระจายรายได้
wrong_answers:
  - การเพิ่มปริมาณเงินมีผลกระทบต่อพฤติกรรมของผู้คน
  - การเพิ่มปริมาณเงินมีผลกระทบต่อจำนวนหนี้สาธารณะ
  - การเพิ่มปริมาณเงินไม่มีผลกระทบอย่างมีนัยสำคัญ
explanation: |
  ผลกระทบของ Cantillon อธิบายถึงวิธีที่การเพิ่มขึ้นของปริมาณเงินส่งผลกระทบต่อราคาและรายได้ในภาคส่วนต่าง ๆ ของเศรษฐกิจแตกต่างกัน การฉีดเงินใหม่ไม่ได้กระจายอย่างสม่ำเสมอ ทำให้เกิดความบิดเบือนและความไม่เท่าเทียมกัน
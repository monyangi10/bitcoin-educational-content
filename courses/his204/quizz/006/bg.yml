question: Кога Вобан за първи път предлага данъчна реформа?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Вобан, маршал на Франция и военен инженер, предлага данъчна реформа през 1695 г., известна като "Dîme Royale". Това предложение има за цел да опрости данъчната система и да разпредели по-справедливо данъчната тежест.
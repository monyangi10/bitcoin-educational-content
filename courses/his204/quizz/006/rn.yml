question: Ni ryari Vauban yatanguye gusaba ko habaho ivugurura ry’imisoro?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, umukuru w'ingabo z'Ubufaransa akaba n'umuhinga mu vy'igisirikare, yasavye ko habaho ivugurura ry'imisoro mu 1695, ryitwa "Dîme Royale". Ico ciyumviro cari kigamije kworohereza uburyo bwo gutanga imisoro no gusangira umuzigo w’imisoro mu buryo bubereye.
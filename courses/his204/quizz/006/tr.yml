question: Vauban ilk kez ne zaman vergi reformu önerdi?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Fransa mareşali ve askeri mühendis Vauban, 1695 yılında "Dîme Royale" olarak bilinen bir vergi reformu önerdi. Bu öneri vergi sistemini basitleştirmeyi ve vergi yükünü daha adil bir şekilde dağıtmayı amaçlıyordu.
question: Wanneer stelde Vauban voor het eerst een belastinghervorming voor?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  Vauban, maarschalk van Frankrijk en militair ingenieur, stelde in 1695 een belastinghervorming voor die bekend stond als de "Dîme Royale". Dit voorstel had als doel het belastingstelsel te vereenvoudigen en de belastingdruk eerlijker te verdelen.
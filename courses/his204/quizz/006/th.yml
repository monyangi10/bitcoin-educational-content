question: Vauban เสนอการปฏิรูประบบภาษีครั้งแรกเมื่อใด?
answer: 1695
wrong_answers:
  - 1693
  - 1697
  - 1700
explanation: |
  โวบัง, จอมพลแห่งฝรั่งเศสและวิศวกรทหาร, ได้เสนอการปฏิรูปภาษีในปี 1695 ซึ่งรู้จักกันในชื่อ "Dîme Royale" ข้อเสนอนี้มีเป้าหมายเพื่อทำให้ระบบภาษีง่ายขึ้นและกระจายภาระภาษีอย่างเท่าเทียมมากขึ้น
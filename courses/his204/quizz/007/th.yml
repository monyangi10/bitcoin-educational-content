question: ทำไมระบบภาษีของ Ancien Régime ถึงถูกอธิบายว่าเป็น "การขาดแรงจูงใจ"?
answer: เพราะว่าชายที่เพิ่งร่ำรวยอาจพบว่าตนเองถูกเก็บภาษีสองเท่าในปีถัดไป
wrong_answers:
  - เนื่องจากความซับซ้อนของมันทำให้เจ้าหน้าที่ภาษีไม่อยากเก็บภาษี
  - เพราะความอ่อนโยนของมันทำให้ชาวฝรั่งเศสไม่หนีไปต่างประเทศ
  - เพราะว่ามันง่ายเกินไปและคาดเดาได้
explanation: |
  การเก็บภาษีภายใต้ระบอบ Ancien Régime มักจะเป็นไปอย่างตามอำเภอใจและคาดเดาไม่ได้ การขาดกฎเกณฑ์ที่ชัดเจนและความเป็นไปได้ที่จะถูกเก็บภาษีเกินไปทำให้การลงทุนและการเพิ่มพูนทรัพย์สินถูกขัดขวาง เนื่องจากผลกำไรอาจถูกยึดโดยการเก็บภาษี
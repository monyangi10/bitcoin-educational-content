question: Waarom wordt het belastingstelsel van het Ancien Régime beschreven als "ontmoedigend"?
answer: Omdat een nauwelijks verrijkt man het volgende jaar twee keer belasting zou kunnen betalen
wrong_answers:
  - Omdat de complexiteit ervan belastingagenten ontmoedigde om belastingen te innen
  - Omdat zijn mildheid Fransen ontmoedigde om naar het buitenland te vluchten
  - Omdat het te simpel en voorspelbaar was
explanation: |
  Belastingheffing onder het Ancien Régime was vaak willekeurig en onvoorspelbaar. De afwezigheid van duidelijke regels en de mogelijkheid om te zwaar belast te worden, ontmoedigden investeringen en verrijking, omdat winsten door de belasting in beslag konden worden genomen.
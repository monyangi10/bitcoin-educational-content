question: Pourquoi la fiscalité d’Ancien Régime est qualifiée de « désincitative » ?
answer: Parce qu’un homme à peine enrichi pouvait se voir taxé doublement l’année suivante
wrong_answers:
  - Parce que sa complexité désincitait les agents du fisc de collecter l’impôt
  - Parce que sa douceur désincitait les Français à s’enfuir à l’étranger
  - Parce qu'elle était trop simple et prévisible
explanation: |
  La fiscalité sous l'Ancien Régime était souvent arbitraire et imprévisible. L'absence de règles claires et la possibilité d'être taxé de manière excessive décourageaient l'investissement et l'enrichissement, car les gains pouvaient être confisqués par l'impôt.

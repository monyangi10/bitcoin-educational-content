question: Защо данъчната система на Стария режим е описана като "демотивираща"?
answer: Защото един едва забогатял човек може да се окаже обложен два пъти през следващата година
wrong_answers:
  - Тъй като сложността му възпира данъчните служители да събират данъци
  - Защото мекотата му възпира французите да бягат в чужбина
  - Защото беше твърде проста и предсказуема
explanation: |
  Данъчното облагане по време на Стария режим често е било произволно и непредвидимо. Липсата на ясни правила и възможността за свръхоблагане обезкуражават инвестициите и обогатяването, тъй като печалбите могат да бъдат конфискувани чрез данъчно облагане.
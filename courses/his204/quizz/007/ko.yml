question: 앙시앵 레짐 세금 제도가 "인센티브가 없는" 이유는 무엇인가요?
answer: 간신히 부유한 사람이 다음 해에 두 번이나 세금이 부과될 수 있기 때문입니다
wrong_answers:
  - 복잡성으로 인해 세무 대리인이 세금 징수를 꺼려했기 때문입니다
  - 그 온화함으로 인해 프랑스인들이 해외로 탈출하는 것을 막았기 때문입니다
  - 너무 단순하고 예측 가능했기 때문입니다
explanation: |
  고대 정권 하의 과세는 종종 자의적이고 예측할 수 없는 경우가 많았습니다. 명확한 규칙이 없고 과세가 과도하게 부과될 가능성이 있었기 때문에 과세로 인한 이익이 몰수될 수 있어 투자와 부의 창출이 저해되었습니다.
question: Ni kuki uburyo bwo gutanga imisoro bwa Ancien Régime buvugwa ko ari "ubutera intege"?
answer: Kubera ko umuntu yari atunze bike cane, yari gushobora kwisanga ariko arasoreshwa incuro zibiri mu mwaka ukurikira .
wrong_answers:
  - Kubera ko ukuntu ryari rigoye cane vyatuma abakozi b’imisoro badashobora gutora imisoro .
  - Kubera ko ubugwaneza bwayo bwaciye intege Abafaransa ngo bahungire mu mahanga .
  - Kubera ko vyari vyoroshe cane kandi bishobora kumenyekana .
explanation: |
  Imisoro mu gihe c’Ubutegetsi bwa kera akenshi yari iy’ubujuju kandi idashobora kumenyekana. Kuba ata mategeko atomoye yariho be n’uko umuntu yoshobora gukorwako imisoro irenze urugero vyatuma abantu badashobora gushiramwo amahera no gutunga, kuko inyungu zashobora gufatwa n’imisoro.
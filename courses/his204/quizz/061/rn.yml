question: Ni kubera iki amaherezo ugushira mu ngiro ivyiyumviro vy’ubutegetsi bw’umubiri mu Budagi vyahagaritswe?
answer: Abakozi ba Leta bariho ntibashaka .
wrong_answers:
  - Abanyagihugu ntibari bashigikiye cane
  - Margrave wa Baden, mu ntango yari umuyoboke wa Physiocracy, amaherezo yarahevye gushigikira .
  - Ikirere nticari ciza ku burimyi .
explanation: |
  Kurwanywa n’abakozi ba Leta bari ku butegetsi, bifatanye n’agateka kabo be n’ingeso zabo, vyatumye ivyiyumviro vy’ubutegetsi bw’igihugu bidashirwa mu ngiro mu Budagi. Batinya ko ivyo bihinduka vyari biteguwe vyotuma ububasha bwabo n’ububasha bwabo bitera ingorane.
question: Ni kubera iki ugushira mu ngiro ivyiyumviro vy’aba Physiocrats mu Budagi vyahebwe?
answer: Abakozi ba Leta bariho ntibashaka .
wrong_answers:
  - Abanyagihugu ntibari bashigikiye cane
  - The Margrave of Baden, mu ntango yari umuyoboke wa Physiocracy, amaherezo yarahevye kubashigikira .
  - Ikirere nticari ciza ku burimyi .
explanation: |
  Kurwanywa n’abakozi ba Leta bari ku butegetsi, bifatanye n’agateka kabo be n’ingeso zabo, vyatumye ivyiyumviro vy’ubutegetsi bw’igihugu bidashirwa mu ngiro mu Budagi. Batinya ko ivyo bihinduka vyari biteguwe vyotuma ububasha bwabo buhura n'ingorane.
reviewed: true

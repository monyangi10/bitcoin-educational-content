question: Waarom werd de toepassing van fysiocratische ideeën in Duitsland uiteindelijk afgebroken?
answer: Bestaande ambtenaren waren terughoudend
wrong_answers:
  - De bevolking was niet erg ondersteunend
  - De markgraaf van Baden, aanvankelijk een aanhanger van de fysiocratie, trok uiteindelijk zijn steun in
  - Het klimaat was niet bevorderlijk voor landbouw
explanation: |
  Tegenwerking van zittende ambtenaren, die gehecht waren aan hun privileges en gewoonten, verhinderde de toepassing van fysiocratische ideeën in Duitsland. Ze vreesden dat de voorgestelde hervormingen hun macht en invloed in gevaar zouden brengen.
question: Fizyokratik fikirlerin Almanya'da uygulanmasına neden son verildi?
answer: Mevcut kamu görevlileri isteksizdi
wrong_answers:
  - Nüfus çok destekleyici değildi
  - Başlangıçta Fizyokrasi taraftarı olan Baden Margrave'i sonunda desteğini geri çekti
  - İklim tarıma elverişli değildi
explanation: |
  Ayrıcalıklarına ve alışkanlıklarına bağlı olan görevdeki memurların muhalefeti, fizyokratik fikirlerin Almanya'da uygulanmasını engelledi. Önerilen reformların kendi güç ve nüfuzlarına meydan okuyacağından korkuyorlardı.
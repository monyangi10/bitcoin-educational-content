question: ทำไมการประยุกต์ใช้แนวคิดฟิสิโอแครตในเยอรมนีจึงถูกยกเลิกในที่สุด?
answer: ข้าราชการที่มีอยู่แล้วลังเลใจ
wrong_answers:
  - ประชากรไม่ได้ให้การสนับสนุนมากนัก
  - มาร์เกรฟแห่งบาเดน ซึ่งในตอนแรกเป็นผู้สนับสนุนฟิสิโอเครซี ในที่สุดก็ถอนการสนับสนุนของเขา
  - สภาพภูมิอากาศไม่เอื้อต่อการเกษตร
explanation: |
  การคัดค้านจากข้าราชการประจำที่ยึดติดกับสิทธิพิเศษและนิสัยของตนเอง ได้ขัดขวางการนำแนวคิดฟิสิโอเครติกมาใช้ในเยอรมนี พวกเขากลัวว่าการปฏิรูปที่เสนอจะท้าทายอำนาจและอิทธิพลของพวกเขา
question: Защо в крайна сметка прилагането на физиократичните идеи в Германия е прекратено?
answer: Съществуващите държавни служители не бяха съгласни
wrong_answers:
  - Населението не беше много благосклонно
  - Маркграфът на Баден, който първоначално е привърженик на физиокрацията, в крайна сметка оттегля подкрепата си
  - Климатът не е бил благоприятен за земеделие
explanation: |
  Противопоставянето на действащите държавни служители, привързани към своите привилегии и навици, възпрепятства прилагането на физиократичните идеи в Германия. Те се опасяваха, че предложените реформи ще поставят под въпрос тяхната власт и влияние.
reviewed: true

question: Op welke vraag kreeg Turgot de steun van Diderot?
answer: Vrijheid van werk en de afschaffing van gilden
wrong_answers:
  - Vrijheid van graanhandel
  - Vrijheid van rentedragende leningen
  - Onderwijshervorming
explanation: |
  Diderot steunde Turgot op het gebied van de vrijheid van arbeid en de afschaffing van gilden, omdat hij geloofde dat deze maatregelen nodig waren om de economie te stimuleren en sociale vooruitgang te bevorderen.
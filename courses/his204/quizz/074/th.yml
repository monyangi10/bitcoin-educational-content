question: ในคำถามใดที่ Turgot ได้รับการสนับสนุนจาก Diderot?
answer: เสรีภาพในการทำงานและการยกเลิกสมาคมช่างฝีมือ
wrong_answers:
  - เสรีภาพในการค้าธัญพืช
  - เสรีภาพของเงินกู้ที่มีดอกเบี้ย
  - การปฏิรูปการศึกษา
explanation: |
  Diderot สนับสนุน Turgot ในประเด็นเสรีภาพในการทำงานและการยกเลิกสมาคมช่างฝีมือ โดยเชื่อว่ามาตรการเหล่านี้จำเป็นต่อการกระตุ้นเศรษฐกิจและส่งเสริมความก้าวหน้าทางสังคม
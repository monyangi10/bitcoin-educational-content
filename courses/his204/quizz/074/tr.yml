question: Turgot hangi konuda Diderot'nun desteğini almıştır?
answer: Çalışma özgürlüğü ve loncaların kaldırılması
wrong_answers:
  - Tahıl ticareti özgürlüğü
  - Faizli kredi özgürlüğü
  - Eğitim reformu
explanation: |
  Diderot, çalışma özgürlüğü ve loncaların kaldırılması konularında Turgot'yu desteklemiş ve bu önlemlerin ekonomiyi canlandırmak ve toplumsal ilerlemeyi teşvik etmek için gerekli olduğuna inanmıştır.
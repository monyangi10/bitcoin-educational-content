question: По кой въпрос Турго е получил подкрепата на Дидро?
answer: Свобода на труда и премахване на гилдиите
wrong_answers:
  - Свобода на търговията със зърно
  - Свобода от лихвоносни заеми
  - Образователна реформа
explanation: |
  Дидро подкрепя Турго по въпроса за свободата на труда и премахването на гилдиите, като смята, че тези мерки са необходими за стимулиране на икономиката и насърчаване на социалния прогрес.
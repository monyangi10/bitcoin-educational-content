question: Ni ikihe kibazo Turgot yaronse infashanyo ya Diderot?
answer: Umwidegemvyo wo gukora no gukuraho amashirahamwe
wrong_answers:
  - Umwidegemvyo w'ubudandaji bw'intete
  - Umwidegemvyo wo gutanga inguzanyo zifise inyungu
  - Ivugurura ry'uburezi
explanation: |
  Diderot yarashigikiye Turgot ku kibazo c’umwidegemvyo wo gukora no gukuraho amashirahamwe y’abakozi, yiyumvira ko izo ngingo zari zikenewe kugira ngo ubutunzi butere imbere kandi abantu batere imbere.
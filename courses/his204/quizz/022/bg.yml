question: Кой философ е предшественик на абат дьо Сен-Пиер с неговия Проект за вечен мир?
answer: Емануел Кант
wrong_answers:
  - Джереми Бентъм
  - Жан-Жак Русо
  - Барух Спиноза
explanation: |
  Проектът за вечен мир на абат дьо Сен-Пиер се смята за предшественик на идеите на Имануел Кант за всеобщия мир. И двамата мислители се застъпват за създаването на международна организация, която да може да гарантира мира между народите.
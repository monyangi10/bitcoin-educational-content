question: Van welke filosoof verschijnt de abbé de Saint-Pierre als voorloper met zijn Project voor Eeuwigdurende Vrede?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Het Project voor Eeuwigdurende Vrede van Abbé de Saint-Pierre wordt beschouwd als een voorloper van de ideeën van Immanuel Kant over universele vrede. Beide denkers pleitten voor de oprichting van een internationale organisatie die de vrede tussen naties kon garanderen.
question: Ni uwuhe munyabwenge(w'umufirozofe) abbé de Saint-Pierre aboneka nk’intango y’umugambi wiwe w’amahoro ahoraho?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Umugambi wa Abbé de Saint-Pierre wo kurondera amahoro ahoraho ubonwa ko ari wo wari intango y’ivyiyumviro vya Immanuel Kant ku bijanye n’amahoro kw’isi yose. Abo biyumvira bompi barashigikiye ko hashingwa ishirahamwe mpuzamakungu rishobora gutuma haba amahoro hagati y’ibihugu.
reviewed: true

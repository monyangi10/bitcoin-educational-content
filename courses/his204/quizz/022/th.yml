question: นักปรัชญาคนใดที่แอบเบ้ เดอ แซงต์-ปิแอร์ ดูเหมือนจะเป็นผู้บุกเบิกด้วยโครงการสันติภาพถาวรของเขา?
answer: เอ็มมานูเอล คานท์
wrong_answers:
  - เจเรมี เบนแธม
  - ฌอง-ฌาคส์ รูโซ
  - บารุค สปิโนซา
explanation: |
  โครงการเพื่อสันติภาพถาวรของ Abbé de Saint-Pierre ถือเป็นบรรพบุรุษของแนวคิดของ Immanuel Kant เกี่ยวกับสันติภาพสากล นักคิดทั้งสองสนับสนุนการสร้างองค์กรระหว่างประเทศที่สามารถรับประกันสันติภาพระหว่างประเทศได้
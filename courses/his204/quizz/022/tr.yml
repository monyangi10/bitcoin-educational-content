question: Abbé de Saint-Pierre, Ebedi Barış Projesi ile hangi filozofun öncüsü olarak ortaya çıkmaktadır?
answer: Emmanuel Kant
wrong_answers:
  - Jeremy Bentham
  - Jean-Jacques Rousseau
  - Baruch Spinoza
explanation: |
  Abbé de Saint-Pierre'in Sürekli Barış Projesi, Immanuel Kant'ın evrensel barışa ilişkin fikirlerinin öncüsü olarak kabul edilir. Her iki düşünür de uluslar arasında barışı garanti edebilecek uluslararası bir örgütün kurulmasını savunmuştur.
question: Corvée, de onbetaalde dwangarbeid die gebruikt werd om wegen aan te leggen, was het middelpunt van zijn hervormingen. Waar verving hij het door?
answer: Met een belasting in contanten
wrong_answers:
  - Belasting in natura (landbouwproducten)
  - Hij vervangt het door niets
  - Via een vrijwillig systeem
explanation: |
  Turgot verving de corvée, onbetaalde dwangarbeid, door een belasting in contanten, waardoor de last van de wegenbouw werd verdeeld en boeren van deze verplichting werden bevrijd.
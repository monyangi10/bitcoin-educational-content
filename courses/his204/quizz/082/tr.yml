question: Corvée, yani yol yapımında kullanılan ücretsiz zorla çalıştırma, reformlarının odak noktasıydı. Peki yerine ne koydu?
answer: Nakit vergi ile
wrong_answers:
  - Ayni vergi (tarımsal ürünler)
  - Hiçbir şeyle değiştirmiyor
  - Gönüllü bir sistem aracılığıyla
explanation: |
  Turgot, ücretsiz zorla çalıştırma anlamına gelen corvée'yi nakit vergiyle değiştirerek yol yapımının yükünü dağıtmış ve köylüleri bu yükümlülükten kurtarmıştır.
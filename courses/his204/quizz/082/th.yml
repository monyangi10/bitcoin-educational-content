question: Corvée, แรงงานบังคับที่ไม่ได้รับค่าจ้างซึ่งใช้ในการสร้างถนน เป็นจุดสนใจของการปฏิรูปของเขา เขาแทนที่มันด้วยอะไร?
answer: ด้วยภาษีเงินสด
wrong_answers:
  - ภาษีในรูปแบบสิ่งของ (ผลผลิตทางการเกษตร)
  - เขาแทนที่มันด้วยความว่างเปล่า
  - ผ่านระบบสมัครใจ
explanation: |
  Turgot แทนที่การเกณฑ์แรงงานที่ไม่ได้รับค่าจ้างด้วยภาษีเงินสด ซึ่งกระจายภาระของการก่อสร้างถนนและปลดปล่อยชาวนาจากภาระหน้าที่นี้
question: Corvée(ibikorwa vy'agahato), ni ukuvuga igikorwa c’agahato kitahembwa cakoreshwa mu kwubaka amabarabara, ni co cari ikintu nyamukuru yariko arahindura. None yarisubirije iki?
answer: N'amakori y'amahera
wrong_answers:
  - Amakori mu bintu (ibiva mu burimyi)
  - Abisuriza n'ubusa .
  - Biciye mu buryo bw’ubushake .
explanation: |
  Turgot yasubirije Ibikorwa vy'agahato bidehemba, n’amakori w’amahera, gutyo arakwiragiza umuzigo wo kwubaka amabarabara, abarimyi na bo barava muri ivyo bikorwa.
reviewed: true

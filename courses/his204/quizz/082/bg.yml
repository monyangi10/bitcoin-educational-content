question: Реформите на Турго се съсредоточават върху corvée - неплатен принудителен труд, използван за строителството на пътища. С какво го заменя?
answer: С паричен данък
wrong_answers:
  - Данък в натура (селскостопански продукти)
  - Той го заменя с нищо
  - Чрез доброволна система
explanation: |
  Турго заменя corvée, неплатения принудителен труд, с паричен данък, като по този начин разпределя тежестта на пътното строителство и освобождава селяните от това задължение.
reviewed: true

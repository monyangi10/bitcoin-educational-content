question: ทำไมการแต่งตั้งทูร์โกต์เป็นรัฐมนตรีว่าการกระทรวงทหารเรือถึงได้รับการต้อนรับด้วยความประหลาดใจ?
answer: Turgot ไม่ใช่ผู้เชี่ยวชาญที่ยอดเยี่ยมของกองทัพเรือ
wrong_answers:
  - Turgot มีศัตรูมากมายในกระทรวงนี้
  - Turgot ว่ายน้ำไม่เป็น
  - Turgot เป็นพลเรือน
explanation: |
  Turgot ไม่มีประสบการณ์ทางทะเล ซึ่งทำให้หลายคนประหลาดใจเมื่อเขาได้รับการแต่งตั้งให้ดำรงตำแหน่งนี้ แทนที่จะเป็นเช่นนั้น เขาคาดว่าจะได้รับการแต่งตั้งให้ดำรงตำแหน่งทางเศรษฐกิจหรือการเงิน
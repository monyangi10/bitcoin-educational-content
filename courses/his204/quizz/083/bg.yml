question: Защо назначаването на Турго за министър на флота е посрещнато с изненада?
answer: Турго не е голям познавач на флота
wrong_answers:
  - Турго има много врагове в това министерство
  - Турго не може да плува
  - Турго е гражданин
explanation: |
  Турго няма опит във флота, което изненадва мнозина, когато е назначен на този пост. Вместо това се очакваше той да бъде назначен на икономически или финансов пост.
reviewed: true

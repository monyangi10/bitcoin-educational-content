question: Waarom werd Turgots benoeming als minister van Marine met verbazing begroet?
answer: Turgot is geen groot kenner van de marine
wrong_answers:
  - Turgot heeft veel vijanden in dit ministerie
  - Turgot kan niet zwemmen
  - Turgot is een burger
explanation: |
  Turgot had geen marine-ervaring, wat velen verbaasde toen hij op deze post werd benoemd. In plaats daarvan werd verwacht dat hij een economische of financiële functie zou krijgen.
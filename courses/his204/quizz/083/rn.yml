question: Ni kubera iki igihe Turgot yashirwaho ngo abe umushikiranganji w’ingabo z’amazi, abantu bamutangaje?
answer: Turgot si umuhinga mu vy'ingabo z'amazi .
wrong_answers:
  - Turgot afise abansi benshi muri iki gikorwa .
  - Turgot ntashobora kwoga
  - Turgot ni umusivile
explanation: |
  Turgot nta bumenyi yari afise mu vy’ingabo zo mu mazi, ivyo bikaba vyatangaje benshi igihe yashirwa muri iyo nkuru. Ahubwo yari yitezwe ko ashingwa igikorwa co mu vy’ubutunzi canke mu vy’amahera.
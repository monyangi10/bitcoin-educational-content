question: Turgot'nun Donanma Bakanı olarak atanması neden şaşkınlıkla karşılandı?
answer: Turgot donanmanın büyük bir uzmanı değildir
wrong_answers:
  - Turgot'nun bu bakanlıkta birçok düşmanı var
  - Turgot yüzme bilmiyor
  - Turgot bir sivil
explanation: |
  Turgot'nun denizcilik deneyimi yoktu ve bu da göreve atandığında pek çok kişiyi şaşırtmıştı. Bunun yerine ekonomik ya da mali bir göreve atanması bekleniyordu.
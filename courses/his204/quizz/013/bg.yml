question: За какво упреква "добрите души"?
answer: Причиняване на мизерия чрез принуждаване на цените да бъдат винаги ниски
wrong_answers:
  - Подкрепа за селското стопанство за сметка на производството
  - Прекалено небрежно харчене на публични средства за подпомагане на бедните
  - Недостатъчна помощ за бедните
explanation: |
  Боагилбер критикува онези, които се стремят да поддържат изкуствено ниски цени, тъй като смята, че това обезкуражава производството, създава недостиг и в крайна сметка води до мизерия. Той смята, че цените трябва да се определят от пазара в зависимост от търсенето и предлагането.
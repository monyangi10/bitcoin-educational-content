question: Wat verwijt hij de "goede zielen"?
answer: Ellende veroorzaken door prijzen altijd laag te houden
wrong_answers:
  - De landbouw ondersteunen ten koste van de verwerkende industrie
  - Overheidsgeld te slordig besteden om de armen te steunen
  - De armen niet genoeg helpen
explanation: |
  Boisguilbert bekritiseerde diegenen die de prijzen kunstmatig laag wilden houden, omdat hij vond dat dit de productie ontmoedigde, tekorten creëerde en uiteindelijk ellende veroorzaakte. Hij geloofde dat prijzen door de markt bepaald moesten worden, volgens Supply en vraag.
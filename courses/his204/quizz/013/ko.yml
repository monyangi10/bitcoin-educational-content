question: 그는 '선한 영혼'을 무엇 때문에 비난하나요?
answer: 항상 낮은 가격을 강요하여 불행을 야기하는 행위
wrong_answers:
  - 제조업의 희생으로 농업 지원
  - 빈곤층 지원을 위한 공적 자금의 부주의한 지출
  - 빈곤층을 충분히 돕지 못함
explanation: |
  부아길베르는 가격을 인위적으로 낮게 유지하려는 사람들을 비판했는데, 이는 생산을 억제하고 공급 부족을 초래하며 궁극적으로 불행을 초래한다고 믿었습니다. 그는 가격은 Supply와 수요에 따라 시장에 의해 결정되어야 한다고 믿었습니다.
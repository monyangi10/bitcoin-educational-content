question: İyi ruhları ne için suçluyor?
answer: Fiyatları her zaman düşük olmaya zorlayarak sefalete neden olmak
wrong_answers:
  - İmalat pahasına tarımın desteklenmesi
  - Yoksulları desteklemek için kamu parasının çok dikkatsizce harcanması
  - Yoksullara yeterince yardım etmemek
explanation: |
  Boisguilbert, fiyatları yapay olarak düşük tutmaya çalışanları eleştirmiş, bunun üretimi caydırdığına, kıtlık yarattığına ve nihayetinde sefalete neden olduğuna inanmıştır. Fiyatların Supply ve talebe göre piyasa tarafından belirlenmesi gerektiğine inanıyordu.

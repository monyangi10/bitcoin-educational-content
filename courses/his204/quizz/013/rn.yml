question: None "imitima myiza" atuka iki?
answer: Guteza amagorwa mu guhatira ibiciro kwama biri hasi .
wrong_answers:
  - Gushigikira uburimyi ku giciro c'ubuhinga
  - Gukoresha amafranga ya Leta ataco yitwararika cane kugira ngo umuntu afashe abakene .
  - Kudafasha abakene bihagije .
explanation: |
  Boisguilbert yaraneguye abarondera kugumiza ibiciro hasi mu buryo bw’ubuhinga, yiyumvira ko ivyo vyaca intege umusaruro, bikazana ubukene, amaherezo bikazana amagorwa. Yarizera ko ibiciro bikwiye gushingwa n’isoko, hakurikijwe Supply n’ivyo abantu basaba.
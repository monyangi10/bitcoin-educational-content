question: เขาตำหนิ "วิญญาณที่ดี" เรื่องอะไร?
answer: การก่อให้เกิดความทุกข์โดยการบังคับให้ราคาต่ำอยู่เสมอ
wrong_answers:
  - สนับสนุนการเกษตรโดยเสียค่าใช้จ่ายของการผลิต
  - การใช้จ่ายเงินสาธารณะอย่างไม่ระมัดระวังเกินไปเพื่อสนับสนุนคนจน
  - ไม่ได้ช่วยเหลือคนจนมากพอ
explanation: |
  Boisguilbert วิพากษ์วิจารณ์ผู้ที่พยายามรักษาราคาให้ต่ำอย่างไม่เป็นธรรมชาติ โดยเชื่อว่าสิ่งนี้ทำให้การผลิตลดลง สร้างความขาดแคลน และในที่สุดก็นำไปสู่ความทุกข์ยาก เขาเชื่อว่าราคาควรถูกกำหนดโดยตลาด ตามอุปสงค์และอุปทาน
question: Срещу кой министър се противопоставя Кондорсе в своята защита на свободната търговия?
answer: Necker
wrong_answers:
  - Калон
  - Trudaine
  - Choiseul
explanation: |
  Кондорсе се противопоставя на Некер по въпроса за свободната търговия, защитавайки принципите на икономическия либерализъм.
question: Ni uwuhe mushikiranganji Condorcet yarwanya mu kuburanira ubudandaji bw’umwidegemvyo?
answer: Necker
wrong_answers:
  - Calonne
  - Trudaine
  - Choiseul
explanation: |
  Condorcet yarwanya Necker ku kibazo c’ubudandaji bw'umwidegemvyo, arwanira ingingo ngenderwako z’ubwigenge bw’ubutunzi.
reviewed: true

question: Wat beveelt La politique mercantiliste aan?
answer: export, om het ontvangen goud en zilver op te slaan als betaling
wrong_answers:
  - import, om buitenlandse goederen te vergaren
  - geen van beide, omdat handel steriel en zinloos is
  - balans tussen import en export
explanation: |
  Mercantilisme is een economische doctrine die staatsinterventie voorstaat om nationale verrijking te bevorderen. Het belangrijkste doel is om edelmetalen (goud en zilver) te accumuleren door een overschot op de handelsbalans te hebben, d.w.z. meer exporteren dan importeren.
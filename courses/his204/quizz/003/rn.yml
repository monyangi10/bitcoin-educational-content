question: Niki politike yo gutungisha leta biciye mu kwirundaniriza ubutunzi ihamagararira ?
answer: Gushora hanze, kugira ngo bashire hamwe inzahabu n’ifeza baronse mu kuriha .
wrong_answers:
  - Kugura ibiva hanze, kwirundanira ibicuruzwa vyo hanze
  - Si iki canke ikindi, ubudandaji bukaba ari ubusa kandi ata co bumaze .
  - Uburinganire hagati y'ibiva hanze n'ibirungikwa hanze
explanation: |
  Ubucuruzi ni inyigisho y’ubutunzi ivuga ko Leta igira ico ikoze kugira ngo igihugu gitunganye. Intumbero ihambaye ni ukwirundanira ivyuma vy’agaciro (inzahabu n’ifeza) mu gukoresha uburinganire bw’amasaranganya y’ubudandaji, ni ukuvuga kwohereza hanze ibintu vyinshi kuruta ivyo kwinjiza hanze.
reviewed: true

question: La politique mercantiliste แนะนำอะไร?
answer: ส่งออก, เพื่อกักตุนทองคำและเงินที่ได้รับในการชำระเงิน
wrong_answers:
  - นำเข้า เพื่อสะสมสินค้าต่างประเทศ
  - ไม่มีทั้งสองอย่าง การค้าเป็นสิ่งที่ไร้ประโยชน์และไร้จุดหมาย
  - สมดุลระหว่างการนำเข้าและการส่งออก
explanation: |
  ลัทธิพาณิชยนิยมเป็นหลักคำสอนทางเศรษฐกิจที่สนับสนุนการแทรกแซงของรัฐเพื่อส่งเสริมความมั่งคั่งของชาติ วัตถุประสงค์หลักคือการสะสมโลหะมีค่า (ทองคำและเงิน) โดยการดำเนินการให้เกิดดุลการค้าที่เกินดุล กล่าวคือ การส่งออกมากกว่าการนำเข้า
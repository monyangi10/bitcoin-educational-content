question: Какво препоръчва Меркантилистката политика?
answer: износ, да се трупат златото и среброто, получени като заплащане
wrong_answers:
  - внос, да се натрупват чуждестранни стоки
  - нито пък търговията е безплодна и безсмислена
  - баланс между вноса и износа
explanation: |
  Меркантилизмът е икономическа доктрина, която се застъпва за държавна намеса за насърчаване на националното обогатяване. Основната цел е натрупването на благородни метали (злато и сребро) чрез постигане на излишък в търговския баланс, т.е. износът да е по-голям от вноса.
reviewed: true

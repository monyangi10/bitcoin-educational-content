question: ตามที่แคนทิลลอน ลักษณะสำคัญของผู้ประกอบการคืออะไร?
answer: มันพัฒนาในความไม่แน่นอน
wrong_answers:
  - มันมีเมืองหลวง
  - เขาเป็นนักนวัตกรรม
  - เขามาจากครอบครัวที่ร่ำรวย
explanation: |
  Cantillon เน้นย้ำบทบาทของผู้ประกอบการในการเผชิญกับความไม่แน่นอนและความเสี่ยง ผู้ประกอบการคือผู้ที่ตัดสินใจในสภาพแวดล้อมที่ไม่แน่นอนและยอมรับผลที่ตามมาจากการเลือกของตน
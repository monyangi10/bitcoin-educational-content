question: Cantillon'a göre bir girişimcinin temel özelliği nedir?
answer: Belirsizlik içinde gelişir
wrong_answers:
  - Bir sermayesi var
  - O bir yenilikçi
  - Zengin bir aileden geliyor
explanation: |
  Cantillon, belirsizlik ve risk karşısında girişimcinin rolünü vurgulamaktadır. Girişimci, belirsiz bir ortamda karar veren ve seçimlerinin sonuçlarını üstlenen kişidir.
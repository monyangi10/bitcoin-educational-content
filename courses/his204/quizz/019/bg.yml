question: Според Кантильон коя е основната характеристика на предприемача?
answer: Развива се в несигурност
wrong_answers:
  - Той има столица
  - Той е новатор
  - Произхожда от богато семейство
explanation: |
  Кантильон подчертава ролята на предприемача в условията на несигурност и риск. Предприемачът е този, който взема решения в несигурна среда и поема последствията от своя избор.
question: Nk’uko Cantillon abivuga, ni igiki nyamukuru kiranga umudandaza?
answer: Bitera imbere mu kutamenya neza .
wrong_answers:
  - Ifise umurwa mukuru .
  - Ni umuhinguzi w'ibintu bishasha
  - Akomoka mu muryango w'abatunzi .
explanation: |
  Cantillon ashimika ku ruhara rw’umugwi w’abahinga mu gihe hari ukudakeka n’ingorane. Uwugira rwiyemezamirimo ni we afata ingingo mu kibanza kitamenyekana, akagira ingaruka z’ivyo ahisemwo.
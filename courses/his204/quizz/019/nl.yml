question: Wat is volgens Cantillon het belangrijkste kenmerk van een ondernemer?
answer: Het ontwikkelt zich in onzekerheid
wrong_answers:
  - Het heeft een hoofdstad
  - Hij is een vernieuwer
  - Hij komt uit een rijke familie
explanation: |
  Cantillon benadrukt de rol van de ondernemer in het licht van onzekerheid en risico. De ondernemer is degene die beslissingen neemt in een onzekere omgeving en de gevolgen van zijn of haar keuzes op zich neemt.
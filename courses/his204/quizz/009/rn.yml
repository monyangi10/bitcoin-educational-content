question: Tocqueville yaciriye gute urubanza ivyo Vauban yavuze ku bijanye n’ingene Ubufaransa bwari bumeze mu ntango z’ikinjana ca 18?
answer: Ivyo yavuze vyari biteye ubwoba ariko vyari bifise ishingiro.
wrong_answers:
  - Ivyo ni ukurenza urugero .
  - Yari umuntu w'umunyaruyeri
  - Bari barengeje urugero.
explanation: |
  Alexis de Tocqueville, mu gitabu ciwe « L’Ancien Régime et la Révolution », yarashimikiye akamaro k’ivyo Vauban yabonye ku bijanye n’imibabaro y’abantu n’ubusumbasumbane mu mibano mu Bufaransa mu ntango z’ikinjana ca 18. Yarumvise ko Vauban yari yarasize ishusho y’ukuri kandi iteye ubwoba y’ivyo bintu.
reviewed: true

question: Как Токвил оценява забележките на Вобан за състоянието на Франция в началото на XVIII век?
answer: Забележките му бяха плашещи, но основателни
wrong_answers:
  - Това са преувеличения
  - Той беше аутсайдер
  - Бяха напълно не на място
explanation: |
  Алексис дьо Токвил в книгата си "Старият режим и революцията" подчертава значимостта на наблюденията на Вобан върху мизерията на хората и социалното неравенство във Франция в началото на XVIII век. Той смята, че Вобан е нарисувал реалистична и тревожна картина на ситуацията.
reviewed: true

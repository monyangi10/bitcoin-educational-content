question: Hoe beoordeelde Tocqueville Vaubans opmerkingen over de toestand van Frankrijk in het begin van de 18e eeuw?
answer: Zijn opmerkingen waren beangstigend maar goed onderbouwd
wrong_answers:
  - Dit zijn overdrijvingen
  - Hij was een underdog
  - Ze waren totaal misplaatst
explanation: |
  Alexis de Tocqueville onderstreepte in zijn boek "L'Ancien Régime et la Révolution" de relevantie van Vaubans observaties over de ellende van het volk en de sociale ongelijkheid in Frankrijk aan het begin van de 18e eeuw. Hij vond dat Vauban een realistisch en alarmerend beeld van de situatie had geschetst.
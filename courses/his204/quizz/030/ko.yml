question: 다겐손 후작은 이런저런 경제 활동을 규제하자고 제안하는 당시 장관들에게 어떻게 대응했을까요?
answer: 첫째, 규제가 자유보다 낫다는 것을 확인해야 했습니다
wrong_answers:
  - 이 활동은 규제하기 전에 먼저 성숙하도록 허용되어야 합니다
  - 영국과 네덜란드가 만든 규정을 따라야 한다는 것
  - 결정을 내리기 전에 반드시 국민과 상의해야 한다는 점
explanation: |
  다르장송 후작은 규제가 자유보다 낫다는 것을 증명해야 한다고 주장했습니다. 그는 자유가 기본 원칙이며 모든 제한은 합당한 논거를 통해 정당화되어야 한다고 믿었습니다.
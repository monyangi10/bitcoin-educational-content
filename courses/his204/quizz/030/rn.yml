question: None Marquis d’Argenson yasubije gute abashikiranganji bo muri ico gihe, bariko barasaba gutunganya igikorwa c’ubutunzi iki canke kiriya?
answer: Ubwa mbere, twabwirizwa kwiyemeza neza ko amategeko ari meza kuruta umwidegemvyo .
wrong_answers:
  - Ko ico gikorwa cobanza kurekurwa ngo gikure imbere y’uko gitunganirizwa .
  - Ko amabwirizwa yashizweho n’Abongereza n’Abaholandi yategerezwa gukurikizwa .
  - Ko abantu bategerezwa kugirwa inama imbere y'uko hafatwa ingingo .
explanation: |
  Marquis d’Argenson yarashimitse ku kwemeza ko gutegeka ari vyo vyiza kuruta umwidegemvyo. Yarizera ko umwidegemvyo ariwo ngingo ngenderwako y'ishimikiro, kandi ko uburenganzira bwose bwo guhagarika bwategerezwa gushingira intahe n'imvo zitomoye.
reviewed: true

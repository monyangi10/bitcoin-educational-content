question: มาร์ควิส ดาร์เจนซงตอบสนองต่อรัฐมนตรีในยุคของเขาอย่างไร เมื่อพวกเขาเสนอให้ควบคุมกิจกรรมทางเศรษฐกิจต่างๆ?
answer: ก่อนอื่น เราต้องทำให้แน่ใจว่ากฎระเบียบดีกว่าเสรีภาพ
wrong_answers:
  - กิจกรรมนี้ควรได้รับอนุญาตให้เติบโตเต็มที่ก่อนที่จะถูกควบคุม
  - ว่ากฎระเบียบที่สร้างขึ้นโดยชาวอังกฤษและชาวดัตช์ต้องปฏิบัติตาม
  - ประชาชนต้องได้รับการปรึกษาก่อนที่จะมีการตัดสินใจ
explanation: |
  มาร์ควิส ดาร์เจนซง ยืนกรานที่จะพิสูจน์ว่าการควบคุมนั้นดีกว่าเสรีภาพ เขาเชื่อว่าเสรีภาพเป็นหลักการพื้นฐาน และข้อจำกัดใด ๆ จะต้องมีเหตุผลที่สมเหตุสมผลในการสนับสนุน
question: Hoe reageerde Markies d'Argenson op de ministers van zijn tijd, die voorstelden om deze of gene economische activiteit te reguleren?
answer: Eerst moesten we ervoor zorgen dat regulering beter was dan vrijheid
wrong_answers:
  - Dat deze activiteit eerst tot wasdom moet komen voordat deze wordt gereguleerd
  - Dat de regels van de Engelsen en de Nederlanders gevolgd moesten worden
  - Dat het volk moet worden geraadpleegd voordat een beslissing wordt genomen
explanation: |
  De markies d'Argenson stond erop te bewijzen dat regulering te verkiezen was boven vrijheid. Hij geloofde dat vrijheid het basisprincipe was en dat alle beperkingen gerechtvaardigd moesten worden door goede argumenten.
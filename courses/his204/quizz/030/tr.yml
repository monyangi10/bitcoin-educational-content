question: Marquis d'Argenson, şu ya da bu ekonomik faaliyeti düzenlemeyi öneren zamanının bakanlarına nasıl yanıt verdi?
answer: İlk olarak, düzenlemenin özgürlükten daha iyi olduğundan emin olmalıydık
wrong_answers:
  - Bu faaliyetin düzenlenmeden önce olgunlaşmasına izin verilmesi gerektiği
  - İngiliz ve Hollandalılar tarafından yapılan düzenlemelere uyulması gerektiği
  - Bir karar alınmadan önce halka danışılması gerektiği
explanation: |
  Marquis d'Argenson, düzenlemenin özgürlüğe tercih edilebilir olduğunu kanıtlama konusunda ısrarcıydı. Özgürlüğün temel ilke olduğuna ve her türlü kısıtlamanın sağlam argümanlarla gerekçelendirilmesi gerektiğine inanıyordu.
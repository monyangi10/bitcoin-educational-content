question: Как е реагирал маркиз д'Арженсон на министрите от онова време, които са предлагали да регулират една или друга икономическа дейност?
answer: Първо, трябваше да се уверим, че регулирането е по-добро от свободата
wrong_answers:
  - Че тази дейност трябва първо да се остави да узрее, преди да бъде регулирана
  - Че трябва да се спазват правилата, въведени от англичаните и холандците
  - Че преди да се вземе решение, трябва да се проведе консултация с народа
explanation: |
  Маркиз д'Арженсон настояваше да докаже, че регулирането е за предпочитане пред свободата. Той вярваше, че свободата е основният принцип и че всички ограничения трябва да бъдат обосновани с разумни аргументи.
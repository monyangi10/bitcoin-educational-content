question: Каква е аргументацията на Турго в книгата Valeurs et monnaie?
answer: Стойността на нещата зависи от субективната оценка на хората
wrong_answers:
  - Стойността на вещите зависи от присъщите им качества
  - Можем да измерим стойността на нещата само с пари
  - Стойността се определя от работата
explanation: |
  Турго защитава субективната теория за стойността, според която стойността на едно благо зависи от полезността, която то предоставя на индивида, и от неговата лична оценка.
reviewed: true

question: ข้อโต้แย้งของ Turgot ใน Valeurs et monnaie คืออะไร?
answer: คุณค่าของสิ่งต่าง ๆ ขึ้นอยู่กับการประเมินค่าเชิงอัตวิสัยของผู้คน
wrong_answers:
  - คุณค่าของสิ่งต่าง ๆ ขึ้นอยู่กับคุณสมบัติภายในของพวกมัน
  - เราไม่สามารถวัดคุณค่าของสิ่งต่าง ๆ ได้ด้วยเงินเพียงอย่างเดียว
  - มูลค่าถูกกำหนดโดยการทำงาน
explanation: |
  Turgot ปกป้องทฤษฎีมูลค่าเชิงอัตวิสัย ซึ่งตามทฤษฎีนี้ มูลค่าของสินค้าขึ้นอยู่กับประโยชน์ที่มันมอบให้กับบุคคลและการประเมินค่าของเขาเอง
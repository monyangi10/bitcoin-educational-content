question: Ni igiki Turgot avuga mu gitabu ciwe citwa Valeurs et monnaie?
answer: Agaciro k'ibintu kavana n'ukuntu abantu babishima .
wrong_answers:
  - Agaciro k'ibintu kavana n'ingeso zavyo z'imbere .
  - Dushobora gupima agaciro k'ibintu n'amahera gusa .
  - Agaciro kagenwa n'akazi
explanation: |
  Turgot arwanira inyigisho y’agaciro, ivuga ko agaciro k’ikintu kavana n’akamaro giha umuntu ku giti ciwe be n’ukuntu we ubwiwe ashima.
question: Wat is het argument van Turgot in Valeurs et monnaie?
answer: De waarde van dingen hangt af van de subjectieve waardering van mensen
wrong_answers:
  - De waarde van dingen hangt af van hun intrinsieke kwaliteiten
  - We kunnen de waarde van dingen alleen meten met geld
  - Waarde wordt bepaald door werk
explanation: |
  Turgot verdedigt een subjectieve theorie van waarde, volgens welke de waarde van een goed afhangt van het nut dat het oplevert voor het individu en zijn persoonlijke waardering.
question: В каква сфера на дейност работи компанията Dupont de Nemours et Cie, основана от сина на френския икономист?
answer: Химия и биология
wrong_answers:
  - Банкиране и застраховане
  - Текстил
  - Хранително-вкусова промишленост
explanation: |
  Дюпон дьо Немур е компания за химикали и биология, основана от сина на икономиста Пиер-Самуел Дюпон дьо Немур.
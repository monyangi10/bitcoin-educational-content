question: Ni ubucuruzi ubuhe Dupont de Nemours et Cie, yashinzwe n’umuhungu w’uwo muhinga mu vy’ubutunzi w’Umufaransa, akora?
answer: Ubuhinga bwa shimi n'ibinyabuzima
wrong_answers:
  - Banki n'ubwishingizi
  - Impuzu
  - Inganda y'ibifungurwa
explanation: |
  Dupont de Nemours ni ishirahamwe ry'ivy'imiti n'ibinyabuzima ryashinzwe n'umuhungu w'umuhinga mu vy'ubutunzi Pierre-Samuel Dupont de Nemours.
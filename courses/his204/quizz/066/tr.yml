question: Fransız ekonomistin oğlu tarafından kurulan Dupont de Nemours et Cie hangi alanda faaliyet gösteriyor?
answer: Kimya ve biyoloji
wrong_answers:
  - Bankacılık ve Sigortacılık
  - Tekstil
  - Gıda endüstrisi
explanation: |
  Dupont de Nemours, ekonomist Pierre-Samuel Dupont de Nemours'un oğlu tarafından kurulmuş bir kimya ve biyoloji şirketidir.
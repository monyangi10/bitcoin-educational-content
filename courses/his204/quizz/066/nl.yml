question: In welke sector is Dupont de Nemours et Cie actief, opgericht door de zoon van de Franse econoom?
answer: Scheikunde en biologie
wrong_answers:
  - Bank & Verzekeringen
  - Textiel
  - Voedselindustrie
explanation: |
  Dupont de Nemours is een chemie- en biologiebedrijf dat is opgericht door de zoon van de econoom Pierre-Samuel Dupont de Nemours.
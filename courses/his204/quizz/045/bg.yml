question: Какво няма да намерите в L'Ami des hommes?
answer: Производството замира, а селското стопанство измества производството
wrong_answers:
  - Нациите имат хармонични интереси
  - Търговията между всички народи трябва да бъде свободна
  - Необходимостта от силно, централизирано правителство
explanation: |
  L'Ami des Hommes се фокусира върху селското стопанство и не критикува пренебрегването на производството. Напротив, той вижда в селското стопанство единствения източник на реално богатство.
reviewed: true

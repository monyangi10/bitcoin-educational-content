question: Ni igiki tudashobora gusanga muri L’Ami des hommes?
answer: Ibikorwa vy'ubuhinga(guhingura) biragabanuka uko uburimyi bufata ikibanza co guhingura
wrong_answers:
  - Amahanga afise inyungu zihuye .
  - Ubucuruzi bukwiye kuba bwidegemvya hagati y'ibihugu vyose .
  - Hakenewe intwaro zikomeye kandi zihurikiye hamwe
explanation: |
  L’Ami des Hommes yibanda ku buhinzi kandi ntinegura ukuntu ibikorwa vy’ubuhinga bisuzugurwa. Ahubwo abona ko uburimyi ari bwo bwonyene bushobora gutuma umuntu aronka ubutunzi nyakuri.
reviewed: true

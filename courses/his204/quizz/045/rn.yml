question: Ni igiki udashobora gusanga muri L’Ami des hommes?
answer: Ibikorwa vy'ubuhinga biragabanuka uko uburimyi bufata ikibanza c'ubuhinga
wrong_answers:
  - Amahanga afise inyungu zihuye .
  - Ubucuruzi bukwiye kuba bwidegemvya hagati y'ibihugu vyose .
  - Ivy’uko hakenewe intwaro ikomeye kandi ihurikiye hamwe
explanation: |
  L’Ami des Hommes yibanda ku buhinzi kandi ntiyinegura ukuntu ibikorwa vy’ubuhinga bisuzugurwa. Ahubwo abona ko uburimyi ari bwo bwonyene bushobora gutuma umuntu aronka ubutunzi nyakuri.
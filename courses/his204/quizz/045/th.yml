question: มีอะไรที่หาไม่ได้ใน L'Ami des hommes?
answer: การผลิตซบเซาเมื่อการเกษตรเข้ามาแทนที่การผลิต
wrong_answers:
  - ประเทศต่าง ๆ มีผลประโยชน์ที่สอดคล้องกัน
  - การค้า ควรเป็นเสรีระหว่างทุกประชาชน
  - ความจำเป็นในการมีรัฐบาลที่เข้มแข็งและรวมศูนย์
explanation: |
  L'Ami des Hommes มุ่งเน้นไปที่การเกษตรและไม่วิพากษ์วิจารณ์การละเลยการผลิต ในทางตรงกันข้าม เขามองว่าการเกษตรเป็นแหล่งเดียวของความมั่งคั่งที่แท้จริง
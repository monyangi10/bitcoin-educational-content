question: Wat is er niet te vinden in L'Ami des hommes?
answer: Productie kwijnt weg nu landbouw de plaats van de industrie inneemt
wrong_answers:
  - Naties hebben harmonieuze belangen
  - Handel moet vrij zijn tussen alle volkeren
  - De behoefte aan een sterke, gecentraliseerde overheid
explanation: |
  L'Ami des Hommes richt zich op de landbouw en bekritiseert de verwaarlozing van de industrie niet. Integendeel, hij ziet de landbouw als de enige bron van echte rijkdom.
question: Hangi 19. yüzyıl Fransız ekonomisti Abbé de Saint-Pierre'e bir kitap ithaf etmiştir?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  19. yüzyılın liberal iktisatçılarından Gustave de Molinari, Abbé de Saint-Pierre hakkında bir kitap yazmış ve onun liberal düşüncenin ve barışın savunulmasının öncüsü olarak oynadığı rolü vurgulamıştır.
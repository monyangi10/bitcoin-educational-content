question: Welke 19e-eeuwse Franse econoom droeg een boek op aan de Abbé de Saint-Pierre?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, een 19e-eeuwse liberale econoom, schreef een boek over de Abbé de Saint-Pierre, waarin hij zijn rol als voorloper van het liberale denken en de verdediging van de vrede benadrukte.
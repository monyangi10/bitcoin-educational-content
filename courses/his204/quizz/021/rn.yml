question: Ni uwuhe muhinga mu vy’ubutunzi w’Umufaransa wo mu kinjana ca 19 yatuye igitabo Abbé de Saint-Pierre igitabu?
answer: Gustave de Molinari
wrong_answers:
  - Frédéric Bastiat
  - Jean-Baptiste Say
  - Léon Walras
explanation: |
  Gustave de Molinari, umuhinga mu vy’ubutunzi wo mu kinjana ca 19, yaranditse igitabu kivuga ibijanye na Abbé de Saint-Pierre, ashimika ku ruhara rwiwe rwo kuba umutanguzi w’ivyiyumviro vy’ubwigenge no kurwanira amahoro.
reviewed: true

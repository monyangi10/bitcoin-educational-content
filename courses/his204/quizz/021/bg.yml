question: Кой френски икономист от XIX в. посвещава книга на абат дьо Сен Пиер?
answer: Гюстав дьо Молинари
wrong_answers:
  - Фредерик Бастиа
  - Жан-Батист Сей
  - Леон Валрас
explanation: |
  Гюстав дьо Молинари, либерален икономист от XIX в., пише книга за абат дьо Сен-Пиер, в която изтъква ролята му на предшественик на либералната мисъл и защитата на мира.
reviewed: true

question: นักเศรษฐศาสตร์ชาวฝรั่งเศสในศตวรรษที่ 19 คนใดที่อุทิศหนังสือให้กับ Abbé de Saint-Pierre?
answer: กุสตาฟ เดอ โมลินารี
wrong_answers:
  - เฟรเดริก บาสเตียต
  - ฌอง-บาติสต์ เซย์
  - เลออง วาลราส
explanation: |
  กุสตาฟ เดอ โมลินารี นักเศรษฐศาสตร์เสรีนิยมในศตวรรษที่ 19 เขียนหนังสือเกี่ยวกับ Abbé de Saint-Pierre โดยเน้นบทบาทของเขาในฐานะผู้บุกเบิกความคิดเสรีนิยมและการปกป้องสันติภาพ
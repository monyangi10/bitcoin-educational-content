question: แม้ว่า Richard Cantillon จะกลายเป็นพลเมืองฝรั่งเศสในปี 1708 เขามาจากไหน?
answer: จากไอร์แลนด์
wrong_answers:
  - จากสเปน
  - จากอังกฤษ
  - จากเยอรมนี
explanation: |
  ริชาร์ด แคนทิลลอน มีเชื้อสายไอริชและต่อมาได้รับสัญชาติฝรั่งเศสในปี 1708 เขาใช้ชีวิตส่วนใหญ่ในฝรั่งเศสและได้รับอิทธิพลจากแนวคิดทางเศรษฐกิจของฝรั่งเศสในยุคนั้น
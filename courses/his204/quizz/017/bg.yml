question: Въпреки че Ришар Кантийон става френски гражданин през 1708 г., откъде идва той?
answer: От Ирландия
wrong_answers:
  - От Испания
  - От Англия
  - От Германия
explanation: |
  Ришар Кантийон е от ирландски произход, а по-късно, през 1708 г., придобива френско гражданство. Той прекарва голяма част от живота си във Франция и е повлиян от френските икономически идеи на своето време.
reviewed: true

question: Richard Cantillon 1708 yılında Fransız vatandaşı olmasına rağmen, nereden gelmiştir?
answer: İrlanda'dan
wrong_answers:
  - İspanya'dan
  - İngiltere'den
  - Almanya'dan
explanation: |
  Richard Cantillon İrlanda kökenliydi ve daha sonra 1708 yılında Fransız vatandaşlığına geçti. Hayatının büyük bir bölümünü Fransa'da geçirmiş ve zamanının Fransız ekonomik fikirlerinden etkilenmiştir.
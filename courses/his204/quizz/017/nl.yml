question: Hoewel Richard Cantillon in 1708 Frans staatsburger werd, waar kwam hij vandaan?
answer: Van Ierland
wrong_answers:
  - Van Spanje
  - Vanuit Engeland
  - Uit Duitsland
explanation: |
  Richard Cantillon was van Ierse afkomst en kreeg later in 1708 de Franse nationaliteit. Hij bracht een groot deel van zijn leven in Frankrijk door en werd beïnvloed door de Franse economische ideeën van zijn tijd.
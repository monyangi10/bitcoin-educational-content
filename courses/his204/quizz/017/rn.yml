question: Naho Richard Cantillon yabaye umunyagihugu w’Ubufaransa mu 1708, none yava hehe?
answer: Yava muri Irlande
wrong_answers:
  - Yava muri Esupanye
  - Yava muri Bwongereza
  - Yava muri Budagi
explanation: |
  Richard Cantillon yari akomoka muri Irlande, mu nyuma aca aronka ubwenegihugu bw’Ubufaransa mu 1708. Yamaze igice kinini c’ubuzima bwiwe mu Bufaransa kandi yarakozweko n’ivyiyumviro vy’ubutunzi vy’Abafaransa vyo mu gihe ciwe.
reviewed: true

question: 1776 yılında Le commerce et le gouvernement considérés relativement l'un avec l'autre yayımlandı. Aynı yıl başka hangi kitap yayımlandı?
answer: Adam Smith'in Ulusların Zenginliği
wrong_answers:
  - Jean-Baptiste Say'ın Ekonomi Politik Üzerine İncelemeleri
  - Turgot'nun Servetin Oluşumu ve Dağılımı Üzerine Düşünceleri
  - Sosyal Contract
explanation: |
  adam Smith'in "Ulusların Zenginliği" adlı kitabı, ekonomik düşünce için çok önemli bir yıl olan 1776'da yayımlandı.
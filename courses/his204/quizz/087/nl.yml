question: In 1776 werd Le commerce et le gouvernement considérés relativement l'un avec l'autre gepubliceerd. Welk ander boek werd in hetzelfde jaar gepubliceerd?
answer: Rijkdom van landen door Adam Smith
wrong_answers:
  - Verhandeling over politieke economie van Jean-Baptiste Say
  - Turgot's Reflecties over de vorming en verdeling van rijkdom
  - De sociale Contract
explanation: |
  the Wealth of Nations" van Adam Smith werd gepubliceerd in 1776, een cruciaal jaar voor het economisch denken.
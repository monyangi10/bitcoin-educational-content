question: ในปี 1776 Le commerce et le gouvernement considérés relativement l'un avec l'autre ได้รับการตีพิมพ์ หนังสือเล่มอื่นใดที่ตีพิมพ์ในปีเดียวกัน?
answer: ความมั่งคั่งของประชาชาติ โดย อดัม สมิธ
wrong_answers:
  - ตำราว่าด้วยเศรษฐศาสตร์การเมืองของฌอง-แบ๊บติสต์ เซย์
  - การสะท้อนของ Turgot เกี่ยวกับการก่อตัวและการกระจายของความมั่งคั่ง
  - The Social Contract
explanation: |
  "ความมั่งคั่งของประชาชาติ" ของอดัม สมิธ ถูกตีพิมพ์ในปี 1776 ซึ่งเป็นปีที่สำคัญสำหรับแนวคิดทางเศรษฐกิจ
question: През 1776 г. е публикувана книгата Le commerce et le gouvernement considérés relativement l'un avec l'autre. Коя друга книга е публикувана през същата година?
answer: Богатството на народите от Адам Смит
wrong_answers:
  - Трактат по политическа икономия на Жан-Батист Сей
  - Размисли на Турго за формирането и разпределението на богатството
  - Социалният договор
explanation: |
  "Богатството на народите" на Адам Смит е публикувана през 1776 г. - ключова година за икономическата мисъл.
reviewed: true

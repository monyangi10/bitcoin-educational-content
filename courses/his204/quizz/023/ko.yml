question: 생 피에르가 아카데미 프랑세즈에서 제외된 이유는 무엇인가요?
answer: 그는 전쟁과 과잉으로 가득 찬 루이 14세의 통치를 감히 비판했습니다
wrong_answers:
  - 심각한 병을 앓고 있던 그는 반쯤 미쳐버린 상태였습니다
  - 그는 프랑스의 세습 적인 영국 국왕을 감히 지지했습니다
  - 그는 다른 학자의 논문을 표절했습니다
explanation: |
  생 피에르는 루이 14세의 통치, 특히 그의 전쟁과 과도한 지출을 비판했다는 이유로 아카데미 프랑세즈에서 추방당했습니다. 그의 비판은 군주에 대한 무례한 행동으로 간주되었습니다.
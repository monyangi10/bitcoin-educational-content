question: Защо Сен-Пиер е изключен от Френската академия?
answer: Той се осмелява да критикува управлението на Луи XIV, изпълнено с войни и излишества
wrong_answers:
  - Страда от тежко заболяване и е полудял
  - Той се осмелява да подкрепи краля на Англия, наследствения враг на Франция
  - Той е плагиатствал друг академик
explanation: |
  Сен-Пиер е изключен от Френската академия заради критиките си към управлението на Луи XIV, по-специално към неговите войни и прекомерни разходи. Критиката му е сметната за неуважителна към монарха.
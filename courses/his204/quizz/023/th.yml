question: ทำไมแซงต์-ปิแอร์ถึงถูกตัดออกจาก Académie française?
answer: เขากล้าที่จะวิจารณ์การครองราชย์ของหลุยส์ที่ 14 ซึ่งเต็มไปด้วยสงครามและความฟุ่มเฟือย
wrong_answers:
  - ทนทุกข์ทรมานจากความเจ็บป่วยร้ายแรง เขาได้กลายเป็นคนเสียสติไปครึ่งหนึ่ง
  - เขากล้าสนับสนุนกษัตริย์แห่งอังกฤษ ศัตรูทางพันธุกรรมของฝรั่งเศส
  - เขาได้ลอกเลียนผลงานของนักวิชาการคนอื่น
explanation: |
  Saint-Pierre ถูกขับออกจาก Académie française เนื่องจากวิพากษ์วิจารณ์การครองราชย์ของพระเจ้าหลุยส์ที่ 14 โดยเฉพาะสงครามและการใช้จ่ายที่ฟุ่มเฟือยของพระองค์ การวิพากษ์วิจารณ์ของเขาถูกมองว่าไม่เคารพต่อพระมหากษัตริย์
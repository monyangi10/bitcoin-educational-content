question: Waarom werd Saint-Pierre uitgesloten van de Académie française?
answer: Hij durfde de regering van Lodewijk XIV, vol oorlog en overdaad, te bekritiseren
wrong_answers:
  - Hij leed aan een ernstige ziekte en was half gek geworden
  - Hij had het aangedurfd om de koning van Engeland te steunen, Frankrijks erfvijand
  - Hij had een andere academicus geplagieerd
explanation: |
  Saint-Pierre werd uit de Académie française gezet omdat hij kritiek had op het bewind van Louis XIV, in het bijzonder op zijn oorlogen en buitensporige uitgaven. Zijn kritiek werd als respectloos voor de monarch beschouwd.
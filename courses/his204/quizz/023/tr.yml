question: Saint-Pierre neden Académie française'den dışlandı?
answer: Louis'nin savaş ve aşırılıklarla dolu saltanatını eleştirmeye cüret etti
wrong_answers:
  - Ciddi bir hastalıktan muzdaripti ve yarı delirmişti
  - Fransa'nın ezeli düşmanı olan İngiltere Kralı'nı desteklemeye cüret etmişti
  - Başka bir akademisyenden intihal yapmıştı
explanation: |
  Saint-Pierre, 14. Louis'nin saltanatını, özellikle de savaşlarını ve aşırı harcamalarını eleştirdiği için Académie française'den atıldı. Eleştirileri hükümdara karşı saygısızlık olarak değerlendirildi.
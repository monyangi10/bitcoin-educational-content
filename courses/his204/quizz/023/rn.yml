question: Ni kuki Saint-Pierre yakuwe mw’ishure ryisumbuye ry’igifaransa?
answer: Yarateye ubwoba bwo kunegura ubutegetsi bwa Ludoviko wa XIV, bwari bufise intambara n’ibirenze urugero .
wrong_answers:
  - Yari arwaye indwara ikomeye, yari yasaze nk’igice
  - Yari yaragize ubwoba bwo gushigikira Umwami w’Ubwongereza, umwansi w’iragi ry’Ubufaransa .
  - Yari yivye uwundi muhinga .
explanation: |
  Saint-Pierre yirukanwe muri Académie française kubera yanegura ubutegetsi bwa Louis XIV, cane cane intambara ziwe n’amahera yakoresha cane. Ivyo yanegura vyabonwa ko ari ukutubaha umwami.
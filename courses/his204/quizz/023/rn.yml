question: Ni kuki Saint-Pierre yirukanwe mw’ishure ryisumbuye ry’igifaransa?
answer: Yarateye ubwoba bwo kunegura ubutegetsi bwa Louis XIV, bwari bufise intambara n’ibirenze urugero .
wrong_answers:
  - Yari arwaye indwara ikomeye, yari yasaze nk’igice
  - Yari yaragize ubwoba bwo gushigikira Umwami w’Ubwongereza, umwansi w’iragi ry’Ubufaransa .
  - Yari yiganye uwundi muhinga .
explanation: |
  Saint-Pierre yirukanwe muri Académie française kubera yanegura ubutegetsi bwa Louis XIV, cane cane intambara ziwe n’amahera yakoreshwa cane. Ivyo yanegura vyabonwa ko ari ukutubaha umwami.
reviewed: true

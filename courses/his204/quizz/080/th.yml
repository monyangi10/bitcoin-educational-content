question: ในบันทึกความทรงจำเกี่ยวกับการให้กู้ยืมเงินของเขา Turgot ปกป้องเสรีภาพของใครในขณะที่โต้แย้งหลักการของพวกเขา?
answer: ชาวกรีกและคริสตจักรคาทอลิก
wrong_answers:
  - ชาวกรีกและชาวอียิปต์
  - คริสตจักรคาทอลิกและชาวอียิปต์
  - ชาวโรมันและชาวคาร์เธจ
explanation: |
  Turgot ปกป้องเสรีภาพในการให้ยืมเงิน ในขณะที่โต้แย้งข้อโต้แย้งของชาวกรีกและคริสตจักรคาทอลิกที่ต่อต้านดอกเบี้ย เขาเชื่อว่าการห้ามดอกเบี้ยเป็นอุปสรรคต่อการพัฒนาเศรษฐกิจและจำเป็นต้องอนุญาตให้บุคคลให้ยืมและยืมได้อย่างเสรี
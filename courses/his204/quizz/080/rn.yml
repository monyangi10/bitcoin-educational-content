question: Mu gitabu ciwe c’ivyiyumviro ku bijanye no kugurana amahera, Turgot arwanira umwidegemvyo wa nde mu gihe ahakana ingingo ngenderwako zabo?
answer: Abagiriki na Ekleziya Gatolika .
wrong_answers:
  - Abagiriki n'Abanyamisiri .
  - Ekleziya Gatolika n'Abanyamisiri .
  - Abaroma n’Abanyakaritaje .
explanation: |
  Turgot yaraburanira umwidegemvyo wo kugurana amahera, mu gihe yariko arahakana imvo z’Abagiriki n’Ekleziya Gatolika zirwanya inyungu. Yari yiyumvira yuko kubuza inyungu bibangamira iterambere ry’ubutunzi kandi ko ari ngombwa ko abantu bashobora kugurana no kugura ata co baciye.
reviewed: true

question: Turgot, ödünç para verme konusundaki anılarında, ilkelerini reddederken kimin özgürlüğünü savunuyor?
answer: Yunanlılar ve Katolik Kilisesi
wrong_answers:
  - Yunanlılar ve Mısırlılar
  - Katolik Kilisesi ve Mısırlılar
  - Romalılar ve Kartacalılar
explanation: |
  Turgot, Yunanlıların ve Katolik Kilisesi'nin faize karşı argümanlarını çürütürken, borç para verme özgürlüğünü savundu. Faizin yasaklanmasının ekonomik gelişmeyi engellediğine ve bireylerin serbestçe borç alıp vermesine izin verilmesi gerektiğine inanıyordu.
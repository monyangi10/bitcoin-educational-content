question: В мемоара си за паричното кредитиране Турго защитава свободата на кого, като същевременно опровергава неговите принципи?
answer: Гърците и Католическата църква
wrong_answers:
  - Гърци и египтяни
  - Католическата църква и египтяните
  - Римляни и картагенци
explanation: |
  Турго защитава свободата да се дават пари назаем, като същевременно отхвърля аргументите на гърците и на Католическата църква срещу лихвата. Той смята, че забраната на лихвите пречи на икономическото развитие и че е необходимо да се позволи на хората да дават и вземат заеми свободно.
reviewed: true

question: Van wie verdedigt Turgot in zijn memoires over geld lenen de vrijheid terwijl hij hun principes weerlegt?
answer: Grieken en de katholieke kerk
wrong_answers:
  - Grieken en Egyptenaren
  - De katholieke kerk en de Egyptenaren
  - Romeinen en Carthagers
explanation: |
  Turgot verdedigde de vrijheid om geld te lenen en weerlegde de argumenten van de Grieken en de katholieke kerk tegen rente. Hij geloofde dat het verbieden van rente de economische ontwikkeling belemmerde en dat het noodzakelijk was om individuen vrij te laten lenen en uitlenen.
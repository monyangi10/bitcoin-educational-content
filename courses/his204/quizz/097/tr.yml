question: Dupont de Nemours, Assignats'ın kurulmasını ertelemek için hangi nedeni gösteriyor?
answer: Assignats fiyatları artıracak
wrong_answers:
  - Assignatlar saldırgan savaşlar yürütmek için kullanılacak
  - Assignats yabancı sermayeyi mahvedecek
  - Assignatlar mülkiyet haklarının ihlalidir
explanation: |
  Dupont de Nemours, Ulusal Meclis tarafından çıkarılan bir kağıt para olan assignat'ların neden olduğu enflasyondan korkuyordu. Bu enflasyonun Fransız ekonomisini mahvedeceğine inanıyordu.
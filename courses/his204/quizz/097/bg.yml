question: Каква е причината Дюпон дьо Немур да отложи създаването на Assignats?
answer: Асигнатите ще повишат цените
wrong_answers:
  - Асигнатите ще се използват за водене на нападателни войни
  - Асигнатите ще съсипят чуждестранния капитал
  - Асигнатите са нарушение на правата на собственост
explanation: |
  Дюпон дьо Немур се опасява от инфлацията, причинена от асиатите - хартиена валута, емитирана от Националното събрание. Той смята, че тази инфлация ще разруши френската икономика.
question: Welke reden geeft Dupont de Nemours op om de oprichting van Assignats uit te stellen?
answer: Assignats zullen de prijzen opdrijven
wrong_answers:
  - Assignats zullen worden gebruikt om offensieve oorlogen te voeren
  - Assignats zullen buitenlands kapitaal ruïneren
  - Assignats zijn een inbreuk op eigendomsrechten
explanation: |
  Dupont de Nemours vreesde de inflatie die werd veroorzaakt door de assignats, een papieren munteenheid die werd uitgegeven door de Nationale Assemblee. Hij geloofde dat deze inflatie de Franse economie zou ruïneren.
question: Ni imvo iyihe Dupont de Nemours atanga yo gusubiramwo iremwa ry’aba Assignats?
answer: Abashinzwe bazotuma ibiciro biduga
wrong_answers:
  - Assignats zizokoreshwa mu gutera intambara .
  - Abashinzwe bazohonya umutungo w'amahanga
  - Assignats ni ukurenga ku burenganzira bw'umutungo .
explanation: |
  Dupont de Nemours yaragize ubwoba bw’ugutera imbere kw’ibiciro bitewe n’amafaranga y’impapuro yitwa assignats, ni ukuvuga amafaranga y’impapuro yasohowe n’Inama Nkuru y’Igihugu. Yari yizera ko iyo inflation izotuma ubutunzi bw’Ubufaransa bwonona.
question: Ni imvo iyihe Dupont de Nemours atanga yo gusubiramwo iremwa ry’amafaranga yakoreshwa mw'iyo mpinduka?
answer: Ayo mafaranga azotuma ibiciro biduga
wrong_answers:
  - Ayo mafaranga azokoreshwa mu gutera intambara .
  - Ayo mafaranga azohonya umutahe w'amahanga
  - Ivyo ni ukurenga ku burenganzira bw'umutungo .
explanation: |
  Dupont de Nemours yaragize ubwoba bw’ukuduga kw’ibiciro bitewe n’amafaranga y’impapuro yitwa assignats, ni ukuvuga amafaranga y’impapuro yasohowe n’Inama Nkuru y’Igihugu. Yari yizera ko iyo uguta agaciro izotuma ubutunzi bw’Ubufaransa bwononekara.
reviewed: true

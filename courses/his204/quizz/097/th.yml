question: เหตุผลที่ Dupont de Nemours ให้สำหรับการเลื่อนการสร้าง Assignats คืออะไร?
answer: Assignats จะทำให้ราคาสูงขึ้น
wrong_answers:
  - Assignats จะถูกใช้เพื่อทำสงครามเชิงรุก
  - Assignats จะทำลายทุนต่างประเทศ
  - Assignats เป็นการละเมิดสิทธิในทรัพย์สิน
explanation: |
  ดูปองต์ เดอ เนมูร์ กลัวภาวะเงินเฟ้อที่เกิดจากอัสซิญาต ซึ่งเป็นสกุลเงินกระดาษที่ออกโดยสมัชชาแห่งชาติ เขาเชื่อว่าภาวะเงินเฟ้อนี้จะทำลายเศรษฐกิจฝรั่งเศส
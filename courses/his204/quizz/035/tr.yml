question: Gournay Katolik Kilisesi tarafından geliştirilen hangi fikre saldırmıştır?
answer: Faizli kredi yasağı
wrong_answers:
  - İhtiyaç sahipleri için sadaka
  - Keşişlerin kendi kendilerine yettikleri yaşam
  - Ondalık
explanation: |
  Gournay, faizli kredilerin yasaklanmasını, girişimcilerin krediye erişimini engelleyerek ekonomik kalkınmayı sekteye uğratmakla eleştirmiştir.
question: แนวคิดใดที่พัฒนาโดยคริสตจักรคาทอลิกที่กูร์เนย์โจมตี?
answer: ข้อห้ามเกี่ยวกับการให้กู้ยืมที่มีดอกเบี้ย
wrong_answers:
  - ทานสำหรับผู้ยากไร้
  - ชีวิตที่พึ่งพาตนเองของพระสงฆ์
  - สิบลด
explanation: |
  Gournay วิพากษ์วิจารณ์การห้ามกู้ยืมเงินที่มีดอกเบี้ยว่าเป็นอุปสรรคต่อการพัฒนาเศรษฐกิจโดยการป้องกันไม่ให้นักธุรกิจเข้าถึงเครดิต
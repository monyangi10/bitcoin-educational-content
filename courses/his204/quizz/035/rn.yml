question: Ni iciyumviro ikihe categuwe na Ekleziya Gatolika Gournay yateye?
answer: Ugukumira inguzanyo zifise inyungu
wrong_answers:
  - Ubuntu bw'abakene
  - Ubuzima bwo kwitunga bw’ababikira .
  - Ic’icumi .
explanation: |
  Gournay yaneguye uburenganzira bwo kubuza inguzanyo zifise inyungu kubera zibuza iterambere ry’ubutunzi mu kubuza abashoramari kuronka inguzanyo.
question: Ni iciyumviro ikihe categuwe na Ekleziya Gatolika Gournay yateye ivyatsi?
answer: Uguheba ingurane zirihanwa inyungu
wrong_answers:
  - Ugufashwa kw'abakene
  - Ubuzima bwo kwitunga bw’abapadiri .
  - Intererano y'itegeko .
explanation: |
  Gournay yaneguye uburenganzira bwo kubuza ingurane zifise inyungu kubera zibuza iterambere ry’ubutunzi mu kubuza abashoramari kuronka ingurane.
reviewed: true

question: Коя идея, развита от Католическата църква, атакува Гурне?
answer: Забрана на лихвоносни заеми
wrong_answers:
  - Милостиня за нуждаещите се
  - Самостоятелният живот на монасите
  - Десятъкът
explanation: |
  Гурне критикува забраната за отпускане на лихвени заеми за това, че пречи на икономическото развитие, тъй като не позволява на предприемачите да получат достъп до кредити.
reviewed: true

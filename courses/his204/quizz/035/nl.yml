question: Welk idee ontwikkeld door de Katholieke Kerk viel Gournay aan?
answer: Verbod op rentedragende leningen
wrong_answers:
  - Aalmoes voor de behoeftigen
  - Het zelfvoorzienende leven van de monniken
  - De tiende
explanation: |
  Gournay bekritiseerde het verbod op rentedragende leningen omdat het de economische ontwikkeling zou belemmeren door ondernemers de toegang tot krediet te ontzeggen.
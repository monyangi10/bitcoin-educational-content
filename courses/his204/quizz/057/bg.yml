question: Според Кене и физиократите какво стимулира усилията и работата?
answer: Сигурността на частната собственост
wrong_answers:
  - Репресивни закони
  - Обичаи на занаятчиите и индустриалците, благоприятстващи обогатяването
  - Страх от глад
explanation: |
  Според физиократите сигурността на частната собственост е от съществено значение за насърчаване на инвестициите и работата. Те смятат, че хората са по-склонни да работят и инвестират, ако са сигурни, че ще могат да запазят плодовете на своя труд.
reviewed: true

question: Nk’uko Quesnay n’aba Physiocrates babivuga, ni igiki kivyura utwigoro tw'ibikorwa?
answer: Umutekano w'amatungo y'abantu bigabira
wrong_answers:
  - Amategeko y'agacinyizo
  - Ivyiza vy'abahinguzi b'ibintu n'abahinga mu vy'inganda
  - Ubwoba bw'inzara
explanation: |
  Umutekano w’itunga ry’abantu wari ngombwa cane kugira ngo umuntu ashobore gushora imari n’ugukora, nk’uko aba Physiocrates babivuga. Bemera yuko umuntu ku giti ciwe yoshobora gukora no gushiramwo amahera iyo yizeye ko yoshobora kuzokwama ivyamwa vy'ibikorwa vyiwe.
reviewed: true

question: Nk’uko Quesnay n’aba Physiocrates babivuga, ni igiki kivyura utwigoro n’ugukora?
answer: Umutekano w'umutungo w'abantu ku giti cabo
wrong_answers:
  - Amategeko y'agahahazo
  - Ivyiza vy'abahinguzi b'ibintu n'abahinga mu vy'inganda
  - Ubwoba bw'inzara
explanation: |
  Umutekano w’itunga ry’abantu ku giti cabo wari ngombwa cane kugira ngo umuntu ashobore gushora imari n’ugukora, nk’uko aba Physiocrates babivuga. Bemera yuko umuntu ku giti ciwe yoshobora gukora no gushiramwo amahera iyo yizeye ko yoshobora kuguma afise ivyamwa vy’ibikorwa vyiwe.
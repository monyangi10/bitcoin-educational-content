question: ตามที่เคเนย์และกลุ่มฟิสิโอแครต สิ่งใดที่กระตุ้นความพยายามและการทำงาน?
answer: ความปลอดภัยของทรัพย์สินส่วนบุคคล
wrong_answers:
  - กฎหมายที่กดขี่
  - ขนบธรรมเนียมที่เอื้อต่อความมั่งคั่งของช่างฝีมือและนักอุตสาหกรรม
  - ความกลัวความอดอยาก
explanation: |
  ความปลอดภัยของทรัพย์สินส่วนตัวเป็นสิ่งสำคัญในการส่งเสริมการลงทุนและการทำงาน ตามความเชื่อของกลุ่มฟิสิโอแครต พวกเขาเชื่อว่าบุคคลจะมีแนวโน้มที่จะทำงานและลงทุนมากขึ้นหากพวกเขามั่นใจว่าจะสามารถเก็บเกี่ยวผลของแรงงานของตนได้
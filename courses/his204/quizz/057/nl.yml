question: Wat stimuleert volgens Quesnay en de fysiocraten inspanning en werk?
answer: De veiligheid van privébezit
wrong_answers:
  - Repressieve wetten
  - Verrijkingsvriendelijke mores van ambachtslieden en industriëlen
  - Angst voor hongersnood
explanation: |
  Zekerheid van privébezit was volgens de Fysiocraten essentieel om investeringen en werk aan te moedigen. Ze geloofden dat individuen meer geneigd waren om te werken en te investeren als ze er zeker van waren dat ze de vruchten van hun arbeid konden houden.
question: Quesnay ve Fizyokratlara göre, çaba ve çalışmayı ne teşvik eder?
answer: Özel mülkiyetin güvenliği
wrong_answers:
  - Baskıcı yasalar
  - Esnaf ve sanayicilerin zenginleşme dostu adetleri
  - Kıtlık korkusu
explanation: |
  Fizyokratlara göre özel mülkiyetin güvenliği, yatırım ve çalışmayı teşvik etmek için gerekliydi. Bireylerin, emeklerinin meyvelerini ellerinde tutabileceklerinden emin olmaları halinde çalışmaya ve yatırım yapmaya daha eğilimli olduklarına inanıyorlardı.
question: None ni kukihe kintu Condorcet atigeze yandikako?
answer: Amabanki
wrong_answers:
  - Umwidegemvyo w'ubudandaji bw'ibinyantete
  - Ibikogwa vy'agahato
  - Ubuja
explanation: |
  Condorcet yanditse ku vyerekeye umwidegemvyo w’ubudandaji bw’ibinyantete, Ibikorwa vy'agahato, n’ubuja, ariko ntiyanditse ku vyerekeye amabanki.
reviewed: true

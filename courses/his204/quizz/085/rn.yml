question: Ni nde yavuze iryo jambo ngo "Ndabona ko Turgot na jewe twenyene nitwe dukunda abantu"? ?
answer: Louis XVI
wrong_answers:
  - Voltaire
  - Condorcet
  - Rousseau
explanation: |
  Louis XVI ni we yavuze ayo majambo, ashimika ku vyo yashigikiye Turgot be n’ivyo yariko arahindura.
reviewed: true

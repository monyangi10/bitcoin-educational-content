question: ดูปองต์ เดอ เนมูร์ ทำงานให้กับรัฐมนตรีคนใด?
answer: เทอร์โกต์
wrong_answers:
  - เนคเคอร์
  - Calonne
  - โคลเบิร์ต
explanation: |
  ดูปองต์ เดอ เนอมูร์ ทำงานร่วมกับเทอร์โกต์ รัฐมนตรีว่าการกระทรวงการคลังของหลุยส์ที่ 16 และช่วยดำเนินการปฏิรูปเศรษฐกิจหลายประการที่ได้รับแรงบันดาลใจจากฟิสิโอเครซี
question: Voor welke minister werkte Dupont de Nemours?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours werkte samen met Turgot, de minister van Financiën van Lodewijk XVI, en hielp een aantal economische hervormingen door te voeren die waren geïnspireerd op de fysiocratie.
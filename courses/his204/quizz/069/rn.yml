question: None Dupont de Nemours yakorera umushikiranganji uyuhe?
answer: Turgot
wrong_answers:
  - Necker
  - Calonne
  - Colbert
explanation: |
  Dupont de Nemours yarakoranye na Turgot, umushikiranganji w’ivy’ubutunzi wa Louis XVI, kandi yarafashije mu gushitsa amahinduka menshi mu vy’ubutunzi yisunze ubutegetsi bw’abanyagihugu.
reviewed: true

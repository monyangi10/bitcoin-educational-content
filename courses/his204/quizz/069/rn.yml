question: None Dupont de Nemours yakoreye uwuhe musuku?
answer: Turgot
wrong_answers:
  - Izosi
  - Caloni
  - Kolbert
explanation: |
  Dupont de Nemours yarakoranye na Turgot, umushikiranganji w’ivy’ubutunzi wa Louis XVI, kandi yarafashije mu gushitsa amahinduka menshi mu vy’ubutunzi yahumekewe n’ubutegetsi bw’abanyagihugu.
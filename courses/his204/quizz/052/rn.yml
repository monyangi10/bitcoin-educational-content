question: Ni nde yatumye Mirabeau arokoka gutotezwa inyuma yo gusohora igitabu ciwe citwa Théorie de l’Impôt?
answer:  Madame de Pompadour
wrong_answers:
  - Louis XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour yaravugiye Mirabeau inyuma y’aho igitabu ciwe citwa « La Théorie de l’Impôt » gisohokeye, ivyo bimufasha kwirinda igihano gikomeye cane.
reviewed: true

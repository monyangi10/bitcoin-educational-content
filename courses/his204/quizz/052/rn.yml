question: Ni nde yatumye Mirabeau arokoka ububabare bw’agahahazo amaze gusohora igitabu ciwe citwa Théorie de l’Impôt?
answer: Umupfasoni
wrong_answers:
  - Ludoviko XV
  - Faransuwa Keseni
  - Voltaire
explanation: |
  Madame de Pompadour yarasenzeye Mirabeau inyuma y’aho igitabu ciwe citwa « La Théorie de l’Impôt » gisohokeye, ivyo bimufasha kwirinda igihano gikomeye kuruta.
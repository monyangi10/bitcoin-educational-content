question: Благодарение на чия намеса Мирабо избягва жестоките репресии след публикуването на своята "Теория на властта"?
answer: Мадам дьо Помпадур
wrong_answers:
  - Луи XV
  - Франсоа Кеснай
  - Voltaire
explanation: |
  Мадам дьо Помпадур се застъпва за Мирабо след публикуването на "La Théorie de l'Impôt", което му позволява да избегне по-строга присъда.
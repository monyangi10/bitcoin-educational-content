question: Dankzij wiens tussenkomst ontsnapte Mirabeau aan de strenge repressie na de publicatie van zijn Théorie de l'Impôt?
answer: Madame de Pompadour
wrong_answers:
  - Lodewijk XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour bemiddelde namens Mirabeau na de publicatie van "La Théorie de l'Impôt", waardoor hij een zwaardere straf kon vermijden.
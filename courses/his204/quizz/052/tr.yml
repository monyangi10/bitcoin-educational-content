question: Mirabeau, Théorie de l'Impôt'u yayınladıktan sonra kimin müdahalesi sayesinde baskının zorluklarından kurtuldu?
answer: Madame de Pompadour
wrong_answers:
  - Louis XV
  - François Quesnay
  - Voltaire
explanation: |
  Madame de Pompadour, "La Théorie de l'Impôt "un yayınlanmasından sonra Mirabeau'nun lehine araya girerek daha ağır bir cezadan kurtulmasını sağladı.
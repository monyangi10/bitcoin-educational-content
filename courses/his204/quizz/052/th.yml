question: ต้องขอบคุณการแทรกแซงของใครที่ทำให้มิราโบหลบหนีจากความเข้มงวดของการกดขี่หลังจากตีพิมพ์ Théorie de l'Impôt ของเขา?
answer: มาดาม เดอ ปอมปาดูร์
wrong_answers:
  - หลุยส์ที่ 15
  - ฟร็องซัว เกส์เน่
  - โวลแตร์
explanation: |
  มาดาม เดอ ปอมปาดูร์ ได้ไกล่เกลี่ยแทนมิราโบหลังจากการตีพิมพ์ "La Théorie de l'Impôt" ทำให้เขาหลีกเลี่ยงโทษที่รุนแรงกว่าเดิม
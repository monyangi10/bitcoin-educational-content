question: Как се представя Дюпон дьо Немур в своята брошура за цесиите?
answer: Като приятел на народа
wrong_answers:
  - Като приятел на краля
  - Като приятел на свободата
  - Comme un Ami des Bourgeois
explanation: |
  Дюпон дьо Немур се представя като "приятел на народа", подчертавайки загрижеността си за благосъстоянието на населението.
question: Dupont de Nemours atamalarla ilgili broşüründe kendini nasıl tanıtıyor?
answer: Halkın Bir Dostu Gibi
wrong_answers:
  - Kralın Bir Dostu Olarak
  - Bir Özgürlük Dostu Gibi
  - Comme un Ami des Bourgeois
explanation: |
  Dupont de Nemours kendisini "Halkın Dostu" olarak tanıtarak halkın refahı için duyduğu endişenin altını çizdi.
question: Hoe presenteert Dupont de Nemours zichzelf in zijn brochure over assignaten?
answer: Als een vriend van het volk
wrong_answers:
  - Als vriend van de koning
  - Als een vriend van vrijheid
  - Een burgervriend
explanation: |
  Dupont de Nemours presenteerde zichzelf als een "Vriend van het Volk", waarmee hij zijn bezorgdheid om het welzijn van de bevolking onderstreepte.
question: ดูปองต์ เดอ เนมูร์ นำเสนอตัวเองอย่างไรในโบรชัวร์เกี่ยวกับแอสซิญาต?
answer: เหมือนเพื่อนของประชาชน
wrong_answers:
  - ในฐานะเพื่อนของพระราชา
  - เหมือนเพื่อนของเสรีภาพ
  - Comme un Ami des Bourgeois
explanation: |
  ดูปองต์ เดอ เนมูร์ส นำเสนอตัวเองว่าเป็น "เพื่อนของประชาชน" โดยเน้นย้ำถึงความห่วงใยต่อความเป็นอยู่ที่ดีของประชากร
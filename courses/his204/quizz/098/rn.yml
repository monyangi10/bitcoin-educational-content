question: Dupont de Nemours yiyerekana gute mu gatabu kiwe avuga ku bijanye n'amafaranga ya assignats?
answer: Nk'umugenzi w'abanyagihugu .
wrong_answers:
  - Nk'Umugenzi w'Umwami .
  - Nk'umugenzi w'umwidegemvyo .
  - Nk'umugenzi w'abatunzi
explanation: |
  Dupont de Nemours yariyerekanye nk'"Umugenzi w'abanyaguhugu", ashimika ku kwitwararika ineza y'abanyagihugu.
reviewed: true

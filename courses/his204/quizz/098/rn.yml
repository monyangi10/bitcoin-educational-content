question: Dupont de Nemours yiyerekana gute mu gatabu kiwe kavuga ibijanye n’ugushingwa ibikorwa?
answer: Nk'umugenzi w'abantu .
wrong_answers:
  - Nk'Umugenzi w'Umwami .
  - Nk'umugenzi w'umwidegemvyo .
  - Nimuze n'umugenzi w'abanyagihugu
explanation: |
  Dupont de Nemours yariyerekanye nk'"Umugenzi w'Igihugu", ashimika ku kwitwararika ineza y'abanyagihugu.
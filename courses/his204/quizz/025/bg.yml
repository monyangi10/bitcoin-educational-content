question: Защо според абат дьо Сен-Пиер размяната винаги и задължително е игра с положителна сума?
answer: Ако двама души свободно решат да сключат договор, това е така, защото всеки от тях вижда предимство в това
wrong_answers:
  - Колкото по-често се сменят стоките, толкова по-богата става нацията
  - Нация, която търгува, винаги е по-богата от тази, която живее в автаркия
  - Защото Бог го иска
explanation: |
  Абат дьо Сен-Пиер, подобно на други либерални мислители, е вярвал, че доброволната размяна е взаимноизгодна. Ако двама души се съгласят да разменят нещо, то е, защото и двамата чувстват, че печелят нещо, иначе не биха го направили.
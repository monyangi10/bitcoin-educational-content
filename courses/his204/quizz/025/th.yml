question: ทำไมการแลกเปลี่ยนจึงเป็นเกมที่มีผลรวมเป็นบวกเสมอและจำเป็น ตามที่ Abbé de Saint-Pierre กล่าว?
answer: หากชายสองคนเลือกที่จะทำสัญญาอย่างอิสระ นั่นเป็นเพราะพวกเขาแต่ละคนเห็นข้อดีในการทำเช่นนั้น
wrong_answers:
  - ยิ่งสินค้าถูกเปลี่ยนมือบ่อยเท่าไร ประเทศชาติก็ยิ่งร่ำรวยขึ้นเท่านั้น
  - ประเทศที่มีการค้าขายย่อมร่ำรวยกว่าประเทศที่อยู่ในภาวะพึ่งพาตนเองเสมอ
  - เพราะพระเจ้าต้องการ
explanation: |
  Abbé de Saint-Pierre เช่นเดียวกับนักคิดเสรีนิยมคนอื่น ๆ เชื่อว่าการแลกเปลี่ยนโดยสมัครใจนั้นเป็นประโยชน์ร่วมกัน หากคนสองคนตกลงที่จะแลกเปลี่ยนบางสิ่งบางอย่าง นั่นเป็นเพราะพวกเขาทั้งคู่รู้สึกว่าพวกเขาได้รับบางสิ่งบางอย่าง มิฉะนั้นพวกเขาจะไม่ทำมัน
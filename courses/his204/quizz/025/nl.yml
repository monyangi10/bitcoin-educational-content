question: Waarom is Exchange altijd en noodzakelijkerwijs een positief-somspel, volgens Abbé de Saint-Pierre?
answer: Als twee mannen er vrijwillig voor kiezen om een Contract aan te gaan, dan is dat omdat ze daar elk een voordeel in zien
wrong_answers:
  - Hoe vaker goederen van eigenaar wisselen, hoe rijker de natie wordt
  - Een natie die handel drijft is altijd rijker dan een natie die in autarkie leeft
  - Omdat God het wil
explanation: |
  De Abbé de Saint-Pierre geloofde, net als andere liberale denkers, dat vrijwillige Exchange wederzijds voordelig is. Als twee mensen overeenkomen om Exchange toe te passen, dan is dat omdat ze beiden het gevoel hebben dat ze er iets bij winnen, anders zouden ze het niet doen.
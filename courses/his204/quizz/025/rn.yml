question: Ni kuki ukuvugana yama kandi ari ngombwa ko ari umukino w'umwimbu mwiza, nk’uko Abbé de Saint-Pierre abivuga?
answer: Iyo abagabo babiri bahisemwo  mu mwidegemvyo, ni kuguhana amasezerano ni kubera ko umwe wese abona inyungu.
wrong_answers:
  - Uko ibintu bihinduka amaboko kenshi, ni ko ihanga rirushiriza kugira ubutunzi .
  - Ihanga ricuruza ryama ritunze kuruta iryo riba mu butegetsi bwite .
  - Kuko Imana ibigomba .
explanation: |
  Abbé de Saint-Pierre, cokimwe n’abandi biyumvira b’abanyagihugu, yarizera ko uguhanahana ku'bushake ari ngirakamaro kuri bose. Iyo abantu babiri bemeye ikintu, ni uko bompi bumva ko hari ico baronka, ahandi ho ntibari kubikora.
reviewed: true

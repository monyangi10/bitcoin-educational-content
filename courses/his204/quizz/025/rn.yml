question: Ni kuki Exchange yama kandi ari ngombwa ko ari umukino w’amahera meza, nk’uko Abbé de Saint-Pierre abivuga?
answer: Iyo abagabo babiri bahisemwo kwinjira muri Contract mu mwidegemvyo, ni kubera ko umwe wese abona akamaro ko kubigira .
wrong_answers:
  - Uko ibintu bihinduka amaboko kenshi, ni ko ihanga rirushiriza kugira ubutunzi .
  - Ihanga ricuruza ryama ritunze kuruta iryo riba mu butegetsi bwite .
  - Kuko Imana ibigomba .
explanation: |
  Abbé de Saint-Pierre, cokimwe n’abandi biyumvira b’abanyagihugu, yarizera ko Exchange y’ubushake ari ngirakamaro kuri bose. Iyo abantu babiri bemeye Exchange ikintu, ni uko bompi bumva ko hari ico baronka, ahandi ho ntibari kubikora.
question: 생피에르 수녀에 따르면 Exchange은 왜 항상, 그리고 반드시 포지티브섬 게임일까요?
answer: 두 남자가 자유롭게 Contract을 선택한다면, 그것은 각자가 그렇게 하는 것이 유리하다고 생각하기 때문입니다
wrong_answers:
  - 상품이 자주 바뀔수록 국가는 더 부유해집니다
  - 무역하는 국가는 자급자족하는 국가보다 항상 더 부유합니다
  - 하나님이 원하시니
explanation: |
  다른 자유주의 사상가들과 마찬가지로 생 피에르 수도원장은 자발적 Exchange가 상호 이익이 된다고 믿었습니다. 두 사람이 Exchange에 동의하는 것은 서로가 무언가를 얻는다고 느끼기 때문이지, 그렇지 않다면 그렇게 하지 않을 것이기 때문입니다.
question: Condillac, Fizyokratik okulun hangi üyesiyle şeylerin değerinin doğası üzerine tartışmıştır?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - Marki de Mirabeau
explanation: |
  Condillac, Le Trosne ile değerin doğasını tartışmış ve öznel bir değer teorisini savunmuştur.
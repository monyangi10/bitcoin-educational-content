question: С кой от членовете на физиократичната школа Кондилак разисква въпроса за естеството на стойността на нещата?
answer: Гийом-Франсоа Льо Тросн
wrong_answers:
  - Франсоа Кене
  - Пиер-Самюел Дюпон дьо Немур
  - Маркиз дьо Мирабо
explanation: |
  Кондиляк спори с Льо Тросн за естеството на стойността, като защитава субективната теория за стойността.
reviewed: true

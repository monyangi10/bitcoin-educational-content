question: Met welk lid van de Physiocratische school debatteerde Condillac over de aard van de waarde van dingen?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - De Markies van Mirabeau
explanation: |
  Condillac debatteerde met Le Trosne over de aard van waarde en verdedigde een subjectieve theorie van waarde.
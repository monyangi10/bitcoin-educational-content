question: Condillac ได้อภิปรายเกี่ยวกับธรรมชาติของมูลค่าของสิ่งต่าง ๆ กับสมาชิกคนใดของสำนักฟิสิโอแครต?
answer: กีโยม-ฟรองซัว เลอ ทรอสน
wrong_answers:
  - ฟร็องซัว เกซเน่
  - ปิแอร์-ซามูเอล ดูปองต์ เดอ เนอมูร์
  - มาร์ควิส เดอ มิราโบ
explanation: |
  Condillac โต้แย้งธรรมชาติของมูลค่ากับ Le Trosne โดยปกป้องทฤษฎีมูลค่าเชิงอัตวิสัย
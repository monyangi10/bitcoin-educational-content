question: Ni uwuhe munywanyi w’ishure rya Fiziyokarasi Condillac yagiranye impaka n’ingene agaciro k’ibintu kameze?
answer: Giyomu-Fransua Le Trosne
wrong_answers:
  - Fransuwa Kwesine
  - Piyeri-Samweli Dupont de Nemours
  - Umukuru w'igisagara ca Mirabeau
explanation: |
  Condillac yaraganiriye ku kamere k’agaciro na Le Trosne, arwanira inyigisho y’agaciro y’umuntu ku giti ciwe.
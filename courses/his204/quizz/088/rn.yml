question: Ni uwuhe munywanyi w’ishure rya Physiocracy Condillac yagiranye impari n’ingene agaciro k’ibintu kameze?
answer: Guillaume-François Le Trosne
wrong_answers:
  - François Quesnay
  - Pierre-Samuel Dupont de Nemours
  - The Marquis de Mirabeau
explanation: |
  Condillac yaraganiriye ku kamere k’agaciro na Le Trosne, arwanira inyigisho y’agaciro gatangwa n'umuntu ku giti ciwe.
reviewed: true

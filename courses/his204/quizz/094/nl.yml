question: Waarom maakt vrijheid mensen bang, volgens Condorcet?
answer: Omdat hij er te veel aan gewend is dat de overheid zich overal mee bemoeit..
wrong_answers:
  - Omdat het nog nooit is geprobeerd in Frankrijk
  - Omdat het een gewelddadige revolutie vereist
  - Omdat het synoniem is aan chaos
explanation: |
  Condorcet geloofde dat mensen gewend waren aan staatsinterventie en bang waren voor vrijheid, omdat ze niet wisten hoe ze die moesten gebruiken.
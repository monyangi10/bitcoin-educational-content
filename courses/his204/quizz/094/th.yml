question: ตามที่คอนดอร์เซต์กล่าว ทำไมเสรีภาพถึงทำให้ผู้คนหวาดกลัว?
answer: เพราะเขาคุ้นเคยกับการให้รัฐบาลเข้ามาแทรกแซงในทุกเรื่องมากเกินไป
wrong_answers:
  - เพราะมันไม่เคยถูกลองในฝรั่งเศส
  - เพราะมันต้องการการปฏิวัติที่รุนแรง
  - เพราะมันมีความหมายเหมือนกับความโกลาหล
explanation: |
  Condorcet เชื่อว่าผู้คนคุ้นเคยกับการแทรกแซงของรัฐและกลัวเสรีภาพ เพราะพวกเขาไม่รู้ว่าจะใช้มันอย่างไร
question: Според Кондорсе защо свободата плаши хората?
answer: Защото е свикнал да позволява на правителството да се намесва във всички въпроси
wrong_answers:
  - Защото никога не е била изпробвана във Франция
  - Защото това изисква насилствена революция
  - Защото е синоним на хаос
explanation: |
  Кондорсе смята, че хората са свикнали с държавната намеса и се страхуват от свободата, защото не знаят как да я използват.
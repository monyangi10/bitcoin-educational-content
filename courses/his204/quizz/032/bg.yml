question: Гурнай се бори за свободна търговия с две стоки
answer: Зърно и боядисано платно
wrong_answers:
  - Желязо и въглища
  - Вино и зърнени култури
  - Сол и тютюн
explanation: |
  Гурнай се обявява за либерализиране на търговията със зърно и платно, тъй като смята, че регулациите, които затрудняват тези сектори, са вредни за икономиката.
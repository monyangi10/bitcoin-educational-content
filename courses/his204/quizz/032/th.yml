question: Gournay ต่อสู้เพื่อการค้าเสรีในสินค้าสองประเภทโดยเฉพาะ
answer: ผ้าใบที่มีลายเมล็ดและทาสี
wrong_answers:
  - เหล็กและถ่านหิน
  - ไวน์และธัญพืช
  - เกลือและยาสูบ
explanation: |
  Gournay รณรงค์เพื่อการเปิดเสรีการค้าธัญพืชและผ้าใบ โดยเชื่อว่ากฎระเบียบที่ถ่วงภาคส่วนเหล่านี้เป็นอันตรายต่อเศรษฐกิจ
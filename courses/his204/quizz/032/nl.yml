question: Gournay vocht voor vrije handel in twee goederen in het bijzonder
answer: Korrel en beschilderd canvas
wrong_answers:
  - IJzer en steenkool
  - Wijn en granen
  - Zout en tabak
explanation: |
  Gournay voerde campagne voor de liberalisatie van de graan- en canvashandel, omdat hij van mening was dat de regelgeving die deze sectoren onder druk zette schadelijk was voor de economie.
question: Gournay yararwanije ubudandaji bw'umwidegemvyo mu bicuruzwa bibiri cane cane .
answer: Intete n'ibitambaro bisizwe irangi
wrong_answers:
  - Ivyuma n'amakara
  - Umuvinyu n'intete
  - Umunyu n'itabi .
explanation: |
  Gournay yararwanije bwo kwidegemvya kw’ubudandaji bw’intete n’ivy’impuzu, yizera ko amategeko aremera ivyo bice ari bibi ku butunzi.
reviewed: true

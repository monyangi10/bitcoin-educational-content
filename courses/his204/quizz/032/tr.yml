question: Gournay özellikle iki üründe serbest ticaret için mücadele etti
answer: Tahıl ve boyalı tuval
wrong_answers:
  - Demir ve kömür
  - Şarap ve tahıllar
  - Tuz ve tütün
explanation: |
  Gournay, tahıl ve kanvas ticaretinin serbestleştirilmesi için kampanya yürüttü ve bu sektörleri baskı altında tutan düzenlemelerin ekonomiye zarar verdiğine inandı.
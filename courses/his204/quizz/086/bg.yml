question: Коя идея е наречена софизъм на Монтен?
answer: Exchange е игра с нулева сума
wrong_answers:
  - Exchange е игра с положителна сума
  - В зависимост от времето и мястото обменът понякога е игра с нулева сума, а понякога - с положителна сума
  - Exchange винаги е в ущърб на по-слабата страна
explanation: |
  Заблудата на Монтен е идеята, че размяната е игра с нулева сума, т.е. това, което единият печели, другият губи. Тази идея е погрешна, тъй като доброволната размяна е взаимноизгодна.
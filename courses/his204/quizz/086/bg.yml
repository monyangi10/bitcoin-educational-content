question: Коя идея е наречена софизъм на Монтен?
answer: Размяната е игра с нулев резултат
wrong_answers:
  - Размяната е игра с положителен резултат
  - В зависимост от времето и мястото обменът понякога е игра с нулев резултат, а понякога - с положителен
  - Размяната винаги е в ущърб на по-слабата страна
explanation: |
  Заблудата на Монтен е идеята, че размяната е игра с нулев резултат, т.е. това, което единият печели, другият губи. Тази идея е погрешна, тъй като доброволната размяна е взаимноизгодна.
  reviewed: true

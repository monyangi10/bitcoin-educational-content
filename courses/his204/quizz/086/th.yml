question: แนวคิดใดที่ถูกเรียกว่าการโต้แย้งแบบซับซ้อนของมงแตญ?
answer: Exchange เป็นเกมผลรวมศูนย์
wrong_answers:
  - Exchange เป็นเกมผลรวมบวก
  - ขึ้นอยู่กับเวลาและสถานที่ การแลกเปลี่ยนบางครั้งเป็นเกมที่ผลรวมเป็นศูนย์ บางครั้งเป็นเกมที่ผลรวมเป็นบวก
  - Exchange มักจะไม่เป็นผลดีต่อฝ่ายที่อ่อนแอกว่าเสมอ
explanation: |
  ความเข้าใจผิดของมงแตญคือแนวคิดที่ว่าการแลกเปลี่ยนเป็นเกมที่ผลรวมเป็นศูนย์ กล่าวคือ สิ่งที่คนหนึ่งได้ อีกคนหนึ่งเสีย แนวคิดนี้เป็นเท็จ เพราะการแลกเปลี่ยนโดยสมัครใจนั้นเป็นประโยชน์ร่วมกัน
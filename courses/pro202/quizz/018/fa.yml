question: در قالب رمزگذاری DER برای امضاهای ECDSA، افزایش اندازه معمول از داده‌های خام امضا به امضای رمزگذاری شده نهایی چقدر است؟
answer: از ۶۴ بایت به تقریباً ۷۱-۷۲ بایت به دلیل سربار قالب‌بندی DER
wrong_answers:
  - از ۳۲ بایت به تقریباً ۶۴ بایت به دلیل کدگذاری مؤلفه‌های R و S
  - از ۶۴ بایت به طور دقیق ۱۲۸ بایت به دلیل رمزگذاری دوگانه اجزای امضا
  - از 71 بایت به تقریباً 64 بایت به دلیل فشرده‌سازی نشانگرهای توالی
explanation: |
  کدگذاری DER با افزودن سربار ساختاری به امضاهای ECDSA از طریق نشانگرهای توالی (0x30)، بایت‌های طول و پیشوندهای مؤلفه (0x02) انجام می‌شود. امضای خام ECDSA شامل دو مقدار 32 بایتی (R و S) است که در مجموع 64 بایت می‌شود، اما قالب‌بندی DER این مقدار را به حدود 71-72 بایت افزایش می‌دهد. این ناکارآمدی یکی از دلایلی بود که Bitcoin بعدها در Taproot امضاهای Schnorr را پذیرفت، که از امضاهای ثابت 64 بایتی بدون سربار کدگذاری استفاده می‌کند.
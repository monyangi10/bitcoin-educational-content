question: ECDSA हस्ताक्षरों के लिए DER एन्कोडिंग प्रारूप में, कच्चे हस्ताक्षर डेटा से अंतिम एन्कोडेड हस्ताक्षर तक आकार में सामान्य वृद्धि कितनी होती है?
answer: डीईआर फॉर्मेटिंग ओवरहेड के कारण आकार 64 बाइट्स से बढ़कर लगभग 71-72 बाइट्स हो जाता है।
wrong_answers:
  - R और S घटक एन्कोडिंग के कारण 32 बाइट्स से लगभग 64 बाइट्स तक।
  - हस्ताक्षर घटकों की दोहरी एन्कोडिंग के कारण 64 बाइट्स से ठीक 128 बाइट्स तक का आकार।
  - अनुक्रम मार्करों के संपीड़न के कारण आकार 71 बाइट्स से घटकर लगभग 64 बाइट्स हो गया है।
explanation: |
  DER एन्कोडिंग, अनुक्रम मार्करों (0x30), लंबाई बाइट्स और घटक उपसर्गों (0x02) के माध्यम से ECDSA हस्ताक्षरों में संरचनात्मक अतिरिक्त भार जोड़ती है। मूल ECDSA हस्ताक्षर में दो 32-बाइट मान (R और S) होते हैं, जिनका कुल आकार 64 बाइट्स होता है, लेकिन DER फ़ॉर्मेटिंग इसे लगभग 71-72 बाइट्स तक बढ़ा देती है। यह अक्षमता एक कारण थी जिसके चलते Bitcoin ने बाद में Taproot में श्नोर हस्ताक्षरों को अपनाया, जो एन्कोडिंग अतिरिक्त भार के बिना निश्चित 64-बाइट हस्ताक्षरों का उपयोग करते हैं।
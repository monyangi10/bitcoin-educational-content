question: ในรูปแบบการเข้ารหัส DER สำหรับลายเซ็น ECDSA ขนาดที่เพิ่มขึ้นโดยทั่วไปจากข้อมูลลายเซ็นดิบไปยังลายเซ็นที่เข้ารหัสสุดท้ายคือเท่าใด?
answer: จาก 64 ไบต์เป็นประมาณ 71-72 ไบต์เนื่องจากค่าใช้จ่ายส่วนเกินของการจัดรูปแบบ DER
wrong_answers:
  - จาก 32 ไบต์เป็นประมาณ 64 ไบต์เนื่องจากการเข้ารหัสส่วนประกอบ R และ S
  - จาก 64 ไบต์เป็น 128 ไบต์เนื่องจากการเข้ารหัสสองครั้งของส่วนประกอบลายเซ็น
  - จาก 71 ไบต์เป็นประมาณ 64 ไบต์เนื่องจากการบีบอัดของตัวบ่งชี้ลำดับ
explanation: |
  การเข้ารหัส DER เพิ่มโครงสร้างส่วนเกินให้กับลายเซ็น ECDSA ผ่านตัวบ่งชี้ลำดับ (0x30), ไบต์ความยาว, และคำนำหน้าส่วนประกอบ (0x02) ลายเซ็น ECDSA ดิบประกอบด้วยค่าสองค่า 32 ไบต์ (R และ S) รวมเป็น 64 ไบต์ แต่การจัดรูปแบบ DER ขยายนี้เป็นประมาณ 71-72 ไบต์ ความไม่มีประสิทธิภาพนี้เป็นหนึ่งในเหตุผลที่ Bitcoin ภายหลังนำลายเซ็น Schnorr มาใช้ใน Taproot ซึ่งใช้ลายเซ็นขนาด 64 ไบต์คงที่โดยไม่มีโครงสร้างส่วนเกินในการเข้ารหัส
question: 在 ECDSA 签名的 DER 编码格式中，从原始签名数据到最终编码签名的大小通常会增加多少？
answer: 由于 DER 格式化开销，从 64 字节增加到约 71-72 字节
wrong_answers:
  - 由于采用了 R 和 S 分量编码，从 32 字节增加到约 64 字节
  - 由于对签名组件进行了双重编码，从 64 字节变为整整 128 字节
  - 由于压缩了序列标记，从 71 字节减少到约 64 字节
explanation: |
  DER 编码通过序列标记 (0x30)、长度字节和组件前缀 (0x02) 增加了 ECDSA 签名的结构开销。原始 ECDSA 签名由两个 32 字节的值（R 和 S）组成，总计 64 字节，但 DER 格式将其扩展到约 71-72 字节。这种低效率是 Bitcoin 后来在 Taproot 中采用 Schnorr 签名的原因之一，Schnorr 签名使用固定的 64 字节签名，没有编码开销。
question: ECDSA署名のDERエンコーディング・フォーマットにおいて、生の署名データから最終的にエンコードされた署名までの典型的なサイズの増加はどの程度ですか？
answer: DERフォーマットのオーバーヘッドにより、64バイトから約71～72バイトへ
wrong_answers:
  - R成分とS成分のエンコードにより、32バイトから約64バイトへ
  - 署名コンポーネントの二重エンコーディングのため、64バイトから128バイトに変更。
  - シーケンスマーカーの圧縮により71バイトから約64バイトへ
explanation: |
  DERエンコーディングは、シーケンスマーカー(0x30)、長さバイト、およびコンポーネント接頭辞(0x02)を通じて、ECDSA署名に構造的なオーバーヘッドを追加する。生のECDSA署名は2つの32バイトの値（RとS）から構成され、合計64バイトであるが、DERフォーマットはこれを約71-72バイトに拡張する。この効率の悪さが、後にBitcoinがTaprootでエンコードのオーバーヘッドなしに固定64バイト署名を使用するSchnorr署名を採用した理由の1つである。
question: 在 ECDSA 簽章的 DER 編碼格式中，從原始簽章資料到最後的編碼簽章，通常會增加多少大小？
answer: 由於 DER 格式化開銷，從 64 位元組增加到約 71-72 位元組
wrong_answers:
  - 由於使用 R 和 S 元件編碼，從 32 位元組增加至約 64 位元組
  - 由於簽章元件的雙重編碼，從 64 位元組變成正好 128 位元組
  - 由於序列標記的壓縮，從 71 位元組減至約 64 位元組
explanation: |
  DER 編碼透過序列標記 (0x30)、長度位元組和元件前綴 (0x02) 增加 ECDSA 簽章的結構開銷。原始 ECDSA 簽署由兩個 32 位元組的值 (R 和 S) 組成，總計 64 位元組，但 DER 格式化會將其擴大到約 71-72 位元組。這種低效率是 Bitcoin 後來在 Taproot 中採用 Schnorr 簽署的原因之一，Schnorr 簽署使用固定的 64 位元組簽章，沒有編碼開銷。
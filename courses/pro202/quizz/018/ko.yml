question: ECDSA 서명을 위한 DER 인코딩 형식에서 원시 서명 데이터에서 최종 인코딩된 서명까지의 일반적인 크기 증가는 어느 정도인가요?
answer: DER 포맷 오버헤드로 인해 64바이트에서 약 71-72바이트로 증가합니다
wrong_answers:
  - R 및 S 컴포넌트 인코딩으로 인해 32바이트에서 약 64바이트로 증가
  - 서명 구성 요소의 이중 인코딩으로 인해 64바이트에서 정확히 128바이트가 됩니다
  - 시퀀스 마커의 압축으로 인해 71바이트에서 약 64바이트로 줄어듭니다
explanation: |
  DER 인코딩은 시퀀스 마커(0x30), 길이 바이트, 구성 요소 접두사(0x02)를 통해 ECDSA 서명에 구조적 오버헤드를 추가합니다. 원시 ECDSA 서명은 총 64바이트의 두 개의 32바이트 값(R과 S)으로 구성되지만, DER 포맷을 사용하면 약 71-72바이트로 확장됩니다. 이러한 비효율성 때문에 Bitcoin은 나중에 인코딩 오버헤드 없이 고정 64바이트 서명을 사용하는 슈노르 서명을 Taproot에 채택했습니다.
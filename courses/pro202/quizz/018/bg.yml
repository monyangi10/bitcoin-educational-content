question: Какво е типичното увеличение на размера от суровите данни за подписа до крайния кодиран подпис в DER формата за кодиране на ECDSA подписи?
answer: От 64 байта до приблизително 71-72 байта поради режийни разходи за форматиране на DER
wrong_answers:
  - От 32 байта до приблизително 64 байта поради кодирането на компонентите R и S
  - От 64 байта до точно 128 байта поради двойно кодиране на компонентите на подписа
  - От 71 байта до приблизително 64 байта поради компресиране на маркерите на последователността
explanation: |
  DER кодирането добавя структурни разходи към ECDSA подписите чрез маркери за последователност (0x30), байтове за дължина и компонентни префикси (0x02). Суровият ECDSA подпис се състои от две 32-байтови стойности (R и S) с обща дължина 64 байта, но DER форматирането го разширява до приблизително 71-72 байта. Тази неефективност е една от причините, поради които Bitcoin по-късно възприе подписите на Шнорр в Taproot, които използват фиксирани 64-байтови подписи без излишно кодиране.
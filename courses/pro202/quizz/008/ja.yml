question: 楕円曲線暗号において離散対数問題を計算不可能にしている数学的基礎とは？
answer: 点の加算を繰り返して環状群を生成する際の予測不可能な点の分布
wrong_answers:
  - X軸を横切る点を反映する楕円曲線の対称性
  - 実数の代わりに有限体において行われるモジュラー算術演算
  - 曲線方程式で場の特性として使われる大きな素数
explanation: |
  離散対数問題の難しさは、環状群（G、2G、3G、...、nG）を生成する際の点の分布が予測不可能で非線形であることに起因する。点は順次生成されるにもかかわらず、散在してランダムに見えるため、点P = sGからスカラーsを決定することは計算上不可能である。対称性、モジュラー演算、大きな素数は楕円曲線の重要な特性であるが、安全な公開鍵暗号を可能にする一方向性関数を直接作り出すものではない。
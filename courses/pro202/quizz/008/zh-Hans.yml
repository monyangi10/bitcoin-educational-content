question: 是什么数学基础使得离散对数问题在椭圆曲线密码学中计算不可行？
answer: 通过重复点相加生成循环群时不可预测的点分布
wrong_answers:
  - 椭圆曲线的对称特性，反映了横跨 x 轴的点
  - 在有限域而非实数中进行的模块算术运算
  - 曲线方程中用作场特征的大质数
explanation: |
  离散对数问题的难点在于生成循环群（G、2G、3G......、nG）时，点的分布是不可预测的、非线性的。尽管点是按顺序生成的，但它们看起来分散而随机，因此从点 P = sG 确定标量 s 在计算上是不可行的。虽然对称性、模块运算和大素数是椭圆曲线的重要特性，但它们并不能直接创建实现安全公钥加密的单向函数。
question: 是什麼數學基礎使得離散對數問題在橢圓曲線加密技術中在計算上不可行？
answer: 透過重複加點產生循環群時不可預測的點分佈
wrong_answers:
  - 橢圓曲線的對稱性質，反映出跨越 x 軸的點
  - 在有限域而非實數中執行的模組算術運算
  - 曲線公式中作為場特性的大素數
explanation: |
  離散對數問題的難度來自於產生循環群組 (G, 2G, 3G, ..., nG) 時，點的不可預測、非線性分佈。即使點是依序產生的，但它們看起來是分散且隨機的，因此要從點 P = sG 來判斷標量 s 在計算上是不可行的。雖然對稱、模數運算和大素數是橢圓曲線的重要屬性，但它們不會直接創造出可實現安全公開密碼匙加密的單向函數。
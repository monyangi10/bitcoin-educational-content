question: 타원 곡선 암호화에서 이산 로그 문제를 계산적으로 불가능하게 만드는 수학적 기반은 무엇인가요?
answer: 반복적인 포인트 합산을 통해 순환 그룹을 생성할 때 예측할 수 없는 포인트 분포
wrong_answers:
  - X축을 가로지르는 점을 반영하는 타원 커브의 대칭 속성
  - 실수 대신 유한 필드에서 수행되는 모듈식 산술 연산
  - 커브 방정식에서 필드 특성으로 사용되는 큰 소수입니다
explanation: |
  이산 로그 문제의 어려움은 순환군(G, 2G, 3G, ..., nG)을 생성할 때 예측할 수 없는 점의 비선형 분포에서 비롯됩니다. 점이 순차적으로 생성되더라도 점들이 흩어져 무작위로 나타나므로 점 P = sG에서 스칼라 s를 결정하는 것은 계산적으로 불가능합니다. 대칭성, 모듈식 산술, 큰 소수는 타원 곡선의 중요한 특성이지만, 안전한 공개 키 암호화를 가능하게 하는 단방향 함수를 직접 생성하지는 않습니다.
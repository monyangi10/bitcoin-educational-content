question: อะไรคือพื้นฐานทางคณิตศาสตร์ที่ทำให้ปัญหาลอการิทึมแบบไม่ต่อเนื่องมีความยากในการคำนวณในวิทยาการเข้ารหัสลับแบบเส้นโค้งวงรี?
answer: การกระจายตัวของจุดที่ไม่สามารถคาดเดาได้เมื่อสร้างกลุ่มเชิงวงจรผ่านการบวกจุดซ้ำ ๆ
wrong_answers:
  - สมบัติสมมาตรของเส้นโค้งวงรีที่สะท้อนจุดผ่านแกน x
  - การดำเนินการเลขคณิตแบบโมดูลาร์ที่ดำเนินการในฟิลด์จำกัดแทนที่จะเป็นจำนวนจริง
  - จำนวนเฉพาะขนาดใหญ่ที่ใช้เป็นลักษณะของฟิลด์ในสมการเส้นโค้ง
explanation: |
  ความยากของปัญหาลอการิทึมแบบไม่ต่อเนื่องเกิดจากการกระจายตัวของจุดที่ไม่สามารถคาดเดาได้และไม่เป็นเชิงเส้นเมื่อสร้างกลุ่มไซคลิก (G, 2G, 3G, ..., nG) แม้ว่าจุดจะถูกสร้างขึ้นตามลำดับ แต่พวกมันปรากฏกระจัดกระจายและสุ่ม ทำให้ไม่สามารถคำนวณได้ในการหาค่าสเกลาร์ s จากจุด P = sG ในขณะที่สมมาตร, เลขคณิตแบบโมดูลาร์, และจำนวนเฉพาะขนาดใหญ่เป็นคุณสมบัติที่สำคัญของเส้นโค้งวงรี แต่พวกมันไม่ได้สร้างฟังก์ชันทางเดียวที่ทำให้การเข้ารหัสกุญแจสาธารณะปลอดภัยโดยตรง
question: پایه ریاضی که مسئله لگاریتم گسسته را در رمزنگاری منحنی بیضوی از نظر محاسباتی غیرقابل حل می‌سازد چیست؟
answer: توزیع غیرقابل پیش‌بینی نقاط هنگام تولید یک گروه چرخه‌ای از طریق جمع مکرر نقاط
wrong_answers:
  - خاصیت تقارن منحنی‌های بیضوی که نقاط را نسبت به محور x بازتاب می‌دهد
  - عملیات حساب مدولار در میدان‌های متناهی به جای اعداد حقیقی انجام می‌شود.
  - عدد اول بزرگ استفاده شده به عنوان ویژگی میدان در معادله منحنی
explanation: |
  مشکل لگاریتم گسسته از توزیع غیرقابل پیش‌بینی و غیرخطی نقاط هنگام تولید یک گروه چرخه‌ای (G, 2G, 3G, ..., nG) ناشی می‌شود. حتی با اینکه نقاط به صورت متوالی تولید می‌شوند، به صورت پراکنده و تصادفی ظاهر می‌شوند، که تعیین اسکالر s از نقطه P = sG را به لحاظ محاسباتی غیرممکن می‌سازد. در حالی که تقارن، حساب مدولار و اعداد اول بزرگ از ویژگی‌های مهم منحنی‌های بیضوی هستند، آنها به طور مستقیم تابع یک‌طرفه‌ای که رمزنگاری کلید عمومی امن را ممکن می‌سازد، ایجاد نمی‌کنند.
question: Каква е математическата основа, която прави задачата за дискретния логаритъм изчислително неизпълнима в криптографията с елиптични криви?
answer: Непредсказуемото разпределение на точките при генериране на циклична група чрез многократно добавяне на точки
wrong_answers:
  - Свойството за симетрия на елиптичните криви, което отразява точките по оста x
  - Модулните аритметични операции, извършвани в крайни полета вместо в реални числа
  - Голямото просто число, използвано като характеристика на полето в уравнението на кривата
explanation: |
  Трудността на задачата за дискретния логаритъм се дължи на непредсказуемото, нелинейно разпределение на точките при генериране на циклична група (G, 2G, 3G, ..., nG). Въпреки че точките се генерират последователно, те изглеждат разпръснати и случайни, което прави определянето на скалара s от точка P = sG изчислително невъзможно. Въпреки че симетрията, модулната аритметика и големите първични числа са важни свойства на елиптичните криви, те не създават пряко еднопосочната функция, която позволява сигурна криптография с публичен ключ.
question: गणितीय आधार क्या है जिसके कारण अण्डाकार वक्र क्रिप्टोग्राफी में असतत लघुगणक समस्या गणनात्मक रूप से असंभव हो जाती है?
answer: बार-बार बिंदुओं को जोड़कर चक्रीय समूह बनाते समय बिंदुओं का अप्रत्याशित वितरण।
wrong_answers:
  - दीर्घवृत्तीय वक्रों का वह समरूपता गुण जो बिंदुओं को x-अक्ष के पार परावर्तित करता है
  - मॉड्यूलर अंकगणितीय संक्रियाएँ वास्तविक संख्याओं के बजाय परिमित क्षेत्रों में की जाती हैं।
  - वक्र समीकरण में क्षेत्र विशेषता के रूप में प्रयुक्त बड़ी अभाज्य संख्या
explanation: |
  डिस्क्रीट लॉगरिथम समस्या की कठिनाई चक्रीय समूह (G, 2G, 3G, ..., nG) उत्पन्न करते समय बिंदुओं के अप्रत्याशित, अरैखिक वितरण से उत्पन्न होती है। यद्यपि बिंदु क्रमिक रूप से उत्पन्न होते हैं, वे बिखरे हुए और यादृच्छिक प्रतीत होते हैं, जिससे बिंदु P = sG से अदिश s का निर्धारण करना गणनात्मक रूप से असंभव हो जाता है। यद्यपि समरूपता, मॉड्यूलर अंकगणित और बड़ी अभाज्य संख्याएँ दीर्घवृत्तीय वक्रों के महत्वपूर्ण गुण हैं, वे सीधे तौर पर एकतरफा फलन नहीं बनाते हैं जो सुरक्षित सार्वजनिक कुंजी क्रिप्टोग्राफी को सक्षम बनाता है।
question: Bitcoin का secp256k1 किस दीर्घवृत्तीय वक्र समीकरण का उपयोग करता है?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + ax + b
  - y² = x³ + 5
  - y² = x³ + x + 7
explanation: |
  Bitcoin विशेष रूप से secp256k1 दीर्घवृत्तीय वक्र का उपयोग करता है, जिसका सरलीकृत समीकरण y² = x³ + 7 है। यह सामान्य दीर्घवृत्तीय वक्र रूप y² = x³ + ax + b का एक विशेष मामला है, जहाँ a = 0 और b = 7 है। अन्य विकल्प गलत हैं: y² = x³ + ax + b सामान्य रूप है लेकिन Bitcoin का विशिष्ट वक्र नहीं है, y² = x³ + 5 में गलत स्थिरांक का उपयोग किया गया है, और y² = x³ + x + 7 में गलत तरीके से एक रैखिक x पद शामिल है जो secp256k1 में मौजूद नहीं है।
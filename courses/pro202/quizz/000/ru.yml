question: Какое уравнение эллиптической кривой использует secp256k1 в Bitcoin?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + ax + b
  - y² = x³ + 5
  - y² = x³ + x + 7
explanation: |
  В Bitcoin используется эллиптическая кривая secp256k1, которая имеет упрощенное уравнение y² = x³ + 7. Это частный случай общей формы эллиптической кривой y² = x³ + ax + b, где a = 0 и b = 7. Остальные варианты неверны: y² = x³ + ax + b - общая форма, но не для конкретной кривой Bitcoin, y² = x³ + 5 использует неверную константу, а y² = x³ + x + 7 неверно включает линейный член x, которого нет в secp256k1.
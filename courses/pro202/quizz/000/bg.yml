question: Какво уравнение на елиптичната крива използва secp256k1 на Bitcoin?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + ax + b
  - y² = x³ + 5
  - y² = x³ + x + 7
explanation: |
  Bitcoin използва елиптичната крива secp256k1, която има опростеното уравнение y² = x³ + 7. Това е специален случай на общата форма на елиптичната крива y² = x³ + ax + b, където a = 0 и b = 7. Другите варианти са неправилни: y² = x³ + ax + b е общата форма, но не и конкретната крива на Bitcoin, y² = x³ + 5 използва грешна константа, а y² = x³ + x + 7 неправилно включва линеен член x, който не съществува в secp256k1.
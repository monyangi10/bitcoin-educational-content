question: معادله منحنی بیضوی که Bitcoin از secp256k1 استفاده می‌کند چیست؟
answer: ²y = ³x + 7
wrong_answers:
  - y² = x³ + ax + b
  - y² = x³ + 5
  - y² = x³ + x + 7
explanation: |
  Bitcoin به طور خاص از منحنی بیضوی secp256k1 استفاده می‌کند که معادله ساده‌شده آن y² = x³ + 7 است. این یک حالت خاص از فرم کلی منحنی بیضوی y² = x³ + ax + b است که در آن a = 0 و b = 7 می‌باشد. گزینه‌های دیگر نادرست هستند: y² = x³ + ax + b فرم کلی است اما منحنی خاص Bitcoin نیست، y² = x³ + 5 از ثابت اشتباه استفاده می‌کند، و y² = x³ + x + 7 به اشتباه شامل یک جمله خطی x است که در secp256k1 وجود ندارد.
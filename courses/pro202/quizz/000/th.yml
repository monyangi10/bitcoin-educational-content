question: สมการเส้นโค้งวงรีที่ Bitcoin ใช้สำหรับ secp256k1 คืออะไร?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + ax + b
  - y² = x³ + 5
  - y² = x³ + x + 7
explanation: |
  Bitcoin ใช้เส้นโค้งวงรี secp256k1 โดยเฉพาะ ซึ่งมีสมการที่ง่ายขึ้นคือ y² = x³ + 7 นี่เป็นกรณีพิเศษของรูปแบบเส้นโค้งวงรีทั่วไป y² = x³ + ax + b ที่ a = 0 และ b = 7 ตัวเลือกอื่นๆ ไม่ถูกต้อง: y² = x³ + ax + b เป็นรูปแบบทั่วไปแต่ไม่ใช่เส้นโค้งเฉพาะของ Bitcoin, y² = x³ + 5 ใช้ค่าคงที่ผิด, และ y² = x³ + x + 7 รวมถึงพจน์เชิงเส้น x ที่ไม่มีอยู่ใน secp256k1 อย่างไม่ถูกต้อง
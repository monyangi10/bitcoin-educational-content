question: В процеса на проверка на подписа ECDSA коя математическа зависимост трябва да е вярна, за да се счита подписът за валиден?
answer: Координатата x на UG + VP трябва да е равна на R, където U = Z/S и V = R/S
wrong_answers:
  - Координатата y на UG + VP трябва да е равна на S, където U = R/Z и V = S/Z
  - X-координатата на KG + ZP трябва да е равна на S, където K е нонсе, а Z е хеш
  - Сумата от R + S трябва да е равна на x-координатата на точката на публичния ключ P
explanation: |
  Проверката на ECDSA работи чрез възстановяване на оригиналната точка KG чрез уравнението UG + VP, където U = Z/S (хеш, разделен на S) и V = R/S. Ако координатата x на тази реконструирана точка е равна на R от подписа, проверката е успешна. Тази математическа зависимост позволява проверка, без да се знае частният ключ или нонсенсът K, тъй като алгебрата реконструира KG косвено чрез компонентите на публичния ключ и подписа.
question: В процессе проверки подписи ECDSA какое математическое соотношение должно выполняться, чтобы подпись считалась действительной?
answer: Координата х UG + VP должна быть равна R, где U = Z/S и V = R/S
wrong_answers:
  - Координата y UG + VP должна быть равна S, где U = R/Z и V = S/Z
  - Координата x из KG + ZP должна быть равна S, где K - нецель, а Z - хэш
  - Сумма R + S должна быть равна x-координате точки открытого ключа P
explanation: |
  Проверка ECDSA осуществляется путем восстановления исходной точки KG по уравнению UG + VP, где U = Z/S (хэш, деленный на S) и V = R/S. Если координата x этой реконструированной точки равна R из подписи, проверка проходит успешно. Эта математическая зависимость позволяет проводить проверку без знания закрытого ключа или нонса K, поскольку алгебра восстанавливает KG опосредованно через компоненты открытого ключа и подписи.
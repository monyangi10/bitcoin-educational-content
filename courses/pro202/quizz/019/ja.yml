question: ECDSAの署名検証プロセスにおいて、署名が有効とみなされるためには、どのような数学的関係が成立しなければならないか。
answer: UG＋VPのx座標はRに等しくなければならない（U＝Z/S、V＝R/S）。
wrong_answers:
  - UG＋VPのy座標はSに等しくなければならない。
  - KG＋ZPのx座標はSに等しくなければならない。Kはノンス、Zはハッシュである。
  - R＋Sの和は、公開鍵点Pのx座標に等しくなければならない。
explanation: |
  ここで、U = Z/S（ハッシュをSで割ったもの）、V = R/Sである。この再構成された点のx座標が署名のRと等しい場合、検証は成功する。この数学的関係により、秘密鍵やノンスKを知らなくても検証を行うことが できる。
question: ईसीडीएसए हस्ताक्षर सत्यापन प्रक्रिया में, किसी हस्ताक्षर को वैध माने जाने के लिए कौन सा गणितीय संबंध सत्य होना चाहिए?
answer: UG + VP का x-निर्देशांक R के बराबर होना चाहिए, जहाँ U = Z/S और V = R/S है।
wrong_answers:
  - UG + VP का y-निर्देशांक S के बराबर होना चाहिए, जहाँ U = R/Z और V = S/Z है।
  - KG + ZP का x-निर्देशांक S के बराबर होना चाहिए, जहाँ K नॉनस है और Z हैश है।
  - R + S का योग सार्वजनिक कुंजी बिंदु P के x-निर्देशांक के बराबर होना चाहिए।
explanation: |
  ECDSA सत्यापन मूल बिंदु KG को समीकरण UG + VP के माध्यम से पुनर्निर्मित करके कार्य करता है, जहाँ U = Z/S (हैश को S से विभाजित करने पर प्राप्त मान) और V = R/S है। यदि इस पुनर्निर्मित बिंदु का x-निर्देशांक हस्ताक्षर से प्राप्त R के बराबर है, तो सत्यापन सफल होता है। यह गणितीय संबंध निजी कुंजी या नॉनस K को जाने बिना सत्यापन की अनुमति देता है, क्योंकि बीजगणित सार्वजनिक कुंजी और हस्ताक्षर घटकों के माध्यम से KG को अप्रत्यक्ष रूप से पुनर्निर्मित करता है।
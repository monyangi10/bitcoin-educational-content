question: در فرآیند تأیید امضای ECDSA، چه رابطه ریاضی باید برقرار باشد تا یک امضا معتبر تلقی شود؟
answer: مختصات x از UG + VP باید برابر با R باشد، جایی که U = Z/S و V = R/S
wrong_answers:
  - مختصات y از UG + VP باید برابر S باشد، جایی که U = R/Z و V = S/Z
  - مختصات x از KG + ZP باید برابر با S باشد، جایی که K نانس و Z هش است.
  - مجموع R + S باید برابر با مختصات x نقطه کلید عمومی P باشد
explanation: |
  تأیید ECDSA با بازسازی نقطه اصلی KG از طریق معادله UG + VP کار می‌کند، جایی که U = Z/S (هش تقسیم بر S) و V = R/S است. اگر مختصات x این نقطه بازسازی‌شده برابر با R از امضا باشد، تأیید موفقیت‌آمیز است. این رابطه ریاضی امکان تأیید را بدون دانستن کلید خصوصی یا nonce K فراهم می‌کند، زیرا جبر به طور غیرمستقیم KG را از طریق کلید عمومی و اجزای امضا بازسازی می‌کند.
question: ECDSA 서명 검증 프로세스에서 서명이 유효한 것으로 간주되려면 어떤 수학적 관계가 성립해야 하나요?
answer: UG + VP의 x 좌표는 R과 같아야 하며, 여기서 U = Z/S, V = R/S입니다
wrong_answers:
  - UG + VP의 y 좌표는 S와 같아야 하며, 여기서 U = R/Z, V = S/Z여야 합니다
  - KG + ZP의 x 좌표는 S와 같아야 하며, 여기서 K는 논스이고 Z는 해시입니다
  - R + S의 합은 공개 키 포인트 P의 x 좌표와 같아야 합니다
explanation: |
  ECDSA 검증은 UG + VP 방정식을 통해 원래 포인트 KG를 재구성하는 방식으로 작동하며, 여기서 U = Z/S(해시를 S로 나눈 값) 및 V = R/S입니다. 이렇게 재구성된 점의 x 좌표가 서명의 R과 같으면 검증에 성공하는 것입니다. 이 수학적 관계는 대수가 공개 키와 서명 구성 요소를 통해 간접적으로 KG를 재구성하기 때문에 개인 키나 논스 K를 몰라도 검증이 가능합니다.
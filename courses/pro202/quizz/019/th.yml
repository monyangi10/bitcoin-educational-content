question: ในกระบวนการตรวจสอบลายเซ็น ECDSA ความสัมพันธ์ทางคณิตศาสตร์ใดที่ต้องเป็นจริงเพื่อลายเซ็นจะถือว่าใช้ได้?
answer: พิกัด x ของ UG + VP ต้องเท่ากับ R โดยที่ U = Z/S และ V = R/S
wrong_answers:
  - พิกัด y ของ UG + VP ต้องเท่ากับ S โดยที่ U = R/Z และ V = S/Z
  - พิกัด x ของ KG + ZP ต้องเท่ากับ S โดยที่ K คือ nonce และ Z คือ hash
  - ผลรวมของ R + S ต้องเท่ากับพิกัด x ของจุดกุญแจสาธารณะ P
explanation: |
  การตรวจสอบ ECDSA ทำงานโดยการสร้างจุด KG ดั้งเดิมขึ้นใหม่ผ่านสมการ UG + VP โดยที่ U = Z/S (แฮชหารด้วย S) และ V = R/S หากพิกัด x ของจุดที่สร้างขึ้นใหม่นี้เท่ากับ R จากลายเซ็น การตรวจสอบจะสำเร็จ ความสัมพันธ์ทางคณิตศาสตร์นี้ช่วยให้สามารถตรวจสอบได้โดยไม่ต้องรู้กุญแจส่วนตัวหรือ nonce K เนื่องจากพีชคณิตสร้าง KG ขึ้นใหม่ทางอ้อมผ่านกุญแจสาธารณะและส่วนประกอบของลายเซ็น
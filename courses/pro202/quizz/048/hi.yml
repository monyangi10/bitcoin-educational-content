question: यदि किसी भी स्तर पर हैश की संख्या विषम हो तो लेन-देन से मर्कल ट्री का निर्माण करते समय क्या होता है?
answer: अंतिम हैश को दोहराया जाता है ताकि अगले स्तर के लिए सम संख्या में जोड़े बन सकें।
wrong_answers:
  - अंतिम हैश को बिना पेयरिंग के अगले स्तर पर अपरिवर्तित रूप से ले जाया जाता है।
  - पेयरिंग को पूरा करने के लिए अंतिम हैश को उस स्तर के पहले हैश के साथ XOR किया जाता है।
  - अंतिम हैश को एक नल हैश (सभी शून्य) के साथ मिलाकर अंतिम जोड़ी बनाई जाती है।
explanation: |
  Bitcoin के मर्कल ट्री निर्माण के लिए प्रत्येक स्तर पर हैशों की जोड़ी बनाना आवश्यक है। विषम संख्या होने पर, प्रोटोकॉल उचित जोड़ी सुनिश्चित करने के लिए अंतिम हैश को विशेष रूप से दोहराता है। इससे ट्री की बाइनरी संरचना बनी रहती है और निश्चित रूट गणना सुनिश्चित होती है। अन्य विकल्प Bitcoin के सर्वसम्मति नियमों के साथ संगतता भंग कर देंगे और समान लेनदेन सेट के लिए अलग-अलग मर्कल रूट बना देंगे।
question: トランザクションからメルクルツリーを構築する際、どのレベルでもハッシュの数が奇数の場合はどうなるのか？
answer: 最後のハッシュは、次のレベルのために偶数のペアを作るために複製される。
wrong_answers:
  - 最後のハッシュはペアリングされることなく、そのまま次のレベルに持ち越される。
  - 最後のハッシュは、そのレベルの最初のハッシュとXORされ、ペアリングが完了する。
  - 最後のハッシュはヌルハッシュ（すべてゼロ）と組み合わされ、最終的なペアとなる。
explanation: |
  Bitcoinのメルクルツリー構築では、各レベルでハッシュをペアリングする必要がある。奇数が存在する場合、プロトコルは特に最後のハッシュを複製し、適切なペアリングを保証する。これにより、ツリーのバイナリ構造が維持され、決定論的なルート計算が保証される。他のオプションはBitcoinのコンセンサスルールとの互換性を破り、同一のトランザクションセットに対して異なるMerkleのルートを作成することになる。
question: Какво се случва при конструирането на дърво на Меркъл от транзакции, ако броят на хешовете на всяко ниво е нечетен?
answer: Последният хеш се дублира, за да се създаде четен брой двойки за следващото ниво
wrong_answers:
  - Последният хеш се пренася непроменен на следващото ниво без сдвояване
  - Последният хеш се XOR-ва с първия хеш от това ниво, за да се завърши сдвояването
  - Последният хеш се комбинира с нулев хеш (всички нули), за да се създаде крайната двойка
explanation: |
  Конструкцията на дървото на Меркъл в Bitcoin изисква сдвояване на хешове на всяко ниво. Когато има нечетен брой, протоколът специално дублира последния хеш, за да осигури правилно сдвояване. По този начин се запазва двоичната структура на дървото и се осигурява детерминирано изчисляване на корена. Другите варианти биха нарушили съвместимостта с правилата за консенсус на Bitcoin и биха създали различни корени на Merkle за идентични набори от транзакции.
question: What happens when constructing a Merkle tree from transactions if the number of hashes at any level is odd?
answer: The last hash is duplicated to create an even number of pairs for the next level
wrong_answers:
  - The last hash is carried forward unchanged to the next level without pairing
  - The last hash is XORed with the first hash of that level to complete the pairing
  - The last hash is combined with a null hash (all zeros) to create the final pair
explanation: |
  Bitcoin's Merkle tree construction requires pairing hashes at each level. When an odd number exists, the protocol specifically duplicates the last hash to ensure proper pairing. This maintains the tree's binary structure and ensures deterministic root calculation. The other options would break compatibility with Bitcoin's consensus rules and create different Merkle roots for identical transaction sets.

question: 从事务构建梅克尔树时，如果任何一级的哈希值数量是奇数，会发生什么情况？
answer: 重复最后一个哈希值，为下一级创建偶数对
wrong_answers:
  - 最后一个哈希值将原封不动地转入下一级，不会配对
  - 最后一个哈希值与该层的第一个哈希值进行 XOR，以完成配对
  - 最后一个哈希值与一个空哈希值（全为 0）结合，生成最终的一对哈希值对
explanation: |
  Bitcoin 的梅克尔树构造要求在每一级都配对哈希值。当存在奇数时，协议会特别复制最后一个哈希值，以确保正确配对。这样可以保持树的二进制结构，确保确定性的根计算。其他选项会破坏与 Bitcoin 共识规则的兼容性，并为相同的交易集创建不同的梅克尔根。
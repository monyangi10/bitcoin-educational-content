question: 트랜잭션에서 머클 트리를 구성할 때 어떤 레벨의 해시 수가 홀수인 경우 어떻게 되나요?
answer: 마지막 해시는 복제되어 다음 레벨을 위한 짝수 쌍을 생성합니다
wrong_answers:
  - 마지막 해시는 페어링하지 않고 다음 단계로 변경 없이 이월됩니다
  - 마지막 해시는 해당 레벨의 첫 번째 해시와의 XOR을 통해 페어링을 완료합니다
  - 마지막 해시는 널 해시(모두 0)와 결합하여 최종 쌍을 생성합니다
explanation: |
  Bitcoin의 머클 트리 구조는 각 레벨에서 해시를 페어링해야 합니다. 홀수가 존재하면 프로토콜은 특히 마지막 해시를 복제하여 적절한 페어링을 보장합니다. 이렇게 하면 트리의 이진 구조를 유지하고 결정론적 루트 계산을 보장할 수 있습니다. 다른 옵션은 Bitcoin의 합의 규칙과의 호환성을 깨고 동일한 트랜잭션 세트에 대해 서로 다른 머클 루트를 생성할 수 있습니다.
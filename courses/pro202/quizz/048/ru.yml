question: Что произойдет при построении дерева Меркла из транзакций, если количество хэшей на любом уровне будет нечетным?
answer: Последний хэш дублируется, чтобы создать четное количество пар для следующего уровня
wrong_answers:
  - Последний хэш переносится без изменений на следующий уровень без сопряжения
  - Последний хэш XOR считывается с первым хэшем этого уровня, чтобы завершить сопряжение
  - Последний хэш объединяется с нулевым хэшем (все нули), чтобы создать финальную пару
explanation: |
  Построение дерева Меркла в Bitcoin требует сопряжения хэшей на каждом уровне. При наличии нечетного числа протокол специально дублирует последний хэш, чтобы обеспечить правильное сопряжение. Это поддерживает бинарную структуру дерева и обеспечивает детерминированное вычисление корня. Другие варианты нарушают совместимость с правилами консенсуса Bitcoin и создают разные корни дерева Меркла для одинаковых наборов транзакций.
question: وقتی که در ساخت یک درخت مرکل از تراکنش‌ها تعداد هش‌ها در هر سطح فرد باشد، چه اتفاقی می‌افتد؟
answer: آخرین هش تکرار می‌شود تا تعداد زوج‌ها برای سطح بعدی زوج شود.
wrong_answers:
  - آخرین هش بدون جفت شدن به سطح بعدی منتقل می‌شود.
  - آخرین هش با اولین هش آن سطح XOR می‌شود تا جفت‌سازی کامل شود.
  - هش آخر با یک هش نال (همه صفرها) ترکیب می‌شود تا جفت نهایی ایجاد شود.
explanation: |
  ساختار درخت مرکل در Bitcoin نیاز به جفت‌سازی هش‌ها در هر سطح دارد. زمانی که تعداد فردی وجود دارد، پروتکل به‌طور خاص آخرین هش را تکرار می‌کند تا جفت‌سازی صحیح را تضمین کند. این کار ساختار دودویی درخت را حفظ کرده و محاسبه ریشه‌ی قطعی را تضمین می‌کند. گزینه‌های دیگر با قوانین اجماع Bitcoin ناسازگار بوده و ریشه‌های مرکل متفاوتی برای مجموعه‌های تراکنش یکسان ایجاد می‌کنند.
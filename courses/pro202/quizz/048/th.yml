question: จะเกิดอะไรขึ้นเมื่อสร้างต้นไม้ Merkle จากธุรกรรมหากจำนวนแฮชในระดับใด ๆ เป็นเลขคี่?
answer: แฮชสุดท้ายถูกทำซ้ำเพื่อสร้างจำนวนคู่ที่เท่ากันสำหรับระดับถัดไป
wrong_answers:
  - แฮชสุดท้ายจะถูกนำไปข้างหน้าโดยไม่เปลี่ยนแปลงไปยังระดับถัดไปโดยไม่จับคู่
  - แฮชสุดท้ายจะถูก XOR กับแฮชแรกของระดับนั้นเพื่อทำการจับคู่ให้สมบูรณ์
  - แฮชสุดท้ายจะถูกรวมกับแฮช null (ทั้งหมดเป็นศูนย์) เพื่อสร้างคู่สุดท้าย
explanation: |
  การสร้างต้นไม้ Merkle ของ Bitcoin ต้องการการจับคู่แฮชในแต่ละระดับ เมื่อมีจำนวนคี่ โปรโตคอลจะทำการคัดลอกแฮชสุดท้ายโดยเฉพาะเพื่อให้แน่ใจว่ามีการจับคู่ที่ถูกต้อง ซึ่งจะรักษาโครงสร้างแบบทวิภาคของต้นไม้และทำให้มั่นใจได้ว่าการคำนวณรากจะเป็นแบบกำหนดได้ ตัวเลือกอื่น ๆ จะทำให้เกิดความไม่เข้ากันกับกฎฉันทามติของ Bitcoin และสร้างราก Merkle ที่แตกต่างกันสำหรับชุดธุรกรรมที่เหมือนกัน
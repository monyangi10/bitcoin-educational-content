question: 如果任何層級的雜湊數都是奇數，從交易建構 Merkle 樹時會發生什麼情況？
answer: 最後一個散列會重複，以便為下一層建立偶數對
wrong_answers:
  - 最後一個雜湊會原封不動地傳到下一層，不會進行配對。
  - 最後一個切細值與該層級的第一個切細值進行 XOR，以完成配對。
  - 最後一個切細值會與一個空切細值 (全為零) 結合，以建立最終的資料對
explanation: |
  Bitcoin 的 Merkle 樹狀結構需要在每一層配對切細值。當存在奇數時，協定會特別複製最後一個哈希值，以確保正確配對。這樣可以維持樹的二進位結構，並確保根計算的確切性。其他選項會破壞與 Bitcoin 共識規則的相容性，並為相同的交易集建立不同的 Merkle 根。
question: लेनदेन निर्माण के दौरान P2SH इनपुट के लिए हस्ताक्षर उत्पन्न करते समय, sighash गणना प्रक्रिया में किस स्क्रिप्ट का उपयोग किया जाना चाहिए?
answer: scriptPubKey के स्थान पर रिडीम स्क्रिप्ट का उपयोग किया जाना चाहिए।
wrong_answers:
  - हैश युक्त मूल स्क्रिप्टपबकी का सीधे उपयोग किया जाना चाहिए।
  - scriptPubKey और redeem स्क्रिप्ट दोनों का संयोजन उपयोग किया जाना चाहिए।
  - इसके बजाय अनलॉकिंग डेटा युक्त ScriptSig का उपयोग किया जाना चाहिए।
explanation: |
  P2SH सिग्नेचर जनरेशन के दौरान, sighash प्रक्रिया में scriptPubKey के स्थान पर redeem स्क्रिप्ट का उपयोग करना आवश्यक है। यह महत्वपूर्ण है क्योंकि scriptPubKey में केवल redeem स्क्रिप्ट का हैश होता है, वास्तविक खर्च की शर्तें नहीं। redeem स्क्रिप्ट में वास्तविक लॉजिक (जैसे मल्टीसिग आवश्यकताएँ) होता है जो यह निर्धारित करता है कि आउटपुट को कैसे खर्च किया जा सकता है, इसलिए सिग्नेचर को वैध होने के लिए इस मूल स्क्रिप्ट के विरुद्ध जनरेट किया जाना चाहिए। सीधे scriptPubKey का उपयोग करने पर यह विफल हो जाएगा क्योंकि इसमें केवल हैश तुलना होती है, वास्तविक खर्च की शर्तें नहीं जिन्हें पूरा किया जाना आवश्यक है।
question: トランザクション構築中にP2SH入力の署名を生成する場合、サイアシ計算プロセスではどのスクリプトを使用しなければなりませんか？
answer: redeemスクリプトは、scriptPubKeyの代わりに使用する必要があります。
wrong_answers:
  - ハッシュを含む元のscriptPubKeyを直接使用しなければならない。
  - scriptPubKeyとredeemスクリプトの両方を使用する必要があります。
  - ロック解除データを含むScriptSigを代わりに使用する必要があります。
explanation: |
  P2SH署名生成の際、sighash処理ではscriptPubKeyの代わりにredeemスクリプトを使用する必要がある。なぜなら、scriptPubKeyはredeemスクリプトのハッシュを含むだけであり、 実際の使用条件を含まないからである。redeemスクリプトには、出力をどのように使用できるかを決定する実際のロジック（マルチシグ要件など）が含まれているため、署名を有効にするには、この基礎となるスクリプトに対して生成する必要があります。scriptPubKey を直接使用すると、ハッシュ比較のみが含まれ、満たす必要のある 実際の使用条件は含まれないため、失敗します。
question: هنگام تولید امضاها برای ورودی P2SH در طول ساخت تراکنش، از چه اسکریپتی باید در فرآیند محاسبه sighash استفاده شود؟
answer: اسکریپت بازخرید باید به جای scriptPubKey استفاده شود
wrong_answers:
  - اسکریپت اصلی scriptPubKey حاوی هش باید به‌طور مستقیم استفاده شود
  - ترکیبی از هر دو scriptPubKey و redeem script باید استفاده شود
  - در عوض باید از ScriptSig که حاوی داده‌های بازگشایی است استفاده شود.
explanation: |
  در طول تولید امضای P2SH، فرآیند sighash نیاز به استفاده از اسکریپت بازخرید به جای scriptPubKey دارد. این امر حیاتی است زیرا scriptPubKey تنها شامل هش اسکریپت بازخرید است، نه شرایط واقعی خرج کردن. اسکریپت بازخرید شامل منطق واقعی (مانند الزامات چند امضایی) است که تعیین می‌کند چگونه خروجی می‌تواند خرج شود، بنابراین امضاها باید در برابر این اسکریپت زیربنایی تولید شوند تا معتبر باشند. استفاده مستقیم از scriptPubKey شکست خواهد خورد زیرا تنها شامل مقایسه هش است، نه شرایط واقعی خرج کردن که باید برآورده شوند.
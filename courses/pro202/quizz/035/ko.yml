question: 트랜잭션 구성 중 P2SH 입력에 대한 서명을 생성할 때, 시게시 계산 프로세스에서 어떤 스크립트를 사용해야 하나요?
answer: 리딤 스크립트는 스크립트PubKey 대신 사용해야 합니다
wrong_answers:
  - 해시가 포함된 원본 스크립트PubKey를 직접 사용해야 합니다
  - 스크립트PubKey와 리딤 스크립트를 모두 사용해야 합니다
  - 잠금 해제 데이터가 포함된 ScriptSig를 대신 사용해야 합니다
explanation: |
  P2SH 서명을 생성하는 동안 sighash 프로세스에서는 스크립트PubKey 대신 리딤 스크립트를 사용해야 합니다. 이는 스크립트PubKey에 실제 지출 조건이 아닌 리딤 스크립트의 해시만 포함하기 때문에 매우 중요합니다. 사용 스크립트에는 출력을 사용할 수 있는 방법을 결정하는 실제 로직(다중 서명 요구 사항 등)이 포함되어 있으므로 서명이 유효하려면 이 기본 스크립트에 대해 서명을 생성해야 합니다. 스크립트PubKey를 직접 사용하면 충족해야 하는 실제 지출 조건이 아닌 해시 비교만 포함하므로 실패할 수 있습니다.
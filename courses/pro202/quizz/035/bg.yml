question: При генериране на подписи за вход P2SH по време на конструирането на транзакция, какъв скрипт трябва да се използва в процеса на изчисляване на Sighash?
answer: Скриптът за изкупуване трябва да се използва вместо scriptPubKey
wrong_answers:
  - Оригиналният scriptPubKey, съдържащ хеша, трябва да се използва директно
  - Трябва да се използва комбинация от scriptPubKey и redeem script
  - Вместо това трябва да се използва ScriptSig, съдържащ данните за отключване
explanation: |
  По време на генерирането на подпис P2SH процесът sighash изисква използването на скрипта redeem вместо scriptPubKey. Това е от решаващо значение, тъй като скриптът scriptPubKey съдържа само хеша на скрипта redeem, а не действителните условия за изразходване на средства. Скриптът за изкупуване съдържа реалната логика (като например изискванията за многозначност), която определя как може да се изразходва продукцията, така че подписите трябва да бъдат генерирани спрямо този скрипт, за да бъдат валидни. Директното използване на scriptPubKey би било неуспешно, тъй като то съдържа само сравнение на хеш, а не действителните условия за изразходване, които трябва да бъдат изпълнени.
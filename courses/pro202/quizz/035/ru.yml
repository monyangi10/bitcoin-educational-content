question: При создании подписей для входа P2SH во время построения транзакции, какой сценарий должен использоваться в процессе расчета sighash?
answer: Вместо scriptPubKey должен быть использован скрипт redeem
wrong_answers:
  - Оригинальный scriptPubKey, содержащий хэш, должен использоваться напрямую
  - Необходимо использовать комбинацию scriptPubKey и redeem script
  - Вместо него следует использовать ScriptSig, содержащий данные для разблокировки
explanation: |
  При генерации подписи P2SH процесс sighash требует использования скрипта redeem вместо scriptPubKey. Это очень важно, потому что scriptPubKey содержит только хэш скрипта redeem, а не фактические условия расходования. Скрипт redeem содержит реальную логику (например, требования мультисиг), которая определяет, как можно потратить вывод, поэтому подписи должны быть сгенерированы против этого базового скрипта, чтобы быть действительными. Использование scriptPubKey напрямую будет неудачным, поскольку он содержит только сравнение хэша, а не фактические условия расходования средств, которые должны быть выполнены.
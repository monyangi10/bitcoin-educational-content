question: เมื่อสร้างลายเซ็นสำหรับอินพุต P2SH ระหว่างการสร้างธุรกรรม สคริปต์ใดที่ต้องใช้ในกระบวนการคำนวณ sighash?
answer: สคริปต์การแลกจะต้องถูกใช้แทนที่ scriptPubKey
wrong_answers:
  - สคริปต์PubKey ดั้งเดิมที่มีแฮชต้องถูกใช้งานโดยตรง
  - การรวมกันของทั้ง scriptPubKey และ redeem script ต้องถูกใช้
  - ScriptSig ที่มีข้อมูลการปลดล็อกต้องถูกใช้แทน
explanation: |
  ในระหว่างการสร้างลายเซ็น P2SH กระบวนการ sighash จำเป็นต้องใช้ redeem script แทน scriptPubKey ซึ่งเป็นสิ่งสำคัญเพราะ scriptPubKey มีเพียงแฮชของ redeem script ไม่ใช่เงื่อนไขการใช้จ่ายจริงๆ redeem script มีตรรกะจริง (เช่น ข้อกำหนด multisig) ที่กำหนดวิธีการใช้จ่าย output ดังนั้นลายเซ็นต้องถูกสร้างขึ้นกับสคริปต์พื้นฐานนี้เพื่อให้ถูกต้อง การใช้ scriptPubKey โดยตรงจะล้มเหลวเพราะมีเพียงการเปรียบเทียบแฮช ไม่ใช่เงื่อนไขการใช้จ่ายจริงที่ต้องปฏิบัติตาม
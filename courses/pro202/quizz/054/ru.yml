question: Какое условие должно быть выполнено в процессе рукопожатия сети Bitcoin с P2P, чтобы два узла начали активно передавать данные о запасах и транзакциях?
answer: Оба узла должны обмениваться друг с другом сообщениями version и verack
wrong_answers:
  - Подключающийся узел должен получить подтверждение DNS seed от разработчиков ядра
  - "Оба узла должны проверить высоту блока и хэш вершины цепи друг друга"
  - "Принимающий узел должен подтвердить сертификат аналога соединяющегося узла"
explanation: |
  Рукопожатие Bitcoin P2P требует двунаправленного обмена, при котором соединяющийся узел посылает сообщение версии, получатель отвечает сообщением verack и своей версией, а первоначальный отправитель отвечает своим verack. Только после этого полного обмена четырьмя сообщениями (версия→verack+версия→verack) узлы могут начать активное взаимодействие. DNS-семена используются только для первоначального обнаружения пиров, но не для рукопожатия. Bitcoin не использует сертификаты, и проверка цепочки происходит после установления соединения.
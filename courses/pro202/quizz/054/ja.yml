question: BitcoinのP2Pネットワーク・ハンドシェーク・プロセスにおいて、2つのノードが在庫と取引データのアクティブな中継を開始する前に、どのような特定の条件を満たさなければならないか？
answer: 両ノードは互いにバージョンとverackメッセージを交換しなければならない。
wrong_answers:
  - 接続ノードはコア開発者から DNS seed の確認を受けなければならない。
  - "両ノードは互いのブロックの高さとチェーンの先端ハッシュを検証しなければならない"
  - 「受信ノードは、接続ノードのピア証明書を検証しなければならない。
explanation: |
  Bitcoin P2Pハンドシェークは、接続ノードがバージョン・メッセージを送信し、受信ノードがverackとそれ自身のバージョン・メッセージで返信し、元の送信ノードがverackで返信するという双方向の交換を必要とする。この完全な4メッセージ交換（version→verack+version→verack）の後にのみ、ノードはアクティブな通信を開始できる。DNSシードは最初のピアディスカバリーにのみ使用され、ハンドシェイクは行われない。Bitcoinは証明書を使用せず、チェーンの検証は接続確立後に行われる。
question: Bitcoin के P2P नेटवर्क हैंडशेक प्रक्रिया में, दो नोड्स द्वारा इन्वेंट्री और लेनदेन डेटा को सक्रिय रूप से रिले करना शुरू करने से पहले कौन सी विशिष्ट शर्त पूरी होनी चाहिए?
answer: दोनों नोड्स को एक दूसरे के साथ वर्जन और वेरैक संदेशों का आदान-प्रदान करना होगा।
wrong_answers:
  - कनेक्टिंग नोड को कोर डेवलपर्स से DNS seed पुष्टिकरण प्राप्त करना होगा।
  - "दोनों नोड्स को एक दूसरे की ब्लॉक ऊंचाई और चेन टिप हैश को सत्यापित करना होगा।"
  - "प्राप्तकर्ता नोड को कनेक्टिंग नोड के पीयर प्रमाणपत्र को मान्य करना होगा।"
explanation: |
  Bitcoin और P2P के बीच हैंडशेक के लिए द्विदिशात्मक आदान-प्रदान आवश्यक है, जिसमें कनेक्टिंग नोड एक वर्ज़न संदेश भेजता है, रिसीवर वेरैक और अपना वर्ज़न संदेश भेजकर जवाब देता है, और मूल प्रेषक अपना वेरैक भेजकर जवाब देता है। इस चार संदेशों के पूर्ण आदान-प्रदान (वर्शन→वेरैक+वर्शन→वेरैक) के बाद ही नोड्स सक्रिय संचार शुरू कर सकते हैं। DNS सीड्स का उपयोग केवल प्रारंभिक पीयर डिस्कवरी के लिए किया जाता है, हैंडशेक के लिए नहीं। Bitcoin प्रमाणपत्रों का उपयोग नहीं करता है, और कनेक्शन स्थापित होने के बाद चेन सत्यापन होता है।
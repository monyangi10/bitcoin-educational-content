question: In Bitcoin's P2P network handshake process, what specific condition must be met before two nodes can begin actively relaying inventories and transaction data?
answer: Both nodes must exchange version and verack messages with each other
wrong_answers:
  - The connecting node must receive DNS seed confirmation from core developers
  - "Both nodes must verify each other's block height and chain tip hash"
  - "The receiving node must validate the connecting node's peer certificate"
explanation: |
  The Bitcoin P2P handshake requires a bidirectional exchange where the connecting node sends a version message, the receiver replies with verack and its own version message, and the original sender responds with its verack. Only after this complete four-message exchange (version→verack+version→verack) can nodes begin active communication. DNS seeds are only used for initial peer discovery, not handshaking. Bitcoin doesn't use certificates, and chain validation occurs after the connection is established.

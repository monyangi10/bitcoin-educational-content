question: Кое специфично условие трябва да бъде изпълнено в процеса на ръкостискане на мрежата P2P на Bitcoin, преди два възела да започнат активно да предават данни за запаси и транзакции?
answer: Двата възела трябва да обменят съобщения за версия и verack помежду си
wrong_answers:
  - Свързващият възел трябва да получи потвърждение за DNS seed от разработчиците на ядрото
  - "И двата възела трябва да проверят взаимно височината на блока и хеша на върха на веригата"
  - "Получаващият възел трябва да валидира сертификата на свързващия възел."
explanation: |
  Ръкохватката Bitcoin P2P изисква двупосочен обмен, при който свързващият възел изпраща съобщение за версия, получателят отговаря с verack и свое съобщение за версия, а първоначалният изпращач отговаря със своя verack. Само след този пълен обмен на четири съобщения (версия→verack+версия→verack) възлите могат да започнат активна комуникация. Семената на DNS се използват само за първоначално откриване на партньор, а не за предаване на данни. Bitcoin не използва сертификати, а валидирането на веригата се извършва след установяване на връзката.
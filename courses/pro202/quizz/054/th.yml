question: ในกระบวนการจับมือเครือข่ายของ Bitcoin กับ P2P เงื่อนไขเฉพาะใดที่ต้องปฏิบัติตามก่อนที่โหนดสองตัวจะสามารถเริ่มถ่ายทอดข้อมูลสินค้าคงคลังและธุรกรรมได้อย่างแข็งขัน?
answer: โหนดทั้งสองต้องแลกเปลี่ยนข้อความเวอร์ชันและ verack กับกันและกัน
wrong_answers:
  - โหนดที่เชื่อมต่อจะต้องได้รับการยืนยัน DNS seed จากนักพัฒนาหลัก
  - "โหนดทั้งสองต้องตรวจสอบความสูงของบล็อกและแฮชปลายโซ่ของกันและกัน"
  - "โหนดที่รับต้องตรวจสอบใบรับรองเพียร์ของโหนดที่เชื่อมต่อ"
explanation: |
  การจับมือ Bitcoin P2P ต้องการการแลกเปลี่ยนแบบสองทิศทางที่โหนดที่เชื่อมต่อส่งข้อความเวอร์ชัน ผู้รับตอบกลับด้วย verack และข้อความเวอร์ชันของตนเอง และผู้ส่งเดิมตอบกลับด้วย verack ของตนเอง เฉพาะหลังจากการแลกเปลี่ยนข้อความสี่ข้อความที่สมบูรณ์นี้ (version→verack+version→verack) โหนดจึงจะเริ่มการสื่อสารที่ใช้งานได้ DNS seeds ใช้สำหรับการค้นหาเพื่อนเริ่มต้นเท่านั้น ไม่ใช่การจับมือ Bitcoin ไม่ใช้ใบรับรอง และการตรวจสอบโซ่เกิดขึ้นหลังจากการเชื่อมต่อถูกสร้างขึ้นแล้ว
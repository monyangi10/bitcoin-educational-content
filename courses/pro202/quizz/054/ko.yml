question: Bitcoin의 P2P 네트워크 핸드셰이크 프로세스에서 두 노드가 인벤토리와 트랜잭션 데이터를 적극적으로 릴레이하기 시작하려면 어떤 특정 조건을 충족해야 하나요?
answer: 두 노드 모두 버전 및 verack 메시지를 서로 교환해야 합니다
wrong_answers:
  - 연결 노드는 핵심 개발자로부터 DNS seed 확인을 받아야 합니다
  - "두 노드는 서로의 블록 높이와 체인 팁 해시를 확인해야 합니다."
  - "수신 노드는 연결 노드의 피어 인증서의 유효성을 검사해야 합니다."
explanation: |
  Bitcoin P2P 핸드셰이크는 연결 노드가 버전 메시지를 보내고, 수신 노드가 버락과 자신의 버전 메시지로 응답하고, 원래 발신자가 자신의 버락으로 응답하는 양방향 교환이 필요합니다. 이 네 가지 메시지 교환(버전→버락+버락→버락)이 완료된 후에야 노드는 활성 통신을 시작할 수 있습니다. DNS 시드는 핸드셰이킹이 아닌 초기 피어 검색에만 사용됩니다. Bitcoin는 인증서를 사용하지 않으며, 체인 유효성 검사는 연결이 설정된 후에 이루어집니다.
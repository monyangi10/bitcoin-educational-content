question: در فرآیند دست‌دهی شبکه Bitcoin با P2P، چه شرط خاصی باید برآورده شود تا دو گره بتوانند به طور فعال به انتقال موجودی‌ها و داده‌های تراکنش بپردازند؟
answer: هر دو نود باید پیام‌های نسخه و verack را با یکدیگر مبادله کنند.
wrong_answers:
  - گره متصل باید تأیید DNS seed را از توسعه‌دهندگان اصلی دریافت کند
  - "هر دو نود باید ارتفاع بلاک و هش نوک زنجیره یکدیگر را تأیید کنند"
  - "گره دریافت‌کننده باید گواهی همتای گره متصل‌شونده را اعتبارسنجی کند"
explanation: |
  دست دادن Bitcoin P2P نیاز به تبادل دوطرفه دارد که در آن گره متصل‌کننده یک پیام نسخه ارسال می‌کند، گیرنده با verack و پیام نسخه خود پاسخ می‌دهد، و فرستنده اصلی با verack خود پاسخ می‌دهد. تنها پس از این تبادل کامل چهار پیام (نسخه→verack+نسخه→verack) گره‌ها می‌توانند ارتباط فعال را آغاز کنند. DNS seeds فقط برای کشف اولیه همتا استفاده می‌شوند، نه دست دادن. Bitcoin از گواهی‌نامه‌ها استفاده نمی‌کند و اعتبارسنجی زنجیره پس از برقراری اتصال انجام می‌شود.
question: 在 Bitcoin 的 P2P 网络握手过程中，两个节点必须满足什么特定条件才能开始主动转发库存和交易数据？
answer: 两个节点必须相互交换版本和 verack 信息
wrong_answers:
  - 连接节点必须从核心开发人员处获得 DNS seed 确认
  - "两个节点必须验证对方的区块高度和链尖哈希值"
  - "接收节点必须验证连接节点的对等节点证书"
explanation: |
  Bitcoin P2P 握手需要双向交换，即连接节点发送版本信息，接收方回复 verack 和自己的版本信息，原发送方回复 verack。只有在完成四次信息交换（版本→verack+版本→verack）后，节点才能开始主动通信。DNS 种子只用于初始对等发现，不用于握手。Bitcoin 不使用证书，链验证在连接建立后进行。
question: Bitcoin walletが着金についてブロックをスキャンするとき、なぜネットワーク・ピアに個々のトランザクションを要求するよりもブロック全体をダウンロードする方が優先されるのか？
answer: ブロック全体をダウンロードすることで、walletが監視している特定のトランザクションやアドレスが明らかにならず、プライバシー保護が向上する。
wrong_answers:
  - トランザクションの真正性を検証するための暗号化ハッシュ演算が少なくて済むため、ブロック全体をダウンロードする方が計算効率が高い。
  - ブロック全体をダウンロードすることで、ピアは個々のトランザクション・レスポンスではなく、圧縮されたブロック・データを送信できるため、より高速な同期が保証されます。
  - ブロック全体をダウンロードすることで、walletがトランザクションごとに完全なproof-of-workを検証できるため、セキュリティが向上する。
explanation: |
  プライバシーはブロック・ベースの検索の重要な利点である。walletが特定のトランザクションを要求すると、ユーザーの活動に関する強い信号が漏れ、どのアドレスがそのwalletに属しているかが明らかになる。ブロック全体をダウンロードすると、すべてのブロック・トランザクションの中でwalletの実際の関心が隠されてしまう。間違った答えは、効率性、スピード、またはセキュリティの利点に焦点を当てていますが、これは主要な動機ではありません。個々のトランザクション要求は、理論的には同じように安全で効率的かもしれませんが、walletの監視パターンをネットワークピアーに明らかにすることで、根本的にプライバシーを損ないます。
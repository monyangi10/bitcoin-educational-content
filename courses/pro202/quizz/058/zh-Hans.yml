question: 当 Bitcoin wallet 扫描区块以接收付款时，为什么下载整个区块比从网络对等方请求单个交易更有优势？
answer: 下载整个区块不会泄露 wallet 有兴趣监控的具体交易或地址，从而提供更好的隐私保护
wrong_answers:
  - 下载整个区块的计算效率更高，因为它需要较少的加密哈希运算来验证交易的真实性
  - 下载整个区块可确保更快的同步，因为对等方可发送压缩区块数据，而不是单个事务响应
  - 下载整个区块可提供更好的安全性，因为它允许 wallet 为每次交易验证完整的 proof-of-work
explanation: |
  隐私性是基于区块检索的关键优势。当 wallet 请求特定交易时，会泄露有关用户活动的强烈信号，并显示哪些地址属于该 wallet。下载整个区块会掩盖 wallet 在所有区块交易中的实际利益。错误答案关注的是效率、速度或安全方面的优势，而这并非主要动机--理论上，单个交易请求也可以同样安全或高效，但它们会从根本上损害隐私，因为它们会将 wallet 的监控模式泄露给网络同行。
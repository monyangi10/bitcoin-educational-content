question: 當 Bitcoin wallet 掃描區塊以尋找進來的付款時，為什麼下載整個區塊比向網路對等體要求個別交易更可取？
answer: 下載整個區塊可提供更好的隱私保護，因為不會透露 wallet 感興趣監控的特定交易或位址
wrong_answers:
  - 下載整個區塊的計算效率較高，因為它需要較少的加密哈希運算來驗證交易的真實性
  - 下載整個區塊可確保更快的同步化，因為對等方可傳送壓縮的區塊資料，而非個別的交易回應
  - 下載整個區塊可提供更好的安全性，因為它允許 wallet 為每筆交易驗證完整的 proof-of-work
explanation: |
  隱私是基於區塊的檢索的主要優點。當 wallet 要求特定的交易時，就會洩漏使用者活動的強烈訊號，並顯露哪些位址屬於該 wallet。下載整個區塊會掩蓋 wallet 在所有區塊交易中的實際利益。錯誤答案的重點在於效率、速度或安全優勢，但這些並非主要動機 - 個別交易請求理論上可能同樣安全或有效率，但卻會向網路同業揭露 wallet 的監控模式，從根本上破壞隱私。
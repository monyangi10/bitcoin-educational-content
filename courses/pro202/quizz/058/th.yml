question: เมื่อ Bitcoin wallet สแกนบล็อกเพื่อหาการชำระเงินที่เข้ามา ทำไมการดาวน์โหลดบล็อกทั้งหมดจึงเป็นที่นิยมมากกว่าการร้องขอธุรกรรมแต่ละรายการจากเพื่อนร่วมเครือข่าย?
answer: การดาวน์โหลดบล็อกทั้งหมดช่วยปกป้องความเป็นส่วนตัวได้ดียิ่งขึ้นโดยไม่เปิดเผยว่าธุรกรรมหรือที่อยู่ใดที่ wallet สนใจในการตรวจสอบ
wrong_answers:
  - การดาวน์โหลดบล็อกทั้งหมดมีประสิทธิภาพทางการคำนวณมากกว่าเพราะต้องการการดำเนินการแฮชเข้ารหัสน้อยลงเพื่อยืนยันความถูกต้องของธุรกรรม
  - การดาวน์โหลดบล็อกทั้งหมดช่วยให้การซิงโครไนซ์เร็วขึ้นเนื่องจากเพื่อนสามารถส่งข้อมูลบล็อกที่บีบอัดแทนการตอบสนองธุรกรรมแต่ละรายการ
  - การดาวน์โหลดบล็อกทั้งหมดให้ความปลอดภัยที่ดีกว่าเพราะช่วยให้ wallet สามารถตรวจสอบ proof-of-work ทั้งหมดสำหรับทุกธุรกรรมได้
explanation: |
  ความเป็นส่วนตัวคือข้อได้เปรียบหลักของการดึงข้อมูลแบบบล็อก เมื่อ wallet ร้องขอธุรกรรมเฉพาะ มันจะเผยสัญญาณที่ชัดเจนเกี่ยวกับกิจกรรมของผู้ใช้และเปิดเผยว่าแอดเดรสใดเป็นของ wallet นั้น การดาวน์โหลดบล็อกทั้งหมดจะช่วยปกปิดความสนใจที่แท้จริงของ wallet ท่ามกลางธุรกรรมทั้งหมดในบล็อก คำตอบที่ผิดจะเน้นไปที่ประสิทธิภาพ ความเร็ว หรือประโยชน์ด้านความปลอดภัยซึ่งไม่ใช่แรงจูงใจหลัก - การร้องขอธุรกรรมแต่ละรายการอาจจะปลอดภัยหรือมีประสิทธิภาพเท่าๆ กันในทางทฤษฎี แต่โดยพื้นฐานแล้วจะทำลายความเป็นส่วนตัวโดยการเปิดเผยรูปแบบการตรวจสอบของ wallet ต่อเพื่อนร่วมเครือข่าย
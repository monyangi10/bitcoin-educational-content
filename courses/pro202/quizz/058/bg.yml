question: Когато Bitcoin wallet сканира блокове за входящи плащания, защо изтеглянето на цели блокове е за предпочитане пред заявяването на отделни транзакции от равностойни на мрежата потребители?
answer: Изтеглянето на цели блокове осигурява по-добра защита на личните данни, тъй като не разкрива кои конкретни транзакции или адреси интересуват wallet
wrong_answers:
  - Изтеглянето на цели блокове е по-ефективно от изчислителна гледна точка, тъй като изисква по-малко криптографски хеш операции за проверка на автентичността на трансакциите
  - Изтеглянето на цели блокове осигурява по-бърза синхронизация, тъй като партньорите могат да изпращат компресирани данни за блокове, а не отговори на отделни транзакции
  - Изтеглянето на цели блокове осигурява по-добра сигурност, тъй като позволява на wallet да проверява целия proof-of-work за всяка транзакция
explanation: |
  Поверителността е ключовото предимство на блоковото извличане. Когато wallet изисква конкретни транзакции, той изпуска силни сигнали за активността на потребителите и разкрива кои адреси принадлежат на този wallet. Изтеглянето на цели блокове прикрива действителните интереси на wallet сред всички блокови транзакции. Грешните отговори се фокусират върху ефективността, скоростта или ползите за сигурността, които не са основната мотивация - заявките за индивидуални транзакции теоретично биха могли да бъдат също толкова сигурни или ефективни, но те фундаментално компрометират неприкосновеността на личния живот, като разкриват моделите на наблюдение на wallet на колегите в мрежата.
question: وقتی یک Bitcoin wallet بلوک‌ها را برای پرداخت‌های ورودی اسکن می‌کند، چرا دانلود کل بلوک‌ها به درخواست تراکنش‌های فردی از همتایان شبکه ترجیح داده می‌شود؟
answer: دانلود بلوک‌های کامل حفاظت بهتری از حریم خصوصی ارائه می‌دهد زیرا نشان نمی‌دهد که wallet به کدام تراکنش‌ها یا آدرس‌های خاص علاقه‌مند به نظارت است.
wrong_answers:
  - دانلود کل بلوک‌ها از نظر محاسباتی کارآمدتر است زیرا به عملیات هش رمزنگاری کمتری برای تأیید اصالت تراکنش نیاز دارد.
  - دانلود بلوک‌های کامل باعث همگام‌سازی سریع‌تر می‌شود زیرا همتایان می‌توانند داده‌های بلوک فشرده را به جای پاسخ‌های تراکنش فردی ارسال کنند.
  - دانلود بلوک‌های کامل امنیت بهتری را فراهم می‌کند زیرا به wallet اجازه می‌دهد تا proof-of-work کامل را برای هر تراکنش تأیید کند.
explanation: |
  حریم خصوصی مزیت اصلی بازیابی مبتنی بر بلوک است. هنگامی که یک wallet تراکنش‌های خاصی را درخواست می‌کند، سیگنال‌های قوی درباره فعالیت کاربر نشت می‌کند و نشان می‌دهد که کدام آدرس‌ها به آن wallet تعلق دارند. دانلود بلوک‌های کامل، علاقه واقعی wallet را در میان تمام تراکنش‌های بلوک پنهان می‌کند. پاسخ‌های نادرست بر کارایی، سرعت یا مزایای امنیتی تمرکز دارند که انگیزه اصلی نیستند - درخواست‌های تراکنش فردی می‌توانند به‌طور نظری به همان اندازه امن یا کارآمد باشند، اما اساساً حریم خصوصی را با افشای الگوهای نظارت wallet به همتایان شبکه به خطر می‌اندازند.
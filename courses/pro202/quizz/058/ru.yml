question: Когда Bitcoin wallet сканирует блоки на предмет входящих платежей, почему загрузка целых блоков предпочтительнее, чем запрос отдельных транзакций у сетевых пиров?
answer: Загрузка целых блоков обеспечивает лучшую защиту конфиденциальности, поскольку не раскрывает, какие именно транзакции или адреса интересуют wallet
wrong_answers:
  - Загрузка целых блоков более эффективна с вычислительной точки зрения, поскольку для проверки подлинности транзакций требуется меньше криптографических хэш-операций
  - Загрузка целых блоков обеспечивает более быструю синхронизацию, поскольку пиры могут отправлять сжатые данные блока, а не отдельные ответы на транзакции
  - Загрузка целых блоков обеспечивает лучшую безопасность, поскольку позволяет wallet проверять полный proof-of-work для каждой транзакции
explanation: |
  Конфиденциальность - ключевое преимущество поиска на основе блоков. Когда wallet запрашивает конкретные транзакции, происходит утечка сильных сигналов об активности пользователей и раскрывается, какие адреса принадлежат этому wallet. Загрузка целых блоков маскирует реальные интересы wallet среди всех транзакций блока. Неправильные ответы сосредоточены на эффективности, скорости или преимуществах безопасности, которые не являются основной мотивацией - запросы отдельных транзакций теоретически могут быть столь же безопасными или эффективными, но они в корне нарушают конфиденциальность, раскрывая сетевым коллегам модели мониторинга wallet.
question: जब एक Bitcoin wallet आने वाले भुगतानों के लिए ब्लॉक को स्कैन करता है, तो नेटवर्क साथियों से व्यक्तिगत लेनदेन का अनुरोध करने के बजाय पूरे ब्लॉक को डाउनलोड करना क्यों पसंद किया जाता है?
answer: संपूर्ण ब्लॉक डाउनलोड करने से गोपनीयता की बेहतर सुरक्षा मिलती है क्योंकि इससे यह पता नहीं चलता कि wallet किन विशिष्ट लेनदेन या पतों की निगरानी में रुचि रखता है।
wrong_answers:
  - संपूर्ण ब्लॉक डाउनलोड करना अधिक गणनात्मक रूप से कुशल है क्योंकि लेनदेन की प्रामाणिकता को सत्यापित करने के लिए कम क्रिप्टोग्राफिक हैश संचालन की आवश्यकता होती है।
  - संपूर्ण ब्लॉक डाउनलोड करने से तेज़ सिंक्रोनाइज़ेशन सुनिश्चित होता है क्योंकि सहकर्मी व्यक्तिगत लेनदेन प्रतिक्रियाओं के बजाय संपीड़ित ब्लॉक डेटा भेज सकते हैं।
  - संपूर्ण ब्लॉक डाउनलोड करने से बेहतर सुरक्षा मिलती है क्योंकि इससे wallet प्रत्येक लेनदेन के लिए संपूर्ण proof-of-work को सत्यापित कर सकता है।
explanation: |
  ब्लॉक-आधारित डेटा पुनर्प्राप्ति का मुख्य लाभ गोपनीयता है। जब कोई wallet विशिष्ट लेन-देन का अनुरोध करता है, तो यह उपयोगकर्ता गतिविधि के बारे में महत्वपूर्ण संकेत लीक करता है और यह प्रकट करता है कि कौन से पते उस wallet से संबंधित हैं। पूरे ब्लॉक को डाउनलोड करने से सभी ब्लॉक लेन-देन में wallet के वास्तविक हित छिप जाते हैं। गलत उत्तर दक्षता, गति या सुरक्षा लाभों पर केंद्रित होते हैं जो प्राथमिक प्रेरणा नहीं हैं - सैद्धांतिक रूप से व्यक्तिगत लेन-देन अनुरोध उतने ही सुरक्षित या कुशल हो सकते हैं, लेकिन वे नेटवर्क साथियों को wallet के निगरानी पैटर्न को प्रकट करके गोपनीयता से समझौता करते हैं।
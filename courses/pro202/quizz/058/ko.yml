question: Bitcoin wallet이 수신 결제를 위해 블록을 스캔할 때, 네트워크 피어에게 개별 트랜잭션을 요청하는 것보다 전체 블록을 다운로드하는 것이 선호되는 이유는 무엇인가요?
answer: 전체 블록을 다운로드하면 wallet가 모니터링하려는 특정 거래나 주소를 공개하지 않아 개인 정보를 더 잘 보호할 수 있습니다
wrong_answers:
  - 전체 블록을 다운로드하면 트랜잭션 진위 여부를 확인하는 데 필요한 암호화 해시 연산이 줄어들기 때문에 계산 효율성이 더 높아집니다
  - 전체 블록을 다운로드하면 피어들이 개별 트랜잭션 응답이 아닌 압축된 블록 데이터를 전송할 수 있으므로 동기화 속도가 빨라집니다
  - 전체 블록을 다운로드하면 wallet가 모든 트랜잭션에 대해 전체 proof-of-work를 확인할 수 있으므로 보안이 강화됩니다
explanation: |
  프라이버시는 블록 기반 검색의 주요 장점입니다. wallet가 특정 트랜잭션을 요청하면 사용자 활동에 대한 강력한 신호를 유출하고 어떤 주소가 해당 wallet에 속하는지 공개합니다. 전체 블록을 다운로드하면 모든 블록 트랜잭션 중 wallet의 실제 관심사가 가려집니다. 오답은 효율성, 속도 또는 보안상의 이점이 주된 동기가 아닌 개별 트랜잭션 요청에 초점을 맞추는 것으로, 이론적으로는 안전하거나 효율적일 수 있지만 wallet의 모니터링 패턴을 네트워크 피어에게 공개함으로써 근본적으로 프라이버시를 침해합니다.
question: Lorsqu'un Bitcoin wallet scrute des blocs à la recherche de paiements entrants, pourquoi est-il préférable de télécharger des blocs entiers plutôt que de demander des transactions individuelles à des homologues du réseau ?
answer: Le téléchargement de blocs entiers offre une meilleure protection de la vie privée en ne révélant pas les transactions ou adresses spécifiques que le wallet s'intéresse à surveiller
wrong_answers:
  - Le téléchargement de blocs entiers est plus efficace en termes de calcul, car il nécessite moins d'opérations de hachage cryptographique pour vérifier l'authenticité de la transaction
  - Le téléchargement de blocs entiers garantit une synchronisation plus rapide, car les pairs peuvent envoyer des données de bloc compressées plutôt que des réponses à des transactions individuelles
  - Le téléchargement de blocs entiers offre une meilleure sécurité car il permet au wallet de vérifier l'intégralité de la proof-of-work pour chaque transaction
explanation: |
  Le respect de la vie privée est le principal avantage de la recherche par blocs. Lorsqu'un wallet demande des transactions spécifiques, il laisse filtrer des signaux forts sur l'activité de l'utilisateur et révèle quelles adresses appartiennent à ce wallet. Le téléchargement de blocs entiers masque les intérêts réels du wallet parmi toutes les transactions de blocs. Les mauvaises réponses mettent l'accent sur l'efficacité, la vitesse ou les avantages en matière de sécurité qui ne sont pas la motivation première - les demandes de transactions individuelles pourraient théoriquement être tout aussi sûres ou efficaces, mais elles compromettent fondamentalement la vie privée en révélant les schémas de surveillance du wallet aux autres membres du réseau.

question: वह कौन सा विशिष्ट तंत्र सुनिश्चित करता है कि SegWit से पहले के नोड्स, विटनेस वैलिडेशन नियमों को समझे बिना, P2WPKH लेनदेन को वैध के रूप में स्वीकार करते हैं?
answer: SegWit से पहले के नोड्स OP_0 + 20-बाइट हैश स्क्रिप्ट को 'anyone-can-spend' आउटपुट के रूप में व्याख्या करते हैं जिसके लिए हस्ताक्षर सत्यापन की आवश्यकता नहीं होती है।
wrong_answers:
  - SegWit से पहले के नोड्स, P2WPKH लेनदेन को स्वीकार करने से पहले स्वचालित रूप से उन्नत नोड्स को सत्यापन के लिए अग्रेषित करते हैं।
  - SegWit से पहले के नोड्स P2WPKH पैटर्न को पहचानते हैं और सत्यापन को पूरी तरह से छोड़ देते हैं, सभी विटनेस लेनदेन को पूर्व-सत्यापित मानते हैं।
  - SegWit से पहले के नोड्स, बैकवर्ड कम्पैटिबिलिटी ट्रांसफॉर्मेशन नियमों का उपयोग करके विटनेस डेटा को पारंपरिक स्क्रिप्टसिग फॉर्मेट में वापस परिवर्तित करते हैं।
explanation: |
  SegWit के डिज़ाइन की खूबी यह है कि यह SegWit से पहले के नोड्स द्वारा अज्ञात स्क्रिप्ट पैटर्न को संभालने के तरीके का फायदा उठाता है। जब ये पुराने नोड्स P2WPKH स्क्रिप्ट (OP_0 के बाद 20-बाइट पुश) का सामना करते हैं, तो वे इसे एक विशेष विटनेस प्रोग्राम के रूप में नहीं पहचानते। इसके बजाय, वे इसे एक मानक स्क्रिप्ट के रूप में मानते हैं जो स्टैक पर OP_0 और हैश को छोड़ देती है। चूंकि Bitcoin की स्क्रिप्टिंग प्रणाली में OP_0 का मान गलत होता है, इसलिए SegWit से पहले के नोड्स इसे 'anyone-can-spend' स्थिति के रूप में व्याख्या करते हैं - जिसका अर्थ है कि उनके दृष्टिकोण से किसी हस्ताक्षर सत्यापन की आवश्यकता नहीं है। इससे लेन-देन को उनके मेमोरी पूल में स्वीकार कर लिया जाता है और सर्वसम्मति को तोड़े बिना ब्लॉक हो जाता है, जबकि SegWit-सक्षम नोड्स विटनेस डेटा का उपयोग करके वास्तविक क्रिप्टोग्राफिक सत्यापन करते हैं।
question: SegWit 이전 노드가 증인 유효성 검사 규칙을 이해하지 않고도 P2WPKH 트랜잭션을 유효한 것으로 받아들이도록 하는 구체적인 메커니즘은 무엇인가요?
answer: Pre-SegWit 노드는 OP_0 + 20바이트 해시 스크립트를 서명 검증이 필요 없는 'anyone-can-spend' 출력으로 해석합니다
wrong_answers:
  - 사전 SegWit 노드는 트랜잭션을 수락하기 전에 증인 검증을 위해 업그레이드된 노드로 P2WPKH 트랜잭션을 자동으로 전달합니다
  - Pre-SegWit 노드는 P2WPKH 패턴을 인식하고 검증을 완전히 건너뛰며 모든 증인 트랜잭션을 사전 검증한 것으로 취급합니다
  - SegWit 이전 노드는 이전 버전과의 호환성 변환 규칙을 사용하여 증인 데이터를 기존 스크립트시그 형식으로 다시 변환합니다
explanation: |
  SegWit 설계의 천재성은 SegWit 이전 노드가 알려지지 않은 스크립트 패턴을 처리하는 방식을 악용하는 데 있습니다. 이러한 구형 노드는 P2WPKH 스크립트(OP_0에 이어 20바이트 푸시)를 만나면 이를 특별한 감시 프로그램으로 인식하지 않습니다. 대신 OP_0과 해시를 스택에 남기는 표준 스크립트로 평가합니다. Bitcoin의 스크립팅 시스템에서 OP_0은 거짓으로 평가되므로, SegWit 이전 노드는 이를 'anyone-can-spend' 조건으로 해석하며, 이는 자신들의 관점에서 서명 검증이 필요하지 않음을 의미합니다. 따라서 합의를 깨지 않고 트랜잭션을 멤풀과 블록에 승인할 수 있으며, SegWit 인식 노드는 감시 데이터를 사용해 실제 암호화 검증을 수행합니다.
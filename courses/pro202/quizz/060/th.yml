question: กลไกเฉพาะที่ทำให้โหนด pre-SegWit ยอมรับธุรกรรม P2WPKH ว่าเป็นธุรกรรมที่ถูกต้องโดยไม่ต้องเข้าใจกฎการตรวจสอบพยานคืออะไร?
answer: โหนด Pre-SegWit ตีความสคริปต์ OP_0 + 20-byte hash เป็นเอาต์พุต 'anyone-can-spend' ที่ไม่ต้องการการตรวจสอบลายเซ็น
wrong_answers:
  - โหนด Pre-SegWit จะส่งต่อธุรกรรม P2WPKH ไปยังโหนดที่อัปเกรดแล้วโดยอัตโนมัติเพื่อการตรวจสอบพยานก่อนที่จะยอมรับ
  - โหนด Pre-SegWit รับรู้รูปแบบ P2WPKH และข้ามการตรวจสอบความถูกต้องทั้งหมด โดยถือว่าธุรกรรมพยานทั้งหมดได้รับการตรวจสอบล่วงหน้าแล้ว
  - โหนด Pre-SegWit แปลงข้อมูลพยานกลับเป็นรูปแบบ scriptSig แบบดั้งเดิมโดยใช้กฎการแปลงที่เข้ากันได้ย้อนหลัง
explanation: |
  ความอัจฉริยะของการออกแบบ SegWit อยู่ที่การใช้ประโยชน์จากวิธีที่โหนดก่อน SegWit จัดการกับรูปแบบสคริปต์ที่ไม่รู้จัก เมื่อโหนดเก่าเหล่านี้พบสคริปต์ P2WPKH (OP_0 ตามด้วยการพุช 20 ไบต์) พวกเขาไม่รู้จักว่าเป็นโปรแกรมพยานพิเศษ แต่จะประเมินว่าเป็นสคริปต์มาตรฐานที่ทิ้ง OP_0 และแฮชไว้บนสแต็ก เนื่องจาก OP_0 ประเมินเป็นเท็จในระบบสคริปต์ของ Bitcoin โหนดก่อน SegWit จึงตีความว่านี่เป็นเงื่อนไข 'anyone-can-spend' - หมายความว่าไม่จำเป็นต้องมีการตรวจสอบลายเซ็นจากมุมมองของพวกเขา สิ่งนี้ทำให้ธุรกรรมสามารถยอมรับเข้าสู่ mempool และบล็อกของพวกเขาได้โดยไม่ทำลายฉันทามติ ในขณะที่โหนดที่รับรู้ SegWit จะทำการตรวจสอบการเข้ารหัสจริงโดยใช้ข้อมูลพยาน
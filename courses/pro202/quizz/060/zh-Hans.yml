question: 有什么具体机制可以确保 SegWit 之前的节点在不了解见证验证规则的情况下将 P2WPKH 交易视为有效交易？
answer: 前 SegWit 节点将 OP_0 + 20 字节哈希脚本解释为无需签名验证的 "anyone-can-spend "输出
wrong_answers:
  - SegWit 前节点在接受 P2WPKH 交易之前，会自动将其转发给升级节点进行见证验证
  - 前 SegWit 节点识别 P2WPKH 模式并完全跳过验证，将所有见证交易视为预先验证的交易
  - 前 SegWit 节点使用向后兼容转换规则将见证数据转换回传统的 scriptSig 格式
explanation: |
  SegWit 的天才设计在于利用了 SegWit 之前的节点处理未知脚本模式的方式。当这些老节点遇到 P2WPKH 脚本（OP_0 后跟一个 20 字节的推送）时，它们不会将其视为特殊的见证程序。相反，它们会将其视为标准脚本，将 OP_0 和哈希值留在堆栈上。由于 OP_0 在 Bitcoin 的脚本系统中评估为 false，SegWit 之前的节点会将其解释为 "anyone-can-spend "条件，这意味着从它们的角度来看，无需进行签名验证。这样，交易就可以在不破坏共识的情况下被接受到它们的内存池和区块中，而 SegWit 感知节点则使用见证数据执行实际的加密验证。
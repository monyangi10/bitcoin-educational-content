question: SegWit以前のノードが、証人の検証ルールを理解せずにP2WPKHのトランザクションを有効なものとして受け入れることを保証する具体的なメカニズムとは？
answer: SegWit以前のノードは、OP_0 + 20バイトのハッシュスクリプトを、署名検証を必要としない「anyone-can-spend」出力として解釈する。
wrong_answers:
  - SegWit以前のノードは、P2WPKHトランザクションを受け入れる前に、立会人検証のためにアップグレード・ノードに自動的に転送する。
  - SegWit以前のノードはP2WPKHパターンを認識し、バリデーションを完全にスキップする。
  - SegWit以前のノードは、後方互換性変換ルールを使用して、証人データを従来のscriptSigフォーマットに変換します。
explanation: |
  SegWitの天才的な設計は、SegWit以前のノードが未知のスクリプト・パターンをどのように扱うかを悪用することにある。これらの古いノードはP2WPKHスクリプト（OP_0の後に20バイトのプッシュが続く）に遭遇しても、それを特別な証人プログラムとして認識しません。代わりに、OP_0 とハッシュをスタックに残す標準的なスクリプトとして評価します。Bitcoinのスクリプト・システムではOP_0はfalseと評価されるため、SegWit以前のノードはこれを'anyone-can-spend'条件として解釈する。このため、SegWit対応ノードはウィットネスデータを使用して実際の暗号検証を行う一方で、コンセンサスを壊すことなくトランザクションをメンプールとブロックに受け入れることができる。
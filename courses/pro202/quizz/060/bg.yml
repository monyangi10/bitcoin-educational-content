question: Какъв специфичен механизъм гарантира, че възлите преди SegWit приемат транзакциите P2WPKH за валидни, без да разбират правилата за валидиране на свидетели?
answer: Възлите преди SegWit интерпретират OP_0 + 20-байтовия хеш скрипт като изход "anyone-can-spend", който не изисква проверка на подписа
wrong_answers:
  - Възлите преди SegWit автоматично препращат транзакциите P2WPKH към модернизирани възли за свидетелска проверка, преди да ги приемат
  - Възлите преди SegWit разпознават модела P2WPKH и пропускат изцяло валидирането, като третират всички транзакции на свидетели като предварително валидирани
  - Възлите преди версия SegWit преобразуват данните за свидетелите обратно в традиционния формат scriptSig, като използват правила за преобразуване в обратна съвместимост
explanation: |
  Гениалността на дизайна на SegWit се състои в използването на начина, по който възлите преди SegWit се справят с непознати модели на скриптове. Когато тези по-стари възли се сблъскат със скрипт P2WPKH (OP_0, последван от 20-байтово натискане), те не го разпознават като специална програма за свидетели. Вместо това те я оценяват като стандартен скрипт, който оставя OP_0 и хеша на стека. Тъй като OP_0 се оценява като false в системата за скриптове на Bitcoin, възлите преди SegWit интерпретират това като условие "anyone-can-spend" - което означава, че от тяхна гледна точка не се изисква проверка на подписа. Това позволява транзакцията да бъде приета в техния mempool и блокове, без да се нарушава консенсусът, докато възлите, които използват SegWit, извършват действителната криптографска проверка, използвайки данните на свидетелите.
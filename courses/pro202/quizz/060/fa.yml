question: چه مکانیزم خاصی تضمین می‌کند که نودهای قبل از SegWit تراکنش‌های P2WPKH را به عنوان معتبر بپذیرند بدون اینکه قوانین اعتبارسنجی شاهد را درک کنند؟
answer: گره‌های Pre-SegWit اسکریپت OP_0 + 20-byte hash را به‌عنوان خروجی 'anyone-can-spend' تفسیر می‌کنند که نیازی به تأیید امضا ندارد.
wrong_answers:
  - گره‌های قبل از SegWit به‌طور خودکار تراکنش‌های P2WPKH را برای اعتبارسنجی شاهد به گره‌های ارتقاء یافته ارسال می‌کنند قبل از اینکه آن‌ها را بپذیرند.
  - گره‌های Pre-SegWit الگوی P2WPKH را شناسایی کرده و به‌طور کامل از اعتبارسنجی صرف‌نظر می‌کنند و تمام تراکنش‌های شاهد را به‌عنوان پیش‌اعتبارسنجی‌شده در نظر می‌گیرند.
  - گره‌های قبل از SegWit داده‌های شاهد را با استفاده از قوانین تبدیل سازگاری معکوس به فرمت سنتی scriptSig تبدیل می‌کنند.
explanation: |
  نبوغ طراحی SegWit در بهره‌برداری از نحوه‌ی برخورد نودهای قبل از SegWit با الگوهای اسکریپت ناشناخته نهفته است. وقتی این نودهای قدیمی با یک اسکریپت P2WPKH (OP_0 به دنبال یک 20 بایت پوش) مواجه می‌شوند، آن را به عنوان یک برنامه شاهد ویژه تشخیص نمی‌دهند. در عوض، آن را به عنوان یک اسکریپت استاندارد ارزیابی می‌کنند که OP_0 و هش را روی استک باقی می‌گذارد. از آنجا که OP_0 در سیستم اسکریپت‌نویسی Bitcoin به false ارزیابی می‌شود، نودهای قبل از SegWit این را به عنوان یک شرط 'anyone-can-spend' تفسیر می‌کنند - به این معنی که از دیدگاه آن‌ها نیازی به تأیید امضا نیست. این اجازه می‌دهد که تراکنش بدون شکستن اجماع به ممپول و بلاک‌های آن‌ها پذیرفته شود، در حالی که نودهای آگاه به SegWit اعتبارسنجی رمزنگاری واقعی را با استفاده از داده‌های شاهد انجام می‌دهند.
question: Какой конкретный механизм гарантирует, что узлы до SegWit примут транзакции P2WPKH как действительные без понимания правил проверки свидетелей?
answer: Узлы до SegWit интерпретируют OP_0 + 20-байтовый хэш-скрипт как выход 'anyone-can-spend', который не требует проверки подписи
wrong_answers:
  - Узлы, предшествующие SegWit, автоматически направляют транзакции P2WPKH на модернизированные узлы для проверки свидетелей перед их приемом
  - Узлы, предшествующие SegWit, распознают шаблон P2WPKH и полностью пропускают проверку, рассматривая все транзакции свидетелей как предварительно подтвержденные
  - Узлы Pre-SegWit преобразуют данные свидетелей обратно в традиционный формат scriptSig, используя правила преобразования обратной совместимости
explanation: |
  Гениальность дизайна SegWit заключается в использовании того, как узлы, существовавшие до SegWit, обрабатывают неизвестные шаблоны сценариев. Когда эти старые узлы сталкиваются со сценарием P2WPKH (OP_0 с последующим 20-байтовым push), они не распознают его как специальную программу-свидетель. Вместо этого они оценивают его как стандартный скрипт, который оставляет OP_0 и хэш в стеке. Поскольку в системе сценариев Bitcoin значение OP_0 равно false, узлы до SegWit интерпретируют это как условие 'anyone-can-spend' - с их точки зрения, проверка подписи не требуется. Это позволяет принять транзакцию в свой мемпул и блоки без нарушения консенсуса, в то время как узлы, знающие SegWit, выполняют фактическую криптографическую проверку, используя данные свидетелей.
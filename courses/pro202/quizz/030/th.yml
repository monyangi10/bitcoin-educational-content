question: วัตถุประสงค์หลักของกระบวนการสร้าง sighash ในการตรวจสอบธุรกรรม Bitcoin คืออะไร?
answer: ในการสร้างข้อความที่ตรงกับข้อความเดิมที่ถูกลงนามโดยคีย์ส่วนตัวสำหรับการตรวจสอบลายเซ็น
wrong_answers:
  - ไปยัง generate ตัวระบุเฉพาะสำหรับธุรกรรมที่ป้องกันการโจมตี double-spending
  - บีบอัดข้อมูลธุรกรรมให้อยู่ในรูปแบบที่เล็กลงเพื่อการส่งผ่านเครือข่ายที่มีประสิทธิภาพ
  - ในการเข้ารหัสเนื้อหาของธุรกรรมเพื่อให้เฉพาะผู้รับเท่านั้นที่สามารถถอดรหัสและใช้จ่ายเหรียญได้
explanation: |
  การสร้าง sighash สร้างข้อความที่ถูกต้องที่ถูกเซ็นโดยกุญแจส่วนตัว ทำให้ OP_CHECKSIG สามารถตรวจสอบความถูกต้องของลายเซ็นได้ กระบวนการนี้เกี่ยวข้องกับการล้าง ScriptSigs แทนที่ ScriptSig ของอินพุตปัจจุบันด้วย ScriptPubKey ที่สอดคล้องกัน และเพิ่มประเภทแฮชก่อนการแฮชสองครั้ง ตัวเลือกอื่น ๆ นั้นไม่ถูกต้อง: รหัสธุรกรรมทำหน้าที่เป็นตัวระบุ การบีบอัดถูกจัดการแยกต่างหาก และธุรกรรม Bitcoin ไม่ได้ถูกเข้ารหัสแต่สามารถมองเห็นได้สาธารณะบนบล็อกเชน
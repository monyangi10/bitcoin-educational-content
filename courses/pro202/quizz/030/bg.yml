question: Каква е основната цел на процеса на конструиране на Sighash при валидирането на транзакциите в Bitcoin?
answer: Създаване на точното съобщение, което първоначално е било подписано с частния ключ, за проверка на подписа
wrong_answers:
  - За generate - уникален идентификатор за транзакцията, който предотвратява атаки от double-spending
  - Компресиране на данните за транзакциите в по-малък формат за ефективно предаване по мрежата
  - Криптиране на съдържанието на транзакцията, така че само получателят да може да декриптира и да изразходва монетите
explanation: |
  Конструкцията sighash създава точното съобщение, което е подписано с частния ключ, което позволява на OP_CHECKSIG да провери автентичността на подписа. Този процес включва изпразване на ScriptSigs, заместване на ScriptSig на текущия вход със съответния ScriptPubKey и добавяне на тип хеш преди двойното хеширане. Другите варианти са некоректни: идентификаторите на транзакциите служат като идентификатори, компресията се обработва отделно, а транзакциите Bitcoin не са криптирани, а публично видими в блокчейна.
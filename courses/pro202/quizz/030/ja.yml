question: Bitcoinのトランザクション検証におけるサイアシ構築プロセスの主な目的は何ですか？
answer: 署名検証のために、秘密鍵によって最初に署名されたメッセージを正確に作成する。
wrong_answers:
  - double-spendingからの攻撃を防ぐトランザクションの一意な識別子。
  - 効率的なネットワーク伝送のために、トランザクションデータをより小さなフォーマットに圧縮する。
  - トランザクションの内容を暗号化し、受信者だけが解読してコインを使用できるようにする。
explanation: |
  sighashの構築は、秘密鍵によって署名された正確なメッセージを作成し、 OP_CHECKSIGが署名の真正性を検証できるようにする。このプロセスでは、ScriptSigsを空にし、現在の入力のScriptSigを対応する ScriptPubKeyに置き換え、ダブルハッシュする前にハッシュ型を追加する。トランザクションIDは識別子として機能し、圧縮は別個に処理され、Bitcoinのトランザクションは暗号化されずにブロックチェーン上で公開される。
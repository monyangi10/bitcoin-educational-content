question: هدف اصلی فرآیند ساخت sighash در اعتبارسنجی تراکنش Bitcoin چیست؟
answer: برای ایجاد دقیق پیامی که در ابتدا توسط کلید خصوصی برای تأیید امضا امضا شده بود
wrong_answers:
  - به generate یک شناسه منحصربه‌فرد برای تراکنش که از حملات double-spending جلوگیری می‌کند
  - برای فشرده‌سازی داده‌های تراکنش به یک قالب کوچکتر جهت انتقال کارآمد در شبکه
  - برای رمزگذاری محتوای تراکنش به‌گونه‌ای که فقط گیرنده بتواند آن را رمزگشایی کرده و سکه‌ها را خرج کند
explanation: |
  ساختار sighash پیام دقیقی را ایجاد می‌کند که توسط کلید خصوصی امضا شده است و به OP_CHECKSIG امکان می‌دهد تا اصالت امضا را تأیید کند. این فرآیند شامل خالی کردن ScriptSigs، جایگزینی ScriptSig ورودی فعلی با ScriptPubKey مربوطه و افزودن یک نوع هش قبل از دو بار هش کردن است. گزینه‌های دیگر نادرست هستند: شناسه‌های تراکنش به عنوان شناسه عمل می‌کنند، فشرده‌سازی به صورت جداگانه انجام می‌شود و تراکنش‌های Bitcoin رمزگذاری نشده‌اند بلکه به صورت عمومی در بلاکچین قابل مشاهده هستند.
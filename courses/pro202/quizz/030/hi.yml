question: Bitcoin लेनदेन सत्यापन में sighash निर्माण प्रक्रिया का प्राथमिक उद्देश्य क्या है?
answer: हस्ताक्षर सत्यापन के लिए निजी कुंजी द्वारा मूल रूप से हस्ताक्षरित संदेश को हूबहू बनाना।
wrong_answers:
  - generate के लिए एक अद्वितीय पहचानकर्ता जो double-spending हमलों को रोकता है
  - नेटवर्क पर कुशल प्रसारण के लिए लेनदेन डेटा को छोटे प्रारूप में संपीड़ित करना।
  - लेनदेन की सामग्री को एन्क्रिप्ट करना ताकि केवल प्राप्तकर्ता ही उसे डिक्रिप्ट कर सके और सिक्कों का उपयोग कर सके।
explanation: |
  sighash संरचना निजी कुंजी द्वारा हस्ताक्षरित सटीक संदेश तैयार करती है, जिससे OP_CHECKSIG हस्ताक्षर की प्रामाणिकता को सत्यापित कर पाता है। इस प्रक्रिया में ScriptSigs को खाली करना, वर्तमान इनपुट के ScriptSig को उसके संबंधित ScriptPubKey से बदलना और डबल-हैशिंग से पहले एक हैश प्रकार जोड़ना शामिल है। अन्य विकल्प गलत हैं: लेनदेन आईडी पहचानकर्ता के रूप में कार्य करते हैं, संपीड़न को अलग से संभाला जाता है, और Bitcoin लेनदेन एन्क्रिप्टेड नहीं होते हैं बल्कि ब्लॉकचेन पर सार्वजनिक रूप से दिखाई देते हैं।
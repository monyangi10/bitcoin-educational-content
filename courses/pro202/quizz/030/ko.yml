question: Bitcoin 트랜잭션 유효성 검사에서 시게시 구성 프로세스의 주요 목적은 무엇인가요?
answer: 서명 확인을 위해 원래 개인 키로 서명했던 정확한 메시지를 만들려면 다음과 같이 하세요
wrong_answers:
  - generate에 double-spending 공격을 방지하는 트랜잭션의 고유 식별자를 제공합니다
  - 효율적인 네트워크 전송을 위해 트랜잭션 데이터를 더 작은 형식으로 압축하려면 다음과 같이 하세요
  - 받는 사람만 코인을 해독하고 사용할 수 있도록 거래 내용을 암호화합니다
explanation: |
  시해시 구조는 개인 키로 서명된 정확한 메시지를 생성하여 OP_CHECKSIG가 서명의 진위 여부를 확인할 수 있게 합니다. 이 프로세스에는 스크립트시그 비우기, 현재 입력의 스크립트시그를 해당 스크립트펍키로 바꾸기, 이중 해싱 전에 해시 유형을 추가하는 작업이 포함됩니다. 다른 옵션은 트랜잭션 ID가 식별자 역할을 하고, 압축은 별도로 처리되며, Bitcoin 트랜잭션은 암호화되지 않지만 블록체인에서 공개적으로 볼 수 있는 잘못된 옵션입니다.
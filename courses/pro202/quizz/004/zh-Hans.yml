question: 要在椭圆曲线上找到 P + Q 点，需要进行什么数学运算？
answer: 通过点 P 和 Q 画一条直线，找到第三个交点 R，然后将 R 反射过 x 轴
wrong_answers:
  - 使用模块化算术将 P 和 Q 的 x 坐标和 y 坐标直接相加
  - 将 P 和 Q 的坐标相乘，应用曲线方程得出结果
  - 计算 P 和 Q 之间的中点，然后应用切线法求和
explanation: |
  椭圆曲线点加法遵循特定的几何法则：通过两点 P 和 Q 画一条直线，与曲线相交于第三点 R，然后将 R 反射过 x 轴，得到 P + Q。其他选项描述的是不符合椭圆曲线既定群法的错误方法。
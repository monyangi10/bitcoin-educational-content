question: چه عملیاتی ریاضی برای یافتن نقطه P + Q روی یک منحنی بیضوی استفاده می‌شود؟
answer: از طریق نقاط P و Q یک خط رسم کنید، نقطه تقاطع سوم R را پیدا کنید، سپس R را نسبت به محور x بازتاب دهید.
wrong_answers:
  - مختصات x و y نقاط P و Q را مستقیماً با استفاده از حساب مدولار جمع کنید.
  - مختصات P و Q را در هم ضرب کنید و معادله منحنی را اعمال کنید تا نتیجه را بیابید
  - نقطه میانی بین P و Q را محاسبه کنید و سپس روش خط مماس را برای به دست آوردن مجموع اعمال کنید
explanation: |
  افزودن نقطه روی منحنی بیضوی از یک قاعده هندسی خاص پیروی می‌کند: یک خط از دو نقطه P و Q بکشید که منحنی را در نقطه سوم R قطع کند، سپس R را نسبت به محور x بازتاب دهید تا P + Q به دست آید. این عملیات هندسی هنگام کار با میدان‌های متناهی به یک عملیات جبری تبدیل می‌شود اما همان اصل بنیادی را حفظ می‌کند. گزینه‌های دیگر روش‌های نادرستی را توصیف می‌کنند که از قانون گروهی تعیین‌شده برای منحنی‌های بیضوی پیروی نمی‌کنند.
question: 타원 곡선에서 점 P + Q를 구하는 데 사용되는 수학 연산은 무엇인가요?
answer: 점 P와 Q를 통과하는 선을 그리고 세 번째 교차점 R을 찾은 다음 x축을 가로질러 R을 반영합니다
wrong_answers:
  - 모듈식 산술을 사용하여 P와 Q의 x 좌표와 y 좌표를 직접 추가합니다
  - P와 Q의 좌표를 함께 곱하고 곡선 방정식을 적용하여 결과를 구합니다
  - P와 Q 사이의 중간점을 계산한 다음 탄젠트 라인 방법을 적용하여 합계를 구합니다
explanation: |
  타원 곡선 점 더하기는 특정 기하학적 규칙을 따릅니다. 두 점 P와 Q를 통과하는 선을 그려 세 번째 점 R에서 곡선과 교차시킨 다음 x축에 R을 반영하여 P + Q를 구합니다. 이 기하학적 연산은 유한한 필드에서 작업할 때 대수적이지만 기본 원리는 동일하게 유지됩니다. 다른 옵션은 타원 곡선에 대해 확립된 그룹 법칙을 따르지 않는 잘못된 방법을 설명합니다.
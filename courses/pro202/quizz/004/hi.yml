question: किसी दीर्घवृत्तीय वक्र पर बिंदु P + Q ज्ञात करने के लिए किस गणितीय संक्रिया का उपयोग किया जाता है?
answer: बिंदुओं P और Q से होकर एक रेखा खींचिए, तीसरा प्रतिच्छेदन बिंदु R ज्ञात कीजिए, फिर R को x-अक्ष के पार परावर्तित कीजिए।
wrong_answers:
  - मॉड्यूलर अंकगणित का उपयोग करके P और Q के x-निर्देशांक और y-निर्देशांक को सीधे जोड़ें।
  - P और Q के निर्देशांकों को आपस में गुणा करें और परिणाम ज्ञात करने के लिए वक्र समीकरण का प्रयोग करें।
  - P और Q के बीच का मध्यबिंदु ज्ञात कीजिए और फिर स्पर्शरेखा विधि का प्रयोग करके योग ज्ञात कीजिए।
explanation: |
  दीर्घवृत्तीय वक्रों में बिंदुओं का योग एक विशिष्ट ज्यामितीय नियम का पालन करता है: दो बिंदुओं P और Q से होकर एक रेखा खींची जाती है, जो वक्र को तीसरे बिंदु R पर काटती है, फिर R को x-अक्ष के पार परावर्तित करके P + Q प्राप्त किया जाता है। परिमित क्षेत्रों पर कार्य करते समय यह ज्यामितीय संक्रिया बीजगणितीय हो जाती है, लेकिन मूल सिद्धांत वही रहता है। अन्य विकल्प गलत विधियों का वर्णन करते हैं जो दीर्घवृत्तीय वक्रों के लिए स्थापित समूह नियम का पालन नहीं करते हैं।
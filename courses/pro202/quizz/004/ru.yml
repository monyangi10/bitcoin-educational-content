question: Какая математическая операция используется для нахождения точки P + Q на эллиптической кривой?
answer: Проведите прямую через точки P и Q, найдите третью точку пересечения R, затем отразите R через ось x
wrong_answers:
  - Сложите координаты x и y точек P и Q напрямую, используя модульную арифметику
  - Умножьте координаты P и Q вместе и примените уравнение кривой, чтобы найти результат
  - Вычислите медиану между P и Q, а затем примените метод касательной линии, чтобы получить сумму
explanation: |
  Сложение точек эллиптических кривых подчиняется определенному геометрическому правилу: проведите через две точки P и Q прямую, которая пересекает кривую в третьей точке R, затем отразите R через ось x, чтобы получить P + Q. Эта геометрическая операция становится алгебраической при работе над конечными полями, но сохраняет тот же фундаментальный принцип. Остальные варианты описывают неверные методы, которые не следуют установленному групповому закону для эллиптических кривых.
question: 楕円曲線上の点P + Qを求めるには、どのような数学的操作を行うか？
answer: 点Pと点Qを通る線を引き、3つ目の交点Rを求め、RをX軸に反射させる。
wrong_answers:
  - モジュール演算を使って、PとQのx座標とy座標を直接加算する。
  - PとQの座標を掛け合わせ、曲線の方程式を適用して結果を求める。
  - PとQの中点を計算し、接線法を適用して合計を求める。
explanation: |
  楕円曲線の点加算は特定の幾何学的法則に従う：2点PとQを通る線を引き、3点Rで曲線と交差させ、Rをx軸に反射させてP + Qを得る。この幾何学的操作は、有限体上で働くときには代数的になるが、同じ基本原理を維持する。他の選択肢は、楕円曲線に対して確立された群法則に従わない誤った方法を説明しています。
question: การดำเนินการทางคณิตศาสตร์ที่ใช้ในการหาจุด P + Q บนเส้นโค้งวงรีคืออะไร?
answer: วาดเส้นผ่านจุด P และ Q หาจุดตัดที่สาม R จากนั้นสะท้อน R ข้ามแกน x
wrong_answers:
  - เพิ่มพิกัด x และพิกัด y ของ P และ Q โดยตรงโดยใช้เลขคณิตแบบโมดูลาร์
  - คูณพิกัดของ P และ Q เข้าด้วยกันและใช้สมการเส้นโค้งเพื่อหาผลลัพธ์
  - คำนวณจุดกึ่งกลางระหว่าง P และ Q จากนั้นใช้วิธีเส้นสัมผัสเพื่อหาผลรวม
explanation: |
  การบวกจุดบนเส้นโค้งวงรีตามกฎเรขาคณิตเฉพาะ: วาดเส้นผ่านจุดสองจุด P และ Q ซึ่งตัดกับเส้นโค้งที่จุดที่สาม R จากนั้นสะท้อน R ข้ามแกน x เพื่อให้ได้ P + Q การดำเนินการทางเรขาคณิตนี้กลายเป็นพีชคณิตเมื่อทำงานในฟิลด์จำกัดแต่ยังคงรักษาหลักการพื้นฐานเดียวกัน ตัวเลือกอื่นๆ อธิบายวิธีการที่ไม่ถูกต้องซึ่งไม่เป็นไปตามกฎกลุ่มที่กำหนดไว้สำหรับเส้นโค้งวงรี
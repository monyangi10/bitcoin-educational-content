question: Коя математическа операция се използва за намиране на точка P + Q върху елиптична крива?
answer: Начертайте линия през точките P и Q, намерете третата пресечна точка R, след което отразете R през оста x
wrong_answers:
  - Събиране на x-координатите и y-координатите на P и Q директно чрез модулна аритметика
  - Умножете заедно координатите на P и Q и приложете уравнението на кривата, за да получите резултата
  - Изчислете средната точка между P и Q и след това приложете метода на допирателната линия, за да получите сумата
explanation: |
  Събирането на точки на елиптична крива следва специфично геометрично правило: начертайте линия през двете точки P и Q, която пресича кривата в трета точка R, след което отразете R през оста x, за да получите P + Q. Тази геометрична операция става алгебрична, когато се работи над крайни полета, но запазва същия основен принцип. Другите варианти описват неправилни методи, които не следват установения групов закон за елиптични криви.
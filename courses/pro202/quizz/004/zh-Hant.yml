question: 要在橢圓曲線上找到點 P + Q，要使用什麼數學運算？
answer: 畫一條經過點 P 和 Q 的線，找出第三個交點 R，然後將 R 反射過 x 軸
wrong_answers:
  - 使用模數運算直接將 P 和 Q 的 x 坐標和 y 坐標相加
  - 將 P 和 Q 的座標相乘，並運用曲線公式求出結果
  - 計算 P 與 Q 之間的中點，然後運用切線法求出總和
explanation: |
  橢圓曲線的點加法遵循特定的幾何規律：畫一條直線，經過兩個點 P 和 Q，與曲線相交於第三個點 R，然後反射 R 過 x 軸，得到 P + Q。其他選項描述的是不遵循橢圓曲線既定群法的錯誤方法。
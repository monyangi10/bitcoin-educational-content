question: BIP34 को Coinbase लेनदेन के scriptSig फ़ील्ड में ब्लॉक की ऊंचाई एम्बेड करने की आवश्यकता क्यों होती है?
answer: यह सुनिश्चित करने के लिए कि प्रत्येक Coinbase transaction ID सभी ब्लॉकों में अद्वितीय हो
wrong_answers:
  - जब नॉनस स्पेस समाप्त हो जाता है तो माइनर्स के लिए अतिरिक्त एंट्रॉपी प्रदान करने के लिए
  - लाइट क्लाइंट्स को पूरे ब्लॉक डाउनलोड किए बिना ब्लॉक ऑर्डरिंग को सत्यापित करने में सक्षम बनाने के लिए
  - खनिकों को अनुमत राशि से अधिक ब्लॉक सब्सिडी का दावा करने से रोकने के लिए
explanation: |
  BIP34 के तहत Coinbase scriptSig में ब्लॉक हाइट को शामिल करना अनिवार्य है ताकि प्रत्येक Coinbase transaction ID की विशिष्टता सुनिश्चित हो सके। इस आवश्यकता के बिना, सैद्धांतिक रूप से अलग-अलग हाइट वाले दो ब्लॉकों में समान Coinbase लेनदेन हो सकते हैं, जिससे डुप्लिकेट txids बन सकते हैं जो Bitcoin की लेनदेन विशिष्टता संबंधी मान्यताओं का उल्लंघन करेंगे और txid द्वारा अनुक्रमित किए जाने वाले कार्यान्वयनों में डेटाबेस संबंधी टकराव पैदा कर सकते हैं।
question: چرا BIP34 نیاز دارد که ارتفاع بلاک در فیلد scriptSig تراکنش Coinbase جاسازی شود؟
answer: برای اطمینان از اینکه هر Coinbase transaction ID در تمام بلاک‌ها منحصر به فرد است
wrong_answers:
  - برای ارائه آنتروپی اضافی به ماینرها زمانی که فضای نانس به پایان می‌رسد
  - برای فعال‌سازی کلاینت‌های سبک جهت تأیید ترتیب بلوک‌ها بدون دانلود بلوک‌های کامل
  - برای جلوگیری از اینکه ماینرها یارانه‌های بلوک را بیشتر از مقدار مجاز مطالبه کنند
explanation: |
  BIP34 الزام می‌کند که ارتفاع بلاک در Coinbase scriptSig به‌طور خاص برای تضمین یکتایی هر Coinbase transaction ID گنجانده شود. بدون این الزام، دو بلاک در ارتفاعات مختلف می‌توانند به‌طور نظری تراکنش‌های Coinbase یکسانی داشته باشند، که باعث ایجاد txidهای تکراری می‌شود که فرضیات یکتایی تراکنش Bitcoin را نقض کرده و ممکن است در پیاده‌سازی‌هایی که بر اساس txid فهرست‌بندی می‌کنند، باعث تضاد در پایگاه داده شوند.
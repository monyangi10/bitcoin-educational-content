question: ทำไม BIP34 ถึงต้องการฝัง block height ในฟิลด์ scriptSig ของธุรกรรม Coinbase?
answer: เพื่อให้แน่ใจว่า Coinbase transaction ID ทุกตัวมีความเป็นเอกลักษณ์ในทุกบล็อก
wrong_answers:
  - เพื่อให้ความเอนโทรปีเพิ่มเติมสำหรับนักขุดเมื่อพื้นที่ nonce หมด
  - เพื่อให้ไคลเอนต์แบบเบาสามารถตรวจสอบการเรียงลำดับบล็อกได้โดยไม่ต้องดาวน์โหลดบล็อกทั้งหมด
  - เพื่อป้องกันไม่ให้นักขุดเรียกร้องเงินอุดหนุนบล็อกที่สูงกว่าจำนวนที่อนุญาต
explanation: |
  BIP34 กำหนดให้มีการรวม block height ใน Coinbase scriptSig โดยเฉพาะเพื่อรับประกันความเป็นเอกลักษณ์ของทุก Coinbase transaction ID หากไม่มีข้อกำหนดนี้ บล็อกสองบล็อกที่มีความสูงต่างกันอาจมีธุรกรรม Coinbase ที่เหมือนกันในทางทฤษฎี ซึ่งจะสร้าง txids ซ้ำกันที่ละเมิดสมมติฐานความเป็นเอกลักษณ์ของธุรกรรมของ Bitcoin และอาจทำให้เกิดความขัดแย้งในฐานข้อมูลในระบบที่จัดทำดัชนีโดย txid ได้
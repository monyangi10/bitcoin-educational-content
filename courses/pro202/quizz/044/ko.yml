question: BIP34에서 코인베이스 트랜잭션의 스크립트 서명 필드에 블록 높이를 포함해야 하는 이유는 무엇인가요?
answer: 모든 코인베이스 transaction ID은 모든 블록에서 고유합니다
wrong_answers:
  - 논스 공간이 소진될 때 채굴자에게 추가 엔트로피 제공
  - 라이트 클라이언트가 전체 블록을 다운로드하지 않고도 블록 주문을 확인할 수 있도록 하려면 다음과 같이 하세요
  - 채굴자가 허용된 금액보다 더 많은 블록 보조금을 청구하는 것을 방지하기 위해
explanation: |
  BIP34는 모든 코인베이스 transaction ID의 고유성을 보장하기 위해 특별히 코인베이스 스크립트시그에 블록 높이 포함을 의무화합니다. 이 요구 사항이 없으면 높이가 다른 두 블록이 이론적으로 동일한 코인베이스 트랜잭션을 가질 수 있으며, 이는 중복 txid를 생성하여 Bitcoin의 트랜잭션 고유성 가정을 위반하고 txid으로 인덱싱하는 구현에서 데이터베이스 충돌을 일으킬 가능성이 있습니다.
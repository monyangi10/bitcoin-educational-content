question: Почему BIP34 требует встраивания высоты блока в поле scriptSig транзакции Coinbase?
answer: Чтобы обеспечить уникальность каждого transaction ID Coinbase во всех блоках
wrong_answers:
  - Обеспечение дополнительной энтропии для майнеров, когда пространство несов исчерпано
  - Чтобы легкие клиенты могли проверять порядок блоков без загрузки полных блоков
  - Чтобы не позволить майнерам требовать субсидии на блок, превышающие допустимую сумму
explanation: |
  BIP34 предписывает включать высоту блока в скриптSig Coinbase специально для того, чтобы гарантировать уникальность каждой транзакции Coinbase transaction ID. Без этого требования два блока с разной высотой теоретически могли бы иметь идентичные транзакции Coinbase, создавая дубликаты txid, которые нарушали бы предположения Bitcoin об уникальности транзакций и потенциально вызывали бы конфликты баз данных в реализациях, индексирующих по txid.
question: Защо BIP34 изисква вграждане на височината на блока в полето scriptSig на трансакцията в Coinbase?
answer: За да се гарантира, че всеки transaction ID на Coinbase е уникален във всички блокове
wrong_answers:
  - Осигуряване на допълнителна ентропия за миньорите, когато пространството за нонси е изчерпано
  - За да се даде възможност на леките клиенти да проверяват подредбата на блоковете, без да изтеглят пълни блокове
  - За да се попречи на миньорите да претендират за блокови субсидии, по-високи от разрешената сума
explanation: |
  BIP34 задължава включването на височината на блока в Coinbase scriptSig специално, за да се гарантира уникалността на всеки Coinbase transaction ID. Без това изискване два блока с различна височина теоретично биха могли да имат идентични транзакции в Coinbase, създавайки дублиращи се txids, които биха нарушили предположенията за уникалност на транзакциите в Bitcoin и потенциално биха предизвикали конфликти в базите данни в реализациите, които индексират по txid.
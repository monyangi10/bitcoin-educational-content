question: なぜBIP34はCoinbase取引のscriptSigフィールドにブロックの高さを埋め込む必要があるのですか？
answer: すべてのCoinbase transaction IDがすべてのブロックで一意であることを保証する。
wrong_answers:
  - ノンス空間を使い果たしたときに、マイナーに追加のエントロピーを提供する。
  - ライトクライアントがフルブロックをダウンロードせずにブロックの順序を検証できるようにする。
  - マイナーが許容量を超えるブロック補助金を請求するのを防ぐため
explanation: |
  BIP34 では、Coinbase の各 transaction ID の一意性を保証するために、Coinbase の scriptSig にブロックの高さを含めることを特に義務付けている。この要件がなければ、高さの異なる 2 つのブロックが理論上同一の Coinbase トランザクションを持つ可能性があり、Bitcoin のトランザクションの一意性の仮定に違反する重複した txid を作成し、txid によってインデックスを作成する実装においてデータベースの競合を引き起こす可能性がある。
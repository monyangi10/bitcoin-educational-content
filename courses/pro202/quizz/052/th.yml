question: ข้อได้เปรียบหลักที่การพิสูจน์ Merkle มอบให้กับลูกค้า SPV (Simplified Payment Verification) เมื่อยืนยันการรวมธุรกรรมคืออะไร?
answer: พวกเขาอนุญาตให้ตรวจสอบการรวมธุรกรรมโดยไม่ต้องดาวน์โหลดบล็อกทั้งหมด ซึ่งต้องการเพียงไม่กี่ร้อยไบต์แม้สำหรับบล็อกที่มีธุรกรรมหลายพันรายการ
wrong_answers:
  - พวกเขากำจัดความจำเป็นในการตรวจสอบแฮชบล็อกกับเป้าหมายความยาก ลดความต้องการในการคำนวณสำหรับไคลเอนต์ที่มีน้ำหนักเบา
  - พวกเขาให้หลักฐานการเข้ารหัสที่ป้องกันการโจมตี double-spending โดยการตรวจสอบความถูกต้องของข้อมูลธุรกรรมทั้งหมดภายในบล็อก
  - พวกเขาช่วยให้ลูกค้า SPV สามารถสร้างประวัติการทำธุรกรรมทั้งหมดขึ้นมาใหม่ได้โดยไม่ต้องเชื่อมต่อกับโหนดเต็มหลายตัวพร้อมกัน
explanation: |
  Merkle proofs ใช้ประโยชน์จากคุณสมบัติการเติบโตแบบลอการิทึมของ Merkle trees ทำให้ลูกค้า SPV สามารถตรวจสอบการรวมธุรกรรมได้ด้วยแฮชพี่น้องตามเส้นทางไปยังราก ซึ่งต้องการเพียงไม่กี่ร้อยไบต์ไม่ว่าจะมีขนาดบล็อกเท่าใด ทำให้เป็นไปได้สำหรับลูกค้าที่มีน้ำหนักเบา คำตอบที่ผิดทำให้เกิดความสับสนระหว่าง Merkle proofs กับกลไก Bitcoin อื่น ๆ - พวกมันไม่ได้กำจัดการตรวจสอบความยากลำบาก, ไม่ได้ป้องกัน double-spending โดยตรง, และไม่ได้สร้างประวัติธุรกรรมขึ้นใหม่
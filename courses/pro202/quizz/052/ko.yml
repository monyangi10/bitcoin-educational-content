question: 거래 포함 여부를 확인할 때 머클 증명이 SPV(간편결제 인증) 고객에게 제공하는 주요 이점은 무엇인가요?
answer: 전체 블록을 다운로드하지 않고도 트랜잭션 포함 여부를 확인할 수 있으며, 수천 개의 트랜잭션이 포함된 블록의 경우에도 몇 백 바이트만 필요합니다
wrong_answers:
  - 난이도 목표에 대해 블록 해시를 검증할 필요가 없으므로 경량 클라이언트의 계산 요구 사항이 줄어듭니다
  - 블록 내의 모든 트랜잭션 입력을 검증하여 double-spending 공격을 방지하는 암호화 증명을 제공합니다
  - 이를 통해 SPV 클라이언트는 여러 개의 전체 노드에 동시에 연결하지 않고도 전체 거래 내역을 재구성할 수 있습니다
explanation: |
  머클 증명은 머클 트리의 로그 성장 속성을 활용하여 SPV 클라이언트가 루트 경로를 따라 형제 해시만으로 트랜잭션 포함 여부를 확인할 수 있게 합니다. 이는 블록 크기에 관계없이 수백 바이트만 필요하므로 경량 클라이언트에게 실용적입니다. 오답은 머클 증명을 다른 Bitcoin 메커니즘과 혼동하는데, 이는 난이도 검증을 제거하지 않고, double-spending을 직접 방지하지 않으며, 트랜잭션 기록을 재구성하지 않기 때문입니다.
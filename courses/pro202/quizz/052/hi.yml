question: लेन-देन की पुष्टि करते समय मर्कल प्रूफ एसपीवी (सरलीकृत भुगतान सत्यापन) ग्राहकों को क्या प्राथमिक लाभ प्रदान करते हैं?
answer: ये पूरे ब्लॉक को डाउनलोड किए बिना लेनदेन की पुष्टि करने की सुविधा देते हैं, यहाँ तक कि हजारों लेनदेन वाले ब्लॉक के लिए भी केवल कुछ सौ बाइट्स की आवश्यकता होती है।
wrong_answers:
  - ये कठिनाई लक्ष्य के विरुद्ध ब्लॉक हैश को सत्यापित करने की आवश्यकता को समाप्त करते हैं, जिससे हल्के क्लाइंट के लिए कम्प्यूटेशनल आवश्यकताएं कम हो जाती हैं।
  - वे क्रिप्टोग्राफिक प्रमाण प्रदान करते हैं जो ब्लॉक के भीतर सभी लेनदेन इनपुट को मान्य करके double-spending हमलों को रोकता है।
  - ये SPV क्लाइंट्स को एक साथ कई फुल नोड्स से कनेक्ट किए बिना संपूर्ण लेनदेन इतिहास को पुनर्निर्मित करने में सक्षम बनाते हैं।
explanation: |
  मर्कल प्रूफ़, मर्कल ट्री की लॉगरिदमिक वृद्धि विशेषता का लाभ उठाते हैं, जिससे SPV क्लाइंट रूट तक के पथ पर केवल सिबलिंग हैश का उपयोग करके लेनदेन समावेशन को सत्यापित कर सकते हैं। ब्लॉक आकार चाहे जो भी हो, इसके लिए केवल कुछ सौ बाइट्स की आवश्यकता होती है, जिससे यह हल्के क्लाइंट के लिए व्यावहारिक हो जाता है। गलत उत्तर मर्कल प्रूफ़ को अन्य Bitcoin तंत्रों के साथ भ्रमित करते हैं - वे कठिनाई सत्यापन को समाप्त नहीं करते, double-spending को सीधे नहीं रोकते, और लेनदेन इतिहास का पुनर्निर्माण नहीं करते।
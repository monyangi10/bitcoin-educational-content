question: 在驗證交易包含性時，Merkle 證明為 SPV（簡化支付驗證）客戶提供的主要優勢是什麼？
answer: 它們允許在不下載整個區塊的情況下驗證交易的包含性，即使是包含數千筆交易的區塊，也只需要幾百個位元組。
wrong_answers:
  - 它們消除了根據難度目標驗證區塊切細值的需要，降低了輕量級用戶端的計算需求。
  - 它們提供加密證明，藉由驗證區塊內的所有交易輸入，防止 double-spending 攻擊。
  - 它們可讓 SPV 用戶端重建完整的交易歷史，而無需同時連線到多個完整節點
explanation: |
  Merkle 證明利用 Merkle 樹的對數成長特性，讓 SPV 用戶端僅需沿著通往根的路徑的兄弟哈希值，即可驗證交易的包含性。無論區塊大小如何，這只需要幾百個位元組，因此對於輕量級用戶端而言非常實用。錯誤的答案混淆了 Merkle 證明與其他 Bitcoin 機制 - 它不會消除困難驗證，不會直接防止 double-spending，也不會重建交易歷史。
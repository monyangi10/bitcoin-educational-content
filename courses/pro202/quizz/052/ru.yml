question: Какое основное преимущество дают доказательства Меркла клиентам SPV (Simplified Payment Verification) при проверке включения транзакций?
answer: Они позволяют проверять включение транзакций без загрузки всего блока, требуя всего несколько сотен байт даже для блоков с тысячами транзакций
wrong_answers:
  - Они избавляют от необходимости сверять хэш блока с целевой сложностью, снижая вычислительные требования для легких клиентов
  - Они обеспечивают криптографическое доказательство, которое предотвращает атаки double-spending, проверяя все входы транзакций в блоке
  - Они позволяют клиентам SPV восстанавливать полную историю транзакций без одновременного подключения к нескольким полным узлам
explanation: |
  Доказательства Меркла используют свойство логарифмического роста деревьев Меркла, позволяя клиентам SPV проверять включение транзакций, используя только хэши братьев и сестер на пути к корню. Для этого требуется всего несколько сотен байт независимо от размера блока, что делает его практичным для легких клиентов. Неправильные ответы путают доказательства Меркла с другими механизмами Bitcoin - они не устраняют сложность проверки, не предотвращают double-spending напрямую и не восстанавливают историю транзакций.
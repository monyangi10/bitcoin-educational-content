question: مزیت اصلی که اثبات‌های مرکل به مشتریان SPV (تأیید پرداخت ساده‌شده) در هنگام تأیید شمول تراکنش ارائه می‌دهند چیست؟
answer: آن‌ها اجازه می‌دهند که تأیید گنجاندن تراکنش بدون دانلود کل بلاک انجام شود و تنها به چند صد بایت نیاز دارند، حتی برای بلاک‌هایی با هزاران تراکنش.
wrong_answers:
  - آن‌ها نیاز به تأیید هش بلوک در برابر هدف سختی را از بین می‌برند و نیازهای محاسباتی برای مشتریان سبک‌وزن را کاهش می‌دهند.
  - آن‌ها با ارائه اثبات رمزنگاری که از حملات double-spending جلوگیری می‌کند، تمامی ورودی‌های تراکنش درون بلوک را اعتبارسنجی می‌کنند.
  - آن‌ها به مشتریان SPV این امکان را می‌دهند که تاریخچه کامل تراکنش‌ها را بدون اتصال همزمان به چندین نود کامل بازسازی کنند.
explanation: |
  اثبات‌های مرکل از ویژگی رشد لگاریتمی درخت‌های مرکل بهره می‌برند و به مشتریان SPV اجازه می‌دهند تا با استفاده از هش‌های هم‌سطح در مسیر به ریشه، شامل بودن تراکنش را تأیید کنند. این کار تنها به چند صد بایت نیاز دارد، بدون توجه به اندازه بلوک، که آن را برای مشتریان سبک‌وزن عملی می‌سازد. پاسخ‌های نادرست اثبات‌های مرکل را با دیگر مکانیزم‌های Bitcoin اشتباه می‌گیرند - آن‌ها تأیید سختی را حذف نمی‌کنند، به طور مستقیم از double-spending جلوگیری نمی‌کنند و تاریخچه تراکنش را بازسازی نمی‌کنند.
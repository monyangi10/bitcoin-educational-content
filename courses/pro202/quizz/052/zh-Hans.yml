question: 在验证交易包含性时，Merkle 证明为 SPV（简化支付验证）客户提供的主要优势是什么？
answer: 它们允许在不下载整个区块的情况下验证交易是否包含，即使是包含数千笔交易的区块，也只需要几百个字节
wrong_answers:
  - 它们消除了根据难度目标验证区块哈希值的需要，降低了轻量级客户端的计算要求
  - 它们提供加密证明，通过验证区块内的所有交易输入，防止 double-spending 攻击
  - 它们使 SPV 客户能够重建完整的交易历史，而无需同时连接多个完整节点
explanation: |
  Merkle 证明利用了 Merkle 树的对数增长特性，使 SPV 客户端只需沿着通往根节点的路径验证兄弟哈希值，就能验证交易的包含性。无论区块大小如何，这只需要几百个字节，因此对于轻量级客户端来说非常实用。错误的答案混淆了默克尔证明和其他 Bitcoin 机制--它们不会消除验证难度，不会直接防止 double-spending，也不会重建交易历史。
question: トランザクションの包含を検証する際、メルクル証明がSPV（Simplified Payment Verification）クライアントに提供する主な利点は何ですか？
answer: ブロック全体をダウンロードすることなくトランザクションの包含を検証できるため、数千のトランザクションがあるブロックでも数百バイトしか必要としない。
wrong_answers:
  - 難易度ターゲットに対してブロックハッシュを検証する必要がなくなり、軽量クライアントの計算要件が軽減される。
  - ブロック内のすべてのトランザクション入力を検証することで、double-spending 攻撃を防ぐ暗号的証明を提供する。
  - SPVクライアントは、複数のフルノードに同時に接続することなく、完全な取引履歴を再構築することができる。
explanation: |
  Merkle証明はMerkle木の対数成長特性を利用しており、SPVクライアントはルートへのパスに沿った兄弟ハッシュだけでトランザクションの包含を検証できる。これはブロックサイズに関係なく数百バイトしか必要としないため、軽量なクライアントにとっては実用的である。誤答はマルクル証明と他のBitcoinメカニズムを混同している。マルクル証明は難易度検証を排除せず、double-spendingを直接防止せず、取引履歴を再構築しない。
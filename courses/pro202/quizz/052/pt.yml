question: Qual é a principal vantagem que as provas de Merkle proporcionam aos clientes SPV (Simplified Payment Verification) quando verificam a inclusão de transacções?
answer: Permitem verificar a inclusão de transacções sem descarregar o bloco inteiro, exigindo apenas algumas centenas de bytes, mesmo para blocos com milhares de transacções
wrong_answers:
  - Eliminam a necessidade de verificar o hash do bloco em relação ao objetivo de dificuldade, reduzindo os requisitos computacionais para clientes ligeiros
  - Fornecem provas criptográficas que impedem ataques double-spending através da validação de todas as entradas de transacções dentro do bloco
  - Permitem aos clientes SPV reconstruir o historial completo das transacções sem se ligarem simultaneamente a vários nós completos
explanation: |
  As provas de Merkle exploram a propriedade de crescimento logarítmico das árvores de Merkle, permitindo que os clientes SPV verifiquem a inclusão de transacções apenas com os hashes irmãos ao longo do caminho para a raiz. Isso requer apenas algumas centenas de bytes, independentemente do tamanho do bloco, tornando-o prático para clientes leves. As respostas erradas confundem as provas de Merkle com outros mecanismos Bitcoin - não eliminam a verificação de dificuldades, não impedem diretamente o double-spending e não reconstroem o histórico de transacções.
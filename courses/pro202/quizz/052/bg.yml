question: Кое е основното предимство, което доказателствата на Merkle предоставят на клиентите на SPV (опростена проверка на плащанията) при проверката на включването на трансакции?
answer: Те позволяват проверка на включването на транзакциите, без да се изтегля целият блок, като се изискват само няколкостотин байта дори за блокове с хиляди транзакции
wrong_answers:
  - Те елиминират необходимостта от проверка на хеша на блока спрямо целта за трудност, което намалява изчислителните изисквания за леките клиенти
  - Те предоставят криптографско доказателство, което предотвратява атаките double-spending чрез валидиране на всички входни данни на трансакциите в рамките на блока
  - Те дават възможност на клиентите на SPV да възстановяват пълната история на транзакциите, без да се свързват едновременно с множество пълноценни възли
explanation: |
  Доказателствата на Меркел използват логаритмичното свойство на дърветата на Меркел за растеж, което позволява на клиентите на SPV да проверяват включването на транзакции само с хешовете на братята и сестрите по пътя към корена. Това изисква само няколкостотин байта, независимо от размера на блока, което го прави практично за леки клиенти. Грешните отговори объркват доказателствата на Меркъл с други механизми на Bitcoin - те не елиминират проверката на трудността, не предотвратяват директно double-spending и не реконструират историята на транзакциите.
question: Что бы произошло с общим предложением Bitcoin, если бы майнеры постоянно требовали только 90% от разрешенной субсидии на блок по всем блокам?
answer: Общий объем предложения навсегда сократится до 21 миллиона BTC, поскольку невостребованные субсидии будут потеряны навсегда
wrong_answers:
  - Оставшиеся 10% будут накапливаться в резервном фонде, чтобы будущие шахтеры могли претендовать на них в периоды низких тарифов
  - Механизм корректировки сложности компенсирует это за счет увеличения вознаграждения за будущие блоки, чтобы сохранить лимит в 21 миллион
  - Невостребованные субсидии будут пропорционально перераспределены между получателями транзакционных сборов в последующих блоках
explanation: |
  Протокол Bitcoin позволяет майнерам требовать меньше максимально допустимой субсидии, но любая невостребованная сумма навсегда теряется - нет механизма ее перераспределения или восстановления в дальнейшем. Формула субсидирования и график уменьшения вдвое определяют теоретический максимум в ~21 миллион BTC, но фактическое предложение зависит от того, заявят ли майнеры все свои права. В отличие от корректировки сложности, которая реагирует на условия mining, здесь нет механизма компенсации невостребованных наград, что делает общее предложение потенциально дефляционным, если шахтеры постоянно недополучают награды.
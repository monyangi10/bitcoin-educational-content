question: もし、採掘者がすべてのブロックにおいて、ブロック補助金の90％しか請求しなかったとしたら、Bitcoinの総供給量はどうなるだろうか？
answer: 未請求の補助金は永遠に失われるため、総供給量は永久に2,100万BTCを下回ることになる。
wrong_answers:
  - 残りの10％はリザーブ・プールに蓄積され、将来の採掘者が低料金期間に請求できるようになる。
  - 難易度調整メカニズムは、2100万ドルの上限を維持するために、将来のブロック報酬を増やすことで補う。
  - 未請求の補助金は、後続のブロックの取引手数料受領者に比例配分される。
explanation: |
  Bitcoinのプロトコルは、採掘者が許容される補助金の最大額より少ない額を請求することを認めているが、請求されなかった額は永久に失われる。補助金の計算式と半減スケジュールによって、理論上の最大値である2,100万BTCが決定されるが、実際の供給量は、採掘者がその権利をフルに主張するかどうかに依存する。miningの状況に対応する難易度調整とは異なり、未請求の報酬に対する補償メカニズムはないため、採掘者が一貫して未請求の場合、総供給量はデフレになる可能性がある。
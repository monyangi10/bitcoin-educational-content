question: จะเกิดอะไรขึ้นกับอุปทานรวมของ Bitcoin หากนักขุดเรียกร้องเพียง 90% ของเงินอุดหนุนบล็อกที่อนุญาตในทุกบล็อกอย่างสม่ำเสมอ?
answer: อุปทานทั้งหมดจะลดลงต่ำกว่า 21 ล้าน BTC อย่างถาวร เนื่องจากเงินอุดหนุนที่ไม่ได้รับการเรียกร้องจะสูญหายไปตลอดกาล
wrong_answers:
  - อีก 10% ที่เหลือจะสะสมในกองทุนสำรองสำหรับนักขุดในอนาคตเพื่อเรียกร้องในช่วงที่ค่าธรรมเนียมต่ำ
  - กลไกการปรับความยากจะชดเชยโดยการเพิ่มรางวัลบล็อกในอนาคตเพื่อรักษาขีดจำกัด 21 ล้าน
  - เงินอุดหนุนที่ไม่ได้เรียกร้องจะถูกแจกจ่ายใหม่ตามสัดส่วนในหมู่ผู้รับค่าธรรมเนียมการทำธุรกรรมในบล็อกถัดไป
explanation: |
  โปรโตคอลของ Bitcoin อนุญาตให้ผู้ขุดสามารถเรียกร้องเงินอุดหนุนได้น้อยกว่าจำนวนสูงสุดที่อนุญาต แต่จำนวนที่ไม่ได้เรียกร้องจะสูญหายไปอย่างถาวร—ไม่มีกลไกในการแจกจ่ายใหม่หรือกู้คืนในภายหลัง สูตรเงินอุดหนุนและตารางการลดลงครึ่งหนึ่งกำหนดจำนวนสูงสุดทางทฤษฎีที่ ~21 ล้าน BTC แต่ปริมาณจริงขึ้นอยู่กับการที่ผู้ขุดเรียกร้องสิทธิ์เต็มจำนวนของพวกเขา แตกต่างจากการปรับความยากที่ตอบสนองต่อเงื่อนไขของ mining ไม่มีกลไกชดเชยสำหรับรางวัลที่ไม่ได้เรียกร้อง ทำให้ปริมาณรวมอาจลดลงหากผู้ขุดเรียกร้องน้อยกว่าที่ควรอย่างต่อเนื่อง
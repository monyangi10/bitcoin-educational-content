question: اگر ماینرها به طور مداوم تنها 90% از یارانه بلوک مجاز را در تمام بلوک‌ها مطالبه کنند، چه اتفاقی برای عرضه کل Bitcoin خواهد افتاد؟
answer: عرض کل به طور دائمی به کمتر از 21 میلیون BTC کاهش می‌یابد، زیرا یارانه‌های ادعا نشده برای همیشه از دست می‌روند.
wrong_answers:
  - ۱۰٪ باقی‌مانده در یک استخر ذخیره جمع‌آوری می‌شود تا در دوره‌های با کارمزد پایین توسط ماینرهای آینده مطالبه شود.
  - مکانیزم تنظیم سختی با افزایش پاداش‌های بلوک آینده برای حفظ سقف ۲۱ میلیون جبران می‌کند.
  - یارانه‌های مطالبه‌نشده به‌طور متناسب بین دریافت‌کنندگان کارمزد تراکنش در بلوک‌های بعدی توزیع می‌شود.
explanation: |
  پروتکل Bitcoin به ماینرها اجازه می‌دهد که کمتر از حداکثر یارانه مجاز را مطالبه کنند، اما هر مقدار مطالبه نشده به‌طور دائمی از دست می‌رود—هیچ مکانیزمی برای بازتوزیع یا بازیابی آن در آینده وجود ندارد. فرمول یارانه و برنامه نصف شدن، حداکثر تئوریک ~21 میلیون BTC را تعیین می‌کنند، اما عرضه واقعی به این بستگی دارد که ماینرها حق کامل خود را مطالبه کنند. برخلاف تنظیم سختی که به شرایط mining پاسخ می‌دهد، هیچ مکانیزم جبرانی برای پاداش‌های مطالبه نشده وجود ندارد، که می‌تواند عرضه کل را به‌طور بالقوه کاهش دهد اگر ماینرها به‌طور مداوم کمتر از حق خود مطالبه کنند.
question: Какво би се случило с общото предлагане на Bitcoin, ако миньорите последователно заявяват само 90% от разрешената блокова субсидия за всички блокове?
answer: Общото предлагане ще бъде трайно намалено под 21 милиона BTC, тъй като непотърсените субсидии ще бъдат загубени завинаги
wrong_answers:
  - Останалите 10 % ще се натрупват в резервен фонд за бъдещи миньори, които ще могат да се възползват от тях по време на периодите на ниски такси
  - Механизмът за коригиране на трудността ще се компенсира чрез увеличаване на бъдещите награди за блокове, за да се запази горната граница от 21 млн
  - Непотърсените субсидии се преразпределят пропорционално между получателите на такси за трансакции в следващите блокове
explanation: |
  Протоколът на Bitcoin позволява на миньорите да поискат по-малко от максимално разрешената субсидия, но всяка непотърсена сума се губи завинаги - няма механизъм за преразпределяне или възстановяване по-късно. Формулата на субсидията и графикът за намаляване наполовина определят теоретичния максимум от ~21 милиона BTC, но действителното предлагане зависи от това дали миньорите заявяват пълното си право. За разлика от корекцията на трудността, която реагира на условията на mining, няма компенсаторен механизъм за непотърсените награди, което прави общото предлагане потенциално дефлационно, ако миньорите постоянно не заявяват достатъчно средства.
question: यदि खनिक सभी ब्लॉकों में अनुमत ब्लॉक सब्सिडी का केवल 90% ही लगातार दावा करते रहें तो Bitcoin की कुल आपूर्ति पर क्या प्रभाव पड़ेगा?
answer: कुल आपूर्ति स्थायी रूप से 21 मिलियन बीटीसी से कम हो जाएगी, क्योंकि बिना दावा किए गए अनुदान हमेशा के लिए समाप्त हो जाएंगे।
wrong_answers:
  - शेष 10% राशि एक आरक्षित कोष में जमा हो जाएगी, जिसे भविष्य में कम शुल्क वाले समय में खनिक दावा कर सकेंगे।
  - कठिनाई समायोजन तंत्र भविष्य में ब्लॉक पुरस्कारों को बढ़ाकर 21 मिलियन की सीमा को बनाए रखने के लिए क्षतिपूर्ति करेगा।
  - दावा न की गई सब्सिडी को बाद के चरणों में लेनदेन शुल्क प्राप्तकर्ताओं के बीच आनुपातिक रूप से पुनर्वितरित किया जाएगा।
explanation: |
  Bitcoin प्रोटोकॉल खनिकों को अधिकतम अनुमत सब्सिडी से कम राशि का दावा करने की अनुमति देता है, लेकिन दावा न की गई राशि स्थायी रूप से खो जाती है—इसे बाद में पुनर्वितरित या पुनर्प्राप्त करने का कोई तंत्र नहीं है। सब्सिडी का सूत्र और हाल्विंग शेड्यूल लगभग 21 मिलियन BTC की सैद्धांतिक अधिकतम सीमा निर्धारित करते हैं, लेकिन वास्तविक आपूर्ति खनिकों द्वारा अपने पूरे हक का दावा करने पर निर्भर करती है। mining की स्थितियों के अनुसार कठिनाई समायोजन के विपरीत, दावा न किए गए पुरस्कारों के लिए कोई क्षतिपूर्ति तंत्र नहीं है, जिससे यदि खनिक लगातार कम दावा करते हैं तो कुल आपूर्ति संभावित रूप से अपस्फीतिकारी हो सकती है।
question: Nini kingetokea kwa jumla ya usambazaji wa Bitcoin ikiwa wachimbaji wangedai 90% tu ya ruzuku ya vitalu vinavyoruhusiwa katika vitalu vyote?
answer: Jumla ya usambazaji ingepunguzwa kabisa chini ya BTC milioni 21, kwani ruzuku ambazo hazijadaiwa zinapotea milele
wrong_answers:
  - Asilimia 10 iliyobaki ingejilimbikiza kwenye hifadhi ya akiba kwa wachimbaji wa baadaye kudai wakati wa vipindi vya ada ya chini
  - Utaratibu wa kurekebisha ugumu ungefidia kwa kuongeza zawadi za vitalu vya baadaye ili kudumisha kikomo cha milioni 21.
  - Ruzuku ambazo hazijadaiwa zitasambazwa tena kwa uwiano miongoni mwa wapokeaji wa ada ya miamala katika vizuizi vifuatavyo
explanation: |
  Itifaki ya Bitcoin inaruhusu wachimbaji kudai chini ya ruzuku ya juu inayoruhusiwa, lakini kiasi chochote ambacho hakijadaiwa hupotea kabisa—hakuna utaratibu wa kuisambaza tena au kuirejesha baadaye. Fomula ya ruzuku na ratiba ya nusu huamua kiwango cha juu cha kinadharia cha ~ BTC milioni 21, lakini usambazaji halisi unategemea wachimbaji wanaodai haki yao kamili. Tofauti na marekebisho ya ugumu ambayo hujibu masharti ya mining, hakuna utaratibu wa fidia kwa zawadi ambazo hazijadaiwa, na kufanya jumla ya usambazaji iweze kushuka ikiwa wachimbaji watadai chini ya kiwango cha kawaida.
question: 如果礦工在所有區塊中持續只索取允許區塊補貼的 90%，Bitcoin 的總供應量會如何？
answer: 總供應量將永遠減少至 2100 萬 BTC 以下，因為未領取的補貼將永遠消失。
wrong_answers:
  - 餘下的 10%將累積在儲備池中，供未來的礦工在低費用期間申領。
  - 難度調整機制將透過增加未來區塊獎勵來補償，以維持 2,100 萬的上限
  - 未領取的補助金將在隨後的區塊中按比例在交易費領取者之間重新分配
explanation: |
  Bitcoin 的協定允許礦工索取少於允許補貼上限的金額，但任何未索取的金額都會永久流失 - 沒有機制可在日後重新分配或收回。補貼公式和減半時間表決定了理論上的最大值為 ~2100 萬 BTC，但實際供應量取決於礦工是否領取全部應得補貼。與回應 mining 條件的難度調整不同，對於未領取的獎金並沒有補償機制，因此如果礦工持續領取不足，總供應量可能會出現通縮。
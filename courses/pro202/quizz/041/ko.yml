question: 채굴자들이 모든 블록에서 허용된 블록 보조금의 90%만 지속적으로 청구한다면 Bitcoin의 총 공급량은 어떻게 될까요?
answer: 미청구 보조금은 영원히 사라지기 때문에 총 공급량은 2,100만 BTC 이하로 영구적으로 감소할 것입니다
wrong_answers:
  - 나머지 10%는 향후 채굴자가 낮은 수수료 기간에 청구할 수 있도록 예비 풀에 축적됩니다
  - 난이도 조정 메커니즘은 2100만 블록 상한선을 유지하기 위해 향후 블록 보상을 늘려 보상할 것입니다
  - 미청구 보조금은 다음 블록에서 거래 수수료 수령자에게 비례적으로 재분배됩니다
explanation: |
  Bitcoin의 프로토콜은 채굴자가 최대 허용 보조금보다 적은 금액을 청구할 수 있도록 허용하지만, 청구하지 않은 금액은 영구적으로 손실되며 나중에 이를 재분배하거나 회수할 수 있는 메커니즘이 없습니다. 보조금 공식과 반감기 일정에 따라 이론상 최대 2100만 BTC가 결정되지만, 실제 공급량은 채굴자가 자신의 전체 자격을 청구하는지에 따라 달라집니다. mining 조건에 대응하는 난이도 조정과 달리, 미청구 보상에 대한 보상 메커니즘이 없기 때문에 채굴자가 지속적으로 과소 청구할 경우 총 공급량이 디플레이션을 일으킬 가능성이 있습니다.
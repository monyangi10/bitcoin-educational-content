question: 如果矿工在所有区块中始终只领取允许区块补贴的 90%，Bitcoin 的总供应量会发生什么变化？
answer: 由于无人认领的补贴将永远消失，总供应量将永久性地减少到 2100 万 BTC 以下
wrong_answers:
  - 剩余的 10%将积存在一个储备金池中，供未来的矿工在低收费期间申领。
  - 难度调整机制将通过增加未来的区块奖励来补偿，以维持 2100 万的上限
  - 无人认领的补贴将在后续区块的交易费领取者中按比例重新分配
explanation: |
  Bitcoin 的协议允许矿工申领少于允许补贴上限的金额，但任何未申领的金额都将永久丢失--没有任何机制可在以后重新分配或收回。补贴公式和减半时间表决定了理论上的最高限额为 2,100 万 BTC，但实际供应量取决于矿工是否全额申领补贴。与根据 mining 条件进行的难度调整不同，对于未领取的奖励没有补偿机制，因此如果矿工持续少领，总供应量可能会出现通货紧缩。
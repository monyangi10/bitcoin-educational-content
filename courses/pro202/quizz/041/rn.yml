question: None vyogenda gute ku bijanye n’ivyo Bitcoin itanga vyose iyo abacukuzi baguma basaba gusa 90% vy’infashanyo y’amabuye yemerewe mu mabuye yose?
answer: Ivyo vyose vyobaye bigabanutse ubuziraherezo bikaja munsi y’amamiliyoni 21 y’ama BTC, kuko infashanyo zitasabwa zitakara ubuziraherezo .
wrong_answers:
  - 10% bisigaye vyokwirundanira mu mazi y’ububiko kugira ngo abazoba abacukuzi bo mu gihe kizoza bashobore kubisaba mu bihe vy’amahera make .
  - Uburyo bwo guhindura ingorane bwoshobora gusubiza inyuma mu kwongera ingororano z’amabarabara zo muri kazoza kugira ngo hagumyeho igipimo c’imiliyoni 21 .
  - Infashanyo zitasabwe zosubirwamwo mu buryo bubereye hagati y’abaronka amahera y’ugucuruza mu bice bikurikira .
explanation: |
  Itegeko rya Bitcoin ryemerera abacukuzi gusaba infashanyo ntoyi kuruta iyo bemerewe, ariko amahera yose batasavye arazimangana ubudasiba—nta buryo bwo kuyasubiramwo canke kuyagarura mu nyuma. Igitigiri c’infashanyo n’urutonde rwo guca ibice bibiri ni vyo bigena igitigiri c’amahera ~21 miliyoni BTC, ariko ivyo gutanga vy’ukuri bivana n’abacukuzi b’amabuye y’agaciro bavuga ko bafise uburenganzira bwose. Udakunze uguhindura ingorane kwishura ku bibazo vya mining, nta buryo bwo kwishura ku ngororano zitasabwe, bituma umubare wose ushobora gutakaza agaciro iyo abacukuzi baguma basaba.
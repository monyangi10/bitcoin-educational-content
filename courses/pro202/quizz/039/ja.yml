question: P2SHが資金回収の面で標準的なBitcoin取引と根本的に異なる主なセキュリティ・リスクは何ですか？
answer: リデム・スクリプトを紛失すると、秘密鍵を持っていても資金が永久にロックされる。
wrong_answers:
  - 20バイトのハッシュは、deemスクリプトが単純すぎる場合、ブルートフォースされる可能性がある。
  - P2SHアドレスは、あるブロックの高さを超えると期限切れとなり、資金が回収できなくなる
  - 2段階の検証プロセスはランダムに失敗する可能性があり、永久的な資金喪失を引き起こす。
explanation: |
  P2SHはユニークなセキュリティー要件を導入している。すなわち、資金を使用するためには、秘密鍵と引き換えスクリプトの両方が必要である。秘密鍵のみが必要とされる標準的な取引とは異なり、P2SHでは資金を使用する際に、実際の引き換えスクリプトを提供する必要がある。引き換えスクリプトを紛失した場合、正しい秘密鍵があろうとなかろうと、資金へのアクセスは永久に不可能となる。
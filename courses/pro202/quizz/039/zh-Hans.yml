question: 在资金回收方面，P2SH 与标准 Bitcoin 交易根本不同的主要安全风险是什么？
answer: 即使拥有私人密钥，丢失赎回脚本也会永久锁定资金
wrong_answers:
  - 如果赎回脚本过于简单，20 个字节的哈希值可能会被暴力破解
  - P2SH 地址在一定的区块高度后失效，资金无法收回
  - 两步验证程序可能会随机失败，造成永久性资金损失
explanation: |
  P2SH 引入了一个独特的安全要求：在使用资金时，既需要私人密钥，也需要赎回脚本。与只需要私钥的标准交易不同，P2SH 要求在消费时提供实际的赎回脚本。如果赎回脚本丢失，无论是否拥有正确的私钥，资金都将永久无法使用，因为消费条件无法重建或验证。
question: Кой е основният риск за сигурността, който прави P2SH коренно различна от стандартните транзакции Bitcoin по отношение на възстановяването на средства?
answer: Загубата на скрипта за обратно изкупуване блокира окончателно средствата, дори ако разполагате с частните ключове
wrong_answers:
  - 20-байтовият хеш може да бъде пробит, ако скриптът за изкупуване е твърде прост
  - P2SH адресите изтичат след определена височина на блока, което прави средствата невъзстановими
  - Процесът на валидиране в две стъпки може да се провали на случаен принцип, което води до постоянна загуба на средства
explanation: |
  P2SH въвежда уникално изискване за сигурност: за изразходването на средства са необходими както частните ключове, така и скриптът за изкупуване. За разлика от стандартните транзакции, при които са необходими само частни ключове, P2SH изисква действителният скрипт за изкупуване да бъде предоставен по време на изразходването на средствата. Ако скриптът за обратно изкупуване бъде изгубен, средствата стават трайно недостъпни, независимо от наличието на правилните частни ключове, тъй като условията за изразходване не могат да бъдат възстановени или потвърдени.
question: 자금 회수 측면에서 P2SH이 표준 Bitcoin 거래와 근본적으로 다른 주요 보안 위험은 무엇인가요?
answer: 상환 스크립트를 분실하면 개인 키가 있어도 자금이 영구적으로 잠깁니다
wrong_answers:
  - 교환 스크립트가 너무 단순하면 20바이트 해시를 무차별 대입할 수 있습니다
  - P2SH 주소는 특정 블록 높이가 지나면 만료되어 자금을 회수할 수 없게 됩니다
  - 2단계 검증 프로세스는 무작위로 실패하여 영구적인 자금 손실을 초래할 수 있습니다
explanation: |
  P2SH는 자금을 사용하려면 개인 키와 상환 스크립트가 모두 필요하다는 독특한 보안 요구사항을 도입했습니다. 개인 키만 필요한 표준 트랜잭션과 달리, P2SH에서는 지출 시 실제 사용 스크립트를 제공해야 합니다. 상환 스크립트를 분실하면 올바른 개인키가 있더라도 지출 조건을 재구성하거나 검증할 수 없으므로 자금에 영구적으로 액세스할 수 없게 됩니다.
question: В чем заключается основной риск безопасности, который принципиально отличает P2SH от стандартных транзакций Bitcoin с точки зрения возврата средств?
answer: Потеря скрипта погашения навсегда блокирует средства, даже если у вас есть закрытые ключи
wrong_answers:
  - 20-байтовый хэш может быть взломан, если сценарий погашения слишком прост
  - Адреса P2SH истекают через определенную высоту блока, что делает средства невозможными
  - Двухэтапный процесс проверки может быть случайным образом нарушен, что приведет к постоянной потере средств
explanation: |
  P2SH вводит уникальное требование безопасности: для расходования средств необходимы как приватные ключи, так и скрипт погашения. В отличие от стандартных транзакций, где требуются только приватные ключи, P2SH требует предоставления фактического сценария погашения во время расходования средств. Если сценарий погашения утерян, средства становятся навсегда недоступными, независимо от наличия правильных закрытых ключей, поскольку условия траты невозможно восстановить или подтвердить.
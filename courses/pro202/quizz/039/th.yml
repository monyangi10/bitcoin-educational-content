question: ความเสี่ยงด้านความปลอดภัยหลักที่ทำให้ P2SH แตกต่างจากธุรกรรม Bitcoin มาตรฐานในแง่ของการกู้คืนเงินคืออะไร?
answer: การสูญเสียสคริปต์แลกเปลี่ยนจะล็อคเงินอย่างถาวรแม้ว่าคุณจะมีคีย์ส่วนตัวก็ตาม
wrong_answers:
  - แฮชขนาด 20 ไบต์สามารถถูกโจมตีด้วยวิธี brute-force ได้หากสคริปต์การแลกมีความง่ายเกินไป
  - P2SH หมดอายุหลังจากบล็อกไฮต์ที่กำหนดทำให้ไม่สามารถกู้คืนเงินได้
  - กระบวนการตรวจสอบสองขั้นตอนอาจล้มเหลวแบบสุ่มทำให้สูญเสียเงินทุนถาวร
explanation: |
  P2SH แนะนำข้อกำหนดด้านความปลอดภัยที่ไม่เหมือนใคร: ต้องใช้ทั้งคีย์ส่วนตัวและสคริปต์การไถ่ถอนเพื่อใช้จ่ายเงิน ต่างจากธุรกรรมมาตรฐานที่ต้องใช้เพียงคีย์ส่วนตัวเท่านั้น P2SH ต้องการให้มีการจัดเตรียมสคริปต์การไถ่ถอนจริงในระหว่างการใช้จ่าย หากสคริปต์การไถ่ถอนสูญหาย เงินจะไม่สามารถเข้าถึงได้อย่างถาวรไม่ว่าจะมีคีย์ส่วนตัวที่ถูกต้องก็ตาม เนื่องจากไม่สามารถสร้างหรือยืนยันเงื่อนไขการใช้จ่ายได้
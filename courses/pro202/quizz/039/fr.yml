question: Quel est le principal risque de sécurité qui fait que la P2SH est fondamentalement différente des transactions Bitcoin standard en termes de récupération des fonds ?
answer: La perte du script de rachat bloque définitivement les fonds, même si vous possédez les clés privées
wrong_answers:
  - Le hachage de 20 octets peut être forcé brutalement si le script de redémarrage est trop simple
  - Les adresses P2SH expirent après une certaine hauteur de bloc, ce qui rend les fonds irrécupérables
  - Le processus de validation en deux étapes peut échouer de manière aléatoire et entraîner une perte permanente des fonds
explanation: |
  La P2SH introduit une exigence de sécurité unique : les clés privées ET le script de remboursement sont tous deux nécessaires pour dépenser des fonds. Contrairement aux transactions standard où seules les clés privées sont nécessaires, la P2SH exige que le script de remboursement soit fourni lors de la dépense. Si le script de remboursement est perdu, les fonds deviennent définitivement inaccessibles, même si l'on dispose des clés privées correctes, car les conditions de dépense ne peuvent être reconstituées ou validées.
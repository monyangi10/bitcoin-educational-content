question: 在資金回收方面，P2SH 與標準 Bitcoin 交易根本不同的主要安全風險是什麼？
answer: 即使您擁有私人金鑰，失去贖回指令碼也會永久鎖定資金
wrong_answers:
  - 如果贖回指令碼過於簡單，20 位元組雜湊可能會被暴力攻擊
  - P2SH 位址在特定區塊高度後會過期，導致資金無法回收
  - 兩個步驟的驗證程序可能會隨機失敗，導致永久資金損失
explanation: |
  P2SH 引入了一個獨特的安全要求：花費資金需要私人金鑰和兌換腳本。與只需要私人金鑰的標準交易不同，P2SH 要求在花費時提供實際的兌換指令碼。如果兌換腳本遺失，則無論是否擁有正確的私人金鑰，資金都將永遠無法存取，因為花費條件無法重建或驗證。
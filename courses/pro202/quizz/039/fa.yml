question: خطر امنیتی اصلی که P2SH را به طور اساسی از تراکنش‌های استاندارد Bitcoin در زمینه بازیابی وجوه متمایز می‌کند چیست؟
answer: از دست دادن اسکریپت بازخرید به طور دائمی وجوه را قفل می‌کند حتی اگر کلیدهای خصوصی را داشته باشید.
wrong_answers:
  - هش 20 بایتی می‌تواند با استفاده از نیروی بی‌رحمانه شکسته شود اگر اسکریپت بازخرید بیش از حد ساده باشد.
  - آدرس‌های P2SH پس از رسیدن به یک ارتفاع بلوک خاص منقضی می‌شوند و باعث می‌شوند که وجوه غیرقابل بازیابی شوند.
  - فرآیند اعتبارسنجی دو مرحله‌ای می‌تواند به صورت تصادفی شکست بخورد و باعث از دست رفتن دائمی وجوه شود.
explanation: |
  P2SH یک نیاز امنیتی منحصر به فرد معرفی می‌کند: هم کلیدهای خصوصی و هم اسکریپت بازخرید برای خرج کردن وجوه لازم هستند. برخلاف تراکنش‌های استاندارد که تنها به کلیدهای خصوصی نیاز دارند، P2SH نیاز دارد که اسکریپت بازخرید واقعی در هنگام خرج کردن ارائه شود. اگر اسکریپت بازخرید گم شود، وجوه به طور دائمی غیرقابل دسترس می‌شوند، حتی اگر کلیدهای خصوصی صحیح در دسترس باشند، زیرا شرایط خرج کردن نمی‌توانند بازسازی یا تأیید شوند.
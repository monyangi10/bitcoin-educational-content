question: फंड रिकवरी के संदर्भ में, P2SH को मानक Bitcoin लेनदेन से मौलिक रूप से अलग बनाने वाला प्राथमिक सुरक्षा जोखिम क्या है?
answer: रिडीम स्क्रिप्ट खो जाने से फंड स्थायी रूप से लॉक हो जाते हैं, भले ही आपके पास प्राइवेट कीज़ हों।
wrong_answers:
  - यदि रिडीम स्क्रिप्ट बहुत सरल है, तो 20-बाइट हैश को ब्रूट-फोर्स विधि से क्रैक किया जा सकता है।
  - P2SH पते एक निश्चित ब्लॉक ऊंचाई के बाद समाप्त हो जाते हैं, जिससे धनराशि अप्राप्य हो जाती है।
  - दो-चरणीय सत्यापन प्रक्रिया आकस्मिक रूप से विफल हो सकती है जिससे स्थायी धनराशि का नुकसान हो सकता है।
explanation: |
  P2SH एक अनूठी सुरक्षा आवश्यकता प्रस्तुत करता है: धनराशि खर्च करने के लिए निजी कुंजी और रिडीम स्क्रिप्ट दोनों आवश्यक हैं। मानक लेनदेन के विपरीत, जहाँ केवल निजी कुंजी की आवश्यकता होती है, P2SH में धनराशि खर्च करते समय वास्तविक रिडीम स्क्रिप्ट प्रदान करना अनिवार्य है। यदि रिडीम स्क्रिप्ट खो जाती है, तो सही निजी कुंजी होने के बावजूद भी धनराशि स्थायी रूप से अनुपलब्ध हो जाती है, क्योंकि खर्च की शर्तों को पुनः निर्मित या सत्यापित नहीं किया जा सकता है।
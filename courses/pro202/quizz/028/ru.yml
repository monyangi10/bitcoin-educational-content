question: В чем принципиальная разница между P2PK и P2PKH с точки зрения того, какая информация раскрывается до того, как монеты будут потрачены?
answer: P2PK раскрывает полный открытый ключ в ScriptPubKey перед расходованием, в то время как P2PKH раскрывает только хэш открытого ключа до расходования
wrong_answers:
  - P2PK требует нескольких подписей для проверки, в то время как P2PKH нужна только одна подпись для разблокировки монет
  - P2PK использует другой алгоритм хэширования, чем P2PKH, что делает его более защищенным от атак квантовых вычислений
  - P2PK хранит закрытый ключ в ScriptPubKey, а P2PKH - только результат проверки подписи
explanation: |
  P2PK привязывает монеты непосредственно к полному открытому ключу, который виден в ScriptPubKey до того, как произойдет трата. P2PKH улучшает конфиденциальность, показывая только 20-байтовый хэш открытого ключа в ScriptPubKey, скрывая фактический открытый ключ до тех пор, пока владелец не предоставит его в ScriptSig во время траты. Это повышение конфиденциальности является одним из ключевых преимуществ P2PKH по сравнению с предыдущим шаблоном P2PK.
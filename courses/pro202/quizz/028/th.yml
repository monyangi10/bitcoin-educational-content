question: ความแตกต่างพื้นฐานระหว่าง P2PK และ P2PKH ในแง่ของข้อมูลที่ถูกเปิดเผยก่อนที่เหรียญจะถูกใช้คืออะไร?
answer: P2PK เปิดเผยคีย์สาธารณะทั้งหมดใน ScriptPubKey ก่อนการใช้จ่าย ในขณะที่ P2PKH เผยเฉพาะแฮชของคีย์สาธารณะจนกว่าจะมีการใช้จ่าย
wrong_answers:
  - P2PK ต้องการลายเซ็นหลายลายเซ็นสำหรับการตรวจสอบ ในขณะที่ P2PKH ต้องการเพียงลายเซ็นเดียวเพื่อปลดล็อกเหรียญ
  - P2PK ใช้อัลกอริธึมการแฮชที่แตกต่างจาก P2PKH ทำให้มีความปลอดภัยมากขึ้นต่อการโจมตีจากคอมพิวเตอร์ควอนตัม
  - P2PK เก็บคีย์ส่วนตัวใน ScriptPubKey ในขณะที่ P2PKH เก็บเฉพาะผลการตรวจสอบลายเซ็น
explanation: |
  P2PK ล็อคเหรียญโดยตรงไปยังคีย์สาธารณะเต็มรูปแบบที่มองเห็นได้ใน ScriptPubKey ก่อนที่จะมีการใช้จ่ายใด ๆ เกิดขึ้น P2PKH ปรับปรุงความเป็นส่วนตัวโดยแสดงเพียงแฮช 20 ไบต์ของคีย์สาธารณะใน ScriptPubKey ซ่อนคีย์สาธารณะที่แท้จริงจนกว่าเจ้าของจะให้มันใน ScriptSig ระหว่างการใช้จ่าย การปรับปรุงความเป็นส่วนตัวนี้เป็นหนึ่งในข้อได้เปรียบหลักของ P2PKH เหนือรูปแบบ P2PK ก่อนหน้านี้
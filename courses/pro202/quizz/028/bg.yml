question: Каква е основната разлика между P2PK и P2PKH по отношение на информацията, която се разкрива преди изразходването на монетите?
answer: P2PK разкрива пълния публичен ключ в ScriptPubKey преди изразходването му, докато P2PKH разкрива само хеш на публичния ключ до изразходването му
wrong_answers:
  - P2PK изисква множество подписи за валидиране, докато P2PKH се нуждае само от един подпис, за да отключи монетите
  - P2PK използва различен алгоритъм за хеширане от P2PKH, което го прави по-сигурен срещу атаки с квантови изчисления
  - P2PK съхранява частния ключ в ScriptPubKey, докато P2PKH съхранява само резултата от проверката на подписа
explanation: |
  P2PK заключва монетите директно към пълен публичен ключ, който е видим в ScriptPubKey, преди да се извърши каквото и да е харчене. P2PKH подобрява неприкосновеността на личния живот, като показва само 20-байтово хеширане на публичния ключ в ScriptPubKey, скривайки действителния публичен ключ, докато собственикът не го предостави в ScriptSig по време на харченето. Това подобрение на поверителността е едно от ключовите предимства на P2PKH пред по-ранния модел P2PK.
question: 코인이 사용되기 전에 어떤 정보가 공개되는지 P2PK와 P2PKH의 근본적인 차이점은 무엇인가요?
answer: P2PK는 사용하기 전에 ScriptPubKey에 전체 공개 키를 노출하는 반면, P2PKH는 사용할 때까지 공개 키의 해시만 노출합니다
wrong_answers:
  - P2PK는 검증을 위해 여러 서명이 필요하지만 P2PKH는 코인 잠금 해제를 위해 하나의 서명만 필요합니다
  - P2PK는 P2PKH와는 다른 해싱 알고리즘을 사용하므로 양자 컴퓨팅 공격으로부터 더욱 안전합니다
  - P2PK는 개인키를 ScriptPubKey에 저장하고 P2PKH는 서명 확인 결과만 저장합니다
explanation: |
  P2PK는 지출이 발생하기 전에 스크립트펍키에 표시되는 전체 공개 키에 코인을 직접 잠급니다. P2PKH는 스크립트펍키에 공개키의 20바이트 해시만 표시하고, 소유자가 지출 중에 스크립트시그에 공개키를 제공할 때까지 실제 공개키를 숨겨 프라이버시를 개선합니다. 이러한 개인 정보 보호 강화는 이전 P2PK 패턴에 비해 P2PKH의 주요 장점 중 하나입니다.
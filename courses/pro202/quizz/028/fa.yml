question: تفاوت اساسی بین P2PK و P2PKH در مورد اطلاعاتی که قبل از خرج شدن سکه‌ها فاش می‌شود چیست؟
answer: P2PK کلید عمومی کامل را در ScriptPubKey قبل از خرج کردن نشان می‌دهد، در حالی که P2PKH تنها یک هش از کلید عمومی را تا زمان خرج کردن فاش می‌کند.
wrong_answers:
  - P2PK به چندین امضا برای اعتبارسنجی نیاز دارد، در حالی که P2PKH تنها به یک امضا برای باز کردن قفل سکه‌ها نیاز دارد.
  - P2PK از یک الگوریتم هش متفاوت نسبت به P2PKH استفاده می‌کند که آن را در برابر حملات محاسبات کوانتومی امن‌تر می‌سازد.
  - P2PK کلید خصوصی را در ScriptPubKey ذخیره می‌کند، در حالی که P2PKH تنها نتیجه تأیید امضا را ذخیره می‌کند.
explanation: |
  قفل‌های P2PK سکه‌ها را مستقیماً به یک کلید عمومی کامل که در ScriptPubKey قبل از هرگونه خرج‌کردن قابل مشاهده است، قفل می‌کنند. P2PKH با نمایش تنها یک هش ۲۰ بایتی از کلید عمومی در ScriptPubKey، حریم خصوصی را بهبود می‌بخشد و کلید عمومی واقعی را تا زمانی که مالک آن را در ScriptSig در هنگام خرج‌کردن ارائه دهد، پنهان می‌کند. این بهبود حریم خصوصی یکی از مزایای کلیدی P2PKH نسبت به الگوی قبلی P2PK است.
question: कॉइन खर्च करने से पहले कौन सी जानकारी प्रकट की जाती है, इस संदर्भ में P2PK और P2PKH के बीच मूलभूत अंतर क्या है?
answer: P2PK खर्च करने से पहले ScriptPubKey में पूरी सार्वजनिक कुंजी को उजागर करता है, जबकि P2PKH खर्च होने तक केवल सार्वजनिक कुंजी का हैश ही प्रकट करता है।
wrong_answers:
  - P2PK को सत्यापन के लिए कई हस्ताक्षरों की आवश्यकता होती है, जबकि P2PKH को सिक्कों को अनलॉक करने के लिए केवल एक हस्ताक्षर की आवश्यकता होती है।
  - P2PK, P2PKH से अलग हैशिंग एल्गोरिदम का उपयोग करता है, जिससे यह क्वांटम कंप्यूटिंग हमलों के खिलाफ अधिक सुरक्षित हो जाता है।
  - P2PK निजी कुंजी को ScriptPubKey में संग्रहीत करता है, जबकि P2PKH केवल हस्ताक्षर सत्यापन परिणाम को संग्रहीत करता है।
explanation: |
  P2PK में सिक्के सीधे एक पूर्ण सार्वजनिक कुंजी से लॉक हो जाते हैं, जो किसी भी खर्च से पहले ScriptPubKey में दिखाई देती है। P2PKH गोपनीयता को बेहतर बनाता है क्योंकि यह ScriptPubKey में केवल सार्वजनिक कुंजी का 20-बाइट हैश दिखाता है, और वास्तविक सार्वजनिक कुंजी को तब तक छिपाए रखता है जब तक कि मालिक खर्च के दौरान ScriptSig में इसे प्रदान नहीं करता। गोपनीयता में यह सुधार P2PKH का पुराने P2PK पैटर्न पर एक प्रमुख लाभ है।
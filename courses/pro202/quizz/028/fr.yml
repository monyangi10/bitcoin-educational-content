question: Quelle est la différence fondamentale entre P2PK et P2PKH en termes d'informations révélées avant que les pièces ne soient dépensées ?
answer: P2PK expose la clé publique complète dans ScriptPubKey avant de la dépenser, tandis que P2PKH ne révèle qu'un hachage de la clé publique jusqu'à ce qu'elle soit dépensée
wrong_answers:
  - P2PK nécessite plusieurs signatures pour la validation, tandis que P2PKH ne nécessite qu'une seule signature pour débloquer les pièces
  - P2PK utilise un algorithme de hachage différent de celui de P2PKH, ce qui le rend plus sûr contre les attaques de l'informatique quantique
  - P2PK stocke la clé privée dans ScriptPubKey, tandis que P2PKH ne stocke que le résultat de la vérification de la signature
explanation: | 
  P2PK verrouille les pièces directement sur une clé publique complète qui est visible dans le ScriptPubKey avant toute dépense. P2PKH améliore la confidentialité en ne montrant qu'un hachage de 20 octets de la clé publique dans le ScriptPubKey, cachant la clé publique réelle jusqu'à ce que le propriétaire la fournisse dans le ScriptSig lors de la dépense. Cette amélioration de la confidentialité est l'un des principaux avantages de P2PKH par rapport à l'ancien modèle P2PK.

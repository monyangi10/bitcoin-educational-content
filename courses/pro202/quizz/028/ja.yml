question: P2PKとP2PKHの根本的な違いは、コインが使われる前にどのような情報が明らかにされるかという点ですか？
answer: P2PKでは、使用前にScriptPubKeyに含まれる完全な公開鍵が公開されるが、P2PKHでは、使用するまで公開鍵のハッシュのみが公開される。
wrong_answers:
  - P2PKは検証のために複数の署名を必要とするが、P2PKHはコインのロックを解除するために必要な署名は1つだけである。
  - P2PKはP2PKHとは異なるハッシュアルゴリズムを使用しており、量子コンピューティング攻撃に対する安全性を高めている。
  - P2PKは秘密鍵をScriptPubKeyに格納し、P2PKHは署名検証結果のみを格納する。
explanation: |
  P2PKは、コインが使用される前にScriptPubKeyに表示される完全な公開鍵にコインを直接ロックします。P2PKHでは、ScriptPubKeyに公開鍵の20バイトのハッシュ値のみを表示し、実際の公開鍵は所有者が支出の際にScriptSigで提供するまで隠蔽することで、プライバシーを向上させています。このプライバシーの強化は、以前のP2PKパターンと比較した場合のP2PKHの主な利点の1つである。
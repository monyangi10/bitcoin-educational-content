question: 在使用 UTXO 時，如果忘記包含變更輸出，而 UTXO 包含的 Bitcoin 多於所需，主要的後果是什麼？
answer: 多出的金額會自動成為礦工費
wrong_answers:
  - 網路會以無效為由拒絕交易
  - 「多出的金額會退回到原寄件人的地址」
  - 多出的金額仍鎖定在原始 UTXO 中。
explanation: |
  在 Bitcoin 的 UTXO 模型中，交易費用隱含地計算為總投入與總輸出的差額 (費用 = sum(inputs) - sum(outputs))。當您花費 UTXO 時，您必須完全花費 - 部分花費是不可能的。如果您只需要花費 UTXO 值的一部分，您必須建立一個變更輸出來接收剩餘的部分。如果您忘記包含這個變更輸出，輸入和輸出之間未計算的差額會自動變成礦工費。這就是為什麼正確的變更輸出結構是必要的 - 沒有它，您可能會意外地支付龐大的費用給礦工。
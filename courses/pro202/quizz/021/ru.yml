question: Каково главное последствие того, что вы забыли включить вывод изменений при расходовании UTXO, который содержит больше Bitcoin, чем нужно?
answer: Превышение суммы автоматически превращается в плату шахтера
wrong_answers:
  - Транзакция будет отклонена сетью как недействительная
  - "Избыточная сумма возвращается на адрес отправителя"
  - Избыточная сумма остается заблокированной в исходном UTXO
explanation: |
  В модели Bitcoin в UTXO плата за транзакции неявно рассчитывается как разница между суммарными входами и суммарными выходами (плата = sum(inputs) - sum(outputs)). Когда вы тратите UTXO, вы должны потратить его полностью - частичная трата невозможна. Если вам нужно потратить только часть стоимости UTXO, вы должны создать выход изменения, чтобы получить оставшуюся часть. Если вы забудете включить этот выход изменений, неучтенная разница между входом и выходом автоматически станет платой шахтера. Именно поэтому правильное построение выхода изменений очень важно - без него вы можете случайно заплатить майнерам огромную плату.
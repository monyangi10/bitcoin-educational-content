question: Каква е основната последица от това, че забравяте да включите изход за промяна, когато изразходвате UTXO, който съдържа повече Bitcoin, отколкото е необходимо?
answer: Превишението на сумата автоматично се превръща в такса за миньор
wrong_answers:
  - Транзакцията ще бъде отхвърлена от мрежата като невалидна
  - "Излишната сума се връща на адреса на първоначалния подател"
  - Излишъкът остава блокиран в първоначалния UTXO
explanation: |
  В модела Bitcoin на UTXO таксите за трансакции се изчисляват имплицитно като разлика между общите входове и общите изходи (такса = сума(входове) - сума(изходи)). Когато изразходвате UTXO, трябва да го изразходвате изцяло - частично изразходване е невъзможно. Ако трябва да похарчите само част от стойността на UTXO, трябва да създадете промяна на изхода, за да получите остатъка. Ако забравите да включите този извод за промяна, неотчетената разлика между входовете и изходите автоматично се превръща в такса за миньор. Ето защо правилното конструиране на изхода за промяна е от съществено значение - без него може случайно да платите огромни такси на миньорите.
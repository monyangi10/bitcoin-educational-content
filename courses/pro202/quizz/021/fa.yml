question: پیامد اصلی فراموش کردن درج خروجی تغییر هنگام خرج کردن یک UTXO که حاوی بیشتر از Bitcoin مورد نیاز است چیست؟
answer: مقدار اضافی به طور خودکار به کارمزد ماینر تبدیل می‌شود.
wrong_answers:
  - تراکنش توسط شبکه به عنوان نامعتبر رد خواهد شد
  - "مبلغ اضافی به آدرس فرستنده اصلی بازگردانده می‌شود"
  - مقدار اضافی در UTXO اصلی قفل باقی می‌ماند.
explanation: |
  در مدل UTXO از Bitcoin، کارمزد تراکنش‌ها به‌طور ضمنی به‌عنوان تفاوت بین کل ورودی‌ها و کل خروجی‌ها محاسبه می‌شود (کارمزد = مجموع ورودی‌ها - مجموع خروجی‌ها). وقتی یک UTXO را خرج می‌کنید، باید آن را به‌طور کامل خرج کنید - خرج کردن جزئی غیرممکن است. اگر نیاز دارید فقط بخشی از ارزش یک UTXO را خرج کنید، باید یک خروجی تغییر ایجاد کنید تا باقیمانده را دریافت کنید. اگر فراموش کنید این خروجی تغییر را شامل کنید، تفاوت حساب‌نشده بین ورودی‌ها و خروجی‌ها به‌طور خودکار به کارمزد ماینر تبدیل می‌شود. به همین دلیل ساخت صحیح خروجی تغییر ضروری است - بدون آن، ممکن است به‌طور تصادفی کارمزدهای زیادی به ماینرها پرداخت کنید.
question: 必要以上のBitcoinを含むUTXOを使う際に、変更出力を入れ忘れた場合の主な結果は？
answer: 超過分は自動的にマイナー手数料となる
wrong_answers:
  - トランザクションは無効なものとしてネットワークによって拒否される。
  - "超過分は元の送り主の住所に返される"
  - 超過分は元のUTXOに固定されたままである。
explanation: |
  BitcoinのUTXOモデルでは、取引手数料は総入力と総出力の差として暗黙のうちに計算される（手数料＝sum(inputs) - sum(outputs)）。UTXOを使用する場合、その全額を使用しなければならない。部分的な使用は不可能である。UTXOの価値の一部だけを使う必要がある場合は、残りを受け取るために変更出力を作成する必要があります。この変更出力を忘れると、インプットとアウトプットの未計上の差額が自動的に採掘者手数料になります。このため、適切なチェンジ・アウトプットの作成が不可欠です。これがないと、誤って採掘者に莫大な手数料を支払うことになりかねません。
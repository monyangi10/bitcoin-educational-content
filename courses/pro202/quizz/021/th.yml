question: ผลที่ตามมาหลักของการลืมรวมการเปลี่ยนแปลงเอาท์พุตเมื่อใช้จ่าย UTXO ที่มี Bitcoin มากกว่าที่จำเป็นคืออะไร?
answer: จำนวนเงินส่วนเกินจะกลายเป็นค่าธรรมเนียมของนักขุดโดยอัตโนมัติ
wrong_answers:
  - ธุรกรรมจะถูกปฏิเสธโดยเครือข่ายว่าไม่ถูกต้อง
  - "จำนวนเงินส่วนเกินจะถูกส่งคืนไปยังที่อยู่ของผู้ส่งเดิม"
  - จำนวนส่วนเกินยังคงถูกล็อคไว้ใน UTXO ดั้งเดิม
explanation: |
  ในโมเดล UTXO ของ Bitcoin ค่าธรรมเนียมการทำธุรกรรมจะถูกคำนวณโดยนัยเป็นความแตกต่างระหว่างอินพุตทั้งหมดและเอาต์พุตทั้งหมด (ค่าธรรมเนียม = ผลรวม(อินพุต) - ผลรวม(เอาต์พุต)) เมื่อคุณใช้จ่าย UTXO คุณต้องใช้จ่ายทั้งหมด - การใช้จ่ายบางส่วนเป็นไปไม่ได้ หากคุณต้องการใช้จ่ายเพียงบางส่วนของมูลค่า UTXO คุณต้องสร้างเอาต์พุตการเปลี่ยนแปลงเพื่อรับส่วนที่เหลือ หากคุณลืมรวมเอาต์พุตการเปลี่ยนแปลงนี้ ความแตกต่างที่ไม่ได้คำนวณระหว่างอินพุตและเอาต์พุตจะกลายเป็นค่าธรรมเนียมของคนขุดแร่โดยอัตโนมัติ นี่คือเหตุผลที่การสร้างเอาต์พุตการเปลี่ยนแปลงอย่างถูกต้องเป็นสิ่งสำคัญ - หากไม่มีมัน คุณอาจจ่ายค่าธรรมเนียมมหาศาลให้กับคนขุดแร่โดยไม่ได้ตั้งใจ
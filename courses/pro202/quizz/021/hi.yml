question: यदि आप UTXO खर्च करते समय, जिसमें आवश्यकता से अधिक Bitcoin शामिल हैं, परिवर्तन आउटपुट को शामिल करना भूल जाते हैं, तो इसका प्राथमिक परिणाम क्या होता है?
answer: अतिरिक्त राशि स्वतः ही माइनर शुल्क बन जाती है।
wrong_answers:
  - नेटवर्क द्वारा इस लेनदेन को अमान्य मानकर अस्वीकार कर दिया जाएगा।
  - अतिरिक्त राशि मूल प्रेषक के पते पर वापस कर दी जाती है।
  - अतिरिक्त राशि मूल UTXO में ही बंद रहती है।
explanation: |
  Bitcoin के UTXO मॉडल में, लेन-देन शुल्क की गणना कुल इनपुट और कुल आउटपुट के अंतर के रूप में की जाती है (शुल्क = इनपुट का योग - आउटपुट का योग)। जब आप एक UTXO खर्च करते हैं, तो आपको इसे पूरी तरह से खर्च करना होगा - आंशिक खर्च संभव नहीं है। यदि आपको UTXO के मूल्य का केवल एक हिस्सा खर्च करना है, तो शेष राशि प्राप्त करने के लिए आपको एक परिवर्तन आउटपुट बनाना होगा। यदि आप इस परिवर्तन आउटपुट को शामिल करना भूल जाते हैं, तो इनपुट और आउटपुट के बीच का वह अंतर जो हिसाब में नहीं लिया गया है, स्वचालित रूप से माइनर शुल्क बन जाता है। यही कारण है कि परिवर्तन आउटपुट का सही निर्माण आवश्यक है - इसके बिना, आप गलती से माइनर्स को भारी शुल्क का भुगतान कर सकते हैं।
question: 在使用 UTXO 时，如果 Bitcoin 的数量超过需要，而忘记将变更输出包括在内，会产生什么主要后果？
answer: 超出部分自动成为矿工费
wrong_answers:
  - 网络将以无效为由拒绝交易
  - "多出的金额将退回原寄件人地址"
  - 超出部分仍锁定在原 UTXO 中。
explanation: |
  在 Bitcoin 的 UTXO 模型中，交易费用隐含地计算为总投入与总产出之间的差额（费用 = 总投入 - 总产出）。使用 UTXO 时，必须全部使用，不可能部分使用。如果您只需要使用 UTXO 的部分价值，则必须创建一个变更输出来接收剩余部分。如果您忘记包含这个变化输出，投入和产出之间未计算的差额就会自动成为矿工费。这就是为什么正确的变化输出结构至关重要--否则，您可能会意外地向矿工支付巨额费用。
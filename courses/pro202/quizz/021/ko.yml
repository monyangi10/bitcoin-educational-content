question: 필요한 것보다 많은 Bitcoin을 포함하는 UTXO을 사용할 때 변경 출력을 포함하지 않으면 어떤 주요 결과가 발생하나요?
answer: 초과 금액은 자동으로 채굴자 수수료가 됩니다
wrong_answers:
  - 네트워크에서 트랜잭션이 유효하지 않은 것으로 거부됩니다
  - "초과 금액은 원래 발신자의 주소로 반환됩니다."
  - 초과 금액은 원래 UTXO에 잠겨 있습니다
explanation: |
  Bitcoin의 UTXO 모델에서 거래 수수료는 총 입력과 총 출력의 차이로 암시적으로 계산됩니다(수수료 = 합(입력) - 합(출력)). UTXO를 사용할 때는 전액 사용해야 하며 부분 사용은 불가능합니다. UTXO의 가치 중 일부만 사용해야 하는 경우, 나머지 금액을 받기 위해 변경 출력을 생성해야 합니다. 이 변경 산출물을 포함하는 것을 잊어버리면 입력과 출력 사이의 설명되지 않은 차액이 자동으로 마이너 수수료가 됩니다. 따라서 적절한 변경 출력 구성이 필수적이며, 이를 수행하지 않으면 실수로 채굴자에게 막대한 수수료를 지불할 수 있습니다.
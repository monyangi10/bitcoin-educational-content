question: Коя математическа задача осигурява основата за сигурността на ECDSA подписите в Bitcoin?
answer: Проблемът за дискретния логаритъм на елиптичната крива
wrong_answers:
  - Проблемът за факторизация на цели числа
  - Проблемът за квадратичния остатък
  - Проблемът със сблъсъка на хешовете
explanation: |
  Сигурността на ECDSA се основава на задачата за дискретен логаритъм на елиптичната крива: при зададено P = eG изчисляването на P от e и G е лесно, но извеждането на частния ключ e от публичния ключ P е изчислително трудно. Тази еднопосочна математическа зависимост позволява сигурна криптография с публичен ключ с по-малък размер на ключа от RSA, която зависи от факторизация на цели числа.
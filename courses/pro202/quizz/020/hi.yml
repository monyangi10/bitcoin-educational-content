question: Bitcoin में ECDSA हस्ताक्षरों के लिए सुरक्षा आधार कौन सी गणितीय समस्या प्रदान करती है?
answer: दीर्घवृत्तीय वक्र असतत लघुगणक समस्या
wrong_answers:
  - पूर्णांक गुणनखंडन समस्या
  - द्विघात अवशेष समस्या
  - हैश टकराव की समस्या
explanation: |
  ECDSA सुरक्षा, अण्डाकार वक्र असतत लघुगणक समस्या पर आधारित है: यदि P = eG दिया गया है, तो e और G से P की गणना करना आसान है, लेकिन सार्वजनिक कुंजी P से निजी कुंजी e प्राप्त करना गणनात्मक रूप से असंभव है। यह एकतरफा गणितीय संबंध, RSA की तुलना में छोटे कुंजी आकार के साथ सुरक्षित सार्वजनिक कुंजी क्रिप्टोग्राफी को सक्षम बनाता है, जो पूर्णांक गुणनखंडन पर निर्भर करता है।
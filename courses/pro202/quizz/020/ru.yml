question: Какая математическая задача является основой безопасности для подписей ECDSA в Bitcoin?
answer: Проблема дискретного логарифма эллиптической кривой
wrong_answers:
  - Проблема факторизации целых чисел
  - Проблема квадратичного остатка
  - Проблема столкновения хэшей
explanation: |
  Безопасность ECDSA основана на проблеме дискретного логарифма эллиптической кривой: при заданном P = eG вычислить P из e и G легко, а получить закрытый ключ e из открытого ключа P - вычислительно невыполнимо. Это одностороннее математическое соотношение обеспечивает безопасную криптографию с открытым ключом при меньших размерах ключей, чем RSA, которая зависит от целочисленной факторизации.
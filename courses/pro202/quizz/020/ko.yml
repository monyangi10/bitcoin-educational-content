question: Bitcoin에서 ECDSA 서명의 보안 기반을 제공하는 수학적 문제는 무엇인가요?
answer: 타원 곡선 이산 로그 문제
wrong_answers:
  - 정수 인수분해 문제
  - 이차 잔여물 문제
  - 해시 충돌 문제
explanation: |
  타원 곡선 이산 로그 문제: P = eG가 주어졌을 때, e와 G에서 P를 계산하는 것은 쉽지만 공개 키 P에서 개인 키 e를 도출하는 것은 계산적으로 불가능합니다. 이러한 단방향 수학적 관계를 통해 정수 인수분해에 의존하는 RSA보다 더 작은 키 크기로 안전한 공개 키 암호화를 구현할 수 있습니다.
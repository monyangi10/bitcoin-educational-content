question: کدام مسئله ریاضی پایه امنیتی برای امضاهای ECDSA در Bitcoin را فراهم می‌کند؟
answer: مسئله لگاریتم گسسته منحنی بیضوی
wrong_answers:
  - مسئله تجزیه عدد صحیح
  - مسئله باقی‌مانده درجه دوم
  - مشکل برخورد هش
explanation: |
  امنیت ECDSA به مسئله لگاریتم گسسته منحنی بیضوی متکی است: با توجه به P = eG، محاسبه P از e و G آسان است، اما استخراج کلید خصوصی e از کلید عمومی P از نظر محاسباتی غیرممکن است. این رابطه ریاضی یک‌طرفه امکان رمزنگاری کلید عمومی امن با اندازه کلیدهای کوچکتر از RSA را فراهم می‌کند، که به تجزیه عدد صحیح وابسته است.
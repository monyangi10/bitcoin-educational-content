question: Каква е математическата формула, използвана за изчисляване на субсидията на блока при всяка дадена височина на блока h в протокола Bitcoin?
answer: субсидия = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - субсидия = 50_000_000_000 / (2^(h / 210_000))
  - субсидия = 5_000_000_000 * (0.5^(h % 210_000))
  - субсидия = 50_000_000_000 >> (h % 210_000)
explanation: |
  В правилната формула се използват операции за преместване на битове, при които 5_000_000_000 представлява 50 BTC в сатоши, а операторът за дясно преместване >> ефективно дели по степен 2. Делението на пода h // 210_000 определя колко периода на намаляване на половина са настъпили. Първият грешен отговор използва обикновено деление вместо битово преместване и започва с неправилна базова стойност. Вторият използва модул вместо деление по етажи, което би създало цикличен модел, а не прогресивно намаляване наполовина. Третият използва операция модуло, която би нулирала брояча на половинките на всеки 210 000 блока, вместо да натрупва половинки с течение на времето.
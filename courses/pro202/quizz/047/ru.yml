question: Какая математическая формула используется для расчета субсидии блока при любой заданной высоте блока h в протоколе Bitcoin?
answer: субсидия = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - субсидия = 50_000_000_000 / (2^(h / 210_000))
  - субсидия = 5_000_000_000 * (0.5^(h % 210_000))
  - субсидия = 50_000_000_000 >> (h % 210_000)
explanation: |
  В правильной формуле используются операции побитового сдвига, где 5_000_000_000 представляет 50 BTC в сатоши, а оператор правого сдвига >> эффективно делит на степень 2. Поэтажное деление h // 210_000 определяет, сколько периодов полуделения произошло. Первый неверный ответ использует обычное деление вместо побитового сдвига и начинает с неправильного базового значения. Во втором вместо поэтажного деления используется модулор, который создает циклическую схему, а не прогрессивное деление. В третьем используется операция модуло, которая сбрасывает счетчик половин каждые 210 000 блоков вместо накопления половин со временем.
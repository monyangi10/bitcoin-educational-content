question: 在 Bitcoin 的協議中，在任何給定的區塊高度 h 下，用於計算區塊補貼的數學公式是什麼？
answer: 補助 = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - 補貼 = 50_000_000_000 / (2^(h / 210_000))
  - 補助 = 5_000_000_000 * (0.5^(h % 210_000))
  - 補助 = 50_000_000_000 >> (h % 210_000)
explanation: |
  正確的公式使用位元移位運算，其中 5_000_000_000 代表以 Satoshis 為單位的 50 BTC，右移運算符號 >> 有效地除以 2 的幂，而底層除法 h // 210_000 決定發生了多少個減半週期。第一個錯誤答案使用一般除法而非位元移位，並且以錯誤的基數值開始。第二個錯誤答案使用 modulo 運算而非底層除法，這會產生循環模式而非漸進減半。第三個答案使用 modulo 運算，會每 210,000 個區塊重設一次減半計數器，而不是隨著時間累積減半。
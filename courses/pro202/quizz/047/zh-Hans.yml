question: 在 Bitcoin 协议中，计算任何给定块体高度 h 的块体补贴所使用的数学公式是什么？
answer: 补贴 = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - 补贴 = 50_000_000_000 / (2^(h / 210_000))
  - 补贴 = 5_000_000_000 * (0.5^(h % 210_000))
  - 补贴 = 50_000_000_000 >> (h % 210_000)
explanation: |
  正确的公式使用了位移运算，其中 5_000_000_000 表示以 Satoshis 为单位的 50 BTC，右移运算符 >> 有效地除以 2 的幂。第一个错误答案使用了常规除法而不是位移运算，并且以错误的基值开始。第二个错误答案使用了模数运算而非底分运算，这将产生循环模式而不是累进减半。第三个错误答案使用了模数运算，每 210,000 个区块重置一次减半计数器，而不是随着时间的推移累积减半次数。
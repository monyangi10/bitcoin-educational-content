question: فرمول ریاضی مورد استفاده برای محاسبه یارانه بلوک در هر ارتفاع بلوک h در پروتکل Bitcoin چیست؟
answer: یارانه = ۵_۰۰۰_۰۰۰_۰۰۰ >> (h // ۲۱۰_۰۰۰)
wrong_answers:
  - یارانه = ۵۰,۰۰۰,۰۰۰,۰۰۰ / (۲^(h / ۲۱۰,۰۰۰))
  - یارانه = ۵_۰۰۰_۰۰۰_۰۰۰ * (۰.۵^(h % ۲۱۰_۰۰۰))
  - یارانه = ۵۰_۰۰۰_۰۰۰_۰۰۰ >> (h % ۲۱۰_۰۰۰)
explanation: |
  فرمول صحیح از عملیات بیت‌شفتینگ استفاده می‌کند که در آن 5_000_000_000 نمایانگر 50 بیت‌کوین در ساتوشی‌ها است و عملگر شیفت به راست >> به طور مؤثر بر توان‌های 2 تقسیم می‌کند. تقسیم صحیح h // 210_000 تعیین می‌کند که چند دوره نصف شدن رخ داده است. اولین پاسخ اشتباه از تقسیم معمولی به جای بیت‌شفتینگ استفاده می‌کند و با یک مقدار پایه نادرست شروع می‌شود. دومی از مدولو به جای تقسیم صحیح استفاده می‌کند که یک الگوی چرخه‌ای به جای نصف شدن پیشرونده ایجاد می‌کند. سومی از عملیات مدولو استفاده می‌کند که شمارنده نصف شدن را هر 210,000 بلاک بازنشانی می‌کند به جای اینکه نصف شدن‌ها را در طول زمان انباشته کند.
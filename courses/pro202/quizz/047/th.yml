question: สูตรทางคณิตศาสตร์ที่ใช้ในการคำนวณเงินอุดหนุนบล็อกที่ความสูงของบล็อกใด ๆ h ในโปรโตคอลของ Bitcoin คืออะไร?
answer: subsidy = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - เงินอุดหนุน = 50_000_000_000 / (2^(h / 210_000))
  - เงินอุดหนุน = 5_000_000_000 * (0.5^(h % 210_000))
  - เงินอุดหนุน = 50_000_000_000 >> (h % 210_000)
explanation: |
  สูตรที่ถูกต้องใช้การดำเนินการแบบ bit-shifting โดยที่ 5_000_000_000 แทน 50 BTC ในหน่วย satoshis และตัวดำเนินการ right-shift >> จะทำการหารด้วยกำลังของ 2 การหารแบบปัดเศษลง h // 210_000 กำหนดว่ามีช่วงการลดครึ่งหนึ่งเกิดขึ้นกี่ครั้ง คำตอบที่ผิดครั้งแรกใช้การหารปกติแทนการ bit-shifting และเริ่มต้นด้วยค่าฐานที่ไม่ถูกต้อง คำตอบที่สองใช้ modulo แทนการหารแบบปัดเศษลง ซึ่งจะสร้างรูปแบบวงจรแทนการลดครึ่งหนึ่งแบบก้าวหน้า คำตอบที่สามใช้การดำเนินการ modulo ซึ่งจะรีเซ็ตตัวนับการลดครึ่งหนึ่งทุกๆ 210,000 บล็อกแทนที่จะสะสมการลดครึ่งหนึ่งตามเวลา
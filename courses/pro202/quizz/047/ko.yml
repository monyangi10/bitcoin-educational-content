question: Bitcoin 프로토콜에서 주어진 블록 높이 h에서 블록 보조금을 계산하는 데 사용되는 수학 공식은 무엇인가요?
answer: 보조금 = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - 보조금 = 50_000_000_000 / (2^(h / 210_000))
  - 보조금 = 5_000_000_000 * (0.5^(h % 210_000))
  - 보조금 = 50_000_000_000 >> (h % 210_000)
explanation: |
  올바른 공식은 5_000_000_000이 사토시 단위로 50 BTC를 나타내는 비트 시프트 연산을 사용하고, 오른쪽 시프트 연산자 >>는 2의 거듭 제곱으로 효과적으로 나눕니다. 바닥 나누기 h // 210_000은 반감기가 몇 번 발생했는지를 결정합니다. 첫 번째 오답은 비트 시프트 대신 일반 나눗셈을 사용하며 잘못된 기본값으로 시작합니다. 두 번째는 바닥 나누기 대신 모듈로 연산을 사용하여 점진적인 반감기가 아닌 주기적인 패턴을 만듭니다. 세 번째는 모듈로 연산을 사용하여 시간이 지남에 따라 반감기를 누적하는 대신 210,000블록마다 반감기 카운터를 재설정합니다.
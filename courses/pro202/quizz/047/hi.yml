question: Bitcoin के प्रोटोकॉल में किसी भी दिए गए ब्लॉक की ऊंचाई h पर ब्लॉक सब्सिडी की गणना करने के लिए किस गणितीय सूत्र का उपयोग किया जाता है?
answer: सब्सिडी = 5_000_000_000 >> (h // 210_000)
wrong_answers:
  - सब्सिडी = 50_000_000_000 / (2^(h / 210_000))
  - सब्सिडी = 5_000_000_000 * (0.5^(h % 210_000))
  - सब्सिडी = 50_000_000_000 >> (एच % 210_000)
explanation: |
  सही सूत्र में बिट-शिफ्टिंग ऑपरेशन का उपयोग किया गया है, जहाँ 5_000_000_000 सतोशी में 50 BTC को दर्शाता है, और दाएँ-शिफ्ट ऑपरेटर >> प्रभावी रूप से 2 की घातों से भाग देता है। फ्लोर डिवीज़न h // 210_000 यह निर्धारित करता है कि कितनी हाल्विंग अवधियाँ घटित हुई हैं। पहला गलत उत्तर बिट-शिफ्टिंग के बजाय सामान्य विभाजन का उपयोग करता है और एक गलत आधार मान से शुरू होता है। दूसरा फ्लोर डिवीज़न के बजाय मॉड्यूलो का उपयोग करता है, जो क्रमिक हाल्विंग के बजाय एक चक्रीय पैटर्न बनाएगा। तीसरा मॉड्यूलो ऑपरेशन का उपयोग करता है जो समय के साथ हाल्विंग को संचित करने के बजाय हर 210,000 ब्लॉक पर हाल्विंग काउंटर को रीसेट कर देगा।
question: Bitcoinのプロトコルで、任意のブロックの高さhにおけるブロック補助金の計算に使われる数式は何ですか？
answer: 補助金 = 5_000_000 >> (h // 210_000)
wrong_answers:
  - 補助金 = 50_000_000_000 / (2^(h / 210_000))
  - 補助金 = 5_000_000_000 * (0.5^(h % 210_000))
  - 補助金 = 50_000_000 >> (h % 210_000)
explanation: |
  正しい式はビットシフト演算を使用しており、5_000_000_000は50BTCをサトシで表し、右シフト演算子 >> は事実上2の累乗で除算する。最初の誤答は、ビットシフトの代わりに通常の除算を使い、間違ったベース値から始めている。2つ目はフロア除算の代わりにモジュロ演算を使っており、漸進的な半減ではなく周期的なパターンを作り出している。番目はモジュロ演算を使用しており、これは半減カウンターを時間の経過とともに蓄積するのではなく、21万ブロックごとにリセットすることになる。
question: 베어 멀티서명 스크립트시그에서 추가 OP_0이 필요한 OP_CHECKMULTISIG의 오프 바이 원 버그의 원인은 무엇인가요?
answer: OP_CHECKMULTISIG은 예상되는 서명 및 공개 키 외에 추가 스택 요소를 소비합니다
wrong_answers:
  - 서명 확인 프로세스가 올바르게 작동하려면 적절한 ECDSA 유효성 검사를 위해 추가 바이트가 필요합니다
  - "Bitcoin의 스택 구현에는 메모리 정렬을 위해 패딩 요소가 필요한 경계 검사가 있습니다."
  - 다중 서명 임계값 계산은 1이 아닌 0부터 시작하므로 오프셋 자리 표시자 값이 필요합니다
explanation: |
  OP_CHECKMULTISIG 옵코드에는 실행 중에 스택에서 필요한 것보다 한 개 더 많은 항목을 팝업하는 구현 버그가 있습니다. 즉, 필요한 m개의 서명과 n개의 공개 키 외에도 추가 스택 요소를 소비합니다. 작업이 실패하는 것을 방지하려면, 베어 멀티서명 ScriptSig는 이 예기치 않은 스택 소비를 충족하기 위해 초기 OP_0(빈 바이트 배열을 푸시하는)을 포함해야 합니다. 다른 옵션은 그럴듯하게 들리는 기술적 문제를 설명하지만 이 잘 알려진 Bitcoin 결함의 실제 원인은 아닙니다.
question: 在 OP_CHECKMULTISIG 中，裸多位脚本igs 需要额外的 OP_0，是什么原因导致了偏一错误？
answer: 除了预期的签名和公钥外，OP_CHECKMULTISIG 还消耗额外的堆栈元素
wrong_answers:
  - 签名验证过程需要额外的字节，以便 ECDSA 验证正常运行
  - "Bitcoin的堆栈实现有一个边界检查，需要一个填充元素来进行内存对齐"
  - 多字符阈值计数从 0 开始，而不是从 1 开始，因此需要一个偏移占位符值
explanation: |
  OP_CHECKMULTISIG 操作码有一个执行错误，即在执行过程中，它从堆栈中弹出的项目比应该弹出的项目多一个。这意味着除了所需的 m 个签名和 n 个公钥外，它还会消耗一个额外的堆栈元素。为防止操作失败，裸多字符脚本igs 必须包含一个初始 OP_0（推入一个空字节数组），以满足这种意外的堆栈消耗。其他选项描述了一些听起来似乎合理的技术问题，但并不是导致这一众所周知的 Bitcoin 怪癖的真正原因。
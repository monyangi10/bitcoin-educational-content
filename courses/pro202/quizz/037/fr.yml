question: Quelle est la cause du bogue de l'off-by-one dans OP_CHECKMULTISIG qui nécessite un OP_0 supplémentaire dans les ScriptSigs multisigs nus ?
answer: OP_CHECKMULTISIG consomme un élément de pile supplémentaire en plus des signatures et des clés publiques attendues
wrong_answers:
  - Le processus de vérification de la signature nécessite un octet supplémentaire pour que la validation ECDSA fonctionne correctement
  - "L'implémentation de la pile de Bitcoin comporte un contrôle de frontière qui nécessite un élément de remplissage pour l'alignement de la mémoire"
  - Le comptage des seuils à plusieurs chiffres commence à zéro au lieu de un, ce qui nécessite une valeur de remplacement pour le décalage
explanation: |
  L'opcode OP_CHECKMULTISIG présente un bogue d'implémentation qui fait qu'il retire de la pile un élément de plus qu'il ne devrait lors de l'exécution. Cela signifie qu'en plus des m signatures et des n clés publiques requises, il consomme un élément supplémentaire de la pile. Pour éviter que l'opération n'échoue, les ScriptSigs multisigs nus doivent inclure un OP_0 initiale (qui pousse un tableau d'octets vide) pour satisfaire cette consommation inattendue de la pile. Les autres options décrivent des problèmes techniques plausibles mais ne sont pas la cause réelle de cette bizarrerie bien connue de Bitcoin.

question: OP_CHECKMULTISIG में ऑफ-बाय-वन बग का कारण क्या है जिसके लिए बेयर मल्टीसिग स्क्रिप्टसिग्स में एक अतिरिक्त OP_0 की आवश्यकता होती है?
answer: OP_CHECKMULTISIG अपेक्षित हस्ताक्षरों और सार्वजनिक कुंजियों के अलावा एक अतिरिक्त स्टैक तत्व का उपयोग करता है।
wrong_answers:
  - हस्ताक्षर सत्यापन प्रक्रिया को सही ढंग से काम करने के लिए उचित ECDSA सत्यापन हेतु एक अतिरिक्त बाइट की आवश्यकता होती है।
  - "Bitcoin के स्टैक कार्यान्वयन में एक सीमा जांच है जिसके लिए मेमोरी संरेखण के लिए एक पैडिंग तत्व की आवश्यकता होती है।"
  - मल्टीसिग थ्रेशोल्ड की गिनती एक के बजाय शून्य से शुरू होती है, जिसके लिए एक ऑफसेट प्लेसहोल्डर मान की आवश्यकता होती है।
explanation: |
  OP_CHECKMULTISIG ऑपकोड में एक त्रुटि है जिसके कारण निष्पादन के दौरान यह स्टैक से अपेक्षित संख्या से एक अतिरिक्त आइटम निकाल लेता है। इसका अर्थ यह है कि आवश्यक m हस्ताक्षरों और n सार्वजनिक कुंजियों के अतिरिक्त, यह एक अतिरिक्त स्टैक तत्व का उपयोग करता है। इस प्रक्रिया को विफल होने से बचाने के लिए, बेयर मल्टीसिग स्क्रिप्टसिग्स में एक प्रारंभिक OP_0 (जो एक खाली बाइट ऐरे को पुश करता है) शामिल होना चाहिए ताकि स्टैक के इस अप्रत्याशित उपयोग को पूरा किया जा सके। अन्य विकल्प तर्कसंगत प्रतीत होने वाली तकनीकी समस्याओं का वर्णन करते हैं, लेकिन वे Bitcoin की इस जानी-मानी त्रुटि का वास्तविक कारण नहीं हैं।
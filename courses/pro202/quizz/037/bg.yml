question: Каква е причината за грешката off-by-one в OP_CHECKMULTISIG, която изисква допълнителна OP_0 в голи многозначни ScriptSigs?
answer: OP_CHECKMULTISIG използва допълнителен елемент от стека извън очакваните подписи и публични ключове
wrong_answers:
  - Процесът на проверка на подписа изисква допълнителен байт, за да функционира правилно валидирането на ECDSA
  - "Реализацията на стека на Bitcoin има гранична проверка, която се нуждае от елемент за подравняване на паметта."
  - Отчитането на многозначния праг започва от нула вместо от единица, което изисква стойност на заместителя за отместване
explanation: |
  Опкодът OP_CHECKMULTISIG има грешка в изпълнението, при която по време на изпълнение изскача един елемент повече от стека, отколкото трябва. Това означава, че в допълнение към необходимите m подписа и n публични ключа, тя консумира допълнителен елемент от стека. За да се предотврати неуспех на операцията, голите многозначни ScriptSigs трябва да включват първоначален OP_0 (който избутва празен масив от байтове), за да се удовлетвори това неочаквано потребление на стека. Другите опции описват правдоподобно звучащи технически проблеми, но не са действителната причина за тази добре известна странност на Bitcoin.
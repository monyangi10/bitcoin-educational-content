question: อะไรทำให้เกิดบั๊ก off-by-one ใน OP_CHECKMULTISIG ที่ต้องการ OP_0 เพิ่มใน bare multisig ScriptSigs?
answer: OP_CHECKMULTISIG ใช้องค์ประกอบสแต็กเพิ่มเติมนอกเหนือจากลายเซ็นและคีย์สาธารณะที่คาดไว้
wrong_answers:
  - กระบวนการตรวจสอบลายเซ็นต้องการไบต์เพิ่มเติมเพื่อให้การตรวจสอบ ECDSA ทำงานได้อย่างถูกต้อง
  - "การใช้งานสแตกของ Bitcoin มีการตรวจสอบขอบเขตที่ต้องการองค์ประกอบการเติมเพื่อการจัดแนวหน่วยความจำ"
  - การนับเกณฑ์ multisig เริ่มต้นที่ศูนย์แทนที่จะเป็นหนึ่ง ซึ่งต้องการค่า placeholder ชดเชย
explanation: |
  OP_CHECKMULTISIG opcode มีบั๊กในการใช้งานที่ทำให้ดึงข้อมูลจาก stack มากกว่าที่ควรในระหว่างการดำเนินการ ซึ่งหมายความว่านอกจากลายเซ็น m และคีย์สาธารณะ n ที่จำเป็นแล้ว มันยังใช้ stack element เพิ่มอีกหนึ่งรายการ เพื่อป้องกันไม่ให้การดำเนินการล้มเหลว ScriptSigs ของ bare multisig ต้องรวม OP_0 เริ่มต้น (ซึ่งดันอาร์เรย์ไบต์ว่าง) เพื่อรองรับการใช้ stack ที่ไม่คาดคิดนี้ ตัวเลือกอื่นๆ อธิบายถึงปัญหาทางเทคนิคที่ฟังดูสมเหตุสมผลแต่ไม่ใช่สาเหตุที่แท้จริงของความแปลกประหลาดของ Bitcoin ที่เป็นที่รู้จักนี้
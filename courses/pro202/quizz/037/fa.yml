question: چه چیزی باعث اشکال off-by-one در OP_CHECKMULTISIG می‌شود که نیاز به یک OP_0 اضافی در ScriptSigs چند امضایی دارد؟
answer: OP_CHECKMULTISIG یک عنصر پشته اضافی فراتر از امضاها و کلیدهای عمومی مورد انتظار مصرف می‌کند.
wrong_answers:
  - فرآیند تأیید امضا نیاز به یک بایت اضافی دارد تا اعتبارسنجی ECDSA به درستی عمل کند.
  - "پیاده‌سازی پشته Bitcoin دارای بررسی مرزی است که به یک عنصر پدینگ برای تراز حافظه نیاز دارد"
  - شروع شمارش آستانه چندامضایی از صفر به جای یک است که نیاز به یک مقدار جایگزین آفست دارد.
explanation: |
  کد عملیات OP_CHECKMULTISIG دارای یک باگ پیاده‌سازی است که در حین اجرا یک آیتم بیشتر از آنچه باید از پشته خارج می‌کند. این بدان معناست که علاوه بر امضاهای m مورد نیاز و کلیدهای عمومی n، یک عنصر اضافی از پشته مصرف می‌کند. برای جلوگیری از شکست عملیات، ScriptSigهای multisig خالص باید شامل یک OP_0 اولیه (که یک آرایه بایت خالی را فشار می‌دهد) باشند تا این مصرف غیرمنتظره پشته را برآورده کنند. گزینه‌های دیگر مسائل فنی قابل‌قبولی را توصیف می‌کنند اما علت واقعی این ویژگی شناخته‌شده Bitcoin نیستند.
question: Что вызывает ошибку off-by-one в OP_CHECKMULTISIG, которая требует дополнительного OP_0 в голых многосиговых ScriptSigs?
answer: OP_CHECKMULTISIG потребляет дополнительный элемент стека, помимо ожидаемых подписей и открытых ключей
wrong_answers:
  - Процесс проверки подписи требует дополнительного байта для корректной работы проверки ECDSA
  - "Реализация стека в Bitcoin имеет проверку границ, которая требует элемента подстановки для выравнивания памяти"
  - Подсчет порога мультисиг начинается с нуля, а не с единицы, что требует ввода значения смещения
explanation: |
  Опкод OP_CHECKMULTISIG имеет ошибку в реализации, когда во время выполнения он вытаскивает из стека на один элемент больше, чем должен. Это означает, что в дополнение к требуемым m подписям и n открытым ключам, он потребляет дополнительный элемент стека. Чтобы предотвратить неудачу операции, голые мультисиговые ScriptSigs должны включать начальный OP_0 (который выталкивает пустой массив байтов), чтобы удовлетворить это неожиданное потребление стека. Другие варианты описывают правдоподобно звучащие технические проблемы, но не являются фактической причиной этой известной причуды Bitcoin.
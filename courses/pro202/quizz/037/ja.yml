question: OP_CHECKMULTISIGで、マルチシグのScriptSigsに余計なOP_0が必要になるオフ・バイ・ワンのバグは何が原因なのでしょうか？
answer: OP_CHECKMULTISIGは、期待される署名と公開鍵以外に、追加のスタック・エレメントを消費する。
wrong_answers:
  - 署名検証プロセスでは、ECDSA検証を正しく機能させるために追加のバイトが必要です。
  - "Bitcoinのスタック実装には、メモリ整列のためにパディング要素を必要とする境界チェックがある"
  - マルチシグしきい値のカウントが1ではなく0から始まるため、オフセット・プレースホルダ値が必要になります。
explanation: |
  OP_CHECKMULTISIGオペコードには実装上のバグがあり、実行時にスタックから必要以上の項目をポップする。これは、必要なm個の署名とn個の公開鍵に加えて、スタック要素を1つ余分に消費することを意味する。操作の失敗を防ぐために、ベアマルチシグScriptSigsは、この予期せぬスタック消費を満たすために、初期OP_0（空のバイト配列をプッシュする）を含める必要があります。他のオプションは、もっともらしく聞こえる技術的な問題を説明しているが、このよく知られたBitcoinの癖の実際の原因ではない。
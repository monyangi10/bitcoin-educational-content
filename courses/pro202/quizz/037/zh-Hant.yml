question: 是什麼導致 OP_CHECKMULTISIG 中的 off-by-one bug，需要在裸多位元 ScriptSigs 中多加一個 OP_0？
answer: 除了預期的簽章和公開金鑰之外，OP_CHECKMULTISIG 會消耗額外的堆疊元素
wrong_answers:
  - 簽章驗證程序需要額外的位元組，才能正確執行 ECDSA 驗證功能
  - 「Bitcoin 的堆疊實作有一個邊界檢查，需要一個填充元件來進行記憶體對齊」
  - 多重位元臨界值計數從 0 開始，而不是從 1 開始，因此需要偏移占位符值
explanation: |
  OP_CHECKMULTISIG 操作碼有一個執行上的錯誤，在執行過程中會從堆疊中多彈出一個項目。這表示除了所需的 m 個簽章和 n 個公開金鑰外，還會多消耗一個堆疊元素。為了防止操作失敗，裸的多重簽章 ScriptSigs 必須包含一個初始 OP_0（推入一個空的位元組陣列），以滿足這個意外的堆疊消耗。其他選項所描述的技術問題，聽起來似乎很有道理，但實際上並不是導致這個著名的 Bitcoin 怪癖的原因。
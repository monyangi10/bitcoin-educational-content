question: 在 Bitcoin 的密碼系統中，什麼是有限字段 F(p)？
answer: 由素數 p 定義的算術系統，包含元素 0 到 p-1
wrong_answers:
  - 用於產生 Bitcoin 位址和金鑰的無限數集
  - 包含 0 至 p-1 (含 p-1) 間所有實數的數學領域
  - 一個加密雜湊函數，其輸出長度正好為 p 位元
explanation: |
  有限字段 F(p) 特指一個圍繞素數 p 所建立的算術系統，它正好包含 p 個元素：從 0 到 p-1 的整數。有限」這一點非常重要 - 它不是無限的，也不是實數或雜湊函數。素數領域確保每個非零元素都有一個乘法逆，所有算術運算 (加、減、乘) 都使用 modulo p 來包圍，將結果保持在領域內。這種有邊界、可預測的結構對於 Bitcoin 的加密安全性是非常重要的。
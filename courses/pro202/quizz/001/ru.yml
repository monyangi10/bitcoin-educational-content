question: Что такое конечное поле F(p) в криптографической системе Bitcoin?
answer: Арифметическая система, определяемая простым числом p и содержащая элементы от 0 до p-1
wrong_answers:
  - Бесконечный набор чисел, используемый для генерации адресов и ключей Bitcoin
  - Математическое поле, содержащее все вещественные числа от 0 до p-1 включительно
  - Криптографическая хэш-функция, которая производит выходные данные длиной ровно p бит
explanation: |
  Конечное поле F(p) - это арифметическая система, построенная вокруг простого числа p и содержащая ровно p элементов: целые числа от 0 до p-1. Аспект "конечное" имеет решающее значение - оно не бесконечно, и речь идет не о вещественных числах или хэш-функциях. Праймовые поля гарантируют, что каждый ненулевой элемент имеет мультипликативную обратную величину, а все арифметические операции (сложение, вычитание, умножение) обходятся по модулю p, сохраняя результаты в пределах поля. Эта ограниченная, предсказуемая структура важна для криптографической безопасности Bitcoin.
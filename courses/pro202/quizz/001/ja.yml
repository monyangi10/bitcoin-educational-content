question: Bitcoinの暗号システムにおける有限体F(p)とは？
answer: 素数pで定義される算術系で、0からp-1までの要素を含む。
wrong_answers:
  - Bitcoinのアドレスとキーの生成に使われる無限の数字の集合。
  - 0からp-1までのすべての実数を含む数学的な場。
  - ちょうどpビットの長さの出力を生成する暗号ハッシュ関数。
explanation: |
  有限体F(p)とは、具体的には素数pを中心に構築された算術体系のことで、0からp-1までの整数をちょうどp個含む。有限」という点が重要で、無限ではないし、実数やハッシュ関数のことでもない。また、すべての算術演算（足し算、引き算、掛け算）はモジュロpを使ってラップし、結果をフィールド内に収める。この境界のある予測可能な構造は、Bitcoinの暗号セキュリティに不可欠である。
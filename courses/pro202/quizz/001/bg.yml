question: Какво представлява крайното поле F(p) в криптографската система на Bitcoin?
answer: Аритметична система, определена от просто число p, съдържаща елементи от 0 до p-1
wrong_answers:
  - Безкраен набор от числа, използвани за генериране на Bitcoin адреси и ключове
  - Математическо поле, съдържащо всички реални числа между 0 и p-1 включително
  - Криптографска хеш функция, която дава изходи с дължина точно p бита
explanation: |
  Крайно поле F(p) е аритметична система, изградена около просто число p, която съдържа точно p елемента: целите числа от 0 до p-1. Аспектът "крайно" е от решаващо значение - то не е безкрайно и не става дума за реални числа или хеш функции. Първичните полета гарантират, че всеки ненулев елемент има обратна мултипликативна функция, а всички аритметични операции (събиране, изваждане, умножение) се извършват с помощта на модуло p, като резултатите остават в рамките на полето. Тази ограничена, предсказуема структура е от съществено значение за криптографската сигурност на Bitcoin.
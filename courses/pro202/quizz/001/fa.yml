question: فیلد متناهی F(p) در سیستم رمزنگاری Bitcoin چیست؟
answer: یک سیستم حسابی تعریف‌شده توسط یک عدد اول p، شامل عناصر 0 تا p-1
wrong_answers:
  - مجموعه‌ای بی‌نهایت از اعداد که برای تولید آدرس‌ها و کلیدهای Bitcoin استفاده می‌شود
  - یک حوزه ریاضی که شامل تمام اعداد حقیقی بین 0 و p-1 است، به صورت جامع
  - یک تابع هش رمزنگاری که خروجی‌هایی با طول دقیقاً p بیت تولید می‌کند
explanation: |
  یک میدان متناهی F(p) به طور خاص یک سیستم حسابی است که حول یک عدد اول p ساخته شده و دقیقاً شامل p عنصر است: اعداد صحیح از 0 تا p-1. جنبه 'متناهی' بسیار مهم است - این میدان بی‌نهایت نیست و مربوط به اعداد حقیقی یا توابع هش نیست. میدان‌های اول تضمین می‌کنند که هر عنصر ناصفر دارای معکوس ضربی است و تمام عملیات حسابی (جمع، تفریق، ضرب) با استفاده از مدولوی p انجام می‌شود و نتایج را درون میدان نگه می‌دارد. این ساختار محدود و قابل پیش‌بینی برای امنیت رمزنگاری Bitcoin ضروری است.
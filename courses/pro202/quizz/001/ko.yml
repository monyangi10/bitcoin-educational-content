question: Bitcoin의 암호화 시스템에서 유한 필드 F(p)는 무엇인가요?
answer: 0에서 p-1까지의 원소를 포함하는 소수 p로 정의되는 산술 체계입니다
wrong_answers:
  - Bitcoin 주소 및 키 생성에 사용되는 무한 숫자 세트
  - 0에서 p-1 사이의 모든 실수를 포함하는 수학 필드입니다
  - 길이가 정확히 p비트인 출력을 생성하는 암호화 해시 함수입니다
explanation: |
  유한 필드 F(p)는 정확히 p개의 원소, 즉 0에서 p-1까지의 정수를 포함하는 소수 p를 중심으로 구축된 산술 체계입니다. '유한'이라는 측면이 중요한데, 이는 무한한 것이 아니며 실수나 해시 함수와 관련이 없습니다. 소인수 필드는 0이 아닌 모든 요소가 곱셈 역을 가지며, 모든 산술 연산(덧셈, 뺄셈, 곱셈)은 모듈로 p를 사용하여 결과를 필드 내에 유지합니다. 이러한 제한적이고 예측 가능한 구조는 Bitcoin의 암호화 보안에 필수적입니다.
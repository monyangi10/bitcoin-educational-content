question: 什么是 Bitcoin 密码系统中的有限域 F(p)？
answer: 由质数 p 定义的算术系统，包含从 0 到 p-1 的元素
wrong_answers:
  - 用于生成 Bitcoin 地址和密钥的无限组数字
  - 包含 0 至 p-1 之间所有实数的数学域
  - 一种加密散列函数，其输出长度正好为 p 比特
explanation: |
  有限域 F(p) 特指围绕素数 p 建立的算术系统，该系统恰好包含 p 个元素：从 0 到 p-1 的整数。有限 "这一点至关重要--它不是无限的，也与实数或哈希函数无关。质数域确保每个非零元素都有一个乘法逆，所有算术运算（加法、减法、乘法）都使用 modulo p，将结果保持在域内。这种有边界、可预测的结构对 Bitcoin 的加密安全性至关重要。
question: Bitcoin की क्रिप्टोग्राफिक प्रणाली में परिमित क्षेत्र F(p) क्या है?
answer: एक अभाज्य संख्या p द्वारा परिभाषित अंकगणितीय प्रणाली, जिसमें 0 से p-1 तक के तत्व शामिल हैं।
wrong_answers:
  - Bitcoin पते और कुंजियाँ उत्पन्न करने के लिए उपयोग की जाने वाली संख्याओं का एक अनंत समूह
  - एक गणितीय क्षेत्र जिसमें 0 और p-1 के बीच की सभी वास्तविक संख्याएँ शामिल हैं।
  - एक क्रिप्टोग्राफिक हैश फ़ंक्शन जो ठीक p बिट्स की लंबाई के आउटपुट उत्पन्न करता है
explanation: |
  एक परिमित क्षेत्र F(p) विशेष रूप से एक अभाज्य संख्या p के इर्द-गिर्द निर्मित एक अंकगणितीय प्रणाली है जिसमें ठीक p तत्व होते हैं: 0 से p-1 तक के पूर्णांक। 'परिमित' पहलू महत्वपूर्ण है - यह अनंत नहीं है, और इसका संबंध वास्तविक संख्याओं या हैश फ़ंक्शंस से नहीं है। अभाज्य क्षेत्र यह सुनिश्चित करते हैं कि प्रत्येक गैर-शून्य तत्व का एक गुणात्मक प्रतिलोम हो, और सभी अंकगणितीय संक्रियाएँ (जोड़, घटाव, गुणा) मॉड्यूलो p का उपयोग करके परिक्रमण करती हैं, जिससे परिणाम क्षेत्र के भीतर ही रहते हैं। यह परिबद्ध, पूर्वानुमानित संरचना Bitcoin की क्रिप्टोग्राफिक सुरक्षा के लिए आवश्यक है।
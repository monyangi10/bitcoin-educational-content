question: ฟิลด์จำกัด F(p) ในระบบการเข้ารหัสของ Bitcoin คืออะไร?
answer: ระบบเลขคณิตที่กำหนดโดยจำนวนเฉพาะ p ซึ่งประกอบด้วยสมาชิกตั้งแต่ 0 ถึง p-1
wrong_answers:
  - ชุดตัวเลขที่ไม่มีที่สิ้นสุดที่ใช้สำหรับสร้างที่อยู่และกุญแจ Bitcoin
  - ฟิลด์ทางคณิตศาสตร์ที่มีตัวเลขจริงทั้งหมดระหว่าง 0 และ p-1 รวมอยู่ด้วย
  - ฟังก์ชันแฮชเข้ารหัสที่สร้างผลลัพธ์ที่มีความยาว p บิตพอดี
explanation: |
  ฟิลด์จำกัด F(p) เป็นระบบเลขคณิตที่สร้างขึ้นรอบๆ จำนวนเฉพาะ p ที่มีองค์ประกอบทั้งหมด p องค์ประกอบ: จำนวนเต็มตั้งแต่ 0 ถึง p-1 แง่มุม 'จำกัด' นั้นสำคัญมาก - มันไม่ใช่อินฟินิตี้ และมันไม่เกี่ยวกับจำนวนจริงหรือฟังก์ชันแฮช ฟิลด์เฉพาะประกันว่าองค์ประกอบที่ไม่ใช่ศูนย์ทุกตัวมีอินเวอร์สการคูณ และการดำเนินการทางเลขคณิตทั้งหมด (การบวก การลบ การคูณ) จะวนกลับโดยใช้โมดูโล p ทำให้ผลลัพธ์อยู่ภายในฟิลด์ โครงสร้างที่มีขอบเขตและคาดการณ์ได้นี้เป็นสิ่งสำคัญสำหรับความปลอดภัยทางการเข้ารหัสของ Bitcoin
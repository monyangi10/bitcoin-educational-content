question: When Bitcoin block hashes are interpreted as little-endian integers for target comparison, why do valid blocks typically display many trailing zeros in their hexadecimal representation?
answer: Because little-endian interpretation means the rightmost bytes in hex correspond to the most significant bits of the integer value
wrong_answers:
  - Because the SHA-256 algorithm naturally produces trailing zeros when the input contains transaction data with repeated patterns
  - Because miners deliberately pad the block header with zero bytes to make the hash computation more efficient for ASIC hardware
  - Because the nonce field is incremented from zero upward, causing the hash function to generate patterns with trailing zeros
explanation: |
  In little-endian interpretation, bytes are read in reverse order, so the rightmost bytes in hexadecimal become the most significant portion of the integer. For a hash to be below the target (a small number), its most significant bits must be zero, which appear as trailing zeros in the hex display. This is purely a representation artifact of the endianness conversion, not a property of SHA-256 or mining hardware.

question: Bitcoinブロック・ハッシュがターゲット比較のためにリトルエンディアン整数として解釈されるとき、有効なブロックが16進数表現で多くの末尾ゼロを表示するのはなぜか？
answer: リトルエンディアンの解釈は、16進数の右端のバイトが整数値の最上位ビットに対応することを意味するからだ。
wrong_answers:
  - SHA-256アルゴリズムは、入力が繰り返しパターンを持つトランザクションデータを含む場合、自然に末尾にゼロを生成するためである。
  - なぜなら、採掘者はASICハードウェアのハッシュ計算をより効率的にするために、ブロックヘッダを意図的にゼロバイトで埋めるからである。
  - なぜなら、nonceフィールドはゼロから上にインクリメントされ、ハッシュ関数が末尾にゼロを持つgenerateパターンを引き起こすからである。
explanation: |
  リトルエンディアンの解釈では、バイトは逆順に読み込まれるため、16進数の右端のバイトが整数の最上位部分になる。ハッシュがターゲット（小さな数）を下回るためには、その最上位ビットはゼロでなければならず、16進数表示では末尾のゼロとして表示される。これは純粋にエンディアン変換の表現上のアーチファクトであり、SHA-256やminingハードウェアの特性ではない。
question: जब लक्ष्य तुलना के लिए Bitcoin ब्लॉक हैश को लिटिल-एंडियन पूर्णांक के रूप में व्याख्यायित किया जाता है, तो वैध ब्लॉक आमतौर पर अपने हेक्साडेसिमल प्रतिनिधित्व में कई अंतःशून्य क्यों प्रदर्शित करते हैं?
answer: क्योंकि लिटिल-एंडियन व्याख्या का अर्थ है कि हेक्साडेसिमल में सबसे दाहिने बाइट्स पूर्णांक मान के सबसे महत्वपूर्ण बिट्स के अनुरूप होते हैं।
wrong_answers:
  - क्योंकि SHA-256 एल्गोरिदम स्वाभाविक रूप से इनपुट में दोहराए गए पैटर्न वाले लेनदेन डेटा होने पर अंत में शून्य उत्पन्न करता है।
  - क्योंकि खनिक जानबूझकर ब्लॉक हेडर में शून्य बाइट्स जोड़ते हैं ताकि ASIC हार्डवेयर के लिए हैश गणना अधिक कुशल हो सके।
  - क्योंकि नॉनस फ़ील्ड शून्य से ऊपर की ओर बढ़ता है, जिसके कारण हैश फ़ंक्शन ट्रेलिंग शून्य के साथ generate पैटर्न बनाता है।
explanation: |
  लिटिल-एंडियन व्याख्या में, बाइट्स को उल्टे क्रम में पढ़ा जाता है, इसलिए हेक्साडेसिमल में सबसे दाहिने बाइट्स पूर्णांक का सबसे महत्वपूर्ण भाग बन जाते हैं। किसी हैश को लक्ष्य (एक छोटी संख्या) से नीचे होने के लिए, उसके सबसे महत्वपूर्ण बिट्स शून्य होने चाहिए, जो हेक्साडेसिमल डिस्प्ले में अंत में शून्य के रूप में दिखाई देते हैं। यह पूरी तरह से एंडियननेस रूपांतरण का एक प्रतिनिधित्व संबंधी दोष है, न कि SHA-256 या mining हार्डवेयर की विशेषता।
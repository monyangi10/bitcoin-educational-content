question: 当 Bitcoin 数据块哈希值被解释为用于目标比较的小指整数时，为什么有效数据块的十六进制表示中通常会显示很多尾数零？
answer: 因为小二进制解释意味着十六进制最右边的字节对应于整数值的最有效位
wrong_answers:
  - 因为当输入包含重复模式的交易数据时，SHA-256 算法会自然产生尾部的零
  - 因为矿工故意将区块头填充为零字节，以提高 ASIC 硬件的哈希计算效率。
  - 由于 nonce 字段从 0 开始向上递增，导致散列函数 generate 模式的尾部为零
explanation: |
  在小二进制解释中，字节以相反的顺序读取，因此十六进制中最右边的字节成为整数中最有意义的部分。要使哈希值低于目标值（小数），其最有效位必须为零，在十六进制显示中显示为尾部的零。这纯粹是字节序号转换的一种表现形式，与 SHA-256 或 mining 硬件无关。
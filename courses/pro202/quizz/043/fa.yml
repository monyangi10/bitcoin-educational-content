question: هنگامی که هش‌های بلوک Bitcoin به عنوان اعداد صحیح little-endian برای مقایسه هدف تفسیر می‌شوند، چرا بلوک‌های معتبر معمولاً تعداد زیادی صفر در انتهای نمایش هگزادسیمال خود نشان می‌دهند؟
answer: زیرا تفسیر little-endian به این معناست که بایت‌های سمت راست در هگز به با ارزش‌ترین بیت‌های مقدار عدد صحیح مربوط می‌شوند.
wrong_answers:
  - زیرا الگوریتم SHA-256 به طور طبیعی صفرهای پایانی تولید می‌کند زمانی که ورودی شامل داده‌های تراکنش با الگوهای تکراری باشد
  - زیرا ماینرها عمداً هدر بلاک را با بایت‌های صفر پر می‌کنند تا محاسبه هش برای سخت‌افزار ASIC کارآمدتر شود.
  - زیرا فیلد نانس از صفر به سمت بالا افزایش می‌یابد و باعث می‌شود تابع هش به الگوهای generate با صفرهای انتهایی برسد.
explanation: |
  در تفسیر little-endian، بایت‌ها به صورت معکوس خوانده می‌شوند، بنابراین بایت‌های سمت راست در هگزادسیمال به مهم‌ترین بخش عدد صحیح تبدیل می‌شوند. برای اینکه یک هش زیر هدف (یک عدد کوچک) باشد، مهم‌ترین بیت‌های آن باید صفر باشند، که به صورت صفرهای انتهایی در نمایش هگز ظاهر می‌شوند. این صرفاً یک ویژگی نمایشی از تبدیل endianness است و نه یک ویژگی از SHA-256 یا سخت‌افزار mining.
question: เมื่อแฮชของบล็อก Bitcoin ถูกตีความเป็นจำนวนเต็มแบบ little-endian สำหรับการเปรียบเทียบเป้าหมาย ทำไมบล็อกที่ถูกต้องมักจะแสดงศูนย์ต่อท้ายจำนวนมากในรูปแบบเลขฐานสิบหก?
answer: เนื่องจากการตีความแบบ little-endian หมายความว่าไบต์ที่อยู่ทางขวาสุดในเลขฐานสิบหกสอดคล้องกับบิตที่มีค่าสำคัญที่สุดของค่าจำนวนเต็ม
wrong_answers:
  - เนื่องจากอัลกอริทึม SHA-256 มักจะสร้างเลขศูนย์ต่อท้ายเมื่อข้อมูลที่ป้อนมีข้อมูลธุรกรรมที่มีรูปแบบซ้ำๆ
  - เนื่องจากนักขุดจงใจเติมส่วนหัวของบล็อกด้วยไบต์ศูนย์เพื่อทำให้การคำนวณแฮชมีประสิทธิภาพมากขึ้นสำหรับฮาร์ดแวร์ ASIC
  - เนื่องจากฟิลด์ nonce ถูกเพิ่มขึ้นจากศูนย์ขึ้นไป ทำให้ฟังก์ชันแฮชสร้างรูปแบบ generate ที่มีศูนย์ตามท้าย
explanation: |
  ในการตีความแบบ little-endian ไบต์จะถูกอ่านในลำดับย้อนกลับ ดังนั้นไบต์ที่อยู่ขวาสุดในเลขฐานสิบหกจะกลายเป็นส่วนที่มีค่าสำคัญที่สุดของจำนวนเต็ม สำหรับแฮชที่จะต่ำกว่าค่าเป้าหมาย (ซึ่งเป็นจำนวนเล็ก) บิตที่มีค่าสำคัญที่สุดจะต้องเป็นศูนย์ ซึ่งปรากฏเป็นศูนย์ต่อท้ายในหน้าจอแสดงผลแบบฐานสิบหก นี่เป็นเพียงสิ่งประดิษฐ์ของการแปลง endianness ไม่ใช่คุณสมบัติของ SHA-256 หรือฮาร์ดแวร์ mining
question: 當 Bitcoin 區塊雜湊被詮釋為用於目標比較的 little-endian 整數時，為什麼有效的區塊通常會在其十六進位表示中顯示許多尾部的零？
answer: 因為 little-endian 解釋表示十六進制最右側的位元組對應整數值的最重要位元組
wrong_answers:
  - 由於 SHA-256 演算法在輸入包含重複模式的交易資料時，會自然產生尾部的零
  - 因為礦工故意將區塊標頭填充為零位元組，以提高 ASIC 硬體的散列計算效率。
  - 由於 nonce 欄位會從 0 往上遞增，導致散列函數會 generate 帶有尾隨零的模式
explanation: |
  在 little-endian 釋義中，位元組以相反順序讀取，因此十六進位中最右側的位元組成為整數中最重要的部分。若要哈希值低於目標值 (小數)，其最重要的位元必須為零，在十六進位顯示中會顯示為尾部的零。這純粹是 endianness 轉換的表達假象，並非 SHA-256 或 mining 硬體的屬性。
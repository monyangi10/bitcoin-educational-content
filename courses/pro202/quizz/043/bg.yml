question: Когато хешовете на блоковете Bitcoin се интерпретират като цели числа в малък ендиан за сравнение на целите, защо валидните блокове обикновено показват много крайни нули в шестнадесетичното си представяне?
answer: Тъй като интерпретацията в малък ендиан означава, че най-десните байтове в шестнадесетичен ред съответстват на най-значимите битове на целочислената стойност
wrong_answers:
  - Тъй като алгоритъмът SHA-256 естествено произвежда крайни нули, когато входът съдържа данни за транзакции с повтарящи се модели
  - Тъй като миньорите умишлено подпълват заглавието на блока с нулеви байтове, за да направят изчислението на хеша по-ефективно за хардуера на ASIC
  - Тъй като полето nonce се увеличава от нула нагоре, което кара хеш функцията да generate модели с нули накрая
explanation: |
  При интерпретацията little-endian байтовете се четат в обратен ред, така че най-дясната част на байта в шестнадесетичната система става най-значимата част от цялото число. За да бъде даден хеш под целта (малко число), най-значимите му битове трябва да бъдат нули, които се появяват като задни нули в шестнадесетичния дисплей. Това е чисто представителен артефакт на преобразуването на ендианността, а не свойство на хардуера на SHA-256 или mining.
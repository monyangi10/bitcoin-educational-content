question: Bitcoin 블록 해시가 대상 비교를 위해 리틀엔디안 정수로 해석될 때, 유효한 블록이 일반적으로 16진수 표현에 후행 0이 많이 표시되는 이유는 무엇인가요?
answer: 리틀엔디안 해석은 16진수의 가장 오른쪽 바이트가 정수 값의 가장 중요한 비트에 해당한다는 것을 의미하기 때문에
wrong_answers:
  - SHA-256 알고리즘은 입력에 반복되는 패턴의 트랜잭션 데이터가 포함될 때 자연스럽게 후행 0을 생성하기 때문입니다
  - 채굴자들은 해시 계산의 효율성을 높이기 위해 의도적으로 블록 헤더를 0바이트로 채우기 때문에, ASIC 하드웨어에서 해시 계산을 더 효율적으로 수행할 수 있습니다
  - 논스 필드는 0에서 위쪽으로 증가하기 때문에 해시 함수가 후행 0이 있는 generate 패턴이 됩니다
explanation: |
  리틀엔디안 해석에서는 바이트가 역순으로 읽히므로 16진수의 가장 오른쪽 바이트가 정수에서 가장 중요한 부분이 됩니다. 해시가 목표(작은 숫자) 이하가 되려면 가장 중요한 비트가 0이어야 하며, 이는 16진수 표시에서 후행 0으로 나타납니다. 이는 순전히 엔디안 변환의 표현 아티팩트이며, SHA-256 또는 mining 하드웨어의 속성이 아닙니다.
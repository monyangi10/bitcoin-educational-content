question: Bitcoin 的難度值與目前用於區塊驗證的目標之間的數學關係是什麼？
answer: 難度等於最低目標除以目前目標
wrong_answers:
  - 難度等於目前目標除以可能的最低目標
  - 難度等於目前目標乘以可能的最低目標
  - 難度等於系數乘以 256 升至指數減 3
explanation: |
  Bitcoin 的難度具體定義為 lowest_target / current_target，表示 mining 與最容易的難度相比，難了多少倍。這個反比關係表示當目標變小時 (有效的雜湊值會變得更難找到)，難度也會成正比地增加。公式確保難度值 1 代表最簡單的 mining 條件，而較高的值則表示尋找有效區塊所需的計算工作成比例地增加。
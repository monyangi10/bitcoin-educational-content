question: Bitcoin 的难度值与当前用于区块验证的目标之间的数学关系是什么？
answer: 难度等于最低目标值除以当前目标值
wrong_answers:
  - 难度等于当前目标值除以可能的最低目标值
  - 难度等于当前目标乘以可能的最低目标
  - 难度等于系数乘以 256 再乘以指数减 3
explanation: |
  Bitcoin 的难度具体定义为 lowest_target / current_target，表示 mining 的难度是最简单难度的多少倍。这种反比关系意味着目标越小（有效哈希值越难找到），难度就会成正比增加。该公式确保难度 1 代表最简单的 mining 条件，而数值越大，则表示找到有效区块所需的计算工作量也就越大。
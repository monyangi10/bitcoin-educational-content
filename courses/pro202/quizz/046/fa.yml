question: رابطه ریاضی بین مقدار سختی Bitcoin و هدف فعلی مورد استفاده برای اعتبارسنجی بلوک چیست؟
answer: سختی برابر است با کمترین هدف ممکن تقسیم بر هدف فعلی
wrong_answers:
  - سختی برابر است با هدف فعلی تقسیم بر کمترین هدف ممکن
  - سختی برابر است با هدف فعلی ضرب در کمترین هدف ممکن
  - سختی برابر است با ضریب ضربدر ۲۵۶ به توان نمای منهای ۳
explanation: |
  سختی Bitcoin به‌طور خاص به‌صورت lowest_target / current_target تعریف شده است، که بیان می‌کند mining چند برابر سخت‌تر از آسان‌ترین سطح ممکن است. این رابطه معکوس به این معناست که با کوچک‌تر شدن هدف (که یافتن هش‌های معتبر را سخت‌تر می‌کند)، سختی به‌طور متناسب افزایش می‌یابد. این فرمول تضمین می‌کند که سختی 1 نشان‌دهنده آسان‌ترین شرایط mining است، در حالی که مقادیر بالاتر نشان‌دهنده نیاز به کار محاسباتی بیشتری برای یافتن بلوک‌های معتبر است.
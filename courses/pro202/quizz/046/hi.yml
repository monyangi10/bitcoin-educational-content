question: Bitcoin के कठिनाई मान और ब्लॉक सत्यापन के लिए उपयोग किए जाने वाले वर्तमान लक्ष्य के बीच गणितीय संबंध क्या है?
answer: कठिनाई का मान न्यूनतम संभव लक्ष्य को वर्तमान लक्ष्य से भाग देने पर प्राप्त होता है।
wrong_answers:
  - कठिनाई का मान वर्तमान लक्ष्य को न्यूनतम संभव लक्ष्य से विभाजित करने के बराबर होता है।
  - कठिनाई का मान वर्तमान लक्ष्य को न्यूनतम संभव लक्ष्य से गुणा करने के बराबर होता है।
  - कठिनाई गुणांक के गुणनफल के बराबर होती है, जिसमें 256 की घात में से 3 घटाया जाता है।
explanation: |
  Bitcoin की कठिनाई को विशेष रूप से lowest_target / current_target के रूप में परिभाषित किया गया है, जो यह दर्शाता है कि mining सबसे आसान संभव कठिनाई की तुलना में कितनी गुना कठिन है। इस विपरीत संबंध का अर्थ है कि जैसे-जैसे लक्ष्य छोटा होता जाता है (वैध हैश खोजना कठिन होता जाता है), कठिनाई उसी अनुपात में बढ़ती जाती है। सूत्र यह सुनिश्चित करता है कि कठिनाई का मान 1 सबसे आसान mining स्थिति को दर्शाता है, जबकि उच्च मान वैध ब्लॉक खोजने के लिए आवश्यक गणनात्मक कार्य की आनुपातिक रूप से अधिक मात्रा को इंगित करते हैं।
question: ความสัมพันธ์ทางคณิตศาสตร์ระหว่างค่า difficulty ของ Bitcoin และเป้าหมายปัจจุบันที่ใช้สำหรับการตรวจสอบบล็อกคืออะไร?
answer: ความยากเท่ากับเป้าหมายที่ต่ำที่สุดที่เป็นไปได้หารด้วยเป้าหมายปัจจุบัน
wrong_answers:
  - ความยากเท่ากับเป้าหมายปัจจุบันหารด้วยเป้าหมายที่ต่ำที่สุดที่เป็นไปได้
  - ความยากเท่ากับเป้าหมายปัจจุบันคูณด้วยเป้าหมายที่ต่ำที่สุดที่เป็นไปได้
  - ความยากเท่ากับสัมประสิทธิ์คูณด้วย 256 ยกกำลังลบ 3
explanation: |
  ความยากของ Bitcoin ถูกกำหนดโดยเฉพาะเป็น lowest_target / current_target ซึ่งแสดงถึงความยากของ mining เมื่อเทียบกับความยากที่ง่ายที่สุด ความสัมพันธ์ผกผันนี้หมายความว่าเมื่อเป้าหมายมีขนาดเล็กลง (ทำให้การค้นหาแฮชที่ถูกต้องยากขึ้น) ความยากจะเพิ่มขึ้นตามสัดส่วน สูตรนี้ทำให้แน่ใจว่าความยากระดับ 1 แสดงถึงเงื่อนไข mining ที่ง่ายที่สุด ในขณะที่ค่าที่สูงกว่าบ่งบอกถึงงานคำนวณที่ต้องการมากขึ้นตามสัดส่วนในการค้นหาบล็อกที่ถูกต้อง
question: Bitcoin의 난이도 값과 블록 검증에 사용되는 현재 목표 사이의 수학적 관계는 무엇인가요?
answer: 난이도는 가능한 가장 낮은 목표를 현재 목표로 나눈 값입니다
wrong_answers:
  - 난이도는 현재 목표를 가능한 가장 낮은 목표로 나눈 값입니다
  - 난이도는 현재 목표에 가능한 가장 낮은 목표를 곱한 값입니다
  - 난이도는 계수 256에 지수를 곱한 값에서 3을 뺀 값과 같습니다
explanation: |
  Bitcoin의 난이도는 구체적으로 최저_타겟 / 현재_타겟으로 정의되며, 이는 가장 쉬운 난이도와 비교하여 mining가 몇 배 더 어려운지를 나타냅니다. 이 반비례 관계는 목표가 작아질수록(유효한 해시를 찾기가 더 어려워짐) 난이도가 비례적으로 증가한다는 것을 의미합니다. 이 공식에 따르면 난이도 1은 가장 쉬운 mining 조건을 나타내며, 값이 높을수록 유효한 블록을 찾는 데 필요한 계산 작업이 비례적으로 더 많음을 나타냅니다.
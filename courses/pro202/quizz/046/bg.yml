question: Каква е математическата връзка между стойността на трудността на Bitcoin и текущата цел, използвана за валидиране на блока?
answer: Трудността е равна на най-ниската възможна цел, разделена на текущата цел
wrong_answers:
  - Трудността е равна на текущата цел, разделена на най-ниската възможна цел
  - Трудността е равна на текущата цел, умножена по най-ниската възможна цел
  - Трудността е равна на коефициента, умножен по 256 и увеличен до експонентата минус 3
explanation: |
  Трудността на Bitcoin се определя конкретно като най-ниска_цел / текуща_цел, което изразява колко пъти по-трудно е mining в сравнение с най-лесната възможна трудност. Тази обратна зависимост означава, че с намаляването на целта (което прави намирането на валидни хешове по-трудно) трудността се увеличава пропорционално. Формулата гарантира, че трудност от 1 представлява най-лесните условия на mining, докато по-високите стойности показват пропорционално повече изчислителна работа, необходима за намиране на валидни блокове.
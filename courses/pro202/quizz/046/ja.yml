question: Bitcoinの難易度値と、ブロック検証に使われる現在の目標値の数学的な関係は？
answer: 難易度は、可能な限り低い目標を現在の目標で割ったものに等しい。
wrong_answers:
  - 難易度は現在の目標を可能な限り低い目標で割ったものに等しい。
  - 難易度は現在の目標に可能な限り低い目標を掛けたものに等しい。
  - 難易度は係数の256倍を指数マイナス3にしたものに等しい。
explanation: |
  Bitcoinの難易度はlowest_target / current_targetで定義され、miningが最も簡単な難易度の何倍難しいかを表している。この反比例の関係は、ターゲットが小さくなる（有効なハッシュを見つけるのが難しくなる）ほど、難易度も比例して高くなることを意味する。この式では、難易度1が最も簡単なminingの条件を表し、値が高いほど有効なブロックを見つけるのに必要な計算量が比例して多くなることを示します。
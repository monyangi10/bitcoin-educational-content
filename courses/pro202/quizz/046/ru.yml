question: Какова математическая связь между значением сложности Bitcoin и текущей целью, используемой для проверки блока?
answer: Сложность равна минимально возможной цели, деленной на текущую цель
wrong_answers:
  - Сложность равна текущей цели, деленной на минимально возможную цель
  - Сложность равна текущей цели, умноженной на минимально возможную цель
  - Сложность равна коэффициенту, умноженному на 256, возведенному в экспоненту минус 3
explanation: |
  Сложность Bitcoin определяется как lowest_target / current_target, что выражает, во сколько раз сложнее mining по сравнению с самой простой из возможных сложностей. Эта обратная зависимость означает, что по мере уменьшения цели (что усложняет поиск достоверных хэшей) сложность пропорционально возрастает. Формула гарантирует, что сложность 1 представляет собой самые легкие условия mining, в то время как более высокие значения указывают на пропорционально большую вычислительную работу, необходимую для поиска валидных блоков.
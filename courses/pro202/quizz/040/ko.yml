question: 최신 ASIC 채굴자가 블록 헤더의 논스 필드에만 의존하지 않고 코인베이스 트랜잭션 내에서 데이터를 수정하는 이유는 무엇인가요?
answer: 4바이트 논스 필드는 최신 ASIC을 위한 검색 공간이 부족하기 때문에 채굴자는 코인베이스 데이터를 수정하여 머클 루트를 변경하고 추가 검색 공간을 생성합니다
wrong_answers:
  - 코인베이스 거래를 수정하면 채굴자는 표준 보조금 금액이 허용하는 것보다 더 높은 블록 보상을 청구할 수 있습니다
  - "블록 검증을 위해 채굴자의 디지털 서명을 포함하도록 코인베이스 트랜잭션을 수정해야 합니다."
  - 코인베이스 데이터를 변경하면 채굴자가 표준 proof-of-work 요구 사항을 우회할 수 있어 계산 난이도가 줄어듭니다
explanation: |
  최신 ASIC은 4바이트 논스 공간(2^32개의 가능성)을 매우 빠르게 소진할 수 있으므로 추가 검색 공간이 필요합니다. 채굴자는 코인베이스 트랜잭션의 데이터를 수정함으로써 트랜잭션의 해시를 변경하고, 블록 헤더의 머클 루트를 변경하여 수십억 개의 논스와 유사한 값을 추가로 시도할 수 있습니다. '추가 논스'라고 하는 이 기술은 하드웨어가 원래 논스 필드의 용량을 훨씬 초과하는 최신 mining 작업에 필수적입니다.
question: Защо съвременните миньори на ASIC модифицират данните в транзакцията на Coinbase, вместо да разчитат единствено на полето nonce в заглавието на блока?
answer: 4-байтовото поле nonce не осигурява достатъчно място за търсене за съвременните ASIC, затова миньорите модифицират данните на Coinbase, за да променят корена на Merkle и да създадат допълнително място за търсене
wrong_answers:
  - Модифицирането на транзакцията в Coinbase позволява на миньорите да претендират за по-високи блокови възнаграждения, отколкото позволява стандартният размер на субсидията
  - "Транзакцията в Coinbase трябва да бъде променена, за да включва цифровия подпис на миньора за целите на валидирането на блока"
  - Промяната на данните на Coinbase намалява изчислителната трудност, като позволява на миньорите да заобиколят стандартните изисквания на proof-of-work
explanation: |
  Съвременните ASIC могат да изчерпят 4-байтовото пространство за нонси (2^32 възможности) изключително бързо, което изисква допълнително пространство за търсене. Като променят данните в транзакцията на Coinbase, миньорите променят хеша на транзакцията, което променя корена на Меркъл в заглавието на блока, като на практика създава милиарди допълнителни стойности, подобни на нонси, които да бъдат изпробвани. Тази техника, наречена "extra-nonce", е от съществено значение за съвременните операции на mining, при които хардуерът далеч надхвърля капацитета на оригиналното поле nonce.
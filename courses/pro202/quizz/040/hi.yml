question: आधुनिक ASIC माइनर कॉइनबेस लेनदेन के भीतर डेटा को क्यों संशोधित करते हैं, बजाय इसके कि वे केवल ब्लॉक हेडर के नॉनस फ़ील्ड पर निर्भर रहें?
answer: 4-बाइट नॉनस फ़ील्ड आधुनिक ASIC के लिए अपर्याप्त खोज स्थान प्रदान करता है, इसलिए माइनर मर्कल रूट को बदलने और अतिरिक्त खोज स्थान बनाने के लिए कॉइनबेस डेटा को संशोधित करते हैं।
wrong_answers:
  - कॉइनबेस लेनदेन में संशोधन करने से माइनर्स को मानक सब्सिडी राशि से अधिक ब्लॉक रिवॉर्ड प्राप्त करने की अनुमति मिलती है।
  - "ब्लॉक सत्यापन के लिए कॉइनबेस लेनदेन में माइनर के डिजिटल हस्ताक्षर को शामिल करने के लिए उसमें संशोधन करना आवश्यक है।"
  - कॉइनबेस डेटा में बदलाव करने से माइनर्स को मानक proof-of-work आवश्यकताओं को दरकिनार करने की अनुमति मिलती है, जिससे गणना संबंधी कठिनाई कम हो जाती है।
explanation: |
  आधुनिक ASIC चार-बाइट नॉनस स्पेस (2^32 संभावनाएँ) को अत्यंत शीघ्रता से समाप्त कर सकते हैं, जिसके लिए अतिरिक्त खोज स्थान की आवश्यकता होती है। कॉइनबेस लेनदेन में डेटा को संशोधित करके, माइनर लेनदेन के हैश को बदल देते हैं, जिससे ब्लॉक हेडर में मर्कल रूट बदल जाता है, और इस प्रकार अरबों अतिरिक्त नॉनस-जैसे मान उत्पन्न हो जाते हैं। 'एक्स्ट्रा-नॉनस' नामक यह तकनीक आधुनिक mining संचालन के लिए आवश्यक है, जहाँ हार्डवेयर मूल नॉनस फ़ील्ड की क्षमता से कहीं अधिक है।
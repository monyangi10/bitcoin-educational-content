question: چرا ماینرهای مدرن ASIC داده‌ها را در تراکنش Coinbase تغییر می‌دهند به جای اینکه فقط به فیلد nonce در هدر بلاک تکیه کنند؟
answer: فیلد نانس ۴ بایتی فضای جستجوی کافی برای ASICهای مدرن فراهم نمی‌کند، بنابراین ماینرها داده‌های Coinbase را تغییر می‌دهند تا ریشه مرکل را تغییر داده و فضای جستجوی اضافی ایجاد کنند.
wrong_answers:
  - تغییر تراکنش Coinbase به ماینرها اجازه می‌دهد تا پاداش‌های بلوک بیشتری نسبت به مقدار یارانه استاندارد مطالبه کنند.
  - "تراکنش Coinbase باید برای اهداف اعتبارسنجی بلوک شامل امضای دیجیتال ماینر شود"
  - تغییر داده‌های Coinbase با اجازه دادن به ماینرها برای دور زدن الزامات استاندارد proof-of-work، دشواری محاسباتی را کاهش می‌دهد.
explanation: |
  مدارهای مجتمع خاص منظوره (ASIC) مدرن می‌توانند فضای نانس ۴ بایتی (۲^۳۲ امکان) را به سرعت تمام کنند و نیاز به فضای جستجوی اضافی داشته باشند. با تغییر داده‌ها در تراکنش Coinbase، ماینرها هش تراکنش را تغییر می‌دهند که ریشه مرکل در هدر بلاک را تغییر می‌دهد و به طور مؤثری میلیاردها مقدار نانس‌مانند اضافی برای امتحان ایجاد می‌کند. این تکنیک که به 'extra-nonce' معروف است، برای عملیات mining مدرن که در آن سخت‌افزار به مراتب از ظرفیت میدان نانس اصلی فراتر می‌رود، ضروری است.
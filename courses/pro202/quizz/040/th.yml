question: ทำไมคนขุด ASIC สมัยใหม่ถึงแก้ไขข้อมูลภายในธุรกรรม Coinbase แทนที่จะพึ่งพาเฉพาะฟิลด์ nonce ของบล็อกเฮดเดอร์?
answer: ฟิลด์ nonce ขนาด 4 ไบต์มีพื้นที่การค้นหาไม่เพียงพอสำหรับ ASICs สมัยใหม่ ดังนั้นนักขุดจึงแก้ไขข้อมูล Coinbase เพื่อเปลี่ยนราก Merkle และสร้างพื้นที่การค้นหาเพิ่มเติม
wrong_answers:
  - การแก้ไขธุรกรรม Coinbase ช่วยให้ผู้ขุดสามารถเรียกร้องรางวัลบล็อกที่สูงกว่าจำนวนเงินอุดหนุนมาตรฐานที่อนุญาต
  - "ธุรกรรม Coinbase จะต้องได้รับการแก้ไขเพื่อรวมลายเซ็นดิจิทัลของนักขุดสำหรับวัตถุประสงค์ในการตรวจสอบบล็อก"
  - การเปลี่ยนแปลงข้อมูล Coinbase ช่วยลดความยากลำบากในการคำนวณโดยอนุญาตให้นักขุดข้ามข้อกำหนดมาตรฐาน proof-of-work
explanation: |
  ASIC สมัยใหม่สามารถใช้พื้นที่ nonce ขนาด 4 ไบต์ (ความเป็นไปได้ 2^32) ได้อย่างรวดเร็วมาก ซึ่งต้องการพื้นที่การค้นหาเพิ่มเติม โดยการปรับเปลี่ยนข้อมูลในธุรกรรม Coinbase นักขุดจะเปลี่ยนแฮชของธุรกรรม ซึ่งจะเปลี่ยนราก Merkle ในส่วนหัวของบล็อก ทำให้เกิดค่าคล้าย nonce เพิ่มเติมเป็นพันล้านค่าที่จะลอง เทคนิคนี้เรียกว่า 'extra-nonce' ซึ่งเป็นสิ่งจำเป็นสำหรับการดำเนินงาน mining สมัยใหม่ที่ฮาร์ดแวร์มีความสามารถเกินกว่าขนาดฟิลด์ nonce ดั้งเดิมอย่างมาก
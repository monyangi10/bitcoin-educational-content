question: なぜ最新のASICマイナーは、ブロックヘッダのnonceフィールドだけに頼るのではなく、Coinbaseトランザクション内のデータを修正するのか？
answer: 4バイトのnonceフィールドは最新のASICには不十分な検索スペースであるため、マイナーはCoinbaseのデータを変更してMerkleルートを変更し、追加の検索スペースを作成する。
wrong_answers:
  - Coinbaseのトランザクションを変更することで、マイナーは標準的な補助金額よりも高いブロック報酬を請求することができます。
  - "Coinbaseのトランザクションは、ブロック検証のためにマイナーのデジタル署名を含むように修正されなければならない"
  - Coinbaseのデータを変更することで、マイナーは標準的なproof-of-work要件を回避できるようになり、計算難易度が下がる。
explanation: |
  最新のASICは4バイトのnonce空間（2^32の可能性）を非常に早く使い切ることができ、追加の検索空間を必要とする。Coinbaseのトランザクションのデータを変更することで、マイナーはトランザクションのハッシュを変更し、ブロックヘッダのMerkleルートを変更する。エクストラノンス」と呼ばれるこの技術は、ハードウェアがオリジナルのノンスフィールドの容量をはるかに超える最新のminingオペレーションに不可欠である。
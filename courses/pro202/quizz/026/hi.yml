question: इनपुट की संख्या के संबंध में जीडब्ल्यू-0 लेनदेन सत्यापन की पारंपरिक प्रणाली में समय जटिलता वर्ग के रूप में क्यों प्रदर्शित होती है?
answer: प्रत्येक इनपुट के लिए एक ऐसी संरचना पर अपना स्वयं का sighash कंप्यूटेशन आवश्यक होता है जिसमें लेनदेन के सभी इनपुट शामिल होते हैं।
wrong_answers:
  - लेनदेन के भीतर double-spending को रोकने के लिए प्रत्येक इनपुट को अन्य सभी इनपुट के विरुद्ध हस्ताक्षरों का सत्यापन करना होगा।
  - स्टैक-आधारित निष्पादन मॉडल को प्रत्येक इनपुट संयोजन के लिए ऑपकोड को संसाधित करने के लिए नेस्टेड लूप की आवश्यकता होती है।
  - "प्रत्येक इनपुट के ScriptSig को प्रत्येक आउटपुट के ScriptPubKey के विरुद्ध मान्य किया जाना चाहिए ताकि सही मिलान मिल सके।"
explanation: |
  जीडब्ल्यू-2 की पुरानी सत्यापन प्रणाली में द्विघातीय जटिलता उत्पन्न होती है क्योंकि प्रत्येक इनपुट के लिए अलग से सिघैश गणना की आवश्यकता होती है, लेकिन प्रत्येक गणना में सभी इनपुट युक्त एक लेनदेन संरचना को संसाधित किया जाता है। n इनपुट होने पर, इससे n×n संक्रियाएँ उत्पन्न होती हैं। जीडब्ल्यू-3 ने सिघैश गणना के साझा भागों को कैश करके इस समस्या का समाधान किया, जिससे जटिलता रैखिक समय तक कम हो गई और बड़े बहु-इनपुट लेनदेन से होने वाले संभावित सेवा-अस्वीकरण हमलों को रोका जा सका।
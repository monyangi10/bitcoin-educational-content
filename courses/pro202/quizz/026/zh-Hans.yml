question: 为什么传统的 Bitcoin 交易验证会表现出与输入数量相关的二次时间复杂性？
answer: 每个输入都需要在一个包含所有输入的结构上进行自己的叹息计算
wrong_answers:
  - 每个输入都必须针对所有其他输入验证签名，以防止在交易中出现 double-spending
  - 基于堆栈的执行模式需要嵌套循环来处理每个输入组合的操作码
  - "每个输入的 ScriptSig 必须与每个输出的 ScriptPubKey 进行验证，以找到正确的匹配"
explanation: |
  传统的 Bitcoin 验证会产生二次复杂性，因为每个输入都需要自己的叹息计算，但每次计算都要处理包含所有输入的事务结构。如果有 n 个输入，就会产生 n×n 个操作。SegWit 通过缓存 sighash 计算的共享部分解决了这一问题，将复杂性降低到线性时间，并防止了大型多输入事务可能造成的拒绝服务攻击。
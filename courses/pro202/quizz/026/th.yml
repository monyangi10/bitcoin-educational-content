question: ทำไมการตรวจสอบธุรกรรม Bitcoin แบบเก่าจึงแสดงความซับซ้อนของเวลาเป็นกำลังสองเมื่อเทียบกับจำนวนอินพุต?
answer: การป้อนข้อมูลแต่ละครั้งต้องการการคำนวณ sighash ของตัวเองผ่านโครงสร้างที่รวมการป้อนข้อมูลทั้งหมดในธุรกรรม
wrong_answers:
  - แต่ละอินพุตต้องตรวจสอบลายเซ็นกับอินพุตอื่นทั้งหมดเพื่อป้องกัน double-spending ภายในธุรกรรม
  - โมเดลการดำเนินการแบบสแต็กต้องการลูปซ้อนกันเพื่อประมวลผลรหัสปฏิบัติการสำหรับแต่ละชุดค่าผสมของข้อมูลนำเข้า
  - "ScriptSig ของแต่ละอินพุตต้องได้รับการตรวจสอบกับ ScriptPubKey ของเอาต์พุตทุกตัวเพื่อหาคู่ที่ถูกต้อง"
explanation: |
  การตรวจสอบความถูกต้องของ Legacy Bitcoin สร้างความซับซ้อนในระดับกำลังสองเนื่องจากทุกอินพุตต้องการการคำนวณ sighash ของตัวเอง แต่ละการคำนวณจะประมวลผลโครงสร้างธุรกรรมที่มีอินพุตทั้งหมด ด้วย n อินพุต สิ่งนี้จะสร้างการดำเนินการ n×n SegWit แก้ปัญหานี้โดยการแคชส่วนที่ใช้ร่วมกันของการคำนวณ sighash ลดความซับซ้อนลงเป็นเวลาเชิงเส้นและป้องกันการโจมตีแบบปฏิเสธการให้บริการที่อาจเกิดขึ้นจากธุรกรรมหลายอินพุตขนาดใหญ่
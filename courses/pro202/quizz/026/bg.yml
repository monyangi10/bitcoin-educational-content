question: Защо валидирането на транзакциите в Bitcoin има квадратична времева сложност по отношение на броя на входовете?
answer: Всеки вход изисква собствено изчисление на Sighash върху структура, която включва всички входове в транзакцията
wrong_answers:
  - Всеки вход трябва да проверява подписите спрямо всички други входове, за да се предотврати double-spending в рамките на транзакцията
  - Моделът на изпълнение, базиран на стека, изисква вложени цикли за обработка на операционните кодове за всяка входна комбинация
  - "ScriptSig на всеки вход трябва да се валидира спрямо ScriptPubKey на всеки изход, за да се намери правилното съответствие"
explanation: |
  Наследственото валидиране на Bitcoin създава квадратична сложност, тъй като всеки вход се нуждае от собствено изчисление на Sighash, но всяко изчисление обработва структура на транзакция, съдържаща всички входове. При n входа това създава n×n операции. SegWit решава този проблем чрез кеширане на споделени части от изчислението на sighash, като намалява сложността до линейно време и предотвратява потенциални атаки за отказ на услуга от големи транзакции с много входове.
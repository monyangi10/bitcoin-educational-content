question: なぜレガシーBitcoinのトランザクション検証は、入力数に対して二次関数的な時間複雑性を示すのか？
answer: 各入力は、トランザクション内のすべての入力を含む構造体に対して、それ自身のsighash計算を必要とする。
wrong_answers:
  - 各入力は、トランザクション内のdouble-spendingを防ぐために、他のすべての入力に対する署名を検証しなければならない。
  - スタック・ベースの実行モデルは、各入力の組み合わせのオペコードを処理するために、ネストされたループを必要とする。
  - "各入力のScriptSigは、すべての出力のScriptPubKeyと照合して、正しい一致を見つけなければならない"
explanation: |
  レガシーBitcoinバリデーションは、すべての入力がそれ自身のsighash計算を必要とするが、各計算がすべての入力を含むトランザクション構造を処理するため、2次的な複雑さを生み出す。n個の入力がある場合、これはn×n個の演算となります。SegWitはsighash計算の共有部分をキャッシュすることでこれを解決し、複雑さを線形時間まで減らし、大規模な多入力トランザクションからの潜在的なサービス拒否攻撃を防ぎます。
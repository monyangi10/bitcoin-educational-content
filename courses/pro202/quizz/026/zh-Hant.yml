question: 為什麼傳統 Bitcoin 交易驗證的時間複雜度與輸入數呈二次方關係？
answer: 每個輸入都需要在包含交易中所有輸入的結構上進行自己的 sighash 計算
wrong_answers:
  - 每個輸入都必須針對所有其他輸入驗證簽名以防止交易內的 double-spending
  - 堆疊式執行模型需要巢狀循環來處理每個輸入組合的操作碼
  - 「每個輸入的 ScriptSig 必須與每個輸出的 ScriptPubKey 進行驗證，以找出正確的匹配項目」
explanation: |
  傳統的 Bitcoin 驗證會產生二次複雜性，因為每個輸入都需要自己的 sighash 計算，但每個計算都會處理包含所有輸入的交易結構。如果有 n 個輸入，就會產生 n×n 次運算。SegWit 透過快取 sighash 計算的共用部分解決了這個問題，將複雜度降低為線性時間，並防止大型多輸入交易可能造成的拒絕服務攻擊。
question: چرا اعتبارسنجی تراکنش‌های قدیمی Bitcoin پیچیدگی زمانی درجه دوم نسبت به تعداد ورودی‌ها دارد؟
answer: هر ورودی به محاسبه‌ی sighash خود بر روی ساختاری نیاز دارد که شامل تمام ورودی‌های تراکنش باشد.
wrong_answers:
  - هر ورودی باید امضاها را در برابر تمام ورودی‌های دیگر بررسی کند تا از double-spending درون تراکنش جلوگیری شود.
  - مدل اجرای مبتنی بر پشته نیاز به حلقه‌های تو در تو دارد تا کدهای عملیاتی را برای هر ترکیب ورودی پردازش کند.
  - "هر ScriptSig ورودی باید در برابر هر ScriptPubKey خروجی اعتبارسنجی شود تا تطابق صحیح پیدا شود"
explanation: |
  اعتبارسنجی Legacy Bitcoin پیچیدگی درجه دوم ایجاد می‌کند زیرا هر ورودی به محاسبه sighash خود نیاز دارد، اما هر محاسبه یک ساختار تراکنش حاوی تمام ورودی‌ها را پردازش می‌کند. با n ورودی، این باعث ایجاد عملیات n×n می‌شود. SegWit این مشکل را با ذخیره‌سازی بخش‌های مشترک محاسبه sighash حل کرد، که پیچیدگی را به زمان خطی کاهش داده و از حملات احتمالی انکار سرویس از تراکنش‌های بزرگ چند ورودی جلوگیری می‌کند.
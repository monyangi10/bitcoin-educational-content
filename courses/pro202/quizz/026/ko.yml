question: 레거시 Bitcoin 트랜잭션 검증이 입력 수에 따라 2진법적인 시간 복잡성을 보이는 이유는 무엇인가요?
answer: 각 입력은 트랜잭션의 모든 입력을 포함하는 구조에 대해 자체적인 시게시 계산이 필요합니다
wrong_answers:
  - 각 입력은 다른 모든 입력에 대해 서명을 확인하여 트랜잭션 내에서 double-spending을 방지해야 합니다
  - 스택 기반 실행 모델에서는 각 입력 조합에 대한 연산 코드를 처리하기 위해 중첩 루프가 필요합니다
  - "올바른 일치 항목을 찾으려면 각 입력의 ScriptSig를 모든 출력의 ScriptPubKey와 비교하여 유효성을 검사해야 합니다."
explanation: |
  레거시 Bitcoin 유효성 검사는 모든 입력에 고유한 시게시 계산이 필요하지만 각 계산은 모든 입력이 포함된 트랜잭션 구조를 처리하므로 이차적 복잡성을 야기합니다. 입력이 n개일 경우, 이는 n×n개의 연산을 생성합니다. SegWit는 시해시 계산의 공유 부분을 캐싱하여 복잡성을 선형 시간으로 줄이고 대규모 다중 입력 트랜잭션에서 발생할 수 있는 서비스 거부 공격을 방지함으로써 이 문제를 해결했습니다.
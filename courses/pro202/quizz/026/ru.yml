question: Почему проверка транзакций в Bitcoin имеет квадратичную временную сложность по отношению к количеству входов?
answer: Каждый вход требует своего собственного вычисления sighash над структурой, включающей все входы в транзакции
wrong_answers:
  - Каждый вход должен проверять подписи на всех других входах для предотвращения double-spending внутри транзакции
  - Модель выполнения на основе стека требует вложенных циклов для обработки опкодов для каждой входной комбинации
  - "Каждый входной ScriptSig должен быть проверен на соответствие каждому выходному ScriptPubKey, чтобы найти правильное соответствие"
explanation: |
  Унаследованная проверка Bitcoin создает квадратичную сложность, поскольку для каждого входа требуется свой расчет sighash, но каждый расчет обрабатывает структуру транзакций, содержащую все входы. При n входах это создает n×n операций. В SegWit эта проблема решена путем кэширования общих частей вычислений sighash, что позволило снизить сложность до линейного времени и предотвратить потенциальные атаки типа "отказ в обслуживании", связанные с большими многовходовыми транзакциями.
question: 什麼數學特性可確保橢圓曲線的點可以在加密作業中一致且可預測地相加？
answer: 點組成具有封閉性、關聯性、同一性和反向性的數學群
wrong_answers:
  - 點維持連續平滑曲線，保留幾何關係
  - 點遵循線性遞增模式，形成可預測的順序
  - 點數使用模組運算，可自動防止計算錯誤
explanation: |
  橢圓曲線的點在加法下會形成一個數學群，這表示它們滿足四個基本屬性：封閉性 (加上兩個點就會得到曲線上的另一個點)、關聯性 (運算順序並不重要)、同一性 (無窮遠處的點就像零一樣)，以及反向性 (每個點都有一個可以抵銷它的反射)。這些群組屬性讓橢圓曲線加密技術能可靠地運作，也讓標量乘法等運算能一致地運作，不論我們處理的是平滑的實數曲線或離散的有限場點。
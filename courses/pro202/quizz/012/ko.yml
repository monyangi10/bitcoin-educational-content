question: 암호화 연산에서 타원 곡선 점을 일관되고 예측 가능하게 합산할 수 있는 수학적 속성은 무엇인가요?
answer: 점은 폐쇄성, 연관성, 동일성 및 역을 가진 수학 그룹을 형성합니다
wrong_answers:
  - 포인트는 기하학적 관계를 보존하는 연속적인 부드러운 곡선을 유지합니다
  - 포인트는 예측 가능한 순서를 생성하는 선형 진행 패턴을 따릅니다
  - 포인트는 계산 오류를 자동으로 방지하는 모듈식 산술을 사용합니다
explanation: |
  타원 곡선 점들은 덧셈에서 수학적 그룹을 형성하며, 이는 폐쇄성(두 점을 더하면 곡선에 다른 점이 생깁니다), 연관성(연산 순서는 중요하지 않습니다), 동일성(무한대의 점은 0으로 작용합니다), 역(모든 점은 반사가 있어 상쇄합니다) 등 네 가지 필수 속성을 만족한다는 것을 의미합니다. 이러한 그룹 속성은 타원 곡선 암호화가 안정적으로 작동하고 스칼라 곱셈과 같은 연산이 매끄러운 실수 곡선으로 작업하든 이산 유한 필드 점으로 작업하든 관계없이 일관되게 작동할 수 있게 해줍니다.
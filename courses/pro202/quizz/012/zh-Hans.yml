question: 是什么数学特性确保了椭圆曲线点可以在加密运算中一致且可预测地相加？
answer: 点构成一个数学群，具有封闭性、关联性、同一性和逆变性
wrong_answers:
  - 点保持连续平滑的曲线，维护几何关系
  - 点遵循线性发展模式，形成可预测的序列
  - 积分采用模块化运算，可自动防止计算错误
explanation: |
  椭圆曲线上的点在加法运算下形成一个数学群，这意味着它们满足四个基本属性：封闭性（加两个点就能得到曲线上的另一个点）、关联性（运算顺序并不重要）、同一性（无穷远处的点就像零）和反演性（每个点都有一个反射，可以将其抵消）。正是这些群属性使椭圆曲线加密技术得以可靠运行，并使标量乘法等运算的表现保持一致，无论我们处理的是光滑的实曲线还是离散的有限域点。
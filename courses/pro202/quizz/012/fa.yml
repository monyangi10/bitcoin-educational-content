question: چه ویژگی ریاضی تضمین می‌کند که نقاط منحنی بیضوی می‌توانند به صورت منسجم و قابل پیش‌بینی در عملیات رمزنگاری با هم جمع شوند؟
answer: نقاط یک گروه ریاضی با بستار، شرکت‌پذیری، همانی و معکوس‌ها تشکیل می‌دهند.
wrong_answers:
  - نقاط منحنی‌های صاف پیوسته‌ای را حفظ می‌کنند که روابط هندسی را حفظ می‌کنند
  - نقاط از الگوهای پیشرفت خطی پیروی می‌کنند که دنباله‌های قابل پیش‌بینی ایجاد می‌کنند
  - نقاط از حساب مدولار استفاده می‌کنند که به‌طور خودکار از خطاهای محاسباتی جلوگیری می‌کند
explanation: |
  نقاط منحنی بیضوی یک گروه ریاضی تحت جمع تشکیل می‌دهند، به این معنی که آن‌ها چهار خاصیت اساسی را برآورده می‌کنند: بستار (جمع دو نقطه، نقطه دیگری روی منحنی می‌دهد)، شرکت‌پذیری (ترتیب عملیات مهم نیست)، همانی (نقطه در بی‌نهایت به عنوان صفر عمل می‌کند)، و معکوس‌ها (هر نقطه دارای انعکاسی است که آن را خنثی می‌کند). این خواص گروهی هستند که رمزنگاری منحنی بیضوی را به طور قابل اعتمادی کارآمد می‌سازند و عملیات‌هایی مانند ضرب اسکالر را به طور مداوم رفتار می‌کنند، صرف نظر از اینکه ما با منحنی‌های واقعی صاف یا نقاط میدان محدود گسسته کار می‌کنیم.
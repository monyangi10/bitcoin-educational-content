question: Ni ikihe kintu c’imibare gituma uturongo tw’uruzitiro rw’uruzitiro dushobora kwongerwa hamwe mu buryo budahinduka kandi bushobora kumenyekana mu bikorwa vy’ubuhinga bwo gupfuka?
answer: Ingingo zikora umugwi w'imibare ufise ugufunga, ugufatanya, akaranga, n'ibihinduka
wrong_answers:
  - Uturongo tugumya imirongo ikomeza iryoshe ibungabunga ubucuti bw'ubuhinga
  - Ingingo zikurikira uburyo bwo gutera imbere bushobora gutuma habaho urutonde rushobora gutegekanirwa
  - Amanota akoresha imibare y'ibice ibuza amakosa yo mu biharuro
explanation: |
  Ivyiyumviro vy’umurongo w’uruzitiro bikora umugwi w’imibare munsi y’ukwongerwako, bisobanura ko bihaza ibintu bine vy’ingenzi: gufunga (kwongerako ivyiyumviro bibiri bitanga uwundi murongo ku murongo), ubufatanye (urutonde rw’ibikorwa ntaco bimaze), akaranga (akarongo ku butagira urugero gakora nk’ubusa), n’ibihinduka (akarongo kose gashobora guhinduka). Ivyo bimenyetso vy'imigwi ni vyo bituma ubuhinga bwo gukingira amabara y'uruzitiro bukora neza kandi bikaba bishoboza ibikorwa nk'ugukubita kw'uruzitiro kwigenza mu buryo budahinduka, ataco bimaze nimba turiko turakorana n'imirongo y'uruzitiro nyayo canke n'ibiharuro vy'uruzitiro bitandukanye.
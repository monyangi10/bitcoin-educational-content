question: สมบัติทางคณิตศาสตร์ใดที่ทำให้แน่ใจได้ว่า จุดบนเส้นโค้งวงรีสามารถบวกกันได้อย่างสม่ำเสมอและคาดการณ์ได้ในการดำเนินการเข้ารหัส?
answer: จุดสร้างกลุ่มทางคณิตศาสตร์ที่มีการปิด, การเชื่อมโยง, เอกลักษณ์, และอินเวอร์ส
wrong_answers:
  - จุดรักษาเส้นโค้งเรียบต่อเนื่องที่คงความสัมพันธ์ทางเรขาคณิต
  - จุดต่าง ๆ ตามรูปแบบความก้าวหน้าเชิงเส้นที่สร้างลำดับที่คาดการณ์ได้
  - จุดใช้เลขคณิตแบบโมดูลาร์ที่ป้องกันข้อผิดพลาดในการคำนวณโดยอัตโนมัติ
explanation: |
  จุดบนเส้นโค้งวงรีสร้างกลุ่มทางคณิตศาสตร์ภายใต้การบวก ซึ่งหมายความว่าพวกมันมีคุณสมบัติที่สำคัญสี่ประการ: การปิด (การบวกจุดสองจุดให้จุดอีกจุดหนึ่งบนเส้นโค้ง), การเปลี่ยนหมู่ (ลำดับของการดำเนินการไม่สำคัญ), เอกลักษณ์ (จุดที่อินฟินิตี้ทำหน้าที่เป็นศูนย์), และการมีอินเวอร์ส (ทุกจุดมีการสะท้อนที่ยกเลิกมันออก) คุณสมบัติของกลุ่มเหล่านี้คือสิ่งที่ทำให้การเข้ารหัสเส้นโค้งวงรีทำงานได้อย่างน่าเชื่อถือและทำให้การดำเนินการเช่นการคูณสเกลาร์ทำงานได้อย่างสม่ำเสมอ ไม่ว่าจะเป็นการทำงานกับเส้นโค้งเรียบจริงหรือจุดในฟิลด์จำกัดที่ไม่ต่อเนื่อง
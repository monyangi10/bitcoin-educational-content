question: वह कौन सा गणितीय गुण है जो यह सुनिश्चित करता है कि क्रिप्टोग्राफिक संक्रियाओं में दीर्घवृत्तीय वक्र बिंदुओं को सुसंगत और पूर्वानुमानित रूप से एक साथ जोड़ा जा सकता है?
answer: बिंदु संवरित, साहचर्य, तत्समक और व्युत्क्रम गुणों वाले एक गणितीय समूह का निर्माण करते हैं।
wrong_answers:
  - बिंदु निरंतर चिकने वक्र बनाए रखते हैं जो ज्यामितीय संबंधों को संरक्षित करते हैं।
  - बिंदु रैखिक प्रगति पैटर्न का अनुसरण करते हैं जो पूर्वानुमानित अनुक्रम बनाते हैं।
  - पॉइंट्स मॉड्यूलर अंकगणित का उपयोग करते हैं जो गणना संबंधी त्रुटियों को स्वचालित रूप से रोकता है।
explanation: |
  दीर्घवृत्तीय वक्र के बिंदु योग के अंतर्गत एक गणितीय समूह बनाते हैं, जिसका अर्थ है कि वे चार आवश्यक गुणों को संतुष्ट करते हैं: संवरन (दो बिंदुओं को जोड़ने पर वक्र पर एक और बिंदु प्राप्त होता है), साहचर्यता (संचालनों का क्रम मायने नहीं रखता), तत्समकता (अनंत पर स्थित बिंदु शून्य के समान कार्य करता है), और व्युत्क्रम (प्रत्येक बिंदु का एक परावर्तन होता है जो उसे रद्द कर देता है)। ये समूह गुण ही दीर्घवृत्तीय वक्र क्रिप्टोग्राफी को विश्वसनीय बनाते हैं और अदिश गुणन जैसी संक्रियाओं को सुसंगत रूप से व्यवहार करने में सक्षम बनाते हैं, चाहे हम चिकने वास्तविक वक्रों या असतत परिमित क्षेत्र बिंदुओं के साथ काम कर रहे हों।
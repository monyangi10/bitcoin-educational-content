question: Кое математическо свойство гарантира, че точките на елиптичната крива могат да се събират последователно и предсказуемо при криптографски операции?
answer: Точките образуват математическа група със затвореност, асоциативност, тъждественост и обратни връзки
wrong_answers:
  - Точките поддържат непрекъснати гладки криви, които запазват геометричните отношения
  - Точките следват модели на линейна прогресия, които създават предвидими последователности
  - Точките използват модулна аритметика, която автоматично предотвратява изчислителни грешки
explanation: |
  Точките на елиптичната крива образуват математическа група при събиране, което означава, че те отговарят на четири основни свойства: затвореност (събирането на две точки дава друга точка на кривата), асоциативност (редът на операциите няма значение), идентичност (точката в безкрайността се държи като нула) и инверсия (всяка точка има отражение, което я анулира). Тези групови свойства правят криптографията с елиптични криви надеждна и позволяват операции като скаларно умножение да се държат последователно, независимо дали работим с гладки реални криви или с точки от дискретни крайни полета.
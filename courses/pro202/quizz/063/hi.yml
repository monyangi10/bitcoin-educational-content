question: वह प्राथमिक क्रिप्टोग्राफिक गुण क्या है जो कॉम्पैक्ट ब्लॉक फिल्टर (बीआईपी158) को पूर्ण सटीकता बनाए रखते हुए लाइट क्लाइंट के लिए गोपनीयता प्रदान करने में सक्षम बनाता है?
answer: लेन-देन का मिलान करते समय वे गलत सकारात्मक परिणाम दे सकते हैं, लेकिन कभी भी गलत नकारात्मक परिणाम नहीं देते।
wrong_answers:
  - वे शून्य-ज्ञान प्रमाणों का उपयोग करके यह छिपाते हैं कि नोड्स से किन पतों की जानकारी प्राप्त की जा रही है।
  - वे जासूसी को रोकने के लिए क्लाइंट की सार्वजनिक कुंजी का उपयोग करके सभी फ़िल्टर डेटा को एन्क्रिप्ट करते हैं।
  - वे लेन-देन के हैश के क्रम को यादृच्छिक बनाते हैं ताकि पर्यवेक्षकों से खर्च करने के पैटर्न को छिपाया जा सके।
explanation: |
  कॉम्पैक्ट ब्लॉक फ़िल्टर संभाव्यता आधारित डेटा संरचनाओं का उपयोग करते हैं जो गलत मिलान (गलत सकारात्मक) का संकेत दे सकते हैं, लेकिन वास्तविक मिलान (गलत नकारात्मक) को कभी नहीं चूकते। यह असममित विशेषता महत्वपूर्ण है: गलत सकारात्मक केवल अनावश्यक ब्लॉक डाउनलोड का कारण बनते हैं, जबकि गलत नकारात्मक वॉलेट को भुगतान पूरी तरह से चूकने का कारण बन सकते हैं। गोपनीयता का लाभ इसी अनिश्चितता से मिलता है - पर्यवेक्षक वास्तविक मिलान और गलत सकारात्मक के बीच अंतर नहीं कर सकते, जिससे यह अस्पष्ट हो जाता है कि कौन से लेनदेन वास्तव में क्वेरी करने वाले wallet से संबंधित हैं।
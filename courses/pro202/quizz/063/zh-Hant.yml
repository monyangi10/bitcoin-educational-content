question: 什麼是使緊湊型區塊篩選器 (BIP158) 能夠在保持完美精確度的同時為輕型用戶端提供隱私的主要加密屬性？
answer: 在比對交易時，它們可能會產生錯誤的正值，但不會產生錯誤的負值。
wrong_answers:
  - 他們使用零知識證明來隱藏從節點查詢的位址
  - 「它們使用用戶端的公開密鑰加密所有過濾器資料，以防止竊聽」
  - 他們會隨機排列交易哈希值的順序，讓觀察者看不清支出模式
explanation: |
  精簡區塊篩選器使用概率資料結構，可能會錯誤顯示匹配（假正），但絕不會遺漏實際匹配（假負）。這種非對稱屬性非常重要：假陽性只會導致不必要的區塊下載，而假陰性則會導致錢包完全錯過付款。隱私權的好處來自於這種不確定性 - 觀察者無法區分真正的匹配和假陽性，掩蓋了哪些交易實際上屬於查詢的 wallet。
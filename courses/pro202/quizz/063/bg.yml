question: Кое е основното криптографско свойство, което позволява на компактните блокови филтри (BIP158) да осигуряват поверителност за леки клиенти, като същевременно поддържат перфектна точност?
answer: Те могат да доведат до фалшиви положителни резултати, но никога до фалшиви отрицателни резултати при съпоставяне на трансакции
wrong_answers:
  - Те използват доказателства за нулево познание, за да скрият кои адреси се търсят от възлите
  - "Те криптират всички данни за филтриране, като използват публичния ключ на клиента, за да предотвратят подслушването."
  - Те рандомизират реда на хешовете на трансакциите, за да скрият моделите на харчене от наблюдателите
explanation: |
  Компактните блокови филтри използват вероятностни структури от данни, които могат неправилно да посочат съвпадение (фалшиво положително), но никога няма да пропуснат действително съвпадение (фалшиво отрицателно). Това асиметрично свойство е от решаващо значение: фалшивите положителни резултати водят само до ненужно изтегляне на блокове, докато фалшивите отрицателни резултати биха довели до пълно пропускане на плащания от страна на портфейлите. Ползата за неприкосновеността на личния живот идва от тази несигурност - наблюдателите не могат да правят разлика между истинските съвпадения и фалшивите положителни резултати, като не се знае кои транзакции всъщност принадлежат на запитващия wallet.
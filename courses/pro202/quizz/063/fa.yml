question: ویژگی رمزنگاری اصلی که به فیلترهای بلاک فشرده (BIP158) اجازه می‌دهد تا حریم خصوصی برای کلاینت‌های سبک را فراهم کنند در حالی که دقت کامل را حفظ می‌کنند چیست؟
answer: آن‌ها می‌توانند نتایج مثبت کاذب تولید کنند اما هرگز نتایج منفی کاذب در تطبیق تراکنش‌ها تولید نمی‌کنند.
wrong_answers:
  - آن‌ها از اثبات‌های دانش صفر استفاده می‌کنند تا پنهان کنند کدام آدرس‌ها از نودها پرسیده می‌شوند.
  - "آن‌ها تمام داده‌های فیلتر را با استفاده از کلید عمومی مشتری رمزگذاری می‌کنند تا از استراق سمع جلوگیری کنند"
  - آن‌ها ترتیب هش‌های تراکنش را به صورت تصادفی تغییر می‌دهند تا الگوهای خرج کردن را از دید ناظران پنهان کنند.
explanation: |
  فیلترهای بلوک فشرده از ساختارهای داده احتمالی استفاده می‌کنند که ممکن است به اشتباه یک تطابق را نشان دهند (مثبت کاذب) اما هرگز یک تطابق واقعی را از دست نمی‌دهند (منفی کاذب). این ویژگی نامتقارن بسیار مهم است: مثبت‌های کاذب تنها باعث دانلودهای غیرضروری بلوک می‌شوند، در حالی که منفی‌های کاذب باعث می‌شوند کیف‌پول‌ها به‌طور کامل پرداخت‌ها را از دست بدهند. مزیت حریم خصوصی از این عدم قطعیت ناشی می‌شود - ناظران نمی‌توانند بین تطابق‌های واقعی و مثبت‌های کاذب تمایز قائل شوند، که باعث می‌شود تراکنش‌هایی که واقعاً به wallet پرسشگر تعلق دارند، مبهم بمانند.
question: 紧凑型块滤波器 (BIP158) 能够在保持完美准确性的同时为轻型客户提供隐私保护，其主要加密特性是什么？
answer: 在匹配交易时，它们可能产生假阳性，但绝不会产生假阴性
wrong_answers:
  - 它们使用零知识证明来隐藏节点正在查询的地址
  - "它们使用客户端的公开密钥对所有过滤数据进行加密，以防止窃听"
  - 他们将交易哈希值的顺序随机化，以向观察者掩盖消费模式
explanation: |
  紧凑型区块过滤器使用概率数据结构，可能会错误地显示匹配（假阳性），但绝不会错过实际匹配（假阴性）。这种非对称特性至关重要：假阳性只会导致不必要的区块下载，而假阴性则会导致钱包完全无法支付。隐私优势来自这种不确定性--观察者无法区分真正的匹配和假阳性，从而掩盖了哪些交易真正属于查询的 wallet。
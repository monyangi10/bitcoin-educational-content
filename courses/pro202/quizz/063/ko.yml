question: 컴팩트 블록 필터(BIP158)가 완벽한 정확도를 유지하면서 라이트 클라이언트에게 프라이버시를 제공할 수 있는 주요 암호화 속성은 무엇인가요?
answer: 트랜잭션을 일치시킬 때 오탐을 생성할 수는 있지만 오탐을 생성하지 않습니다
wrong_answers:
  - 영지식 증명을 사용하여 노드에서 어떤 주소가 쿼리되고 있는지 숨깁니다
  - "도청을 방지하기 위해 클라이언트의 공개 키를 사용하여 모든 필터 데이터를 암호화합니다."
  - 거래 해시 순서를 무작위로 지정하여 관찰자의 지출 패턴을 모호하게 만듭니다
explanation: |
  콤팩트 블록 필터는 확률적 데이터 구조를 사용해 일치 항목을 잘못 표시할 수 있지만(오탐), 실제 일치 항목은 놓치지 않습니다(오탐). 오탐은 불필요한 블록 다운로드만 유발하는 반면, 오탐은 지갑에서 결제를 완전히 놓칠 수 있기 때문에 이러한 비대칭적 특성이 매우 중요합니다. 관찰자는 실제 일치와 오탐을 구분할 수 없기 때문에 어떤 트랜잭션이 실제로 쿼리하는 wallet에 속하는지 모호해지므로, 이러한 불확실성에서 프라이버시 이점이 발생합니다.
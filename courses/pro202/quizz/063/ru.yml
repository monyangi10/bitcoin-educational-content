question: Какое основное криптографическое свойство позволяет компактным блок-фильтрам (BIP158) обеспечивать конфиденциальность для легких клиентов, сохраняя при этом идеальную точность?
answer: При сопоставлении транзакций они могут давать ложные положительные результаты, но никогда - ложные отрицательные
wrong_answers:
  - Они используют доказательства с нулевым знанием, чтобы скрыть, какие адреса запрашиваются у узлов
  - "Они шифруют все данные фильтрации с помощью открытого ключа клиента, чтобы предотвратить подслушивание"
  - Они рандомизируют порядок хэшей транзакций, чтобы скрыть от наблюдателей структуру расходов
explanation: |
  Компактные блокчейн-фильтры используют вероятностные структуры данных, которые могут неверно указать на совпадение (ложноположительный результат), но никогда не пропустят фактическое совпадение (ложноотрицательный результат). Это асимметричное свойство имеет решающее значение: ложноположительные результаты приводят лишь к ненужной загрузке блоков, в то время как ложноотрицательные результаты могут привести к тому, что кошельки полностью пропустят платежи. Преимущество конфиденциальности вытекает из этой неопределенности - наблюдатели не могут отличить подлинные совпадения от ложных срабатываний, скрывая, какие транзакции на самом деле принадлежат запрашивающему wallet.
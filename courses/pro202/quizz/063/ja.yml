question: コンパクト・ブロック・フィルター（BIP158）が、完璧な精度を維持しながらライトクライアントのプライバシーを提供することを可能にする主要な暗号特性とは何か？
answer: トランザクションのマッチングにおいて、偽陽性を生じることはあっても、偽陰性を生じることはない。
wrong_answers:
  - ゼロ知識証明を使用して、ノードからどのアドレスが照会されているかを隠す。
  - 「盗聴を防ぐために、クライアントの公開鍵を使ってフィルターデータを暗号化する。
  - 取引ハッシュの順序をランダム化し、オブザーバーから支出パターンを見えなくしている。
explanation: |
  コンパクト・ブロック・フィルターは確率的なデータ構造を使用するため、一致を誤って示す（偽陽性）ことはあっても、実際の一致を見逃す（偽陰性）ことはありません。この非対称的な特性は非常に重要です。偽陽性の場合は不必要なブロックのダウンロードを引き起こすだけですが、偽陰性の場合はウォレットが支払いを完全に見逃してしまうことになります。プライバシーの利点はこの不確実性から生まれる。オブザーバーは本物のマッチと偽陽性とを区別することができず、どの取引が実際にクエリしているwalletに属するかを不明瞭にする。
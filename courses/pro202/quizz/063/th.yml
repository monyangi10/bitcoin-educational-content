question: คุณสมบัติการเข้ารหัสหลักที่ช่วยให้ตัวกรองบล็อกขนาดกะทัดรัด (BIP158) สามารถให้ความเป็นส่วนตัวสำหรับไคลเอนต์แบบเบาในขณะที่ยังคงความแม่นยำที่สมบูรณ์แบบคืออะไร?
answer: พวกเขาสามารถสร้างผลบวกลวงได้แต่ไม่เคยสร้างผลลบลวงเมื่อจับคู่ธุรกรรม
wrong_answers:
  - พวกเขาใช้การพิสูจน์ความรู้เป็นศูนย์เพื่อซ่อนที่อยู่ที่ถูกสอบถามจากโหนด
  - "พวกเขาเข้ารหัสข้อมูลตัวกรองทั้งหมดโดยใช้กุญแจสาธารณะของลูกค้าเพื่อป้องกันการดักฟัง"
  - พวกเขาสุ่มลำดับของแฮชธุรกรรมเพื่อปกปิดรูปแบบการใช้จ่ายจากผู้สังเกตการณ์
explanation: |
  ตัวกรองบล็อกแบบกะทัดรัดใช้โครงสร้างข้อมูลเชิงความน่าจะเป็นที่อาจระบุการจับคู่ผิดพลาด (ผลบวกเท็จ) แต่จะไม่พลาดการจับคู่จริง (ผลลบเท็จ) คุณสมบัติที่ไม่สมมาตรนี้มีความสำคัญ: ผลบวกเท็จเพียงแค่ทำให้เกิดการดาวน์โหลดบล็อกที่ไม่จำเป็น ในขณะที่ผลลบเท็จจะทำให้กระเป๋าเงินพลาดการชำระเงินทั้งหมด ประโยชน์ด้านความเป็นส่วนตัวมาจากความไม่แน่นอนนี้ - ผู้สังเกตการณ์ไม่สามารถแยกแยะระหว่างการจับคู่จริงและผลบวกเท็จ ทำให้ไม่ชัดเจนว่าธุรกรรมใดที่แท้จริงเป็นของ wallet ที่ทำการค้นหา
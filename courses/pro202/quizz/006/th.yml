question: ธาตุเอกลักษณ์ในกลุ่มเส้นโค้งวงรีที่ใช้สำหรับการดำเนินการบวกจุดคืออะไร?
answer: จุดที่อนันต์
wrong_answers:
  - จุดกำเนิด (0,0)
  - จุดกำเนิด G
  - พารามิเตอร์เส้นโค้ง a
explanation: |
  จุดที่อินฟินิตี้ทำหน้าที่เป็นเอกลักษณ์ในกลุ่มของเส้นโค้งวงรี หมายความว่าการบวกจุดใด ๆ P กับจุดที่อินฟินิตี้จะคืนค่า P โดยไม่เปลี่ยนแปลง ซึ่งเปรียบเสมือนการบวกศูนย์ในเลขคณิตทั่วไป จุดกำเนิด (0,0) ไม่จำเป็นต้องอยู่บนเส้นโค้ง จุดกำเนิด G ถูกใช้สำหรับการสร้างกุญแจสาธารณะ และพารามิเตอร์ของเส้นโค้ง a เป็นเพียงสัมประสิทธิ์ในสมการของเส้นโค้ง ไม่ใช่เอกลักษณ์
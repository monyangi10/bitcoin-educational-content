question: عنصر همانی در گروه منحنی بیضوی که برای عملیات جمع نقطه‌ای استفاده می‌شود، نقطه بی‌نهایت یا نقطه در بی‌نهایت نامیده می‌شود.
answer: نقطه در بی‌نهایت
wrong_answers:
  - نقطه مبدأ (۰,۰)
  - نقطه مولد G
  - پارامتر منحنی a
explanation: |
  نقطه در بی‌نهایت به عنوان عنصر همانی در گروه‌های منحنی بیضوی عمل می‌کند، به این معنا که افزودن هر نقطه P به نقطه در بی‌نهایت، P را بدون تغییر بازمی‌گرداند. این مشابه نحوه عملکرد افزودن صفر در حساب معمولی است. مبدأ (0,0) لزوماً روی منحنی نیست، نقطه مولد G برای ایجاد کلیدهای عمومی استفاده می‌شود و پارامتر منحنی a فقط یک ضریب در معادله منحنی است، نه یک عنصر همانی.
question: बिंदु योग संक्रियाओं के लिए उपयोग किए जाने वाले दीर्घवृत्तीय वक्र समूह में तत्समक तत्व क्या है?
answer: अनंत पर स्थित बिंदु
wrong_answers:
  - मूल बिंदु (0,0)
  - जनरेटर बिंदु G
  - वक्र पैरामीटर a
explanation: |
  अनंत पर स्थित बिंदु, दीर्घवृत्तीय वक्र समूहों में तत्समक तत्व के रूप में कार्य करता है, जिसका अर्थ है कि किसी भी बिंदु P को अनंत पर स्थित बिंदु में जोड़ने पर P अपरिवर्तित रहता है। यह उसी प्रकार है जैसे सामान्य अंकगणित में शून्य को जोड़ा जाता है। मूल बिंदु (0,0) का वक्र पर होना आवश्यक नहीं है, जनरेट बिंदु G का उपयोग सार्वजनिक कुंजी बनाने के लिए किया जाता है, और वक्र पैरामीटर a वक्र समीकरण में केवल एक गुणांक है, तत्समक तत्व नहीं।
question: Bitcoin의 P2P 네트워크 메시지 구조에서 모든 메시지 봉투의 4바이트 체크섬 필드를 구성하는 특정 데이터는 무엇인가요?
answer: 메시지 페이로드의 해시256의 첫 4바이트
wrong_answers:
  - 전체 메시지 봉투의 SHA256 해시 중 처음 4바이트입니다
  - 페이로드와 연결된 명령 필드 해시256의 처음 4바이트입니다
  - 메시지 페이로드의 RIPEMD160 해시의 처음 4바이트
explanation: |
  Bitcoin의 P2P 메시지 봉투는 4바이트 체크섬 필드에 메시지 페이로드에만 적용되는 해시256의 처음 4바이트가 포함된 특정 체크섬 메커니즘을 사용합니다. 이는 네트워크 전송 중 페이로드 데이터에 대한 무결성 검증을 제공합니다. 다른 옵션은 Bitcoin가 네트워킹 프로토콜에서 실제로 구현하는 것과 다른 해시 함수(단일 SHA256, RIPEMD160) 또는 다른 입력 데이터(전체 봉투, 명령+페이로드)를 참조하기 때문에 올바르지 않습니다.
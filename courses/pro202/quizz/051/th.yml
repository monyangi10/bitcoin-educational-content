question: ในโครงสร้างข้อความเครือข่ายของ Bitcoin's P2P ข้อมูลเฉพาะใดที่ประกอบเป็นฟิลด์ตรวจสอบ 4 ไบต์ในซองข้อความทุกซอง?
answer: 4 ไบต์แรกของ hash256 ของข้อมูลเพย์โหลดข้อความ
wrong_answers:
  - 4 ไบต์แรกของแฮช SHA256 ของซองจดหมายข้อความทั้งหมด
  - 4 ไบต์แรกของ hash256 ของฟิลด์คำสั่งที่ต่อด้วยเพย์โหลด
  - 4 ไบต์แรกของแฮช RIPEMD160 ของข้อมูลเพย์โหลดข้อความ
explanation: |
  ซองข้อความ P2P ของ Bitcoin ใช้กลไกการตรวจสอบผลรวมแบบเฉพาะที่ฟิลด์ผลรวมขนาด 4 ไบต์ประกอบด้วย 4 ไบต์แรกของ hash256 ที่ใช้กับเฉพาะข้อมูล payload ของข้อความเท่านั้น ซึ่งให้การตรวจสอบความสมบูรณ์ของข้อมูล payload ระหว่างการส่งผ่านเครือข่าย ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะอ้างอิงถึงฟังก์ชันแฮชที่แตกต่างกัน (SHA256 เดี่ยว, RIPEMD160) หรือข้อมูลนำเข้าที่แตกต่างกัน (ซองทั้งหมด, คำสั่ง+payload) จากที่ Bitcoin ใช้จริงในโปรโตคอลเครือข่ายของมัน
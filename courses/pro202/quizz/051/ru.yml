question: В структуре сетевых сообщений Bitcoin для P2P какие конкретные данные составляют 4-байтовое поле контрольной суммы в каждом конверте сообщения?
answer: Первые 4 байта хэша256 полезной нагрузки сообщения
wrong_answers:
  - Первые 4 байта хэша SHA256 всего конверта сообщения
  - Первые 4 байта хэша256 командного поля, скомбинированные с полезной нагрузкой
  - Первые 4 байта хэша RIPEMD160 полезной нагрузки сообщения
explanation: |
  Конверт сообщения Bitcoin для P2P использует специальный механизм контрольной суммы, в котором 4-байтовое поле контрольной суммы содержит первые 4 байта хэша256, примененного только к полезной нагрузке сообщения. Это обеспечивает проверку целостности данных полезной нагрузки во время передачи по сети. Остальные варианты неверны, поскольку они ссылаются на другие хэш-функции (одиночный SHA256, RIPEMD160) или другие входные данные (весь конверт, команда+платежная нагрузка), чем те, которые Bitcoin действительно реализует в своем сетевом протоколе.
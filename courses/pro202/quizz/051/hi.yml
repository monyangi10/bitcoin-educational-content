question: Bitcoin के P2P नेटवर्क संदेश संरचना में, प्रत्येक संदेश लिफाफे में 4-बाइट चेकसम फ़ील्ड में कौन सा विशिष्ट डेटा शामिल होता है?
answer: संदेश पेलोड के hash256 के पहले 4 बाइट्स
wrong_answers:
  - संपूर्ण संदेश लिफाफे के SHA256 हैश के पहले 4 बाइट्स
  - कमांड फ़ील्ड के hash256 के पहले 4 बाइट्स को पेलोड के साथ जोड़ा गया
  - संदेश पेलोड के RIPEMD160 हैश के पहले 4 बाइट्स
explanation: |
  Bitcoin के P2P संदेश लिफाफे में एक विशिष्ट चेकसम तंत्र का उपयोग किया जाता है, जिसमें 4-बाइट चेकसम फ़ील्ड में संदेश पेलोड पर लागू hash256 के पहले 4 बाइट्स शामिल होते हैं। यह नेटवर्क ट्रांसमिशन के दौरान पेलोड डेटा की अखंडता का सत्यापन करता है। अन्य विकल्प गलत हैं क्योंकि वे Bitcoin द्वारा अपने नेटवर्किंग प्रोटोकॉल में वास्तव में लागू किए गए हैश फ़ंक्शन (एकल SHA256, RIPEMD160) या इनपुट डेटा (संपूर्ण लिफाफा, कमांड + पेलोड) से भिन्न हैं।
question: Кои конкретни данни в структурата на мрежовото съобщение Bitcoin на P2P съставляват 4-байтовото поле за контролна сума във всеки плик на съобщението?
answer: Първите 4 байта от хеш256 на полезния товар на съобщението
wrong_answers:
  - Първите 4 байта от хеша SHA256 на целия плик на съобщението
  - Първите 4 байта от хеш256 на командното поле, конкатенирани с полезния товар
  - Първите 4 байта от хеша RIPEMD160 на полезния товар на съобщението
explanation: |
  Пликът на съобщението P2P на Bitcoin използва специфичен механизъм за контролна сума, при който 4-байтовото поле за контролна сума съдържа първите 4 байта от хеш256, приложен само към полезния товар на съобщението. Това осигурява проверка на целостта на данните за полезния товар по време на мрежовото предаване. Другите варианти са некоректни, тъй като се позовават на различни хеш функции (единична SHA256, RIPEMD160) или на различни входни данни (цял плик, команда+платежен товар) от това, което Bitcoin действително прилага в мрежовия си протокол.
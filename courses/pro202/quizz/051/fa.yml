question: در ساختار پیام شبکه Bitcoin در P2P، چه داده خاصی میدان ۴ بایتی چکسام را در هر پاکت پیام تشکیل می‌دهد؟
answer: اولین ۴ بایت از hash256 بار پیام
wrong_answers:
  - 4 بایت اول هش SHA256 پاکت پیام کامل
  - 4 بایت اول hash256 از فیلد فرمان که با payload الحاق شده است
  - اولین ۴ بایت از هش RIPEMD160 بار پیام
explanation: |
  پاکت پیام P2P در Bitcoin از یک مکانیزم چکسام خاص استفاده می‌کند که در آن فیلد چکسام ۴ بایتی شامل ۴ بایت اول hash256 اعمال شده بر روی تنها محتوای پیام است. این کار صحت‌سنجی یکپارچگی داده‌های محموله را در طول انتقال شبکه فراهم می‌کند. گزینه‌های دیگر نادرست هستند زیرا به توابع هش متفاوت (SHA256 تکی، RIPEMD160) یا داده‌های ورودی متفاوت (کل پاکت، فرمان+محموله) اشاره می‌کنند که با آنچه Bitcoin در پروتکل شبکه خود پیاده‌سازی می‌کند، متفاوت است.
question: BitcoinのP2Pネットワーク・メッセージ構造において、各メッセージ・エンベロープの4バイトのチェックサム・フィールドを構成する具体的なデータは何か？
answer: メッセージペイロードのhash256の最初の4バイト
wrong_answers:
  - メッセージエンベロープ全体のSHA256ハッシュの最初の4バイト
  - コマンドフィールドのハッシュ256の最初の4バイトとペイロードを連結したもの。
  - メッセージペイロードのRIPEMD160ハッシュの最初の4バイト
explanation: |
  BitcoinのP2Pメッセージ・エンベロープは、4バイトのチェックサム・フィールドがメッセージ・ペイロードのみに適用されるhash256の最初の4バイトを含む特定のチェックサム・メカニズムを使用する。これはネットワーク伝送中のペイロードデータの完全性検証を提供する。他の選択肢は、Bitcoinがネットワークプロトコルで実際に実装しているものとは異なるハッシュ関数（単一のSHA256、RIPEMD160）や異なる入力データ（エンベロープ全体、コマンド+ペイロード）を参照しているため、正しくない。
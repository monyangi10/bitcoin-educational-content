question: 在 Bitcoin 的 P2P 网络报文结构中，每个报文封套中的 4 字节校验和字段由哪些特定数据构成？
answer: 报文有效载荷哈希值 256 的前 4 个字节
wrong_answers:
  - 整个邮件封套的 SHA256 哈希值的前 4 个字节
  - 命令字段哈希值 256 的前 4 个字节与有效载荷的串联值
  - 报文有效载荷 RIPEMD160 哈希值的前 4 个字节
explanation: |
  Bitcoin 的 P2P 报文封套使用特定的校验和机制，4 字节校验和字段只包含应用于报文有效载荷的哈希 256 的前 4 个字节。这样就能在网络传输过程中对有效载荷数据进行完整性验证。其他选项是不正确的，因为它们引用的哈希函数（单一 SHA256、RIPEMD160）或输入数据（整个信封、命令+有效载荷）与 Bitcoin 在其网络协议中实际实现的不同。
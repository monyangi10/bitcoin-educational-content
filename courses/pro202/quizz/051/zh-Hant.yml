question: 在 Bitcoin 的 P2P 網路訊息結構中，每個訊息封套中的 4 位元組校驗和欄位由哪些特定資料構成？
answer: 訊息有效負載的哈希值 256 的前 4 個位元組
wrong_answers:
  - 整個訊息封套的 SHA256 切細值的前 4 個位元組
  - 命令欄位的前 4 個字節雜湊 256 與有效負載串接在一起
  - 訊息有效負載的 RIPEMD160 切細值的前 4 位元組
explanation: |
  Bitcoin 的 P2P 訊息封套使用特定的檢查和機制，其中 4 位元組的檢查和欄位只包含應用於訊息有效負載的 hash256 的前 4 位元組。這可在網路傳輸期間提供有效負載資料的完整性驗證。其他選項是不正確的，因為它們所參考的哈希函數（單一 SHA256、RIPEMD160）或輸入資料（整個封套、指令+有效負載）與 Bitcoin 在其網路通訊協定中實際實作的不同。
question: Какой особый элемент должен быть включен в P2SH ScriptSig, который отличает его от обычных входов транзакций?
answer: Полный скрипт выкупа вместе с данными для разблокировки
wrong_answers:
  - HASH160 скрипта погашения и открытых ключей
  - Только подписи и открытые ключи, необходимые для выполнения условий
  - Байт версии и кодировка адреса для проверки P2SH
explanation: |
  Для входа в P2SH требуются как данные для разблокировки (подписи и т.д.), так и полный сценарий погашения в ScriptSig. Это уникально, потому что сценарий погашения ранее был скрыт за хэшем и теперь должен быть раскрыт для проверки. На первом этапе проверки проверяется, что HASH160(redeem_script) совпадает с хэшем в scriptPubKey, затем выполняется сценарий погашения с предоставленными данными для разблокировки. Другие варианты неверны: хэш уже находится в оригинальном scriptPubKey, одних подписей без скрипта недостаточно, а байты версии используются для кодирования адреса, а не для проверки расходов.
question: P2SH ScriptSigには、通常のトランザクション入力と区別するために、どのような特定の要素を含める必要がありますか？
answer: 完全な償還スクリプトとロック解除データ
wrong_answers:
  - redeemスクリプトのHASH160と公開鍵
  - 条件を満たすために必要な署名と公開鍵のみ
  - P2SH検証のためのバージョンバイトとアドレスエンコーディング
explanation: |
  P2SHの入力には、ロック解除データ（署名など）とScriptSigの完全な償還スクリプトの両方が必要です。これは、兌換スクリプトが以前はハッシュの後ろに隠されており、現在では検証のために公開しなければならないためです。最初の検証ステップでは、HASH160(redeem_script)がscriptPubKeyのハッシュと一致するかどうかをチェックし、その後、提供されたアンロックデータでredeemスクリプトを実行します。ハッシュはすでに元のscriptPubKeyに含まれており、スクリプトがなければ署名だけでは不十分であり、バージョンバイトはアドレスのエンコードに使用され、支出の検証には使用されません。
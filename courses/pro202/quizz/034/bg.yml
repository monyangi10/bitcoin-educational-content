question: Кой конкретен елемент трябва да бъде включен в P2SH ScriptSig, който го отличава от обикновените входни данни за транзакции?
answer: Пълният скрипт за изкупуване заедно с данните за отключване
wrong_answers:
  - HASH160 на скрипта за изкупуване и публичните ключове
  - Само подписите и публичните ключове, необходими за изпълнение на условията
  - Байтът на версията и кодирането на адреса за валидиране на P2SH
explanation: |
  Входовете на P2SH изискват както данните за отключване (подписи и т.н.), така и пълния скрипт за откупуване в ScriptSig. Това е уникално, тъй като преди това скриптът за изкупуване е бил скрит зад хеш и сега трябва да бъде разкрит за валидиране. При първата стъпка на валидиране се проверява дали HASH160(redeem_script) съвпада с хеша в scriptPubKey, след което се изпълнява скриптът за изкупуване с предоставените данни за отключване. Другите варианти са некоректни: хешът вече е в оригиналния scriptPubKey, подписите сами по себе си не са достатъчни без скрипта, а байтовете на версията се използват за кодиране на адреса, а не за валидиране на разходите.
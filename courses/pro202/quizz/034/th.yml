question: องค์ประกอบเฉพาะที่ต้องรวมอยู่ใน P2SH ScriptSig ซึ่งทำให้แตกต่างจากอินพุตธุรกรรมปกติคืออะไร?
answer: สคริปต์การไถ่ถอนที่สมบูรณ์พร้อมกับข้อมูลการปลดล็อก
wrong_answers:
  - HASH160 ของสคริปต์การไถ่ถอนและคีย์สาธารณะ
  - เฉพาะลายเซ็นและกุญแจสาธารณะที่จำเป็นในการตอบสนองเงื่อนไข
  - ไบต์เวอร์ชันและการเข้ารหัสที่อยู่สำหรับการตรวจสอบ P2SH
explanation: |
  อินพุต P2SH ต้องการทั้งข้อมูลปลดล็อก (ลายเซ็น ฯลฯ) และสคริปต์แลกเต็มรูปแบบใน ScriptSig ซึ่งเป็นเอกลักษณ์เพราะสคริปต์แลกถูกซ่อนอยู่หลังแฮชและต้องเปิดเผยเพื่อการตรวจสอบ ขั้นตอนการตรวจสอบแรกคือการตรวจสอบว่า HASH160(redeem_script) ตรงกับแฮชใน scriptPubKey หรือไม่ จากนั้นสคริปต์แลกจะถูกดำเนินการด้วยข้อมูลปลดล็อกที่ให้มา ตัวเลือกอื่นๆ ไม่ถูกต้อง: แฮชอยู่ใน scriptPubKey ดั้งเดิมแล้ว ลายเซ็นเพียงอย่างเดียวไม่เพียงพอหากไม่มีสคริปต์ และไบต์เวอร์ชันใช้สำหรับการเข้ารหัสที่อยู่ ไม่ใช่การตรวจสอบการใช้จ่าย
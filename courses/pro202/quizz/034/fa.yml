question: چه عنصر خاصی باید در یک P2SH ScriptSig گنجانده شود که آن را از ورودی‌های تراکنش معمولی متمایز کند؟
answer: اسکریپت کامل بازخرید به همراه داده‌های بازگشایی
wrong_answers:
  - هش160 اسکریپت بازخرید و کلیدهای عمومی
  - فقط امضاها و کلیدهای عمومی مورد نیاز برای برآورده کردن شرایط
  - بایت نسخه و رمزگذاری آدرس برای اعتبارسنجی P2SH
explanation: |
  ورودی‌های P2SH نیاز به داده‌های بازگشایی (امضاها و غیره) و همچنین اسکریپت کامل بازخرید در ScriptSig دارند. این منحصر به فرد است زیرا اسکریپت بازخرید قبلاً پشت یک هش پنهان شده بود و اکنون باید برای اعتبارسنجی آشکار شود. اولین مرحله اعتبارسنجی بررسی می‌کند که HASH160(redeem_script) با هش موجود در scriptPubKey مطابقت دارد، سپس اسکریپت بازخرید با داده‌های بازگشایی ارائه شده اجرا می‌شود. گزینه‌های دیگر نادرست هستند: هش قبلاً در scriptPubKey اصلی وجود دارد، امضاها به تنهایی بدون اسکریپت کافی نیستند، و بایت‌های نسخه برای رمزگذاری آدرس استفاده می‌شوند، نه اعتبارسنجی هزینه.
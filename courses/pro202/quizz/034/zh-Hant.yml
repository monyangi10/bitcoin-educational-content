question: P2SH ScriptSig 必須包含哪些特定元素，才能與一般交易輸入區別？
answer: 完整的贖回指令碼本身以及解鎖資料
wrong_answers:
  - 贖回指令碼的 HASH160 和公開金鑰
  - 只有滿足條件所需的簽章和公開金鑰
  - 用於 P2SH 驗證的版本位元組和位址編碼
explanation: |
  P2SH 輸入需要解鎖資料（簽名等）和 ScriptSig 中完整的贖回指令碼。這是獨一無二的，因為兌換腳本之前隱藏在雜湊值之後，現在必須顯示出來以進行驗證。第一個驗證步驟會檢查 HASH160(redeem_script) 是否與 scriptPubKey 中的雜湊值相符，然後就會使用所提供的解鎖資料執行贖回指令碼。其他選項都是不正確的：原始 scriptPubKey 中已經有雜湊值，沒有腳本光靠簽名是不夠的，而且版本位元組是用於位址編碼，而不是用於支出驗證。
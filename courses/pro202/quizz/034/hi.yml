question: P2SH ScriptSig में कौन सा विशिष्ट तत्व शामिल होना चाहिए जो इसे सामान्य लेनदेन इनपुट से अलग करता है?
answer: अनलॉकिंग डेटा सहित संपूर्ण रिडीम स्क्रिप्ट
wrong_answers:
  - रिडीम स्क्रिप्ट का HASH160 और सार्वजनिक कुंजी
  - केवल शर्तों को पूरा करने के लिए आवश्यक हस्ताक्षर और सार्वजनिक कुंजी ही पर्याप्त हैं।
  - P2SH सत्यापन के लिए संस्करण बाइट और पता एन्कोडिंग
explanation: |
  P2SH इनपुट के लिए अनलॉकिंग डेटा (हस्ताक्षर, आदि) और संपूर्ण रिडीम स्क्रिप्ट, दोनों की आवश्यकता होती है, जो ScriptSig में मौजूद हों। यह अनोखा है क्योंकि रिडीम स्क्रिप्ट पहले एक हैश के पीछे छिपी हुई थी और अब सत्यापन के लिए इसे प्रकट करना आवश्यक है। सत्यापन के पहले चरण में यह जांचा जाता है कि HASH160(redeem_script) स्क्रिप्टPubKey में मौजूद हैश से मेल खाता है या नहीं, फिर प्रदान किए गए अनलॉकिंग डेटा के साथ रिडीम स्क्रिप्ट को निष्पादित किया जाता है। अन्य विकल्प गलत हैं: हैश पहले से ही मूल स्क्रिप्टPubKey में मौजूद है, स्क्रिप्ट के बिना केवल हस्ताक्षर पर्याप्त नहीं हैं, और संस्करण बाइट्स का उपयोग पता एन्कोडिंग के लिए किया जाता है, न कि खर्च सत्यापन के लिए।
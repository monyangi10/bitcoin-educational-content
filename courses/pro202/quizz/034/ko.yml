question: 일반 트랜잭션 입력과 구별하기 위해 P2SH 스크립트시그에는 어떤 특정 요소가 포함되어야 하나요?
answer: 잠금 해제 데이터와 함께 전체 교환 스크립트 자체
wrong_answers:
  - 교환 스크립트의 해시160 및 공개 키
  - 조건을 충족하는 데 필요한 서명과 공개 키만 필요합니다
  - P2SH 유효성 검사를 위한 버전 바이트 및 주소 인코딩
explanation: |
  P2SH 입력에는 잠금 해제 데이터(서명 등)와 스크립트시그의 전체 교환 스크립트가 모두 필요합니다. 이는 이전에는 해시 뒤에 숨겨져 있던 리딤 스크립트가 이제 유효성 검사를 위해 공개되어야 하기 때문에 독특합니다. 첫 번째 유효성 검사 단계에서는 HASH160(redeem_script)가 scriptPubKey의 해시와 일치하는지 확인한 다음 제공된 잠금 해제 데이터로 리딤 스크립트가 실행됩니다. 다른 옵션은 잘못된 옵션입니다. 해시가 이미 원본 scriptPubKey에 있고, 스크립트 없이 서명만으로는 충분하지 않으며, 유효성 검사가 아닌 주소 인코딩에 버전 바이트가 사용됩니다.
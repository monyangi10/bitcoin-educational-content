question: P2SH ScriptSig 必须包含哪些特定元素才能与普通交易输入相区别？
answer: 完整的赎回脚本本身以及解锁数据
wrong_answers:
  - 赎回脚本的 HASH160 和公钥
  - 只有满足条件所需的签名和公开密钥
  - 用于 P2SH 验证的版本字节和地址编码
explanation: |
  P2SH 输入需要解锁数据（签名等）和 ScriptSig 中的完整兑换脚本。这是独一无二的，因为赎回脚本以前隐藏在哈希值后面，现在必须显示出来进行验证。第一个验证步骤是检查 HASH160(redeem_script)是否与 scriptPubKey 中的哈希值匹配，然后使用提供的解锁数据执行赎回脚本。其他选项都是错误的：原始 scriptPubKey 中已经包含哈希值；没有脚本，仅有签名是不够的；版本字节用于地址编码，而不是支出验证。
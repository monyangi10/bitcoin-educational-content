question: Какъв тип математическа структура образуват точките на елиптичната крива при операцията събиране?
answer: Математическа група със затвореност, асоциативност, тъждественост и инверсии
wrong_answers:
  - Крайно поле с дефинирани операции за умножение и деление
  - Векторно пространство със скаларно умножение и линейни комбинации
  - Пръстенова структура с операции за събиране и умножение
explanation: |
  Точките на елиптичната крива образуват математическа група при събиране, което означава, че те отговарят на четири основни свойства: затвореност (събирането на две точки дава друга точка на кривата), асоциативност (редът на операциите няма значение), идентичност (точката в безкрайността се явява нула) и инверсия (всяка точка има отражение по оста x, което я анулира). Тази групова структура е от основно значение за криптографията с елиптични криви, тъй като гарантира, че операции като скаларно умножение (многократно прибавяне на точка към себе си) са добре дефинирани и предвидими, което позволява създаването на сигурни криптографски протоколи като тези, използвани в Bitcoin.
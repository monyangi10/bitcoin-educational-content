question: 덧셈 연산에서 타원 곡선 점은 어떤 유형의 수학적 구조를 형성하나요?
answer: 폐쇄성, 연관성, 동일성 및 역을 가진 수학 그룹
wrong_answers:
  - 곱셈 및 나눗셈 연산이 정의된 유한 필드
  - 스칼라 곱셈과 선형 조합이 있는 벡터 공간
  - 덧셈과 곱셈 연산이 모두 가능한 링 구조
explanation: |
  타원 곡선 점은 덧셈에서 수학적 그룹을 형성하는데, 이는 폐쇄성(두 점을 더하면 곡선에 다른 점이 생깁니다), 연관성(연산 순서는 중요하지 않습니다), 동일성(무한대의 점은 0으로 작용합니다), 역(모든 점은 x축에 반사가 있어 이를 상쇄합니다) 등 네 가지 필수 특성을 만족한다는 의미입니다. 이 그룹 구조는 스칼라 곱셈(한 점을 반복적으로 추가하는 것)과 같은 연산을 잘 정의하고 예측할 수 있게 해주므로 타원 곡선 암호화의 기본이 되며, Bitcoin에서 사용되는 것과 같은 안전한 암호화 프로토콜을 가능하게 해줍니다.
question: 楕円曲線の点は加算操作の下でどのような数学的構造を形成するか？
answer: 閉鎖性、連想性、同一性、逆数を持つ数学的群
wrong_answers:
  - 乗除算が定義された有限体
  - スカラー倍と線形結合を持つベクトル空間
  - 加算と乗算の両方の演算を持つリング構造
explanation: |
  つまり、閉包性（2つの点を足すと曲線上に別の点ができる）、連想性（演算の順序は関係ない）、同一性（無限遠の点はゼロとして機能する）、反転性（すべての点はx軸を横切る反射を持ち、それが相殺される）という4つの本質的な性質を満たすのだ。この群構造は楕円曲線暗号にとって基本的なもので、スカラー倍算（ある点をそれ自身に繰り返し加える）のような演算が明確に定義され予測可能であることを保証し、Bitcoinで使われているような安全な暗号プロトコルを可能にするからである。
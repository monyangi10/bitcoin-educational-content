question: 在加法運算下，橢圓曲線的點會形成什麼類型的數學結構？
answer: 具有封閉性、聯結性、同一性和反向性的數學群
wrong_answers:
  - 定義了乘除運算的有限區域
  - 具有標量乘法和線性組合的向量空間
  - 同時具有加法和乘法運算的環狀結構
explanation: |
  橢圓曲線的點在加法下形成一個數學群，這表示它們滿足四個基本屬性：封閉性 (加上兩個點就會得到曲線上的另一個點)、關聯性 (運算順序並不重要)、同一性 (無窮遠處的點就像零一樣)，以及反向性 (每個點都有一個橫跨 x 軸的反射來抵消它)。這個群組結構是橢圓曲線密碼學的基礎，因為它確保了像標量乘法 (將一個點重複加到自己身上) 之類的操作是定義清楚且可預測的，從而實現了像 Bitcoin 所使用的安全密碼協定。
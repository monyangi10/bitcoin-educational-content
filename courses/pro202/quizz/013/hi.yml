question: जोड़ की प्रक्रिया के तहत दीर्घवृत्तीय वक्र के बिंदु किस प्रकार की गणितीय संरचना बनाते हैं?
answer: संवरित, साहचर्य, तत्समक और व्युत्क्रम युक्त एक गणितीय समूह
wrong_answers:
  - गुणन और विभाजन संक्रियाओं के साथ परिभाषित एक परिमित क्षेत्र
  - अदिश गुणन और रैखिक संयोजनों वाला एक सदिश स्थान
  - एक वलय संरचना जिसमें जोड़ और गुणा दोनों संक्रियाएँ होती हैं
explanation: |
  दीर्घवृत्तीय वक्र के बिंदु योग के अंतर्गत एक गणितीय समूह बनाते हैं, जिसका अर्थ है कि वे चार आवश्यक गुणों को संतुष्ट करते हैं: संवरन (दो बिंदुओं को जोड़ने पर वक्र पर एक और बिंदु प्राप्त होता है), साहचर्यता (संचालनों का क्रम मायने नहीं रखता), तत्समकता (अनंत पर स्थित बिंदु शून्य के समान कार्य करता है), और व्युत्क्रम (प्रत्येक बिंदु का x-अक्ष के पार एक परावर्तन होता है जो उसे रद्द कर देता है)। यह समूह संरचना दीर्घवृत्तीय वक्र क्रिप्टोग्राफी के लिए मौलिक है क्योंकि यह सुनिश्चित करती है कि अदिश गुणन (किसी बिंदु को बार-बार स्वयं से जोड़ना) जैसी संक्रियाएँ सुस्पष्ट और पूर्वानुमानित हों, जिससे Bitcoin में उपयोग किए जाने वाले सुरक्षित क्रिप्टोग्राफिक प्रोटोकॉल सक्षम हो पाते हैं।
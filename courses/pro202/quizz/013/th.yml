question: จุดบนเส้นโค้งวงรีภายใต้การดำเนินการบวกจะสร้างโครงสร้างทางคณิตศาสตร์ประเภทใด?
answer: กลุ่มทางคณิตศาสตร์ที่มีการปิด, การเชื่อมโยง, เอกลักษณ์, และอินเวอร์ส
wrong_answers:
  - ฟิลด์จำกัดที่มีการดำเนินการคูณและหารที่กำหนด
  - ปริภูมิเวกเตอร์ที่มีการคูณสเกลาร์และการรวมเชิงเส้น
  - โครงสร้างวงแหวนที่มีทั้งการบวกและการคูณ
explanation: |
  จุดบนเส้นโค้งวงรีสร้างกลุ่มทางคณิตศาสตร์ภายใต้การบวก ซึ่งหมายความว่าพวกมันมีคุณสมบัติที่สำคัญสี่ประการ: การปิด (การบวกสองจุดให้จุดอื่นบนเส้นโค้ง), การเชื่อมโยง (ลำดับของการดำเนินการไม่สำคัญ), เอกลักษณ์ (จุดที่อินฟินิตี้ทำหน้าที่เป็นศูนย์), และการผกผัน (ทุกจุดมีการสะท้อนผ่านแกน x ที่ยกเลิกมันออก) โครงสร้างกลุ่มนี้เป็นพื้นฐานของการเข้ารหัสเส้นโค้งวงรีเพราะมันทำให้มั่นใจว่าการดำเนินการเช่นการคูณสเกลาร์ (การบวกจุดกับตัวมันเองซ้ำๆ) ถูกกำหนดไว้อย่างดีและคาดการณ์ได้ ช่วยให้โปรโตคอลการเข้ารหัสที่ปลอดภัยเช่นที่ใช้ใน Bitcoin
question: نقاط منحنی بیضوی تحت عمل جمع چه نوع ساختار ریاضی را تشکیل می‌دهند؟
answer: یک گروه ریاضی با بستار، شرکت‌پذیری، همانی و معکوس‌ها
wrong_answers:
  - یک میدان متناهی با عملیات ضرب و تقسیم تعریف شده است
  - یک فضای برداری با ضرب اسکالر و ترکیب‌های خطی
  - یک ساختار حلقه‌ای با هر دو عمل جمع و ضرب
explanation: |
  نقاط منحنی بیضوی یک گروه ریاضی تحت جمع تشکیل می‌دهند، به این معنی که آن‌ها چهار ویژگی اساسی را برآورده می‌کنند: بستار (جمع دو نقطه، نقطه دیگری روی منحنی می‌دهد)، شرکت‌پذیری (ترتیب عملیات مهم نیست)، همانی (نقطه در بی‌نهایت به عنوان صفر عمل می‌کند)، و معکوس‌ها (هر نقطه دارای انعکاسی در محور x است که آن را خنثی می‌کند). این ساختار گروهی برای رمزنگاری منحنی بیضوی اساسی است زیرا تضمین می‌کند که عملیات‌هایی مانند ضرب اسکالر (جمع یک نقطه با خودش به طور مکرر) به خوبی تعریف شده و قابل پیش‌بینی هستند، که امکان پروتکل‌های رمزنگاری امن مانند آن‌هایی که در Bitcoin استفاده می‌شوند را فراهم می‌کند.
question: Ni ubuhe bwoko bw’imiterere y’imibare uturongo tw’umurongo w’uruzitiro dukora mu gihe c’igikorwa co kwongerako?
answer: Itsinda ry'imibare rifise ugufunga, ubufatanye, akaranga, n'ibihinduka
wrong_answers:
  - Umurima ufise iherezo ufise ibikorwa vyo gukubita no kugabanya vyasobanuwe
  - Umwanya w'umurongo ufise ugukubita kw'imirongo n'uguhuza kw'imirongo
  - Ubuhinga bw'impeta bufise ibikorwa vyo kwongerako n'ugukubita
explanation: |
  Ivyiyumviro vy’umurongo w’uruzitiro bikora umugwi w’imibare biri munsi y’ukwongerwako, bisobanura ko bihaza ibintu bine vy’ingenzi: ugufunga (kwongerako ivyiyumviro bibiri bitanga uwundi murongo ku murongo), ubufatanye (urutonde rw’ibikorwa ntaco rumaze), akaranga (akarongo kari ku butagira urugero gakora nk’ubusa), n’ibihinduka (akarongo kose acro across it ref-). Iyi miterere y'imigwi ni ngirakamaro ku buhinga bwo gukingira amakuru kuko ituma ibikorwa nk'ugukubita kw'ibiharuro (kwongerako akarongo kuri vyo nyene bisubiramwo) bisobanurwa neza kandi bishobora gutegekanirwa, bikaba bishoboka ko habaho amasezerano y'ubuhinga bwo gukingira amakuru nk'ayo akoreshwa muri Bitcoin.
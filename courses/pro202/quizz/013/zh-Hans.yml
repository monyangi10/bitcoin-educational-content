question: 在加法运算下，椭圆曲线点会形成哪种数学结构？
answer: 具有封闭性、关联性、同一性和逆变性的数学群
wrong_answers:
  - 定义了乘除运算的有限域
  - 具有标量乘法和线性组合的向量空间
  - 具有加法和乘法运算功能的环形结构
explanation: |
  椭圆曲线上的点在加法运算下形成一个数学群，这意味着它们满足四个基本属性：封闭性（将两个点相加就能得到曲线上的另一个点）、关联性（运算顺序并不重要）、同一性（无穷远处的点就像零）和反向性（每个点都有一个横跨 x 轴的反射，将其抵消）。这种群结构是椭圆曲线加密的基础，因为它能确保标量乘法（将一个点重复加到自身）等运算定义明确且可预测，从而实现像 Bitcoin 中使用的安全加密协议。
question: 在 Bitcoin 交易中，輸入金額和輸出金額之間的差額會如何處理？
answer: 差額自動成為支付給礦工的交易費用
wrong_answers:
  - 「差額作為變更退回發件人的原始地址」
  - 差異會被燒毀，並永久地從血液循環中移除
  - 差額由託管保管，直到交易確認為止
explanation: |
  在 Bitcoin 的費用系統中，費用是以總輸入金額與總輸出金額之差來隱含計算 (費用 = sum(inputs) - sum(outputs))。任何未明確指定給輸出的值都會自動成為礦工費用。這就是為什麼建立適當的變更輸出是很重要的 - 如果您在花費大量 UTXO 時忘記包含變更輸出，全部餘額就會成為礦工的昂貴費用。其他選項是不正確的，因為 Bitcoin 不會自動建立變更輸出、不會燒毀未分配的價值，也不使用交易差額的託管機制。
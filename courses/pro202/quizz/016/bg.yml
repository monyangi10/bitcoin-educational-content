question: Какво се случва с разликата между входящите и изходящите суми в транзакция Bitcoin?
answer: Разликата автоматично се превръща в такса за транзакция, плащана на миньорите
wrong_answers:
  - "Разликата се връща на първоначалния адрес на подателя като промяна"
  - Разликата се изгаря и трайно се изважда от кръвообращението
  - Разликата се съхранява в ескроу до потвърждаване на сделката
explanation: |
  В системата за таксуване на Bitcoin таксите се изчисляват имплицитно като разлика между общите суми на вложените ресурси и общите суми на изведените ресурси (такса = сума(вложени ресурси) - сума(изведени ресурси)). Всяка стойност, която не е изрично присвоена на изхода, автоматично се превръща в такса за миньор. Ето защо създаването на правилни изходи за промяна е от решаващо значение - ако забравите да включите изход за промяна, когато изразходвате голям UTXO, целият остатък се превръща в скъпа такса за миньора. Другите варианти са некоректни, тъй като Bitcoin не създава автоматично изходи за промяна, не изгаря неразпределена стойност и не използва механизми за ескроу за разликите в транзакциите.
question: Bitcoinの取引において、インプット金額とアウトプット金額の差額はどうなるのか？
answer: その差額は自動的にマイナーに支払われる取引手数料となる。
wrong_answers:
  - 「差額は、差出人の元の住所にお釣りとして返される」。
  - その差は燃やされ、永久に循環から取り除かれる。
  - 差額は取引が確定するまでエスクローで保管される。
explanation: |
  Bitcoinの手数料システムでは、手数料は暗黙的に総入力量と総出力量の差として計算される（手数料＝sum(inputs) - sum(outputs)）。出力に明示的に割り当てられていない値は、自動的に採掘者の手数料になります。これが、適切な変更出力を作成することが重要である理由です。大きなUTXOを費やすときに変更出力を含めることを忘れると、残りのすべてが採掘者にとって高価な手数料になります。Bitcoinは自動的に変更アウトプットを作成せず、未割り当ての価値を燃やさず、取引差額のエスクローメカニズムを使用しないため、他の選択肢は正しくない。
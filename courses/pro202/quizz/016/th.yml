question: ความแตกต่างระหว่างจำนวนเงินที่ป้อนเข้าและจำนวนเงินที่ส่งออกในธุรกรรม Bitcoin เกิดอะไรขึ้น?
answer: ความแตกต่างจะกลายเป็นค่าธรรมเนียมการทำธุรกรรมที่จ่ายให้กับนักขุดโดยอัตโนมัติ
wrong_answers:
  - "ส่วนต่างจะถูกส่งคืนไปยังที่อยู่เดิมของผู้ส่งเป็นเงินทอน"
  - ความแตกต่างจะถูกเผาและลบออกจากการหมุนเวียนอย่างถาวร
  - ส่วนต่างจะถูกเก็บไว้ในบัญชีเอสโครว์จนกว่าการทำธุรกรรมจะได้รับการยืนยัน
explanation: |
  ในระบบค่าธรรมเนียมของ Bitcoin ค่าธรรมเนียมจะถูกคำนวณโดยนัยจากความแตกต่างระหว่างจำนวนอินพุตทั้งหมดและจำนวนเอาต์พุตทั้งหมด (ค่าธรรมเนียม = ผลรวม(อินพุต) - ผลรวม(เอาต์พุต)) ค่าที่ไม่ได้ถูกกำหนดให้กับเอาต์พุตโดยอัตโนมัติจะกลายเป็นค่าธรรมเนียมของนักขุด นี่คือเหตุผลที่การสร้างเอาต์พุตการเปลี่ยนแปลงที่เหมาะสมเป็นสิ่งสำคัญ - หากคุณลืมรวมเอาต์พุตการเปลี่ยนแปลงเมื่อใช้จ่าย UTXO ขนาดใหญ่ ส่วนที่เหลือทั้งหมดจะกลายเป็นค่าธรรมเนียมที่แพงสำหรับนักขุด ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ Bitcoin ไม่ได้สร้างเอาต์พุตการเปลี่ยนแปลงโดยอัตโนมัติ ไม่ได้เผาค่าที่ไม่ได้กำหนด และไม่ได้ใช้กลไกเอสโครว์สำหรับความแตกต่างของธุรกรรม
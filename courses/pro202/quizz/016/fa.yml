question: تفاوت بین مقادیر ورودی و مقادیر خروجی در یک تراکنش Bitcoin چه می‌شود؟
answer: تفاوت به‌طور خودکار به عنوان کارمزد تراکنش به ماینرها پرداخت می‌شود
wrong_answers:
  - "تفاوت به آدرس اصلی فرستنده به عنوان بقیه بازگردانده می‌شود"
  - تفاوت سوزانده شده و به طور دائمی از گردش خارج می‌شود
  - تفاوت در حساب امانی نگه‌داشته می‌شود تا زمانی که تراکنش تأیید شود.
explanation: |
  در سیستم کارمزد Bitcoin، کارمزدها به‌طور ضمنی به‌عنوان تفاوت بین مجموع مقادیر ورودی و مجموع مقادیر خروجی محاسبه می‌شوند (کارمزد = مجموع ورودی‌ها - مجموع خروجی‌ها). هر مقداری که به‌طور صریح به یک خروجی اختصاص داده نشود، به‌طور خودکار به کارمزد ماینر تبدیل می‌شود. به همین دلیل ایجاد خروجی‌های تغییر مناسب بسیار مهم است - اگر هنگام خرج کردن یک UTXO بزرگ، خروجی تغییر را فراموش کنید، کل باقیمانده به یک کارمزد گران برای ماینر تبدیل می‌شود. گزینه‌های دیگر نادرست هستند زیرا Bitcoin به‌طور خودکار خروجی‌های تغییر ایجاد نمی‌کند، ارزش اختصاص‌نیافته را نمی‌سوزاند و از مکانیزم‌های امانت برای تفاوت‌های تراکنش استفاده نمی‌کند.
question: Bitcoin 트랜잭션에서 입력 금액과 출력 금액의 차이는 어떻게 되나요?
answer: 차액은 자동으로 채굴자에게 지급되는 거래 수수료가 됩니다
wrong_answers:
  - "차액은 발신자의 원래 주소로 변경 금액으로 반환됩니다."
  - 차액은 소각되어 유통에서 영구적으로 제거됩니다
  - 차액은 거래가 확정될 때까지 에스크로에 보관됩니다
explanation: |
  Bitcoin의 수수료 시스템에서 수수료는 총 입력 금액과 총 출력 금액의 차이로 암시적으로 계산됩니다(수수료 = 합(입력) - 합(출력)). 출력에 명시적으로 할당되지 않은 값은 자동으로 마이너 수수료가 됩니다. 그렇기 때문에 적절한 변경 출력을 생성하는 것이 중요합니다. 큰 UTXO를 지출할 때 변경 출력을 포함하는 것을 잊어버리면 나머지 전체가 채굴자에게 비싼 수수료가 됩니다. 다른 옵션은 Bitcoin이 자동으로 변경 출력을 생성하지 않고, 할당되지 않은 가치를 소각하지 않으며, 거래 차액에 대해 에스크로 메커니즘을 사용하지 않기 때문에 올바르지 않습니다.
question: Bitcoin लेनदेन में इनपुट राशि और आउटपुट राशि के बीच के अंतर का क्या होता है?
answer: अंतर स्वतः ही खनिकों को भुगतान किया जाने वाला लेनदेन शुल्क बन जाता है।
wrong_answers:
  - "अंतर राशि प्रेषक के मूल पते पर बकाया राशि के रूप में वापस कर दी जाती है।"
  - अंतर को जलाकर स्थायी रूप से प्रचलन से हटा दिया जाता है।
  - लेनदेन की पुष्टि होने तक शेष राशि को एस्क्रो में रखा जाता है।
explanation: |
  Bitcoin की शुल्क प्रणाली में, शुल्क की गणना कुल इनपुट राशि और कुल आउटपुट राशि के अंतर के रूप में की जाती है (शुल्क = इनपुट का योग - आउटपुट का योग)। आउटपुट को स्पष्ट रूप से आवंटित न किया गया कोई भी मान स्वचालित रूप से माइनर शुल्क बन जाता है। यही कारण है कि उचित परिवर्तन आउटपुट बनाना महत्वपूर्ण है - यदि आप बड़ी मात्रा में UTXO खर्च करते समय परिवर्तन आउटपुट शामिल करना भूल जाते हैं, तो शेष पूरी राशि माइनर के लिए एक महंगा शुल्क बन जाती है। अन्य विकल्प गलत हैं क्योंकि Bitcoin स्वचालित रूप से परिवर्तन आउटपुट नहीं बनाता है, अनिर्धारित मान को बर्न नहीं करता है, और लेनदेन अंतर के लिए एस्क्रो तंत्र का उपयोग नहीं करता है।
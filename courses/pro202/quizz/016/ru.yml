question: Что происходит с разницей между входными и выходными суммами в транзакции Bitcoin?
answer: Разница автоматически становится комиссией за транзакции, выплачиваемой майнерам
wrong_answers:
  - "Разница возвращается по первоначальному адресу отправителя как изменение"
  - Разница сжигается и навсегда выводится из кровообращения
  - Разница удерживается в условном депонировании до подтверждения сделки
explanation: |
  В системе вознаграждений Bitcoin вознаграждение рассчитывается неявно как разница между суммой входов и суммой выходов (вознаграждение = сумма(входы) - сумма(выходы)). Любое значение, не присвоенное выходу в явном виде, автоматически становится платой шахтера. Именно поэтому создание правильных выходов изменений очень важно - если вы забудете включить выход изменений при расходовании большого UTXO, весь остаток станет дорогой платой для майнера. Остальные варианты неверны, потому что Bitcoin не создает автоматически выходы изменений, не сжигает неназначенную стоимость и не использует механизмы депонирования для разницы транзакций.
question: 在 Bitcoin 交易中，输入金额和输出金额之间的差额如何处理？
answer: 差额自动成为支付给矿工的交易费
wrong_answers:
  - "差额将作为零钱退回寄件人的原地址"
  - 差值被烧毁，并从血液循环中永久消除
  - 差额由托管机构代管，直至交易得到确认
explanation: |
  在 Bitcoin 的矿工费系统中，矿工费是以总投入和总产出的差额（矿工费 = 总投入 - 总产出）来计算的。任何未明确分配给输出的值都会自动成为矿工费。这就是为什么创建适当的变化输出至关重要的原因--如果在花费大量 UTXO 时忘记包含变化输出，那么全部剩余部分都会成为昂贵的矿工费。其他选项都是错误的，因为 Bitcoin 不会自动创建变化输出，不会烧毁未分配的价值，也不会为交易差额使用托管机制。
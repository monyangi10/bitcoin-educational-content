question: ECDSA 서명 생성에서 논스 K를 생성할 때 어떤 중요한 보안 요구 사항을 충족해야 하나요?
answer: 개인키 유출을 방지하려면 모든 서명에 대해 K는 고유하고 예측할 수 없어야 합니다
wrong_answers:
  - 서명 확인이 올바르게 작동하려면 K는 공개 키에서 파생되어야 합니다
  - 서명 프로세스의 일관성을 유지하려면 여러 서명에서 K가 동일해야 합니다
  - K는 수학적 정확성을 위해 개인 키에 메시지 해시를 곱한 값과 같아야 합니다
explanation: |
  논스 K는 각 서명에 대해 고유하고 예측할 수 없는 것이어야 합니다. 왜냐하면 공격자가 K를 재사용하거나 예측할 수 있게 하면 개인키를 복구할 수 있기 때문입니다. 동일한 K를 다른 메시지에 두 번 사용하면 간단한 대수학을 통해 개인키를 알아낼 수 있습니다. 최신 구현에서는 결정론적 K 생성(RFC 6979)을 사용하여 난수 생성기 오류를 방지하는 동시에 고유성을 보장합니다. 다른 옵션은 올바르지 않습니다. K는 공개 키에서 파생되거나 재사용되어서는 안 되며, 개인 키와 메시지 해시를 곱한 값과 같지 않아야 합니다.
question: ECDSA हस्ताक्षर निर्माण में नॉनस K उत्पन्न करते समय कौन सी महत्वपूर्ण सुरक्षा आवश्यकता पूरी होनी चाहिए?
answer: निजी कुंजी के उल्लंघन को रोकने के लिए प्रत्येक हस्ताक्षर के लिए K अद्वितीय और अप्रत्याशित होना चाहिए।
wrong_answers:
  - हस्ताक्षर सत्यापन सही ढंग से काम करे, इसके लिए K को सार्वजनिक कुंजी से प्राप्त किया जाना चाहिए।
  - हस्ताक्षर प्रक्रिया में एकरूपता बनाए रखने के लिए, सभी हस्ताक्षरों में K का मान समान होना चाहिए।
  - गणितीय शुद्धता के लिए K का मान निजी कुंजी को संदेश हैश से गुणा करने के बराबर होना चाहिए।
explanation: |
  प्रत्येक हस्ताक्षर के लिए नॉनस K अद्वितीय और अप्रत्याशित होना चाहिए, क्योंकि K का पुन: उपयोग करने या इसके पूर्वानुमान योग्य होने से हमलावर निजी कुंजी को पुनः प्राप्त कर सकते हैं। यदि एक ही K का उपयोग अलग-अलग संदेशों के साथ दो बार किया जाता है, तो साधारण बीजगणित से निजी कुंजी का पता लगाया जा सकता है। आधुनिक कार्यान्वयन विशिष्टता सुनिश्चित करते हुए यादृच्छिक संख्या जनरेटर की विफलताओं से बचने के लिए नियतात्मक K जनरेशन (RFC 6979) का उपयोग करते हैं। अन्य विकल्प गलत हैं: K को कभी भी सार्वजनिक कुंजी से प्राप्त नहीं किया जाना चाहिए, इसका कभी भी पुन: उपयोग नहीं किया जाना चाहिए, और यह कभी भी निजी कुंजी और संदेश हैश के गुणनफल के बराबर नहीं होना चाहिए।
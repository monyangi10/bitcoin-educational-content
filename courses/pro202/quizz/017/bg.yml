question: Кое критично изискване за сигурност трябва да бъде спазено при генерирането на нонсе K при създаването на подпис ECDSA?
answer: K трябва да е уникален и непредвидим за всеки подпис, за да се предотврати компрометиране на частния ключ
wrong_answers:
  - K трябва да се изведе от публичния ключ, за да се гарантира, че проверката на подписа работи правилно
  - K трябва да бъде еднакъв за няколко подписа, за да се поддържа последователност в процеса на подписване
  - K трябва да е равен на частния ключ, умножен по хеша на съобщението, за да е математически коректно
explanation: |
  Нонсе K трябва да бъде уникален и непредвидим за всеки подпис, тъй като повторното използване на K или предвидимостта му позволява на атакуващите да възстановят частния ключ. Ако един и същ K се използва два пъти с различни съобщения, проста алгебра може да разкрие частния ключ. Съвременните реализации използват детерминистично генериране на K (RFC 6979), за да се избегнат откази на генератора на случайни числа, като същевременно се гарантира уникалност. Другите варианти са некоректни: К никога не трябва да се извлича от публичния ключ, никога не трябва да се използва повторно и никога не трябва да е равен на частния ключ, умножен по хеша на съобщението.
question: 在 ECDSA 签名创建过程中生成非 Cce K 时必须满足哪些关键安全要求？
answer: 每次签名的 K 必须是唯一的、不可预测的，以防止私钥泄露
wrong_answers:
  - K 必须来自公开密钥，以确保签名验证正确无误
  - K 在多个签名中必须相同，以保持签名过程的一致性
  - 为保证数学正确性，K 必须等于私人密钥乘以信息哈希值
explanation: |
  对于每个签名来说，nonce K 必须是唯一且不可预测的，因为重复使用 K 或让它可预测，都会让攻击者恢复私钥。如果相同的 K 在不同的信息中使用两次，简单的代数就能揭示私钥。现代实现使用确定性 K 生成（RFC 6979）来避免随机数生成器故障，同时确保唯一性。其他选项都是不正确的：K 绝不应从公开密钥导出，绝不能重复使用，也绝不能等于私人密钥乘以信息哈希值。
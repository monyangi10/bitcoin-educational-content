question: ECDSA署名の作成において、ノンスKを生成する際に満たさなければならない重要なセキュリティ要件は何か。
answer: 秘密鍵の漏洩を防ぐため、Kは署名ごとにユニークで予測不可能でなければならない。
wrong_answers:
  - Kは、署名検証が正しく機能するように公開鍵から導出されなければならない。
  - 署名プロセスの一貫性を保つため、Kは複数の署名で同じでなければならない。
  - Kは、数学的な正しさのために、秘密鍵にメッセージ・ハッシュを掛けたものに等しくなければならない。
explanation: |
  なぜなら、Kを再利用したり、予測可能なものにすることで、攻撃者は 秘密鍵を復元できてしまうからである。同じKが異なるメッセージで2度使用された場合、単純な代数計算で秘密鍵が明らかになってしまう。最近の実装では、一意性を保証しつつ乱数生成器の失敗を避けるために、 決定論的K生成(RFC 6979)を使用している。他の選択肢は正しくない。Kは決して公開鍵から導出されるべきではなく、決して再利用されるべきではなく、 決して秘密鍵とメッセージ・ハッシュを等しくするべきではない。
question: ข้อกำหนดด้านความปลอดภัยที่สำคัญที่ต้องปฏิบัติตามเมื่อสร้าง nonce K ในการสร้างลายเซ็น ECDSA คืออะไร?
answer: K ต้องมีความเฉพาะตัวและคาดเดาไม่ได้สำหรับทุกลายเซ็นเพื่อป้องกันการประนีประนอมของกุญแจส่วนตัว
wrong_answers:
  - K ต้องได้มาจากกุญแจสาธารณะเพื่อให้การตรวจสอบลายเซ็นทำงานได้อย่างถูกต้อง
  - K ต้องเหมือนกันในหลายลายเซ็นเพื่อรักษาความสม่ำเสมอในกระบวนการลงนาม
  - K ต้องเท่ากับคีย์ส่วนตัวคูณด้วยแฮชของข้อความเพื่อความถูกต้องทางคณิตศาสตร์
explanation: |
  ค่า nonce K ต้องมีความเป็นเอกลักษณ์และไม่สามารถคาดเดาได้สำหรับแต่ละลายเซ็น เนื่องจากการใช้ K ซ้ำหรือการที่ K สามารถคาดเดาได้จะทำให้ผู้โจมตีสามารถกู้คืนกุญแจส่วนตัวได้ หากใช้ K เดียวกันสองครั้งกับข้อความที่ต่างกัน พีชคณิตง่ายๆ สามารถเปิดเผยกุญแจส่วนตัวได้ การใช้งานสมัยใหม่ใช้การสร้าง K แบบกำหนดแน่นอน (RFC 6979) เพื่อหลีกเลี่ยงความล้มเหลวของเครื่องสร้างตัวเลขสุ่มในขณะที่ยังคงความเป็นเอกลักษณ์ ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: K ไม่ควรถูกสร้างจากกุญแจสาธารณะ ไม่ควรถูกใช้ซ้ำ และไม่ควรเท่ากับกุญแจส่วนตัวคูณด้วยแฮชของข้อความ
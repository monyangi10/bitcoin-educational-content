question: چه الزام امنیتی مهمی باید هنگام تولید nonce K در ایجاد امضای ECDSA رعایت شود؟
answer: K باید برای هر امضا منحصربه‌فرد و غیرقابل‌پیش‌بینی باشد تا از به خطر افتادن کلید خصوصی جلوگیری شود.
wrong_answers:
  - باید K از کلید عمومی استخراج شود تا اطمینان حاصل شود که تأیید امضا به درستی کار می‌کند.
  - K باید در چندین امضا یکسان باشد تا ثبات در فرآیند امضا حفظ شود
  - K باید برابر با کلید خصوصی ضربدر هش پیام برای درستی ریاضی باشد
explanation: |
  Nonce K باید برای هر امضا منحصربه‌فرد و غیرقابل پیش‌بینی باشد زیرا استفاده مجدد از K یا قابل پیش‌بینی بودن آن به مهاجمان اجازه می‌دهد کلید خصوصی را بازیابی کنند. اگر همان K دو بار با پیام‌های مختلف استفاده شود، جبر ساده می‌تواند کلید خصوصی را فاش کند. پیاده‌سازی‌های مدرن از تولید K تعیین‌کننده (RFC 6979) استفاده می‌کنند تا از شکست‌های تولیدکننده اعداد تصادفی جلوگیری کرده و در عین حال اطمینان از یکتایی را فراهم کنند. گزینه‌های دیگر نادرست هستند: K هرگز نباید از کلید عمومی مشتق شود، هرگز نباید مجدداً استفاده شود و هرگز نباید برابر با کلید خصوصی ضربدر هش پیام باشد.
question: 在 ECDSA 簽章建立中產生非ce K 時，必須符合什麼重要的安全性要求？
answer: K 對於每個簽章都必須是唯一且不可預測的，以防止私密金鑰外洩
wrong_answers:
  - K 必須來自公開金鑰，以確保簽章驗證正確運作
  - K 在多個簽章中必須相同，以維持簽章程序的一致性
  - K 必須等於私密金鑰乘以訊息切細值，以確保數學上的正確性
explanation: |
  每次簽章的 nonce K 必須是獨一無二且不可預測的，因為重複使用 K 或讓它可預測，都會讓攻擊者恢復私密金鑰。如果相同的 K 用於不同的訊息兩次，簡單的代數就可以揭露私密金鑰。現代的實作使用確定性 K 產生 (RFC 6979) 來避免隨機數生成器失效，同時確保唯一性。其他選項都是不正確的：K 絕對不可以從公開金鑰衍生出來，絕對不可以重複使用，也絕對不可以等於私密金鑰乘以訊息切細值。
question: निर्माण प्रक्रिया के दौरान Bitcoin लेनदेन में लेनदेन शुल्क की राशि कौन निर्धारित करता है?
answer: सभी इनपुट के कुल मूल्य और सभी आउटपुट के कुल मूल्य के बीच का अंतर
wrong_answers:
  - नेटवर्क प्रोटोकॉल द्वारा गणना किए गए कुल लेनदेन मूल्य का एक निश्चित प्रतिशत
  - लेन-देन का आकार बाइट्स में, खनिकों द्वारा निर्धारित मानक दर से गुणा किया जाता है।
  - सभी इनपुट पर आवश्यक हस्ताक्षरों की संख्या और एक आधारभूत नेटवर्क शुल्क
explanation: |
  Bitcoin लेनदेन शुल्क कुल इनपुट और कुल आउटपुट के अंतर से निर्धारित होता है। लेनदेन करते समय, आप इनपुट के रूप में UTXO का चयन करते हैं और प्राप्तकर्ताओं और शेष राशि के लिए आउटपुट बनाते हैं। बची हुई राशि वह शुल्क बन जाती है जो माइनर्स को आपके लेनदेन को शामिल करने के लिए प्रोत्साहित करती है। शुल्क की गणना प्रतिशत, निश्चित दरों या हस्ताक्षर गणना के आधार पर नहीं की जाती है - यह केवल लेनदेन के मूल्य शेष में बची हुई राशि होती है।
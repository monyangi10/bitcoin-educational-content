question: 건설 과정 중 Bitcoin 거래에서 거래 수수료 금액은 어떻게 결정되나요?
answer: 모든 입력의 총 값과 모든 출력의 총 값의 차이입니다
wrong_answers:
  - 네트워크 프로토콜에 의해 계산된 총 트랜잭션 가치의 고정 비율입니다
  - 바이트 단위의 트랜잭션 크기에 채굴자가 설정한 표준 비율을 곱한 값입니다
  - 모든 입력에 필요한 서명 수에 기본 네트워크 수수료를 더한 값입니다
explanation: |
  Bitcoin 트랜잭션 수수료는 총 입력과 총 출력의 차이에 따라 결정됩니다. 트랜잭션을 구성할 때 UTXO를 입력으로 선택하고 수신자 및 변경에 대한 출력을 생성합니다. 남은 금액은 채굴자에게 트랜잭션을 포함하도록 인센티브를 제공하는 수수료가 됩니다. 수수료는 백분율, 고정 요금 또는 서명 수로 계산되지 않으며, 단순히 트랜잭션의 가치 잔액에서 할당되지 않고 남은 금액입니다.
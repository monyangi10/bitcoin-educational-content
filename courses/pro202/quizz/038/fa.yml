question: چه چیزی مقدار کارمزد تراکنش را در یک تراکنش Bitcoin در طول فرآیند ساخت تعیین می‌کند؟
answer: تفاوت بین ارزش کل ورودی‌ها و ارزش کل خروجی‌ها
wrong_answers:
  - درصد ثابتی از کل ارزش تراکنش که توسط پروتکل شبکه محاسبه می‌شود
  - اندازه تراکنش بر حسب بایت ضربدر نرخ استاندارد تعیین‌شده توسط ماینرها
  - تعداد امضاهای مورد نیاز در تمام ورودی‌ها به‌علاوه یک هزینه پایه شبکه
explanation: |
  هزینه‌های تراکنش Bitcoin با تفاوت بین کل ورودی‌ها و کل خروجی‌ها تعیین می‌شود. هنگام ساخت یک تراکنش، شما UTXOها را به عنوان ورودی انتخاب کرده و خروجی‌هایی برای گیرندگان و تغییر ایجاد می‌کنید. هر مقدار باقی‌مانده به عنوان هزینه‌ای است که ماینرها را تشویق می‌کند تا تراکنش شما را شامل کنند. هزینه بر اساس درصد، نرخ‌های ثابت یا تعداد امضاها محاسبه نمی‌شود - بلکه به سادگی آنچه که در تراز ارزش تراکنش تخصیص نیافته باقی می‌ماند، است.
question: 建設中のBitcoin取引における取引手数料の額は何で決まるのか？
answer: 全入力の合計値と全出力の合計値の差
wrong_answers:
  - ネットワーク・プロトコルによって計算されるトランザクション総額の一定割合
  - トランザクションのサイズ（バイト）にマイナーによって設定された標準レートを掛けたもの。
  - すべてのインプットに必要な署名数と基本ネットワーク料金
explanation: |
  Bitcoinの取引手数料は、総入力と総出力の差によって決まる。トランザクションを構築する際には、インプットとしてUTXOを選択し、受取人と釣り銭のアウトプットを作成する。余った金額は、あなたのトランザクションを含めるようマイナーにインセンティブを与える手数料となる。手数料はパーセンテージや固定レート、署名数で計算されるのではなく、単にトランザクションの価値残高に配分されずに残ったものである。
question: От чего зависит размер комиссии за сделку Bitcoin в процессе строительства?
answer: Разница между общей стоимостью всех входов и общей стоимостью всех выходов
wrong_answers:
  - Фиксированный процент от общей стоимости транзакции, рассчитываемый сетевым протоколом
  - Размер транзакции в байтах, умноженный на стандартную ставку, установленную майнерами
  - Количество подписей, необходимое для всех входов, плюс базовый сетевой сбор
explanation: |
  Плата за транзакцию Bitcoin определяется разницей между суммарными входами и суммарными выходами. При создании транзакции вы выбираете UTXO в качестве входа и создаете выходы для получателей и изменений. Оставшаяся сумма становится платой, которая стимулирует майнеров включить вашу транзакцию. Комиссия не рассчитывается по процентам, фиксированным ставкам или количеству подписей - это просто то, что остается нераспределенным в балансе стоимости транзакции.
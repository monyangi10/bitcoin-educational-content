question: อะไรเป็นตัวกำหนดจำนวนค่าธรรมเนียมการทำธุรกรรมในธุรกรรม Bitcoin ระหว่างกระบวนการก่อสร้าง?
answer: ความแตกต่างระหว่างมูลค่ารวมของปัจจัยนำเข้าทั้งหมดและมูลค่ารวมของผลผลิตทั้งหมด
wrong_answers:
  - เปอร์เซ็นต์คงที่ของมูลค่าการทำธุรกรรมทั้งหมดที่คำนวณโดยโปรโตคอลเครือข่าย
  - ขนาดของธุรกรรมในหน่วยไบต์คูณด้วยอัตรามาตรฐานที่กำหนดโดยนักขุด
  - จำนวนลายเซ็นที่ต้องการจากทุกอินพุตรวมกับค่าธรรมเนียมเครือข่ายพื้นฐาน
explanation: |
  ค่าธรรมเนียมการทำธุรกรรม Bitcoin ถูกกำหนดโดยความแตกต่างระหว่างยอดรวมของอินพุตและเอาต์พุตทั้งหมด เมื่อสร้างธุรกรรม คุณจะเลือก UTXOs เป็นอินพุตและสร้างเอาต์พุตสำหรับผู้รับและเงินทอน จำนวนเงินที่เหลือจะกลายเป็นค่าธรรมเนียมที่จูงใจให้คนขุดเหมืองรวมธุรกรรมของคุณ ค่าธรรมเนียมไม่ได้คำนวณจากเปอร์เซ็นต์ อัตราคงที่ หรือจำนวนลายเซ็น - มันเป็นเพียงสิ่งที่เหลืออยู่ในยอดคงเหลือของมูลค่าธุรกรรมที่ไม่ได้จัดสรร
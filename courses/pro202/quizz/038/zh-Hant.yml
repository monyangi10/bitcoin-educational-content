question: 在施工過程中，Bitcoin 交易的交易費金額由什麼決定？
answer: 所有輸入的總值與所有輸出的總值之間的差異
wrong_answers:
  - 由網路通訊協定計算的交易總值的固定百分比
  - 以位元組表示的交易大小乘以礦工設定的標準費率
  - 所有輸入所需的簽名數量加上基本網路費用
explanation: |
  Bitcoin 交易費用由總輸入和總輸出的差額決定。在建立交易時，您選擇 UTXOs 作為輸入，並為收款人和變更建立輸出。任何剩餘金額將成為費用，以激勵礦工包含您的交易。該費用並非以百分比、固定費率或簽名計數計算 - 它只是交易價值餘額中未分配的部分。
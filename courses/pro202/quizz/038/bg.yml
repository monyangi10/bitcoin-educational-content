question: Какво определя размера на таксата за транзакция при транзакция Bitcoin по време на строителния процес?
answer: Разликата между общата стойност на всички входящи ресурси и общата стойност на всички изходящи ресурси
wrong_answers:
  - Фиксиран процент от общата стойност на транзакцията, изчислен от мрежовия протокол
  - Размерът на транзакцията в байтове, умножен по стандартна ставка, определена от миньорите
  - Броят на необходимите подписи за всички входове плюс базова мрежова такса
explanation: |
  Таксите за транзакциите Bitcoin се определят от разликата между общите входове и общите изходи. Когато конструирате транзакция, избирате UTXO като входове и създавате изходи за получателите и промените. Всяка останала сума се превръща в таксата, която стимулира миньорите да включат вашата транзакция. Таксата не се изчислява чрез процент, фиксирани ставки или брой подписи - тя е просто това, което остава неразпределено в баланса на стойността на трансакцията.
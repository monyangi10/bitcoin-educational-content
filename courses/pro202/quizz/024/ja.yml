question: Bitcoinにおいて、署名チェックのない公開データのみに依存するスクリプトパズルが脆弱である主な理由は何ですか？
answer: マイナーはmempoolからソリューションをコピーし、ペイアウトを自分に振り向けることができる。
wrong_answers:
  - 異なるネットワークノード間でスクリプトの実行が非決定的になる
  - トランザクションの検証時間はパズルの複雑さに応じて二次関数的に増加する。
  - スタックベースの実行モデルでは、複雑な数学演算を安全に扱うことはできない。
explanation: |
  署名チェックのない公開データ（数学問題やハッシュプリイメージなど）のみに依存するスクリプトパズルは、マイナーのフロントランニングに弱い。いったん有効な解がmempoolに現れると、マイナーは誰でもそれを観察し、解をコピーし、ペイアウトを自分のアドレスにリダイレクトする独自のトランザクションを作成することができる。このため、現実世界のBitcoin契約では、ほとんどの場合、署名チェックが含まれている。署名は解答を特定の当事者に拘束し、他の者がペイアウトを盗むのを防ぐため、パズル解答者の適切なインセンティブを維持する。
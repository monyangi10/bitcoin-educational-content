question: Коя е основната причина, поради която скриптовите пъзели, разчитащи само на публични данни без проверка на подписа, са уязвими в Bitcoin?
answer: Миньорите могат да копират решението от мемпула и да пренасочат печалбата към себе си
wrong_answers:
  - Изпълнението на скрипта става недетерминистично в различните мрежови възли
  - Времето за валидиране на транзакциите нараства квадратично със сложността на пъзела
  - Моделът на изпълнение, базиран на стека, не може да се справи сигурно със сложни математически операции
explanation: |
  Скриптовите пъзели, които разчитат само на публични данни (като математически задачи или предварителни хеш изображения) без проверка на подписите, са уязвими за фронтално управление от страна на миньорите. След като валидно решение се появи в mempool, всеки миньор може да го наблюдава, да копира решението и да създаде своя собствена транзакция, пренасочваща изплащането към неговия адрес. Ето защо реалните Bitcoin договори почти винаги включват проверки на подписите - подписите обвързват решението с конкретна страна и не позволяват на други да откраднат изплащането, като запазват подходящи стимули за решаващите пъзели.
question: सिग्नेचर चेक के बिना केवल सार्वजनिक डेटा पर निर्भर रहने वाली स्क्रिप्ट पहेलियाँ Bitcoin में असुरक्षित क्यों हैं, इसका मुख्य कारण क्या है?
answer: माइनर्स मेमोरी पूल से सॉल्यूशन कॉपी कर सकते हैं और भुगतान को अपने पास रीडायरेक्ट कर सकते हैं।
wrong_answers:
  - विभिन्न नेटवर्क नोड्स में स्क्रिप्ट का निष्पादन अनिश्चित हो जाता है।
  - पहेली की जटिलता बढ़ने के साथ लेन-देन सत्यापन का समय वर्गानुपाती रूप से बढ़ता है।
  - स्टैक-आधारित निष्पादन मॉडल जटिल गणितीय संक्रियाओं को सुरक्षित रूप से संभालने में सक्षम नहीं है।
explanation: |
  सिग्नेचर चेक के बिना केवल सार्वजनिक डेटा (जैसे गणित की समस्याएं या हैश प्रीइमेज) पर आधारित स्क्रिप्ट पहेलियां माइनर फ्रंट-रनिंग के प्रति संवेदनशील होती हैं। एक बार मेमोरी पूल में वैध समाधान दिखाई देने पर, कोई भी माइनर इसे देख सकता है, समाधान की प्रतिलिपि बना सकता है और भुगतान को अपने पते पर पुनर्निर्देशित करने के लिए अपना स्वयं का लेनदेन बना सकता है। यही कारण है कि वास्तविक दुनिया के Bitcoin अनुबंधों में लगभग हमेशा सिग्नेचर चेक शामिल होते हैं - सिग्नेचर समाधान को एक विशिष्ट पक्ष से जोड़ते हैं और दूसरों को भुगतान चुराने से रोकते हैं, जिससे पहेली हल करने वालों के लिए उचित प्रोत्साहन बना रहता है।
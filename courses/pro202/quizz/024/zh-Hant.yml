question: 在 Bitcoin 中，僅依賴公開資料而沒有簽章檢查的腳本拼圖容易受到攻擊的主要原因是什麼？
answer: 礦工可以從 mempool 複製解決方案，並將報酬重定向到自己身上
wrong_answers:
  - 腳本在不同網路節點上的執行變得不確定
  - 交易驗證時間與字謎複雜度成二次方增加
  - 堆疊式執行模型無法安全地處理複雜的數學運算
explanation: |
  僅依賴公開資料（如數學問題或雜湊預設圖像）而沒有簽署檢查的腳本字謎很容易受到礦工前置運行的影響。一旦有效的解決方案出現在 Mempool 中，任何礦工都可以觀察到它，複製解決方案，並建立他們自己的交易，將支付重定向到他們的地址。這就是為什麼現實世界中的 Bitcoin 合約幾乎總是包含簽名檢查 - 簽名將解決方案綁定到特定的一方，防止其他人竊取報酬，為解題者保留適當的激勵機制。
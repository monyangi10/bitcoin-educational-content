question: Какова основная причина того, что скрипты-головоломки, полагающиеся только на открытые данные без проверки подписи, уязвимы в Bitcoin?
answer: Майнеры могут скопировать решение из мемпула и перенаправить выплату себе
wrong_answers:
  - Выполнение сценария становится недетерминированным на разных узлах сети
  - Время проверки транзакций увеличивается квадратично с ростом сложности головоломки
  - Модель выполнения на основе стека не может безопасно обрабатывать сложные математические операции
explanation: |
  Скриптовые головоломки, которые опираются только на публичные данные (например, математические задачи или хэш-представления) без проверки подписи, уязвимы для подставных майнеров. Как только в мемпуле появляется правильное решение, любой майнер может заметить его, скопировать решение и создать собственную транзакцию, перенаправив выплату на свой адрес. Именно поэтому реальные контракты Bitcoin почти всегда включают проверку подписи - подписи привязывают решение к конкретной стороне и не позволяют другим украсть выплату, сохраняя надлежащие стимулы для решателей головоломок.
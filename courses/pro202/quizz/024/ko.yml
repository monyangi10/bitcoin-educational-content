question: 서명 확인 없이 공개 데이터에만 의존하는 스크립트 퍼즐이 Bitcoin에서 취약한 주된 이유는 무엇인가요?
answer: 채굴자는 멤풀에서 솔루션을 복사하여 자신에게 지급금을 리디렉션할 수 있습니다
wrong_answers:
  - 스크립트 실행이 다른 네트워크 노드에서 비결정적으로 이루어집니다
  - 트랜잭션 유효성 검사 시간은 퍼즐의 복잡성에 따라 4제곱으로 증가합니다
  - 스택 기반 실행 모델은 복잡한 수학 연산을 안전하게 처리할 수 없습니다
explanation: |
  서명 확인 없이 공개 데이터(예: 수학 문제 또는 해시 프리이미지)에만 의존하는 스크립트 퍼즐은 채굴자의 프런트 러닝에 취약합니다. 멤풀에 유효한 솔루션이 나타나면 모든 채굴자는 이를 관찰하고 솔루션을 복사한 후 자신의 주소로 지급금을 리디렉션하는 자체 트랜잭션을 생성할 수 있습니다. 그렇기 때문에 실제 Bitcoin 계약에는 거의 항상 서명 확인이 포함되며, 서명은 솔루션을 특정 당사자에게 구속하고 다른 사람이 지불금을 훔치는 것을 방지하여 퍼즐 해결자에게 적절한 인센티브를 유지합니다.
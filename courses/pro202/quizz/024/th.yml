question: เหตุผลหลักที่ปริศนาสคริปต์ที่อาศัยข้อมูลสาธารณะโดยไม่มีการตรวจสอบลายเซ็นมีความเสี่ยงใน Bitcoin คืออะไร?
answer: นักขุดสามารถคัดลอกวิธีแก้ปัญหาจาก mempool และเปลี่ยนเส้นทางการจ่ายเงินให้กับตนเอง
wrong_answers:
  - การดำเนินการสคริปต์กลายเป็นไม่แน่นอนในเครือข่ายโหนดที่แตกต่างกัน
  - เวลาการตรวจสอบธุรกรรมเพิ่มขึ้นเป็นกำลังสองตามความซับซ้อนของปริศนา
  - โมเดลการดำเนินการแบบสแต็กไม่สามารถจัดการกับการดำเนินการทางคณิตศาสตร์ที่ซับซ้อนได้อย่างปลอดภัย
explanation: |
  สคริปต์ปริศนาที่อาศัยข้อมูลสาธารณะเท่านั้น (เช่น ปัญหาคณิตศาสตร์หรือภาพล่วงหน้าของแฮช) โดยไม่มีการตรวจสอบลายเซ็นมีความเสี่ยงต่อการถูกขุดล่วงหน้าโดยนักขุด เมื่อมีการแก้ปัญหาที่ถูกต้องปรากฏในเมมพูล นักขุดใด ๆ สามารถสังเกตเห็น คัดลอกการแก้ปัญหา และสร้างธุรกรรมของตนเองเพื่อเปลี่ยนเส้นทางการจ่ายเงินไปยังที่อยู่ของตนเอง นี่คือเหตุผลที่สัญญา Bitcoin ในโลกแห่งความเป็นจริงมักจะรวมการตรวจสอบลายเซ็น - ลายเซ็นผูกการแก้ปัญหากับฝ่ายเฉพาะและป้องกันไม่ให้ผู้อื่นขโมยการจ่ายเงิน รักษาแรงจูงใจที่เหมาะสมสำหรับผู้แก้ปริศนา
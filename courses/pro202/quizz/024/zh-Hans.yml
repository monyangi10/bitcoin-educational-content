question: 在 Bitcoin 中，仅依赖公共数据而不进行签名检查的脚本谜题容易受到攻击的主要原因是什么？
answer: 矿工可以从内存池中复制解决方案，并将报酬转给自己
wrong_answers:
  - 脚本在不同网络节点上的执行变得不确定
  - 交易验证时间随谜题复杂度的增加而呈二次曲线增长
  - 基于堆栈的执行模型无法安全地处理复杂的数学运算
explanation: |
  只依赖公共数据（如数学问题或哈希预图像）而没有签名检查的脚本谜题很容易受到矿工前置运行的影响。一旦mempool中出现有效的解决方案，任何矿工都可以观察到它，复制解决方案，并创建自己的交易，将支付重定向到自己的地址。这就是为什么现实世界中的 Bitcoin 合约几乎总是包含签名检查--签名将解决方案绑定给特定的一方，防止其他人窃取报酬，从而为解谜者提供适当的激励。
question: دلیل اصلی اینکه پازل‌های اسکریپتی که تنها به داده‌های عمومی متکی هستند و بدون بررسی امضا در Bitcoin آسیب‌پذیرند چیست؟
answer: ماینرها می‌توانند راه‌حل را از ممپول کپی کرده و پرداخت را به خودشان هدایت کنند
wrong_answers:
  - اجرای اسکریپت در میان گره‌های مختلف شبکه غیرقطعی می‌شود
  - زمان اعتبارسنجی تراکنش به صورت درجه دوم با پیچیدگی پازل افزایش می‌یابد.
  - مدل اجرای مبتنی بر پشته نمی‌تواند عملیات ریاضی پیچیده را به‌صورت امن مدیریت کند
explanation: |
  پازل‌های اسکریپتی که تنها به داده‌های عمومی متکی هستند (مانند مسائل ریاضی یا پیش‌تصاویر هش) بدون بررسی امضا در معرض خطر فرانت‌رانینگ ماینرها قرار دارند. به محض اینکه یک راه‌حل معتبر در ممپول ظاهر شود، هر ماینری می‌تواند آن را مشاهده کند، راه‌حل را کپی کند و تراکنش خود را ایجاد کند که پرداخت را به آدرس خود هدایت می‌کند. به همین دلیل است که قراردادهای واقعی Bitcoin تقریباً همیشه شامل بررسی امضا هستند - امضاها راه‌حل را به یک طرف خاص متصل می‌کنند و از سرقت پرداخت توسط دیگران جلوگیری می‌کنند و انگیزه‌های مناسب برای حل‌کنندگان پازل را حفظ می‌کنند.
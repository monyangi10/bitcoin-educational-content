question: विटनेस प्रोग्राम में स्क्रिप्ट कमिटमेंट के लिए P2WSH हैश 160 (RIPEMD160+SHA256) के बजाय SHA256 हैशिंग का उपयोग क्यों करता है?
answer: SHA256 एक 32-बाइट हैश प्रदान करता है जो P2WSH को P2WPKH के 20-बाइट हैश160 से अलग करता है और जटिल स्क्रिप्ट के लिए अधिक मजबूत सुरक्षा प्रदान करता है।
wrong_answers:
  - SHA256 की गणना hash160 की तुलना में तेज़ होती है, जिससे उच्च-थ्रूपुट परिदृश्यों में जटिल मल्टीसिग लेनदेन के लिए सत्यापन समय कम हो जाता है।
  - "Bitcoin के प्रारंभिक विकास चरण के दौरान खोजी गई संभावित टकराव संबंधी कमजोरियों के कारण SegWit में Hash160 को अप्रचलित कर दिया गया था।"
  - SHA256 520 बाइट्स से बड़े विटनेस स्क्रिप्ट की अनुमति देता है, जबकि hash160 ने स्क्रिप्ट की जटिलता पर सख्त आकार सीमाएं लगाई थीं।
explanation: |
  P2WSH, P2WPKH के 20-बाइट hash160 कमिटमेंट से अलग पहचान बनाने के लिए SHA256 का उपयोग करके 32-बाइट हैश बनाता है, जिससे नोड्स तुरंत विटनेस प्रोग्राम वर्जन की पहचान कर सकते हैं। लंबा हैश उन जटिल स्क्रिप्ट्स के लिए बेहतर सुरक्षा प्रदान करता है जिनका मूल्य अधिक हो सकता है या जिन पर हमले का खतरा अधिक हो सकता है। अन्य विकल्प गलत हैं: SHA256 आवश्यक रूप से hash160 से तेज़ नहीं है, hash160 को कमजोरियों के कारण अप्रचलित नहीं किया गया था, और हैश फ़ंक्शन का चुनाव स्क्रिप्ट के आकार की सीमाओं को प्रभावित नहीं करता है।
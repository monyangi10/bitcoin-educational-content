question: 為什麼 P2WSH 使用 SHA256 而非 hash160 (RIPEMD160+SHA256) 作為見證程式中的腳本承諾？
answer: SHA256 提供 32 位元組的切細值，使 P2WSH 有別於 P2WPKH 的 20 位元組切細值160 ，並為複雜的腳本提供更強大的安全性。
wrong_answers:
  - SHA256 的計算速度比 hash160 更快，可減少高吞吐量情況下複雜的多位元交易的驗證時間
  - 「由於在 Bitcoin 早期開發階段發現潛在碰撞漏洞，Hash160 在 SegWit 中被廢棄」
  - SHA256 允許見證指令碼大於 520 位元組，而 hash160 則對指令碼複雜性施加嚴格的大小限制
explanation: |
  P2WSH 使用 SHA256 來建立 32 位元組的雜湊值，專門用來區別於 P2WPKH 的 20 位元組雜湊值 160 承諾，讓節點可以立即識別見證程式版本。較長的哈希值也為可能具有較高價值或較多攻擊面的複雜腳本提供更強的安全性。其他選項是不正確的：SHA256 不一定比 hash160 快，hash160 並未因漏洞而被廢棄，而且雜湊函數的選擇不會影響腳本大小限制。
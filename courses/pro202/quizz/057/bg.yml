question: Защо P2WSH използва хеширане SHA256 вместо хеш160 (RIPEMD160+SHA256) за ангажимента на скрипта в програмите за свидетели?
answer: SHA256 осигурява 32-байтово хеширане, което отличава P2WSH от 20-байтовото хеширане на P2WPKH160 и предлага по-голяма сигурност за сложни скриптове
wrong_answers:
  - SHA256 се изчислява по-бързо от hash160, което намалява времето за валидиране на сложни многозначни транзакции при сценарии с висока производителност
  - "Hash160 беше премахнат в SegWit поради потенциални уязвимости при сблъсък, открити по време на ранната фаза на разработка на Bitcoin"
  - SHA256 позволява на скриптовете на свидетели да бъдат по-големи от 520 байта, докато hash160 налага строги ограничения за размера на скриптовете
explanation: |
  P2WSH използва SHA256 за създаване на 32-байтови хешове специално за разграничаване от 20-байтовия хеш на P2WPKH160 , което позволява на възлите незабавно да идентифицират версията на програмата на свидетеля. По-дългият хеш също така осигурява повишена сигурност за сложни скриптове, които могат да имат по-висока стойност или по-голяма повърхност за атака. Другите варианти са некоректни: SHA256 не е непременно по-бърза от hash160, hash160 не е изчерпана поради уязвимости и изборът на хеш функция не влияе на ограниченията за размера на скриптовете.
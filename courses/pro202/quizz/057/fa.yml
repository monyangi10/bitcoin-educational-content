question: چرا P2WSH از هشینگ SHA256 به جای hash160 (RIPEMD160+SHA256) برای تعهد اسکریپت در برنامه‌های شاهد استفاده می‌کند؟
answer: SHA256 یک هش 32 بایتی ارائه می‌دهد که P2WSH را از هش160 20 بایتی P2WPKH متمایز می‌کند و امنیت قوی‌تری برای اسکریپت‌های پیچیده ارائه می‌دهد.
wrong_answers:
  - SHA256 سریع‌تر از hash160 محاسبه می‌شود و زمان اعتبارسنجی تراکنش‌های پیچیده multisig را در سناریوهای با توان عملیاتی بالا کاهش می‌دهد.
  - "هش160 در SegWit به دلیل آسیب‌پذیری‌های احتمالی برخورد که در مرحله اولیه توسعه Bitcoin کشف شد، منسوخ شد"
  - SHA256 اجازه می‌دهد که اسکریپت‌های شاهد بزرگتر از 520 بایت باشند، در حالی که hash160 محدودیت‌های سختگیرانه‌ای بر پیچیدگی اسکریپت اعمال می‌کرد.
explanation: |
  P2WSH از SHA256 برای ایجاد هش‌های 32 بایتی استفاده می‌کند تا به‌طور خاص از تعهد 20 بایتی hash160 در P2WPKH متمایز شود و به نودها اجازه دهد تا فوراً نسخه برنامه شاهد را شناسایی کنند. هش طولانی‌تر همچنین امنیت بیشتری برای اسکریپت‌های پیچیده که ممکن است ارزش بالاتر یا سطح حمله بیشتری داشته باشند، فراهم می‌کند. گزینه‌های دیگر نادرست هستند: SHA256 لزوماً سریع‌تر از hash160 نیست، hash160 به دلیل آسیب‌پذیری‌ها منسوخ نشده است و انتخاب تابع هش بر محدودیت‌های اندازه اسکریپت تأثیر نمی‌گذارد.
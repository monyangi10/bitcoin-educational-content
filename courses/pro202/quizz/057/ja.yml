question: なぜ P2WSH は証人プログラムのスクリプトのコミットメントに hash160 (RIPEMD160+SHA256) ではなく SHA256 ハッシュを使用するのですか？
answer: SHA256は32バイトのハッシュを提供し、P2WSHをP2WPKHの20バイトのハッシュ160と区別し、複雑なスクリプトに対してより強力なセキュリティを提供する。
wrong_answers:
  - SHA256はhash160よりも計算が速く、高スループット・シナリオにおける複雑なマルチシグ・トランザクションの検証時間を短縮する。
  - "Hash160は、Bitcoinの初期開発段階で発見された潜在的な衝突の脆弱性のため、SegWitで非推奨となった"
  - SHA256では、証人スクリプトのサイズが520バイトを超えることが許されているが、hash160ではスクリプトの複雑さに対して厳格なサイズ制限が課せられている。
explanation: |
  P2WSHはSHA256を使用して32バイトのハッシュを作成し、特にP2WPKHの20バイトのハッシュ160コミットメントと区別することで、ノードが証人プログラムのバージョンを即座に識別できるようにしています。より長いハッシュはまた、より高い値またはより多くの攻撃面を持つ可能性のある複雑なスクリプトのための強化されたセキュリティを提供します。SHA256は必ずしもhash160より高速ではなく、hash160は脆弱性のために廃止されたわけではなく、ハッシュ関数の選択はスクリプトのサイズ制限に影響しません。
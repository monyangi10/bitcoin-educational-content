question: P2WSH가 증인 프로그램에서 스크립트 커밋에 해시160(RIPEMD160+SHA256) 대신 SHA256 해싱을 사용하는 이유는 무엇인가요?
answer: SHA256은 32바이트 해시를 제공하여 P2WSH를 P2WPKH의 20바이트 해시160과 구별하고 복잡한 스크립트에 대해 더 강력한 보안을 제공합니다
wrong_answers:
  - SHA256은 해시160보다 계산 속도가 빠르므로 처리량이 많은 시나리오에서 복잡한 다중 서명 트랜잭션의 유효성 검사 시간을 단축합니다
  - "해시160은 Bitcoin의 초기 개발 단계에서 발견된 잠재적인 충돌 취약성으로 인해 SegWit에서 더 이상 사용되지 않습니다."
  - SHA256은 520바이트보다 큰 증인 스크립트를 허용하는 반면, 해시160은 스크립트 복잡성에 대해 엄격한 크기 제한을 적용했습니다
explanation: |
  P2WSH는 SHA256을 사용하여 32바이트 해시를 생성함으로써 P2WPKH의 20바이트 해시160 커미트먼트와 차별화하여 노드가 감시 프로그램 버전을 즉시 식별할 수 있도록 합니다. 또한 해시가 길어질수록 더 높은 가치나 더 많은 공격 표면을 가질 수 있는 복잡한 스크립트에 대한 보안이 강화됩니다. SHA256이 해시160보다 반드시 빠른 것은 아니며, 해시160은 취약성으로 인해 더 이상 사용되지 않으며, 해시 함수 선택은 스크립트 크기 제한에 영향을 미치지 않습니다.
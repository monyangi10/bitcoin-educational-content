question: 为什么 P2WSH 在见证程序的脚本承诺中使用 SHA256 而不是 hash160 (RIPEMD160+SHA256)？
answer: SHA256 提供 32 字节的哈希值，使 P2WSH 有别于 P2WPKH 的 20 字节哈希值160 ，并为复杂脚本提供更强的安全性
wrong_answers:
  - SHA256 的计算速度比 hash160 更快，从而缩短了高吞吐量情况下复杂多位交易的验证时间
  - "由于在 Bitcoin 的早期开发阶段发现了潜在的碰撞漏洞，Hash160 在 SegWit 中被弃用。"
  - SHA256 允许见证脚本的大小超过 520 字节，而 hash160 则对脚本的复杂性施加了严格的大小限制
explanation: |
  P2WSH 使用 SHA256 创建 32 字节的哈希值，以区别于 P2WPKH 的 20 字节哈希值 160 承诺，使节点能够立即识别见证程序版本。较长的哈希值还能增强复杂脚本的安全性，这些脚本可能具有更高的价值或更大的攻击面。其他选项都不正确：SHA256 不一定比 hash160 快，hash160 并未因漏洞而被弃用，而且哈希函数的选择不会影响脚本大小限制。
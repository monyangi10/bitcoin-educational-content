question: Почему P2WSH использует хэширование SHA256 вместо хэша160 (RIPEMD160+SHA256) для выполнения скриптов в программах-свидетелях?
answer: SHA256 обеспечивает 32-байтовый хэш, что отличает P2WSH от 20-байтового хэша P2WPKH160 и обеспечивает более надежную защиту сложных скриптов
wrong_answers:
  - SHA256 вычисляется быстрее, чем хэш160, что сокращает время проверки сложных многозначных транзакций в сценариях с высокой пропускной способностью
  - "Hash160 был устаревшим в SegWit из-за потенциальных уязвимостей коллизий, обнаруженных на ранней стадии разработки Bitcoin"
  - SHA256 позволяет скриптам свидетелей иметь размер более 520 байт, в то время как хэш160 накладывает строгие ограничения на сложность скриптов
explanation: |
  P2WSH использует SHA256 для создания 32-байтовых хэшей специально для отличия от 20-байтового хэша P2WPKH160, что позволяет узлам сразу определить версию программы-свидетеля. Более длинный хэш также обеспечивает повышенную безопасность сложных сценариев, которые могут иметь большую ценность или большую площадь атаки. Остальные варианты неверны: SHA256 не обязательно быстрее, чем hash160, hash160 не был устаревшим из-за уязвимостей, а выбор хэш-функции не влияет на ограничения размера сценария.
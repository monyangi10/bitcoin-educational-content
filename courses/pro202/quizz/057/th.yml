question: ทำไม P2WSH ถึงใช้การแฮช SHA256 แทนที่จะเป็น hash160 (RIPEMD160+SHA256) สำหรับการผูกมัดสคริปต์ในโปรแกรมพยาน?
answer: SHA256 ให้แฮชขนาด 32 ไบต์ที่แยก P2WSH ออกจากแฮช160 ขนาด 20 ไบต์ของ P2WPKH และให้ความปลอดภัยที่แข็งแกร่งยิ่งขึ้นสำหรับสคริปต์ที่ซับซ้อน
wrong_answers:
  - SHA256 เร็วกว่าในการคำนวณเมื่อเทียบกับ hash160 ลดเวลาการตรวจสอบสำหรับธุรกรรม multisig ที่ซับซ้อนในสถานการณ์ที่มีการส่งผ่านข้อมูลสูง
  - "Hash160 ถูกยกเลิกใน SegWit เนื่องจากพบช่องโหว่การชนกันที่อาจเกิดขึ้นในระหว่างขั้นตอนการพัฒนาแรกของ Bitcoin"
  - SHA256 อนุญาตให้สคริปต์พยานมีขนาดใหญ่กว่า 520 ไบต์ ในขณะที่ hash160 กำหนดข้อจำกัดขนาดที่เข้มงวดต่อความซับซ้อนของสคริปต์
explanation: |
  P2WSH ใช้ SHA256 เพื่อสร้างแฮชขนาด 32 ไบต์โดยเฉพาะเพื่อแยกความแตกต่างจากการผูกมัด hash160 ขนาด 20 ไบต์ของ P2WPKH ทำให้โหนดสามารถระบุเวอร์ชันโปรแกรมพยานได้ทันที แฮชที่ยาวขึ้นยังให้ความปลอดภัยที่เพิ่มขึ้นสำหรับสคริปต์ที่ซับซ้อนซึ่งอาจมีมูลค่าสูงกว่าหรือมีพื้นผิวการโจมตีมากกว่า ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: SHA256 ไม่จำเป็นต้องเร็วกว่า hash160, hash160 ไม่ได้ถูกยกเลิกเนื่องจากช่องโหว่, และการเลือกฟังก์ชันแฮชไม่ส่งผลต่อขีดจำกัดขนาดสคริปต์
question: การตรวจสอบความถูกต้องที่สำคัญสองประการที่โหนด Bitcoin ต้องดำเนินการเมื่อได้รับบล็อกใหม่ก่อนที่จะยอมรับเข้าสู่บล็อกเชนคืออะไร?
answer: แฮชบล็อกต้องต่ำกว่าความยากเป้าหมายและรูทเมอร์เคิลที่คำนวณต้องตรงกับรูทเมอร์เคิลของส่วนหัว
wrong_answers:
  - เวลาประทับของบล็อกต้องถูกต้องและลายเซ็นธุรกรรมทั้งหมดต้องได้รับการยืนยันทางการเข้ารหัส
  - ขนาดบล็อกต้องน้อยกว่า 1MB และแฮชของบล็อกก่อนหน้าต้องอ้างอิงถึงบล็อกที่ถูกต้องที่รู้จัก
  - เวอร์ชันบล็อกต้องตรงกับฉันทามติของเครือข่ายและค่าธรรมเนียมการทำธุรกรรมทั้งหมดต้องเกินรางวัล mining
explanation: |
  หลักการ "don't trust, verify" ของ Bitcoin ต้องการการตรวจสอบพื้นฐานสองอย่างสำหรับการยอมรับบล็อก: การตรวจสอบ proof-of-work (แฮชบล็อกต่ำกว่าเป้าหมายความยาก) และการตรวจสอบความสมบูรณ์ของธุรกรรม (การจับคู่ราก Merkle) ในขณะที่การตรวจสอบอื่นๆ เช่น การตรวจสอบเวลาประทับ, การตรวจสอบลายเซ็น, และขีดจำกัดขนาดมีความสำคัญ การตรวจสอบสองอย่างนี้เฉพาะเจาะจงเพื่อให้แน่ใจว่าบล็อกตรงตามข้อกำหนดความยากและมีธุรกรรมที่อ้างถึงโดยไม่มีการปลอมแปลง
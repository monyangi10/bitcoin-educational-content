question: Bitcoin 節點在接收新區塊進入區塊鏈之前，必須執行哪兩項關鍵驗證檢查？
answer: 區塊切細值必須低於目標難度，且計算出的 Merkle 根必須與標頭的 Merkle 根相符
wrong_answers:
  - 區塊時間戳必須有效，所有交易簽章必須經過加密驗證
  - 區塊大小必須小於 1MB，且之前的區塊切細值必須參考已知的有效區塊
  - 區塊版本必須符合網路共識，且總交易費用必須超過 mining 獎勵
explanation: |
  Bitcoin 的「不要信任，要驗證」原則正好要求對區塊接受進行兩項基本檢查：proof-of-work 驗證 (區塊哈希值低於難度目標) 和交易完整性驗證 (Merkle 根匹配)。雖然時間戳驗證、簽名驗證和大小限制等其他檢查也很重要，但這兩項特定檢查可確保區塊符合難度要求，並包含所聲稱的交易，不會被篡改。
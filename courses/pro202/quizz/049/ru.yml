question: Какие две критические проверки должен выполнить узел Bitcoin при получении нового блока, прежде чем принять его в блокчейн?
answer: Хеш блока должен быть ниже целевой сложности, а вычисленный корень Меркла должен совпадать с корнем Меркла заголовка
wrong_answers:
  - Временная метка блока должна быть действительной, а все подписи транзакций должны быть криптографически проверены
  - Размер блока должен быть меньше 1 МБ, а хэш предыдущего блока должен ссылаться на известный действительный блок
  - Версия блока должна соответствовать консенсусу сети, а общая сумма транзакций должна превышать вознаграждение mining
explanation: |
  Принцип Bitcoin "не доверяй, а проверяй" требует ровно двух фундаментальных проверок для принятия блока: Проверка proof-of-work (хэш блока ниже целевого значения сложности) и проверка целостности транзакции (совпадение корня Меркла). Хотя другие проверки, такие как проверка временной метки, проверка подписи и ограничения размера, важны, эти две специфические проверки гарантируют, что блок соответствует требованиям сложности и содержит заявленные транзакции без подделки.
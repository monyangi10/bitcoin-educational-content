question: Кои са двете критични проверки, които възел Bitcoin трябва да извърши, когато получи нов блок, преди да го приеме в блокчейна?
answer: Хешът на блока трябва да е под целевата трудност, а изчисленият корен на Merkle трябва да съвпада с корена на Merkle на заглавието
wrong_answers:
  - Времевият печат на блока трябва да е валиден и всички подписи на транзакциите трябва да са криптографски проверени
  - Размерът на блока трябва да е под 1 MB, а хешът на предишния блок трябва да се отнася до известен валиден блок
  - Версията на блока трябва да съответства на мрежовия консенсус, а общите такси за транзакциите трябва да надвишават възнаграждението mining
explanation: |
  Принципът на Bitcoin "не се доверявай, а проверявай" изисква точно две основни проверки за приемане на блока: proof-of-work (хеш на блока под целта за трудност) и проверка на целостта на транзакцията (съвпадение на корена на Меркъл). Макар че други проверки като валидиране на времеви маркери, проверка на подписи и ограничения на размера са важни, тези две специфични проверки гарантират, че блокът отговаря на изискванията за трудност и съдържа заявените транзакции без фалшификации.
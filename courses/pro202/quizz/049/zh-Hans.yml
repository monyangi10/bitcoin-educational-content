question: Bitcoin 节点在接收新区块并将其纳入区块链之前，必须执行哪两项关键验证检查？
answer: 块哈希值必须低于目标难度，计算出的 Merkle 根必须与标头的 Merkle 根相匹配
wrong_answers:
  - 区块时间戳必须有效，所有交易签名必须经过加密验证
  - 区块大小必须小于 1MB，前一个区块哈希值必须引用已知的有效区块
  - 区块版本必须与网络共识一致，总交易费用必须超过 mining 奖励
explanation: |
  Bitcoin 的 "不信任，要验证 "原则要求对区块接受进行两项基本检查：proof-of-work 验证（区块哈希值低于难度目标）和交易完整性验证（默克尔根匹配）。虽然时间戳验证、签名验证和大小限制等其他检查也很重要，但这两项特定检查可确保区块满足难度要求，并包含所声称的交易，而不会被篡改。
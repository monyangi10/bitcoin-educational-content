question: ब्लॉकचेन में किसी नए ब्लॉक को स्वीकार करने से पहले, Bitcoin नोड को उसे प्राप्त करते समय कौन से दो महत्वपूर्ण सत्यापन जांच करने होते हैं?
answer: ब्लॉक हैश लक्ष्य कठिनाई से कम होना चाहिए और परिकलित मर्कल रूट हेडर के मर्कल रूट से मेल खाना चाहिए।
wrong_answers:
  - ब्लॉक टाइमस्टैम्प वैध होना चाहिए और सभी लेनदेन हस्ताक्षरों का क्रिप्टोग्राफिक सत्यापन होना चाहिए।
  - ब्लॉक का आकार 1MB से कम होना चाहिए और पिछले ब्लॉक का हैश किसी ज्ञात वैध ब्लॉक को संदर्भित करना चाहिए।
  - ब्लॉक संस्करण नेटवर्क सर्वसम्मति से मेल खाना चाहिए और कुल लेनदेन शुल्क mining इनाम से अधिक होना चाहिए।
explanation: |
  Bitcoin का "भरोसा न करें, सत्यापित करें" सिद्धांत ब्लॉक स्वीकृति के लिए दो मूलभूत जाँचों की आवश्यकता रखता है: proof-of-work सत्यापन (ब्लॉक हैश कठिनाई लक्ष्य से नीचे) और लेनदेन अखंडता सत्यापन (मर्कल रूट मिलान)। हालाँकि टाइमस्टैम्प सत्यापन, हस्ताक्षर सत्यापन और आकार सीमा जैसी अन्य जाँचें भी महत्वपूर्ण हैं, लेकिन ये दो विशिष्ट जाँचें सुनिश्चित करती हैं कि ब्लॉक कठिनाई आवश्यकताओं को पूरा करता है और उसमें दावा किए गए लेनदेन बिना किसी छेड़छाड़ के मौजूद हैं।
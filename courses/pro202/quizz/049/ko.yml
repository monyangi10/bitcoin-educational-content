question: Bitcoin 노드가 새 블록을 블록체인에 수락하기 전에 수행해야 하는 두 가지 중요한 검증 검사는 무엇인가요?
answer: 블록 해시는 목표 난이도보다 낮아야 하며 계산된 머클 루트는 헤더의 머클 루트와 일치해야 합니다
wrong_answers:
  - 블록 타임스탬프가 유효해야 하며 모든 트랜잭션 서명이 암호학적으로 확인되어야 합니다
  - 블록 크기는 1MB 미만이어야 하며 이전 블록 해시는 알려진 유효한 블록을 참조해야 합니다
  - 블록 버전은 네트워크 합의와 일치해야 하며 총 트랜잭션 수수료는 mining 보상을 초과해야 합니다
explanation: |
  Bitcoin의 "신뢰하지 말고 검증하라"는 원칙은 블록 수락을 위해 정확히 두 가지 기본 확인을 요구합니다: proof-of-work 검증(난이도 목표 이하의 블록 해시)과 트랜잭션 무결성 검증(머클 루트 매칭)이 그것입니다. 타임스탬프 검증, 서명 검증, 크기 제한과 같은 다른 검사도 중요하지만, 이 두 가지 특정 검사는 블록이 난이도 요건을 충족하고 변조 없이 청구된 트랜잭션을 포함하는지 확인합니다.
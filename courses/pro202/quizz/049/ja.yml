question: Bitcoinノードが新しいブロックを受け取ったとき、ブロックチェーンに受け入れる前に行わなければならない2つの重要な検証チェックとは何ですか？
answer: ブロックハッシュはターゲット難易度以下でなければならず、計算されたMerkleルートはヘッダーのMerkleルートと一致しなければならない。
wrong_answers:
  - ブロック・タイムスタンプは有効でなければならず、すべてのトランザクション署名は暗号的に検証されなければならない。
  - ブロックサイズは1MB以下でなければならず、前のブロックハッシュは既知の有効なブロックを参照しなければならない。
  - ブロックのバージョンはネットワークのコンセンサスと一致しなければならず、取引手数料の合計はminingの報酬を上回らなければならない。
explanation: |
  Bitcoinの "信用せず、検証する "原則は、ブロックを受け入れるために2つの基本的なチェックを必要とする：proof-of-workの検証（難易度ターゲット以下のブロックハッシュ）とトランザクションの完全性検証（Merkleルートマッチング）である。タイムスタンプ検証、署名検証、サイズ制限などの他のチェックも重要であるが、これら2つの特定のチェックは、ブロックが難易度要件を満たし、改ざんされることなく主張されたトランザクションを含むことを保証する。
question: دو بررسی تأیید حیاتی که یک نود Bitcoin باید هنگام دریافت یک بلاک جدید قبل از پذیرش آن در بلاکچین انجام دهد چیست؟
answer: هش بلوک باید زیر سختی هدف باشد و ریشه مرکل محاسبه‌شده باید با ریشه مرکل هدر مطابقت داشته باشد.
wrong_answers:
  - مهر زمانی بلوک باید معتبر باشد و تمامی امضاهای تراکنش باید به صورت رمزنگاری شده تأیید شوند.
  - اندازه بلوک باید کمتر از 1MB باشد و هش بلوک قبلی باید به یک بلوک معتبر شناخته‌شده اشاره کند.
  - نسخه بلاک باید با اجماع شبکه مطابقت داشته باشد و مجموع کارمزدهای تراکنش باید از پاداش mining بیشتر باشد.
explanation: |
  اصل "اعتماد نکنید، تأیید کنید" در Bitcoin نیازمند دقیقاً دو بررسی اساسی برای پذیرش بلاک است: اعتبارسنجی proof-of-work (هش بلاک زیر هدف سختی) و تأیید یکپارچگی تراکنش (مطابقت ریشه مرکل). در حالی که بررسی‌های دیگری مانند اعتبارسنجی زمان‌سنج، تأیید امضا و محدودیت‌های اندازه مهم هستند، این دو بررسی خاص اطمینان می‌دهند که بلاک با الزامات سختی مطابقت دارد و تراکنش‌های ادعا شده را بدون دستکاری شامل می‌شود.
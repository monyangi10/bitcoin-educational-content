question: Bitcoin 공개 키에 비압축 SEC 형식보다 압축된 SEC 형식을 사용하면 어떤 주요 이점이 있나요?
answer: 동일한 암호화 보안을 유지하면서 스토리지 크기를 65바이트에서 33바이트로 줄였습니다
wrong_answers:
  - 추가 암호화 계층을 사용하여 더욱 강력한 암호화 보안을 제공합니다
  - 서명 확인 프로세스 중 포인트 곱셈 연산을 더 빠르게 수행할 수 있습니다
  - 단일 압축 형식에서 여러 개의 공개 키를 파생할 수 있습니다
explanation: |
  압축 SEC 형식은 전체 좌표 대신 x 좌표와 패리티 비트(0x02 또는 0x03 접두사)만 저장하여 공개 키 크기를 65바이트(비압축)에서 33바이트로 줄입니다. 타원 곡선은 주어진 x에 대해 최대 두 개의 y값을 가지므로 y-좌표는 x-좌표와 패리티 정보로부터 수학적으로 재구성할 수 있습니다. 이 압축은 보안 손실 없이 상당한 저장 공간을 절약하므로 현재 Bitcoin에서는 효율성을 위해 압축 키를 선호합니다.
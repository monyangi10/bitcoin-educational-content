question: 在 Bitcoin 公钥中使用压缩 SEC 格式比使用非压缩 SEC 格式的主要优势是什么？
answer: 它可将存储容量从 65 字节减少到 33 字节，同时保持相同的加密安全性
wrong_answers:
  - 它通过使用额外的加密层提供更强的加密安全性
  - 它能在签名验证过程中加快点乘法运算速度
  - 它允许从单个压缩格式导出多个公钥
explanation: |
  压缩 SEC 格式只存储 x 坐标和一个奇偶校验位（0x02 或 0x03 前缀），而不是两个完整坐标，从而将公钥大小从 65 字节（未压缩）减少到 33 字节。y 坐标可以根据 x 坐标和奇偶校验信息进行数学重构，因为对于任何给定的 x，椭圆曲线都最多有两个 y 值。
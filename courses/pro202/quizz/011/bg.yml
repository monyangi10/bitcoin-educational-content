question: Кое е основното предимство на използването на компресиран формат SEC пред некомпресиран формат SEC за публични ключове Bitcoin?
answer: Той намалява размера на паметта от 65 байта на 33 байта, като запазва същата криптографска сигурност
wrong_answers:
  - Той осигурява по-силна криптографска сигурност чрез използване на допълнителни слоеве за криптиране
  - Той позволява по-бързи операции за умножение на точки при проверката на подписи
  - Той позволява извличането на множество публични ключове от един компресиран формат
explanation: |
  Компресираният формат SEC намалява размера на публичния ключ от 65 байта (некомпресиран) на 33 байта, като вместо двете пълни координати съхранява само координатата x и бит за четност (префикс 0x02 или 0x03). Координатата y може да бъде математически реконструирана от координатата x и информацията за четността, тъй като елиптичните криви имат най-много две стойности y за всяко дадено x. Това компресиране осигурява значителна икономия на място за съхранение без загуба на сигурност, поради което Bitcoin вече предпочита компресирани ключове за ефективност.
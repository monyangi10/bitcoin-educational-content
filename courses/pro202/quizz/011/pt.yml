question: Qual é a principal vantagem da utilização do formato SEC comprimido em relação ao formato SEC não comprimido para as chaves públicas Bitcoin?
answer: Reduz o tamanho do armazenamento de 65 bytes para 33 bytes, mantendo a mesma segurança criptográfica
wrong_answers:
  - Proporciona uma segurança criptográfica mais forte através da utilização de camadas de encriptação adicionais
  - Permite operações de multiplicação de pontos mais rápidas durante os processos de verificação de assinaturas
  - Permite que várias chaves públicas sejam derivadas de um único formato comprimido
explanation: |
  O formato SEC comprimido reduz o tamanho da chave pública de 65 bytes (não comprimido) para 33 bytes, armazenando apenas a coordenada x e um bit de paridade (prefixo 0x02 ou 0x03) em vez das duas coordenadas completas. A coordenada y pode ser reconstruída matematicamente a partir da coordenada x e da informação de paridade, uma vez que as curvas elípticas têm no máximo dois valores y para qualquer x. Esta compressão permite poupanças de armazenamento significativas sem qualquer perda de segurança, razão pela qual o Bitcoin prefere agora chaves comprimidas para maior eficiência.
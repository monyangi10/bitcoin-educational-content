question: Bitcoin सार्वजनिक कुंजियों के लिए असंपीड़ित SEC प्रारूप की तुलना में संपीड़ित SEC प्रारूप का उपयोग करने का मुख्य लाभ क्या है?
answer: यह क्रिप्टोग्राफिक सुरक्षा को समान रखते हुए स्टोरेज साइज को 65 बाइट्स से घटाकर 33 बाइट्स कर देता है।
wrong_answers:
  - यह अतिरिक्त एन्क्रिप्शन परतों का उपयोग करके अधिक मजबूत क्रिप्टोग्राफिक सुरक्षा प्रदान करता है।
  - यह हस्ताक्षर सत्यापन प्रक्रियाओं के दौरान बिंदु गुणन कार्यों को तेजी से करने में सक्षम बनाता है।
  - यह एक ही संपीड़ित प्रारूप से कई सार्वजनिक कुंजियाँ प्राप्त करने की अनुमति देता है।
explanation: |
  संपीड़ित SEC प्रारूप सार्वजनिक कुंजी का आकार 65 बाइट्स (असंपीड़ित) से घटाकर 33 बाइट्स कर देता है, क्योंकि इसमें पूर्ण निर्देशांकों के बजाय केवल x-निर्देशांक और एक समता बिट (0x02 या 0x03 उपसर्ग) संग्रहीत होते हैं। y-निर्देशांक को x-निर्देशांक और समता जानकारी से गणितीय रूप से पुनर्निर्मित किया जा सकता है, क्योंकि दीर्घवृत्तीय वक्रों में किसी भी दिए गए x के लिए अधिकतम दो y-मान होते हैं। यह संपीड़न सुरक्षा में कोई कमी किए बिना महत्वपूर्ण भंडारण बचत प्रदान करता है, यही कारण है कि Bitcoin अब दक्षता के लिए संपीड़ित कुंजियों को प्राथमिकता देता है।
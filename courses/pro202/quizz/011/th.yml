question: ข้อได้เปรียบหลักของการใช้รูปแบบ SEC ที่บีบอัดมากกว่ารูปแบบ SEC ที่ไม่บีบอัดสำหรับคีย์สาธารณะ Bitcoin คืออะไร?
answer: มันลดขนาดการจัดเก็บจาก 65 ไบต์เป็น 33 ไบต์ในขณะที่ยังคงรักษาความปลอดภัยทางการเข้ารหัสไว้เหมือนเดิม
wrong_answers:
  - มันให้ความปลอดภัยทางการเข้ารหัสที่แข็งแกร่งขึ้นโดยการใช้ชั้นการเข้ารหัสเพิ่มเติม
  - ช่วยให้การคูณจุดเร็วขึ้นในระหว่างกระบวนการตรวจสอบลายเซ็น
  - มันอนุญาตให้สร้างคีย์สาธารณะหลายตัวจากรูปแบบบีบอัดเดียว
explanation: |
  รูปแบบ SEC แบบบีบอัดลดขนาดคีย์สาธารณะจาก 65 ไบต์ (ไม่บีบอัด) เหลือ 33 ไบต์โดยการจัดเก็บเฉพาะพิกัด x และบิตพาริตี้ (คำนำหน้า 0x02 หรือ 0x03) แทนที่จะเป็นพิกัดเต็มทั้งสอง พิกัด y สามารถสร้างขึ้นใหม่ทางคณิตศาสตร์จากพิกัด x และข้อมูลพาริตี้เนื่องจากเส้นโค้งวงรีมีค่า y ได้มากที่สุดสองค่า สำหรับค่า x ที่กำหนด การบีบอัดนี้ให้การประหยัดพื้นที่จัดเก็บอย่างมากโดยไม่สูญเสียความปลอดภัยใด ๆ ซึ่งเป็นเหตุผลที่ Bitcoin ตอนนี้ชอบคีย์แบบบีบอัดเพื่อประสิทธิภาพ
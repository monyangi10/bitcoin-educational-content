question: 對於 Bitcoin 公開金鑰，使用壓縮 SEC 格式而非非壓縮 SEC 格式的主要優勢是什麼？
answer: 它將儲存大小從 65 位元組減少到 33 位元組，同時維持相同的加密安全性
wrong_answers:
  - 它透過使用額外的加密層提供更強大的加密安全性
  - 它能在簽章驗證過程中加快點乘運算速度
  - 它允許從單一壓縮格式衍生出多個公開金鑰
explanation: |
  壓縮 SEC 格式只儲存 x 座標和一個奇偶位元 (0x02 或 0x03 前綴)，而不是兩個完整的座標，因此可以將公開金鑰的大小從 65 位元組 (未壓縮) 減少到 33 位元組。由於橢圓曲線對於任何給定的 x 最多有兩個 y 值，因此 y 座標可以從 x 座標和奇偶位元資訊以數學方式重建。此壓縮技術可大幅節省儲存空間而不會造成任何安全性損失，這也是 Bitcoin 現在偏好使用壓縮金鑰以提高效率的原因。
question: طبق قضیه کوچک فرما، معکوس ضربی عنصر n در یک میدان اول F(p) چیست؟
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  قضیه کوچک فرما بیان می‌کند که n^(p-1) ≡ 1 (mod p) برای هر عنصر غیر صفر n در یک میدان اول. برای یافتن معکوس ضربی، به مقداری نیاز داریم که وقتی در n ضرب شود، 1 بدهد. از آنجا که n^(p-1) ≡ 1، می‌توانیم این را به صورت n · n^(p-2) ≡ 1 بازنویسی کنیم، که ثابت می‌کند n^(p-2) معکوس ضربی n است. گزینه‌های دیگر نادرست هستند: n^(p-1) برابر 1 است طبق قضیه فرما، در حالی که n^(p+1) و n^(p+2) مقادیر معادل n^2 و n^3 به ترتیب خواهند داد وقتی به پیمانه p کاهش یابند.
question: फ़र्मेट के लघु प्रमेय के अनुसार, एक अभाज्य क्षेत्र F(p) में तत्व n का गुणनात्मक प्रतिलोम क्या है?
answer: n^(p-2) मॉड p
wrong_answers:
  - n^(p-1) मॉड p
  - n^(p+1) मॉड p
  - n^(p+2) मॉड p
explanation: |
  फ़र्मेट के लघु प्रमेय के अनुसार, किसी अभाज्य क्षेत्र में किसी भी गैर-शून्य तत्व n के लिए n^(p-1) ≡ 1 (mod p) होता है। गुणात्मक प्रतिलोम ज्ञात करने के लिए, हमें एक ऐसे मान की आवश्यकता होती है जिसे n से गुणा करने पर 1 प्राप्त हो। चूंकि n^(p-1) ≡ 1 है, इसलिए हम इसे n · n^(p-2) ≡ 1 के रूप में लिख सकते हैं, जिससे यह सिद्ध होता है कि n^(p-2) n का गुणात्मक प्रतिलोम है। अन्य विकल्प गलत हैं: फ़र्मेट के प्रमेय के अनुसार n^(p-1) का मान 1 होता है, जबकि n^(p+1) और n^(p+2) को मॉड्यूलो p से कम करने पर क्रमशः n^2 और n^3 के समतुल्य मान प्राप्त होंगे।
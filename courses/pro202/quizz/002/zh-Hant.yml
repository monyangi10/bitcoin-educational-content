question: 根據費馬小定理，元素 n 在素域 F(p) 中的乘法逆數是多少？
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  費馬小定理指出，對於素域中的任何非零元素 n，n^(p-1) ≡ 1 (mod p)。為了找出乘法逆，我們需要一個乘以 n 得 1 的值。由於 n^(p-1) ≡ 1，我們可以重寫為 n - n^(p-2) ≡ 1，證明 n^(p-2) 是 n 的乘法逆。其他選項都是不正確的：根據費馬定理，n^(p-1) 等於 1，而 n^(p+1) 和 n^(p+2) 在減模為 p 時會分別得到等於 n^2 和 n^3 的值。
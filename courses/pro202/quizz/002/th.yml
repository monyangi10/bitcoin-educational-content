question: ตามทฤษฎีบทเล็กของแฟร์มาต์, อะไรคืออินเวอร์สการคูณของธาตุ n ในฟิลด์เฉพาะ F(p)?
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  ทฤษฎีบทเล็กของแฟร์มาต์ระบุว่า n^(p-1) ≡ 1 (mod p) สำหรับทุกองค์ประกอบที่ไม่เป็นศูนย์ n ในฟิลด์เฉพาะ เมื่อหาค่าผกผันการคูณ เราต้องการค่าที่เมื่อคูณกับ n แล้วได้ 1 เนื่องจาก n^(p-1) ≡ 1 เราสามารถเขียนใหม่เป็น n · n^(p-2) ≡ 1 ซึ่งพิสูจน์ว่า n^(p-2) เป็นค่าผกผันการคูณของ n ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: n^(p-1) เท่ากับ 1 ตามทฤษฎีบทของแฟร์มาต์ ในขณะที่ n^(p+1) และ n^(p+2) จะให้ค่าที่เทียบเท่ากับ n^2 และ n^3 ตามลำดับเมื่อทำการลดโมดูโล p
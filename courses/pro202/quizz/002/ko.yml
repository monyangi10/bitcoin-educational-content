question: 페르마의 작은 정리에 따르면, 소수장 F(p)에서 원소 n의 곱셈 역수는 무엇입니까?
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(P+2) MOD P
explanation: |
  페르마의 소정리에 따르면 소수장에서 0이 아닌 모든 원소 n에 대해 n^(p-1) ≡ 1(mod p)입니다. 곱셈의 역을 구하려면 n을 곱하면 1이 되는 값이 필요합니다. N^(p-1) ≡ 1이므로, 이를 n - n^(p-2) ≡ 1로 다시 써서 n^(p-2)가 n의 곱셈 역수임을 증명할 수 있습니다. 페르마의 정리에 따르면 n^(p-1)은 1과 같고, n^(p+1)과 n^(p+2)는 p를 모듈로 환원하면 각각 n^2와 n^3에 해당하는 값이 됩니다.
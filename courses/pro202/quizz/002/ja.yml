question: フェルマーの小定理によれば、素体F(p)における要素nの乗法的逆数は？
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  フェルマーの小定理は、素数体における0でない任意の要素nについて、n^(p-1)≡1(mod p)とする。乗法的逆数を求めるには、nを掛けると1になる値が必要である。n^(p-1) ≡ 1なので、n - n^(p-2) ≡ 1と書き直すことができ、n^(p-2)がnの乗法的逆数であることが証明される。n^(p-1)はフェルマーの定理により1に等しいが、n^(p+1)とn^(p+2)はpを減速したときにそれぞれn^2とn^3に等しい値を与える。
question: Согласно Малой теореме Ферма, что является мультипликативной обратной величиной элемента n в простом поле F(p)?
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  Малая теорема Ферма утверждает, что n^(p-1) ≡ 1 (mod p) для любого ненулевого элемента n в простом поле. Чтобы найти мультипликативную обратную величину, нам нужно значение, которое при умножении на n дает 1. Поскольку n^(p-1) ≡ 1, мы можем переписать это как n - n^(p-2) ≡ 1, доказав, что n^(p-2) - мультипликативная обратная величина от n. Другие варианты неверны: n^(p-1) равно 1 по теореме Ферма, а n^(p+1) и n^(p+2) при сокращении по модулю p дадут значения, эквивалентные n^2 и n^3 соответственно.
question: Според Малката теорема на Ферма каква е обратната мултипликативна величина на елемент n в простото поле F(p)?
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  Малката теорема на Ферма гласи, че n^(p-1) ≡ 1 (mod p) за всеки ненулев елемент n в едно просто поле. За да намерим обратната мултипликативна величина, се нуждаем от стойност, която, умножена по n, дава 1. Тъй като n^(p-1) ≡ 1, можем да препишем това като n - n^(p-2) ≡ 1, доказвайки, че n^(p-2) е обратната мултипликативна величина на n. Другите варианти са неверни: n^(p-1) е равно на 1 по теоремата на Ферма, а n^(p+1) и n^(p+2) биха дали стойности, еквивалентни съответно на n^2 и n^3, когато се редуцират модулно по p.
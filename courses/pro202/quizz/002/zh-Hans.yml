question: 根据费马小定理，元素 n 在素域 F(p) 中的乘法逆是多少？
answer: n^(p-2) mod p
wrong_answers:
  - n^(p-1) mod p
  - n^(p+1) mod p
  - n^(p+2) mod p
explanation: |
  费马小定理指出，对于素域中的任何非零元素 n，n^(p-1) ≡ 1 (mod p)。要找到乘法逆，我们需要一个与 n 相乘得 1 的值。由于 n^(p-1) ≡ 1，我们可以将其改写为 n - n^(p-2) ≡ 1，从而证明 n^(p-2) 是 n 的乘法逆。其他选项都是错误的：根据费马大定理，n^(p-1) 等于 1，而 n^(p+1) 和 n^(p+2) 在以 p 为模减时，其值分别等于 n^2 和 n^3。
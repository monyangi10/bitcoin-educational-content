question: 楕円曲線上でk-Pの逆演算を計算不可能にする数学的性質とは？
answer: 離散対数問題
wrong_answers:
  - 有限体モジュラー算術
  - 無限遠点特性
  - 曲線の方程式 y² = x³ + 7
explanation: |
  離散対数問題は、楕円曲線暗号を安全にする数学的基礎である。k-P（スカラー倍）を計算するのは計算上簡単だが、Pとk-Pが与えられたときにkを求めるのは非常に難しい。これは楕円曲線離散対数問題として知られている。有限体算術は演算を可能にし、無限遠の点は恒等要素として機能し、曲線方程式は構造を定義するが、いずれもBitcoinの暗号の安全性を保護する計算不可能性を生じさせない。
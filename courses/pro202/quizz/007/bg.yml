question: Кое математическо свойство прави невъзможно обръщането на операцията k-P върху елиптична крива?
answer: Проблемът за дискретния логаритъм
wrong_answers:
  - Модулна аритметика на крайно поле
  - Свойството на точката в безкрайността
  - Уравнението на кривата y² = x³ + 7
explanation: |
  Задачата за дискретния логаритъм е математическата основа, която прави криптографията с елиптична крива сигурна. Докато изчисляването на k-P (скаларно умножение) е лесно, намирането на k при дадени P и k-P е изключително трудно - това е известно като проблем на дискретния логаритъм на елиптичната крива. Другите варианти са важни математически компоненти, но не осигуряват бариерата за сигурност: аритметиката на крайното поле позволява операциите, точката в безкрайността служи като идентификационен елемент, а уравнението на кривата определя структурата, но нито един от тях не създава изчислителната невъзможност, която защитава криптографската сигурност на Bitcoin.
question: Ni ikihe kintu c’imibare gituma mu buryo bw’imibare bidashoboka guhindura igikorwa k·P ku nzira y’uruzitiro?
answer: Ikibazo ca logarithme
wrong_answers:
  - Imibare y'imibare y'umurima ufise iherezo
  - Intumbero iri ku mutungo utagira iherezo
  - Ingano y'umurongo y2 = x3 + 7
explanation: |
  Ikibazo ca logarithme itandukanye ni umushinge w’imibare utuma ubuhinga bwo gukingira amakuru y’uruzitiro rw’uruzitiro butekanye. Naho guharura k·P (ugukubita kw’ibiharuro) vyoroshe mu kubara, kuronka k iyo uhawe P na k·P biragoye cane - ivyo bizwi nk’ingorane y’uruzitiro rw’uruzitiro rw’uruzitiro rw’uruzitiro. Ibindi bihitamwo ni ibice bihambaye vy'imibare ariko ntibitanga inzitizi y'umutekano: imibare y'umurima ufise impera irashoboza ibikorwa, akarongo ku butagira impera gakora nk'ikintu c'akaranga, kandi ingano y'umurongo isobanura imiterere, ariko nta na kimwe muri ivyo kirema ubudashoboka bw'imibare burinda umutekano w'ibanga rya Bitcoin.
question: Какое математическое свойство делает вычислительно невыполнимой обратную операцию k-P на эллиптической кривой?
answer: Задача о дискретном логарифме
wrong_answers:
  - Модульная арифметика конечных полей
  - Свойство точки на бесконечности
  - Уравнение кривой y² = x³ + 7
explanation: |
  Проблема дискретного логарифма - это математическая основа, которая делает криптографию на эллиптических кривых безопасной. В то время как вычислить k-P (скалярное умножение) вычислительно легко, найти k при заданных P и k-P чрезвычайно сложно - это известно как проблема дискретного логарифма эллиптической кривой. Другие варианты являются важными математическими компонентами, но не обеспечивают барьер безопасности: арифметика конечных полей позволяет выполнять операции, точка на бесконечности служит элементом тождества, а уравнение кривой определяет структуру, но ни один из них не создает той вычислительной невыполнимости, которая защищает криптографическую безопасность Bitcoin.
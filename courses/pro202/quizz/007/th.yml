question: สมบัติทางคณิตศาสตร์ใดที่ทำให้การย้อนกลับการดำเนินการ k·P บนเส้นโค้งวงรีเป็นเรื่องที่ไม่สามารถคำนวณได้?
answer: ปัญหาลอการิทึมไม่ต่อเนื่อง
wrong_answers:
  - เลขคณิตโมดูลาร์ของฟิลด์จำกัด
  - คุณสมบัติของจุดที่อนันต์
  - สมการเส้นโค้ง y² = x³ + 7
explanation: |
  ปัญหาลอการิทึมแบบไม่ต่อเนื่องเป็นพื้นฐานทางคณิตศาสตร์ที่ทำให้การเข้ารหัสลับแบบเส้นโค้งวงรีมีความปลอดภัย ในขณะที่การคำนวณ k·P (การคูณสเกลาร์) นั้นทำได้ง่ายทางคอมพิวเตอร์ การหาค่า k เมื่อให้ P และ k·P นั้นยากมาก - ซึ่งเป็นที่รู้จักกันในชื่อปัญหาลอการิทึมแบบไม่ต่อเนื่องของเส้นโค้งวงรี ตัวเลือกอื่น ๆ เป็นส่วนประกอบทางคณิตศาสตร์ที่สำคัญแต่ไม่ได้ให้กำแพงความปลอดภัย: เลขคณิตฟิลด์จำกัดช่วยให้การดำเนินการเป็นไปได้ จุดที่อินฟินิตี้ทำหน้าที่เป็นธาตุเอกลักษณ์ และสมการของเส้นโค้งกำหนดโครงสร้าง แต่ไม่มีสิ่งใดที่สร้างความยากลำบากในการคำนวณที่ปกป้องความปลอดภัยในการเข้ารหัสของ Bitcoin
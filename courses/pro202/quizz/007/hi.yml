question: कौन सा गणितीय गुणधर्म एक दीर्घवृत्तीय वक्र पर k·P क्रिया को उलटने को परिकलनात्मक रूप से असंभव बनाता है?
answer: असतत लघुगणक समस्या
wrong_answers:
  - परिमित क्षेत्र मॉड्यूलर अंकगणित
  - अनंत बिंदु का गुणधर्म
  - वक्र का समीकरण y² = x³ + 7 है।
explanation: |
  असतत लघुगणक समस्या वह गणितीय आधार है जो दीर्घवृत्तीय वक्र क्रिप्टोग्राफी को सुरक्षित बनाती है। k·P (स्केलर गुणन) की गणना करना तो सरल है, लेकिन P और k·P दिए जाने पर k ज्ञात करना अत्यंत कठिन है - इसे ही दीर्घवृत्तीय वक्र असतत लघुगणक समस्या कहा जाता है। अन्य विकल्प महत्वपूर्ण गणितीय घटक हैं, लेकिन सुरक्षा अवरोध प्रदान नहीं करते: परिमित क्षेत्र अंकगणित संक्रियाओं को सक्षम बनाता है, अनंत पर स्थित बिंदु पहचान तत्व के रूप में कार्य करता है, और वक्र समीकरण संरचना को परिभाषित करता है, लेकिन इनमें से कोई भी वह गणनात्मक असंभवता उत्पन्न नहीं करता जो Bitcoin की क्रिप्टोग्राफिक सुरक्षा की रक्षा करती है।
question: 是什么数学特性使得在椭圆曲线上反向运算 k-P 在计算上不可行？
answer: 离散对数问题
wrong_answers:
  - 有限域模块算术
  - 无穷远点属性
  - 曲线方程 y² = x³ + 7
explanation: |
  离散对数问题是确保椭圆曲线加密技术安全的数学基础。虽然计算 k-P（标量乘法）在计算上很容易，但在给定 P 和 k-P 的情况下找到 k 却极其困难，这就是所谓的椭圆曲线离散对数问题。其他选项都是重要的数学组成部分，但并不能提供安全屏障：有限域算术可以进行运算，无穷远处的点可以作为标识元素，曲线方程定义了结构，但这些选项都没有产生保护 Bitcoin 密码安全的计算不可行性。
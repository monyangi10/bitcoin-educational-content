question: 타원 곡선에서 k-P 연산을 역산하는 것이 계산적으로 불가능하게 만드는 수학적 성질은 무엇인가요?
answer: 이산 로그 문제
wrong_answers:
  - 유한 필드 모듈식 산술
  - 무한대의 지점 속성
  - 곡선 방정식 y² = x³ + 7
explanation: |
  이산 로그 문제는 타원 곡선 암호화를 안전하게 만드는 수학적 토대입니다. K-P(스칼라 곱셈)를 계산하는 것은 계산적으로 쉽지만, P와 k-P가 주어졌을 때 k를 구하는 것은 매우 어려운데, 이를 타원 곡선 이산 로그 문제라고 합니다. 다른 옵션은 중요한 수학적 구성 요소이지만 보안 장벽을 제공하지는 않습니다. 유한 필드 산술은 연산을 가능하게 하고 무한대의 점은 동일성 요소로 사용되며 곡선 방정식은 구조를 정의하지만 이 중 어느 것도 Bitcoin의 암호화 보안을 보호하는 계산 불가능성을 만들지 못합니다.
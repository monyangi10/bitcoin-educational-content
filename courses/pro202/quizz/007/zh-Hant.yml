question: 什麼數學特性使得在橢圓曲線上反向運算 k-P 在計算上不可行？
answer: 離散對數問題
wrong_answers:
  - 有限域模態算術
  - 無窮遠點屬性
  - 曲線方程式 y² = x³ + 7
explanation: |
  離散對數問題是橢圓曲線加密安全的數學基礎。雖然計算 k-P（標量乘法）在計算上很容易，但當給定 P 和 k-P 時，找出 k 卻非常困難 - 這就是所謂的橢圓曲線離散對數問題。其他選項都是重要的數學元件，但無法提供安全障礙：有限場運算可實現運算、無限點可作為識別元素、曲線方程式可定義結構，但這些選項都無法創造出可保護 Bitcoin 密碼安全性的計算不可行性。
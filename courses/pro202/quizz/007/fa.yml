question: چه ویژگی ریاضیاتی باعث می‌شود که معکوس کردن عملیات k·P بر روی یک منحنی بیضوی از نظر محاسباتی غیرممکن باشد؟
answer: مسئله لگاریتم گسسته
wrong_answers:
  - حساب مدولار میدان متناهی
  - خاصیت نقطه در بی‌نهایت
  - معادله منحنی y² = x³ + 7
explanation: |
  مسئله لگاریتم گسسته پایه ریاضی است که رمزنگاری منحنی بیضوی را امن می‌سازد. در حالی که محاسبه k·P (ضرب اسکالر) از نظر محاسباتی آسان است، یافتن k وقتی که P و k·P داده شده‌اند، بسیار دشوار است - این به عنوان مسئله لگاریتم گسسته منحنی بیضوی شناخته می‌شود. گزینه‌های دیگر اجزای ریاضی مهمی هستند اما مانع امنیتی را فراهم نمی‌کنند: حساب فیلد متناهی عملیات را ممکن می‌سازد، نقطه در بی‌نهایت به عنوان عنصر همانی عمل می‌کند، و معادله منحنی ساختار را تعریف می‌کند، اما هیچ‌کدام از این‌ها عدم امکان محاسباتی که امنیت رمزنگاری Bitcoin را محافظت می‌کند، ایجاد نمی‌کنند.
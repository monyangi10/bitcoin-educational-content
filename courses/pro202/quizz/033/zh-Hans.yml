question: 在使用 P2SH 输出时，必须经过哪两个步骤的验证过程才能认为交易有效？
answer: 首先验证赎回脚本的 HASH160 与 scriptPubKey 哈希值是否匹配，然后使用提供的数据执行赎回脚本
wrong_answers:
  - 首先用提供的数据执行赎回脚本，然后验证生成的哈希值是否与 scriptPubKey 匹配
  - 首先根据公钥验证所有签名是否有效，然后检查赎回脚本哈希值是否匹配
  - 首先确认赎回脚本包含有效操作码，然后验证脚本执行是否产生真实结果
explanation: |
  P2SH 验证需要一个特定的两步流程：首先，提供的兑换脚本的哈希值必须与 scriptPubKey 中的 20 字节哈希值相匹配（HASH160 验证），只有在验证通过后，网络才会使用解锁数据执行兑换脚本本身。这种设计确保了只有正确的赎回脚本才能被使用，同时在消费发生前隐藏了实际的消费条件。其他选项描述的是看似合理但不正确的验证序列，并不遵循实际的 P2SH 协议。
question: P2SHのアウトプットを使用する際、トランザクションが有効とみなされるためには、どのような2段階の検証プロセスが必要ですか？
answer: まず、redeemスクリプトのHASH160がscriptPubKeyハッシュと一致することを確認し、次に提供されたデータでredeemスクリプトを実行する。
wrong_answers:
  - まず、提供されたデータでredeemスクリプトを実行し、その結果のハッシュがscriptPubKeyと一致することを確認する。
  - まず、すべての署名が公開鍵に対して有効であることを確認し、次にredeemスクリプトのハッシュが以下のものと一致することをチェックする。
  - まず、redeemスクリプトに有効なオペコードが含まれていることを確認し、次にスクリプトの実行が真の結果を生成することを確認する。
explanation: |
  P2SHの検証には、特定の2段階のプロセスが必要です。まず、提供された引き換えスクリプトのハッシュが、scriptPubKeyの20バイトのハッシュと一致しなければなりません（HASH160検証）。そして、この検証に合格した後にのみ、ネットワークはロック解除データを使って引き換えスクリプト自体を実行します。この設計により、正しい redeem スクリプトのみが使用されるようになり、実際の使用条件は使用されるま で隠蔽されます。他のオプションでは、実際のP2SHプロトコルに従わない、もっともらしいが不正確な検証シーケンスについて説明している。
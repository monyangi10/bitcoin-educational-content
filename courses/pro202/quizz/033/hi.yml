question: P2SH आउटपुट खर्च करते समय, लेन-देन को वैध माने जाने के लिए कौन सी दो-चरणीय सत्यापन प्रक्रिया होनी चाहिए?
answer: सबसे पहले यह सत्यापित करें कि रिडीम स्क्रिप्ट का HASH160, scriptPubKey के हैश से मेल खाता है, फिर दिए गए डेटा के साथ रिडीम स्क्रिप्ट को निष्पादित करें।
wrong_answers:
  - सबसे पहले दिए गए डेटा के साथ रिडीम स्क्रिप्ट को चलाएं, फिर सत्यापित करें कि परिणामी हैश स्क्रिप्टपबकी से मेल खाता है।
  - सबसे पहले यह सत्यापित करें कि सभी हस्ताक्षर उनकी सार्वजनिक कुंजियों के विरुद्ध मान्य हैं, फिर जांचें कि रिडीम स्क्रिप्ट हैश मेल खाता है या नहीं।
  - सबसे पहले यह सुनिश्चित करें कि रिडीम स्क्रिप्ट में वैध ऑपकोड मौजूद हैं, फिर सत्यापित करें कि स्क्रिप्ट का निष्पादन सही परिणाम देता है।
explanation: |
  P2SH सत्यापन के लिए एक विशिष्ट दो-चरणीय प्रक्रिया आवश्यक है: सबसे पहले, प्रदान किए गए रिडीम स्क्रिप्ट का हैश स्क्रिप्टपबकी (HASH160 सत्यापन) में मौजूद 20-बाइट हैश से मेल खाना चाहिए, और इस सत्यापन के सफल होने के बाद ही नेटवर्क अनलॉकिंग डेटा के साथ रिडीम स्क्रिप्ट को निष्पादित करता है। यह डिज़ाइन सुनिश्चित करता है कि केवल सही रिडीम स्क्रिप्ट का ही उपयोग किया जा सके, और खर्च होने तक वास्तविक खर्च की शर्तें गुप्त रखी जाएं। अन्य विकल्प संभावित लेकिन गलत सत्यापन अनुक्रमों का वर्णन करते हैं जो वास्तविक P2SH प्रोटोकॉल का पालन नहीं करते हैं।
question: При расходовании средств P2SH какой двухэтапный процесс проверки должен произойти, чтобы транзакция считалась действительной?
answer: Сначала проверьте, совпадает ли HASH160 скрипта redeem с хэшем scriptPubKey, затем выполните скрипт redeem с предоставленными данными
wrong_answers:
  - Сначала выполните скрипт redeem с предоставленными данными, а затем проверьте, совпадает ли полученный хэш с ключом scriptPubKey
  - Сначала проверьте, что все подписи соответствуют своим открытым ключам, затем проверьте, что хэш скрипта redeem совпадает
  - Сначала убедитесь, что сценарий выкупа содержит правильные опкоды, а затем проверьте, что выполнение сценария приводит к истинному результату
explanation: |
  Проверка P2SH требует особого двухэтапного процесса: сначала хэш предоставленного скрипта погашения должен совпасть с 20-байтовым хэшем в scriptPubKey (проверка HASH160), и только после прохождения этой проверки сеть выполняет сам скрипт погашения с данными для разблокировки. Такая конструкция гарантирует, что может быть использован только правильный сценарий погашения, при этом фактические условия траты остаются скрытыми до момента траты. Другие варианты описывают правдоподобные, но неверные последовательности проверки, которые не соответствуют реальному протоколу P2SH.
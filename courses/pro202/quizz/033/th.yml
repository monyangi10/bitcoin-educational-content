question: เมื่อใช้จ่ายเอาต์พุต P2SH กระบวนการตรวจสอบสองขั้นตอนใดที่ต้องเกิดขึ้นเพื่อให้ธุรกรรมถือว่าถูกต้อง?
answer: ขั้นแรกตรวจสอบว่า HASH160 ของ redeem script ตรงกับ scriptPubKey hash จากนั้นดำเนินการ redeem script ด้วยข้อมูลที่ให้มา
wrong_answers:
  - ก่อนอื่นให้ดำเนินการสคริปต์แลกด้วยข้อมูลที่ให้มา จากนั้นตรวจสอบว่าผลลัพธ์แฮชตรงกับ scriptPubKey
  - ขั้นแรกให้ตรวจสอบว่าลายเซ็นทั้งหมดถูกต้องตามคีย์สาธารณะของพวกเขา จากนั้นตรวจสอบว่าแฮชสคริปต์การไถ่ถอนตรงกัน
  - ขั้นแรกยืนยันว่า redeem script มี opcodes ที่ถูกต้อง จากนั้นตรวจสอบว่าการดำเนินการของสคริปต์ให้ผลลัพธ์เป็นจริง
explanation: |
  การตรวจสอบ P2SH ต้องการกระบวนการสองขั้นตอนเฉพาะ: ขั้นแรก แฮชของสคริปต์แลกที่ให้มาต้องตรงกับแฮช 20 ไบต์ใน scriptPubKey (การตรวจสอบ HASH160) และหลังจากการตรวจสอบนี้ผ่าน เครือข่ายจึงจะดำเนินการสคริปต์แลกเองพร้อมกับข้อมูลปลดล็อก การออกแบบนี้ทำให้มั่นใจได้ว่าสามารถใช้ได้เฉพาะสคริปต์แลกที่ถูกต้องเท่านั้น ในขณะที่เงื่อนไขการใช้จ่ายจริงจะถูกซ่อนไว้จนกว่าจะเกิดการใช้จ่าย ตัวเลือกอื่นๆ อธิบายลำดับการตรวจสอบที่เป็นไปได้แต่ไม่ถูกต้องซึ่งไม่เป็นไปตามโปรโตคอล P2SH จริง
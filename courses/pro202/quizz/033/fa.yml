question: هنگام خرج کردن یک خروجی P2SH، چه فرآیند اعتبارسنجی دو مرحله‌ای باید انجام شود تا تراکنش معتبر تلقی شود؟
answer: ابتدا HASH160 اسکریپت بازخرید را با هش scriptPubKey مطابقت دهید، سپس اسکریپت بازخرید را با داده‌های ارائه شده اجرا کنید
wrong_answers:
  - ابتدا اسکریپت بازخرید را با داده‌های ارائه‌شده اجرا کنید، سپس تأیید کنید که هش حاصل با scriptPubKey مطابقت دارد.
  - ابتدا تأیید کنید که همه امضاها در برابر کلیدهای عمومی معتبر هستند، سپس بررسی کنید که هش اسکریپت بازخرید مطابقت دارد.
  - ابتدا تأیید کنید که اسکریپت بازخرید شامل اپ‌کدهای معتبر است، سپس تأیید کنید که اجرای اسکریپت نتیجه‌ای صحیح تولید می‌کند.
explanation: |
  P2SH اعتبارسنجی نیاز به یک فرآیند دو مرحله‌ای خاص دارد: ابتدا، هش اسکریپت بازخرید ارائه شده باید با هش 20 بایتی در scriptPubKey مطابقت داشته باشد (تأیید HASH160)، و تنها پس از گذراندن این تأیید، شبکه اسکریپت بازخرید را با داده‌های بازکننده اجرا می‌کند. این طراحی تضمین می‌کند که تنها اسکریپت بازخرید صحیح می‌تواند استفاده شود، در حالی که شرایط واقعی خرج کردن تا زمان وقوع خرج کردن پنهان می‌ماند. گزینه‌های دیگر توالی‌های اعتبارسنجی قابل قبول اما نادرستی را توصیف می‌کنند که از پروتکل واقعی P2SH پیروی نمی‌کنند.
question: При изразходване на средства от P2SH кой процес на валидиране трябва да се извърши в две стъпки, за да се счита транзакцията за валидна?
answer: Първо проверете дали HASH160 на скрипта за изкупуване съвпада с хеша на scriptPubKey, след което изпълнете скрипта за изкупуване с предоставените данни
wrong_answers:
  - Първо изпълнете скрипта за изкупуване с предоставените данни, след което проверете дали полученият хеш съвпада с scriptPubKey
  - Първо проверете дали всички подписи са валидни спрямо техните публични ключове, след което проверете дали хешът на скрипта redeem съвпада с
  - Първо потвърдете, че скриптът за изкупуване съдържа валидни опкодове, след което проверете дали изпълнението на скрипта дава верен резултат
explanation: |
  Проверката на P2SH изисква специфичен процес от две стъпки: първо, хешът на предоставения скрипт за изкупуване трябва да съвпада с 20-байтовия хеш в скриптаPubKey (проверка HASH160) и едва след като тази проверка премине успешно, мрежата изпълнява самия скрипт за изкупуване с данните за отключване. Този дизайн гарантира, че може да се използва само правилният скрипт за обратно изкупуване, като в същото време действителните условия за изразходване на средства остават скрити до момента на изразходването им. Другите варианти описват правдоподобни, но неправилни последователности на валидиране, които не следват действителния протокол P2SH.
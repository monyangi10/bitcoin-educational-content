question: P2SH 출력을 지출할 때, 거래가 유효한 것으로 간주되려면 어떤 2단계 유효성 검사 프로세스가 수행되어야 하나요?
answer: 먼저 리딤 스크립트의 해시160이 스크립트PubKey 해시와 일치하는지 확인한 다음, 제공된 데이터로 리딤 스크립트를 실행합니다
wrong_answers:
  - 먼저 제공된 데이터로 리딤 스크립트를 실행한 다음, 결과 해시가 스크립트PubKey와 일치하는지 확인합니다
  - 먼저 모든 서명이 공개 키에 대해 유효한지 확인한 다음, 교환 스크립트 해시가 일치하는지 확인합니다
  - 먼저 교환 스크립트에 유효한 옵코드가 포함되어 있는지 확인한 다음 스크립트 실행이 실제 결과를 생성하는지 확인합니다
explanation: |
  먼저 제공된 사용 스크립트의 해시가 스크립트PubKey의 20바이트 해시와 일치해야 하며(HASH160 검증), 이 검증을 통과해야만 네트워크에서 잠금 해제 데이터로 사용 스크립트 자체를 실행할 수 있는 2단계 프로세스가 필요합니다. 이러한 설계는 실제 지출이 발생할 때까지 실제 지출 조건을 숨긴 채 올바른 교환 스크립트만 사용할 수 있도록 보장합니다. 다른 옵션은 그럴듯하지만 실제 P2SH 프로토콜을 따르지 않는 잘못된 유효성 검사 시퀀스를 설명합니다.
question: 支出 P2SH 輸出時，必須經過哪兩個步驟的驗證程序，交易才能被視為有效？
answer: 首先驗證贖回指令碼的 HASH160 是否與 scriptPubKey 切細值相符，然後以提供的資料執行贖回指令碼
wrong_answers:
  - 首先使用提供的資料執行贖回指令碼，然後驗證結果的雜湊值是否與 scriptPubKey 吻合
  - 首先根據其公開金鑰驗證所有簽章是否有效，然後檢查贖回指令碼切細值是否匹配
  - 首先確認贖回指令碼包含有效的操作碼，然後驗證指令碼的執行會產生真正的結果
explanation: |
  P2SH 驗證需要特定的兩個步驟：首先，所提供的兌換腳本的雜湊值必須與 scriptPubKey 中的 20 位元組雜湊值相符（HASH160 驗證），只有在此驗證通過後，網路才會使用解鎖資料執行兌換腳本本身。此設計可確保只可使用正確的兌換指令碼，同時隱藏實際消費條件，直到消費發生為止。其他選項所描述的驗證順序看似合理，但並不符合實際的 P2SH 通訊協定。
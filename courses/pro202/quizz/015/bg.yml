question: Какво се случва с аритметичните операции, когато елиптичните криви са дефинирани над крайни полета вместо над реални числа?
answer: Всички операции използват модулна аритметика, като запазват същите алгебрични правила
wrong_answers:
  - Формулите за добавяне на точки трябва да бъдат изцяло пренаписани за дискретната математика
  - Изчисленията на наклона стават неопределени поради дискретния характер на точките
  - Всички алгебрични правила се променят фундаментално, за да се приспособят към структурата на крайното поле
explanation: |
  Когато елиптичните криви се прехвърлят от реални числа към крайни полета, основната алгебрична структура и правила остават идентични - само аритметиката се променя на модулна аритметика. Всички формули за добавяне на точки, пресмятания на наклони и геометрични зависимости работят по абсолютно същия начин, но всяко изчисление се извършва по модул p. Това запазване на алгебричните правила при промяна само на аритметичната основа е това, което прави елиптичните криви с крайни полета толкова мощни за криптографията - запазват се всички необходими математически свойства, като същевременно се създава дискретно, непредсказуемо поведение, необходимо за сигурността.
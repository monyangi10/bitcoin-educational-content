question: 当椭圆曲线定义在有限域而不是实数上时，算术运算会发生什么变化？
answer: 所有运算都使用模块化算术，同时保持相同的代数规则
wrong_answers:
  - 点的加法公式必须完全按照离散数学重写
  - 由于点的离散性，斜率计算变得不确定
  - 所有代数规则都发生了根本变化，以适应有限域结构
explanation: |
  当椭圆曲线从实数移到有限域时，其基本的代数结构和规则保持不变，只是运算方式变为模运算。所有点的加法公式、斜率计算和几何关系都以完全相同的方式进行，但每一次计算都是以 p 为模来进行的。这种只改变算术基础而保留代数规则的做法，正是有限域椭圆曲线在密码学中如此强大的原因，它既保留了所有必要的数学特性，又创造了对安全性至关重要的离散、不可预测的行为。
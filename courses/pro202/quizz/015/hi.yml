question: जब दीर्घवृत्तीय वक्रों को वास्तविक संख्याओं के बजाय परिमित क्षेत्रों पर परिभाषित किया जाता है, तो अंकगणितीय संक्रियाओं पर क्या प्रभाव पड़ता है?
answer: सभी संक्रियाओं में बीजगणितीय नियमों का पालन करते हुए मॉड्यूलर अंकगणित का उपयोग किया जाता है।
wrong_answers:
  - असतत गणित के लिए बिंदु योग सूत्रों को पूरी तरह से पुनः लिखना होगा।
  - बिंदुओं की असतत प्रकृति के कारण ढलान की गणनाएँ अपरिभाषित हो जाती हैं।
  - परिमित क्षेत्र संरचना को समायोजित करने के लिए सभी बीजगणितीय नियम मौलिक रूप से बदल जाते हैं।
explanation: |
  जब दीर्घवृत्तीय वक्रों को वास्तविक संख्याओं से परिमित क्षेत्रों में स्थानांतरित किया जाता है, तो अंतर्निहित बीजगणितीय संरचना और नियम अपरिवर्तित रहते हैं - केवल अंकगणित मॉड्यूलर अंकगणित में परिवर्तित हो जाता है। सभी बिंदु योग सूत्र, ढलान गणनाएँ और ज्यामितीय संबंध ठीक उसी तरह काम करते हैं, लेकिन प्रत्येक गणना मॉड्यूलो p के अनुसार की जाती है। बीजगणितीय नियमों का यह संरक्षण, केवल अंकगणितीय आधार को बदलते हुए, परिमित क्षेत्र दीर्घवृत्तीय वक्रों को क्रिप्टोग्राफी के लिए इतना शक्तिशाली बनाता है, जो सुरक्षा के लिए आवश्यक असतत, अप्रत्याशित व्यवहार का निर्माण करते हुए सभी आवश्यक गणितीय गुणों को बनाए रखता है।
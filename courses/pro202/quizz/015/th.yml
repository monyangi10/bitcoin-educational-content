question: จะเกิดอะไรขึ้นกับการดำเนินการทางคณิตศาสตร์เมื่อเส้นโค้งวงรีถูกกำหนดไว้เหนือฟิลด์จำกัดแทนที่จะเป็นจำนวนจริง?
answer: การดำเนินการทั้งหมดใช้เลขคณิตแบบโมดูลาร์ในขณะที่รักษากฎพีชคณิตเดียวกัน
wrong_answers:
  - สูตรการบวกจุดต้องถูกเขียนใหม่ทั้งหมดสำหรับคณิตศาสตร์เชิงไม่ต่อเนื่อง
  - การคำนวณความชันกลายเป็นไม่ได้กำหนดเนื่องจากลักษณะไม่ต่อเนื่องของจุด
  - กฎพีชคณิตทั้งหมดเปลี่ยนแปลงอย่างพื้นฐานเพื่อรองรับโครงสร้างฟิลด์จำกัด
explanation: |
  เมื่อเส้นโค้งวงรีถูกย้ายจากจำนวนจริงไปยังฟิลด์จำกัด โครงสร้างพีชคณิตพื้นฐานและกฎยังคงเหมือนเดิม - มีเพียงการคำนวณเลขคณิตที่เปลี่ยนไปเป็นเลขคณิตโมดูลาร์ สูตรการบวกจุดทั้งหมด การคำนวณความชัน และความสัมพันธ์ทางเรขาคณิตทำงานในลักษณะเดียวกันทุกประการ แต่ทุกการคำนวณจะดำเนินการโมดูลาร์ p การรักษากฎพีชคณิตในขณะที่เปลี่ยนเพียงพื้นฐานของเลขคณิตนี้คือสิ่งที่ทำให้เส้นโค้งวงรีฟิลด์จำกัดมีพลังมากสำหรับการเข้ารหัสลับ โดยรักษาคุณสมบัติทางคณิตศาสตร์ทั้งหมดที่จำเป็นในขณะที่สร้างพฤติกรรมที่ไม่ต่อเนื่องและคาดเดาไม่ได้ซึ่งจำเป็นสำหรับความปลอดภัย
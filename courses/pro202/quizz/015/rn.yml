question: Ni igiki kiba ku bikorwa vy’imibare iyo imirongo y’imirongo isobanuwe ku bibanza bifise impera aho gusobanura imibare nyayo?
answer: Ibikorwa vyose bikoresha imibare y'ibice mu gihe bigumya amategeko y'alijebura amwe
wrong_answers:
  - Amafomula yo kwongerako amanota ategerezwa gusubirwamwo ku biharuro bitandukanye
  - Imibare y'imirongo ihinduka idasobanutse kubera uburyo butandukanye bw'ibiharuro
  - Amategeko yose y'alijebura arahinduka cane kugira ngo ashobore kwakira imiterere y'umurima ufise impera
explanation: |
  Iyo imirongo y'imirongo y'uruzitiro ivuye mu mibare nyayo ikaja mu bibanza bifise impera, imiterere y'aligebra n'amategeko biguma ari kimwe - gusa imibare ihinduka ikaja mu mibare y'ibice. Amafomu yose yo kwongerako uturongo, imibare y’imirongo, n’imigenderanire y’imirongo bikora mu buryo bumwe nyene, ariko imibare yose ikorwa modulo p. Ukwo kuzigama amategeko y’imibare mu gihe guhindura gusa umushinge w’imibare ni co gituma imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imirongo y’imibare igira ububasha bwinshi cane ku bijanye n’ubuhinga bwo gupfuka amakuru, igakomeza imiterere yose y’imibare ikenewe mu gihe irema inyifato idasanzwe, idashobora kumenyekana ikenewe kugira ngo umuntu agire umutekano.
question: وقتی منحنی‌های بیضوی بر روی میدان‌های متناهی به جای اعداد حقیقی تعریف می‌شوند، عملیات حسابی تغییراتی را تجربه می‌کنند.
answer: همه عملیات از حساب مدولار استفاده می‌کنند در حالی که قوانین جبری یکسان را حفظ می‌کنند.
wrong_answers:
  - فرمول‌های جمع نقطه باید برای ریاضیات گسسته به‌طور کامل بازنویسی شوند.
  - محاسبات شیب به دلیل ماهیت گسسته نقاط تعریف‌نشده می‌شوند
  - همه قوانین جبری به طور اساسی تغییر می‌کنند تا ساختار میدان متناهی را در بر گیرند.
explanation: |
  وقتی منحنی‌های بیضوی از اعداد حقیقی به میدان‌های متناهی منتقل می‌شوند، ساختار جبری و قوانین زیربنایی بدون تغییر باقی می‌مانند - تنها حساب تغییر می‌کند به حساب مدولار. تمام فرمول‌های جمع نقطه، محاسبات شیب، و روابط هندسی دقیقاً به همان صورت عمل می‌کنند، اما هر محاسبه‌ای به صورت مدولار p انجام می‌شود. این حفظ قوانین جبری در حالی که تنها پایه حساب تغییر می‌کند، چیزی است که منحنی‌های بیضوی میدان متناهی را برای رمزنگاری بسیار قدرتمند می‌سازد، با حفظ تمام خواص ریاضی مورد نیاز در حالی که رفتار گسسته و غیرقابل پیش‌بینی ضروری برای امنیت را ایجاد می‌کند.
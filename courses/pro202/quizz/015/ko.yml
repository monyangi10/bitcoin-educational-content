question: 실수 대신 유한 필드에 타원 곡선을 정의하면 산술 연산은 어떻게 될까요?
answer: 모든 연산은 동일한 대수 규칙을 유지하면서 모듈식 산술을 사용합니다
wrong_answers:
  - 이산 수학을 위해 점 덧셈 공식을 완전히 다시 작성해야 합니다
  - 포인트의 불연속적인 특성으로 인해 기울기 계산이 정의되지 않습니다
  - 모든 대수 규칙은 유한 필드 구조를 수용하기 위해 근본적으로 변경됩니다
explanation: |
  타원 곡선을 실수에서 유한 필드로 옮길 때 기본 대수 구조와 규칙은 동일하게 유지되며 산술만 모듈식 산술로 변경됩니다. 모든 점 더하기 공식, 기울기 계산, 기하학적 관계는 정확히 동일한 방식으로 작동하지만 모든 계산은 모듈로 p로 수행됩니다. 이렇게 대수 규칙을 유지하면서 산술 기반만 변경하는 것이 유한 필드 타원 곡선이 암호화에 매우 강력한 이유이며, 필요한 모든 수학적 특성을 유지하면서 보안에 필수적인 예측 불가능한 이산 동작을 생성할 수 있게 합니다.
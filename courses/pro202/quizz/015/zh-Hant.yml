question: 當橢圓曲線定義在有限域而非實數上時，算術運算會發生什麼變化？
answer: 所有運算都使用模組運算，同時維持相同的代數規則
wrong_answers:
  - 離散數學的點加公式必須完全重寫
  - 由於點的離散特性，斜率計算變得不確定
  - 所有代數規則都有根本性的改變，以適應有限場結構
explanation: |
  當橢圓曲線從實數轉換到有限域時，底層的代數結構和規則保持相同 - 只有算術變為模運算。所有的點加公式、斜率計算和幾何關係都以完全相同的方式運作，但每項計算都是以 p 為模來執行。這種保留代數規則而只改變算術基礎的方式，正是有限域橢圓曲線在密碼學方面如此強大的原因，它保留了所有所需的數學特性，同時又創造了安全所必須的離散、不可預測的行為。
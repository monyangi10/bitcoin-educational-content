question: 楕円曲線が実数の代わりに有限体上で定義された場合、算術演算はどうなるのか？
answer: すべての演算は、同じ代数的ルールを維持しながらモジュラー算術を使用する。
wrong_answers:
  - 点足し算の公式は、離散数学用に完全に書き直さなければならない。
  - 勾配の計算は、点の離散的な性質のために不定になる。
  - すべての代数的規則は、有限体構造に対応するために根本的に変化する。
explanation: |
  楕円曲線が実数から有限体へと移っても、基礎となる代数的構造と規則は同じままである。すべての点加算の公式、傾きの計算、幾何学的関係はまったく同じように機能するが、すべての計算はpのモジュロで実行される。このように代数的なルールを維持しながら、算術的な基礎だけを変更することが、有限体楕円曲線を暗号技術にとって非常に強力なものにしているのである。
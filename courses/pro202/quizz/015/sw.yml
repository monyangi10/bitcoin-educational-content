question: Nini hutokea kwa shughuli za hesabu wakati mikunjo ya duaradufu inapofafanuliwa juu ya sehemu zenye kikomo badala ya nambari halisi?
answer: Shughuli zote hutumia hesabu za moduli huku zikidumisha sheria zile zile za aljebra
wrong_answers:
  - Fomula za kuongeza nukta lazima ziandikwe upya kabisa kwa hisabati tofauti
  - Mahesabu ya mteremko hayajafafanuliwa kutokana na asili tofauti ya nukta
  - Sheria zote za aljebra hubadilika kimsingi ili kuendana na muundo wa uwanja wenye kikomo
explanation: |
  Wakati mikunjo ya mviringo inapohamishwa kutoka nambari halisi hadi sehemu zenye kikomo, muundo na sheria za msingi za aljebra hubaki sawa - ni hesabu tu hubadilika hadi hesabu ya moduli. Fomula zote za kuongeza nukta, hesabu za mteremko, na uhusiano wa kijiometri hufanya kazi kwa njia ile ile, lakini kila hesabu hufanywa modulo p. Uhifadhi huu wa sheria za aljebra huku ukibadilisha msingi wa hesabu pekee ndio unaofanya mikunjo ya mviringo ya uwanja wenye kikomo kuwa na nguvu sana kwa usimbaji fiche, kudumisha sifa zote za hisabati zinazohitajika huku ikiunda tabia ya kipekee na isiyotabirika muhimu kwa usalama.
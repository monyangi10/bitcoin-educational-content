question: P2SHに包まれたSegWitトランザクションが、検証中に3層の検証ルールを使用する主な理由は何ですか？
answer: コンセンサスを維持しながら、BIP16以前、BIP16以後、SegWitノードの下位互換性を確保する。
wrong_answers:
  - トランザクションを受け入れる前に3つの暗号的証明を要求することで、セキュリティを3倍にする。
  - 検証作業負荷を異なる種類のノードに分散し、ネットワーク性能とスケーラビリティを向上させる。
  - 同じトランザクションデータを3つの独立した方法で検証することにより、double-spending攻撃を防ぐ。
explanation: |
  BIP16以前のノードはreedemScriptを有効なものとして受け入れ、BIP16以降のノードはOP_0 + ハッシュをスタックに残して評価し、SegWitノードは完全な立会人検証を実行する。このレイヤーアプローチは、セキュリティの乗算、パフォーマンスの分散、またはダブルスペンドの防止を主な動機として提案する間違った答えとは異なり、すべてのノードタイプが壊れることなくコンセンサスに参加できることを保証します。
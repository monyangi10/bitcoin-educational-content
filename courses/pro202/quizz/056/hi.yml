question: P2SH-लिपटे SegWit लेनदेन सत्यापन के दौरान सत्यापन नियमों की तीन परतों का उपयोग करने का प्राथमिक कारण क्या है?
answer: सर्वसम्मति बनाए रखते हुए प्री-बीआईपी16, पोस्ट-बीआईपी16 और जीडब्ल्यू-2 नोड्स में बैकवर्ड कम्पैटिबिलिटी सुनिश्चित करना।
wrong_answers:
  - लेनदेन को स्वीकार करने से पहले तीन अलग-अलग क्रिप्टोग्राफिक प्रमाणों की आवश्यकता करके सुरक्षा को तीन गुना बढ़ाना।
  - नेटवर्क के प्रदर्शन और स्केलेबिलिटी को बेहतर बनाने के लिए सत्यापन कार्यभार को विभिन्न नोड प्रकारों में वितरित करना।
  - तीन स्वतंत्र विधियों के माध्यम से समान लेनदेन डेटा को मान्य करके double-spending हमलों को रोकना।
explanation: |
  P2SH पर आधारित SegWit, विशेष रूप से बैकवर्ड कम्पैटिबिलिटी के लिए तीन वैलिडेशन लेयर्स का उपयोग करता है: BIP16 से पहले के नोड्स रिडीमस्क्रिप्ट को मान्य मानते हैं, BIP16 के बाद के नोड्स इसका मूल्यांकन करते हैं और स्टैक पर OP_0 + हैश छोड़ देते हैं, और SegWit नोड्स पूर्ण विटनेस वैलिडेशन करते हैं। यह लेयर्ड अप्रोच सुनिश्चित करता है कि सभी नोड प्रकार बिना किसी रुकावट के सर्वसम्मति में भाग ले सकें, उन गलत उत्तरों के विपरीत जो सुरक्षा गुणन, प्रदर्शन वितरण या डबल-स्पेंड रोकथाम को प्राथमिक प्रेरणा के रूप में सुझाते हैं।
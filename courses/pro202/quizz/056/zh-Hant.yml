question: 在驗證過程中，P2SH 包裹 SegWit 交易使用三層驗證規則的主要原因是什麼？
answer: 為確保前 BIP16、後 BIP16 及 SegWit 節點之間的向後相容性，同時維持共識
wrong_answers:
  - 在接受交易前要求三個獨立的加密證明，將安全性提高三倍
  - 將驗證工作負載分散至不同的節點類型，以改善網路效能與擴充性
  - 透過三種獨立方法驗證相同的交易資料，以防止 double-spending 攻擊
explanation: |
  P2SH wrapped SegWit 為了向下相容性，特別使用三層驗證層：BIP16 前的節點接受 redeemScript 為有效，BIP16 後的節點評估它，在堆疊上留下 OP_0 + 哈希，SegWit 節點執行完整的見證驗證。這種分層方式可確保所有節點類型都能參與共識，而不會破壞共識，不像錯誤答案所建議的安全性倍增、效能分佈或防止雙重花費為主要動機。
question: เหตุผลหลักที่ธุรกรรม P2SH-wrapped SegWit ใช้กฎการตรวจสอบสามชั้นระหว่างการยืนยันคืออะไร?
answer: เพื่อให้แน่ใจว่ามีความเข้ากันได้ย้อนหลังระหว่างโหนด pre-BIP16, post-BIP16 และ SegWit ในขณะที่ยังคงรักษาฉันทามติ
wrong_answers:
  - เพื่อเพิ่มความปลอดภัยเป็นสามเท่าโดยการต้องการหลักฐานการเข้ารหัสสามชุดแยกกันก่อนที่จะยอมรับการทำธุรกรรม
  - เพื่อกระจายภาระงานการตรวจสอบความถูกต้องไปยังประเภทโหนดต่างๆ เพื่อปรับปรุงประสิทธิภาพและความสามารถในการขยายตัวของเครือข่าย
  - เพื่อป้องกันการโจมตี double-spending โดยการตรวจสอบข้อมูลธุรกรรมเดียวกันผ่านสามวิธีที่เป็นอิสระ
explanation: |
  P2SH-wrapped SegWit ใช้เลเยอร์การตรวจสอบสามชั้นเพื่อความเข้ากันได้ย้อนหลัง: โหนด pre-BIP16 ยอมรับ redeemScript ว่าถูกต้อง, โหนด post-BIP16 ประเมินโดยทิ้ง OP_0 + hash ไว้บน stack, และโหนด SegWit ทำการตรวจสอบพยานอย่างเต็มรูปแบบ วิธีการแบบเลเยอร์นี้ทำให้แน่ใจว่าโหนดทุกประเภทสามารถมีส่วนร่วมในฉันทามติโดยไม่เกิดปัญหา แตกต่างจากคำตอบที่ผิดซึ่งแนะนำการคูณความปลอดภัย, การกระจายประสิทธิภาพ, หรือการป้องกันการใช้จ่ายซ้ำเป็นแรงจูงใจหลัก
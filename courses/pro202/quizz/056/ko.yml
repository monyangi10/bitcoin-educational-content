question: P2SH로 래핑된 SegWit 트랜잭션이 검증 중에 세 계층의 유효성 검사 규칙을 사용하는 주된 이유는 무엇인가요?
answer: 컨센서스를 유지하면서 BIP16 이전, BIP16 이후 및 SegWit 노드 간 하위 호환성을 보장하려면 다음과 같이 하세요
wrong_answers:
  - 거래를 수락하기 전에 세 가지 별도의 암호화 증명을 요구하여 보안을 세 배로 강화합니다
  - 네트워크 성능과 확장성을 개선하기 위해 다양한 노드 유형에 유효성 검사 워크로드를 분산하는 방법
  - 세 가지 독립적인 방법을 통해 동일한 트랜잭션 데이터를 검증하여 double-spending 공격을 방지합니다
explanation: |
  P2SH로 래핑된 SegWit는 이전 버전과의 호환성을 위해 특별히 세 가지 검증 레이어를 사용합니다. BIP16 이전 노드는 리딤스크립트를 유효한 것으로 받아들이고, BIP16 이후 노드는 OP_0 + 해시를 스택에 남겨두고 평가하며, SegWit 노드는 전체 증인 검증을 수행합니다. 이러한 계층화된 접근 방식은 보안 강화, 성능 분산 또는 이중 지출 방지를 주요 동기로 제시하는 오답과 달리 모든 노드 유형이 중단 없이 합의에 참여할 수 있도록 보장합니다.
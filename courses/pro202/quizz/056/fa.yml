question: دلیل اصلی استفاده از سه لایه قوانین اعتبارسنجی در تراکنش‌های P2SH-wrapped SegWit در طول فرآیند تأیید چیست؟
answer: برای اطمینان از سازگاری معکوس در میان نودهای قبل از BIP16، بعد از BIP16، و SegWit در حالی که اجماع حفظ می‌شود
wrong_answers:
  - برای سه برابر کردن امنیت با نیاز به سه اثبات رمزنگاری جداگانه قبل از پذیرش تراکنش
  - توزیع بار کاری اعتبارسنجی در انواع مختلف گره‌ها برای بهبود عملکرد و مقیاس‌پذیری شبکه
  - برای جلوگیری از حملات double-spending با اعتبارسنجی داده‌های تراکنش مشابه از طریق سه روش مستقل
explanation: |
  P2SH-wrapped SegWit از سه لایه اعتبارسنجی به‌طور خاص برای سازگاری به عقب استفاده می‌کند: نودهای قبل از BIP16، redeemScript را به‌عنوان معتبر می‌پذیرند، نودهای بعد از BIP16 آن را ارزیابی کرده و OP_0 + hash را روی استک باقی می‌گذارند، و نودهای SegWit اعتبارسنجی کامل witness را انجام می‌دهند. این رویکرد لایه‌ای تضمین می‌کند که همه انواع نودها می‌توانند بدون شکست در اجماع شرکت کنند، برخلاف پاسخ‌های نادرستی که امنیت چندگانه، توزیع عملکرد، یا جلوگیری از دوبار خرج کردن را به‌عنوان انگیزه‌های اصلی پیشنهاد می‌دهند.
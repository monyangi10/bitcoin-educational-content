question: P2SH 封装的 SegWit 交易在验证过程中使用三层验证规则的主要原因是什么？
answer: 确保 BIP16 前、BIP16 后和 SegWit 节点之间的向后兼容性，同时保持共识
wrong_answers:
  - 通过在接受交易前要求三个独立的加密证明，将安全性提高三倍
  - 将验证工作量分配给不同类型的节点，以提高网络性能和可扩展性
  - 通过三种独立方法验证相同的交易数据，防止 double-spending 攻击
explanation: |
  经过 P2SH 封装的 SegWit 采用了三个验证层，专门用于向后兼容：BIP16 之前的节点接受有效的 redeemScript，BIP16 之后的节点对其进行评估，将 OP_0 + 哈希值留在堆栈上，SegWit 节点执行完整的见证验证。这种分层方法可确保所有节点类型都能参与共识而不被破坏，而不像错误答案那样，将安全性倍增、性能分配或防止重复支出作为主要动机。
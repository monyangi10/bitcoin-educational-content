question: Bitcoin 的 secp256k1 使用的特定橢圓曲線方程式是什麼？
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoin 使用由有限欄位上 y² = x³ + 7 等式定義的 secp256k1 曲線。之所以選擇這個特定的等式，是因為它保留了對密碼安全性而言非常重要的對稱性和非線性行為。系數 7 是標準化 secp256k1 規格的一部分，並使其有別於其他可能使用不同常數 (如 1、3 或 5) 的橢圓曲線。
question: Bitcoin의 secp256k1에서 사용하는 구체적인 타원 곡선 방정식은 무엇인가요?
answer: y² = X³ + 7
wrong_answers:
  - y² = X³ + 3
  - y² = X³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoin은 유한 필드에 대해 y² = x³ + 7 방정식으로 정의된 secp256k1 곡선을 사용합니다. 이 특정 방정식은 암호화 보안에 필수적인 대칭성과 비선형 동작을 보존하기 때문에 선택되었습니다. 계수 7은 표준화된 secp256k1 사양의 일부이며 1, 3 또는 5와 같이 다른 상수를 사용할 수 있는 다른 타원 곡선과 구별됩니다.
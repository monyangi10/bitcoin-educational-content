question: Bitcoin के secp256k1 द्वारा उपयोग किया जाने वाला विशिष्ट दीर्घवृत्तीय वक्र समीकरण क्या है?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoin परिमित क्षेत्र पर y² = x³ + 7 समीकरण द्वारा परिभाषित secp256k1 वक्र का उपयोग करता है। इस विशिष्ट समीकरण को इसलिए चुना गया है क्योंकि यह क्रिप्टोग्राफिक सुरक्षा के लिए आवश्यक समरूपता और अरैखिक व्यवहार को संरक्षित रखता है। गुणांक 7 मानकीकृत secp256k1 विनिर्देश का हिस्सा है और इसे अन्य दीर्घवृत्तीय वक्रों से अलग करता है जो 1, 3 या 5 जैसे विभिन्न स्थिरांकों का उपयोग कर सकते हैं।
question: معادله خاص منحنی بیضوی استفاده شده توسط secp256k1 در Bitcoin چیست؟
answer: y² = x³ + 7
wrong_answers:
  - ²y = ³x + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoin از منحنی secp256k1 استفاده می‌کند که با معادله y² = x³ + 7 بر روی یک میدان محدود تعریف شده است. این معادله خاص به دلیل حفظ تقارن و رفتار غیرخطی که برای امنیت رمزنگاری ضروری است، انتخاب شده است. ضریب 7 بخشی از مشخصات استاندارد secp256k1 است و آن را از منحنی‌های بیضوی دیگر که ممکن است از ثابت‌های متفاوتی مانند 1، 3 یا 5 استفاده کنند، متمایز می‌کند.
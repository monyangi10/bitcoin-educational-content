question: สมการเส้นโค้งวงรีเฉพาะที่ใช้โดย Bitcoin's secp256k1 คืออะไร?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoin ใช้เส้นโค้ง secp256k1 ที่กำหนดโดยสมการ y² = x³ + 7 บนฟิลด์จำกัด สมการเฉพาะนี้ถูกเลือกเพราะมันรักษาความสมมาตรและพฤติกรรมที่ไม่เป็นเชิงเส้นซึ่งจำเป็นสำหรับความปลอดภัยทางการเข้ารหัส สัมประสิทธิ์ 7 เป็นส่วนหนึ่งของข้อกำหนดมาตรฐาน secp256k1 และแยกแยะมันจากเส้นโค้งวงรีอื่น ๆ ที่อาจใช้ค่าคงที่ต่างกันเช่น 1, 3, หรือ 5
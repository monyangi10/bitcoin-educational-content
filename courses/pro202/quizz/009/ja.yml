question: Bitcoinのsecp256k1で使われている楕円曲線の方程式は？
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  Bitcoinは、有限体上の方程式y² = x³ + 7で定義されるsecp256k1曲線を使用する。この特定の式が選ばれたのは、暗号の安全性に不可欠な対称性と非線形挙動を保持するためである。係数7は標準化されたsecp256k1の仕様の一部であり、1、3、5といった異なる定数を使用する他の楕円曲線と区別される。
question: Какое конкретное уравнение эллиптической кривой используется в Bitcoin's secp256k1?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  В Bitcoin используется кривая secp256k1, определяемая уравнением y² = x³ + 7 над конечным полем. Это конкретное уравнение было выбрано потому, что оно сохраняет симметрию и нелинейное поведение, необходимые для криптографической безопасности. Коэффициент 7 является частью стандартизированной спецификации secp256k1 и отличает ее от других эллиптических кривых, которые могут использовать другие константы, например 1, 3 или 5.
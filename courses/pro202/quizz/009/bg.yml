question: Какво е специфичното уравнение на елиптичната крива, използвано от секп256k1 на Bitcoin?
answer: y² = x³ + 7
wrong_answers:
  - y² = x³ + 3
  - y² = x³ + 5
  - y² = x³ + 1
explanation: |
  В Bitcoin се използва кривата secp256k1, дефинирана с уравнението y² = x³ + 7 над крайно поле. Това специфично уравнение е избрано, защото запазва симетрията и нелинейното поведение, които са от съществено значение за криптографската сигурност. Коефициентът 7 е част от стандартизираната спецификация на secp256k1 и я отличава от други елиптични криви, които могат да използват различни константи като 1, 3 или 5.
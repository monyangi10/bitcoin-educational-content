question: Bitcoin 交易输入中序列号字段的主要用途是什么？
answer: 启用计时器和收费更换（RBF）功能
wrong_answers:
  - 指定矿工处理输入的顺序
  - 为每个输入创建唯一标识符，以防止 double-spending
  - 指示计算费用时交易的优先级别
explanation: |
  Bitcoin 交易输入中的序列号字段有两个主要用途：实施时间锁（延迟交易确认时间）和启用费用替换（RBF）功能（允许用户增加未确认交易的费用）。其他选项不正确的原因是：矿工不需要按照任何特定顺序处理输入，double-spending 预防由 UTXO 模型和区块链共识而不是序列号处理，交易优先级由收费率而不是序列号决定。
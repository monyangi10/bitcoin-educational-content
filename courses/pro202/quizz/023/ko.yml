question: Bitcoin 트랜잭션 입력에서 시퀀스 번호 필드의 주요 목적은 무엇인가요?
answer: 시간 잠금 및 요금별 교체(RBF) 기능을 사용하려면 다음과 같이 하세요
wrong_answers:
  - 마이너가 처리해야 하는 입력의 순서를 지정하려면
  - 각 입력에 고유 식별자를 생성하여 double-spending를 방지하려면 다음과 같이 하세요
  - 수수료 계산을 위한 거래의 우선순위를 표시하려면 다음과 같이 하세요
explanation: |
  Bitcoin 트랜잭션 입력의 시퀀스 번호 필드는 타임락(트랜잭션이 확인될 수 있는 시간을 지연시키는) 구현과 수수료 대체(RBF) 기능 활성화(사용자가 미확인 트랜잭션에 대해 수수료를 인상할 수 있도록 하는)라는 두 가지 주요 목적을 가지고 있습니다. 다른 옵션은 채굴자가 입력을 특정 순서로 처리할 필요가 없고, double-spending 방지는 시퀀스 번호가 아닌 UTXO 모델과 블록체인 합의에 의해 처리되며, 트랜잭션 우선순위는 시퀀스 번호가 아닌 수수료율에 의해 결정되기 때문에 올바르지 않습니다.
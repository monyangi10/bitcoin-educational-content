question: วัตถุประสงค์หลักของฟิลด์หมายเลขลำดับในอินพุตธุรกรรม Bitcoin คืออะไร?
answer: เพื่อเปิดใช้งานฟังก์ชัน timelocks และ Replace-by-Fee (RBF)
wrong_answers:
  - เพื่อระบุลำดับที่อินพุตต้องถูกประมวลผลโดยนักขุด
  - เพื่อป้องกัน double-spending โดยการสร้างตัวระบุเฉพาะสำหรับแต่ละอินพุต
  - เพื่อระบุระดับความสำคัญของธุรกรรมสำหรับการคำนวณค่าธรรมเนียม
explanation: |
  ฟิลด์หมายเลขลำดับในอินพุตธุรกรรม Bitcoin มีวัตถุประสงค์หลักสองประการ: การใช้ timelocks (ซึ่งทำให้การยืนยันธุรกรรมล่าช้า) และการเปิดใช้งานฟังก์ชัน Replace-by-Fee (RBF) (ซึ่งอนุญาตให้ผู้ใช้เพิ่มค่าธรรมเนียมในธุรกรรมที่ยังไม่ได้รับการยืนยัน) ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ: อินพุตไม่จำเป็นต้องถูกประมวลผลตามลำดับเฉพาะโดยนักขุด, การป้องกัน double-spending ถูกจัดการโดยโมเดล UTXO และฉันทามติของบล็อกเชนแทนที่จะเป็นหมายเลขลำดับ, และลำดับความสำคัญของธุรกรรมถูกกำหนดโดยอัตราค่าธรรมเนียมแทนที่จะเป็นหมายเลขลำดับ
question: هدف اصلی فیلد شماره توالی در ورودی‌های تراکنش Bitcoin چیست؟
answer: برای فعال‌سازی قابلیت‌های قفل زمانی و جایگزینی با کارمزد (RBF)
wrong_answers:
  - برای مشخص کردن ترتیب پردازش ورودی‌ها توسط ماینرها
  - برای جلوگیری از double-spending با ایجاد یک شناسه منحصر به فرد برای هر ورودی
  - برای نشان دادن سطح اولویت تراکنش برای محاسبه کارمزد
explanation: |
  فیلد شماره توالی در ورودی‌های تراکنش Bitcoin دو هدف اصلی را دنبال می‌کند: اجرای قفل‌های زمانی (که تأخیر در تأیید تراکنش را ایجاد می‌کند) و فعال‌سازی قابلیت Replace-by-Fee (RBF) (که به کاربران اجازه می‌دهد هزینه‌ها را در تراکنش‌های تأیید نشده افزایش دهند). گزینه‌های دیگر نادرست هستند زیرا: ورودی‌ها نیازی به پردازش به ترتیب خاصی توسط ماینرها ندارند، پیشگیری double-spending توسط مدل UTXO و اجماع بلاکچین مدیریت می‌شود نه شماره‌های توالی، و اولویت تراکنش توسط نرخ‌های هزینه تعیین می‌شود نه شماره‌های توالی.
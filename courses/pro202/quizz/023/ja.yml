question: Bitcoinのトランザクション入力におけるシーケンス番号フィールドの主な目的は何ですか？
answer: タイムロックと料金別交換（RBF）機能を有効にするには
wrong_answers:
  - 採掘者による入力の処理順序を指定する。
  - double-spendingを防ぐために、各入力に一意な識別子をつける。
  - 手数料計算におけるトランザクションの優先度を示す。
explanation: |
  Bitcoinトランザクション入力のシーケンス番号フィールドは主に2つの目的を果たす：タイムロック（トランザクションが確認されるタイミングを遅らせる）の実装とReplace-by-Fee（RBF）機能（未確認トランザクションの手数料を上げることができる）の有効化である。なぜなら、入力はマイナーによって特定の順序で処理される必要はなく、double-spending防止はシーケンス番号ではなくUTXOモデルとブロックチェーンのコンセンサスによって処理され、取引の優先順位はシーケンス番号ではなく手数料率によって決定されるからである。
question: Какво е основното предназначение на полето за пореден номер във входящите данни за транзакции Bitcoin?
answer: Активиране на функциите за времеви часовници и "Замяна по такса" (RBF)
wrong_answers:
  - Определяне на реда, в който входните данни трябва да бъдат обработени от миньорите
  - Предотвратяване на double-spending чрез създаване на уникален идентификатор за всеки вход
  - Посочване на нивото на приоритет на транзакцията за изчисляване на таксата
explanation: |
  Полето за пореден номер във входящите данни за трансакциите в Bitcoin служи за две основни цели: прилагане на таймлокове (които забавят момента, в който трансакцията може да бъде потвърдена) и активиране на функцията "Замяна по такса" (RBF) (която позволява на потребителите да увеличават таксите за непотвърдени трансакции). Другите варианти са некоректни, тъй като: не е необходимо входовете да се обработват в някакъв конкретен ред от миньорите, предотвратяването на double-spending се обработва от модела UTXO и консенсуса на блокчейна, а не от поредните номера, и приоритетът на трансакциите се определя от ставките на таксите, а не от поредните номера.
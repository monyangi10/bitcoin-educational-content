question: 在 Bitcoin 交易輸入中，順序號欄位的主要目的是什麼？
answer: 若要啟用時間鎖和「費用替換」(RBF) 功能
wrong_answers:
  - 指定礦工處理輸入的順序
  - 為每個輸入建立唯一的識別碼，以防止 double-spending
  - 顯示交易在計算費用時的優先級別
explanation: |
  Bitcoin 交易輸入中的序列號字段有兩個主要用途：實施時間鎖（延遲交易可被確認的時間）和啟用「費用替代」（Replace-by-Fee，RBF）功能（允許使用者增加未確認交易的費用）。其他選項不對，因為：輸入不需要由礦工按照任何特定順序處理，double-spending 預防由 UTXO 模型和區塊鏈共識處理，而不是序列號，交易優先順序由費率而不是序列號決定。
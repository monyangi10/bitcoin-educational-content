question: Bitcoin लेनदेन इनपुट में अनुक्रम संख्या फ़ील्ड का प्राथमिक उद्देश्य क्या है?
answer: टाइमलॉक और रिप्लेस-बाय-फी (RBF) कार्यक्षमता को सक्षम करने के लिए
wrong_answers:
  - खनिकों द्वारा इनपुट को संसाधित करने के क्रम को निर्दिष्ट करने के लिए
  - प्रत्येक इनपुट के लिए एक अद्वितीय पहचानकर्ता बनाकर double-spending को रोकना
  - शुल्क गणना के लिए लेनदेन के प्राथमिकता स्तर को इंगित करने हेतु
explanation: |
  Bitcoin लेनदेन इनपुट में अनुक्रम संख्या फ़ील्ड दो मुख्य उद्देश्यों को पूरा करती है: टाइमलॉक लागू करना (जो लेनदेन की पुष्टि में देरी करता है) और रिप्लेस-बाय-फी (RBF) कार्यक्षमता को सक्षम करना (जो उपयोगकर्ताओं को अपुष्ट लेनदेन पर शुल्क बढ़ाने की अनुमति देता है)। अन्य विकल्प गलत हैं क्योंकि: इनपुट को खनिकों द्वारा किसी विशिष्ट क्रम में संसाधित करने की आवश्यकता नहीं है, double-spending की रोकथाम अनुक्रम संख्याओं के बजाय UTXO मॉडल और ब्लॉकचेन सहमति द्वारा नियंत्रित की जाती है, और लेनदेन की प्राथमिकता अनुक्रम संख्याओं के बजाय शुल्क दरों द्वारा निर्धारित की जाती है।
question: Каково основное назначение поля порядкового номера во входных данных транзакций Bitcoin?
answer: Чтобы включить блокировку времени и функцию замены по оплате (RBF)
wrong_answers:
  - Чтобы определить порядок, в котором входные данные должны обрабатываться шахтерами
  - Чтобы предотвратить double-spending, создайте уникальный идентификатор для каждого входа
  - Указывает уровень приоритета транзакции для расчета комиссии
explanation: |
  Поле порядкового номера во входных данных транзакций Bitcoin служит двум основным целям: реализации таймлоков (которые откладывают время подтверждения транзакции) и включению функции Replace-by-Fee (RBF) (которая позволяет пользователям увеличивать комиссию за неподтвержденные транзакции). Остальные варианты неверны, потому что: входы не нужно обрабатывать в каком-то определенном порядке майнерами, предотвращение double-spending осуществляется с помощью модели UTXO и консенсуса блокчейна, а не номеров последовательностей, а приоритет транзакций определяется ставками комиссии, а не номерами последовательностей.
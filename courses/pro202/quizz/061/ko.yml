question: SegWit이 SegWit 이전 노드와의 하위 호환성을 유지하면서 블록 용량을 늘릴 수 있는 근본적인 메커니즘은 무엇인가요?
answer: 용량 계산에서 증인 데이터가 75% 할인되는 블록 가중치 시스템으로, 레거시 노드는 1MB 이하인 반면 총 데이터는 최대 4MB까지 허용됩니다
wrong_answers:
  - 전송 전 증인 데이터 크기를 75%까지 줄여 모든 노드에서 블록을 1MB 미만으로 유지하는 압축 알고리즘
  - 각 블록의 SegWit 트랜잭션 비율에 따라 한도를 증가시키는 동적 블록 크기 조정
  - 업그레이드된 노드에만 별도의 증인 블록을 전송하고, 레거시 노드는 기존 1MB 블록을 수신합니다
explanation: |
  SegWit는 기본 트랜잭션 데이터는 바이트당 4 가중치 단위로 계산되는 블록 가중치 단위를 사용하는 반면, 감시 데이터는 바이트당 1 가중치 단위로 계산됩니다. 이 75% 할인을 통해 최대 4백만 개의 가중치 단위(모든 감시 데이터를 포함하면 잠재적으로 4MB)까지 블록을 생성할 수 있으며, 레거시 노드가 1MB 이상의 기본 트랜잭션 데이터를 볼 수 없도록 보장합니다. 다른 옵션은 존재하지 않는 메커니즘을 설명하며 압축, 동적 크기 조정, 별도의 블록 전송이 없습니다.
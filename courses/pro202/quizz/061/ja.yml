question: SegWit以前のノードとの下位互換性を維持しながら、SegWitのブロック容量を増やすことを可能にする基本的なメカニズムとは？
answer: ブロック・ウェイト・システムでは、容量計算において証人のデータが75%割り引かれ、レガシー・ノードでは≤1MBであるのに対し、最大4MBの総データが可能になる。
wrong_answers:
  - 送信前に証人のデータサイズを75%削減する圧縮アルゴリズムにより、すべてのノードでブロックを1MB未満に維持
  - 各ブロックにおけるSegWitトランザクションの割合に基づいて制限を増やす動的ブロックサイズ調整
  - アップグレードされたノードにのみ送信される個別のウィットネス・ブロックと、従来の1MBブロックを受信するレガシー・ノード
explanation: |
  SegWitはブロック・ウェイト・ユニットを使用し、ベース・トランザクション・データは1バイトあたり4ウェイト・ユニット、ウィットネス・データは1バイトあたり1ウェイト・ユニットとしてカウントされる。この75％割引により、レガシーノードが1MBを超えるベーストランザクションデータを見ることがないようにしながら、400万ウェイトユニット（すべてのウィットネスデータを含めると4MBになる可能性がある）までのブロックが可能になる。他のオプションは存在しないメカニズムを説明するものであり、圧縮もダイナミックサイジングも別個のブロック送信もない。
question: वह मूलभूत तंत्र क्या है जो SegWit को पूर्व-SegWit नोड्स के साथ बैकवर्ड कम्पैटिबिलिटी बनाए रखते हुए ब्लॉक क्षमता बढ़ाने में सक्षम बनाता है?
answer: ब्लॉक वेट सिस्टम में क्षमता गणना में विटनेस डेटा को 75% तक कम महत्व दिया जाता है, जिससे कुल 4MB तक डेटा की अनुमति मिलती है, जबकि पुराने नोड्स ≤1MB डेटा ही देख पाते हैं।
wrong_answers:
  - संपीड़न एल्गोरिदम जो ट्रांसमिशन से पहले विटनेस डेटा का आकार 75% तक कम कर देते हैं, जिससे सभी नोड्स के लिए ब्लॉक 1MB से कम रहते हैं।
  - डायनामिक ब्लॉक आकार समायोजन जो प्रत्येक ब्लॉक में SegWit लेनदेन प्रतिशत के आधार पर सीमा बढ़ाता है
  - अलग-अलग विटनेस ब्लॉक केवल अपग्रेड किए गए नोड्स को भेजे जाते हैं, जबकि पुराने नोड्स को पारंपरिक 1MB ब्लॉक प्राप्त होते हैं।
explanation: |
  SegWit ब्लॉक वेट यूनिट्स का उपयोग करता है, जिसमें बेस ट्रांजैक्शन डेटा को प्रति बाइट 4 वेट यूनिट्स के रूप में गिना जाता है, जबकि विटनेस डेटा को प्रति बाइट 1 वेट यूनिट के रूप में गिना जाता है। यह 75% की छूट 4 मिलियन वेट यूनिट्स (सभी विटनेस डेटा सहित संभावित रूप से 4MB) तक के ब्लॉक की अनुमति देती है, साथ ही यह सुनिश्चित करती है कि पुराने नोड्स कभी भी 1MB से अधिक बेस ट्रांजैक्शन डेटा न देखें। अन्य विकल्प ऐसी प्रक्रियाओं का वर्णन करते हैं जो मौजूद ही नहीं हैं - उनमें कोई कम्प्रेशन, कोई डायनामिक साइजिंग और कोई अलग ब्लॉक ट्रांसमिशन नहीं है।
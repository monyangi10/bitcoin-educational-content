question: 是什么基本机制使 SegWit 既能增加区块容量，又能保持与 SegWit 前节点的向后兼容性？
answer: 块权重系统，在计算容量时将见证数据折算 75%，允许高达 4MB 的总数据量，而传统节点的数据量≤1MB
wrong_answers:
  - 压缩算法可在传输前将见证数据的大小减少 75%，使所有节点的数据块均小于 1MB
  - 动态区块大小调整，根据每个区块中的 SegWit 交易百分比增加限制
  - 仅向升级节点传输单独的见证块，而传统节点则接收传统的 1MB 块
explanation: |
  SegWit 使用块权重单位，其中基本交易数据每字节算作 4 个权重单位，而见证数据每字节算作 1 个权重单位。这种 75% 的折扣允许块达到 400 万个权重单位（所有见证数据可能达到 4MB），同时确保传统节点不会看到超过 1MB 的基础事务数据。其他选项描述的是不存在的机制--没有压缩，没有动态大小，也没有单独的区块传输。
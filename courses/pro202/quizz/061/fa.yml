question: مکانیزم اساسی که به SegWit اجازه می‌دهد تا ظرفیت بلاک را افزایش دهد در حالی که سازگاری با نسخه‌های قبلی گره‌های پیش از SegWit را حفظ می‌کند، چیست؟
answer: سیستم وزن بلوک که در آن داده‌های شاهد با ۷۵٪ تخفیف در محاسبات ظرفیت در نظر گرفته می‌شوند، اجازه می‌دهد تا ۴ مگابایت داده کل داشته باشد در حالی که نودهای قدیمی ≤۱ مگابایت را مشاهده می‌کنند.
wrong_answers:
  - الگوریتم‌های فشرده‌سازی که اندازه داده‌های شاهد را قبل از انتقال تا ۷۵٪ کاهش می‌دهند و بلوک‌ها را برای همه نودها زیر ۱ مگابایت نگه می‌دارند.
  - تنظیم پویا اندازه بلوک که محدودیت‌ها را بر اساس درصد تراکنش‌های SegWit در هر بلوک افزایش می‌دهد
  - بلوک‌های شاهد جداگانه فقط به گره‌های ارتقاء یافته ارسال می‌شوند، در حالی که گره‌های قدیمی بلوک‌های سنتی ۱ مگابایتی را دریافت می‌کنند.
explanation: |
  SegWit از واحدهای وزن بلوک استفاده می‌کند که در آن داده‌های تراکنش پایه به ازای هر بایت 4 واحد وزن و داده‌های شاهد به ازای هر بایت 1 واحد وزن محاسبه می‌شوند. این تخفیف 75٪ به بلوک‌ها اجازه می‌دهد تا به 4 میلیون واحد وزن (احتمالاً 4 مگابایت با تمام داده‌های شاهد) برسند، در حالی که اطمینان حاصل می‌کند که نودهای قدیمی هرگز بیش از 1 مگابایت داده تراکنش پایه را نمی‌بینند. گزینه‌های دیگر مکانیزم‌های غیرموجود را توصیف می‌کنند - هیچ فشرده‌سازی، اندازه‌گیری پویا و انتقال بلوک جداگانه‌ای وجود ندارد.
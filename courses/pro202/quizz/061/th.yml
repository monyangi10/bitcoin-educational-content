question: กลไกพื้นฐานที่ทำให้ SegWit สามารถเพิ่มความจุบล็อกในขณะที่ยังคงความเข้ากันได้ย้อนหลังกับโหนดก่อน SegWit คืออะไร?
answer: ระบบน้ำหนักบล็อกที่ข้อมูลพยานถูกลดน้ำหนักลง 75% ในการคำนวณความจุ ทำให้สามารถมีข้อมูลรวมได้ถึง 4MB ในขณะที่โหนดรุ่นเก่าเห็น ≤1MB
wrong_answers:
  - อัลกอริธึมการบีบอัดที่ลดขนาดข้อมูลพยานลง 75% ก่อนการส่งผ่าน ทำให้บล็อกมีขนาดต่ำกว่า 1MB สำหรับทุกโหนด
  - การปรับขนาดบล็อกแบบไดนามิกที่เพิ่มขีดจำกัดตามเปอร์เซ็นต์ของธุรกรรม SegWit ในแต่ละบล็อก
  - แยกบล็อกพยานส่งเฉพาะไปยังโหนดที่อัปเกรดแล้ว ในขณะที่โหนดรุ่นเก่าได้รับบล็อกขนาด 1MB แบบดั้งเดิม
explanation: |
  SegWit ใช้หน่วยน้ำหนักบล็อกที่ข้อมูลธุรกรรมพื้นฐานนับเป็น 4 หน่วยน้ำหนักต่อไบต์ ในขณะที่ข้อมูลพยานนับเป็น 1 หน่วยน้ำหนักต่อไบต์ ส่วนลด 75% นี้ทำให้บล็อกสามารถมีได้ถึง 4 ล้านหน่วยน้ำหนัก (อาจจะเป็น 4MB หากมีข้อมูลพยานทั้งหมด) ในขณะที่มั่นใจได้ว่าโหนดรุ่นเก่าไม่เคยเห็นข้อมูลธุรกรรมพื้นฐานเกิน 1MB ตัวเลือกอื่นๆ อธิบายถึงกลไกที่ไม่มีอยู่จริง - ไม่มีการบีบอัด ไม่มีการปรับขนาดแบบไดนามิก และไม่มีการส่งบล็อกแยกต่างหาก
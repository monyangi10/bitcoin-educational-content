question: 是什麼基本機制讓 SegWit 在增加區塊容量的同時，還能與 SegWit 之前的節點保持向後相容？
answer: 區塊權重系統，證人資料在容量計算中會折減 75%，允許最多 4MB 的總資料，而傳統節點的資料量則低於 1MB
wrong_answers:
  - 壓縮演算法可在傳輸前減少 75% 的目擊資料大小，讓所有節點的區塊都小於 1MB
  - 動態區塊大小調整，可根據每個區塊中的 SegWit 交易百分比增加限額
  - 僅傳送至升級節點的獨立見證區塊，而傳統節點則接收傳統的 1MB 區塊
explanation: |
  SegWit 使用區塊權重單位，其中基本交易資料每字節計 4 個權重單位，而見證資料每字節計 1 個權重單位。這個 75% 的折扣允許區塊高達 4 百萬個權重單位 (加上所有見證資料可能是 4MB)，同時確保傳統節點不會看到超過 1MB 的基本交易資料。其他選項描述的是不存在的機制 - 沒有壓縮、沒有動態大小，也沒有獨立的區塊傳輸。
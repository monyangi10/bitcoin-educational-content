question: Каков фундаментальный механизм, позволяющий SegWit увеличивать емкость блока, сохраняя при этом обратную совместимость с узлами, существовавшими до SegWit?
answer: Система веса блока, при которой данные свидетелей уменьшаются на 75% при расчете емкости, что позволяет использовать до 4 МБ данных, в то время как на старых узлах - ≤1 МБ
wrong_answers:
  - Алгоритмы сжатия уменьшают размер данных свидетелей на 75% перед передачей, при этом размер блоков не превышает 1 МБ на всех узлах
  - Динамическая регулировка размера блока, которая увеличивает лимиты в зависимости от процента транзакций SegWit в каждом блоке
  - Отдельные блоки свидетелей передаются только обновленным узлам, в то время как устаревшие узлы получают традиционные блоки размером 1 МБ
explanation: |
  SegWit использует единицы веса блоков, где базовые данные транзакций считаются как 4 единицы веса на байт, а данные свидетелей - как 1 единица веса на байт. Эта 75-процентная скидка позволяет использовать блоки весом до 4 миллионов единиц (потенциально 4 МБ со всеми данными свидетелей), гарантируя при этом, что устаревшие узлы никогда не увидят более 1 МБ данных базовой транзакции. Остальные варианты описывают несуществующие механизмы - нет ни сжатия, ни динамического изменения размера, ни отдельной передачи блоков.
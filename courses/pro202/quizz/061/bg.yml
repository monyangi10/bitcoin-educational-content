question: Какъв е основният механизъм, който позволява на SegWit да увеличи капацитета на блоковете, като същевременно поддържа обратна съвместимост с възлите, съществували преди SegWit?
answer: Система за претегляне на блокове, при която данните на свидетелите се намаляват със 75% при изчисляване на капацитета, което позволява до 4 MB общи данни, докато при старите възли те са ≤ 1 MB
wrong_answers:
  - Алгоритми за компресиране, които намаляват размера на данните на свидетелите със 75% преди предаване, като поддържат блокове под 1MB за всички възли
  - Динамично регулиране на размера на блока, което увеличава ограниченията въз основа на процента на транзакциите SegWit във всеки блок
  - Отделни блокове от свидетели се предават само на обновените възли, докато старите възли получават традиционните блокове от 1 МВ
explanation: |
  SegWit използва блокови тегловни единици, при които данните за основната транзакция се отчитат като 4 тегловни единици на байт, а данните за свидетелите - като 1 тегловна единица на байт. Тази отстъпка от 75% позволява блокове до 4 милиона тегловни единици (потенциално 4MB с всички данни на свидетелите), като същевременно гарантира, че наследените възли никога няма да видят повече от 1MB данни за базовата транзакция. Другите опции описват несъществуващи механизми - няма компресия, няма динамично оразмеряване и няма отделно предаване на блокове.
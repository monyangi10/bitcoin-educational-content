question: เหตุผลหลักที่ทำให้ธุรกรรม multisig แบบเปล่าถูกแทนที่ด้วย P2SH สำหรับเงื่อนไขการใช้จ่ายที่ซับซ้อนคืออะไร?
answer: Bare multisig เปิดเผยคีย์สาธารณะทั้งหมด on-chain ทำให้ธุรกรรมมีขนาดใหญ่ มีค่าใช้จ่ายสูง และยากต่อการเข้ารหัสเป็นที่อยู่
wrong_answers:
  - Bare multisig ต้องการลายเซ็นมากกว่า P2SH เพื่อให้ได้ระดับความปลอดภัยเดียวกันสำหรับธุรกรรมหลายฝ่าย
  - Bare multisig ไม่สามารถจัดการธุรกรรมที่ถูกล็อคด้วยเวลา หรือข้อกำหนดการใช้จ่ายตามเงื่อนไขได้เหมือนกับ P2SH
  - ลายเซ็นแบบ multisig เปล่าไม่สามารถใช้งานร่วมกับซอฟต์แวร์ wallet รุ่นใหม่ได้และไม่สามารถกระจายไปยังโหนดปัจจุบันได้
explanation: |
  P2SH ได้รับการแนะนำมาเพื่อแก้ไขปัญหาความไม่มีประสิทธิภาพของ bare multisig โดยเฉพาะ Bare multisig ต้องการให้คีย์สาธารณะทั้งหมดมองเห็นได้ใน scriptPubKey ซึ่งสร้างขนาดธุรกรรมที่ใหญ่ขึ้น ทำให้มีค่าธรรมเนียมสูงขึ้นและยากต่อการแสดงผลในรูปแบบที่เป็นมิตรกับผู้ใช้ P2SH แก้ไขปัญหานี้โดยการซ่อนสคริปต์ที่ซับซ้อนหลังแฮชขนาด 20 ไบต์ เผยเงื่อนไขการใช้จ่ายจริงเมื่อมีการใช้จ่ายเอาต์พุตเท่านั้น สิ่งนี้ช่วยลดรอยเท้าของ on-chain ปรับปรุงความเป็นส่วนตัว และเปิดใช้งานรูปแบบที่อยู่มาตรฐานในขณะที่ยังคงรักษาการรับประกันความปลอดภัยเดิม
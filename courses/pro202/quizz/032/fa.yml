question: دلیل اصلی اینکه چرا تراکنش‌های multisig ساده تا حد زیادی توسط P2SH برای شرایط پیچیده خرج کردن جایگزین شدند چیست؟
answer: چند امضایی ساده همه کلیدهای عمومی on-chain را فاش می‌کند، که باعث می‌شود تراکنش‌ها بزرگ، گران و رمزگذاری آن‌ها به‌عنوان آدرس دشوار شود.
wrong_answers:
  - چندامضایی ساده برای دستیابی به همان سطح امنیت در تراکنش‌های چندجانبه نسبت به P2SH به امضاهای بیشتری نیاز دارد.
  - مولتی‌سیگ ساده نمی‌تواند تراکنش‌های دارای قفل زمانی یا الزامات خرج کردن شرطی را مانند P2SH مدیریت کند.
  - امضاهای چندامضایی ساده با نرم‌افزار مدرن wallet ناسازگار هستند و نمی‌توانند به نودهای فعلی ارسال شوند.
explanation: |
  P2SH به‌طور خاص برای رفع ناکارآمدی‌های multisig بدون پوشش معرفی شد. multisig بدون پوشش نیاز دارد که تمام کلیدهای عمومی در scriptPubKey قابل مشاهده باشند، که این امر باعث ایجاد اندازه‌های بزرگ تراکنش می‌شود که هزینه بیشتری در کارمزدها دارند و به‌سختی می‌توان آن‌ها را به‌عنوان آدرس‌های کاربرپسند نمایش داد. P2SH این مشکل را با پنهان کردن اسکریپت پیچیده پشت یک هش 20 بایتی حل می‌کند و شرایط واقعی خرج کردن را تنها زمانی که خروجی خرج می‌شود، آشکار می‌سازد. این امر ردپای on-chain را کاهش می‌دهد، حریم خصوصی را بهبود می‌بخشد و فرمت‌های استاندارد آدرس را ممکن می‌سازد در حالی که همان تضمین‌های امنیتی را حفظ می‌کند.
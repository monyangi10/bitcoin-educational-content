question: 복잡한 지출 조건 때문에 베어 멀티서명 거래가 P2SH으로 대체된 주된 이유는 무엇인가요?
answer: 베어 멀티서명은 모든 공개 키 on-chain을 노출하므로 트랜잭션이 크고 비싸며 주소로 인코딩하기 어렵습니다
wrong_answers:
  - 베어 멀티시그는 다자간 거래에 대해 동일한 보안 수준을 달성하기 위해 P2SH보다 더 많은 서명이 필요합니다
  - 베어 멀티서명은 P2SH처럼 시간 제한 트랜잭션이나 조건부 지출 요구 사항을 처리할 수 없습니다
  - 베어 멀티서명 서명은 최신 wallet 소프트웨어와 호환되지 않으며 현재 노드에 브로드캐스트할 수 없습니다
explanation: |
  P2SH는 베어 멀티서명의 비효율성을 해결하기 위해 특별히 도입되었습니다. 베어 멀티서명을 사용하면 모든 공개키가 스크립트PubKey에 표시되어야 하므로 트랜잭션 크기가 커져 수수료가 더 많이 발생하고 사용자 친화적인 주소로 표현하기 어렵습니다. P2SH는 복잡한 스크립트를 20바이트 해시 뒤에 숨겨서 이 문제를 해결하고, 실제 지출이 이루어질 때만 실제 지출 조건이 드러납니다. 이를 통해 on-chain의 사용 공간을 줄이고, 프라이버시를 개선하며, 동일한 보안 보장을 유지하면서 표준 주소 형식을 사용할 수 있습니다.
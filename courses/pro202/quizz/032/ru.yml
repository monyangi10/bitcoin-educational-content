question: Какова основная причина, по которой "голые" многосиговые транзакции были в значительной степени вытеснены P2SH для сложных условий расходования средств?
answer: Голая мультисигма раскрывает все открытые ключи on-chain, что делает транзакции большими, дорогими и сложными для кодирования в виде адресов
wrong_answers:
  - Bare multisig требует большего количества подписей, чем P2SH, для достижения того же уровня безопасности при многосторонних транзакциях
  - Голая мультисигма не может работать с транзакциями, привязанными к времени, или с условными требованиями к расходованию средств, как это делает P2SH
  - Голые мультисигмальные подписи несовместимы с современным программным обеспечением wallet и не могут быть переданы на текущие узлы
explanation: |
  P2SH был введен специально для устранения неэффективности голой мультисигмы. Голый мультисиг требует, чтобы все открытые ключи были видны в scriptPubKey, что приводит к большим размерам транзакций, которые обходятся дороже в комиссиях и трудно представить в виде удобных для пользователя адресов. P2SH решает эту проблему, скрывая сложный скрипт за 20-байтовым хэшем, раскрывая фактические условия расходования только при выводе средств. Это уменьшает площадь, занимаемую on-chain, повышает конфиденциальность и позволяет использовать стандартные форматы адресов, сохраняя при этом те же гарантии безопасности.
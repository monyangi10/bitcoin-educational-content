question: Quelle est la principale raison pour laquelle les transactions multisig nues ont été largement remplacées par la P2SH pour les conditions de dépenses complexes ?
answer: Le multisig nu expose toutes les clés publiques on-chain, ce qui rend les transactions volumineuses, coûteuses et difficiles à coder sous forme d'adresses
wrong_answers:
  - Bare multisig nécessite plus de signatures que P2SH pour atteindre le même niveau de sécurité pour les transactions multipartites
  - Le multisig nu ne permet pas de gérer les transactions verrouillées dans le temps ou les exigences de dépenses conditionnelles comme le P2SH peut le faire
  - Les signatures multisigs nues sont incompatibles avec les logiciels wallet modernes et ne peuvent pas être diffusées aux nœuds actuels
explanation: |
  La P2SH a été introduite spécifiquement pour remédier aux inefficacités du bare multisig. Le bare multisig exige que toutes les clés publiques soient visibles dans le ScriptPubKey, ce qui crée des transactions de grande taille qui coûtent plus cher en frais et sont difficiles à représenter sous forme d'adresses conviviales. La P2SH résout ce problème en dissimulant le script complexe derrière un hachage de 20 octets et en ne révélant les conditions de dépense réelles qu'au moment de la dépense. Cela réduit l'encombrement du on-chain, améliore la confidentialité et permet d'utiliser des formats d'adresse standard tout en conservant les mêmes garanties de sécurité.

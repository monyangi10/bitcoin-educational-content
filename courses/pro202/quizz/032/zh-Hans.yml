question: 在复杂的支出条件下，裸多位数交易在很大程度上被 P2SH 取代的主要原因是什么？
answer: 裸多标识会暴露所有公开密钥 on-chain，导致交易量大、成本高，且难以编码为地址
wrong_answers:
  - 裸多方签名需要比 P2SH 更多的签名，才能实现多方交易的相同安全级别
  - 裸多用户身份标识无法处理锁定时间的交易或有条件的支出要求，如 P2SH 所能做到的那样
  - 裸多标识签名与现代 wallet 软件不兼容，无法向当前节点广播
explanation: |
  P2SH 是专门为解决裸多重配的低效问题而推出的。裸多密钥要求在 scriptPubKey 中显示所有公钥，这就造成了交易规模过大，不仅需要支付更多费用，而且难以以用户友好的地址表示。P2SH 将复杂的脚本隐藏在 20 字节的哈希值后面，只有在输出时才显示实际支出条件，从而解决了这一问题。这减少了 on-chain 的占用空间，提高了私密性，并启用了标准地址格式，同时保持了相同的安全保证。
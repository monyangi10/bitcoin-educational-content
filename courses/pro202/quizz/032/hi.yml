question: जटिल व्यय स्थितियों के लिए बेयर मल्टीसिग लेनदेन को जीडब्ल्यू-0 द्वारा बड़े पैमाने पर प्रतिस्थापित किए जाने का प्राथमिक कारण क्या है?
answer: बेयर मल्टीसिग सभी सार्वजनिक कुंजियों को उजागर करता है (on-chain), जिससे लेनदेन बड़े, महंगे और पतों के रूप में एन्कोड करना मुश्किल हो जाता है।
wrong_answers:
  - बहुपक्षीय लेनदेन के लिए समान सुरक्षा स्तर प्राप्त करने के लिए बेयर मल्टीसिग को P2SH की तुलना में अधिक हस्ताक्षरों की आवश्यकता होती है।
  - बेयर मल्टीसिग समय-बद्ध लेनदेन या सशर्त व्यय आवश्यकताओं को संभाल नहीं सकता, जैसा कि P2SH कर सकता है।
  - साधारण मल्टीसिग सिग्नेचर आधुनिक wallet सॉफ़्टवेयर के साथ असंगत हैं और इन्हें वर्तमान नोड्स पर प्रसारित नहीं किया जा सकता है।
explanation: |
  P2SH को विशेष रूप से बेयर मल्टीसिग की कमियों को दूर करने के लिए पेश किया गया था। बेयर मल्टीसिग में सभी सार्वजनिक कुंजियों का स्क्रिप्टपबकी में दिखाई देना आवश्यक होता है, जिससे लेन-देन का आकार बड़ा हो जाता है, शुल्क अधिक लगता है और उन्हें उपयोगकर्ता के अनुकूल पतों के रूप में दर्शाना मुश्किल हो जाता है। P2SH इस समस्या को 20-बाइट हैश के पीछे जटिल स्क्रिप्ट को छिपाकर हल करता है, और आउटपुट खर्च होने पर ही वास्तविक खर्च की शर्तें प्रकट करता है। इससे on-chain का आकार कम हो जाता है, गोपनीयता में सुधार होता है और समान सुरक्षा गारंटी बनाए रखते हुए मानक पता प्रारूपों को सक्षम बनाया जा सकता है।
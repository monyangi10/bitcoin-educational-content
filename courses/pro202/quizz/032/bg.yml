question: Коя е основната причина, поради която голите многозначни транзакции бяха до голяма степен заменени от P2SH за сложни условия на разходите?
answer: Bare multisig разкрива всички публични ключове on-chain, което прави транзакциите големи, скъпи и трудни за кодиране като адреси
wrong_answers:
  - Bare multisig изисква повече подписи, отколкото P2SH, за да се постигне същото ниво на сигурност за транзакции с няколко страни
  - Голият мултисиг не може да се справи с транзакциите, блокирани във времето, или с изискванията за условно изразходване на средства, както P2SH
  - Голите многозначни подписи са несъвместими със съвременния софтуер на wallet и не могат да бъдат излъчвани към текущите възли
explanation: |
  P2SH беше въведена специално за справяне с неефективността на голия мултисиг. Bare multisig изисква всички публични ключове да са видими в scriptPubKey, което създава големи размери на транзакциите, които струват повече такси и трудно се представят като удобни за потребителя адреси. P2SH решава този проблем, като скрива сложния скрипт зад 20-байтов хеш, разкривайки действителните условия за изразходване само когато изходът е изразходван. По този начин се намалява отпечатъкът на on-chain, подобрява се поверителността и се дава възможност за стандартни формати на адреси, като се запазват същите гаранции за сигурност.
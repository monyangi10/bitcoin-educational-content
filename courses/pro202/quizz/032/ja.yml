question: 複雑な支出条件において、むき出しのマルチシグ取引がP2SHに取って代わられた主な理由は何ですか？
answer: ベア・マルチシグでは、すべての公開鍵がon-chainに公開されるため、トランザクションが大規模で高価になり、アドレスとしてエンコードするのが困難になる。
wrong_answers:
  - ベア・マルチシグは、複数当事者間取引で同じセキュリティ・レベルを達成するために、P2SHよりも多くの署名を必要とする。
  - ベアマルチシグでは、P2SHのようなタイムロック取引や条件付き支出要件は扱えない。
  - ベアマルチシグ署名は、最新のwalletソフトウェアと互換性がなく、現在のノードにブロードキャストすることができない。
explanation: |
  P2SHは、特にベア・マルチシグの非効率性に対処するために導入された。ベア・マルチシグでは、すべての公開鍵がscriptPubKeyで可視化される必要があるため、取引サイズが大きくなり、手数料がかさみ、ユーザーフレンドリーなアドレスとして表現することが難しくなります。P2SHでは、複雑なスクリプトを20バイトのハッシュの背後に隠し、出力が使われたときにのみ実際の支出条件を明らかにすることで、これを解決している。これにより、on-chainのフットプリントが削減され、プライバシーが向上し、同じセキュリティ保証を維持しながら標準的なアドレス形式が可能になります。
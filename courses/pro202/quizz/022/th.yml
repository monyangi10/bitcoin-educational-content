question: ข้อจำกัดพื้นฐานของโมเดล UTXO ที่ต้องการการจัดการเฉพาะเมื่อใช้จ่าย Bitcoin คืออะไร?
answer: UTXOs ต้องถูกใช้จ่ายทั้งหมดและไม่สามารถใช้บางส่วนได้
wrong_answers:
  - UTXOs สามารถใช้จ่ายได้เพียงครั้งเดียวต่อบล็อกเพื่อป้องกันการใช้จ่ายซ้ำซ้อน
  - UTXOs ต้องถูกใช้ตามลำดับเวลาในการสร้าง
  - UTXOs ต้องการลายเซ็นหลายตัวจากคีย์ต่างๆ เพื่อให้ถูกต้อง
explanation: |
  โมเดล UTXO มีข้อจำกัดพื้นฐานที่ผลลัพธ์ของธุรกรรมที่ยังไม่ได้ใช้ต้องถูกใช้ทั้งหมด - ไม่มีกลไกสำหรับการใช้จ่ายบางส่วน เมื่อคุณต้องการใช้จ่ายน้อยกว่าจำนวนเต็มของ UTXO คุณต้องสร้างธุรกรรมที่ใช้จ่าย UTXO ทั้งหมดและรวมถึงผลลัพธ์การเปลี่ยนแปลงกลับไปยังตัวคุณเองสำหรับส่วนที่เหลือ ตัวเลือกอื่นๆ อธิบายข้อจำกัดที่ไม่มีอยู่จริง: UTXOs สามารถถูกใช้จ่ายหลายครั้งต่อบล็อก (UTXOs ที่แตกต่างกัน) ไม่จำเป็นต้องเรียงตามลำดับเวลา และโดยทั่วไปต้องการเพียงลายเซ็นที่ถูกต้องหนึ่งลายเซ็น เว้นแต่จะออกแบบเป็น multisig โดยเฉพาะ
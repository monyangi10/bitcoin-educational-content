question: UTXO 모델의 어떤 근본적인 제한으로 인해 Bitcoin을 사용할 때 특별한 주의가 필요한가요?
answer: UTXO는 전액 사용해야 하며 부분적으로 사용할 수 없습니다
wrong_answers:
  - 이중 지출을 방지하기 위해 UTXO는 블록당 한 번만 사용할 수 있습니다
  - UTXO는 생성 시간을 기준으로 시간순으로 사용해야 합니다
  - UTXO가 유효하려면 서로 다른 키의 여러 서명이 필요합니다
explanation: |
  UTXO 모델에는 사용하지 않은 거래 산출물을 모두 소비해야 한다는 근본적인 제약이 있으며, 부분 지출을 위한 메커니즘이 없습니다. 전체 UTXO 금액보다 적은 금액을 지출해야 하는 경우, 전체 UTXO를 지출하고 나머지 금액에 대해 잔돈을 본인에게 돌려주는 트랜잭션을 생성해야 합니다. 다른 옵션은 존재하지 않는 제한을 설명합니다: UTXO는 블록당 여러 번 사용할 수 있고(다른 UTXO), 시간 순서가 필요하지 않으며, 특별히 다중 서명으로 설계되지 않은 한 일반적으로 하나의 유효한 서명만 필요합니다.
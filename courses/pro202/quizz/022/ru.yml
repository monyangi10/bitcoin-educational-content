question: Какое фундаментальное ограничение модели UTXO требует особого подхода при использовании Bitcoin?
answer: UTXO должны быть израсходованы полностью и не могут быть израсходованы частично
wrong_answers:
  - UTXO можно потратить только один раз за блок, чтобы предотвратить двойные траты
  - UTXO должны расходоваться в хронологическом порядке по времени создания
  - UTXO требуют, чтобы несколько подписей от разных ключей были действительными
explanation: |
  Модель UTXO имеет фундаментальное ограничение, согласно которому неизрасходованные выходы транзакций должны быть израсходованы полностью - нет механизма частичного расходования. Если вам нужно потратить меньше, чем полная сумма UTXO, вы должны создать транзакцию, которая расходует всю сумму UTXO и включает в себя вывод изменений для себя на оставшуюся сумму. Остальные варианты описывают несуществующие ограничения: UTXO можно тратить несколько раз в одном блоке (разные UTXO), они не требуют хронологического упорядочивания и обычно нуждаются только в одной действительной подписи, если только не разработаны специально как мультисиговые.
question: Bitcoin खर्च करते समय UTXO मॉडल की कौन सी मूलभूत सीमा को विशेष रूप से संभालने की आवश्यकता होती है?
answer: UTXO को पूरी तरह से खर्च करना होगा और इसे आंशिक रूप से उपयोग नहीं किया जा सकता है।
wrong_answers:
  - डबल स्पेंडिंग को रोकने के लिए UTXO को प्रति ब्लॉक केवल एक बार ही खर्च किया जा सकता है।
  - UTXO को निर्माण समय के आधार पर कालानुक्रमिक क्रम में खर्च किया जाना चाहिए।
  - UTXO को वैध होने के लिए विभिन्न कुंजियों से कई हस्ताक्षरों की आवश्यकता होती है।
explanation: |
  UTXO मॉडल की एक मूलभूत सीमा यह है कि अप्रयुक्त लेनदेन आउटपुट का पूर्णतः उपयोग किया जाना चाहिए - आंशिक उपयोग की कोई व्यवस्था नहीं है। जब आपको पूरी UTXO राशि से कम खर्च करना हो, तो आपको एक ऐसा लेनदेन बनाना होगा जो पूरी UTXO राशि खर्च करे और शेष राशि के लिए आपको वापस भुगतान करे। अन्य विकल्प ऐसी सीमाओं का वर्णन करते हैं जो मौजूद ही नहीं हैं: UTXO को प्रति ब्लॉक कई बार खर्च किया जा सकता है (विभिन्न UTXO), इसके लिए कालानुक्रमिक क्रम की आवश्यकता नहीं होती है, और आमतौर पर केवल एक वैध हस्ताक्षर की आवश्यकता होती है जब तक कि इसे विशेष रूप से मल्टीसिग के रूप में डिज़ाइन न किया गया हो।
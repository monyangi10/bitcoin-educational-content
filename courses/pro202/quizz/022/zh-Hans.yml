question: 在使用 Bitcoin 时，需要特别处理 UTXO 模型的哪些基本限制？
answer: UTXO 必须全部使用，不得部分使用
wrong_answers:
  - 每个区块只能使用一次UTXO，以防止重复使用
  - UTXO 必须根据创建时间按时间顺序使用
  - UTXO需要来自不同密钥的多个签名才有效
explanation: |
  UTXO 模型有一个基本限制，即未支出的事务输出必须全部消耗掉，没有部分支出的机制。当你需要花的钱少于 UTXO 的全额时，你必须创建一个事务，花掉 UTXO 的全额，并为剩余部分创建一个变更输出。其他选项描述了不存在的限制：每个区块可以多次使用 UTXO（不同的 UTXO），不需要按时间顺序排列，通常只需要一个有效签名，除非特别设计为多签名。
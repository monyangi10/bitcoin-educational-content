question: Кое фундаментално ограничение на модела UTXO изисква специално отношение при използването на Bitcoin?
answer: UTXO трябва да бъдат изразходвани изцяло и не могат да бъдат изразходвани частично
wrong_answers:
  - UTXO могат да се изразходват само веднъж в блок, за да се предотврати двойно изразходване
  - UTXO трябва да се изразходват в хронологичен ред според времето на създаване
  - За да бъдат валидни, UTXO изискват множество подписи от различни ключове
explanation: |
  Моделът UTXO има основно ограничение, според което неизразходваните резултати от транзакциите трябва да бъдат изцяло изразходвани - няма механизъм за частично изразходване. Когато трябва да похарчите по-малко от пълната сума на UTXO, трябва да създадете транзакция, която изразходва цялата сума на UTXO и включва изход за промяна обратно към себе си за остатъка. Другите опции описват несъществуващи ограничения: UTXO могат да бъдат изразходвани многократно в блок (различни UTXO), не изискват хронологично подреждане и обикновено се нуждаят само от един валиден подпис, освен ако не са специално проектирани като многосигови.
question: چه محدودیت اساسی مدل UTXO نیاز به مدیریت خاصی هنگام خرج کردن Bitcoin دارد؟
answer: UTXOs باید به‌طور کامل خرج شوند و نمی‌توانند به‌صورت جزئی مصرف شوند
wrong_answers:
  - UTXOs فقط یک بار در هر بلوک قابل خرج کردن هستند تا از دوبار خرج کردن جلوگیری شود.
  - UTXOs باید بر اساس زمان ایجاد به ترتیب زمانی خرج شوند
  - UTXOs برای معتبر بودن به امضاهای متعدد از کلیدهای مختلف نیاز دارند
explanation: |
  مدل UTXO یک محدودیت اساسی دارد که خروجی‌های تراکنش خرج‌نشده باید به‌طور کامل مصرف شوند - هیچ مکانیزمی برای خرج کردن جزئی وجود ندارد. زمانی که نیاز دارید کمتر از مقدار کامل UTXO خرج کنید، باید تراکنشی ایجاد کنید که کل UTXO را خرج کند و شامل یک خروجی تغییر به خودتان برای باقی‌مانده باشد. گزینه‌های دیگر محدودیت‌های غیرموجود را توصیف می‌کنند: UTXOها می‌توانند چندین بار در هر بلوک خرج شوند (UTXOهای مختلف)، نیازی به ترتیب زمانی ندارند و معمولاً فقط به یک امضای معتبر نیاز دارند مگر اینکه به‌طور خاص به‌عنوان چندامضایی طراحی شده باشند.
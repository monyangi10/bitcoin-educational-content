question: 在使用 Bitcoin 時，UTXO 模型的哪些基本限制需要特別處理？
answer: UTXO 必須全部用完，不可部分消耗
wrong_answers:
  - 每個區塊只能花費一次 UTXO，以防止重複花費
  - UTXO 必須依建立時間的順序使用
  - UTXOs需要來自不同金鑰的多重簽章才有效
explanation: |
  UTXO 模型有一個基本的限制，那就是未花費的交易輸出必須全部花費 - 沒有部分花費的機制。當您需要花費的金額少於 UTXO 的全額時，您必須建立一個花費 UTXO 全額的交易，並且包含一個變更輸出，將餘額傳回給您自己。其他選項描述的是不存在的限制：UTXO 可以在每個區塊中使用多次（不同的 UTXO），不需要時間順序，除非特別設計為多重簽章，否則通常只需要一個有效簽章。
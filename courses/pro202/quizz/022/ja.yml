question: Bitcoinを過ごす上で、UTXOモデルの根本的な限界で特別な対応が必要なものは何か？
answer: UTXOはすべて使い切らなければならず、部分的に消費することはできない。
wrong_answers:
  - 二重消費を防ぐため、UTXOは1ブロックにつき1回しか使用できない。
  - UTXOは、作成時間に基づき、時系列に使用されなければならない。
  - UTXOが有効であるためには、異なる鍵からの複数の署名が必要である。
explanation: |
  UTXOモデルには、未使用のトランザクション出力は完全に消費されなければならないという基本的な制約がある。UTXOの全額より少ない金額を使う必要があるときは、UTXO全体を使い、残りを自分自身に戻す変更出力を含むトランザクションを作成しなければならない。他のオプションは、存在しない制限を記述している：UTXOはブロックごとに複数回使用することができ（異なるUTXO）、時系列順序を必要とせず、マルチシグとして特別に設計されていない限り、通常1つの有効な署名しか必要としない。
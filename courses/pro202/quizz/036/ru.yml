question: Что происходит с конфиденциальностью условий расходования средств в P2SH с течением времени?
answer: Условия траты остаются скрытыми до первой траты, а затем становятся постоянно видимыми on-chain
wrong_answers:
  - Условия расходования средств навсегда остаются конфиденциальными даже после совершения нескольких транзакций
  - При первом создании адреса P2SH сразу же возникают условия расходования средств
  - Условия расходования средств временно становятся видимыми во время расходования средств, но после этого снова скрываются
explanation: |
  P2SH обеспечивает конфиденциальность, скрывая фактические условия расходования средств (сценарий погашения) за хэшем в scriptPubKey. Изначально виден только 20-байтовый хэш, что позволяет скрыть, является ли это мультисигма, таймлок или другие сложные условия. Однако при первой трате P2SH полный сценарий погашения должен быть раскрыт on-chain для проверки, что делает условия траты постоянно видимыми для всех участников сети. Это одноразовое раскрытие является компромиссом между конфиденциальностью и функциональностью P2SH.
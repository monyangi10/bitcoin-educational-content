question: P2SHの取引における支出状況のプライバシーは、時間の経過とともにどうなるのか？
answer: 支出条件は最初の支出まで非表示で、その後永久に表示される on-chain
wrong_answers:
  - 複数の取引が行われた後でも、支出条件は永久に非公開のままである。
  - 支出条件は、P2SHアドレスが最初に作成されたときにすぐに表示されます。
  - 支出条件は、支出中に一時的に見えるようになるが、支出後には再び隠される。
explanation: |
  P2SHは、scriptPubKeyのハッシュの後ろに実際の支出条件（deem script）を隠すことでプライバシーを提供している。最初は20バイトのハッシュのみが表示され、マルチシグであるか、タイムロックであるか、その他の複雑な条件であるかが隠される。しかし、P2SHのアウトプットが最初に使用される際には、検証のために完全なredeemスクリプトをon-chainで公開しなければならない。この1回限りの公開は、P2SHがプライバシーと機能性の間で行うトレードオフである。
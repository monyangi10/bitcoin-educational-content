question: 随着时间的推移，P2SH 交易消费条件的隐私会发生什么变化？
answer: 消费条件在首次消费前保持隐藏，然后永久可见 on-chain
wrong_answers:
  - 即使进行了多次交易，消费条件仍永久保密
  - 首次创建 P2SH 地址时，支出条件立即可见
  - 消费条件在消费过程中暂时显现，但之后又会隐藏起来
explanation: |
  P2SH 将实际支出条件（赎回脚本）隐藏在 scriptPubKey 中的哈希值后面，从而提供隐私保护。起初只有 20 字节的哈希值可见，从而掩盖了多重签名、时间锁定或其他复杂条件。然而，当 P2SH 输出首次消费时，必须披露完整的兑换脚本 on-chain 以进行验证，使所有网络参与者永久可见消费条件。这种一次性披露是 P2SH 在隐私和功能之间做出的权衡。
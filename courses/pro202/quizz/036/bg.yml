question: Какво се случва с поверителността на условията за изразходване на средства при транзакция P2SH с течение на времето?
answer: Условията за изразходване на средства остават скрити до първото изразходване на средства, след което стават постоянно видими on-chain
wrong_answers:
  - Условията за изразходване на средства остават постоянно поверителни дори след извършване на множество транзакции
  - Условията за изразходване на средства са видими веднага при първото създаване на адреса P2SH
  - Условията за изразходване на средства стават видими временно по време на изразходването им, но след това отново остават скрити
explanation: |
  P2SH осигурява неприкосновеност на личния живот, като скрива действителните условия за изразходване (скрипт за изкупуване) зад хеш в скриптPubKey. Първоначално се вижда само 20-байтовият хеш, който скрива дали става въпрос за мултисиг, таймлоук или други сложни условия. Въпреки това, когато изходът P2SH се изразходва за първи път, пълният скрипт за изкупуване трябва да се разкрие on-chain за валидиране, което прави условията за изразходване постоянно видими за всички участници в мрежата. Това еднократно разкриване е компромисът, който P2SH прави между поверителност и функционалност.
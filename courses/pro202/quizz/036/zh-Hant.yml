question: 隨著時間的推移，P2SH 交易的消費條件隱私會發生什麼變化？
answer: 花費條件在第一次花費前保持隱藏，之後變為永久可見 on-chain
wrong_answers:
  - 即使進行多次交易，消費條件仍會永久保密
  - 首次建立 P2SH 位址時，可立即看到支出條件
  - 支出條件在支出過程中會暫時顯現，但在支出之後又會隱藏起來
explanation: |
  P2SH 將實際支出條件 (贖回腳本) 隱藏在 scriptPubKey 中的雜湊值之後，以提供隱私性。一開始只有 20 位元組雜湊碼是可見的，隱藏了它是否是多重認證、時間鎖或其他複雜的條件。但是，當 P2SH 輸出第一次被花費時，完整的兌換腳本必須揭露 on-chain 以進行驗證，讓所有網路參與者都能永久看到花費條件。這種一次性的揭示是 P2SH 在隱私性和功能性之間所做的權衡。
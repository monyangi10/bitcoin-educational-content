question: 시간이 지남에 따라 P2SH 거래의 지출 조건의 개인정보는 어떻게 되나요?
answer: 지출 조건은 첫 번째 지출까지 숨겨져 있다가 영구적으로 표시되는 on-chain로 바뀝니다
wrong_answers:
  - 여러 번의 거래가 이루어진 후에도 지출 조건은 영구적으로 비공개로 유지됩니다
  - 지출 조건은 P2SH 주소가 처음 생성될 때 즉시 표시됩니다
  - 지출 조건은 지출 중에 일시적으로 표시되지만 이후에는 다시 숨겨집니다
explanation: |
  P2SH는 스크립트펍키의 해시 뒤에 실제 지출 조건(상환 스크립트)을 숨겨 프라이버시를 제공합니다. 처음에는 20바이트 해시만 표시되므로 다중 서명, 타임락 또는 기타 복잡한 조건이 숨겨집니다. 그러나 P2SH 출력이 처음 사용될 때 전체 사용 스크립트는 유효성 검사를 위해 on-chain을 공개해야 하며, 모든 네트워크 참여자에게 사용 조건이 영구적으로 표시됩니다. 이 일회성 공개는 P2SH가 개인정보 보호와 기능 사이에서 내린 절충안입니다.
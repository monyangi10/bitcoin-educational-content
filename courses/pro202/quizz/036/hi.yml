question: समय के साथ P2SH लेनदेन की खर्च करने की शर्तों की गोपनीयता का क्या होता है?
answer: खर्च की शर्तें पहले खर्च होने तक छिपी रहती हैं, फिर on-chain के बाद स्थायी रूप से दिखाई देने लगती हैं।
wrong_answers:
  - कई लेन-देन होने के बाद भी खर्च की शर्तें पूरी तरह से गोपनीय रहती हैं।
  - P2SH पता पहली बार बनाते ही खर्च करने की शर्तें तुरंत दिखाई देती हैं।
  - खर्च करने की स्थितियाँ खर्च के दौरान अस्थायी रूप से दिखाई देती हैं, लेकिन खर्च के बाद फिर से छिप जाती हैं।
explanation: |
  P2SH, स्क्रिप्टपबकी में हैश के पीछे वास्तविक खर्च की शर्तों (रिडीम स्क्रिप्ट) को छिपाकर गोपनीयता प्रदान करता है। शुरुआत में केवल 20-बाइट का हैश ही दिखाई देता है, जिससे यह छुपा रहता है कि यह मल्टीसिग, टाइमलॉक या अन्य जटिल शर्तें हैं या नहीं। हालांकि, जब P2SH आउटपुट पहली बार खर्च किया जाता है, तो सत्यापन के लिए पूरी रिडीम स्क्रिप्ट को on-chain के माध्यम से प्रकट करना आवश्यक हो जाता है, जिससे खर्च की शर्तें नेटवर्क के सभी प्रतिभागियों के लिए स्थायी रूप से दृश्यमान हो जाती हैं। यह एक बार का प्रकटीकरण ही गोपनीयता और कार्यक्षमता के बीच P2SH का संतुलन है।
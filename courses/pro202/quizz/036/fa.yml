question: شرایط خرج کردن یک تراکنش P2SH با گذشت زمان چه اتفاقی برای حریم خصوصی آن می‌افتد؟
answer: شرایط هزینه‌کرد تا اولین هزینه پنهان می‌مانند و سپس به‌طور دائمی قابل مشاهده می‌شوند on-chain
wrong_answers:
  - شرایط هزینه‌کردن حتی پس از انجام معاملات متعدد به‌طور دائمی خصوصی باقی می‌مانند.
  - شرایط هزینه بلافاصله زمانی که آدرس P2SH برای اولین بار ایجاد می‌شود قابل مشاهده است.
  - شرایط هزینه‌کردن به‌طور موقت در طول هزینه‌کردن قابل مشاهده می‌شوند اما پس از آن دوباره پنهان می‌شوند.
explanation: |
  P2SH با پنهان کردن شرایط واقعی خرج (redeem script) پشت یک هش در scriptPubKey، حریم خصوصی را فراهم می‌کند. در ابتدا تنها هش 20 بایتی قابل مشاهده است که پنهان می‌کند آیا شرایط چند امضایی، قفل زمانی یا شرایط پیچیده دیگر است. با این حال، زمانی که خروجی P2SH برای اولین بار خرج می‌شود، اسکریپت کامل باید برای اعتبارسنجی به on-chain فاش شود، که باعث می‌شود شرایط خرج برای همیشه برای همه شرکت‌کنندگان شبکه قابل مشاهده باشد. این افشاگری یک‌باره، معامله‌ای است که P2SH بین حریم خصوصی و عملکرد انجام می‌دهد.
question: เงื่อนไขการใช้จ่ายของธุรกรรม P2SH จะมีความเป็นส่วนตัวอย่างไรเมื่อเวลาผ่านไป?
answer: เงื่อนไขการใช้จ่ายจะถูกซ่อนไว้จนกว่าจะมีการใช้จ่ายครั้งแรก จากนั้นจะมองเห็นได้อย่างถาวร on-chain
wrong_answers:
  - เงื่อนไขการใช้จ่ายยังคงเป็นส่วนตัวอย่างถาวรแม้จะมีการทำธุรกรรมหลายครั้ง
  - เงื่อนไขการใช้จ่ายจะมองเห็นได้ทันทีเมื่อมีการสร้างที่อยู่ P2SH ขึ้นเป็นครั้งแรก
  - เงื่อนไขการใช้จ่ายจะปรากฏให้เห็นชั่วคราวในระหว่างการใช้จ่ายแต่จะถูกซ่อนอีกครั้งหลังจากนั้น
explanation: |
  P2SH ให้ความเป็นส่วนตัวโดยการซ่อนเงื่อนไขการใช้จ่ายจริง (redeem script) ไว้หลังแฮชใน scriptPubKey โดยเริ่มแรกจะมองเห็นเพียงแฮชขนาด 20 ไบต์เท่านั้น ซึ่งจะปกปิดว่าเป็น multisig, timelock หรือเงื่อนไขซับซ้อนอื่นๆ อย่างไรก็ตาม เมื่อมีการใช้จ่าย P2SH output เป็นครั้งแรก จะต้องเปิดเผย redeem script ทั้งหมดให้ on-chain เพื่อการตรวจสอบ ทำให้เงื่อนไขการใช้จ่ายมองเห็นได้อย่างถาวรต่อผู้เข้าร่วมเครือข่ายทั้งหมด การเปิดเผยเพียงครั้งเดียวนี้เป็นการแลกเปลี่ยนระหว่างความเป็นส่วนตัวและการทำงานของ P2SH
question: Qu'advient-il de la confidentialité des conditions de dépenses d'une transaction P2SH au fil du temps ?
answer: Les conditions de dépense restent cachées jusqu'à la première dépense, puis deviennent visibles en permanence on-chain
wrong_answers:
  - Les conditions de dépenses restent privées en permanence, même après plusieurs transactions
  - Les conditions de dépenses sont immédiatement visibles lorsque l'adresse P2SH est créée pour la première fois
  - Les conditions de dépense devient temporairement visibles pendant les dépenses, mais est à nouveau cachées par la suite
explanation: |
  P2SH assure la confidentialité en cachant les conditions de dépenses réelles (script de rachat) derrière un hachage dans la clé ScriptPubKey. Seul le hachage de 20 octets est visible au départ, ce qui permet de ne pas savoir s'il s'agit d'un multi-sig, d'un timelock ou d'autres conditions complexes. Cependant, lorsque la sortie P2SH est dépensée pour la première fois, le script de rachat complet doit être révélé on-chain pour validation, ce qui rend les conditions de dépense visibles de façon permanente pour tous les participants au réseau. Cette révélation unique est le compromis que fait P2SH entre confidentialité et fonctionnalité.

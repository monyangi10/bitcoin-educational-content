question: 프라이버시 보호 라이트 클라이언트를 위한 컴팩트 블록 필터(BIP158)의 경우, wallet 프라이버시 보호에 효과적인 중요한 트레이드오프는 무엇인가요?
answer: 오탐은 발생할 수 있지만 오탐은 발생하지 않으므로 클라이언트가 특정 주소를 공개하지 않고도 잠재적으로 관련 없는 블록을 다운로드할 수 있습니다
wrong_answers:
  - 오탐을 생성할 수는 있지만 오탐을 생성하지 않으므로 클라이언트가 트랜잭션이 포함된 블록만 다운로드할 수 있습니다
  - wallet 주소를 기반으로 결정론적 필터링을 사용하여 오탐과 오탐을 모두 제거합니다
  - "오탐과 오탐을 동일한 비율로 생성하여 고객의 실제 거래 패턴을 모호하게 만듭니다."
explanation: |
  컴팩트 블록 필터는 비대칭 오류 모델로 설계되어 블록에 관련 트랜잭션이 없는데도 이를 표시할 수 있지만(오탐), 실제로 관련 트랜잭션이 포함된 블록은 절대 놓치지 않습니다(오탐 없음). 오탐은 실제 결제를 놓칠 수 있는 반면, 오양성은 불필요한 블록만 다운로드하기 때문에 이러한 설계가 매우 중요합니다. 오탐률은 클라이언트가 관련 없는 블록을 다운로드하도록 강제하여 관찰자가 실제로 어떤 블록에 클라이언트의 트랜잭션이 포함되어 있는지 확인할 수 없도록 함으로써 프라이버시를 보호합니다.
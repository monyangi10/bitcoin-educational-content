question: プライバシーを保護するライトクライアントのためのコンパクトなブロックフィルター（BIP158）の文脈において、walletのプライバシーに効果的なトレードオフは何か？
answer: 誤検出はあっても誤検出はないため、クライアントは特定のアドレスを明かすことなく、無関係な可能性のあるブロックをダウンロードすることができる。
wrong_answers:
  - クライアントが自分のトランザクションを含むブロックのみをダウンロードすることを保証する。
  - walletアドレスに基づく決定論的フィルタリングを使用することにより、偽陽性と偽陰性の両方を排除する。
  - "偽陽性と偽陰性の両方を同じ割合で生み出し、顧客の実際の取引パターンを難読化する"
explanation: |
  コンパクト・ブロック・フィルターは、非対称エラー・モデルで設計されている。つまり、あるブロックに関連する取引が含まれているにもかかわらず、それが含まれていないことを示すことがある（偽陽性）が、実際に関連する取引が含まれているブロックを見逃すことはない（偽陰性はない）。偽陰性は実際の支払いを見逃すことを意味するが、偽陽性は不要なブロックをダウンロードすることになるだけであるため、この設計は極めて重要である。偽陽性率はクライアントに無関係なブロックをダウンロードさせることでプライバシーを提供し、オブザーバーがどのブロックにクライアントの取引が実際に含まれているかを判断することを不可能にする。
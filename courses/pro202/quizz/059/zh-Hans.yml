question: "就用于保护隐私的光客户端的紧凑型块滤波器（BIP158）而言，使其有效保护 wallet 隐私的关键权衡因素是什么？"
answer: "它们可能产生误报，但绝不会产生误报，从而允许客户端下载可能无关的区块，而不会泄露具体地址"
wrong_answers:
  - "它们可能会产生假阴性，但绝不会产生假阳性，从而确保客户只下载包含其交易的区块"
  - "它们通过使用基于 wallet 地址的确定性过滤来消除误报和误报"
  - "它们以相同的比例产生假阳性和假阴性，以混淆客户的实际交易模式。"
explanation: |
  紧凑型区块过滤器采用非对称错误模型设计：它们可能会显示某个区块包含相关交易，但实际上并不包含（假阳性），但绝不会漏掉实际上包含相关交易的区块（无假阴性）。这种设计至关重要，因为假阴性将意味着错过实际支付，而假阳性只会导致下载不必要的区块。假阳性率迫使客户下载一些无关的区块，使观察者无法确定哪些区块真正包含客户的交易，从而保护了客户的隐私。

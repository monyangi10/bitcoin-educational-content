question: ในบริบทของตัวกรองบล็อกแบบกะทัดรัด (BIP158) สำหรับไคลเอนต์แบบเบาที่รักษาความเป็นส่วนตัว การแลกเปลี่ยนที่สำคัญที่ทำให้พวกเขามีประสิทธิภาพสำหรับความเป็นส่วนตัว wallet คืออะไร?
answer: พวกเขาสามารถสร้างผลบวกปลอมได้แต่ไม่เคยสร้างผลลบปลอม ทำให้ลูกค้าสามารถดาวน์โหลดบล็อกที่อาจไม่เกี่ยวข้องได้โดยไม่ต้องเปิดเผยที่อยู่เฉพาะ
wrong_answers:
  - พวกเขาสามารถสร้างผลลบเท็จได้แต่ไม่เคยสร้างผลบวกเท็จ เพื่อให้แน่ใจว่าลูกค้าจะดาวน์โหลดเฉพาะบล็อกที่มีธุรกรรมของพวกเขาเท่านั้น
  - พวกเขากำจัดทั้งผลบวกปลอมและผลลบปลอมโดยใช้การกรองแบบกำหนดแน่นอนตามที่อยู่ wallet
  - "พวกเขาผลิตทั้งผลบวกปลอมและผลลบปลอมในสัดส่วนที่เท่ากันเพื่อปกปิดรูปแบบการทำธุรกรรมที่แท้จริงของลูกค้า"
explanation: |
  ฟิลเตอร์บล็อกแบบกะทัดรัดถูกออกแบบด้วยโมเดลข้อผิดพลาดแบบอสมมาตร: พวกมันอาจบ่งชี้ว่าบล็อกมีธุรกรรมที่เกี่ยวข้องเมื่อมันไม่มี (บวกเท็จ) แต่พวกมันจะไม่พลาดบล็อกที่มีธุรกรรมที่เกี่ยวข้องจริง ๆ (ไม่มีลบเท็จ) การออกแบบนี้มีความสำคัญเพราะลบเท็จจะหมายถึงการพลาดการชำระเงินจริง ๆ ในขณะที่บวกเท็จเพียงแค่ส่งผลให้ดาวน์โหลดบล็อกที่ไม่จำเป็น อัตราบวกเท็จให้ความเป็นส่วนตัวโดยการบังคับให้ลูกค้าดาวน์โหลดบล็อกที่ไม่เกี่ยวข้องบางส่วน ทำให้ผู้สังเกตการณ์ไม่สามารถระบุได้ว่าบล็อกใดมีธุรกรรมของลูกค้าจริง ๆ
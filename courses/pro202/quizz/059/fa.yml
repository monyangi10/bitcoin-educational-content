question: در زمینه فیلترهای بلوک فشرده (BIP158) برای مشتریان سبک حفظ حریم خصوصی، چه معامله بحرانی وجود دارد که آنها را برای حریم خصوصی wallet مؤثر می‌سازد؟
answer: آن‌ها می‌توانند نتایج مثبت کاذب تولید کنند اما هرگز نتایج منفی کاذب تولید نمی‌کنند، که به مشتریان اجازه می‌دهد بلوک‌های بالقوه نامربوط را بدون افشای آدرس‌های خاص دانلود کنند.
wrong_answers:
  - آن‌ها می‌توانند نتایج منفی کاذب تولید کنند اما هرگز نتایج مثبت کاذب تولید نمی‌کنند، و اطمینان می‌دهند که مشتریان تنها بلوک‌هایی را دانلود می‌کنند که شامل تراکنش‌های آن‌ها است.
  - آن‌ها با استفاده از فیلترینگ قطعی بر اساس آدرس‌های wallet، هم مثبت‌های کاذب و هم منفی‌های کاذب را حذف می‌کنند.
  - "آن‌ها به‌طور مساوی هم نتایج مثبت کاذب و هم نتایج منفی کاذب تولید می‌کنند تا الگوهای واقعی تراکنش مشتری را مبهم کنند"
explanation: |
  فیلترهای بلوک فشرده با یک مدل خطای نامتقارن طراحی شده‌اند: ممکن است نشان دهند که یک بلوک حاوی تراکنش‌های مرتبط است در حالی که اینطور نیست (مثبت کاذب)، اما هرگز بلوکی را که واقعاً حاوی تراکنش‌های مرتبط است از دست نخواهند داد (منفی کاذب ندارد). این طراحی بسیار مهم است زیرا منفی‌های کاذب به معنای از دست دادن پرداخت‌های واقعی خواهد بود، در حالی که مثبت‌های کاذب فقط منجر به دانلود بلوک‌های غیرضروری می‌شود. نرخ مثبت کاذب با مجبور کردن مشتریان به دانلود برخی بلوک‌های نامربوط، حریم خصوصی را فراهم می‌کند و تعیین اینکه کدام بلوک‌ها واقعاً حاوی تراکنش‌های مشتری هستند را برای ناظران غیرممکن می‌سازد.
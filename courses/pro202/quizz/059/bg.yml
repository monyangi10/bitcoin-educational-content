question: В контекста на компактните блокови филтри (BIP158) за запазване на неприкосновеността на личния живот на светлинните клиенти, какъв е критичният компромис, който ги прави ефективни за запазване на неприкосновеността на личния живот на wallet?
answer: Те могат да дават фалшиви положителни резултати, но никога фалшиви отрицателни резултати, което позволява на клиентите да изтеглят потенциално нерелевантни блокове, без да разкриват конкретни адреси
wrong_answers:
  - Те могат да доведат до фалшиви отрицателни резултати, но никога до фалшиви положителни резултати, като гарантират, че клиентите изтеглят само блокове, съдържащи техните транзакции
  - Те елиминират както фалшивите положителни, така и фалшивите отрицателни резултати, като използват детерминистично филтриране въз основа на адреси wallet
  - "Те произвеждат в еднаква степен както фалшиви положителни, така и фалшиви отрицателни резултати, за да прикрият действителните модели на транзакциите на клиента."
explanation: |
  Компактните блокови филтри са проектирани с асиметричен модел на грешка: те могат да посочат, че даден блок съдържа съответните транзакции, когато това не е така (фалшиво положителни резултати), но никога няма да пропуснат блок, който всъщност съдържа съответните транзакции (няма фалшиво отрицателни резултати). Този дизайн е от решаващо значение, тъй като фалшивите отрицателни резултати биха означавали пропускане на действителни плащания, докато фалшивите положителни резултати водят само до изтегляне на ненужни блокове. Честотата на фалшивите положителни резултати осигурява неприкосновеност на личния живот, като принуждава клиентите да изтеглят някои нерелевантни блокове, което прави невъзможно за наблюдателите да определят кои блокове действително съдържат транзакциите на клиента.
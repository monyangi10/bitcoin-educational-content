question: 在隱私權保護光用戶端的緊湊型區塊篩選器 (BIP158) 方面，使其能有效保護 wallet 隱私權的關鍵權衡是什麼？
answer: 它們可能會產生誤判，但不會產生誤判，讓用戶端可以下載可能無關的區塊，而不會透露特定位址
wrong_answers:
  - 它們可能會產生錯誤的否定，但絕不會產生錯誤的肯定，以確保用戶端只下載包含其交易的區塊。
  - 他們透過使用基於 wallet 位址的確定性篩選來消除誤判與誤判。
  - 「它們會以相同比例產生假陽性和假陰性，以混淆客戶的實際交易模式」
explanation: |
  精簡區塊篩選器的設計採用非對稱錯誤模型：它們可能會顯示一個區塊包含相關交易，但實際上卻沒有 (假陽性)，但它們絕不會遺漏實際包含相關交易的區塊 (無假陰性)。這個設計非常重要，因為錯誤的否定表示會遺漏實際的付款，而錯誤的肯定只會導致下載不必要的區塊。假陽性率會強迫客戶下載一些不相關的區塊，讓觀察者無法判斷哪些區塊實際包含客戶的交易，從而提供隱私權。
question: गोपनीयता बनाए रखने वाले लाइट क्लाइंट्स के लिए कॉम्पैक्ट ब्लॉक फिल्टर (BIP158) के संदर्भ में, वह महत्वपूर्ण समझौता क्या है जो उन्हें wallet गोपनीयता के लिए प्रभावी बनाता है?
answer: वे गलत सकारात्मक परिणाम दे सकते हैं लेकिन कभी भी गलत नकारात्मक परिणाम नहीं देते, जिससे ग्राहक विशिष्ट पते प्रकट किए बिना संभावित रूप से अप्रासंगिक ब्लॉक डाउनलोड कर सकते हैं।
wrong_answers:
  - वे गलत नकारात्मक परिणाम तो दे सकते हैं, लेकिन कभी भी गलत सकारात्मक परिणाम नहीं देते, जिससे यह सुनिश्चित होता है कि ग्राहक केवल उन्हीं ब्लॉक को डाउनलोड करें जिनमें उनके लेनदेन शामिल हों।
  - वे wallet पतों पर आधारित नियतात्मक फ़िल्टरिंग का उपयोग करके गलत सकारात्मक और गलत नकारात्मक दोनों परिणामों को समाप्त कर देते हैं।
  - "वे ग्राहक के वास्तविक लेनदेन पैटर्न को छिपाने के लिए समान अनुपात में झूठे सकारात्मक और झूठे नकारात्मक परिणाम उत्पन्न करते हैं।"
explanation: |
  कॉम्पैक्ट ब्लॉक फ़िल्टर एक असममित त्रुटि मॉडल के साथ डिज़ाइन किए गए हैं: वे यह संकेत दे सकते हैं कि किसी ब्लॉक में प्रासंगिक लेनदेन हैं जबकि वास्तव में ऐसा नहीं होता (गलत सकारात्मक), लेकिन वे कभी भी ऐसे ब्लॉक को नहीं चूकेंगे जिसमें वास्तव में प्रासंगिक लेनदेन हों (गलत नकारात्मक नहीं)। यह डिज़ाइन महत्वपूर्ण है क्योंकि गलत नकारात्मक का अर्थ वास्तविक भुगतानों का छूट जाना होता है, जबकि गलत सकारात्मक होने पर केवल अनावश्यक ब्लॉक डाउनलोड होते हैं। गलत सकारात्मक दर गोपनीयता प्रदान करती है क्योंकि यह ग्राहकों को कुछ अप्रासंगिक ब्लॉक डाउनलोड करने के लिए बाध्य करती है, जिससे पर्यवेक्षकों के लिए यह निर्धारित करना असंभव हो जाता है कि वास्तव में किन ब्लॉकों में ग्राहक के लेनदेन हैं।
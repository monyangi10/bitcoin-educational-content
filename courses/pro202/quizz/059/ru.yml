question: В контексте компактных блок-фильтров (BIP158) для световых клиентов, сохраняющих конфиденциальность, каков критический компромисс, который делает их эффективными для обеспечения конфиденциальности wallet?
answer: Они могут давать ложные положительные результаты, но никогда - ложные отрицательные, позволяя клиентам загружать потенциально нерелевантные блоки без раскрытия конкретных адресов
wrong_answers:
  - Они могут давать ложноотрицательные результаты, но никогда - ложноположительные, гарантируя, что клиенты загружают только блоки, содержащие их транзакции
  - Они исключают как ложноположительные, так и ложноотрицательные результаты, используя детерминированную фильтрацию на основе адресов wallet
  - "Они выдают как ложноположительные, так и ложноотрицательные результаты в равных пропорциях, чтобы запутать реальные схемы операций клиента"
explanation: |
  Компактные блокчейн-фильтры разработаны с асимметричной моделью ошибок: они могут указывать, что блок содержит релевантные транзакции, когда это не так (ложное срабатывание), но они никогда не пропустят блок, который действительно содержит релевантные транзакции (нет ложных отрицаний). Такая конструкция очень важна, поскольку ложноотрицательные результаты означают пропуск реальных платежей, в то время как ложноположительные результаты приводят лишь к загрузке ненужных блоков. Коэффициент ложных срабатываний обеспечивает конфиденциальность, заставляя клиентов загружать некоторые нерелевантные блоки, что делает невозможным для наблюдателей определить, какие блоки на самом деле содержат транзакции клиента.
question: เมื่อโหนด Bitcoin ร้องขอส่วนหัวของบล็อกโดยใช้คำสั่ง getheaders จำนวนสูงสุดของส่วนหัวที่สามารถส่งคืนได้ในหนึ่งการตอบสนองคือเท่าใด และมีอะไรตามหลังแต่ละส่วนหัวขนาด 80 ไบต์?
answer: สามารถส่งคืนส่วนหัวได้สูงสุด 2000 รายการ แต่ละรายการตามด้วยจำนวนธุรกรรมจำลองเป็นศูนย์
wrong_answers:
  - สามารถส่งคืนส่วนหัวได้สูงสุด 1000 ส่วนหัว แต่ละส่วนหัวตามด้วยจำนวนธุรกรรมจริงเป็น varint
  - สามารถส่งคืนส่วนหัวได้สูงสุด 2000 ส่วนหัว แต่ละส่วนหัวตามด้วยการตรวจสอบความถูกต้องของข้อมูลส่วนหัวขนาด 4 ไบต์
  - สามารถส่งคืนส่วนหัวได้สูงสุด 500 ส่วนหัว แต่ละส่วนหัวตามด้วย Merkle root hash สำหรับการตรวจสอบ
explanation: |
  โปรโตคอล P2P ของ Bitcoin จำกัดการตอบสนอง getheaders ไว้ที่สูงสุด 2000 headers เพื่อป้องกันไม่ให้โหนดถูกครอบงำด้วยการตอบสนองขนาดใหญ่ แต่ละ header มีขนาด 80 ไบต์พอดีและตามด้วยฟิลด์นับจำนวนธุรกรรมที่ตั้งค่าเป็นศูนย์ เนื่องจากข้อความที่มีเฉพาะ headers ไม่รวมธุรกรรมจริง การออกแบบนี้ช่วยให้การซิงโครไนซ์เชนมีประสิทธิภาพ โดยที่โหนดสามารถดาวน์โหลดและตรวจสอบโครงสร้างเชน proof-of-work ได้อย่างรวดเร็วก่อนที่จะร้องขอข้อมูลบล็อกเต็มรูปแบบ
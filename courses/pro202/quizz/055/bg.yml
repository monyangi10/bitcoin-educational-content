question: Когато възел Bitcoin изисква блокови заглавия чрез командата getheaders, какъв е максималният брой заглавия, които могат да бъдат върнати в един отговор, и какво следва след всяко 80-байтово заглавие?
answer: Могат да бъдат върнати до 2000 заглавия, всяко от които е последвано от нулев брой фиктивни транзакции
wrong_answers:
  - Могат да бъдат върнати до 1000 заглавия, всяко от които е последвано от действителния брой транзакции като varint
  - Могат да бъдат върнати до 2000 заглавия, всяко от които е последвано от 4-байтова контролна сума на данните от заглавието
  - Могат да бъдат върнати до 500 заглавия, всяко от които е последвано от кореновия хеш на Merkle за проверка
explanation: |
  Протоколът P2P на Bitcoin специално ограничава отговорите getheaders до максимум 2000 заглавия, за да предотврати претоварването на възлите с огромни отговори. Всеки хедър е точно 80 байта и е последван от поле за брой транзакции, зададено на нула, тъй като съобщенията само с хедъри не включват действителни транзакции. Този дизайн позволява ефективна синхронизация на веригата, при която възлите могат бързо да изтеглят и проверят структурата на веригата proof-of-work, преди да поискат пълни данни за блока.
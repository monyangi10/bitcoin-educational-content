question: Bitcoin 노드가 getheaders 명령을 사용하여 블록 헤더를 요청할 때 단일 응답으로 반환할 수 있는 최대 헤더 수는 몇 개이며, 각 80바이트 헤더 뒤에는 무엇이 오나요?
answer: 최대 2000개의 헤더를 반환할 수 있으며, 각 헤더 뒤에는 더미 트랜잭션 수가 0으로 표시됩니다
wrong_answers:
  - 최대 1000개의 헤더를 반환할 수 있으며, 각 헤더 뒤에 실제 트랜잭션 수가 바린트로 표시됩니다
  - 최대 2000개의 헤더를 반환할 수 있으며, 각 헤더에는 4바이트의 헤더 데이터 체크섬이 뒤따릅니다
  - 최대 500개의 헤더를 반환할 수 있으며, 각각 뒤에 확인을 위한 머클 루트 해시가 붙습니다
explanation: |
  Bitcoin의 P2P 프로토콜은 특히 대규모 응답으로 노드가 압도당하는 것을 방지하기 위해 겟헤더 응답을 최대 2000개 헤더로 제한합니다. 각 헤더는 정확히 80바이트이며, 헤더 전용 메시지에는 실제 트랜잭션이 포함되지 않으므로 그 뒤에는 트랜잭션 수 필드가 0으로 설정되어 있습니다. 이러한 설계는 노드가 전체 블록 데이터를 요청하기 전에 proof-of-work 체인 구조를 빠르게 다운로드하고 확인할 수 있는 효율적인 체인 동기화를 가능하게 합니다.
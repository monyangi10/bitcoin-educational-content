question: هنگامی که یک گره Bitcoin با استفاده از فرمان getheaders درخواست سرآیندهای بلاک می‌کند، حداکثر چند سرآیند می‌تواند در یک پاسخ برگردانده شود و چه چیزی پس از هر سرآیند ۸۰ بایتی می‌آید؟
answer: حداکثر 2000 هدر می‌تواند بازگردانده شود، که هر کدام با یک شمارش تراکنش ساختگی صفر دنبال می‌شود.
wrong_answers:
  - حداکثر 1000 هدر می‌تواند بازگردانده شود، که هر کدام با تعداد واقعی تراکنش به عنوان یک varint دنبال می‌شود.
  - تا ۲۰۰۰ هدر می‌توانند بازگردانده شوند، که هر کدام با یک چکسام ۴ بایتی از داده‌های هدر دنبال می‌شوند.
  - تا ۵۰۰ هدر می‌توانند بازگردانده شوند، که هر کدام با هش ریشه مرکل برای تأیید دنبال می‌شوند.
explanation: |
  پروتکل P2P در Bitcoin به طور خاص پاسخ‌های getheaders را به حداکثر 2000 هدر محدود می‌کند تا از پاسخ‌های عظیم که می‌تواند گره‌ها را تحت فشار قرار دهد، جلوگیری کند. هر هدر دقیقاً 80 بایت است و به دنبال آن یک فیلد شمارش تراکنش قرار دارد که به صفر تنظیم شده است، زیرا پیام‌های فقط هدر شامل تراکنش‌های واقعی نمی‌شوند. این طراحی امکان همگام‌سازی زنجیره‌ای کارآمد را فراهم می‌کند که در آن گره‌ها می‌توانند به سرعت ساختار زنجیره proof-of-work را دانلود و تأیید کنند قبل از اینکه داده‌های کامل بلوک را درخواست کنند.
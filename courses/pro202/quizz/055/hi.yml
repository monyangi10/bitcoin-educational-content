question: जब कोई Bitcoin नोड getheaders कमांड का उपयोग करके ब्लॉक हेडर का अनुरोध करता है, तो एक ही प्रतिक्रिया में लौटाए जा सकने वाले हेडर की अधिकतम संख्या क्या है, और प्रत्येक 80-बाइट हेडर के बाद क्या आता है?
answer: अधिकतम 2000 हेडर लौटाए जा सकते हैं, जिनमें से प्रत्येक के बाद शून्य का एक डमी लेनदेन गणना मान दिया जाता है।
wrong_answers:
  - अधिकतम 1000 हेडर लौटाए जा सकते हैं, जिनमें से प्रत्येक के बाद वास्तविक लेनदेन संख्या को वैरिएंट के रूप में दर्शाया जाता है।
  - अधिकतम 2000 हेडर लौटाए जा सकते हैं, जिनमें से प्रत्येक के बाद हेडर डेटा का 4-बाइट चेकसम होता है।
  - अधिकतम 500 हेडर लौटाए जा सकते हैं, जिनमें से प्रत्येक के बाद सत्यापन के लिए मर्कल रूट हैश दिया जाता है।
explanation: |
  Bitcoin का P2P प्रोटोकॉल विशेष रूप से getheaders प्रतिक्रियाओं को अधिकतम 2000 हेडर तक सीमित करता है ताकि नोड्स पर भारी मात्रा में प्रतिक्रियाओं का बोझ न पड़े। प्रत्येक हेडर ठीक 80 बाइट्स का होता है और इसके बाद एक ट्रांजैक्शन काउंट फ़ील्ड होता है जिसे शून्य पर सेट किया जाता है, क्योंकि केवल हेडर वाले संदेशों में वास्तविक ट्रांजैक्शन शामिल नहीं होते हैं। यह डिज़ाइन कुशल चेन सिंक्रोनाइज़ेशन की अनुमति देता है जहाँ नोड्स पूर्ण ब्लॉक डेटा का अनुरोध करने से पहले proof-of-work चेन संरचना को शीघ्रता से डाउनलोड और सत्यापित कर सकते हैं।
question: 當 Bitcoin 節點使用 getheaders 指令請求區塊標頭時，在單一回應中最多可以傳回多少個標頭，以及每個 80 位元組標頭的後面是什麼？
answer: 最多可傳回 2000 個標頭，每個標頭後面都有一個 0 的假交易計數
wrong_answers:
  - 最多可以傳回 1000 個標頭，每個標頭後面的實際交易次數都是變整數
  - 最多可傳回 2000 個標頭，每個標頭後面都有標頭資料的 4 位元組校驗和
  - 最多可傳回 500 個標頭，每個標頭後面都有 Merkle 根切細值，以供驗證
explanation: |
  Bitcoin 的 P2P 通訊協定特別限制 getheaders 回應最多只能有 2000 個標頭，以防止大量的回應壓垮節點。每個標頭正好是 80 位元組，其後的交易計數欄位設定為零，因為只有標頭的訊息不包含實際的交易。這種設計允許有效率的鏈同步，節點可以在要求完整區塊資料之前，快速下載並驗證 proof-of-work 鏈結構。
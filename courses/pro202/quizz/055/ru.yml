question: Когда узел Bitcoin запрашивает заголовки блоков с помощью команды getheaders, какое максимальное количество заголовков может быть возвращено в одном ответе, и что следует за каждым 80-байтовым заголовком?
answer: Может быть возвращено до 2000 заголовков, за каждым из которых следует счетчик фиктивных транзакций, равный нулю
wrong_answers:
  - Может быть возвращено до 1000 заголовков, за каждым из которых следует фактическое количество транзакций в виде varint
  - Может быть возвращено до 2000 заголовков, каждый из которых сопровождается 4-байтовой контрольной суммой данных заголовка
  - Может быть возвращено до 500 заголовков, каждый из которых сопровождается корневым хэшем Меркла для проверки
explanation: |
  Протокол Bitcoin в P2P специально ограничивает ответы getheaders максимум 2000 заголовками, чтобы не перегружать узлы массивными ответами. Каждый заголовок имеет размер ровно 80 байт, и за ним следует поле подсчета транзакций, установленное на ноль, поскольку сообщения, содержащие только заголовки, не содержат фактических транзакций. Такая конструкция позволяет эффективно синхронизировать цепочки, когда узлы могут быстро загрузить и проверить структуру цепочки proof-of-work, прежде чем запрашивать полные данные блока.
question: 当 Bitcoin 节点使用 getheaders 命令请求块报头时，单个响应中最多可返回多少个报头，每个 80 字节报头后面跟什么？
answer: 最多可返回 2000 个标头，每个标头后面都有一个 0 的虚拟事务计数
wrong_answers:
  - 最多可返回 1000 个标头，每个标头后面都有一个变整数的实际事务计数
  - 最多可返回 2000 个标头，每个标头后面都有一个 4 字节的标头数据校验和
  - 最多可返回 500 个标头，每个标头后面都有 Merkle 根哈希值供验证
explanation: |
  Bitcoin 的 P2P 协议特别限制了 getheaders 响应最多只能有 2000 个报头，以防止大量响应压垮节点。每个报文头正好是 80 字节，后面的事务计数字段设置为零，因为仅报文头的报文不包括实际事务。这种设计可实现高效的链同步，节点可在请求完整区块数据前快速下载并验证 proof-of-work 链结构。
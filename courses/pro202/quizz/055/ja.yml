question: Bitcoinノードがgetheadersコマンドを使ってブロックヘッダを要求するとき、1つのレスポンスで返されるヘッダの最大数と、各80バイトヘッダの後に続くものは何か？
answer: 最大2000個のヘッダを返すことができ、各ヘッダの後にはゼロのダミー・トランザクション・カウントが続く。
wrong_answers:
  - 最大1000個のヘッダを返すことができ、各ヘッダの後に実際のトランザクションカウントがvarintとして続く。
  - 最大2000個のヘッダーを返すことができ、各ヘッダーの後に4バイトのチェックサムが続く。
  - 最大500個のヘッダーを返すことができ、それぞれのヘッダーの後に検証用のMerkleルートハッシュが続く。
explanation: |
  BitcoinのP2Pプロトコルは、巨大なレスポンスでノードを圧倒するのを防ぐために、getheadersのレスポンスを最大2000ヘッダーに特に制限している。各ヘッダーは正確に80バイトであり、ヘッダーのみのメッセージは実際のトランザクションを含まないため、その後にゼロに設定されたトランザクションカウントフィールドが続く。この設計により、ノードはフルブロックデータを要求する前にproof-of-workチェーン構造を素早くダウンロードし検証することができ、効率的なチェーン同期が可能になる。
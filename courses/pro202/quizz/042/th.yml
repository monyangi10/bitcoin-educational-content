question: หากกลไกการปรับความยากของ Bitcoin พบสถานการณ์ที่บล็อก 2016 ก่อนหน้านี้ใช้เวลาในการขุด 6 สัปดาห์แทนที่จะเป็น 2 สัปดาห์ตามที่คาดไว้ ปัจจัยการปรับจะถูกนำไปใช้เท่าใด?
answer: ความยากจะลดลงด้วยปัจจัย 4 (การลดสูงสุดที่อนุญาต)
wrong_answers:
  - ความยากจะลดลงด้วยปัจจัย 3 (6 สัปดาห์ ÷ 2 สัปดาห์)
  - ความยากจะลดลงด้วยปัจจัย 2.5 เพื่อป้องกันการแก้ไขเกิน
  - ความยากจะลดลงด้วยปัจจัย 6 ตามอัตราส่วนเวลา
explanation: |
  การปรับความยากของ Bitcoin มีขีดจำกัดในตัวที่จำกัดการเปลี่ยนแปลงให้อยู่ในปัจจัยสี่ในแต่ละทิศทาง แม้ว่า 6 สัปดาห์ ÷ 2 สัปดาห์ = 3 ซึ่งบ่งบอกถึงการลดลง 3 เท่า แต่โปรโตคอลจำกัดการปรับที่ 4 เท่าเพื่อป้องกันความผันผวนที่รุนแรง กลไกความปลอดภัยนี้ช่วยให้เครือข่ายมีเสถียรภาพในระหว่างการเปลี่ยนแปลงอัตราแฮชที่สำคัญ เช่น การแบน mining หรือความล้มเหลวของอุปกรณ์ โดยการป้องกันการแก้ไขเกินที่อาจทำให้เวลาบล็อกไม่เสถียร
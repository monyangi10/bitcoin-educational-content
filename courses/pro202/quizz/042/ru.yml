question: Если механизм корректировки сложности Bitcoin столкнется со сценарием, в котором на добычу предыдущих блоков 2016 года ушло ровно 6 недель вместо ожидаемых 2 недель, какой поправочный коэффициент будет применен?
answer: Сложность будет снижена в 4 раза (максимально допустимое снижение)
wrong_answers:
  - Сложность уменьшится в 3 раза (6 недель ÷ 2 недели)
  - Сложность будет уменьшена в 2,5 раза, чтобы предотвратить чрезмерную коррекцию
  - Сложность будет уменьшена в 6 раз в зависимости от соотношения времени
explanation: |
  Корректировка сложности Bitcoin имеет встроенные ограничения, которые сдерживают изменения в пределах четырех раз в каждую сторону. Даже если 6 недель ÷ 2 недели = 3, что предполагает 3-кратное снижение, протокол ограничивает корректировки на уровне 4x, чтобы предотвратить экстремальную волатильность. Этот механизм безопасности обеспечивает стабильность сети во время серьезных изменений хэшрейта, таких как запрет mining или поломка оборудования, предотвращая чрезмерную коррекцию, которая может дестабилизировать временные параметры блоков.
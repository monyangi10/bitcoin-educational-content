question: यदि Bitcoin के कठिनाई समायोजन तंत्र को ऐसी स्थिति का सामना करना पड़ता है जहां पिछले 2016 ब्लॉकों को अपेक्षित 2 सप्ताह के बजाय ठीक 6 सप्ताह में खनन किया गया था, तो कौन सा समायोजन कारक लागू किया जाएगा?
answer: कठिनाई को 4 गुना तक कम किया जा सकता है (अधिकतम अनुमत कमी)।
wrong_answers:
  - कठिनाई तीन गुना कम हो जाएगी (6 सप्ताह ÷ 2 सप्ताह)
  - अतिसुधार को रोकने के लिए कठिनाई को 2.5 गुना कम कर दिया जाएगा।
  - समय अनुपात के आधार पर कठिनाई 6 गुना कम हो जाएगी।
explanation: |
  Bitcoin के डिफिकल्टी एडजस्टमेंट में अंतर्निहित सीमाएं हैं जो परिवर्तनों को दोनों दिशाओं में चार गुना तक सीमित रखती हैं। हालांकि 6 सप्ताह ÷ 2 सप्ताह = 3 होता है, जो 3 गुना कमी दर्शाता है, प्रोटोकॉल अत्यधिक अस्थिरता को रोकने के लिए समायोजन को 4 गुना तक सीमित रखता है। यह सुरक्षा तंत्र ब्लॉक टाइमिंग को अस्थिर कर सकने वाले अत्यधिक सुधार को रोककर, mining प्रतिबंध या उपकरण विफलताओं जैसे प्रमुख हैश दर परिवर्तनों के दौरान नेटवर्क स्थिरता सुनिश्चित करता है।
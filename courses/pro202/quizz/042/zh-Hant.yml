question: 如果 Bitcoin 的難度調整機制遇到的情況是，之前 2016 年的區塊正好花費 6 週開採，而不是預期的 2 週，那麼會應用什麼調整係數？
answer: 難度將降低 4 倍（允許的最大降低幅度）
wrong_answers:
  - 難度將降低 3 倍 (6 週 ÷ 2 週)
  - 難度會降低 2.5 倍，以防止過度矯正
  - 根據時間比率，難度會降低 6 倍
explanation: |
  Bitcoin 的難度調整有內建限制，可將任何方向的變化限制在 4 倍以內。儘管 6 週 ÷ 2 週 = 3，表示降低 3 倍，但協定仍將調整上限設為 4 倍，以防止極端波動。此安全機制可防止過度修正而造成區塊時序不穩定，以確保在重大雜湊率變更 (例如 mining 禁止或設備故障) 期間的網路穩定。
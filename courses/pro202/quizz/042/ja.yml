question: Bitcoinの難易度調整メカニズムが、前回の2016年ブロックの採掘に予想された2週間ではなく、ちょうど6週間かかったというシナリオに遭遇した場合、どのような調整係数が適用されますか？
answer: 難易度は4分の1になる（最大軽減率）
wrong_answers:
  - 難易度は3分の1になる（6週間÷2週間）。
  - 過矯正を防ぐため、難易度は2.5分の1になる
  - 難易度は時間比で6分の1になる。
explanation: |
  Bitcoinの難易度調整には制限が組み込まれており、どちらかの方向に4倍以内の変更が制限される。6週÷2週＝3であり、3倍の減少を示唆しているにもかかわらず、プロトコルは極端な変動を防ぐために調整を4倍に制限している。この安全メカニズムは、miningの禁止や機器の故障のような大きなハッシュレートの変更時に、ブロックのタイミングを不安定にする可能性のある過剰修正を防ぐことで、ネットワークの安定性を保証します。
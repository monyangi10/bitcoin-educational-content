question: Bitcoin의 난이도 조정 메커니즘이 이전 2016년 블록을 채굴하는 데 예상했던 2주 대신 정확히 6주가 걸리는 시나리오를 만나면 어떤 조정 계수가 적용될까요?
answer: 난이도가 4배 감소합니다(최대 허용 감소율)
wrong_answers:
  - 난이도는 3배(6주 ÷ 2주) 감소합니다
  - 과도한 보정을 방지하기 위해 난이도가 2.5배 감소합니다
  - 난이도는 시간 비율에 따라 6배 감소합니다
explanation: |
  Bitcoin의 난이도 조정에는 어느 방향으로든 4배 이내로 변경을 제한하는 제한이 내장되어 있습니다. 6주 ÷ 2주 = 3으로 3배 감소를 의미하지만, 프로토콜은 극심한 변동성을 방지하기 위해 4배로 조정을 제한합니다. 이 안전 메커니즘은 블록 타이밍을 불안정하게 만들 수 있는 과도한 수정을 방지하여 mining 금지 또는 장비 장애와 같은 주요 해시율 변경 시 네트워크 안정성을 보장합니다.
question: اگر مکانیزم تنظیم سختی Bitcoin با سناریویی مواجه شود که استخراج 2016 بلاک قبلی دقیقاً 6 هفته به جای 2 هفته مورد انتظار طول کشیده باشد، چه ضریب تنظیمی اعمال خواهد شد؟
answer: سختی به میزان ۴ برابر کاهش می‌یابد (حداکثر کاهش مجاز)
wrong_answers:
  - سختی به میزان ۳ برابر کاهش می‌یابد (۶ هفته ÷ ۲ هفته)
  - سختی به میزان ۲.۵ کاهش می‌یابد تا از اصلاح بیش از حد جلوگیری شود.
  - سختی بر اساس نسبت زمان به میزان ۶ برابر کاهش می‌یابد.
explanation: |
  تنظیم سختی Bitcoin دارای محدودیت‌های داخلی است که تغییرات را به ضریبی از چهار در هر جهت محدود می‌کند. حتی اگر ۶ هفته ÷ ۲ هفته = ۳ باشد که کاهش ۳ برابری را نشان می‌دهد، پروتکل تنظیمات را به ۴ برابر محدود می‌کند تا از نوسانات شدید جلوگیری کند. این مکانیزم ایمنی، پایداری شبکه را در طول تغییرات عمده نرخ هش، مانند ممنوعیت‌های mining یا خرابی تجهیزات، با جلوگیری از اصلاح بیش از حد که می‌تواند زمان‌بندی بلوک را بی‌ثبات کند، تضمین می‌کند.
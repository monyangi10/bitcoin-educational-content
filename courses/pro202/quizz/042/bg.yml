question: Ако механизмът за коригиране на трудността на Bitcoin се сблъска със сценарий, при който добивът на предишните блокове от 2016 г. е отнел точно 6 седмици вместо очакваните 2 седмици, какъв коефициент на коригиране ще бъде приложен?
answer: Трудността ще бъде намалена с коефициент 4 (максимално допустимо намаление)
wrong_answers:
  - Трудността ще бъде намалена 3 пъти (6 седмици ÷ 2 седмици)
  - Трудността ще бъде намалена с коефициент 2,5, за да се предотврати прекомерна корекция
  - Трудността ще бъде намалена 6 пъти в зависимост от съотношението на времето
explanation: |
  Регулирането на трудността на Bitcoin има вградени ограничения, които ограничават промените до четири пъти в двете посоки. Въпреки че 6 седмици ÷ 2 седмици = 3, което предполага намаляване 3 пъти, протоколът ограничава корекциите до 4 пъти, за да предотврати екстремни колебания. Този защитен механизъм осигурява стабилността на мрежата при големи промени в скоростта на хеширане, като например забрани на mining или повреди в оборудването, като предотвратява прекомерни корекции, които биха могли да дестабилизират времето на блоковете.
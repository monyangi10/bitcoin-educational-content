question: 如果 Bitcoin 的难度调整机制遇到这样一种情况，即之前的 2016 个区块的开采时间正好是 6 周，而不是预期的 2 周，那么会应用什么调整系数？
answer: 难度将降低 4 倍（允许的最大降低幅度）
wrong_answers:
  - 难度将降低 3 倍（6 周 ÷ 2 周）
  - 难度将降低 2.5 倍，以防止过度矫正
  - 根据时间比率，难度将降低 6 倍
explanation: |
  Bitcoin 的难度调整具有内置限制，可将任何方向的变化限制在 4 倍以内。尽管 6 周 ÷ 2 周 = 3，即降低了 3 倍，但协议规定的调整上限为 4 倍，以防止极端波动。这种安全机制通过防止过度校正而破坏区块计时的稳定性，从而确保网络在哈希率发生重大变化（如 mining 禁止或设备故障）时的稳定性。
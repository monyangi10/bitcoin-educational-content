question: 2-of-3マルチシグのP2WSHトランザクションの証人スタックにおいて、なぜ空のエレメントが証人スタックの一番下に含まれなければならないのか？
answer: CHECKMULTISIGのオフ・バイ・ワンのバグを補うために、実行中にスタックエレメントを余分に消費する。
wrong_answers:
  - "2-of-3のマルチシグ検証で使用されなかった3つ目の署名のプレースホルダを提供するため"
  - 適切なSegWit検証解析のために、署名データを証人スクリプトから分離する。
  - 効率的なメルクルツリー構築のために、証人のスタックの要素数が偶数になるようにする。
explanation: |
  CHECKMULTISIG opcode には、必要以上にスタックから要素をポップしてしまうという歴史的なバグがある。これは P2WSH を含むすべてのマルチシグ・トランザクションに影響する。空の要素はこのバグを補い、残りのスタック要素 (署名と証人のスクリプト) が検証のために適切に配置されるようにする。未使用の署名は空要素では表現されず、証人の解析は分離要素を必要とせず、証人のスタックはマルクル操作のために偶数要素数を必要としません。
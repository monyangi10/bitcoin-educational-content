question: در یک تراکنش P2WSH با پشته شاهد برای یک multisig 2-of-3، چرا باید یک عنصر خالی در پایین پشته شاهد گنجانده شود؟
answer: برای جبران باگ off-by-one در CHECKMULTISIG که یک عنصر اضافی از پشته را در طول اجرا مصرف می‌کند
wrong_answers:
  - "برای ارائه یک جایگزین برای امضای سوم که در اعتبارسنجی چند امضایی ۲ از ۳ استفاده نشده بود"
  - برای جدا کردن داده‌های امضا از اسکریپت شاهد برای تجزیه و تحلیل صحیح اعتبارسنجی SegWit
  - برای اطمینان از اینکه پشته شاهد تعداد زوجی از عناصر برای ساخت کارآمد درخت مرکل دارد
explanation: |
  کد عملیاتی CHECKMULTISIG دارای یک باگ تاریخی است که یک عنصر اضافی از پشته خارج می‌کند، بیش از آنچه که باید نیاز داشته باشد. این باگ بر تمام تراکنش‌های چند امضایی، از جمله P2WSH تأثیر می‌گذارد. عنصر خالی این باگ را جبران می‌کند و اطمینان می‌دهد که عناصر باقی‌مانده در پشته (امضاها و اسکریپت شاهد) به درستی برای اعتبارسنجی قرار گرفته‌اند. گزینه‌های دیگر نادرست هستند: امضاهای استفاده نشده توسط عناصر خالی نشان داده نمی‌شوند، تجزیه شاهد به عناصر جداسازی نیاز ندارد و پشته‌های شاهد برای عملیات مرکل به تعداد عناصر زوج نیاز ندارند.
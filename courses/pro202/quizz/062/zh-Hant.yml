question: 在 P2WSH 交易的 2 對 3 多重簽位的見證堆疊中，為什麼見證堆疊的底部必須包含一個空元素？
answer: 為了補償 CHECKMULTISIG 的 off-by-one bug，該 bug 會在執行過程中消耗額外的堆疊元素
wrong_answers:
  - 「為第三個簽章提供一個占位符，該簽章在 2 對 3 多重簽章驗證中未被使用」
  - 將簽名資料與見證腳本分開，以便進行適當的 SegWit 驗證解析
  - 為了確保見證堆疊有偶數個元素，以有效率地建構 merkle 樹
explanation: |
  CHECKMULTISIG 操作碼有一個歷史性的錯誤，它會從堆疊中彈出一個額外的元素，超出它應該需要的範圍。這會影響所有多重簽名交易，包括 P2WSH。空元素可補償此錯誤，確保餘下的堆疊元素 (簽名和見證指令碼) 在驗證時位置正確。其他選項是不正確的：未使用的簽章不是由空元素代表，見證解析不需要分離元素，見證堆疊不需要 merkle 運算的偶數元素數。
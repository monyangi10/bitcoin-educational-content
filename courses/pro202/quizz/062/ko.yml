question: 2대 3 다중 서명을 위한 P2WSH 트랜잭션의 증인 스택에서 증인 스택 하단에 빈 요소가 포함되어야 하는 이유는 무엇인가요?
answer: 실행 중 스택 요소를 추가로 소모하는 CHECKMULTISIG의 오프 바이 원 버그를 보완하려면 다음과 같이 하세요
wrong_answers:
  - "2대3 다중 서명 유효성 검사에서 사용되지 않은 세 번째 서명을 위한 자리 표시자 제공"
  - 적절한 SegWit 유효성 검사 구문 분석을 위해 서명 데이터를 증인 스크립트에서 분리하려면 다음과 같이 하세요
  - 효율적인 머클 트리 구성을 위해 증인 스택에 요소 수가 짝수인지 확인하려면 다음과 같이 하세요
explanation: |
  체크멀티서명 연산코드는 스택에서 필요한 것 이상으로 하나의 요소를 추가하는 기록적인 버그가 있습니다. 이는 P2WSH를 포함한 모든 다중서명 트랜잭션에 영향을 줍니다. 빈 요소는 이 버그를 보완하여 나머지 스택 요소(서명 및 감시 스크립트)가 유효성 검사를 위해 올바르게 배치되도록 합니다. 사용되지 않는 서명은 빈 요소로 표시되지 않고, 증인 구문 분석에는 분리 요소가 필요하지 않으며, 증인 스택에는 머클 연산을 위한 요소 수조차 필요하지 않다는 점에서 다른 옵션은 올바르지 않습니다.
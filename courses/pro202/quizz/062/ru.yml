question: Почему в стеке свидетелей транзакции P2WSH для мультисигмы 2 из 3 необходимо включать пустой элемент в нижней части стека свидетелей?
answer: Чтобы компенсировать ошибку CHECKMULTISIG "off-by-one", которая потребляет лишний элемент стека во время выполнения
wrong_answers:
  - "Чтобы обеспечить место для третьей подписи, которая не была использована в мультисигмальной проверке 2 из 3"
  - Чтобы отделить данные подписи от сценария свидетеля для правильного разбора проверки SegWit
  - Чтобы стек свидетелей имел четное количество элементов для эффективного построения дерева Меркла
explanation: |
  Опкод CHECKMULTISIG имеет историческую ошибку, когда он вытаскивает из стека один лишний элемент сверх того, что ему нужно. Это влияет на все мультисиговые транзакции, включая P2WSH. Пустой элемент компенсирует эту ошибку, обеспечивая правильное расположение оставшихся элементов стека (подписи и скрипт свидетеля) для проверки. Другие варианты неверны: неиспользуемые подписи не представлены пустыми элементами, разбор свидетелей не требует разделительных элементов, а стек свидетелей не нуждается в четном количестве элементов для операций merkle.
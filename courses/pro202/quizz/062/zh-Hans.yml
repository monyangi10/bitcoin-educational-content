question: 在 P2WSH 交易的 "2-of-3 多重签名 "见证堆栈中，为什么必须在见证堆栈底部包含一个空元素？
answer: 为了弥补 CHECKMULTISIG 的偏差（off-by-one）错误，该错误会在执行过程中消耗一个额外的堆栈元素
wrong_answers:
  - "为第三个签名提供一个占位符，该签名未在 2-3 多重签名验证中使用"
  - 将签名数据与见证脚本分开，以便进行正确的 SegWit 验证解析
  - 为确保见证堆栈的元素数量为偶数，以便高效地构建梅克尔树
explanation: |
  CHECKMULTISIG 操作码存在一个历史性错误，即它会从堆栈中弹出一个额外的元素，超出了它应该需要的范围。这会影响所有多重签名交易，包括 P2WSH。空元素可弥补这一缺陷，确保其余堆栈元素（签名和见证脚本）正确定位，以便进行验证。其他选项是错误的：空元素并不代表未使用的签名，见证解析不需要分离元素，见证堆栈也不需要用于梅克尔操作的偶数元素。
question: 2-ऑफ-3 मल्टीसिग के लिए P2WSH लेनदेन के विटनेस स्टैक में, विटनेस स्टैक के निचले भाग में एक खाली तत्व को शामिल करना क्यों आवश्यक है?
answer: CHECKMULTISIG के उस बग की भरपाई करने के लिए जो निष्पादन के दौरान एक अतिरिक्त स्टैक तत्व का उपभोग करता है।
wrong_answers:
  - "तीसरे हस्ताक्षर के लिए एक प्लेसहोल्डर प्रदान करना जिसका उपयोग 2-में-से-3 मल्टीसिग सत्यापन में नहीं किया गया था"
  - SegWit सत्यापन के लिए हस्ताक्षर डेटा को गवाह स्क्रिप्ट से अलग करना।
  - कुशल मर्कल ट्री निर्माण के लिए यह सुनिश्चित करना कि विटनेस स्टैक में तत्वों की संख्या सम हो।
explanation: |
  CHECKMULTISIG ऑपकोड में एक पुरानी त्रुटि है जिसके कारण यह स्टैक से आवश्यकता से अधिक एक अतिरिक्त तत्व निकाल लेता है। यह त्रुटि P2WSH सहित सभी मल्टीसिग लेनदेन को प्रभावित करती है। खाली तत्व इस त्रुटि की भरपाई करता है, जिससे यह सुनिश्चित होता है कि शेष स्टैक तत्व (हस्ताक्षर और विटनेस स्क्रिप्ट) सत्यापन के लिए सही स्थिति में हों। अन्य विकल्प गलत हैं: अप्रयुक्त हस्ताक्षरों को खाली तत्वों द्वारा नहीं दर्शाया जाता है, विटनेस पार्सिंग के लिए पृथक्करण तत्वों की आवश्यकता नहीं होती है, और मर्कल संचालन के लिए विटनेस स्टैक में सम संख्या में तत्वों की आवश्यकता नहीं होती है।
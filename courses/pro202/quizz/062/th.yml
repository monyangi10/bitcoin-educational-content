question: ในสแต็กพยานของธุรกรรม P2WSH สำหรับ 2-of-3 multisig ทำไมต้องมีองค์ประกอบว่างเปล่ารวมอยู่ที่ด้านล่างของสแต็กพยาน?
answer: เพื่อชดเชยข้อบกพร่องของ CHECKMULTISIG ที่ใช้สแต็กเพิ่มขึ้นหนึ่งรายการระหว่างการดำเนินการ
wrong_answers:
  - "เพื่อจัดเตรียมตัวแทนสำหรับลายเซ็นที่สามที่ไม่ได้ใช้ในการตรวจสอบ 2-of-3 multisig"
  - แยกข้อมูลลายเซ็นออกจากสคริปต์พยานเพื่อการแยกวิเคราะห์การตรวจสอบ SegWit ที่ถูกต้อง
  - เพื่อให้แน่ใจว่า stack พยานมีจำนวนองค์ประกอบเป็นเลขคู่สำหรับการสร้างต้นไม้เมอร์เคิลอย่างมีประสิทธิภาพ
explanation: |
  The CHECKMULTISIG opcode มีบั๊กทางประวัติศาสตร์ที่ทำให้มันดึงองค์ประกอบเพิ่มเติมหนึ่งรายการจากสแตกเกินกว่าที่ควรจะต้องการ สิ่งนี้มีผลกระทบต่อธุรกรรม multisig ทั้งหมด รวมถึง P2WSH ด้วย องค์ประกอบที่ว่างเปล่าชดเชยบั๊กนี้ เพื่อให้แน่ใจว่าองค์ประกอบสแตกที่เหลืออยู่ (ลายเซ็นและสคริปต์พยาน) ถูกจัดตำแหน่งอย่างถูกต้องสำหรับการตรวจสอบ ตัวเลือกอื่น ๆ นั้นไม่ถูกต้อง: ลายเซ็นที่ไม่ได้ใช้ไม่ได้แสดงด้วยองค์ประกอบที่ว่างเปล่า การแยกวิเคราะห์พยานไม่จำเป็นต้องมีองค์ประกอบแยก และสแตกพยานไม่จำเป็นต้องมีจำนวนองค์ประกอบที่เป็นคู่สำหรับการดำเนินการเมอร์เคิล
question: Защо в стека от свидетели на трансакция P2WSH за многозначност 2 от 3 трябва да бъде включен празен елемент в долната част на стека от свидетели?
answer: За да се компенсира грешката на CHECKMULTISIG, която използва допълнителен елемент от стека по време на изпълнение
wrong_answers:
  - "За да се осигури заместител за третия подпис, който не е използван при многозначното валидиране 2 от 3"
  - Отделяне на данните за подписа от скрипта на свидетеля с цел правилно анализиране на SegWit
  - За да се гарантира, че стекът от свидетели има четен брой елементи за ефективно изграждане на дърво на Меркъл
explanation: |
  Оперативният код CHECKMULTISIG има историческа грешка, при която изскача един допълнителен елемент от стека извън необходимото. Това засяга всички транзакции с многозначност, включително P2WSH. Празният елемент компенсира тази грешка, като гарантира, че останалите елементи от стека (подписи и свидетелски скрипт) са правилно позиционирани за валидиране. Другите варианти са некоректни: неизползваните подписи не се представят с празни елементи, анализът на свидетели не изисква разделителни елементи, а стековете на свидетели не се нуждаят от четен брой елементи за операциите merkle.
question: Что происходит со стеком после выполнения OP_CHECKSIG, когда проверка подписи проходит успешно?
answer: Значение 1 заносится в стек
wrong_answers:
  - Подпись и открытый ключ остаются в стеке
  - Стек очищается и сбрасывается в пустоту
  - Хэш открытого ключа помещается в стек
explanation: |
  OP_CHECKSIG - это опкод, преобразующий стек, который потребляет подпись и открытый ключ из стека, проверяет подпись по sighash транзакции и вставляет в стек либо 1 (для действительной), либо 0 (для недействительной). Оригинальная подпись и открытый ключ удаляются во время этого процесса. Стек не очищается полностью, и никакие хэш-значения не проталкиваются - только булев результат операции проверки.
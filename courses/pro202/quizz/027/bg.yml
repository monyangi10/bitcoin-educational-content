question: Какво се случва със стека след изпълнението на OP_CHECKSIG, когато проверката на подписа е успешна?
answer: Стойността 1 се вкарва в стека
wrong_answers:
  - Подписът и публичният ключ остават в стека
  - Стекът се изчиства и се връща в празно състояние
  - Хъшът на публичния ключ се вкарва в стека
explanation: |
  OP_CHECKSIG е опкод за трансформиране на стека, който консумира подпис и публичен ключ от стека, проверява подписа спрямо sighash на транзакцията и вкарва 1 (за валиден) или 0 (за невалиден) в стека. Оригиналният подпис и публичният ключ се премахват по време на този процес. Стекът не се изчиства изцяло и не се избутват никакви хеш стойности - само булевият резултат от операцията за проверка.
question: เกิดอะไรขึ้นกับสแตกหลังจากดำเนินการ OP_CHECKSIG เมื่อการตรวจสอบลายเซ็นสำเร็จ?
answer: ค่าที่ 1 ถูกนำไปใส่ในสแตก
wrong_answers:
  - ลายเซ็นและกุญแจสาธารณะยังคงอยู่บนสแตก
  - สแต็กถูกล้างและรีเซ็ตให้ว่างเปล่า
  - แฮชคีย์สาธารณะถูกผลักลงบนสแตก
explanation: |
  OP_CHECKSIG เป็นโอปโค้ดที่เปลี่ยนแปลงสแต็ก โดยจะดึงลายเซ็นและคีย์สาธารณะจากสแต็ก ตรวจสอบลายเซ็นกับ sighash ของธุรกรรม และดันค่า 1 (ถ้าถูกต้อง) หรือ 0 (ถ้าไม่ถูกต้อง) ลงบนสแต็ก ลายเซ็นและคีย์สาธารณะต้นฉบับจะถูกลบออกในระหว่างกระบวนการนี้ สแต็กจะไม่ถูกล้างทั้งหมด และจะไม่มีการดันค่าแฮชใดๆ - มีเพียงผลลัพธ์แบบบูลีนของการตรวจสอบเท่านั้น
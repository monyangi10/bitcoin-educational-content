question: 署名検証に成功した場合、OP_CHECKSIGを実行した後のスタックはどうなりますか？
answer: 値1がスタックにプッシュされる
wrong_answers:
  - 署名と公開鍵はスタックに残る
  - スタックがクリアされ、空にリセットされる
  - 公開鍵ハッシュがスタックにプッシュされる。
explanation: |
  OP_CHECKSIGはスタックを変換するオペコードであり、スタックから署名と公開鍵を消費し、トランザク ションのsighashに対して署名を検証し、1（有効）または0（無効）のいずれかをスタックにプッシュ する。元の署名と公開鍵はこの過程で削除される。スタックは完全にはクリアされず、ハッシュ値もプッシュされない。
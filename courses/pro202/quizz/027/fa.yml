question: پس از اجرای OP_CHECKSIG، زمانی که تأیید امضا موفقیت‌آمیز است، چه اتفاقی برای پشته می‌افتد؟
answer: مقدار 1 به پشته اضافه می‌شود.
wrong_answers:
  - امضا و کلید عمومی در پشته باقی می‌مانند
  - پشته پاک شده و به حالت خالی بازنشانی می‌شود
  - هش کلید عمومی بر روی پشته قرار می‌گیرد
explanation: |
  OP_CHECKSIG یک opcode تغییر پشته است که یک امضا و کلید عمومی را از پشته مصرف می‌کند، امضا را در برابر sighash تراکنش تأیید می‌کند و 1 (برای معتبر) یا 0 (برای نامعتبر) را به پشته فشار می‌دهد. امضای اصلی و کلید عمومی در طول این فرآیند حذف می‌شوند. پشته به طور کامل پاک نمی‌شود و هیچ مقدار هش فشرده نمی‌شود - تنها نتیجه بولی عملیات تأیید فشرده می‌شود.
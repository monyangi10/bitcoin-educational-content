question: हस्ताक्षर सत्यापन सफल होने पर OP_CHECKSIG को निष्पादित करने के बाद स्टैक का क्या होता है?
answer: स्टैक पर 1 मान जोड़ा जाता है
wrong_answers:
  - हस्ताक्षर और सार्वजनिक कुंजी स्टैक पर ही रहती हैं।
  - स्टैक को साफ़ कर दिया जाता है और उसे खाली स्थिति में रीसेट कर दिया जाता है।
  - पब्लिक की हैश को स्टैक पर पुश किया जाता है।
explanation: |
  OP_CHECKSIG एक स्टैक-ट्रांसफॉर्मिंग ऑपकोड है जो स्टैक से हस्ताक्षर और सार्वजनिक कुंजी लेता है, लेनदेन के sighash के विरुद्ध हस्ताक्षर का सत्यापन करता है, और स्टैक पर 1 (वैध होने पर) या 0 (अमान्य होने पर) जोड़ता है। इस प्रक्रिया के दौरान मूल हस्ताक्षर और सार्वजनिक कुंजी हटा दी जाती हैं। स्टैक पूरी तरह से साफ़ नहीं होता है, और कोई हैश मान नहीं जोड़ा जाता है - केवल सत्यापन प्रक्रिया का बूलियन परिणाम ही जोड़ा जाता है।
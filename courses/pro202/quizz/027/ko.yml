question: 서명 검증이 성공하면 OP_CHECKSIG을 실행한 후 스택은 어떻게 되나요?
answer: 값 1이 스택에 푸시됩니다
wrong_answers:
  - 서명과 공개 키는 스택에 남아 있습니다
  - 스택이 지워지고 비워짐으로 재설정됩니다
  - 공개 키 해시가 스택에 푸시됩니다
explanation: |
  OP_CHECKSIG은 스택에서 서명과 공개 키를 소비하는 스택 변환 연산 코드로, 트랜잭션의 시해시에 대해 서명을 확인한 후 1(유효) 또는 0(유효하지 않음)을 스택에 푸시합니다. 이 과정에서 원본 서명과 공개 키는 제거됩니다. 스택은 완전히 지워지지 않으며, 해시 값은 푸시되지 않고 검증 작업의 부울 결과만 푸시됩니다.
question: 在椭圆曲线加密中，标量乘法的双加算法的主要优势是什么？
answer: 它将计算复杂度从 O(n) 运算降低到 O(log n) 运算
wrong_answers:
  - 它消除了在有限域中进行模块运算的需要
  - 它将离散对数问题转化为多项式时间解决方案
  - 它允许从公钥直接计算私钥
explanation: |
  双加算法将计算复杂度从 O(n) 次线性加法降低到 O(log n) 次运算，从而大大提高了效率。其他选项都是错误的：在有限域中仍然需要模块运算，离散对数问题在计算上仍然不可行（这对安全性至关重要），而且无论使用哪种乘法算法，都无法从公钥计算出私人密钥。
question: एलिप्टिक कर्व क्रिप्टोग्राफी में स्केलर गुणन के लिए डबल-एंड-ऐड एल्गोरिदम का प्राथमिक लाभ क्या है?
answer: यह गणना की जटिलता को O(n) से O(log n) ऑपरेशन तक कम कर देता है।
wrong_answers:
  - यह परिमित क्षेत्रों में मॉड्यूलर अंकगणित की आवश्यकता को समाप्त करता है।
  - यह असतत लघुगणक समस्या को बहुपद-समय समाधान में परिवर्तित करता है।
  - यह सार्वजनिक कुंजियों से निजी कुंजियों की सीधी गणना की अनुमति देता है।
explanation: |
  डबल-एंड-ऐड एल्गोरिदम, कंप्यूटेशनल जटिलता को O(n) लीनियर जोड़ से O(log n) ऑपरेशन तक कम करके दक्षता में उल्लेखनीय सुधार करता है। यह स्केलर के बाइनरी प्रतिनिधित्व को स्कैन करके, प्रत्येक चरण में बिंदु को दोगुना करके, और केवल तभी जनरेटर बिंदु को जोड़कर काम करता है जब बिट 1 हो। अन्य विकल्प गलत हैं: परिमित क्षेत्रों में मॉड्यूलर अंकगणित अभी भी आवश्यक है, असतत लघुगणक समस्या कम्प्यूटेशनल रूप से अव्यवहार्य बनी रहती है (जो सुरक्षा के लिए आवश्यक है), और उपयोग किए गए गुणन एल्गोरिदम की परवाह किए बिना सार्वजनिक कुंजियों से निजी कुंजियों की गणना नहीं की जा सकती है।
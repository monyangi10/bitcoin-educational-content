question: 在橢圓曲線加密法中，標量乘法的雙加演算法的主要優點是什麼？
answer: 它將運算複雜度從 O(n) 降為 O(log n) 運算
wrong_answers:
  - 它消除了有限字段中的模運算需求
  - 它可將離散對數問題轉換為多數時解決方案
  - 它允許從公開密碼匙直接計算私人密碼匙
explanation: |
  double-and-add 演算法可將計算複雜度從 O(n) 線性加法減至 O(log n) 運算，大幅提升效率。其他選項都是不正確的：在有限欄位中仍然需要模組運算，離散對數問題在計算上仍然是不可行的 (這對安全性而言是不可或缺的)，而且無論使用哪種乘法演算法，都無法從公開密碼匙計算出私人密碼匙。
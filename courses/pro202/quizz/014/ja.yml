question: 楕円曲線暗号におけるスカラー倍算のダブル・アンド・アド・アルゴリズムの主な利点は？
answer: 計算の複雑さをO(n)からO(log n)演算に減らすことができる。
wrong_answers:
  - 有限体におけるモジュラー算術が不要になる
  - 離散対数問題を多項式時間解に変換する。
  - 公開鍵から秘密鍵を直接計算できる。
explanation: |
  ダブルアンドアッドアルゴリズムは、計算量をO(n)回の線形加算からO(log n)回の演算に減らすことで、効率を大幅に改善する。これは、スカラーの2進表現をスキャンし、各ステップでポイントを2倍し、ビットが1のときのみ生成ポイントを加算することで機能する。他の選択肢は正しくない。モジュラー算術は有限体では依然として必要であり、離散対数問題は依然として計算不可能である（これはセキュリティにとって不可欠である）。
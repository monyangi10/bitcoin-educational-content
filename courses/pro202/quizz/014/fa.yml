question: مزیت اصلی الگوریتم دو برابر و اضافه کردن برای ضرب اسکالر در رمزنگاری منحنی بیضوی چیست؟
answer: این محاسبات پیچیدگی را از O(n) به O(log n) عملیات کاهش می‌دهد.
wrong_answers:
  - این نیاز به حساب مدولار در میدان‌های متناهی را از بین می‌برد
  - این مسئله لگاریتم گسسته را به یک راه‌حل با زمان چندجمله‌ای تبدیل می‌کند
  - این امکان را فراهم می‌کند تا کلیدهای خصوصی به‌طور مستقیم از کلیدهای عمومی محاسبه شوند.
explanation: |
  الگوریتم دو برابر و اضافه کردن به طور قابل توجهی کارایی را با کاهش پیچیدگی محاسباتی از O(n) جمع‌های خطی به O(log n) عملیات بهبود می‌بخشد. این کار با اسکن نمایش باینری اسکالر، دو برابر کردن نقطه در هر مرحله و اضافه کردن نقطه مولد تنها زمانی که بیت 1 است، انجام می‌شود. گزینه‌های دیگر نادرست هستند: حساب مدولار همچنان در میدان‌های متناهی مورد نیاز است، مسئله لگاریتم گسسته همچنان از نظر محاسباتی غیرقابل حل باقی می‌ماند (که برای امنیت ضروری است)، و کلیدهای خصوصی نمی‌توانند از کلیدهای عمومی محاسبه شوند، صرف نظر از الگوریتم ضرب استفاده شده.
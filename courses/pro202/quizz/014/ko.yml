question: 타원 곡선 암호화에서 스칼라 곱셈을 위한 더블 앤 더하기 알고리즘의 주요 장점은 무엇인가요?
answer: 계산 복잡성을 O(n)에서 O(log n) 연산으로 줄입니다
wrong_answers:
  - 유한 필드에서 모듈식 산술이 필요하지 않습니다
  - 이산 로그 문제를 다항식 시간 해법으로 변환합니다
  - 공개 키에서 개인 키를 직접 계산할 수 있습니다
explanation: |
  더블 앤 더하기 알고리즘은 계산 복잡성을 O(n) 선형 덧셈에서 O(로그 n) 연산으로 줄여 효율성을 크게 향상시킵니다. 이는 스칼라의 이진 표현을 스캔하고 각 단계에서 점을 두 배로 늘린 다음 비트가 1일 때만 생성기 점을 더하는 방식으로 작동합니다. 다른 옵션은 유한 필드에서는 여전히 모듈식 산술이 필요하고 이산 로그 문제는 여전히 계산적으로 실행 불가능하며(보안에 필수), 사용된 곱셈 알고리즘에 관계없이 공개 키에서 개인 키를 계산할 수 없다는 단점이 있습니다.
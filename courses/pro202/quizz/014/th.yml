question: ข้อได้เปรียบหลักของอัลกอริทึม double-and-add สำหรับการคูณสเกลาร์ในวิทยาการเข้ารหัสลับแบบเส้นโค้งวงรีคืออะไร?
answer: มันลดความซับซ้อนในการคำนวณจาก O(n) เป็น O(log n) การดำเนินการ
wrong_answers:
  - มันกำจัดความจำเป็นสำหรับเลขคณิตแบบโมดูลาร์ในฟิลด์จำกัด
  - มันแปลงปัญหาลอการิทึมไม่ต่อเนื่องให้เป็นวิธีแก้ปัญหาในเวลาเชิงพหุนาม
  - มันอนุญาตให้คำนวณคีย์ส่วนตัวจากคีย์สาธารณะโดยตรง
explanation: |
  อัลกอริทึม double-and-add ช่วยเพิ่มประสิทธิภาพอย่างมากโดยลดความซับซ้อนในการคำนวณจากการบวกเชิงเส้น O(n) เป็นการดำเนินการ O(log n) วิธีนี้ทำงานโดยการสแกนการแสดงผลแบบไบนารีของสเกลาร์, การเพิ่มจุดเป็นสองเท่าในแต่ละขั้นตอน, และเพิ่มจุดกำเนิดเฉพาะเมื่อบิตเป็น 1 ตัวเลือกอื่น ๆ นั้นไม่ถูกต้อง: เลขคณิตแบบโมดูลาร์ยังคงจำเป็นในฟิลด์จำกัด, ปัญหาลอการิทึมไม่ต่อเนื่องยังคงไม่สามารถคำนวณได้ (ซึ่งเป็นสิ่งสำคัญสำหรับความปลอดภัย), และไม่สามารถคำนวณคีย์ส่วนตัวจากคีย์สาธารณะได้ไม่ว่าจะใช้อัลกอริทึมการคูณแบบใดก็ตาม
question: Какова основная цель использования hash160 (SHA-256, затем RIPEMD-160) при создании адресов Bitcoin из открытых ключей?
answer: Чтобы скрыть открытый ключ до момента траты и создать более короткие и управляемые адреса
wrong_answers:
  - Для шифрования закрытого ключа и предотвращения несанкционированного доступа к средствам wallet
  - generate - цифровая подпись, необходимая для подтверждения транзакций в блокчейне
  - Чтобы преобразовать точки эллиптической кривой в формат, подходящий для операций secp256k1
explanation: |
  Hash160 выполняет несколько важных функций при создании адресов Bitcoin. Хешируя открытый ключ, он сохраняет его в тайне до тех пор, пока не будут потрачены монеты, обеспечивая дополнительный уровень безопасности. Хеширование также значительно уменьшает размер с 33/65 байт до всего 20 байт, что делает адреса более управляемыми. Неправильные ответы путают это с шифрованием закрытого ключа (которое не выполняется), цифровыми подписями (которые используют другие криптографические операции) или форматированием кривой (которое происходит во время сериализации SEC, а не при создании адреса).
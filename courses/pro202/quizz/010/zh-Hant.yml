question: 從公開金鑰建立 Bitcoin 位址時，使用 hash160 (SHA-256 然後是 RIPEMD-160) 的主要目的是什麼？
answer: 隱藏公開金鑰直到花費發生，並建立更短、更容易管理的位址
wrong_answers:
  - 加密私人金鑰，防止未經授權存取 wallet 資金
  - 在區塊鏈上進行交易驗證所需的 generate 數位簽章
  - 將橢圓曲線的點數轉換成適合 secp256k1 運算的格式
explanation: |
  Hash160 在 Bitcoin 位址建立過程中發揮多項重要功能。透過散列公開金鑰，它可以隱藏實際的公開金鑰，直到錢幣用完為止，提供額外的安全層級。雜湊還可將大小從 33/65 位元組大幅減少到只有 20 位元組，讓位址更容易管理。錯誤答案將此與私密金鑰加密 (並未進行)、數位簽章 (使用不同的加密作業) 或曲線格式化 (在 SEC 序列化時發生，而非位址建立時) 混為一談。
question: 공개 키에서 Bitcoin 주소를 생성할 때 해시160(SHA-256, 그 다음에는 RIPEMD-160)을 사용하는 주된 목적은 무엇인가요?
answer: 지출이 발생할 때까지 공개 키를 숨기고 더 짧고 관리하기 쉬운 주소를 만들려면 다음과 같이 하세요
wrong_answers:
  - 개인 키를 암호화하고 wallet 자금에 대한 무단 액세스를 방지하려면 다음과 같이 하세요
  - 블록체인에서 트랜잭션 검증에 필요한 디지털 서명을 generate에 추가합니다
  - 타원 커브 포인트를 secp256k1 연산에 적합한 형식으로 변환하려면 다음과 같이 하세요
explanation: |
  해시160은 Bitcoin 주소 생성에서 여러 가지 중요한 기능을 수행합니다. 공개키를 해시함으로써 코인을 사용할 때까지 실제 공개키를 숨겨 추가적인 보안 계층을 제공합니다. 또한 해싱은 33/65바이트에서 20바이트로 크기를 크게 줄여 주소를 더 관리하기 쉽게 만듭니다. 오답은 이를 개인 키 암호화(수행되지 않음), 디지털 서명(다른 암호화 연산 사용) 또는 커브 형식화(주소 생성이 아닌 SEC 직렬화 중에 발생)와 혼동하고 있습니다.
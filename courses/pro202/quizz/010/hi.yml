question: सार्वजनिक कुंजियों से Bitcoin पते बनाते समय hash160 (SHA-256 फिर RIPEMD-160) का उपयोग करने का प्राथमिक उद्देश्य क्या है?
answer: खर्च होने तक सार्वजनिक कुंजी को छिपाना और छोटे, अधिक प्रबंधनीय पते बनाना।
wrong_answers:
  - निजी कुंजी को एन्क्रिप्ट करने और wallet निधियों तक अनधिकृत पहुंच को रोकने के लिए
  - generate के लिए ब्लॉकचेन पर लेनदेन सत्यापन के लिए आवश्यक डिजिटल हस्ताक्षर।
  - दीर्घवृत्तीय वक्र बिंदुओं को SECP256K1 संक्रियाओं के लिए उपयुक्त प्रारूप में परिवर्तित करने के लिए
explanation: |
  Bitcoin एड्रेस बनाने में Hash160 कई महत्वपूर्ण कार्य करता है। पब्लिक की को हैश करके, यह सिक्कों के खर्च होने तक वास्तविक पब्लिक की को छिपाए रखता है, जिससे सुरक्षा की एक अतिरिक्त परत मिलती है। हैशिंग से एड्रेस का आकार भी 33/65 बाइट्स से घटकर मात्र 20 बाइट्स रह जाता है, जिससे एड्रेस को प्रबंधित करना आसान हो जाता है। गलत उत्तर इसे प्राइवेट की एन्क्रिप्शन (जो नहीं किया जाता), डिजिटल सिग्नेचर (जो अलग-अलग क्रिप्टोग्राफिक प्रक्रियाओं का उपयोग करते हैं), या कर्व फॉर्मेटिंग (जो SEC सीरियलाइज़ेशन के दौरान होता है, एड्रेस बनाते समय नहीं) से भ्रमित करते हैं।
question: هدف اصلی استفاده از hash160 (SHA-256 سپس RIPEMD-160) هنگام ایجاد آدرس‌های Bitcoin از کلیدهای عمومی چیست؟
answer: برای پنهان کردن کلید عمومی تا زمانی که خرجی صورت گیرد و ایجاد آدرس‌های کوتاه‌تر و قابل مدیریت‌تر
wrong_answers:
  - برای رمزگذاری کلید خصوصی و جلوگیری از دسترسی غیرمجاز به وجوه wallet
  - به generate امضای دیجیتالی که برای اعتبارسنجی تراکنش در بلاکچین مورد نیاز است
  - برای تبدیل نقاط منحنی بیضوی به فرمت مناسب برای عملیات secp256k1
explanation: |
  هش160 چندین عملکرد مهم در ایجاد آدرس Bitcoin دارد. با هش کردن کلید عمومی، کلید عمومی واقعی را تا زمانی که سکه‌ها خرج نشوند مخفی نگه می‌دارد و لایه‌ای اضافی از امنیت را فراهم می‌کند. هش کردن همچنین اندازه را به طور قابل توجهی از 33/65 بایت به فقط 20 بایت کاهش می‌دهد و آدرس‌ها را قابل مدیریت‌تر می‌کند. پاسخ‌های نادرست این را با رمزنگاری کلید خصوصی (که انجام نمی‌شود)، امضاهای دیجیتال (که از عملیات رمزنگاری متفاوتی استفاده می‌کنند)، یا قالب‌بندی منحنی (که در طول سریال‌سازی SEC اتفاق می‌افتد، نه در ایجاد آدرس) اشتباه می‌گیرند.
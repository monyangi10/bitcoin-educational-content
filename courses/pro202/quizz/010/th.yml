question: วัตถุประสงค์หลักของการใช้ hash160 (SHA-256 แล้ว RIPEMD-160) เมื่อสร้างที่อยู่ Bitcoin จากคีย์สาธารณะคืออะไร?
answer: เพื่อซ่อนกุญแจสาธารณะจนกว่าจะมีการใช้จ่ายเกิดขึ้นและสร้างที่อยู่ที่สั้นลงและจัดการได้ง่ายขึ้น
wrong_answers:
  - เพื่อเข้ารหัสคีย์ส่วนตัวและป้องกันการเข้าถึงเงินทุน wallet โดยไม่ได้รับอนุญาต
  - ไปยัง generate ลายเซ็นดิจิทัลที่จำเป็นสำหรับการตรวจสอบธุรกรรมบนบล็อกเชน
  - ในการแปลงจุดของเส้นโค้งวงรีให้อยู่ในรูปแบบที่เหมาะสมสำหรับการดำเนินการ secp256k1
explanation: |
  Hash160 มีบทบาทสำคัญหลายประการในการสร้างที่อยู่ Bitcoin โดยการแฮชคีย์สาธารณะ มันจะซ่อนคีย์สาธารณะที่แท้จริงจนกว่าจะมีการใช้เหรียญ ซึ่งให้ชั้นความปลอดภัยเพิ่มเติม การแฮชยังช่วยลดขนาดจาก 33/65 ไบต์เหลือเพียง 20 ไบต์ ทำให้ที่อยู่จัดการได้ง่ายขึ้น คำตอบที่ผิดมักสับสนกับการเข้ารหัสคีย์ส่วนตัว (ซึ่งไม่ได้ทำ) ลายเซ็นดิจิทัล (ซึ่งใช้การดำเนินการเข้ารหัสที่แตกต่างกัน) หรือการจัดรูปแบบเส้นโค้ง (ซึ่งเกิดขึ้นระหว่างการทำให้เป็นอนุกรม SEC ไม่ใช่การสร้างที่อยู่)
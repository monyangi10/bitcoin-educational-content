question: Каква е основната цел на използването на hash160 (SHA-256 и след това RIPEMD-160) при създаването на Bitcoin адреси от публични ключове?
answer: Скриване на публичния ключ до момента на харчене и създаване на по-кратки и лесни за управление адреси
wrong_answers:
  - Криптиране на частния ключ и предотвратяване на неоторизиран достъп до средствата на wallet
  - За generate цифровия подпис, необходим за валидиране на трансакциите в блокчейна
  - Конвертиране на точките на елиптичната крива в подходящ формат за операции secp256k1
explanation: |
  Hash160 изпълнява няколко важни функции при създаването на адреси в Bitcoin. Чрез хеширане на публичния ключ той запазва действителния публичен ключ скрит, докато не бъдат изразходвани монетите, осигурявайки допълнително ниво на сигурност. Хеширането също така значително намалява размера от 33/65 байта до само 20 байта, което прави адресите по-управляеми. Грешните отговори бъркат това с криптиране на частен ключ (което не се прави), цифрови подписи (които използват различни криптографски операции) или форматиране на крива (което се случва по време на сериализирането на SEC, а не при създаването на адрес).
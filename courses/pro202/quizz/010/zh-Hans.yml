question: 使用公钥创建 Bitcoin 地址时，使用 hash160（SHA-256，然后是 RIPEMD-160）的主要目的是什么？
answer: 在发生消费之前隐藏公钥，并创建更短、更易于管理的地址
wrong_answers:
  - 加密私人密钥，防止未经授权访问 wallet 资金
  - generate 区块链上交易验证所需的数字签名
  - 将椭圆曲线点转换成适合 secp256k1 操作的格式
explanation: |
  Hash160 在 Bitcoin 地址创建中具有多种重要功能。通过对公钥进行散列，它可以将实际的公钥隐藏起来，直到金币用完为止，从而提供了额外的安全保障。散列还能将地址的大小从 33/65 字节大幅减少到 20 字节，使地址更易于管理。错误答案将其与私钥加密（没有进行）、数字签名（使用不同的加密运算）或曲线格式化（在 SEC 序列化过程中进行，而不是在创建地址时进行）相混淆。
question: 公開鍵からBitcoinアドレスを作成する際、hash160（SHA-256、その後RIPEMD-160）を使用する主な目的は何ですか？
answer: 使用されるまで公開鍵を隠し、より短く管理しやすいアドレスを作成する。
wrong_answers:
  - 秘密鍵を暗号化し、wallet資金への不正アクセスを防止する。
  - ブロックチェーン上の取引検証に必要なデジタル署名のgenerateへ
  - 楕円曲線のポイントをsecp256k1の操作に適したフォーマットに変換する。
explanation: |
  Hash160はBitcoinのアドレス作成において複数の重要な機能を果たす。公開鍵をハッシュ化することで、コインが使われるまで実際の公開鍵は隠され、さらなるセキュリティのレイヤーを提供します。また、ハッシュ化によってアドレスのサイズが33/65バイトからわずか20バイトに大幅に縮小され、アドレスがより管理しやすくなります。間違った答えは、これを秘密鍵の暗号化（これは行われない）、デジタル署名（これは異なる暗号処理を使用する）、カーブフォーマット（これはアドレスの作成ではなく、SECのシリアライゼーション中に行われる）と混同している。
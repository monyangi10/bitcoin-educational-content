question: Bitcoinノードは、トランザクションデータからメルクル木を構築し検証する際に、具体的にどのようなエンディアン変換の課題を処理しなければならないのだろうか？
answer: トランザクション・ハッシュは、内部ツリー計算のために、シリアル化されたリトルエンディアン形式からビッグエンディアンに逆変換され、その後、保存のために逆変換されなければならない。
wrong_answers:
  - ブロックヘッダは、ネットワーク伝送フォーマットに合わせて、メルクルルートを計算する前にビッグエンディアンからリトルエンディアンに変換する必要がある。
  - 最終的なMerkleルートは、P2Pメッセージで他のノードに送信するときのみ、ビッグエンディアンからリトルエンディアンに変換されなければならない。
  - 取引IDはビッグエンディアン形式で保存されているが、メルクルツリーでペアをハッシュする前にリトルエンディアンに変換する必要がある。
explanation: |
  Bitcoinのメルクルツリー構築には、重要なエンディアンの変換ステップがある。シリアル化されたブロックデータはリトルエンディアン形式を使用しますが、内部のメルクル木計算はビッグエンディアンのハッシュを必要とします。ノードはツリー構築の前に、トランザクションハッシュをシリアル化されたリトルエンディアン形式からビッグエンディアンに逆変換し、最終的なルートをブロックヘッダに格納するためにリトルエンディアンに逆変換しなければならない。この変換は適切な検証のために不可欠である。
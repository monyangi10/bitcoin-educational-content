question: С какой специфической проблемой преобразования эндианальности должны справиться узлы Bitcoin при построении и проверке деревьев Меркла на основе данных транзакций?
answer: Хэши транзакций должны быть преобразованы из сериализованного формата little-endian в big-endian для вычисления внутреннего дерева, а затем преобразованы обратно для хранения
wrong_answers:
  - Заголовки блоков должны быть преобразованы из big-endian в little-endian перед вычислением корня Меркла, чтобы соответствовать формату передачи данных по сети
  - Окончательный корень Меркла должен быть преобразован из big-endian в little-endian только при передаче другим узлам через сообщения P2P
  - Идентификаторы транзакций хранятся в формате big-endian, но должны быть преобразованы в little-endian перед хэшированием пар в дерево Меркла
explanation: |
  Построение дерева Меркла в Bitcoin включает в себя критический шаг преобразования эндиана. В то время как сериализованные данные блока используют формат little-endian, для вычисления внутреннего дерева Меркла требуются хэши big-endian. Перед построением дерева узлы должны перевести хэши транзакций из их сериализованного формата little-endian в big-endian, а затем перевести конечный корень обратно в little-endian для хранения в заголовке блока. Это преобразование необходимо для правильной верификации.
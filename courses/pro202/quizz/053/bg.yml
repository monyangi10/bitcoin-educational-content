question: С какво конкретно предизвикателство при преобразуването на ендианността трябва да се справят възлите Bitcoin при конструирането и проверката на дърветата на Меркъл от данни за транзакции?
answer: Транзакционните хешове трябва да бъдат обърнати от сериализиран формат little-endian в big-endian за вътрешно изчисление на дървото, след което да бъдат обърнати обратно за съхранение
wrong_answers:
  - Заглавията на блоковете трябва да се преобразуват от big-endian в little-endian преди изчисляването на корена на Меркъл, за да съответстват на формата на мрежовото предаване
  - Окончателният корен на Merkle трябва да се преобразува от big-endian в little-endian само при предаване на други възли чрез съобщения P2P
  - Идентификаторите на транзакциите се съхраняват в big-endian формат, но трябва да се преобразуват в little-endian преди хеширането на двойките в дървото на Меркъл
explanation: |
  Конструирането на дървото на Меркъл в Bitcoin включва критична стъпка за преобразуване на ендианността. Докато сериализираните блокови данни използват little-endian формат, вътрешното изчисление на дървото на Меркъл изисква big-endian хешове. Възлите трябва да обърнат хешовете на транзакциите от техния сериализиран little-endian формат в big-endian преди конструирането на дървото, след което да обърнат крайния корен обратно в little-endian за съхранение в заглавието на блока. Това преобразуване е от съществено значение за правилната проверка.
question: लेनदेन डेटा से मर्कल ट्री का निर्माण और सत्यापन करते समय Bitcoin नोड्स को एंडियननेस रूपांतरण से संबंधित किन विशिष्ट चुनौतियों का सामना करना पड़ता है?
answer: आंतरिक ट्री गणना के लिए लेनदेन हैश को लिटिल-एंडियन सीरियलाइज़्ड फॉर्मेट से बिग-एंडियन में रिवर्स करना होगा, और फिर स्टोरेज के लिए इसे वापस रिवर्स करना होगा।
wrong_answers:
  - मर्कल रूट की गणना करने से पहले ब्लॉक हेडर को नेटवर्क ट्रांसमिशन प्रारूप से मेल खाने के लिए बिग-एंडियन से लिटिल-एंडियन में परिवर्तित किया जाना चाहिए।
  - अंतिम मर्कल रूट को बिग-एंडियन से लिटिल-एंडियन में केवल तभी परिवर्तित किया जाना चाहिए जब P2P संदेशों के माध्यम से अन्य नोड्स को संचारित किया जा रहा हो।
  - ट्रांज़ैक्शन आईडी को बिग-एंडियन फॉर्मेट में स्टोर किया जाता है, लेकिन मर्कल ट्री में पेयर को हैश करने से पहले उन्हें लिटिल-एंडियन में परिवर्तित करना आवश्यक है।
explanation: |
  Bitcoin के मर्कल ट्री निर्माण में एक महत्वपूर्ण एंडियननेस रूपांतरण चरण शामिल है। जबकि सीरियलाइज़्ड ब्लॉक डेटा लिटिल-एंडियन प्रारूप का उपयोग करता है, आंतरिक मर्कल ट्री गणना के लिए बिग-एंडियन हैश की आवश्यकता होती है। ट्री निर्माण से पहले नोड्स को लेनदेन हैश को उनके सीरियलाइज़्ड लिटिल-एंडियन प्रारूप से बिग-एंडियन में परिवर्तित करना होगा, फिर ब्लॉक हेडर में भंडारण के लिए अंतिम रूट को वापस लिटिल-एंडियन में परिवर्तित करना होगा। यह रूपांतरण उचित सत्यापन के लिए आवश्यक है।
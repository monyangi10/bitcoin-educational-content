question: 트랜잭션 데이터에서 머클 트리를 구성하고 검증할 때 Bitcoin 노드가 처리해야 하는 특정 엔디안 변환 문제는 무엇인가요?
answer: 트랜잭션 해시는 내부 트리 계산을 위해 리틀 엔디안 직렬화 형식에서 빅 엔디안으로 반전된 다음 저장을 위해 다시 반전되어야 합니다
wrong_answers:
  - 네트워크 전송 형식과 일치하도록 머클 루트를 계산하기 전에 블록 헤더를 빅 엔디안에서 리틀 엔디안으로 변환해야 합니다
  - 최종 머클 루트는 P2P 메시지를 통해 다른 노드로 전송할 때만 빅엔디안에서 리틀엔디안으로 변환해야 합니다
  - 트랜잭션 ID는 빅 엔디안 형식으로 저장되지만 머클 트리에서 해시 쌍을 해싱하기 전에 리틀 엔디안으로 변환해야 합니다
explanation: |
  Bitcoin의 머클 트리 구성에는 중요한 엔디안 변환 단계가 포함됩니다. 직렬화된 블록 데이터는 리틀 엔디안 형식을 사용하지만, 내부 머클 트리 계산에는 빅 엔디안 해시가 필요합니다. 노드는 트리를 구성하기 전에 트랜잭션 해시를 직렬화된 리틀 엔디안 형식에서 빅 엔디안으로 반전시킨 다음, 블록 헤더에 저장하기 위해 최종 루트를 다시 리틀 엔디안으로 반전시켜야 합니다. 이 변환은 적절한 검증을 위해 필수적입니다.
question: ความท้าทายเฉพาะในการแปลง endianness ที่โหนด Bitcoin ต้องจัดการเมื่อสร้างและตรวจสอบ Merkle trees จากข้อมูลธุรกรรมคืออะไร?
answer: แฮชธุรกรรมต้องถูกกลับจากรูปแบบการจัดลำดับแบบ little-endian เป็น big-endian สำหรับการคำนวณต้นไม้ภายใน จากนั้นกลับอีกครั้งเพื่อการจัดเก็บ
wrong_answers:
  - ส่วนหัวของบล็อกจะต้องถูกแปลงจาก big-endian เป็น little-endian ก่อนที่จะคำนวณ Merkle root เพื่อให้ตรงกับรูปแบบการส่งผ่านเครือข่าย
  - Merkle root สุดท้ายต้องถูกแปลงจาก big-endian เป็น little-endian เฉพาะเมื่อส่งไปยังโหนดอื่นผ่านข้อความ P2P เท่านั้น
  - ID การทำธุรกรรมถูกเก็บในรูปแบบ big-endian แต่ต้องแปลงเป็น little-endian ก่อนที่จะทำการแฮชคู่ในต้นไม้ Merkle
explanation: |
  การสร้าง Merkle tree ของ Bitcoin มีขั้นตอนการแปลง endianness ที่สำคัญ ข้อมูลบล็อกที่ถูกจัดเก็บใช้รูปแบบ little-endian แต่การคำนวณ Merkle tree ภายในต้องใช้แฮช big-endian โหนดต้องกลับด้านแฮชของธุรกรรมจากรูปแบบ little-endian ที่ถูกจัดเก็บไปเป็น big-endian ก่อนการสร้างต้นไม้ จากนั้นกลับด้านรากสุดท้ายกลับไปเป็น little-endian เพื่อจัดเก็บในส่วนหัวของบล็อก การแปลงนี้เป็นสิ่งจำเป็นสำหรับการตรวจสอบที่ถูกต้อง
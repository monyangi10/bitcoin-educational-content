question: گره‌های Bitcoin باید با چالش خاص تبدیل endianness هنگام ساخت و تأیید درخت‌های مرکل از داده‌های تراکنش مواجه شوند.
answer: هش‌های تراکنش باید از فرمت سریال‌سازی شده little-endian به big-endian برای محاسبات داخلی درخت معکوس شوند، سپس برای ذخیره‌سازی دوباره معکوس شوند.
wrong_answers:
  - هدرهای بلاک باید قبل از محاسبه ریشه مرکل از بیگ اندین به لیتل اندین تبدیل شوند تا با فرمت انتقال شبکه مطابقت داشته باشند.
  - ریشه نهایی مرکل باید فقط هنگام ارسال به سایر گره‌ها از طریق پیام‌های P2P از بیگ‌اندین به لیتل‌اندین تبدیل شود.
  - شناسه‌های تراکنش در قالب بیگ‌اندین ذخیره می‌شوند اما باید قبل از هش کردن جفت‌ها در درخت مرکل به لیتل‌اندین تبدیل شوند.
explanation: |
  ساختار درخت مرکل در Bitcoin شامل یک مرحله مهم تبدیل اندین است. در حالی که داده‌های بلوک سریال‌شده از فرمت little-endian استفاده می‌کنند، محاسبه داخلی درخت مرکل به هش‌های big-endian نیاز دارد. نودها باید هش‌های تراکنش را از فرمت سریال‌شده little-endian به big-endian قبل از ساخت درخت معکوس کنند، سپس ریشه نهایی را برای ذخیره‌سازی در هدر بلوک به little-endian برگردانند. این تبدیل برای تأیید صحیح ضروری است.
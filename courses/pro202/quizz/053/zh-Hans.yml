question: Bitcoin 节点在从事务数据构建和验证 Merkle 树时，必须处理哪些特定的字节序转换难题？
answer: 必须将事务哈希值从小端序列化格式反转为大端格式，以便进行内部树计算，然后再反转存储
wrong_answers:
  - 在计算 Merkle 根之前，必须先将数据块标头从大前端（big-endian）转换为小前端（little-endian），以便与网络传输格式相匹配
  - 只有在通过 P2P 报文向其他节点传输时，才必须将最终的 Merkle 根从 big-endian 转换为 little-endian
  - 交易 ID 以大端格式存储，但在 Merkle 树中对交易进行散列之前必须转换为小端格式
explanation: |
  Bitcoin 的 Merkle 树构建涉及一个关键的端位转换步骤。序列化块数据使用小端格式，而内部梅克尔树计算需要大端哈希值。节点必须在构建树之前将事务哈希值从序列化的小端格式逆转为大端格式，然后再将最终根逆转回小端格式，以便存储在块标头中。这种转换对于正确验证至关重要。
question: ในการตรวจสอบธุรกรรม P2PKH, ScriptPubKey ดำเนินการลำดับของการปฏิบัติการใดเพื่อยืนยันเงื่อนไขการใช้จ่าย?
answer: ทำซ้ำคีย์สาธารณะ, แฮชมัน, เปรียบเทียบกับแฮชที่ถูกคอมมิต, จากนั้นยืนยันลายเซ็น
wrong_answers:
  - แฮชลายเซ็น เปรียบเทียบกับแฮชคีย์สาธารณะ จากนั้นตรวจสอบกับค่าที่คอมมิตแล้ว
  - ตรวจสอบลายเซ็นก่อน จากนั้นแฮชคีย์สาธารณะและเปรียบเทียบกับแฮชที่ถูกคอมมิต
  - ผสานลายเซ็นและกุญแจสาธารณะ, แฮชผลลัพธ์, จากนั้นเปรียบเทียบกับแฮชที่ถูกคอมมิต
explanation: |
  ScriptPubKey ของ P2PKH ปฏิบัติตามลำดับเฉพาะ: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG ซึ่งจะทำการคัดลอกกุญแจสาธารณะที่ให้มา ใช้การแฮช SHA256 แล้วตามด้วย RIPEMD160 ตรวจสอบผลลัพธ์ว่าตรงกับแฮชที่ให้ไว้หรือไม่ และสุดท้ายตรวจสอบลายเซ็น ตัวเลือกอื่นๆ อธิบายลำดับการทำงานไม่ถูกต้องหรือแนะนำให้แฮชลายเซ็นแทนที่จะเป็นกุญแจสาธารณะ ซึ่งจะทำให้ตรรกะการตรวจสอบไม่ถูกต้อง
question: P2PKHトランザクションの検証において、ScriptPubKeyは支出条件を検証するために、具体的にどのような一連の操作を行うのですか？
answer: 公開鍵を複製し、ハッシュ化し、コミットされたハッシュと比較し、署名を検証する。
wrong_answers:
  - 署名をハッシュし、公開鍵ハッシュと比較し、コミットされた値と照合する。
  - まず署名を検証し、次に公開鍵をハッシュ化し、コミットされたハッシュと比較する。
  - 署名と公開鍵を組み合わせ、その結果をハッシュ化し、コミットされたハッシュと比較する。
explanation: |
  P2PKHのScriptPubKeyは特定のシーケンスに従う：OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG。これは、提供された公開鍵を複製し、SHA256とRIPEMD160のハッシュを適用し、その結果がコミットされたハッシュと一致することを検証し、最後に署名をチェックする。他のオプションは操作の順序を誤って記述していたり、公開鍵の代わりに署名を ハッシュすることを提案しているが、これは検証ロジックを壊してしまう。
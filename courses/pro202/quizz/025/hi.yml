question: P2PKH लेनदेन सत्यापन में, खर्च की शर्तों को सत्यापित करने के लिए ScriptPubKey द्वारा कौन से विशिष्ट अनुक्रम में संचालन किया जाता है?
answer: यह सार्वजनिक कुंजी की प्रतिलिपि बनाता है, उसे हैश करता है, प्रतिबद्ध हैश से तुलना करता है, और फिर हस्ताक्षर को सत्यापित करता है।
wrong_answers:
  - यह हस्ताक्षर को हैश करता है, सार्वजनिक कुंजी के हैश से तुलना करता है, और फिर प्रतिबद्ध मान के विरुद्ध सत्यापन करता है।
  - यह पहले हस्ताक्षर को सत्यापित करता है, फिर सार्वजनिक कुंजी को हैश करता है और उसकी तुलना कमिट किए गए हैश से करता है।
  - यह हस्ताक्षर और सार्वजनिक कुंजी को संयोजित करता है, परिणाम को हैश करता है, फिर उसे कमिट किए गए हैश से तुलना करता है।
explanation: |
  P2PKH का ScriptPubKey एक विशिष्ट क्रम का पालन करता है: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG। यह प्रदान की गई सार्वजनिक कुंजी की प्रतिलिपि बनाता है, SHA256 और फिर RIPEMD160 हैशिंग लागू करता है, परिणाम को कमिट किए गए हैश से मिलान करने की पुष्टि करता है, और अंत में हस्ताक्षर की जाँच करता है। अन्य विकल्प संचालन के क्रम का गलत वर्णन करते हैं या सार्वजनिक कुंजी के बजाय हस्ताक्षरों की हैशिंग का सुझाव देते हैं, जिससे सत्यापन तर्क विफल हो जाएगा।
question: P2PKH 트랜잭션 유효성 검사에서 스크립트펍키는 지출 조건을 확인하기 위해 어떤 특정 작업 순서를 수행하나요?
answer: 공개 키를 복제하고, 해시하고, 커밋된 해시와 비교한 다음 서명을 확인합니다
wrong_answers:
  - 서명을 해시하고 공개 키 해시와 비교한 다음 커밋된 값과 비교하여 확인합니다
  - 서명을 먼저 확인한 다음 공개 키를 해시하고 커밋된 해시와 비교합니다
  - 서명과 공개키를 결합하고 결과를 해시한 다음 커밋된 해시와 비교합니다
explanation: |
  P2PKH의 ScriptPubKey는 특정 순서를 따릅니다: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG. 이렇게 하면 제공된 공개키를 복제하고, SHA256을 적용한 다음 RIPEMD160 해싱을 적용하고, 결과가 커밋된 해시와 일치하는지 확인한 다음 마지막으로 서명을 확인합니다. 다른 옵션은 작업 순서를 잘못 설명하거나 공개 키 대신 해싱 서명을 제안하므로 유효성 검사 로직이 손상될 수 있습니다.
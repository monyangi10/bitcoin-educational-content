question: При проверке транзакций P2PKH какую конкретную последовательность операций выполняет ScriptPubKey для проверки условий расходования средств?
answer: Дублирует открытый ключ, хэширует его, сравнивает с зафиксированным хэшем, затем проверяет подпись
wrong_answers:
  - Хеширует подпись, сравнивает с хешем открытого ключа, затем проверяет по зафиксированному значению
  - Сначала проверяет подпись, затем хэширует открытый ключ и сравнивает с зафиксированным хэшем
  - Комбинирует подпись и открытый ключ, хэширует результат, затем сравнивает с зафиксированным хэшем
explanation: |
  ScriptPubKey в P2PKH следует определенной последовательности: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG. Это дублирует предоставленный открытый ключ, применяет хэширование SHA256, затем RIPEMD160, проверяет соответствие результата зафиксированному хэшу и, наконец, проверяет подпись. Другие варианты неверно описывают порядок операций или предлагают хэшировать подписи вместо открытых ключей, что нарушает логику проверки.
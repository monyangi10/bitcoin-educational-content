question: Каква конкретна последователност от операции изпълнява ScriptPubKey при валидирането на транзакции P2PKH, за да провери условията за разход?
answer: Дублира публичния ключ, хешира го, сравнява го с предадения хеш и проверява подписа
wrong_answers:
  - Хеширане на подписа, сравняване с хеша на публичния ключ, след което проверка спрямо предадената стойност
  - Първо проверява подписа, след това хешира публичния ключ и го сравнява с предадения хеш
  - Комбинира подписа и публичния ключ, хешира резултата и го сравнява с предадения хеш
explanation: |
  ScriptPubKey на P2PKH следва определена последователност: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG. По този начин се дублира предоставеният публичен ключ, прилага се хеширане SHA256, след това RIPEMD160, проверява се дали резултатът съответства на предадения хеш и накрая се проверява подписът. Другите опции неправилно описват реда на операциите или предлагат хеширане на подписи вместо на публични ключове, което би нарушило логиката на валидиране.
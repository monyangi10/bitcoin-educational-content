question: در اعتبارسنجی تراکنش P2PKH، ScriptPubKey چه دنباله خاصی از عملیات را برای تأیید شرایط خرج کردن انجام می‌دهد؟
answer: کلید عمومی را تکرار می‌کند، آن را هش می‌کند، با هش متعهد شده مقایسه می‌کند، سپس امضا را تأیید می‌کند.
wrong_answers:
  - هش امضا را محاسبه می‌کند، با هش کلید عمومی مقایسه می‌کند، سپس با مقدار متعهد شده بررسی می‌کند
  - ابتدا امضا را تأیید می‌کند، سپس کلید عمومی را هش کرده و با هش متعهد شده مقایسه می‌کند
  - امضا و کلید عمومی را ترکیب می‌کند، نتیجه را هش می‌کند، سپس با هش متعهد شده مقایسه می‌کند
explanation: |
  اسکریپت‌پاب‌کی P2PKH از یک توالی خاص پیروی می‌کند: OP_DUP OP_HASH160 <pubkey_hash> OP_EQUALVERIFY OP_CHECKSIG. این توالی کلید عمومی ارائه‌شده را تکرار می‌کند، سپس هش‌های SHA256 و RIPEMD160 را اعمال می‌کند، بررسی می‌کند که نتیجه با هش متعهد شده مطابقت دارد و در نهایت امضا را بررسی می‌کند. گزینه‌های دیگر به اشتباه ترتیب عملیات را توصیف می‌کنند یا پیشنهاد می‌دهند که به جای کلیدهای عمومی، امضاها هش شوند که این امر منطق اعتبارسنجی را مختل می‌کند.
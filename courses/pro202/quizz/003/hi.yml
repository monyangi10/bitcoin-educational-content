question: क्रिप्टोग्राफिक ऑपरेशनों में कुशल मॉड्यूलर घातांक करने के लिए विशेष रूप से किस पायथन फ़ंक्शन का उल्लेख किया गया है?
answer: pow(base, exp, mod)
wrong_answers:
  - मॉड (बेस, एक्सप, प्राइम)
  - एक्सप(बेस, मॉड, फील्ड)
  - mult(base, exp, modulo)
explanation: |
  पाइथन का अंतर्निहित pow(base, exp, mod) फ़ंक्शन विशेष रूप से कुशल मॉड्यूलर घातांक गणना के लिए डिज़ाइन किया गया है, जो बड़े घातांकों से जुड़े क्रिप्टोग्राफ़िक कार्यों के लिए महत्वपूर्ण है। यह फ़ंक्शन (base^exp) mod mod की गणना करने के लिए अनुकूलित एल्गोरिदम का उपयोग करता है, जिससे पहले base^exp के संभावित रूप से विशाल मध्यवर्ती परिणाम की गणना करने की आवश्यकता नहीं होती है। अन्य विकल्प मान्य पाइथन फ़ंक्शन नहीं हैं - mod(), exp() और mult() इन पैरामीटर पैटर्न के साथ क्रिप्टोग्राफ़िक मॉड्यूलर अंकगणित के लिए पाइथन की मानक लाइब्रेरी में मौजूद नहीं हैं।
question: Какая функция Python специально упоминается для выполнения эффективного модульного экспоненцирования в криптографических операциях?
answer: pow(base, exp, mod)
wrong_answers:
  - mod(base, exp, prime)
  - exp(base, mod, field)
  - mult(base, exp, modulo)
explanation: |
  Встроенная в Python функция pow(base, exp, mod) специально разработана для эффективного модульного экспонтирования, что очень важно для криптографических операций с большими экспонентами. Эта функция использует оптимизированные алгоритмы для вычисления (base^exp) mod mod без необходимости сначала вычислять потенциально огромный промежуточный результат base^exp. Другие варианты не являются допустимыми функциями Python - mod(), exp() и mult() с такими параметрами не существуют в стандартной библиотеке Python для криптографической модульной арифметики.
question: ฟังก์ชัน Python ที่ถูกกล่าวถึงโดยเฉพาะสำหรับการดำเนินการยกกำลังโมดูลาร์อย่างมีประสิทธิภาพในกระบวนการเข้ารหัสคืออะไร?
answer: pow(base, exp, mod)
wrong_answers:
  - mod(base, exp, prime)
  - exp(base, mod, field)
  - mult(base, exp, modulo)
explanation: |
  ฟังก์ชัน pow(base, exp, mod) ที่มีอยู่ในตัวของ Python ได้รับการออกแบบมาโดยเฉพาะสำหรับการยกกำลังโมดูลาร์ที่มีประสิทธิภาพ ซึ่งมีความสำคัญต่อการดำเนินการเข้ารหัสที่เกี่ยวข้องกับเลขยกกำลังขนาดใหญ่ ฟังก์ชันนี้ใช้การประมวลผลที่ได้รับการปรับแต่งเพื่อคำนวณ (base^exp) mod mod โดยไม่จำเป็นต้องคำนวณผลลัพธ์ระหว่างที่อาจมีขนาดใหญ่มหาศาลของ base^exp ก่อน ตัวเลือกอื่นๆ ไม่ใช่ฟังก์ชันที่ถูกต้องใน Python - mod(), exp(), และ mult() ที่มีรูปแบบพารามิเตอร์เหล่านี้ไม่มีอยู่ในไลบรารีมาตรฐานของ Python สำหรับการคำนวณเลขยกกำลังโมดูลาร์ในการเข้ารหัสลับ
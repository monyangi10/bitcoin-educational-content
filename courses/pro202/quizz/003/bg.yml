question: Коя функция на Python е специално спомената за извършване на ефективно модулно експонентиране при криптографски операции?
answer: pow(base, exp, mod)
wrong_answers:
  - mod(base, exp, prime)
  - exp(base, mod, field)
  - mult(base, exp, modulo)
explanation: |
  Вградената функция pow(base, exp, mod) на Python е специално проектирана за ефективно модулно експонентиране, което е от решаващо значение за криптографски операции, включващи големи експоненти. Тази функция използва оптимизирани алгоритми за изчисляване на (base^exp) mod mod, без да се налага първо да се изчислява потенциално огромният междинен резултат base^exp. Другите опции не са валидни функции на Python - mod(), exp() и mult() с тези модели параметри не съществуват в стандартната библиотека на Python за криптографска модулна аритметика.
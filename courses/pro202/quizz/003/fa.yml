question: کدام تابع پایتون به طور خاص برای انجام توان‌رسانی مدولار کارآمد در عملیات رمزنگاری ذکر شده است؟
answer: پایه، توان، مد)pow(
wrong_answers:
  - مد(base, exp, prime)
  - exp(base, mod, field)
  - ضرب(پایه، توان، مدول)
explanation: |
  تابع داخلی pow(base, exp, mod) در پایتون به‌طور خاص برای توان‌دهی مدولار کارآمد طراحی شده است، که برای عملیات رمزنگاری با توان‌های بزرگ بسیار مهم است. این تابع از الگوریتم‌های بهینه‌سازی شده برای محاسبه (base^exp) mod mod استفاده می‌کند بدون اینکه نیاز باشد ابتدا نتیجه میانی بالقوه عظیم base^exp را محاسبه کند. گزینه‌های دیگر توابع معتبر پایتون نیستند - mod()، exp()، و mult() با این الگوهای پارامتر در کتابخانه استاندارد پایتون برای حساب مدولار رمزنگاری وجود ندارند.
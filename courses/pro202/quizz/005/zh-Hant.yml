question: 什麼數學性質可以確保素域 F(p) 中的每個非零元素都有一個乘法逆？
answer: 欄位由素數 p
wrong_answers:
  - 欄位正好包含 p-1 個元素
  - 欄位使用模組化的算術運算
  - 欄位支援加法和乘法
explanation: |
  有限場 F(p) 必須由素數 p 定義，以確保每個非零元素都有乘法逆。這是欄位理論的基本要求 - 當 p 是素數時，整數 modulo p 組成的欄位，除法永遠是可能的 (零除外)。如果 p 是複數，有些非零元素就不會有逆，這樣就破壞了欄位結構。當其他選項描述有限場的屬性時，只有 p 的素數保證所有非零元素都有乘法逆。
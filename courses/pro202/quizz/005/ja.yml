question: 素体F(p)のすべての非ゼロ要素が乗法的逆元素を持つことを保証する数学的性質とは？
answer: フィールドは素数p
wrong_answers:
  - フィールドは正確にp-1個の要素を含む
  - この分野ではモジュラー演算を使用する
  - フィールドは加算と乗算をサポート
explanation: |
  有限体F(p)は、ゼロでないすべての要素が乗法的逆数を持つことを保証するために、素数pによって定義されなければならない。これは場の理論の基本的な要件である。pが素数のとき、pを法とする整数は、（ゼロによる除算を除いて）常に除算が可能な場を形成する。もしpが合成であれば、0でない要素のいくつかは逆数を持たないことになり、場の構造が壊れてしまう。他の選択肢は有限体の性質を表しているが、すべての非零要素に対して乗法的な逆数の存在を保証するのはpの素性だけである。
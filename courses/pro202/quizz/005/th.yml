question: สมบัติทางคณิตศาสตร์ใดที่ทำให้มั่นใจได้ว่า ทุกองค์ประกอบที่ไม่ใช่ศูนย์ในฟิลด์เฉพาะ F(p) มีอินเวอร์สการคูณ?
answer: ฟิลด์ถูกกำหนดโดยจำนวนเฉพาะ p
wrong_answers:
  - ฟิลด์มีจำนวนองค์ประกอบเท่ากับ p-1 พอดี
  - ฟิลด์ใช้การดำเนินการเลขคณิตแบบโมดูลาร์
  - ฟิลด์รองรับการบวกและการคูณ
explanation: |
  ฟิลด์จำกัด F(p) ต้องถูกกำหนดโดยจำนวนเฉพาะ p เพื่อให้แน่ใจว่าแต่ละองค์ประกอบที่ไม่ใช่ศูนย์มีอินเวอร์สการคูณ นี่เป็นข้อกำหนดพื้นฐานของทฤษฎีฟิลด์ - เมื่อ p เป็นจำนวนเฉพาะ จำนวนเต็มโมดูโล p จะสร้างฟิลด์ที่สามารถหารได้เสมอ (ยกเว้นศูนย์) หาก p เป็นจำนวนประกอบ องค์ประกอบที่ไม่ใช่ศูนย์บางตัวจะไม่มีอินเวอร์ส ซึ่งจะทำลายโครงสร้างฟิลด์ แม้ว่าตัวเลือกอื่น ๆ จะอธิบายคุณสมบัติของฟิลด์จำกัด แต่มีเพียงความเป็นจำนวนเฉพาะของ p เท่านั้นที่รับประกันการมีอยู่ของอินเวอร์สการคูณสำหรับองค์ประกอบที่ไม่ใช่ศูนย์ทั้งหมด
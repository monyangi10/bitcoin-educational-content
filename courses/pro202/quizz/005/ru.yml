question: Какое математическое свойство гарантирует, что каждый ненулевой элемент простого поля F(p) имеет мультипликативную обратную величину?
answer: Поле определяется простым числом p
wrong_answers:
  - Поле содержит ровно p-1 элементов
  - Поле использует модульные арифметические операции
  - Поле поддерживает сложение и умножение
explanation: |
  Конечное поле F(p) должно быть определено простым числом p, чтобы каждый ненулевой элемент имел мультипликативную обратную величину. Это фундаментальное требование теории полей - когда p простое, целые числа по модулю p образуют поле, в котором деление всегда возможно (кроме нуля). Если бы p было составным, некоторые ненулевые элементы не имели бы инверсий, что нарушило бы структуру поля. Хотя остальные варианты описывают свойства конечных полей, только первичность p гарантирует существование мультипликативных инверсий для всех ненулевых элементов.
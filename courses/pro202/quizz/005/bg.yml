question: Кое математическо свойство гарантира, че всеки ненулев елемент в простото поле F(p) има обратна мултипликативна функция?
answer: Полето се определя от едно просто число p
wrong_answers:
  - Полето съдържа точно p-1 елемента
  - Полето използва модулни аритметични операции
  - Полето поддържа събиране и умножение
explanation: |
  Крайното поле F(p) трябва да бъде дефинирано чрез просто число p, за да се гарантира, че всеки ненулев елемент има обратна мултипликативна функция. Това е основно изискване на теорията на полето - когато p е просто число, целите числа модуло p образуват поле, в което делението е винаги възможно (освен с нула). Ако p е съставно, някои ненулеви елементи няма да имат обратни стойности, което ще наруши структурата на полето. Докато другите варианти описват свойствата на крайните полета, само първичността на p гарантира съществуването на мултипликативни инверсии за всички ненулеви елементи.
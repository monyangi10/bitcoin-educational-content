question: कौन सा गणितीय गुण यह सुनिश्चित करता है कि एक अभाज्य क्षेत्र F(p) में प्रत्येक गैर-शून्य तत्व का एक गुणात्मक व्युत्क्रम होता है?
answer: यह क्षेत्र एक अभाज्य संख्या p द्वारा परिभाषित किया गया है।
wrong_answers:
  - इस क्षेत्र में ठीक p-1 तत्व हैं
  - यह क्षेत्र मॉड्यूलर अंकगणितीय संक्रियाओं का उपयोग करता है।
  - यह क्षेत्र जोड़ और गुणा का समर्थन करता है।
explanation: |
  एक परिमित क्षेत्र F(p) को एक अभाज्य संख्या p द्वारा परिभाषित किया जाना चाहिए ताकि यह सुनिश्चित हो सके कि प्रत्येक गैर-शून्य तत्व का गुणात्मक व्युत्क्रम हो। यह क्षेत्र सिद्धांत की एक मूलभूत आवश्यकता है - जब p अभाज्य होता है, तो p मापांक पूर्णांक एक ऐसा क्षेत्र बनाते हैं जहाँ विभाजन हमेशा संभव होता है (शून्य को छोड़कर)। यदि p भाज्य होता, तो कुछ गैर-शून्य तत्वों का व्युत्क्रम नहीं होता, जिससे क्षेत्र की संरचना टूट जाती। जबकि अन्य विकल्प परिमित क्षेत्रों के गुणों का वर्णन करते हैं, केवल p का अभाज्य होना ही सभी गैर-शून्य तत्वों के लिए गुणात्मक व्युत्क्रम के अस्तित्व की गारंटी देता है।
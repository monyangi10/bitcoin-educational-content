question: 什么数学性质能确保素域 F(p) 中的每个非零元素都有乘法逆？
answer: 该域由质数 p
wrong_answers:
  - 该字段正好包含 p-1 个元素
  - 字段使用模块化算术运算
  - 字段支持加法和乘法
explanation: |
  有限域 F(p) 必须由质数 p 定义，以确保每个非零元素都有乘法逆。这是场论的一个基本要求--当 p 是质数时，整数 modulo p 构成一个场，在这个场中，除法总是可能的（零除外）。如果 p 是复合的，一些非零元素就不会有逆，从而破坏了场结构。虽然其他选项描述的是有限域的性质，但只有 p 的素性才能保证所有非零元素都存在乘法逆。
question: 소인수장 F(p)의 모든 0이 아닌 원소가 곱셈 역을 갖도록 보장하는 수학적 성질은 무엇입니까?
answer: 필드는 소수 p로 정의됩니다
wrong_answers:
  - 필드에 정확히 p-1 요소가 포함되어 있습니다
  - 이 필드는 모듈식 산술 연산을 사용합니다
  - 이 필드는 덧셈과 곱셈을 지원합니다
explanation: |
  유한 필드 F(p)는 0이 아닌 모든 원소가 곱셈 역을 갖도록 하기 위해 소수 p로 정의되어야 합니다. 이것은 필드 이론의 기본 요건입니다. p가 소수일 때 정수 모듈로 p는 항상 나눗셈이 가능한 필드를 형성합니다(0으로 제외). 만약 p가 합성수라면 0이 아닌 일부 원소는 역을 갖지 않아 필드 구조가 깨집니다. 다른 옵션은 유한 필드의 속성을 설명하지만, p의 소인수성만이 0이 아닌 모든 요소에 대한 곱셈 역의 존재를 보장합니다.
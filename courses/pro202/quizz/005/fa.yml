question: چه خاصیت ریاضی تضمین می‌کند که هر عنصر ناصفر در یک میدان اول F(p) دارای معکوس ضربی است؟
answer: میدان با یک عدد اول p تعریف می‌شود
wrong_answers:
  - میدان دقیقاً شامل p-1 عنصر است
  - این حوزه از عملیات حساب مدولار استفاده می‌کند
  - این میدان از جمع و ضرب پشتیبانی می‌کند
explanation: |
  یک میدان متناهی F(p) باید توسط یک عدد اول p تعریف شود تا اطمینان حاصل شود که هر عنصر ناصفر دارای معکوس ضربی است. این یک نیاز اساسی از نظریه میدان است - زمانی که p اول است، اعداد صحیح به پیمانه p یک میدان را تشکیل می‌دهند که در آن تقسیم همیشه ممکن است (به جز بر صفر). اگر p مرکب بود، برخی از عناصر ناصفر معکوس نداشتند و ساختار میدان را می‌شکستند. در حالی که گزینه‌های دیگر ویژگی‌های میدان‌های متناهی را توصیف می‌کنند، تنها اول بودن p تضمین می‌کند که معکوس‌های ضربی برای همه عناصر ناصفر وجود دارد.
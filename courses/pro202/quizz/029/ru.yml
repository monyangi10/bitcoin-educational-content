question: Что должен проверить узел во время проверки транзакций Bitcoin, чтобы убедиться, что каждый входной сигнал имеет надлежащее разрешение на расходование связанного с ним выходного сигнала?
answer: ScriptSig должен успешно разблокировать соответствующий ScriptPubKey при совместном выполнении
wrong_answers:
  - "Цифровая подпись на входе должна точно соответствовать встроенному открытому ключу на выходе"
  - Хэш транзакции должен быть равен корню меркла, хранящемуся в заголовке ссылаемого блока
  - Вводимая сумма должна быть больше или равна расходуемой сумме на выходе
explanation: |
  Система сценариев Bitcoin требует, чтобы ScriptSig (сценарий разблокировки) каждого входа успешно выполнялся со ScriptPubKey (сценарий блокировки) ссылающегося выхода для получения истинного результата в стеке. Эта модель выполнения сценария позволяет гибко настраивать условия расходования средств, не ограничиваясь простым сопоставлением подписей. Другие варианты описывают некорректные требования к проверке - подписи не должны точно соответствовать встроенным ключам, хэши транзакций не сравниваются с корнями Меркла при проверке входов, а отдельные входы не должны превышать свои выходы (только общие входы должны превышать общие выходы).
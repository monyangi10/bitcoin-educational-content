question: Какво трябва да провери възелът по време на валидирането на транзакциите Bitcoin, за да се увери, че всеки вход е надлежно оторизиран да изразходва референтния изход?
answer: ScriptSig трябва успешно да отключи съответния ScriptPubKey, когато се изпълни заедно
wrong_answers:
  - "Цифровият подпис на входа трябва да съвпада точно с вградения публичен ключ на изхода"
  - Хешът на транзакцията трябва да е равен на корена на меркела, съхранен в заглавието на референтния блок
  - Сумата на входа трябва да е по-голяма или равна на сумата на изхода, която се изразходва
explanation: |
  Системата за скриптове на Bitcoin изисква ScriptSig (скрипт за отключване) на всеки вход да се изпълни успешно със ScriptPubKey (скрипт за заключване) на съответния изход, за да се получи верен резултат в стека. Този модел за изпълнение на скриптове позволява гъвкави условия за изразходване на средства извън простото съвпадение на сигнатури. Другите варианти описват некоректни изисквания за валидиране - не е необходимо подписите да съвпадат точно с вградените ключове, хешовете на транзакциите не се сравняват с корените на merkle по време на валидирането на входа и не е необходимо отделните входове да надвишават своите изходи (само общият брой входове трябва да надвишава общия брой изходи).
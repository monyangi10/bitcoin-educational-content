question: ในระหว่างการตรวจสอบธุรกรรม Bitcoin โหนดต้องตรวจสอบอะไรเพื่อให้แน่ใจว่าแต่ละอินพุตได้รับอนุญาตอย่างถูกต้องในการใช้จ่ายเอาต์พุตที่อ้างอิง?
answer: ScriptSig ต้องปลดล็อก ScriptPubKey ที่สอดคล้องกันได้สำเร็จเมื่อดำเนินการร่วมกัน
wrong_answers:
  - "ลายเซ็นดิจิทัลของข้อมูลนำเข้าต้องตรงกับคีย์สาธารณะที่ฝังอยู่ในข้อมูลส่งออกอย่างแม่นยำ"
  - แฮชของธุรกรรมต้องเท่ากับรากเมอร์เคิลที่เก็บไว้ในส่วนหัวของบล็อกที่อ้างอิง
  - จำนวนเงินที่ป้อนต้องมากกว่าหรือเท่ากับจำนวนเงินที่ใช้จ่าย
explanation: |
  ระบบสคริปต์ของ Bitcoin กำหนดให้ ScriptSig (สคริปต์ปลดล็อก) ของแต่ละอินพุตต้องดำเนินการสำเร็จกับ ScriptPubKey (สคริปต์ล็อก) ของเอาต์พุตที่อ้างอิงเพื่อให้ได้ผลลัพธ์ที่เป็นจริงบนสแต็ก โมเดลการดำเนินการสคริปต์นี้ช่วยให้มีเงื่อนไขการใช้จ่ายที่ยืดหยุ่นเกินกว่าการจับคู่ลายเซ็นง่ายๆ ตัวเลือกอื่นๆ อธิบายข้อกำหนดการตรวจสอบที่ไม่ถูกต้อง - ลายเซ็นไม่จำเป็นต้องตรงกับคีย์ที่ฝังไว้โดยตรง, แฮชธุรกรรมไม่ถูกเปรียบเทียบกับรากเมอร์เคิลระหว่างการตรวจสอบอินพุต, และอินพุตแต่ละรายการไม่จำเป็นต้องเกินเอาต์พุต (เฉพาะอินพุตทั้งหมดต้องเกินเอาต์พุตทั้งหมด)
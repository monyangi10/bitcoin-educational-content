question: 在 Bitcoin 交易验证过程中，节点必须验证哪些内容，以确保每个输入都经过适当授权，可以使用其引用的输出？
answer: 同时执行时，脚本签名必须成功解锁相应的脚本发布密钥
wrong_answers:
  - "输入的数字签名必须与输出的嵌入式公钥完全匹配"
  - 交易哈希值必须等于引用区块头中存储的梅克尔根值
  - 输入金额必须大于或等于支出的输出金额
explanation: |
  Bitcoin 的脚本系统要求每个输入的 ScriptSig（解锁脚本）必须与引用输出的 ScriptPubKey（锁定脚本）成功执行，才能在堆栈上产生真正的结果。这种脚本执行模式允许灵活的支出条件，而不是简单的签名匹配。其他选项描述了不正确的验证要求--签名不需要与嵌入密钥完全匹配，在输入验证过程中交易哈希值不需要与梅克尔根进行比较，单个输入不需要超过其输出（只有总输入必须超过总输出）。
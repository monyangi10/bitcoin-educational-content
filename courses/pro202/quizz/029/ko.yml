question: Bitcoin 트랜잭션 유효성 검사 중에 각 입력이 참조된 출력을 사용할 수 있도록 적절하게 승인되었는지 확인하기 위해 노드는 무엇을 확인해야 하나요?
answer: 스크립트시그는 함께 실행될 때 해당 스크립트펍키를 성공적으로 잠금 해제해야 합니다
wrong_answers:
  - "입력의 디지털 서명은 출력의 내장된 공개 키와 정확히 일치해야 합니다."
  - 트랜잭션 해시는 참조된 블록 헤더에 저장된 머클 루트와 같아야 합니다
  - 입력 금액은 지출되는 출력 금액보다 크거나 같아야 합니다
explanation: |
  Bitcoin의 스크립트 시스템은 스택에서 진정한 결과를 생성하기 위해 각 입력의 ScriptSig(잠금 해제 스크립트)가 참조된 출력의 ScriptPubKey(잠금 스크립트)와 함께 성공적으로 실행되어야 합니다. 이 스크립트 실행 모델은 단순한 서명 매칭을 넘어 유연한 지출 조건을 허용합니다. 서명이 포함된 키와 정확히 일치할 필요가 없고, 입력 유효성 검사 중에 트랜잭션 해시를 머클 루트와 비교하지 않으며, 개별 입력이 출력을 초과할 필요가 없습니다(총 입력만 총 출력을 초과해야 함).
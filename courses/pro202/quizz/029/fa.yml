question: در طول اعتبارسنجی تراکنش Bitcoin، یک نود باید چه چیزی را بررسی کند تا اطمینان حاصل کند که هر ورودی به درستی مجاز به خرج کردن خروجی مرجع خود است؟
answer: اسکریپت‌سیگ باید هنگام اجرا با اسکریپت‌پاب‌کی مربوطه را با موفقیت باز کند
wrong_answers:
  - "امضای دیجیتال ورودی باید دقیقاً با کلید عمومی تعبیه‌شده در خروجی مطابقت داشته باشد"
  - هش تراکنش باید برابر با ریشه مرکل ذخیره‌شده در سربرگ بلوک مرجع باشد.
  - مقدار ورودی باید بیشتر یا مساوی مقدار خروجی که خرج می‌شود باشد.
explanation: |
  سیستم اسکریپت Bitcoin نیاز دارد که هر ScriptSig ورودی (اسکریپت بازگشایی) باید با ScriptPubKey خروجی مرجع (اسکریپت قفل‌گذاری) به‌طور موفقیت‌آمیز اجرا شود تا نتیجه‌ای صحیح بر روی پشته تولید کند. این مدل اجرای اسکریپت شرایط خرج کردن انعطاف‌پذیری را فراتر از تطابق ساده امضا فراهم می‌کند. گزینه‌های دیگر الزامات اعتبارسنجی نادرست را توصیف می‌کنند - امضاها نیازی به تطابق دقیق با کلیدهای جاسازی‌شده ندارند، هش‌های تراکنش در طول اعتبارسنجی ورودی با ریشه‌های مرکل مقایسه نمی‌شوند، و ورودی‌های فردی نیازی به تجاوز از خروجی‌های خود ندارند (فقط مجموع ورودی‌ها باید از مجموع خروجی‌ها بیشتر باشد).
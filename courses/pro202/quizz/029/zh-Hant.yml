question: 在 Bitcoin 交易驗證過程中，節點必須驗證哪些項目，以確保每筆輸入都經過適當授權，可使用其參考的輸出？
answer: 同時執行 ScriptSig 時，必須成功解鎖對應的 ScriptPubKey
wrong_answers:
  - 「輸入的數位簽章必須與輸出的內嵌公開金鑰完全相符」
  - 交易切細值必須等於儲存於參考區塊標頭中的 merkle root
  - 輸入金額必須大於或等於支出的輸出金額
explanation: |
  Bitcoin 的腳本系統要求每個輸入的 ScriptSig（解鎖腳本）必須與參照輸出的 ScriptPubKey（鎖定腳本）成功執行，才能在堆疊上產生真正的結果。這種腳本執行模式允許彈性的支出條件，而不只是簡單的簽章匹配。其他選項描述了不正確的驗證要求 - 簽名不需要完全符合內嵌金鑰，交易哈希值在輸入驗證時不會與 merkle 根比較，而且個別輸入不需要超過其輸出（只有總輸入必須超過總輸出）。
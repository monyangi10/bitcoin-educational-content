question: Bitcoinのトランザクション検証中、各入力が参照される出力を使用するために適切に認可されていることを確認するために、ノードは何を検証しなければならないか？
answer: ScriptSig を一緒に実行すると、対応する ScriptPubKey のロックが正常に解除されること。
wrong_answers:
  - "入力のデジタル署名は、出力の埋め込み公開鍵と正確に一致しなければならない"
  - トランザクションハッシュは、参照されるブロックヘッダに格納されているメルクル ルートと等しくなければならない。
  - 入力金額は、使用される出力金額以上でなければならない。
explanation: |
  Bitcoinのスクリプト・システムは、各入力のScriptSig（アンロック・スクリプト）が、参照された出力のScriptPubKey（ロッキング・スクリプト）と正常に実行されなければ、スタック上に真の結果を生成しない。このスクリプト実行モデルにより、単純なシグネチャのマッチングを超えた柔軟な支出条件が可能になる。他のオプションは、署名が埋め込みキーと正確に一致する必要はない、入力検証中にトランザクションハッシュがマルクル根と比較されることはない、個々の入力が出力を超える必要はない(総入力のみが総出力を超える必要がある)など、誤った検証要件を記述しています。
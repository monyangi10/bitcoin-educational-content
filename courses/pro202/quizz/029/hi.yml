question: Bitcoin लेनदेन सत्यापन के दौरान, यह सुनिश्चित करने के लिए कि प्रत्येक इनपुट अपने संदर्भित आउटपुट को खर्च करने के लिए ठीक से अधिकृत है, एक नोड को क्या सत्यापित करना होगा?
answer: ScriptSig को एक साथ निष्पादित किए जाने पर संबंधित ScriptPubKey को सफलतापूर्वक अनलॉक करना होगा।
wrong_answers:
  - "इनपुट का डिजिटल हस्ताक्षर आउटपुट की अंतर्निहित सार्वजनिक कुंजी से बिल्कुल मेल खाना चाहिए।"
  - लेनदेन हैश संदर्भित ब्लॉक हेडर में संग्रहीत मर्कल रूट के बराबर होना चाहिए।
  - इनपुट राशि खर्च की जा रही आउटपुट राशि से अधिक या उसके बराबर होनी चाहिए।
explanation: |
  Bitcoin की स्क्रिप्ट प्रणाली के लिए आवश्यक है कि प्रत्येक इनपुट के ScriptSig (अनलॉकिंग स्क्रिप्ट) का संदर्भित आउटपुट के ScriptPubKey (लॉकिंग स्क्रिप्ट) के साथ सफलतापूर्वक निष्पादन हो ताकि स्टैक पर सही परिणाम प्राप्त हो सके। यह स्क्रिप्ट निष्पादन मॉडल साधारण हस्ताक्षर मिलान से परे लचीली व्यय स्थितियों की अनुमति देता है। अन्य विकल्प गलत सत्यापन आवश्यकताओं का वर्णन करते हैं - हस्ताक्षरों को एम्बेडेड कुंजियों से बिल्कुल मेल खाने की आवश्यकता नहीं है, इनपुट सत्यापन के दौरान लेनदेन हैश की तुलना मर्कल रूट्स से नहीं की जाती है, और व्यक्तिगत इनपुट को उनके आउटपुट से अधिक होने की आवश्यकता नहीं है (केवल कुल इनपुट को कुल आउटपुट से अधिक होना चाहिए)।
question: During Bitcoin transaction validation, what must a node verify to ensure each input is properly authorized to spend its referenced output?
answer: The ScriptSig must successfully unlock the corresponding ScriptPubKey when executed together
wrong_answers:
  - "The input's digital signature must match the output's embedded public key exactly"
  - The transaction hash must equal the merkle root stored in the referenced block header
  - The input amount must be greater than or equal to the output amount being spent
explanation: |
  Bitcoin's script system requires that each input's ScriptSig (unlocking script) must successfully execute with the referenced output's ScriptPubKey (locking script) to produce a true result on the stack. This script execution model allows for flexible spending conditions beyond simple signature matching. The other options describe incorrect validation requirements - signatures don't need to match embedded keys exactly, transaction hashes aren't compared to merkle roots during input validation, and individual inputs don't need to exceed their outputs (only total inputs must exceed total outputs).

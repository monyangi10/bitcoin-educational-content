question: जब कोई Bitcoin नोड बूटस्ट्रैप करता है और पहली बार नेटवर्क से जुड़ता है, तो सक्रिय साथियों को खोजने के लिए यह मुख्य रूप से किस तंत्र का उपयोग करता है?
answer: कोर डेवलपर्स द्वारा बनाए गए हार्डकोडेड DNS सीड्स का उपयोग करके संपर्क सक्रिय पीयर्स के आईपी पते प्राप्त करते हैं।
wrong_answers:
  - पूर्वनिर्धारित सबनेट श्रेणियों में सभी आईपी पतों पर एक खोज संदेश प्रसारित करता है।
  - यह एक केंद्रीय रजिस्ट्री सर्वर से जुड़ता है जो सभी सक्रिय नोड्स की सूची बनाए रखता है।
  - यह हैश-आधारित रूटिंग के माध्यम से पीयर्स को खोजने के लिए DHT (डिस्ट्रिब्यूटेड Hash टेबल) प्रोटोकॉल का उपयोग करता है।
explanation: |
  Bitcoin बूटस्ट्रैप तंत्र के रूप में हार्डकोडेड DNS सीड्स का उपयोग करता है क्योंकि यह नए नोड्स को किसी केंद्रीय प्राधिकरण पर निर्भर किए बिना नेटवर्क में प्रवेश करने का एक विकेन्द्रीकृत तरीका प्रदान करता है। DNS सीड्स को कोर डेवलपर्स द्वारा बनाए रखा जाता है और वर्तमान में सक्रिय पीयर्स के IP पते लौटाता है। एक बार कनेक्ट होने के बाद, नोड्स अतिरिक्त पीयर्स का पता लगाने के लिए getaddr कमांड का उपयोग कर सकते हैं। गलत उत्तर केंद्रीकृत दृष्टिकोणों या प्रोटोकॉल का वर्णन करते हैं जिनका उपयोग Bitcoin नहीं करता है - Bitcoin के डिज़ाइन में कोई केंद्रीय रजिस्ट्री, कोई सबनेट ब्रॉडकास्टिंग और कोई DHT-आधारित पीयर डिस्कवरी नहीं है।
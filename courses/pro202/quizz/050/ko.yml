question: Bitcoin 노드가 부트스트랩을 통해 네트워크에 처음 참여할 때 활성 피어를 발견하기 위해 사용하는 주요 메커니즘은 무엇인가요?
answer: 핵심 개발자가 유지 관리하는 하드코딩된 DNS 시드에 연결하여 활성 피어의 IP를 수신합니다
wrong_answers:
  - 미리 정의된 서브넷 범위의 모든 IP 주소에 검색 메시지를 브로드캐스트합니다
  - 모든 활성 노드 목록을 관리하는 중앙 레지스트리 서버에 연결합니다
  - 해시 기반 라우팅을 통해 피어를 찾기 위해 DHT(분산 Hash 테이블) 프로토콜을 사용합니다
explanation: |
  Bitcoin는 하드코딩된 DNS 시드를 부트스트랩 메커니즘으로 사용하는데, 이는 새로운 노드가 중앙 기관에 의존하지 않고 네트워크에 진입할 수 있는 분산화된 방법을 제공하기 때문입니다. DNS 시드는 핵심 개발자가 유지 관리하며 현재 활성화된 피어의 IP 주소를 반환합니다. 연결되면 노드는 getaddr 명령을 사용하여 추가 피어를 검색할 수 있습니다. 오답은 Bitcoin에서 사용하지 않는 중앙 집중식 접근 방식 또는 프로토콜을 설명하는 것으로, Bitcoin의 설계에는 중앙 레지스트리, 서브넷 브로드캐스팅, DHT 기반 피어 검색이 없습니다.
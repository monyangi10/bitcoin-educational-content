question: เมื่อโหนด Bitcoin เริ่มต้นและเข้าร่วมเครือข่ายเป็นครั้งแรก กลไกหลักที่ใช้ในการค้นหาเพื่อนที่ใช้งานอยู่คืออะไร?
answer: ติดต่อ DNS seeds ที่ถูกฮาร์ดโค้ดโดยนักพัฒนาหลักเพื่อรับ IP ของเพื่อนที่ใช้งานอยู่
wrong_answers:
  - กระจายข้อความการค้นหาไปยังที่อยู่ IP ทั้งหมดในช่วงซับเน็ตที่กำหนดไว้ล่วงหน้า
  - เชื่อมต่อกับเซิร์ฟเวอร์รีจิสทรีกลางที่เก็บรายการของโหนดที่ใช้งานทั้งหมด
  - ใช้โปรโตคอล DHT (Distributed Hash Table) เพื่อค้นหาเพื่อนผ่านการกำหนดเส้นทางแบบแฮช
explanation: |
  Bitcoin ใช้ DNS seeds ที่ถูกกำหนดค่าไว้ล่วงหน้าเป็นกลไกการเริ่มต้นเนื่องจากมันให้วิธีการแบบกระจายอำนาจสำหรับโหนดใหม่ในการเข้าร่วมเครือข่ายโดยไม่ต้องพึ่งพาหน่วยงานกลาง DNS seeds ถูกดูแลโดยนักพัฒนาหลักและส่งคืนที่อยู่ IP ของเพื่อนที่กำลังใช้งานอยู่ เมื่อเชื่อมต่อแล้ว โหนดสามารถใช้คำสั่ง getaddr เพื่อค้นหาเพื่อนเพิ่มเติม คำตอบที่ผิดอธิบายถึงวิธีการแบบรวมศูนย์หรือโปรโตคอลที่ไม่ได้ใช้โดย Bitcoin - ไม่มีการลงทะเบียนกลาง ไม่มีการกระจายสัญญาณย่อย และไม่มีการค้นหาเพื่อนแบบ DHT ในการออกแบบของ Bitcoin
question: 当 Bitcoin 节点第一次启动并加入网络时，它发现活动对等节点的主要机制是什么？
answer: 联系核心开发人员维护的硬编码 DNS 种子，以接收活动同行的 IP 地址
wrong_answers:
  - 向预定义子网范围内的所有 IP 地址广播发现信息
  - 连接到中央注册表服务器，该服务器保存所有活动节点的列表
  - 使用 DHT（分布式 Hash 表）协议，通过基于散列的路由找到对等设备
explanation: |
  Bitcoin 使用硬编码 DNS 种子作为引导机制，因为它提供了一种分散的方式，让新节点无需依赖中央机构即可进入网络。DNS 种子由核心开发人员维护，并返回当前活动对等节点的 IP 地址。一旦连接，节点就可以使用 getaddr 命令发现其他对等节点。错误答案描述了 Bitcoin 未使用的集中式方法或协议--Bitcoin 的设计中没有中央注册表，没有子网广播，也没有基于 DHT 的对等体发现。
question: Bitcoinノードがブートストラップして初めてネットワークに参加するとき、アクティブなピアを発見するために使用する主なメカニズムは何ですか？
answer: コア開発者が管理するハードコードされたDNSシードに連絡し、アクティブなピアのIPを受信する。
wrong_answers:
  - 事前に定義されたサブネット範囲内のすべてのIPアドレスにディスカバリーメッセージをブロードキャストする。
  - すべてのアクティブノードのリストを管理する中央レジストリサーバーに接続する。
  - DHT(分散Hashテーブル)プロトコルを使用し、ハッシュベースのルーティングでピアを見つける
explanation: |
  BitcoinはブートストラップメカニズムとしてハードコードされたDNSシードを使用している。これは、新しいノードが中央機関に依存することなくネットワークに参入するための分散化された方法を提供するためである。DNSシードはコア開発者によって管理され、現在アクティブなピアのIPアドレスを返します。一度接続されると、ノードはgetaddrコマンドを使用して追加のピアを発見することができます。間違った答えは、Bitcoinで使用されていない中央集権的なアプローチやプロトコルを記述しています。Bitcoinの設計では、中央レジストリ、サブネットブロードキャスト、DHTベースのピアディスカバリはありません。
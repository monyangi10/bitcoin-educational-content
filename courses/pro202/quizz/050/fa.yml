question: هنگامی که یک گره Bitcoin برای اولین بار بوت‌استرپ می‌شود و به شبکه می‌پیوندد، مکانیزم اصلی که برای کشف همتایان فعال استفاده می‌کند چیست؟
answer: مخاطبین بذرهای DNS هاردکد شده که توسط توسعه‌دهندگان اصلی نگهداری می‌شوند تا IPهای همتایان فعال را دریافت کنند
wrong_answers:
  - پیام کشف را به تمام آدرس‌های IP در محدوده‌های زیرشبکه از پیش تعریف‌شده پخش می‌کند.
  - به یک سرور ثبت مرکزی متصل می‌شود که فهرستی از تمام گره‌های فعال را نگهداری می‌کند.
  - از پروتکل DHT (جدول توزیع‌شده Hash) برای یافتن همتایان از طریق مسیریابی مبتنی بر هش استفاده می‌کند.
explanation: |
  Bitcoin از DNS seeds کدنویسی‌شده به‌عنوان مکانیزم بوت‌استرپ استفاده می‌کند زیرا این روش یک راه غیرمتمرکز برای ورود نودهای جدید به شبکه بدون تکیه بر یک مرجع مرکزی فراهم می‌کند. DNS seeds توسط توسعه‌دهندگان اصلی نگهداری می‌شوند و آدرس‌های IP همتایان فعال فعلی را برمی‌گردانند. پس از اتصال، نودها می‌توانند از فرمان getaddr برای کشف همتایان اضافی استفاده کنند. پاسخ‌های نادرست روش‌های متمرکز یا پروتکل‌هایی را توصیف می‌کنند که توسط Bitcoin استفاده نمی‌شوند - در طراحی Bitcoin هیچ رجیستری مرکزی، پخش زیرشبکه و کشف همتای مبتنی بر DHT وجود ندارد.
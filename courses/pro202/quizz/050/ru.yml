question: Когда узел Bitcoin впервые загружается и присоединяется к сети, какой основной механизм он использует для обнаружения активных пиров?
answer: Контакты с жестко закодированными DNS-семенами, поддерживаемыми разработчиками ядра, для получения IP-адресов активных пиров
wrong_answers:
  - Распространяет сообщение об обнаружении на все IP-адреса в заданных диапазонах подсетей
  - Подключается к центральному серверу реестра, на котором хранится список всех активных узлов
  - Использует протокол DHT (Distributed Hash Table) для поиска аналогов с помощью хэш-маршрутизации
explanation: |
  Bitcoin использует жестко закодированные DNS-семена в качестве загрузочного механизма, поскольку это обеспечивает децентрализованный способ вхождения новых узлов в сеть, не полагаясь на центральный орган. DNS-семена поддерживаются разработчиками ядра и возвращают IP-адреса активных в данный момент пиров. После подключения узлы могут использовать команду getaddr для поиска дополнительных пиров. Неправильные ответы описывают централизованные подходы или протоколы, не используемые в Bitcoin - в проекте Bitcoin нет центрального реестра, нет трансляции подсетей и нет обнаружения пиров на основе DHT.
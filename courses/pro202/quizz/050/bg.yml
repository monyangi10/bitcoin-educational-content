question: Когато един възел Bitcoin стартира и се присъединява към мрежата за първи път, какъв е основният механизъм, който използва, за да открие активни връстници?
answer: Контакти с твърдо кодирани DNS семена, поддържани от разработчиците на ядрото, за получаване на IP адреси на активни връстници
wrong_answers:
  - Изпращане на съобщение за откриване до всички IP адреси в предварително определени обхвати на подмрежата
  - Свързва се с централен сървър на регистъра, който поддържа списък на всички активни възли
  - Използва протокола DHT (Distributed Hash Table) за намиране на партньори чрез маршрутизиране на базата на хеш
explanation: |
  Bitcoin използва твърдо кодирани DNS семена като механизъм за стартиране, тъй като осигурява децентрализиран начин за влизане на нови възли в мрежата, без да се разчита на централен орган. DNS семената се поддържат от разработчиците на ядрото и връщат IP адресите на активните в момента равнопоставени потребители. След като се свържат, възлите могат да използват командата getaddr, за да открият допълнителни партньори. Неправилните отговори описват централизирани подходи или протоколи, които не се използват от Bitcoin - в дизайна на Bitcoin няма централен регистър, няма излъчване на подмрежи и няма откриване на връстници на базата на DHT.
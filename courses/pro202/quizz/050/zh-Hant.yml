question: 當 Bitcoin 節點啟動並首次加入網路時，它用什麼主要機制來發現作用中的對等？
answer: 聯絡由核心開發人員維護的硬碼 DNS 種子，以接收活動對等體的 IP
wrong_answers:
  - 向預定義子網路範圍內的所有 IP 位址廣播發現訊息
  - 連線至中央註冊伺服器，該伺服器會維護所有作用中節點的清單
  - 使用 DHT (分散式 Hash 表) 通訊協定，透過散列式路由尋找對等體
explanation: |
  Bitcoin 使用硬體編碼的 DNS 種子作為開機機制，因為它提供了一種分散的方式，讓新節點可以進入網路，而無需依賴中央機關。DNS 種子由核心開發人員維護，並會回傳目前活躍對等體的 IP 位址。一旦連線後，節點就可以使用 getaddr 指令來發現其他的對等體。錯誤答案描述了 Bitcoin 沒有使用的集中式方法或通訊協定 - Bitcoin 的設計中沒有中央註冊、沒有子網路廣播、也沒有基於 DHT 的對等體發現。
question: Bitcoin的难度调整机制将2016年每个区块调整期的变化限制在4倍以内的主要原因是什么？
answer: 为防止出现极端振荡，以免在哈希率急剧变化时破坏网络稳定
wrong_answers:
  - 确保矿工在难度大幅增加之前有足够的时间升级硬件
  - 为了保持与 32 位时间戳字段的兼容性，32 位时间戳字段在进行较大调整时会变得不可靠
  - 防止因困难急剧变化而打乱整笔补贴减半的时间表
explanation: |
  四倍限制防止了危险的反馈循环，因为极端的难度变化会导致区块时间的剧烈波动。如果没有这一限制，哈希率的突然下降可能会引发难度的大幅降低，使区块变得过于容易，并可能破坏共识的稳定。反之，大幅提高难度则会使区块几乎无法挖掘。该限制确保了渐进、可控的调整，即使在 mining 禁用等重大干扰期间也能保持网络稳定，让系统在多个调整期内可预测地进行自我修正，而不是产生混乱的振荡。
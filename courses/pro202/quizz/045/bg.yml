question: Коя е основната причина механизмът за коригиране на трудността на Bitcoin да ограничава промените до коефициент четири по време на всеки период на коригиране на блока за 2016 г.?
answer: За да се предотвратят екстремни колебания, които биха могли да дестабилизират мрежата, когато скоростта на хеширане се променя драстично
wrong_answers:
  - За да се гарантира, че миньорите имат достатъчно време да обновят хардуера си, преди трудността да се увеличи значително
  - За да се запази съвместимостта с 32-битовото поле за времеви маркери, което става ненадеждно при по-големи корекции
  - За да се предотврати нарушаването на графика за намаляване на блоковите субсидии наполовина поради бързи промени в трудностите
explanation: |
  Четирикратното ограничение предотвратява опасни вериги на обратна връзка, при които екстремни промени в трудността могат да доведат до резки колебания във времето на блокиране. Без това ограничение внезапен спад на скоростта на хеширане би могъл да предизвика масово намаляване на трудността, което би направило блоковете твърде лесни и потенциално би дестабилизирало консенсуса. И обратното, огромните увеличения могат да направят блоковете почти невъзможни за добив. Ограничението осигурява постепенни, управляеми корекции, които поддържат стабилността на мрежата дори по време на големи смущения като забраните на mining, позволявайки на системата да се самокоригира предсказуемо през няколко периода на корекции, вместо да създава хаотични колебания.
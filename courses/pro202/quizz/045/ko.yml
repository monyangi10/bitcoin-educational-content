question: Bitcoin의 난이도 조정 메커니즘이 각 2016년 블록 조정 기간 동안 변경을 4배수 이내로 제한하는 주된 이유는 무엇인가요?
answer: 해시 속도가 급격하게 변할 때 네트워크를 불안정하게 만들 수 있는 극단적인 진동을 방지합니다
wrong_answers:
  - 난이도가 크게 증가하기 전에 채굴자가 하드웨어를 업그레이드할 충분한 시간을 확보하기 위해
  - 조정 폭이 커지면 불안정해지는 32비트 타임스탬프 필드와의 호환성을 유지하려면 다음과 같이 하세요
  - 급격한 난이도 변경으로 인해 블록 보조금 반감 일정이 중단되는 것을 방지하기 위해 다음과 같이 조치합니다
explanation: |
  4배 제한은 극심한 난이도 변화로 인해 블록 시간이 급변할 수 있는 위험한 피드백 루프를 방지합니다. 이러한 제약이 없다면, 갑작스러운 해시율 하락으로 인해 난이도가 크게 낮아져 블록이 너무 쉬워지고 잠재적으로 합의가 불안정해질 수 있습니다. 반대로 급격한 증가는 블록 채굴을 거의 불가능하게 만들 수 있습니다. 이 제한은 mining 금지와 같은 큰 혼란이 발생하더라도 네트워크 안정성을 유지하는 점진적이고 관리 가능한 조정을 보장하며, 시스템이 혼란스러운 진동을 일으키지 않고 여러 조정 기간 동안 예측 가능하게 자체 수정할 수 있도록 합니다.
question: Bitcoin 的難度調整機制在 2016 年的每個區塊調整期間，將變化限制在因數 4 以內的主要原因是什麼？
answer: 為了防止雜湊率大幅改變時可能導致網路不穩定的極端震盪
wrong_answers:
  - 確保礦工在難度大幅增加前有足夠時間升級硬體
  - 為了保持與 32 位元時間戳欄位的相容性，因為 32 位元時間戳欄位會隨著較大的調整而變得不可靠
  - 為了避免整體補助減半的時間表被快速的困難變化打亂
explanation: |
  四倍限制可防止危險的回饋循環，因為極端難度變化可能會導致區塊時間大幅波動。如果沒有這個限制，哈希率的突然下降可能會引發大量的難度降低，使區塊變得太容易，可能會破壞共識的穩定性。反之，大幅增加的難度則會讓區塊幾乎無法挖出。此限制可確保逐步、可管理的調整，即使在 mining 封禁等重大中斷期間，也能維持網路穩定，讓系統在多個調整期間可預測地自我修正，而不是產生混亂的震盪。
question: Bitcoinの難易度調整メカニズムが、2016年ブロックの各調整期間中の変更を4倍以内に制限している主な理由は何ですか？
answer: ハッシュレートが劇的に変化した場合、ネットワークを不安定にする極端な振動を防ぐため。
wrong_answers:
  - 難易度が大幅に上昇する前に、採掘者がハードウェアをアップグレードするための十分な時間を確保する。
  - 調整が大きくなると信頼性が低下する32ビットのタイムスタンプフィールドとの互換性を維持するため。
  - ブロック補助金半減のスケジュールが、急激な難易度の変化によって崩れるのを防ぐため
explanation: |
  4倍という制限は、極端な難易度の変化がブロック時間の乱高下を引き起こす危険なフィードバックループを防ぐ。この制約がなければ、突然のハッシュレート低下が大規模な難易度低下を引き起こし、ブロックが簡単になりすぎてコンセンサスが不安定になる可能性がある。逆に、難易度が大幅に上昇すると、ブロックの採掘がほとんど不可能になる可能性がある。この制限により、miningのような大きな混乱時でもネットワークの安定性を維持できるよう、徐々に管理可能な調整が行われ、システムが混沌とした振動を起こすのではなく、複数の調整期間にわたって予測可能な自己修正を行うことができます。
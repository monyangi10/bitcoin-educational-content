question: دلیل اصلی که مکانیزم تنظیم سختی Bitcoin تغییرات را در هر دوره تنظیم ۲۰۱۶ بلوکی به یک عامل چهار محدود می‌کند چیست؟
answer: برای جلوگیری از نوسانات شدید که می‌تواند شبکه را در هنگام تغییرات شدید نرخ هش بی‌ثبات کند
wrong_answers:
  - برای اطمینان از اینکه ماینرها زمان کافی برای ارتقاء سخت‌افزار خود قبل از افزایش قابل توجه سختی دارند
  - برای حفظ سازگاری با فیلد زمان‌سنج ۳۲ بیتی که با تنظیمات بزرگ‌تر غیرقابل‌اعتماد می‌شود
  - برای جلوگیری از اختلال در برنامه نصف شدن یارانه بلوک به دلیل تغییرات سریع سختی
explanation: |
  محدودیت چهار برابری از ایجاد حلقه‌های بازخورد خطرناک جلوگیری می‌کند، جایی که تغییرات شدید در سختی می‌تواند باعث نوسانات شدید در زمان‌های بلاک شود. بدون این محدودیت، کاهش ناگهانی نرخ هش می‌تواند کاهش‌های عظیم در سختی را تحریک کند، که بلاک‌ها را بیش از حد آسان کرده و ممکن است اجماع را بی‌ثبات کند. برعکس، افزایش‌های بزرگ می‌تواند استخراج بلاک‌ها را تقریباً غیرممکن کند. این محدودیت تضمین می‌کند که تنظیمات به صورت تدریجی و قابل مدیریت انجام می‌شود و پایداری شبکه را حتی در طول اختلالات عمده مانند ممنوعیت‌های mining حفظ می‌کند، و به سیستم اجازه می‌دهد که به صورت پیش‌بینی‌پذیر در طول دوره‌های تنظیم متعدد خود را تصحیح کند، به جای ایجاد نوسانات آشوب‌زا.
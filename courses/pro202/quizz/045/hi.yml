question: जीडब्ल्यू-0 की कठिनाई समायोजन तंत्र द्वारा प्रत्येक 2016-ब्लॉक समायोजन अवधि के दौरान परिवर्तनों को चार के कारक के भीतर सीमित करने का प्राथमिक कारण क्या है?
answer: हैश रेट में अचानक बदलाव होने पर नेटवर्क को अस्थिर कर सकने वाले अत्यधिक उतार-चढ़ाव को रोकने के लिए।
wrong_answers:
  - यह सुनिश्चित करने के लिए कि कठिनाई में काफी वृद्धि होने से पहले खनिकों को अपने हार्डवेयर को अपग्रेड करने के लिए पर्याप्त समय मिल जाए।
  - 32-बिट टाइमस्टैम्प फ़ील्ड के साथ संगतता बनाए रखने के लिए, जो बड़े समायोजन के साथ अविश्वसनीय हो जाता है।
  - तेजी से होने वाले कठिनाई परिवर्तनों के कारण ब्लॉक सब्सिडी हाल्विंग शेड्यूल में व्यवधान को रोकने के लिए
explanation: |
  चार गुना सीमा खतरनाक फीडबैक लूप को रोकती है, जहां कठिनाई में अत्यधिक बदलाव ब्लॉक समय में भारी उतार-चढ़ाव पैदा कर सकते हैं। इस प्रतिबंध के बिना, हैश रेट में अचानक गिरावट से कठिनाई में भारी कमी आ सकती है, जिससे ब्लॉक बहुत आसान हो जाएंगे और सर्वसम्मति अस्थिर हो सकती है। इसके विपरीत, भारी वृद्धि से ब्लॉकों को माइन करना लगभग असंभव हो सकता है। यह सीमा क्रमिक, प्रबंधनीय समायोजन सुनिश्चित करती है जो mining प्रतिबंध जैसी बड़ी बाधाओं के दौरान भी नेटवर्क स्थिरता बनाए रखती है, जिससे सिस्टम अराजक दोलनों के बजाय कई समायोजन अवधियों में अनुमानित रूप से स्वयं को ठीक कर सकता है।
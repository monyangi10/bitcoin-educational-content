question: เหตุผลหลักที่กลไกการปรับความยากของ Bitcoin จำกัดการเปลี่ยนแปลงให้อยู่ในปัจจัยสี่ในแต่ละช่วงการปรับ 2016 บล็อกคืออะไร?
answer: เพื่อป้องกันการสั่นสะเทือนที่รุนแรงซึ่งอาจทำให้เครือข่ายไม่เสถียรเมื่ออัตราแฮชเปลี่ยนแปลงอย่างมาก
wrong_answers:
  - เพื่อให้แน่ใจว่านักขุดมีเวลาเพียงพอในการอัปเกรดฮาร์ดแวร์ก่อนที่ความยากจะเพิ่มขึ้นอย่างมาก
  - เพื่อรักษาความเข้ากันได้กับฟิลด์การประทับเวลาขนาด 32 บิตซึ่งจะไม่เชื่อถือได้เมื่อมีการปรับขนาดใหญ่ขึ้น
  - เพื่อป้องกันไม่ให้ตารางการลดลงครึ่งหนึ่งของเงินอุดหนุนบล็อกถูกรบกวนจากการเปลี่ยนแปลงความยากลำบากอย่างรวดเร็ว
explanation: |
  ขีดจำกัดสี่เท่าป้องกันลูปป้อนกลับที่อันตรายซึ่งการเปลี่ยนแปลงความยากลำบากอย่างสุดขั้วอาจทำให้เกิดการแกว่งตัวของเวลาบล็อกอย่างรุนแรง หากไม่มีข้อจำกัดนี้ การลดลงของอัตราแฮชอย่างกะทันหันอาจกระตุ้นให้เกิดการลดความยากลำบากอย่างมหาศาล ทำให้บล็อกง่ายเกินไปและอาจทำให้ฉันทามติเสียหาย ในทางกลับกัน การเพิ่มขึ้นอย่างมากอาจทำให้บล็อกแทบจะเป็นไปไม่ได้ที่จะขุด ขีดจำกัดนี้ช่วยให้มั่นใจได้ถึงการปรับเปลี่ยนที่ค่อยเป็นค่อยไปและจัดการได้ ซึ่งรักษาเสถียรภาพของเครือข่ายแม้ในช่วงที่เกิดการหยุดชะงักครั้งใหญ่ เช่น การแบน mining ทำให้ระบบสามารถแก้ไขตัวเองได้อย่างคาดเดาได้ในช่วงระยะเวลาการปรับหลายช่วง แทนที่จะสร้างการแกว่งตัวที่วุ่นวาย
question: Какво се случва с полетата ScriptSig на всички входове по време на процеса на конструиране на Sighash за проверка на наследствен подпис ECDSA?
answer: Всички полета ScriptSig се изпразват, след което ScriptSig на текущия вход се заменя със съответния ScriptPubKey
wrong_answers:
  - Всички полета на ScriptSig остават непроменени и се включват в първоначалния си вид в изчислението на Sighash
  - "Запазва се само полето ScriptSig на текущия вход, докато полетата ScriptSig на всички останали входове се премахват от транзакцията"
  - Всички полета ScriptSig се заменят със съответните им стойности ScriptPubKey от препратените изходи
explanation: |
  По време на конструирането на Sighash за наследени транзакции процесът първо изпразва всички полета ScriptSig, след което заменя само текущия вход, който се валидира, със съответния ScriptPubKey от изхода, който изразходва. Това гарантира, че подписът се ангажира с условията за изразходване, без да се създават кръгови зависимости, при които подписите ще трябва да се подписват сами. Другите варианти са некоректни, защото или оставят подписите на място (създавайки логически невъзможности), или променят всички входове еднакво (което не би изолирало правилно контекста на валидиране на текущия вход).
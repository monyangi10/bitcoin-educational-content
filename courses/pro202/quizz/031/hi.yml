question: लेगेसी ईसीडीएसए हस्ताक्षर सत्यापन के लिए sighash निर्माण प्रक्रिया के दौरान सभी इनपुट के ScriptSig फ़ील्ड का क्या होता है?
answer: सभी ScriptSig फ़ील्ड खाली कर दिए जाते हैं, फिर वर्तमान इनपुट के ScriptSig को उसके संबंधित ScriptPubKey से बदल दिया जाता है।
wrong_answers:
  - सभी ScriptSig फ़ील्ड अपरिवर्तित रहते हैं और sighash गणना में अपने मूल रूप में शामिल किए जाते हैं।
  - "लेनदेन से केवल वर्तमान इनपुट का ScriptSig ही रखा जाता है जबकि अन्य सभी इनपुट के ScriptSig फ़ील्ड हटा दिए जाते हैं।"
  - सभी ScriptSig फ़ील्ड को संदर्भित आउटपुट से उनके संबंधित ScriptPubKey मानों से बदल दिया जाता है।
explanation: |
  पुराने लेन-देनों के लिए sighash निर्माण के दौरान, प्रक्रिया विशेष रूप से पहले सभी ScriptSig फ़ील्ड को खाली कर देती है, फिर केवल वर्तमान में मान्य किए जा रहे इनपुट को उसके संबंधित ScriptPubKey से बदल देती है, जो उस आउटपुट से लिया गया है जिसे वह खर्च कर रहा है। इससे यह सुनिश्चित होता है कि हस्ताक्षर खर्च की शर्तों के अनुरूप हो, बिना किसी चक्रीय निर्भरता के जहाँ हस्ताक्षरों को स्वयं पर हस्ताक्षर करने की आवश्यकता हो। अन्य विकल्प गलत हैं क्योंकि वे या तो हस्ताक्षरों को यथावत छोड़ देते हैं (तार्किक असंभवताएँ पैदा करते हैं) या सभी इनपुट को समान रूप से संशोधित करते हैं (जो वर्तमान इनपुट के सत्यापन संदर्भ को ठीक से अलग नहीं कर पाएगा)।
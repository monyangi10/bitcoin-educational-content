question: レガシーECDSA署名検証のためのsighash構築プロセスにおいて、すべての入力のScriptSigフィールドはどうなりますか？
answer: すべてのScriptSigフィールドが空になり、現在の入力のScriptSigが対応するScriptPubKeyに置き換えられる。
wrong_answers:
  - すべてのScriptSigフィールドは変更されることなく、元のフォームでsighashの計算に含まれます。
  - "現在の入力のScriptSigだけが保持され、他のすべての入力のScriptSigフィールドはトランザクションから削除される"
  - すべての ScriptSig フィールドは、参照された出力から対応する ScriptPubKey 値に置き換えられる。
explanation: |
  レガシートランザクションのsighash構築では、まずすべてのScriptSigフィールドを空にしてから、検証中の現在の入力のみを、支出中の出力から対応するScriptPubKeyに置き換える。これにより、署名がそれ自体に署名する必要があるような循環的な依存関係を作成することなく、署名が支出条件にコミットすることが保証される。他の選択肢は、署名をそのままにしておくか（論理的に不可能を引き起こす）、すべての入力を一律に変更する（現在の入力の検証コンテキストを適切に分離できない）ため、正しくない。
question: ระหว่างกระบวนการสร้าง sighash สำหรับการตรวจสอบลายเซ็น ECDSA แบบดั้งเดิม (legacy ECDSA signature verification) ฟิลด์ ScriptSig ของอินพุตทั้งหมดจะถูกล้างออก (set to empty)
answer: ฟิลด์ ScriptSig ทั้งหมดจะถูกล้าง จากนั้น ScriptSig ของอินพุตปัจจุบันจะถูกแทนที่ด้วย ScriptPubKey ที่สอดคล้องกัน
wrong_answers:
  - ฟิลด์ ScriptSig ทั้งหมดยังคงไม่เปลี่ยนแปลงและถูกรวมในรูปแบบดั้งเดิมในการคำนวณ sighash
  - "เฉพาะ ScriptSig ของอินพุตปัจจุบันเท่านั้นที่ถูกเก็บไว้ ในขณะที่ ScriptSig ของอินพุตอื่น ๆ ทั้งหมดจะถูกลบออกจากธุรกรรม"
  - ฟิลด์ ScriptSig ทั้งหมดถูกแทนที่ด้วยค่า ScriptPubKey ที่สอดคล้องกันจากเอาต์พุตที่อ้างอิง
explanation: |
  ในระหว่างการสร้าง sighash สำหรับธุรกรรมแบบ legacy กระบวนการจะล้างข้อมูลในทุกฟิลด์ของ ScriptSig ก่อน จากนั้นจึงแทนที่เฉพาะอินพุตปัจจุบันที่กำลังตรวจสอบด้วย ScriptPubKey ที่สอดคล้องจากเอาต์พุตที่กำลังใช้จ่าย วิธีนี้ทำให้แน่ใจว่าลายเซ็นจะยึดติดกับเงื่อนไขการใช้จ่ายโดยไม่สร้างการพึ่งพาซึ่งกันและกันที่ลายเซ็นจะต้องเซ็นตัวเอง ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะพวกเขาหรือทิ้งลายเซ็นไว้ที่เดิม (สร้างความเป็นไปไม่ได้ทางตรรกะ) หรือแก้ไขอินพุตทั้งหมดอย่างสม่ำเสมอ (ซึ่งจะไม่แยกบริบทการตรวจสอบของอินพุตปัจจุบันอย่างถูกต้อง)
question: 레거시 ECDSA 서명 검증을 위한 시해시 구성 프로세스 중 모든 입력의 ScriptSig 필드는 어떻게 되나요?
answer: 모든 스크립트 서명 필드가 비워지면 현재 입력의 스크립트 서명이 해당 스크립트 펍 키로 대체됩니다
wrong_answers:
  - 모든 ScriptSig 필드는 변경되지 않은 상태로 유지되며 시게시 계산에 원래 형태로 포함됩니다
  - "현재 입력의 스크립트 서명만 유지되고 다른 모든 입력의 스크립트 서명 필드는 트랜잭션에서 제거됩니다."
  - 모든 ScriptSig 필드는 참조된 출력에서 해당 ScriptPubKey 값으로 대체됩니다
explanation: |
  레거시 트랜잭션에 대한 시해시 구성 중에 프로세스는 특히 모든 ScriptSig 필드를 먼저 비운 다음, 유효성을 검사 중인 현재 입력만 지출 중인 출력에서 해당 ScriptPubKey로 대체합니다. 이렇게 하면 서명이 스스로 서명해야 하는 순환 종속성을 만들지 않고 서명이 지출 조건에 커밋되도록 보장합니다. 다른 옵션은 서명을 그대로 두거나(논리적으로 불가능함) 모든 입력을 일률적으로 수정하기 때문에(현재 입력의 유효성 검사 컨텍스트를 제대로 분리하지 못함) 올바르지 않습니다.
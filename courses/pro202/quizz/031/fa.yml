question: در طول فرآیند ساخت sighash برای تأیید امضای ECDSA قدیمی، فیلدهای ScriptSig تمام ورودی‌ها به‌طور موقت خالی می‌شوند، به جز ScriptSig ورودی‌ای که در حال حاضر در حال امضا شدن است.
answer: تمام فیلدهای ScriptSig خالی می‌شوند، سپس ScriptSig ورودی فعلی با ScriptPubKey مربوطه جایگزین می‌شود.
wrong_answers:
  - تمامی فیلدهای ScriptSig بدون تغییر باقی می‌مانند و به شکل اصلی خود در محاسبه sighash گنجانده می‌شوند.
  - "فقط ScriptSig ورودی فعلی نگه داشته می‌شود در حالی که فیلدهای ScriptSig سایر ورودی‌ها از تراکنش حذف می‌شوند"
  - تمام فیلدهای ScriptSig با مقادیر متناظر ScriptPubKey از خروجی‌های مرجع جایگزین می‌شوند.
explanation: |
  در طول ساخت sighash برای تراکنش‌های قدیمی، این فرآیند به‌طور خاص ابتدا تمام فیلدهای ScriptSig را خالی می‌کند، سپس تنها ورودی فعلی که در حال اعتبارسنجی است را با ScriptPubKey مربوطه از خروجی که در حال خرج کردن است جایگزین می‌کند. این کار تضمین می‌کند که امضا به شرایط خرج کردن متعهد است بدون ایجاد وابستگی‌های دایره‌ای که در آن امضاها نیاز به امضای خود داشته باشند. گزینه‌های دیگر نادرست هستند زیرا یا امضاها را در جای خود باقی می‌گذارند (که منجر به غیرممکن‌های منطقی می‌شود) یا همه ورودی‌ها را به‌طور یکنواخت تغییر می‌دهند (که زمینه اعتبارسنجی ورودی فعلی را به‌درستی ایزوله نمی‌کند).
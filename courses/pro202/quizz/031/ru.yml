question: Что происходит с полями ScriptSig всех входов в процессе построения sighash для проверки подписи ECDSA?
answer: Все поля ScriptSig очищаются, затем ScriptSig текущего входа заменяется соответствующим ScriptPubKey
wrong_answers:
  - Все поля ScriptSig остаются неизменными и включаются в расчет sighash в своем первоначальном виде
  - "Только ScriptSig текущего входа сохраняется, а поля ScriptSig всех остальных входов удаляются из транзакции"
  - Все поля ScriptSig заменяются соответствующими значениями ScriptPubKey из ссылающихся выходов
explanation: |
  При построении sighash для старых транзакций процесс специально сначала опустошает все поля ScriptSig, а затем заменяет только текущий проверяемый входной сигнал на соответствующий ScriptPubKey из расходуемого выхода. Это обеспечивает фиксацию подписи к условиям расходования средств без создания круговых зависимостей, когда подписи должны подписывать сами себя. Другие варианты неверны, поскольку они либо оставляют подписи на месте (создавая логические невозможности), либо изменяют все входы единообразно (что не позволяет должным образом изолировать контекст проверки текущего входа).
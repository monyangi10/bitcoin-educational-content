question: Qu'advient-il des champs ScriptSig de toutes les entrées au cours du processus de construction du sighash pour la vérification de la signature ECDSA ?
answer: Tous les champs ScriptSig sont vidés, puis le ScriptSig de l'entrée courante est remplacé par la clé ScriptPubKey correspondante
wrong_answers:
  - Tous les champs ScriptSig restent inchangés et sont inclus dans leur forme originale dans le calcul du sighash
  - "Seul le ScriptSig de l'entrée actuelle est conservé, tandis que les champs ScriptSig de toutes les autres entrées sont supprimés de la transaction"
  - Tous les champs ScriptSig sont remplacés par les valeurs ScriptPubKey correspondantes des sorties référencées
explanation: |
  Lors de la construction du sighash pour les transactions anciennes, le processus vide d'abord tous les champs ScriptSig, puis remplace uniquement l'entrée en cours de validation par la clé ScriptPubKey correspondante de la sortie qu'il dépense. Cela garantit que la signature s'engage à respecter les conditions de dépense sans créer de dépendances circulaires où les signatures devraient se signer elles-mêmes. Les autres options sont incorrectes car elles laissent les signatures en place (créant des impossibilités logiques) ou modifient toutes les entrées de manière uniforme (ce qui n'isolerait pas correctement le contexte de validation de l'entrée en cours).
question: बस्तिय के अनुसार संरक्षणवाद क्या है?
answer: विदेशी प्रतिस्पर्धा को सीमित करने वाला एक आर्थिक राष्ट्रवाद का रूप
wrong_answers:
  - एक आर्थिक नीति जो अंतर्राष्ट्रीय व्यापार को बढ़ावा देने के लिए बनाई गई है
  - ग्राहकों की खरीदारी की ताकत बढ़ाने की एक रणनीति
  - छोटे स्थानीय व्यवसायों को सहायता देने का एक उपाय
explanation: |
  बास्तियात संरक्षणवाद को एक आर्थिक राष्ट्रवाद के रूप में बताते हैं जो विदेशी प्रतिस्पर्धा को सीमित करके राष्ट्रीय हितों की रक्षा करना चाहता है।
reviewed: false
question: None uburinzi ni iki nk’uko Bastiat abivuga?
answer: Uburyo bwo gukunda igihugu mu vy'ubutunzi bugamije kugabanya uguhiganwa n'amahanga .
wrong_answers:
  - Politike y'ubutunzi igamije guteza imbere ubudandaji mpuzamakungu .
  - Ingamba zo kwongerera ubushobozi abaguzi bwo kugura
  - Ingingo yo gufasha ubucuruzi buto buto bwo mu karere
explanation: |
  Bastiat adondora uburinzi nk’ubunyagihugu mu vy’ubutunzi bushaka gukingira inyungu z’igihugu mu kugabanya uguhiganwa n’amahanga.

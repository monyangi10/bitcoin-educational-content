question: Czym jest protekcjonizm według Bastiata?
answer: Forma nacjonalizmu gospodarczego mająca na celu ograniczenie zagranicznej konkurencji
wrong_answers:
  - Polityka gospodarcza mająca na celu promowanie handlu międzynarodowego
  - Strategia zwiększania siły nabywczej konsumentów
  - Środek wspierający małe lokalne firmy
explanation: |
  Bastiat opisuje protekcjonizm jako nacjonalizm gospodarczy, którego celem jest ochrona interesów narodowych poprzez ograniczanie zagranicznej konkurencji.

question: मोमबत्ती बनाने वाले नेताओं से क्या गुज़ारिश करते हैं?
answer: धूप को रोशनी के स्रोत के रूप में इस्तेमाल करने पर पाबंदी लगाना
wrong_answers:
  - मोमबत्तियों पर टैक्स बढ़ाने के लिए
  - विदेशी मोमबत्ती फैक्ट्रियों को बंद करने के लिए
  - मोमबत्ती उत्पादन को सब्सिडी देना
explanation: |
  इस व्यंग्य में, मोमबत्ती बनाने वाली कंपनियाँ कुछ संरक्षणवादी नीतियों की बेहूदगी को उजागर करने के लिए धूप पर प्रतिबंध लगाने की माँग करती हैं।

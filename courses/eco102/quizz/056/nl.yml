question: Welk verzoek doen kaarsenfabrikanten aan de afgevaardigden?
answer: Het gebruik van de zon als lichtbron verbieden
wrong_answers:
  - Belastingen op kaarsen verhogen
  - Buitenlandse kaarsenfabrieken sluiten
  - De kaarsenproductie subsidiëren
explanation: |
  In deze satire vragen kaarsenfabrikanten om een verbod op zonlicht om de absurditeit van bepaald protectionistisch beleid te benadrukken.
reviewed: false
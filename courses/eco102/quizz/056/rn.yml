question: None abahinguzi b’amabuye y’agaciro basaba iki abadepite?
answer: Kubuza gukoresha izuba nk'isoko y'umuco .
wrong_answers:
  - Kugira ngo bongere imisoro ku mabuye y’agaciro
  - Gufunga amahinguriro y'amabuye y'agaciro yo mu mahanga
  - Gufasha mu guhingura ubuji
explanation: |
  Muri iyo nkuru y’uruyeri, abahinguzi b’amabuye y’agaciro basaba ko umuco w’izuba ubuzwa kugira ngo bagaragaze ubupfu bw’ingingo ngenderwako zimwe zimwe z’uburinzi.

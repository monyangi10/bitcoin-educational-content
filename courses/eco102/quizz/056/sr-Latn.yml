question: Koji zahtev proizvođači sveća upućuju poslanicima?
answer: Zabraniti korišćenje sunca kao izvora svetlosti
wrong_answers:
  - Povećati poreze na sveće
  - Da se zatvore strane fabrike sveća
  - Da subvencioniše proizvodnju sveća
explanation: |
  U ovoj satiri, proizvođači sveća zahtevaju zabranu sunčeve svetlosti kako bi istakli apsurdnost određenih protekcionističkih politika.

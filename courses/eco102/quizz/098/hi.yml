question: बस्तियात के अनुसार कानून का उद्देश्य क्या होना चाहिए?
answer: सभी लूट-खसोट को खत्म करने के लिए।
wrong_answers:
  - शक्ति संबंधों को फिर से संतुलित करने के लिए।
  - generate सोशल बॉन्ड्स को।
  - समानता को बढ़ावा देने के लिए पुनर्वितरण अधिकारों का उपयोग करना।
explanation: |
  बास्टियत के लिए, कानून को सिर्फ प्राकृतिक अधिकारों की रक्षा करनी चाहिए, किसी भी तरह की लूट को रोककर, ताकि सबके लिए न्याय सुनिश्चित हो सके।

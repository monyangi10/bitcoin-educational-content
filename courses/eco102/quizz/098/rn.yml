question: None Itegeko nk’uko Bastiat abivuga rikwiye kuba rifise intumbero iyihe?
answer: Kugira ngo ubusahuzi bwose buhere.
wrong_answers:
  - Kugira ngo imigenderanire y’ububasha isubire guhuza.
  - Ku generate imigenderanire y’imibano.
  - Guteza imbere uburinganire biciye mu burenganzira bwo gusubira gusangira.
explanation: |
  Ku bwa Bastiat, Itegeko ryari rikwiye gusa gukingira uburenganzira bw’abantu mu kubuza uburyo bwose bwo gusahura, gutyo rikagira ubutungane bubereye kuri bose.

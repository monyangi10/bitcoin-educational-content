question: Jaki powinien być cel prawa według Bastiata?
answer: Położyć kres wszelkiej grabieży.
wrong_answers:
  - Przywrócenie równowagi w relacjach władzy.
  - Do generate więzi społecznych.
  - Promowanie równości poprzez prawa redystrybucyjne.
explanation: |
  Dla Bastiata prawo powinno po prostu chronić prawa naturalne, zapobiegając wszelkim formom grabieży, zapewniając w ten sposób sprawiedliwość dla wszystkich.

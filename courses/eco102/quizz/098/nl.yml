question: Wat zou volgens Bastiat het doel van de Wet moeten zijn?
answer: Een einde maken aan alle plunderingen.
wrong_answers:
  - De machtsverhoudingen weer in evenwicht brengen.
  - generate sociale banden.
  - Gelijkheid bevorderen door herverdelingsrechten.
explanation: |
  Voor Bastiat zou de wet eenvoudigweg de natuurlijke rechten moeten beschermen door elke vorm van plundering te voorkomen en zo een eerlijke rechtvaardigheid voor iedereen te garanderen.

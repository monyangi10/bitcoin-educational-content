question: Nk’uko Bastiat abivuga, ni igiki nyamukuru kiranga ubumwe nyakuri?
answer: Ni ku bushake kandi ntibitegekwa n'amategeko .
wrong_answers:
  - Iterwa inkunga n'imisoro .
  - Bitegekanijwe gushitsa ivyo bose bakeneye
  - Bitegekanijwe na Leta kugira ngo ntihagire uwugirira nabi .
explanation: |
  Ku bwa Bastiat, ubumwe nyakuri bushobora gusa kuva ku Commitment y’ubushake, ata n’imwe itegekanijwe n’amategeko.
question: Jaka jest główna cecha prawdziwej solidarności według Bastiata?
answer: Jest ona dobrowolna i nie jest wymuszona przez prawo
wrong_answers:
  - Jest on finansowany z podatków
  - Jest on narzucany w celu zaspokojenia zbiorowych potrzeb
  - Jest on regulowany przez państwo, aby zapobiec nadużyciom
explanation: |
  Dla Bastiata prawdziwa solidarność może pochodzić tylko z dobrowolnego Commitment, wolnego od jakichkolwiek zobowiązań prawnych.
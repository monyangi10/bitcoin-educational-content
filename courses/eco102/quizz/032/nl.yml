question: Wat is volgens Rousseau het doel van het beperken van individuen?
answer: Om hen naar de vrijheid te leiden
wrong_answers:
  - Om ze tot slaaf te maken
  - Om ze gelijk te maken
  - Om hen te verenigen in dienstbaarheid
explanation: |
  Rousseau gelooft dat dwang individuen naar vrijheid kan leiden door ze naar een collectief ideaal te leiden dat ze zouden nastreven als ze verlicht waren.

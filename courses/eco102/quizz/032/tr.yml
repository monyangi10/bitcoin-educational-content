question: Rousseau'ya göre bireyleri kısıtlamanın amacı nedir?
answer: Onları özgürlüğe götürmek için
wrong_answers:
  - Onları köleleştirmek için
  - Onları eşit yapmak için
  - Onları kullukta birleştirmek için
explanation: |
  Rousseau, kısıtlamanın bireyleri, aydınlanmış olsalardı peşinden gidecekleri kolektif bir ideale yönlendirerek özgürlüğe doğru yönlendirebileceğine inanmaktadır.
reviewed: false
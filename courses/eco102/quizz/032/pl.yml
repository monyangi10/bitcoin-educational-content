question: Jaki jest według Rousseau cel ograniczania jednostek?
answer: Aby poprowadzić ich do wolności
wrong_answers:
  - Aby ich zniewolić
  - Aby były równe
  - Aby zjednoczyć ich w poddaństwie
explanation: |
  Rousseau wierzy, że przymus może prowadzić jednostki ku wolności, prowadząc je ku zbiorowemu ideałowi, do którego dążyłyby, gdyby były oświecone.

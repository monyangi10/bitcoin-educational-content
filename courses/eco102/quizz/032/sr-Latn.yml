question: Prema Rousseauu, cilj ograničavanja pojedinaca je očuvanje slobode i jednakosti unutar društva.
answer: Da ih vodiš ka slobodi
wrong_answers:
  - Da ih porobe
  - Da ih izjednačiš
  - Da ih ujedini u služenju
explanation: |
  Rousseau veruje da ograničenje može usmeriti pojedince ka slobodi, vodeći ih ka kolektivnom idealu koji bi sledili kada bi bili prosvetljeni.

question: Ni nde yanditse igitabu I, Pencil kandi ni nde yahinduye kandi igitabu ca Bastiat citwa The Law mu congereza?
answer: Leyonard Soma
wrong_answers:
  - Leyonari Nimoyi
  - Leyonard Koheni
  - Militoni Fridimani
explanation: |
  Leonard Read azwi cane mu guhindura igitabu ca Bastiat citwa The Law mu congereza no mu gutuma abantu benshi bamenya igitabu ciwe biciye mu kigo kijejwe uburezi bw’ubutunzi.

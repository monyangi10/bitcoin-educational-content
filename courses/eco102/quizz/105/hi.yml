question: "I, Pencil" के लेखक कौन हैं और जिन्होंने बास्टिएट की "द लॉ" का अंग्रेजी में अनुवाद भी किया?
answer: लियोनार्ड रीड
wrong_answers:
  - लियोनार्ड निमॉय
  - लियोनार्ड कोहेन
  - मिल्टन फ्रीडमैन
explanation: |
  लियोनार्ड रीड बास्टियाट की किताब "द लॉ" को अंग्रेजी में अनुवाद करने और फाउंडेशन फॉर इकोनॉमिक एजुकेशन के जरिए उनके काम को लोकप्रिय बनाने के लिए जाने जाते हैं।
reviewed: false
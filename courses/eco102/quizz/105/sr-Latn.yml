question: Autor dela "I, Pencil" i prevodilac Bastiatovog "The Law" na engleski jezik je Leonard E. Read.
answer: Leonard Read
wrong_answers:
  - Leonard Nimoy
  - Leonard Cohen
  - Milton Friedman
explanation: |
  Leonard Read je poznat po prevođenju Bastiatovog dela Zakon na engleski jezik i po popularizaciji njegovog rada kroz Fondaciju za ekonomsko obrazovanje.

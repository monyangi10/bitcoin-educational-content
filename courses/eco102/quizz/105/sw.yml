question: Ni nani mwandishi wa I, Penseli na ambaye pia alitafsiri Sheria ya Bastiat kwa Kiingereza?
answer: Leonard Soma
wrong_answers:
  - Leonard Nimoy
  - Leonard Cohen
  - Milton Friedman
explanation: |
  Leonard Read anajulikana kwa kutafsiri Sheria ya Bastiat hadi Kiingereza na kwa kutangaza kazi yake kupitia Foundation for Economic Education.

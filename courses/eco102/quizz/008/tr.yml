question: Frédéric Bastiat Ulusal Meclis'te nerede oturuyordu?
answer: Alexis de Tocqueville ile merkez solda
wrong_answers:
  - Sosyalistlerle birlikte solda
  - Monarşistlerle birlikte sağda
  - Muhafazakar liberaller ile merkez sağda
explanation: |
  Bastiat, Tocqueville ile birlikte merkez solda yer almış ve bireysel özgürlükleri savunmuştur.

question: फ्रेडरिक बास्तिया नेशनल असेंबली में कहाँ बैठते थे?
answer: बाएं-केंद्र में एलेक्सिस डी टोकविल के साथ
wrong_answers:
  - बाईं ओर समाजवादियों के साथ
  - दाईं ओर राजतंत्रवादियों के साथ
  - दक्षिणपंथी केंद्र में रूढ़िवादी उदारवादियों के साथ
explanation: |
  बस्तिया केंद्र-वाम में टॉकविल के साथ बैठे थे, जहाँ उन्होंने व्यक्तिगत स्वतंत्रताओं का बचाव किया।
reviewed: false
question: Waar zat Frédéric Bastiat in de Nationale Assemblee?
answer: In het centrum-links met Alexis de Tocqueville
wrong_answers:
  - Links met de socialisten
  - Rechts met de monarchisten
  - In het centrum-rechts met de conservatieve liberalen
explanation: |
  Bastiat zat in het centrum-links met Tocqueville, waar hij de individuele vrijheden verdedigde.
reviewed: false
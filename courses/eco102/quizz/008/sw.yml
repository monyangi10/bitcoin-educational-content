question: Frédéric Bastiat aliketi wapi katika Bunge la Kitaifa?
answer: Katikati-kushoto na Alexis de Tocqueville
wrong_answers:
  - Upande wa kushoto na wanajamii
  - Upande wa kulia na wafalme
  - Katikati-kulia na huria wa kihafidhina
explanation: |
  Bastiat alikaa katikati-kushoto na Tocqueville, ambapo alitetea uhuru wa mtu binafsi.

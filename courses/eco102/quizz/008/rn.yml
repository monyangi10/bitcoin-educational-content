question: None Frédéric Bastiat yari yicaye hehe mu Nteko Nkuru y’Igihugu?
answer: Hagati ibubamfu hari kumwe na Aleksisi de Tokevili
wrong_answers:
  - Ibubamfu n'abasosiyalisiti .
  - Iburyo n'abanyagihugu b'umwami .
  - Mu ruhande rw'iburyo hagati n'abanyagihugu b'abanyagihugu
explanation: |
  Bastiat yari yicaye hagati ibubamfu na Tocqueville, aho yaburanira umwidegemvyo w’umuntu ku giti ciwe.

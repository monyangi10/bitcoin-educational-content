question: Gdzie w Zgromadzeniu Narodowym zasiadał Frédéric Bastiat?
answer: W centrolewicy z Alexisem de Tocqueville'em
wrong_answers:
  - Na lewicy z socjalistami
  - Na prawicy z monarchistami
  - W centroprawicy z konserwatywnymi liberałami
explanation: |
  Bastiat zasiadał w centrolewicy wraz z Tocqueville'em, gdzie bronił indywidualnych wolności.
reviewed: false
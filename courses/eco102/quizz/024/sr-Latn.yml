question: Koje je, prema Comteu i Dunoyeru, rešenje sukoba između klasa?
answer: Sprečiti državu da distribuira i kontroliše imovinu
wrong_answers:
  - Eliminiši čas
  - Distribuirati resurse jednako
  - Promovi klasičnu borbu
explanation: |
  Veruju da je jedini način da se smanji eksploatacija ograničavanje moći države da distribuira i kontroliše imovinu.

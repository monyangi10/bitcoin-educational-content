question: Comte ve Dunoyer'e göre sınıflar arasındaki çatışmanın çözümü nedir?
answer: Devletin mülkiyeti dağıtmasını ve kontrol etmesini engellemek
wrong_answers:
  - Bir sınıfı ortadan kaldırın
  - Kaynakları eşit dağıtın
  - Sınıf mücadelesini teşvik etmek
explanation: |
  Sömürüyü azaltmanın tek yolunun, devletin mülkiyeti dağıtma ve kontrol etme gücünü sınırlamak olduğuna inanmaktadırlar.

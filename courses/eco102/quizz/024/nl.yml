question: Wat is volgens Comte en Dunoyer de oplossing voor het conflict tussen klassen?
answer: Voorkomen dat de staat eigendom verdeelt en controleert
wrong_answers:
  - Een klas elimineren
  - Middelen gelijk verdelen
  - De klassenstrijd bevorderen
explanation: |
  Zij geloven dat de enige manier om uitbuiting te verminderen het beperken van de macht van de staat is om bezit te verdelen en te controleren.
reviewed: false
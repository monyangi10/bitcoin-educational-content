question: Wat is de belangrijkste beperking van staatsinterventie volgens Bastiat?
answer: Degenen die publieke beslissingen nemen, zijn niet degenen die de gevolgen ervan ondervinden
wrong_answers:
  - Degenen die publieke beslissingen nemen, houden te veel van geld
  - Degenen die publieke beslissingen nemen zijn niet slim genoeg
  - Het ontbreekt degenen die openbare besluiten nemen aan moed
explanation: |
  Bastiat bekritiseert staatsinterventie door te benadrukken dat publieke besluitvormers niet lijden onder de gevolgen van hun eigen beslissingen, wat leidt tot onverantwoorde keuzes.
reviewed: false
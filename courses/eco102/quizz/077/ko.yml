question: 바스티아트에 따르면 국가 개입의 주요 한계는 무엇인가요?
answer: 공적인 결정을 내리는 사람은 그 결과로 고통받는 사람이 아닙니다
wrong_answers:
  - 공적인 결정을 내리는 사람들은 돈을 너무 사랑합니다
  - 공적인 결정을 내리는 사람들은 충분히 똑똑하지 않습니다
  - 공적인 결정을 내리는 사람들은 용기가 부족합니다
explanation: |
  바스티아는 공공 의사결정권자가 자신의 결정으로 인해 무책임한 선택을 하게 되는 결과를 초래한다는 점을 강조하며 국가의 개입을 비판합니다.
reviewed: false
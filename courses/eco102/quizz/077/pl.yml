question: Jakie jest główne ograniczenie interwencji państwa według Bastiata?
answer: To nie ci, którzy podejmują publiczne decyzje, ponoszą ich konsekwencje
wrong_answers:
  - Ci, którzy podejmują decyzje publiczne, za bardzo kochają pieniądze
  - Ci, którzy podejmują decyzje publiczne, nie są wystarczająco mądrzy
  - Tym, którzy podejmują decyzje publiczne, brakuje odwagi
explanation: |
  Bastiat krytykuje interwencję państwa, podkreślając, że decydenci publiczni nie ponoszą konsekwencji swoich własnych decyzji, co prowadzi do nieodpowiedzialnych wyborów.

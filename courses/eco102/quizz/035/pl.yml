question: Na jakim błędnym założeniu opierają się studia klasyczne według Bastiata?
answer: Idea wszechmocy prawodawcy
wrong_answers:
  - Platońska teoria idei
  - Idea ostatecznej przyczyny
  - Koncepcja społeczeństwa organicznego
explanation: |
  Bastiat krytykuje klasyczną edukację za jej nacisk na ideę, że prawodawca jest wszechmocny i musi kształtować społeczeństwo, co jest sprzeczne z jego zasadami wolności jednostki.
reviewed: false
question: Na kojoj zabludi prema Bastijatu počivaju klasične studije?
answer: Ideja o svemoći zakonodavca
wrong_answers:
  - Platonova teorija ideja
  - Ideja konačnog uzroka
  - Koncept organskog društva
explanation: |
  Bastiat kritikuje klasično obrazovanje zbog njegovog naglaska na ideji da je zakonodavac svemoćan i da mora oblikovati društvo, što je stav suprotan njegovim principima individualne slobode.
reviewed: false
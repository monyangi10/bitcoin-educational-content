question: Wat betekent de term politieke markt voor Frédéric Bastiat?
answer: Wettelijk beschikken over andermans eigendom
wrong_answers:
  - Gaan winkelen
  - Voorverkiezingen winnen
  - Openbare diensten kopen
explanation: |
  Voor Bastiat verwijst de politieke markt naar de neiging van de staat om via wetgeving te beschikken over andermans eigendom, een fenomeen dat hij bekritiseert als legale plundering.
question: Co oznacza termin rynek polityczny dla Frédérica Bastiata?
answer: Dysponowanie cudzą własnością zgodnie z prawem
wrong_answers:
  - Na zakupy
  - Zwycięstwo w prawyborach
  - Kupowanie usług publicznych
explanation: |
  Dla Bastiata rynek polityczny odnosi się do tendencji państwa do dysponowania cudzą własnością za pomocą środków legislacyjnych, co Bastiat krytykuje jako legalną grabież.
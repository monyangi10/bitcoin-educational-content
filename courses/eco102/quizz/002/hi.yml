question: फ्रेडरिक बास्टिए के लिए "राजनीतिक बाजार" शब्द का क्या मतलब है?
answer: कानून के तहत किसी और की संपत्ति का निपटान करना
wrong_answers:
  - खरीदारी करने जा रहा हूँ
  - प्राइमरी जीतना
  - सरकारी सेवाएँ खरीदना
explanation: |
  बास्तियत के लिए राजनीतिक बाज़ार का मतलब है राज्य का दूसरों की संपत्ति को कानूनी तरीकों से हड़पने की प्रवृत्ति, जिसे वह कानूनी लूट के रूप में आलोचना करते हैं।
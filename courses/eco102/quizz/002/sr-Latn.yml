question: Šta termin političko tržište znači za Frédérica Bastiata?
answer: Da zakonski raspolažete tuđom imovinom
wrong_answers:
  - Odlazak u kupovinu
  - Pobedničke primarne izbore
  - Kupovina javnih usluga
explanation: |
  Političko tržište za Bastijata odnosi se na sklonost države da raspolaže tuđom imovinom putem zakonodavnih sredstava, fenomen koji on kritikuje kao legalnu pljačku.
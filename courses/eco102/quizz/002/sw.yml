question: Je, neno soko la kisiasa linamaanisha nini kwa Frédéric Bastiat?
answer: Kutoa mali ya mtu mwingine kwa sheria
wrong_answers:
  - Kwenda kufanya ununuzi
  - Kushinda kura za mchujo
  - Kununua huduma za umma
explanation: |
  Soko la kisiasa la Bastiat linarejelea tabia ya serikali ya kuondoa mali ya wengine kupitia njia za kisheria, jambo ambalo analikosoa kama uporaji wa kisheria.

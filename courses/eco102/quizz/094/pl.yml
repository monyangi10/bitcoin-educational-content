question: Jaką rolę powinno odgrywać prawo w odniesieniu do prawa własności dla Bastiata?
answer: Zapewnienie ochrony praw własności, a nie ich tworzenie
wrong_answers:
  - Ustalenie granic prawa własności zgodnie z wolą ogółu
  - Redystrybucja zasobów w celu zapewnienia równości wśród obywateli
  - Ochrona własności przy jednoczesnym regulowaniu jej użytkowania zgodnie z dobrem wspólnym
explanation: |
  Bastiat postrzega prawo jako środek obrony prawa własności, które uważa za prawo naturalne, poprzedzające wszelkie przepisy.
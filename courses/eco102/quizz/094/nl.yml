question: Welke rol zou de wet volgens Bastiat moeten hebben met betrekking tot het recht op eigendom?
answer: Om de bescherming van eigendomsrechten te garanderen en niet om ze te creëren
wrong_answers:
  - De grenzen van eigendomsrechten vaststellen volgens de algemene wil
  - Middelen herverdelen om gelijkheid tussen burgers te garanderen
  - Eigendom beschermen en tegelijkertijd het gebruik ervan reguleren in overeenstemming met het algemeen belang
explanation: |
  Bastiat ziet de wet als een middel om het recht op eigendom te verdedigen, dat hij beschouwt als een natuurlijk recht dat voorafgaat aan elke wetgeving.
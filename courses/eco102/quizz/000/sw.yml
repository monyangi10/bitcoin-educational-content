question: Ni kitabu kipi cha Frédéric Bastiat ambacho Ronald Reagan alikipenda zaidi?
answer: Sheria
wrong_answers:
  - Masomo ya Kiuchumi
  - Kinachoonekana na Kisichoonekana
  - Maelewano ya Kiuchumi
explanation: |
  Sheria ni kazi ya Bastiat ambayo iliathiri sana Ronald Reagan, ikiashiria mapambano dhidi ya uporaji wa kisheria.

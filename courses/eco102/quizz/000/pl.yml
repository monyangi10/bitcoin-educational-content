question: Która książka Frédérica Bastiata była ulubioną książką Ronalda Reagana?
answer: Prawo
wrong_answers:
  - Sofizmaty ekonomiczne
  - To, co widoczne i to, czego nie widać
  - Harmonia gospodarcza
explanation: |
  Prawo to dzieło Bastiata, które wywarło głęboki wpływ na Ronalda Reagana, symbolizując walkę z legalną grabieżą.
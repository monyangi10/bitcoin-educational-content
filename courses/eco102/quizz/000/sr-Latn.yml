question: Koja je omiljena knjiga Ronalda Reagana od autora Frédérica Bastiata?
answer: Zakon
wrong_answers:
  - Ekonomske Sofizme
  - Ono što se vidi i ono što se ne vidi
  - Ekonomske harmonije
explanation: |
  Zakon je delo od Bastijata koje je duboko uticalo na Ronalda Regana, simbolizujući borbu protiv legalne pljačke.
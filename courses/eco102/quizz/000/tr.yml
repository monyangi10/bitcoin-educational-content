question: Ronald Reagan'ın en sevdiği kitap Frédéric Bastiat'nın hangi kitabıdır?
answer: Kanun
wrong_answers:
  - Ekonomik Safsatalar
  - Görülen ve Görülmeyen
  - Ekonomik Uyumlar
explanation: |
  Kanun, Bastiat'nın Ronald Reagan'ı derinden etkileyen ve yasal yağmaya karşı mücadeleyi simgeleyen eseridir.
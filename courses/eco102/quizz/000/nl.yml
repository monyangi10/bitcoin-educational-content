question: Welk boek van Frédéric Bastiat was het favoriete boek van Ronald Reagan?
answer: De Wet
wrong_answers:
  - Economische drogredenen
  - Dat wat gezien wordt en Dat wat niet gezien wordt
  - Economische harmonieën
explanation: |
  The Law is het werk van Bastiat dat Ronald Reagan diep beïnvloedde en symbool stond voor de strijd tegen wettelijke plundering.
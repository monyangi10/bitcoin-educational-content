question: बास्तियात ने अपने पत्र में कोबडेन को सामाजिक अशांति का मुख्य कारण क्या बताया?
answer: जनता की आर्थिक अनभिज्ञता
wrong_answers:
  - धनी वर्गों पर कम कराधान
  - प्रमुख उद्योगों का उदय
  - सामाजिक सुधारों की धीमी गति
explanation: |
  बस्तियत सामाजिक अशांति को आर्थिक अज्ञानता का नतीजा मानते हैं, जिसकी वजह से आबादी समाजवाद के काल्पनिक विचारों के आगे कमजोर पड़ जाती है।
reviewed: false
question: Jaka jest główna przyczyna niepokojów społecznych zidentyfikowana przez Bastiata w jego liście do Cobdena?
answer: Ekonomiczna ignorancja społeczeństwa
wrong_answers:
  - Niskie opodatkowanie klas zamożnych
  - Rozwój głównych gałęzi przemysłu
  - Powolność reform społecznych
explanation: |
  Bastiat przypisuje niepokoje społeczne ignorancji ekonomicznej, czyniąc ludność podatną na utopijne idee socjalizmu.

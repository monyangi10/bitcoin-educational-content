question: Bastiat'nın Cobden'a yazdığı mektupta tanımladığı toplumsal huzursuzluğun başlıca nedeni nedir?
answer: Halkın ekonomik cehaleti
wrong_answers:
  - Zengin sınıfların düşük vergilendirilmesi
  - Büyük endüstrilerin yükselişi
  - Sosyal reformların yavaşlığı
explanation: |
  Bastiat, toplumsal huzursuzluğu ekonomik cehalete bağlamakta ve halkı sosyalizmin ütopik fikirlerine karşı savunmasız hale getirmektedir.

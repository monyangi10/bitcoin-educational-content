question: Ni ipi sababu kuu ya machafuko ya kijamii iliyotambuliwa na Bastiat katika barua yake kwa Cobden?
answer: Ujinga wa kiuchumi wa umma
wrong_answers:
  - Ushuru mdogo wa tabaka la matajiri
  - Kuongezeka kwa viwanda vikubwa
  - Ucheleweshaji wa mageuzi ya kijamii
explanation: |
  Bastiat anahusisha machafuko ya kijamii na ujinga wa kiuchumi, na kufanya idadi ya watu kuwa katika hatari ya mawazo ya utopia ya ujamaa.
reviewed: false

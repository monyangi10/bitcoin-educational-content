question: Henri Hazlitt ने Bastiat के टूटे हुए खिड़की वाले उदाहरण को अपनी किस प्रसिद्ध आर्थिक कृति में दोबारा दिखाया है?
answer: "एक पाठ में अर्थशास्त्र"
wrong_answers:
  - 49 अर्थशास्त्र के सबक
  - फ्रीकॉनॉमिक्स
  - अर्थशास्त्र की कला
explanation: |
  हेनरी हेज़लिट ने "इकॉनॉमिक्स इन वन लेसन" में आर्थिक नीतियों के छुपे हुए परिणामों को समझाने के लिए टूटी हुई खिड़की वाला उदाहरण इस्तेमाल किया है।
reviewed: false
question: Ni mu gitabu ikihe c’ubutunzi gikundwa cane Henri Hazlitt asubiramwo akarorero k’idirisha ryamenetse rya Bastiat?
answer: Ubutunzi mu cigwa kimwe
wrong_answers:
  - 49 Ivyigwa mu vy'ubutunzi
  - Ubutunzi budasanzwe
  - Ubuhinga bw'ubutunzi
explanation: |
  Henri Hazlitt, mu gitabu ciwe citwa Economics in Lesson One, akoresha akarorero k’idirisha ryavunitse kugira ngo yerekane ingaruka zihishijwe z’ingingo mfatirwako z’ubutunzi.

question: U kojoj popularnoj ekonomskoj knjizi Henri Hazlitt ponovo razmatra Bastiatov primer razbijenog prozora?
answer: Ekonomija u Jednoj Lekciji
wrong_answers:
  - 49 Lekcija iz Ekonomije
  - Freakonomics
  - Umetnost ekonomije
explanation: |
  Henri Hazlitt, u Ekonomiji u jednoj lekciji, koristi primer razbijenog prozora da ilustruje skrivene posledice ekonomskih politika.

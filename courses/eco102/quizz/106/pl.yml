question: W którym popularnym dziele ekonomicznym Henri Hazlitt powraca do przykładu rozbitego okna Bastiata?
answer: Ekonomia w jednej lekcji
wrong_answers:
  - 49 lekcji ekonomii
  - Freakonomics
  - Sztuka ekonomii
explanation: |
  Henri Hazlitt, w książce "Ekonomia w jednej lekcji", używa przykładu rozbitego okna, aby zilustrować ukryte konsekwencje polityki gospodarczej.

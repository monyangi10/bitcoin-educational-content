question: Jakie funkcje powinno spełniać państwo według Bastiata?
answer: Bezpieczeństwo wewnętrzne, bezpieczeństwo zewnętrzne i wymiar sprawiedliwości
wrong_answers:
  - Regulacja, redystrybucja i sprawiedliwość
  - Bezpieczeństwo, sprawiedliwość i równość
  - Edukacja, zdrowie i sprawiedliwość
explanation: |
  Bastiat opowiada się za ograniczoną rolą państwa do funkcji bezpieczeństwa wewnętrznego i zewnętrznego oraz wymiaru sprawiedliwości, w celu ochrony naturalnych praw jednostek.
reviewed: false
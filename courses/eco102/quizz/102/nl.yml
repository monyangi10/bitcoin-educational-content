question: Welke functies zou de staat volgens Bastiat moeten vervullen?
answer: Interne veiligheid, externe veiligheid en justitie
wrong_answers:
  - Regulering, herverdeling en rechtvaardigheid
  - Veiligheid, rechtvaardigheid en billijkheid
  - Onderwijs, gezondheid en justitie
explanation: |
  Bastiat pleit voor een beperkte rol van de staat tot de functies van interne en externe veiligheid en rechtvaardigheid, om de natuurlijke rechten van individuen te beschermen.
reviewed: false
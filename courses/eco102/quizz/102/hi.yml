question: बस्तिया के अनुसार राज्य को कौन-कौन से कार्य पूरे करने चाहिए?
answer: आंतरिक सुरक्षा, बाह्य सुरक्षा, और न्याय
wrong_answers:
  - नियमन, पुनर्वितरण, और न्याय
  - सुरक्षा, न्याय, और समानता
  - शिक्षा, स्वास्थ्य और न्याय
explanation: |
  बास्टियेट राज्य की भूमिका को सीमित रखने की वकालत करते हैं, जिसमें आंतरिक और बाहरी सुरक्षा तथा न्याय के कार्य शामिल हैं, ताकि व्यक्तियों के प्राकृतिक अधिकारों की रक्षा की जा सके।

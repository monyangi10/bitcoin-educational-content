question: Je, Serikali inapaswa kutimiza majukumu yapi kwa mujibu wa Bastiat?
answer: Usalama wa ndani, usalama wa nje na haki
wrong_answers:
  - Udhibiti, ugawaji upya, na haki
  - Usalama, haki na usawa
  - Elimu, afya na haki
explanation: |
  Bastiat inatetea nafasi ndogo ya Serikali kwa kazi za usalama wa ndani na nje na haki, kulinda haki za asili za watu binafsi.
reviewed: false

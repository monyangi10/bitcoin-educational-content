question: बस्तिया के अनुसार, राज्य का गुज़ारा कौन चलाता है?
answer: यह नागरिक ही हैं जो राज्य को बनाए रखते हैं।
wrong_answers:
  - ये वो नागरिक हैं जो सरकार पर पलते हैं।
  - यह राज्य ही है जो राष्ट्र को बनाए रखता है
  - ये इंटरेस्ट ग्रुप्स ही हैं जो राज्य को बनाए रखते हैं
explanation: |
  बास्तियात का दावा है कि यह नागरिक ही धन सृजन के जरिए राज्य का समर्थन करते हैं, न कि इसका उल्टा।

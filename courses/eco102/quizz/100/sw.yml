question: Kulingana na Bastiat, ni nani anayeendesha maisha ya serikali?
answer: Ni wananchi wanaoendeleza serikali
wrong_answers:
  - Ni wananchi wanaoishi nje ya jimbo
  - Ni serikali inayodumisha taifa
  - Ni vikundi vya masilahi vinavyoendeleza serikali
explanation: |
  Bastiat anadai kuwa ni wananchi wanaounga mkono serikali kupitia uzalishaji mali na si vinginevyo.
reviewed: false

question: Welk economisch concept benadrukt Bastiat in zijn analyse van de kosten van vernietiging?
answer: Opportuniteitskosten
wrong_answers:
  - Marginale kosten
  - Marginale productiviteit
  - Productiekosten
explanation: |
  Bastiat benadrukt het belang van opportuniteitskosten en illustreert dat middelen die gebruikt worden om vernielingen te herstellen gebruikt hadden kunnen worden om elders rijkdom te creëren.
reviewed: false
question: बस्तिया अपने विश्लेषण में विनाश की कीमत पर किस आर्थिक अवधारणा पर प्रकाश डालते हैं?
answer: मौका खोने का खर्च (Opportunity Cost)
wrong_answers:
  - सीमांत लागत (Marginal Cost)
  - सीमांत उत्पादकता
  - उत्पादन लागत
explanation: |
  बास्टियाट अवसर लागत के महत्व पर जोर देता है, यह दिखाते हुए कि विनाश की मरम्मत में लगे संसाधन कहीं और धन बनाने में लग सकते थे।
reviewed: false
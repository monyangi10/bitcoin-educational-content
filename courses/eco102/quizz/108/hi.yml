question: बास्टियत ने किस आर्थिक भ्रम की आलोचना की, जो 20वीं सदी में फिर से उभरा?
answer: कि राज्य रोज़गार पैदा कर सकता है
wrong_answers:
  - कि बाज़ार को राज्य की ज़रूरत है
  - कि बाज़ार खुद को नियंत्रित कर सकता है
  - कि कंपनियां बिना नियमन के धन कमा सकती हैं
explanation: |
  बास्तिये ने इस विचार की आलोचना की कि राज्य करों के प्रभाव के बिना नौकरियाँ पैदा कर सकता है, जबकि इन नौकरियों को वित्तपोषित करने के लिए करों का असर अन्य नौकरियों को नुकसान पहुँचाता है।
reviewed: false
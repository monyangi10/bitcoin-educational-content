question: Ko se smatra nepoštenim konkurentom proizvođača sveća u ovoj priči?
answer: Sunce
wrong_answers:
  - Strani proizvođači sveća
  - Električna energija
  - Uljane lampe
explanation: |
  U svojoj satiri, Bastiat se odnosi na sunce kao na nepoštenog konkurenta, ističući apsurdnost protekcionističkih mera preuveličavanjem zahteva proizvođača sveća.

question: इस कहानी में मोमबत्ती बनाने वालों का कौन अनफेयर कॉम्पीटीटर माना जाता है?
answer: सूरज
wrong_answers:
  - विदेशी मोमबत्ती बनाने वाले
  - बिजली
  - दीया
explanation: |
  अपने व्यंग्य में, बास्टियाट सूरज को एक अनुचित प्रतिस्पर्धी कहते हैं, जो मोमबत्ता बनाने वालों की मांगों को बढ़ा-चढ़ाकर पेश करके संरक्षणवादी उपायों की बेतुकता को उजागर करते हैं।
reviewed: false
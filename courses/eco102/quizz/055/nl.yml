question: Wie wordt in dit verhaal beschouwd als de oneerlijke concurrent van de kaarsenmakers?
answer: De zon
wrong_answers:
  - Buitenlandse kaarsenmakers
  - Elektriciteit
  - Olielampen
explanation: |
  In zijn satire verwijst Bastiat naar de zon als de oneerlijke concurrent en benadrukt hij de absurditeit van protectionistische maatregelen door de eisen van kaarsenmakers te overdrijven.
reviewed: false
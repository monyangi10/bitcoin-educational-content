question: रोमन लोगों के अनुसार लैटिन में संपत्ति की परिभाषा क्या थी?
answer: इस्तेमाल करने और दुरुपयोग करने का अधिकार
wrong_answers:
  - "विशेष कानून, सामान्य कानून को रद्द कर देता है"
  - सार्वजनिक हित निजी समझौतों से ऊपर होना चाहिए।
  - सार्वजनिक और निजी को अलग रखना चाहिए
explanation: |
  रोमन कानून में, जस यूटेंडी एट अब्यूटेंडी (jus utendi et abutendi) संपत्ति को इस्तेमाल करने और दुरुपयोग करने के अधिकार के रूप में परिभाषित करता है, जो इसके कारणों में गए बिना सिर्फ इस्तेमाल पर ज़ोर देता है।
reviewed: false
question: कॉम्टे और डुनोयर के अनुसार मानव इतिहास की कुंजी क्या है?
answer: लूट
wrong_answers:
  - मजदूर वर्ग
  - धर्म
  - रईस लोग
explanation: |
  कॉम्टे और डुनोयर लूट को, जिसका मतलब हिंसा और शोषण है, मानव इतिहास की प्रेरक शक्ति के रूप में देखते हैं, जो वर्गों के बीच संबंधों को प्रभावित करती है।
reviewed: false
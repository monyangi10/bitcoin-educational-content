question: Wat is de sleutel tot de menselijke geschiedenis volgens Comte en Dunoyer?
answer: Plunderen
wrong_answers:
  - Het proletariaat
  - Religie
  - De adel
explanation: |
  Comte en Dunoyer zien plundering, dat wil zeggen geweld en uitbuiting, als de drijvende kracht achter de menselijke geschiedenis, die de relaties tussen klassen beïnvloedt.

question: Šta je ključ ljudske istorije prema Comteu i Dunoyeru?
answer: Pljačka
wrong_answers:
  - Proleterijat
  - Religija
  - Plemićstvo
explanation: |
  Comte i Dunoyer vide pljačku, što znači nasilje i eksploataciju, kao pokretačku snagu ljudske istorije, koja utiče na odnose između klasa.

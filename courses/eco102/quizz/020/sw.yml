question: Ni upi ufunguo wa historia ya mwanadamu kulingana na Comte na Dunoyer?
answer: Uporaji
wrong_answers:
  - Baraza la babakabwela
  - Dini
  - Mtukufu huyo
explanation: |
  Comte na Dunoyer wanaona uporaji, kumaanisha vurugu na unyonyaji, kama kichocheo cha historia ya binadamu, kinachoathiri uhusiano kati ya tabaka.
reviewed: false

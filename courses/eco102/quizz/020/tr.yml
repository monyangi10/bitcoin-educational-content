question: Comte ve Dunoyer'e göre insanlık tarihinin anahtarı nedir?
answer: Yağma
wrong_answers:
  - Proletarya
  - Din
  - Soylular
explanation: |
  Comte ve Dunoyer, şiddet ve sömürü anlamına gelen talanı, insanlık tarihinin itici gücü olarak görür ve sınıflar arasındaki ilişkileri etkiler.

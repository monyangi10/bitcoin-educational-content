question: Ni gute uburenganzira umuntu afise ku kintu bushobora guhura n’uburenganzira bw’uwundi bwo kuronka ikintu?
answer: Kuko bisaba gukura ku muntu umwe kugira ngo uwundi abihe uwundi, gutyo bigatuma haba amakimbirane y’uburenganzira.
wrong_answers:
  - Kuko iyo umuntu aronse uburenganzira bwabo, ashobora kuremesha abandi ngo na bo babigire.
  - Kuko umuntu ashobora gutera amatati iyo ataronse ivyo ashaka.
  - Kuko ubwo burenganzira bujanye n’uburenganzira bw’ishimikiro gusa atari ivy’umubiri.
explanation: |
  Bastiat ashimika ku vy’uko uburenganzira bwo gusaba ko umuntu afata ubutunzi ku bandi, ivyo bikaba bigira ingaruka zitaziguye ku burenganzira bw’umutungo.
question: Kako pravo na nešto za jednu osobu može doći u sukob sa pravima vlasništva druge osobe?
answer: Zato što zahteva uzimanje od jedne osobe da bi se dalo drugoj, čime se stvara sukob prava.
wrong_answers:
  - Jer primanjem svog prava, osoba može podstaći druge da učine isto.
  - Zato što osoba može izazvati sukob ako ne dobije ono što želi.
  - Jer se ova prava tiču samo osnovnih prava, a ne materijalnih dobara.
explanation: |
  Bastiat ističe da prava na nužnost uzimanja resursa od drugih direktno utiču na prava vlasništva.
question: Waarom beschouwden de Romeinen eigendom als puur conventioneel?
answer: Omdat ze slaven hadden
wrong_answers:
  - Omdat ze legalistisch waren
  - Omdat ze het land bewerkten
  - Omdat ze prioriteit gaven aan sociale hiërarchie
explanation: |
  De Romeinen, die in een slavenmaatschappij leefden, zagen eigendom als een juridische constructie, omdat hun fundamenten waren gebaseerd op het plunderen en uitbuiten van anderen.

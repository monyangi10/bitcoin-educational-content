question: Zašto su Rimljani smatrali da je vlasništvo isključivo konvencionalno?
answer: Zato što su imali robove
wrong_answers:
  - Zato što su bili legalistički
  - Zato što su obrađivali zemlju
  - Zato što su davali prednost društvenoj hijerarhiji
explanation: |
  Rimljani, koji su živeli u društvu koje je posedovalo robove, posmatrali su imovinu kao pravni konstrukt, jer su njihovi temelji bili zasnovani na pljački i eksploataciji drugih.
reviewed: false
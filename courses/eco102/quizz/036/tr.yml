question: Romalılar neden mülkiyetin tamamen geleneksel olduğunu düşünüyorlardı?
answer: Çünkü köleleri vardı
wrong_answers:
  - Çünkü onlar yasalara bağlıydılar
  - Çünkü toprağı işlediler
  - Çünkü sosyal hiyerarşiye öncelik veriyorlardı
explanation: |
  Köle sahibi bir toplumda yaşayan Romalılar, temelleri başkalarının yağmalanması ve sömürülmesine dayandığı için mülkiyeti yasal bir yapı olarak görüyorlardı.
reviewed: false
question: Czy według Bastiata odpowiedzialność jest zasadą...? ?
answer: doskonałość
wrong_answers:
  - doskonałość
  - stałość
  - doskonałe osiągnięcie
explanation: |
  Bastiat postrzega odpowiedzialność jako zasadę doskonałości, co oznacza, że jest ona źródłem poprawy i osobistego postępu poprzez lekcje płynące z doświadczenia.
reviewed: false
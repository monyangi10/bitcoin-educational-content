question: बस्तिया के अनुसार, क्या जिम्मेदारी एक सिद्धांत है...?
answer: "संपूर्णता की प्राप्ति" या "बेहतरी की क्षमता"
wrong_answers:
  - बिल्कुल सही / एकदम परफेक्ट
  - "निरंतरता" (Nirantarta)  

या  

"स्थिरता" (Sthirta)  

(यह शब्द किसी चीज़ की लगातार बने रहने या बदलाव न होने की स्थिति को दर्शाता है।)
  - बिल्कुल सही उपलब्धि
explanation: |
  बास्तियत जिम्मेदारी को एक पूर्णता के सिद्धांत के रूप में देखते हैं, यानी यह अनुभव के सबक के जरिए सुधार और व्यक्तिगत प्रगति का स्रोत है।
reviewed: false
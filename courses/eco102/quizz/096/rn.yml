question: Ni igiki kiranga ubutungane bubi nk’uko Bastiat abivuga?
answer: Bibuza uburenganzira bwa bamwe gufatwa n’abandi.
wrong_answers:
  - Ntaco akora kandi areka amatati agatorera umuti ubwayo.
  - Bibi ku burenganzira bw’impande zompi.
  - Bituma haba ukudahuza hagati y’uburenganzira bw’umuntu ku giti ciwe n’ubw’abantu bose.
explanation: |
  Ubutungane butari bwiza, nk’uko Bastiat abivuga, bushingiye ku kubuza abantu kwigarurira uburenganzira, gutyo bukagarukira ku kurinda uburenganzira bwa kavukire ata bikorwa vyiza butegeka abantu ku giti cabo.

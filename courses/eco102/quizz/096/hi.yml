question: बास्तियत के अनुसार नकारात्मक न्याय की क्या विशेषता है?
answer: कुछ लोगों के अधिकारों को दूसरों द्वारा हड़पने से रोकता है।
wrong_answers:
  - कुछ नहीं करता और झगड़ों को अपने आप सुलझने देता है।
  - दोनों पक्षों के अधिकारों के लिए बुरा।
  - व्यक्तिगत और सामूहिक अधिकारों के बीच असंतुलन पैदा करता है।
explanation: |
  बास्टियत के अनुसार, नकारात्मक न्याय का मतलब है अधिकारों के हनन को रोकना, यानी यह सिर्फ प्राकृतिक अधिकारों की रक्षा करने तक सीमित रहता है और व्यक्तियों पर सकारात्मक कार्य थोपता नहीं है।
reviewed: false
question: Koja je glavna inovacija koju su uveli moderni ekonomisti prema Bastijatu?
answer: Oni žele da obnove sposobnost pojedinca za delovanje
wrong_answers:
  - Oni žele da obogate državu
  - Oni žele da uravnoteže trgovinski bilans
  - Oni žele da regulišu tržište
explanation: |
  Moderni ekonomisti nastoje da povrate sposobnost pojedinca za delovanje i da promovišu ekonomsku slobodu.

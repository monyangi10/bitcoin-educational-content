question: बस्तियात के अनुसार आधुनिक अर्थशास्त्रियों द्वारा कौन सी प्रमुख नवाचार शुरू किया गया है?
answer: वे व्यक्ति की कार्य करने की क्षमता को फिर से बहाल करना चाहते हैं
wrong_answers:
  - वे राज्य को समृद्ध करना चाहते हैं
  - वे व्यापार संतुलन को संतुलित करना चाहते हैं
  - वे बाजार को नियंत्रित करना चाहते हैं
explanation: |
  आधुनिक अर्थशास्त्री व्यक्ति की कार्रवाई करने की क्षमता को बहाल करना चाहते हैं और आर्थिक स्वतंत्रता को बढ़ावा देना चाहते हैं।
reviewed: false
question: Wat is volgens Bastiat de belangrijkste vernieuwing die moderne economen hebben geïntroduceerd?
answer: Ze willen de handelingsbekwaamheid van het individu herstellen
wrong_answers:
  - Ze willen de staat verrijken
  - Ze willen de handelsbalans in evenwicht brengen
  - Ze willen de markt reguleren
explanation: |
  Moderne economen proberen het handelingsvermogen van het individu te herstellen en economische vrijheid te bevorderen.
reviewed: false
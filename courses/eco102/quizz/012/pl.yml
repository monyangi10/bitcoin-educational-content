question: Jaka jest główna innowacja wprowadzona przez współczesnych ekonomistów według Bastiata?
answer: Chcą przywrócić jednostce zdolność do działania
wrong_answers:
  - Chcą wzbogacić państwo
  - Chcą zrównoważyć bilans handlowy
  - Chcą regulować rynek
explanation: |
  Współcześni ekonomiści starają się przywrócić jednostce zdolność do działania i promować wolność gospodarczą.
reviewed: false
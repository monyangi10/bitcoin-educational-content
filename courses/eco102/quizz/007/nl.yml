question: Welke revolutie maakte Frédéric Bastiat van dichtbij mee als afgevaardigde?
answer: De revolutie van 1848
wrong_answers:
  - De revolutie van 1830
  - De revolutie van 1871
  - De revolutie van 1789
explanation: |
  Bastiat was getuige van de revolutie van 1848, die de Tweede Republiek vestigde en leidde tot zijn verkiezing tot afgevaardigde.

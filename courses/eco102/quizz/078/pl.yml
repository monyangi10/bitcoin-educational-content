question: Jaka jest rola indywidualnej odpowiedzialności w postępie społecznym według Bastiata?
answer: Zachęca jednostki do ostrożności i przezorności
wrong_answers:
  - Zachęca do rywalizacji między jednostkami
  - Pozwala państwu podejmować decyzje dla dobra wszystkich
  - Ogranicza możliwości rozwoju osobistego
explanation: |
  Bastiat argumentuje, że indywidualna odpowiedzialność prowadzi do ostrożności i opatrzności, ponieważ każdy musi ponosić konsekwencje swoich działań, co zachęca do bardziej przemyślanego i odpowiedzialnego zachowania.

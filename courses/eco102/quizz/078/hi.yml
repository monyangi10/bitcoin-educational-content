question: बस्तियत के अनुसार, सामाजिक प्रगति में व्यक्तिगत जिम्मेदारी की क्या भूमिका है?
answer: यह लोगों को सावधान और मितव्ययी बनने के लिए प्रोत्साहित करता है।
wrong_answers:
  - यह लोगों के बीच प्रतिस्पर्धा को बढ़ावा देता है।
  - यह राज्य को सभी के भले के लिए फैसले लेने की अनुमति देता है
  - यह व्यक्तिगत विकास के लिए संभावनाओं को सीमित कर देता है
explanation: |
  बास्तियात का तर्क है कि व्यक्तिगत ज़िम्मेदारी सावधानी और दूरदर्शिता की ओर ले जाती है, क्योंकि हर किसी को अपने कार्यों के परिणाम भुगतने पड़ते हैं, जो अधिक विचारशील और ज़िम्मेदार व्यवहार को प्रोत्साहित करता है।
reviewed: false
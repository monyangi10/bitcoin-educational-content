question: Wat is de belangrijkste denkfout die Bastiat aan de kaak stelt in What Is Seen and What Is Not Seen?
answer: Vernietiging stimuleert de economie
wrong_answers:
  - Vernietiging is een ongeluk
  - Alleen glaszetters profiteren van kapotte ruiten
  - Ongelukken moeten worden vermeden
explanation: |
  Bastiat bekritiseert de misvatting dat vernietiging gunstige economische effecten zou hebben door de economie te stimuleren, en toont in plaats daarvan aan dat het resulteert in een netto verlies van rijkdom.
reviewed: false
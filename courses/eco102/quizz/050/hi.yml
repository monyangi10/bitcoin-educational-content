question: बस्तिया ने "व्हाट इज़ सीन एंड व्हाट इज़ नॉट सीन" में मुख्य रूप से किस भ्रांति की आलोचना की है?  

(या अगर अधिक बोलचाल की भाषा चाहिए:  
बस्तिया ने अपनी किताब में किस गलतफहमी को खास तौर पर गलत बताया है?)  

*संदर्भ:* फ्रेडरिक बस्तिया "दृष्टिगोचर और अदृष्ट" (1850) में "तात्कालिक परिणामों पर ध्यान देकर दीर्घकालिक असरों को नज़रअंदाज़ करने" वाली सोच को खारिज करते हैं। उनका मानना है कि अर्थव्यवस्था में हर नीति के सिर्फ वे ही प्रभाव नहीं होते जो साफ़ दिखते हैं (जैसे रोज़गार बढ़ाने के लिए सरकारी खर्च), बल्कि छुपे हुए नतीजे (जैसे टैक्स बढ़ने से निजी खर्च कम होना) भी होते हैं।
answer: विनाश अर्थव्यवस्था को उत्तेजित करता है
wrong_answers:
  - विनाश एक दुर्भाग्य है
  - टूटे हुए खिड़कियों से सिर्फ़ कांच का काम करने वाले फ़ायदा उठाते हैं।
  - हादसों से बचना चाहिए
explanation: |
  बास्टिए ने इस ग़लतफ़हमी की आलोचना की है कि विनाश से आर्थिक फ़ायदे होते हैं क्योंकि यह अर्थव्यवस्था को उत्तेजित करता है। उन्होंने दिखाया कि असल में इससे संपत्ति का शुद्ध नुकसान ही होता है।
reviewed: false
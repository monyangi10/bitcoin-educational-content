question: Jaki jest główny błąd potępiony przez Bastiata w What Is Seen and What Is Not Seen?
answer: Zniszczenie stymuluje gospodarkę
wrong_answers:
  - Zniszczenie jest nieszczęściem
  - Tylko szklarze korzystają na rozbitych oknach
  - Należy unikać wypadków
explanation: |
  Bastiat krytykuje błędne założenie, że destrukcja miałaby korzystne skutki ekonomiczne poprzez stymulowanie gospodarki, pokazując zamiast tego, że prowadzi ona do utraty bogactwa netto.
reviewed: false
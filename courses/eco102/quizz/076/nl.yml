question: Waar trekt het statisme volgens Bastiat individuen van af?
answer: De gevolgen van hun acties
wrong_answers:
  - Van hun families
  - Van de geneugten van vrij experimenteren
  - Van hun vrienden
explanation: |
  Voor Bastiat vermindert overmatige staatsinterventie de individuele verantwoordelijkheid door de directe gevolgen van de acties van individuen weg te nemen, waardoor onverantwoordelijkheid wordt bevorderd.

question: बास्तियात के अनुसार, स्टेटिज़्म व्यक्तियों से क्या छीन लेता है?
answer: उनके कामों का नतीजा
wrong_answers:
  - उनके परिवारों से
  - मुक्त प्रयोग के आनंद से
  - उनके दोस्तों से
explanation: |
  बास्तिया के लिए, अत्यधिक सरकारी हस्तक्षेप व्यक्तिगत ज़िम्मेदारी को कम कर देता है क्योंकि इससे लोगों के अपने कर्मों का सीधा परिणाम हट जाता है, और इस तरह यह लापरवाही को बढ़ावा देता है।
reviewed: false
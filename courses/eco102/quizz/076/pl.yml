question: Według Bastiata, od czego etatyzm odejmuje jednostki?
answer: Konsekwencje ich działań
wrong_answers:
  - Od ich rodzin
  - Z radości swobodnego eksperymentowania
  - Od ich przyjaciół
explanation: |
  Dla Bastiata nadmierna interwencja państwa zmniejsza indywidualną odpowiedzialność poprzez usunięcie bezpośrednich konsekwencji działań jednostek, promując w ten sposób nieodpowiedzialność.
reviewed: false
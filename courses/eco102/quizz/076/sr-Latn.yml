question: Prema Bastijatu, šta etatizam oduzima pojedincima?
answer: Posledice njihovih postupaka
wrong_answers:
  - Od njihovih porodica
  - Od radosti slobodnog eksperimentisanja
  - Od njihovih prijatelja
explanation: |
  Za Bastijata, prekomerna intervencija države smanjuje individualnu odgovornost uklanjanjem direktnih posledica postupaka pojedinaca, čime se podstiče neodgovornost.
reviewed: false
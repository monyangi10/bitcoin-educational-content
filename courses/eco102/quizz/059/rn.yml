question: Ni igiki Bastiat avuga biciye mu gitabu c’abahinguzi b’amabuye y’agaciro?
answer: Ubujuju bw'ingero z'uburinzi
wrong_answers:
  - Akamaro ko gufasha inganda zo mu karere
  - Ingaruka mbi z'uguhiganwa n'amahanga .
  - Ivy'uko bikenewe gutunganya ibiciro vy'umuco
explanation: |
  Biciye muri iyo satire, Bastiat aranegura uburinzi mu kubusunikira ku bintu bitagira ishingiro, yerekana ko izo ngingo zifasha mu buryo butabereye imice imwimwe kubera umuguzi.

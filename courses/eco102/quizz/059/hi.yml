question: बस्तिया "कैंडलमेकर्स पिटीशन" के जरिए क्या आरोप लगाते हैं?
answer: संरक्षणवादी उपायों की बेहूदगी
wrong_answers:
  - स्थानिक उद्योग को सब्सिडी देने का महत्व
  - विदेशी प्रतिस्पर्धा के हानिकारक प्रभाव
  - लाइट के दामों को नियंत्रित करने की ज़रूरत
explanation: |
  इस व्यंग्य के जरिए, बास्तियत संरक्षणवाद की आलोचना करते हैं और इसे हास्यास्पद स्तर तक ले जाते हैं, यह दिखाते हुए कि ये उपाय उपभोक्ता की कीमत पर कुछ खास क्षेत्रों को अनुचित तरीके से फायदा पहुंचाते हैं।
reviewed: false
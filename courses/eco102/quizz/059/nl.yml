question: Wat stelt Bastiat aan de kaak in de Petitie van de Kaarsenmakers?
answer: De absurditeit van protectionistische maatregelen
wrong_answers:
  - Het belang van het subsidiëren van de lokale industrie
  - De schadelijke gevolgen van buitenlandse concurrentie
  - De noodzaak om de prijzen van licht te reguleren
explanation: |
  Door middel van deze satire bekritiseert Bastiat het protectionisme door het tot in het absurde door te drijven en te laten zien dat deze maatregelen bepaalde sectoren oneerlijk bevoordelen ten koste van de consument.
reviewed: false
question: Bastiat Mumcuların Dilekçesi aracılığıyla neyi kınamaktadır?
answer: Korumacı önlemlerin saçmalığı
wrong_answers:
  - Yerel sanayinin desteklenmesinin önemi
  - Dış rekabetin zararlı etkileri
  - Işık fiyatlarının düzenlenmesi gerekliliği
explanation: |
  Bastiat, bu hiciv aracılığıyla korumacılığı absürt bir noktaya taşıyarak eleştirmekte ve bu önlemlerin tüketici aleyhine belirli sektörleri haksız yere kayırdığını göstermektedir.

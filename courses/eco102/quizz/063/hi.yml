question: मार्गरेट थैचर का लाफ़र कर्व के बारे में क्या मुख्य विचार था?
answer: टैक्स कम होने चाहिए ताकि अर्थव्यवस्था को बढ़ावा मिले
wrong_answers:
  - अमीरों पर टैक्स बढ़ाना चाहिए
  - भारी टैक्स दरें बनाए रखनी चाहिए ताकि सार्वजनिक सेवाओं को फंड किया जा सके।
  - सभी टैक्स बनाए रखने चाहिए
explanation: |
  लाफ़र कर्व से प्रेरित होकर, मार्गरेट थैचर ने आर्थिक विकास को बढ़ावा देने के लिए करों में कटौती की वकालत की।
reviewed: false
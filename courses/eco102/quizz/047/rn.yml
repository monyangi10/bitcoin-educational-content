question: Bastiat ashiraho gute isano hagati y’ukwirundanira umutungo n’ubuzima bw’abakozi?
answer: Ukwo kwiyongera kw’ibikorwa bituma ibiciro bigabanuka, n’imishahara ikaduga.
wrong_answers:
  - Itunga rituma habaho ugufasha mu vy’amahera imigambi y’imibano no guteza imbere ibikorwa vya Leta.
  - Abakozi ubwabo baba aba kapitaliste bagasangira inyungu.
  - Itunga rituma umuntu ashobora kugabanya ukuntu yizigira abakoresha.
explanation: |
  Bastiat avuga ko kwirundanira umutungo bituma umusaruro urushirizaho, ivyo bikaba bituma ibiciro bigabanuka, umushahara ukaduga, ivyo bikaba bituma ubuzima bugenda neza.

question: W jaki sposób Bastiat ustanawia związek między akumulacją kapitału a warunkami życia pracowników?
answer: Wzrost produkcji prowadzi do spadku cen i wzrostu płac.
wrong_answers:
  - Kapitał pozwala na finansowanie projektów społecznych i poprawę usług publicznych.
  - Sami pracownicy stają się kapitalistami i dzielą się zyskami.
  - Kapitał pozwala na zmniejszenie zależności od pracodawców.
explanation: |
  Bastiat argumentował, że akumulacja kapitału zwiększa produkcję, co prowadzi do spadku cen i wzrostu płac, poprawiając tym samym warunki życia.
reviewed: false
question: 바스티아트는 자본 축적과 노동자의 생활 조건 사이의 연결고리를 어떻게 설정할까요?
answer: 생산량 증가는 가격 하락과 임금 상승으로 이어집니다.
wrong_answers:
  - 자본을 통해 사회 프로젝트에 자금을 조달하고 공공 서비스를 개선할 수 있습니다.
  - 노동자 스스로가 자본가가 되어 이익을 공유합니다.
  - 자본을 통해 고용주에 대한 의존도를 줄일 수 있습니다.
explanation: |
  바스티아트는 자본이 축적되면 생산이 증가하여 물가가 하락하고 임금이 상승하여 생활 여건이 개선된다고 주장합니다.
reviewed: false
question: Kako Bastiat uspostavlja vezu između akumulacije kapitala i životnih uslova radnika?
answer: Povećanje proizvodnje dovodi do smanjenja cena i povećanja plata.
wrong_answers:
  - Kapital omogućava finansiranje socijalnih projekata i poboljšanje javnih usluga.
  - Radnici sami postaju kapitalisti i dele profit.
  - Kapital omogućava smanjenje zavisnosti od poslodavaca.
explanation: |
  Bastiat tvrdi da akumulacija kapitala povećava proizvodnju, što dovodi do smanjenja cena i povećanja plata, čime se poboljšavaju životni uslovi.

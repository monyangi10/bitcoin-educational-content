question: 1838 में इंग्लिश लीग का मुख्य लक्ष्य क्या था?
answer: कॉर्न कानूनों के खिलाफ
wrong_answers:
  - बड़े ज़मींदारों के ख़िलाफ़
  - कृषि कर्मियों को बढ़ावा देने के लिए
  - विदेशी व्यापारियों के खिलाफ
explanation: |
  रिचर्ड कॉबडेन से प्रेरित होकर, इंग्लिश लीग ने मुक्त व्यापार को बढ़ावा देने और गरीबी कम करने के लिए संरक्षणवादी कॉर्न कानूनों को खत्म करने का लक्ष्य रखा।

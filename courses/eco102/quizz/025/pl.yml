question: Jaki był główny cel Ligi Angielskiej w 1838 roku?
answer: Przeciwko prawom dotyczącym kukurydzy
wrong_answers:
  - Przeciwko dużym właścicielom ziemskim
  - Promowanie pracowników rolnych
  - Przeciwko zagranicznym kupcom
explanation: |
  Liga Angielska, zainspirowana przez Richarda Cobdena, miała na celu zniesienie protekcjonistycznych przepisów dotyczących kukurydzy, aby promować wolny handel i zmniejszyć ubóstwo.

question: बस्तिया का मोमबत्ती निर्माताओं की मांग पर क्या नज़रिया है?
answer: वह इसे खारिज कर देता है क्योंकि यह सामान्य हित के खिलाफ जाता है।
wrong_answers:
  - वह इसका समर्थन करता है क्योंकि नौकरियों की सुरक्षा करना ज़रूरी है
  - वह इस मुद्दे पर तटस्थ है
  - वह मानता है कि मोमबत्ती बनाने वाले सही हैं
explanation: |
  बस्तियाँ मोमबत्ती निर्माताओं की मांग की आलोचना करते हैं, यह दिखाते हुए कि संरक्षणवाद सामान्य हित की कीमत पर विशेष हितों को बढ़ावा देता है।

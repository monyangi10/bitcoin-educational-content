question: Wat is Bastiat's standpunt over de vraag van kaarsenfabrikanten?
answer: Hij verwerpt het omdat het tegen het algemeen belang ingaat
wrong_answers:
  - Hij steunt het omdat het belangrijk is om banen te beschermen
  - Hij is neutraal in deze kwestie
  - Hij gelooft dat de kaarsenfabrikanten gelijk hebben
explanation: |
  Bastiat bekritiseert de eis van de kaarsenfabrikanten en benadrukt dat protectionisme speciale belangen dient ten koste van het algemeen belang.
reviewed: false
question: Ni igiki abaharanira uburinzi n’abasosiyalisiti bahuriyeko nk’uko Bastiat abivuga?
answer: Bompi bashaka gushigikira ugukoreshwa nabi kw'igice c'abanyagihugu .
wrong_answers:
  - Bompi barwanira umwidegemvyo mu vy'ubutunzi .
  - Bompi bipfuza ko haba uburinganire bwinshi mu kibano .
  - Bompi barwanya ko Leta yivanga mu bukungu .
explanation: |
  Bastiat anegura izo ngeso zompi kubera impengamiro zifise zo gushigikira ko umugwi umwe ukoreshwa nabi n’uwundi, bikaba bitera ingorane inyungu rusangi.

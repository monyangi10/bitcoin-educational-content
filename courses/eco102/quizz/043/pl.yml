question: Jaki jest punkt wspólny między protekcjonistami a socjalistami według Bastiata?
answer: Obaj chcą sprzyjać wyzyskowi części populacji
wrong_answers:
  - Obaj bronią wolności gospodarczej
  - Oboje pragną większej równości społecznej
  - Obaj sprzeciwiają się interwencji państwa w gospodarkę
explanation: |
  Bastiat krytykuje obie ideologie za ich tendencję do faworyzowania wyzysku jednej klasy przez drugą, ze szkodą dla interesu ogółu.
reviewed: false
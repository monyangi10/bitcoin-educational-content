question: बस्तिया के अनुसार संरक्षणवादियों और समाजवादियों में क्या समानता है?
answer: वे दोनों आबादी के एक हिस्से का शोषण करने को तरजीह देना चाहते हैं
wrong_answers:
  - वे दोनों आर्थिक आज़ादी का बचाव करते हैं
  - वे दोनों अधिक सामाजिक समानता की कामना करते हैं।
  - वे दोनों ही अर्थव्यवस्था में सरकारी हस्तक्षेप के खिलाफ हैं।
explanation: |
  बस्तियाँ दोनों विचारधाराओं की आलोचना करते हैं क्योंकि वे एक वर्ग का दूसरे वर्ग द्वारा शोषण को बढ़ावा देती हैं, जिससे सामान्य हित को नुकसान पहुँचता है।
reviewed: false
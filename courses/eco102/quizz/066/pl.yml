question: Jakie są dwa sposoby na oświecenie osądu obywateli według Bastiata?
answer: Moralność filozoficzna i moralność ekonomiczna
wrong_answers:
  - Prawo i edukacja
  - Religia i nauka
  - Osobiste doświadczenia i książki
explanation: |
  Bastiat rozróżnia między moralnością filozoficzną, która dotyka serca, a moralnością ekonomiczną, która oświeca intelekt, pokazując konsekwencje działań.
reviewed: false
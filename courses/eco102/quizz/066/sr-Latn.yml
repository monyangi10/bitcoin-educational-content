question: Koja su dva načina da se prosvetli sud građana prema Bastijatu?
answer: Filozofska moralnost i ekonomska moralnost
wrong_answers:
  - Zakon i obrazovanje
  - Religija i nauka
  - Lično iskustvo i knjige
explanation: |
  Bastiat razlikuje filozofsku moralnost, koja dodiruje srce, i ekonomsku moralnost, koja prosvetljuje intelekt pokazujući posledice postupaka.
reviewed: false
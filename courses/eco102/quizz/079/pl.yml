question: Jakie niebezpieczeństwo dla społeczeństwa stwarza według Bastiata nadmierna interwencja państwa?
answer: Niszczy indywidualną odpowiedzialność i ogranicza prywatną inicjatywę
wrong_answers:
  - Promuje wzrost gospodarczy i innowacje
  - Gwarantuje równe szanse dla wszystkich
  - Chroni jednostki przed konsekwencjami ich działań
explanation: |
  Dla Bastiata nadmierna interwencja państwa zmniejsza autonomię jednostek i utrudnia im podejmowanie inicjatyw, osłabiając tym samym indywidualną odpowiedzialność i kreatywność.

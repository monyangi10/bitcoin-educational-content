question: Prema Bastijatu, kakvu opasnost preterana intervencija države predstavlja za društvo?
answer: Uništava individualnu odgovornost i ograničava privatnu inicijativu
wrong_answers:
  - To podstiče ekonomski rast i inovacije
  - To garantuje jednake mogućnosti za sve.
  - Štiti pojedince od posledica njihovih postupaka
explanation: |
  Za Bastijata, prekomerna intervencija države smanjuje autonomiju pojedinaca i ometa njihovu sposobnost da preuzmu inicijativu, čime slabi individualna odgovornost i kreativnost.
reviewed: false
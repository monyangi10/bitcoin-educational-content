question: Je, Proudhon anayaonaje mali na usambazaji wake ndani ya jamii?
answer: Anaona mgawanyiko usio sawa wa mali kama aina ya wizi
wrong_answers:
  - Anachukulia aina zote za mali kuwa halali na za lazima
  - Anataka kufuta mali yote ya mtu binafsi kwa ajili ya Ownership ya pamoja
  - Anadhani kuwa mali hayabadiliki na hayafai kuhojiwa
explanation: |
  Proudhon ni maarufu kwa maneno Mali ni wizi, kushutumu mgawanyo usio sawa wa mali kama aina ya dhuluma ya kijamii, badala ya mali yenyewe.

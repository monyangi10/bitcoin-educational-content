question: Proudhon mülkiyete ve onun toplum içindeki dağılımına nasıl bakıyor?
answer: Mülkiyetin eşitsiz dağılımını bir hırsızlık biçimi olarak görür
wrong_answers:
  - Mülkiyetin tüm biçimlerini meşru ve gerekli olarak görür
  - Kolektif Ownership lehine tüm bireysel mülkiyeti ortadan kaldırmak istiyor
  - Mülkiyetin değişmez olduğunu ve sorgulanmaması gerektiğini düşünüyor
explanation: |
  Proudhon, mülkiyetin kendisinden ziyade, mülkiyetin eşitsiz dağılımını bir sosyal adaletsizlik biçimi olarak kınamak için kullandığı Mülkiyet hırsızlıktır ifadesiyle ünlüdür.

question: 프라우드혼은 재산과 사회 내 재산 분배를 어떻게 바라보나요?
answer: 그는 재산의 불평등한 분배를 절도의 한 형태로 보고 있습니다
wrong_answers:
  - 그는 모든 형태의 재산을 합법적이고 필요한 것으로 간주합니다
  - 그는 모든 개인 재산을 폐지하고 집단적 Ownership을 선호합니다
  - 그는 재산은 불변하며 의문을 제기해서는 안 된다고 생각합니다
explanation: |
  프루동은 재산 자체보다는 재산의 불평등한 분배를 사회적 불공정의 한 형태로 규탄하기 위해 '재산은 도둑질이다'라는 문구로 유명합니다.

question: प्रॉधों संपत्ति और समाज में उसके बंटवारे को कैसे देखते हैं?
answer: वह संपत्ति के असमान बंटवारे को चोरी का एक रूप मानता है।
wrong_answers:
  - वह सभी प्रकार की संपत्ति को वैध और जरूरी मानता है।
  - वह सभी व्यक्तिगत संपत्ति को खत्म करके सामूहिक Ownership के पक्ष में करना चाहता है।
  - वो सोचता है कि संपत्ति अपरिवर्तनीय है और उस पर सवाल नहीं उठाना चाहिए।
explanation: |
  प्रूधों (Proudhon) "संपत्ति चोरी है" (Property is theft) इस वाक्य के लिए मशहूर हैं। उन्होंने संपत्ति के असमान वितरण को सामाजिक अन्याय के रूप में बताया, न कि संपत्ति को ही खुद।
reviewed: false
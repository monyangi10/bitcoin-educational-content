question: Jak Proudhon postrzega własność i jej dystrybucję w społeczeństwie?
answer: Postrzega on nierówną dystrybucję własności jako formę kradzieży
wrong_answers:
  - Uważa on wszystkie formy własności za uzasadnione i konieczne
  - Chce on znieść wszelką własność indywidualną na rzecz zbiorowej Ownership
  - Uważa, że własność jest niezmienna i nie powinna być kwestionowana
explanation: |
  Proudhon słynie z wyrażenia "Własność to kradzież", potępiającego nierówną dystrybucję własności jako formę niesprawiedliwości społecznej, a nie samą własność.
reviewed: false
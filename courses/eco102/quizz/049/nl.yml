question: Hoe kijkt Proudhon aan tegen eigendom en de verdeling ervan in de maatschappij?
answer: Hij ziet de ongelijke verdeling van bezit als een vorm van diefstal
wrong_answers:
  - Hij beschouwt alle vormen van eigendom als legitiem en noodzakelijk
  - Hij wil alle individuele eigendom afschaffen ten gunste van collectief Ownership
  - Hij denkt dat eigendom onveranderlijk is en niet in twijfel mag worden getrokken
explanation: |
  Proudhon staat bekend om de zin Eigendom is diefstal, om de ongelijke verdeling van eigendom aan te klagen als een vorm van sociaal onrecht, in plaats van eigendom zelf.
reviewed: false
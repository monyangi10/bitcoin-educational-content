question: Ukuboko kutaboneka nk’uko Adamu Smith abivuga ni ikihe?
answer: Uburyo inyungu z'umuntu ku giti ciwe zifasha inyungu rusangi
wrong_answers:
  - Inkomezi zidasanzwe ziyobora ubutunzi .
  - Umugambi w'abatunzi wo gukoresha nabi abakene
  - Imvugo ngereranyo yo gusobanura uruhara rwa Leta mu bukungu .
explanation: |
  Ikiganza kitaboneka kiradondora ingene gukurikirana inyungu z’umuntu ku giti ciwe mw’isoko ry’ubwigenge bitera inyungu rusangi ata co bigamije.

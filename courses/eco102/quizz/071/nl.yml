question: Wat is de onzichtbare hand volgens Adam Smith?
answer: Een mechanisme waarmee individuele belangen het algemeen belang dienen
wrong_answers:
  - Een bovennatuurlijke kracht die de economie stuurt
  - Een samenzwering van de rijken om de armen uit te buiten
  - Een metafoor om de rol van de staat in de economie te beschrijven
explanation: |
  De onzichtbare hand beschrijft hoe het nastreven van persoonlijke belangen in een vrije markt onbedoeld bijdraagt aan het algemeen belang.
reviewed: false
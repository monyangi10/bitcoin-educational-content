question: एडम स्मिथ के अनुसार "अदृश्य हाथ" क्या है?
answer: एक ऐसी प्रणाली जिसमें व्यक्तिगत हित सामान्य हित की सेवा करते हैं
wrong_answers:
  - एक अलौकिक शक्ति जो अर्थव्यवस्था को संचालित करती है
  - अमीरों की गरीबों का शोषण करने की साजिश
  - राज्य की अर्थव्यवस्था में भूमिका को समझाने के लिए एक मिसाल:  

**"राज्य एक बगीचे के माली की तरह है।"**  

जिस तरह एक माली पौधों को पनपने के लिए सही माहौल देता है, उन्हें पानी और खाद देता है, कुछ को काट-छाँट करता है, और जंगली घास को हटाता है — वैसे ही राज्य भी अर्थव्यवस्था को संभालता है। वह नियम बनाकर, सुविधाएँ देकर, और जरूरत पड़ने पर हस्तक्षेप करके बाजार को संतुलित रखता है। लेकिन जरूरत से ज्यादा दखल सबकुछ बर्बाद भी कर सकता है, बिल्कुल ज्यादा पानी देकर पौधों को गला देने जैसा!  

(यहाँ राज्य की भूमिका को "बगीचे का माली" बताकर समझाया गया है कि वह सहायक होना चाहिए, न कि पूरी तरह नियंत्रण करने वाला।)
explanation: |
  "अदृश्य हाथ" यह बताता है कि कैसे एक मुक्त बाजार में व्यक्तिगत फायदे की तलाश अनजाने में सामान्य हित में योगदान देती है।

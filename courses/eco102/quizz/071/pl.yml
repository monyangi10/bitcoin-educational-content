question: Czym jest niewidzialna ręka według Adama Smitha?
answer: Mechanizm, dzięki któremu indywidualne interesy służą interesom ogółu
wrong_answers:
  - Nadprzyrodzona siła, która kieruje gospodarką
  - Spisek bogatych w celu wyzyskiwania biednych
  - Metafora opisująca rolę państwa w gospodarce
explanation: |
  Niewidzialna ręka opisuje, w jaki sposób dążenie do realizacji osobistych interesów na wolnym rynku w sposób niezamierzony przyczynia się do realizacji interesu ogólnego.
reviewed: false
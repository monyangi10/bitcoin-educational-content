question: Cobden'in fikirlerine göre ekonomik açıklığın son 20 yılda küresel yoksulluk üzerindeki etkisi ne olmuştur?
answer: Yoksulluk yarı yarıya azaltıldı
wrong_answers:
  - Yoksulluk %10 arttı
  - Yoksulluk sabit kaldı
  - Yoksulluk %20 oranında azaltıldı
explanation: |
  Cobden, yoksulluğu azaltmanın bir yolu olarak ekonomik açıklığı savunmuştur ve modern sonuçlar, özellikle ticarete açık ülkelerde yoksulluğun önemli ölçüde azaldığını göstermektedir.
reviewed: false
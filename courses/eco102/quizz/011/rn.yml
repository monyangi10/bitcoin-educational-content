question: Nk’uko Adamu Smith abivuga, ni kuki isoko rikora?
answer: Kuko bishingiye ku kwironsa inyungu .
wrong_answers:
  - Kubera ko ari vyo bitegekanijwe .
  - Kubera ko ari ingeso nziza .
  - Kuko rigenzurwa na Leta .
explanation: |
  Ku bwa Adamu Smith, isoko rikora kubera ko umuntu wese akora ivyo yipfuza, ivyo bikaba ari vyo bituma abantu bose batera imbere.

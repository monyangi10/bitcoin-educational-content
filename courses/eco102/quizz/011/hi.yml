question: एडम स्मिथ के मुताबिक, बाज़ार कैसे काम करता है?
answer: क्योंकि यह स्वार्थ पर आधारित है
wrong_answers:
  - क्योंकि यह नियंत्रित है
  - क्योंकि यह अच्छा है
  - क्योंकि यह राज्य द्वारा निगरानी में है
explanation: |
  एडम स्मिथ के लिए, बाज़ार इसलिए काम करता है क्योंकि हर व्यक्ति अपने फायदे के लिए काम करता है, और इससे खुद-ब-खुद सबका भला हो जाता है।
reviewed: false
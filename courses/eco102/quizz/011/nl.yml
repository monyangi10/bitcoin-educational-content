question: Waarom functioneert de markt volgens Adam Smith?
answer: Omdat het gebaseerd is op eigenbelang
wrong_answers:
  - Omdat het gereguleerd is
  - Omdat het deugdzaam is
  - Omdat het wordt gecontroleerd door de staat
explanation: |
  Voor Adam Smith functioneert de markt omdat elk individu uit eigenbelang handelt, wat op natuurlijke wijze collectieve welvaart genereert.

question: Prema Adamu Smitu, zašto tržište funkcioniše?
answer: Zato što se zasniva na ličnom interesu
wrong_answers:
  - Zato što je regulisano
  - Jer je to vrlina
  - Zato što ga nadzire država
explanation: |
  Za Adama Smitha, tržište funkcioniše jer svaki pojedinac deluje u sopstvenom interesu, što prirodno generiše kolektivni prosperitet.

question: Wat is volgens Bastiat het grootste probleem met overheidsuitgaven?
answer: Het wordt vaak verspild
wrong_answers:
  - Het creëert te veel banen
  - Het is oneerlijk tegenover de rijksten
  - Het is noodzakelijk voor het functioneren van de samenleving
explanation: |
  Bastiat ziet overheidsuitgaven als een bron van verspilling omdat het geld dat van individuen wordt geconfisqueerd vaak door de staat wordt misbruikt.
reviewed: false
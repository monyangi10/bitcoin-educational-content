question: बस्तिया के अनुसार सार्वजनिक खर्च में मुख्य समस्या क्या है?
answer: यह अक्सर बर्बाद हो जाता है
wrong_answers:
  - यह बहुत सारी नौकरियाँ पैदा करता है
  - यह अमीरों के साथ अन्याय है
  - समाज के सही तरह से चलने के लिए यह ज़रूरी है
explanation: |
  बस्तियत का मानना है कि सार्वजनिक खर्च बर्बादी का एक स्रोत है क्योंकि व्यक्तियों से ज़ब्त किए गए धन को अक्सर सरकार द्वारा गलत तरीके से इस्तेमाल कर लिया जाता है।
reviewed: false
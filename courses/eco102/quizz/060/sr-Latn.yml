question: Koji je glavni problem sa javnom potrošnjom prema Bastijatu?
answer: Često se troši
wrong_answers:
  - Stvara previše poslova
  - To je nepravedno prema najbogatijima
  - Neophodno je da društvo funkcioniše
explanation: |
  Bastiat vidi javnu potrošnju kao izvor rasipanja jer sredstva oduzeta od pojedinaca često zloupotrebljava država.

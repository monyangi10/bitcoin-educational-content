question: Welk hoofdprobleem ziet Bastiat in het gebruik van belastingen om ongelijkheid te verminderen?
answer: Al deze antwoorden zijn juist
wrong_answers:
  - Het creëert een afhankelijkheid van de staat
  - Het ontmoedigt individueel initiatief
  - Het kan leiden tot willekeur en inbeslagname
explanation: |
  Bastiat bekritiseert herverdelend belasten omdat het afhankelijkheid aanmoedigt, initiatief ontmoedigt en leidt tot willekeur, wat neerkomt op gelegaliseerde plundering.
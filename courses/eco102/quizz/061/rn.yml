question: Ni ingorane nyamukuru iyihe Bastiat abona mu gukoresha imisoro kugira ngo ubusumbane bugabanuke?
answer: Izo nyishu zose ni ukuri .
wrong_answers:
  - Bituma habaho ukuvyifatamwo na Leta .
  - Bica intege umuntu ku giti ciwe .
  - Bishobora gutuma umuntu agira ububisha n’ugufata ibintu .
explanation: |
  Bastiat anegura imisoro yo gusubira gusangira kubera ko iremesha kwisunga abantu, igatuma umuntu adafata ingingo, kandi igatuma umuntu agira ububisha, ivyo bikaba ari ugusahura kwemewe n’amategeko.
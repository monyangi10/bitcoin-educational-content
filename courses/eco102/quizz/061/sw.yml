question: Je, ni tatizo lipi kuu ambalo Bastiat anaona katika kutumia kodi ili kupunguza kukosekana kwa usawa?
answer: Majibu haya yote ni sahihi
wrong_answers:
  - Linajenga utegemezi kwa Serikali
  - Linakatisha tamaa mpango wa mtu binafsi
  - Linaweza kusababisha uholela na kunyang'anywa
explanation: |
  Bastiat anakosoa kodi ya ugawaji upya kwa sababu inahimiza utegemezi, inakatisha tamaa mpango huo, na inaongoza kwa jeuri, ikijumuisha uporaji uliohalalishwa.

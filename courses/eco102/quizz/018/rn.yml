question: Ni ubuhe buryo bw’imitunganirize y’imibano bubonwa ko bujanye n’iherezo ry’umuntu na Tracy?
answer: Umutungo
wrong_answers:
  - Demokarasi
  - Umushahara
  - Repubulika
explanation: |
  Tracy abona ko umutungo w’umuntu ku giti ciwe ari ngirakamaro kuko utuma umuntu ashobora gushitsa ivyo akeneye no gushitsa ibikorwa vyiwe.
reviewed: false
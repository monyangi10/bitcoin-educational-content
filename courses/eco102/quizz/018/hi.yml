question: ट्रेसी के अनुसार, मनुष्य के अंत के अनुरूप कौन सा सामाजिक संगठन माना जाता है?
answer: संपत्ति
wrong_answers:
  - लोकतंत्र
  - कमाई करना
  - गणतंत्र
explanation: |
  ट्रेसी का मानना है कि निजी संपत्ति ज़रूरी है क्योंकि यह व्यक्ति को उनकी ज़रूरतें पूरी करने और अपने कर्तव्यों को निभाने का मौका देती है।
reviewed: false
question: Koji oblik društvene organizacije Tracy smatra da je u skladu sa svrhom čoveka?
answer: Svojina
wrong_answers:
  - Demokratija
  - Zarađivanje plate
  - Republika
explanation: |
  Tracy smatra privatnu svojinu suštinskom jer omogućava pojedincu da zadovolji svoje potrebe i ispuni svoje obaveze.

question: Welke vorm van sociale organisatie wordt door Tracy beschouwd als in overeenstemming met het doel van de mens?
answer: Eigendom
wrong_answers:
  - Democratie
  - Loon
  - De republiek
explanation: |
  Tracy beschouwt privébezit als essentieel omdat het individuen in staat stelt in hun behoeften te voorzien en hun plichten te vervullen.

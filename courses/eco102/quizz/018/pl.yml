question: Jaka forma organizacji społecznej jest uważana przez Tracy'ego za zgodną z celem człowieka?
answer: Nieruchomość
wrong_answers:
  - Demokracja
  - Zarobki
  - Republika
explanation: |
  Tracy uważa, że własność prywatna jest niezbędna, ponieważ pozwala jednostce zaspokajać swoje potrzeby i wypełniać obowiązki.

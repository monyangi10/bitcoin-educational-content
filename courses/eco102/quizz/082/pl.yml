question: Jakie jest dla Bastiata lekarstwo na zło w społeczeństwie?
answer: W samej wolności
wrong_answers:
  - W woli mocy
  - Ukarany przez represyjny i bezkompromisowy system sądowniczy
  - W pogoni za idealną równością
explanation: |
  Bastiat wierzy, że wolność, w połączeniu z pełną i całkowitą indywidualną odpowiedzialnością, jest środkiem przeciwdziałania złu i zachęcania do bardziej odpowiedzialnych i sprawiedliwych działań.
reviewed: false
question: Wat is voor Bastiat de remedie tegen het kwaad in de samenleving?
answer: In vrijheid zelf
wrong_answers:
  - In de wil tot macht
  - Bestraffing door een repressief en compromisloos rechtssysteem
  - In het streven naar perfecte gelijkheid
explanation: |
  Bastiat gelooft dat vrijheid, gekoppeld aan volledige individuele verantwoordelijkheid, het middel is om het kwaad tegen te gaan en meer verantwoordelijke en rechtvaardige acties aan te moedigen.
reviewed: false
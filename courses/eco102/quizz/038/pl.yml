question: Jak Bastiat uważa dobrą definicję własności?
answer: Musi ona uwzględniać przyczyny
wrong_answers:
  - Musi ona uwzględniać skutki
  - Musi ona uwzględniać prawo
  - Musi opierać się na uznaniu społecznym
explanation: |
  Bastiat uważa, że własność powinna być definiowana w oparciu o jej przyczyny, takie jak praca i osobisty wysiłek, a nie jako zwykły konstrukt prawny.
reviewed: false
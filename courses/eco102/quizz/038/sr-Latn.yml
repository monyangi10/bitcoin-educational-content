question: Kako Bastiat smatra dobru definiciju svojine?
answer: Mora uzeti u obzir uzroke
wrong_answers:
  - Mora uzeti u obzir efekte
  - Mora uzeti u obzir zakon
  - To mora biti zasnovano na društvenom priznanju
explanation: |
  Bastiat veruje da bi se vlasništvo trebalo definisati na osnovu njegovih uzroka, kao što su rad i lični trud, a ne kao puki pravni konstrukt.

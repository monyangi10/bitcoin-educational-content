question: Destutt de Tracy'den etkilenen İdeologlar kimlerdi?
answer: Fizyokratların Mirasçıları
wrong_answers:
  - Marx'ın Öncülleri
  - Devrimci ideolojinin takipçileri
  - Rousseau'nun Müritleri
explanation: |
  Destutt de Tracy'den etkilenen bir grup olan İdeologlar, liberal bir ekonomiyi savunan Fizyokratların mirasçıları olarak kabul edilmektedir.

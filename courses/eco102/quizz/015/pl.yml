question: Kim byli ideolodzy, na których wpływ miał Destutt de Tracy?
answer: Spadkobiercy fizjokratów
wrong_answers:
  - Prekursorzy Marksa
  - Wyznawcy ideologii rewolucyjnej
  - Uczniowie Rousseau
explanation: |
  Ideologowie, grupa będąca pod wpływem Destutt de Tracy, są uważani za spadkobierców fizjokratów, opowiadających się za liberalną gospodarką.

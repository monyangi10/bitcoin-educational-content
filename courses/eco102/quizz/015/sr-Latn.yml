question: Ko su bili ideolozi pod uticajem Destutt de Tracija?
answer: Naslednici fiziokrata
wrong_answers:
  - Prekursori Marksa
  - Pristalice revolucionarne ideologije
  - Učenici Rousseaua
explanation: |
  Ideolozi, grupa pod uticajem Destutt de Tracyja, smatraju se naslednicima fiziokrata, zalažući se za liberalnu ekonomiju.

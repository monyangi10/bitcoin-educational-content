question: देस्टुट डी ट्रेसी के विचारों से प्रभावित आइडियोलॉग्स (विचारक) कौन थे?
answer: भौतिकवादियों के वारिस
wrong_answers:
  - मार्क्स के पूर्ववर्ती
  - क्रांतिकारी विचारधारा के अनुयायी
  - रूसो के शिष्य
explanation: |
  आइडियोलॉजिस्ट, जो डेस्टट डी ट्रेसी से प्रभावित एक समूह थे, को फिजियोक्रेट्स का उत्तराधिकारी माना जाता है, जो एक उदार अर्थव्यवस्था की वकालत करते थे।
reviewed: false
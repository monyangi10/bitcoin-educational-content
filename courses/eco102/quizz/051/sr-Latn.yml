question: Koji je glavni argument onih koji veruju da uništenje stvara bogatstvo?
answer: Stvara radna mesta
wrong_answers:
  - Promovi inovaciju
  - Povećava kupovnu moć
  - Poboljšava produktivnost
explanation: |
  Pristalice ove ideje veruju da uništavanje podstiče zapošljavanje generisanjem posla za one koji obavljaju popravke, perspektivu koju Bastiat opovrgava naglašavajući oportunitetne troškove.

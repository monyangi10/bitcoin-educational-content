question: Ni iyihe mpamvu nyamukuru y’abemera ko ugusambura ari kwo gutuma haba ubutunzi?
answer: Bituma habaho akazi
wrong_answers:
  - Biteza imbere ubuhinga bushasha
  - Bituma umuntu agira ubushobozi bwo kugura .
  - Bituma umusaruro utera imbere
explanation: |
  Abashigikiye ico ciyumviro bemera ko ugusambura bituma abantu baronka akazi mu gutuma abakora ivyo gusanura baronka akazi, ivyo bikaba ari iciyumviro Bastiat ahakana mu gushimika ku giciro c’amahirwe.

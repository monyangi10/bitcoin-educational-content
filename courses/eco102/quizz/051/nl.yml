question: Wat is het belangrijkste argument van degenen die geloven dat vernietiging rijkdom creëert?
answer: Het creëert banen
wrong_answers:
  - Het bevordert innovatie
  - Het verhoogt de koopkracht
  - Het verbetert de productiviteit
explanation: |
  Voorstanders van dit idee geloven dat vernietiging de werkgelegenheid stimuleert door werk te genereren voor degenen die de reparaties uitvoeren, een perspectief dat Bastiat weerlegt door de opportuniteitskosten te benadrukken.
reviewed: false
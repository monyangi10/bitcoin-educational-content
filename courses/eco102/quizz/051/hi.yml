question: जो लोग मानते हैं कि विनाश से धन पैदा होता है, उनका मुख्य तर्क क्या है?
answer: यह नौकरियां पैदा करता है
wrong_answers:
  - यह नवाचार को बढ़ावा देता है
  - यह खरीदने की ताकत बढ़ाता है
  - यह प्रोडक्टिविटी बढ़ाता है
explanation: |
  इस विचार के समर्थक मानते हैं कि तबाही रोज़गार को बढ़ावा देती है, क्योंकि मरम्मत करने वालों के लिए काम पैदा होता है। लेकिन बास्तियात इस नज़रिये को खारिज करते हैं, यह कहकर कि इससे अवसर की लागत (opportunity costs) बढ़ जाती है।

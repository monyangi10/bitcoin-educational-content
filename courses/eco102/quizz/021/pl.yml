question: Jakie było motto czasopisma Le Censeur założonego przez Comte'a i Dunoyera?
answer: Pokój i wolność
wrong_answers:
  - Własność i wolność
  - Porządek i postęp
  - Wolność i równość
explanation: |
  Czasopismo Le Censeur, założone przez Comte'a i Dunoyera, nosiło motto Pokój i wolność, symbolizujące ich sprzeciw wobec arbitralności władzy.

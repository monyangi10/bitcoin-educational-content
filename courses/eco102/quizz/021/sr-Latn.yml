question: Koji je bio moto časopisa Le Censeur koji su osnovali Comte i Dunoyer?
answer: Mir i sloboda
wrong_answers:
  - Svojina i sloboda
  - Red i napredak
  - Sloboda i jednakost
explanation: |
  Časopis Le Censeur, koji su osnovali Comte i Dunoyer, nosio je moto Mir i sloboda, simbolizujući njihovo protivljenje samovolji vlasti.

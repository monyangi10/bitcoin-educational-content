question: Wat was het motto van het tijdschrift Le Censeur, opgericht door Comte en Dunoyer?
answer: Vrede en vrijheid
wrong_answers:
  - Bezit en vrijheid
  - Orde en vooruitgang
  - Vrijheid en gelijkheid
explanation: |
  Het tijdschrift Le Censeur, opgericht door Comte en Dunoyer, droeg het motto Vrede en vrijheid, als symbool van hun verzet tegen de willekeur van de macht.
reviewed: false
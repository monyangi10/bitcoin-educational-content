question: Je, Bastiat anafafanuaje wajibu kuhusiana na uhuru wa mtu binafsi?
answer: Wajibu ni wajibu wa kubeba matokeo ya matendo ya mtu, yawe mazuri au mabaya.
wrong_answers:
  - Wajibu ni Commitment kutenda kila wakati kwa manufaa ya wengine.
  - Wajibu unahusisha kukabidhi maamuzi fulani kwa mamlaka husika.
  - Wajibu ni wajibu wa kufuata sheria zilizowekwa na jamii.
explanation: |
  Bastiat anaona uwajibikaji kama kipengele chanya cha uhuru, kinachomlazimu kila mtu kuchukua kikamilifu matokeo ya uchaguzi na matendo yake.

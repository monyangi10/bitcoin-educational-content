question: बस्तिया जिम्मेदारी को व्यक्तिगत स्वतंत्रता से कैसे जोड़ते हैं?
answer: ज़िम्मेदारी का मतलब है अपने कर्मों का फल चाहे अच्छा हो या बुरा, भुगतने की ज़िम्मेदारी।
wrong_answers:
  - ज़िम्मेदारी का मतलब है Commitment, यानी हमेशा दूसरों की भलाई के लिए काम करना।
  - ज़िम्मेदारी में कुछ फैसले किसी सक्षम अधिकारी को सौंपना शामिल होता है।
  - ज़िम्मेदारी समाज द्वारा बनाए गए नियमों का पालन करने की ज़रूरत होती है।
explanation: |
  बास्टियेट जिम्मेदारी को आजादी का सकारात्मक पहलू मानते हैं, जो हर व्यक्ति को अपने फैसलों और कर्मों के नतीजों को पूरी तरह से स्वीकार करने के लिए बाध्य करती है।

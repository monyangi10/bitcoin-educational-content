question: Kako Bastija definiše odgovornost u odnosu na individualnu slobodu?
answer: Odgovornost je obaveza da se snose posledice svojih postupaka, bilo da su dobre ili loše.
wrong_answers:
  - Odgovornost je Commitment da uvek deluje za dobrobit drugih.
  - Odgovornost uključuje delegiranje određenih odluka nadležnom organu.
  - Odgovornost je obaveza da se prate pravila koja nameće društvo.
explanation: |
  Bastiat vidi odgovornost kao pozitivan aspekt slobode, obavezujući svakog pojedinca da u potpunosti preuzme posledice svojih izbora i dela.

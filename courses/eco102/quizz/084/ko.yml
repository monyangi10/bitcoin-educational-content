question: 바스티아트는 개인의 자유와 관련하여 책임을 어떻게 정의하나요?
answer: 책임이란 자신의 행동이 좋든 나쁘든 그 결과를 감수해야 하는 의무를 말합니다.
wrong_answers:
  - 책임감은 항상 타인의 이익을 위해 행동하는 Commitment입니다.
  - 책임이란 특정 결정을 권한 있는 기관에 위임하는 것을 말합니다.
  - 책임은 사회가 부과한 규칙을 따라야 하는 의무입니다.
explanation: |
  바스티아트는 각 개인이 자신의 선택과 행동의 결과를 온전히 책임져야 하는 것을 자유의 긍정적인 측면으로 보고 있습니다.
reviewed: false
question: Według Friedricha Hayeka, dlaczego scentralizowane planowanie jest nieefektywne?
answer: Nie radzi sobie ze złożonością decyzji ekonomicznych
wrong_answers:
  - Zmniejsza to ilość produkowanych towarów
  - Zwiększa to koszty produkcji
  - Promuje handel międzynarodowy
explanation: |
  Hayek wyjaśnia, że scentralizowane planowanie zawodzi ze względu na złożoność decyzji gospodarczych, które tylko wolny rynek może skutecznie koordynować.
reviewed: false
question: Prema Friedrichu Hayeku, zašto je centralizovano planiranje neefikasno?
answer: Ne može da se nosi sa složenošću ekonomskih odluka
wrong_answers:
  - Smanjuje količinu proizvedene robe
  - To povećava troškove proizvodnje
  - Promoviše međunarodnu trgovinu
explanation: |
  Hayek objašnjava da centralizovano planiranje ne uspeva zbog složenosti ekonomskih odluka, koje samo slobodno tržište može efikasno koordinisati.

question: Kulingana na Friedrich Hayek, kwa nini upangaji wa serikali kuu haufanyi kazi?
answer: Haiwezi kushughulikia utata wa maamuzi ya kiuchumi
wrong_answers:
  - Unapunguza wingi wa bidhaa zinazozalishwa
  - Unaongeza gharama za uzalishaji
  - Unakuza biashara ya kimataifa
explanation: |
  Hayek anaelezea kuwa mipango ya serikali kuu inashindwa kutokana na ugumu wa maamuzi ya kiuchumi, ambayo ni soko huria pekee linaweza kuratibu kwa ufanisi.
reviewed: false

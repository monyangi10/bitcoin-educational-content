question: फ्रेडरिक हायेक के मुताबिक, केंद्रीकृत योजना (centralized planning) क्यों अकुशल है?  

हायेक का कहना था कि:  
1. **जानकारी की समस्या**: बाजार में फैली जानकारी (जैसे लोगों की जरूरतें, संसाधनों की उपलब्धता) इतनी विशाल और बिखरी होती है कि किसी एक केंद्रीय अथॉरिटी के लिए उसे इकट्ठा करना और सही तरीके से इस्तेमाल करना नामुमकिन है।  
2. **प्राइस सिग्नल का अभाव**: बाजार में कीमतें (prices) असल में जानकारी का सिग्नल होती हैं। केंद्रीय योजना में ये सिग्नल गायब हो जाते हैं, जिससे फैसले अंधेरे में लिए जाते हैं।  
3. **इनोवेशन की कमी**: केंद्रीय नियंत्रण में प्रतिस्पर्धा नहीं होती, इसलिए नए आइडियाज और तकनीकों को बढ़ावा नहीं मिलता।  
4. **ब्यूरोक्रेटिक ढांचा**: सरकारी योजनाएं धीमी, लालफीताशाही से भरी और लचीलेपन से कोसों दूर होती हैं।  

उनका मानना था कि बाजार (market) खुद-ब-खुद लोगों के फैसलों को कोऑर्डिनेट कर देता है, जबकि केंद्रीय प्लानिंग "अहंकार" (pretence of knowledge) पर चलती है।  

(Note: हायेक की मूल भाषा अंग्रेजी में थी, लेकिन यहां हिंदी में उनके विचारों को सरल तरीके से समझाया गया है।)
answer: यह आर्थिक फैसलों की पेचीदगी संभाल नहीं सकता
wrong_answers:
  - यह माल की मात्रा को कम कर देता है
  - इससे उत्पादन लागत बढ़ जाती है
  - यह अंतरराष्ट्रीय व्यापार को बढ़ावा देता है
explanation: |
  हायेक बताते हैं कि केंद्रीकृत योजना असफल हो जाती है क्योंकि आर्थिक निर्णय बहुत जटिल होते हैं, और सिर्फ एक मुक्त बाजार ही इन्हें कुशलता से समन्वित कर सकता है।

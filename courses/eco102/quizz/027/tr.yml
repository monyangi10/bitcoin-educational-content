question: Cobden'ın ekonomik vizyonuna hangi felsefe ilham verdi?
answer: Bentham'ın faydacılığı
wrong_answers:
  - Smith'in liberalizmi
  - Fourier'in sosyalizmi
  - Rousseau'nun eşitlikçiliği
explanation: |
  Cobden, Bentham'ın serbest ticaret yoluyla en fazla sayıda insanın refahına değer veren faydacılığından etkilenmiştir.

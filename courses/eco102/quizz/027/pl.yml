question: Jaka filozofia zainspirowała ekonomiczną wizję Cobdena?
answer: Utylitaryzm Benthama
wrong_answers:
  - Liberalizm Smitha
  - Socjalizm Fouriera
  - Egalitaryzm Rousseau
explanation: |
  Cobden był pod wpływem utylitaryzmu Benthama, który cenił dobrobyt dla jak największej liczby osób poprzez wolny handel.

question: Ni falsafa ipi iliongoza maono ya kiuchumi ya Cobden?
answer: Utumiaji wa Bentham
wrong_answers:
  - Uliberali wa Smith
  - Ujamaa wa Fourier
  - Usawa wa Rousseau
explanation: |
  Cobden aliathiriwa na utumishi wa Bentham, ambao ulithamini ustawi kwa idadi kubwa zaidi kupitia biashara huria.

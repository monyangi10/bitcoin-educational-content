question: कॉबडेन के आर्थिक दृष्टिकोण को किस दर्शन ने प्रेरित किया?
answer: बेंथम का उपयोगितावाद
wrong_answers:
  - स्मिथ का उदारवाद
  - फूरिये का समाजवाद
  - रूसो का समानतावाद
explanation: |
  कोबडेन बेंथम के उपयोगितावाद से प्रभावित थे, जो मुक्त व्यापार के ज़रिए सबसे ज़्यादा लोगों की भलाई को महत्व देता था।
reviewed: false
question: Koji problem Bastiat identifikuje sa argumentom zaštite radnih mesta?
answer: Svi ovi odgovori su tačni
wrong_answers:
  - To je previše pojednostavljeno i ne uzima u obzir dugoročne posledice.
  - Zasniva se na lažnoj ideji ekonomske konkurencije
  - Koristi se za opravdavanje protekcionističkih mera koje štete potrošačima.
explanation: |
  Svi odgovori su tačni. Bastiat veruje da je argument zaštite radnih mesta pojednostavljen, zasnovan na lažnoj viziji konkurencije, i da opravdava protekcionističke mere na štetu potrošača.
reviewed: false
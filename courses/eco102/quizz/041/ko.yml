question: 바스티아트는 일자리 보호 주장에서 어떤 문제를 파악하고 있나요?
answer: 다음 정답은 모두 정답입니다
wrong_answers:
  - 너무 단순하며 장기적인 결과를 고려하지 않습니다
  - 이는 경제적 경쟁에 대한 잘못된 생각에 기반합니다
  - 소비자에게 피해를 주는 보호주의 조치를 정당화하는 데 사용됩니다
explanation: |
  모든 정답이 맞습니다. 바스티아트는 일자리 보호 주장은 경쟁에 대한 잘못된 시각에 기반한 단순한 주장이며, 소비자에게 해를 끼치는 보호주의 조치를 정당화한다고 믿습니다.
reviewed: false
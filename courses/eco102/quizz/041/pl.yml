question: Jaki problem Bastiat identyfikuje z argumentem ochrony miejsc pracy?
answer: Wszystkie te odpowiedzi są poprawne
wrong_answers:
  - Jest to zbyt uproszczone i nie uwzględnia długoterminowych konsekwencji
  - Opiera się na fałszywej idei konkurencji gospodarczej
  - Jest on wykorzystywany do uzasadnienia środków protekcjonistycznych, które szkodzą konsumentom
explanation: |
  Wszystkie odpowiedzi są poprawne. Bastiat uważa, że argument ochrony miejsc pracy jest uproszczony, oparty na fałszywej wizji konkurencji i że usprawiedliwia środki protekcjonistyczne ze szkodą dla konsumentów.
reviewed: false
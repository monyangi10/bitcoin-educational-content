question: Ni kuki, nk’uko Bastiat abivuga, uburenganzira bwo kuronka itunga n’umwidegemvyo bitandukanye?
answer: Kuko asobanura ko uburenganzira bwo kuronka umutungo bugizwe n’umwidegemvyo wo kubanza gukoresha umuntu wiwe bwite, hanyuma akawukoresha mu bikorwa vyiwe, hanyuma akawukoresha mu bikorwa vyiwe.
wrong_answers:
  - Kuko arwana no gushinga itandukaniro ry’isesengura hagati y’ivyo bibiri .
  - Kuko ivyo vyose biva ku bushake bw’umushingamateka .
  - Kuko uburenganzira bwo kuronka umutungo ari ukwagura uburenganzira bwa politike .
explanation: |
  Bastiat abona ko umutungo ufitaniye isano n’umwidegemvyo kuko ushimikiye ku bushobozi bwo kwikoresha mu mwidegemvyo, gukora ibikorwa vyiwe n’ivyamwa vy’ibikorwa vyiwe.
question: Waarom zijn volgens Bastiat het recht op eigendom en vrijheid onafscheidelijk?
answer: Omdat hij het recht op eigendom definieert als bestaande uit de vrijheid om eerst over je eigen persoon te beschikken, dan over je arbeid en tenslotte over de producten van je arbeid.
wrong_answers:
  - Omdat hij moeite heeft om een analytisch onderscheid te maken tussen de twee
  - Omdat beide voortkomen uit de wil van de wetgever
  - Omdat het recht op eigendom een uitbreiding is van politieke rechten
explanation: |
  Bastiat beschouwt eigendom als verbonden met vrijheid omdat het de mogelijkheid omvat om vrijelijk te beschikken over zichzelf, zijn arbeid en de vruchten van zijn arbeid.
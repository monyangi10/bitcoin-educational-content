question: Hoe draagt valse filantropie bij aan de perversie van de wet volgens Bastiat?
answer: Omdat het eigenlijk gebaseerd is op een reeks valse rechten waar iemand anders voor zal betalen.
wrong_answers:
  - Omdat het iedereen wil dwingen om goed te zijn.
  - Omdat het misantropen aan de macht brengt.
  - Omdat het vrijwillige solidariteit inhoudt.
explanation: |
  Valse filantropie creëert kunstmatige rechten die zich vertalen in verplichtingen die aan anderen worden opgelegd, waardoor de wet een instrument wordt om te plunderen in plaats van natuurlijke rechten te beschermen.
reviewed: false
question: W jaki sposób fałszywa filantropia przyczynia się do wypaczenia prawa według Bastiata?
answer: Ponieważ w rzeczywistości opiera się na szeregu fałszywych praw, za które ktoś inny faktycznie zapłaci.
wrong_answers:
  - Ponieważ chce zmusić wszystkich do bycia dobrymi.
  - Ponieważ daje mizantropom władzę.
  - Ponieważ obejmuje dobrowolną solidarność.
explanation: |
  Fałszywa filantropia tworzy sztuczne prawa, które przekładają się na obowiązki nakładane na innych, tym samym przekształcając prawo w narzędzie grabieży, a nie ochrony praw naturalnych.
reviewed: false
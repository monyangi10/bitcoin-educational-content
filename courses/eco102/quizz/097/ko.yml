question: 바스티아트에 따르면 거짓 자선 활동은 어떻게 법을 왜곡하는 데 기여하나요?
answer: 실제로는 다른 사람이 실제로 비용을 지불하는 일련의 잘못된 권리를 기반으로 하기 때문입니다.
wrong_answers:
  - 모든 사람이 착한 사람이 되기를 원하기 때문입니다.
  - 혐오를 조장하는 사람들이 권력을 쥐고 있기 때문입니다.
  - 자발적인 연대를 포함하기 때문입니다.
explanation: |
  잘못된 자선 활동은 타인에게 부과되는 의무로 해석되는 인위적인 권리를 만들어 법을 자연스러운 권리를 보호하는 것이 아니라 약탈의 도구로 왜곡합니다.
reviewed: false
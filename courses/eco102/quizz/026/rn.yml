question: None Cobden yasiguye gute ivy’ugufata umukate wenyene?
answer: Nk’uko ubukene bw’umukate .
wrong_answers:
  - Nk’agateka k’umwami .
  - Nk’umusoro ku mukate .
  - Nk'ukugenzura igiciro
explanation: |
  Cobden yarakoresheje iryo jambo kugira ngo anegure amategeko y’abanyagihugu, avuga ko atuma abantu badashobora kuronka umukate mu kwongera igiciro cawo mu buryo bw’ubuhinga.

question: कोबडेन ने ब्रेड मोनोपोली को कैसे परिभाषित किया?
answer: रोटी की कमी के कारण
wrong_answers:
  - राजसी विशेषाधिकार के रूप में
  - रोटी पर टैक्स
  - कीमत नियंत्रण के तहत
explanation: |
  कोबडेन ने इस शब्द का इस्तेमाल संरक्षणवादी कानूनों की निंदा करने के लिए किया, यह दावा करते हुए कि वे रोटी की कीमत को कृत्रिम रूप से बढ़ाकर उस तक पहुंच को सीमित करते हैं।

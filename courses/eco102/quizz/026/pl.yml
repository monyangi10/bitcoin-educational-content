question: Jak Cobden zdefiniował monopol chlebowy?
answer: Jak niedobór chleba
wrong_answers:
  - Jako królewski przywilej
  - Jako podatek od chleba
  - Jako kontrola cen
explanation: |
  Cobden użył tego terminu do potępienia praw protekcjonistycznych, twierdząc, że ograniczają one dostęp do chleba poprzez sztuczne podnoszenie jego ceny.

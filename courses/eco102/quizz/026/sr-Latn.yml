question: Kako je Cobden definisao monopol na hleb?
answer: Kako nestašica hleba
wrong_answers:
  - Kao kraljevska privilegija
  - Kao porez na hleb
  - Kao kontrola cena
explanation: |
  Cobden je koristio ovaj termin da osudi protekcionističke zakone, tvrdeći da su oni ograničavali pristup hlebu veštačkim povećanjem njegove cene.

question: Ni uwuhe Prezida wa Leta Zunze Ubumwe za Amerika, mu buto bwiwe, yakwiragije ivyiyumviro vya Bastiat mu mahugurwa y’amashirahamwe?
answer: Ronald Reyagan
wrong_answers:
  - Franklin Roosevelt
  - Jorji Bushi
  - Duwight D. Umunyabubasha
explanation: |
  Ronald Reagan, imbere y’uko aba umukuru w’igihugu, yarakwiragije ivyiyumviro vy’ubwigenge vya Bastiat n’abandi bahinga mu vy’ubutunzi mu mahugurwa y’ishirahamwe ry’amashanyarazi ryitwa General Electric.

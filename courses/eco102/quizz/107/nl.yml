question: Welke president van de Verenigde Staten verspreidde tijdens zijn jeugd de ideeën van Bastiat in bedrijfsseminars?
answer: Ronald Reagan
wrong_answers:
  - Franklin Roosevelt
  - George Bush
  - Dwight D. Eisenhower
explanation: |
  Ronald Reagan verspreidde, voordat hij president werd, de liberale ideeën van Bastiat en andere economen in seminars voor General Electric.

question: Prema Bastijatu, gde se može pronaći oblik autentične i organizovane solidarnosti?
answer: u društvima međusobne pomoći
wrong_answers:
  - u socijalnoj državi
  - u politikama preraspodele
  - u Bismarckovim merama
explanation: |
  Bastiat zagovara uzajamne pomoći kao primer prave solidarnosti jer se zasnivaju na dobrovoljnoj međusobnoj pomoći.
question: Według Bastiata, gdzie można znaleźć formę autentycznej i zorganizowanej solidarności?
answer: w towarzystwach wzajemnej pomocy
wrong_answers:
  - w państwie opiekuńczym
  - w polityce redystrybucji
  - w działaniach Bismarcka
explanation: |
  Bastiat opowiada się za towarzystwami wzajemnej pomocy jako przykładem prawdziwej solidarności, ponieważ opierają się one na dobrowolnej wzajemnej pomocy.
question: 1866'da İngiltere ile serbest ticaret anlaşması imzalayarak Bastiat'nın ölümünden sonra kazandığı zafere imza atan kimdir?
answer: Napolyon III
wrong_answers:
  - Louis-Philippe
  - Charles X
  - Jules Ferry
explanation: |
  Bastiat'nın ölümünden uzun bir süre sonra Napolyon III, Bastiat'nın serbest ticaret idealini gerçekleştirerek İngiltere ile bir serbest ticaret anlaşması imzaladı.
reviewed: false
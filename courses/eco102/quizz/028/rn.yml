question: Ni nde amaherezo yasinye amasezerano y’ubudandaji bwigenga n’Ubwongereza mu 1866, ivyo bikaba vyatumye Bastiat atsinda inyuma y’urupfu rwiwe?
answer: Napoléon wa gatatu
wrong_answers:
  - Ludoviko-Filipo
  - Karoli X
  - Ubwato bwa Jules
explanation: |
  Haciye igihe kirekire Bastiat apfuye, Napoléon wa gatatu yarasinye amasezerano y’ubudandaji bwigenga n’Ubwongereza, ivyo bikaba vyatumye ashitsa iciyumviro ca Bastiat c’ubudandaji bwigenga.

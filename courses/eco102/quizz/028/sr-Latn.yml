question: Ko je na kraju potpisao sporazum o slobodnoj trgovini sa Engleskom 1866. godine, označavajući posthumnu pobedu za Bastijata?
answer: Napoleon III
wrong_answers:
  - Louis-Philippe
  - Šarl X
  - Jules Ferry
explanation: |
  Dugo nakon Bastiatove smrti, Napoleon III je potpisao sporazum o slobodnoj trgovini sa Engleskom, ostvarujući Bastiatov ideal slobodne trgovine.
reviewed: false
question: 1866 में इंग्लैंड के साथ आखिरकार किसने मुक्त व्यापार संधि पर हस्ताक्षर किया, जो बास्टियत की मृत्यु के बाद एक विजय साबित हुई?
answer: नेपोलियन तृतीय
wrong_answers:
  - लुई-फिलिप
  - चार्ल्स दसवाँ
  - जूल्स फेरी
explanation: |
  बास्तिया की मौत के बहुत समय बाद, नेपोलियन तृतीय ने इंग्लैंड के साथ एक मुक्त व्यापार समझौते पर हस्ताक्षर किए, जिससे बास्तिया के मुक्त व्यापार के आदर्श को साकार किया।
reviewed: false
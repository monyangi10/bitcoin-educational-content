question: Kto ostatecznie podpisał traktat o wolnym handlu z Anglią w 1866 r., oznaczający pośmiertne zwycięstwo Bastiata?
answer: Napoleon III
wrong_answers:
  - Louis-Philippe
  - Charles X
  - Jules Ferry
explanation: |
  Długo po śmierci Bastiata Napoleon III podpisał traktat o wolnym handlu z Anglią, realizując ideał wolnego handlu Bastiata.
reviewed: false
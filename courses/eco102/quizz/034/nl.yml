question: Wat is Bastiat's mening over de aard van de mens bij zijn geboorte?
answer: Eigenaar
wrong_answers:
  - Slaaf
  - Goed
  - Onderdanig
explanation: |
  Bastiat beweert dat de mens als eigenaar wordt geboren omdat hij in zichzelf het recht bezit om zijn vermogens te gebruiken om in zijn behoeften te voorzien.

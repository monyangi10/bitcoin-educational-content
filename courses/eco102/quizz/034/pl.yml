question: Jaki jest pogląd Bastiata na naturę człowieka w chwili narodzin?
answer: Właściciel
wrong_answers:
  - Niewolnik
  - Dobry
  - Uległy
explanation: |
  Bastiat twierdzi, że człowiek rodzi się właścicielem, ponieważ posiada w sobie prawo do wykorzystywania swoich zdolności do zaspokajania swoich potrzeb.

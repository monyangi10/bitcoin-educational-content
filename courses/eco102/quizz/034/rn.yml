question: None Bastiat abona iki ku bijanye n’ingene umuntu ameze iyo avutse?
answer: Nyirayo
wrong_answers:
  - Umushumba
  - Vyiza
  - Kuyoboka
explanation: |
  Bastiat yemeza ko umuntu avuka ari nyen’ibintu kubera ko afise muri we uburenganzira bwo gukoresha ubushobozi bwiwe kugira ngo aronke ivyo akeneye.

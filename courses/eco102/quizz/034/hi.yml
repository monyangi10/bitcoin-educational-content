question: बस्तिया का मानव जन्म के समय की प्रकृति पर क्या विचार है?
answer: मालिक
wrong_answers:
  - गुलाम
  - अच्छा
  - "आज्ञाकारी" (Aagyaakaari)  

या  

"विनम्र" (Vinamr)  

(ये शब्द किसी के विनम्र या आज्ञा मानने वाले स्वभाव को दर्शाते हैं।)
explanation: |
  बास्तियात का कहना है कि इंसान जन्म से ही मालिक होता है क्योंकि उसके अंदर अपनी ज़रूरतें पूरी करने के लिए अपनी क्षमताओं का इस्तेमाल करने का अधिकार होता है।
reviewed: false
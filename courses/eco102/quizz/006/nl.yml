question: Welke vereniging richtte Bastiat op in Frankrijk om de vrije handel te bevorderen?
answer: Vereniging voor de Vrijheid van Handel
wrong_answers:
  - Vereniging voor Swinging
  - Vereniging voor de Vrije Markt
  - Liga voor Vrije Competitie
explanation: |
  Bastiat richtte de Vereniging voor de Vrijheid van Handel op om zijn liberale ideeën in Frankrijk te verspreiden.
reviewed: false
question: Bastiat alipata chama kipi nchini Ufaransa ili kukuza biashara huria?
answer: Chama cha Uhuru wa Biashara
wrong_answers:
  - Chama cha Swinging
  - Chama cha Soko Huria
  - Ligi kwa Mashindano ya Bure
explanation: |
  Bastiat alianzisha Chama cha Uhuru wa Biashara ili kueneza mawazo yake ya kiliberali nchini Ufaransa.

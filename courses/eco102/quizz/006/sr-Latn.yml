question: Koje udruženje je Bastiat osnovao u Francuskoj za promociju slobodne trgovine?
answer: Udruženje za slobodu trgovine
wrong_answers:
  - Asocijacija za svingovanje
  - Asocijacija za slobodno tržište
  - Liga za Slobodnu Konkurenciju
explanation: |
  Bastiat je osnovao Udruženje za slobodu trgovine kako bi širio svoje liberalne ideje u Francuskoj.

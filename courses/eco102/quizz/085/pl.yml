question: W jaki sposób obowiązkowa solidarność jest fałszywa?
answer: Ponieważ prowadzi to do dawania w sposób niezobowiązujący
wrong_answers:
  - Ponieważ nie zawsze decyduje się o tym demokratycznie
  - Ponieważ wymaga to zbyt dużej administracji
  - Ponieważ jest to trudne do zastosowania
explanation: |
  Wymuszona solidarność, według Bastiata, nie może być naprawdę moralna, ponieważ narzuca dawanie bez dobrowolnej zgody.
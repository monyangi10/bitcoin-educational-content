question: Hoe kan verplichte solidariteit valse solidariteit zijn?
answer: Omdat het leidt tot geven op een niet-vrijwillige manier
wrong_answers:
  - Omdat het niet altijd democratisch wordt besloten
  - Omdat het te veel administratie vereist
  - Omdat het moeilijk is om
explanation: |
  Gedwongen solidariteit kan volgens Bastiat niet echt moreel zijn omdat het een geven oplegt zonder vrijwillige toestemming.
question: "अनिवार्य एकजुटता" एक झूठी एकजुटता कैसे है?
answer: क्योंकि इससे अनैच्छिक तरीके से देना पड़ता है
wrong_answers:
  - क्योंकि यह हमेशा लोकतांत्रिक तरीके से तय नहीं होता
  - क्योंकि इसमें बहुत ज्यादा प्रशासन की जरूरत होती है
  - क्योंकि इसे लगाना मुश्किल है
explanation: |
  बास्तियात के अनुसार, जबरदस्ती की एकजुटता वास्तव में नैतिक नहीं हो सकती क्योंकि यह बिना मर्जी के दान थोपती है।
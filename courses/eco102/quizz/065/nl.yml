question: Wat is het gemeenschappelijke punt tussen Tartuffe en verkeerde economische ideeën volgens Bastiat?
answer: Alle antwoorden zijn juist
wrong_answers:
  - Beiden gebruiken hypocrisie om anderen te manipuleren
  - Ze beweren te handelen voor het welzijn van iedereen terwijl ze alleen hun eigen belang nastreven
  - Ze maken gebruik van de zwakte van de menselijke rede
explanation: |
  Bastiat trekt een parallel tussen Tartuffe en foute economische ideeën en benadrukt dat ze manipuleren door middel van hypocrisie en menselijke zwakheden uitbuiten om persoonlijke belangen te dienen.

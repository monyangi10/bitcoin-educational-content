question: बस्तिया के अनुसार, टार्टफ और गलत आर्थिक विचारों में क्या समानता है?
answer: सभी जवाब सही हैं
wrong_answers:
  - दोनों दूसरों को मनाने के लिए ढोंग का इस्तेमाल करते हैं।
  - वे कहते हैं कि सबके भले के लिए काम करते हैं, लेकिन असल में सिर्फ अपना फायदा ढूंढ़ते हैं।
  - वे इंसानी तर्क की कमजोरी का फायदा उठाते हैं।
explanation: |
  बस्तियाँ ने टार्टफ और ग़लत आर्थिक विचारों के बीच एक समानता दिखाई है, यह बताते हुए कि ये दोनों पाखंड के ज़रिए हेरफेर करते हैं और व्यक्तिगत फायदे के लिए इंसानी कमज़ोरियों का फायदा उठाते हैं।
reviewed: false
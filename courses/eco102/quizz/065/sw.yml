question: Ni jambo gani la kawaida kati ya Tartuffe na mawazo potofu ya kiuchumi kulingana na Bastiat?
answer: Majibu yote ni sahihi
wrong_answers:
  - Wote wawili hutumia unafiki kuwadanganya wengine
  - Wanadai kutenda kwa manufaa ya wote huku wakitafuta tu maslahi yao wenyewe
  - Wanatumia udhaifu wa akili za kibinadamu
explanation: |
  Bastiat huchota ulinganifu kati ya Tartuffe na mawazo potofu ya kiuchumi, akionyesha kwamba yanaendesha kwa unafiki na kutumia udhaifu wa kibinadamu kutumikia maslahi ya kibinafsi.

question: Jaka jest główna różnica między moralnością filozoficzną a moralnością ekonomiczną według Bastiata?
answer: Jeden odnosi się do serca, drugi do intelektu
wrong_answers:
  - Jeden jest indywidualny, drugi zbiorowy
  - Jeden jest starożytny, drugi nowoczesny
  - Jeden jest religijny, drugi świecki
explanation: |
  Moralność filozoficzna odwołuje się do uczuć i osobistej cnoty, podczas gdy moralność ekonomiczna ma na celu racjonalną edukację poprzez pokazanie konsekwencji działań.
reviewed: false
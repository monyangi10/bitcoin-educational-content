question: Wat is het belangrijkste verschil tussen filosofische moraliteit en economische moraliteit volgens Bastiat?
answer: De ene richt zich tot het hart, de andere tot het intellect
wrong_answers:
  - Het ene is individueel, het andere is collectief
  - De ene is oud, de andere is modern
  - De ene is religieus, de andere is seculier
explanation: |
  Filosofische moraliteit appelleert aan gevoelens en persoonlijke deugd, terwijl economische moraliteit gericht is op rationele educatie door de gevolgen van acties aan te tonen.
reviewed: false
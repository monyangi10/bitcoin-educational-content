question: संरक्षणवाद का उपभोक्ताओं पर मुख्य प्रभाव क्या है?
answer: इससे उनके द्वारा खरीदे जाने वाले उत्पादों की कीमत बढ़ जाती है
wrong_answers:
  - यह उन्हें बेहतर क्वालिटी के सामान खरीदने की सुविधा देता है
  - यह उन्हें उत्पादों का एक व्यापक विकल्प देता है
  - इसका उनकी खरीदारी क्षमता पर कोई असर नहीं पड़ता
explanation: |
  प्रोटेक्शनिज्म आयात पर टैक्स लगाता है, जिससे उपभोक्ताओं के लिए सामान महंगा हो जाता है।
reviewed: false
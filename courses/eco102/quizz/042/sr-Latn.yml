question: Koji je glavni efekat protekcionizma na potrošače?
answer: Povećava cenu proizvoda koje kupuju
wrong_answers:
  - Omogućava im da kupe proizvode višeg kvaliteta
  - Nudi im širi izbor proizvoda
  - To nema uticaja na njihovu kupovnu moć
explanation: |
  Protektcionizam nameće poreze na uvoz, što proizvode čini skupljim za potrošače.

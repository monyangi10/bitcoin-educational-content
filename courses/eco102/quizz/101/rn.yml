question: None ugusubira gusangira Leta bishobora gutuma habaho iki nk’uko Bastiat abivuga?
answer: Ugukunda abakiriya
wrong_answers:
  - Amahoro y'igihe kirekire
  - Iterambere mu bijanye n'amahirwe angana
  - Guteza imbere ubutunzi mu buryo buramba
explanation: |
  Ku bwa Bastiat, ugusubira gusangira biratuma ubutunzi buhinduka kandi bikaba bitera imbere ugukunda abaguzi, aho gutorera umuti ubusumbane.

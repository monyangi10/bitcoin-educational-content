question: बस्तियत के अनुसार, राज्य द्वारा संपत्ति का पुनर्वितरण क्या परिणाम दे सकता है?
answer: क्लाइंटलिज़्म (ग्राहकवाद)
wrong_answers:
  - लंबे समय तक सामाजिक शांति
  - बराबरी के मौकों में सुधार
  - अर्थव्यवस्था का टिकाऊ उत्तेजन
explanation: |
  बास्तियात के अनुसार, पुनर्वितरण आर्थिक विकृतियाँ पैदा करता है और असमानताओं को हल करने के बजाय, पक्षपात को बढ़ावा देता है।
reviewed: false
question: Koji je princip pravnika prema Bastijatu?
answer: To je princip prvenstva zakona nad imovinom
wrong_answers:
  - To je princip prvenstva svojine nad zakonom
  - To je princip jednakosti pred zakonom
  - To je pravo na imovinu bez intervencije države
explanation: |
  Za Bastijata, princip pravnika, u suprotnosti sa ekonomistima, postavlja zakon kao prethodeći vlasništvu, što je pozicija koju on kritikuje zbog njenog potencijala da uspostavi nepravde.

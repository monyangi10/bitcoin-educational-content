question: बस्तिया के अनुसार न्यायशास्त्रियों का सिद्धांत क्या है?
answer: यह संपत्ति पर कानून की प्राथमिकता का सिद्धांत है
wrong_answers:
  - यह संपत्ति का कानून पर प्राथमिकता का सिद्धांत है।
  - यह कानून के सामने समानता का सिद्धांत है
  - यह बिना सरकारी दखल के संपत्ति का अधिकार है।
explanation: |
  बास्टियत के लिए, अर्थशास्त्रियों के विपरीत, न्यायविदों का सिद्धांत कानून को संपत्ति से पहले रखता है, एक ऐसी स्थिति जिसकी वह अन्याय स्थापित करने की संभावना के लिए आलोचना करते हैं।
reviewed: false
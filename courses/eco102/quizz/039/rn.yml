question: None ingingo ngenderwako y’abahinga mu vy’amategeko nk’uko Bastiat abivuga ni iyihe?
answer: Ni ingingo ngenderwako y'uko itegeko ribanza gusumba umutungo .
wrong_answers:
  - Ni ingingo ngenderwako y'uko umutungo ubanza imbere y'amategeko .
  - Ni ingingo ngenderwako y'uburinganire imbere y'amategeko .
  - Ni uburenganzira bwo kuronka umutungo ataco Leta yinjiramwo .
explanation: |
  Ku bwa Bastiat, ingingo ngenderwako y’abahinga mu vy’amategeko, itandukanye n’iy’abahinga mu vy’ubutunzi, ishira itegeko nk’iry’imbere y’itunga, ikibanza anegura kubera ubushobozi rifise bwo gushinga akarengane.

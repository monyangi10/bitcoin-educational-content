question: बस्तियात प्रगतिशील पुनर्वितरण कर (progressive redistributive tax) की अवधारणा की आलोचना क्यों करते हैं?
answer: क्योंकि यह बहुमत को अल्पसंख्यक की कीमत पर कानूनी लूट की इजाज़त देता है
wrong_answers:
  - क्योंकि यह टैक्स रेवेन्यू बढ़ाने में बेअसर है
  - क्योंकि इसका फायदा सिर्फ मजदूर वर्ग को होता है
  - क्योंकि इसका मुख्य फायदा निजी कंपनियों को होता है
explanation: |
  बास्टियत का मानना है कि प्रगतिशील पुनर्वितरण कर बहुसंख्यकों को अल्पसंख्यकों का शोषण करने की अनुमति देता है, जिससे कर कानूनी लूट के एक औजार में बदल जाता है।
reviewed: false
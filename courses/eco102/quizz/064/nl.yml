question: Waarom bekritiseert Bastiat het concept van progressieve herverdelingsbelasting?
answer: Omdat het gelegaliseerde plundering door de meerderheid mogelijk maakt ten koste van een minderheid
wrong_answers:
  - Omdat het niet effectief is in het genereren van belastinginkomsten
  - Omdat het alleen de arbeidersklasse ten goede komt
  - Omdat het vooral particuliere bedrijven ten goede komt
explanation: |
  Bastiat gelooft dat de progressieve herverdelingsbelasting de meerderheid in staat stelt om een minderheid uit te buiten, waardoor de belasting een instrument van gelegaliseerde plundering wordt.
reviewed: false
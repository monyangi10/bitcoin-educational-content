question: Koju centralnu temu Bastiat razvija u svojoj knjizi Zakon?
answer: Borba protiv pravnog pljačkanja i odbrana imovine
wrong_answers:
  - Odbrana socijalnih prava i javnih usluga
  - Studija o prednostima klasičnog obrazovanja
  - Kritika industrijske revolucije
explanation: |
  U Zakonu, Bastiat suprotstavlja legalnu pljačku vlasništvu i zalaže se za slobodu kao rešenje društvenih problema.

question: अगर संपत्ति एक ऐसी संस्था है जो सामान्य इच्छा से स्थापित हुई है, जैसा कि रूसो मानते हैं, तो इसका क्या परिणाम होगा?
answer: विधायक संपत्ति को व्यवस्थित, संशोधित या यहां तक कि समाप्त भी कर सकता है।
wrong_answers:
  - फिर विधायक इस परंपरा से बंध जाता है और संपत्ति को हाथ नहीं लगा सकता
  - जनरल कभी भी संपत्ति को छूना नहीं चाहेगा
  - विधायक को बिना किसी अपवाद के संपत्ति की रक्षा करनी चाहिए।
explanation: |
  रूसो के अनुसार, चूंकि संपत्ति सामान्य इच्छा से उत्पन्न होती है, इसलिए विधायक उसी इच्छा के अनुसार इसे संशोधित या समाप्त कर सकता है।
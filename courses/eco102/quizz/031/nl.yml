question: Wat zegt Rousseau over de transformatie van het individu in een burger?
answer: We beginnen pas mannen te worden nadat we burgers zijn geweest
wrong_answers:
  - We beginnen pas burgers te worden met de Contract
  - We worden pas burgers nadat we gelijken zijn geweest
  - Burger worden gaat vooraf aan burgerschap
explanation: |
  Rousseau beweert dat een individu volledig mens wordt door het stadium van burger te doorlopen, waarmee hij persoonlijke vervulling koppelt aan sociale integratie.
reviewed: false
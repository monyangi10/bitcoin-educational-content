question: रूसो व्यक्ति के नागरिक में बदलने के बारे में क्या कहता है?
answer: "हम सच्चे आदमी तभी बनते हैं जब हम पहले अच्छे नागरिक बन जाते हैं"
wrong_answers:
  - हम लोग Contract के साथ ही असली नागरिक बनना शुरू करते हैं
  - हम नागरिक तभी बनते हैं जब पहले बराबर हो चुके होते हैं
  - नागरिक बनना नागरिकता से पहले आता है
explanation: |
  रूसो का दावा है कि एक व्यक्ति पूरी तरह से इंसान तभी बनता है जब वह नागरिक होने के चरण से गुजरता है, इस तरह व्यक्तिगत पूर्ति को सामाजिक एकीकरण से जोड़ता है।

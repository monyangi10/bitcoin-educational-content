question: Waar komt volgens Rousseau het kwaad in de samenleving vandaan?
answer: Van eigendom
wrong_answers:
  - Van ongelijkheid
  - Van slavernij
  - Van individualisme
explanation: |
  Rousseau ziet eigendom als een bron van sociaal kwaad omdat het ongelijkheid en een verlangen naar overheersing introduceert.

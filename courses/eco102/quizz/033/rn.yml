question: Nk’uko Rousseau abivuga, ikibi kiri mu kibano kiva hehe?
answer: Kuva ku mutungo
wrong_answers:
  - Kuva ku busumbane
  - Kuva mu buja
  - Kuva ku muntu ku giti ciwe
explanation: |
  Rousseau abona ko umutungo ari wo utera ikibi mu kibano kuko uzana ubusumbasumbane n’icipfuzo co kuganza.

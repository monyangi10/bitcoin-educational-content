question: रूसो के अनुसार, समाज में बुराई कहाँ से आती है?
answer: संपत्ति से
wrong_answers:
  - असमानता से
  - गुलामी से
  - व्यक्तिवाद से
explanation: |
  रूसो मानते हैं कि संपत्ति सामाजिक बुराई का स्रोत है क्योंकि यह असमानताएँ पैदा करती है और दूसरों पर हुकूमत करने की इच्छा को जन्म देती है।
reviewed: false
question: Wat is de rol van filosofische of religieuze moraliteit volgens Bastiat?
answer: Individuen aanmoedigen om onbaatzuchtig te handelen
wrong_answers:
  - De negatieve gevolgen van slechte daden laten zien
  - Eerlijke en rechtvaardige wetten opstellen
  - Economische ontwikkeling bevorderen
explanation: |
  Bastiat ziet in religieuze of filosofische moraliteit een manier om individuen aan te moedigen onbaatzuchtig te handelen, door de positieve effecten van rechtvaardige en altruïstische acties voor het welzijn van de samenleving te begrijpen.
reviewed: false
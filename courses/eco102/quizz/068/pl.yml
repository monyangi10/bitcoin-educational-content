question: Jaka jest rola moralności filozoficznej lub religijnej według Bastiata?
answer: Zachęcanie jednostek do bezinteresownego działania
wrong_answers:
  - Ujawnienie negatywnych konsekwencji złych działań
  - Ustanowienie sprawiedliwych i słusznych praw
  - Promowanie rozwoju gospodarczego
explanation: |
  Bastiat widzi w moralności religijnej lub filozoficznej sposób na zachęcenie jednostek do bezinteresownego działania poprzez zrozumienie pozytywnych skutków sprawiedliwych i altruistycznych działań dla dobra społeczeństwa.

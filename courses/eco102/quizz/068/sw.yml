question: Je, ni jukumu lipi la maadili ya kifalsafa au ya kidini kulingana na Bastiat?
answer: Kuhimiza watu binafsi kutenda bila ubinafsi
wrong_answers:
  - Kufunua matokeo mabaya ya vitendo vibaya
  - Kuweka sheria za haki na haki
  - Kukuza maendeleo ya kiuchumi
explanation: |
  Bastiat anaona katika maadili ya kidini au ya kifalsafa njia ya kuhimiza watu binafsi kutenda bila ubinafsi, kwa kuelewa athari chanya za matendo ya haki na upendeleo kwa manufaa ya jamii.
reviewed: false

question: Koja je uloga filozofskog ili religijskog morala prema Bastijatu?
answer: Da podstakne pojedince da deluju nesebično
wrong_answers:
  - Da se otkriju negativne posledice loših postupaka
  - Da se uspostave pravični i pravedni zakoni
  - Da bi se podstakao ekonomski razvoj
explanation: |
  Bastiat vidi u religioznoj ili filozofskoj moralnosti način da podstakne pojedince da deluju nesebično, razumevajući pozitivne efekte pravednih i altruističkih dela za dobrobit društva.

question: Kako prisilna solidarnost može podstaći sebičnost i oslabiti pravu solidarnost?
answer: Zbog visokih poreza i uloge države odvraća se dobrovoljna međusobna pomoć
wrong_answers:
  - Zato što su ljudi iracionalni, a pretpostavka racionalnosti je mamac
  - Zato što su ljudi prirodno sebični
  - Zbog toga što javna solidarnost nameće finansijska ograničenja udruženjima
explanation: |
  Lažna solidarnost nameće teške terete i smanjuje prostor za dobrovoljne akcije solidarnosti, što podstiče povlačenje u sebe.
question: Mshikamano wa kulazimishwa unawezaje kuhimiza ubinafsi na kudhoofisha mshikamano wa kweli?
answer: Kwa sababu kodi kubwa na jukumu la serikali hukatisha tamaa misaada ya hiari ya pande zote
wrong_answers:
  - Kwa sababu wanadamu hawana akili na dhana ya busara ni chambo
  - Kwa sababu wanadamu kwa asili ni wabinafsi
  - Kwa sababu mshikamano wa umma unaweka vikwazo vya kifedha kwa vyama
explanation: |
  Mshikamano wa uwongo huweka mizigo mizito na hupunguza nafasi ya vitendo vya mshikamano wa hiari, jambo ambalo linakuza kujiondoa.

question: जबरदस्ती की एकजुटता कैसे स्वार्थ को बढ़ावा दे सकती है और असली एकजुटता को कमजोर कर सकती है?
answer: क्योंकि ऊँचे टैक्स और सरकार की भूमिका लोगों को खुद से मदद करने से रोकते हैं
wrong_answers:
  - क्योंकि इंसान तर्कहीन होते हैं और तर्कसंगत होने का दावा सिर्फ़ एक चारा है
  - क्योंकि इंसान स्वभाव से ही स्वार्थी होता है
  - क्योंकि सार्वजनिक एकजुटता संघों पर आर्थिक बाधाएँ लगाती है
explanation: |
  झूठी एकजुटता भारी बोझ डालती है और स्वैच्छिक एकजुटता के कार्यों के लिए जगह कम कर देती है, जिससे खुद को पीछे खींचने को बढ़ावा मिलता है।
question: Zoraki dayanışma bencilliği nasıl teşvik edebilir ve gerçek dayanışmayı nasıl zayıflatabilir?
answer: Çünkü yüksek vergiler ve devletin rolü gönüllü karşılıklı yardımlaşmayı caydırmaktadır
wrong_answers:
  - Çünkü insanlar irrasyoneldir ve rasyonellik varsayımı bir cazibedir
  - Çünkü insanlar doğuştan bencildir
  - Çünkü kamu dayanışması derneklere mali kısıtlamalar getirmektedir
explanation: |
  Sahte dayanışma ağır yükler getirir ve gönüllü dayanışma eylemleri için alanı azaltır, bu da kendini geri çekmeyi teşvik eder.
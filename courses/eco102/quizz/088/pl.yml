question: W jaki sposób wymuszona solidarność może zachęcać do egoizmu i osłabiać prawdziwą solidarność?
answer: Ponieważ wysokie podatki i rola państwa zniechęcają do dobrowolnej wzajemnej pomocy
wrong_answers:
  - Ponieważ ludzie są irracjonalni, a założenie racjonalności jest przynętą
  - Ponieważ ludzie są z natury samolubni
  - Ponieważ solidarność publiczna nakłada na stowarzyszenia ograniczenia finansowe
explanation: |
  Fałszywa solidarność nakłada duże obciążenia i zmniejsza przestrzeń dla dobrowolnych działań solidarnościowych, co sprzyja samowycofaniu.
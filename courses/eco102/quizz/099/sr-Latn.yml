question: Koja je uloga države u sistemu prirodne slobode prema Bastijatu?
answer: Da bi se zaštitila prirodna prava, kao što su život, sloboda i imovina.
wrong_answers:
  - Da se preraspodeli bogatstvo za veću jednakost.
  - Da se moralne vrednosti nameću kroz zakone.
  - Da kontroliše i reguliše sve aspekte društva.
explanation: |
  U okviru prirodne slobode, Bastiat veruje da država treba da interveniše samo kako bi zaštitila prirodna prava pojedinaca, bez mešanja u njihove lične ili ekonomske izbore.

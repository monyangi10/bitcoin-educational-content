question: बस्तियाँ (Bastiat) का मुख्य तर्क यह है कि मुफ़्त क्रेडिट (free credit) का विचार एक भ्रम है। उनका कहना है कि क्रेडिट कभी भी "मुफ़्त" नहीं हो सकता, क्योंकि किसी न किसी को इसकी कीमत चुकानी पड़ती है। बैंक या सरकार अगर कर्ज़ देती है, तो उस पैसे का स्रोत कहीं न कहीं से आता है - या तो दूसरे लोगों की बचत से या टैक्स के ज़रिए। 

उनके अनुसार, मुफ़्त क्रेडिट का वादा करना एक तरह का धोखा है, जिसमें लोगों को यह एहसास नहीं होता कि आख़िरकार इसकी लागत किसी न किसी को उठानी पड़ेगी। बस्तियाँ मानते थे कि असली आर्थिक समृद्धि तभी आती है जब बचत और निवेश स्वाभाविक रूप से हो, न कि कृत्रिम तरीकों से क्रेडिट बढ़ाकर।
answer: बाकी सारे जवाब
wrong_answers:
  - यह बैंकों को फायदा पहुंचाता है और आम लोगों का नुकसान करता है
  - यह लापरवाही भरा व्यवहार और ज़्यादा जोखिम उठाने को बढ़ावा देता है
  - यह खरीदारी की ताकत को टिकाऊ तरीके से बढ़ने नहीं देता
explanation: |
  बास्टिये ने मुफ्त क्रेडिट के विचार का खंडन करते हुए बताया कि इससे लापरवाह वित्तीय व्यवहार, बढ़े हुए जोखिम और खरीदारी क्षमता को स्थायी रूप से बढ़ाने में असमर्थता पैदा होती है।

question: Kulingana na Laffer, nini kinachotokea kwa mapato ya ushuru wakati viwango vya ushuru vinaongezwa kupita kiasi?
answer: Wanapungua
wrong_answers:
  - Wanaongezeka
  - Wanabaki imara
  - Wanabadilikabadilika bila kutabirika
explanation: |
  Kulingana na mkondo wa Laffer, ongezeko kubwa la viwango vya ushuru husababisha kupungua kwa mapato ya ushuru kwa sababu inakatisha tamaa kazi, uwekezaji na uzalishaji.
reviewed: false

question: आज भी फ्रेडरिक बैस्टिये को एक प्रभावशाली विचारक क्यों माना जाता है, जबकि वो ज़्यादा मशहूर नहीं हैं?
answer: उसने राजनीतिक बाज़ार और कानूनी लूट के बारे में आधुनिक विचारों का अंदाज़ा लगा लिया था।
wrong_answers:
  - उसने सबके लिए सार्वजनिक शिक्षा को बढ़ावा दिया।
  - उसने आधुनिक क्रांतियों पर एक ग्रंथ लिखा।
  - उसने सीधे तौर पर फ्रांस में सामाजिक सुरक्षा के निर्माण को प्रभावित किया।
explanation: |
  बास्तियात को उनके विचारों के लिए फिर से खोजा जा रहा है - आज़ादी, संपत्ति के अधिकार और कानूनी लूट की आलोचना पर, जो आज की चुनौतियों से मेल खाते हैं।
reviewed: false
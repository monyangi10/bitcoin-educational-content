question: Waarom wordt Frédéric Bastiat vandaag de dag erkend als een invloedrijke denker, ondanks het feit dat hij relatief onbekend is?
answer: Hij liep vooruit op moderne ideeën over de politieke markt en wettelijke plundering.
wrong_answers:
  - Hij promootte openbaar onderwijs voor iedereen.
  - Hij schreef een verhandeling over moderne revoluties.
  - Hij had directe invloed op de oprichting van de sociale zekerheid in Frankrijk.
explanation: |
  Bastiat is herontdekt vanwege zijn ideeën over vrijheid, eigendomsrechten en zijn kritiek op wettelijke plundering, die resoneert met moderne uitdagingen.
reviewed: false
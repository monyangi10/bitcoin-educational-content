question: Dlaczego Frédéric Bastiat jest dziś uznawany za wpływowego myśliciela, mimo że jest stosunkowo mało znany?
answer: Antycypował współczesne idee rynku politycznego i legalnej grabieży.
wrong_answers:
  - Promował edukację publiczną dla wszystkich.
  - Napisał traktat o współczesnych rewolucjach.
  - Miał bezpośredni wpływ na utworzenie ubezpieczeń społecznych we Francji.
explanation: |
  Bastiat został ponownie odkryty ze względu na swoje idee dotyczące wolności, praw własności i krytykę legalnej grabieży, która rezonuje ze współczesnymi wyzwaniami.
reviewed: false
question: Wat zijn de conflictklassen volgens Comte en Dunoyer?
answer: Zij die belasting betalen en zij die ervan leven
wrong_answers:
  - De werknemers en de werkgevers
  - De bourgeoisie en de proletariërs
  - De kooplieden en ambachtslieden
explanation: |
  Comte en Dunoyer zien het klassenconflict tussen de producenten, die financieren via belastingen, en de niet-producenten, die ervan profiteren.

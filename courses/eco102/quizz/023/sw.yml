question: Je, ni madarasa yapi yanayokinzana kulingana na Comte na Dunoyer?
answer: Wale wanaolipa kodi na wale wanaoishi kutokana nayo
wrong_answers:
  - Wafanyakazi na waajiri
  - Mabepari na wasomi
  - Wafanyabiashara na fundi
explanation: |
  Comte na Dunoyer wanaona mzozo wa darasa kati ya wazalishaji, ambao wanafadhili kupitia kodi, na wasio wazalishaji, wanaonufaika nao.
reviewed: false

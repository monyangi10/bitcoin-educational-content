question: कॉम्टे और डुनोयर के अनुसार संघर्ष में कौन-कौन से वर्ग हैं?
answer: जो टैक्स देते हैं और जो उन पर पलते हैं
wrong_answers:
  - मजदूर और मालिक
  - बुर्जुआ और मज़दूर वर्ग
  - व्यापारी और कारीगर
explanation: |
  कॉम्टे और डुनोये उत्पादकों (जो टैक्स के जरिए वित्त प्रदान करते हैं) और गैर-उत्पादकों (जो इनसे लाभ उठाते हैं) के बीच वर्ग संघर्ष को देखते हैं।
reviewed: false
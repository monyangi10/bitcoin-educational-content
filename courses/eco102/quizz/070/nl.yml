question: Wat is de drijvende kracht achter sociale organisatie volgens Bastiat?
answer: De markt
wrong_answers:
  - De staat
  - Religie
  - Traditie
explanation: |
  Bastiat gelooft dat de vrije markt de ware drijvende kracht is achter sociale organisatie omdat het spontane en efficiënte coördinatie tussen individuen mogelijk maakt.

question: Koji primer koristi Leonard Read da ilustruje nevidljivu saradnju?
answer: Pravljenje olovke
wrong_answers:
  - Izgradnja kuće
  - Proizvodnja automobila
  - Organizacija grada
explanation: |
  Leonard Read koristi primer olovke da pokaže kako mnogi pojedinci sarađuju bez međusobnog poznavanja kako bi proizveli jednostavan proizvod.
reviewed: false
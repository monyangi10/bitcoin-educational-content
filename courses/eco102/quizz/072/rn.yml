question: Ni akarorero akahe Leonard Read yakoresheje kugira ngo yerekane ukuntu abantu bafatanya mu buryo butaboneka?
answer: Gukora ikaramu y'igiti
wrong_answers:
  - Ubwubatsi bw'inzu .
  - Gukora imodoka
  - Itunganywa ry'igisagara
explanation: |
  Leonard Read akoresha akarorero k’ikaramu y’igiti kugira yerekane ingene abantu benshi bafatanya batamenyana kugira ngo bavemwo ikintu ciza coroshe.

question: लियोनार्ड रीड ने अदृश्य सहयोग को समझाने के लिए कौन सा उदाहरण दिया था?
answer: एक पेंसिल का बनना
wrong_answers:
  - घर का निर्माण
  - गाड़ी का निर्माण
  - शहर का संगठन
explanation: |
  लियोनार्ड रीड एक पेंसिल के उदाहरण का इस्तेमाल करते हैं यह दिखाने के लिए कि कैसे कई लोग एक-दूसरे को जाने बिना भी एक साधारण चीज़ बनाने के लिए मिलकर काम करते हैं।
reviewed: false
question: Leonard Read'in görünmez işbirliğini göstermek için kullandığı örnek nedir?
answer: Bir kalemin yapımı
wrong_answers:
  - Bir evin inşası
  - Bir otomobilin üretimi
  - Bir şehrin organizasyonu
explanation: |
  Leonard Read, çok sayıda bireyin basit bir mal üretmek için birbirlerinden habersiz nasıl işbirliği yaptıklarını göstermek için kalem örneğini kullanır.

question: Wat is het voorbeeld dat Leonard Read gebruikt om onzichtbare samenwerking te illustreren?
answer: Het maken van een potlood
wrong_answers:
  - De bouw van een huis
  - De productie van een auto
  - De organisatie van een stad
explanation: |
  Leonard Read gebruikt het voorbeeld van een potlood om aan te tonen hoe veel individuen samenwerken zonder elkaar te kennen om een eenvoudig goed te produceren.
reviewed: false
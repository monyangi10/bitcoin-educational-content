question: Jaka jest bezpośrednia konsekwencja polityki niskich stóp procentowych prowadzonej przez banki centralne według Bastiata?
answer: Wzrost ryzykownych inwestycji i niestabilność finansowa
wrong_answers:
  - Wzrost siły nabywczej klasy robotniczej
  - Spadek kosztów dóbr konsumpcyjnych
  - Zmniejszenie nierówności społecznych
explanation: |
  Bastiat krytykuje politykę niskich stóp procentowych ze względu na jej negatywny wpływ na stabilność finansową, która zachęca do ryzykownych inwestycji i spekulacji, ze szkodą dla zdrowej gospodarki.

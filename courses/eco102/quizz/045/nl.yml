question: Wat is volgens Bastiat het directe gevolg van een laag rentebeleid van centrale banken?
answer: Een toename van risicovolle investeringen en financiële instabiliteit
wrong_answers:
  - Een toename van de koopkracht van de arbeidersklasse
  - Een daling van de kosten van consumptiegoederen
  - Een vermindering van sociale ongelijkheden
explanation: |
  Bastiat bekritiseert het lage rentebeleid vanwege het negatieve effect op de financiële stabiliteit, dat risicovolle investeringen en speculatie aanmoedigt, ten koste van een gezonde economie.
reviewed: false
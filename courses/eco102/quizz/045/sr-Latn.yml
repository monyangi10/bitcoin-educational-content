question: Koja je direktna posledica politike niskih kamatnih stopa koju sprovode centralne banke prema Bastijatu?
answer: Povećanje rizičnih investicija i finansijske nestabilnosti
wrong_answers:
  - Povećanje kupovne moći radničke klase
  - Smanjenje troškova potrošačkih dobara
  - Smanjenje socijalnih nejednakosti
explanation: |
  Bastiat kritikuje politiku niskih kamatnih stopa zbog njenog negativnog uticaja na finansijsku stabilnost, koja podstiče rizične investicije i špekulacije, na štetu zdrave ekonomije.

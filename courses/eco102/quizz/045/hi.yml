question: बैस्टिएट के अनुसार, केंद्रीय बैंकों द्वारा कम ब्याज दर की नीति का सीधा परिणाम क्या होता है?
answer: जोखिम भरे निवेश और वित्तीय अस्थिरता में वृद्धि
wrong_answers:
  - मजदूर वर्ग की खरीदारी क्षमता में वृद्धि
  - उपभोक्ता वस्तुओं की कीमत में कमी
  - सामाजिक असमानताओं में कमी
explanation: |
  बास्टिये ने कम ब्याज दर की नीति की आलोचना की है क्योंकि इसका वित्तीय स्थिरता पर नकारात्मक प्रभाव पड़ता है। यह नीति जोखिम भरे निवेश और सट्टेबाजी को बढ़ावा देती है, जो एक स्वस्थ अर्थव्यवस्था के लिए नुकसानदायक है।
reviewed: false
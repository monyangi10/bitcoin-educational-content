question: Sheria ya Say inatamkwaje kulingana na Jean-Baptiste Say na Bastiat?
answer: Bidhaa na huduma hubadilishwa kwa bidhaa na huduma
wrong_answers:
  - Supply inaunda mahitaji yake yenyewe
  - Bidhaa nyingi zaidi zinazalishwa, ndipo zinatumiwa zaidi
  - Mahitaji huamua Supply
explanation: |
  Sheria ya Say's inasema kwamba uzalishaji wa bidhaa huwezesha kubadilishana, hivyo kuthamini uchumi wa soko.

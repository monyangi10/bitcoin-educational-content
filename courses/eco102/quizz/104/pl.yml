question: Jak Bastiat krytykuje interwencje państwa wykraczające poza bezpieczeństwo i wymiar sprawiedliwości?
answer: Sprzyja przywilejom i szkodzi społeczeństwu obywatelskiemu
wrong_answers:
  - Pozwala to na lepszą dystrybucję zasobów ekonomicznych
  - Ustanawia pokój społeczny i ogranicza konflikty
  - Gwarantuje sprawiedliwy podział bogactwa
explanation: |
  Bastiat uważa, że nadmierna interwencja państwa tworzy przywileje i szkodzi społeczeństwu obywatelskiemu, ograniczając prywatne inicjatywy.

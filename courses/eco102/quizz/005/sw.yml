question: Frédéric Bastiat aligundua lini wito wake kama mwanauchumi?
answer: Wakati wa safari yake ya kwenda Uingereza
wrong_answers:
  - Wakati wa masomo yake katika chuo cha Sorèze
  - Wakati akifanya kazi kwenye mali yake huko Landes
  - Wakati wa mjadala huko Paris
explanation: |
  Bastiat aligundua wito wake kama mwanauchumi nchini Uingereza, akiathiriwa na mawasiliano yake na Ligi ya Sheria ya Kupambana na Corn.

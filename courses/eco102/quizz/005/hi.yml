question: फ्रेडरिक बास्टियत को अर्थशास्त्री बनने की प्रेरणा कब मिली?
answer: इंग्लैंड की एक यात्रा के दौरान
wrong_answers:
  - सोरेज़ कॉलेज में अपनी पढ़ाई के दौरान
  - अपनी ज़मींदारी पर काम करते हुए, जो कि लांदे में थी
  - पेरिस में एक बहस के दौरान
explanation: |
  बास्तियाँ ने इंग्लैंड में अर्थशास्त्री के रूप में अपनी पहचान बनाई, जो एंटी-कॉर्न लॉ लीग के संपर्क से प्रभावित थी।
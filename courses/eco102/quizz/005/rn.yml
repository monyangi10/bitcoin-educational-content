question: Ni ryari Frédéric Bastiat yamenye ihamagarwa ryiwe ryo kuba umuhinga mu vy’ubutunzi?
answer: Mu rugendo rwo kuja mu Bwongereza .
wrong_answers:
  - Mu gihe yiga muri kaminuza ya Sorèze .
  - Igihe yariko arakora mw’itongo ryiwe ryo mu gihugu ca Landes .
  - Mu gihe c'impaka i Paris .
explanation: |
  Bastiat yasanze ihamagarwa ryiwe ryo kuba umuhinga mu vy’ubutunzi mu Bwongereza, akozweko n’uguhura n’ishirahamwe ry’amategeko ry’abarwanya ibigori.
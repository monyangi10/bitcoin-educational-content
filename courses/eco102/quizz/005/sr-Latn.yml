question: Kada je Frédéric Bastiat otkrio svoj poziv kao ekonomista?
answer: Tokom putovanja u Englesku
wrong_answers:
  - Tokom studija na koledžu Sorèze
  - Dok je radio na svom imanju u Landesu
  - Tokom debate u Parizu
explanation: |
  Bastiat je otkrio svoj poziv kao ekonomista u Engleskoj, pod uticajem kontakta sa Ligom protiv zakona o žitu.
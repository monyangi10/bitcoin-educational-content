question: Frédéric Bastiat bir ekonomist olduğunu ne zaman keşfetti?
answer: İngiltere'ye yapılan bir gezi sırasında
wrong_answers:
  - Sorèze kolejindeki eğitimi sırasında
  - Landes'deki arazisinde çalışırken
  - Paris'teki bir tartışma sırasında
explanation: |
  Bastiat, Mısır Yasası Karşıtı Birlik ile kurduğu temastan etkilenerek İngiltere'de bir ekonomist olarak kendini keşfetti.
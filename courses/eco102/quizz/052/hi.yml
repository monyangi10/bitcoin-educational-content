question: बस्तियत नष्टीकरण के अर्थव्यवस्था पर प्रभाव से क्या निष्कर्ष निकालते हैं?
answer: यह अर्थव्यवस्था के लिए हानिकारक है
wrong_answers:
  - यह अर्थव्यवस्था के लिए फायदेमंद है
  - यह अर्थव्यवस्था के लिए तटस्थ है
  - यह आर्थिक स्थिति पर निर्भर करता है
explanation: |
  बस्तियत दिखाते हैं कि विनाश एक आर्थिक बोझ होता है क्योंकि यह कीमती संसाधनों को दूसरी ओर मोड़ देता है और कोई अतिरिक्त मूल्य नहीं बनाता।
reviewed: false
question: Która osobowość miała decydujący wpływ na Bastiata w jego ideach wolnego handlu?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Richard Cobden, lider ruchu wolnego handlu, zainspirował Bastiata w jego ideach liberalizmu gospodarczego.

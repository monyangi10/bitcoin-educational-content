question: Bastiat'nın serbest ticaret fikirlerinde hangi kişiliğin belirleyici bir etkisi olmuştur?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Serbest ticaret hareketinin lideri Richard Cobden, Bastiat'ya ekonomik liberalizm fikirlerinde ilham vermiştir.
reviewed: false
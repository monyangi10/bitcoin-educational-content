question: Koja ličnost je imala odlučujući uticaj na Bastijata u njegovim idejama o slobodnoj trgovini?
answer: Richard Cobden
wrong_answers:
  - Alphonse de Lamartine
  - Albert de Mun
  - Benjamin Constant
explanation: |
  Richard Cobden, vođa pokreta za slobodnu trgovinu, inspirisao je Bastijata u njegovim idejama ekonomskog liberalizma.
reviewed: false
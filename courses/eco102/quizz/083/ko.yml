question: 바스티아트에 따르면 개인의 책임에 대한 국가의 과도한 개입은 어떤 결과를 초래할까요?
answer: 개인을 행동의 결과로부터 보호함으로써 책임을 회피합니다
wrong_answers:
  - 더 많은 규칙을 설정하여 개인의 책임을 강화합니다
  - 시민들이 공공 생활에 적극적으로 참여하도록 장려합니다
  - 보다 공평한 사회 정의를 보장합니다
explanation: |
  바스티아는 국가의 과도한 개입은 개인이 자신의 행동에 따른 결과를 온전히 책임질 수 있는 가능성을 제거하여 책임감을 약화시킨다고 믿습니다.
reviewed: false
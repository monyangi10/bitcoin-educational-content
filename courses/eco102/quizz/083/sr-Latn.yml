question: Prema Bastijatu, posledica prekomerne državne intervencije na individualnu odgovornost je smanjenje lične odgovornosti pojedinaca.
answer: Uništava odgovornost štiteći pojedince od posledica njihovih postupaka.
wrong_answers:
  - Pojačava individualnu odgovornost uspostavljanjem više pravila
  - Podstiče građane da aktivno učestvuju u javnom životu
  - To garantuje pravedniju socijalnu pravdu
explanation: |
  Bastiat veruje da prekomerna intervencija države oduzima pojedincima mogućnost da u potpunosti preuzmu posledice svojih postupaka, što slabi njihov osećaj odgovornosti.
reviewed: false
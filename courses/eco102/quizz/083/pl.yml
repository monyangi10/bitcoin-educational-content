question: Jaka jest według Bastiata konsekwencja nadmiernej interwencji państwa w indywidualną odpowiedzialność?
answer: Niszczy odpowiedzialność, chroniąc jednostki przed konsekwencjami ich działań
wrong_answers:
  - Wzmacnia indywidualną odpowiedzialność poprzez ustanowienie większej liczby zasad
  - Zachęca obywateli do aktywnego uczestnictwa w życiu publicznym
  - Gwarantuje bardziej sprawiedliwą sprawiedliwość społeczną
explanation: |
  Bastiat uważa, że nadmierna interwencja państwa odbiera jednostkom możliwość pełnego ponoszenia konsekwencji swoich działań, co osłabia ich poczucie odpowiedzialności.
reviewed: false
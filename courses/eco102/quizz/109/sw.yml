question: Ni mawazo lipi muhimu ambalo Reagan alilipitisha kutoka kwa Bastiat kwa maono yake ya jamii?
answer: Ukuu wa asasi za kiraia na umuhimu wa wajibu wa mtu binafsi
wrong_answers:
  - Umuhimu wa serikali kuingilia kati katika uzalishaji wa mali
  - Jukumu muhimu la matumizi ya umma kwa ukuaji wa uchumi
  - Umuhimu wa kudhibiti sekta zote ili kuepusha machafuko
explanation: |
  Reagan aliingiza mawazo kutoka kwa Bastiat, kama vile wajibu wa mtu binafsi na ukuu wa jumuiya ya kiraia, katika maono yake ya kiliberali, akithamini hali ndogo.

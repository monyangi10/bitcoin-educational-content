question: राष्ट्रपति रोनाल्ड रीगन ने फ्रेडरिक बास्टियत के कई मुख्य विचारों को अपने सामाजिक दर्शन में शामिल किया था। यहाँ कुछ प्रमुख बिंदु हैं:

1. **सीमित सरकार (Limited Government)**  
   बास्टियत का मानना था कि सरकार का काम केवल नागरिकों की जान-माल की सुरक्षा करना होना चाहिए, न कि अर्थव्यवस्था में दखल देना। रीगन ने इसी सिद्धांत को आगे बढ़ाते हुए सरकारी हस्तक्षेप को कम करने और निजी क्षेत्र को बढ़ावा देने की नीतियाँ अपनाईं।

2. **मुक्त बाजार (Free Markets)**  
   बास्टियत ने मुक्त बाजार की ताकत पर जोर दिया था। रीगन ने भी टैक्स कटौती (Reaganomics) और डीरेगुलेशन के जरिए अर्थव्यवस्था को आजादी दी, ताकि निजी उद्यमिता बढ़े।

3. **कानून का शासन (Rule of Law)**  
   बास्टियत का कहना था कि कानून सभी के लिए समान होना चाहिए। रीगन ने भी इसी सिद्धांत को अपनाते हुए न्यायपालिका और कानून व्यवस्था को मजबूत करने पर जोर दिया।

4. **व्यक्तिगत स्वतंत्रता (Individual Liberty)**  
   बास्टियत व्यक्ति की आजादी के पक्षधर थे। रीगन ने भी समाजवादी नीतियों का विरोध करते हुए नागरिकों की आर्थिक और व्यक्तिगत आजादी को बढ़ावा दिया।

5. **करों की न्यूनतम दर (Low Taxation)**  
   बास्टियत का मानना था कि ज्यादा टैक्स लोगों की मेहनत को हतोत्साहित करता है। रीगन ने इसे आगे बढ़ाते हुए आयकर की दरों में भारी कटौती की, जिससे अमेरिकी अर्थव्यवस्था को फायदा हुआ।

रीगन ने बास्टियत के इन विचारों को अपनी नीतियों में शामिल करके अमेरिका को एक मजबूत और समृद्ध राष्ट्र बनाने की दिशा में काम किया।
answer: नागरिक समाज की प्रधानता और व्यक्तिगत जिम्मेदारी का महत्व
wrong_answers:
  - धन निर्माण में सरकारी हस्तक्षेप का महत्व
  - आर्थिक विकास में सार्वजनिक खर्च की अहम भूमिका
  - सभी क्षेत्रों को अराजकता से बचाने के लिए नियमन करना ज़रूरी है
explanation: |
  रीगन ने बास्टियाट के विचारों, जैसे व्यक्तिगत ज़िम्मेदारी और नागरिक समाज की प्रधानता, को अपने उदारवादी दृष्टिकोण में शामिल किया, जहाँ वो एक न्यूनतम राज्य को महत्व देते थे।

question: Welke sleutelideeën nam Reagan over van Bastiat voor zijn maatschappijvisie?
answer: Primaat van de burgermaatschappij en het belang van individuele verantwoordelijkheid
wrong_answers:
  - Belang van staatsinterventie bij het creëren van rijkdom
  - Essentiële rol van overheidsuitgaven voor economische groei
  - Noodzaak om alle sectoren te reguleren om chaos te voorkomen
explanation: |
  Reagan nam ideeën van Bastiat, zoals individuele verantwoordelijkheid en het primaat van de burgermaatschappij, op in zijn liberale visie en waardeerde een minimale staat.
reviewed: false
question: Je, lengo kuu la waliberali kutoka jarida la Le Censeur ni lipi?
answer: Depoliticization ya jamii
wrong_answers:
  - Vita vya darasa
  - Utajirishaji
  - Kuweka serikali kuu
explanation: |
  Comte na Dunoyer wanatetea uondoaji siasa katika jamii, kwa lengo la kupunguza uingiliaji kati wa serikali na kuweka kipaumbele kwa masilahi ya wazalishaji.

question: Le Censeur dergisindeki liberallerin nihai hedefi nedir?
answer: Toplumun depolitizasyonu
wrong_answers:
  - Sınıf savaşı
  - Zenginleştirme
  - Devletin merkezileşmesi
explanation: |
  Comte ve Dunoyer, devlet müdahalesini sınırlandırmayı ve üreticilerin çıkarlarına öncelik vermeyi amaçlayarak toplumun depolitizasyonunu savunmaktadır.

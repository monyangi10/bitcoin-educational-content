question: Jaki jest ostateczny cel liberałów z czasopisma Le Censeur?
answer: Odpolitycznienie społeczeństwa
wrong_answers:
  - Wojna klas
  - Wzbogacenie
  - Centralizacja państwa
explanation: |
  Comte i Dunoyer opowiadają się za odpolitycznieniem społeczeństwa, dążąc do ograniczenia interwencji państwa i nadania priorytetu interesom producentów.

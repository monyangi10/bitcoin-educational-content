question: बास्तियात, रूसो को किस राजनीतिक आंदोलन का पूर्ववर्ती मानते हैं?
answer: समाजवाद
wrong_answers:
  - कम्युनिज़्म (साम्यवाद)
  - पारस्परिकता
  - अराजकतावाद
explanation: |
  बास्तियात, रूसो को समाजवाद का पूर्ववर्ती मानते हैं, क्योंकि उनका समाज के प्रति सामूहिक दृष्टिकोण है, जहाँ व्यक्ति को सामान्य इच्छा के आगे झुकना पड़ता है।
reviewed: false
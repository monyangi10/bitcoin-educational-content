question: Bastiat beschouwt Rousseau als de voorloper van welke politieke beweging?
answer: Socialisme
wrong_answers:
  - Communisme
  - Mutualisme
  - Anarchisme
explanation: |
  Bastiat ziet Rousseau als een voorloper van het socialisme, vanwege zijn collectieve benadering van de maatschappij, waarbij het individu zich moet onderwerpen aan de algemene wil.

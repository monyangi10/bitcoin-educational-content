question: Bastiat uważa Rousseau za prekursora jakiego ruchu politycznego?
answer: Socjalizm
wrong_answers:
  - Komunizm
  - Wzajemność
  - Anarchizm
explanation: |
  Bastiat postrzega Rousseau jako prekursora socjalizmu ze względu na jego kolektywne podejście do społeczeństwa, w którym jednostka musi podporządkować się woli ogółu.

question: बस्तियात क्यों मानते हैं कि नागरिकों को आर्थिक नैतिकता से जागरूक करना ज़रूरी है?
answer: नकली लोगों और झूठे आर्थिक सिद्धांतों के प्रभाव को कम करने के लिए
wrong_answers:
  - दान और परोपकार सिखाना
  - टैक्स सिस्टम को ज्यादा न्यायसंगत बनाने के लिए
  - गरीबी को अर्थशास्त्र के जरिए खत्म करना
explanation: |
  बस्तियाँ आर्थिक नैतिकता में एक तरीका देखते हैं जनता को आर्थिक परिणामों की सच्चाई से अवगत कराकर हेरफेर और झूठे सिद्धांतों के प्रभाव को कम करने का।
reviewed: false
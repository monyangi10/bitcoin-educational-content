question: Kwa nini Bastiat anaamini kuwa ni muhimu kuwaelimisha wananchi kuhusu maadili ya kiuchumi?
answer: Kupunguza ushawishi wa walaghai na mafundisho ya uwongo ya kiuchumi
wrong_answers:
  - Kufundisha kwa hisani na kujitolea
  - Ili kufanya mfumo wa ushuru kuwa sawa
  - Kuondoa umaskini kupitia uchumi
explanation: |
  Bastiat anaona katika maadili ya kiuchumi njia ya kupunguza ghiliba na ushawishi wa mafundisho ya uwongo kwa kuelimisha umma juu ya matokeo ya kweli ya kiuchumi.

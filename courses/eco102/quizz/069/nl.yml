question: Waarom is het volgens Bastiat essentieel om burgers te verlichten met een economische moraal?
answer: De invloed van bedriegers en valse economische doctrines verminderen
wrong_answers:
  - Liefdadigheid en altruïsme onderwijzen
  - Het belastingstelsel eerlijker maken
  - Armoede uitbannen door economie
explanation: |
  Bastiat ziet in de economische moraal een manier om manipulatie en de invloed van valse doctrines te verminderen door het publiek te informeren over de werkelijke economische gevolgen.

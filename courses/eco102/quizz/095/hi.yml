question: बस्तियत के अनुसार कानून के प्राकृतिक मानवशास्त्रीय आधार क्या हैं?
answer: ज़िंदगी, आज़ादी, और माल-जायदाद।
wrong_answers:
  - ताक़त, असमानता, और दबदबा।
  - स्वतंत्रता, समानता, और भाईचारा।
  - न्याय, अधिकार, और भाईचारा।
explanation: |
  बास्तियात कानून की प्राकृतिक नींव को जीवन, स्वतंत्रता और संपत्ति के रूप में परिभाषित करते हैं, ये तीनों Elements जो किसी भी मानव निर्मित कानून से पहले मौजूद हैं और प्राकृतिक अधिकारों का आधार बनाते हैं।
reviewed: false
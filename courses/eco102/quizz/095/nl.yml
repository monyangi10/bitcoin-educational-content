question: Wat zijn de natuurlijke antropologische grondslagen van het recht volgens Bastiat?
answer: Leven, vrijheid en eigendom.
wrong_answers:
  - Macht, ongelijkheid en overheersing.
  - Vrijheid, gelijkheid en broederschap.
  - Rechtvaardigheid, gezag en broederschap.
explanation: |
  Bastiat definieert de natuurlijke grondslagen van het recht als zijnde leven, vrijheid en eigendom, drie Elements die bestaan vóór elke menselijke wetgeving en die de basis vormen van natuurlijke rechten.
reviewed: false
question: Jakie są naturalne antropologiczne podstawy prawa według Bastiata?
answer: Życie, wolność i własność.
wrong_answers:
  - Władza, nierówność i dominacja.
  - Wolność, równość i braterstwo.
  - Sprawiedliwość, autorytet i braterstwo.
explanation: |
  Bastiat definiuje naturalne podstawy prawa jako życie, wolność i własność, trzy Elements, które istnieją przed jakimkolwiek ludzkim prawodawstwem i stanowią podstawę praw naturalnych.
reviewed: false
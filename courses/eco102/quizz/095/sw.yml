question: Je, ni misingi ipi ya asili ya sheria ya kianthropolojia kulingana na Bastiat?
answer: Maisha, uhuru na mali.
wrong_answers:
  - Nguvu, usawa, na utawala.
  - Uhuru, usawa, na udugu.
  - Haki, mamlaka, na udugu.
explanation: |
  Bastiat anafafanua misingi ya asili ya sheria kuwa maisha, uhuru, na mali, Elements tatu ambazo zipo kabla ya sheria yoyote ya binadamu na zinaunda msingi wa haki za asili.

question: Koju školu mišljenja dvadesetog veka Bastiat predočava?
answer: Teorija javnog izbora
wrong_answers:
  - Teorija endogenog rasta
  - Teorija disequilibriuma
  - Neoklasična škola ekonomije
explanation: |
  Bastiat je predvideo ideje javnog izbora, pokazujući kako interesne grupe utiču na državu da bi dobile privilegije na račun drugih.

question: Welke twintigste-eeuwse denkschool is de voorloper van Bastiat?
answer: Theorie van openbare keuze
wrong_answers:
  - Endogene groeitheorie
  - De evenwichtstheorie
  - De neoklassieke economische school
explanation: |
  Bastiat liep vooruit op de ideeën van Public Choice en liet zien hoe belangengroepen de staat beïnvloeden om privileges te verkrijgen ten koste van anderen.

question: Ni irihe shure ry’ivyiyumviro ryo mu kinjana ca makumyabiri Bastiat agereranya?
answer: Ivyiyumviro vy'amahitamwo ya bose
wrong_answers:
  - Ivyiyumviro vy'ukukura kw'imbere
  - Ivyiyumviro vy'ukudahukana
  - Ishure ry'ubutunzi ry'igihe ca kera
explanation: |
  Bastiat yari yiteze imbere y’igihe ivyiyumviro vya Public Choice, yerekana ingene imigwi y’inyungu igira ico ikoze kuri Leta kugira ngo ironke uduteka kubera abandi.

question: Ni shule ipi ya mawazo ya karne ya ishirini ambayo Bastiat anatanguliza?
answer: Nadharia ya uchaguzi wa umma
wrong_answers:
  - Nadharia ya ukuaji wa asili
  - Nadharia ya kutokuwepo usawa
  - Shule ya neoclassical ya uchumi
explanation: |
  Bastiat alitarajia mawazo ya Chaguo la Umma, akionyesha jinsi vikundi vya wapenda maslahi vinashawishi serikali kupata mapendeleo kwa gharama ya wengine.

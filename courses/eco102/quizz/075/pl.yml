question: Jak dopuszczono do nieodpowiedzialności bankowej?
answer: Poprzez gwarancje, że straty zostaną uwspólnione w przypadku bankructwa z powodu lekkomyślnego podejmowania ryzyka
wrong_answers:
  - Przez brak regulacji przeciwko lekkomyślnemu podejmowaniu ryzyka
  - Przez deregulację w latach 90
  - Przez system kapitalistyczny
explanation: |
  Bastiat wyjaśnia, że obietnica uwspólnienia strat zachęca banki do podejmowania nadmiernego ryzyka, ponieważ mają one pewność, że zostaną uratowane w przypadku niepowodzenia, co sprzyja nieodpowiedzialności.

question: Welk concept gebruikt Bastiat om de ideologie van gedwongen herverdeling en legale plundering te beschrijven?
answer: socialisme
wrong_answers:
  - republicanisme
  - conservatisme
  - liberalisme
explanation: |
  Bastiat bekritiseert het socialisme vanwege de neiging om de wet te gebruiken om gedwongen herverdeling op te leggen, wat hij beschouwt als een vorm van legale plundering.
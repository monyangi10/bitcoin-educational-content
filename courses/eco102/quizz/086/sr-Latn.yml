question: Koji koncept Bastiat koristi da opiše ideologiju prisilne redistribucije i legalne pljačke?
answer: socijalizam
wrong_answers:
  - republikanizam
  - konzervativizam
  - liberalizam
explanation: |
  Bastiat kritikuje socijalizam zbog njegove tendencije da koristi zakon za nametanje prisilne redistribucije, što on smatra oblikom legalne pljačke.
question: बस्तियाँ किस अवधारणा का उपयोग करते हैं जबरन पुनर्वितरण और कानूनी लूट की विचारधारा को वर्णित करने के लिए?
answer: समाजवाद
wrong_answers:
  - गणतंत्रवाद
  - रूढ़िवाद
  - उदारवाद
explanation: |
  बस्तियाँ समाजवाद की आलोचना करते हैं क्योंकि वह कानून का इस्तेमाल जबरन पुनर्वितरण के लिए करता है, जिसे वह कानूनी लूट का एक रूप मानते हैं।
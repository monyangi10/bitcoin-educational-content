question: Jakiego pojęcia używa Bastiat do opisania ideologii przymusowej redystrybucji i legalnej grabieży?
answer: socjalizm
wrong_answers:
  - republikanizm
  - konserwatyzm
  - liberalizm
explanation: |
  Bastiat krytykuje socjalizm za jego tendencję do wykorzystywania prawa do narzucania przymusowej redystrybucji, którą uważa za formę legalnej grabieży.
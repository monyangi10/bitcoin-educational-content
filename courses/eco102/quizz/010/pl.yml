question: Który autor jest przede wszystkim odpowiedzialny za edukację ekonomiczną Frédérica Bastiata?
answer: Powiedz
wrong_answers:
  - Turgot
  - Condillac
  - Quesnay
explanation: |
  Frédéric Bastiat uważa Jeana-Baptiste'a Saya za osobę, która wywarła na niego duży wpływ, zwłaszcza ze względu na jego idee dotyczące wartości i wolnego handlu.

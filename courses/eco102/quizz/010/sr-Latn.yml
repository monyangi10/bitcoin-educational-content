question: Koji je autor prvenstveno odgovoran za obrazovanje Frédérica Bastiata u ekonomiji?
answer: Reci
wrong_answers:
  - Turgot
  - Kondijak
  - Kene
explanation: |
  Frédéric Bastiat smatra Jean-Baptiste Saya kao veliki uticaj, posebno zbog njegovih ideja o vrednosti i slobodnoj trgovini.

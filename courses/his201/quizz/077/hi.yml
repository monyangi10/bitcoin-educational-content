question: Bitcoin-development मेलिंग लिस्ट किस तारीख को बनाई गई थी?
answer: 12 जून, 2011
wrong_answers:
  - 13 जनवरी, 2011
  - 7 मार्च, 2011
  - 19 सितंबर, 2011
explanation: |
  इसे डेवलपर जेफ गार्ज़िक ने बनाया था, और इसने Bitcoin में किए जाने वाले बदलावों पर औपचारिक चर्चा करने की सुविधा दी।

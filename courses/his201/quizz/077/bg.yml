question: На коя дата е създаден пощенският списък bitcoin-development?
answer: 12 юни 2011 г
wrong_answers:
  - 13 януари 2011 г
  - 7 март 2011 г
  - 19 септември 2011 г
explanation: |
  Тя е създадена от разработчика Джеф Гарзик и дава възможност за официални дискусии относно промените в Bitcoin.
reviewed: true
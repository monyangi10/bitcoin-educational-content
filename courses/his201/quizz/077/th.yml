question: วันที่เท่าไหร่ที่มีการสร้างรายชื่อผู้รับจดหมายพัฒนา Bitcoin?
answer: 12 มิถุนายน 2011
wrong_answers:
  - 13 มกราคม 2011
  - 7 มีนาคม 2011
  - 19 กันยายน 2011
explanation: |
  มันถูกสร้างขึ้นโดยนักพัฒนา Jeff Garzik และอนุญาตให้มีการอภิปรายอย่างเป็นทางการเกี่ยวกับการเปลี่ยนแปลงใน Bitcoin
reviewed: true
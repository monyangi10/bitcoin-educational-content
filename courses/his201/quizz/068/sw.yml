question: Cypherpunk Hal Finney aligunduliwa kuwa na ugonjwa gani mnamo Agosti 2009, miezi michache baada ya kugundua Bitcoin?
answer: ugonjwa wa Lou Gehrig
wrong_answers:
  - ugonjwa wa Huntington
  - ugonjwa wa Alzheimer
  - ugonjwa wa Parkinson
explanation: |
  Ugonjwa huu, unaojulikana kama amyotrophic lateral sclerosis (ALS) katika ulimwengu unaozungumza Kiingereza, [uligunduliwa](https: //www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside) mnamo Agosti 2009. Aliaga dunia kutokana na ugonjwa huu mwaka wa 2014.

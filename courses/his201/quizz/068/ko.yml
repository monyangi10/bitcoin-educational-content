question: Bitcoin을 발견한 지 몇 달 후인 2009년 8월에 Cypherpunk 할 피니는 어떤 질병을 진단받았나요?
answer: 루게릭병
wrong_answers:
  - 헌팅턴병
  - 알츠하이머병
  - 파킨슨병
explanation: |
  영어권에서는 근위축성 측삭 경화증(ALS)으로 알려진 이 질병은 2009년 8월에 [진단](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside)을 받았습니다. 그는 2014년에 이 병으로 세상을 떠났습니다.
reviewed: true
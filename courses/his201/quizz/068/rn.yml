question: Ni indwara iyihe Cypherpunk Hal Finney yasanzwe afise muri Myandagaro 2009, haciye amezi makeyi abonye Bitcoin?
answer: Indwara ya Lou Gehrig
wrong_answers:
  - Indwara ya Huntington
  - Indwara ya Alzheimer
  - Indwara ya Parkinson
explanation: |
  Iyo ndwara, izwi kw’izina rya amyotrophic lateral sclérosis (ALS) mw’isi ivuga Icongereza, [yasuzumwe] muri Myandagaro 2009. Yapfuye azize iyo ndwara mu 2014.
reviewed: true

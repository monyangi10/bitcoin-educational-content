question: Koja bolest je dijagnostikovana Cypherpunk Halu Finneyju u avgustu 2009, nekoliko meseci nakon otkrivanja Bitcoin?
answer: Lou Gehrigova bolest
wrong_answers:
  - Hantingtonova bolest
  - Alchajmerova bolest
  - Parkinsonova bolest
explanation: |
  Ova bolest, poznata kao amiotrofična lateralna skleroza (ALS) u engleskom govornom području, [dijagnostikovana](https: //www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside) je u avgustu 2009. Preminuo je od ove bolesti 2014.

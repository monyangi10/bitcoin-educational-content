question: С какво заболяване е диагностициран шифърпънкът Хал Фини през август 2009 г., няколко месеца след откриването на Bitcoin?
answer: Болестта на Лу Гериг
wrong_answers:
  - Болест на Хънтингтън
  - Болест на Алцхаймер
  - Болест на Паркинсон
explanation: |
  Това заболяване, известно в англоезичния свят като амиотрофична латерална склероза (АЛС), е [диагностицирано](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside) през август 2009 г. Той умира от това заболяване през 2014 г.
reviewed: true

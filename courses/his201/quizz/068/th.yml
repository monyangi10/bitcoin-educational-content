question: โรคอะไรที่ไซเฟอร์พังก์ Hal Finney ได้รับการวินิจฉัยในเดือนสิงหาคม 2009 ไม่กี่เดือนหลังจากค้นพบ Bitcoin?
answer: โรคหลุยส์ เกห์ริก
wrong_answers:
  - โรคฮันติงตัน
  - โรคอัลไซเมอร์
  - โรคพาร์กินสัน
explanation: |
  โรคนี้ ซึ่งเป็นที่รู้จักในชื่อ amyotrophic lateral sclerosis (ALS) ในโลกที่พูดภาษาอังกฤษ ถูก[วินิจฉัย](https: //www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside)ในเดือนสิงหาคม 2009 เขาเสียชีวิตจากโรคนี้ในปี 2014
reviewed: true
question: Cypherpunk هال فینی در آگوست 2009، چند ماه پس از کشف Bitcoin، به چه بیماری تشخیص داده شد؟
answer: بیماری لو گریگ
wrong_answers:
  - بیماری هانتینگتون
  - بیماری آلزایمر
  - بیماری پارکینسون
explanation: |
  این بیماری که در دنیای انگلیسی‌زبان به عنوان اسکلروز جانبی آمیوتروفیک (ALS) شناخته می‌شود، در آگوست 2009 [تشخیص داده شد](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside). او در سال 2014 بر اثر این بیماری درگذشت.
reviewed: false
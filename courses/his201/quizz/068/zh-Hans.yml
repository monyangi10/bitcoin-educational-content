question: 2009 年 8 月，几个月后发现比特币的密码朋克 Hal Finney 被诊断出患有什么疾病？
answer: 肌萎缩侧索硬化（Lou Gehrig‘s disease，ALS)
wrong_answers:
  - 亨廷頓病（Huntington‘s Disease，HD）
  - 阿茲海默症（Alzheimer‘s disease，AD）
  - 帕金森氏症（Parkinson‘s disease，PD）
explanation: |
  这种疾病在英语世界中被称为肌萎缩侧索硬化症（ALS），于 2009 年 8 月被[诊断](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside)。他于 2014 年因此疾病而去世。

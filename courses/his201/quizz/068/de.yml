question: Mit welcher Krankheit wurde der Cypherpunk Hal Finney im August 2009 diagnostiziert, einige Monate nach der Entdeckung von Bitcoin?
answer: Lou Gehrigs Krankheit
wrong_answers:
  - Chorea Huntington
  - Alzheimer
  - Parkinson
explanation: |
  Diese Krankheit, bekannt als Amyotrophe Lateralsklerose (ALS) in der englischsprachigen Welt, wurde im August 2009 [diagnostiziert](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside). Er verstarb 2014 an dieser Krankheit.
reviewed: true

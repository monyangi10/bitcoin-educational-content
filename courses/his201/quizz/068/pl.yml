question: Jaką chorobę zdiagnozowano u Cypherpunka Hala Finney'a w sierpniu 2009 roku, kilka miesięcy po odkryciu Bitcoina?
answer: Choroba Lou Gehriga
wrong_answers:
  - Choroba Huntingtona
  - Choroba Alzheimera
  - Choroba Parkinsona
explanation: |
  Choroba ta, znana jako stwardnienie zanikowe boczne (ALS w świecie anglojęzycznym), została [zdiagnozowana](https://www.lesswrong.com/posts/bshZiaLefDejvPKuS/dying-outside) w sierpniu 2009 roku. Zmarł na tę chorobę w 2014 roku.
reviewed: true

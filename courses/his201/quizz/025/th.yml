question: การเปิดตัวจริงของเครือข่ายต้นแบบ Bitcoin ในปี 2009 เกิดขึ้นเมื่อใด?
answer: 9 มกราคม 2009 เวลา 02:54:25 UTC
wrong_answers:
  - 3 มกราคม 2009 เวลา 18:15:05 UTC
  - 8 มกราคม 2009, เวลา 19:27:40 UTC
  - 12 มกราคม 2009, เวลา 03:30:25 UTC
explanation: |
  นี่คือการประทับเวลาของบล็อกที่ 1 ของบล็อกเชน ซึ่งถูกขุดโดย Satoshi Nakamoto หลังจากที่ได้เผยแพร่ซอฟต์แวร์โค้ดในรายการส่งเมลไม่กี่ชั่วโมงก่อนหน้านั้น บล็อกกำเนิด (0) ถูกสร้างขึ้นระหว่างวันที่ 3 ถึง 8 มกราคม แต่ยังไม่มีเครือข่ายจริงแต่อย่างใด
reviewed: true
question: Кога беше действителното стартиране на прототипната мрежа Bitcoin през 2009 г.?
answer: 9 януари 2009 г., в 02:54:25 UTC
wrong_answers:
  - 3 януари 2009 г., в 18:15:05 UTC
  - 8 януари 2009 г., в 19:27:40 UTC
  - 12 януари 2009 г., в 03:30:25 UTC
explanation: |
  Това е времевият печат на блок 1 на блокчейна, изкопан от Satoshi Nakamoto, след като е публикувал софтуерния код в пощенския списък няколко часа по-рано. Генезисният блок (0) е създаден между 3 и 8 януари, но не е имало действителна мрежа като такава.
reviewed: true
question: 2009 में Bitcoin प्रोटोटाइप नेटवर्क का असल लॉन्च कब हुआ था?
answer: 9 जनवरी, 2009, 02:54:25 UTC
wrong_answers:
  - 3 जनवरी, 2009, शाम 6:15;05 UTC
  - 8 जनवरी, 2009, 19:27:40 UTC को
  - 12 जनवरी, 2009, 03:30:25 UTC को
explanation: |
  यह Blockchain के ब्लॉक 1 का Timestamp है, जिसे Satoshi नाकामोटो ने मेलिंग लिस्ट पर सॉफ्टवेयर कोड पब्लिश करने के कुछ घंटे बाद माइन किया था। Genesis ब्लॉक (0) 3 से 8 जनवरी के बीच बनाया गया था, लेकिन असल में कोई नेटवर्क जैसी चीज़ नहीं थी।
reviewed: false
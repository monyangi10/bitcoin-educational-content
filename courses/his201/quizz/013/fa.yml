question: کدام محققان توسط Satoshi ناکاموتو در مقاله سفید Bitcoin برای کارشان در زمینه زمان‌سنجی تأیید شده ذکر شده‌اند؟
answer: استوارت هابر و اسکات استورنتا
wrong_answers:
  - لسلی لمپورت، رابرت شستاک، و مارشال پیس
  - سینتیا دورک و مونی نائور
  - رونالد ریوت و آدی شامیر
explanation: |
  سه مقاله توسط هابر و استورنتا از دهه ۹۰ در وایت پیپر ذکر شده‌اند. آنها به خاطر ایجاد [اولین Blockchain زمان‌دار](https://www.vice.com/en/article/j5nzx4/what-was-the-first-Blockchain)، که از سال ۱۹۹۲ در نیویورک تایمز منتشر شد، شناخته شده‌اند.
reviewed: false
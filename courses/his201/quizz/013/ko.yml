question: Satoshi 나카모토가 인증 타임스탬프에 대한 연구로 Bitcoin 백서에서 인용한 연구자는 누구인가요?
answer: 스튜어트 하버와 스콧 스토네타
wrong_answers:
  - 레슬리 램포트, 로버트 쇼스탁, 마샬 피즈
  - 신시아 드워크와 모니 나오르
  - 로널드 리베스트와 아디 샤미르
explanation: |
  이 백서는 1990년대 하버와 스토네타의 논문 세 편을 인용했습니다. 이들은 1992년부터 뉴욕 타임즈에 게재된 [최초의 타임스탬프 Blockchain](https://www.vice.com/en/article/j5nzx4/what-was-the-first-Blockchain)를 만든 것으로 유명합니다.
reviewed: true
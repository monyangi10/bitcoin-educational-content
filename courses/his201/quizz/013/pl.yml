question: Którzy badacze zostali zacytowani przez Satoshi Nakamoto w białej księdze Bitcoin za ich pracę nad certyfikowanym znacznikiem czasu?
answer: Stuart Haber i Scott Stornetta
wrong_answers:
  - Leslie Lamport, Robert Shostak i Marshall Pease
  - Cynthia Dwork i Moni Naor
  - Ronald Rivest i Adi Shamir
explanation: |
  W białej księdze zacytowano trzy prace Habera i Stornetty z lat 90. Są oni znani ze stworzenia [pierwszego Blockchain ze znacznikiem czasu] (https: //www.vice.com/en/article/j5nzx4/what-was-the-first-Blockchain), opublikowanego w New York Times od 1992 roku.
reviewed: false
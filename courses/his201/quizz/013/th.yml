question: นักวิจัยคนใดบ้างที่ถูกอ้างถึงโดย Satoshi Nakamoto ในเอกสารสีขาว Bitcoin สำหรับงานของพวกเขาเกี่ยวกับการประทับเวลาที่ได้รับการรับรอง?
answer: สจวร์ต ฮาเบอร์ และ สก็อตต์ สตอร์เนตตา
wrong_answers:
  - เลสลี่ แลมพอร์ต, โรเบิร์ต โชสแทค, และมาร์แชล พีซ
  - ซินเธีย ดเวิร์ก และ โมณี เนาออร์
  - โรนัลด์ ริเวสต์ และ อาดี ชามีร์
explanation: |
  เอกสารไวท์เปเปอร์อ้างถึงเอกสารสามฉบับโดย Haber และ Stornetta จากช่วงทศวรรษ 1990 พวกเขาเป็นที่รู้จักจากการสร้าง [บล็อกเชนที่มีการประทับเวลาเป็นครั้งแรก](https://www.vice.com/en/article/j5nzx4/what-was-the-first-blockchain) ซึ่งถูกตีพิมพ์ใน New York Times เริ่มตั้งแต่ปี 1992
reviewed: true
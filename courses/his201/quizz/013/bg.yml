question: Кои изследователи са цитирани от Satoshi Nakamoto в бялата книга на Bitcoin за работата им по сертифицирано времево маркиране?
answer: Стюарт Хабер и Скот Сторнета
wrong_answers:
  - Лесли Лампорт, Робърт Шостак и Маршал Пийз
  - Синтия Дворк и Мони Наор
  - Роналд Ривест и Ади Шамир
explanation: |
  В Бялата книга се цитират три доклада на Хабер и Сторнета от 90-те години на миналия век. Те са известни със създаването на [първия блокчейн с времеви печат](https: //www.vice.com/en/article/j5nzx4/what-was-the-first-blockchain), който е публикуван в New York Times от 1992 г. нататък.
reviewed: true
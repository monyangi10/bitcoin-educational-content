question: Welke onderzoekers werden door Satoshi Nakamoto aangehaald in de Bitcoin white paper voor hun werk aan gecertificeerde tijdstempels?
answer: Stuart Haber en Scott Stornetta
wrong_answers:
  - Leslie Lamport, Robert Shostak en Marshall Pease
  - Cynthia Dwork en Moni Naor
  - Ronald Rivest en Adi Shamir
explanation: |
  In het witboek werden drie papers van Haber en Stornetta uit de jaren 1990 geciteerd. Ze staan bekend om het maken van [de eerste Blockchain met tijdstempel](https://www.vice.com/en/article/j5nzx4/what-was-the-first-Blockchain), die vanaf 1992 in de New York Times werd gepubliceerd.
reviewed: true
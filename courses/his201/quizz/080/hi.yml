question: 1 अगस्त, 2011 को Bitcoin फोरम को किस डोमेन नाम पर शिफ्ट किया गया था?
answer: बिटकॉइनटॉक.ऑर्ग
wrong_answers:
  - फोरम.जीडब्ल्यू-1.ऑर्ग
  - बिटकॉइनफोरम.ऑर्ग
  - बिटकोइन.इन/फोरम
explanation: |
  17 मई को forum.Bitcoin.org पर शिफ्ट होने के बाद, यह 1 अगस्त से bitcointalk.org यूआरएल पर चला गया। सालों बाद, इसे BitcoinTalk के नाम से जाना जाने लगा।
reviewed: false
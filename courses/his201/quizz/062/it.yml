question: Cosa comporta lo stimare l'hash rate di un membro cooperativo tramite una proof of work parziale?
answer: Recuperare proof of work di grado inferiore rispetto alla difficoltà del network prodotte dall'hasher
wrong_answers:
  - Recuperare l'impronta di un timbro che include il primo byte di ogni hash di blocco prodotto dall'hasher
  - Recuperare la bolletta dell'elettricità del hasher ogni mese
  - Recuperare proof of work prodotte su un network di difficoltà inferiore, come BitDNS
explanation: |
  Questo metodo semplice è stato proposto da ribuck, Nils Schneider e Gavin Andresen [sul forum](https: //bitcointalk.org/index.php?topic=1458.msg16951#msg16951) il 14 ottobre 2010. ()

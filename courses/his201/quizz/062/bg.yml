question: Какво включва оценяването на степента на хеширане на член на кооперацията чрез частичен proof of work?
answer: Извличане на доказателства за работа от по-ниска степен от трудността на мрежата, създадена от хешъра
wrong_answers:
  - Извличане на отпечатъка на печата, включително първия байт от всеки блок хеш, създаден от хешъра
  - Извличане на сметката за електроенергия на хазяина всеки месец
  - Извличане на доказателства за работа, създадени в мрежа с по-ниска трудност, като BitDNS
explanation: |
  Този прост метод е предложен от Рибук, Нилс Шнайдер и Гавин Андресен [във форума](https: //bitcointalk.org/index.php?topic=1458.msg16951#msg16951) на 14 октомври 2010 г.
reviewed: true
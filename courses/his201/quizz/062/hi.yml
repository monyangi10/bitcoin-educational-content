question: आंशिक Proof of Work के माध्यम से किसी सहकारी सदस्य की Hash दर का अनुमान लगाने में क्या शामिल है?
answer: हैशर द्वारा उत्पादित नेटवर्क कठिनाई की तुलना में निम्न-डिग्री कार्य प्रमाण प्राप्त करना
wrong_answers:
  - हैशर द्वारा उत्पादित प्रत्येक ब्लॉक Hash के पहले बाइट सहित स्टाम्प की छाप को पुनः प्राप्त करना
  - हर महीने हैशर का बिजली बिल प्राप्त करना
  - बिटडीएनएस जैसे कम कठिनाई वाले नेटवर्क पर उत्पादित कार्य प्रमाणों को पुनः प्राप्त करना
explanation: |
  यह सरल विधि रिबक, निल्स श्नाइडर और गेविन एंड्रेसन द्वारा [फोरम पर](https://bitcointalk.org/index.php?topic=1458.msg16951#msg16951) 14 अक्टूबर 2010 को प्रस्तावित की गई थी।
reviewed: true
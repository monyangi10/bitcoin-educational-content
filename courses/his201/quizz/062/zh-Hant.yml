question: 透過部分 Proof of Work 來估計合作成員的 Hash 比率涉及什麼？
answer: 擷取比散列器產生的網路難度更低的工作證明
wrong_answers:
  - 擷取印章的印記，包括散列器產生的每個區塊 Hash 的第一個位元組
  - 每月檢索齋主的電費帳單
  - 擷取在低難度網路（如 BitDNS）上產生的工作證明
  This simple method was proposed by ribuck, Nils Schneider, and Gavin Andresen [on the forum](https: //bitcointalk.org/index.php?topic=1458.msg16951#msg16951) on October 14, 2010. ()
reviewed: false
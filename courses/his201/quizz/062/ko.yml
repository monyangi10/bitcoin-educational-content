question: 부분적인 Proof of Work을 통해 협력 회원의 Hash 비율을 추정하는 것은 무엇을 포함하나요?
answer: 해셔가 생성한 네트워크 난이도보다 낮은 수준의 작업 증명 가져오기
wrong_answers:
  - 해셔가 생성한 각 블록 Hash의 첫 번째 바이트를 포함한 스탬프의 각인 가져오기
  - 매월 해셔의 전기 요금 청구서 검색하기
  - BitDNS와 같이 난이도가 낮은 네트워크에서 생성된 작업 증명 검색하기
explanation: |
  이 간단한 방법은 2010년 10월 14일에 리벅, 닐스 슈나이더, 개빈 안드레센이 [포럼에서](https://bitcointalk.org/index.php?topic=1458.msg16951#msg16951) 제안한 것입니다.
reviewed: true
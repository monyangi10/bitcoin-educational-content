question: การประมาณอัตราแฮชของสมาชิกสหกรณ์ผ่าน proof of work บางส่วนเกี่ยวข้องกับอะไร?
answer: ดึงหลักฐานการทำงานระดับต่ำกว่าความยากของเครือข่ายที่สร้างโดยตัวแฮช
wrong_answers:
  - ดึงรอยประทับของตราประทับ รวมถึงไบต์แรกของแต่ละบล็อกแฮชที่สร้างโดยแฮชเชอร์
  - ดึงบิลค่าไฟของผู้แฮชทุกเดือน
  - การดึงหลักฐานการทำงานที่ผลิตบนเครือข่ายที่มีความยากต่ำกว่า เช่น BitDNS
explanation: |
  วิธีการง่ายๆ นี้ถูกเสนอโดย Ribuck, Nils Schneider, และ Gavin Andresen [บนฟอรัม](https: //bitcointalk.org/index.php?topic=1458.msg16951#msg16951) เมื่อวันที่ 14 ตุลาคม 2010.
reviewed: true
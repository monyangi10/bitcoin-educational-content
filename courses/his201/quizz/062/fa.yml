question: تخمین نرخ Hash یک عضو تعاونی از طریق Proof of Work جزئی شامل چه مواردی است؟
answer: بازیابی اثبات‌های کار با درجه پایین‌تر از سختی شبکه تولید شده توسط هش‌کننده
wrong_answers:
  - بازیابی اثر یک مهر شامل اولین بایت هر بلوک Hash تولید شده توسط هش‌کننده
  - بازیابی قبض برق هش‌کننده هر ماه
  - بازیابی مدارک کاری تولید شده در یک شبکه با سختی کمتر، مانند BitDNS
explanation: |

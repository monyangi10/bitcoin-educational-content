question: e-gold คืออะไร?
answer: สกุลเงินดิจิทัลที่ได้รับการสนับสนุนโดยทองคำในปริมาณเทียบเท่าที่เก็บไว้ในห้องนิรภัย
wrong_answers:
  - หน่วยของสกุลเงินในจักรวาล World of Warcraft
  - แนวคิดสกุลเงินดิจิทัลที่การออกขึ้นอยู่กับ proof of work
  - ระบบแลกเปลี่ยนออนไลน์สำหรับเครื่องประดับทองคำ
explanation: |
  Douglas Jackson และ Barry Downey ร่วมก่อตั้งระบบนี้ในปี 1996 สามารถเข้าถึงได้ด้วยเว็บเบราว์เซอร์ที่เรียบง่าย

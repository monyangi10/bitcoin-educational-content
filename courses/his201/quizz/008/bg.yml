question: Какво е e-gold?
answer: Цифрова валута, обезпечена с еквивалентно количество злато, съхранявано в трезор
wrong_answers:
  - Парична единица във вселената на World of Warcraft
  - Концепция за цифрова валута, чието издаване се основава на proof of work
  - Система за онлайн обмен на златни бижута
explanation: |
  Дъглас Джаксън и Бари Дауни са съоснователи на системата през 1996 г. Достъпът до нея се осъществяваше чрез обикновен уеб браузър.
reviewed: true
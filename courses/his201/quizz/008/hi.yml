question: ई-गोल्ड क्या था?
answer: एक डिजिटल करेंसी जो वॉल्ट में रखे गए सोने की बराबर मात्रा से सुरक्षित है
wrong_answers:
  - वर्ल्ड ऑफ वार्क्राफ्ट (World of Warcraft) यूनिवर्स में मुद्रा की एक इकाई
  - एक डिजिटल करेंसी कॉन्सेप्ट जिसका इश्यू Proof of Work पर आधारित था
  - सोने के गहनों के लिए एक ऑनलाइन Exchange सिस्टम
explanation: |
  सिस्टम की स्थापना 1996 में डगलस जैक्सन और बैरी डाउनी ने मिलकर की थी और यह एक साधारण वेब ब्राउज़र के जरिए एक्सेस किया जा सकता था।
reviewed: false
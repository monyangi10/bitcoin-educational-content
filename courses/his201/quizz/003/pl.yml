question: Jak nazywała się firma Davida Chauma, za pośrednictwem której wdrożył swoją koncepcję cyfrowej waluty?
answer: DigiCash B.V.
wrong_answers:
  - eCash Ltd.
  - CyberCash Inc.
  - First Virtual Holdings Inc.
explanation: |
  Założona w 1990 r. firma DigiCash B.V. miała siedzibę w Amsterdamie w Holandii i była właścicielem patentów na wynalazek Davida Chauma, eCash.
reviewed: false
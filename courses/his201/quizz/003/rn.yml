question: Iryo shirahamwe rya David Chaum yaciyemwo mu gushitsa iciyumviro ciwe c’amahera y’ubuhinga bwa none ryari ryitwa gute?
answer: DigiCash B.V.
wrong_answers:
  - eCash Ltd.
  - CyberCash In
  - First Virtual Holdings Inc.
explanation: |
  DigiCash B.V. yashinzwe mu mwaka w’1990, yari i Amsterdam mu Buholandi, kandi yari ifise uburenganzira bwo gukora ikintu David Chaum yahinguye, ari co eCash.
reviewed: true

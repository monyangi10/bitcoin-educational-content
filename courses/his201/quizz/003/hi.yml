question: डेविड चौम की कंपनी का नाम क्या था जिसके जरिए उन्होंने अपने डिजिटल करेंसी कॉन्सेप्ट को लागू किया?
answer: डिजिकैश बी.वी.
wrong_answers:
  - ई-कैश लिमिटेड
  - साइबरकैश इंक.
  - फर्स्ट वर्चुअल होल्डिंग्स इंक
explanation: |
  1990 में स्थापित, डिजिकैश बी.वी. एम्स्टर्डम, नीदरलैंड्स में स्थित थी और डेविड चाउम के आविष्कार, ई-कैश के पेटेंट के मालिक थे।
reviewed: false
question: Ime kompanije Davida Chauma kroz koju je implementirao svoj koncept digitalne valute bilo je DigiCash.
answer: DigiCash B.V.
wrong_answers:
  - eCash Ltd.
  - CyberCash Inc.
  - First Virtual Holdings Inc.
explanation: |
  Osnovan 1990. godine, DigiCash B.V. je bio smešten u Amsterdamu, Holandija, i držao je patente za izum Davida Chauma, eCash.
reviewed: false
question: Naar welk privévalutasysteem verwees Satoshi Nakamoto expliciet in zijn geschriften?
answer: Vrijheid Reserve
wrong_answers:
  - e-goud
  - De Liberty Dollar
  - e-Bullion
explanation: |
  Deze was inderdaad nog actief ten tijde van Bitcoin, in tegenstelling tot e-gold en de Liberty Dollar. Satoshi [vermeldde](https://bitcointalk.org/index.php?topic=87.msg807#msg807) Pecunix, een digitale goudmunt gecreëerd in 2002.
reviewed: true
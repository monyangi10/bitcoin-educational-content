question: Ni ubuhe buryo bw’amahera y’abantu ku giti cabo Satoshi Nakamoto yavuze mu buryo butomoye mu vyanditswe vyiwe?
answer: Umwidegemvyo
wrong_answers:
  - inzahabu
  - Idolari ry'Umwidegemvyo
  - e-Ibuye
explanation: |
  Iyi rero yari ikiriko irakora mu gihe ca Bitcoin, itandukanye n’inzahabu y’ubuhinga bwa none n’idolari ry’Umwidegemvyo. Satoshi nayo [yavuzwe](https://ibice.
reviewed: true
  - Laszlo Hanyecz
explanation: |
  [alitaja](https: //bitcointalk.org/index.php?topic=240.msg2104#msg2104) wazo hili kwenye kongamano la Juni 9, na Satoshi iliidhinisha. [aliunda](https;//bitcointalk.org/index.php?topic=363.msg3018#msg3018) Testnet mnamo Julai 15.

question: Ni nde yari afise iciyumviro co gushinga uruja n’uruza rw’igerageza kugira ngo ntihagire ikibazo ku rubuga nyamukuru rwa Bitcoin?
answer: Gavini Andresen
wrong_answers:
  - Satoshi Nakamoto
  - Mariti Malmi
  - Laszlo Hanyecz
explanation: |
  Yaravuze ico ciyumviro ku nama ku wa 9 Ruheshi, Satoshi na we aravyemeza. Yaremye Testnet ku wa 15 Nyakanga.
reviewed: true
question: Wie kwam op het idee om een testnetwerk op te zetten om het hoofdnetwerk Bitcoin niet te beschadigen?
answer: Gavin Andresen
wrong_answers:
  - Satoshi Nakamoto
  - Martti Malmi
  - Laszlo Hanyecz
explanation: |
  Hij [vermeldde](https://bitcointalk.org/index.php?topic=240.msg2104#msg2104) dit idee op het forum op 9 juni, en Satoshi keurde het goed. Hij [creëerde](https://bitcointalk.org/index.php?topic=363.msg3018#msg3018) de Testnet op 15 juli.
reviewed: true
question: چه کسی ایده راه‌اندازی یک شبکه آزمایشی برای جلوگیری از آسیب به شبکه اصلی Bitcoin را داشت؟
answer: گوین آندرسن
wrong_answers:
  - Satoshi ناکاموتو
  - مارتی مالمی
  - لاسلو هانیچز
explanation: |
  او [این ایده را](https://bitcointalk.org/index.php?topic=240.msg2104#msg2104) در تاریخ ۹ ژوئن در انجمن مطرح کرد و Satoshi تأیید کرد. او [Testnet را](https://bitcointalk.org/index.php?topic=363.msg3018#msg3018) در تاریخ ۱۵ ژوئیه ایجاد کرد.
reviewed: false
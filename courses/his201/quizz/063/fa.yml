question: چه زبانی اولین زیر‌انجمن غیرانگلیسی انجمن Bitcoin در ژوئیه ۲۰۱۰ به آن اختصاص داده شد؟
answer: روسی
wrong_answers:
  - فرانسوی
  - آلمانی
  - ایتالیایی
explanation: |
  این توسط [Martti Malmi](https://bitcointalk.org/index.php?topic=151.msg6241#msg6241) در ۲۸ ژوئیه تأسیس شد. زبان‌های دیگر در ماه‌های بعد اضافه شدند.
reviewed: false
question: Ni ururimi uruhe rwari rwa mbere mu nama ntoyi y’ihuriro rya Bitcoin ritari mu congereza ryari rigenewe muri Nyakanga 2010?
answer: Ikirusiya
wrong_answers:
  - Igifaransa
  - Ikidagi
  - Igitaliyano
explanation: |
  Yashinzwe na Martti Malmi ku wa 28 Nyakanga, izindi ndimi zarongeweko mu mezi yakurikiyeho.
reviewed: true
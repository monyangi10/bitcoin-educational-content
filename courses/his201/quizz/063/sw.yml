question: Jukwaa la kwanza lisilo la Kiingereza la jukwaa la Bitcoin lilitolewa kwa lugha gani mnamo Julai 2010?
answer: Kirusi
wrong_answers:
  - Kifaransa
  - Kijerumani
  - Kiitaliano
explanation: |
  [Ilianzishwa](https: //bitcointalk.org/index.php?topic=151.msg6241#msg6241) na Martti Malmi mnamo Julai 28. Lugha zingine ziliongezwa katika miezi iliyofuata.

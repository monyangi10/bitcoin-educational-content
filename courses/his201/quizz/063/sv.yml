question: Vilket språk var det första icke-engelska underforumet i Bitcoin-forumet tillägnat i juli 2010?
answer: Ryska
wrong_answers:
  - Franska
  - Tysk
  - Italienska
explanation: |
  Den [etablerades](https://bitcointalk.org/index.php?topic=151.msg6241#msg6241) av Martti Malmi den 28 juli. Andra språk lades till under de följande månaderna.
reviewed: true
question: На какъв език беше посветен първият неанглоезичен подфорум на форума на Bitcoin през юли 2010 г.?
answer: Руски
wrong_answers:
  - Френски
  - Немски
  - Италиански
explanation: |
  Тя е [създадена](https://bitcointalk.org/index.php?topic=151.msg6241#msg6241) от Марти Малми на 28 юли. През следващите месеци бяха добавени и други езици.
reviewed: true

question: Jakiemu językowi zostało poświęcone pierwsze nieanglojęzyczne podforum na forum Bitcoina w lipcu 2010 roku?
answer: Rosyjskiemu
wrong_answers:
  - Francuskiemu
  - Niemieckiemu
  - Włoskiemu
explanation: |
  Została [założona](https://bitcointalk.org/index.php?topic=151.msg6241#msg6241) przez Marttiego Malmi 28 lipca. Inne języki zostały dodane w kolejnych miesiącach.
reviewed: true

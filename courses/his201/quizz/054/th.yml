question: นักพัฒนาชาวอเมริกันคนใดที่พบบล็อกแปลก ๆ ในระหว่างเหตุการณ์ค่าเกินในวันที่ 15 สิงหาคม 2010?
answer: เจฟฟ์ การ์ซิก
wrong_answers:
  - กาวิน แอนเดรเซน
  - นิลส์ ชไนเดอร์
  - คริสเตียน เด็คเกอร์
explanation: |
  บล็อกนี้, โดยการใช้ช่องโหว่, ได้สร้างบิตคอยน์มากกว่า 184 พันล้านเหรียญ.
reviewed: true
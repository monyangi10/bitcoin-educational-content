question: Коя концепция за електронни пари е изрично спомената от Satoshi Nakamoto в бялата книга на Bitcoin?
answer: b-money (Уей Дай)
wrong_answers:
  - bit gold (Ник Сабo)
  - RPOW (Хал Фини)
  - eCash (Дейвид Чаум)
explanation: |
  Това беше първата препратка. Satoshi я добави през август 2008 г. след размяната на мнения с Уей Дай.
reviewed: true

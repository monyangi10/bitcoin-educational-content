question: นักขุดคนใดในปี 2009 ที่สูญเสียบิตคอยน์ทั้งหมดของเขาโดยการทิ้งคอมพิวเตอร์ของเขาที่กองขยะในปี 2013?
answer: เจมส์ ฮาวเวลส์
wrong_answers:
  - ดัสติน แทรมเมลล์
  - Martti Malmi
  - NewLibertyStandard
explanation: |
  วิศวกรชาวอังกฤษคนนี้ได้สร้างบิตคอยน์จำนวน 8,000 หน่วยด้วยคอมพิวเตอร์ของเขาระหว่างเดือนกุมภาพันธ์ถึงเมษายน 2009 กรณีของเขาได้รับการ[เผยแพร่](https: //www.theguardian.com/technology/2013/nov/27/hard-drive-bitcoin-landfill-site)โดย Guardian
reviewed: true
question: Кой миньор от 2009 г. е загубил всичките си биткойни, като е изхвърлил компютъра си на сметището през 2013 г.?
answer: Джеймс Хауелс
wrong_answers:
  - Дъстин Трамъл
  - Марти Малми
  - NewLibertyStandard
explanation: |
  Британският инженер е генерирал 8000 биткойна с компютъра си между февруари и април 2009 г. Случаят му е [оповестен](https://www.theguardian.com/technology/2013/nov/27/hard-drive-bitcoin-landfill-site) от Guardian.
reviewed: true

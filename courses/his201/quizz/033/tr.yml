question: 2009'daki hangi Miner, 2013'te bilgisayarını çöpe atarak tüm bitcoinlerini kaybetti?
answer: James Howells
wrong_answers:
  - Dustin Trammell
  - Martti Malmi
  - NewLibertyStandard
explanation: |
  Bu İngiliz mühendis Şubat ve Nisan 2009 tarihleri arasında bilgisayarıyla 8,000 bitcoin üretmişti. Davası Guardian tarafından [kamuoyuna] (https: //www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site) duyurulmuştur.
reviewed: true
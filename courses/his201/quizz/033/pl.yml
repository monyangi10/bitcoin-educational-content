question: Który Miner z 2009 roku stracił wszystkie swoje bitcoiny, wyrzucając swój komputer na śmietnik w 2013 roku?
answer: James Howells
wrong_answers:
  - Dustin Trammell
  - Martti Malmi
  - NewLibertyStandard
explanation: |
  Ten brytyjski inżynier wygenerował na swoim komputerze 8000 bitcoinów między lutym a kwietniem 2009 roku. Jego sprawa została [nagłośniona](https: //www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site) przez Guardian.
reviewed: false
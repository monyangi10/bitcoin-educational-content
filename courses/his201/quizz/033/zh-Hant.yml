question: 來自 2009 年的哪位 Miner 在 2013 年把電腦丟到垃圾場，失去了所有的 bitcoins？
answer: James Howells
wrong_answers:
  - Dustin Trammell
  - Martti Malmi
  - 新自由標準
explanation: |
  這位英國工程師在 2009 年 2 月到 4 月間，用他的電腦製造了 8,000 枚比特幣。他的案例被《衛報》[公開](https: //www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site)。
reviewed: false
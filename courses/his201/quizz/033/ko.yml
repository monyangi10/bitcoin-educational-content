question: 2009년에 컴퓨터를 쓰레기장에 버려 모든 비트코인을 잃은 Miner 중 2013년에 컴퓨터를 쓰레기장에 버린 사람은?
answer: 제임스 하웰스
wrong_answers:
  - 더스틴 트램멜
  - 마르티 말미
  - 뉴리버티스탠다드
explanation: |
  이 영국 엔지니어는 2009년 2월과 4월 사이에 자신의 컴퓨터로 8,000개의 비트코인을 생성했습니다. 그의 사례는 가디언에 의해 [공개](https: //www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site)되었습니다.
reviewed: true
question: کدام Miner از سال 2009 تمام بیت‌کوین‌های خود را با دور انداختن کامپیوترش در زباله‌دان در سال 2013 از دست داد؟
answer: جیمز هاولز
wrong_answers:
  - داستین تراممل
  - مارتتی مالمی
  - نیو لیبرتی استاندارد
explanation: |
  این مهندس بریتانیایی بین فوریه و آوریل ۲۰۰۹ با استفاده از کامپیوتر خود ۸۰۰۰ بیت‌کوین تولید کرده بود. پرونده او توسط گاردین [منتشر](https://www.theguardian.com/technology/2013/nov/27/Hard-drive-Bitcoin-landfill-site) شد.
reviewed: false
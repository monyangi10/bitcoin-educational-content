question: 2009 年哪位矿工因为在 2013 年把他的电脑扔进垃圾场而丢失了所有的比特币？
answer: James Howells
wrong_answers:
  - Dustin Trammell
  - Martti Malmi
  - NewLibertyStandard
explanation: |
  这位英国工程师于 2009 年 2 月至 4 月间用他的电脑生成了 8,000 比特币。这个事件案例被《卫报》[报道](https://www.theguardian.com/technology/2013/nov/27/hard-drive-bitcoin-landfill-site)。

question: Ni kipengele gani kilikosekana katika muundo wa Bitcoin mnamo Oktoba 31, 2008?
answer: Kiasi cha mwisho cha vitengo
wrong_answers:
  - Proof of Work
  - Uthibitishaji wa malipo uliorahisishwa
  - Sehemu ya Blockchain
explanation: |
  Sera ya awali ya fedha ililingana na utoaji wa mara kwa mara (X BTC/block) kama ilivyoonyeshwa na toleo la kwanza la karatasi nyeupe na [mabadilishano] ya Satoshi (https: //www.metzdowd.com/pipermail/cryptography/2008-November/014831.html) na Ray Dillinger.
reviewed: false
question: Jakiego elementu brakowało w projekcie Bitcoin w dniu 31 października 2008 r.?
answer: Skończonej ilości jednostek
wrong_answers:
  - Dowodu pracy
  - Uproszczonej weryfikacji płatności
  - Łańcucha bloków
explanation: |
  Początkowa polityka pieniężna odpowiadała stałej emisji (X BTC/blok), jak wskazano w pierwszej wersji białej księgi i [rozmowy] Satoshiego (https://www.metzdowd.com/pipermail/cryptography/2008-November/014831.html) z Rayem Dillingerem.
reviewed: true

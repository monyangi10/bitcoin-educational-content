question: Кой елемент липсва в дизайна на Bitcoin на 31 октомври 2008 г.?
answer: Крайното количество единици
wrong_answers:
  - Доказателство за работа
  - Опростена проверка на плащанията
  - Блокчейнът
explanation: |
  Първоначалната парична политика съответстваше на постоянна емисия (X BTC/блок), както е посочено в първата версия на бялата книга и [обмена] на Satoshi (https://www.metzdowd.com/pipermail/cryptography/2008-November/014831.html) с Рей Дилинджър.
reviewed: true

question: Welk element ontbrak in het ontwerp van Bitcoin op 31 oktober 2008?
answer: De eindige hoeveelheid eenheden
wrong_answers:
  - Proof of Work
  - Vereenvoudigde betalingsverificatie
  - De Blockchain
explanation: |
  Het aanvankelijke monetaire beleid kwam overeen met een constante uitgifte (X BTC/blok), zoals aangegeven in de eerste versie van het witte papier en Satoshi's [exchanges](https://www.metzdowd.com/pipermail/cryptography/2008-November/014831.html) met Ray Dillinger.
reviewed: true
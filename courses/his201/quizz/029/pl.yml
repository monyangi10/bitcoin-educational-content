question: Jaką krytykę pod adresem wynalazku Satoshiego Nakamoto wyraził w styczniu 2009 r. członek-założyciel cypherpunks John Gilmore?
answer: Bitcoin zanieczyszcza planetę
wrong_answers:
  - Bitcoin ułatwia unikanie opodatkowania
  - Bitcoin jest podatny na ataki Sybil
  - Bitcoin jest deflacyjny
explanation: |
  [Skrytykował](https://www.metzdowd.com/pipermail/cryptography/2009-January/015042.html) Bitcoina za zużywanie energii elektrycznej i generowanie dwutlenku węgla (gazu cieplarnianego).

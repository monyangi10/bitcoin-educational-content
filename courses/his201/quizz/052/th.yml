question: ขนาดบล็อกสูงสุดที่เพิ่มโดย Satoshi ไปยังโปรโตคอล Bitcoin ในเดือนกันยายน 2010 คือเท่าใด?
answer: 1 MB
wrong_answers:
  - 2 MB
  - 4 MB
  - 8 MB
explanation: |
  พารามิเตอร์ MAX_BLOCK_SIZE ถูกเพิ่มในเดือนกรกฎาคม และการจำกัดถูกบังคับใช้กับโหนดเครือข่ายทั้งหมดในวันที่ 12 กันยายน
reviewed: true
question: सितंबर 2010 में Satoshi ने Bitcoin प्रोटोकॉल में अधिकतम ब्लॉक साइज़ कितना जोड़ा था?
answer: 1 एमबी
wrong_answers:
  - 2 मेगाबाइट
  - 4 एमबी
  - 8 एमबी
explanation: |
  MAX_BLOCK_SIZE पैरामीटर जुलाई में जोड़ा गया था, फिर 12 सितंबर से सभी नेटवर्क नोड्स पर इसकी लिमिट लागू कर दी गई।

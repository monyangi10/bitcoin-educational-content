question: Какъв е максималният размер на блока, добавен от Satoshi към протокола Bitcoin през септември 2010 г.?
answer: 1 MB
wrong_answers:
  - 2 MB
  - 4 MB
  - 8 MB
explanation: |
  Параметърът MAX_BLOCK_SIZE беше добавен през юли, а ограничението беше въведено във всички мрежови възли на 12 септември.
reviewed: true
question: In welk jaar werd het Liberty Reserve-systeem stilgelegd door de Amerikaanse autoriteiten?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  Op 24 mei 2013 werden de oprichter, Arthur Budovsky, en zijn belangrijkste medewerkers aangeklaagd en gearresteerd en nam het Amerikaanse Ministerie van Justitie de hoofdsite in beslag.
reviewed: true
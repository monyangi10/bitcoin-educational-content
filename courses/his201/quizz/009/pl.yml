question: W którym roku system Liberty Reserve został zamknięty przez władze USA?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  24 maja 2013 r. jej założyciel, Arthur Budovsky, i jego główni współpracownicy zostali oskarżeni i aresztowani, a główna strona została przejęta przez Departament Sprawiedliwości USA.

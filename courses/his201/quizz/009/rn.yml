question: Ni mu mwaka uwuhe ubuhinga bwa Liberty Reserve bwafunzwe n’abategetsi ba Amerika?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  Ku wa 24 Rusama 2013, uwarishinze, Arthur Budovsky, be n’abo bari kumwe na bo nyamukuru baragirijwe barafatwa, maze Igisata c’Ubutungane ca Leta Zunze Ubumwe za Amerika kirafata ikibanza nyamukuru.
reviewed: true
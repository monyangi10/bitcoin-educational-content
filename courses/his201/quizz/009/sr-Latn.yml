question: U kojoj godini su američke vlasti zatvorile sistem Liberty Reserve?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  Dana 24. maja 2013. godine, njegov osnivač, Arthur Budovsky, i njegovi glavni saradnici su optuženi i uhapšeni, a glavni sajt je zaplenjen od strane Ministarstva pravde SAD.

question: लिबर्टी रिजर्व सिस्टम को अमेरिकी अधिकारियों ने किस साल में बंद कर दिया था?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - २०११
explanation: |
  24 मई 2013 को, इसके संस्थापक, आर्थर बुडोव्स्की, और उसके मुख्य सहयोगियों पर मुकदमा चलाया गया और उन्हें गिरफ्तार कर लिया गया, तथा मुख्य साइट को अमेरिकी न्याय विभाग ने जब्त कर लिया।
reviewed: false
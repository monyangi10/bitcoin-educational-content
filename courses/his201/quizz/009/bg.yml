question: През коя година американските власти закриват системата Liberty Reserve?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  На 24 май 2013 г. основателят на сайта Артур Будовски и основните му сътрудници са обвинени и арестувани, а Министерството на правосъдието на САЩ иззема основния сайт.
reviewed: true
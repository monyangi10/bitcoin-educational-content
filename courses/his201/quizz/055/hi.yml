question: Satoshi ने वैल्यू ओवरफ्लो घटना के बाद सिस्टम पर संभावित कमजोरियों के प्रभाव को सीमित करने के लिए सॉफ्टवेयर में कौन सा तंत्र जोड़ा?
answer: अलर्ट सिस्टम
wrong_answers:
  - लेन-देन का मानक स्वरूप
  - ब्लॉक साइज़ लिमिट
  - ओपी_नॉप ऑप कोड्स
explanation: |
  यह कारगर अलर्ट सिस्टम उसे एक प्राइवेट की के इस्तेमाल से तकनीकी समस्या होने पर नेटवर्क नोड्स को चेतावनी देने और कुछ API कमांड्स को सस्पेंड करने की अनुमति देता था।
reviewed: false
question: หลังจากเหตุการณ์ค่าเกินขีดจำกัด กลไกใดที่ถูกเพิ่มเข้าไปในซอฟต์แวร์โดย Satoshi เพื่อจำกัดผลกระทบของช่องโหว่ที่อาจเกิดขึ้นกับระบบ?
answer: ระบบการแจ้งเตือน
wrong_answers:
  - ลักษณะมาตรฐานของธุรกรรม
  - ขีดจำกัดขนาดบล็อก
  - รหัสปฏิบัติการ OP_NOP
explanation: |
  ระบบการแจ้งเตือนที่มีประสิทธิภาพนี้ทำให้เขาสามารถใช้กุญแจส่วนตัวเพื่อเตือนโหนดเครือข่ายในกรณีที่เกิดปัญหาทางเทคนิคและระงับคำสั่งบางอย่างของ API ได้
reviewed: true
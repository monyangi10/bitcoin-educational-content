question: След инцидента с препълването на стойността какъв механизъм е добавен към софтуера от Satoshi, за да се ограничи въздействието на потенциалните уязвимости върху системата?
answer: Системата за предупреждение
wrong_answers:
  - Стандартният характер на транзакциите
  - Ограничение на размера на блока
  - Кодове на операционната система OP_NOP
explanation: |
  Тази ефективна система за предупреждение му позволи да използва частен ключ, за да предупреди мрежовите възли в случай на технически проблем и да преустанови някои команди на API.
reviewed: true
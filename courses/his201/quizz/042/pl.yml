question: Z jakiego kraju pochodzi Gavin Andresen, który stworzył pierwszy Bitcoin Faucet w czerwcu 2010 roku i pomagał Satoshi w rozwoju oprogramowania?
answer: Australia
wrong_answers:
  - Stany Zjednoczone
  - Francja
  - Holandia
explanation: |
  Urodził się [https: //gavinthink.blogspot.com/2007/06/seven-years-ago-today.html] w Australii, ale obywatelstwo amerykańskie uzyskał w 2004 roku.

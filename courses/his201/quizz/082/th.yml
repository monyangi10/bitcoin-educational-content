question: ชื่อของผู้ก่อตั้งพรรคโจรสลัดสวีเดนที่อธิบาย Bitcoin ว่าเป็น Napster ของการธนาคารในเดือนพฤษภาคม 2011 คืออะไร?
answer: Rick Falkvinge
wrong_answers:
  - สมาริ แม็กคาร์ธี
  - เอ็ดเวิร์ด สโนว์เดน
  - ฟลอเรียน ฮัฟสกี้
explanation: |
  ผู้ที่รักในเสรีภาพ Bitcoin ดูเหมือนจะเป็นความคิดที่ดีเมื่อเขาค้นพบมัน ในปีต่อๆ มา เขาได้เป็นผู้สนับสนุนหลักของสกุลเงินดิจิทัล
reviewed: true
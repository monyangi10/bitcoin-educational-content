question: Jak nazywa się założyciel szwedzkiej Partii Piratów, który w maju 2011 roku określił Bitcoin mianem Napstera bankowości?
answer: Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edward Snowden
  - Florian Hufsky
explanation: |
  Jako miłośnik wolności, Bitcoin wydawał mu się dobrym pomysłem, gdy go odkrył. W kolejnych latach był głównym promotorem kryptowalut.
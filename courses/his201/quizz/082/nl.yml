question: Wat is de naam van de oprichter van de Zweedse Piratenpartij die Bitcoin in mei 2011 beschreef als de Napster van het bankwezen?
answer: Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edward Snowden
  - Florian Hufsky
explanation: |
  Als liefhebber van vrijheid leek Bitcoin een goed idee toen hij het ontdekte. In de jaren die volgden, was hij een grote promotor van cryptocurrency.
reviewed: true
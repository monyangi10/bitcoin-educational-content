question: Ni nde izina ry’uwashinze umuhari w’abasuma(pirates) wo muri Swedee wavuze ko Bitcoin ari Napster w’amabanki muri Rusama 2011?
answer:  Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edward Snowden
  - Florian Hufsky
explanation: |
  Umukunzi w’umwidegemvyo, Bitcoin yasa n’iciyumviro ciza igihe yakivumbura. Mu myaka yakurikiye, yarabaye umushigikiye cane amafaranga y’ivy’ubuhinga bwa none.
reviewed: true

question: Ni nde izina ry’uwashinze umuhari w’abasuma b’amazi wo muri Suède wavuze ko Bitcoin ari Napster w’amabanki muri Rusama 2011?
answer: Riki Falkvinge
wrong_answers:
  - Smari McCarthy
  - Eduwari Snowden
  - Floriyani Hufski
explanation: |
  Umukunzi w’umwidegemvyo, Bitcoin yasa n’iciyumviro ciza igihe yakivumbura. Mu myaka yakurikiye, yarabaye umushigikiye cane amafaranga y’ivy’ubuhinga bwa none.
reviewed: true
question: Как се казва основателят на Шведската пиратска партия, който през май 2011 г. определи Bitcoin като Napster на банковото дело?
answer: Рик Фалквинген
wrong_answers:
  - Smári McCarthy
  - Едуард Сноудън
  - Флориан Хуфски
explanation: |
  Любител на свободата, Bitcoin му се струва добра идея, когато я открива. През следващите години той е основен популяризатор на криптовалутата.
reviewed: true
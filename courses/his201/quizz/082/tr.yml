question: Mayıs 2011'de Bitcoin'ı bankacılığın Napster'ı olarak tanımlayan İsveç Korsan Partisi'nin kurucusunun adı nedir?
answer: Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edward Snowden
  - Florian Hufsky
explanation: |
  Bir özgürlük aşığı olan Bitcoin, onu keşfettiğinde iyi bir fikir gibi göründü. Takip eden yıllarda, kripto para biriminin önemli bir destekçisi oldu.
reviewed: true
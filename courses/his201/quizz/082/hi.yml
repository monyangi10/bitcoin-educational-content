question: स्वीडिश पाइरेट पार्टी के संस्थापक का नाम क्या है, जिन्होंने मई 2011 में Bitcoin को बैंकिंग का नैपस्टर बताया था?
answer: रिक फॉल्कविंग
wrong_answers:
  - स्मारी मैकार्थी
  - एडवर्ड स्नोडेन
  - फ्लोरियन हुफ्स्की
explanation: |
  आज़ादी का चाहने वाला, Bitcoin को उसने एक अच्छा विचार समझा जब उसने इसकी खोज की। उसके बाद के सालों में वह क्रिप्टोकरेंसी का बड़ा प्रचारक बन गया।
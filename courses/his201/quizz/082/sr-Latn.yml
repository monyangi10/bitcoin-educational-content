question: Kako se zove osnivač Švedske piratske partije koji je u maju 2011. opisao Bitcoin kao Napster bankarstva?
answer: Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edvard Snouden
  - Florian Hufsky
explanation: |
  Ljubitelj slobode, Bitcoin mu se činila kao dobra ideja kada ju je otkrio. Bio je glavni promoter kriptovaluta u godinama koje su usledile.
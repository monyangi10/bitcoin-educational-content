question: 2010 में ग्राफिक्स प्रोसेसिंग यूनिट (GPU) के साथ Mining को लागू करने वाला पहला व्यक्ति कौन था?
answer: लास्ज़लो हनयेज़
wrong_answers:
  - बहुत ज्यादा धुआँ
  - आर्टफोर्ज़
  - निल्स श्नाइडर
explanation: |
  अप्रैल 2010 में, उन्होंने Bitcoin Mining में GPU को शामिल करने के लिए OpenCL वातावरण का उपयोग किया। 10 मई को, उन्होंने फ़ोरम पर अपना निष्पादन योग्य [प्रकाशित](https://bitcointalk.org/index.php?topic=124.msg1100#msg1100) किया।
reviewed: true
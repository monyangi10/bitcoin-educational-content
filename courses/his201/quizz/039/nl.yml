question: Wie implementeerde in 2010 als eerste Mining met een grafische verwerkingseenheid (GPU)?
answer: Laszlo Hanyecz
wrong_answers:
  - SmokeTooMuch
  - ArtForz
  - Nils Schneider
explanation: |
  In april 2010 gebruikte hij de OpenCL-omgeving om de GPU bij Bitcoin Mining te betrekken. Op 10 mei [publiceerde](https://bitcointalk.org/index.php?topic=124.msg1100#msg1100) hij zijn uitvoerbare versie op het forum.
reviewed: true
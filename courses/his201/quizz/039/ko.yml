question: 2010년에 그래픽 처리 장치(GPU)로 Mining을 최초로 구현한 사람은 누구인가요?
answer: 라즐로 하녜츠
wrong_answers:
  - SmokeTooMuch
  - 아트포즈
  - 닐스 슈나이더
explanation: |
  2010년 4월, 그는 OpenCL 환경을 사용하여 Bitcoin Mining에 GPU를 포함시켰습니다. 5월 10일, 그는 포럼에 자신의 실행 파일을 [게시](https: //bitcointalk.org/index.php?topic=124.msg1100#msg1100)했습니다.
reviewed: true
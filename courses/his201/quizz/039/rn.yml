question: Ni nde yabanje gushiramwo Mining ifise igikoresho c'inyabwonko (GPU) mu 2010?
answer: Laszlo Hanyecz
wrong_answers:
  - SmokeTooMuch
  - ArtForz
  - Nils Schneider
explanation: |
  Muri Ndamukiza 2010, yakoresheje ubuhinga bwa OpenCL kugira ngo ashiremwo GPU muri Bitcoin Mining. Ku wa 10 Rusama, yarasohoye igikorwa ciwe ku rubuga rw’ihuriro.
reviewed: true

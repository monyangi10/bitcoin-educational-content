question: ฟังก์ชันใดที่ออกแบบในเดือนตุลาคม 2010 โดยนักขุด m0mchil ที่อนุญาตให้โหนดลูกค้าดึงบล็อกผู้สมัครและส่งคืน proof of work หากพบวิธีแก้ปัญหา?
answer: รับงาน
wrong_answers:
  - ชั้น
  - gethash
  - getcredit
explanation: |
  มันถูกเผยแพร่เมื่อวันที่ 1 ตุลาคม ในวันที่ 23 พฤศจิกายน Satoshi ได้รวมเวอร์ชันที่แก้ไขของฟังก์ชันนี้ในซอฟต์แวร์หลัก
reviewed: true
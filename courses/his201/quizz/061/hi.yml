question: अक्टूबर 2010 में Miner m0mchil द्वारा डिज़ाइन किया गया कौन सा फंक्शन, जिसने क्लाइंट नोड्स को एक उम्मीदवार ब्लॉक पाने और अगर कोई समाधान मिला तो Proof of Work वापस करने की अनुमति दी?
answer: काम पाओ
wrong_answers:
  - परत
  - गेटहैश
  - क्रेडिट पाओ (Credit Pao)
explanation: |
  यह 1 अक्टूबर को प्रकाशित हुआ था। Satoshi ने 23 नवंबर को मुख्य सॉफ्टवेयर में इस फंक्शन का संशोधित वर्जन शामिल किया था।
reviewed: false
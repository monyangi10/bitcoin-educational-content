question: Коя функция, разработена през октомври 2010 г. от миньора m0mchil, позволяваше на клиентските възли да извличат блок-кандидат и да връщат proof of work, ако е намерено решение?
answer: работа
wrong_answers:
  - страта
  - gethash
  - получаване на кредит
explanation: |
  Публикувана е на 1 октомври. На 23 ноември Satoshi включи модифицирана версия на тази функция в основния софтуер.
reviewed: true
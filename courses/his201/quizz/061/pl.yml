question: Która funkcja, zaprojektowana w październiku 2010 r. przez górnika m0mchil, umożliwiała węzłom klienckim pobieranie bloku kandydującego i zwracanie dowodu pracy, jeśli znaleziono rozwiązanie?
answer: getwork
wrong_answers:
  - warstwa
  - gethash
  - getcredit
explanation: |
  Została opublikowana 1 października. Satoshi włączył zmodyfikowaną wersję tej funkcji do głównego oprogramowania 23 listopada.
reviewed: true

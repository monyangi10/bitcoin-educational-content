question: Ni igikorwa ikihe, cakozwe mu kwezi kwa Gitugutu 2010 na Miner m0mchil, catumye ama node y’abaguzi ashobora kuronka igice c’abashaka gutora no kugarura Proof of Work iyo umuti wabonetse?
answer: getwork
wrong_answers:
  - stratum
  - gethash
  - getcredit
explanation: |
  Yasohotse kw’igenekerezo rya 1 Gitugutu. Ku wa 23 Munyonyo, Satoshi yashizemwo verisiyo yahinduwe y’iyi nzira muri porogarama nyamukuru.
reviewed: true

question: मार्च 2010 में बना कौन सा Exchange सेवा सबसे लोकप्रिय था जो जुलाई में Mt. Gox के आने से पहले था?
answer: जीडब्ल्यू-1 मार्केट
wrong_answers:
  - बिटकॉइनएफएक्स
  - बिटकॉइन एक्सचेंज
  - मेरा बिटकॉइन
explanation: |
  यह एक पीयर-टू-पीयर मार्केटप्लेस था जो PayPal का इस्तेमाल करता था और 16 मार्च, 2010 को dwdollar नाम के एक व्यक्ति द्वारा लॉन्च किया गया था। यह Mt. Gox से पहले का मुख्य प्लेटफॉर्म था।
reviewed: false
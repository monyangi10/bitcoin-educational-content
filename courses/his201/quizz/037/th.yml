question: บริการแลกเปลี่ยนใดที่สร้างขึ้นในเดือนมีนาคม 2010 ที่ได้รับความนิยมมากที่สุดก่อนการเกิดขึ้นของ Mt. Gox ในเดือนกรกฎาคม?
answer: Bitcoin Market
wrong_answers:
  - BitcoinFX
  - BitcoinExchange
  - มายบิตคอยน์
explanation: |
  ตลาดแบบเพียร์ทูเพียร์นี้ที่ใช้ PayPal ถูกเปิดตัวเมื่อวันที่ 16 มีนาคม 2010 โดยบุคคลที่รู้จักกันในชื่อ dwdollar และเป็นแพลตฟอร์มหลักก่อน Mt. Gox.
reviewed: true
question: Która usługa wymiany stworzona w marcu 2010 roku była najpopularniejsza przed pojawieniem się Mt. Gox w lipcu?
answer: Bitcoin Market
wrong_answers:
  - BitcoinFX
  - BitcoinExchange
  - MyBitcoin
explanation: |
  Była to usługa wymiany peer-to-peer wykorzystująca PayPala, która została uruchomiona 16 marca 2010 r. przez osobę znaną jako dwdollar i była główną platformą wymiany przed Mt. Gox.
reviewed: true

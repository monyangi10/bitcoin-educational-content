question: Кой откри през септември 2011 г. системата за предложения за подобрения на Bitcoin - процес, насочен към координиране на подобренията на Bitcoin?
answer: Амир Тааки
wrong_answers:
  - Гавин Андресен
  - Джеф Гарзик
  - Нилс Шнайдер
explanation: |
  Тази система е създадена по модела на предложенията за усъвършенстване на Python (PEP), специфични за езика за програмиране Python.
reviewed: true
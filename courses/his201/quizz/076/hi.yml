question: सितंबर 2011 में Bitcoin सुधार प्रस्ताव प्रणाली, जिसका उद्देश्य Bitcoin में सुधार को समन्वित करना था, का उद्घाटन किसने किया?
answer: अमीर ताकी
wrong_answers:
  - गेविन एंड्रीसन
  - जेफ गार्ज़िक
  - नील्स श्नाइडर
explanation: |
  यह सिस्टम पायथन प्रोग्रामिंग भाषा के लिए विशेष पायथन एनहैंसमेंट प्रपोज़ल्स (PEP) के बाद बनाया गया था।

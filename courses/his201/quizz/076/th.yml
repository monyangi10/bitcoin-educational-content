question: ใครเป็นผู้เปิดตัวระบบข้อเสนอการปรับปรุง Bitcoin ซึ่งเป็นกระบวนการที่มุ่งเน้นการประสานงานการปรับปรุง Bitcoin ในเดือนกันยายน 2011?
answer: อาเมียร์ ทากิ
wrong_answers:
  - กาวิน แอนเดรเซน
  - เจฟฟ์ การ์ซิก
  - นิลส์ ชไนเดอร์
explanation: |
  ระบบนี้ถูกจำลองมาจากข้อเสนอการปรับปรุง Python (PEP) ที่เฉพาะเจาะจงสำหรับภาษาโปรแกรม Python
reviewed: true
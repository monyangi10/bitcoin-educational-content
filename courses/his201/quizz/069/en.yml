question: Where do Bitcoin developers meet to have more informal technical discussions?
answer: On the IRC channel \#bitcoin-dev
wrong_answers:
  - On a special section of the forum
  - On the bitcoin-development mailing list
  - On the subreddit r/Bitcoin

question: Bitcoin 개발자들은 비공식적인 기술 토론을 위해 어디에서 만나나요?
answer: IRC 채널 \#Bitcoin-dev에서
wrong_answers:
  - 포럼의 특별 섹션에서
  - Bitcoin 개발 메일링 리스트에 가입하기
  - 하위 레딧 r/Bitcoin에서
explanation: |
  이것은 2009년 8월에 Martti Malmi가 [만든](https://mmalmi.github.io/Satoshi/#email-27) 것입니다. 2010년 7월 슬래시닷팅 이후 인기를 얻었습니다.
reviewed: true
question: Gde se Bitcoin developeri sastaju kako bi imali neformalne tehničke diskusije?
answer: Na IRC kanalu \#Bitcoin-dev
wrong_answers:
  - Na posebnom delu foruma
  - Na Bitcoin-development mailing listi
  - Na subredditu r/Bitcoin

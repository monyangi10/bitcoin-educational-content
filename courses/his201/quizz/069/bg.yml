question: Къде се срещат разработчиците на Bitcoin, за да провеждат по-неформални технически дискусии?
answer: В IRC канала \#bitcoin-dev
wrong_answers:
  - В специален раздел на форума
  - В пощенския списък Bitcoin-development
  - В подредбата r/Bitcoin
explanation: |
  Това е [създадено](https://mmalmi.github.io/satoshi/#email-27) от Martti Malmi през август 2009 г. Той придобива известна популярност след публикуването в Slashdot през юли 2010 г.
reviewed: true
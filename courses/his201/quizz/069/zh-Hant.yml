question: Bitcoin 開發人員會在哪裡進行較非正式的技術討論？
answer: 在 IRC 頻道上\#Bitcoin-dev
wrong_answers:
  - 在論壇的特別區
  - 在 Bitcoin-development 郵件列表上
  - 在 subreddit r/Bitcoin 上

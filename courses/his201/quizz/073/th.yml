question: หน่วยข่าวกรองของสหรัฐฯ หน่วยใดที่เชิญ Gavin Andresen ในเดือนเมษายน 2011 ให้มานำเสนอ Bitcoin ในอีกไม่กี่เดือนต่อมา?
answer: ซีไอเอ
wrong_answers:
  - เอฟบีไอ
  - NSA
  - DEA
explanation: |
  ที่เฉพาะเจาะจงมากขึ้นคือ In-Q-Tel ซึ่งเป็นกองทุนร่วมลงทุนของอเมริกาที่บริหารโดย CIA แต่การเยี่ยมชมเกิดขึ้นที่สำนักงานใหญ่ของ CIA
reviewed: true
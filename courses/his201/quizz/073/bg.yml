question: Коя федерална разузнавателна служба на САЩ покани Гавин Андресен през април 2011 г., за да представи Bitcoin няколко месеца по-късно?
answer: ЦРУ
wrong_answers:
  - ФБР
  - АНС
  - DEA
explanation: |
  По-конкретно става дума за In-Q-Tel, американски фонд за рисков капитал, управляван от ЦРУ, но посещението се състоя в централата на ЦРУ.
reviewed: true
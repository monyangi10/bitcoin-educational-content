question: अप्रैल 2011 में किस अमेरिकी फेडरल इंटेलिजेंस सर्विस ने गेविन एंड्रीसन को Bitcoin प्रस्तुत करने के लिए आमंत्रित किया था जो कुछ महीने बाद होना था?  

(नोट: Bitcoin बिटकॉइन का पहला प्रोटोटाइप संस्करण था जिसे गेविन एंड्रीसन ने सातोशी नाकामोतो के कोड बेस पर विकसित किया था। यह सवाल बिटकॉइन के इतिहास से जुड़ा है।)
answer: सीआईए
wrong_answers:
  - एफबीआई (FBI)
  - एनएसए (NSA)
  - डीईए (DEA)
explanation: |
  विशेष रूप से, यह इन-क्यू-टेल था, जो एक अमेरिकी वेंचर कैपिटल फंड है जिसे सीआईए द्वारा मैनेज किया जाता है, लेकिन यह मुलाकात वास्तव में सीआईए के मुख्यालय में हुई थी।
reviewed: false
question: Кой създаде уикипедията Bitcoin.it през декември 2010 г.?
answer: Марк Карпелес (MagicalTux)
wrong_answers:
  - Майкъл Маркуард (Theymos)
  - Марти Малми (sirius-m)
  - Амир Тааки (genjix)
explanation: |
  Идеята [беше](https://buildingbitcoin.org/bitcoin-dev/log-2010-12-16.html#l-2848) да се разработи по-малко официално и по-фокусирано върху общността уики.
reviewed: true

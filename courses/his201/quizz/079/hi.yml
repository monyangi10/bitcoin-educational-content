question: दिसंबर 2010 में Bitcoin.it विकी किसने बनाया था?
answer: मार्क कार्पेल्स (मैजिकलटक्स)
wrong_answers:
  - माइकल मार्क्वार्ड्ट (थीमोस)
  - मार्टी माल्मी (सिरियस-एम)
  - आमिर ताकी (जेनजिक्स)
  The idea [was](https: //buildingbitcoin.org/bitcoin-dev/log-2010-12-16.html#l-2848) to develop a less formal and more community-focused wiki.

question: ใครเป็นผู้สร้างวิกิ Bitcoin.it ในเดือนธันวาคม 2010?
answer: มาร์ค คาร์เพเลส (MagicalTux)
wrong_answers:
  - ไมเคิล มาร์ควาร์ด (Theymos)
  - Martti Malmi (sirius-m)
  - อาเมียร์ ทากิ (genjix)
explanation: |
  แนวคิด [คือ](https: //buildingbitcoin.org/bitcoin-dev/log-2010-12-16.html#l-2848) การพัฒนา wiki ที่ไม่เป็นทางการและมุ่งเน้นชุมชนมากขึ้น
reviewed: true
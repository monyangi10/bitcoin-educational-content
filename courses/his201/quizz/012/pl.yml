question: Jak nazywa się problem dotyczący konsensusu w sieci rozproszonej?
answer: Problem generałów bizantyjskich
wrong_answers:
  - Problem rzymskich centurionów
  - Problem albańskich pułkowników
  - Problem japońskich Taishos
explanation: |
  Nazwa tego problemu (sformalizowana przez Lamporta, Shostaka i Pease'a w 1982 roku) została wybrana, aby nie urazić czytelnika, ponieważ nikt nigdy nie określił się jako bizantyjczyk.
reviewed: true

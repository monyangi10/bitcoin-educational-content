question: वितरित नेटवर्क में सहमति की समस्या को क्या नाम दिया गया है?
answer: बीजान्टिन जनरल्स प्रॉब्लम
wrong_answers:
  - रोमन सेंचुरियन की समस्या
  - अल्बानियाई कर्नलों की समस्या
  - जापानी ताइशो की समस्या
explanation: |
  इस समस्या का नाम (जिसे 1982 में लैम्पोर्ट, शोस्टैक और पीस ने औपचारिक रूप दिया था) पाठक को नाराज़ न करने के लिए चुना गया था, क्योंकि अब तक कोई भी खुद को बाइज़ेंटाइन नहीं कहता है।
reviewed: false
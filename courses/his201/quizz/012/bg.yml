question: Как се нарича проблемът с консенсуса в една разпределена мрежа?
answer: Проблемът с византийските генерали
wrong_answers:
  - Проблемът с римските центуриони
  - Проблемът с албанските полковници
  - Проблемът с японските дайшове
explanation: |
  Името на този проблем (формализирано от Лампорт, Шостак и Пийз през 1982 г.) е избрано, за да не се обиди читателят, тъй като никой никога не се е определял като византиец.
reviewed: true
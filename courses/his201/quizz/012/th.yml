question: ปัญหาฉันทามติในเครือข่ายแบบกระจายเรียกว่าอะไร?
answer: ปัญหาแม่ทัพไบแซนไทน์
wrong_answers:
  - ปัญหาเซนจูเรียนโรมัน
  - ปัญหาพันเอกแอลเบเนีย
  - ปัญหาของไทโชญี่ปุ่น
explanation: |
  ชื่อของปัญหานี้ (ซึ่งถูกทำให้เป็นทางการโดย Lamport, Shostak, และ Pease ในปี 1982) ถูกเลือกเพื่อหลีกเลี่ยงการทำให้ผู้อ่านไม่พอใจ เนื่องจากไม่มีใครเคยระบุว่าตนเองเป็น Byzantine
reviewed: true
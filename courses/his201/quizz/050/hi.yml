question: 18 जुलाई, 2010 को, Bitcoin के बड़े स्लैशडॉटिंग के एक हफ्ते बाद, MT. Gox Exchange प्लेटफॉर्म किसने बनाया था?
answer: जेड मॅकेलेब
wrong_answers:
  - मार्क कार्पेलेस
  - मार्टी माल्मी
  - गेविन एंडरसन
explanation: |
  उसने यह कारगर बाज़ार एक झटके में बना दिया, यह महसूस करते हुए कि Bitcoin को Exchange में डॉलर के बदले पाना कितना मुश्किल था (खासकर Bitcoin मार्केट पर)।
reviewed: false
question: Кой създаде платформата за обмен на Mt. Gox на 18 юли 2010 г., седмица след голямото слъшдотиране на Bitcoin?
answer: Джед Маккалеб
wrong_answers:
  - Марк Карпелес
  - Martti Malmi
  - Гавин Андресен
explanation: |
  Той създава този ефективен пазар по прищявка, осъзнавайки колко трудно е да се получи биткойн в замяна на долари (особено на Bitcoin Market).
reviewed: true
question: Kto stworzył platformę Mt. Gox Exchange 18 lipca 2010 r., tydzień po wielkim slashdottingu Bitcoina?
answer: Jed McCaleb
wrong_answers:
  - Mark Karpelès
  - Martti Malmi
  - Gavin Andresen
explanation: |
  Stworzył tę świetnie działającą platformę dla kaprysu, zdając sobie sprawę, jak trudno było zdobyć bitcoina za dolary (zwłaszcza na Bitcoin Market).
reviewed: true

question: ใครเป็นผู้สร้างแพลตฟอร์มการแลกเปลี่ยน Mt. Gox เมื่อวันที่ 18 กรกฎาคม 2010 หนึ่งสัปดาห์หลังจากการ slashdotting ครั้งใหญ่ของ Bitcoin?
answer: เจด แมคคาเลบ
wrong_answers:
  - มาร์ค คาร์เปเลส
  - Martti Malmi
  - กาวิน แอนเดรเซน
explanation: |
  เขาสร้างตลาดที่มีประสิทธิภาพนี้ขึ้นมาโดยไม่ได้ตั้งใจ เมื่อเขาตระหนักว่าการแลกเปลี่ยนบิตคอยน์เป็นดอลลาร์นั้นยากเพียงใด (โดยเฉพาะในตลาด Bitcoin)
reviewed: true
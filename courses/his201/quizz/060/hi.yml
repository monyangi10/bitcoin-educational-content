question: Bitcoin पर ब्लॉक का उत्पादन करने वाली पहली Mining सहकारी संस्था की स्थापना किसने की?
answer: डबलसी
wrong_answers:
  - कीचड़
  - पुडिनपॉप
  - m0mchil
explanation: |
  उन्होंने 1 दिसंबर को इसका प्रचार किया। ब्लॉक 4 दिसंबर, 2010 को [पाया गया](https://bitcointalk.org/index.php?topic=2027.msg26688#msg26688)। दूसरी ओर, स्लश की सहकारी संस्था 16 दिसंबर को लॉन्च की गई थी।
reviewed: true
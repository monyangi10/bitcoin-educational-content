question: چه کسی اولین تعاونی Mining را برای تولید یک بلوک در Bitcoin تأسیس کرد؟
answer: دابل‌سی
wrong_answers:
  - برفاب
  - پودین‌پاپ
  - m0mchil
explanation: |
  او آن را در ۱ دسامبر تبلیغ کرد. بلاک در [اینجا یافت شد](https://bitcointalk.org/index.php?topic=2027.msg26688#msg26688) در ۴ دسامبر ۲۰۱۰. از سوی دیگر، تعاونی Slush در ۱۶ دسامبر راه‌اندازی شد.
reviewed: false
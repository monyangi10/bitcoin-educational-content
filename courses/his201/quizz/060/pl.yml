question: Kto założył pierwszą pulę wydobywczą produkującą bloki w Bitcoinie?
answer: doublec
wrong_answers:
  - breja
  - puddinpop
  - m0mchil
explanation: |
  Promował ją 1 grudnia. Blok został [znaleziony](https://bitcointalk.org/index.php?topic=2027.msg26688#msg26688) 4 grudnia 2010 roku. Z kolei pula wydobywcza Slush została uruchomiona 16 grudnia.
reviewed: true

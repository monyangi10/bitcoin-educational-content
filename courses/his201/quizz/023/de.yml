question: Wo hat Satoshi Nakamoto das Bitcoin-Whitepaper am 31. Oktober 2008 veröffentlicht?
answer: Die Cryptography-Mailingliste
wrong_answers:
  - Reddit
  - Twitter
  - Hackernews
explanation: |
  Als Nachfolger der Cypherpunks-Mailingliste wurde diese Mailingliste seit 1996 vom Entwickler Perry Metzger verwaltet.
reviewed: true

question: Satoshi नाकामोतो ने Bitcoin व्हाइट पेपर 31 अक्टूबर, 2008 को कहाँ प्रकाशित किया था?
answer: क्रिप्टोग्राफी मेलिंग लिस्ट
wrong_answers:
  - रेडिट
  - ट्विटर
  - हैकरन्यूज़
explanation: |
  साइफरपंक्स मेलिंग लिस्ट के उत्तराधिकारी के रूप में, यह ईमेल मेलिंग लिस्ट 1996 से डेवलपर पैरी मेट्ज़र द्वारा मैनेज की जाती थी।
reviewed: false
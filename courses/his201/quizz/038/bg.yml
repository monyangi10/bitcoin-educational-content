question: Как се наричаше първото приложение за съхранение, което позволяваше простото използване на Bitcoin на мобилен телефон, създадено през април 2010 г.?
answer: MyBitcoin
wrong_answers:
  - Bitcoin Wallet
  - BTC 2 PSC
  - Акула за поверителност
explanation: |
  Той беше [популяризиран](https: //bitcointalk.org/index.php?topic=30.msg1035#msg1035) във форума от някой си Komodo на 30 април 2010 г.
reviewed: true
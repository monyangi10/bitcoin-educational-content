question: แง่มุมใดของ Bitcoin ที่ Satoshi ต้องการลดความสำคัญในการสื่อสารของเขาในเดือนกรกฎาคม 2010?
answer: ความไม่เปิดเผยตัวตนของธุรกรรม
wrong_answers:
  - นโยบายการเงิน
  - อีคอมเมิร์ซ
  - การตั้งโปรแกรมได้
explanation: |
  เกี่ยวกับร่างการนำเสนอสำหรับ Slashdot เขากล่าวว่าเขาไม่ต้องการเน้นย้ำในเรื่องของการไม่เปิดเผยตัวตน เขาอธิบายเหตุผลของเขาให้ Martti Malmi ฟัง [เป็นการส่วนตัว](https://mmalmi.github.io/satoshi/#email-197)
reviewed: true
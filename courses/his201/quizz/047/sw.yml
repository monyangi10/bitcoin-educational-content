question: Je, ni kipengele gani cha Bitcoin ambacho Satoshi ilitaka kupunguza katika mawasiliano yake mnamo Julai 2010?
answer: Kutokujulikana kwa miamala
wrong_answers:
  - Sera ya fedha
  - Biashara ya kielektroniki
  - Uwezo wa kupanga
explanation: |
  Kuhusu uwasilishaji wa rasimu ya Slashdot, alisema hakutaka kuweka kipengele kisichojulikana mbele. Alieleza sababu zake kwa Martti Malmi [kwa faragha](https://mmalmi.github.io/Satoshi/#email-197).
reviewed: false
question: Welk aspect van Bitcoin wilde Satoshi bagatelliseren in zijn mededeling in juli 2010?
answer: De anonimiteit van transacties
wrong_answers:
  - Monetair beleid
  - E-commerce
  - Programmeerbaarheid
explanation: |
  Met betrekking tot de conceptpresentatie voor Slashdot verklaarde hij dat hij het anonieme aspect niet wilde benadrukken. Hij legde zijn redenen uit aan Martti Malmi [privé](https://mmalmi.github.io/Satoshi/#email-197).
reviewed: true
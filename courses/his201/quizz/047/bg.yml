question: Кой аспект на Bitcoin е искал да омаловажи Satoshi в съобщението си от юли 2010 г.?
answer: Анонимността на транзакциите
wrong_answers:
  - Парична политика
  - Електронна търговия
  - Програмируемост
explanation: |
  По отношение на проекта на презентацията за Slashdot той заяви, че не иска да набляга на анонимния аспект. Обяснил е причините си на Martti Malmi [на четири очи](https://mmalmi.github.io/satoshi/#email-197).
reviewed: true

question: Ni uwuhe muce wa Bitcoin Satoshi yipfuje gufata minenerwe mu kiganiro ciwe co muri Nyakanga 2010?
answer: Ugutamenyekana kw'ibikorwa
wrong_answers:
  - Politike y'amahera
  - Ubucuruzi bwo kuri interineti
  - Porogaramu
explanation: |
  Ku bijanye n’umugambi wo gushikiriza Slashdot, yavuze ko adashaka gushimika ku bijanye n’ukutamenyekana. Yasiguriye Martti Malmi imvo ziwe [mu bwiherero].
reviewed: true
question: چه جنبه‌ای از Bitcoin را Satoshi در ارتباطات خود در ژوئیه 2010 می‌خواست کم‌اهمیت جلوه دهد؟
answer: ناشناس بودن تراکنش‌ها
wrong_answers:
  - سیاست پولی
  - تجارت الکترونیک
  - قابلیت برنامه‌ریزی
explanation: |
  در مورد پیش‌نویس ارائه برای Slashdot، او اظهار داشت که نمی‌خواهد جنبه ناشناس بودن را در پیش‌زمینه قرار دهد. او دلایل خود را به صورت خصوصی به Martti Malmi توضیح داد [در اینجا](https://mmalmi.github.io/Satoshi/#email-197).
reviewed: false
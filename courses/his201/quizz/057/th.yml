question: นักขุดชาวเยอรมันคนใดที่ถือครองอัตราแฮชของเครือข่าย Bitcoin ถึง 20% เป็นเวลาหลายเดือนในปี 2010?
answer: ArtForz
wrong_answers:
  - tcatm
  - m0mchil
  - knightmb
explanation: |
  เขาได้จัดตั้งฟาร์ม mining ที่ประกอบด้วยการ์ดจอ (เรียกว่า ArtFarm) ในช่วงฤดูร้อนปี 2010 ทำให้เขามีความได้เปรียบเหนือคู่แข่งอย่างมากในช่วงฤดูใบไม้ร่วง
reviewed: true
question: Ni uwuhe Miner w’Ubudage yari afise 20% vy’igipimo ca Hash c’urubuga rwa Bitcoin mu mezi menshi mu 2010?
answer: Ubuhinga
wrong_answers:
  - tcatm
  - m0m
  - umusirikare
explanation: |
  Yashinze itongo rya Mining rigizwe n’amakarata y’ibishushanyo (ryitwa ArtFarm) mu ci ca 2010, gutyo aronka uburongozi bukomeye ku bariko barahiganwa mu mpera z’umwaka.
reviewed: true
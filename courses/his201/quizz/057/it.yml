question: Quale miner tedesco ha detenuto il 20% dell'hash rate del network Bitcoin per diversi mesi nel 2010?
answer: ArtForz
wrong_answers:
  - tcatm
  - m0mchil
  - knightmb
explanation: |
  Ha allestito una mining farm composta da schede grafiche (chiamata ArtFarm) durante l'estate del 2010, ottenendo così un notevole vantaggio sui suoi concorrenti entro l'autunno.
reviewed: false

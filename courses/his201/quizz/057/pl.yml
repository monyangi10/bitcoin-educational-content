question: Który niemiecki górnik utrzymywał 20% wskaźnika haszowania sieci Bitcoin przez kilka miesięcy w 2010 roku?
answer: ArtForz
wrong_answers:
  - tcatm
  - m0mchil
  - knightmb
explanation: |
  Latem 2010 roku założył farmę wydobywczą składającą się z kart graficznych (zwaną ArtFarm), dzięki czemu jesienią zyskał znaczną przewagę nad konkurencją.
reviewed: true

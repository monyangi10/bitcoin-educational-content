question: कौन सा जर्मन Miner ने 2010 में कई महीनों तक Bitcoin नेटवर्क की Hash दर का 20% हिस्सा रखा था?
answer: आर्टफोर्ज़
wrong_answers:
  - टीसीएटीएम
  - माँ
  - "नाइट एम बी" (Knight MB)
explanation: |
  उसने 2010 की गर्मियों में ग्राफिक्स कार्ड्स से बना एक Mining फार्म (जिसे ArtFarm कहा जाता था) सेट किया, जिससे कि पतझड़ तक वह अपने प्रतिद्वंदियों पर काफी बढ़त हासिल कर ली।
reviewed: false
question: Кой германски миньор държеше 20% от хеш процента на мрежата Bitcoin в продължение на няколко месеца през 2010 г.?
answer: ArtForz
wrong_answers:
  - tcatm
  - m0mchil
  - knightmb
explanation: |
  През лятото на 2010 г. той създава ферма mining, съставена от графични карти (наречена ArtFarm), като по този начин до есента набира значителна преднина пред конкурентите си.
reviewed: true

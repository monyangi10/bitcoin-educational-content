question: Кои криптографи създават криптосистемата RSA през 1978 г.?
answer: Роналд Ривест, Ади Шамир и Леонард Адлеман
wrong_answers:
  - Уитфийлд Дифи, Мартин Хелман и Ралф Меркъл
  - Марк Жиро, Гийом Пупар и Жак Стърн
  - Алфред Менезес, Минхуа Ку и Скот Ванстоун
explanation: |
  Ривест, Шамир и Адлеман нарекоха алгоритъма RSA, използвайки своите три инициала.
reviewed: true
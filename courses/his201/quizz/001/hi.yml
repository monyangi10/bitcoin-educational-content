question: 1978 में RSA क्रिप्टोसिस्टम किन क्रिप्टोग्राफरों ने बनाया था?
answer: रोनाल्ड रिवेस्ट, आदि शामिर, और लियोनार्ड एडलमैन
wrong_answers:
  - व्हिटफील्ड डिफी, मार्टिन हेलमैन, और राल्फ मर्कले
  - मार्क गिरो, गिलौम पूपार, और जैक्स स्टर्न
  - अल्फ्रेड मेनेजेस, मिंगहुआ क्यू, और स्कॉट वैनस्टोन
explanation: |
  रिवेस्ट, शामिर और एडलमैन ने अपने तीनों नामों के पहले अक्षरों (आरएसए) का इस्तेमाल करके इस एल्गोरिदम का नाम रखा।
reviewed: false
question: นักเข้ารหัสลับคนใดที่สร้างระบบการเข้ารหัส RSA ในปี 1978?
answer: โรนัลด์ ริเวสต์, อาดี ชาเมียร์, และลีโอนาร์ด แอดเลแมน
wrong_answers:
  - วิทฟิลด์ ดิฟฟี่, มาร์ติน เฮลล์แมน, และราล์ฟ เมอร์เคิล
  - Marc Girault, Guillaume Poupard, และ Jacques Stern
  - อัลเฟรด เมเนเซส, หมิงหัว ฉวี่, และ สก็อตต์ แวนสโตน
explanation: |
  Rivest, Shamir, และ Adleman ตั้งชื่ออัลกอริทึม RSA โดยใช้ตัวอักษรย่อสามตัวของพวกเขา
reviewed: true
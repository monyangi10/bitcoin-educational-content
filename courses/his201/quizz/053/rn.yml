question: Ni igiki congerewe mu ci ca 2010 catumye habaho amaforogo ya Soft muri Bitcoin?
answer: Kode z'imikorere ya OP_NOP
wrong_answers:
  - Uburyo bwo kugabisha
  - Ingano y'ibubiko
  - Uburyo busanzwe bwo gucuruza
explanation: |
  Ivyo vyari amabwirizwa ya no-op atashobora guhindura inyandiko iyo ikoreshejwe. Bashoboje kwongerako OP_GUSUZUMA IGIHE C'ISAHA ​​na OP_GUSUZUMA URUTONDE ku masezerano mu 2015/2016.
reviewed: true
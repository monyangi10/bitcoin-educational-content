question: Кое допълнение през лятото на 2010 г. впоследствие позволи използването на меки вилици в Bitcoin?
answer: Кодове на операциите на OP_NOP
wrong_answers:
  - Системата за предупреждение
  - Ограничение на размера на блока
  - Стандартният формат на транзакцията
explanation: |
  Това са инструкции без избор, които не водят до невалидност на скрипта, ако бъдат изпълнени. Те позволиха добавянето на OP_CHECKLOCKTIMEVERIFY и OP_CHECKSEQUENCEVERIFY към протокола през 2015/2016 г.
reviewed: true
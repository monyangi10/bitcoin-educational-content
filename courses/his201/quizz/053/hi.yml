question: 2010 की गर्मियों में कौन सा जोड़ Bitcoin में बाद में Soft फोर्क्स की अनुमति देता था?
answer: ओपी_नॉप ऑपरेशन कोड्स
wrong_answers:
  - अलर्ट सिस्टम
  - ब्लॉक साइज़ लिमिट
  - स्टैंडर्ड ट्रांजैक्शन फॉर्मेट
explanation: |
  ये नो-ऑप इंस्ट्रक्शन थे जो स्क्रिप्ट को अमान्य नहीं करते थे अगर एक्सीक्यूट किए जाते। इन्होंने 2015/2016 में प्रोटोकॉल में OP_CHECKLOCKTIMEVERIFY और OP_CHECKSEQUENCEVERIFY को जोड़ने की सुविधा दी।
reviewed: false
question: การเพิ่มเติมในฤดูร้อนปี 2010 ที่ตามมาทำให้สามารถใช้ซอฟต์ฟอร์กใน Bitcoin ได้คืออะไร?
answer: รหัสปฏิบัติการ OP_NOP
wrong_answers:
  - ระบบการแจ้งเตือน
  - ขีดจำกัดขนาดบล็อก
  - รูปแบบธุรกรรมมาตรฐาน
explanation: |
  เหล่านี้เป็นคำสั่ง no-op ที่ไม่ทำให้สคริปต์เป็นโมฆะหากถูกดำเนินการ พวกเขาช่วยให้สามารถเพิ่ม OP_CHECKLOCKTIMEVERIFY และ OP_CHECKSEQUENCEVERIFY เข้ากับโปรโตคอลในปี 2015/2016
reviewed: true
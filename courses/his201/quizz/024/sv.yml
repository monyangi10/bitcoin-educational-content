  - John R. Levine
  - Ray Dillinger
explanation: |
  Den 7 november skrev han till listan att Bitcoin [verkade] vara en mycket lovande idé. De andra var mer skeptiska. (https://www.metzdowd.com/pipermail/cryptography/2008-November/014827.html)

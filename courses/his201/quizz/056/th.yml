question: รูปแบบผลลัพธ์สคริปต์มาตรฐานที่ซอฟต์แวร์รู้จักในเดือนกันยายน 2010 คืออะไร?
answer: ใบเสร็จโดยคีย์สาธารณะ (P2PK) และใบเสร็จโดยที่อยู่ (P2PKH)
wrong_answers:
  - การรับโดยที่อยู่ (P2PKH) และการรับโดยสคริปต์ลายเซ็นหลายลายเซ็น (P2MS)
  - การรับโดยที่อยู่ (P2PKH) และการรับโดยสคริปต์ (P2SH)
  - ใบเสร็จโดยคีย์สาธารณะ (P2PK) และใบเสร็จโดยสคริปต์ (P2SH)
explanation: |
  นี่คือสองประเภทที่ใช้มาตั้งแต่เริ่มต้นของ Bitcoin ประเภท P2MS ถูกทำให้เป็นมาตรฐานในเดือนมีนาคม 2012 และประเภท P2SH ถูกเพิ่มเข้าไปในโปรโตคอลในเดือนเมษายน 2012
reviewed: true
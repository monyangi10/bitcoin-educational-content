question: Какви са стандартните модели за извеждане на скриптове, разпознати от софтуера през септември 2010 г.?
answer: Получаване чрез публичен ключ (P2PK) и получаване чрез адрес (P2PKH)
wrong_answers:
  - Получаване чрез адрес (P2PKH) и получаване чрез скрипт за многоподписване (P2MS)
  - Получаване от адрес (P2PKH) и получаване от скрипт (P2SH)
  - Получаване чрез публичен ключ (P2PK) и получаване чрез скрипт (P2SH)
explanation: |
  Това са двата типа, използвани от началото на Bitcoin. Типът P2MS беше превърнат в стандарт през март 2012 г., а типът P2SH беше добавен към протокола през април 2012 г.
reviewed: true
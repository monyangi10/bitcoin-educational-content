question: सितंबर 2010 में सॉफ्टवेयर द्वारा पहचाने जाने वाले स्टैंडर्ड स्क्रिप्ट आउटपुट पैटर्न क्या थे?
answer: सार्वजनिक कुंजी द्वारा रसीद (P2PK) और Address द्वारा रसीद (P2PKH)
wrong_answers:
  - Address (P2PKH) द्वारा रसीद और मल्टीसिग्नेचर स्क्रिप्ट (P2MS) द्वारा रसीद
  - Address (P2PKH) द्वारा रसीद और स्क्रिप्ट (P2SH) द्वारा रसीद
  - सार्वजनिक कुंजी द्वारा रसीद (P2PK) और स्क्रिप्ट द्वारा रसीद (P2SH)
explanation: |
  ये Bitcoin की शुरुआत से इस्तेमाल होने वाले दो प्रकार थे। P2MS टाइप को मार्च 2012 में स्टैंडर्ड बना दिया गया था। P2SH टाइप को प्रोटोकॉल में अप्रैल 2012 में जोड़ा गया था।
reviewed: false
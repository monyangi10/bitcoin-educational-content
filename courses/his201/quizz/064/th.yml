question: ใครคือผู้เขียนบทความแรกที่แนะนำ Bitcoin ที่ตีพิมพ์เป็นภาษาฝรั่งเศส?
answer: ลูเซียง กรองแด็ง (grondilu)
wrong_answers:
  - Lionel Dricot (Ploum)
  - Amaury Séchet (deadalnix)
  - เดวิด ฟรองซัวส์ (davout)
explanation: |
  มันเป็น [text](https://linuxfr.org/news/connaissez-vous-les-bitcoins) ที่เผยแพร่เมื่อวันที่ 30 กันยายน 2010 บน LinuxFr.org ชื่อว่า คุณรู้จักบิตคอยน์หรือไม่?.
reviewed: true
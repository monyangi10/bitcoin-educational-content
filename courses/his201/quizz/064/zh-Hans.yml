question: 下面哪位是第一篇用法语介绍比特币的文章的作者？
answer: Lucien Grondin (grondilu)
wrong_answers:
  - Lionel Dricot (Ploum)
  - Amaury Séchet (deadalnix)
  - David François (davout)
explanation:
  这是一篇于 2010 年 9 月 30 日在 LinuxFr.org 上发布的[文本](https://linuxfr.org/news/connaissez-vous-les-bitcoins)，标题为“你了解比特币吗？”（Do you know about bitcoins？）。

question: Wie was de auteur van het eerste artikel over Bitcoin dat in het Frans werd gepubliceerd?
answer: Lucien Grondin (grondilu)
wrong_answers:
  - Lionel Dricot (Ploum)
  - Amaury Séchet (deadalnix)
  - David François (davout)
explanation: |
  Het was een [tekst](https://linuxfr.org/news/connaissez-vous-les-bitcoins) gepubliceerd op 30 september 2010 op LinuxFr.org met de titel Weet jij iets over bitcoins?
reviewed: true
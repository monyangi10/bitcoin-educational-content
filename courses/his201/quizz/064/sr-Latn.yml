question: Ko je bio autor prvog članka koji je uveo Bitcoin objavljenog na francuskom?
answer: Lucien Grondin (grondilu)
wrong_answers:
  - Lionel Dricot (Ploum)
  - Amaury Séchet (deadalnix)
  - David François (davout)
explanation: |
  To je bio [tekst](https: //linuxfr.org/news/connaissez-vous-les-bitcoins) objavljen 30. septembra 2010. na LinuxFr.org pod naslovom Da li znate za bitkoine?.

question: Co spowodowało nagłe odejście Satoshi Nakamoto w grudniu 2010 roku?
answer: Publikacja artykułu łączącego Bitcoina i WikiLeaks
wrong_answers:
  - Akceptacja Bitcoina przez WikiLeaks
  - Przejęcie kontroli nad kodem przez Gavina Andresena
  - Wzrost ceny jednostkowej Bitcoina
explanation: |
  Zatytułowany Czy skandal WikiLeaks może doprowadzić do powstania nowej wirtualnej waluty, ten [artykuł](https://www.pcworld.com/article/499375/could_wikileaks_scandal_lead_to_new_virtual_currency.html) został opublikowany na PC World, jednej z największych amerykańskich stron internetowych poświęconych komputerom.
reviewed: true

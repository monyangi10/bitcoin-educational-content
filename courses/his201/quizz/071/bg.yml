question: Какво предизвика внезапното напускане на Satoshi Nakamoto през декември 2010 г.?
answer: Публикуването на статия, свързваща Bitcoin и WikiLeaks
wrong_answers:
  - Приемането на биткойн от WikiLeaks
  - Гавин Андресен поема контрола върху кода
  - Увеличението на единичната цена на биткойн
explanation: |
  Под заглавие "Може ли скандалът с Wikileaks да доведе до нова виртуална валута?" тази [статия](https: //www.pcworld.com/article/499375/could_wikileaks_scandal_lead_to_new_virtual_currency.html) е публикувана в PC World, един от най-големите американски уебсайтове, посветени на компютрите.
reviewed: true
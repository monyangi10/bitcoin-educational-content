question: Satoshi नाकामोटो के दिसंबर 2010 में अचानक चले जाने का क्या कारण था?
answer: Bitcoin और विकिलीक्स को जोड़ने वाले एक लेख का प्रकाशन
wrong_answers:
  - विकिलीक्स द्वारा Bitcoin को स्वीकृति
  - गेविन एंड्रीसन कोड का कंट्रोल ले रहे हैं
  - Bitcoin की यूनिट कीमत में वृद्धि

question: Ni nini kilisababisha kuondoka kwa ghafla kwa Satoshi Nakamoto mnamo Desemba 2010?
answer: Kuchapishwa kwa makala inayounganisha Bitcoin na WikiLeaks
wrong_answers:
  - Kukubalika kwa Bitcoin na WikiLeaks
  - Gavin Andresen akichukua udhibiti wa kanuni
  - Kuongezeka kwa bei ya kitengo cha Bitcoin
explanation: |
  Inayoitwa Je, Kashfa ya Wikileaks Inaweza Kuongoza kwa Sarafu Mpya ya Mtandaoni?, [makala] (https: //www.pcworld.com/article/499375/could_wikileaks_scandal_lead_to_new_virtual_currency.html) ilichapishwa kwenye PC World, mojawapo ya tovuti kubwa zaidi za Kimarekani zinazojihusisha na kompyuta.

question: 2010년 12월에 Satoshi 나카모토가 갑작스럽게 떠난 이유는 무엇인가요?
answer: Bitcoin과 위키리크스를 연결하는 기사 게시
wrong_answers:
  - 위키리크스에 의한 Bitcoin 수용
  - 코드를 제어하는 개빈 안드레센
  - Bitcoin의 단가 인상
explanation: |
  "위키리크스 스캔들이 새로운 가상 화폐로 이어질 수 있을까?"라는 제목의 이 [기사](https://www.pcworld.com/article/499375/could_wikileaks_scandal_lead_to_new_virtual_currency.html)는 미국 최대 컴퓨터 전문 웹사이트 중 하나인 PC World에 게재되었습니다.
reviewed: true
question: Satoshi Nakamoto'nun Aralık 2010'da aniden ayrılmasına ne sebep oldu?
answer: Bitcoin ve WikiLeaks arasında bağlantı kuran bir makalenin yayınlanması
wrong_answers:
  - Bitcoin'nin WikiLeaks tarafından kabul edilmesi

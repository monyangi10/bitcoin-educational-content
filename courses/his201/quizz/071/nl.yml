question: Wat veroorzaakte het abrupte vertrek van Satoshi Nakamoto in december 2010?
answer: De publicatie van een artikel dat Bitcoin en WikiLeaks verbindt
wrong_answers:
  - De aanvaarding van Bitcoin door WikiLeaks
  - Gavin Andresen neemt controle over de code
  - De stijging van de eenheidsprijs van Bitcoin
explanation: |
  Getiteld "Kan het Wikileaks-schandaal leiden tot een nieuwe virtuele valuta?", werd dit [artikel](https://www.pcworld.com/article/499375/could_wikileaks_scandal_lead_to_new_virtual_currency.html) gepubliceerd op PC World, een van de grootste Amerikaanse websites gewijd aan computers.
reviewed: true
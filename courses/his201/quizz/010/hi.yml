question: पेपैल के निर्माण के पीछे मुख्य शख्सियत कौन थी?
answer: पीटर थील
wrong_answers:
  - एलन मस्क
  - मार्क एंड्रीसन
  - मार्क ज़करबर्ग
explanation: |
  पेपैल प्रोडक्ट को 1999 में कॉन्फिनिटी इंक. ने डेवलप किया था, जिसकी स्थापना दिसंबर 1998 में सैन फ्रांसिस्को में पीटर थिएल और मैक्स लेवचिन ने मिलकर की थी।
reviewed: false
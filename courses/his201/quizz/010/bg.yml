question: Коя е основната личност, която стои зад създаването на PayPal?
answer: Питър Тил
wrong_answers:
  - Елон Мъск
  - Марк Андресен
  - Марк Зукърбърг
explanation: |
  Продуктът на PayPal е разработен през 1999 г. от компанията Confinity Inc., която е основана през декември 1998 г. в Сан Франциско от Питър Тийл и Макс Левчин.
reviewed: true

question: Ni nde yari umuntu nyamukuru yatumye PayPal iremwa?
answer: Petero Tiyeli
wrong_answers:
  - Eloni Musk
  - Mariko Andereseni
  - Mariko Zukabergi
explanation: |
  Ico gikoresho ca PayPal cakozwe mu mwaka w’1999 na Confinity Inc., kikaba cashinzwe mu kwezi kwa kigarama 1998 i San Francisco na Peter Thiel na Max Levchin.
reviewed: true
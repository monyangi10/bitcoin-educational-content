question: บุคคลหลักที่อยู่เบื้องหลังการสร้าง PayPal คือใคร?
answer: ปีเตอร์ ธีล
wrong_answers:
  - อีลอน มัสก์
  - มาร์ค แอนดรีสเซน
  - มาร์ก ซักเคอร์เบิร์ก
explanation: |
  ผลิตภัณฑ์ PayPal ถูกพัฒนาขึ้นในปี 1999 โดย Confinity Inc. ซึ่งก่อตั้งร่วมกันในเดือนธันวาคม 1998 ที่ซานฟรานซิสโกโดย Peter Thiel และ Max Levchin
reviewed: true
question: Kto był główną postacią stojącą za stworzeniem PayPal?
answer: Peter Thiel
wrong_answers:
  - Elon Musk
  - Marc Andreessen
  - Mark Zuckerberg
explanation: |
  Produkt PayPal został opracowany w 1999 r. przez firmę Confinity Inc. współzałożoną w grudniu 1998 r. w San Francisco przez Petera Thiela i Maxa Levchina.
reviewed: false
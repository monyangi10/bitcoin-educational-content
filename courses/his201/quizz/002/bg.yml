question: На какъв процес се основава моделът за електронни пари eCash?
answer: Слепи подписи
wrong_answers:
  - Групови подписи
  - Подписи на пръстени
  - Прагови подписи
explanation: |
  eCash се основава на процеса на сляпо подписване, който позволява на подписващия да подпише нещо, без да вижда какво подписва.
reviewed: true
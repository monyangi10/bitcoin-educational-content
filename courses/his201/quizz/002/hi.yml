question: eCash इलेक्ट्रॉनिक मनी मॉडल किस प्रक्रिया पर आधारित है?
answer: अंधा हस्ताक्षर (Blind signatures)
wrong_answers:
  - ग्रुप सिग्नेचर्स
  - रिंग सिग्नेचर
  - थ्रेशोल्ड सिग्नेचर्स
explanation: |
  eCash ब्लाइंड सिग्नेचर प्रक्रिया पर आधारित है, जो साइन करने वाले को यह देखे बिना कुछ साइन करने की अनुमति देता है कि वे क्या साइन कर रहे हैं।

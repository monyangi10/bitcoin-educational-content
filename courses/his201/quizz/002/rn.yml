question: Ni ubuhe buhinga amahera y'ubuhinga bwa none ecash ahagazeko?
answer: Imikono y'impumyi(Blind signatures)
wrong_answers:
  - Imikono y'umugwi(Group signatures)
  - Imikono y'impeta(Ring signatures)
  - Imikono y'imbere(Threshold signatures)
explanation: |
  eCash ishingiye ku mukono w'impumyi(Blind signatures), ivyo bikaba bituma uwusinya ashobora gusinya ku kintu atabona ico ariko arasinya.
reviewed: true

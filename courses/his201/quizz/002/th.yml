question: กระบวนการใดที่รูปแบบเงินอิเล็กทรอนิกส์ eCash อิงตาม?
answer: ลายเซ็นแบบบอด
wrong_answers:
  - ลายเซ็นกลุ่ม
  - ลายเซ็นวงแหวน
  - ลายเซ็นแบบ Threshold
explanation: |
  eCash ใช้กระบวนการลายเซ็นต์แบบปิดบัง ซึ่งช่วยให้ผู้ลงนามสามารถลงนามในบางสิ่งโดยไม่เห็นสิ่งที่พวกเขากำลังลงนาม
reviewed: true
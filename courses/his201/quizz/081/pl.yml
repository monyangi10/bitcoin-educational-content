question: Kto wyprodukował pierwszy wysokiej jakości film o Bitcoinie w marcu 2011 roku?
answer: Stefan Thomas
wrong_answers:
  - Mike Hearn
  - Christian Decker
  - Bruce Wagner
explanation: |
  Film, zatytułowany po prostu "Czym jest Bitcoin?", został wyprodukowany dzięki zbiórce pieniędzy.
reviewed: true

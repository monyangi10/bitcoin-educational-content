question: Ni nde yasohoye videwo ya mbere ibona neza yerekeye Bitcoin muri Ntwarante 2011?
answer: Stefan Thomas
wrong_answers:
  - Mike Hearn
  - Christian Decker
  - Bruce Wagner
explanation: |
  Iyo videwo yitwa "What is Bitcoin?(Bitcoin ni iki?)", yakozwe biciye mu bufasha bw'abagize uwo umuryango.

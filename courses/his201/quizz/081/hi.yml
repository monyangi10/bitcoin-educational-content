question: मार्च 2011 में Bitcoin के बारे में पहली हाई-क्वालिटी वीडियो किसने बनाई थी?
answer: स्टीफन थॉमस
wrong_answers:
  - माइक हर्न
  - क्रिश्चन डेकर
  - ब्रूस वैगनर
explanation: |
  वीडियो, जिसका सीधा-सादा नाम है "Bitcoin क्या है?", कम्युनिटी द्वारा क्राउडफंडिंग के जरिए बनाया गया था।
reviewed: false
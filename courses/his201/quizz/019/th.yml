question: ชื่อของโปรโตคอลเครดิตแบบกระจายที่ออกแบบโดย Ryan Fugger ในปี 2004 และถูกกล่าวถึงหลายครั้งโดย Satoshi Nakamoto ในงานเขียนของเขาคืออะไร?
answer: ระลอก
wrong_answers:
  - คลื่น
  - สึนามิ
  - บวม
explanation: |
  ในปี 2009, Satoshi [เขียน](https: //diyhpl.us/~bryan/irc/bitcoin-satoshi/p2presearch-again/p2pfoundation.net/backups/p2p_research-archives/2009-February/001362.html) ว่า Ripple \[เป็น\] เอกลักษณ์ในแง่ที่ว่ามันกระจายความไว้วางใจแทนที่จะรวมศูนย์มัน.
reviewed: true
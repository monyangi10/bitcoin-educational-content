question: Wie hieß das von Ryan Fugger im Jahr 2004 entworfene verteilte Kreditprotokoll, das mehrmals von Satoshi Nakamoto in seinen Schriften erwähnt wurde?
answer: Ripple
wrong_answers:
  - Waves
  - Tsunami
  - Swell
explanation: |
  Im Jahr 2009 [schrieb](https://diyhpl.us/~bryan/irc/bitcoin-satoshi/p2presearch-again/p2pfoundation.net/backups/p2p_research-archives/2009-February/001362.html) Satoshi, dass Ripple einzigartig darin \[war\], Vertrauen zu verbreiten, anstatt es zu konzentrieren.
reviewed: true

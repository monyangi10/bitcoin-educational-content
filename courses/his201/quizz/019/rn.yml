question: Iryo tegeko ry’ingurane itanga ryari riteguwe na Ryan Fugger mu 2004, rikaba ryavuzwe incuro nyinshi na Satoshi Nakamoto mu vyanditswe vyiwe ryari irihe?
answer: Ripple
wrong_answers:
  - Waves
  - Tsunami
  - Swell
explanation: |
  Mu mwaka w’2009, Satoshi [yanditse](https://diyhpl.us/~bryan/irc/Bitcoin-Satoshi/ubushakashatsi-bwa mbere/ububiko bw’ubushakashatsi/2009-Ruhuhuma2hl. \[yari\] idasanzwe kuko yakwiragije ukwizigira aho kukwibanda ku kintu.
reviewed: true

question: Iryo tegeko ry’inguzanyo ry’ugutanga ryari riteguwe na Ryan Fugger mu 2004, rikaba ryavuzwe incuro nyinshi na Satoshi Nakamoto mu vyanditswe vyiwe ryari irihe?
answer: Umupfunda
wrong_answers:
  - Imiraba
  - Inkubi y'umuyaga
  - Gushuha
explanation: |
  Mu mwaka w’2009, Satoshi [yanditse](https: //diyhpl.us/~bryan/irc/Bitcoin-Satoshi/ubushakashatsi-bwa mbere/ububiko bw’ubushakashatsi/2009-Ruhuhuma2hl. \[yari\] idasanzwe kuko yakwiragije ukwizigira aho kukwibanda ku kintu.
reviewed: true
question: Ryan Fugger tarafından 2004 yılında tasarlanan ve Satoshi Nakamoto'nun yazılarında birkaç kez bahsettiği dağıtık kredi protokolünün adı neydi?
answer: Dalgalanma
wrong_answers:
  - Dalgalar
  - Tsunami
  - Harika
explanation: |
  2009 yılında Satoshi [yazdı](https://diyhpl.us/~bryan/irc/Bitcoin-Satoshi/p2presearch-again/p2pfoundation.net/backups/p2p_research-archives/2009-February/001362.html) Ripple \[was\] güveni yoğunlaştırmak yerine yaydığı için benzersizdir.
reviewed: true
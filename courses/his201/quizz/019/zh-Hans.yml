question: 2004 年，Ryan Fugger 设计的分布式信用协议叫什么名字？其在中本聪著作中被多次提到？
answer: Ripple
wrong_answers:
  - Waves
  - Tsunami
  - Swell
explanation: |
  2009 年，中本聪[写道](https://diyhpl.us/~bryan/irc/bitcoin-satoshi/p2presearch-again/p2pfoundation.net/backups/p2p_research-archives/2009-February/001362.html)，“Ripple \[是\]独一无二的，因为它传播信任而不是把信任集中起来”。
reviewed: false

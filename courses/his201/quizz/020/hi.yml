question: Satoshi नाकामोटो ने Bitcoin के शुरुआती डिज़ाइन के दौरान मुख्य प्रेरणा क्या ली थी?
answer: ई-कैश (डेविड चॉम)
wrong_answers:
  - बी-मनी (वेई दाई)  

(नोट: "b-money" को हिंदी में "बी-मनी" लिखा जाता है, जो एक डिजिटल करेंसी कॉन्सेप्ट है जिसे 1998 में वेई दाई ने प्रस्तावित किया था। यह बिटकॉइन जैसी क्रिप्टोकरेंसी का अग्रदूत माना जाता है।)
  - बिट गोल्ड (निक स्जाबो)
  - आरपीओडब्ल्यू (हाल फिन्नी)
explanation: |
  उनकी बड़ी समानताओं के बावजूद, बी-मनी, बिट गोल्ड, और आरपीओडब्ल्यू के मॉडल Satoshi की मुख्य प्रेरणा नहीं थे, क्योंकि अगस्त 2008 से पहले उन्हें इनके बारे में पता ही नहीं था।
reviewed: false
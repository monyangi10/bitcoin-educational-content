question: Ni igiki catumye Satoshi Nakamoto akora cane mu gihe yariko arahingura Bitcoin?
answer: eCash (David Chaum)
wrong_answers:
  - b-money (Wei Dai)
  - Bit gold (Nick Szabo)
  - RPOW (Hali Fini)
explanation: |
  Naho basa cane, ikintu nyamukuru ca Satoshi nticari ivyitegererezo vya b-money, bit gold, na RPOW kuko yari abifise muri make.
reviewed: true

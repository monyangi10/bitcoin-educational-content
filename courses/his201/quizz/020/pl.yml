question: Co było główną inspiracją Satoshiego Nakamoto podczas wstępnego projektowania Bitcoina?
answer: eCash (David Chaum)
wrong_answers:
  - b-money (Wei Dai)
  - bit gold (Nick Szabo)
  - RPOW (Hal Finney)
explanation: |
  Pomimo dużych podobieństw, modele b-money, bit gold i RPOW nie były główną inspiracją Satoshiego, ponieważ po prostu nie wiedział o ich istnieniu przed sierpniem 2008 roku.
reviewed: true

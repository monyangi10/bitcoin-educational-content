question: Welk forumlid maakte zijn Mining algoritme openbaar na een genereuze donatie van Jeff Garzik op 18 september 2010?
answer: puddingpop
wrong_answers:
  - nelisky
  - m0mchil
  - tcatm
explanation: |
  Tot dan toe hadden ze geprofiteerd van een commissie op het gebruik van hun software. Ze [publiceerden](https://bitcointalk.org/index.php?topic=133.msg13135#msg13135) het onder een vrije licentie.
reviewed: true
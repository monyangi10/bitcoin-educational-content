question: کدام عضو انجمن الگوریتم Mining خود را پس از دریافت یک کمک مالی سخاوتمندانه از جف گارزیک در 18 سپتامبر 2010 عمومی کرد؟
answer: پودین‌پاپ
wrong_answers:
  - نلیسکی
  - m0mchil
  - tcatm
explanation: |
  تا آن زمان، آن‌ها از کمیسیونی که بابت استفاده از نرم‌افزارشان دریافت می‌کردند، سود می‌بردند. آن را تحت یک مجوز رایگان [منتشر](https://bitcointalk.org/index.php?topic=133.msg13135#msg13135) کردند.
reviewed: false
question: Ni nde yahingura ikimenyetso ca mbere nyaco ca Bitcoin (inyuguti nini y’inzahabu B ijabutse n’imirongo ibiri ihagaze) muri Ruhuhuma 2010?
answer: Satoshi Nakamoto
wrong_answers:
  - Ukwidegemvya gushasha
  - Mariti Malmi
  - umuhungu muto
explanation: |
  Yakoresheje iciyumviro ca NewLibertyStandard co gukoresha ikimenyetso c’amahera y’i Tayilande (฿). Ico kimenyetso c’umutuku caje gukorwa n’umuntu yitwa Bitboy.
reviewed: true
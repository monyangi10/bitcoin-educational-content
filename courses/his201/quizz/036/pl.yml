question: Kto zaprojektował pierwsze prawdziwe logo Bitcoina (złota wielka litera B przecięta dwoma pionowymi paskami) w lutym 2010 roku?
answer: Satoshi Nakamoto
wrong_answers:
  - NewLibertyStandard
  - Martti Malmi
  - bitboy
explanation: |
  Skorzystał on z sugestii NewLibertyStandard, by użyć symbolu tajskiego bahta (฿). Pomarańczowe logo zostało później stworzone przez kogoś znanego jako bitboy.
reviewed: true

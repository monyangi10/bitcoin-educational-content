question: पहला असली Bitcoin लोगो (एक सुनहरा अपरकेस B जिसे दो लंबवत बार्स ने काटा हो) फरवरी 2010 में किसने डिजाइन किया था?
answer: जीडब्ल्यू-1 नाकामोटो
wrong_answers:
  - न्यू लिबर्टी स्टैंडर्ड
  - मार्टी माल्मी
  - "बिटबॉय"
explanation: |
  उसने न्यू लिबर्टी स्टैंडर्ड के सुझाव का इस्तेमाल करते हुए थाई बाहट के चिन्ह (฿) को चुना। बाद में ऑरेंज लोगो किसी बिटबॉय नाम के व्यक्ति ने बनाया था।
reviewed: false
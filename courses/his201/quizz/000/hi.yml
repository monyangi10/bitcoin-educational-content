question: असिमेट्रिक क्रिप्टोग्राफी आधिकारिक तौर पर किस साल में खोजी गई थी?
answer: १९७६
wrong_answers:
  - १६७६
  - १७७६
  - 1876
explanation: |
  इसे व्हिटफील्ड डिफी और मार्टिन हेलमैन, स्टैनफोर्ड यूनिवर्सिटी के दो क्रिप्टोग्राफरों ने, नवंबर 1976 में प्रकाशित एक पेपर में पेश किया था।
reviewed: false
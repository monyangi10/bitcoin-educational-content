question: वह वेबसाइट का नाम क्या है जिसने जुलाई 2010 में Bitcoin को प्रसिद्ध करने में महत्वपूर्ण योगदान दिया?
answer: स्लैशडॉट
wrong_answers:
  - हैकरन्यूज़
  - स्टैक ओवरफ्लो
  - रेडिट
explanation: |
  11 जुलाई, 2010 को, इस लोकप्रिय साइट पर Teppy द्वारा लिखित Bitcoin का प्रेजेंटेशन प्रकाशित किया गया था, जिसके कारण यूजर्स की भारी भीड़ साइट पर आने लगी।
reviewed: false
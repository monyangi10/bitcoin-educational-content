question: Urubuga rwafashije cane mu gutuma Bitcoin imenyekana muri Mukakaro 2010 rwitwa irihe zina?
answer: Slashdot
wrong_answers:
  - Hackernews
  - Stack Overflow
  - Reddi
explanation: |
  Ku wa 11 Mukakaro 2010, Teppy yarasohoye ikiganiro ku bijanye na Bitcoin kuri uwo muhora uzwi cane, ivyo bikaba vyatumye abantu benshi cane bawukoresha.
reviewed: true

question: Urubuga rwafashije cane mu gutuma Bitcoin imenyekana muri Nyakanga 2010 rwitwa irihe?
answer: Akadomo
wrong_answers:
  - Amakuru y'abasuma
  - Ikirundo giseseka
  - Reddit
explanation: |
  Ku wa 11 Nyakanga 2010, Teppy yarasohoye ikiganiro ku bijanye na Bitcoin kuri uwo muhora uzwi cane, ivyo bikaba vyatumye abantu benshi cane bawukoresha.
reviewed: true
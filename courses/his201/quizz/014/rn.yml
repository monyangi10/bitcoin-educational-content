question: Ni nde yazanye iciyumviro ca Proof of Work?
answer: Cynthia Dwork na Moni Naor
wrong_answers:
  - Markus Jakobsson na Ari Juels
  - Adam Back
  - Satoshi Nakamoto
explanation: |
  Baciye badondora ico ciyumviro mu 1992. Markus Jakobsson na Ari Juels ni bo baciye bavuga ijambo Proof of Work. Adam Back mu nyuma yarafashe iciyumviro ca Hashcash.
reviewed: true

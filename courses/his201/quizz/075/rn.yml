question: Iyi porogarama yakoze na Mike Hearn muri Ntwarante 2011, yashize mu ngiro uburyo bwo kugenzura amahera yoroshe (SPV) yitwa gute?
answer: BitCoinJ
wrong_answers:
  - Spesmilo
  - bcoin
  - Libbitcoi
explanation: |
  Yarayisohoye mu gihe c’uruhusha rwo gukoresha ubuhinga bwa none (Apache 2.0), rwari rwashize kuri Google (umukoresha wiwe ico gihe). Ivyo vyatumye bishoboka gutanguza igikoresho ca mbere c’uburemere buke citwa Wallet yoroshe ikoreshwa kuri Android.
reviewed: true

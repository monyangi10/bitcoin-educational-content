explanation: |
  (https: //bitcointalk.org/index.php?topic=4236.msg61438#msg61438) açık kaynak lisansı (Apache 2.0) altında [yayınladı] ve bunu Google'a (o zamanki işvereni) atfetti. Bu uygulama, Android üzerinde çalışan ilk hafif Wallet'ın piyasaya sürülmesini mümkün kılmıştır.

question: ชื่อของซอฟต์แวร์ที่ถูกปล่อยออกมาโดย Mike Hearn ในเดือนมีนาคม 2011 ซึ่งใช้การตรวจสอบการชำระเงินแบบง่าย (SPV) คืออะไร?
answer: BitCoinJ
wrong_answers:
  - Spesmilo
  - bcoin
  - Libbitcoin
explanation: |
  เขา[เผยแพร่](https: //bitcointalk.org/index.php?topic=4236.msg61438#msg61438)ภายใต้ใบอนุญาตโอเพ่นซอร์ส (Apache 2.0) ซึ่งเขาให้เครดิตกับ Google (นายจ้างของเขาในขณะนั้น) การดำเนินการนี้ทำให้สามารถเปิดตัว wallet รุ่นเบาที่ทำงานบน Android ได้เป็นครั้งแรก
reviewed: true
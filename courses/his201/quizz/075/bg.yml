question: Как се наричаше софтуерната реализация, пусната от Майк Хърн през март 2011 г., която прилагаше опростена проверка на плащанията (SPV)?
answer: BitCoinJ
wrong_answers:
  - Spesmilo
  - bcoin
  - Libbitcoin
explanation: |
  Той [го публикува](https://bitcointalk.org/index.php?topic=4236.msg61438#msg61438) под лиценз с отворен код (Apache 2.0), който приписва на Google (негов работодател по това време). Тази имплементация направи възможно пускането на първия олекотен wallet, работещ под управлението на Android.
reviewed: true
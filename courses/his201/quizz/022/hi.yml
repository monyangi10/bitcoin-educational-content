question: Satoshi नाकामोटो ने अगस्त 2008 में सबसे पहले किस व्यक्ति से संपर्क किया था?
answer: आदम बैक
wrong_answers:
  - वेई दाई
  - हाल फिन्नी
  - जेम्स ए. डोनाल्ड
explanation: |
  उसने 20 अगस्त को उससे संपर्क किया, पूछा कि हैशकैश पर अपने पेपर को व्हाइट पेपर में कैसे साइट करें। जवाब देने के बाद, एडम बैक ने उसे वेई दाई (उनके बी-मनी कॉन्सेप्ट के लिए) की तरफ रेफर किया, जिसके साथ Satoshi ने 2 दिन बाद बातचीत की।
reviewed: false
question: Кой беше първият човек, с когото Satoshi Nakamoto се свърза през август 2008 г.?
answer: Adam Back
wrong_answers:
  - Вей Дай
  - Hal Finney
  - Джеймс А. Доналд
explanation: |
  Той се свърза с него на 20 август, като му съобщи, че ще цитира статията му за Hashcash в бялата книга. След като му отговорил, Адам Бек го насочил към Уей Дай (заради концепцията му за b-money), с когото Satoshi общувал два дни по-късно.
reviewed: true
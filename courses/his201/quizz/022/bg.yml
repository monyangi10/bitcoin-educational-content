question: Кой беше първият човек, с когото Satoshi Nakamoto се свърза през август 2008 г.?
answer: Адам Бак
wrong_answers:
  - Уей Дай
  - Хал Фини
  - Джеймс А. Доналд
explanation: |
  Той се свърза с него на 20 август, като му съобщава, че ще цитира статията му за Hashcash в бялата книга. Адам Бак го насочил към Уей Дай (заради концепцията му за b-money), с когото Satoshi общувал два дни по-късно.
reviewed: true

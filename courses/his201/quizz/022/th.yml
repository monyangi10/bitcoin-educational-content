question: บุคคลแรกที่ Satoshi Nakamoto ติดต่อในเดือนสิงหาคม 2008 คือใคร?
answer: อดัม แบ็ค
wrong_answers:
  - เว่ย ได
  - Hal Finney
  - เจมส์ เอ. โดนัลด์
explanation: |
  เขาติดต่อเขาเมื่อวันที่ 20 สิงหาคม แจ้งว่าเขาจะอ้างอิงเอกสาร Hashcash ของเขาในเอกสารไวท์เปเปอร์ หลังจากตอบกลับ Adam Back ได้แนะนำเขาไปยัง Wei Dai (สำหรับแนวคิดของ b-money) ซึ่ง Satoshi ได้สื่อสารด้วยสองวันต่อมา
reviewed: true
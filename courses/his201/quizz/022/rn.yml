question: Ni nde muntu wa mbere Satoshi Nakamoto yavuganye na we muri Myandagaro 2008?
answer: Adamu yagarutse
wrong_answers:
  - Wei Dai
  - Hal Finney
  - Yakobo A. Donald
explanation: |
  Yaramuhamagaye ku wa 20 Myandagaro, amumenyesha ko azovuga urupapuro rwiwe rwa Hashcash mu rupapuro rwera. Amaze kwishura, Adam Back yamurongoye kuri Wei Dai (kubera iciyumviro ciwe c’amahera ya b), uwo Satoshi yavuganye na we haciye imisi ibiri.
reviewed: true
question: Ni ku musi uwuhe Jeremy Sturdivant yashikirije Laszlo Hanyecz pizza zibiri mu kuguza ku giciro c’ama Bitcoin 10.000, ivyo bikaba ari vyo vyabaye nk'incuro habayeho kugura ikintu hakoreshejwe ama cryptocurrency?
answer: kuwa 22 Rusama 2010
wrong_answers:
  - 12 Gitugutu 2009
  - 18 Ndamukiza 2010
  - 11 Ruheshi 2010
explanation: |
  Inyuma y’itangazo ryashizwe kuri iyo nama, iryo soko ryemewe ku wa 22 Rusama 2010. Ico gihe, ayo mahera 10.000 y’ama bitcoins yari afise agaciro k’amadolari nka 44.
reviewed: true

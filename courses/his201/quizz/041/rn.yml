question: Ni ku musi uwuhe Jeremy Sturdivant yashikirije Laszlo Hanyecz pizza zibiri muri Exchange ku giciro c’amahera 10.000, ivyo bikaba ari vyo vyabaye ari vyo vya mbere yaguze ikintu c’umubiri akoresheje amahera y’ivy’ubuhinga bwa none?
answer: Gicurasi 2010
wrong_answers:
  - Ukwakira 2009
  - Ndamukiza 2010
  - Kamena 2010
explanation: |
  Inyuma y’itangazo ryashizwe kuri iyo nama, iyo nzira yemewe ku wa 22 Rusama 2010. Ico gihe, ayo mahera 10.000 y’ama bitcoins yari afise agaciro k’amadolari nka 44.
reviewed: true
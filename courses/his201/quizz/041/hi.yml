question: जेरेमी स्टर्डिवेंट ने 22 मई, 2010 को Exchange में लेज़्लो हेनयेक को 10,000 बिटकॉइन के भुगतान के बदले दो पिज़्ज़ा डिलीवर किए थे, जो क्रिप्टोकरेंसी से किसी भौतिक वस्तु की पहली खरीदारी थी।
answer: 22 मई, 2010
wrong_answers:
  - 12 अक्टूबर, 2009
  - 18 अप्रैल, 2010
  - 11 जून, 2010
explanation: |
  फोरम पर एक घोषणा पोस्ट होने के बाद, 22 मई 2010 को ऑफर स्वीकार कर लिया गया था। उस समय, 10,000 बिटकॉइन की कीमत लगभग $44 थी।
reviewed: false
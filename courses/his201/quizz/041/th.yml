question: วันที่ Jeremy Sturdivant ส่งพิซซ่าสองถาดให้กับ Laszlo Hanyecz แลกกับการชำระเงินด้วยบิตคอยน์จำนวน 10,000 บิตคอยน์ ซึ่งถือเป็นการซื้อสินค้าจริงครั้งแรกด้วยสกุลเงินดิจิทัลคือวันที่เท่าไหร่?
answer: 22 พฤษภาคม 2010
wrong_answers:
  - 12 ตุลาคม 2009
  - 18 เมษายน 2010
  - 11 มิถุนายน 2010
explanation: |
  ตามประกาศที่โพสต์บนฟอรั่ม ข้อเสนอนี้ได้รับการยอมรับเมื่อวันที่ 22 พฤษภาคม 2010 ในขณะนั้น 10,000 บิตคอยน์มีมูลค่าประมาณ $44.
reviewed: true
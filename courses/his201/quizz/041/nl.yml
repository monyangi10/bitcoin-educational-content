question: Op welke datum leverde Jeremy Sturdivant twee pizza's aan Laszlo Hanyecz in Exchange voor een betaling van 10.000 bitcoins, waarmee hij de eerste aankoop van een fysiek goed met cryptocurrency markeerde?
answer: 22 mei 2010
wrong_answers:
  - 12 oktober 2009
  - 18 april 2010
  - 11 juni 2010
explanation: |
  Na een aankondiging op het forum werd het bod geaccepteerd op 22 mei 2010. Op dat moment waren de 10.000 bitcoins ongeveer $44 waard.
reviewed: true
question: На коя дата Джереми Стърдивант доставя две пици на Ласло Ханиец срещу сумата от 10 000 биткойна, с което извършва първата покупка на физическа стока с криптовалута?
answer: 22 май 2010 г
wrong_answers:
  - 12 октомври 2009 г
  - 18 април 2010 г
  - 11 юни 2010 г
explanation: |
  След публикуване на съобщение във форума офертата беше приета на 22 май 2010 г. По това време стойността на 10 000 биткойна е около 44 USD.
reviewed: true
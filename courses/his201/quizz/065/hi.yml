question: पहला Block explorer नवंबर 2010 में किसने बनाया था?
answer: माइकल मार्क्वार्ड (थीमोस)
wrong_answers:
  - जेफ गार्ज़िक (jgarzik)
  - नील्स श्नाइडर (tcatm)
  - पीटर वुइले (सिपा)
explanation: |
  यह Bitcoin Block explorer यूज़र्स को वेब ब्राउज़र के ज़रिए ब्लॉक्स, एड्रेसेज़ और ट्रांज़ैक्शन्स की डिटेल्ड जानकारी देखने की सुविधा देता था।

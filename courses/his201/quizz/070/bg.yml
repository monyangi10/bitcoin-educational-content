question: Кой предложи да се свърже с организацията WikiLeaks, за да я насърчи да приема биткойни през ноември 2010 г.?
answer: Амир Тааки
wrong_answers:
  - Владимир ван дер Лаан
  - Робърт Хорнинг
  - Satoshi Nakamoto
explanation: |
  Той се обосновава, като пише, че средствата на организацията са били замразявани многократно. По-специално, Moneybookers е замразила сметката на WikiLeaks през октомври.
reviewed: true

question: विकिलीक्स संगठन से नवंबर 2010 में Bitcoin को स्वीकार करने के लिए संपर्क करने का सुझाव किसने दिया था?
answer: अमीर ताकी
wrong_answers:
  - व्लादिमीर वैन डेर लान
  - रॉबर्ट हॉर्निंग
  - जीडब्ल्यू-1 नाकामोटो
explanation: |
  उसने इसे यह कहकर सही ठहराया कि संगठन के फंड कई बार फ्रीज़ हो चुके हैं। खासकर, मनीबुकर्स ने अक्टूबर में विकिलीक्स का अकाउंट फ्रीज़ कर दिया था।
reviewed: false
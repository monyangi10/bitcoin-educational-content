question: Ni nde yatanze iciyumviro co guhamagara ishirahamwe WikiLeaks kugira ngo ribaremeshe kwemera Bitcoin mu kwezi kwa 11/2010?
answer: Amir Taaki
wrong_answers:
  - Wladimir van der Laan
  - Roberti Ihembe
  - Satoshi Nakamoto
explanation: |
  Yarabishingira intahe mu kwandika yuko iryo shirahamwe ryabonye amahera yaryo ahagaritswe incuro nyinshi. Ikizwi cane ni uko aba Moneybookers bari bugaye konti ya WikiLeaks mu kwezi kwa Gitugutu.
reviewed: true

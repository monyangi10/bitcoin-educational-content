question: Kto zasugerował skontaktowanie się z organizacją WikiLeaks w celu zachęcenia jej do zaakceptowania Bitcoina w listopadzie 2010 roku?
answer: Amir Taaki
wrong_answers:
  - Wladimir van der Laan
  - Robert Horning
  - Satoshi Nakamoto
explanation: |
  Uzasadnił to tym, że organizacja wielokrotnie doświadczyła zamrożenia swoich funduszy. Chodziło w szczególności o incydent zamrożenia konta WikiLeaks przez Moneybookers w październiku.
reviewed: true

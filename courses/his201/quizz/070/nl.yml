question: Wie stelde voor om contact op te nemen met de organisatie WikiLeaks om hen aan te moedigen Bitcoin te accepteren in november 2010?
answer: Amir Taaki
wrong_answers:
  - Wladimir van der Laan
  - Robert Horning
  - Satoshi Nakamoto
explanation: |
  Hij rechtvaardigde het door te schrijven dat de fondsen van de organisatie al meerdere keren waren bevroren. Moneybookers had de rekening van WikiLeaks in oktober bevroren.
reviewed: true
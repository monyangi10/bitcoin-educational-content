question: ใครแนะนำให้ติดต่อองค์กร WikiLeaks เพื่อกระตุ้นให้พวกเขายอมรับบิตคอยน์ในเดือนพฤศจิกายน 2010?
answer: อาเมียร์ ทากิ
wrong_answers:
  - Wladimir van der Laan
  - โรเบิร์ต ฮอร์นิง
  - Satoshi นากาโมโตะ
explanation: |
  เขาให้เหตุผลโดยการเขียนว่าองค์กรได้เห็นเงินทุนของตนถูกระงับหลายครั้ง โดยเฉพาะอย่างยิ่ง Moneybookers ได้ระงับบัญชีของ WikiLeaks ในเดือนตุลาคม
reviewed: true
question: Nick Szabo ने अपना bit gold का कॉन्सेप्ट सबसे पहले 1998 में कहाँ पेश किया था?
answer: लिबटेक-एल मेलिंग लिस्ट
wrong_answers:
  - साइफरपंक्स मेलिंग लिस्ट
  - क्रिप्टोग्राफी मेलिंग लिस्ट
  - एक्सट्रोपियन्स मेलिंग लिस्ट
explanation: |
  यह उसकी अपनी निजी मेलिंग लिस्ट थी, जिसमें वेई डाई और हाल फिन्नी जैसे साइफरपंक्स, और लैरी व्हाइट व जॉर्ज सेल्गिन जैसे अर्थशास्त्री शामिल थे।
reviewed: false
question: Къде Ник Сабо представя за първи път концепцията си за бит злато през 1998 г.?
answer: Пощенският списък libtech-l
wrong_answers:
  - Пощенският списък на cypherpunks
  - Пощенски списък Криптография
  - Пощенският списък на extropians
explanation: |
  Това беше неговият частен пощенски списък, който включваше шифровчици като Уей Дай и Hal Finney и икономисти като Лари Уайт и Джордж Селгин.
reviewed: true
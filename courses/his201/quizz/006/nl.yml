question: Welk decreet ondertekend door Franklin D. Roosevelt verbood het bezit van goud voor particulieren in de Verenigde Staten tussen 1933 en 1975?
answer: Het uitvoeringsbesluit 6102
wrong_answers:
  - De Federal Reserve Act
  - De Glass-Steagall Act
  - Uitvoeringsbevel 9066
explanation: |
  Dit uitvoeringsbesluit, ondertekend op 5 april 1933, werd door Roosevelt uitgevaardigd als onderdeel van de New Deal. Het werd versterkt door de Gold Reserve Act in 1934.
reviewed: true
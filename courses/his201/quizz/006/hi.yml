question: फ्रैंकलिन डी. रूजवेल्ट द्वारा हस्ताक्षरित किस आदेश ने 1933 से 1975 तक संयुक्त राज्य अमेरिका में व्यक्तियों के लिए सोने के कब्जे पर प्रतिबंध लगा दिया था?
answer: कार्यकारी आदेश 6102
wrong_answers:
  - फेडरल रिजर्व एक्ट
  - ग्लास-स्टीगल एक्ट
  - Executive Order 9066 को हिंदी में कहें तो "कार्यकारी आदेश 9066" कहा जा सकता है। यह अमेरिकी राष्ट्रपति फ्रैंकलिन डी. रूजवेल्ट द्वारा 19 फरवरी, 1942 को जारी किया गया था। इस आदेश के तहत द्वितीय विश्व युद्ध के दौरान अमेरिका के पश्चिमी तट पर रहने वाले जापानी मूल के हज़ारों लोगों को नजरबंदी शिविरों में भेजा गया था।
explanation: |
  यह आदेश, जो 5 अप्रैल, 1933 को साइन किया गया था, रूजवेल्ट द्वारा न्यू डील के हिस्से के रूप में लागू किया गया था। 1934 में गोल्ड रिज़र्व एक्ट ने इसे और मजबूत किया।
reviewed: false
question: พระราชกฤษฎีกาใดที่ลงนามโดยแฟรงกลิน ดี. รูสเวลต์ห้ามการครอบครองทองคำสำหรับบุคคลในสหรัฐอเมริการะหว่างปี 1933 ถึง 1975?
answer: คำสั่งผู้บริหาร 6102
wrong_answers:
  - พระราชบัญญัติธนาคารกลางสหรัฐ
  - พระราชบัญญัติกลาส-สตีเกิล
  - คำสั่งฝ่ายบริหาร 9066
explanation: |
  คำสั่งผู้บริหารนี้ ลงนามเมื่อวันที่ 5 เมษายน 1933 ถูกบังคับใช้โดยรูสเวลต์เป็นส่วนหนึ่งของนโยบาย New Deal มันถูกเสริมความแข็งแกร่งโดยพระราชบัญญัติสำรองทองคำในปี 1934
reviewed: true
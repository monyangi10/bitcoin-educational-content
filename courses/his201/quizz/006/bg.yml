question: Кой указ, подписан от Франклин Д. Рузвелт, забранява притежаването на злато от физически лица в САЩ между 1933 и 1975 г.?
answer: Изпълнителна заповед 6102
wrong_answers:
  - Законът за Федералния резерв
  - Законът Glass-Steagall
  - Изпълнителна заповед 9066
explanation: |
  Тази заповед, подписана на 5 април 1933 г., е въведена от Рузвелт като част от Новия курс. Тя е подсилена от Закона за златния резерв през 1934 г.
reviewed: true
question: Koji dekret potpisan od strane Franklina D. Roosevelta zabranjuje posedovanje zlata za pojedince u Sjedinjenim Američkim Državama između 1933. i 1975?
answer: Izvršna naredba 6102
wrong_answers:
  - Zakon o Federalnim Rezervama
  - Zakon o Glass-Steagallu
  - Izvršna naredba 9066
explanation: |
  Ova izvršna naredba, potpisana 5. aprila 1933. godine, doneta je od strane Ruzvelta kao deo Nju Dila. Ojačana je Zakonom o zlatnim rezervama 1934. godine.

question: Ni itegeko irihe ryashizweko umukono na Franklin D. Roosevelt ryabujije abantu bo muri Leta Zunze Ubumwe za Amerika kugira inzahabu hagati y’umwaka wa 1933 n’uwa 1975?
answer: Itegeko ry'ubutegetsi 6102
wrong_answers:
  - Itegeko ry'ububiko bwa Leta Zunze Ubumwe za Amerika
  - Itegeko rya Kirahuri-Stegall
  - Itegeko ry'ubutegetsi 9066
explanation: |
  Iryo tegeko ry’ubutegetsi ryashizweko umukono ku wa 5 Ndamukiza 1933, ryashizweho na Roosevelt nk’igice c’Isezerano Rishasha. Yakomejwe n'Itegeko ry'Ibizigamirwa vy'Inzahabu mu 1934.
reviewed: true
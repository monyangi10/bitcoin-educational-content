question: Ni itegeko irihe ryashizweko umukono na Franklin D. Roosevelt ryabujije abantu bo muri Leta Zunze Ubumwe za Amerika kugira inzahabu hagati y’umwaka wa 1933 n’uwa 1975?
answer: The Executive Order 6102
wrong_answers:
  - The Federal Reserve Act
  - The Glass-Steagall Act
  - The Executive Order 9066
explanation: |
  Iryo tegeko ry’ubutegetsi(This executive order) ryashizweko umukono ku wa 5 Ndamukiza 1933, ryashizweho na Roosevelt nk’igice c’Isezerano Rishasha. Yakomejwe n'Itegeko ry'ububiko bw'Inzahabu(Gold Reserve) mu 1934.
reviewed: true

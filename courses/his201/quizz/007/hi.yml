question: 1998 में बर्नार्ड वॉन नॉटहॉस ने सोने और चांदी पर आधारित जो करेंसी बनाई थी, उसे **"लिबर्टी डॉलर"** कहा जाता था। यह एक प्राइवेट करेंसी थी जिसे अमेरिकी सरकार ने बाद में गैरकानूनी घोषित कर दिया।
answer: स्वतंत्र डॉलर
wrong_answers:
  - लिबर्टी रिज़र्व
  - ई-गोल्ड
  - गोल्डमनी
explanation: |
  यह करेंसी सिल्वर सिक्कों और रिप्रेजेंटेटिव नोटों के रूप में उपलब्ध थी, और फिर 2003 से डिजिटल फॉर्म में भी मिलने लगी।

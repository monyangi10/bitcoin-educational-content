question: Каква валута, базирана на злато и сребро, е създадена от Бернард фон Нотхаус през 1998 г.?
answer: Liberty Dollar
wrong_answers:
  - Liberty Reserve
  - e-gold
  - GoldMoney
explanation: |
  Тази валута се предлагаше под формата на сребърни монети и представителни банкноти, а от 2003 г. - и в цифров вид.
reviewed: true

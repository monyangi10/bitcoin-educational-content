question: Jaka waluta oparta na złocie i srebrze została stworzona przez Bernarda von NotHausa w 1998 roku?
answer: Dolar wolności
wrong_answers:
  - Liberty Reserve
  - e-gold
  - GoldMoney
explanation: |
  Waluta ta była dostępna w formie srebrnych monet i reprezentatywnych banknotów, a następnie w formie cyfrowej, począwszy od 2003 roku.

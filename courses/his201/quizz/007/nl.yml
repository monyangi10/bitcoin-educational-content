question: Welke valuta gebaseerd op goud en zilver werd gecreëerd door Bernard von NotHaus in 1998?
answer: De Liberty Dollar
wrong_answers:
  - Vrijheid Reserve
  - e-goud
  - Goudgeld
explanation: |
  Deze munteenheid was beschikbaar in zilveren munten en representatieve biljetten en, vanaf 2003, in digitale vorm.
reviewed: true
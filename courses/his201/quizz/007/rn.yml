question: Ni amafaranga ayahe ashingiye ku nzahabu n’ifeza yaremwe na Bernard von NotHaus mu 1998?
answer: Idolari ry'Umwidegemvyo
wrong_answers:
  - Umwidegemvyo
  - inzahabu
  - Amafaranga y'inzahabu
explanation: |
  Aya mafaranga yaboneka mu biceri vy’ifeza no mu biceri vy’amahera aserukira, kandi guhera mu 2003, yaboneka mu buryo bwa digitale.
reviewed: true
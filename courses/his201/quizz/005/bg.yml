question: Кой икономист заяви през 1999 г., че единственото нещо, което липсва, но скоро ще бъде разработено, са надеждните електронни пари?
answer: Милтън Фридман
wrong_answers:
  - Фридрих Хайек
  - Мъри Ротбард
  - Пол Кругман
explanation: |
  Носител на Нобелова награда за икономика и основател на Чикагската школа, той направи тази прогноза на микрофона на фондация "Национален съюз на данъкоплатците". [микро](https: //www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)
reviewed: true
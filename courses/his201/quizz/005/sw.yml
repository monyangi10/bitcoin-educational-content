question: Ni mchumi yupi alisema mnamo 1999 kwamba kitu pekee ambacho hakipo, lakini ambacho kitatengenezwa hivi karibuni, ni pesa taslimu za kielektroniki za kutegemewa?
answer: Milton Friedman
wrong_answers:
  - Friedrich Hayek
  - Murray Rothbard
  - Paul Krugman
explanation: |
  Mshindi wa Tuzo ya Nobel katika uchumi na mwanzilishi wa Shule ya Chicago, alitoa utabiri huu kwenye maikrofoni ya Wakfu wa Kitaifa wa Muungano wa Walipa Ushuru. [micro](https: //www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)

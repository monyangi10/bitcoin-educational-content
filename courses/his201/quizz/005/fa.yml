question: کدام اقتصاددان در سال ۱۹۹۹ اظهار داشت که تنها چیزی که وجود ندارد، اما به زودی توسعه خواهد یافت، پول الکترونیکی قابل اعتماد است؟
answer: میلتون فریدمن
wrong_answers:
  - فریدریش هایک
  - موری راتبارد
  - پل کروگمن
explanation: |
  برنده جایزه نوبل در اقتصاد و بنیان‌گذار مکتب شیکاگو، او این پیش‌بینی را در میکروفون بنیاد اتحادیه مالیات‌دهندگان ملی انجام داد. [micro](https://www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)
reviewed: false
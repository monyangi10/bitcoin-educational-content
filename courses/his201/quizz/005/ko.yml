question: 1999년에 유일하게 부족하지만 곧 개발될 전자 화폐는 신뢰할 수 있는 전자 화폐라고 말한 경제학자는 누구입니까?
answer: 밀턴 프리드먼
wrong_answers:
  - 프리드리히 하이에크
  - 머레이 로스바드
  - 폴 크루그먼
explanation: |
  노벨 경제학상 수상자이자 시카고 학교의 설립자인 그는 전국 납세자 연합 재단의 마이크를 잡고 이 같은 예측을 내놓았습니다. [마이크로](https: //www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)
reviewed: true
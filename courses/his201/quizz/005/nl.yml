question: Welke econoom verklaarde in 1999 dat het enige wat nog ontbreekt, maar wel snel ontwikkeld zal worden, betrouwbaar elektronisch geld is?
answer: Milton Friedman
wrong_answers:
  - Friedrich Hayek
  - Murray Rothbard
  - Paul Krugman
explanation: |
  Als Nobelprijswinnaar economie en oprichter van de Chicago School deed hij deze voorspelling tijdens de microfoon van de National Taxpayers Union Foundation. [micro](https://www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)
reviewed: true
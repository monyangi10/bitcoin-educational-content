question: Ni uwuhe muhinga mu vy’ubutunzi yavuze mu 1999 yuko ikintu conyene cari kibuze, ariko kizotegurwa vuba, ari amahera y’ubuhinga bwa none yizigiwe?
answer: Milton Friedman
wrong_answers:
  - Friedrich Hayek
  - Murray Rothbard
  - Paul Krugman
explanation: |
  Yatahukanye agashimwe ka Nobel mu vy’ubutunzi, akaba n’uwashinze ishure ry’i Chicago, ivyo yabivuze iyo mburi ku mikoro y’ishirahamwe ry’igihugu ry’abatanga ama tagisi(the National Taxpayers Union Foundation). [muto](ubutumwa: //www.youtube.com/raba?v=mlwxdyLnMXM&t=872s)
reviewed: true

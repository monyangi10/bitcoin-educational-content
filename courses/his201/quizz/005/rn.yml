question: Ni uwuhe muhinga mu vy’ubutunzi yavuze mu 1999 yuko ikintu conyene kibuze, ariko kizotegurwa vuba, ari amahera y’ubuhinga bwa none yizigirwa?
answer: Militoni Fridimani
wrong_answers:
  - Fridiriki Hayek
  - Murray Rothbard
  - Paulo Krugman
explanation: |
  Uwo mugore yaronse agashimwe ka Nobel mu vy’ubutunzi, akaba n’uwashinze ishure ry’i Chicago, ivyo yabivuze ku mikoro y’ishirahamwe ry’igihugu ry’abasoreshwa. [muto](ubutumwa: //www.youtube.com/raba?v=mlwxdyLnMXM&t=872s)
reviewed: true
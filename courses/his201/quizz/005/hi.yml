question: 1999 में किस अर्थशास्त्री ने कहा था कि एकमात्र चीज़ जो गायब है, लेकिन जल्द ही विकसित हो जाएगी, वह है विश्वसनीय इलेक्ट्रॉनिक कैश?
answer: मिल्टन फ्रीडमैन
wrong_answers:
  - फ्रेडरिक हायेक
  - मरे रोथबार्ड
  - पॉल क्रुगमन
  A Nobel Prize winner in economics and founder of the Chicago School, he made this prediction at the microphone of the National Taxpayers Union Foundation. [micro](https: //www.youtube.com/watch?v=mlwxdyLnMXM&t=872s)

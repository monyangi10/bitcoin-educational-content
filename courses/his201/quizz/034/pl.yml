question: Kto zaoferował pierwszą usługę wymiany między bitcoinem a dolarem w październiku 2009 r.?
answer: NewLibertyStandard
wrong_answers:
  - sirius-m
  - dwdolar
  - SmokeTooMuch
explanation: |
  Usługa ta była podstawowa: wymianę negocjowano za pośrednictwem poczty elektronicznej, a płatności dokonywano przez PayPala. Stawka wymiany była oparta na kosztach wydobycia samego NewLibertyStandard.
reviewed: true

question: Кой създаде първата услуга за обмен на биткойни и долар през октомври 2009 г.?
answer: NewLibertyStandard
wrong_answers:
  - sirius-m
  - dwdollar
  - SmokeTooMuch
explanation: |
  Услугата беше елементарна: размяната се договаряше по имейл, а плащанията се извършваха чрез PayPal. Обменният курс се основаваше на собствените разходи на Newlibertystandard за копаене.
reviewed: true

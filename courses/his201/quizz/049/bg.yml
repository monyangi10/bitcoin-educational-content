question: Каква беше промяната в цената на Bitcoin през седмицата след представянето му в Slashdot?
answer: От $0,008 до $0,08
wrong_answers:
  - От $0,001 до $0,008
  - От $0,08 до $0,50
  - От $0,50 до $1
explanation: |
  Тази промяна съответства на десетократно увеличение! Скоростта на хеширане отбеляза подобен скок.

question: स्लैशडॉट पर Bitcoin के लॉन्च के बाद के हफ्ते में इसकी कीमत में क्या उतार-चढ़ाव आया था?
answer: $0.008 से $0.08 तक
wrong_answers:
  - $0.001 से $0.008 तक
  - $0.08 से $0.50 तक
  - $0.50 से $1 तक
explanation: |
  यह बदलाव दस गुना बढ़ोतरी के बराबर था! Hash दर में भी ऐसी ही तेज़ी देखी गई।

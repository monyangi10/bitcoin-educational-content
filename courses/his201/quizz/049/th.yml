question: ความผันผวนของราคาของ Bitcoin ในสัปดาห์หลังจากที่เปิดตัวบน Slashdot คืออะไร?
answer: จาก $0.008 ถึง $0.08
wrong_answers:
  - จาก $0.001 ถึง $0.008
  - จาก $0.08 ถึง $0.50
  - จาก $0.50 ถึง $1
explanation: |
  ความแปรผันนี้สอดคล้องกับการเพิ่มขึ้นสิบเท่า! อัตราแฮชก็ประสบกับการพุ่งขึ้นในลักษณะเดียวกัน
reviewed: true
question: Ni ubuhe buryo bw’amahera y’ubuhinga bwa none injeniyeri wa Google Mike Hearn yakunda cane imbere y’uko abona Bitcoin?
answer: Umupfunda
wrong_answers:
  - Umwidegemvyo
  - eLD
  - RPOW
explanation: |
  Ryan Fugger yumvise ivya Bitcoin ubwa mbere mu mugambi wiwe wa Google Group muri Ndamukiza 2009. Yaciye ahamagara Satoshi kugira ngo amubaze ibibazo.
reviewed: true
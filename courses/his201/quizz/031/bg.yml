question: От коя цифрова валутна система се е интересувал инженерът на Google Майк Хърн, преди да открие Bitcoin?
answer: Ripple
wrong_answers:
  - Liberty Reserve
  - eLD
  - RPOW
explanation: |
  Майк Хърн за първи път чува за Bitcoin в рамките на своя проект в Google през април 2009 г. Той веднага се свързва със Satoshi, за да зададе въпроси.
reviewed: true

question: Google इंजीनियर Mike Hearn को Bitcoin खोजने से पहले किस डिजिटल करेंसी सिस्टम में दिलचस्पी थी?
answer: रिपल
wrong_answers:
  - लिबर्टी रिज़र्व
  - ईएलडी
  - आरपीओडब्ल्यू
explanation: |
  यह रयान फगर के प्रोजेक्ट गूगल ग्रुप पर ही था कि अप्रैल 2009 में उन्होंने पहली बार Bitcoin के बारे में सुना। उन्होंने तुरंत Satoshi से सवाल पूछने के लिए संपर्क किया।
reviewed: false
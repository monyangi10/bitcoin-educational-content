question: Którym systemem waluty cyfrowej interesował się inżynier Google Mike Hearn przed odkryciem Bitcoina?
answer: Ripple
wrong_answers:
  - Liberty Reserve
  - eLD
  - RPOW
explanation: |
  Ryan Fugger po raz pierwszy usłyszał o Bitcoinie w kwietniu 2009 r. na grupie Google Group. Natychmiast skontaktował się z Satoshim, aby dowiedzieć się więcej.
reviewed: true

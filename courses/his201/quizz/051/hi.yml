question: 28 जुलाई, 2010 को ArtForz द्वारा रिपोर्ट की गई कौन सी कमजोरी ने किसी भी Address से बिटकॉइन खर्च करने की अनुमति दी, जिसमें एक विशेष स्क्रिप्ट का उपयोग किया गया था?
answer: 1 रिटर्न बग
wrong_answers:
  - वैल्यू ओवरफ्लो बग
  - ओपी_नॉप बग
  - एल-शिफ्ट बग
explanation: |
  खामी का फायदा नहीं उठाया गया। Satoshi ने तुरंत सॉफ्टवेयर में सुधार कर लिया और सभी उपयोगकर्ताओं को अपग्रेड करने की सलाह दी।
reviewed: false
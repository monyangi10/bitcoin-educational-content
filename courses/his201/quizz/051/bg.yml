question: Коя уязвимост, докладвана от ArtForz на 28 юли 2010 г., позволяваше харченето на биткойни от всеки адрес с помощта на определен скрипт?
answer: Грешката с 1 RETURN
wrong_answers:
  - Грешката с препълването на стойността
  - Грешката OP_NOP
  - Грешката LSHIFT
explanation: |
  Недостатъкът не беше използван. Satoshi бързо включи поправката в софтуера и препоръча на всички потребители да го обновят.
reviewed: true
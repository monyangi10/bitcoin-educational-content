question: ช่องโหว่ที่รายงานโดย ArtForz เมื่อวันที่ 28 กรกฎาคม 2010 อนุญาตให้ใช้จ่ายบิตคอยน์จากที่อยู่ใด ๆ โดยใช้สคริปต์เฉพาะคืออะไร?
answer: ข้อบกพร่อง 1 RETURN
wrong_answers:
  - ข้อบกพร่องการล้นค่าของตัวแปร
  - ข้อบกพร่อง OP_NOP
  - ข้อบกพร่อง LSHIFT
explanation: |
  ข้อบกพร่องไม่ได้ถูกนำไปใช้ประโยชน์ Satoshi ได้รวมการแก้ไขในซอฟต์แวร์อย่างรวดเร็วและแนะนำให้ผู้ใช้ทุกคนอัปเกรด
reviewed: true
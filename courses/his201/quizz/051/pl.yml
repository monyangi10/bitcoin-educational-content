question: Jaka luka zgłoszona przez ArtForz 28 lipca 2010 r. umożliwiała wydawanie bitcoinów z dowolnego adresu przy użyciu określonego skryptu?
answer: Błąd 1 RETURN
wrong_answers:
  - Błąd przepełnienia wartości
  - Błąd OP_NOP
  - Błąd LSHIFT
explanation: |
  Usterka nie została wykorzystana do złych celów. Satoshi szybko wprowadził poprawkę do oprogramowania i zalecił wszystkim użytkownikom aktualizację.
reviewed: true

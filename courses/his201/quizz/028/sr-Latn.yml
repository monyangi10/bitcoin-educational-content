question: Koliko je iznosila cena u dolarima prema predikciji Hala Finneya u januaru 2009?
answer: 10,000,000
wrong_answers:
  - 1.000.000
  - 100.000
  - 10.000
explanation: |
  On je [napisao](https: //www.metzdowd.com/pipermail/cryptography/2009-January/015004.html) da bi mogućnost generisanja jedinica danas uz nekoliko centi računalnog vremena mogla biti vrlo dobra opklada.

question: قیمت پیش‌بینی هال فینی در ژانویه ۲۰۰۹ چقدر بود؟
answer: ۱۰,۰۰۰,۰۰۰
wrong_answers:
  - ۱,۰۰۰,۰۰۰
  - ۱۰۰,۰۰۰
  - ۱۰,۰۰۰
explanation: |
  او [نوشت](https://www.metzdowd.com/pipermail/cryptography/2009-January/015004.html) که امکان تولید واحدها امروزه با چند سنت زمان محاسباتی می‌تواند یک شرط بسیار خوب باشد.

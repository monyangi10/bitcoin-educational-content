question: Каква е прогнозната цена на Хал Фини в долари през януари 2009 г.?
answer: 10,000,000
wrong_answers:
  - 1,000,000
  - 100,000
  - 10,000
explanation: |
  Той [пише](https://www.metzdowd.com/pipermail/cryptography/2009-January/015004.html), че възможността за генериране на единици днес с няколко цента изчислително време може да бъде много добър залог.
reviewed: true

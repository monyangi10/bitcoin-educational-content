question: Vad var Hal Finneys prognostiserade kurs i dollar i januari 2009?
answer: 10,000,000
wrong_answers:
  - 1,000,000
  - 100,000
  - 10,000
explanation: |
  Han [skrev](https://www.metzdowd.com/pipermail/cryptography/2009-January/015004.html) att möjligheten att generera enheter idag med några cent datatid skulle kunna vara en mycket bra satsning.
reviewed: true
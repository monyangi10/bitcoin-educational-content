question: Jaka była przepowiadana przez Hala Finneya w styczniu 2009 roku cena bitcoina w dolarach?
answer: 10,000,000
wrong_answers:
  - 1,000,000
  - 100,000
  - 10,000
explanation: |
  [Napisał](https://www.metzdowd.com/pipermail/cryptography/2009-January/015004.html), że możliwość generowania jednostek dzisiaj za cenę kilku centów za czas obliczeniowy może być bardzo dobrą inwestycją.
reviewed: true

question: Jaka była cena w dolarach przepowiedni Hala Finneya w styczniu 2009 roku?
answer: 10,000,000
wrong_answers:
  - 1,000,000
  - 100,000
  - 10,000
explanation: |
  On [napisał](https: //www.metzdowd.com/pipermail/cryptography/2009-January/015004.html), że możliwość generowania jednostek dzisiaj z kilkoma centami czasu obliczeniowego może być bardzo dobrym zakładem.
reviewed: false
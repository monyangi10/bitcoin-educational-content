question: Кога е извършен първият обмен между биткойни и долар?
answer: 12 октомври 2009 г
wrong_answers:
  - 8 май 2009 г
  - 30 декември 2009 г
  - 11 март 2010 г
explanation: |
  Марти превежда 5050 биткойна на NLS, който след това превежда 5,02 долара в сметката му в PayPal. Това съответства на единична цена от около 0,001 USD.
reviewed: true

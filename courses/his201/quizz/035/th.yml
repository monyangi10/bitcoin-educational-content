question: การแลกเปลี่ยนครั้งแรกระหว่างบิตคอยน์และดอลลาร์เกิดขึ้นเมื่อใด?
answer: 12 ตุลาคม 2009
wrong_answers:
  - 8 พฤษภาคม 2009
  - 30 ธันวาคม 2009
  - 11 มีนาคม 2010
explanation: |
  Martti โอนบิตคอยน์จำนวน 5,050 หน่วยให้กับ NLS ซึ่งจากนั้นได้โอนเงิน $5.02 ไปยังบัญชี PayPal ของเขา ซึ่งสอดคล้องกับราคาต่อหน่วยประมาณ $0.001
reviewed: true
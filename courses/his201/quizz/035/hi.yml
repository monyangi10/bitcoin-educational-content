question: पहला Exchange डॉलर और Bitcoin के बीच कब हुआ था?
answer: 12 अक्टूबर, 2009
wrong_answers:
  - 8 मई, 2009
  - 30 दिसंबर, 2009
  - 11 मार्च, 2010
explanation: |

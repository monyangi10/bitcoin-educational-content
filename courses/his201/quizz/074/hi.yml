question: टेम्पल सिटी के उस टेलीकम्यूनिकेशन इंजीनियर का पहला नाम क्या था, जिसे मार्च 2014 में एक न्यूज़वीक पत्रकार ने गलती से Satoshi नाकामोतो समझ लिया था?
answer: डोरियन
wrong_answers:
  - प्रेंटिस
  - जीडब्ल्यू-1
  - पटोशी
  His full name was Dorian Prentice Satoshi Nakamoto. He was of Japanese origin. See [the Newsweek article](https: //www.newsweek.com/2014/03/14/face-behind-bitcoin-247957.html).
reviewed: false
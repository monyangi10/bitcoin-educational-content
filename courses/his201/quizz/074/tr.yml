question: Mart 2014'te bir Newsweek gazetecisinin yanlışlıkla Satoshi Nakamoto olarak tanımladığı Temple City'li telekomünikasyon mühendisinin ilk adı neydi?
answer: Dorian
wrong_answers:
  - Prentice
  - Satoshi
  - Patoshi
explanation: |
  Tam adı Dorian Prentice Satoshi Nakamoto idi. Japon kökenliydi. Bkz [Newsweek makalesi] (https: //www.newsweek.com/2014/03/14/face-behind-Bitcoin-247957.html).
reviewed: true
question: Izina rya mbere ry’uwo muhinga w’ivy’itumanaho wo mu gisagara ca Temple City uwo umunyamakuru wo mu kinyamakuru Newsweek yihenda mu kumenya ko ari Satoshi Nakamoto muri Ntwarante 2014 ryari irihe?
answer: Doriyani
wrong_answers:
  - Ukwiga
  - Satoshi.
  - Patoshi
explanation: |
  Izina ryiwe ryose ryari Dorian Prentice Satoshi Nakamoto. Yari akomoka mu Buyapani. Raba [ingingo y’ikinyamakuru Newsweek](https://www.ikinyamakuru.
reviewed: true
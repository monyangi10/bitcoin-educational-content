question: Wat was de voornaam van de telecommunicatie-ingenieur uit Temple City die in maart 2014 door een journalist van Newsweek ten onrechte werd geïdentificeerd als Satoshi Nakamoto?
answer: Dorian
wrong_answers:
  - Prentice
  - Satoshi
  - Patoshi
explanation: |
  Zijn volledige naam was Dorian Prentice Satoshi Nakamoto. Hij was van Japanse afkomst. Zie [het artikel in Newsweek](https://www.newsweek.com/2014/03/14/face-behind-Bitcoin-247957.html).
reviewed: true
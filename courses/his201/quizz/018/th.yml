question: อะไรที่ทำให้ RPOW มีความพิเศษเมื่อเทียบกับแนวคิดสกุลเงินดิจิทัลอื่น ๆ เช่น eCash, b-money และ bit gold?
answer: มันขึ้นอยู่กับเซิร์ฟเวอร์ที่โปร่งใส
wrong_answers:
  - มันใช้ proof of work
  - หน่วยบัญชีของมันไม่ได้รับการสนับสนุนจากสิ่งใด
  - ผู้ใช้ถือบันทึกดิจิทัลของสกุลเงินเฉพาะแทนที่จะเป็นบัญชี
explanation: |
  มันใช้ proof of work เหมือน b-money และ bit gold แต่ไม่มีการสนับสนุน เช่นเดียวกับ bit gold เหมือน eCash (และเหมือน Bitcoin ในภายหลัง) RPOW อนุญาตให้ถือครองธนบัตรดิจิทัลแต่ละใบแทนที่จะเป็นบัญชี และในแง่นี้ค่อนข้างเป็นความลับ
reviewed: true
question: 이캐시, 비머니, 비트골드와 같은 다른 디지털 화폐 개념과 비교했을 때 RPOW의 독특한 점은 무엇인가요?
answer: 투명한 서버를 기반으로 합니다
wrong_answers:
  - Proof of Work을 사용했습니다
  - 계정 단위는 아무것도 뒷받침되지 않았습니다
  - 사용자는 계좌가 아닌 특정 액면가의 디지털 노트를 보유했습니다
explanation: |
  비머니와 비트골드처럼 Proof of Work을 사용했지만 비트골드처럼 뒷받침이 없었습니다. E캐시와 마찬가지로(그리고 이후 Bitcoin와 마찬가지로) RPOW는 계좌가 아닌 개별 디지털 노트를 보유할 수 있었으며, 이런 점에서 상대적으로 기밀성이 높았습니다.
reviewed: true
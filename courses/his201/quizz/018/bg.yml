question: Какво е уникалното в RPOW в сравнение с други концепции за цифрови валути като eCash, b-money и bit gold?
answer: Той се основава на прозрачен сървър
wrong_answers:
  - Той използва proof of work
  - Нейната разчетна единица не беше подкрепена с нищо
  - Потребителите държаха цифрови банкноти с определена номинална стойност, а не сметки
explanation: |
  Той използваше proof of work като b-money и bit gold, но нямаше обезпечение, както при bit gold. Подобно на eCash (а по-късно и на Bitcoin), RPOW позволяваше притежаването на индивидуални цифрови банкноти, а не на сметка, и в това отношение беше сравнително поверителна.
reviewed: true
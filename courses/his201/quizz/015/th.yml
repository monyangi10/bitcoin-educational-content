question: เป้าหมายเริ่มต้นของอัลกอริทึม Hashcash proof of work ที่ออกแบบโดย Adam Back คืออะไร?
answer: เพื่อต่อสู้กับอีเมลสแปม
wrong_answers:
  - เพื่อรับประกันมูลค่าของหน่วยบัญชี
  - เพื่อให้บรรลุฉันทามติในเครือข่ายเพียร์ทูเพียร์
  - ต้มมหาสมุทร
explanation: |
  Hashcash ต้องการ proof of work สำหรับอีเมลแต่ละฉบับที่ได้รับ ซึ่งมีวัตถุประสงค์เพื่อจำกัดสแปม
reviewed: true
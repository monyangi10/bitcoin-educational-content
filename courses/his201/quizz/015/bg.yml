question: Каква беше първоначалната цел на алгоритъма Hashcash proof of work, разработен от Адам Бак?
answer: Борба с нежеланата поща
wrong_answers:
  - Гарантиране на стойността на разчетна единица
  - Постигане на консенсус в мрежа от типа peer-to-peer
  - Да кипнат океаните
explanation: |
  Hashcash изискваше proof of work за всеки получен имейл, което трябваше да ограничи спама.
reviewed: true
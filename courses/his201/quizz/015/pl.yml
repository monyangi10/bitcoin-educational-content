question: Jaki był początkowy cel dowodu pracy dla algorytmu Hashcash zaprojektowanego przez Adama Backa?
answer: Zwalczanie spamu w wiadomościach e-mail
wrong_answers:
  - Gwarancja wartości jednostki rozliczeniowej
  - Osiągnięcie konsensus w sieci peer-to-peer
  - Zagotowanie oceanów
explanation: |
  Hashcash wymagał dowodu pracy dla każdej otrzymanej wiadomości e-mail, co miało ograniczyć spam.
reviewed: true

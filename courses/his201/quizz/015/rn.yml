question: Ni igiki cari intumbero cambere c'ubuhinga bwa Proof of Work bwakozwe na Adam Back?
answer: Kurwanya imeyili mbi zidakenewe
wrong_answers:
  - Kugira ugumane agaciro k'ingero ya konti
  - Kugira ngo haboneke ukwiyumvikana ku bijanye n'urubuga rwa peer-to-peer
  - Gushusha ikiyaga
explanation: |
  Hashcash yasaba Proof of Work kuri email yose umuntu yaronka, ivyo bikaba vyari bisanzwe vyohagarika spam.

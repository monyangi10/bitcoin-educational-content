question: हाशकैश Proof of Work एल्गोरिदम का मूल लक्ष्य क्या था जिसे एडम बैक ने डिजाइन किया था?
answer: स्पैम ईमेल से निपटने के लिए
wrong_answers:
  - खाते की एक इकाई के मूल्य की गारंटी देना
  - पीयर-टू-पीयर नेटवर्क पर सहमति प्राप्त करने के लिए
  - समुद्र को उबालना
explanation: |
  हर ईमेल पाने के लिए Hashcash को एक Proof of Work की जरूरत होती थी, जिससे स्पैम को कम करने का इरादा था।
reviewed: false
question: 2009年に、自身のプロジェクトのコミュニケーションを手伝い、特にビットコインのウェブサイトとフォーラムの管理を行った若いフィンランド人の名前は何ですか？
answer: Martti Malmi
wrong_answers:
  - Mike Hearn
  - Gavin Andresen
  - RPOW
explanation: |
  彼は2009年4月にサトシに連絡を取りました。サトシはすぐに彼にFAQとウェブサイトのプレゼンテーションの作成を依頼しました。Martti Malmi（マルティ・マルミ）は1年以上にわたってサトシの右腕でした。
  レビュー済み: false

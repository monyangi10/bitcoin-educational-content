question: वह युवा फिनिश व्यक्ति कौन था जिसने 2009 में Satoshi के प्रोजेक्ट के बारे में संचार में मदद की थी, खासकर Bitcoin वेबसाइट और फोरम को मैनेज करके?
answer: मार्टी माल्मी
wrong_answers:
  - माइक हर्न
  - गेविन एंड्रीसन
  - आरपीओडब्ल्यू
explanation: |
  उसने अप्रैल 2009 में Satoshi से संपर्क किया। Satoshi ने तुरंत उसे वेबसाइट के लिए एक FAQ और एक प्रेजेंटेशन लिखने का काम सौंपा। मार्टी माल्मी एक साल से ज्यादा समय तक Satoshi का दाहिना हाथ रहा।
reviewed: false
question: Wat was de naam van de jonge Fin die Satoshi in 2009 hielp communiceren over zijn project, met name door de Bitcoin website en het forum te beheren?
answer: Martti Malmi
wrong_answers:
  - Mike Hearn
  - Gavin Andresen
  - RPOW
explanation: |
  In april 2009 nam hij contact op met Satoshi. Satoshi belastte hem onmiddellijk met het schrijven van een FAQ en een presentatie voor de website. Martti Malmi was meer dan een jaar lang de rechterhand van Satoshi.
reviewed: true
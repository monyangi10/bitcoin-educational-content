question: ชื่อของชาวฟินน์หนุ่มที่ช่วย Satoshi สื่อสารเกี่ยวกับโครงการของเขาในปี 2009 โดยเฉพาะการจัดการเว็บไซต์และฟอรัม Bitcoin คืออะไร?
answer: Martti Malmi
wrong_answers:
  - ไมค์ เฮิร์น
  - กาวิน แอนเดรเซน
  - RPOW
explanation: |
  เขาติดต่อ Satoshi ในเดือนเมษายน 2009 Satoshi มอบหมายให้เขาเขียน FAQ และการนำเสนอสำหรับเว็บไซต์ทันที Martti Malmi เป็นมือขวาของ Satoshi มานานกว่าหนึ่งปี
reviewed: true
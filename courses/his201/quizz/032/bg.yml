question: Как се казваше младият финландец, който помогна на Satoshi да комуникира за своя проект през 2009 г., по-специално като управляваше уебсайта и форума на Bitcoin?
answer: Марти Малми
wrong_answers:
  - Майк Хърн
  - Гавин Андресен
  - RPOW
explanation: |
  През април 2009 г. той се свързва с Satoshi. Satoshi веднага му възлага да напише често задавани въпроси и презентация за уебсайта. Марти Малми е дясната ръка на Satoshi повече от година.
reviewed: true

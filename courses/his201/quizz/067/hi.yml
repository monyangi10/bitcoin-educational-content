question: कौन सा संगठन नवंबर 2010 में समुदाय के दबाव के बाद Bitcoin को स्वीकार करने लगा?
answer: इलेक्ट्रॉनिक फ्रंटियर फाउंडेशन
wrong_answers:
  - विकिलीक्स
  - रेड क्रॉस
  - एमनेस्टी इंटरनेशनल
explanation: |
  यह संगठन, जिसे 1900 में मिच कापोर, जॉन गिलमोर और जॉन पेरी बार्लो ने मिलकर बनाया था, का मकसद इंटरनेट की आज़ादी को बचाना था। इसने 9 नवंबर को Bitcoin को स्वीकार करना शुरू किया।
reviewed: false
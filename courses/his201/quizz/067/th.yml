question: องค์กรใดที่เริ่มรับบิทคอยน์ในเดือนพฤศจิกายน 2010 หลังจากการล็อบบี้โดยชุมชน?
answer: มูลนิธิพรมแดนอิเล็กทรอนิกส์
wrong_answers:
  - WikiLeaks
  - สภากาชาด
  - แอมเนสตี้ อินเตอร์เนชั่นแนล
explanation: |
  องค์กรนี้ก่อตั้งร่วมกันในปี 1900 โดย Mitch Kapor, John Gilmore และ John Perry Barlow มีเป้าหมายเพื่อปกป้องเสรีภาพทางอินเทอร์เน็ต เริ่มรับบิตคอยน์เมื่อวันที่ 9 พฤศจิกายน
reviewed: true
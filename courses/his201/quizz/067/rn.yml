question: Ni irihe shirahamwe ryatanguye kwemera Bitcoin mu kwezi kwa 11/2010 hakurikijwe ugusaba kw’abanyagihugu?
answer: Ishirahamwe ry'imipaka y'ubuhinga bwa none
wrong_answers:
  - WikiLeaks
  - Umusaraba utukura
  - Ishirahamwe mpuzamakungu ry'imbabazi
explanation: |
  Iryo shirahamwe ryashinzwe mu mwaka w’1900 na Mitch Kapor, John Gilmore na John Perry Barlow, ryari rigamije kurinda umwidegemvyo wo kuri internet. Yatanguye kwemera Bitcoin kw’igenekerezo rya 9 Ugushyingo.
reviewed: true
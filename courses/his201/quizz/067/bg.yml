question: Коя организация започна да приема биткойни през ноември 2010 г. след лобиране от страна на общността?
answer: Electronic Frontier Foundation
wrong_answers:
  - WikiLeaks
  - The Red Cross
  - Amnesty International
explanation: |
  Тази организация, основана през 1900 г. от Мич Капор, Джон Гилмор и Джон Пери Барлоу, има за цел да защитава свободите в интернет. Тя започна да приема биткойни на 9 ноември.
reviewed: true

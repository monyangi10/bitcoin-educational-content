question: Ni nde Satoshi Nakamoto yashizeko ububasha bwo kugenzura urubuga (harimwo n’ihuriro n’urubuga rwa wiki) igihe yagenda?
answer: Martti Malmi
wrong_answers:
  - Gavin Andresen
  - Hal Finney
  - Mike Hear
explanation: |
  Ntiyaronka umwanya wo kuyirongora maze aca yihuta guha uwundi ico gikorwa. Ico kibanza n’ihuriro vyatwawe na Theymos na Cøbra.
reviewed: true

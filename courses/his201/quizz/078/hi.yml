question: Satoshi नाकामोटो ने अपने जाने के बाद वेबसाइट (जिसमें फोरम और विकी भी शामिल हैं) का कंट्रोल किसे ट्रांसफर किया था?
answer: मार्टी माल्मी
wrong_answers:
  - गेविन एंडरसन
  - हाल फिन्नी
  - माइक हर्न
explanation: |
  उसके पास इसे मैनेज करने का समय नहीं था, इसलिए उसने जल्दी से काम को दूसरों को सौंप दिया। साइट और फोरम को Theymos और Cøbra ने संभाल लिया।
reviewed: false
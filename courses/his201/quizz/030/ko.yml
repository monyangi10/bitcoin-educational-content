question: Satoshi 나카모토가 P2P 재단 포럼에 기재한 생년월일은 언제인가요?
answer: 1975년 4월 5일
wrong_answers:
  - 1973년 4월 3일
  - 1973년 4월 5일
  - 1975년 4월 3일
explanation: |
  이 복합 날짜는 1933년부터 1975년까지 미국 시민이 금을 소유하는 것이 금지된 날을 의미합니다: 4월 5일은 1933년 이 금지령이 제정된 날(행정명령 6102호)이고, 1975년은 이 금지령이 폐지된 날(공법 93-373호)입니다.
reviewed: true
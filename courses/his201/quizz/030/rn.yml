question: Yari iyihe tariki y’amavuko yashizwe na Satoshi Nakamoto ku rutonde rw'nama y’ishirahamwe P2P?
answer: Ndamukiza 1975
wrong_answers:
  - Ndamukiza 1973
  - Ndamukiza 1973
  - Ndamukiza 1975
explanation: |
  Iryo tariki ry’uruvange ryerekeza ku gihe abanyamerika babuzwa kugira inzahabu hagati ya 1933 na 1975: Igenekerezo rya 5 Ndamukiza ni umusi iryo tegeko ryashinzweko umukono mu 1933 (Itegeko Nshingwabikorwa 6102), kandi umwaka w’1975 ni ho ryakuweho (Itegeko rya Leta 93-37).
reviewed: true

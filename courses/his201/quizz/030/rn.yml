question: Ni itariki iyihe y’amavuko yashizwe ku rutonde na Satoshi Nakamoto ku nama y’ishirahamwe P2P?
answer: Ndamukiza 1975
wrong_answers:
  - Ndamukiza 1973
  - Ndamukiza 1973
  - Ndamukiza 1975
explanation: |
  Iryo tariki ry’uruvange ryerekeza ku kubuza abanyamerika kugira inzahabu hagati ya 1933 na 1975: Igenekerezo rya 5 Ndamukiza ni umusi iryo tegeko ryashinzweko mu 1933 (Itegeko Nshingwabikorwa 6102), kandi umwaka w’1975 ni ho ryakuweho (Itegeko rya Leta 93-37).
reviewed: true
question: Satoshi Nakamoto 在 P2P Foundation 論壇上列出的出生日期是哪一天？
answer: 1975 年 4 月 5 日
wrong_answers:
  - 1973 年 4 月 3 日
  - 1973 年 4 月 5 日
  - 1975 年 4 月 3 日
explanation: |
  此複合日期指的是 1933 年至 1975 年間禁止美國公民擁有黃金：4 月 5 日是這項禁令於 1933 年實施的日子 (第 6102 號行政命令)，而 1975 年則是這項禁令被廢除的日子 (第 93-373 號公法)。
reviewed: false
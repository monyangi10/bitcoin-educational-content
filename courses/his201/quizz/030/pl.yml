question: Jaką datę urodzenia podał Satoshi Nakamoto na forum P2P Foundation?
answer: 5 kwietnia 1975 r
wrong_answers:
  - 3 kwietnia 1973 r
  - 5 kwietnia 1973 r
  - 3 kwietnia 1975 r
explanation: |
  Ta złożona data odnosi się do zakazu posiadania złota przez obywateli amerykańskich w latach 1933-1975: 5 kwietnia to dzień, w którym zakaz ten został wprowadzony w 1933 r. (rozporządzenie wykonawcze 6102), a w 1975 r. został uchylony (ustawa publiczna 93-373).

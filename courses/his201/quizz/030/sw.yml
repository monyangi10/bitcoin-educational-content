question: Je, ni tarehe gani ya kuzaliwa iliyoorodheshwa na Satoshi Nakamoto kwenye jukwaa la Wakfu wa P2P?
answer: Aprili 5, 1975
wrong_answers:
  - Aprili 3, 1973
  - Aprili 5, 1973
  - Aprili 3, 1975
explanation: |
  Tarehe hii iliyojumuishwa inarejelea katazo la raia wa Marekani kumiliki dhahabu kati ya 1933 na 1975: Aprili 5 ndiyo siku ambayo marufuku hii iliwekwa mwaka wa 1933 (Agizo la Utendaji 6102) na mwaka wa 1975 ndipo lilipobatilishwa (Sheria ya Umma 93-373).
reviewed: false
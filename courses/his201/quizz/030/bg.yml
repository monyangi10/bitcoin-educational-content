question: Коя е рождената дата, посочена от Satoshi Nakamoto във форума на P2P Foundation?
answer: 5 април 1975 г
wrong_answers:
  - 3 април 1973 г
  - 5 април 1973 г
  - 3 април 1975 г
explanation: |
  Тази сборна дата се отнася до забраната американските граждани да притежават злато между 1933 и 1975 г: 5 април е денят, в който тази забрана е въведена през 1933 г. (Изпълнителна заповед 6102), а през 1975 г. тя е отменена (Закон 93-373).
reviewed: true
question: วันเกิดที่ Satoshi Nakamoto ระบุไว้ในฟอรัม P2P Foundation คืออะไร?
answer: 5 เมษายน 1975
wrong_answers:
  - 3 เมษายน 1973
  - 5 เมษายน 1973
  - 3 เมษายน 1975
explanation: |
  วันที่ประกอบนี้หมายถึงการห้ามพลเมืองอเมริกันครอบครองทองคำระหว่างปี 1933 ถึง 1975: วันที่ 5 เมษายนเป็นวันที่มีการสั่งห้ามนี้ในปี 1933 (คำสั่งบริหาร 6102) และปี 1975 เป็นปีที่มีการยกเลิก (กฎหมายสาธารณะ 93-373)
reviewed: true
question: Iryo rubuga ryari rirongowe na Jon Matonis ryari rivuga ku mafaranga y’ubuhinga bwa none (harimwo na Bitcoin kuva muri Ntwarante 2010) ryari irihe?
answer: Kazoza k'amahera
wrong_answers:
  - Ivyigwa vy'ubutunzi vya kera
  - Gusubira ku mafaranga
  - Ikigo ca Nakamoto
explanation: |
  Amaze guhanahana ama email na Satoshi, yasohoye [ingingo yiwe ya mbere kuri Bitcoin] ku wa 13 Ntwarante 2010.
reviewed: true
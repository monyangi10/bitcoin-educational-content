question: Jon Matonis tarafından yönetilen ve dijital para birimlerini ele alan blogun adı neydi (Mart 2010'dan itibaren Bitcoin dahil)?
answer: Parasal Gelecek
wrong_answers:
  - Klasik Ekonomik Çalışmalar
  - Nakde Dönüş
  - Nakamoto Enstitüsü
explanation: |
  Satoshi ile e-posta alışverişinde bulunduktan sonra, 13 Mart 2010 tarihinde [Bitcoin hakkındaki ilk makalesini](https://themonetaryfuture.blogspot.com/2010/03/Bitcoin-peer-to-peer-electronic-cash.html) yayınladı.
reviewed: true
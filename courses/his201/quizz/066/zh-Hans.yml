question: Jon Matonis 运营的、涵盖数字货币（包括从 2010 年 3 月开始的比特币）的博客叫什么名字？
answer: The Monetary Future（货币未来）
wrong_answers:
  - Classic Economic Studies（经典经济学研究）
  - Return to Cash（回归现金）
  - The Nakamoto Institute（中本聪研究所）
explanation: |
  他在与中本聪交换邮件后，于 2010 年 3 月 13 日发布了[关于比特币的第一篇文章](https://themonetaryfuture.blogspot.com/2010/03/bitcoin-peer-to-peer-electronic-cash.html)。
reviewed: false

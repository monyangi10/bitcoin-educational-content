question: Wat was de naam van de blog van Jon Matonis over digitale valuta (inclusief Bitcoin vanaf maart 2010)?
answer: De monetaire toekomst
wrong_answers:
  - Klassieke economische studies
  - Terug naar kas
  - Het Nakamoto-instituut
explanation: |
  Na het uitwisselen van e-mails met Satoshi, publiceerde hij zijn [eerste artikel over Bitcoin](https://themonetaryfuture.blogspot.com/2010/03/Bitcoin-peer-to-peer-electronic-cash.html) op 13 maart 2010.
reviewed: true
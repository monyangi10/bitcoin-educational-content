question: نام وبلاگی که توسط Jon Matonis اداره می‌شد و به پوشش ارزهای دیجیتال (از جمله Bitcoin از مارس 2010) می‌پرداخت، "The Monetary Future" بود.
answer: آینده پولی
wrong_answers:
  - مطالعات کلاسیک اقتصادی
  - بازگشت به نقدینگی
  - مؤسسه ناکاموتو
explanation: |
  او [اولین مقاله خود را در مورد Bitcoin](https://themonetaryfuture.blogspot.com/2010/03/Bitcoin-peer-to-peer-electronic-cash.html) در تاریخ ۱۳ مارس ۲۰۱۰، پس از تبادل ایمیل با Satoshi منتشر کرد.
reviewed: false
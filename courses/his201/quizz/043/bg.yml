question: Какво предлага Bitcoin Faucet, създаден през юни 2010 г. от Гавин Андресен?
answer: Биткойни
wrong_answers:
  - Ваучери за пазаруване
  - Отстъпки от таксите за пазар Bitcoin
  - Шансове за добив на блок
explanation: |
  Първоначално тази услуга разпределяше по пет биткойна на заявка, за да могат хората да изпробват системата. С течение на времето тази сума беше намалена и през 2012 г. кранчето беше затворено.
reviewed: true
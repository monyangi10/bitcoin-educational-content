question: Bitcoin Faucet ที่สร้างขึ้นในเดือนมิถุนายน 2010 โดย Gavin Andresen มีอะไรบ้าง?
answer: บิตคอยน์
wrong_answers:
  - บัตรกำนัลช้อปปิ้ง
  - ส่วนลดค่าธรรมเนียมสำหรับตลาด Bitcoin
  - โอกาสในการขุดบล็อก
explanation: |
  บริการนี้เริ่มต้นด้วยการแจกจ่ายบิตคอยน์ห้าหน่วยต่อคำขอเพื่อให้ผู้คนได้ลองใช้ระบบ จำนวนนี้ลดลงตามเวลา และก๊อกน้ำปิดในปี 2012
reviewed: true
question: जून 2010 में गेविन एंड्रिसन द्वारा बनाए गए Bitcoin और Faucet ने क्या पेशकश की थी?
answer: बिटकॉइन्स
wrong_answers:
  - शॉपिंग वाउचर
  - जीडब्ल्यू-2 मार्केट के लिए फीस छूट
  - ब्लॉक माइन करने के मौके
explanation: |
  यह सर्विस शुरू में हर रिक्वेस्ट पर 5 बिटकॉइन बांटती थी, ताकि लोग सिस्टम को आज़मा सकें। समय के साथ यह रकम कम होती गई, और Faucet 2012 में बंद हो गया।
reviewed: false
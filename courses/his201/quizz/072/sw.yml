question: Satoshi ilimkabidhi nani majukumu ya kutengeneza programu wakati anaondoka?
answer: Gavin Andresen
wrong_answers:
  - Marti Malmi
  - Jeff Garzik
  - Mike Hearn
explanation: |
  Hapo awali Gavin [alisema](https: //bitcointalk.org/index.php?topic=2367.msg31651#msg31651) kwamba angesimamia mradi wa Bitcoin kwa bidii zaidi na alikuwa amefungua hazina ya GitHub mnamo Desemba 2010.

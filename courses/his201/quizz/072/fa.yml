question: Satoshi مسئولیت‌های توسعه نرم‌افزار را به چه کسی واگذار کرد وقتی که او رفت؟
answer: گوین آندرسن
wrong_answers:
  - مارتتی مالمی
  - جف گارزیک
  - مایک هرن
explanation: |
  گاوین قبلاً [اظهار کرده بود](https://bitcointalk.org/index.php?topic=2367.msg31651#msg31651) که پروژه Bitcoin را به‌طور فعال‌تری مدیریت خواهد کرد و در دسامبر 2010 مخزن GitHub را باز کرده بود.
reviewed: false
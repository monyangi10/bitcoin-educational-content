question: Vem lämnade Satoshi över ansvaret för mjukvaruutvecklingen till när han slutade?
answer: Gavin Andresen
wrong_answers:
  - Martti Malmi
  - Jeff Garzik
  - Mike Hearn
explanation: |
  Gavin hade tidigare [sagt](https://bitcointalk.org/index.php?topic=2367.msg31651#msg31651) att han skulle hantera Bitcoin-projektet mer aktivt och hade öppnat GitHub-arkivet i december 2010.
reviewed: true
question: Aan wie gaf Satoshi de verantwoordelijkheden voor softwareontwikkeling toen hij vertrok?
answer: Gavin Andresen
wrong_answers:
  - Martti Malmi
  - Jeff Garzik
  - Mike Hearn
explanation: |
  Gavin had eerder [verklaard](https://bitcointalk.org/index.php?topic=2367.msg31651#msg31651) dat hij het Bitcoin project actiever zou beheren en had de GitHub repository in december 2010 geopend.
reviewed: true
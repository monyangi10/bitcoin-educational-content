question: Komu Satoshi przekazał odpowiedzialność za rozwój oprogramowania, gdy odszedł?
answer: Gavinowi Andresenowi
wrong_answers:
  - Marttiemu Malmi
  - Jeffowi Garzikowi
  - Mike'owi Hearnowi
explanation: |
  Gavin wcześniej [oświadczył](https://bitcointalk.org/index.php?topic=2367.msg31651#msg31651), że będzie bardziej aktywnie zarządzał projektem Bitcoin i otworzył repozytorium GitHub w grudniu 2010 roku.
reviewed: true

question: Satoshi ayrıldığında yazılım geliştirme sorumluluklarını kime devretti?
answer: Gavin Andresen
wrong_answers:
  - Martti Malmi
  - Jeff Garzik
  - Mike Hearn
explanation: |
  Gavin daha önce (https://bitcointalk.org/index.php?topic=2367.msg31651#msg31651) Bitcoin projesini daha aktif bir şekilde yöneteceğini [belirtmiş] ve Aralık 2010'da GitHub deposunu açmıştı.
reviewed: true
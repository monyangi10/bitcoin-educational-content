question: 在 Bitcoin 中有哪些對抗礦機集中化的策略？
answer: 在 Bitcoin 中對抗礦機集中化的策略包括家庭挖礦、Stratum V2 通訊協定、開源軟體，以及行動者和地域的多樣化。
wrong_answers:
  - 在 Bitcoin 中對抗礦機集中化的策略包括增加區塊大小、實施PoS，以及建立一個中央機構來監督挖礦。
  - Bitcoin 中對抗礦機集中化的策略包括減少區塊獎勵、交易手續費，以及開徵挖礦稅。
  - 在 Bitcoin 中對抗礦機集中化的策略包括增加挖礦的難度、實施挖礦上限以及建立挖礦抽獎。
explanation: |
  本章討論了幾項對抗礦機集中化的策略
  集中在 Bitcoin，包括家庭挖礦

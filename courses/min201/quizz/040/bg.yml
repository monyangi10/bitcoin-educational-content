question: Какво установява mining за Bitcoin?
answer: Минимална цена
wrong_answers:
  - Таванна цена
  - Фиксирана цена
  - Променлива цена
explanation: |
  Mining установява минимална цена за Bitcoin, под която
  миньорите ще продават на загуба. Цената на mining
  оказва значително влияние върху цената на Bitcoin.
reviewed: true
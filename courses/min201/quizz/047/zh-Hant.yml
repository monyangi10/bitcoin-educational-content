question: 投資於銷售 Mining 硬體並在低成本能源地點管理機器的公司，其主要風險為何？
answer: 電源 Supply 問題和機器故障可能會讓投資人無能為力，無法控制昂貴的設備。
wrong_answers:
  - 公司可能會破產，投資人可能會血本無歸。
  - 這些公司可能是騙局，投資者可能會損失金錢。
  - 公司可能無法出售挖出的比特幣，投資者可能會損失金錢。
explanation: |
  投資於下列公司的主要風險
  銷售 Mining 硬體，並以低成本方式管理機器
  能源地點的電力 Supply 問題和機器
  失敗可能會讓投資人無力負擔昂貴的投資成本。
  他們無法控制的設備。
reviewed: true
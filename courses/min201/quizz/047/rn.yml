question: Ni ikihe kibazo nyamukuru gishobora guterwa n’ugushiramwo amahera mu masosiyete agurisha ibikoresho vya Mining no gucunga amashini mu bibanza bikoreshwamwo inguvu zidahenda cane?
answer: Ibibazo vy’amashanyarazi Supply n’ugusenyuka kw’imashini birashobora gutuma abashoramari batagira ubushobozi, bafise ibikoresho bizimvye batagenzura.
wrong_answers:
  - Amashirahamwe yoshobora gusenyuka, abashoramari bagatakaza amahera yabo.
  - Amashirahamwe ashobora kuba ari abahendanyi kandi abashoramari bashobora gutakaza amahera yabo.
  - Amashirahamwe yoshobora kutashobora kugurisha ama bitcoins yacukuwe kandi abashoramari bashobora gutakaza amahera yabo.
explanation: |
  Ico kibazo nyamukuru gishobora guterwa n’ugushiramwo amahera mu masosiyete
  kugurisha ibikoresho vya Mining no gucunga amashini kugiciro gito
  inguvu ahantu ni iyo nguvu Supply ibibazo n'imashini
  kunanirwa bishobora gusiga abashoramari ata bubasha bafise, bafise ibizimvye
  ibikoresho batagenzura.
reviewed: true
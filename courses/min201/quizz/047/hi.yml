question: Mining हार्डवेयर बेचने वाली और कम लागत वाले ऊर्जा स्थानों पर मशीनों को मैनेज करने वाली कंपनियों में निवेश करने से जुड़ा मुख्य जोखिम क्या है?
answer: पावर जीडब्ल्यू-1 के मसले और मशीन के फेल होने से निवेशक बेबस हो सकते हैं, महंगे उपकरणों के साथ जिन पर उनका कोई कंट्रोल नहीं होता।
wrong_answers:
  - कंपनियाँ दिवालिया हो सकती हैं और निवेशकों का पैसा डूब सकता है।
  - कंपनियां धोखाधड़ी हो सकती हैं और निवेशकों का पैसा डूब सकता है।
  - कंपनियाँ खुदाई किए गए बिटकॉइन बेचने में सक्षम नहीं हो सकती हैं और निवेशकों का पैसा डूब सकता है।
explanation: |
  कंपनियों में निवेश करने से जुड़ा मुख्य जोखिम यह है कि...
  Mining हार्डवेयर बेचो और मशीनों को कम लागत में मैनेज करो
  ऊर्जा स्थानों का मतलब है कि पावर Supply के मसले और मशीन
  नाकामयाबी निवेशकों को बेबस छोड़ सकती है, और महंगी पड़ सकती है।
  वो सामान जिस पर उनका कंट्रोल नहीं है।
reviewed: true
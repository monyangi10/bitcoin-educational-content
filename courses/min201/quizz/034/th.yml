question: เป้าหมายของชุมชน Bitcoin ในด้านการจัดการเครือข่ายคืออะไร?
answer: เพื่อเสริมสร้างการกระจาย การต้านทานการเซ็นเซอร์ และความทนทานต่อความเปราะบางของเครือข่าย
wrong_answers:
  - เพื่อเพิ่มราคาของ Bitcoin
  - เพื่อให้การทำธุรกรรมเร็วขึ้น
  - เพื่อเพิ่มความยากของ mining
explanation: |
  ชุมชน Bitcoin กำลังพยายามอย่างต่อเนื่องในการปรับปรุงการกระจาย การต่อต้านการเซ็นเซอร์ และความทนทานของเครือข่าย สิ่งนี้สอดคล้องกับภารกิจพื้นฐานของ Bitcoin ในการเป็นเครือข่ายแลกเปลี่ยนมูลค่าที่ต้านทานการเซ็นเซอร์
reviewed: true
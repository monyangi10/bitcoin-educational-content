question: Ni iyihe ntumbero y’umuryango wa Bitcoin mu bijanye n’ugucungera urubuga?
answer: Kugira ngo hakomezwe ugukwiragiza, ukurwanya ugucengera, no kurwanya ubugoyagoye bw’urubuga.
wrong_answers:
  - Kugira ngo bongere igiciro ca Bitcoin.
  - Kugira ngo amafaranga yihute.
  - Kugira ngo wongere ingorane za Mining.
explanation: |
  Umuryango wa Bitcoin uguma wihatira gukomeza .
  gukwiragiza, kurwanya ugucengera, no kurwanya ubugoyagoye
  y’urubuga. Ivyo bihuye n’ingingo nyamukuru ya Bitcoin .
  ubutumwa bwo kuba agaciro gashobora guhangana n’ugucengera Exchange.
  umuhora.
reviewed: true
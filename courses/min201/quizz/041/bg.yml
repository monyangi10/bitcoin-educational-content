question: Какъв е дебатът в общността на Bitcoin по отношение на mining?
answer: Балансът между стремежа към печалба и приноса към сигурността и разпространението на мрежата Bitcoin
wrong_answers:
  - Балансът между увеличаването на hashrate и намаляването на броя на активните възли
  - Балансът между увеличаване на цената и намаляване на разходите
  - Балансът между увеличаването на броя на транзакциите и намаляването на потреблението на енергия
explanation: |
  Дебатът в общността на Bitcoin относно mining
  се върти около баланса между търсенето на печалба и
  допринасянето за сигурността и разпространението на
  Bitcoin. И от двете страни има силни аргументи
  на дебата.
reviewed: true
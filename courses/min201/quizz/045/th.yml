question: ข้อได้เปรียบหลักของการเป็นเจ้าของอุปกรณ์ mining ของคุณเองคืออะไร?
answer: การได้มาซึ่งบิทคอยน์บริสุทธิ์
wrong_answers:
  - หลีกเลี่ยงความจำเป็นในการซื้อ Bitcoin โดยตรง
  - ทำกำไรจากการขายอุปกรณ์ในภายหลัง
  - หลีกเลี่ยงความจำเป็นในการไว้วางใจนักขุดคนอื่น ๆ
explanation: |
  การเป็นเจ้าของอุปกรณ์ mining ของคุณเองมีข้อได้เปรียบอย่างมาก นอกเหนือจากความพึงพอใจส่วนตัวในการมีส่วนร่วมอย่างแข็งขันต่อความปลอดภัยของเครือข่าย Bitcoin และเห็นผลตอบแทนที่ตกลงใน wallet ของคุณแล้ว ยังมีแง่มุมที่น่าสนใจของบิตคอยน์บริสุทธิ์อีกด้วย เหล่านี้คือบิตคอยน์ที่ถูกขุดใหม่ที่ไม่เคยถูกใช้จ่ายและไม่มีประวัติที่เกี่ยวข้องกับพวกมัน
reviewed: true
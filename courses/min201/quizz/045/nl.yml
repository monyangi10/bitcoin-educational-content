question: Wat is het belangrijkste voordeel van je eigen Mining uitrusting?
answer: Onontgonnen bitcoins verwerven.
wrong_answers:
  - Zo hoeft u Bitcoin niet rechtstreeks aan te schaffen.
  - Winst maken door de apparatuur later te verkopen.
  - Vermijden dat je andere mijnwerkers moet vertrouwen.
explanation: |
  Het bezit van je eigen Mining apparatuur biedt aanzienlijke
  voordelen. Naast de persoonlijke voldoening van
  actief bij te dragen aan de veiligheid van het Bitcoin
  netwerk en de beloningen in je Wallet te zien vallen, is er
  het aantrekkelijke aspect van maagdelijke bitcoins. Dit zijn
  vers gedolven bitcoins die nog nooit zijn uitgegeven en waar
  geen geschiedenis.
reviewed: true
question: Mining 장비를 직접 소유하면 어떤 이점이 있나요?
answer: 버진 비트코인 획득.
wrong_answers:
  - Bitcoin을 직접 구매할 필요가 없습니다.
  - 나중에 장비를 판매하여 수익을 창출합니다.
  - 다른 채굴자를 신뢰할 필요가 없습니다.
explanation: |
  자체 Mining 장비를 소유하면 상당한
  이점을 제공합니다. 개인적인 만족감 외에도
  gW-2 네트워크의 보안에 적극적으로 기여하고
  네트워크 보안에 적극적으로 기여하고 보상이 Wallet로 떨어지는 것을 보는 개인적인 만족감 외에도
  버진 비트코인의 매력적인 측면이 있습니다. 이는 다음과 같습니다
  한 번도 사용되지 않은 채굴된 비트코인은
  기록이 없습니다.
reviewed: true
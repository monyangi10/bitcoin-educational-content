question: Koja je glavna prednost posedovanja sopstvene rudarske opreme?
answer: Sticanje netaknutih bitkoina.
wrong_answers:
  - Izbegavanje potrebe za direktnom kupovinom Bitcoina.
  - Ostvarivanje profita od kasnije prodaje opreme.
  - Izbegavanje potrebe za poverenjem drugim rudarima.
explanation: |
  Posedovanje sopstvene rudarske opreme nudi značajne prednosti. Pored ličnog zadovoljstva aktivnog doprinosa bezbednosti Bitcoin mreže i 
  posmatranja kako nagrade dolaze u vaš novčanik, postoji i privlačan aspekt novokreiranih bitkoina. Ovo su sveže iskopani bitkoini koji nikada nisu bili potrošeni
  i nemaju istoriju vezanu za njih.
reviewed: true

question: บทบาทของนักขุดในเครือข่าย Bitcoin คืออะไร?
answer: นักขุดมีบทบาทสำคัญในการตรวจสอบและสร้างบล็อก
wrong_answers:
  - นักขุดทำการตรวจสอบธุรกรรมเท่านั้น
  - คนขุดเหมืองควบคุมราคาของ Bitcoin.
  - คนขุดแร่ไม่มีบทบาทในเครือข่าย Bitcoin
explanation: |
  นักขุดมีบทบาทสำคัญในเครือข่าย Bitcoin โดยการตรวจสอบและสร้างบล็อก พวกเขาเสริมความแข็งแกร่งให้กับเครือข่ายเพื่อต่อต้านการเซ็นเซอร์โดยการใช้ไฟฟ้าในการคำนวณ proof of work สำหรับ Bitcoin
reviewed: true
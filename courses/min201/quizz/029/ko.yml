question: Bitcoin 네트워크에서 채굴자의 역할은 무엇인가요?
answer: 채굴자는 블록의 유효성을 검사하고 생성하는 데 중요한 역할을 합니다.
wrong_answers:
  - 채굴자는 트랜잭션만 검증합니다.
  - 채굴자는 Bitcoin의 가격을 통제합니다.
  - 채굴자는 Bitcoin 네트워크에서 아무런 역할을 하지 않습니다.
explanation: |
  채굴자는 Bitcoin 네트워크에서 다음과 같은 필수적인 역할을 수행합니다
  블록을 검증하고 생성합니다. 마이너는 검열에 맞서 네트워크를 강화합니다
  검열에 대항하여 네트워크를 강화합니다
  Proof of Work을 계산하여 네트워크를 검열로부터 강화합니다.
reviewed: true
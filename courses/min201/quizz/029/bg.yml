question: Каква е ролята на миньорите в мрежата Bitcoin?
answer: Миньорите играят ключова роля при валидирането и създаването на блокове.
wrong_answers:
  - Миньорите само потвърждават транзакции.
  - Миньорите контролират цената на Bitcoin.
  - Миньорите нямат роля в мрежата Bitcoin.
explanation: |
  Миньорите играят съществена роля в мрежата Bitcoin, като
  валидиране и създаване на блокове. Те укрепват мрежата
  срещу цензура, като използват електричество за изчисляване на
  proof of work за Bitcoin.
reviewed: true
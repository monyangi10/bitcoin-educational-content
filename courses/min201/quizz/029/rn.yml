question: Ni uruhara uruhe abacukuzi bafise mu mugwi wa Bitcoin?
answer: Abacukuzi barafise uruhara runini mu kwemeza no guhingura amabuye.
wrong_answers:
  - Abacukuzi b’amabuye y’agaciro ni bo bemeza gusa amafaranga.
  - Abacukuzi b’amabuye y’agaciro ni bo bagenzura igiciro ca Bitcoin.
  - Abacukuzi nta ruhara bafise mu murongo wa Bitcoin.
explanation: |
  Abacukuzi b’amabuye y’agaciro barafise uruhara runini mu rubuga rwa Bitcoin gushika ku 2019.
  kwemeza no kurema amabuye. Bakomeza uruja n'uruza .
  ku bijanye n’ugucengera hakoreshejwe umuyagankuba kugira ngo habare .
  Proof of Work ku Bitcoin.
reviewed: true
question: Bitcoin नेटवर्क में डिफिकल्टी एडजस्टमेंट मैकेनिज्म का मकसद क्या है?
answer: यह सुनिश्चित करने के लिए कि ब्लॉक्स हर 10 मिनट में औसतन माइन हो जाएं
wrong_answers:
  - समय के साथ Mining की कठिनाई बढ़ाने के लिए
  - समय के साथ Mining की कठिनाई को कम करने के लिए
  - यह सुनिश्चित करने के लिए कि एक ही Miner लगातार ब्लॉक्स न माइन करे
explanation: |
  डिफिकल्टी एडजस्टमेंट एक अहम मैकेनिज्म है जो...  

(नोट: आपका वाक्य अधूरा था, इसलिए मैंने अनुवाद भी उसी पॉइंट तक किया है। पूरा वाक्य दें तो पूरा अनुवाद कर दूँगा!)
  जीडब्ल्यू-4 नेटवर्क का संचालन, यह सुनिश्चित करते हुए कि ब्लॉक्स हैं
  हर 10 मिनट में औसतन खनन किया जाता है। यह समायोजन
  मैकेनिज्म यह सुनिश्चित करता है कि नए ब्लॉक्स के लिए Mining का समय
  समय के साथ स्थिर रहता है, चाहे संख्या कुछ भी हो
  खनिक या नेटवर्क की कुल कंप्यूटिंग शक्ति।
reviewed: true
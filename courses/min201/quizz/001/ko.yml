question: Bitcoin 네트워크에서 난이도 조정 메커니즘의 목적은 무엇인가요?
answer: 평균 10분마다 블록이 채굴되도록 하려면 다음과 같이 하세요
wrong_answers:
  - 시간이 지남에 따라 Mining의 난이도를 높이려면 다음과 같이 하세요
  - 시간이 지남에 따라 Mining의 난이도를 낮추려면 다음과 같이 하세요
  - 동일한 Miner가 연속 블록을 채굴하지 않도록 하려면 다음과 같이 하세요
explanation: |
  난이도 조정은 Bitcoin 네트워크 운영에서 중요한 메커니즘입니다
  gW-4 네트워크 운영에서 중요한 메커니즘입니다
  평균 10분마다 채굴됩니다. 이 조정
  메커니즘은 새로운 블록에 대한 Mining 시간을 보장합니다
  채굴자 수나 전체 컴퓨팅 성능에 관계없이 시간이 지나도 일정하게 유지됩니다
  네트워크의 전체 컴퓨팅 성능에 관계없이 일정하게 유지됩니다.
reviewed: true
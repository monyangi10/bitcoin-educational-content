question: วัตถุประสงค์ของกลไกการปรับความยากในเครือข่าย Bitcoin คืออะไร?
answer: เพื่อให้แน่ใจว่าบล็อกถูกขุดโดยเฉลี่ยทุก ๆ 10 นาที
wrong_answers:
  - เพื่อเพิ่มความยากของ mining เมื่อเวลาผ่านไป
  - เพื่อลดความยากของ mining เมื่อเวลาผ่านไป
  - เพื่อให้แน่ใจว่าไม่มีนักขุดคนเดียวกันขุดบล็อกติดต่อกัน
explanation: |
  การปรับความยากเป็นกลไกที่สำคัญใน
  การดำเนินงานของเครือข่าย Bitcoin เพื่อให้แน่ใจว่าบล็อกจะถูก
  ขุดโดยเฉลี่ยทุก ๆ 10 นาที กลไกการปรับนี้
  ทำให้แน่ใจว่าเวลาของ mining สำหรับบล็อกใหม่
  ยังคงคงที่ตลอดเวลา ไม่ว่าจะมีจำนวน
  นักขุดหรือพลังการคำนวณโดยรวมของเครือข่ายมากน้อยเพียงใดก็ตาม
reviewed: true
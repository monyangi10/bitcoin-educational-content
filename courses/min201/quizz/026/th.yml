question: บทบาทของโหนดในเครือข่าย Bitcoin คืออะไร?
answer: โหนดรักษาความสมบูรณ์โดยการตรวจสอบและยืนยันธุรกรรมและบล็อก
wrong_answers:
  - โหนดสร้างและตรวจสอบบล็อก
  - โหนดตรวจสอบเฉพาะธุรกรรมเท่านั้น
  - โหนดไม่มีบทบาทในเครือข่าย Bitcoin
explanation: |
  ในเครือข่าย Bitcoin โหนดจะรักษาความสมบูรณ์ของเครือข่ายโดยการตรวจสอบและยืนยันธุรกรรมและบล็อก บล็อกที่ไม่ถูกต้องหรือฉ้อโกงจะถูกปฏิเสธโดยโหนด เพื่อรักษาความปลอดภัยของเครือข่าย
reviewed: true
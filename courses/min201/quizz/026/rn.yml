question: Ni uruhara uruhe rw’ibihimba vy’umubiri mu rubuga rwa Bitcoin?
answer: Nodes zigumya ubutungane mu kugenzura no kwemeza amafaranga n’amabuye.
wrong_answers:
  - Nodes zirema kandi zikemeza amabuye.
  - Nodes zigenzura gusa amafaranga.
  - Nodes nta ruhara zifise mu rubuga rwa Bitcoin.
explanation: |
  Mu rubuga rwa Bitcoin, amanode arabungabunga ubutungane bw’
  urubuga mu kugenzura no kwemeza amafaranga n'
  amabuye. Igipande kitari co canke c'ubuhendanyi kizokwangwa
  n’ibihimba, bikabungabunga umutekano w’urubuga.
reviewed: true
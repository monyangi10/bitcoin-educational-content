question: Bitcoin 네트워크에서 노드의 역할은 무엇인가요?
answer: 노드는 트랜잭션과 블록을 검증하고 유효성을 검사하여 무결성을 유지합니다.
wrong_answers:
  - 노드는 블록을 생성하고 유효성을 검사합니다.
  - 노드는 트랜잭션만 확인합니다.
  - 노드는 Bitcoin 네트워크에서 아무런 역할을 하지 않습니다.
explanation: |
  Bitcoin 네트워크에서 노드는 트랜잭션과 검증을 통해 네트워크의 무결성을 유지합니다
  트랜잭션과 블록을 확인하고 검증하여 네트워크의 무결성을 유지합니다
  블록을 검증합니다. 부정확하거나 사기성 블록은 노드에 의해 거부되어
  노드에 의해 거부되어 네트워크의 보안을 유지합니다.
reviewed: true
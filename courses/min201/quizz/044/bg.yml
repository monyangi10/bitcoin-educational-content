question: Какво представляват девствените биткойни?
answer: Току-що добити биткойни, които никога не са били изразходвани и нямат никаква история, свързана с тях.
wrong_answers:
  - Биткойни, които са били използвани за незаконни дейности.
  - Изгубени или забравени биткойни.
  - Биткойни, които се съхраняват в wallet от дълго време.
explanation: |
  Девствените биткойни са прясно добити биткойни, които никога не са
  са били изразходвани и нямат никаква история, свързана с тях. Тези
  биткойни често се считат за по-ценни, защото
  никога не са били опорочени, което осигурява известна гаранция срещу
  отхвърляне от страна на регулаторните органи или големите платформи за обмен.
reviewed: true
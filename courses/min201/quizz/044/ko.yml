question: 버진 비트코인이란 무엇인가요?
answer: 한 번도 사용되지 않았고 기록이 첨부되지 않은 갓 채굴된 비트코인입니다.
wrong_answers:
  - 불법 활동에 사용된 비트코인을 확인합니다.
  - 분실하거나 잊어버린 비트코인.
  - Wallet에 오랫동안 보관된 비트코인.
explanation: |
  버진 비트코인은 채굴된 지 얼마 되지 않은 비트코인을 말합니다
  사용되지 않았으며 기록이 남아 있지 않습니다. 이러한
  비트코인은 종종 다음과 같은 이유로 더 가치 있는 것으로 간주됩니다
  오염된 적이 없으므로 규제 기관이나 주요 Exchange 플랫폼에서
  어느 정도 보장을 제공하기 때문에 더 가치 있는 것으로 간주되기도 합니다.
reviewed: true
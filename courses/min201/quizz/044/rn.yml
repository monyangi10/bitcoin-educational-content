question: Ivyo bitcoins vy’isugi ni ibiki?
answer: Bitcoins ziherutse gucukurwa zitigeze zikoreshwa kandi zitagira amateka afatanye na zo.
wrong_answers:
  - Bitcoins zakoreshejwe mu bikorwa bitemewe n’amategeko.
  - Bitcoins zazimiye canke zaribagiwe.
  - Bitcoins zabitswe muri Wallet igihe kirekire.
explanation: |
  Bitcoins z'isugi ni bitcoins ziherutse gucukurwa zitigeze .
  vyakoreshejwe kandi nta kahise bifatanye na vyo. Ivyo
  bitcoins akenshi zibonwa ko zifise agaciro kuruta kubera ko .
  ntivyigeze bihumanya, bikaba bitanga icemezo kinaka co kurwanya .

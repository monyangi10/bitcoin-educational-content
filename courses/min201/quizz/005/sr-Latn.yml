question: Koji je glavni izazov za profesionalce u industriji Bitcoin Mining?
answer: Očekujući smanjenje efikasnosti u budućnosti i prilagođavajući svoje strategije u skladu s tim
wrong_answers:
  - Pronalaženje jeftine struje
  - Pronalaženje odgovarajuće lokacije za operacije Mining
  - Pronalaženje investitora spremnih da finansiraju njihove operacije
explanation: |
  Suočeni sa stalnim tehnološkim napretkom u
  Mining oblasti, profesionalci moraju strateški da se pozicioniraju.
  Mining industrija je podložna kontinuiranim
  inovacijama, i učesnici u industriji moraju predvideti
  smanjenje dobitaka u efikasnosti u budućnosti i prilagoditi svoje
  strategije u skladu s tim.
reviewed: true
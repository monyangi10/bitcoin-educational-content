question: Ni ingorane nyamukuru iyihe ku bahinga bo mu gisata ca Bitcoin Mining?
answer: Gutegerezwa inyungu zizogabanuka muri kazoza no guhindura ingamba zabo bivanye n’ivyo .
wrong_answers:
  - Kuronka umuyagankuba uhendutse
  - Kurondera ahantu heza ho gukorera Mining
  - Kurondera abashoramari bashaka gufasha mu bikorwa vyabo
explanation: |
  Kubera ko ubuhinga buhora butera imbere mu .
  Mining umurima, abahinga bategerezwa gushiramwo ingamba
  ubwabo. Inganda za Mining zishobora kubandanya
  ubuhinga bushasha, kandi abakinyi b’inganda bategerezwa kwitega
  kugabanya inyungu z’ubushobozi muri kazoza no guhindura ivyo
  ingamba zijanye n’ivyo.
reviewed: true
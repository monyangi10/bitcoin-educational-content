question: Koji je ekonomski podsticaj da se koristi uređaj za rudarenje Bitcoina umesto običnog električnog grejača?
answer: Uređaj za rudarenje Bitcoina ne samo da pruža toplotu već i Bitcoin nagradu.
wrong_answers:
  - Uređaj za rudarenje Bitcoina koristi manje električne energije od običnog električnog grejača.
  - Uređaj za rudarenje Bitcoina proizvodi više toplote nego jednostavan električni grejač.
  - Uređaj za rudarenje Bitcoina je jeftiniji od običnog električnog grejača.
explanation: |
  Razlika između korišćenja uređaj za rudarenje Bitcoina i običnog električnog
  grejača leži u činjenici da uređaj za rudarenje Bitcoina ne samo da pruža
  toplotu već i Bitcoin nagradu. Ova dodatna nagrada
  mogla bi pomoći u ublažavanju zabrinutosti zbog visoke
  potrošnje energije rudara.
reviewed: true

question: แรงจูงใจทางเศรษฐกิจในการใช้เครื่องขุด Bitcoin แทนเครื่องทำความร้อนไฟฟ้าแบบธรรมดาคืออะไร?
answer: นักขุดไม่เพียงแต่ให้ความร้อนแต่ยังให้รางวัล Bitcoin อีกด้วย
wrong_answers:
  - เครื่องขุดใช้ไฟฟ้าน้อยกว่าฮีตเตอร์ไฟฟ้าแบบธรรมดา
  - เครื่องขุดเหมืองผลิตความร้อนได้มากกว่าฮีตเตอร์ไฟฟ้าธรรมดา
  - เครื่องขุดมีราคาถูกกว่าฮีตเตอร์ไฟฟ้าแบบธรรมดา
explanation: |
  ความแตกต่างระหว่างการใช้เครื่องขุดและเครื่องทำความร้อนไฟฟ้าแบบธรรมดาอยู่ที่ว่าเครื่องขุดไม่เพียงแต่ให้ความร้อนเท่านั้น แต่ยังให้รางวัล Bitcoin อีกด้วย รางวัลเพิ่มเติมนี้อาจช่วยบรรเทาความกังวลเกี่ยวกับการใช้พลังงานสูงของเครื่องขุดได้
reviewed: true
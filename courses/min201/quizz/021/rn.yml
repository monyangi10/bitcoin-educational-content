question: Ni igiki gitera intege mu vy’ubutunzi gukoresha Bitcoin Miner aho gukoresha igikoresho co gushushanya c’umuyagankuba gisanzwe?
answer: Miner ntitanga ubushuhe gusa ariko kandi iratanga n’impera ya Bitcoin.
wrong_answers:
  - Miner ikoresha umuyagankuba mutoyi kuruta igikoresho gikoreshwa n’umuyagankuba gisanzwe.
  - Miner itanga ubushuhe bwinshi kuruta igikoresho gisanzwe gikoreshwa n’umuyagankuba.
  - Miner irahenda cane kuruta igikoresho co gushushanya c’umuyagankuba gisanzwe.
explanation: |
  Itandukaniro riri hagati yo gukoresha Miner n’umuyagankuba woroshe
  heater iri mu kuba Miner itatanga gusa .
  ubushuhe ariko kandi n’impera ya Bitcoin. Iyi mpera y’inyongera .
  Bishobora gufasha kugabanya amaganya yerekeye inguvu nyinshi
  gufungura abacukuzi b’amabuye y’agaciro.
reviewed: true
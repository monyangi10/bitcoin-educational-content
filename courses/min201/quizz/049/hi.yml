question: वर्जिन बिटकॉइन्स को बड़े संस्थागत खिलाड़ी खास तौर पर क्यों चाहते हैं?
answer: वे अपने डिजिटल एसेट्स की वैधता को रेगुलेटरी अथॉरिटीज़ को गारंटी दे सकते हैं।
wrong_answers:
  - वे उन्हें ऊँचे दाम पर बेच सकते हैं।
  - वे इनका इस्तेमाल गैरकानूनी गतिविधियों के लिए कर सकते हैं।
  - वे उन पर टैक्स देने से बच सकते हैं।
explanation: |
  वर्जिन बिटकॉइन्स बड़े खरीदारों द्वारा खास तौर पर ढूंढे जाते हैं
  संस्थागत खिलाड़ी क्योंकि वे गारंटी दे सकते हैं
  उनके डिजिटल एसेट्स की वैधता को नियामक
  अधिकारियों। ये बिटकॉइन कभी भी गंदे नहीं हुए,
  नियामकों द्वारा अस्वीकृति के खिलाफ कुछ गारंटी प्रदान करना
  प्रमुख Exchange प्लेटफॉर्म्स।
reviewed: true
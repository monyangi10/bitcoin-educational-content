question: Bakir bitcoinler neden özellikle büyük kurumsal oyuncular tarafından rağbet görüyor?
answer: Dijital varlıklarının meşruiyetini düzenleyici makamlara garanti edebilirler.
wrong_answers:
  - Onları daha yüksek bir fiyata satabilirler.
  - Bunları yasadışı faaliyetler için kullanabilirler.
  - Bunlar için vergi ödemekten kaçınabilirler.
explanation: |
  Bakire bitcoinler özellikle büyük şirketler tarafından rağbet görüyor
  garanti edebildikleri için kurumsal oyuncular
  dijital varlıklarının meşruiyetini düzenleyici kurumlara
  yetkililer. Bu bitcoinler hiçbir zaman lekelenmemiştir,
  düzenleyiciler tarafından reddedilmeye karşı bazı garantiler sağlamak veya
  büyük Exchange platformları.
reviewed: true
question: Dlaczego dziewicze bitcoiny są szczególnie poszukiwane przez dużych graczy instytucjonalnych?
answer: Mogą zagwarantować legalność swoich zasobów cyfrowych organom regulacyjnym.
wrong_answers:
  - Mogą sprzedawać je po wyższej cenie.
  - Mogą wykorzystać je do nielegalnych działań.
  - Mogą uniknąć płacenia od nich podatków.
explanation: |
  Bitcoiny Virgin są szczególnie poszukiwane przez dużych
  graczy instytucjonalnych, ponieważ mogą oni zagwarantować
  legalność swoich zasobów cyfrowych organom regulacyjnym
  organom regulacyjnym. Te bitcoiny nigdy nie zostały skażone,
  zapewniając pewną gwarancję przed odrzuceniem przez organy regulacyjne lub
  główne platformy Exchange.
reviewed: true
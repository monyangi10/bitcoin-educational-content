question: Защо девствените биткойни са особено търсени от големите институционални играчи?
answer: Те могат да гарантират легитимността на своите цифрови активи пред регулаторните органи.
wrong_answers:
  - Те могат да ги продават на по-висока цена.
  - Те могат да ги използват за незаконни дейности.
  - Те могат да избегнат плащането на данъци върху тях.
explanation: |
  Вирджинските биткойни са особено търсени от големи
  институционални играчи, защото те могат да гарантират
  легитимността на своите цифрови активи пред регулаторните
  органите. Тези биткойни никога не са били опорочени,
  което осигурява известна гаранция срещу отхвърляне от страна на регулаторните органи или
  големите платформи за обмен.
reviewed: true
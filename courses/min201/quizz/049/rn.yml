question: Ni kuki ama bitcoins y’isugi aronderwa cane cane n’abakinyi bakuru b’inzego?
answer: Bashobora kwemeza inzego zijejwe gucungera itunga ryabo ry’ubuhinga bwa none ko ari iry’ukuri.
wrong_answers:
  - Bashobora kubigurisha ku giciro kinini.
  - Bashobora kubikoresha mu bikorwa bitemewe n’amategeko.
  - Bashobora kwirinda kubitanga imisoro.
explanation: |
  Bitcoins z'isugi zironderwa cane cane n'abantu benshi .
  abakinnyi b’inzego kuko bashobora gutanga icemezo c’uko
  uburenganzira bw'itunga ryabo ry'ubuhinga bwa none ku mategeko
  abategetsi. Izo bitcoins ntizigeze zihumanya,
  gutanga ingwati imwe imwe yo kwirinda kwangwa n’abagenzuzi canke .
  ama platforms akomeye ya Exchange.
reviewed: true
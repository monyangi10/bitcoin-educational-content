question: Какво е значението на Lightning Network в контекста на Bitcoin mining?
answer: Lightning Network има потенциала да намали значително таксите за транзакции, като по този начин повлияе на доходите на миньорите.
wrong_answers:
  - Lightning Network увеличава размера на блока, като по този начин увеличава приходите на миньорите.
  - Lightning Network намалява потреблението на енергия на Bitcoin mining.
  - Lightning Network увеличава скоростта на Bitcoin mining.
explanation: |
  Lightning Network дава възможност за бърза и евтина
  транзакции извън основната верига Bitcoin. Това има
  потенциал за значително намаляване на таксите за транзакции,
  което би могло да се отрази на доходите на миньорите.
reviewed: true
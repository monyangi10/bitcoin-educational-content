question: Кой е основният инструмент, използван от миньорите в мрежата Bitcoin днес?
answer: ASICs
wrong_answers:
  - Процесори
  - Графични процесори
  - FPGA
explanation: |
  Днес миньорите използват изключително ASIC, предназначени за това
  операция, оптимизирани да тестват максимален брой
  комбинации с възможно най-малка консумация на енергия
  и възможно най-бързо.
reviewed: true
question: आज Bitcoin नेटवर्क में माइनर्स द्वारा इस्तेमाल किया जाने वाला मुख्य टूल क्या है?
answer: एएसआईसी (ASICs)
wrong_answers:
  - सीपीयू (CPU)
  - जीपीयू (GPUs)
  - एफपीजीए (FPGAs)
explanation: |
  आजकल, माइनर्स सिर्फ इसके लिए बने ASICs का ही इस्तेमाल करते हैं।
  ऑपरेशन, जिसे अधिकतम संख्या की जांच करने के लिए ऑप्टिमाइज़ किया गया है
  सबसे कम संभव ऊर्जा खपत वाले संयोजन
  और जितनी जल्दी हो सके।
reviewed: true
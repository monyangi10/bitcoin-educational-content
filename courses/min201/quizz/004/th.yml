question: เครื่องมือหลักที่นักขุดใช้ในเครือข่าย Bitcoin วันนี้คืออะไร?
answer: ASICs
wrong_answers:
  - ซีพียู
  - หน่วยประมวลผลกราฟิก (GPUs)
  - FPGA
explanation: |
  ทุกวันนี้ นักขุดใช้ ASICs ที่ออกแบบมาเฉพาะสำหรับการดำเนินการนี้ ซึ่งได้รับการปรับแต่งเพื่อทดสอบจำนวนชุดค่าผสมสูงสุดด้วยการใช้พลังงานให้น้อยที่สุดและรวดเร็วที่สุดเท่าที่จะเป็นไปได้
reviewed: true
question: Bitcoin नेटवर्क में माइनर्स को क्या इनाम मिलता है?
answer: नए बिटकॉइन और लेन-देन शुल्क।
wrong_answers:
  - सिर्फ नए बिटकॉइन्स।
  - केवल लेन-देन शुल्क।
  - माइनर्स को कोई इनाम नहीं मिलता।
explanation: |
  Bitcoin नेटवर्क में माइनर्स को नए टोकन से इनाम मिलता है
  बिटकॉइन और उनके काम को वैलिडेट करने के लिए ट्रांजैक्शन फीस
  और ब्लॉक्स बनाना।
reviewed: true
question: Koje nagrade postoje za rudare u Bitcoin mreži?
answer: Novi bitkoini i naknade za transakcije.
wrong_answers:
  - Samo novi bitkoini.
  - Samo naknade za transakciju.
  - Ne postoje nagrade za rudare.
explanation: |
  Rudari u Bitcoin mreži su nagrađeni novim
  bitcoinima i naknadama za transakcije za njihov rad u
  validaciji i kreiranju blokova.
reviewed: true

question: Каква е наградата за миньорите в мрежата Bitcoin?
answer: Нови биткойни и такси за транзакции.
wrong_answers:
  - Само нови биткойни.
  - Само такси за транзакции.
  - Миньорите не получават възнаграждение.
explanation: |
  Миньорите в мрежата Bitcoin се възнаграждават с нови
  биткойни и транзакционни такси за работата си по валидиране на
  и създаване на блокове.
reviewed: true
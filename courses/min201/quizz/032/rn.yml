question: Ni impembo iyihe abacukuzi bo mu mugwi wa Bitcoin bazoronka?
answer: Bitcoins nshasha n’amahera yo gukoresha.
wrong_answers:
  - Ivyuma bishasha gusa.
  - Amafaranga y’ugucuruza gusa.
  - Nta mpera y’abacukuzi b’amabuye y’agaciro.
explanation: |
  Abacukuzi bo mu murongo wa Bitcoin barahembwa n’ibintu bishasha .
  bitcoins n'amahera y'ugucuruza kubera igikorwa cabo co kwemeza
  no kurema amabuye.
reviewed: true
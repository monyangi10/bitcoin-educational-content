question: Bitcoin और Mining में सॉफ्टवेयर की भूमिका क्या है और यह कार्यक्षमता में कैसे योगदान देता है?
answer: जीडब्ल्यू-3 और जीडब्ल्यू-4 में सॉफ्टवेयर, जैसे कि ब्रेन्सओएस प्लस, जीडब्ल्यू-4 मशीन के मूल ऑपरेटिंग सिस्टम को बदल देता है, जिससे वही ऑपरेशन और भी कुशलता से किए जा सकते हैं। यह मशीन की कार्यक्षमता को 25% तक बढ़ा सकता है, यानी कि समान बिजली की खपत पर मशीन 25% अधिक जीडब्ल्यू-2 का उत्पादन कर सकती है, जिससे जीडब्ल्यू-5 को मिलने वाले इनाम में भी वृद्धि होती है।
wrong_answers:
  - जीडब्ल्यू-6 और जीडब्ल्यू-7 में इस्तेमाल होने वाला सॉफ्टवेयर सिर्फ खनन किए गए जीडब्ल्यू-6 की मात्रा को ट्रैक करने के लिए होता है, इससे दक्षता पर कोई फर्क नहीं पड़ता।
  - Bitcoin और Mining में सॉफ्टवेयर सिर्फ Mining मशीन के लिए बेहतर इंटरनेट कनेक्शन देता है। अगर नए प्रोटोकॉल्स में से एक का इस्तेमाल किया जाए, तो यह मशीन की कार्यक्षमता 14% तक बढ़ा सकता है।
  - जीडब्ल्यू-10 और जीडब्ल्यू-11 में सॉफ्टवेयर का इस्तेमाल जीडब्ल्यू-11 मशीन को ठंडा करने के लिए होता है और यह दक्षता में कोई योगदान नहीं देता।
explanation: |
  अध्याय बताता है कि ब्रेन्सओएस प्लस जैसा सॉफ्टवेयर
  Mining मशीन के मूल ऑपरेटिंग सिस्टम को बदलें
  एक ही ऑपरेशन्स को और ज्यादा करने की इजाजत देना
  कुशलता से। यह सॉफ़्टवेयर ऑप्टिमाइज़ेशन एक ज़रूरी
  Bitcoin और Mining में प्रतिस्पर्धा का तत्व।
reviewed: true
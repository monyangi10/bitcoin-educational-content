question: Mining इनाम का Bitcoin नेटवर्क में हर चार साल में क्या होता है?
answer: यह Halving से गुजरता है
wrong_answers:
  - यह दोगुना हो जाता है
  - यह तीन गुना हो जाता है
  - वही रहता है
explanation: |
  जीडब्ल्यू-3 नेटवर्क में जीडब्ल्यू-4 इनाम एक
  Halving हर 210,000 ब्लॉक्स पर, लगभग हर चार साल में
  सालों। यह पारिश्रमिक एक शक्तिशाली प्रेरणा के रूप में काम करता है
  खनिकों को Mining प्रक्रिया में भाग लेने के लिए प्रोत्साहित करें
  इसकी ऊर्जा लागत के बावजूद।
reviewed: true
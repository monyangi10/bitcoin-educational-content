question: Какво се случва с наградата mining в мрежата Bitcoin приблизително на всеки четири години?
answer: Тя се намалява наполовина
wrong_answers:
  - Той се удвоява
  - Утроява се
  - Остава същият
explanation: |
  Наградата mining в мрежата Bitcoin претърпява
  намалява наполовина на всеки 210 000 блока, приблизително на всеки четири
  години. Това възнаграждение служи като мощен стимул за
  насърчаване на миньорите да участват в процеса mining
  въпреки разходите за енергия.
reviewed: true
question: Šta se dešava sa rudarskom nagradom u Bitcoin mreži otprilike svake četiri godine?
answer: Prepolovljava se
wrong_answers:
  - Udvostručuje se
  - Utrostručuje se
  - Ostaje ista
explanation: |
  Rudarska nagrada u Bitcoin mreži
  prepolovljava se svakih 210.000 blokova, otprilike svake četiri
  godine. Ova naknada služi kao snažan podsticaj za
  podsticanje rudara da učestvuju u procesu rudarenja
  uprkos njegovim energetskim troškovima.
reviewed: true

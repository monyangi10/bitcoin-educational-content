question: Ni igiki kiba ku ngororano ya Mining mu rubuga rwa Bitcoin hafi inyuma y’imyaka ine?
answer: Ica mu gikorwa ca Halving.
wrong_answers:
  - Bikubita kabiri
  - Bikubita gatatu
  - Biguma ari uko biri .
explanation: |
  Ingororano ya Mining mu rubuga rwa Bitcoin iraca mu
  Halving buri mabarabara 210.000, hafi buri mabarabara ane
  imyaka. Iyo mpembo irakora nk’inkomezi zikomeye zo gutuma .
  guhimiriza abacukuzi kugira uruhara mu nzira ya Mining
  naho nyene igura inguvu.
reviewed: true
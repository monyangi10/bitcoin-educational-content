question: ข้อได้เปรียบหลักของ mining virgin bitcoins คืออะไร?
answer: พวกมันไม่เคยถูกใช้จ่ายและไม่มีประวัติที่เกี่ยวข้องกับพวกมัน
wrong_answers:
  - พวกมันสามารถขายได้ในราคาที่สูงขึ้น
  - พวกมันสามารถถูกใช้สำหรับกิจกรรมที่ผิดกฎหมายได้
  - พวกมันสามารถเก็บไว้ได้นานโดยไม่สูญเสียมูลค่า
explanation: |
  ข้อได้เปรียบหลักของบิตคอยน์ mining virgin คือพวกมันไม่เคยถูกใช้จ่ายและไม่มีประวัติที่เกี่ยวข้อง บิตคอยน์เหล่านี้มักถูกพิจารณาว่ามีค่ามากกว่าเพราะไม่เคยถูกปนเปื้อน ทำให้มีการรับประกันบางอย่างต่อการถูกปฏิเสธโดยหน่วยงานกำกับดูแลหรือแพลตฟอร์มแลกเปลี่ยนหลัก ๆ
reviewed: true
question: Mining वर्जिन बिटकॉइन का मुख्य फायदा क्या है?
answer: वे कभी खर्च नहीं किए गए हैं और उनसे कोई इतिहास नहीं जुड़ा है।
wrong_answers:
  - उन्हें ऊँचे दाम पर बेचा जा सकता है।
  - इनका इस्तेमाल गैरकानूनी कामों के लिए किया जा सकता है।
  - उन्हें लंबे समय तक बिना कीमत गंवाए स्टोर किया जा सकता है।
explanation: |
  Mining वर्जिन बिटकॉइन का मुख्य फायदा यह है कि वे
  कभी खर्च नहीं हुए हैं और उनसे कोई इतिहास जुड़ा नहीं है।
  ये बिटकॉइन्स अक्सर ज़्यादा कीमती माने जाते हैं क्योंकि
  वे कभी भी दाग़ी नहीं हुए हैं, जो कुछ गारंटी देता है
  रगुलेटर्स या मेजर Exchange द्वारा रिजेक्शन के खिलाफ
  प्लेटफॉर्म्स।
reviewed: true
question: Bitcoin Mining의 맥락에서 CPU와 ASIC의 주요 차이점은 무엇인가요?
answer: CPU는 한 가지 유형의 계산에 특별히 최적화되지 않고도 다양한 유형의 계산을 수행할 수 있는 반면, ASIC는 한 가지 유형의 계산만 수행하지만 매우 효율적으로 수행할 수 있습니다
wrong_answers:
  - CPU는 ASIC보다 에너지 효율이 높습니다
  - ASIC는 CPU보다 다재다능한 제품입니다
  - CPU는 한 가지 유형의 계산만 수행할 수 있는 반면, ASIC는 다양한 유형의 계산을 수행할 수 있습니다
explanation: |
  ASIC은 CPU 칩과 유사한 칩이지만
  한 가지 특정 유형의 계산만 수행하도록 개발되었습니다
  계산을 가장 효율적으로 수행하도록 개발되었습니다. 다른 말로
  즉, CPU는 여러 가지 유형의 계산을 수행할 수 있습니다
  다양한 유형의 계산을 수행할 수 있지만
  한 가지 계산 유형에 최적화되어 있는 반면에
  gW-7은 한 가지 유형의 계산만 수행할 수 있습니다
  계산만 수행할 수 있지만 매우 효율적입니다.
reviewed: true
question: Ni itandukaniro irihe rikomeye hagati ya CPU na ASIC mu bijanye na Bitcoin Mining?
answer: CPU ishobora gukora ubwoko bwinshi bw’imibare itandukanye ataco ihinduye cane ku bwoko bumwe bw’imibare, mu gihe ASIC ishobora gukora ubwoko bumwe gusa bw’imibare, ariko ikaba ikora neza cane .
wrong_answers:
  - CPU ikoresha inguvu nyinshi kuruta ASIC.
  - ASIC irakora vyinshi kurusha CPU .
  - CPU ishobora gukora ubwoko bumwe gusa bw’imibare, mu gihe ASIC ishobora gukora ubwoko bwinshi bw’imibare itandukanye .
explanation: |
  ASICs ni ibice, bigereranywa n’ibice vya CPU, yamara rero, bira
  birategurwa kugira ngo bikore ubwoko bumwe gusa bwihariye bw’
  guharura mu buryo bwiza kuruta ubundi bwose. Mu bindi
  amajambo, CPU irashobora gukora ibikorwa vyinshi vy’
  ubwoko butandukanye bw'imibare ata kuba cane cane
  ryiza cane ku bwoko bumwe bw'ibara canke ubundi, mu gihe
  ASIC izoshobora gukora ubwoko bumwe gusa bw’
  guharura, ariko bikaba vyiza cane.
reviewed: true
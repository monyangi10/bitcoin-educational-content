question: ความแตกต่างหลักระหว่าง CPU และ ASIC ในบริบทของ Bitcoin mining คืออะไร?
answer: CPU สามารถทำการคำนวณได้หลากหลายประเภทโดยไม่จำเป็นต้องถูกปรับให้เหมาะสมสำหรับการคำนวณประเภทใดประเภทหนึ่งโดยเฉพาะ ในขณะที่ ASIC สามารถทำการคำนวณได้เพียงประเภทเดียว แต่ทำได้อย่างมีประสิทธิภาพมาก
wrong_answers:
  - CPU มีประสิทธิภาพการใช้พลังงานมากกว่า ASIC
  - An ASIC มีความหลากหลายมากกว่า CPU
  - CPU สามารถทำการคำนวณได้เพียงประเภทเดียว ในขณะที่ ASIC สามารถทำการคำนวณได้หลากหลายประเภท
explanation: |
  ASICs เป็นชิปที่เปรียบได้กับชิป CPU; อย่างไรก็ตาม พวกมันถูกพัฒนาให้ทำการคำนวณเพียงประเภทเดียวในวิธีที่มีประสิทธิภาพที่สุด กล่าวอีกนัยหนึ่ง CPU สามารถทำการคำนวณได้หลากหลายประเภทโดยไม่ได้ถูกปรับให้เหมาะสมสำหรับการคำนวณประเภทใดประเภทหนึ่งโดยเฉพาะ ในขณะที่ ASIC จะสามารถทำการคำนวณได้เพียงประเภทเดียว แต่ทำได้อย่างมีประสิทธิภาพมาก
reviewed: true
question: Jaka jest główna różnica między CPU a ASIC w kontekście Bitcoin Mining?
answer: Procesor może wykonywać wiele różnych typów obliczeń, nie będąc szczególnie zoptymalizowanym pod kątem jednego typu obliczeń, podczas gdy ASIC może wykonywać tylko jeden typ obliczeń, ale bardzo wydajnie
wrong_answers:
  - Procesor jest bardziej energooszczędny niż ASIC
  - ASIC jest bardziej wszechstronny niż CPU
  - CPU może wykonywać tylko jeden typ obliczeń, podczas gdy ASIC może wykonywać wiele różnych typów obliczeń
explanation: |
  Układy ASIC to chipy porównywalne z układami CPU, jednak

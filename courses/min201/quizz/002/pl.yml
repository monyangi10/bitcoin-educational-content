  obliczeń w możliwie najbardziej wydajny sposób. Innymi słowy
  innymi słowy, procesor jest w stanie wykonać wiele
  różnych typów obliczeń, nie będąc szczególnie
  zoptymalizowany pod kątem tego czy innego typu obliczeń, podczas gdy
  gW-7 będzie w stanie wykonać tylko jeden rodzaj obliczeń, ale bardzo wydajnie

question: सीपीयू और जीडब्ल्यू-2 में मुख्य अंतर क्या है, जब बात जीडब्ल्यू-0 और जीडब्ल्यू-1 के संदर्भ में हो?
answer: एक CPU बहुत सारे अलग-अलग तरह के कैलकुलेशन कर सकता है, भले ही वह किसी एक खास तरह के कैलकुलेशन के लिए ऑप्टिमाइज़्ड न हो, जबकि एक ASIC सिर्फ एक ही तरह का कैलकुलेशन कर सकता है, लेकिन बहुत ही कुशलता से।
wrong_answers:
  - एक CPU, ASIC की तुलना में ज्यादा एनर्जी-एफिशिएंट होता है।
  - एक ASIC CPU से ज़्यादा बहुमुखी है
  - एक CPU सिर्फ एक तरह की गणना कर सकता है, जबकि एक ASIC कई अलग-अलग तरह की गणनाएँ कर सकता है।
explanation: |
  ASICs चिप्स होते हैं, जो CPU चिप की तरह होते हैं, लेकिन वे...
  विकसित किए गए हैं सिर्फ एक खास तरह का काम करने के लिए
  सबसे कारगर तरीके से हिसाब लगाना।
  शब्दों में, एक CPU बहुत सारे काम करने में सक्षम होता है
  अलग-अलग तरह के हिसाब-किताब बिना खास...
  एक तरह के हिसाब के लिए ऑप्टिमाइज़ किया गया है या फिर दूसरे के लिए, जबकि
  एक ASIC सिर्फ एक ही तरह का काम कर पाएगा
  गणना, लेकिन बहुत कुशलता से।
reviewed: true
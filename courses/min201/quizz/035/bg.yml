question: Какво измерва hashrate в мрежата Bitcoin?
answer: Изчисленията в секунда
wrong_answers:
  - Броят на транзакциите в секунда
  - Броят на активните възли
  - Количеството електроенергия, консумирано от мрежата
explanation: |
  hashrate в мрежата Bitcoin измерва броя на
  изчисления, които могат да бъдат извършени за секунда. Той е ключов
  показател за състоянието и сигурността на мрежата.
reviewed: true
question: Hashrate, Bitcoin नेटवर्क में क्या मापता है?
answer: प्रति सेकंड गणना
wrong_answers:
  - प्रति सेकंड लेन-देन की संख्या
  - एक्टिव नोड्स की संख्या
  - नेटवर्क द्वारा खपत की गई बिजली की मात्रा
explanation: |
  Bitcoin नेटवर्क में Hashrate, संख्या को मापता है
  सेकंड में किए जा सकने वाले कैलकुलेशन। यह एक मुख्य
  नेटवर्क की सेहत और सुरक्षा का संकेतक।
reviewed: true
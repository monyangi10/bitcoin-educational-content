question: Hashrate ipima iki mu murongo wa Bitcoin?
answer: Ivyo biharuro ku segonda
wrong_answers:
  - Umubare w'ibikorwa ku segonda
  - Umubare w'ibice bikora
  - Ingero y'umuyagankuba ukoreshwa n'urubuga
explanation: |
  Hashrate iri mu murongo wa Bitcoin ipima umubare w’abantu .
  imibare ishobora gukorwa ku segonda. Ni urufunguzo
  ikimenyetso c’ubuzima n’umutekano w’urubuga.
reviewed: true
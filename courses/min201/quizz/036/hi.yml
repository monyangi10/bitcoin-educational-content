question: Bitcoin की उत्पादन लागत और उसकी बाजार कीमत के बीच क्या संबंध है?
answer: Bitcoin की कीमत आम तौर पर इसके दाम के अनुपात में हो सकती है
wrong_answers:
  - Bitcoin की कीमत जितनी ज़्यादा होगी, उसकी लागत उतनी ही कम होगी
  - Bitcoin की कीमत एक निश्चित अनुपात में तय की गई है, जो उसके मूल्य के भीतर है
  - Bitcoin की कीमत हमेशा इसके दाम से ज़्यादा होती है
explanation: |
  Bitcoin की कीमत, जो बिजली से संबंधित है
  Mining मशीनों को चलाने के लिए जरूरी, आम तौर पर हो सकता है
  इसके दाम के अनुपात में। यह रिश्ता देता है...
  कीमतों में उतार-चढ़ाव और भविष्य की बेहतर समझ
  संभावनाएँ।
reviewed: true
question: Kakva je veza između troškova proizvodnje Bitcoina i njegove tržišne cene?
answer: Trošak Bitcoina mogao bi biti uglavnom proporcionalan njegovoj ceni.
wrong_answers:
  - Cena Bitcoina je obrnuto proporcionalna njegovoj ceni.
  - Cena Bitcoina je fiksna, unutar određenog odnosa, prema njegovoj ceni.
  - Cena Bitcoina je uvek viša od njegove cene
explanation: |
  Trošak Bitcoina, koji je povezan sa električnom energijom potrebnom za rad mašina za rudarenje, generalno može biti proporcionalan njegovoj ceni. 
  Ovaj odnos pruža bolje razumevanje fluktuacija cena i budućih perspektiva.
reviewed: true

question: Каква е връзката между производствените разходи на Bitcoin и пазарната му цена?
answer: Разходите за Bitcoin могат да бъдат пропорционални на цената му
wrong_answers:
  - Разходите за Bitcoin са обратно пропорционални на цената му
  - Цената на Bitcoin е фиксирана в рамките на определено съотношение към цената му
  - Разходите за Bitcoin винаги са по-високи от цената му
explanation: |
  Разходите за Bitcoin, които са свързани с електроенергията
  необходими за работата на машините mining, обикновено могат да бъдат
  пропорционална на цената му. Тази зависимост осигурява
  по-добро разбиране на колебанията на цените и бъдещите
  перспективите.
reviewed: true
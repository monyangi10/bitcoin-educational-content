question: Mining पर प्रतिबंध का एक क्षेत्र पर क्या संभावित प्रभाव हो सकता है?
answer: इससे Hashrate में भारी गिरावट आ सकती है और Bitcoin की कीमत भी गिर सकती है
wrong_answers:
  - इससे Bitcoin की कीमत में बढ़ोतरी हो सकती है
  - इससे नेटवर्क का Hashrate बढ़ सकता है
  - यह नेटवर्क में एक्टिव नोड्स की संख्या बढ़ा सकता है
explanation: |
  एक क्षेत्र में Mining पर प्रतिबंध, जैसा कि चीन में हुआ था,
  इससे Hashrate और कीमत में काफी गिरावट आ सकती है
  जीडब्ल्यू-7. हालांकि, ये जल्दी ठीक हो सकते हैं।
reviewed: true
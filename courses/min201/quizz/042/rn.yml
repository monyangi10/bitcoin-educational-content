question: Ni ingaruka izihe zishobora guterwa n’ukubuza Mining mu karere?
answer: Bishobora gutuma Hashrate n’igiciro ca Bitcoin bigabanuka cane.
wrong_answers:
  - Bishobora gutuma igiciro ca Bitcoin00 kiduga.
  - Bishobora gutuma Hashrate y'urubuga yiyongera .
  - Bishobora gutuma umubare w'ibihimba bikora mu muhora wiyongera .
explanation: |
  Gukumira Mining mu karere, nk’ivyabaye mu Bushinwa,
  birashobora gutuma Hashrate n’igiciro ca 100 bigabanuka cane.
  Bitcoin. Ariko rero, ivyo birashobora gukira ningoga.
reviewed: true
question: इस कहावत "Not your Hashrate, not your reward" का मतलब Bitcoin और Mining के संदर्भ में क्या है?  

(यहाँ Hashrate, Bitcoin, Mining जैसे टर्म्स को बिना बदले रखा गया है क्योंकि ये विशिष्ट संदर्भ/टेक्निकल टर्म्स लगते हैं। अगर इनका हिंदी में कोई स्थानीय अनुवाद हो तो बताएँ!)  

सामान्य भावना:  
अगर किसी चीज़ (Hashrate) पर तुम्हारा मालिकाना हक़/नियंत्रण नहीं है, तो उससे मिलने वाला फायदा (reward) भी तुम्हारा नहीं हो सकता। यह सिद्धांत Bitcoin और Mining जैसी परिस्थितियों में लागू होता है।  

(Note: GW शब्द का सटीक संदर्भ स्पष्ट नहीं है—अगर यह क्रिप्टो/ब्लॉकचेन से जुड़ा टर्म है, तो "गवर्नेंस वॉलेट" जैसा अनुवाद हो सकता है। कृपया अधिक जानकारी दें!)
answer: अगर तुम Hashrate को कंट्रोल नहीं करते, तो तुम Mining के इनामों पर कंट्रोल नहीं रख सकते।
wrong_answers:
  - अगर तुम्हारा Hashrate ज़्यादा नहीं है, तो तुम्हें कोई इनाम नहीं मिलेगा।
  - अगर तुम्हारे पास Bitcoin नहीं है, तो तुम्हें कोई इनाम नहीं मिलेगा।
  - अगर तुम्हारे पास Mining मशीन नहीं है, तो तुम्हें कोई इनाम नहीं मिलेगा।
explanation: |
  कहावत "तुम्हारा Hashrate नहीं, तुम्हारा इनाम नहीं" इसी तरह की है
  क्रिप्टोकरेंसी की दुनिया में मशहूर कहावत के अनुसार,
  तुम्हारी चाबी नहीं, तो तुम्हारे बिटकॉइन भी नहीं। इसका मतलब है कि अगर तुम...
  Hashrate को कंट्रोल नहीं करते, तो Mining को भी कंट्रोल नहीं कर पाओगे
  इनाम। ऐसा इसलिए क्योंकि Mining के इनाम
  जीडब्ल्यू-12 के सीधे आनुपातिक।
reviewed: true
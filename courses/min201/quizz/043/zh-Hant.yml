question: 在 Bitcoin 算力的背景下，「不是你的算力，不是你的獎勵」這句格言的意義是什麼？
answer: 如果您不控制算力，就無法控制獎勵。
wrong_answers:
  - 如果您的算力不高，您將不會獲得任何獎勵。
  - 如果您未擁有 Bitcoin，您將無法獲得任何獎勵。
  - 如果您沒有礦機，您將無法獲得任何獎勵。
explanation: |
  不是你的算力，不是你的獎勵這句格言類似於
  加密貨幣世界中著名的格言、
  不是您的鑰匙，也不是你的 Bitcoin。這意味著如果您
  不控制算力，也無法控制
  獎勵。因為的獎勵是
  與算力成正比。
reviewed: true

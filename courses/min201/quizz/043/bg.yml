question: Какъв е смисълът на поговорката Not your hash rate, not your reward в контекста на Bitcoin mining?
answer: Ако не контролирате hashrate, не контролирате и наградите за mining.
wrong_answers:
  - Ако нямате висок hashrate, няма да получите никакви награди.
  - Ако не притежавате Bitcoin, няма да получите никакви награди.
  - Ако нямате машина mining, няма да получите никакви награди.
explanation: |
  Подобна е и поговорката "Не си hashrate, не си награда"
  на добре познатата поговорка в света на криптовалутите,
  Не вашите ключове, а вашите биткойни. Това означава, че ако направите
  не контролирате hashrate, не контролирате и mining
  награди. Това е така, защото наградите от mining са
  са пряко пропорционални на hashrate.
reviewed: true
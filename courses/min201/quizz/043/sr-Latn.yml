question: Šta znači izreka Not your Hashrate, not your reward u kontekstu Bitcoin rudarenja?
answer: Ako ne kontrolišeš Hashrate, ne kontrolišeš rudarske nagrade.
wrong_answers:
  - Ako nemaš visok Hashrate, nećeš dobiti nikakve nagrade.
  - Ako ne poseduješ Bitcoin, nećete dobiti nikakve nagrade.
  - Ako nemaš mašinu za rudarenje, nećeš dobiti nikakve nagrade.
explanation: |
  Izreka Not your Hashrate, not your reward je slična
  dobro poznatoj izreci u svetu kriptovaluta,
  Not your keys, not your Bitcoins. To znači da ako ne
  kontrolišete Hashrate, ne kontrolišete rudarske
  nagrade. Ovo je zato što su nagrade iz rudarenja
  direktno proporcionalne sa Hashrate-om.
reviewed: true

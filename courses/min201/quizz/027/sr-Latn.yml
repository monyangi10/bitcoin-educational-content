question: Zašto je Proof of Work koncept esencijalan u Bitcoin mreži?
answer: Predstavlja fizičku vezu između stvarnog sveta i Bitcoina, zahtevajući opipljivu energiju za proizvodnju i validaciju bitkoina i blokova.
wrong_answers:
  - Omogućava učešće malih rudara, posebno onih koji se nalaze na lokacijama sa visokim stepenom cenzure.
  - Garantuje zaštitu protiv centralizacije.
  - On odražava postojeće nejednakosti moći u društvu.
explanation: |
  Proof of Work je ključan u Bitcoin mreži jer predstavlja fizičku vezu između stvarnog sveta i Bitcoina. 
  Proizvodnja i validacija bitkoina i blokova zahtevaju opipljivu energiju, što usidruje Bitcoin mrežu u fizičku stvarnost i 
  sprečava njenu potpunu dominaciju od strane moćnih entiteta.
reviewed: true

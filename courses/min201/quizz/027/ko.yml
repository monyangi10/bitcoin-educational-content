question: Bitcoin 네트워크에서 Proof of Work이 필수적인 이유는 무엇인가요?
answer: 이는 비트코인과 블록의 생산과 검증을 위해 유형의 에너지가 필요한 현실 세계와 Bitcoin 사이의 물리적 연결을 나타냅니다.
wrong_answers:
  - 특히 검열이 심한 지역에 있는 마이너의 소규모 참여를 허용합니다.
  - 중앙 집중화에 대한 보호를 보장합니다.
  - 이는 사회의 현존하는 권력 불평등을 반영합니다.
explanation: |
  Proof of Work은 다음과 같은 이유로 Bitcoin 네트워크에서 필수적입니다
  현실 세계와
  Bitcoin. 비트코인과 블록의 생산과 검증은
  블록의 생산과 검증에는 실체적 에너지가 필요하며, Bitcoin
  네트워크를 물리적 현실에 고정하고 강력한 주체에 의한
  강력한 주체에 의한 지배를 방지합니다.
reviewed: true
question: Proof of Work, Bitcoin नेटवर्क में क्यों जरूरी है?
answer: यह असली दुनिया और Bitcoin के बीच की फिजिकल कड़ी को दर्शाता है, जिसमें बिटकॉइन और ब्लॉक्स के प्रोडक्शन और वैलिडेशन के लिए टैंजिबल एनर्जी की जरूरत होती है।
wrong_answers:
  - यह खनिकों, खासकर उन जगहों पर रहने वालों के लिए छोटे स्तर पर भागीदारी की सुविधा देता है जहां सेंसरशिप ज्यादा है।
  - यह केंद्रीकरण के खिलाफ सुरक्षा की गारंटी देता है।
  - यह समाज में मौजूदा ताकत के असमानताओं को दर्शाता है।
explanation: |
  Proof of Work, Bitcoin नेटवर्क में बहुत जरूरी है क्योंकि...
  यह असली दुनिया और [भौतिक कड़ी] का प्रतिनिधित्व करता है
  Bitcoin. बिटकॉइन का उत्पादन और सत्यापन
  ब्लॉक्स को ठोस ऊर्जा की जरूरत होती है, Bitcoin को मजबूती से जमाने वाली
  भौतिक वास्तविकता में नेटवर्क और इसके पूर्ण होने को रोकना
  ताक़तवर संस्थाओं का दबदबा।
reviewed: true
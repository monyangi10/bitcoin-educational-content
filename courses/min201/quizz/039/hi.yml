question: नेटवर्क के लिए Mining का संभावित नुकसान क्या है?
answer: पर्याप्त वित्तीय प्रोत्साहन के बिना, माइनर्स के लिए नेटवर्क को सपोर्ट करना जारी रखना मुश्किल हो सकता है
wrong_answers:
  - इससे Bitcoin की कीमत में कमी आ सकती है
  - इससे नेटवर्क का Hashrate बढ़ सकता है
  - इससे नेटवर्क में एक्टिव नोड्स की संख्या कम हो सकती है
explanation: |
  जीडब्ल्यू-3 नेटवर्क के लिए एक बढ़िया पहल है जो
  सुरक्षा और विकेंद्रीकरण में योगदान देता है
  जीडब्ल्यू-4 नेटवर्क। हालांकि, पर्याप्त वित्तीय सहायता के बिना
  प्रोत्साहन, माइनर्स के लिए जारी रखना मुश्किल हो सकता है
  नेटवर्क को सपोर्ट करना, खासकर अगर वे काम करते हैं
  नुकसान
reviewed: true
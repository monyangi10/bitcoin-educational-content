question: Ni igiki gishobora gutera ingorane Mining ku rubuga?
answer: Iyo ata nkunga ihagije y’amahera, birashobora kugora abacukuzi kubandanya bashigikira iyo nzira .
wrong_answers:
  - Bishobora gutuma igiciro ca Bitcoin00 kigabanuka.
  - Bishobora gutuma Hashrate y'urubuga yiyongera .
  - Bishobora gutuma umubare w'ibihimba bikora mu muhora ugabanuka .
explanation: |
  Mining ku bijanye n’urubuga ni umugambi mwiza cane
  n'ugutera imbere mu mutekano no mu kwegereza ubutegetsi
  Bitcoin urusobe rw’ibintu. Ariko rero, ata mahera ahagije .
  inkurikizi, birashobora kugora abacukuzi kubandanya .
  gushigikira urubuga, canecane iyo bakorera ku
  ugutakaza.
reviewed: true
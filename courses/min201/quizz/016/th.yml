question: บทบาทของนักขุด Bitcoin ในโลกของพลังงานคืออะไร?
answer: Bitcoin miners มักจะมองหาแหล่งไฟฟ้าราคาถูกอยู่เสมอ โดยเฉพาะแหล่งที่ถูกทิ้งร้างหรือยังไม่ได้ใช้ พวกเขาสามารถทำหน้าที่เป็นแหล่งความต้องการที่ยืดหยุ่น พร้อมที่จะใช้ไฟฟ้าที่ถูกทิ้งร้างนี้ ซึ่งช่วยลดต้นทุนโครงสร้างพื้นฐานได้
wrong_answers:
  - Bitcoin คนขุดเหมืองกำลังมองหาแหล่งพลังงานหมุนเวียนอย่างต่อเนื่องเพื่อลดการปล่อยคาร์บอนของพวกเขา
  - นักขุด Bitcoin กำลังมองหาแหล่งพลังงานนิวเคลียร์อย่างต่อเนื่องเพื่อใช้ในการดำเนินงาน mining ของพวกเขา เนื่องจากนี่เป็นวิธีเดียวที่สะอาดและหมุนเวียนได้ในการผลิตพลังงาน
  - นักขุด Bitcoin กำลังมองหาแหล่งพลังงานแสงอาทิตย์อย่างต่อเนื่องเพื่อใช้ในการดำเนินงาน mining ของพวกเขา
explanation: |
  บทนี้อธิบายว่า นักขุด Bitcoin มักจะค้นหาแหล่งไฟฟ้าราคาถูกอยู่เสมอ โดยเฉพาะแหล่งที่ถูกทิ้งหรือยังไม่ได้ใช้ พวกเขาสามารถทำหน้าที่เป็นแหล่งความต้องการที่ยืดหยุ่น พร้อมที่จะใช้ไฟฟ้าที่ถูกทิ้งนี้ ซึ่งช่วยลดต้นทุนโครงสร้างพื้นฐานได้
reviewed: true
  - जीडब्ल्यू-3 माइनर्स लगातार अपने जीडब्ल्यू-4 ऑपरेशन्स को पावर देने के लिए न्यूक्लियर एनर्जी के स्रोत ढूंढ रहे हैं, क्योंकि यही एकमात्र साफ और नवीकरणीय तरीका है जिससे एनर्जी पैदा की जा सकती है।
  - जीडब्ल्यू-5 माइनर्स अपने जीडब्ल्यू-6 ऑपरेशन्स को पावर देने के लिए लगातार सोलर एनर्जी के सोर्सेज ढूंढ़ रहे हैं।

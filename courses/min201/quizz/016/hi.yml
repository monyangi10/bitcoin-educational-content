question: Bitcoin माइनर्स का एनर्जी वर्ल्ड में क्या रोल है?
answer: जीडब्ल्यू-1 माइनर्स लगातार सस्ती बिजली के स्रोत ढूंढते रहते हैं, खासकर वो जो बर्बाद हो रही हो या फिर अभी तक इस्तेमाल नहीं हुई हो। ये लचीले डिमांड स्रोत की तरह काम कर सकते हैं, जो इस अनछुई बिजली को खपाने के लिए तैयार रहते हैं। इस तरह ये इंफ्रास्ट्रक्चर की लागत को कम करने में मदद करते हैं।
wrong_answers:

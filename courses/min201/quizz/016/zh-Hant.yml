question: Bitcoin 礦工在能源世界中扮演什麼角色？
answer: Bitcoin 礦工不斷尋找廉價電力來源，通常是那些被浪費或未開發的電力。他們可以扮演彈性需求來源的角色，隨時消耗這些無主電力，從而協助抵銷基礎建設成本。
wrong_answers:
  - Bitcoin 礦工不斷尋找可再生能源來源，以減少碳足跡。
  - Bitcoin 礦工不斷尋找核能來源，為 Mining 作業提供動力，因為這是唯一乾淨且可再生的能源生產方式。
  - Bitcoin 礦工不斷尋找太陽能來源，為他們的 Mining 作業提供動力。
explanation: |
  本章說明 Bitcoin 礦工不斷
  尋找廉價電力來源，通常是那些
  浪費或未開發。它們可以作為靈活的需求
  電源，準備消耗這些無主電力，因此
  幫助抵銷基礎設施成本。
reviewed: true
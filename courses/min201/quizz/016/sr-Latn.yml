question: Koja je uloga Bitcoin rudara u svetu energije?
answer: Bitcoin rudari neprestano traže izvore jeftine električne energije, često one koji su neiskorišćeni ili bi inače bili uzalud potrošeni. Oni mogu delovati kao fleksibilan izvor potražnje, spremni da troši ovu „napuštenu“ električnu energiju, čime pomažu u nadoknadi troškova infrastrukture.
wrong_answers:
  - Bitcoin rudari stalno traže izvore obnovljive energije kako bi smanjili svoj karbonski otisak.
  - Bitcoin rudari stalno traže izvore nuklearne energije za napajanje svojih rudarskih operacija, jer je to jedini čist i obnovljiv način za proizvodnju energije.
  - Bitcoin rudari stalno traže izvore solarne energije za napajanje svojih rudarskih operacija.
explanation: |
  Poglavlje objašnjava da Bitcoin rudari neprestano traže izvore jeftine električne energije, često one koji su neiskorišćeni ili bi inače bili uzalud potrošeni. Oni mogu delovati kao fleksibilan izvor potražnje, spremni da potroše ovu napuštenu električnu energiju, čime pomažu u nadoknadi troškova infrastrukture.
reviewed: true

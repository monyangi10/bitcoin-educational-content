question: รางวัล mining ปัจจุบันในเครือข่าย Bitcoin คืออะไร?
answer: การสร้างบิตคอยน์ใหม่และค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - การสร้างบิตคอยน์ใหม่เท่านั้น
  - ค่าธรรมเนียมการทำธุรกรรมเท่านั้น
  - การสร้างบิตคอยน์ใหม่, ค่าธรรมเนียมการทำธุรกรรม, และโบนัสสำหรับนักขุดที่เร็วที่สุด
explanation: |
  รางวัล mining ปัจจุบันในเครือข่าย Bitcoin มีสองส่วน ประกอบด้วยการสร้างบิตคอยน์ใหม่ ซึ่งลดลงจาก 50 บิตคอยน์ทุก ๆ สิบนาทีในตอนแรก เหลือ 6.25 บิตคอยน์ในปัจจุบัน (2023) นอกจากนี้ยังรวมถึงค่าธรรมเนียมการทำธุรกรรม หรือค่าธรรมเนียม mining จากการทำธุรกรรมที่ผู้ขุดเลือกที่จะรวมไว้ในบล็อกของพวกเขา
reviewed: true
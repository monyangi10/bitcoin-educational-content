question: Šta je sve trenutno uključeno u rudarske nagrade u Bitcoin mreži?
answer: Kreiranje novih bitkoina i transakcione naknade
wrong_answers:
  - Smo kreiranje novih bitkoina 
  - Samo naknade za transakcije
  - Kreiranje novih bitkoina, naknade za transakcije i bonus za najbržeg rudara
explanation: |
  Trenutna rudarska nagrada u Bitcoin mreži je
  dvostruka. Uključuje kreiranje novih bitkoina, što se
  smanjilo sa 50 bitkoina svakih deset minuta inicijalno
  na 6.25 bitkoina danas (2023). Takođe uključuje
  transakcione naknade, ili rudarske naknade, iz transakcija
  koje rudar odluči da uključi u svoj blok.
reviewed: true

question: Ni iyihe mpembo ya Mining iriho ubu mu murongo wa Bitcoin?
answer: Guhingura ama bitcoins mashasha n'amahera yo gukoresha
wrong_answers:
  - Guhingura ama bitcoins mashasha gusa
  - Amafaranga y'ugucuruza gusa
  - Irema ry’ama bitcoins mashasha, amafaranga yo gukoresha, n’agashimwe ku Miner yihuta cane.
explanation: |
  Impembo ya Mining iriho ubu mu rubuga rwa Bitcoin ni 100.000.
  bibiri. Harimwo no kurema ama bitcoins mashasha, ayo .
  yagabanutse kuva ku bitcoins 50 buri minota cumi mu ntango .
  ku bice 6,25 uno musi (2023). Harimwo kandi n'ugucuruza .
  amafaranga, canke amafaranga Mining, avuye mu bikorwa ivyo Miner.
  ahitamwo gushiramwo mu gice cabo.
reviewed: true
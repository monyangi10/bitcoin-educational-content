question: वर्तमान में Mining रिवॉर्ड Bitcoin नेटवर्क में क्या है?
answer: नए बिटकॉइन का निर्माण और लेन-देन शुल्क
wrong_answers:
  - नए बिटकॉइन का निर्माण सिर्फ
  - ट्रांजैक्शन फीस ही
  - नए बिटकॉइन का निर्माण, लेन-देन शुल्क, और सबसे तेज़ Miner के लिए बोनस
explanation: |
  वर्तमान Mining इनाम Bitcoin नेटवर्क में है
  दोहरा। इसमें नए बिटकॉइन बनाना शामिल है, जो
  शुरुआत में हर दस मिनट में 50 बिटकॉइन से कम हो गया है
  आज (2023) में 6.25 बिटकॉइन तक। इसमें लेन-देन भी शामिल है
  फीस, या Mining फीस, उन लेन-देन से जो Miner
  अपने ब्लॉक में शामिल करना चुनता है।
reviewed: true
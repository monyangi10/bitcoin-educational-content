question: Bitcoin 블록 공간 사용과 관련하여 향후 우려되는 점은 무엇인가요?
answer: 향후 우려되는 점은 Lightning Network의 성장과 그에 따른 채널 개설 및 폐쇄의 증가로 인해 Bitcoin 블록의 공간이 점점 더 중요해질 것이라는 점입니다.
wrong_answers:
  - 향후 우려되는 점은 Bitcoin 블록의 크기가 관리하기에는 너무 커질 것이라는 점입니다.
  - 향후 우려되는 점은 Bitcoin 블록의 수가 네트워크의 용량을 초과할 것이라는 점입니다.
  - 향후 우려되는 점은 Bitcoin 블록의 복잡성이 증가하여 처리하기가 어려워질 것이라는 점입니다.
explanation: |
  Lightning Network의 예상되는 성장과 그에 따른
  결과적으로 채널 개폐가 증가함에 따라 Bitcoin 블록의 공간
  의 가치가 점점 더 높아질 것입니다. 이
  블록의 합법적인 사용에 대한 논의로 이어졌습니다
  공간의 합법적인 사용에 대한 논의로 이어졌으며, Blockchain에서 스팸에 대한 우려와 함께
  스팸에 대한 우려가 제기되었습니다.
reviewed: true
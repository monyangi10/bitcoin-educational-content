question: Bitcoin ब्लॉक स्पेस के उपयोग को लेकर भविष्य में क्या चिंता है?
answer: भविष्य की चिंता यह है कि Lightning Network के अपेक्षित विकास और चैनल खुलने-बंद होने की बढ़ती संख्या के कारण, Bitcoin ब्लॉक्स में जगह की कीमत लगातार बढ़ती जाएगी।
wrong_answers:
  - भविष्य की चिंता यह है कि Bitcoin ब्लॉक्स का आकार इतना बड़ा हो जाएगा कि उसे मैनेज करना मुश्किल हो जाएगा।
  - भविष्य की चिंता यह है कि Bitcoin ब्लॉक्स की संख्या नेटवर्क की क्षमता से अधिक हो जाएगी।
  - भविष्य की चिंता यह है कि Bitcoin ब्लॉक्स की जटिलता बढ़ जाएगी, जिससे उन्हें प्रोसेस करना मुश्किल हो जाएगा।
explanation: |
  Lightning Network की अपेक्षित वृद्धि और
  चैनल के खुलने और बंद होने में बाद में होने वाली वृद्धि, जगह
  Bitcoin में ब्लॉक्स की कीमत बढ़ती जाएगी। यह
  इससे ब्लॉक के वैध इस्तेमाल पर चर्चा शुरू हो गई है
  स्पेस, Blockchain पर स्पैम को लेकर चिंताओं के साथ
  गैर-जरूरी माने जाने वाले लेन-देन।
reviewed: true
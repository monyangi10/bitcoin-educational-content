question: Каква е бъдещата грижа за използването на блоковото пространство на Bitcoin?
answer: Бъдещите опасения са, че с очакваното разрастване на Lightning Network и последващото увеличаване на броя на отварянията и затварянията на канали, пространството в блоковете на Bitcoin ще става все по-ценно.
wrong_answers:
  - Бъдещите опасения са, че размерът на блоковете Bitcoin ще стане твърде голям за управление.
  - Бъдещите опасения са, че броят на блоковете Bitcoin ще надхвърли капацитета на мрежата.
  - Бъдещите опасения са, че сложността на блоковете Bitcoin ще се увеличи, което ще затрудни обработката им.
explanation: |
  С очаквания растеж на Lightning Network и
  и последващото увеличение на броя на отварянията и затварянията на канали, пространството
  в блоковете Bitcoin ще става все по-ценно. Този
  доведе до дискусии относно законното използване на блоковете
  с опасения за спам в блокчейна от
  транзакции, които се считат за несъществени.
reviewed: true
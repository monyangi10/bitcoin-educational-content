question: Ni kuki uburezi n’amakuru bifatwa nk’intwaro ikomeye kuruta izindi zo kurwanya amategeko ashobora guhagarika Bitcoin Mining?
answer: Gutahura neza kandi neza Mining birashobora gufasha gukuraho amabanga y’ivyo bikorwa no kurwanya amakuru atari yo.
wrong_answers:
  - Kuko bishobora gufasha abacukuzi kuronka uburyo bwo kurenga amabwirizwa.
  - Kuko bishobora gufasha kwemeza abagenzura ivy’amategeko guhindura ivyiyumviro vyabo.
  - Kuko bishobora gufasha abacukuzi gutahura neza amabwirizwa.

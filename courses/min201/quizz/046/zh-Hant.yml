question: 為什麼教育與資訊被視為對抗 Bitcoin Mining 潛在限制性法規的最有力武器？
answer: 對 Mining 有清楚而精確的瞭解，有助於揭開這個產業的神秘面紗，並消除錯誤資訊。
wrong_answers:
  - 因為它可以幫助礦工找到繞過法規的方法。
  - 因為這有助於說服監管者改變主意。
  - 因為它可以幫助礦工更好地瞭解法規。
explanation: |
  教育和資訊被視為最有力的
  針對 Bitcoin 的潛在限制性法規的武器
  Mining 因為對 Mining 有明確且精確的了解、
  如何運作，以及其影響，有助於揭開
  行業和打擊錯誤資訊。這可以提供更好的
  抵制可能有害的法規。
reviewed: true
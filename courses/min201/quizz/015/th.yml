question: หลักการที่ Bitcoin mining ทำงานคืออะไร?
answer: Bitcoin mining ทำงานบนหลักการลอตเตอรี่ ซึ่งโอกาสในการชนะบล็อก (และดังนั้นรางวัล Bitcoin) ทุกๆ สิบนาทีจะต่ำมากสำหรับนักขุดรายย่อยแต่ละคน
wrong_answers:
  - Bitcoin mining ทำงานบนหลักการมาก่อนได้ก่อน ซึ่งนักขุดคนแรกที่แก้ปัญหาทางคณิตศาสตร์ที่ซับซ้อนได้จะได้รับรางวัล Bitcoin
  - Bitcoin mining ทำงานบนหลักการการประมูล โดยที่ผู้ขุดที่เสนอราคาสูงสุดจะได้รับรางวัล Bitcoin
  - Bitcoin mining ทำงานบนหลักการหมุนเวียน โดยที่นักขุดแต่ละคนจะได้รับโอกาสในการขุดบล็อกและรับรางวัล Bitcoin
explanation: |
  บทนี้อธิบายว่า Bitcoin mining ทำงานบนหลักการลอตเตอรี่ ซึ่งโอกาสในการชนะบล็อก (และดังนั้น รางวัล Bitcoin) ทุกๆ สิบนาทีนั้นต่ำมากสำหรับนักขุดรายย่อยแต่ละคน
reviewed: true
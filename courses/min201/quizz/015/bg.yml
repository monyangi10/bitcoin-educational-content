question: Какъв е принципът, на който работи Bitcoin mining?
answer: Bitcoin mining работи на принципа на лотарията, при която шансовете за спечелване на блок (и следователно на наградата Bitcoin) на всеки десет минути са изключително малки за отделен малък миньор.
wrong_answers:
  - Bitcoin mining работи на принципа "пръв дошъл - пръв обслужен", като първият миньор, който реши сложен математически проблем, получава наградата Bitcoin.
  - Bitcoin mining работи на принципа на наддаване, при който миньорът, предложил най-висока цена, получава наградата Bitcoin.
  - Bitcoin mining работи на ротационен принцип, при който всеки миньор има право да добие блок и да получи наградата Bitcoin.
explanation: |
  В главата е обяснено, че Bitcoin mining работи на лотариен принцип
  на принципа на лотарията, при който шансовете за спечелване на блок (и следователно на награда Bitcoin) на всеки десет минути са
  изключително ниски за отделен малък миньор.
reviewed: true
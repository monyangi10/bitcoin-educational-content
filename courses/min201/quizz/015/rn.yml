question: Ni ingingo ngenderwako iyihe Bitcoin Mining ikorerako?
answer: Bitcoin Mining ikora ku ngingo ngenderwako y'amatora, aho amahirwe yo gutsinda igice (kandi rero impembo ya Bitcoin) buri minota cumi ari make cane ku muntu mutoyi Miner.
wrong_answers:
  - Bitcoin Mining ikora ku ngingo ngenderwako y’uko uwubanza kuza ari we azobanza guhabwa, aho Miner wa mbere azotorera umuti ingorane igoye y’imibare aronka impembo ya Bitcoin.
  - Bitcoin Mining ikora ku ngingo ngenderwako y’ugutanga amahera, aho Miner atanga amahera menshi cane aronka impembo ya Bitcoin.
  - Bitcoin Mining ikora ku ngingo ngenderwako y’uguhinduranya, aho Miner yose ironka urugendo rwo gucukura ibuye maze ikaronka impembo ya Bitcoin.

question: Ni akamaro akahe nyamukuru k’ama ASIC mu bijanye na Bitcoin Mining?
answer: Bashobora gukora neza cane ubwoko bumwe bw'imibare .
wrong_answers:
  - Bashobora gukora ubwoko bwinshi bw'imibare itandukanye .
  - Zikoresha umuyagankuba muto kuruta ama CPU .
  - Birahenda kurusha ama CPU .
explanation: |
  ASICs ni ibice, bigereranywa n’ibice vya CPU, yamara rero, bira
  birategurwa kugira ngo bikore ubwoko bumwe gusa bwihariye bw’
  guharura mu buryo bwiza kuruta ubundi bwose. Mu rubanza
  ya Bitcoin ASICs, zigenewe kubara .
  n'ubuhinga bwa SHA256.
reviewed: true
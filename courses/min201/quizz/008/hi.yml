question: ASICs का मुख्य फायदा Bitcoin और Mining के संदर्भ में क्या है?
answer: वे एक खास तरह की गणना बहुत ही कुशलता से कर सकते हैं।
wrong_answers:
  - वे कई तरह के अलग-अलग हिसाब कर सकते हैं।
  - वे CPUs से कम बिजली खाते हैं
  - वे CPUs से सस्ते हैं

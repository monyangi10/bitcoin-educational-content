question: Bitcoin Mining의 맥락에서 ASIC의 주요 장점은 무엇인가요?
answer: 한 가지 특정 유형의 계산을 매우 효율적으로 수행할 수 있습니다
wrong_answers:
  - 다양한 유형의 계산을 수행할 수 있습니다
  - CPU보다 전력 소비량이 적습니다
  - CPU보다 저렴합니다
explanation: |
  ASIC은 CPU 칩과 비슷한 칩이지만, 다음과 같이
  한 가지 특정 유형의 계산만 수행하도록 개발되었습니다
  계산을 가장 효율적으로 수행하도록 개발되었습니다. 예를 들어
  gW-2 ASIC의 경우, 다음 계산을 위해 설계되었습니다
  계산을 위해 설계되었습니다.
reviewed: true
question: Кое е основното предимство на ASIC в контекста на Bitcoin mining?
answer: Те могат да извършват много ефективно един конкретен вид изчисления
wrong_answers:
  - Те могат да извършват множество различни видове изчисления
  - Консумират по-малко електроенергия от процесорите
  - Те са по-евтини от процесорите
explanation: |
  ASIC са чипове, сравними с процесорен чип; те обаче
  са разработени да изпълняват само един специфичен вид
  изчисления по възможно най-ефективния начин. В случая
  на Bitcoin ASIC, те са предназначени за изчисляване на
  алгоритъма SHA256.
reviewed: true
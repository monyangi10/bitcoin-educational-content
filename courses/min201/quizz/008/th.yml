question: ข้อได้เปรียบหลักของ ASICs ในบริบทของ Bitcoin mining คืออะไร?
answer: พวกเขาสามารถทำการคำนวณประเภทเฉพาะอย่างหนึ่งได้อย่างมีประสิทธิภาพมาก
wrong_answers:
  - พวกเขาสามารถทำการคำนวณประเภทต่างๆ ได้มากมาย
  - พวกมันใช้ไฟฟ้าน้อยกว่า CPU
  - พวกมันมีราคาถูกกว่า CPU
explanation: |
  ASICs เป็นชิปที่เปรียบได้กับชิป CPU; อย่างไรก็ตาม พวกมันถูกพัฒนาให้ทำการคำนวณเพียงประเภทเดียวในวิธีที่มีประสิทธิภาพที่สุดเท่าที่จะเป็นไปได้ ในกรณีของ Bitcoin ASICs พวกมันถูกออกแบบมาเพื่อการคำนวณอัลกอริทึม SHA256
reviewed: true
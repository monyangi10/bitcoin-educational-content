question: Каква е основната задача на миньорите в мрежата Bitcoin?
answer: Решаване на цифров пъзел и валидиране на нов блок
wrong_answers:
  - Създаване на нови биткойни
  - Контрол на цената на Bitcoin
  - Проверка на самоличността на потребителите на Bitcoin
explanation: |
  В контекста на Bitcoin mining миньорите се стремят бързо да
  да решат цифров пъзел. Първият миньор, който реши пъзела
  представя своето решение на цялата мрежа, която може
  след това лесно да провери неговата валидност. Това успешно
  проверка позволява на миньора да валидира нов блок и
  да го добави към времевата верига Bitcoin.
reviewed: true
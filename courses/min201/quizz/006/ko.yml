question: Bitcoin 네트워크에서 채굴자의 주요 임무는 무엇인가요?
answer: 디지털 퍼즐을 풀고 새 블록을 검증하려면 다음과 같이 하세요
wrong_answers:
  - 새 비트코인을 생성하려면
  - Bitcoin의 가격을 제어하려면
  - Bitcoin 사용자의 신원을 확인하려면 다음과 같이 하세요
explanation: |
  Bitcoin Mining의 맥락에서 채굴자들은 디지털 퍼즐을 빠르게
  디지털 퍼즐을 풀기 위해 노력합니다. 퍼즐을 푸는 첫 번째 Miner는
  전체 네트워크에 자신의 솔루션을 제시하고
  그 후 그 유효성을 쉽게 검증할 수 있습니다. 이 성공적인
  검증이 성공하면 Miner는 새로운 블록의 유효성을 검사하고
  gW-3 타임체인에 추가할 수 있습니다.
reviewed: true
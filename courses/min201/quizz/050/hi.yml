question: Bitcoin और Mining से जुड़ी मुख्य चुनौती क्या है?
answer: जीडब्ल्यू-2 उद्योग बेहद प्रतिस्पर्धात्मक और अस्थिर है, और अप्रत्याशित घटनाएं जीडब्ल्यू-2 के संचालन में बाधा डाल सकती हैं।
wrong_answers:
  - मुख्य चुनौती है बिजली का भरोसेमंद स्रोत ढूंढना।
  - मुख्य चुनौती यह है कि माइन किए गए बिटकॉइन को सुरक्षित जगह पर स्टोर करने की जगह ढूंढ़ना।
  - मुख्य चुनौती यह है कि माइन किए गए बिटकॉइन्स के लिए कोई खरीदार ढूंढ़ना।
explanation: |
  Bitcoin और Mining से जुड़ी मुख्य चुनौती यह है कि
  जीडब्ल्यू-5 उद्योग बेहद प्रतिस्पर्धी और अस्थिर है,
  और अप्रत्याशित घटनाएं Mining के ऑपरेशन में बाधा डाल सकती हैं।
reviewed: true
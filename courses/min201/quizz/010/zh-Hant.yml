question: Bitcoin 礦工如何協助管理能源盈餘和穩定電網？
answer: Bitcoin 礦工可以吸收能源盈餘，扮演彈性緩衝器的角色，調整需求而非 Supply。在可再生 (不可控制) 能源產電量不斷增加的世界中，礦工可以扮演確保電網平衡的關鍵角色，同時受惠於廉價或過剩的電力，為其 Mining 業務提供動力。
wrong_answers:
  - Bitcoin 採礦機可以將過剩的能量儲存在電池中，有助於管理能源盈餘。
  - Bitcoin 礦工可以將過剩的能源賣回電網，協助管理能源盈餘。
  - Bitcoin 採礦機可將多餘的能量轉換為熱能，有助於管理能源盈餘。
explanation: |
  本章說明 Bitcoin 礦工可以吸收能量
  盈餘，充當彈性緩衝，調整需求。
  而非 Supply。這有助於管理能源
  盈餘和穩定電網。
reviewed: true
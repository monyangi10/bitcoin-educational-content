question: Bitcoin 채굴자가 에너지 잉여를 관리하고 전력망을 안정화하는 데 어떻게 도움이 될 수 있을까요?
answer: Bitcoin 채굴자는 에너지 잉여분을 흡수하여 유연한 완충 역할을 함으로써 Supply보다 오히려 수요를 조정할 수 있습니다. 재생 가능한(통제할 수 없는) 자원으로부터의 전력 생산이 지속적으로 증가하는 세계에서 채굴자는 전력망의 균형을 유지하는 데 중요한 역할을 하는 동시에 값싼 전력 또는 잉여 전력의 혜택을 받아 Mining 운영에 전력을 공급할 수 있습니다.
wrong_answers:
  - Bitcoin 채굴기는 여분의 에너지를 배터리에 저장하여 에너지 잉여를 관리하는 데 도움을 줄 수 있습니다.
  - Bitcoin 채굴자는 잉여 에너지를 그리드에 다시 판매하여 에너지 잉여를 관리하는 데 도움을 줄 수 있습니다.
  - Bitcoin 채굴자는 잉여 에너지를 열로 전환하여 에너지 잉여를 관리하는 데 도움을 줄 수 있습니다.
explanation: |
  이 장에서는 Bitcoin 채굴자가 에너지를 흡수할 수 있다고 설명합니다
  잉여 에너지를 흡수하여 유연한 버퍼 역할을 하며 수요를 조정할 수 있다고 설명합니다
  유연한 버퍼 역할을 할 수 있다고 설명합니다. 이는 에너지 관리와 전력망 안정화에 도움이 될 수 있습니다
  잉여 에너지를 관리하고 전력망을 안정화할 수 있습니다.
reviewed: true
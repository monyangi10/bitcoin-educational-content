question: Bitcoin 네트워크에서 지분 증명의 잠재적 위협은 무엇인가요?
answer: 이미 많은 양의 화폐를 보유한 사람들은 기존의 권력 불평등을 반영하여 불균형적인 권력을 갖게 됩니다.
wrong_answers:
  - 이는 대량의 통화를 보유한 검증자에게는 상당한 장벽이 될 수 있습니다.
  - 소규모 참여는 허용되지 않습니다.
  - 유형 자원이 필요하지 않습니다.
explanation: |
  지분 증명 네트워크에서, 이미 많은 양의 통화를 보유한 사람들은
  많은 양의 통화를 보유한 사람들은 불균형적인 힘을 갖게 됩니다. 이러한
  역학 관계는 잠재적으로 중앙 집중화를 지속시킬 수 있으며
  소수의 손에 권력이 집중될 수 있습니다.
reviewed: true
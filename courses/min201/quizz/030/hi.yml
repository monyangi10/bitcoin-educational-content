question: Bitcoin नेटवर्क में Proof of Stake (PoS) का संभावित खतरा क्या है?
answer: जिनके पास पहले से ही करेंसी की बड़ी मात्रा है, उनके पास असंतुलित ताकत होती है, जो मौजूदा ताकत की असमानताओं को दर्शाती है।
wrong_answers:
  - यह बड़ी मात्रा में मुद्रा रखने वाले वैलिडेटर्स के लिए एक बड़ी बाधा होगी।
  - यह छोटे स्तर पर भागीदारी की अनुमति नहीं देता।
  - इसे कोई ठोस संसाधनों की जरूरत नहीं है।
explanation: |
  एक प्रूफ ऑफ स्टेक नेटवर्क में, जिनके पास पहले से ही बड़ी मात्रा में सिक्के होते हैं
  मुद्रा की मात्रा का असंगत प्रभाव होता है।
  डायनामिक संभावित रूप से केंद्रीकरण को बढ़ावा दे सकता है और
  कुछ लोगों के हाथों में सत्ता का केंद्रीकरण।
reviewed: true
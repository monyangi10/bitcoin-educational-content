question: 在 Bitcoin 網路的背景下，Attakai 的原則是什麼？
answer: Attakai 原則是指對 Bitcoin 挖礦產生的熱量進行生產性利用。
wrong_answers:
  - Attakai 原則是指使用 Bitcoin 挖礦的可再生能源。
  - Attakai 的原則是指在 Bitcoin 挖礦中使用先進的冷卻系統。
  - Attakai 的原則是指在 Bitcoin 挖礦中使用低耗能的硬體。
explanation: |
  Attakai 原則是指
  挖礦產生的熱能進行生產性使用（productive use）
  來分散式挖礦。這一原則表明，能源密集型
  機構可受益於
  礦工為他們的設施取暖。
reviewed: true

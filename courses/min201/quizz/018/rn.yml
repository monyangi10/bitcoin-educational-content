question: Ni ingingo ngenderwako iyihe ya Attakai mu bijanye na Bitcoin Mining?
answer: Ingingo ya Attakai yerekeza ku gukoresha neza ubushuhe buva kuri Bitcoin Mining.
wrong_answers:
  - Ingingo ya Attakai yerekeza ku gukoresha inkomoko z’inguvu zishobora gusubirwamwo ku Bitcoin Mining.
  - Ingingo ya Attakai yerekeza ku gukoresha uburyo bwo gukonjesha buteye imbere muri Bitcoin Mining.
  - Ingingo ya Attakai yerekeza ku gukoresha ibikoresho bikoresha inguvu nke muri Bitcoin Mining.
explanation: |
  Ingingo ngenderwako ya Attakai yerekeza ku ciyumviro c’uko .
  kwegereza Mining biciye mu gukoresha neza
  ubushuhe bwavuyemwo. Ico ciyumviro kivuga ko inguvu zikoreshwa cane .
  ibigo vyoshobora kwungukira ku bushuhe buva ku
  abacukuzi b’amabuye y’agaciro kugira ngo bashushe ibikorwa vyabo.
reviewed: true
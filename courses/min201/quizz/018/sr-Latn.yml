question: Šta je Attakai princip u kontekstu Bitcoin rudarenja?
answer: Attakai princip odnosi se na produktivnu upotrebu toplote generisane rudarenjem Bitcoina.
wrong_answers:
  - Attakai princip odnosi se na korišćenje obnovljivih izvora energije za Bitcoin rudarenje.
  - Attakai princip odnosi se na korišćenje naprednih sistema hlađenja u Bitcoin rudarenju.
  - Attakai princip odnosi se na korišćenje hardvera sa niskom potrošnjom energije u Bitcoin rudarenju.
explanation: |
  Attakai princip odnosi se na ideju
  decentralizacije rudarenja kroz produktivnu upotrebu
  generisane toplote. Ovaj koncept sugeriše da bi energetski
  intenzivni objekti mogli imati koristi od toplote koju
  proizvode rudari za grejanje svojih objekata.
reviewed: true

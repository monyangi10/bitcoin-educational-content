question: रेगुलेशन का Bitcoin और Mining पर क्या असर हो सकता है?
answer: अगर अमेरिका जैसे देश ने Bitcoin लेन-देन पर रोक या नियम लगाने का फैसला किया, तो इसका नेटवर्क पर बड़ा असर हो सकता है, खासकर अगर उस देश में ज्यादातर हैशिंग पावर केंद्रित हो।
wrong_answers:
  - अगर अमेरिका जैसे देश ने Bitcoin और Mining पर रोक लगाने या नियंत्रण करने का फैसला किया, तो इससे Bitcoin की कीमत बढ़ सकती है।
  - अगर अमेरिका जैसे देश ने Bitcoin और Mining पर रोक लगाने या नियंत्रित करने का फैसला किया, तो इससे Block reward की मांग बढ़ सकती है।
  - अगर अमेरिका जैसे देश ने Bitcoin और Mining को रेगुलेट या बैन करने का फैसला किया, तो इससे ट्रांजैक्शन की स्पीड बढ़ सकती है।
explanation: |
  अध्याय बताता है कि अगर अमेरिका जैसा कोई देश
  राज्यों को यह तय करना था कि कुछ Bitcoin को नियंत्रित करें या प्रतिबंधित करें
  लेन-देन पर, इसका काफी बड़ा असर हो सकता है
  नेटवर्क, खासकर अगर ज्यादातर हैशिंग पावर
  वह देश में केंद्रित है।

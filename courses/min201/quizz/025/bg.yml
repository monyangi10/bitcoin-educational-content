question: Как често се нарича базовият слой на мрежата Bitcoin?
answer: Слой на селището
wrong_answers:
  - Слой на транзакциите
  - Слой за сигурност
  - Слой на консенсус
explanation: |
  Базовият слой на мрежата Bitcoin, на който разчита Lightning Network за отваряне и затваряне на платежни канали, често се нарича слой за сетълмент.
reviewed: true
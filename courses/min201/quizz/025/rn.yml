question: Ni igiki gishingiyeko Layer c’uruja n’uruza rwa Bitcoin gikunda kwitwa?
answer: Igisagara ca Layer.
wrong_answers:
  - Ivyo bicuruzwa Layer.
  - Ivyo umutekano Layer.
  - Ivyo vyumvikanyeko Layer.
explanation: |
  Ishingiro Layer ry’uruzitiro rwa Bitcoin, iryo umuravyo
  Urubuga rwizigira ku gufungura no gufunga imihora yo kwishura,
  akenshi yitwa igisagara ca Layer.
reviewed: true
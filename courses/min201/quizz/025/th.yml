question: ชั้นฐานของเครือข่าย Bitcoin มักถูกเรียกว่าอะไร?
answer: เลเยอร์การชำระเงิน
wrong_answers:
  - เลเยอร์การทำธุรกรรม
  - ชั้นความปลอดภัย
  - เลเยอร์ฉันทามติ
explanation: |
  เลเยอร์ฐานของเครือข่าย Bitcoin ซึ่ง Lightning Network พึ่งพาสำหรับการเปิดและปิดช่องทางการชำระเงิน มักถูกเรียกว่าเลเยอร์การชำระบัญชี
reviewed: true
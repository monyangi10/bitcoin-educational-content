question: Ni igiki gikorwa ca Attakai mu bijanye n’ivyo Bitcoin Mining?
answer: Igitekerezo kigamije gutuma Mining ishobora gushikirwa n’abantu benshi kandi ntiyigire ingaruka mbi mu gihe itanga umusanzu ku rubuga .
wrong_answers:
  - Igikorwa kigamije kwongera igiciro ca Bitcoin.
  - Igitekerezo kigamije kugabanya Hashrate y'urubuga .
  - Igitekerezo kigamije gushiramwo ububasha bwo gukora hashing
explanation: |
  Ico gikorwa ca Attakai kigamije gutuma Bitcoin Mining iba nyinshi
  birashoboka kandi ntibitera ingorane nyinshi. Biremesha abantu gucukura .
  muhira ufise ibikoresho bishoboka cane n'imiti y'
  kugabanya ubuhumane bw’urusaku. Iryo shirahamwe kandi rishimika ku .
  akamaro ko gutanga umusanzu mu mutekano no
  kwegereza ubutegetsi urubuga rwa Bitcoin.
reviewed: true
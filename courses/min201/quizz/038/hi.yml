question: Bitcoin और Mining के संदर्भ में अट्टाकाई पहल क्या है?
answer: एक पहल जिसका मकसद है Mining को और ज्यादा सुलभ और कम नुकसानदेह बनाना, साथ ही नेटवर्क में योगदान देना
wrong_answers:
  - एक पहल जिसका मकसद है Bitcoin की कीमत बढ़ाना
  - एक पहल जिसका उद्देश्य नेटवर्क के Hashrate को कम करना है
  - एक पहल जिसका मकसद हैशिंग पावर को केंद्रीकृत करना है
explanation: |
  अटाकाई पहल का लक्ष्य है Bitcoin और Mining को और ज्यादा...
  आसानी से उपलब्ध और कम नुकसानदेह। यह लोगों को खनन करने के लिए प्रोत्साहित करता है।
  घर पर और सस्ते हार्डवेयर और समाधानों के साथ
  शोर प्रदूषण कम करें। इस पहल पर ज़ोर भी दिया गया है।
  सुरक्षा और योगदान देने का महत्व
  Bitcoin नेटवर्क का विकेंद्रीकरण।
reviewed: true
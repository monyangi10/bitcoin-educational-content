question: Какъв е потенциалният риск от централизирането на производството на хардуер за mining в Китай?
answer: Отказ за износ на машини mining или натрупване на hashrate за потенциална атака от 51%.
wrong_answers:
  - Китай може да монополизира мрежата Bitcoin.
  - Китай може да контролира цената на Bitcoin.
  - Китай може да забрани Bitcoin mining.
explanation: |
  Централизация на производството на хардуер mining в Китай
  представлява риск за мрежата Bitcoin. Ако Китай откаже да
  изнася машини mining или натрупва hashrate за
  51% атака, това може да застраши сигурността и
  децентрализацията на мрежата.
reviewed: true
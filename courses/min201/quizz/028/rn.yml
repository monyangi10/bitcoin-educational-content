question: Ni ikihe kibazo gishobora guterwa n’ugushira ahantu hamwe ibikorwa vyo gukora ibikoresho vya Mining mu Bushinwa?
answer: Ukwanka kwohereza hanze imashini za Mining canke kwirundanira Hashrate ku gitero gishobora kubaho c’ibice 51%.
wrong_answers:
  - Ubushinwa bwoshobora kwigarurira urubuga rwa Bitcoin.
  - Ubushinwa bwoshobora kugenzura igiciro ca Bitcoin.
  - Ubushinwa bushobora kubuza Bitcoin Mining.
explanation: |
  Gushiramwo hamwe ibikoresho vya Mining mu Bushinwa
  biratera ingorane uruja n’uruza rwa Bitcoin. Iyo Ubushinwa bwanka .
  yohereza hanze imashini za Mining canke yirundanira Hashrate ku
  igitero gishobora gutera 51%, coshobora gutera ubwoba umutekano n’
  kwegereza ubutegetsi urubuga.
reviewed: true
question: चीन में Mining हार्डवेयर उत्पादन के केंद्रीकरण का संभावित जोखिम क्या है?
answer: Mining मशीनों के निर्यात से इनकार या Hashrate का जमावड़ा, जिससे 51% हमले की संभावना हो।
wrong_answers:
  - चीन Bitcoin नेटवर्क पर एकाधिकार कर सकता है।
  - चीन Bitcoin की कीमत को कंट्रोल कर सकता है।
  - चीन Bitcoin और Mining पर प्रतिबंध लगा सकता है।
explanation: |
  चीन में Mining हार्डवेयर उत्पादन का केंद्रीकरण
  Bitcoin नेटवर्क को खतरा पैदा करता है। अगर चीन मना कर देता है
  Mining मशीनें एक्सपोर्ट करो या फिर Hashrate को जमा करो
  संभावित 51% हमला, यह सुरक्षा और... को खतरे में डाल सकता है
  नेटवर्क का विकेंद्रीकरण।
reviewed: true
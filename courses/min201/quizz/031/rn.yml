question: Ni igiki gikorwa nyamukuru ca Bitcoin?
answer: Kugira ngo ube urubuga rw’agaciro rwa Exchange rushobora guhangana n’ugucengera.
wrong_answers:
  - Kugira ngo basubirize amafaranga y’imigenzo.
  - Kugira ngo amafaranga akoreshwa ntamenyekane.
  - Kugira ngo haboneke uburyo bushasha bwo gushora imari mu bikorwa.
explanation: |
  Intumbero y’ishimikiro ya Bitcoin ni ukuba
  umurongo w’agaciro Exchange ushobora guhangana n’ugucengera. Igitabo ca Bitcoin.
  umuryango uguma wihatira gukomeza
  gukwiragiza, kurwanya ugucengera, no kurwanya ubugoyagoye
  y’urubuga.
reviewed: true
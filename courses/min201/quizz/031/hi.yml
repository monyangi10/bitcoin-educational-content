question: Bitcoin का मूल मिशन क्या है?
answer: एक सेंसरशिप-रजिस्टेंट वैल्यू Exchange नेटवर्क बनना।
wrong_answers:
  - पारंपरिक मुद्राओं को बदलने के लिए।
  - लेन-देन को गुमनाम बनाने के लिए।
  - निवेश का एक नया तरीका बनाना।
explanation: |
  Bitcoin का मूल मिशन है एक
  सेंसरशिप-रोधी मूल्य Exchange नेटवर्क। Bitcoin
  समुदाय लगातार मजबूत होने की कोशिश कर रहा है
  वितरण, सेंसरशिप का विरोध, और एंटी-फ्रैजिलिटी
  नेटवर्क का।
reviewed: true
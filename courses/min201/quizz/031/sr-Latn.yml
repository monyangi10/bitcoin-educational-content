question: Koja je osnovna misija Bitcoina?
answer: Da bude mreža za razmenu vrednosti koja je otporna na cenzuru.
wrong_answers:
  - Da zameni tradicionalne valute.
  - Da transakcije budu anonimne.
  - Da se stvori novi oblik investicije.
explanation: |
  Osnovna Bitcoin misija je da bude mreža razmene vrednosi otporna na cenzuru. 
  Bitcoin zajednica neprestano teži jačanju distribucije, otpornosti na cenzuru i antifragilnosti mreže.
reviewed: true

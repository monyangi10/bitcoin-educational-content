question: Mining के फायदे के मुकाबले इसका नुकसान क्या हो सकता है?
answer: इससे हैशिंग पावर का केंद्रीकरण हो सकता है और इसका पर्यावरण पर भी बड़ा असर पड़ सकता है
wrong_answers:
  - इससे Bitcoin की कीमत कम हो सकती है
  - इससे नेटवर्क का Hashrate कम हो सकता है
  - इससे नेटवर्क में एक्टिव नोड्स की संख्या कम हो सकती है
explanation: |
  जीडब्ल्यू-3 फॉर प्रॉफिट से हाशिंग का केन्द्रीकरण हो सकता है
  ताक़त अगर सिर्फ़ कुछ बड़ी कंपनियाँ ही निवेश कर पाएँ
  हाई-एंड जीडब्ल्यू-4 उपकरण। इसके अलावा, ऊर्जा
  Mining का फायदे के लिए इस्तेमाल करना बड़ा नुकसानदेह हो सकता है
  ऊर्जा के स्रोत पर निर्भर पर्यावरणीय प्रभाव।
reviewed: true
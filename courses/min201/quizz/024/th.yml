question: เหตุการณ์ที่รางวัลสำหรับธุรกรรม mining Bitcoin ถูกลดลงครึ่งหนึ่งเรียกว่าอะไร?
answer: Halving
wrong_answers:
  - การเพิ่มเป็นสองเท่า
  - การแบ่งออกเป็นสี่ส่วน
  - การเพิ่มขึ้นสามเท่า
explanation: |
  การลดรางวัล mining ที่ถูกตั้งโปรแกรมไว้ โดยจะลดลงครึ่งหนึ่งทุก ๆ สี่ปี เป็นเหตุการณ์ที่รู้จักกันในชื่อการลดครึ่ง
reviewed: true
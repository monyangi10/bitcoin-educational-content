question: Как се нарича събитието, при което наградата за транзакции mining Bitcoin се намалява наполовина?
answer: Halving
wrong_answers:
  - Удвояване
  - Кварталиране
  - Утрояване
explanation: |
  Програмираното намаляване на възнагражденията mining, което намалява наполовина всеки
  четири години, е събитие, известно като намаляване наполовина.
reviewed: true
question: 透過 Mining 參與 Bitcoin 生態系統的獨特方式是什麼？
answer: Mining Bitcoin 在冬季可以巧妙地為您的房屋供暖，同時在 Bitcoin 中創造收入。
wrong_answers:
  - Mining Bitcoin 可以是獲得免費電力的方法。
  - Mining Bitcoin 可以是獲得免費網路的方法。
  - Mining Bitcoin 可以是獲得免費硬體的方法。
explanation: |
  參與 Bitcoin 生態系統的一種獨特方式
  通過 Mining 是由 Mining Bitcoin 在冬季。這可以
  是一種巧妙的取暖方式，同時又能創造收入
  在 Bitcoin 中。
reviewed: true
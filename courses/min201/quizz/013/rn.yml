question: Ni gute amategeko n’amafaranga y’amashanyarazi bigira ico bikoze kuri Bitcoin Mining?
answer: Amategeko n’amafaranga y’amashanyarazi biragira ingaruka zikomeye kuri Bitcoin Mining. Abacukuzi b’amabuye y’agaciro baguma barondera amashanyarazi atari menshi kugira ngo bashobore kuronka inyungu nyinshi. Ni co gituma amashanyarazi agura cane mu turere tumwetumwe, ntibikwegera abacukuzi b’amabuye y’agaciro muri izo ntara. Abacukuzi b’amabuye y’agaciro bakunda gukwegera mu turere dufise amafaranga make y’amashanyarazi, kenshi mu bihugu bikiri mu nzira y’amajambere canke mu bihugu bifise ingufu zirengeye.
wrong_answers:
  - Amategeko n’amafaranga y’amashanyarazi biragira ico bikoze kuri Bitcoin Mining mu kumenya ubwoko bw’amamashini ya Mining ashobora gukoreshwa.
  - Amategeko n’amafaranga y’amashanyarazi biragira ico bikoze kuri Bitcoin Mining mu kumenya ubwoko bwa porogarama ya Mining ishobora gukoreshwa.
  - Amategeko n’ibiciro vy’amashanyarazi biragira ico bikoze kuri Bitcoin Mining mu kumenya ubunini bwa Mining pool ishobora gushingwa.
explanation: |
  Ikigabane kirasigura ko amategeko n’umuyagankuba .
  amafaranga afise ingaruka zikomeye kuri Bitcoin Mining.
  Abacukuzi b’amabuye y’agaciro baguma barondera amashanyarazi atari menshi kugira ngo
  gutuma inyungu zabo zirushirizaho, kandi rero bagakunda gukwegera .
  ku turere dufise amafaranga make y’amashanyarazi.
reviewed: true
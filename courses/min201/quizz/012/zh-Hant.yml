question: 礦池為何運作，為何需要？
answer: 礦池是一群結合運算資源以增加挖礦機會的礦工。這種合作是必要的，因為一台孤立的小型礦機要與業界巨頭競爭，機會低到可忽略不計的程度。透過集合在一起，礦工可以結合他們的運算能力，更頻繁的找到區塊，然後根據每個礦工對池的貢獻按比例分配獎勵。

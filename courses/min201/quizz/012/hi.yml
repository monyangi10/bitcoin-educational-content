question: Mining pool कैसे काम करता है और यह ज़रूरी क्यों है?
answer: Mining pool एक माइनर्स का समूह है जो अपने कंप्यूटिंग संसाधनों को मिलाकर Mining में सफलता की संभावना बढ़ाते हैं। यह सहयोग जरूरी है क्योंकि एक अकेली छोटी Mining मशीन उद्योग के बड़े खिलाड़ियों के सामने प्रतिस्पर्धा करती है, जिससे उसकी सफलता की संभावना लगभग न के बराबर रह जाती है। साथ मिलकर काम करने से माइनर्स अपनी कंप्यूटिंग पावर को जोड़ सकते हैं, ब्लॉक्स को जल्दी-जल्दी ढूंढ सकते हैं, और फिर इनाम को Miner के पूल में योगदान के अनुपात में बांट सकते हैं।
wrong_answers:
  - Mining pool एक माइनर्स का ग्रुप है जो Mining मशीन को शेयर करते हैं ताकि उनके Mining पाने की संभावना बढ़ जाए। यह सहयोग जरूरी है क्योंकि एक Mining मशीन सीमित मात्रा में ही Bitcoin माइन कर सकती है।
  - Mining pool एक ऐसा ग्रुप है जहां कई माइनर्स एक ही Mining सॉफ्टवेयर को शेयर करते हैं ताकि उनके Mining मिलने के चांस बढ़ जाए। ये सहयोग जरूरी है क्योंकि अलग-अलग Mining सॉफ्टवेयर की कार्यक्षमता भी अलग-अलग होती है।
  - Mining pool एक ऐसा ग्रुप है जहां कई माइनर्स एक ही Mining लोकेशन शेयर करते हैं ताकि उनके Mining मिलने की संभावना बढ़ जाए। यह सहयोग जरूरी है क्योंकि Mining ऑपरेशन की लोकेशन Mining की एफिशिएंसी को प्रभावित कर सकती है।
explanation: |
  अध्याय बताता है कि Mining pool एक समूह है
  खनिक जो अपने कंप्यूटिंग संसाधनों को मिलाकर बढ़ाते हैं
  उनके Mining होने की संभावना। यह सहयोग जरूरी है
  क्योंकि एक अलग-थलग छोटी Mining मशीन प्रतिस्पर्धा कर रही है
  इंडस्ट्री के दिग्गजों के खिलाफ, जिससे इसकी सफलता की संभावना कम हो गई
  एक नगण्य स्तर।

question: Какъв е потенциалният риск от намаляване на броя на потребителите, възлите или миньорите в мрежата Bitcoin?
answer: Това може да отслаби мрежата, като увеличи риска от централизация и уязвимостта към атаки.
wrong_answers:
  - Това може да доведе до повишаване на цената на Bitcoin.
  - Това може да намали скоростта на транзакцията, както и трудността на mining.
  - Това би могло да увеличи трудността и уязвимостта на mining от атаки, като същевременно намали риска от централизация.
explanation: |
  Намаляването на броя на потребителите, възлите или миньорите може да
  да отслаби мрежата Bitcoin. Това може да увеличи риска от
  централизация и да направи мрежата по-уязвима към
  атаки.
reviewed: true
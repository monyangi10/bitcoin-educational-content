question: ทำไมถึงไม่แนะนำให้ใช้ส่วนขยายเบราว์เซอร์สำหรับการกรอกพาสเวิร์ดอัตโนมัติ?
answer: พวกเขาสามารถทำให้ผู้ใช้มีความเสี่ยงต่อการโจมตีแบบฟิชชิ่งมากขึ้น เพิ่มพื้นผิวการโจมตี และทำให้ประสิทธิภาพของเบราว์เซอร์ช้าลง
wrong_answers:
  - พวกมันใช้งานยาก
  - พวกมันไม่เข้ากันได้กับเบราว์เซอร์ทั้งหมด
  - พวกเขาต้องการพื้นที่จัดเก็บจำนวนมาก
explanation: |
  ส่วนขยายเบราว์เซอร์ที่กรอกข้อมูลรหัสผ่านโดยอัตโนมัติสามารถทำให้ผู้ใช้มีความเสี่ยงต่อการโจมตีแบบฟิชชิ่งมากขึ้น นอกจากนี้ยังมีแนวโน้มที่จะเพิ่มพื้นผิวการโจมตีและสามารถทำให้ประสิทธิภาพของเบราว์เซอร์ช้าลง ซึ่งเป็นความเสี่ยงที่สำคัญ
reviewed: true
question: 비밀번호 자동 입력에 브라우저 확장 프로그램을 사용하지 않는 것이 권장되지 않는 이유는 무엇인가요?
answer: 피싱 공격에 더 취약해지고 공격 표면이 증가하며 브라우저 성능이 느려질 수 있습니다.
wrong_answers:
  - 사용하기 어렵습니다.
  - 모든 브라우저와 호환되는 것은 아닙니다.
  - 많은 저장 공간이 필요합니다.
explanation: |
  비밀번호를 자동으로 입력하는 브라우저 확장 프로그램은 사용자를 피싱 공격에 더 취약하게 만들 수 있습니다. 또한 공격 표면을 증가시키고 브라우저 성능을 저하시킬 수 있어 상당한 위험을 초래할 수 있습니다.
reviewed: true
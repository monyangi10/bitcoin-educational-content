question: Ni kuki bidakwiye gukoresha inyongera bushobozi zo muri mucukumbuzi mukwuzuza ijambo ry'ibanga?
answer: Bishobora gutuma uwubikoresha ashobora guterwa n’ibitero vy’ububeshi bidasanwe, bikongereza uburyo bwo guterwa, bigatuma mucukumbuzi igenda buke buke.
wrong_answers:
  - ziragoye gukoresha.
  - Ntizihuye n’ibikoresho vyose vyo gukoresha.
  - ziisaba ahantu henshi ho kubika.
explanation: |
  Inyongera bushobozi zo muri mucukumbuzi zihita zuzuza amajambo y’ibanga zishobora gutuma uwubikoresha ashobora guterwa n’ibitero vy’ububeshi bidasanwe, bikongereza uburyo bwo guterwa, bigatuma mucukumbuzi igenda buke buke.
reviewed: true

question: ब्राउज़र एक्सटेंशन्स का इस्तेमाल ऑटोमैटिक पासवर्ड भरने के लिए क्यों नहीं करना चाहिए?
answer: वे उपयोगकर्ता को फ़िशिंग हमलों के प्रति ज़्यादा संवेदनशील बना सकते हैं, हमले की संभावना बढ़ा सकते हैं, और ब्राउज़र के प्रदर्शन को धीमा कर सकते हैं।
wrong_answers:
  - वो इस्तेमाल करने में मुश्किल हैं।
  - वे सभी ब्राउज़रों के साथ संगत (कॉम्पैटिबल) नहीं हैं।
  - उन्हें बहुत ज़्यादा स्टोरेज स्पेस की ज़रूरत होती है।
explanation: |
  ऐसे ब्राउज़र एक्सटेंशन जो स्वचालित रूप से पासवर्ड भरते हैं,
  उपयोगकर्ता को फ़िशिंग हमलों के प्रति अधिक संवेदनशील बना सकते हैं।
  वे हमले की सतह को बढ़ा देते हैं और ब्राउज़र के प्रदर्शन को धीमा कर सकते हैं,
  जिससे यह एक महत्वपूर्ण जोखिम बन जाता है।
reviewed: true

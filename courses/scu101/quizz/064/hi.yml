question: ब्राउज़र एक्सटेंशन्स का इस्तेमाल ऑटोमैटिक पासवर्ड फिलिंग के लिए क्यों नहीं करना चाहिए?
answer: वे यूज़र को फ़िशिंग हमलों के प्रति ज़्यादा संवेदनशील बना सकते हैं, हमले की संभावना बढ़ा सकते हैं, और ब्राउज़र की परफॉर्मेंस को धीमा कर सकते हैं।
wrong_answers:
  - वो इस्तेमाल करने में मुश्किल हैं।
  - वे सभी ब्राउज़रों के साथ कॉम्पैटिबल नहीं हैं।
  - उन्हें बहुत ज़्यादा स्टोरेज स्पेस की ज़रूरत होती है।
explanation: |
  ब्राउज़र एक्सटेंशन जो अपने आप पासवर्ड भरते हैं, वे आपके लिए
  उपयोगकर्ता को फ़िशिंग हमलों के प्रति अधिक संवेदनशील बना देता है। वे भी
  हमले की सतह बढ़ा देते हैं और गति को धीमा कर सकते हैं
  ब्राउज़र का प्रदर्शन, जिससे एक बड़ा खतरा पैदा होता है।
reviewed: true
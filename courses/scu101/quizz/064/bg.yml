question: Защо не се препоръчва използването на разширения на браузъра за автоматично попълване на пароли?
answer: Те могат да направят потребителя по-уязвим към фишинг атаки, да увеличат повърхността за атаки и да забавят работата на браузъра.
wrong_answers:
  - Те са трудни за използване.
  - Те не са съвместими с всички браузъри.
  - Те изискват много място за съхранение.
explanation: |
  Разширенията на браузъра, които автоматично попълват пароли, могат да направят потребителя по-уязвим към фишинг атаки. Освен това те обикновено увеличават повърхността на атаките и могат да забавят работата на браузъра, като по този начин представляват значителен риск.
reviewed: true
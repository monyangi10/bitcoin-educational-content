question: เครือข่าย TOR คืออะไร?
answer: เครือข่ายที่ให้ความเป็นนิรนามโดยการปิดบังที่อยู่ IP ของผู้ใช้และอนุญาตให้เข้าถึง Darknet ได้
wrong_answers:
  - เครือข่ายที่ปกป้องอุปกรณ์ของคุณจากไวรัสและซอฟต์แวร์ที่เป็นอันตรายอื่น ๆ
  - เครือข่ายที่ซ่อนกิจกรรมออนไลน์ของคุณจากผู้ให้บริการอินเทอร์เน็ตของคุณ
  - เครือข่ายที่ช่วยให้คุณท่องอินเทอร์เน็ตได้เร็วขึ้น
explanation: |
  เครือข่าย TOR (The Onion Router) เป็นเครือข่ายที่ให้ความเป็นนิรนามโดยการปกปิดที่อยู่ IP ของผู้ใช้และอนุญาตให้เข้าถึง Darknet ได้ มันถูกใช้โดยนักข่าว นักเคลื่อนไหวเพื่อเสรีภาพ และบุคคลอื่นๆ ที่ต้องการหลีกเลี่ยงการเซ็นเซอร์ในประเทศที่มีการปกครองแบบเผด็จการ
reviewed: true
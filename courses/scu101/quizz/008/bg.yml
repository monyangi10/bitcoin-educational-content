question: Какво представлява мрежата TOR?
answer: Мрежа, която предлага анонимност чрез прикриване на IP адреса на потребителя и позволява достъп до Darknet.
wrong_answers:
  - Мрежа, която защитава устройството ви от вируси и друг зловреден софтуер.
  - Мрежа, която крие онлайн активността ви от вашия доставчик на интернет услуги.
  - Мрежа, която ви позволява да сърфирате в интернет по-бързо.
explanation: |
  Мрежата TOR (The Onion Router) е мрежа, която предлага
  анонимност, като прикрива IP адреса на потребителя и позволява
  достъп до Darknet. Тя се използва от журналисти, свобода
  и други, които искат да избегнат цензурата в
  авторитарните държави.
reviewed: true
question: TOR 네트워크란 무엇인가요?
answer: 사용자의 IP Address을 마스킹하고 다크넷에 대한 액세스를 허용하여 익명성을 제공하는 네트워크입니다.
wrong_answers:
  - 바이러스 및 기타 악성 소프트웨어로부터 디바이스를 보호하는 네트워크입니다.
  - 인터넷 서비스 제공업체로부터 사용자의 온라인 활동을 숨기는 네트워크입니다.
  - 인터넷을 더 빠르게 탐색할 수 있는 네트워크입니다.
explanation: |
  TOR(The Onion Router) 네트워크는 다음과 같은 기능을 제공하는 네트워크입니다
  익명성을 제공하고 사용자의 IP Address을 마스킹하여
  다크넷에 대한 액세스를 허용합니다. 언론인, 자유
  활동가 및 검열을 피하고자 하는 사람들이 사용합니다
  권위주의 국가에서 사용됩니다.
reviewed: true
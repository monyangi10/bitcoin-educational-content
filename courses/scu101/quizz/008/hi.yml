question: TOR नेटवर्क क्या है?
answer: एक ऐसा नेटवर्क जो उपयोगकर्ता के IP पते को छुपाकर गुमनामी प्रदान करता है और डार्कनेट तक पहुंच की अनुमति देता है।
wrong_answers:
  - एक ऐसा नेटवर्क जो आपके डिवाइस को वायरस और अन्य हानिकारक सॉफ़्टवेयर से बचाता है।
  - एक ऐसा नेटवर्क जो आपकी ऑनलाइन गतिविधि को आपके इंटरनेट सेवा प्रदाता से छुपाता है।
  - एक ऐसा नेटवर्क जो आपको इंटरनेट तेज़ी से ब्राउज़ करने की सुविधा देता है।
explanation: |
  TOR (द ऑनियन राउटर) नेटवर्क एक ऐसा नेटवर्क है जो उपयोगकर्ता के IP पते को छुपाकर गुमनामी प्रदान करता है और डार्कनेट तक पहुँच की अनुमति देता है। इसका उपयोग पत्रकारों, स्वतंत्रता कार्यकर्ताओं और अन्य लोगों द्वारा किया जाता है जो सत्तावादी देशों में सेंसरशिप से बचना चाहते हैं।
reviewed: true

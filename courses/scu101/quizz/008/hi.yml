question: TOR नेटवर्क क्या है?  

TOR (The Onion Router) एक ऐसा नेटवर्क है जो इंटरनेट पर आपकी पहचान और लोकेशन को छुपाने में मदद करता है। यह कई लेयर्स (प्याज की तरह) में एन्क्रिप्शन का इस्तेमाल करता है, जिससे आपका डेटा सुरक्षित रहता है और ट्रैक करना मुश्किल हो जाता है।  

इसका इस्तेमाल ज्यादातर गोपनीयता चाहने वाले लोग, पत्रकार, एक्टिविस्ट्स और कभी-कभी डार्क वेब तक पहुँचने के लिए किया जाता है। लेकिन ध्यान रखें, कुछ लोग इसका गलत इस्तेमाल भी करते हैं।
answer: एक नेटवर्क जो यूज़र के आईपी Address को छुपाकर और डार्कनेट तक पहुंच की अनुमति देकर गुमनामी प्रदान करता है।
wrong_answers:
  - एक नेटवर्क जो आपके डिवाइस को वायरस और दूसरे दुर्भावनापूर्ण सॉफ़्टवेयर से बचाता है।
  - एक ऐसा नेटवर्क जो आपकी ऑनलाइन गतिविधि को आपके इंटरनेट सेवा प्रदाता (ISP) से छुपाता है।
  - एक नेटवर्क जो आपको इंटरनेट तेज़ी से ब्राउज़ करने देता है।
explanation: |
  टीओआर (दी ओनियन राउटर) नेटवर्क एक ऐसा नेटवर्क है जो प्रदान करता है
  यूज़र के आईपी Address को मास्क करके और अनुमति देकर गुमनामी
  डार्कनेट तक पहुंच। यह पत्रकारों, आज़ादी के लिए लड़ने वालों
  एक्टिविस्ट्स, और दूसरे जो सेंसरशिप से बचना चाहते हैं
  तानाशाही देश।

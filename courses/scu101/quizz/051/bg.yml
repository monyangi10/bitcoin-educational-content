question: Кое е златното правило на киберсигурността?
answer: Киберсигурността е движеща се цел, която ще се адаптира към вашия път на обучение.
wrong_answers:
  - Киберсигурността е еднократна настройка
  - Киберсигурността не е необходима за личните акаунти
  - Киберсигурността е само за технически грамотни хора
explanation: |
  Киберсигурността е подвижна цел, защото заплахите и
  мерките за сигурност непрекъснато се развиват. Важно е
  да продължите да се учите и да адаптирате практиките си.
reviewed: true
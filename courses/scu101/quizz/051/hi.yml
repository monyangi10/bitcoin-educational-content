question: साइबर सुरक्षा का सुनहरा नियम क्या है?
answer: साइबर सुरक्षा एक चलता-फिरता निशाना है जो आपकी सीखने की यात्रा के साथ खुद को ढाल लेगा।
wrong_answers:
  - साइबर सुरक्षा एक बार की सेटअप है
  - साइबर सुरक्षा व्यक्तिगत खातों के लिए जरूरी नहीं है
  - साइबर सुरक्षा सिर्फ़ टेक-सेवी लोगों के लिए है
explanation: |
  साइबर सुरक्षा एक चलती-फिरती निशाना है क्योंकि खतरे और...
  सुरक्षा के उपाय लगातार बदल रहे हैं। यह ज़रूरी है।
  सीखते रहना और अपने तरीकों को ढालते रहना।
reviewed: true
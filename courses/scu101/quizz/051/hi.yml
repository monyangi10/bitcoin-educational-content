question: साइबर सुरक्षा का सुनहरा नियम क्या है?
answer: साइबर सुरक्षा एक गतिशील लक्ष्य है जो आपकी सीखने की यात्रा के अनुसार अनुकूलित होती है।
wrong_answers:
  - साइबर सुरक्षा एक बार की सेटअप है।
  - साइबर सुरक्षा व्यक्तिगत खातों के लिए जरूरी नहीं है।
  - साइबर सुरक्षा सिर्फ़ तकनीकी रूप से सक्षम लोगों के लिए है।
explanation: |
  साइबर सुरक्षा एक गतिशील लक्ष्य है क्योंकि खतरे और
  सुरक्षा उपाय लगातार विकसित होते रहते हैं।
  अपनी सुरक्षा प्रथाओं को सीखना और उनके अनुसार स्वयं को अनुकूलित करना महत्वपूर्ण है।
reviewed: true

question: Siber güvenliğin altın kuralı nedir?
answer: Siber güvenlik, öğrenme yolculuğunuza uyum sağlayacak hareketli bir hedeftir.
wrong_answers:
  - Siber güvenlik tek seferlik bir kurulumdur
  - Kişisel hesaplar için siber güvenlik gerekli değildir
  - Siber güvenlik yalnızca teknoloji meraklıları içindir
explanation: |
  Siber güvenlik hareketli bir hedeftir çünkü tehditler ve
  güvenlik önlemleri sürekli olarak gelişmektedir. Sürekli
  öğrenmeye ve uygulamalarınızı uyarlamaya devam etmek önemlidir.
reviewed: true

question: 브라우저에 설치된 확장 프로그램 수를 제한하는 것이 권장되는 이유는 무엇인가요?
answer: 잠재적인 보안 및 성능 문제를 방지합니다.
wrong_answers:
  - 디바이스의 저장 공간을 절약하려면
  - 브라우저 충돌을 방지합니다.
  - 타사 사이트의 추적을 피하기 위해.
explanation: |
  브라우저 확장 프로그램은 유용한 기능을 제공하기도 하지만
  기능을 제공하기도 하지만, 보안 위험을 초래할 수도 있습니다
  데이터와 검색 활동에 액세스할 수 있기 때문입니다. 또한
  확장 프로그램이 너무 많으면 브라우저 속도가 느려지고
  성능에 영향을 줄 수 있습니다.
reviewed: true
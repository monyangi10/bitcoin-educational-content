question: ब्राउज़र में बहुत सारे एक्सटेंशन इंस्टॉल करने से क्यों मना किया जाता है?
answer: सुरक्षा और परफॉरमेंस की संभावित समस्याओं से बचने के लिए।
wrong_answers:
  - आपके डिवाइस पर स्टोरेज स्पेस बचाने के लिए।
  - ब्राउज़र को क्रैश होने से बचाने के लिए।
  - तीसरे पार्टी साइट्स द्वारा ट्रैक किए जाने से बचने के लिए।
explanation: |
  ब्राउज़र एक्सटेंशन काम के तो हो सकते हैं, लेकिन...
  फंक्शनैलिटीज़ के अलावा, ये सुरक्षा जोखिम भी पैदा कर सकते हैं क्योंकि वे...
  आपके डेटा और ब्राउज़िंग एक्टिविटी तक पहुँच सकते हैं। इसके अलावा,
  बहुत सारे एक्सटेंशन होने से आपका ब्राउज़र धीमा हो सकता है और...
  इसका प्रदर्शन प्रभावित करेगा।
reviewed: true
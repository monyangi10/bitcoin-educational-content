question: आपके ब्राउज़र पर इंस्टॉल किए गए एक्सटेंशन की संख्या को सीमित करने की सलाह क्यों दी जाती है?
answer: संभावित सुरक्षा और प्रदर्शन (परफॉरमेंस) से संबंधित समस्याओं से बचने के लिए।
wrong_answers:
  - आपके डिवाइस पर स्टोरेज स्पेस बचाने के लिए।
  - ब्राउज़र को क्रैश होने से रोकने के लिए।
  - तृतीय-पक्ष साइट्स द्वारा ट्रैक किए जाने से बचने के लिए।
explanation: |
  ब्राउज़र एक्सटेंशन उपयोगी सुविधाएँ प्रदान कर सकते हैं, लेकिन
  वे सुरक्षा जोखिम भी पैदा कर सकते हैं क्योंकि वे
  आपके डेटा और ब्राउज़िंग एक्टिविटी तक पहुँच सकते हैं।
  इसके अलावा, बहुत सारे एक्सटेंशन होने से आपका ब्राउज़र धीमा हो सकता है और
  इसके प्रदर्शन पर असर पड़ सकता है।
reviewed: true

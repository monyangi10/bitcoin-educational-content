question: Защо е препоръчително да ограничите броя на инсталираните в браузъра разширения?
answer: За да избегнете потенциални проблеми със сигурността и производителността.
wrong_answers:
  - За да спестите място за съхранение в устройството си.
  - За да предотвратите срив на браузъра.
  - За да избегнете проследяване от сайтове на трети страни.
explanation: |
  Въпреки че разширенията на браузъра могат да предоставят полезни
  функционалности, те могат да представляват и риск за сигурността, тъй като
  могат да получат достъп до вашите данни и дейност при сърфиране. Освен това,
  наличието на твърде много разширения може да забави браузъра ви и да
  да повлияе на неговата производителност.
reviewed: true
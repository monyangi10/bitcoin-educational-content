question: ทำไมจึงแนะนำให้จำกัดจำนวนส่วนขยายที่ติดตั้งบนเบราว์เซอร์ของคุณ?
answer: เพื่อหลีกเลี่ยงปัญหาด้านความปลอดภัยและประสิทธิภาพที่อาจเกิดขึ้น
wrong_answers:
  - เพื่อประหยัดพื้นที่จัดเก็บบนอุปกรณ์ของคุณ
  - เพื่อป้องกันไม่ให้เบราว์เซอร์หยุดทำงาน
  - เพื่อหลีกเลี่ยงการถูกติดตามโดยเว็บไซต์ของบุคคลที่สาม
explanation: |
  ในขณะที่ส่วนขยายของเบราว์เซอร์สามารถให้ฟังก์ชันการทำงานที่มีประโยชน์ได้ แต่ก็อาจก่อให้เกิดความเสี่ยงด้านความปลอดภัยได้เช่นกัน เนื่องจากสามารถเข้าถึงข้อมูลและกิจกรรมการท่องเว็บของคุณได้ นอกจากนี้ การมีส่วนขยายมากเกินไปอาจทำให้เบราว์เซอร์ของคุณช้าลงและส่งผลต่อประสิทธิภาพการทำงานของมัน
reviewed: true
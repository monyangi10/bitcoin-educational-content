question: 집에서 인터넷을 브라우징할 때 VPN을 사용하면 어떤 이점이 있나요?
answer: 제3자의 위협을 줄여 온라인 트래픽의 보안을 강화합니다.
wrong_answers:
  - 인터넷 연결 속도를 높일 수 있습니다.
  - 항상 더 많은 웹사이트에 액세스할 수 있습니다.
  - VPN 연결이 없는 경우에 비해 모바일 데이터 소비를 절약할 수 있습니다.
explanation: |
  가정에서 VPN을 사용하면 온라인에서 Exchange하는 데이터의 보안을 강화할 수 있습니다. VPN은 데이터를 암호화하여 제3자가 가로채기 어렵게 만듭니다.
reviewed: true
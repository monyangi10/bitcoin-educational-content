question: Кое от следните е добър и сигурен метод за удостоверяване с 2FA?
answer: Код, генериран от приложение като Google Authenticator или Authy.
wrong_answers:
  - Телефонно обаждане или SMS код до титуляря на сметката
  - Имейл с 10-минутен код за изтичане на срока на валидност до притежателя на акаунта
  - Писмо, изпратено на домашния адрес на титуляря на сметката
explanation: |
  Втората стъпка при 2FA може да бъде временен код, изпратен чрез SMS, имейл, код, генериран от приложение, или физически ключ за сигурност. Не всички тези методи обаче ни позволяват да запазим същото ниво на сигурност.
reviewed: true
question: 다음 중 2단계 인증에서 안전하고 좋은 방법은 무엇인가요?
answer: Google 인증기 또는 Authy와 같은 애플리케이션에서 생성한 코드입니다.
wrong_answers:
  - 계정 소유자에게 전화 또는 SMS 코드 전송
  - 계정 소유자에게 10분 만료 코드가 포함된 이메일이 전송됩니다
  - 계정 소유자의 집으로 보낸 편지 Address
explanation: |
  2단계 인증은 SMS, 이메일, 애플리케이션에서 생성한 코드 또는 물리적 보안 키를 통해 전송되는 임시 코드를 사용할 수 있습니다. 하지만 이러한 모든 방법이 동일한 보안 수준을 유지할 수 있는 것은 아닙니다.
reviewed: true
question: วิธีใดต่อไปนี้เป็นวิธีที่ดีและปลอดภัยใน 2FA authentication?
answer: รหัสที่สร้างโดยแอปพลิเคชันเช่น Google Authenticator หรือ Authy.
wrong_answers:
  - การโทรศัพท์หรือรหัส SMS ถึงผู้ถือบัญชี
  - อีเมลที่มีรหัสหมดอายุใน 10 นาทีภายในสำหรับผู้ถือบัญชี
  - จดหมายที่ส่งไปยังที่อยู่บ้านของผู้ถือบัญชี
explanation: |
  ขั้นตอนที่สองใน 2FA อาจเป็นรหัสชั่วคราวที่ส่งผ่าน SMS, อีเมล, รหัสที่สร้างโดยแอปพลิเคชัน หรือกุญแจความปลอดภัยทางกายภาพ อย่างไรก็ตาม ไม่ใช่วิธีการทั้งหมดเหล่านี้ที่ช่วยให้เรารักษาระดับความปลอดภัยในระดับเดียวกันได้
reviewed: true
question: निम्नलिखित में से 2FA प्रमाणीकरण में कौन सा तरीका अच्छा और सुरक्षित है?
answer: गूगल ऑथेंटिकेटर या ऑथी जैसे ऐप द्वारा जनरेट किया गया कोड।
wrong_answers:
  - खाताधारक को एक फोन कॉल या एसएमएस कोड
  - खाताधारक को एक ईमेल जिसमें 10 मिनट में समाप्त होने वाला कोड होगा
  - खाताधारक के घर भेजा गया पत्र Address
explanation: |
  2FA का दूसरा चरण एक अस्थायी कोड हो सकता है जो भेजा जाता है
  एसएमएस, ईमेल, एप्लिकेशन द्वारा जनरेट किया गया कोड, या एक
  फिजिकल सिक्योरिटी की। हालांकि, यह तरीका पूरी तरह से...
  हमें उसी स्तर की सुरक्षा बनाए रखने दें।
reviewed: true
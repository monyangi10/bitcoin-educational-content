question: निम्नलिखित में से 2FA प्रमाणीकरण में कौन सा तरीका अच्छा और सुरक्षित है?
answer: गूगल ऑथेंटिकेटर या ऑथी जैसे एप्लिकेशन द्वारा जनरेट किया गया कोड।
wrong_answers:
  - खाते के धारक को एक फोन कॉल या एसएमएस कोड
  - खाते के धारक को एक ईमेल जिसमें 10 मिनट में समाप्त होने वाला कोड होगा
  - खाते के धारक के घर के पते पर पत्र भेजना
explanation: |
  2FA का दूसरा चरण अस्थायी कोड के रूप में एसएमएस, ईमेल, एप्लिकेशन
  द्वारा उत्पन्न कोड या भौतिक सुरक्षा कुंजी हो सकता है। 
  हालांकि, इन सभी तरीकों में एक समान 
  सुरक्षा स्तर बनाए रखना संभव नहीं होता।
reviewed: true

question: Кой е основният критерий при създаването на нов имейл акаунт?
answer: Използвайте уникална и силна парола.
wrong_answers:
  - Използвайте повторно паролата от други акаунти.
  - Изберете проста парола за лесно запомняне.
  - Изберете парола с името на вашия домашен любимец.
explanation: |
  Уникалната и силна парола е от съществено значение, за да се предотврати достъпът на хакери до имейл акаунта.
reviewed: true
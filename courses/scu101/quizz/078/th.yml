question: เกณฑ์พื้นฐานเมื่อสร้างบัญชีอีเมลใหม่คืออะไร?
answer: ใช้รหัสผ่านที่ไม่ซ้ำและแข็งแกร่ง
wrong_answers:
  - ใช้รหัสผ่านจากบัญชีอื่นซ้ำ
  - เลือกใช้รหัสผ่านที่ง่ายต่อการจดจำ
  - เลือกใช้รหัสผ่านที่มีชื่อสัตว์เลี้ยงของคุณ
explanation: |
  รหัสผ่านที่ไม่ซ้ำและแข็งแกร่งเป็นสิ่งสำคัญในการป้องกันไม่ให้แฮกเกอร์เข้าถึงบัญชีอีเมล
reviewed: true
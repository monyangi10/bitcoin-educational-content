question: Yeni bir e-posta hesabı oluştururken temel kriter nedir?
answer: Benzersiz ve güçlü bir parola kullanın. 
wrong_answers:
  - Diğer hesaplardaki parolayı tekrar kullanın.
  - Kolay ezberlemek için basit bir şifre seçin.
  - Evcil hayvanınızın adını içeren bir şifre seçin.
explanation: |
  Bilgisayar korsanlarının e-posta hesabına erişmesini önlemek için benzersiz ve güçlü bir parola gereklidir.
reviewed: true

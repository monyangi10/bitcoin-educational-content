question: एक नया ईमेल खाता बनाते समय एक बुनियादी मापदंड क्या है?
answer: एक अनोखा और मजबूत पासवर्ड इस्तेमाल करें।
wrong_answers:
  - अन्य खातों का पासवर्ड दोबारा इस्तेमाल करें।
  - आसानी से याद रखने के लिए एक सरल पासवर्ड चुनें।
  - अपने पालतू जानवर के नाम वाला एक पासवर्ड चुनें।
explanation: |
  एक अनोखा और मजबूत पासवर्ड आवश्यक है ताकि हैकर्स ईमेल खाते तक पहुँच न प्राप्त कर सकें।
reviewed: true

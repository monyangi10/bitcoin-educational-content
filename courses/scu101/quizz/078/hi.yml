question: एक नया ईमेल अकाउंट बनाते समय एक बुनियादी मापदंड क्या है?
answer: एक अनोखा और मजबूत पासवर्ड इस्तेमाल करें।
wrong_answers:
  - दूसरे अकाउंट्स का पासवर्ड दोबारा इस्तेमाल करें।
  - आसानी से याद रखने के लिए एक सरल पासवर्ड चुनें।
  - अपने पालतू जानवर के नाम से एक पासवर्ड चुनें।
explanation: |
  एक अनोखा और मजबूत पासवर्ड ईमेल अकाउंट को हैकर्स से बचाने के लिए बहुत जरूरी है।
reviewed: false
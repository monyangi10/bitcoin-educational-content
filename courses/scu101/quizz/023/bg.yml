question: Какво е значението на използването на силна парола за компютърна сигурност?
answer: За да предотвратите неоторизиран достъп до системата.
wrong_answers:
  - За да ускорите работата на системата.
  - За да увеличите капацитета за съхранение.
  - Подобряване на потребителския интерфейс.
explanation: |
  Силната парола е от решаващо значение за компютърната сигурност
  предотвратява неоторизиран достъп до системата.
reviewed: true
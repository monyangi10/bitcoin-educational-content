question: ความสำคัญของการใช้รหัสผ่านที่แข็งแกร่งสำหรับความปลอดภัยของคอมพิวเตอร์คืออะไร?
answer: เพื่อป้องกันการเข้าถึงระบบโดยไม่ได้รับอนุญาต
wrong_answers:
  - เพื่อให้ระบบทำงานได้เร็วขึ้น
  - เพื่อเพิ่มความจุในการจัดเก็บข้อมูล
  - เพื่อปรับปรุงส่วนติดต่อผู้ใช้
explanation: |
  รหัสผ่านที่แข็งแกร่งมีความสำคัญอย่างยิ่งต่อความปลอดภัยของคอมพิวเตอร์เพื่อป้องกันการเข้าถึงระบบโดยไม่ได้รับอนุญาต
reviewed: true
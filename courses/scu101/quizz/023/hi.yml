question: कंप्यूटर सुरक्षा के लिए मजबूत पासवर्ड का उपयोग करना क्यों जरूरी है?
answer: सिस्टम में अनधिकृत पहुंच को रोकने के लिए।
wrong_answers:
  - सिस्टम को तेज़ चलाने के लिए।
  - स्टोरेज क्षमता बढ़ाने के लिए।
  - यूजर Interface को बेहतर बनाने के लिए।
explanation: |
  एक मजबूत पासवर्ड कंप्यूटर सुरक्षा के लिए बहुत जरूरी है ताकि...
  सिस्टम में अनधिकृत पहुंच को रोकें।
reviewed: true
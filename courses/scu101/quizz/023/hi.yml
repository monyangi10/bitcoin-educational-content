question: कंप्यूटर सुरक्षा के लिए मजबूत पासवर्ड का उपयोग करना क्यों जरूरी है?
answer: सिस्टम तक अनधिकृत पहुंच को रोकने के लिए।
wrong_answers:
  - सिस्टम को तेज़ी से चलाने के लिए।
  - स्टोरेज क्षमता बढ़ाने के लिए।
  - उपयोगकर्ता (यूजर) इंटरफ़ेस को बेहतर बनाने के लिए।
explanation: |
  सिस्टम तक अनधिकृत पहुँच को रोकने के लिए कंप्यूटर सुरक्षा में मज़बूत पासवर्ड
  अत्यंत आवश्यक होता है।
reviewed: true

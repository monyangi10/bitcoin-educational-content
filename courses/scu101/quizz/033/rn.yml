question: Ni igiki gishobora kuba kibi mu kurema ububiko bw’inyongera mu gicu(cloud) ukoresheje serivisi nka ProtonMail Drive, Sync, canke Google Drive?
answer: Amakuru yawe ari kuri internet cane kandi ari mu maboko y'uwundi muntu wahaye icizire.
wrong_answers:
  - Izo serivisi zishobora kuba zitari izo kwizigirwa mu gucungera amakuru.
  - Izo serivisi rimwe na rimwe zitakaza amakuru y’abazikoresha, kandi kuyarungika ku wundi atanga serivisi za cloud birashobora kugora.
  - Izo serivisi akenshi ntizitanga umwanya uhagije wo kubika kandi zishikirwa nibibazo vy’umuvuduko mukeyi.
explanation: |
  Naho serivisi zububiko bw'amakuru za cloud zitanga uburyo bworoshe bwo gukora ububiko bwinyongera
  bw'amakuru yawe, bisigura  cane kandi ari mu maboko y'uwundi muntu wahaye icizire.
  Ibi bishobora gutuma amakuru yawe ashobora gushikirirwa n'akaga.
reviewed: true

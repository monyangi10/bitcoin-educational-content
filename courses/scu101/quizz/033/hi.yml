question: क्लाउड बैकअप सर्विसेज जैसे ProtonMail Drive, Sync, या Google Drive का इस्तेमाल करने के कुछ संभावित नुकसान क्या हैं?
answer: आपका डेटा इंटरनेट पर हो सकता है और एक भरोसेमंद तीसरे पक्ष के पास है।
wrong_answers:
  - ये सेवाएँ डेटा बैकअप के लिए भरोसेमंद नहीं हो सकतीं।
  - ये सेवाएं कभी-कभी यूज़र डेटा खो देती हैं और इसे किसी दूसरे क्लाउड प्रोवाइडर पर ट्रांसफर करना मुश्किल हो सकता है।
  - ये सेवाएं आमतौर पर पर्याप्त स्टोरेज स्पेस नहीं देती हैं और कनेक्शन की स्पीड भी काफी धीमी होती है।
explanation: |
  जबकि क्लाउड बैकअप सेवाएँ एक सुविधाजनक तरीका प्रदान करती हैं
  अपना डेटा बैकअप करो, इसका मतलब यह भी है कि आपका डेटा
  इंटरनेट पर संभावित रूप से और एक भरोसेमंद तीसरे पक्ष के पास
  पार्टी। इससे आपका डेटा खुल सकता है
  अतिरिक्त जोखिम।
reviewed: true
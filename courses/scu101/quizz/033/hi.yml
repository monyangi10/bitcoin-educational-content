question: क्लाउड बैकअप सर्विसेज जैसे ProtonMail Drive, Sync, या Google Drive का इस्तेमाल करने के कुछ संभावित नुकसान क्या हैं?
answer: आपका डेटा संभावित रूप से इंटरनेट पर हो सकता है और एक विश्वसनीय तृतीय पक्ष के पास संग्रहीत होता है।
wrong_answers:
  - ये सेवाएँ डेटा बैकअप के लिए संभवतः विश्वसनीय नहीं हैं।
  - ये सेवाएं कभी-कभी यूज़र डेटा खो देती हैं और इसे किसी दूसरे क्लाउड प्रदाता पर स्थानांतरित (ट्रांसफर) करना मुश्किल हो सकता है।
  - ये सेवाएं आमतौर पर पर्याप्त स्टोरेज स्पेस प्रदान नहीं करतीं हैं और कनेक्शन की गति भी काफी धीमी होती है।
explanation: |
  जबकि क्लाउड बैकअप सेवाएँ आपके डेटा का बैकअप एक सुविधाजनक तरीका प्रदान करती हैं,
  इसका मतलब यह भी है कि आपका डेटा संभावित रूप से
  इंटरनेट पर होता है और एक विश्वसनीय तृतीय पक्ष के पास होता है।
  यह आपके डेटा को अतिरिक्त जोखिमों
  के लिए उजागर कर सकता है।
reviewed: true

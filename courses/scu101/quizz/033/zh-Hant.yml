question: 使用 ProtonMail Drive、Sync 或 Google Drive 等服務建立雲端備份的潛在缺點是什麼？
answer: 您的資料可能存在於網際網路上，並由可信賴的第三方保管。
wrong_answers:
  - 這些服務對於資料備份可能並不可靠。
  - 這些服務有時會遺失使用者資料，而且很難將資料轉移到其他雲端服務供應商。
  - 這些服務通常無法提供足夠的儲存空間，而且連線速度低。
explanation: |
  雖然雲端備份服務提供方便的方式
  備份您的資料，也代表您的資料是
  可能在網際網路上，並由可信賴的第三方持有
  方。這可能會將您的資料暴露於
  額外風險。
reviewed: true
question: Какви са потенциалните недостатъци на създаването на резервно копие в облака с помощта на услуги като ProtonMail Drive, Sync или Google Drive?
answer: Вашите данни са потенциално достъпни в интернет и се съхраняват от доверена трета страна.
wrong_answers:
  - Тези услуги са потенциално ненадеждни за архивиране на данни.
  - Тези услуги понякога губят потребителски данни и прехвърлянето им към друг доставчик на облачни услуги може да бъде трудно.
  - Тези услуги обикновено не предоставят достатъчно място за съхранение и страдат от ниска скорост на връзката.
explanation: |
  Въпреки че услугите за архивиране в облак предоставят удобен начин за
  архивиране на данни, те също така означават, че данните ви са
  потенциално в интернет и се съхраняват от доверена трета страна
  страна. Това може да изложи данните ви на
  допълнителни рискове.
reviewed: true
question: ProtonMail Drive, Sync veya Google Drive gibi hizmetleri kullanarak bir bulut yedeklemesi oluşturmanın potansiyel dezavantajı nedir?
answer: Verileriniz potansiyel olarak internet üzerindedir ve güvenilir bir üçüncü tarafça tutulmaktadır.
wrong_answers:
  - Bu hizmetler potansiyel olarak veri yedekleme için güvenilir değildir.
  - Bu hizmetler bazen kullanıcı verilerini kaybeder ve başka bir bulut sağlayıcısına aktarmak zor olabilir.
  - Bu hizmetler genellikle yeterli depolama alanı sağlamaz ve düşük bağlantı hızından muzdariptir.
explanation: |
  Bulut yedekleme hizmetleri aşağıdakiler için uygun bir yol sağlarken
  verilerinizi yedeklemek, aynı zamanda verilerinizin
  potansiyel olarak internette bulunan ve güvenilir bir üçüncü şahıs tarafından tutulan
  parti. Bu, verilerinizi potansiyel olarak aşağıdakilere maruz bırakabilir
  ek riskler.
reviewed: true
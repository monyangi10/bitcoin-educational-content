question: रैंसमवेयर या किसी भी तरह के हमले में हैकर्स को पैसा क्यों नहीं देना चाहिए?
answer: रैनसम (फिरौती) चुकाने से आपके डेटा की वापसी की गारंटी नहीं मिलती और यह साइबर अपराधियों को उनकी दुर्भावनापूर्ण गतिविधियों को जारी रखने के लिए प्रोत्साहित कर सकता है।
wrong_answers:
  - रैंसम (फिरौती) देना गैरकानूनी है और साइबर अपराधियों को उनकी दुर्भावनापूर्ण गतिविधियाँ जारी रखने के लिए प्रोत्साहित कर सकता है।
  - फिरौती का भुगतान आपके डेटा की वसूली की गारंटी नहीं देता है, लेकिन यह हैकर्स को अन्य पीड़ितों पर हमला करने के लिए प्रोत्साहित कर सकता है।
  - रैनसम चुकाने से साइबर अपराधियों को उनकी बुरी गतिविधियाँ जारी रखने का प्रोत्साहन मिलता है, क्योंकि भुगतान का तरीका आमतौर पर पता नहीं लगाया जा सकता।
explanation: |
  रैंसम चुकाने से यह गारंटी नहीं मिलती कि आपको अपना...
  डेटा वापस मिल जाएगा। इसके अलावा, यह साइबर अपराधियों को प्रोत्साहित करता है
  वो अपनी बुरी हरकतें जारी रखते हैं क्योंकि उन्हें लगता है कि यह एक...
  फायदेमंद धंधा।

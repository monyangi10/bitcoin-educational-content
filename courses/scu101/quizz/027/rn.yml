question: Ni imvo nyamukuru iyihe ituma umuntu adashobora kwishura abasuma kubera ransomware canke ibindi bitero?
answer: Kwishura incungu ntibituma amakuru yawe azosubira kuronka kandi birashobora gutuma abagizi ba nabi bo kuri Internet babandanya ibikorwa vyabo bibi.
wrong_answers:
  - Kwishura iyo ncungu ni ikintu kitemewe n’amategeko kandi birashobora gutuma abagizi ba nabi bo kuri Internet babandanya ibikorwa vyabo vy’ububisha.
  - Kwishura incungu ntivyemeza ko amakuru yawe azosubira kuronka ariko birashobora gutuma abasuma batera abandi bantu.
  - Kwishura incungu birashobora gutuma abakora ivy’ubugizi bwa nabi bo kuri Internet babandanya ibikorwa vyabo vy’ububisha kubera ko uburyo bwo kwishura akenshi butashobora gukurikirana.
explanation: |
  Kwishura incungu ntivyemeza ko uzosubira kuronka amakuru yawe. Ikindi kandi, riremesha abagizi ba nabi bo kuri Internet kubandanya ibikorwa vyabo vy’ububisha kuko babona ko ari igikorwa kizana inyungu.
reviewed: true
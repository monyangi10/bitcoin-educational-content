question: Apa alasan utama untuk tidak membayar peretas untuk ransomware atau serangan lainnya?
answer: Membayar tebusan tidak menjamin pemulihan data Anda dan dapat mendorong penjahat siber untuk melanjutkan aktivitas jahat mereka.
wrong_answers:
  - Membayar tebusan adalah ilegal dan dapat mendorong penjahat siber untuk melanjutkan aktivitas jahat mereka.
  - Membayar tebusan tidak menjamin pemulihan data Anda tetapi dapat mendorong peretas untuk menyerang korban lain.
  - Membayar tebusan dapat mendorong penjahat siber untuk melanjutkan aktivitas jahat mereka karena metode pembayaran biasanya tidak dapat dilacak.
explanation: |
  Membayar tebusan tidak menjamin bahwa Anda akan mendapatkan data Anda kembali. Selain itu, ini mendorong penjahat siber untuk melanjutkan aktivitas jahat mereka karena mereka melihatnya sebagai usaha yang menguntungkan.
reviewed: true

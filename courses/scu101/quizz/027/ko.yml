question: 랜섬웨어나 기타 공격에 대해 해커에게 돈을 지불하지 않는 주된 이유는 무엇인가요?
answer: 몸값을 지불한다고 해서 데이터 복구가 보장되는 것은 아니며 사이버 범죄자들이 악의적인 활동을 계속하도록 부추길 수 있습니다.
wrong_answers:
  - 몸값을 지불하는 것은 불법이며 사이버 범죄자들이 악의적인 활동을 계속하도록 조장할 수 있습니다.
  - 몸값을 지불한다고 해서 데이터 복구가 보장되는 것은 아니며 해커가 다른 피해자를 공격하도록 부추길 수 있습니다.
  - 몸값을 지불하면 일반적으로 지불 방법을 추적할 수 없기 때문에 사이버 범죄자가 악의적인 활동을 계속하도록 부추길 수 있습니다.
explanation: |
  몸값을 지불한다고 해서 데이터를 되찾을 수 있다는 보장은 없습니다. 게다가 사이버 범죄자들은 이를 수익성 있는 사업으로 여기기 때문에 악의적인 활동을 계속하도록 부추깁니다.
reviewed: true
question: Mis on peamine põhjus, miks häkkeritele lunaraha või muude rünnakute korral ei maksta?
answer: Lunaraha maksmine ei garanteeri teie andmete taastamist ja võib julgustada küberkurjategijaid oma pahatahtlikke tegevusi jätkama.
wrong_answers:
  - Häkkeritele maksmine on ebaseaduslik ja võib julgustada küberkurjategijaid oma pahatahtlikke tegevusi jätkama.
  - Lunaraha maksmine ei garanteeri teie andmete taastamist, kuid võib julgustada häkkereid ründama teisi ohvreid.
  - Lunaraha maksmine võib julgustada küberkurjategijaid oma pahatahtlikke tegevusi jätkama, kuna makseviis on tavaliselt jälitamatu.
explanation: |
  Lunaraha maksmine ei garanteeri, et saate oma andmed tagasi. Lisaks julgustab see küberkurjategijaid oma pahatahtlikke tegevusi jätkama, kuna nad näevad seda kasumliku ettevõtmisena.
reviewed: true

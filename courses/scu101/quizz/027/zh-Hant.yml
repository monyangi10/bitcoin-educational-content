question: 在勒索軟體或其他類型的攻擊中，不向駭客付款的主要原因是什麼？
answer: 支付贖金並不能保證復原您的資料，而且會鼓勵網路罪犯繼續進行惡意活動。
wrong_answers:
  - 支付贖金是非法的，而且會鼓勵網路罪犯繼續進行惡意活動。
  - 支付贖金並不能保證資料的復原，而且會鼓勵駭客在首次付款後索要更多的金錢。
  - 支付贖金會鼓勵網路罪犯繼續進行惡意活動，因為付款方式通常無法追蹤。
explanation: |
  支付贖金並不能保證您會得到您的
  回資料。此外，它會鼓勵網路罪犯
  繼續他們的惡意活動，因為他們認為這是
  有利可圖的創業。
reviewed: true
question: Linux และ Mac มักจะต้องการแอนตี้ไวรัสหรือไม่?
answer: นี่เป็นเท็จ
wrong_answers:
  - นี่คือความจริง
  - มีเพียง Linux เท่านั้นที่ต้องการแอนตี้ไวรัส
  - เฉพาะ Mac เท่านั้นที่ต้องการโปรแกรมป้องกันไวรัส
explanation: |
  Linux และ Mac เนื่องจากระบบการแยกสิทธิ์ของผู้ใช้ มักไม่จำเป็นต้องมีแอนตี้ไวรัส
reviewed: true
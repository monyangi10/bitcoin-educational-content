question: क्या लिनक्स और मैक को अक्सर एंटीवायरस की ज़रूरत पड़ती है?
answer: ये झूठ है
wrong_answers:
  - यह सच है
  - केवल Linux को ही एंटीवायरस की ज़रूरत होती है।
  - केवल Mac को ही एंटीवायरस की ज़रूरत होती है।
explanation: |
  लिनक्स और मैक, उनके यूज़र राइट्स सेपरेशन की वजह से
  सिस्टम, अक्सर एंटीवायरस की जरूरत नहीं होती।
reviewed: true
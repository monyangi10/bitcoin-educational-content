question: क्या लिनक्स और मैक को अक्सर एंटीवायरस की ज़रूरत पड़ती है?
answer: यह गलत है
wrong_answers:
  - यह सही है
  - केवल लिनक्स को एंटीवायरस की ज़रूरत होती है।
  - केवल मैक को एंटीवायरस की ज़रूरत होती है।
explanation: |
  यूज़र राइट्स सेपरेशन की वजह से लिनक्स और मैक को,
  अक्सर एंटीवायरस की जरूरत नहीं होती।
reviewed: true

question: Нуждаят ли се Linux и Mac често от антивирусна програма?
answer: Това е невярно
wrong_answers:
  - Това е вярно
  - Само Linux се нуждае от антивирусна програма.
  - Само Mac се нуждае от антивирусна програма.
explanation: |
  Linux и Mac, благодарение на разделението на потребителските права
  често не се нуждаят от антивирусна програма.
reviewed: true
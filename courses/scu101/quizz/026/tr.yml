question: Linux ve Mac genellikle antivirüse ihtiyaç duyar mı?
answer: Bu yanlış
wrong_answers:
  - Bu doğru
  - Sadece Linux'un antivirüse ihtiyacı vardır.
  - Sadece Mac'in antivirüse ihtiyacı vardır.
explanation: |
  Linux ve Mac, kullanıcı hakları ayrımı sayesinde
  sistemi, genellikle antivirüse ihtiyaç duymaz.
reviewed: true
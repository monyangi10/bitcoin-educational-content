question: Linux ve Mac genellikle antivirüse ihtiyaç duyar mı?
answer: Hayır.
wrong_answers:
  - Evet.
  - Sadece Linux'un antivirüse ihtiyacı vardır.
  - Sadece Mac'in antivirüse ihtiyacı vardır.
explanation: |
  Linux ve Mac, kullanıcı hakları ayrımı sistemi sayesinde, genellikle antivirüse ihtiyaç duymaz.
reviewed: true

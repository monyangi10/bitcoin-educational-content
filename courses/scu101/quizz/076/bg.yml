question: Защо се препоръчва използването на произволно генерирани пароли?
answer: За да се противопоставите на атаките с груба сила.
wrong_answers:
  - За да ги запомните по-лесно.
  - За да се намали тяхната сложност.
  - За да се противопоставите на атаките на Sybil.
explanation: |
  Случайността затруднява отгатването на паролите чрез проби и грешки, като по този начин повишава сигурността им срещу атаки с груба сила.
reviewed: true
question: यादृच्छिक (रैंडम) जनरेट किए गए पासवर्ड का उपयोग करने की सलाह क्यों दी जाती है?
answer: ब्रूट-फोर्स हमलों से बचने के लिए।
wrong_answers:
  - उन्हें याद रखने में आसान बनाने के लिए।
  - उनकी जटिलता को कम करने के लिए।
  - सिबिल अटैक का विरोध करने के लिए।
explanation: |
  बेतरतीबी (randomness) पासवर्ड को ट्रायल और एरर से अनुमान लगाने में मुश्किल बनाती है, जिससे ब्रूट-फोर्स अटैक के खिलाफ उनकी सुरक्षा मजबूत होती है।
reviewed: false
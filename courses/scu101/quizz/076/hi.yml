question: यादृच्छिक (रैंडम) रूप से जनरेट किए गए पासवर्ड का उपयोग करने की सलाह क्यों दी जाती है?
answer: ब्रूट-फोर्स हमलों से बचने के लिए।
wrong_answers:
  - उन्हें याद रखने में आसान बनाने के लिए।
  - उनकी जटिलता को कम करने के लिए।
  - सिबिल हमलों का प्रतिरोध करने के लिए।
explanation: |
  यादृच्छिकता (रैंडमनेस) पासवर्ड को अनुमान लगाना कठिन बना देती है, जिससे वे प्रयास और त्रुटि (ट्रायल और एरर) के माध्यम से किए जाने वाले ब्रूट-फोर्स हमलों के खिलाफ अधिक सुरक्षित हो जाते हैं।
reviewed: true

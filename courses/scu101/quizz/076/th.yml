question: ทำไมถึงแนะนำให้ใช้รหัสผ่านที่สร้างขึ้นแบบสุ่ม?
answer: เพื่อต้านทานการโจมตีแบบเดรัจฉาน
wrong_answers:
  - เพื่อให้ง่ายต่อการจดจำ
  - เพื่อลดความซับซ้อนของพวกเขา
  - เพื่อต่อต้านการโจมตีแบบ Sybil
explanation: |
  การสุ่มทำให้รหัสผ่านยากต่อการคาดเดาผ่านการลองผิดลองถูก จึงช่วยเสริมความปลอดภัยต่อการโจมตีแบบเดรัจฉาน
reviewed: true
question: Ni kuki ari vyiza gukoresha amajambo y’ibanga akomoka ku buryo butari bwo?
answer: Kugira ngo barwanye ibitero vy’inguvu z’agahomerabunwa.
wrong_answers:
  - Kugira ngo bibe vyoroshe kwibuka.
  - Kugira ngo bigabanye ukuntu bitoroshe.
  - Kugira ngo barwanye ibitero vya Sybil.
explanation: |
  Ugukora ataco bimaze bituma amajambo y’ibanga agora gukeka biciye mu kugerageza no gukosa, gutyo bikaba bikomeza umutekano wayo ku bitero vy’inkomezi z’agahomerabunwa.
reviewed: true
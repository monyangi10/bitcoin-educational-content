question: एक अच्छे पासवर्ड की कौन-सी विशेषताएँ होती हैं?
answer: लंबा, जटिल, और अनोखा।
wrong_answers:
  - छोटा, सरल, और याद रखने में आसान।
  - व्यक्तिगत जानकारी के आधार पर।
  - सभी खातों के लिए समान।
explanation: |
  एक अच्छा पासवर्ड पर्याप्त रूप से लंबा, जटिल होना चाहिए और उसे दोबारा इस्तेमाल नहीं किया जाना चाहिए।
reviewed: true

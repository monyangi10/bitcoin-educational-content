question: एक अच्छे पासवर्ड की क्या विशेषताएँ होती हैं?
answer: लंबा, जटिल, और अनोखा।
wrong_answers:
  - छोटा, सरल, और याद रखने में आसान।
  - व्यक्तिगत जानकारी के आधार पर।
  - सभी खातों के लिए एक समान।
explanation: |
  एक अच्छा पासवर्ड काफी लंबा, जटिल होना चाहिए और उसे दोबारा इस्तेमाल नहीं करना चाहिए।
reviewed: false
question: Ni ibihe bintu bisobanura ijambobanga ryiza?
answer: Ni ndende, iragoye kandi ni iyidasanzwe.
wrong_answers:
  - Ni ngufi, yoroshe kandi yoroshe kwibuka.
  - Bishingiye ku makuru y’umuntu ku giti ciwe.
  - Ibisa n’ivyo ku nkuru zose.
explanation: |
  Ijambobanga ryiza rikwiye kuba rirerire bihagije, rigoye kandi ntirikwiye gusubira gukoreshwa.
reviewed: true
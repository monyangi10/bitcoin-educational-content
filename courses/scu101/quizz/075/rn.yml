question: Ni ibihe bintu biranga ijambo ry'ibanga ryiza?
answer: Ni rirerire, riragoye kandi ririhariye.
wrong_answers:
  - Ni rigufi, ryoroshe kandi ryoroshe kwibuka.
  - Rishingiye ku makuru y’umuntu ku giti ciwe.
  - Risa n’ivyo ku nkuru zose.
explanation: |
  Ijambo ry'ibanga ryiza rikwiye kuba rirerire bihagije, rigoye kandi ntirikwiye gusubira gukoreshwa.
reviewed: true

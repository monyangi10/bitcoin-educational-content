question: Какви характеристики определят добрата парола?
answer: Дълга, сложна и уникална.
wrong_answers:
  - Кратка, проста и лесна за запомняне.
  - Въз основа на лична информация.
  - Еднакви навсякъде.
explanation: |
  Добрата парола трябва да е достатъчно дълга, сложна и да не се използва многократно.
reviewed: true

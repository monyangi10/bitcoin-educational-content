question: कंप्यूटर में USB डालते समय क्या सही तरीका होता है?
answer: अनजान या शक वाले USB की को मत लगाओ।
wrong_answers:
  - बिना जाँचे कोई भी USB की डालो।
  - USB को डालने से पहले हमेशा फॉर्मेट कर लो।
  - USB की को डालो और फिर वायरस के लिए चेक करो।
explanation: |
  अनजान या शक्की USB डिवाइस लगाने से खतरा हो सकता है
  सिस्टम से दुर्भावनापूर्ण प्रोग्राम जो अपने आप लॉन्च हो सकते हैं
  डालने पर। USB की जांच करना एक बार फिर बेकार हो जाएगा
  यह डाल दिया गया है।
reviewed: true
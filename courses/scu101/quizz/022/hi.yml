question: कंप्यूटर में यूएसबी की (USB key) डालते समय क्या सही तरीका होता है?
answer: अनजान या संदिग्ध यूएसबी की (USB key) को न लगाएँ।
wrong_answers:
  - बिना जाँचे किए किसी भी यूएसबी की को लगाएँ।
  - हमेशा यूएसबी की को लगाने से पहले फॉर्मेट करें।
  - यूएसबी की लगाएँ और फिर वायरस के लिए जाँच करें।
explanation: |
  अनजान या संदिग्ध यूएसबी की लगाने से 
  सिस्टम हानिकारक प्रोग्रामों के संपर्क में आ सकता है,
  जो लगाते ही स्वयं सक्रिय हो सकते हैं।
  एक बार यूएसबी की लगाने के बाद उसकी जाँच करना बेकार होता है।
reviewed: true

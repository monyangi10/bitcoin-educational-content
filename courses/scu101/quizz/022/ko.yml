question: 컴퓨터에 USB 키를 삽입할 때 권장되는 방법은 무엇인가요?
answer: 알 수 없거나 의심스러운 USB 키를 삽입하지 마세요.
wrong_answers:
  - 확인하지 않고 USB 키를 삽입합니다.
  - 삽입하기 전에 항상 USB 키를 포맷하세요.
  - USB 키를 삽입한 다음 바이러스를 검사합니다.
explanation: |
  알 수 없거나 의심스러운 USB 키를 삽입하면
  시스템이 자동으로 실행될 수 있는 악성 프로그램에
  악성 프로그램에 노출될 수 있습니다. USB 키가 삽입된 후에는
  아무 소용이 없습니다.
reviewed: true
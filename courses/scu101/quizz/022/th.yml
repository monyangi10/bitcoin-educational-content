question: แนวทางปฏิบัติที่แนะนำเมื่อเสียบ USB key เข้ากับคอมพิวเตอร์ของคุณคืออะไร?
answer: อย่าเสียบกุญแจ USB ที่ไม่รู้จักหรือสงสัย
wrong_answers:
  - เสียบ USB ใด ๆ โดยไม่ต้องตรวจสอบ
  - กรุณาฟอร์แมต USB คีย์ก่อนเสียบเข้าไปเสมอ
  - ใส่คีย์ USB แล้วตรวจสอบไวรัส
explanation: |
  การเสียบกุญแจ USB ที่ไม่รู้จักหรือสงสัยอาจทำให้ระบบเสี่ยงต่อโปรแกรมที่เป็นอันตรายซึ่งสามารถเปิดตัวโดยอัตโนมัติเมื่อเสียบเข้าไป การตรวจสอบกุญแจ USB จะไม่มีประโยชน์เมื่อมันถูกเสียบเข้าไปแล้ว
reviewed: true
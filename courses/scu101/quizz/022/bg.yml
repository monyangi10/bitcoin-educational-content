question: Каква е препоръчителната практика, когато поставяте USB ключ в компютъра си?
answer: Не поставяйте непознати или подозрителни USB ключове.
wrong_answers:
  - Поставете всеки USB ключ, без да проверявате.
  - Винаги форматирайте USB ключа, преди да го поставите.
  - Поставете USB ключа и след това проверете за вируси.
explanation: |
  Поставянето на непознати или подозрителни USB ключове може да изложи
  системата на злонамерени програми, които могат автоматично да стартират
  при поставянето им. Проверката на USB ключа ще бъде безполезна, след като
  след като е бил поставен.
reviewed: true
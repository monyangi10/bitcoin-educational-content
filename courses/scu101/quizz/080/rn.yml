question: Ni kuki ari vyiza gukora aderese imeyiri zibiri zitandukanye?
answer: Gutandukanya ivy’itumanaho rusangi n’ukugarukana konti.
wrong_answers:
  - Gutandukanya ivy’uguhanahana amakuru mu vy’umwuga n’ivy’umuntu ku giti ciwe.
  - Kugira ngo ukore amakonti menshi kandi wongere uboneke kuri interineti.
  - Kugira ngo uronke ibindi bitari vyo.
explanation: |
  Gutandukanya aderesi za imeyiri birafasha kugabanya ingorane no gukingira bikwiye amakonti yawe ahambaye.
reviewed: true

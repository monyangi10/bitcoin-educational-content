question: दो अलग-अलग ईमेल पते बनाने की सलाह क्यों दी जाती है?
answer: खाता पुनर्प्राप्ति से सामान्य संचार को अलग करने के लिए।
wrong_answers:
  - व्यावसायिक और व्यक्तिगत संचार को अलग करने के लिए।
  - कई खाते बनाने और ऑनलाइन दृश्यता बढ़ाने के लिए।
  - अधिक स्पैम प्राप्त करने के लिए।
explanation: |
  ईमेल पतों को अलग करने से जोखिम कम होते हैं और महत्वपूर्ण खातों तक पहुंच को बेहतर ढंग से सुरक्षित किया जा सकता है।
reviewed: true

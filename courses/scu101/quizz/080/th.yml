question: ทำไมถึงแนะนำให้สร้างที่อยู่อีเมลสองอันแยกกัน?
answer: เพื่อแยกการสื่อสารทั่วไปออกจากการกู้คืนบัญชี
wrong_answers:
  - เพื่อแยกการสื่อสารทางอาชีพและส่วนตัว
  - เพื่อสร้างบัญชีหลายบัญชีและเพิ่มการมองเห็นออนไลน์
  - เพื่อรับสแปมมากขึ้น
explanation: |
  การแยกที่อยู่อีเมลช่วยลดความเสี่ยงและปกป้องการเข้าถึงบัญชีที่สำคัญได้ดียิ่งขึ้น
reviewed: true
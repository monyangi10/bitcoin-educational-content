question: ऑनलाइन ब्राउज़िंग के संदर्भ में कुकीज़ क्या हैं?
answer: वेबसाइटों द्वारा आपके डिवाइस पर जानकारी स्टोर करने के लिए बनाए गई फाइल्स।
wrong_answers:
  - वेबसाइट द्वारा भेजे गए छोटे डेटा के टुकड़े जो यूज़र के कंप्यूटर पर उसके वेब ब्राउज़र द्वारा स्टोर किए जाते हैं।
  - ऐसे प्रोग्राम जो आपकी ऑनलाइन गतिविधि पर नज़र रखते हैं।
  - आपके डिवाइस को नुकसान पहुंचाने वाले वायरस।
explanation: |
  ऑनलाइन ब्राउज़िंग के संदर्भ में, कुकीज़ फाइलें होती हैं
  जिन्हें वेबसाइटें आपके डिवाइस पर जानकारी स्टोर करने के लिए बनाती हैं।
  इनका उपयोग आपकी प्राथमिकताओं, लॉगिन जानकारी और अन्य डेटा
  को याद रखने के लिए किया जाता है ताकि आपके ब्राउज़िंग अनुभव
  को बेहतर बनाया जा सके।
reviewed: true

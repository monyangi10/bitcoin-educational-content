question: ऑनलाइन ब्राउज़िंग में कुकीज़ क्या होती हैं?
answer: वेबसाइटों द्वारा आपके डिवाइस पर जानकारी स्टोर करने के लिए बनाए गए फाइल्स।
wrong_answers:
  - वेबसाइट द्वारा भेजे गए छोटे डेटा के टुकड़े जो यूज़र के कंप्यूटर पर उसके वेब ब्राउज़र द्वारा स्टोर किए जाते हैं।
  - ऐसे प्रोग्राम जो आपकी ऑनलाइन गतिविधि पर नज़र रखते हैं।
  - आपके डिवाइस को नुकसान पहुंचाने वाले वायरस।
explanation: |
  ऑनलाइन ब्राउज़िंग के संदर्भ में, कुकीज़ फाइलें होती हैं
  वेबसाइटों द्वारा आपके डिवाइस पर जानकारी स्टोर करने के लिए बनाया गया।
  वे आपकी पसंद और लॉगिन को याद रखने के लिए इस्तेमाल किए जाते हैं।
  जानकारी, और अन्य डेटा आपके ब्राउज़िंग अनुभव को बेहतर बनाने के लिए
  अनुभव।
reviewed: true
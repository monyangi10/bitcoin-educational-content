question: Ama kuki ni iki mu bijanye no kurondera kuri Interineti?
answer: Dosiye ziremwa n’imbuga kugira ngo zibike amakuru ku gikoresho cawe.
wrong_answers:
  - Amakuru matomato yoherezwa avuye ku rubuga kndi akabikwa ku nyabwonko y’uwukoresha mucukumbuzi.
  - Porogarama zikurikirana ibikorwa vyawe vyo kuri Internet.
  - Umugera(nyabwonko) ushobora konona igikoresho cawe.
explanation: |
  Mu bijanye no kurondera kuri interineti, ama kuki ni amadosiye
  aremwa n’imbuga kugira abike amakuru ku gikoresho cawe. 
  akoreshwa mu kwibuka ivyo ukunda, amakuru yawe yo kwinjira,
  n'ayandi makuru kugira ngo ukurondera kwawe kuje kuyindi ntambwe.
reviewed: true

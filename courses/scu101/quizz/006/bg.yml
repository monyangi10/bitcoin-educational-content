question: Какво представляват "бисквитките" в контекста на онлайн сърфирането?
answer: Файлове, създадени от уебсайтове за съхраняване на информация във вашето устройство.
wrong_answers:
  - Малки части от данни, изпращани от уебсайт и съхранявани на компютъра на потребителя от неговия уеб браузър.
  - Програми, които следят активността ви онлайн.
  - Вируси, които могат да навредят на вашето устройство.
explanation: |
  В контекста на онлайн сърфирането "бисквитките" са файлове
  създадени от уебсайтове, за да съхраняват информация на вашето устройство.
  Те се използват за запомняне на вашите предпочитания, вход
  информация и други данни, за да се подобри сърфирането ви
  преживяване.
reviewed: true
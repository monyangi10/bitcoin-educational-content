question: คุกกี้คืออะไรในบริบทของการท่องเว็บออนไลน์?
answer: ไฟล์ที่สร้างโดยเว็บไซต์เพื่อจัดเก็บข้อมูลบนอุปกรณ์ของคุณ
wrong_answers:
  - ชิ้นส่วนข้อมูลขนาดเล็กที่ส่งจากเว็บไซต์และเก็บไว้ในคอมพิวเตอร์ของผู้ใช้โดยเว็บเบราว์เซอร์ของผู้ใช้
  - โปรแกรมที่ติดตามกิจกรรมออนไลน์ของคุณ
  - ไวรัสที่สามารถทำอันตรายต่ออุปกรณ์ของคุณ
explanation: |
  ในบริบทของการท่องเว็บออนไลน์ คุกกี้คือไฟล์ที่สร้างขึ้นโดยเว็บไซต์เพื่อจัดเก็บข้อมูลบนอุปกรณ์ของคุณ พวกมันถูกใช้เพื่อจดจำการตั้งค่าของคุณ ข้อมูลการเข้าสู่ระบบ และข้อมูลอื่น ๆ เพื่อปรับปรุงประสบการณ์การท่องเว็บของคุณ
reviewed: true
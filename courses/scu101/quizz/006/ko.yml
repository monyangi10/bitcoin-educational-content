question: 온라인 브라우징의 맥락에서 쿠키란 무엇인가요?
answer: 웹사이트가 장치에 정보를 저장하기 위해 만든 파일입니다.
wrong_answers:
  - 웹사이트에서 전송되어 사용자의 웹 브라우저에 의해 사용자의 컴퓨터에 저장되는 작은 데이터 조각입니다.
  - 온라인 활동을 추적하는 프로그램.
  - 장치에 해를 끼칠 수 있는 바이러스.
explanation: |
  온라인 브라우징의 맥락에서 쿠키는 웹사이트가 디바이스에 정보를 저장하기 위해
  웹사이트가 사용자의 기기에 정보를 저장하기 위해 생성하는 파일입니다.
  쿠키는 사용자의 기본 설정, 로그인
  정보 및 기타 데이터를 기억하여 브라우징 환경을 개선하는 데
  경험을 개선하는 데 사용됩니다.
reviewed: true
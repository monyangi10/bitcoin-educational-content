question: Lightning kimlik doğrulamasının amacı nedir?
answer: E-posta Address veya kişisel bilgi sağlamadan her hizmet için farklı bir tanımlayıcı oluşturur.
wrong_answers:
  - Lightning Wallet'si olmayan herkesin, geçerli bir kimlik gösterilirse, Address e-postası olmadan kimlik doğrulaması yapmasına izin verir.
  - Tüm hizmetler için aynı parolayı kullanmanıza olanak tanır.
  - Her ay şifreleri değiştirmek için hatırlatıcılar gönderir.
explanation: |
  Lightning kimlik doğrulaması, e-posta Address veya kişisel bilgi sağlamadan her hizmet için farklı bir tanımlayıcı oluşturur. Bu, her bir hizmetle paylaşılan kişisel bilgi miktarını azaltarak gizliliği ve güvenliği artırabilir.
reviewed: true
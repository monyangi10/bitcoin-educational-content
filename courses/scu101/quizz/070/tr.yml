question: Lightning kimlik doğrulamasının amacı nedir?
answer: E-posta adresi veya kişisel bilgi vermeden her hizmet için farklı bir tanımlayıcı oluşturur.
wrong_answers:
  - Lightning Wallet'i (dijital cüzdanı) olmayan herkesin, geçerli bir kimlik gösterilmesi halinde, 
  e-posta adresi olmadan kimlik doğrulaması yapmasına izin verir.
  - Tüm hizmetler için aynı parolayı kullanmanıza olanak tanır.
  - Her ay şifreleri değiştirmek için hatırlatıcılar gönderir.
explanation: |
  Lightning kimlik doğrulaması, e-posta adresi veya kişisel bilgi sağlamadan her hizmet için farklı bir tanımlayıcı oluşturur. 
  Bu, her bir hizmetle paylaşılan kişisel bilgi miktarını azaltarak gizliliği ve güvenliği artırabilir.
reviewed: true

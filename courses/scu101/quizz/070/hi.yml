question: लाइटनिंग प्रमाणीकरण (लाइटनिंग ऑथेंटिकेशन) का उद्देश्य क्या है?
answer: यह हर सेवा के लिए एक अलग पहचानकर्ता उत्पन्न करता है, बिना ईमेल पता या व्यक्तिगत जानकारी प्रदान किए।
wrong_answers:
  - किसी को भी, भले ही उसके पास लाइटनिंग वॉलेट न हो, एक वैध आईडी दिखाने पर ईमेल पते के बिना प्रमाणीकरण करने की अनुमति देता है।
  - यह आपको सभी सेवाओं के लिए एक ही पासवर्ड इस्तेमाल करने की सुविधा देता है।
  - यह हर महीने पासवर्ड बदलने के लिए अनुस्मारक (रिमाइंडर) भेजता है।
explanation: |
  लाइटनिंग प्रमाणीकरण प्रत्येक सेवा के लिए एक अलग पहचानकर्ता उत्पन्न करता हैै,
  बिना ईमेल पता या व्यक्तिगत जानकारी प्रदान किए।
  इससे प्रत्येक सेवा के साथ साझा की जाने वाली
  व्यक्तिगत जानकारी की मात्रा कम होकर
  गोपनीयता और सुरक्षा में सुधार हो सकता है।
reviewed: true

question: बिजली प्रमाणीकरण (Lightning authentication) का मकसद क्या है?
answer: यह हर सेवा के लिए एक अलग पहचानकर्ता बनाता है, बिना किसी जरूरत के
wrong_answers:
  - किसी को भी, Lightning Wallet के बिना भी, बिना ईमेल Address के प्रमाणीकरण करने की अनुमति देता है, अगर एक वैध आईडी दिखाई जाती है।
  - यह आपको सभी सेवाओं के लिए एक ही पासवर्ड इस्तेमाल करने की सुविधा देता है।
  - यह हर महीने पासवर्ड बदलने के लिए रिमाइंडर भेजता है।
explanation: |
  बिजली प्रमाणीकरण एक अलग पहचानकर्ता उत्पन्न करता है
  हर सेवा के लिए, ईमेल देने की ज़रूरत के बिना
  जीडब्ल्यू-2 या निजी जानकारी। इससे गोपनीयता बढ़ सकती है।
  और सुरक्षा को बढ़ाकर, निजी जानकारी की मात्रा को कम करके
  जो हर सेवा के साथ साझा किया जाता है।
reviewed: true
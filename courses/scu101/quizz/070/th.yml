question: วัตถุประสงค์ของการยืนยันตัวตน Lightning คืออะไร?
answer: มันสร้างตัวระบุที่แตกต่างกันสำหรับแต่ละบริการ โดยไม่ต้องให้ที่อยู่อีเมลหรือข้อมูลส่วนบุคคล
wrong_answers:
  - อนุญาตให้ทุกคน แม้ไม่มี Lightning wallet ยืนยันตัวตนได้โดยไม่ต้องใช้อีเมล หากแสดงบัตรประจำตัวที่ถูกต้อง
  - มันช่วยให้คุณใช้รหัสผ่านเดียวกันสำหรับทุกบริการ
  - มันส่งการแจ้งเตือนให้เปลี่ยนรหัสผ่านทุกเดือน
explanation: |
  การยืนยันตัวตนด้วย Lightning สร้างตัวระบุที่แตกต่างกันสำหรับแต่ละบริการ โดยไม่ต้องให้ที่อยู่อีเมลหรือข้อมูลส่วนบุคคล ซึ่งสามารถเพิ่มความเป็นส่วนตัวและความปลอดภัยโดยลดปริมาณข้อมูลส่วนบุคคลที่แชร์กับแต่ละบริการ
reviewed: true
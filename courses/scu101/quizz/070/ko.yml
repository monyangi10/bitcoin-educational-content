question: 라이트닝 인증의 목적은 무엇인가요?
answer: 이메일 Address 또는 개인 정보를 제공하지 않고 각 서비스마다 다른 식별자를 생성합니다.
wrong_answers:
  - 유효한 신분증을 제시하면 이메일 Address 없이도 누구나 Lightning Wallet 없이도 인증할 수 있습니다.
  - 모든 서비스에 동일한 비밀번호를 사용할 수 있습니다.
  - 매월 비밀번호를 변경하라는 알림을 보냅니다.
explanation: |
  라이트닝 인증은 이메일 Address 또는 개인정보를 제공하지 않고도 각 서비스마다 다른 식별자를 생성합니다. 이렇게 하면 각 서비스에서 공유되는 개인 정보의 양을 줄여 개인정보 보호 및 보안을 강화할 수 있습니다.
reviewed: true
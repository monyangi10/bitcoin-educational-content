question: Eski parolalarınızı bir parola yöneticisi tarafından oluşturulan parolalarla kademeli olarak değiştirmek neden önemlidir?
answer: Bir parola yöneticisi tarafından oluşturulan parolalar daha güçlü ve daha uzun olup daha fazla güvenlik sunar.
wrong_answers:
  - Parola yöneticisi eski parolaları otomatik olarak siler.
  - Parola yöneticileri yalnızca sınırlı sayıda parolayı saklayabilir.
  - Parola yöneticileri tüm parolaların kendileri tarafından oluşturulmasını gerektirir.
explanation: |
  Bir parola yöneticisi daha güçlü ve daha uzun parolalar üreterek daha fazla güvenlik sunar. 
  Eski şifrelerinizi yavaş yavaş bunlarla değiştirerek çevrimiçi hesaplarınızın güvenliğini artırabilirsiniz.
reviewed: true

question: पुराने पासवर्ड्स को धीरे-धीरे पासवर्ड मैनेजर से बने नए पासवर्ड्स से क्यों बदलना ज़रूरी है?
answer: पासवर्ड मैनेजर द्वारा बनाए गए पासवर्ड ज़्यादा मज़बूत और लंबे होते हैं, जिससे सुरक्षा भी बढ़ जाती है।
wrong_answers:
  - पुराने पासवर्ड पासवर्ड मैनेजर द्वारा अपने आप डिलीट हो जाते हैं।
  - पासवर्ड मैनेजर सिर्फ एक सीमित संख्या में पासवर्ड ही स्टोर कर सकते हैं।
  - पासवर्ड मैनेजर को चाहिए कि सारे पासवर्ड उनके द्वारा बनाए गए हों।
explanation: |
  पासवर्ड मैनेजर द्वारा बनाए गए पासवर्ड ज़्यादा मज़बूत होते हैं और
  लंबे समय तक, ज़्यादा सुरक्षा देते हुए। धीरे-धीरे अपने...
  पुराने पासवर्ड के साथ इनका उपयोग करके, आप सुरक्षा बढ़ा सकते हैं
  तुम्हारे ऑनलाइन अकाउंट्स।
reviewed: true
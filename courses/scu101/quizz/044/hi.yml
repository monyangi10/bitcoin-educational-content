question: पुराने पासवर्ड्स को धीरे-धीरे पासवर्ड मैनेजर से बने नए पासवर्ड्स से क्यों बदलना ज़रूरी है?
answer: पासवर्ड मैनेजर द्वारा बनाए गए पासवर्ड ज़्यादा मज़बूत और लंबे होते हैं, जिससे अधिक सुरक्षा मिलती है।
wrong_answers:
  - पुराने पासवर्ड पासवर्ड मैनेजर द्वारा अपने आप डिलीट हो जाते हैं।
  - पासवर्ड मैनेजर सिर्फ एक सीमित संख्या में पासवर्ड ही संग्रहीत कर सकते हैं।
  - पासवर्ड मैनेजर सभी पासवर्ड को अपने द्वारा उत्पन्न होना आवश्यक मानता है।
explanation: |
  पासवर्ड मैनेजर अधिक मजबूत और लंबे पासवर्ड उत्पन्न करता है,
  जिससे अधिक सुरक्षा मिलती है।
  अपने पुराने पासवर्ड को धीरे-धीरे इनसे बदलने से
  आप अपने ऑनलाइन खातों की सुरक्षा बढ़ा सकते हैं।
reviewed: true

question: 기존 비밀번호를 비밀번호 관리자가 생성한 비밀번호로 점진적으로 교체하는 것이 중요한 이유는 무엇인가요?
answer: 비밀번호 관리자가 생성한 비밀번호는 더 강력하고 길어 보안이 강화됩니다.
wrong_answers:
  - 비밀번호 관리자는 오래된 비밀번호를 자동으로 삭제합니다.
  - 비밀번호 관리자는 제한된 수의 비밀번호만 저장할 수 있습니다.
  - 비밀번호 관리자는 모든 비밀번호를 생성해야 합니다.
explanation: |
  비밀번호 관리자는 더 강력하고 긴 비밀번호를 생성하여 보안을 강화합니다. 기존 비밀번호를 점차적으로 이 비밀번호로 교체하면 온라인 계정의 보안을 강화할 수 있습니다.
reviewed: true
question: Защо е изключително важно редовно да актуализирате операционната система и приложенията?
answer: Защита срещу нови заплахи и уязвимости.
wrong_answers:
  - Да направи машината остаряла.
  - За да забавите машината.
  - За да промените потребителския интерфейс.
explanation: |
  Редовните актуализации са от съществено значение за защитата на системата от
  нови заплахи и уязвимости. Те не са предназначени за
  да направят машината остаряла или бавна.
reviewed: true
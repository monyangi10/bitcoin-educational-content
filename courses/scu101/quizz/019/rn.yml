question: Ni kubera iki bihambaye cane kwama ushira kugihe sisitemu be na porogarame?
answer: Kugira ngo twikingire ivyo duhungabanya n’ibintu bishobora gutuma umuntu agira ingorane.
wrong_answers:
  - Kugira ngo iyo mashini ite igihe.
  - Kugira ngo imashini igende buhoro.
  - Kugira ngo uhindure igicapo.
explanation: |
  Kwama ushira kugihe ningombwa kugira ngo ukingire sisiteme ibintu bishasha bishobora kuyonona n’ibintu bishobora gutuma umuntu agira ingorane. Ntibigamije
  gutuma imashini idakoreshwa canke igenda buhoro.
reviewed: true

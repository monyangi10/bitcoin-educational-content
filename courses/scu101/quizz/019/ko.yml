question: 운영 체제와 애플리케이션을 정기적으로 업데이트하는 것이 중요한 이유는 무엇인가요?
answer: 새로운 위협과 취약성으로부터 보호합니다.
wrong_answers:
  - 기계를 쓸모없게 만들려면.
  - 컴퓨터 속도를 늦추려면.
  - 사용자 Interface을 변경하려면
explanation: |
  새로운 위협과 취약성으로부터 시스템을 보호하려면 정기적인 업데이트가 필수적입니다
  시스템을 보호하는 데 필수적입니다. 정기 업데이트는 다음을 목적으로 하지 않습니다
  시스템을 쓸모없게 만들거나 느리게 만들려는 것이 아닙니다.
reviewed: true
question: ऑपरेटिंग सिस्टम और ऐप्लिकेशन्स को नियमित रूप से अपडेट करना क्यों ज़रूरी है?
answer: नए खतरों और कमजोरियों से बचाव के लिए।
wrong_answers:
  - मशीन को बेकार कर देना।
  - मशीन को धीमा करने के लिए।
  - यूजर Interface को बदलने के लिए।
explanation: |
  सिस्टम को सुरक्षित रखने के लिए नियमित अपडेट ज़रूरी हैं।
  नए खतरे और कमजोरियाँ। ये मतलब नहीं हैं कि...
  मशीन को पुराना या धीमा कर दो।
reviewed: true
question: ऑपरेटिंग सिस्टम और ऐप्लिकेशन्स को नियमित रूप से अपडेट करना क्यों ज़रूरी है?
answer: नए खतरों और कमजोरियों से बचाव के लिए।
wrong_answers:
  - मशीन को अप्रचलित (ऑब्सोलीट) बनाने के लिए।
  - मशीन को धीमा करने के लिए।
  - यूजर इंटरफ़ेस बदलने के लिए।
explanation: |
  नियमित अपडेट सिस्टम को नए खतरों और
  कमजोरियों से बचाने के लिए आवश्यक होते हैं।
  इनका उद्देश्य मशीन को अप्रचलित (ऑब्सोलीट) या धीमा बनाना नहीं होता।
reviewed: true

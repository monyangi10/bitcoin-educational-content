question: ทำไมการอัปเดตระบบปฏิบัติการและแอปพลิเคชันอย่างสม่ำเสมอจึงมีความสำคัญ?
answer: เพื่อป้องกันภัยคุกคามและช่องโหว่ใหม่ ๆ
wrong_answers:
  - เพื่อทำให้เครื่องจักรล้าสมัย
  - เพื่อชะลอเครื่องจักร
  - เพื่อเปลี่ยนอินเทอร์เฟซผู้ใช้
explanation: |
  การอัปเดตเป็นประจำเป็นสิ่งสำคัญในการปกป้องระบบจาก
  ภัยคุกคามและช่องโหว่ใหม่ ๆ การอัปเดตเหล่านี้ไม่ได้มีจุดประสงค์เพื่อ
  ทำให้เครื่องล้าสมัยหรือช้าลง
reviewed: true
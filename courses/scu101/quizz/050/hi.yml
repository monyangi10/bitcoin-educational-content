question: 2FA के लिए SMS की तुलना में वन-टाइम पासवर्ड (HOTP और TOTP) का क्या फायदा है?
answer: उन्हें क्रिप्टोग्राफिक गणना की जरूरत होती है और वे मेमोरी के बजाय स्थानीय रूप से स्टोर किए जाते हैं।
wrong_answers:
  - उन्हें क्रिप्टोग्राफ़िक गणना की जरूरत होती है और वे स्थानीय रूप से नहीं बल्कि मेमोरी में स्टोर होते हैं।
  - उन्हें क्रिप्टोग्राफिक गणना की जरूरत नहीं होती और वे स्थानीय रूप से और मेमोरी में दोनों जगह स्टोर होते हैं।
  - वो याद रखने में आसान होते हैं और टाइप करने में तेज़ होते हैं।
explanation: |
  वन-टाइम पासवर्ड (HOTP और TOTP) SMS की तुलना में अधिक सुरक्षित होते हैं
  क्योंकि वे क्रिप्टोग्राफिक गणना की आवश्यकता रखते हैं
  और मेमोरी में नहीं बल्कि स्थानीय रूप से संग्रहीत होते हैं।
reviewed: true

question: Какво е предимството на еднократните пароли (HOTP и TOTP) пред SMS за 2FA?
answer: Те изискват криптографско изчисление и се съхраняват локално, а не в паметта.
wrong_answers:
  - Те изискват криптографски изчисления и се съхраняват в паметта, а не локално.
  - Те не изискват криптографски изчисления и се съхраняват локално и в паметта.
  - Те са по-лесни за запомняне и се въвеждат по-бързо.
explanation: |
  Еднократните пароли (HOTP и TOTP) са по-безопасни от SMS
  защото изискват криптографско изчисление и са
  и се съхраняват локално, а не в паметта.
reviewed: true
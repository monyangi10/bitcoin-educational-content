question: ข้อดีของรหัสผ่านครั้งเดียว (HOTP และ TOTP) เหนือกว่า SMS สำหรับ 2FA คืออะไร?
answer: พวกเขาต้องการการคำนวณทางเข้ารหัสและถูกจัดเก็บไว้ในเครื่องแทนที่จะอยู่ในหน่วยความจำ
wrong_answers:
  - พวกเขาต้องการการคำนวณทางเข้ารหัสและถูกเก็บไว้ในหน่วยความจำแทนที่จะเป็นในเครื่อง
  - พวกมันไม่ต้องการการคำนวณทางการเข้ารหัสและถูกจัดเก็บไว้ในเครื่องและในหน่วยความจำ
  - พวกมันจำได้ง่ายกว่าและพิมพ์ได้เร็วกว่า
explanation: |
  รหัสผ่านใช้ครั้งเดียว (HOTP และ TOTP) ปลอดภัยกว่า SMS
  เพราะต้องใช้การคำนวณทางเข้ารหัสและถูกจัดเก็บในเครื่อง
  แทนที่จะอยู่ในหน่วยความจำ
reviewed: true
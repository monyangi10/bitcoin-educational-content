question: 2FA를 위해 일회용 비밀번호(HOTP 및 TOTP)가 SMS보다 유리한 점은 무엇인가요?
answer: 암호화 계산이 필요하며 메모리가 아닌 로컬에 저장됩니다.
wrong_answers:
  - 암호화 계산이 필요하며 로컬이 아닌 메모리에 저장됩니다.
  - 암호화 계산이 필요하지 않으며 로컬 및 메모리에 저장됩니다.
  - 기억하기 쉽고 빠르게 입력할 수 있습니다.
explanation: |
  일회용 비밀번호(HOTP 및 TOTP)는 암호화 계산이 필요하므로 SMS보다 안전합니다
  보다 안전하며, 암호화 계산이 필요하고
  메모리가 아닌 로컬에 저장되기 때문입니다.
reviewed: true
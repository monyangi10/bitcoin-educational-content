question: HTTPS 프로토콜의 목적은 무엇인가요?
answer: 웹사이트의 데이터를 암호화하여 사용자와 웹사이트 간의 안전한 Exchange을 보장합니다.
wrong_answers:
  - 직불 카드나 신용 카드로 결제할 때 지리적 제한을 우회할 수 있습니다.
  - 이를 통해 사용자는 온라인 광고를 부분적으로 차단할 수 있습니다.
  - 이를 통해 사용자는 개인 자격 증명을 사용하지 않고도 인터넷에 액세스할 수 있습니다.
explanation: |
  HTTPS 프로토콜은 웹사이트의 데이터를 암호화합니다,
  사용자와 웹사이트 간에 교환되는 데이터를 안전하게 보호합니다
  웹사이트를 안전하게 보호합니다. 이는 제3자가
  데이터를 가로채는 것을 방지합니다.
reviewed: true
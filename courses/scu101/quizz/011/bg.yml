question: Каква е целта на протокола HTTPS?
answer: Той криптира данните в уебсайтовете, за да осигури сигурен обмен между потребителя и уебсайта.
wrong_answers:
  - Тя позволява на потребителите да заобикалят географските ограничения при плащане с дебитна или кредитна карта.
  - Тя позволява на потребителите да блокират частично онлайн рекламите.
  - Тя позволява на потребителите да имат достъп до интернет, без да използват лични данни.
explanation: |
  Протоколът HTTPS криптира данните в уебсайтовете,
  и гарантира, че данните, обменяни между потребителя и уебсайта са защитени. Това помага за защита от трети страни.
  
reviewed: true

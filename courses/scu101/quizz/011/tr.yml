question: HTTPS protokolünün amacı nedir?
answer: Kullanıcı ile web sitesi arasında güvenli bilgi takası sağlamak için web sitelerindeki verileri şifreler.
wrong_answers:
  - Kullanıcıların banka veya kredi kartı ile ödeme yaparken coğrafi kısıtlamaları atlamasına olanak tanır.
  - Kullanıcıların çevrimiçi reklamları kısmen engellemesine olanak tanır.
  - Kullanıcıların özel kimlik bilgilerini kullanmadan internete erişmelerini sağlar.
explanation: |
  HTTPS protokolü web sitelerindeki verileri şifreler,
  kullanıcı ve sistem arasında değiş tokuş edilen verilerin
  güvenli olmasını sağlar. Bu, üçüncü taraflara karşı korunmaya yardımcı olur.
reviewed: true

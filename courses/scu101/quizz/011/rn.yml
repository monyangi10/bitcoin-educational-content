question: Ni igiki gifise intumbero y’itegeko rya HTTPS?
answer: Ishiramwo amakuru ku mbuga ngurukanabumenyi kugira ngo Exchange itekanye hagati y’uwukoresha n’urubuga.
wrong_answers:
  - Ituma abakoresha bashobora guca ku ruhande rw’aho bari igihe bariha biciye ku ikarita y’ideni canke y’inguzanyo.
  - Ituma abakoresha bashobora guhagarika amatangazo yo kuri Internet bimwe bimwe.
  - Ituma abakoresha bashobora gukoresha internet batakoresheje amakuru y’ibanga.
explanation: |
  Amasezerano ya HTTPS apfuka amakuru ku mbuga ngurukanabumenyi,
  kumenya neza ko amakuru ahindurwa hagati y'uwukoresha n'uwukoresha
  urubuga ruratekanye. Ivyo bifasha gukingira abandi bantu .
  gufata amakuru.
reviewed: true
question: วัตถุประสงค์ของโปรโตคอล HTTPS คืออะไร?
answer: มันเข้ารหัสข้อมูลบนเว็บไซต์เพื่อให้แน่ใจว่าการแลกเปลี่ยนระหว่างผู้ใช้และเว็บไซต์มีความปลอดภัย
wrong_answers:
  - ช่วยให้ผู้ใช้สามารถข้ามข้อจำกัดทางภูมิศาสตร์เมื่อชำระเงินผ่านบัตรเดบิตหรือบัตรเครดิต
  - มันช่วยให้ผู้ใช้บล็อกโฆษณาออนไลน์ได้บางส่วน
  - มันช่วยให้ผู้ใช้เข้าถึงอินเทอร์เน็ตโดยไม่ต้องใช้ข้อมูลประจำตัวส่วนตัว
explanation: |
  โปรโตคอล HTTPS เข้ารหัสข้อมูลบนเว็บไซต์
  เพื่อให้มั่นใจว่าข้อมูลที่แลกเปลี่ยนระหว่างผู้ใช้และ
  เว็บไซต์มีความปลอดภัย ซึ่งช่วยป้องกันบุคคลที่สาม
  จากการดักจับข้อมูล
reviewed: true
question: HTTPS प्रोटोकॉल का मकसद क्या है?
answer: यह वेबसाइट्स पर डेटा को एन्क्रिप्ट करता है ताकि यूजर और वेबसाइट के बीच सुरक्षित आदान-प्रदान सुनिश्चित हो सके।
wrong_answers:
  - यह उपयोगकर्ताओं को डेबिट या क्रेडिट कार्ड से भुगतान करते समय भौगोलिक प्रतिबंधों को बायपास करने की सुविधा देता है।
  - यह उपयोगकर्ताओं को ऑनलाइन विज्ञापनों को आंशिक रूप से ब्लॉक करने की अनुमति देता है।
  - यह उपयोगकर्ताओं को बिना निजी क्रेडेंशियल्स के इंटरनेट एक्सेस करने देता है।
explanation: |
  HTTPS प्रोटोकॉल का इस्तेमाल वेबसाइट्स पर डेटा को एन्क्रिप्ट करने के लिए किया जाता है,
  जिससे यह सुनिश्चित होता है कि उपयोगकर्ता और वेबसाइट के बीच आदान-प्रदान किया गया डेटा
  सुरक्षित रहे। यह तीसरे पक्ष द्वारा डेटा को इंटरसेप्ट करने
  से बचाने में मदद करता है।
reviewed: true

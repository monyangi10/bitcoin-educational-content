question: HTTPS प्रोटोकॉल का मकसद क्या है?
answer: यह वेबसाइट्स पर डेटा को एन्क्रिप्ट करता है ताकि यूजर और वेबसाइट के बीच सुरक्षित Exchange सुनिश्चित हो सके।
wrong_answers:
  - यह यूजर्स को डेबिट या क्रेडिट कार्ड से भुगतान करते समय भौगोलिक प्रतिबंधों को बायपास करने की सुविधा देता है।
  - यह उपयोगकर्ताओं को ऑनलाइन विज्ञापनों को आंशिक रूप से ब्लॉक करने की अनुमति देता है।
  - यह यूज़र्स को बिना निजी क्रेडेंशियल्स के इंटरनेट एक्सेस करने देता है।
explanation: |
  HTTPS प्रोटोकॉल का इस्तेमाल वेबसाइट्स पर डेटा को एन्क्रिप्ट करने के लिए किया जाता है,
  यूजर और सर्वर के बीच आदान-प्रदान किए गए डेटा को सुरक्षित करना
  वेबसाइट सुरक्षित है। यह तीसरे पक्षों से सुरक्षा प्रदान करता है।
  डेटा को इंटरसेप्ट करना।
reviewed: true
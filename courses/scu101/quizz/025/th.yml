question: แนวทางปฏิบัติที่แนะนำสำหรับการจัดเก็บรหัสผ่านสำหรับการเข้ารหัสข้อมูลคืออะไร?
answer: เขียนรหัสผ่านลงบนกระดาษเพื่อเก็บไว้ในที่ปลอดภัย
wrong_answers:
  - จัดเก็บรหัสผ่านในไฟล์ข้อความบนคอมพิวเตอร์
  - แบ่งปันรหัสผ่านกับเพื่อนที่ไว้ใจได้
  - ใช้รหัสผ่านที่ง่ายต่อการจำ
explanation: |
  ขอแนะนำให้คุณจดรหัสผ่านสำหรับการเข้ารหัสข้อมูลลงบนกระดาษและเก็บไว้ในที่ปลอดภัย วิธีนี้จะช่วยป้องกันการสูญเสียการเข้าถึงข้อมูลที่เข้ารหัส
reviewed: true
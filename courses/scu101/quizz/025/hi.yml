question: डेटा एन्क्रिप्शन के लिए पासवर्ड स्टोर करने का सुझावित तरीका क्या है?
answer: पासवर्ड को एक कागज़ पर लिखकर सुरक्षित जगह पर रख दें।
wrong_answers:
  - कंप्यूटर पर पासवर्ड को एक टेक्स्ट फाइल में स्टोर करें।
  - पासवर्ड को भरोसेमंद दोस्तों के साथ शेयर करें।
  - एक ऐसा पासवर्ड इस्तेमाल करें जो आसानी से याद रहे।
explanation: |
  यह सलाह दी जाती है कि डेटा के लिए पासवर्ड को 
  कागज़ पर लिखकर किसी सुरक्षित स्थान पर रखें।
  इससे एन्क्रिप्टेड डेटा तक पहुँच खोने से बचा जा सकता है।
reviewed: true

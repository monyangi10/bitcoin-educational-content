question: डेटा एन्क्रिप्शन के लिए पासवर्ड स्टोर करने का सुझावित तरीका क्या है?
answer: पासवर्ड को एक कागज़ पर लिखकर सुरक्षित जगह पर रख दें।
wrong_answers:
  - कंप्यूटर पर पासवर्ड को एक टेक्स्ट फाइल में स्टोर करें।
  - भरोसेमंद दोस्तों के साथ पासवर्ड शेयर करो।
  - एक ऐसा पासवर्ड इस्तेमाल करो जो आसानी से याद रहे।
explanation: |
  यह सलाह दी जाती है कि डेटा के लिए पासवर्ड लिखकर रखें
  कागज़ पर इसे एन्क्रिप्ट करके सुरक्षित जगह पर रख दो। ये है
  एन्क्रिप्टेड डेटा तक पहुंच न खोने के लिए।
reviewed: true
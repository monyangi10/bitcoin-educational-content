question: 데이터 암호화를 위해 비밀번호를 저장할 때 권장되는 방법은 무엇인가요?
answer: 비밀번호를 종이에 적어 안전한 곳에 보관하세요.
wrong_answers:
  - 비밀번호를 컴퓨터의 텍스트 파일에 저장합니다.
  - 신뢰할 수 있는 친구와 비밀번호를 공유하세요.
  - 기억하기 쉬운 일반적인 비밀번호를 사용하세요.
explanation: |
  데이터 암호화를 위한 비밀번호는 종이에 적어 안전한 곳에 보관하는 것이 좋습니다. 이렇게 하면 암호화된 데이터에 대한 액세스 권한이 손실되는 것을 방지할 수 있습니다.
reviewed: true
question: Каква е препоръчителната практика за съхраняване на паролата за криптиране на данни?
answer: Запишете паролата на лист хартия, за да я съхранявате на сигурно място.
wrong_answers:
  - Съхранявайте паролата в текстов файл на компютъра.
  - Споделяйте паролата с доверени приятели.
  - Използвайте обща парола, която е лесна за запомняне.
explanation: |
  Препоръчително е да запишете паролата за криптиране на данни на хартия и да я съхранявате на сигурно място. Това ще предотврати загубата на достъп до криптираните данни.
reviewed: true
question: เว็บไซต์ Have I Been Pwned ช่วยให้คุณสามารถทำอะไรได้บ้าง?
answer: ตรวจสอบว่าอีเมลแอดเดรสถูกละเมิดหรือไม่
wrong_answers:
  - สร้างรหัสผ่านใหม่ที่แข็งแกร่งและสุ่ม
  - สร้างกล่องจดหมายอีเมลที่ปลอดภัย
  - ซิงโครไนซ์บัญชีอีเมลเพื่อการใช้งานที่ง่ายขึ้น
explanation: |
  ไซต์นี้ช่วยตรวจจับการละเมิดข้อมูลและยืนยันความปลอดภัยของที่อยู่อีเมล
reviewed: true
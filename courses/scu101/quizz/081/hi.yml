question: "Have I Been Pwned" वेबसाइट आपको यह चेक करने देती है कि क्या आपका ईमेल या पासवर्ड किसी डेटा ब्रीच (डेटा लीक) में शामिल है। यह आपको यह पता लगाने में मदद करती है कि क्या आपका अकाउंट कभी हैक हुआ है या आपका डेटा किसी लीक में शामिल था।
answer: एक ईमेल Address से समझौता हुआ है या नहीं, यह जाँचें।
wrong_answers:
  - जीडब्ल्यू-1 नया मजबूत और रैंडम पासवर्ड।
  - एक सुरक्षित ईमेल इनबॉक्स बनाएं।
  - ईमेल अकाउंट्स को आसान इस्तेमाल के लिए सिंक करें।
explanation: |
  यह साइट डेटा ब्रीच का पता लगाने और एक ईमेल Address की सुरक्षा को सत्यापित करने में मदद करती है।
reviewed: false
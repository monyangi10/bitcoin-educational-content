question: हैव आई बीन प्वॉन्ड (Have I Been Pwned) वेबसाइट आपको क्या करने की अनुमति देती है?
answer: यह जांचना कि कोई ईमेल पता हैक किया गया है या नहीं।
wrong_answers:
  - नये, मजबूत और यादृच्छिक पासवर्ड उत्पन्न करना।
  - एक सुरक्षित ईमेल इनबॉक्स बनाना।
  - उपयोग में आसानी के लिए ईमेल खातों को सिंक्रनाइज़ करना।
explanation: |
  यह साइट डेटा उल्लंघनों का पता लगाने और ईमेल पते की सुरक्षा की पुष्टि करने में मदद करती है।
reviewed: true

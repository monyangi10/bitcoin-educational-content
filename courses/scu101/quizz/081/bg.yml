question: Какво ви позволява да правите уебсайтът Have I Been Pwned?
answer: Проверете дали имейл адресът е бил компрометиран.
wrong_answers:
  - Генерирайте нови, силни и случайни пароли.
  - Създаване на защитена пощенска кутия за имейли.
  - Синхронизирайте имейл акаунти за по-лесно използване.
explanation: |
  Този сайт помага да се откриват нарушения на сигурността на данните и да се проверява сигурността на даден имейл адрес.
reviewed: true
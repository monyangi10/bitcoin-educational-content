question: ทักษะที่จำเป็นในด้านความปลอดภัยทางไซเบอร์มีอะไรบ้าง?
answer: การวิเคราะห์บันทึก, การตอบสนองต่อเหตุการณ์
wrong_answers:
  - ออกแบบกราฟิก, ตัดต่อวิดีโอ
  - การขาย, การตลาด
  - การทำอาหาร, การอบ
explanation: |
  บทนี้กล่าวถึงการวิเคราะห์บันทึกและการตอบสนองต่อเหตุการณ์เป็นทักษะบางประการที่จำเป็นในความปลอดภัยทางไซเบอร์
reviewed: true
question: Какви са някои от уменията, необходими в областта на киберсигурността?
answer: Анализ на логове, реагиране на инциденти
wrong_answers:
  - Графичен дизайн, редактиране на видео
  - Продажби, маркетинг
  - Готвене, печене
explanation: |
  В главата се споменават анализът на логовете и реакцията при инциденти като
  някои от уменията, необходими в областта на киберсигурността.
reviewed: true
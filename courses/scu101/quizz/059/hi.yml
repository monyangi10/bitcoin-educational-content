question: साइबर सुरक्षा में किन कौशलों की आवश्यकता होती है?
answer: लॉग विश्लेषण, घटना प्रतिक्रिया
wrong_answers:
  - ग्राफिक डिजाइन, वीडियो संपादन
  - बिक्री, विपणन
  - खाना बनाना, बेकिंग
explanation: |
  अध्याय में लॉग विश्लेषण और घटना प्रतिक्रिया को साइबर सुरक्षा में आवश्यक कौशल के रूप में उल्लेख किया गया है।
reviewed: true

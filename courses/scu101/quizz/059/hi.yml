question: साइबर सुरक्षा में कुछ जरूरी स्किल्स क्या हैं?
answer: लॉग विश्लेषण, घटना प्रतिक्रिया
wrong_answers:
  - ग्राफिक डिज़ाइन, वीडियो एडिटिंग
  - बिक्री, विपणन
  - पकाना, बेकिंग
explanation: |
  अध्याय में लॉग विश्लेषण और घटना प्रतिक्रिया का जिक्र है
  साइबर सुरक्षा में ज़रूरी कुछ कौशल:  

1. **नेटवर्किंग की समझ** (Understanding of Networking)  
2. **कोडिंग/प्रोग्रामिंग** (Coding/Programming)  
3. **सिस्टम हैकिंग का ज्ञान** (Knowledge of System Hacking)  
4. **खतरों का विश्लेषण** (Threat Analysis)  
5. **डेटा प्रोटेक्शन** (Data Protection)  
6. **क्रिप्टोग्राफी** (Cryptography)  
7. **समस्या-समाधान क्षमता** (Problem-Solving Skills)  
8. **कानूनी और नैतिक जागरूकता** (Legal & Ethical Awareness)  

ये कुछ मुख्य स्किल्स हैं जो साइबर सिक्योरिटी में काम करने के लिए ज़रूरी होते हैं।
reviewed: true
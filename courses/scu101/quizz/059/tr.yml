question: Siber güvenlik alanında ihtiyaç duyulan bazı beceriler nelerdir?
answer: Günlük (log) analizi, olay müdahalesi
wrong_answers:
  - Grafik tasarım, video düzenleme
  - Satış, pazarlama
  - Pişirme, fırınlama
explanation: |
  Bölümde günlük (log) analizi ve olay müdahalesinin,
  siber güvenlikte ihtiyaç duyulan bazı beceriler olduğundan bahsedilmektedir.
reviewed: true

question: Siber güvenlik alanında ihtiyaç duyulan bazı beceriler nelerdir?
answer: Günlük analizi, olay müdahalesi
wrong_answers:
  - Grafik tasarım, video düzenleme
  - Satış, pazarlama
  - Pişirme, fırınlama
explanation: |
  Bölümde günlük analizi ve olay müdahalesinden şu şekilde bahsedilmektedir
  siber güvenlikte ihtiyaç duyulan bazı beceriler.
reviewed: true
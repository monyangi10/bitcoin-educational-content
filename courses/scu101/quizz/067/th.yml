question: ข้อกังวลหลักเกี่ยวกับการลงชื่อเข้าใช้ครั้งเดียว (SSO) ที่เสนอโดยยักษ์ใหญ่อินเทอร์เน็ตคืออะไร?
answer: มันก่อให้เกิดปัญหาในแง่ของความพร้อมใช้งานและความเสี่ยงของการเซ็นเซอร์
wrong_answers:
  - มันยากที่จะใช้
  - มันต้องการพื้นที่จัดเก็บมาก
  - มันไม่เข้ากันกับเว็บไซต์ทั้งหมด
explanation: |
  การลงชื่อเข้าใช้ครั้งเดียว (SSO) ที่เสนอโดยยักษ์ใหญ่อินเทอร์เน็ตก่อให้เกิดปัญหาในแง่ของความพร้อมใช้งานและความเสี่ยงของการเซ็นเซอร์ เนื่องจากหากผู้ให้บริการ SSO ประสบปัญหาขัดข้องหรือเลือกที่จะบล็อกผู้ใช้ ผู้ใช้อาจสูญเสียการเข้าถึงบริการทั้งหมดที่ใช้ SSO นั้นสำหรับการตรวจสอบสิทธิ์
reviewed: true
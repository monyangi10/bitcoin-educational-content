question: 거대 인터넷 기업이 제공하는 싱글 사인온(SSO)의 주요 우려 사항은 무엇인가요?
answer: 이는 가용성 및 검열 위험 측면에서 문제를 야기합니다.
wrong_answers:
  - 사용하기 어렵습니다.
  - 많은 저장 공간이 필요합니다.
  - 모든 웹사이트와 호환되는 것은 아닙니다.
explanation: |
  거대 인터넷 기업이 제공하는 싱글 사인온(SSO)은 가용성과 검열 위험 측면에서
  가용성 및 검열 위험 측면에서 문제가 있습니다.
  SSO 제공업체가 서비스 중단을 경험하거나
  또는 사용자를 차단하기로 결정하면 사용자는 인증에 해당 SSO를 사용하는
  모든 서비스에 액세스할 수 없게 될 수 있기 때문입니다.
reviewed: true
question: इंटरनेट की बड़ी कंपनियों द्वारा दिए जाने वाले सिंगल साइन-ऑन (SSO) में मुख्य चिंता क्या है?
answer: यह उपलब्धता और सेंसरशिप के खतरों के मामले में दिक्कतें पैदा करता है।
wrong_answers:
  - इसका इस्तेमाल करना मुश्किल होता है।
  - इसे बहुत ज़्यादा स्टोरेज स्पेस की आवश्यकता होती है।
  - यह सभी वेबसाइट्स के साथ काम नहीं करता है।
explanation: |
  इंटरनेट दिग्गजों द्वारा प्रदान किया गया सिंगल साइन-ऑन (SSO) उपलब्धता
  और सेंसरशिप के जोखिमों के संदर्भ में समस्याएँ पैदा करता है। 
  ऐसा इसलिए है क्योंकि यदि SSO प्रदाता में कोई तकनीकी खराबी आ जाए
  या वह किसी उपयोगकर्ता को अवरुद्ध करने का निर्णय ले ले,
  तो उपयोगकर्ता उन सभी सेवाओं तक पहुँच खो सकता है जो प्रमाणीकरण के लिए उसी SSO का उपयोग करती हैं।
reviewed: true

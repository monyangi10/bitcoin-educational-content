question: इंटरनेट की बड़ी कंपनियों द्वारा दिए जाने वाले सिंगल साइन-ऑन (SSO) में मुख्य चिंता क्या है?
answer: यह उपलब्धता और सेंसरशिप के खतरों के मामले में दिक्कतें पैदा करता है।
wrong_answers:
  - इस्तेमाल करना मुश्किल है।
  - इसे बहुत ज़्यादा स्टोरेज स्पेस चाहिए।
  - यह सभी वेबसाइट्स के साथ काम नहीं करता है।
explanation: |
  इंटरनेट दिग्गजों द्वारा दिया जाने वाला सिंगल साइन-ऑन (SSO) खतरा पैदा करता है...
  उपलब्धता और सेंसरशिप के जोखिम के मामले में समस्याएँ।
  ऐसा इसलिए है क्योंकि अगर SSO प्रदाता (सिंगल साइन-ऑन प्रदाता) की सेवा बंद हो जाती है
  या अगर कोई यूज़र को ब्लॉक करने का फैसला करता है, तो उस यूज़र की पहुंच खत्म हो सकती है
  उन सभी सेवाओं को जो प्रमाणीकरण के लिए उस SSO का उपयोग करती हैं।
reviewed: true
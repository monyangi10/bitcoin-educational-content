question: Каква е основната причина за безпокойство, свързана с предлаганата от интернет гигантите система за единно регистриране (SSO)?
answer: Това създава проблеми по отношение на достъпността и рисковете от цензура.
wrong_answers:
  - Трудно е да се използва.
  - Тя изисква много място за съхранение.
  - Той не е съвместим с всички уебсайтове.
explanation: |
  Предлаганото от интернет гигантите единно влизане (SSO) представлява
  проблеми по отношение на достъпността и рисковете от цензура.
  Това е така, защото ако доставчикът на SSO прекъсне работа
  или реши да блокира даден потребител, той може да загуби достъп до
  всички услуги, които използват този SSO за удостоверяване.
reviewed: true
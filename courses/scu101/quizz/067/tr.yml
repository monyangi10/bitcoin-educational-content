question: İnternet devleri tarafından sunulan Tek Oturum Açma (SSO) ile ilgili temel endişe nedir?
answer: Erişilebilirlik ve sansür riski açısından sorun teşkil etmektedir.
wrong_answers:
  - Kullanımı zordur.
  - Çok fazla depolama alanı gerektirir.
  - Tüm web siteleri ile uyumlu değildir.
explanation: |
  İnternet devleri tarafından sunulan Tek Oturum Açma (SSO)
  erişilebilirlik ve sansür riskleri açısından sorunludur.
  Bunun nedeni, SSO sağlayıcısının bir kesinti yaşaması 
  veya bir kullanıcıyı engellemesi durumunda, kullanıcının
  kimlik doğrulama için bu SSO'yu kullanan tüm hizmetlere erişimi kaybetmesine neden olabilir.
reviewed: true

question: 컴퓨터에서 바이러스가 발견되면 어떻게 해야 하나요?
answer: 인터넷 연결을 끊고 전체 바이러스 백신 검사를 수행한 후 감염된 파일을 삭제하세요.
wrong_answers:
  - 컴퓨터를 정상적으로 계속 사용합니다.
  - 컴퓨터를 끄고 몇 시간 동안 그대로 둡니다.
  - 컴퓨터의 모든 파일을 삭제합니다.
explanation: |
  컴퓨터에서 바이러스가 발견되면 인터넷 연결을 끊어 바이러스가 확산되거나 해커와 통신하는 것을 방지하세요. 그런 다음 바이러스 백신 전체 검사를 실행하고 감염된 파일을 삭제하세요.
reviewed: true
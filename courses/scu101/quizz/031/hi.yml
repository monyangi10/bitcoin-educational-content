question: अगर आप अपने कंप्यूटर में वायरस का पता लगाते हैं तो आपको क्या करना चाहिए?
answer: इसे इंटरनेट से डिस्कनेक्ट करें, पूरा एंटीवायरस स्कैन चलाएं, और संक्रमित फाइलों को डिलीट कर दें।
wrong_answers:
  - कंप्यूटर को सामान्य तरीके से इस्तेमाल जारी रखें।
  - कंप्यूटर को बंद करें और इसे कुछ घंटों तक बंद रखें।
  - कंप्यूटर पर सारी फाइलें डिलीट कर दो।
explanation: |
  यदि आप अपने कंप्यूटर में वायरस का पता लगाते हैं,
  तो इसे इंटरनेट से डिस्कनेक्ट कर दें ताकि वायरस फैल न सके 
  या हैकर से संपर्क न कर सके।
  उसके बाद, पूर्ण एंटीवायरस स्कैन चलाएं और संक्रमित फ़ाइलों को हटा दें।
reviewed: true

question: अगर आपके कंप्यूटर में वायरस पकड़ में आ जाए तो क्या करना चाहिए?
answer: इंटरनेट से डिस्कनेक्ट कर दो, पूरा एंटीवायरस स्कैन करो, और संक्रमित फाइलों को डिलीट कर दो।
wrong_answers:
  - कंप्यूटर को सामान्य तरीके से इस्तेमाल करते रहें।
  - कंप्यूटर बंद कर दो और कुछ घंटों के लिए ऐसे ही छोड़ दो।
  - कंप्यूटर पर सारी फाइलें डिलीट कर दो।
explanation: |
  अगर आपके कंप्यूटर में वायरस पकड़ में आता है, तो आपको
  इंटरनेट से डिस्कनेक्ट कर दो, वायरस को फैलने से रोकने के लिए।
  हैकर के साथ संपर्क या संवाद करना। फिर, एक
  पूरा एंटीवायरस स्कैन करो और संक्रमित फाइलों को डिलीट कर दो।
reviewed: true
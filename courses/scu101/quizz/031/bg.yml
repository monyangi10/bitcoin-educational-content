question: Какво трябва да направите, ако откриете вирус в компютъра си?
answer: Изключете го от интернет, извършете пълно антивирусно сканиране и изтрийте заразените файлове.
wrong_answers:
  - Продължете да използвате компютъра нормално.
  - Изключете компютъра и го оставете изключен за няколко часа.
  - Изтрийте всички файлове в компютъра.
explanation: |
  Ако откриете вирус в компютъра си, изключете го от интернет, за да предотвратите разпространението му или комуникацията с хакера. След това извършете пълно антивирусно сканиране и изтрийте заразените файлове.
reviewed: true
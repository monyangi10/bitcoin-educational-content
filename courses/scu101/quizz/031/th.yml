question: คุณควรทำอย่างไรหากตรวจพบไวรัสบนคอมพิวเตอร์ของคุณ?
answer: ตัดการเชื่อมต่อจากอินเทอร์เน็ต, ทำการสแกนไวรัสแบบเต็มรูปแบบ, และลบไฟล์ที่ติดไวรัส.
wrong_answers:
  - ใช้งานคอมพิวเตอร์ตามปกติต่อไป
  - ปิดคอมพิวเตอร์และปล่อยไว้สักสองสามชั่วโมง
  - ลบไฟล์ทั้งหมดบนคอมพิวเตอร์
explanation: |
  หากคุณตรวจพบไวรัสในคอมพิวเตอร์ของคุณ ให้ตัดการเชื่อมต่อจากอินเทอร์เน็ตเพื่อป้องกันไม่ให้แพร่กระจายหรือสื่อสารกับแฮ็กเกอร์ จากนั้นทำการสแกนไวรัสแบบเต็มรูปแบบและลบไฟล์ที่ติดไวรัส
reviewed: true
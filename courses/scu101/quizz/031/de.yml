question: Was solltest du tun, wenn du einen Virus auf deinem Computer entdeckst?
answer: Trenne ihn vom Internet, führe einen vollständigen Antivirus-Scan durch und lösche infizierte Dateien.
wrong_answers:
  - Den Computer normal weiterverwenden.
  - Den Computer ausschalten und für einige Stunden ausgeschaltet lassen.
  - Alle Dateien auf dem Computer löschen.
explanation: |
  Wenn du einen Virus auf deinem Computer entdeckst, solltest du
  ihn vom Internet trennen, um zu verhindern, dass sich der Virus
  ausbreitet oder mit dem Hacker kommuniziert. Führe dann einen
  vollständigen Antivirus-Scan durch und lösche infizierte Dateien.
reviewed: true

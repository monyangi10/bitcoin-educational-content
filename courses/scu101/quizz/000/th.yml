question: ความแตกต่างหลักระหว่างการท่องเว็บแบบส่วนตัวและการใช้เครือข่าย TOR คืออะไร?
answer: Tor ซ่อนที่อยู่ IP ของผู้ใช้ ในขณะที่การท่องเว็บแบบส่วนตัวไม่ทำเช่นนั้น
wrong_answers:
  - การท่องเว็บแบบส่วนตัวและ TOR เป็นสิ่งเดียวกัน
  - การท่องเว็บแบบส่วนตัวจะปิดบังที่อยู่ IP ของผู้ใช้ ในขณะที่ TOR ไม่ทำ
  - TOR ทิ้งร่องรอยในเครื่องคอมพิวเตอร์ของคุณ ในขณะที่การท่องเว็บแบบส่วนตัวไม่ทิ้งร่องรอย
explanation: |
  การท่องเว็บแบบส่วนตัวเป็นคุณสมบัติที่ป้องกันไม่ให้เบราว์เซอร์อินเทอร์เน็ตบันทึกประวัติการท่องเว็บ ไฟล์อินเทอร์เน็ตชั่วคราว ข้อมูลฟอร์ม คุกกี้ และชื่อผู้ใช้และรหัสผ่าน อย่างไรก็ตาม มันไม่ได้ซ่อนการท่องเว็บจากผู้ให้บริการอินเทอร์เน็ตของคุณ ในทางกลับกัน เครือข่าย TOR เสนอการไม่เปิดเผยตัวตนโดยการปกปิดที่อยู่ IP ของผู้ใช้และอนุญาตให้เข้าถึง Darknet
reviewed: true
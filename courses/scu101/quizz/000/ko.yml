question: 비공개 브라우징과 TOR 네트워크 사용의 주요 차이점은 무엇인가요?
answer: 토르는 사용자의 IP Address을 마스킹하는 반면, 비공개 브라우징은 그렇지 않습니다.
wrong_answers:
  - 비공개 브라우징과 TOR는 같은 개념입니다.
  - 비공개 브라우징은 사용자의 IP Address을 마스킹하는 반면, TOR는 그렇지 않습니다.
  - TOR는 컴퓨터에 로컬 흔적을 남기지만 비공개 브라우징은 그렇지 않습니다.
explanation: |
  비공개 브라우징은 인터넷
  브라우저가 인터넷 검색 기록, 임시 인터넷
  파일, 양식 데이터, 쿠키, 사용자 이름과 비밀번호를 저장하지 못하게 하는 기능입니다.
  하지만 인터넷 서비스 제공업체로부터 검색 기록을 숨기지는 않습니다
  서비스 제공업체로부터 브라우징을 숨기지는 않습니다. 반면, TOR 네트워크는 다음을 제공합니다
  사용자의 IP Address를 마스킹하여 익명성을 보장하고
  다크넷에 대한 액세스를 허용합니다.
reviewed: true
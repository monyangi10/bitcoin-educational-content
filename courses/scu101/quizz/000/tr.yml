question: Gizli tarama ile TOR ağını kullanmak arasındaki temel fark nedir?
answer: Tor, kullanıcının IP Address'ını maskelerken, Özel tarama bunu yapmaz.
wrong_answers:
  - Gizli tarama ve TOR aynı şeydir.
  - Gizli tarama kullanıcının IP Address'ini maskelerken TOR bunu yapmaz.
  - TOR bilgisayarınızda yerel izler bırakırken, gizli tarama bırakmaz.
explanation: |
  Gizli tarama, internette gezinmeyi engelleyen bir özelliktir
  tarayıcıların tarama geçmişini, geçici internet
  dosyaları, form verileri, çerezler ve kullanıcı adları ve parolaları.
  Ancak, taramayı internetinizden gizlemez
  hizmet sağlayıcı. Öte yandan, TOR ağı şunları sunar
  kullanıcının IP Address'sini maskeleyerek anonimlik sağlar ve
  darknet'e erişim.
reviewed: true
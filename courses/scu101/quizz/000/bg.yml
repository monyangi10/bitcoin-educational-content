question: Каква е основната разлика между частното сърфиране и използването на мрежата TOR?
answer: Tor маскира IP адреса на потребителя, докато частното сърфиране не го прави.
wrong_answers:
  - Частното сърфиране и TOR са едно и също нещо.
  - Частното сърфиране прикрива IP адреса на потребителя, докато TOR не го прави.
  - TOR оставя локални следи на компютъра ви, докато частното сърфиране не оставя такива.
explanation: |
  Частното сърфиране е функция, която предотвратява
  браузърите да съхраняват историята на сърфирането, временните
  файлове, данни от формуляри, бисквитки, както и потребителски имена и пароли.
  Въпреки това тя не скрива сърфирането от вашите интернет
  доставчика на услуги. От друга страна, мрежата TOR предлага
  анонимност, като маскира IP адреса на потребителя и позволява
  достъп до Darknet.
reviewed: true
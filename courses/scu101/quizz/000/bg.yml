question: Каква е основната разлика между поверителното сърфиране и използването на мрежата TOR?
answer: Tor маскира IP адреса на потребителя, докато поверителното сърфиране не го прави.
wrong_answers:
  - поверителното сърфиране и TOR са едно и също нещо.
  - поверителното сърфиране прикрива IP адреса на потребителя, докато TOR не го прави.
  - TOR оставя локални следи на компютъра ви, докато поверителното сърфиране не оставя такива.
explanation: |
  поверителното сърфиране е функция, която предотвратява
  браузърите да съхраняват историята на сърфирането, временните
  файлове, данни от формуляри, бисквитки, както и потребителски имена и пароли.
  Въпреки това тя не скрива сърфирането от вашите интернет
  доставчика на услуги. От друга страна, мрежата TOR предлага
  анонимност, като маскира IP адреса на потребителя и позволява
  достъп до Darknet.
reviewed: true

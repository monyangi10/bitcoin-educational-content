question: निजी ब्राउज़िंग और TOR नेटवर्क के बीच मुख्य अंतर क्या है?
answer: टॉर उपयोगकर्ता के आईपी (IP) पते को छुपा देता है, जबकि निजी ब्राउज़िंग ऐसा नहीं करता।
wrong_answers:
  - निजी ब्राउज़िंग और TOR एक ही चीज़ हैं।
  - निजी ब्राउज़िंग यूज़र का आईपी पते को छुपाती है, जबकि TOR ऐसा नहीं करता।
  - टॉर आपके कंप्यूटर पर स्थानीय निशान छोड़ देता है, जबकि निजी ब्राउज़िंग ऐसा नहीं करती।
explanation: |
  निजी ब्राउज़िंग एक सुविधा है जो इंटरनेट ब्राउज़र को
  ब्राउज़िंग हिस्ट्री, अस्थायी इंटरनेट फाइलें, 
  फॉर्म डेटा, कुकीज़, और उपयोगकर्ता नाम (यूज़रनेम) व पासवर्ड सहेजने से रोकती है।
  हालांकि, यह आपके ब्राउज़िंग को आपके इंटरनेट सेवा प्रदाता से छुपाता नहीं है
  वहीं, TOR नेटवर्क गुमनामी प्रदान करता है,
  क्योंकि यह उपयोगकर्ता के IP पते को छुपाता है 
  और डार्कनेट तक पहुंचने की अनुमति देता है।
reviewed: true

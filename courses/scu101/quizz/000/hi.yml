question: निजी ब्राउज़िंग और TOR नेटवर्क के बीच मुख्य अंतर क्या है?
answer: टॉर यूजर के आईपी Address को छुपा देता है, जबकि प्राइवेट ब्राउज़िंग ऐसा नहीं करता।
wrong_answers:
  - निजी ब्राउज़िंग और TOR एक ही चीज़ हैं।
  - प्राइवेट ब्राउज़िंग यूज़र का आईपी Address छुपा देती है, जबकि TOR ऐसा नहीं करता।
  - टॉर आपके कंप्यूटर पर स्थानीय निशान छोड़ देता है, जबकि प्राइवेट ब्राउज़िंग ऐसा नहीं करती।
explanation: |
  प्राइवेट ब्राउज़िंग एक ऐसा फीचर है जो इंटरनेट पर आपकी एक्टिविटी को सेव नहीं होने देता।
  ब्राउज़र ब्राउज़िंग हिस्ट्री, अस्थायी इंटरनेट डेटा स्टोर करने से रोकते हैं
  फाइलें, फॉर्म डेटा, कुकीज़, और यूज़रनेम व पासवर्ड।
  हालांकि, यह आपके इंटरनेट ब्राउज़िंग को छुपाता नहीं है
  सर्विस प्रोवाइडर। वहीं, TOR नेटवर्क ऑफर करता है...
  यूज़र के आईपी Address को मास्क करके और अनुमति देकर गुमनामी
  डार्कनेट तक पहुँच।
reviewed: true
question: विभिन्न ऑपरेटिंग सिस्टम्स पर डेटा एन्क्रिप्शन के लिए कुछ समाधान क्या हैं?
answer: विंडोज़ के लिए BitLocker, लिनक्स के लिए LUKS, और मैक के लिए बिल्ट-इन विकल्प।
wrong_answers:
  - लिनक्स के लिए BitLocker, मैक के लिए LUKS, और विंडोज़ के लिए बिल्ट-इन विकल्प।
  - मैक के लिए BitLocker, विंडोज़ के लिए LUKS, और लिनक्स के लिए बिल्ट-इन ऑप्शन।
  - सभी ऑपरेटिंग सिस्टम्स के लिए LUKS।
explanation: |
  अलग-अलग ऑपरेटिंग सिस्टम में डेटा एन्क्रिप्शन के अलग-अलग समाधान होते हैं
  BitLocker विंडोज़ के लिए है, LUKS लिनक्स के लिए है,
  और मैक में डेटा एन्क्रिप्शन के लिए एक इन-बिल्ट विकल्प उपलब्ध है।
reviewed: true

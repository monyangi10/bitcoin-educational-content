question: Farklı işletim sistemlerinde veri şifreleme için bazı çözümler nelerdir?
answer: Windows için BitLocker, Linux için LUKS ve Mac için yerleşik seçenek.
wrong_answers:
  - Linux için BitLocker, Mac için LUKS ve Windows için yerleşik seçenek.
  - Mac için BitLocker, Windows için LUKS ve Linux için yerleşik seçenek.
  - Tüm işletim sistemleri için LUKS.
explanation: |
  Farklı işletim sistemleri veri şifreleme için çeşitli çözümlere sahiptir. BitLocker Windows içindir, LUKS Linux içindir ve 
  Mac'in veri şifreleme için yerleşik bir seçeneği vardır.
reviewed: true

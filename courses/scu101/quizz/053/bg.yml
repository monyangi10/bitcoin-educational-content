question: Защо биометричните данни се смятат за по-малко сигурни от комбинацията от знание и притежание за 2FA?
answer: Биометричните данни трябва да останат в устройството за удостоверяване и да не се разкриват онлайн.
wrong_answers:
  - Биометричните данни се извличат по-лесно, дори ако се съхраняват офлайн в устройството за удостоверяване.
  - Биометричните данни са по-трудни за запомняне и за използване при използване на устройство за удостоверяване.
  - Инструментите за биометрични данни са по-скъпи за внедряване и поради това не са икономически ефективни в сравнение с други решения.
explanation: |
  Биометричните данни са по-малко защитени, защото трябва да останат на
  на устройството за удостоверяване и не могат да се разкриват онлайн. Ако
  бъдат разкрити онлайн, те могат да бъдат откраднати и използвани за
  неоторизиран достъп.
reviewed: true
question: Ni kuki amakuru y’ibinyabuzima abonwa ko adatekanye cane kuruta ubumenyi n’ubutunzi bihurikiye hamwe ku bijanye na 2FA?
answer: Amakuru y’ibinyabuzima akwiye kuguma ku gikoresho co kwemeza ko umuntu ari uwuriho kandi ntamenyekane kuri Internet.
wrong_answers:
  - Amakuru y’ibinyabuzima yoroshe gukuraho naho yoba atari ku murongo ku gikoresho co kwemeza.
  - Amakuru y’ibinyabuzima aragoye kwibuka no kuyakoresha igihe ukoresha igikoresho co kwemeza ko umuntu ari we.
  - Ibikoresho vy’amakuru y’ibinyabuzima birazimvye cane gushirwa mu ngiro rero ntibitwara amahera menshi ugereranyije n’ibindi bisubizo.
explanation: |
  Amakuru y’ibinyabuzima ntatekanye cane kuko akwiye kuguma ku
  igikoresho co kwemeza kandi ntibimenyekane kuri Internet. Nimba
  rimenyeshwa kuri Internet, rishobora kwibwa rikakoreshwa ku .
  gushikamwo ata wemerewe.
reviewed: true
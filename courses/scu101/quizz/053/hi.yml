question: बायोमेट्रिक डेटा को 2FA (टू-फैक्टर ऑथेंटिकेशन) में ज्ञान और स्वामित्व के कॉम्बिनेशन से कम सुरक्षित क्यों माना जाता है?
answer: बायोमेट्रिक डेटा को ऑथेंटिकेशन डिवाइस पर ही रहना चाहिए और ऑनलाइन डिस्क्लोज नहीं होना चाहिए।
wrong_answers:
  - बायोमेट्रिक डेटा को निकालना आसान होता है, भले ही वह ऑथेंटिकेशन डिवाइस पर ऑफ़लाइन स्टोर किया गया हो।
  - बायोमेट्रिक डेटा याद रखना और ऑथेंटिकेशन डिवाइस का इस्तेमाल करते वक्त इस्तेमाल करना दोनों ही मुश्किल होता है।
  - बायोमेट्रिक डेटा टूल्स को लागू करना ज्यादा महंगा है और इसलिए दूसरे समाधानों के मुकाबले ये किफायती नहीं हैं।
explanation: |
  बायोमेट्रिक डेटा कम सुरक्षित होता है क्योंकि यह हमेशा
  ऑथेंटिकेशन डिवाइस और ऑनलाइन खुलासा नहीं किया जाना चाहिए। अगर
  यह ऑनलाइन लीक हो जाता है, तो इसे चुराकर इस्तेमाल किया जा सकता है
  अनधिकृत पहुंच।
reviewed: true
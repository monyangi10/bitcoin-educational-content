question: बायोमेट्रिक डेटा को 2FA (टू-फैक्टर ऑथेंटिकेशन) के लिए ज्ञान और स्वामित्व के संयोजन की तुलना से कम सुरक्षित क्यों माना जाता है?
answer: बायोमेट्रिक डेटा को ऑथेंटिकेशन डिवाइस पर ही रहना चाहिए और ऑनलाइन साझा नहीं किया जाना चाहिए।
wrong_answers:
  - बायोमेट्रिक डेटा को प्रमाणीकरण डिवाइस पर ऑफलाइन रखने पर भी निकालना आसान होता है।
  - प्रमाणीकरण डिवाइस का उपयोग करते समय बायोमेट्रिक डेटा को याद रखना और उपयोग करना कठिन होता है।
  - बायोमेट्रिक उपकरणों को लागू करना ज्यादा महंगा है और इसलिए अन्य समाधानों की तुलना में किफायती नहीं हैं।
explanation: |
  बायोमेट्रिक डेटा कम सुरक्षित माना जाता है क्योंकि इसे प्रमाणीकरण डिवाइस पर ही रहना चाहिए
  और ऑनलाइन साझा नहीं किया जाना चाहिए।
  यदि यह ऑनलाइन साझा किया जाता है,
  तो इसे चुराया जा सकता है और अनधिकृत पहुंच के लिए उपयोग किया जा सकता है।
reviewed: true

question: 생체 인식 데이터가 2FA를 위한 지식과 소유물의 조합보다 덜 안전한 것으로 간주되는 이유는 무엇인가요?
answer: 생체 인식 데이터는 인증 장치에 남아 있어야 하며 온라인에 공개되어서는 안 됩니다.
wrong_answers:
  - 생체 인식 데이터는 인증 장치에서 오프라인 상태로 유지하더라도 쉽게 추출할 수 있습니다.
  - 생체 인식 데이터는 인증 장치를 사용할 때 기억하기도 어렵고 사용하기도 어렵습니다.
  - 생체 인식 데이터 도구는 구현 비용이 많이 들기 때문에 다른 솔루션에 비해 비용 효율적이지 않습니다.
explanation: |
  생체 인식 데이터는 인증 장치에 남아 있어야 하고 온라인에 공개되지 않아야 하므로 보안성이 떨어집니다
  온라인에 공개되지 않아야 하기 때문에 덜 안전합니다. 만약
  온라인에 공개되면 도난당하여 다음과 같은 용도로 사용될 수 있습니다
  무단 액세스에 사용될 수 있습니다.
reviewed: true
question: ทำไมข้อมูลไบโอเมตริกถึงถือว่ามีความปลอดภัยน้อยกว่าการใช้ความรู้ร่วมกับการครอบครองสำหรับการยืนยันตัวตนแบบสองปัจจัย (2FA)?
answer: ข้อมูลชีวมาตรควรเก็บไว้ในอุปกรณ์การยืนยันตัวตนและไม่ควรเปิดเผยทางออนไลน์
wrong_answers:
  - ข้อมูลไบโอเมตริกซ์สามารถดึงออกมาได้ง่ายขึ้นแม้ว่าจะถูกเก็บไว้แบบออฟไลน์บนอุปกรณ์การยืนยันตัวตนก็ตาม
  - ข้อมูลไบโอเมตริกซ์นั้นยากต่อการจดจำและใช้งานมากขึ้นเมื่อใช้กับอุปกรณ์ยืนยันตัวตน
  - เครื่องมือข้อมูลชีวมิติมีค่าใช้จ่ายสูงกว่าในการดำเนินการและดังนั้นจึงไม่คุ้มค่าทางเศรษฐกิจเมื่อเทียบกับโซลูชันอื่น ๆ
explanation: |
  ข้อมูลไบโอเมตริกซ์มีความปลอดภัยน้อยกว่าเพราะควรเก็บไว้ใน
  อุปกรณ์การยืนยันตัวตนและไม่ควรถูกเปิดเผยออนไลน์ หาก
  ถูกเปิดเผยออนไลน์ อาจถูกขโมยและใช้เพื่อ
  การเข้าถึงโดยไม่ได้รับอนุญาต
reviewed: true
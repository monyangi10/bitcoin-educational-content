question: साइबर सुरक्षा का वह कौन-सा पहलू है जिसे नियमित रूप से निगरानी की ज़रूरत होती है?
answer: खतरों का लगातार विकास
wrong_answers:
  - शेयर बाज़ार
  - मौसम
  - समाचार
explanation: |
  अध्याय में यह बताया गया है कि खतरों का लगातार विकास
  साइबर सुरक्षा में नियमित निगरानी की ज़रूरत बनाता है।
reviewed: true

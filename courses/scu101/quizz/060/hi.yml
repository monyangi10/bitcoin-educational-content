question: साइबर सुरक्षा का एक पहलू जिस पर नियमित निगरानी की ज़रूरत होती है, वह है **"नेटवर्क एक्टिविटी"**। इसमें अनधिकृत एक्सेस, संदिग्ध ट्रैफ़िक या हैकर्स की गतिविधियों को पकड़ने के लिए डेटा फ्लो और कनेक्शन की जाँच करना शामिल है। 🔍
answer: खतरों का लगातार बदलना
wrong_answers:
  - शेयर बाज़ार
  - मौसम
  - खबर
explanation: |
  अध्याय में यह बताया गया है कि खतरों का लगातार विकास
  साइबर सुरक्षा में नियमित निगरानी की ज़रूरत होती है।
reviewed: true
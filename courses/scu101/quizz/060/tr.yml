question: Siber güvenliğin düzenli izleme gerektiren yönlerinden biri nedir?
answer: Tehditlerin sürekli evrimi
wrong_answers:
  - Borsa
  - Hava durumu
  - Haberler
explanation: |
  Bölüm, siber güvenlikte tehditlerin sürekli gelişiminin 
   düzenli izleme gerektirdiğini belirtmektedir.
reviewed: true

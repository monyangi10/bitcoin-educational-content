question: Кой е един от аспектите на киберсигурността, който изисква редовно наблюдение?
answer: Постоянното развитие на заплахите
wrong_answers:
  - Фондовият пазар
  - Времето
  - Новините
explanation: |
  В главата се споменава, че постоянното развитие на заплахите
  в киберсигурността изисква редовно наблюдение.
reviewed: true
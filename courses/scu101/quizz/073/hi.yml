question: पासवर्ड मैनेजर का सबसे बड़ा फायदा क्या है?
answer: सिर्फ एक मास्टर पासवर्ड याद रखना।
wrong_answers:
  - अब नए पासवर्ड नहीं बनाना।
  - सभी पासवर्ड याद रखने में सहायक स्मरण (म्नेमोनिक) तकनीकों का उपयोग करना।
  - ऑनलाइन खातों की जरूरत खत्म करना।
explanation: |
  उपयोगकर्ता को सभी अन्य पासवर्ड तक पहुँचने के लिए केवल एक पासवर्ड याद रखना होता है।
reviewed: true

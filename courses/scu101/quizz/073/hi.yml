question: पासवर्ड मैनेजर का सबसे बड़ा फायदा क्या है?
answer: सिर्फ एक मास्टर पासवर्ड याद रखना।
wrong_answers:
  - नए पासवर्ड बनाना बंद कर दिया।
  - सभी पासवर्ड याद रखने में मदद करना Mnemonic तकनीकों का उपयोग करके।
  - ऑनलाइन खातों की जरूरत खत्म करना।
explanation: |
  यूज़र को बस एक ही पासवर्ड याद रखना होगा, बाकी सभी पासवर्ड्स तक पहुँचने के लिए।
reviewed: false
question: แนวทางปฏิบัติที่แนะนำสำหรับความปลอดภัยที่เหมาะสมด้วยการยืนยันตัวตนที่แข็งแกร่งคืออะไร?
answer: ใช้ที่อยู่อีเมลที่ปลอดภัยและตัวจัดการรหัสผ่าน และใช้ 2FA ด้วย YubiKeys
wrong_answers:
  - ใช้รหัสผ่านเดียวกันสำหรับทุกบัญชี และหลีกเลี่ยงการใช้ 2FA
  - ใช้รหัสผ่านง่าย ๆ และพึ่งพาข้อมูลไบโอเมตริกสำหรับ 2FA
  - ใช้ที่อยู่อีเมลที่ปลอดภัย แต่หลีกเลี่ยงการใช้ตัวจัดการรหัสผ่านและ 2FA
explanation: |
  เพื่อความปลอดภัยสูงสุด ขอแนะนำให้ใช้ที่อยู่อีเมลที่ปลอดภัย ตัวจัดการรหัสผ่านที่ปลอดภัย และใช้ 2FA ด้วย YubiKeys นอกจากนี้ยังควรซื้อ YubiKeys สองอันเพื่อเตรียมพร้อมสำหรับการสูญหายหรือการโจรกรรม
reviewed: true
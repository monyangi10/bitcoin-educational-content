question: इष्टतम सुरक्षा के लिए मजबूत प्रमाणीकरण (स्ट्रॉन्ग ऑथेंटिकेशन) के क्या अनुशंसित तरीके हैं?
answer: सुरक्षित ईमेल Address का इस्तेमाल करें, एक सुरक्षित पासवर्ड मैनेजर अपनाएं, और YubiKeys का उपयोग करके 2FA (टू-फैक्टर ऑथेंटिकेशन) को अपनाएं।
wrong_answers:
  - सभी अकाउंट्स के लिए एक ही पासवर्ड इस्तेमाल करो, और 2FA (टू-फैक्टर ऑथेंटिकेशन) से बचो
  - एक साधा पासवर्ड इस्तेमाल करो और 2FA के लिए बायोमेट्रिक डेटा पर भरोसा करो
  - सुरक्षित ईमेल Address का इस्तेमाल करो, लेकिन पासवर्ड मैनेजर और 2FA से बचो।
explanation: |
  बेहतर सुरक्षा के लिए, एक सुरक्षित पासवर्ड का उपयोग करने की सलाह दी जाती है।
  ईमेल Address, एक सुरक्षित पासवर्ड मैनेजर, और 2FA अपनाएं
  यूबीकी (YubiKeys) का उपयोग करना। दो खरीदने की भी सलाह दी जाती है।
  यूबीकीज़ को खोने या चोरी होने की आशंका से बचाने के लिए।
reviewed: true
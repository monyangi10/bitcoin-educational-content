question: सर्वोत्तम सुरक्षा के लिए मजबूत प्रमाणीकरण (स्ट्रॉन्ग ऑथेंटिकेशन) के क्या अनुशंसित तरीके हैं?
answer: एक सुरक्षित ईमेल पता और पासवर्ड मैनेजर का उपयोग करें, और YubiKeys का उपयोग करके 2FA (टू-फैक्टर ऑथेंटिकेशन) को अपनाएं।
wrong_answers:
  - सभी खातों के लिए एक सामान्य पासवर्ड का इस्तेमाल करें, और 2FA (टू-फैक्टर ऑथेंटिकेशन) से बचें
  - एक साधारण पासवर्ड इस्तेमाल करें और 2FA के लिए बायोमेट्रिक डेटा पर भरोसा करें
  - सुरक्षित ईमेल पता का इस्तेमाल करें, लेकिन पासवर्ड मैनेजर और 2FA से बचें।
explanation: |
  बेहतर सुरक्षा के लिए, एक सुरक्षित ईमेल पता, एक सुरक्षित पासवर्ड मैनेजर का उपयोग करने और
  YubiKeys के माध्यम से 2FA अपनाने की अनुशंसा की जाती है।
  इसके अलावा, हानि या चोरी की आशंका को ध्यान में रखते हुए 
  दो YubiKeys खरीदने की भी भी सलाह दी जाती है।
reviewed: true

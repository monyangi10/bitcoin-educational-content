question: 강력한 인증으로 보안을 최적화하기 위한 권장 사례는 무엇인가요?
answer: 보안 이메일 Address과 비밀번호 관리자를 사용하고, YubiKeys를 사용하여 2FA를 도입하세요.
wrong_answers:
  - 모든 계정에 공통 비밀번호를 사용하고 2단계 인증은 피하세요
  - 간단한 비밀번호를 사용하고 2FA에 생체 인식 데이터를 사용하세요
  - 보안 이메일 Address을 사용하되, 비밀번호 관리자 및 2FA는 피하세요
explanation: |
  최적의 보안을 위해 안전한 비밀번호 관리자인
  보안 비밀번호 관리자인 Address 이메일을 사용하고 2단계 인증(
  를 사용하는 것이 좋습니다. 또한 분실이나 도난에 대비해 두 개의
  분실이나 도난에 대비해 두 개의 YubiKey를 구입하는 것도 좋습니다.
reviewed: true
question: Ni ibihe bikorwa vyemewe kugira ngo umuntu agire umutekano mwiza cane afise ivyemezo bikomeye?
answer: Koresha imeyili itekanye Address n’umucungerezi w’ijambobanga, kandi wemere 2FA ukoresheje YubiKeys.
wrong_answers:
  - Koresha ijambobanga rusangi kuri konti zose, kandi wirinde 2FA
  - Koresha ijambobanga ryoroshe kandi wizigire amakuru ya biometric ya 2FA
  - Koresha imeyili itekanye Address, ariko wirinde abacungera ijambobanga na 2FA
explanation: |
  Kugira ngo ugire umutekano mwiza, birakenewe ko ukoresha umutekano
  email Address, umucungerezi w'ijambobanga ry'umutekano, kandi wemere 2FA
  ukoresheje imfunguruzo za Yubi. Ni vyiza kandi kugura bibiri .
  YubiKeys kugira ngo witege imbere y’igihe ukubura canke ubusuma.
reviewed: true
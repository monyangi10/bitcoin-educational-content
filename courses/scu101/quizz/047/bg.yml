question: Каква е целта на въвеждането на 2FA?
answer: За да защитите онлайн акаунтите си от неоторизиран достъп.
wrong_answers:
  - За да затрудните достъпа до собствения си акаунт
  - За проследяване на вашите онлайн дейности
  - Увеличаване на скоростта на интернет връзката
explanation: |
  2FA добавя допълнително ниво на сигурност към вашите онлайн
  акаунти. Дори ако хакер получи паролата ви, той няма да
  няма да може да получи достъп до профила ви без втората
  фактор за проверка.
reviewed: true
question: 2FA लागू करने का मकसद क्या है?
answer: अपने ऑनलाइन अकाउंट्स को अनधिकृत पहुंच से बचाने के लिए।
wrong_answers:
  - अपने खुद के अकाउंट तक पहुँचने में कठिनाई पैदा करना
  - अपनी ऑनलाइन गतिविधियों को ट्रैक करना
  - अपने इंटरनेट कनेक्शन की गति बढ़ाना
explanation: |
  2FA आपके ऑनलाइन अकाउंट्स में अतिरिक्त सुरक्षा परत जोड़ता है। 
  भले ही कोई हैकर आपका पासवर्ड प्राप्त कर ले,
  वह दूसरे सत्यापन कारक के बिना आपके खाते तक पहुँच नहीं पाएगा।
reviewed: true

question: 2FA लागू करने का मकसद क्या है?
answer: अपने ऑनलाइन अकाउंट्स को अनधिकृत पहुंच से बचाने के लिए।
wrong_answers:
  - अपने खुद के अकाउंट तक पहुँचने को तुम्हारे लिए मुश्किल बनाने के लिए
  - अपनी ऑनलाइन गतिविधियों को ट्रैक करने के लिए
  - अपने इंटरनेट कनेक्शन की स्पीड बढ़ाने के लिए
explanation: |
  2FA आपके ऑनलाइन सुरक्षा में एक अतिरिक्त Layer जोड़ता है
  खाते। अगर कोई हैकर आपका पासवर्ड चुरा भी ले, तो भी वो...
  बिना दूसरे स्टेप के आप अपने अकाउंट तक नहीं पहुँच पाएँगे।
  वेरिफिकेशन फैक्टर
reviewed: true
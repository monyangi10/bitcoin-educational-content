question: 2FA'nın uygulanmasının amacı nedir?
answer: Çevrimiçi hesaplarınızı yetkisiz erişime karşı korumak için.
wrong_answers:
  - Kendi hesabınıza erişmenizi zorlaştırmak için
  - Çevrimiçi etkinliklerinizi takip etmek için
  - İnternet bağlantınızın hızını artırmak için
explanation: |
  2FA, çevrimiçi ortamınıza ekstra bir Layer güvenlik ekler
  hesaplar. Bir bilgisayar korsanı şifrenizi ele geçirse bile
  olmadan hesabınıza erişemezsiniz
  doğrulama faktörü.
reviewed: true
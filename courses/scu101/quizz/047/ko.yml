question: 2FA를 구현하는 목적은 무엇인가요?
answer: 무단 액세스로부터 온라인 계정을 보호합니다.
wrong_answers:
  - 자신의 계정에 액세스하기 어렵게 만들려면 다음과 같이 하세요
  - 온라인 활동을 추적하려면
  - 인터넷 연결 속도를 높이려면
explanation: |
  2FA는 온라인 계정에 Layer의 보안을 추가합니다
  계정에 보안을 강화합니다. 해커가 비밀번호를 알아낸다고 해도
  두 번째 인증 요소 없이는 계정에 액세스할 수 없습니다
  인증 요소 없이는 계정에 액세스할 수 없습니다.

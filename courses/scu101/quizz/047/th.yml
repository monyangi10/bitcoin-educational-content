question: วัตถุประสงค์ของการใช้ 2FA คืออะไร?
answer: เพื่อป้องกันบัญชีออนไลน์ของคุณจากการเข้าถึงโดยไม่ได้รับอนุญาต
wrong_answers:
  - เพื่อทำให้การเข้าถึงบัญชีของคุณเองยากขึ้น
  - เพื่อติดตามกิจกรรมออนไลน์ของคุณ
  - เพื่อเพิ่มความเร็วของการเชื่อมต่ออินเทอร์เน็ตของคุณ
explanation: |
  2FA เพิ่มชั้นความปลอดภัยพิเศษให้กับบัญชีออนไลน์ของคุณ แม้ว่าผู้ไม่หวังดีจะได้รหัสผ่านของคุณไป พวกเขาก็จะไม่สามารถเข้าถึงบัญชีของคุณได้หากไม่มีปัจจัยการยืนยันตัวตนที่สอง
reviewed: true
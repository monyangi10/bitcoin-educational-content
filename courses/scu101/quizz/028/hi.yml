question: हैकर्स का पहला हमला वेक्टर क्या होता है?
answer: ईमेल्स
wrong_answers:
  - सोशल मीडिया
  - ऑनलाइन शॉपिंग वेबसाइट्स
  - बैंकिंग वेबसाइट्स
explanation: |
  हैकर्स के लिए ईमेल हमले का पहला ज़रिया होते हैं। वे इस्तेमाल करते हैं
  फ़िशिंग संवेदनशील जानकारी जैसे निकालने की कोशिश करता है
  तुम्हारे क्रेडेंशियल्स और पासवर्ड्स।
reviewed: false
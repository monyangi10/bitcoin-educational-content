question: हैकर्स के लिए पहला हमला वेक्टर क्या होता है?
answer: ईमेल्स
wrong_answers:
  - सोशल मीडिया
  - ऑनलाइन शॉपिंग वेबसाइट्स
  - बैंकिंग वेबसाइट्स
explanation: |
  ईमेल हैकर्स के लिए पहला हमला वेक्टर होते हैं।
  वे फ़िशिंग प्रयासों का उपयोग करके आपकी संवेदनशील जानकारी जैसे आपके
  क्रेडेंशियल्स और पासवर्ड्स प्राप्त करने की कोशिश करते हैं।
reviewed: true

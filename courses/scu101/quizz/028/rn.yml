question: Ni igiki ca mbere gitera abasuma?
answer: Imeyili
wrong_answers:
  - Imbuga ngurukanabumenyi
  - Imbuga zo kugura kuri internet
  - Imbuga za banki
explanation: |
  Emails ni zo zibanza gutera abasuma. Bakoresha
  ubuhendanyi buragerageza gukura amakuru y'agaciro nk'
  ivyemezo vyawe n’amajambo banga yawe.

question: Кой е първият вектор на атака за хакерите?
answer: Имейли
wrong_answers:
  - Социални медии
  - Уебсайтове за онлайн пазаруване
  - Уебсайтове за банкиране
explanation: |
  Имейлите са първият вектор на атака за хакерите. Те използват
  фишинг, за да извлекат чувствителна информация, като например
  вашите идентификационни данни и пароли.
reviewed: false
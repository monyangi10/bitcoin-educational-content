question: 矢แรกของการโจมตีสำหรับแฮกเกอร์คืออะไร?
answer: อีเมล
wrong_answers:
  - โซเชียลมีเดีย
  - เว็บไซต์ช้อปปิ้งออนไลน์
  - เว็บไซต์ธนาคาร
explanation: |
  อีเมลเป็นช่องทางแรกที่แฮกเกอร์ใช้ในการโจมตี พวกเขาใช้
  ความพยายามฟิชชิ่งเพื่อดึงข้อมูลที่ละเอียดอ่อน เช่น
  ข้อมูลรับรองและรหัสผ่านของคุณ
reviewed: false
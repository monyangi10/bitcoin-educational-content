question: Über welche Aspekte der Netzwerktechnik ist Wissen in der Cybersicherheit erforderlich?
answer: TCP/IP, VPN, Firewall
wrong_answers:
  - HTTP, FTP, SMTP
  - POP3, IMAP, SSH
  - DHCP, DNS, ARP
explanation: |
  Das Kapitel erwähnt TCP/IP, VPN und Firewall als einige der
  Aspekte der Netzwerktechnik, über die Wissen in der
  Cybersicherheit erforderlich ist.
reviewed: true

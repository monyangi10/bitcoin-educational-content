question: Какви аспекти на познанията за мрежите са необходими в киберсигурността?
answer: TCP/IP, VPN, защитна стена
wrong_answers:
  - HTTP, FTP, SMTP
  - ПОП3, IMAP, SSH
  - DHCP, DNS, ARP
explanation: |
  В главата се споменават TCP/IP, VPN и защитна стена като някои аспекти на мрежовите познания, необходими за киберсигурността.
reviewed: true
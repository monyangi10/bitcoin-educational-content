question: साइबर सुरक्षा में नेटवर्क ज्ञान के कौन-कौन से पहलू आवश्यक हैं?
answer: टीसीपी/आईपी(TCP/IP), वीपीएन(VPN), फायरवॉल(firewall)
wrong_answers:
  - एचटीटीपी (HTTP), एफटीपी (FTP), एसएमटीपी (SMTP)
  - पॉप3 (POP3), आईमैप (IMAP), एसएसएच (SSH)
  - डीएचसीपी (DHCP), डीएनएस (DNS), एआरपी (ARP)
explanation: |
  अध्याय में टीसीपी/आईपी, वीपीएन और फ़ायरवॉल को साइबर सुरक्षा
  में आवश्यक नेटवर्क ज्ञान के कुछ
  पहलुओं के रूप में उल्लेख किया गया है।
reviewed: true

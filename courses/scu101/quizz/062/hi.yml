question: साइबर सुरक्षा में नेटवर्क ज्ञान के कुछ पहलू क्या हैं?
answer: टीसीपी/आईपी, वीपीएन, फायरवॉल
wrong_answers:
  - HTTP, FTP, SMTP
  - पॉप3 (POP3), आईमैप (IMAP), एसएसएच (SSH)
  - डीएचसीपी (DHCP), डीएनएस (DNS), एआरपी (ARP)
explanation: |
  अध्याय में कुछ प्रमुख चीज़ों के रूप में टीसीपी/आईपी, वीपीएन और फ़ायरवॉल का ज़िक्र किया गया है।
  नेटवर्क ज्ञान के वे पहलू जिनकी जरूरत है
  साइबर सुरक्षा
reviewed: true
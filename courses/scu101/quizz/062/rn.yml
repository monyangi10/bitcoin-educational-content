question: Ni imice iyihe y’ubumenyi bw'imihora ikenewe mu bijanye n’umutekano wo kuri Internet?
answer: TCP/IP, VPN, firewall
wrong_answers:
  - HTTP, FTP, SMTP
  - POP3, IMAP, SSH
  - DHCP, DNS, ARP
explanation: |
  Igice kivuga TCP/IP, VPN, na firewall nk’imice imwe y’ubumenyi bw’imihora ikenewe mu bijanye n'umutekano wo kuri interineti.
reviewed: true

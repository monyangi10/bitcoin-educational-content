question: Siber güvenlikte ağ teknolojisiyle ilgili bilgi sahibi olunması gereken başlıca kunular hangileridir?
answer: TCP/IP, VPN, güvenlik duvarı (firewall)
wrong_answers:
  - HTTP, FTP, SMTP
  - POP3, IMAP, SSH
  - DHCP, DNS, ARP
explanation: |
  Bu bölümde TCP/IP, VPN ve güvenlik duvarından (firewall) siber güvenlikte ihtiyaç duyulan 
  ağ teknolojisinin bazı yönleri olarak bahsedilmektedir.
reviewed: true

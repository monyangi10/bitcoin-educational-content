question: İyi bir parolanın özellikleri nelerdir?
answer: Uzun, karmaşık, benzersiz ve kişisel bilgilere dayanmayan.
wrong_answers:
  - Kısa, basit ve hatırlaması kolay.
  - Doğum tarihleri ve isimler gibi kişisel bilgilere dayanmaktadır.
  - Tüm hesaplar için aynı parola.
explanation: |
  İyi bir parola uzun (en az 12 karakter), karmaşık
  (büyük ve küçük harflerin, rakamların ve
  sembolleri), benzersiz (farklı hesaplar için tekrar kullanılmayan) ve
  kişisel bilgilere dayalı değildir.
reviewed: true
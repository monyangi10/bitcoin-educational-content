question: Wat zijn de kenmerken van een goed wachtwoord?
answer: Lang, complex, uniek en niet gebaseerd op persoonlijke informatie.
wrong_answers:
  - Kort, eenvoudig en gemakkelijk te onthouden.
  - Gebaseerd op persoonlijke informatie zoals geboortedata en namen.
  - Hetzelfde wachtwoord voor alle accounts.
explanation: |
  Een goed wachtwoord is lang (minstens 12 tekens), complex
  (een combinatie van hoofdletters en kleine letters, cijfers en
  symbolen), uniek (niet hergebruikt voor verschillende accounts) en
  niet gebaseerd op persoonlijke informatie.
reviewed: true
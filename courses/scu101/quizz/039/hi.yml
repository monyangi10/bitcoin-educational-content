question: एक अच्छे पासवर्ड की क्या विशेषताएं होती हैं?
answer: लंबा, जटिल, अनोखा, और व्यक्तिगत जानकारी पर आधारित नहीं।
wrong_answers:
  - छोटा, सरल, और याद रखने में आसान।
  - जन्म तिथि और नाम जैसी व्यक्तिगत जानकारी के आधार पर।
  - सभी अकाउंट्स के लिए एक ही पासवर्ड।
explanation: |
  एक अच्छा पासवर्ड लंबा होता है (कम से कम 12 अक्षर), जटिल
  (अपरकेस और लोअरकेस अक्षरों, नंबरों का मिश्रण)
  प्रतीक), अद्वितीय (अलग-अलग खातों के लिए दोबारा इस्तेमाल नहीं किए गए), और
  व्यक्तिगत जानकारी पर आधारित नहीं।
reviewed: true
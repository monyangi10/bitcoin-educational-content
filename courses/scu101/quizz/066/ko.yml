question: 기존 비밀번호의 대안으로 패스키를 사용하면 어떤 이점이 있나요?
answer: 로컬 요소와 결합된 암호화된 임의 키를 제공합니다. 키는 제공업체에서 호스팅하지만 제공업체의 손이 닿지 않는 곳에 보관합니다.
wrong_answers:
  - 기존 비밀번호보다 기억하기 쉽습니다.
  - 추가 인증 요소가 필요하지 않습니다.
  - 별도의 업데이트 없이 모든 웹사이트에서 사용할 수 있습니다.
explanation: |
  패스키는 제공업체가 호스팅하는 로컬 요소(생체 인식 또는 PIN)와 결합된 암호화된 임의 키를 제공합니다. 하지만 키는 사용자의 손이 닿지 않는 곳에 보관됩니다. 이 접근 방식은 비밀번호가 필요하지 않으므로 기존 비밀번호와 관련된 제약 없이 높은 수준의 보안을 제공합니다.
reviewed: true
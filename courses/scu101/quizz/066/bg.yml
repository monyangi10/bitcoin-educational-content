question: Какви са предимствата на използването на Passkeys като алтернатива на традиционните пароли?
answer: Те предлагат криптирани случайни ключове, комбинирани с местен фактор. Ключовете се хостват от доставчика, но остават извън неговия обсег.
wrong_answers:
  - Те са по-лесни за запомняне от традиционните пароли.
  - Те не изискват допълнителни фактори за удостоверяване.
  - Те могат да се използват във всички уебсайтове без никакви актуализации.
explanation: |
  Passkeys предлагат криптирани случайни ключове, комбинирани с местен фактор (биометрични данни или ПИН код), които се съхраняват от доставчика. Ключовете обаче остават извън обсега на потребителите. Този подход елиминира необходимостта от пароли, като по този начин осигурява високо ниво на сигурност без ограниченията, свързани с традиционните пароли.
reviewed: true

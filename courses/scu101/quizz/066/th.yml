question: ข้อดีของการใช้ Passkeys เป็นทางเลือกแทนรหัสผ่านแบบดั้งเดิมคืออะไร?
answer: พวกเขาเสนอคีย์สุ่มที่เข้ารหัสรวมกับปัจจัยท้องถิ่น คีย์เหล่านี้ถูกโฮสต์โดยผู้ให้บริการแต่ยังคงอยู่นอกเหนือการเข้าถึงของพวกเขา
wrong_answers:
  - พวกมันจำได้ง่ายกว่ารหัสผ่านแบบดั้งเดิม
  - พวกเขาไม่ต้องการปัจจัยการยืนยันตัวตนเพิ่มเติมใดๆ
  - สามารถใช้ได้กับทุกเว็บไซต์โดยไม่ต้องอัปเดตใดๆ
explanation: |
  Passkeys เสนอคีย์สุ่มที่เข้ารหัสรวมกับปัจจัยท้องถิ่น (ไบโอเมตริกซ์หรือ PIN) ที่ผู้ให้บริการเป็นผู้โฮสต์ อย่างไรก็ตาม คีย์เหล่านี้ยังคงอยู่นอกเหนือการเข้าถึงของพวกเขา วิธีการนี้กำจัดความจำเป็นในการใช้รหัสผ่าน จึงให้ระดับความปลอดภัยสูงโดยไม่มีข้อจำกัดที่เกี่ยวข้องกับรหัสผ่านแบบดั้งเดิม
reviewed: true
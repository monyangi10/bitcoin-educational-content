question: पारंपरिक पासवर्ड के बजाय पासकी का उपयोग करने के क्या फायदे हैं?
answer: वे एन्क्रिप्टेड रैंडम कीज़ प्रदान करते हैं जो एक लोकल फैक्टर के साथ जुड़े होते हैं, जो एक प्रोवाइडर द्वारा होस्ट किए जाते हैं लेकिन उनकी पहुँच से बाहर रहते हैं।
wrong_answers:
  - वो पारंपरिक पासवर्ड्स के मुकाबले याद रखने में आसान होते हैं।
  - उन्हें किसी अतिरिक्त प्रमाणीकरण की जरूरत नहीं है।
  - वे बिना किसी अपडेट के सभी वेबसाइट्स पर इस्तेमाल किए जा सकते हैं।
explanation: |
  पासकीज़ एन्क्रिप्टेड रैंडम कुंजियाँ प्रदान करती हैं, जो स्थानीय
  कारक (बायोमेट्रिक्स या पिन), जो एक प्रदाता द्वारा होस्ट किए जाते हैं
  लेकिन उनकी पहुँच से बाहर रहें। यह तरीका खत्म कर देता है
  पासवर्ड की ज़रूरत, जिससे सुरक्षा का उच्च स्तर मिलता है
  पारंपरिक तरीकों से जुड़ी पाबंदियों के बिना
  पासवर्ड्स।
reviewed: true
question: पारंपरिक पासवर्ड के विकल्प के रूप में पासकीज़ (Passkeys) का उपयोग करने के क्या फायदे हैं?
answer: वे एन्क्रिप्टेड रैंडम कीज़ प्रदान करते हैं जो एक स्थानीय कारक (लोकल फैक्टर) के साथ जुड़े होते हैं। कुंजियों की होस्टिंग प्रदाता द्वारा की जाती है लेकिन वे उसकी पहुँच से बाहर रहती हैं।
wrong_answers:
  - वे पारंपरिक पासवर्ड्स के मुकाबले याद रखने में आसान होते हैं।
  - उन्हें किसी अतिरिक्त प्रमाणीकरण की जरूरत नहीं होती।
  - वे बिना किसी अपडेट के सभी वेबसाइट्स पर इस्तेमाल किए जा सकते हैं।
explanation: |
  पासकीज़ एन्क्रिप्टेड रैंडम कुंजियाँ प्रदान करती हैं, 
  जो स्थानीय कारक (जैसे बायोमेट्रिक्स या पिन), के साथ संयोजन में होती हैं,
  जिनकी होस्टिंग प्रदाता द्वारा की जाती है।
  हालाँकि, ये कुंजियाँ प्रदाता की पहुँच से बाहर रहती हैं।
  यह तरीका पासवर्ड की आवश्यकता को समाप्त करता है और पारंपरिक पासवर्ड 
  से जुड़ी सीमाओं के बिना उच्च स्तर की सुरक्षा प्रदान करता है।
reviewed: true

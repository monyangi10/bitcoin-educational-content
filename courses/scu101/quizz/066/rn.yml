question: Ni ivyiza ibihe vyo gukoresha Passkeys nk’ubundi buryo butari gukoresha amajambo y’ibanga bisanzwe?
answer: zitanga imfunguruzo zidasanzwe zinyegeje zifatanijwe n’ikintu co mu mashini yawe, ivyo uwubitanga naho abitanga biaguma kure y’aho ashobora gushika.
wrong_answers:
  - Biroroshe kwibuka kuruta amajambo y’ibanga asanzwe.
  - Ntibisaba ibindi bintu vyo kwemeza ko ari ivy’ukuri.
  - Bishobora gukoreshwa ku mbuga zose ataco bihinduye.
explanation: |
  Passkeys zitanga imfunguruzo zidasanzwe zinyegeje zifatanijwe n’ikintu co mu mashini yawe (nka biometrics canke PIN), ivyo uwubitanga naho abitanga biaguma kure y’aho ashobora gushika. Ubwo buryo burakuraho ivy’uko umuntu akeneye amajambo y’ibanga, gutyo akagira umutekano mwinshi ata ngorane zijanye n’amajambo y’ibanga asanzwe.
reviewed: true

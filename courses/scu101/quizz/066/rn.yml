question: Ni ivyiza ibihe vyo gukoresha Passkeys nk’ubundi buryo bwo gukoresha amajambo y’ibanga asanzwe?
answer: Batanga imfunguruzo zidasanzwe zifatanijwe n’ikintu co mu karere. Imfunguruzo zicakirwa n’uwuzitanga ariko ziguma kure y’aho zishobora gushika.
wrong_answers:
  - Biroroshe kwibuka kuruta amajambo y’ibanga asanzwe.
  - Ntibisaba ibindi bintu vyo kwemeza ko ari ivy’ukuri.
  - Bishobora gukoreshwa ku mbuga zose ataco bihinduye.
explanation: |
  Passkeys zitanga imfunguruzo zidasanzwe zifatanijwe n’ikintu co mu karere (biometrics canke PIN) umutanga amakuru ashobora kwakira. Ariko rero, imfunguruzo ziguma kure y’aho bashobora kuzishikira. Ubwo buryo burakuraho ivy’uko umuntu akeneye amajambo y’ibanga, gutyo akagira umutekano mwinshi ata ngorane zijanye n’amajambo y’ibanga asanzwe.
reviewed: true
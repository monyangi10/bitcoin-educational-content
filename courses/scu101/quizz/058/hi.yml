question: साइबर सुरक्षा में इस्तेमाल होने वाले कुछ उपकरण कौन-कौन से हैं?
answer: वायरशार्क(Wireshark), मेटास्प्लॉइट(Metasploit), एनमैप(Nmap)
wrong_answers:
  - फोटोशॉप(Photoshop), इलस्ट्रेटर(Illustrator), इनडिज़ाइन(InDesign)
  - एक्सेल(Excel), पावरपॉइंट(PowerPoint), वर्ड(Word)
  - ऑटोकैड(AutoCAD), सॉलिडवर्क्स(SolidWorks), रेविट(Revit)
explanation: |
  अध्याय में Wireshark, Metasploit, और Nmap को साइबर सुरक्षा में उपयोग किए जाने वाले कुछ
  उपकरणों के रूप में सूचीबद्ध किया गया है।
reviewed: true

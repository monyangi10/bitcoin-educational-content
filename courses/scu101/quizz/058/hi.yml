question: साइबर सुरक्षा में इस्तेमाल होने वाले कुछ टूल्स कौन-कौन से हैं?
answer: वायरशार्क, मेटास्प्लॉइट, एनमैप
wrong_answers:
  - फोटोशॉप, इलस्ट्रेटर, इनडिज़ाइन
  - एक्सेल, पावरपॉइंट, वर्ड
  - ऑटोकैड, सॉलिडवर्क्स, रेविट
explanation: |
  अध्याय में Wireshark, Metasploit, और Nmap को कुछ के रूप में सूचीबद्ध किया गया है।
  साइबर सुरक्षा में इस्तेमाल होने वाले टूल्स में से।
reviewed: true
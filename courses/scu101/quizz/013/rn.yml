question: Ni kuki gukoresha abatanga ubuhinga bwa Wi-Fi bo mu Buraya, nka SNCF, ari vyiza kuruta?
answer: Ntibakwiye gusubira kugurisha amakuru y’ihuriro ry’abakoresha, kubera amabwirizwa ya GDPR.
wrong_answers:
  - Batanga internet yihuta kurusha abatanga internet bo muri Amerika.
  - Akenshi zituma abazikoresha bashobora kurenga amategeko agenga ivy’aho baba.
  - Bahagarika amatangazo yo kuri internet iyo waramenyekanye ko uri umunyagihugu w’Uburayi.
explanation: |
  Mu Bumwe bw’Uburayi, ugukingira amakuru bigenzurwa n’
  Itegeko rusangi ryerekeye ugukingira amakuru (GDPR). Rero,
  Abatanga ubuhinga bwa Wi-Fi bo mu Buraya, nka SNCF, ntibagira .
  gusubira kugurisha amakuru y’ihuriro ry’abakoresha, bikaba bituma agira umutekano ku bwite bw’umuntu ku giti ciwe.
reviewed: true
question: 비밀번호 관리자의 마스터 비밀번호를 관리할 때 권장되는 방법은 무엇인가요?
answer: 종이에 적어 안전한 곳에 잘 보이지 않게 보관하세요.
wrong_answers:
  - 이메일에 저장하세요.
  - 모든 계정에 동일한 비밀번호를 사용합니다.
  - 외우세요.
explanation: |
  비밀번호 관리자의 마스터 비밀번호는 종이에 적어 잘 보이지 않는 안전한 곳에 보관하는 것이 좋습니다. 실제로 Hard 드라이브가 암호화되어 있고 컴퓨터가 잠겨 있으면 도난을 당하더라도 비밀번호에 액세스할 수 없습니다.
reviewed: true
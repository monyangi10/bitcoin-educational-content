question: แนวทางที่แนะนำสำหรับการจัดการรหัสผ่านหลักของโปรแกรมจัดการรหัสผ่านคืออะไร?
answer: เขียนลงบนกระดาษและเก็บไว้ในที่ปลอดภัย
wrong_answers:
  - เก็บไว้ในอีเมลของคุณ
  - ใช้รหัสผ่านเดียวกันสำหรับทุกบัญชี
  - จดจำมันไว้
explanation: |
  ขอแนะนำให้เขียนรหัสผ่านหลักของโปรแกรมจัดการรหัสผ่านลงบนกระดาษและเก็บไว้ในที่ซ่อนที่ปลอดภัย ในความเป็นจริง หากฮาร์ดไดรฟ์ถูกเข้ารหัสและคอมพิวเตอร์ถูกล็อก รหัสผ่านจะไม่สามารถเข้าถึงได้ แม้ในกรณีที่เกิดการโจรกรรม
reviewed: true
question: Ni ikihe gikorwa ciza co gucunga ijambo ry'ibanga ry'ibanze ry’ubutunganyirizo bw’ijambo ry'ibanga?
answer: Uryandike ku rupapuro, urushire ahantu hiherereye kandi hafise umutekano.
wrong_answers:
  - Ribike muri email yawe.
  - Koresha ijambo ry'ibanga rimwe ku makonti yose.
  - Rifate mu mutwe.
explanation: |
  Ni vyiza kwandika ijambo banga ry’ibanze ku rupapuro, ariko rikwiye kubikwa ahantu hiherereye kandi hafise umutekano. Iyo amakuru ari kuri Hard drive anyegeje kandi inyabwonko ikaba yugaye, ijambo ry'banga ntiri zoshobora gushikwako, mbere n’igihe umuntu yibwe.
reviewed: true

question: पासवर्ड मैनेजर के मास्टर पासवर्ड को प्रबंधित (मैनेज) करने के लिए एक अनुशंसित (रेकमेंडेड) प्रैक्टिस क्या है?
answer: इसे कागज़ पर लिखें और सुरक्षित स्थान पर छिपा कर रखें।
wrong_answers:
  - इसे अपने ईमेल में स्टोर कर लो।
  - सभी खातों के लिए एक ही पासवर्ड इस्तेमाल करें।
  - इसे याद कर लें।
explanation: |
  यह अनुशंसा (रेकमेंड) की जाती है कि पासवर्ड मैनेजर के मास्टर पासवर्ड
  को कागज़ पर लिखा जाए और एक सुरक्षित तथा गोपनीय स्थान पर रखा जाए।
  वास्तव में, यदि हार्ड ड्राइव एन्क्रिप्टेड है और कंप्यूटर लॉक है,
  तो चोरी की स्थिति में भी पासवर्ड सुलभ नहीं होगा।
reviewed: true

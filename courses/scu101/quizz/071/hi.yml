question: पासवर्ड मैनेजर के मास्टर पासवर्ड को मैनेज करने के लिए एक अच्छी प्रैक्टिस क्या है?
answer: इसे कागज़ पर लिखकर एक छिपी हुई और सुरक्षित जगह पर रख दो।
wrong_answers:
  - इसे अपने ईमेल में स्टोर कर लो।
  - सभी अकाउंट्स के लिए एक ही पासवर्ड इस्तेमाल करो।
  - इसे याद कर लो।
explanation: |
  यह सलाह दी जाती है कि मास्टर पासवर्ड को लिखकर रख लें
  कागज़ पर पासवर्ड मैनेजर, लेकिन इसे एक सुरक्षित जगह पर रखना चाहिए
  छुपा हुआ और सुरक्षित जगह। ऐसा इसलिए क्योंकि अगर Hard
  ड्राइव एन्क्रिप्टेड है और कंप्यूटर लॉक है, पासवर्ड
  चोरी की स्थिति में भी, पहुँच योग्य नहीं होगा।
reviewed: true
question: Каква е препоръчителната практика за управление на главната парола на мениджър на пароли?
answer: Запишете го на хартия и го съхранявайте на сигурно място.
wrong_answers:
  - Съхранявайте го в електронната си поща.
  - Използвайте една и съща парола за всички акаунти.
  - Запомнете го.
explanation: |
  Препоръчва се главната парола на мениджъра на пароли да се записва на хартия и да се съхранява на скрито и сигурно място. Всъщност, ако твърдият диск е криптиран и компютърът е заключен, паролата няма да бъде достъпна дори в случай на кражба с взлом.
reviewed: true
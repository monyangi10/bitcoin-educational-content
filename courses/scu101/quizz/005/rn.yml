question: Ni kuki ari vyiza kwirinda umucukumbuzi wa Google Chrome?
answer: Kubera abayikurikirana.
wrong_answers:
  - Kubera ko ata mutekano ufise.
  - Kuko ntabwo ari ikintu gikoreshwa neza.
  - Kuko ntashigikira ivyungura.
explanation: |
  Mucukumbuzi ya Google Chrome izwi kubera abayikurikirana, bashobora
  kwegeranya amakuru yerekeye igikorwa cawe co kuri interineti. Ivyo bishobora kuba
  ivyerekeye ubuzima bwite ku bamwebamwe bakoresha.
reviewed: true
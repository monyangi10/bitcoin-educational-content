question: Ni kuki ari vyiza kwirinda mucukumbuzi ya Google Chrome?
answer: Kubera ubushobozi ibifise bwo gukurikirana.
wrong_answers:
  - Kubera ko ata mutekano ifise.
  - Kubera ko itoroshe gukoresha.
  - Kubera ko itajamwo inyongerabushobozi.
explanation: |
  Mucukumbuzi ya Google Chrome izwi kubera ubushobozi ifise bwo gukurikirana, bishobora gutuma 
  yegeranya amakuru yerekeye ibikorwa vyawe vyo kuri interineti. Ivyo bishobora kuba
  vyahangayikisha umuntu mubuzima bwe bwihariye kuri bamwebamwe.
reviewed: true

question: Neden Google Chrome tarayıcısından kaçınmanız önerilir?
answer: İzleyicileri yüzünden.
wrong_answers:
  - Çünkü güvenli değil.
  - Çünkü kullanıcı dostu değil.
  - Çünkü uzantıları desteklemiyor.
explanation: |
  Google Chrome tarayıcısı, izleyicileri ile bilinir,
  çevrimiçi etkinliğiniz hakkında veri toplar. Bu 
  bazı kullanıcılar için gizlilik endişesi olabilir.
reviewed: true

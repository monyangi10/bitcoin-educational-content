question: Защо е препоръчително да избягвате браузъра Google Chrome?
answer: Благодарение на своите проследяващи устройства.
wrong_answers:
  - Защото не е сигурен.
  - Защото не е удобен за ползване.
  - Защото не поддържа разширения.
explanation: |
  Браузърът Google Chrome е известен със своите проследяващи устройства, които могат да
  да събират данни за вашата онлайн активност. Това може да бъде
  за някои потребители.
reviewed: true
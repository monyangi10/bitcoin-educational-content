question: ทำไมถึงแนะนำให้หลีกเลี่ยงการใช้เบราว์เซอร์ Google Chrome?
answer: เนื่องจากตัวติดตามของมัน
wrong_answers:
  - เพราะว่ามันไม่ปลอดภัย
  - เพราะมันไม่เป็นมิตรกับผู้ใช้
  - เนื่องจากมันไม่รองรับส่วนขยาย
explanation: |
  เบราว์เซอร์ Google Chrome เป็นที่รู้จักในเรื่องตัวติดตาม ซึ่งสามารถรวบรวมข้อมูลเกี่ยวกับกิจกรรมออนไลน์ของคุณได้ สิ่งนี้อาจเป็นข้อกังวลด้านความเป็นส่วนตัวสำหรับผู้ใช้บางราย
reviewed: true
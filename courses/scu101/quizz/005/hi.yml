question: गूगल क्रोम ब्राउज़र से बचने की सलाह क्यों दी जाती है?
answer: इसके ट्रैकर्स की वजह से।
wrong_answers:
  - क्योंकि यह सुरक्षित नहीं है।
  - क्योंकि यह यूज़र-फ्रेंडली नहीं है।
  - क्योंकि यह एक्सटेंशन्स को सपोर्ट नहीं करता है।
explanation: |
  Google Chrome ब्राउज़र अपने ट्रैकर्स के लिए जाना जाता है, जो
  आपकी ऑनलाइन गतिविधियों के बारे में डेटा इकट्ठा करें। यह एक
  कुछ यूज़र्स के लिए प्राइवेसी का डर।
reviewed: true
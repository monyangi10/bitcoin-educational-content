question: คุณสมบัติหลักของโปรแกรมจัดการรหัสผ่านคืออะไร?
answer: จัดเก็บ, generate, และจัดระเบียบรหัสผ่าน.
wrong_answers:
  - วิเคราะห์และลบไวรัส
  - สำรองและจัดระเบียบเอกสารส่วนตัว
  - เพิ่มความเร็วในการเชื่อมต่อให้สูงสุด
explanation: |
  ฟังก์ชันที่จำเป็นรวมถึงการจัดเก็บ สร้าง และจัดระเบียบรหัสผ่าน
reviewed: true
question: Какви са основните характеристики на мениджъра на пароли?
answer: Съхраняване, генериране и организиране на пароли.
wrong_answers:
  - Анализиране и премахване на вируси.
  - Архивиране и организиране на лични документи.
  - Оптимизиране на скоростта на връзката.
explanation: |
  Основните функции включват съхраняване, генериране и организиране на пароли.
reviewed: true

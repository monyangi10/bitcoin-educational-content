question: पासवर्ड मैनेजर के मुख्य विशेषताएँ क्या हैं?
answer: पासवर्ड को संग्रहीत (स्टोर) करना, उत्पन्न (जेनरेट) करना और व्यवस्थित (ऑर्गनाइज़) करना।
wrong_answers:
  - वायरस का विश्लेषण करना और उन्हें हटाना।
  - व्यक्तिगत दस्तावेज़ों का बैकअप लेना और उन्हें व्यवस्थित करना।
  - कनेक्शन की गति को बेहतर बनाना।
explanation: |
  मुख्य कार्यों में पासवर्ड को संग्रहीत करना, उत्पन्न करना और व्यवस्थित करना शामिल है।
reviewed: true

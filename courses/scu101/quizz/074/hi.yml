question: पासवर्ड मैनेजर के मुख्य फीचर्स क्या हैं?
answer: पासवर्ड स्टोर करो, generate, और उन्हें व्यवस्थित करो।
wrong_answers:
  - वायरस का विश्लेषण करें और हटाएं।
  - पर्सनल डॉक्यूमेंट्स का बैकअप लो और उन्हें व्यवस्थित करो।
  - कनेक्शन की स्पीड को बेहतर बनाएं।
explanation: |
  मुख्य कामों में पासवर्ड स्टोर करना, बनाना और व्यवस्थित करना शामिल है।

question: ทำไมโทเค็นฮาร์ดแวร์ เช่น กุญแจ USB หรือสมาร์ทการ์ด จึงถือว่าให้ความปลอดภัยสูงสุดสำหรับ 2FA?
answer: พวกเขา generate คีย์ส่วนตัวที่ไม่ซ้ำกันสำหรับแต่ละไซต์และตรวจสอบ URL ก่อนอนุญาตการเชื่อมต่อ
wrong_answers:
  - พวกมันถูกขโมยได้ยากกว่าในทางกายภาพ แต่ถ้าหัวขโมยประสบความสำเร็จ พวกเขาจะสามารถดึงความลับออกจากอุปกรณ์ได้อย่างง่ายดาย
  - พวกเขา generate เพียงรหัสผ่านเดียวสำหรับทุกเว็บไซต์และตรวจสอบ URL ก่อนอนุญาตการเชื่อมต่อ
  - พวกมันเป็นเทคโนโลยีใหม่กว่าและมีราคาแพง ดังนั้นมันต้องดีกว่า
explanation: |
  โทเค็นฮาร์ดแวร์มอบความปลอดภัยที่ดีที่สุดเพราะพวกเขา
  generate คีย์ส่วนตัวที่ไม่ซ้ำกันสำหรับแต่ละไซต์และตรวจสอบ
  URL ก่อนที่จะอนุญาตการเชื่อมต่อ ซึ่งทำให้ยากขึ้นมาก
  สำหรับแฮ็กเกอร์ที่จะเข้าถึงโดยไม่ได้รับอนุญาต
reviewed: true
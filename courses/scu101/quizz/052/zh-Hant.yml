question: 為什麼硬體令牌（例如 USB 鑰匙或智慧卡）被認為能為 2FA 提供最佳安全性？
answer: 它們會為每個網站 generate 獨特的私人金鑰，並在允許連線前驗證 URL。
wrong_answers:
  - 它們在物理上較難被竊取，但如果竊賊得逞，他們會輕易從裝置中擷取秘密。
  - 他們 generate 只會對每個網站使用一個密碼，並在允許連線前驗證 URL。
  - 它們是較新的技術，而且價格昂貴，所以一定比較好。
explanation: |
  硬體代幣提供最佳的安全性，因為它們
  generate 為每個站點提供唯一的私人金鑰，並驗證
  URL 才允許連線。這使得
  黑客更難取得未經授權的存取權。
reviewed: true
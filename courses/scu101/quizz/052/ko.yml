question: USB 키 또는 스마트 카드와 같은 하드웨어 토큰이 2FA에 최적의 보안을 제공하는 것으로 간주되는 이유는 무엇인가요?
answer: 각 사이트에 대해 고유한 개인 키를 generate하고 연결을 허용하기 전에 URL을 확인합니다.
wrong_answers:
  - 물리적으로 훔치기는 어렵지만, 도둑이 성공하면 기기에서 비밀을 쉽게 빼낼 수 있습니다.
  - 모든 사이트에 대해 하나의 비밀번호만 generate하고 연결을 허용하기 전에 URL을 확인합니다.
  - 최신 기술이고 비싸기 때문에 더 나은 제품이어야 합니다.
explanation: |
  하드웨어 토큰은 다음과 같은 이유로 최적의 보안을 제공합니다
  각 사이트마다 고유한 개인 키를 생성하고
  URL을 확인합니다. 따라서 해커가 무단 액세스를
  해커가 무단으로 액세스하기가 훨씬 더 어렵습니다.
reviewed: true
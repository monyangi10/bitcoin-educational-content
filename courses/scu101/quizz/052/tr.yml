question: Neden USB anahtarları veya akıllı kartlar gibi donanım belirteçlerinin 2FA için en uygun güvenliği sunduğu düşünülüyor?
answer: Her site için benzersiz bir özel anahtar oluştururlar ve bağlantıya izin vermeden önce URL'yi doğrularlar.
wrong_answers:
  - Fiziksel olarak çalınmaları daha zordur, ancak hırsızlar başarılı olurlarsa, cihazdaki sırları kolayca çıkarabilirler.
  - Her site için yalnızca bir şifre oluşturulur ve bağlantıya izin vermeden önce URL'yi doğrulanır.
  - Bunlar daha yeni teknoloji ve daha pahalıdır, bu yüzden daha iyi olmalılar.
explanation: |
  Donanım belirteçleri optimum güvenlik sunar çünkü
  her site için benzersiz bir özel anahtar oluştururlar ve
  her bağlantıya izin vermeden önce URL'yi doğrularlar. Böylece
  bir bilgisayar korsanının yetkisiz erişim elde etmesi çok daha zordur.
reviewed: true

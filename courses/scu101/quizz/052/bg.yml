question: Защо се смята, че хардуерните токени, като например USB ключове или смарт карти, предлагат оптимална сигурност за 2FA?
answer: Те създават уникален частен ключ за всеки сайт и проверяват URL адреса, преди да разрешат връзката.
wrong_answers:
  - Физически е по-трудно да бъдат откраднати, но ако крадците успеят, те лесно ще извлекат тайните от устройството.
  - Те използват само една парола за всеки сайт и проверяват URL адреса, преди да разрешат връзката.
  - Те са по-нови технологии и са скъпи, така че трябва да са по-добри.
explanation: |
  Хардуерните токени предлагат оптимална сигурност, тъй като
  generate уникален частен ключ за всеки сайт и проверяват
  URL, преди да разрешат връзката. Това я прави много
  по-трудно за хакерите да получат неоторизиран достъп.
reviewed: true
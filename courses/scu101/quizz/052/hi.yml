question: यूएसबी कीज़ या स्मार्ट कार्ड जैसे हार्डवेयर टोकन 2FA के लिए सर्वोत्तम सुरक्षा प्रदान करने वाला क्यों माने जाते है?
answer: वे प्रत्येक साइट के लिए एक यूनिक निजी कुंजी उत्पन्न करते हैं और कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं।
wrong_answers:
  - इन्हें शारीरिक रूप से चुराना कठिन होता है, लेकिन यदि चोर सफल हो जाएं, तो वे आसानी से डिवाइस से गोपनीय जानकारी निकाल लेंगे।
  - वे प्रत्येक साइट के लिए केवल एक पासवर्ड उत्पन्न करते हैं और कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं।
  - वे नई तकनीक वाले और महंगे हैं, इसलिए वे बेहतर ही होंगे।
explanation: |
  हार्डवेयर टोकन सर्वोत्तम सुरक्षा प्रदान करते हैं क्योंकि वे प्रत्येक साइट के लिए एक यूनिक निजी कुंजी उत्पन्न करते हैं और कनेक्शन की अनुमति देने से पहले URL को सत्यापित करते हैं। इससे किसी हैकर के लिए अनधिकृत पहुँच प्राप्त करना बहुत कठिन हो जाता है।
reviewed: true

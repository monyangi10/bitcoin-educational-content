question: हार्डवेयर टोकन, जैसे USB की या स्मार्ट कार्ड, को 2FA के लिए सबसे सुरक्षित क्यों माना जाता है?  

इसकी वजह ये है:  

1. **फिजिकल होने के कारण**: ये टोकन आपके पास रहते हैं, हैकर्स इन्हें रिमोटली एक्सेस नहीं कर सकते।  
2. **ऑफलाइन सुरक्षा**: इन्हें इंटरनेट कनेक्शन की ज़रूरत नहीं होती, इसलिए फिशिंग या मैलवेयर से बचाव रहता है।  
3. **यूनिक और कॉम्प्लेक्स कोड**: हर बार एक नया, अनुमान लगाना मुश्किल कोड जनरेट होता है।  
4. **टैम्पर-रेज़िस्टेंट**: अगर कोई इन्हें छेड़ने की कोशिश करे, तो ये खुद को डिसेबल कर सकते हैं।  

इसीलिए, बैंक और बड़ी कंपनियाँ अक्सर हार्डवेयर टोकन को सबसे भरोसेमंद 2FA ऑप्शन मानती हैं! 🔐
answer: वे हर साइट के लिए एक अलग प्राइवेट की generate करते हैं और कनेक्शन देने से पहले URL को वेरिफाई करते हैं।
wrong_answers:
  - वो शारीरिक तौर पर चुराने में ज़्यादा मुश्किल हैं, लेकिन अगर चोर कामयाब हो जाएं तो डिवाइस से राज़ आसानी से निकाल लेंगे।
  - वे generate केवल एक ही पासवर्ड इस्तेमाल करते हैं जो हर साइट के लिए होगा और कनेक्शन की अनुमति देने से पहले URL वेरिफाई करते हैं।
  - वे नई टेक्नोलॉजी हैं और महंगे हैं, तो ज़रूर बेहतर होंगे।
explanation: |
  हार्डवेयर टोकन सबसे बेहतर सुरक्षा प्रदान करते हैं क्योंकि वे
  जीडब्ल्यू-2 हर साइट के लिए एक अनोखी प्राइवेट की और उसे वेरिफाई करें
  URL को अनुमति देने से पहले। यह बहुत आसान बना देता है
  हैकर के लिए अनधिकृत पहुंच पाना और भी मुश्किल हो जाता है।
reviewed: true
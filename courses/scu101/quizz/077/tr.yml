question: E-postanızın güvenliğini sağlamak neden önemlidir?
answer: Çünkü şifrelerinizi sıfırlamanıza izin verir
wrong_answers:
  - Çünkü haber bültenlerini almak için kullanılır
  - Çünkü tüm şifrelerinizi içerir
  - Çünkü banka bilgilerinizi içeriyor
explanation: |
  Posta kutusu, bir ihlal durumunda parolaları almak ve birden fazla hesabı tehlikeye atmak için merkezi erişim noktasıdır.
reviewed: true
question: Ni kuki ari ngombwa ko ukingira imeyiri yawe?
answer: Kuko bigufasha gusubizako amajambo y'ibanga yawe .
wrong_answers:
  - Kubera ko ariyo ikoreshwa mu kwakira amakuru .
  - Kuko irimwo amajambo y'ibanga yawe yose
  - Kuko irimwo amakuru yawe yo muri banki .
explanation: |
  Ububiko bw'ubutumwa ni co kibanza nyamukuru co gukuramwo amajambo y’ibanga no guhungabanya amakonti menshi iyo habayeho ukuja ahagaragara kw'amakuru.
reviewed: true

question: ทำไมการรักษาความปลอดภัยของอีเมลจึงมีความสำคัญ?
answer: เพราะมันช่วยให้คุณรีเซ็ตรหัสผ่านของคุณได้
wrong_answers:
  - เพราะมันถูกใช้เพื่อรับจดหมายข่าว
  - เพราะมันมีรหัสผ่านทั้งหมดของคุณ
  - เพราะมันมีข้อมูลธนาคารของคุณ
explanation: |
  กล่องจดหมายเป็นจุดเข้าถึงหลักสำหรับการดึงรหัสผ่านและการละเมิดบัญชีหลายบัญชีในกรณีที่เกิดการละเมิดข้อมูล
reviewed: true
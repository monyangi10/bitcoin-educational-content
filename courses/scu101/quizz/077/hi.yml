question: ईमेल को सुरक्षित करना क्यों जरूरी है?
answer: क्योंकि इससे आप अपने पासवर्ड रीसेट कर सकते हैं
wrong_answers:
- क्योंकि यह न्यूज़लेटर प्राप्त करने के लिए इस्तेमाल किया जाता है
- क्योंकि इसमें आपके सारे पासवर्ड होते हैं
- क्योंकि इसमें आपकी बैंकिंग जानकारी होती है
explanation: मेलबॉक्स, पासवर्ड पुनः प्राप्त करने और किसी भी सुरक्षा उल्लंघन की स्थिति में कई खातों को प्रभावित करने का केंद्रीय प्रवेश बिंदु होता है।
reviewed: true

question: Защо е важно да защитите електронната си поща?
answer: Защото ви позволява да нулирате паролите си
wrong_answers:
  - Защото се използва за получаване на бюлетини
  - Защото съдържа всичките ви пароли
  - Защото съдържа банковата ви информация
explanation: |
  Пощенската кутия е централната точка за достъп за извличане на пароли и компрометиране на множество акаунти в случай на пробив.
reviewed: true
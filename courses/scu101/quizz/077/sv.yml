question: Varför är det viktigt att säkra din e-post?
answer: Eftersom det låter dig återställa dina lösenord
wrong_answers:
  - För att den används för att ta emot nyhetsbrev
  - För att den innehåller alla dina lösenord
  - Eftersom den innehåller din bankinformation
explanation: |
  Brevlådan är den centrala åtkomstpunkten för att hämta lösenord och kompromissa med flera konton i händelse av ett intrång.
reviewed: true
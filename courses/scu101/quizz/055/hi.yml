question: शैक्षणिक दृष्टिकोण से साइबर सुरक्षा में करियर शुरू करने के लिए एक अच्छा प्रारंभिक बिंदु क्या है?
answer: कंप्यूटर विज्ञान, सूचना प्रणाली (इन्फॉर्मेशन सिस्टम्स), या संबंधित क्षेत्र में मज़बूत शिक्षा।
wrong_answers:
  - कला और मानविकी (ह्यूमैनिटीज़) में डिग्री
  - व्यवसाय प्रबंधन में डिग्री
  - शारीरिक शिक्षा (फिजिकल एजुकेशन) में डिग्री
explanation: |
  इस अध्याय में उल्लेख किया गया है कि कंप्यूटर विज्ञान,
  सूचना प्रणाली या संबंधित क्षेत्र में मज़बूत शिक्षा
  शैक्षणिक दृष्टिकोण से साइबर सुरक्षा में 
  करियर शुरू करने के लिए एक
  आदर्श प्रारंभिक बिंदु होती है।
reviewed: true

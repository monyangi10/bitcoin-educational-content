question: Wat is een goed startpunt voor een carrière in cyberbeveiliging vanuit een academisch perspectief?
answer: Een gedegen opleiding in informatica, informatiesystemen of een verwant vakgebied
wrong_answers:
  - Een diploma in kunst en geesteswetenschappen
  - Een diploma in bedrijfsbeheer
  - Een diploma in lichamelijke opvoeding
explanation: |
  Het hoofdstuk vermeldt dat een gedegen opleiding in computer
  informatica, informatiesystemen of een verwant gebied vaak
  het ideale uitgangspunt is voor een carrière in cyberbeveiliging vanuit academisch perspectief
  een academisch perspectief. systemen, of een aanverwant gebied, is
  vaak het ideale startpunt is voor een carrière in
  cyberbeveiliging.
reviewed: true
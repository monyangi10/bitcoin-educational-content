question: 학문적인 관점에서 사이버 보안 분야에서 경력을 쌓기 위한 좋은 출발점은 무엇인가요?
answer: 컴퓨터 과학, 정보 시스템 또는 관련 분야에 대한 탄탄한 교육 이수
wrong_answers:
  - 예술 및 인문학 학위
  - 경영학 학위
  - 체육학 학위
explanation: |
  이 장에서는 컴퓨터 과학, 정보 시스템 또는 관련 분야의 탄탄한 교육이
  과학, 정보 시스템 또는 관련 분야의 탄탄한 교육은 종종

question: साइबर सुरक्षा में उपयोग की जाने वाली क्रिप्टोग्राफी के कुछ पहलू कौन से हैं?
answer: एसएसएल/टीएलएस (SSL/TLS), सममित/असममित (सिमेट्रिक/असिमेट्रिक) एन्क्रिप्शन
wrong_answers:
  - आरएसए (RSA), डीएसए (DSA), ईसीसी (ECC)
  - एईएस (AES), डीईएस (DES), 3डीईएस (3DES)
  - एमडी5 (MD5), एसएचए-1 (SHA-1), एसएचए-256 (SHA-256)
explanation: |
  अध्याय में एसएसएल/टीएलएस और सममित/असममित एन्क्रिप्शन को
  साइबर सुरक्षा में उपयोग की जाने वाली
  क्रिप्टोग्राफी के कुछ पहलुओं के रूप में सूचीबद्ध किया गया है।
reviewed: true

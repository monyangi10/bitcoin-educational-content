question: साइबर सुरक्षा में क्रिप्टोग्राफी के कुछ पहलू क्या हैं?
answer: SSL/TLS, सिमेट्रिक/असिमेट्रिक एन्क्रिप्शन
wrong_answers:
  - आरएसए (RSA), डीएसए (DSA), ईसीसी (ECC)
  - एईएस, डीईएस, 3डीईएस
  - एमडी5, एसएचए-1, एसएचए-256
explanation: |
  अध्याय में SSL/TLS और सममित/असममित की सूची दी गई है।
  एन्क्रिप्शन क्रिप्टोग्राफी के कुछ पहलुओं में से एक है जिसका उपयोग
  साइबर सुरक्षा
reviewed: true
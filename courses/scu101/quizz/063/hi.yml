question: साइबर सुरक्षा के क्षेत्र में विश्व भर में किस प्रमाणन को मान्यता प्राप्त है?
answer: सीआईएसएसपी
wrong_answers:
  - पीएमपी
  - आईटीआईएल
  - एसएचए2
explanation: |
  CISSP प्रमाणन साइबर सुरक्षा के क्षेत्र में अंतरराष्ट्रीय स्तर पर सर्वाधिक मान्यता प्राप्त प्रमाणनों में से एक है।
reviewed: false
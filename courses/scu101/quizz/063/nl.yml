question: Wat zijn enkele aspecten van cryptografie die worden gebruikt in cyberbeveiliging?
answer: SSL/TLS, symmetrische/asymmetrische codering
wrong_answers:
  - RSA, DSA, ECC
  - AES, DES, 3DES
  - MD5, SHA-1, SHA-256
explanation: |
  Het hoofdstuk noemt SSL/TLS en symmetrische/asymmetrische
  encryptie als enkele van de aspecten van cryptografie die gebruikt worden in
  cyberbeveiliging.
reviewed: true
question: सेल्फ-होस्टेड पासवर्ड मैनेजर का मुख्य नुकसान क्या है?
answer: इसे इस्तेमाल करने के लिए ज़्यादा तकनीकी ज्ञान चाहिए।
wrong_answers:
  - यह थर्ड-पार्टी सेवाओं से ज़्यादा महंगा है।
  - यह थर्ड-पार्टी सेवाओं जितने फीचर्स नहीं देता।
  - यह थर्ड-पार्टी सेवाओं जितना सुरक्षित नहीं होता।
explanation: |
  स्व-होस्टेड पासवर्ड मैनेजर का उपयोग करने के लिए अधिक तकनीकी ज्ञान की आवश्यकता होती है,
  क्योंकि आपको अपना सर्वर सेटअप और प्रबंधित करना पड़ता है।
  हालांकि, यह अधिक नियंत्रण और सुरक्षा प्रदान कर सकता है।
reviewed: true

question: सेल्फ-होस्टेड पासवर्ड मैनेजर का मुख्य नुकसान क्या है?
answer: इसे इस्तेमाल करने के लिए ज़्यादा तकनीकी ज्ञान चाहिए।
wrong_answers:
  - यह तीसरे पक्ष की सेवाओं से ज़्यादा महंगा है।
  - यह थर्ड-पार्टी सर्विसेज जितने फीचर्स नहीं देता।
  - यह तीसरे पक्ष की सेवाओं जितना सुरक्षित नहीं है।
explanation: |
  एक सेल्फ-होस्टेड पासवर्ड मैनेजर को ज्यादा टेक्निकल ज्ञान की जरूरत होती है
  ज्ञान का उपयोग करें, क्योंकि आपको अपना खुद का सेटअप और प्रबंधन करना होगा
  सर्वर। हालांकि, यह ज्यादा कंट्रोल और सुरक्षा दे सकता है।
reviewed: true
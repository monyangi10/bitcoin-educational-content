question: Ni ikihe kibazo nyamukuru co gukoresha ubutunganyirizo bw’ijambo ry'ibang witunganyirije(self-hosted password manager)?
answer: Bisaba ubumenyi mu vy'ubuhinga kugira ngo umuntu ashobore kubukoresha.
wrong_answers:
  - Birazimvye kuruta serivise zabandi.
  - Ntibitanga ibintu vyinshi nk’ivyo abandi batanga.
  - Ntibitekanye nkizindi serivisi z'abandi.
explanation: |
  ubutunganyirizo bw’ijambo ry'ibanga witunganyirije busaba ubumenyi bwo gukoresha bwinshi mu vy'ubuhinga, nk’uko ukeneye gushinga no kwitunganyiriza urusenge(seriveri) ubwawe .
  Ariko rero, birashobora gutuma umuntu agira ububasha bwinshi kandi akagira umutekano ukwiye.
reviewed: true

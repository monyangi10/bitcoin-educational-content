question: Kendi sunucunda yüklü (self-hosted) bir parola yöneticisi kullanmanın ana dezavantajı nedir?
answer: Kullanmak için daha fazla teknik bilgi gerektirir.
wrong_answers:
  - Üçüncü taraf hizmetlerinden daha pahalıdır.
  - Üçüncü taraf hizmetler kadar çok özellik sunmaz.
  - Üçüncü taraf hizmetleri kadar güvenli değildir.
explanation: |
  Kendi sunucunda yüklü olan bir parola yöneticisi daha fazla teknik
  bilgi birikimi gerektirir, çünkü kendi sunucunuzu kurmanız ve yönetmeniz gerekir. 
  Bununla birlikte, daha fazla kontrol ve güvenlik sunabilir.
reviewed: true

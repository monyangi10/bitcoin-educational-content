question: Какъв е основният недостатък на използването на самостоятелно хостван мениджър на пароли?
answer: Използването му изисква повече технически познания.
wrong_answers:
  - по-скъпа от услугите на трети страни.
  - не предлага толкова много функции, колкото услугите на трети страни.
  - не е толкова сигурна, колкото услугите на трети страни.
explanation: |
  Самостоятелно хостваният мениджър на пароли изисква повече технически
  познания, тъй като трябва да настроите и управлявате свой собствен
  сървър. Въпреки това той може да предложи по-голям контрол и сигурност.
reviewed: true

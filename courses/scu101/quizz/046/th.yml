question: ข้อเสียหลักของการใช้โปรแกรมจัดการรหัสผ่านที่โฮสต์เองคืออะไร?
answer: มันต้องการความรู้ทางเทคนิคมากขึ้นในการใช้งาน
wrong_answers:
  - มันมีราคาแพงกว่าบริการของบุคคลที่สาม
  - มันไม่ได้มีฟีเจอร์มากเท่ากับบริการจากบุคคลที่สาม
  - มันไม่ปลอดภัยเท่ากับบริการของบุคคลที่สาม
explanation: |
  ตัวจัดการรหัสผ่านที่โฮสต์เองต้องการความรู้ทางเทคนิคมากขึ้นในการใช้งาน เนื่องจากคุณต้องตั้งค่าและจัดการเซิร์ฟเวอร์ของคุณเอง อย่างไรก็ตาม มันสามารถให้การควบคุมและความปลอดภัยมากขึ้น
reviewed: true
question: วิธีหนึ่งในการหลีกเลี่ยงการหลอกลวงออนไลน์คืออะไร?
answer: ตรวจสอบความถูกต้องของเว็บไซต์ที่คุณกำลังเข้าชม โดยเฉพาะการตรวจสอบนามสกุลและชื่อโดเมน
wrong_answers:
  - ใช้เครือข่าย Wi-Fi สาธารณะ
  - ใช้เว็บไซต์ที่ไม่ใช้โปรโตคอล HTTPS
  - ใช้เว็บไซต์ที่ไม่มีรูปกุญแจแสดงอยู่
explanation: |
  การยืนยันตัวตนของเว็บไซต์ที่คุณกำลังเข้าชมเป็นสิ่งสำคัญเพื่อหลีกเลี่ยงการหลอกลวงออนไลน์ คุณสามารถทำได้โดยการตรวจสอบนามสกุลและชื่อโดเมนของเว็บไซต์
reviewed: true
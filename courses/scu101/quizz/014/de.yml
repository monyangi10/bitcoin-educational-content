question: Wie kann man Online-Betrug vermeiden?
answer: Überprüfe die Identität der Website, die du besuchst, insbesondere durch Überprüfung der Erweiterung und des Domainnamens.
wrong_answers:
  - Öffentliche WLAN-Netzwerke nutzen.
  - Seiten nutzen, die das HTTPS-Protokoll nicht verwenden.
  - Seiten nutzen, die kein Schlosssymbol anzeigen.
explanation: |
  Um Online-Betrug zu vermeiden, ist es entscheidend, die Identität
  der Website, die du besuchst, zu überprüfen. Dies kann durch Überprüfung
  der Erweiterung und des Domainnamens der Seite erfolgen.
reviewed: true

question: एक तरीका ऑनलाइन स्कैम से बचने का यह है कि किसी भी अज्ञात लिंक पर क्लिक न करें और न ही अपनी निजी जानकारी किसी अनजान व्यक्ति या वेबसाइट के साथ साझा करें।
answer: जिस साइट पर आप ब्राउज़ कर रहे हैं, उसकी पहचान ज़रूर वेरिफाई करें, खासकर एक्सटेंशन और डोमेन नाम चेक करके।
wrong_answers:
  - सार्वजनिक वाई-फाई नेटवर्क का इस्तेमाल करें।
  - ऐसी साइट्स का इस्तेमाल करें जो HTTPS प्रोटोकॉल का इस्तेमाल नहीं करती हैं।
  - उन साइट्स का इस्तेमाल करो जहां पैडलॉक नहीं दिखता।
explanation: |
  ऑनलाइन धोखाधड़ी से बचने के लिए, पहचान की पुष्टि करना बेहद जरूरी है
  जिस साइट पर आप ब्राउज़ कर रहे हैं, उसका। यह चेक करके किया जा सकता है
  साइट का एक्सटेंशन और डोमेन नाम।
reviewed: true
question: ऑनलाइन घोटालों से बचने का एक तरीका क्या है?
answer: जिस साइट पर आप ब्राउज़ कर रहे हैं, उसकी पहचान सत्यापित करें, खासकर एक्सटेंशन और डोमेन नाम की जांच करके।
wrong_answers:
  - सार्वजनिक वाई-फाई नेटवर्क का इस्तेमाल करें।
  - ऐसी साइट्स का इस्तेमाल करें जो HTTPS प्रोटोकॉल का इस्तेमाल नहीं करती हैं।
  - उन साइट्स का इस्तेमाल करें जहां ताले का चिन्ह (पैडलॉक) नहीं दिखता।
explanation: |
  ऑनलाइन धोखाधड़ी से बचने के लिए, पहचान की पुष्टि करना बेहद जरूरी है
  आप यह साइट के एक्सटेंशन और डोमेन नाम 
  की जांच करके कर सकते हैं।
reviewed: true

question: Какъв е начинът да избегнете онлайн измами?
answer: Проверявайте самоличността на сайта, който разглеждате, особено като проверявате разширението и името на домейна.
wrong_answers:
  - Използвайте обществени Wi-Fi мрежи.
  - Използвайте сайтове, които не използват протокола HTTPS.
  - Използвайте сайтове, на които не е показан катинар.
explanation: |
  Проверката на самоличността на сайта, който разглеждате, е от решаващо значение за избягване на онлайн измами. Можете да направите това, като проверите разширението и името на домейна на сайта.
reviewed: true
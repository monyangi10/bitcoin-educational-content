question: पासवर्ड मैनेजर क्या है?
answer: एक उपकरण जो पासवर्ड संग्रहीत (स्टोर) करता है, उत्पन्न (जनरेट) करता है और प्रबंधित (मैनेज) करता है।
wrong_answers:
  - हैकिंग हमलों से बचाने वाला एक एंटीवायरस सॉफ़्टवेयर।
  - एक सुरक्षित ईमेल सेवा।
  - व्यक्तिगत पहचान डेटा के लिए एक बैकअप उपकरण।
explanation: |
  एक पासवर्ड मैनेजर पासवर्ड्स को संग्रहीत (स्टोर) करने और उत्पन्न (जनरेट) करने का काम एक ही जगह से करता है।
reviewed: true

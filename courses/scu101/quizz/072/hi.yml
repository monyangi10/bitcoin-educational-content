question: एक पासवर्ड मैनेजर क्या है?
answer: एक टूल जो पासवर्ड स्टोर करता है, जनरेट करता है और मैनेज करता है।
wrong_answers:
  - हैकिंग हमलों से बचाने वाला एक एंटीवायरस सॉफ़्टवेयर।
  - एक सुरक्षित ईमेल सेवा।
  - एक व्यक्तिगत पहचान डेटा के लिए बैकअप टूल।
explanation: |
  एक पासवर्ड मैनेजर पासवर्ड्स को स्टोर करने और बनाने का काम एक ही जगह से करता है।

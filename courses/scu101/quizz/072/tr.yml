question: Parola yöneticisi nedir?
answer: Parolaları depolayan, oluşturan ve yöneten bir araç.
wrong_answers:
  - Bilgisayar korsanlığı saldırılarına karşı bir antivirüs yazılımı.
  - Güvenli bir e-posta hizmeti.
  - Kişisel kimlik verileri için bir yedekleme aracı.
explanation: |
  Bir parola yöneticisi, parolaların depolanmasını ve oluşturulmasını merkezileştirir.
reviewed: true
question: Какво е мениджър на пароли?
answer: Инструмент, който съхранява, генерира и управлява пароли.
wrong_answers:
  - Антивирусен софтуер срещу хакерски атаки.
  - Сигурна услуга за електронна поща.
  - Инструмент за архивиране на лични данни за самоличност.
explanation: |
  Мениджърът на пароли централизира съхранението и създаването на пароли.
reviewed: true
question: ตัวจัดการรหัสผ่านคืออะไร?
answer: เครื่องมือที่จัดเก็บ สร้าง และจัดการรหัสผ่าน
wrong_answers:
  - ซอฟต์แวร์ป้องกันไวรัสต่อต้านการโจมตีจากการแฮ็ก
  - บริการอีเมลที่ปลอดภัย
  - เครื่องมือสำรองข้อมูลสำหรับข้อมูลประจำตัวส่วนบุคคล
explanation: |
  ตัวจัดการรหัสผ่านรวมการจัดเก็บและการสร้างรหัสผ่านไว้ในที่เดียว
reviewed: true
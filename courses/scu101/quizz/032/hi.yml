question: रैंसमवेयर क्या है?
answer: एक तरह का दुर्भावनापूर्ण सॉफ्टवेयर जो यूज़र के डेटा को एन्क्रिप्ट कर देता है और उसे डिक्रिप्ट करने के लिए फिरौती मांगता है।
wrong_answers:
  - एक तरह का एंटीवायरस सॉफ्टवेयर जो एक बार के भुगतान पर कंप्यूटर कैश और कुकीज़ को साफ करने में सक्षम है।
  - एक तरह का सॉफ्टवेयर जो डेटा रिकवरी के लिए इस्तेमाल होता है, यह आजकल यूरोप में काफी आम होता जा रहा है।
  - एक तरह का सॉफ्टवेयर जो डेटा बैकअप के लिए इस्तेमाल होता है, आमतौर पर यह हर 7 दिन में एक बार बैकअप करता है।
explanation: |
  रैंसमवेयर एक तरह का दुर्भावनापूर्ण सॉफ्टवेयर है जो डेटा को एन्क्रिप्ट कर देता है
  यूज़र डेटा को एन्क्रिप्ट कर देता है और उसे डिक्रिप्ट करने के लिए फिरौती मांगता है। यह
  तेजी से आम होता जा रहा है और बहुत परेशानी भरा हो सकता है
  एक कंपनी या फिर किसी व्यक्ति के लिए।
reviewed: true
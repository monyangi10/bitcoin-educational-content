question: 랜섬웨어란 무엇인가요?
answer: 사용자 데이터를 암호화하고 이를 해독하기 위해 몸값을 요구하는 악성 소프트웨어의 일종입니다.
wrong_answers:
  - 일회성 요금을 지불하면 컴퓨터 캐시 및 쿠키를 정리할 수 있는 바이러스 백신 소프트웨어의 일종입니다.
  - 데이터 복구에 사용되는 소프트웨어의 일종으로, 요즘 유럽에서는 꽤 보편화되고 있습니다.
  - 데이터 백업에 사용되는 소프트웨어의 일종으로, 일반적으로 7일에 한 번씩 백업을 수행합니다.
explanation: |
  랜섬웨어는 사용자 데이터를 암호화하고 이를 해독하기 위해 몸값을 요구하는 악성 소프트웨어의 일종입니다. 점점 더 흔해지고 있으며 회사나 개인에게 매우 번거로운 문제가 될 수 있습니다.
reviewed: true
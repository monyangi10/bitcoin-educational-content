question: แรนซัมแวร์คืออะไร?
answer: ซอฟต์แวร์ที่เป็นอันตรายประเภทหนึ่งที่เข้ารหัสข้อมูลของผู้ใช้และเรียกร้องค่าไถ่เพื่อถอดรหัสข้อมูลนั้น
wrong_answers:
  - ซอฟต์แวร์ป้องกันไวรัสประเภทหนึ่งที่สามารถล้างแคชและคุกกี้ของคอมพิวเตอร์ได้เมื่อชำระค่าธรรมเนียมครั้งเดียว
  - ซอฟต์แวร์ประเภทหนึ่งที่ใช้สำหรับการกู้คืนข้อมูล กำลังเป็นที่แพร่หลายในยุโรปในปัจจุบัน
  - ซอฟต์แวร์ประเภทหนึ่งที่ใช้สำหรับการสำรองข้อมูล ซึ่งมักจะทำการสำรองข้อมูลทุกๆ 7 วัน
explanation: |
  แรนซัมแวร์เป็นประเภทของซอฟต์แวร์ที่เป็นอันตรายที่เข้ารหัสข้อมูลของผู้ใช้และเรียกร้องค่าไถ่เพื่อถอดรหัสข้อมูลนั้น มันกำลังกลายเป็นเรื่องที่พบได้บ่อยขึ้นและสามารถสร้างปัญหาอย่างมากให้กับบริษัทหรือบุคคล
reviewed: true
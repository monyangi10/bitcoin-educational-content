question: Какво представлява рансъмуерът?
answer: Вид злонамерен софтуер, който криптира потребителски данни и изисква откуп за декриптирането им.
wrong_answers:
  - Вид антивирусен софтуер, който може да почиства кеша и бисквитките на компютъра след заплащане на еднократна такса.
  - Това е вид софтуер, използван за възстановяване на данни, който в днешно време е доста разпространен в Европа.
  - Вид софтуер, използван за архивиране на данни, който обикновено извършва едно архивиране на всеки 7 дни.
explanation: |
  Ransomware е вид зловреден софтуер, който криптира потребителски данни и изисква откуп за декриптирането им. Той става все по-разпространен и може да бъде много неприятен за дадена компания или физическо лице.
reviewed: true
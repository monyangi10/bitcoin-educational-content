question: साइबर सुरक्षा में इस्तेमाल होने वाले कुछ प्रोग्रामिंग भाषाएं कौन-कौन सी हैं?
answer: पायथन, सी, जावा
wrong_answers:
  - HTML, CSS, जावास्क्रिप्ट
  - स्विफ्ट, कोटलिन, रूबी
  - पीएचपी, पर्ल, लुआ
explanation: |
  अध्याय में कुछ प्रोग्रामिंग भाषाओं के रूप में पायथन, सी, और जावा का उल्लेख किया गया है।
  साइबर सुरक्षा में इस्तेमाल होने वाले प्रोग्रामिंग भाषाएँ।
reviewed: true
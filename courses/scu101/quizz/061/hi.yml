question: साइबर सुरक्षा में इस्तेमाल होने वाले कुछ प्रोग्रामिंग भाषाएं कौन-कौन सी हैं?
answer: पायथन(Python), सी(C), जावा(Java)
wrong_answers:
  - एचटीएमएल(HTML), सीएसएस(CSS), जावास्क्रिप्ट(JavaScript)
  - स्विफ्ट(Swift), कोटलिन(Kotlin), रूबी(Ruby)
  - पीएचपी(PHP), पर्ल(Perl), लुआ(Lua)
explanation: |
  अध्याय में पायथन(Python), सी(C), और जावा(Java) को साइबर सुरक्षा में उपयोग की जाने वाली कुछ
  प्रोग्रामिंग भाषाओं के रूप में सूचीबद्ध किया गया है।
reviewed: true

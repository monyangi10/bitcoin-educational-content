question: Siber güvenlikte kullanılan programlama dillerinden bazıları nelerdir?
answer: Python, C, Java
wrong_answers:
  - HTML, CSS, JavaScript
  - Swift, Kotlin, Ruby
  - PHP, Perl, Lua
explanation: |
  Bu bölüm Python, C ve Java'yı siber güvenlikte kullanılan bazı programlama dilleri olarak listelemektedir.
reviewed: true

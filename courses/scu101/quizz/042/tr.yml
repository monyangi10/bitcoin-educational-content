question: Rastgele oluşturulmuş parolalar kullanmak neden önemlidir?
answer: Kaba kuvvet saldırılarına karşı, sözlük kelimeleri içeren aynı uzunluktaki şifrelere göre daha dayanıklıdırlar.
wrong_answers:
  - Hatırlaması daha kolaydır ancak yazması daha yavaştır.
  - Rastgele 20 karakteri aştıkları için her zaman güvenlidirler.
  - Çoğu çevrimiçi hizmet yalnızca minimum uzunluk ve karakter kümesi ister; bu kriterleri yerine getirmek parolaların yeterince güçlü olduğu anlamına gelir.
explanation: |
  Rastgele oluşturulan parolalar daha yüksek düzeyde
  güvenlik çünkü kaba kuvvete karşı daha dirençlidirler
  parolaları tahmin etmeye çalışan saldırılar
  olası karakter kombinasyonları.
reviewed: true
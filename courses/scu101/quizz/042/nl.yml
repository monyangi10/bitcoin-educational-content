question: Waarom is het belangrijk om willekeurig gegenereerde wachtwoorden te gebruiken?
answer: Ze zijn beter bestand tegen brute force-aanvallen dan wachtwoorden van dezelfde lengte die woorden uit een woordenboek bevatten.
wrong_answers:
  - Ze zijn gemakkelijker te onthouden, maar langzamer in te typen.
  - Ze zijn altijd veilig omdat ze meer dan 20 willekeurige tekens bevatten.
  - De meeste online diensten vragen alleen om een minimale lengte en een set tekens; als aan deze criteria wordt voldaan, zijn de wachtwoorden sterk genoeg.
explanation: |
  Willekeurig gegenereerde wachtwoorden bieden een hoger niveau van
  veiligheid omdat ze beter bestand zijn tegen brute kracht
  aanvallen, waarbij geprobeerd wordt wachtwoorden te raden door alle
  mogelijke combinaties van tekens te proberen.
reviewed: true
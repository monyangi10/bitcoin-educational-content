question: यादृच्छिक (रैंडम) जनरेट किए गए पासवर्ड का उपयोग करना क्यों ज़रूरी है?
answer: वे उसी लंबाई के पासवर्ड्स के मुकाबले ब्रूट फोर्स अटैक के खिलाफ ज़्यादा मज़बूत होते हैं जिनमें डिक्शनरी के शब्द होते हैं।
wrong_answers:
  - वो याद रखने में आसान होते हैं, लेकिन टाइप करने में धीमे।
  - वे हमेशा सुरक्षित होते हैं क्योंकि वे 20 से ज़्यादा रैंडम करैक्टर्स का इस्तेमाल करते हैं।
  - अधिकतर ऑनलाइन सेवाएँ सिर्फ न्यूनतम लंबाई और कुछ खास करैक्टर सेट की मांग करती हैं, इन शर्तों को पूरा करने का मतलब है कि पासवर्ड काफी मजबूत हैं।
explanation: |
  बिना सोचे-समझे बनाए गए पासवर्ड ज़्यादा सुरक्षित होते हैं
  सुरक्षा क्योंकि ये ब्रूट फोर्स के खिलाफ ज्यादा मजबूत होते हैं
  हमले, जो सभी संभव पासवर्ड आज़माकर पासवर्ड का अनुमान लगाने की कोशिश करते हैं
  संभावित अक्षरों के सभी संयोजन।
reviewed: true
question: Dlaczego korzystanie z losowo generowanych haseł jest ważne?
answer: Są one bardziej odporne na ataki siłowe niż hasła o tej samej długości zawierające słowa słownikowe.
wrong_answers:
  - Są one łatwiejsze do zapamiętania, ale wolniej się je wpisuje.
  - Są one zawsze bezpieczne, ponieważ przekraczają 20 losowych znaków.
  - Większość usług online wymaga jedynie minimalnej długości i zestawu znaków, spełnienie tych kryteriów oznacza, że hasła są wystarczająco silne.
explanation: |
  Losowo generowane hasła oferują wyższy poziom

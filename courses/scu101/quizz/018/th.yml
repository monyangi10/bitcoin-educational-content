question: แนวทางปฏิบัติที่แนะนำสำหรับการใช้บัญชีผู้ดูแลระบบบน Windows คืออะไร?
answer: สร้างบัญชีสองบัญชีแยกกัน - บัญชีผู้ดูแลระบบและบัญชีสำหรับการใช้งานประจำวัน
wrong_answers:
  - ใช้บัญชีผู้ดูแลระบบทุกวันหากพีซีไม่ได้เชื่อมต่อกับอินเทอร์เน็ต
  - สร้างบัญชีผู้ดูแลระบบสองบัญชีแยกกัน - หนึ่งสำหรับการใช้งานประจำวันและอีกหนึ่งสำหรับการจัดการระบบปฏิบัติการ
  - อย่าสร้างบัญชีผู้ดูแลระบบ
explanation: |
  การใช้บัญชีผู้ดูแลระบบสำหรับการใช้งานประจำวันบน Windows สามารถทำให้ระบบเสี่ยงต่อความปลอดภัยมากขึ้น ควรสร้างบัญชีแยกสองบัญชี: หนึ่งสำหรับงานด้านการดูแลระบบและอีกหนึ่งสำหรับการใช้งานประจำวัน
reviewed: true
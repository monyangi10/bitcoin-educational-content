question: विंडोज़ पर एडमिनिस्ट्रेटर अकाउंट का उपयोग करने के लिए सुझावित प्रैक्टिस क्या है?
answer: दो अलग-अलग अकाउंट बनाएं; एक एडमिनिस्ट्रेटर अकाउंट और एक रोज़मर्रा के इस्तेमाल के लिए अकाउंट।
wrong_answers:
  - इंटरनेट से कनेक्ट न होने पर दैनिक उपयोग के लिए एडमिनिस्ट्रेटर अकाउंट का उपयोग करें।
  - दो अलग-अलग एडमिनिस्ट्रेटर अकाउंट बनाएं; एक रोज़मर्रा के इस्तेमाल के लिए और एक ऑपरेटिंग सिस्टम प्रशासन के लिए।
  - एडमिनिस्ट्रेटर अकाउंट न बनाएं।
explanation: |
  विंडोज़ पर रोज़मर्रा के काम के लिए एडमिनिस्ट्रेटर अकाउंट का इस्तेमाल करना
  सिस्टम को और सुरक्षा खतरों के सामने उजागर करता है। सलाह दी जाती है
  दो अलग-अलग खाते बनाने के लिए; एक प्रशासनिक के लिए
  कामों के लिए एक और रोज़मर्रा के इस्तेमाल के लिए एक।
reviewed: true
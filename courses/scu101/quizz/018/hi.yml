question: विंडोज़ पर व्यवस्थापक (एडमिनिस्ट्रेटर) खाता उपयोग करने के लिए सुझावित तरीका क्या है?
answer: दो अलग-अलग खाते बनाएं; एक एडमिनिस्ट्रेटर खाता और एक रोज़मर्रा के इस्तेमाल के लिए खाता।
wrong_answers:
  - यदि पीसी इंटरनेट से कनेक्ट नहीं है तो दैनिक उपयोग के लिए व्यवस्थापक (एडमिनिस्ट्रेटर) खाते का उपयोग करें।
  - दो अलग-अलग व्यवस्थापक (एडमिनिस्ट्रेटर) खाते बनाएं; एक रोज़मर्रा के इस्तेमाल के लिए और एक ऑपरेटिंग सिस्टम प्रशासन के लिए।
  - एडमिनिस्ट्रेटर खाता न बनाएं।
explanation: |
  विंडोज़ पर दैनिक उपयोग के लिए व्यवस्थापक खाता उपयोग करने से सिस्टम अधिक सुरक्षा जोखिमों के
  संपर्क में आ सकता है।
  दो अलग-अलग खाते बनाए जाने चाहिए: एक प्रशासनिक कार्यों के लिए और दूसरा दैनिक उपयोग के
  लिए।
reviewed: true

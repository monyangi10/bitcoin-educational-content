question: Ni ubuhe buryo bwiza bwo gukoresha konti y’umuyobozi kuri Windows?
answer: Rema konti zibiri zitandukanye, imwe y’ibikorwa bijanye n'umuyobozi n’iyindi yibikorwa vya minsi yose.
wrong_answers:
  - Koresha konti y’umuyobozi ku musi ku musi nimba PC itari kuri interineti.
  - Rema konti zibiri zitandukanye z'umuyobozi - imwe yo gukoresha ku musi ku musi n'iyindi y'umuyobozi wa sisiteme.
  - Ntu reme konti y'umuyobozi.
explanation: |
  Gukoresha konti y’umuyobozi ku musi ku musi kuri Windows birashobora gushira sisiteme mukaga muvy'umutekano.
  Hakwiye gushirwaho amakonti abiri atandukanye: imwe y’ibikorwa bijanye n'umuyobozi n’iyindi yibikorwa vya minsi yose.
reviewed: true

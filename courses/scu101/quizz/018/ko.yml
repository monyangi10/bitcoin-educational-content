question: Windows에서 관리자 계정을 사용할 때 권장되는 방법은 무엇인가요?
answer: 관리자 계정과 일상적으로 사용할 계정, 두 개의 계정을 별도로 만듭니다.
wrong_answers:
  - PC가 인터넷에 연결되어 있지 않은 경우 매일 관리자 계정을 사용하세요.
  - 일상적인 사용용 계정과 운영 체제 관리용 계정 등 두 개의 관리자 계정을 별도로 만듭니다.
  - 관리자 계정을 만들지 마세요.
explanation: |
  Windows에서 일상적인 용도로 관리자 계정을 사용하면 시스템이 더 많은 보안 위험에 노출될 수 있습니다. 관리 작업용 계정과 일상적인 사용용 계정을 별도로 만들어야 합니다.
reviewed: true
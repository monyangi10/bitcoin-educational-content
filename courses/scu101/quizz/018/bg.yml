question: Каква е препоръчителната практика за използване на администраторски акаунт в Windows?
answer: Създайте два отделни акаунта - администраторски акаунт и акаунт за ежедневна употреба.
wrong_answers:
  - Ако компютърът не е свързан с интернет, използвайте ежедневно администраторския акаунт.
  - Създайте два отделни администраторски акаунта - един за ежедневна употреба и един за администриране на операционната система.
  - Не създавайте администраторски акаунт.
explanation: |
  Използването на администраторски акаунт за ежедневна употреба в Windows може да изложи системата на повече рискове за сигурността. Трябва да се създадат два отделни акаунта: един за административни задачи и друг за ежедневна употреба.
reviewed: true
question: ทำไมจึงแนะนำให้ดาวน์โหลดซอฟต์แวร์จากเว็บไซต์ทางการของผู้จัดพิมพ์แทนที่จะเป็นเว็บไซต์ทั่วไป?
answer: เพื่อให้แน่ใจว่าซอฟต์แวร์ปลอดจากซอฟต์แวร์ที่เป็นอันตราย
wrong_answers:
  - เพื่อสนับสนุนผู้จัดพิมพ์ทางการเงิน
  - เพราะซอฟต์แวร์มักจะมีราคาถูกกว่าบนเว็บไซต์ทางการ
  - เนื่องจากซอฟต์แวร์บนเว็บไซต์ทั่วไปมักจะล้าสมัย
explanation: |
  การดาวน์โหลดซอฟต์แวร์จากเว็บไซต์ทางการของผู้เผยแพร่ช่วยให้มั่นใจได้ว่าคุณจะได้รับเวอร์ชันที่ถูกต้องของซอฟต์แวร์ ซึ่งปราศจากซอฟต์แวร์ที่เป็นอันตรายใด ๆ ที่อาจทำอันตรายต่ออุปกรณ์ของคุณหรือขโมยข้อมูลของคุณ
reviewed: true
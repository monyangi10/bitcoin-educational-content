question: 일반 사이트가 아닌 퍼블리셔의 공식 웹사이트에서 소프트웨어를 다운로드하는 것이 권장되는 이유는 무엇인가요?
answer: 소프트웨어에 악성 소프트웨어가 없는지 확인합니다.
wrong_answers:
  - 퍼블리셔를 재정적으로 지원하기 위해.
  - 소프트웨어는 일반적으로 공식 웹사이트에서 더 저렴하기 때문입니다.
  - 일반 사이트의 소프트웨어는 일반적으로 오래되었기 때문입니다.
explanation: |
  퍼블리셔의 공식 웹사이트에서 소프트웨어를 다운로드하면
  게시자의 공식 웹 사이트에서 소프트웨어를 다운로드하면 악성 코드가 없는 합법적인
  합법적인 버전의 소프트웨어를 다운로드할 수 있습니다
  악성 소프트웨어가 없는 합법적인 버전의 소프트웨어를 사용하는 것입니다.
reviewed: true
question: Защо е препоръчително да изтегляте софтуер от официалния уебсайт на издателя, а не от общи сайтове?
answer: За да сте сигурни, че софтуерът е свободен от зловреден софтуер.
wrong_answers:
  - Финансова подкрепа за издателя.
  - Защото софтуерът обикновено е по-евтин на официалния уебсайт.
  - Защото софтуерът на общите сайтове обикновено е остарял.
explanation: |
  Изтегляне на софтуер от официалния уебсайт на
  издателя гарантира, че получавате легитимен
  версия на софтуера, която е свободна от всякакви зловредни
  софтуер, който може да повреди устройството ви или да открадне данните ви.
reviewed: true
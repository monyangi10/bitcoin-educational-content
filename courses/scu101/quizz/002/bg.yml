question: Защо е препоръчително да изтегляте софтуер от официалния уебсайт на издателя, а не от случайни сайтове?
answer: За да сте сигурни, че софтуерът няма зловреден софтуер.
wrong_answers:
  - Финансова подкрепа за издателя.
  - Защото софтуерът обикновено е по-евтин на официалния уебсайт.
  - Защото софтуерът на общите сайтове обикновено е остарял.
explanation: |
  Изтегляне на софтуер от официалния уебсайт на
  издателя гарантира, че получавате легитимна
  версия на софтуера, която няма зловреден
  софтуер, който може да повреди устройството ви или да открадне данните ви.
reviewed: true

question: Ni ibihe bintu bibi bishobora kuba biri mu bifatanijwe imeyiri be n’amashusho?
answer: Porogarame mbi
wrong_answers:
  - Ubutumwa budaciye mu mategeko
  - Amatangazo
  - Ibirimwo vyo kwamamaza
explanation: |
  Ivyo bifatanijwe na imeyiri n’amashusho bishobora kubamwo ibintu bibi.
  Ku bw’ivyo, ntukwiye kuvoma canke kwugurura ibifatanijwe na imeyiri
  birungitse nabantu utazi canke bateye amakenga.
reviewed: true

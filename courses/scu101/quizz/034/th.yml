question: ไฟล์แนบและรูปภาพในอีเมลสามารถมีเนื้อหาที่เป็นอันตรายได้อย่างไร?
answer: มัลแวร์
wrong_answers:
  - สแปม
  - โฆษณา
  - เนื้อหาส่งเสริมการขาย
explanation: |
  ไฟล์แนบอีเมลและรูปภาพอาจมีมัลแวร์
  ดังนั้น คุณไม่ควรดาวน์โหลดหรือเปิดไฟล์แนบจาก
  ผู้ส่งที่ไม่รู้จักหรือมีความน่าสงสัย
reviewed: true
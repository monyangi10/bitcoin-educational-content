question: Какво злонамерено съдържание могат да съдържат прикачени файлове и изображения в имейли?
answer: Зловреден софтуер
wrong_answers:
  - Спам
  - Реклами
  - Промоционално съдържание
explanation: |
  Прикачените файлове и изображения в имейли могат да съдържат зловреден софтуер.
  Затова не трябва да изтегляте или отваряте прикачени файлове от
  непознати или подозрителни изпращачи.
reviewed: true
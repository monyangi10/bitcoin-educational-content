question: ईमेल अटैचमेंट्स और इमेजेस में क्या खतरनाक कंटेंट हो सकता है?
answer: मैलवेयर
wrong_answers:
  - स्पैम
  - विज्ञापन
  - प्रचार सामग्री
explanation: |
  ईमेल अटैचमेंट और इमेज में मैलवेयर हो सकता है।
  इसलिए, आपको अटैचमेंट डाउनलोड या खोलने नहीं चाहिए...
  अनजान या संदिग्ध भेजने वाले।
reviewed: true
question: ईमेल अटैचमेंट्स और इमेजेस में क्या हानिकारक कंटेंट हो सकता है?
answer: मैलवेयर
wrong_answers:
  - स्पैम
  - विज्ञापन
  - प्रचार सामग्री
explanation: |
  ईमेल अटैचमेंट और इमेज में मैलवेयर हो सकता है।
  इसलिए, आपको अनजान या संदिग्ध प्रेषकों से आने वाले
  अटैचमेंट्स को डाउनलोड या खोलना नहीं चाहिए।
reviewed: true

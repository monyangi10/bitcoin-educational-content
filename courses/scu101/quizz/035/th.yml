question: วัตถุประสงค์ของการพยายามฟิชชิ่งคืออะไร?
answer: เพื่อดึงข้อมูลที่ละเอียดอ่อน เช่น ข้อมูลรับรองและรหัสผ่านของคุณ
wrong_answers:
  - เพื่อส่งอีเมลสแปมถึงคุณ
  - เพื่อขายผลิตภัณฑ์หรือบริการของคุณ
  - เพื่อเชิญคุณเข้าร่วมกิจกรรมหรือการสัมมนาผ่านเว็บ
explanation: |
  ความพยายามฟิชชิ่งมีเป้าหมายเพื่อดึงข้อมูลที่ละเอียดอ่อน เช่น ข้อมูลประจำตัวและรหัสผ่านของคุณ แฮกเกอร์ใช้กลยุทธ์ต่างๆ เช่น อีเมลปลอม เพื่อหลอกล่อให้คุณเปิดเผยข้อมูลของคุณ
reviewed: true
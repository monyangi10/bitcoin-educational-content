question: फिशिंग प्रयासों का मकसद क्या होता है?
answer: आपकी क्रेडेंशियल्स और पासवर्ड जैसी संवेदनशील जानकारी निकालना।
wrong_answers:
  - आपको स्पैम ईमेल भेजने के लिए।
  - आपको अपने उत्पाद या सेवाएँ बेचने के लिए।
  - आपको इवेंट्स या वेबिनार में आमंत्रित करने के लिए।
explanation: |
  फ़िशिंग प्रयासों का उद्देश्य आपके के क्रेडेंशियल्स और पासवर्ड 
  जैसी संवेदनशील जानकारी निकालना होता हैं।
  हैकर्स आपको धोखा देने और आपकी जानकारी प्राप्त करने के लिए फर्जी ईमेल 
  जैसे कई तरीके अपनाते हैं।
reviewed: true

question: फिशिंग प्रयासों का मकसद क्या है?
answer: आपकी संवेदनशील जानकारी जैसे कि आपके क्रेडेंशियल्स और पासवर्ड चुराने के लिए।
wrong_answers:
  - तुम्हें स्पैम ईमेल भेजने के लिए।
  - आपको अपने उत्पाद या सेवाएँ बेचने के लिए।
  - आपको इवेंट्स या वेबिनार में आमंत्रित करने के लिए।
explanation: |
  फ़िशिंग के प्रयास संवेदनशील जानकारी निकालने के लिए होते हैं
  जानकारी जैसे आपके क्रेडेंशियल्स और पासवर्ड। हैकर्स
  आपको धोखा देने के लिए फर्जी ईमेल जैसे कई तरीके अपनाते हैं
  अपनी जानकारी उगलवाने में
reviewed: true
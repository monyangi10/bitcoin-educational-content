question: Каква е целта на опитите за фишинг?
answer: За извличане на чувствителна информация, като например вашите идентификационни данни и пароли.
wrong_answers:
  - Да ви изпращаме спам имейли.
  - За да ви продаваме продукти или услуги.
  - Да ви поканим на събития или уебинари.
explanation: |
  Целта на опитите за фишинг е да се извлече чувствителна информация, например вашите идентификационни данни и пароли. Хакерите използват различни тактики, като например фалшиви имейли, за да ви подмамят да разкриете информацията си.
reviewed: true
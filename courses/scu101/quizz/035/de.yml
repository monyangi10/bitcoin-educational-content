question: Was ist der Zweck von Phishing-Versuchen?
answer: Um sensible Informationen wie deine Zugangsdaten und Passwörter zu extrahieren.
wrong_answers:
  - Dir Spam-E-Mails zu senden.
  - Dir Produkte oder Dienstleistungen zu verkaufen.
  - Dich zu Veranstaltungen oder Webinaren einzuladen.
explanation: |
  Phishing-Versuche zielen darauf ab, sensible Informationen wie deine Zugangsdaten und Passwörter zu extrahieren. Hacker verwenden verschiedene Taktiken wie betrügerische E-Mails, um dich dazu zu bringen, deine Informationen preiszugeben.
reviewed: true

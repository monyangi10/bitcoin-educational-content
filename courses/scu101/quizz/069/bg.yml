question: Какви са предимствата на използването на DOH (DNS през HTTPS) и DOT (DNS през TLS)?
answer: Те криптират DNS връзката, като осигуряват по-голяма поверителност и сигурност и предотвратяват атаки от типа "човек по средата".
wrong_answers:
  - Те ускоряват интернет връзката.
  - Те блокират всички реклами.
  - Те позволяват достъп до блокирани уебсайтове.
explanation: |
  DOH (DNS през HTTPS) и DOT (DNS през TLS) криптират DNS връзката, като осигуряват по-голяма поверителност и сигурност. Поради повишената си сигурност тези протоколи се използват широко в предприятията и се поддържат от Windows, Android и iPhone. Те подобряват неприкосновеността на личния живот и сигурността, като избягват атаките тип "човек по средата".
reviewed: true
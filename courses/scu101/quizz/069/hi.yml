question: DOH (DNS over HTTPS) और DOT (DNS over TLS) के फायदे क्या हैं?  

1. **सुरक्षा (Security)**  
   - ये DNS क्वेरीज़ को एन्क्रिप्ट करते हैं, जिससे हैकर्स या तीसरे पक्ष को आपकी ब्राउज़िंग एक्टिविटी देखने से रोका जा सकता है।  

2. **प्राइवेसी (Privacy)**  
   - आपकी DNS रिक्वेस्ट्स ISP या अन्य निगरानी करने वालों से छुपी रहती हैं, क्योंकि वे HTTPS/TLS के ज़रिए सुरक्षित होती हैं।  

3. **सेंसरशिप से बचाव (Bypass Censorship)**  
   - कुछ नेटवर्क DNS ब्लॉक करते हैं, लेकिन DOH/DOT इन रिस्ट्रिक्शन्स को बायपास करने में मदद कर सकते हैं।  

4. **मैन-इन-द-मिडिल अटैक्स से सुरक्षा (Protection from MITM Attacks)**  
   - ट्रैडिशनल DNS स्पूफिंग अटैक्स का शिकार हो सकता है, लेकिन DOH/DOT में एन्क्रिप्शन होने से यह रिस्क कम हो जाता है।  

5. **बेहतर परफॉर्मेंस (Better Performance)**  
   - कई बार, ये मॉडर्न प्रोटोकॉल्स कैशिंग और कम लेटेंसी के कारण फास्ट रेस्पॉन्स देते हैं।  

6. **कंसिस्टेंसी (Consistency)**  
   - चाहे आप किसी भी नेटवर्क पर हों, DOH/DOT एक सिक्योर और रिलायबल DNS रेज़ॉल्यूशन प्रदान करते हैं।  

इस तरह, DOH और DOT न सिर्फ आपकी ऑनलाइन प्राइवेसी बढ़ाते हैं, बल्कि सुरक्षा और परफॉर्मेंस भी इम्प्रूव करते हैं। 🚀
answer: वे DNS कनेक्शन को एन्क्रिप्ट करते हैं, जिससे ज्यादा प्राइवेसी और सुरक्षा मिलती है, और बीच में हमले (man in the middle attacks) से बचा जा सकता है।

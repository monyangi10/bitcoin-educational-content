question: DOH (DNS ओवर HTTPS) और DOT (DNS ओवर TLS) का उपयोग करने के क्या लाभ हैं?
answer: वे DNS कनेक्शन को एन्क्रिप्ट करते हैं, जिससे अधिक गोपनीयता और सुरक्षा मिलती है, और मैन-इन-द-मिडिल हमलों से बचा जा सकता है।
wrong_answers:
  - वे इंटरनेट कनेक्शन की गति बढ़ाते हैं।
  - वे सभी विज्ञापनों को अवरुद्ध (ब्लॉक) कर देते हैं।
  - वे अवरुद्ध वेबसाइटों तक पहुंच की अनुमति देते हैं।
explanation: |
  DOH (DNS over HTTPS) और DOT (DNS over TLS) DNS कनेक्शन को एन्क्रिप्ट करते हैं, 
  जिससे अधिक गोपनीयता और सुरक्षा मिलती है। अपनी उन्नत सुरक्षा के कारण, 
  इन प्रोटोकॉल का व्यापक रूप से उद्यमों में उपयोग किया जाता है और इन्हें Windows, Android और iPhone द्वारा मूल रूप से समर्थित किया जाता है। 
  वे मैन-इन-द-मिडल हमलों से बचाव करके गोपनीयता और सुरक्षा में सुधार करते हैं।
reviewed: true

question: Ni ivyiza ibihe biva mu gukoresha DOH (DNS kuri HTTPS) na DOT (DNS kuri TLS)?
answer: Bica bipfuka uruja n’uruza rwa DNS, bikaba bituma umuntu agira ubuzima bwite n’umutekano mwinshi, kandi bikaba birinda ibitero vy’umuntu ari hagati.
wrong_answers:
  - Baca bihutisha uruja n’uruza rwa internet.
  - Bahagarika amatangazo yose.
  - Bituma umuntu ashobora gushika ku mbuga zabujijwe.
explanation: |
  DOH (DNS kuri HTTPS) na DOT (DNS kuri TLS) zipfuka uruja n’uruza rwa DNS, zigatuma umuntu agira ubuzima bwite n’umutekano mwinshi. Kubera umutekano wavyo, izo porotokole zikoreshwa cane mu bigo kandi zishigikirwa na Windows, Android, na iPhone. Bituma umuntu agira ubuzima bwite n’umutekano mu kwirinda ibitero vy’abantu bari hagati.
reviewed: true
question: ข้อดีของการใช้ DOH (DNS over HTTPS) และ DOT (DNS over TLS) คืออะไร?
answer: พวกเขาเข้ารหัสการเชื่อมต่อ DNS เพื่อให้มีความเป็นส่วนตัวและความปลอดภัยมากขึ้น และหลีกเลี่ยงการโจมตีแบบคนกลาง
wrong_answers:
  - พวกเขาเร่งความเร็วการเชื่อมต่ออินเทอร์เน็ต
  - พวกเขาบล็อกโฆษณาทั้งหมด
  - พวกเขาอนุญาตให้เข้าถึงเว็บไซต์ที่ถูกบล็อก
explanation: |
  DOH (DNS over HTTPS) และ DOT (DNS over TLS) เข้ารหัสการเชื่อมต่อ DNS เพื่อให้ความเป็นส่วนตัวและความปลอดภัยที่มากขึ้น เนื่องจากความปลอดภัยที่เพิ่มขึ้น โปรโตคอลเหล่านี้จึงถูกใช้อย่างแพร่หลายในองค์กรและได้รับการสนับสนุนโดยตรงจาก Windows, Android และ iPhone พวกมันช่วยปรับปรุงความเป็นส่วนตัวและความปลอดภัยโดยการหลีกเลี่ยงการโจมตีแบบ man-in-the-middle
reviewed: true
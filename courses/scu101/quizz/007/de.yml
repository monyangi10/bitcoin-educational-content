question: Was ist privates Surfen?
answer: Eine Funktion, die verhindert, dass Internetbrowser Browserverlauf, temporäre Internetdateien, Formulardaten, Cookies sowie Benutzernamen und Passwörter speichern.
wrong_answers:
  - Eine Funktion, die deine Online-Aktivitäten vor deinem Internetdienstanbieter verbirgt.
  - Eine Funktion, die es dir ermöglicht, anonym im Internet zu surfen.
  - Eine Funktion, die dein Gerät vor Viren und anderer Schadsoftware schützt.
explanation: |
  Privates Surfen ist eine Funktion, die verhindert, dass
  Internetbrowser Browserverlauf, temporäre Internetdateien,
  Formulardaten, Cookies sowie Benutzernamen und Passwörter speichern.
  Es versteckt jedoch nicht deine Online-Aktivitäten vor deinem
  Internetdienstanbieter oder ermöglicht es dir, anonym im
  Internet zu surfen.
reviewed: true

question: การท่องเว็บแบบส่วนตัวคืออะไร?
answer: คุณสมบัติที่ป้องกันไม่ให้เบราว์เซอร์อินเทอร์เน็ตจัดเก็บประวัติการเข้าชมไฟล์อินเทอร์เน็ตชั่วคราวข้อมูลฟอร์มคุกกี้และชื่อผู้ใช้และรหัสผ่าน
wrong_answers:
  - คุณสมบัติที่ซ่อนกิจกรรมออนไลน์ของคุณจากผู้ให้บริการอินเทอร์เน็ตของคุณ
  - คุณสมบัติที่ช่วยให้คุณท่องอินเทอร์เน็ตโดยไม่เปิดเผยตัวตน
  - คุณสมบัติที่ปกป้องอุปกรณ์ของคุณจากไวรัสและซอฟต์แวร์ที่เป็นอันตรายอื่น ๆ
explanation: |
  การท่องเว็บแบบส่วนตัวเป็นฟีเจอร์ที่ป้องกันไม่ให้เบราว์เซอร์อินเทอร์เน็ตบันทึกประวัติการท่องเว็บ ไฟล์อินเทอร์เน็ตชั่วคราว ข้อมูลฟอร์ม คุกกี้ และชื่อผู้ใช้และรหัสผ่าน อย่างไรก็ตาม มันไม่ได้ซ่อนกิจกรรมออนไลน์ของคุณจากผู้ให้บริการอินเทอร์เน็ตของคุณหรืออนุญาตให้คุณท่องอินเทอร์เน็ตโดยไม่เปิดเผยตัวตน
reviewed: true
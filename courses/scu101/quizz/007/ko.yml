question: 비공개 브라우징이란 무엇인가요?
answer: 인터넷 브라우저가 검색 기록, 임시 인터넷 파일, 양식 데이터, 쿠키, 사용자 이름 및 비밀번호를 저장하지 못하도록 하는 기능입니다.
wrong_answers:
  - 인터넷 서비스 제공업체로부터 온라인 활동을 숨기는 기능입니다.
  - 익명으로 인터넷을 탐색할 수 있는 기능입니다.
  - 바이러스 및 기타 악성 소프트웨어로부터 디바이스를 보호하는 기능입니다.
explanation: |
  비공개 브라우징은 인터넷
  브라우저가 인터넷 검색 기록, 임시 인터넷
  파일, 양식 데이터, 쿠키, 사용자 이름과 비밀번호를 저장하지 못하게 하는 기능입니다.
  하지만 인터넷 서비스 제공업체로부터 사용자의 온라인 활동을 숨기거나
  인터넷 서비스 제공업체로부터 온라인 활동을 숨기지는 않습니다
  익명으로 인터넷을 탐색할 수 있습니다.
reviewed: true
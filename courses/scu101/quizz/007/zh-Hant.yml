question: 什麼是私人瀏覽？
answer: 防止網際網路瀏覽器儲存瀏覽記錄、網際網路暫存檔案、表單資料、Cookie 以及使用者名稱和密碼的功能。
wrong_answers:
  - 向網際網路服務供應商隱藏您的線上活動的功能。
  - 可讓您匿名瀏覽網際網路的功能。
  - 保護您的裝置免受病毒和其他惡意軟體侵害的功能。
explanation: |
  隱私瀏覽是一種可防止網際網路
  瀏覽器不會儲存瀏覽記錄、暫時網際網路
  檔案、表單資料、cookie 以及使用者名稱和密碼。
  但是，它不會隱藏您的線上活動，讓您的
  網際網路服務供應商，或允許您瀏覽
  匿名上網。
reviewed: true
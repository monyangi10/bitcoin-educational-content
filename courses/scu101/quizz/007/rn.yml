question: Kurondera mu buryo bwihariye ni iki?
answer: Uburyo bwokubuza mucukumbuzi kubika ibimenyetso vy'ivyo warondeye, amadosiye yo kuri interineti amara igihe gito, amakuru y’amafomu, ama kuki, n’amazina n’amajambo y'ibanga y'uwuyikoresha.
wrong_answers:
  - Uburyo bwo gihisha igikorwa cawe co kuri Internet ku muntu aguha interineti.
  - Uburyo bugufasha kurondera kuri internet muburyo butazwi.
  - Uburyo bwo kurinda igikoresho cawe umugera(nyabwonko) n’izindi porogarame mbi.
explanation: |
  Kurondera mu buryo bwihariye ni uburyo bwo kubuza mucukumbuzi kubika ibimenyetso vy'ivyo warondeye,
  amadosiye yo kuri interineti amara igihe gito, amakuru y’amafomu, ama kuki, n’amazina n’amajambo y'ibanga y'uwuyikoresha.
  Ariko rero, ntibinyegeza igikorwa cawe uwuguha interinete canke ngo bikwemerere kurondera
  kuri interinet muburyo butazwi
reviewed: true

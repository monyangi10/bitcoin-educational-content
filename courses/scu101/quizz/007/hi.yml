question: निजी ब्राउज़िंग क्या है?
answer: एक ऐसी सुविधा जो इंटरनेट ब्राउज़रों को ब्राउज़िंग इतिहास, अस्थायी इंटरनेट फ़ाइलें, फ़ॉर्म डेटा, कुकीज़, और उपयोगकर्ता नाम व पासवर्ड स्टोर करने से रोकती है।
wrong_answers:
  - एक ऐसा फीचर जो आपकी ऑनलाइन एक्टिविटी को आपके इंटरनेट सर्विस प्रोवाइडर से छुपा देता है।
  - एक फीचर जो आपको इंटरनेट पर गुमनाम रहकर ब्राउज़ करने देता है।
  - एक ऐसा फ़ीचर जो आपके डिवाइस को वायरस और दूसरे मैलिशियस सॉफ़्टवेयर से बचाता है।
explanation: |
  प्राइवेट ब्राउज़िंग एक ऐसी सुविधा है जो इंटरनेट पर आपकी एक्टिविटी को सेव नहीं होने देती।
  ब्राउज़र ब्राउज़िंग हिस्ट्री, टेम्पररी इंटरनेट डेटा स्टोर करने से रोकते हैं
  फाइलें, फॉर्म डेटा, कुकीज़, और यूज़रनेम व पासवर्ड।
  हालांकि, यह आपकी ऑनलाइन गतिविधि को आपसे छुपाता नहीं है
  इंटरनेट सेवा प्रदाता या आपको ब्राउज़ करने की अनुमति देता है
  इंटरनेट गुमनाम रूप से।
reviewed: true
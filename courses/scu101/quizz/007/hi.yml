question: निजी (प्राइवेट) ब्राउज़िंग क्या है?
answer: एक ऐसी सुविधा जो इंटरनेट ब्राउज़रों को ब्राउज़िंग इतिहास, अस्थायी इंटरनेट फ़ाइलें, फ़ॉर्म डेटा, कुकीज़, और उपयोगकर्ता नाम व पासवर्ड स्टोर करने से रोकती है।
wrong_answers:
  - एक ऐसी सुविधा जो आपकी ऑनलाइन गतिविधि को आपके इंटरनेट सेवा प्रदाता से छुपा देता है।
  - एक ऐसी सुविधा जो आपको इंटरनेट पर गुमनाम रहकर ब्राउज़ करने की अनुमति देती है।
  - एक ऐसी सुविधा जो आपके डिवाइस को वायरस और दूसरे हानिकारक सॉफ़्टवेयर से सुरक्षित रखती है।
explanation: |
  प्राइवेट ब्राउज़िंग एक ऐसी सुविधा है जो इंटरनेट पर आपकी एक्टिविटी को सेव नहीं होने देती।
  ब्राउज़िंग हिस्ट्री, अस्थायी इंटरनेट फ़ाइलें, फॉर्म डेटा, कुकीज़,
  और यूज़रनेम व पासवर्ड संग्रहीत करने से रोकती है।
  हालांकि, यह आपकी ऑनलाइन गतिविधि को आपके इंटरनेट सेवा
  प्रदाता से नहीं छुपाती और न ही आपको इंटरनेट को गुमनाम
  रूप से ब्राउज़ करने की अनुमति देती है।
reviewed: true

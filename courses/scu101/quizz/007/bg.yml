question: Какво представлява частното сърфиране?
answer: Функция, която не позволява на интернет браузърите да съхраняват историята на сърфиране, временните интернет файлове, данните от формулярите, бисквитките, както и потребителските имена и пароли.
wrong_answers:
  - Функция, която скрива онлайн активността ви от вашия доставчик на интернет услуги.
  - Функция, която ви позволява да сърфирате в интернет анонимно.
  - Функция, която защитава устройството ви от вируси и друг злонамерен софтуер.
explanation: |
  Частното сърфиране е функция, която предотвратява
  браузърите да съхраняват историята на сърфирането, временните
  файлове, данни от формуляри, бисквитки, както и потребителски имена и пароли.
  Въпреки това тя не скрива онлайн активността ви от
  доставчика на интернет услуги или ви позволява да сърфирате в
  интернет анонимно.
reviewed: true
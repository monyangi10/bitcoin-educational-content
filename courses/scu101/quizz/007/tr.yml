question: Özel tarama nedir?
answer: İnternet tarayıcılarının tarama geçmişini, geçici internet dosyalarını, form verilerini, 
çerezleri ve kullanıcı adları ile parolaları depolamasını engelleyen bir özelliktir.
wrong_answers:
  - Çevrimiçi etkinliğinizi internet servis sağlayıcınızdan gizleyen bir özelliktir.
  - İnternette anonim olarak gezinmenizi sağlayan bir özelliktir.
  - Cihazınızı virüslerden ve diğer kötü amaçlı yazılımlardan koruyan bir özelliktir.
explanation: |
  Gizli tarama, internette gezinirken, 
  tarayıcıların tarama geçmişini, geçici internet
  dosyalarını, form verilerini, çerezleri ve kullanıcı adları ve parolaları
  kaydetmesini engelleyen bir özelliktir.
  Bununla birlikte, çevrimiçi etkinliğinizi
  internet servis sağlayıcınızdan gizlemez ve 
  internette anonim olarak gezmenizi sağlamaz. 
reviewed: true

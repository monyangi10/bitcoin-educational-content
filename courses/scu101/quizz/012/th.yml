question: ทำไมการตรวจสอบคีย์สาธารณะของเว็บไซต์โดยใช้ระบบใบรับรองจึงสำคัญ?
answer: เพื่อยืนยันความถูกต้องของเว็บไซต์
wrong_answers:
  - เพื่อให้แน่ใจว่าไม่มีการหลอกลวงเกิดขึ้น แต่เฉพาะเมื่อเชื่อมต่อผ่านเครือข่าย Wi-Fi สาธารณะเท่านั้น
  - เพื่อบล็อกโฆษณาออนไลน์บางส่วน
  - เพื่อให้แน่ใจว่าไม่มีหน่วยงานที่เป็นอันตรายกำลังปลอมแปลงเว็บไซต์
explanation: |
  การยืนยันคีย์สาธารณะของเว็บไซต์โดยใช้ระบบใบรับรอง
  เป็นสิ่งสำคัญในการยืนยันความถูกต้องของเว็บไซต์ ซึ่ง
  ช่วยป้องกันบุคคลที่เป็นอันตรายจากการปลอมแปลง
  เว็บไซต์และการถ่ายโอนข้อมูลในรูปแบบข้อความธรรมดา
reviewed: true
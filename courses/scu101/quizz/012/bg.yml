question: Защо е важно да се проверява публичният ключ на сайта чрез система за сертификати?
answer: Потвърждаване на автентичността на сайта.
wrong_answers:
  - За да се гарантира, че няма да се случи измама, но само когато сте свързани чрез обществена Wi-Fi мрежа.
  - Частично блокиране на онлайн реклами.
  - За да се гарантира, че никой злонамерен субект не се представя за уебсайта.
explanation: |
  Проверка на публичния ключ на сайта чрез система за сертификати
  е важно, за да се потвърди автентичността на сайта. Това
  помага за защита срещу злонамерени лица, които се представят за
  сайта и прехвърляне на данни в обикновен текст.
reviewed: true

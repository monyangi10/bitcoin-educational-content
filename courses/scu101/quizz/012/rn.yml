question: Ni kubera iki  gusuzuma urufunguzo rwa rusange rw’urubuga hakoreshejwe uburyo bwo gutanga icemeza ko ari urw’ukuri ari ivy'akamaro?
answer: Kugira ngo wemeze ko urubuga ari urw’ukuri.
wrong_answers:
  - Kugira ntugwe mububeshi bushobora kubaho, ariko nimugihe gusa uri winjiye biciye ku muhora Wi-Fi ya rusangi.
  - Kugira ngo uhagarike amwe amwe mumatangazo yo kuri Internet.
  - Kugira ngo ntihabe hariko umuntu mubi w'umunyaruyeri ariko yigira canke ariko yiyitirira urubuga.
explanation: |
  N'ivyakamaro gusuzuma urufunguzo rwa rusange rw’urubuga hakoreshejwe uburyo bwo gutanga icemeza ko ari urw’ukuri.
  Ibi bifasha kwikingira abantu babi ba banyaruyeri biyitirira urubuga bakarungika amakuru mu nyandiko itanyegeje.
reviewed: true

question: 인증서 시스템을 사용하여 사이트의 공개 키를 확인하는 것이 중요한 이유는 무엇인가요?
answer: 사이트의 진위 여부를 확인합니다.
wrong_answers:
  - 사기가 발생하지 않도록 공용 Wi-Fi 네트워크를 통해 연결된 경우에만 사기가 발생할 수 있습니다.
  - 온라인 광고를 부분적으로 차단합니다.
  - 웹사이트를 사칭하는 악의적인 주체가 없는지 확인합니다.
explanation: |
  인증서 시스템을 사용하여 사이트의 공개 키를 확인하는 것은
  을 사용하여 사이트의 공개 키를 확인하는 것은 사이트의 신뢰성을 확인하는 데 중요합니다. 이는
  악의적인 개인이 사이트를 사칭하여
  사이트를 사칭하여 일반 텍스트로 데이터를 전송하는 악의적인 개인으로부터 보호할 수 있습니다.
reviewed: true
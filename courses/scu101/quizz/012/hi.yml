question: साइट का पब्लिक की सर्टिफिकेट सिस्टम से वेरिफाई करना क्यों जरूरी है?
answer: साइट की असली होने की पुष्टि करने के लिए।
wrong_answers:
  - यह सुनिश्चित करने के लिए कि कोई घोटाला नहीं हो सकता, लेकिन केवल तब जब सार्वजनिक वाई-फाई नेटवर्क से जुड़ा हो।
  - ऑनलाइन विज्ञापनों को आंशिक रूप से ब्लॉक करने के लिए।
  - यह सुनिश्चित करने के लिए कि कोई दुर्भावनापूर्ण संस्था वेबसाइट की नकल नहीं कर रही है।
explanation: |
  साइट के पब्लिक की को सर्टिफिकेट सिस्टम से वेरिफाई करना
  यह साइट की प्रामाणिकता की पुष्टि करना महत्वपूर्ण है।
  मदद करता है दुर्भावनापूर्ण लोगों के नकली रूप धारण करने से बचाने में
  साइट और डेटा को सादे टेक्स्ट में ट्रांसफर करना।
reviewed: true
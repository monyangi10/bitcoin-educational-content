question: Какво е простото решение за защита на данните ви от атаки с рансъмуер?
answer: Редовно създавайте резервни копия на важните си данни на външно устройство или в сигурна онлайн услуга за съхранение.
wrong_answers:
  - Инсталирайте няколко антивирусни програми на компютъра си и извършвайте периодични сканирания.
  - Редовно сменяйте компютъра си или преинсталирайте операционната си система (ОС).
  - Можете да използвате обществена Wi-Fi мрежа, ако нямате нищо за криене в устройството си.
explanation: |
  Редовното създаване на резервни копия на данните ви позволява да ги възстановите в случай на кибератака или повреда на хардуера, без да губите важна информация.
reviewed: true
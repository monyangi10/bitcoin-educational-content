question: रैनसमवेयर हमलों से अपने डेटा को बचाने का एक आसान तरीका क्या है?
answer: अपने ज़रूरी डेटा को नियमित रूप से एक बाहरी स्टोरेज डिवाइस या सुरक्षित ऑनलाइन स्टोरेज सेवा में बैकअप करते रहें।
wrong_answers:
  - अपने कंप्यूटर पर कई एंटीवायरस सॉफ़्टवेयर इंस्टॉल करें और समय-समय पर स्कैन करते रहें।
  - अपने कंप्यूटर को नियमित रूप से बदलें या ऑपरेटिंग सिस्टम (OS) को दोबारा इंस्टॉल करें।
  - अगर तुम्हारे डिवाइस में छुपाने जैसा कुछ नहीं है, तो तुम पब्लिक वाई-फाई नेटवर्क का इस्तेमाल कर सकते हो।
explanation: |
  अपना डेटा नियमित रूप से बैकअप करने से आप उसे
  साइबर हमले या हार्डवेयर खराब होने की स्थिति में डेटा
  बिना जरूरी जानकारी खोए।
reviewed: true
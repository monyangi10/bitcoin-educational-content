question: 랜섬웨어 공격으로부터 데이터를 보호할 수 있는 간단한 솔루션은 무엇인가요?
answer: 중요한 데이터를 외부 장치나 안전한 온라인 스토리지 서비스에 정기적으로 백업하세요.
wrong_answers:
  - 컴퓨터에 여러 백신 소프트웨어 프로그램을 설치하고 주기적으로 검사를 수행합니다.
  - 정기적으로 컴퓨터를 변경하거나 운영 체제(OS)를 다시 설치하세요.
  - 장치에 숨길 것이 없는 경우 공용 Wi-Fi 네트워크를 사용할 수 있습니다.
explanation: |
  데이터를 정기적으로 백업하면 사이버 공격이나 하드웨어 장애가 발생해도 중요한 정보를 잃지 않고 데이터를 복구할 수 있습니다.
reviewed: true
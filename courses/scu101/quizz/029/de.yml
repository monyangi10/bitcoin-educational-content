question: Was ist eine einfache Lösung, um deine Daten vor Ransomware-Angriffen zu schützen?
answer: Sichere regelmäßig deine wichtigen Daten auf einem externen Speichergerät oder einem sicheren Online-Speicherdienst.
wrong_answers:
  - Installiere mehrere Antivirenprogramme auf deinem Computer und führe regelmäßige Scans durch.
  - Ändere regelmäßig deinen Computer oder installiere dein Betriebssystem (OS) neu.
  - Du kannst ein öffentliches WLAN-Netzwerk nutzen, wenn du nichts zu verbergen hast auf deinem Gerät.
explanation: |
  Regelmäßige Datensicherungen ermöglichen es dir, deine
  Daten im Falle eines Cyberangriffs oder Hardwareausfalls
  wiederherzustellen, ohne wichtige Informationen zu verlieren.
reviewed: true

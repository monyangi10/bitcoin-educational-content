question: Ni umuti uwuhe woroshe wo gukingira amakuru yawe ibitero vy’incungu?
answer: Uhore ukora ububiko bw' inyongera bw'amakuru yawe yakamaro kugikoresho cokubika amakuri kindi canke ku gikoresho co kubika amakuru co kuri interineti kirinzwe.
wrong_answers:
  - Shiraho porogaramu nyinshi zikingira umugera(nyabwonko) ku nyabwonko yawe maze ukore irondera rimwe na rimwe.
  - Uhora uhindura inyabwonko yawe canke wongere uyishiremwo sisisteme (OS).
  - Ushobora gukoresha umuhora wa Wi-Fi wa rusange nimba ataco wihisha ku gikoresho cawe.
explanation: |
  Gukora ububiko bwinyongera bw’amakuru yawe misi yose biratuma ushobora gusubirana amakuru yawe igihe habaye igitero co kuri interineti canke igikoresho cawe kigapfa, urashobora kugarukana amakuru yawe ata makuru ahambaye utakaje.

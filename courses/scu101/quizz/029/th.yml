question: วิธีแก้ปัญหาง่ายๆ ในการปกป้องข้อมูลของคุณจากการโจมตีด้วยแรนซัมแวร์คืออะไร?
answer: สำรองข้อมูลสำคัญของคุณเป็นประจำบนอุปกรณ์ภายนอกหรือบริการจัดเก็บข้อมูลออนไลน์ที่ปลอดภัย
wrong_answers:
  - ติดตั้งโปรแกรมแอนตี้ไวรัสหลายตัวบนคอมพิวเตอร์ของคุณและทำการสแกนเป็นระยะ ๆ
  - เปลี่ยนคอมพิวเตอร์ของคุณหรือทำการติดตั้งระบบปฏิบัติการ (OS) ใหม่เป็นประจำ
  - คุณสามารถใช้เครือข่าย Wi-Fi สาธารณะได้หากคุณไม่มีอะไรต้องซ่อนในอุปกรณ์ของคุณ
explanation: |
  การสำรองข้อมูลของคุณเป็นประจำช่วยให้คุณสามารถกู้คืนข้อมูลของคุณได้ในกรณีที่เกิดการโจมตีทางไซเบอร์หรือฮาร์ดแวร์ล้มเหลวโดยไม่สูญเสียข้อมูลสำคัญ
reviewed: true
question: 비밀번호 관리자를 사용하면 어떤 이점이 있나요?
answer: 강력한 비밀번호를 생성하고 기억하는 데 도움이 되므로 비밀번호를 기억할 필요가 없습니다.
wrong_answers:
  - 온라인 계정에 자동으로 로그인합니다.
  - 바이러스로부터 컴퓨터를 보호합니다.
  - 모든 비밀번호를 한 곳에 저장하여 쉽게 찾을 수 있습니다.
explanation: |
  비밀번호 관리자는 강력한 비밀번호를 생성하고 기억할 수 있도록 도와줍니다. 모든 비밀번호를 안전한 방식으로 저장하고 강력한 비밀번호를 생성해 줍니다.
reviewed: true
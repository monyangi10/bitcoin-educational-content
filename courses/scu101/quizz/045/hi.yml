question: पासवर्ड मैनेजर का सबसे बड़ा फायदा क्या है?
answer: यह आपको मज़बूत पासवर्ड बनाने और याद रखने में मदद करता है, ताकि आपको यह करने की ज़रूरत ही न पड़े।
wrong_answers:
  - यह आपको अपने ऑनलाइन खातों में अपने आप लॉग इन कर देता है।
  - यह आपके कंप्यूटर को वायरस से बचाता है।
  - यह आपके सारे पासवर्ड्स को एक ही जगह स्टोर करता है, जिससे उन्हें ढूंढ़ना आसान हो जाता है।
explanation: |
  एक पासवर्ड मैनेजर आपको मजबूत पासवर्ड बनाने में मदद करता है और
  उन्हें याद रखो, ताकि तुम्हें न करना पड़े। यह तुम्हारे सारे
  पासवर्ड्स को सुरक्षित तरीके से रखता है और मजबूत पासवर्ड बनाता है
  तुम्हारे लिए।
reviewed: true
question: पासवर्ड मैनेजर का सबसे बड़ा फायदा क्या है?
answer: यह आपको मज़बूत पासवर्ड बनाने और याद रखने में मदद करता है, ताकि आपको खुद ऐसा न करना पड़े।
wrong_answers:
  - यह स्वचालित रूप से आपको अपने ऑनलाइन खातों में लॉग इन कर देता है।
  - यह आपके कंप्यूटर को वायरस से बचाता है।
  - यह आपके सारे पासवर्ड्स को एक ही जगह संग्रहीत करता है, जिससे उन्हें ढूंढ़ना आसान हो जाता है।
explanation: |
  पासवर्ड मैनेजर आपको मजबूत पासवर्ड बनाने और उन्हें याद रखने में मदद करता है,
  ताकि आपको खुद ऐसा न करना पड़े।
  यह आपके सभी पासवर्ड को सुरक्षित तरीके से संग्रहीत करता है
  और आपके लिए मजबूत पासवर्ड उत्पन्न करता है।
reviewed: true

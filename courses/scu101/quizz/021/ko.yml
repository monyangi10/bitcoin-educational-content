question: 업데이트할 수 없는 크랙 소프트웨어 사용의 잠재적 위협은 무엇인가요?
answer: 불법 다운로드 중 바이러스가 유입되고 새로운 형태의 공격에 대한 안전하지 않은 사용.
wrong_answers:
  - 소프트웨어는 일정 기간이 지나면 작동이 중지됩니다.
  - 이 소프트웨어에는 새로운 기능이 없습니다.
  - 이 소프트웨어는 더 많은 시스템 리소스를 소비합니다.
explanation: |
  업데이트할 수 없는 크랙 소프트웨어는 두 가지 잠재적 위협을 나타냅니다. 의심스러운 웹사이트에서 불법으로 다운로드하는 과정에서 바이러스를 옮길 수 있으며 새로운 형태의 공격에 취약할 수 있습니다.
reviewed: true
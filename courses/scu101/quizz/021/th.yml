question: ภัยคุกคามที่อาจเกิดขึ้นจากการใช้ซอฟต์แวร์ที่ถูกแคร็กและไม่สามารถอัปเดตได้คืออะไร?
answer: การมาถึงของไวรัสระหว่างการดาวน์โหลดที่ผิดกฎหมายและการใช้งานที่ไม่ปลอดภัยต่อรูปแบบการโจมตีใหม่ ๆ
wrong_answers:
  - ซอฟต์แวร์จะหยุดทำงานหลังจากช่วงระยะเวลาหนึ่ง
  - ซอฟต์แวร์จะไม่มีคุณสมบัติใหม่ใด ๆ
  - ซอฟต์แวร์จะใช้ทรัพยากรของระบบมากขึ้น
explanation: |
  ซอฟต์แวร์ที่ถูกแคร็กซึ่งไม่สามารถอัปเดตได้แสดงถึงภัยคุกคามที่มีศักยภาพสองเท่า มันสามารถนำไวรัสมาในระหว่างการดาวน์โหลดที่ผิดกฎหมายจากเว็บไซต์ที่น่าสงสัย และมีความเสี่ยงต่อรูปแบบการโจมตีใหม่ ๆ
reviewed: true
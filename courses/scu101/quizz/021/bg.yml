question: Каква е потенциалната заплаха от използването на кракнат софтуер, който не може да бъде актуализиран?
answer: Пристигането на вирус по време на незаконното му изтегляне и несигурното му използване срещу нови форми на атака.
wrong_answers:
  - Софтуерът ще спре да работи след определен период от време.
  - Софтуерът няма да има нови функции.
  - Софтуерът ще консумира повече системни ресурси.
explanation: |
  Спуканият софтуер, който не може да бъде актуализиран, представлява двойна потенциална заплаха. Той може да носи вирус по време на незаконното си изтегляне от подозрителен уебсайт и да е уязвим към нови форми на атака.
reviewed: true
question: क्रैक किए गए सॉफ़्टवेयर का उपयोग करने का संभावित खतरा क्या है जिसे अपडेट नहीं किया जा सकता?
answer: इसके अवैध डाउनलोड के दौरान वायरस का आना और नए प्रकार के हमलों के खिलाफ असुरक्षित इस्तेमाल।
wrong_answers:
  - सॉफ्टवेयर एक निश्चित समय के बाद काम करना बंद कर देगा।
  - सॉफ्टवेयर में कोई नए विशेषताएँ (फीचर्स) नहीं होंगे।
  - सॉफ़्टवेयर अधिक सिस्टम संसाधनों (रिसोर्सेज़) का उपयोग करेगा।
explanation: |
  अपडेट न किए जा सकने वाले क्रैक सॉफ़्टवेयर में दोहरे खतरे की संभावना होती है।
  यह किसी संदिग्ध वेबसाइट से अवैध डाउनलोड के दौरान वायरस ला सकता है
  और नए प्रकार के हमलों
  के प्रति असुरक्षित हो सकता है।
reviewed: true

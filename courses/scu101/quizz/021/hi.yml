question: क्रैक किए गए सॉफ़्टवेयर का उपयोग करने का संभावित खतरा क्या है जिसे अपडेट नहीं किया जा सकता?
answer: वायरस का आना उसके अवैध डाउनलोड के दौरान और नए प्रकार के हमलों के खिलाफ असुरक्षित इस्तेमाल के कारण होता है।
wrong_answers:
  - सॉफ्टवेयर एक निश्चित समय के बाद काम करना बंद कर देगा।
  - सॉफ्टवेयर में कोई नए फीचर्स नहीं होंगे।
  - सॉफ़्टवेयर सिस्टम के ज़्यादा रिसोर्सेज़ खा जाएगा।
explanation: |
  क्रैक किया हुआ सॉफ्टवेयर जिसे अपडेट नहीं किया जा सकता, वो दोहरी मुसीबत है...
  संभावित खतरा। यह अवैध तरीके से वायरस ला सकता है।
  किसी शक वाली वेबसाइट से डाउनलोड करना असुरक्षित हो सकता है
  नए हमलों के ख़िलाफ़।
reviewed: true
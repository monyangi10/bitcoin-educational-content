question: Ni igiki gikorwa nyamukuru ca VPN mu bijanye n’umwuga?
answer: Bituma abakozi bashobora gukoresha urubuga rw’imbere muri iyo sosiyete bari kure kandi ata nkomanzi.
wrong_answers:
  - Bituma abakozi bashobora guca ku ruhande rw’aho baba ata nkomanzi.
  - Bituma abakozi bashobora guhagarika burundu amatangazo yo kuri Internet.
  - Ituma abakozi bakoresha neza ama network ya Wi-Fi ya bose.
explanation: |
  Mu bijanye n’umwuga, VPNs zikoreshwa canecane kugira ngo
  gutanga uburyo bwo gushika kure butekanye ku bijanye n'imbere mu sosiyete
  umuhora. Ivyo bishikwako mu gupfuka amakuru yahinduwe .
  hagati y’umukozi n’urubuga rw’ishirahamwe, bikaba bituma .
  bigoye ko abandi bagira gatatu bashobora kubifata.
reviewed: true
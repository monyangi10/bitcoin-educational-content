question: व्यावसायिक संदर्भ में VPN का मुख्य काम क्या है?
answer: यह कर्मचारियों को कंपनी के आंतरिक नेटवर्क को सुरक्षित रूप से दूर से एक्सेस करने की सुविधा देता है।
wrong_answers:
  - यह कर्मचारियों को भौगोलिक प्रतिबंधों को सुरक्षित तरीके से दरकिनार करने की अनुमति देता है।
  - यह कर्मचारियों को ऑनलाइन विज्ञापनों को पूरी तरह से अवरुद्ध (ब्लॉक) करने की सुविधा देता है।
  - यह कर्मचारियों को सार्वजनिक वाई-फाई नेटवर्क सुरक्षित तरीके से इस्तेमाल करने की अनुमति देता है।
explanation: |
  व्यावसायिक संदर्भ में, VPN का उपयोग मुख्य रूप से कंपनी के
  आंतरिक नेटवर्क को सुरक्षित रिमोट एक्सेस प्रदान करने के लिए किया जाता है।
  यह कर्मचारी और कंपनी के नेटवर्क के बीच आदान-प्रदान किए जाने वाले डेटा
  को एन्क्रिप्ट करके किया जाता है, 
  जिससे तीसरे पक्ष के लिए इसे इंटरसेप्ट करना मुश्किल हो जाता है।
reviewed: true

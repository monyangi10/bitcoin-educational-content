question: धोखाधड़ी वाले ईमेल से बचने का सुनहरा नियम क्या है?
answer: भेजने वाले का पूरा नाम और ईमेल के मूल (ओरिजिन) को ध्यान से जांचें।
wrong_answers:
  - संदिग्ध ईमेल्स का हमेशा जवाब देना चाहिए।
  - सभी ईमेल अटैचमेंट्स खोलें ताकि उनकी कंटेंट की जांच कर सकें।
  - अपनी व्यक्तिगत जानकारी केवल जाने-पहचाने भेजने वालों के साथ ही साझा करें।
explanation: |
  खुद को धोखाधड़ी वाले ईमेल से बचाने का सुनहरा नियम
  यह है कि भेजने वाले का पूरा और ईमेल की उत्पत्ति सावधानीपूर्वक जांचें।
  जब संदेह हो, तो इसे हटा दें!
reviewed: true

question: धोखाधड़ी वाले ईमेल से बचने का सुनहरा नियम क्या है?
answer: भेजने वाले का पूरा नाम और ईमेल के मूल (ओरिजिन) को ध्यान से चेक कर लो।
wrong_answers:
  - संदिग्ध ईमेल्स का हमेशा जवाब देना चाहिए।
  - सभी ईमेल अटैचमेंट्स को उनका कंटेंट चेक करने के लिए खोल दो।
  - केवल जाने-पहचाने भेजने वालों के साथ ही अपनी निजी जानकारी साझा करें।
explanation: |
  खुद को धोखाधड़ी वाले ईमेल से बचाने का सुनहरा नियम
  यह है कि भेजने वाले का पूरा नाम ध्यान से जाँच लें
  ईमेल के मूल के रूप में। जब संदेह हो, तो इसे हटा दें!
reviewed: true
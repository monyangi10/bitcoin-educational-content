question: Кое е златното правило за предпазване от измамни имейли?
answer: Внимателно проверете пълното име на подателя, както и произхода на имейла.
wrong_answers:
  - Винаги отговаряйте на подозрителни имейли.
  - Отворете всички прикачени файлове към имейли, за да проверите съдържанието им.
  - Споделяйте личната си информация само с познати изпращачи.
explanation: |
  Златното правило за защита от измамни имейли
  е да проверявате внимателно пълното име на подателя, както и
  както и произхода на имейла. При съмнение го изтрийте!
reviewed: true
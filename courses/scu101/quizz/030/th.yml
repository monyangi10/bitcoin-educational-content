question: กฎทองในการป้องกันตัวเองจากอีเมลหลอกลวงคืออะไร?
answer: โปรดตรวจสอบชื่อเต็มของผู้ส่งรวมถึงแหล่งที่มาของอีเมลอย่างรอบคอบ
wrong_answers:
  - ตอบกลับอีเมลที่น่าสงสัยเสมอ
  - เปิดไฟล์แนบอีเมลทั้งหมดเพื่อตรวจสอบเนื้อหา
  - แบ่งปันข้อมูลส่วนบุคคลของคุณเฉพาะกับผู้ส่งที่รู้จักเท่านั้น
explanation: |
  กฎทองในการป้องกันตัวเองจากอีเมลหลอกลวง
  คือการตรวจสอบชื่อเต็มของผู้ส่งอย่างละเอียด
  รวมถึงแหล่งที่มาของอีเมลด้วย หากสงสัย ให้ลบทิ้ง!
reviewed: true
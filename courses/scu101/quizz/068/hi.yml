question: एक सामान्य सुरक्षा कमज़ोरी का कारण क्या है?
answer: इंसानी लापरवाही।
wrong_answers:
  - बिजली कटौती।
  - धीमी इंटरनेट स्पीड।
  - पुराना हार्डवेयर।
explanation: |
  सुरक्षा कमजोरियाँ अक्सर इंसानी गलतियों का नतीजा होती हैं।
  लापरवाही, जैसे डिफॉल्ट पासवर्ड का इस्तेमाल करना या लिखकर रखना
  पासवर्ड असुरक्षित जगहों पर रखना। परिष्कृत हमले नहीं
  हमेशा कंप्यूटर सुरक्षा को खतरे में डालना ज़रूरी होता है।
reviewed: true
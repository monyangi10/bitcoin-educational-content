question: सुरक्षा कमजोरियों का एक सामान्य कारण क्या है?
answer: इंसानी लापरवाही।
wrong_answers:
  - बिजली की कटौती।
  - धीमी इंटरनेट गति।
  - पुराना हार्डवेयर।
explanation: |
  सुरक्षा कमजोरियाँ अक्सर मानवीय लापरवाही का परिणाम होती हैं,
  जैसे कि डिफ़ॉल्ट पासवर्ड का उपयोग करना या पासवर्ड को असुरक्षित स्थानों पर लिखना।
  कंप्यूटर सुरक्षा को खतरे में डालने के लिए हमेशा
  उन्नत हमलों की आवश्यकता नहीं होती।
reviewed: true

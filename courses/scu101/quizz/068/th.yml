question: สาเหตุทั่วไปของช่องโหว่ด้านความปลอดภัยคืออะไร?
answer: ความประมาทของมนุษย์
wrong_answers:
  - ไฟดับ
  - อินเทอร์เน็ตช้า
  - ฮาร์ดแวร์ที่ล้าสมัย
explanation: |
  ช่องโหว่ด้านความปลอดภัยมักเกิดจากความประมาทของมนุษย์ เช่น การใช้รหัสผ่านเริ่มต้นหรือการจดรหัสผ่านในที่ที่ไม่ปลอดภัย การโจมตีที่ซับซ้อนไม่จำเป็นเสมอไปในการทำลายความปลอดภัยของคอมพิวเตอร์
reviewed: true
question: Коя е често срещаната причина за уязвимости в сигурността?
answer: Човешка небрежност.
wrong_answers:
  - Прекъсвания на електрозахранването.
  - Бавна скорост на интернет.
  - Остарял хардуер.
explanation: |
  Уязвимостите в сигурността често са резултат от човешка
  небрежност, като например използване на пароли по подразбиране или записване на
  пароли на несигурни места. Сложните атаки не са
  винаги необходими, за да застрашат компютърната сигурност.
reviewed: true

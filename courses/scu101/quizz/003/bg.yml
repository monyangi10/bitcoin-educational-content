question: Кое е основното предимство на използването на софтуер с отворен код?
answer: Позволява да се провери дали няма скрит достъп за кражба на личните ви данни.
wrong_answers:
  - Тя винаги е безплатна.
  - Той винаги е по-безопасен от софтуера със затворен код.
  - Той винаги е по-удобен за ползване от софтуера със затворен код.
explanation: |
  Софтуерът с отворен код е софтуер, чийто код е достъпен за всички. Това дава възможност за проверка, наред с
  други неща, че няма скрит достъп за кражба на ваши
  лични данни. Въпреки това не винаги е безплатен, по-безопасен или
  по-удобен за ползване от софтуера със затворен код.
reviewed: true

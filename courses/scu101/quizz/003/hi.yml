question: ओपन-सोर्स सॉफ्टवेयर का सबसे बड़ा फायदा क्या है?
answer: यह सुनिश्चित करने की अनुमति देता है कि आपके निजी डेटा को चुराने के लिए कोई छुपी हुआ हुई नहीं है।
wrong_answers:
  - यह हमेशा मुफ़्त होता है।
  - यह हमेशा क्लोज्ड-सोर्स सॉफ्टवेयर से ज्यादा सुरक्षित होता है।
  - यह हमेशा क्लोज्ड-सोर्स सॉफ्टवेयर से ज्यादा उपयोगकर्ता-अनुकूल (यूजर-फ्रेंडली) होता है।
explanation: |
  ओपन-सोर्स सॉफ्टवेयर एक ऐसा सॉफ्टवेयर है जिसका कोड सभी के लिए ज्ञात और
   सुलभ होता है। यह, अन्य बातों के साथ, इस बात की जाँच की सुविधा देता है
  कि आपके व्यक्तिगत डेटा को चुराने के लिए कोई छिपी हुई पहुँच मौजूद नहीं है।
  हालांकि, यह हमेशा मुफ्त, अधिक सुरक्षित, या
  क्लोज्ड-सोर्स सॉफ्टवेयर के मुकाबले ज़्यादा उपयोगकर्ता-अनुकूल (यूजर-फ्रेंडली) नहीं होता।
reviewed: true

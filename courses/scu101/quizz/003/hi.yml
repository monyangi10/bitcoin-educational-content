question: ओपन-सोर्स सॉफ्टवेयर का सबसे बड़ा फायदा क्या है?
answer: यह सुनिश्चित करने की अनुमति देता है कि आपके निजी डेटा को चुराने के लिए कोई छुपी हुआ पहुंच नहीं है।
wrong_answers:
  - यह हमेशा मुफ़्त है।
  - यह हमेशा क्लोज्ड-सोर्स सॉफ्टवेयर से ज्यादा सुरक्षित होता है।
  - यह हमेशा क्लोज्ड-सोर्स सॉफ्टवेयर से ज्यादा यूजर-फ्रेंडली होता है।
explanation: |
  ओपन-सोर्स सॉफ्टवेयर एक ऐसा सॉफ्टवेयर है जिसका कोड ज्ञात होता है और
  सबके लिए सुलभ। इससे सत्यापन संभव होता है, और...
  दूसरी बातें, यह कि आपकी चीज़ें चुराने के लिए कोई छुपा हुआ रास्ता नहीं है।
  पर्सनल डेटा। हालांकि, यह हमेशा मुफ्त, सुरक्षित, या...
  ओपन-सोर्स सॉफ्टवेयर क्लोज्ड-सोर्स सॉफ्टवेयर के मुकाबले ज़्यादा यूजर-फ्रेंडली होता है।
reviewed: true
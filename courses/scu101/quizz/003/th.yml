question: ข้อดีหลักของการใช้ซอฟต์แวร์โอเพนซอร์สคืออะไร?
answer: มันช่วยให้สามารถตรวจสอบได้ว่าไม่มีการเข้าถึงที่ซ่อนอยู่เพื่อขโมยข้อมูลส่วนตัวของคุณ
wrong_answers:
  - มันฟรีเสมอ
  - มันปลอดภัยกว่าโปรแกรมที่ปิดซอร์สเสมอ
  - มันเป็นมิตรกับผู้ใช้มากกว่าซอฟต์แวร์ที่ปิดซอร์สเสมอ
explanation: |
  ซอฟต์แวร์โอเพนซอร์สคือซอฟต์แวร์ที่โค้ดเป็นที่รู้จักและ
  เข้าถึงได้สำหรับทุกคน สิ่งนี้ช่วยให้สามารถตรวจสอบได้ว่าไม่มีการเข้าถึงที่ซ่อนเร้นเพื่อขโมยข้อมูลส่วนตัวของคุณ อย่างไรก็ตาม มันไม่ได้ฟรี ปลอดภัย หรือ
  ใช้งานง่ายกว่าเสมอไปเมื่อเทียบกับซอฟต์แวร์ที่ปิดซอร์ส
reviewed: true
question: Ni akamaro akahe nyamukuru ko gukoresha porogarama zifunguye?
answer: Bituma umuntu ashobora kugenzura ko ata nzira yihishije yo kwiba amakuru yawe bwite.
wrong_answers:
  - Igihe cose ari ubuntu.
  - Yama ari umutekano kuruta porogarama zifise inkomoko yugaye.
  - Yama ari nziza cane kuruta porogarama zifise inkomoko yugaye.
explanation: |
  Porogaramu y'inkomoko yuguruye ni porogaramu kode yayo izwi kandi
  umuntu wese ashobora kuronka. Ivyo bituma umuntu ashobora kugenzura, hagati y’
  ibindi bintu, ko ata nzira yihishije yo kwiba ivyawe .
  amakuru y’ibanga. Ariko rero, si ko vyama ari ubuntu, bifise umutekano mwinshi canke .
  n’ugukoresha neza kuruta porogarama zifise inkomoko yugaye.
reviewed: true
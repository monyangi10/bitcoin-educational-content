question: 오픈 소스 소프트웨어 사용의 주요 장점은 무엇인가요?
answer: 이를 통해 개인 데이터를 훔치기 위한 숨겨진 액세스가 없는지 확인할 수 있습니다.
wrong_answers:
  - 항상 무료입니다.
  - 비공개 소스 소프트웨어보다 항상 안전합니다.
  - 항상 비공개 소스 소프트웨어보다 사용자 친화적입니다.
explanation: |
  오픈 소스 소프트웨어는 코드가 공개되어 누구나 액세스할 수 있는
  누구나 액세스할 수 있는 소프트웨어입니다. 이를 통해 무엇보다도
  무엇보다도 개인 데이터를 훔치기 위한 숨겨진 액세스가
  개인 데이터를 훔칠 수 없습니다. 하지만 항상 무료이거나 안전하거나
  비공개 소스 소프트웨어보다 더 사용자 친화적이지는 않습니다.
reviewed: true
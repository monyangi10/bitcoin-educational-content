question: Защо е препоръчително да изтривате бисквитките след всяко посещение на даден сайт?
answer: За да предотвратите проследяването на вашата онлайн дейност от сайтове на трети страни.
wrong_answers:
  - За да спестите място за съхранение в устройството си.
  - За да предотвратите запомнянето на информацията за вход от сайта.
  - За да предотвратите показването на таргетирани реклами от сайта.
explanation: |
  Бисквитките са файлове, създадени от уебсайтове за съхраняване на информация
  на вашето устройство. Въпреки че някои сайтове изискват тези бисквитки, за да
  да функционират правилно, те могат да бъдат използвани и от
  сайтове на трети страни, особено за проследяване на реклами
  за целите на рекламата. Изтриването на бисквитките след всяко посещение на даден сайт може
  помогне да предотвратите това.
reviewed: true
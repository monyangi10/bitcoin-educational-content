question: Warum wird empfohlen, Cookies nach jedem Besuch einer Website zu löschen?
answer: Um zu verhindern, dass Drittanbieter-Websites deine Online-Aktivitäten verfolgen.
wrong_answers:
  - Um Speicherplatz auf deinem Gerät zu sparen.
  - Um zu verhindern, dass die Website sich an deine Anmeldeinformationen erinnert.
  - Um zu verhindern, dass die Website dir gezielte Werbung anzeigt.
explanation: |
  Cookies sind Dateien, die von Websites erstellt werden, um Informationen
  auf deinem Gerät zu speichern. Während einige Websites diese Cookies benötigen, um
  ordnungsgemäß zu funktionieren, können sie auch von
  Drittanbieter-Websites, insbesondere zu Werbeverfolgungszwecken, ausgenutzt werden. Das Löschen von Cookies nach jedem Besuch einer Website kann
  helfen, dies zu verhindern.
reviewed: true

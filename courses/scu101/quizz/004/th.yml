question: ทำไมถึงแนะนำให้ลบคุกกี้หลังจากเยี่ยมชมเว็บไซต์แต่ละครั้ง?
answer: เพื่อป้องกันไม่ให้เว็บไซต์ของบุคคลที่สามติดตามกิจกรรมออนไลน์ของคุณ
wrong_answers:
  - เพื่อประหยัดพื้นที่จัดเก็บบนอุปกรณ์ของคุณ
  - เพื่อป้องกันไม่ให้เว็บไซต์จดจำข้อมูลการเข้าสู่ระบบของคุณ
  - เพื่อป้องกันไม่ให้เว็บไซต์แสดงโฆษณาที่ตรงเป้าหมายแก่คุณ
explanation: |
  คุกกี้เป็นไฟล์ที่สร้างขึ้นโดยเว็บไซต์เพื่อเก็บข้อมูล
  บนอุปกรณ์ของคุณ ในขณะที่บางเว็บไซต์ต้องการคุกกี้เหล่านี้เพื่อ
  ทำงานอย่างถูกต้อง แต่ก็สามารถถูกใช้ประโยชน์โดย
  เว็บไซต์ของบุคคลที่สาม โดยเฉพาะเพื่อวัตถุประสงค์ในการติดตามโฆษณา
  การลบคุกกี้หลังจากเยี่ยมชมเว็บไซต์แต่ละครั้งสามารถ
  ช่วยป้องกันสิ่งนี้ได้
reviewed: true
question: 사이트를 방문할 때마다 쿠키를 삭제하는 것이 권장되는 이유는 무엇인가요?
answer: 타사 사이트가 온라인 활동을 추적하지 못하도록 차단합니다.
wrong_answers:
  - 디바이스의 저장 공간을 절약하려면
  - 사이트가 로그인 정보를 기억하지 못하도록 합니다.
  - 사이트에서 타겟팅 광고가 표시되지 않도록 합니다.
explanation: |
  쿠키는 웹사이트가 사용자의 기기에 정보를 저장하기 위해 만든 파일입니다
  정보를 저장하기 위해 웹사이트가 생성하는 파일입니다. 일부 사이트에서는 이러한 쿠키가 있어야
  제대로 작동하기 위해 이러한 쿠키를 요구하기도 하지만
  타사 사이트, 특히 광고 추적
  목적으로 악용될 수도 있습니다. 사이트를 방문할 때마다 쿠키를 삭제하면 이를 방지할 수 있습니다
  이를 방지할 수 있습니다.
reviewed: true
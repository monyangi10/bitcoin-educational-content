question: वेबसाइट पर हर बार विज़िट के बाद कुकीज़ डिलीट करने की सलाह क्यों दी जाती है?
answer: ताकि तृतीय-पक्ष की वेबसाइटें आपकी ऑनलाइन गतिविधि को ट्रैक न कर सकें।
wrong_answers:
  - आपके डिवाइस पर स्टोरेज स्पेस बचाने के लिए।
  - साइट को आपकी लॉगिन जानकारी याद रखने से रोकने के लिए।
  - साइट को आपको लक्षित (टारगेटेड) विज्ञापन दिखाने से रोकने के लिए।
explanation: |
  कुकीज़ वे फ़ाइलें होती हैं जिन्हें वेबसाइटें आपके डिवाइस पर
  जानकारी संग्रहीत करने के लिए बनाती हैं। 
  जबकि कुछ साइटों के सही ढंग से काम करने के लिए इन कुकीज़ की आवश्यकता होती है,
  इन्हें तृतीय-पक्ष साइटों द्वारा विशेष रूप से विज्ञापन ट्रैकिंग के उद्देश्यों 
  के लिए दुरुपयोग भी किया जा सकता है।
  प्रत्येक साइट पर जाने के बाद कुकीज़ हटाना इससे बचने में मदद कर सकता है।
reviewed: true

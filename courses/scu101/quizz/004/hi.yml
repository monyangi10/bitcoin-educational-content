question: वेबसाइट पर हर बार विज़िट के बाद कुकीज़ डिलीट करने की सलाह क्यों दी जाती है?
answer: ताकि तीसरे पक्ष की वेबसाइटें आपकी ऑनलाइन गतिविधि पर नज़र न रख सकें।
wrong_answers:
  - आपके डिवाइस पर स्टोरेज स्पेस बचाने के लिए।
  - साइट को आपकी लॉगिन जानकारी याद रखने से रोकने के लिए।
  - साइट को आपको टारगेटेड विज्ञापन दिखाने से रोकने के लिए।
explanation: |
  कुकीज़ वेबसाइट्स द्वारा बनाई गई फाइलें होती हैं जो जानकारी स्टोर करने के लिए होती हैं
  आपके डिवाइस पर। कुछ साइटों के लिए ये कुकीज़ ज़रूरी होती हैं
  ठीक से काम करने के लिए, इनका दुरुपयोग भी किया जा सकता है
  तीसरे पक्ष की साइटें, खासकर विज्ञापन ट्रैकिंग के लिए
  उद्देश्यों के लिए। साइट पर हर बार विज़िट के बाद कुकीज़ को डिलीट करने से
  इससे बचने में मदद करें।
reviewed: true
question: Защо SMS не се счита за най-добрия вариант за 2FA?
answer: Този метод е уязвим на атаки като измамата с размяна на SIM карти.
wrong_answers:
  - Това е твърде бавно и скъпо; телефонно обаждане ще бъде по-ефективно.
  - Той предоставя само доказателство за притежание на телефонен номер.
  - Твърде сложно е да се създаде на техническо ниво.
explanation: |
  SMS не се счита за най-добрия вариант за 2FA, тъй като това е метод за 2FA, който е уязвим на атаки, като например измамата с подмяна на SIM карти. След като бъдат успешно използвани, тези уязвимости унищожават всяка защита, осигурена от допълнителното ниво на 2FA удостоверяване.
reviewed: true
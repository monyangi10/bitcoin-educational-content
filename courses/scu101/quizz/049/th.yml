question: ทำไม SMS ถึงไม่ถือว่าเป็นตัวเลือกที่ดีที่สุดสำหรับ 2FA?
answer: วิธีนี้มีความเสี่ยงต่อการโจมตีเช่นการหลอกลวงเปลี่ยนซิม
wrong_answers:
  - มันช้าและแพงเกินไป; การโทรศัพท์จะมีประสิทธิภาพมากกว่า
  - มันเป็นเพียงหลักฐานการครอบครองหมายเลขโทรศัพท์เท่านั้น
  - มันซับซ้อนเกินไปที่จะตั้งค่าบนระดับเทคนิค
explanation: |
  SMS ไม่ถือว่าเป็นตัวเลือกที่ดีที่สุดสำหรับ 2FA เพราะเป็นวิธี 2FA ที่มีความเสี่ยงต่อการโจมตี เช่น การหลอกลวงด้วยการสลับซิม เมื่อถูกโจมตีสำเร็จ ช่องโหว่เหล่านี้จะทำลายการป้องกันใด ๆ ที่ได้รับจากชั้นการยืนยันตัวตน 2FA เพิ่มเติม
reviewed: true
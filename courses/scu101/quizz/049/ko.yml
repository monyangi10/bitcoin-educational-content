question: SMS가 2FA에 가장 적합한 옵션으로 간주되지 않는 이유는 무엇인가요?
answer: 이 방법은 SIM 스왑 사기와 같은 공격에 취약합니다.
wrong_answers:
  - 너무 느리고 비용이 많이 들기 때문에 전화가 더 효과적입니다.
  - 전화번호를 소지하고 있다는 증거만 제공합니다.
  - 기술적인 수준에서 설정하기에는 너무 복잡합니다.
explanation: |
  SMS는 SIM 스왑 사기와 같은 공격에 취약한 2FA 방법이기 때문에 2FA에 가장 적합한 옵션으로 간주되지 않습니다. 이러한 취약점이 성공적으로 익스플로잇되면 2FA 인증의 추가 Layer이 제공하는 보호 기능이 모두 파괴됩니다.
reviewed: true
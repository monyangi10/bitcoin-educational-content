question: SMS को 2FA के लिए सबसे अच्छा विकल्प क्यों नहीं माना जाता है?
answer: यह तरीका SIM स्वैप घोटाले जैसे हमलों के प्रति संवेदनशील होता है।
wrong_answers:
  - यह बहुत धीमा और महंगा है, फोन कॉल ज्यादा असरदार होगा।
  - यह सिर्फ फोन नंबर के मालिक होने का सबूत देता है।
  - इसे तकनीकी स्तर पर सेटअप करने में बहुत जटिल है।
explanation: |
  SMS को 2FA के लिए सबसे अच्छा विकल्प नहीं माना जाता क्योंकि
  यह SIM स्वैप घोटाले जैसे हमलों के प्रति संवेदनशील होता है।
  एक बार इन कमजोरियों का सफलतापूर्वक दुरुपयोग किया जाए,
  यह 2FA प्रमाणीकरण की अतिरिक्त सुरक्षा
  परत द्वारा दी गई सुरक्षा को समाप्त कर देता है।
reviewed: true

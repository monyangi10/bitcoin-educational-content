question: SMS को 2FA के लिए सबसे अच्छा विकल्प क्यों नहीं माना जाता है?
answer: यह तरीका अलग-अलग हमलों के लिए कमज़ोर है, जैसे कि SIM स्वैप स्कैम।
wrong_answers:
  - यह बहुत धीमा और महंगा है, फोन कॉल ज्यादा असरदार होगा।
  - यह सिर्फ फोन नंबर के मालिक होने का सबूत देता है।
  - ये तकनीकी स्तर पर सेटअप करने में बहुत जटिल है।
explanation: |
  SMS को 2FA के लिए सबसे अच्छा विकल्प नहीं माना जाता क्योंकि यह
  एक 2FA तरीका जो अलग-अलग हमलों के लिए कमजोर है, जैसे कि SIM
  स्वैप स्कैम। एक बार सफलतापूर्वक एक्सप्लॉइट कर लिया तो, ये
  कमजोरियां पूरी तरह से दी गई किसी भी सुरक्षा को बर्बाद कर देती हैं
  अतिरिक्त Layer, 2FA प्रमाणीकरण का।
reviewed: true
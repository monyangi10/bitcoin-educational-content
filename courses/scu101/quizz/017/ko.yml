question: 방문하려는 사이트가 맞는지 확인하는 한 가지 방법은 무엇인가요?
answer: Address 표시줄에서 URL과 작은 자물쇠를 확인하세요.
wrong_answers:
  - 사이트의 광고 수를 확인합니다.
  - 사이트 속도를 확인합니다.
  - 사이트의 색 구성표를 확인합니다.
explanation: |
  Address 표시줄의 URL과 작은 자물쇠
  을 확인하는 것은 방문하려는 사이트가
  방문하고 있는지 확인하는 방법입니다. 자물쇠는 해당 사이트가 보안 Exchange을 위해 데이터를 암호화하는
  HTTPS 프로토콜을 사용하고 있음을 나타냅니다.
reviewed: true
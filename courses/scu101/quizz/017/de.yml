question: Wie kann man bestätigen, dass man sich auf der gewünschten Webseite befindet?
answer: Überprüfe die URLs und das kleine Schloss in der Adressleiste.
wrong_answers:
  - Überprüfe die Anzahl der Werbeanzeigen auf der Seite.
  - Überprüfe die Geschwindigkeit der Seite.
  - Überprüfe das Farbschema der Seite.
explanation: |
  Das Überprüfen der URLs und des kleinen Schlosses in der Adressleiste
  ist eine Möglichkeit zu bestätigen, dass du dich auf der Webseite befindest,
  die du besuchen möchtest. Das Schloss zeigt an, dass die Seite das
  HTTPS-Protokoll verwendet, welches Daten zur sicheren Übertragung verschlüsselt.
reviewed: true

question: Ni uburyo ubuhe bumwe bwo kwemeza ko uri ku rubuga wagomvye kuba uriko?
answer: Suzuma URLs na kagufuri gatoyi kari ahagenewe kwandikwa Aderese.
wrong_answers:
  - Suzuma igitigiri c’amatangazo ari kuri urwo rubuga.
  - Suzuma umuvuduko w’urubuga.
  - Suzuma amabara agize urubuga.
explanation: |
  Gusuzuma URLs na kagufuri gatoyi kari ahagenewe kwandikwa Aderese
  ni uburyo bumwe bwo kwemeza ko uri krubuga wagomvye kuba uriko.
  Akagufuri kerekana ko urubuga rukoresha itegeko rya HTTPS, rinyegeza amakuru kugira ngo habe ho guhanahana amakuru mu mutekano.
reviewed: true

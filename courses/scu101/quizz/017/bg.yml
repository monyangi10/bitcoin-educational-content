question: Какъв е начинът да потвърдите, че сте на сайта, който възнамерявате да посетите?
answer: Проверете URL адресите и малкото катинарче в адресната лента.
wrong_answers:
  - Проверете броя на рекламите в сайта.
  - Проверете скоростта на сайта.
  - Проверете цветовата схема на сайта.
explanation: |
  Проверка на URL адресите и малкия катинар в адресната лента
  е един от начините да се уверите, че сте на сайта, който възнамерявате
  да посетите. Катинарчето показва, че сайтът използва
  HTTPS протокол, който криптира данните за сигурен обмен.
reviewed: true
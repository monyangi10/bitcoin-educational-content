question: วิธีหนึ่งในการยืนยันว่าคุณอยู่บนเว็บไซต์ที่คุณตั้งใจจะเข้าชมคืออะไร?
answer: ตรวจสอบ URL และรูปกุญแจเล็ก ๆ ในแถบที่อยู่
wrong_answers:
  - ตรวจสอบจำนวนโฆษณาบนเว็บไซต์
  - ตรวจสอบความเร็วของเว็บไซต์
  - ตรวจสอบชุดสีของเว็บไซต์
explanation: |
  การตรวจสอบ URL และรูปกุญแจเล็ก ๆ ในแถบที่อยู่
  เป็นวิธีหนึ่งในการยืนยันว่าคุณอยู่บนเว็บไซต์ที่คุณตั้งใจ
  จะเยี่ยมชม รูปกุญแจบ่งบอกว่าเว็บไซต์นั้นใช้
  โปรโตคอล HTTPS ซึ่งเข้ารหัสข้อมูลเพื่อการแลกเปลี่ยนที่ปลอดภัย
reviewed: true
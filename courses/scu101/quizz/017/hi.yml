question: यह सुनिश्चित करने का एक तरीका क्या है कि आप उसी साइट पर हैं जिसे आप देखने का इरादा रखते हैं?
answer: यूआरएल और एड्रेस बार में छोटे ताले (पैडलॉक) को चेक करें।
wrong_answers:
  - साइट पर विज्ञापनों की संख्या जांचें।
  - साइट की स्पीड चेक करो।
  - साइट की रंग योजना जांचें।
explanation: |
  यह सुनिश्चित करने का एक तरीका कि आप सही साइट पर हैं,
  यूआरएल और एड्रेस बार में छोटे ताले की जांच करना है।
  ताला यह दर्शाता है कि साइट HTTPS प्रोटोकॉल का उपयोग कर रही है,
  जो डेटा को एन्क्रिप्ट करता है ताकि सुरक्षित रूप से जानकारी का आदान-प्रदान हो सके।
reviewed: true

question: एक तरीका यह है कि आप वेबसाइट के URL को चेक करें - सही वेबसाइट का एड्रेस ब्राउज़र की एड्रेस बार में दिखना चाहिए।
answer: URLs और Address बार में छोटे पैडलॉक को चेक करें।
wrong_answers:
  - साइट पर विज्ञापनों की संख्या जांचें।
  - साइट की स्पीड चेक करो।
  - वेबसाइट के रंगों की जाँच करो।
explanation: |
  Address बार में URLs और छोटे पैडलॉक को चेक करना
  क्या यह पुष्टि करने का एक तरीका है कि आप जिस साइट पर जाना चाहते हैं, वहीं पर हैं?
  मिलने जाना। पैडलॉक दिखाता है कि साइट इस्तेमाल कर रही है
  HTTPS प्रोटोकॉल, जो सुरक्षित Exchange के लिए डेटा को एन्क्रिप्ट करता है।
reviewed: true
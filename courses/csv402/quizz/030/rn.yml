question: Ni ibihe bihimba bikenewe mubitangwa na Bob vya RGB (uwuronka) aronka kumasezerano?
answer: Itanguriro, Igicapo, Ahakorerwa ibintu n'aho ibintu bishirirwa mungiro.
wrong_answers:
  - Itanguriro, Igicapo, Ihinduka n'Ukwagura
  - Igicapo, Ahakorerwa ibintu, Umukono n'Igitabu-12
  - 14, 13, 15 n'amateka
explanation: |
  Ibitangwa vy'amasezerano ya RGB ari mwitanguriro, Igicapo, Ahakorerwa ibintunn'aho ibintu bishirirwa mungiro, zitanga amakuru yose akenewe kugira ngo Amasezerano yemezwe.
reviewed: true

question: RGB और Consignment में कौन-कौन से कंपोनेंट्स होते हैं जो बॉब (प्राप्तकर्ता) को Contract के लिए मिलते हैं?
answer: जीडब्ल्यू-5, जीडब्ल्यू-6, जीडब्ल्यू-4 और जीडब्ल्यू-3
wrong_answers:
  - जीडब्ल्यू-7, जीडब्ल्यू-8, ट्रांजिशन और एक्सटेंशन
  - जीडब्ल्यू-10, जीडब्ल्यू-9, सिग्नेचर और जीडब्ल्यू-11
  - जीडब्ल्यू-13, जीडब्ल्यू-12, जीडब्ल्यू-14 और इतिहास
explanation: |
  RGB के Contract में Consignment शामिल होता है, जिसमें Genesis, Schema, Interface और Interface Implementation होते हैं। ये सभी Contract को वैलिडेट करने के लिए ज़रूरी डेटा मुहैया कराते हैं।
reviewed: false
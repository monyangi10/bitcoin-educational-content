question: ¿Cuáles son los componentes de un consignment RGB que Bob (destinatario) recibe por un contrato?
answer: Genesis, Schema, Interface e Interface Implementation
wrong_answers:
  - Genesis, Schema, Transition y Extension
  - Schema, Interface, Signature y PSBT
  - Genesis, Interface, PSBT e Historia
explanation: |
  El envío de un contrato RGB incluye el Genesis, el Schema, la Interface y la Interface Implementation, que proporcionan todos los datos necesarios para validar el contrato.
reviewed: false
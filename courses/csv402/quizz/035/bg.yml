question: Как да инсталирам инструмента rgb чрез Cargo?
answer: cargo install rgb-contracts --all-features
wrong_answers:
  - cargo install rgb --features all
  - cargo install rgb-bitcoin --all
  - cargo build rgb-lightning --release
explanation: |
  Инсталирането се извършва с командата "cargo install rgb-contracts --all-features", като клетката се нарича "rgb-contracts", която инсталира инструмента rgb.
reviewed: false
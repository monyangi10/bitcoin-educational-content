question: Noshiramwo gute igikoresho ca RGB biciye kuri Cargo?
answer: imizigo gushiramwo RGB-amasezerano --vyose-ibiranga
wrong_answers:
  - gushiramwo imitwaro RGB --ibiranga vyose
  - gushiramwo imizigo RGB-Bitcoin --byose
  - imitwaro yubaka RGB-umuravyo --rekura
explanation: |
  Gushiramwo bikorwa n'itegeko "gushiramwo RGB-amasezerano --ibiranga vyose", isandugu yitwa "RGB-amasezerano", ishiramwo igikoresho ca RGB.

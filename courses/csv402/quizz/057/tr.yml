question: RLN'de, depoyu klonladıktan sonra "RGB-lightning-node" ikili dosyasını hangi komut yükler?
answer: "cargo install --locked --debug --path ."
wrong_answers:
  - "cargo build --release --path ."
  - "cargo run --locked --path ."
  - "cargo deploy --debug --path ."
explanation: |
  "cargo install --locked --debug --path ." komutu "RGB-lightning-node" ikili dosyasını derler ve yükler.
reviewed: false
question: RLN पर, रिपॉजिटरी को क्लोन करने के बाद "RGB-lightning-node" बाइनरी इंस्टॉल करने के लिए कौन सा कमांड है?
answer: `कार्गो इंस्टॉल --लॉक्ड --डिबग --पाथ .`
wrong_answers:
  - "कार्गो बिल्ड --रिलीज़ --पाथ ."
  - `कार्गो रन --लॉक्ड --पाथ .`  

(नोट: कमांड लाइन ऑप्शन्स और टेक्निकल टर्म्स को हिंदी में ट्रांसलेट नहीं किया गया है, क्योंकि ये आमतौर पर अंग्रेज़ी में ही इस्तेमाल होते हैं। फॉर्मेटिंग और स्पेशल करैक्टर्स को ऐसे ही रखा गया है।)
  - "कार्गो डिप्लॉय --डीबग --पाथ ."
explanation: |
  "cargo install --locked --debug --path ." कमांड "RGB-lightning-node" बाइनरी को कंपाइल और इंस्टॉल करती है।
reviewed: false
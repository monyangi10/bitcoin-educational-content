question: Quels sont les quatre éléments qui définissent un contrat RVB ?
answer: Genesis, Schema, Interface and Interface Implementation
wrong_answers:
  - Genesis, Schema, Transition and Interface Implementation
  - Genesis, Interface, Transition and Extension
  - Genesis, Interface, Interface Implementation and Extension
explanation: |
  Un contrat RGB se compose de quatre éléments distincts : le Genesis, le Schema, l'Interface and l'Interface Implementation.
reviewed: false

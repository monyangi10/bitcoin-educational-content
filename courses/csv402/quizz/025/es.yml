question: ¿Cuáles son los cuatro componentes que definen un contrato RGB?
answer: Genesis, Schema, Interface e Interface Implementation
wrong_answers:
  - Genesis, Schema, Transition y Interface Implementation
  - Genesis, Interface, Transition y Extension
  - Genesis, Interface, Interface Implementation y Extension
explanation: |
  Un contrato RGB se compone de cuatro elementos distintos: Genesis (Génesis), Schema (Esquema), Interface (Interfaz) e Interface Implementation (Implementación de Interfaz).
reviewed: false
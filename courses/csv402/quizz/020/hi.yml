question: State Transition में RGB के दौरान बॉब को कोई एसेट मिले, इसके लिए सबसे महत्वपूर्ण चीज़ क्या है?
answer: एक नया Seal Definition जो बॉब के UTXO की तरफ इशारा कर रहा है
wrong_answers:
  - एक कंट्रोल ट्रांक्ज़ैक्शन जो UTXO से बिना किसी संदर्भ के है
  - एलिस की तरफ से एक सार्वजनिक बयान
  - एलिस और बॉब द्वारा साझा किया गया एक डबल सिग्नेचर
explanation: |
  जीडब्ल्यू-5 एसेट को बॉब के जीडब्ल्यू-6 से क्रिप्टोग्राफिक तरीके से जोड़ता है, यह सुनिश्चित करते हुए कि वह इसका मालिक है।
reviewed: false
question: Wie ebnet RGB den Weg für Layer 2 DEXs?
answer: Durch die Ermöglichung des off-chain Austauschs von Vermögenswerten über Lightning-Kanäle und atomare Tauschgeschäfte
wrong_answers:
  - Durch die Nutzung einer zentralen Börse für alle RGB-Transaktionen
  - Durch die Ermöglichung des Austauschs von Vermögenswerten über On-Chain-Smart-Contracts
  - Durch die Ermöglichung des Austauschs von Vermögenswerten zwischen Blockchains über atomare Tauschgeschäfte
explanation: |
  Die Möglichkeit, atomare Swaps und Tauschvorgänge über Lightning-Kanäle durchzuführen, bietet die Möglichkeit, dezentrale DEXs zu schaffen, ohne die Nachteile von On-Chain-Börsen.
reviewed: false

question: RGB कैसे DEX Layer-2 के लिए रास्ता बनाता है?
answer: off-chain के एसेट्स के Exchange को लाइटनिंग चैनल्स और एटॉमिक स्वैप्स के जरिए सक्षम करके
wrong_answers:
  - सभी RGB लेनदेन के लिए एक केंद्रीकृत Exchange के उपयोग को सक्षम करके
  - On-Chain स्मार्ट कॉन्ट्रैक्ट्स के जरिए Exchange एसेट्स को एक्टिवेट करके
  - इंटर-जीडब्ल्यू-8 एसेट जीडीब्ल्यू-9 को एटॉमिक स्वैप के जरिए सक्षम करके
explanation: |
  लाइटनिंग चैनलों के जरिए एटॉमिक स्वैप और एक्सचेंज करने की क्षमता डिसेंट्रलाइज्ड DEX (डेक्स) बनाने का मौका देती है, बिना On-Chain एक्सचेंजों के नुकसान के।
reviewed: false
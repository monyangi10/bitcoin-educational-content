question: RGB ปูทางสำหรับ DEX layer-2 อย่างไร?
answer: โดยการเปิดใช้งานการแลกเปลี่ยนสินทรัพย์ off-chain ผ่านช่องทาง Lightning และการแลกเปลี่ยนแบบอะตอมมิก
wrong_answers:
  - โดยการเปิดใช้งานการใช้ศูนย์กลางการแลกเปลี่ยนสำหรับธุรกรรม RGB ทั้งหมด
  - โดยการเปิดใช้งานการแลกเปลี่ยนสินทรัพย์ผ่านสัญญาอัจฉริยะ on-chain
  - โดยการเปิดใช้งานการแลกเปลี่ยนสินทรัพย์ระหว่างบล็อกเชนผ่านการสวอปอะตอม
explanation: |
  ความสามารถในการดำเนินการแลกเปลี่ยนอะตอมและการแลกเปลี่ยนผ่านช่องทาง Lightning เสนอความเป็นไปได้ในการสร้าง DEXs แบบกระจายศูนย์ โดยไม่มีข้อเสียของการแลกเปลี่ยน on-chain
reviewed: false
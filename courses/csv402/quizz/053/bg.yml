question: Как RGB проправя пътя за DEX layer-2?
answer: Чрез осигуряване на възможност за обмен на активи на off-chain чрез каналите на "светкавицата" и атомните суапове
wrong_answers:
  - Като се даде възможност за използване на централизиран обмен за всички транзакции по RGB
  - Като позволява обмен на активи чрез интелигентни договори on-chain
  - Като дава възможност за обмен на активи между блоковите вериги чрез атомни суапове
explanation: |
  Възможността за извършване на атомни суапове и обмени чрез каналите на Lightning предлага възможност за създаване на децентрализирани DEX, без недостатъците на борсите on-chain.
reviewed: false
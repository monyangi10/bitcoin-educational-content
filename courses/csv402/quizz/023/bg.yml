question: Как RGB предотвратява double-spending по време на State Transition?
answer: Затваряне на съществуващ печат и създаване на нов
wrong_answers:
  - Чрез проверка на всички транзакции в блокчейна
  - Налагане на подписи multi-sig за всяка операция
  - Потвърждаване на данните от Global State
explanation: |
  Затварянето на печат с изразходван UTXO доказва, че преходът е уникален и неотменим.

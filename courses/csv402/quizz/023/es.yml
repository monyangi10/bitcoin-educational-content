question: ¿Cómo evita RGB el doble gasto durante un State Transition?
answer: Cerrar un sello existente y crear uno nuevo
wrong_answers:
  - Al verificar todas las transacciones en la blockchain
  - Al imponer firmas multisig en cada operación
  - Validación de los datos del Global State
explanation: |
  Cerrar un sello con un UTXO gastado demuestra que una transición es única e irrevocable.
reviewed: false
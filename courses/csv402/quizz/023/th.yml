question: RGB ป้องกัน double-spending อย่างไรในระหว่าง State Transition?
answer: ปิดผนึกที่มีอยู่และสร้างใหม่
wrong_answers:
  - โดยการตรวจสอบธุรกรรมทั้งหมดบนบล็อกเชน
  - โดยการกำหนดลายเซ็น multi-sig ในทุกการดำเนินการ
  - กำลังตรวจสอบข้อมูล Global State
explanation: |
  การปิดผนึกด้วย UTXO ที่ใช้แล้วพิสูจน์ได้ว่าการเปลี่ยนแปลงนั้นมีเอกลักษณ์และไม่สามารถเพิกถอนได้
reviewed: false
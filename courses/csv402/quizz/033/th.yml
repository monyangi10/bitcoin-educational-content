question: วัตถุประสงค์ของการส่งมอบปลายทางในกระบวนการโอน RGB คืออะไร?
answer: ให้ประวัติการเปลี่ยนสถานะ
wrong_answers:
  - ตรวจสอบความถูกต้องของสัญญา Genesis
  - ลบการเปลี่ยนผ่านเก่า
  - สร้าง Schema ใหม่สำหรับการโอน
explanation: |
  การส่งมอบขั้นสุดท้ายรวบรวมประวัติของสัญญาเพื่อพิสูจน์ความถูกต้องของสินทรัพย์ที่โอนจนถึงปัจจุบัน
reviewed: false
question: วัตถุประสงค์หลักของ deterministic Bitcoin commitments คืออะไร?
answer: ตรวจสอบให้แน่ใจว่ามีการใส่ข้อผูกพันเพียงรายการเดียวในธุรกรรม
wrong_answers:
  - การทำให้โครงสร้างของธุรกรรม Bitcoin ง่ายขึ้น
  - ลดต้นทุนการทำธุรกรรม RGB
  - การเพิ่มประสิทธิภาพการสร้างลายเซ็นหลายตัว RGB
explanation: |
  Bitcoin ข้อผูกพันเชิงกำหนดรับประกันว่ามีการแทรกข้อผูกพันเดียวลงในธุรกรรม เพื่อหลีกเลี่ยงข้อผูกพันที่ซ่อนอยู่ที่แข่งขันกัน
reviewed: false
question: Каква е основната цел на детерминистичните ангажименти Bitcoin?
answer: Гарантиране, че в транзакция се вмъква само едно задължение
wrong_answers:
  - Опростяване на структурата на транзакциите Bitcoin
  - Намаляване на разходите за транзакции по RGB
  - Оптимизиране на генерирането на многозначни подписи RGB
explanation: |
  Детерминистичните ангажименти Bitcoin гарантират, че в транзакцията се вмъква само един ангажимент, за да се избегнат скрити конкурентни ангажименти.
reviewed: false
question: ¿Cuál es el objetivo principal de los commitments deterministas de Bitcoin?
answer: Garantizar que se inserta un único commitment en una transacción
wrong_answers:
  - Simplificar la estructura de las transacciones Bitcoin
  - Reducir los costes de transacción de RGB
  - Optimización de la generación de multifirmas RGB
explanation: |
  Los commitments deterministas de Bitcoin garantizan que se inserte un único commitment en una transacción, para evitar commitments ocultos en competencia.
reviewed: false
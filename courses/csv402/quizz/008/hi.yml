question: डिटरमिनिस्टिक Bitcoin कमिटमेंट्स का मुख्य मकसद क्या है?
answer: एक लेन-देन में सिर्फ एक Commitment डालना सुनिश्चित करें
wrong_answers:
  - Bitcoin लेन-देन की संरचना को सरल बनाना
  - RGB लेन-देन की लागत कम करें
  - RGB मल्टीसिग्नेचर जनरेशन को ऑप्टिमाइज़ करना
explanation: |
  Bitcoin निश्चित प्रतिबद्धताएँ यह गारंटी देती हैं कि एक ही Commitment को लेन-देन में शामिल किया जाता है, ताकि छिपी हुई प्रतिस्पर्धी प्रतिबद्धताओं से बचा जा सके।

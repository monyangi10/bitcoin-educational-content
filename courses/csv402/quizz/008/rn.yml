question: Ni iyihe ntumbero nyamukuru y’amasezerano ya Bitcoin y’ukwiyemeza?
answer: Raba neza ko buri ukwiyemeza kwashizwemwo mw'ihanahanwa
wrong_answers:
  - Kugabanya uko ihanahanwa rya Bitcoin ryubatse
  - Kugabanya ibiciro vy'ihanahanwa rya RGB
  - Kwongereza imikono ishobora gukorwa kuri RGB
explanation: |
  Ivyemezo vy’ugushinga intahe vya Bitcoin vyemeza ko ukwiyemeza gushirwa muri buri hanahanwa, mukwirinda ukwiyemeza kuri kurushanwa kwinyegeje.
reviewed: true

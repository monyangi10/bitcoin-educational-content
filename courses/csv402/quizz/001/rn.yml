question: Ni ikihe kintu nyamukuru kiranga ibimenyetso vy’ikoreshwa rimwe gusa bikoreshwa muri RGB?
answer: Bishobora gupfungwa rimwe gusa .
wrong_answers:
  - Bishobora gupfungwa incuro zibiri gusa .
  - Batanga ibanga ry'ibikorwa .
  - Bikuraho ivy’uguhurizako ku bijanye na Blockchain.
explanation: |
  Ivyuma bikoreshwa rimwe gusa birashoboza kurema amasezerano yihariye y’ubuhinga bwa none, bikabuza gusubiramwo canke gukoresha amahera kabiri.
reviewed: false
question: คุณสมบัติที่สำคัญของซีลใช้ครั้งเดียวที่ใช้ใน RGB คืออะไร?
answer: พวกเขาสามารถปิดได้เพียงครั้งเดียวเท่านั้น
wrong_answers:
  - พวกเขาสามารถปิดได้เพียงสองครั้งเท่านั้น
  - พวกเขารับประกันความลับของการทำธุรกรรม
  - พวกเขากำจัดความจำเป็นในการมีฉันทามติบนบล็อกเชน
explanation: |
  ซีลแบบใช้ครั้งเดียวช่วยให้สามารถสร้างข้อผูกพันทางการเข้ารหัสที่ไม่ซ้ำกัน ป้องกันการทำซ้ำหรือการใช้จ่ายซ้ำซ้อน
reviewed: false
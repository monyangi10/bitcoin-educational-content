question: ¿Cuál es la característica esencial de los Single-use Seal utilizados en RGB?
answer: Sólo pueden cerrarse una vez
wrong_answers:
  - Sólo pueden cerrarse dos veces
  - Garantizan la confidencialidad de las transacciones
  - Eliminan la necesidad de consenso en blockchain
explanation: |
  Los Single-use Seal permiten crear commitments criptográficos únicos, evitando la duplicación o el doble gasto.

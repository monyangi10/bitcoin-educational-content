question: RGB में इस्तेमाल होने वाले सिंगल यूज़ सील की एक ज़रूरी खासियत क्या है?
answer: वो सिर्फ एक बार ही बंद किए जा सकते हैं
wrong_answers:
  - उन्हें सिर्फ दो बार ही बंद किया जा सकता है
  - वे लेन-देन की गोपनीयता की गारंटी देते हैं
  - वे Blockchain पर सहमति की ज़रूरत को ख़त्म कर देते हैं
explanation: |
  सिंगल यूज़ सील्स यूनिक क्रिप्टोग्राफ़िक कमिटमेंट्स बनाने में मदद करते हैं, जिससे डुप्लीकेशन या डबल स्पेंडिंग रोकी जा सकती है।
reviewed: false
question: Anchor में RGB क्या शामिल होता है?
answer: जीडब्ल्यू-2, एमपीसी, डीबीसी, और अतिरिक्त लेन-देन प्रमाण
wrong_answers:
  - जीडब्ल्यू-5, जीडब्ल्यू-4, और जीडब्ल्यू-3
  - जीडब्ल्यू-8, जीडब्ल्यू-9, जीडब्ल्यू-6, और जीडब्ल्यू-7
  - हस्ताक्षर, लेन-देन जीडब्ल्यू-11, और जीडब्ल्यू-10
explanation: |
  एक Anchor में वो डेटा होता है जो किसी अद्वितीय Commitment को Bitcoin ट्रांजैक्शन में शामिल होने का सबूत देने के लिए ज़रूरी होता है।

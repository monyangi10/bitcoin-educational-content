question: Ni igiki gifise Anchor muri RGB?
answer: indangakintu y'ihanahanwa (transaction ID), MPC, DBC, hamwe n'icemeza ko habaye ihanahanwa ryiyongera
wrong_answers:
  - Itanguriro, insiguro ya Serire, n'umutekero w'impinduka.
  - Igicapo c'amasezerano, Uko ishoramari rimeze, na Uko bimeze murirusangi.
  - Umukono, Hash y'ihanahanwa, n'ukwiyemeza kwa Pedersen
explanation: |
  Anchor irimwo amakuru akenewe kugira ngo yerekane ko hariho ukwiyemeza mw'ihanahanwa rya Bitcoin.
reviewed: true

question: Interface Implementation का उद्देश्य RGB आर्किटेक्चर में क्या है?
answer: Schema के फील्ड्स को Interface में परिभाषित नामों से मैप करें
wrong_answers:
  - AluVM स्क्रिप्ट्स को वैलिडेशन के लिए कंपाइल करें
  - Contract के वैश्विक स्थितियों और स्वामित्व वाली स्थितियों को परिभाषित करने के लिए
  - क्लाइंट-साइड क्रिप्टोग्राफ़िक प्रूफ़्स को स्टोर करने के लिए
explanation: |
  जीडब्ल्यू-6, जीडब्ल्यू-9 के जीडब्ल्यू-7 और जीडब्ल्यू-8 द्वारा पढ़े जाने वाले प्रेजेंटेशन के बीच कड़ी स्थापित करता है।

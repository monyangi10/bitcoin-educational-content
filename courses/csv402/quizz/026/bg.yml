question: Какво е предназначението на Interface Implementation в архитектурата RGB?
answer: Съпоставяне на полетата на Schema с имената, определени в Interface
wrong_answers:
  - Компилиране на скриптове AluVM за валидиране
  - Определяне на глобалните състояния и собствените състояния на договора
  - Съхраняване на криптографски доказателства от страна на клиента
explanation: |
  Interface Implementation установява връзката между бизнес логиката на Schema и представянето, което може да бъде прочетено от Interface.
reviewed: false
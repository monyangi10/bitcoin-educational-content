question: Каква е основната концепция на протокола RGB?
answer: Валидиране от страна на клиента чрез криптографски ангажименти on-chain
wrong_answers:
  - Потвърждаване на веригата чрез интелигентни договори, завършени по Тюринг
  - Изключително използване на некриптирани транзакции Bitcoin
  - Изпълнение на Contract в блокчейн, предназначен за интелигентни договори
explanation: |
  RGB се основава на модел за валидиране от страна на клиента, при който ангажиментите (чрез Taproot или OP_RETURN) се въвеждат в on-chain, докато по-голямата част от логиката и данните се съхраняват в off-chain.
reviewed: false
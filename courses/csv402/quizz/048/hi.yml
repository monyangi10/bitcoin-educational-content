question: RGB प्रोटोकॉल का मूल सिद्धांत क्या है?
answer: ग्राहक-पक्षीय सत्यापन जीडब्ल्यू-1 क्रिप्टोग्राफ़िक प्रतिबद्धताओं के माध्यम से
wrong_answers:
  - जीडब्ल्यू-2 वैलिडेशन ट्यूरिंग-कंप्लीट स्मार्ट कॉन्ट्रैक्ट्स द्वारा
  - Bitcoin लेन-देन का केवल अनएन्क्रिप्टेड उपयोग
  - जीडब्ल्यू-5 का एक्जीक्यूशन जीडब्ल्यू-4 पर जो स्मार्ट कॉन्ट्रैक्ट्स के लिए समर्पित है
explanation: |
  जीडब्ल्यू-11, जीडब्ल्यू-6 मॉडल पर आधारित है जहां कमिटमेंट्स (जीडब्ल्यू-10 या जीडब्ल्यू-8 के जरिए) जीडब्ल्यू-9 में दर्ज किए जाते हैं, जबकि ज्यादातर लॉजिक और डेटा जीडब्ल्यू-7 में रखा जाता है।
reviewed: false
question: Ni iciyumviro nyamukuru ikihe kiri inyuma y’amasezerano ya RGB?
answer: Kwemeza ku ruhande rw'umukiriya biciye ku masezerano ya On-Chain
wrong_answers:
  - On-Chain kwemezwa n'Uguhindukiza- smart contracts ikwiye
  - Ikoreshwa ry'ibikorwa vy'ihanahanwa rya Bitcoin bitashizwemwo amakuru
  - Gukuramwo amasezerano kuri Blockchain yihariye  smart contracts
explanation: |
  RGB ishingiye ku citegererezo c'ukwemeza kuruhande rw'umukiriya aho amasezerano (biciye muri Taproot canke OP_RETURN) yinjira muri On-Chain, mu gihe vyinshi mu vyiyumviro n'amakuru bigumwa muri off-chain.
reviewed: true

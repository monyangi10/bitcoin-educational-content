question: ¿Cuál es el concepto fundamental del protocolo RGB?
answer: Validación del cliente mediante commitments criptográficos on-chain
wrong_answers:
  - Validación on-chain mediante smart contracts Turing-completos
  - Uso exclusivo de transacciones Bitcoin sin cifrar
  - Ejecución de contratos en una blockchain dedicada a los smart contracts
explanation: |
  RGB se basa en un modelo de validación del lado del cliente en el que los commitments (a través de Taproot u OP_RETURN) se introducen on-chain, mientras que la mayor parte de la lógica y los datos se mantienen off-chain.

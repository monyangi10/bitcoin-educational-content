question: แนวคิดพื้นฐานเบื้องหลังโปรโตคอล RGB คืออะไร?
answer: การตรวจสอบฝั่งลูกค้าผ่านการผูกมัดทางการเข้ารหัส on-chain
wrong_answers:
  - การตรวจสอบบนเชนโดยสัญญาอัจฉริยะที่สมบูรณ์แบบทัวริง
  - การใช้ธุรกรรม Bitcoin ที่ไม่ได้เข้ารหัสโดยเฉพาะ
  - การดำเนินการ Contract บนบล็อกเชนที่ทุ่มเทให้กับสมาร์ทคอนแทรค
explanation: |
  RGB ขึ้นอยู่กับรูปแบบการตรวจสอบฝั่งไคลเอนต์ที่ซึ่งการผูกพัน (ผ่าน Taproot หรือ OP_RETURN) จะถูกป้อน on-chain ในขณะที่ตรรกะและข้อมูลส่วนใหญ่จะถูกเก็บไว้ off-chain
reviewed: false
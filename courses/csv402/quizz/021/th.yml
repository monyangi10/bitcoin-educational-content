question: Consignment ใน RGB ประกอบด้วยอะไร?
answer: ข้อมูลฝั่งลูกค้าที่จำเป็นสำหรับการตรวจสอบการเปลี่ยนแปลง
wrong_answers:
  - สำเนาฉบับสมบูรณ์ของบล็อกเชน Bitcoin
  - รายการข้อผูกพันสาธารณะของ Bitcoin
  - คีย์สาธารณะของผู้เข้าร่วมการเปลี่ยนสถานะ
explanation: |
  Consignment รวมข้อมูล RGB ซึ่งช่วยให้ผู้รับสามารถตรวจสอบการเปลี่ยนสถานะตามกฎของสัญญาได้
reviewed: false
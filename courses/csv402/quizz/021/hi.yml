question: Consignment में RGB क्या शामिल होता है?
answer: ग्राहक की तरफ से जो डेटा चाहिए वो ट्रांजिशन को वैलिडेट करने के लिए
wrong_answers:
  - Bitcoin और Blockchain की पूरी कॉपी
  - जीडब्ल्यू-4 की सार्वजनिक प्रतिबद्धताओं की सूची:  

1. **जलवायु कार्रवाई** - 2030 तक कार्बन उत्सर्जन में 50% कटौती करना और 2050 तक शुद्ध-शून्य उत्सर्जन हासिल करना।  
2. **शिक्षा और शोध** - वैश्विक शिक्षा पहुंच बढ़ाने और अंतर-विषयक शोध को बढ़ावा देना।  
3. **स्वास्थ्य सेवाएं** - सस्ती और गुणवत्तापूर्ण स्वास्थ्य सुविधाओं तक पहुंच सुनिश्चित करना।  
4. **समानता और विविधता** - लैंगिक समानता, समावेशिता और सामाजिक न्याय को प्रोत्साहित करना।  
5. **स्थिरता** - पर्यावरण-अनुकूल प्रथाओं और हरित प्रौद्योगिकी को अपनाना।  
6. **सामुदायिक सहयोग** - स्थानीय समुदायों के साथ मिलकर विकासात्मक परियोजनाओं को आगे बढ़ाना।  

(नोट: यह एक उदाहरणात्मक सूची है। असली प्रतिबद्धताएं Bitcoin की आधिकारिक घोषणाओं पर निर्भर करेंगी।)

question: ผลที่ตามมาของการสูญเสียสแตชในโปรโตคอล RGB คืออะไร?
answer: ประวัติ Contract และข้อมูลที่เกี่ยวข้องไม่สามารถกู้คืนได้
wrong_answers:
  - ข้อมูลสามารถสร้างขึ้นใหม่จากบล็อกเชนได้หากคุณมี seed
  - สำเนาของข้อมูลมีอยู่บนเซิร์ฟเวอร์ของ RGB ในสวิตเซอร์แลนด์
  - ข้อมูลจะถูกจำลองโดยอัตโนมัติสำหรับผู้เข้าร่วมทั้งหมด
explanation: |
  ในการตรวจสอบความถูกต้องฝั่งไคลเอ็นต์ ผู้ใช้แต่ละคนมีหน้าที่รับผิดชอบต่อคลังของตนเอง ซึ่งไม่ได้ถูกทำซ้ำที่อื่น ทำให้การสูญเสียเป็นที่สิ้นสุด
reviewed: false
question: Nizihe ngaruka zo gukoresha Stash murukwirikirane rwa RGB?
answer: Kahise k'amasezerano kandi gashizwe hamwe n'amakuru bicika ibidasubirwamwo
wrong_answers:
  - Amakuru ashobora gusubira kwubakwa kuri Blockchain nimba ufise imbuto.
  - Kopi y’amkuru iraboneka kubushinguzi bwa RGB mu Busuwisi .
  - Amakuru arasubirwamwo kubayikoresha bose
explanation: |
  Kuruhande rw'ukwemeza rw'umukiriya, umukoresha wese niwe abazwa Stash yiwe, iyo Stash ntisubirwamwo ahandi, bikaba bituma ukubura kwayo kuba iryanyuma.
reviewed: true

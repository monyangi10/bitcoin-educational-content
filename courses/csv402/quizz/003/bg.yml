question: Каква е последицата от загубата на скривалището в протокола RGB?
answer: Историята на Contract и свързаните с нея данни стават невъзстановими
wrong_answers:
  - Данните могат да бъдат възстановени от блокчейна, ако разполагате с seed
  - Копие от данните е достъпно на сървърите на RGB в Швейцария
  - Данните се репликират автоматично за всички участници
explanation: |
  При валидирането от страна на клиента всеки потребител е отговорен за своето скривалище, което не се репликира другаде, което прави загубата му окончателна.

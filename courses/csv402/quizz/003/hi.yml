question: Stash को RGB प्रोटोकॉल में खोने का क्या नतीजा होता है?
answer: जीडब्ल्यू-2 का इतिहास और संबंधित डेटा पुनः प्राप्त करने योग्य नहीं रह जाता है
wrong_answers:
  - अगर आपके पास seed है, तो Blockchain से डेटा को दोबारा बना सकते हैं।
  - RGB के सर्वर पर स्विट्ज़रलैंड में डेटा की एक कॉपी उपलब्ध है
  - डेटा सभी प्रतिभागियों के लिए अपने आप रेप्लिकेट हो जाता है
explanation: |
  Client-side Validation में, हर यूज़र अपने Stash के लिए ज़िम्मेदार है, जो कहीं और कॉपी नहीं होता। इसलिए अगर यह खो जाए तो वापस नहीं मिलेगा।
reviewed: false
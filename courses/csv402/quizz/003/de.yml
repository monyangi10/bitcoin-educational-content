question: Was ist die Folge des Verlusts des Stash im RGB-Protokoll?
answer: Vertragshistorie und zugehörige Daten gehen unwiederbringlich verloren
wrong_answers:
  - Daten können aus der Blockchain rekonstruiert werden, wenn man den Seed hat
  - Eine Kopie der Daten ist auf den Servern von RGB in der Schweiz verfügbar
  - Daten werden automatisch für alle Teilnehmer repliziert
explanation: |
  Bei der client-side Validierung ist jeder Benutzer für seinen Stash verantwortlich. Dieser wird nicht an anderer Stelle repliziert, so dass sein Verlust endgültig ist.

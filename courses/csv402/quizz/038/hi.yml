question: एसेट जारी करने के लिए इस्तेमाल की जाने वाली YAML फ़ाइल में, कौन सा फ़ील्ड जारी किए गए टोकन की कुल संख्या को परिभाषित करता है?
answer: जारी किया गया
wrong_answers:
  - मालिक
  - "स्पेक"
  - रक़म
explanation: |
  YAML फ़ाइल में "issuedSupply" फ़ील्ड Contract के लिए जारी किए गए टोकन की कुल मात्रा को परिभाषित करती है।
reviewed: false
question: Mu dosiye ya YAML ikoreshwa mu gutanga umutungo, ni ikihe kibanza gisobanura umubare wose w’ibimenyetso vyasohowe?
answer: Gutanga
wrong_answers:
  - Nyir'umutungo
  - spec
  - igitigiri
explanation: |
  "IssuedSupply" muri dosiye ya YAML isobanura umubare wose w'ibimenyetso vyasohowe kuri Contract.

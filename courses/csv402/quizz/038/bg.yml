question: В YAML файла, използван за издаване на актив, кое поле определя общия брой издадени токени?
answer: издаденДоставки
wrong_answers:
  - assetOwner
  - спецификация
  - сума
explanation: |
  Полето "issuedSupply" във файла YAML определя общото количество токени, издадени за договора.

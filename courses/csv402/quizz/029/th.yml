question: บทบาทหลักของ Schema ในสัญญา RGB คืออะไร?
answer: อธิบายตรรกะทางธุรกิจและโครงสร้างข้อมูลของสัญญา
wrong_answers:
  - กำหนดอินเทอร์เฟซสำหรับกระเป๋าเงิน RGB
  - การจัดการการคอมไพล์สคริปต์บนบล็อกเชน
  - การตรวจสอบความถูกต้องทางการเข้ารหัสบนเชน
explanation: |
  Schema กำหนดโครงสร้างแบบประกาศ ชนิดข้อมูล และกฎการตรวจสอบของสัญญา ทำให้คุณสามารถจัดการตรรกะทางธุรกิจในฝั่งของลูกค้าได้
reviewed: false
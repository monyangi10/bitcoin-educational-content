question: Каква е основната роля на Schema в договор RGB?
answer: Опишете бизнес логиката и структурата на данните на договора
wrong_answers:
  - Дефиниране на интерфейса за портфейли RGB
  - Управление на компилирането на скриптове в блокчейна
  - Криптографско валидиране във веригата
explanation: |
  Schema определя декларативната структура, типовете данни и правилата за валидиране на договора, което ви позволява да управлявате бизнес логиката от страна на клиента.
reviewed: false
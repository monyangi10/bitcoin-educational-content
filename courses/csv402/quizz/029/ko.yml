question: RGB Contract에서 Schema의 주요 역할은 무엇인가요?
answer: Business Logic 및 Contract의 데이터 구조에 대해 설명하세요
wrong_answers:
  - Interface 지갑용 RGB 정의하기
  - Blockchain에서 스크립트 컴파일 관리하기
  - On-Chain 암호화 유효성 검사
explanation: |
  Schema은 Contract의 선언적 구조, 데이터 유형 및 유효성 검사 규칙을 정의하여 고객 측에서 Business Logic을 관리할 수 있도록 합니다.

question: ใน CAP trilemma ความสมดุลระหว่างการตรวจสอบจากฝั่งลูกค้าและความพร้อมใช้งานคืออะไร?
answer: ผู้เข้าร่วมแต่ละคนต้องเก็บข้อมูลที่เกี่ยวข้องไว้ในเครื่องของตนเอง
wrong_answers:
  - ข้อมูลเป็นสาธารณะและทำซ้ำโดยอัตโนมัติทั่วโลก
  - ความสม่ำเสมอถูกสละเพื่อความพร้อมใช้งาน
  - การเปลี่ยนสถานะจะถูกเผยแพร่เสมอบน Lightning
explanation: |
  ในการตรวจสอบฝั่งไคลเอ็นต์ ความพร้อมใช้งานทั่วโลกไม่สามารถรับประกันได้ เนื่องจากผู้เข้าร่วมต้องจัดการข้อมูลของตนเอง
reviewed: false
question: Какъв е компромисът между валидирането от страна на клиента и наличността при трилемата на ОСП?
answer: Всеки участник трябва да съхранява съответните данни на местно ниво
wrong_answers:
  - Данните са публични и се репликират автоматично в световен мащаб
  - Последователност, пожертвана за наличност
  - Преходите между състоянията винаги се публикуват в Lightning
explanation: |
  При валидирането от страна на клиента глобалната наличност не е гарантирана, тъй като участниците трябва да управляват собствените си данни.
reviewed: false
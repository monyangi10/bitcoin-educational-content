question: En el trilema de CAP, ¿cuál es el compromiso entre la validación por parte del cliente (Client-side Validation) y la disponibilidad?
answer: Cada participante debe conservar localmente los datos pertinentes
wrong_answers:
  - Los datos son públicos y se replican automáticamente en todo el mundo
  - Se sacrifica la coherencia por la disponibilidad
  - Las transiciones de estado se publican siempre en Lightning
explanation: |
  En la Client-side Validation, la disponibilidad global no está garantizada, ya que los participantes tienen que gestionar sus propios datos.

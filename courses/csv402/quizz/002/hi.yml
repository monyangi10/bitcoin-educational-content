question: CAP त्रिकोण (CAP trilemma) में, ग्राहक-पक्ष सत्यापन (customer-side validation) और उपलब्धता (availability) के बीच क्या समझौता होता है?
answer: हर एक प्रतिभागी को संबंधित डेटा स्थानीय रूप से रखना होगा
wrong_answers:
  - डेटा पब्लिक है और अपने आप ग्लोबली रेप्लिकेट हो जाता है
  - उपलब्धता के लिए नियमितता का त्याग
  - लाइटनिंग पर स्टेट ट्रांजिशन हमेशा पब्लिश किए जाते हैं
explanation: |
  Client-side Validation में, वैश्विक उपलब्धता की गारंटी नहीं है, क्योंकि प्रतिभागियों को अपना डेटा खुद मैनेज करना पड़ता है।
reviewed: false
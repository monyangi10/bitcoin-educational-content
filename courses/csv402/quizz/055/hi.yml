question: RGB-lightning-node, RGB इकोसिस्टम में क्या है?
answer: एक जीडब्ल्यू-1 जो जीडब्ल्यू-2-संगत लाइटनिंग चैनलों को प्रबंधित करने के लिए है
wrong_answers:
  - एक मोबाइल Wallet जो RGB एसेट्स को मैनेज करे
  - Exchange और RGB के लिए एक प्रॉक्सी सर्वर लॉग्स
  - एक जीडब्ल्यू-8 टूल जीडब्ल्यू-9 एसेट्स के लिए जीडब्ल्यू-7 पर
explanation: |
  RGB-लाइटनिंग-नोड एक Rust daemon है जिसे RGB एसेट्स को लाइटनिंग चैनल्स में इंटीग्रेट करने के लिए डिज़ाइन किया गया है, जो इंगेजमेंट ट्रांजैक्शन्स में RGB स्टेट ट्रांज़िशन्स को जोड़कर काम करता है।
reviewed: false
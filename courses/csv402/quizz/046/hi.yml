question: कौन सा RGB मानक आपको यूनिक एसेट्स या "NFTs" बनाने की अनुमति देता है?
answer: आरजीबी21
wrong_answers:
  - आरजीबी20
  - आरजीबी25
  - आरजीबी30
explanation: |
  RGB21 स्टैंडर्ड को यूनिक एसेट्स को मैनेज करने के लिए डिज़ाइन किया गया है, जो NFTs के साथ प्राइवेट मेटाडेटा को जोड़ने की सुविधा देता है।
reviewed: false
question: Ni uruhe rugero rwa RGB ruguha uburenganzira bwo kurema ivy'ubutunzi bidasanzwe canke "NFTs"?
answer: RGB21
wrong_answers:
  - RGB20
  - RGB25
  - RGB30
explanation: |
  Itegeko rya RGB21 ryagenewe gucunga itunga ridasanzwe, rituma amakuru y’ibanga ashobora gufatanywa n’ama NFT.
reviewed: false
question: Alice (ผู้ส่ง) ควรทำอย่างไรหลังจากได้รับใบแจ้งหนี้ของ Bob?
answer: สร้าง PSBT พร้อมกับ UTXO และ generate ที่สถานีขนส่งสินค้า
wrong_answers:
  - ลงนามในธุรกรรม Bitcoin ที่ใช้ UTXO ซึ่งมีตราประทับใช้ครั้งเดียว
  - นำเข้าสินค้าภายใต้ wallet ของคุณเองสำหรับรายละเอียดสัญญา
  - ออกใบแจ้งหนี้ใหม่สำหรับการออกสินทรัพย์
explanation: |
  Alice ต้องสร้าง PSBT เพื่อใช้จ่าย UTXO ที่เกี่ยวข้องกับสินทรัพย์ จากนั้น generate การส่งสินค้าปลายทางที่รวมการเปลี่ยนแปลงใหม่ไปยัง Bob
reviewed: false
question: Alice (uwurungitse) akwiye gukora iki amaze kwakira Invoice ya Bob?
answer: Yubaka PSBT ifise UTXO yayo na generate igisagara ca Consignment co kwimurirako
wrong_answers:
  - Sinya ku giciro ca Bitcoin gikoresha UTXO yaco kirimwo Single-Use Seal.
  - Injira Consignment muri Wallet yawe bwite kugira ngo ubone amakuru yose ya Contract
  - Gutanga Invoice nshasha ku kibazo c'umutungo
explanation: |
  Alice itegerezwa gukora PSBT kugira ngo ikoreshe UTXO ijana n'umutungo, hanyuma generate Terminal Consignment irimwo uguhinduka gushasha ku Bob.

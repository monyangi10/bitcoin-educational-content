question: Какво трябва да направи Alice (изпращач), след като получи фактурата на Bob?
answer: Изграждане на терминал за прехвърляне на пратки PSBT с неговите UTXO и generate
wrong_answers:
  - Подписване на транзакция Bitcoin, която изразходва своя UTXO, съдържащ печат за еднократна употреба
  - Импортирайте пратката в собствения си wallet за подробности за договора
  - Издаване на нова фактура за издаване на актив
explanation: |
  ГС-9 трябва да създаде ГС-10, за да изразходва ГС-11, свързан с актива, след което ГС-8 да създаде терминална пратка, която включва новия преход към ГС-12.

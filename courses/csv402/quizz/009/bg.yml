question: Защо в RGB се препоръчва да се използва Tapret вместо Opret за ангажименти?
answer: За да се сведе до минимум видимостта и да се избегне цензурата
wrong_answers:
  - Намаляване на разходите по транзакциите
  - Тъй като OP_RETURN не е съвместим с Lightning
  - За да увеличите максимално размера на ангажиментите
explanation: |
  Tapret ви позволява да интегрирате ангажиментите дискретно, за разлика от OP_RETURN, който ги прави незабавно видими и подлежащи на цензура.
reviewed: false
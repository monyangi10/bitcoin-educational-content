question: Warum wird bei RGB empfohlen, Tapret anstelle von Opret für Commitments zu verwenden?
answer: Um die Sichtbarkeit zu minimieren und Zensur zu vermeiden
wrong_answers:
  - Reduktion der Transaktionskosten
  - Weil ein OP_RETURN nicht Lightning-kompatibel ist
  - Um die Größe der Commitments zu maximieren
explanation: |
  Mit Tapret kann man Commitments diskret integrieren, im Gegensatz zu OP_RETURN, das sie sofort sichtbar macht und der Zensur unterliegen kann.
reviewed: false

question: RGB पर, commitments के लिए Opret की जगह Tapret का इस्तेमाल करने की सलाह क्यों दी जाती है?
answer: दिखने से बचने और सेंसरशिप से बचने के लिए
wrong_answers:
  - लेन-देन की लागत कम करने के लिए
  - क्योंकि OP_RETURN लाइटनिंग-संगत नहीं है
  - कमिटमेंट का आकार बढ़ाने के लिए
explanation: |
  टैप्रेट आपको वादों को चुपके से जोड़ने देता है, जबकि जीडब्ल्यू-2 में वे तुरंत दिखाई देते हैं और सेंसरशिप के अधीन होते हैं।

question: Ku RGB, ni kuberiki bitegerezwa gukoresha Tapret aho gukoresha Opret kukwiyemeza?
answer: Kugira ngo bigabanye ukuboneka no kwirinda ibihano
wrong_answers:
  - Kugira ngo hagabanywe ibiciro vy'ihanahanwa
  - Kubera ko OP_RETURN idakwiranye na Lightning .
  - Kugira ngo hongerezwe ubunini bw'ukwiyemeza
explanation: |
  Tapret iragufasha gushiramwo ukwiyemeza mw'ibanga, bitandukanye na OP_RETURN, ivyo bikaba bituma ahita aboneka kandi akirinda ibihano.
reviewed: true

question: บน RGB ทำไมถึงแนะนำให้ใช้ Tapret แทน Opret สำหรับการผูกพัน?
answer: เพื่อลดการมองเห็นและหลีกเลี่ยงการเซ็นเซอร์
wrong_answers:
  - เพื่อลดต้นทุนการทำธุรกรรม
  - เนื่องจาก OP_RETURN ไม่รองรับ Lightning
  - เพื่อเพิ่มขนาดของพันธสัญญาให้สูงสุด
explanation: |
  Tapret ช่วยให้คุณรวมคำมั่นสัญญาอย่างเงียบ ๆ ต่างจาก OP_RETURN ที่ทำให้คำมั่นสัญญาเหล่านั้นมองเห็นได้ทันทีและอาจถูกเซ็นเซอร์
reviewed: false
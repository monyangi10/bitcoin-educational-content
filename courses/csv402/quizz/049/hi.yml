question: RGB डिजिटल एसेट मैनेजमेंट में कॉन्फिडेंशियैलिटी कैसे सुनिश्चित करता है?
answer: Blockchain पर सिर्फ क्रिप्टोग्राफ़िक कमिटमेंट्स रजिस्टर करके
wrong_answers:
  - Blockchain पर सभी एंड-टू-एंड लेन-देन को एन्क्रिप्ट करके
  - उपयोगकर्ताओं की पहचान को विकेंद्रीकृत मिक्सर्स के जरिए छिपाकर
  - हर ट्रांसफर के लिए सिर्फ अस्थायी Bitcoin पतों का इस्तेमाल करना
explanation: |
  RGB सिर्फ On-Chain क्रिप्टोग्राफ़िक सबूत स्टोर करके, संवेदनशील Contract और ट्रांसफर जानकारी को गोपनीय रखता है।
reviewed: false
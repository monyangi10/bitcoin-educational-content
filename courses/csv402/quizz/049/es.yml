question: ¿Cómo garantiza RGB la confidencialidad en la gestión de activos digitales?
answer: Al registrar únicamente comcommitmentspromisos criptográficos en la blockchain
wrong_answers:
  - Al cifrar todas las transacciones de extremo a extremo en la blockchain
  - Ocultando la identidad de los usuarios mediante mixers descentralizados
  - Utilizar sólo direcciones Bitcoin temporales para cada transferencia
explanation: |
  Al almacenar únicamente pruebas criptográficas on-chain, RGB mantiene la confidencialidad de la información sensible sobre contratos y transferencias.

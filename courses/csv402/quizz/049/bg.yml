question: Как RGB гарантира поверителността при управлението на цифрови активи?
answer: Като регистрирате само криптографски ангажименти в блокчейна
wrong_answers:
  - Чрез криптиране на всички транзакции от край до край в блокчейна
  - Скриване на самоличността на потребителите чрез децентрализирани миксери
  - Използване само на временни Bitcoin адреси за всеки трансфер
explanation: |
  Чрез съхраняването само на криптографските доказателства на on-chain RGB запазва поверителността на чувствителната информация за договорите и трансфера.
reviewed: false
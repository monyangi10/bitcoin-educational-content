question: RGB รับรองความลับในการจัดการสินทรัพย์ดิจิทัลอย่างไร?
answer: โดยการลงทะเบียนเฉพาะข้อผูกพันทางการเข้ารหัสบนบล็อกเชน
wrong_answers:
  - โดยการเข้ารหัสธุรกรรมทั้งหมดแบบ end-to-end บนบล็อกเชน
  - โดยการซ่อนตัวตนของผู้ใช้ผ่านตัวผสมแบบกระจายอำนาจ
  - ใช้เฉพาะที่อยู่ Bitcoin ชั่วคราวสำหรับการโอนแต่ละครั้ง
explanation: |
  โดยการจัดเก็บเฉพาะหลักฐานการเข้ารหัส on-chain, RGB รักษาข้อมูลสัญญาและการโอนที่เป็นความลับให้ปลอดภัย
reviewed: false
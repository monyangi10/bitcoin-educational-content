question: Коя историческа концепция на RGB се прилага в цифровия свят?
answer: Инструменти на приносител
wrong_answers:
  - Централизирани бази данни
  - Мрежи от равнопоставени партньори без валидиране
  - Отворени регистри, достъпни за всички
explanation: |
  RGB пренася идеята за инструменти на приносител в цифров вид.

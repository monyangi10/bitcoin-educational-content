question: Кои са основните компоненти, необходими за стартирането на съвместим с RGB възел Lightning?
answer: bitcoind, индексиращо устройство и прокси сървър RGB
wrong_answers:
  - Възел Lightning, индексиращ модул и IPFS сървър
  - Мобилен RGB wallet, прокси сървър RGB и bitcoind
  - Уеб клиент, индексиращо устройство и прокси сървър RGB
explanation: |
  За да стартирате възел Lightning с поддръжка на RGB, се нуждаете от възел bitcoind, който да взаимодейства с блокчейна Bitcoin, от индексиращ модул, който да добива транзакции on-chain, и от прокси сървър RGB, който да улеснява обмена на пратки между равнопоставени потребители.
reviewed: false
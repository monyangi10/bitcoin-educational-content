question: Ni ibihe bintu nyamukuru bisabwa kugira ngo umuntu akoreshe node ya Lightning ihuye na RGB?
answer: bitcoind, urutonde n'umukozi w'ubutumwa RGB
wrong_answers:
  - Uruzitiro rw'umuravyo, urutonde na umukozi wa IPFS
  - Igikoresho gigendagenda RGB Wallet, igikoresho co gukoresha RGB n’igikoresho co gukoresha bitcoind.
  - Umukiriya w'urubuga, urutonde na umuserukira wa RGB
explanation: |
  Kugira ngo ukoreshe urudodo rwa Lightning rukoreshwa na RGB, ukeneye urudodo rwa bitcoind kugira ngo ukoreshe Bitcoin Blockchain, indexer yo gucukura ibikorwa vya On-Chain, n’umukozi wa RGB wo gufasha Exchange y’ibirungikwa hagati y’urunganwe.
reviewed: false
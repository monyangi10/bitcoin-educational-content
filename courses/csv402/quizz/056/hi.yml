question: RGB-संगत लाइटनिंग नोड चलाने के लिए मुख्य कॉम्पोनेंट्स क्या चाहिए?
answer: एक bitcoind, एक इंडेक्सर और एक RGB प्रॉक्सी सर्वर
wrong_answers:
  - एक लाइटनिंग नोड, एक इंडेक्सर और एक आईपीएफएस सर्वर
  - एक RGB मोबाइल Wallet, एक RGB प्रॉक्सी सर्वर और एक bitcoind
  - वेब क्लाइंट, इंडेक्सर और RGB प्रॉक्सी सर्वर
explanation: |
  RGB-सक्षम लाइटनिंग नोड चलाने के लिए, आपको bitcoind नोड की ज़रूरत होगी जो Bitcoin Blockchain के साथ इंटरैक्ट करे, On-Chain ट्रांज़ैक्शन्स को माइन करने के लिए एक इंडेक्सर, और RGB प्रॉक्सी सर्वर जो पीयर्स के बीच Exchange कंसाइनमेंट्स को फैसिलिटेट करे।
reviewed: false
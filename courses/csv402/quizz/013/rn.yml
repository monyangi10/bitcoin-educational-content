question: Ni ibihe bikorwa nyamukuru vy’amsezerano ya RGB?
answer: Uko bihinduka, Itanguriro, n'ivyiyongerako.
wrong_answers:
  - Insiguro ya Serire, Ukwiyemeza, n'Ukwemeza
  - Anchor Ikora, Bishasha vya DAG, ugutera umukono k'ihanahanwa
  - Urukuta rw'itanguriro, UTXO Gutanga, n'Inyandiko Kwemeza
explanation: |
  Ivyo bikorwa bihindura canke vyuzuza ikibanza c'Amasezerano hakurikijwe igicapocayo.
reviewed: true

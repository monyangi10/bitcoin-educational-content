question: Ni ibihe bikorwa nyamukuru vy’i RGB Contract?
answer: State Transition, Genesis, na State Extension.
wrong_answers:
  - Seal Definition, Commitment, n'Ivyemezo
  - Anchor Irema, DAG Ivugurura, n'Isinya ry'Ibikorwa
  - Genesis Igipande, UTXO Gutanga, n'Inyandiko Kwemeza
explanation: |
  Ivyo bikorwa bihindura canke biheza ikibanza ca Contract hakurikijwe Schema yayo.

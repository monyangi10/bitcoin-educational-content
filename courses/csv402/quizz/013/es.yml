question: ¿Cuáles son las principales operaciones de un contrato RGB?
answer: State Transition, Genesis, and State Extension
wrong_answers:
  - Seal Definition, Commitment, y Validation
  - Anchor Creation, DAG Update, y Transaction Signing
  - Genesis Block, UTXO Allocation, y Script Validation
explanation: |
  Estas operaciones modifican o completan el estado de un contrato según su Schema.

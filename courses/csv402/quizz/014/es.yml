question: ¿Qué papel desempeña un Schema en RGB?
answer: Definir variables contractuales, reglas y lógica de negocio
wrong_answers:
  - Almacenar los envíos intercambiados entre los participantes
  - Validación de commitment de Pedersen en transacciones de Bitcoin
  - Crear Seal Definitions para cada UTXO
explanation: |
  El Schema estructura el estado del contrato y determina las transiciones permitidas y las condiciones de validación.
reviewed: false
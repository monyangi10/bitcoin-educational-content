question: Ni uruhara uruhe Schema ifise muri RGB?
answer: Sigura ibihinduka vya Contract, amategeko na Business Logic.
wrong_answers:
  - Ibintu vy'ububiko vyahinduwe hagati y'abaje mu nama
  - Kwemeza amasezerano ya Pedersen ku bikorwa vya Bitcoin
  - Rema Insobanuro za Seal kuri buri UTXO.
explanation: |
  Schema itunganya uko Contract imeze kandi igena ihinduka ryemewe n’ivyangombwa vyo kwemeza.

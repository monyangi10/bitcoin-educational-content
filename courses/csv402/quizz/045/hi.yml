question: RGB मानक में, फंजिबल टोकन्स को परिभाषित करने के लिए **ERC-20** स्टैंडर्ड का उपयोग किया जाता है। यह इथेरियम ब्लॉकचेन पर टोकन्स के लिए सबसे आम प्रोटोकॉल है।
answer: आरजीबी20
wrong_answers:
  - आरजीबी21
  - आरजीबी22
  - आरजीबी25
explanation: |
  RGB20 वह स्टैंडर्ड है जिसका इस्तेमाल RGB प्रोटोकॉल पर फंजिबल टोकन बनाने और मैनेज करने के लिए किया जाता है।
reviewed: false
question: RGB में कौन सा तंत्र है जो एक ही Bitcoin लेन-देन में कई ट्रांजिशन को एक साथ ग्रुप करने की अनुमति देता है?
answer: जीडब्ल्यू-2
wrong_answers:
  - जीडब्ल्यू-3 एकत्रीकरण
  - मल्टी-जीडब्ल्यू-4 ट्री
  - राज्य समेकन
explanation: |
  एक Transition Bundle, RGB स्टेट ट्रांज़िशन्स (जो कि एक ही Contract से संबंधित हैं) का एक समूह है जो सभी एक ही Bitcoin Witness Transaction में शामिल हैं।
reviewed: false
question: "Seal Definition" ในบริบทของ RGB Assignment คืออะไร?
answer: การอ้างอิงถึง UTXO ที่กำหนดความเป็นเจ้าของของ Owned State
wrong_answers:
  - การจัดกลุ่มข้อมูลที่แลกเปลี่ยนระหว่างคู่สัญญา ภายใต้ Client-side Validation
  - การคอมไพล์สัญญาในโค้ดที่ปฏิบัติการได้ off-chain
  - สาขา DAG ของประวัติการเปลี่ยนสถานะ
explanation: |
  "Seal Definition" เชื่อมโยง UTXO กับส่วนที่เฉพาะเจาะจงของสถานะสัญญา เพื่อรับประกันการจัดสรรสิทธิหรือสินทรัพย์ที่ถูกต้อง
reviewed: false
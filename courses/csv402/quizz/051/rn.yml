question: Seal Definition ni iki mu bijanye n'ivyo RGB Assignment ivuga?
answer: Ivyo bivugwa ku UTXO ishinga Ownership ya Owned State.
wrong_answers:
  - Itsinda ry’amakuru yahanahanwa hagati y’ababuranyi, hakurikijwe Client-side Validation.
  - Gukoranya amasezerano muri off-chain kode ishobora gushirwa mu ngiro
  - Ishami rya DAG ry'amateka ya State Transition
explanation: |
  "Seal Definition" ihuza UTXO n'igice kinaka ca Contract State, igatanga icemezo c'ugutanga neza uburenganzira canke umutungo.

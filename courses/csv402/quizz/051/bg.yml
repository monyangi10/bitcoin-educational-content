question: Какво е "Seal Definition" в контекста на RGB Assignment?
answer: Препратката към UTXO, която установява собствеността върху Owned State
wrong_answers:
  - Групирането на данните, обменяни между страните, при спазване на Client-side Validation
  - Компилиране на договори в изпълним код на off-chain
  - Разклонението на DAG на историята на прехода на състоянието
explanation: |
  "Seal Definition" свързва UTXO с конкретна част от състоянието на договора, като гарантира правилното разпределение на правото или актива.
reviewed: false
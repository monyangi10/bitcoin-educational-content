question: ¿Qué es un "Seal Definition" en el contexto del Assignment RGB?
answer: La referencia a un UTXO que establece la propiedad de un Owned State
wrong_answers:
  - La agrupación de los datos intercambiados entre las partes, sujeta a la Client-side Validation
  - Compilación de contratos en código ejecutable fuera de la cadena
  - La rama DAG del historial de transiciones de estado
explanation: |
  El "Seal Definition" vincula un UTXO a una parte específica del estado del contrato, garantizando la correcta asignación de un derecho o activo.
reviewed: false
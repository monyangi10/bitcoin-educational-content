question: วัตถุที่เทียบเท่ากับการเขียนโปรแกรมเชิงวัตถุ (OOP) ของส่วนประกอบ Schema ในบริบทของ RGB คืออะไร?
answer: คำจำกัดความของคลาส
wrong_answers:
  - ตัวสร้างคลาส
  - การใช้งานอินเทอร์เฟซ
  - การสร้างต้นแบบเมธอด
explanation: |
  Schema สอดคล้องกับคำจำกัดความของคลาสใน OOP ซึ่งอธิบายถึงคุณสมบัติ, เมธอด และกฎของตรรกะทางธุรกิจ
reviewed: false
question: Schema कॉम्पोनेंट का ऑब्जेक्ट-ओरिएंटेड प्रोग्रामिंग (OOP) में RGB कॉन्टेक्स्ट में क्या समकक्ष होगा?
answer: क्लास की परिभाषा
wrong_answers:
  - क्लास का कंस्ट्रक्टर
  - जीडब्ल्यू-2 लागू करना
  - तरीका प्रोटोटाइपिंग
explanation: |
  Schema, OOP में एक क्लास की परिभाषा से मेल खाता है, जो Business Logic के गुणों, मेथड्स और नियमों को बताता है।
reviewed: false
question: Какъв е еквивалентът на обектно-ориентираното програмиране (ООП) на компонента Schema в контекста на RGB?
answer: Определяне на клас
wrong_answers:
  - Конструкторът на класа
  - Реализиране на интерфейс
  - Създаване на прототипи на методи
explanation: |
  Schema съответства на дефиницията на клас в ООП, който описва свойствата, методите и правилата на бизнес логиката.

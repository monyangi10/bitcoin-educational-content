question: ¿Cuál es el papel principal de AluVM en el protocolo RGB?
answer: Ejecutar scripts y contratar operaciones en un entorno de máquina virtual
wrong_answers:
  - Analizar las transacciones de Bitcoin on-chain en un entorno de máquina virtual
  - Generar public keys para usuarios RGB en un entorno de máquina virtual
  - Optimización de la validación de blockchain públicas en un entorno de máquina virtual
explanation: |
  AluVM está diseñado para la validación de smart contracts y la computación distribuida dentro del marco RGB.

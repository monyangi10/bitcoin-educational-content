question: Каква е основната роля на AluVM в протокола RGB?
answer: Изпълнение на скриптове и операции по договори в среда на виртуална машина
wrong_answers:
  - Анализиране на транзакции Bitcoin on-chain в среда на виртуална машина
  - Генериране на публични ключове за потребители на RGB в среда на виртуална машина
  - Оптимизиране на валидирането на публични блокчейн вериги в среда на виртуална машина
explanation: |
  AluVM е предназначен за валидиране на интелигентни договори и разпределени изчисления в рамките на RGB.

  - Sanal makine ortamında RGB kullanıcıları için generate genel anahtarları
  - Sanal makine ortamında genel Blockchain doğrulamasını optimize etme
explanation: |
  AluVM, Smart contract doğrulaması ve RGB çerçevesi içinde dağıtık hesaplama için tasarlanmıştır.

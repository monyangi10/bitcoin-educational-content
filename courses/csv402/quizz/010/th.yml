question: บทบาทหลักของ AluVM ในโปรโตคอล RGB คืออะไร?
answer: เรียกใช้สคริปต์และดำเนินการตามสัญญาในสภาพแวดล้อมเครื่องเสมือน
wrong_answers:
  - วิเคราะห์ธุรกรรม Bitcoin on-chain ในสภาพแวดล้อมเครื่องเสมือน
  - สร้างกุญแจสาธารณะสำหรับผู้ใช้ RGB ในสภาพแวดล้อมเครื่องเสมือน
  - การเพิ่มประสิทธิภาพการตรวจสอบบล็อกเชนสาธารณะในสภาพแวดล้อมเครื่องเสมือน
explanation: |
  AluVM ได้รับการออกแบบสำหรับการตรวจสอบสัญญาอัจฉริยะและการประมวลผลแบบกระจายภายในกรอบงาน RGB
reviewed: false
question: Ni ibihe bintu bikenewe kugira ngo haboneke umurongo wa Lightning utwara ivy’ubutunzi vya RGB?
answer: Infashanyo muri bitcoins n'infashanyo mu mitungo ya RGB
wrong_answers:
  - Bitcoin-gusa infashanyo yo gutangura na
  - RGB-yonyene itanguzwa na
  - Ntamfashanyo ikenewe
explanation: |
  Uwo muhora usaba infashanyo zose za Bitcoin ku 2/2 Multisig, hamwe n’infashanyo y’itunga rya RGB kugira ngo umutungo ushire kumuhora umwe.
reviewed: true

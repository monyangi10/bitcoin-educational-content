question: Elements क्या चाहिए एक Lightning चैनल बनाने के लिए जिसमें RGB एसेट्स हों?
answer: बिटकॉइन में फंडिंग और RGB एसेट्स में फंडिंग
wrong_answers:
  - शुरुआत में सिर्फ Bitcoin फंडिंग
  - शुरुआत में सिर्फ RGB के लिए फंडिंग
  - कोई फंडिंग की जरूरत नहीं
explanation: |
  चैनल को 2/2 Multisig पर Bitcoin फंडिंग की जरूरत है, साथ ही उसी चैनल पर एसेट्स आवंटित करने के लिए RGB एसेट फंडिंग भी चाहिए।
reviewed: false
question: Какви елементи са необходими за създаването на канал Lightning, пренасящ активи RGB?
answer: Финансиране в биткойни и финансиране в активи RGB
wrong_answers:
  - Първоначално финансиране само за Bitcoin
  - Първоначално финансиране само по RGB
  - Не се изисква финансиране
explanation: |
  Каналът изисква както финансиране с биткойни на мултисиг 2/2, така и финансиране с активи RGB, за да се разпределят активи в същия канал.
reviewed: false
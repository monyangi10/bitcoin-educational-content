question: ¿Cuál es la función principal de la blockchain en el paradigma de Client-side Validation utilizado por RGB?
answer: Permite el timestamp y evita el doble gasto
wrong_answers:
  - Almacenar todas las transiciones de estado
  - Replicación de datos de los smart contract
  - Garantizar la disponibilidad global de los datos
explanation: |
  La blockchain de Bitcoin se utiliza en RGB para el timestamp de los commitments y evitar el doble gasto, sin almacenar todas las transiciones de estado.
reviewed: false
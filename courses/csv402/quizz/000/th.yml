question: ฟังก์ชันหลักของบล็อกเชนในรูปแบบการตรวจสอบฝั่งไคลเอนต์ที่ใช้โดย RGB คืออะไร?
answer: ให้การประทับเวลาและป้องกันการใช้จ่ายซ้ำ
wrong_answers:
  - จัดเก็บการเปลี่ยนสถานะทั้งหมด
  - การจำลองข้อมูลสัญญาอัจฉริยะ
  - รับประกันความพร้อมใช้งานของข้อมูลทั่วโลก
explanation: |
  บล็อกเชน Bitcoin ถูกใช้ใน RGB เพื่อประทับเวลาให้กับข้อผูกพันและป้องกัน double-spending โดยไม่ต้องจัดเก็บการเปลี่ยนแปลงสถานะทั้งหมด
reviewed: false
question: Каква е основната функция на блокчейн в парадигмата за валидиране от страна на клиента, използвана от RGB?
answer: Осигуряване на времеви печат и предотвратяване на двойно изразходване на средства
wrong_answers:
  - Съхраняване на всички преходи в състояние
  - Репликиране на данни за интелигентни договори
  - Гарантиране на глобална наличност на данни
explanation: |
  Блокчейнът Bitcoin се използва в RGB за поставяне на времеви маркери на ангажиментите и предотвратяване на double-spending, без да се съхраняват всички преходи между състоянията.
reviewed: false
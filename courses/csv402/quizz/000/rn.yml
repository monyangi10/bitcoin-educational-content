question: Ni akahe kamaro nyamukuru ka Blockchain kuruhande rw'ukwemeza rw'umukiriya rukoreshwa na RGB?
answer: Gutanga time stamping (umwanya wo gutera ikidodo) no kwirinda kuriha incuro zibiri
wrong_answers:
  - Kubika uko amahiduka ameze
  - Gusubiramwo amakuru ya Smart contract
  - Kwemeza ko amakuru yose muri rusangi ko ahari
explanation: |
  Blockchain ya Bitcoin ikoreshwa muri RGB kugira ngo ikoreshe time-stamp (amasezerano y’igihe) no kubuza Ukuriha incuro zibiri, ata kubika uko amahinduka ameze.
reviewed: true

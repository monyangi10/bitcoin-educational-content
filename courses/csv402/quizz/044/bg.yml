question: Как се гарантира безопасността на прехода RGB в канал Lightning, ако се излъчва остаряло състояние?
answer: Чрез наказателната механика на канала Lightning
wrong_answers:
  - Чрез автоматично анулиране на всички предишни транзакции
  - Чрез наказателната механика на протокола RGB
  - Чрез намесата на емитента на активи RGB чрез неговия подпис, свързан с Genesis
explanation: |
  Класическият наказателен механизъм на Lightning Network гарантира, че разпространението на старо състояние може да бъде наказано чрез възстановяване на всички участващи средства, включително активите на RGB.
reviewed: false
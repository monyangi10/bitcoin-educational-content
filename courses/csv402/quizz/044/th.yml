question: ความปลอดภัยของการเปลี่ยนผ่าน RGB ในช่องทาง Lightning จะได้รับการรับรองอย่างไรหากมีการเผยแพร่สถานะที่ล้าสมัย?
answer: ผ่านกลไกการลงโทษของช่องสายฟ้า
wrong_answers:
  - โดยการยกเลิกธุรกรรมก่อนหน้าทั้งหมดโดยอัตโนมัติ
  - ผ่านกลไกการลงโทษของโปรโตคอล RGB
  - ผ่านการแทรกแซงของผู้ออกสินทรัพย์ RGB ผ่านลายเซ็นที่เกี่ยวข้องกับ Genesis
explanation: |
  กลไกการลงโทษแบบคลาสสิกของ Lightning Network ช่วยให้มั่นใจได้ว่าการเผยแพร่สภาพเก่าสามารถถูกลงโทษได้โดยการกู้คืนเงินทั้งหมดที่เกี่ยวข้อง รวมถึงสินทรัพย์ของ RGB
reviewed: false
question: RGB ट्रांजिशन की सुरक्षा लाइटनिंग चैनल में कैसे सुनिश्चित की जाती है अगर कोई पुराना स्टेट ब्रॉडकास्ट हो जाए?
answer: बिजली चैनल की सज़ा देने वाली मैकेनिक्स के ज़रिए
wrong_answers:
  - सभी पिछले लेन-देन को अपने आप रद्द करके
  - RGB प्रोटोकॉल की सजा देने वाली व्यवस्था के जरिए
  - RGB एसेट जारीकर्ता के हस्तक्षेप से, Genesis से जुड़े उसके सिग्नेचर के माध्यम से
explanation: |
  जीडब्ल्यू-4 का क्लासिक दंडात्मक मैकेनिज्म यह सुनिश्चित करता है कि किसी पुरानी स्थिति के प्रसार को शामिल सभी फंड्स की वसूली से दंडित किया जा सकता है, जिसमें जीडब्ल्यू-5 एसेट्स भी शामिल हैं।
reviewed: false
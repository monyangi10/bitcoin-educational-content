question: Wie wird die Sicherheit eines RGB-Übergangs in einem Lightning-Kanal gewährleistet, wenn ein veralteter Zustand veröffentlicht wird?
answer: Durch die Bestrafungsmechanismen des Lightning-Kanals
wrong_answers:
  - Durch die automatische Stornierung aller früheren Transaktionen
  - Durch die Bestrafungsmechanismen des RGB-Protokolls
  - Durch das Eingreifen des Emittenten des RGB-Vermögenswertes über seine mit der Genesis verbundene Signatur
explanation: |
  Der klassische Strafmechanismus des Lightning Netwerk stellt sicher, dass die Verbreitung eines alten Zustands durch die Rückforderung aller beteiligten Werte, einschließlich der RGB-Werte, bestraft werden kann.
reviewed: false

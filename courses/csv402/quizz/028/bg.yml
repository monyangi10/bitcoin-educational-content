question: Каква е функцията на Interface в договор RGB?
answer: Направете данните от договора лесни за четене и манипулиране
wrong_answers:
  - Изпълнение на скриптове за валидиране в блокчейна
  - Съхраняване на данни Genesis от страна на клиента
  - Дефиниране на строга система от типове за отчети
explanation: |
  Целта на Interface е да представи информацията за договора по начин, който е ясен за потребителите и софтуера, без да засяга бизнес логиката.

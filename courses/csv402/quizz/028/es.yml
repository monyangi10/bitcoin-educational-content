question: En un contrato RGB, ¿cuál es la función de Interface?
answer: Facilitar la lectura y manipulación de los datos contractuales
wrong_answers:
  - Ejecución de secuencias de comandos de validación en la blockchain
  - Almacenar los datos de Genesis en el lado del cliente
  - Definir un sistema de tipos estricto para los informes
explanation: |
  El objetivo de Interface es presentar la información contractual de forma clara para los usuarios y el software, sin afectar a la lógica de negocio.
reviewed: false
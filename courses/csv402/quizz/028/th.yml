question: ในสัญญา RGB, หน้าที่ของ Interface คืออะไร?
answer: ทำให้ข้อมูลสัญญาอ่านและจัดการได้ง่าย
wrong_answers:
  - เรียกใช้สคริปต์การตรวจสอบบนบล็อกเชน
  - จัดเก็บข้อมูล Genesis ที่ฝั่งลูกค้า
  - กำหนดระบบประเภทที่เข้มงวดสำหรับรายงาน
explanation: |
  วัตถุประสงค์ของ Interface คือการนำเสนอข้อมูลสัญญาในรูปแบบที่ชัดเจนต่อผู้ใช้และซอฟต์แวร์ โดยไม่กระทบต่อหลักการทางธุรกิจ
reviewed: false
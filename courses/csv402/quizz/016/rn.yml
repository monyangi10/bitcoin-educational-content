question: Ni ibihe bintu bibiri nyamukuru vya smart contract nuko RGB imeze ?
answer: Uko bimeze muri rusangi n'uko bimeze
wrong_answers:
  - Ukwiyemeza hamwe n'itanguriro.
  - Insiguro ya Serire n'uko bihinduka.
  - Valency n'amategeko y'amasezerano.
explanation: |
  Uko bimeze muri rusangi harimwo amakuru ya bose, mu gihe ukobimeze birikumwe n'uko ibintu bimeze uburenganzira zifitaniye isano n’abafise uburenganzira bwihariye biciye ku ma UTXO.
reviewed: true

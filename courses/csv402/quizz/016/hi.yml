question: स्मार्ट Contract State में RGB के दो मुख्य कॉम्पोनेंट्स क्या हैं?
answer: जीडब्ल्यू-2 और स्वामित्व वाले राज्य
wrong_answers:
  - जीडब्ल्यू-3 और जीडब्ल्यू-4
  - जीडब्ल्यू-6 और जीडब्ल्यू-5
  - जीडब्ल्यू-8 और जीडब्ल्यू-7
explanation: |
  Global State में सार्वजनिक डेटा होता है, जबकि Owned States UTXOs के जरिए खास धारकों से जुड़े होते हैं।

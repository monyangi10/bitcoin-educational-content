question: Was sind die beiden Hauptbestandteile eines Smart Contract Zustands in RGB?
answer: Global State(s) und Owned State(s)
wrong_answers:
  - Commitment und Genesis
  - Siegeldefinition und Zustandsübergang
  - Valenz und Vertragsrechte
explanation: |
  Der Global State enthält öffentliche Daten, während Owned States über UTXOs mit bestimmten Inhabern verbunden sind.
reviewed: false

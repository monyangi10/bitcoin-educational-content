question: Ni iyihe ntego nyamukuru ya Smart Contract muvya RGB ?
answer: Gushira mu ngiro amasezerano ya Bitcoin yikoresha ata n'ibitabo bifise aho bitwarirwa
wrong_answers:
  - Gufasha mu gukora igitabo ca Bitcoin gifise aho gitwarirwa
  - Gutanga ahakorerwa ibintu kumahanahanwa ya Bitcoin
  - Kworohereza ugushirwa mu ngiro kw’ama token ya ERC-20 kuri Bitcoin.
explanation: |
  Ama Smart Conmtract ya RGB atuma amasezerano akora mu buryo bwikora mu gihe umuntu yirinda gukoresha ibitabo bifise aho bitwarira, vyubakiye kuri Bitcoin ku bijanye n’ibimenyetso vy’ubuhinga bwa none.
reviewed: true

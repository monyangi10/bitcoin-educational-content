question: Was ist der Hauptzweck von Smart Contracts im RGB-Kontext?
answer: Automatisierte Bitcoin-Transaktionen ohne zentrales Register durchführen
wrong_answers:
  - Erleichterung der Einrichtung zentraler Bitcoin-Register
  - Bereitstellung einer öffentlichen Schnittstelle für alle Bitcoin-Transaktionen
  - Vereinfachung der Ausführung von ERC-20-Tokens auf Bitcoin
explanation: |
  Smart RGB-Contract ermöglichen die Automatisierung von Vereinbarungen und Verträgen und vermeiden dabei die Verwendung zentraler Register, wobei sie sich auf Bitcoin als kryptografischen Anker verlassen.
reviewed: false

question: RGB वातावरण में स्मार्ट कॉन्ट्रैक्ट्स का मुख्य उद्देश्य क्या है?
answer: केंद्रीकृत रजिस्ट्री के बिना Bitcoin डील्स को स्वचालित रूप से लागू करें
wrong_answers:
  - केंद्रीकृत Bitcoin रजिस्ट्री बनाने की सुविधा प्रदान करना
  - सभी Bitcoin लेनदेन के लिए एक सार्वजनिक Interface उपलब्ध कराएं
  - Bitcoin पर ERC-20 टोकनों के निष्पादन को सरल बनाना
explanation: |
  जीडब्ल्यू-7 स्मार्ट कॉन्ट्रैक्ट्स समझौतों को स्वचालित करने में सक्षम हैं, जबकि केंद्रीकृत रजिस्टरों के उपयोग से बचते हैं, और क्रिप्टोग्राफिक एंकर के लिए जीडब्ल्यू-6 पर निर्भर करते हैं।
reviewed: false
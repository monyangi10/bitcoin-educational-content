question: Каква е основната цел на интелигентните договори в средата на RGB?
answer: Изпълнение на автоматизирани сделки с Bitcoin без централизиран регистър
wrong_answers:
  - Улесняване на създаването на централизирани регистри на Bitcoin
  - Осигуряване на публичен интерфейс за всички транзакции на Bitcoin
  - Опростяване на изпълнението на токени ERC-20 в Bitcoin
explanation: |
  Интелигентните договори RGB дават възможност за автоматизиране на споразуменията, като се избягва използването на централизирани регистри и се разчита на Bitcoin за криптографски котви.
reviewed: false
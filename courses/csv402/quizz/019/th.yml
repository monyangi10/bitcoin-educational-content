question: วัตถุประสงค์หลักของสัญญาอัจฉริยะในสภาพแวดล้อม RGB คืออะไร?
answer: ดำเนินการข้อตกลง Bitcoin อัตโนมัติโดยไม่ต้องใช้ทะเบียนกลาง
wrong_answers:
  - การอำนวยความสะดวกในการสร้างทะเบียน Bitcoin แบบรวมศูนย์
  - จัดเตรียมอินเทอร์เฟซสาธารณะสำหรับธุรกรรม Bitcoin ทั้งหมด
  - การทำให้การดำเนินการของโทเค็น ERC-20 บน Bitcoin ง่ายขึ้น
explanation: |
  สัญญาอัจฉริยะ RGB ช่วยให้การทำข้อตกลงเป็นไปโดยอัตโนมัติในขณะที่หลีกเลี่ยงการใช้ทะเบียนแบบรวมศูนย์ โดยอาศัย Bitcoin สำหรับจุดยึดทางการเข้ารหัส
reviewed: false
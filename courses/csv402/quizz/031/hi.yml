question: Invoice को RGB ट्रांसफर में क्या कर सकता हूँ?
answer: लेन-देन का प्रकार बताएं, आवश्यक संपत्ति की मात्रा और प्राप्तकर्ता का Seal Definition
wrong_answers:
  - एसेट के लिए एक नया Genesis बनाएं
  - जीडब्ल्यू-5 एक नया जीडब्ल्यू-6 जो एसेट के जीडब्ल्यू-4 को मॉडिफाई करेगा
  - Bitcoin ट्रांजैक्शन की जगह PSBT बनाना
explanation: |
  Invoice का उपयोग लेन-देन के जारीकर्ता को ऑपरेशन के प्रकार, ट्रांसफर किए जाने वाले एसेट्स की मात्रा और गंतव्य (Seal Definition) के बारे में सूचित करने के लिए किया जाता है।
reviewed: false
question: Was kann ich in einer Rechnung bei einer RGB-Übertragung machen?
answer: Die Art der Transaktion, die Menge der benötigten Vermögenswerte und die Siegeldefinition des Empfängers angeben
wrong_answers:
  - Eine neue Genesis für das Asset erstellen
  - Ein neues Schema, um die Geschäftslogik des Assets zu ändern generieren
  - Aufbau einer PSBT, die die Bitcoin-Transaktion ersetzt, festlegen
explanation: |
  Die Rechnung dient dazu, den Aussteller der Transaktion über die Art des Vorgangs, die Menge der zu übertragenden Vermögenswerte und den Bestimmungsort zu informieren (Siegeldefinition).
reviewed: false

question: ฉันสามารถทำอะไรกับใบแจ้งหนี้ในการโอน RGB ได้บ้าง?
answer: ระบุประเภทของธุรกรรม ปริมาณสินทรัพย์ที่ต้องการ และคำจำกัดความของตราประทับของผู้รับ
wrong_answers:
  - สร้าง Genesis ใหม่สำหรับสินทรัพย์
  - สร้าง Schema ใหม่เพื่อแก้ไขตรรกะทางธุรกิจของสินทรัพย์
  - กำลังสร้าง PSBT เพื่อแทนที่ธุรกรรม Bitcoin
explanation: |
  ใบแจ้งหนี้ใช้เพื่อแจ้งให้ผู้ออกทราบเกี่ยวกับธุรกรรมประเภทของการดำเนินการ ปริมาณสินทรัพย์ที่จะโอน และปลายทาง (คำจำกัดความของตราประทับ)
reviewed: false
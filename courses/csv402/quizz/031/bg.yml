question: Какво мога да направя с фактура в трансфер RGB?
answer: Посочете вида на транзакцията, количеството на необходимите активи и определението за печат на получателя
wrong_answers:
  - Създаване на нов Genesis за актива
  - Генериране на нов Schema за промяна на бизнес логиката на актива
  - Изграждане на PSBT за замяна на транзакцията Bitcoin
explanation: |
  Фактурата се използва за информиране на издателя на операцията за вида на операцията, количеството активи, които ще бъдат прехвърлени, и местоназначението (определение за печат).
reviewed: false
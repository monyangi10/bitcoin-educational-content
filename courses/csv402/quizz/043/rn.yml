question: None "RGB State Transition" igereranya iki mu bijanye n'ivyo Lightning Network ivuga?
answer: Iishsasha kumutungo wa RGB vyavuguruwe bishizwe mu bikorwa vy'ukwiyemeza
wrong_answers:
  - Igihugu gishasha ca Multisig 2/2 kuri onchain
  - Ugutanga umutungo wa RGB kwavuguruwe kwashizwe mu bikorwa vy'ugutanga amafaranga
  - Inyandiko yo kwemeza On-Chain yasubiriwe na HTLC.
explanation: |
  Uguhindura kw'uko RGB imeze bushasha ugusangira ivy’ubutunzi bwa RGB mu muyoboro ikoresheje amafaranga y’ubudandaji y'ukwiyemeza.
reviewed: true

question: Какво представлява "преходът в състояние RGB" в контекста на Lightning Network?
answer: Актуализирано разпределение на активите на RGB, интегрирано в транзакциите за поемане на задължения
wrong_answers:
  - Ново състояние на multisig 2/2 onchain
  - Актуализирано разпределение на активите по RGB, интегрирано в транзакцията за финансиране
  - Скриптът за валидиране на веригата е заменен с HTLC
explanation: |
  Преходът в състояние RGB актуализира разпределението на активите RGB в канала, като използва транзакции за поемане на задължения.
reviewed: false
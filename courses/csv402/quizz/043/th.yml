question: "RGB state transition" แทนถึงอะไรในบริบทของ Lightning Network?
answer: อัปเดตการจัดสรรสินทรัพย์ RGB รวมเข้ากับธุรกรรมข้อผูกพันแล้ว
wrong_answers:
  - สถานะใหม่ของ multisig 2/2 บนเชน
  - อัปเดตการจัดสรรสินทรัพย์ RGB รวมเข้ากับธุรกรรมการระดมทุนแล้ว
  - สคริปต์การตรวจสอบบนเชนถูกแทนที่ด้วย HTLC
explanation: |
  การเปลี่ยนสถานะ RGB จะอัปเดตการกระจายสินทรัพย์ RGB ในช่องทางโดยใช้ธุรกรรมการยืนยัน
reviewed: false
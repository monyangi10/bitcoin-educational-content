question: ฟังก์ชันของเซิร์ฟเวอร์พร็อกซี RGB ในสภาพแวดล้อม RGB Lightning Node คืออะไร?
answer: การอำนวยความสะดวกในการแลกเปลี่ยนสินค้าส่ง RGB
wrong_answers:
  - ให้คีย์สาธารณะสำหรับโหนดเพื่อเปิดช่องทาง
  - เก็บประวัติการเปลี่ยนสถานะของ RGB
  - หลีกเลี่ยงสัญลักษณ์ซ้ำสำหรับโทเค็น RGB
explanation: |
  เซิร์ฟเวอร์พร็อกซี่ RGB ช่วยให้การสื่อสารของการส่งสินค้า RGB ระหว่างผู้เข้าร่วม Lightning ง่ายขึ้นโดยทำหน้าที่เป็นตัวกลาง ช่วยให้ประสบการณ์การใช้งานราบรื่นขึ้นใกล้เคียงกับที่ประสบกับ Bitcoin และ Lightning ในปัจจุบัน
reviewed: false
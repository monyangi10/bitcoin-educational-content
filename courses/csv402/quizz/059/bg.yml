question: Каква е функцията на прокси сървъра на RGB в среда на RGB Lightning Node?
answer: Улесняване на обмена на пратки RGB
wrong_answers:
  - Осигуряване на публични ключове за възлите за отваряне на канали
  - Запазване на историята на преходите в състояние на RGB
  - Избягване на дублиращи се тикери за жетони RGB
explanation: |
  Прокси сървърът на RGB опростява комуникацията на пратките RGB между участниците в Lightning, като действа като посредник, позволявайки по-гладко потребителско преживяване, близко до това, което понастоящем се наблюдава при Bitcoin и Lightning.
reviewed: false
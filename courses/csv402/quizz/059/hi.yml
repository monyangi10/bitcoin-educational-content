question: RGB प्रॉक्सी सर्वर का क्या काम है RGB लाइटनिंग नोड के माहौल में?
answer: जीडब्ल्यू-1 या जीडब्ल्यू-2 के कंसाइनमेंट्स की फैसिलिटेशन करना
wrong_answers:
  - नोड्स के लिए पब्लिक कीज़ दें ताकि चैनल खोले जा सकें
  - RGB की स्टेट ट्रांजिशन का इतिहास रखें
  - RGB टोकन के लिए डुप्लीकेट टिकर से बचें
explanation: |
  RGB प्रॉक्सी सर्वर RGB कंसाइनमेंट्स के कम्युनिकेशन को सरल बनाता है, जो लाइटनिंग पार्टिसिपेंट्स के बीच एक मध्यस्थ की तरह काम करता है। इससे यूजर एक्सपीरियंस और स्मूथ हो जाता है, जो वर्तमान में Bitcoin और लाइटनिंग के साथ अनुभव किए जाने वाले एक्सपीरियंस के करीब है।

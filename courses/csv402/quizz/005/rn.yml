question: Ni ubuhe buryo bukoreshwa muri uburyo RGB kugira ngo umuntu asigure Serire ikoreshwa rimwe ?
answer:   Ahasohokera harekanywe neza
wrong_answers:
  - Urufunguzo rwa bose rwerekanywe neza
  - Aderesi ya Bitcoin yerekanywe neza.
  - Ihurizwa hamwe ry'ama UTXO menshi .
explanation: |
  RGB isigura Serire ikoreshwa rimwe nk'inzira yugusohoka yihariye, ishobora rero kwugarwa n’amahera akoreshwa muri iyo nzira (txid + igitigiri c'izisohoka).
reviewed: true

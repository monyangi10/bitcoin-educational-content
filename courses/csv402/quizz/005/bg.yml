question: Какъв метод се използва в RGB за определяне на уплътнение за еднократна употреба?
answer: Конкретна изходна точка
wrong_answers:
  - Конкретен публичен ключ
  - Конкретен адрес Bitcoin
  - Комбинация от няколко UTXOs
explanation: |
  RGB дефинира пломба за еднократна употреба като специфична точка на изхода, която може да бъде затворена чрез разхода на тази точка на изхода (TXID + номер на изхода).
reviewed: false
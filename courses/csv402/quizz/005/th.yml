question: วิธีใดที่ใช้ใน RGB เพื่อกำหนดซีลแบบใช้ครั้งเดียว?
answer: จุดบกพร่องเฉพาะ
wrong_answers:
  - คีย์สาธารณะเฉพาะเจาะจง
  - ที่อยู่ Bitcoin เฉพาะเจาะจง
  - การรวมกันของหลาย UTXO
explanation: |
  RGB กำหนดซีลแบบใช้ครั้งเดียวเป็นจุดออกเฉพาะ ซึ่งสามารถปิดได้โดยการใช้จ่ายจุดออกนี้ (TXID + หมายเลขเอาต์พุต)
reviewed: false
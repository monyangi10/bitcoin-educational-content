question: RGB में Single-Use Seal को परिभाषित करने के लिए कौन सी विधि इस्तेमाल की जाती है?
answer: एक खास आउटपॉइंट
wrong_answers:
  - एक खास सार्वजनिक कुंजी
  - एक विशिष्ट जीडब्ल्यू-3 जीडब्ल्यू-2
  - कई UTXOs का मेल
explanation: |
  जीडब्ल्यू-6, जीडब्ल्यू-4 को एक खास आउटपॉइंट के तौर पर परिभाषित करता है, जिसे इस आउटपॉइंट (जीडब्ल्यू-5 + आउटपुट नंबर) के खर्च से बंद किया जा सकता है।
reviewed: false
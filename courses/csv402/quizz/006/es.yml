question: En RGB, ¿dónde está el commitment cuando se cierra un Single-use Seal?
answer: En el output de la transacción que gasta el outpoint
wrong_answers:
  - En el input de la transacción gastando el outpoint
  - En el scriptSig de la transacción que gasta el outpoint
  - En el Witness de la transacción que pasa el outpoint
explanation: |
  El commitment se inserta en el output de la transacción que gasta el outpoint que define el Single-use Seal.
reviewed: false
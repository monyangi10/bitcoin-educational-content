question: В RGB къде е ангажиментът, когато се затваря пломбата за еднократна употреба?
answer: В изхода на транзакцията се изразходва изходната точка
wrong_answers:
  - На входа на транзакцията се изразходва изходната точка
  - В scriptSig на транзакцията, която изразходва изходната точка
  - В Свидетел на транзакцията, която изразходва изходната точка
explanation: |
  Ангажиментът се вмъква в изхода на транзакцията, която изразходва изходната точка, определяща печата за еднократна употреба.

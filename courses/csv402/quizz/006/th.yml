question: ใน RGB ความมุ่งมั่นอยู่ที่ใดเมื่อซีลแบบใช้ครั้งเดียวถูกปิด?
answer: ในผลลัพธ์ของการทำธุรกรรมที่ใช้จ่าย outpoint
wrong_answers:
  - ในการป้อนข้อมูลของการทำธุรกรรมที่ใช้จุดออก
  - ใน scriptSig ของธุรกรรมที่ใช้จ่าย outpoint
  - ในพยานของการทำธุรกรรมที่ใช้จ่าย outpoint
explanation: |
  คำมั่นสัญญาถูกแทรกเข้าไปในผลลัพธ์ของธุรกรรมที่ใช้จ่ายจุดออกซึ่งกำหนดตราประทับใช้ครั้งเดียว
reviewed: false
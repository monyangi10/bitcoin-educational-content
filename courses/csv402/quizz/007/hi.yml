question: RGB अपनी दिखाई देने वाली मौजूदगी को कैसे कम करता है?
answer: जीडब्ल्यू-1 (तापरेट)
wrong_answers:
  - जीडब्ल्यू-2 (ओप्रेट)
  - सिग ट्वीक
  - मुख्य बदलाव
explanation: |
  जीडब्ल्यू-3 (तापरेट) लेन-देन में प्रतिबद्धताओं को चुपचाप और कुशलता से जोड़ने की सुविधा देता है, साथ ही मौजूदा मानकों के साथ संगतता सुनिश्चित करता है।
reviewed: false
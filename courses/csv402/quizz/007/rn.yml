question: Ni gute RGB igabanya ukuntu iboneka?
answer: Taproot (Tapret)
wrong_answers:
  - OP_RETURN (Opret)
  - Sig tweak
  - Key tweak
explanation: |
  Taproot (Tapret) ituma ukwiyemeza gushobora gushirwa mw'ihanahanwa mw'ibanga kandi muburyo bubereye, mu gihe nyene ishobora guhuza n’ingingo mfatirwako ziriho ubu.
reviewed: true

question: Ni gute RGB igabanya ukuntu iboneka?
answer: Taproot (Igitabu)
wrong_answers:
  - OP_RETURN (Guhindura)
  - Sig guhindura
  - Guhindura urufunguzo
explanation: |
  Taproot (Tapret) ishoboza ko amasezerano yinjizwa mu gucuruza mu buryo buteye ubwoba kandi bubereye, mu gihe nyene ishobora guhuza n’ingingo mfatirwako ziriho ubu.

question: Wie minimert RGB seine Sichtbarkeit?
answer: Taproot (Tapret)
wrong_answers:
  - OP_RETURN (Opret)
  - Sig-Tweak
  - Key-Tweak
explanation: |
  Taproot (Tapret) ermöglicht es, Commitments diskret und effizient in eine Transaktion einzufügen, wobei die Kompatibilität mit den aktuellen Standards gewährleistet ist.

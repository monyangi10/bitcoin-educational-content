question: В случай на плащане в рамките на канала RGB, какво се случва с изходите на RGB в транзакциите за поемане на задължения?
answer: Те се актуализират, за да отразят преразпределението на активите между участниците
wrong_answers:
  - Те остават непроменени, за да се запази първоначалната история до затварянето на канала
  - Те се отстраняват и се заменят с нови multi-sig
  - Те са преобразувани в класически Bitcoin UTXOs
explanation: |
  Когато се извърши плащане, преходът към състояние на RGB коригира изходите на RGB, за да се преразпределят активите в съответствие с новия баланс на канала.
reviewed: false
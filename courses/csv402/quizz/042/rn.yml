question: Iyo habayeho ukwishyura mu muhora wa RGB, bigenda gute ku biva muri RGB mu bikorwa vya Commitment?
answer: Bihindurwa kugira ngo vyerekane ukuntu ivy'ubutunzi bisubira gusangira mu bari muri iyo nama .
wrong_answers:
  - Biguma bitahindutse kugira ngo bizigame amateka y’intango gushika umuyoboro ufunze .
  - Bica bikurwaho, bisubirizwa n’ibindi bishasha bita multi-sig.
  - Bihindurwa bikaba UTXO za kera za Bitcoin .
explanation: |
  Iyo umuntu yishuye, RGB State Transition iratunganya ibisohoka vya RGB kugira ngo isubire gusangira ivy’ubutunzi hakurikijwe umubare mushasha w’imirongo.

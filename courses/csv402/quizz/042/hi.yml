question: अगर RGB चैनल में भुगतान किया जाता है, तो Commitment लेन-देन में RGB के आउटपुट का क्या होता है?
answer: वे प्रतिभागियों के बीच संपत्ति के पुनर्वितरण को दर्शाने के लिए अपडेट किए गए हैं।
wrong_answers:
  - वे चैनल बंद होने तक शुरुआती इतिहास को बनाए रखने के लिए अपरिवर्तित रहते हैं
  - उन्हें हटा दिया जाता है और नए multi-sig से बदल दिया जाता है।
  - वो क्लासिक Bitcoin UTXOs में बदल दिए जाते हैं
explanation: |
  जब भुगतान किया जाता है, तो RGB State Transition RGB के आउटपुट को एडजस्ट करता है ताकि नए चैनल बैलेंस के अनुसार संपत्ति को फिर से बांटा जा सके।
reviewed: false
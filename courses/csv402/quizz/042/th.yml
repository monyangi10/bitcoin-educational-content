question: ในกรณีที่มีการชำระเงินภายในช่องทาง RGB จะเกิดอะไรขึ้นกับผลลัพธ์ RGB ในธุรกรรมการผูกพัน?
answer: พวกเขาได้รับการอัปเดตเพื่อสะท้อนถึงการกระจายสินทรัพย์ใหม่ในหมู่ผู้เข้าร่วม
wrong_answers:
  - พวกเขายังคงไม่เปลี่ยนแปลงเพื่อรักษาประวัติเริ่มต้นจนกว่าช่องจะปิด
  - พวกเขาถูกลบออกและแทนที่ด้วย multi-sig ใหม่
  - พวกเขาถูกแปลงเป็น Bitcoin UTXOs แบบคลาสสิก
explanation: |
  เมื่อมีการชำระเงิน การเปลี่ยนสถานะ RGB จะปรับเอาต์พุต RGB เพื่อกระจายสินทรัพย์ใหม่ตามยอดคงเหลือของช่องทางใหม่
reviewed: false
question: Ni itegeko irihe rirungika Amasezerano kuva kuri Stash ikaja muri dosiye yo hanze?
answer: RGB yohereza hanze '<Id y'amasezerano>' myContractPBN.rgb.
wrong_answers:
  - Guteresharija RGB '<Id y'amasezerano>' amasezerano yanjePBN.RGB.
  - Dump ya RGB '<Id y'amasezerano>' amasezerano myContractPBN.rgb.
  - Ikibazo ca RGB '<Id y'amasezerano>' amasezerano myContractPBN.rgb
explanation: |
  Itegeko rya "RGB export" rikoreshwa mu gukura Amasezerano muri Stash ukayibika nk'idosiye kugira ngo uyisangire vyoroshe.
reviewed: true

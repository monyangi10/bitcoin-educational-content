question: कौन सा कमांड Contract को Stash से एक बाहरी फाइल में एक्सपोर्ट करता है?
answer: जीडब्ल्यू-2 एक्सपोर्ट '<ContractId>' मायकॉन्ट्रैक्टपीबीएन.जीडब्ल्यू-2
wrong_answers:
  - जीडब्ल्यू-3 डाउनलोड करें '<ContractId>' मेरा कॉन्ट्रैक्टPBN.जीडब्ल्यू-3
  - जीडब्ल्यू-4 डंप '<ContractId>' मेरा कॉन्ट्रैक्टपीबीएन.जीडब्ल्यू-4
  - जीडब्ल्यू-5 समस्या '<ContractId>' मेरा कॉन्ट्रैक्टपीबीएन.जीडब्ल्यू-5
explanation: |
  "RGB एक्सपोर्ट" कमांड का इस्तेमाल Stash से Contract निकालने और इसे आसान शेयरिंग के लिए फाइल के रूप में सेव करने के लिए किया जाता है।
reviewed: false
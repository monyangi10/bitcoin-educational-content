question: Welcher Befehl exportiert einen Vertrag aus dem Stash in eine externe Datei?
answer: rgb export '<ContractId>' myContractPBN.rgb
wrong_answers:
  - rgb download '<ContractId>' myContractPBN.rgb
  - rgb dump '<ContractId>' myContractPBN.rgb
  - rgb issue '<ContractId>' myContractPBN.rgb
explanation: |
  Der Befehl "rgb export" wird verwendet, um einen Vertrag aus dem Stash zu extrahieren und als Datei zu speichern, damit er leicht weitergegeben werden kann.
reviewed: false

question: Какво представлява валидирането от страна на клиента в протокола RGB?
answer: Местна проверка на данните за договорите и преходите
wrong_answers:
  - Изпълнение на интелигентни договори директно върху блокчейна Bitcoin
  - Изключително използване на централизирани възли за валидиране на транзакциите
  - Автоматично нулиране на историите на договорите в случай на несъответствия
explanation: |
  Валидирането от страна на клиента позволява на всеки участник да провери независимо дали получените данни отговарят на правилата, определени в договора RGB.
reviewed: false
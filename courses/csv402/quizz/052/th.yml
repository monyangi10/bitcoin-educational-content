question: การตรวจสอบความถูกต้องฝั่งไคลเอนต์ในโปรโตคอล RGB คืออะไร?
answer: การตรวจสอบข้อมูลสัญญาและการเปลี่ยนแปลงในท้องถิ่น
wrong_answers:
  - การดำเนินการสมาร์ทคอนแทรคโดยตรงบนบล็อกเชน Bitcoin
  - การใช้โหนดศูนย์กลางเพื่อยืนยันธุรกรรมโดยเฉพาะ
  - การรีเซ็ตอัตโนมัติของประวัติสัญญาในกรณีที่มีความคลาดเคลื่อน
explanation: |
  การตรวจสอบความถูกต้องฝั่งไคลเอนต์ช่วยให้ผู้เข้าร่วมแต่ละคนสามารถตรวจสอบได้อย่างอิสระว่าข้อมูลที่ได้รับเป็นไปตามกฎที่กำหนดโดยสัญญา RGB
reviewed: false
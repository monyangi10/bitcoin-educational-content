question: Как се използват криптографските ангажименти (чрез Taproot или OP_RETURN) в RGB?
answer: Те закрепват преходите между състоянията в блокчейна
wrong_answers:
  - Те съхраняват данни за договора в блокчейна
  - Те заменят валидирането от страна на клиента с изпълнение на интелигентни договори on-chain
  - Те създават възли за проверка на транзакциите
explanation: |
  Ангажиментите позволяват актуализациите на състоянието да бъдат сигурно свързани с UTXO, за да се докаже съществуването на определена информация в даден момент, без да се разкрива самата информация.
reviewed: false
question: Ni gute amasezerano y’ubuhinga bwa none (biciye kuri Taproot canke OP_RETURN) akoreshwa muri RGB?
answer: Ashiramwo uko bihinduka muri Blockchain.
wrong_answers:
  - Babika amakuru y'amasezerano kuri Blockchain.
  - Basubiriza Ukwiyemeza kuruhande rw'umukiriya nigukuraho Smart Contract ya On-Chain .
  - Bakora uturongo two gusuzuma amahanahanwa
explanation: |
  Ukwiyemeza gutuma ukwiyemeza gushirwa kumwanya y’ivy’ubuzima ashobora guhuzwa neza na UTXO, kugira ngo yerekane ko hariho amakuru kanaka mu gihe kinaka, ata makuru ubwayo ahishuriwe.
reviewed: true

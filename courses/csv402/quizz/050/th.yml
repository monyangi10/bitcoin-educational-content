question: การใช้คำมั่นทางการเข้ารหัส (ผ่าน Taproot หรือ OP_RETURN) ใน RGB เป็นอย่างไร?
answer: พวกเขายึดการเปลี่ยนสถานะในบล็อกเชน
wrong_answers:
  - พวกเขาเก็บข้อมูลสัญญาไว้บนบล็อกเชน
  - พวกเขาแทนที่การตรวจสอบฝั่งไคลเอ็นต์ด้วยการดำเนินการสัญญาอัจฉริยะ on-chain
  - พวกเขาสร้างโหนดสำหรับการตรวจสอบธุรกรรม
explanation: |
  คำมั่นสัญญาช่วยให้การอัปเดตสถานะสามารถเชื่อมโยงกับ UTXO ได้อย่างปลอดภัย เพื่อพิสูจน์การมีอยู่ของข้อมูลบางอย่างในเวลาที่กำหนด โดยไม่เปิดเผยข้อมูลนั้นเอง
reviewed: false
question: Каква технология може да се използва за обединяване на различни версии на скривалището в случай на несъответствие?
answer: CRDT
wrong_answers:
  - HTLC
  - Уплътнение за еднократна употреба
  - Репликация на базата на дневник
explanation: |
  CRDT осигуряват съгласуваност на данните, като позволяват сливането на няколко версии на хранилището без конфликти от страна на клиента.
reviewed: false
question: Stash के अलग-अलग वर्जन में अंतर होने पर उन्हें मर्ज करने के लिए कौन सी टेक्नोलॉजी इस्तेमाल की जा सकती है?
answer: सीआरडीटी (CRDT)
wrong_answers:
  - जी डब्ल्यू-1
  - जीडब्ल्यू-2
  - लॉग-आधारित प्रतिकृति
explanation: |
  CRDTs डेटा की स्थिरता सुनिश्चित करते हैं, जिससे Stash के कई वर्जन को क्लाइंट-साइड कॉन्फ्लिक्ट के बिना मर्ज किया जा सकता है।
reviewed: false
question: เทคโนโลยีใดที่สามารถใช้รวมเวอร์ชันต่าง ๆ ของสแตชในกรณีที่มีความคลาดเคลื่อน?
answer: CRDT
wrong_answers:
  - HTLC
  - ซีลใช้ครั้งเดียว
  - การจำลองแบบโดยใช้บันทึก
explanation: |
  CRDTs ช่วยให้ข้อมูลมีความสอดคล้องกันโดยการอนุญาตให้รวมหลายเวอร์ชันของสแตชเข้าด้วยกันโดยไม่มีความขัดแย้งที่ฝั่งไคลเอนต์
reviewed: false
question: Какви операции определят развитието на интелигентния договор в RGB?
answer: State Transition, Genesis и State Extension
wrong_answers:
  - Създаване на Seal, спазване на Contract и окончателно валидиране
  - UTXO Прехвърляне, генериране на доказателства и Hash Commitment
  - Преходни пакети, пломби за еднократна употреба и създаване на Valency
explanation: |
  Тези операции създават или променят състоянието на договора, като същевременно гарантират неговата валидност чрез котви Bitcoin.

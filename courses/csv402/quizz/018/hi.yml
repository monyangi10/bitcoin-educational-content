question: Smart contract से RGB में बदलाव के लिए कौन-से ऑपरेशन्स ज़रूरी होते हैं?
answer: जीडब्ल्यू-2, जीडब्ल्यू-4, और जीडब्ल्यू-3
wrong_answers:
  - जीडब्ल्यू-6 सृजन, जीडब्ल्यू-5 पालन, और अंतिम मान्यकरण
  - जीडब्ल्यू-9 ट्रांसफर, प्रूफ जनरेशन, और जीडब्ल्यू-8 जीडब्ल्यू-7
  - ट्रांज़िशन बंडल्स, सिंगल-यूज़ सील्स, और जीडब्ल्यू-10 क्रिएशन
explanation: |
  ये ऑपरेशन Contract की स्थिति को बनाते या बदलते हैं, और Bitcoin के एंकर्स के जरिए इसकी वैधता की गारंटी देते हैं।
reviewed: false
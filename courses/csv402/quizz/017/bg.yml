question: Каква структура гарантира времевата последователност на преходите в RGB?
answer: A DAG (Directed Acyclic Graph)
wrong_answers:
  - Проста линейна верига
  - Динамична мрежа от типа peer-to-peer
  - Двоично дърво за UTXOs
explanation: |
  DAG дава възможност за структуриране на преходите между състоянията, като в същото време позволява паралелни еволюции без несъответствия.
reviewed: false
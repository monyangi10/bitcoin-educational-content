question: Ni uwuhe mubumbe wemeza ko amahinduka agenda neza mu gihe c’igihe muri RGB?
answer: A DAG (Directed Acyclic Graph)
wrong_answers:
  - Umugozi usanzwe ugororotse
  - Urubuga rwubakiye kubantu babiri
  - Igiti c'amashami abiri y'ama UTXO
explanation: |
  DAG ifasha uko ibintu bihinduka gutunganirizwa, mu gihe yemera uguhinduka guhuye ata guhuza.
reviewed: true

question: RGB में ट्रांजिशन की टेम्पोरल कंसिस्टेंसी को कौन-सी स्ट्रक्चर गारंटी देता है?
answer: एक डीएजी (जीडब्ल्यू-1)
wrong_answers:
  - एक साधारण रैखिक श्रृंखला
  - एक जोशीला पीयर-टू-पीयर नेटवर्क
  - यूटीएक्सओ के लिए एक बाइनरी ट्री
explanation: |
  एक DAG स्टेट ट्रांजिशन को स्ट्रक्चर करने में मदद करता है, साथ ही बिना किसी असंगति के समानांतर विकास की अनुमति देता है।
reviewed: false
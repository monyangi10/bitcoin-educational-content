question: โครงสร้างใดที่รับประกันความสอดคล้องเชิงเวลาในการเปลี่ยนผ่านใน RGB?
answer: กราฟแบบมีทิศทาง (Directed Acyclic Graph)
wrong_answers:
  - โซ่เชิงเส้นแบบง่าย
  - เครือข่ายแบบเพียร์ทูเพียร์ที่มีความไดนามิก
  - ต้นไม้ทวิภาคสำหรับ UTXOs
explanation: |
  DAG ช่วยให้การเปลี่ยนแปลงสถานะมีโครงสร้าง ในขณะที่อนุญาตให้มีการพัฒนาแบบขนานโดยไม่มีความไม่สอดคล้องกัน
reviewed: false
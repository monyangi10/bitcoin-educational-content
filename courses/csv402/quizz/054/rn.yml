question: RGBlib ni iki mubigize RGB?
answer: Ububiko bw'ibitabo bwo gukora porogaramu zicungera umutungo wa RGB
wrong_answers:
  - Ingodo yokuri Android yihariye gucunga umutungo wa RGB
  - Ubundi buryo bw'umukiriya w'amasezerano ya RGB
  - Urubuga rwo kwerekana RGB NFTs
explanation: |
  RGBlib itanga Hakorerwa ibintu horoshe kubadevelopa, ibashoboza gucunga ivyerekeye ugusohora, ukwimurira no kwemeza ivy’itunga rya RGB ataco bakeneye kumenya neza ibintu vyose vy’ubuhinga.
reviewed: true

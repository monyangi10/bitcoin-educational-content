question: RGBlib ni iki mu bidukikije vya RGB?
answer: Ububiko bw'ibitabo bwo gukora porogaramu zicungera itunga rya RGB
wrong_answers:
  - Android Wallet yihariye gucunga umutungo wa RGB
  - Ubundi buryo bw'umukiriya w'amasezerano ya RGB
  - Urubuga rwo kwerekana RGB NFTs
explanation: |
  RGBlib itanga Interface yoroshe ku bategura, ibashoboza gucunga ivyerekeye ugusohora, ukwimurira no kwemeza ivy’itunga rya RGB ataco bakeneye kumenya neza ibintu vyose vy’ubuhinga.

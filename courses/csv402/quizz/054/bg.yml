question: Какво представлява RGBlib в екосистемата RGB?
answer: Библиотека за създаване на приложения, управляващи активи на RGB
wrong_answers:
  - wallet с Android, посветен на управлението на активите на RGB
  - Алтернативен клиент за протокола RGB
  - Уебсайт за показване на RGB NFTs
explanation: |
  RGBlib предлага опростен интерфейс за разработчиците, който им позволява да управляват емитирането, прехвърлянето и валидирането на активи RGB, без да се налага да владеят всички технически подробности.
reviewed: false
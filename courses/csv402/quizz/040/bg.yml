question: Каква е основната цел на интегрирането на RGB в Lightning Network?
answer: Прехвърляне на активи RGB по каналите на off-chain
wrong_answers:
  - Изпълнение на договори RGB директно върху блокчейна Bitcoin
  - Заменете конвенционалните транзакции Lightning с интелигентни договори RGB
  - Увеличаване на капацитета на канала чрез добавяне на нови UTXOs
explanation: |
  RGB, интегриран в Lightning Network, позволява активите на RGB да бъдат премествани чрез преходи между състоянията, вградени в транзакциите за поемане на задължения, като същевременно остават off-chain.
reviewed: false
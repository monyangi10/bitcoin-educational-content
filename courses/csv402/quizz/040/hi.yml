question: RGB को Lightning Network में शामिल करने का मुख्य उद्देश्य क्या है?
answer: RGB के एसेट्स को off-chain चैनल्स के जरिए ट्रांसफर करो
wrong_answers:
  - RGB के कॉन्ट्रैक्ट्स को सीधे Bitcoin या Blockchain पर एक्जीक्यूट करना
  - पारंपरिक लाइटनिंग लेनदेन की जगह RGB स्मार्ट कॉन्ट्रैक्ट्स का इस्तेमाल करें
  - चैनल की क्षमता बढ़ाने के लिए नए UTXO जोड़ें
explanation: |
  RGB को Lightning Network में इंटीग्रेट करने से RGB की संपत्तियों को Commitment ट्रांजैक्शन्स में एम्बेडेड स्टेट ट्रांजीशन्स के जरिए मूव किया जा सकता है, जबकि वे off-chain ही बनी रहती हैं।
reviewed: false
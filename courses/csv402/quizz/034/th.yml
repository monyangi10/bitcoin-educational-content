question: Bob (ผู้รับ) ดำเนินการอย่างไรเมื่อได้รับสินค้าปลายทางจาก Alice (ผู้จ่าย)?
answer: ตรวจสอบความถูกต้องของ State Transition และลงนาม
wrong_answers:
  - แก้ไข Contract Schema และส่งไปที่ Alice
  - สร้างใบแจ้งหนี้สำหรับการดำเนินการใหม่
  - ลงนาม Alice's PSBT และแจกจ่ายบนเชน
explanation: |
  Bob ตรวจสอบสินค้าที่ส่งมาให้แน่ใจว่าการเปลี่ยนแปลงเป็นไปตามกฎระเบียบและลงนามเพื่อยืนยันการตกลงของเขา
reviewed: false
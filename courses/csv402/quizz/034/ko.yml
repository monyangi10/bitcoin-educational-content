question: Bob(수신자)가 Alice(지급자)로부터 Terminal Consignment을 받으면 어떤 작업을 수행하나요?
answer: State Transition의 유효성 확인 및 서명
wrong_answers:
  - Contract Schema를 수정하여 Alice으로 전송합니다
  - 새 작업을 위한 Invoice 생성
  - Alice의 PSBT 서명 및 온체인 배포
explanation: |
  Bob은 Consignment을 검토하고 전환이 규칙을 준수하는지 확인한 후 동의 여부를 확인하기 위해 서명합니다.

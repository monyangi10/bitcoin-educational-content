question: एक बार जब बॉब (रिसीवर) को ऐलिस (पेयर) से Terminal Consignment मिल जाता है, तो वह क्या कार्रवाई करता है?
answer: State Transition की वैधता जांचें और हस्ताक्षर करें
wrong_answers:
  - Contract और Schema को संशोधित करें और ऐलिस को भेज दें
  - नए ऑपरेशन के लिए एक Invoice बनाएं
  - ऐलिस का PSBT साइन करो और उसे ऑनचेन डिस्ट्रीब्यूट कर दो
explanation: |
  बॉब Consignment की जाँच करता है, यह सुनिश्चित करता है कि परिवर्तन नियमों का पालन करता है, और अपनी सहमति की पुष्टि करने के लिए हस्ताक्षर कर देता है।
reviewed: false
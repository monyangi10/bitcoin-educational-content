question: Какво действие извършва Bob (получател), след като получи крайната пратка от Alice (платец)?
answer: Проверка на валидността на State Transition и подписване
wrong_answers:
  - Модифицирайте Contract Schema и го изпратете на Alice
  - Създаване на фактура за нова операция
  - Подпишете Alice's PSBT и го разпространявайте във веригата
explanation: |
  Bob проверява пратката, уверява се, че преходът е в съответствие с правилата, и се подписва, за да потвърди съгласието си.

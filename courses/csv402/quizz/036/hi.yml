question: Stash की भूमिका क्या है?
answer: ग्राहक-साइड का सारा डेटा स्थानीय रूप से रखो
wrong_answers:
  - Blockchain पर लेन-देन को अपने आप पब्लिश करें
  - सभी जेनरेट किए गए इनवॉइस को कंपाइल करके स्टोर कर दो
  - Bitcoin प्राइवेट कीज़ का प्रबंधन
explanation: |
  Stash वह क्लाइंट-साइड डेटा का सेट है जिसे एक यूज़र एक या एक से अधिक RGB कॉन्ट्रैक्ट्स के लिए लोकली स्टोर करता है, ताकि वह Client-side Validation परफॉर्म कर सके।

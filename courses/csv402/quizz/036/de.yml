question: Welche Rolle spielt der Stash?
answer: Alle client-side Daten lokal speichern
wrong_answers:
  - Automatisches Veröffentlichen von Transaktionen auf der Blockchain
  - Zusammenstellung und Speicherung aller erstellten Rechnungen
  - Verwaltung privater Bitcoin-Schlüssel
explanation: |
  Der Stash ist die Menge der client-side Daten, die ein Benutzer lokal für einen oder mehrere RGB-Verträge speichert, um eine client-side Validierung durchzuführen.
reviewed: false

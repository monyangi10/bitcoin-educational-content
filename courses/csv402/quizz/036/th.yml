question: บทบาทของการซ่อนคืออะไร?
answer: เก็บข้อมูลฝั่งไคลเอ็นต์ทั้งหมดไว้ในเครื่อง
wrong_answers:
  - เผยแพร่ธุรกรรมบนบล็อกเชนโดยอัตโนมัติ
  - รวบรวมและจัดเก็บใบแจ้งหนี้ที่สร้างขึ้นทั้งหมด
  - การจัดการคีย์ส่วนตัว Bitcoin
explanation: |
  ที่เก็บข้อมูลคือชุดของข้อมูลฝั่งไคลเอ็นต์ที่ผู้ใช้จัดเก็บไว้ในเครื่องสำหรับสัญญา RGB หนึ่งหรือมากกว่า เพื่อดำเนินการตรวจสอบความถูกต้องฝั่งไคลเอ็นต์

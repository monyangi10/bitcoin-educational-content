question: ¿Cuál es la función de stash?
answer: Mantener todos los datos del cliente localmente
wrong_answers:
  - Publicar automáticamente las transacciones en la blockchain
  - Compilar y almacenar todas los invoices generadas
  - Gestión de claves privadas Bitcoin
explanation: |
  El stash es el conjunto de datos del lado del cliente que un usuario almacena localmente para uno o más contratos RGB, con el fin de realizar la client-side validation.

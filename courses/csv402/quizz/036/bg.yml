question: Каква е ролята на скривалището?
answer: Съхранявайте всички данни от страна на клиента локално
wrong_answers:
  - Автоматично публикуване на транзакции в блокчейна
  - Събиране и съхраняване на всички генерирани фактури
  - Управление на частни ключове Bitcoin
explanation: |
  Пазарът е наборът от данни от страна на клиента, които потребителят съхранява локално за един или повече договори RGB, за да извършва валидиране от страна на клиента.

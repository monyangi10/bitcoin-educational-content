question: Ni gute RGB itera imbere mu gutera imbere ugereranije na Blockchain ya kera?
answer: Mu kugabanya ububiko n'ukwemeza ku mpinduka za leta zijanye n'ivyo gusa
wrong_answers:
  - Mu kwongera hafi ubunini bw’amabuye ya Bitcoin .
  - Mu guhuza Contract yose ataco ihinduye n’ama UTXO yose
  - Mu gushiramwo amakuru ya Contract ku maserukira makeyi yo hagati
explanation: |
  RGB igabanya ibisabwa vyo kubika no kwemeza mu kugumya gusa amakuru yerekeye uwuriko aragira uruhara wese.

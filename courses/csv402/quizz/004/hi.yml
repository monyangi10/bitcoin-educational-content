question: RGB, Blockchain की तुलना में स्केलेबिलिटी को कैसे बेहतर बनाता है?
answer: केवल ज़रूरी स्टेट ट्रांज़िशन्स तक स्टोरेज और वैलिडेशन को सीमित करके
wrong_answers:
  - Bitcoin ब्लॉक्स का आकार वर्चुअली बढ़ाकर
  - हर Contract को सीधे सभी UTXOs से जोड़कर
  - Contract डेटा को कुछ केंद्रीय सर्वर पर केंद्रित करके
explanation: |
  RGB हर भागीदार से जुड़े डेटा को ही रखकर स्टोरेज और वैलिडेशन की जरूरतों को कम कर देता है।

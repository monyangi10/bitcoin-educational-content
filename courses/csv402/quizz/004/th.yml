question: RGB ปรับปรุงความสามารถในการขยายตัวเมื่อเทียบกับบล็อกเชนแบบดั้งเดิมอย่างไร?
answer: โดยจำกัดการจัดเก็บและการตรวจสอบให้เฉพาะการเปลี่ยนสถานะที่เกี่ยวข้องเท่านั้น
wrong_answers:
  - โดยการเพิ่มขนาดของบล็อก Bitcoin ในทางเสมือนจริง
  - โดยการเชื่อมโยงแต่ละสัญญาโดยตรงกับ UTXO ทั้งหมด
  - โดยการรวมศูนย์ข้อมูลสัญญาไว้บนเซิร์ฟเวอร์กลางไม่กี่เครื่อง
explanation: |
  RGB ลดความต้องการในการจัดเก็บและการตรวจสอบโดยการเก็บรักษาเฉพาะข้อมูลที่เกี่ยวข้องกับผู้เข้าร่วมแต่ละรายเท่านั้น
reviewed: false
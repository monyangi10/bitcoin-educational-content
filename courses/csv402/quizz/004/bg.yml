question: Как RGB подобрява мащабируемостта в сравнение с традиционния блокчейн?
answer: Чрез ограничаване на съхранението и валидирането само до съответните преходи в състояние
wrong_answers:
  - Чрез практическо увеличаване на размера на блоковете Bitcoin
  - Чрез директно свързване на всеки договор с всички UTXOs
  - Чрез централизиране на данните за договорите на няколко централни сървъра
explanation: |
  RGB намалява изискванията за съхранение и валидиране, като запазва само данните, свързани с всеки участник.

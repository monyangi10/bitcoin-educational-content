question: "NonInflatableAsset.RGB" Schema को लोकल Stash में कैसे इम्पोर्ट करूँ?
answer: जीडब्ल्यू-3 आयात स्कीमेटा/नॉनइन्फ्लेटेबलएसेट्स.जीडब्ल्यू-3
wrong_answers:
  - जीडब्ल्यू-5 आयात जीडब्ल्यू-4/नॉनइन्फ्लेटेबलएसेट्स.जीडब्ल्यू-5
  - जीडब्ल्यू-6 क्लोन स्कीमेटा/नॉनइन्फ्लेटेबलएसेट्स.जीडब्ल्यू-6
  - जीडब्ल्यू-8 क्लोन जीडब्ल्यू-7/नॉनइन्फ्लेटेबलएसेट्स.जीडब्ल्यू-8
explanation: |
  संकलित Schema को स्थानीय Stash में "RGB import schemata/NonInflatableAssets.RGB" कमांड का उपयोग करके आयात किया जाता है।

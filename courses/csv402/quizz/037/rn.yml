question: Ni gute noshiramwo "Itunga Ridashobora Gutera.RGB" Schema muri Stash yo mu karere?
answer: RGB ibishushanyo vyo kwinjiza mu gihugu/Ibintu bidashobora gutera.RGB.
wrong_answers:
  - RGB kwinjiza Schema/Ibintu Bitashobora Gufutwa.RGB.
  - RGB igishushanyo c'ivy'ubuhinga/Ibintu bitashobora gutera.RGB.
  - RGB igishushanyo Schema/Itunga Ridashobora Gufutwa.RGB.
explanation: |
  Schema yashizwe hamwe yinjizwa muri Stash yo mu karere hakoreshejwe itegeko "Imirongo y'injiza ya RGB/Imitungo idashobora gutera.RGB".

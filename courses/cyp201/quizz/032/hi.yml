question: वो कौन सा साइनहैश फ्लैग है जो क्राउडफंडिंग को सपोर्ट करता है, सिर्फ एक इनपुट और सारे आउटपुट्स को कवर करके?  

(Note: "sighash flag" को हिंदी में "साइनहैश फ्लैग" ही लिखा गया है क्योंकि यह एक टेक्निकल टर्म है और इसका कोई सटीक अनुवाद नहीं होता। "Crowdfunding" के लिए "क्राउडफंडिंग" ही प्रयोग किया गया है क्योंकि यह आमतौर पर हिंदी में भी इसी नाम से जाना जाता है।)
answer: साइनहैश_ऑल | साइनहैश_एनीवनकैनपे
wrong_answers:
  - साइनहैश_नोन | साइनहैश_ऐनीवनकैनपे
  - साइहैश_सिंगल | साइहैश_एनीवनकैनपे
  - साइनहैश_ऑल
explanation: |
  SIGHASH_ALL को SIGHASH_ANYONECANPAY के साथ मिलाने से आउटपुट को बदले बिना इनपुट जोड़ने की अनुमति मिलती है।
reviewed: false
question: एक Bitcoin और Address का ट्रांजैक्शन में मुख्य रोल क्या होता है?
answer: स्क्रिप्टपबकी में UTXOs को लॉक करें
wrong_answers:
  - स्क्रिप्टसिग में UTXOs को अनलॉक करें
  - लेन-देन का अंत संकेत करें
  - पुष्टि ब्लॉक की पहचान करें
explanation: |
  एक Bitcoin Address स्क्रिप्टपब्की में एम्बेडेड है जो यूटीएक्सओ को लॉक करने के लिए होता है। यह फंड्स को अनलॉक करने के लिए जरूरी शर्तों को तय करता है।
reviewed: false
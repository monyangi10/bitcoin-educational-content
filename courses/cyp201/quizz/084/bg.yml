question: Каква е основната роля на адреса Bitcoin в транзакцията?
answer: Заключване на UTXOs в скриптаPubKey
wrong_answers:
  - Отключване на UTXOs в скриптаSig
  - Сигнализиране на края на транзакцията
  - Определяне на блока за потвърждение
explanation: |
  В scriptPubKey е вграден адрес Bitcoin за заключване на UTXOs. Той определя необходимите условия за отключване на средствата.
reviewed: false
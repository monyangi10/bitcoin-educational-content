question: แนวทางปฏิบัติที่ดีในการรักษาความปลอดภัย passphrase คืออะไร?
answer: บันทึกไว้ในสื่อทางกายภาพที่แยกจากวลีช่วยจำ
wrong_answers:
  - จดจำด้วยใจเท่านั้นโดยไม่ต้องจดบันทึก
  - บันทึกไว้ในสื่อทางกายภาพเดียวกันกับวลีช่วยจำ
  - บันทึกลงในสื่อดิจิทัลเช่น Google Drive
explanation: |
  passphrase ต้องถูกเก็บรักษาไว้ทางกายภาพและแยกจากวลีช่วยจำเพื่อป้องกันการโจรกรรมทั้งสองพร้อมกัน
reviewed: false
question: Каква е добрата практика за осигуряване на passphrase?
answer: Запишете го на отделен физически носител от мнемоничната фраза
wrong_answers:
  - Запомнете го само наизуст, без да го записвате
  - Запишете го на същия физически носител като мнемоничната фраза
  - Запишете го на цифров носител като Google Drive
explanation: |
  passphrase трябва да бъде съхранен физически и отделно от мнемоничната фраза, за да се предотврати едновременната кражба и на двете.

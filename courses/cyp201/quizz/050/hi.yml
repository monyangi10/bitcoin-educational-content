question: passphrase को सुरक्षित करने के लिए एक अच्छा तरीका क्या है?
answer: इसे Mnemonic वाक्यांश से अलग एक भौतिक माध्यम पर सहेजें
wrong_answers:
  - इसे दिल से याद करो, लिखकर नहीं
  - इसे Mnemonic वाक्यांश के समान भौतिक माध्यम पर सहेजें
  - इसे डिजिटल माध्यम जैसे Google Drive पर रिकॉर्ड करें
explanation: |
  passphrase को भौतिक रूप से सुरक्षित रखना चाहिए और Mnemonic वाक्यांश से अलग रखना चाहिए ताकि दोनों को एक साथ चोरी होने से रोका जा सके।

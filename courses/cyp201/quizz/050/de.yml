question: Was ist eine gute Praxis, um eine Passphrase zu sichern?
answer: Speichere sie auf einem separaten physischen Medium als die mnemonische Phrase
wrong_answers:
  - Merke sie dir nur auswendig, ohne sie aufzuschreiben
  - Speichere sie auf demselben physischen Medium wie die mnemonische Phrase
  - Speichere sie auf einem digitalen Medium wie Google Drive
explanation: |
  Die Passphrase muss physisch und getrennt von der mnemonischen Phrase gespeichert werden, um den gleichzeitigen Diebstahl beider zu verhindern.
reviewed: true

question: Apa yang diizinkan oleh flag sighash SIGHASH_NONE?
answer: Memodifikasi output setelah penandatanganan
wrong_answers:
  - Memodifikasi input setelah penandatanganan
  - Menutupi semua input dan output
  - Membatasi modifikasi hanya pada satu output
explanation: |
  SIGHASH_NONE hanya menutupi input, meninggalkan output dapat dimodifikasi setelah penandatanganan.
reviewed: true

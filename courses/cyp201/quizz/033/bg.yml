question: Какво позволява флагът SIGHASH_NONE на sighash?
answer: Промяна на резултатите след подписване
wrong_answers:
  - Промяна на входните данни след подписване
  - Обхващане на всички входове и изходи
  - Ограничаване на модификациите само до един изход
explanation: |
  SIGHASH_NONE покрива само входните данни, като оставя изходните данни да бъдат променяни след подписването.

question: SIGHASH_NONE वाला साइनहैश फ्लैग क्या अनुमति देता है?
answer: साइन करने के बाद आउटपुट में बदलाव करना
wrong_answers:
  - साइन करने के बाद इनपुट्स को बदलना
  - सभी इनपुट और आउटपुट को कवर करना
  - सिर्फ एक आउटपुट में बदलावों को सीमित करना
explanation: |
  SIGHASH_NONE सिर्फ इनपुट्स को कवर करता है, जिससे आउटपुट्स को साइन करने के बाद भी बदला जा सकता है।
reviewed: false
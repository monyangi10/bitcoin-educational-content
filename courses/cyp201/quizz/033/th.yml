question: SIGHASH_NONE ธง sighash อนุญาตอะไร?
answer: การแก้ไขผลลัพธ์หลังจากการลงนาม
wrong_answers:
  - การแก้ไขข้อมูลหลังจากการลงนาม
  - ครอบคลุมทุกข้อมูลนำเข้าและส่งออก
  - จำกัดการแก้ไขให้กับผลลัพธ์เพียงหนึ่งเดียวเท่านั้น
explanation: |
  SIGHASH_NONE ครอบคลุมเฉพาะอินพุตเท่านั้น ทำให้เอาต์พุตสามารถแก้ไขได้หลังจากการลงนาม
reviewed: false
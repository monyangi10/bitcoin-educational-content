question: अण्डाकार वक्रों (elliptic curves) पर स्केलर गुणन (scalar multiplication) की मुख्य विशेषता क्या है?
answer: एकतरफा फंक्शन
wrong_answers:
  - आसानी से पलटने वाला
  - अभाज्य संख्याओं के गुणनखंडन के आधार पर
  - बहुत ज़्यादा समय लगता है हिसाब करने में
explanation: |
  एलिप्टिक कर्व्स पर स्केलर मल्टीप्लिकेशन एक वन-वे फंक्शन है, जिससे पब्लिक की से प्राइवेट की वापस निकालना नामुमकिन होता है।
reviewed: false
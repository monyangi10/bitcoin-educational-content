question: Каква е основната характеристика на скаларното умножение върху елиптични криви?
answer: Еднопосочна функция
wrong_answers:
  - Лесно обратими
  - Въз основа на факторизацията на простите числа
  - Много дълго за изчисляване
explanation: |
  Скаларното умножение върху елиптични криви е еднопосочна функция, което прави невъзможно извличането на частния ключ от публичния ключ.
reviewed: false
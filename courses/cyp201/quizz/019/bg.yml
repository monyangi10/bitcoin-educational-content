question: Коя математическа операция е в основата на сигурността на криптографията с елиптична крива?
answer: Проблем с дискретния логаритъм
wrong_answers:
  - Факторизация на първични числа
  - Изчисляване на квадратни остатъци
  - Проблем с дискретен куб
explanation: |
  Сигурността на криптографията с елиптични криви се основава на трудността за решаване на задачата за дискретен логаритъм върху тези криви.
reviewed: false
question: एलिप्टिक कर्व क्रिप्टोग्राफी की सुरक्षा का आधार कौन सा गणितीय ऑपरेशन है?
answer: अलग-अलग लघुगणक समस्या
wrong_answers:
  - अभाज्य संख्या का गुणनखंडन
  - द्विघातीय अवशेषों की गणना
  - अलग-अलग (डिस्क्रीट) घन समस्या
explanation: |
  अंडाकार वक्र क्रिप्टोग्राफी की सुरक्षा इन वक्रों पर असतत लघुगणक समस्या को हल करने की कठिनाई पर आधारित है।
reviewed: false
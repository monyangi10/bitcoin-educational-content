question: การดำเนินการทางคณิตศาสตร์ใดที่เป็นฐานของความปลอดภัยของการเข้ารหัสลับด้วยเส้นโค้งวงรี?
answer: ปัญหาลอการิทึมไม่ต่อเนื่อง
wrong_answers:
  - การแยกตัวประกอบของจำนวนเฉพาะ
  - การคำนวณเศษกำลังสอง
  - ปัญหาลูกบาศก์แบบไม่ต่อเนื่อง
explanation: |
  ความปลอดภัยของการเข้ารหัสลับแบบเส้นโค้งวงรีขึ้นอยู่กับความยากในการแก้ปัญหาลอการิทึมไม่ต่อเนื่องบนเส้นโค้งเหล่านี้
reviewed: false
question: इंडेक्स का उद्देश्य चाइल्ड कीज़ को डेरिव करने में क्या है?
answer: भाई-बहन की जोड़ियों में अंतर बताओ
wrong_answers:
  - कुंजी (पब्लिक या प्राइवेट) की प्रकृति पहचानें
  - कुंजी की सुरक्षा स्तर निर्धारित करें
  - एक अतिरिक्त Layer सुरक्षा जोड़ें
explanation: |
  इंडेक्स एक ही पैरेंट पेयर से बने चाइल्ड कीज़ को अलग-अलग पहचानने की सुविधा देता है।
reviewed: false
question: วัตถุประสงค์ของดัชนีในการสร้างคีย์ลูกคืออะไร?
answer: แยกแยะคู่คีย์พี่น้อง
wrong_answers:
  - ระบุลักษณะของคีย์ (สาธารณะหรือส่วนตัว)
  - ระบุระดับความปลอดภัยของคีย์
  - เพิ่มชั้นความปลอดภัยเพิ่มเติม
explanation: |
  ดัชนีช่วยให้สามารถแยกแยะคีย์ลูกที่ได้มาจากคู่พ่อแม่เดียวกันได้
reviewed: false
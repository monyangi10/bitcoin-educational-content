question: Каква е целта на индекса при извличането на подчинени ключове?
answer: Разграничаване на двойки ключове на роднини
wrong_answers:
  - Определяне на естеството на ключа (публичен или частен)
  - Определяне на нивото на сигурност на ключа
  - Добавяне на допълнително ниво на сигурност
explanation: |
  Индексът позволява да се разграничат подчинените ключове, получени от една и съща родителска двойка.
reviewed: false
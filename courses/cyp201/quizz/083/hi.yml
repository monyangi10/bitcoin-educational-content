question: वह कौन सा Address प्रकार है जो `1` से शुरू होता है और Legacy स्टैंडर्ड से संबंधित है?
answer: P2PKH (Pay-to-Public-Key-Hash) एक स्टैंडर्ड टाइप का Bitcoin एड्रेस है जो पब्लिक की के हैश से बनता है। यूजर को पैसे भेजने के लिए, सेंडर को रिसीवर के पब्लिक की हैश का इस्तेमाल करना पड़ता है। ट्रांजैक्शन को पूरा करने के लिए, रिसीवर को अपनी प्राइवेट की से सिग्नेचर देना होता है। यह बिटकॉइन का सबसे कॉमन एड्रेस फॉर्मेट है, जो "1" से शुरू होता है।
wrong_answers:
  - जीडब्ल्यू-1
  - जीडब्ल्यू-2
  - जीडब्ल्यू-3
explanation: |
  P2PKH एड्रेसेस, जो base58check में एनकोडेड होते हैं, Legacy स्टैंडर्ड से आते हैं और `1` डिजिट से शुरू होते हैं।

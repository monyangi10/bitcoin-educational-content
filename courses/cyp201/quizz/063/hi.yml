question: एक्सटेंडेड की में कौन सी जानकारी शामिल नहीं होती है?
answer: कुंजी का लेन-देन इतिहास
wrong_answers:
  - चाबी का सूचकांक नंबर
  - कुंजी (निजी या सार्वजनिक)
  - चेन कोड
explanation: |
  एक्सटेंडेड की में सिर्फ चाइल्ड कीज़ निकालने के लिए जरूरी जानकारी होती है, लेन-देन से जुड़ी कोई डिटेल्स नहीं होती।
reviewed: false
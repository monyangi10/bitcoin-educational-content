question: ข้อมูลใดที่ไม่ได้รวมอยู่ในคีย์ขยาย?
answer: ประวัติการทำธุรกรรมของกุญแจ
wrong_answers:
  - หมายเลขดัชนีของกุญแจ
  - คีย์ (ส่วนตัวหรือสาธารณะ)
  - The chain code
explanation: |
  คีย์ขยายประกอบด้วยข้อมูลที่จำเป็นสำหรับการสร้างคีย์ลูกเท่านั้น ไม่รวมข้อมูลที่เกี่ยวข้องกับธุรกรรม
reviewed: false
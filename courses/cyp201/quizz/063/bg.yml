question: Каква информация не се включва в разширения ключ?
answer: История на транзакциите на ключа
wrong_answers:
  - Индексният номер на ключа
  - Ключът (частен или публичен)
  - chain code
explanation: |
  Разширеният ключ съдържа само информацията, необходима за извличане на подчинени ключове, но не и информация, свързана с транзакции.

question: Каква е основната разлика между PRNG и TRNG?
answer: PRNG е детерминистичен, докато TRNG генерира истински случайни числа.
wrong_answers:
  - PRNG е по-бърз от TRNG за големи числа.
  - PRNG се използва само за криптиране, но не и TRNG.
  - PRNG използва частни ключове, а TRNG - публични ключове.
explanation: |
  PRNG са детерминистични, което означава, че могат да възпроизвеждат последователности от начално състояние, за разлика от TRNG.

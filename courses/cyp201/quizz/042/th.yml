question: ความแตกต่างหลักระหว่าง PRNG และ TRNG คืออะไร?
answer: PRNG เป็นแบบกำหนดล่วงหน้า ในขณะที่ TRNG สร้างตัวเลขสุ่มที่แท้จริง
wrong_answers:
  - PRNG เร็วกว่า TRNG สำหรับตัวเลขขนาดใหญ่
  - PRNG ถูกใช้สำหรับการเข้ารหัสเท่านั้น ไม่ใช่ TRNG.
  - PRNG ใช้กุญแจส่วนตัว, TRNG ใช้กุญแจสาธารณะ
explanation: |
  PRNGs เป็นแบบกำหนดล่วงหน้า หมายความว่าสามารถสร้างลำดับซ้ำจากสถานะเริ่มต้นได้ ซึ่งต่างจาก TRNGs
reviewed: false
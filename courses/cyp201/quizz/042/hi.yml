question: PRNG और TRNG में मुख्य अंतर क्या है?
answer: PRNG निर्धारित (deterministic) होता है, जबकि TRNG असली यादृच्छिक (random) संख्याएँ उत्पन्न करता है।
wrong_answers:
  - बड़ी संख्याओं के लिए PRNG, TRNG से तेज़ होता है।
  - PRNG का इस्तेमाल सिर्फ एन्क्रिप्शन के लिए होता है, TRNG के लिए नहीं।
  - PRNG प्राइवेट कीज़ का इस्तेमाल करता है, जबकि TRNG पब्लिक कीज़ का इस्तेमाल करता है।
explanation: |
  PRNG निर्धारित (deterministic) होते हैं, मतलब वे शुरुआती स्थिति से अनुक्रम को दोबारा बना सकते हैं, जबकि TRNG ऐसा नहीं कर सकते।

question: Кое свойство на Шнорр позволява комбинирането на няколко публични ключа в един?
answer: Агрегиране на ключове
wrong_answers:
  - Проверка на партидата
  - Податливост
  - Уплътняване на подписа
explanation: |
  Schnorr дава възможност за обединяване на множество публични ключове в един ключ.

question: Bitcoin ट्रांजैक्शन्स में सबसे ज़्यादा इस्तेमाल होने वाला sighash फ्लैग कौन सा है?
answer: साइनहैश_ऑल (SIGHASH_ALL)
wrong_answers:
  - साइनहैश_नन
  - साइहैश_सिंगल
  - साइनहैश_कोईभीभुगतानकरसकताहै
explanation: |
  SIGHASH_ALL डिफ़ॉल्ट साइन हैश फ्लैग है, जो ट्रांजैक्शन के सभी इनपुट्स और आउटपुट्स को कवर करता है और किसी भी तरह के बदलाव को रोकता है।
reviewed: false
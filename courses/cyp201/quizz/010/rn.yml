question: Ni ubuhe buryo bwo gukura bukoreshwa mu kubara kode y’ukwemeza ishingiye ku rufunguzo rw’ibanga?
answer: HMAC-SHA512
wrong_answers:
  - SHA512
  - SHA256
  - RIPEMD160
explanation: |
  HMAC-SHA512 ni ubuhinga bufatanya igikorwa ca Hash n’urufunguzo rw’ibanga kugira ngo ubaze kode y’ukwemeza.

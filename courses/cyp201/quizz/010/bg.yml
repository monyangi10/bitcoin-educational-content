question: Кой алгоритъм за деривация се използва за изчисляване на код за удостоверяване въз основа на секретен ключ?
answer: HMAC-SHA512
wrong_answers:
  - SHA512
  - SHA256
  - RIPEMD160
explanation: |
  HMAC-SHA512 е алгоритъм, който комбинира хеш функция и таен ключ, за да изчисли код за удостоверяване.
reviewed: false
question: कौन सा डेरिवेशन एल्गोरिदम एक सीक्रेट की के आधार पर ऑथेंटिकेशन कोड कैलकुलेट करने के लिए इस्तेमाल होता है?
answer: HMAC-SHA512
wrong_answers:
  - एसएचए512 (SHA512)
  - एस-एच-२५६ (SHA256)
  - आरआईपीईएमडी160
explanation: |
  HMAC-SHA512 एक ऐल्गोरिदम है जो Hash फंक्शन और एक सीक्रेट की को मिलाकर ऑथेंटिकेशन कोड कैलकुलेट करता है।
reviewed: false
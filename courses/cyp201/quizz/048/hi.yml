question: 24-शब्दों वाला Mnemonic वाक्यांश अक्सर Bitcoin और Wallet के लिए फ़ालतू क्यों माना जाता है?
answer: डेरिव्ड कीज़ केवल 128 बिट्स की सुरक्षा प्रदान करते हैं
wrong_answers:
  - सॉफ्टवेयर 24-शब्द वाले वाक्यांशों को सपोर्ट नहीं करता है।
  - यह पब्लिक कीज़ को डेरिव करने की अनुमति नहीं देता है
  - छोटे वाक्य मानक नहीं होते
explanation: |
  हालांकि 24-शब्दों वाला वाक्यांश 256 बिट सुरक्षा प्रदान करता है, लेकिन इससे बनने वाली Bitcoin प्राइवेट कीज़ सिर्फ 128 बिट सुरक्षा ही गारंटी देती हैं, जिससे यह अतिरिक्त सुरक्षा अनावश्यक हो जाती है।
reviewed: false
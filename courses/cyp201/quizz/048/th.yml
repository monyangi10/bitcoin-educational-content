question: ทำไมวลีช่วยจำ 24 คำจึงมักถูกมองว่าเกินความจำเป็นสำหรับ Bitcoin wallet?
answer: คีย์ที่ได้มามีความปลอดภัยเพียง 128 บิตเท่านั้น
wrong_answers:
  - ซอฟต์แวร์ไม่รองรับวลี 24 คำ
  - มันไม่อนุญาตให้มีการสืบทอดคีย์สาธารณะ
  - วลีที่สั้นกว่านั้นไม่ได้มาตรฐาน
explanation: |
  แม้ว่าวลี 24 คำจะให้ความปลอดภัย 256 บิต แต่คีย์ส่วนตัว Bitcoin ที่ได้มารับประกันความปลอดภัยเพียง 128 บิต ทำให้ส่วนเกินนั้นไม่จำเป็น
reviewed: false
question: Защо една мнемонична фраза от 24 думи често се смята за излишна за Bitcoin wallet?
answer: Получените ключове предлагат само 128 бита сигурност
wrong_answers:
  - Софтуерът не поддържа фрази с 24 думи
  - Тя не позволява извличането на публични ключове
  - По-кратките фрази не са стандартизирани
explanation: |
  Въпреки че една фраза от 24 думи предлага 256 бита сигурност, получените частни ключове Bitcoin гарантират само 128 бита сигурност, което прави излишъка ненужен.
reviewed: false
question: एक 24-शब्द वाले Mnemonic वाक्यांश में कितने एन्ट्रॉपी बिट्स का उपयोग होता है?
answer: २५६ बिट्स
wrong_answers:
  - 128 बिट्स
  - 512 बिट्स
  - 64 बिट्स
explanation: |
  एक 24-शब्दों वाला Mnemonic वाक्यांश 256 बिट्स की एन्ट्रॉपी पर आधारित है, जो बहुत उच्च सुरक्षा सुनिश्चित करता है।
reviewed: false
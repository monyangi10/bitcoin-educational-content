question: Wie viele Bits Entropie werden für eine mnemonische Phrase mit 24 Wörtern verwendet?
answer: 256 Bits
wrong_answers:
  - 128 Bits
  - 512 Bits
  - 64 Bits
explanation: |
  Eine mnemonische Phrase mit 24 Wörtern basiert auf 256 Bits Entropie, was eine sehr hohe Sicherheit gewährleistet.

question: Какво позволява да се извлече разширен публичен ключ?
answer: Само нормални публични ключове на деца
wrong_answers:
  - Само нормални частни ключове на деца
  - Публични ключове на деца със защитени и нормални характеристики
  - Частните ключове на деца с повишена защита и нормални частни ключове
explanation: |
  Разширеният публичен ключ позволява извличането само на нормални публични ключове на деца, но не и на частни или защитени ключове.
reviewed: false
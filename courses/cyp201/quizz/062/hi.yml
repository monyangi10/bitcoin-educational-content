question: एक एक्सटेंडेड पब्लिक की (xpub) से क्या-क्या डेरिव किया जा सकता है?
answer: सिर्फ सामान्य बच्चों की पब्लिक कीज़
wrong_answers:
  - सिर्फ सामान्य बच्चे के प्राइवेट कीज़
  - कठोर और सामान्य बाल सार्वजनिक कुंजियाँ
  - कठोर और सामान्य बच्चे के निजी कुंजियाँ
explanation: |
  एक्सटेंडेड पब्लिक की केवल नॉर्मल चाइल्ड पब्लिक कीज़ को डेरिव करने की अनुमति देता है, प्राइवेट कीज़ या हार्डन्ड कीज़ को नहीं।
reviewed: false
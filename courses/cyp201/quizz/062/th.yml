question: คีย์สาธารณะที่ขยายออกไปช่วยให้สามารถอนุพันธ์อะไรได้บ้าง?
answer: เฉพาะคีย์สาธารณะของเด็กปกติเท่านั้น
wrong_answers:
  - เฉพาะคีย์ส่วนตัวของเด็กปกติเท่านั้น
  - ทั้งคีย์สาธารณะของเด็กที่แข็งและปกติ
  - ทั้งคีย์ส่วนตัวของเด็กที่แข็งและปกติ
explanation: |
  คีย์สาธารณะที่ขยายออกไปจะอนุญาตให้สร้างคีย์สาธารณะลูกแบบปกติเท่านั้น ไม่ใช่คีย์ส่วนตัวหรือคีย์ที่มีการป้องกัน
reviewed: false
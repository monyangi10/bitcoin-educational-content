question: Bitcoin में PBKDF2 का मुख्य रोल क्या है?
answer: जीडब्ल्यू-1 जीडब्ल्यू-3 का एचडी जीडब्ल्यू-2
wrong_answers:
  - लेन-देन प्रमाणित करें
  - निजी कुंजियों को एन्क्रिप्ट करें
  - जीडब्ल्यू-4 पते बनाएं
explanation: |
  PBKDF2 का उपयोग Mnemonic वाक्यांश और वैकल्पिक passphrase से seed प्राप्त करने के लिए किया जाता है।
reviewed: false
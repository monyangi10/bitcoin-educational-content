question: Каква е основната роля на PBKDF2 в Bitcoin?
answer: Генериране на seed на HD wallet
wrong_answers:
  - Удостоверяване на транзакциите
  - Криптиране на частни ключове
  - Създаване на адреси Bitcoin
explanation: |
  PBKDF2 се използва за получаване на seed от мнемонична фраза и незадължителна passphrase.
reviewed: false
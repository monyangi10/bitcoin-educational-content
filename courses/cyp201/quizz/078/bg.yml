question: Какво означава префиксът `wpkh` в дескриптор?
answer: Pay-to-Witness-PubKey-Hash
wrong_answers:
  - Pay-to-PubKey
  - Pay-to-Script-Hash
  - Свидетелски запис Hash
explanation: |
  Префиксът `wpkh` показва, че скрипт SegWit v0 използва адреси Pay-to-Witness-Public-Key-Hash.
reviewed: false
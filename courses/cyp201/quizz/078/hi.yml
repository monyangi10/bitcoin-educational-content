question: डिस्क्रिप्टर में `wpkh` प्रीफिक्स का क्या मतलब है?  

(यह "Witness Public Key Hash" को दर्शाता है, जो बिटकॉइन डिस्क्रिप्टर में एक स्टैंडर्ड स्क्रिप्ट टाइप है जिसका इस्तेमाल SegWit (Segregated Witness) एड्रेसेस के लिए किया जाता है।)
answer: भुगतान-करें-गवाह-पबकी-जीडब्ल्यू-0
wrong_answers:
  - भुगतान-से-पबकी
  - जीडब्ल्यू-1
  - गवाही स्क्रिप्ट जीडब्ल्यू-2
explanation: |
  `wpkh` उपसर्ग Pay-to-Witness-Public-Key-Hash पतों का उपयोग करते हुए एक SegWit v0 स्क्रिप्ट को दर्शाता है।
reviewed: false
question: ความแตกต่างหลักระหว่าง P2PK และ P2PKH คืออะไร?
answer: P2PK ใช้คีย์สาธารณะดิบโดยตรง ในขณะที่ P2PKH ใช้แฮชของคีย์สาธารณะ
wrong_answers:
  - P2PK เข้ากันได้กับ SegWit ในขณะที่ P2PKH ไม่เข้ากัน
  - P2PK ใช้ลายเซ็น Schnorr ในขณะที่ P2PKH ใช้ลายเซ็น ECDSA
  - P2PK มีไว้สำหรับ multisigs ในขณะที่ P2PKH มีไว้สำหรับสคริปต์ง่าย ๆ
explanation: |
  P2PK ล็อคเงินด้วยคีย์สาธารณะดิบ ในขณะที่ P2PKH ใช้แฮชของคีย์สาธารณะ
reviewed: false
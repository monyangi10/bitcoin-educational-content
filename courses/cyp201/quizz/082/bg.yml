question: Каква е основната разлика между P2PK и P2PKH?
answer: P2PK използва директно необработения публичен ключ, докато P2PKH използва хеш на публичния ключ.
wrong_answers:
  - P2PK е съвместим с SegWit, докато P2PKH не е.
  - В P2PK се използва подпис Schnorr, а в P2PKH - подпис ECDSA.
  - P2PK е предназначен за многозначни текстове, а P2PKH - за прости скриптове.
explanation: |
  P2PK заключва средствата с необработен публичен ключ, докато P2PKH използва хеш на публичния ключ.

question: SHA256 और RIPEMD160 में मुख्य अंतर क्या है?
answer: RIPEMD160, SHA256 से छोटे हैश बनाता है।
wrong_answers:
  - SHA256 पुराना हो चुका है, RIPEMD160 के विपरीत।
  - RIPEMD160 का उपयोग सिर्फ Proof-of-Work मैकेनिज्म में किया जाता है
  - SHA256 को कभी भी अन्य हैशिंग फंक्शन्स के साथ मिलाया नहीं जाता
explanation: |
  RIPEMD160 160-बिट हैश जनरेट करता है, जबकि SHA256 256-बिट हैश बनाता है।

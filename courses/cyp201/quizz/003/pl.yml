question: Jaka jest główna różnica między SHA256 a RIPEMD160?
answer: RIPEMD160 tworzy krótsze skróty niż SHA256
wrong_answers:
  - SHA256 jest przestarzały w przeciwieństwie do RIPEMD160
  - RIPEMD160 jest używany tylko w mechanizmie Proof-of-Work
  - SHA256 nigdy nie jest łączony z innymi funkcjami haszującymi
explanation: |
  RIPEMD160 generuje 160-bitowe skróty, podczas gdy SHA256 generuje 256-bitowe skróty.
reviewed: false
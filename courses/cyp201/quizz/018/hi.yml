question: Bitcoin में elliptical curve secp256r1 का इस्तेमाल क्यों नहीं किया गया?
answer: संभवतः एक बैकडोर से बचने के लिए
wrong_answers:
  - क्योंकि यह बहुत धीमा है
  - क्योंकि यह मानकीकृत नहीं है
  - क्योंकि इसके लिए खास हार्डवेयर की ज़रूरत होती है
explanation: |
  जीडब्ल्यू-1 नाकामोटो ने शायद सेकपी256के1 कर्व को प्राथमिकता दी थी, क्योंकि सेकपी256आर1 के पैरामीटर्स में कोई छुपी हुई कमजोरी हो सकती थी।

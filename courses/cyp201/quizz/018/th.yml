question: ทำไมจึงไม่ได้ใช้เส้นโค้งวงรี secp256r1 ใน Bitcoin?
answer: อาจหลีกเลี่ยงช่องโหว่ที่ซ่อนอยู่
wrong_answers:
  - เพราะว่ามันช้าเกินไป
  - เพราะมันไม่ได้มาตรฐาน
  - เพราะว่ามันต้องการฮาร์ดแวร์เฉพาะทาง
explanation: |
  Satoshi Nakamoto น่าจะชอบเส้นโค้ง secp256k1 มากกว่า เนื่องจากพารามิเตอร์ของ secp256r1 อาจมีช่องโหว่ที่ซ่อนอยู่
reviewed: false
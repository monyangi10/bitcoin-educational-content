question: Защо елиптичната крива secp256r1 не е използвана в Bitcoin?
answer: Потенциално за избягване на задна врата
wrong_answers:
  - Защото е твърде бавен
  - Тъй като не е стандартизиран
  - Тъй като изисква специализиран хардуер
explanation: |
  Satoshi Nakamoto вероятно е предпочел кривата secp256k1, тъй като параметрите на secp256r1 можеха да съдържат скрита уязвимост.
reviewed: false
question: एक प्राइवेट की से पब्लिक की कैसे कैलकुलेट की जाती है?
answer: एलिप्टिक कर्व पर स्केलर गुणन का उपयोग करके
wrong_answers:
  - प्राइवेट की पर Hash लगाकर
  - असममित एन्क्रिप्शन के माध्यम से
  - संख्यात्मक मूल्यों को बार-बार जोड़ने से
explanation: |
  पब्लिक की प्राइवेट की के साथ स्केलर मल्टीप्लिकेशन करके और उसे एलिप्टिक कर्व पर जनरेटर पॉइंट G से मल्टीप्लाई करके प्राप्त किया जाता है।

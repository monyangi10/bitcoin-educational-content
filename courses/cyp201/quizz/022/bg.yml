question: Как се изчислява публичен ключ от частен ключ?
answer: С помощта на скаларно умножение върху елиптичната крива
wrong_answers:
  - Чрез прилагане на хеш върху частния ключ
  - Чрез асиметрично криптиране
  - С многократно добавяне на цифрови стойности
explanation: |
  Публичният ключ се получава чрез скаларно умножение на частния ключ с генераторната точка G на елиптичната крива.

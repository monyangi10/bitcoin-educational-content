question: คีย์สาธารณะถูกคำนวณจากคีย์ส่วนตัวอย่างไร?
answer: โดยการใช้การคูณสเกลาร์บนเส้นโค้งวงรี
wrong_answers:
  - โดยการใช้แฮชกับกุญแจส่วนตัว
  - ผ่านการเข้ารหัสแบบอสมมาตร
  - ด้วยการบวกซ้ำของค่าตัวเลข
explanation: |
  คีย์สาธารณะได้มาจากการคูณสเกลาร์ของคีย์ส่วนตัวกับจุดกำเนิด G บนเส้นโค้งวงรี
reviewed: false
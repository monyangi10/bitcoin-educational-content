question: HMAC-SHA512 के आउटपुट में से कौन सा हिस्सा चाइल्ड चेन कोड के रूप में इस्तेमाल होता है?
answer: आखिरी 32 बाइट्स
wrong_answers:
  - पहले 32 बाइट्स
  - पूरे 64 बाइट्स
  - मध्य 32 बाइट्स का SHA256 Hash
explanation: |
  HMAC-SHA512 के आउटपुट के आखिरी 32 बाइट्स चाइल्ड की के लिए चेन कोड का काम करते हैं।
reviewed: false
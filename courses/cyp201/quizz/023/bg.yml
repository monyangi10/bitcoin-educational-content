question: Коя е общата точка, използвана от всички участници за изчисляване на публичния ключ в Bitcoin?
answer: Генераторната точка G
wrong_answers:
  - Хешът SHA256
  - Мнемонична фраза
  - Компресираният публичен ключ
explanation: |
  Точката на генератора G на елиптичната крива secp256k1 се използва за изчисляване на публични ключове от частни ключове.
reviewed: false
question: Bitcoin में सभी प्रतिभागियों द्वारा पब्लिक की कैलकुलेट करने के लिए इस्तेमाल किया जाने वाला कॉमन पॉइंट क्या है?
answer: जनरेटर पॉइंट G
wrong_answers:
  - SHA256 जीडब्ल्यू-1
  - एक जीडब्ल्यू-2 वाक्यांश
  - संपीड़ित सार्वजनिक कुंजी
explanation: |
  सेकप256k1 (secp256k1) एलिप्टिक कर्व के जनरेटर पॉइंट G का इस्तेमाल प्राइवेट की से पब्लिक की कैलकुलेट करने के लिए किया जाता है।
reviewed: false
question: Каква е основната функция на разширения ключ в HD wallet?
answer: За да позволите извеждането на подчинени ключове
wrong_answers:
  - Съхраняване на транзакциите на wallet
  - Директно generate на UTXOs
  - Криптиране на публичните ключове
explanation: |
  Разширеният ключ съчетава ключ (частен или публичен) със свързан chain code, т.е. двата елемента, необходими за извличане на подчинени ключове.

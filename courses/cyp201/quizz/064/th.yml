question: ฟังก์ชันหลักของคีย์ขยายใน HD wallet คืออะไร?
answer: เพื่ออนุญาตให้มีการสร้างคีย์ลูก
wrong_answers:
  - จัดเก็บธุรกรรมของ wallet
  - โดยตรง generate the UTXOs
  - เข้ารหัสคีย์สาธารณะ
explanation: |
  คีย์ที่ขยายรวมคีย์ (ไม่ว่าจะเป็นคีย์ส่วนตัวหรือคีย์สาธารณะ) เข้ากับ chain code ที่เกี่ยวข้อง นั่นคือ องค์ประกอบสองอย่างที่จำเป็นในการสร้างคีย์ลูก
reviewed: false
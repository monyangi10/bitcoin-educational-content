question: एक HD Wallet में एक्सटेंडेड की का मुख्य काम क्या है?
answer: बच्चों की कुंजियों को निकालने की अनुमति देने के लिए
wrong_answers:
  - Wallet के लेन-देन को स्टोर करें
  - सीधे generate से UTXOs
  - पब्लिक कीज़ को एन्क्रिप्ट करो
explanation: |
  एक्सटेंडेड की एक की (प्राइवेट या पब्लिक) को उससे जुड़े चेन कोड के साथ जोड़ती है, यानी Elements के दोनों हिस्से जो चाइल्ड कीज़ डेरिव करने के लिए ज़रूरी होते हैं।

question: คุณสมบัติใดของฟังก์ชันแฮชที่แสดงให้เห็นถึงการเปลี่ยนแปลงแฮชอย่างสมบูรณ์เมื่อข้อความเปลี่ยนแปลงเพียงเล็กน้อย?
answer: ผลกระทบแบบหิมะถล่ม
wrong_answers:
  - ความต้านทานการชนกัน
  - ความต้านทานภาพลักษณ์ที่สอง
  - ความยาว
explanation: |
  การเปลี่ยนแปลงเล็กน้อยในข้อมูลนำเข้าทำให้เกิดการเปลี่ยนแปลงอย่างมากในแฮช ซึ่งเรียกว่าปรากฏการณ์หิมะถล่ม
reviewed: false
question: Welche Eigenschaft von Hashfunktionen wird durch eine vollständige Änderung des Hashs bei einer geringfügigen Änderung der Nachricht demonstriert?
answer: Der Lawineneffekt
wrong_answers:
  - Kollisionsresistenz
  - Zweite-Urbild-Resistenz
  - Länge
explanation: |
  Eine kleine Änderung im Eingabewert führt zu einer radikalen Änderung im Hash, dies wird als Lawineneffekt bezeichnet.
reviewed: true

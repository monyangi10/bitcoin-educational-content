question: Hash फंक्शन का कौन सा गुण दिखाता है कि जब मैसेज थोड़ा सा बदलता है तो Hash पूरी तरह से बदल जाता है?
answer: अवैलांचे इफ़ेक्ट
wrong_answers:
  - टकराव प्रतिरोध
  - दूसरी प्रीइमेज प्रतिरोध
  - लंबाई
explanation: |
  इनपुट में एक छोटा सा बदलाव Hash में बड़ा बदलाव ला देता है, इसे ही एवलांच इफेक्ट कहते हैं।
reviewed: false
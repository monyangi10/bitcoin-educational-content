question: Кое свойство на хеш функциите се проявява в пълната промяна на хеша, когато съобщението се промени незначително?
answer: Ефектът на лавината
wrong_answers:
  - Устойчивост на сблъсък
  - Втора устойчивост на предварителен образ
  - Дължина
explanation: |
  Малка промяна на входа води до радикална промяна на хеша - това се нарича лавинообразен ефект.
reviewed: false
question: ความเสี่ยงหลักของการใช้ PRNG ที่ออกแบบไม่ดีต่อ generate entropy คืออะไร?
answer: คีย์ส่วนตัวอาจถูกคาดเดาโดยผู้โจมตี
wrong_answers:
  - วลีช่วยจำอาจมีคำที่ไม่ถูกต้อง
  - ลายเซ็นดิจิทัลจะกลายเป็นโมฆะ
  - Bitcoin ที่อยู่จะไม่สามารถใช้งานร่วมกับเครือข่ายได้
explanation: |
  PRNG ที่ออกแบบมาไม่ดีสามารถสร้างลำดับที่คาดเดาได้ ทำให้คีย์มีความเสี่ยงต่อการถูกโจมตีมากขึ้น
reviewed: false
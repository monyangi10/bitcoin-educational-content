question: Какъв е основният риск от използването на лошо проектирана PRNG за generate ентропия?
answer: Частните ключове могат да бъдат отгатнати от нападател
wrong_answers:
  - Мнемоничната фраза може да съдържа неправилни думи
  - Цифровите подписи ще станат невалидни
  - Адресите на Bitcoin биха били несъвместими с мрежата
explanation: |
  Недобре проектиран PRNG може да създаде предсказуеми последователности, което прави ключовете по-уязвими за атаки.

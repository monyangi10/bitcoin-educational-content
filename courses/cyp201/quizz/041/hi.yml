question: एक खराब डिज़ाइन किए गए PRNG (पसूडो-रैंडम नंबर जनरेटर) का इस्तेमाल करने का मुख्य खतरा generate एन्ट्रॉपी में क्या है?
answer: प्राइवेट कीज़ को हमलावर द्वारा अंदाज़ा लगाया जा सकता है
wrong_answers:
  - Mnemonic वाक्य में गलत शब्द हो सकते हैं
  - डिजिटल सिग्नेचर अमान्य हो जाएंगे
  - Bitcoin पते नेटवर्क के साथ असंगत होंगे
explanation: |
  एक खराब डिज़ाइन किया गया PRNG (पीआरएनजी) पूर्वानुमानित अनुक्रम उत्पन्न कर सकता है, जिससे कुंजियाँ हमलों के प्रति अधिक संवेदनशील हो जाती हैं।
reviewed: false
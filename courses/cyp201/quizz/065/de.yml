question: Was ist der Unterschied zwischen einem normalen untergeordneten Schlüssel und einem gehärteten untergeordneten Schlüssel?
answer: Ein gehärteter untergeordneter Schlüssel benötigt den privaten Schlüssel des Elternteils für seine Ableitung.
wrong_answers:
  - Ein normaler untergeordneter Schlüssel kann nicht von öffentlichen Schlüsseln abgeleitet werden.
  - Ein gehärteter untergeordneter Schlüssel verwendet einen ungeraden Index.
  - Ein normaler untergeordneter Schlüssel ist sicherer als ein gehärteter untergeordneter Schlüssel
explanation: |
  Ein normaler untergeordneter Schlüssel kann vom öffentlichen übergeordneten Schlüssel abgeleitet werden, im Gegensatz zu einem gehärteten untergeordneter Schlüssel, der den privaten übergeordneten Schlüssel benötigt.
reviewed: true

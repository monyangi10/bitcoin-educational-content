question: Каква е разликата между нормален детски ключ и защитен детски ключ?
answer: За да се получи защитен подчинен ключ, е необходим частният ключ на родителя.
wrong_answers:
  - Обикновеният детски ключ не може да произлиза от публични ключове.
  - Защитеният детски ключ използва нечетен индекс.
  - Обикновеният детски ключ е по-сигурен от защитения детски ключ.
explanation: |
  Обикновеният детски ключ може да бъде получен от публичния ключ на родителя, за разлика от защитения детски ключ, който изисква частния ключ на родителя.
reviewed: false
question: ความแตกต่างระหว่างคีย์ลูกปกติกับคีย์ลูกแบบฮาร์เดนคืออะไร?
answer: คีย์ลูกที่แข็งตัวต้องการคีย์ส่วนตัวของผู้ปกครองสำหรับการอนุพันธ์ของมัน
wrong_answers:
  - คีย์เด็กปกติไม่สามารถสืบทอดจากคีย์สาธารณะได้
  - คีย์เด็กที่แข็งตัวใช้ดัชนีที่เป็นเลขคี่
  - คีย์เด็กปกติมีความปลอดภัยมากกว่าคีย์เด็กที่ผ่านการทำให้แข็งแกร่งแล้ว
explanation: |
  คีย์ลูกปกติสามารถสร้างได้จากคีย์สาธารณะของผู้ปกครอง ต่างจากคีย์ลูกที่มีการเข้ารหัสซึ่งต้องใช้คีย์ส่วนตัวของผู้ปกครอง
reviewed: false
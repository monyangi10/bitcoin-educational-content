question: Защо е рисковано да се използва ръчно generate ентропия за HD wallet?
answer: Тя може да въведе човешки слабости или предвидими пристрастия
wrong_answers:
  - Това води до невалидни публични ключове
  - Блокира получаването на частни ключове
  - Тя ограничава размера на генерираните мнемонични фрази
explanation: |
  Ръчното генериране на ентропия може да доведе до отклонения или грешки, което прави ключовете по-уязвими за атаки.

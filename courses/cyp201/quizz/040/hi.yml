question: HD Wallet के लिए मैन्युअली generate एन्ट्रॉपी करना जोखिम भरा क्यों है?
answer: यह इंसानी कमजोरियाँ या पूर्वानुमेय पक्षपात ला सकता है
wrong_answers:
  - इससे अमान्य सार्वजनिक कुंजियाँ (public keys) बनती हैं
  - यह प्राइवेट कीज़ को डेरिव होने से रोकता है
  - यह जनरेट किए गए Mnemonic वाक्यांशों के आकार को सीमित करता है
explanation: |
  मैन्युअली एन्ट्रॉपी जनरेट करने से बायस या एरर आ सकते हैं, जिससे कीज़ पर अटैक का खतरा बढ़ जाता है।
reviewed: false
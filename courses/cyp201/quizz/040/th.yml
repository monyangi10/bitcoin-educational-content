question: ทำไมถึงมีความเสี่ยงในการสร้าง generate entropy ด้วยตนเองสำหรับ HD wallet?
answer: มันสามารถแนะนำจุดอ่อนของมนุษย์หรืออคติที่คาดเดาได้
wrong_answers:
  - มันส่งผลให้เกิดคีย์สาธารณะที่ไม่ถูกต้อง
  - มันบล็อกการสร้างคีย์ส่วนตัว
  - มันจำกัดขนาดของวลีช่วยจำที่สร้างขึ้น
explanation: |
  การสร้างเอนโทรปีด้วยตนเองอาจทำให้เกิดอคติหรือข้อผิดพลาด ทำให้กุญแจมีความเสี่ยงต่อการถูกโจมตีมากขึ้น
reviewed: false
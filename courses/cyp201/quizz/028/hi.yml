question: स्क्नोर प्रोटोकॉल में कंप्रेस्ड पब्लिक की का साइज़ क्या होता है?
answer: ३२ बाइट्स
wrong_answers:
  - 33 बाइट्स
  - 64 बाइट्स
  - 128 बिट्स
explanation: |
  एक स्क्नोर पब्लिक की को सिर्फ़ एलिप्टिक कर्व पर बिंदु के एक्स-कोऑर्डिनेट से दिखाया जाता है, जिससे उसका साइज़ घटकर 32 बाइट्स हो जाता है।
reviewed: false
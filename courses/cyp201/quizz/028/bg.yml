question: Какъв е размерът на компресиран публичен ключ, използващ протокола Schnorr?
answer: 32 байта
wrong_answers:
  - 33 байта
  - 64 байта
  - 128 бита
explanation: |
  Публичният ключ на Шнорр е представен само от координатата x на точката върху елиптичната крива, което намалява размера му до 32 байта.
reviewed: false
question: Was ist die Hauptfunktion der Passphrase in einer Bitcoin-HD-Wallet?
answer: Die Ableitung des Schlüssels zu modifizieren, um die Sicherheit zu erhöhen
wrong_answers:
  - Ausstehende Transaktionen zu entschlüsseln
  - Die UTXOs der Wallet zu generieren
  - Zugriff auf die Wallet mit Gesichtserkennung schützen
explanation: |
  Die Passphrase fungiert als ein zweiter Sicherheitsfaktor, indem sie den Ableitungsseed des Schlüssels verändert, um den Zugriff auf die Wallet zu verhindern, falls die mnemonische Phrase kompromittiert wird.
reviewed: true

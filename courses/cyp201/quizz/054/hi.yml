question: passphrase का मुख्य रोल Bitcoin HD Wallet में क्या है?
answer: कुंजी व्युत्पत्ति को सुरक्षा बढ़ाने के लिए संशोधित करना
wrong_answers:
  - लंबित लेनदेन डिक्रिप्ट करें
  - जीडब्ल्यू-3 जीडब्ल्यू-4 के यूटीएक्सओ
  - Wallet एक्सेस को फेस आईडी से सुरक्षित करें
explanation: |
  passphrase दूसरे सुरक्षा फैक्टर की तरह काम करता है, seed की की डेरिवेशन को बदल देता है ताकि अगर Mnemonic फ्रेज़ कम्प्रोमाइज़ हो जाए तो Wallet तक एक्सेस रोका जा सके।
reviewed: false
question: Каква е основната роля на passphrase в Bitcoin HD wallet?
answer: Промяна на извеждането на ключове с цел повишаване на сигурността
wrong_answers:
  - Декриптиране на висящи транзакции
  - Генериране на UTXOs на wallet
  - Защита на достъпа до wallet с идентификатор на лице
explanation: |
  passphrase действа като втори фактор за сигурност, като променя извеждането на ключа seed, за да предотврати достъпа до wallet, в случай че мнемоничната фраза е компрометирана.
reviewed: false
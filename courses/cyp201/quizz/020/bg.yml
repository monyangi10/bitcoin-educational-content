question: Каква е разликата между компресиран и некомпресиран публичен ключ?
answer: Компресираният публичен ключ използва само координатата x и четността на y
wrong_answers:
  - Компресираният публичен ключ е по-сигурен
  - Компресираният публичен ключ използва само координатата y и четността на x
  - Компресираният публичен ключ изисква по-голям частен ключ
explanation: |
  Компресираният публичен ключ запазва само координатата x и един бит за четността на y, като по този начин намалява размера си до 33 байта.
reviewed: false
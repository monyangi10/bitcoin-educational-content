question: ความแตกต่างระหว่างคีย์สาธารณะที่ถูกบีบอัดและไม่ได้บีบอัดคืออะไร?
answer: คีย์สาธารณะที่ถูกบีบอัดใช้เพียงพิกัด x และความสมมาตรของ y
wrong_answers:
  - คีย์สาธารณะที่ถูกบีบอัดมีความปลอดภัยมากขึ้น
  - คีย์สาธารณะที่ถูกบีบอัดใช้เฉพาะพิกัด y และความสมมาตรของ x
  - คีย์สาธารณะที่ถูกบีบอัดต้องการคีย์ส่วนตัวที่ใหญ่กว่า
explanation: |
  คีย์สาธารณะที่ถูกบีบอัดจะเก็บเฉพาะพิกัด x และบิตสำหรับความเท่าเทียมกันของ y ทำให้ขนาดลดลงเหลือ 33 ไบต์
reviewed: false
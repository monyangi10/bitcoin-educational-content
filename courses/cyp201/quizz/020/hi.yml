question: एक कंप्रेस्ड और अनकंप्रेस्ड पब्लिक की में क्या अंतर है?
answer: कंप्रेस्ड पब्लिक की में सिर्फ x-कोऑर्डिनेट और y की पैरिटी (सम-विषम) का इस्तेमाल होता है
wrong_answers:
  - कंप्रेस्ड पब्लिक की अधिक सुरक्षित है
  - कंप्रेस्ड पब्लिक की सिर्फ y-कोऑर्डिनेट और x की पैरिटी (सम-विषम) का इस्तेमाल करता है
  - कंप्रेस्ड पब्लिक की को बड़े प्राइवेट की की जरूरत होती है
explanation: |
  एक कंप्रेस्ड पब्लिक की में सिर्फ x-कोऑर्डिनेट और y की पैरिटी के लिए एक बिट रहती है, जिससे इसका साइज़ घटकर 33 बाइट्स हो जाता है।

question: SegWit v0 खाते के लिए स्टैंडर्ड डिस्क्रिप्टर में कौन सा डेरिवेशन पाथ इस्तेमाल होता है?
answer: 84h/0h/0h
wrong_answers:
  - 44h/0h/0h को हिंदी में "चौवालीस घंटे/शून्य घंटे/शून्य घंटे" कहते हैं।
  - 86h/0h/0h
  - 84/0/0 को हिंदी में "चौरासी/शून्य/शून्य" कहेंगे।
explanation: |
  पथ 84h/0h/0h BIP84 में परिभाषित किया गया है, जो P2WPKH के साथ SegWit v0 पतों को डेरिव करने वाले अकाउंट के लिए है।
reviewed: false
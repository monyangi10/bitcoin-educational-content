question: Bitcoin के लॉन्च पर कौन सा डिजिटल सिग्नेचर अल्गोरिदम इस्तेमाल किया गया था?
answer: ईसीडीएसए (ECDSA)
wrong_answers:
  - स्नोर
  - आरएसए (RSA)
  - HMAC (हैश्ड मैसेज ऑथेंटिकेशन कोड)
explanation: |
  जीडब्ल्यू-1 ने शुरुआत में ईसीडीएसए (ECDSA) का इस्तेमाल किया था, जो एक अंडाकार वक्र (elliptic curve) पर आधारित सिग्नेचर प्रोटोकॉल है, 2021 में स्क्नोर सिग्नेचर्स (Schnorr signatures) के आने से पहले।
reviewed: false
question: ระดับความลึก 0 ในลำดับชั้นของกระเป๋าเงิน HD หมายถึงอะไร?
answer: กุญแจหลักและ chain code หลัก
wrong_answers:
  - โซ่ภายนอกของที่อยู่
  - บัญชีเริ่มต้น
  - ประเภทของสกุลเงิน
explanation: |
  ความลึก 0 สอดคล้องกับคีย์หลักและ chain code หลัก ซึ่งเป็นจุดเริ่มต้นสำหรับการสืบทอดทั้งหมดใน HD wallet
reviewed: false
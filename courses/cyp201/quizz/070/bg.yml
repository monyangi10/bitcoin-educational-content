question: Какво представлява дълбочина 0 в йерархията на HD портфейлите?
answer: Главният ключ и главният ключ chain code
wrong_answers:
  - Външната верига от адреси
  - Акаунтът по подразбиране
  - Вид на валутата
explanation: |
  Дълбочина 0 съответства на главния ключ и главния chain code, които са отправни точки за всички деривации в HD wallet.
reviewed: false
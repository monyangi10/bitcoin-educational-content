question: เอาต์พุตของฟังก์ชัน HMAC-SHA512 ที่ใช้กับ seed ถูกแบ่งออกเป็นกี่ส่วน?
answer: สองส่วนของ 256 บิต
wrong_answers:
  - หนึ่งส่วนเดียวของ 512 บิต
  - สามส่วนของ 170 บิต
  - สี่ส่วนของ 128 บิต
explanation: |
  เอาต์พุตของ HMAC-SHA512 ถูกแบ่งออกเป็นสองส่วน: คีย์ส่วนตัวหลัก (256 บิต) และ chain code หลัก (256 บิต)
reviewed: false
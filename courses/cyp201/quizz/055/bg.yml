question: На колко части е разделен изходът на функцията HMAC-SHA512, приложена към seed?
answer: Две части от 256 бита
wrong_answers:
  - Една единствена част от 512 бита
  - Три части от 170 бита
  - Четири части от 128 бита
explanation: |
  Изходът на HMAC-SHA512 е разделен на две части: главен частен ключ (256 бита) и главен chain code (256 бита).

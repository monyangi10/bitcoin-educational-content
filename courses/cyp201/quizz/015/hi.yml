question: Bitcoin पर UTXOs को लॉक करने के लिए किस तरह की कुंजी (key) का इस्तेमाल होता है?
answer: पब्लिक की
wrong_answers:
  - निजी कुंजी
  - जीडब्ल्यू-2 जीडब्ल्यू-1
  - जीडब्ल्यू-3 वाक्यांश
explanation: |
  UTXOs को एक पब्लिक की या उसके Hash से लॉक किया जाता है, और उसके मिलने वाले प्राइवेट की से अनलॉक किया जाता है।
reviewed: false
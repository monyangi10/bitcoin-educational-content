question: Каква е целта на мнемоничната фраза в Bitcoin HD wallet?
answer: За детерминистично извличане на всички ключове
wrong_answers:
  - Директно подписване на транзакции
  - Криптиране на адреси Bitcoin
  - За generate хеш за UTXOs
explanation: |
  Мнемоничната фраза позволява извеждането на всички частни и публични ключове в wallet, като по този начин улеснява архивирането и възстановяването.
reviewed: false
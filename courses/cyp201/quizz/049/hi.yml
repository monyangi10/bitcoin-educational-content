question: Mnemonic वाक्यांश का उद्देश्य Bitcoin HD Wallet में क्या है?
answer: सभी कुंजियों को निश्चित रूप से निकालने के लिए
wrong_answers:
  - लेन-देन पर सीधे हस्ताक्षर करने के लिए
  - Bitcoin पतों को एन्क्रिप्ट करने के लिए
  - generate से Hash को UTXOs के लिए
explanation: |
  Mnemonic वाक्यांश Wallet के सभी प्राइवेट और पब्लिक कीज़ को निकालने की अनुमति देता है, जिससे बैकअप और रिकवरी आसान हो जाती है।
reviewed: false
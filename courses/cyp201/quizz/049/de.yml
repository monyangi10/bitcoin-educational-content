question: Was ist der Zweck der mnemonischen Phrase in einer Bitcoin HD-Wallet?
answer: Alle Schlüssel deterministisch abzuleiten
wrong_answers:
  - Transaktionen direkt zu signieren
  - Bitcoin-Adressen zu verschlüsseln
  - Einen Hash für die UTXOs zu generieren
explanation: |
  Die mnemonische Phrase ermöglicht die Ableitung aller privaten und öffentlichen Schlüssel in einer Wallet, was die Sicherung und Wiederherstellung erleichtert.
reviewed: true

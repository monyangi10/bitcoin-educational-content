question: วัตถุประสงค์ของวลีช่วยจำใน Bitcoin HD wallet คืออะไร?
answer: เพื่อกำหนดอนุพันธ์ของคีย์ทั้งหมดอย่างแน่นอน
wrong_answers:
  - เพื่อลงนามธุรกรรมโดยตรง
  - ในการเข้ารหัสที่อยู่ Bitcoin
  - ถึง generate แฮชสำหรับ UTXOs
explanation: |
  วลีช่วยจำช่วยให้สามารถสร้างคีย์ส่วนตัวและคีย์สาธารณะทั้งหมดใน wallet ได้ จึงช่วยในการสำรองข้อมูลและกู้คืนข้อมูล
reviewed: false
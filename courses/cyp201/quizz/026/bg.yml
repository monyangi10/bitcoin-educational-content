question: Каква е началната точка за изчисляване на подпис ECDSA?
answer: Хешът на съобщението
wrong_answers:
  - Публичният ключ
  - Фиксиран код за сигурност
  - Елиптична крива по поръчка
explanation: |
  Подписването с ECDSA започва с изчисляване на хеша на подписваното съобщение, често с SHA256.
reviewed: false
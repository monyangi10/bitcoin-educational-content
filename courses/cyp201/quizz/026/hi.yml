question: ECDSA सिग्नेचर कैलकुलेट करने का स्टार्टिंग पॉइंट क्या है?
answer: संदेश Hash
wrong_answers:
  - पब्लिक की
  - एक फिक्स्ड Nonce
  - एक कस्टम एलिप्टिकल कर्व
explanation: |
  एक ECDSA सिग्नेचर की शुरुआत में, जिस मैसेज को साइन करना होता है, उसका Hash कैलकुलेट किया जाता है, जो अक्सर SHA256 के साथ होता है।
reviewed: false
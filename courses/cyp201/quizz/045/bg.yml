question: Каква е хеш функцията, използвана за изчисляване на контролната сума на мнемонична фраза?
answer: SHA256
wrong_answers:
  - RIPEMD160
  - SHA512
  - HASH256
explanation: |
  Контролната сума на мнемонична фраза се изчислява чрез прилагане на просто хеширане SHA256 върху ентропията.
reviewed: false
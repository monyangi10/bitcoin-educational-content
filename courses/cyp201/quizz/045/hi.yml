question: Hash फंक्शन का इस्तेमाल Mnemonic फ्रेज़ के चेकसम को कैलकुलेट करने के लिए कैसे किया जाता है?
answer: एस-एच-ए-256 (SHA256)
wrong_answers:
  - आरआईपीईएमडी160
  - एसएचए-512 (SHA-512)
  - हैश256
explanation: |
  Mnemonic वाक्यांश का चेकसम एक साधारण SHA256 Hash को एन्ट्रॉपी पर लागू करके निकाला जाता है।
reviewed: false
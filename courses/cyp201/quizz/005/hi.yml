question: SHA256 में अपरिवर्तनीयता (irreversibility) क्यों सुनिश्चित होती है?
answer: इस्तेमाल की गई प्रक्रियाएँ जानकारी हटा देती हैं और एकतरफा होती हैं
wrong_answers:
  - मैसेजेस को हैश करने से पहले एन्क्रिप्ट किया जाता है
  - बिट्स को बेतरतीब ढंग से फिर से व्यवस्थित किया जाता है
  - हर एक Hash को डेटाबेस में स्टोर किया जाता है
explanation: |
  ShR और XOR जैसे ऑपरेशन्स से शुरुआती स्टेट पर वापस लौटना नामुमकिन हो जाता है, जिससे यह प्रक्रिया बिल्कुल उलटी नहीं हो पाती।

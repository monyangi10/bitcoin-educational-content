question: เหตุใดการย้อนกลับไม่ได้จึงได้รับการรับรองใน SHA256?
answer: การดำเนินการที่ใช้ลบข้อมูลและเป็นแบบทางเดียว
wrong_answers:
  - ข้อความจะถูกเข้ารหัสก่อนการแฮช
  - บิตถูกจัดเรียงใหม่แบบสุ่ม
  - แต่ละแฮชถูกเก็บไว้ในฐานข้อมูล
explanation: |
  การดำเนินการเช่น ShR และ XOR ทำให้ไม่สามารถกลับสู่สถานะเริ่มต้นได้ ซึ่งรับประกันความไม่สามารถย้อนกลับได้
reviewed: false
question: Защо в SHA256 е осигурена необратимост?
answer: Използваните операции премахват информация и са еднопосочни
wrong_answers:
  - Съобщенията се криптират преди хеширане
  - Битовете се пренареждат на случаен принцип
  - Всеки хеш се съхранява в база данни
explanation: |
  Операции като ShR и XOR правят невъзможно връщането към първоначалното състояние, което гарантира необратимост.

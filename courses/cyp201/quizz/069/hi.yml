question: चाइल्ड कीज़ को डेरिव करने में चेन कोड का मुख्य रोल क्या है?
answer: एक्स्ट्रा एन्ट्रॉपी का स्रोत जोड़ें
wrong_answers:
  - पदानुक्रमिक गहराई की पहचान करें
  - बच्चों की चाबियों के इंडेक्स को स्टोर करो
  - Bitcoin प्रोटोकॉल के साथ संगतता सुनिश्चित करें
explanation: |
  चेन कोड का इस्तेमाल हर डेरिव्ड की के लिए एंट्रॉपी का एक अतिरिक्त और यूनीक सोर्स इंट्रोड्यूस करने के लिए किया जाता है।
reviewed: false
question: บทบาทหลักของ chain code ในการอนุพันธ์ของคีย์ลูกคืออะไร?
answer: แนะนำแหล่งที่มาของเอนโทรปีเพิ่มเติม
wrong_answers:
  - ระบุความลึกตามลำดับชั้น
  - จัดเก็บดัชนีของคีย์ลูก
  - ตรวจสอบความเข้ากันได้กับโปรโตคอล Bitcoin
explanation: |
  chain code ถูกใช้เพื่อแนะนำแหล่งที่มาของเอนโทรปีเพิ่มเติมและไม่ซ้ำกันสำหรับคีย์ที่ได้มาทุกคีย์
reviewed: false
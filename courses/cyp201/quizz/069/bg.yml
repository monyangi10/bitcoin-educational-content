question: Каква е основната роля на chain code при извличането на подчинени ключове?
answer: Въвеждане на допълнителен източник на ентропия
wrong_answers:
  - Определяне на йерархичната дълбочина
  - Съхраняване на индексите на подчинените ключове
  - Осигуряване на съвместимост с протокола Bitcoin
explanation: |
  chain code се използва за въвеждане на допълнителен и уникален източник на ентропия за всеки производен ключ.
reviewed: false
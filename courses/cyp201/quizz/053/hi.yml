question: अगर आपका passphrase (जो HD Wallet से जुड़ा हुआ है) खो जाए तो क्या होगा?
answer: तुम उस Wallet से जुड़े बिटकॉइन तक पहुँच खो देते हो
wrong_answers:
  - आप अभी भी Wallet को सिर्फ Mnemonic वाले फ्रेज़ से एक्सेस कर सकते हैं
  - आप passphrase को Bitcoin सपोर्ट से संपर्क करके रीसेट कर सकते हैं।
  - आप केवल अनकन्फर्म्ड ट्रांजैक्शन्स ही खोते हैं
explanation: |
  passphrase कुंजी व्युत्पत्ति में एक अहम हिस्सा है। इसके बिना, कुंजियों को दोबारा बनाना और इस तरह बिटकॉइन तक पहुंचना नामुमकिन है।

question: Какво се случва, ако загубите passphrase, свързан с вашия HD wallet?
answer: Губите достъп до биткойните, свързани с този wallet
wrong_answers:
  - Все още можете да получите достъп до wallet само с помощта на мнемоничната фраза
  - Можете да нулирате passphrase, като се свържете с поддръжката на Bitcoin
  - Губите само непотвърдените транзакции
explanation: |
  passphrase е съществен компонент при извличането на ключове. Без него е невъзможно да се пресъздадат ключовете и съответно да се получи достъп до биткойните.
reviewed: false
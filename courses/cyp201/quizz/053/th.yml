question: จะเกิดอะไรขึ้นหากคุณสูญเสีย passphrase ที่เชื่อมโยงกับ HD wallet ของคุณ?
answer: คุณสูญเสียการเข้าถึงบิตคอยน์ที่เชื่อมโยงกับ wallet นั้น
wrong_answers:
  - คุณยังสามารถเข้าถึง wallet ได้ด้วยวลีช่วยจำเพียงอย่างเดียว
  - คุณสามารถรีเซ็ต passphrase ได้โดยติดต่อฝ่ายสนับสนุน Bitcoin
  - คุณจะสูญเสียเฉพาะธุรกรรมที่ยังไม่ได้รับการยืนยันเท่านั้น
explanation: |
  passphrase เป็นส่วนประกอบที่สำคัญในการสร้างคีย์ใหม่ หากไม่มีมัน จะไม่สามารถสร้างคีย์ขึ้นมาใหม่ได้ และดังนั้นจึงไม่สามารถเข้าถึงบิตคอยน์ได้
reviewed: false
question: Was passiert, wenn du die Passphrase verlierst, die mit deiner HD-Wallet verbunden ist?
answer: Du verlierst den Zugang zu den Bitcoin, die mit dieser Wallet verknüpft sind.
wrong_answers:
  - Du kannst immer noch auf die Wallet nur mit der mnemonischen Phrase zugreifen
  - Du kannst die Passphrase zurücksetzen, indem du den Bitcoin-Support kontaktierst
  - Du verlierst nur die unbestätigten Transaktionen
explanation: |
  Die Passphrase ist ein wesentlicher Bestandteil in der Schlüsselableitung. Ohne sie ist es unmöglich, die Schlüssel neu zu erstellen und daher auf die Bitcoins zuzugreifen.
reviewed: true

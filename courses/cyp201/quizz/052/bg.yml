question: Каква е целта на използването на примамка wallet с passphrase?
answer: Симулиране на wallet с малко количество в случай на физическа принуда
wrong_answers:
  - Добавяне на автоматично архивиране на транзакциите
  - Генериране на допълнителна мнемонична фраза
  - Защита на UTXO от двойно увеличение на разходите
explanation: |
  Примамката wallet се използва за отвличане на вниманието на нападателя, като му се предоставя достъп до wallet, съдържащ малка сума биткойни.
reviewed: false
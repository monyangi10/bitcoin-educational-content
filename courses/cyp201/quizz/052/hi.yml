question: Wallet डिकॉय को passphrase के साथ इस्तेमाल करने का मकसद क्या है?
answer: Wallet को थोड़ी मात्रा में अनुकरण करने के लिए, अगर शारीरिक दबाव हो तो
wrong_answers:
  - लेन-देन का स्वचालित बैकअप जोड़ें
  - जीडब्ल्यू-4 एक अतिरिक्त जीडब्ल्यू-3 वाक्यांश
  - यूटीएक्सओ को डबल स्पेंड से बचाएं
explanation: |
  एक डिकॉय Wallet का इस्तेमाल हमलावर का ध्यान भटकाने के लिए किया जाता है, जिसमें थोड़ी मात्रा में बिटकॉइन वाला Wallet एक्सेस देकर उसे बेवकूफ बनाया जाता है।

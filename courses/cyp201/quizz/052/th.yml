question: วัตถุประสงค์ของการใช้ตัวล่อ wallet กับ passphrase คืออะไร?
answer: เพื่อจำลอง wallet ด้วยจำนวนเงินเล็กน้อยในกรณีที่มีการบังคับทางกายภาพ
wrong_answers:
  - เพิ่มการสำรองข้อมูลธุรกรรมอัตโนมัติ
  - สร้างวลีช่วยจำเพิ่มเติม
  - ป้องกัน UTXOs จากการใช้จ่ายซ้ำ
explanation: |
  wallet ตัวล่อถูกใช้เพื่อเบี่ยงเบนความสนใจของผู้โจมตีโดยการให้เข้าถึง wallet ที่มีบิตคอยน์จำนวนเล็กน้อย
reviewed: false
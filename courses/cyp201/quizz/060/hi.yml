question: ज़पब (zpub) प्रीफ़िक्स वाली चाबी एक **Zpub एक्सटेंडेड पब्लिक की (Extended Public Key)** होती है, जो आमतौर पर **Bitcoin वॉलेट्स** में इस्तेमाल होती है, खासकर **BIP-44, BIP-49, या BIP-84** स्टैंडर्ड्स के तहत। यह **HD (Hierarchical Deterministic) वॉलेट्स** में मास्टर पब्लिक की का एक एन्कोडेड वर्जन होता है, जिससे आप बिना प्राइवेट की के नए पते जेनरेट कर सकते हैं।  

- **BIP-84 (P2WPKH - Native SegWit)**: `zpub` वाली की का इस्तेमाल **Segregated Witness (bech32)** पते बनाने के लिए होता है, जैसे `bc1q...` वाले पते।  
- **BIP-49 (P2SH-P2WPKH - Nested SegWit)**: इसके लिए `ypub` प्रीफ़िक्स का इस्तेमाल होता है।  
- **BIP-44 (Legacy P2PKH)**: इसके लिए `xpub` प्रीफ़िक्स का इस्तेमाल होता है।  

अगर आपको कोई `zpub` की मिलती है, तो समझ जाइए कि यह **नए ज़माने के SegWit-सपोर्टेड वॉलेट्स** से जुड़ी हुई है!
answer: Mainnet पर SegWit V0 के लिए एक विस्तारित सार्वजनिक कुंजी
wrong_answers:
  - Mainnet पर SegWit V1 के लिए एक विस्तारित प्राइवेट की
  - Testnet पर लीगेसी के लिए एक विस्तारित पब्लिक की
  - Testnet पर SegWit V2 के लिए एक विस्तारित सार्वजनिक कुंजी
explanation: |
  zpub उपसर्ग Mainnet पर SegWit V0 स्क्रिप्ट्स के लिए एक एक्सटेंडेड पब्लिक की को दर्शाता है।

question: ความแปลกใหม่หลักของสคริปต์ P2WPKH เมื่อเทียบกับ P2PKH คืออะไร?
answer: ลายเซ็นถูกย้ายไปยังช่องพยาน
wrong_answers:
  - ที่อยู่ถูกเข้ารหัสใน base58check.
  - scriptPubKey รวมถึงแฮชของกุญแจส่วนตัว
  - P2WPKH ไม่เข้ากันกับ SegWit
explanation: |
  P2WPKH, แนะนำพร้อมกับ SegWit, ย้ายลายเซ็นไปยังส่วนแยกที่เรียกว่า พยาน เพื่อป้องกันการเปลี่ยนแปลงธุรกรรม.
question: Каква е основната новост на скриптовете на P2WPKH в сравнение с P2PKH?
answer: Подписите се преместват в полето Свидетел.
wrong_answers:
  - Адресите са кодирани в base58check.
  - В scriptPubKey се съдържа хешът на частния ключ.
  - P2WPKH е несъвместим с SegWit.
explanation: |
  P2WPKH, въведена с SegWit, премества подписите в отделен раздел, наречен "Свидетел", за да се предотврати фалшифицирането на транзакциите.
question: P2WPKH स्क्रिप्ट्स की मुख्य नवीनता P2PKH के मुकाबले क्या है?
answer: हस्ताक्षरों को गवाह फील्ड में ले जाया गया है।
wrong_answers:
  - पतों को base58check में एनकोड किया जाता है।
  - स्क्रिप्टपबकी में प्राइवेट की का Hash शामिल है।
  - जीडब्ल्यू-2, जीडब्ल्यू-3 के साथ कंपैटिबल नहीं है।
explanation: |
  P2WPKH, जिसे SegWit के साथ पेश किया गया है, हस्ताक्षरों को एक अलग सेक्शन "विटनेस" में शिफ्ट कर देता है ताकि ट्रांजैक्शन मैलिएबिलिटी को रोका जा सके।
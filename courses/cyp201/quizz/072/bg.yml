question: Какво означава апострофът (') или буквата h в пътя на деривация?
answer: Затвърдено извеждане
wrong_answers:
  - Нормално извеждане
  - Външно извеждане
  - Нестандартно извеждане
explanation: |
  Апострофът показва, че извеждането е защитено и изисква частен ключ на родителя, за да се получи ключът на детето.

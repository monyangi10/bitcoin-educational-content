question: डेरिवेशन पथ में एपोस्ट्रॉफी (') या 'h' का क्या मतलब होता है?
answer: एक कड़ा निष्कर्ष
wrong_answers:
  - एक साधारण व्युत्पत्ति
  - बाहरी व्युत्पत्ति
  - एक गैर-मानक व्युत्पत्ति
explanation: |
  एक apostrophe यह दर्शाता है कि derivation को hardened किया गया है, जिसके लिए parent private key की जरूरत होती है ताकि child key को generate किया जा सके।

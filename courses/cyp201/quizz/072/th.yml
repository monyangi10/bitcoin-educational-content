question: เครื่องหมายอะพอสทรอฟี (') หรือ h ในเส้นทางการอนุพันธ์หมายถึงอะไร?
answer: การสืบทอดที่แข็งแกร่ง
wrong_answers:
  - การอนุพันธ์ปกติ
  - การสืบทอดภายนอก
  - การอนุพันธ์ที่ไม่เป็นมาตรฐาน
explanation: |
  เครื่องหมายอะพอสทรอฟีบ่งบอกว่าการสืบทอดนั้นถูกทำให้แข็งแกร่งขึ้น ซึ่งจำเป็นต้องใช้คีย์ส่วนตัวของผู้ปกครองเพื่อ generate คีย์ลูก
reviewed: false
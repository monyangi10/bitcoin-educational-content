question: seed से मास्टर प्राइवेट की निकालने के लिए कौन सा कॉन्स्टेंट इस्तेमाल होता है?
answer: जीडब्ल्यू-1 जीडब्ल्यू-2
wrong_answers:
  - मास्टर की
  - एचडी जीडब्ल्यू-3 जीडब्ल्यू-4
  - जीडब्ल्यू-5 रूट
explanation: |
  Bitcoin seed कॉन्स्टेंट को HMAC-SHA512 फंक्शन में एक की के रूप में इस्तेमाल किया जाता है, जिससे मास्टर प्राइवेट की और मास्टर चेन कोड डिराइव किए जाते हैं।
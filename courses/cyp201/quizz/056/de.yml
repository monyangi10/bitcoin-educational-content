question: Welche Konstante wird verwendet, um den privaten Master-Schlüssel aus dem Seed abzuleiten?
answer: Bitcoin Seed
wrong_answers:
  - Master Key
  - HD-Wallet Seed
  - Blockchain Root
explanation: |
  Der Konstante Bitcoin Seed wird als Schlüssel in der HMAC-SHA512-Funktion verwendet, um den privaten Master-Schlüssel und den Master-Chain-Code abzuleiten.
reviewed: true

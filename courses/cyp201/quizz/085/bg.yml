question: Каква операция е необходима, за да се изчисли публичен ключ Q на Taproot?
answer: Добавяне на промяната tG към публичния ключ P
wrong_answers:
  - Умножаване на частния ключ p по коефициента на промяна
  - Hash публичния ключ P с SHA256
  - Конкатениране на промяната t и публичния ключ P
explanation: |
  Публичният ключ Taproot Q се получава, като към публичния ключ P се добави скаларното произведение на настройката t от генератора G.
reviewed: false
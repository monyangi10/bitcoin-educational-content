question: จำเป็นต้องใช้การดำเนินการใดในการคำนวณคีย์สาธารณะ Taproot Q?
answer: เพิ่มการปรับแต่ง tG ไปยังคีย์สาธารณะ P
wrong_answers:
  - คูณคีย์ส่วนตัว p ด้วยการปรับแต่ง
  - Hash กุญแจสาธารณะ P กับ SHA256
  - เชื่อมต่อการปรับแต่ง t และคีย์สาธารณะ P
explanation: |
  คีย์สาธารณะ Taproot Q ได้มาจากการบวกผลคูณสเกลาร์ของการปรับแต่ง t โดยตัวสร้าง G เข้ากับคีย์สาธารณะ P.
reviewed: false
question: Taproot पब्लिक की Q कैलकुलेट करने के लिए कौन सा ऑपरेशन करना ज़रूरी है?
answer: पब्लिक की P में ट्वीक tG जोड़ दो
wrong_answers:
  - प्राइवेट की 'p' को ट्वीक से गुणा करें
  - जीडब्ल्यू-1 पब्लिक की पी एसएचए256 के साथ
  - ट्वीक t और पब्लिक की P को जोड़ें
explanation: |
  Taproot पब्लिक की Q को पब्लिक की P में ट्वीक t और जनरेटर G के स्केलर प्रोडक्ट को जोड़कर प्राप्त किया जाता है।
reviewed: false
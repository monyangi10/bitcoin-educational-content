question: Какво ви позволява HD wallet в сравнение с JBOK wallet?
answer: Генериране на всички частни ключове от един seed
wrong_answers:
  - Повишаване на сигурността на цифровите подписи
  - Повторно използване на един и същ адрес за множество транзакции
  - Напълно избягване на използването на публични ключове
explanation: |
  HD портфейлите извличат всички частни ключове от уникален seed, което опростява архивирането и косвено подобрява поверителността.
reviewed: false
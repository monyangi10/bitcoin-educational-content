question: Šta vam omogućava HD Wallet u poređenju sa JBOK Wallet?
answer: generate svi privatni ključevi iz jednog seed
wrong_answers:
  - Povećajte sigurnost digitalnih potpisa
  - Ponovo koristiti isti Address za više transakcija
  - Potpuno izbegavajte korišćenje javnih ključeva
explanation: |

question: HD wallet ช่วยให้คุณทำอะไรได้บ้างเมื่อเทียบกับ JBOK wallet?
answer: สร้างคีย์ส่วนตัวทั้งหมดจาก seed เดียว
wrong_answers:
  - เพิ่มความปลอดภัยของลายเซ็นดิจิทัล
  - ใช้ที่อยู่เดียวกันสำหรับหลายธุรกรรม
  - หลีกเลี่ยงการใช้คีย์สาธารณะโดยสิ้นเชิง
explanation: |
  กระเป๋าเงิน HD สร้างคีย์ส่วนตัวทั้งหมดจาก seed ที่ไม่ซ้ำกัน ซึ่งช่วยให้การสำรองข้อมูลง่ายขึ้นและปรับปรุงความเป็นส่วนตัวทางอ้อม
reviewed: false
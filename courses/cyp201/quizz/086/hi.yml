question: SegWit v0 पतों के लिए बेच32 में एनकोडेड चेकसम की गणना कैसे की जाती है?
answer: बीसीएच कोड्स का उपयोग करना
wrong_answers:
  - HASH256 को दो बार लगाकर
  - RIPEMD160 Hash को जोड़कर
  - बेस64 में सीधे एन्कोड करके
explanation: |
  बीच32 एड्रेस चेकसम कैलकुलेट करने के लिए बीसीएच कोड्स का इस्तेमाल करते हैं।
reviewed: false
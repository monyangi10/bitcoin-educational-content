question: Как се изчислява контролната сума за адресите SegWit v0, кодирани в bech32?
answer: Използване на BCH кодове
wrong_answers:
  - Чрез двукратно прилагане на HASH256
  - Чрез добавяне на хеш RIPEMD160
  - Чрез директно кодиране в base64
explanation: |
  Адресите Bech32 използват BCH кодове за изчисляване на контролната сума.
reviewed: false
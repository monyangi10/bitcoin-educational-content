question: Was ist die Hauptaufgabe einer Bitcoin-Wallet?
answer: Verwalten und Sichern von privaten Schlüsseln
wrong_answers:
  - Die Bitcoin des Benutzers speichern
  - Die Vertraulichkeit von Transaktionen automatisch zu gewährleisten
  - Für jeden Benutzer Bitcoins zu generieren
explanation: |
  Eine Bitcoin-Wallet speichert nicht direkt Bitcoins, sondern verwaltet die privaten Schlüssel, die notwendig sind, um die UTXOs zu entsperren, die die Bitcoin repräsentieren.
reviewed: true

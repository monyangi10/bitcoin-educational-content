question: บทบาทหลักของ Bitcoin wallet คืออะไร?
answer: จัดการและรักษาความปลอดภัยของคีย์ส่วนตัว
wrong_answers:
  - จัดเก็บบิตคอยน์ของผู้ใช้
  - รับรองความลับของธุรกรรมโดยอัตโนมัติ
  - สร้างบิตคอยน์สำหรับผู้ใช้แต่ละคน
explanation: |
  Bitcoin wallet ไม่ได้เก็บบิตคอยน์โดยตรง แต่จัดการคีย์ส่วนตัวที่จำเป็นในการปลดล็อก UTXOs ที่เป็นตัวแทนของบิตคอยน์
reviewed: false
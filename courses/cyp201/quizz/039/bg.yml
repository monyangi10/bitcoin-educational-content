question: Каква е основната роля на Bitcoin wallet?
answer: Управление и защита на частни ключове
wrong_answers:
  - Съхраняване на биткойните на потребителя
  - Автоматично осигуряване на поверителността на транзакциите
  - Генериране на биткойни за всеки потребител
explanation: |
  Bitcoin wallet не съхранява директно биткойни, а управлява частните ключове, необходими за отключване на UTXO, които представляват биткойните.
reviewed: false
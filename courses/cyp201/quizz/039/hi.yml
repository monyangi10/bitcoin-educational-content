question: Bitcoin और Wallet का मुख्य रोल क्या है?
answer: प्राइवेट कीज़ को मैनेज और सुरक्षित करें
wrong_answers:
  - उपयोगकर्ता के बिटकॉइन्स को स्टोर करें
  - लेन-देन की गोपनीयता स्वचालित रूप से सुनिश्चित करें
  - जीडब्ल्यू-2 बिटकॉइन हर यूज़र को
explanation: |
  Bitcoin और Wallet सीधे तौर पर बिटकॉइन्स को स्टोर नहीं करते, बल्कि UTXOs को अनलॉक करने के लिए ज़रूरी प्राइवेट कीज़ को मैनेज करते हैं जो बिटकॉइन्स को रिप्रेजेंट करते हैं।
reviewed: false
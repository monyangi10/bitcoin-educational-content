question: Bitcoin और Address को दोबारा इस्तेमाल करने की सलाह क्यों नहीं दी जाती?
answer: यह तीसरे पक्षों द्वारा लेन-देन को ट्रैक करने में सुविधा प्रदान करता है
wrong_answers:
  - यह Nonce की वजह से प्राइवेट की को उजागर कर देता है।
  - इससे लेन-देन महंगा हो जाता है
  - यह डिजिटल सिग्नेचर को अमान्य कर देता है
explanation: |
  Address को दोबारा इस्तेमाल करने से ऑब्ज़र्वर्स को अलग-अलग ट्रांज़ैक्शन्स को एक ही यूज़र से जोड़ने में आसानी हो जाती है, जिससे उनकी प्राइवेसी ख़तरे में पड़ जाती है।

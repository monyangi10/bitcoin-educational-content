question: Защо не се препоръчва повторно използване на адрес Bitcoin?
answer: Улеснява проследяването на транзакции от трети страни
wrong_answers:
  - Той разкрива частния ключ поради нонсе
  - Това оскъпява транзакциите
  - Той прави невалидни цифровите подписи
explanation: |
  Повторното използване на адреса позволява на наблюдателите лесно да свържат различни транзакции с един и същ потребител, като по този начин застрашават неприкосновеността на личния му живот.

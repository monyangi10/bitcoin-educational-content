question: ทำไมถึงไม่แนะนำให้ใช้ที่อยู่ Bitcoin ซ้ำ?
answer: มันช่วยให้การติดตามธุรกรรมโดยบุคคลที่สามเป็นไปได้ง่ายขึ้น
wrong_answers:
  - มันเปิดเผยคีย์ส่วนตัวเนื่องจาก nonce
  - มันทำให้การทำธุรกรรมมีราคาแพงขึ้น
  - มันทำให้ลายเซ็นดิจิทัลเป็นโมฆะ
explanation: |
  การใช้ที่อยู่ซ้ำทำให้ผู้สังเกตการณ์สามารถเชื่อมโยงธุรกรรมต่าง ๆ กับผู้ใช้คนเดียวกันได้อย่างง่ายดาย ซึ่งเป็นการละเมิดความเป็นส่วนตัวของพวกเขา
reviewed: false
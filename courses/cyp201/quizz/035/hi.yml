question: कौन सा Bitcoin मानक हायरार्किकल डिटरमिनिस्टिक वॉलेट्स (hierarchical deterministic wallets) को पेश करता है?
answer: BIP32 को हिंदी में "बिटकॉइन इम्प्रूवमेंट प्रोपोज़ल 32" कहा जाता है। यह एक तकनीकी मानक है जो हायरार्किकल डिटरमिनिस्टिक वॉलेट्स (HD वॉलेट्स) को परिभाषित करता है, जिससे एक मास्टर की से कई चाइल्ड कीज़ जनरेट की जा सकती हैं। यह बिटकॉइन और अन्य क्रिप्टोकरेंसी वॉलेट्स में सुरक्षा और उपयोगिता को बढ़ाता है।
wrong_answers:
  - BIP39 (बीआईपी39)
  - BIP44 (बिटकॉइन इम्प्रूवमेंट प्रोपोजल 44) एक स्टैंडर्ड है जो क्रिप्टोकरेंसी वॉलेट्स के लिए हायरार्किक डिटर्मिनिस्टिक (HD) वॉलेट स्ट्रक्चर को डिफाइन करता है। यह यूजर्स को एक ही मास्टर सीड से मल्टीपल अकाउंट्स और एड्रेसेस जनरेट करने की अनुमति देता है, जिससे फंड मैनेजमेंट और ट्रांजैक्शन ऑर्गनाइजेशन आसान हो जाता है। BIP44 खास तौर पर बिटकॉइन और अन्य क्रिप्टोकरेंसीज के लिए इस्तेमाल होता है।
  - BIP141 को हिंदी में "BIP141" ही कहा जाता है, क्योंकि यह एक तकनीकी शब्द है जिसका हिंदी में कोई सीधा अनुवाद नहीं होता। यह बिटकॉइन इम्प्रूवमेंट प्रोपोजल (Bitcoin Improvement Proposal) का हिस्सा है, जो सेगविट (SegWit) अपग्रेड से जुड़ा हुआ है।
explanation: |
  BIP32 HD वॉलेट्स के ऑपरेशन को डिफाइन करता है, जो seed से प्राइवेट कीज़ को हायरार्किकल तरीके से डेरिव करने की अनुमति देता है।

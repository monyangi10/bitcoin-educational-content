question: Каква е основната разлика между passphrase и PIN код за Bitcoin wallet?
answer: passphrase модифицира извеждането на ключа, а не ПИН кода
wrong_answers:
  - ПИН кодът е свързан с мнемоничната фраза
  - ПИН кодът се използва за криптиране на трансакции, но не и на passphrase
  - ПИН кодът генерира адреси Bitcoin
explanation: |
  За разлика от ПИН кода, passphrase участва пряко в процеса на извличане на ключове и променя ключовете на wallet.

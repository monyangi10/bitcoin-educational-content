question: Jaka jest główna różnica między passphrase a kodem PIN dla Bitcoin Wallet?
answer: passphrase modyfikuje wyprowadzenie klucza, a nie kod PIN
wrong_answers:
  - Kod PIN jest powiązany z frazą Mnemonic
  - Kod PIN jest używany do szyfrowania transakcji, ale nie passphrase
  - Kod PIN generuje adresy Bitcoin
explanation: |
  W przeciwieństwie do kodu PIN, passphrase jest bezpośrednio zaangażowany w proces wyprowadzania klucza i zmienia klucze Wallet.
reviewed: false
question: ทำไมตัวบรรยายถึงมีประโยชน์เป็นพิเศษสำหรับกระเป๋าเงินหลายลายเซ็น?
answer: พวกเขารวมถึง xpub ของแต่ละปัจจัยและอธิบายโครงสร้าง multisignature
wrong_answers:
  - พวกเขากำจัดความจำเป็นในการใช้วลีช่วยจำ
  - พวกเขาทำให้การสร้างคีย์ที่แข็งแกร่งง่ายขึ้น
  - พวกเขาทำให้ลายเซ็นหลายตัวเข้ากันได้กับทุกสคริปต์
explanation: |
  คำอธิบายประกอบรวมถึงคีย์สาธารณะที่ขยายออกของผู้เข้าร่วมทั้งหมด ซึ่งช่วยในการกู้คืนและจัดการการตั้งค่าลายเซ็นหลายตัว
reviewed: false
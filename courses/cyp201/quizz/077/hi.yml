question: डिस्क्रिप्टर्स मल्टीसिग्नेचर वॉलेट्स के लिए खासतौर पर क्यों उपयोगी होते हैं?
answer: वे हर फैक्टर का xpub शामिल करते हैं और मल्टीसिग्नेचर स्ट्रक्चर को डिस्क्राइब करते हैं
wrong_answers:
  - वे Mnemonic वाक्यांश की ज़रूरत को ख़त्म कर देते हैं
  - वे हार्डन्ड कीज़ को जनरेट करने को आसान बना देते हैं
  - वे सभी स्क्रिप्ट्स के साथ मल्टीसिग्नेचर्स को संगत बनाते हैं।
explanation: |
  डिस्क्रिप्टर्स में सभी भागीदारों के एक्सटेंडेड पब्लिक कीज़ शामिल होती हैं, जो मल्टीसिग्नेचर कॉन्फ़िगरेशन को पुनर्स्थापित और प्रबंधित करने में सुविधा प्रदान करती है।
reviewed: false
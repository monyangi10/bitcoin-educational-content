question: Защо дескрипторите са особено полезни за портфейлите с много подписи?
answer: Те включват xpub на всеки фактор и описват многозначната структура
wrong_answers:
  - Те премахват необходимостта от мнемонична фраза
  - Те опростяват генерирането на защитени ключове
  - Те правят мултиподписите съвместими с всички скриптове
explanation: |
  Дескрипторите включват разширените публични ключове на всички участници, което улеснява възстановяването и управлението на конфигурации с множество подписи.
reviewed: false
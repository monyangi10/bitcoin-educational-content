question: वह मॉडिफायर क्या है जिसे बेसिक साइहैश फ्लैग्स के साथ जोड़ा जा सकता है?
answer: साइनहैश_कोईभीभुगतानकरसकताहै
wrong_answers:
  - साइहैश_नोआउटपुट
  - साइनहैश_ऑल_पार्टिसिपेंट्स
  - साइहैश_नॉनस्टैंडर्ड
explanation: |
  SIGHASH_ANYONECANPAY सिगहैश फ्लैग्स को बदल देता है ताकि वह सिर्फ एक इनपुट को कवर करे और बाकी को बदला जा सके।
reviewed: false
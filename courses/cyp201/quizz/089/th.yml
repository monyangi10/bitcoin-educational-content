question: ขั้นตอนใดที่เกิดขึ้นก่อนการใช้ HASH160 ในการสร้างที่อยู่ SegWit v0?
answer: การบีบอัดคีย์สาธารณะ
wrong_answers:
  - การเพิ่มค่าเช็คซัม
  - การแปลงเป็นรูปแบบ bech32
  - การเข้ารหัสใน base58check
explanation: |
  คีย์สาธารณะต้องถูกบีบอัดเพื่อลดขนาดก่อนที่จะผ่านฟังก์ชันแฮช HASH160
reviewed: false
question: Коя стъпка предхожда прилагането на HASH160 при генерирането на адрес SegWit v0?
answer: Компресирането на публичния ключ
wrong_answers:
  - Добавяне на контролната сума
  - Конвертиране във формат bech32
  - Кодиране в base58check
explanation: |
  Публичният ключ трябва да бъде компресиран, за да се намали неговият размер, преди да премине през хеш функцията HASH160.
reviewed: false
question: SegWit v0 Address जनरेशन में HASH160 लगाने से पहले कौन सा स्टेप आता है?
answer: पब्लिक की का संपीड़न
wrong_answers:
  - चेकसम जोड़ना
  - बीच32 फॉर्मेट में कन्वर्ज़न
  - बेस58चेक में एन्कोडिंग
explanation: |
  पब्लिक की को HASH160 Hash फंक्शन से पहले उसका साइज़ कम करने के लिए कंप्रेस्ड किया जाना चाहिए।
reviewed: false
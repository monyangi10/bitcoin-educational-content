question: SHA256 इनपुट मैसेज पर प्रीप्रोसेसिंग क्यों लागू करता है?
answer: 512 बिट्स की गुणज लंबाई सुनिश्चित करने के लिए
wrong_answers:
  - संदेश की सच्चाई जांचने के लिए
  - डेटा को हैश करने से पहले एन्क्रिप्ट करें
  - जेनरेट किए गए हैशेस का साइज़ बढ़ाने के लिए
explanation: |
  प्रीप्रोसेसिंग में मैसेज की लंबाई को एडजस्ट करने के लिए पैडिंग बिट्स और उसकी लंबाई का बाइनरी रिप्रेजेंटेशन जोड़ा जाता है।
reviewed: false
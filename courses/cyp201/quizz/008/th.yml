question: ทำไม SHA256 ถึงใช้การประมวลผลล่วงหน้ากับข้อความที่ป้อนเข้า?
answer: เพื่อให้แน่ใจว่ามีความยาวเป็นทวีคูณของ 512 บิต
wrong_answers:
  - เพื่อตรวจสอบความสมบูรณ์ของข้อความ
  - เข้ารหัสข้อมูลก่อนการแฮช
  - เพื่อเพิ่มขนาดของแฮชที่สร้างขึ้น
explanation: |
  การประมวลผลล่วงหน้าปรับความยาวของข้อความโดยการเพิ่มบิตเติมและการแทนค่าความยาวในรูปแบบไบนารี
reviewed: false
question: Защо SHA256 прилага предварителна обработка на входното съобщение?
answer: За да се осигури дължина, кратна на 512 бита
wrong_answers:
  - Проверка на целостта на съобщението
  - Криптиране на данните преди хеширане
  - Увеличаване на размера на генерираните хешове
explanation: |
  Предварителната обработка коригира дължината на съобщението чрез добавяне на подпълващи битове и двоично представяне на неговата дължина.
reviewed: false
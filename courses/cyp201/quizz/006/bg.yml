question: Какво се случва по време на всеки кръг на компресиране в SHA256?
answer: Променливите на състоянието се актуализират от думите на съобщението и константите
wrong_answers:
  - Окончателният хеш се генерира постепенно след всеки кръг
  - Битовете на съобщението се пренареждат
  - Първоначалните стойности на променливите остават непроменени
explanation: |
  Всеки рунд модифицира променливите на състоянието, като използва думи, константи и логически операции за разпространение на информацията.

question: SHA256 में हर कंप्रेशन राउंड के दौरान क्या होता है?  

1. **मैसेज शेड्यूलिंग (Message Scheduling):**  
   - 512-बिट के ब्लॉक को 16, 32-बिट वर्ड्स में बाँटा जाता है।  
   - फिर इन्हें एक्सपेंड करके 64 वर्ड्स (W₀ से W₆₃) बनाए जाते हैं।  

2. **कंप्रेशन फंक्शन (Compression Function):**  
   - 8 वर्किंग वेरिएबल्स (a से h) को इनिशियल हैश वैल्यूज़ (Hⁱ⁻¹) से इनिशियलाइज़ किया जाता है।  
   - हर राउंड में:  
     - **Ch (Choose):** `(e AND f) XOR ((NOT e) AND g)`  
     - **Maj (Majority):** `(a AND b) XOR (a AND c) XOR (b AND c)`  
     - **Σ₀ (Sigma0):** `ROTR²(a) XOR ROTR¹³(a) XOR ROTR²²(a)`  
     - **Σ₁ (Sigma1):** `ROTR⁶(e) XOR ROTR¹¹(e) XOR ROTR²⁵(e)`  
     - **Temporary वैल्यूज़:**  
       - `T1 = h + Σ₁ + Ch + Kₜ + Wₜ`  
       - `T2 = Σ₀ + Maj`  
     - **वेरिएबल्स अपडेट:**  
       - `h = g`, `g = f`, `f = e`, `e = d + T1`  
       - `d = c`, `c = b`, `b = a`, `a = T1 + T2`  

3. **फाइनल हैश अपडेट:**  
   - 64 राउंड्स के बाद, नए हैश (Hⁱ) को पुराने हैश (Hⁱ⁻¹) के साथ जोड़ा जाता है:  
     `Hⁱ = Hⁱ⁻¹ + (a, b, c, d, e, f, g, h)`  

यह प्रोसेस हर 512-बिट ब्लॉक के लिए दोहराई जाती है, जब तक पूरा मैसेज प्रोसेस नहीं हो जाता।
answer: राज्य चर को संदेश शब्दों और स्थिरांकों से अद्यतन किया जाता है
wrong_answers:
  - अंतिम Hash हर राउंड के बाद धीरे-धीरे बनता जाता है
  - संदेश के बिट्स को फिर से व्यवस्थित किया जाता है
  - वेरिएबल्स के शुरुआती मान अपरिवर्तित रहते हैं
explanation: |
  हर राउंड में स्टेट वेरिएबल्स को शब्दों, कॉन्स्टेंट्स और लॉजिकल ऑपरेशंस का इस्तेमाल करके मॉडिफाई किया जाता है, जिससे इनफॉर्मेशन फैलती है।

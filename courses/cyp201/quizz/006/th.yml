question: เกิดอะไรขึ้นในแต่ละรอบการบีบอัดใน SHA256?
answer: ตัวแปรสถานะจะถูกอัปเดตจากคำในข้อความและค่าคงที่
wrong_answers:
  - แฮชสุดท้ายถูกสร้างขึ้นอย่างต่อเนื่องหลังจากแต่ละรอบ
  - บิตข้อความถูกจัดเรียงใหม่
  - ค่าเริ่มต้นของตัวแปรยังคงไม่เปลี่ยนแปลง
explanation: |
  แต่ละรอบจะปรับเปลี่ยนตัวแปรสถานะโดยใช้คำ, ค่าคงที่, และการดำเนินการทางตรรกะเพื่อกระจายข้อมูล
reviewed: false
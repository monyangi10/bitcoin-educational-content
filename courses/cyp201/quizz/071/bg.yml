question: В коя дълбочина на пътя на деривация се задава типът валута?
answer: Дълбочина 2
wrong_answers:
  - Дълбочина 1
  - Дълбочина 3
  - Дълбочина 4
explanation: |
  Дълбочина 2 се използва за идентифициране на валутата в портфейли с няколко валути, например Bitcoin (индекс 0') или Litecoin (индекс 2').
reviewed: false
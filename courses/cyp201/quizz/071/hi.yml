question: डेरिवेशन पथ में कौन सी गहराई करेंसी टाइप को स्पेसिफाई करती है?
answer: गहराई 2
wrong_answers:
  - गहराई 1
  - गहराई 3
  - गहराई 4
explanation: |
  डेप्थ 2 का इस्तेमाल मल्टी-करेंसी वॉलेट्स में करेंसी की पहचान के लिए किया जाता है, जैसे कि Bitcoin (इंडेक्स 0') या Litecoin (इंडेक्स 2')।
reviewed: false
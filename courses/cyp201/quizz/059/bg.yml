question: Каква е ролята на seed в Bitcoin HD wallet?
answer: Да служи като отправна точка за извеждане на всички ключове
wrong_answers:
  - Съхраняване на транзакциите на wallet
  - Директно generate на главния публичен ключ
  - Гарантиране на поверителността на транзакциите
explanation: |
  seed е 512-битова последователност, получена от мнемоничната фраза и passphrase. Тя е в основата на всички ключове в wallet.

question: seed की भूमिका Bitcoin HD Wallet में क्या है?
answer: सभी कुंजियों (keys) के व्युत्पत्ति (derivation) का प्रारंभिक बिंदु (starting point) के रूप में कार्य करना
wrong_answers:
  - Wallet के लेन-देन को स्टोर करें
  - सीधे generate मास्टर पब्लिक की
  - लेन-देन की गोपनीयता सुनिश्चित करें
explanation: |
  seed एक 512-बिट का सीक्वेंस है जो Mnemonic फ्रेज़ और passphrase से लिया गया है। यह Wallet में सभी कुंजियों (कीज़) का आधार बनाता है।

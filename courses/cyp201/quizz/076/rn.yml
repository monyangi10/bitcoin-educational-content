question: None ikimenyetso **kiri muri Descriptor gihuye n'iki?**
answer: Ku ruzitiro rw'inyuma n'urw'imbere n'urutonde rw'inkomoko
wrong_answers:
  - Ku bijanye n’imikono myinshi yatoranijwe Address.
  - Ku mubare wo gusuzuma inzira z'inkomoko
  - Ku nzira ikomeye y'inkomoko
explanation: |
  Igiharuro /<0;1>/* kigaragaza ko Descriptor ishobora generate amaderesi y'uruzitiro rw'inyuma (0) n'urw'imbere (1), n'urutonde rw'ivyo bikomokako bivuye ku kimenyetso (*).

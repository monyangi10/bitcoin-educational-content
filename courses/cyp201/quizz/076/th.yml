question: สัญกรณ์ /<0;1>/* ในตัวบรรยายสอดคล้องกับอะไร?
answer: ถึงโซ่ภายนอกและภายในด้วยการสืบทอดตามลำดับ
wrong_answers:
  - ไปยังที่อยู่ multisignature ที่เรียงลำดับแล้ว
  - ไปยังการตรวจสอบผลรวมสำหรับเส้นทางการอนุพันธ์
  - ไปยังเส้นทางการอนุพันธ์ที่แข็งแกร่ง
explanation: |
  สัญลักษณ์ /<0;1>/* บ่งชี้ว่าตัวบรรยายสามารถ generate ที่อยู่สำหรับเครือข่ายภายนอก (0) และภายใน (1) ด้วยการสืบทอดตามลำดับด้วยเครื่องหมายตัวแทน (*)
reviewed: false
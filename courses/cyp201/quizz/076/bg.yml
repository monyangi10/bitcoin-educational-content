question: На какво съответства обозначението /<0;1>/* в дескриптор?
answer: Към външната и вътрешната верига с последователна деривация
wrong_answers:
  - Към сортиран адрес с много подписи
  - За контролна сума за пътищата на деривация
  - Към подсилен път на деривация
explanation: |
  Обозначението /<0;1>/* показва, че дескрипторът може да generate адреси за външната (0) и вътрешната (1) верига, с последователно извеждане благодарение на символа за заместване (*).
reviewed: false
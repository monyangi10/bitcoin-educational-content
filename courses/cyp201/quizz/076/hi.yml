question: डिस्क्रिप्टर में नोटेशन /<0;1>/* क्या दर्शाता है?
answer: बाहरी और आंतरिक श्रृंखला को क्रमिक व्युत्पत्ति के साथ
wrong_answers:
  - एक सॉर्टेड मल्टीसिग्नेचर Address को
  - डेरिवेशन पथ के लिए एक चेकसम
  - एक कड़े डेरिवेशन पथ पर
explanation: |
  नोटेशन /<0;1>/* इंगित करता है कि डिस्क्रिप्टर बाहरी (0) और आंतरिक (1) चेन के लिए generate पतों का उपयोग कर सकता है, जहां वाइल्डकार्ड (*) की मदद से अनुक्रमिक डेरिवेशन संभव है।
reviewed: false
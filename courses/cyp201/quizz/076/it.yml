question: A cosa corrisponde la notazione /<0;1>/* in un descriptor?
answer: Alla chain esterna e interna con derivazione sequenziale
wrong_answers:
  - A un indirizzo multisig ordinato
  - A un checksum per derivation path
  - A un percorso di derivazione hardened
explanation: |
  La notazione /<0;1>/* indica che il descriptor può generare indirizzi per la chain esterna (0) e interna (1), con derivazione sequenziale grazie al carattere jolly (*).
reviewed: false
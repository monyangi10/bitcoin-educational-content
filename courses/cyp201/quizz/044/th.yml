question: Entropy ในบริบทของการเข้ารหัสลับคืออะไร?
answer: การวัดความไม่แน่นอนที่เกี่ยวข้องกับกระบวนการสุ่ม
wrong_answers:
  - วิธีการเข้ารหัสข้อมูลที่ละเอียดอ่อน
  - อัลกอริทึมสำหรับการคำนวณคีย์สาธารณะ
  - เทคนิคการบีบอัดข้อมูล
explanation: |
  ในวิทยาการเข้ารหัสลับ เอนโทรปีจะวัดระดับของความไม่แน่นอนหรือความวุ่นวายในแหล่งข้อมูลแบบสุ่ม ซึ่งจำเป็นสำหรับการสร้างกุญแจที่ปลอดภัย
reviewed: false
question: क्रिप्टोग्राफी के संदर्भ में एन्ट्रॉपी क्या है?
answer: एक अनियमित प्रक्रिया से जुड़ी अप्रत्याशितता का एक माप
wrong_answers:
  - संवेदनशील डेटा को एन्क्रिप्ट करने का एक तरीका
  - पब्लिक की कैलकुलेट करने का एक एल्गोरिदम
  - एक डेटा कंप्रेशन तकनीक
explanation: |
  क्रिप्टोग्राफी में, एन्ट्रॉपी यादृच्छिक स्रोत में अनिश्चितता या अराजकता के स्तर को मापती है, जो सुरक्षित कुंजी बनाने के लिए जरूरी है।

question: Какво представлява ентропията в контекста на криптографията?
answer: Мярка за непредсказуемост, свързана със случаен процес
wrong_answers:
  - Метод за криптиране на чувствителни данни
  - Алгоритъм за изчисляване на публични ключове
  - Техника за компресиране на данни
explanation: |
  В криптографията ентропията определя количествено нивото на несигурност или хаос в случайния източник, което е от съществено значение за генерирането на сигурни ключове.

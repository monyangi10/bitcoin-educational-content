question: Какво е ограничението за получаване на дъщерен публичен ключ от родителски публичен ключ?
answer: Ключът на детето трябва да е нормален
wrong_answers:
  - Ключът на детето трябва да бъде подсилен
  - chain code трябва да е идентичен с този на родителския ключ
  - Процесът трябва да включва частния ключ на родителя
explanation: |
  Подчинен публичен ключ може да бъде получен от родителски публичен ключ само ако той е нормален, а не защитен.

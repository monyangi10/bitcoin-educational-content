question: बालक (चाइल्ड) पब्लिक की को पैरेंट पब्लिक की से डेरिव करने के लिए क्या शर्त होती है?
answer: बच्चे की चाबी सामान्य होनी चाहिए
wrong_answers:
  - बच्चे की चाबी को मजबूत बनाना होगा
  - चेन कोड पैरेंट की के बराबर होना चाहिए
  - प्रक्रिया में माता-पिता का प्राइवेट की (private key) शामिल होना चाहिए
explanation: |
  एक बच्चे की पब्लिक कुंजी केवल तभी मूल पब्लिक कुंजी से प्राप्त की जा सकती है जब वह सामान्य हो, न कि हार्डन्ड।
reviewed: false
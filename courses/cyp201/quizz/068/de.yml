question: Was ist die Einschränkung für die Ableitung eines öffentlichen Kind-Schlüssels von einem öffentlichen Eltern-Schlüssel?
answer: Der Kind-Schlüssel muss normal sein
wrong_answers:
  - Der Kind-Schlüssel muss gehärtet sein
  - Der Chain-Code muss identisch mit dem des Eltern-Schlüssels sein
  - Der Prozess muss den Eltern-Privatschlüssel beinhalten
explanation: |
  Ein öffentlichen Eltern-Schlüssel kann nur von einem Eltern-Öffentlichen-Schlüssel abgeleitet werden, wenn er normal und nicht gehärtet ist.
reviewed: true
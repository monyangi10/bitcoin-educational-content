question: ข้อจำกัดในการสร้างคีย์สาธารณะของลูกจากคีย์สาธารณะของพ่อแม่คืออะไร?
answer: คีย์ของเด็กต้องเป็นปกติ
wrong_answers:
  - คีย์ของเด็กต้องได้รับการทำให้แข็งแกร่ง
  - chain code ต้องเหมือนกับคีย์หลักทุกประการ
  - กระบวนการต้องรวมถึงคีย์ส่วนตัวของผู้ปกครอง
explanation: |
  คีย์สาธารณะของลูกสามารถสร้างได้จากคีย์สาธารณะของพ่อแม่ก็ต่อเมื่อมันเป็นแบบปกติ ไม่ใช่แบบฮาร์ดเดนเท่านั้น
reviewed: false
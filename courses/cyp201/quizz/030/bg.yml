question: Каква е целта на SIGHASH_SINGLE?
answer: Обхващане на един вход и съответния му изход
wrong_answers:
  - Да се обхванат всички входове и изходи
  - За покриване само на входовете
  - Покриване на всички изходи с изключение на един
explanation: |
  SIGHASH_SINGLE покрива един вход и един изход, съответстващи на индекса на подписания вход, като останалите елементи могат да бъдат променяни.

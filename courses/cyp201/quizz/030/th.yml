question: วัตถุประสงค์ของ SIGHASH_SINGLE คืออะไร?
answer: เพื่อครอบคลุมอินพุตหนึ่งรายการและเอาต์พุตที่สอดคล้องกัน
wrong_answers:
  - เพื่อครอบคลุมข้อมูลนำเข้าและส่งออกทั้งหมด
  - เพื่อครอบคลุมเฉพาะอินพุต
  - เพื่อครอบคลุมผลลัพธ์ทั้งหมด ยกเว้นหนึ่ง
explanation: |
  SIGHASH_SINGLE ครอบคลุมอินพุตเดียวและเอาต์พุตเดียวที่สอดคล้องกับดัชนีของอินพุตที่ลงนาม โดยปล่อยให้ส่วนที่เหลือสามารถแก้ไขได้
reviewed: false
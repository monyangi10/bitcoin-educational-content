question: Каква е уникалната характеристика на адресите SegWit v1 (P2TR) в сравнение с адресите SegWit v0?
answer: Те използват директно необработения публичен ключ в адреса.
wrong_answers:
  - Те са кодирани в base58check.
  - Те изискват два подписа, за да бъдат валидни.
  - Те използват хеша на публичния ключ в адреса.
explanation: |
  При адресите SegWit v1 (P2TR) не се използва хеш на публичния ключ, а директно публичният ключ на Taproot.
reviewed: false
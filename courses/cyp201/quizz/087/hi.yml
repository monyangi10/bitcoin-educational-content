question: SegWit v1 (P2TR) पतों की SegWit v0 पतों के मुकाबले क्या खास बात है?
answer: वे सीधे Address में कच्चे पब्लिक की का इस्तेमाल करते हैं।
wrong_answers:
  - वे बेस58चेक में एनकोडेड हैं।
  - उन्हें वैध होने के लिए दो हस्ताक्षर चाहिए।
  - वे Address में पब्लिक की Hash का इस्तेमाल करते हैं।
explanation: |
  जीडब्ल्यू-6 वी1 (जीडब्ल्यू-8) एड्रेस पब्लिक की के जीडब्ल्यू-7 का इस्तेमाल नहीं करते, बल्कि सीधे जीडब्ल्यू-5 पब्लिक की का इस्तेमाल करते हैं।
reviewed: false
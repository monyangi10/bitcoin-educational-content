question: Каква е основната разлика между операциите ShR и RotR?
answer: ShR премества битовете чрез добавяне на нули, RotR вмъква отново преместените битове
wrong_answers:
  - ShR премахва изместените битове, RotR умножава тяхната стойност
  - ShR се измества наляво, RotR се измества надясно
  - ShR е логическа операция, а RotR е аритметична операция
explanation: |
  ShR премества битовете надясно, като добавя нули, а RotR извършва кръгово завъртане на битовете.

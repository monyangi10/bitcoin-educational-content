question: ShR और RotR ऑपरेशन्स में मुख्य अंतर क्या है?
answer: ShR बिट्स को शून्य जोड़कर शिफ्ट करता है, जबकि RotR शिफ्ट किए गए बिट्स को वापस डाल देता है।
wrong_answers:
  - ShR शिफ्ट किए गए बिट्स को हटा देता है, RotR उनके मूल्य को गुणा करता है
  - ShR बाईं तरफ शिफ्ट करता है, RotR दाईं तरफ शिफ्ट करता है
  - ShR एक तार्किक ऑपरेशन है, RotR अंकगणितीय है
explanation: |
  ShR बिट्स को दाईं ओर शिफ्ट करता है ज़ीरो जोड़कर, जबकि RotR बिट्स का सर्कुलर रोटेशन (गोल घुमाव) करता है।

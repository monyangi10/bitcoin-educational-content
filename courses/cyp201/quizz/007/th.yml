question: ความแตกต่างหลักระหว่างการดำเนินการ ShR และ RotR คืออะไร?
answer: ShR เลื่อนบิตโดยการเพิ่มศูนย์ RotR ใส่บิตที่เลื่อนกลับเข้าไป
wrong_answers:
  - ShR ลบบิตที่ถูกเลื่อนออก, RotR คูณค่าของพวกมัน
  - ShR เลื่อนไปทางซ้าย, RotR เลื่อนไปทางขวา
  - ShR เป็นการดำเนินการทางตรรกะ, RotR เป็นการคำนวณทางเลขคณิต
explanation: |
  ShR เลื่อนบิตไปทางขวาโดยการเพิ่มศูนย์ ในขณะที่ RotR ทำการหมุนบิตแบบวงกลม
reviewed: false
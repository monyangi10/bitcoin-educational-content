question: Коя уязвимост на подписа ECDSA е поправена от SegWit?
answer: Податливост
wrong_answers:
  - Проверка на партидата
  - Липса на агрегиране
  - Прекомерен размер на подписите
explanation: |
  В SegWit беше коригирана неизправността на ECDSA подписите, което позволи използването им като в Lightning Network.
reviewed: false
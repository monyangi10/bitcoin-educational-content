question: JBOK वॉलेट्स की मुख्य सीमा क्या है?
answer: उन्हें हर प्राइवेट की के लिए एक अलग बैकअप चाहिए
wrong_answers:
  - वे नए पते जनरेट करने की अनुमति नहीं देते
  - वे डिजिटल सिग्नेचर के साथ असंगत हैं
  - वे अनकंप्रेस्ड पब्लिक कीज़ का इस्तेमाल करते हैं
explanation: |
  JBOK वॉलेट्स यूज़र को हर एक प्राइवेट की को अलग-अलग बैकअप करने के लिए मजबूर करते हैं, जिससे उनका मैनेजमेंट और भी जटिल हो जाता है।

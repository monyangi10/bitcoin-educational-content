question: Какво е основното ограничение на портфейлите JBOK?
answer: Те изискват независимо резервно копие за всеки частен ключ
wrong_answers:
  - Те не позволяват генерирането на нови адреси
  - Те са несъвместими с цифровите подписи
  - Те използват некомпресирани публични ключове
explanation: |
  Портфейлите JBOK принуждават потребителя да архивира всеки частен ключ поотделно, което усложнява тяхното управление.

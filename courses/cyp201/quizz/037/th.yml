question: ข้อจำกัดหลักของกระเป๋าเงิน JBOK คืออะไร?
answer: พวกเขาต้องการการสำรองข้อมูลอิสระสำหรับคีย์ส่วนตัวแต่ละอัน
wrong_answers:
  - พวกเขาไม่อนุญาตให้สร้างที่อยู่ใหม่
  - พวกมันไม่เข้ากันกับลายเซ็นดิจิทัล
  - พวกเขาใช้คีย์สาธารณะที่ไม่ถูกบีบอัด
explanation: |
  กระเป๋าเงิน JBOK บังคับให้ผู้ใช้สำรองข้อมูลคีย์ส่วนตัวแต่ละคีย์แยกกัน ทำให้การจัดการซับซ้อนขึ้น
reviewed: false
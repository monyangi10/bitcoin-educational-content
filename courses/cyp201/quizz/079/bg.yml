question: Каква е основната функция на дескрипторите на изходния скрипт?
answer: Пълно описание на изходния скрипт и предоставяне на информацията, необходима за възстановяване на wallet
wrong_answers:
  - Автоматично generate адреси с множество подписи
  - Замяна на мнемоничната фраза в резервните копия на wallet
  - Опростяване на изчисленията на цифрови подписи
explanation: |
  Дескрипторите съдържат цялата необходима информация за проследяване на конкретен скрипт, включително пътя на извличане и използваните ключове, но не и фразата за възстановяване.
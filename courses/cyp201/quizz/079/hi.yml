question: आउटपुट स्क्रिप्ट डिस्क्रिप्टर्स का मुख्य काम क्या है?
answer: Wallet को पूरी तरह से डिस्क्राइब करने और उसे रिस्टोर करने के लिए जरूरी जानकारी देने के लिए
wrong_answers:
  - स्वचालित रूप से generate मल्टीसिग्नेचर पतें
  - Wallet बैकअप में Mnemonic वाक्यांश को बदलें
  - डिजिटल सिग्नेचर के कैलकुलेशन को सरल बनाएं
explanation: |
  डिस्क्रिप्टर्स किसी खास स्क्रिप्ट को ट्रैक करने के लिए ज़रूरी सारी जानकारी को समेटे होते हैं, जिसमें डेरिवेशन पाथ और इस्तेमाल की गई कुंजियाँ शामिल होती हैं, लेकिन रिकवरी फ्रेज़ नहीं।
question: ฟังก์ชันหลักของ output script descriptors คืออะไร?
answer: เพื่ออธิบายสคริปต์เอาต์พุตอย่างครบถ้วนและให้ข้อมูลที่จำเป็นในการกู้คืน wallet
wrong_answers:
  - ที่อยู่หลายลายเซ็น generate อัตโนมัติ
  - แทนที่วลีช่วยจำในข้อมูลสำรอง wallet
  - ทำให้การคำนวณลายเซ็นดิจิทัลง่ายขึ้น
explanation: |
  ตัวบ่งชี้จะรวบรวมข้อมูลที่จำเป็นทั้งหมดเพื่อใช้ติดตามสคริปต์เฉพาะ รวมถึงเส้นทางการสืบทอดและกุญแจที่ใช้ แต่ไม่รวมถึงวลีการกู้คืน
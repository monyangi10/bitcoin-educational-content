question: डेरिवेशन पाथ में डेप्थ 1 पर इंडेक्स /84'/ क्या इंडिकेट करता है?
answer: जीडब्ल्यू-0 मानक (जीडब्ल्यू-1 वी0)
wrong_answers:
  - जीडब्ल्यू-3 मानक (जीडब्ल्यू-2 वर्जन 1)
  - एक जीडब्ल्यू-4 जीडब्ल्यू-5 करेंसी
  - एक जीडब्ल्यू-6 जीडब्ल्यू-7 करेंसी
explanation: |
  BIP84 में इंडेक्स /84'/ को SegWit v0 स्टैंडर्ड के इस्तेमाल को दर्शाने के लिए डिफाइन किया गया है, जहां P2WPKH एड्रेसेस डेप्थ 1 (यानी डेरिवेशन टार्गेट के लेवल) पर यूज़ होते हैं।
reviewed: false
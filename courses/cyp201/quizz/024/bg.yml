question: Какъв е размерът на суровия частен ключ, използван в Bitcoin?
answer: 256 бита
wrong_answers:
  - 128 бита
  - 512 бита
  - 1024 бита
explanation: |
  Частният ключ в Bitcoin е 256-битово произволно цяло число, което осигурява достатъчно голямо пространство от ключове, за да се гарантира сигурността.
reviewed: false
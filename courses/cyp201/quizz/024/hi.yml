question: Bitcoin पर इस्तेमाल होने वाले कच्चे (raw) प्राइवेट की का साइज़ क्या है?
answer: २५६ बिट्स
wrong_answers:
  - 128 बिट्स
  - 512 बिट्स
  - 1024 बिट्स
explanation: |
  Bitcoin में एक प्राइवेट की 256-बिट का रैंडम इंटीजर होता है, जो इतना बड़ा की स्पेस देता है कि सुरक्षा की गारंटी रहती है।
reviewed: false
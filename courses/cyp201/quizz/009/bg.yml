question: Каква е конструкцията, използвана от SHA256 за обработка на съобщения с произволна дължина?
answer: Конструкцията Merkle-Damgård
wrong_answers:
  - Конструкцията на Евклид
  - Конструкцията на Ривест-Шамир-Аделман
  - Конструкцията на Кнут-Морис-Прат
explanation: |
  Конструкцията на Меркъл-Дамгард позволява трансформирането на функция за компресиране във функция за хеширане за съобщения с променлива дължина.
reviewed: false
question: SHA256 किसी भी लंबाई के मैसेज को प्रोसेस करने के लिए कौन सी कंस्ट्रक्शन तकनीक इस्तेमाल करता है?
answer: मर्कल-डैमगार्ड संरचना
wrong_answers:
  - यूक्लिडियन निर्माण
  - रिवेस्ट-शामीर-एडलमैन निर्माण
  - क्नुथ-मॉरिस-प्रैट कंस्ट्रक्शन
explanation: |
  मर्कल-डैमगार्ड निर्माण एक कंप्रेशन फंक्शन को वेरिएबल-लेंथ मैसेजेस के लिए Hash फंक्शन में बदलने की अनुमति देता है।
reviewed: false
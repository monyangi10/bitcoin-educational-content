question: Кое свойство гарантира, че е изчислително невъзможно да се извлече входът на хеша?
answer: Устойчивост на предварителни изображения
wrong_answers:
  - Устойчивост на сблъсък
  - Ефект на лавината
  - Втора устойчивост на предварителен образ
explanation: |
  Устойчивостта на преиначаване гарантира, че е практически невъзможно да се намери оригиналното съобщение по неговия хеш.

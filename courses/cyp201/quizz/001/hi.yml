question: वह कौन सा गुण है जो यह सुनिश्चित करता है कि Hash के इनपुट को वापस प्राप्त करना कम्प्यूटेशनली असंभव है?
answer: प्रीइमेज रेजिस्टेंस
wrong_answers:
  - टकराव प्रतिरोध
  - अवलांच प्रभाव
  - दूसरी प्रीइमेज प्रतिरोध
explanation: |
  प्रीइमेज रेजिस्टेंस यह सुनिश्चित करता है कि किसी संदेश के Hash से उसका मूल संदेश ढूंढना व्यावहारिक रूप से असंभव हो।
reviewed: false
question: คุณสมบัติใดที่ทำให้ไม่สามารถคำนวณย้อนกลับเพื่อดึงข้อมูลอินพุตของแฮชได้?
answer: ความต้านทานภาพก่อน
wrong_answers:
  - ความต้านทานการชนกัน
  - ผลกระทบแบบหิมะถล่ม
  - ความต้านทานภาพลักษณ์ที่สอง
explanation: |
  การต้านทานการหาภาพก่อนช่วยให้มั่นใจได้ว่าเป็นไปไม่ได้ในทางปฏิบัติที่จะค้นหาข้อความต้นฉบับจากแฮชของมัน
reviewed: false
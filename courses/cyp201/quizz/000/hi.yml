question: Hash फंक्शन का मुख्य काम क्या है?
answer: यह किसी भी लंबाई की जानकारी को एक निश्चित आकार के फिंगरप्रिंट में बदल देता है
wrong_answers:
  - यह मैसेज को एन्क्रिप्ट कर देता है ताकि उन्हें पढ़ा न जा सके।
  - यह सिर्फ Bitcoin सॉफ्टवेयर की अखंडता को सत्यापित करने के लिए इस्तेमाल किया जाता है
  - यह Bitcoin वॉलेट्स के लिए प्राइवेट कीज जनरेट करता है
explanation: |
  एक Hash फंक्शन किसी भी साइज़ के डेटा को एक फिक्स्ड-साइज़ Hash में बदल देता है, जो Bitcoin में कई एप्लिकेशन्स के लिए बहुत जरूरी है।

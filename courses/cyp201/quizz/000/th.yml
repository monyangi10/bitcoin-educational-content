question: ฟังก์ชันหลักของแฮชฟังก์ชันคืออะไร?
answer: มันแปลงข้อมูลที่มีความยาวตามอำเภอใจให้เป็นลายนิ้วมือขนาดคงที่
wrong_answers:
  - มันเข้ารหัสข้อความเพื่อทำให้ไม่สามารถอ่านได้
  - มันถูกใช้เพื่อตรวจสอบความสมบูรณ์ของซอฟต์แวร์ Bitcoin เท่านั้น
  - มันสร้างกุญแจส่วนตัวสำหรับกระเป๋าเงิน Bitcoin
explanation: |
  ฟังก์ชันแฮชแปลงข้อมูลขนาดใดก็ได้ให้เป็นแฮชขนาดคงที่ ซึ่งมีความสำคัญสำหรับแอปพลิเคชันหลายอย่างใน Bitcoin.
reviewed: false
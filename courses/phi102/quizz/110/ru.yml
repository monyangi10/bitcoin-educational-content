question: Согласно главе, какое фундаментальное различие существует между конкуренцией через контракты и конкуренцией через насилие или политику?
answer: Конкуренция, основанная на Contract, увеличивает общее производство, справедливо перераспределяя богатство, в то время как насилие и политика лишь перераспределяют существующие ресурсы, не создавая новых богатств
wrong_answers:
  - Конкуренция, основанная на ГВ-1, устраняет все формы дефицита ресурсов, в то время как насилие и политика создают искусственный дефицит с помощью государственного вмешательства
  - Конкуренция, основанная на Contract, требует государственного регулирования для нормального функционирования, в то время как насилие и политика действуют независимо от институциональных рамок
  - Конкуренция, основанная на Contract, сосредоточена на краткосрочных выгодах для отдельных людей, в то время как насилие и политика ставят во главу угла долгосрочные коллективные выгоды для общества
explanation: |
  В главе проводится четкое различие между этими формами конкуренции по их продуктивным результатам. Конкуренция на основе Contract, основанная на взаимной выгоде обменивающихся сторон, не только справедливо перераспределяет богатство между участниками, но и увеличивает общее производство за счет мотивации личных интересов. В отличие от этого, и жестокая конкуренция, и политическое перераспределение просто перемещают существующие ресурсы, не создавая дополнительного богатства. Именно поэтому договорной обмен знаменует собой подлинный цивилизационный прогресс, в то время как интервенционизм и социализм представляют собой обратный шаг к присвоению через принуждение, а не к добровольной взаимной выгоде.
question: Selon le chapitre, quelle différence fondamentale existe-t-il entre la concurrence par les contrats et la concurrence par la violence ou la politique ?
answer: La concurrence basée sur le contrat augmente la production totale tout en redistribuant équitablement les richesses, alors que la violence et la politique ne font que redistribuer les ressources existantes sans créer de nouvelles richesses
wrong_answers:
  - La concurrence basée sur le contrat élimine toutes les formes de pénurie de ressources, tandis que la violence et la politique créent des pénuries artificielles par l'intervention des pouvoirs publics
  - La concurrence basée sur le contrat nécessite une réglementation gouvernementale pour fonctionner correctement, tandis que la violence et la politique fonctionnent indépendamment de tout cadre institutionnel
  - La compétition basée sur le contrat se concentre sur les gains à court terme pour les individus, tandis que la violence et la politique donnent la priorité aux avantages collectifs à long terme pour la société
explanation: |
  Le chapitre distingue clairement ces formes de concurrence en fonction de leurs résultats productifs. La concurrence basée sur le contrat, fondée sur l'avantage mutuel entre les parties qui échangent, ne se contente pas de redistribuer équitablement les richesses entre les contributeurs, mais augmente également la production globale grâce à la motivation de l'intérêt personnel. En revanche, la concurrence violente et la redistribution politique ne font que déplacer des ressources existantes sans créer de richesses supplémentaires. C'est pourquoi l'échange contractuel marque un véritable progrès de la civilisation, alors que l'interventionnisme et le socialisme représentent un pas en arrière vers l'appropriation par la coercition plutôt que par l'avantage mutuel volontaire.

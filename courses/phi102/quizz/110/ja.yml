question: この章によれば、契約による競争と暴力や政治による競争にはどのような根本的な違いがあるのだろうか？
answer: Contractに基づく競争は、富を公平に再分配しながら総生産を増加させるが、暴力や政治は新たな富を生み出すことなく既存の資源を再分配するだけである。
wrong_answers:
  - Contractに基づく競争はあらゆる形の資源不足をなくし、暴力と政治は政府の介入によって人為的な不足を作り出す。
  - Contractに基づく競争が適切に機能するためには政府の規制が必要である一方、暴力と政治はいかなる制度的枠組みとも無関係に機能する。
  - Contractに基づく競争は個人の短期的利益を重視し、暴力と政治は社会の長期的な集合的利益を優先する。
explanation: |
  この章では、これらの競争形態をその生産的成果によって明確に区別している。Contractに基づく競争は、交換する当事者間の相互利益に基づいており、貢献者間で富を公平に再分配するだけでなく、個人的な利益動機を通じて全体的な生産を増大させる。対照的に、暴力的な競争も政治的な再分配も、さらなる富を生み出すことなく既存の資源を移動させるだけである。このことは、契約による交換が真の文明の進歩を示す一方で、介入主義や社会主義が自発的な相互利益ではなく、強制による横領への後退を意味する理由を表している。
question: Mitä perustavaa laatua olevaa eroa on luvun mukaan sopimuksiin perustuvan kilpailun ja väkivaltaan tai politiikkaan perustuvan kilpailun välillä?
answer: Contract-pohjainen kilpailu lisää kokonaistuotantoa ja jakaa varallisuuden oikeudenmukaisesti uudelleen, kun taas väkivalta ja politiikka jakavat vain olemassa olevia resursseja uudelleen luomatta uutta varallisuutta
wrong_answers:
  - Contract-pohjainen kilpailu poistaa kaikki resurssien niukkuuden muodot, kun taas väkivalta ja politiikka luovat keinotekoista niukkuutta hallituksen väliintulon avulla
  - Contract-pohjainen kilpailu edellyttää valtion sääntelyä toimiakseen asianmukaisesti, kun taas väkivalta ja politiikka toimivat institutionaalisista puitteista riippumatta
  - Contract-pohjaisessa kilpailussa keskitytään yksilöiden lyhyen aikavälin hyötyihin, kun taas väkivalta ja politiikka asettavat etusijalle yhteiskunnan pitkän aikavälin kollektiiviset hyödyt
explanation: |
  Luvussa erotetaan nämä kilpailumuodot selvästi toisistaan niiden tuotannollisten tulosten perusteella. Contract:ään perustuva kilpailu, joka perustuu vaihdantaosapuolten keskinäiseen etuun, ei ainoastaan jaa varallisuutta oikeudenmukaisesti uudelleen rahoittajien kesken vaan myös lisää kokonaistuotantoa henkilökohtaisen edun motivoimisen kautta. Sitä vastoin sekä väkivaltainen kilpailu että poliittinen uudelleenjako ainoastaan siirtävät olemassa olevia resursseja ilman, että ne tuottavat lisää vaurautta. Tämän vuoksi sopimusperusteinen vaihto on merkki aidosta sivilisaation edistyksestä, kun taas interventionismi ja sosialismi ovat askel taaksepäin kohti pakkokeinoin tapahtuvaa anastamista vapaaehtoisen keskinäisen hyödyn sijaan.
question: Dushingiye ku nseguro ya Bastiat, ni iciyumviro ikihe c’ishimikiro kitari co abaharanira uburenganzira bw’abantu n’abaharanira uburenganzira bw’abantu bompi basangira igihe bavuga iciyumviro c’‘inyungu rusangi’ kugira ngo bashinge intahe uburenganzira bwo kubuza umwidegemvyo w’umuntu ku giti ciwe?
answer: Bafata inyungu rusangi nk’ikintu gisumba ibindi vyose gica gishingira intahe ukurenga uburenganzira n’umwidegemvyo w’umuntu ku giti ciwe .
wrong_answers:
  - Biyumvira ko inyungu rusangi ishobora gushikwako gusa biciye mu buryo bwo gutora mu buryo bwa demokarasi aho gushikwako biciye mu nzira z'isoko .
  - Bemera ko inyungu rusangi isaba ko ubutunzi bugabanywa ku rugero rungana mu bantu bose bo mu kibano .
  - Batera urujijo inyungu rusangi n’inyungu z’abantu benshi, bakirengagiza uburenganzira bw’abantu bakeyi mu ngingo z’ubutunzi .
explanation: |
  Bastiat avuga ko gusaba ‘inyungu rusangi’ ari co kintu gikunda gutera uburenganzira n’umwidegemvyo w’umuntu ku giti ciwe. Abaharanira uburenganzira bw’abantu n’abanyagihugu b’abanyagihugu bashira ahabona iyo nyungu rusangi nk’ikintu gisumba ibindi vyose gica cemerera ubwo nyene guhonyanga ivyo babona ko ari umwidegemvyo w’umuntu ku giti ciwe wo hasi. Ivyo bigereranya ubuhinga bw’ishimikiro kuko burema uburongozi bw’ikinyoma aho ibintu bitaboneka vy’abantu bose bikoreshwa kugira ngo bishingire intahe akaga nyakuri ku mwidegemvyo w’umuntu ku giti ciwe. Ibindi bihitamwo, naho bishobora kuba ingorane, ntibifata ivyiyumviro vyihariye vya Bastiat vyerekeye ingene ‘inyungu rusangi’ ikoreshwa nk’igikoresho c’ivyiyumviro co kwemeza ingingo z’ubutegetsi bw’agahomerabunwa zirwanya umwidegemvyo w’ubutunzi.
question: Enligt Bastiats analys, vilken grundläggande missuppfattning delar både protektionister och socialister när de åberopar begreppet "allmänintresse" för att motivera inskränkningar i individens friheter?
answer: De behandlar allmänintresset som en överordnad enhet som automatiskt rättfärdigar kränkningar av individuella fri- och rättigheter
wrong_answers:
  - De utgår från att allmänintresset endast kan uppnås genom demokratiska röstningsmekanismer snarare än genom marknadsprocesser
  - De anser att allmänintresset kräver en jämn fördelning av rikedomarna mellan alla samhällsmedlemmar
  - De blandar ihop allmänintresset med majoritetens intressen och bortser från minoritetens rättigheter i ekonomiska beslut
explanation: |
  Bastiat identifierar åberopandet av "allmänintresset" som en vanlig förevändning för att angripa individuella fri- och rättigheter. Protektionister och socialister framställer detta allmänintresse som en överordnad enhet som automatiskt tillåter kränkningar av vad de anser vara underordnade individuella friheter. Detta är en grundläggande sofism eftersom det skapar en falsk hierarki där kollektiva abstraktioner används för att rättfärdiga konkret skada på individens frihet. De andra alternativen är visserligen potentiellt problematiska, men de fångar inte Bastiats specifika kritik av hur "allmänintresset" används som ett konceptuellt verktyg för att legitimera auktoritära åtgärder mot ekonomisk frihet.
question: Jaký zásadní omyl podle Bastiatovy analýzy sdílejí jak protekcionisté, tak socialisté, když se odvolávají na pojem "obecný zájem", aby ospravedlnili omezování osobních svobod?
answer: Považují obecný zájem za nadřazenou entitu, která automaticky ospravedlňuje porušování individuálních práv a svobod
wrong_answers:
  - Předpokládají, že obecného zájmu lze dosáhnout pouze prostřednictvím demokratických hlasovacích mechanismů, nikoli tržních procesů
  - Věří, že obecný zájem vyžaduje rovnoměrné rozdělení bohatství mezi všechny členy společnosti
  - Zaměňují obecný zájem se zájmy většiny a ignorují práva menšin při ekonomických rozhodnutích
explanation: |
  Bastiat označuje odvolávání se na "obecný zájem" za častou záminku k útoku na práva a svobody jednotlivce. Protekcionisté a socialisté prezentují tento obecný zájem jako nadřazenou entitu, která automaticky povoluje porušování toho, co považují za podřadné individuální svobody. To představuje zásadní sofismus, protože vytváří falešnou hierarchii, v níž se kolektivní abstrakce používají k ospravedlnění konkrétního poškozování individuálních svobod. Ostatní možnosti, ačkoli jsou potenciálně problematické, nevystihují Bastiatovu specifickou kritiku toho, jak je "obecný zájem" ozbrojen jako konceptuální nástroj k legitimizaci autoritářských opatření proti ekonomické svobodě.
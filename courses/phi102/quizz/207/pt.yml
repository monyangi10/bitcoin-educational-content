question: De acordo com a análise de Bastiat, que equívoco fundamental partilham tanto os proteccionistas como os socialistas quando invocam o conceito de "interesse geral" para justificar restrições às liberdades individuais?
answer: Tratam o interesse geral como uma entidade superior que justifica automaticamente a violação dos direitos e liberdades individuais
wrong_answers:
  - Partem do princípio de que o interesse geral só pode ser alcançado através de mecanismos democráticos de votação e não através de processos de mercado
  - Acreditam que o interesse geral exige uma distribuição igualitária da riqueza entre todos os membros da sociedade
  - Confundem o interesse geral com os interesses da maioria, ignorando os direitos das minorias nas decisões económicas
explanation: |
  Bastiat identifica a invocação do "interesse geral" como um pretexto frequente para atacar os direitos e as liberdades individuais. Proteccionistas e socialistas apresentam este interesse geral como uma entidade superior que autoriza automaticamente violações do que consideram liberdades individuais inferiores. Isto representa um sofisma fundamental porque cria uma falsa hierarquia em que abstracções colectivas são utilizadas para justificar danos concretos à liberdade individual. As outras opções, embora potencialmente problemáticas, não captam a crítica específica de Bastiat à forma como o "interesse geral" é utilizado como uma ferramenta concetual para legitimar medidas autoritárias contra a liberdade económica.
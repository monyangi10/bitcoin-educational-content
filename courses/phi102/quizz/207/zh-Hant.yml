question: 根據巴斯蒂亞的分析，當保護主義者和社會主義者引用「一般利益」的概念來為限制個人自由辯護時，他們都有哪些基本的錯誤觀念？
answer: 他們將整體利益視為高人一等的實體，認為侵犯個人權利和自由是理所當然的。
wrong_answers:
  - 他們假設一般利益只能透過民主投票機制而非市場程序來達成
  - 他們認為一般利益需要在社會所有成員間平均分配財富
  - 他們混淆了一般利益與多數人的利益，在經濟決策中忽略了少數人的權利。
explanation: |
  巴斯蒂亞指出，「普遍利益」是攻擊個人權利和自由的常見藉口。保護主義者和社會主義者將這種普遍利益說成是一種優越的實體，自動授權侵犯他們認為低劣的個人自由。這代表了一種基本的詭辯，因為它創造了一個錯誤的層級，在這個層級中，集體的抽象概念被用來證明對個人自由的具體傷害是合理的。其他的選擇儘管有潛在的問題，卻沒有抓住巴斯蒂亞的具體批判，即「一般利益」如何被武器化，成為一種概念工具，使反對經濟自由的專制措施合法化。
question: Hvilken grunnleggende misforståelse deler både proteksjonister og sosialister, ifølge Bastiats analyse, når de påberoper seg begrepet "allmenninteresse" for å rettferdiggjøre innskrenkninger i den individuelle friheten?
answer: De behandler allmenninteressen som en overordnet størrelse som automatisk rettferdiggjør krenkelser av individuelle rettigheter og friheter
wrong_answers:
  - De antar at allmenne interesser bare kan oppnås gjennom demokratiske avstemningsmekanismer snarere enn markedsprosesser
  - De mener at allmennhetens interesser krever lik fordeling av velstand blant alle samfunnets medlemmer
  - De forveksler allmenninteressen med flertallets interesser, og ignorerer minoriteters rettigheter i økonomiske beslutninger
explanation: |
  Bastiat identifiserer påberopelsen av "allmenne interesser" som et hyppig påskudd for å angripe individuelle rettigheter og friheter. Proteksjonister og sosialister fremstiller denne allmenne interessen som en overordnet størrelse som automatisk autoriserer krenkelser av det de anser som mindreverdige individuelle friheter. Dette er en grunnleggende sofisme, fordi det skaper et falskt hierarki der kollektive abstraksjoner brukes til å rettferdiggjøre konkrete inngrep i individets frihet. De andre alternativene er potensielt problematiske, men de fanger ikke opp Bastiats spesifikke kritikk av hvordan "allmenninteressen" brukes som et konseptuelt verktøy for å legitimere autoritære tiltak mot økonomisk frihet.
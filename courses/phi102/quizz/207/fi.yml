question: Mikä on Bastiat'n analyysin mukaan sekä protektionistien että sosialistien yhteinen perustavanlaatuinen väärinkäsitys, kun he vetoavat "yleisen edun" käsitteeseen perustellakseen yksilönvapauksien rajoittamista?
answer: Ne pitävät yleistä etua ylivertaisena kokonaisuutena, joka automaattisesti oikeuttaa yksilön oikeuksien ja vapauksien loukkaamisen
wrong_answers:
  - Niissä oletetaan, että yleinen etu voidaan saavuttaa vain demokraattisten äänestysmekanismien eikä markkinaprosessien avulla
  - Heidän mielestään yleinen etu edellyttää varallisuuden tasapuolista jakamista kaikkien yhteiskunnan jäsenten kesken
  - Ne sekoittavat yleisen edun enemmistön etuun ja jättävät vähemmistön oikeudet huomiotta taloudellisissa päätöksissä
explanation: |
  Bastiat toteaa, että "yleiseen etuun" vetoaminen on yleinen tekosyy yksilön oikeuksien ja vapauksien loukkaamiseen. Protektionistit ja sosialistit esittävät yleisen edun ylivertaisena kokonaisuutena, joka automaattisesti sallii heidän mielestään alempiarvoisten yksilönvapauksien loukkaukset. Tämä on perustavanlaatuinen sofismi, koska se luo väärän hierarkian, jossa kollektiivisia abstraktioita käytetään oikeuttamaan yksilönvapauden konkreettinen loukkaaminen. Vaikka muut vaihtoehdot ovatkin potentiaalisesti ongelmallisia, ne eivät tavoita Bastiat'n erityistä kritiikkiä sitä kohtaan, miten "yleistä etua" käytetään aseena käsitteellisenä välineenä, jolla legitimoidaan taloudelliseen vapauteen kohdistuvia autoritaarisia toimenpiteitä.
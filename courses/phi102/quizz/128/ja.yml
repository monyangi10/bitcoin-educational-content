question: 現代の経済的相互依存が、戦争に直接関与していない国も含め、すべての国にとって国際紛争をよりコストのかかるものにしているのはなぜか？
answer: グローバル・トレード・チェーンの混乱は、経済的損失を全世界の貿易相手国に拡大させるからである。
wrong_answers:
  - 近代兵器はより破壊的で、近隣諸国に影響を及ぼす環境破壊を引き起こすからだ。
  - 国際法は現在、すべての国が紛争を経験している国に財政援助を提供することを義務づけているからだ。
  - なぜなら、現代のコミュニケーションは、以前の世紀よりも遠くの紛争に人々が感情的に影響されるようになっているからだ。
explanation: |
  この章では、現代の経済的相互依存が、貿易を通じた相互利益のグローバルな連鎖を生み出していると説明する。紛争がある地域の生産や貿易を混乱させると、その影響は経済関係のネットワーク全体に波及する。本文では、アメリカの南北戦争が、単に商業関係の途絶によってヨーロッパの繊維産業、特にリヨンの繊維産業に破滅をもたらした例を用いている。このことは、経済的な相互連関が、戦争当事国だけでなく、グローバル経済のすべての参加者にとって、戦争をますます有害なものにしていることを示している。
question: Tại sao sự phụ thuộc kinh tế lẫn nhau trong thời hiện đại lại khiến các cuộc xung đột quốc tế trở nên tốn kém hơn đối với tất cả các quốc gia, ngay cả những quốc gia không trực tiếp tham gia chiến tranh?
answer: Vì sự gián đoạn chuỗi thương mại toàn cầu gây ra thiệt hại kinh tế lan rộng đến tất cả các đối tác thương mại trên toàn thế giới.
wrong_answers:
  - Vì vũ khí hiện đại có sức tàn phá lớn hơn và gây ra thiệt hại môi trường ảnh hưởng đến các nước láng giềng.
  - Vì luật pháp quốc tế hiện nay yêu cầu tất cả các quốc gia phải cung cấp viện trợ tài chính cho các nước đang gặp xung đột.
  - Bởi vì phương tiện truyền thông hiện đại khiến con người dễ bị ảnh hưởng về mặt cảm xúc hơn trước các cuộc xung đột ở xa so với các thế
explanation: |
  Chương này giải thích rằng sự phụ thuộc kinh tế lẫn nhau hiện đại tạo ra một chuỗi lợi ích chung toàn cầu thông qua thương mại. Khi xung đột làm gián đoạn sản xuất hoặc thương mại ở một khu vực, ảnh hưởng của nó sẽ lan rộng khắp toàn bộ mạng lưới quan hệ kinh tế. Văn bản sử dụng ví dụ về cuộc Nội chiến Hoa Kỳ gây ra sự tàn phá cho ngành công nghiệp dệt may châu Âu, đặc biệt là ở Lyon, chỉ đơn giản thông qua sự gián đoạn các mối quan hệ thương mại. Điều này cho thấy sự liên kết kinh tế khiến chiến tranh ngày càng gây hại cho tất cả các bên tham gia vào nền kinh tế toàn cầu, chứ không chỉ riêng các bên tham chiến.
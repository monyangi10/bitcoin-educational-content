question: 为什么现代经济相互依存会使所有国家，甚至那些没有直接参与战争的国家，在国际冲突中付出更高的代价？
answer: 因为全球贸易链的中断会导致经济损失波及全球所有贸易伙伴
wrong_answers:
  - 因为现代武器更具破坏性，会对环境造成破坏，影响周边国家
  - 因为国际法现在要求所有国家向经历冲突的国家提供财政援助
  - 因为与前几个世纪相比，现代通信使人们对遥远冲突的情感影响更大
explanation: |
  该章解释说，现代经济相互依存通过贸易创造了一个全球互利链。当冲突破坏一个地区的生产或贸易时，其影响会波及整个经济关系网络。文中举例说明，美国内战仅仅通过破坏商业关系，就使欧洲纺织业，尤其是里昂的纺织业一蹶不振。这说明了经济的相互联系如何使战争对全球经济的所有参与者，而不仅仅是交战各方，造成越来越大的危害。
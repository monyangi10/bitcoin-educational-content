question: Warum machen die modernen wirtschaftlichen Verflechtungen internationale Konflikte für alle Nationen kostspieliger, auch für diejenigen, die nicht direkt in Kriege verwickelt sind?
answer: Weil Unterbrechungen der globalen Handelsketten zu wirtschaftlichen Verlusten führen, die sich auf alle Handelspartner weltweit ausbreiten
wrong_answers:
  - Weil moderne Waffen zerstörerischer sind und Umweltschäden verursachen, die sich auf die Nachbarländer auswirken
  - Weil das internationale Recht nun alle Nationen verpflichtet, Ländern, die Konflikte erleben, finanzielle Hilfe zu leisten
  - Weil die Menschen durch die moderne Kommunikation von weit entfernten Konflikten emotional stärker betroffen sind als in früheren Jahrhunderten
explanation: |
  In diesem Kapitel wird erläutert, dass die moderne wirtschaftliche Verflechtung durch den Handel eine globale Kette gegenseitigen Nutzens schafft. Wenn Konflikte die Produktion oder den Handel in einer Region stören, wirken sich die Auswirkungen auf das gesamte Netz der Wirtschaftsbeziehungen aus. Der Text verwendet das Beispiel des amerikanischen Bürgerkriegs, der die europäische Textilindustrie, insbesondere in Lyon, allein durch die Unterbrechung der Handelsbeziehungen in den Ruin trieb. Dies zeigt, wie die wirtschaftliche Verflechtung dazu führt, dass Kriege für alle Teilnehmer der Weltwirtschaft zunehmend schädlich sind, nicht nur für die Krieg führenden Parteien.
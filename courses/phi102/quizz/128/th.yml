question: ทำไมการพึ่งพาทางเศรษฐกิจสมัยใหม่ทำให้ความขัดแย้งระหว่างประเทศมีค่าใช้จ่ายสูงขึ้นสำหรับทุกประเทศ แม้แต่ประเทศที่ไม่ได้มีส่วนร่วมโดยตรงในสงคราม?
answer: เนื่องจากการหยุดชะงักของห่วงโซ่การค้าโลกทำให้การสูญเสียทางเศรษฐกิจแพร่กระจายไปยังคู่ค้าทั้งหมดทั่วโลก
wrong_answers:
  - เนื่องจากอาวุธสมัยใหม่มีความทำลายล้างมากขึ้นและสร้างความเสียหายต่อสิ่งแวดล้อมที่ส่งผลกระทบต่อประเทศเพื่อนบ้าน
  - เนื่องจากกฎหมายระหว่างประเทศในขณะนี้กำหนดให้ทุกประเทศต้องให้ความช่วยเหลือทางการเงินแก่ประเทศที่ประสบกับความขัดแย้ง
  - เพราะการสื่อสารสมัยใหม่ทำให้ผู้คนได้รับผลกระทบทางอารมณ์จากความขัดแย้งที่อยู่ห่างไกลมากกว่าศตวรรษก่อน ๆ
explanation: |
  บทนี้อธิบายว่าความพึ่งพาทางเศรษฐกิจสมัยใหม่สร้างห่วงโซ่แห่งประโยชน์ร่วมกันทั่วโลกผ่านการค้า เมื่อความขัดแย้งขัดขวางการผลิตหรือการค้าในภูมิภาคหนึ่ง ผลกระทบจะกระจายไปทั่วเครือข่ายความสัมพันธ์ทางเศรษฐกิจทั้งหมด ข้อความใช้ตัวอย่างของสงครามกลางเมืองอเมริกาที่ทำให้เกิดความเสียหายต่ออุตสาหกรรมสิ่งทอในยุโรป โดยเฉพาะในลียง เพียงแค่ผ่านการขัดขวางความสัมพันธ์ทางการค้า ซึ่งแสดงให้เห็นว่าความเชื่อมโยงทางเศรษฐกิจทำให้สงครามเป็นอันตรายมากขึ้นต่อผู้เข้าร่วมทุกคนในเศรษฐกิจโลก ไม่ใช่แค่ฝ่ายที่ทำสงครามเท่านั้น
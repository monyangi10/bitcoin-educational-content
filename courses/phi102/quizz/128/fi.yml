question: Miksi nykyaikainen taloudellinen keskinäinen riippuvuus tekee kansainvälisistä konflikteista kalliimpia kaikille kansakunnille, myös niille, jotka eivät suoraan osallistu sodankäyntiin?
answer: Koska maailmanlaajuisten kauppaketjujen häiriöt aiheuttavat taloudellisia tappioita, jotka leviävät kaikkiin kauppakumppaneihin maailmanlaajuisesti
wrong_answers:
  - Koska nykyaikaiset aseet ovat tuhoisampia ja aiheuttavat ympäristövahinkoja, jotka vaikuttavat naapurimaihin
  - Koska kansainvälinen oikeus edellyttää nykyään, että kaikki valtiot antavat taloudellista apua konflikteista kärsiville maille
  - Koska nykyaikaisen viestinnän ansiosta kaukaiset konfliktit vaikuttavat ihmisiin emotionaalisesti enemmän kuin aiempina vuosisatoina
explanation: |
  Luvussa selitetään, että nykyaikainen taloudellinen keskinäinen riippuvuus luo maailmanlaajuisen ketjun, jossa keskinäinen hyöty perustuu kauppaan. Kun konfliktit häiritsevät tuotantoa tai kauppaa jollakin alueella, vaikutukset leviävät koko taloussuhteiden verkostoon. Tekstissä käytetään esimerkkinä sitä, että Yhdysvaltain sisällissota aiheutti tuhoa eurooppalaiselle tekstiiliteollisuudelle, erityisesti Lyonissa, pelkästään kauppasuhteiden katkeamisen vuoksi. Tämä osoittaa, miten taloudelliset yhteydet tekevät sodasta yhä haitallisemman kaikille maailmantalouden osapuolille, ei vain sodan osapuolille.
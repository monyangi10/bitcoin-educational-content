question: 현대의 경제적 상호의존성으로 인해 전쟁에 직접적으로 관여하지 않는 국가를 포함한 모든 국가가 국제 분쟁으로 인해 더 많은 비용을 지불해야 하는 이유는 무엇일까요?
answer: 글로벌 무역 사슬이 중단되면 전 세계 모든 무역 파트너에게 경제적 손실이 확산되기 때문입니다
wrong_answers:
  - 현대 무기는 더 파괴적이고 주변 국가에 영향을 미치는 환경 피해를 유발하기 때문입니다
  - 국제법에 따라 모든 국가는 분쟁을 겪고 있는 국가에 재정 지원을 제공해야 합니다
  - 현대의 커뮤니케이션은 사람들이 이전 세기보다 더 먼 거리의 갈등에 감정적으로 영향을 받기 때문입니다
explanation: |
  이 장에서는 현대의 경제적 상호의존성이 무역을 통해 전 세계적인 상호 이익의 사슬을 형성한다고 설명합니다. 분쟁으로 인해 한 지역의 생산이나 무역이 중단되면 그 영향은 전체 경제 관계망에 파급됩니다. 이 글에서는 미국 남북전쟁으로 인해 유럽, 특히 리옹의 섬유 산업이 상업적 관계의 붕괴로 인해 파멸에 이른 사례를 예로 들어 설명합니다. 이는 경제적 상호 연결성이 전쟁 당사자뿐 아니라 세계 경제의 모든 참여자에게 전쟁이 얼마나 해로운지 보여줍니다.
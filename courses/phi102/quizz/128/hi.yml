question: Why does modern economic interdependence make international conflicts more costly for all nations, even those not directly involved in warfare?
answer: Because disruptions to global trade chains cause economic losses to spread to all trading partners worldwide
wrong_answers:
  - Because modern weapons are more destructive and create environmental damage that affects neighboring countries
  - Because international law now requires all nations to provide financial aid to countries experiencing conflicts
  - Because modern communication makes people more emotionally affected by distant conflicts than in previous centuries
explanation: |
  The chapter explains that modern economic interdependence creates a global chain of mutual benefit through trade. When conflicts disrupt production or trade in one region, the effects ripple through the entire network of economic relationships. The text uses the example of the American Civil War causing ruin to European textile industries, particularly in Lyon, simply through the disruption of commercial relations. This demonstrates how economic interconnectedness makes war increasingly harmful to all participants in the global economy, not just the warring parties.
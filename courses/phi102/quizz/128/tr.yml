question: Modern ekonomik karşılıklı bağımlılık neden uluslararası çatışmaları, doğrudan savaşa dahil olmayanlar da dahil olmak üzere tüm uluslar için daha maliyetli hale getiriyor?
answer: Çünkü küresel ticaret zincirlerindeki aksamalar ekonomik kayıpların dünya çapındaki tüm ticaret ortaklarına yayılmasına neden olur
wrong_answers:
  - Çünkü modern silahlar daha yıkıcıdır ve komşu ülkeleri etkileyen çevresel zararlar yaratır
  - Çünkü uluslararası hukuk artık tüm ulusların çatışma yaşayan ülkelere mali yardım sağlamasını gerektirmektedir
  - Çünkü modern iletişim, insanların uzaktaki çatışmalardan duygusal olarak önceki yüzyıllara göre daha fazla etkilenmesine neden oluyor
explanation: |
  Bu bölüm, modern ekonomik karşılıklı bağımlılığın ticaret yoluyla küresel bir karşılıklı fayda zinciri yarattığını açıklamaktadır. Çatışmalar bir bölgedeki üretimi ya da ticareti sekteye uğrattığında, etkileri tüm ekonomik ilişkiler ağına yayılır. Metinde, Amerikan İç Savaşı'nın, özellikle Lyon'daki Avrupa tekstil endüstrilerini, sadece ticari ilişkilerin kesintiye uğraması yoluyla yıkıma uğrattığı örneği kullanılmaktadır. Bu da ekonomik bağlılığın, savaşı sadece savaşan taraflar için değil, küresel ekonominin tüm katılımcıları için nasıl giderek daha zararlı hale getirdiğini göstermektedir.
question: Perché la moderna interdipendenza economica rende i conflitti internazionali più costosi per tutte le nazioni, anche per quelle non direttamente coinvolte nella guerra?
answer: Perché le perturbazioni delle catene commerciali globali causano perdite economiche che si diffondono a tutti i partner commerciali a livello mondiale
wrong_answers:
  - Perché le armi moderne sono più distruttive e creano danni ambientali che si ripercuotono sui Paesi vicini
  - Perché il diritto internazionale impone a tutte le nazioni di fornire aiuti finanziari ai paesi in conflitto
  - Perché la comunicazione moderna rende le persone più emotivamente coinvolte in conflitti lontani rispetto ai secoli precedenti
explanation: |
  Il capitolo spiega che la moderna interdipendenza economica crea una catena globale di benefici reciproci attraverso il commercio. Quando i conflitti interrompono la produzione o il commercio in una regione, gli effetti si ripercuotono sull'intera rete di relazioni economiche. Il testo utilizza l'esempio della guerra civile americana che ha causato la rovina delle industrie tessili europee, in particolare a Lione, semplicemente attraverso l'interruzione delle relazioni commerciali. Questo dimostra come l'interconnessione economica renda la guerra sempre più dannosa per tutti i partecipanti all'economia globale, non solo per le parti in conflitto.
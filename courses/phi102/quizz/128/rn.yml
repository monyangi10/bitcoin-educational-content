question: Ni kubera iki ukuntu abantu bo muri iki gihe bafatanya mu vy’ubutunzi bituma intambara mpuzamakungu zirushiriza gutwara amahera menshi ku mahanga yose, mbere n’ayo atagira uruhara ata guca ku ruhande mu ntambara?
answer: Kubera ko uguhungabana kw’imirongo y’ubudandaji kw’isi yose bituma ubutunzi buhomba ku bafatanyabikorwa bose mu bucuruzi kw’isi yose .
wrong_answers:
  - Kubera ko ibirwanisho vya none bishobora gusenyura cane kandi bikazana ingorane z’ibidukikije zigatera ingorane ibihugu bihegereye .
  - Kubera ko ubu amategeko mpuzamakungu asaba ko ibihugu vyose bifasha mu vy’amahera ibihugu biriko birashikirwa n’indyane .
  - Kubera ko uguseruranira akari ku mutima kwo muri iki gihe gutuma abantu bashikirwa cane n’indyane zo kure kuruta uko vyari biri mu binjana vyaheze .
explanation: |
  Ico gice kirasigura ko ugufatanya mu vy’ubutunzi muri iki gihe gutuma haba uruhererekane rw’inyungu z’abantu bose kw’isi yose biciye mu bucuruzi. Iyo amatati ahungabanije umusaruro canke ubudandaji mu karere kamwe, ingaruka zica mu nzira yose y’imigenderanire y’ubutunzi. Ico canditswe gikoresha akarorero k’intambara y’abanyagihugu muri Amerika yatumye inganda z’impuzu zo mu Buraya zihomba, cane cane i Lyon, biciye gusa mu guhungabanya imigenderanire y’ubudandaji. Ivyo vyerekana ingene uguhuza ubutunzi bituma intambara irushiriza kuba mbi ku bantu bose bari mu bukungu bw’isi yose, atari ku mpande zirwanya gusa.
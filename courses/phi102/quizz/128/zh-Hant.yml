question: 為什麼現代經濟相互依存會讓所有國家，甚至是那些沒有直接捲入戰爭的國家，在國際衝突中付出更高的代價？
answer: 因為全球貿易鏈中斷會導致經濟損失擴散至全球所有貿易夥伴
wrong_answers:
  - 因為現代武器更具破壞性，並會造成環境破壞，影響鄰近國家
  - 因為國際法現在要求所有國家向發生衝突的國家提供財務援助
  - 因為現代通訊使人們比前幾個世紀更容易受到遙遠衝突的情感影響
explanation: |
  本章說明現代經濟相互依存，透過貿易創造出全球互惠互利的鏈條。當衝突擾亂一個地區的生產或貿易時，其影響會波及整個經濟關係網絡。文中以美國內戰為例，單單透過商業關係的中斷，就造成歐洲紡織業的毀滅，尤其是在里昂。這說明經濟的相互關聯性如何使戰爭對全球經濟的所有參與者，而不僅是交戰各方，造成越來越大的傷害。
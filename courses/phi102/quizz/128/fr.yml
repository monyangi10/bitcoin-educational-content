question: Pourquoi l'interdépendance économique moderne rend-elle les conflits internationaux plus coûteux pour toutes les nations, même celles qui ne sont pas directement impliquées dans la guerre ?
answer: Parce que les perturbations des chaînes commerciales mondiales entraînent des pertes économiques qui se répercutent sur tous les partenaires commerciaux dans le monde
wrong_answers:
  - Parce que les armes modernes sont plus destructrices et provoquent des dégâts environnementaux qui affectent les pays voisins
  - Parce que le droit international impose désormais à toutes les nations d'apporter une aide financière aux pays en conflit
  - Parce que la communication moderne fait que les gens sont plus touchés émotionnellement par les conflits lointains qu'au cours des siècles précédents
explanation: |
  Le chapitre explique que l'interdépendance économique moderne crée une chaîne mondiale de bénéfices mutuels par le biais du commerce. Lorsque des conflits perturbent la production ou le commerce dans une région, les effets se répercutent sur l'ensemble du réseau de relations économiques. Le texte prend l'exemple de la guerre de Sécession qui a ruiné les industries textiles européennes, notamment à Lyon, simplement en perturbant les relations commerciales. Cela démontre que l'interconnexion économique rend la guerre de plus en plus préjudiciable pour tous les participants à l'économie mondiale, et pas seulement pour les parties belligérantes.
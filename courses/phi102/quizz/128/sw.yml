question: Kwa nini kutegemeana kiuchumi kwa kisasa hufanya migogoro ya kimataifa iwe ghali zaidi kwa mataifa yote, hata yale ambayo hayashiriki moja kwa moja katika vita?
answer: Kwa sababu usumbufu katika minyororo ya biashara ya kimataifa husababisha hasara za kiuchumi kuenea kwa washirika wote wa biashara duniani kote
wrong_answers:
  - Kwa sababu silaha za kisasa zina uharibifu zaidi na husababisha uharibifu wa mazingira unaoathiri nchi jirani
  - Kwa sababu sheria ya kimataifa sasa inazitaka mataifa yote kutoa msaada wa kifedha kwa nchi zinazopitia migogoro
  - Kwa sababu mawasiliano ya kisasa huwafanya watu kuathiriwa zaidi kihisia na migogoro ya mbali kuliko ilivyokuwa karne zilizopita.
explanation: |
  Sura hiyo inaelezea kwamba utegemezi wa kiuchumi wa kisasa huunda mnyororo wa kimataifa wa manufaa ya pande zote kupitia biashara. Migogoro inapovuruga uzalishaji au biashara katika eneo moja, athari huenea katika mtandao mzima wa mahusiano ya kiuchumi. Maandishi hayo yanatumia mfano wa Vita vya wenyewe kwa wenyewe vya Marekani vinavyosababisha uharibifu kwa viwanda vya nguo vya Ulaya, hasa huko Lyon, kupitia tu kuvuruga mahusiano ya kibiashara. Hii inaonyesha jinsi muunganiko wa kiuchumi unavyofanya vita kuwa na madhara zaidi kwa washiriki wote katika uchumi wa dunia, si pande zinazopigana pekee.
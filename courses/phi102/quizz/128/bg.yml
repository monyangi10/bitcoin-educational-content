question: Защо съвременната икономическа взаимозависимост прави международните конфликти по-скъпи за всички държави, дори и за тези, които не участват пряко във войната?
answer: Тъй като смущенията в глобалните търговски вериги водят до икономически загуби, които се разпространяват върху всички търговски партньори по света
wrong_answers:
  - Тъй като съвременните оръжия са по-разрушителни и причиняват екологични щети, които засягат съседните държави
  - Тъй като международното право вече изисква от всички държави да предоставят финансова помощ на страни, които преживяват конфликти
  - Тъй като съвременната комуникация прави хората по-емоционално засегнати от отдалечени конфликти, отколкото в предишните векове
explanation: |
  В главата се обяснява, че съвременната икономическа взаимозависимост създава глобална верига на взаимна изгода чрез търговията. Когато конфликтите нарушават производството или търговията в един регион, последиците се разпространяват в цялата мрежа от икономически взаимоотношения. В текста се използва примерът с Гражданската война в САЩ, която разрушава европейските текстилни индустрии, особено в Лион, само поради прекъсването на търговските отношения. Това показва как икономическата взаимосвързаност прави войната все по-вредна за всички участници в световната икономика, а не само за воюващите страни.
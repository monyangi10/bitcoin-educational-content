question: Varför gör det moderna ekonomiska ömsesidiga beroendet internationella konflikter mer kostsamma för alla nationer, även för dem som inte är direkt inblandade i krigföringen?
answer: Eftersom störningar i globala handelskedjor leder till att ekonomiska förluster sprids till alla handelspartner över hela världen
wrong_answers:
  - Eftersom moderna vapen är mer destruktiva och skapar miljöskador som påverkar grannländerna
  - Eftersom internationell rätt nu kräver att alla länder ska ge ekonomiskt stöd till länder som upplever konflikter
  - Eftersom modern kommunikation gör att människor påverkas mer känslomässigt av avlägsna konflikter än under tidigare århundraden
explanation: |
  I kapitlet förklaras att det moderna ekonomiska ömsesidiga beroendet skapar en global kedja av ömsesidig nytta genom handel. När konflikter stör produktionen eller handeln i en region sprider sig effekterna genom hela nätverket av ekonomiska relationer. I texten används exemplet att det amerikanska inbördeskriget förstörde europeiska textilindustrier, särskilt i Lyon, helt enkelt genom att handelsförbindelserna avbröts. Detta visar hur den ekonomiska sammankopplingen gör att krig blir alltmer skadliga för alla deltagare i den globala ekonomin, inte bara för de stridande parterna.
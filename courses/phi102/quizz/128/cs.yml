question: Proč moderní vzájemná ekonomická závislost způsobuje, že mezinárodní konflikty jsou nákladnější pro všechny státy, i pro ty, které nejsou přímo zapojeny do válečných konfliktů?
answer: Protože narušení globálních obchodních řetězců způsobuje ekonomické ztráty, které se šíří na všechny obchodní partnery po celém světě
wrong_answers:
  - Protože moderní zbraně jsou ničivější a způsobují škody na životním prostředí, které ovlivňují sousední země
  - Protože mezinárodní právo nyní vyžaduje, aby všechny státy poskytovaly finanční pomoc zemím, které zažívají konflikty
  - Moderní komunikace způsobuje, že lidé jsou vzdálenými konflikty zasaženi více než v předchozích stoletích
explanation: |
  Kapitola vysvětluje, že moderní ekonomická vzájemná závislost vytváří globální řetězec vzájemného prospěchu prostřednictvím obchodu. Pokud konflikty naruší výrobu nebo obchod v jednom regionu, jejich dopady se šíří celou sítí ekonomických vztahů. V textu je uveden příklad americké občanské války, která způsobila zkázu evropského textilního průmyslu, zejména v Lyonu, a to jen díky narušení obchodních vztahů. To ukazuje, jak ekonomická propojenost způsobuje, že válka je stále škodlivější pro všechny účastníky globální ekonomiky, nejen pro válčící strany.
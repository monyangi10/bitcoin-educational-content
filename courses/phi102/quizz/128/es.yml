question: ¿Por qué la interdependencia económica moderna hace que los conflictos internacionales sean más costosos para todas las naciones, incluso para las que no participan directamente en la guerra?
answer: Porque las interrupciones de las cadenas comerciales mundiales provocan pérdidas económicas que se extienden a todos los socios comerciales del mundo
wrong_answers:
  - Porque las armas modernas son más destructivas y provocan daños medioambientales que afectan a los países vecinos
  - Porque el Derecho internacional exige ahora a todas las naciones que proporcionen ayuda financiera a los países en conflicto
  - Porque la comunicación moderna hace que la gente se vea más afectada emocionalmente por conflictos lejanos que en siglos anteriores
explanation: |
  El capítulo explica que la interdependencia económica moderna crea una cadena global de beneficio mutuo a través del comercio. Cuando los conflictos perturban la producción o el comercio en una región, los efectos se propagan por toda la red de relaciones económicas. El texto utiliza el ejemplo de la Guerra Civil estadounidense que causó la ruina de las industrias textiles europeas, especialmente en Lyon, simplemente por la interrupción de las relaciones comerciales. Esto demuestra cómo la interconexión económica hace que la guerra sea cada vez más perjudicial para todos los participantes en la economía mundial, no sólo para las partes beligerantes.
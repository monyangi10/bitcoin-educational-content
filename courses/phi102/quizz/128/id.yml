question: Mengapa saling ketergantungan ekonomi modern membuat konflik internasional menjadi lebih mahal bagi semua negara, bahkan bagi mereka yang tidak terlibat langsung dalam peperangan?
answer: Karena gangguan pada rantai perdagangan global menyebabkan kerugian ekonomi menyebar ke semua mitra dagang di seluruh dunia
wrong_answers:
  - Karena senjata modern lebih merusak dan menciptakan kerusakan lingkungan yang berdampak pada negara tetangga
  - Karena hukum internasional sekarang mewajibkan semua negara untuk memberikan bantuan keuangan kepada negara-negara yang mengalami konflik
  - Karena komunikasi modern membuat orang lebih terpengaruh secara emosional oleh konflik jarak jauh daripada abad-abad sebelumnya
explanation: |
  Bab ini menjelaskan bahwa saling ketergantungan ekonomi modern menciptakan rantai global yang saling menguntungkan melalui perdagangan. Ketika konflik mengganggu produksi atau perdagangan di satu wilayah, efeknya akan merembet ke seluruh jaringan hubungan ekonomi. Teks ini menggunakan contoh Perang Saudara Amerika yang menyebabkan kehancuran pada industri tekstil Eropa, khususnya di Lyon, hanya karena terganggunya hubungan komersial. Hal ini menunjukkan bagaimana keterkaitan ekonomi membuat perang semakin berbahaya bagi semua peserta dalam ekonomi global, bukan hanya pihak yang bertikai.
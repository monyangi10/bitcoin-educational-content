question: Zašto moderna ekonomska međuzavisnost čini međunarodne sukobe skupljim za sve nacije, čak i za one koje nisu direktno uključene u ratovanje?
answer: Zbog poremećaja u globalnim trgovinskim lancima ekonomski gubici se šire na sve trgovinske partnere širom sveta
wrong_answers:
  - Zato što su moderna oružja destruktivnija i stvaraju ekološku štetu koja utiče na susedne zemlje
  - Zato što međunarodno pravo sada zahteva da sve nacije pruže finansijsku pomoć zemljama koje doživljavaju sukobe
  - Zbog moderne komunikacije ljudi su emotivno više pogođeni udaljenim sukobima nego u prethodnim vekovima.
explanation: |
  Poglavlje objašnjava da moderna ekonomska međuzavisnost stvara globalni lanac uzajamne koristi kroz trgovinu. Kada sukobi poremete proizvodnju ili trgovinu u jednom regionu, efekti se šire kroz celu mrežu ekonomskih odnosa. Tekst koristi primer Američkog građanskog rata koji je izazvao propast evropskih tekstilnih industrija, posebno u Lionu, jednostavno kroz poremećaj komercijalnih odnosa. Ovo pokazuje kako ekonomska povezanost čini rat sve štetnijim za sve učesnike u globalnoj ekonomiji, a ne samo za zaraćene strane.
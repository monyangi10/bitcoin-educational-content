question: Was war die Hauptbeschäftigung von Cabanis, einem der wichtigsten Idéologen der französischen liberalen Tradition?
answer: Er war Arzt
wrong_answers:
  - Er war ein Militärgeneral
  - Er war ein Rechtsgelehrter
  - Er war ein Bankexperte
explanation: |
  Dem Text zufolge war Cabanis Arzt, was zeigt, dass die Idéologen nicht nur abstrakte Theoretiker waren, sondern auch praktische Fachleute. Im Text wird ausdrücklich erwähnt, dass diese Denker theoretische Arbeit mit praktischer Erfahrung verbanden - Cabanis als Arzt und Destutt de Tracy als Landwirt. Dies widerspricht dem gängigen Vorwurf der Realitätsferne und zeigt, dass sie ihre liberalen Theorien auf reale Erfahrungen und Beobachtungen stützten.
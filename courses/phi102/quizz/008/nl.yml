question: Wat was de voornaamste bezigheid van Cabanis, een van de vooraanstaande Idéologues uit de Franse liberale traditie?
answer: Hij was arts
wrong_answers:
  - Hij was een militair generaal
  - Hij was een rechtsgeleerde
  - Hij was een bankexpert
explanation: |
  Volgens de tekst was Cabanis een arts (medical doctor), wat aantoont dat de Idéologues niet alleen abstracte theoretici waren, maar ook praktische professionals. De tekst vermeldt specifiek dat deze denkers theoretisch werk combineerden met praktische ervaring - Cabanis als arts en Destutt de Tracy als landbouwer. Dit is in tegenspraak met de gangbare kritiek dat ze niet verbonden waren met de werkelijkheid, maar toont juist aan dat ze hun liberale theorieën baseerden op ervaringen en observaties uit de echte wereld.
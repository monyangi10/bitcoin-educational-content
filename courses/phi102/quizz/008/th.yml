question: อาชีพหลักของ Cabanis ซึ่งเป็นหนึ่งใน Idéologues ที่มีชื่อเสียงในประเพณีเสรีนิยมของฝรั่งเศสคืออะไร?
answer: เขาเป็นแพทย์
wrong_answers:
  - เขาเป็นนายพลทหาร
  - เขาเป็นนักวิชาการด้านกฎหมาย
  - เขาเป็นผู้เชี่ยวชาญด้านการธนาคาร
explanation: |
  ตามข้อความ Cabanis เป็นแพทย์ (หมอ) ซึ่งแสดงให้เห็นว่า Idéologues ไม่ได้เป็นเพียงนักทฤษฎีที่เป็นนามธรรมเท่านั้น แต่ยังเป็นมืออาชีพที่ปฏิบัติได้จริง ข้อความระบุโดยเฉพาะว่าผู้คิดเหล่านี้รวมงานทฤษฎีเข้ากับประสบการณ์จริง - Cabanis ในฐานะแพทย์และ Destutt de Tracy ในฐานะนักเกษตรกรรม สิ่งนี้ขัดแย้งกับคำวิจารณ์ทั่วไปที่ว่าพวกเขาไม่เชื่อมโยงกับความเป็นจริง โดยแสดงให้เห็นว่าพวกเขาวางรากฐานทฤษฎีเสรีนิยมของพวกเขาในประสบการณ์และการสังเกตการณ์ในโลกจริง
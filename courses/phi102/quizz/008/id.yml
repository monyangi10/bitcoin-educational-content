question: Apa pekerjaan utama Cabanis, salah satu Idéolog terkemuka yang disebut-sebut dalam tradisi liberal Prancis?
answer: Dia adalah seorang dokter medis
wrong_answers:
  - Dia adalah seorang jenderal militer
  - Dia adalah seorang sarjana hukum
  - Beliau adalah seorang ahli perbankan
explanation: |
  Menurut teks, Cabanis adalah seorang dokter (dokter medis), yang menunjukkan bahwa para Idéolog tidak hanya ahli teori abstrak tetapi juga profesional praktis. Teks tersebut secara khusus menyebutkan bahwa para pemikir ini menggabungkan karya teoritis dengan pengalaman praktis - Cabanis sebagai dokter dan Destutt de Tracy sebagai ahli pertanian. Hal ini bertentangan dengan kritik umum bahwa mereka terputus dari realitas, sebaliknya menunjukkan bahwa mereka mendasarkan teori-teori liberal mereka pada pengalaman dan observasi dunia nyata.
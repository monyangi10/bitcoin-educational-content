question: Koja je bila glavna profesija Cabanisa, jednog od istaknutih Idéologues pomenutih u francuskoj liberalnoj tradiciji?
answer: Bio je lekar
wrong_answers:
  - Bio je vojni general
  - Bio je pravni naučnik
  - Bio je stručnjak za bankarstvo
explanation: |
  Prema tekstu, Kabanis je bio lekar (doktor medicine), što pokazuje da Idéologues nisu bili samo apstraktni teoretičari već i praktični profesionalci. Tekst posebno pominje da su ovi mislioci kombinovali teorijski rad sa praktičnim iskustvom - Kabanis kao lekar i Destut de Trasi kao agronom. Ovo protivreči uobičajenoj kritici da su bili odvojeni od stvarnosti, pokazujući umesto toga da su svoje liberalne teorije zasnivali na iskustvu i posmatranju iz stvarnog sveta.
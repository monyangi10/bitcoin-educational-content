question: Mis oli Cabanise, ühe prantsuse liberaalses traditsioonis mainitud silmapaistva idéoloogi põhitegevus?
answer: Ta oli arst
wrong_answers:
  - Ta oli sõjaväekindral
  - Ta oli õigusteadlane
  - Ta oli pangandusekspert
explanation: |
  Teksti kohaselt oli Cabanis arst (meditsiinitöötaja), mis näitab, et idéoloogid ei olnud mitte ainult abstraktsed teoreetikud, vaid ka praktilised spetsialistid. Tekstis mainitakse konkreetselt, et need mõtlejad ühendasid teoreetilise töö praktilise kogemusega - Cabanis kui arst ja Destutt de Tracy kui põllumajandustöötaja. See on vastuolus levinud kriitikaga, et nad olid tegelikkusest lahutatud, näidates hoopis, et nad rajasid oma liberaalsed teooriad tegelikule kogemusele ja vaatlusele.
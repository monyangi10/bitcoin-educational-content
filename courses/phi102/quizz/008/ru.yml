question: Чем занимался Кабанис, один из выдающихся идеологов французской либеральной традиции?
answer: Он был доктором медицины
wrong_answers:
  - Он был военным генералом
  - Он был ученым-юристом
  - Он был экспертом по банковскому делу
explanation: |
  Согласно тексту, Кабанис был врачом (медиком), что свидетельствует о том, что "Идеологи" были не только абстрактными теоретиками, но и профессионалами-практиками. В тексте особо отмечается, что эти мыслители совмещали теоретическую работу с практическим опытом - Кабанис как врач, а Дестют де Траси как земледелец. Это опровергает распространенную критику, согласно которой они были оторваны от реальности, и показывает, что они основывали свои либеральные теории на реальном опыте и наблюдениях.
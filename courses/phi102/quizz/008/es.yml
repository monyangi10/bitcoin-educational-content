question: ¿Cuál era la principal ocupación de Cabanis, uno de los destacados Idéologues mencionados en la tradición liberal francesa?
answer: Era médico
wrong_answers:
  - Era un general militar
  - Era jurista
  - Era un experto bancario
explanation: |
  Según el texto, Cabanis era médico (doctor en medicina), lo que demuestra que los Idéologues no eran sólo teóricos abstractos, sino también profesionales prácticos. El texto menciona específicamente que estos pensadores combinaban el trabajo teórico con la experiencia práctica - Cabanis como médico y Destutt de Tracy como agrónomo. Esto contradice la crítica común de que estaban desconectados de la realidad, mostrando en cambio que basaban sus teorías liberales en la experiencia y la observación del mundo real.
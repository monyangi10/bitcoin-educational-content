question: Qual era a principal atividade profissional de Cabanis, um dos mais proeminentes Idéologues mencionados na tradição liberal francesa?
answer: Ele era um médico
wrong_answers:
  - Ele era um general militar
  - Era um académico de direito
  - Era um perito bancário
explanation: |
  De acordo com o texto, Cabanis era médico, o que demonstra que os Idéologues não eram apenas teóricos abstractos, mas também profissionais práticos. O texto refere especificamente que estes pensadores combinavam o trabalho teórico com a experiência prática - Cabanis como médico e Destutt de Tracy como agricultor. Este facto contradiz a crítica comum de que estavam desligados da realidade, mostrando, pelo contrário, que baseavam as suas teorias liberais na experiência e observação do mundo real.
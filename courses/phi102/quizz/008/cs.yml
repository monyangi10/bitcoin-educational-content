question: Jaké bylo hlavní zaměstnání Cabanise, jednoho z významných idéologů zmiňovaných ve francouzské liberální tradici?
answer: Byl lékařem
wrong_answers:
  - Byl vojenským generálem
  - Byl právním vědcem
  - Byl odborníkem na bankovnictví
explanation: |
  Podle textu byl Cabanis lékařem, což dokazuje, že idéologové nebyli jen abstraktní teoretici, ale také praktičtí odborníci. Text výslovně zmiňuje, že tito myslitelé spojovali teoretickou práci s praktickými zkušenostmi - Cabanis jako lékař a Destutt de Tracy jako zemědělec. To odporuje běžné kritice, že byli odtrženi od reality, a naopak ukazuje, že své liberální teorie zakládali na reálných zkušenostech a pozorování.
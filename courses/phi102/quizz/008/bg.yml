question: Какво е било основното занимание на Кабанис, един от видните идеолози, споменати във френската либерална традиция?
answer: Той е бил лекар
wrong_answers:
  - Той е бил военен генерал
  - Той е юрист
  - Той е банков експерт
explanation: |
  Според текста Кабанис е бил лекар (медик), което показва, че идеолозите не са били само абстрактни теоретици, но и практици. В текста изрично се споменава, че тези мислители са съчетавали теоретичната работа с практическия опит - Кабанис като лекар, а Дестут дьо Траси като земеделец. Това противоречи на често срещаната критика, че те са били откъснати от реалността, като вместо това показва, че те са обосновавали своите либерални теории с реален опит и наблюдения.
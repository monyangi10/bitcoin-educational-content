question: 프랑스 자유주의 전통에서 언급되는 대표적인 이데올로기 중 하나인 카바니스의 주요 직업은 무엇이었나요?
answer: 그는 의사였습니다
wrong_answers:
  - 그는 군 장군이었습니다
  - 그는 법학자였습니다
  - 그는 은행 전문가였습니다
explanation: |
  텍스트에 따르면 카바니스는 의사(의사)였으며, 이는 이데올로기가 추상적인 이론가일 뿐만 아니라 실제적인 전문가였음을 보여줍니다. 본문은 특히 이 사상가들이 이론적 작업과 실제 경험을 결합했다는 점을 언급하는데, 카바니스는 의사로서, 데스투트 드 트레이시는 농업가로서 활동했습니다. 이는 현실과 단절되었다는 일반적인 비판과 모순되는 것으로, 오히려 그들이 현실 경험과 관찰을 바탕으로 자유주의 이론을 정립했음을 보여줍니다.
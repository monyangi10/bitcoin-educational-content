question: Hva var hovedbeskjeftigelsen til Cabanis, en av de fremtredende idéologene i den franske liberale tradisjonen?
answer: Han var lege
wrong_answers:
  - Han var en militær general
  - Han var en juridisk lærd
  - Han var bankekspert
explanation: |
  Ifølge teksten var Cabanis lege, noe som viser at idéologene ikke bare var abstrakte teoretikere, men også praktiske yrkesutøvere. Teksten nevner spesifikt at disse tenkerne kombinerte teoretisk arbeid med praktisk erfaring - Cabanis som lege og Destutt de Tracy som agronom. Dette motsier den vanlige kritikken om at de var virkelighetsfjerne, og viser i stedet at de forankret sine liberale teorier i erfaringer og observasjoner fra den virkelige verden.
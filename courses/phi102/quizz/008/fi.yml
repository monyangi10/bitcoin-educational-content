question: Mikä oli Cabanisin, yhden ranskalaisen liberaalin perinteen tunnetuimmista idéologeista, pääasiallinen ammatti?
answer: Hän oli lääkäri
wrong_answers:
  - Hän oli sotilaskenraali
  - Hän oli oikeustieteilijä
  - Hän oli pankkiasiantuntija
explanation: |
  Tekstin mukaan Cabanis oli lääkäri, mikä osoittaa, että idéologit eivät olleet vain abstrakteja teoreetikkoja vaan myös käytännön ammattilaisia. Tekstissä mainitaan erityisesti, että nämä ajattelijat yhdistivät teoreettisen työn ja käytännön kokemuksen - Cabanis lääkärinä ja Destutt de Tracy maanviljelijänä. Tämä on ristiriidassa sen yleisen kritiikin kanssa, jonka mukaan he olivat irtautuneet todellisuudesta, ja osoittaa sen sijaan, että he perustivat liberaalit teoriansa reaalimaailman kokemuksiin ja havaintoihin.
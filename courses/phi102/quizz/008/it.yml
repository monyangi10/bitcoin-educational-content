question: Qual era l'occupazione principale di Cabanis, uno dei principali Idéologues citati nella tradizione liberale francese?
answer: Era un medico
wrong_answers:
  - Era un generale militare
  - Era uno studioso di diritto
  - Era un esperto di banche
explanation: |
  Secondo il testo, Cabanis era un medico, il che dimostra che gli Idéologues non erano solo teorici astratti ma anche professionisti pratici. Il testo menziona specificamente che questi pensatori combinavano il lavoro teorico con l'esperienza pratica - Cabanis come medico e Destutt de Tracy come agricoltore. Ciò contraddice la critica comune secondo cui essi erano scollegati dalla realtà, dimostrando invece che fondavano le loro teorie liberali sull'esperienza e sull'osservazione del mondo reale.
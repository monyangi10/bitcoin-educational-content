question: Nghề nghiệp chính của Cabanis, một trong những nhà tư tưởng nổi bật được nhắc đến trong truyền thống tự do Pháp, là gì?
answer: Ông ấy là một bác sĩ y khoa.
wrong_answers:
  - Ông ta là một vị tướng quân đội.
  - Ông là một học giả luật.
  - Ông ấy là một chuyên gia ngân hàng.
explanation: |
  Theo văn bản, Cabanis là một bác sĩ, điều này chứng tỏ rằng các nhà tư tưởng theo trường phái Idéologues không chỉ là những nhà lý luận trừu tượng mà còn là những chuyên gia thực tiễn. Văn bản đặc biệt đề cập rằng những nhà tư tưởng này kết hợp công việc lý thuyết với kinh nghiệm thực tiễn - Cabanis là bác sĩ và Destutt de Tracy là một nhà nông học. Điều này mâu thuẫn với lời chỉ trích phổ biến cho rằng họ tách rời khỏi thực tế, thay vào đó cho thấy rằng họ đã dựa trên các lý thuyết tự do của mình vào kinh nghiệm và quan sát thực tế.
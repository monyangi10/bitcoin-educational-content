question: Quelle était l'occupation principale de Cabanis, l'un des principaux idéologues mentionnés dans la tradition libérale française ?
answer: Il était médecin
wrong_answers:
  - Il était général militaire
  - Il était juriste
  - Il était expert bancaire
explanation: |
  Selon le texte, Cabanis était médecin, ce qui montre que les Idéologues n'étaient pas seulement des théoriciens abstraits, mais aussi des professionnels de la pratique. Le texte mentionne spécifiquement que ces penseurs combinaient travail théorique et expérience pratique - Cabanis en tant que médecin et Destutt de Tracy en tant qu'agriculteur. Cela contredit la critique courante selon laquelle ils étaient déconnectés de la réalité, montrant au contraire qu'ils fondaient leurs théories libérales sur l'expérience et l'observation du monde réel.
question: フランス自由主義の伝統の中で著名なイデオローグの一人であるカバニスの主な職業は何だったのだろうか？
answer: 彼は医師だった
wrong_answers:
  - 彼は軍の将軍だった。
  - 彼は法学者だった
  - 彼は銀行の専門家だった
explanation: |
  本文によれば、カバニスは医師（医学博士）であり、イデオローグが抽象的な理論家であるだけでなく、実践的な専門家でもあったことを示している。本文では、これらの思想家たちが理論的な仕事と実践的な経験を結びつけていたこと、つまりカバニスは医師として、デスタット・ド・トレーシーは農業従事者であったことが特に言及されている。このことは、彼らが現実から切り離されていたという一般的な批判とは矛盾し、その代わりに、彼らが自由主義理論を現実の経験や観察に根拠を置いていたことを示している。
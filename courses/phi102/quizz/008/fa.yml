question: شغل اصلی کابانیس، یکی از ایدئولوگ‌های برجسته ذکر شده در سنت لیبرال فرانسه چه بود؟
answer: او یک پزشک بود
wrong_answers:
  - او یک ژنرال نظامی بود
  - او یک دانشمند حقوقی بود
  - او یک کارشناس بانکی بود
explanation: |
  بر اساس متن، کابانیس یک پزشک (دکتر پزشکی) بود که نشان می‌دهد ایدئولوگ‌ها نه تنها نظریه‌پردازان انتزاعی بلکه حرفه‌ای‌های عملی نیز بودند. متن به‌طور خاص اشاره می‌کند که این متفکران کار نظری را با تجربه عملی ترکیب کردند - کابانیس به عنوان یک پزشک و دستوت دو تراسی به عنوان یک کشاورز. این امر با انتقاد رایج که آن‌ها از واقعیت جدا بودند، در تضاد است و نشان می‌دهد که آن‌ها نظریه‌های لیبرال خود را بر اساس تجربه و مشاهده دنیای واقعی پایه‌گذاری کرده‌اند.
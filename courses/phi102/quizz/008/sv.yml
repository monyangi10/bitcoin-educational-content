question: Vilken var Cabanis huvudsakliga sysselsättning, en av de framstående idéologer som nämns i den franska liberala traditionen?
answer: Han var läkare
wrong_answers:
  - Han var en militär general
  - Han var rättslärd
  - Han var bankexpert
explanation: |
  Enligt texten var Cabanis läkare (medical doctor), vilket visar att Idéologerna inte bara var abstrakta teoretiker utan också praktiska yrkesmän. I texten nämns uttryckligen att dessa tänkare kombinerade teoretiskt arbete med praktisk erfarenhet - Cabanis som läkare och Destutt de Tracy som jordbrukare. Detta motsäger den vanliga kritiken om att de var verklighetsfrånvända och visar istället att de grundade sina liberala teorier i verkliga erfarenheter och observationer.
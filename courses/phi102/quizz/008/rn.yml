question: Ni igiki Cabanis, umwe mu ba Idéologues bazwi cane bavugwa mu migenzo y’ubwigenge bw’Abafaransa, yari akora?
answer: Yari umuganga w'ubuvuzi
wrong_answers:
  - Yari umujenerali w'igisirikare .
  - Yari intiti mu vy'amategeko .
  - Yari umuhinga mu vy'amabanki .
explanation: |
  Dukurikije ico canditswe, Cabanis yari umuganga (umuganga w’ubuvuzi), ivyo bikaba vyerekana ko aba Idéologues atari abahinga mu vy’inyigisho zitaboneka gusa, ariko kandi ko bari abahinga mu vy’ibikorwa. Ico canditswe kivuga canecane ko abo bazirikana bahuje igikorwa c’ivyiyumviro n’ubumenyi bukora - Cabanis nk’umuganga na Destutt de Tracy nk’umuhinga mu vy’uburimyi. Ivyo bivuguruza ivyo abantu benshi banegura ko batagira aho bahuriye n’ukuri, bikaba vyerekana ahubwo ko bashingiye ivyiyumviro vyabo vy’ubwigenge ku vyo baciyemwo n’ivyo babonye vy’ukuri.
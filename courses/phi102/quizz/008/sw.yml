question: Kazi kuu ya Cabanis, mmoja wa watu mashuhuri waliotajwa katika utamaduni wa kiliberali wa Ufaransa, ilikuwa ipi?
answer: Alikuwa daktari wa tiba
wrong_answers:
  - Alikuwa jenerali wa kijeshi
  - Alikuwa msomi wa sheria
  - Alikuwa mtaalamu wa benki
explanation: |
  Kulingana na maandishi, Cabanis alikuwa daktari (daktari), jambo linaloonyesha kwamba Wanataaluma wa Idéologues hawakuwa wananadharia wa kufikirika tu bali pia wataalamu wa vitendo. Maandishi yanataja haswa kwamba wanafikra hawa walichanganya kazi ya kinadharia na uzoefu wa vitendo - Cabanis kama daktari na Destutt de Tracy kama mtaalamu wa kilimo. Hii inapingana na ukosoaji wa kawaida kwamba hawakuwa wametenganishwa na ukweli, ikionyesha badala yake kwamba waliweka nadharia zao za kiliberali katika uzoefu na uchunguzi wa ulimwengu halisi.
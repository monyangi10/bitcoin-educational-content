question: 卡巴尼斯是法國自由主義傳統中提到的著名 Idéologues 之一，他的主要職業是什麼？
answer: 他是一名醫生
wrong_answers:
  - 他是一位軍事將軍
  - 他是一位法律學者
  - 他是一位銀行專家
explanation: |
  根據文中所述，Cabanis 是一位醫師（醫生），這顯示出 Idéologues 不僅是抽象的理論家，也是實際的專業人士。文中特別提到這些思想家結合了理論工作與實際經驗 - Cabanis 是一位醫生，Destutt de Tracy 則是一位農業家。這與一般認為他們脫離現實的批評相矛盾，反而顯示出他們的自由主義理論是以現實世界的經驗與觀察為基礎。
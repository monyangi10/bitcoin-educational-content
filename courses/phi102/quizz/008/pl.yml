question: Jakie było główne zajęcie Cabanisa, jednego z wybitnych Idéologues wspomnianych we francuskiej tradycji liberalnej?
answer: Był lekarzem medycyny
wrong_answers:
  - Był generałem wojskowym
  - Był prawnikiem
  - Był ekspertem w dziedzinie bankowości
explanation: |
  Według tekstu, Cabanis był lekarzem (medykiem), co pokazuje, że Idéologues byli nie tylko abstrakcyjnymi teoretykami, ale także praktycznymi profesjonalistami. Tekst wyraźnie wspomina, że myśliciele ci łączyli pracę teoretyczną z praktycznym doświadczeniem - Cabanis jako lekarz, a Destutt de Tracy jako rolnik. Zaprzecza to powszechnej krytyce, że byli oni oderwani od rzeczywistości, pokazując zamiast tego, że opierali swoje liberalne teorie na rzeczywistym doświadczeniu i obserwacji.
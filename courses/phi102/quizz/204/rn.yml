question: Dushingiye ku nseguro ya Bastiat, ni uburyo ubuhe abahinga mu vy’ubutunzi b’abanyagihugu bakwiye gukoresha kugira ngo bashobore gushinga intahe neza umwidegemvyo w’ubutunzi mu kibano?
answer: Kumenya no gusenyura mu buryo butunganye ivyiyumviro bitari vyo bitanga umushinge w’ubwenge ku mice irwanya umwidegemvyo w’ubutunzi .
wrong_answers:
  - Kwibanda canecane ku kwerekana inyungu z’amasoko y’uburenganzira biciye ku bimenyamenya vy’ivyashikiye abantu n’isesengura ry’imibare .
  - Kwibanda ku kwubaka amashirahamwe ya politike no gusaba intwaro gushitsa politike zifasha isoko n'ingingo zo gukuraho amategeko
  - Gushimika ku mpamvu z’inyifato runtu zijanye n’uburenganzira bw’umuntu ku giti ciwe be n’ingingo ngenderwako z’amategeko kavukire zituma umuntu agira umwidegemvyo mu vy’ubutunzi kuruta uko Leta yinjiramwo .
explanation: |
  Bastiat yaratahuye ko umwidegemvyo w’ubutunzi udashobora gushingwa gusa biciye ku bimenyamenya vy’ivyashikiye abantu, ibikorwa vya politike canke imvo z’inyifato runtu gusa. Yaremeye ko uburyo bwo guhiganwa nk’ubukomunisita n’amategeko arenze urugero vyagumye bifise akosho biciye ku mishinge y’ubwenge ikomeye ariko y’ibinyoma - ubuhinga bw’ubutunzi. Rero, abahinga mu vy’ubutunzi b’abanyagihugu bategerezwa kubanza gusenyura izo nzira zihiganwa mu gushira ahabona amakosa yazo y’ubwenge n’amakosa y’ukuri. Ubwo buryo bwo gusenyura ubwenge bwari ngirakamaro kubera ko naho abahinga boshobora kwemera izo nzira z’ubupfumu, kenshi abantu muri rusangi ntibashobora kuzimenya ubwazo, ivyo bikaba bituma ugusuzuma n’inyigisho zikomeye biba ari ngirakamaro kugira ngo umuntu ashinge intahe umwidegemvyo nyakuri w’ubutunzi.
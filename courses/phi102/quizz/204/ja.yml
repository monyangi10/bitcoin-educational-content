question: バスティアの分析によれば、社会における経済的自由を効果的に確立するために、自由主義経済学者はどのような方法論を採用すべきか？
answer: 経済的自由に反対するシステムの知的基盤となっている誤った推論を体系的に特定し、解体する。
wrong_answers:
  - 実証的証拠と統計的分析を通じて、自由市場の実際的な利点を実証することに主眼を置く。
  - 親市場政策や規制緩和策を実施するため、政治連合を構築し、政府に働きかけることに集中する。
  - 国家の介入よりも経済的自由を正当化する個人の権利と自然法の原則に関する道徳的議論を重視する。
explanation: |
  バスティアは、経済的自由は経験的証拠や政治的行動、道徳的議論だけでは確立できないことを理解していた。バスティアは、共産主義や過度の規制といった競合するシステムが、洗練されてはいるが誤った知的基盤、つまり経済的詭弁によって影響力を維持していることを認識していた。したがって、リベラルな経済学者はまず、これらの競合するシステムの論理的誤りや事実誤認を暴くことによって、これらのシステムを破壊しなければならない。なぜなら、専門家はこうした詭弁に気づくかもしれないが、一般大衆はしばしば自発的にそれを見分けることができないからである。
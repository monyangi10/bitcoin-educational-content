question: بر اساس متن، پایه اصلی تمام آزادی‌های اقتصادی چیست؟
answer: مالکیت خود
wrong_answers:
  - حقوق مالکیت بر زمین و منابع
  - آزادی تجارت و مبادله
  - نیاز فردی و علاقه شخصی
explanation: |
  مالکیت خود (propriété de soi) به‌طور صریح به‌عنوان 'پایه‌ی تمام تأملات در مورد آزادی اقتصادی' و پیش‌نیاز برای تصور مشروع مالکیت کالاهای مادی بیان شده است. بدون به رسمیت شناختن فرد به‌عنوان مالک خود، تصور مشروع مالکیت کالاهای مادی غیرممکن است. در حالی که حقوق مالکیت بر زمین، آزادی تجارت، و نیازهای فردی همگی مفاهیم مهمی هستند که در این فصل مورد بحث قرار گرفته‌اند، آن‌ها به‌عنوان جریان‌هایی از این اصل بنیادی‌تر مالکیت خود ارائه می‌شوند و نه به‌عنوان پایه‌ی اصلی خود.
question: Mikä on tekstin mukaan kaiken taloudellisen vapauden ensisijainen perusta?
answer: Omistusoikeus (propriété de soi)
wrong_answers:
  - Maan ja luonnonvarojen omistusoikeudet
  - Kaupan ja vaihdon vapaus
  - Yksilöllinen tarve ja henkilökohtainen etu
explanation: |
  Itseomistus (propriété de soi) mainitaan nimenomaisesti "kaiken taloudellista vapautta koskevan pohdinnan perustana" ja edellytyksenä sille, että aineellisten hyödykkeiden omistus voidaan käsittää laillisesti. Ilman yksilön tunnustamista itsensä omistajaksi on mahdotonta ajatella aineellisten hyödykkeiden omistusta laillisesti. Vaikka maan omistusoikeus, kaupan vapaus ja yksilön tarpeet ovat kaikki tärkeitä käsitteitä, joita käsitellään luvussa, ne esitetään pikemminkin tästä perustavammasta itseomistuksen periaatteesta juontuvina kuin itse ensisijaisena perustana.
question: Согласно тексту, что является первоосновой любой экономической свободы?
answer: Собственность на себя (propriété de soi)
wrong_answers:
  - Права собственности на землю и ресурсы
  - Свобода торговли и обмена
  - Индивидуальные потребности и личный интерес
explanation: |
  Собственность на себя (propriété de soi) прямо заявлена как "основа всех размышлений об экономической свободе" и необходимое условие для легитимного представления о собственности на материальные блага. Без признания человека собственником самого себя невозможно законно представить себе собственность на материальные блага. Хотя права собственности на землю, свобода торговли и индивидуальные потребности - все это важные понятия, обсуждаемые в главе, они представлены как вытекающие из этого более фундаментального принципа самообладания, а не как его первооснова.
question: Theo văn bản, nền tảng cơ bản của mọi tự do kinh tế là gì?
answer: Tự sở hữu (propété de soi)
wrong_answers:
  - Quyền sở hữu đối với đất đai và tài nguyên
  - Tự do thương mại và trao đổi
  - Nhu cầu cá nhân và sở thích cá nhân
explanation: |
  Quyền tự sở hữu (propriété de soi) được nêu rõ là 'nền tảng của mọi suy tư về tự do kinh tế' và là điều kiện tiên quyết để hình dung một cách hợp pháp về quyền sở hữu vật chất. Nếu không thừa nhận cá nhân là chủ sở hữu của chính mình, thì không thể hình dung một cách hợp pháp về quyền sở hữu vật chất. Mặc dù quyền sở hữu đất đai, tự do thương mại và nhu cầu cá nhân đều là những khái niệm quan trọng được thảo luận trong chương này, nhưng chúng được trình bày như là bắt nguồn từ nguyên tắc cơ bản hơn về quyền tự sở hữu chứ không phải là nền tảng chính yếu.
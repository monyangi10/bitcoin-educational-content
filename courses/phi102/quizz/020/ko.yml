question: 본문에 따르면 모든 경제적 자유의 기본 토대는 무엇인가요?
answer: 자기 소유권(소유권)
wrong_answers:
  - 토지 및 자원에 대한 재산권
  - 무역 및 교환의 자유
  - 개인의 필요와 개인적인 관심
explanation: |
  자기 소유권(propriété de soi)은 '경제적 자유에 대한 모든 성찰의 기초'이자 물질적 재화의 재산을 합법적으로 잉태하기 위한 전제 조건으로 명시적으로 언급되어 있습니다. 개인을 스스로의 소유자로 인정하지 않고는 물질적 재화의 재산을 합법적으로 잉태할 수 없습니다. 토지에 대한 재산권, 무역의 자유, 개인의 필요는 모두 이 장에서 논의되는 중요한 개념이지만, 그 자체가 주요 토대라기보다는 자기 소유권이라는 보다 근본적인 원칙에서 흘러나오는 것으로 제시됩니다.
question: 本文によれば、すべての経済的自由の第一の基盤は何か？
answer: 自己所有権（自分の所有権）
wrong_answers:
  - 土地と資源の所有権
  - 貿易と交換の自由
  - 個々のニーズと個人的関心
explanation: |
  自己所有権（propriété de soi）は、「経済的自由に関するあらゆる考察の基礎」であり、物質的財産の所有権を合法的に考えるための前提条件であると明言されている。個人を自分自身の所有者として認めなければ、物質的財産の所有権を合法的に考えることは不可能である。土地に対する所有権、貿易の自由、個人のニーズはすべてこの章で論じられる重要な概念であるが、それらは第一義的な基礎そのものというよりは、この自己所有権のより基本的な原理から流れ出るものとして提示されている。
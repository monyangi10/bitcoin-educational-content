question: Hva er, ifølge teksten, det viktigste grunnlaget for all økonomisk frihet?
answer: Selveierskap (propriété de soi)
wrong_answers:
  - Eiendomsrett til land og ressurser
  - Frihet for handel og utveksling
  - Individuelle behov og personlig interesse
explanation: |
  Selveierskap (propriété de soi) er eksplisitt uttalt som "grunnlaget for all refleksjon over økonomisk frihet" og forutsetningen for å legitimt kunne oppfatte eiendom til materielle goder. Uten å anerkjenne individet som eier av seg selv, er det umulig å legitimt tenke seg eiendomsrett til materielle goder. Selv om eiendomsrett til jord, handelsfrihet og individuelle behov alle er viktige begreper som diskuteres i kapittelet, presenteres de som en følge av dette mer grunnleggende prinsippet om selveierskap snarere enn å være det primære fundamentet i seg selv.
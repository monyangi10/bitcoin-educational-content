question: Jaki jest główny fundament wolności gospodarczej?
answer: Własność własna (propriété de soi)
wrong_answers:
  - Prawa własności do gruntów i zasobów
  - Wolność handlu i wymiany
  - Indywidualne potrzeby i osobiste zainteresowania
explanation: |
  Własność własna (propriété de soi) jest wyraźnie określona jako "podstawa wszelkiej refleksji nad wolnością gospodarczą" i warunek wstępny legalnego pojmowania własności dóbr materialnych. Bez uznania jednostki za właściciela samego siebie, niemożliwe jest legalne pojęcie własności dóbr materialnych. Podczas gdy prawa własności do ziemi, wolność handlu i indywidualne potrzeby są ważnymi pojęciami omawianymi w tym rozdziale, są one przedstawiane jako wypływające z tej bardziej fundamentalnej zasady samoposiadania, a nie jako główny fundament.
question: Prema tekstu, koja je primarna osnova sve ekonomske slobode?
answer: Sopstveno vlasništvo (propriété de soi)
wrong_answers:
  - Prava vlasništva nad zemljom i resursima
  - Sloboda trgovine i razmene
  - Individualna potreba i lični interes
explanation: |
  Samovlasništvo (propriété de soi) je eksplicitno navedeno kao 'temelj svake refleksije o ekonomskoj slobodi' i preduslov za legitimno shvatanje vlasništva nad materijalnim dobrima. Bez priznavanja pojedinca kao vlasnika samog sebe, nemoguće je legitimno shvatiti vlasništvo nad materijalnim dobrima. Dok su prava vlasništva nad zemljom, sloboda trgovine i individualne potrebe svi važni koncepti koji se razmatraju u poglavlju, oni su predstavljeni kao proizašli iz ovog fundamentalnijeg principa samovlasništva, a ne kao primarni temelj sami po sebi.
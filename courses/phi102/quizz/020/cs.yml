question: Co je podle textu primárním základem veškeré ekonomické svobody?
answer: Vlastnictví sebe sama (propriété de soi)
wrong_answers:
  - Vlastnická práva k půdě a zdrojům
  - Svoboda obchodu a směny
  - Individuální potřeba a osobní zájem
explanation: |
  Vlastnictví sebe sama (propriété de soi) je výslovně uvedeno jako "základ všech úvah o ekonomické svobodě" a předpoklad legitimního pojetí vlastnictví hmotných statků. Bez uznání jednotlivce jako vlastníka sebe sama není možné legitimně pojímat vlastnictví hmotných statků. Vlastnické právo k půdě, svoboda obchodu a individuální potřeby jsou sice důležité pojmy, o nichž se v kapitole hovoří, ale jsou prezentovány jako vyplývající z tohoto základnějšího principu vlastnictví sebe sama, nikoli jako primární základ samy o sobě.
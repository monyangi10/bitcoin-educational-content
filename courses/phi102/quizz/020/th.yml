question: ตามข้อความ พื้นฐานหลักของเสรีภาพทางเศรษฐกิจทั้งหมดคืออะไร?
answer: การเป็นเจ้าของตนเอง (propriété de soi)
wrong_answers:
  - สิทธิในทรัพย์สินเหนือที่ดินและทรัพยากร
  - เสรีภาพในการค้าและแลกเปลี่ยน
  - ความต้องการส่วนบุคคลและความสนใจส่วนตัว
explanation: |
  การเป็นเจ้าของตนเอง (propriété de soi) ถูกระบุไว้อย่างชัดเจนว่าเป็น 'รากฐานของการสะท้อนทั้งหมดเกี่ยวกับเสรีภาพทางเศรษฐกิจ' และเป็นข้อกำหนดเบื้องต้นสำหรับการคิดถึงทรัพย์สินของสินค้าวัตถุอย่างถูกต้องชอบธรรม หากไม่ยอมรับว่าบุคคลเป็นเจ้าของตนเอง ก็เป็นไปไม่ได้ที่จะคิดถึงทรัพย์สินของสินค้าวัตถุอย่างถูกต้องชอบธรรม ในขณะที่สิทธิในทรัพย์สินเหนือที่ดิน เสรีภาพในการค้า และความต้องการของบุคคล เป็นแนวคิดที่สำคัญทั้งหมดที่กล่าวถึงในบทนี้ พวกเขาถูกนำเสนอว่าเป็นผลสืบเนื่องจากหลักการพื้นฐานที่มากกว่าของการเป็นเจ้าของตนเอง แทนที่จะเป็นรากฐานหลักในตัวเอง
question: Metne göre, tüm ekonomik özgürlüklerin birincil temeli nedir?
answer: Kendi kendine sahiplik (propriété de soi)
wrong_answers:
  - Arazi ve kaynaklar üzerindeki mülkiyet hakları
  - Ticaret ve değişim özgürlüğü
  - Bireysel ihtiyaç ve kişisel ilgi
explanation: |
  Kendi kendine sahiplik (propriété de soi) açıkça 'ekonomik özgürlük üzerine tüm düşüncelerin temeli' ve maddi malların mülkiyetini meşru bir şekilde kavramanın ön koşulu olarak ifade edilmektedir. Bireyi kendi kendisinin sahibi olarak tanımadan, maddi malların mülkiyetini meşru bir şekilde düşünmek imkansızdır. Toprak üzerindeki mülkiyet hakları, ticaret özgürlüğü ve bireysel ihtiyaçlar bu bölümde tartışılan önemli kavramlar olmakla birlikte, bu kavramların kendileri birincil temel olmaktan ziyade, bu daha temel öz-mülkiyet ilkesinden kaynaklanıyormuş gibi sunulmaktadır.
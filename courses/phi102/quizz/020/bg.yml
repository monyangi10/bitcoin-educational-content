question: Според текста коя е основната основа на всяка икономическа свобода?
answer: Самостоятелна собственост (propriété de soi)
wrong_answers:
  - Права на собственост върху земя и ресурси
  - Свобода на търговията и обмена
  - Индивидуална потребност и личен интерес
explanation: |
  Самостоятелната собственост (propriété de soi) е изрично посочена като "основа на всички разсъждения за икономическата свобода" и предпоставка за легитимно възприемане на собствеността върху материалните блага. Без признаването на индивида като собственик на самия себе си е невъзможно легитимно да се осмисли собствеността на материалните блага. Макар че правата на собственост върху земята, свободата на търговията и индивидуалните потребности са важни понятия, обсъждани в главата, те са представени като произтичащи от този по-фундаментален принцип на самособствеността, а не са самата първична основа.
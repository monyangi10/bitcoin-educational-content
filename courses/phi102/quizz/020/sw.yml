question: Kulingana na maandishi, msingi mkuu wa uhuru wote wa kiuchumi ni upi?
answer: Umiliki binafsi (propriété de soi)
wrong_answers:
  - Haki za mali kuhusu ardhi na rasilimali
  - Uhuru wa biashara na kubadilishana
  - Mahitaji ya mtu binafsi na maslahi binafsi
explanation: |
  Umiliki binafsi (propriété de soi) umeelezwa waziwazi kama 'msingi wa tafakari yote juu ya uhuru wa kiuchumi' na sharti la kudhaniwa kihalali mali ya mali isiyohamishika. Bila kumtambua mtu binafsi kama mmiliki wake mwenyewe, haiwezekani kufikiria kihalali mali ya mali isiyohamishika. Ingawa haki za mali kuhusu ardhi, uhuru wa biashara, na mahitaji ya mtu binafsi yote ni dhana muhimu zinazojadiliwa katika sura hiyo, zinawasilishwa kama zinazotokana na kanuni hii ya msingi zaidi ya umiliki binafsi badala ya kuwa msingi wenyewe.
question: 根據文中所述，所有經濟自由的首要基礎是什麼？
answer: 自我擁有權 (propriété de soi)
wrong_answers:
  - 土地和資源的財產權
  - 貿易和交換自由
  - 個人需求與個人興趣
explanation: |
  自我所有權 (propriété de soi) 被明確地陳述為「經濟自由所有思考的基礎」，也是合法構想物質財產的先決條件。如果不確認個人是自己的所有者，就不可能合法地構思物質物品的財產。雖然土地財產權、貿易自由和個人需求都是本章所討論的重要概念，但這些概念都是從自我所有權這個更基本的原則所衍生出來的，而非其本身就是最主要的基礎。
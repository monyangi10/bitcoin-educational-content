question: Wat is volgens de tekst de primaire basis van alle economische vrijheid?
answer: Zelfeigenaarschap (propriété de soi)
wrong_answers:
  - Eigendomsrechten op land en hulpbronnen
  - Vrijheid van handel en uitwisseling
  - Individuele behoefte en persoonlijk belang
explanation: |
  Zelfeigenaarschap (propriété de soi) wordt expliciet genoemd als "het fundament van alle reflectie over economische vrijheid" en de voorwaarde voor het legitiem opvatten van eigendom van materiële goederen. Zonder het individu te erkennen als eigenaar van zichzelf, is het onmogelijk om op een legitieme manier eigendom van materiële goederen op te vatten. Hoewel eigendomsrechten op land, vrijheid van handel en individuele behoeften allemaal belangrijke concepten zijn die in het hoofdstuk worden besproken, worden ze gepresenteerd als voortvloeiend uit dit meer fundamentele principe van zelfeigenaarschap in plaats van zelf de primaire basis te vormen.
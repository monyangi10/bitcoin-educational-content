question: Was ist dem Text zufolge die wichtigste Grundlage aller wirtschaftlichen Freiheit?
answer: Selbsteigentum (propriété de soi)
wrong_answers:
  - Eigentumsrechte an Land und Ressourcen
  - Freiheit von Handel und Austausch
  - Individueller Bedarf und persönliches Interesse
explanation: |
  Das Selbsteigentum (propriété de soi) wird ausdrücklich als "die Grundlage aller Überlegungen zur wirtschaftlichen Freiheit" und als Voraussetzung für die legitime Vorstellung von Eigentum an materiellen Gütern bezeichnet. Ohne das Individuum als Eigentümer seiner selbst anzuerkennen, ist es unmöglich, das Eigentum an materiellen Gütern legitim zu gestalten. Zwar sind Eigentumsrechte an Grund und Boden, Handelsfreiheit und individuelle Bedürfnisse wichtige Konzepte, die in diesem Kapitel erörtert werden, doch werden sie als Ausfluss dieses grundlegenderen Prinzips des Selbsteigentums dargestellt und nicht als primäre Grundlage selbst.
question: Secondo il testo, qual è il fondamento principale di ogni libertà economica?
answer: Autoproprietà (propriété de soi)
wrong_answers:
  - Diritti di proprietà su terra e risorse
  - Libertà di commercio e di scambio
  - Esigenze individuali e interessi personali
explanation: |
  L'autoproprietà (propriété de soi) è esplicitamente dichiarata come "il fondamento di ogni riflessione sulla libertà economica" e il prerequisito per concepire legittimamente la proprietà dei beni materiali. Senza riconoscere l'individuo come proprietario di se stesso, è impossibile concepire legittimamente la proprietà dei beni materiali. Sebbene i diritti di proprietà sulla terra, la libertà di commercio e i bisogni individuali siano tutti concetti importanti discussi nel capitolo, essi sono presentati come derivanti da questo principio fondamentale di autoproprietà, piuttosto che essere essi stessi il fondamento primario.
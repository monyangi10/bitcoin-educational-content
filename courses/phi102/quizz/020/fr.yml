question: Selon le texte, quel est le fondement premier de toute liberté économique ?
answer: Propriété de soi (Self-ownership)
wrong_answers:
  - Droits de propriété sur les terres et les ressources
  - Liberté de commerce et d'échange
  - Besoin individuel et intérêt personnel
explanation: |
  La propriété de soi est explicitement présentée comme "le fondement de toute réflexion sur la liberté économique" et la condition préalable à la conception légitime de la propriété des biens matériels. Sans reconnaître l'individu comme propriétaire de lui-même, il est impossible de concevoir légitimement la propriété des biens matériels. Bien que les droits de propriété sur la terre, la liberté de commerce et les besoins individuels soient tous des concepts importants abordés dans le chapitre, ils sont présentés comme découlant de ce principe plus fondamental de la propriété de soi plutôt que d'en être le fondement premier.
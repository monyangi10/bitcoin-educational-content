question: De acordo com o texto, qual é o principal fundamento de toda a liberdade económica?
answer: Propriedade de si próprio (propriété de soi)
wrong_answers:
  - Direitos de propriedade sobre a terra e os recursos
  - Liberdade de comércio e de troca
  - Necessidade individual e interesse pessoal
explanation: |
  A propriedade de si próprio (propriété de soi) é explicitamente afirmada como "o fundamento de toda a reflexão sobre a liberdade económica" e a condição prévia para conceber legitimamente a propriedade dos bens materiais. Sem o reconhecimento do indivíduo como proprietário de si próprio, é impossível conceber legitimamente a propriedade dos bens materiais. Embora os direitos de propriedade sobre a terra, a liberdade de comércio e as necessidades individuais sejam todos conceitos importantes discutidos no capítulo, são apresentados como decorrendo deste princípio mais fundamental da auto-propriedade, em vez de serem eles próprios o fundamento principal.
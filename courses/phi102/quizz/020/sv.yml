question: Vad är enligt texten den främsta grunden för all ekonomisk frihet?
answer: Äganderätt till sig själv (propriété de soi)
wrong_answers:
  - Äganderätt till mark och resurser
  - Frihet för handel och utbyte
  - Individuella behov och personligt intresse
explanation: |
  Äganderätten till sig själv (propriété de soi) anges uttryckligen som "grunden för all reflektion över ekonomisk frihet" och förutsättningen för att på ett legitimt sätt uppfatta äganderätten till materiella varor. Utan att erkänna individen som ägare av sig själv är det omöjligt att på ett legitimt sätt tänka sig äganderätt till materiella varor. Även om äganderätt till mark, handelsfrihet och individuella behov är viktiga begrepp som diskuteras i kapitlet, framställs de som en följd av denna mer grundläggande princip om självägande snarare än att utgöra själva den primära grunden.
question: Dukurikije ico canditswe, ni igiki gishingiyeko umwidegemvyo wose wo mu vy’ubutunzi?
answer: Ukwitunga (umutungo w'umuntu)
wrong_answers:
  - Uburenganzira bw'umutungo ku butaka n'ubutunzi
  - Umwidegemvyo wo gucuruza no guhindura
  - Ivyo umuntu akeneye n'inyungu yiwe bwite
explanation: |
  Ukwitunga (propriété de soi) kuvugwa neza ko ari ‘umushinge w’ivyiyumviro vyose ku mwidegemvyo w’ubutunzi’ kandi ko ari co gikenewe kugira umuntu ashobore gufata mu buryo bubereye umutungo w’ibintu vy’umubiri. Ata kwemera umuntu nk’uwufise, ntibishoboka ko umuntu yiyumvira neza umutungo w’ibintu vy’umubiri. Naho uburenganzira bwo kuronka ubutaka, umwidegemvyo wo gucuruza, n’ivyo umuntu akeneye vyose ari ivyiyumviro bihambaye bivugwa muri iki kigabane, bishikirizwa ko biva kuri iyo ngingo ngenderwako y’ishimikiro kuruta yo kwitunga aho kuba umushinge w’intango ubwavyo.
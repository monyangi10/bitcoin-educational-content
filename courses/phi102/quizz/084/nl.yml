question: Wat maakte, volgens de verlichtingsdenkers zoals de fysiokraten, vrije handel praktisch in de 18e eeuw dat in de middeleeuwen niet mogelijk was?
answer: De opkomst van wereldwijde handel die de prijzen in evenwicht bracht en lokale monopolies verhinderde
wrong_answers:
  - De uitvinding van nieuwe landbouwtechnieken die de voedselproductie verhoogden
  - De ontwikkeling van democratische regeringen die individuele rechten beschermden
  - De opkomst van goed opgeleide bevolkingen die weloverwogen economische beslissingen kunnen nemen
explanation: |
  De fysiocraten merkten op dat de wereldwijde handel in de 18e eeuw concurrerende markten creëerde die de prijzen op natuurlijke wijze in evenwicht brachten en lokale monopolies verhinderden. In de middeleeuwen had een bakker in een kleine stad een gereserveerde markt en kon hij de consumenten domineren, waardoor vrije concurrentie onpraktisch werd. Het ontstaan van de wereldhandel veranderde deze omstandigheden en maakte commerciële vrijheid niet alleen mogelijk maar ook noodzakelijk om de beste prijzen en goederen tegen de laagste kosten te verkrijgen.
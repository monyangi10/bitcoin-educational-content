question: به گفته متفکران عصر روشنگری مانند فیزیوکرات‌ها، چه چیزی تجارت آزاد را در قرن هجدهم عملی کرد که در دوران قرون وسطی ممکن نبود؟
answer: ظهور تجارت جهانی که قیمت‌ها را متعادل کرد و از انحصارهای محلی جلوگیری کرد
wrong_answers:
  - اختراع تکنیک‌های جدید کشاورزی که تولید غذا را افزایش داد
  - توسعه دولت‌های دموکراتیک که از حقوق فردی محافظت می‌کنند
  - ظهور جمعیت‌های تحصیل‌کرده که می‌توانند تصمیمات اقتصادی آگاهانه بگیرند
explanation: |
  فیزیوکرات‌ها مشاهده کردند که تجارت جهانی در قرن هجدهم بازارهای رقابتی ایجاد کرد که به طور طبیعی قیمت‌ها را متعادل کرده و از انحصارهای محلی جلوگیری می‌کرد. در قرون وسطی، یک نانوا در یک شهر کوچک بازار محفوظی داشت و می‌توانست بر مصرف‌کنندگان تسلط یابد، که رقابت آزاد را غیرعملی می‌کرد. تولد تجارت جهانی این شرایط را تغییر داد و آزادی تجاری را نه تنها ممکن بلکه ضروری ساخت تا بهترین قیمت‌ها و کالاها با کمترین هزینه به دست آید.
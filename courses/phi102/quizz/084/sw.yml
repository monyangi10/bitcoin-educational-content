question: Kulingana na wanafikra wa Mwangaza kama vile physiocrates, ni nini kilifanya biashara huria iwe ya vitendo katika karne ya 18 ambayo haikuwezekana katika nyakati za enzi za kati?
answer: Kuibuka kwa biashara ya kimataifa ambayo iliweka bei sawa na kuzuia ukiritimba wa ndani
wrong_answers:
  - Uvumbuzi wa mbinu mpya za kilimo zilizoongeza uzalishaji wa chakula
  - Maendeleo ya serikali za kidemokrasia zilizolinda haki za mtu binafsi
  - Kuongezeka kwa idadi ya watu walioelimika ambao wanaweza kufanya maamuzi sahihi ya kiuchumi
explanation: |
  Physiocrates waligundua kwamba biashara ya kimataifa katika karne ya 18 iliunda masoko ya ushindani ambayo kwa kawaida yalikuwa na uwiano wa bei na kuzuia ukiritimba wa ndani. Katika nyakati za enzi za kati, mwokaji mikate katika mji mdogo alikuwa na soko lililotengwa na angeweza kutawala watumiaji, na kufanya ushindani huru usiwezekane. Kuzaliwa kwa biashara ya kimataifa kulibadilisha hali hizi, na kufanya uhuru wa kibiashara si tu kwamba uwezekane bali pia ni muhimu ili kufikia bei na bidhaa bora kwa gharama ya chini kabisa.
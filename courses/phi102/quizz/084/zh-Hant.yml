question: 根據physocrates等啟蒙思想家的說法，是什麼讓自由貿易在18世紀變得實用，而在中世紀時代是不可能的？
answer: 全球商業的出現平衡了價格，防止了地方壟斷
wrong_answers:
  - 新農業技術的發明增加了糧食生產
  - 保護個人權利的民主政府的發展
  - 能做出明智經濟決策的受教育人口增加
explanation: |
  生理學家觀察到，18 世紀的全球商業創造了競爭性的市場，自然平衡了價格，並防止地方壟斷。在中世紀時代，小城鎮的麵包師擁有保留市場，可以支配消費者，使得自由競爭變得不切實際。世界性貿易的誕生改變了這些情況，使得商業自由不僅成為可能，也成為以最低成本取得最佳價格和貨品的必要條件。
question: 根据启蒙思想家（如重农学派）的观点，是什么让自由贸易在 18 世纪成为现实，而在中世纪却无法实现？
answer: 全球商务的出现平衡了价格，防止了地方垄断
wrong_answers:
  - 新农业技术的发明提高了粮食产量
  - 发展保护个人权利的民主政府
  - 受过教育、能够做出明智经济决策的人口增加
explanation: |
  重农主义者注意到，18 世纪的全球商业创造了竞争性市场，自然平衡了价格，防止了地方垄断。在中世纪，一个小镇上的面包师拥有一个保留市场，可以支配消费者，因此自由竞争是不切实际的。世界贸易的诞生改变了这种情况，使商业自由不仅成为可能，而且成为以最低成本获得最佳价格和商品的必要条件。
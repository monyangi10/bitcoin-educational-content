question: Was machte den Freihandel im 18. Jahrhundert nach Ansicht von Aufklärern wie den Physiokraten praktisch, was im Mittelalter nicht möglich war?
answer: Das Entstehen eines globalen Handels, der die Preise ausgleicht und lokale Monopole verhindert
wrong_answers:
  - Die Erfindung neuer landwirtschaftlicher Techniken zur Steigerung der Nahrungsmittelproduktion
  - Die Entwicklung demokratischer Regierungen, die die Rechte des Einzelnen schützen
  - Der Aufstieg einer gebildeten Bevölkerung, die fundierte wirtschaftliche Entscheidungen treffen konnte
explanation: |
  Die Physiokraten beobachteten, dass der globale Handel im 18. Jahrhundert wettbewerbsfähige Märkte schuf, die auf natürliche Weise ein Preisgleichgewicht herstellten und lokale Monopole verhinderten. Im Mittelalter hatte ein Bäcker in einer kleinen Stadt einen reservierten Markt und konnte die Verbraucher beherrschen, so dass ein freier Wettbewerb nicht möglich war. Mit der Entstehung des Welthandels änderten sich diese Umstände, und die Freiheit des Handels wurde nicht nur möglich, sondern auch notwendig, um die besten Preise und Waren zu den niedrigsten Kosten zu erzielen.
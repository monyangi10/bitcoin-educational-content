question: Hva var det som ifølge opplysningstenkere som fysiokratene gjorde frihandel praktisk på 1700-tallet, som ikke var mulig i middelalderen?
answer: Fremveksten av global handel som balanserte prisene og forhindret lokale monopoler
wrong_answers:
  - Oppfinnelsen av nye jordbruksteknikker som økte matproduksjonen
  - Utviklingen av demokratiske styresett som beskyttet individuelle rettigheter
  - Fremveksten av velutdannede befolkninger som kunne ta informerte økonomiske beslutninger
explanation: |
  Fysiokratene observerte at den globale handelen på 1700-tallet skapte konkurransemarkeder som naturlig balanserte prisene og forhindret lokale monopoler. I middelalderen hadde en baker i en liten by et avgrenset marked og kunne dominere forbrukerne, noe som gjorde fri konkurranse upraktisk. Verdenshandelen endret disse forholdene, og gjorde kommersiell frihet ikke bare mulig, men også nødvendig for å oppnå de beste prisene og varer til lavest mulig kostnad.
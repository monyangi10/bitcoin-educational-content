question: Według oświeceniowych myślicieli, takich jak fizjokraci, co sprawiło, że wolny handel stał się praktyczny w XVIII wieku, a co nie było możliwe w średniowieczu?
answer: Pojawienie się globalnego handlu, który zrównoważył ceny i zapobiegł powstawaniu lokalnych monopoli
wrong_answers:
  - Wynalezienie nowych technik rolniczych, które zwiększyły produkcję żywności
  - Rozwój demokratycznych rządów, które chroniły prawa jednostki
  - Wzrost liczby wykształconych populacji, które mogły podejmować świadome decyzje gospodarcze
explanation: |
  Fizjokraci zauważyli, że globalny handel w XVIII wieku stworzył konkurencyjne rynki, które w naturalny sposób zrównoważyły ceny i zapobiegły lokalnym monopolom. W średniowieczu piekarz w małym mieście miał zastrzeżony rynek i mógł zdominować konsumentów, co sprawiało, że wolna konkurencja była niepraktyczna. Narodziny światowego handlu zmieniły te okoliczności, czyniąc wolność handlową nie tylko możliwą, ale i konieczną do osiągnięcia najlepszych cen i towarów po najniższych kosztach.
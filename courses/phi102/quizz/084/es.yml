question: Según los pensadores de la Ilustración, como los fisiócratas, ¿qué hizo práctico el libre comercio en el siglo XVIII que no fuera posible en la época medieval?
answer: La aparición de un comercio mundial que equilibró los precios e impidió los monopolios locales
wrong_answers:
  - La invención de nuevas técnicas agrícolas que aumentaron la producción de alimentos
  - El desarrollo de gobiernos democráticos que protegían los derechos individuales
  - Aumento de la población instruida, capaz de tomar decisiones económicas con conocimiento de causa
explanation: |
  Los fisiócratas observaron que el comercio global del siglo XVIII creaba mercados competitivos que equilibraban naturalmente los precios e impedían los monopolios locales. En la época medieval, un panadero de una pequeña ciudad tenía un mercado reservado y podía dominar a los consumidores, lo que hacía inviable la libre competencia. El nacimiento del comercio mundial cambió estas circunstancias, haciendo que la libertad comercial no sólo fuera posible sino necesaria para conseguir los mejores precios y mercancías al menor coste.
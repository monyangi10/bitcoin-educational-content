question: Menurut para pemikir Pencerahan seperti para fisiokrat, apa yang membuat perdagangan bebas menjadi praktis di abad ke-18 yang tidak mungkin dilakukan di abad pertengahan?
answer: Munculnya perdagangan global yang menyeimbangkan harga dan mencegah monopoli lokal
wrong_answers:
  - Penemuan teknik pertanian baru yang meningkatkan produksi pangan
  - Perkembangan pemerintahan demokratis yang melindungi hak-hak individu
  - Meningkatnya populasi berpendidikan yang dapat membuat keputusan ekonomi yang tepat
explanation: |
  Para ahli fisiokrasi mengamati bahwa perdagangan global pada abad ke-18 menciptakan pasar yang kompetitif yang secara alami menyeimbangkan harga dan mencegah monopoli lokal. Pada abad pertengahan, seorang pembuat roti di kota kecil memiliki pasar tersendiri dan dapat mendominasi konsumen, sehingga persaingan bebas menjadi tidak praktis. Lahirnya perdagangan dunia mengubah keadaan ini, membuat kebebasan komersial tidak hanya memungkinkan tetapi juga diperlukan untuk mencapai harga dan barang terbaik dengan biaya terendah.
question: Secondo i pensatori illuministi come i fisiocratici, che cosa rendeva pratico il libero scambio nel XVIII secolo che non era possibile nel Medioevo?
answer: L'emergere del commercio globale che ha bilanciato i prezzi e impedito i monopoli locali
wrong_answers:
  - L'invenzione di nuove tecniche agricole che hanno aumentato la produzione alimentare
  - Lo sviluppo di governi democratici che proteggono i diritti individuali
  - L'aumento di popolazioni istruite in grado di prendere decisioni economiche consapevoli
explanation: |
  I fisiocratici osservarono che il commercio globale nel XVIII secolo aveva creato mercati competitivi che bilanciavano naturalmente i prezzi e impedivano i monopoli locali. Nel Medioevo, un fornaio di una piccola città aveva un mercato riservato e poteva dominare i consumatori, rendendo impraticabile la libera concorrenza. La nascita del commercio mondiale ha cambiato queste circostanze, rendendo la libertà commerciale non solo possibile, ma necessaria per ottenere i prezzi migliori e le merci al costo più basso.
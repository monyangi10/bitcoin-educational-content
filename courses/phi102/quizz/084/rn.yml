question: Nk’uko abanyabwenge b’umuco nk’aba physiocrates babivuga, ni igiki catumye ubudandaji bw’ubuntu buba ngirakamaro mu kinjana ca 18 butashoboka mu bihe vya kera?
answer: Uguseruka kw’ubudandaji bwo kw’isi yose bwaringanije ibiciro kandi bukabuza ubudandaji bwo mu karere .
wrong_answers:
  - Guhingura ubuhinga bushasha bwo kurima bwatumye habaho ukwiyongera kw'umwimbu w'ibifungurwa .
  - Guteza imbere intwaro za demokarasi zikingira uburenganzira bw'umuntu ku giti ciwe .
  - Ukwiyongera kw'abantu bize bashobora gufata ingingo z'ubutunzi zishingiye ku makuru
explanation: |
  Abanyabwenge b’ivy’ubutunzi babonye yuko ubudandaji bwo kw’isi yose mu kinjana ca 18 bwatumye haba amasoko y’uguhiganwa, ivyo bikaba vyatuma ibiciro biguma biri ku rugero rubereye kandi bikabuza ko ubudandaji bwo mu karere bugira uburinganire. Mu bihe vya kera, umutetsi wo mu gisagara gitoyi yari afise isoko ry’ibintu vy’agaciro kandi yari gushobora kuganza abaguzi, ivyo bikaba vyatuma uguhiganwa ku buntu bidashoboka. Ivuka ry’ubudandaji kw’isi yose ryahinduye ivyo bintu, bituma umwidegemvyo wo mu bucuruzi udashoboka gusa, ahubwo ukaba ngombwa kugira ngo umuntu ashike ku bici- ro vyiza kuruta ibindi vyose be n’ibintu vyiza kuruta ibindi vyose ku giciro gitoyi kuruta ibindi vyose.
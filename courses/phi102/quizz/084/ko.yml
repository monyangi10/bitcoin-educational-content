question: 중세 시대에는 불가능했던 자유무역이 18세기에 실용화될 수 있었던 이유는 무엇이었을까요, 피히테와 같은 계몽주의 사상가들에 따르면?
answer: 가격 균형을 맞추고 지역 독점을 막는 글로벌 커머스의 등장
wrong_answers:
  - 식량 생산량을 늘린 새로운 농업 기술의 발명
  - 개인의 권리를 보호하는 민주적 정부의 발전
  - 정보에 입각한 경제적 결정을 내릴 수 있는 교육받은 인구의 증가
explanation: |
  18세기 경제학자들은 세계 상업이 경쟁 시장을 만들어 자연스럽게 가격 균형을 맞추고 지역 독점을 방지하는 것을 관찰했습니다. 중세 시대에는 작은 마을의 제빵사가 시장을 독점하고 소비자를 지배할 수 있었기 때문에 자유 경쟁이 불가능했습니다. 전 세계 무역의 탄생은 이러한 상황을 변화시켰고, 최저 비용으로 최고의 가격과 상품을 달성하기 위해 상업적 자유가 가능했을 뿐만 아니라 필수적이 되었습니다.
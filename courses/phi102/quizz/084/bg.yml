question: Според мислителите на Просвещението като физиократите какво прави свободната търговия практична през XVIII в., което не е било възможно през Средновековието?
answer: Появата на глобалната търговия, която балансира цените и предотвратява появата на местни монополи
wrong_answers:
  - Изобретяването на нови земеделски техники, които увеличават производството на храни
  - Развитието на демократични правителства, които защитават индивидуалните права
  - Нарастването на образованото население, което може да взема информирани икономически решения
explanation: |
  Физиократите забелязват, че глобалната търговия през XVIII в. създава конкурентни пазари, които естествено балансират цените и предотвратяват появата на местни монополи. През Средновековието един хлебар в малък град е имал запазен пазар и е можел да доминира над потребителите, което е правело свободната конкуренция непрактична. Възникването на световната търговия променя тези обстоятелства, като прави търговската свобода не само възможна, но и необходима за постигане на най-добрите цени и стоки на най-ниска цена.
question: Enligt upplysningstänkare som fysiokraterna, vad var det som gjorde frihandel praktiskt möjligt på 1700-talet som inte var möjligt under medeltiden?
answer: Framväxten av en global handel som balanserade priser och förhindrade lokala monopol
wrong_answers:
  - Uppfinningen av nya jordbrukstekniker som ökade livsmedelsproduktionen
  - Utvecklingen av demokratiska regeringar som skyddade individens rättigheter
  - Framväxten av utbildade befolkningar som kunde fatta välgrundade ekonomiska beslut
explanation: |
  Fysiokraterna observerade att den globala handeln på 1700-talet skapade konkurrensutsatta marknader som naturligt balanserade priserna och förhindrade lokala monopol. Under medeltiden hade en bagare i en liten stad en monopoliserad marknad och kunde dominera konsumenterna, vilket gjorde fri konkurrens opraktisk. Den globala handelns födelse förändrade dessa omständigheter och gjorde kommersiell frihet inte bara möjlig utan nödvändig för att uppnå de bästa priserna och varor till lägsta kostnad.
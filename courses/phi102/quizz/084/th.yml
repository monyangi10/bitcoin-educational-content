question: ตามความคิดของนักปรัชญายุคเรืองปัญญาเช่นกลุ่มฟีซิโอเครตส์ อะไรที่ทำให้การค้าเสรีเป็นไปได้ในศตวรรษที่ 18 ซึ่งไม่สามารถทำได้ในยุคกลาง?
answer: การเกิดขึ้นของการค้าระดับโลกที่สร้างความสมดุลของราคาและป้องกันการผูกขาดในท้องถิ่น
wrong_answers:
  - การประดิษฐ์เทคนิคการเกษตรใหม่ที่เพิ่มการผลิตอาหาร
  - การพัฒนารัฐบาลประชาธิปไตยที่คุ้มครองสิทธิส่วนบุคคล
  - การเพิ่มขึ้นของประชากรที่มีการศึกษา ซึ่งสามารถตัดสินใจทางเศรษฐกิจได้อย่างมีข้อมูล
explanation: |
  นักสรีรศาสตร์สังเกตว่าการค้าระหว่างประเทศในศตวรรษที่ 18 ได้สร้างตลาดที่มีการแข่งขันซึ่งปรับสมดุลราคาตามธรรมชาติและป้องกันการผูกขาดในท้องถิ่น ในยุคกลาง คนทำขนมปังในเมืองเล็กๆ มีตลาดที่สงวนไว้และสามารถครอบงำผู้บริโภคได้ ทำให้การแข่งขันเสรีเป็นไปไม่ได้ การเกิดขึ้นของการค้าทั่วโลกได้เปลี่ยนแปลงสถานการณ์เหล่านี้ ทำให้เสรีภาพทางการค้าไม่เพียงแต่เป็นไปได้แต่จำเป็นเพื่อให้ได้ราคาที่ดีที่สุดและสินค้าที่มีต้นทุนต่ำที่สุด
question: Prema prosvetiteljskim misliocima poput fiziokrata, slobodna trgovina je postala praktična u 18. veku zbog razvoja ekonomskih teorija koje su naglašavale važnost prirodnih zakona i tržišne ekonomije. U srednjem veku, trgovina je bila ograničena feudalnim sistemom i regulacijama koje su sputavale slobodno kretanje robe i kapitala.
answer: Pojava globalne trgovine koja je uravnotežila cene i sprečila lokalne monopole
wrong_answers:
  - Izum novih poljoprivrednih tehnika koje su povećale proizvodnju hrane
  - Razvoj demokratskih vlada koje su štitile individualna prava
  - Porast obrazovanih populacija koje mogu donositi informisane ekonomske odluke
explanation: |
  Fiziokrate su primetile da je globalna trgovina u 18. veku stvorila konkurentna tržišta koja su prirodno balansirala cene i sprečavala lokalne monopole. U srednjem veku, pekar u malom gradu imao je rezervisano tržište i mogao je da dominira potrošačima, čineći slobodnu konkurenciju nepraktičnom. Rođenje svetske trgovine promenilo je ove okolnosti, čineći komercijalnu slobodu ne samo mogućom već i neophodnom za postizanje najboljih cena i robe po najnižoj ceni.
question: Valistusajattelijoiden, kuten fysiokraattien, mukaan mikä teki vapaakaupasta 1700-luvulla käytännöllistä, mikä ei ollut mahdollista keskiajalla?
answer: Maailmanlaajuisen kaupan syntyminen, joka tasapainotti hintoja ja esti paikallisten monopolien syntymisen
wrong_answers:
  - Uusien maataloustekniikoiden keksiminen, jotka lisäsivät elintarviketuotantoa
  - Yksilön oikeuksia suojelevien demokraattisten hallitusten kehittyminen
  - Koulutetun väestön nousu, joka pystyi tekemään tietoon perustuvia taloudellisia päätöksiä
explanation: |
  Fysiokraatit havaitsivat, että maailmanlaajuinen kaupankäynti 1700-luvulla loi kilpailumarkkinat, jotka luonnollisesti tasapainottivat hintoja ja estivät paikallisten monopolien syntymisen. Keskiajalla pienen kaupungin leipurilla oli varatut markkinat ja hän saattoi hallita kuluttajia, mikä teki vapaasta kilpailusta epäkäytännöllistä. Maailmanlaajuisen kaupan synty muutti nämä olosuhteet, jolloin kaupallinen vapaus ei ollut ainoastaan mahdollista vaan myös välttämätöntä, jotta saataisiin parhaat hinnat ja tavarat mahdollisimman edullisesti.
question: Theo các nhà tư tưởng thời Khai sáng như trường phái kinh tế trọng nông, điều gì đã khiến thương mại tự do trở nên khả thi trong thế kỷ 18 mà lại không thể thực hiện được trong thời trung cổ?
answer: Sự xuất hiện của thương mại toàn cầu đã cân bằng giá cả và ngăn chặn tình trạng độc quyền địa phương.
wrong_answers:
  - Việc phát minh ra các kỹ thuật nông nghiệp mới giúp tăng sản lượng lương thực.
  - Sự phát triển của các chính phủ dân chủ bảo vệ quyền cá nhân
  - Sự gia tăng dân số có trình độ học vấn cao, có khả năng đưa ra các quyết định kinh tế sáng suốt.
explanation: |
  Các nhà kinh tế học theo trường phái trọng nông nhận thấy rằng thương mại toàn cầu trong thế kỷ 18 đã tạo ra các thị trường cạnh tranh, tự nhiên cân bằng giá cả và ngăn chặn độc quyền địa phương. Vào thời trung cổ, một người thợ làm bánh ở một thị trấn nhỏ có thị trường độc quyền và có thể chi phối người tiêu dùng, khiến cạnh tranh tự do trở nên không khả thi. Sự ra đời của thương mại toàn cầu đã thay đổi những điều kiện này, khiến tự do thương mại không chỉ khả thi mà còn cần thiết để đạt được giá cả và hàng hóa tốt nhất với chi phí thấp nhất.
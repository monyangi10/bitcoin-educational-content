question: De acordo com os pensadores do Iluminismo, como os fisiocratas, o que é que tornou o comércio livre prático no século XVIII que não era possível na época medieval?
answer: O aparecimento de um comércio global que equilibrou os preços e impediu os monopólios locais
wrong_answers:
  - A invenção de novas técnicas agrícolas que aumentaram a produção de alimentos
  - O desenvolvimento de governos democráticos que protegiam os direitos individuais
  - O surgimento de populações instruídas que podiam tomar decisões económicas informadas
explanation: |
  Os fisiocratas observaram que o comércio global no século XVIII criou mercados competitivos que equilibraram naturalmente os preços e impediram os monopólios locais. Na época medieval, um padeiro de uma pequena cidade tinha um mercado reservado e podia dominar os consumidores, o que tornava a livre concorrência impraticável. O nascimento do comércio mundial alterou estas circunstâncias, tornando a liberdade comercial não só possível como necessária para obter os melhores preços e bens ao menor custo.
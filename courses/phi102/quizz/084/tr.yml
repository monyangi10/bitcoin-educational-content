question: Fizyokratlar gibi Aydınlanma düşünürlerine göre, 18. yüzyılda serbest ticareti pratik kılan ve ortaçağda mümkün olmayan şey neydi?
answer: Fiyatları dengeleyen ve yerel tekelleri engelleyen küresel ticaretin ortaya çıkışı
wrong_answers:
  - Gıda üretimini artıran yeni tarım tekniklerinin icadı
  - Bireysel hakları koruyan demokratik hükümetlerin gelişimi
  - Bilinçli ekonomik kararlar alabilen eğitimli nüfusun yükselişi
explanation: |
  Fizyokratlar, 18. yüzyılda küresel ticaretin, fiyatları doğal olarak dengeleyen ve yerel tekelleri önleyen rekabetçi pazarlar yarattığını gözlemlemişlerdir. Ortaçağda küçük bir kasabadaki bir fırıncının ayrılmış bir pazarı vardı ve tüketicilere hükmedebiliyordu, bu da serbest rekabeti pratik olmaktan çıkarıyordu. Dünya çapında ticaretin doğuşu bu koşulları değiştirerek ticari özgürlüğü sadece mümkün değil, aynı zamanda en düşük maliyetle en iyi fiyat ve malları elde etmek için gerekli hale getirdi.
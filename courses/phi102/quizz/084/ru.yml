question: Согласно мыслителям эпохи Просвещения, таким как физиократы, что сделало свободную торговлю практичной в XVIII веке, чего не было в средневековые времена?
answer: Возникновение глобальной торговли, которая уравновесила цены и предотвратила появление местных монополий
wrong_answers:
  - Изобретение новых методов ведения сельского хозяйства, которые позволили увеличить производство продуктов питания
  - Развитие демократических правительств, защищающих права личности
  - Рост образованности населения, способного принимать взвешенные экономические решения
explanation: |
  Физиократы заметили, что глобальная торговля в XVIII веке создала конкурентные рынки, которые естественным образом сбалансировали цены и предотвратили локальные монополии. В средневековые времена пекарь в маленьком городке имел свой рынок и мог доминировать над потребителями, что делало свободную конкуренцию непрактичной. Зарождение мировой торговли изменило эти обстоятельства, сделав свободу торговли не только возможной, но и необходимой для достижения наилучших цен и товаров по наименьшей стоимости.
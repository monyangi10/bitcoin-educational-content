question: Selon les penseurs du siècle des Lumières, comme les physiocrates, qu'est-ce qui a rendu le libre-échange possible au XVIIIe siècle, alors qu'il ne l'était pas à l'époque médiévale ?
answer: L'émergence du commerce mondial a permis d'équilibrer les prix et d'éviter les monopoles locaux
wrong_answers:
  - L'invention de nouvelles techniques agricoles qui ont permis d'augmenter la production alimentaire
  - Le développement de gouvernements démocratiques protégeant les droits individuels
  - L'essor de populations éduquées capables de prendre des décisions économiques en connaissance de cause
explanation: |
  Les physiocrates ont observé que le commerce mondial au XVIIIe siècle a créé des marchés concurrentiels qui ont naturellement équilibré les prix et empêché les monopoles locaux. À l'époque médiévale, le boulanger d'une petite ville disposait d'un marché réservé et pouvait dominer les consommateurs, ce qui rendait la libre concurrence impraticable. La naissance du commerce mondial a changé la donne, rendant la liberté commerciale non seulement possible, mais nécessaire pour obtenir les meilleurs prix et les marchandises les moins chères.
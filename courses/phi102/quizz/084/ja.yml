question: フィジオクラテスのような啓蒙思想家たちによれば、中世には不可能だった自由貿易が18世紀には実用化されたのはなぜか？
answer: 価格の均衡を保ち、地域の独占を防ぐグローバルな商取引の出現。
wrong_answers:
  - 食糧生産を増加させる新しい農業技術の発明
  - 個人の権利を守る民主的政府の発展
  - 十分な情報に基づいた経済的意思決定ができるようになった教育水準の高い人々の台頭
explanation: |
  フィジオクラテスは、18世紀の世界的な商業が競争市場を生み出し、それが自然に価格の均衡を保ち、地域の独占を防いだことを観察した。中世では、小さな町のパン屋が市場を独占し、消費者を支配することができたため、自由競争は現実的ではなかった。世界貿易の誕生はこうした状況を変え、商業の自由を可能にしただけでなく、最良の価格と商品を最低のコストで実現するために必要なものにした。
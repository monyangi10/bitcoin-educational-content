question: Co podle osvícenských myslitelů, jako byli fyziokraté, umožnilo v 18. století praktikovat volný obchod, který ve středověku nebyl možný?
answer: Vznik globálního obchodu, který vyrovnává ceny a zabraňuje vzniku místních monopolů
wrong_answers:
  - Vynález nových zemědělských technik, které zvýšily produkci potravin
  - Rozvoj demokratických vlád, které chránily práva jednotlivce
  - Vzestup vzdělanosti obyvatelstva, které může činit informovaná ekonomická rozhodnutí
explanation: |
  Fyziokraté si všimli, že globální obchod v 18. století vytvořil konkurenční trhy, které přirozeně vyrovnávaly ceny a bránily vzniku místních monopolů. Ve středověku měl pekař v malém městě vyhrazený trh a mohl ovládat spotřebitele, což činilo volnou soutěž nepraktickou. Zrod celosvětového obchodu tyto okolnosti změnil a učinil obchodní svobodu nejen možnou, ale i nezbytnou k dosažení nejlepších cen a zboží za nejnižší náklady.
question: Mis tegi valgustusajastu mõtlejate, näiteks füsiokraatide arvates 18. sajandil vabakaubanduse praktiliseks, mis ei olnud võimalik keskajal?
answer: Ülemaailmse kaubanduse tekkimine, mis tasakaalustas hindu ja takistas kohalike monopolide tekkimist
wrong_answers:
  - Uute põllumajandustehnikate leiutamine, mis suurendasid toiduainete tootmist
  - Demokraatlike valitsuste areng, mis kaitsevad üksikisiku õigusi
  - Haritud elanikkonna suurenemine, kes suudab teha teadlikke majandusotsuseid
explanation: |
  Füsiokraadid täheldasid, et 18. sajandi ülemaailmne kaubandus lõi konkurentsivõimelised turud, mis loomulikult tasakaalustasid hindu ja takistasid kohalike monopolide tekkimist. Keskajal oli väikelinna pagaril reserveeritud turg ja ta võis domineerida tarbijate üle, mis muutis vaba konkurentsi ebapraktiliseks. Ülemaailmse kaubanduse sünd muutis neid asjaolusid, muutes kaubandusvabaduse mitte ainult võimalikuks, vaid ka vajalikuks, et saavutada parimad hinnad ja kaupu madalaima hinnaga.
question: According to the Enlightenment thinkers like the physiocrates, what made free trade practical in the 18th century that wasn't possible in medieval times?
answer: The emergence of global commerce that balanced prices and prevented local monopolies
wrong_answers:
  - The invention of new agricultural techniques that increased food production
  - The development of democratic governments that protected individual rights
  - The rise of educated populations that could make informed economic decisions
explanation: |
  The physiocrates observed that global commerce in the 18th century created competitive markets that naturally balanced prices and prevented local monopolies. In medieval times, a baker in a small town had a reserved market and could dominate consumers, making free competition impractical. The birth of worldwide trade changed these circumstances, making commercial freedom not only possible but necessary to achieve the best prices and goods at the lowest cost.

question: Според текста кои са двата основни принципа, които ръководят правилното изучаване и упражняване на свободата?
answer: Да не вредиш на себе си и да не вредиш на другите
wrong_answers:
  - Максимизиране на индивидуалното удоволствие и минимизиране на социалните ограничения
  - Спазване на традиционните обичаи и зачитане на установените власти
  - Стремеж към икономически просперитет и поддържане на политическа стабилност
explanation: |
  В текста изрично се посочва, че два основни принципа ръководят усвояването на правилната употреба на свободата: да не вредиш на себе си и да не вредиш на другите. Тези принципи са основни, защото когато хората злоупотребяват със свободата си, като вредят на себе си (например чрез алкохолизъм или невъздържаност), те постепенно унищожават собствената си способност за свобода. По същия начин, когато хората вредят на другите чрез заплахи или посегателства върху техните права, те обявяват война на човечеството и обществото, което неизбежно води до ограничаване на собствената им свобода чрез съдебна и полицейска намеса. Другите варианти, макар и потенциално ценни социални цели, не са посочени в текста като основополагащи принципи за научаване на правилното упражняване на свободата.
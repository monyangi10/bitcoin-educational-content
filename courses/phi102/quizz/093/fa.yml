question: بر اساس متن، دو اصل اساسی که راهنمای یادگیری و تمرین صحیح آزادی هستند چیست؟
answer: آسیب نرساندن به خود و آسیب نرساندن به دیگران
wrong_answers:
  - حداکثر کردن لذت فردی و به حداقل رساندن محدودیت‌های اجتماعی
  - پیروی از آداب و رسوم سنتی و احترام به مقامات مستقر
  - دنبال کردن رفاه اقتصادی و حفظ ثبات سیاسی
explanation: |
  متن به‌طور صریح بیان می‌کند که دو اصل اساسی راهنمای یادگیری استفاده صحیح از آزادی هستند: آسیب نرساندن به خود و آسیب نرساندن به دیگران. این اصول بنیادی هستند زیرا وقتی افراد با آسیب رساندن به خود (مانند اعتیاد به الکل یا بی‌اعتدالی) آزادی خود را سوءاستفاده می‌کنند، به تدریج ظرفیت خود برای آزادی را از بین می‌برند. به همین ترتیب، وقتی افراد با تهدید یا حمله به حقوق دیگران به آن‌ها آسیب می‌رسانند، به بشریت و جامعه اعلان جنگ می‌دهند که به‌طور اجتناب‌ناپذیری منجر به کاهش آزادی خودشان از طریق مداخله قضایی و پلیس می‌شود. گزینه‌های دیگر، اگرچه ممکن است اهداف اجتماعی ارزشمندی باشند، اما در متن به عنوان اصول بنیادی برای یادگیری استفاده صحیح از آزادی شناسایی نشده‌اند.
question: Metne göre, özgürlüğün doğru bir şekilde öğrenilmesi ve kullanılmasına rehberlik eden iki temel ilke nedir?
answer: Kendine zarar vermemek ve başkalarına zarar vermemek
wrong_answers:
  - Bireysel hazzın maksimize edilmesi ve sosyal kısıtlamaların minimize edilmesi
  - Geleneksel adetlere uymak ve yerleşik otoritelere saygı göstermek
  - Ekonomik refahın sürdürülmesi ve siyasi istikrarın korunması
explanation: |
  Metin, özgürlüğün doğru kullanımının öğrenilmesinde iki temel ilkenin yol gösterici olduğunu açıkça belirtmektedir: kendine zarar vermemek ve başkalarına zarar vermemek. Bu ilkeler temeldir çünkü bireyler kendilerine zarar vererek (alkolizm ya da ölçüsüzlük gibi) özgürlüklerini kötüye kullandıklarında, kendi özgürlük kapasitelerini giderek yok ederler. Benzer şekilde, insanlar tehditler ya da haklarına saldırılar yoluyla başkalarına zarar verdiklerinde, insanlığa ve topluma savaş açmış olurlar ki bu da kaçınılmaz olarak yargı ve polis müdahalesi yoluyla kendi özgürlüklerinin kısıtlanmasına yol açar. Diğer seçenekler, potansiyel olarak değerli sosyal hedefler olmakla birlikte, metinde özgürlüğü doğru kullanmayı öğrenmenin temel ilkeleri olarak tanımlanmamıştır.
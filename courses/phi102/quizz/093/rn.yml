question: Dukurikije ico canditswe, ni ingingo ngenderwako zibiri z’ingenzi izihe ziyobora ukwiga no gukoresha neza umwidegemvyo?
answer: Kutagirira nabi no kutagirira nabi abandi .
wrong_answers:
  - Gushiramwo umunezero w'umuntu ku giti ciwe no kugabanya ingorane zo mu kibano
  - Gukurikiza imigenzo y'akaranga no kwubahiriza ubutegetsi bwashinzwe .
  - Gukurikirana uguterimbere mu vy'ubutunzi no kubungabunga ugutekana kwa politike
explanation: |
  Ico canditswe kivuga neza yuko ingingo ngenderwako zibiri z’ingenzi ziyobora inyigisho yo gukoresha neza umwidegemvyo: kutigirira nabi no kudagirira nabi abandi. Izo ngingo ngenderwako ni ngirakamaro kubera ko iyo abantu bakoresheje nabi umwidegemvyo wabo mu kwigirira nabi (nk’ukunywa inzoga canke ukudafata ingingo), buhorobuhoro barasenya ubushobozi bwabo bwite bwo kwidegemvya. Na bo nyene, iyo abantu bagiriye nabi abandi biciye mu kubatera ubwoba canke mu kubatera uburenganzira bwabo, bamenyesha intambara ku bantu no ku kibano, ivyo bikaba bituma ata kabuza umwidegemvyo wabo bwite ugabanywa biciye mu gufasha abacamanza n’abapolisi. Ibindi bihitamwo, naho bishobora kuba ari intumbero z’agaciro mu kibano, ntivyerekanwa mu canditswe nk’ingingo ngenderwako z’ishimikiro zo kwiga gukoresha neza umwidegemvyo.
question: Welches sind dem Text zufolge die beiden wesentlichen Grundsätze, die das richtige Erlernen und Ausüben der Freiheit leiten?
answer: Sich selbst nicht schaden und anderen nicht schaden
wrong_answers:
  - Maximierung des individuellen Vergnügens und Minimierung der sozialen Zwänge
  - Befolgung traditioneller Bräuche und Achtung der bestehenden Autoritäten
  - Streben nach wirtschaftlichem Wohlstand und Wahrung der politischen Stabilität
explanation: |
  Im Text wird ausdrücklich darauf hingewiesen, dass das Erlernen des richtigen Umgangs mit der Freiheit von zwei wesentlichen Prinzipien geleitet wird: sich selbst nicht zu schaden und anderen nicht zu schaden. Diese Grundsätze sind von grundlegender Bedeutung, denn wenn Menschen ihre Freiheit missbrauchen, indem sie sich selbst Schaden zufügen (z. B. durch Alkoholismus oder Unmäßigkeit), zerstören sie nach und nach ihre eigene Fähigkeit zur Freiheit. In ähnlicher Weise erklären Menschen, die andere durch Drohungen oder Angriffe auf deren Rechte schädigen, der Menschheit und der Gesellschaft den Krieg, was unweigerlich zu einer Einschränkung ihrer eigenen Freiheit durch gerichtliche und polizeiliche Maßnahmen führt. Die anderen Optionen sind zwar potenziell wertvolle soziale Ziele, werden aber im Text nicht als die grundlegenden Prinzipien für das Erlernen der richtigen Ausübung der Freiheit genannt.
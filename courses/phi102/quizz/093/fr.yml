question: D'après le texte, quels sont les deux principes essentiels qui guident l'apprentissage et l'exercice de la liberté ?
answer: Ne pas se nuire et ne pas nuire aux autres
wrong_answers:
  - Maximiser le plaisir individuel et minimiser les contraintes sociales
  - Suivre les coutumes traditionnelles et respecter les autorités établies
  - Poursuivre la prospérité économique et maintenir la stabilité politique
explanation: |
  Le texte indique explicitement que deux principes essentiels guident l'apprentissage du bon usage de la liberté : ne pas se nuire à soi-même et ne pas nuire aux autres. Ces principes sont fondamentaux car lorsque les individus abusent de leur liberté en se faisant du mal (comme par l'alcoolisme ou l'intempérance), ils détruisent progressivement leur propre capacité de liberté. De même, lorsque des personnes nuisent à d'autres en les menaçant ou en portant atteinte à leurs droits, elles déclarent la guerre à l'humanité et à la société, ce qui conduit inévitablement à une réduction de leur propre liberté par le biais d'une intervention judiciaire et policière. Les autres options, tout en étant des objectifs sociaux potentiellement valables, ne sont pas identifiées dans le texte comme les principes fondamentaux pour apprendre à exercer correctement la liberté.
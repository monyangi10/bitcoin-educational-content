question: 본문에 따르면, 자유의 올바른 학습과 행사를 안내하는 두 가지 필수 원칙은 무엇인가요?
answer: 자신을 해치지 않고 타인에게 해를 끼치지 않기
wrong_answers:
  - 개인의 즐거움 극대화 및 사회적 제약 최소화
  - 전통 관습을 따르고 기존 권위를 존중합니다
  - 경제적 번영 추구 및 정치적 안정 유지
explanation: |
  본문에서는 올바른 자유 사용법을 배우기 위해서는 자신을 해치지 않는 것과 타인을 해치지 않는 것, 이 두 가지 원칙이 필수적이라고 명시하고 있습니다. 이러한 원칙은 개인이 알코올 중독이나 방종과 같이 자신을 해치는 방식으로 자유를 오용하면 자유를 위한 자신의 능력을 점진적으로 파괴하기 때문에 근본적인 원칙입니다. 마찬가지로, 사람들이 자신의 권리를 위협하거나 공격하여 타인에게 해를 끼치는 것은 인류와 사회에 대한 전쟁을 선포하는 것이며, 이는 필연적으로 사법 및 경찰의 개입을 통해 자신의 자유를 감소시키는 결과를 초래합니다. 다른 선택지는 잠재적으로 가치 있는 사회적 목표이기는 하지만, 자유를 올바르게 행사하는 법을 배우기 위한 기본 원칙으로 본문에 명시되어 있지 않습니다.
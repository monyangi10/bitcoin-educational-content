question: De acordo com o texto, quais são os dois princípios essenciais que orientam a correta aprendizagem e o exercício da liberdade?
answer: Não fazer mal a si próprio e não fazer mal aos outros
wrong_answers:
  - Maximizar o prazer individual e minimizar os constrangimentos sociais
  - Seguir os costumes tradicionais e respeitar as autoridades estabelecidas
  - Prosseguir a prosperidade económica e manter a estabilidade política
explanation: |
  O texto afirma explicitamente que dois princípios essenciais orientam a aprendizagem do uso correto da liberdade: não prejudicar a si próprio e não prejudicar os outros. Estes princípios são fundamentais porque quando os indivíduos fazem mau uso da sua liberdade, prejudicando-se a si próprios (como através do alcoolismo ou da intemperança), destroem progressivamente a sua própria capacidade de liberdade. Do mesmo modo, quando as pessoas prejudicam os outros através de ameaças ou ataques aos seus direitos, declaram guerra à humanidade e à sociedade, o que conduz inevitavelmente a uma redução da sua própria liberdade através da intervenção judicial e policial. As outras opções, embora sejam objectivos sociais potencialmente valiosos, não são identificadas no texto como os princípios fundamentais para aprender a exercer corretamente a liberdade.
question: ตามข้อความ หลักการสำคัญสองประการที่ชี้นำการเรียนรู้และการใช้เสรีภาพอย่างถูกต้องคืออะไร?
answer: ไม่ทำร้ายตนเองและไม่ทำร้ายผู้อื่น
wrong_answers:
  - การเพิ่มความสุขส่วนบุคคลให้สูงสุดและการลดข้อจำกัดทางสังคมให้เหลือน้อยที่สุด
  - ปฏิบัติตามประเพณีดั้งเดิมและเคารพอำนาจที่จัดตั้งขึ้น
  - การแสวงหาความเจริญรุ่งเรืองทางเศรษฐกิจและการรักษาเสถียรภาพทางการเมือง
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่ามีหลักการสำคัญสองประการที่ชี้นำการเรียนรู้การใช้เสรีภาพอย่างถูกต้อง: ไม่ทำร้ายตนเองและไม่ทำร้ายผู้อื่น หลักการเหล่านี้มีความสำคัญพื้นฐานเพราะเมื่อบุคคลใช้เสรีภาพในทางที่ผิดโดยการทำร้ายตนเอง (เช่น ผ่านการดื่มสุราหรือการไม่รู้จักพอ) พวกเขาจะทำลายความสามารถในการมีเสรีภาพของตนเองไปเรื่อย ๆ ในทำนองเดียวกัน เมื่อผู้คนทำร้ายผู้อื่นผ่านการข่มขู่หรือการโจมตีสิทธิของพวกเขา พวกเขาประกาศสงครามกับมนุษยชาติและสังคม ซึ่งจะนำไปสู่การลดเสรีภาพของตนเองผ่านการแทรกแซงของศาลและตำรวจ ตัวเลือกอื่น ๆ แม้จะเป็นเป้าหมายทางสังคมที่มีคุณค่า แต่ไม่ได้ถูกระบุในข้อความว่าเป็นหลักการพื้นฐานสำหรับการเรียนรู้การใช้เสรีภาพอย่างถูกต้อง
question: Wat zijn volgens de tekst de twee essentiële principes die het juiste leren en uitoefenen van vrijheid leiden?
answer: Jezelf geen schade berokkenen en anderen geen schade berokkenen
wrong_answers:
  - Individueel plezier maximaliseren en sociale beperkingen minimaliseren
  - Traditionele gebruiken volgen en gevestigde autoriteiten respecteren
  - Streven naar economische welvaart en behoud van politieke stabiliteit
explanation: |
  De tekst stelt expliciet dat twee essentiële principes de leidraad vormen bij het leren van het juiste gebruik van vrijheid: zichzelf niet schaden en anderen niet schaden. Deze principes zijn fundamenteel omdat wanneer individuen hun vrijheid misbruiken door zichzelf te schaden (zoals door alcoholisme of onmatigheid), ze geleidelijk hun eigen vermogen tot vrijheid vernietigen. Op dezelfde manier verklaren mensen de oorlog aan de mensheid en de samenleving wanneer ze anderen schade berokkenen door middel van bedreigingen of aanvallen op hun rechten, wat onvermijdelijk leidt tot een beperking van hun eigen vrijheid door gerechtelijk en politieoptreden. De andere opties, hoewel potentieel waardevolle sociale doelen, worden in de tekst niet geïdentificeerd als de basisprincipes om te leren vrijheid op de juiste manier uit te oefenen.
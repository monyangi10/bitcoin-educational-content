question: 根据课文，指导正确学习和行使自由的两个基本原则是什么？
answer: 不伤害自己，也不伤害他人
wrong_answers:
  - 个人快乐最大化，社会约束最小化
  - 遵循传统习俗，尊重既定权威
  - 追求经济繁荣，维护政治稳定
explanation: |
  文中明确指出，学习正确使用自由有两个基本原则：不伤害自己和不伤害他人。这些原则之所以重要，是因为当一个人滥用自由，伤害自己（比如酗酒或恣意妄为）时，他就会逐渐摧毁自己的自由能力。同样，当人们通过威胁或攻击他人的权利来伤害他人时，他们就是在向人类和社会宣战，这就不可避免地导致通过司法和警察干预来减少自身的自由。其他选择虽然可能是有价值的社会目标，但在文中并没有被确定为学习正确行使自由的基本原则。
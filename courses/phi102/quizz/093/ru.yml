question: Согласно тексту, какие два основных принципа лежат в основе правильного изучения и использования свободы?
answer: Не вредить себе и не вредить другим
wrong_answers:
  - Максимизация индивидуального удовольствия и минимизация социальных ограничений
  - Следование традиционным обычаям и уважение к установленным властям
  - Стремление к экономическому процветанию и поддержанию политической стабильности
explanation: |
  В тексте прямо говорится, что в обучении правильному использованию свободы руководствуются двумя важнейшими принципами: не причинять вреда себе и не причинять вреда другим. Эти принципы являются основополагающими, поскольку, когда люди злоупотребляют своей свободой, причиняя вред себе (например, через алкоголизм или невоздержанность), они постепенно разрушают свою собственную способность к свободе. Точно так же, когда люди причиняют вред другим, угрожая или посягая на их права, они объявляют войну человечеству и обществу, что неизбежно ведет к сокращению их собственной свободы посредством судебного и полицейского вмешательства. Другие варианты, хотя и являются потенциально ценными социальными целями, не обозначены в тексте как основополагающие принципы для обучения правильному использованию свободы.
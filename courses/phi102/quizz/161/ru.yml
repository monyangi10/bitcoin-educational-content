question: Согласно анализу демократических обществ, проведенному Токвилем, какой фундаментальный механизм не позволяет правительствам быть экономными в расходовании государственных средств?
answer: Граждане, естественно, склонны отказываться от взимания платы за услуги, пользуясь при этом благами, разрывая связь между пользованием услугами и несением расходов на них
wrong_answers:
  - Демократическим правительствам не хватает технических знаний для эффективного управления государственными ресурсами по сравнению с менеджерами частного сектора
  - Конституционные ограничения не позволяют демократическим лидерам быстро принимать решения о сокращении бюджета во время экономических кризисов
  - Избирательные циклы заставляют политиков отдавать предпочтение краткосрочной популярности перед долгосрочной финансовой ответственностью и экономическим планированием
explanation: |
  Токвиль определил, что основная проблема кроется в самой человеческой природе: люди естественным образом хотят переложить расходы на других, сохранив выгоды для себя. Это нарушает существенную связь между пользованием государственными услугами и несением расходов на них. Этот механизм позволяет расходовать средства с дефицитом и накапливать долги, поскольку нынешние граждане могут пользоваться услугами, перекладывая финансовое бремя на будущие поколения, которые не могут защищать свои интересы, поскольку еще не существуют и не имеют права голоса.
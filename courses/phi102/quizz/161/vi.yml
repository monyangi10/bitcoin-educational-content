question: Theo phân tích của Tocqueville về các xã hội dân chủ, cơ chế cơ bản nào ngăn cản chính phủ tiết kiệm chi tiêu công?
answer: Theo lẽ tự nhiên, người dân thường có xu hướng từ chối các khoản phí mà họ phải trả trong khi vẫn được hưởng các lợi ích, làm mất đi mối liên hệ giữa việc hưởng dịch vụ và việc gánh chịu chi phí.
wrong_answers:
  - So với các nhà quản lý khu vực tư nhân, các chính phủ dân chủ thiếu chuyên môn kỹ thuật để quản lý hiệu quả các nguồn lực công.
  - Những hạn chế về mặt hiến pháp ngăn cản các nhà lãnh đạo dân chủ đưa ra quyết định nhanh chóng về việc cắt giảm ngân sách trong thời kỳ khủng hoảng kinh tế.
  - Chu kỳ bầu cử buộc các chính trị gia phải ưu tiên sự nổi tiếng ngắn hạn hơn là trách nhiệm tài chính dài hạn và kế hoạch kinh tế.
explanation: |
  Tocqueville đã chỉ ra rằng vấn đề cốt lõi nằm ở bản chất con người - con người vốn dĩ muốn chuyển gánh nặng chi phí sang người khác trong khi giữ lại lợi ích cho bản thân. Điều này phá vỡ mối liên hệ thiết yếu giữa việc hưởng thụ các dịch vụ công cộng và gánh chịu chi phí của chúng. Cơ chế này cho phép chi tiêu thâm hụt và tích lũy nợ, vì công dân hiện tại có thể hưởng thụ các dịch vụ trong khi đẩy gánh nặng tài chính sang các thế hệ tương lai, những người không thể bảo vệ quyền lợi của mình vì họ chưa tồn tại hoặc không thể bỏ phiếu.
question: ตามการวิเคราะห์ของ Tocqueville เกี่ยวกับสังคมประชาธิปไตย กลไกพื้นฐานใดที่ป้องกันไม่ให้รัฐบาลประหยัดในการใช้จ่ายสาธารณะ?
answer: พลเมืองมักจะปฏิเสธการเรียกเก็บเงินจากตนเองในขณะที่เพลิดเพลินกับผลประโยชน์ ทำให้ความเชื่อมโยงระหว่างการเพลิดเพลินกับบริการและการแบกรับค่าใช้จ่ายขาดออกจากกัน
wrong_answers:
  - รัฐบาลประชาธิปไตยขาดความเชี่ยวชาญทางเทคนิคในการจัดการทรัพยากรสาธารณะอย่างมีประสิทธิภาพเมื่อเทียบกับผู้จัดการในภาคเอกชน
  - ข้อจำกัดตามรัฐธรรมนูญป้องกันไม่ให้ผู้นำประชาธิปไตยตัดสินใจอย่างรวดเร็วเกี่ยวกับการลดงบประมาณในช่วงวิกฤตเศรษฐกิจ
  - วัฏจักรการเลือกตั้งบังคับให้นักการเมืองให้ความสำคัญกับความนิยมในระยะสั้นมากกว่าความรับผิดชอบทางการเงินและการวางแผนเศรษฐกิจในระยะยาว
explanation: |
  Tocqueville ระบุว่าปัญหาหลักอยู่ที่ธรรมชาติของมนุษย์เอง - ผู้คนมีแนวโน้มที่จะต้องการผลักภาระค่าใช้จ่ายไปให้ผู้อื่นในขณะที่เก็บเกี่ยวผลประโยชน์ไว้กับตัวเอง สิ่งนี้ทำลายความเชื่อมโยงที่สำคัญระหว่างการเพลิดเพลินกับบริการสาธารณะและการรับภาระค่าใช้จ่ายของมัน กลไกนี้เปิดโอกาสให้เกิดการใช้จ่ายเกินตัวและการสะสมหนี้ เนื่องจากพลเมืองปัจจุบันสามารถเพลิดเพลินกับบริการในขณะที่ผลักภาระทางการเงินไปยังคนรุ่นอนาคตที่ไม่สามารถปกป้องผลประโยชน์ของตนได้เพราะพวกเขายังไม่มีตัวตนหรือสิทธิ์ในการลงคะแนนเสียง
question: 根据托克维尔对民主社会的分析，是什么基本机制阻碍了政府节约公共开支？
answer: 公民在享受福利的同时，自然倾向于拒绝向自己收费，打破了享受服务与承担费用之间的联系
wrong_answers:
  - 与私营部门管理者相比，民主政府缺乏有效管理公共资源的技术专长
  - 宪法限制使民主领导人无法在经济危机期间迅速做出削减预算的决定
  - 选举周期迫使政治家优先考虑短期声望，而非长期财政责任和经济规划
explanation: |
  托克维尔指出，核心问题在于人性本身--人们自然希望将成本转嫁给他人，而将利益留给自己。这就打破了享受公共服务与承担公共服务成本之间的基本联系。这种机制允许赤字支出和债务积累，因为当前的公民可以享受服务，同时将财政负担推给后代，而后代由于还不存在或没有投票权，因此无法维护自己的利益。
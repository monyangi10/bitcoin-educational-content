question: Volgens Tocqueville's analyse van democratische samenlevingen, welk fundamenteel mechanisme verhindert regeringen om zuinig te zijn met overheidsuitgaven?
answer: Burgers zijn van nature geneigd om kosten voor zichzelf af te wijzen terwijl ze wel profiteren van voordelen, waardoor de koppeling tussen genieten van diensten en het dragen van de kosten wordt verbroken
wrong_answers:
  - Democratische regeringen missen de technische expertise om publieke middelen efficiënt te beheren in vergelijking met managers in de private sector
  - Grondwettelijke beperkingen verhinderen democratische leiders om snelle beslissingen te nemen over bezuinigingen tijdens economische crises
  - Verkiezingscycli dwingen politici om prioriteit te geven aan populariteit op de korte termijn boven fiscale verantwoordelijkheid en economische planning op de lange termijn
explanation: |
  Tocqueville stelde vast dat het kernprobleem in de menselijke natuur zelf ligt - mensen willen van nature de kosten op anderen afwentelen terwijl ze de voordelen voor zichzelf houden. Dit verbreekt de essentiële link tussen het genieten van openbare diensten en het dragen van de kosten ervan. Dit mechanisme maakt het mogelijk om tekorten uit te geven en schulden op te bouwen, omdat de huidige burgers kunnen genieten van diensten terwijl ze de financiële lasten doorschuiven naar toekomstige generaties die hun belangen niet kunnen verdedigen omdat ze nog niet bestaan of stemmen.
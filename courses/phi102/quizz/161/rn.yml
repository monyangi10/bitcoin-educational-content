question: Dushingiye ku nseguro ya Tocqueville ku mibano ya demokarasi, ni uburyo bw’ishimikiro ubuhe bubuza intwaro kuba zifise ubutunzi mu gukoresha amahera ya Leta?
answer: Abanyagihugu mu bisanzwe barakunda kwanka ivyo bariko bararegwa mu gihe bariko bararonka inyungu, ivyo bikaba bituma habaho uguhuza hagati yo kwinovora ibikorwa no kwikorera ivyo bakoresha .
wrong_answers:
  - Intwaro za demokarasi zibura ubuhinga bwo gucunga neza umutungo wa Leta ugereranyije n'abarongozi b'abikorera ku giti cabo .
  - Itegeko Nshinga ribuza abarongozi ba demokarasi gufata ingingo zihuse ku bijanye no kugabanya ingengo y’imari mu gihe c’amagume y’ubutunzi .
  - Inzinguzingu z'amatora zituma abanyapolitike bashira imbere gukundwa kw'igihe gito kuruta inshingano z'igihe kirekire z'ubutunzi n'igenamigambi ry'ubutunzi .
explanation: |
  Tocqueville yerekanye ko ingorane nyamukuru iri muri kamere y’umuntu ubwayo - abantu mu kameremere bashaka guhindura ibiciro ku bandi mu gihe bagumana inyungu. Ivyo bica bica isano ry’ingenzi hagati yo kunezerererwa ibikorwa vya Leta no kwikorera ivyo bikoreshwa. Ubwo buryo buratuma habaho ugukoresha amahera ataco amaze no kwirundanira imyenda, kuko abanyagihugu bo muri iki gihe bashobora guhabwa ibikorwa mu gihe basunika umuzigo w’amahera ku bihe bizoza bidashobora kurwanira inyungu zavyo kuko bitarabaho canke gutora.
question: Според анализа на Токвил на демократичните общества, кой основен механизъм пречи на правителствата да бъдат икономични по отношение на публичните разходи?
answer: Гражданите естествено са склонни да отхвърлят начисляването на такси върху себе си, докато се възползват от ползите, като по този начин се прекъсва връзката между ползването на услугите и поемането на разходите за тях
wrong_answers:
  - Демократичните правителства не разполагат с технически опит за ефективно управление на публичните ресурси в сравнение с мениджърите от частния сектор
  - Конституционните ограничения не позволяват на демократичните лидери да вземат бързи решения за бюджетни съкращения по време на икономически кризи
  - Изборните цикли принуждават политиците да дават приоритет на краткосрочната популярност пред дългосрочната фискална отговорност и икономическото планиране
explanation: |
  Токвил установява, че основният проблем се крие в самата човешка природа - хората естествено искат да прехвърлят разходите върху другите, като запазят ползите за себе си. По този начин се прекъсва основната връзка между ползването на обществени услуги и поемането на разходите за тях. Този механизъм позволява харченето на дефицити и натрупването на дългове, тъй като настоящите граждани могат да се възползват от услугите, като същевременно прехвърлят финансовото бреме върху бъдещите поколения, които не могат да защитават интересите си, тъй като все още не съществуват и не гласуват.
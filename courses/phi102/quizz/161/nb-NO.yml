question: Hvilken grunnleggende mekanisme er det, ifølge Tocquevilles analyse av demokratiske samfunn, som hindrer myndighetene i å være sparsommelige med offentlige utgifter?
answer: Innbyggerne har en naturlig tendens til å avvise å bli belastet samtidig som de nyter godt av goder, noe som bryter koblingen mellom å nyte godt av tjenester og å bære kostnadene ved dem
wrong_answers:
  - Demokratiske regjeringer mangler teknisk kompetanse til å forvalte offentlige ressurser på en effektiv måte, sammenlignet med ledere i privat sektor
  - Konstitusjonelle begrensninger hindrer demokratiske ledere i å ta raske beslutninger om budsjettkutt under økonomiske kriser
  - Valgsykluser tvinger politikere til å prioritere kortsiktig popularitet fremfor langsiktig finanspolitisk ansvarlighet og økonomisk planlegging
explanation: |
  Tocqueville identifiserte at kjerneproblemet ligger i selve menneskenaturen - folk ønsker naturlig nok å skyve kostnadene over på andre, mens de beholder fordelene selv. Dermed brytes den essensielle koblingen mellom det å nyte godt av offentlige tjenester og det å bære kostnadene ved dem. Denne mekanismen åpner for underskudd og gjeldsakkumulering, ettersom dagens borgere kan nyte godt av tjenester mens de skyver den økonomiske byrden over på fremtidige generasjoner, som ikke kan forsvare sine interesser siden de ennå ikke eksisterer eller har stemmerett.
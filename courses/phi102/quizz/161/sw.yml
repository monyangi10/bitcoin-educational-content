question: Kulingana na uchambuzi wa Tocqueville kuhusu jamii za kidemokrasia, ni utaratibu gani wa msingi unaozuia serikali kuwa na uchumi mdogo kwa kutumia matumizi ya umma?
answer: Kwa kawaida raia huwa wanakataa malipo yao wenyewe huku wakifurahia manufaa, wakivunja uhusiano kati ya kufurahia huduma na kubeba gharama zao.
wrong_answers:
  - Serikali za kidemokrasia hazina utaalamu wa kiufundi wa kusimamia rasilimali za umma kwa ufanisi ikilinganishwa na mameneja wa sekta binafsi
  - Vikwazo vya kikatiba vinawazuia viongozi wa kidemokrasia kufanya maamuzi ya haraka kuhusu kupunguzwa kwa bajeti wakati wa misukosuko ya kiuchumi
  - Mizunguko ya uchaguzi huwalazimisha wanasiasa kuweka kipaumbele umaarufu wa muda mfupi kuliko uwajibikaji wa kifedha wa muda mrefu na mipango ya kiuchumi
explanation: |
  Tocqueville alibainisha kuwa tatizo kuu liko katika asili ya mwanadamu yenyewe - watu kwa kawaida wanataka kuhamisha gharama kwa wengine huku wakiweka manufaa kwa ajili yao wenyewe. Hii inavunja uhusiano muhimu kati ya kufurahia huduma za umma na kubeba gharama zao. Utaratibu huu unaruhusu matumizi ya nakisi na mkusanyiko wa madeni, kwani raia wa sasa wanaweza kufurahia huduma huku wakisukuma mzigo wa kifedha kwa vizazi vijavyo ambao hawawezi kutetea maslahi yao kwa sababu bado hawapo au hawapigi kura.
question: De acordo com a análise de Tocqueville das sociedades democráticas, que mecanismo fundamental impede os governos de serem económicos na despesa pública?
answer: Os cidadãos tendem naturalmente a rejeitar as taxas que lhes são imputadas enquanto usufruem dos benefícios, quebrando a ligação entre usufruir dos serviços e suportar os seus custos
wrong_answers:
  - Os governos democráticos não possuem os conhecimentos técnicos necessários para gerir eficazmente os recursos públicos, em comparação com os gestores do sector privado
  - As limitações constitucionais impedem os líderes democráticos de tomar decisões rápidas sobre cortes orçamentais durante as crises económicas
  - Os ciclos eleitorais obrigam os políticos a dar prioridade à popularidade a curto prazo em detrimento da responsabilidade fiscal e do planeamento económico a longo prazo
explanation: |
  Tocqueville identificou que o problema central reside na própria natureza humana - as pessoas querem naturalmente transferir os custos para os outros, mantendo os benefícios para si próprias. Isto quebra a ligação essencial entre usufruir dos serviços públicos e suportar os seus custos. Este mecanismo permite a despesa deficitária e a acumulação de dívida, uma vez que os cidadãos actuais podem usufruir dos serviços enquanto empurram os encargos financeiros para as gerações futuras, que não podem defender os seus interesses, uma vez que ainda não existem nem votam.
question: 민주주의 사회에 대한 토크빌의 분석에 따르면, 정부가 공공 지출을 경제적으로 집행하지 못하게 하는 근본적인 메커니즘은 무엇인가요?
answer: 시민들은 혜택을 누리면서 자연스럽게 스스로에게 부과되는 요금을 거부하는 경향이 있어 서비스 이용과 비용 부담 사이의 연결 고리가 끊어집니다
wrong_answers:
  - 민주 정부는 민간 부문 관리자에 비해 공공 자원을 효율적으로 관리할 수 있는 기술적 전문성이 부족합니다
  - 헌법적 한계로 인해 민주적 지도자들은 경제 위기 시 예산 삭감에 대한 신속한 결정을 내리지 못합니다
  - 선거 주기로 인해 정치인들은 장기적인 재정 책임과 경제 계획보다 단기적인 인기에 우선순위를 두게 됩니다
explanation: |
  토크빌은 핵심적인 문제가 인간 본성 자체에 있다고 파악했습니다. 사람들은 자연스럽게 자신은 혜택을 누리면서 다른 사람에게 비용을 전가하려는 본능을 가지고 있습니다. 이는 공공 서비스를 누리는 것과 그 비용을 부담하는 것 사이의 본질적인 연결 고리를 끊습니다. 이러한 메커니즘은 적자 지출과 부채 축적을 가능하게 하는데, 현재 시민들은 서비스를 누리면서 아직 존재하지 않거나 투표권이 없어 자신의 이익을 방어할 수 없는 미래 세대에게 재정 부담을 떠넘길 수 있기 때문입니다.
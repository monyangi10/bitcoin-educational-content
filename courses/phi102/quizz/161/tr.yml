question: Tocqueville'in demokratik toplumlar analizine göre, hükümetlerin kamu harcamalarında tutumlu olmalarını engelleyen temel mekanizma nedir?
answer: Vatandaşlar doğal olarak, hizmetlerden yararlanırken kendilerine yüklenen masrafları reddetme eğilimindedirler; bu da hizmetlerden yararlanma ile masrafları üstlenme arasındaki bağı koparır
wrong_answers:
  - Demokratik hükümetler, özel sektör yöneticilerine kıyasla kamu kaynaklarını verimli bir şekilde yönetecek teknik uzmanlıktan yoksundur
  - Anayasal sınırlamalar, demokratik liderlerin ekonomik krizler sırasında bütçe kesintileri konusunda hızlı kararlar almasını engelliyor
  - Seçim döngüleri, politikacıları uzun vadeli mali sorumluluk ve ekonomik planlama yerine kısa vadeli popülerliğe öncelik vermeye zorluyor
explanation: |
  Tocqueville, temel sorunun insan doğasının kendisinde yattığını tespit etmiştir - insanlar doğal olarak faydaları kendileri için tutarken maliyetleri başkalarına kaydırmak isterler. Bu durum, kamu hizmetlerinden yararlanma ile bunların maliyetlerini üstlenme arasındaki temel bağı koparmaktadır. Bu mekanizma, mevcut vatandaşlar hizmetlerden yararlanırken mali yükü henüz var olmadıkları ya da oy kullanmadıkları için çıkarlarını savunamayan gelecek nesillerin üzerine iterek açık harcamalara ve borç birikimine olanak tanır.
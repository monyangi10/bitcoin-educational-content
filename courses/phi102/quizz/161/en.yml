question: According to Tocqueville's analysis of democratic societies, what fundamental mechanism prevents governments from being economical with public spending?
answer: Citizens naturally tend to reject charges on themselves while enjoying benefits, breaking the link between enjoying services and bearing their costs
wrong_answers:
  - Democratic governments lack the technical expertise to efficiently manage public resources compared to private sector managers
  - Constitutional limitations prevent democratic leaders from making rapid decisions about budget cuts during economic crises
  - Electoral cycles force politicians to prioritize short-term popularity over long-term fiscal responsibility and economic planning
explanation: |
  Tocqueville identified that the core problem lies in human nature itself - people naturally want to shift costs to others while keeping benefits for themselves. This breaks the essential link between enjoying public services and bearing their costs. This mechanism allows for deficit spending and debt accumulation, as current citizens can enjoy services while pushing the financial burden onto future generations who cannot defend their interests since they don't yet exist or vote.

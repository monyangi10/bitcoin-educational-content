question: Zgodnie z analizą demokratycznych społeczeństw przeprowadzoną przez Tocqueville'a, jaki fundamentalny mechanizm uniemożliwia rządom oszczędne gospodarowanie wydatkami publicznymi?
answer: Obywatele mają naturalną tendencję do odrzucania opłat nakładanych na nich samych podczas korzystania z korzyści, zrywając związek między korzystaniem z usług a ponoszeniem ich kosztów
wrong_answers:
  - Demokratycznym rządom brakuje technicznej wiedzy specjalistycznej, aby skutecznie zarządzać zasobami publicznymi w porównaniu z menedżerami z sektora prywatnego
  - Ograniczenia konstytucyjne uniemożliwiają demokratycznym przywódcom podejmowanie szybkich decyzji o cięciach budżetowych podczas kryzysów gospodarczych
  - Cykle wyborcze zmuszają polityków do przedkładania krótkoterminowej popularności nad długoterminową odpowiedzialność fiskalną i planowanie gospodarcze
explanation: |
  Tocqueville stwierdził, że główny problem leży w samej ludzkiej naturze - ludzie naturalnie chcą przerzucać koszty na innych, zachowując korzyści dla siebie. Zrywa to zasadniczy związek między korzystaniem z usług publicznych a ponoszeniem ich kosztów. Mechanizm ten pozwala na wydatki deficytowe i akumulację długu, ponieważ obecni obywatele mogą korzystać z usług, jednocześnie spychając ciężar finansowy na przyszłe pokolenia, które nie mogą bronić swoich interesów, ponieważ jeszcze nie istnieją ani nie głosują.
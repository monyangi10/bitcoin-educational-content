question: Prema Tokvilovoj analizi demokratskih društava, koji fundamentalni mehanizam sprečava vlade da budu ekonomične sa javnom potrošnjom?
answer: Građani prirodno teže da odbace troškove na sebe dok uživaju u pogodnostima, prekidajući vezu između uživanja u uslugama i snosjenja njihovih troškova.
wrong_answers:
  - Demokratske vlade nemaju tehničku stručnost za efikasno upravljanje javnim resursima u poređenju sa menadžerima iz privatnog sektora
  - Ustavna ograničenja sprečavaju demokratske lidere da donose brze odluke o smanjenju budžeta tokom ekonomskih kriza.
  - Izborni ciklusi prisiljavaju političare da daju prednost kratkoročnoj popularnosti nad dugoročnom fiskalnom odgovornošću i ekonomskim planiranjem.
explanation: |
  Tocqueville je identifikovao da osnovni problem leži u samoj ljudskoj prirodi - ljudi prirodno žele da prebace troškove na druge dok zadržavaju beneficije za sebe. Ovo prekida suštinsku vezu između uživanja u javnim uslugama i snošenja njihovih troškova. Ovaj mehanizam omogućava deficitarnu potrošnju i akumulaciju duga, jer trenutni građani mogu uživati u uslugama dok finansijski teret prebacuju na buduće generacije koje ne mogu braniti svoje interese jer još ne postoje ili ne glasaju.
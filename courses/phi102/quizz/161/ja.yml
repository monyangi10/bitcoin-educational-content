question: トクヴィルの民主主義社会の分析によれば、政府が公共支出を節約することを妨げる基本的なメカニズムは何か？
answer: サービスを享受することと、そのコストを負担することの間のつながりを断ち切る。
wrong_answers:
  - 民主党政権は、民間企業の経営者に比べて、公的資源を効率的に管理する技術的専門知識が不足している。
  - 憲法の制限により、民主的指導者は経済危機の際に予算削減について迅速な決定を下すことができない。
  - 選挙サイクルによって、政治家は長期的な財政責任や経済計画よりも短期的な人気を優先せざるを得ない。
explanation: |
  トクヴィルは、核心的な問題は人間の本性そのものにあると指摘した。人々は当然、自分には利益を残す一方で、他人にはコストを転嫁したがる。これでは、公共サービスを享受することと、そのコストを負担することの間の本質的なつながりが壊れてしまう。現在の市民はサービスを享受できる一方で、財政負担を将来の世代に押し付けることになり、将来の世代はまだ存在しておらず、投票権もないため、自分たちの利益を守ることができない。
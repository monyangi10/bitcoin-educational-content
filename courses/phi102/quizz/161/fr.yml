question: Selon l'analyse de Tocqueville sur les sociétés démocratiques, quel est le mécanisme fondamental qui empêche les gouvernements d'être économes en matière de dépenses publiques ?
answer: Les citoyens ont naturellement tendance à rejeter les charges qui pèsent sur eux tout en bénéficiant des avantages, ce qui rompt le lien entre la jouissance des services et la prise en charge de leurs coûts
wrong_answers:
  - Les gouvernements démocratiques ne disposent pas de l'expertise technique nécessaire pour gérer efficacement les ressources publiques, contrairement aux gestionnaires du secteur privé
  - Les limites constitutionnelles empêchent les dirigeants démocratiques de prendre des décisions rapides sur les coupes budgétaires pendant les crises économiques
  - Les cycles électoraux obligent les politiciens à privilégier la popularité à court terme au détriment de la responsabilité fiscale et de la planification économique à long terme
explanation: |
  Tocqueville a identifié que le problème central réside dans la nature humaine elle-même — les gens veulent naturellement transférer les coûts aux autres tout en conservant les bénéfices pour eux-mêmes. Cela rompt le lien essentiel entre la jouissance des services publics et la prise en charge de leurs coûts. Ce mécanisme permet les dépenses déficitaires et l'accumulation de la dette, car les citoyens actuels peuvent profiter des services tout en reportant la charge financière sur les générations futures, qui ne peuvent pas défendre leurs intérêts puisqu'elles n'existent pas encore et ne votent pas.

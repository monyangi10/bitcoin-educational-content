question: Según el análisis de Tocqueville sobre las sociedades democráticas, ¿qué mecanismo fundamental impide a los gobiernos ser ahorrativos con el gasto público?
answer: Los ciudadanos tienden naturalmente a rechazar las cargas sobre sí mismos mientras disfrutan de los beneficios, rompiendo el vínculo entre disfrutar de los servicios y asumir sus costes
wrong_answers:
  - Los gobiernos democráticos carecen de los conocimientos técnicos necesarios para gestionar eficazmente los recursos públicos en comparación con los gestores del sector privado
  - Las limitaciones constitucionales impiden a los líderes democráticos tomar decisiones rápidas sobre recortes presupuestarios durante las crisis económicas
  - Los ciclos electorales obligan a los políticos a dar prioridad a la popularidad a corto plazo frente a la responsabilidad fiscal y la planificación económica a largo plazo
explanation: |
  Tocqueville identificó que el problema central reside en la propia naturaleza humana: las personas desean de forma natural trasladar los costes a los demás mientras conservan los beneficios para sí mismas. Se rompe así el vínculo esencial entre el disfrute de los servicios públicos y la asunción de sus costes. Este mecanismo permite el gasto deficitario y la acumulación de deuda, ya que los ciudadanos actuales pueden disfrutar de los servicios mientras trasladan la carga financiera a las generaciones futuras, que no pueden defender sus intereses porque aún no existen ni votan.
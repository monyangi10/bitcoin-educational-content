question: 根據托克維爾對民主社會的分析，是什麼基本機制讓政府無法節省公共支出？
answer: 公民在享受福利的同時，自然傾向於拒絕對自己收費，打破了享受服務與承擔成本之間的聯繫。
wrong_answers:
  - 與私營部門管理者相比，民主政府缺乏有效管理公共資源的技術專業知識
  - 憲法限制妨礙民主領袖在經濟危機期間迅速做出削減預算的決策
  - 選舉週期迫使政治人物將短期民望放在優先地位，而非長期的財政責任與經濟規劃
explanation: |
  托克维尔（Tocqueville）指出，核心问题在于人性本身--人们自然希望将成本转嫁给他人，而将利益留给自己。這打破了享受公共服務與承擔成本之間的基本關聯。這種機制允許赤字支出和債務累積，因為當前的公民可以在享受服務的同時，將財政負擔推給後代，而後代因為尚未存在或尚未投票，所以無法捍衛自己的利益。
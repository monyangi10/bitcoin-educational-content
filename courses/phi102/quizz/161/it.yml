question: Secondo l'analisi di Tocqueville sulle società democratiche, quale meccanismo fondamentale impedisce ai governi di essere parsimoniosi nella spesa pubblica?
answer: I cittadini tendono naturalmente a rifiutare gli oneri che gravano su di loro pur godendo dei benefici, spezzando il legame tra il godimento dei servizi e l'assunzione dei relativi costi
wrong_answers:
  - I governi democratici non hanno le competenze tecniche per gestire in modo efficiente le risorse pubbliche rispetto ai manager del settore privato
  - I limiti costituzionali impediscono ai leader democratici di prendere decisioni rapide sui tagli di bilancio durante le crisi economiche
  - I cicli elettorali costringono i politici a dare priorità alla popolarità a breve termine rispetto alla responsabilità fiscale e alla pianificazione economica a lungo termine
explanation: |
  Tocqueville ha individuato che il problema centrale risiede nella natura umana stessa: le persone vogliono naturalmente trasferire i costi su altri e mantenere i benefici per sé. In questo modo si spezza il legame essenziale tra il godimento dei servizi pubblici e l'assunzione dei loro costi. Questo meccanismo consente la spesa in deficit e l'accumulo di debito, in quanto i cittadini attuali possono godere dei servizi, mentre spingono l'onere finanziario sulle generazioni future, che non possono difendere i loro interessi in quanto non esistono ancora e non votano.
question: Menurut analisis Tocqueville tentang masyarakat demokratis, mekanisme fundamental apa yang mencegah pemerintah untuk bersikap hemat dalam pengeluaran publik?
answer: Warga negara secara alami cenderung menolak pungutan atas diri mereka sendiri saat menikmati manfaat, memutus hubungan antara menikmati layanan dan menanggung biayanya
wrong_answers:
  - Pemerintah demokratis tidak memiliki keahlian teknis untuk mengelola sumber daya publik secara efisien dibandingkan dengan manajer sektor swasta
  - Keterbatasan konstitusional menghalangi para pemimpin demokratis untuk mengambil keputusan cepat mengenai pemotongan anggaran selama krisis ekonomi
  - Siklus pemilihan umum memaksa para politisi untuk memprioritaskan popularitas jangka pendek di atas tanggung jawab fiskal jangka panjang dan perencanaan ekonomi
explanation: |
  Tocqueville mengidentifikasi bahwa inti masalahnya terletak pada sifat dasar manusia itu sendiri - manusia secara alami ingin mengalihkan biaya kepada orang lain sambil tetap mendapatkan manfaat untuk dirinya sendiri. Hal ini memutus hubungan penting antara menikmati layanan publik dan menanggung biayanya. Mekanisme ini memungkinkan terjadinya pengeluaran defisit dan akumulasi utang, karena warga negara saat ini dapat menikmati layanan sambil mendorong beban keuangan ke generasi mendatang yang tidak dapat mempertahankan kepentingan mereka karena mereka belum ada atau tidak memiliki hak suara.
question: بر اساس تحلیل توکویل از جوامع دموکراتیک، چه مکانیزم اساسی مانع از صرفه‌جویی دولت‌ها در هزینه‌های عمومی می‌شود؟
answer: شهروندان به طور طبیعی تمایل دارند که هزینه‌ها را بر خود رد کنند در حالی که از مزایا لذت می‌برند، و این پیوند بین لذت بردن از خدمات و تحمل هزینه‌های آن‌ها را می‌شکنند.
wrong_answers:
  - دولت‌های دموکراتیک در مقایسه با مدیران بخش خصوصی فاقد تخصص فنی لازم برای مدیریت کارآمد منابع عمومی هستند.
  - محدودیت‌های قانون اساسی مانع از آن می‌شود که رهبران دموکراتیک در زمان بحران‌های اقتصادی تصمیمات سریعی درباره کاهش بودجه بگیرند.
  - چرخه‌های انتخاباتی سیاستمداران را مجبور می‌کنند تا محبوبیت کوتاه‌مدت را بر مسئولیت‌پذیری مالی و برنامه‌ریزی اقتصادی بلندمدت ترجیح دهند.
explanation: |
  توکویل تشخیص داد که مشکل اصلی در خود طبیعت انسان نهفته است - مردم به طور طبیعی می‌خواهند هزینه‌ها را به دیگران منتقل کنند در حالی که منافع را برای خود نگه می‌دارند. این امر پیوند اساسی بین بهره‌مندی از خدمات عمومی و تحمل هزینه‌های آن‌ها را می‌شکند. این مکانیزم امکان خرج کردن با کسری بودجه و انباشت بدهی را فراهم می‌کند، زیرا شهروندان کنونی می‌توانند از خدمات بهره‌مند شوند در حالی که بار مالی را به نسل‌های آینده منتقل می‌کنند که نمی‌توانند از منافع خود دفاع کنند زیرا هنوز وجود ندارند یا رأی نمی‌دهند.
question: Welcher grundlegende Mechanismus verhindert nach Tocquevilles Analyse demokratischer Gesellschaften, dass Regierungen mit öffentlichen Ausgaben sparsam umgehen?
answer: Die Bürger neigen naturgemäß dazu, Belastungen abzulehnen, obwohl sie in den Genuss von Vorteilen kommen, wodurch die Verbindung zwischen der Inanspruchnahme von Dienstleistungen und der Übernahme ihrer Kosten aufgehoben wird
wrong_answers:
  - Demokratischen Regierungen fehlt es im Vergleich zu Managern des privaten Sektors an technischem Fachwissen, um öffentliche Ressourcen effizient zu verwalten
  - Verfassungsrechtliche Beschränkungen hindern die demokratische Führung daran, in Wirtschaftskrisen schnelle Entscheidungen über Haushaltskürzungen zu treffen
  - Die Wahlzyklen zwingen die Politiker dazu, kurzfristige Popularität über langfristige finanzpolitische Verantwortung und Wirtschaftsplanung zu stellen
explanation: |
  Tocqueville erkannte, dass das Kernproblem in der menschlichen Natur selbst liegt - die Menschen wollen naturgemäß die Kosten auf andere abwälzen, während sie die Vorteile für sich selbst behalten. Dadurch wird die wesentliche Verbindung zwischen der Inanspruchnahme öffentlicher Dienstleistungen und der Übernahme ihrer Kosten unterbrochen. Dieser Mechanismus ermöglicht Defizitausgaben und die Anhäufung von Schulden, da die jetzigen Bürger in den Genuss von Dienstleistungen kommen, während die finanzielle Belastung auf künftige Generationen abgewälzt wird, die ihre Interessen nicht verteidigen können, da sie noch nicht existieren oder wählen können.
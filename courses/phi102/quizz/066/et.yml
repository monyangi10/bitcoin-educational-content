question: Mis oli peatüki kohaselt põllumajanduse ületootmise peamine tagajärg?
answer: See võimaldas rahastada kollektiivseid kaitsefunktsioone ja sotsiaalseid institutsioone
wrong_answers:
  - See tõi kaasa kohese võrdsuse kõigi ühiskonnaliikmete vahel
  - See põhjustas inimrühmade vaheliste konfliktide täieliku kaotamise
  - Selle tulemusel loobuti igasugusest omandiõigusest
explanation: |
  Peatüki kohaselt oli põllumajanduslik ülejääk otsustava tähtsusega, sest see tekitas rohkem ressursse, kui tarbiti, mis võimaldas ühiskonnal rahastada kollektiivseid kaitsefunktsioone ja institutsioonid, mis tagasid sotsiaalse korra. See ülejääk lõi positiivse tsükli, kus turvalisus võimaldas edasist arengut. Valed vastused on valed, sest: ülejääk ei loonud vahetut võrdsust (sotsiaalsed hierarhiad eksisteerisid endiselt), rühmadevahelised konfliktid jäid püsima ja omandiõigus muutus tegelikult tähtsamaks, mitte ei loobutud sellest.
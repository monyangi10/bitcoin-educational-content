question: What was the main consequence of agricultural surplus production according to the chapter?
answer: It enabled the financing of collective protection functions and social institutions
wrong_answers:
  - It led to immediate equality between all members of society
  - It caused the complete elimination of conflicts between human groups
  - It resulted in the abandonment of all forms of property ownership
explanation: |
  According to the chapter, agricultural surplus was crucial because it generated more resources than were consumed, which allowed societies to finance collective protection functions and institutions that guaranteed social order. This surplus created a virtuous cycle where security enabled further development. The wrong answers are incorrect because: surplus didn't create immediate equality (social hierarchies still existed), conflicts between groups continued to exist, and property ownership actually became more important rather than being abandoned.

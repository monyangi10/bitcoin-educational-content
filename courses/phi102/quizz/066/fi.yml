question: Mikä oli luvun mukaan maatalouden ylituotannon tärkein seuraus?
answer: Se mahdollisti kollektiivisten suojelutoimintojen ja sosiaalisten laitosten rahoituksen
wrong_answers:
  - Se johti välittömään tasa-arvoon kaikkien yhteiskunnan jäsenten välillä
  - Se aiheutti ihmisryhmien välisten konfliktien täydellisen poistumisen
  - Se johti kaikenlaisesta omistusoikeudesta luopumiseen
explanation: |
  Luvun mukaan maatalouden ylijäämä oli ratkaisevan tärkeää, koska se tuotti enemmän resursseja kuin kulutettiin, minkä ansiosta yhteiskunnat pystyivät rahoittamaan kollektiivisia suojelutoimintoja ja instituutioita, jotka takasivat sosiaalisen järjestyksen. Tämä ylijäämä loi suotuisan kierteen, jossa turvallisuus mahdollisti lisäkehityksen. Väärät vastaukset ovat virheellisiä, koska: ylijäämä ei luonut välitöntä tasa-arvoa (sosiaalisia hierarkioita oli edelleen olemassa), ryhmien väliset konfliktit jatkuivat, ja omistusoikeudesta tuli itse asiassa tärkeämpää sen sijaan, että siitä olisi luovuttu.
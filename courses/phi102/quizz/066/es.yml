question: ¿Cuál fue la principal consecuencia del excedente de producción agrícola según el capítulo?
answer: Permitió financiar funciones de protección colectiva e instituciones sociales
wrong_answers:
  - Condujo a la igualdad inmediata entre todos los miembros de la sociedad
  - Provocó la eliminación completa de los conflictos entre grupos humanos
  - El resultado fue el abandono de todas las formas de propiedad
explanation: |
  Según el capítulo, el excedente agrícola era crucial porque generaba más recursos de los que se consumían, lo que permitía a las sociedades financiar las funciones de protección colectiva y las instituciones que garantizaban el orden social. Este excedente creaba un círculo virtuoso en el que la seguridad permitía un mayor desarrollo. Las respuestas erróneas son incorrectas porque: el excedente no creó una igualdad inmediata (las jerarquías sociales seguían existiendo), los conflictos entre grupos siguieron existiendo y la propiedad adquirió más importancia en lugar de abandonarse.
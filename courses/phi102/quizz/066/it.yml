question: Qual è stata la principale conseguenza della sovrapproduzione agricola secondo il capitolo?
answer: Ha permesso di finanziare le funzioni di protezione collettiva e le istituzioni sociali
wrong_answers:
  - Ha portato a un'immediata uguaglianza tra tutti i membri della società
  - Ha causato la completa eliminazione dei conflitti tra gruppi umani
  - Il risultato è stato l'abbandono di ogni forma di proprietà
explanation: |
  Secondo il capitolo, l'eccedenza agricola era fondamentale perché generava più risorse di quelle consumate, consentendo alle società di finanziare le funzioni di protezione collettiva e le istituzioni che garantivano l'ordine sociale. Questo surplus creava un circolo virtuoso in cui la sicurezza permetteva un ulteriore sviluppo. Le risposte sbagliate sono errate perché: l'eccedenza non ha creato un'uguaglianza immediata (le gerarchie sociali esistevano ancora), i conflitti tra i gruppi hanno continuato a esistere e la proprietà è diventata più importante invece di essere abbandonata.
question: ผลลัพธ์หลักของการผลิตเกินในภาคเกษตรกรรมตามบทนี้คืออะไร?
answer: มันเปิดโอกาสให้มีการจัดหาเงินทุนสำหรับฟังก์ชันการป้องกันร่วมและสถาบันทางสังคม
wrong_answers:
  - มันนำไปสู่ความเท่าเทียมกันในทันทีระหว่างสมาชิกทุกคนในสังคม
  - มันทำให้เกิดการขจัดความขัดแย้งระหว่างกลุ่มมนุษย์อย่างสิ้นเชิง
  - มันส่งผลให้มีการละทิ้งรูปแบบการเป็นเจ้าของทรัพย์สินทั้งหมด
explanation: |
  ตามบทนี้, ส่วนเกินทางการเกษตรมีความสำคัญเพราะมันสร้างทรัพยากรมากกว่าที่ถูกบริโภค ซึ่งทำให้สังคมสามารถสนับสนุนฟังก์ชันการป้องกันร่วมกันและสถาบันที่รับประกันความเป็นระเบียบของสังคม ส่วนเกินนี้สร้างวงจรที่ดีที่ความปลอดภัยช่วยให้เกิดการพัฒนาต่อไป คำตอบที่ผิดไม่ถูกต้องเพราะ: ส่วนเกินไม่ได้สร้างความเท่าเทียมกันในทันที (ลำดับชั้นทางสังคมยังคงมีอยู่), ความขัดแย้งระหว่างกลุ่มยังคงมีอยู่, และการเป็นเจ้าของทรัพย์สินกลับกลายเป็นสิ่งที่สำคัญมากขึ้นแทนที่จะถูกละทิ้ง
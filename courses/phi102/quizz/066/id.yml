question: Apa konsekuensi utama dari surplus produksi pertanian menurut bab ini?
answer: Hal ini memungkinkan pembiayaan fungsi perlindungan kolektif dan lembaga-lembaga sosial
wrong_answers:
  - Hal ini mengarah pada kesetaraan langsung antara semua anggota masyarakat
  - Hal ini menyebabkan hilangnya konflik antar kelompok manusia
  - Hal ini mengakibatkan ditinggalkannya semua bentuk kepemilikan properti
explanation: |
  Menurut bab ini, surplus pertanian sangat penting karena menghasilkan lebih banyak sumber daya daripada yang dikonsumsi, yang memungkinkan masyarakat untuk membiayai fungsi perlindungan kolektif dan lembaga-lembaga yang menjamin tatanan sosial. Surplus ini menciptakan siklus yang baik di mana keamanan memungkinkan pembangunan lebih lanjut. Jawaban yang salah adalah salah karena: surplus tidak menciptakan kesetaraan secara langsung (hirarki sosial masih ada), konflik antar kelompok masih ada, dan kepemilikan properti sebenarnya menjadi lebih penting daripada ditinggalkan.
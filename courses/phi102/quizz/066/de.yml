question: Was war die wichtigste Folge der landwirtschaftlichen Überschussproduktion, die in diesem Kapitel beschrieben wird?
answer: Sie ermöglichte die Finanzierung von kollektiven Schutzfunktionen und sozialen Einrichtungen
wrong_answers:
  - Sie führte zu einer unmittelbaren Gleichstellung aller Mitglieder der Gesellschaft
  - Sie bewirkte die vollständige Beseitigung von Konflikten zwischen menschlichen Gruppen
  - Sie führte zur Abschaffung aller Formen des Eigentums
explanation: |
  Dem Kapitel zufolge war der landwirtschaftliche Überschuss von entscheidender Bedeutung, da er mehr Ressourcen erzeugte als verbraucht wurden, was es der Gesellschaft ermöglichte, kollektive Schutzfunktionen und Institutionen zu finanzieren, die die soziale Ordnung garantierten. Dieser Überschuss schuf einen positiven Kreislauf, in dem Sicherheit weitere Entwicklung ermöglichte. Die falschen Antworten sind falsch, denn: Der Überschuss führte nicht zu unmittelbarer Gleichheit (soziale Hierarchien bestanden weiterhin), Konflikte zwischen Gruppen blieben bestehen, und der Besitz von Eigentum wurde nicht abgeschafft, sondern gewann an Bedeutung.
question: Jaka była główna konsekwencja nadwyżki produkcji rolnej według rozdziału?
answer: Umożliwiło to finansowanie funkcji ochrony zbiorowej i instytucji społecznych
wrong_answers:
  - Doprowadziło to do natychmiastowej równości między wszystkimi członkami społeczeństwa
  - Spowodowało to całkowite wyeliminowanie konfliktów między grupami ludzkimi
  - Doprowadziło to do porzucenia wszelkich form własności
explanation: |
  Zgodnie z tym rozdziałem, nadwyżka rolna była kluczowa, ponieważ generowała więcej zasobów niż była konsumowana, co pozwalało społeczeństwom finansować funkcje ochrony zbiorowej i instytucje, które gwarantowały porządek społeczny. Nadwyżka ta tworzyła pozytywny cykl, w którym bezpieczeństwo umożliwiało dalszy rozwój. Błędne odpowiedzi są nieprawidłowe, ponieważ: nadwyżka nie stworzyła natychmiastowej równości (hierarchie społeczne nadal istniały), konflikty między grupami nadal istniały, a własność stała się ważniejsza, a nie została porzucona.
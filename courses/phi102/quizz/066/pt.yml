question: Segundo o capítulo, qual foi a principal consequência da produção de excedentes agrícolas?
answer: Permitiu o financiamento de funções de proteção colectiva e de instituições sociais
wrong_answers:
  - Conduziu a uma igualdade imediata entre todos os membros da sociedade
  - Provocou a eliminação total dos conflitos entre grupos humanos
  - O resultado foi o abandono de todas as formas de propriedade
explanation: |
  Segundo o capítulo, o excedente agrícola era crucial porque gerava mais recursos do que os consumidos, o que permitia às sociedades financiar funções de proteção colectiva e instituições que garantiam a ordem social. Este excedente criou um ciclo virtuoso em que a segurança permitiu um maior desenvolvimento. As respostas erradas são incorrectas porque: o excedente não criou uma igualdade imediata (as hierarquias sociais continuaram a existir), os conflitos entre grupos continuaram a existir e a propriedade tornou-se mais importante em vez de ser abandonada.
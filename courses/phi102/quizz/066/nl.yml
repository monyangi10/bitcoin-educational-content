question: Wat was volgens het hoofdstuk het belangrijkste gevolg van overproductie in de landbouw?
answer: Het maakte de financiering van collectieve beschermingsfuncties en sociale instellingen mogelijk
wrong_answers:
  - Het leidde tot onmiddellijke gelijkheid tussen alle leden van de samenleving
  - Het veroorzaakte de volledige eliminatie van conflicten tussen menselijke groepen
  - Het resulteerde in de afschaffing van alle vormen van eigendom
explanation: |
  Volgens het hoofdstuk was het landbouwoverschot cruciaal omdat het meer middelen genereerde dan er werden verbruikt, waardoor samenlevingen collectieve beschermingsfuncties en instellingen konden financieren die de sociale orde garandeerden. Dit overschot creëerde een opwaartse spiraal waarin veiligheid verdere ontwikkeling mogelijk maakte. De foute antwoorden zijn onjuist omdat: het overschot geen onmiddellijke gelijkheid creëerde (sociale hiërarchieën bleven bestaan), conflicten tussen groepen bleven bestaan en eigendom juist belangrijker werd in plaats van te worden afgeschaft.
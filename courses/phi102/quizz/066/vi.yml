question: Theo chương này, hậu quả chính của việc sản xuất nông nghiệp dư thừa là gì?
answer: Điều này cho phép tài trợ cho các chức năng bảo vệ tập thể và các thể chế xã hội.
wrong_answers:
  - Điều đó dẫn đến sự bình đẳng ngay lập tức giữa tất cả các thành viên trong xã hội.
  - Nó đã dẫn đến việc loại bỏ hoàn toàn các xung đột giữa các nhóm người.
  - Điều này dẫn đến việc từ bỏ mọi hình thức sở hữu tài sản.
explanation: |
  Theo chương này, thặng dư nông nghiệp rất quan trọng vì nó tạo ra nhiều tài nguyên hơn mức tiêu thụ, cho phép xã hội tài trợ cho các chức năng bảo vệ tập thể và các thể chế đảm bảo trật tự xã hội. Thặng dư này tạo ra một vòng tuần hoàn tích cực, trong đó an ninh tạo điều kiện cho sự phát triển hơn nữa. Các câu trả lời sai là không chính xác vì: thặng dư không tạo ra sự bình đẳng ngay lập tức (các hệ thống phân cấp xã hội vẫn tồn tại), xung đột giữa các nhóm vẫn tiếp diễn, và quyền sở hữu tài sản thực sự trở nên quan trọng hơn chứ không bị bỏ rơi.
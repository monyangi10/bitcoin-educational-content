question: Каква е основната последица от свръхпроизводството в селското стопанство според тази глава?
answer: Тя позволи финансирането на функциите за колективна защита и социалните институции
wrong_answers:
  - Тя доведе до незабавно равенство между всички членове на обществото
  - Тя е довела до пълното премахване на конфликтите между човешките групи
  - Тя доведе до изоставяне на всички форми на собственост
explanation: |
  Според тази глава селскостопанският излишък е от решаващо значение, тъй като генерира повече ресурси, отколкото се потребяват, което позволява на обществата да финансират функциите за колективна защита и институциите, които гарантират социалния ред. Този излишък е създал благоприятен цикъл, в който сигурността е позволила по-нататъшно развитие. Грешните отговори са неверни, защото: излишъкът не е създал незабавно равенство (социалните йерархии все още са съществували), конфликтите между групите са продължили да съществуват, а собствеността всъщност е станала по-важна, вместо да бъде изоставена.
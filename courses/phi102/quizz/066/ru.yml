question: Каковы были основные последствия избыточного сельскохозяйственного производства, согласно главе?
answer: Это позволило финансировать функции коллективной защиты и социальные учреждения
wrong_answers:
  - Она привела к немедленному равенству между всеми членами общества
  - Она привела к полному исчезновению конфликтов между человеческими группами
  - Она привела к отказу от всех форм собственности на имущество
explanation: |
  Согласно этой главе, излишки сельскохозяйственного производства имели решающее значение, поскольку они давали больше ресурсов, чем потреблялось, что позволяло обществу финансировать функции коллективной защиты и институты, гарантирующие социальный порядок. Этот избыток создавал добродетельный цикл, в котором безопасность обеспечивала дальнейшее развитие. Неправильные ответы неверны, потому что: излишки не привели к немедленному равенству (социальные иерархии все еще существовали), конфликты между группами продолжали существовать, а собственность на самом деле стала более важной, а не была отменена.
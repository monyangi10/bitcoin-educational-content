question: پیامد اصلی تولید مازاد کشاورزی طبق این فصل چه بود؟
answer: این امر تأمین مالی عملکردهای حفاظت جمعی و نهادهای اجتماعی را ممکن ساخت.
wrong_answers:
  - این به برابری فوری بین همه اعضای جامعه منجر شد.
  - این باعث حذف کامل درگیری‌ها بین گروه‌های انسانی شد
  - این منجر به رها کردن تمامی اشکال مالکیت اموال شد
explanation: |
  بر اساس فصل، مازاد کشاورزی حیاتی بود زیرا منابع بیشتری نسبت به مصرف تولید می‌کرد که به جوامع اجازه می‌داد تا عملکردهای حفاظتی جمعی و نهادهایی که نظم اجتماعی را تضمین می‌کردند، تأمین مالی کنند. این مازاد چرخه‌ای فضیلت‌آمیز ایجاد کرد که امنیت را قادر به توسعه بیشتر می‌کرد. پاسخ‌های نادرست اشتباه هستند زیرا: مازاد بلافاصله برابری ایجاد نکرد (سلسله مراتب اجتماعی همچنان وجود داشت)، درگیری بین گروه‌ها ادامه یافت، و مالکیت اموال در واقع مهم‌تر شد و نه اینکه رها شود.
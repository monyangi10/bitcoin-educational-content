question: 该章指出，农业生产过剩的主要后果是什么？
answer: 它为集体保护职能和社会机构提供了资金支持
wrong_answers:
  - 它使所有社会成员立即实现平等
  - 它彻底消除了人类群体之间的冲突
  - 它导致了一切形式的财产所有权的放弃
explanation: |
  该章指出，农业盈余至关重要，因为它产生的资源多于消耗的资源，使社会能够为集体保护职能和保障社会秩序的机构提供资金。这种剩余创造了一种良性循环，在这种循环中，安全得以进一步发展。错误答案的原因是：剩余并没有立即创造平等（社会等级制度依然存在），群体之间的冲突依然存在，财产所有权实际上变得更加重要，而不是被抛弃。
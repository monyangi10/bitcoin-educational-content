question: Según el texto, ¿cuáles son las dos formas que puede adoptar la competencia en los sistemas económicos?
answer: Competencia violenta y competencia pacífica mediante el intercambio
wrong_answers:
  - Competencia privada y competencia pública a través de la regulación
  - Competencia individual y competencia colectiva a través de la cooperación
  - Competencia de mercado y competencia estatal a través de la planificación
explanation: |
  El texto explica que la competencia es una realidad fundamental, necesaria por la escasez de recursos, y no puede eliminarse, sólo transformarse. Existe en dos formas: la competencia violenta (en la que los recursos se adquieren mediante la fuerza o la coacción legal, como en la competencia política) y la competencia pacífica mediante el intercambio voluntario. Los sistemas de no-libertad intentan erróneamente suprimir la competencia por completo, pero acaban sustituyendo la competencia pacífica del mercado por la competencia política violenta, creando relaciones injustas. Las otras opciones sugieren incorrectamente que la competencia puede clasificarse según la estructura de propiedad, los niveles de cooperación o los métodos de planificación económica, lo que pasa por alto la distinción clave entre medios voluntarios y coercitivos de adquirir recursos.
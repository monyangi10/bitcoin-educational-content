question: Millised on teksti kohaselt kaks vormi, mida konkurents võib majandussüsteemides võtta?
answer: Vägivaldne konkurents ja rahumeelne konkurents vahetuse kaudu
wrong_answers:
  - Erakonkurents ja avalik konkurents reguleerimise kaudu
  - Individuaalne konkurents ja kollektiivne konkurents läbi koostöö
  - Turukonkurents ja riiklik konkurents planeerimise kaudu
explanation: |
  Tekstis selgitatakse, et konkurents on põhiline reaalsus, mille ressursside nappus on teinud vajalikuks, ja seda ei saa kõrvaldada, vaid ainult muuta. Konkurentsil on kaks vormi: vägivaldne konkurents (kus ressursse omandatakse jõu või seadusliku sunni abil, nagu poliitilises konkurentsis) ja rahumeelne konkurents vabatahtliku vahetuse kaudu. Vabadusevastased süsteemid püüavad ekslikult konkurentsi täielikult maha suruda, kuid asendavad lõpuks rahumeelse turukonkurentsi vägivaldse poliitilise konkurentsiga, luues ebaõiglased suhted. Teised valikud viitavad ekslikult sellele, et konkurentsi saab liigitada omandistruktuuri, koostöö taseme või majandusliku planeerimise meetodite järgi, mis jätab tähelepanuta põhilise erinevuse vabatahtlike ja sunniviisiliste ressursside omandamise vahendite vahel.
question: Jakie dwie formy może przyjąć konkurencja w systemach gospodarczych?
answer: Brutalna konkurencja i pokojowa konkurencja poprzez wymianę
wrong_answers:
  - Konkurencja prywatna i konkurencja publiczna poprzez regulacje
  - Konkurencja indywidualna i konkurencja zbiorowa poprzez współpracę
  - Konkurencja rynkowa i państwowa poprzez planowanie
explanation: |
  Tekst wyjaśnia, że konkurencja jest podstawową rzeczywistością, która jest konieczna ze względu na niedobór zasobów i nie można jej wyeliminować, a jedynie przekształcić. Występuje w dwóch formach: brutalnej konkurencji (gdzie zasoby są zdobywane siłą lub przymusem prawnym, jak w przypadku konkurencji politycznej) i pokojowej konkurencji poprzez dobrowolną wymianę. Systemy braku wolności błędnie próbują całkowicie stłumić konkurencję, ale ostatecznie zastępują pokojową konkurencję rynkową brutalną konkurencją polityczną, tworząc niesprawiedliwe relacje. Inne opcje błędnie sugerują, że konkurencję można podzielić na kategorie według struktury własności, poziomów współpracy lub metod planowania gospodarczego, co pomija kluczowe rozróżnienie między dobrowolnymi i przymusowymi środkami pozyskiwania zasobów.
question: Welche zwei Formen kann der Wettbewerb in Wirtschaftssystemen annehmen?
answer: Gewalttätiger Wettbewerb und friedlicher Wettbewerb durch Austausch
wrong_answers:
  - Privater Wettbewerb und öffentlicher Wettbewerb durch Regulierung
  - Individueller Wettbewerb und kollektiver Wettbewerb durch Kooperation
  - Marktwettbewerb und staatlicher Wettbewerb durch Planung
explanation: |
  Der Text erklärt, dass der Wettbewerb eine grundlegende Realität ist, die durch die Knappheit der Ressourcen bedingt ist, und dass er nicht beseitigt, sondern nur umgestaltet werden kann. Es gibt zwei Formen des Wettbewerbs: den gewaltsamen Wettbewerb (bei dem die Ressourcen durch Gewalt oder gesetzlichen Zwang erworben werden, wie beim politischen Wettbewerb) und den friedlichen Wettbewerb durch freiwilligen Austausch. Systeme der Unfreiheit versuchen fälschlicherweise, den Wettbewerb gänzlich zu unterdrücken, ersetzen aber letztlich den friedlichen Marktwettbewerb durch gewaltsamen politischen Wettbewerb und schaffen ungerechte Verhältnisse. Die anderen Optionen suggerieren fälschlicherweise, dass der Wettbewerb nach Eigentumsverhältnissen, Kooperationsniveaus oder wirtschaftlichen Planungsmethoden kategorisiert werden kann, was den entscheidenden Unterschied zwischen freiwilligen und erzwungenen Mitteln zum Erwerb von Ressourcen nicht berücksichtigt.
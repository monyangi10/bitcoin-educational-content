question: 根據文中所述，經濟體系中的競爭有哪兩種形式？
answer: 暴力競爭與透過交換的和平競爭
wrong_answers:
  - 透過法規進行私人競爭和公共競爭
  - 個人競爭與透過合作的集體競爭
  - 透過規劃進行市場競爭和國家競爭
explanation: |
  文中解釋競爭是由於資源稀少而必須存在的基本現實，它無法被消除，只能被改變。它以兩種形式存在：暴力競爭（透過武力或法律強制取得資源，如政治競爭）與透過自願交換的和平競爭。非自由的體系錯誤地試圖完全壓制競爭，結果卻以暴力的政治競爭取代和平的市場競爭，造成不公平的關係。其他選項錯誤地認為競爭可以依所有權結構、合作程度或經濟規劃方法來分類，這就忽略了自願與強制手段取得資源的關鍵差異。
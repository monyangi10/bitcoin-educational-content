question: De acordo com o texto, quais são as duas formas que a concorrência pode assumir nos sistemas económicos?
answer: Concorrência violenta e concorrência pacífica através do intercâmbio
wrong_answers:
  - Concorrência privada e concorrência pública através da regulamentação
  - Concorrência individual e concorrência colectiva através da cooperação
  - Concorrência de mercado e concorrência estatal através do planeamento
explanation: |
  O texto explica que a concorrência é uma realidade fundamental, necessária devido à escassez de recursos, e que não pode ser eliminada, apenas transformada. Existe sob duas formas: a concorrência violenta (em que os recursos são adquiridos através da força ou da coerção legal, como na concorrência política) e a concorrência pacífica através da troca voluntária. Os sistemas de não-liberdade tentam, erradamente, suprimir totalmente a concorrência, mas acabam por substituir a concorrência pacífica do mercado por uma concorrência política violenta, criando relações injustas. As outras opções sugerem incorretamente que a concorrência pode ser classificada em função da estrutura de propriedade, dos níveis de cooperação ou dos métodos de planeamento económico, o que não tem em conta a distinção fundamental entre meios voluntários e coercivos de aquisição de recursos.
question: Theo văn bản, cạnh tranh có thể diễn ra dưới hai hình thức nào trong hệ thống kinh tế?
answer: Cạnh tranh bạo lực và cạnh tranh hòa bình thông qua trao đổi
wrong_answers:
  - Cạnh tranh tư nhân và cạnh tranh công thông qua quy định
  - Cạnh tranh cá nhân và cạnh tranh tập thể thông qua hợp tác
  - Cạnh tranh thị trường và cạnh tranh nhà nước thông qua quy hoạch
explanation: |
  Văn bản giải thích rằng cạnh tranh là một thực tế cơ bản, tất yếu do sự khan hiếm nguồn lực gây ra, và không thể bị loại bỏ mà chỉ có thể được chuyển hóa. Nó tồn tại dưới hai hình thức: cạnh tranh bạo lực (trong đó nguồn lực được giành lấy thông qua vũ lực hoặc cưỡng chế pháp lý, như trong cạnh tranh chính trị) và cạnh tranh hòa bình thông qua trao đổi tự nguyện. Các hệ thống phi tự do đã sai lầm khi cố gắng triệt tiêu hoàn toàn cạnh tranh, nhưng cuối cùng lại thay thế cạnh tranh thị trường hòa bình bằng cạnh tranh chính trị bạo lực, tạo ra các mối quan hệ bất công. Các lựa chọn khác lại cho rằng cạnh tranh có thể được phân loại theo cấu trúc sở hữu, mức độ hợp tác hoặc phương pháp lập kế hoạch kinh tế, điều này bỏ qua sự khác biệt quan trọng giữa các phương tiện tự nguyện và cưỡng chế để giành lấy nguồn lực.
question: Согласно тексту, какие две формы может принимать конкуренция в экономических системах?
answer: Жестокая конкуренция и мирная конкуренция через обмен
wrong_answers:
  - Частная конкуренция и государственная конкуренция через регулирование
  - Индивидуальная конкуренция и коллективная конкуренция через сотрудничество
  - Рыночная конкуренция и государственная конкуренция через планирование
explanation: |
  В тексте объясняется, что конкуренция - это фундаментальная реальность, обусловленная нехваткой ресурсов, и ее нельзя устранить, можно только трансформировать. Она существует в двух формах: насильственная конкуренция (когда ресурсы приобретаются с помощью силы или правового принуждения, как в политической конкуренции) и мирная конкуренция посредством добровольного обмена. Системы несвободы ошибочно пытаются полностью подавить конкуренцию, но в итоге заменяют мирную рыночную конкуренцию жестокой политической конкуренцией, создавая несправедливые отношения. Другие варианты неверно предполагают, что конкуренцию можно классифицировать по структуре собственности, уровням сотрудничества или методам экономического планирования, что упускает ключевое различие между добровольными и принудительными способами приобретения ресурсов.
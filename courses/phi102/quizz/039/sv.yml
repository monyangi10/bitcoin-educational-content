question: Vilka är de två former som konkurrens kan ta sig i ekonomiska system, enligt texten?
answer: Våldsam konkurrens och fredlig konkurrens genom utbyte
wrong_answers:
  - Privat konkurrens och offentlig konkurrens genom reglering
  - Individuell konkurrens och kollektiv konkurrens genom samarbete
  - Marknadskonkurrens och statskonkurrens genom planering
explanation: |
  I texten förklaras att konkurrens är en grundläggande realitet som är nödvändig på grund av resursbrist och att den inte kan elimineras, utan endast omvandlas. Den finns i två former: våldsam konkurrens (där resurser förvärvas med våld eller juridiskt tvång, som i politisk konkurrens) och fredlig konkurrens genom frivilligt utbyte. Icke-frihetliga system försöker felaktigt att helt undertrycka konkurrens, men slutar med att fredlig marknadskonkurrens ersätts med våldsam politisk konkurrens, vilket skapar orättvisa relationer. De andra alternativen antyder felaktigt att konkurrens kan kategoriseras efter ägarstruktur, samarbetsnivåer eller ekonomiska planeringsmetoder, vilket missar den viktiga distinktionen mellan frivilliga och tvingande medel för att förvärva resurser.
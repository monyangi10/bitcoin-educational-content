question: Wat zijn volgens de tekst de twee vormen die concurrentie kan aannemen in economische systemen?
answer: Gewelddadige concurrentie en vreedzame concurrentie door uitwisseling
wrong_answers:
  - Private concurrentie en publieke concurrentie door regulering
  - Individuele concurrentie en collectieve concurrentie door samenwerking
  - Marktconcurrentie en staatsconcurrentie door planning
explanation: |
  De tekst legt uit dat concurrentie een fundamentele realiteit is die noodzakelijk is door de schaarste van middelen. Concurrentie bestaat in twee vormen: gewelddadige concurrentie (waarbij middelen worden verkregen door middel van geweld of wettelijke dwang, zoals in politieke concurrentie) en vreedzame concurrentie door middel van vrijwillige uitwisseling. Systemen van onvrijheid proberen ten onrechte concurrentie volledig te onderdrukken, maar vervangen uiteindelijk vreedzame marktconcurrentie door gewelddadige politieke concurrentie, waardoor onrechtvaardige verhoudingen ontstaan. De andere opties suggereren ten onrechte dat concurrentie kan worden gecategoriseerd op basis van eigendomsstructuur, samenwerkingsniveaus of economische planningsmethoden, wat voorbij gaat aan het belangrijke onderscheid tussen vrijwillige en dwingende middelen om middelen te verwerven.
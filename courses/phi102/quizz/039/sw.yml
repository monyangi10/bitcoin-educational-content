question: Kulingana na maandishi, ni aina gani mbili ambazo ushindani unaweza kuchukua katika mifumo ya kiuchumi?
answer: Ushindani wa vurugu na ushindani wa amani kupitia kubadilishana
wrong_answers:
  - Ushindani wa kibinafsi na ushindani wa umma kupitia kanuni
  - Ushindani wa mtu binafsi na ushindani wa pamoja kupitia ushirikiano
  - Ushindani wa soko na ushindani wa serikali kupitia mipango
explanation: |
  Maandishi yanaelezea kwamba ushindani ni ukweli wa msingi unaohitajika kutokana na uhaba wa rasilimali, na hauwezi kuondolewa, bali kubadilishwa tu. Upo katika aina mbili: ushindani wa vurugu (ambapo rasilimali hupatikana kwa nguvu au kulazimishwa kisheria, kama ilivyo katika ushindani wa kisiasa) na ushindani wa amani kupitia ubadilishanaji wa hiari. Mifumo isiyo ya uhuru hujaribu kimakosa kukandamiza ushindani kabisa, lakini huishia kuchukua nafasi ya ushindani wa soko wa amani na ushindani wa kisiasa wa vurugu, na kuunda mahusiano yasiyo ya haki. Chaguzi zingine zinaonyesha kimakosa kwamba ushindani unaweza kugawanywa kwa muundo wa umiliki, viwango vya ushirikiano, au mbinu za upangaji wa kiuchumi, ambazo zinakosa tofauti kuu kati ya njia za hiari na za kulazimisha za kupata rasilimali.
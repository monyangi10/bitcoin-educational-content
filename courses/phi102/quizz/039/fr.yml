question: D'après le texte, quelles sont les deux formes que peut prendre la concurrence dans les systèmes économiques ?
answer: Concurrence violente et concurrence pacifique par l'échange
wrong_answers:
  - Concurrence privée et concurrence publique par le biais de la réglementation
  - Compétition individuelle et compétition collective par la coopération
  - Concurrence du marché et concurrence entre les États par le biais de la planification
explanation: |
  Le texte explique que la concurrence est une réalité fondamentale rendue nécessaire par la rareté des ressources et qu'elle ne peut être éliminée, mais seulement transformée. Elle existe sous deux formes : la concurrence violente (où les ressources sont acquises par la force ou la coercition légale, comme dans la concurrence politique) et la concurrence pacifique par l'échange volontaire. Les systèmes de non-liberté tentent à tort de supprimer totalement la concurrence, mais finissent par remplacer la concurrence pacifique du marché par une concurrence politique violente, créant ainsi des relations injustes. Les autres options suggèrent à tort que la concurrence peut être catégorisée en fonction de la structure de la propriété, des niveaux de coopération ou des méthodes de planification économique, ce qui ne tient pas compte de la distinction essentielle entre les moyens volontaires et coercitifs d'acquisition des ressources.
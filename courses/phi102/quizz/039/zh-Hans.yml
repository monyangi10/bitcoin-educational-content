question: 根据课文内容，经济体系中的竞争有哪两种形式？
answer: 暴力竞争与通过交换进行的和平竞争
wrong_answers:
  - 通过监管实现私人竞争和公共竞争
  - 通过合作实现个人竞争和集体竞争
  - 通过规划促进市场竞争和国家竞争
explanation: |
  文中解释说，竞争是资源稀缺所必需的基本现实，它无法消除，只能改变。竞争有两种形式：暴力竞争（通过武力或法律胁迫获取资源，如政治竞争）和自愿交换的和平竞争。非自由的制度错误地试图完全压制竞争，但最终却以暴力的政治竞争取代了和平的市场竞争，造成了不公正的关系。其他选项错误地认为，竞争可以按照所有权结构、合作程度或经济计划方法来分类，这就忽略了获取资源的自愿手段与强制手段之间的关键区别。
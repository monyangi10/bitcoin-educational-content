question: What fundamental characteristic must distinguish true contractual freedom in political organization from mere participation in existing social contracts?
answer: The freedom to choose whether to enter or exit political associations voluntarily, including the right to secede
wrong_answers:
  - The ability to vote on laws and policies within the existing framework of national governance
  - The capacity to negotiate terms and conditions of citizenship while remaining within established borders
  - The right to form political parties and influence decision-making processes through democratic participation
explanation: |
  True contractual freedom requires not just participation in existing arrangements, but the fundamental liberty to choose whether to be part of those arrangements at all. The text emphasizes that genuine contractual freedom means having the option to sign or not sign, to enter or exit political associations. This includes collective secession as the logical extension of individual autonomy. The wrong answers describe forms of participation within existing systems but don't address the core issue of voluntary association versus compulsory membership in political entities.

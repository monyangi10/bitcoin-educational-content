question: 정치 조직에서 진정한 계약상의 자유가 기존의 사회 계약에 단순히 참여하는 것과 구별되는 근본적인 특성은 무엇일까요?
answer: 탈퇴권을 포함하여 정치 단체에 자발적으로 가입하거나 탈퇴할 수 있는 선택의 자유
wrong_answers:
  - 기존 국가 거버넌스의 틀 내에서 법률 및 정책에 투표할 수 있는 능력
  - 기존 국경 내에서 시민권 조건을 협상할 수 있는 역량
  - 민주적 참여를 통해 정당을 결성하고 의사 결정 과정에 영향을 미칠 권리
explanation: |
  진정한 계약상의 자유는 기존 계약에 참여하는 것뿐만 아니라 그러한 계약에 참여할지 여부를 선택할 수 있는 근본적인 자유를 필요로 합니다. 이 글은 진정한 계약상의 자유란 서명하거나 서명하지 않을 수 있고, 정치적 단체에 가입하거나 탈퇴할 수 있는 선택권을 갖는다는 것을 강조합니다. 여기에는 개인 자율성의 논리적 확장으로서 집단적 탈퇴가 포함됩니다. 오답은 기존 시스템 내 참여 형태를 설명하지만 자발적 결사와 정치 단체의 강제적 가입이라는 핵심 문제를 다루지 않습니다.
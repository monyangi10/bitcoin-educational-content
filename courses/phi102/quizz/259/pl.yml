question: Jaka fundamentalna cecha musi odróżniać prawdziwą wolność kontraktową w organizacji politycznej od zwykłego uczestnictwa w istniejących umowach społecznych?
answer: Wolność dobrowolnego przystępowania do stowarzyszeń politycznych lub występowania z nich, w tym prawo do secesji
wrong_answers:
  - Zdolność do głosowania nad ustawami i politykami w istniejących ramach rządów krajowych
  - Zdolność do negocjowania warunków obywatelstwa przy jednoczesnym pozostaniu w ustalonych granicach
  - Prawo do tworzenia partii politycznych i wpływania na procesy decyzyjne poprzez demokratyczne uczestnictwo
explanation: |
  Prawdziwa wolność kontraktowa wymaga nie tylko uczestnictwa w istniejących układach, ale fundamentalnej wolności wyboru, czy w ogóle być częścią tych układów. Tekst podkreśla, że prawdziwa wolność kontraktowa oznacza możliwość podpisania lub niepodpisania umowy, wejścia lub wyjścia ze stowarzyszeń politycznych. Obejmuje to zbiorową secesję jako logiczne rozszerzenie indywidualnej autonomii. Błędne odpowiedzi opisują formy uczestnictwa w istniejących systemach, ale nie odnoszą się do podstawowej kwestii dobrowolnego zrzeszania się w porównaniu z obowiązkowym członkostwem w podmiotach politycznych.
question: Milline põhiline tunnus peab eristama tõelist lepingulist vabadust poliitilises korralduses pelgalt osalemisest olemasolevates ühiskondlikes lepingutes?
answer: Vabadus valida, kas astuda vabatahtlikult poliitilistesse ühendustesse või neist lahkuda, sealhulgas õigus lahkuda
wrong_answers:
  - Võimalus hääletada seaduste ja poliitika üle olemasolevas riiklikus juhtimisraamistikus
  - Võime pidada läbirääkimisi kodakondsuse tingimuste üle, jäädes samal ajal kehtestatud piiridesse
  - Õigus moodustada poliitilisi parteisid ja mõjutada otsustusprotsesse demokraatliku osalemise kaudu
explanation: |
  Tõeline lepinguvabadus ei nõua mitte ainult osalemist olemasolevates kokkulepetes, vaid põhilist vabadust valida, kas üldse osaleda nendes kokkulepetes. Tekstis rõhutatakse, et tõeline lepinguvabadus tähendab võimalust allkirjastada või mitte allkirjastada, astuda poliitilistesse ühendustesse või neist välja astuda. See hõlmab kollektiivset lahkumist kui individuaalse autonoomia loogilist pikendust. Väärad vastused kirjeldavad osalemise vorme olemasolevates süsteemides, kuid ei puuduta põhiküsimust vabatahtlikust liitumisest versus kohustuslikust liikmelisusest poliitilistes üksustes.
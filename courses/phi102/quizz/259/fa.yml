question: چه ویژگی بنیادی باید آزادی واقعی قراردادی در سازمان سیاسی را از مشارکت صرف در قراردادهای اجتماعی موجود متمایز کند؟
answer: آزادی انتخاب برای ورود یا خروج داوطلبانه از انجمن‌های سیاسی، از جمله حق جدایی
wrong_answers:
  - توانایی رأی دادن به قوانین و سیاست‌ها در چارچوب موجود حاکمیت ملی
  - ظرفیت مذاکره در مورد شرایط و ضوابط شهروندی در حالی که در مرزهای تعیین‌شده باقی می‌ماند
  - حق تشکیل احزاب سیاسی و تأثیرگذاری بر فرآیندهای تصمیم‌گیری از طریق مشارکت دموکراتیک
explanation: |
  آزادی واقعی قراردادی نه تنها به معنای مشارکت در ترتیبات موجود است، بلکه به معنای آزادی اساسی برای انتخاب این است که آیا اصلاً بخشی از آن ترتیبات باشید یا خیر. متن تأکید می‌کند که آزادی واقعی قراردادی به معنای داشتن گزینه‌ای برای امضا یا عدم امضا، ورود یا خروج از انجمن‌های سیاسی است. این شامل جدایی جمعی به عنوان گسترش منطقی خودمختاری فردی است. پاسخ‌های نادرست اشکال مشارکت در سیستم‌های موجود را توصیف می‌کنند اما به مسئله اصلی انجمن داوطلبانه در مقابل عضویت اجباری در نهادهای سیاسی نمی‌پردازند.
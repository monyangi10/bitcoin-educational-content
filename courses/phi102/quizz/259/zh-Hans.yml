question: 政治组织中真正的契约自由必须区别于仅仅参与现有社会契约的基本特征是什么？
answer: 选择自愿加入或退出政治团体的自由，包括脱离政治团体的权利
wrong_answers:
  - 在现有国家治理框架内就法律和政策进行投票的能力
  - 在既定边界内就公民身份的条款和条件进行谈判的能力
  - 组建政党和通过民主参与影响决策进程的权利
explanation: |
  真正的契约自由不仅要求参与现有的安排，还要求有选择是否参与这些安排的基本自由。文本强调，真正的契约自由意味着可以选择签署或不签署、加入或退出政治社团。这包括作为个人自治逻辑延伸的集体脱离。错误答案描述了现有制度中的参与形式，但没有涉及自愿结社与强制加入政治实体的核心问题。
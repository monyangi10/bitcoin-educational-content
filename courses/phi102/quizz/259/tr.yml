question: Siyasi örgütlenmede gerçek sözleşme özgürlüğünü mevcut toplumsal sözleşmelere salt katılımdan ayıran temel özellik ne olmalıdır?
answer: Ayrılma hakkı da dahil olmak üzere, siyasi birliklere gönüllü olarak girmeyi veya çıkmayı seçme özgürlüğü
wrong_answers:
  - Ulusal yönetişimin mevcut çerçevesi içinde yasalar ve politikalar üzerinde oy kullanabilme
  - Yerleşik sınırlar içinde kalarak vatandaşlık hüküm ve koşullarını müzakere etme kapasitesi
  - Siyasi parti kurma ve demokratik katılım yoluyla karar alma süreçlerini etkileme hakkı
explanation: |
  Gerçek sözleşme özgürlüğü sadece mevcut düzenlemelere katılımı değil, aynı zamanda bu düzenlemelerin bir parçası olup olmamayı seçme özgürlüğünü de gerektirir. Metin, gerçek sözleşme özgürlüğünün, imzalama ya da imzalamama, siyasi birliklere girme ya da çıkma seçeneğine sahip olmak anlamına geldiğini vurgulamaktadır. Bu, bireysel özerkliğin mantıksal uzantısı olarak kolektif ayrılmayı da içerir. Yanlış cevaplar, mevcut sistemler içerisindeki katılım biçimlerini tanımlamakta, ancak siyasi oluşumlara zorunlu üyeliğe karşı gönüllü birliktelik temel meselesini ele almamaktadır.
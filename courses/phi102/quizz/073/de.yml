question: Welche wichtige Entwicklung ermöglichte die Anhäufung von Überschüssen und das Entstehen von Handelsbeziehungen in menschlichen Gesellschaften?
answer: Die Entstehung der Landwirtschaft
wrong_answers:
  - Die Erfindung der Dampfmaschine
  - Die Entwicklung der Jagdtechniken
  - Die Entdeckung neuer Kontinente
explanation: |
  Die Entstehung der Landwirtschaft stellt einen entscheidenden Wendepunkt in der Geschichte der Menschheit dar, da sie friedliche Produktionsmethoden einführte und es den Gesellschaften erstmals ermöglichte, überschüssige Güter anzuhäufen. Diese landwirtschaftliche Revolution schuf die materiellen Voraussetzungen für den Handel und vertragliche Beziehungen, die auf gegenseitigem Einverständnis und nicht auf Gewalt beruhten. Während die Jagd riesige Territorien erforderte, die mit Privateigentum unvereinbar waren, ermöglichte die Landwirtschaft eine stabilere und produktivere Landnutzung und legte damit den Grundstein für die Entwicklung individueller Freiheit und Eigentumsrechte.
question: Ni iterambere irihe rikomeye ryatumye habaho ukwirundanira kw’amasaranganya be n’uguseruka kw’uguhanahana ubudandaji mu mibano y’abantu?
answer: Ivuka ry'uburimyi .
wrong_answers:
  - Uguhingura moteri y'umwotsi
  - Guteza imbere ubuhinga bwo guhigira
  - Kuvumbura imigabane mishasha
explanation: |
  Ivuka ry’uburimyi rigereranya ihinduka rikomeye cane muri kahise k’abantu kuko ryashizeho uburyo bwo guhingura ibintu mu mahoro, rikatuma imiryango ishobora kwirundanira ibintu vy’amasaranganya ku ncuro ya mbere. Iryo hinduka ry’uburimyi ryatumye habaho ibintu vy’umubiri bikenewe kugira ngo habeho uguhanahana ubudandaji n’imigenderanire y’amasezerano ishingiye ku masezerano y’abantu bose aho gushingira ku nguvu. Naho uguhiga vyasaba uturere twinshi tudahuye n’itunga ry’abantu, uburimyi bwatuma habaho ugukoresha ubutaka mu buryo buhamye kandi bufise akamaro, bikaba vyashizeho umushinge w’umwidegemvyo w’umuntu ku giti ciwe n’uburenganzira bwo kugira itunga kugira ngo umuntu atere imbere.
question: Vilken viktig utveckling möjliggjorde ackumuleringen av överskott och uppkomsten av kommersiella utbyten i mänskliga samhällen?
answer: Jordbrukets uppkomst
wrong_answers:
  - Uppfinningen av ångmaskinen
  - Utvecklingen av jakttekniker
  - Upptäckten av nya kontinenter
explanation: |
  Jordbrukets födelse utgör en avgörande vändpunkt i mänsklighetens historia eftersom det introducerade fredliga produktionsmetoder och gjorde det möjligt för samhällen att för första gången ackumulera överskottsvaror. Denna jordbruksrevolution skapade de materiella förutsättningar som krävdes för kommersiella utbyten och avtalsförhållanden baserade på ömsesidig överenskommelse snarare än våld. Medan jakten krävde vidsträckta territorier som var oförenliga med privat ägande, möjliggjorde jordbruket en mer stabil och produktiv markanvändning, vilket lade grunden för att individuell frihet och äganderätt skulle kunna utvecklas.
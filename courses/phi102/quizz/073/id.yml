question: Perkembangan besar apa yang memungkinkan terjadinya akumulasi surplus dan munculnya pertukaran komersial dalam masyarakat manusia?
answer: Kelahiran pertanian
wrong_answers:
  - Penemuan mesin uap
  - Perkembangan teknik berburu
  - Penemuan benua baru
explanation: |
  Kelahiran pertanian merupakan titik balik penting dalam sejarah manusia karena memperkenalkan metode produksi yang damai dan memungkinkan masyarakat untuk mengakumulasi barang surplus untuk pertama kalinya. Revolusi pertanian ini menciptakan kondisi material yang diperlukan untuk pertukaran komersial dan hubungan kontraktual berdasarkan kesepakatan bersama, bukan paksaan. Sementara perburuan membutuhkan wilayah yang luas dan tidak sesuai dengan kepemilikan pribadi, pertanian memungkinkan penggunaan lahan yang lebih stabil dan produktif, meletakkan dasar bagi kebebasan individu dan hak milik untuk berkembang.
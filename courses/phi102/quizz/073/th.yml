question: การพัฒนาที่สำคัญใดที่ทำให้เกิดการสะสมส่วนเกินและการเกิดขึ้นของการแลกเปลี่ยนทางการค้าในสังคมมนุษย์?
answer: กำเนิดเกษตรกรรม
wrong_answers:
  - การประดิษฐ์เครื่องจักรไอน้ำ
  - การพัฒนาเทคนิคการล่าสัตว์
  - การค้นพบทวีปใหม่
explanation: |
  การเกิดขึ้นของเกษตรกรรมเป็นจุดเปลี่ยนที่สำคัญในประวัติศาสตร์มนุษย์ เนื่องจากได้แนะนำวิธีการผลิตที่สงบสุขและทำให้สังคมสามารถสะสมสินค้าส่วนเกินได้เป็นครั้งแรก การปฏิวัติเกษตรกรรมนี้ได้สร้างเงื่อนไขทางวัตถุที่จำเป็นสำหรับการแลกเปลี่ยนทางการค้าและความสัมพันธ์ตามสัญญาที่ตั้งอยู่บนข้อตกลงร่วมกันแทนที่จะใช้กำลัง ในขณะที่การล่าสัตว์ต้องการดินแดนอันกว้างใหญ่ที่ไม่สอดคล้องกับทรัพย์สินส่วนตัว เกษตรกรรมทำให้สามารถใช้ที่ดินได้อย่างมั่นคงและมีประสิทธิภาพมากขึ้น วางรากฐานสำหรับเสรีภาพส่วนบุคคลและสิทธิในทรัพย์สินที่จะพัฒนา
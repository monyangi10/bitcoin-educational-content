question: Milline oluline areng võimaldas inimühiskondades ülejääkide kogunemist ja kaubavahetuse tekkimist?
answer: Põllumajanduse sündi
wrong_answers:
  - Aurumasinate leiutamine
  - Jahitehnika arendamine
  - Uute kontinentide avastamine
explanation: |
  Põllumajanduse teke on otsustav pöördepunkt inimkonna ajaloos, kuna see tõi kaasa rahumeelsed tootmismeetodid ja võimaldas esimest korda ühiskonnal koguda ülejääke. See põllumajanduslik revolutsioon lõi materiaalsed tingimused kaubavahetuseks ja lepingulisteks suheteks, mis põhinesid pigem vastastikusel kokkuleppel kui jõul. Kui jahipidamine nõudis suuri territooriume, mis ei olnud eraomandiga ühildatavad, siis põllumajandus võimaldas stabiilsemat ja tootlikumat maakasutust, pannes aluse individuaalse vabaduse ja omandiõiguse arengule.
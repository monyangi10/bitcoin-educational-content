question: What major development allowed for the accumulation of surplus and the emergence of commercial exchanges in human societies?
answer: The birth of agriculture
wrong_answers:
  - The invention of the steam engine
  - The development of hunting techniques
  - The discovery of new continents
explanation: |
  The birth of agriculture represents a crucial turning point in human history as it introduced peaceful production methods and enabled societies to accumulate surplus goods for the first time. This agricultural revolution created the material conditions necessary for commercial exchanges and contractual relationships based on mutual agreement rather than force. While hunting required vast territories incompatible with private property, agriculture allowed for more stable and productive land use, laying the foundation for individual liberty and property rights to develop.
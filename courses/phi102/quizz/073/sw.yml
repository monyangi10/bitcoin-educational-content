question: Ni maendeleo gani makubwa yaliyoruhusu mkusanyiko wa ziada na kuibuka kwa mabadilishano ya kibiashara katika jamii za wanadamu?
answer: Kuzaliwa kwa kilimo
wrong_answers:
  - Uvumbuzi wa injini ya mvuke
  - Maendeleo ya mbinu za uwindaji
  - Ugunduzi wa mabara mapya
explanation: |
  Kuzaliwa kwa kilimo kunawakilisha hatua muhimu ya mabadiliko katika historia ya binadamu kwani kulianzisha mbinu za uzalishaji wa amani na kuwezesha jamii kukusanya bidhaa za ziada kwa mara ya kwanza. Mapinduzi haya ya kilimo yaliunda hali muhimu za nyenzo kwa ajili ya kubadilishana kibiashara na mahusiano ya kimkataba kulingana na makubaliano ya pande zote badala ya nguvu. Ingawa uwindaji ulihitaji maeneo makubwa yasiyolingana na mali binafsi, kilimo kiliruhusu matumizi ya ardhi imara na yenye tija zaidi, na kuweka msingi wa uhuru wa mtu binafsi na haki za mali kuendelezwa.
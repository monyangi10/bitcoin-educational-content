question: Sự phát triển quan trọng nào đã cho phép tích lũy thặng dư và sự xuất hiện của các hoạt động trao đổi thương mại trong xã hội loài người?
answer: Sự ra đời của nông nghiệp
wrong_answers:
  - Sự phát minh ra động cơ hơi nước
  - Sự phát triển của các kỹ thuật săn bắn
  - Việc khám phá ra các lục địa mới
explanation: |
  Sự ra đời của nông nghiệp đánh dấu một bước ngoặt quan trọng trong lịch sử nhân loại vì nó đã giới thiệu các phương pháp sản xuất hòa bình và cho phép các xã hội tích lũy được của cải dư thừa lần đầu tiên. Cuộc cách mạng nông nghiệp này đã tạo ra các điều kiện vật chất cần thiết cho các hoạt động trao đổi thương mại và các mối quan hệ hợp đồng dựa trên sự thỏa thuận lẫn nhau chứ không phải bằng vũ lực. Trong khi săn bắn đòi hỏi những vùng lãnh thổ rộng lớn không phù hợp với quyền sở hữu tư nhân, nông nghiệp cho phép sử dụng đất đai ổn định và hiệu quả hơn, đặt nền tảng cho sự phát triển của tự do cá nhân và quyền sở hữu.
question: Que desenvolvimento importante permitiu a acumulação de excedentes e o aparecimento de trocas comerciais nas sociedades humanas?
answer: O nascimento da agricultura
wrong_answers:
  - A invenção da máquina a vapor
  - A evolução das técnicas de caça
  - A descoberta de novos continentes
explanation: |
  O nascimento da agricultura representa um ponto de viragem crucial na história da humanidade, uma vez que introduziu métodos de produção pacíficos e permitiu às sociedades acumularem, pela primeira vez, bens excedentários. Esta revolução agrícola criou as condições materiais necessárias às trocas comerciais e às relações contratuais baseadas no acordo mútuo e não na força. Enquanto a caça exigia vastos territórios incompatíveis com a propriedade privada, a agricultura permitiu uma utilização mais estável e produtiva da terra, lançando as bases para o desenvolvimento da liberdade individual e do direito de propriedade.
question: 人間社会における余剰の蓄積と商業的交流の出現を可能にした主要な発展とは何か？
answer: 農業の誕生
wrong_answers:
  - 蒸気機関の発明
  - 狩猟技術の発展
  - 新大陸の発見
explanation: |
  農業の誕生は、平和的な生産方法を導入し、社会が初めて余剰財を蓄積することを可能にした人類史の重要な転換点である。この農業革命は、武力ではなく相互の合意に基づく商業的交流や契約関係に必要な物質的条件を作り出した。狩猟が私有財産とは相容れない広大な領土を必要としたのに対し、農業はより安定的で生産的な土地利用を可能にし、個人の自由と財産権の発展の基礎を築いた。
question: 인류 사회에서 잉여가 축적되고 상업적 교환이 출현할 수 있었던 주요한 발전은 무엇이었을까요?
answer: 농업의 탄생
wrong_answers:
  - 증기 기관의 발명
  - 사냥 기술의 발전
  - 새로운 대륙의 발견
explanation: |
  농업의 탄생은 평화로운 생산 방식을 도입하고 사회가 처음으로 잉여 재화를 축적할 수 있게 한 인류 역사의 중요한 전환점이었습니다. 이 농업 혁명은 무력이 아닌 상호 합의에 기반한 상업적 교류와 계약 관계에 필요한 물질적 조건을 만들어냈습니다. 사냥에는 사유재산과 양립할 수 없는 광대한 영토가 필요했지만, 농업은 보다 안정적이고 생산적인 토지 이용이 가능해져 개인의 자유와 재산권이 발전할 수 있는 토대를 마련했습니다.
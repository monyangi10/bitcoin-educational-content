question: Кое важно развитие е позволило натрупването на излишъци и появата на търговски обмен в човешките общества?
answer: Раждането на земеделието
wrong_answers:
  - Изобретяването на парната машина
  - Развитие на ловните техники
  - Откриването на нови континенти
explanation: |
  Възникването на земеделието представлява важен поврат в човешката история, тъй като то въвежда мирни методи на производство и за първи път дава възможност на обществата да натрупват излишни стоки. Тази селскостопанска революция създава материалните условия, необходими за търговски обмен и договорни отношения, основани на взаимно съгласие, а не на сила. Докато ловът е изисквал обширни територии, несъвместими с частната собственост, земеделието е позволило по-стабилно и продуктивно използване на земята, полагайки основите за развитие на индивидуалната свобода и правото на собственост.
question: Quale importante sviluppo ha permesso l'accumulo di surplus e la nascita di scambi commerciali nelle società umane?
answer: La nascita dell'agricoltura
wrong_answers:
  - L'invenzione della macchina a vapore
  - Lo sviluppo delle tecniche di caccia
  - La scoperta di nuovi continenti
explanation: |
  La nascita dell'agricoltura rappresenta un punto di svolta cruciale nella storia dell'umanità, poiché ha introdotto metodi di produzione pacifici e ha permesso alle società di accumulare per la prima volta beni in eccesso. Questa rivoluzione agricola ha creato le condizioni materiali necessarie per gli scambi commerciali e le relazioni contrattuali basate sul mutuo accordo piuttosto che sulla forza. Mentre la caccia richiedeva vasti territori incompatibili con la proprietà privata, l'agricoltura ha permesso un uso più stabile e produttivo della terra, ponendo le basi per lo sviluppo della libertà individuale e dei diritti di proprietà.
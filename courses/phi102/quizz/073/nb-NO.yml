question: Hvilken viktig utvikling har gjort det mulig å akkumulere overskudd og utvikle handelssamfunn?
answer: Jordbrukets fødsel
wrong_answers:
  - Oppfinnelsen av dampmaskinen
  - Utviklingen av jaktteknikker
  - Oppdagelsen av nye kontinenter
explanation: |
  Jordbrukets fødsel representerer et avgjørende vendepunkt i menneskehetens historie, ettersom det innførte fredelige produksjonsmetoder og for første gang gjorde det mulig for samfunn å akkumulere overskuddsvarer. Denne jordbruksrevolusjonen skapte de materielle forutsetningene som var nødvendige for kommersielle utvekslinger og kontraktsforhold basert på gjensidig enighet snarere enn på makt. Mens jakt krevde enorme områder som var uforenlige med privat eiendomsrett, åpnet jordbruket for en mer stabil og produktiv bruk av jorden, noe som la grunnlaget for at individuell frihet og eiendomsrett kunne utvikle seg.
question: Hangi büyük gelişme insan toplumlarında artık birikimine ve ticari mübadelelerin ortaya çıkmasına olanak sağlamıştır?
answer: Tarımın doğuşu
wrong_answers:
  - Buhar makinesinin icadı
  - Avlanma tekniklerinin geliştirilmesi
  - Yeni kıtaların keşfi
explanation: |
  Tarımın doğuşu, barışçıl üretim yöntemlerini ortaya çıkardığı ve toplumların ilk kez artı mal biriktirmesine olanak tanıdığı için insanlık tarihinde çok önemli bir dönüm noktasını temsil etmektedir. Bu tarım devrimi, ticari alışverişler ve güçten ziyade karşılıklı anlaşmaya dayalı sözleşmeli ilişkiler için gerekli maddi koşulları yarattı. Avcılık özel mülkiyetle bağdaşmayan geniş topraklar gerektirirken, tarım daha istikrarlı ve verimli toprak kullanımına izin vererek bireysel özgürlüğün ve mülkiyet haklarının gelişmesinin temelini atmıştır.
question: Quelle évolution majeure a permis l'accumulation de surplus et l'émergence d'échanges commerciaux dans les sociétés humaines ?
answer: La naissance de l'agriculture
wrong_answers:
  - L'invention de la machine à vapeur
  - L'évolution des techniques de chasse
  - La découverte de nouveaux continents
explanation: |
  La naissance de l'agriculture représente un tournant crucial dans l'histoire de l'humanité, car elle a introduit des méthodes de production pacifiques et a permis aux sociétés d'accumuler pour la première fois des biens excédentaires. Cette révolution agricole a créé les conditions matérielles nécessaires aux échanges commerciaux et aux relations contractuelles fondées sur l'accord mutuel plutôt que sur la force. Alors que la chasse nécessitait de vastes territoires incompatibles avec la propriété privée, l'agriculture a permis une utilisation plus stable et plus productive des terres, jetant les bases du développement de la liberté individuelle et du droit de propriété.
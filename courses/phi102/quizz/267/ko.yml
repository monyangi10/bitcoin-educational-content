question: 자유의 사실적 근거 분석에 따르면 물질적 재화와 재산의 합법적 소유의 토대가 되는 인간의 근본적인 현실은 무엇인가요?
answer: 자기 소유권(propriété de soi) - 인간이 스스로를 소유한다는 사실
wrong_answers:
  - 물리적 세계의 자원에 대한 자연적 희소성과 경쟁
  - 사람들 사이의 개인적 다양성과 감소할 수 없는 인간 다양성
  - 집단 폭력에서 계약 체결로 이어지는 역사적 진전
explanation: |
  본문은 인간이 물건, 물질적 재화, 토지를 합법적으로 소유할 수 있는 것은 바로 인간이 자신을 소유하고 있기 때문이라는 점에서 자기 소유권(propriété de soi)이 인간의 기본 사실 중 중심적인 위치를 차지한다고 명시적으로 언급하고 있습니다. 자연의 희소성, 인간의 다양성, 역사적 진보가 자유의 토대에서 중요한 요소로 언급되지만, 그것이 정당한 재산 소유의 구체적인 근거로 확인되지는 않습니다. 자기 소유권은 다른 모든 형태의 합법적인 소유를 가능하게 하는 논리적 전제 조건으로 제시됩니다.
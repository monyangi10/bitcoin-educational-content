question: Secondo la teoria economica liberale, qual è la ragione principale per cui le preoccupazioni ambientali e l'inquinamento industriale non invalidano il principio del capitalismo del libero mercato?
answer: La teoria liberale riconosce l'esistenza dell'inquinamento, ma sostiene che la libera azione non può includere il danneggiamento degli altri, stabilendo chiari confini per l'attività economica legittima
wrong_answers:
  - Il danno ambientale è considerato un compromesso accettabile per il progresso economico e l'aumento della produttività nelle società capitalistiche
  - Le forze di mercato eliminano naturalmente l'inquinamento attraverso le preferenze dei consumatori, senza richiedere alcuna regolamentazione esterna o vincoli morali
  - L'inquinamento industriale colpisce principalmente la classe benestante che possiede i mezzi di produzione, rendendolo un problema autocorrettivo
explanation: |
  La teoria economica liberale non ignora le preoccupazioni ambientali, ma le integra nel suo quadro di riferimento attraverso il principio secondo cui l'azione libera legittima non può comportare il danneggiamento di altri. Questo stabilisce dei confini naturali per l'attività economica: la libertà di una persona finisce quando inizia a danneggiare gli altri o la loro proprietà. Le risposte sbagliate travisano la teoria liberale: non accetta l'inquinamento come inevitabile, non si affida esclusivamente alle forze del mercato senza vincoli morali e non presume che l'inquinamento riguardi solo i ricchi.
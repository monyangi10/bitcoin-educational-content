question: Was ist nach der liberalen Wirtschaftstheorie der Hauptgrund dafür, dass Umweltbelange und industrielle Verschmutzung das Prinzip des freien Marktkapitalismus nicht außer Kraft setzen?
answer: Die liberale Theorie erkennt an, dass Umweltverschmutzung existiert, behauptet aber, dass freies Handeln nicht die Schädigung anderer einschließen kann, und setzt klare Grenzen für legitime wirtschaftliche Aktivitäten
wrong_answers:
  - Umweltschäden werden in kapitalistischen Gesellschaften als akzeptabler Kompromiss für wirtschaftlichen Fortschritt und erhöhte Produktivität angesehen
  - Die Marktkräfte beseitigen die Umweltverschmutzung auf natürliche Weise durch die Präferenzen der Verbraucher, ohne dass eine externe Regulierung oder moralische Zwänge erforderlich sind
  - Die industrielle Umweltverschmutzung betrifft in erster Linie die wohlhabende Klasse, die die Produktionsmittel besitzt, so dass es sich um ein selbstkorrigierendes Problem handelt
explanation: |
  Die liberale Wirtschaftstheorie ignoriert Umweltbelange nicht, sondern integriert sie in ihren Rahmen durch den Grundsatz, dass legitimes freies Handeln nicht mit der Schädigung anderer einhergehen darf. Damit werden der wirtschaftlichen Tätigkeit natürliche Grenzen gesetzt - die Freiheit des Einzelnen endet dort, wo sie beginnt, andere oder deren Eigentum zu schädigen. Die falschen Antworten stellen die liberale Theorie falsch dar: Sie akzeptiert die Umweltverschmutzung nicht als unvermeidlich, verlässt sich nicht allein auf die Marktkräfte ohne moralische Zwänge und geht nicht davon aus, dass die Umweltverschmutzung nur die Wohlhabenden betrifft.
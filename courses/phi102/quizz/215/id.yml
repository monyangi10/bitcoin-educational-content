question: Menurut teori ekonomi liberal, apa alasan utama mengapa masalah lingkungan dan polusi industri tidak membatalkan prinsip kapitalisme pasar bebas?
answer: Teori liberal mengakui adanya polusi, namun menyatakan bahwa tindakan bebas tidak boleh mencakup tindakan yang merugikan orang lain, dengan menetapkan batas-batas yang jelas untuk kegiatan ekonomi yang sah
wrong_answers:
  - Kerusakan lingkungan dianggap sebagai imbalan yang dapat diterima untuk kemajuan ekonomi dan peningkatan produktivitas dalam masyarakat kapitalis
  - Kekuatan pasar secara alami menghilangkan polusi melalui preferensi konsumen tanpa memerlukan peraturan eksternal atau kendala moral
  - Polusi industri terutama berdampak pada kelas kaya yang memiliki alat produksi, menjadikannya masalah yang bisa diperbaiki sendiri
explanation: |
  Teori ekonomi liberal tidak mengabaikan masalah lingkungan, tetapi mengintegrasikannya ke dalam kerangka kerja melalui prinsip bahwa tindakan bebas yang sah tidak boleh merugikan orang lain. Hal ini menetapkan batas-batas alamiah untuk aktivitas ekonomi - kebebasan seseorang berakhir ketika ia mulai merusak orang lain atau harta benda mereka. Jawaban yang salah menggambarkan teori liberal secara keliru: teori ini tidak menerima polusi sebagai sesuatu yang tak terelakkan, tidak hanya mengandalkan kekuatan pasar tanpa batasan moral, dan tidak mengasumsikan bahwa polusi hanya berdampak pada orang kaya.
question: 根据自由主义经济理论，环境问题和工业污染不会使自由市场资本主义原则失效的主要原因是什么？
answer: 自由主义理论承认污染的存在，但认为自由行动不能包括伤害他人，为合法的经济活动确立了明确的界限
wrong_answers:
  - 在资本主义社会中，环境破坏被认为是经济进步和提高生产力的一种可接受的交换条件
  - 市场力量通过消费者的偏好自然消除污染，无需任何外部监管或道德约束
  - 工业污染主要影响拥有生产资料的富裕阶层，因此是一个自我纠正的问题
explanation: |
  自由主义经济理论并没有忽视环境问题，而是通过合法的自由行动不能涉及损害他人的原则，将环境问题纳入其框架。这就为经济活动划定了自然界限--一个人的自由在开始损害他人或他人财产时终止。错误的答案歪曲了自由主义理论：它不认为污染是不可避免的，不完全依赖市场力量而没有道德约束，也不认为污染只影响富人。
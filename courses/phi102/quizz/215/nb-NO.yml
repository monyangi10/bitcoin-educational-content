question: Hva er ifølge liberal økonomisk teori den viktigste grunnen til at miljøhensyn og industriforurensning ikke gjør prinsippet om fri markedskapitalisme ugyldig?
answer: Liberal teori anerkjenner at forurensning eksisterer, men hevder at fri handling ikke kan innebære å skade andre, og setter klare grenser for legitim økonomisk aktivitet
wrong_answers:
  - Miljøskader anses som et akseptabelt kompromiss for økonomisk fremgang og økt produktivitet i kapitalistiske samfunn
  - Markedskreftene eliminerer forurensning på en naturlig måte gjennom forbrukernes preferanser, uten at det kreves ekstern regulering eller moralske begrensninger
  - Industriell forurensning rammer først og fremst den velstående klassen som eier produksjonsmidlene, noe som gjør det til et selvkorrigerende problem
explanation: |
  Liberal økonomisk teori ignorerer ikke miljøhensyn, men integrerer dem i sitt rammeverk gjennom prinsippet om at legitim fri handling ikke kan innebære å skade andre. Dette setter naturlige grenser for økonomisk aktivitet - friheten tar slutt der den begynner å skade andre eller deres eiendom. De gale svarene gir en feilaktig fremstilling av liberal teori: Den aksepterer ikke forurensning som uunngåelig, den baserer seg ikke utelukkende på markedskreftene uten moralske begrensninger, og den antar ikke at forurensning bare rammer de velstående.
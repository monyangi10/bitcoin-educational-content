question: Prema liberalnoj ekonomskoj teoriji, primarni razlog zašto ekološke brige i industrijsko zagađenje ne poništavaju princip slobodnog tržišnog kapitalizma je taj što se veruje da tržište može internalizovati eksterne troškove kroz mehanizme kao što su porezi na zagađenje i tržišta za trgovinu emisijama, omogućavajući efikasno rešavanje ekoloških problema unutar kapitalističkog okvira.
answer: Liberalna teorija priznaje da zagađenje postoji, ali tvrdi da slobodno delovanje ne može uključivati nanošenje štete drugima, uspostavljajući jasne granice za legitimnu ekonomsku aktivnost.
wrong_answers:
  - Šteta po životnu sredinu se smatra prihvatljivom cenom za ekonomski napredak i povećanu produktivnost u kapitalističkim društvima.
  - Tržišne sile prirodno eliminišu zagađenje kroz preferencije potrošača bez potrebe za bilo kakvom spoljašnjom regulacijom ili moralnim ograničenjima
  - Industrijsko zagađenje prvenstveno pogađa bogatu klasu koja poseduje sredstva za proizvodnju, što ga čini problemom koji se sam ispravlja.
explanation: |
  Liberalna ekonomska teorija ne zanemaruje ekološke probleme, već ih integriše u svoj okvir kroz princip da legitimna slobodna akcija ne može uključivati nanošenje štete drugima. Ovo postavlja prirodne granice za ekonomsku aktivnost - sloboda pojedinca prestaje tamo gde počinje da šteti drugima ili njihovoj imovini. Pogrešni odgovori pogrešno predstavljaju liberalnu teoriju: ona ne prihvata zagađenje kao neizbežno, ne oslanja se isključivo na tržišne sile bez moralnih ograničenja i ne pretpostavlja da zagađenje pogađa samo bogate.
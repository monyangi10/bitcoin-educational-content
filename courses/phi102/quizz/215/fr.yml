question: Selon la théorie économique libérale, quelle est la principale raison pour laquelle les préoccupations environnementales et la pollution industrielle n'invalident pas le principe du capitalisme de marché ?
answer: La théorie libérale reconnaît l'existence de la pollution, mais maintient que la liberté d'action ne peut inclure le fait de nuire à autrui, établissant ainsi des limites claires pour l'activité économique légitime
wrong_answers:
  - Les dommages causés à l'environnement sont considérés comme un compromis acceptable pour le progrès économique et l'augmentation de la productivité dans les sociétés capitalistes
  - Les forces du marché éliminent naturellement la pollution par le biais des préférences des consommateurs, sans nécessiter de réglementation externe ou de contraintes morales
  - La pollution industrielle affecte principalement la classe aisée qui possède les moyens de production, ce qui en fait un problème qui se corrige de lui-même
explanation: |
  La théorie économique libérale n'ignore pas les préoccupations environnementales, mais les intègre dans son cadre par le biais du principe selon lequel une action libre légitime ne peut impliquer de nuire à autrui. Ce principe établit des limites naturelles à l'activité économique : la liberté d'une personne s'arrête là où elle commence à nuire à autrui ou à ses biens. Les mauvaises réponses donnent une image erronée de la théorie libérale : celle-ci ne considère pas la pollution comme inévitable, ne s'appuie pas uniquement sur les forces du marché sans contraintes morales et ne suppose pas que la pollution n'affecte que les riches.
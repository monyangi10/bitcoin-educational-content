question: Enligt liberal ekonomisk teori, vad är det främsta skälet till att miljöhänsyn och industriella föroreningar inte ogiltigförklarar principen om fri marknadskapitalism?
answer: Liberal teori erkänner att föroreningar existerar men hävdar att det fria handlandet inte kan omfatta att skada andra, vilket skapar tydliga gränser för legitim ekonomisk aktivitet
wrong_answers:
  - Miljöförstöring anses vara en acceptabel kompromiss för ekonomisk utveckling och ökad produktivitet i kapitalistiska samhällen
  - Marknadskrafterna eliminerar naturligt föroreningar genom konsumenternas preferenser utan att det krävs någon extern reglering eller moraliska begränsningar
  - Industriella föroreningar drabbar främst den rika klassen som äger produktionsmedlen, vilket gör det till ett självkorrigerande problem
explanation: |
  Liberal ekonomisk teori ignorerar inte miljöhänsyn utan integrerar dem i sitt ramverk genom principen att legitim fri handling inte kan innebära att man skadar andra. Detta sätter naturliga gränser för den ekonomiska aktiviteten - friheten tar slut när man börjar skada andra eller deras egendom. De felaktiga svaren ger en felaktig bild av den liberala teorin: den accepterar inte föroreningar som oundvikliga, förlitar sig inte enbart på marknadskrafterna utan moraliska begränsningar och antar inte att föroreningar bara drabbar de rika.
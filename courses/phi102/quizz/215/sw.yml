question: Kulingana na nadharia ya uchumi huria, ni sababu gani kuu kwa nini wasiwasi wa mazingira na uchafuzi wa viwanda havibatilishi kanuni ya ubepari wa soko huria?
answer: Nadharia ya kiliberali inakubali uchafuzi wa mazingira upo lakini inasisitiza kwamba hatua huru haziwezi kujumuisha kuwadhuru wengine, na kuweka mipaka iliyo wazi kwa shughuli halali za kiuchumi
wrong_answers:
  - Uharibifu wa mazingira unachukuliwa kama biashara inayokubalika kwa maendeleo ya kiuchumi na ongezeko la tija katika jamii za kibepari
  - Nguvu za soko huondoa uchafuzi wa mazingira kupitia mapendeleo ya watumiaji bila kuhitaji kanuni zozote za nje au vikwazo vya maadili.
  - Uchafuzi wa viwanda huathiri zaidi tabaka la matajiri wanaomiliki njia za uzalishaji, na kuifanya kuwa tatizo linalojirekebisha.
explanation: |
  Nadharia ya uchumi huria haipuuzi wasiwasi wa mazingira bali inayaunganisha katika mfumo wake kupitia kanuni kwamba hatua halali za uhuru haziwezi kuhusisha kuwadhuru wengine. Hii huweka mipaka ya asili kwa shughuli za kiuchumi - uhuru wa mtu huishia pale unapoanza kuwadhuru wengine au mali zao. Majibu yasiyo sahihi yanapotosha nadharia huria: haikubali uchafuzi kama usioepukika, haitegemei tu nguvu za soko bila vikwazo vya maadili, na haidhanii uchafuzi unaathiri matajiri pekee.
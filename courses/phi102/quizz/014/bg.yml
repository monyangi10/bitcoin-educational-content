question: Според теорията на Кондорсе за човешкото усъвършенстване какво е необходимо, за да може човечеството да продължи да се развива?
answer: Новите и революционни идеи трябва да се разпространяват свободно, за да се предадат откритията на бъдещите поколения
wrong_answers:
  - Държавните институции трябва внимателно да регулират кои идеи могат да се споделят публично
  - Само на утвърдени учени трябва да бъде позволено да обсъждат и развиват нови концепции
  - Традиционните знания трябва да се запазят непроменени, за да се поддържа социалната стабилност
explanation: |
  Кондорсе твърди, че човешкото усъвършенстване изисква активни условия, в които новите, смели и революционни идеи могат да се разпространяват свободно. Това предаване на откритията на бъдещите поколения е от съществено значение за непрекъснатия напредък. Неправилните отговори противоречат на този принцип, като предлагат ограничения за споделяне на идеи, ограничаване на дебатите до елита или даване на приоритет на традицията пред иновациите - всичко това би попречило на процеса на усъвършенстване, описан от Кондорсе.
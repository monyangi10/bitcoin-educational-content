question: Kulingana na nadharia ya Condorcet ya ukamilifu wa mwanadamu, ni nini kinachohitajika kwa ubinadamu kuendelea kusonga mbele?
answer: Mawazo mapya na ya kimapinduzi lazima yawasilishwe kwa uhuru ili kusambaza uvumbuzi kwa vizazi vijavyo
wrong_answers:
  - Taasisi za serikali lazima zidhibiti kwa uangalifu ni mawazo gani yanaweza kusambazwa hadharani
  - Wasomi waliobobea pekee ndio wanaopaswa kuruhusiwa kujadili na kukuza dhana mpya
  - Maarifa ya kitamaduni lazima yahifadhiwe bila kubadilika ili kudumisha utulivu wa kijamii
explanation: |
  Kitabu cha Condorcet cha 'Esquisse d'un tableau historique des progrès de l'esprit humain' kinasema kwamba ukamilifu wa binadamu unahitaji hali hai ambapo mawazo mapya, ya ujasiri, na ya mapinduzi yanaweza kuwasilishwa kwa uhuru. Uwasilishaji huu wa uvumbuzi kwa vizazi vijavyo ni muhimu kwa maendeleo endelevu. Majibu yasiyo sahihi yanapingana na kanuni hii kwa kupendekeza vikwazo vya kushiriki mawazo, kupunguza mijadala kwa wasomi, au kuweka kipaumbele mila badala ya uvumbuzi - yote ambayo yangezuia mchakato wa ukamilifu ambao Condorcet alielezea.
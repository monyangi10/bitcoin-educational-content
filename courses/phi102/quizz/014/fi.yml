question: Condorcet'n teorian mukaan ihmiskunnan täydellisyydestä, mitä tarvitaan, jotta ihmiskunta voisi jatkaa edistymistään?
answer: Uusista ja vallankumouksellisista ideoista on tiedotettava vapaasti, jotta löydöt voidaan välittää tuleville sukupolville
wrong_answers:
  - Hallitusten on säädeltävä huolellisesti, mitä ajatuksia voidaan jakaa julkisesti
  - Ainoastaan vakiintuneiden tutkijoiden tulisi saada keskustella ja kehittää uusia käsitteitä
  - Perinteinen tietämys on säilytettävä muuttumattomana yhteiskunnallisen vakauden säilyttämiseksi
explanation: |
  Condorcet'n teoksessa "Esquisse d'un tableau historique des progrès de l'esprit humain" väitetään, että ihmisen täydellisyys edellyttää aktiivisia olosuhteita, joissa uudet, rohkeat ja vallankumoukselliset ajatukset voidaan välittää vapaasti. Tämä keksintöjen siirtäminen tuleville sukupolville on olennaisen tärkeää jatkuvalle edistykselle. Väärät vastaukset ovat ristiriidassa tämän periaatteen kanssa, sillä niissä ehdotetaan ideoiden jakamisen rajoittamista, keskustelun rajoittamista eliittiin tai perinteen asettamista innovaation edelle - kaikki nämä haittaavat Condorcet'n kuvaamaa täydellistymisprosessia.
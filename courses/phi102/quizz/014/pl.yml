question: Zgodnie z teorią ludzkiej doskonałości Condorceta, co jest konieczne, aby ludzkość nadal się rozwijała?
answer: Nowe i rewolucyjne idee muszą być swobodnie komunikowane, aby przekazywać odkrycia przyszłym pokoleniom
wrong_answers:
  - Instytucje rządowe muszą starannie regulować, które pomysły mogą być udostępniane publicznie
  - Tylko uznani naukowcy powinni mieć możliwość debatowania i rozwijania nowych koncepcji
  - Tradycyjna wiedza musi zostać zachowana w niezmienionej formie, aby utrzymać stabilność społeczną
explanation: |
  "Esquisse d'un tableau historique des progrès de l'esprit humain" Condorceta dowodzi, że ludzka doskonałość wymaga aktywnych warunków, w których nowe, śmiałe i rewolucyjne idee mogą być swobodnie przekazywane. Przekazywanie odkryć przyszłym pokoleniom jest niezbędne dla ciągłego postępu. Błędne odpowiedzi zaprzeczają tej zasadzie, sugerując ograniczenia w dzieleniu się pomysłami, ograniczając debatę do elit lub przedkładając tradycję nad innowacje - wszystko to utrudniłoby proces doskonałości opisany przez Condorceta.
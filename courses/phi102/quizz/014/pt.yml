question: De acordo com a teoria da perfetibilidade humana de Condorcet, o que é necessário para que a humanidade continue a progredir?
answer: As ideias novas e revolucionárias devem ser comunicadas livremente para transmitir as descobertas às gerações futuras
wrong_answers:
  - As instituições governamentais devem regular cuidadosamente as ideias que podem ser partilhadas publicamente
  - Apenas os académicos consagrados devem ser autorizados a debater e desenvolver novos conceitos
  - Os conhecimentos tradicionais devem ser preservados inalterados para manter a estabilidade social
explanation: |
  A obra de Condorcet "Esquisse d'un tableau historique des progrès de l'esprit humain" defende que a perfetibilidade humana exige condições activas em que ideias novas, audaciosas e revolucionárias possam ser comunicadas livremente. Esta transmissão de descobertas às gerações futuras é essencial para o progresso contínuo. As respostas erradas contradizem este princípio, sugerindo restrições à partilha de ideias, limitando o debate às elites ou dando prioridade à tradição em detrimento da inovação - tudo isto impediria o processo de perfetibilidade descrito por Condorcet.
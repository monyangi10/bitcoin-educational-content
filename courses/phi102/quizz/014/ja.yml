question: コンドルセの人間完全性理論によれば、人類が進歩し続けるためには何が必要なのか？
answer: 発見を後世に伝えるために、新しく革新的なアイデアは自由に伝えられなければならない。
wrong_answers:
  - 政府機関は、公に共有できるアイデアを慎重に規制しなければならない。
  - 新しい概念について議論し、発展させることが許されるのは、確立された学者だけである。
  - 社会の安定を維持するために、伝統的知識は変わることなく保存されなければならない
explanation: |
  コンドルセの『人間の精神的進歩の歴史的表象の探究』は、人間の完全性には、新しく大胆で革命的なアイデアが自由に伝達される活発な条件が必要であると論じている。このように発見を後世に伝えることは、絶え間ない進歩のために不可欠である。誤答は、アイデアの共有を制限したり、議論をエリートに限定したり、革新よりも伝統を優先させたりすることで、この原則に反する。
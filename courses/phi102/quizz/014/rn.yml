question: Dukurikije iciyumviro ca Condorcet c’uko umuntu ashobora kuba uwutunganye, ni igiki gikenewe kugira ngo abantu babandanye gutera imbere?
answer: Ivyiyumviro bishasha kandi bihindura ibintu bitegerezwa gushikirizwa ata nkomanzi kugira ngo ivyo bavumbuye bishikirizwe abazoza .
wrong_answers:
  - Inzego za Leta zitegerezwa gutegeka neza ivyiyumviro bishobora gusangizwa abantu bose .
  - Intiti zashinzwe ni zo zonyene zikwiye kwemererwa guhanahana ivyiyumviro no gutegura ivyiyumviro bishasha .
  - Ubumenyi bwa kera butegerezwa kuzigama butahindutse kugira ngo imibano igume itekanye .
explanation: |
  Igitabo ca Condorcet citwa ‘Esquisse d’un tableau historique des progrès de l’esprit humain’ kivuga yuko kugira ngo umuntu abe uwutunganye bisaba ko haba ibintu bikora aho ivyiyumviro bishasha, vy’ubushizi bw’amanga kandi vy’ihinduka bishobora gushikirizwa ata nkomanzi. Ukwo gushikiriza ivyo bavumbuye ku bihe bizoza ni ngombwa kugira ngo umuntu abandanye gutera imbere. Inyishu zitari zo zivuguruza iyo ngingo ngenderwako mu gutanga iciyumviro co kubuza gusangira ivyiyumviro, guhagarika impaka ku bantu b’abanyacubahiro, canke gushira imbere imigenzo kuruta guhingura ibintu bishasha - ivyo vyose vyobangamira inzira y’ugutungana nk’uko Condorcet yadondora.
question: Menurut teori Condorcet tentang kesempurnaan manusia, apa yang diperlukan agar manusia dapat terus maju?
answer: Ide-ide baru dan revolusioner harus dikomunikasikan secara bebas untuk meneruskan penemuan kepada generasi mendatang
wrong_answers:
  - Institusi pemerintah harus secara hati-hati mengatur gagasan mana yang dapat dibagikan kepada publik
  - Hanya para sarjana yang sudah mapan yang boleh berdebat dan mengembangkan konsep-konsep baru
  - Pengetahuan tradisional harus dilestarikan tanpa perubahan untuk menjaga stabilitas sosial
explanation: |
  'Esquisse d'un tableau historique des progrès de l'esprit humain' dari Condorcet menyatakan bahwa kesempurnaan manusia membutuhkan kondisi aktif di mana ide-ide baru, berani, dan revolusioner dapat dikomunikasikan secara bebas. Transmisi penemuan ke generasi mendatang sangat penting untuk kemajuan yang berkelanjutan. Jawaban yang salah bertentangan dengan prinsip ini dengan menyarankan pembatasan berbagi ide, membatasi perdebatan hanya untuk kalangan elit, atau memprioritaskan tradisi di atas inovasi - yang semuanya akan menghalangi proses kesempurnaan yang dijelaskan Condorcet.
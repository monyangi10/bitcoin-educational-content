question: بر اساس نظریه کوندورسه درباره کمال‌پذیری انسان، چه چیزی برای ادامه پیشرفت بشریت ضروری است؟
answer: ایده‌های جدید و انقلابی باید آزادانه منتقل شوند تا اکتشافات به نسل‌های آینده منتقل شوند.
wrong_answers:
  - نهادهای دولتی باید با دقت تنظیم کنند که کدام ایده‌ها می‌توانند به‌طور عمومی به اشتراک گذاشته شوند.
  - فقط دانشمندان برجسته باید مجاز به بحث و توسعه مفاهیم جدید باشند.
  - دانش سنتی باید بدون تغییر حفظ شود تا ثبات اجتماعی حفظ گردد.
explanation: |
  «طرح کلی از یک جدول تاریخی پیشرفت‌های روح انسانی» کندورسه استدلال می‌کند که کمال‌پذیری انسان نیازمند شرایط فعالی است که در آن ایده‌های جدید، جسورانه و انقلابی بتوانند آزادانه منتقل شوند. این انتقال اکتشافات به نسل‌های آینده برای پیشرفت مستمر ضروری است. پاسخ‌های نادرست با پیشنهاد محدودیت در اشتراک‌گذاری ایده‌ها، محدود کردن بحث به نخبگان، یا اولویت دادن به سنت بر نوآوری، با این اصل در تضاد هستند - همه این‌ها فرآیند کمال‌پذیری که کندورسه توصیف کرده را مختل می‌کنند.
question: ตามทฤษฎีความสมบูรณ์แบบของมนุษย์ของ Condorcet สิ่งที่จำเป็นสำหรับมนุษยชาติในการก้าวหน้าต่อไปคืออะไร?
answer: แนวคิดใหม่และปฏิวัติต้องถูกสื่อสารอย่างเสรีเพื่อถ่ายทอดการค้นพบไปยังคนรุ่นอนาคต
wrong_answers:
  - สถาบันของรัฐบาลต้องควบคุมอย่างรอบคอบว่าแนวคิดใดสามารถเผยแพร่สู่สาธารณะได้
  - ควรอนุญาตให้นักวิชาการที่มีชื่อเสียงเท่านั้นที่สามารถอภิปรายและพัฒนามโนทัศน์ใหม่ ๆ
  - ความรู้ดั้งเดิมต้องได้รับการอนุรักษ์ไว้โดยไม่เปลี่ยนแปลงเพื่อรักษาเสถียรภาพทางสังคม
explanation: |
  'Esquisse d'un tableau historique des progrès de l'esprit humain' ของ Condorcet โต้แย้งว่าความสามารถในการพัฒนาของมนุษย์ต้องการเงื่อนไขที่กระตือรือร้นซึ่งแนวคิดใหม่ ๆ ที่กล้าหาญและปฏิวัติสามารถสื่อสารได้อย่างเสรี การส่งต่อการค้นพบนี้ไปยังคนรุ่นต่อไปเป็นสิ่งจำเป็นสำหรับความก้าวหน้าอย่างต่อเนื่อง คำตอบที่ผิดขัดแย้งกับหลักการนี้โดยเสนอข้อจำกัดในการแบ่งปันแนวคิด จำกัดการอภิปรายเฉพาะกลุ่มชนชั้นสูง หรือให้ความสำคัญกับประเพณีมากกว่าการสร้างสรรค์ใหม่ - ทั้งหมดนี้จะขัดขวางกระบวนการพัฒนาที่ Condorcet อธิบายไว้
question: Prema Kondorseovoj teoriji ljudske savršenosti, šta je neophodno da bi čovečanstvo nastavilo da napreduje?
answer: Nove i revolucionarne ideje moraju biti slobodno komunicirane kako bi se otkrića prenela budućim generacijama
wrong_answers:
  - Vladine institucije moraju pažljivo regulisati koje ideje mogu biti javno deljene
  - Samo etablirani naučnici treba da imaju dozvolu da raspravljaju i razvijaju nove koncepte.
  - Tradicionalno znanje mora biti sačuvano nepromenjeno kako bi se održala društvena stabilnost
explanation: |
  Condorcetova 'Esquisse d'un tableau historique des progrès de l'esprit humain' tvrdi da ljudska savršenost zahteva aktivne uslove u kojima se nove, smele i revolucionarne ideje mogu slobodno prenositi. Ovaj prenos otkrića budućim generacijama je ključan za kontinuirani napredak. Pogrešni odgovori protivreče ovom principu sugerišući ograničenja u deljenju ideja, ograničavanje debate na elite ili davanje prioriteta tradiciji nad inovacijom - sve što bi ometalo proces savršenstva koji je Condorcet opisao.
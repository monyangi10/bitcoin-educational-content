question: Hva er ifølge Condorcets teori om menneskets perfektibilitet nødvendig for at menneskeheten skal fortsette å utvikle seg?
answer: Nye og revolusjonerende ideer må formidles fritt for å overføre oppdagelser til fremtidige generasjoner
wrong_answers:
  - Statlige institusjoner må nøye regulere hvilke ideer som kan deles offentlig
  - Bare etablerte forskere bør få lov til å debattere og utvikle nye begreper
  - Tradisjonell kunnskap må bevares uendret for å opprettholde sosial stabilitet
explanation: |
  Condorcets "Esquisse d'un tableau historique des progrès de l'esprit humain" argumenterer for at menneskelig perfeksjon krever aktive forhold der nye, dristige og revolusjonerende ideer kan kommuniseres fritt. Denne overføringen av oppdagelser til kommende generasjoner er avgjørende for et kontinuerlig fremskritt. De gale svarene strider mot dette prinsippet ved å foreslå restriksjoner på deling av ideer, begrense debatten til eliten eller prioritere tradisjon fremfor innovasjon - alt dette vil hindre den perfeksjoneringsprosessen Condorcet beskrev.
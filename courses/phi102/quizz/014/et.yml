question: Mis on Condorcet' teooria kohaselt vajalik selleks, et inimkond saaks edasi areneda?
answer: Uusi ja revolutsioonilisi ideid tuleb vabalt levitada, et anda avastusi edasi tulevastele põlvkondadele
wrong_answers:
  - Valitsusasutused peavad hoolikalt reguleerima, milliseid ideid võib avalikult jagada
  - Ainult väljakujunenud teadlastel peaks olema lubatud arutleda ja arendada uusi kontseptsioone
  - Traditsioonilised teadmised tuleb säilitada muutumatuna, et säilitada sotsiaalne stabiilsus
explanation: |
  Condorcet' "Esquisse d'un tableau historique des progrès de l'esprit humain" väidab, et inimese täiuslikkus nõuab aktiivseid tingimusi, kus uusi, julgeid ja revolutsioonilisi ideid saab vabalt levitada. See avastuste edasiandmine tulevastele põlvkondadele on pideva progressi jaoks hädavajalik. Valed vastused lähevad selle põhimõttega vastuollu, soovitades piirata ideede jagamist, piirata arutelu eliidiga või seada traditsioonid uuenduste asemel esikohale - kõik need takistaksid Condorcet' kirjeldatud täiustumisprotsessi.
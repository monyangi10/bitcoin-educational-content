question: Согласно теории совершенства человека Кондорсе, что необходимо для того, чтобы человечество продолжало развиваться?
answer: Новые и революционные идеи должны свободно распространяться, чтобы передавать открытия будущим поколениям
wrong_answers:
  - Государственные учреждения должны тщательно регулировать, какими идеями можно делиться публично
  - Только авторитетные ученые должны иметь право обсуждать и разрабатывать новые концепции
  - Традиционные знания должны быть сохранены в неизменном виде для поддержания социальной стабильности
explanation: |
  В работе Кондорсе "Esquisse d'un tableau historique des progrès de l'esprit humain" утверждается, что для совершенствования человека необходимы активные условия, в которых можно свободно распространять новые, смелые и революционные идеи. Такая передача открытий будущим поколениям необходима для непрерывного прогресса. Неправильные ответы противоречат этому принципу, предлагая ограничить обмен идеями, ограничить дискуссию элитой или отдать предпочтение традициям перед инновациями - все это препятствует процессу совершенствования, описанному Кондорсе.
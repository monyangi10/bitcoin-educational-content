question: कॉन्डोरसेट के मानव पूर्णता के सिद्धांत के अनुसार, मानवता की निरंतर प्रगति के लिए क्या आवश्यक है?
answer: नई और क्रांतिकारी अवधारणाओं का स्वतंत्र रूप से संचार होना आवश्यक है ताकि भविष्य की पीढ़ियों तक खोजों का प्रसार हो सके।
wrong_answers:
  - सरकारी संस्थानों को इस बात का सावधानीपूर्वक नियमन करना चाहिए कि किन विचारों को सार्वजनिक रूप से साझा किया जा सकता है।
  - केवल प्रतिष्ठित विद्वानों को ही बहस करने और नए विचारों को विकसित करने की अनुमति दी जानी चाहिए।
  - सामाजिक स्थिरता बनाए रखने के लिए पारंपरिक ज्ञान को अपरिवर्तित रूप से संरक्षित किया जाना आवश्यक है।
explanation: |
  कॉन्डोरसेट की रचना 'एस्क्विसे डी'उन टैब्लो हिस्टोरिक डेस प्रोग्रेस डे ल'एस्पिरिट ह्यूमेन' में तर्क दिया गया है कि मानव पूर्णता के लिए सक्रिय परिस्थितियाँ आवश्यक हैं जहाँ नए, साहसिक और क्रांतिकारी विचारों का स्वतंत्र रूप से आदान-प्रदान हो सके। भावी पीढ़ियों तक खोजों का यह हस्तांतरण निरंतर प्रगति के लिए अनिवार्य है। गलत उत्तर इस सिद्धांत का खंडन करते हैं क्योंकि वे विचारों के आदान-प्रदान पर प्रतिबंध लगाते हैं, वाद-विवाद को अभिजात वर्ग तक सीमित रखते हैं, या नवाचार पर परंपरा को प्राथमिकता देते हैं - ये सभी बातें कॉन्डोरसेट द्वारा वर्णित पूर्णता की प्रक्रिया में बाधा उत्पन्न करती हैं।
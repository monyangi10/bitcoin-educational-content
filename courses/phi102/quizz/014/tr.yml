question: Condorcet'nin insanın mükemmelleştirilebilirliği teorisine göre, insanlığın ilerlemeye devam etmesi için ne gereklidir?
answer: Keşiflerin gelecek nesillere aktarılması için yeni ve devrim niteliğindeki fikirler özgürce iletilmelidir
wrong_answers:
  - Devlet kurumları hangi fikirlerin kamuya açık olarak paylaşılabileceğini dikkatle düzenlemelidir
  - Sadece köklü akademisyenlerin yeni kavramları tartışmasına ve geliştirmesine izin verilmelidir
  - Sosyal istikrarın korunması için geleneksel bilgi değişmeden korunmalıdır
explanation: |
  Condorcet'nin 'Esquisse d'un tableau historique des progrès de l'esprit humain' adlı eseri, insan mükemmelliğinin yeni, cesur ve devrimci fikirlerin özgürce iletilebileceği aktif koşullar gerektirdiğini savunur. Keşiflerin gelecek nesillere aktarılması sürekli ilerleme için elzemdir. Yanlış cevaplar, fikir paylaşımına kısıtlamalar getirilmesini, tartışmanın elitlerle sınırlandırılmasını veya geleneğin yeniliğe tercih edilmesini önererek bu ilkeyle çelişmektedir - tüm bunlar Condorcet'in tanımladığı mükemmelleştirilebilirlik sürecini engelleyecektir.
question: 根据孔多塞的人类完美性理论，人类继续进步需要什么？
answer: 必须自由传播新的革命性思想，将发现传给后代
wrong_answers:
  - 政府机构必须认真规范哪些观点可以公开分享
  - 只有成熟的学者才能辩论和发展新概念
  - 传统知识必须保持不变，以维护社会稳定
explanation: |
  孔多塞的《人类进步史表》认为，人类的完美需要积极的条件，让新的、大胆的和革命性的思想能够自由传播。将新发现传递给后代是不断进步的必要条件。错误答案违背了这一原则，它们建议限制思想共享、将辩论限制在精英范围内或将传统置于创新之上--所有这些都会阻碍孔多塞所描述的完美性进程。
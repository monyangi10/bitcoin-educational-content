question: Quel défi fondamental la diversité des besoins, des capacités et des situations humaines pose-t-elle à la planification économique centralisée selon la théorie économique libérale ?
answer: La direction centralisée ne peut que reproduire des modèles de production connus et ne peut pas s'adapter à la nature diverse et changeante des capacités individuelles et des demandes du marché
wrong_answers:
  - La planification centralisée crée trop de concurrence entre des individus ayant des compétences différentes, ce qui entraîne des conflits sociaux et une inefficacité économique
  - La diversité des aptitudes humaines nécessite des programmes de formation standardisés que seules des autorités centralisées peuvent offrir efficacement dans les différents secteurs économiques
  - Les planificateurs centraux ne disposent pas de capacités de collecte de données suffisantes pour suivre toutes les préférences individuelles et doivent donc s'appuyer sur des études de marché
explanation: |
  Le texte affirme que la perfectibilité et le progrès humains nécessitent la liberté de travail, car une direction centralisée ne peut, par nature, innover au-delà des modèles existants. La diversité des besoins humains, des capacités et des circonstances changeantes exige une flexibilité que seule la liberté individuelle peut offrir. La planification centralisée échoue non pas en raison de problèmes de concurrence, d'exigences de formation ou de problèmes de données, mais parce qu'elle est fondamentalement incapable de transcender les schémas de production connus pour créer de nouvelles solutions.
question: Hvilken grunnleggende utfordring utgjør mangfoldet av menneskelige behov, evner og omstendigheter for sentralisert økonomisk planlegging i henhold til liberal økonomisk teori?
answer: Sentralisert styring kan bare reprodusere kjente produksjonsmønstre og kan ikke tilpasse seg mangfoldet og endringene i individuelle evner og markedets etterspørsel
wrong_answers:
  - Sentralisert planlegging skaper for mye konkurranse mellom individer med ulike ferdigheter, noe som fører til sosiale konflikter og økonomisk ineffektivitet
  - Ulike menneskelige evner krever standardiserte opplæringsprogrammer som bare sentraliserte myndigheter kan tilby effektivt på tvers av ulike økonomiske sektorer
  - Sentrale planleggere har ikke tilstrekkelig datainnsamlingskapasitet til å overvåke alle individuelle preferanser, og må i stedet basere seg på markedsundersøkelser
explanation: |
  Teksten argumenterer for at menneskelig perfeksjonering og fremskritt krever frihet i arbeidet, fordi sentralisert styring i seg selv ikke kan skape noe nytt utover eksisterende mønstre. Mangfoldet av menneskelige behov, evner og skiftende omstendigheter krever den fleksibiliteten som bare individuell frihet kan gi. Sentralisert planlegging mislykkes ikke på grunn av konkurranseproblemer, opplæringskrav eller dataproblemer, men fordi den i bunn og grunn ikke kan overskride kjente produksjonsmønstre for å skape nye løsninger.
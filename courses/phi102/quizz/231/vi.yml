question: Theo lý thuyết kinh tế tự do, sự đa dạng về nhu cầu, khả năng và hoàn cảnh của con người đặt ra thách thức cơ bản nào đối với việc lập kế hoạch kinh tế tập trung?
answer: Sự chỉ đạo tập trung chỉ có thể tái tạo các mô hình sản xuất đã biết và không thể thích ứng với bản chất đa dạng và thay đổi của năng lực cá nhân và nhu cầu thị trường.
wrong_answers:
  - Kế hoạch hóa tập trung tạo ra sự cạnh tranh quá mức giữa các cá nhân có kỹ năng khác nhau, dẫn đến xung đột xã hội và kém hiệu quả về kinh tế.
  - Sự đa dạng về năng lực của con người đòi hỏi các chương trình đào tạo tiêu chuẩn hóa mà chỉ các cơ quan tập trung mới có thể cung cấp hiệu quả trên nhiều lĩnh vực kinh tế khác nhau.
  - Các nhà hoạch định trung ương thiếu khả năng thu thập dữ liệu đầy đủ để theo dõi tất cả các sở thích cá nhân và thay vào đó phải dựa vào các cuộc khảo sát thị trường.
explanation: |
  Văn bản này lập luận rằng sự hoàn thiện và tiến bộ của con người đòi hỏi tự do lao động bởi vì sự chỉ đạo tập trung vốn dĩ không thể đổi mới vượt ra ngoài những khuôn mẫu hiện có. Sự đa dạng về nhu cầu, khả năng và hoàn cảnh thay đổi của con người đòi hỏi sự linh hoạt mà chỉ tự do cá nhân mới có thể cung cấp. Kế hoạch hóa tập trung thất bại không phải do vấn đề cạnh tranh, yêu cầu đào tạo hay vấn đề dữ liệu, mà bởi vì về cơ bản nó không thể vượt qua các mô hình sản xuất đã biết để tạo ra các giải pháp mới.
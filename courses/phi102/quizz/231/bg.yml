question: Какво основно предизвикателство представлява разнообразието на човешките нужди, способности и обстоятелства за централизираното икономическо планиране според либералната икономическа теория?
answer: Централизираното ръководство може само да възпроизвежда известни производствени модели и не може да се адаптира към разнообразния и променящ се характер на индивидуалните възможности и пазарните изисквания
wrong_answers:
  - Централизираното планиране създава твърде голяма конкуренция между хората с различни умения, което води до социални конфликти и икономическа неефективност
  - Разнообразните човешки способности изискват стандартизирани програми за обучение, които само централизираните органи могат да предоставят ефективно в различните икономически сектори
  - Централните плановици не разполагат с достатъчно възможности за събиране на данни, за да наблюдават всички индивидуални предпочитания, и вместо това трябва да разчитат на пазарни проучвания
explanation: |
  В текста се твърди, че човешкото усъвършенстване и напредък изискват свобода на работа, тъй като централизираното ръководство по своята същност не може да въвежда иновации извън съществуващите модели. Разнообразието на човешките нужди, способности и променящи се обстоятелства изисква гъвкавост, която само индивидуалната свобода може да осигури. Централизираното планиране се проваля не поради проблеми с конкуренцията, изискванията за обучение или проблемите с данните, а защото по принцип не може да надхвърли познатите производствени схеми, за да създаде нови решения.
question: Quale sfida fondamentale pone la diversità dei bisogni, delle capacità e delle circostanze umane alla pianificazione economica centralizzata secondo la teoria economica liberale?
answer: La direzione centralizzata può solo riprodurre modelli di produzione noti e non può adattarsi alla natura diversa e mutevole delle capacità individuali e delle richieste del mercato
wrong_answers:
  - La pianificazione centralizzata crea un'eccessiva competizione tra individui con competenze diverse, portando a conflitti sociali e inefficienza economica
  - Le diverse abilità umane richiedono programmi di formazione standardizzati che solo le autorità centralizzate possono fornire in modo efficace nei diversi settori economici
  - I pianificatori centrali non hanno sufficienti capacità di raccolta dati per monitorare tutte le preferenze individuali e devono invece affidarsi alle indagini di mercato
explanation: |
  Il testo sostiene che la perfettibilità e il progresso umano richiedono la libertà di lavoro, perché la direzione centralizzata non è in grado di innovare oltre gli schemi esistenti. La diversità dei bisogni umani, delle capacità e delle circostanze mutevoli richiede la flessibilità che solo la libertà individuale può fornire. La pianificazione centralizzata fallisce non per problemi di concorrenza, di formazione o di dati, ma perché fondamentalmente non è in grado di superare gli schemi di produzione conosciuti per creare nuove soluzioni.
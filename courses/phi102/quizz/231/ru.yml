question: Какую фундаментальную проблему представляет собой разнообразие человеческих потребностей, способностей и обстоятельств для централизованного экономического планирования в соответствии с либеральной экономической теорией?
answer: Централизованное управление может лишь воспроизводить известные производственные схемы и не способно адаптироваться к разнообразным и меняющимся возможностям и требованиям рынка
wrong_answers:
  - Централизованное планирование создает слишком сильную конкуренцию между людьми с разными навыками, что приводит к социальным конфликтам и экономической неэффективности
  - Разнообразные способности людей требуют стандартизированных программ обучения, которые только централизованные органы власти могут эффективно обеспечить в различных секторах экономики
  - Центральные органы планирования не располагают достаточными возможностями для сбора данных, чтобы отслеживать все индивидуальные предпочтения, и вынуждены полагаться на рыночные исследования
explanation: |
  В тексте утверждается, что совершенствование и прогресс человечества требуют свободы труда, поскольку централизованное руководство по своей природе не может внедрять инновации, выходящие за рамки существующих моделей. Разнообразие человеческих потребностей, способностей и меняющихся обстоятельств требует гибкости, которую может обеспечить только свобода личности. Централизованное планирование терпит неудачу не из-за конкуренции, требований к обучению или проблем с данными, а потому, что оно принципиально не может выйти за рамки известных производственных схем и создать новые решения.
question: Minkä perustavanlaatuisen haasteen ihmisten tarpeiden, kykyjen ja olosuhteiden moninaisuus asettaa liberaalin talousteorian mukaiselle keskitetylle taloussuunnittelulle?
answer: Keskitetty ohjaus voi ainoastaan toistaa tunnettuja tuotantomalleja eikä se pysty mukautumaan yksilöllisten valmiuksien ja markkinoiden kysynnän monimuotoiseen ja muuttuvaan luonteeseen
wrong_answers:
  - Keskitetty suunnittelu luo liikaa kilpailua eri taitoja omaavien yksilöiden välille, mikä johtaa sosiaalisiin konflikteihin ja taloudelliseen tehottomuuteen
  - Monipuoliset inhimilliset kyvyt edellyttävät standardoituja koulutusohjelmia, joita vain keskitetyt viranomaiset voivat tarjota tehokkaasti eri talouden aloilla
  - Keskussuunnittelijoilla ei ole riittäviä tiedonkeruuvalmiuksia kaikkien yksilöllisten mieltymysten seuraamiseksi, ja heidän on sen sijaan turvauduttava markkinatutkimuksiin
explanation: |
  Tekstissä väitetään, että ihmisen täydellisyys ja edistys edellyttävät työn vapautta, koska keskitetty ohjaus ei luonnostaan pysty innovoimaan olemassa olevia malleja pidemmälle. Ihmisten tarpeiden, kykyjen ja muuttuvien olosuhteiden moninaisuus vaatii joustavuutta, jonka vain yksilön vapaus voi tarjota. Keskitetty suunnittelu ei epäonnistu kilpailukysymysten, koulutusvaatimusten tai tieto-ongelmien vuoksi vaan siksi, että se ei pohjimmiltaan kykene ylittämään tunnettuja tuotantosuunnitelmia uusien ratkaisujen luomiseksi.
question: Ni changamoto gani ya msingi ambayo utofauti wa mahitaji, uwezo, na hali za binadamu huleta katika mipango ya uchumi ya kati kulingana na nadharia ya uchumi huria?
answer: Mwelekeo wa kati unaweza tu kuzaliana mifumo inayojulikana ya uzalishaji na hauwezi kuzoea hali tofauti na inayobadilika ya uwezo wa mtu binafsi na mahitaji ya soko.
wrong_answers:
  - Kupanga mipango kwa pamoja huleta ushindani mkubwa kati ya watu wenye ujuzi tofauti, na kusababisha migogoro ya kijamii na ukosefu wa ufanisi wa kiuchumi.
  - Uwezo mbalimbali wa kibinadamu unahitaji programu sanifu za mafunzo ambazo mamlaka kuu pekee ndizo zinaweza kutoa kwa ufanisi katika sekta tofauti za kiuchumi.
  - Wapangaji wakuu hawana uwezo wa kutosha wa kukusanya data ili kufuatilia mapendeleo yote ya mtu binafsi na badala yake wanapaswa kutegemea tafiti za soko.
explanation: |
  Maandishi yanasema kwamba ukamilifu na maendeleo ya binadamu yanahitaji uhuru wa kufanya kazi kwa sababu mwelekeo wa kati kiasili hauwezi kuvumbua zaidi ya mifumo iliyopo. Utofauti wa mahitaji ya binadamu, uwezo, na hali zinazobadilika unahitaji kubadilika ambako uhuru wa mtu binafsi pekee unaweza kutoa. Kupanga kwa kati kunashindwa si kutokana na masuala ya ushindani, mahitaji ya mafunzo, au matatizo ya data, lakini kwa sababu kimsingi haiwezi kupita mipango inayojulikana ya uzalishaji ili kuunda suluhisho mpya.
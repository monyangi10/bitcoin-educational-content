question: Koji osnovni izazov raznolikost ljudskih potreba, sposobnosti i okolnosti predstavlja za centralizovano ekonomsko planiranje prema liberalnoj ekonomskoj teoriji?
answer: Centralizovano upravljanje može samo reprodukovati poznate obrasce proizvodnje i ne može se prilagoditi raznovrsnoj i promenljivoj prirodi individualnih sposobnosti i zahteva tržišta.
wrong_answers:
  - Centralizovano planiranje stvara previše konkurencije između pojedinaca sa različitim veštinama, što dovodi do socijalnih sukoba i ekonomske neefikasnosti.
  - Različite ljudske sposobnosti zahtevaju standardizovane programe obuke koje samo centralizovane vlasti mogu efikasno pružiti u različitim ekonomskim sektorima.
  - Centralni planeri nemaju dovoljno kapaciteta za prikupljanje podataka kako bi pratili sve individualne preferencije i moraju se osloniti na istraživanja tržišta umesto toga.
explanation: |
  Tekst tvrdi da ljudska savršenost i napredak zahtevaju slobodu rada jer centralizovano upravljanje inherentno ne može inovirati izvan postojećih obrazaca. Raznolikost ljudskih potreba, sposobnosti i promenljivih okolnosti zahteva fleksibilnost koju samo individualna sloboda može pružiti. Centralizovano planiranje ne uspeva ne zbog problema konkurencije, zahteva za obukom ili problema sa podacima, već zato što fundamentalno ne može prevazići poznate proizvodne šeme kako bi stvorilo nova rešenja.
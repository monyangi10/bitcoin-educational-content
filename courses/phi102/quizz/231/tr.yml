question: Liberal ekonomi teorisine göre insan ihtiyaçlarının, yeteneklerinin ve koşullarının çeşitliliği merkezi ekonomik planlama için hangi temel zorluğu oluşturmaktadır?
answer: Merkezi yönetim sadece bilinen üretim kalıplarını yeniden üretebilir ve bireysel yeteneklerin ve pazar taleplerinin çeşitli ve değişen doğasına uyum sağlayamaz
wrong_answers:
  - Merkezi planlama, farklı becerilere sahip bireyler arasında çok fazla rekabet yaratarak sosyal çatışma ve ekonomik verimsizliğe yol açar
  - Farklı insan becerileri, yalnızca merkezi otoritelerin farklı ekonomik sektörlerde etkili bir şekilde sağlayabileceği standart eğitim programları gerektirir
  - Merkezi planlamacılar tüm bireysel tercihleri izlemek için yeterli veri toplama kapasitesinden yoksundur ve bunun yerine piyasa araştırmalarına güvenmek zorundadır
explanation: |
  Metin, insanın mükemmelleştirilebilirliğinin ve ilerlemesinin çalışma özgürlüğünü gerektirdiğini, çünkü merkezi yönetimin doğası gereği mevcut kalıpların ötesinde yenilik yapamayacağını savunmaktadır. İnsan ihtiyaçlarının, yeteneklerinin ve değişen koşulların çeşitliliği, yalnızca bireysel özgürlüğün sağlayabileceği esnekliği talep etmektedir. Merkezi planlama rekabet sorunları, eğitim gereksinimleri veya veri sorunları nedeniyle değil, temelde yeni çözümler yaratmak için bilinen üretim şemalarının ötesine geçemediği için başarısız olur.
question: Que desafio fundamental coloca a diversidade das necessidades, capacidades e circunstâncias humanas ao planeamento económico centralizado, de acordo com a teoria económica liberal?
answer: A direção centralizada só pode reproduzir padrões de produção conhecidos e não pode adaptar-se à natureza diversa e mutável das capacidades individuais e das exigências do mercado
wrong_answers:
  - O planeamento centralizado cria demasiada concorrência entre indivíduos com diferentes competências, conduzindo a conflitos sociais e à ineficiência económica
  - As diversas capacidades humanas requerem programas de formação padronizados que só as autoridades centralizadas podem fornecer eficazmente nos diferentes sectores económicos
  - Os planeadores centrais não dispõem de capacidades suficientes de recolha de dados para monitorizar todas as preferências individuais e têm de recorrer a inquéritos de mercado
explanation: |
  O texto argumenta que a perfetibilidade e o progresso humanos requerem liberdade de trabalho porque a direção centralizada não pode, por inerência, inovar para além dos padrões existentes. A diversidade das necessidades humanas, das capacidades e das circunstâncias em mudança exige a flexibilidade que só a liberdade individual pode proporcionar. O planeamento centralizado falha não devido a questões de concorrência, requisitos de formação ou problemas de dados, mas porque fundamentalmente não consegue transcender os esquemas de produção conhecidos para criar novas soluções.
question: 자유주의적 분석은 공유된 언어, 문화 또는 역사와 같은 민족 통합에 대한 전통적인 정당성에서 어떤 근본적인 결함을 발견합니까?
answer: 이러한 정당화는 역사적으로 부정확한 구실로, 진정한 문화적 친밀감보다는 고객층을 확대하려는 통치자들의 정치적 확장을 감추기 위한 것입니다
wrong_answers:
  - 상호 보완적인 자원과 무역 기회를 가진 지역 간의 자연스러운 경제 협력을 막는 인위적인 장벽을 만듭니다
  - 과도한 민주적 참여로 이어져 문화적 문제에서 소수가 다수결의 지배를 받음으로써 개인의 자유를 훼손합니다
  - 이들은 시간이 지남에 따라 평화로운 정치 발전과 제도 개혁을 사실상 불가능하게 만드는 경직된 헌법적 틀을 확립합니다
explanation: |
  이 텍스트는 언어, 문화, 역사 등 국가 통합에 대한 전통적인 정당화는 '공정한 분석에 저항하지 않는다'고 명시하고 있습니다 역사적 증거에 따르면 전쟁과 영토 확장은 언어적 또는 문화적 유사성이 아니라 권력자의 정치적 고객 확장 기회에 따라 발생했습니다. 식민지화 운동은 언어나 문화의 통일성을 고려하지 않은 정치적 고객 확장을 완벽하게 보여주며, 이러한 정당성이 권력 공고화를 위한 구실에 불과하다는 것을 드러냅니다.
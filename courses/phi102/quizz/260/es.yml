question: ¿Qué defecto fundamental identifica el análisis liberal en las justificaciones tradicionales de la unidad nacional, como la lengua, la cultura o la historia compartidas?
answer: Estas justificaciones son pretextos históricamente inexactos que enmascaran una expansión política impulsada por gobernantes que buscan ampliar su clientela y no auténticas afinidades culturales
wrong_answers:
  - Crean barreras artificiales que impiden la cooperación económica natural entre regiones con recursos y oportunidades comerciales complementarios
  - Conducen a una participación democrática excesiva que socava la libertad individual al someter a las minorías a la regla de la mayoría en materia cultural
  - Establecen marcos constitucionales rígidos que hacen prácticamente imposible la evolución política pacífica y la reforma institucional a lo largo del tiempo
explanation: |
  El texto afirma explícitamente que las justificaciones tradicionales de la unidad nacional como la lengua, la cultura o la historia "no resisten un análisis imparcial" Las pruebas históricas demuestran que las guerras y la expansión territorial no se produjeron en función de afinidades lingüísticas o culturales, sino en función de las oportunidades de expansión de la clientela política de quienes detentaban el poder. El movimiento de colonización ilustra perfectamente esta expansión de la clientela política sin ninguna consideración por la unidad de lengua o cultura, revelando estas justificaciones como meros pretextos para la consolidación del poder.
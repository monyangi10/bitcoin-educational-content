question: Какъв фундаментален недостатък открива либералният анализ в традиционните основания за национално единство като общ език, култура или история?
answer: Тези оправдания са исторически неточни претексти, които прикриват политическа експанзия, водена от владетели, стремящи се да разширят клиентелата си, а не от истинска културна близост
wrong_answers:
  - Те създават изкуствени бариери, които възпрепятстват естественото икономическо сътрудничество между региони с допълващи се ресурси и възможности за търговия
  - Те водят до прекомерно демократично участие, което подкопава личната свобода, като подчинява малцинствата на управлението на мнозинството в областта на културата
  - Те установяват твърди конституционни рамки, които правят мирната политическа еволюция и институционалната реформа практически невъзможни с течение на времето
explanation: |
  В текста изрично се посочва, че традиционните основания за национално единство като език, култура или история "не издържат на безпристрастен анализ" Историческите данни показват, че войните и териториалното разширяване са се случвали не въз основа на езикова или културна близост, а в зависимост от възможностите за разширяване на политическата клиентела на управляващите. Движението за колонизация отлично илюстрира това разширяване на политическата клиентела без оглед на езиковото или културното единство, разкривайки тези оправдания като обикновен претекст за укрепване на властта.
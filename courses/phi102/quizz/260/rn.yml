question: Ni irihe kosa ry’ishimikiro isesengura ry’ubwigenge rigaragaza mu mpamvu z’imigenzo zishingira intahe ubumwe bw’igihugu nk’ururimi rusangi, umuco canke amateka?
answer: Ivyo vyiyumviro ni ivyiyumviro bitari vyo mu mateka bipfuka ukwaguka kwa politike guterwa n’abategetsi barondera kwagura abaguzi babo aho gupfuka ubucuti nyakuri bw’imico kama .
wrong_answers:
  - Bituma habaho intambamyi z’ubuhinga zibuza ubufatanye bw’ubutunzi busanzwe hagati y’uturere dufise ubutunzi bufashanya n’amahirwe yo gucuruza .
  - Bituma abantu bagira uruhara mu buryo bwa demokarasi birenze urugero bihungabanya umwidegemvyo w’umuntu ku giti ciwe mu gutuma abantu batobato baganzwa n’abantu benshi mu bijanye n’imico kama .
  - Bashiraho ingingo ngenderwako zikomeye zituma ugutera imbere mu vya politike mu mahoro no guhindura inzego z’ubutegetsi bidashoboka uko igihe kigenda kirarenga .
explanation: |
  Ico canditswe kivuga neza yuko imvo z'imigenzo zituma haba ubumwe bw'igihugu nk'ururimi, umuco canke amateka 'zitarwanya ugusuzuma ata n'umwe abogamiye.' Ivyemezo vy’amateka vyerekana ko intambara n’ukwaguka kw’intara vyabaye bitashingiye ku rurimi canke ku mico kama, ahubwo bishingiye ku mahirwe yo kwagura abakiriya ba politike n’abafise ububasha. Umuhari w’abakoloni ugaragaza neza ukwo kwaguka kw’abaguzi ba politike ataco kwiyumvira ku bumwe bw’ururimi canke umuco, ugahishura ivyo vyiyumviro nk’ibirego gusa vyo gukomeza ubutegetsi.
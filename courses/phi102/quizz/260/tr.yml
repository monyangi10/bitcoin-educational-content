question: Liberal analiz, ulusal birliğin ortak dil, kültür veya tarih gibi geleneksel gerekçelerinde hangi temel kusuru tespit etmektedir?
answer: Bu gerekçeler, gerçek kültürel yakınlıklardan ziyade, müşteri kitlesini genişletmek isteyen yöneticiler tarafından yönlendirilen siyasi yayılmayı maskeleyen tarihsel olarak yanlış bahanelerdir
wrong_answers:
  - Birbirini tamamlayan kaynaklara ve ticaret fırsatlarına sahip bölgeler arasında doğal ekonomik işbirliğini engelleyen yapay bariyerler oluştururlar
  - Kültürel konularda azınlıkları çoğunluk yönetimine tabi kılarak bireysel özgürlüğün altını oyan aşırı demokratik katılıma yol açarlar
  - Barışçıl siyasi evrimi ve kurumsal reformu zaman içinde neredeyse imkansız hale getiren katı anayasal çerçeveler oluştururlar
explanation: |
  Metinde ulusal birlik için dil, kültür ya da tarih gibi geleneksel gerekçelerin 'tarafsız analize direnemediği' açıkça belirtilmektedir Tarihsel kanıtlar, savaşların ve toprak genişlemelerinin dilsel ya da kültürel yakınlıklara göre değil, iktidardakilerin siyasi müşteri kitlelerini genişletme fırsatlarına göre gerçekleştiğini göstermektedir. Sömürgeleştirme hareketi, dil ya da kültür birliğini dikkate almaksızın siyasi müşteri kitlesinin genişlemesini mükemmel bir şekilde göstermekte ve bu gerekçelerin iktidarın pekiştirilmesi için sadece bahane olduğunu ortaya koymaktadır.
question: Welchen grundlegenden Fehler stellt die liberale Analyse in den traditionellen Begründungen für die nationale Einheit wie gemeinsame Sprache, Kultur oder Geschichte fest?
answer: Diese Rechtfertigungen sind historisch ungenaue Vorwände, hinter denen sich eine politische Expansion verbirgt, die eher von Herrschern vorangetrieben wird, die ihre Klientel vergrößern wollen, als von echten kulturellen Affinitäten
wrong_answers:
  - Sie schaffen künstliche Barrieren, die eine natürliche wirtschaftliche Zusammenarbeit zwischen Regionen mit komplementären Ressourcen und Handelsmöglichkeiten verhindern
  - Sie führen zu einer übermäßigen demokratischen Beteiligung, die die individuelle Freiheit untergräbt, indem sie Minderheiten in kulturellen Angelegenheiten der Mehrheitsregel unterwirft
  - Sie schaffen einen starren verfassungsrechtlichen Rahmen, der eine friedliche politische Entwicklung und institutionelle Reformen im Laufe der Zeit praktisch unmöglich macht
explanation: |
  In dem Text heißt es ausdrücklich, dass traditionelle Begründungen für die nationale Einheit wie Sprache, Kultur oder Geschichte "einer unparteiischen Analyse nicht standhalten" Historische Belege zeigen, dass Kriege und territoriale Expansion nicht auf der Grundlage sprachlicher oder kultureller Affinitäten stattfanden, sondern je nach den Möglichkeiten der Machthaber, ihre politische Klientel zu erweitern. Die Kolonisierungsbewegung ist ein perfektes Beispiel für die Ausweitung der politischen Klientel ohne Rücksicht auf die Einheit von Sprache und Kultur, was diese Rechtfertigungen als bloße Vorwände für die Konsolidierung der Macht entlarvt.
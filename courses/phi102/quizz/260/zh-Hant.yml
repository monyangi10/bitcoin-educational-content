question: 自由派的分析在傳統的民族統一理據（如共同語言、文化或歷史）中找出了什麼根本性的缺陷？
answer: 這些理由都是不符合歷史的藉口，掩蓋了統治者為了擴大其客戶群所推動的政治擴張，而非真正的文化親和力。
wrong_answers:
  - 它們製造了人為的障礙，妨礙了資源與貿易機會互補的地區之間的自然經濟合作。
  - 它們導致過度的民主參與，在文化事務上讓少數人接受多數人的統治，因而損害個人自由。
  - 它們建立了僵化的憲法框架，使得和平的政治演變和制度改革幾乎不可能隨著時間的推移而進行
explanation: |
  文中明確指出，語言、文化或歷史等傳統的民族統一理由「經不起公正的分析」。歷史證據顯示，戰爭和領土擴張的發生並非基於語言或文化的親疏，而是基於當權者擴張政治客戶群的機會。殖民運動完美地說明了這種政治客戶的擴張，完全沒有考慮到語言或文化的統一性，揭示了這些理由只是鞏固權力的藉口。
question: Koji fundamentalni nedostatak liberalna analiza identifikuje u tradicionalnim opravdanjima za nacionalno jedinstvo kao što su zajednički jezik, kultura ili istorija?
answer: Opravdanja su istorijski netačni izgovori koji prikrivaju političku ekspanziju vođenu od strane vladara koji žele da prošire svoju klijentelu, a ne istinske kulturne afinitete.
wrong_answers:
  - Oni stvaraju veštačke barijere koje sprečavaju prirodnu ekonomsku saradnju između regiona sa komplementarnim resursima i trgovinskim prilikama
  - Oni dovode do prekomernog demokratskog učešća koje podriva individualnu slobodu podvrgavanjem manjina vladavini većine u kulturnim pitanjima.
  - Oni uspostavljaju rigidne ustavne okvire koji čine mirnu političku evoluciju i institucionalnu reformu praktično nemogućom tokom vremena.
explanation: |
  Tekst eksplicitno navodi da tradicionalna opravdanja za nacionalno jedinstvo poput jezika, kulture ili istorije 'ne odolevaju nepristrasnoj analizi.' Istorijski dokazi pokazuju da su ratovi i teritorijalna ekspanzija nastajali ne na osnovu jezičkih ili kulturnih srodnosti, već prema prilikama za širenje političke klijentele od strane onih na vlasti. Pokret kolonizacije savršeno ilustruje ovo širenje političke klijentele bez ikakvog razmatranja jedinstva jezika ili kulture, otkrivajući ova opravdanja kao puke izgovore za konsolidaciju moći.
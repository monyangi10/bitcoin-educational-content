question: Que falha fundamental identifica a análise liberal nas justificações tradicionais para a unidade nacional, como a língua, a cultura ou a história partilhadas?
answer: Estas justificações são pretextos historicamente imprecisos que encobrem uma expansão política impulsionada por governantes que procuram alargar a sua clientela e não por afinidades culturais genuínas
wrong_answers:
  - Criam barreiras artificiais que impedem a cooperação económica natural entre regiões com recursos e oportunidades comerciais complementares
  - Conduzem a uma participação democrática excessiva que mina a liberdade individual ao submeter as minorias à regra da maioria em questões culturais
  - Estabelecem quadros constitucionais rígidos que tornam praticamente impossível uma evolução política pacífica e uma reforma institucional ao longo do tempo
explanation: |
  O texto afirma explicitamente que as justificações tradicionais para a unidade nacional, como a língua, a cultura ou a história, "não resistem a uma análise imparcial" As evidências históricas mostram que as guerras e a expansão territorial ocorreram não com base em afinidades linguísticas ou culturais, mas de acordo com as oportunidades de expansão da clientela política dos detentores do poder. O movimento de colonização ilustra perfeitamente esta expansão de clientelas políticas sem qualquer consideração pela unidade da língua ou da cultura, revelando que estas justificações são meros pretextos para a consolidação do poder.
question: تحلیل لیبرال چه نقص اساسی را در توجیهات سنتی برای وحدت ملی مانند زبان، فرهنگ یا تاریخ مشترک شناسایی می‌کند؟
answer: این توجیهات بهانه‌های تاریخی نادرستی هستند که گسترش سیاسی را پنهان می‌کنند، گسترشی که توسط حاکمانی هدایت می‌شود که به دنبال افزایش مشتریان خود هستند نه وابستگی‌های فرهنگی واقعی.
wrong_answers:
  - آن‌ها موانع مصنوعی ایجاد می‌کنند که از همکاری اقتصادی طبیعی بین مناطقی با منابع مکمل و فرصت‌های تجاری جلوگیری می‌کند.
  - آنها منجر به مشارکت دموکراتیک بیش از حد می‌شوند که آزادی فردی را با تحت سلطه قرار دادن اقلیت‌ها به حکومت اکثریت در مسائل فرهنگی تضعیف می‌کند.
  - آن‌ها چارچوب‌های قانون اساسی سخت‌گیرانه‌ای را ایجاد می‌کنند که تحول سیاسی مسالمت‌آمیز و اصلاح نهادی را در طول زمان عملاً غیرممکن می‌سازد.
explanation: |
  متن به‌طور صریح بیان می‌کند که توجیهات سنتی برای وحدت ملی مانند زبان، فرهنگ یا تاریخ «در برابر تحلیل بی‌طرفانه مقاومت نمی‌کنند.» شواهد تاریخی نشان می‌دهند که جنگ‌ها و گسترش سرزمینی نه بر اساس وابستگی‌های زبانی یا فرهنگی، بلکه بر اساس فرصت‌های گسترش مشتریان سیاسی توسط کسانی که در قدرت بودند، رخ داده‌اند. جنبش استعمار به‌طور کامل این گسترش مشتریان سیاسی را بدون هیچ‌گونه توجه به وحدت زبان یا فرهنگ نشان می‌دهد و این توجیهات را به‌عنوان بهانه‌هایی صرف برای تحکیم قدرت آشکار می‌سازد.
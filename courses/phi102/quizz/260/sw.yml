question: Ni dosari gani ya msingi ambayo uchambuzi wa kiliberali hutambua katika uhalalishaji wa kitamaduni wa umoja wa kitaifa kama vile lugha, utamaduni, au historia ya pamoja?
answer: Uhalalishaji huu ni visingizio visivyo sahihi kihistoria vinavyoficha upanuzi wa kisiasa unaoendeshwa na watawala wanaotaka kupanua wateja wao badala ya mishikamano halisi ya kitamaduni.
wrong_answers:
  - Wanaunda vikwazo bandia vinavyozuia ushirikiano wa kiuchumi wa asili kati ya maeneo yenye rasilimali zinazosaidiana na fursa za biashara
  - Zinasababisha ushiriki mkubwa wa kidemokrasia unaodhoofisha uhuru wa mtu binafsi kwa kuwaweka wachache chini ya utawala wa walio wengi katika masuala ya kitamaduni.
  - Wanaanzisha mifumo thabiti ya kikatiba ambayo hufanya mageuzi ya kisiasa ya amani na mageuzi ya kitaasisi kuwa vigumu kwa muda mrefu.
explanation: |
  Maandishi yanasema waziwazi kwamba uhalalishaji wa kitamaduni kwa umoja wa kitaifa kama vile lugha, utamaduni, au historia 'haupingi uchambuzi usioegemea upande wowote.' Ushahidi wa kihistoria unaonyesha vita na upanuzi wa eneo ulitokea sio kwa kuzingatia mishikamano ya lugha au kitamaduni, bali kulingana na fursa za upanuzi wa wateja wa kisiasa na wale walio madarakani. Harakati za ukoloni zinaonyesha kikamilifu upanuzi huu wa wateja wa kisiasa bila kuzingatia umoja wa lugha au utamaduni, zikifichua uhalalishaji huu kama visingizio tu vya kuimarisha mamlaka.
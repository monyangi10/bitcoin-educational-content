question: Millist fundamentaalset viga tuvastab liberaalne analüüs traditsioonilistes rahvusliku ühtsuse õigustustes, nagu ühine keel, kultuur või ajalugu?
answer: Need põhjendused on ajalooliselt ebatäpsed ettekäänded, mis varjavad poliitilist ekspansiooni, mille taga on pigem valitsejad, kes püüavad laiendada oma klientuuri, kui tõelised kultuurilised sugulussuhted
wrong_answers:
  - Nad loovad kunstlikke tõkkeid, mis takistavad loomulikku majanduskoostööd üksteist täiendavate ressursside ja kauplemisvõimalustega piirkondade vahel
  - Need viivad ülemäärase demokraatliku osalemiseni, mis õõnestab individuaalset vabadust, allutades vähemused kultuuriküsimustes enamuse valitsemisele
  - Nad kehtestavad jäigad põhiseaduslikud raamistikud, mis muudavad rahumeelse poliitilise arengu ja institutsioonilised reformid aja jooksul praktiliselt võimatuks
explanation: |
  Tekstis märgitakse selgesõnaliselt, et traditsioonilised rahvusliku ühtsuse põhjendused, nagu keel, kultuur või ajalugu, "ei pea vastu erapooletule analüüsile" Ajaloolised tõendid näitavad, et sõjad ja territoriaalne laienemine ei toimunud mitte keeleliste või kultuuriliste suguluste alusel, vaid vastavalt võimulolijate poliitilistele kliendipiiride laienemise võimalustele. Kolonisatsiooniliikumine illustreerib suurepäraselt seda poliitilise klientuuri laienemist ilma keele või kultuuri ühtsust arvestamata, paljastades need õigustused pelgalt ettekäändena võimu kindlustamiseks.
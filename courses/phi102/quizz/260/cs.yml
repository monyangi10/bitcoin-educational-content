question: Jaký zásadní nedostatek liberální analýza identifikuje v tradičních ospravedlněních národní jednoty, jako je společný jazyk, kultura nebo historie?
answer: Tato zdůvodnění jsou historicky nepřesné záminky, za nimiž se skrývá politická expanze, kterou vedou spíše vládci usilující o rozšíření své klientely než skutečná kulturní spřízněnost
wrong_answers:
  - Vytvářejí umělé překážky, které brání přirozené hospodářské spolupráci mezi regiony s doplňkovými zdroji a obchodními příležitostmi
  - Vedou k nadměrné demokratické účasti, která podkopává svobodu jednotlivce tím, že v kulturních otázkách podřizuje menšiny vládě většiny
  - Vytvářejí rigidní ústavní rámce, které prakticky znemožňují mírový politický vývoj a institucionální reformy v průběhu času
explanation: |
  V textu se výslovně uvádí, že tradiční ospravedlnění národní jednoty, jako je jazyk, kultura nebo historie, "neodolají nestranné analýze" Historické důkazy ukazují, že k válkám a územní expanzi nedocházelo na základě jazykové nebo kulturní příbuznosti, ale podle možností rozšiřování politické klientely těch, kdo jsou u moci. Kolonizační hnutí dokonale ilustruje toto rozšiřování politické klientely bez ohledu na jazykovou nebo kulturní jednotu a odhaluje tato zdůvodnění jako pouhé záminky k upevnění moci.
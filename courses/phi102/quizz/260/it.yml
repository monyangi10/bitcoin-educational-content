question: Quale difetto fondamentale l'analisi liberale individua nelle giustificazioni tradizionali dell'unità nazionale, come la condivisione della lingua, della cultura o della storia?
answer: Queste giustificazioni sono pretesti storicamente inaccurati che nascondono un'espansione politica guidata da governanti che cercano di allargare la propria clientela piuttosto che vere e proprie affinità culturali
wrong_answers:
  - Creano barriere artificiali che impediscono la naturale cooperazione economica tra regioni con risorse e opportunità commerciali complementari
  - Portano a un'eccessiva partecipazione democratica che mina la libertà individuale sottoponendo le minoranze al dominio della maggioranza nelle questioni culturali
  - Stabiliscono quadri costituzionali rigidi che rendono praticamente impossibile un'evoluzione politica pacifica e una riforma istituzionale nel tempo
explanation: |
  Il testo afferma esplicitamente che le giustificazioni tradizionali dell'unità nazionale, come la lingua, la cultura o la storia, "non resistono a un'analisi imparziale" Le prove storiche dimostrano che le guerre e l'espansione territoriale non si sono basate su affinità linguistiche o culturali, ma sulle opportunità di espansione della clientela politica da parte di chi detiene il potere. Il movimento di colonizzazione illustra perfettamente questa espansione della clientela politica senza alcuna considerazione per l'unità di lingua o cultura, rivelando queste giustificazioni come meri pretesti per il consolidamento del potere.
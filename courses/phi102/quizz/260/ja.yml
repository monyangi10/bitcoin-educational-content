question: リベラル派の分析は、言語や文化、歴史の共有といった伝統的な国民統合の正当化に、どのような根本的な欠陥があると指摘しているのか。
answer: これらの正当化は歴史的に不正確な口実であり、真の文化的親和性よりもむしろ、顧客を拡大しようとする支配者による政治的拡大を覆い隠している。
wrong_answers:
  - 人為的な障壁を作り出し、資源や取引機会を補完し合う地域間の自然な経済協力を妨げている。
  - 過剰な民主主義への参加は、文化的な問題においてマイノリティを多数決に従わせることで、個人の自由を損なう。
  - 平和的な政治的進化や制度改革を実質的に不可能にする硬直的な憲法の枠組みを確立している。
explanation: |
  この文章は、言語、文化、歴史といった伝統的な国民統合の正当化は、『公平な分析には耐えられない』と明言している。歴史的な証拠によれば、戦争や領土の拡大は、言語的・文化的な親和性に基づいて起こったのではなく、権力者による政治的顧客の拡大の機会に従って起こったのである。植民地化運動は、言語や文化の統一性をまったく考慮することなく政治的顧客を拡大することを見事に示しており、これらの正当化は権力強化のための単なる口実であることを明らかにしている。
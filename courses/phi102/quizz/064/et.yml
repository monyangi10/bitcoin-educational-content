question: Milline põhimõtteline muutus eristas varaseid põllumajanduslikke ühiskondi küttide-kogerijate ühiskondadest?
answer: Nad lõid ületootmist, selle asemel, et lihtsalt ressursse oma keskkonnast välja võtta
wrong_answers:
  - Nad arendasid oma elanikkonna jaoks välja kirjakeele ja ametliku haridussüsteemi
  - Nad kehtestasid demokraatlikud valitsused koos valitud juhtide ja esinduskogudega
  - Nad ehitasid püsivaid kivikonstruktsioone ja töötasid välja täiustatud metallurgiatehnika
explanation: |
  Õige vastus määratleb peamise majandusliku muutuse kaevandamisest tootmisse. Varased põllumajandusühiskonnad tegid inimkonna arengus revolutsiooni, kuna nad tekitasid põllu- ja loomakasvatuse kaudu ülejääki, tekitades rohkem ressursse, kui nad tarbisid. See vastandub küttide ja kogujate ühiskonnale, mis tuginesid hävitamismajandusele - võttes olemasolevaid ressursse küttimise, kalapüügi ja kogumise kaudu, ilma et oleks loodud uut jõukust. Valed vastused kirjeldavad arenguid, mis toimusid inimkonna ajaloos palju hiljem ja mis ei olnud nende varajaste ühiskonnatüüpide põhiline eristav tegur.
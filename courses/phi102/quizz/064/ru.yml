question: Какое фундаментальное изменение отличало ранние сельскохозяйственные общества от обществ охотников-собирателей?
answer: Они создавали избыточное производство, а не просто извлекали ресурсы из окружающей среды
wrong_answers:
  - Они создали письменность и системы формального образования для своего населения
  - Они создали демократические правительства с выборными лидерами и представительными собраниями
  - Они строили постоянные каменные сооружения и развивали передовые методы металлургии
explanation: |
  В правильном ответе названа ключевая экономическая трансформация от добычи к производству. Ранние сельскохозяйственные общества произвели революцию в развитии человечества, создавая излишки за счет земледелия и животноводства, создавая больше ресурсов, чем потребляя. Это контрастирует с обществами охотников-собирателей, которые полагались на экономику разрушения, т.е. брали существующие ресурсы с помощью охоты, рыбалки и собирательства, не создавая новых богатств. Неправильные ответы описывают события, которые произошли гораздо позже в истории человечества и не были основополагающим фактором, отличающим эти ранние типы обществ.
question: Vilken grundläggande förändring skilde de tidiga jordbrukssamhällena från jägar- och samlarsamhällena?
answer: De skapade överskottsproduktion snarare än att bara utvinna resurser från sin omgivning
wrong_answers:
  - De utvecklade skriftspråk och formella utbildningssystem för sina befolkningar
  - De etablerade demokratiska regeringar med valda ledare och representativa församlingar
  - De byggde permanenta stenkonstruktioner och utvecklade avancerade metallurgiska tekniker
explanation: |
  Rätt svar identifierar den viktigaste ekonomiska omvandlingen från utvinning till produktion. De tidiga jordbrukssamhällena revolutionerade den mänskliga utvecklingen genom att generera överskott genom jordbruk och boskapsskötsel, vilket skapade mer resurser än de förbrukade. Detta står i kontrast till jägar- och samlarsamhällen som förlitade sig på förstörelseekonomier - att ta befintliga resurser genom jakt, fiske och insamling utan att skapa ny rikedom. De felaktiga svaren beskriver en utveckling som kom mycket senare i mänsklighetens historia och som inte var den grundläggande särskiljande faktorn mellan dessa tidiga samhällstyper.
question: 早期農業社會與狩獵-採集社會的區別在於什麼根本性的改變？
answer: 他們創造了剩餘生產，而不只是從環境中攫取資源
wrong_answers:
  - 他們為自己的人民發展了書面語言和正規教育系統
  - 他們建立了民主政府，由選舉產生的領袖和代議會組成
  - 他們建造了永久性的石造建築，並發展了先進的冶金技術
explanation: |
  正確答案指出了從採掘到生產的關鍵經濟轉型。早期的農業社會透過耕作和畜牧產生盈餘，創造的資源多於消耗的資源，為人類發展帶來革命性的改變。這與狩獵-採集社會形成了對比，狩獵-採集社會依賴破壞經濟-通過狩獵、捕魚和採集獲取現有資源，而不創造新財富。錯誤的答案描述的是人類歷史上更晚期的發展，並非這些早期社會類型的根本區別因素。
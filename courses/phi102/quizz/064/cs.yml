question: Jaká zásadní změna odlišila rané zemědělské společnosti od společností lovců a sběračů?
answer: Vytvářeli nadprodukci, nikoliv pouze těžili zdroje ze svého okolí
wrong_answers:
  - Pro své obyvatelstvo vytvořily spisovný jazyk a formální vzdělávací systémy
  - Založili demokratické vlády s volenými vůdci a zastupitelskými sbory
  - Stavěli trvalé kamenné stavby a vyvinuli pokročilé metalurgické techniky
explanation: |
  Správná odpověď identifikuje klíčovou ekonomickou transformaci od těžby k výrobě. Rané zemědělské společnosti způsobily revoluci v rozvoji lidstva tím, že vytvářely přebytky prostřednictvím zemědělství a chovu dobytka a vytvářely více zdrojů, než spotřebovávaly. To kontrastuje se společnostmi lovců a sběračů, které se spoléhaly na destrukční ekonomiku - využívaly existující zdroje prostřednictvím lovu, rybolovu a sběru, aniž by vytvářely nové bohatství. Špatné odpovědi popisují vývoj, který přišel mnohem později v historii lidstva a nebyl základním rozlišovacím faktorem mezi těmito ranými typy společností.
question: Welche grundlegende Veränderung unterscheidet die frühen Agrargesellschaften von den Jäger- und Sammlergesellschaften?
answer: Sie schufen eine Überschussproduktion, anstatt einfach nur Ressourcen aus ihrer Umgebung zu entnehmen
wrong_answers:
  - Sie entwickelten eine Schriftsprache und formale Bildungssysteme für ihre Bevölkerungen
  - Sie setzten demokratische Regierungen mit gewählten Führern und repräsentativen Versammlungen ein
  - Sie errichteten dauerhafte Steinbauten und entwickelten fortschrittliche Metallurgietechniken
explanation: |
  Die richtige Antwort nennt den entscheidenden wirtschaftlichen Wandel von der Gewinnung zur Produktion. Die frühen Agrargesellschaften revolutionierten die menschliche Entwicklung, indem sie durch Ackerbau und Viehzucht Überschüsse erwirtschafteten und mehr Ressourcen schufen als sie verbrauchten. Dies steht im Gegensatz zu den Jäger- und Sammlergesellschaften, die sich auf die Zerstörungswirtschaft stützten - sie nutzten die vorhandenen Ressourcen durch Jagen, Fischen und Sammeln, ohne neuen Wohlstand zu schaffen. Die falschen Antworten beschreiben Entwicklungen, die erst viel später in der Menschheitsgeschichte auftraten und nicht das grundlegende Unterscheidungsmerkmal zwischen diesen frühen Gesellschaftstypen waren.
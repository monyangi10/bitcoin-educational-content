question: چه تغییر بنیادی، جوامع کشاورزی اولیه را از جوامع شکارچی-گردآورنده متمایز کرد؟
answer: آن‌ها تولید مازاد ایجاد کردند به جای اینکه فقط منابع را از محیط خود استخراج کنند.
wrong_answers:
  - آنها زبان نوشتاری و سیستم‌های آموزش رسمی را برای جمعیت‌های خود توسعه دادند.
  - آن‌ها دولت‌های دموکراتیک با رهبران منتخب و مجامع نمایندگی تأسیس کردند.
  - آن‌ها سازه‌های سنگی دائمی ساختند و تکنیک‌های پیشرفته متالورژی را توسعه دادند.
explanation: |
  پاسخ صحیح، تحول اقتصادی کلیدی از استخراج به تولید را شناسایی می‌کند. جوامع کشاورزی اولیه با تولید مازاد از طریق کشاورزی و دامداری، توسعه انسانی را متحول کردند و منابع بیشتری نسبت به مصرف خود ایجاد کردند. این در تضاد با جوامع شکارچی-گردآورنده است که به اقتصادهای تخریبی متکی بودند - با شکار، ماهیگیری و گردآوری منابع موجود بدون ایجاد ثروت جدید. پاسخ‌های نادرست، تحولاتی را توصیف می‌کنند که بسیار دیرتر در تاریخ بشر رخ دادند و عامل تمایز اساسی بین این انواع اولیه جوامع نبودند.
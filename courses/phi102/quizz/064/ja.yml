question: 初期の農耕社会と狩猟採集社会を区別した根本的な変化は何か？
answer: 環境から資源を採取するだけでなく、余剰生産を生み出した。
wrong_answers:
  - 彼らは自国民のために文字による言語と正式な教育制度を発展させた。
  - 選挙で選ばれた指導者と代表的な議会を持つ民主的な政府を樹立した。
  - 彼らは恒久的な石造りの建造物を建設し、高度な冶金技術を開発した。
explanation: |
  正解は、採掘から生産への重要な経済転換を示すものである。初期の農耕社会は、農耕や畜産によって余剰を生み出し、消費した以上の資源を生み出すことで、人類の発展に革命をもたらした。これは、狩猟採集社会が破壊経済に頼っていたのとは対照的で、新たな富を生み出すことなく、狩猟、漁労、採集によって既存の資源を利用していた。間違った答えは、人類史のはるか後期に起こった発展について述べたものであり、これらの初期の社会タイプを区別する基本的な要因ではなかった。
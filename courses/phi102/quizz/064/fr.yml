question: Quel changement fondamental a distingué les premières sociétés agricoles des sociétés de chasseurs-cueilleurs ?
answer: Ils ont créé une production excédentaire au lieu de se contenter d'extraire les ressources de leur environnement
wrong_answers:
  - Ils ont développé une langue écrite et des systèmes d'éducation formelle pour leurs populations
  - Ils ont mis en place des gouvernements démocratiques avec des dirigeants élus et des assemblées représentatives
  - Ils ont construit des structures permanentes en pierre et développé des techniques métallurgiques avancées
explanation: |
  La bonne réponse identifie la transformation économique clé de l'extraction à la production. Les premières sociétés agricoles ont révolutionné le développement humain en générant des surplus grâce à l'agriculture et à l'élevage, créant ainsi plus de ressources qu'elles n'en consommaient. Ces sociétés contrastent avec les sociétés de chasseurs-cueilleurs qui s'appuyaient sur des économies de destruction - en prélevant les ressources existantes par la chasse, la pêche et la cueillette sans créer de nouvelles richesses. Les mauvaises réponses décrivent des évolutions qui sont intervenues beaucoup plus tard dans l'histoire de l'humanité et qui ne constituaient pas le facteur distinctif fondamental de ces premiers types de société.
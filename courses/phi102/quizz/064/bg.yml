question: Коя основна промяна отличава ранните земеделски общества от обществата на ловците и събирачите?
answer: Те създават излишъци в производството, а не просто извличат ресурси от околната среда
wrong_answers:
  - Те развиват писменост и официални образователни системи за населението си
  - Те създават демократични правителства с избрани лидери и представителни събрания
  - Изграждат постоянни каменни структури и развиват усъвършенствани металургични техники
explanation: |
  Правилният отговор посочва основната икономическа трансформация от добив към производство. Ранните земеделски общества са направили революция в човешкото развитие, като са генерирали излишъци чрез земеделие и животновъдство, създавайки повече ресурси, отколкото са консумирали. Това контрастира с обществата на ловците и събирачите, които разчитат на икономиката на разрушението - отнемат съществуващите ресурси чрез лов, риболов и събиране, без да създават нови блага. Неправилните отговори описват развития, които са настъпили много по-късно в човешката история и не са били основният фактор, който отличава тези ранни типове общества.
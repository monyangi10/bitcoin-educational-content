question: Welke fundamentele verandering onderscheidde vroege landbouwsamenlevingen van jager-verzamelaarsamenlevingen?
answer: Ze creëerden overtollige productie in plaats van alleen maar grondstoffen uit hun omgeving te halen
wrong_answers:
  - Ze ontwikkelden een geschreven taal en formele onderwijssystemen voor hun bevolking
  - Ze stichtten democratische regeringen met gekozen leiders en representatieve vergaderingen
  - Ze bouwden permanente stenen bouwwerken en ontwikkelden geavanceerde metallurgietechnieken
explanation: |
  Het juiste antwoord identificeert de belangrijkste economische transformatie van extractie naar productie. Vroege agrarische samenlevingen zorgden voor een revolutie in de menselijke ontwikkeling door het genereren van overschotten door landbouw en veeteelt, waarbij meer hulpbronnen werden gecreëerd dan verbruikt. Dit staat in contrast met jager-verzamelaarsamenlevingen die afhankelijk waren van vernietigingseconomieën - bestaande hulpbronnen benutten door jagen, vissen en verzamelen zonder nieuwe rijkdom te creëren. De foute antwoorden beschrijven ontwikkelingen die veel later in de menselijke geschiedenis kwamen en niet de fundamentele onderscheidende factor waren tussen deze vroege samenlevingen.
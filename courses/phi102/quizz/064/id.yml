question: Perubahan mendasar apa yang membedakan masyarakat pertanian awal dengan masyarakat pemburu-pengumpul?
answer: Mereka menciptakan surplus produksi dan bukan hanya mengekstraksi sumber daya dari lingkungan mereka
wrong_answers:
  - Mereka mengembangkan bahasa tertulis dan sistem pendidikan formal untuk populasi mereka
  - Mereka membentuk pemerintahan demokratis dengan pemimpin terpilih dan majelis perwakilan
  - Mereka membangun struktur batu permanen dan mengembangkan teknik metalurgi canggih
explanation: |
  Jawaban yang benar mengidentifikasi transformasi ekonomi utama dari ekstraksi ke produksi. Masyarakat agrikultur awal merevolusi pembangunan manusia dengan menghasilkan surplus melalui pertanian dan peternakan, menciptakan lebih banyak sumber daya daripada yang mereka konsumsi. Hal ini berbeda dengan masyarakat pemburu-pengumpul yang mengandalkan ekonomi yang merusak - mengambil sumber daya yang ada melalui perburuan, penangkapan ikan, dan pengumpulan tanpa menciptakan kekayaan baru. Jawaban yang salah menggambarkan perkembangan yang terjadi di kemudian hari dalam sejarah manusia dan bukan merupakan faktor pembeda mendasar antara kedua tipe masyarakat awal ini.
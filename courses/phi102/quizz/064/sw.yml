question: Ni mabadiliko gani ya msingi yaliyotofautisha jamii za kilimo za awali na jamii za wawindaji na wakusanyaji?
answer: Waliunda uzalishaji wa ziada badala ya kutoa rasilimali kutoka kwa mazingira yao.
wrong_answers:
  - Waliunda lugha iliyoandikwa na mifumo rasmi ya elimu kwa ajili ya watu wao
  - Walianzisha serikali za kidemokrasia zenye viongozi waliochaguliwa na mabaraza ya wawakilishi
  - Walijenga miundo ya mawe ya kudumu na kutengeneza mbinu za hali ya juu za madini
explanation: |
  Jibu sahihi linabainisha mabadiliko muhimu ya kiuchumi kutoka uchimbaji hadi uzalishaji. Jamii za kilimo za awali zilibadilisha maendeleo ya binadamu kwa kuzalisha ziada kupitia kilimo na mifugo, na kuunda rasilimali zaidi ya walizotumia. Hii inatofautisha na jamii za wawindaji na wakusanyaji ambazo zilitegemea uchumi wa uharibifu - kuchukua rasilimali zilizopo kupitia uwindaji, uvuvi, na kukusanya bila kuunda utajiri mpya. Majibu yasiyo sahihi yanaelezea maendeleo yaliyokuja baadaye sana katika historia ya binadamu na hayakuwa sababu ya msingi ya kutofautisha kati ya aina hizi za kijamii za awali.
question: Erken tarım toplumlarını avcı-toplayıcı toplumlardan ayıran temel değişiklik neydi?
answer: Çevrelerindeki kaynakları çıkarmak yerine üretim fazlası yarattılar
wrong_answers:
  - Halkları için yazılı bir dil ve örgün eğitim sistemleri geliştirdiler
  - Seçilmiş liderler ve temsili meclislerden oluşan demokratik hükümetler kurdular
  - Kalıcı taş yapılar inşa ettiler ve ileri metalürji teknikleri geliştirdiler
explanation: |
  Doğru cevap, çıkarımdan üretime doğru gerçekleşen temel ekonomik dönüşümü tanımlamaktadır. İlk tarım toplumları, çiftçilik ve hayvancılık yoluyla üretim fazlası yaratarak ve tükettiklerinden daha fazla kaynak yaratarak insan gelişiminde devrim yaratmıştır. Bu durum, yeni zenginlik yaratmadan avcılık, balıkçılık ve toplayıcılık yoluyla mevcut kaynakları alarak yıkım ekonomilerine dayanan avcı-toplayıcı toplumlarla tezat oluşturmaktadır. Yanlış cevaplar, insanlık tarihinde çok daha sonra ortaya çıkan ve bu erken toplum türleri arasındaki temel ayırt edici faktör olmayan gelişmeleri tanımlamaktadır.
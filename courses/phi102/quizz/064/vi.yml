question: Sự thay đổi cơ bản nào đã tạo nên sự khác biệt giữa các xã hội nông nghiệp sơ khai và các xã hội săn bắn hái lượm?
answer: Họ tạo ra sản lượng dư thừa thay vì chỉ khai thác tài nguyên từ môi trường.
wrong_answers:
  - Họ đã phát triển chữ viết và hệ thống giáo dục chính quy cho dân chúng của mình.
  - Họ thiết lập các chính phủ dân chủ với các nhà lãnh đạo được bầu cử và các hội đồng đại diện.
  - Họ xây dựng các công trình bằng đá kiên cố và phát triển các kỹ thuật luyện kim tiên tiến.
explanation: |
  Câu trả lời đúng xác định sự chuyển đổi kinh tế quan trọng từ khai thác sang sản xuất. Các xã hội nông nghiệp sơ khai đã cách mạng hóa sự phát triển của loài người bằng cách tạo ra thặng dư thông qua trồng trọt và chăn nuôi, tạo ra nhiều tài nguyên hơn mức tiêu thụ. Điều này trái ngược với các xã hội săn bắn hái lượm dựa vào nền kinh tế hủy diệt - lấy đi các nguồn tài nguyên hiện có thông qua săn bắn, đánh bắt cá và hái lượm mà không tạo ra của cải mới. Các câu trả lời sai mô tả những sự phát triển diễn ra muộn hơn nhiều trong lịch sử loài người và không phải là yếu tố phân biệt cơ bản giữa các loại hình xã hội sơ khai này.
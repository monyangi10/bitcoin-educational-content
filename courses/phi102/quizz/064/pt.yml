question: Que mudança fundamental distinguiu as sociedades agrícolas primitivas das sociedades de caçadores-recolectores?
answer: Criaram excedentes de produção em vez de se limitarem a extrair recursos do seu ambiente
wrong_answers:
  - Desenvolveram uma língua escrita e sistemas de educação formal para as suas populações
  - Estabeleceram governos democráticos com líderes eleitos e assembleias representativas
  - Construíram estruturas permanentes de pedra e desenvolveram técnicas avançadas de metalurgia
explanation: |
  A resposta correta identifica a principal transformação económica da extração para a produção. As primeiras sociedades agrícolas revolucionaram o desenvolvimento humano ao gerar excedentes através da agricultura e da pecuária, criando mais recursos do que os que consumiam. Este facto contrasta com as sociedades de caçadores-recolectores que se baseavam em economias de destruição - aproveitando os recursos existentes através da caça, pesca e recolha sem criar novas riquezas. As respostas erradas descrevem desenvolvimentos que surgiram muito mais tarde na história da humanidade e não foram o fator distintivo fundamental entre estes primeiros tipos de sociedade.
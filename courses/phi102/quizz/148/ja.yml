question: 民主主義国家批判によれば、選挙プロセスは契約や交換における個人の意思決定と根本的にどう違うのか？
answer: 複雑な国家問題が必要とする賢明な判断に不利な短期的な風潮の中で、扇動や選挙熱から選挙上の決定が生まれる。
wrong_answers:
  - 選挙による決定は、より多くの利害関係者が関与するため、個々の契約による決定よりも包括的な分析が必要となる。
  - 選挙での決定は、個々の請負業者には通常欠けている専門知識を持つプロの政治家によって行われる。
  - 選挙での決定は確立された憲法上の手続きに従うが、個人の決定は正式な監督や規制なしに行われる。
explanation: |
  この文章は、個人の意思決定と選挙プロセスとを明確に対比している。個人が契約や交換について個人的な決断を下すときは、注意深い観察と深い内省を行い、ゆっくりと穏やかに行われる。これとは対照的に、政治的な意思決定は選挙の煽動や熱狂から生まれ、国家が扱うと主張する複雑な問題に必要な賢明な判断には適さない短期的な風潮を作り出す。他の選択肢は、選挙プロセスがより徹底的で専門的であると誤って示唆しているが、この批評は実際には、選挙プロセスが個人の熟慮よりも劣っていると主張している。
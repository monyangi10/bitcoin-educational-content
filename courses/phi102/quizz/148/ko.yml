question: 민주주의 국가에 대한 비판에 따르면 선거 과정은 계약 및 교환에서 개인의 의사 결정과 근본적으로 어떻게 다른가요?
answer: 선거 결정은 복잡한 국가 문제에 필요한 계몽적 판단에 불리한 단기적 기후에서 동요와 선거 열풍에서 비롯됩니다
wrong_answers:
  - 선거 결정에는 더 많은 이해관계자가 관련되어 있으므로 개별 계약 결정보다 더 포괄적인 분석이 필요합니다
  - 개별 계약자에게는 일반적으로 부족한 전문 지식을 가진 전문 정치인이 선거 결정을 내립니다
  - 선거 결정은 정해진 헌법 절차를 따르며, 개별 결정은 공식적인 감독이나 규제 없이 이루어집니다
explanation: |
  이 텍스트는 개인의 의사 결정과 선거 과정을 명시적으로 대조합니다. 개인이 계약이나 교환에 관한 개인적인 결정을 내릴 때는 신중하게 관찰하고 깊은 성찰을 통해 천천히 평화롭게 이루어집니다. 이와는 대조적으로 정치적 결정은 선거의 동요와 과열에서 나오기 때문에 국가가 처리해야 한다고 주장하는 복잡한 문제에 대해 필요한 계몽적 판단에 적합하지 않은 단기적인 분위기를 조성합니다. 다른 옵션은 선거 절차가 더 철저하거나 전문적이라고 잘못 제안하지만, 실제로는 개인의 숙고보다 열등하다는 비판이 있습니다.
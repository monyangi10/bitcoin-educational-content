question: بر اساس نقد دولت‌های دموکراتیک، فرآیند انتخاباتی چگونه به‌طور اساسی با تصمیم‌گیری فردی در قراردادها و مبادلات تفاوت دارد؟
answer: تصمیمات انتخاباتی از آشفتگی و تب انتخاباتی در یک فضای کوتاه‌مدت که برای قضاوت روشنفکرانه‌ای که مسائل پیچیده دولتی نیاز دارند، نامطلوب است، پدیدار می‌شوند.
wrong_answers:
  - تصمیمات انتخاباتی شامل ذینفعان بیشتری هستند و بنابراین نیاز به تحلیل جامع‌تری نسبت به تصمیمات قراردادی فردی دارند.
  - تصمیمات انتخاباتی توسط سیاستمداران حرفه‌ای اتخاذ می‌شود که دارای دانش تخصصی هستند که پیمانکاران فردی معمولاً فاقد آن هستند.
  - تصمیمات انتخاباتی از رویه‌های قانون اساسی پیروی می‌کنند در حالی که تصمیمات فردی بدون نظارت یا مقررات رسمی اتخاذ می‌شوند
explanation: |
  متن به‌طور صریح تصمیم‌گیری فردی را با فرآیندهای انتخاباتی مقایسه می‌کند. زمانی که افراد تصمیمات شخصی درباره قراردادها یا مبادلات می‌گیرند، به مشاهده دقیق و تفکر عمیق می‌پردازند که به آرامی و با صلح انجام می‌شود. در مقابل، تصمیمات سیاسی از هیجان و تب انتخاباتی ناشی می‌شوند و فضایی کوتاه‌مدت ایجاد می‌کنند که برای قضاوت روشنفکرانه مورد نیاز برای مسائل پیچیده‌ای که دولت ادعا می‌کند به آن‌ها رسیدگی می‌کند، نامناسب است. گزینه‌های دیگر به اشتباه فرآیندهای انتخاباتی را جامع‌تر یا حرفه‌ای‌تر پیشنهاد می‌دهند، در حالی که نقد در واقع استدلال می‌کند که آن‌ها نسبت به تأمل فردی پایین‌تر هستند.
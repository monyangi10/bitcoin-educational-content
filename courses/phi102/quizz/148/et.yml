question: Mille poolest erineb demokraatlike riikide kriitika kohaselt valimisprotsess põhimõtteliselt individuaalsete otsuste tegemisest lepingute ja vahetuste puhul?
answer: Valimisotsused tekivad agitatsioonist ja valimiskuumusest lühiajalises kliimas, mis on ebasoodne valgustatud hinnangu andmiseks, mida keerulised riigiküsimused nõuavad
wrong_answers:
  - Valimisotsused hõlmavad rohkem sidusrühmi ja nõuavad seetõttu põhjalikumat analüüsi kui üksikud lepingulised otsused
  - Valimisotsuseid teevad professionaalsed poliitikud, kellel on eriteadmised, mis üksikutel töövõtjatel tavaliselt puuduvad
  - Valimisotsused järgivad kehtestatud põhiseaduslikke menetlusi, samas kui üksikotsused tehakse ilma ametliku järelevalve või reguleerimiseta
explanation: |
  Tekstis vastandatakse selgesõnaliselt individuaalset otsustamist valimisprotsessile. Kui üksikisikud teevad isiklikke otsuseid lepingute või vahetuste kohta, tegelevad nad hoolika vaatluse ja sügava järelemõtlemisega, mis toimub aeglaselt ja rahulikult. Seevastu poliitilised otsused tekivad valimisagitatsiooni ja -kuumuse tagajärjel, luues lühiajalise kliima, mis ei sobi valgustatud otsustamiseks, mida on vaja keeruliste küsimuste puhul, millega riik väidab end tegelema olevat. Teiste valikute puhul väidetakse ekslikult, et valimisprotsessid on põhjalikumad või professionaalsemad, kuigi kriitika väidab tegelikult, et need on individuaalsest kaalutlusest halvemad.
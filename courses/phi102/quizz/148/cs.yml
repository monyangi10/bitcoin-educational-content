question: V čem se podle kritiky demokratických států volební proces zásadně liší od individuálního rozhodování při uzavírání smluv a směnách?
answer: Volební rozhodnutí vznikají z agitace a volební horečky v krátkodobém klimatu nepříznivém pro osvícený úsudek, který složité státní otázky vyžadují
wrong_answers:
  - Volební rozhodnutí zahrnují více zúčastněných stran, a proto vyžadují komplexnější analýzu než jednotlivá smluvní rozhodnutí
  - Volební rozhodnutí přijímají profesionální politici, kteří mají specializované znalosti, jež jednotlivým dodavatelům obvykle chybí
  - Volební rozhodnutí se řídí zavedenými ústavními postupy, zatímco individuální rozhodnutí jsou přijímána bez formálního dohledu nebo regulace
explanation: |
  Text výslovně staví do kontrastu individuální rozhodování a volební procesy. Když se jednotlivci osobně rozhodují o smlouvách nebo směnách, zapojují se do pečlivého pozorování a hluboké reflexe, která probíhá pomalu a v klidu. Naproti tomu politická rozhodnutí vznikají z volební agitace a horečky, což vytváří krátkodobé klima, které není vhodné pro osvícený úsudek potřebný pro složité otázky, o nichž stát tvrdí, že je má řešit. Ostatní varianty nesprávně naznačují, že volební procesy jsou důkladnější nebo profesionálnější, zatímco kritika ve skutečnosti tvrdí, že jsou horší než individuální zvažování.
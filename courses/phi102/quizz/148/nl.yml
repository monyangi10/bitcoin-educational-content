question: Waarin verschilt volgens de kritiek op democratische staten het verkiezingsproces fundamenteel van individuele besluitvorming in contracten en uitwisselingen?
answer: Verkiezingsbeslissingen komen voort uit agitatie en verkiezingskoorts in een kortetermijnklimaat dat ongunstig is voor het verlichte oordeel dat complexe staatszaken vereisen
wrong_answers:
  - Bij verkiezingsbesluiten zijn meer belanghebbenden betrokken en daarom is een uitgebreidere analyse nodig dan bij individuele contractuele besluiten
  - Verkiezingsbeslissingen worden genomen door professionele politici die over gespecialiseerde kennis beschikken die individuele contractanten meestal niet hebben
  - Verkiezingsbesluiten volgen gevestigde grondwettelijke procedures, terwijl individuele besluiten worden genomen zonder formeel toezicht of regelgeving
explanation: |
  De tekst contrasteert individuele besluitvorming expliciet met electorale processen. Wanneer individuen persoonlijke beslissingen nemen over contracten of uitwisselingen, houden ze zich bezig met zorgvuldige observatie en diepe reflectie die langzaam en vreedzaam verloopt. Politieke beslissingen daarentegen komen voort uit electorale opwinding en koorts, waardoor een kortetermijnklimaat ontstaat dat ongeschikt is voor het verlichte oordeel dat nodig is voor complexe kwesties die de staat beweert te behandelen. De andere opties suggereren ten onrechte dat verkiezingsprocessen grondiger of professioneler zijn, terwijl de kritiek eigenlijk stelt dat ze inferieur zijn aan individueel overleg.
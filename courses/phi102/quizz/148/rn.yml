question: Dushingiye ku vyo ibihugu vya demokarasi binegura, ni gute inzira y’amatora itandukanye n’ingingo z’umuntu ku giti ciwe mu masezerano no mu guhinduranya?
answer: Ivyemezo vy’amatora biva mu guhagarika umutima no mu muriro w’amatora mu gihe c’igihe gito kidashimishije urubanza rufise umuco rwerekana ko ibibazo vya Leta bikomeye bisaba .
wrong_answers:
  - Ivyemezo vy'amatora birimwo abafatanyabikorwa benshi rero bisaba gusuzuma neza kuruta ivyemezo vy'amasezerano vy'umuntu ku giti ciwe .
  - Ivyemezo vy’amatora bifatwa n’abanyapolitike b’umwuga bafise ubumenyi bwihariye abakozi ku giti cabo badafise .
  - Ivyemezo vy'amatora bikurikiza uburyo bushingiye kw'Itegeko Nshinga mu gihe ivyemezo vy'umuntu ku giti ciwe bifatwa ata n'umwe abigenzura canke ngo abigenze .
explanation: |
  Ico canditswe kiratandukanya neza ingingo umuntu afata n’ingene amatora agenda. Iyo abantu bafashe ingingo z’umuntu ku giti ciwe ku bijanye n’amasezerano canke uguhinduranya, baragira uruhara mu kwihweza neza no mu kuzirikana bimwe bikomeye bishika buhorobuhoro kandi mu mahoro. Mu buryo butandukanye n’ubwo, ingingo za politike ziva mu gutera umuvurungano w’amatora no mu muriro, zigatuma haba ikirere c’igihe gito kidakwiriye urubanza rufise umuco rukenewe ku bibazo bikomeye Leta ivuga ko ishobora kubitorera umuti. Ayandi mahitamwo atari yo avuga ko amatora ari ay’ubuhinga canke ay’umwuga, mu gihe abanegura mu vy’ukuri bavuga ko ari hasi y’uguca irya n’ino umuntu ku giti ciwe.
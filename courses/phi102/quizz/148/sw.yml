question: Kulingana na ukosoaji wa mataifa ya kidemokrasia, mchakato wa uchaguzi unatofautiana vipi kimsingi na ufanyaji maamuzi wa mtu binafsi katika mikataba na mabadilishano?
answer: Maamuzi ya uchaguzi hutokana na msukosuko na homa ya uchaguzi katika hali ya muda mfupi isiyofaa kwa uamuzi ulio wazi ambao masuala tata ya serikali yanahitaji
wrong_answers:
  - Maamuzi ya uchaguzi yanahusisha wadau wengi zaidi na kwa hivyo yanahitaji uchambuzi wa kina zaidi kuliko maamuzi ya kimkataba ya mtu binafsi
  - Maamuzi ya uchaguzi hufanywa na wanasiasa wataalamu ambao wana ujuzi maalum ambao kwa kawaida wakandarasi binafsi hawana.
  - Maamuzi ya uchaguzi hufuata taratibu zilizowekwa za kikatiba huku maamuzi ya mtu binafsi yakifanywa bila usimamizi rasmi au kanuni.
explanation: |
  Maandishi yanatofautisha waziwazi ufanyaji maamuzi wa mtu binafsi na michakato ya uchaguzi. Watu binafsi wanapofanya maamuzi ya kibinafsi kuhusu mikataba au kubadilishana, hushiriki katika uchunguzi wa makini na tafakari ya kina ambayo hutokea polepole na kwa amani. Kwa upande mwingine, maamuzi ya kisiasa hutokana na msukosuko wa uchaguzi na homa, na kuunda hali ya muda mfupi ambayo haifai kwa uamuzi ulio wazi unaohitajika kwa masuala tata ambayo serikali inadai kushughulikia. Chaguzi zingine zinaonyesha kimakosa kwamba michakato ya uchaguzi ni ya kina zaidi au ya kitaalamu, wakati ukosoaji unasema kwamba ni duni kuliko majadiliano ya mtu binafsi.
question: 19. yüzyıl liberal ekonomistlerine göre, tarife korumasının yerli üreticileri nasıl etkilediğini açıklamak için hangi metaforu kullandılar?
answer: Daha az girişimci üreticilerin başarılarına güvenmelerini sağlayan tarife koruması yastığı
wrong_answers:
  - Ulusal endüstrileri haksız dış rekabetten koruyan ekonomik savunma kalkanı
  - Yerli şirketlerin uluslararası rekabetçiliğe tırmanmasına yardımcı olan aşamalı gelişim merdiveni
  - Yerel pazarları küresel ticaret fırsatlarına bağlayan ticari geçiş köprüsü
explanation: |
  Bu bölümde özellikle Harriet Martineau, Frédéric Bastiat ve diğerleri gibi 19. yüzyıl yazarlarının tarife korumasını 'l'oreiller de la protection douanière' (tarife korumasının yastığı) olarak adlandırdıklarından bahsedilmektedir. Bu metafor, yabancı rekabetin gümrük tarifeleri tarafından engellenmesi nedeniyle daha az girişimci olan üreticilerin mevcut başarılarına nasıl dayandıklarını göstermektedir. Yabancı üreticiler yenilikçi yöntemler veya daha iyi ürünler geliştirdiğinde, yerli üreticiler yenilik yapmak yerine bu koruyucu yastıkta 'huzur içinde uyuyabilirler'. Diğer seçenekler korumacılığı olumlu bir şekilde sunarak liberal ekonomistlerin bu tür politikalara eleştirel bakışıyla çelişmektedir.
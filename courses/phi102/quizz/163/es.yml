question: Según los economistas liberales del siglo XIX, ¿qué metáfora utilizaban para describir cómo afecta la protección arancelaria a los productores nacionales?
answer: El colchón de protección arancelaria que permite a los productores menos emprendedores descansar sobre sus logros
wrong_answers:
  - El escudo de defensa económica que protege a las industrias nacionales de la competencia extranjera desleal
  - La escalera del desarrollo progresivo que ayuda a las empresas nacionales a ascender a la competitividad internacional
  - El puente de transición comercial que conecta los mercados locales con las oportunidades comerciales mundiales
explanation: |
  El capítulo menciona específicamente que autores del siglo XIX como Harriet Martineau, Frédéric Bastiat y otros llamaban a la protección arancelaria "l'oreiller de la protection douanière" (el cojín de la protección arancelaria). Esta metáfora ilustra cómo los productores menos emprendedores se limitan a descansar sobre sus logros actuales porque la competencia extranjera está bloqueada por los aranceles. Cuando los productores extranjeros desarrollan métodos innovadores o productos mejores, los productores nacionales pueden "dormir tranquilos" sobre este cojín protector en lugar de innovar. Las otras opciones presentan el proteccionismo de forma positiva, lo que contradice la visión crítica de los economistas liberales sobre este tipo de políticas.
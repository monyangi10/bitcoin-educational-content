question: Nk’uko abahinga mu vy’ubutunzi bo mu kinjana ca 19 babivuga, ni imvugo ngereranyo iyihe bakoresheje mu kudondora ingene ugukingira amakori bigira ico bikoze ku bahinga bo mu gihugu?
answer: Igipfukisho c'uburinzi bw'amakori gituma abahinguzi b'abanyamigambi bake baruhukira ivyo bagezeko
wrong_answers:
  - Inkinzo y’ukwikingira ubutunzi irinda inganda z’igihugu amahiganwa atari yo y’amahanga .
  - Ingero y'iterambere ritera imbere ifasha amashirahamwe yo mu gihugu kuduga gushika ku rwego rwo guhangana n'abandi mpuzamakungu .
  - Ikiraro c'ubudandaji gihuza amasoko yo mu karere n'amahirwe y'ubudandaji yo kw'isi yose
explanation: |
  Ico gice kivuga canecane ko abanditsi bo mu kinjana ca 19 nka Harriet Martineau, Frédéric Bastiat n’abandi bita uburinzi bw’amakori ‘l’oreiller de la protection douanière’ (umusego w’uburinzi bw’amakori). Iyi mvugo ngereranyo yerekana ingene abahinguzi b’abanyamigambi bakeyi baruhukira gusa ku vyo bamaze gushikako kubera ko uguhiganwa kw’amahanga kubujijwe n’amakori. Iyo abahinguzi bo hanze bateguye uburyo bushasha canke ibintu vyiza kuruta, abahinguzi bo mu gihugu barashobora ‘kuryama amahoro’ kuri iyo mpuzu y’uburinzi aho gukora ibintu bishasha. Ayandi mahitamwo yerekana uburinzi mu buryo bwiza, ivyo bikaba bivuguruza ukuntu abahinga mu vy’ubutunzi b’abanyagihugu babona nabi izo ngingo ngenderwako.
question: Welche Metapher haben die liberalen Ökonomen des 19. Jahrhunderts verwendet, um zu beschreiben, wie sich der Zollschutz auf die inländischen Produzenten auswirkt?
answer: Das Polster des Zollschutzes, das es weniger unternehmerisch denkenden Herstellern ermöglicht, sich auf ihren Erfolgen auszuruhen
wrong_answers:
  - Das wirtschaftliche Schutzschild, das die nationalen Industrien vor unlauterem ausländischem Wettbewerb schützt
  - Die Leiter der progressiven Entwicklung, die den heimischen Unternehmen hilft, international wettbewerbsfähig zu werden
  - Die Brücke des kommerziellen Übergangs, die die lokalen Märkte mit den globalen Handelsmöglichkeiten verbindet
explanation: |
  In dem Kapitel wird ausdrücklich erwähnt, dass Autoren des 19. Jahrhunderts wie Harriet Martineau, Frédéric Bastiat und andere den Zollschutz als "l'oreiller de la protection douanière" (das Kissen des Zollschutzes) bezeichneten. Diese Metapher veranschaulicht, wie sich weniger unternehmerisch denkende Produzenten einfach auf ihren bisherigen Errungenschaften ausruhen, weil die ausländische Konkurrenz durch Zölle blockiert wird. Wenn ausländische Hersteller innovative Methoden oder bessere Produkte entwickeln, können die einheimischen Hersteller auf diesem Schutzkissen "ruhig schlafen", anstatt innovativ zu sein. Die anderen Optionen stellen den Protektionismus in einem positiven Licht dar, was der kritischen Sicht der liberalen Ökonomen auf eine solche Politik widerspricht.
question: Secondo gli economisti liberali del XIX secolo, quale metafora usavano per descrivere l'impatto della protezione tariffaria sui produttori nazionali?
answer: Il cuscino di protezione tariffaria che permette ai produttori meno intraprendenti di riposare sui loro successi
wrong_answers:
  - Lo scudo di difesa economica che protegge le industrie nazionali dalla concorrenza sleale dell'estero
  - La scala dello sviluppo progressivo che aiuta le aziende nazionali a scalare la competitività internazionale
  - Il ponte di transizione commerciale che collega i mercati locali alle opportunità commerciali globali
explanation: |
  Il capitolo cita specificamente che autori del XIX secolo come Harriet Martineau, Frédéric Bastiat e altri chiamavano la protezione tariffaria "l'oreiller de la protection douanière" (il cuscino della protezione tariffaria). Questa metafora illustra come i produttori meno intraprendenti si adagino semplicemente sui risultati ottenuti perché la concorrenza straniera è bloccata dalle tariffe. Quando i produttori stranieri sviluppano metodi innovativi o prodotti migliori, i produttori nazionali possono "dormire tranquilli" su questo cuscino protettivo invece di innovare. Le altre opzioni presentano il protezionismo sotto una luce positiva, che contraddice la visione critica degli economisti liberali nei confronti di tali politiche.
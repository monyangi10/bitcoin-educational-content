question: Millist metafoori kasutasid 19. sajandi liberaalsed majandusteadlased, et kirjeldada, kuidas tariifne kaitse mõjutab kodumaiseid tootjaid?
answer: Tariifse kaitse padi, mis võimaldab vähem ettevõtlikel tootjatel oma saavutustel puhata
wrong_answers:
  - Majanduslik kaitsekilp, mis kaitseb riiklikke tööstusharusid ebaausa väliskonkurentsi eest
  - Progressiivse arengu redel, mis aitab kodumaistel ettevõtetel tõusta rahvusvahelisse konkurentsivõimesse
  - Kaubandusliku ülemineku sild, mis ühendab kohalikud turud ülemaailmsete kaubandusvõimalustega
explanation: |
  Peatükis mainitakse konkreetselt, et 19. sajandi autorid nagu Harriet Martineau, Frédéric Bastiat ja teised nimetasid tariifset kaitset "l'oreiller de la protection douanière" (tariifse kaitse padi). See metafoor illustreerib, kuidas vähem ettevõtlikud tootjad lihtsalt toetuvad oma olemasolevatele saavutustele, sest välismaine konkurents on tariifidega blokeeritud. Kui välismaised tootjad arendavad uuenduslikke meetodeid või paremaid tooteid, saavad kodumaised tootjad uuenduste asemel "rahulikult magada" sellel kaitsepadjal. Teised võimalused esitavad protektsionismi positiivses valguses, mis on vastuolus liberaalsete majandusteadlaste kriitilise suhtumisega sellisesse poliitikasse.
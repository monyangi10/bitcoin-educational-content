question: Каква метафора са използвали либералните икономисти от XIX в., за да опишат как тарифната защита влияе на местните производители?
answer: Възглавницата от тарифна защита, която позволява на по-малко предприемчивите производители да се възползват от постиженията си
wrong_answers:
  - Щитът на икономическата защита, който защитава националните индустрии от нелоялна чуждестранна конкуренция
  - Стълбата на прогресивното развитие, която помага на националните компании да се изкачат до международната конкурентоспособност
  - Мостът на търговския преход, който свързва местните пазари с възможностите за глобална търговия
explanation: |
  В главата се споменава, че автори от XIX в. като Хариет Мартино, Фредерик Бастиа и други наричат тарифната защита "l'oreiller de la protection douanière" (възглавницата на тарифната защита). Тази метафора илюстрира как по-малко предприемчивите производители просто почиват на съществуващите си постижения, тъй като чуждестранната конкуренция е блокирана от митата. Когато чуждестранните производители разработят иновативни методи или по-добри продукти, местните производители могат да "спят спокойно" върху тази защитна възглавница, вместо да въвеждат иновации. Другите варианти представят протекционизма в положителна светлина, което противоречи на критичния поглед на либералните икономисти към подобни политики.
question: 根據 19 世紀的自由經濟學家，他們用什麼比喻來描述關稅保護如何影響國內生產者？
answer: 關稅保護的墊腳石，讓創業能力較低的生產商得以安枕無憂。
wrong_answers:
  - 保護民族工業免受不公平外國競爭的經濟防禦盾
  - 協助國內企業攀升國際競爭力的進階發展階梯
  - 連接當地市場與全球貿易機會的商業轉型橋梁
explanation: |
  本章特別提到 19 世紀的 Harriet Martineau、Frédéric Bastiat 等作家將關稅保護稱為「l'oreiller de la protection douanière」（關稅保護的墊子）。這個隱喻說明了企業精神較弱的生產者如何因為關稅阻擋了外國競爭，而僅僅停留在現有的成就上。當外國生產者開發出創新方法或更好的產品時，國內生產者就可以在這個保護墊上 「安然入睡」，而無需創新。其他選項以正面的角度呈現保護主義，這與自由經濟學家對此類政策的批判觀點相矛盾。
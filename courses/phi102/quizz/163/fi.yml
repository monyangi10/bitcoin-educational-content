question: Mitä metaforaa 1800-luvun liberaalit taloustieteilijät käyttivät kuvaamaan sitä, miten tullisuoja vaikuttaa kotimaisiin tuottajiin?
answer: Tullisuojan pehmuste, joka antaa vähemmän yritteliäille tuottajille mahdollisuuden levätä saavutustensa varassa
wrong_answers:
  - Taloudellisen puolustuksen kilpi, joka suojaa kansallisia teollisuudenaloja epäreilulta ulkomaiselta kilpailulta
  - Asteittaisen kehityksen tikkaat, jotka auttavat kotimaisia yrityksiä nousemaan kansainväliseen kilpailukykyyn
  - Kaupallisen siirtymän silta, joka yhdistää paikalliset markkinat maailmanlaajuisiin kauppamahdollisuuksiin
explanation: |
  Luvussa mainitaan erityisesti, että 1800-luvun kirjailijat, kuten Harriet Martineau, Frédéric Bastiat ja muut, kutsuivat tullisuojaa "l'oreiller de la protection douanière" (tullisuojan tyynyksi). Tämä vertauskuva havainnollistaa sitä, miten vähemmän yritteliäät tuottajat yksinkertaisesti lepäävät nykyisten saavutustensa varassa, koska tullien avulla estetään ulkomainen kilpailu. Kun ulkomaiset tuottajat kehittävät innovatiivisia menetelmiä tai parempia tuotteita, kotimaiset tuottajat voivat "nukkua rauhassa" tämän suojatyynyn päällä sen sijaan, että innovoisivat. Muut vaihtoehdot esittävät protektionismin myönteisessä valossa, mikä on ristiriidassa liberaalien taloustieteilijöiden kriittisen näkemyksen kanssa tällaisesta politiikasta.
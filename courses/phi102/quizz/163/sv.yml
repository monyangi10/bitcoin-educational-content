question: Enligt 1800-talets liberala ekonomer, vilken metafor använde de för att beskriva hur tullskydd påverkar inhemska producenter?
answer: Tullskyddet som gör att mindre entreprenöriella producenter kan vila på sina framgångar
wrong_answers:
  - Det ekonomiska försvarets sköld som skyddar nationella industrier från orättvis utländsk konkurrens
  - Stegen för progressiv utveckling som hjälper inhemska företag att klättra till internationell konkurrenskraft
  - Den kommersiella övergångsbryggan som kopplar samman lokala marknader med globala handelsmöjligheter
explanation: |
  I kapitlet nämns särskilt att 1800-talsförfattare som Harriet Martineau, Frédéric Bastiat och andra kallade tullskydd för "l'oreiller de la protection douanière" (tullskyddets kudde). Denna metafor illustrerar hur mindre entreprenöriella producenter helt enkelt vilar på sina befintliga framgångar eftersom utländsk konkurrens blockeras av tullar. När utländska producenter utvecklar innovativa metoder eller bättre produkter kan de inhemska producenterna "sova lugnt" på denna skyddande kudde i stället för att förnya sig. I de andra alternativen framställs protektionism i ett positivt ljus, vilket strider mot de liberala ekonomernas kritiska syn på sådan politik.
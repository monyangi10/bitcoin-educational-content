question: Kulingana na wanauchumi huria wa karne ya 19, walitumia sitiari gani kuelezea jinsi ulinzi wa ushuru unavyoathiri wazalishaji wa ndani?
answer: Mto wa ulinzi wa ushuru unaoruhusu wazalishaji wasio na ujasiriamali kutegemea mafanikio yao
wrong_answers:
  - Ngao ya ulinzi wa kiuchumi inayolinda viwanda vya kitaifa kutokana na ushindani usio wa haki wa kigeni
  - Ngazi ya maendeleo endelevu inayosaidia makampuni ya ndani kupanda hadi ushindani wa kimataifa
  - Daraja la mpito wa kibiashara linalounganisha masoko ya ndani na fursa za biashara ya kimataifa
explanation: |
  Sura hiyo inataja haswa kwamba waandishi wa karne ya 19 kama Harriet Martineau, Frédéric Bastiat, na wengine waliita ulinzi wa ushuru 'l'oreiller de la protection douanière' (mto wa ulinzi wa ushuru). Mfano huu unaonyesha jinsi wazalishaji wajasiriamali wasivyotegemea mafanikio yao yaliyopo kwa sababu ushindani wa kigeni unazuiwa na ushuru. Wazalishaji wa kigeni wanapobuni mbinu bunifu au bidhaa bora, wazalishaji wa ndani wanaweza 'kulala kwa amani' kwenye mto huu wa ulinzi badala ya kubuni. Chaguzi zingine zinawasilisha ulinzi kwa mtazamo chanya, ambao unapingana na mtazamo muhimu wa wanauchumi huria kuhusu sera kama hizo.
question: 19世紀の自由主義経済学者によれば、彼らは関税保護が国内生産者にどのような影響を与えるかを説明するのに、どのような比喩を使っていたのだろうか？
answer: 関税保護というクッションが、起業家精神に乏しい生産者たちがその功績に安住することを許している。
wrong_answers:
  - 不当な外国との競争から国の産業を守る経済防衛の盾
  - 国内企業を国際競争力へと押し上げる進歩的発展のはしご
  - 地域市場とグローバルな貿易機会をつなぐ、商業移行の架け橋
explanation: |
  この章では特に、ハリエット・マルティノーやフレデリック・バスティアなどの19世紀の作家が、関税保護を「l'oreiller de la protection douanière（関税保護のクッション）」と呼んだことに触れている。この比喩は、起業家精神に乏しい生産者が、関税によって外国との競争が阻まれているために、既存の実績に甘んじていることを物語っている。外国の生産者が革新的な方法やより優れた製品を開発すると、国内の生産者は技術革新を行う代わりに、この保護クッションの上で「安らかに眠る」ことができる。他の選択肢は、保護主義を肯定的に捉えており、このような政策に批判的な自由主義経済学者の見解とは矛盾している。
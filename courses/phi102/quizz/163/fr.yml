question: Selon les économistes libéraux du XIXe siècle, quelle métaphore utilisaient-ils pour décrire la manière dont la protection tarifaire affecte les producteurs nationaux ?
answer: Le coussin de protection tarifaire qui permet aux producteurs moins entreprenants de se reposer sur leurs acquis
wrong_answers:
  - Le bouclier de défense économique qui protège les industries nationales de la concurrence étrangère déloyale
  - L'échelle du développement progressif qui aide les entreprises nationales à se hisser au niveau de la compétitivité internationale
  - Le pont de transition commerciale qui relie les marchés locaux aux opportunités commerciales mondiales
explanation: |
  Le chapitre mentionne spécifiquement que des auteurs du 19e siècle comme Harriet Martineau, Frédéric Bastiat et d'autres ont appelé la protection tarifaire "l'oreiller de la protection douanière". Cette métaphore illustre le fait que les producteurs moins entreprenants se contentent de se reposer sur leurs acquis parce que la concurrence étrangère est bloquée par les droits de douane. Lorsque les producteurs étrangers mettent au point des méthodes innovantes ou de meilleurs produits, les producteurs nationaux peuvent "dormir tranquillement" sur ce coussin de protection au lieu d'innover. Les autres options présentent le protectionnisme sous un jour positif, ce qui contredit la vision critique des économistes libéraux à l'égard de ces politiques.
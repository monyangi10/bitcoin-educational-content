question: Menurut para ekonom liberal abad ke-19, metafora apa yang mereka gunakan untuk menggambarkan bagaimana proteksi tarif mempengaruhi produsen domestik?
answer: Bantalan perlindungan tarif yang memungkinkan produsen yang kurang berjiwa wirausaha untuk beristirahat dari pencapaian mereka
wrong_answers:
  - Perisai pertahanan ekonomi yang melindungi industri nasional dari persaingan asing yang tidak sehat
  - Tangga perkembangan progresif yang membantu perusahaan domestik mendaki menuju daya saing internasional
  - Jembatan transisi komersial yang menghubungkan pasar lokal dengan peluang perdagangan global
explanation: |
  Bab ini secara khusus menyebutkan bahwa penulis abad ke-19 seperti Harriet Martineau, Frédéric Bastiat, dan yang lainnya menyebut proteksi tarif sebagai 'l'oreiller de la protection douanière' (bantalan proteksi tarif). Metafora ini menggambarkan bagaimana produsen yang kurang berjiwa wirausaha hanya bersandar pada pencapaian yang ada karena persaingan asing dihalangi oleh tarif. Ketika produsen asing mengembangkan metode inovatif atau produk yang lebih baik, produsen dalam negeri dapat 'tidur nyenyak' di atas bantal perlindungan ini alih-alih berinovasi. Opsi lainnya menampilkan proteksionisme dalam sudut pandang yang positif, yang bertentangan dengan pandangan kritis para ekonom liberal terhadap kebijakan semacam itu.
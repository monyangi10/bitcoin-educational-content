question: Hvilken metafor brukte 1800-tallets liberale økonomer for å beskrive hvordan tollbeskyttelse påvirker innenlandske produsenter?
answer: Tollbeskyttelsen som gjør at mindre entreprenørielle produsenter kan hvile på sine prestasjoner
wrong_answers:
  - Det økonomiske forsvarsskjoldet som beskytter nasjonale industrier mot urettferdig utenlandsk konkurranse
  - Stigen for progressiv utvikling som hjelper innenlandske selskaper med å klatre opp til internasjonal konkurranseevne
  - Broen som forbinder lokale markeder med globale handelsmuligheter
explanation: |
  Kapitlet nevner spesifikt at 1800-tallsforfattere som Harriet Martineau, Frédéric Bastiat og andre kalte tollbeskyttelse for "l'oreiller de la protection douanière" (tollbeskyttelsens pute). Denne metaforen illustrerer hvordan mindre entreprenørielle produsenter rett og slett hviler på sine eksisterende prestasjoner fordi utenlandsk konkurranse blokkeres av toll. Når utenlandske produsenter utvikler innovative metoder eller bedre produkter, kan de innenlandske produsentene "sove trygt" på denne beskyttelsesputen i stedet for å innovere. De andre alternativene fremstiller proteksjonisme i et positivt lys, noe som står i motsetning til de liberale økonomenes kritiske syn på slik politikk.
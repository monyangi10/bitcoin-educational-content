question: طبق نظر اقتصاددانان لیبرال قرن نوزدهم، از چه استعاره‌ای برای توصیف تأثیر حمایت تعرفه‌ای بر تولیدکنندگان داخلی استفاده کردند؟
answer: حفاظ تعرفه‌ای که به تولیدکنندگان کمتر کارآفرین اجازه می‌دهد بر دستاوردهای خود تکیه کنند
wrong_answers:
  - سپر دفاع اقتصادی که از صنایع ملی در برابر رقابت ناعادلانه خارجی محافظت می‌کند
  - نردبان توسعه تدریجی که به شرکت‌های داخلی کمک می‌کند تا به رقابت‌پذیری بین‌المللی برسند
  - پل گذار تجاری که بازارهای محلی را به فرصت‌های تجارت جهانی متصل می‌کند
explanation: |
  این فصل به طور خاص اشاره می‌کند که نویسندگان قرن نوزدهم مانند هریت مارتینو، فردریک باستیا و دیگران، حمایت تعرفه‌ای را 'l'oreiller de la protection douanière' (بالش حمایت تعرفه‌ای) نامیده‌اند. این استعاره نشان می‌دهد که تولیدکنندگان کمتر کارآفرین به سادگی بر دستاوردهای موجود خود تکیه می‌کنند زیرا رقابت خارجی با تعرفه‌ها مسدود شده است. هنگامی که تولیدکنندگان خارجی روش‌های نوآورانه یا محصولات بهتری توسعه می‌دهند، تولیدکنندگان داخلی می‌توانند به جای نوآوری، به آرامی بر این بالش حمایتی بخوابند. گزینه‌های دیگر حمایت‌گرایی را به صورت مثبت نشان می‌دهند که با دیدگاه انتقادی اقتصاددانان لیبرال نسبت به چنین سیاست‌هایی در تضاد است.
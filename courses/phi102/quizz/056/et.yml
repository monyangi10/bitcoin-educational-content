question: Mis muutis orjuse vananenud ja ebapiisavaks, kui majandustegevus arenes?
answer: Majandustegevus muutus intellektuaalsemaks, nõudes loovust ja uuenduslikkust, mida orjad ei suutnud pakkuda
wrong_answers:
  - Orjade ülalpidamise kulud muutusid liiga kalliks võrreldes vabade tööliste palkamisega
  - Religioossed liikumised veensid ühiskonda, et orjapidamine on moraalselt vale ja tuleks kaotada
  - Rahvusvahelised kaubanduslepingud muutsid orjatööjõu kasutamise tootmises ebaseaduslikuks
explanation: |
  Teksti kohaselt muutus orjapidamine iganenuks, kui majandustegevus muutus puhtfüüsilistest ülesannetest intellektuaalsemaks tööks, mis nõudis loovust ja uuenduslikkust. Kuigi orjad võisid teha füüsilisi töid piirangutega, ei suutnud nad tõhusalt kasutada oma vaimseid võimeid produktiivseks leiutamiseks või loominguliseks probleemide lahendamiseks. See põhimõtteline piirang muutis orjapidamise süsteemi kokkusobimatuks arenevate majanduslike vajadustega. Teised valikud on valed, sest tekstis on konkreetselt määratletud intellektuaalsed nõudmised kui võtmetegur, mitte majanduslikud kulud, usulised liikumised või kaubanduslepingud.
question: ¿Qué hizo que la esclavitud quedara obsoleta e inadecuada a medida que evolucionaban las actividades económicas?
answer: Las actividades económicas se volvieron más intelectuales, requiriendo creatividad e innovación que los esclavos no podían proporcionar
wrong_answers:
  - El mantenimiento de los esclavos resultaba demasiado caro en comparación con la contratación de trabajadores libres
  - Los movimientos religiosos convencieron a la sociedad de que la esclavitud era moralmente incorrecta y debía abolirse
  - Los acuerdos comerciales internacionales ilegalizan el trabajo esclavo en la producción
explanation: |
  Según el texto, la esclavitud quedó obsoleta cuando las actividades económicas se transformaron de tareas puramente físicas a un trabajo más intelectual que requería creatividad e innovación. Aunque los esclavos podían realizar tareas físicas bajo coacción, no podían emplear eficazmente sus capacidades mentales para la invención productiva o la resolución creativa de problemas. Esta limitación fundamental hacía que el sistema esclavista fuera incompatible con la evolución de las necesidades económicas. Las otras opciones son incorrectas porque el texto identifica específicamente las demandas intelectuales como el factor clave, no los costes económicos, los movimientos religiosos o los acuerdos comerciales.
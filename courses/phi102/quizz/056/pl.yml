question: Co sprawiło, że niewolnictwo stało się przestarzałe i nieadekwatne w miarę rozwoju działalności gospodarczej?
answer: Działalność gospodarcza stała się bardziej intelektualna, wymagając kreatywności i innowacji, których niewolnicy nie byli w stanie zapewnić
wrong_answers:
  - Koszt utrzymania niewolników stał się zbyt drogi w porównaniu do zatrudniania wolnych pracowników
  - Ruchy religijne przekonały społeczeństwo, że niewolnictwo jest moralnie złe i powinno zostać zniesione
  - Międzynarodowe umowy handlowe sprawiły, że wykorzystywanie pracy niewolniczej w produkcji stało się nielegalne
explanation: |
  Zgodnie z tekstem, niewolnictwo stało się przestarzałe, gdy działalność gospodarcza przekształciła się z czysto fizycznych zadań w bardziej intelektualną pracę wymagającą kreatywności i innowacji. Podczas gdy niewolnicy mogli wykonywać zadania fizyczne pod przymusem, nie mogli skutecznie angażować swoich zdolności umysłowych do produktywnej inwencji lub kreatywnego rozwiązywania problemów. To fundamentalne ograniczenie sprawiało, że system niewolniczy był niekompatybilny z ewoluującymi potrzebami gospodarczymi. Pozostałe opcje są nieprawidłowe, ponieważ tekst wyraźnie identyfikuje wymagania intelektualne jako kluczowy czynnik, a nie koszty ekonomiczne, ruchy religijne czy umowy handlowe.
question: Was hat dazu geführt, dass die Sklaverei im Zuge der Entwicklung der Wirtschaftstätigkeit obsolet und unangemessen wurde?
answer: Die wirtschaftlichen Aktivitäten wurden intellektueller und erforderten Kreativität und Innovation, die Sklaven nicht bieten konnten
wrong_answers:
  - Die Kosten für den Unterhalt von Sklaven wurden im Vergleich zur Anstellung freier Arbeitskräfte zu teuer
  - Religiöse Bewegungen überzeugten die Gesellschaft, dass die Sklaverei moralisch falsch war und abgeschafft werden sollte
  - Internationale Handelsabkommen machten den Einsatz von Sklavenarbeit in der Produktion illegal
explanation: |
  Dem Text zufolge wurde die Sklaverei obsolet, als sich die wirtschaftlichen Tätigkeiten von rein körperlichen Aufgaben zu mehr geistiger Arbeit wandelten, die Kreativität und Innovation erforderte. Sklaven konnten zwar körperliche Arbeiten unter Zwang verrichten, aber sie konnten ihre geistigen Fähigkeiten nicht effektiv für produktive Erfindungen oder kreative Problemlösungen einsetzen. Diese grundlegende Einschränkung machte das Sklavensystem unvereinbar mit den sich entwickelnden wirtschaftlichen Bedürfnissen. Die anderen Optionen sind falsch, da der Text ausdrücklich die intellektuellen Anforderungen als Schlüsselfaktor benennt und nicht wirtschaftliche Kosten, religiöse Bewegungen oder Handelsabkommen.
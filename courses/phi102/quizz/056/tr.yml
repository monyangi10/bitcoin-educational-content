question: Ekonomik faaliyetler geliştikçe köleliğin modasının geçmesine ve yetersiz kalmasına neden olan neydi?
answer: Ekonomik faaliyetler daha entelektüel hale geldi, kölelerin sağlayamayacağı yaratıcılık ve yenilikçilik gerektirdi
wrong_answers:
  - Köle çalıştırmanın maliyeti, özgür işçi çalıştırmaya kıyasla çok pahalı hale geldi
  - Dini hareketler toplumu köleliğin ahlaki açıdan yanlış olduğuna ve kaldırılması gerektiğine ikna etti
  - Uluslararası ticaret anlaşmaları üretimde köle emeği kullanılmasını yasadışı hale getirdi
explanation: |
  Metne göre kölelik, ekonomik faaliyetler tamamen fiziksel görevlerden yaratıcılık ve yenilikçilik gerektiren daha entelektüel işlere dönüştüğünde geçerliliğini yitirmiştir. Köleler kısıtlama altında fiziksel görevleri yerine getirebilirken, üretken icat veya yaratıcı problem çözme için zihinsel kapasitelerini etkin bir şekilde kullanamıyorlardı. Bu temel sınırlama, köle sistemini gelişen ekonomik ihtiyaçlarla uyumsuz hale getirmiştir. Diğer seçenekler yanlıştır çünkü metinde kilit faktör olarak ekonomik maliyetler, dini hareketler ya da ticaret anlaşmaları değil, özellikle entelektüel talepler belirtilmektedir.
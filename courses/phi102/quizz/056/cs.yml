question: Co způsobilo, že se otroctví stalo s rozvojem ekonomických aktivit zastaralým a neadekvátním?
answer: Hospodářské činnosti se staly intelektuálnějšími a vyžadovaly kreativitu a inovace, které otroci nemohli poskytnout
wrong_answers:
  - Náklady na vydržování otroků byly příliš vysoké ve srovnání s náklady na najímání svobodných pracovníků
  - Náboženská hnutí přesvědčila společnost, že otroctví je morálně špatné a mělo by být zrušeno
  - Mezinárodní obchodní dohody znemožnily používání otrocké práce ve výrobě
explanation: |
  Podle textu se otroctví stalo zastaralým, když se ekonomické činnosti změnily z čistě fyzických úkolů na intelektuálnější práci vyžadující kreativitu a inovace. Zatímco otroci mohli vykonávat fyzické úkoly pod tlakem, nemohli účinně zapojit své duševní schopnosti pro produktivní vynalézání nebo tvůrčí řešení problémů. Toto základní omezení způsobilo, že otrokářský systém nebyl slučitelný s vyvíjejícími se ekonomickými potřebami. Ostatní možnosti jsou nesprávné, protože text výslovně označuje za klíčový faktor intelektuální požadavky, nikoli ekonomické náklady, náboženská hnutí nebo obchodní dohody.
question: 是什麼讓奴隸制隨著經濟活動的演進而變得過時和不足？
answer: 經濟活動變得更加知識化，需要奴隸無法提供的創造力和創新力
wrong_answers:
  - 與僱用自由工人相比，維持奴隸的成本變得太昂貴。
  - 宗教運動使社會相信奴隸制在道德上是錯誤的，應該廢除。
  - 國際貿易協定規定在生產中使用奴隸勞動是非法的
explanation: |
  根據文中所述，當經濟活動從純粹的體力勞動轉變為需要創造力和創新力的智力勞動時，奴隸制就變得過時了。雖然奴隸可以在受限制的情況下完成體力勞動，但他們無法有效地運用他們的心智能力進行生產性發明或創造性地解決問題。這個根本性的限制使得奴隸制度與不斷發展的經濟需求不相容。其他選項都不對，因為文中特別指出智力需求是關鍵因素，而不是經濟成本、宗教運動或貿易協定。
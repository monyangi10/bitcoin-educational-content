question: Ni nini kilichofanya utumwa kuwa wa kizamani na usiotosha kadri shughuli za kiuchumi zinavyobadilika?
answer: Shughuli za kiuchumi zikawa za kiakili zaidi, zikihitaji ubunifu na uvumbuzi ambao watumwa hawangeweza kutoa
wrong_answers:
  - Gharama ya kuwatunza watumwa ikawa ghali sana ikilinganishwa na kuajiri wafanyakazi huru
  - Harakati za kidini ziliishawishi jamii kwamba utumwa ulikuwa mbaya kimaadili na unapaswa kukomeshwa
  - Mikataba ya biashara ya kimataifa ilifanya iwe kinyume cha sheria kutumia nguvu kazi ya watumwa katika uzalishaji
explanation: |
  Kulingana na maandishi, utumwa ulipitwa na wakati wakati shughuli za kiuchumi zilibadilika kutoka kazi za kimwili tu hadi kazi zaidi ya kiakili inayohitaji ubunifu na uvumbuzi. Ingawa watumwa wangeweza kufanya kazi za kimwili chini ya vikwazo, hawakuweza kutumia vyema uwezo wao wa kiakili kwa ajili ya uvumbuzi wenye tija au utatuzi wa matatizo ya ubunifu. Kikwazo hiki cha msingi kilifanya mfumo wa watumwa usiendane na mahitaji ya kiuchumi yanayobadilika. Chaguzi zingine si sahihi kwa sababu maandishi yanabainisha haswa mahitaji ya kiakili kama jambo muhimu, si gharama za kiuchumi, harakati za kidini, au makubaliano ya biashara.
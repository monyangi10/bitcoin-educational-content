question: Vad var det som gjorde att slaveriet blev föråldrat och otillräckligt i takt med att de ekonomiska aktiviteterna utvecklades?
answer: De ekonomiska aktiviteterna blev mer intellektuella och krävde kreativitet och innovation som slavarna inte kunde tillhandahålla
wrong_answers:
  - Kostnaden för att hålla slavar blev för dyr jämfört med att anställa fria arbetare
  - Religiösa rörelser övertygade samhället om att slaveriet var moraliskt fel och borde avskaffas
  - Internationella handelsavtal gjorde det olagligt att använda slavarbete i produktionen
explanation: |
  Enligt texten blev slaveriet föråldrat när den ekonomiska verksamheten övergick från rent fysiska uppgifter till mer intellektuellt arbete som krävde kreativitet och innovation. Även om slavarna kunde utföra fysiska uppgifter under tvång, kunde de inte effektivt utnyttja sina mentala förmågor för produktiva uppfinningar eller kreativ problemlösning. Denna grundläggande begränsning gjorde slavsystemet oförenligt med de nya ekonomiska behoven. De andra alternativen är felaktiga eftersom texten specifikt identifierar intellektuella krav som den viktigaste faktorn, inte ekonomiska kostnader, religiösa rörelser eller handelsavtal.
question: Qu'est-ce qui a rendu l'esclavage obsolète et inadapté à l'évolution des activités économiques ?
answer: Les activités économiques sont devenues plus intellectuelles, exigeant une créativité et une innovation que les esclaves ne pouvaient pas fournir
wrong_answers:
  - Le coût de l'entretien des esclaves est devenu trop élevé par rapport à l'embauche de travailleurs libres
  - Les mouvements religieux ont convaincu la société que l'esclavage était moralement répréhensible et devait être aboli
  - Les accords commerciaux internationaux ont rendu illégal le recours à l'esclavage dans la production
explanation: |
  Selon le texte, l'esclavage est devenu obsolète lorsque les activités économiques se sont transformées, passant de tâches purement physiques à un travail plus intellectuel nécessitant créativité et innovation. Si les esclaves pouvaient accomplir des tâches physiques sous la contrainte, ils ne pouvaient pas engager efficacement leurs capacités mentales dans l'invention productive ou la résolution créative de problèmes. Cette limitation fondamentale rendait le système esclavagiste incompatible avec l'évolution des besoins économiques. Les autres options sont incorrectes car le texte identifie spécifiquement les exigences intellectuelles comme le facteur clé, et non les coûts économiques, les mouvements religieux ou les accords commerciaux.
question: Mikä sai orjuuden vanhentumaan ja muuttumaan riittämättömäksi taloudellisen toiminnan kehittyessä?
answer: Taloudellinen toiminta muuttui älyllisemmäksi ja vaati luovuutta ja innovatiivisuutta, jota orjat eivät voineet tarjota
wrong_answers:
  - Orjien ylläpitokustannukset tulivat liian kalliiksi verrattuna vapaiden työntekijöiden palkkaamiseen
  - Uskonnolliset liikkeet saivat yhteiskunnan vakuuttuneeksi siitä, että orjuus oli moraalisesti väärin ja että se olisi lakkautettava
  - Kansainväliset kauppasopimukset tekivät orjatyövoiman käytön tuotannossa laittomaksi
explanation: |
  Tekstin mukaan orjuus kävi tarpeettomaksi, kun taloudellinen toiminta muuttui puhtaasti fyysisistä tehtävistä enemmän luovuutta ja innovointia vaativaksi älylliseksi työksi. Vaikka orjat pystyivät suorittamaan fyysisiä tehtäviä rajoitetusti, he eivät pystyneet käyttämään tehokkaasti henkisiä kykyjään tuottavaan keksintöön tai luovaan ongelmanratkaisuun. Tämä perustavanlaatuinen rajoitus teki orjajärjestelmästä yhteensopimattoman kehittyvien taloudellisten tarpeiden kanssa. Muut vaihtoehdot ovat virheellisiä, koska tekstissä mainitaan nimenomaan älylliset vaatimukset keskeisenä tekijänä, ei taloudelliset kustannukset, uskonnolliset liikkeet tai kauppasopimukset.
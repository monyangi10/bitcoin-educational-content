question: O que fez com que a escravatura se tornasse obsoleta e inadequada à medida que as actividades económicas evoluíam?
answer: As actividades económicas tornaram-se mais intelectuais, exigindo criatividade e inovação que os escravos não podiam proporcionar
wrong_answers:
  - O custo de manutenção dos escravos tornou-se demasiado caro em comparação com a contratação de trabalhadores livres
  - Os movimentos religiosos convenceram a sociedade de que a escravatura era moralmente errada e devia ser abolida
  - Os acordos comerciais internacionais tornaram ilegal a utilização de trabalho escravo na produção
explanation: |
  De acordo com o texto, a escravatura tornou-se obsoleta quando as actividades económicas passaram de tarefas puramente físicas para um trabalho mais intelectual que exigia criatividade e inovação. Embora os escravos pudessem realizar tarefas físicas sob coação, não podiam utilizar eficazmente as suas capacidades mentais para a invenção produtiva ou a resolução criativa de problemas. Esta limitação fundamental tornava o sistema de escravatura incompatível com a evolução das necessidades económicas. As outras opções estão incorrectas porque o texto identifica especificamente as exigências intelectuais como o fator-chave, e não os custos económicos, os movimentos religiosos ou os acordos comerciais.
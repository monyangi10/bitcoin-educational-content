question: 経済活動の発展とともに、奴隷制度が時代遅れとなり、不適当となったのはなぜか？
answer: 経済活動はより知的なものとなり、奴隷にはできない創造性や革新性が求められるようになった。
wrong_answers:
  - 奴隷の維持費は、自由労働者を雇うのに比べて高すぎた。
  - 宗教運動は、奴隷制度は道徳的に間違っており、廃止されるべきであると社会に確信させた。
  - 国際貿易協定は、生産における奴隷労働の使用を違法とした。
explanation: |
  本文によれば、奴隷制度が廃れたのは、経済活動が純粋な肉体労働から、創造性と革新性を必要とする知的労働へと変化したときだという。奴隷は制約のもとで肉体労働をこなすことはできても、生産的な発明や創造的な問題解決のために精神的能力を効果的に働かせることはできなかった。この根本的な限界が、奴隷制度を進化する経済的ニーズと相容れないものにしていた。本文中では、経済的コストや宗教運動、貿易協定ではなく、知的需要が重要な要因であると明記されているため、他の選択肢は正しくない。
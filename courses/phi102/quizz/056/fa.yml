question: چه چیزی باعث شد که برده‌داری به عنوان فعالیت‌های اقتصادی منسوخ و ناکافی شود؟
answer: فعالیت‌های اقتصادی بیشتر فکری شدند و نیاز به خلاقیت و نوآوری داشتند که بردگان نمی‌توانستند ارائه دهند.
wrong_answers:
  - هزینه نگهداری بردگان در مقایسه با استخدام کارگران آزاد بسیار گران شد.
  - جنبش‌های مذهبی جامعه را متقاعد کردند که برده‌داری از نظر اخلاقی نادرست است و باید لغو شود.
  - توافق‌نامه‌های تجارت بین‌المللی استفاده از کار اجباری در تولید را غیرقانونی کرد.
explanation: |
  بر اساس متن، برده‌داری زمانی منسوخ شد که فعالیت‌های اقتصادی از وظایف صرفاً فیزیکی به کارهای فکری‌تر که نیاز به خلاقیت و نوآوری داشتند، تبدیل شدند. در حالی که بردگان می‌توانستند وظایف فیزیکی را تحت محدودیت انجام دهند، نمی‌توانستند به طور مؤثر ظرفیت‌های ذهنی خود را برای اختراع مولد یا حل خلاقانه مسائل به کار گیرند. این محدودیت اساسی باعث شد که سیستم برده‌داری با نیازهای اقتصادی در حال تحول ناسازگار باشد. گزینه‌های دیگر نادرست هستند زیرا متن به طور خاص نیازهای فکری را به عنوان عامل کلیدی شناسایی می‌کند، نه هزینه‌های اقتصادی، جنبش‌های مذهبی یا توافقات تجاری.
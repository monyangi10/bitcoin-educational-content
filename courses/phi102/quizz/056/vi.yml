question: Điều gì đã khiến chế độ nô lệ trở nên lỗi thời và không còn phù hợp khi các hoạt động kinh tế phát triển?
answer: Các hoạt động kinh tế trở nên mang tính trí tuệ hơn, đòi hỏi sự sáng tạo và đổi mới mà nô lệ không thể cung cấp.
wrong_answers:
  - Chi phí duy trì nô lệ trở nên quá đắt đỏ so với việc thuê lao động tự do.
  - Các phong trào tôn giáo đã thuyết phục xã hội rằng chế độ nô lệ là sai trái về mặt đạo đức và cần phải bị bãi bỏ.
  - Các hiệp định thương mại quốc tế đã quy định việc sử dụng lao động nô lệ trong sản xuất là bất hợp pháp.
explanation: |
  Theo văn bản, chế độ nô lệ trở nên lỗi thời khi các hoạt động kinh tế chuyển đổi từ những công việc thuần túy chân tay sang những công việc trí tuệ đòi hỏi sự sáng tạo và đổi mới. Mặc dù nô lệ có thể thực hiện các công việc chân tay dưới sự ràng buộc, nhưng họ không thể phát huy hiệu quả khả năng trí tuệ của mình để phát minh ra những sản phẩm hữu ích hoặc giải quyết vấn đề một cách sáng tạo. Hạn chế cơ bản này khiến hệ thống nô lệ không tương thích với nhu cầu kinh tế đang phát triển. Các lựa chọn khác đều không chính xác vì văn bản chỉ rõ nhu cầu trí tuệ là yếu tố then chốt, chứ không phải chi phí kinh tế, các phong trào tôn giáo hay các thỏa thuận thương mại.
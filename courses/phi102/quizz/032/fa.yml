question: طبق فصل، چرا امنیت به عنوان یک نیاز جهانی انسانی در نظر گرفته می‌شود؟
answer: زیرا هیچ فردی نیروی کافی برای تضمین حفاظت از خود در تمام طول زندگی‌اش ندارد
wrong_answers:
  - زیرا انسان‌ها به طور طبیعی تهاجمی هستند و نیاز به محافظت در برابر غرایز خشونت‌آمیز خود دارند
  - زیرا جامعه مدرن خطرات مصنوعی ایجاد کرده است که در زمان‌های ابتدایی وجود نداشتند
  - زیرا دولت‌ها عمداً مردم را برای کنترل سیاسی به حمایت دولت وابسته کرده‌اند.
explanation: |
  این فصل توضیح می‌دهد که امنیت یک نیاز جهانی است زیرا حتی قوی‌ترین فرد نیز در طول زندگی خود دوره‌هایی از آسیب‌پذیری را تجربه می‌کند. آن‌ها در کودکی قوی نبودند، در سنین پیری قوی نخواهند بود و حتی در اوج قدرت نیز در هنگام خواب، بیماری یا خستگی با لحظات ضعف مواجه می‌شوند. این آسیب‌پذیری ذاتی انسانی نیاز جهانی به امنیت جمعی و برقراری حاکمیت قانون را ایجاد می‌کند. گزینه‌های دیگر به اشتباه پیشنهاد می‌دهند که نیاز به امنیت ناشی از طبیعت انسانی، ایجاد خطرات توسط جامعه مدرن یا دستکاری دولت است، نه واقعیت زیستی بنیادی آسیب‌پذیری انسانی در طول عمر.
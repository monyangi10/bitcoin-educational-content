question: この章によれば、なぜ安全保障は人間の普遍的な欲求と考えられているのか？
answer: なぜなら、いかなる個人も、生涯を通じて自らの保護を確保するのに十分な力を持っていないからである。
wrong_answers:
  - 人間は生来攻撃的であり、暴力的な本能から身を守る必要があるからだ。
  - 現代社会は、原始時代には存在しなかった人工的な危険を作り出しているからだ。
  - 政府が意図的に、政治的統制のために国民を国家の保護に依存させたからだ。
explanation: |
  この章では、安全が普遍的な欲求であることを説明している。子供の頃は強くなかったし、年老いても強くはない。このような人間固有の脆弱性が、集団安全保障と法の支配の確立に対する普遍的な必要性を生み出している。他の選択肢は、安全保障の必要性が、生涯にわたる人間の脆弱性という根本的な生物学的現実ではなく、人間の本性、現代社会が作り出した危険、あるいは政府の操作に由来するものだと誤って示唆している。
question: Dukurikije ico kigabane, ni kubera iki umutekano ubonwa ko ari ikintu abantu bose bakeneye?
answer: Kubera ko ata muntu n’umwe afise inguvu zihagije zo kwikingira mu buzima bwiwe bwose .
wrong_answers:
  - Kubera ko abantu ari abanyarugomo mu kameremere kandi bakeneye gukingirwa n’akameremere kabo bwite k’ubukazi .
  - Kubera ko ikibano ca none caremye ingorane z’ubuhinga zitabaho mu bihe vya kera .
  - Kubera ko intwaro zatumye abantu bizigira n’ibigirankana uburinzi bwa Leta kugira ngo bashobore kugenzura politike .
explanation: |
  Ico kigabane kirasigura yuko umutekano ari ikintu abantu bose bakeneye kubera ko mbere n’umuntu akomeye cane agira ibihe vy’uguhungabana mu buzima bwiwe bwose. Ntibari bakomeye mu bwana, ntibazokomera mu myaka y’ubusaza, kandi mbere n’igihe bari ku rwego rwo hejuru rw’inkomezi barahura n’ibihe vy’ubugoyagoye mu gihe c’ugusinzira, c’indwara canke c’urushe. Ukwo guhungabana kw’abantu kwavukiyemwo gutuma abantu bose bakenera umutekano rusangi no gushinga ubutegetsi bw’amategeko. Ayandi mahitamwo yerekana mu buryo butari bwo ko ugukenera umutekano kuva ku kamere k’umuntu, ku kurema kw’akaga kw’ikibano ca none, canke ku gukoresha nabi Leta, aho kuva ku kuri kw’ishimikiro kw’ibinyabuzima kw’uguhungabana kw’umuntu mu kiringo cose c’ubuzima bwiwe.
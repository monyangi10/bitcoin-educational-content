question: Según el capítulo, ¿por qué se considera que la seguridad es una necesidad humana universal?
answer: Porque ningún individuo tiene fuerza suficiente para garantizar su propia protección durante toda su vida
wrong_answers:
  - Porque el ser humano es agresivo por naturaleza y necesita protegerse de sus propios instintos violentos
  - Porque la sociedad moderna ha creado peligros artificiales que no existían en la época primitiva
  - Porque los gobiernos han hecho que la gente dependa deliberadamente de la protección del Estado para el control político
explanation: |
  El capítulo explica que la seguridad es una necesidad universal porque incluso la persona más fuerte experimenta periodos de vulnerabilidad a lo largo de su vida. No fueron fuertes en la infancia, no lo serán en la vejez, e incluso en la cima de su fuerza se enfrentan a momentos de debilidad durante el sueño, la enfermedad o la fatiga. Esta vulnerabilidad inherente al ser humano crea una necesidad universal de seguridad colectiva y de establecimiento de un Estado de derecho. Las otras opciones sugieren incorrectamente que la necesidad de seguridad proviene de la naturaleza humana, de la creación de peligros por parte de la sociedad moderna o de la manipulación gubernamental, en lugar de la realidad biológica fundamental de la vulnerabilidad humana a lo largo de toda la vida.
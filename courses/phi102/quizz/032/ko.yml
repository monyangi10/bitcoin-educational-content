question: 이 장에 따르면 보안이 인간의 보편적인 욕구로 간주되는 이유는 무엇인가요?
answer: 개인이 평생 동안 스스로를 보호할 수 있는 충분한 힘을 가진 사람은 없기 때문입니다
wrong_answers:
  - 인간은 본능적으로 공격적이며 폭력적인 본능으로부터 보호받아야 하기 때문입니다
  - 현대 사회는 원시 시대에는 존재하지 않았던 인위적인 위험을 만들어 냈기 때문입니다
  - 정부가 의도적으로 정치적 통제를 위해 국민을 국가의 보호에 의존하게 만들었기 때문입니다
explanation: |
  이 장에서는 아무리 강한 사람이라도 일생 동안 취약한 시기를 경험하기 때문에 보안은 보편적인 필요라고 설명합니다. 어린 시절에는 강하지 않았고, 노년기에도 강하지 않을 것이며, 아무리 강하더라도 수면, 질병 또는 피로로 인해 약해지는 순간에 직면하게 됩니다. 이러한 인간의 내재적 취약성은 집단적 안전과 법치 확립에 대한 보편적 필요성을 야기합니다. 다른 옵션은 보안의 필요성이 인간의 전 생애에 걸친 근본적인 생물학적 취약성보다는 인간의 본성, 현대 사회가 만들어낸 위험, 정부의 조작에서 비롯된 것이라고 잘못 주장합니다.
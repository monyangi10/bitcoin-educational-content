question: Prema poglavlju, zašto se sigurnost smatra univerzalnom ljudskom potrebom?
answer: Zato što nijedna osoba nema dovoljno snage da osigura svoju zaštitu tokom celog svog života
wrong_answers:
  - Zato što su ljudi prirodno agresivni i treba im zaštita od sopstvenih nasilnih instinkata
  - Zato što je moderno društvo stvorilo veštačke opasnosti koje nisu postojale u primitivnim vremenima
  - Zato što su vlade namerno učinile ljude zavisnima od državne zaštite radi političke kontrole
explanation: |
  Poglavlje objašnjava da je sigurnost univerzalna potreba jer čak i najjača osoba doživljava periode ranjivosti tokom svog života. Nisu bili jaki u detinjstvu, neće biti jaki u starosti, a čak i na vrhuncu snage suočavaju se sa trenucima slabosti tokom sna, bolesti ili umora. Ova inherentna ljudska ranjivost stvara univerzalnu potrebu za kolektivnom sigurnošću i uspostavljanjem vladavine prava. Druge opcije pogrešno sugerišu da potreba za sigurnošću proizlazi iz ljudske prirode, stvaranja opasnosti u modernom društvu ili manipulacije od strane vlade, umesto iz osnovne biološke stvarnosti ljudske ranjivosti tokom životnog veka.
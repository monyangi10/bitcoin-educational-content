question: According to the chapter, why is security considered a universal human need?
answer: Because no individual has sufficient force to ensure their own protection throughout their entire life
wrong_answers:
  - Because humans are naturally aggressive and need protection from their own violent instincts
  - Because modern society has created artificial dangers that did not exist in primitive times
  - Because governments have deliberately made people dependent on state protection for political control
explanation: |
  The chapter explains that security is a universal need because even the strongest person experiences periods of vulnerability throughout their life. They were not strong in childhood, will not be strong in old age, and even at peak strength face moments of weakness during sleep, illness, or fatigue. This inherent human vulnerability creates a universal need for collective security and the establishment of rule of law. The other options incorrectly suggest that the need for security stems from human nature, modern society's creation of dangers, or government manipulation, rather than the fundamental biological reality of human vulnerability across the lifespan.

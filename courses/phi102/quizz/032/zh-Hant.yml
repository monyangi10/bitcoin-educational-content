question: 根據本章內容，為什麼安全被視為人類的普遍需求？
answer: 因為任何個人都沒有足夠的力量來確保其一生都受到保護
wrong_answers:
  - 因為人類天生具有攻擊性，需要保護自己免受暴力本能的傷害
  - 因為現代社會創造了原始時代不存在的人為危險
  - 因為政府刻意讓人民依賴國家保護來進行政治控制
explanation: |
  本章說明安全感是一種普遍的需求，因為即使是最堅強的人在一生中也會經歷脆弱的時期。他們在童年時並不強壯，到了老年也不會強壯，即使在最強壯的時候，也會在睡眠、生病或疲累時面臨虛弱的時刻。這種人類與生俱來的弱點造成了對集體安全和建立法治的普遍需求。其他選項錯誤地認為，對安全的需求源自於人性、現代社會製造的危險或政府的操縱，而非人類一生中脆弱的基本生理現實。
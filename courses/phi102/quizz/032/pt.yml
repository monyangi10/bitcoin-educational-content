question: De acordo com o capítulo, porque é que a segurança é considerada uma necessidade humana universal?
answer: Porque nenhum indivíduo dispõe de força suficiente para assegurar a sua própria proteção durante toda a sua vida
wrong_answers:
  - Porque os seres humanos são naturalmente agressivos e precisam de proteção contra os seus próprios instintos violentos
  - Porque a sociedade moderna criou perigos artificiais que não existiam nos tempos primitivos
  - Porque os governos tornaram deliberadamente as pessoas dependentes da proteção do Estado para o controlo político
explanation: |
  O capítulo explica que a segurança é uma necessidade universal porque mesmo a pessoa mais forte passa por períodos de vulnerabilidade ao longo da vida. Não foi forte na infância, não será forte na velhice e, mesmo no auge da sua força, enfrenta momentos de fraqueza durante o sono, a doença ou a fadiga. Esta vulnerabilidade humana inerente cria uma necessidade universal de segurança colectiva e de estabelecimento de um Estado de direito. As outras opções sugerem incorretamente que a necessidade de segurança decorre da natureza humana, da criação de perigos pela sociedade moderna ou da manipulação governamental, em vez da realidade biológica fundamental da vulnerabilidade humana ao longo da vida.
question: Proč je podle této kapitoly bezpečnost považována za univerzální lidskou potřebu?
answer: Protože žádný jednotlivec nemá dostatek sil, aby si zajistil vlastní ochranu po celý život
wrong_answers:
  - Protože lidé jsou od přírody agresivní a potřebují ochranu před vlastními násilnickými instinkty
  - Protože moderní společnost vytvořila umělá nebezpečí, která v primitivních dobách neexistovala
  - Protože vlády záměrně učinily lidi závislými na státní ochraně a politické kontrole
explanation: |
  Kapitola vysvětluje, že bezpečí je univerzální potřebou, protože i ten nejsilnější člověk zažívá během života období zranitelnosti. Nebyli silní v dětství, nebudou silní ve stáří a i na vrcholu sil čelí okamžikům slabosti během spánku, nemoci nebo únavy. Tato přirozená lidská zranitelnost vytváří univerzální potřebu kolektivní bezpečnosti a nastolení právního státu. Ostatní možnosti nesprávně naznačují, že potřeba bezpečnosti vyplývá z lidské přirozenosti, z nebezpečí, která vytváří moderní společnost, nebo z vládní manipulace, a nikoli ze základní biologické reality lidské zranitelnosti v průběhu celého života.
question: Luvun mukaan miksi turvallisuutta pidetään yleismaailmallisena inhimillisenä tarpeena?
answer: Koska kenelläkään yksilöllä ei ole riittävästi voimaa varmistaa omaa suojeluaan koko elämänsä ajan
wrong_answers:
  - Koska ihmiset ovat luonnostaan aggressiivisia ja tarvitsevat suojelua omilta väkivaltaisilta vaistoiltaan
  - Koska nyky-yhteiskunta on luonut keinotekoisia vaaroja, joita ei ollut olemassa alkuaikoina
  - Koska hallitukset ovat tietoisesti tehneet ihmiset riippuvaisiksi valtion suojelusta poliittisen kontrollin vuoksi
explanation: |
  Luvussa selitetään, että turvallisuus on yleismaailmallinen tarve, koska vahvimmatkin ihmiset kokevat haavoittuvuuden kausia koko elämänsä ajan. He eivät olleet vahvoja lapsuudessa, he eivät ole vahvoja vanhuudessa, ja jopa parhaimmillaan he kohtaavat heikkouden hetkiä unen, sairauden tai väsymyksen aikana. Tämä ihmisen luontainen haavoittuvuus luo universaalin tarpeen kollektiiviselle turvallisuudelle ja oikeusvaltioperiaatteen luomiselle. Muissa vaihtoehdoissa annetaan virheellisesti ymmärtää, että turvallisuuden tarve johtuu ihmisluonnosta, modernin yhteiskunnan luomista vaaroista tai hallituksen manipuloinnista, eikä niinkään perustavanlaatuisesta biologisesta todellisuudesta, joka on ihmisen haavoittuvuus koko eliniän ajan.
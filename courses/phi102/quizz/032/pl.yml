question: Według rozdziału, dlaczego bezpieczeństwo jest uważane za uniwersalną ludzką potrzebę?
answer: Ponieważ żadna osoba nie ma wystarczającej siły, aby zapewnić sobie ochronę przez całe życie
wrong_answers:
  - Ponieważ ludzie są z natury agresywni i potrzebują ochrony przed własnymi brutalnymi instynktami
  - Ponieważ współczesne społeczeństwo stworzyło sztuczne zagrożenia, które nie istniały w czasach pierwotnych
  - Ponieważ rządy celowo uzależniły ludzi od ochrony państwa w celu kontroli politycznej
explanation: |
  Rozdział ten wyjaśnia, że bezpieczeństwo jest uniwersalną potrzebą, ponieważ nawet najsilniejsza osoba doświadcza okresów słabości przez całe życie. Nie byli silni w dzieciństwie, nie będą silni w starszym wieku, a nawet u szczytu siły napotykają chwile słabości podczas snu, choroby lub zmęczenia. Ta nieodłączna ludzka słabość stwarza uniwersalną potrzebę zbiorowego bezpieczeństwa i ustanowienia rządów prawa. Pozostałe opcje błędnie sugerują, że potrzeba bezpieczeństwa wynika z ludzkiej natury, tworzenia zagrożeń przez współczesne społeczeństwo lub manipulacji rządowych, a nie z podstawowej rzeczywistości biologicznej ludzkiej podatności na zagrożenia przez całe życie.
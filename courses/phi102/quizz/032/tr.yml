question: Bu bölüme göre, güvenlik neden evrensel bir insan ihtiyacı olarak kabul edilmektedir?
answer: Çünkü hiçbir birey tüm yaşamı boyunca kendi korumasını sağlayacak yeterli güce sahip değildir
wrong_answers:
  - Çünkü insanlar doğal olarak saldırgandır ve kendi şiddet içgüdülerinden korunmaya ihtiyaç duyarlar
  - Çünkü modern toplum ilkel zamanlarda var olmayan yapay tehlikeler yaratmıştır
  - Çünkü hükümetler kasıtlı olarak insanları siyasi kontrol için devlet korumasına bağımlı hale getirmiştir
explanation: |
  Bu bölümde güvenliğin evrensel bir ihtiyaç olduğu, çünkü en güçlü insanın bile hayatı boyunca kırılganlık dönemleri yaşadığı anlatılmaktadır. Çocuklukta güçlü değillerdi, yaşlılıkta da güçlü olmayacaklar ve en güçlü oldukları zamanlarda bile uyku, hastalık veya yorgunluk sırasında zayıflık anlarıyla karşılaşacaklar. İnsanın doğasında var olan bu kırılganlık, kolektif güvenlik ve hukukun üstünlüğünün tesis edilmesi için evrensel bir ihtiyaç yaratır. Diğer seçenekler yanlış bir şekilde güvenlik ihtiyacının, insanın yaşamı boyunca kırılganlığının temel biyolojik gerçekliğinden ziyade insan doğasından, modern toplumun tehlikeler yaratmasından veya hükümet manipülasyonundan kaynaklandığını öne sürmektedir.
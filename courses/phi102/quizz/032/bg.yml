question: Защо според тази глава сигурността се смята за универсална човешка потребност?
answer: Тъй като никой не разполага с достатъчно сила, за да осигури собствената си защита през целия си живот
wrong_answers:
  - Защото хората по природа са агресивни и се нуждаят от защита от собствените си насилствени инстинкти
  - Защото съвременното общество е създало изкуствени опасности, които не са съществували в първобитните времена
  - Защото правителствата умишлено са направили хората зависими от държавната защита за политически контрол
explanation: |
  В главата се обяснява, че сигурността е универсална потребност, защото дори най-силните хора преживяват периоди на уязвимост през живота си. Те не са били силни в детството, няма да бъдат силни в напреднала възраст и дори в пика на силите си се сблъскват с моменти на слабост по време на сън, болест или умора. Тази присъща на човека уязвимост поражда универсална потребност от колективна сигурност и установяване на правова държава. Другите варианти неправилно внушават, че нуждата от сигурност произтича от човешката природа, от създадените от съвременното общество опасности или от правителствените манипулации, а не от фундаменталната биологична реалност на човешката уязвимост през целия живот.
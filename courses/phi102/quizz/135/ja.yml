question: 自由主義経済理論は、15世紀から16世紀にかけての紛争が、現代と比較して遠方の社会にとって経済的ダメージが少なかった主な理由として、何を挙げているのだろうか？
answer: 社会は比較的自給自足の生活を送り、交流圏が限られていたため、遠方からの混乱に対して脆弱ではなかった。
wrong_answers:
  - 軍事技術の破壊力が弱かったため、紛争による交易網の経済的混乱は最小限にとどまった。
  - 国際法は、何世紀も前の紛争時に、中立的な貿易相手国により良い保護を提供した。
  - それ以前は輸送コストが低かったため、戦争中に代替貿易相手を見つけるのが容易だった。
explanation: |
  利害の調和理論によれば、15世紀から16世紀にかけての紛争は、経済的相互依存が限定的であったため、遠く離れた社会に与える影響は最小限であった。社会はほぼ自給自足で、交流ネットワークは地理的に限定されていた。現代のグローバルな相互依存は、どこであれ混乱が生じれば世界的な交換の連鎖に影響を及ぼすことを意味し、紛争は世界経済のすべての参加者、たとえ非交戦国であっても、ますます大きな犠牲を強いることになる。
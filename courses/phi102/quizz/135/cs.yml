question: Co liberální ekonomická teorie označuje za hlavní důvod, proč byly konflikty v 15.-16. století pro vzdálené společnosti méně ekonomicky škodlivé než v moderní době?
answer: Společnosti žily v relativní soběstačnosti s omezenou směnnou sférou, což je činilo méně zranitelnými vůči vzdáleným poruchám
wrong_answers:
  - Vojenská technika byla méně ničivá, takže konflikty způsobovaly minimální ekonomické narušení obchodních sítí
  - Mezinárodní právo poskytovalo lepší ochranu neutrálním obchodním partnerům během konfliktů v dřívějších stoletích
  - Náklady na dopravu byly v dřívějších obdobích nižší, což usnadňovalo hledání alternativních obchodních partnerů během válek
explanation: |
  Podle teorie harmonie zájmů měly konflikty v 15.-16. století minimální dopad na vzdálené společnosti, protože vzájemná ekonomická závislost byla omezená. Společnosti byly do značné míry soběstačné a výměnné sítě byly geograficky omezené. Moderní globální vzájemná závislost znamená, že jakékoli narušení kdekoli ovlivní celosvětový řetězec výměny, takže konflikty jsou stále nákladnější pro všechny účastníky globální ekonomiky, dokonce i pro neválčící země.
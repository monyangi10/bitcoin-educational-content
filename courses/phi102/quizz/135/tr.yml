question: Liberal ekonomi teorisi, çatışmaların 15.-16. yüzyıllarda modern zamanlara kıyasla uzak toplumlara ekonomik olarak daha az zarar vermesinin temel nedeni olarak neyi tanımlamaktadır?
answer: Toplumlar, sınırlı değişim alanlarıyla göreceli olarak kendi kendilerine yeterlilik içinde yaşadılar ve bu da onları uzaktaki aksaklıklara karşı daha az savunmasız hale getirdi
wrong_answers:
  - Askeri teknoloji daha az yıkıcıydı, bu nedenle çatışmalar ticaret ağlarında minimum ekonomik bozulmaya neden oldu
  - Uluslararası hukuk, önceki yüzyıllardaki çatışmalar sırasında tarafsız ticaret ortakları için daha iyi koruma sağlamıştır
  - Daha önceki dönemlerde nakliye maliyetleri daha düşüktü, bu da savaşlar sırasında alternatif ticaret ortakları bulmayı kolaylaştırıyordu
explanation: |
  Çıkarların uyumu teorisine göre, 15-16. yüzyıllardaki çatışmaların uzak toplumlar üzerindeki etkisi asgari düzeydeydi çünkü ekonomik karşılıklı bağımlılık sınırlıydı. Toplumlar büyük ölçüde kendi kendilerine yeterliydi ve değişim ağları coğrafi olarak sınırlıydı. Modern küresel karşılıklı bağımlılık, herhangi bir yerdeki herhangi bir aksaklığın dünya çapındaki değişim zincirini etkilemesi anlamına gelir ve bu da çatışmaları küresel ekonomideki tüm katılımcılar, hatta savaşmayan ülkeler için bile giderek daha maliyetli hale getirir.
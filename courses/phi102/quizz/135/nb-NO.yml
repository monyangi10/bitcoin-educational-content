question: Hva er ifølge liberal økonomisk teori den viktigste grunnen til at konflikter var mindre økonomisk skadelige for fjerne samfunn på 1400-1600-tallet enn i moderne tid?
answer: Samfunnene levde i relativ selvforsyning med begrensede utvekslingssfærer, noe som gjorde dem mindre sårbare for forstyrrelser langt borte
wrong_answers:
  - Den militære teknologien var mindre ødeleggende, så konfliktene førte til minimale økonomiske forstyrrelser i handelsnettverkene
  - Folkeretten ga bedre beskyttelse for nøytrale handelspartnere under konflikter i tidligere århundrer
  - Transportkostnadene var lavere i tidligere perioder, noe som gjorde det lettere å finne alternative handelspartnere under kriger
explanation: |
  Ifølge teorien om harmoni mellom interesser hadde konflikter på 1400- og 1500-tallet minimal innvirkning på fjerntliggende samfunn fordi den gjensidige økonomiske avhengigheten var begrenset. Samfunnene var i stor grad selvforsynte, og utvekslingsnettverkene var geografisk begrensede. I moderne tid betyr gjensidig global avhengighet at enhver forstyrrelse hvor som helst påvirker den verdensomspennende utvekslingskjeden, noe som gjør konflikter stadig mer kostbare for alle deltakerne i den globale økonomien, selv for ikke-krigførende nasjoner.
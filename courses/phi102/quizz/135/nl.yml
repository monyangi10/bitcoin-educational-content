question: Wat is volgens de liberale economische theorie de belangrijkste reden waarom conflicten minder economische schade toebrachten aan verre samenlevingen in de 15e-16e eeuw in vergelijking met de moderne tijd?
answer: Samenlevingen leefden in relatieve zelfvoorziening met beperkte uitwisselingsgebieden, waardoor ze minder kwetsbaar waren voor verstoringen op afstand
wrong_answers:
  - Militaire technologie was minder destructief, dus conflicten veroorzaakten minimale economische verstoring van handelsnetwerken
  - Het internationaal recht bood betere bescherming aan neutrale handelspartners tijdens conflicten in vroegere eeuwen
  - Transportkosten waren lager in vroegere perioden, waardoor het gemakkelijker was om alternatieve handelspartners te vinden tijdens oorlogen
explanation: |
  Volgens de theorie van de harmonie van belangen hadden conflicten in de 15e-16e eeuw een minimale impact op verre samenlevingen omdat de economische onderlinge afhankelijkheid beperkt was. Samenlevingen waren grotendeels zelfvoorzienend en uitwisselingsnetwerken waren geografisch beperkt. Moderne wereldwijde onderlinge afhankelijkheid betekent dat elke verstoring waar dan ook de wereldwijde uitwisselingsketen beïnvloedt, waardoor conflicten steeds kostbaarder worden voor alle deelnemers aan de wereldeconomie, zelfs voor niet-strijdende naties.
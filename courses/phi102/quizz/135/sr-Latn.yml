question: Koja je glavna razlika između liberalne ekonomske teorije i drugih teorija u pogledu uticaja sukoba na udaljena društva u 15. i 16. veku u poređenju sa savremenim vremenima?
answer: Društva su živela u relativnoj samodovoljnosti sa ograničenim sferama razmene, što ih je činilo manje podložnim udaljenim poremećajima.
wrong_answers:
  - Vojna tehnologija bila je manje destruktivna, pa su sukobi izazivali minimalne ekonomske poremećaje u trgovačkim mrežama.
  - Međunarodno pravo je pružalo bolju zaštitu neutralnim trgovinskim partnerima tokom sukoba u ranijim vekovima.
  - Troškovi transporta su bili niži u ranijim periodima, što je olakšavalo pronalaženje alternativnih trgovinskih partnera tokom ratova.
explanation: |
  Prema teoriji harmonije interesa, sukobi u 15.-16. veku imali su minimalan uticaj na udaljena društva jer je ekonomska međuzavisnost bila ograničena. Društva su bila uglavnom samodovoljna, a mreže razmene bile su geografski ograničene. Savremena globalna međuzavisnost znači da bilo kakav poremećaj bilo gde utiče na svetski lanac razmene, čineći sukobe sve skupljim za sve učesnike u globalnoj ekonomiji, čak i za nebeličarske nacije.
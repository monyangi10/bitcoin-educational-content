question: Qual è la ragione principale che la teoria economica liberale individua nel fatto che i conflitti erano meno dannosi economicamente per le società lontane nel XV-XVI secolo rispetto all'epoca moderna?
answer: Le società vivevano in una relativa autosufficienza con sfere di scambio limitate, che le rendevano meno vulnerabili alle perturbazioni lontane
wrong_answers:
  - La tecnologia militare era meno distruttiva, quindi i conflitti causavano una minima perturbazione economica delle reti commerciali
  - Il diritto internazionale ha fornito una migliore protezione ai partner commerciali neutrali durante i conflitti dei secoli precedenti
  - I costi di trasporto erano più bassi nei periodi precedenti, rendendo più facile trovare partner commerciali alternativi durante le guerre
explanation: |
  Secondo la teoria dell'armonia degli interessi, i conflitti del XV-XVI secolo hanno avuto un impatto minimo sulle società lontane perché l'interdipendenza economica era limitata. Le società erano ampiamente autosufficienti e le reti di scambio erano geograficamente limitate. L'interdipendenza globale moderna fa sì che qualsiasi perturbazione in qualsiasi luogo influisca sulla catena di scambio mondiale, rendendo i conflitti sempre più costosi per tutti i partecipanti all'economia globale, anche per le nazioni non belligeranti.
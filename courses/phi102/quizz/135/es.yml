question: ¿Cuál es, según la teoría económica liberal, la razón principal por la que los conflictos eran menos perjudiciales económicamente para las sociedades distantes en los siglos XV-XVI en comparación con los tiempos modernos?
answer: Las sociedades vivían en relativa autosuficiencia con esferas de intercambio limitadas, lo que las hacía menos vulnerables a perturbaciones lejanas
wrong_answers:
  - La tecnología militar era menos destructiva, por lo que los conflictos causaban un trastorno económico mínimo a las redes comerciales
  - En siglos anteriores, el Derecho internacional protegía mejor a los socios comerciales neutrales durante los conflictos
  - Los costes de transporte eran más bajos en épocas anteriores, lo que facilitaba la búsqueda de socios comerciales alternativos durante las guerras
explanation: |
  Según la teoría de la armonía de intereses, los conflictos de los siglos XV-XVI tuvieron un impacto mínimo en las sociedades distantes porque la interdependencia económica era limitada. Las sociedades eran en gran medida autosuficientes y las redes de intercambio estaban restringidas geográficamente. La interdependencia global moderna significa que cualquier perturbación en cualquier lugar afecta a la cadena mundial de intercambio, lo que hace que los conflictos sean cada vez más costosos para todos los participantes en la economía global, incluso para las naciones no beligerantes.
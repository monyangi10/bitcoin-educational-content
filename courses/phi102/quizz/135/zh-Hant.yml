question: 自由經濟理論認為，與現代相比，15-16 世紀的衝突對遙遠社會造成的經濟損害較小的主要原因是什麼？
answer: 社會生活相對自給自足，交換範圍有限，因此較不容易受到遠方干擾的影響
wrong_answers:
  - 軍事技術的破壞力較低，因此衝突對貿易網路造成的經濟破壞極小
  - 在早幾世紀的衝突中，國際法為中立的貿易夥伴提供了更好的保護
  - 早期的運輸成本較低，因此在戰爭期間較容易找到其他貿易夥伴。
explanation: |
  根據利益和諧理論，15-16 世紀的衝突對遠方社會的影響極小，因為經濟上的相互依賴是有限的。當時的社會大體上是自給自足的，交流網路也受到地理上的限制。現代的全球相互依存意味著任何地方的破壞都會影響到全球的交換鏈，使得衝突對全球經濟的所有參與者，甚至是非交戰國的代價越來越高。
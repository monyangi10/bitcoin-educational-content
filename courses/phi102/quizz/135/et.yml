question: Mida nimetab liberaalne majandusteooria peamiseks põhjuseks, miks konfliktid olid 15.-16. sajandil kaugetele ühiskondadele majanduslikult vähem kahjulikud kui tänapäeval?
answer: Ühiskonnad elasid suhteliselt iseseisvalt ja piiratud vahetussfääridega, mis muutis nad vähem haavatavaks kaugete häirete suhtes
wrong_answers:
  - Sõjaline tehnoloogia oli vähem hävitav, mistõttu konfliktid põhjustasid kaubandusvõrkudele minimaalseid majanduslikke häireid
  - Rahvusvaheline õigus pakkus varasemate sajandite konfliktide ajal neutraalsetele kaubanduspartneritele paremat kaitset
  - Varasematel perioodidel olid transpordikulud madalamad, mistõttu oli sõdade ajal lihtsam leida alternatiivseid kaubanduspartnereid
explanation: |
  Huvide harmoonia teooria kohaselt oli 15.-16. sajandi konfliktidel minimaalne mõju kaugetele ühiskondadele, sest majanduslik vastastikune sõltuvus oli piiratud. Ühiskonnad olid suures osas iseseisvad ja vahetusvõrgustikud olid geograafiliselt piiratud. Tänapäevane ülemaailmne vastastikune sõltuvus tähendab, et iga häire kus tahes mõjutab ülemaailmset vahetusahelat, mis muudab konfliktid üha kulukamaks kõigile maailmamajanduses osalejatele, isegi mittesõdivatele riikidele.
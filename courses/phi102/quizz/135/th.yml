question: ทฤษฎีเศรษฐศาสตร์เสรีระบุว่าเหตุผลหลักที่ทำให้ความขัดแย้งส่งผลกระทบทางเศรษฐกิจน้อยกว่าสำหรับสังคมที่อยู่ห่างไกลในศตวรรษที่ 15-16 เมื่อเทียบกับยุคปัจจุบันคืออะไร?
answer: สังคมดำรงชีวิตด้วยความพอเพียงในตัวเองโดยมีวงจรการแลกเปลี่ยนที่จำกัด ทำให้พวกเขามีความเสี่ยงต่อการหยุดชะงักจากระยะไกลน้อยลง
wrong_answers:
  - เทคโนโลยีทางทหารมีความทำลายน้อยกว่า ดังนั้นความขัดแย้งจึงก่อให้เกิดการหยุดชะงักทางเศรษฐกิจต่อเครือข่ายการค้าน้อยที่สุด
  - กฎหมายระหว่างประเทศให้การคุ้มครองที่ดีกว่าสำหรับคู่ค้าที่ยังคงเป็นกลางในช่วงความขัดแย้งในศตวรรษก่อนหน้า
  - ต้นทุนการขนส่งต่ำกว่าในช่วงก่อนหน้านี้ ทำให้ง่ายต่อการหาคู่ค้าทางเลือกในช่วงสงคราม
explanation: |
  ตามทฤษฎีความกลมกลืนของผลประโยชน์ ความขัดแย้งในศตวรรษที่ 15-16 มีผลกระทบเพียงเล็กน้อยต่อสังคมที่อยู่ห่างไกล เนื่องจากการพึ่งพาทางเศรษฐกิจมีจำกัด สังคมส่วนใหญ่พึ่งพาตนเองและเครือข่ายการแลกเปลี่ยนถูกจำกัดทางภูมิศาสตร์ การพึ่งพาอาศัยกันทั่วโลกในปัจจุบันหมายความว่าการหยุดชะงักใด ๆ ที่เกิดขึ้นที่ใดก็ตามจะส่งผลต่อห่วงโซ่การแลกเปลี่ยนทั่วโลก ทำให้ความขัดแย้งมีค่าใช้จ่ายเพิ่มขึ้นสำหรับผู้เข้าร่วมทุกคนในเศรษฐกิจโลก แม้แต่ประเทศที่ไม่ได้เป็นคู่สงคราม
question: Коя е основната причина според либералната икономическа теория конфликтите да нанасят по-малки икономически щети на отдалечените общества през XV-XVI в. в сравнение със съвременността?
answer: Обществата са живеели в относителна самодостатъчност с ограничени сфери на обмен, което ги е правело по-малко уязвими към далечни смущения
wrong_answers:
  - Военните технологии са по-малко разрушителни, така че конфликтите причиняват минимални икономически смущения в търговските мрежи
  - Международното право е осигурявало по-добра защита на неутралните търговски партньори по време на конфликти през предишните векове
  - Транспортните разходи са били по-ниски в по-ранни периоди, което е улеснило намирането на алтернативни търговски партньори по време на войни
explanation: |
  Според теорията за хармонията на интересите конфликтите през XV-XVI в. са имали минимално въздействие върху отдалечените общества, тъй като икономическата взаимозависимост е била ограничена. Обществата са били до голяма степен самодостатъчни, а мрежите за обмен са били географски ограничени. Съвременната глобална взаимозависимост означава, че всяко смущение където и да е се отразява на световната верига за обмен, което прави конфликтите все по-скъпи за всички участници в световната икономика, дори за невоюващите държави.
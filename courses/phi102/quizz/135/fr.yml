question: Quelle est, selon la théorie économique libérale, la principale raison pour laquelle les conflits ont été moins dommageables économiquement pour les sociétés éloignées aux XVe et XVIe siècles qu'à l'époque moderne ?
answer: Les sociétés vivaient en relative autarcie avec des sphères d'échange limitées, ce qui les rendait moins vulnérables aux perturbations lointaines
wrong_answers:
  - La technologie militaire étant moins destructrice, les conflits n'entraînent qu'une perturbation économique minimale des réseaux commerciaux
  - Le droit international offrait une meilleure protection aux partenaires commerciaux neutres lors des conflits des siècles précédents
  - Les coûts de transport étaient moins élevés dans les périodes antérieures, ce qui permettait de trouver plus facilement d'autres partenaires commerciaux pendant les guerres
explanation: |
  Selon la théorie de l'harmonie des intérêts, les conflits des 15e et 16e siècles n'ont eu qu'un impact minimal sur les sociétés éloignées, car l'interdépendance économique était limitée. Les sociétés étaient largement autosuffisantes et les réseaux d'échange étaient géographiquement restreints. L'interdépendance mondiale moderne signifie que toute perturbation, où qu'elle se produise, affecte la chaîne d'échange mondiale, rendant les conflits de plus en plus coûteux pour tous les participants à l'économie mondiale, même pour les nations non belligérantes.
question: Apa yang diidentifikasi oleh teori ekonomi liberal sebagai alasan utama mengapa konflik tidak terlalu merusak secara ekonomi bagi masyarakat yang jauh di abad ke-15 dan 16 dibandingkan dengan zaman modern?
answer: Masyarakat hidup dalam swasembada relatif dengan lingkungan pertukaran yang terbatas, membuat mereka kurang rentan terhadap gangguan yang jauh
wrong_answers:
  - Teknologi militer tidak terlalu merusak, sehingga konflik hanya menyebabkan gangguan ekonomi yang minimal terhadap jaringan perdagangan
  - Hukum internasional memberikan perlindungan yang lebih baik bagi mitra dagang yang netral selama konflik di abad-abad sebelumnya
  - Biaya transportasi lebih rendah pada periode sebelumnya, sehingga lebih mudah untuk menemukan mitra dagang alternatif selama perang
explanation: |
  Menurut teori keselarasan kepentingan, konflik pada abad ke-15 hingga ke-16 memiliki dampak minimal pada masyarakat yang jauh karena saling ketergantungan ekonomi yang terbatas. Masyarakat sebagian besar mandiri dan jaringan pertukaran dibatasi secara geografis. Saling ketergantungan global modern berarti gangguan apa pun di mana pun akan memengaruhi rantai pertukaran di seluruh dunia, sehingga konflik menjadi semakin mahal bagi semua peserta dalam ekonomi global, bahkan bagi negara-negara yang tidak berperang.
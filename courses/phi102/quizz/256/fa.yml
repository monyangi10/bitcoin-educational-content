question: چه اصل بنیادی باید راهنمای ایجاد امنیت بین‌المللی بر اساس دکترین لیبرال ارائه‌شده باشد؟
answer: به رسمیت شناختن آزادی عمل در حالی که نقض‌های آن آزادی را از طریق یک قانون بین‌المللی تحریم می‌کند
wrong_answers:
  - ایجاد دولت‌های حاکم قدرتمند قادر به اجرای تمامیت ارضی و وحدت فرهنگی
  - ایجاد ترتیبات امنیت جمعی بر اساس وابستگی‌های زبانی و فرهنگی مشترک بین کشورها
  - تشکیل سازمان‌های بین‌المللی سلسله‌مراتبی که می‌توانند در صورت لزوم بر حاکمیت فردی کشورها غلبه کنند
explanation: |
  متن تأکید می‌کند که امنیت بین‌المللی باید بر اساس شناسایی آزادی فردی باشد در حالی که حملات به آن آزادی را تحریم می‌کند، مشابه چگونگی عملکرد قانون داخلی. این بازتاب‌دهنده اصل اساسی لیبرال است که امنیت برای حفاظت از روابط انسانی داوطلبانه و آزادی بی‌گناه وجود دارد. پاسخ‌های نادرست نمایانگر رویکردهای جمع‌گرایانه‌ای هستند که قدرت دولت، وحدت فرهنگی یا کنترل سلسله‌مراتبی را بر آزادی فردی اولویت می‌دهند - که همه این‌ها با دکترین اساسی لیبرال که افراد، نه جمع‌ها، پایه و اساس سازمان سیاسی مشروع هستند، در تضاد است.
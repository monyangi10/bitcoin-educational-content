question: Que princípio fundamental deve orientar a criação da segurança internacional de acordo com a doutrina liberal apresentada?
answer: Reconhecimento da liberdade de ação, sancionando simultaneamente as violações dessa liberdade através de um Estado de direito internacional
wrong_answers:
  - Criação de Estados soberanos poderosos, capazes de fazer respeitar a integridade territorial e a unidade cultural
  - Criação de dispositivos de segurança colectiva baseados nas afinidades linguísticas e culturais partilhadas entre as nações
  - Formação de organizações internacionais hierárquicas que podem sobrepor-se à soberania de cada Estado quando necessário
explanation: |
  O texto sublinha que a segurança internacional deve basear-se no reconhecimento da liberdade individual, sancionando simultaneamente os ataques a essa liberdade, à semelhança do funcionamento do direito interno. Isto reflecte o princípio liberal fundamental de que a segurança existe para proteger as relações humanas voluntárias e a liberdade inocente. As respostas erradas representam abordagens colectivistas que dão prioridade ao poder do Estado, à unidade cultural ou ao controlo hierárquico em detrimento da liberdade individual - todas elas contradizem a doutrina liberal fundamental de que os indivíduos, e não os colectivos, são a base da organização política legítima.
question: 根据提出的自由主义理论，建立国际安全应遵循什么基本原则？
answer: 承认行动自由，同时通过国际法治制裁侵犯这种自由的行为
wrong_answers:
  - 建立有能力维护领土完整和文化统一的强大主权国家
  - 在国家间共同语言和文化亲缘关系的基础上建立集体安全安排
  - 形成等级森严的国际组织，必要时可凌驾于单个国家主权之上
explanation: |
  案文强调，国际安全必须以承认个人自由为基础，同时制裁对这种自由的攻击，这与国内法的运作方式类似。这反映了自由主义的核心原则，即安全的存在是为了保护自愿的人类关系和无辜的自由。错误答案代表的是集体主义方法，这种方法将国家权力、文化统一或等级控制置于个人自由之上--所有这些都违背了基本的自由主义理论，即个人而非集体是合法政治组织的基础。
question: 根據所提出的自由主義理論，創造國際安全應該遵循什麼基本原則？
answer: 承認行動自由，同時透過國際法治制裁違反該自由的行為
wrong_answers:
  - 建立強大的主權國家，能強制執行領土完整與文化統一
  - 在國家間共同語言和文化親和力的基礎上建立集體安全安排
  - 形成分等級的國際組織，必要時可以凌駕個別國家的主權
explanation: |
  案文強調，國際安全必須建基於承認個人自由，同時制裁對自由的攻擊，類似於國內法應該如何運作。這反映了自由主義的核心原則，即安全的存在是為了保護自願的人際關係和無辜的自由。錯誤的答案代表集體主義的方法，將國家權力、文化統一或階級控制放在個人自由之上 - 所有這些都違反了基本的自由主義理論，即個人而非集體是合法政治組織的基礎。
question: Welk basisprincipe zou volgens de gepresenteerde liberale doctrine de leidraad moeten zijn bij het creëren van internationale veiligheid?
answer: Erkenning van vrijheid van handelen en tegelijkertijd bestraffing van schendingen van die vrijheid door middel van een internationale rechtsorde
wrong_answers:
  - Oprichting van machtige soevereine staten die in staat zijn territoriale integriteit en culturele eenheid af te dwingen
  - Creëren van collectieve veiligheidsafspraken gebaseerd op gedeelde linguïstische en culturele affiniteiten tussen naties
  - Vorming van hiërarchische internationale organisaties die de soevereiniteit van individuele staten kunnen opheffen wanneer dat nodig is
explanation: |
  De tekst benadrukt dat internationale veiligheid gebaseerd moet zijn op het erkennen van individuele vrijheid en het bestraffen van aanvallen op die vrijheid, vergelijkbaar met hoe het nationale recht zou moeten functioneren. Dit weerspiegelt het liberale kernprincipe dat veiligheid bestaat om vrijwillige menselijke relaties en onschuldige vrijheid te beschermen. De foute antwoorden vertegenwoordigen collectivistische benaderingen die voorrang geven aan staatsmacht, culturele eenheid of hiërarchische controle boven individuele vrijheid - allemaal in tegenspraak met de fundamentele liberale doctrine dat individuen, en niet collectieven, de basis zijn van legitieme politieke organisatie.
question: Какой фундаментальный принцип должен лежать в основе создания международной безопасности в соответствии с представленной либеральной доктриной?
answer: Признание свободы действий при одновременном наказании за нарушение этой свободы с помощью международного правопорядка
wrong_answers:
  - Создание мощных суверенных государств, способных обеспечить территориальную целостность и культурное единство
  - Создание механизмов коллективной безопасности, основанных на общих языковых и культурных связях между странами
  - Формирование иерархических международных организаций, способных при необходимости отменить суверенитет отдельных государств
explanation: |
  В тексте подчеркивается, что международная безопасность должна основываться на признании свободы личности и одновременно на наказании за посягательства на эту свободу, подобно тому, как должно функционировать внутреннее право. Это отражает основной либеральный принцип, согласно которому безопасность существует для защиты добровольных человеческих отношений и невинной свободы. Неправильные ответы представляют коллективистские подходы, в которых приоритет отдается государственной власти, культурному единству или иерархическому контролю над индивидуальной свободой - все это противоречит фундаментальной либеральной доктрине, согласно которой основой легитимной политической организации являются индивиды, а не коллективы.
question: Ni kanuni gani ya msingi inayopaswa kuongoza uundaji wa usalama wa kimataifa kulingana na mafundisho ya kiliberali yanayowasilishwa?
answer: Kutambua uhuru wa kutenda huku ukiidhinisha ukiukwaji wa uhuru huo kupitia utawala wa sheria wa kimataifa
wrong_answers:
  - Kuanzishwa kwa mataifa huru yenye nguvu yanayoweza kutekeleza uadilifu wa eneo na umoja wa kitamaduni
  - Uundaji wa mipango ya usalama ya pamoja kulingana na uhusiano wa lugha na utamaduni kati ya mataifa
  - Uundaji wa mashirika ya kimataifa ya kihierarkia ambayo yanaweza kupuuza uhuru wa serikali ya mtu binafsi inapohitajika
explanation: |
  Maandishi hayo yanasisitiza kwamba usalama wa kimataifa lazima utegemee kutambua uhuru wa mtu binafsi huku ukiidhinisha mashambulizi dhidi ya uhuru huo, sawa na jinsi sheria ya ndani inavyopaswa kufanya kazi. Hii inaonyesha kanuni kuu ya kiliberali kwamba usalama upo ili kulinda mahusiano ya kibinadamu ya hiari na uhuru usio na hatia. Majibu yasiyo sahihi yanawakilisha mbinu za kikomunisti zinazopa kipaumbele nguvu ya serikali, umoja wa kitamaduni, au udhibiti wa kihierarkia juu ya uhuru wa mtu binafsi - yote ambayo yanapingana na mafundisho ya msingi ya kiliberali kwamba watu binafsi, si vyama vya pamoja, ndio msingi wa shirika halali la kisiasa.
question: Koji fundamentalni princip treba da vodi stvaranje međunarodne bezbednosti prema liberalnoj doktrini koja je predstavljena?
answer: Priznavanje slobode delovanja uz sankcionisanje kršenja te slobode kroz međunarodno pravno pravilo
wrong_answers:
  - Uspostavljanje moćnih suverenih država sposobnih za sprovođenje teritorijalnog integriteta i kulturnog jedinstva
  - Stvaranje kolektivnih bezbednosnih aranžmana zasnovanih na zajedničkim jezičkim i kulturnim afinitetima između nacija
  - Formiranje hijerarhijskih međunarodnih organizacija koje mogu nadjačati suverenitet pojedinačnih država kada je to potrebno
explanation: |
  Tekst naglašava da međunarodna sigurnost mora biti zasnovana na priznavanju individualne slobode uz sankcionisanje napada na tu slobodu, slično kao što bi domaće pravo trebalo da funkcioniše. Ovo odražava suštinski liberalni princip da sigurnost postoji kako bi zaštitila dobrovoljne ljudske odnose i nevinu slobodu. Pogrešni odgovori predstavljaju kolektivističke pristupe koji daju prioritet državnoj moći, kulturnom jedinstvu ili hijerarhijskoj kontroli nad individualnom slobodom - sve što je u suprotnosti sa fundamentalnom liberalnom doktrinom da su pojedinci, a ne kolektivi, osnova legitimne političke organizacije.
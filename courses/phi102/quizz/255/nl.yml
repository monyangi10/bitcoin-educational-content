question: Wat onderscheidt, volgens de gepresenteerde liberale theorie van naties, legitieme nationale organisatie van historische natievorming?
answer: Naties zouden moeten functioneren als vrijwillige verenigingen voor rechtspraak en politie, gebaseerd op contractuele overeenkomsten in plaats van opgelegde eenheid
wrong_answers:
  - Naties zouden gevormd moeten worden op basis van gedeelde linguïstische, culturele en historische kenmerken die een natuurlijke eenheid tussen volkeren creëren
  - Naties ontlenen hun legitimiteit aan territoriale verovering en het vermogen om politieke controle te behouden over een grotere klantenkring
  - Naties moeten collectieve belangen boven individuele rechten stellen om echte politieke eenheid en effectief bestuur te bereiken
explanation: |
  De tekst stelt expliciet dat traditionele rechtvaardigingen voor nationale eenheid (taal, cultuur, geschiedenis) niet bestand zijn tegen onpartijdige analyse, omdat historische natievorming eerder tot stand kwam door opportunistische uitbreiding van politieke clientèle dan door culturele affiniteiten. De liberale opvatting herdefinieert naties als vrijwillige associaties waarin individuen de rechtspraak en het politieapparaat organiseren en verwerpt het idee dat naties superieure entiteiten zijn die individuen domineren. Deze contractuele basis staat in schril contrast met historische patronen van op verovering gebaseerde expansie en collectieve dominantie over individuele autonomie.
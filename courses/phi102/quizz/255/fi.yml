question: Esitetyn liberaalin kansojen teorian mukaan mikä erottaa legitiimin kansallisen järjestäytymisen historiallisesta kansakunnan muodostumisesta?
answer: Kansakuntien olisi toimittava vapaaehtoisina yhdistyksinä, jotka hallinnoivat oikeutta ja poliisitoimintaa ja jotka perustuvat sopimuksiin eikä pakotettuun yhtenäisyyteen
wrong_answers:
  - Kansakunnat olisi muodostettava sellaisten yhteisten kielellisten, kulttuuristen ja historiallisten ominaisuuksien perusteella, jotka luovat kansojen välille luonnollisen yhtenäisyyden
  - Kansakunnat saavat legitimiteettinsä aluevaltauksista ja kyvystä ylläpitää poliittista valtaa laajentuneessa asiakaskunnassa
  - Kansakuntien on asetettava yhteiset edut yksilön oikeuksien edelle, jotta saavutetaan todellinen poliittinen yhtenäisyys ja tehokas hallinto
explanation: |
  Tekstissä väitetään nimenomaisesti, että perinteiset perustelut kansalliselle yhtenäisyydelle (kieli, kulttuuri, historia) eivät kestä puolueetonta analyysia, sillä historiallinen kansakunnan muodostuminen tapahtui pikemminkin poliittisen asiakaskunnan opportunistisen laajentumisen kuin kulttuuristen sukulaisuuksien kautta. Liberaali käsitys muotoilee kansakunnat uudelleen vapaaehtoisiksi yhteenliittymiksi, joissa yksilöt järjestävät oikeuslaitoksen ja poliisihallinnon, ja hylkää käsityksen, jonka mukaan kansakunnat ovat ylivertaisia kokonaisuuksia, jotka hallitsevat yksilöitä. Tämä sopimuksellinen perusta on jyrkässä ristiriidassa historiallisten mallien kanssa, joissa valloituksiin perustuva laajeneminen ja kollektiivinen ylivalta yksilön autonomian sijaan ovat olleet keskeisiä.
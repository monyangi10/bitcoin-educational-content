question: Según la teoría liberal de las naciones presentada, ¿qué distingue la organización nacional legítima de la formación histórica de naciones?
answer: Las naciones deben funcionar como asociaciones voluntarias para administrar justicia y policía, basadas en acuerdos contractuales y no en una unidad impuesta
wrong_answers:
  - Las naciones deben formarse sobre la base de características lingüísticas, culturales e históricas comunes que creen una unidad natural entre los pueblos
  - Las naciones obtienen su legitimidad de la conquista territorial y de la capacidad de mantener el control político sobre poblaciones clientelares ampliadas
  - Las naciones deben dar prioridad a los intereses colectivos sobre los derechos individuales para lograr una verdadera unidad política y una gobernanza eficaz
explanation: |
  El texto argumenta explícitamente que las justificaciones tradicionales de la unidad nacional (lengua, cultura, historia) no resisten un análisis imparcial, ya que la formación histórica de las naciones se produjo a través de la expansión oportunista de la clientela política y no de afinidades culturales. La concepción liberal replantea las naciones como asociaciones voluntarias en las que los individuos organizan la administración de justicia y policía, rechazando la noción de que las naciones son entidades superiores que dominan a los individuos. Esta base contractual contrasta fuertemente con los patrones históricos de expansión basada en la conquista y el dominio colectivo sobre la autonomía individual.
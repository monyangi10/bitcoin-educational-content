question: 根据所提出的自由主义民族理论，合法的民族组织与历史上的民族形成有何区别？
answer: 国家应在契约协议而非强加统一的基础上，作为管理司法和警察的自愿协会 发挥作用
wrong_answers:
  - 国家的形成应以共同的语言、文化和历史特征为基础，这些特征造就了各民族的自然团结
  - 国家的合法性来自于对领土的征服，以及对不断扩大的客户群体保持政治控制的能力。
  - 国家必须将集体利益置于个人权利之上，以实现真正的政治团结和有效治理
explanation: |
  文中明确指出，传统的国家统一理由（语言、文化、历史）经不起公正的分析，因为历史上的国家形成是通过政治客户的机会主义扩张而非文化亲缘关系实现的。自由主义概念将国家重新定义为由个人组织司法和警察管理的自愿协会，反对国家是支配个人的高级实体的观点。这种契约基础与历史上以征服为基础的扩张模式和集体主导权凌驾于个人自主权之上的模式形成了鲜明对比。
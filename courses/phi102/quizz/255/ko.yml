question: 제시된 자유주의 국가 이론에 따르면, 합법적인 국가 조직과 역사적 국가 형성을 구별하는 것은 무엇인가요?
answer: 국가는 강제적 통합이 아닌 계약에 기반한 사법 및 경찰 관리를 위한 자발적 연합체로서 기능해야 합니다
wrong_answers:
  - 국가는 민족 간의 자연스러운 통합을 만들어내는 공유된 언어, 문화, 역사적 특성을 기반으로 형성되어야 합니다
  - 국가는 영토 정복과 확장된 고객 인구에 대한 정치적 통제력을 유지하는 능력에서 정당성을 얻습니다
  - 국가는 진정한 정치적 통합과 효과적인 거버넌스를 달성하기 위해 개인의 권리보다 집단의 이익을 우선시해야 합니다
explanation: |
  이 텍스트는 역사적 국가 형성은 문화적 친화성보다는 정치적 고객의 기회주의적 확장을 통해 이루어졌기 때문에 국가 통합에 대한 전통적인 정당화(언어, 문화, 역사)는 공정한 분석을 견디지 못한다고 명시적으로 주장합니다. 자유주의적 개념은 국가를 개인이 사법 및 경찰 행정을 조직하는 자발적 연합으로 재구성하여 국가가 개인을 지배하는 우월한 실체라는 개념을 거부합니다. 이러한 계약적 기반은 정복에 기반한 확장과 개인의 자율성에 대한 집단적 지배라는 역사적 패턴과 뚜렷한 대조를 이룹니다.
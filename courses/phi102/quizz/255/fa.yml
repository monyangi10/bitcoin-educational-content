question: بر اساس نظریه لیبرال ملت‌ها که ارائه شده است، چه چیزی سازمان ملی مشروع را از تشکیل ملت تاریخی متمایز می‌کند؟
answer: ملل باید به عنوان انجمن‌های داوطلبانه برای اجرای عدالت و پلیس عمل کنند، بر اساس توافقات قراردادی به جای وحدت تحمیلی
wrong_answers:
  - ملتها باید بر اساس ویژگی‌های زبانی، فرهنگی و تاریخی مشترک که وحدت طبیعی میان مردم ایجاد می‌کند، شکل بگیرند.
  - ملت‌ها مشروعیت خود را از فتح سرزمینی و توانایی حفظ کنترل سیاسی بر جمعیت‌های مشتری گسترش‌یافته به دست می‌آورند.
  - ملت‌ها باید برای دستیابی به وحدت سیاسی واقعی و حکمرانی مؤثر، منافع جمعی را بر حقوق فردی اولویت دهند.
explanation: |
  متن به‌طور صریح استدلال می‌کند که توجیهات سنتی برای وحدت ملی (زبان، فرهنگ، تاریخ) در برابر تحلیل بی‌طرفانه تاب نمی‌آورند، زیرا تشکیل ملت‌ها در تاریخ از طریق گسترش فرصت‌طلبانه مشتریان سیاسی رخ داده است نه از طریق وابستگی‌های فرهنگی. مفهوم لیبرال، ملت‌ها را به‌عنوان انجمن‌های داوطلبانه بازتعریف می‌کند که در آن افراد عدالت و اداره پلیس را سازماندهی می‌کنند و این ایده را که ملت‌ها موجودیت‌های برتری هستند که بر افراد تسلط دارند، رد می‌کند. این پایه قراردادی به‌شدت با الگوهای تاریخی گسترش مبتنی بر فتح و تسلط جمعی بر خودمختاری فردی در تضاد است.
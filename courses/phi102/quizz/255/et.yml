question: Mis eristab esitatud liberaalse rahvusteooria kohaselt legitiimset rahvuskorraldust ajaloolisest rahvuse kujunemisest?
answer: Rahvused peaksid toimima vabatahtlike ühendustena õigusemõistmise ja politsei haldamiseks, mis põhineksid pigem lepingulistel kokkulepetel kui pealesunnitud ühtsusel
wrong_answers:
  - Rahvused peaksid moodustuma ühiste keeleliste, kultuuriliste ja ajalooliste tunnuste alusel, mis loovad rahvaste vahel loomuliku ühtsuse
  - Rahvaste legitiimsus tuleneb territoriaalsest vallutamisest ja võimest säilitada poliitilist kontrolli laiendatud klientuuride üle
  - Tõelise poliitilise ühtsuse ja tõhusa valitsemise saavutamiseks peavad riigid seadma kollektiivsed huvid individuaalsete õiguste asemel esikohale
explanation: |
  Tekstis väidetakse selgesõnaliselt, et rahvusliku ühtsuse traditsioonilised põhjendused (keel, kultuur, ajalugu) ei pea vastu erapooletule analüüsile, sest ajalooline rahvuse moodustamine toimus pigem poliitilise kliendibaasi kui kultuurilise suguluse oportunistliku laienemise kaudu. Liberaalne kontseptsioon sõnastab rahvused ümber vabatahtlikeks ühendusteks, kus üksikisikud korraldavad õigusemõistmist ja politseihaldust, lükates tagasi arusaama, et rahvused on kõrgemad üksused, mis domineerivad üksikisikute üle. See lepinguline alus on teravas vastuolus ajalooliste mustritega, mille aluseks on vallutustel põhinev laienemine ja kollektiivne domineerimine individuaalse autonoomia üle.
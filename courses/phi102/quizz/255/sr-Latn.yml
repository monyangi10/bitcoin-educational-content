question: Prema liberalnoj teoriji nacija koja je predstavljena, šta razlikuje legitimnu nacionalnu organizaciju od istorijskog formiranja nacija?
answer: Nacije bi trebalo da funkcionišu kao dobrovoljna udruženja za sprovođenje pravde i policije, zasnovana na ugovornim sporazumima, a ne na nametnutom jedinstvu.
wrong_answers:
  - Nacije bi trebalo da se formiraju na osnovu zajedničkih jezičkih, kulturnih i istorijskih karakteristika koje stvaraju prirodno jedinstvo među narodima.
  - Nacije izvode legitimitet iz teritorijalnog osvajanja i sposobnosti da održe političku kontrolu nad proširenim klijentelističkim populacijama
  - Nacije moraju dati prioritet kolektivnim interesima nad individualnim pravima kako bi postigle istinsko političko jedinstvo i efikasno upravljanje.
explanation: |
  Tekst eksplicitno tvrdi da tradicionalna opravdanja za nacionalno jedinstvo (jezik, kultura, istorija) ne izdržavaju nepristrasnu analizu, jer se istorijsko formiranje nacija dogodilo kroz oportunističko širenje političke klijentele, a ne kroz kulturne afinitete. Liberalna koncepcija preoblikuje nacije kao dobrovoljna udruženja gde pojedinci organizuju pravdu i policijsku administraciju, odbacujući ideju da su nacije superiorni entiteti koji dominiraju pojedincima. Ova ugovorna osnova oštro se suprotstavlja istorijskim obrascima ekspanzije zasnovane na osvajanju i kolektivne dominacije nad individualnom autonomijom.
question: Kulingana na nadharia ya kiliberali ya mataifa iliyowasilishwa, ni nini kinachotofautisha shirika halali la kitaifa na uundaji wa taifa wa kihistoria?
answer: Mataifa yanapaswa kufanya kazi kama vyama vya hiari vya kusimamia haki na polisi, kwa kuzingatia makubaliano ya kimkataba badala ya umoja uliowekwa
wrong_answers:
  - Mataifa yanapaswa kuundwa kwa kuzingatia sifa za pamoja za lugha, kitamaduni, na kihistoria zinazounda umoja wa asili miongoni mwa watu
  - Mataifa hupata uhalali kutokana na ushindi wa eneo na uwezo wa kudumisha udhibiti wa kisiasa juu ya idadi kubwa ya wateja
  - Mataifa lazima yaweke kipaumbele maslahi ya pamoja kuliko haki za mtu binafsi ili kufikia umoja wa kweli wa kisiasa na utawala bora
explanation: |
  Maandishi yanasema waziwazi kwamba uhalalishaji wa kitamaduni wa umoja wa kitaifa (lugha, utamaduni, historia) haustahimili uchambuzi usioegemea upande wowote, kwani uundaji wa taifa la kihistoria ulitokea kupitia upanuzi wa fursa wa wateja wa kisiasa badala ya mishikamano ya kitamaduni. Dhana ya kiliberali hubadilisha mataifa kama vyama vya hiari ambapo watu binafsi hupanga haki na utawala wa polisi, wakikataa wazo kwamba mataifa ni vyombo bora vinavyowatawala watu binafsi. Msingi huu wa kimkataba unatofautiana sana na mifumo ya kihistoria ya upanuzi unaotegemea ushindi na utawala wa pamoja juu ya uhuru wa mtu binafsi.
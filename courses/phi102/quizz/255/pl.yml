question: Zgodnie z przedstawioną liberalną teorią narodów, co odróżnia prawowitą organizację narodową od historycznej formacji narodowej?
answer: Narody powinny funkcjonować jako dobrowolne stowarzyszenia zarządzające wymiarem sprawiedliwości i policją, oparte na umowach, a nie narzuconej jedności
wrong_answers:
  - Narody powinny być tworzone w oparciu o wspólne cechy językowe, kulturowe i historyczne, które tworzą naturalną jedność między ludźmi
  - Narody czerpią legitymizację z podboju terytorialnego i zdolności do utrzymania kontroli politycznej nad rozszerzonymi populacjami klientów
  - Narody muszą przedkładać zbiorowe interesy nad indywidualne prawa, aby osiągnąć prawdziwą jedność polityczną i skuteczne rządy
explanation: |
  Tekst wyraźnie argumentuje, że tradycyjne uzasadnienia dla jedności narodowej (język, kultura, historia) nie wytrzymują bezstronnej analizy, ponieważ historyczne tworzenie narodów nastąpiło raczej w wyniku oportunistycznej ekspansji politycznej klienteli niż podobieństw kulturowych. Liberalna koncepcja przedstawia narody jako dobrowolne stowarzyszenia, w których jednostki organizują wymiar sprawiedliwości i administrację policyjną, odrzucając pogląd, że narody są nadrzędnymi jednostkami, które dominują nad jednostkami. Ta umowna podstawa ostro kontrastuje z historycznymi wzorcami ekspansji opartej na podbojach i kolektywnej dominacji nad indywidualną autonomią.
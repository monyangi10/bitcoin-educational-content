question: Menurut teori liberalisme ekonomi, bentuk kompensasi apa yang memungkinkan masyarakat untuk menghargai inovasi dan kemajuan?
answer: Keuntungan industri dan komersial, prestise dan kemuliaan sosial, dan hak kekayaan intelektual seperti paten
wrong_answers:
  - Subsidi pemerintah, penghargaan dari negara, dan sistem alokasi sumber daya terpusat
  - Gaji tetap, promosi birokrasi, dan bonus kinerja standar dari lembaga-lembaga publik
  - Manfaat kepemilikan kolektif, langkah-langkah kesetaraan sosial, dan pembagian sumber daya berbasis masyarakat
explanation: |
  Liberalisme ekonomi mengidentifikasi tiga bentuk utama kompensasi untuk inovasi: keuntungan sementara karena menjadi yang pertama di pasar dengan solusi yang lebih baik, prestise sosial yang mirip dengan yang dinikmati oleh para seniman dan penyair, dan perlindungan kekayaan intelektual melalui paten. Jawaban yang salah mewakili mekanisme kompensasi yang khas dari sistem yang dikendalikan oleh negara atau sistem kolektivis, yang menurut bab ini tidak dapat secara efektif memberi penghargaan pada inovasi karena tidak memiliki insentif berbasis pasar dan pengakuan individu atas pencapaian terobosan.
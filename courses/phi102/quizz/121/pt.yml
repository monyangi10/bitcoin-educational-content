question: De acordo com a teoria do liberalismo económico, que formas de compensação permitem às sociedades recompensar a inovação e o progresso?
answer: Lucros industriais e comerciais, prestígio e glória social e direitos de propriedade intelectual como as patentes
wrong_answers:
  - Subsídios governamentais, prémios de reconhecimento estatal e sistemas centralizados de atribuição de recursos
  - Salários fixos, promoções burocráticas e prémios de desempenho padronizados das instituições públicas
  - Benefícios de propriedade colectiva, medidas de igualdade social e partilha de recursos com base na comunidade
explanation: |
  O liberalismo económico identifica três formas principais de compensação pela inovação: lucros temporários por se ser o primeiro a chegar ao mercado com melhores soluções, prestígio social semelhante ao de que gozam os artistas e os poetas e proteção da propriedade intelectual através de patentes. As respostas erradas representam mecanismos de compensação típicos de sistemas colectivistas ou controlados pelo Estado, que, segundo o capítulo, não podem recompensar eficazmente a inovação porque não dispõem de incentivos baseados no mercado nem de reconhecimento individual para as realizações revolucionárias.
question: Según la teoría del liberalismo económico, ¿qué formas de compensación permiten a las sociedades recompensar la innovación y el progreso?
answer: Beneficios industriales y comerciales, prestigio y gloria social, y derechos de propiedad intelectual como las patentes
wrong_answers:
  - Subvenciones públicas, premios estatales de reconocimiento y sistemas centralizados de asignación de recursos
  - Sueldos fijos, ascensos burocráticos y primas estandarizadas por rendimiento de las instituciones públicas
  - Beneficios de propiedad colectiva, medidas de igualdad social y reparto comunitario de recursos
explanation: |
  El liberalismo económico identifica tres formas principales de compensación por la innovación: beneficios temporales por ser los primeros en comercializar soluciones mejores, prestigio social similar al que disfrutan artistas y poetas, y protección de la propiedad intelectual mediante patentes. Las respuestas erróneas representan mecanismos de compensación típicos de los sistemas controlados por el Estado o colectivistas, que, según el capítulo, no pueden recompensar eficazmente la innovación porque carecen de incentivos basados en el mercado y de reconocimiento individual de los logros revolucionarios.
question: Volgens de theorie van het economisch liberalisme, welke vormen van compensatie stellen samenlevingen in staat om innovatie en vooruitgang te belonen?
answer: Industriële en commerciële winsten, sociaal aanzien en glorie, en intellectuele eigendomsrechten zoals patenten
wrong_answers:
  - Overheidssubsidies, erkenning door de staat en gecentraliseerde systemen voor de toewijzing van middelen
  - Vaste salarissen, bureaucratische promoties en gestandaardiseerde prestatiebonussen van openbare instellingen
  - Collectieve eigendomsvoordelen, maatregelen voor sociale gelijkheid en gemeenschappelijk gebruik van hulpbronnen
explanation: |
  Het economisch liberalisme identificeert drie belangrijke vormen van compensatie voor innovatie: tijdelijke winsten door als eerste met betere oplossingen op de markt te komen, sociaal prestige vergelijkbaar met dat van artiesten en dichters, en bescherming van intellectuele eigendom door patenten. De foute antwoorden vertegenwoordigen compensatiemechanismen die typisch zijn voor door de staat gecontroleerde of collectivistische systemen, die volgens het hoofdstuk innovatie niet effectief kunnen belonen omdat ze niet beschikken over marktgebaseerde stimulansen en individuele erkenning voor baanbrekende prestaties.
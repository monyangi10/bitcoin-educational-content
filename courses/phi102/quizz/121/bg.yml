question: Според теорията на икономическия либерализъм кои форми на компенсация позволяват на обществата да възнаграждават иновациите и напредъка?
answer: Промишлени и търговски печалби, социален престиж и слава и права на интелектуална собственост като патенти
wrong_answers:
  - Държавни субсидии, държавни награди и централизирани системи за разпределение на ресурсите
  - Фиксирани заплати, бюрократични повишения и стандартизирани бонуси за постигнати резултати от публичните институции
  - Ползи от колективната собственост, мерки за социално равенство и споделяне на ресурсите в общността
explanation: |
  Икономическият либерализъм определя три основни форми на компенсация за иновациите: временни печалби от това, че първи на пазара се предлагат по-добри решения, социален престиж, подобен на този, на който се радват художниците и поетите, и защита на интелектуалната собственост чрез патенти. Неправилните отговори представляват компенсаторни механизми, типични за държавно контролирани или колективистични системи, за които в главата се твърди, че не могат ефективно да възнаграждават иновациите, тъй като в тях липсват пазарни стимули и индивидуално признание за пробивните постижения.
question: بر اساس نظریه لیبرالیسم اقتصادی، چه اشکالی از جبران خسارت به جوامع امکان می‌دهد تا نوآوری و پیشرفت را پاداش دهند؟
answer: سودهای صنعتی و تجاری، پرستیژ اجتماعی و افتخار، و حقوق مالکیت فکری مانند حق ثبت اختراع
wrong_answers:
  - یارانه‌های دولتی، جوایز شناسایی دولتی، و سیستم‌های تخصیص منابع متمرکز
  - حقوق ثابت، ارتقاءهای بوروکراتیک، و پاداش‌های عملکرد استاندارد شده از مؤسسات عمومی
  - مزایای مالکیت جمعی، اقدامات برابری اجتماعی، و اشتراک منابع مبتنی بر جامعه
explanation: |
  لیبرالیسم اقتصادی سه شکل اصلی جبران برای نوآوری را شناسایی می‌کند: سودهای موقتی از اولین بودن در بازار با راه‌حل‌های بهتر، پرستیژ اجتماعی مشابه با آنچه هنرمندان و شاعران از آن برخوردارند، و حفاظت از مالکیت فکری از طریق ثبت اختراع. پاسخ‌های نادرست نشان‌دهنده مکانیزم‌های جبران خسارت معمول در سیستم‌های دولتی یا جمع‌گرایانه هستند که این فصل استدلال می‌کند نمی‌توانند به طور مؤثر نوآوری را پاداش دهند زیرا فاقد انگیزه‌های مبتنی بر بازار و شناسایی فردی برای دستاوردهای نوآورانه هستند.
question: Secondo la teoria del liberalismo economico, quali forme di compensazione permettono alle società di premiare l'innovazione e il progresso?
answer: Profitti industriali e commerciali, prestigio e gloria sociale e diritti di proprietà intellettuale come i brevetti
wrong_answers:
  - Sovvenzioni governative, riconoscimenti statali e sistemi di allocazione centralizzata delle risorse
  - Stipendi fissi, promozioni burocratiche e premi di rendimento standardizzati da parte delle istituzioni pubbliche
  - Benefici della proprietà collettiva, misure di uguaglianza sociale e condivisione delle risorse a livello di comunità
explanation: |
  Il liberalismo economico identifica tre principali forme di compensazione per l'innovazione: i profitti temporanei derivanti dal fatto di essere i primi sul mercato con soluzioni migliori, il prestigio sociale simile a quello di cui godono artisti e poeti e la protezione della proprietà intellettuale attraverso i brevetti. Le risposte sbagliate rappresentano meccanismi di compensazione tipici dei sistemi statali o collettivisti, che secondo il capitolo non possono premiare efficacemente l'innovazione perché mancano di incentivi basati sul mercato e di riconoscimenti individuali per i risultati ottenuti.
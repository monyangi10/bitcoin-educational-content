question: Jaké formy kompenzace podle teorie ekonomického liberalismu umožňují společnostem odměňovat inovace a pokrok?
answer: Průmyslové a obchodní zisky, společenská prestiž a sláva a práva duševního vlastnictví, jako jsou patenty
wrong_answers:
  - Vládní dotace, státní ocenění a centralizované systémy přidělování zdrojů
  - Pevné platy, byrokratické povyšování a standardizované výkonnostní odměny od veřejných institucí
  - Kolektivní vlastnické výhody, opatření sociální rovnosti a sdílení zdrojů v rámci komunity
explanation: |
  Ekonomický liberalismus rozlišuje tři hlavní formy kompenzace za inovace: dočasné zisky z toho, že firma přichází na trh s lepším řešením jako první, společenskou prestiž podobnou té, které se těší umělci a básníci, a ochranu duševního vlastnictví prostřednictvím patentů. Špatné odpovědi představují kompenzační mechanismy typické pro státem řízené nebo kolektivistické systémy, které podle této kapitoly nemohou účinně odměňovat inovace, protože jim chybí tržní pobídky a individuální uznání za průlomové úspěchy.
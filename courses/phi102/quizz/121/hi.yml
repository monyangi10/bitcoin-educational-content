question: According to economic liberalism theory, what forms of compensation enable societies to reward innovation and progress?
answer: Industrial and commercial profits, social prestige and glory, and intellectual property rights like patents
wrong_answers:
  - Government subsidies, state recognition awards, and centralized resource allocation systems
  - Fixed salaries, bureaucratic promotions, and standardized performance bonuses from public institutions
  - Collective ownership benefits, social equality measures, and community-based resource sharing
explanation: |
  Economic liberalism identifies three main forms of compensation for innovation: temporary profits from being first to market with better solutions, social prestige similar to that enjoyed by artists and poets, and intellectual property protection through patents. The wrong answers represent compensation mechanisms typical of state-controlled or collectivist systems, which the chapter argues cannot effectively reward innovation because they lack market-based incentives and individual recognition for breakthrough achievements.
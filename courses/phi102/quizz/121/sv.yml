question: Enligt ekonomisk liberalism, vilka former av kompensation gör det möjligt för samhällen att belöna innovation och framsteg?
answer: Industriella och kommersiella vinster, social prestige och ära samt immateriella rättigheter som patent
wrong_answers:
  - Statliga subventioner, statliga utmärkelser och centraliserade resursfördelningssystem
  - Fasta löner, byråkratiska befordringar och standardiserade prestationsbonusar från offentliga institutioner
  - Kollektiva ägarförmåner, åtgärder för social jämlikhet och samhällsbaserad resursdelning
explanation: |
  Den ekonomiska liberalismen identifierar tre huvudsakliga former av kompensation för innovation: tillfälliga vinster från att vara först ut på marknaden med bättre lösningar, social prestige liknande den som konstnärer och poeter åtnjuter samt immaterialrättsligt skydd genom patent. De felaktiga svaren representerar kompensationsmekanismer som är typiska för statligt kontrollerade eller kollektivistiska system, som enligt kapitlet inte kan belöna innovation på ett effektivt sätt eftersom de saknar marknadsbaserade incitament och individuellt erkännande för banbrytande prestationer.
question: Selon l'analyse des principes de sécession, quelle contradiction existe-t-il dans les États démocratiques modernes en ce qui concerne la souveraineté territoriale ?
answer: Ils interdisent le départ des régions tout en cherchant à étendre leur contrôle territorial sur de nouvelles populations
wrong_answers:
  - Ils autorisent une sécession illimitée tout en limitant les mécanismes d'immigration et de contrôle des frontières
  - Ils accordent une autonomie complète aux régions tout en maintenant une fiscalité et une politique monétaire centralisées
  - Ils encouragent l'association volontaire tout en empêchant toute forme d'organisation politique collective
explanation: |
  Le texte révèle une contradiction fondamentale dans les États modernes : alors que les constitutions proclament que les républiques sont "une et indivisible" et interdisent aux régions de faire sécession ou de rejoindre d'autres pays, ces mêmes États cherchent activement à conquérir de nouveaux territoires et à élargir leur clientèle politique. Cela met en évidence l'hypocrisie des systèmes qui nient le principe de l'association volontaire (en empêchant les gens de partir) tout en pratiquant l'expansion territoriale (en forçant les autres à les rejoindre). Les autres options représentent mal les contradictions réelles décrites, car les États n'autorisent pas la sécession illimitée et n'accordent pas d'autonomie complète, et ils n'encouragent pas l'association volontaire, mais appliquent plutôt l'adhésion obligatoire.
question: Kulingana na uchambuzi wa kanuni za kujitenga, ni utata gani uliopo katika majimbo ya kidemokrasia ya kisasa kuhusu uhuru wa eneo?
answer: Wanakataza maeneo kuondoka huku wakitafuta kupanua udhibiti wao wa maeneo juu ya idadi mpya ya watu.
wrong_answers:
  - Wanaruhusu kujitenga bila kikomo huku wakizuia uhamiaji na mifumo ya udhibiti wa mipaka
  - Wanatoa uhuru kamili kwa mikoa huku wakidumisha ushuru wa pamoja na sera ya fedha
  - Wanahimiza ushirika wa hiari huku wakizuia aina yoyote ya shirika la kisiasa la pamoja
explanation: |
  Maandishi yanaonyesha utata wa kimsingi katika majimbo ya kisasa: huku katiba zikitangaza jamhuri kama 'moja na isiyogawanyika' na kukataza maeneo kujitenga au kujiunga na nchi zingine, majimbo haya haya yanatafuta kikamilifu kushinda maeneo mapya na kupanua wateja wao wa kisiasa. Hii inafichua unafiki wa mifumo inayokataa kanuni ya ushirika wa hiari (kuzuia watu kuondoka) huku ikifanya upanuzi wa eneo (kulazimisha wengine kujiunga). Chaguzi zingine zinapotosha utata halisi ulioelezewa, kwani majimbo hayaruhusu kujitenga bila kikomo wala kutoa uhuru kamili, na hayatii moyo ushirika wa hiari bali yanalazimisha uanachama wa lazima.
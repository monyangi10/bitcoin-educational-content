question: Zgodnie z analizą zasad secesji, jaka sprzeczność istnieje we współczesnych państwach demokratycznych w odniesieniu do suwerenności terytorialnej?
answer: Zabraniają one opuszczania regionów, jednocześnie starając się rozszerzyć swoją kontrolę terytorialną na nowe populacje
wrong_answers:
  - Pozwalają one na nieograniczoną secesję przy jednoczesnym ograniczeniu imigracji i mechanizmów kontroli granic
  - Przyznają one pełną autonomię regionom przy jednoczesnym utrzymaniu scentralizowanej polityki podatkowej i monetarnej
  - Zachęcają do dobrowolnego zrzeszania się, jednocześnie uniemożliwiając jakąkolwiek formę zbiorowej organizacji politycznej
explanation: |
  Tekst ujawnia fundamentalną sprzeczność we współczesnych państwach: podczas gdy konstytucje ogłaszają republiki "jedną i niepodzielną" i zabraniają regionom odłączania się lub przyłączania do innych krajów, te same państwa aktywnie dążą do podboju nowych terytoriów i poszerzenia swojej politycznej klienteli. Obnaża to hipokryzję systemów, które zaprzeczają zasadzie dobrowolnego zrzeszania się (uniemożliwiając ludziom odejście), jednocześnie praktykując ekspansję terytorialną (zmuszając innych do przyłączenia się). Pozostałe opcje błędnie przedstawiają rzeczywiste opisane sprzeczności, ponieważ państwa ani nie zezwalają na nieograniczoną secesję, ani nie zapewniają pełnej autonomii, i nie zachęcają do dobrowolnego zrzeszania się, ale raczej wymuszają obowiązkowe członkostwo.
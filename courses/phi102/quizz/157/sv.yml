question: Vilken motsägelse finns det i moderna demokratiska stater när det gäller territoriell suveränitet, enligt analysen av principerna för avskiljande?
answer: De förbjuder regioner att lämna samtidigt som de försöker utöka sin territoriella kontroll över nya befolkningar
wrong_answers:
  - De tillåter obegränsad avskiljning samtidigt som de begränsar invandring och mekanismer för gränskontroll
  - De ger fullständig autonomi till regioner samtidigt som de upprätthåller centraliserad beskattning och penningpolitik
  - De uppmuntrar frivillig sammanslutning samtidigt som de förhindrar varje form av kollektiv politisk organisation
explanation: |
  Texten avslöjar en grundläggande motsägelse i moderna stater: medan konstitutioner proklamerar republiker som "en och odelbar" och förbjuder regioner att avskilja sig eller ansluta sig till andra länder, försöker samma stater aktivt erövra nya territorier och utöka sitt politiska klientel. Detta avslöjar hyckleriet i system som förnekar principen om frivillig sammanslutning (hindrar människor från att lämna) samtidigt som de praktiserar territoriell expansion (tvingar andra att ansluta sig). De andra alternativen ger en felaktig bild av de faktiska motsägelser som beskrivs, eftersom staterna varken tillåter obegränsad utbrytning eller ger fullständig autonomi, och de uppmuntrar inte till frivillig sammanslutning utan tvingar snarare fram obligatoriskt medlemskap.
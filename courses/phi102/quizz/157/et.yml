question: Milline vastuolu esineb tänapäeva demokraatlikes riikides territoriaalse suveräänsuse osas, kui lähtuda lahkulöömise põhimõtete analüüsist?
answer: Nad keelavad piirkondade lahkumise, püüdes samal ajal laiendada oma territoriaalset kontrolli uute elanikkonnarühmade üle
wrong_answers:
  - Nad lubavad piiramatut lahkulöömist, piirates samal ajal sisserännet ja piirikontrolli mehhanisme
  - Nad annavad piirkondadele täieliku autonoomia, säilitades samal ajal tsentraliseeritud maksu- ja rahapoliitika
  - Nad julgustavad vabatahtlikku ühinemist, takistades samas igasugust kollektiivset poliitilist organiseerumist
explanation: |
  Tekst paljastab tänapäeva riikide põhilise vastuolu: samal ajal kui põhiseadused kuulutavad vabariike "üheks ja jagamatuks" ning keelavad piirkondadel eralduda või liituda teiste riikidega, püüavad samad riigid aktiivselt vallutada uusi territooriume ja laiendada oma poliitilist klientuuri. See paljastab nende süsteemide silmakirjalikkuse, mis eitavad vabatahtliku ühinemise põhimõtet (takistades inimestel lahkuda), samal ajal praktiseerides territoriaalset laienemist (sundides teisi ühinema). Teised võimalused moonutavad kirjeldatud tegelikke vastuolusid, sest riigid ei luba piiramatut lahkumist ega anna täielikku autonoomiat ning nad ei soodusta vabatahtlikku ühinemist, vaid sunnivad pigem kohustuslikku liikmelisust.
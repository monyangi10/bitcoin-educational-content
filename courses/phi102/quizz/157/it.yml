question: Secondo l'analisi dei principi di secessione, quale contraddizione esiste negli Stati democratici moderni riguardo alla sovranità territoriale?
answer: Vietano alle regioni di andarsene e allo stesso tempo cercano di espandere il loro controllo territoriale su nuove popolazioni
wrong_answers:
  - Consentono la secessione illimitata, limitando al contempo l'immigrazione e i meccanismi di controllo delle frontiere
  - Concedono una completa autonomia alle regioni, pur mantenendo una politica fiscale e monetaria centralizzata
  - Incoraggiano l'associazione volontaria e impediscono qualsiasi forma di organizzazione politica collettiva
explanation: |
  Il testo rivela una contraddizione fondamentale degli Stati moderni: mentre le costituzioni proclamano le repubbliche come "una e indivisibile" e vietano alle regioni di secedere o di unirsi ad altri Paesi, questi stessi Stati cercano attivamente di conquistare nuovi territori e di espandere la loro clientela politica. Questo smaschera l'ipocrisia dei sistemi che negano il principio dell'associazione volontaria (impedendo alle persone di andarsene) e al contempo praticano l'espansione territoriale (costringendo gli altri ad unirsi). Le altre opzioni travisano le reali contraddizioni descritte, in quanto gli Stati non permettono la secessione illimitata né concedono la completa autonomia, e non incoraggiano l'associazione volontaria ma piuttosto impongono l'adesione obbligatoria.
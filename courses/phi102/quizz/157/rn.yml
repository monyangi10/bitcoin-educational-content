question: Dushingiye ku gusesangura ingingo ngenderwako zo kwikukira, ni ukuvuguruzanya gute kuri mu bihugu vya demokarasi vya none ku bijanye n’ubusegaba bw’intara?
answer: Babuza uturere kuvayo mu gihe nyene barondera kwagura ububasha bwabo ku bantu bashasha .
wrong_answers:
  - Biremeza kwitandukanya ata n’aho bigarukira mu gihe bibuza abimukira n’uburyo bwo kugenzura imipaka .
  - Baha uturere ubwigenge bwose mu gihe bagumya politike y'imisoro n'amahera .
  - Baremesha kwifatanya n'abandi ku bushake mu gihe babuza uburyo bwose bwo gutegura politike rusangi .
explanation: |
  Ico canditswe kirerekana ukuvuguruzanya kw’ishimikiro mu bihugu vya none: naho amategeko nshingiro atangaza ko amarepubulika ari ‘imwe kandi adashobora kugabanywa’ kandi akabuza uturere kwitandukanya canke kwifatanya n’ibindi bihugu, ivyo bihugu nyene birarondera n’umwete kwigarurira intara nshasha no kwagura abaguzi bavyo mu vya politike. Ivyo birerekana uburyarya bw’imirongo ngenderwako ihakana ingingo ngenderwako y’ukwifatanya ku bushake (kubuza abantu kuvayo) mu gihe ikora ivyo kwagura intara (guhatira abandi kwifatanya). Ayandi mahitamwo agaragaza nabi ukuvuguruzanya nyakuri kwavuzwe, kuko ibihugu bitemera kwitandukanya ata n’aho bigarukira canke ngo bihe ubwigenge bushitse, kandi ntibiremesha kwifatanya n’abandi ku bushake ahubwo bitegeka ko umuntu aba umunyamuryango.
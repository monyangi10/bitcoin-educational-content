question: Welke tegenstelling bestaat er volgens de analyse van afscheidingsprincipes in moderne democratische staten met betrekking tot territoriale soevereiniteit?
answer: Ze verbieden regio's om te vertrekken en proberen tegelijkertijd hun territoriale controle over nieuwe bevolkingsgroepen uit te breiden
wrong_answers:
  - Ze staan onbeperkte afscheiding toe en beperken tegelijkertijd immigratie en grenscontrolemechanismen
  - Ze geven regio's volledige autonomie, maar handhaven een gecentraliseerd belasting- en monetair beleid
  - Ze moedigen vrijwillige vereniging aan, maar voorkomen elke vorm van collectieve politieke organisatie
explanation: |
  De tekst onthult een fundamentele tegenstrijdigheid in moderne staten: terwijl grondwetten republieken verkondigen als 'één en ondeelbaar' en regio's verbieden zich af te scheiden of zich bij andere landen aan te sluiten, proberen diezelfde staten actief nieuwe gebieden te veroveren en hun politieke klantenkring uit te breiden. Dit legt de hypocrisie bloot van systemen die het principe van vrijwillige vereniging ontkennen (voorkomen dat mensen zich afscheiden) terwijl ze wel aan territoriale expansie doen (anderen dwingen zich aan te sluiten). De andere opties geven een verkeerd beeld van de feitelijke tegenstrijdigheden die beschreven worden, omdat staten noch onbeperkte afscheiding toestaan noch volledige autonomie verlenen, en ze moedigen vrijwillige vereniging niet aan maar dwingen eerder een verplicht lidmaatschap af.
question: 根據對分裂原則的分析，現代民主國家在領土主權方面存在什麼矛盾？
answer: 他們禁止各區域離開，同時尋求擴大對新人口的領土控制。
wrong_answers:
  - 他們允許無限制的分裂，同時限制移民和邊境控制機制
  - 它們賦予地區完全的自治權，同時維持中央稅收和貨幣政策。
  - 它們鼓勵自願結社，同時防止任何形式的集體政治組織
explanation: |
  這篇文章揭示了現代國家的基本矛盾：憲法宣稱共和國是「一個不可分割」的國家，並禁止各地區脫離或加入其他國家，但這些國家卻積極尋求征服新的領土，擴大其政治客戶群。這揭露了否定自願結社原則（阻止人們離開），同時又實行領土擴張（強迫他人加入）的制度的虛偽性。其他選項歪曲了所描述的實際矛盾，因為國家既不允許無限制的脫離，也不允許完全自治，它們不鼓勵自願結社，而是強制成員加入。
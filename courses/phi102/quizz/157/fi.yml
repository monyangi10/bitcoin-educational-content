question: Mitä ristiriitaa nykyaikaisissa demokraattisissa valtioissa on alueellisen suvereniteetin suhteen?
answer: Ne estävät alueita poistumasta ja pyrkivät samalla laajentamaan alueellista valvontaansa uusiin väestöryhmiin
wrong_answers:
  - Ne sallivat rajoittamattoman irtautumisen ja rajoittavat samalla maahanmuuttoa ja rajavalvontamekanismeja
  - Ne myöntävät alueille täydellisen itsehallinnon säilyttäen samalla keskitetyn verotuksen ja rahapolitiikan
  - Ne kannustavat vapaaehtoiseen yhdistymiseen ja estävät samalla kaikenlaisen kollektiivisen poliittisen järjestäytymisen
explanation: |
  Teksti paljastaa modernien valtioiden perustavanlaatuisen ristiriidan: vaikka perustuslaeissa julistetaan tasavallat "yhdeksi ja jakamattomaksi" ja kielletään alueita irtautumasta tai liittymästä muihin maihin, samat valtiot pyrkivät aktiivisesti valloittamaan uusia alueita ja laajentamaan poliittista asiakaskuntaansa. Tämä paljastaa sellaisten järjestelmien tekopyhyyden, jotka kieltävät vapaaehtoisen yhdistymisen periaatteen (estävät ihmisiä lähtemästä) ja harjoittavat samalla alueellista laajentumista (pakottavat muita liittymään). Muut vaihtoehdot vääristelevät kuvattuja todellisia ristiriitoja, sillä valtiot eivät salli rajoittamatonta irtautumista eivätkä myönnä täydellistä autonomiaa, eivätkä ne kannusta vapaaehtoiseen yhdistymiseen vaan pikemminkin pakottavat jäsenyyteen.
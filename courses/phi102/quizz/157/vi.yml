question: Theo phân tích các nguyên tắc ly khai, mâu thuẫn nào tồn tại trong các quốc gia dân chủ hiện đại liên quan đến chủ quyền lãnh thổ?
answer: Họ cấm các vùng ly khai đồng thời tìm cách mở rộng quyền kiểm soát lãnh thổ đối với các cộng đồng dân cư mới.
wrong_answers:
  - Họ cho phép ly khai không giới hạn trong khi hạn chế nhập cư và các cơ chế kiểm soát biên giới.
  - Họ trao quyền tự trị hoàn toàn cho các vùng trong khi vẫn duy trì chính sách thuế và tiền tệ tập trung.
  - Họ khuyến khích sự liên kết tự nguyện đồng thời ngăn chặn mọi hình thức tổ chức chính trị tập thể.
explanation: |
  Văn bản này vạch trần một mâu thuẫn cơ bản trong các quốc gia hiện đại: trong khi hiến pháp tuyên bố các nước cộng hòa là "một thể thống nhất và không thể chia cắt" và cấm các vùng lãnh thổ ly khai hoặc sáp nhập với các quốc gia khác, thì chính những quốc gia này lại tích cực tìm cách chinh phục các vùng lãnh thổ mới và mở rộng ảnh hưởng chính trị của mình. Điều này phơi bày sự đạo đức giả của các hệ thống phủ nhận nguyên tắc liên kết tự nguyện (ngăn cản người dân rời đi) trong khi lại thực hiện việc bành trướng lãnh thổ (buộc người khác gia nhập). Các lựa chọn khác đã xuyên tạc những mâu thuẫn thực tế được mô tả, vì các quốc gia không cho phép ly khai không giới hạn cũng không trao quyền tự trị hoàn toàn, và chúng không khuyến khích liên kết tự nguyện mà lại thực thi tư cách thành viên bắt buộc.
question: Според анализа на принципите на сецесията, какво противоречие съществува в съвременните демократични държави по отношение на териториалния суверенитет?
answer: Те забраняват на регионите да напускат страната, като същевременно се стремят да разширят териториалния си контрол върху нови населения
wrong_answers:
  - Те позволяват неограничено отделяне, като същевременно ограничават имиграцията и механизмите за граничен контрол
  - Те предоставят пълна автономия на регионите, като същевременно запазват централизираното данъчно облагане и паричната политика
  - Те насърчават доброволното сдружаване, като същевременно предотвратяват всяка форма на колективна политическа организация
explanation: |
  Текстът разкрива основно противоречие в съвременните държави: докато конституциите обявяват републиките за "единни и неделими" и забраняват на регионите да се отделят или присъединяват към други държави, същите тези държави активно се стремят да завладяват нови територии и да разширяват политическата си клиентела. Това разкрива лицемерието на системите, които отричат принципа на доброволното сдружаване (като не позволяват на хората да напускат) и същевременно практикуват териториално разширяване (като принуждават другите да се присъединят). Другите варианти изопачават действителните описани противоречия, тъй като държавите нито позволяват неограничено отделяне, нито предоставят пълна автономия и не насърчават доброволното сдружаване, а по-скоро налагат задължително членство.
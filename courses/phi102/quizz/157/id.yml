question: Menurut analisis prinsip-prinsip pemisahan diri, kontradiksi apa yang ada di negara-negara demokratis modern terkait kedaulatan teritorial?
answer: Mereka melarang daerah-daerah untuk pergi sementara pada saat yang sama berusaha untuk memperluas kontrol teritorial mereka atas populasi baru
wrong_answers:
  - Mereka mengizinkan pemisahan diri tanpa batas sambil membatasi mekanisme kontrol imigrasi dan perbatasan
  - Mereka memberikan otonomi penuh kepada daerah dengan tetap mempertahankan kebijakan perpajakan dan moneter yang terpusat
  - Mereka mendorong asosiasi sukarela sambil mencegah segala bentuk organisasi politik kolektif
explanation: |
  Teks tersebut mengungkapkan kontradiksi mendasar di negara-negara modern: sementara konstitusi menyatakan republik sebagai 'satu dan tak terpisahkan' dan melarang daerah untuk memisahkan diri atau bergabung dengan negara lain, negara-negara yang sama secara aktif berusaha menaklukkan wilayah baru dan memperluas klien politik mereka. Hal ini memperlihatkan kemunafikan sistem yang menyangkal prinsip asosiasi sukarela (mencegah orang untuk pergi) sementara mempraktikkan ekspansi teritorial (memaksa orang lain untuk bergabung). Pilihan-pilihan lain salah menggambarkan kontradiksi yang sebenarnya, karena negara tidak mengizinkan pemisahan diri tanpa batas atau memberikan otonomi penuh, dan mereka tidak mendorong asosiasi sukarela tetapi justru memaksakan keanggotaan wajib.
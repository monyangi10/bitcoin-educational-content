question: Hvilken motsetning finnes det i moderne demokratiske stater når det gjelder territoriell suverenitet, ifølge analysen av løsrivelsesprinsipper?
answer: De forbyr regioner å forlate dem, samtidig som de forsøker å utvide sin territorielle kontroll over nye befolkningsgrupper
wrong_answers:
  - De tillater ubegrenset løsrivelse samtidig som de begrenser innvandring og grensekontrollmekanismer
  - De gir full autonomi til regionene, samtidig som de opprettholder sentralisert skatte- og pengepolitikk
  - De oppmuntrer til frivillig organisering, men forhindrer enhver form for kollektiv politisk organisering
explanation: |
  Teksten avslører en grunnleggende selvmotsigelse i moderne stater: Mens grunnlovene proklamerer republikker som "én og udelelig" og forbyr regioner å løsrive seg eller slutte seg til andre land, søker de samme statene aktivt å erobre nye territorier og utvide sitt politiske klientell. Dette avslører hykleriet i systemer som fornekter prinsippet om frivillig sammenslutning (ved å hindre folk i å forlate landet), samtidig som de praktiserer territoriell ekspansjon (ved å tvinge andre til å slutte seg til). De andre alternativene gir en feilaktig fremstilling av de faktiske motsetningene som beskrives, ettersom statene verken tillater ubegrenset løsrivelse eller gir fullstendig autonomi, og de oppmuntrer ikke til frivillig sammenslutning, men håndhever snarere obligatorisk medlemskap.
question: De acordo com a análise dos princípios da secessão, que contradição existe nos Estados democráticos modernos relativamente à soberania territorial?
answer: Proíbem a saída de regiões, ao mesmo tempo que procuram expandir o seu controlo territorial sobre novas populações
wrong_answers:
  - Permitem a secessão ilimitada e restringem os mecanismos de imigração e de controlo das fronteiras
  - Concedem total autonomia às regiões, mantendo simultaneamente uma política fiscal e monetária centralizada
  - Incentivam a associação voluntária, mas impedem qualquer forma de organização política colectiva
explanation: |
  O texto revela uma contradição fundamental dos Estados modernos: enquanto as constituições proclamam as repúblicas como "unas e indivisíveis" e proíbem as regiões de se separarem ou de se juntarem a outros países, esses mesmos Estados procuram ativamente conquistar novos territórios e expandir a sua clientela política. Isto expõe a hipocrisia dos sistemas que negam o princípio da associação voluntária (impedindo as pessoas de saírem) enquanto praticam a expansão territorial (forçando outros a aderirem). As outras opções deturpam as contradições reais descritas, uma vez que os Estados não permitem a secessão ilimitada nem concedem autonomia total e não incentivam a associação voluntária, mas impõem a adesão obrigatória.
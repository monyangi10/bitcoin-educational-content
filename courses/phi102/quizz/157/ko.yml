question: 분리 독립 원칙의 분석에 따르면, 영토 주권과 관련하여 현대 민주주의 국가에는 어떤 모순이 존재합니까?
answer: 그들은 새로운 인구에 대한 영토 지배권을 확장하는 동시에 지역을 떠나는 것을 금지합니다
wrong_answers:
  - 출입국 및 국경 통제 메커니즘을 제한하면서 무제한 탈퇴를 허용합니다
  - 중앙 집중식 과세 및 통화 정책을 유지하면서 지역에 완전한 자율성을 부여합니다
  - 어떤 형태의 집단적 정치 조직도 금지하면서 자발적 결속을 장려합니다
explanation: |
  이 텍스트는 현대 국가의 근본적인 모순을 드러냅니다. 헌법은 공화국을 '하나의 불가분한' 국가로 선언하고 지역이 다른 국가로부터 분리되거나 가입하는 것을 금지하지만, 같은 국가들은 적극적으로 새로운 영토를 정복하고 정치적 고객을 확장하려고 합니다. 이는 자발적 연합의 원칙을 부정하면서(사람들의 이탈을 막는) 영토 확장을 실천하는(다른 사람들에게 가입을 강요하는) 시스템의 위선을 드러냅니다. 다른 옵션은 국가가 무제한 탈퇴를 허용하거나 완전한 자치권을 부여하지 않고, 자발적 결속을 장려하지 않고 강제 가입을 강요하기 때문에 설명한 실제 모순을 잘못 표현합니다.
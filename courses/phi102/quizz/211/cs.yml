question: Co podle liberální ekonomické analýzy dokazuje nesmyslnost aplikace marxistického třídního rozdělení na moderní kapitalistické společnosti?
answer: Bohatí profesionálové, jako jsou umělci a sportovci, nevlastní výrobní prostředky, a přesto nejsou ekonomicky znevýhodněni, zatímco vlastníci kapitálu musí neustále pracovat, aby si udrželi své bohatství
wrong_answers:
  - Naprostá absence ekonomické nerovnosti v moderních společnostech eliminuje jakýkoli základ pro třídní rozdíly mezi různými sociálními skupinami
  - Vládní regulace účinně přerozdělily všechna výrobní aktiva rovnoměrně mezi občany, takže třídní analýza založená na vlastnictví je zastaralá
  - Moderní technologie zautomatizovaly všechny výrobní procesy a odstranily potřebu pracovníků i vlastníků kapitálu v hospodářské činnosti
explanation: |
  Analýza Paula Leroy-Beaulieua odhaluje rozpory v marxistických kategoriích: bohatí umělci, sportovci a profesionálové nemají výrobní prostředky, a přesto prosperují, zatímco vlastníci kapitálu musí neustále pracovat s analýzou trhu a investičními rozhodnutími. To ukazuje, že moderní společnosti se organizují kolem samotné práce, kdy bohatství musí být neustále vyděláváno prací, a nikoliv pevnými třídními vlastnickými vzorci.
question: 根據自由經濟學的分析，什麼證明了將馬克思主義的階級區分應用於現代資本主義社會是徒勞無功的？
answer: 藝術家和運動員等富裕的專業人士不擁有生產手段，但在經濟上不會處於不利地位，而資本擁有者則必須持續工作以維持財富。
wrong_answers:
  - 現代社會完全不存在經濟上的不平等，這消除了不同社會群體之間階級區別的基礎。
  - 政府法規已有效地將所有生產性資產在公民之間平均重新分配，使得以所有權為基礎的階級分析變得不合時宜
  - 現代科技已將所有生產流程自動化，經濟活動中不再需要工人和資本所有者。
explanation: |
  Paul Leroy-Beaulieu的分析揭示了馬克思主義分類中的矛盾：富有的藝術家、運動員和專業人士缺乏生產手段卻能繁榮，而資本家則必須透過市場分析和投資決策不斷工作。這顯示現代社會是圍繞著工作本身來組織，財富必須不斷透過勞動來賺取，而非固定的階級所有權模式。
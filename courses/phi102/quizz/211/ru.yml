question: Что, согласно либеральному экономическому анализу, демонстрирует бесполезность применения марксистских классовых различий к современным капиталистическим обществам?
answer: Богатые профессионалы, такие как художники и спортсмены, не владеют средствами производства, но при этом не находятся в экономически невыгодном положении, в то время как владельцы капитала должны постоянно работать, чтобы сохранить свое богатство
wrong_answers:
  - Полное отсутствие экономического неравенства в современных обществах исключает всякую основу для классовых различий между разными социальными группами
  - Государственное регулирование эффективно перераспределило все производственные активы поровну между гражданами, сделав классовый анализ, основанный на собственности, устаревшим
  - Современные технологии автоматизировали все производственные процессы, устранив необходимость участия в экономической деятельности как рабочих, так и владельцев капитала
explanation: |
  Анализ Поля Леруа-Болье выявляет противоречия в марксистских категориях: богатые художники, спортсмены и профессионалы не имеют средств производства, но при этом процветают, в то время как владельцы капитала должны постоянно работать, анализируя рынок и принимая инвестиционные решения. Это показывает, что современные общества организованы вокруг самого труда, где богатство должно постоянно зарабатываться трудом, а не фиксированными классовыми формами собственности.
question: Hva viser, ifølge liberal økonomisk analyse, at det er nytteløst å anvende marxistiske klasseskiller på moderne kapitalistiske samfunn?
answer: Velstående yrkesutøvere som kunstnere og idrettsutøvere eier ikke produksjonsmidler, men er likevel ikke økonomisk vanskeligstilte, mens kapitaleiere må jobbe kontinuerlig for å opprettholde sin rikdom
wrong_answers:
  - Det totale fraværet av økonomisk ulikhet i moderne samfunn eliminerer ethvert grunnlag for klasseskiller mellom ulike sosiale grupper
  - Offentlige reguleringer har effektivt omfordelt alle produktive eiendeler likt blant innbyggerne, noe som gjør eierskapsbasert klasseanalyse foreldet
  - Moderne teknologi har automatisert alle produksjonsprosesser, noe som har eliminert behovet for både arbeidere og kapitaleiere i økonomisk aktivitet
explanation: |
  Paul Leroy-Beaulieus analyse avdekker motsetninger i marxistiske kategorier: Rike kunstnere, idrettsutøvere og profesjonelle mangler produksjonsmidler, men har likevel fremgang, mens kapitaleiere hele tiden må arbeide gjennom markedsanalyser og investeringsbeslutninger. Dette viser at moderne samfunn er organisert rundt selve arbeidet, der rikdom kontinuerlig må tjenes gjennom arbeid, snarere enn faste klasseeierskapsmønstre.
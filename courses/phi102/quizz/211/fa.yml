question: بر اساس تحلیل اقتصادی لیبرال، چه چیزی بیهودگی اعمال تمایزات طبقاتی مارکسیستی بر جوامع سرمایه‌داری مدرن را نشان می‌دهد؟
answer: حرفه‌ای‌های ثروتمند مانند هنرمندان و ورزشکاران مالک وسایل تولید نیستند اما از نظر اقتصادی در مضیقه نیستند، در حالی که صاحبان سرمایه باید به طور مداوم کار کنند تا ثروت خود را حفظ کنند.
wrong_answers:
  - نبود کامل نابرابری اقتصادی در جوامع مدرن هرگونه مبنایی برای تمایز طبقاتی بین گروه‌های اجتماعی مختلف را از بین می‌برد.
  - مقررات دولتی به طور مؤثر تمامی دارایی‌های تولیدی را به طور مساوی در میان شهروندان توزیع کرده‌اند و تحلیل طبقاتی مبتنی بر مالکیت را منسوخ کرده‌اند.
  - فناوری مدرن تمام فرآیندهای تولید را خودکار کرده است و نیاز به کارگران و صاحبان سرمایه را در فعالیت‌های اقتصادی از بین برده است.
explanation: |
  تحلیل پل لروی-بوالو تناقضاتی را در دسته‌بندی‌های مارکسیستی آشکار می‌کند: هنرمندان، ورزشکاران و حرفه‌ای‌های ثروتمند فاقد وسایل تولید هستند اما موفق می‌شوند، در حالی که صاحبان سرمایه باید به طور مداوم از طریق تحلیل بازار و تصمیمات سرمایه‌گذاری کار کنند. این نشان می‌دهد که جوامع مدرن حول محور خود کار سازماندهی می‌شوند، جایی که ثروت باید به طور مداوم از طریق کار به دست آید، نه از طریق الگوهای ثابت مالکیت طبقاتی.
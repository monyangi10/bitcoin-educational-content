question: ตามการวิเคราะห์เศรษฐศาสตร์เสรีนิยม อะไรที่แสดงให้เห็นถึงความไร้ประโยชน์ของการใช้การแบ่งชนชั้นแบบมาร์กซิสต์กับสังคมทุนนิยมสมัยใหม่?
answer: ผู้เชี่ยวชาญที่ร่ำรวยเช่นศิลปินและนักกีฬามิได้เป็นเจ้าของปัจจัยการผลิตแต่ก็ไม่ได้เสียเปรียบทางเศรษฐกิจ ในขณะที่เจ้าของทุนต้องทำงานอย่างต่อเนื่องเพื่อรักษาความมั่งคั่งของตน
wrong_answers:
  - การขาดความไม่เท่าเทียมทางเศรษฐกิจอย่างสิ้นเชิงในสังคมสมัยใหม่กำจัดพื้นฐานใด ๆ สำหรับการแบ่งแยกชนชั้นระหว่างกลุ่มสังคมต่าง ๆ
  - กฎระเบียบของรัฐบาลได้กระจายทรัพย์สินที่มีประสิทธิผลทั้งหมดอย่างเท่าเทียมกันในหมู่พลเมือง ทำให้การวิเคราะห์ชนชั้นตามการเป็นเจ้าของล้าสมัย
  - เทคโนโลยีสมัยใหม่ได้ทำให้กระบวนการผลิตทั้งหมดเป็นอัตโนมัติ กำจัดความจำเป็นสำหรับทั้งแรงงานและเจ้าของทุนในกิจกรรมทางเศรษฐกิจ
explanation: |
  การวิเคราะห์ของ Paul Leroy-Beaulieu เผยให้เห็นความขัดแย้งในหมวดหมู่ของมาร์กซิสต์: ศิลปิน นักกีฬา และมืออาชีพที่ร่ำรวยไม่มีวิธีการผลิตแต่กลับเจริญรุ่งเรือง ในขณะที่เจ้าของทุนต้องทำงานอย่างต่อเนื่องผ่านการวิเคราะห์ตลาดและการตัดสินใจลงทุน สิ่งนี้แสดงให้เห็นว่าสังคมสมัยใหม่จัดระเบียบรอบการทำงานเอง ซึ่งความมั่งคั่งต้องได้รับอย่างต่อเนื่องผ่านแรงงาน แทนที่จะเป็นรูปแบบการเป็นเจ้าของชั้นที่ตายตัว
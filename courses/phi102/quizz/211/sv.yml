question: Vad visar, enligt liberal ekonomisk analys, att det är meningslöst att tillämpa marxistiska klasskillnader på moderna kapitalistiska samhällen?
answer: Förmögna yrkesutövare som konstnärer och idrottare äger inte produktionsmedel men är ändå inte ekonomiskt missgynnade, medan kapitalägare ständigt måste arbeta för att behålla sin rikedom
wrong_answers:
  - Den totala avsaknaden av ekonomisk ojämlikhet i moderna samhällen eliminerar varje grund för klasskillnader mellan olika sociala grupper
  - Statliga regleringar har effektivt omfördelat alla produktiva tillgångar lika mellan medborgarna, vilket gör ägandebaserad klassanalys obsolet
  - Modern teknik har automatiserat alla produktionsprocesser, vilket eliminerar behovet av både arbetare och kapitalägare i den ekonomiska aktiviteten
explanation: |
  Paul Leroy-Beaulieus analys visar på motsägelser i marxistiska kategorier: rika konstnärer, idrottare och yrkesmän saknar produktionsmedel men är ändå framgångsrika, medan kapitalägare ständigt måste arbeta genom marknadsanalyser och investeringsbeslut. Detta visar att moderna samhällen organiseras kring själva arbetet, där rikedomar ständigt måste förtjänas genom arbete, snarare än fasta klassägandemönster.
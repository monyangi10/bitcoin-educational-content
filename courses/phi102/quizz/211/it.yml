question: Secondo l'analisi economica liberale, cosa dimostra l'inutilità di applicare le distinzioni di classe marxiste alle moderne società capitalistiche?
answer: I professionisti ricchi, come gli artisti e gli atleti, non possiedono mezzi di produzione e non sono quindi economicamente svantaggiati, mentre i proprietari di capitale devono lavorare continuamente per mantenere la loro ricchezza
wrong_answers:
  - La completa assenza di disuguaglianza economica nelle società moderne elimina qualsiasi base per le distinzioni di classe tra i diversi gruppi sociali
  - I regolamenti governativi hanno effettivamente ridistribuito tutti i beni produttivi in modo equo tra i cittadini, rendendo obsoleta l'analisi di classe basata sulla proprietà
  - La tecnologia moderna ha automatizzato tutti i processi produttivi, eliminando la necessità di lavoratori e di capitale nell'attività economica
explanation: |
  L'analisi di Paul Leroy-Beaulieu rivela le contraddizioni delle categorie marxiste: gli artisti, gli atleti e i professionisti ricchi non hanno mezzi di produzione eppure prosperano, mentre i proprietari di capitale devono costantemente lavorare attraverso analisi di mercato e decisioni di investimento. Questo dimostra che le società moderne si organizzano intorno al lavoro stesso, dove la ricchezza deve essere continuamente guadagnata attraverso il lavoro, piuttosto che attraverso modelli di proprietà di classe fissi.
question: 根据自由主义经济分析，什么证明了将马克思主义阶级划分应用于现代资本主义社会是徒劳无益的？
answer: 艺术家和运动员等富裕的专业人士并不拥有生产资料，但在经济上并不处于劣势，而资本所有者则必须不断努力以维持其财富
wrong_answers:
  - 现代社会完全不存在经济不平等，这就消除了不同社会群体之间存在阶级差别的任何基础
  - 政府法规有效地在公民之间平等地重新分配了所有生产性资产，使基于所有权的阶级分析变得不合时宜
  - 现代技术使所有生产流程自动化，经济活动中不再需要工人和资本所有者
explanation: |
  保罗-勒鲁瓦-博略的分析揭示了马克思主义范畴中的矛盾：富有的艺术家、运动员和专业人士缺乏生产手段，但却繁荣昌盛，而资本所有者必须通过市场分析和投资决策不断工作。这表明，现代社会是围绕工作本身组织起来的，财富必须不断通过劳动来赚取，而不是固定的阶级所有制模式。
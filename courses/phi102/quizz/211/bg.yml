question: Според либералния икономически анализ какво показва безсмислието на прилагането на марксистките класови различия в съвременните капиталистически общества?
answer: Богатите професионалисти като артистите и спортистите не притежават средства за производство, но не са в икономически неравностойно положение, докато собствениците на капитал трябва да работят непрекъснато, за да поддържат богатството си
wrong_answers:
  - Пълното отсъствие на икономическо неравенство в съвременните общества елиминира всякаква основа за класови различия между различните социални групи
  - Правителствените разпоредби ефективно преразпределят всички производствени активи поравно между гражданите, което прави класовия анализ, основан на собствеността, ненужен
  - Съвременните технологии автоматизират всички производствени процеси, като премахват необходимостта от работници и собственици на капитал в икономическата дейност
explanation: |
  Анализът на Пол Леруа-Болио разкрива противоречия в марксистките категории: богатите артисти, спортисти и професионалисти нямат производствени средства, но въпреки това просперират, докато собствениците на капитал трябва постоянно да работят чрез пазарни анализи и инвестиционни решения. Това показва, че съвременните общества се организират около самата работа, където богатството трябва да се печели непрекъснато чрез труд, а не чрез фиксирани класови модели на собственост.
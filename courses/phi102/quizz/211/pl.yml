question: Co według liberalnej analizy ekonomicznej pokazuje bezcelowość stosowania marksistowskich rozróżnień klasowych w nowoczesnych społeczeństwach kapitalistycznych?
answer: Zamożni profesjonaliści, tacy jak artyści i sportowcy, nie posiadają środków produkcji, ale nie znajdują się w niekorzystnej sytuacji ekonomicznej, podczas gdy właściciele kapitału muszą stale pracować, aby utrzymać swoje bogactwo
wrong_answers:
  - Całkowity brak nierówności ekonomicznych we współczesnych społeczeństwach eliminuje wszelkie podstawy do rozróżnień klasowych między różnymi grupami społecznymi
  - Regulacje rządowe skutecznie redystrybuowały wszystkie aktywa produkcyjne równo między obywateli, czyniąc analizę klasową opartą na własności przestarzałą
  - Nowoczesna technologia zautomatyzowała wszystkie procesy produkcyjne, eliminując potrzebę zarówno pracowników, jak i właścicieli kapitału w działalności gospodarczej
explanation: |
  Analiza Paula Leroy-Beaulieu ujawnia sprzeczności w marksistowskich kategoriach: bogatym artystom, sportowcom i profesjonalistom brakuje środków produkcji, a mimo to prosperują, podczas gdy właściciele kapitału muszą nieustannie pracować poprzez analizę rynku i decyzje inwestycyjne. Pokazuje to, że współczesne społeczeństwa organizują się wokół samej pracy, gdzie bogactwo musi być nieustannie zdobywane poprzez pracę, a nie ustalone wzorce własności klasowej.
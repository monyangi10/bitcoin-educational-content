question: Wat toont volgens de liberale economische analyse de nutteloosheid aan van het toepassen van marxistische klassentegenstellingen op moderne kapitalistische samenlevingen?
answer: Rijke professionals zoals artiesten en atleten bezitten geen productiemiddelen en zijn toch niet economisch benadeeld, terwijl kapitaalbezitters continu moeten werken om hun rijkdom te behouden
wrong_answers:
  - De volledige afwezigheid van economische ongelijkheid in moderne samenlevingen elimineert elke basis voor klassenonderscheid tussen verschillende sociale groepen
  - Overheidsregels hebben effectief alle productieve activa gelijkelijk herverdeeld onder de burgers, waardoor een klassenanalyse op basis van eigendom achterhaald is
  - Moderne technologie heeft alle productieprocessen geautomatiseerd, waardoor er geen behoefte meer is aan zowel arbeiders als kapitaaleigenaren in economische activiteit
explanation: |
  Paul Leroy-Beaulieu's analyse onthult tegenstrijdigheden in marxistische categorieën: rijke artiesten, atleten en professionals hebben geen productiemiddelen maar floreren toch, terwijl kapitaalbezitters constant moeten werken door marktanalyse en investeringsbeslissingen. Dit laat zien dat moderne samenlevingen zich organiseren rond het werk zelf, waar rijkdom voortdurend moet worden verdiend door arbeid, in plaats van vaste klasseneigendomspatronen.
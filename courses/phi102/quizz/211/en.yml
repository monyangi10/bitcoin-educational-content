question: According to liberal economic analysis, what demonstrates the futility of applying Marxist class distinctions to modern capitalist societies?
answer: Wealthy professionals like artists and athletes don't own means of production yet aren't economically disadvantaged, while capital owners must continuously work to maintain their wealth
wrong_answers:
  - The complete absence of economic inequality in modern societies eliminates any basis for class distinctions between different social groups
  - Government regulations have effectively redistributed all productive assets equally among citizens, making ownership-based class analysis obsolete
  - Modern technology has automated all production processes, eliminating the need for both workers and capital owners in economic activity
explanation: |
  Paul Leroy-Beaulieu's analysis reveals contradictions in Marxist categories: rich artists, athletes, and professionals lack production means yet prosper, while capital owners must constantly work through market analysis and investment decisions. This shows that modern societies organize around work itself, where wealth must be continually earned through labor, rather than fixed class ownership patterns.

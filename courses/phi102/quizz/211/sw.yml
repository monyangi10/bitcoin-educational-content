question: Kulingana na uchambuzi wa uchumi huria, ni nini kinachoonyesha ubatili wa kutumia tofauti za kitabaka za Marx katika jamii za kisasa za kibepari?
answer: Wataalamu matajiri kama wasanii na wanariadha hawana njia za uzalishaji lakini hawajaathiriwa kiuchumi, huku wamiliki wa mitaji wakilazimika kufanya kazi kila mara ili kudumisha utajiri wao.
wrong_answers:
  - Kukosekana kabisa kwa usawa wa kiuchumi katika jamii za kisasa huondoa msingi wowote wa tofauti za kitabaka kati ya makundi tofauti ya kijamii.
  - Kanuni za serikali zimegawanya upya mali zote zenye tija kwa usawa miongoni mwa raia, na kufanya uchanganuzi wa kitabaka unaotegemea umiliki kuwa wa kizamani.
  - Teknolojia ya kisasa imeendesha michakato yote ya uzalishaji kiotomatiki, ikiondoa hitaji la wafanyakazi na wamiliki wa mitaji katika shughuli za kiuchumi.
explanation: |
  Uchambuzi wa Paul Leroy-Beaulieu unaonyesha utata katika kategoria za Marx: wasanii matajiri, wanariadha, na wataalamu hawana njia za uzalishaji lakini wanafanikiwa, huku wamiliki wa mitaji wakilazimika kufanya kazi kila mara kupitia uchambuzi wa soko na maamuzi ya uwekezaji. Hii inaonyesha kwamba jamii za kisasa hujipanga kuzunguka kazi yenyewe, ambapo utajiri lazima upatikane kila mara kupitia kazi, badala ya mifumo ya umiliki wa tabaka isiyobadilika.
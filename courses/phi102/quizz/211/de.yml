question: Was zeigt der liberalen Wirtschaftsanalyse zufolge, dass es sinnlos ist, marxistische Klassenunterscheidungen auf moderne kapitalistische Gesellschaften anzuwenden?
answer: Wohlhabende Berufstätige wie Künstler und Sportler besitzen keine Produktionsmittel und sind dennoch nicht wirtschaftlich benachteiligt, während Kapitaleigner ständig arbeiten müssen, um ihren Wohlstand zu erhalten
wrong_answers:
  - Das völlige Fehlen wirtschaftlicher Ungleichheit in modernen Gesellschaften beseitigt jede Grundlage für Klassenunterschiede zwischen verschiedenen sozialen Gruppen
  - Staatliche Vorschriften haben alle produktiven Vermögenswerte gleichmäßig unter den Bürgern verteilt, so dass die eigentumsbasierte Klassenanalyse obsolet geworden ist
  - Die moderne Technologie hat alle Produktionsprozesse automatisiert, so dass weder Arbeiter noch Kapitaleigner für die Wirtschaftstätigkeit benötigt werden
explanation: |
  Paul Leroy-Beaulieus Analyse deckt Widersprüche in marxistischen Kategorien auf: Reiche Künstler, Sportler und Fachleute verfügen über keine Produktionsmittel und sind dennoch wohlhabend, während Kapitaleigner ständig durch Marktanalysen und Investitionsentscheidungen arbeiten müssen. Dies zeigt, dass sich moderne Gesellschaften um die Arbeit selbst herum organisieren, wo Reichtum ständig durch Arbeit verdient werden muss, und nicht durch feste Klassenbesitzverhältnisse.
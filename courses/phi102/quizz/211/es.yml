question: Según el análisis económico liberal, ¿qué demuestra la inutilidad de aplicar las distinciones de clase marxistas a las sociedades capitalistas modernas?
answer: Los profesionales ricos, como los artistas y los deportistas, no son propietarios de medios de producción y, sin embargo, no se ven perjudicados económicamente, mientras que los propietarios de capital deben trabajar continuamente para mantener su riqueza
wrong_answers:
  - La ausencia total de desigualdad económica en las sociedades modernas elimina cualquier base para las distinciones de clase entre los diferentes grupos sociales
  - Las normativas gubernamentales han redistribuido todos los activos productivos de forma equitativa entre los ciudadanos, lo que ha dejado obsoleto el análisis de clases basado en la propiedad
  - La tecnología moderna ha automatizado todos los procesos de producción, eliminando la necesidad tanto de trabajadores como de propietarios de capital en la actividad económica
explanation: |
  El análisis de Paul Leroy-Beaulieu revela contradicciones en las categorías marxistas: los artistas, deportistas y profesionales ricos carecen de medios de producción y, sin embargo, prosperan, mientras que los propietarios de capital deben trabajar constantemente mediante el análisis del mercado y las decisiones de inversión. Esto demuestra que las sociedades modernas se organizan en torno al trabajo mismo, donde la riqueza debe ganarse continuamente a través del trabajo, en lugar de patrones fijos de propiedad de clase.
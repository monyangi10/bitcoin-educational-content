question: Prema liberalnoj ekonomskoj analizi, šta pokazuje uzaludnost primene marksističkih klasnih distinkcija na moderna kapitalistička društva?
answer: Bogatiji profesionalci poput umetnika i sportista ne poseduju sredstva za proizvodnju, ali nisu ekonomski ugroženi, dok vlasnici kapitala moraju neprestano raditi kako bi održali svoje bogatstvo.
wrong_answers:
  - Potpuno odsustvo ekonomske nejednakosti u modernim društvima eliminiše bilo kakvu osnovu za klasne razlike između različitih društvenih grupa
  - Vladine regulative su efikasno preraspodelile svu produktivnu imovinu jednako među građanima, čineći analizu klasa zasnovanu na vlasništvu zastarelom.
  - Moderna tehnologija je automatizovala sve proizvodne procese, eliminišući potrebu za radnicima i vlasnicima kapitala u ekonomskoj aktivnosti.
explanation: |
  Analiza Paula Leroy-Beaulieua otkriva kontradikcije u marksističkim kategorijama: bogati umetnici, sportisti i profesionalci nemaju sredstva za proizvodnju, a ipak napreduju, dok vlasnici kapitala moraju stalno raditi kroz analizu tržišta i investicione odluke. Ovo pokazuje da se moderna društva organizuju oko samog rada, gde se bogatstvo mora kontinuirano zarađivati kroz rad, umesto kroz fiksne obrasce klasnog vlasništva.
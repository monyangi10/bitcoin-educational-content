question: Liberal ekonomik analize göre, Marksist sınıf ayrımlarını modern kapitalist toplumlara uygulamanın yararsızlığını gösteren nedir?
answer: Sanatçılar ve sporcular gibi varlıklı profesyoneller üretim araçlarına sahip olmadıkları halde ekonomik olarak dezavantajlı değilken, sermaye sahipleri servetlerini korumak için sürekli çalışmak zorundadır
wrong_answers:
  - Modern toplumlarda ekonomik eşitsizliğin tamamen ortadan kalkması, farklı sosyal gruplar arasındaki sınıf ayrımları için herhangi bir temeli ortadan kaldırır
  - Hükümet düzenlemeleri, tüm üretken varlıkları vatandaşlar arasında etkin bir şekilde eşit olarak yeniden dağıtmış ve mülkiyete dayalı sınıf analizini geçersiz kılmıştır
  - Modern teknoloji tüm üretim süreçlerini otomatikleştirerek ekonomik faaliyetlerde hem işçilere hem de sermaye sahiplerine olan ihtiyacı ortadan kaldırmıştır
explanation: |
  Paul Leroy-Beaulieu'nun analizi Marksist kategorilerdeki çelişkileri ortaya koymaktadır: zengin sanatçılar, sporcular ve profesyoneller üretim araçlarından yoksun olmalarına rağmen zenginleşirken, sermaye sahipleri piyasa analizi ve yatırım kararları yoluyla sürekli çalışmak zorundadır. Bu da modern toplumların sabit sınıfsal mülkiyet kalıpları yerine, servetin sürekli olarak emek yoluyla kazanılması gereken işin kendisi etrafında örgütlendiğini göstermektedir.
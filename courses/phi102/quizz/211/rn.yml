question: Dushingiye ku nseguro y’ubutunzi y’ubwigenge, ni igiki cerekana ubusa bwo gukoresha itandukaniro ry’imigwi ry’aba Marxiste mu mibano y’abanyagihugu bo muri iki gihe?
answer: Abatunzi b’abahinga nk’abahinga mu vy’ubuhinga bw’amasanamu n’abakinnyi b’umupira w’amaguru ntibafise uburyo bwo gukora ariko ntibacitse intege mu vy’ubutunzi, mu gihe abafise umutungo bategerezwa kubandanya bakora kugira ngo bagumane ubutunzi bwabo .
wrong_answers:
  - Kuba ata buringanire mu vy’ubutunzi buriho mu mibano ya none, birakuraho ishingiro ryose ryo gutandukanya imigwi hagati y’imigwi itandukanye y’abantu .
  - Amategeko ya Leta yarasubiye kugabanya neza itunga ryose ritanga inyungu mu buryo bungana hagati y’abanyagihugu, bituma isesengura ry’imigwi rishingiye ku bunywanyi ritagira akamaro .
  - Ivyuma vy’ubuhinga bwa none vyatumye ibikorwa vyose vyo guhingura ibintu bigenda neza, ivyo bikaba vyatumye abakozi n’abafise umutungo batagira ivy’ubutunzi mu bikorwa vy’ubutunzi .
explanation: |
  Isesengura rya Paul Leroy-Beaulieu ryerekana ukuvuguruzanya mu mice y’aba Marxiste: abahinga mu vy’ubuhinga bw’amasanamu, abakinnyi n’abahinga b’abatunzi ntibagira uburyo bwo gukora ariko bagatera imbere, mu gihe abafise umutungo bategerezwa kwama bakora biciye mu gusesangura isoko no gufata ingingo zo gushora imari mu bikorwa. Ivyo vyerekana ko imibano yo muri iki gihe itunganirizwa hirya no hino y’akazi ubwako, aho ubutunzi butegerezwa gukomeza kuronswa biciye mu bikorwa, aho gushingira ku buryo buhoraho bw’ubutunzi bw’imigwi.
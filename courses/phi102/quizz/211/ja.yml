question: 自由主義経済分析によれば、マルクス主義の階級区分を現代の資本主義社会に適用することの無益さを示すものは何か？
answer: 芸術家やスポーツ選手のような裕福な職業人は、生産手段を所有していないにもかかわらず、経済的に不利な状況に置かれていない。
wrong_answers:
  - 現代社会では経済的不平等が全くないため、異なる社会集団間の階級的区別の根拠がなくなる。
  - 政府の規制によって、すべての生産的資産が国民に平等に再配分され、所有権に基づく階級分析は時代遅れになった。
  - 現代のテクノロジーはすべての生産プロセスを自動化し、経済活動における労働者と資本所有者の両方を不要にした
explanation: |
  ポール・ルロワ＝ボリューの分析は、マルクス主義のカテゴリーにおける矛盾を明らかにしている。裕福な芸術家、スポーツ選手、専門家は生産手段を欠いているにもかかわらず繁栄しているが、一方、資本所有者は市場分析と投資決定を通じて絶えず働かなければならない。これは、現代社会が固定的な階級所有パターンではなく、労働を通じて富を継続的に獲得しなければならない、労働そのものを中心に組織化されていることを示している。
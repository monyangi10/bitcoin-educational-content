question: 자유주의 경제 분석에 따르면, 마르크스주의 계급 구분을 현대 자본주의 사회에 적용하는 것이 무의미하다는 것을 보여주는 것은 무엇인가요?
answer: 예술가나 운동선수와 같은 부유한 전문직 종사자는 생산 수단을 소유하지 않지만 경제적으로 불이익을 받지 않는 반면, 자본 소유자는 부를 유지하기 위해 지속적으로 노력해야 합니다
wrong_answers:
  - 현대 사회에서 경제적 불평등이 완전히 사라짐에 따라 다양한 사회 집단 간의 계급 구분의 근거가 사라졌습니다
  - 정부 규제로 인해 모든 생산 자산이 시민들에게 균등하게 재분배되어 소유권 기반 계급 분석이 쓸모없어졌습니다
  - 현대 기술은 모든 생산 공정을 자동화하여 경제 활동에서 노동자와 자본 소유자 모두의 필요성을 없애고 있습니다
explanation: |
  폴 르로이-보리외의 분석은 부유한 예술가, 운동선수, 전문직 종사자는 생산 수단이 부족하지만 번영하는 반면, 자본 소유자는 시장 분석과 투자 결정을 통해 끊임없이 노력해야 한다는 마르크스주의 범주에 모순이 있음을 드러냅니다. 이는 현대 사회가 고정된 계급 소유 패턴이 아니라 노동을 통해 지속적으로 부를 획득해야 하는 노동 자체를 중심으로 조직되어 있음을 보여줍니다.
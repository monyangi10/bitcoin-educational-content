question: De acordo com a análise económica liberal, o que demonstra a inutilidade de aplicar as distinções de classe marxistas às sociedades capitalistas modernas?
answer: Os profissionais ricos, como os artistas e os desportistas, não possuem meios de produção, mas não são economicamente desfavorecidos, enquanto os detentores de capital têm de trabalhar continuamente para manter a sua riqueza
wrong_answers:
  - A ausência total de desigualdade económica nas sociedades modernas elimina qualquer base para distinções de classe entre diferentes grupos sociais
  - Os regulamentos governamentais redistribuíram efetivamente todos os bens produtivos de forma igual entre os cidadãos, tornando obsoleta a análise de classes baseada na propriedade
  - A tecnologia moderna automatizou todos os processos de produção, eliminando a necessidade de trabalhadores e proprietários de capital na atividade económica
explanation: |
  A análise de Paul Leroy-Beaulieu revela contradições nas categorias marxistas: os artistas, desportistas e profissionais ricos carecem de meios de produção, mas prosperam, enquanto os proprietários de capital têm de trabalhar constantemente através da análise do mercado e de decisões de investimento. Isto mostra que as sociedades modernas se organizam em torno do próprio trabalho, onde a riqueza deve ser continuamente ganha através do trabalho, em vez de padrões fixos de propriedade de classe.
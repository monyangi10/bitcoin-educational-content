question: Menurut analisis ekonomi liberal, apa yang menunjukkan kesia-siaan penerapan pembedaan kelas Marxis pada masyarakat kapitalis modern?
answer: Para profesional kaya seperti artis dan atlet tidak memiliki alat produksi namun tidak dirugikan secara ekonomi, sementara pemilik modal harus terus bekerja untuk mempertahankan kekayaan mereka
wrong_answers:
  - Tidak adanya ketimpangan ekonomi dalam masyarakat modern menghilangkan dasar apa pun untuk perbedaan kelas di antara berbagai kelompok sosial
  - Peraturan pemerintah telah secara efektif mendistribusikan kembali semua aset produktif secara merata di antara warga negara, membuat analisis kelas berbasis kepemilikan menjadi usang
  - Teknologi modern telah mengotomatiskan semua proses produksi, sehingga tidak lagi membutuhkan pekerja dan pemilik modal dalam kegiatan ekonomi
explanation: |
  Analisis Paul Leroy-Beaulieu mengungkapkan kontradiksi dalam kategori Marxis: seniman, atlet, dan profesional yang kaya tidak memiliki sarana produksi namun tetap makmur, sementara pemilik modal harus terus-menerus bekerja melalui analisis pasar dan keputusan investasi. Hal ini menunjukkan bahwa masyarakat modern terorganisir berdasarkan kerja itu sendiri, di mana kekayaan harus terus diperoleh melalui kerja, bukan pola kepemilikan kelas yang tetap.
question: Selon l'analyse économique libérale, qu'est-ce qui démontre la futilité de l'application des distinctions de classe marxistes aux sociétés capitalistes modernes ?
answer: Les professionnels fortunés, tels que les artistes et les athlètes, ne possèdent pas de moyens de production et ne sont donc pas désavantagés sur le plan économique, tandis que les détenteurs de capitaux doivent constamment travailler pour maintenir leur richesse
wrong_answers:
  - L'absence totale d'inégalité économique dans les sociétés modernes élimine toute base pour les distinctions de classe entre les différents groupes sociaux
  - Les réglementations gouvernementales ont effectivement redistribué tous les actifs productifs de manière égale entre les citoyens, rendant obsolète l'analyse de classe basée sur la propriété
  - La technologie moderne a automatisé tous les processus de production, éliminant ainsi le besoin de travailleurs et de détenteurs de capitaux dans l'activité économique
explanation: |
  L'analyse de Paul Leroy-Beaulieu révèle des contradictions dans les catégories marxistes : les artistes, les athlètes et les professionnels riches manquent de moyens de production mais prospèrent, tandis que les détenteurs de capitaux doivent constamment travailler en analysant le marché et en prenant des décisions d'investissement. Cela montre que les sociétés modernes s'organisent autour du travail lui-même, où la richesse doit être continuellement gagnée par le travail, plutôt que par des modèles de propriété de classe fixes.
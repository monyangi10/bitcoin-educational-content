question: Mikä osoittaa liberaalin talousanalyysin mukaan, että marxilaisen luokkaerottelun soveltaminen nykyaikaisiin kapitalistisiin yhteiskuntiin on turhaa?
answer: Rikkaat ammattilaiset, kuten taiteilijat ja urheilijat, eivät omista tuotantovälineitä, mutta eivät silti ole taloudellisesti epäedullisessa asemassa, kun taas pääoman omistajien on jatkuvasti työskenneltävä säilyttääkseen varallisuutensa
wrong_answers:
  - Taloudellisen epätasa-arvon täydellinen puuttuminen nyky-yhteiskunnista poistaa kaiken perustan eri sosiaaliryhmien väliselle luokkaerottelulle
  - Hallituksen säädökset ovat jakaneet tehokkaasti kaikki tuotantovarat tasan kansalaisten kesken, mikä tekee omistukseen perustuvasta luokka-analyysistä vanhentunutta
  - Nykyaikainen teknologia on automatisoinut kaikki tuotantoprosessit, mikä on poistanut sekä työntekijöiden että pääoman omistajien tarpeen taloudellisessa toiminnassa
explanation: |
  Paul Leroy-Beaulieun analyysi paljastaa ristiriitaisuuksia marxilaisissa kategorioissa: rikkailta taiteilijoilta, urheilijoilta ja ammattilaisilta puuttuvat tuotantovälineet, mutta he vaurastuvat, kun taas pääoman omistajien on jatkuvasti työskenneltävä markkina-analyysin ja investointipäätösten kautta. Tämä osoittaa, että nykyaikaiset yhteiskunnat organisoituvat itse työn ympärille, jossa vauraus on jatkuvasti ansaittava työn avulla, eikä niinkään kiinteiden luokkien omistusmallien kautta.
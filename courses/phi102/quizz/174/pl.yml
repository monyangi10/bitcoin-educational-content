question: W jaki sposób utrata wolności gospodarczej w systemie kolektywistycznym wpływa na inne wolności jednostki zgodnie z analizą liberalną?
answer: Tworzy to efekt kaskadowy, w którym wszystkie inne wolności są systematycznie eliminowane z powodu kontroli państwa nad produkcją i dystrybucją
wrong_answers:
  - Wpływa przede wszystkim na wybory ekonomiczne, ale pozwala innym wolnościom, takim jak wolność słowa i przemieszczania się, pozostać w dużej mierze nienaruszonymi
  - Wzmacnia swobody polityczne, dając obywatelom więcej uprawnień do zbiorowego podejmowania decyzji w sprawach gospodarczych
  - Ogranicza jedynie swobody w miejscu pracy, zachowując jednocześnie swobody osobiste, takie jak wybór miejsca zamieszkania i relacje rodzinne
explanation: |
  Liberalna analiza pokazuje, że wolność gospodarcza jest podstawą wszystkich innych wolności. Gdy państwo kontroluje produkcję i dystrybucję, siłą rzeczy kontroluje też to, gdzie ludzie pracują, a co za tym idzie, gdzie mieszkają. Państwowa własność prasy drukarskiej eliminuje wolność prasy, podczas gdy regulowana wymiana ogranicza nawet relacje osobiste. To wzajemne powiązanie pokazuje, że wolności gospodarczej nie można oddzielić od innych wolności jednostki - utrata jednej z nich prowadzi do utraty wszystkich innych w systematycznym efekcie kaskadowym.
question: Hur påverkar förlusten av den ekonomiska friheten i ett kollektivistiskt system andra individuella friheter enligt den liberala analysen?
answer: Det skapar en kaskadeffekt där alla andra friheter systematiskt elimineras på grund av statlig kontroll över produktion och distribution
wrong_answers:
  - Det påverkar främst ekonomiska val, men gör att andra friheter som yttrandefrihet och rörelsefrihet i stort sett kan förbli intakta
  - Det stärker de politiska friheterna genom att ge medborgarna mer kollektiv beslutanderätt i ekonomiska frågor
  - Den begränsar endast friheten på arbetsplatsen samtidigt som den bevarar personliga friheter som val av bostad och familjerelationer
explanation: |
  Den liberala analysen visar att den ekonomiska friheten är grunden för alla andra friheter. När staten kontrollerar produktion och distribution kontrollerar den med nödvändighet var människor arbetar och därmed var de bor. Statligt ägande av tryckpressar eliminerar pressfriheten, medan reglerade utbyten begränsar till och med personliga relationer. Denna sammankoppling visar att ekonomisk frihet inte kan skiljas från andra individuella friheter - att förlora en leder till att förlora alla andra i en systematisk kaskadeffekt.
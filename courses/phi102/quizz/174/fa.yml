question: از دست دادن آزادی اقتصادی در یک سیستم جمع‌گرایانه چگونه بر سایر آزادی‌های فردی تأثیر می‌گذارد طبق تحلیل لیبرال؟
answer: این یک اثر آبشاری ایجاد می‌کند که در آن تمام آزادی‌های دیگر به دلیل کنترل دولت بر تولید و توزیع به طور سیستماتیک حذف می‌شوند.
wrong_answers:
  - این به طور عمده بر انتخاب‌های اقتصادی تأثیر می‌گذارد اما آزادی‌های دیگر مانند گفتار و حرکت را تا حد زیادی دست‌نخورده باقی می‌گذارد.
  - این امر آزادی‌های سیاسی را با دادن قدرت تصمیم‌گیری جمعی بیشتر به شهروندان در مسائل اقتصادی تقویت می‌کند.
  - این تنها آزادی‌های محیط کار را محدود می‌کند در حالی که آزادی‌های شخصی مانند انتخاب محل اقامت و روابط خانوادگی را حفظ می‌کند.
explanation: |
  تحلیل لیبرال نشان می‌دهد که آزادی اقتصادی پایه‌ای برای تمامی آزادی‌های دیگر است. زمانی که دولت تولید و توزیع را کنترل می‌کند، به‌طور ضروری کنترل می‌کند که مردم کجا کار کنند و بنابراین کجا زندگی کنند. مالکیت دولتی بر چاپخانه‌ها آزادی مطبوعات را از بین می‌برد، در حالی که مبادلات تنظیم‌شده حتی روابط شخصی را محدود می‌کند. این ارتباط نشان می‌دهد که آزادی اقتصادی نمی‌تواند از دیگر آزادی‌های فردی جدا شود - از دست دادن یکی منجر به از دست دادن همه‌ی دیگران در یک اثر آبشاری سیستماتیک می‌شود.
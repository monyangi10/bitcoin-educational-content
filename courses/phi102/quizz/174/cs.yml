question: Jak ztráta ekonomické svobody v kolektivistickém systému ovlivňuje ostatní individuální svobody podle liberální analýzy?
answer: Vytváří kaskádový efekt, kdy jsou všechny ostatní svobody systematicky eliminovány díky státní kontrole nad výrobou a distribucí
wrong_answers:
  - Ovlivňuje především ekonomické volby, ale umožňuje, aby ostatní svobody, jako je svoboda projevu a pohybu, zůstaly do značné míry nedotčeny
  - Posiluje politické svobody tím, že dává občanům větší kolektivní rozhodovací pravomoci v ekonomických záležitostech
  - Omezuje pouze svobody na pracovišti a zachovává osobní svobody, jako je volba bydliště a rodinné vztahy
explanation: |
  Liberální analýza ukazuje, že ekonomická svoboda je základem všech ostatních svobod. Když stát kontroluje výrobu a distribuci, nutně kontroluje i to, kde lidé pracují, a tedy i to, kde žijí. Státní vlastnictví tiskařských strojů eliminuje svobodu tisku, zatímco regulovaná směna omezuje dokonce i osobní vztahy. Tato vzájemná provázanost ukazuje, že ekonomickou svobodu nelze oddělit od ostatních individuálních svobod - ztráta jedné vede ke ztrátě všech ostatních v systematickém kaskádovém efektu.
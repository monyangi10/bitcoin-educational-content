question: Como é que a perda da liberdade económica num sistema coletivista afecta outras liberdades individuais, de acordo com a análise liberal?
answer: Cria um efeito de cascata em que todas as outras liberdades são sistematicamente eliminadas devido ao controlo estatal da produção e da distribuição
wrong_answers:
  - Afecta principalmente as escolhas económicas, mas permite que outras liberdades, como a liberdade de expressão e de circulação, permaneçam praticamente intactas
  - Reforça as liberdades políticas, conferindo aos cidadãos um maior poder de decisão colectiva em matéria económica
  - Apenas restringe as liberdades no local de trabalho, preservando as liberdades pessoais, como a escolha da residência e as relações familiares
explanation: |
  A análise liberal demonstra que a liberdade económica é a base de todas as outras liberdades. Quando o Estado controla a produção e a distribuição, controla necessariamente onde as pessoas trabalham e, por conseguinte, onde vivem. A propriedade estatal das tipografias elimina a liberdade de imprensa, enquanto as trocas regulamentadas restringem até as relações pessoais. Esta interligação mostra que a liberdade económica não pode ser separada das outras liberdades individuais - a perda de uma leva à perda de todas as outras, num efeito de cascata sistemático.
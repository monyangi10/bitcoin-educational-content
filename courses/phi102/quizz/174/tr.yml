question: Liberal analize göre kolektivist bir sistemde ekonomik özgürlüğün kaybı diğer bireysel özgürlükleri nasıl etkiler?
answer: Üretim ve dağıtım üzerindeki devlet kontrolü nedeniyle diğer tüm özgürlüklerin sistematik olarak ortadan kaldırıldığı kademeli bir etki yaratır
wrong_answers:
  - Öncelikle ekonomik tercihleri etkiler, ancak ifade ve hareket gibi diğer özgürlüklerin büyük ölçüde dokunulmadan kalmasına izin verir
  - Vatandaşlara ekonomik konularda daha fazla kolektif karar alma gücü vererek siyasi özgürlükleri güçlendirir
  - Konut seçimi ve aile ilişkileri gibi kişisel özgürlükleri korurken yalnızca işyeri özgürlüklerini kısıtlıyor
explanation: |
  Liberal analiz, ekonomik özgürlüğün diğer tüm özgürlükler için temel olduğunu göstermektedir. Devlet üretim ve dağıtımı kontrol ettiğinde, zorunlu olarak insanların nerede çalışacaklarını ve dolayısıyla nerede yaşayacaklarını da kontrol eder. Matbaaların devlet mülkiyetinde olması basın özgürlüğünü ortadan kaldırırken, düzenlenmiş mübadeleler kişisel ilişkileri bile kısıtlar. Bu birbirine bağlılık, ekonomik özgürlüğün diğer bireysel özgürlüklerden ayrı tutulamayacağını göstermektedir - birini kaybetmek, sistematik bir kademeli etkiyle diğerlerini de kaybetmeye yol açar.
question: Ni gute ukubura umwidegemvyo w’ubutunzi mu nzira y’ubumwe bigira ico bikoze ku yindi mwidegemvyo w’umuntu ku giti ciwe hakurikijwe isesengura ry’ubwigenge?
answer: Bituma habaho ingaruka zikomeye aho ubundi bwidegemvyo bwose bukurwamwo mu buryo butegekanijwe kubera ubugenzuzi bwa Leta ku bijanye n’uguhingura n’ugukwiragiza .
wrong_answers:
  - Bigira ingaruka ahanini ku mahitamwo y'ubutunzi ariko bituma uwundi mwidegemvyo nk'uwo kuvuga n'ukwinyiganza uguma ahanini udahindutse .
  - Ikomeza umwidegemvyo wa politike mu guha abanyagihugu ububasha bwo gufata ingingo rusangi ku bibazo vy'ubutunzi .
  - Bigabanya gusa umwidegemvyo wo ku kazi mu gihe bizigama umwidegemvyo w’umuntu ku giti ciwe nk’uguhitamwo aho aba n’imigenderanire yo mu muryango .
explanation: |
  Isesengura ry’ubwigenge ryerekana ko umwidegemvyo w’ubutunzi ari wo mushinge w’iyindi mwidegemvyo yose. Iyo Leta igenzura ivy’uguhingura n’ugukwiragiza, ni ngombwa ko igenzura aho abantu bakora, rero n’aho baba. Kuba Leta ari yo igira amashini y’icapa birakuraho umwidegemvyo w’abanyamakuru, mu gihe uguhanahana amakuru bitegekanijwe bibuza mbere n’imigenderanire hagati y’abantu. Ukwo guhuza kwerekana ko umwidegemvyo w’ubutunzi udashobora gutandukanywa n’uwundi mwidegemvyo w’umuntu ku giti ciwe - gutakaza umwe bituma umuntu atakaza uwundi wose mu buryo butunganye.
question: Kako gubitak ekonomske slobode u kolektivističkom sistemu utiče na druge individualne slobode prema liberalnoj analizi?
answer: Stvara efekat kaskade gde se sve druge slobode sistematski eliminišu zbog državne kontrole nad proizvodnjom i distribucijom
wrong_answers:
  - To prvenstveno utiče na ekonomske izbore, ali omogućava da druge slobode poput govora i kretanja ostanu uglavnom netaknute.
  - Ojačava političke slobode dajući građanima veću kolektivnu moć odlučivanja o ekonomskim pitanjima
  - Ograničava samo slobode na radnom mestu, dok čuva lične slobode kao što su izbor mesta stanovanja i porodični odnosi.
explanation: |
  Liberalna analiza pokazuje da je ekonomska sloboda temelj svih drugih sloboda. Kada država kontroliše proizvodnju i distribuciju, ona nužno kontroliše gde ljudi rade, a samim tim i gde žive. Državno vlasništvo nad štamparijama eliminiše slobodu štampe, dok regulisane razmene ograničavaju čak i lične odnose. Ova međusobna povezanost pokazuje da se ekonomska sloboda ne može odvojiti od drugih individualnih sloboda - gubitak jedne vodi ka gubitku svih ostalih u sistematskom kaskadnom efektu.
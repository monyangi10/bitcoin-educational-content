question: ¿Cómo afecta la pérdida de libertad económica en un sistema colectivista a otras libertades individuales según el análisis liberal?
answer: Crea un efecto cascada en el que se eliminan sistemáticamente todas las demás libertades debido al control estatal de la producción y la distribución
wrong_answers:
  - Afecta sobre todo a las opciones económicas, pero permite que otras libertades, como las de expresión y circulación, permanezcan prácticamente intactas
  - Refuerza las libertades políticas al otorgar a los ciudadanos un mayor poder de decisión colectiva en materia económica
  - Sólo restringe las libertades laborales preservando libertades personales como la elección de residencia y las relaciones familiares
explanation: |
  El análisis liberal demuestra que la libertad económica es fundamental para todas las demás libertades. Cuando el Estado controla la producción y la distribución, controla necesariamente dónde trabaja la gente y, por tanto, dónde vive. La propiedad estatal de las imprentas elimina la libertad de prensa, mientras que los intercambios regulados restringen incluso las relaciones personales. Esta interconexión demuestra que la libertad económica no puede separarse de otras libertades individuales: perder una lleva a perder todas las demás en un efecto cascada sistemático.
question: Hvordan påvirker tapet av økonomisk frihet i et kollektivistisk system andre individuelle friheter ifølge den liberale analysen?
answer: Det skaper en kaskadeeffekt der alle andre friheter systematisk elimineres på grunn av statlig kontroll over produksjon og distribusjon
wrong_answers:
  - Det påvirker først og fremst økonomiske valg, men gjør at andre friheter som ytrings- og bevegelsesfrihet i stor grad forblir intakt
  - Den styrker de politiske frihetene ved å gi innbyggerne mer kollektiv beslutningsmakt over økonomiske spørsmål
  - Den begrenser bare friheten på arbeidsplassen, mens den personlige friheten, som valg av bosted og familieforhold, bevares
explanation: |
  Den liberale analysen viser at økonomisk frihet er grunnlaget for alle andre friheter. Når staten kontrollerer produksjon og distribusjon, kontrollerer den nødvendigvis hvor folk arbeider, og dermed hvor de bor. Statlig eierskap av trykkpresser eliminerer pressefriheten, mens regulert samhandel begrenser selv personlige relasjoner. Denne sammenhengen viser at økonomisk frihet ikke kan skilles fra andre individuelle friheter - å miste én fører til å miste alle andre i en systematisk kaskadeeffekt.
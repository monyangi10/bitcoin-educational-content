question: Comment la perte de la liberté économique dans un système collectiviste affecte-t-elle les autres libertés individuelles selon l'analyse libérale ?
answer: Elle crée un effet de cascade où toutes les autres libertés sont systématiquement éliminées en raison du contrôle exercé par l'État sur la production et la distribution
wrong_answers:
  - Elle affecte principalement les choix économiques, mais permet à d'autres libertés, telles que la liberté d'expression et de mouvement, de rester largement intactes
  - Elle renforce les libertés politiques en donnant aux citoyens un plus grand pouvoir de décision collective sur les questions économiques
  - Elle ne fait que restreindre les libertés professionnelles tout en préservant les libertés individuelles telles que le choix du lieu de résidence et les relations familiales
explanation: |
  L'analyse libérale démontre que la liberté économique est le fondement de toutes les autres libertés. Lorsque l'État contrôle la production et la distribution, il contrôle nécessairement l'endroit où les gens travaillent, et donc l'endroit où ils vivent. La propriété de l'État sur les presses d'imprimerie élimine la liberté de la presse, tandis que les échanges réglementés restreignent même les relations personnelles. Cette interconnexion montre que la liberté économique ne peut être séparée des autres libertés individuelles - la perte de l'une entraîne la perte de toutes les autres dans un effet de cascade systématique.
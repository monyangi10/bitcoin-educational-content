question: In che modo la perdita della libertà economica in un sistema collettivista influisce sulle altre libertà individuali secondo l'analisi liberale?
answer: Si crea un effetto a cascata in cui tutte le altre libertà vengono sistematicamente eliminate a causa del controllo statale sulla produzione e sulla distribuzione
wrong_answers:
  - Influisce soprattutto sulle scelte economiche, ma consente di mantenere in gran parte intatte altre libertà, come quella di parola e di movimento
  - Rafforza le libertà politiche dando ai cittadini un maggiore potere decisionale collettivo sulle questioni economiche
  - Limita solo le libertà del luogo di lavoro, preservando le libertà personali come la scelta della residenza e le relazioni familiari
explanation: |
  L'analisi liberale dimostra che la libertà economica è fondamentale per tutte le altre libertà. Quando lo Stato controlla la produzione e la distribuzione, controlla necessariamente dove le persone lavorano, e quindi dove vivono. La proprietà statale delle macchine da stampa elimina la libertà di stampa, mentre gli scambi regolamentati limitano persino le relazioni personali. Questa interconnessione dimostra che la libertà economica non può essere separata dalle altre libertà individuali: la perdita di una porta alla perdita di tutte le altre in un sistematico effetto a cascata.
question: 자유주의적 분석에 따르면 집단주의 체제에서 경제적 자유의 상실은 다른 개인의 자유에 어떤 영향을 미칠까요?
answer: 생산과 유통에 대한 국가 통제로 인해 다른 모든 자유가 체계적으로 제거되는 연쇄 효과가 발생합니다
wrong_answers:
  - 주로 경제적 선택에 영향을 미치지만 언론과 이동과 같은 다른 자유는 대부분 그대로 유지됩니다
  - 시민들에게 경제 문제에 대한 집단적 의사 결정권을 부여하여 정치적 자유를 강화합니다
  - 거주지 선택 및 가족 관계와 같은 개인의 자유를 보호하면서 직장의 자유만 제한합니다
explanation: |
  자유주의적 분석은 경제적 자유가 다른 모든 자유의 기초가 된다는 것을 보여줍니다. 국가가 생산과 유통을 통제하면 필연적으로 사람들이 일하는 곳, 즉 거주지를 통제하게 됩니다. 인쇄기를 국가가 소유하면 언론의 자유가 사라지고, 거래가 규제되면 개인적 관계도 제한됩니다. 이러한 상호 연결성은 경제적 자유가 다른 개인의 자유와 분리될 수 없음을 보여주며, 하나를 잃으면 다른 모든 자유가 체계적으로 연쇄적으로 상실되는 결과를 초래합니다.
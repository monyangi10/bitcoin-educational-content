question: Nk’uko abanyabwenge b’abanyagihugu nka Paul Leroy-Beaulieu babivuga, ni kuki abahinga mu vy’uburezi n’ubuvuzi bababara mu gihe Leta igenzura ibintu bimwe bimwe naho nyene batanga ibikorwa vy’ingenzi?
answer: Ubutegetsi bwa Leta buratuma abo bahinga badashobora kwemerwa n’isoko be n’indishi ibereye iyo ibikorwa vyabo vy’agaciro vyoronka mu buryo busanzwe mu buryo bw’ubuntu .
wrong_answers:
  - Ugukoresha Leta yonyene bituma abo bahinga baronka akazi gakomeye ariko bikagabanya ubushobozi bwabo bwo gukora ibintu bishasha mu mirimo yabo .
  - Leta ibona ko izo nsiguro zihambaye cane ku buryo zidashobora gusigara ku nguvu z’isoko, ivyo bikaba bituma habaho amategeko arenze urugero bituma umuntu adashobora gutera imbere mu vy’umwuga .
  - Ubutegetsi bwa Leta butera uburongozi burengeje urugero butuma abo bahinga badashobora kwibanda ku bushobozi bwabo nyamukuru no ku buryo batanga ibikorwa .
explanation: |
  Ivyiyumviro vy’abanyagihugu bivuga ko gutegeka Leta yonyene bitera ikintu kidasanzwe: kubera nyene uburezi n’ubuvuzi bifise agaciro kanini, vyohezagirwa cane mw’isoko ry’ubwigenge. Ariko rero, ubugenzuzi bwa Leta buragabanya agaciro k’izo nsiguro, bukabuza abahinga gushika ku kibanza bakwiye mu kibano no mu vy’ubutunzi. Ugukoresha Leta wenyene ivyo bikorwa vy’ingenzi ntibirinda ivyo bikorwa vy’ingenzi ahubwo birabifata agaciro gatoyi, bikaba bivuguruza ivyiyumviro vy’uko ibikorwa bihambaye bikeneye kugenzurwa na Leta.
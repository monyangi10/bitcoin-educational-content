question: Prema liberalnim misliocima poput Paula Leroy-Beaulieua, zašto obrazovni i zdravstveni radnici pate pod državnim monopolom uprkos pružanju osnovnih usluga?
answer: Državni monopol lišava ove profesionalce tržišnog priznanja i pravične naknade koju bi njihove vredne usluge prirodno dobile u slobodnom sistemu.
wrong_answers:
  - Državna monopolizacija osigurava ovim profesionalcima stabilno zaposlenje, ali ograničava njihovu sposobnost inoviranja u svojim oblastima.
  - Država smatra ove usluge previše važnim da bi ih prepustila tržišnim silama, što dovodi do prekomerne regulacije koja guši profesionalni razvoj.
  - Javni monopoli stvaraju prekomernu birokratiju koja sprečava ove profesionalce da se fokusiraju na svoje osnovne kompetencije i kvalitet usluge.
explanation: |
  Liberalna teorija tvrdi da državna monopolizacija stvara paradoks: upravo zato što su obrazovanje i zdravstvena zaštita toliko vredni, bili bi visoko nagrađeni na slobodnom tržištu. Međutim, državna kontrola umanjuje vrednost ovih usluga i sprečava profesionalce da postignu zasluženi društveni i ekonomski status. Državna monopolizacija ne štiti ove esencijalne usluge, već ih potcenjuje, što je u suprotnosti sa logikom da važne usluge zahtevaju državnu kontrolu.
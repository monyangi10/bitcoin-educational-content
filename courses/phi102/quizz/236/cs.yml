question: Proč podle liberálních myslitelů, jako je Paul Leroy-Beaulieu, trpí školství a zdravotnictví státní monopolizací, přestože poskytují základní služby?
answer: Státní monopol zbavuje tyto odborníky tržního uznání a spravedlivé odměny, které by se jejich cenným službám přirozeně dostalo ve svobodném systému
wrong_answers:
  - Státní monopolizace zajišťuje těmto odborníkům stabilní zaměstnání, ale omezuje jejich schopnost inovovat ve svých oborech
  - Stát považuje tyto služby za příliš důležité na to, aby byly ponechány tržním silám, což vede k nadměrné regulaci, která brzdí profesní rozvoj
  - Veřejné monopoly vytvářejí nadměrnou byrokracii, která těmto odborníkům brání soustředit se na jejich hlavní kompetence a kvalitu služeb
explanation: |
  Liberální teorie tvrdí, že státní monopolizace vytváří paradox: právě proto, že vzdělání a zdravotní péče jsou tak cenné, byly by na volném trhu vysoce odměňovány. Státní kontrola však tyto služby znehodnocuje a brání odborníkům dosáhnout zaslouženého společenského a ekonomického postavení. Státní monopolizace tyto důležité služby nechrání, ale spíše je podhodnocuje, což odporuje logice, že důležité služby potřebují státní kontrolu.
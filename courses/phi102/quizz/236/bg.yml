question: Според либерални мислители като Пол Лерой-Болио, защо образованието и здравните специалисти страдат от държавния монопол, въпреки че предоставят основни услуги?
answer: Държавният монопол лишава тези специалисти от пазарно признание и справедливо възнаграждение, което техните ценни услуги естествено биха получили в една свободна система
wrong_answers:
  - Държавният монополизъм осигурява на тези специалисти стабилна заетост, но ограничава способността им да въвеждат иновации в съответните области
  - Държавата смята, че тези услуги са твърде важни, за да бъдат оставени на пазарните сили, което води до свръхрегулиране, затормозяващо професионалното развитие
  - Публичните монополи създават прекомерна бюрокрация, която пречи на тези специалисти да се съсредоточат върху основните си компетенции и качеството на услугите
explanation: |
  Либералната теория твърди, че държавният монопол създава парадокс: именно защото образованието и здравеопазването са толкова ценни, те биха били високо възнаградени в условията на свободен пазар. Държавният контрол обаче обезценява тези услуги и пречи на специалистите да постигнат заслужения си социален и икономически статус. Монополизацията на държавата не защитава тези важни услуги, а по-скоро ги подценява, което противоречи на логиката, че важните услуги се нуждаят от държавен контрол.
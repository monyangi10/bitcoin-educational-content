question: Volgens liberale denkers als Paul Leroy-Beaulieu, waarom lijden onderwijs en gezondheidszorg onder staatsmonopolisering ondanks het feit dat ze essentiële diensten leveren?
answer: Het staatsmonopolie ontneemt deze professionals de erkenning van de markt en de eerlijke compensatie die hun waardevolle diensten in een vrij systeem zouden ontvangen
wrong_answers:
  - Het staatsmonopolie zorgt ervoor dat deze professionals een vaste baan krijgen, maar beperkt hun vermogen om te innoveren in hun vakgebied
  - De staat vindt deze diensten te belangrijk om aan de marktwerking over te laten, wat leidt tot overregulering die de professionele ontwikkeling verstikt
  - Publieke monopolies zorgen voor buitensporige bureaucratie waardoor deze professionals zich niet kunnen concentreren op hun kerncompetenties en de kwaliteit van hun dienstverlening
explanation: |
  De liberale theorie stelt dat staatsmonopolisering een paradox creëert: juist omdat onderwijs en gezondheidszorg zo waardevol zijn, zouden ze in een vrije markt hoog beloond worden. Staatscontrole devalueert deze diensten echter en verhindert dat professionals hun verdiende sociale en economische status bereiken. De monopolisering door de staat beschermt deze essentiële diensten niet, maar onderwaardeert ze eerder, in tegenspraak met de logica dat belangrijke diensten staatscontrole nodig hebben.
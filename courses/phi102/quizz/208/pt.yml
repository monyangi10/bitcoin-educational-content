question: De acordo com a teoria económica liberal, que caraterística fundamental distingue as sociedades capitalistas modernas das sociedades antigas como o Egito, a Grécia e Roma em termos de mobilidade social?
answer: As sociedades modernas caracterizam-se pela autonomia individual, pela igualdade perante a lei e pela igualdade de acesso a todas as profissões, permitindo a mobilidade social através do mérito e do esforço
wrong_answers:
  - As sociedades modernas mantêm as mesmas estruturas de classe rígidas que as sociedades antigas, mas com mecanismos económicos de distribuição da riqueza diferentes
  - As sociedades modernas substituíram as classes hereditárias por novas categorias fixas baseadas na propriedade do capital ou do trabalho, que são igualmente imutáveis
  - As sociedades modernas eliminaram todas as formas de estratificação social, assegurando uma igualdade económica total entre todos os cidadãos, independentemente das suas contribuições
explanation: |
  O capítulo sublinha que as sociedades modernas, sobretudo desde a Revolução Francesa, se distinguem fundamentalmente pela autonomia individual, pela igualdade jurídica e pela igualdade de acesso profissional. Ao contrário das sociedades antigas, onde as classes sociais eram fixas e hereditárias (com os ofícios passados de pai para filho), as sociedades capitalistas modernas permitem que os indivíduos alterem a sua posição social através dos seus próprios esforços e escolhas. As respostas erradas sugerem incorretamente que a rigidez das classes persiste sob a mesma forma, que existem novas categorias, mas igualmente fixas, ou que foi alcançada uma igualdade total, o que não reflecte a análise liberal apresentada.
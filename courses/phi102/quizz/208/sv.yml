question: Enligt den liberala ekonomiska teorin, vilken grundläggande egenskap skiljer moderna kapitalistiska samhällen från antika samhällen som Egypten, Grekland och Rom när det gäller social rörlighet?
answer: Moderna samhällen kännetecknas av individuell autonomi, likhet inför lagen och lika tillgång till alla yrken, vilket möjliggör social rörlighet genom förtjänst och ansträngning
wrong_answers:
  - Moderna samhällen har samma rigida klasstrukturer som forntida samhällen, men med andra ekonomiska mekanismer för fördelning av rikedomar
  - Moderna samhällen har ersatt ärftliga klasser med nya fasta kategorier baserade på ägande av kapital kontra arbete som är lika oföränderliga
  - Moderna samhällen har eliminerat alla former av social skiktning genom att säkerställa fullständig ekonomisk jämlikhet mellan alla medborgare oavsett deras bidrag
explanation: |
  I kapitlet betonas att moderna samhällen, särskilt sedan franska revolutionen, i grunden kännetecknas av individuell autonomi, juridisk jämlikhet och lika tillgång till yrken. Till skillnad från antika samhällen, där samhällsklasserna var fasta och ärftliga (med yrken som gick i arv från far till son), tillåter moderna kapitalistiska samhällen individer att förändra sin sociala position genom egna ansträngningar och val. De felaktiga svaren antyder felaktigt antingen att klassrigiditeten kvarstår i samma form, att nya men lika fasta kategorier existerar eller att fullständig jämlikhet har uppnåtts, vilket inte återspeglar den liberala analys som presenteras.
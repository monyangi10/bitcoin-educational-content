question: Menurut teori ekonomi liberal, karakteristik fundamental apa yang membedakan masyarakat kapitalis modern dengan masyarakat kuno seperti Mesir, Yunani, dan Romawi dalam hal mobilitas sosial?
answer: Masyarakat modern dicirikan oleh otonomi individu, kesetaraan di depan hukum, dan akses yang sama ke semua profesi, yang memungkinkan mobilitas sosial melalui prestasi dan usaha
wrong_answers:
  - Masyarakat modern mempertahankan struktur kelas yang sama kaku dengan masyarakat kuno, tetapi dengan mekanisme ekonomi distribusi kekayaan yang berbeda
  - Masyarakat modern telah menggantikan kelas-kelas turun-temurun dengan kategori-kategori baru yang tetap berdasarkan kepemilikan modal versus tenaga kerja yang sama-sama tidak dapat diubah
  - Masyarakat modern telah menghilangkan semua bentuk stratifikasi sosial dengan memastikan kesetaraan ekonomi di antara semua warga negara terlepas dari kontribusi mereka
explanation: |
  Bab ini menekankan bahwa masyarakat modern, terutama sejak Revolusi Prancis, secara fundamental dibedakan oleh otonomi individu, kesetaraan hukum, dan akses profesional yang setara. Tidak seperti masyarakat kuno di mana kelas-kelas sosial bersifat tetap dan turun-temurun (dengan perdagangan yang diwariskan dari ayah ke anak), masyarakat kapitalis modern memungkinkan individu untuk mengubah posisi sosial mereka melalui upaya dan pilihan mereka sendiri. Jawaban yang salah secara keliru menunjukkan bahwa kekakuan kelas tetap ada dalam bentuk yang sama, bahwa ada kategori-kategori baru yang sama tetapnya, atau bahwa kesetaraan yang sempurna telah tercapai, yang tidak satupun dari hal tersebut mencerminkan analisis liberal yang disajikan.
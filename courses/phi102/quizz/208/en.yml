question: According to liberal economic theory, what fundamental characteristic distinguishes modern capitalist societies from ancient societies like Egypt, Greece, and Rome in terms of social mobility?
answer: Modern societies are characterized by individual autonomy, equality before the law, and equal access to all professions, allowing social mobility through merit and effort
wrong_answers:
  - Modern societies maintain the same rigid class structures as ancient societies but with different economic mechanisms of wealth distribution
  - Modern societies have replaced hereditary classes with new fixed categories based on ownership of capital versus labor that are equally immutable
  - Modern societies have eliminated all forms of social stratification by ensuring complete economic equality among all citizens regardless of their contributions
explanation: |
  The chapter emphasizes that modern societies, particularly since the French Revolution, are fundamentally distinguished by individual autonomy, legal equality, and equal professional access. Unlike ancient societies where social classes were fixed and hereditary (with trades passed from father to son), modern capitalist societies allow individuals to change their social position through their own efforts and choices. The wrong answers incorrectly suggest either that class rigidity persists in the same form, that new but equally fixed categories exist, or that complete equality has been achieved, none of which reflects the liberal analysis presented.

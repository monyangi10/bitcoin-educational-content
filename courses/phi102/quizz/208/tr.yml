question: Liberal ekonomi teorisine göre, modern kapitalist toplumları sosyal hareketlilik açısından Mısır, Yunanistan ve Roma gibi eski toplumlardan ayıran temel özellik nedir?
answer: Modern toplumlar, bireysel özerklik, kanun önünde eşitlik ve tüm mesleklere eşit erişim ile karakterize edilir ve liyakat ve çaba yoluyla sosyal hareketliliğe izin verir
wrong_answers:
  - Modern toplumlar, eski toplumlarla aynı katı sınıf yapılarını korurlar, ancak farklı ekonomik servet dağılımı mekanizmalarına sahiptirler
  - Modern toplumlar kalıtsal sınıfların yerine sermaye ve emek sahipliğine dayanan ve aynı derecede değişmez olan yeni sabit kategoriler getirmiştir
  - Modern toplumlar, katkılarına bakılmaksızın tüm vatandaşlar arasında tam bir ekonomik eşitlik sağlayarak her türlü sosyal tabakalaşmayı ortadan kaldırmıştır
explanation: |
  Bu bölüm, özellikle Fransız Devrimi'nden bu yana modern toplumların temelde bireysel özerklik, yasal eşitlik ve eşit mesleki erişim ile ayırt edildiğini vurgulamaktadır. Sosyal sınıfların sabit ve kalıtsal olduğu (zanaatların babadan oğula geçtiği) eski toplumların aksine, modern kapitalist toplumlar bireylerin kendi çabaları ve seçimleriyle sosyal konumlarını değiştirmelerine izin vermektedir. Yanlış cevaplar ya sınıfsal katılığın aynı biçimde devam ettiğini, ya yeni ama eşit derecede sabit kategorilerin var olduğunu ya da tam eşitliğin sağlandığını öne sürmektedir ki bunların hiçbiri sunulan liberal analizi yansıtmamaktadır.
question: Milline põhiomadus eristab liberaalse majandusteooria kohaselt tänapäeva kapitalistlikke ühiskondi sotsiaalset liikuvust silmas pidades sellistest iidsetest ühiskondadest nagu Egiptus, Kreeka ja Rooma?
answer: Kaasaegseid ühiskondi iseloomustab individuaalne autonoomia, võrdsus seaduse ees ja võrdne juurdepääs kõigile elukutsetele, mis võimaldab sotsiaalset liikuvust tänu teenetele ja pingutustele
wrong_answers:
  - Kaasaegsed ühiskonnad säilitavad samad jäigad klassistruktuurid kui iidsed ühiskonnad, kuid erinevad majanduslikud mehhanismid jõukuse jaotamiseks
  - Kaasaegsed ühiskonnad on asendanud pärilikud klassid uute fikseeritud kategooriatega, mis põhinevad kapitali ja tööjõu omandil, mis on võrdselt muutumatud
  - Kaasaegsed ühiskonnad on kõrvaldanud igasuguse sotsiaalse kihistumise, tagades kõigi kodanike täieliku majandusliku võrdsuse, sõltumata nende panusest
explanation: |
  Peatükis rõhutatakse, et kaasaegseid ühiskondi, eriti alates Prantsuse revolutsioonist, iseloomustavad põhimõtteliselt individuaalne autonoomia, õiguslik võrdsus ja võrdne kutsealane juurdepääs. Erinevalt iidsetest ühiskondadest, kus sotsiaalsed klassid olid fikseeritud ja pärilikud (ametid pärinesid isalt pojale), võimaldavad moodsad kapitalistlikud ühiskonnad üksikisikutel muuta oma sotsiaalset positsiooni oma jõupingutuste ja valikute kaudu. Valed vastused viitavad valesti kas sellele, et klasside jäikus püsib samal kujul, et eksisteerivad uued, kuid samamoodi fikseeritud kategooriad või et on saavutatud täielik võrdsus, mis kõik ei vasta esitatud liberaalsele analüüsile.
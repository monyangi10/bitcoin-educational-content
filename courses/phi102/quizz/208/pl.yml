question: Zgodnie z liberalną teorią ekonomiczną, jaka podstawowa cecha odróżnia współczesne społeczeństwa kapitalistyczne od starożytnych społeczeństw, takich jak Egipt, Grecja i Rzym, pod względem mobilności społecznej?
answer: Nowoczesne społeczeństwa charakteryzują się indywidualną autonomią, równością wobec prawa i równym dostępem do wszystkich zawodów, umożliwiając mobilność społeczną dzięki zasługom i wysiłkowi
wrong_answers:
  - Współczesne społeczeństwa utrzymują te same sztywne struktury klasowe, co społeczeństwa starożytne, ale z innymi ekonomicznymi mechanizmami dystrybucji bogactwa
  - Nowoczesne społeczeństwa zastąpiły klasy dziedziczne nowymi stałymi kategoriami opartymi na własności kapitału i pracy, które są równie niezmienne
  - Nowoczesne społeczeństwa wyeliminowały wszelkie formy rozwarstwienia społecznego, zapewniając całkowitą równość ekonomiczną wszystkich obywateli, niezależnie od ich wkładu
explanation: |
  W rozdziale tym podkreślono, że nowoczesne społeczeństwa, szczególnie od czasów rewolucji francuskiej, zasadniczo wyróżniają się indywidualną autonomią, równością prawną i równym dostępem zawodowym. W przeciwieństwie do starożytnych społeczeństw, w których klasy społeczne były stałe i dziedziczne (a zawody przechodziły z ojca na syna), nowoczesne społeczeństwa kapitalistyczne pozwalają jednostkom zmieniać swoją pozycję społeczną poprzez własne wysiłki i wybory. Błędne odpowiedzi błędnie sugerują, że sztywność klasowa utrzymuje się w tej samej formie, że istnieją nowe, ale równie stałe kategorie lub że osiągnięto całkowitą równość, z których żadna nie odzwierciedla przedstawionej analizy liberalnej.
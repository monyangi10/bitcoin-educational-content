question: Welk fundamenteel kenmerk onderscheidt volgens de liberale economische theorie moderne kapitalistische samenlevingen van oude samenlevingen zoals Egypte, Griekenland en Rome in termen van sociale mobiliteit?
answer: Moderne samenlevingen worden gekenmerkt door individuele autonomie, gelijkheid voor de wet en gelijke toegang tot alle beroepen, waardoor sociale mobiliteit door verdienste en inspanning mogelijk is
wrong_answers:
  - Moderne samenlevingen hebben dezelfde rigide klassenstructuren als oude samenlevingen, maar met andere economische mechanismen voor de verdeling van rijkdom
  - Moderne samenlevingen hebben erfelijke klassen vervangen door nieuwe vaste categorieën gebaseerd op eigendom van kapitaal versus arbeid die even onveranderlijk zijn
  - Moderne samenlevingen hebben alle vormen van sociale stratificatie uitgebannen door te zorgen voor volledige economische gelijkheid tussen alle burgers, ongeacht hun bijdrage
explanation: |
  Het hoofdstuk benadrukt dat moderne samenlevingen, vooral sinds de Franse Revolutie, zich fundamenteel onderscheiden door individuele autonomie, juridische gelijkheid en gelijke professionele toegang. In tegenstelling tot oude samenlevingen waar sociale klassen vastlagen en erfelijk waren (met ambachten die van vader op zoon werden doorgegeven), stellen moderne kapitalistische samenlevingen individuen in staat om hun sociale positie te veranderen door hun eigen inspanningen en keuzes. De foute antwoorden suggereren ten onrechte dat de starheid van de klassen in dezelfde vorm blijft bestaan, dat er nieuwe maar even vaste categorieën bestaan of dat er volledige gelijkheid is bereikt, wat geen van beide overeenkomt met de gepresenteerde liberale analyse.
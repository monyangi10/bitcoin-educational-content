question: Selon la théorie économique libérale, quelle est la caractéristique fondamentale qui distingue les sociétés capitalistes modernes des sociétés anciennes comme l'Égypte, la Grèce et Rome en termes de mobilité sociale ?
answer: Les sociétés modernes se caractérisent par l'autonomie individuelle, l'égalité devant la loi et l'égalité d'accès à toutes les professions, ce qui permet la mobilité sociale par le mérite et l'effort
wrong_answers:
  - Les sociétés modernes conservent les mêmes structures de classe rigides que les sociétés anciennes, mais avec des mécanismes économiques de distribution des richesses différents
  - Les sociétés modernes ont remplacé les classes héréditaires par de nouvelles catégories fixes fondées sur la propriété du capital ou du travail, qui sont également immuables
  - Les sociétés modernes ont éliminé toute forme de stratification sociale en garantissant une égalité économique totale entre tous les citoyens, quelle que soit leur contribution
explanation: |
  Le chapitre souligne que les sociétés modernes, en particulier depuis la Révolution française, se distinguent fondamentalement par l'autonomie individuelle, l'égalité juridique et l'égalité d'accès professionnel. Contrairement aux sociétés anciennes où les classes sociales étaient fixes et héréditaires (les métiers se transmettaient de père en fils), les sociétés capitalistes modernes permettent aux individus de modifier leur position sociale par leurs propres efforts et leurs propres choix. Les mauvaises réponses suggèrent à tort que la rigidité des classes sociales persiste sous la même forme, qu'il existe de nouvelles catégories tout aussi figées ou que l'égalité totale a été atteinte, ce qui ne correspond pas à l'analyse libérale présentée.
question: Prema liberalnoj ekonomskoj teoriji, osnovna karakteristika koja razlikuje moderne kapitalističke društva od drevnih društava poput Egipta, Grčke i Rima u pogledu društvene mobilnosti je postojanje veće mogućnosti za pojedince da promene svoj društveni i ekonomski status kroz tržišne mehanizme i preduzetništvo.
answer: Moderna društva karakterišu individualna autonomija, jednakost pred zakonom i jednak pristup svim profesijama, omogućavajući društvenu mobilnost kroz zasluge i trud.
wrong_answers:
  - Moderna društva održavaju iste krute klasne strukture kao i drevna društva, ali sa različitim ekonomskim mehanizmima raspodele bogatstva.
  - Moderna društva su zamenila nasledne klase novim fiksnim kategorijama zasnovanim na vlasništvu kapitala naspram rada koje su podjednako nepromenljive.
  - Moderna društva su eliminisala sve oblike društvene stratifikacije osiguravajući potpunu ekonomsku jednakost među svim građanima bez obzira na njihove doprinose.
explanation: |
  Poglavlje naglašava da su moderna društva, posebno od Francuske revolucije, suštinski razlikovana individualnom autonomijom, pravnom jednakošću i jednakim profesionalnim pristupom. Za razliku od drevnih društava gde su društvene klase bile fiksne i nasledne (sa zanatima koji su se prenosili s oca na sina), moderna kapitalistička društva omogućavaju pojedincima da promene svoj društveni položaj sopstvenim naporima i izborima. Pogrešni odgovori netačno sugerišu ili da rigidnost klasa opstaje u istom obliku, da postoje nove ali jednako fiksne kategorije, ili da je postignuta potpuna jednakost, što nijedno ne odražava liberalnu analizu predstavljenu.
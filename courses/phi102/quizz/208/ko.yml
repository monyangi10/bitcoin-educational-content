question: 자유주의 경제 이론에 따르면, 사회적 이동성 측면에서 현대 자본주의 사회가 이집트, 그리스, 로마 같은 고대 사회와 구별되는 근본적인 특징은 무엇인가요?
answer: 현대 사회는 개인의 자율성, 법 앞의 평등, 모든 직업에 대한 동등한 접근성을 특징으로 하며, 능력과 노력을 통한 사회적 이동이 가능합니다
wrong_answers:
  - 현대 사회는 고대 사회와 동일한 엄격한 계급 구조를 유지하지만 부의 분배 메커니즘은 다릅니다
  - 현대 사회는 세습적 계급을 자본과 노동의 소유권에 기반한 새로운 고정 범주로 대체했으며, 이는 똑같이 불변합니다
  - 현대 사회는 기여도에 관계없이 모든 시민에게 완전한 경제적 평등을 보장함으로써 모든 형태의 사회 계층화를 제거했습니다
explanation: |
  이 장에서는 특히 프랑스 혁명 이후 현대 사회가 근본적으로 개인의 자율성, 법적 평등, 평등한 직업적 접근으로 구별된다는 점을 강조합니다. 사회 계급이 고정적이고 세습적이었던 고대 사회와 달리(아버지로부터 아들에게로 직업이 대물림되는) 현대 자본주의 사회에서는 개인이 자신의 노력과 선택을 통해 사회적 지위를 바꿀 수 있습니다. 오답은 계급의 경직성이 동일한 형태로 지속되거나, 새로운 그러나 똑같이 고정된 범주가 존재하거나, 완전한 평등이 이루어졌다는 것을 잘못 제시하며, 어느 것도 제시된 자유주의적 분석을 반영하지 않습니다.
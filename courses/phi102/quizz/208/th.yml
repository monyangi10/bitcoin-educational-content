question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม ลักษณะพื้นฐานที่แยกแยะสังคมทุนนิยมสมัยใหม่ออกจากสังคมโบราณเช่น อียิปต์ กรีซ และโรม ในแง่ของการเคลื่อนย้ายทางสังคมคืออะไร?
answer: สังคมสมัยใหม่มีลักษณะเด่นคือความเป็นอิสระของบุคคล ความเสมอภาคต่อหน้ากฎหมาย และการเข้าถึงอาชีพต่างๆ อย่างเท่าเทียม ซึ่งเปิดโอกาสให้เกิดการเคลื่อนย้ายทางสังคมผ่านความสามารถและความพยายาม
wrong_answers:
  - สังคมสมัยใหม่ยังคงรักษาโครงสร้างชนชั้นที่เข้มงวดเช่นเดียวกับสังคมโบราณ แต่มีกลไกทางเศรษฐกิจในการกระจายความมั่งคั่งที่แตกต่างกัน
  - สังคมสมัยใหม่ได้แทนที่ชนชั้นทางพันธุกรรมด้วยหมวดหมู่ใหม่ที่คงที่ซึ่งอิงตามการครอบครองทุนเทียบกับแรงงานที่ไม่เปลี่ยนแปลงเช่นกัน
  - สังคมสมัยใหม่ได้ขจัดรูปแบบของการแบ่งชั้นทางสังคมทั้งหมดโดยการรับรองความเท่าเทียมทางเศรษฐกิจอย่างสมบูรณ์ในหมู่พลเมืองทุกคนโดยไม่คำนึงถึงการมีส่วนร่วมของพวกเขา
explanation: |
  บทนี้เน้นย้ำว่าสังคมสมัยใหม่ โดยเฉพาะตั้งแต่การปฏิวัติฝรั่งเศส มีความแตกต่างอย่างพื้นฐานด้วยความเป็นอิสระของบุคคล ความเท่าเทียมทางกฎหมาย และการเข้าถึงอาชีพอย่างเท่าเทียมกัน ไม่เหมือนกับสังคมโบราณที่ชนชั้นทางสังคมถูกกำหนดและสืบทอด (โดยอาชีพถูกส่งต่อจากพ่อสู่ลูก) สังคมทุนนิยมสมัยใหม่อนุญาตให้บุคคลเปลี่ยนแปลงตำแหน่งทางสังคมของตนเองผ่านความพยายามและการเลือกของตนเอง คำตอบที่ผิดแสดงให้เห็นอย่างไม่ถูกต้องว่าความแข็งแกร่งของชนชั้นยังคงอยู่ในรูปแบบเดิม หรือว่ามีหมวดหมู่ใหม่แต่ยังคงตายตัว หรือว่ามีความเท่าเทียมกันอย่างสมบูรณ์ ซึ่งไม่มีข้อใดสะท้อนการวิเคราะห์แบบเสรีนิยมที่นำเสนอ
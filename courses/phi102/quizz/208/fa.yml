question: بر اساس نظریه اقتصادی لیبرال، چه ویژگی بنیادی جوامع سرمایه‌داری مدرن را از جوامع باستانی مانند مصر، یونان و روم از نظر تحرک اجتماعی متمایز می‌کند؟
answer: جوامع مدرن با خودمختاری فردی، برابری در برابر قانون و دسترسی برابر به همه حرفه‌ها مشخص می‌شوند که امکان تحرک اجتماعی از طریق شایستگی و تلاش را فراهم می‌کند.
wrong_answers:
  - جوامع مدرن همان ساختارهای طبقاتی سختگیرانه جوامع باستانی را حفظ می‌کنند اما با مکانیزم‌های اقتصادی متفاوتی برای توزیع ثروت.
  - جوامع مدرن طبقات موروثی را با دسته‌بندی‌های جدیدی بر اساس مالکیت سرمایه در مقابل کار که به همان اندازه تغییرناپذیر هستند، جایگزین کرده‌اند.
  - جوامع مدرن با تضمین برابری کامل اقتصادی در میان تمام شهروندان، بدون توجه به مشارکت‌های آن‌ها، تمامی اشکال طبقه‌بندی اجتماعی را از بین برده‌اند.
explanation: |
  این فصل تأکید می‌کند که جوامع مدرن، به‌ویژه از زمان انقلاب فرانسه، اساساً با خودمختاری فردی، برابری قانونی و دسترسی برابر به حرفه‌ها متمایز می‌شوند. برخلاف جوامع باستانی که در آن طبقات اجتماعی ثابت و موروثی بودند (با انتقال حرفه‌ها از پدر به پسر)، جوامع سرمایه‌داری مدرن به افراد اجازه می‌دهند تا از طریق تلاش‌ها و انتخاب‌های خود موقعیت اجتماعی‌شان را تغییر دهند. پاسخ‌های نادرست به‌اشتباه پیشنهاد می‌دهند که یا سختی طبقاتی به همان شکل باقی مانده است، یا دسته‌بندی‌های جدید اما به همان اندازه ثابت وجود دارند، یا برابری کامل به دست آمده است، که هیچ‌کدام تحلیل لیبرالی ارائه‌شده را منعکس نمی‌کنند.
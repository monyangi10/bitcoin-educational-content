question: Theo lý thuyết kinh tế tự do, đặc điểm cơ bản nào phân biệt các xã hội tư bản hiện đại với các xã hội cổ đại như Ai Cập, Hy Lạp và La Mã về mặt khả năng dịch chuyển xã hội?
answer: Xã hội hiện đại được đặc trưng bởi quyền tự chủ cá nhân, bình đẳng trước pháp luật và cơ hội bình đẳng trong mọi ngành nghề, cho phép sự dịch chuyển xã hội dựa trên năng lực và nỗ lực.
wrong_answers:
  - Các xã hội hiện đại vẫn duy trì cấu trúc giai cấp cứng nhắc như các xã hội cổ đại nhưng với các cơ chế kinh tế khác nhau về phân phối của cải.
  - Các xã hội hiện đại đã thay thế các giai cấp cha truyền con nối bằng các tầng lớp cố định mới dựa trên quyền sở hữu vốn so với quyền sở hữu lao động, và các tầng lớp này cũng không thể thay đổi.
  - Các xã hội hiện đại đã xóa bỏ mọi hình thức phân tầng xã hội bằng cách đảm bảo bình đẳng kinh tế hoàn toàn giữa tất cả công dân bất kể đóng góp của họ.
explanation: |
  Chương này nhấn mạnh rằng các xã hội hiện đại, đặc biệt là từ sau Cách mạng Pháp, về cơ bản được phân biệt bởi quyền tự chủ cá nhân, bình đẳng pháp lý và cơ hội nghề nghiệp bình đẳng. Không giống như các xã hội cổ đại nơi các giai cấp xã hội được cố định và cha truyền con nối (nghề truyền từ cha sang con), các xã hội tư bản hiện đại cho phép các cá nhân thay đổi vị trí xã hội của mình thông qua nỗ lực và lựa chọn của bản thân. Các câu trả lời sai cho rằng sự cứng nhắc về giai cấp vẫn tồn tại dưới hình thức cũ, hoặc rằng tồn tại các tầng lớp mới nhưng cũng cố định như nhau, hoặc rằng sự bình đẳng hoàn toàn đã đạt được, không điều nào trong số đó phản ánh phân tích theo quan điểm tự do được trình bày.
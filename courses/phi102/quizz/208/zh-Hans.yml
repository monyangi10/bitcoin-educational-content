question: 根据自由主义经济理论，就社会流动性而言，现代资本主义社会与埃及、希腊和罗马等古代社会的根本区别是什么？
answer: 现代社会的特点是个人自主、法律面前人人平等、所有职业机会均等，允许通过成绩和努力实现社会流动
wrong_answers:
  - 现代社会与古代社会一样保持着僵化的阶级结构，但财富分配的经济机制不同
  - 现代社会以基于资本所有权和劳动力所有权的新的固定类别取代了世袭阶级，这些类别同样不可改变
  - 现代社会消除了一切形式的社会分层，确保所有公民无论贡献大小在经济上完全平等
explanation: |
  本章强调，现代社会，尤其是法国大革命以来的现代社会，从根本上说，是以个人自主、法律平等和平等的职业机会为特征的。与古代社会不同，古代社会的社会阶层是固定的、世袭的（行业由父亲传给儿子），而现代资本主义社会则允许个人通过自己的努力和选择改变自己的社会地位。错误答案错误地暗示，阶级僵化以同样的形式持续存在，存在新的但同样固定的类别，或者已经实现了完全平等，这些都没有反映出所提出的自由主义分析。
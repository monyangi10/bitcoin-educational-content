question: Според либералната икономическа теория коя основна характеристика отличава съвременните капиталистически общества от древните общества като Египет, Гърция и Рим по отношение на социалната мобилност?
answer: Съвременните общества се характеризират с индивидуална автономия, равенство пред закона и равен достъп до всички професии, което позволява социална мобилност чрез заслуги и усилия
wrong_answers:
  - Съвременните общества поддържат същите строги класови структури като древните, но с различни икономически механизми за разпределение на богатството
  - Съвременните общества са заменили наследствените класи с нови фиксирани категории, основани на собствеността върху капитала и труда, които са еднакво неизменни
  - Съвременните общества са премахнали всички форми на социално разслоение, като са осигурили пълно икономическо равенство между всички граждани, независимо от техния принос
explanation: |
  В главата се подчертава, че модерните общества, особено след Френската революция, се отличават с индивидуална автономия, правно равенство и равен достъп до професионална реализация. За разлика от древните общества, в които социалните класи са били фиксирани и наследствени (като професиите са се предавали от баща на син), съвременните капиталистически общества позволяват на индивидите да променят социалното си положение чрез собствените си усилия и избори. Неправилните отговори неправилно предполагат, че класовата закостенялост се запазва под същата форма, че съществуват нови, но също толкова фиксирани категории, или че е постигнато пълно равенство, като нито един от тези варианти не отразява представения либерален анализ.
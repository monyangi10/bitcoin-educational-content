question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni ikihe kintu nyamukuru gitandukanya imibano y’abanyagihugu bo muri iki gihe n’imibano ya kera nka Misiri, Ubugiriki n’Uburoma mu bijanye n’ugutembera kw’imibano?
answer: Imibano ya none irangwa n’ukwigenga kw’umuntu ku giti ciwe, ukungana imbere y’amategeko, no kuronka imyuga yose mu buryo bungana, bikaba vyemeza ko abantu bashobora gukorana n’abandi biciye ku bushobozi n’inguvu .
wrong_answers:
  - Imiryango yo muri iki gihe irafise imiterere y’imigwi ikomeye nk’iya kera ariko ikaba ifise uburyo butandukanye bwo gusangira ubutunzi .
  - Imiryango yo muri iki gihe yarasubirije imigwi y'iragi n'imigwi mishasha idahinduka ishingiye ku kuba umutungo n'abakozi bidahinduka bingana .
  - Ibihugu vya none vyakuyeho uburyo bwose bwo gucapura abantu mu migwi mu gutuma abanyagihugu bose bangana mu vy’ubutunzi ataco bafatiye ku vyo batanga .
explanation: |
  Ico gice gishimika ku vy’uko imibano yo muri iki gihe, cane cane kuva mu gihe c’Impinduka y’Abafaransa, itandukanye cane n’ukwigenga kw’umuntu ku giti ciwe, uburinganire mu vy’amategeko, n’uburinganire bw’umwuga. Mu buryo butandukanye n’imibano ya kera aho imigwi y’abantu yari idahinduka kandi ikaba yarazwe (ubudandaji buva kuri se bukaja ku mwana), imibano y’abanyagihugu bo muri iki gihe irekura abantu ku giti cabo ngo bahindure ikibanza ciwe mu kibano biciye ku twigoro twiwe no ku mahitamwo yiwe bwite. Inyishu zitari zo zivuga mu buryo butari bwo ko ugukomantara kw’imigwi gukomeza mu buryo bumwe, ko hariho ivyiciro bishasha ariko bishikamye bingana, canke ko hariho ukungana gushitse, nta na kimwe muri vyo kigaragaza isesengura ry’ubwigenge ryashikirijwe.
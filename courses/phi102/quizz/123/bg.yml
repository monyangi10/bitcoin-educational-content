question: Коя основна характеристика пречи на контролираните от държавата системи да постигнат същите резултати в областта на иновациите като обществата на свободния пазар?
answer: Бюрократичните структури не разполагат с лични стимули и действат чрез предварително определени разпоредби, които обезкуражават индивидуалната инициатива
wrong_answers:
  - Държавните служители са по-малко креативни и интелигентни от работещите в частния сектор
  - Държавните институции не разполагат с достатъчно финансови ресурси за финансиране на проекти за научноизследователска и развойна дейност
  - Публичните организации се сблъскват с твърде голяма политическа намеса от страна на избрани служители в процеса на вземане на решения
explanation: |
  В главата се обяснява, че държавните институции не могат да въвеждат иновации поради бюрократичния си характер, при който служителите следват предварително определени разпоредби без лични стимули за иновации. За разлика от частните субекти, мотивирани от личния си интерес и потенциалните възнаграждения, държавните служители нямат личен интерес от подобряване на процесите. Това структурно ограничение означава, че иновациите трябва да идват от свободните сектори на обществото, както показват комунистическите системи, които могат само да копират външни иновации, вместо да създават свои собствени.
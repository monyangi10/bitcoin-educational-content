question: 국가가 통제하는 시스템이 자유 시장 사회와 동일한 혁신 성과를 달성하지 못하는 근본적인 특징은 무엇인가요?
answer: 관료적 구조는 개인적 인센티브가 부족하고 개인의 주도성을 저해하는 미리 정해진 규정을 통해 운영됩니다
wrong_answers:
  - 공무원은 민간 부문 근로자보다 본질적으로 창의성과 지능이 떨어집니다
  - 국가 기관은 연구 개발 프로젝트에 자금을 지원할 재원이 충분하지 않습니다
  - 공공 기관은 의사 결정 과정에서 선출직 공무원의 지나친 정치적 간섭에 직면합니다
explanation: |
  이 장에서는 국가 기관의 관료주의적 특성으로 인해 직원들이 혁신에 대한 개인적인 인센티브 없이 미리 정해진 규정을 따르기 때문에 혁신이 불가능하다고 설명합니다. 이기심과 잠재적 보상에 의해 동기를 부여받는 민간 행위자들과 달리, 정부 공무원은 프로세스 개선에 대한 개인적인 이해관계가 없습니다. 이러한 구조적 한계는 자체 혁신보다는 외부 혁신을 모방할 수밖에 없었던 공산주의 체제에서 볼 수 있듯이 혁신은 사회의 자유로운 부문에서 이루어져야 한다는 것을 의미합니다.
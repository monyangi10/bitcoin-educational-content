question: چه ویژگی بنیادی مانع از دستیابی سیستم‌های تحت کنترل دولت به همان نتایج نوآوری در جوامع بازار آزاد می‌شود؟
answer: ساختارهای بوروکراتیک فاقد انگیزه‌های شخصی هستند و از طریق مقررات از پیش تعیین‌شده‌ای عمل می‌کنند که ابتکار فردی را دلسرد می‌کنند.
wrong_answers:
  - کارمندان دولتی ذاتاً کمتر از کارکنان بخش خصوصی خلاق و باهوش هستند.
  - نهادهای دولتی منابع مالی کافی برای تأمین مالی پروژه‌های تحقیق و توسعه ندارند.
  - سازمان‌های عمومی در فرآیندهای تصمیم‌گیری خود با دخالت سیاسی بیش از حد از سوی مقامات منتخب مواجه هستند.
explanation: |
  فصل توضیح می‌دهد که نهادهای دولتی به دلیل ماهیت بوروکراتیک خود نمی‌توانند نوآوری کنند، جایی که کارمندان از مقررات از پیش تعیین‌شده پیروی می‌کنند بدون اینکه انگیزه‌های شخصی برای نوآوری داشته باشند. برخلاف بازیگران خصوصی که با منافع شخصی و پاداش‌های بالقوه انگیزه می‌گیرند، کارمندان دولتی هیچ نفع شخصی در بهبود فرآیندها ندارند. این محدودیت ساختاری به این معناست که نوآوری باید از بخش‌های آزاد جامعه بیاید، همان‌طور که سیستم‌های کمونیستی نشان دادند که فقط می‌توانستند نوآوری‌های خارجی را کپی کنند و نه generate خودشان را.
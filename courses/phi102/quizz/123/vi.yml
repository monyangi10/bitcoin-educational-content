question: Đặc điểm cơ bản nào ngăn cản các hệ thống do nhà nước kiểm soát đạt được những kết quả đổi mới tương tự như các xã hội thị trường tự do?
answer: Các cấu trúc hành chính quan liêu thiếu động lực cá nhân và hoạt động thông qua các quy định đã được định sẵn, làm giảm sự chủ động của cá nhân.
wrong_answers:
  - Nhân viên nhà nước vốn dĩ kém sáng tạo và thông minh hơn so với người lao động trong khu vực tư nhân.
  - Các tổ chức nhà nước không có đủ nguồn tài chính để tài trợ cho các dự án nghiên cứu và phát triển.
  - Các tổ chức công phải đối mặt với quá nhiều sự can thiệp chính trị từ các quan chức được bầu vào quá trình ra quyết định của họ.
explanation: |
  Chương này giải thích rằng các thể chế nhà nước không thể đổi mới do bản chất quan liêu của chúng, nơi các nhân viên tuân theo các quy định đã được định sẵn mà không có động lực cá nhân nào cho sự đổi mới. Không giống như các chủ thể tư nhân được thúc đẩy bởi lợi ích cá nhân và phần thưởng tiềm năng, các công chức chính phủ không có lợi ích cá nhân nào trong việc cải thiện quy trình. Hạn chế về cấu trúc này có nghĩa là sự đổi mới phải đến từ các khu vực tự do của xã hội, như đã được chứng minh bởi các hệ thống cộng sản chỉ có thể sao chép các đổi mới từ bên ngoài chứ không thể tự tạo ra những đổi mới của riêng mình.
question: ¿Qué característica fundamental impide que los sistemas controlados por el Estado logren los mismos resultados de innovación que las sociedades de libre mercado?
answer: Las estructuras burocráticas carecen de incentivos personales y funcionan mediante normas predeterminadas que desalientan la iniciativa individual
wrong_answers:
  - Los funcionarios son intrínsecamente menos creativos e inteligentes que los trabajadores del sector privado
  - Las instituciones estatales no disponen de recursos financieros suficientes para financiar proyectos de investigación y desarrollo
  - Las organizaciones públicas se enfrentan a demasiadas interferencias políticas de los cargos electos en sus procesos de toma de decisiones
explanation: |
  El capítulo explica que las instituciones estatales no pueden innovar debido a su naturaleza burocrática, en la que los empleados siguen normas predeterminadas sin incentivos personales para la innovación. A diferencia de los agentes privados motivados por el interés propio y las posibles recompensas, los funcionarios públicos no tienen ningún interés personal en mejorar los procesos. Esta limitación estructural significa que la innovación debe proceder de sectores libres de la sociedad, como demuestran los sistemas comunistas que sólo podían copiar innovaciones externas en lugar de generate propias.
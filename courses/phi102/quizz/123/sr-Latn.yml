question: Koja osnovna karakteristika sprečava sisteme pod državnom kontrolom da postignu iste inovacione rezultate kao društva slobodnog tržišta?
answer: Birokratske strukture nemaju lične podsticaje i funkcionišu kroz unapred određene propise koji obeshrabruju individualnu inicijativu.
wrong_answers:
  - Vladini službenici su po svojoj prirodi manje kreativni i inteligentni od radnika u privatnom sektoru.
  - Državne institucije imaju nedovoljno finansijskih sredstava za finansiranje projekata istraživanja i razvoja.
  - Javne organizacije se suočavaju sa prevelikim političkim mešanjem izabranih zvaničnika u njihove procese donošenja odluka.
explanation: |
  Poglavlje objašnjava da državne institucije ne mogu inovirati zbog svoje birokratske prirode, gde zaposleni slede unapred određene propise bez ličnih podsticaja za inovacije. Za razliku od privatnih aktera motivisanih sopstvenim interesom i potencijalnim nagradama, državni službenici nemaju lični ulog u poboljšanju procesa. Ovo strukturno ograničenje znači da inovacije moraju dolaziti iz slobodnih sektora društva, kao što pokazuju komunistički sistemi koji su mogli samo kopirati spoljašnje inovacije umesto generate svojih.
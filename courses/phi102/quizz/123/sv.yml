question: Vilken grundläggande egenskap hindrar statligt kontrollerade system från att uppnå samma innovationsresultat som samhällen med fri marknad?
answer: Byråkratiska strukturer saknar personliga incitament och fungerar genom förutbestämda regler som avskräcker från individuella initiativ
wrong_answers:
  - Statsanställda är av naturen mindre kreativa och intelligenta än anställda i den privata sektorn
  - Statliga institutioner har otillräckliga ekonomiska resurser för att finansiera forsknings- och utvecklingsprojekt
  - Offentliga organisationer utsätts för alltför mycket politisk inblandning från förtroendevalda i sina beslutsprocesser
explanation: |
  I kapitlet förklaras att statliga institutioner inte kan vara innovativa på grund av sin byråkratiska natur, där de anställda följer förutbestämda regler utan personliga incitament för innovation. Till skillnad från privata aktörer som motiveras av egenintresse och potentiella belöningar har myndighetspersoner inget personligt intresse av att förbättra processer. Denna strukturella begränsning innebär att innovation måste komma från fria sektorer i samhället, vilket demonstreras av kommunistiska system som bara kunde kopiera externa innovationer snarare än generate sina egna.
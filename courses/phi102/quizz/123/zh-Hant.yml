question: 是什麼基本特徵阻礙了國家控制體系取得與自由市場社會相同的創新成果？
answer: 官僚架構缺乏個人獎勵，並透過預先設定的規範來運作，這會打擊個人的主動性
wrong_answers:
  - 政府員工的創造力和智慧天生就不如私營機構的員工
  - 國家機構沒有足夠的財政資源來資助研發專案
  - 公共組織在決策過程中面臨過多民選官員的政治干預
explanation: |
  本章說明，由於國家機構的官僚性質，員工遵循預先設定的規範，沒有個人的創新誘因，因此國家機構無法創新。與受到自身利益和潛在報酬激勵的私人參與者不同，政府職能人員在改善流程方面沒有個人利益。這種結構性的限制意味著創新必須來自社會的自由部門，共產主義體系就證明了這一點，因為共產主義體系只能複製外來的創新，而無法generate自己的創新。
question: Karakteristik fundamental apa yang mencegah sistem yang dikendalikan negara untuk mencapai hasil inovasi yang sama dengan masyarakat pasar bebas?
answer: Struktur birokrasi tidak memiliki insentif pribadi dan beroperasi melalui peraturan yang telah ditentukan sebelumnya yang menghambat inisiatif individu
wrong_answers:
  - Pegawai pemerintah pada dasarnya kurang kreatif dan cerdas dibandingkan dengan pekerja sektor swasta
  - Lembaga-lembaga negara tidak memiliki sumber daya keuangan yang memadai untuk mendanai proyek-proyek penelitian dan pengembangan
  - Organisasi publik menghadapi terlalu banyak campur tangan politik dari pejabat terpilih dalam proses pengambilan keputusan mereka
explanation: |
  Bab ini menjelaskan bahwa lembaga-lembaga negara tidak dapat berinovasi karena sifat birokratis mereka, di mana para pegawai mengikuti peraturan yang telah ditetapkan tanpa insentif pribadi untuk berinovasi. Tidak seperti aktor swasta yang termotivasi oleh kepentingan pribadi dan potensi imbalan, pejabat pemerintah tidak memiliki kepentingan pribadi dalam meningkatkan proses. Keterbatasan struktural ini berarti inovasi harus datang dari sektor-sektor masyarakat yang bebas, seperti yang ditunjukkan oleh sistem komunis yang hanya dapat meniru inovasi dari luar dan bukannya dari generate mereka sendiri.
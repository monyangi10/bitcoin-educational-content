question: Milline põhiline omadus takistab riigikontrolli all olevatel süsteemidel saavutada samu innovatsioonitulemusi kui vabaturuühiskondadel?
answer: Bürokraatlikes struktuurides puuduvad isiklikud stiimulid ja need toimivad etteantud eeskirjade kaudu, mis pärsivad individuaalset algatust
wrong_answers:
  - Valitsuse töötajad on loomult vähem loovad ja intelligentsed kui erasektori töötajad
  - Riigiasutustel ei ole piisavalt rahalisi vahendeid teadus- ja arendusprojektide rahastamiseks
  - Avalikud organisatsioonid puutuvad oma otsustusprotsessides liiga palju kokku valitud ametnike poliitilise sekkumisega
explanation: |
  Peatükis selgitatakse, et riigiasutused ei saa uuendusi teha oma bürokraatliku olemuse tõttu, kus töötajad järgivad etteantud eeskirju, ilma et neil oleks isiklikke stiimuleid uuendusteks. Erinevalt erasektori osalejatest, keda motiveerivad omakasu ja potentsiaalne tasu, puudub riigiametnikel isiklik huvi protsesside parandamise vastu. See struktuuriline piirang tähendab, et innovatsioon peab tulema ühiskonna vabadest sektoritest, nagu näitasid kommunistlikud süsteemid, mis suutsid ainult kopeerida väliseid uuendusi, mitte generate omaenda uuendusi.
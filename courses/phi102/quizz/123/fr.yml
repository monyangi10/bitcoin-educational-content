question: Quelle caractéristique fondamentale empêche les systèmes contrôlés par l'État d'obtenir les mêmes résultats en matière d'innovation que les sociétés de libre marché ?
answer: Les structures bureaucratiques manquent d'incitations personnelles et fonctionnent selon des règles prédéterminées qui découragent l'initiative individuelle
wrong_answers:
  - Les fonctionnaires sont par nature moins créatifs et moins intelligents que les travailleurs du secteur privé
  - Les institutions publiques ne disposent pas de ressources financières suffisantes pour financer les projets de recherche et de développement
  - Les organisations publiques subissent trop d'interférences politiques de la part des élus dans leurs processus de prise de décision
explanation: |
  Le chapitre explique que les institutions publiques ne peuvent pas innover en raison de leur nature bureaucratique, où les employés suivent des règlements prédéterminés sans incitation personnelle à l'innovation. Contrairement aux acteurs privés motivés par l'intérêt personnel et les récompenses potentielles, les fonctionnaires n'ont aucun intérêt personnel à améliorer les processus. Cette limitation structurelle signifie que l'innovation doit provenir de secteurs libres de la société, comme le démontrent les systèmes communistes qui ne pouvaient que copier les innovations externes au lieu de generate.
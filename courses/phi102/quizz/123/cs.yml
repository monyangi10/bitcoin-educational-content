question: Jaká základní vlastnost brání státem řízeným systémům dosahovat stejných výsledků v oblasti inovací jako společnosti volného trhu?
answer: Byrokratické struktury postrádají osobní pobídky a fungují na základě předem stanovených předpisů, které odrazují od individuální iniciativy
wrong_answers:
  - Státní zaměstnanci jsou ze své podstaty méně kreativní a inteligentní než zaměstnanci soukromého sektoru
  - Státní instituce nemají dostatek finančních prostředků na financování projektů výzkumu a vývoje
  - Veřejné organizace čelí příliš velkému politickému zasahování volených úředníků do svých rozhodovacích procesů
explanation: |
  Kapitola vysvětluje, že státní instituce nemohou inovovat kvůli své byrokratické povaze, kdy se zaměstnanci řídí předem danými předpisy bez osobní motivace k inovacím. Na rozdíl od soukromých subjektů motivovaných vlastním zájmem a potenciální odměnou nemají státní úředníci žádný osobní zájem na zlepšování procesů. Toto strukturální omezení znamená, že inovace musí přicházet z volných sektorů společnosti, jak ukázaly komunistické systémy, které mohly pouze kopírovat vnější inovace, nikoliv generate vlastní.
question: 国家管理体制が自由市場社会と同じようなイノベーションの成果を達成できないのは、どのような基本的特性があるからなのだろうか？
answer: 官僚主義的な構造は、個人のインセンティブを欠き、個人の自発性を妨げる決められた規則によって運営される。
wrong_answers:
  - 公務員は本来、民間労働者よりも創造性も知性も劣っている
  - 国家機関は、研究開発プロジェクトに資金を提供するための財源が不十分である。
  - 公的機関は、その意思決定プロセスにおいて、選挙で選ばれた役人から政治的干渉を受けすぎている。
explanation: |
  この章では、国家機関がイノベーションを起こせないのは、その官僚主義的な性格のためであり、職員はイノベーションに対する個人的なインセンティブなしに、あらかじめ決められた規則に従うからだと説明している。私利私欲や潜在的な報酬に突き動かされる民間のアクターとは異なり、政府の役人にはプロセスの改善に対する個人的な利害関係がない。この構造的な制限は、イノベーションが社会の自由なセクターからもたらされなければならないことを意味する。共産主義体制が、独自のgenerateではなく、外部のイノベーションをコピーすることしかできなかったことが証明している。
question: Que caraterística fundamental impede os sistemas controlados pelo Estado de alcançarem os mesmos resultados em termos de inovação que as sociedades de mercado livre?
answer: As estruturas burocráticas carecem de incentivos pessoais e funcionam através de regulamentos pré-determinados que desencorajam a iniciativa individual
wrong_answers:
  - Os funcionários públicos são, por natureza, menos criativos e inteligentes do que os trabalhadores do sector privado
  - As instituições públicas não dispõem de recursos financeiros suficientes para financiar projectos de investigação e desenvolvimento
  - As organizações públicas enfrentam demasiada interferência política dos funcionários eleitos nos seus processos de tomada de decisão
explanation: |
  O capítulo explica que as instituições estatais não podem inovar devido à sua natureza burocrática, em que os funcionários seguem regulamentos pré-determinados sem incentivos pessoais à inovação. Ao contrário dos actores privados, motivados pelo interesse próprio e por potenciais recompensas, os funcionários públicos não têm qualquer interesse pessoal em melhorar os processos. Esta limitação estrutural significa que a inovação tem de provir de sectores livres da sociedade, como demonstrado pelos sistemas comunistas que apenas podiam copiar inovações externas em vez de criar as suas próprias inovações.
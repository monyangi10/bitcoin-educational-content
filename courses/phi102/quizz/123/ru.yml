question: Какая фундаментальная характеристика не позволяет государственным системам добиваться тех же результатов в области инноваций, что и обществам со свободным рынком?
answer: Бюрократические структуры лишены личных стимулов и действуют на основе заранее установленных правил, которые препятствуют индивидуальной инициативе
wrong_answers:
  - Государственные служащие по своей природе менее креативны и умны, чем работники частного сектора
  - Государственные учреждения не имеют достаточных финансовых ресурсов для финансирования проектов исследований и разработок
  - Общественные организации сталкиваются со слишком сильным политическим вмешательством со стороны выборных должностных лиц в процесс принятия решений
explanation: |
  В главе объясняется, что государственные учреждения не могут внедрять инновации из-за своей бюрократической природы, когда сотрудники следуют заранее установленным правилам, не имея личных стимулов для инноваций. В отличие от частных субъектов, руководствующихся собственными интересами и потенциальным вознаграждением, государственные служащие не имеют личной заинтересованности в совершенствовании процессов. Это структурное ограничение означает, что инновации должны исходить от свободных слоев общества, что и продемонстрировали коммунистические системы, которые могли только копировать внешние инновации, а не создавать свои собственные.
question: Hva er det som gjør at statskontrollerte systemer ikke oppnår de samme innovasjonsresultatene som frie markedssamfunn?
answer: Byråkratiske strukturer mangler personlige insentiver og opererer gjennom forhåndsbestemte regler som motvirker individuelt initiativ
wrong_answers:
  - Statsansatte er mindre kreative og intelligente enn ansatte i privat sektor
  - Statlige institusjoner har utilstrekkelige økonomiske ressurser til å finansiere forsknings- og utviklingsprosjekter
  - Offentlige organisasjoner møter for mye politisk innblanding fra folkevalgte i beslutningsprosessene sine
explanation: |
  Kapitlet forklarer at statlige institusjoner ikke kan innovere på grunn av sin byråkratiske natur, der de ansatte følger forhåndsbestemte regler uten personlige insentiver til innovasjon. I motsetning til private aktører som motiveres av egeninteresse og potensielle belønninger, har myndighetspersoner ingen personlig interesse av å forbedre prosesser. Denne strukturelle begrensningen betyr at innovasjon må komme fra frie sektorer i samfunnet, noe kommunistiske systemer, som kun kunne kopiere eksterne innovasjoner i stedet for å skape sine egne, har vist.
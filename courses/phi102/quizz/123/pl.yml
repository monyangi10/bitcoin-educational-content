question: Jaka fundamentalna cecha uniemożliwia systemom kontrolowanym przez państwo osiąganie takich samych wyników w zakresie innowacji jak społeczeństwa wolnorynkowe?
answer: Struktury biurokratyczne pozbawione są osobistych bodźców i działają w oparciu o z góry określone regulacje, które zniechęcają do indywidualnej inicjatywy
wrong_answers:
  - Pracownicy rządowi są z natury mniej kreatywni i inteligentni niż pracownicy sektora prywatnego
  - Instytucje państwowe nie mają wystarczających środków finansowych na finansowanie projektów badawczo-rozwojowych
  - Organizacje publiczne doświadczają zbyt dużej ingerencji politycznej ze strony wybranych urzędników w ich procesy decyzyjne
explanation: |
  W rozdziale tym wyjaśniono, że instytucje państwowe nie mogą wprowadzać innowacji ze względu na swój biurokratyczny charakter, w którym pracownicy postępują zgodnie z wcześniej ustalonymi regulacjami bez osobistych zachęt do innowacji. W przeciwieństwie do podmiotów prywatnych motywowanych własnym interesem i potencjalnymi nagrodami, urzędnicy państwowi nie mają osobistego interesu w ulepszaniu procesów. To strukturalne ograniczenie oznacza, że innowacje muszą pochodzić z wolnych sektorów społeczeństwa, co pokazały systemy komunistyczne, które mogły jedynie kopiować zewnętrzne innowacje, zamiast tworzyć własne.
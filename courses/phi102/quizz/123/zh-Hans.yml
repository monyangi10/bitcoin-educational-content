question: 是什么基本特征阻碍了国家控制体系取得与自由市场社会相同的创新成果？
answer: 官僚结构缺乏对个人的激励，通过预先确定的规章制度运作，阻碍了个人的主动性
wrong_answers:
  - 政府雇员的创造力和智慧本来就不如私营部门的员工
  - 国家机构没有足够的财政资源资助研发项目
  - 公共组织的决策过程受到民选官员太多的政治干预
explanation: |
  本章解释说，国家机构由于其官僚性质而无法创新，其雇员遵循预先确定的规章制度，没有创新的个人动力。与受自身利益和潜在回报驱使的私人行为者不同，政府工作人员在改进流程方面没有个人利益。这种结构性限制意味着创新必须来自社会的自由部门，共产主义制度就是证明，这种制度只能复制外部创新，而不是generate自己的创新。
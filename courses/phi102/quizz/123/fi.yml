question: Mikä perustavanlaatuinen ominaisuus estää valtiojohtoisia järjestelmiä saavuttamasta samoja innovaatiotuloksia kuin vapaat markkinayhteiskunnat?
answer: Byrokraattisista rakenteista puuttuvat henkilökohtaiset kannustimet, ja ne toimivat ennalta määrättyjen säännösten avulla, jotka estävät yksilöllistä aloitteellisuutta
wrong_answers:
  - Valtion työntekijät ovat luonnostaan vähemmän luovia ja älykkäitä kuin yksityisen sektorin työntekijät
  - Valtion laitoksilla ei ole riittäviä taloudellisia resursseja tutkimus- ja kehityshankkeiden rahoittamiseen
  - Valitut virkamiehet puuttuvat liikaa julkisten organisaatioiden päätöksentekoprosesseihin
explanation: |
  Luvussa selitetään, että valtion laitokset eivät voi innovoida, koska ne ovat luonteeltaan byrokraattisia ja työntekijät noudattavat ennalta määrättyjä säännöksiä ilman henkilökohtaisia kannustimia innovointiin. Toisin kuin yksityisillä toimijoilla, joita motivoi oma etu ja mahdolliset palkkiot, valtion virkamiehillä ei ole henkilökohtaista intressiä parantaa prosesseja. Tämä rakenteellinen rajoitus tarkoittaa, että innovaation on tultava yhteiskunnan vapailta sektoreilta, kuten kommunistiset järjestelmät ovat osoittaneet, jotka pystyivät vain kopioimaan ulkopuolisia innovaatioita sen sijaan, että olisivat voineet generate:lla omia innovaatioita.
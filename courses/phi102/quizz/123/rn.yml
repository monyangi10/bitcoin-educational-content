question: Ni ikihe kintu nyamukuru kibuza uburyo bugenzurwa na Leta gushika ku ngaruka z’ubuhinga bushasha nk’izo imibano y’isoko ry’uburenganzira ishikako?
answer: Inzego z’ubutegetsi ntizigira ivyo zitera intege umuntu ku giti ciwe kandi zikora biciye ku mabwirizwa yashinzwe imbere y’igihe atuma umuntu adashobora gufata ingingo .
wrong_answers:
  - Abakozi ba Leta mu kameremere kabo ntibagira ubuhinga bwo kurema n'ubwenge nk'abakozi bo mu bigo vyigenga .
  - Inzego za Leta ntizifise amahera ahagije yo gufasha mu migambi y'ubushakashatsi n'iterambere .
  - Imiryango ya Leta irahura n'ugushirwamwo cane kwa politike n'abatowe mu nzira zayo zo gufata ingingo .
explanation: |
  Ico gice gisigura ko inzego za Leta zidashobora gukora ibintu bishasha kubera ubuhinga bwazo bw’uburongozi, aho abakozi bakurikiza amabwirizwa yashinzwe imbere y’igihe ata n’umwe abatera intege kugira ngo bakore ibintu bishasha. Mu buryo butandukanye n’abakozi b’abikorera ku giti cabo bavyurirwa umutima n’inyungu zabo bwite be n’ivyiza bishobora guhabwa, abakozi ba Leta nta ruhara bafise mu gutuma imigenderanire itera imbere. Uwo mupaka w’imiterere bisigura ko ubuhinga bushasha butegerezwa kuva mu mice y’abantu yidegemvya, nk’uko vyerekanwa n’imirongo y’abakomunisita yashobora gusa kwigana ubuhinga bushasha bwo hanze aho kwigana generate ubwabo.
question: Welk fundamenteel kenmerk verhindert door de staat gecontroleerde systemen om dezelfde innovatieresultaten te bereiken als samenlevingen met een vrije markt?
answer: Bureaucratische structuren ontberen persoonlijke prikkels en werken met vooraf bepaalde regels die individueel initiatief ontmoedigen
wrong_answers:
  - Overheidsmedewerkers zijn inherent minder creatief en intelligent dan werknemers in de particuliere sector
  - Staatsinstellingen hebben onvoldoende financiële middelen om onderzoeks- en ontwikkelingsprojecten te financieren
  - Publieke organisaties worden geconfronteerd met te veel politieke inmenging van gekozen functionarissen in hun besluitvormingsprocessen
explanation: |
  Het hoofdstuk legt uit dat overheidsinstellingen niet kunnen innoveren door hun bureaucratische aard, waar werknemers vooraf bepaalde regels volgen zonder persoonlijke stimulansen voor innovatie. In tegenstelling tot private actoren die gemotiveerd worden door eigenbelang en mogelijke beloningen, hebben overheidsfunctionarissen geen persoonlijk belang bij het verbeteren van processen. Deze structurele beperking betekent dat innovatie uit vrije sectoren van de samenleving moet komen, zoals communistische systemen aantoonden die enkel externe innovaties konden kopiëren in plaats van hun eigen generate te ontwikkelen.
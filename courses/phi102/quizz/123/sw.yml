question: Ni sifa gani ya msingi inayozuia mifumo inayodhibitiwa na serikali kufikia matokeo sawa ya uvumbuzi kama jamii za soko huria?
answer: Miundo ya urasimu haina motisha za kibinafsi na hufanya kazi kupitia kanuni zilizopangwa mapema ambazo huzuia juhudi za mtu binafsi
wrong_answers:
  - Wafanyakazi wa serikali kwa asili hawana ubunifu na akili nyingi kuliko wafanyakazi wa sekta binafsi
  - Taasisi za serikali hazina rasilimali za kutosha za kifedha kufadhili miradi ya utafiti na maendeleo
  - Mashirika ya umma yanakabiliwa na kuingiliwa sana kisiasa kutoka kwa maafisa waliochaguliwa katika michakato yao ya kufanya maamuzi
explanation: |
  Sura hiyo inaelezea kwamba taasisi za serikali haziwezi kubuni kutokana na asili yao ya urasimu, ambapo wafanyakazi hufuata kanuni zilizopangwa mapema bila motisha binafsi kwa ajili ya uvumbuzi. Tofauti na watendaji binafsi wanaohamasishwa na maslahi binafsi na zawadi zinazowezekana, watendaji wa serikali hawana ushiriki binafsi katika kuboresha michakato. Kikwazo hiki cha kimuundo kinamaanisha kuwa uvumbuzi lazima utoke katika sekta huru za jamii, kama inavyoonyeshwa na mifumo ya kikomunisti ambayo ingeweza tu kuiga uvumbuzi wa nje badala ya generate yao wenyewe.
question: 根据巴斯蒂亚对经济诡辩的分析，保护主义者在工作性质及其目的方面犯了什么根本性错误？
answer: 他们将工作本身视为目的，而不是为工人获得最大满足的手段
wrong_answers:
  - 他们过于关注工作成果，而不是工人所付出的努力和精力
  - 他们优先考虑工人个人的满意度，而不是最大限度地提高总就业水平的集体需求
  - 他们没有认识到工作应在社会所有成员之间平等分配
explanation: |
  巴斯蒂亚指出了保护主义者颠倒手段与目的之间关系的重要诡辩。他们把工作本身当作目标来赞美，重视力量和能量的消耗，却不考虑这种活动实际上达到了什么目的。像巴斯蒂亚这样的自由主义者则认为，工作只是一种手段--真正的目标是在付出相同劳动量的情况下最大限度地满足工人的需求。这种颠倒也出现在其他领域，比如将政治自由视为终极目标，而不是实现公民和经济自由的手段。
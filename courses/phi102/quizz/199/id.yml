question: Menurut analisis Bastiat tentang sofisme ekonomi, kesalahan mendasar apa yang dilakukan oleh kaum proteksionis terkait sifat dasar kerja dan tujuannya?
answer: Mereka memperlakukan pekerjaan sebagai tujuan, bukan sebagai sarana untuk mendapatkan kepuasan maksimal bagi para pekerja
wrong_answers:
  - Mereka terlalu fokus pada hasil kerja daripada usaha dan energi yang dikeluarkan oleh pekerja
  - Mereka memprioritaskan kepuasan pekerja secara individu di atas kebutuhan kolektif untuk memaksimalkan tingkat pekerjaan total
  - Mereka gagal menyadari bahwa pekerjaan harus didistribusikan secara merata di antara semua anggota masyarakat
explanation: |
  Bastiat mengidentifikasi sebuah sofisme yang krusial di mana kaum proteksionis membalikkan hubungan antara sarana dan tujuan. Mereka merayakan kerja sebagai tujuan itu sendiri, menghargai pengeluaran tenaga dan energi tanpa mempertimbangkan apa yang sebenarnya dicapai oleh aktivitas ini. Kaum liberal seperti Bastiat berpendapat bahwa kerja hanyalah sarana - tujuan sebenarnya adalah memaksimalkan kepuasan pekerja dengan jumlah tenaga kerja yang sama. Pembalikan ini juga muncul di bidang-bidang lain, seperti memperlakukan kebebasan politik sebagai tujuan akhir dan bukan sebagai sarana untuk mencapai kebebasan sipil dan ekonomi.
question: De acordo com a análise dos sofismas económicos de Bastiat, que erro fundamental cometem os proteccionistas em relação à natureza do trabalho e à sua finalidade?
answer: Tratam o trabalho como um fim em si mesmo e não como um meio para obter a máxima satisfação dos trabalhadores
wrong_answers:
  - Concentram-se demasiado nos resultados do trabalho e não no esforço e na energia despendidos pelos trabalhadores
  - Dão prioridade à satisfação individual dos trabalhadores em detrimento da necessidade colectiva de maximizar os níveis de emprego total
  - Não reconhecem que o trabalho deve ser distribuído igualmente entre todos os membros da sociedade
explanation: |
  Bastiat identificou um sofisma crucial em que os proteccionistas invertem a relação entre meios e fins. Celebram o trabalho como um objetivo em si, valorizando o dispêndio de força e energia sem considerar o que essa atividade realmente alcança. Liberais como Bastiat argumentam que o trabalho é apenas um meio - o verdadeiro objetivo é maximizar a satisfação do trabalhador com a mesma quantidade de trabalho. Esta inversão aparece também noutras áreas, como por exemplo, tratar a liberdade política como um objetivo final e não como um meio para alcançar as liberdades civis e económicas.
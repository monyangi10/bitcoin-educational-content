question: Millise põhimõttelise vea teevad protektsionistid Bastiat' majandusliku sofismi analüüsi kohaselt seoses töö olemuse ja selle eesmärgiga?
answer: Nad käsitlevad tööd kui eesmärki iseenesest, mitte kui vahendit töötajate maksimaalse rahulolu saavutamiseks
wrong_answers:
  - Nad keskenduvad liiga palju töötulemustele, mitte töötajate poolt kulutatud jõupingutustele ja energiale
  - Nad seavad töötajate individuaalse rahulolu esikohale kollektiivse vajaduse ees, et maksimeerida kogutööhõive taset
  - Nad ei tunnista, et töö peaks olema võrdselt jaotatud kõigi ühiskonnaliikmete vahel
explanation: |
  Bastiat tuvastas olulise sofismi, mille puhul protektsionistid pöörasid ümber vahendite ja eesmärkide vahelise suhte. Nad tähistavad tööd kui eesmärki, väärtustades jõu ja energia kulutamist, mõtlemata sellele, mida selle tegevusega tegelikult saavutatakse. Liberaalid nagu Bastiat väidavad, et töö on vaid vahend - tõeline eesmärk on maksimeerida tööliste rahulolu sama töömahu eest. See pöördumine ilmneb ka teistes valdkondades, näiteks poliitilise vabaduse käsitlemine lõppeesmärgina, mitte vahendina kodaniku- ja majanduslike vabaduste saavutamiseks.
question: Enligt Bastiats analys av ekonomiska sofismer, vilket grundläggande fel gör protektionister när det gäller arbetets natur och dess syfte?
answer: De behandlar arbetet som ett mål i sig snarare än som ett medel för att uppnå maximal tillfredsställelse för arbetstagarna
wrong_answers:
  - De fokuserar för mycket på resultatet av arbetet snarare än på den ansträngning och energi som arbetstagarna lägger ner
  - De prioriterar den enskilda arbetstagarens tillfredsställelse framför det kollektiva behovet av att maximera den totala sysselsättningsnivån
  - De inser inte att arbetet bör fördelas lika mellan alla samhällsmedlemmar
explanation: |
  Bastiat identifierade en avgörande sofism där protektionisterna vänder på förhållandet mellan medel och mål. De hyllar arbetet som ett mål i sig och värdesätter förbrukningen av kraft och energi utan att fundera över vad denna aktivitet faktiskt åstadkommer. Liberaler som Bastiat hävdar att arbete bara är ett medel - det verkliga målet är att maximera arbetstagarens tillfredsställelse med samma mängd arbete. Denna inversion förekommer även på andra områden, till exempel när politisk frihet behandlas som ett slutmål snarare än som ett medel för att uppnå medborgerliga och ekonomiska friheter.
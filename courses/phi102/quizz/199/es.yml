question: Según el análisis de Bastiat de los sofismas económicos, ¿qué error fundamental cometen los proteccionistas respecto a la naturaleza del trabajo y su finalidad?
answer: Tratan el trabajo como un fin en sí mismo y no como un medio para obtener la máxima satisfacción de los trabajadores
wrong_answers:
  - Se centran demasiado en los resultados del trabajo en lugar de en el esfuerzo y la energía empleados por los trabajadores
  - Dan prioridad a la satisfacción individual de los trabajadores frente a la necesidad colectiva de maximizar los niveles totales de empleo
  - No reconocen que el trabajo debe repartirse equitativamente entre todos los miembros de la sociedad
explanation: |
  Bastiat identificó un sofisma crucial en el que los proteccionistas invierten la relación entre medios y fines. Celebran el trabajo como un fin en sí mismo, valorando el gasto de fuerza y energía sin tener en cuenta lo que esta actividad consigue realmente. Los liberales como Bastiat sostienen que el trabajo no es más que un medio: el verdadero objetivo es maximizar la satisfacción del trabajador por la misma cantidad de trabajo. Esta inversión aparece también en otros ámbitos, como tratar la libertad política como un objetivo último en lugar de como un medio para alcanzar las libertades civiles y económicas.
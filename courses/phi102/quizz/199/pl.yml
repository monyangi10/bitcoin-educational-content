question: Zgodnie z analizą sofizmatów ekonomicznych Bastiata, jaki podstawowy błąd popełniają protekcjoniści w odniesieniu do natury pracy i jej celu?
answer: Traktują pracę jako cel sam w sobie, a nie jako środek do uzyskania maksymalnej satysfakcji pracowników
wrong_answers:
  - Skupiają się zbytnio na wynikach pracy, a nie na wysiłku i energii włożonej przez pracowników
  - Przedkładają oni indywidualną satysfakcję pracowników nad zbiorową potrzebę maksymalizacji całkowitego poziomu zatrudnienia
  - Nie uznają, że praca powinna być równo rozdzielona między wszystkich członków społeczeństwa
explanation: |
  Bastiat zidentyfikował kluczowy sofizmat, w którym protekcjoniści odwracają relację między środkami i celami. Celebrują oni pracę jako cel sam w sobie, doceniając wydatkowanie siły i energii bez zastanawiania się nad tym, co ta aktywność faktycznie osiąga. Liberałowie tacy jak Bastiat argumentują, że praca jest jedynie środkiem - prawdziwym celem jest maksymalizacja satysfakcji pracownika przy tej samej ilości pracy. Ta inwersja pojawia się również w innych obszarach, takich jak traktowanie wolności politycznej jako ostatecznego celu, a nie jako środka do osiągnięcia swobód obywatelskich i gospodarczych.
question: Jakého zásadního omylu se podle Bastiatovy analýzy ekonomických sofismů dopouštějí protekcionisté, pokud jde o povahu práce a její účel?
answer: Práci považují za cíl sám o sobě, nikoli za prostředek k dosažení maximální spokojenosti pracovníků
wrong_answers:
  - Příliš se zaměřují na výsledky práce, nikoli na úsilí a energii, které pracovníci vynakládají
  - Upřednostňují individuální spokojenost pracovníků před kolektivní potřebou maximalizovat celkovou úroveň zaměstnanosti
  - Neuznávají, že práce by měla být rozdělena rovnoměrně mezi všechny členy společnosti
explanation: |
  Bastiat identifikoval zásadní sofismus, kdy protekcionisté převracejí vztah mezi prostředky a cíli. Oslavují práci jako cíl sám o sobě, oceňují vynaložení síly a energie, aniž by se zabývali tím, čeho se touto činností skutečně dosahuje. Liberálové jako Bastiat tvrdí, že práce je pouze prostředkem - skutečným cílem je maximalizace spokojenosti pracovníka při stejném množství práce. Tato inverze se objevuje i v jiných oblastech, například v tom, že politickou svobodu považují za konečný cíl, nikoli za prostředek k dosažení občanských a ekonomických svobod.
question: Welchen grundlegenden Irrtum begehen die Protektionisten nach Bastiats Analyse der ökonomischen Sophismen in Bezug auf das Wesen der Arbeit und ihren Zweck?
answer: Sie betrachten die Arbeit als Selbstzweck und nicht als Mittel zur Erreichung einer maximalen Zufriedenheit der Arbeitnehmer
wrong_answers:
  - Sie konzentrieren sich zu sehr auf die Ergebnisse der Arbeit und nicht auf die von den Arbeitnehmern aufgewendete Mühe und Energie
  - Sie geben der Zufriedenheit des einzelnen Arbeitnehmers Vorrang vor der kollektiven Notwendigkeit, das Gesamtbeschäftigungsniveau zu maximieren
  - Sie erkennen nicht an, dass die Arbeit gleichmäßig auf alle Mitglieder der Gesellschaft verteilt werden sollte
explanation: |
  Bastiat hat einen entscheidenden Sophismus erkannt, bei dem die Protektionisten das Verhältnis zwischen Mitteln und Zielen umkehren. Sie feiern die Arbeit als Ziel an sich und werten den Einsatz von Kraft und Energie auf, ohne sich Gedanken darüber zu machen, was mit dieser Tätigkeit eigentlich erreicht wird. Liberale wie Bastiat argumentieren, dass Arbeit lediglich ein Mittel ist - das wahre Ziel ist die Maximierung der Zufriedenheit der Arbeitnehmer bei gleichem Arbeitsaufwand. Diese Umkehrung tritt auch in anderen Bereichen auf, etwa wenn die politische Freiheit als Endziel und nicht als Mittel zur Erreichung bürgerlicher und wirtschaftlicher Freiheiten betrachtet wird.
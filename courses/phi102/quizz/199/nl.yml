question: Welke fundamentele fout maken protectionisten volgens Bastiat's analyse van economische drogredenen over de aard van werk en het doel ervan?
answer: Ze behandelen werk als een doel op zich in plaats van als een middel om werknemers maximale voldoening te geven
wrong_answers:
  - Ze richten zich te veel op de resultaten van het werk in plaats van op de moeite en energie die de werknemers erin steken
  - Ze geven voorrang aan de tevredenheid van individuele werknemers boven de collectieve behoefte om de totale werkgelegenheid te maximaliseren
  - Ze erkennen niet dat werk gelijk moet worden verdeeld over alle leden van de samenleving
explanation: |
  Bastiat identificeerde een cruciale drogreden waarbij protectionisten de relatie tussen middelen en doelen omkeren. Ze vieren werk als een doel op zich, waarbij ze de uitgave van kracht en energie opwaarderen zonder na te denken over wat deze activiteit eigenlijk bereikt. Liberalen zoals Bastiat stellen dat werk slechts een middel is - het echte doel is de tevredenheid van de werknemer te maximaliseren voor dezelfde hoeveelheid arbeid. Deze omkering komt ook op andere gebieden voor, zoals het behandelen van politieke vrijheid als een ultiem doel in plaats van als een middel om burgerlijke en economische vrijheden te bereiken.
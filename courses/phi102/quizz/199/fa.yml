question: بر اساس تحلیل باستیات از سفسطه‌های اقتصادی، چه خطای اساسی‌ای درک حمایت‌گرایان از ماهیت کار و هدف آن وجود دارد؟
answer: آن‌ها کار را به‌عنوان هدفی در خود می‌بینند، نه به‌عنوان وسیله‌ای برای دستیابی به حداکثر رضایت برای کارگران.
wrong_answers:
  - آن‌ها بیش از حد بر نتایج کار تمرکز می‌کنند تا بر تلاش و انرژی‌ای که کارگران صرف می‌کنند.
  - آن‌ها رضایت فردی کارگران را بر نیاز جمعی به حداکثر رساندن سطح کلی اشتغال ترجیح می‌دهند.
  - آن‌ها نمی‌فهمند که کار باید به‌طور مساوی بین همه اعضای جامعه توزیع شود.
explanation: |
  باستیا یک سفسطه‌ی مهم را شناسایی کرد که در آن حمایت‌گرایان رابطه بین وسایل و اهداف را وارونه می‌کنند. آن‌ها کار را به‌عنوان یک هدف در خود جشن می‌گیرند و به مصرف نیرو و انرژی ارزش می‌دهند بدون اینکه به آنچه این فعالیت واقعاً به دست می‌آورد توجه کنند. لیبرال‌هایی مانند باستیا استدلال می‌کنند که کار صرفاً یک وسیله است - هدف واقعی حداکثر کردن رضایت کارگر برای همان مقدار کار است. این وارونگی در سایر حوزه‌ها نیز ظاهر می‌شود، مانند برخورد با آزادی سیاسی به‌عنوان یک هدف نهایی به‌جای وسیله‌ای برای دستیابی به آزادی‌های مدنی و اقتصادی.
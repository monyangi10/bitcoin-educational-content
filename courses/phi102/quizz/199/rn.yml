question: Dukurikije icegeranyo ca Bastiat c’ubuhinga bwo gukingira ubutunzi, ni irihe kosa ry’ishimikiro abaharanira uburenganzira bw’abantu bakora ku bijanye n’ingene igikorwa giteye be n’intumbero yaco?
answer: Bafata akazi nk’intumbero ubwayo aho kubona nk’uburyo bwo kuronka umunezero mwinshi ku bakozi .
wrong_answers:
  - Bibanda cane ku ngaruka z’akazi aho kwibanda ku kigoro n’inguvu abakozi bakoresha .
  - Bashira imbere ukunyurwa kw'umukozi ku giti ciwe kuruta ivyo bose bakeneye kugira ngo bashobore gushika ku rugero rw'akazi rwose .
  - Bananirwa kwemera ko igikorwa gikwiye kugabanwa ku rugero rungana mu bantu bose bo mu kibano .
explanation: |
  Bastiat yerekanye ubuhinga buhambaye cane aho abaharanira uburinzi bahindura isano hagati y’uburyo n’intumbero. Bahimbaza igikorwa nk’intumbero ubwayo, bagaha agaciro ugukoresha inguvu n’inguvu batazirikanye ico ico gikorwa gishikako mu vy’ukuri. Abanyagihugu b’abanyagihugu nka Bastiat bavuga ko akazi ari uburyo gusa - intumbero nyayo ni ugutuma abakozi banyurwa cane kubera igikorwa nk’ico nyene. Ukwo guhinduranya biraboneka no mu bindi bice, nk’ugufata umwidegemvyo wa politike nk’intumbero nyamukuru aho kuwufata nk’uburyo bwo gushika ku mwidegemvyo w’abanyagihugu n’uw’ubutunzi.
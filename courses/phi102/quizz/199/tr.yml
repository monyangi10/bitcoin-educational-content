question: Bastiat'nın ekonomik safsatalar analizine göre, korumacılar işin doğası ve amacı konusunda hangi temel hatayı yapmaktadır?
answer: İşi, çalışanların azami tatminini sağlayacak bir araç olarak değil, kendi içinde bir amaç olarak ele alırlar
wrong_answers:
  - Çalışanlar tarafından harcanan çaba ve enerjiden ziyade işin sonuçlarına çok fazla odaklanırlar
  - Bireysel çalışan memnuniyetini, toplam istihdam seviyelerini en üst düzeye çıkarma yönündeki kolektif ihtiyaca göre önceliklendirirler
  - İşin toplumun tüm üyeleri arasında eşit olarak dağıtılması gerektiğini kabul etmiyorlar
explanation: |
  Bastiat, korumacıların araçlar ve amaçlar arasındaki ilişkiyi tersine çevirdiği çok önemli bir safsatayı tespit etmiştir. Çalışmayı başlı başına bir amaç olarak yüceltmekte, bu faaliyetin gerçekte neyi başardığını düşünmeksizin güç ve enerji harcamasına değer vermektedirler. Bastiat gibi liberaller ise çalışmanın yalnızca bir araç olduğunu, asıl amacın aynı miktarda emek karşılığında işçi memnuniyetini en üst düzeye çıkarmak olduğunu savunurlar. Bu tersine çevirme başka alanlarda da görülür; örneğin siyasi özgürlüğü sivil ve ekonomik özgürlüklere ulaşmak için bir araç olarak görmek yerine nihai bir amaç olarak ele almak gibi.
question: Menurut teori liberal, situasi paradoksal apa yang muncul ketika negara memonopoli sektor-sektor yang dianggap penting?
answer: Negara merendahkan dan mengorbankan para profesional yang menyediakan layanan-layanan penting ini, mencegah mereka mencapai status sosial yang seharusnya
wrong_answers:
  - Negara menciptakan persaingan yang berlebihan yang menurunkan kualitas layanan penting sambil mempertahankan kelangkaan artifisial
  - Negara menimbulkan biaya yang lebih tinggi bagi konsumen sekaligus mengurangi akses terhadap layanan ini bagi masyarakat umum
  - Negara menciptakan regulatory capture di mana kepentingan swasta memanipulasi kebijakan publik untuk menghilangkan persaingan pasar yang sesungguhnya
explanation: |
  Teori liberal mengidentifikasi paradoks mendasar dalam monopoli negara: justru karena negara memandang sektor-sektor tertentu sangat penting sehingga harus dikontrol, negara justru merendahkan nilai mereka yang bekerja di sektor-sektor tersebut. Teks tersebut mengilustrasikan hal ini dengan pendidikan dan kesehatan, di mana para profesional yang seharusnya dihargai tinggi di masyarakat malah 'dikorbankan' oleh sistem pelayanan publik yang merendahkan nilai pekerjaan mereka. Hal ini bertentangan dengan prediksi kaum liberal bahwa dalam sistem yang bebas, mereka yang melindungi dan memperkaya kehidupan akan dihargai dengan layak.
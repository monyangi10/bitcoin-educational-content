question: Según la teoría liberal, ¿qué situación paradójica se produce cuando el Estado monopoliza sectores que considera esenciales?
answer: El Estado devalúa y sacrifica a los propios profesionales que prestan estos servicios esenciales, impidiéndoles alcanzar el estatus social que les corresponde
wrong_answers:
  - El Estado crea una competencia excesiva que rebaja la calidad de los servicios esenciales al tiempo que mantiene una escasez artificial
  - El Estado genera costes más elevados para los consumidores al tiempo que reduce el acceso de la población general a estos servicios
  - El Estado crea una captura reguladora en la que los intereses privados manipulan la política pública para eliminar la auténtica competencia del mercado
explanation: |
  La teoría liberal identifica una paradoja fundamental en la monopolización estatal: precisamente porque el Estado considera ciertos sectores tan esenciales que deben ser controlados, acaba socavando el propio valor de quienes trabajan en ellos. El texto lo ilustra con la educación y la sanidad, donde profesionales que deberían ser muy valorados en la sociedad son en cambio "sacrificados" por el sistema de servicio público que deprecia su trabajo. Esto contradice la predicción liberal de que en un sistema libre se valoraría adecuadamente a quienes protegen y enriquecen la vida.
question: Selon la théorie libérale, quelle situation paradoxale se produit lorsque l'État monopolise des secteurs qu'il considère comme essentiels ?
answer: L'État dévalorise et sacrifie les professionnels qui fournissent ces services essentiels, les empêchant ainsi d'obtenir le statut social qui leur revient
wrong_answers:
  - L'État crée une concurrence excessive qui fait baisser la qualité des services essentiels tout en maintenant une pénurie artificielle
  - L'État génère des coûts plus élevés pour les consommateurs tout en réduisant l'accès à ces services pour la population en général
  - L'État crée une emprise réglementaire lorsque des intérêts privés manipulent la politique publique pour éliminer une véritable concurrence sur le marché
explanation: |
  La théorie libérale identifie un paradoxe fondamental dans la monopolisation de l'État : c'est précisément parce que l'État considère certains secteurs comme si essentiels qu'ils doivent être contrôlés, qu'il finit par saper la valeur même de ceux qui y travaillent. Le texte illustre ce phénomène avec l'éducation et les soins de santé, où les professionnels qui devraient être hautement valorisés dans la société sont au contraire "sacrifiés" par le système de service public qui déprécie leur travail. Cela contredit la prédiction libérale selon laquelle, dans un système libre, ceux qui protègent et enrichissent la vie seraient appréciés à leur juste valeur.
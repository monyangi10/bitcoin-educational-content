question: Според либералната теория каква парадоксална ситуация възниква, когато държавата монополизира сектори, които смята за важни?
answer: Държавата обезценява и жертва самите професионалисти, които предоставят тези основни услуги, като им пречи да постигнат полагащия им се социален статус
wrong_answers:
  - Държавата създава прекомерна конкуренция, която понижава качеството на основните услуги, като същевременно поддържа изкуствен недостиг
  - Държавата генерира по-високи разходи за потребителите, като същевременно намалява достъпа на населението до тези услуги
  - Държавата създава регулаторно завладяване, при което частни интереси манипулират публичната политика, за да елиминират истинската пазарна конкуренция
explanation: |
  Либералната теория идентифицира един основен парадокс в държавния монопол: точно защото държавата смята определени сектори за толкова важни, че трябва да бъдат контролирани, тя в крайна сметка подкопава самата стойност на тези, които работят в тях. Текстът илюстрира това с образованието и здравеопазването, където специалистите, които би трябвало да са високо ценени в обществото, вместо това са "пожертвани" от системата за обществени услуги, която обезценява техния труд. Това противоречи на либералната прогноза, че в една свободна система тези, които защитават и обогатяват живота, ще бъдат оценени подобаващо.
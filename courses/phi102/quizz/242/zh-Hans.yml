question: 根据自由主义理论，当国家垄断它认为至关重要的部门时，会出现什么自相矛盾的情况？
answer: 国家贬低并牺牲了提供这些基本服务的专业人员，使他们无法获得应有的社会地位
wrong_answers:
  - 国家制造过度竞争，导致基本服务质量下降，同时维持人为的稀缺性
  - 国家为消费者带来了更高的成本，同时也减少了普通民众获得这些服务的机会
  - 在私人利益操纵公共政策以消除真正的市场竞争的情况下，国家制造了监管俘虏
explanation: |
  自由主义理论指出了国家垄断中的一个基本悖论：正因为国家认为某些行业非常重要，所以必须加以控制，结果却损害了这些行业从业者的价值本身。文中以教育和医疗保健为例说明了这一点，在这两个领域，本应受到社会高度评价的专业人员却被贬低其工作价值的公共服务系统 "牺牲 "了。这与自由派的预言相矛盾，自由派预言在一个自由的体系中，那些保护和丰富生命的人会得到应有的重视。
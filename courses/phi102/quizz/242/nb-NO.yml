question: Hvilken paradoksal situasjon oppstår ifølge liberal teori når staten monopoliserer sektorer den anser som viktige?
answer: Staten nedvurderer og ofrer de fagfolkene som leverer disse viktige tjenestene, og hindrer dem i å oppnå sin rettmessige sosiale status
wrong_answers:
  - Staten skaper overdreven konkurranse som presser ned kvaliteten på viktige tjenester samtidig som den opprettholder kunstig knapphet
  - Staten genererer høyere kostnader for forbrukerne, samtidig som den reduserer tilgangen til disse tjenestene for befolkningen generelt
  - Staten skaper "regulatory capture" der private interesser manipulerer offentlig politikk for å eliminere reell markedskonkurranse
explanation: |
  Liberal teori identifiserer et grunnleggende paradoks i statlig monopolisering: Nettopp fordi staten anser visse sektorer som så viktige at de må kontrolleres, ender den opp med å undergrave selve verdien av dem som jobber i dem. Teksten illustrerer dette med utdanning og helsevesen, der fagfolk som burde være høyt verdsatt i samfunnet, i stedet blir "ofret" av det offentlige systemet som nedvurderer arbeidet deres. Dette strider mot den liberale forutsigelsen om at i et fritt system vil de som beskytter og beriker livet, bli verdsatt på riktig måte.
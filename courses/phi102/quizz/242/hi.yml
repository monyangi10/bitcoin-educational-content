question: According to liberal theory, what paradoxical situation emerges when the state monopolizes sectors it considers essential?
answer: The state devalues and sacrifices the very professionals who provide these essential services, preventing them from achieving their rightful social status
wrong_answers:
  - The state creates excessive competition that drives down the quality of essential services while maintaining artificial scarcity
  - The state generates higher costs for consumers while simultaneously reducing access to these services for the general population
  - The state creates regulatory capture where private interests manipulate public policy to eliminate genuine market competition
explanation: |
  Liberal theory identifies a fundamental paradox in state monopolization: precisely because the state views certain sectors as so essential that they must be controlled, it ends up undermining the very value of those who work in them. The text illustrates this with education and healthcare, where professionals who should be highly valued in society are instead 'sacrificed' by the public service system that depreciates their work. This contradicts the liberal prediction that in a free system, those who protect and enrich life would be properly valued.
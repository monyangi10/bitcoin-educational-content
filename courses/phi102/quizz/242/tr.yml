question: Liberal teoriye göre, devlet gerekli gördüğü sektörleri tekeline aldığında hangi paradoksal durum ortaya çıkar?
answer: Devlet, bu temel hizmetleri sağlayan profesyonelleri değersizleştirmekte ve kurban etmekte, onların hak ettikleri sosyal statüye ulaşmalarını engellemektedir
wrong_answers:
  - Devlet, yapay kıtlığı sürdürürken temel hizmetlerin kalitesini düşüren aşırı rekabet yaratır
  - Devlet, tüketiciler için daha yüksek maliyetler yaratırken aynı zamanda genel nüfusun bu hizmetlere erişimini azaltmaktadır
  - Devlet, özel çıkarların gerçek piyasa rekabetini ortadan kaldırmak için kamu politikasını manipüle ettiği düzenleyici ele geçirme yaratır
explanation: |
  Liberal teori devlet tekelleşmesinde temel bir paradoks tespit eder: tam da devlet belirli sektörleri kontrol edilmesi gereken kadar önemli gördüğü için, bu sektörlerde çalışanların değerinin altını oyar. Metin bu durumu, toplumda çok değerli olması gereken profesyonellerin, yaptıkları işi değersizleştiren kamu hizmeti sistemi tarafından 'feda edildiği' eğitim ve sağlık hizmetleri ile örneklendirmektedir. Bu durum, özgür bir sistemde yaşamı koruyan ve zenginleştirenlere gereken değerin verileceği yönündeki liberal öngörüyle çelişmektedir.
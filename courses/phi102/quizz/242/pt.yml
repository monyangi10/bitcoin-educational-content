question: De acordo com a teoria liberal, que situação paradoxal surge quando o Estado monopoliza sectores que considera essenciais?
answer: O Estado desvaloriza e sacrifica os próprios profissionais que prestam estes serviços essenciais, impedindo-os de alcançar o estatuto social que lhes é devido
wrong_answers:
  - O Estado cria uma concorrência excessiva que faz baixar a qualidade dos serviços essenciais, mantendo uma escassez artificial
  - O Estado gera custos mais elevados para os consumidores, reduzindo simultaneamente o acesso da população em geral a estes serviços
  - O Estado cria uma captura regulamentar em que os interesses privados manipulam a política pública para eliminar a verdadeira concorrência no mercado
explanation: |
  A teoria liberal identifica um paradoxo fundamental na monopolização do Estado: precisamente porque o Estado vê certos sectores como tão essenciais que devem ser controlados, acaba por minar o próprio valor daqueles que neles trabalham. O texto ilustra este facto com a educação e a saúde, onde os profissionais que deveriam ser altamente valorizados na sociedade são, em vez disso, "sacrificados" pelo sistema de serviço público que desvaloriza o seu trabalho. Isto contradiz a previsão liberal de que, num sistema livre, aqueles que protegem e enriquecem a vida seriam devidamente valorizados.
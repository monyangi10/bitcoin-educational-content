question: Secondo la teoria liberale, quale situazione paradossale emerge quando lo Stato monopolizza settori che considera essenziali?
answer: Lo Stato svaluta e sacrifica proprio i professionisti che forniscono questi servizi essenziali, impedendo loro di raggiungere il giusto status sociale
wrong_answers:
  - Lo Stato crea una concorrenza eccessiva che abbassa la qualità dei servizi essenziali mantenendo una scarsità artificiale
  - Lo Stato genera costi più elevati per i consumatori e contemporaneamente riduce l'accesso a questi servizi per la popolazione generale
  - Lo Stato crea una cattura normativa quando gli interessi privati manipolano le politiche pubbliche per eliminare la vera concorrenza di mercato
explanation: |
  La teoria liberale individua un paradosso fondamentale nella monopolizzazione statale: proprio perché lo Stato considera alcuni settori così essenziali da dover essere controllati, finisce per minare il valore stesso di coloro che vi lavorano. Il testo lo illustra con l'istruzione e la sanità, dove professionisti che dovrebbero essere molto apprezzati dalla società sono invece "sacrificati" dal sistema di servizio pubblico che svaluta il loro lavoro. Ciò contraddice la previsione liberale secondo cui, in un sistema libero, coloro che proteggono e arricchiscono la vita sarebbero adeguatamente valorizzati.
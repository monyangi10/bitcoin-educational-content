question: Kulingana na nadharia ya kiliberali, ni hali gani ya kinzani inayojitokeza wakati serikali inapohodhi sekta ambazo inaziona kuwa muhimu?
answer: Serikali inawadharau na kuwatoa kafara wataalamu wale wale wanaotoa huduma hizi muhimu, na kuwazuia kufikia hadhi yao halali ya kijamii.
wrong_answers:
  - Jimbo linaunda ushindani mkubwa unaopunguza ubora wa huduma muhimu huku likidumisha uhaba bandia.
  - Jimbo hutoa gharama kubwa kwa watumiaji huku likipunguza upatikanaji wa huduma hizi kwa idadi ya watu kwa ujumla.
  - Serikali huunda udhibiti ambapo maslahi binafsi hudhibiti sera za umma ili kuondoa ushindani halisi wa soko
explanation: |
  Nadharia ya kiliberali inabainisha kitendawili cha msingi katika uhodhi wa serikali: haswa kwa sababu serikali inaona sekta fulani kuwa muhimu sana kiasi kwamba lazima zidhibitiwe, inaishia kudhoofisha thamani halisi ya wale wanaofanya kazi ndani yake. Maandishi yanaonyesha hili kwa elimu na huduma ya afya, ambapo wataalamu ambao wanapaswa kuthaminiwa sana katika jamii badala yake 'wanatolewa kafara' na mfumo wa utumishi wa umma unaodharau kazi zao. Hii inapingana na utabiri wa kiliberali kwamba katika mfumo huru, wale wanaolinda na kutajirisha maisha wangethaminiwa ipasavyo.
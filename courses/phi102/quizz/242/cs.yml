question: Jaká paradoxní situace podle liberální teorie nastává, když stát monopolizuje odvětví, která považuje za zásadní?
answer: Stát znehodnocuje a obětuje samotné profesionály, kteří tyto základní služby poskytují, a brání jim v dosažení jejich oprávněného společenského postavení
wrong_answers:
  - Stát vytváří nadměrnou konkurenci, která snižuje kvalitu základních služeb a zároveň udržuje umělý nedostatek
  - Stát vytváří vyšší náklady pro spotřebitele a zároveň snižuje dostupnost těchto služeb pro širokou populaci
  - Stát vytváří regulační zajetí, kdy soukromé zájmy manipulují s veřejnou politikou, aby eliminovaly skutečnou tržní konkurenci
explanation: |
  Liberální teorie identifikuje základní paradox státní monopolizace: právě proto, že stát považuje určitá odvětví za tak zásadní, že je musí kontrolovat, podkopává nakonec samotnou hodnotu těch, kteří v nich pracují. Text to ilustruje na příkladu školství a zdravotnictví, kde jsou odborníci, kteří by měli být ve společnosti vysoce ceněni, místo toho "obětováni" systémem veřejných služeb, který jejich práci znehodnocuje. To je v rozporu s liberální předpovědí, že ve svobodném systému budou náležitě oceněni ti, kteří chrání a obohacují život.
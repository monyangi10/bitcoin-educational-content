question: Dushingiye ku ciyumviro c’uburenganzira, ni ikihe kintu giteye ubwoba kivyuka iyo Leta ifata ingingo yonyene mu mice ibona ko ari ngirakamaro?
answer: Leta iragabanya agaciro kandi igatanga ikimazi c’abahinga nyene batanga ivyo bikorwa vy’ingenzi, ikababuza gushika ku kibanza cabo co mu kibano gibereye .
wrong_answers:
  - Leta irema uguhiganwa birenze urugero bigabanya uburyo bwo gutanga ibikorwa vy’ingenzi mu gihe biguma bifise ubukene bw’abantu .
  - Leta ituma abaguzi bacika ibiciro vyinshi mu gihe nyene igabanya ubushobozi bwo kuronka izo nsiguro ku bantu bose .
  - Leta irema ugufata amategeko aho inyungu z'abikorera ku giti cabo zikoresha nabi politike ya Leta kugira ngo zikureho uguhiganwa nyakuri kw'isoko .
explanation: |
  Ivyiyumviro vy’ubwigenge birerekana ikintu nyamukuru kidasanzwe mu gukoresha Leta gusa: kubera nyene Leta ibona ko imice imwimwe ari ngirakamaro cane ku buryo itegerezwa kugenzurwa, biraheza bikagabanya agaciro k’abayikora. Ico canditswe kivyerekana mu burezi no mu buvuzi, aho abahinga bakwiye guhabwa agaciro kanini mu kibano ahubwo ‘batanga’ n’uburyo bw’abakozi ba Leta bugabanya agaciro k’akazi kabo. Ivyo bivuguruza ubuhanuzi bw’abanyagihugu bw’uko mu gihe c’ubutegetsi bw’umwidegemvyo, abakingira ubuzima kandi bakabutunganya bohabwa agaciro kabereye.
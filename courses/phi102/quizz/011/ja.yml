question: 1830年頃のシャルル・コントの自然法理論によれば、人間を区別し、社会的関係を可能にする基本的な能力とは何か？
answer: 認知能力を通じて、アイデアを感じ、発想し、共有する能力
wrong_answers:
  - 社会における肉体労働と物質生産の能力
  - 集団内での生存と生物学的繁殖の本能
  - 優れた力と知性によって他者を支配する力
explanation: |
  シャルル・コントは、人間は物質世界で活動する単なる肉体ではなく、感情を持ち、思索し、思想を共有することのできる精神的な存在であると主張した。彼は、認知能力のない個人は、ほとんど人間として認識されないだろうと述べた。社会的関係が形成されるのは、まさに個人が思考や感情を交換できるからである。間違った答えは、身体的、生物学的、あるいは優位性に基づく側面に焦点を当て、意味のある社会的つながりを可能にする人間の特徴として、知的・感情的能力を重視したコントを見逃している。
question: Zgodnie z teorią prawa naturalnego Charlesa Comte'a z około 1830 r., jaka podstawowa zdolność wyróżnia ludzi i umożliwia relacje społeczne?
answer: Zdolność do odczuwania, tworzenia i dzielenia się pomysłami dzięki zdolnościom poznawczym
wrong_answers:
  - Zdolność do pracy fizycznej i produkcji materialnej w społeczeństwie
  - Instynkt przetrwania i biologiczna reprodukcja w grupach
  - Moc dominowania nad innymi dzięki ponadprzeciętnej sile i inteligencji
explanation: |
  Charles Comte argumentował, że ludzie są przede wszystkim istotami duchowymi zdolnymi do odczuwania, pojmowania i dzielenia się ideami, a nie tylko ciałami fizycznymi działającymi w świecie materialnym. Stwierdził, że jednostka pozbawiona zdolności poznawczych z trudem zostałaby uznana za człowieka. Relacje społeczne powstają właśnie dlatego, że jednostki mogą wymieniać się myślami i uczuciami. Błędne odpowiedzi koncentrują się na aspektach fizycznych, biologicznych lub opartych na dominacji, które pomijają nacisk Comte'a na zdolności intelektualne i emocjonalne jako cechy definiujące człowieka, które umożliwiają znaczące więzi społeczne.
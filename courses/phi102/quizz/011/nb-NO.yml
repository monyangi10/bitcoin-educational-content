question: Hvilken grunnleggende egenskap kjennetegner mennesket og muliggjør sosiale relasjoner, ifølge Charles Comtes naturrettsteori fra rundt 1830?
answer: Evnen til å føle, tenke og dele ideer gjennom kognitive evner
wrong_answers:
  - Kapasiteten for fysisk arbeid og materiell produksjon i samfunnet
  - Instinktet for overlevelse og biologisk reproduksjon i grupper
  - Makten til å dominere andre gjennom overlegen styrke og intelligens
explanation: |
  Charles Comte hevdet at mennesket først og fremst er et åndelig vesen som er i stand til å føle, tenke og dele ideer, og ikke bare en fysisk kropp som opptrer i den materielle verden. Han hevdet at et individ uten kognitive evner knapt ville bli anerkjent som et menneske. Sosiale relasjoner oppstår nettopp fordi individer kan utveksle tanker og følelser. De gale svarene fokuserer på fysiske, biologiske eller dominansbaserte aspekter som går glipp av Comtes vektlegging av intellektuelle og emosjonelle evner som den definerende menneskelige egenskapen som muliggjør meningsfulle sosiale forbindelser.
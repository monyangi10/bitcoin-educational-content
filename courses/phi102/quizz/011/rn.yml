question: Dukurikije inyigisho y’amategeko kavukire ya Charles Comte yo mu 1830 nko, ni ubuhe bushobozi bw’ishimikiro butandukanya abantu kandi bugatuma haba imigenderanire yo mu kibano?
answer: Ubushobozi bwo kwumva, gusama, no gusangira ivyiyumviro biciye ku bushobozi bwo gutahura
wrong_answers:
  - Ubushobozi bwo gukora ibikorwa vy'umubiri n'uguhingura ibintu mu kibano
  - Instinct yo kurokoka no kuvyara mu mirwi
  - Ububasha bwo kuganza abandi biciye ku nkomezi n'ubwenge biruta abandi .
explanation: |
  Charles Comte yavuze yuko abantu ahanini ari ibiremwa vy’impwemu bishobora kwumva, gusama no gusangira ivyiyumviro, atari imibiri y’umubiri gusa ikora mw’isi y’ibintu. Yavuze yuko umuntu atagira ubushobozi bwo gutahura ata co yokwemera ko ari umuntu. Imigenderanire yo mu kibano irashingwa neza na neza kubera ko abantu bashobora guhana ivyiyumviro n’inyiyumvo. Inyishu zitari zo zishimika ku mice y’umubiri, y’ibinyabuzima canke y’ubukuru ibura ivyo Comte ashimikiyeko ku bushobozi bwo mu bwenge no mu nyiyumvo nk’akaranga k’umuntu gasobanura gatuma umuntu ashobora kugiranira amasano afise insiguro.
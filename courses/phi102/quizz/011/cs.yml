question: Jaká základní schopnost podle teorie přirozeného práva Charlese Comta z roku 1830 odlišuje člověka a umožňuje společenské vztahy?
answer: Schopnost cítit, chápat a sdílet myšlenky prostřednictvím kognitivních schopností
wrong_answers:
  - Schopnost fyzické práce a materiální výroby ve společnosti
  - Pud přežití a biologické rozmnožování ve skupinách
  - Moc ovládat ostatní díky vyšší síle a inteligenci
explanation: |
  Charles Comte tvrdil, že lidé jsou především duchovní bytosti schopné cítit, chápat a sdílet myšlenky, nikoli jen fyzická těla působící v hmotném světě. Tvrdil, že jedinec bez kognitivních schopností by byl jen stěží rozpoznatelný jako člověk. Společenské vztahy vznikají právě proto, že si jedinci mohou vyměňovat myšlenky a pocity. Špatné odpovědi se zaměřují na fyzické, biologické nebo na dominanci založené aspekty, které opomíjejí Comtův důraz na intelektuální a emocionální schopnosti jako určující lidskou charakteristiku, která umožňuje smysluplné sociální vazby.
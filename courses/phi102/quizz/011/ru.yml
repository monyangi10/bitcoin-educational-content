question: Согласно теории естественного права Шарля Комта, созданной около 1830 года, какая фундаментальная способность отличает людей и обеспечивает социальные отношения?
answer: Способность чувствовать, задумывать и делиться идеями с помощью когнитивных способностей
wrong_answers:
  - Способность к физическому труду и материальному производству в обществе
  - Инстинкт выживания и биологического воспроизводства в группах
  - Способность доминировать над другими благодаря превосходству в силе и интеллекте
explanation: |
  Шарль Комт утверждал, что люди - это прежде всего духовные существа, способные чувствовать, задумываться и делиться идеями, а не просто физические тела, действующие в материальном мире. Он утверждал, что индивид, лишенный когнитивных способностей, едва ли будет признан человеком. Социальные отношения формируются именно потому, что люди могут обмениваться мыслями и чувствами. Неправильные ответы сосредоточены на физических, биологических или основанных на доминировании аспектах, которые упускают из виду то, что Комт подчеркивал интеллектуальные и эмоциональные способности как определяющую характеристику человека, обеспечивающую значимые социальные связи.
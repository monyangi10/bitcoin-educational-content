question: Според теорията за естественото право на Шарл Конт от около 1830 г., коя основна способност отличава хората и дава възможност за социални взаимоотношения?
answer: Способността да усещате, замисляте и споделяте идеи чрез познавателни способности
wrong_answers:
  - Способността за физически труд и материално производство в обществото
  - Инстинкт за оцеляване и биологично възпроизводство в рамките на групи
  - Силата да доминираш над другите чрез превъзходство на силата и интелигентността
explanation: |
  Шарл Конт твърди, че хората са предимно духовни същества, способни да чувстват, да възприемат и да споделят идеи, а не просто физически тела, действащи в материалния свят. Той твърди, че човек без познавателни способности едва ли би бил признат за човек. Социалните взаимоотношения се формират именно защото индивидите могат да обменят мисли и чувства. Неправилните отговори се фокусират върху физически, биологични или основани на господство аспекти, които пропускат акцента на Конт върху интелектуалните и емоционалните способности като определяща човешка характеристика, която дава възможност за създаване на значими социални връзки.
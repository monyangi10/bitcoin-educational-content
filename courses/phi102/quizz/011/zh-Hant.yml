question: 根據 Charles Comte 於 1830 年左右提出的自然法則理論，人類之所以與眾不同，並能建立社會關係的基本能力是什麼？
answer: 透過認知能力來感受、構想和分享想法的能力
wrong_answers:
  - 社會的體力勞動和物質生產能力
  - 群體內生存和生物繁衍的本能
  - 透過優越的力量和智慧支配他人的力量
explanation: |
  Charles Comte 認為人類主要是精神上的存在，能夠感受、構想和分享想法，而不只是在物質世界中行動的肉體。他指出，沒有認知能力的個體幾乎不會被認定為人類。社會關係的形成正是因為個人可以交換思想和情感。錯誤的答案著重於身體、生物或支配性的層面，而忽略了孔德所強調的智力和情感能力是人類的決定性特徵，使人們能夠建立有意義的社會關係。
question: Prema teoriji prirodnog prava Charlesa Comtea iz oko 1830. godine, koja fundamentalna sposobnost razlikuje ljude i omogućava društvene odnose?
answer: Sposobnost da se oseća, zamišlja i deli ideje kroz kognitivne kapacitete
wrong_answers:
  - Kapacitet za fizički rad i materijalnu proizvodnju u društvu
  - Instinkt za preživljavanje i biološku reprodukciju unutar grupa
  - Moć da se dominira nad drugima kroz superiornu snagu i inteligenciju
explanation: |
  Charles Comte je tvrdio da su ljudi prvenstveno duhovna bića sposobna da osećaju, zamišljaju i dele ideje, a ne samo fizička tela koja deluju u materijalnom svetu. On je naveo da pojedinac bez kognitivnih sposobnosti jedva da bi bio prepoznat kao ljudsko biće. Društveni odnosi se formiraju upravo zato što pojedinci mogu razmenjivati misli i osećanja. Pogrešni odgovori se fokusiraju na fizičke, biološke ili aspekte zasnovane na dominaciji koji propuštaju Comteov naglasak na intelektualnim i emocionalnim sposobnostima kao definisajućoj ljudskoj karakteristici koja omogućava značajne društvene veze.
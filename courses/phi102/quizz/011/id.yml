question: Menurut teori hukum alam Charles Comte dari sekitar tahun 1830, kapasitas fundamental apa yang membedakan manusia dan memungkinkan terjadinya hubungan sosial?
answer: Kemampuan untuk merasakan, memahami, dan berbagi ide melalui kapasitas kognitif
wrong_answers:
  - Kapasitas kerja fisik dan produksi material dalam masyarakat
  - Naluri untuk bertahan hidup dan reproduksi biologis dalam kelompok
  - Kekuatan untuk mendominasi orang lain melalui kekuatan dan kecerdasan yang unggul
explanation: |
  Charles Comte berpendapat bahwa manusia pada dasarnya adalah makhluk spiritual yang mampu merasakan, memahami, dan berbagi ide, bukan hanya tubuh fisik yang bekerja di dunia material. Dia menyatakan bahwa seorang individu tanpa kapasitas kognitif hampir tidak akan diakui sebagai manusia. Hubungan sosial terbentuk justru karena individu dapat bertukar pikiran dan perasaan. Jawaban yang salah berfokus pada aspek fisik, biologis, atau dominasi yang melewatkan penekanan Comte pada kapasitas intelektual dan emosional sebagai karakteristik manusia yang memungkinkan hubungan sosial yang bermakna.
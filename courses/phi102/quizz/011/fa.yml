question: بر اساس نظریه قانون طبیعی چارلز کومت از حدود سال 1830، چه ظرفیت بنیادی انسان‌ها را متمایز می‌کند و امکان روابط اجتماعی را فراهم می‌آورد؟
answer: توانایی احساس، تصور و به اشتراک‌گذاری ایده‌ها از طریق ظرفیت‌های شناختی
wrong_answers:
  - ظرفیت کار فیزیکی و تولید مادی در جامعه
  - غریزه بقا و تولید مثل بیولوژیکی درون گروه‌ها
  - قدرت تسلط بر دیگران از طریق قدرت و هوش برتر
explanation: |
  شارل کنت استدلال کرد که انسان‌ها در درجه اول موجوداتی روحانی هستند که قادر به احساس، تصور و به اشتراک‌گذاری ایده‌ها هستند، نه فقط بدن‌های فیزیکی که در دنیای مادی عمل می‌کنند. او بیان کرد که فردی بدون ظرفیت‌های شناختی به سختی به عنوان انسان شناخته می‌شود. روابط اجتماعی دقیقاً به این دلیل شکل می‌گیرند که افراد می‌توانند افکار و احساسات خود را مبادله کنند. پاسخ‌های نادرست بر جنبه‌های فیزیکی، زیستی یا مبتنی بر سلطه تمرکز دارند که تأکید کنت بر ظرفیت‌های فکری و احساسی به عنوان ویژگی انسانی تعریف‌کننده که ارتباطات اجتماعی معنادار را ممکن می‌سازد، نادیده می‌گیرند.
question: Volgens de natuurwetstheorie van Charles Comte uit ongeveer 1830, welk fundamenteel vermogen onderscheidt mensen en maakt sociale relaties mogelijk?
answer: Het vermogen om te voelen, ideeën te bedenken en te delen via cognitieve capaciteiten
wrong_answers:
  - De capaciteit voor fysieke arbeid en materiële productie in de samenleving
  - Het instinct voor overleving en biologische voortplanting binnen groepen
  - De macht om anderen te domineren door superieure kracht en intelligentie
explanation: |
  Charles Comte stelde dat mensen in de eerste plaats spirituele wezens zijn die in staat zijn om te voelen, ideeën te bedenken en te delen, en niet slechts fysieke lichamen die in de materiële wereld handelen. Hij stelde dat een individu zonder cognitieve capaciteiten nauwelijks als mens herkend zou worden. Sociale relaties ontstaan juist omdat individuen gedachten en gevoelens kunnen uitwisselen. De foute antwoorden richten zich op fysieke, biologische of op dominantie gebaseerde aspecten die Comte's nadruk op intellectuele en emotionele capaciteiten missen als de bepalende menselijke eigenschap die zinvolle sociale verbanden mogelijk maakt.
question: Quale caratteristica fondamentale distingue l'approccio liberale alla trasformazione sociale dai metodi rivoluzionari secondo la tradizione liberale francese?
answer: Riforma graduale attraverso la mobilitazione dell'opinione pubblica e il dibattito intellettuale piuttosto che un improvviso rovesciamento istituzionale
wrong_answers:
  - Azione politica diretta attraverso coalizioni parlamentari e pressioni legislative piuttosto che movimenti di base
  - Perturbazione economica attraverso interventi strategici di mercato piuttosto che con il confronto ideologico
  - Modifiche costituzionali attraverso l'interpretazione giudiziaria piuttosto che attraverso processi referendari popolari
explanation: |
  Il testo sottolinea che la tradizione liberale francese, esemplificata dall'analisi di Tocqueville, dimostra che gli sconvolgimenti rivoluzionari sono costosi e spesso non raggiungono i loro obiettivi di trasformazione, consolidando invece spesso il potere centralizzato. Il metodo preferito consiste nel riformare attraverso la mobilitazione dell'opinione pubblica, come illustrato dalla campagna della Lega anti-corn law di Cobden in Inghilterra, che ottenne l'abolizione attraverso incontri pubblici organizzati e la persuasione intellettuale. Questo approccio si allinea ai valori liberali di concorrenza, libertà e perfettibilità attraverso un dibattito ragionato piuttosto che con la forza.
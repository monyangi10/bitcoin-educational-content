question: Какая фундаментальная характеристика отличает либеральный подход к социальным преобразованиям от революционных методов в соответствии с французской либеральной традицией?
answer: Постепенное реформирование путем мобилизации общественного мнения и интеллектуальных дискуссий, а не внезапное свержение институтов
wrong_answers:
  - Прямые политические действия через парламентские коалиции и законодательное давление, а не через низовые движения
  - Экономические потрясения путем стратегического вмешательства в рынок, а не идеологической конфронтации
  - Внесение поправок в Конституцию путем судебного толкования, а не путем всенародного референдума
explanation: |
  В тексте подчеркивается, что французская либеральная традиция, примером которой является анализ Токвиля, демонстрирует, что революционные потрясения обходятся дорого и часто не достигают своих преобразовательных целей, вместо этого укрепляя централизованную власть. Предпочтительным методом является реформирование через мобилизацию общественного мнения, как это было показано в кампании Лиги против кукурузного закона Кобдена в Англии, которая добилась отмены закона путем организованных общественных собраний и интеллектуального убеждения. Этот подход соответствует либеральным ценностям конкуренции, свободы и совершенства, которые достигаются путем аргументированных дебатов, а не силой.
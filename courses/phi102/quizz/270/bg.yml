question: Коя основна характеристика отличава либералния подход към социалната трансформация от революционните методи според френската либерална традиция?
answer: Постепенна реформа чрез мобилизиране на общественото мнение и интелектуален дебат, а не внезапно институционално събаряне
wrong_answers:
  - Директни политически действия чрез парламентарни коалиции и законодателен натиск, а не чрез движения на обикновените хора
  - Икономически сътресения чрез стратегически пазарни интервенции, а не чрез идеологическа конфронтация
  - Промени в Конституцията чрез съдебно тълкуване, а не чрез народен референдум
explanation: |
  В текста се подчертава, че френската либерална традиция, пример за която е анализът на Токвил, показва, че революционните сътресения са скъпи и често не постигат своите трансформационни цели, като вместо това често укрепват централизираната власт. Предпочитаният метод включва реформиране чрез мобилизиране на общественото мнение, както показва кампанията на Лигата срещу закона за царевицата на Кобден в Англия, която постига отмяна на закона чрез организирани обществени събрания и интелектуално убеждаване. Този подход съответства на либералните ценности на конкуренцията, свободата и усъвършенстването чрез аргументирани дебати, а не чрез сила.
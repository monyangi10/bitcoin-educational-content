question: フランス自由主義の伝統によれば、社会変革へのリベラルなアプローチを革命的手法と区別する基本的特徴は何か？
answer: 突然の制度転覆ではなく、世論の喚起や知的な議論を通じた漸進的な改革
wrong_answers:
  - 草の根運動よりも、議会連合や立法府の圧力による直接的な政治行動
  - イデオロギー的な対立よりも、戦略的な市場介入による経済的混乱
  - 国民投票ではなく司法解釈による憲法改正
explanation: |
  本文では、トクヴィルの分析に代表されるフランスの自由主義の伝統が、革命的な動乱はコストが高く、しばしば変革の目標を達成できず、かえって中央集権的な権力を強化することが多いことを示していることを強調している。組織的な市民集会と知的説得によって廃止を達成したイギリスのコブデンの反コーン法同盟運動に代表されるように、望ましい方法は、世論の動員を通じて改革を行うことである。このアプローチは、武力よりも理性的な議論を通じて競争、自由、完全性を実現するというリベラルの価値観に沿ったものである。
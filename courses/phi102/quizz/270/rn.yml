question: Ni ikihe kintu nyamukuru gitandukanya uburyo bwo guhindura imibano mu buryo bw’ubwigenge n’uburyo bwo guhindura ibintu hakurikijwe umugenzo w’ubwigenge bw’Abafaransa?
answer: Ivugurura buhoro buhoro biciye mu gukoranya ivyiyumviro vya bose no mu mpari z'ubwenge aho gutembagaza inzego bukwi na bukwi .
wrong_answers:
  - Ibikorwa vya politike birongowe biciye mu mashirahamwe y'abashingamateka n'igitutu c'abashingamateka aho gukoresha imigwi y'abantu bo hasi
  - Guhungabanya ubutunzi biciye mu nzira zo gufasha isoko aho guhangana n'ingengabitekerezo
  - Ivugurura ry'Itegeko Nshinga biciye mu nsobanuro y'ubutungane aho gukoreshwa mu nzira z'amatora y'abanyagihugu
explanation: |
  Ico canditswe gishimika ku vy’uko umugenzo w’ubwigenge bw’Abafaransa, nk’akarorero k’isesengura rya Tocqueville, ugaragaza ko imivurungano y’amahinduka itwara amahera menshi kandi kenshi idashobora gushika ku ntego zayo zo guhindura, kenshi igakomeza ububasha bushingiye ku rwego rwo hejuru. Uburyo bushimwa ni uguhindura biciye mu gukoranya ivyiyumviro, nk’uko vyerekanwa n’igikorwa ca Cobden co kurwanya amategeko y’ibigori mu Bwongereza, kikaba carashitse ku gukuraho iyo ngingo biciye mu makoraniro ya bose yatunganijwe no kwemeza abantu b’inkerebutsi. Ubwo buryo burahuye n’agaciro k’ubwigenge k’uguhiganwa, umwidegemvyo, n’ugutungana biciye mu mpari zishingiye ku vyiyumviro aho gukoresha inguvu.
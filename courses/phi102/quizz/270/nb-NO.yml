question: Hva er det som skiller den liberale tilnærmingen til samfunnsomforming fra revolusjonære metoder i den franske liberale tradisjonen?
answer: Gradvis reform gjennom mobilisering av opinionen og intellektuell debatt snarere enn plutselig omveltning av institusjonene
wrong_answers:
  - Direkte politisk handling gjennom parlamentariske koalisjoner og lovgivningspress snarere enn grasrotbevegelser
  - Økonomisk disrupsjon gjennom strategiske markedsintervensjoner snarere enn ideologisk konfrontasjon
  - Grunnlovsendringer gjennom rettslig tolkning i stedet for folkeavstemninger
explanation: |
  Teksten legger vekt på at den franske liberale tradisjonen, eksemplifisert ved Tocquevilles analyse, viser at revolusjonære omveltninger er kostbare og ofte mislykkes i å oppnå sine transformative mål, og at de i stedet ofte konsoliderer den sentraliserte makten. Den foretrukne metoden er å reformere gjennom mobilisering av opinionen, slik Cobdens Anti-Corn Law League-kampanje i England illustrerer, som oppnådde avskaffelse gjennom organiserte folkemøter og intellektuell overtalelse. Denne tilnærmingen er i tråd med liberale verdier om konkurranse, frihet og perfeksjonering gjennom begrunnet debatt snarere enn tvang.
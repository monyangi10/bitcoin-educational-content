question: Fransız liberal geleneğine göre toplumsal dönüşüme yönelik liberal yaklaşımı devrimci yöntemlerden ayıran temel özellik nedir?
answer: Ani kurumsal devrimler yerine kamuoyunun harekete geçirilmesi ve entelektüel tartışmalar yoluyla kademeli reform
wrong_answers:
  - Taban hareketlerinden ziyade parlamento koalisyonları ve yasama baskısı yoluyla doğrudan siyasi eylem
  - İdeolojik çatışmadan ziyade stratejik piyasa müdahaleleri yoluyla ekonomik bozulma
  - Anayasa değişikliklerinin halk oylaması süreçleri yerine yargısal yorum yoluyla yapılması
explanation: |
  Metin, Tocqueville'in analiziyle örneklenen Fransız liberal geleneğinin, devrimci ayaklanmaların maliyetli olduğunu ve genellikle dönüştürücü hedeflerine ulaşmada başarısız olduklarını, bunun yerine sıklıkla merkezi gücü pekiştirdiklerini gösterdiğini vurgulamaktadır. Tercih edilen yöntem, Cobden'in İngiltere'de organize halk toplantıları ve entelektüel ikna yoluyla yasanın kaldırılmasını sağlayan Mısır Yasası Karşıtı Birlik kampanyasında görüldüğü gibi, kamuoyu seferberliği yoluyla reform yapmaktır. Bu yaklaşım, rekabet, özgürlük ve güçten ziyade gerekçeli tartışma yoluyla mükemmelleştirilebilirlik gibi liberal değerlerle uyumludur.
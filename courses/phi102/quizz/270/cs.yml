question: Jaký základní rys odlišuje liberální přístup ke společenské transformaci od revolučních metod podle francouzské liberální tradice?
answer: Postupná reforma prostřednictvím mobilizace veřejného mínění a intelektuální diskuse, nikoli náhlý institucionální převrat
wrong_answers:
  - Přímá politická akce prostřednictvím parlamentních koalic a legislativního tlaku spíše než hnutí zdola
  - Narušení ekonomiky spíše prostřednictvím strategických zásahů na trhu než ideologickou konfrontací
  - Změny ústavy spíše prostřednictvím soudního výkladu než prostřednictvím lidového referenda
explanation: |
  Text zdůrazňuje, že francouzská liberální tradice, jejímž příkladem je Tocquevillova analýza, ukazuje, že revoluční převraty jsou nákladné a často nedosahují svých transformačních cílů, protože místo toho často upevňují centralizovanou moc. Preferovaná metoda zahrnuje reformu prostřednictvím mobilizace veřejného mínění, jak ilustruje Cobdenova kampaň Ligy proti kukuřičnému zákonu v Anglii, která dosáhla zrušení zákona prostřednictvím organizovaných veřejných shromáždění a intelektuálního přesvědčování. Tento přístup je v souladu s liberálními hodnotami soutěže, svobody a zdokonalitelnosti, a to spíše prostřednictvím rozumné diskuse než silou.
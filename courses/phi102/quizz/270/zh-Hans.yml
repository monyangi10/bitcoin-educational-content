question: 根据法国自由主义传统，自由主义社会变革方法与革命方法的根本区别是什么？
answer: 通过舆论动员和思想辩论逐步进行改革，而不是突然推翻体制
wrong_answers:
  - 通过议会联盟和立法压力，而不是基层运动，直接采取政治行动
  - 通过战略性市场干预而不是意识形态对抗来破坏经济
  - 通过司法解释而非全民公决程序修宪
explanation: |
  文中强调，以托克维尔的分析为代表的法国自由主义传统表明，革命性的动荡代价高昂，而且往往无法实现其变革目标，反而经常会巩固中央集权。更可取的方法是通过舆论动员进行改革，如英国科布登的反玉米法联盟运动，通过组织公众集会和思想说服实现了废除玉米法。这种方法符合自由主义价值观，即通过理性辩论而非武力来实现竞争、自由和完善。
question: ลักษณะพื้นฐานที่แยกความแตกต่างระหว่างแนวทางเสรีนิยมในการเปลี่ยนแปลงทางสังคมกับวิธีการปฏิวัติตามประเพณีเสรีนิยมฝรั่งเศสคืออะไร?
answer: การปฏิรูปอย่างค่อยเป็นค่อยไปผ่านการระดมความคิดเห็นของสาธารณชนและการถกเถียงทางปัญญาแทนที่จะเป็นการโค่นล้มสถาบันอย่างฉับพลัน
wrong_answers:
  - การดำเนินการทางการเมืองโดยตรงผ่านการรวมกลุ่มในรัฐสภาและแรงกดดันทางกฎหมายแทนที่จะเป็นการเคลื่อนไหวจากฐานราก
  - การหยุดชะงักทางเศรษฐกิจผ่านการแทรกแซงตลาดเชิงกลยุทธ์แทนที่จะเป็นการเผชิญหน้าทางอุดมการณ์
  - การแก้ไขรัฐธรรมนูญผ่านการตีความของศาลแทนกระบวนการประชามติของประชาชน
explanation: |
  ข้อความเน้นย้ำว่าประเพณีเสรีนิยมของฝรั่งเศส ซึ่งแสดงให้เห็นโดยการวิเคราะห์ของ Tocqueville แสดงให้เห็นว่าการปฏิวัติที่เกิดขึ้นมีค่าใช้จ่ายสูงและมักไม่สามารถบรรลุเป้าหมายการเปลี่ยนแปลงได้ โดยมักจะรวมศูนย์อำนาจแทน วิธีที่ต้องการคือการปฏิรูปผ่านการระดมความคิดเห็น ดังที่แสดงโดยการรณรงค์ของ Cobden's Anti-Corn Law League ในอังกฤษ ซึ่งบรรลุการยกเลิกผ่านการประชุมสาธารณะที่จัดขึ้นและการโน้มน้าวทางปัญญา วิธีการนี้สอดคล้องกับค่านิยมเสรีนิยมของการแข่งขัน เสรีภาพ และความสามารถในการพัฒนาให้สมบูรณ์แบบผ่านการอภิปรายด้วยเหตุผลแทนที่จะใช้กำลัง
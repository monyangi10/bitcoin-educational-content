question: چه ویژگی بنیادی رویکرد لیبرال به تحول اجتماعی را از روش‌های انقلابی بر اساس سنت لیبرال فرانسوی متمایز می‌کند؟
answer: اصلاح تدریجی از طریق بسیج افکار عمومی و مباحثه فکری به جای سرنگونی ناگهانی نهادها
wrong_answers:
  - اقدام سیاسی مستقیم از طریق ائتلاف‌های پارلمانی و فشار قانون‌گذاری به جای جنبش‌های مردمی
  - اختلال اقتصادی از طریق مداخلات استراتژیک بازار به جای رویارویی ایدئولوژیک
  - اصلاحات قانون اساسی از طریق تفسیر قضایی به جای فرآیندهای همه‌پرسی مردمی
explanation: |
  متن تأکید می‌کند که سنت لیبرال فرانسوی، که در تحلیل توکویل نشان داده شده است، نشان می‌دهد که تحولات انقلابی پرهزینه هستند و اغلب در دستیابی به اهداف تحول‌آفرین خود ناکام می‌مانند و به جای آن معمولاً قدرت متمرکز را تقویت می‌کنند. روش ترجیحی شامل اصلاح از طریق بسیج افکار عمومی است، همان‌طور که در کمپین لیگ ضد قانون ذرت کابدن در انگلستان نشان داده شده است، که از طریق جلسات عمومی سازمان‌یافته و اقناع فکری به لغو دست یافت. این رویکرد با ارزش‌های لیبرال رقابت، آزادی و کمال‌پذیری از طریق بحث منطقی به جای زور همسو است.
question: Ni sifa gani ya msingi inayotofautisha mbinu huria ya mabadiliko ya kijamii na mbinu za mapinduzi kulingana na utamaduni huria wa Ufaransa?
answer: Mageuzi ya taratibu kupitia uhamasishaji wa maoni ya umma na mijadala ya kiakili badala ya kupinduliwa ghafla kwa taasisi
wrong_answers:
  - Hatua za moja kwa moja za kisiasa kupitia miungano ya bunge na shinikizo la wabunge badala ya harakati za watu wa kawaida
  - Usumbufu wa kiuchumi kupitia uingiliaji kati wa kimkakati wa soko badala ya mapambano ya kiitikadi
  - Marekebisho ya katiba kupitia tafsiri ya kimahakama badala ya michakato ya kura ya maoni ya watu wengi
explanation: |
  Maandishi hayo yanasisitiza kwamba mila ya kiliberali ya Ufaransa, iliyoonyeshwa na uchambuzi wa Tocqueville, inaonyesha kwamba mageuzi ya mapinduzi yana gharama kubwa na mara nyingi hushindwa kufikia malengo yao ya mabadiliko, na mara nyingi huunganisha nguvu kuu badala yake. Njia inayopendelewa inahusisha mageuzi kupitia uhamasishaji wa maoni, kama inavyoonyeshwa na kampeni ya Cobden ya Kupambana na Mahindi ya Ligi ya Sheria nchini Uingereza, ambayo ilifanikisha kukomeshwa kupitia mikutano ya hadhara iliyopangwa na ushawishi wa kiakili. Mbinu hii inaendana na maadili ya kiliberali ya ushindani, uhuru, na ukamilifu kupitia mijadala yenye mantiki badala ya nguvu.
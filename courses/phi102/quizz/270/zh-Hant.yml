question: 根據法國自由主義傳統，自由主義的社會轉型方法與革命方法有何基本特徵區別？
answer: 透過輿論動員和知識辯論逐步進行改革，而不是突然推翻體制
wrong_answers:
  - 透過議會聯盟和立法壓力，而非草根運動，直接採取政治行動
  - 透過策略性的市場干預來破壞經濟，而非意識形態上的對抗
  - 透過司法解釋而非全民投票程序修訂憲法
explanation: |
  文中強調，以托克维尔的分析為典範的法國自由主義傳統顯示，革命動盪代價高昂，而且往往無法達到改革目標，反而經常鞏固中央集权。較為可取的方法是透過輿論動員來進行改革，如科布登 (Cobden) 在英國的反玉米法聯盟 (Anti-Corn Law League) 運動，透過有組織的公眾集會和知識說服來實現廢法。這種方法符合自由主義的價值觀，即透過理性的辯論而非武力，達到競爭、自由與完善的目的。
question: Mikä peruspiirre erottaa liberaalin lähestymistavan yhteiskunnalliseen muutokseen vallankumouksellisista menetelmistä ranskalaisen liberaalin perinteen mukaisesti?
answer: Asteittainen uudistus yleisen mielipiteen mobilisoinnin ja älyllisen keskustelun avulla pikemminkin kuin äkillinen institutionaalinen kaataminen
wrong_answers:
  - Suora poliittinen toiminta parlamentaaristen koalitioiden ja lainsäädännöllisen painostuksen kautta ruohonjuuritason liikkeiden sijaan
  - Taloudelliset häiriöt pikemminkin strategisilla markkinainterventioilla kuin ideologisella vastakkainasettelulla
  - Perustuslain muuttaminen pikemminkin oikeudellisen tulkinnan kuin kansanäänestyksen kautta
explanation: |
  Tekstissä korostetaan, että Tocquevillen analyysin esimerkkinä oleva ranskalainen liberaali perinne osoittaa, että vallankumoukselliset mullistukset ovat kalliita eivätkä useinkaan saavuta muutostavoitteitaan, vaan ne vahvistavat usein keskitettyä valtaa. Suositeltavaan menetelmään kuuluu uudistaminen mielipiteiden mobilisoimisen avulla, kuten Cobdenin Anti-Corn Law League -kampanja Englannissa, jossa saavutettiin lakien lakkauttaminen järjestäytyneiden julkisten kokousten ja älyllisen suostuttelun avulla. Tämä lähestymistapa vastaa liberaaleja arvoja, joita ovat kilpailu, vapaus ja täydellistettävyys perustellun keskustelun eikä voimankäytön avulla.
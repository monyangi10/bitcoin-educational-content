question: Quelle caractéristique fondamentale distingue l'approche libérale de la transformation sociale des méthodes révolutionnaires selon la tradition libérale française ?
answer: Réforme progressive par la mobilisation de l'opinion publique et le débat intellectuel plutôt que par un renversement brutal des institutions
wrong_answers:
  - Action politique directe par le biais de coalitions parlementaires et de pressions législatives plutôt que par des mouvements de base
  - Perturbation économique par des interventions stratégiques sur le marché plutôt que par une confrontation idéologique
  - Modifications constitutionnelles par le biais d'une interprétation judiciaire plutôt que par le biais d'un référendum populaire
explanation: |
  Le texte souligne que la tradition libérale française, illustrée par l'analyse de Tocqueville, démontre que les bouleversements révolutionnaires sont coûteux et échouent souvent à atteindre leurs objectifs de transformation, ce qui a pour effet de consolider le pouvoir centralisé. La méthode préférée consiste à réformer en mobilisant l'opinion, comme l'illustre la campagne de l'Anti-Corn Law League de Cobden en Angleterre, qui a obtenu l'abolition grâce à l'organisation de réunions publiques et à la persuasion intellectuelle. Cette approche est conforme aux valeurs libérales de concurrence, de liberté et de perfectibilité par le biais d'un débat raisonné plutôt que par la force.
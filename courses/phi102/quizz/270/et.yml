question: Milline põhiline tunnusjoon eristab liberaalset lähenemist sotsiaalsetele muutustele Prantsuse liberaalse traditsiooni järgi revolutsioonilistest meetoditest?
answer: Järkjärguline reform avaliku arvamuse mobiliseerimise ja intellektuaalse arutelu kaudu, mitte aga institutsioonide ootamatu kukutamise kaudu
wrong_answers:
  - Otsene poliitiline tegevus pigem parlamendikoalitsioonide ja seadusandliku surve kui rohujuure tasandi liikumiste kaudu
  - Majanduse häirimine pigem strateegiliste turusekkumiste kui ideoloogilise vastasseisu kaudu
  - Põhiseaduse muutmine pigem kohtuliku tõlgendamise kui rahvahääletuse teel
explanation: |
  Tekstis rõhutatakse, et Tocqueville'i analüüsi näitel on Prantsuse liberaalne traditsioon näidanud, et revolutsioonilised vapustused on kulukad ja sageli ei saavuta nad oma ümberkujundavaid eesmärke, vaid kindlustavad sageli tsentraliseeritud võimu. Eelistatud meetod hõlmab reformimist arvamuste mobiliseerimise kaudu, nagu näitab Cobdeni Corn Law League'i vastane kampaania Inglismaal, mis saavutas kaotamise organiseeritud avalike koosolekute ja intellektuaalse veenmise abil. Selline lähenemisviis on kooskõlas liberaalsete väärtustega, milleks on konkurents, vabadus ja täiustatavus pigem põhjendatud arutelu kui jõu abil.
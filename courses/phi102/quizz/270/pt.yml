question: Que caraterística fundamental distingue a abordagem liberal da transformação social dos métodos revolucionários de acordo com a tradição liberal francesa?
answer: Reforma gradual através da mobilização da opinião pública e do debate intelectual, em vez de um súbito derrube institucional
wrong_answers:
  - Ação política direta através de coligações parlamentares e pressão legislativa, em vez de movimentos de base
  - Perturbação económica através de intervenções estratégicas no mercado em vez de confrontação ideológica
  - Alterações constitucionais através de interpretação judicial em vez de processos de referendo popular
explanation: |
  O texto sublinha que a tradição liberal francesa, exemplificada pela análise de Tocqueville, demonstra que as convulsões revolucionárias são dispendiosas e, muitas vezes, não conseguem atingir os seus objectivos transformadores, consolidando frequentemente o poder centralizado. O método preferido envolve a reforma através da mobilização da opinião, como ilustrado pela campanha da Liga Anti-Lei do Milho de Cobden em Inglaterra, que conseguiu a abolição através de reuniões públicas organizadas e persuasão intelectual. Esta abordagem alinha-se com os valores liberais de concorrência, liberdade e perfetibilidade através do debate fundamentado e não da força.
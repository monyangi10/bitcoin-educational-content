question: Karakteristik mendasar apa yang membedakan pendekatan liberal terhadap transformasi sosial dengan metode revolusioner menurut tradisi liberal Prancis?
answer: Reformasi bertahap melalui mobilisasi opini publik dan debat intelektual, bukan penggulingan kelembagaan secara tiba-tiba
wrong_answers:
  - Aksi politik langsung melalui koalisi parlemen dan tekanan legislatif daripada gerakan akar rumput
  - Disrupsi ekonomi melalui intervensi pasar strategis dan bukan konfrontasi ideologis
  - Amandemen konstitusi melalui penafsiran yudisial dan bukan melalui proses referendum rakyat
explanation: |
  Teks ini menekankan bahwa tradisi liberal Prancis, yang dicontohkan oleh analisis Tocqueville, menunjukkan bahwa pergolakan revolusioner sangat mahal dan sering kali gagal mencapai tujuan transformatifnya, dan justru mengukuhkan kekuasaan yang terpusat. Metode yang lebih disukai adalah reformasi melalui mobilisasi opini, seperti yang diilustrasikan oleh kampanye Anti-Corn Law League Cobden di Inggris, yang berhasil mencapai penghapusan melalui pertemuan publik yang terorganisir dan persuasi intelektual. Pendekatan ini sejalan dengan nilai-nilai liberal tentang kompetisi, kebebasan, dan kesempurnaan melalui debat yang beralasan dan bukan dengan paksaan.
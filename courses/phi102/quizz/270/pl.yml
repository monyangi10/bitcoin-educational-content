question: Jaka podstawowa cecha odróżnia liberalne podejście do transformacji społecznej od metod rewolucyjnych zgodnie z francuską tradycją liberalną?
answer: Stopniowa reforma poprzez mobilizację opinii publicznej i debatę intelektualną zamiast nagłego obalenia instytucji
wrong_answers:
  - Bezpośrednie działania polityczne poprzez koalicje parlamentarne i naciski legislacyjne zamiast ruchów oddolnych
  - Zakłócenia gospodarcze poprzez strategiczne interwencje rynkowe zamiast konfrontacji ideologicznej
  - Poprawki do konstytucji w drodze interpretacji sądowej, a nie powszechnego referendum
explanation: |
  Tekst podkreśla, że francuska tradycja liberalna, której przykładem jest analiza Tocqueville'a, pokazuje, że przewroty rewolucyjne są kosztowne i często nie osiągają swoich celów transformacyjnych, często konsolidując scentralizowaną władzę. Preferowana metoda polega na reformowaniu poprzez mobilizację opinii publicznej, co ilustruje kampania Cobden's Anti-Corn Law League w Anglii, która osiągnęła abolicję poprzez zorganizowane spotkania publiczne i perswazję intelektualną. Podejście to jest zgodne z liberalnymi wartościami konkurencji, wolności i doskonałości poprzez uzasadnioną debatę, a nie siłę.
question: Vilken grundläggande egenskap skiljer det liberala synsättet på samhällsomvandling från revolutionära metoder enligt den franska liberala traditionen?
answer: Gradvis reform genom mobilisering av den allmänna opinionen och intellektuell debatt snarare än plötslig institutionell omvälvning
wrong_answers:
  - Direkt politisk handling genom parlamentariska koalitioner och påtryckningar på lagstiftare snarare än gräsrotsrörelser
  - Ekonomisk störning genom strategiska marknadsinterventioner snarare än ideologisk konfrontation
  - Konstitutionella ändringar genom rättslig tolkning snarare än genom folkomröstning
explanation: |
  Texten betonar att den franska liberala traditionen, exemplifierad av Tocquevilles analys, visar att revolutionära omvälvningar är kostsamma och ofta misslyckas med att uppnå sina transformativa mål, vilket ofta konsoliderar centraliserad makt istället. Den föredragna metoden innebär reformer genom opinionsmobilisering, vilket illustreras av Cobdens Anti-Corn Law League-kampanj i England, som uppnådde avskaffande genom organiserade offentliga möten och intellektuell övertalning. Detta tillvägagångssätt ligger i linje med liberala värderingar om konkurrens, frihet och perfektibilitet genom resonerande debatt snarare än våld.
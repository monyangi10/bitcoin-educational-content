question: کدام اصل اساسی اقتصادی توضیح می‌دهد که چرا قراردادهای داوطلبانه باعث غنای متقابل می‌شوند و نه رقابت صفر-جمع بین طرفین؟
answer: هر طرف مزیت بیشتری در شرکت کردن نسبت به خودداری کردن پیدا می‌کند، و این باعث می‌شود قراردادها به بازی‌های با مجموع مثبت تبدیل شوند که در آن هر دو طرف سود می‌برند.
wrong_answers:
  - قراردادها از طریق مصالحه‌های مذاکره‌شده که عدم تعادل قدرت را متعادل می‌کنند، ثروت را از طرف‌های قوی‌تر به طرف‌های ضعیف‌تر توزیع مجدد می‌کنند.
  - مقررات دولتی شرایط منصفانه‌ای را تضمین می‌کند که از استثمار جلوگیری کرده و برابری مصنوعی بین طرف‌های قرارداد ایجاد می‌کند.
  - رقابت بازار، طرفین را مجبور می‌کند تا برای کسب مزایای در معاملات آینده، زیان‌هایی را در برخی قراردادها بپذیرند.
explanation: |
  متن تأکید می‌کند که قراردادهای داوطلبانه نشان‌دهنده بازی‌های مجموع مثبت هستند که در آن هر فرد از عمل کردن به جای خودداری رضایت می‌یابد. این امر به این دلیل رخ می‌دهد که قراردادها همیشه گزینه‌های انتخابی در میان جایگزین‌ها هستند - مردم تنها زمانی قرارداد می‌بندند که در معامله مزیتی را درک کنند. این اصل، مبادله داوطلبانه را از توزیع اجباری، بازارهای تنظیم‌شده یا سناریوهای از دست دادن رقابتی متمایز می‌کند، زیرا بر اساس منفعت متقابل است نه مداخله خارجی یا فداکاری استراتژیک.
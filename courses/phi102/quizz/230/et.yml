question: Milline majanduslik aluspõhimõte selgitab, miks vabatahtlikud lepingud tekitavad poolte vahel vastastikuse rikastumise, mitte nullsumma konkurentsi?
answer: Kumbki osapool leiab, et osalemine on kasulikum kui mitteosalemine, mistõttu lepingud on positiivse summaga mängud, kus mõlemad pooled saavad kasu
wrong_answers:
  - Lepingud jaotavad jõukust ümber tugevamatelt osapooltelt nõrgematele osapooltele kompromisside kaudu, mis tasakaalustavad võimude tasakaalustamatust
  - Riiklik reguleerimine tagab õiglased tingimused, mis takistavad ärakasutamist, luues lepinguosaliste vahel kunstliku võrdsuse
  - Turukonkurents sunnib osapooled võtma kahjusid mõnes lepingus, et saada eeliseid tulevastes tehingutes
explanation: |
  Tekstis rõhutatakse, et vabatahtlikud lepingud kujutavad endast positiivse summaga mänge, kus iga üksikisik leiab rahuldust pigem tegutsemisest kui hoidumisest. See juhtub seetõttu, et lepingud on alati valitud valikuvõimalused alternatiivide hulgast - inimesed sõlmivad lepinguid ainult siis, kui nad näevad tehingus kasu. See põhimõte eristab vabatahtlikku vahetust sunniviisilisest ümberjagamisest, reguleeritud turgudest või konkurentsikahjude stsenaariumidest, sest see põhineb pigem vastastikusel kasul kui välisel sekkumisel või strateegilisel ohverdamisel.
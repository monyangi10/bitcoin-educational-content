question: Quel principe économique fondamental explique que les contrats volontaires créent un enrichissement mutuel plutôt qu'une concurrence à somme nulle entre les parties ?
answer: Chaque partie trouve plus d'avantages à participer qu'à s'abstenir, ce qui fait des contrats des jeux à somme positive où les deux parties sont gagnantes
wrong_answers:
  - Les contrats redistribuent les richesses des parties les plus fortes vers les parties les plus faibles par le biais de compromis négociés qui équilibrent les déséquilibres de pouvoir
  - La réglementation gouvernementale garantit des conditions équitables qui empêchent l'exploitation, créant ainsi une égalité artificielle entre les parties contractantes
  - La concurrence sur le marché oblige les parties à accepter des pertes dans certains contrats pour obtenir des avantages dans des transactions futures
explanation: |
  Le texte souligne que les contrats volontaires représentent des jeux à somme positive où chaque individu trouve satisfaction à agir plutôt qu'à s'abstenir. Cela s'explique par le fait que les contrats sont toujours des options choisies parmi d'autres - les gens ne contractent que lorsqu'ils perçoivent un avantage dans la transaction. Ce principe distingue l'échange volontaire de la redistribution coercitive, des marchés réglementés ou des scénarios de perte compétitive, car il est basé sur le bénéfice mutuel plutôt que sur l'intervention extérieure ou le sacrifice stratégique.
question: Quale principio economico fondamentale spiega perché i contratti volontari creano un arricchimento reciproco piuttosto che una competizione a somma zero tra le parti?
answer: Ciascuna parte trova un vantaggio maggiore nel partecipare che nell'astenersi, rendendo i contratti dei giochi a somma positiva in cui entrambe le parti traggono vantaggio
wrong_answers:
  - I contratti ridistribuiscono la ricchezza dalle parti più forti a quelle più deboli attraverso compromessi negoziati che bilanciano gli squilibri di potere
  - La regolamentazione governativa garantisce condizioni eque che impediscono lo sfruttamento, creando un'uguaglianza artificiale tra le parti contraenti
  - La concorrenza di mercato costringe le parti ad accettare perdite in alcuni contratti per ottenere vantaggi in transazioni future
explanation: |
  Il testo sottolinea che i contratti volontari rappresentano giochi a somma positiva in cui ogni individuo trova soddisfazione nell'agire piuttosto che nell'astenersi. Questo avviene perché i contratti sono sempre opzioni scelte tra alternative: le persone contraggono solo quando percepiscono un vantaggio nella transazione. Questo principio distingue lo scambio volontario dalla redistribuzione coercitiva, dai mercati regolamentati o dagli scenari di perdita competitiva, poiché si basa sul vantaggio reciproco piuttosto che sull'intervento esterno o sul sacrificio strategico.
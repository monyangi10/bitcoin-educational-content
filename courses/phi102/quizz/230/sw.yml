question: Ni kanuni gani ya msingi ya kiuchumi inayoelezea kwa nini mikataba ya hiari huunda utajiri wa pande zote badala ya ushindani wa sifuri kati ya pande?
answer: Kila upande hupata faida kubwa zaidi katika kushiriki kuliko kuacha, na kufanya mikataba ya michezo ya jumla ambapo pande zote mbili zinanufaika.
wrong_answers:
  - Mikataba hugawanya utajiri kutoka kwa pande zenye nguvu zaidi hadi dhaifu kupitia makubaliano yaliyojadiliwa ambayo yanasawazisha usawa wa madaraka
  - Kanuni za serikali zinahakikisha masharti ya haki yanayozuia unyonyaji, na kuunda usawa bandia kati ya pande zinazohusika katika mikataba
  - Ushindani wa soko hulazimisha pande kukubali hasara katika baadhi ya mikataba ili kupata faida katika miamala ya baadaye
explanation: |
  Maandishi yanasisitiza kwamba mikataba ya hiari inawakilisha michezo chanya ya jumla ambapo kila mtu hupata kuridhika katika kutenda badala ya kujizuia. Hii hutokea kwa sababu mikataba huwa chaguo zilizochaguliwa miongoni mwa njia mbadala - watu huingia mkataba tu wanapoona faida katika muamala. Kanuni hii inatofautisha ubadilishanaji wa hiari na ugawaji upya wa kulazimishwa, masoko yanayodhibitiwa, au hali za ushindani wa hasara, kwani inategemea faida ya pande zote badala ya uingiliaji kati wa nje au kujitolea kimkakati.
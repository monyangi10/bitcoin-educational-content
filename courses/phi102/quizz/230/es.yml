question: ¿Qué principio económico fundamental explica por qué los contratos voluntarios crean un enriquecimiento mutuo en lugar de una competencia de suma cero entre las partes?
answer: Cada parte encuentra más ventajas en participar que en abstenerse, lo que hace que los contratos sean juegos de suma positiva en los que ambas partes salen beneficiadas
wrong_answers:
  - Los contratos redistribuyen la riqueza de las partes más fuertes a las más débiles mediante compromisos negociados que equilibran los desequilibrios de poder
  - La regulación gubernamental garantiza unas condiciones justas que impiden la explotación, creando una igualdad artificial entre las partes contratantes
  - La competencia en el mercado obliga a las partes a aceptar pérdidas en algunos contratos para obtener ventajas en futuras transacciones
explanation: |
  El texto subraya que los contratos voluntarios representan juegos de suma positiva en los que cada individuo encuentra satisfacción actuando en lugar de absteniéndose. Esto ocurre porque los contratos son siempre opciones elegidas entre alternativas: las personas sólo contratan cuando perciben ventajas en la transacción. Este principio distingue el intercambio voluntario de la redistribución coercitiva, los mercados regulados o los escenarios de pérdidas competitivas, ya que se basa en el beneficio mutuo y no en la intervención externa o el sacrificio estratégico.
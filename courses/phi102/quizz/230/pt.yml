question: Que princípio económico fundamental explica por que razão os contratos voluntários geram um enriquecimento mútuo em vez de uma concorrência de soma zero entre as partes?
answer: Cada parte tem mais vantagens em participar do que em abster-se, o que faz com que os contratos sejam jogos de soma positiva em que ambas as partes beneficiam
wrong_answers:
  - Os contratos redistribuem a riqueza das partes mais fortes para as mais fracas através de compromissos negociados que equilibram os desequilíbrios de poder
  - A regulamentação governamental garante condições justas que impedem a exploração, criando uma igualdade artificial entre as partes contratantes
  - A concorrência no mercado obriga as partes a aceitarem perdas em alguns contratos para obterem vantagens em transacções futuras
explanation: |
  O texto sublinha que os contratos voluntários representam jogos de soma positiva em que cada indivíduo encontra satisfação em agir em vez de se abster. Isto acontece porque os contratos são sempre opções escolhidas entre alternativas - as pessoas só contratam quando percebem vantagens na transação. Este princípio distingue a troca voluntária da redistribuição coerciva, dos mercados regulados ou dos cenários de perda competitiva, uma vez que se baseia no benefício mútuo e não na intervenção externa ou no sacrifício estratégico.
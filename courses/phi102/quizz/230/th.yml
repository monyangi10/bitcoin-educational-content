question: หลักเศรษฐศาสตร์พื้นฐานใดที่อธิบายว่าทำไมสัญญาโดยสมัครใจจึงสร้างความมั่งคั่งร่วมกันแทนที่จะแข่งขันแบบผลรวมศูนย์ระหว่างคู่สัญญา?
answer: แต่ละฝ่ายพบว่ามีข้อได้เปรียบมากขึ้นในการเข้าร่วมมากกว่าการงดเว้น ทำให้สัญญาเป็นเกมผลรวมบวกที่ทั้งสองฝ่ายได้รับประโยชน์
wrong_answers:
  - สัญญาทำให้เกิดการกระจายความมั่งคั่งจากฝ่ายที่แข็งแกร่งกว่าไปยังฝ่ายที่อ่อนแอกว่าผ่านการประนีประนอมที่เจรจาต่อรองซึ่งสร้างความสมดุลในความไม่สมดุลของอำนาจ
  - กฎระเบียบของรัฐบาลรับประกันเงื่อนไขที่เป็นธรรมเพื่อป้องกันการแสวงหาประโยชน์ สร้างความเท่าเทียมกันเทียมระหว่างคู่สัญญา
  - การแข่งขันในตลาดบังคับให้ฝ่ายต่าง ๆ ยอมรับการขาดทุนในบางสัญญาเพื่อให้ได้เปรียบในธุรกรรมในอนาคต
explanation: |
  ข้อความนี้เน้นย้ำว่าสัญญาโดยสมัครใจแสดงถึงเกมที่มีผลรวมเป็นบวกซึ่งแต่ละบุคคลพบความพึงพอใจในการกระทำมากกว่าการละเว้น สิ่งนี้เกิดขึ้นเพราะสัญญาเป็นตัวเลือกที่เลือกเสมอในบรรดาทางเลือกอื่น ๆ - ผู้คนทำสัญญาเฉพาะเมื่อพวกเขามองเห็นประโยชน์ในธุรกรรม หลักการนี้แยกการแลกเปลี่ยนโดยสมัครใจออกจากการกระจายซ้ำที่บังคับ ตลาดที่มีการควบคุม หรือสถานการณ์การสูญเสียการแข่งขัน เนื่องจากมันขึ้นอยู่กับผลประโยชน์ร่วมกันมากกว่าการแทรกแซงจากภายนอกหรือการเสียสละเชิงกลยุทธ์
question: Gönüllü sözleşmelerin neden taraflar arasında sıfır toplamlı rekabet yerine karşılıklı zenginleşme yarattığını açıklayan temel ekonomik ilke hangisidir?
answer: Her iki taraf da katılmaktan çekimser kalmaya kıyasla daha fazla avantaj elde ederek sözleşmeleri her iki tarafın da fayda sağladığı pozitif toplamlı oyunlar haline getirir
wrong_answers:
  - Sözleşmeler, güç dengesizliklerini dengeleyen müzakere edilmiş uzlaşmalar yoluyla zenginliği daha güçlü taraflardan daha zayıf taraflara yeniden dağıtır
  - Hükümet düzenlemesi, sömürüyü önleyen adil şartlar sağlar ve sözleşme tarafları arasında yapay eşitlik yaratır
  - Piyasa rekabeti, tarafları gelecekteki işlemlerde avantaj elde etmek için bazı sözleşmelerde kayıpları kabul etmeye zorlar
explanation: |
  Metin, gönüllü sözleşmelerin, her bir bireyin çekimser kalmak yerine hareket etmekten memnuniyet duyduğu pozitif toplamlı oyunları temsil ettiğini vurgulamaktadır. Bunun nedeni, sözleşmelerin her zaman alternatifler arasından seçilen seçenekler olmasıdır - insanlar yalnızca işlemde avantaj algıladıklarında sözleşme yaparlar. Bu ilke, gönüllü mübadeleyi zorlayıcı yeniden dağıtımdan, düzenlenmiş piyasalardan veya rekabetçi kayıp senaryolarından ayırır, çünkü dış müdahale veya stratejik fedakarlık yerine karşılıklı faydaya dayanır.
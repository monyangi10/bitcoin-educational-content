question: Jaka podstawowa zasada ekonomiczna wyjaśnia, dlaczego dobrowolne umowy prowadzą do wzajemnego wzbogacania się, a nie do konkurencji między stronami o sumie zerowej?
answer: Każda ze stron znajduje większą korzyść w uczestnictwie niż wstrzymaniu się od głosu, co sprawia, że kontrakty są grami o sumie dodatniej, w których obie strony odnoszą korzyści
wrong_answers:
  - Umowy redystrybuują bogactwo od silniejszych do słabszych stron poprzez wynegocjowane kompromisy, które równoważą nierównowagę sił
  - Regulacje rządowe zapewniają uczciwe warunki, które zapobiegają wyzyskowi, tworząc sztuczną równość między stronami umowy
  - Konkurencja rynkowa zmusza strony do zaakceptowania strat w niektórych umowach w celu uzyskania korzyści w przyszłych transakcjach
explanation: |
  Tekst podkreśla, że dobrowolne umowy reprezentują gry o sumie dodatniej, w których każda osoba znajduje satysfakcję w działaniu, a nie w powstrzymywaniu się od działania. Dzieje się tak, ponieważ umowy są zawsze wybieranymi opcjami spośród alternatyw - ludzie zawierają umowy tylko wtedy, gdy dostrzegają korzyść z transakcji. Zasada ta odróżnia dobrowolną wymianę od przymusowej redystrybucji, regulowanych rynków lub konkurencyjnych scenariuszy strat, ponieważ opiera się na wzajemnych korzyściach, a nie na zewnętrznej interwencji lub strategicznym poświęceniu.
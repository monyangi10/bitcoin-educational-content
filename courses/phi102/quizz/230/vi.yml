question: Nguyên tắc kinh tế cơ bản nào giải thích tại sao các hợp đồng tự nguyện tạo ra sự làm giàu lẫn nhau thay vì cạnh tranh theo kiểu "được ăn cả, thua mất tất cả" giữa các bên?
answer: Mỗi bên đều nhận thấy việc tham gia có lợi hơn so với việc không tham gia, biến các hợp đồng thành những trò chơi có lợi cho cả hai bên.
wrong_answers:
  - Các hợp đồng phân phối lại của cải từ các bên mạnh hơn sang các bên yếu hơn thông qua các thỏa hiệp được đàm phán nhằm cân bằng sự chênh lệch quyền lực.
  - Quy định của chính phủ đảm bảo các điều khoản công bằng, ngăn ngừa sự bóc lột, tạo ra sự bình đẳng giả tạo giữa các bên ký kết hợp đồng.
  - Cạnh tranh thị trường buộc các bên phải chấp nhận thua lỗ trong một số hợp đồng để giành lợi thế trong các giao dịch tương lai.
explanation: |
  Văn bản nhấn mạnh rằng các hợp đồng tự nguyện đại diện cho các trò chơi có tổng lợi ích dương, trong đó mỗi cá nhân đều tìm thấy sự thỏa mãn khi hành động hơn là khi không hành động. Điều này xảy ra bởi vì các hợp đồng luôn là những lựa chọn được cân nhắc giữa các phương án thay thế - mọi người chỉ ký kết hợp đồng khi họ nhận thấy lợi ích trong giao dịch. Nguyên tắc này phân biệt trao đổi tự nguyện với phân phối lại cưỡng bức, thị trường được điều tiết hoặc các kịch bản thua lỗ cạnh tranh, vì nó dựa trên lợi ích chung chứ không phải sự can thiệp từ bên ngoài hoặc sự hy sinh chiến lược.
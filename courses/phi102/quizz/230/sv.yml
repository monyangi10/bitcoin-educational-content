question: Vilken grundläggande ekonomisk princip förklarar varför frivilliga avtal skapar ömsesidigt berikande snarare än nollsummespel mellan parterna?
answer: Varje part har större fördel av att delta än att avstå från att delta, vilket gör kontrakten till plussummespel där båda sidor gynnas
wrong_answers:
  - Kontrakt omfördelar välstånd från starkare till svagare parter genom förhandlade kompromisser som balanserar maktobalanser
  - Statlig reglering säkerställer rättvisa villkor som förhindrar exploatering och skapar artificiell jämlikhet mellan avtalsparterna
  - Marknadskonkurrensen tvingar parterna att acceptera förluster i vissa kontrakt för att vinna fördelar i framtida transaktioner
explanation: |
  I texten betonas att frivilliga avtal utgör spel med positiv summa där varje individ finner tillfredsställelse i att agera snarare än att avstå. Detta beror på att avtal alltid är ett val bland andra alternativ - människor ingår bara avtal när de ser en fördel med transaktionen. Denna princip skiljer frivilligt utbyte från tvångsmässig omfördelning, reglerade marknader eller förlustscenarier i konkurrens, eftersom det bygger på ömsesidig nytta snarare än extern intervention eller strategiska uppoffringar.
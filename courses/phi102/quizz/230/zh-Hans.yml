question: 是什么基本经济原则解释了为什么自愿合同会在各方之间创造互利而非零和竞争？
answer: 每一方都会发现参与比弃权更有利，这使得合同成为正和博弈，双方都能从中受益
wrong_answers:
  - 通过谈判达成妥协，平衡权力失衡，合同将财富从强势方重新分配给弱势方
  - 政府监管确保公平条款，防止剥削，在合同双方之间创造人为的平等
  - 市场竞争迫使各方在某些合同中接受损失，以便在未来的交易中获得优势
explanation: |
  文中强调，自愿契约代表着正和博弈，每个人都能从行动中找到满足感，而不是弃权。这是因为契约总是在备选方案中的选择--人们只有在认为交易有利时才会签订契约。这一原则将自愿交换与强制再分配、管制市场或竞争性亏损情况区分开来，因为自愿交换的基础是互惠互利，而不是外部干预或战略牺牲。
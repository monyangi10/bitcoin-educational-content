question: Welches grundlegende wirtschaftliche Prinzip erklärt, warum freiwillige Verträge zu gegenseitiger Bereicherung und nicht zu einem Nullsummenwettbewerb zwischen den Parteien führen?
answer: Jede Partei hat einen größeren Vorteil, wenn sie teilnimmt, als wenn sie sich der Stimme enthält, wodurch Verträge zu einem Positivsummenspiel werden, von dem beide Seiten profitieren
wrong_answers:
  - Verträge führen zu einer Umverteilung des Wohlstands von stärkeren zu schwächeren Parteien durch ausgehandelte Kompromisse, die Machtungleichgewichte ausgleichen
  - Die staatliche Regulierung sorgt für faire Bedingungen, die eine Ausbeutung verhindern und eine künstliche Gleichheit zwischen den Vertragspartnern schaffen
  - Der Wettbewerb auf dem Markt zwingt die Parteien dazu, bei einigen Verträgen Verluste in Kauf zu nehmen, um bei künftigen Geschäften Vorteile zu erzielen
explanation: |
  Der Text hebt hervor, dass freiwillige Verträge ein Positivsummenspiel darstellen, bei dem jeder Einzelne durch sein Handeln eine Befriedigung erfährt, anstatt sich zu enthalten. Dies ist der Fall, weil Verträge immer eine Wahlmöglichkeit unter Alternativen darstellen - Menschen schließen nur dann einen Vertrag, wenn sie einen Vorteil in der Transaktion sehen. Dieser Grundsatz unterscheidet den freiwilligen Austausch von erzwungener Umverteilung, regulierten Märkten oder wettbewerbsbedingten Verlustszenarien, da er auf gegenseitigem Nutzen und nicht auf externen Eingriffen oder strategischen Opfern beruht.
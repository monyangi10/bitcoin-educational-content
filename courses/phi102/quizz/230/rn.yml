question: Ni ingingo ngenderwako iyihe y’ishimikiro y’ubutunzi isigura igituma amasezerano y’ubushake atuma abantu bagira ubutunzi aho gutuma haba uguhiganwa kw’amahera ataco amaze hagati y’abagiranye amasezerano?
answer: Buri ruhande ruronka inyungu nyinshi mu kugira uruhara kuruta kwirinda, ivyo bikaba bituma amasezerano aba imikino y’amahera meza aho impande zompi zironka inyungu .
wrong_answers:
  - Amasezerano asubira gusangira ubutunzi kuva ku mpande zikomeye gushika ku mpande zigoyagoya biciye mu gusenyera ku mugozi umwe bihuza ubusumbasumbane bw'ububasha .
  - Amategeko ya Leta aratuma habaho amasezerano abereye abuza abantu gukoresha nabi, agatuma haba uburinganire bw’ubuhinga hagati y’abagiranye amasezerano
  - Amahiganwa yo mw’isoko atuma abagira amasezerano bemera guhomba mu masezerano amwamwe kugira ngo baronke inyungu mu bikorwa vyo muri kazoza .
explanation: |
  Ico canditswe gishimika ku vy’uko amasezerano y’ubushake agereranya imikino y’amahera meza aho umuntu wese aronka ukunyurwa mu gukora aho kwirinda. Ivyo bishika kubera ko amasezerano yama ari uburyo bwo guhitamwo mu bundi buryo - abantu bagira amasezerano gusa iyo babonye akamaro mu gucuruza. Iryo hame ritandukanya uguhinduranya ku bushake n’ugusubira gusangira ku nguvu, amasoko ategekanijwe, canke ibintu bishobora gutuma umuntu atakaza, kuko bishingiye ku nyungu z’abantu bose aho gushingira ku gufasha hanze canke gutanga ingamba.
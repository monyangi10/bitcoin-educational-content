question: Prinsip ekonomi dasar apa yang menjelaskan mengapa kontrak sukarela menciptakan saling memperkaya dan bukannya kompetisi zero-sum antara para pihak?
answer: Setiap pihak mendapatkan keuntungan yang lebih besar dengan berpartisipasi daripada tidak berpartisipasi, membuat kontrak menjadi permainan jumlah positif di mana kedua belah pihak mendapatkan keuntungan
wrong_answers:
  - Kontrak mendistribusikan kembali kekayaan dari pihak yang lebih kuat ke pihak yang lebih lemah melalui kompromi yang dinegosiasikan yang menyeimbangkan ketidakseimbangan kekuatan
  - Peraturan pemerintah memastikan persyaratan yang adil yang mencegah eksploitasi, menciptakan kesetaraan artifisial antara pihak-pihak yang berkontrak
  - Persaingan pasar memaksa para pihak untuk menerima kerugian dalam beberapa kontrak untuk mendapatkan keuntungan dalam transaksi di masa depan
explanation: |
  Teks tersebut menekankan bahwa kontrak sukarela mewakili permainan jumlah positif di mana setiap individu menemukan kepuasan dalam bertindak daripada tidak bertindak. Hal ini terjadi karena kontrak selalu merupakan pilihan yang dipilih di antara berbagai alternatif - orang hanya melakukan kontrak ketika mereka melihat adanya keuntungan dalam transaksi tersebut. Prinsip ini membedakan pertukaran sukarela dari redistribusi paksaan, pasar yang diatur, atau skenario kerugian kompetitif, karena pertukaran sukarela didasarkan pada keuntungan bersama, bukan pada intervensi eksternal atau pengorbanan strategis.
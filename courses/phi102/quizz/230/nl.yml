question: Welk fundamenteel economisch principe verklaart waarom vrijwillige contracten wederzijdse verrijking creëren in plaats van nulsomconcurrentie tussen partijen?
answer: Elke partij vindt een groter voordeel in deelname dan in onthouding, waardoor contracten positieve-somspellen worden waarbij beide partijen profiteren
wrong_answers:
  - Contracten herverdelen rijkdom van sterkere naar zwakkere partijen via onderhandelde compromissen die machtsonevenwichten in evenwicht brengen
  - Overheidsregulering zorgt voor eerlijke voorwaarden die uitbuiting voorkomen, waardoor kunstmatige gelijkheid tussen contractpartijen ontstaat
  - Concurrentie op de markt dwingt partijen om verliezen te accepteren in sommige contracten om voordelen te behalen in toekomstige transacties
explanation: |
  De tekst benadrukt dat vrijwillige contracten positieve-somspellen zijn waarbij elk individu voldoening vindt in handelen in plaats van zich te onthouden. Dit gebeurt omdat contracten altijd gekozen opties zijn uit alternatieven - mensen sluiten alleen contracten wanneer ze voordeel zien in de transactie. Dit principe onderscheidt vrijwillige uitwisseling van gedwongen herverdeling, gereguleerde markten of concurrerende verliesscenario's, omdat het gebaseerd is op wederzijds voordeel in plaats van externe interventie of strategische opoffering.
question: Кой основен икономически принцип обяснява защо доброволните договори водят до взаимно обогатяване, а не до конкуренция с нулева сума между страните?
answer: Всяка страна намира по-голяма полза от участието си, отколкото от въздържането си, което прави договорите игри с положителна сума, при които и двете страни печелят
wrong_answers:
  - Договорите преразпределят богатството от по-силните към по-слабите страни чрез договорени компромиси, които балансират дисбаланса на силите
  - Правителственото регулиране гарантира справедливи условия, които предотвратяват експлоатацията и създават изкуствено равенство между договарящите се страни
  - Пазарната конкуренция принуждава страните да приемат загуби при някои договори, за да получат предимства при бъдещи сделки
explanation: |
  В текста се подчертава, че доброволните договори представляват игри с положителна сума, при които всеки индивид намира удовлетворение от това, че действа, вместо да се въздържа. Това се случва, защото договорите винаги са избрани варианти сред алтернативи - хората сключват договори само когато виждат предимство в сделката. Този принцип отличава доброволната размяна от принудителното преразпределение, регулираните пазари или сценариите на конкурентни загуби, тъй като се основава на взаимната изгода, а не на външна намеса или стратегическа жертва.
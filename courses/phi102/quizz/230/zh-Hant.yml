question: 什麼基本的經濟原則可以解釋為什麼自願契約會創造雙方的互惠互利，而不是雙方之間的零和競爭？
answer: 與棄權相比，每一方都能在參與時獲得更大的優勢，這使得合約成為正和博弈，雙方都能受益。
wrong_answers:
  - 合約透過協商妥協，平衡力量不平衡，將財富從較強的一方重新分配給較弱的一方
  - 政府監管確保公平條款，防止剝削，在合約雙方之間創造人為的平等
  - 市場競爭迫使當事人在某些合約中接受損失，以在未來的交易中取得優勢
explanation: |
  文中強調，自願契約代表正和博弈，每個人都能從行動中找到滿足感，而不是棄權。之所以會發生這種情況，是因為契約永遠都是在不同選擇中的選擇 - 人們只有在認為交易有利時，才會簽訂契約。這個原則使自願交換有別於強制性的再分配、受管制的市場或競爭性的虧損情況，因為它是基於互惠互利，而非外部干預或策略性的犧牲。
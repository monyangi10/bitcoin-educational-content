question: Какой фундаментальный экономический принцип объясняет, почему добровольные контракты приводят к взаимному обогащению, а не к конкуренции с нулевой суммой между сторонами?
answer: Каждая сторона находит больше преимуществ в участии, чем в воздержании, что делает контракты играми с положительной суммой, в которых обе стороны получают выгоду
wrong_answers:
  - Контракты перераспределяют богатство от более сильных сторон к более слабым путем достижения компромиссов на основе переговоров, которые уравновешивают дисбаланс сил
  - Государственное регулирование обеспечивает справедливые условия, предотвращающие эксплуатацию, создавая искусственное равенство между контрагентами
  - Рыночная конкуренция заставляет стороны идти на убытки по некоторым контрактам, чтобы получить преимущества в будущих сделках
explanation: |
  В тексте подчеркивается, что добровольные контракты представляют собой игры с положительной суммой, в которых каждый человек получает удовлетворение от того, что действует, а не воздерживается. Это происходит потому, что контракты всегда являются выбором среди альтернатив - люди заключают контракты только тогда, когда они видят выгоду в сделке. Этот принцип отличает добровольный обмен от принудительного перераспределения, регулируемых рынков или сценариев конкурентных потерь, поскольку он основан на взаимной выгоде, а не на вмешательстве извне или стратегическом самопожертвовании.
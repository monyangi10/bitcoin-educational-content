question: Mikä taloudellinen perusperiaate selittää, miksi vapaaehtoiset sopimukset luovat osapuolten välille keskinäistä rikastumista nollasummakilpailun sijasta?
answer: Kumpikin osapuoli hyötyy enemmän osallistumisesta kuin pidättäytymisestä, jolloin sopimukset ovat positiivisen summan pelejä, joissa molemmat osapuolet hyötyvät
wrong_answers:
  - Sopimukset jakavat vaurautta vahvemmilta osapuolilta heikommille neuvottelemalla kompromisseja, jotka tasapainottavat vallan epätasapainoa
  - Valtion sääntelyllä varmistetaan oikeudenmukaiset ehdot, jotka estävät hyväksikäytön ja luovat keinotekoisen tasa-arvon sopimuspuolten välille
  - Markkinakilpailu pakottaa osapuolet hyväksymään tappioita joissakin sopimuksissa saadakseen etuja tulevissa liiketoimissa
explanation: |
  Tekstissä korostetaan, että vapaaehtoiset sopimukset ovat positiivisen summan pelejä, joissa kukin yksilö saa tyydytystä toimimalla mieluummin kuin pidättäytymällä. Tämä johtuu siitä, että sopimukset ovat aina valittuja vaihtoehtoja vaihtoehtojen joukosta - ihmiset tekevät sopimuksia vain silloin, kun he näkevät transaktiosta olevan etua. Tämä periaate erottaa vapaaehtoisen vaihdon pakottavasta uudelleenjaosta, säännellyistä markkinoista tai kilpailullisista tappioskenaarioista, sillä se perustuu pikemminkin molemminpuoliseen hyötyyn kuin ulkoiseen väliintuloon tai strategiseen uhrautumiseen.
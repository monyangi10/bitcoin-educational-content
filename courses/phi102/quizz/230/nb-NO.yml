question: Hvilket grunnleggende økonomisk prinsipp forklarer hvorfor frivillige kontrakter skaper gjensidig berikelse snarere enn nullsumkonkurranse mellom partene?
answer: Hver av partene har større fordel av å delta enn av å avstå fra å delta, noe som gjør kontrakter til pluss-sum-spill der begge parter tjener på det
wrong_answers:
  - Kontrakter omfordeler rikdom fra sterkere til svakere parter gjennom fremforhandlede kompromisser som balanserer maktubalansen
  - Statlig regulering sikrer rettferdige vilkår som forhindrer utnyttelse, og skaper kunstig likhet mellom kontraktspartene
  - Markedskonkurransen tvinger partene til å akseptere tap i enkelte kontrakter for å oppnå fordeler i fremtidige transaksjoner
explanation: |
  Teksten understreker at frivillige kontrakter representerer pluss-sum-spill der hver enkelt finner tilfredsstillelse i å handle fremfor å avstå. Dette skjer fordi kontrakter alltid er et valg mellom alternativer - folk inngår bare kontrakter når de ser en fordel i transaksjonen. Dette prinsippet skiller frivillig utveksling fra tvungen omfordeling, regulerte markeder eller tapskonkurransescenarioer, ettersom det er basert på gjensidig nytte snarere enn ekstern inngripen eller strategisk oppofrelse.
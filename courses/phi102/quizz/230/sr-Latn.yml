question: Koji fundamentalni ekonomski princip objašnjava zašto dobrovoljni ugovori stvaraju međusobno obogaćivanje, a ne igru nulte sume između strana?
answer: Svaka strana pronalazi veću prednost u učestvovanju nego u uzdržavanju, čineći ugovore igrama sa pozitivnim zbirom gde obe strane imaju koristi.
wrong_answers:
  - Ugovori preraspodeljuju bogatstvo sa jačih na slabije strane kroz pregovaračke kompromise koji balansiraju neravnoteže moći
  - Vladina regulativa osigurava fer uslove koji sprečavaju eksploataciju, stvarajući veštačku jednakost između ugovornih strana.
  - Tržišna konkurencija primorava strane da prihvate gubitke u nekim ugovorima kako bi stekle prednosti u budućim transakcijama.
explanation: |
  Tekst naglašava da dobrovoljni ugovori predstavljaju igre sa pozitivnim zbirom gde svaka osoba nalazi zadovoljstvo u delovanju umesto u uzdržavanju. Ovo se dešava zato što su ugovori uvek izabrane opcije među alternativama - ljudi sklapaju ugovore samo kada uoče prednost u transakciji. Ovaj princip razlikuje dobrovoljnu razmenu od prinudne redistribucije, regulisanih tržišta ili scenarija konkurentskog gubitka, jer se zasniva na obostranoj koristi, a ne na spoljašnjoj intervenciji ili strateškoj žrtvi.
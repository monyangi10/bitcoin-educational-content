question: 随意契約が当事者間のゼロサム競争ではなく、相互の富を生み出す理由を説明する基本的な経済原則は何か？
answer: 各当事者は、棄権するよりも参加する方がより大きな利点を見いだし、契約は双方が利益を得るポジティブサムゲームとなる。
wrong_answers:
  - 契約は、力の不均衡のバランスをとる交渉による妥協を通じて、より強い当事者からより弱い当事者に富を再分配する。
  - 政府の規制は、搾取を防ぐ公正な条件を保証し、契約当事者間の人為的平等を生み出す。
  - 市場競争は、将来の取引で優位に立つために、ある契約では当事者に損失を受け入れさせる。
explanation: |
  本文では、自発的な契約は、各個人が断念するよりもむしろ行動することに満足を見出す、ポジティブサムゲームであることを強調している。なぜなら、契約は常に選択肢の中から選ばれるものであり、人々は取引に利点を見出したときのみ契約を結ぶからである。この原則により、自発的な交換は、外部からの介入や戦略的犠牲ではなく、相互利益に基づいているため、強制的な再分配、規制された市場、競争的損失のシナリオとは区別される。
question: In the context of modern technological innovation and rapid societal changes, what does liberal theory identify as the primary obstacle preventing state-run services from adapting effectively?
answer: The bureaucratic nature of state administration lacks individual initiative and personal interest incentives necessary for progressive adaptation
wrong_answers:
  - The state lacks sufficient financial resources to invest in technological upgrades and modernization of public services
  - Political leaders frequently change policy directions, preventing long-term strategic planning for technological advancement
  - State employees are generally less educated and skilled compared to their private sector counterparts in similar fields
explanation: |
  Liberal theory argues that state mechanisms are structurally deficient because they don't harness individual initiative and personal interest, which are essential drivers of progress and adaptation. The bureaucratic system (fonctionnarisme) creates organizations that are inherently non-progressive and poorly adapted to rapid societal evolution. This isn't about funding, political instability, or employee qualifications, but rather about the fundamental incentive structure that drives innovation and responsiveness to change.

question: Mu bijanye n’ubuhinga bushasha bwo muri iki gihe be n’ihinduka ryihuta ry’imibano, ni igiki inyigisho y’ubwigenge igaragaza ko ari intambamyi nyamukuru ibuza ibikorwa vya Leta guhindura neza?
answer: Ubutegetsi bwa Leta bufise uburongozi bw'uburongozi burabura umugambi w'umuntu ku giti ciwe n'inyungu z'umuntu ku giti ciwe zikenewe kugira ngo umuntu ashobore guhindura uko ameze .
wrong_answers:
  - Leta irabura amafaranga ahagije yo gushiramwo amafaranga yo gutegura ubuhinga no guhindura ibikorwa vya Leta .
  - Abarongozi ba politike barahindura kenshi amabwirizwa y’ingingo mfatirwako, bikaba bibuza gutegura ingamba z’igihe kirekire zo guteza imbere ubuhinga .
  - Abakozi ba Leta muri rusangi ntibarize cane kandi ntibagira ubuhinga bwinshi ugereranije n’abakozi bo mu nzego z’abikorera ku giti cabo mu bikorwa bisa n’ivyo .
explanation: |
  Ivyiyumviro vy’abanyagihugu bivuga ko uburyo bwa Leta bufise ubukene mu mibumbe kubera ko butakoresha ingingo z’umuntu ku giti ciwe n’inyungu z’umuntu ku giti ciwe, ari vyo bituma umuntu atera imbere kandi akamenyera. Uburyo bw’ubutegetsi (fonctionnarisme) burarema imiryango idatera imbere kandi idashobora guhura neza n’iterambere ryihuta ry’imibano. Ivyo si ivy’amahera, ukudatekana kwa politike, canke ubushobozi bw’abakozi, ahubwo ni ivy’imiterere y’ishimikiro y’inkurikizi ituma habaho ubuhinga bushasha no kwishura ku mpinduka.
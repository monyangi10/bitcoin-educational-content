question: Что в контексте современных технологических инноваций и быстрых изменений в обществе либеральная теория называет главным препятствием, мешающим государственным службам эффективно адаптироваться к новым условиям?
answer: Бюрократический характер государственного управления лишает индивидуальную инициативу и стимулы личной заинтересованности, необходимые для прогрессивной адаптации
wrong_answers:
  - Государство не имеет достаточных финансовых ресурсов для инвестирования в технологическое обновление и модернизацию государственных услуг
  - Политические лидеры часто меняют направления политики, что препятствует долгосрочному стратегическому планированию технологического прогресса
  - Государственные служащие, как правило, менее образованы и квалифицированы по сравнению с их коллегами из частного сектора в аналогичных областях
explanation: |
  Либеральная теория утверждает, что государственные механизмы структурно неполноценны, поскольку не используют индивидуальную инициативу и личный интерес, которые являются важнейшими движущими силами прогресса и адаптации. Бюрократическая система (fonctionnarisme) создает организации, которые по своей природе непрогрессивны и плохо приспособлены к быстрой эволюции общества. Дело не в финансировании, политической нестабильности или квалификации сотрудников, а скорее в фундаментальной структуре стимулов, которая стимулирует инновации и быстрое реагирование на изменения.
question: Mida nimetab liberaalne teooria tänapäeva tehnoloogiliste uuenduste ja kiirete ühiskondlike muutuste kontekstis peamiseks takistuseks, mis takistab riiklike teenuste tõhusat kohanemist?
answer: Riigihalduse bürokraatlikust olemusest puuduvad individuaalne algatus ja isiklike huvide stiimulid, mis on vajalikud järkjärguliseks kohanemiseks
wrong_answers:
  - Riigil puuduvad piisavad rahalised vahendid, et investeerida tehnoloogilistesse uuendustesse ja avalike teenuste moderniseerimisse
  - Poliitilised juhid muudavad sageli poliitilisi suundumusi, mis takistab tehnoloogilise arengu pikaajalist strateegilist planeerimist
  - Riigiametnikud on üldiselt vähem haritud ja vähem kvalifitseeritud kui nende erasektori kolleegid sarnastes valdkondades
explanation: |
  Liberaalne teooria väidab, et riigimehhanismid on struktuuriliselt puudulikud, sest nad ei kasuta individuaalset algatust ja isiklikke huve, mis on progressi ja kohanemise olulised tõukejõud. Bürokraatlik süsteem (fonctionnarisme) loob organisatsioone, mis on oma olemuselt mitteprogressiivsed ja halvasti kohanenud kiire ühiskondliku arenguga. Küsimus ei ole rahastamises, poliitilises ebastabiilsuses või töötajate kvalifikatsioonis, vaid pigem fundamentaalses stiimulistruktuuris, mis juhib innovatsiooni ja muutustele reageerimist.
question: Dalam konteks inovasi teknologi modern dan perubahan masyarakat yang cepat, apa yang diidentifikasi oleh teori liberal sebagai hambatan utama yang menghalangi layanan yang dikelola negara untuk beradaptasi secara efektif?
answer: Sifat birokratis dari administrasi negara tidak memiliki inisiatif individu dan insentif kepentingan pribadi yang diperlukan untuk adaptasi progresif
wrong_answers:
  - Negara tidak memiliki sumber daya keuangan yang memadai untuk berinvestasi dalam peningkatan teknologi dan modernisasi layanan publik
  - Para pemimpin politik sering mengubah arah kebijakan, sehingga mencegah perencanaan strategis jangka panjang untuk kemajuan teknologi
  - Pegawai negeri pada umumnya kurang berpendidikan dan terampil dibandingkan dengan pegawai swasta di bidang yang sama
explanation: |
  Teori liberal berpendapat bahwa mekanisme negara memiliki kekurangan secara struktural karena mereka tidak memanfaatkan inisiatif individu dan kepentingan pribadi, yang merupakan pendorong penting untuk kemajuan dan adaptasi. Sistem birokrasi (fonctionnarisme) menciptakan organisasi yang pada dasarnya tidak progresif dan kurang beradaptasi dengan evolusi masyarakat yang cepat. Ini bukan tentang pendanaan, ketidakstabilan politik, atau kualifikasi karyawan, tetapi lebih kepada struktur insentif mendasar yang mendorong inovasi dan daya tanggap terhadap perubahan.
question: En el contexto de la innovación tecnológica moderna y los rápidos cambios sociales, ¿cuál es, según la teoría liberal, el principal obstáculo que impide que los servicios estatales se adapten eficazmente?
answer: La naturaleza burocrática de la administración estatal carece de la iniciativa individual y los incentivos de interés personal necesarios para una adaptación progresiva
wrong_answers:
  - El Estado carece de recursos financieros suficientes para invertir en mejoras tecnológicas y modernización de los servicios públicos
  - Los dirigentes políticos cambian con frecuencia de orientación política, lo que impide la planificación estratégica a largo plazo del avance tecnológico
  - Los empleados del Estado suelen tener menos formación y cualificación que sus homólogos del sector privado en ámbitos similares
explanation: |
  La teoría liberal sostiene que los mecanismos estatales son estructuralmente deficientes porque no aprovechan la iniciativa individual y el interés personal, motores esenciales del progreso y la adaptación. El sistema burocrático (fonctionnarisme) crea organizaciones intrínsecamente no progresistas y mal adaptadas a la rápida evolución de la sociedad. No se trata de financiación, inestabilidad política o cualificación de los empleados, sino de la estructura fundamental de incentivos que impulsa la innovación y la capacidad de respuesta al cambio.
question: Mikä on liberaalin teorian mukaan tärkein este, joka estää valtionhallinnon palveluita sopeutumasta tehokkaasti nykyaikaisten teknologisten innovaatioiden ja nopeiden yhteiskunnallisten muutosten yhteydessä?
answer: Valtionhallinnon byrokraattisesta luonteesta puuttuu yksilöllinen aloitteellisuus ja henkilökohtaisen edun mukaiset kannustimet, jotka ovat välttämättömiä asteittaisen sopeutumisen kannalta
wrong_answers:
  - Valtiolla ei ole riittäviä taloudellisia resursseja investoida teknologisiin parannuksiin ja julkisten palvelujen nykyaikaistamiseen
  - Poliittiset johtajat muuttavat usein poliittisia linjauksia, mikä estää pitkän aikavälin strategisen suunnittelun teknologian edistämiseksi
  - Valtion työntekijät ovat yleensä vähemmän koulutettuja ja ammattitaitoisia kuin vastaavilla aloilla työskentelevät yksityisen sektorin työntekijät
explanation: |
  Liberalistisen teorian mukaan valtiolliset mekanismit ovat rakenteellisesti puutteellisia, koska ne eivät hyödynnä yksilön aloitteellisuutta ja henkilökohtaista etua, jotka ovat edistyksen ja sopeutumisen keskeisiä moottoreita. Byrokraattinen järjestelmä (fonctionnarisme) luo organisaatioita, jotka ovat luonnostaan ei-edistyksellisiä ja huonosti sopeutuneita nopeaan yhteiskunnalliseen kehitykseen. Kyse ei ole rahoituksesta, poliittisesta epävakaudesta tai työntekijöiden pätevyydestä, vaan pikemminkin perustavanlaatuisesta kannustinrakenteesta, joka ohjaa innovointia ja reagointia muutoksiin.
question: В контекста на съвременните технологични иновации и бързите обществени промени кое според либералната теория е основната пречка, която не позволява на държавните служби да се адаптират ефективно?
answer: Бюрократичният характер на държавната администрация е лишен от индивидуалната инициатива и стимулите на личния интерес, необходими за постепенното адаптиране
wrong_answers:
  - Държавата не разполага с достатъчно финансови ресурси, за да инвестира в технологични подобрения и модернизация на обществените услуги
  - Политическите лидери често променят насоките на политиката, което възпрепятства дългосрочното стратегическо планиране на технологичния напредък
  - Държавните служители като цяло са по-слабо образовани и квалифицирани в сравнение с колегите си от частния сектор в подобни области
explanation: |
  Либералната теория твърди, че държавните механизми са структурно недостатъчни, тъй като не използват индивидуалната инициатива и личния интерес, които са основни двигатели на прогреса и адаптацията. Бюрократичната система (fonctionnarisme) създава организации, които по своята същност не са прогресивни и са слабо адаптирани към бързата обществена еволюция. Тук не става въпрос за финансиране, политическа нестабилност или квалификация на служителите, а по-скоро за фундаменталната структура на стимулите, която стимулира иновациите и способността за реагиране на промените.
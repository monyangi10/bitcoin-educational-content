question: Co je podle liberální teorie v kontextu moderních technologických inovací a rychlých společenských změn hlavní překážkou, která brání efektivní adaptaci státem řízených služeb?
answer: Byrokratický charakter státní správy postrádá individuální iniciativu a osobní zájmové podněty, které jsou nezbytné pro progresivní adaptaci
wrong_answers:
  - Stát nemá dostatek finančních prostředků na investice do technologické modernizace a modernizace veřejných služeb
  - Političtí představitelé často mění politické směry, což brání dlouhodobému strategickému plánování technologického pokroku
  - Státní zaměstnanci jsou obecně méně vzdělaní a kvalifikovaní než jejich kolegové v soukromém sektoru v podobných oborech
explanation: |
  Liberální teorie tvrdí, že státní mechanismy jsou strukturálně nedostatečné, protože nevyužívají individuální iniciativu a osobní zájem, které jsou základními hnacími silami pokroku a přizpůsobení. Byrokratický systém (fonctionnarisme) vytváří organizace, které jsou ze své podstaty neprogresivní a špatně přizpůsobené rychlému společenskému vývoji. Nejde o financování, politickou nestabilitu nebo kvalifikaci zaměstnanců, ale spíše o základní motivační strukturu, která pohání inovace a schopnost reagovat na změny.
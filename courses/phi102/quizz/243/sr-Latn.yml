question: U kontekstu moderne tehnološke inovacije i brzih društvenih promena, šta liberalna teorija identifikuje kao primarnu prepreku koja sprečava državne usluge da se efikasno prilagode?
answer: Birokratska priroda državne administracije nedostaje individualna inicijativa i podsticaji ličnog interesa neophodni za progresivnu adaptaciju
wrong_answers:
  - Država nema dovoljno finansijskih sredstava za ulaganje u tehnološka unapređenja i modernizaciju javnih usluga.
  - Politički lideri često menjaju pravce politika, sprečavajući dugoročno strateško planiranje za tehnološki napredak.
  - Državni službenici su generalno manje obrazovani i vešti u poređenju sa svojim kolegama iz privatnog sektora u sličnim oblastima.
explanation: |
  Liberalna teorija tvrdi da su državni mehanizmi strukturno deficitarni jer ne koriste individualnu inicijativu i lični interes, koji su ključni pokretači napretka i prilagođavanja. Birokratski sistem (fonctionnarisme) stvara organizacije koje su inherentno neprogresivne i loše prilagođene brzoj društvenoj evoluciji. Ovde se ne radi o finansiranju, političkoj nestabilnosti ili kvalifikacijama zaposlenih, već o fundamentalnoj strukturi podsticaja koja pokreće inovacije i odgovornost na promene.
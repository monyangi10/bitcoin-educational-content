question: W kontekście nowoczesnych innowacji technologicznych i szybkich zmian społecznych, co teoria liberalna identyfikuje jako główną przeszkodę uniemożliwiającą skuteczną adaptację usług zarządzanych przez państwo?
answer: Biurokratyczny charakter administracji państwowej pozbawiony jest indywidualnej inicjatywy i osobistych bodźców niezbędnych do progresywnej adaptacji
wrong_answers:
  - Państwo nie dysponuje wystarczającymi środkami finansowymi, aby inwestować w unowocześnianie technologii i modernizację usług publicznych
  - Przywódcy polityczni często zmieniają kierunki polityki, uniemożliwiając długoterminowe planowanie strategiczne postępu technologicznego
  - Pracownicy państwowi są generalnie gorzej wykształceni i wykwalifikowani w porównaniu z ich odpowiednikami z sektora prywatnego w podobnych dziedzinach
explanation: |
  Teoria liberalna twierdzi, że mechanizmy państwowe są strukturalnie wadliwe, ponieważ nie wykorzystują indywidualnej inicjatywy i osobistego interesu, które są podstawowymi czynnikami napędzającymi postęp i adaptację. System biurokratyczny (fonctionnarisme) tworzy organizacje, które są z natury nieprogresywne i słabo przystosowane do szybkiej ewolucji społecznej. Nie chodzi tu o finansowanie, niestabilność polityczną czy kwalifikacje pracowników, ale raczej o podstawową strukturę motywacyjną, która napędza innowacje i reagowanie na zmiany.
question: No contexto da inovação tecnológica moderna e das rápidas mudanças sociais, o que é que a teoria liberal identifica como o principal obstáculo que impede os serviços geridos pelo Estado de se adaptarem eficazmente?
answer: A natureza burocrática da administração estatal carece da iniciativa individual e dos incentivos de interesse pessoal necessários para uma adaptação progressiva
wrong_answers:
  - O Estado não dispõe de recursos financeiros suficientes para investir em actualizações tecnológicas e na modernização dos serviços públicos
  - Os líderes políticos mudam frequentemente de orientação política, impedindo o planeamento estratégico a longo prazo para o avanço tecnológico
  - Os funcionários do Estado são geralmente menos instruídos e qualificados do que os seus homólogos do sector privado em domínios semelhantes
explanation: |
  A teoria liberal argumenta que os mecanismos estatais são estruturalmente deficientes porque não aproveitam a iniciativa individual e o interesse pessoal, que são factores essenciais de progresso e adaptação. O sistema burocrático (fonctionnarisme) cria organizações que são inerentemente não-progressivas e mal adaptadas à rápida evolução da sociedade. Não se trata de financiamento, instabilidade política ou qualificações dos funcionários, mas sim da estrutura de incentivos fundamental que impulsiona a inovação e a capacidade de reação à mudança.
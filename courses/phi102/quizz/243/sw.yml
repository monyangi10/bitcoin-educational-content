question: Katika muktadha wa uvumbuzi wa kiteknolojia wa kisasa na mabadiliko ya haraka ya kijamii, ni nini nadharia huria inatambua kama kikwazo kikuu kinachozuia huduma zinazoendeshwa na serikali kubadilika kwa ufanisi?
answer: Asili ya urasimu ya utawala wa serikali haina mpango wa kibinafsi na motisha za maslahi binafsi zinazohitajika kwa ajili ya marekebisho endelevu.
wrong_answers:
  - Serikali haina rasilimali za kutosha za kifedha kuwekeza katika maboresho ya kiteknolojia na uboreshaji wa huduma za umma
  - Viongozi wa kisiasa mara nyingi hubadilisha mwelekeo wa sera, na kuzuia mipango ya kimkakati ya muda mrefu kwa ajili ya maendeleo ya kiteknolojia.
  - Wafanyakazi wa serikali kwa ujumla hawana elimu na ujuzi mwingi ikilinganishwa na wenzao wa sekta binafsi katika nyanja zinazofanana.
explanation: |
  Nadharia ya kiliberali inasema kwamba mifumo ya serikali ina upungufu wa kimuundo kwa sababu haitumii mpango wa mtu binafsi na maslahi binafsi, ambayo ni vichocheo muhimu vya maendeleo na marekebisho. Mfumo wa urasimu (fonctionnarisme) huunda mashirika ambayo kwa asili hayana maendeleo na hayaendani vizuri na mageuzi ya haraka ya kijamii. Hii si kuhusu ufadhili, kutokuwa na utulivu wa kisiasa, au sifa za wafanyakazi, bali ni kuhusu muundo wa msingi wa motisha unaosababisha uvumbuzi na mwitikio wa mabadiliko.
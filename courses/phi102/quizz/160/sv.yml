question: Enligt Gustave de Molinaris analys, vilken primär drivkraft fick regeringar att engagera sig i krigföring under 1800-talet?
answer: Önskan att utöka sitt monopol på territoriell dominans, på samma sätt som en industrialist försöker utöka sin kundkrets
wrong_answers:
  - Behovet av att skydda nationella ekonomiska intressen och säkra tillgången till viktiga naturresurser för sina befolkningar
  - Skyldigheten att försvara demokratiska värderingar och sprida konstitutionella principer till förtryckta folk i angränsande territorier
  - Kravet på att upprätthålla militär beredskap och hedra befintliga alliansåtaganden med andra suveräna nationer
explanation: |
  Molinari konstaterade att krig är en motsättning mellan statliga intressen som vill utöka sitt territoriella monopol, inte genuina nationella behov. Detta återspeglar en feodal uppfattning där stater ser sig själva som ägare av nationer. De andra alternativen representerar konventionella rättfärdiganden för krig som maskerar den underliggande statliga önskan om utökad dominans över större territorier och befolkningar.
question: Secondo l'analisi di Gustave de Molinari, qual è la motivazione principale che spinge i governi a impegnarsi nella guerra durante il XIX secolo?
answer: Il desiderio di estendere il proprio monopolio di dominio territoriale, simile a quello di un industriale che cerca di ampliare la propria clientela
wrong_answers:
  - La necessità di proteggere gli interessi economici nazionali e di garantire l'accesso alle risorse naturali essenziali per le loro popolazioni
  - L'obbligo di difendere i valori democratici e diffondere i principi costituzionali ai popoli oppressi nei territori limitrofi
  - Il requisito di mantenere la prontezza militare e di onorare gli impegni di alleanza esistenti con altre nazioni sovrane
explanation: |
  Molinari ha individuato che la guerra rappresenta l'opposizione di interessi governativi che cercano di espandere il loro monopolio territoriale, e non autentici bisogni nazionali. Ciò riflette una concezione feudale in cui gli Stati si considerano proprietari delle nazioni. Le altre opzioni rappresentano giustificazioni convenzionali per la guerra che mascherano il sottostante desiderio governativo di espandere il dominio su territori e popolazioni più ampie.
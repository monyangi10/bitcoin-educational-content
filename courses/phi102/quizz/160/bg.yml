question: Според анализа на Густав дьо Молинари коя е основната мотивация, която кара правителствата да водят войни през XIX век?
answer: Желанието да разширят монопола си върху териториалното господство, подобно на това как един индустриалец се стреми да разшири клиентелата си
wrong_answers:
  - Необходимостта да се защитят националните икономически интереси и да се осигури достъп на населението до основни природни ресурси
  - Задължението да се защитават демократичните ценности и да се разпространяват конституционните принципи сред потиснатите народи в съседните територии
  - Изискването за поддържане на военна готовност и спазване на съществуващите ангажименти в съюзи с други суверенни държави
explanation: |
  Молинари установява, че войната представлява противопоставяне на правителствени интереси, които се стремят да разширят териториалния си монопол, а не на истински национални нужди. Това отразява една феодална концепция, при която държавите гледат на себе си като на собственици на нациите. Другите варианти представляват конвенционални оправдания за войната, които прикриват скрития правителствен стремеж за разширяване на господството над по-големи територии и население.
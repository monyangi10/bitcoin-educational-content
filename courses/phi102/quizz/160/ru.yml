question: Согласно анализу Гюстава де Молинари, какой основной мотив побуждает правительства участвовать в войнах в XIX веке?
answer: Желание расширить свою монополию на территориальное господство, подобно тому, как промышленник стремится расширить круг своих клиентов
wrong_answers:
  - Необходимость защиты национальных экономических интересов и обеспечения доступа к важнейшим природным ресурсам для своего населения
  - Обязательство защищать демократические ценности и распространять конституционные принципы среди угнетенных народов на соседних территориях
  - Требование поддерживать военную готовность и соблюдать существующие союзнические обязательства с другими суверенными государствами
explanation: |
  Молинари определил, что война представляет собой противостояние государственных интересов, стремящихся расширить свою территориальную монополию, а не подлинные национальные потребности. Это отражает феодальную концепцию, в которой государства рассматривают себя как собственников наций. Другие варианты представляют собой традиционные оправдания войны, которые маскируют лежащее в основе правительства стремление к расширению господства над большими территориями и населением.
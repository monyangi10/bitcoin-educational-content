question: Gustave de Molinarin analyysin mukaan mikä on ensisijainen motiivi, joka ajaa hallituksia sotimaan 1800-luvulla?
answer: Halu laajentaa alueellista monopoliasemaansa, samaan tapaan kuin teollisuusyrittäjä pyrkii laajentamaan asiakaskuntaansa
wrong_answers:
  - Tarve suojella kansallisia taloudellisia etuja ja turvata väestölle keskeisten luonnonvarojen saanti
  - Velvollisuus puolustaa demokraattisia arvoja ja levittää perustuslaillisia periaatteita naapurialueiden sorretuille kansoille
  - Vaatimus ylläpitää sotilaallista valmiutta ja kunnioittaa olemassa olevia liittoutumissitoumuksia muiden suvereenien valtioiden kanssa
explanation: |
  Molinari totesi, että sota edustaa alueellisen monopolinsa laajentamiseen pyrkivien valtiollisten etujen vastakkainasettelua, ei aitoja kansallisia tarpeita. Tämä kuvastaa feodaalista käsitystä, jossa valtiot pitävät itseään kansakuntien omistajina. Muut vaihtoehdot edustavat sodan tavanomaisia perusteluja, jotka peittävät alleen hallitusten taustalla olevan halun laajentaa valta-asemaansa laajemmille alueille ja väestöille.
question: Welches Hauptmotiv treibt nach Gustave de Molinaris Analyse die Regierungen im 19. Jahrhundert zur Kriegsführung?
answer: Das Bestreben, das Monopol der territorialen Vorherrschaft auszuweiten, ähnlich wie ein Industrieller seinen Kundenkreis zu erweitern sucht
wrong_answers:
  - Die Notwendigkeit, die nationalen Wirtschaftsinteressen zu schützen und den Zugang der Bevölkerung zu wichtigen natürlichen Ressourcen zu sichern
  - Die Verpflichtung, die demokratischen Werte zu verteidigen und die Verfassungsgrundsätze auf die unterdrückten Völker in den benachbarten Gebieten auszudehnen
  - Das Erfordernis, die militärische Bereitschaft aufrechtzuerhalten und bestehende Bündnisverpflichtungen mit anderen souveränen Nationen einzuhalten
explanation: |
  Molinari stellte fest, dass der Krieg die Opposition von Regierungsinteressen darstellt, die ihr territoriales Monopol ausweiten wollen, und nicht echte nationale Bedürfnisse. Dies spiegelt eine feudale Auffassung wider, in der sich Staaten als Eigentümer von Nationen sehen. Die anderen Optionen stellen konventionelle Rechtfertigungen für Kriege dar, die den zugrunde liegenden Wunsch der Regierungen nach einer erweiterten Herrschaft über größere Gebiete und Bevölkerungen verschleiern.
question: ギュスターヴ・ド・モリナーリの分析によれば、19世紀に政府が戦争に従事する主な動機は何か？
answer: 領土支配の独占を拡大したいという願望は、実業家が顧客を拡大しようとするのと似ている。
wrong_answers:
  - 国の経済的利益を保護し、国民にとって不可欠な天然資源へのアクセスを確保する必要性
  - 民主主義の価値を擁護し、近隣諸国の抑圧された人々に立憲主義を広める義務。
  - 軍事即応態勢を維持し、他の主権国家との既存の同盟約束を尊重する必要性
explanation: |
  モリナーリは、戦争は領土の独占を拡大しようとする政府の利害の対立であり、真の国家的必要性ではないと指摘した。これは、国家が自らを国家の所有者とみなす封建的観念を反映している。他の選択肢は、より大きな領土と人口に対する支配を拡大したいという政府の根底にある願望を覆い隠す、従来型の戦争の正当化である。
question: Ifølge Gustave de Molinaris analyse, hvilken motivasjon var det som drev regjeringer til å engasjere seg i krigføring på 1800-tallet?
answer: Ønsket om å utvide sitt monopol på territoriell dominans, på samme måte som en industriherre søker å utvide kundekretsen sin
wrong_answers:
  - Behovet for å beskytte nasjonale økonomiske interesser og sikre befolkningen tilgang til viktige naturressurser
  - Forpliktelsen til å forsvare demokratiske verdier og spre konstitusjonelle prinsipper til undertrykte folk i nabolandene
  - Kravet om å opprettholde militær beredskap og overholde eksisterende allianseforpliktelser med andre suverene nasjoner
explanation: |
  Molinari identifiserte at krig representerer motstanden fra statlige interesser som ønsker å utvide sitt territorielle monopol, ikke genuine nasjonale behov. Dette gjenspeiler en føydal oppfatning der stater ser på seg selv som eiere av nasjoner. De andre alternativene representerer konvensjonelle begrunnelser for krig som maskerer det underliggende statlige ønsket om utvidet dominans over større territorier og befolkninger.
question: 根据古斯塔夫-德-莫利纳里的分析，在 19 世纪，促使各国政府参与战争的主要动机是什么？
answer: 希望扩大其对领土的垄断，就像工业家寻求扩大客户群一样
wrong_answers:
  - 需要保护国家经济利益，确保本国人民获得必要的自然资源
  - 有义务捍卫民主价值观，并将宪法原则传播给邻近领土上的被压迫人民
  - 要求保持军事战备状态并履行与其他主权国家的现有联盟承诺
explanation: |
  莫里纳利指出，战争代表着政府利益集团为扩大领土垄断而进行的对抗，而非真正的国家需求。这反映了一种封建观念，即国家将自己视为国家的所有者。其他选项代表了传统的战争理由，掩盖了政府扩大对更多领土和人口的统治的根本愿望。
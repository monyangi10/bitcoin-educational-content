question: بر اساس تحلیل گوستاو دو مولیناری، چه انگیزه اصلی دولت‌ها را در قرن نوزدهم به جنگ وامی‌دارد؟
answer: تمایل به گسترش انحصار تسلط سرزمینی، مشابه با اینکه یک صنعتگر به دنبال گسترش مشتریان خود است
wrong_answers:
  - نیاز به حفاظت از منافع اقتصادی ملی و تأمین دسترسی به منابع طبیعی ضروری برای جمعیت‌هایشان
  - تعهد به دفاع از ارزش‌های دموکراتیک و گسترش اصول قانون اساسی به مردمان تحت ستم در سرزمین‌های همسایه
  - اللزوم حفظ آمادگی نظامی و احترام به تعهدات موجود اتحاد با سایر کشورهای مستقل
explanation: |
  مولیناری تشخیص داد که جنگ نمایانگر مخالفت منافع دولتی است که به دنبال گسترش انحصار سرزمینی خود هستند، نه نیازهای واقعی ملی. این بازتابی از یک تصور فئودالی است که در آن دولت‌ها خود را به عنوان مالک ملت‌ها می‌بینند. گزینه‌های دیگر نمایانگر توجیهات متعارف برای جنگ هستند که تمایل اساسی دولت برای تسلط بیشتر بر سرزمین‌ها و جمعیت‌های بزرگتر را پنهان می‌کنند.
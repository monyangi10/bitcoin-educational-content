question: Menurut analisis Gustave de Molinari, motivasi utama apa yang mendorong pemerintah untuk terlibat dalam peperangan selama abad ke-19?
answer: Keinginan untuk memperluas monopoli dominasi teritorial mereka, mirip dengan bagaimana seorang industrialis berusaha untuk memperluas klien mereka
wrong_answers:
  - Kebutuhan untuk melindungi kepentingan ekonomi nasional dan mengamankan akses ke sumber daya alam yang penting bagi penduduknya
  - Kewajiban untuk membela nilai-nilai demokrasi dan menyebarkan prinsip-prinsip konstitusional kepada masyarakat yang tertindas di wilayah-wilayah tetangga
  - Persyaratan untuk mempertahankan kesiapan militer dan menghormati komitmen aliansi yang ada dengan negara-negara berdaulat lainnya
explanation: |
  Molinari mengidentifikasi bahwa perang mewakili pertentangan kepentingan pemerintah yang ingin memperluas monopoli teritorial mereka, bukan kebutuhan nasional yang sesungguhnya. Hal ini mencerminkan konsepsi feodal di mana negara memandang diri mereka sebagai pemilik negara. Pilihan-pilihan lain mewakili pembenaran konvensional untuk perang yang menutupi keinginan pemerintah yang mendasari untuk memperluas dominasi atas wilayah dan populasi yang lebih besar.
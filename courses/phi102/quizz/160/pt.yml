question: De acordo com a análise de Gustave de Molinari, qual é a principal motivação que leva os governos a participarem em guerras durante o século XIX?
answer: O desejo de alargar o seu monopólio de domínio territorial, tal como um industrial procura alargar a sua clientela
wrong_answers:
  - A necessidade de proteger os interesses económicos nacionais e de garantir o acesso das suas populações aos recursos naturais essenciais
  - A obrigação de defender os valores democráticos e de difundir os princípios constitucionais junto dos povos oprimidos nos territórios vizinhos
  - A necessidade de manter a prontidão militar e honrar os compromissos de aliança existentes com outras nações soberanas
explanation: |
  Molinari identificou que a guerra representa a oposição de interesses governamentais que procuram expandir o seu monopólio territorial e não necessidades nacionais genuínas. Isto reflecte uma conceção feudal em que os Estados se vêem a si próprios como proprietários de nações. As outras opções representam justificações convencionais para a guerra que mascaram o desejo governamental subjacente de domínio alargado sobre territórios e populações maiores.
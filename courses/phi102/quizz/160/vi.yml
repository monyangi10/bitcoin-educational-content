question: Theo phân tích của Gustave de Molinari, động cơ chính nào thúc đẩy các chính phủ tham gia vào chiến tranh trong thế kỷ 19?
answer: Mong muốn mở rộng thế độc quyền thống trị lãnh thổ của họ, tương tự như cách một nhà công nghiệp tìm cách mở rộng lượng khách hàng của mình.
wrong_answers:
  - Nhu cầu bảo vệ lợi ích kinh tế quốc gia và đảm bảo quyền tiếp cận các nguồn tài nguyên thiên nhiên thiết yếu cho người dân.
  - Nghĩa vụ bảo vệ các giá trị dân chủ và truyền bá các nguyên tắc hiến pháp cho các dân tộc bị áp bức ở các vùng lãnh thổ lân cận.
  - Yêu cầu duy trì khả năng sẵn sàng chiến đấu và tôn trọng các cam kết liên minh hiện có với các quốc gia có chủ quyền khác.
explanation: |
  Molinari nhận định rằng chiến tranh thể hiện sự đối lập giữa các lợi ích của chính phủ nhằm mở rộng độc quyền lãnh thổ, chứ không phải nhu cầu quốc gia thực sự. Điều này phản ánh quan niệm phong kiến, nơi các quốc gia tự coi mình là chủ sở hữu của các dân tộc. Các lựa chọn khác đại diện cho những lý lẽ thông thường biện minh cho chiến tranh, che đậy mong muốn ngầm của chính phủ về việc mở rộng sự thống trị trên các vùng lãnh thổ và dân số lớn hơn.
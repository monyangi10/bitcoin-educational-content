question: Kulingana na uchambuzi wa Gustave de Molinari, ni motisha gani kuu inayosukuma serikali kushiriki katika vita wakati wa karne ya 19?
answer: Hamu ya kupanua ukiritimba wao wa kutawala eneo, sawa na jinsi mfanyabiashara anavyotaka kupanua wateja wake
wrong_answers:
  - Haja ya kulinda maslahi ya kiuchumi ya taifa na upatikanaji salama wa rasilimali muhimu za asili kwa wakazi wao
  - Wajibu wa kutetea maadili ya kidemokrasia na kueneza kanuni za kikatiba kwa watu waliokandamizwa katika maeneo jirani
  - Sharti la kudumisha utayari wa kijeshi na kuheshimu ahadi zilizopo za muungano na mataifa mengine huru
explanation: |
  Molinari alibainisha kuwa vita vinawakilisha upinzani wa maslahi ya serikali yanayotaka kupanua ukiritimba wao wa eneo, si mahitaji halisi ya kitaifa. Hii inaonyesha dhana ya kibepari ambapo majimbo yanajiona kama wamiliki wa mataifa. Chaguzi zingine zinawakilisha uhalali wa kawaida wa vita unaoficha hamu ya msingi ya serikali ya kupanua utawala juu ya maeneo na idadi kubwa ya watu.
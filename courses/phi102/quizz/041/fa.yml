question: طبق متن، چه مشکل اساسی زمانی به وجود می‌آید که دولت جایگزین مشارکت والدین در آموزش می‌شود؟
answer: دولت فاقد سرمایه‌گذاری عاطفی و دانش صمیمانه‌ای است که والدین نسبت به شخصیت‌های منحصر به فرد فرزندانشان دارند.
wrong_answers:
  - دولت روش‌های آموزشی استانداردتر و کارآمدتری نسبت به آنچه والدین به صورت فردی می‌توانند ارائه دهند، فراهم می‌کند.
  - دولت دسترسی برابر به آموزش را بدون توجه به وضعیت اقتصادی والدین یا پیشینه اجتماعی تضمین می‌کند.
  - دولت تعصب و طرفداری که والدین به طور طبیعی نسبت به فرزندان خود نشان می‌دهند را از بین می‌برد.
explanation: |
  متن توضیح می‌دهد که آموزش تحت کنترل دولت یک تناقض جدی را نشان می‌دهد زیرا عشق طبیعی والدین را با نظارت اداری جایگزین می‌کند. والدین دارای دانش صمیمی غیرقابل جایگزین از فرزندان خود و سرمایه‌گذاری عاطفی در توسعه آن‌ها هستند، در حالی که دولت، که فاقد احساسات است، نمی‌تواند شخصیت منحصر به فرد هر کودک را درک کند. این امر باعث ایجاد عدم تطابق اساسی بین رویکرد استاندارد شده آموزش دولتی و درک فردی است که والدین به طور طبیعی ارائه می‌دهند.
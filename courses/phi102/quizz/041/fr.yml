question: D'après le texte, quel problème fondamental se pose lorsque l'État remplace l'implication des parents dans l'éducation ?
answer: L'État ne dispose pas de l'investissement émotionnel et de la connaissance intime que les parents ont de la personnalité unique de leurs enfants
wrong_answers:
  - L'État fournit des méthodes d'éducation plus standardisées et plus efficaces que celles que les parents peuvent offrir individuellement
  - L'État garantit l'égalité d'accès à l'éducation indépendamment du statut économique ou du milieu social des parents
  - L'État élimine les préjugés et le favoritisme que les parents manifestent naturellement à l'égard de leurs propres enfants
explanation: |
  Le texte explique que l'éducation contrôlée par l'État représente une grave contradiction car elle remplace l'amour naturel des parents par une surveillance administrative. Les parents possèdent une connaissance intime irremplaçable de leurs enfants et un investissement émotionnel dans leur développement, tandis que l'État, dépourvu de sentiments, ne peut apprécier la personnalité unique de chaque enfant. Il en résulte un décalage fondamental entre l'approche standardisée de l'éducation publique et la compréhension individualisée que les parents apportent naturellement.
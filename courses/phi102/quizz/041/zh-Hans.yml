question: 根据课文内容，当国家取代父母参与教育时，会产生什么根本问题？
answer: 国家缺乏父母对子女独特个性的情感投入和深入了解
wrong_answers:
  - 国家提供的教育方法比单个家长所能提供的更标准化、更高效
  - 国家确保平等的受教育机会，不论父母的经济状况或社会背景如何
  - 国家消除了父母对自己子女的偏见和偏袒
explanation: |
  文中解释说，国家控制的教育是一个严重的矛盾，因为它以行政监督取代了父母自然的爱。父母对子女的了解和对子女成长的情感投入是无可替代的，而国家没有感情，无法理解每个孩子的独特个性。这就造成了国家教育的标准化方法与父母自然提供的个性化理解之间的根本性不匹配。
question: Menurut teks tersebut, masalah mendasar apa yang muncul ketika negara menggantikan keterlibatan orang tua dalam pendidikan?
answer: Negara tidak memiliki investasi emosional dan pengetahuan mendalam yang dimiliki orang tua tentang kepribadian unik anak-anak mereka
wrong_answers:
  - Negara menyediakan metode pendidikan yang lebih terstandardisasi dan efisien daripada yang dapat ditawarkan oleh orang tua perorangan
  - Negara menjamin akses yang sama terhadap pendidikan tanpa memandang status ekonomi orang tua atau latar belakang sosial
  - Negara menghilangkan bias dan pilih kasih yang secara alami ditunjukkan oleh orang tua terhadap anak-anak mereka sendiri
explanation: |
  Teks tersebut menjelaskan bahwa pendidikan yang dikendalikan oleh negara merupakan kontradiksi besar karena menggantikan kasih sayang orang tua yang alami dengan pengawasan administratif. Orang tua memiliki pengetahuan mendalam yang tak tergantikan tentang anak-anak mereka dan investasi emosional dalam perkembangan mereka, sementara negara, karena tidak memiliki perasaan, tidak dapat menghargai kepribadian unik setiap anak. Hal ini menciptakan ketidaksesuaian mendasar antara pendekatan standar pendidikan negara dan pemahaman individual yang secara alami diberikan oleh orang tua.
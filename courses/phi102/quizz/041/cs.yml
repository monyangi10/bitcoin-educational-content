question: Jaký zásadní problém podle textu vzniká, když stát nahrazuje zapojení rodičů do vzdělávání?
answer: Stát postrádá citovou investici a důvěrnou znalost jedinečných osobností svých dětí, kterou mají rodiče
wrong_answers:
  - Stát poskytuje standardizovanější a efektivnější vzdělávací metody, než mohou nabídnout jednotliví rodiče
  - Stát zajišťuje rovný přístup ke vzdělání bez ohledu na ekonomický status rodičů nebo sociální zázemí
  - Stát odstraňuje předsudky a přízeň, které rodiče přirozeně projevují vůči vlastním dětem
explanation: |
  Text vysvětluje, že státem řízené vzdělávání představuje vážný rozpor, protože nahrazuje přirozenou rodičovskou lásku administrativním dohledem. Rodiče mají nenahraditelnou důvěrnou znalost svých dětí a citovou investici do jejich vývoje, zatímco stát, který je zbaven citů, nemůže ocenit jedinečnou osobnost každého dítěte. Vzniká tak zásadní nesoulad mezi standardizovaným přístupem státního školství a individuálním porozuměním, které rodiče přirozeně poskytují.
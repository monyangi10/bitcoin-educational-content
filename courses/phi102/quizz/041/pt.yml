question: De acordo com o texto, que problema fundamental surge quando o Estado substitui o envolvimento dos pais na educação?
answer: O Estado não tem o investimento emocional e o conhecimento íntimo que os pais têm das personalidades únicas dos seus filhos
wrong_answers:
  - O Estado fornece métodos educativos mais normalizados e eficientes do que os que os pais podem oferecer individualmente
  - O Estado garante a igualdade de acesso à educação, independentemente do estatuto económico ou do contexto social dos pais
  - O Estado elimina o preconceito e o favoritismo que os pais naturalmente demonstram em relação aos seus próprios filhos
explanation: |
  O texto explica que a educação controlada pelo Estado representa uma grave contradição, porque substitui o amor natural dos pais pelo controlo administrativo. Os pais possuem um conhecimento íntimo insubstituível dos seus filhos e um investimento emocional no seu desenvolvimento, enquanto o Estado, sendo desprovido de sentimentos, não pode apreciar a personalidade única de cada criança. Isto cria um desfasamento fundamental entre a abordagem padronizada da educação estatal e a compreensão individualizada que os pais naturalmente proporcionam.
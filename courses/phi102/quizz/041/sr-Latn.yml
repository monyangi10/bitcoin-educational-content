question: Prema tekstu, koji fundamentalni problem nastaje kada država zameni roditeljsko učešće u obrazovanju?
answer: Država nema emocionalnu uključenost i intimno znanje koje roditelji imaju o jedinstvenim ličnostima svoje dece.
wrong_answers:
  - Država pruža standardizovanije i efikasnije obrazovne metode nego što pojedinačni roditelji mogu ponuditi
  - Država osigurava jednak pristup obrazovanju bez obzira na ekonomski status roditelja ili socijalno poreklo.
  - Država eliminiše pristrasnost i favorizovanje koje roditelji prirodno pokazuju prema svojoj deci.
explanation: |
  Tekst objašnjava da obrazovanje pod kontrolom države predstavlja ozbiljnu kontradikciju jer zamenjuje prirodnu roditeljsku ljubav administrativnim nadzorom. Roditelji poseduju nezamenljivo intimno znanje o svojoj deci i emocionalnu investiciju u njihov razvoj, dok država, lišena osećanja, ne može da ceni jedinstvenu ličnost svakog deteta. Ovo stvara osnovnu neskladnost između standardizovanog pristupa državnog obrazovanja i individualizovanog razumevanja koje roditelji prirodno pružaju.
question: 本文によれば、国家が教育への親の関与に取って代わると、どのような根本的な問題が生じるのか？
answer: 国家には、親が子どもの個性について持つ感情的な投資や親密な知識が欠けている。
wrong_answers:
  - 国は、個々の親が提供できるよりも標準化された効率的な教育方法を提供する。
  - 親の経済的地位や社会的背景にかかわらず、教育への平等なアクセスを保証する。
  - 国家は、親が自分の子供に対して自然に示す偏見や好意を排除する。
explanation: |
  この文章は、国家が管理する教育は、自然な親の愛情を行政の監視に置き換えるものであり、重大な矛盾であると説明している。親は子供についてかけがえのない深い知識を持ち、子供の成長に感情的な投資をするが、国家は感情を持たないため、子供一人一人の個性を理解することができない。このことは、国家教育による画一的なアプローチと、親が自然に提供する個別的な理解との間に根本的なミスマッチを生む。
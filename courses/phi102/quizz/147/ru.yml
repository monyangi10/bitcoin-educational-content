question: Согласно критике демократических государств, какая фундаментальная проблема возникает из-за временного характера политической власти?
answer: Политические партии спешат быстро воспользоваться преимуществами власти, что приводит к нерациональному использованию ресурсов и поспешному принятию законов
wrong_answers:
  - Демократические правительства становятся слишком осторожными и медленно проводят необходимые реформы
  - Политические лидеры развивают долгосрочное мышление, которое противоречит сиюминутным потребностям граждан
  - Временная власть создает чрезмерную стабильность, которая препятствует необходимым политическим изменениям
explanation: |
  В тексте объясняется, что демократические государства создают особенно вредную монополию, потому что она временна. Эта временность заставляет политические партии поспешно пользоваться преимуществами власти, что приводит к растрате общественных ресурсов и принятию законов людьми, не всегда подходящими для таких функций. Временный характер создает скорее срочность, чем тщательное обдумывание, что контрастирует с терпеливым размышлением, которое люди используют при принятии личных решений. Другие варианты неверно предполагают, что временная власть порождает осторожность, долгосрочное мышление или чрезмерную стабильность, что противоречит представленному анализу.
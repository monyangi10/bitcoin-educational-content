question: Jaký zásadní problém podle kritiky demokratických států vyplývá z dočasnosti politické moci?
answer: Politické strany spěchají, aby rychle využily mocenské výhody, což vede k plýtvání zdroji a ukvapeným zákonům
wrong_answers:
  - Demokratické vlády jsou příliš opatrné a pomalu provádějí potřebné reformy
  - Političtí představitelé rozvíjejí dlouhodobé myšlení, které je v rozporu s okamžitými potřebami občanů
  - Dočasná moc vytváří přílišnou stabilitu, která brání potřebným politickým změnám
explanation: |
  Text vysvětluje, že demokratické státy vytvářejí obzvláště škodlivý monopol, protože je dočasný. Tato dočasnost vede k tomu, že politické strany ukvapeně využívají výhod moci, což vede k plýtvání veřejnými zdroji a k zákonům, které vytvářejí osoby, jež se pro tyto funkce ne vždy hodí. Dočasnost vytváří spíše naléhavost než pečlivou rozvahu, což kontrastuje s trpělivou úvahou, kterou jednotlivci používají při osobních rozhodnutích. Ostatní možnosti nesprávně naznačují, že dočasnost moci vytváří opatrnost, dlouhodobé uvažování nebo přílišnou stabilitu, což je v rozporu s předloženou analýzou.
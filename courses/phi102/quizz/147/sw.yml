question: Kulingana na ukosoaji wa mataifa ya kidemokrasia, ni tatizo gani la msingi linalotokana na asili ya muda ya mamlaka ya kisiasa?
answer: Vyama vya siasa vinakimbilia kutumia madaraka kwa haraka, na kusababisha upotevu wa rasilimali na sheria za haraka
wrong_answers:
  - Serikali za kidemokrasia zinakuwa makini sana na polepole kutekeleza mageuzi muhimu
  - Viongozi wa kisiasa huendeleza mawazo ya muda mrefu ambayo yanapingana na mahitaji ya haraka ya raia
  - Mamlaka ya muda huunda utulivu mkubwa unaozuia mabadiliko muhimu ya kisiasa
explanation: |
  Maandishi yanaelezea kwamba mataifa ya kidemokrasia huunda ukiritimba wenye madhara hasa kwa sababu ni wa muda mfupi. Muda huu hupelekea vyama vya siasa kufurahia haraka faida za madaraka, na kusababisha upotevu wa rasilimali za umma na sheria zilizotungwa na watu binafsi ambao sio kila wakati wanafaa kwa kazi hizo. Hali ya muda huunda uharaka badala ya kutafakari kwa makini, tofauti na tafakari ya subira ambayo watu hutumia katika maamuzi yao binafsi. Chaguzi zingine zinaonyesha kimakosa kwamba nguvu ya muda huunda tahadhari, mawazo ya muda mrefu, au utulivu kupita kiasi, jambo ambalo linapingana na uchambuzi uliowasilishwa.
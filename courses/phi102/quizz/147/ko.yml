question: 민주주의 국가에 대한 비판에 따르면, 정치 권력의 일시적 특성에서 발생하는 근본적인 문제는 무엇인가요?
answer: 정당은 권력 이점을 빠르게 활용하기 위해 서두르며 자원 낭비와 성급한 입법으로 이어집니다
wrong_answers:
  - 민주 정부는 너무 신중하고 느리게 필요한 개혁을 실행합니다
  - 정치 지도자들은 즉각적인 시민 요구와 상충되는 장기적인 사고를 개발합니다
  - 일시적인 권력은 필요한 정치적 변화를 막는 과도한 안정을 초래합니다
explanation: |
  이 글에서는 민주주의 국가는 일시적이기 때문에 특히 해로운 독점을 낳는다고 설명합니다. 이러한 일시성으로 인해 정당은 권력의 이점을 성급하게 누리게 되고, 그 결과 공공 자원이 낭비되고 개인이 만든 법률이 항상 그러한 기능에 적합하지 않게 됩니다. 일시적 특성은 신중한 숙고보다는 조급함을 불러일으키며, 개인이 개인적인 결정을 내릴 때 인내심을 가지고 숙고하는 것과는 대조적입니다. 다른 옵션은 일시적인 힘이 신중함, 장기적인 사고 또는 과도한 안정성을 만들어낸다고 잘못 제안하는데, 이는 제시된 분석과 모순됩니다.
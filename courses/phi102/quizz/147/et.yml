question: Milline põhiprobleem tuleneb demokraatlike riikide kriitika kohaselt poliitilise võimu ajutisest olemusest?
answer: Poliitilised erakonnad kiirustavad kiiresti võimueeliseid ära kasutama, mis viib ressursside raiskamiseni ja kiirustava seadusandluseni
wrong_answers:
  - Demokraatlikud valitsused muutuvad liiga ettevaatlikuks ja aeglaseks vajalike reformide elluviimisel
  - Poliitilised juhid arendavad pikaajalist mõtlemist, mis on vastuolus kodanike vahetu vajadusega
  - Ajutine võim loob liigset stabiilsust, mis takistab vajalikke poliitilisi muutusi
explanation: |
  Tekstis selgitatakse, et demokraatlikud riigid loovad eriti kahjuliku monopoli, sest see on ajutine. See ajutisus viib poliitilised parteid võimu eeliseid kiirustades nautima, mille tulemuseks on avalike ressursside raiskamine ja seadused, mida teevad isikud, kes ei ole alati sellisteks funktsioonideks sobivad. Ajutisus tekitab pigem kiirust kui hoolikat kaalumist, mis on vastuolus kannatliku järelemõtlemisega, mida üksikisikud kasutavad isiklike otsuste tegemisel. Teised valikud viitavad ekslikult sellele, et ajutine võim tekitab ettevaatlikkust, pikaajalist mõtlemist või liigset stabiilsust, mis on vastuolus esitatud analüüsiga.
question: Dushingiye ku kunegura ibihugu vya demokarasi, ni ingorane iyihe y’ishimikiro iterwa n’uko ububasha bwa politike ari ubw’igihe gito?
answer: Imigambwe ya politike yihutira gukoresha inyungu z’ubutegetsi vyihuse, ivyo bikaba bituma habaho ugusesagura ubutunzi no gushinga amategeko vyihuse .
wrong_answers:
  - Intwaro za demokarasi zica zigira ubwenge cane kandi ziteba gushitsa ivugurura rikenewe .
  - Abarongozi ba politike baratsimbataza ivyiyumviro vy’igihe kirekire bihushanye n’ivyo abanyagihugu bakeneye vuba .
  - Ubutegetsi bw’igihe gito buratuma haba ugutekana birenze urugero kubuza amahinduka akenewe mu vya politike .
explanation: |
  Ico canditswe kirasigura ko ibihugu vya demokarasi birema ubutegetsi bwihariye butera ingorane kuko ari ubw’akanya gatoyi. Ukwo guhagarara kw’igihe gito gutuma imigambwe ya politike yihuta kuronka inyungu z’ubutegetsi, ivyo bikaba bituma habaho ugusesagura ubutunzi bwa Leta n’amategeko ashirwaho n’abantu badahora babereye izo nshingano. Kamere y’igihe gito ituma umuntu yihuta aho kwiyumvira yitonze, ivyo bikaba bitandukanye n’ukuzirikana kwihangana abantu bakoresha mu ngingo bafata bwite. Ayandi mahitamwo avuga mu buryo butari bwo ko ububasha bw’igihe gito butera ukwiyubara, ivyiyumviro vy’igihe kirekire canke ugushikama birenze urugero, ivyo bikaba bivuguruza isesengura ryashikirijwe.
question: 根據對民主國家的批判，政治權力的臨時性產生了什麼基本問題？
answer: 政黨急於快速利用權力優勢，導致資源浪費和草率立法
wrong_answers:
  - 民主政府在實施必要的改革時變得過於謹慎和緩慢
  - 政治領導人發展長期思維，但卻與當前的公民需求相衝突
  - 臨時權力造成過度穩定，妨礙必要的政治變革
explanation: |
  文中解釋，民主國家會造成特別有害的壟斷，因為它是暫時的。這種臨時性導致政黨匆忙享受權力的優勢，造成公共資源的浪費，以及由不一定適合擔任此類職能的個人所制定的法律。臨時性產生了急迫感，而不是經過深思熟慮，這與個人在做個人決策時的耐心思考形成了對比。其他選項錯誤地認為臨時權力會產生謹慎、長期思考或過度的穩定性，這與提出的分析相矛盾。
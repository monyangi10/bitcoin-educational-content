question: Mis on liberaalse majandusteooria kohaselt peamine põhjus, miks naised ja lapsed saavad kapitalistlikust arengust võrreldes vanade ühiskondadega eriti palju kasu?
answer: Töö muutub üha enam mehhaniseeritud ja intellektuaalseks, vähendades füüsilise jõu eeliseid ja nõudes haridust vahetu töö ees
wrong_answers:
  - Kapitalistlikud ühiskonnad loovad naistele ja lastele erilise õigusliku kaitse, mis vanades ühiskondades puudus
  - Kapitali akumuleerumine võimaldab jõukatel omanikel pakkuda paremaid töötingimusi moraalsest kohustusest lähtuvalt
  - Turukonkurents sunnib tööandjaid pakkuma naistele ja lastele kõrgemat palka, et meelitada ligi nappivat tööjõudu
explanation: |
  Paul Leroy-Beaulieu väitis, et areng mehhaniseeritud ja intellektuaalse töö suunas muutis põhjalikult eri tööliikide majanduslikku väärtust. Muistsetes ühiskondades oli füüsiline jõud esmatähtis, mis asetas naised ebasoodsasse olukorda ja muutis lapstööjõu kohe väärtuslikuks. Kapitalismi arenedes muutus töö vähem sõltuvaks füüsilisest jõust ja rohkem oskustest ja intellektist, mis võimaldas naistel tõhusamalt konkureerida ja muutis hariduse väärtuslikumaks kui kohese lapstööjõu. See struktuurimuutus, mitte niivõrd õiguslik kaitse või moraalne kohustus, lõi majanduslikud tingimused, mis parandasid naiste staatust.
question: Mikä on liberaalin talousteorian mukaan tärkein syy siihen, että naiset ja lapset hyötyvät erityisesti kapitalistisesta kehityksestä verrattuna muinaisiin yhteiskuntiin?
answer: Työ koneellistuu ja muuttuu älylliseksi, mikä vähentää fyysisen voiman etua ja edellyttää koulutusta välittömän työn sijaan
wrong_answers:
  - Kapitalistiset yhteiskunnat luovat naisille ja lapsille erityistä oikeudellista suojaa, joka puuttui muinaisista yhteiskunnista
  - Pääoman kasautuminen antaa varakkaille omistajille mahdollisuuden tarjota paremmat työolot moraalisesta velvollisuudesta johtuen
  - Markkinakilpailu pakottaa työnantajat tarjoamaan korkeampaa palkkaa naisille ja lapsille houkutellakseen niukkaa työvoimaa
explanation: |
  Paul Leroy-Beaulieu väitti, että kehitys kohti koneellistettua ja älyllistä työtä muutti perustavanlaatuisesti erityyppisen työn taloudellista arvoa. Muinaisissa yhteiskunnissa fyysinen voima oli etusijalla, mikä heikensi naisten asemaa ja teki lapsityövoimasta välittömästi arvokasta. Kapitalismin kehittyessä työ ei ollut enää niin riippuvaista fyysisestä voimasta vaan enemmän taidoista ja älystä, minkä ansiosta naiset pystyivät kilpailemaan tehokkaammin ja koulutus oli arvokkaampaa kuin välitön lapsityövoima. Tämä rakennemuutos, ei niinkään oikeudellinen suoja tai moraaliset velvoitteet, loi taloudelliset olosuhteet, jotka paransivat naisten asemaa.
question: Menurut teori ekonomi liberal, apa alasan utama mengapa perempuan dan anak-anak secara khusus diuntungkan oleh pembangunan kapitalis dibandingkan dengan masyarakat kuno?
answer: Pekerjaan menjadi semakin mekanis dan intelektual, mengurangi keuntungan dari kekuatan fisik dan membutuhkan pendidikan daripada tenaga kerja langsung
wrong_answers:
  - Masyarakat kapitalis menciptakan perlindungan hukum khusus untuk perempuan dan anak-anak yang tidak dimiliki oleh masyarakat kuno
  - Akumulasi modal memungkinkan pemilik yang kaya untuk menyediakan kondisi kerja yang lebih baik karena kewajiban moral
  - Persaingan pasar memaksa pengusaha untuk menawarkan upah yang lebih tinggi kepada perempuan dan anak-anak untuk menarik tenaga kerja yang langka
explanation: |
  Paul Leroy-Beaulieu berpendapat bahwa evolusi menuju pekerjaan mekanis dan intelektual secara fundamental mengubah nilai ekonomi dari berbagai jenis pekerjaan. Pada masyarakat kuno, kekuatan fisik adalah yang terpenting, sehingga merugikan perempuan dan membuat pekerja anak menjadi sangat berharga. Seiring dengan berkembangnya kapitalisme, pekerjaan menjadi tidak terlalu bergantung pada kekuatan fisik dan lebih bergantung pada keterampilan dan kecerdasan, sehingga memungkinkan perempuan untuk bersaing secara lebih efektif dan membuat pendidikan menjadi lebih berharga daripada pekerja anak. Perubahan struktural ini, alih-alih perlindungan hukum atau kewajiban moral, menciptakan kondisi ekonomi yang meningkatkan status mereka.
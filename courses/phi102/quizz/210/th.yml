question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม เหตุผลหลักที่ผู้หญิงและเด็กได้รับประโยชน์จากการพัฒนาทุนนิยมมากกว่าในสังคมโบราณคืออะไร?
answer: งานกลายเป็นระบบเครื่องจักรและปัญญามากขึ้น ลดความได้เปรียบของแรงกายและต้องการการศึกษามากกว่าการใช้แรงงานทันที
wrong_answers:
  - สังคมทุนนิยมสร้างการคุ้มครองทางกฎหมายเฉพาะสำหรับผู้หญิงและเด็กที่สังคมโบราณขาดแคลน
  - การสะสมทุนทำให้เจ้าของที่มั่งคั่งสามารถจัดหาสภาพการทำงานที่ดีขึ้นได้จากพันธะทางศีลธรรม
  - การแข่งขันในตลาดบังคับให้นายจ้างเสนอค่าจ้างที่สูงขึ้นให้กับผู้หญิงและเด็กเพื่อดึงดูดแรงงานที่ขาดแคลน
explanation: |
  Paul Leroy-Beaulieu โต้แย้งว่าการพัฒนาไปสู่การทำงานที่ใช้เครื่องจักรและปัญญาได้เปลี่ยนแปลงคุณค่าทางเศรษฐกิจของแรงงานประเภทต่างๆ อย่างพื้นฐาน ในสังคมโบราณ ความแข็งแรงทางกายภาพมีความสำคัญมาก ทำให้ผู้หญิงเสียเปรียบและทำให้แรงงานเด็กมีคุณค่าในทันที เมื่อระบบทุนนิยมพัฒนา การทำงานก็พึ่งพากำลังทางกายน้อยลงและพึ่งพาทักษะและปัญญามากขึ้น ทำให้ผู้หญิงสามารถแข่งขันได้อย่างมีประสิทธิภาพมากขึ้นและทำให้การศึกษามีคุณค่ามากกว่าแรงงานเด็กในทันที การเปลี่ยนแปลงโครงสร้างนี้ ไม่ใช่การคุ้มครองทางกฎหมายหรือพันธะทางศีลธรรม ได้สร้างเงื่อนไขทางเศรษฐกิจที่ปรับปรุงสถานะของพวกเขาให้ดีขึ้น
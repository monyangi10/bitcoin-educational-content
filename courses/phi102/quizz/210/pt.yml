question: De acordo com a teoria económica liberal, qual é a principal razão pela qual as mulheres e as crianças beneficiam particularmente do desenvolvimento capitalista em comparação com as sociedades antigas?
answer: O trabalho torna-se cada vez mais mecanizado e intelectualizado, reduzindo a vantagem da força física e exigindo educação em detrimento do trabalho imediato
wrong_answers:
  - As sociedades capitalistas criam protecções jurídicas específicas para mulheres e crianças que as sociedades antigas não tinham
  - A acumulação de capital permite que os proprietários ricos ofereçam melhores condições de trabalho por obrigação moral
  - A concorrência no mercado obriga os empregadores a oferecer salários mais elevados às mulheres e às crianças para atrair mão de obra escassa
explanation: |
  Paul Leroy-Beaulieu argumentou que a evolução para o trabalho mecanizado e intelectual alterou fundamentalmente o valor económico dos diferentes tipos de trabalho. Nas sociedades antigas, a força física era primordial, colocando as mulheres em desvantagem e tornando o trabalho infantil imediatamente valioso. Com o desenvolvimento do capitalismo, o trabalho tornou-se menos dependente da força física e mais dependente das competências e do intelecto, permitindo às mulheres competir mais eficazmente e tornando a educação mais valiosa do que o trabalho infantil imediato. Esta mudança estrutural, mais do que protecções legais ou obrigações morais, criou as condições económicas que melhoraram o seu estatuto.
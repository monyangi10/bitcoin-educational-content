question: 自由主義経済理論によれば、古代社会と比較して、女性と子供が資本主義の発展から特に恩恵を受ける主な理由は何か？
answer: 仕事の機械化・知的化が進み、体力の優位性が低下し、即戦力よりも教養が求められるようになる。
wrong_answers:
  - 資本主義社会は、古代社会には欠けていた女性や子どもに対する特別な法的保護を設けている。
  - 資本の蓄積は、裕福な所有者が道徳的義務からより良い労働条件を提供することを可能にする。
  - 市場競争により、雇用主は希少な労働力を確保するため、女性や子供に高い賃金を提示せざるを得ない。
explanation: |
  ポール・ルロワ＝ボリューは、機械化された知的労働への進化が、さまざまなタイプの労働の経済的価値を根本的に変えたと主張した。古代社会では、体力が最重要視され、女性は不利であり、児童労働はすぐに価値あるものとなった。資本主義が発展するにつれ、労働は肉体的な力に依存しなくなり、技能や知性に依存するようになった。法的保護や道徳的義務ではなく、この構造的変化が、女性の地位を向上させる経済的条件を作り出したのである。
question: Според либералната икономическа теория коя е основната причина, поради която жените и децата са особено облагодетелствани от капиталистическото развитие в сравнение с древните общества?
answer: Работата става все по-механизирана и интелектуална, което намалява предимството на физическата сила и изисква образование вместо непосредствен труд
wrong_answers:
  - Капиталистическите общества създават специфична правна защита за жените и децата, каквато древните общества не са имали
  - Натрупването на капитал позволява на богатите собственици да осигурят по-добри условия на труд поради морално задължение
  - Пазарната конкуренция принуждава работодателите да предлагат по-високи заплати на жените и децата, за да привлекат оскъдната работна ръка
explanation: |
  Пол Лерой-Божо твърди, че еволюцията към механизиран и интелектуален труд е променила фундаментално икономическата стойност на различните видове труд. В древните общества физическата сила е била от първостепенно значение, което е поставяло жените в неравностойно положение и е правело детския труд незабавно ценен. С развитието на капитализма трудът става все по-малко зависим от физическата сила и все повече от уменията и интелекта, което позволява на жените да се конкурират по-ефективно и прави образованието по-ценно от непосредствения детски труд. Тази структурна промяна, а не правната защита или моралните задължения, създаде икономическите условия, които подобриха техния статус.
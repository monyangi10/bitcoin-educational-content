question: Secondo la teoria economica liberale, qual è la ragione principale per cui le donne e i bambini beneficiano particolarmente dello sviluppo capitalistico rispetto alle società antiche?
answer: Il lavoro diventa sempre più meccanizzato e intellettuale, riducendo il vantaggio della forza fisica e richiedendo l'istruzione rispetto al lavoro immediato
wrong_answers:
  - Le società capitalistiche creano protezioni legali specifiche per le donne e i bambini che le società antiche non avevano
  - L'accumulo di capitale permette ai ricchi proprietari di offrire migliori condizioni di lavoro per obbligo morale
  - La concorrenza del mercato costringe i datori di lavoro a offrire salari più alti a donne e bambini per attirare la scarsa manodopera
explanation: |
  Paul Leroy-Beaulieu ha sostenuto che l'evoluzione verso il lavoro meccanizzato e intellettuale ha cambiato radicalmente il valore economico dei diversi tipi di lavoro. Nelle società antiche, la forza fisica era fondamentale, sfavorendo le donne e rendendo immediatamente prezioso il lavoro minorile. Con lo sviluppo del capitalismo, il lavoro è diventato meno dipendente dalla forza fisica e più dalle capacità e dall'intelletto, permettendo alle donne di competere in modo più efficace e rendendo l'istruzione più preziosa del lavoro minorile immediato. Questo cambiamento strutturale, piuttosto che le protezioni legali o gli obblighi morali, ha creato le condizioni economiche che hanno migliorato il loro status.
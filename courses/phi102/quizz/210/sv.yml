question: Enligt liberal ekonomisk teori, vad är det främsta skälet till att kvinnor och barn särskilt gynnas av den kapitalistiska utvecklingen jämfört med forntida samhällen?
answer: Arbetet blir alltmer mekaniserat och intellektuellt, vilket minskar fördelen med fysisk styrka och kräver utbildning i stället för omedelbar arbetskraft
wrong_answers:
  - Kapitalistiska samhällen skapar särskilda rättsliga skydd för kvinnor och barn som antika samhällen saknade
  - Kapitalackumulationen gör det möjligt för förmögna ägare att erbjuda bättre arbetsvillkor av moralisk plikt
  - Konkurrensen på marknaden tvingar arbetsgivarna att erbjuda högre löner till kvinnor och barn för att locka till sig den knappa arbetskraften
explanation: |
  Paul Leroy-Beaulieu hävdade att utvecklingen mot mekaniserat och intellektuellt arbete i grunden förändrade det ekonomiska värdet av olika typer av arbete. I forntida samhällen var fysisk styrka av största vikt, vilket missgynnade kvinnor och gjorde barnarbete omedelbart värdefullt. I takt med kapitalismens utveckling blev arbetet mindre beroende av fysisk styrka och mer av färdigheter och intellekt, vilket gjorde det möjligt för kvinnor att konkurrera mer effektivt och gjorde utbildning mer värdefullt än omedelbart barnarbete. Det var denna strukturella förändring, snarare än juridiska skydd eller moraliska skyldigheter, som skapade de ekonomiska förutsättningar som förbättrade kvinnornas ställning.
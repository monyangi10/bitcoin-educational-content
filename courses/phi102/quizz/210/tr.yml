question: Liberal ekonomi teorisine göre, kadınların ve çocukların eski toplumlara kıyasla kapitalist gelişmeden özellikle faydalanmalarının temel nedeni nedir?
answer: İş giderek daha mekanik ve entelektüel hale gelir, fiziksel gücün avantajını azaltır ve anlık emek yerine eğitim gerektirir
wrong_answers:
  - Kapitalist toplumlar, kadınlar ve çocuklar için eski toplumlarda olmayan özel yasal korumalar yaratır
  - Sermaye birikimi, varlıklı patronların ahlaki yükümlülükleri nedeniyle daha iyi çalışma koşulları sağlamalarına olanak tanır
  - Piyasa rekabeti, işverenleri kıt işgücünü çekmek için kadınlara ve çocuklara daha yüksek ücretler teklif etmeye zorlar
explanation: |
  Paul Leroy-Beaulieu, makineleşmiş ve entelektüel çalışmaya doğru evrimin, farklı emek türlerinin ekonomik değerini temelden değiştirdiğini savunmuştur. Eski toplumlarda fiziksel güç çok önemliydi, bu da kadınları dezavantajlı hale getiriyor ve çocuk emeğini hemen değerli kılıyordu. Kapitalizm geliştikçe, iş fiziksel güce daha az, beceri ve zekaya daha fazla bağımlı hale gelmiş, kadınların daha etkin bir şekilde rekabet etmesine olanak sağlamış ve eğitimi çocuk emeğinden daha değerli hale getirmiştir. Yasal korumalar ya da ahlaki yükümlülüklerden ziyade bu yapısal değişim, kadınların statüsünü iyileştiren ekonomik koşulları yaratmıştır.
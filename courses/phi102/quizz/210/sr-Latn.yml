question: Prema liberalnoj ekonomskoj teoriji, glavni razlog zašto žene i deca posebno imaju koristi od kapitalističkog razvoja u poređenju sa drevnim društvima je taj što kapitalizam podstiče ekonomski rast i inovacije, što dovodi do većih mogućnosti zapošljavanja i poboljšanja životnog standarda. Ove promene omogućavaju ženama veću ekonomsku nezavisnost i pristup obrazovanju, dok deca imaju koristi od boljih zdravstvenih i obrazovnih uslova.
answer: Rad postaje sve više mehanizovan i intelektualan, smanjujući prednost fizičke snage i zahtevajući obrazovanje umesto neposrednog rada.
wrong_answers:
  - Kapitalistička društva stvaraju specifične pravne zaštite za žene i decu koje su nedostajale drevnim društvima.
  - Akumulacija kapitala omogućava bogatim vlasnicima da obezbede bolje radne uslove iz moralne obaveze.
  - Tržišna konkurencija primorava poslodavce da ponude veće plate ženama i deci kako bi privukli oskudnu radnu snagu
explanation: |
  Paul Leroy-Beaulieu je tvrdio da je evolucija ka mehanizovanom i intelektualnom radu fundamentalno promenila ekonomsku vrednost različitih tipova rada. U drevnim društvima, fizička snaga je bila od presudnog značaja, stavljajući žene u nepovoljan položaj i čineći dečji rad odmah vrednim. Kako se kapitalizam razvijao, rad je postajao manje zavisan od fizičke sile, a više od veština i intelekta, omogućavajući ženama da se efikasnije takmiče i čineći obrazovanje vrednijim od trenutnog dečjeg rada. Ova strukturna promena, a ne pravne zaštite ili moralne obaveze, stvorila je ekonomske uslove koji su poboljšali njihov status.
question: Zgodnie z liberalną teorią ekonomiczną, jaki jest główny powód, dla którego kobiety i dzieci szczególnie korzystają z rozwoju kapitalistycznego w porównaniu ze społeczeństwami starożytnymi?
answer: Praca staje się coraz bardziej zmechanizowana i intelektualna, zmniejszając przewagę siły fizycznej i wymagając wykształcenia zamiast natychmiastowej pracy
wrong_answers:
  - Społeczeństwa kapitalistyczne zapewniają kobietom i dzieciom szczególną ochronę prawną, której brakowało w społeczeństwach starożytnych
  - Akumulacja kapitału pozwala bogatym właścicielom na zapewnienie lepszych warunków pracy z moralnego obowiązku
  - Konkurencja rynkowa zmusza pracodawców do oferowania wyższych płac kobietom i dzieciom w celu przyciągnięcia ograniczonej siły roboczej
explanation: |
  Paul Leroy-Beaulieu argumentował, że ewolucja w kierunku zmechanizowanej i intelektualnej pracy zasadniczo zmieniła ekonomiczną wartość różnych rodzajów pracy. W starożytnych społeczeństwach siła fizyczna była najważniejsza, co stawiało kobiety w niekorzystnej sytuacji i sprawiało, że praca dzieci była natychmiast ceniona. Wraz z rozwojem kapitalizmu praca stała się mniej zależna od siły fizycznej, a bardziej od umiejętności i intelektu, co pozwoliło kobietom skuteczniej konkurować i sprawiło, że edukacja stała się bardziej wartościowa niż natychmiastowa praca dzieci. Ta zmiana strukturalna, a nie ochrona prawna czy zobowiązania moralne, stworzyła warunki ekonomiczne, które poprawiły ich status.
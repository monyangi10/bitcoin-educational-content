question: Según la teoría económica liberal, ¿cuál es la razón principal por la que las mujeres y los niños se benefician especialmente del desarrollo capitalista en comparación con las sociedades antiguas?
answer: El trabajo se vuelve cada vez más mecanizado e intelectual, reduciendo la ventaja de la fuerza física y requiriendo educación sobre el trabajo inmediato
wrong_answers:
  - Las sociedades capitalistas crean protecciones jurídicas específicas para mujeres y niños de las que carecían las sociedades antiguas
  - La acumulación de capital permite a los propietarios ricos ofrecer mejores condiciones de trabajo por obligación moral
  - La competencia del mercado obliga a los empresarios a ofrecer salarios más altos a mujeres y niños para atraer la escasa mano de obra
explanation: |
  Paul Leroy-Beaulieu sostenía que la evolución hacia el trabajo mecanizado e intelectual modificó fundamentalmente el valor económico de los distintos tipos de trabajo. En las sociedades antiguas, la fuerza física era primordial, lo que perjudicaba a las mujeres y hacía que el trabajo infantil tuviera un valor inmediato. Con el desarrollo del capitalismo, el trabajo pasó a depender menos de la fuerza física y más de las aptitudes y el intelecto, lo que permitió a las mujeres competir con mayor eficacia e hizo que la educación tuviera más valor que el trabajo infantil inmediato. Este cambio estructural, más que las protecciones legales o las obligaciones morales, creó las condiciones económicas que mejoraron su estatus.
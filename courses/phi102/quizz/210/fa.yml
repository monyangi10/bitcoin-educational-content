question: بر اساس نظریه اقتصادی لیبرال، دلیل اصلی اینکه چرا زنان و کودکان به‌ویژه از توسعه سرمایه‌داری در مقایسه با جوامع باستانی بهره‌مند می‌شوند چیست؟
answer: کار به طور فزاینده‌ای مکانیزه و فکری می‌شود و مزیت قدرت بدنی را کاهش داده و نیاز به آموزش را بر کار فوری ترجیح می‌دهد.
wrong_answers:
  - جوامع سرمایه‌داری حفاظت‌های قانونی خاصی برای زنان و کودکان ایجاد می‌کنند که جوامع باستانی فاقد آن بودند.
  - انباشت سرمایه به صاحبان ثروتمند این امکان را می‌دهد که به دلیل تعهد اخلاقی شرایط کاری بهتری فراهم کنند.
  - رقابت در بازار کارفرمایان را مجبور می‌کند تا برای جذب نیروی کار کمیاب، دستمزدهای بالاتری به زنان و کودکان ارائه دهند.
explanation: |
  پل لروی-بالیو استدلال کرد که تکامل به سمت کار مکانیزه و فکری به طور اساسی ارزش اقتصادی انواع مختلف کار را تغییر داد. در جوامع باستانی، قدرت بدنی اهمیت زیادی داشت که به زنان آسیب می‌رساند و کار کودکان را بلافاصله ارزشمند می‌کرد. با توسعه سرمایه‌داری، کار کمتر به نیروی فیزیکی وابسته شد و بیشتر به مهارت‌ها و عقل متکی شد، که به زنان اجازه داد به طور مؤثرتری رقابت کنند و آموزش را ارزشمندتر از کار فوری کودکان کند. این تغییر ساختاری، به جای حمایت‌های قانونی یا تعهدات اخلاقی، شرایط اقتصادی را ایجاد کرد که وضعیت آن‌ها را بهبود بخشید.
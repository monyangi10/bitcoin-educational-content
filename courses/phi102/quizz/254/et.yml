question: Millist aluspõhimõtet esindab liberaalse poliitilise teooria liberaalses poliitikas Gustave de Molinari Ameerika kodusõja analüüsi kohaselt lahkulöömise mõiste?
answer: Valitsemisvabadus, mis võimaldab rühmadel vabatahtlikult valida oma poliitilist ühendust ja väljuda olemasolevatest kokkulepetest
wrong_answers:
  - Territoriaalse terviklikkuse põhimõte, mis hoiab ära poliitilise killustatuse ja säilitab stabiilsed geograafilised piirid
  - Kultuurilise ühtsuse doktriin, mis säilitab keelelisi ja ajaloolisi sidemeid sugulasrahvaste vahel
  - Kollektiivse suveräänsuse põhimõte, mis allutab individuaalse valiku rahvusliku enamuse tahtele
explanation: |
  Molinari nägi lahkulöömist kui "valitsemisvabaduse" väljendust - lepingulise vabaduse loogilist laiendamist poliitilistele kokkulepetele. Tõeline lepinguline vabadus ei nõua mitte ainult osalemist kokkulepetes, vaid ka vabadust nendega vabatahtlikult ühineda või neist väljuda. See seab kahtluse alla arusaama, et üksikisikud on riikide poolt alaliselt "valduses". Valed vastused esindavad vastandlikke põhimõtteid: territoriaalne terviklikkus keelab väljumisõigused, kultuuriline ühtsus tugineb kollektiivsele identiteedile, mitte individuaalsele valikule, ja kollektiivne suveräänsus allutab individuaalse autonoomia grupi tahtele - kõik need on vastuolus liberaalsete lepinguliste alustega.
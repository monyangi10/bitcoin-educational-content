question: Secondo l'analisi di Gustave de Molinari sulla guerra civile americana, quale principio fondamentale rappresenta il concetto di secessione nella teoria politica liberale?
answer: La libertà di governo, che consente ai gruppi di scegliere volontariamente la propria associazione politica e di uscire dagli accordi esistenti
wrong_answers:
  - Il principio dell'integrità territoriale, che impedisce la frammentazione politica e mantiene confini geografici stabili
  - La dottrina dell'unità culturale che preserva i legami linguistici e storici tra popolazioni affini
  - Il principio della sovranità collettiva che subordina la scelta individuale alla volontà della maggioranza nazionale
explanation: |
  Molinari vedeva la secessione come espressione della "libertà di governo", la logica estensione della libertà contrattuale agli accordi politici. La vera libertà contrattuale richiede non solo la partecipazione agli accordi, ma anche la libertà di entrarvi o uscirne volontariamente. Ciò mette in discussione l'idea che gli individui siano permanentemente "posseduti" dalle nazioni. Le risposte sbagliate rappresentano principi opposti: l'integrità territoriale nega i diritti di uscita, l'unità culturale si basa sull'identità collettiva piuttosto che sulla scelta individuale e la sovranità collettiva subordina l'autonomia individuale alla volontà del gruppo - tutti principi che contraddicono le basi contrattuali liberali.
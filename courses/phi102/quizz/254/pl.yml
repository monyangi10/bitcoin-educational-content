question: Zgodnie z analizą amerykańskiej wojny secesyjnej przeprowadzoną przez Gustave'a de Molinariego, jaką fundamentalną zasadę reprezentuje koncepcja secesji w liberalnej teorii politycznej?
answer: Wolność rządu, pozwalająca grupom na dobrowolny wybór stowarzyszenia politycznego i wyjście z istniejących ustaleń
wrong_answers:
  - Zasada integralności terytorialnej, która zapobiega rozdrobnieniu politycznemu i utrzymuje stabilne granice geograficzne
  - Doktryna jedności kulturowej, która zachowuje językowe i historyczne więzi między pokrewnymi populacjami
  - Zasada zbiorowej suwerenności, która podporządkowuje indywidualny wybór woli narodowej większości
explanation: |
  Molinari postrzegał secesję jako wyraz "wolności rządu" - logicznego rozszerzenia wolności kontraktowej na ustalenia polityczne. Prawdziwa wolność kontraktowa wymaga nie tylko uczestnictwa w umowach, ale także swobody dobrowolnego wchodzenia w nie lub wychodzenia z nich. Podważa to pogląd, że jednostki są trwale "posiadane" przez narody. Złe odpowiedzi reprezentują przeciwstawne zasady: integralność terytorialna zaprzecza prawom do wyjścia, jedność kulturowa opiera się na tożsamości zbiorowej, a nie na indywidualnym wyborze, a suwerenność zbiorowa podporządkowuje autonomię jednostki woli grupy - wszystko to jest sprzeczne z liberalnymi podstawami umownymi.
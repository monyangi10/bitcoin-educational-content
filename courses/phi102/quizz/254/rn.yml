question: Dukurikije icegeranyo ca Gustave de Molinari c’intambara y’abanyagihugu muri Amerika, ni ingingo ngenderwako iyihe y’ishimikiro iciyumviro co kwikukira giserukira mu nyigisho ya politike y’ubwigenge?
answer: Umwidegemvyo wo gutegeka, utuma imigwi ishobora guhitamwo ku bushake ishirahamwe ryayo rya politike no kuva mu ntunganyo zariho .
wrong_answers:
  - Ingingo ngenderwako y'ubumwe bw'intara ibuza uguca ibice mu vya politike no kubungabunga imbibe z'intara zihamye .
  - Inyigisho y'ubumwe bw'umuco izigama amasano y'ururimi n'amateka hagati y'abantu bafitaniye isano
  - Ingingo ngenderwako y'ubusegaba rusangi ishira amahitamwo y'umuntu ku giti ciwe munsi y'ubugombe bw'abantu benshi bo mu gihugu .
explanation: |
  Molinari yabonye ko kwitandukanya ari uguserura ‘umwidegemvyo wo gutwara’ - ukwagura mu buryo bubereye umwidegemvyo w’amasezerano ku ntunganyo za politike. Umwidegemvyo nyawo w’amasezerano ntusaba gusa kugira uruhara mu masezerano, ahubwo usaba umwidegemvyo wo kwinjiramwo canke gusohokamwo ku bushake. Ivyo birarwanya iciyumviro c’uko abantu ku giti cabo ‘bafise’ amahanga ubudasiba. Inyishu zitari zo zigereranya ingingo ngenderwako zitandukanye: ubutungane bw’intara burahakana uburenganzira bwo gusohoka, ubumwe bw’imico kama bwishingikiriza ku karanga rusangi kuruta uguhitamwo kw’umuntu ku giti ciwe, kandi ubusegaba rusangi bushira ubwigenge bw’umuntu ku giti ciwe munsi y’ubushake bw’umugwi - vyose bikaba bivuguruza imishinge y’amasezerano y’ubwigenge.
question: Hvilket grunnleggende prinsipp i liberal politisk teori representerer løsrivelsesbegrepet, ifølge Gustave de Molinaris analyse av den amerikanske borgerkrigen?
answer: Regjeringsfrihet, slik at grupper frivillig kan velge sin politiske tilknytning og gå ut av eksisterende ordninger
wrong_answers:
  - Prinsippet om territoriell integritet som forhindrer politisk fragmentering og opprettholder stabile geografiske grenser
  - Doktrinen om kulturell enhet som bevarer språklige og historiske bånd mellom beslektede folkegrupper
  - Det kollektive suverenitetsprinsippet som underordner individuelle valg til det nasjonale flertallets vilje
explanation: |
  Molinari så på løsrivelse som et uttrykk for "frihet til å regjere" - den logiske utvidelsen av avtalefriheten til politiske ordninger. Ekte avtalefrihet krever ikke bare deltakelse i avtaler, men også frihet til å gå inn i eller ut av dem frivillig. Dette utfordrer forestillingen om at individer er permanent "besatt" av nasjoner. De gale svarene representerer motstridende prinsipper: Territoriell integritet nekter utmeldingsrettigheter, kulturell enhet baserer seg på kollektiv identitet fremfor individuelle valg, og kollektiv suverenitet underordner individuell autonomi under gruppens vilje - alt sammen i strid med det liberale avtalefundamentet.
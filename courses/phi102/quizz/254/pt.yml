question: De acordo com a análise de Gustave de Molinari sobre a Guerra Civil Americana, que princípio fundamental representa o conceito de secessão na teoria política liberal?
answer: A liberdade de governo, permitindo que os grupos escolham voluntariamente a sua associação política e abandonem os acordos existentes
wrong_answers:
  - O princípio da integridade territorial, que evita a fragmentação política e mantém fronteiras geográficas estáveis
  - A doutrina da unidade cultural que preserva os laços linguísticos e históricos entre populações aparentadas
  - O princípio da soberania colectiva que subordina a escolha individual à vontade da maioria nacional
explanation: |
  Molinari via a secessão como a expressão da "liberdade de governo" - a extensão lógica da liberdade contratual aos acordos políticos. A verdadeira liberdade contratual requer não apenas a participação em acordos, mas a liberdade de entrar ou sair deles voluntariamente. Isto desafia a noção de que os indivíduos são permanentemente "possuídos" pelas nações. As respostas erradas representam princípios opostos: a integridade territorial nega os direitos de saída, a unidade cultural baseia-se na identidade colectiva em detrimento da escolha individual e a soberania colectiva subordina a autonomia individual à vontade do grupo - todos contradizem os fundamentos contratuais liberais.
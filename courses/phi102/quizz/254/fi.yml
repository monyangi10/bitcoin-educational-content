question: Gustave de Molinarin Yhdysvaltain sisällissotaa koskevan analyysin mukaan mitä perusperiaatetta liberaalin poliittisen teorian käsite "irtautuminen" edustaa?
answer: Hallituksen vapaus, jonka ansiosta ryhmät voivat vapaaehtoisesti valita poliittisen yhdistymisensä ja irtautua nykyisistä järjestelyistä
wrong_answers:
  - Alueellisen koskemattomuuden periaate, jolla estetään poliittinen pirstoutuminen ja säilytetään vakaat maantieteelliset rajat
  - Kulttuurinen yhtenäisyysoppi, joka säilyttää kielelliset ja historialliset siteet sukulaisväestöjen välillä
  - Kollektiivisen suvereniteetin periaate, jonka mukaan yksilön valinnat alistetaan kansallisen enemmistön tahdolle
explanation: |
  Molinari katsoi, että irtautuminen ilmentää "hallituksen vapautta" - sopimusvapauden loogista laajentamista poliittisiin järjestelyihin. Todellinen sopimusvapaus edellyttää paitsi osallistumista sopimuksiin myös vapautta liittyä niihin tai irtautua niistä vapaaehtoisesti. Tämä kyseenalaistaa käsityksen, jonka mukaan yksilöt ovat pysyvästi kansakuntien "hallussa". Väärät vastaukset edustavat vastakkaisia periaatteita: alueellinen koskemattomuus kieltää poistumisoikeudet, kulttuurinen yhtenäisyys perustuu kollektiiviseen identiteettiin yksilön valinnanvapauden sijaan ja kollektiivinen suvereniteetti alistaa yksilön itsemääräämisoikeuden ryhmän tahdolle - kaikki nämä ovat ristiriidassa liberaalin sopimuksellisen perustan kanssa.
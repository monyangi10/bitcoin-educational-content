question: Mikä on 1800-luvun liberaalien ajattelijoiden mukaan vapauden luonne kautta historian?
answer: Vapaus on progressiivinen historiallinen rakennelma, joka kehittyy vähitellen vuosisatojen kuluessa
wrong_answers:
  - Vapaus on luonnollinen muuttumaton tila, joka ihmisillä oli muinoin
  - Vapaus oli suurinta alkukantaisissa yhteiskunnissa, ja se on vähentynyt sivilisaation myötä
  - Vapaus on olemassa yhtä lailla kaikilla historiallisilla kausilla aineellisista olosuhteista riippumatta
explanation: |
  1800-luvun liberaalit ajattelijat väittivät, että vapaus ei ole luonnollinen tila, josta ihmiskunta kerran nautti ja jonka se sitten menetti, vaan pikemminkin ajan myötä kehittyvä historiallinen rakennelma. Tämä näkemys vastusti suoraan myyttejä kultaisesta aikakaudesta, jolloin ihmisten oletettiin nauttivan alkuperäisestä vapaudesta. Luvussa selitetään, että jokainen vuosisata tuo mukanaan teknisiä ja taloudellisia parannuksia, jotka tekevät vapaudesta käytännöllisemmän. Tämä näkökulma auttaa selittämään, miksi vapaus on nykyään helpommin saavutettavissa kuin antiikin aikana, mikä on ristiriidassa romanttisten käsitysten kanssa alkukantaisesta vapaudesta tai ajatuksesta, jonka mukaan vapaus on pysynyt samana läpi historian.
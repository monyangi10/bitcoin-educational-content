question: Wat is volgens liberale denkers uit de 19e eeuw de aard van vrijheid door de geschiedenis heen?
answer: Vrijheid is een progressieve historische constructie die zich door de eeuwen heen geleidelijk ontwikkelt
wrong_answers:
  - Vrijheid is een natuurlijke onveranderlijke staat die mensen bezaten in de oudheid
  - Vrijheid was het grootst in primitieve samenlevingen en is afgenomen met de beschaving
  - Vrijheid bestaat in alle historische perioden in gelijke mate, ongeacht de materiële omstandigheden
explanation: |
  Liberale denkers uit de 19e eeuw stelden dat vrijheid geen natuurlijke staat is die de mensheid ooit genoot en verloor, maar eerder een progressieve historische constructie die zich in de loop van de tijd ontwikkelt. Deze zienswijze stond lijnrecht tegenover mythes over een gouden eeuw waarin mensen verondersteld werden van oorspronkelijke vrijheid te genieten. Het hoofdstuk legt uit dat elke eeuw technische en economische verbeteringen brengt die vrijheid praktischer maken. Dit perspectief helpt verklaren waarom vrijheid vandaag de dag beter haalbaar is dan in de oudheid, in tegenspraak met romantische opvattingen over primitieve vrijheid of het idee dat vrijheid door de geschiedenis heen constant is gebleven.
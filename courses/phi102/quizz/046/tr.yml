question: On dokuzuncu yüzyılın liberal düşünürlerine göre, tarih boyunca özgürlüğün doğası nedir?
answer: Özgürlük, yüzyıllar boyunca kademeli olarak gelişen ilerici bir tarihsel yapıdır
wrong_answers:
  - Özgürlük, insanların eski çağlarda sahip olduğu doğal ve değişmez bir durumdur
  - Özgürlük ilkel toplumlarda en yüksek seviyedeydi ve uygarlıkla birlikte azaldı
  - Özgürlük, maddi koşullardan bağımsız olarak tüm tarihsel dönemlerde eşit olarak mevcuttur
explanation: |
  19'uncu yüzyılın liberal düşünürleri, özgürlüğün insanlığın bir zamanlar sahip olduğu ve kaybettiği doğal bir durum değil, zaman içinde gelişen ilerici bir tarihsel yapı olduğunu savunmuşlardır. Bu görüş, insanların orijinal özgürlüğün tadını çıkardığı varsayılan altın çağ mitlerine doğrudan karşı çıkmıştır. Bu bölüm, her yüzyılın özgürlüğü daha uygulanabilir hale getiren teknik ve ekonomik gelişmeleri beraberinde getirdiğini açıklamaktadır. Bu bakış açısı, ilkel özgürlüğe dair romantik kavramlarla ya da özgürlüğün tarih boyunca sabit kaldığı düşüncesiyle çelişerek, özgürlüğün bugün neden antik çağda olduğundan daha ulaşılabilir olduğunu açıklamaya yardımcı olmaktadır.
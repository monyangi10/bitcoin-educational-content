question: Nk’uko abazirikana b’abanyagihugu bo mu kinjana ca 19 babivuga, umwidegemvyo wameze gute mu mateka yose?
answer: Umwidegemvyo ni inyubakwa y'amateka itera imbere buhoro buhoro mu binjana n'ibindi .
wrong_answers:
  - Umwidegemvyo ni ikintu kidahinduka abantu bari bafise mu bihe vya kera .
  - Umwidegemvyo wari munini cane mu mibano ya kera kandi waragabanutse n'iterambere
  - Umwidegemvyo ubaho kimwe mu bihe vyose vya kahise ata kuraba ivy'umubiri .
explanation: |
  Abanyabwenge b’abanyagihugu bo mu kinjana ca 19 bavuga ko umwidegemvyo atari ikintu umuntu yahora afise maze akagitakaza, ahubwo ko ari inyubakwa y’amateka itera imbere uko igihe kigenda kirarenga. Ico ciyumviro cari kirwanya ata guca ku ruhande imigani yerekeye ikiringo c’inzahabu igihe abantu bivugwa ko bari bafise umwidegemvyo wo mu ntango. Ico kigabane kirasigura yuko ikinjana cose kizana iterambere mu vy’ubuhinga no mu vy’ubutunzi bituma umwidegemvyo urushiriza gukoreshwa. Ukwo kubona ibintu birafasha gusigura igituma umwidegemvyo ushobora gushikwako muri iki gihe kuruta uko wari umeze kera, bikaba bivuguruza ivyiyumviro vy’urukundo vyerekeye umwidegemvyo wa kera canke iciyumviro c’uko umwidegemvyo wagumyeho mu mateka yose.
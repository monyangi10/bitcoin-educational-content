question: Jaká je podle liberálních myslitelů 19. století povaha svobody v dějinách?
answer: Svoboda je postupná historická konstrukce, která se vyvíjí postupně po staletí
wrong_answers:
  - Svoboda je přirozený neměnný stav, který lidé měli už v dávných dobách
  - Svoboda byla největší v primitivních společnostech a s civilizací se zmenšila
  - Svoboda existuje stejně ve všech historických obdobích bez ohledu na materiální podmínky
explanation: |
  Liberální myslitelé 19. století tvrdili, že svoboda není přirozený stav, který lidstvo kdysi užívalo a ztratilo, ale spíše postupná historická konstrukce, která se vyvíjí v čase. Tento názor přímo odporoval mýtům o zlatém věku, kdy se lidé údajně těšili původní svobodě. Kapitola vysvětluje, že každé století přináší technická a ekonomická zlepšení, která činí svobodu praktičtější. Tento pohled pomáhá vysvětlit, proč je svoboda dnes dosažitelnější než ve starověku, a odporuje tak romantickým představám o prvotní svobodě nebo myšlence, že svoboda zůstala v průběhu dějin neměnná.
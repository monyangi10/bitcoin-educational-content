question: Según los pensadores liberales del siglo XIX, ¿cuál es la naturaleza de la libertad a lo largo de la historia?
answer: La libertad es una construcción histórica progresiva que se desarrolla gradualmente a lo largo de los siglos
wrong_answers:
  - La libertad es un estado natural inmutable que los humanos poseían en la antigüedad
  - La libertad era mayor en las sociedades primitivas y ha disminuido con la civilización
  - La libertad existe por igual en todos los periodos históricos, independientemente de las condiciones materiales
explanation: |
  Los pensadores liberales del siglo XIX sostenían que la libertad no es un estado natural que la humanidad disfrutó una vez y perdió, sino una construcción histórica progresiva que se desarrolla con el tiempo. Este punto de vista se oponía directamente a los mitos de una edad de oro en la que los humanos supuestamente disfrutaban de la libertad original. El capítulo explica que cada siglo trae consigo mejoras técnicas y económicas que hacen que la libertad sea más practicable. Esta perspectiva ayuda a explicar por qué la libertad es más alcanzable hoy que en la antigüedad, contradiciendo las nociones románticas de la libertad primitiva o la idea de que la libertad ha permanecido constante a lo largo de la historia.
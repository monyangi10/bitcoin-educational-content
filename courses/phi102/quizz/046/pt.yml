question: De acordo com os pensadores liberais do século XIX, qual é a natureza da liberdade ao longo da história?
answer: A liberdade é uma construção histórica progressiva que se desenvolve gradualmente ao longo dos séculos
wrong_answers:
  - A liberdade é um estado natural imutável que os seres humanos possuíam nos tempos antigos
  - A liberdade era maior nas sociedades primitivas e foi diminuindo com a civilização
  - A liberdade existe igualmente em todos os períodos históricos, independentemente das condições materiais
explanation: |
  Os pensadores liberais do século XIX defendiam que a liberdade não é um estado natural de que a humanidade desfrutou e perdeu, mas antes uma construção histórica progressiva que se desenvolve ao longo do tempo. Este ponto de vista opunha-se diretamente aos mitos de uma idade de ouro em que os seres humanos supostamente gozavam de uma liberdade original. O capítulo explica que cada século traz consigo melhorias técnicas e económicas que tornam a liberdade mais praticável. Esta perspetiva ajuda a explicar por que razão a liberdade é hoje mais exequível do que na Antiguidade, contrariando as noções românticas de liberdade primitiva ou a ideia de que a liberdade se manteve constante ao longo da História.
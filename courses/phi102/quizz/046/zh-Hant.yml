question: 根據 19 世紀自由主義思想家的看法，歷史上自由的本質是什麼？
answer: 自由是一種漸進式的歷史建構，經過數個世紀逐漸發展而成
wrong_answers:
  - 自由是古代人類所擁有的一種自然不變的狀態
  - 原始社會的自由度最高，但隨著文明的進步，自由度也隨之下降。
  - 不論物質條件如何，自由在所有歷史時期都同樣存在
explanation: |
  十九世紀的自由思想家認為，自由不是人類曾經享有又失去的一種自然狀態，而是一種隨時間發展的漸進式歷史建構。這種觀點直接反對人類理應享有原始自由的黃金時代的神話。本章解釋，每個世紀都會帶來技術和經濟上的改進，使自由更加實際可行。這個觀點有助於解釋為什麼今天的自由比古代更容易實現，這與原始自由的浪漫觀念或自由在歷史上保持不變的想法相矛盾。
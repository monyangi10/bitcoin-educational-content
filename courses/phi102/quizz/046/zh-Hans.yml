question: 19 世纪的自由主义思想家认为，纵观历史，自由的本质是什么？
answer: 自由是一种渐进的历史建构，在几个世纪中逐步发展
wrong_answers:
  - 自由是人类在远古时代就拥有的一种自然不变的状态
  - 原始社会的自由度最高，随着文明的发展而下降
  - 无论物质条件如何，自由在所有历史时期都同样存在
explanation: |
  19 世纪的自由主义思想家们认为，自由并不是人类曾经享有又失去的一种自然状态，而是随着时间的推移逐渐形成的一种历史构造。这种观点直接反对所谓人类享有原始自由的黄金时代的神话。该章解释说，每个世纪都会带来技术和经济上的进步，使自由更加切实可行。这一观点有助于解释为什么今天的自由比古代更容易实现，与原始自由的浪漫观念或自由在整个历史中保持不变的观点相矛盾。
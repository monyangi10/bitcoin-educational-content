question: Prema liberalnim misliocima 19. veka, kakva je priroda slobode kroz istoriju?
answer: Sloboda je progresivna istorijska konstrukcija koja se postepeno razvija tokom vekova
wrong_answers:
  - Sloboda je prirodno nepromenljivo stanje koje su ljudi posedovali u drevnim vremenima
  - Sloboda je bila najveća u primitivnim društvima i opala je sa civilizacijom.
  - Sloboda postoji jednako u svim istorijskim periodima bez obzira na materijalne uslove
explanation: |
  Liberalni mislioci 19. veka tvrdili su da sloboda nije prirodno stanje koje je čovečanstvo nekada uživalo i izgubilo, već progresivna istorijska konstrukcija koja se razvija tokom vremena. Ovo gledište direktno se suprotstavlja mitovima o zlatnom dobu kada su ljudi navodno uživali prvobitnu slobodu. Poglavlje objašnjava da svaki vek donosi tehnička i ekonomska poboljšanja koja čine slobodu ostvarivijom. Ova perspektiva pomaže da se objasni zašto je sloboda danas ostvarljivija nego što je bila u antici, protivrečeći romantičnim predstavama o primitivnoj slobodi ili ideji da je sloboda ostala konstantna kroz istoriju.
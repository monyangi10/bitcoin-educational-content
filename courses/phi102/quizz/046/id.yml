question: Menurut para pemikir liberal abad ke-19, apa hakikat kebebasan sepanjang sejarah?
answer: Kebebasan adalah konstruksi sejarah progresif yang berkembang secara bertahap selama berabad-abad
wrong_answers:
  - Kebebasan adalah keadaan alamiah yang tidak dapat diubah yang dimiliki manusia pada zaman kuno
  - Kebebasan adalah yang terbesar dalam masyarakat primitif dan telah menurun seiring dengan peradaban
  - Kebebasan ada secara merata di semua periode sejarah terlepas dari kondisi material
explanation: |
  Para pemikir liberal pada abad ke-19 berpendapat bahwa kebebasan bukanlah keadaan alamiah yang pernah dinikmati manusia dan kemudian hilang, melainkan sebuah konstruksi sejarah progresif yang berkembang dari waktu ke waktu. Pandangan ini secara langsung menentang mitos zaman keemasan ketika manusia seharusnya menikmati kebebasan yang asli. Bab ini menjelaskan bahwa setiap abad membawa perbaikan teknis dan ekonomi yang membuat kebebasan menjadi lebih praktis. Perspektif ini membantu menjelaskan mengapa kebebasan lebih mudah dicapai saat ini daripada di zaman dahulu, yang bertentangan dengan gagasan romantis tentang kebebasan primitif atau gagasan bahwa kebebasan tetap konstan sepanjang sejarah.
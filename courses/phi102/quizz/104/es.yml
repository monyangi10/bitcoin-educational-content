question: ¿Qué representa fundamentalmente el concepto de producción según la teoría económica liberal?
answer: La creación de una nueva utilidad o servicio que beneficie a otros o a uno mismo
wrong_answers:
  - La transformación física de materias primas en productos acabados
  - La acumulación de riqueza mediante la propiedad de activos productivos
  - La organización del trabajo para maximizar la eficiencia de la producción
explanation: |
  En la teoría económica liberal, la producción consiste fundamentalmente en crear una nueva utilidad o prestar un servicio, no en una mera transformación física. El texto subraya que los seres humanos no pueden crear ni destruir materia (principio de Lavoisier), por lo que la producción significa añadir valor a través del servicio. Por ejemplo, un comerciante crea utilidad haciendo accesibles los bienes a los consumidores de forma organizada. Esta definición más amplia incluye la producción intelectual e inmaterial, como la enseñanza o los servicios médicos, que crean utilidad duradera aunque su "producto" no sea físicamente tangible. Las otras opciones se centran en los procesos físicos, la acumulación de riqueza o la eficiencia organizativa, y pasan por alto el concepto básico de creación de utilidad.
question: Wat stelt het concept productie in essentie voor volgens de liberale economische theorie?
answer: Het creëren van een nieuw nut of dienst waar anderen of zichzelf beter van worden
wrong_answers:
  - De fysieke transformatie van grondstoffen in eindproducten
  - De accumulatie van rijkdom door eigendom van productieve activa
  - De organisatie van arbeid om de efficiëntie van de output te maximaliseren
explanation: |
  Productie in de liberale economische theorie gaat fundamenteel over het creëren van nieuw nut of het leveren van diensten, niet alleen over fysieke transformatie. De tekst benadrukt dat mensen geen materie kunnen creëren of vernietigen (principe van Lavoisier), dus productie betekent waarde toevoegen door middel van dienstverlening. Een handelaar creëert bijvoorbeeld nut door goederen op een georganiseerde manier toegankelijk te maken voor consumenten. Deze bredere definitie omvat ook intellectuele en immateriële productie, zoals onderwijs of medische diensten, die blijvend nut creëren ook al is hun 'product' niet fysiek tastbaar. De andere opties richten zich op fysieke processen, welvaartsaccumulatie of organisatorische efficiëntie, maar missen het kernconcept van nutscreatie.
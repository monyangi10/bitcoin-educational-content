question: Vad innebär produktionsbegreppet i grunden enligt liberal ekonomisk teori?
answer: Skapandet av en ny nytta eller tjänst som gynnar andra eller en själv
wrong_answers:
  - Den fysiska omvandlingen av råvaror till färdiga varor
  - Ackumulering av förmögenhet genom ägande av produktiva tillgångar
  - Organisering av arbetet för att maximera produktionseffektiviteten
explanation: |
  Produktion i liberal ekonomisk teori handlar i grunden om att skapa ny nytta eller tillhandahålla tjänster, inte bara fysisk omvandling. I texten betonas att människan inte kan skapa eller förstöra materia (Lavoisiers princip), så produktion innebär att tillföra värde genom service. En handlare skapar till exempel nytta genom att göra varor tillgängliga för konsumenter på ett organiserat sätt. Denna bredare definition inkluderar intellektuell och immateriell produktion, som undervisning eller medicinska tjänster, som skapar varaktig nytta även om deras "produkt" inte är fysiskt påtaglig. De andra alternativen fokuserar på fysiska processer, förmögenhetsackumulering eller organisatorisk effektivitet och missar kärnan i begreppet nyttoskapande.
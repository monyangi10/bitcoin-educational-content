question: چه چیزی نشان می‌دهد که مالکیت صرفاً یک اختراع انسانی نیست بلکه یک پدیده طبیعی است؟
answer: حیوانات از قلمروها و فضاهای خود در برابر نفوذ دیگران دفاع می‌کنند.
wrong_answers:
  - دولت‌ها قوانینی را برای حفاظت از حقوق مالکیت فردی ایجاد می‌کنند.
  - متون دینی رهنمودهای اخلاقی برای مالکیت کالاها تعیین می‌کنند
  - نظریه‌های اقتصادی کارایی سیستم‌های مالکیت خصوصی را اثبات می‌کنند
explanation: |
  این متن توضیح می‌دهد که مالکیت حتی در میان حیوانات نیز مشاهده می‌شود، که به طور طبیعی قلمروها و فضاها را تقسیم و در برابر تجاوزات دیگران دفاع می‌کنند. این نشان می‌دهد که مالکیت یک پدیده طبیعی اساسی است که به طور مستقل از قوانین، نظریه‌ها یا سیستم‌های اخلاقی انسانی وجود دارد. مشاهده رفتار قلمرویی در حیوانات نشان می‌دهد که مفهوم استفاده انحصاری و دفاع از منابع پیش از تمدن انسانی و چارچوب‌های قانونی وجود داشته است. این پایه طبیعی از این استدلال حمایت می‌کند که حقوق مالکیت ساختارهای مصنوعی نیستند بلکه از غرایز و نیازهای بقای اساسی که در میان گونه‌ها وجود دارد، ناشی می‌شوند.
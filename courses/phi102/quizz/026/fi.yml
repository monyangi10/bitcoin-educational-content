question: Mikä osoittaa, että omaisuus ei ole vain ihmisen keksintö vaan luonnollinen ilmiö?
answer: Eläimet puolustavat reviirejä ja tiloja muiden tunkeutumista vastaan
wrong_answers:
  - Hallitukset luovat lakeja suojellakseen yksilön omistusoikeuksia
  - Uskonnollisissa teksteissä vahvistetaan moraaliset suuntaviivat tavaroiden hallussapidolle
  - Talousteoriat todistavat yksityisomistusjärjestelmien tehokkuuden
explanation: |
  Tekstissä selitetään, että omistusoikeutta on havaittavissa jopa eläimillä, jotka luonnostaan jakavat ja puolustavat alueita ja tiloja muiden tunkeutumista vastaan. Tämä osoittaa, että omaisuus on perustavanlaatuinen luonnonilmiö, joka on olemassa riippumatta ihmisen laeista, teorioista tai moraalijärjestelmistä. Eläinten reviirikäyttäytymisen havainnointi osoittaa, että resurssien yksinomaisen käytön ja puolustamisen käsite on peräisin jo ennen ihmisen sivilisaatiota ja oikeudellisia puitteita. Tämä luonnollinen perusta tukee väitettä, jonka mukaan omistusoikeudet eivät ole keinotekoisia konstruktioita, vaan ne syntyvät perustavanlaatuisista eloonjäämisvaistoista ja -tarpeista, joita esiintyy kaikissa lajeissa.
question: What demonstrates that property is not merely a human invention but a natural phenomenon?
answer: Animals defend territories and spaces against intrusions from others
wrong_answers:
  - Governments create laws to protect individual ownership rights
  - Religious texts establish moral guidelines for possession of goods
  - Economic theories prove the efficiency of private ownership systems
explanation: |
  The text explains that property is observed even among animals, who naturally divide and defend territories and spaces against intrusions from others. This demonstrates that property is a fundamental natural phenomenon that exists independently of human laws, theories, or moral systems. The observation of territorial behavior in animals shows that the concept of exclusive use and defense of resources predates human civilization and legal frameworks. This natural foundation supports the argument that property rights are not artificial constructs but emerge from basic survival instincts and needs that exist across species.
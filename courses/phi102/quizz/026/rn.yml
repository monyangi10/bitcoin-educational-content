question: Ni igiki cerekana ko umutungo atari ikintu umuntu yahinguye gusa, ahubwo ko ari ikintu gisanzwe?
answer: Inyamaswa zikingira uturere n'ahantu kugira ngo ntizigere zitera abandi
wrong_answers:
  - Leta zishiraho amategeko yo kurinda uburenganzira bw'umuntu ku giti ciwe
  - Ivyanditswe vy’idini birashiraho ingingo ngenderwako zijanye n’inyifato runtu ku bijanye no kugira ibintu .
  - Ivyiyumviro vy'ubutunzi vyerekana ko uburyo bw'ubutunzi bwigenga bukora neza
explanation: |
  Ico canditswe kirasigura yuko ubutunzi buboneka no mu bikoko, ivyo bikaba ari vyo bigabanya kandi bikagwanira uturere n’ibibanza kugira ngo abandi ntibavyinjiremwo. Ivyo vyerekana ko umutungo ari ikintu nyamukuru co mu kamere kibaho ata mategeko y’abantu, inyigisho canke inyifato runtu. Ukwihweza inyifato y’intara mu bikoko vyerekana ko iciyumviro co gukoresha no kurwanira ubutunzi gusa cari imbere y’ubutetsi bw’abantu n’inzego z’amategeko. Uwo mushinge w’ibidukikije ushigikira iciyumviro c’uko uburenganzira bw’itunga atari ibintu vyubatswe n’abantu ariko buva ku kamere k’ishimikiro k’ubuzima n’ivyo umuntu akeneye biriho mu bwoko bwose.
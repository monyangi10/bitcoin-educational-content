question: O que demonstra que a propriedade não é apenas uma invenção humana, mas um fenómeno natural?
answer: Os animais defendem territórios e espaços contra intrusões de outros
wrong_answers:
  - Os governos criam leis para proteger os direitos de propriedade individuais
  - Os textos religiosos estabelecem diretrizes morais para a posse de bens
  - As teorias económicas provam a eficiência dos sistemas de propriedade privada
explanation: |
  O texto explica que a propriedade é observada mesmo entre os animais, que naturalmente dividem e defendem territórios e espaços contra as intrusões de outros. Isto demonstra que a propriedade é um fenómeno natural fundamental que existe independentemente das leis, teorias ou sistemas morais humanos. A observação do comportamento territorial dos animais mostra que o conceito de uso e defesa exclusivos dos recursos é anterior à civilização humana e aos quadros jurídicos. Esta base natural apoia o argumento de que os direitos de propriedade não são construções artificiais, mas emergem de instintos e necessidades básicas de sobrevivência que existem em todas as espécies.
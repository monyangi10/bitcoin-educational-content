question: Ni nini kinachoonyesha kwamba mali si uvumbuzi wa binadamu tu bali ni jambo la asili?
answer: Wanyama hulinda maeneo na nafasi dhidi ya uvamizi kutoka kwa wengine
wrong_answers:
  - Serikali huunda sheria ili kulinda haki za umiliki wa mtu binafsi
  - Maandiko ya kidini yanaweka miongozo ya maadili ya kumiliki bidhaa
  - Nadharia za kiuchumi zinathibitisha ufanisi wa mifumo ya umiliki binafsi
explanation: |
  Maandishi yanaelezea kwamba mali huzingatiwa hata miongoni mwa wanyama, ambao kwa kawaida hugawanya na kulinda maeneo na nafasi dhidi ya uvamizi kutoka kwa wengine. Hii inaonyesha kwamba mali ni jambo la asili la msingi ambalo lipo bila kujali sheria, nadharia, au mifumo ya maadili ya binadamu. Uchunguzi wa tabia ya eneo kwa wanyama unaonyesha kwamba dhana ya matumizi ya kipekee na ulinzi wa rasilimali ilitangulia ustaarabu wa binadamu na mifumo ya kisheria. Msingi huu wa asili unaunga mkono hoja kwamba haki za mali si miundo bandia bali hutokana na silika na mahitaji ya msingi ya kuishi ambayo yapo katika spishi zote.
question: Hva viser at eiendom ikke bare er en menneskelig oppfinnelse, men et naturfenomen?
answer: Dyr forsvarer territorier og områder mot inntrenging fra andre
wrong_answers:
  - Myndighetene lager lover for å beskytte individuelle eierrettigheter
  - Religiøse tekster fastsetter moralske retningslinjer for besittelse av goder
  - Økonomiske teorier beviser effektiviteten til private eierskapssystemer
explanation: |
  Teksten forklarer at eiendom også finnes blant dyr, som naturlig deler opp og forsvarer territorier og områder mot inntrenging fra andre. Dette viser at eiendom er et grunnleggende naturfenomen som eksisterer uavhengig av menneskelige lover, teorier eller moralsystemer. Observasjonen av dyrs territorielle atferd viser at konseptet om eksklusiv bruk og forsvar av ressurser eksisterte før menneskets sivilisasjon og juridiske rammeverk. Dette naturlige grunnlaget underbygger argumentet om at eiendomsrett ikke er kunstige konstruksjoner, men springer ut av grunnleggende overlevelsesinstinkter og behov som eksisterer på tvers av arter.
question: Vad visar att egendom inte bara är en mänsklig uppfinning utan ett naturfenomen?
answer: Djur försvarar revir och utrymmen mot intrång från andra
wrong_answers:
  - Regeringar stiftar lagar för att skydda enskildas äganderätt
  - Religiösa texter fastställer moraliska riktlinjer för innehav av varor
  - Ekonomiska teorier bevisar effektiviteten i system med privat ägande
explanation: |
  I texten förklaras att egendom förekommer även bland djur, som på ett naturligt sätt delar upp och försvarar territorier och utrymmen mot intrång från andra. Detta visar att egendom är ett grundläggande naturfenomen som existerar oberoende av mänskliga lagar, teorier eller moraliska system. Observationen av revirbeteende hos djur visar att konceptet med exklusiv användning och försvar av resurser föregår den mänskliga civilisationen och juridiska ramverk. Denna naturliga grund stödjer argumentet att äganderätten inte är en artificiell konstruktion utan har sitt ursprung i grundläggande överlevnadsinstinkter och behov som finns hos alla arter.
question: ¿Qué demuestra que la propiedad no es una mera invención humana, sino un fenómeno natural?
answer: Los animales defienden territorios y espacios frente a la intrusión de otros
wrong_answers:
  - Los gobiernos crean leyes para proteger los derechos de propiedad individual
  - Los textos religiosos establecen pautas morales para la posesión de bienes
  - Las teorías económicas demuestran la eficacia de los sistemas de propiedad privada
explanation: |
  El texto explica que la propiedad se observa incluso entre los animales, que de forma natural dividen y defienden territorios y espacios frente a la intrusión de otros. Esto demuestra que la propiedad es un fenómeno natural fundamental que existe independientemente de las leyes, teorías o sistemas morales humanos. La observación del comportamiento territorial de los animales demuestra que el concepto de uso exclusivo y defensa de los recursos es anterior a la civilización humana y a los marcos jurídicos. Este fundamento natural apoya el argumento de que los derechos de propiedad no son construcciones artificiales, sino que surgen de instintos y necesidades básicas de supervivencia que existen en todas las especies.
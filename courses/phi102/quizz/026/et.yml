question: Mis näitab, et omand ei ole pelgalt inimese leiutis, vaid looduslik nähtus?
answer: Loomad kaitsevad territooriume ja ruume teiste sissetungide eest
wrong_answers:
  - Valitsused loovad seadusi, et kaitsta üksikisiku omandiõigust
  - Religioossed tekstid kehtestavad moraalseid suuniseid kaupade omamise kohta
  - Majandusteooriad tõestavad eraomandisüsteemide tõhusust
explanation: |
  Tekstis selgitatakse, et omandiõigust järgitakse isegi loomade seas, kes loomulikult jagavad ja kaitsevad territooriumi ja ruumi teiste sissetungide eest. See näitab, et omand on fundamentaalne looduslik nähtus, mis eksisteerib sõltumatult inimseadustest, teooriatest või moraalisüsteemidest. Loomade territoriaalse käitumise jälgimine näitab, et ressursside ainuõigusliku kasutamise ja kaitsmise kontseptsioon on olemas juba enne inimtsivilisatsiooni ja õigusraamistikke. See looduslik alus toetab väidet, et omandiõigused ei ole kunstlikud konstruktsioonid, vaid tulenevad põhilistest ellujäämisinstinktidest ja -vajadustest, mis eksisteerivad kõikides liikides.
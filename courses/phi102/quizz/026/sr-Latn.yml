question: Šta pokazuje da vlasništvo nije samo ljudski izum već prirodni fenomen?
answer: Životinje brane teritorije i prostore od upada drugih
wrong_answers:
  - Vlade kreiraju zakone kako bi zaštitile prava individualnog vlasništva
  - Verski tekstovi uspostavljaju moralne smernice za posedovanje dobara
  - Ekonomske teorije dokazuju efikasnost sistema privatnog vlasništva
explanation: |
  Tekst objašnjava da se svojina primećuje čak i među životinjama, koje prirodno dele i brane teritorije i prostore od upada drugih. Ovo pokazuje da je svojina fundamentalni prirodni fenomen koji postoji nezavisno od ljudskih zakona, teorija ili moralnih sistema. Posmatranje teritorijalnog ponašanja kod životinja pokazuje da koncept ekskluzivne upotrebe i odbrane resursa prethodi ljudskoj civilizaciji i pravnim okvirima. Ova prirodna osnova podržava argument da prava svojine nisu veštački konstrukti, već proizlaze iz osnovnih instinkta preživljavanja i potreba koje postoje među vrstama.
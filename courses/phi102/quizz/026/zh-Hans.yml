question: 是什么证明了财产不仅仅是人类的发明，而是一种自然现象？
answer: 动物保卫领地和空间，抵御其他动物的入侵
wrong_answers:
  - 政府制定法律保护个人所有权
  - 宗教经文确立了拥有物品的道德准则
  - 经济理论证明了私有制的效率
explanation: |
  课文解释说，即使在动物中也能观察到财产，它们会自然地划分和保卫领地和空间，防止他人入侵。这表明，财产是一种基本的自然现象，独立于人类的法律、理论或道德体系而存在。对动物领地行为的观察表明，排他性使用和保护资源的概念早于人类文明和法律框架。这一自然基础支持这样一种论点，即产权不是人为构建的，而是源于存在于不同物种中的基本生存本能和需求。
question: Wat zijn volgens de liberale economische theorie de drie belangrijkste middelen die nodig zijn om de belangenharmonie in de moderne samenleving tot stand te brengen en te handhaven?
answer: Opinievorming, internationale juridische instellingen en vrijhandelsbevordering
wrong_answers:
  - Militaire bescherming, systemen voor de toewijzing van middelen en technologische innovatie
  - Overheidsregulering, monetair beleid en industriële ontwikkeling
  - Bevolkingsbeperking, milieubescherming en culturele uitwisseling
explanation: |
  Liberale auteurs identificeerden drie specifieke middelen om een vreedzame samenleving op te bouwen: het mobiliseren van de publieke opinie om harmonie en wederzijds voordeel te onderwijzen, het oprichten van instellingen die de internationale rechtsorde garanderen en het bevorderen van vrije handel om de keten van harmonie zichtbaarder te maken. De andere opties richten zich op overheidscontrole, militaire macht of demografische factoren, die in tegenspraak zijn met de liberale nadruk op vrijwillige uitwisseling, minimale staatsinterventie en organische ontwikkeling van vreedzame samenwerking via marktmechanismen.
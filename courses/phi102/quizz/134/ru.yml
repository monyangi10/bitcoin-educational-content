question: Согласно либеральной экономической теории, какие три ключевых ресурса необходимы для установления и поддержания гармонии интересов в современном обществе?
answer: Образование общественного мнения, международные правовые институты и продвижение свободной торговли
wrong_answers:
  - Военная защита, системы распределения ресурсов и технологические инновации
  - Государственное регулирование, денежно-кредитная политика и промышленное развитие
  - Контроль численности населения, охрана окружающей среды и культурный обмен
explanation: |
  Либеральные авторы выделили три конкретных ресурса для построения мирного общества: мобилизация общественного мнения для воспитания гармонии и взаимной выгоды, создание институтов, гарантирующих международное верховенство права, и развитие свободной торговли, чтобы сделать цепочку гармонии более заметной. Другие варианты сосредоточены на государственном контроле, военной силе или демографических факторах, что противоречит либеральному акценту на добровольном обмене, минимальном вмешательстве государства и органичном развитии мирного сотрудничества с помощью рыночных механизмов.
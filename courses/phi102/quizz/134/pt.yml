question: De acordo com a teoria económica liberal, quais são os três recursos fundamentais necessários para estabelecer e manter a harmonia de interesses na sociedade moderna?
answer: Formação da opinião pública, instituições jurídicas internacionais e promoção do comércio livre
wrong_answers:
  - Proteção militar, sistemas de afetação de recursos e inovação tecnológica
  - Regulamentação governamental, política monetária e desenvolvimento industrial
  - Controlo da população, proteção do ambiente e intercâmbio cultural
explanation: |
  Os autores liberais identificaram três recursos específicos para a construção de uma sociedade pacífica: mobilizar a opinião pública para ensinar a harmonia e a vantagem mútua, criar instituições que garantam o Estado de direito internacional e promover o comércio livre para tornar mais visível a cadeia de harmonia. As outras opções centram-se no controlo governamental, na força militar ou em factores demográficos, que contradizem a ênfase liberal no intercâmbio voluntário, na intervenção mínima do Estado e no desenvolvimento orgânico da cooperação pacífica através de mecanismos de mercado.
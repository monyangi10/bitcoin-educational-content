question: Liberal ekonomi teorisine göre, modern toplumda çıkarların uyumunu sağlamak ve sürdürmek için gereken üç temel kaynak nedir?
answer: Kamuoyu eğitimi, uluslararası yasal kurumlar ve serbest ticaretin teşviki
wrong_answers:
  - Askeri koruma, kaynak tahsis sistemleri ve teknolojik yenilik
  - Hükümet düzenlemeleri, para politikası ve endüstriyel kalkınma
  - Nüfus kontrolü, çevrenin korunması ve kültürel değişim
explanation: |
  Liberal yazarlar barışçıl bir toplum inşa etmek için üç özel kaynak belirlemiştir: uyum ve karşılıklı avantajı öğretmek için kamuoyunu harekete geçirmek, uluslararası hukukun üstünlüğünü garanti altına alan kurumlar kurmak ve uyum zincirini daha görünür kılmak için serbest ticareti teşvik etmek. Diğer seçenekler hükümet kontrolü, askeri güç ya da demografik faktörlere odaklanmaktadır ki bu da liberallerin gönüllü mübadele, asgari devlet müdahalesi ve piyasa mekanizmaları yoluyla barışçıl işbirliğinin organik olarak geliştirilmesine yaptıkları vurguyla çelişmektedir.
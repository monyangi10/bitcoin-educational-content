question: Millised on liberaalse majandusteooria kohaselt kolm peamist ressurssi, mis on vajalikud huvide harmoonia loomiseks ja säilitamiseks tänapäeva ühiskonnas?
answer: Avaliku arvamuse kujundamine, rahvusvahelised õiguslikud institutsioonid ja vabakaubanduse edendamine
wrong_answers:
  - Sõjaline kaitse, ressursside jaotamise süsteemid ja tehnoloogilised uuendused
  - Valitsuse reguleerimine, rahapoliitika ja tööstuse areng
  - Rahvastikukontroll, keskkonnakaitse ja kultuurivahetus
explanation: |
  Liberaalsed autorid määratlesid kolm konkreetset ressurssi rahumeelse ühiskonna ülesehitamiseks: avaliku arvamuse mobiliseerimine harmoonia ja vastastikuse kasu õpetamiseks, rahvusvahelise õigusriigi põhimõtteid tagavate institutsioonide loomine ja vabakaubanduse edendamine, et muuta harmoonia ahel nähtavamaks. Teised võimalused keskenduvad valitsuse kontrollile, sõjalisele jõule või demograafilistele teguritele, mis on vastuolus liberaalse rõhuasetusega vabatahtlikule vahetusele, minimaalsele riiklikule sekkumisele ja rahumeelse koostöö orgaanilisele arengule turumehhanismide kaudu.
question: Prema liberalnoj ekonomskoj teoriji, koja su tri ključna resursa potrebna za uspostavljanje i održavanje harmonije interesa u modernom društvu?
answer: Obrazovanje javnog mnjenja, međunarodne pravne institucije i promocija slobodne trgovine
wrong_answers:
  - Vojna zaštita, sistemi raspodele resursa i tehnološke inovacije
  - Vladina regulativa, monetarna politika i industrijski razvoj
  - Kontrola populacije, zaštita životne sredine i kulturna razmena
explanation: |
  Liberalni autori su identifikovali tri specifična resursa za izgradnju mirnog društva: mobilizaciju javnog mnjenja za podučavanje harmoniji i međusobnoj koristi, uspostavljanje institucija koje garantuju međunarodno vladavinu prava, i promociju slobodne trgovine kako bi lanac harmonije bio vidljiviji. Druge opcije se fokusiraju na kontrolu vlade, vojnu silu ili demografske faktore, što je u suprotnosti sa liberalnim naglaskom na dobrovoljnoj razmeni, minimalnoj državnoj intervenciji i organskom razvoju mirne saradnje kroz tržišne mehanizme.
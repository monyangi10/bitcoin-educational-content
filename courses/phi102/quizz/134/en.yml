question: According to liberal economic theory, what are the three key resources needed to establish and maintain the harmony of interests in modern society?
answer: Public opinion education, international legal institutions, and free trade promotion
wrong_answers:
  - Military protection, resource allocation systems, and technological innovation
  - Government regulation, monetary policy, and industrial development
  - Population control, environmental protection, and cultural exchange
explanation: |
  Liberal authors identified three specific resources for building peaceful society: mobilizing public opinion to teach harmony and mutual advantage, establishing institutions that guarantee international rule of law, and promoting free trade to make the chain of harmony more visible. The other options focus on government control, military force, or demographic factors, which contradict liberal emphasis on voluntary exchange, minimal state intervention, and organic development of peaceful cooperation through market mechanisms.

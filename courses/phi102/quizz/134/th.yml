question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม ทรัพยากรหลักสามประการที่จำเป็นในการสร้างและรักษาความกลมกลืนของผลประโยชน์ในสังคมสมัยใหม่คืออะไร?
answer: การศึกษาความคิดเห็นของประชาชน, สถาบันกฎหมายระหว่างประเทศ, และการส่งเสริมการค้าเสรี
wrong_answers:
  - การป้องกันทางทหาร, ระบบการจัดสรรทรัพยากร, และนวัตกรรมทางเทคโนโลยี
  - กฎระเบียบของรัฐบาล, นโยบายการเงิน, และการพัฒนาอุตสาหกรรม
  - การควบคุมประชากร, การปกป้องสิ่งแวดล้อม, และการแลกเปลี่ยนวัฒนธรรม
explanation: |
  นักเขียนเสรีนิยมระบุทรัพยากรเฉพาะสามประการสำหรับการสร้างสังคมที่สงบสุข: การระดมความคิดเห็นของประชาชนเพื่อสอนความสามัคคีและประโยชน์ร่วมกัน, การจัดตั้งสถาบันที่รับประกันกฎหมายนานาชาติ, และการส่งเสริมการค้าเสรีเพื่อทำให้ห่วงโซ่ของความสามัคคีชัดเจนยิ่งขึ้น ตัวเลือกอื่น ๆ มุ่งเน้นไปที่การควบคุมของรัฐบาล, กำลังทหาร, หรือปัจจัยทางประชากรศาสตร์ ซึ่งขัดแย้งกับการเน้นของเสรีนิยมในเรื่องการแลกเปลี่ยนโดยสมัครใจ, การแทรกแซงของรัฐให้น้อยที่สุด, และการพัฒนาความร่วมมืออย่างสงบสุขผ่านกลไกตลาดอย่างเป็นธรรมชาติ
question: Kulingana na nadharia ya uchumi huria, ni rasilimali gani tatu muhimu zinazohitajika ili kuanzisha na kudumisha upatano wa maslahi katika jamii ya kisasa?
answer: Elimu ya maoni ya umma, taasisi za kisheria za kimataifa, na utangazaji wa biashara huria
wrong_answers:
  - Ulinzi wa kijeshi, mifumo ya ugawaji wa rasilimali, na uvumbuzi wa kiteknolojia
  - Kanuni za serikali, sera ya fedha, na maendeleo ya viwanda
  - Udhibiti wa idadi ya watu, ulinzi wa mazingira, na ubadilishanaji wa kitamaduni
explanation: |
  Waandishi wa kiliberali walitambua rasilimali tatu mahususi za kujenga jamii yenye amani: kuhamasisha maoni ya umma ili kufundisha maelewano na faida ya pande zote mbili, kuanzisha taasisi zinazohakikisha utawala wa sheria wa kimataifa, na kukuza biashara huria ili kufanya mnyororo wa maelewano uonekane zaidi. Chaguzi zingine zinazingatia udhibiti wa serikali, nguvu ya kijeshi, au mambo ya idadi ya watu, ambayo yanapingana na msisitizo wa kiliberali katika kubadilishana kwa hiari, uingiliaji kati mdogo wa serikali, na maendeleo ya kikaboni ya ushirikiano wa amani kupitia mifumo ya soko.
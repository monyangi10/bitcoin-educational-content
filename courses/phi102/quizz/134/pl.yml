question: Zgodnie z liberalną teorią ekonomiczną, jakie są trzy kluczowe zasoby potrzebne do ustanowienia i utrzymania harmonii interesów we współczesnym społeczeństwie?
answer: Edukacja opinii publicznej, międzynarodowe instytucje prawne i promocja wolnego handlu
wrong_answers:
  - Ochrona wojskowa, systemy alokacji zasobów i innowacje technologiczne
  - Regulacje rządowe, polityka pieniężna i rozwój przemysłowy
  - Kontrola populacji, ochrona środowiska i wymiana kulturowa
explanation: |
  Liberalni autorzy zidentyfikowali trzy konkretne zasoby do budowania pokojowego społeczeństwa: mobilizowanie opinii publicznej do nauczania harmonii i wzajemnych korzyści, ustanowienie instytucji gwarantujących międzynarodowe rządy prawa oraz promowanie wolnego handlu, aby uczynić łańcuch harmonii bardziej widocznym. Pozostałe opcje koncentrują się na kontroli rządowej, sile militarnej lub czynnikach demograficznych, które są sprzeczne z liberalnym naciskiem na dobrowolną wymianę, minimalną interwencję państwa i organiczny rozwój pokojowej współpracy poprzez mechanizmy rynkowe.
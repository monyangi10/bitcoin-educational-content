question: بر اساس نظریه اقتصادی لیبرال، سه منبع کلیدی که برای ایجاد و حفظ هماهنگی منافع در جامعه مدرن مورد نیاز است، کدامند؟
answer: آموزش افکار عمومی، نهادهای حقوقی بین‌المللی، و ترویج تجارت آزاد
wrong_answers:
  - حفاظت نظامی، سیستم‌های تخصیص منابع، و نوآوری فناوری
  - مقررات دولتی، سیاست پولی، و توسعه صنعتی
  - کنترل جمعیت، حفاظت از محیط زیست، و تبادل فرهنگی
explanation: |
  نویسندگان لیبرال سه منبع خاص برای ساختن جامعه‌ای صلح‌آمیز شناسایی کردند: بسیج افکار عمومی برای آموزش هماهنگی و منافع متقابل، ایجاد نهادهایی که حاکمیت قانون بین‌المللی را تضمین کنند، و ترویج تجارت آزاد برای آشکارتر کردن زنجیره هماهنگی. گزینه‌های دیگر بر کنترل دولت، نیروی نظامی یا عوامل جمعیتی تمرکز دارند که با تأکید لیبرال بر مبادله داوطلبانه، مداخله حداقلی دولت و توسعه ارگانیک همکاری صلح‌آمیز از طریق مکانیسم‌های بازار در تضاد است.
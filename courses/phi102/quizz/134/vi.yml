question: Theo lý thuyết kinh tế tự do, ba nguồn lực then chốt nào cần thiết để thiết lập và duy trì sự hài hòa lợi ích trong xã hội hiện đại?
answer: Giáo dục dư luận, các thể chế pháp lý quốc tế và thúc đẩy thương mại tự do.
wrong_answers:
  - Bảo vệ quân sự, hệ thống phân bổ nguồn lực và đổi mới công nghệ
  - Quy định của chính phủ, chính sách tiền tệ và phát triển công nghiệp
  - Kiểm soát dân số, bảo vệ môi trường và giao lưu văn hóa
explanation: |
  Các tác giả theo chủ nghĩa tự do đã xác định ba nguồn lực cụ thể để xây dựng một xã hội hòa bình: huy động dư luận để giáo dục về sự hòa hợp và lợi ích chung, thiết lập các thể chế đảm bảo luật pháp quốc tế, và thúc đẩy thương mại tự do để làm cho chuỗi hòa hợp trở nên rõ ràng hơn. Các lựa chọn khác tập trung vào sự kiểm soát của chính phủ, lực lượng quân sự hoặc các yếu tố nhân khẩu học, trái ngược với sự nhấn mạnh của chủ nghĩa tự do vào trao đổi tự nguyện, sự can thiệp tối thiểu của nhà nước và sự phát triển hữu cơ của hợp tác hòa bình thông qua các cơ chế thị trường.
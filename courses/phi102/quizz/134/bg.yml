question: Според либералната икономическа теория кои са трите основни ресурса, необходими за установяване и поддържане на хармония на интересите в съвременното общество?
answer: Обучение на общественото мнение, международни правни институции и насърчаване на свободната търговия
wrong_answers:
  - Военна защита, системи за разпределение на ресурсите и технологични иновации
  - Държавно регулиране, парична политика и индустриално развитие
  - Контрол на населението, опазване на околната среда и културен обмен
explanation: |
  Либералните автори определят три специфични ресурса за изграждане на мирно общество: мобилизиране на общественото мнение за проповядване на хармония и взаимна изгода, създаване на институции, които гарантират международното право и насърчаване на свободната търговия, за да се направи веригата на хармонията по-видима. Другите варианти се фокусират върху държавния контрол, военната сила или демографските фактори, които противоречат на либералния акцент върху доброволния обмен, минималната държавна намеса и органичното развитие на мирното сътрудничество чрез пазарни механизми.
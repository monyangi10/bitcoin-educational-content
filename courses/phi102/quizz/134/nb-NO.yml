question: Hva er ifølge liberal økonomisk teori de tre viktigste ressursene som trengs for å etablere og opprettholde harmoni mellom interesser i et moderne samfunn?
answer: Opplysningsarbeid, internasjonale juridiske institusjoner og frihandelsfremmende tiltak
wrong_answers:
  - Militær beskyttelse, ressursallokeringssystemer og teknologisk innovasjon
  - Statlig regulering, pengepolitikk og industriell utvikling
  - Befolkningskontroll, miljøvern og kulturutveksling
explanation: |
  Liberale forfattere identifiserte tre spesifikke ressurser for å bygge fredelige samfunn: mobilisering av den offentlige opinionen for å lære bort harmoni og gjensidig fordel, etablering av institusjoner som garanterer internasjonal rettssikkerhet, og fremme av frihandel for å gjøre harmonikjeden mer synlig. De andre alternativene fokuserer på statlig kontroll, militærmakt eller demografiske faktorer, noe som er i strid med liberalistenes vektlegging av frivillig utveksling, minimal statlig inngripen og organisk utvikling av fredelig samarbeid gjennom markedsmekanismer.
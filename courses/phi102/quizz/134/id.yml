question: Menurut teori ekonomi liberal, apa saja tiga sumber daya utama yang dibutuhkan untuk membangun dan menjaga keselarasan kepentingan dalam masyarakat modern?
answer: Pendidikan opini publik, lembaga hukum internasional, dan promosi perdagangan bebas
wrong_answers:
  - Perlindungan militer, sistem alokasi sumber daya, dan inovasi teknologi
  - Regulasi pemerintah, kebijakan moneter, dan pengembangan industri
  - Pengendalian populasi, perlindungan lingkungan, dan pertukaran budaya
explanation: |
  Para penulis liberal mengidentifikasi tiga sumber daya khusus untuk membangun masyarakat yang damai: memobilisasi opini publik untuk mengajarkan keharmonisan dan keuntungan bersama, membangun institusi yang menjamin aturan hukum internasional, dan mempromosikan perdagangan bebas untuk membuat rantai keharmonisan menjadi lebih terlihat. Pilihan-pilihan lain berfokus pada kontrol pemerintah, kekuatan militer, atau faktor demografi, yang bertentangan dengan penekanan liberal pada pertukaran sukarela, intervensi negara yang minimal, dan pengembangan organik kerjasama damai melalui mekanisme pasar.
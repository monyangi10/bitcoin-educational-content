question: Mitkä ovat liberaalin talousteorian mukaan kolme keskeistä resurssia, joita tarvitaan etujen harmonian aikaansaamiseksi ja ylläpitämiseksi nyky-yhteiskunnassa?
answer: Julkinen mielipidekasvatus, kansainväliset oikeuslaitokset ja vapaakaupan edistäminen
wrong_answers:
  - Sotilaallinen suojelu, resurssien jakojärjestelmät ja teknologiset innovaatiot
  - Valtion sääntely, rahapolitiikka ja teollisuuden kehitys
  - Väestönvalvonta, ympäristönsuojelu ja kulttuurivaihto
explanation: |
  Liberaalit kirjoittajat määrittelivät kolme erityistä voimavaraa rauhanomaisen yhteiskunnan rakentamiseksi: yleisen mielipiteen aktivoiminen opettamaan harmoniaa ja keskinäistä etua, kansainvälisen oikeusvaltion takaavien instituutioiden perustaminen ja vapaakaupan edistäminen, jotta harmoniaketju tulisi näkyvämmäksi. Muut vaihtoehdot keskittyvät hallituksen valvontaan, sotilaalliseen voimaan tai demografisiin tekijöihin, jotka ovat ristiriidassa sen kanssa, että liberaalit painottavat vapaaehtoista vaihtoa, valtion minimaalista puuttumista ja rauhanomaisen yhteistyön orgaanista kehittämistä markkinamekanismien avulla.
question: Selon la théorie économique libérale, quelles sont les trois ressources clés nécessaires pour établir et maintenir l'harmonie des intérêts dans la société moderne ?
answer: Éducation de l'opinion publique, institutions juridiques internationales et promotion du libre-échange
wrong_answers:
  - Protection militaire, systèmes d'allocation des ressources et innovation technologique
  - Réglementation gouvernementale, politique monétaire et développement industriel
  - Contrôle de la population, protection de l'environnement et échanges culturels
explanation: |
  Les auteurs libéraux ont identifié trois ressources spécifiques pour construire une société pacifique : mobiliser l'opinion publique pour enseigner l'harmonie et l'avantage mutuel, établir des institutions qui garantissent l'État de droit international et promouvoir le libre-échange pour rendre la chaîne de l'harmonie plus visible. Les autres options se concentrent sur le contrôle gouvernemental, la force militaire ou les facteurs démographiques, ce qui contredit l'accent mis par les libéraux sur l'échange volontaire, l'intervention minimale de l'État et le développement organique de la coopération pacifique par le biais des mécanismes du marché.
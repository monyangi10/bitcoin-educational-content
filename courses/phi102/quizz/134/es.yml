question: Según la teoría económica liberal, ¿cuáles son los tres recursos clave necesarios para establecer y mantener la armonía de intereses en la sociedad moderna?
answer: Educación de la opinión pública, instituciones jurídicas internacionales y fomento del libre comercio
wrong_answers:
  - Protección militar, sistemas de asignación de recursos e innovación tecnológica
  - Regulación gubernamental, política monetaria y desarrollo industrial
  - Control de la población, protección del medio ambiente e intercambio cultural
explanation: |
  Los autores liberales identificaron tres recursos específicos para construir una sociedad pacífica: movilizar a la opinión pública para que enseñe la armonía y el beneficio mutuo, establecer instituciones que garanticen el estado de derecho internacional y promover el libre comercio para hacer más visible la cadena de la armonía. Las otras opciones se centran en el control gubernamental, la fuerza militar o los factores demográficos, que contradicen el énfasis liberal en el intercambio voluntario, la mínima intervención estatal y el desarrollo orgánico de la cooperación pacífica a través de los mecanismos del mercado.
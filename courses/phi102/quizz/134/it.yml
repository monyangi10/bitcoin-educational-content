question: Secondo la teoria economica liberale, quali sono le tre risorse chiave necessarie per stabilire e mantenere l'armonia degli interessi nella società moderna?
answer: Educazione dell'opinione pubblica, istituzioni giuridiche internazionali e promozione del libero scambio
wrong_answers:
  - Protezione militare, sistemi di allocazione delle risorse e innovazione tecnologica
  - Regolamentazione governativa, politica monetaria e sviluppo industriale
  - Controllo della popolazione, protezione dell'ambiente e scambio culturale
explanation: |
  Gli autori liberali hanno individuato tre risorse specifiche per costruire una società pacifica: mobilitare l'opinione pubblica per insegnare l'armonia e il vantaggio reciproco, creare istituzioni che garantiscano lo stato di diritto internazionale e promuovere il libero scambio per rendere più visibile la catena dell'armonia. Le altre opzioni si concentrano sul controllo governativo, sulla forza militare o sui fattori demografici, che contraddicono l'enfasi liberale sullo scambio volontario, sul minimo intervento dello Stato e sullo sviluppo organico della cooperazione pacifica attraverso i meccanismi di mercato.
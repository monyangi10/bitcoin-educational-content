question: Jaké jsou podle liberální ekonomické teorie tři klíčové zdroje potřebné k nastolení a udržení harmonie zájmů v moderní společnosti?
answer: Vzdělávání veřejnosti, mezinárodní právní instituce a podpora volného obchodu
wrong_answers:
  - Vojenská ochrana, systémy přidělování zdrojů a technologické inovace
  - Vládní regulace, měnová politika a průmyslový rozvoj
  - Kontrola populace, ochrana životního prostředí a kulturní výměna
explanation: |
  Liberální autoři identifikovali tři specifické zdroje pro budování mírové společnosti: mobilizace veřejného mínění k učení harmonii a vzájemné výhodnosti, vytvoření institucí, které zaručují mezinárodní právní stát, a podpora volného obchodu, aby se zviditelnil řetězec harmonie. Ostatní možnosti se zaměřují na vládní kontrolu, vojenskou sílu nebo demografické faktory, které jsou v rozporu s liberálním důrazem na dobrovolnou výměnu, minimální státní zásahy a organický rozvoj mírové spolupráce prostřednictvím tržních mechanismů.
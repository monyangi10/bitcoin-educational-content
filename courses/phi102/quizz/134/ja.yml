question: 自由主義経済理論によれば、現代社会における利害の調和を確立し、維持するために必要な3つの主要資源とは何か？
answer: 世論教育、国際法制度、自由貿易推進
wrong_answers:
  - 軍事保護、資源配分システム、技術革新
  - 政府規制、金融政策、産業発展
  - 人口抑制、環境保護、文化交流
explanation: |
  リベラル派の著者は、平和な社会を構築するための具体的な資源として、調和と互恵を教えるための世論の動員、国際的な法の支配を保証する制度の確立、調和の連鎖をより可視化するための自由貿易の促進という3つを挙げている。その他の選択肢は、政府の統制、軍事力、人口的要因に焦点を当てたものであり、自発的な交換、最小限の国家介入、市場メカニズムによる平和的協力の有機的発展を重視するリベラル派とは矛盾している。
question: Vilka är enligt liberal ekonomisk teori de tre viktigaste resurserna som behövs för att skapa och upprätthålla harmoni mellan olika intressen i det moderna samhället?
answer: Opinionsbildning, internationella rättsliga institutioner och främjande av frihandel
wrong_answers:
  - Militärt skydd, resursfördelningssystem och teknisk innovation
  - Statlig reglering, penningpolitik och industriell utveckling
  - Befolkningskontroll, miljöskydd och kulturellt utbyte
explanation: |
  Liberala författare identifierade tre specifika resurser för att bygga ett fredligt samhälle: att mobilisera den allmänna opinionen för att lära ut harmoni och ömsesidig nytta, att etablera institutioner som garanterar internationell rättssäkerhet och att främja frihandel för att göra harmonikedjan mer synlig. De andra alternativen fokuserar på statlig kontroll, militär styrka eller demografiska faktorer, vilket strider mot liberalernas betoning på frivilligt utbyte, minimalt statligt ingripande och organisk utveckling av fredligt samarbete genom marknadsmekanismer.
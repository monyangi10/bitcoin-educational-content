question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni ibihe bintu bitatu nyamukuru bikenewe kugira ngo habeho no kubungabunga uguhuza inyungu mu kibano ca none?
answer: Uburezi bw'ivyiyumviro vya bose, inzego mpuzamakungu zigenga amategeko, no guteza imbere ubudandaji bwigenga
wrong_answers:
  - Uburinzi bw'igisirikare, uburyo bwo gutanga ubutunzi, n'ubuhinga bushasha
  - Amabwirizwa ya Leta, politike y'amahera, n'iterambere ry'inganda
  - Kugenzura igitigiri c'abantu, gukingira ibidukikije, no guhana imico kama
explanation: |
  Abanditsi b’abanyagihugu b’abanyagihugu bamenyesheje ko hari ibintu bitatu vyihariye vyo kwubaka igihugu c’amahoro: gukoranya ivyiyumviro vya bose kugira ngo bigishe ubumwe n’ugufashanya, gushinga inzego zishingira intahe ubutegetsi bw’amategeko mpuzamakungu, no guteza imbere ubudandaji bwigenga kugira ngo uruhererekane rw’ubumwe ruboneke cane. Ayandi mahitamwo yibanda ku kugenzura kwa Leta, ku nguvu za gisirikare, canke ku bijanye n’igitigiri c’abantu, ivyo bikaba bivuguruza ugushimika kw’ubwigenge ku guhanahana amakuru ku bushake, ku gufasha Leta bikeyi, no ku guteza imbere ubufatanye bw’amahoro biciye mu buryo bw’isoko.
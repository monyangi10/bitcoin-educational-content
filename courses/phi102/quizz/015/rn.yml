question: Ni ubushobozi ubuhe bw’umuntu busanzwe burema umunezero wo mu mutima utuma umuntu atera imbere kandi agasangira ivyiyumviro?
answer: Ubushobozi bwo kwiyumvira ubwabwo .
wrong_answers:
  - Ubushobozi bwo kwandika no kuvugana
  - Ubushobozi bwo kwumva ibintu vyo ku mubiri
  - Ubushobozi bwo gukoresha umwidegemvyo wo kwihitiramwo .
explanation: |
  Dukurikije filozofiya y’itegeko ry’ibidukikije yashikirijwe, ubushobozi bwo kwiyumvira buzanana n’umunezero wo mu mutima utuma mu bisanzwe abantu batera imbere no gusangira ivyiyumviro vyabo. Ivyo birerekanwa n’akarorero ka Patiri Yves-Marie André, uwababaye cane igihe yabujijwe gukora ubushakashatsi bwiwe bwa filozofiya. Ico canditswe gishimika ku vy’uko kwiyumvira ubwakwo bitanga ukunyurwa kw’ishimikiro kandi ko mu bisanzwe bituma umuntu agira icipfuzo co gushikiriza ivyiyumviro. Naho kwandika, kwumva, n’uburenganzira bwo kwihitiramwo ari ivyiyumviro bifitaniye isano, ni igikorwa co kwiyumvira canecane kirimwo uwo munezero w’akameremere utuma umuntu atera imbere mu bwenge no gusangira.
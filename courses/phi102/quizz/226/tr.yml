question: Sözleşme özgürlüğü ilkelerine göre, gönüllü sözleşmeleri diğer sosyal örgütlenme biçimlerinden ayıran temel özellik nedir?
answer: Her bir tarafın serbestçe müzakere edilen ilişkiler yoluyla karşılıklı avantaj elde ettiği pozitif toplamlı oyunları temsil ederler
wrong_answers:
  - Merkezi karar alma mekanizmaları aracılığıyla toplumsal düzeni sağlayan hiyerarşik güç yapıları oluştururlar
  - "Bir tarafın kazancının zorunlu olarak diğer tarafın eşdeğer kaybına yol açtığı sıfır toplamlı rekabetler yaratırlar"
  - Bunlar, toplumu bireysel suistimaller gerçekleşmeden önce koruyan önleyici düzenleyici mekanizmalar olarak işlev görürler
explanation: |
  Bu bölümde gönüllü sözleşmelerin karşılıklı zenginleşmenin gerçekleştiği pozitif toplamlı oyunlar olduğu vurgulanmaktadır, çünkü her birey çekimser kalmak yerine katılmaktan memnuniyet duymaktadır. Bu durum, metnin özgürlüğün önündeki engeller olarak açıkça eleştirdiği hiyerarşik yapılar, sıfır toplamlı düşünce veya önleyici sistemlerle tezat oluşturmaktadır.
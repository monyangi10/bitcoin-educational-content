question: Согласно принципам договорной свободы, какая фундаментальная характеристика отличает добровольные контракты от других форм социальной организации?
answer: Они представляют собой игры с положительной суммой, в которых каждая из сторон получает взаимную выгоду благодаря свободным переговорам
wrong_answers:
  - Они создают иерархические структуры власти, обеспечивающие социальный порядок за счет централизованного принятия решений
  - "Они создают соревнования с нулевой суммой, в которых выигрыш одной стороны обязательно приводит к эквивалентному проигрышу другой стороны"
  - Они функционируют как превентивные регулятивные механизмы, защищающие общество от индивидуальных злоупотреблений до того, как они произойдут
explanation: |
  В главе подчеркивается, что добровольные контракты представляют собой игры с положительной суммой, в которых происходит взаимное обогащение, поскольку каждый человек находит удовлетворение в участии, а не в воздержании. Это контрастирует с иерархическими структурами, мышлением с нулевой суммой или превентивными системами, которые в тексте прямо критикуются как препятствия на пути к свободе.
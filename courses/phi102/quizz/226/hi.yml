question: According to the principles of contractual freedom, what fundamental characteristic distinguishes voluntary contracts from other forms of social organization?
answer: They represent positive-sum games where each party gains mutual advantage through freely negotiated relationships
wrong_answers:
  - They establish hierarchical power structures that ensure social order through centralized decision-making
  - "They create zero-sum competitions where one party's gain necessarily results in another party's equivalent loss"
  - They function as preventive regulatory mechanisms that protect society from individual abuses before they occur
explanation: |
  The chapter emphasizes that voluntary contracts constitute positive-sum games where mutual enrichment occurs because each individual finds satisfaction in participating rather than abstaining. This contrasts with hierarchical structures, zero-sum thinking, or preventive systems that the text explicitly critiques as obstacles to freedom.
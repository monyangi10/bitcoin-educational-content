question: Jaká základní vlastnost podle zásad smluvní svobody odlišuje dobrovolné smlouvy od jiných forem společenské organizace?
answer: Představují hry s kladným součtem, kde každá strana získává vzájemnou výhodu prostřednictvím svobodně vyjednaných vztahů
wrong_answers:
  - Vytvářejí hierarchické mocenské struktury, které zajišťují společenský řád prostřednictvím centralizovaného rozhodování
  - "Vytvářejí soutěž s nulovým součtem, kde zisk jedné strany nutně vede k ekvivalentní ztrátě druhé strany"
  - Fungují jako preventivní regulační mechanismy, které chrání společnost před individuálním zneužitím dříve, než k němu dojde
explanation: |
  Kapitola zdůrazňuje, že dobrovolné smlouvy představují hry s kladným součtem, při nichž dochází k vzájemnému obohacení, protože každý jednotlivec nachází uspokojení v účasti, nikoli ve zdržení se. To kontrastuje s hierarchickými strukturami, myšlením s nulovým součtem nebo preventivními systémy, které text výslovně kritizuje jako překážky svobody.
question: Hvilket grunnleggende kjennetegn skiller frivillige kontrakter fra andre former for sosial organisering, ifølge prinsippene om avtalefrihet?
answer: De representerer pluss-sum-spill der hver part oppnår gjensidige fordeler gjennom fritt fremforhandlede relasjoner
wrong_answers:
  - De etablerer hierarkiske maktstrukturer som sikrer sosial orden gjennom sentralisert beslutningstaking
  - "De skaper nullsumskonkurranser der den ene partens gevinst nødvendigvis resulterer i et tilsvarende tap for den andre parten"
  - De fungerer som forebyggende reguleringsmekanismer som beskytter samfunnet mot individuelle overgrep før de skjer
explanation: |
  Kapitlet legger vekt på at frivillige kontrakter utgjør pluss-sum-spill der gjensidig berikelse oppstår fordi hver enkelt finner tilfredsstillelse i å delta i stedet for å avstå. Dette står i kontrast til hierarkiske strukturer, nullsumstenkning eller preventive systemer, som teksten eksplisitt kritiserer som hindringer for frihet.
question: 根据契约自由原则，自愿契约区别于其他社会组织形式的基本特征是什么？
answer: 它们代表着正和博弈，各方通过自由协商的关系获得互利
wrong_answers:
  - 它们建立了等级森严的权力结构，通过集中决策来确保社会秩序
  - "它们造成了零和竞争，一方的收益必然导致另一方的同等损失"。
  - 它们发挥预防性监管机制的作用，在个人滥用权力行为发生之前保护社会免受其害
explanation: |
  本章强调，自愿契约构成了正和博弈，在这种博弈中，由于每个人都能从参与而非弃权中获得满足感，从而实现共同致富。这与文中明确批判的等级结构、零和思维或预防性制度形成鲜明对比，它们是自由的障碍。
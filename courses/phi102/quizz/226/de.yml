question: Welches grundlegende Merkmal unterscheidet nach den Grundsätzen der Vertragsfreiheit freiwillige Verträge von anderen Formen der sozialen Organisation?
answer: Sie stellen Positivsummenspiele dar, bei denen jede Partei durch frei ausgehandelte Beziehungen gegenseitige Vorteile erlangt
wrong_answers:
  - Sie schaffen hierarchische Machtstrukturen, die durch zentralisierte Entscheidungsfindung die soziale Ordnung sicherstellen
  - "Sie schaffen Nullsummenwettbewerbe, bei denen der Gewinn der einen Partei zwangsläufig zu einem entsprechenden Verlust der anderen Partei führt
  - Sie fungieren als präventive Regulierungsmechanismen, die die Gesellschaft vor individuellen Missbräuchen schützen, bevor diese auftreten
explanation: |
  Das Kapitel hebt hervor, dass freiwillige Verträge ein Positivsummenspiel darstellen, bei dem eine gegenseitige Bereicherung stattfindet, weil jeder Einzelne durch seine Teilnahme eine Befriedigung erfährt, anstatt sich zu enthalten. Dies steht im Gegensatz zu hierarchischen Strukturen, Nullsummen-Denken oder präventiven Systemen, die der Text ausdrücklich als Hindernisse für die Freiheit kritisiert.
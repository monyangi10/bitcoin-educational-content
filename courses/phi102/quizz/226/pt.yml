question: De acordo com os princípios da liberdade contratual, que caraterística fundamental distingue os contratos voluntários de outras formas de organização social?
answer: Trata-se de jogos de soma positiva em que cada parte obtém vantagens mútuas através de relações livremente negociadas
wrong_answers:
  - Estabelecem estruturas hierárquicas de poder que asseguram a ordem social através da tomada de decisões centralizada
  - "Criam competições de soma zero em que o ganho de uma parte resulta necessariamente na perda equivalente de outra parte"
  - Funcionam como mecanismos reguladores preventivos que protegem a sociedade de abusos individuais antes que estes ocorram
explanation: |
  O capítulo sublinha que os contratos voluntários constituem jogos de soma positiva em que o enriquecimento mútuo ocorre porque cada indivíduo encontra satisfação em participar em vez de se abster. Isto contrasta com as estruturas hierárquicas, o pensamento de soma zero ou os sistemas preventivos que o texto critica explicitamente como obstáculos à liberdade.
question: Enligt principerna om avtalsfrihet, vilken grundläggande egenskap skiljer frivilliga avtal från andra former av social organisation?
answer: De utgör spel med positiv summa där varje part får ömsesidiga fördelar genom fritt förhandlade relationer
wrong_answers:
  - De etablerar hierarkiska maktstrukturer som säkerställer social ordning genom centraliserat beslutsfattande
  - "De skapar nollsummetävlingar där en parts vinst nödvändigtvis leder till en motsvarande förlust för en annan part."
  - De fungerar som preventiva regleringsmekanismer som skyddar samhället från individuella övergrepp innan de inträffar
explanation: |
  I kapitlet betonas att frivilliga avtal utgör plussummespel där ömsesidig berikning uppstår eftersom varje individ finner tillfredsställelse i att delta snarare än att avstå. Detta står i kontrast till hierarkiska strukturer, nollsummetänkande eller preventiva system som i texten uttryckligen kritiseras som hinder för frihet.
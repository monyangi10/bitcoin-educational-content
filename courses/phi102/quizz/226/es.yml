question: Según los principios de la libertad contractual, ¿qué característica fundamental distingue a los contratos voluntarios de otras formas de organización social?
answer: Representan juegos de suma positiva en los que cada parte obtiene ventajas mutuas mediante relaciones libremente negociadas
wrong_answers:
  - Establecen estructuras de poder jerárquicas que garantizan el orden social mediante una toma de decisiones centralizada
  - "Crean competiciones de suma cero en las que la ganancia de una parte se traduce necesariamente en la pérdida equivalente de otra"
  - Funcionan como mecanismos reguladores preventivos que protegen a la sociedad de los abusos individuales antes de que se produzcan
explanation: |
  El capítulo hace hincapié en que los contratos voluntarios constituyen juegos de suma positiva en los que se produce un enriquecimiento mutuo porque cada individuo encuentra satisfacción en participar en lugar de abstenerse. Esto contrasta con las estructuras jerárquicas, el pensamiento de suma cero o los sistemas preventivos que el texto critica explícitamente como obstáculos a la libertad.
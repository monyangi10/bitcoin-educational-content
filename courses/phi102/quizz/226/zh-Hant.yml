question: 根據契約自由的原則，自願契約有別於其他社會組織形式的基本特徵是什麼？
answer: 它們代表正和博弈，其中每一方透過自由協商的關係獲得互利。
wrong_answers:
  - 他們建立分等級的權力結構，透過集中決策來確保社會秩序。
  - "它們創造了零和競爭，其中一方的獲利必然導致另一方的同等損失。
  - 它們發揮預防性監管機制的功能，在個人虐待行為發生之前保護社會免受其害。
explanation: |
  本章強調，自願契約構成了正和博弈，在這種博弈中，每個人都能從參與而非放棄中獲得滿足感，從而相互致富。這與文中明確批判為自由障礙的等級結構、零和思維或預防性制度形成對比。
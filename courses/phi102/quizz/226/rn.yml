question: Dushingiye ku ngingo ngenderwako z’umwidegemvyo w’amasezerano, ni ikintu nyamukuru ikihe gitandukanya amasezerano y’ubushake n’ubundi buryo bwo gutunganya imibano?
answer: Bigereranya imikino y’amahera meza aho buri ruhande ruronka inyungu ku rundi ruhande biciye mu migenderanire y’uguhanahana amakuru mu mwidegemvyo .
wrong_answers:
  - Bashinga inzego z'ubutegetsi zituma haba urutonde rw'imibano biciye mu gufata ingingo zishingiye ku rwego rwo hejuru .
  - "Batuma haba amarushanwa y'amahera ataco amaze aho inyungu y'umuhari umwe ituma uwundi muhari utakaza ibingana".
  - Bikora nk'uburyo bwo kwirinda gukingira abantu ubugizi bwa nabi ku muntu ku giti ciwe imbere y'uko bishika .
explanation: |
  Ico gice gishimika ku vy’uko amasezerano y’ubushake ari imikino y’amahera meza aho ugutunganirizwa kuba kubera ko umuntu wese aronka ukunyurwa mu kugira uruhara aho kwirinda. Ivyo bitandukanye n’imibumbe y’ubukuru, ivyiyumviro vy’umubare zero, canke uburyo bwo kwirinda ivyo canditswe kinegura mu buryo butomoye ko ari intambamyi ku mwidegemvyo.
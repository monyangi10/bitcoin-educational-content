question: Kulingana na kanuni za uhuru wa kimkataba, ni sifa gani ya msingi inayotofautisha mikataba ya hiari na aina nyingine za mashirika ya kijamii?
answer: Zinawakilisha michezo chanya ya jumla ambapo kila upande unapata faida ya pande zote mbili kupitia mahusiano yaliyojadiliwa kwa uhuru
wrong_answers:
  - Wanaanzisha miundo ya madaraka ya kihierarkia inayohakikisha utulivu wa kijamii kupitia kufanya maamuzi ya pamoja
  - "Wanaunda mashindano ya sifuri ambapo faida ya chama kimoja husababisha hasara sawa na ya chama kingine"
  - Hufanya kazi kama mifumo ya udhibiti wa kinga inayolinda jamii kutokana na dhuluma za kibinafsi kabla hazijatokea.
explanation: |
  Sura hiyo inasisitiza kwamba mikataba ya hiari ni michezo chanya ya jumla ambapo utajiri wa pande zote hutokea kwa sababu kila mtu hupata kuridhika katika kushiriki badala ya kujizuia. Hii inatofautiana na miundo ya kihierarkia, fikra za sifuri ya jumla, au mifumo ya kuzuia ambayo maandishi yanaikosoa waziwazi kama vikwazo vya uhuru.
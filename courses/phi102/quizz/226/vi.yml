question: Theo các nguyên tắc về tự do hợp đồng, đặc điểm cơ bản nào phân biệt hợp đồng tự nguyện với các hình thức tổ chức xã hội khác?
answer: Chúng đại diện cho các trò chơi có tổng bằng có, trong đó mỗi bên đều thu được lợi ích chung thông qua các mối quan hệ được đàm phán tự do.
wrong_answers:
  - Họ thiết lập các cấu trúc quyền lực phân cấp nhằm đảm bảo trật tự xã hội thông qua việc ra quyết định tập trung.
  - "Chúng tạo ra các cuộc cạnh tranh có tổng bằng không, trong đó lợi ích của một bên nhất thiết dẫn đến tổn thất tương đương của bên kia."
  - Chúng hoạt động như những cơ chế điều tiết phòng ngừa, bảo vệ xã hội khỏi những hành vi lạm dụng cá nhân trước khi chúng xảy ra.
explanation: |
  Chương này nhấn mạnh rằng các hợp đồng tự nguyện cấu thành các trò chơi có tổng bằng có, trong đó sự làm giàu lẫn nhau xảy ra bởi vì mỗi cá nhân đều tìm thấy sự thỏa mãn khi tham gia hơn là khi không tham gia. Điều này trái ngược với các cấu trúc phân cấp, tư duy tổng bằng không, hoặc các hệ thống phòng ngừa mà văn bản chỉ trích rõ ràng là những trở ngại đối với tự do.
question: Theo phê bình về các quốc gia dân chủ, đặc điểm cơ bản nào khiến sự độc quyền của các đảng chính trị trở nên đặc biệt có hại?
answer: Quyền độc quyền chỉ là tạm thời, dẫn đến việc hưởng thụ quyền lực một cách vội vã và lãng phí tài nguyên.
wrong_answers:
  - Chế độ độc quyền là vĩnh viễn, ngăn chặn mọi khả năng thay đổi chính trị hoặc cải cách.
  - Chế độ độc quyền thiếu thẩm quyền pháp lý, khiến mọi quyết định của chính phủ đều vi hiến.
  - Cơ chế độc quyền phân tán quá mức, gây ra sự nhầm lẫn và các chính sách mâu thuẫn giữa các khu vực.
explanation: |
  Văn bản này đặc biệt chỉ ra bản chất tạm thời của các thế độc quyền đảng phái chính trị là đặc biệt có hại vì nó tạo ra động lực cho việc lợi dụng quyền lực một cách vội vã, chi tiêu lãng phí nguồn lực công cộng và ban hành luật lệ hấp tấp bởi những cá nhân có thể không đủ năng lực nhưng biết rằng thời gian nắm quyền của họ có hạn. Điều này khác với các thế độc quyền vĩnh viễn hoặc các vấn đề cấu trúc khác, vì chính tính chất tạm thời thúc đẩy các mô hình hành vi phá hoại được mô tả trong bài phê bình.
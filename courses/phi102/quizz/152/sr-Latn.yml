question: Koja osnovna karakteristika čini monopol političkih partija posebno štetnim prema kritici demokratskih država?
answer: Monopol je privremen, što dovodi do užurbanog uživanja u prednostima moći i rasipanja resursa
wrong_answers:
  - Monopol je trajan, sprečavajući svaku mogućnost političke promene ili reforme.
  - Monopol nema pravni autoritet, što čini sve vladine odluke ustavno nevažećim.
  - Monopol je previše decentralizovan, što stvara konfuziju i sukobljene politike širom regiona.
explanation: |
  Tekst posebno identifikuje privremenu prirodu monopola političkih partija kao posebno štetnu jer stvara podsticaje za ubrzano iskorišćavanje benefita moći, rasipno trošenje javnih resursa i brzopleto donošenje zakona od strane potencijalno nekvalifikovanih pojedinaca koji znaju da im je vreme na vlasti ograničeno. Ovo se razlikuje od trajnih monopola ili drugih strukturnih problema, jer sama privremenost podstiče destruktivne obrasce ponašanja opisane u kritici.
question: 민주주의 국가의 비판에 따르면 정당의 독점을 특히 해롭게 만드는 근본적인 특성은 무엇입니까?
answer: 독점은 일시적이기 때문에 전력 혜택을 성급하게 누리고 자원 낭비를 초래합니다
wrong_answers:
  - 독점은 영구적이며, 정치적 변화나 개혁의 가능성을 차단합니다
  - 독점은 법적 권한이 없기 때문에 모든 정부 결정은 헌법적으로 무효입니다
  - 독점이 너무 분산되어 있어 여러 지역에 걸쳐 혼란과 상충되는 정책이 발생하고 있습니다
explanation: |
  이 글에서는 특히 정당 독점의 일시적 특성이 특히 해로운데, 이는 집권 기간이 제한적이라는 것을 알고 있는 잠재적으로 자격이 없는 개인이 권력의 혜택을 성급하게 이용하고 공공 자원을 낭비하며 성급한 법률 제정을 할 유인을 제공하기 때문입니다. 이는 일시성 자체가 비판에서 설명한 파괴적인 행동 패턴을 유발하기 때문에 영구적인 독점이나 다른 구조적 문제와는 다릅니다.
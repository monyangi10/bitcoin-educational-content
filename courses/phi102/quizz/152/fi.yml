question: Mikä perusominaisuus tekee poliittisten puolueiden monopolista erityisen haitallisen demokraattisten valtioiden kritiikin mukaan?
answer: Monopoli on tilapäinen, mikä johtaa vallan hyötyjen hätäiseen hyödyntämiseen ja resurssien tuhlaamiseen
wrong_answers:
  - Monopoli on pysyvä, mikä estää kaikki mahdollisuudet poliittiseen muutokseen tai uudistukseen
  - Monopolista puuttuu laillinen valta, minkä vuoksi kaikki hallituksen päätökset ovat perustuslain nojalla pätemättömiä
  - Monopoli on liian hajautettu, mikä aiheuttaa sekaannusta ja ristiriitaisia politiikkoja eri alueilla
explanation: |
  Tekstissä todetaan erityisesti, että poliittisten puolueiden monopolien tilapäinen luonne on erityisen haitallinen, koska se luo kannustimia vallan etujen hätäiseen hyödyntämiseen, julkisten varojen tuhlaamiseen ja sellaisten mahdollisesti epäpätevien henkilöiden hätiköityyn lainsäädäntötyöhön, jotka tietävät, että heidän valtakautensa on rajallinen. Tämä eroaa pysyvistä monopoleista tai muista rakenteellisista ongelmista, sillä tilapäisyys itsessään aiheuttaa kritiikissä kuvatut tuhoisat käyttäytymismallit.
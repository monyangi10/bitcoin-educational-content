question: Que caraterística fundamental torna o monopólio dos partidos políticos particularmente nocivo, de acordo com a crítica dos Estados democráticos?
answer: O monopólio é temporário, o que leva a um aproveitamento apressado dos benefícios do poder e a um desperdício de recursos
wrong_answers:
  - O monopólio é permanente, impedindo qualquer possibilidade de mudança ou reforma política
  - O monopólio não tem autoridade legal, o que torna todas as decisões governamentais inválidas do ponto de vista constitucional
  - O monopólio é demasiado descentralizado, criando confusão e políticas contraditórias entre regiões
explanation: |
  O texto identifica especificamente o carácter temporário dos monopólios dos partidos políticos como particularmente prejudicial, porque cria incentivos para a exploração apressada dos benefícios do poder, para o desperdício de recursos públicos e para a elaboração apressada de leis por indivíduos potencialmente não qualificados que sabem que o seu tempo no poder é limitado. Esta situação difere dos monopólios permanentes ou de outras questões estruturais, uma vez que o carácter temporário é, por si só, o motor dos padrões de comportamento destrutivos descritos na crítica.
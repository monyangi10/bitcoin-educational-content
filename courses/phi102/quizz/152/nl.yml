question: Welk fundamenteel kenmerk maakt het monopolie van politieke partijen bijzonder schadelijk volgens de kritiek op democratische staten?
answer: Het monopolie is tijdelijk, wat leidt tot overhaast genieten van machtsvoordelen en verspilling van hulpbronnen
wrong_answers:
  - Het monopolie is permanent en verhindert elke mogelijkheid tot politieke verandering of hervorming
  - Het monopolie heeft geen wettelijke autoriteit, waardoor alle overheidsbeslissingen grondwettelijk ongeldig zijn
  - Het monopolie is te gedecentraliseerd, wat leidt tot verwarring en tegenstrijdig beleid in verschillende regio's
explanation: |
  De tekst identificeert specifiek de tijdelijke aard van politieke partijmonopolies als bijzonder schadelijk omdat het prikkels creëert voor overhaaste exploitatie van machtsvoordelen, verspilling van publieke middelen en overhaaste wetgeving door potentieel ongekwalificeerde individuen die weten dat hun tijd aan de macht beperkt is. Dit verschilt van permanente monopolies of andere structurele problemen, omdat de tijdelijkheid zelf de drijvende kracht is achter de destructieve gedragspatronen die in de kritiek worden beschreven.
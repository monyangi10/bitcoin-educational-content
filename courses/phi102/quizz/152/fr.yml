question: Quelle caractéristique fondamentale rend le monopole des partis politiques particulièrement néfaste selon la critique des États démocratiques ?
answer: Le monopole est temporaire, ce qui entraîne une jouissance précipitée des avantages de l'énergie et un gaspillage des ressources
wrong_answers:
  - Le monopole est permanent, empêchant toute possibilité de changement politique ou de réforme
  - Le monopole est dépourvu d'autorité légale, ce qui rend toutes les décisions gouvernementales constitutionnellement invalides
  - Le monopole est trop décentralisé, ce qui crée de la confusion et des politiques contradictoires d'une région à l'autre
explanation: |
  Le texte identifie spécifiquement la nature temporaire des monopoles des partis politiques comme particulièrement néfaste, car elle incite à l'exploitation précipitée des avantages du pouvoir, au gaspillage des ressources publiques et à l'élaboration hâtive de lois par des individus potentiellement non qualifiés qui savent que le temps qu'ils passent au pouvoir est limité. Cette situation diffère de celle des monopoles permanents ou d'autres problèmes structurels, car c'est le caractère temporaire lui-même qui entraîne les comportements destructeurs décrits dans la critique.
question: Jaká základní vlastnost činí monopol politických stran podle kritiky demokratických států obzvláště škodlivým?
answer: Monopol je dočasný, což vede ke spěšnému využívání výhod moci a plýtvání zdroji
wrong_answers:
  - Monopol je trvalý a brání jakékoli možnosti politické změny nebo reformy
  - Monopol nemá zákonnou pravomoc, takže všechna vládní rozhodnutí jsou ústavně neplatná
  - Monopol je příliš decentralizovaný, což způsobuje zmatek a protichůdné politiky v různých regionech
explanation: |
  Text konkrétně označuje dočasnou povahu monopolů politických stran za obzvláště škodlivou, protože vytváří pobídky k rychlému využívání výhod moci, nehospodárnému vynakládání veřejných prostředků a ukvapenému přijímání zákonů potenciálně nekvalifikovanými osobami, které vědí, že jejich čas u moci je omezený. Tím se liší od trvalých monopolů nebo jiných strukturálních problémů, protože dočasnost sama o sobě pohání destruktivní vzorce chování popsané v kritice.
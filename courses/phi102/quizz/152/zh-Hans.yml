question: 根据对民主国家的批判，什么基本特征使得政党垄断特别有害？
answer: 垄断是暂时的，导致匆忙享受权力利益和资源浪费
wrong_answers:
  - 垄断是永久性的，阻止了任何政治变革或改革的可能性
  - 垄断缺乏法律权威，使所有政府决定在宪法上无效
  - 垄断过于分散，造成各地区政策混乱和冲突
explanation: |
  文中特别指出，政党垄断的临时性尤其有害，因为它会刺激人们肆意攫取权力利益、浪费公共资源，以及由那些知道自己执政时间有限、可能不合格的个人草率立法。这一点不同于永久性垄断或其他结构性问题，因为临时性本身就推动了批判中所描述的破坏性行为模式。
question: Jaka fundamentalna cecha sprawia, że monopol partii politycznych jest szczególnie szkodliwy według krytyki państw demokratycznych?
answer: Monopol jest tymczasowy, co prowadzi do pośpiesznego czerpania korzyści z władzy i marnotrawienia zasobów
wrong_answers:
  - Monopol jest trwały, uniemożliwiając jakiekolwiek zmiany polityczne lub reformy
  - Monopol nie ma umocowania prawnego, przez co wszystkie decyzje rządowe są konstytucyjnie nieważne
  - Monopol jest zbyt zdecentralizowany, co powoduje zamieszanie i sprzeczne polityki w różnych regionach
explanation: |
  W tekście wyraźnie zidentyfikowano tymczasowy charakter monopoli partii politycznych jako szczególnie szkodliwy, ponieważ stwarza on zachęty do pośpiesznego wykorzystywania korzyści płynących z władzy, marnotrawienia zasobów publicznych i pochopnego tworzenia prawa przez potencjalnie niewykwalifikowane osoby, które wiedzą, że ich czas u władzy jest ograniczony. Różni się to od stałych monopoli lub innych kwestii strukturalnych, ponieważ tymczasowość sama w sobie napędza destrukcyjne wzorce zachowań opisane w krytyce.
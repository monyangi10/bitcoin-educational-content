question: 民主主義国家批判によれば、政党の独占を特に有害なものにしている基本的特徴は何か？
answer: 独占は一時的なもので、電力利益の享受を急がせ、資源の浪費を招く。
wrong_answers:
  - 独占は永続的であり、政治的変化や改革の可能性を妨げる。
  - 独占には法的権限がないため、政府の決定はすべて憲法上無効となる。
  - 独占が分散しすぎているため、地域間で混乱が生じ、政策が矛盾している。
explanation: |
  この文章では、政党独占の一時的な性質が特に有害であると特に指摘している。なぜなら、政党独占は、権力を握る時間が限られていることを知っている潜在的に不適格な人物による、権益の性急な搾取、公的資源の無駄遣い、性急な法律制定への誘因を生み出すからである。これは永続的な独占やその他の構造的問題とは異なり、一時的であること自体が、この批評で述べられている破壊的な行動パターンを引き起こすからである。
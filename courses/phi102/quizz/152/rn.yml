question: Ni ikihe kintu nyamukuru gituma ubutegetsi bw’imigambwe bugira ingaruka mbi cane cane hakurikijwe ukunegura ibihugu vya demokarasi?
answer: Ubutegetsi bw’umuntu umwe ni ubw’akanya gatoyi, bugatuma umuntu yihuta kuronka inyungu z’ububasha no gusesagura ubutunzi .
wrong_answers:
  - Ubutegetsi bw’umuntu umwe burahoraho, bukabuza ubushobozi bwose bwo guhindura canke guhindura politike .
  - Ubutegetsi bwihariye burabura ububasha bushingiye ku mategeko, ivyo bikaba bituma ingingo zose za Leta zitagira akamaro mu vy’Itegeko Nshinga .
  - Ubutegetsi bumwe bumwe buratandukanye cane, butera urujijo n’ingingo zihushanye mu turere twose
explanation: |
  Ico canditswe kigaragaza cane cane ko ubutegetsi bw’imigambwe bwa politike bumara igihe gito ari bwo butera ingorane cane kuko butera intege abantu gukoresha nabi inyungu z’ubutegetsi, gukoresha nabi ubutunzi bwa Leta, no gushinga amategeko vyihuta n’abantu bashobora kuba badakwije ibisabwa kugira ngo bamenye ko igihe bamara ku butegetsi ari gito. Ivyo bitandukanye n’ubutegetsi buhoraho canke ibindi bibazo vy’imibumbe, kuko ubuzima bw’igihe gito ubwabwo ari bwo butuma habaho inyifato zisenya zivugwa mu vyo kunegura.
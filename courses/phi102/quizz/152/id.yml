question: Karakteristik mendasar apa yang membuat monopoli partai politik sangat berbahaya menurut kritik terhadap negara demokratis?
answer: Monopoli bersifat sementara, yang mengarah pada penikmatan manfaat kekuasaan yang terburu-buru dan pemborosan sumber daya
wrong_answers:
  - Monopoli ini bersifat permanen, mencegah segala kemungkinan perubahan atau reformasi politik
  - Monopoli tidak memiliki otoritas hukum, sehingga semua keputusan pemerintah tidak sah secara konstitusional
  - Monopoli terlalu terdesentralisasi, menciptakan kebingungan dan kebijakan yang saling bertentangan di seluruh wilayah
explanation: |
  Teks tersebut secara khusus mengidentifikasi sifat sementara dari monopoli partai politik sebagai sesuatu yang sangat berbahaya karena menciptakan insentif untuk eksploitasi keuntungan kekuasaan yang terburu-buru, pemborosan sumber daya publik, dan pembuatan undang-undang yang tergesa-gesa oleh orang-orang yang tidak memenuhi syarat yang mengetahui bahwa waktu mereka berkuasa terbatas. Hal ini berbeda dengan monopoli permanen atau masalah struktural lainnya, karena kesementaraan itu sendiri mendorong pola perilaku destruktif yang digambarkan dalam kritik tersebut.
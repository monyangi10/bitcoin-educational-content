question: چه ویژگی اساسی باعث می‌شود که انحصار احزاب سیاسی به‌ویژه مضر باشد طبق نقد دولت‌های دموکراتیک؟
answer: انحصار موقتی است و منجر به لذت عجولانه از مزایای قدرت و هدر رفت منابع می‌شود.
wrong_answers:
  - انحصار دائمی است و هرگونه امکان تغییر یا اصلاح سیاسی را از بین می‌برد.
  - انحصار فاقد صلاحیت قانونی است و تمامی تصمیمات دولتی را از نظر قانون اساسی نامعتبر می‌سازد.
  - انحصار بیش از حد غیرمتمرکز است و باعث ایجاد سردرگمی و سیاست‌های متناقض در سراسر مناطق می‌شود.
explanation: |
  متن به‌طور خاص ماهیت موقتی انحصارات احزاب سیاسی را به‌عنوان عاملی به‌ویژه زیان‌بار شناسایی می‌کند، زیرا انگیزه‌هایی برای بهره‌برداری عجولانه از مزایای قدرت، هزینه‌های بی‌رویه منابع عمومی و قانون‌گذاری شتاب‌زده توسط افرادی که ممکن است صلاحیت نداشته باشند و می‌دانند زمانشان در قدرت محدود است، ایجاد می‌کند. این با انحصارات دائمی یا سایر مسائل ساختاری متفاوت است، زیرا خود موقتی بودن، الگوهای رفتاری مخرب توصیف‌شده در نقد را تحریک می‌کند.
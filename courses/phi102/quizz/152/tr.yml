question: Demokratik devlet eleştirisine göre siyasi partilerin tekelini özellikle zararlı kılan temel özellik nedir?
answer: Tekel geçicidir, güç avantajlarından aceleyle yararlanılmasına ve kaynak israfına yol açar
wrong_answers:
  - Tekel kalıcıdır ve herhangi bir siyasi değişim veya reform olasılığını engeller
  - Tekel yasal yetkiden yoksundur, bu da tüm hükümet kararlarını anayasal olarak geçersiz kılar
  - Tekel fazla merkeziyetçi, bölgeler arasında karışıklık ve çelişkili politikalar yaratıyor
explanation: |
  Metin, siyasi parti tekellerinin geçici niteliğini özellikle zararlı olarak tanımlamaktadır çünkü bu durum, iktidar nimetlerinin aceleyle sömürülmesi, kamu kaynaklarının savurganca harcanması ve iktidarda geçirecekleri sürenin sınırlı olduğunu bilen potansiyel olarak niteliksiz kişiler tarafından aceleyle yasa yapılması için teşvikler yaratmaktadır. Bu durum kalıcı tekellerden veya diğer yapısal sorunlardan farklıdır, çünkü geçiciliğin kendisi eleştiride tanımlanan yıkıcı davranış kalıplarını yönlendirmektedir.
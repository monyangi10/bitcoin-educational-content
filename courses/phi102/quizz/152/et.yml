question: Milline põhiline omadus teeb erakondade monopoli demokraatlike riikide kriitika kohaselt eriti kahjulikuks?
answer: Monopol on ajutine, mis toob kaasa võimu eeliste kiirustatud kasutamise ja ressursside raiskamise
wrong_answers:
  - Monopol on püsiv, mis takistab igasugust võimalust poliitilisteks muutusteks või reformideks
  - Monopolile puudub õiguslik volitus, mistõttu kõik valitsuse otsused on põhiseaduslikult kehtetud
  - Monopol on liiga detsentraliseeritud, mis tekitab segadust ja vastuolulist poliitikat eri piirkondades
explanation: |
  Tekstis nimetatakse konkreetselt erakonnamonopolide ajutist iseloomu eriti kahjulikuks, sest see loob stiimulid võimu eeliste kiiret ärakasutamist, avalike ressursside raiskamist ja kiiret seadusloomet potentsiaalselt ebapädevate isikute poolt, kes teavad, et nende aeg võimul on piiratud. See erineb püsivatest monopolidest või muudest struktuurilistest probleemidest, sest ajutisus ise ajendab kriitikas kirjeldatud destruktiivseid käitumismustreid.
question: 根據非自由制度的分析，在社會主義和共產主義制度下，個人的選擇會發生什麼變化？
answer: 個人選擇被透過民主選舉做出的集體政治決策所取代，選擇有限
wrong_answers:
  - 透過集體討論和擴大民主參與經濟規劃，強化個人選擇
  - 個人選擇不變，只是透過國家機制進行協調，以確保社會和諧
  - 在個人事務上保留個人選擇，只有經濟決策轉移到集體控制。
explanation: |
  文中明確指出，社會主義和共產主義都是以「政治指導取代契約、自由選擇和個人自主。在這些制度下，「自願和互利的交換讓位給規範和所謂的公共服務」。民主進程強迫公民「在減少的選擇中默許一個總體方案，而無法真正控制後續事件」，這與個人對其日常決定的直接控制形成強烈對比。這代表著從個人能動性到集體政治控制的根本性轉變，橫跨生活的所有領域。
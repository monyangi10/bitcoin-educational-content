question: Mis juhtub vastavalt mittevabadussüsteemide analüüsile individuaalsete valikutega nii sotsialistlike kui ka kommunistlike režiimide puhul?
answer: Individuaalsed valikud asendatakse kollektiivsete poliitiliste otsustega, mis tehakse demokraatlike valimiste kaudu piiratud võimalustega
wrong_answers:
  - Individuaalseid valikuid suurendatakse kollektiivse arutelu ja laiendatud demokraatliku osalemise kaudu majanduse planeerimisel
  - Individuaalsed valikud jäävad alles, kuid neid lihtsalt koordineeritakse riiklike mehhanismide kaudu, et tagada sotsiaalne harmoonia
  - Individuaalsed valikud säilitatakse isiklikes küsimustes, samas kui ainult majanduslikud otsused antakse üle kollektiivsele kontrollile
explanation: |
  Tekstis on selgelt öeldud, et nii sotsialism kui ka kommunism asendavad "lepingu, vaba valiku ja individuaalse autonoomia poliitilise juhtimisega" Nendes süsteemides annavad "vabatahtlik ja vastastikku kasulikud vahetused teed regulatsioonidele ja nn avalikele teenustele" Demokraatlik protsess sunnib kodanikke "nõustuma üldise programmiga vähendatud võimaluste hulgas, ilma tegeliku kontrollita järgnevate sündmuste üle", mis on teravas vastuolus üksikisikute otsese kontrolliga oma igapäevaste otsuste üle. See kujutab endast põhimõttelist üleminekut individuaalselt tegutsemisvõimelt kollektiivsele poliitilisele kontrollile kõigis eluvaldkondades.
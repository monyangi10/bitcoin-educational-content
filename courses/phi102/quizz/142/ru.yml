question: Согласно анализу систем несвободы, что происходит с индивидуальным выбором при социалистическом и коммунистическом режимах?
answer: Индивидуальный выбор заменяется коллективными политическими решениями, принимаемыми в ходе демократических выборов с ограниченным выбором
wrong_answers:
  - Индивидуальный выбор расширяется благодаря коллективному обсуждению и расширенному демократическому участию в экономическом планировании
  - Индивидуальный выбор остается неизменным, просто он координируется с помощью государственных механизмов для обеспечения социальной гармонии
  - Индивидуальный выбор сохраняется в личных делах, а коллективный контроль передается только за экономическими решениями
explanation: |
  В тексте четко сказано, что и социализм, и коммунизм заменяют "договор, свободный выбор и индивидуальную автономию политическим руководством" В этих системах "добровольные и взаимовыгодные обмены уступают место регламентации и так называемым общественным услугам" Демократический процесс заставляет граждан "соглашаться с общей программой среди ограниченного числа вариантов, не имея реального контроля над последующими событиями", что резко контрастирует с прямым контролем индивидов над своими повседневными решениями. Это представляет собой фундаментальный сдвиг от индивидуальной самостоятельности к коллективному политическому контролю во всех сферах жизни.
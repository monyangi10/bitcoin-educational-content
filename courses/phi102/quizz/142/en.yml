question: According to the analysis of non-freedom systems, what happens to individual choice under both socialist and communist regimes?
answer: Individual choices are replaced by collective political decisions made through democratic elections with limited options
wrong_answers:
  - Individual choices are enhanced through collective deliberation and expanded democratic participation in economic planning
  - Individual choices remain intact but are simply coordinated through state mechanisms to ensure social harmony
  - Individual choices are preserved in personal matters while only economic decisions are transferred to collective control
explanation: |
  The text clearly states that both socialism and communism replace 'contract, free-choice and individual autonomy with political direction.' Under these systems, 'voluntary and mutually beneficial exchanges give way to regulations and so-called public services.' The democratic process forces citizens to 'acquiesce to an overall program among reduced options, without real control over subsequent events,' contrasting sharply with the direct control individuals have over their daily decisions. This represents a fundamental shift from individual agency to collective political control across all spheres of life.

question: Theo phân tích về các hệ thống phi tự do, điều gì sẽ xảy ra với sự lựa chọn cá nhân dưới cả chế độ xã hội chủ nghĩa và cộng sản?
answer: Các lựa chọn cá nhân được thay thế bằng các quyết định chính trị tập thể được đưa ra thông qua các cuộc bầu cử dân chủ với số lượng lựa chọn hạn chế.
wrong_answers:
  - Sự lựa chọn cá nhân được nâng cao thông qua thảo luận tập thể và sự tham gia dân chủ mở rộng trong kế hoạch kinh tế.
  - Các lựa chọn cá nhân vẫn được giữ nguyên nhưng được phối hợp thông qua các cơ chế nhà nước để đảm bảo sự hài hòa xã hội.
  - Quyền lựa chọn cá nhân được bảo lưu trong các vấn đề cá nhân, trong khi chỉ có các quyết định kinh tế được chuyển giao cho sự kiểm soát tập thể.
explanation: |
  Văn bản nêu rõ cả chủ nghĩa xã hội và chủ nghĩa cộng sản đều thay thế "hợp đồng, sự lựa chọn tự do và quyền tự chủ cá nhân bằng sự chỉ đạo chính trị". Dưới các hệ thống này, "các giao dịch tự nguyện và cùng có lợi nhường chỗ cho các quy định và cái gọi là dịch vụ công cộng". Quá trình dân chủ buộc công dân phải "chấp nhận một chương trình tổng thể trong số các lựa chọn bị hạn chế, mà không có quyền kiểm soát thực sự đối với các sự kiện tiếp theo", trái ngược hoàn toàn với quyền kiểm soát trực tiếp mà cá nhân có đối với các quyết định hàng ngày của họ. Điều này thể hiện một sự chuyển dịch cơ bản từ quyền tự chủ cá nhân sang sự kiểm soát chính trị tập thể trên mọi lĩnh vực của cuộc sống.
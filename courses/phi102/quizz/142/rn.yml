question: Dushingiye ku gusesangura uburyo butagira umwidegemvyo, ni igiki kiba ku mahitamwo y’umuntu ku giti ciwe mu gihe c’intwaro z’abasosiyalisiti n’iz’abakomunisita?
answer: Amahitamwo y'umuntu ku giti ciwe asubirizwa n'ingingo za politike rusangi zifatwa biciye mu matora ya demokarasi ata mahitamwo make .
wrong_answers:
  - Amahitamwo y'umuntu ku giti ciwe arakomezwa biciye mu biganiro rusangi no mu kwagura uruhara rwa demokarasi mu igenamigambi ry'ubutunzi .
  - Amahitamwo y'umuntu ku giti ciwe aguma ari meza ariko ahuzwa gusa biciye mu buryo bwa Leta kugira ngo habeho ubumwe mu kibano .
  - Amahitamwo y'umuntu ku giti ciwe arazigama mu bibazo vy'umuntu ku giti ciwe mu gihe ingingo z'ubutunzi zonyene zijanwa mu bugenzuzi rusangi .
explanation: |
  Ico canditswe kivuga neza yuko ubusosiyalisimu n'ubukomunisimu vyose bisubirira 'amasezerano, uburenganzira bwo kwihitiramwo n'ukwigenga kw'umuntu ku giti ciwe n'uburongozi bwa politike.' Muri izo nzira, 'uguhanahana amakuru ku bushake kandi kugirira akamaro bose biratuma habaho amabwirizwa be n'ivyo bita ibikorwa vya Leta.' Inzira ya demokarasi ihatira abanyagihugu ‘kwemera porogarama rusangi mu mahitamwo agabanutse, ata kugenzura nyakuri ku bintu bizokurikira,’ ivyo bikaba bitandukanye cane n’ukugenzura ata guca ku ruhande abantu ku giti cabo ku ngingo bafata ku musi ku musi. Ivyo bigereranya uguhinduka kw’ishimikiro kuva ku bubasha bw’umuntu ku giti ciwe gushika ku burongozi bwa politike rusangi mu nzego zose z’ubuzima.
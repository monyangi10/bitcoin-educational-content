question: 根据对非自由制度的分析，在社会主义和共产主义制度下，个人选择会发生什么情况？
answer: 个人选择被通过民主选举做出的集体政治决定所取代，选择有限
wrong_answers:
  - 通过集体审议和扩大民主参与经济规划，加强个人选择
  - 个人选择保持不变，只是通过国家机制进行协调，以确保社会和谐
  - 在个人事务上保留个人选择，而只有经济决策转由集体控制
explanation: |
  文中明确指出，社会主义和共产主义都是'以政治指导取代契约、自由选择和个人自主'。在这些制度下，'自愿和互利的交换让位于规章制度和所谓的公共服务'。民主进程迫使公民'在减少的选项中默认一个总体方案，而无法真正控制后续事件'，这与个人对其日常决策的直接控制形成了鲜明对比。这从根本上表明，在生活的各个领域，个人能动性已转变为集体政治控制。
question: Mitä tapahtuu yksilön valinnoille sosialistisissa ja kommunistisissa järjestelmissä vapaudettomien järjestelmien analyysin mukaan?
answer: Yksilölliset valinnat korvataan kollektiivisilla poliittisilla päätöksillä, jotka tehdään demokraattisten vaalien kautta ja joihin liittyy rajoitettuja vaihtoehtoja
wrong_answers:
  - Yksilön valintoja parannetaan kollektiivisella harkinnalla ja laajemmalla demokraattisella osallistumisella talouden suunnitteluun
  - Yksilölliset valinnat säilyvät ennallaan, mutta niitä vain koordinoidaan valtion mekanismien avulla sosiaalisen harmonian varmistamiseksi
  - Yksilölliset valinnat säilyvät henkilökohtaisissa asioissa, mutta vain taloudelliset päätökset siirretään kollektiiviseen valvontaan
explanation: |
  Tekstissä todetaan selvästi, että sekä sosialismi että kommunismi korvaavat "sopimuksen, vapaan valinnan ja yksilön autonomian poliittisella ohjauksella" Näissä järjestelmissä "vapaaehtoinen ja molempia osapuolia hyödyttävä vaihto väistyy sääntelyn ja niin sanottujen julkisten palvelujen tieltä" Demokraattinen prosessi pakottaa kansalaiset "hyväksymään yleisen ohjelman suppeampien vaihtoehtojen joukosta ilman todellista määräysvaltaa myöhempiin tapahtumiin", mikä on jyrkässä ristiriidassa sen kanssa, että yksilöillä on suora määräysvalta päivittäisiin päätöksiinsä. Tämä merkitsee perustavanlaatuista siirtymistä yksilön toimijuudesta kollektiiviseen poliittiseen valvontaan kaikilla elämänalueilla.
question: Menurut analisis sistem non-kebebasan, apa yang terjadi pada pilihan individu di bawah rezim sosialis dan komunis?
answer: Pilihan individu digantikan oleh keputusan politik kolektif yang dibuat melalui pemilihan umum yang demokratis dengan pilihan yang terbatas
wrong_answers:
  - Pilihan-pilihan individu ditingkatkan melalui musyawarah kolektif dan perluasan partisipasi demokratis dalam perencanaan ekonomi
  - Pilihan individu tetap dipertahankan, tetapi hanya dikoordinasikan melalui mekanisme negara untuk memastikan keselarasan sosial
  - Pilihan individu dipertahankan dalam masalah pribadi sementara hanya keputusan ekonomi yang dialihkan ke kontrol kolektif
explanation: |
  Teks tersebut dengan jelas menyatakan bahwa baik sosialisme maupun komunisme menggantikan 'kontrak, pilihan bebas, dan otonomi individu dengan arahan politik' Di bawah sistem-sistem ini, 'pertukaran sukarela dan saling menguntungkan digantikan oleh peraturan dan apa yang disebut pelayanan publik Proses demokrasi memaksa warga negara untuk 'menyetujui program keseluruhan di antara pilihan-pilihan yang berkurang, tanpa kontrol nyata atas kejadian-kejadian selanjutnya,' sangat kontras dengan kontrol langsung yang dimiliki individu atas keputusan sehari-hari mereka. Hal ini merupakan pergeseran mendasar dari agensi individu menjadi kontrol politik kolektif di semua bidang kehidupan.
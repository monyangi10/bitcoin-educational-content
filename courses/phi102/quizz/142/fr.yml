question: Selon l'analyse des systèmes de non-liberté, qu'advient-il du choix individuel dans les régimes socialistes et communistes ?
answer: Les choix individuels sont remplacés par des décisions politiques collectives prises dans le cadre d'élections démocratiques avec des options limitées
wrong_answers:
  - Les choix individuels sont renforcés par la délibération collective et une participation démocratique élargie à la planification économique
  - Les choix individuels restent intacts mais sont simplement coordonnés par des mécanismes étatiques afin de garantir l'harmonie sociale
  - Les choix individuels sont préservés dans les affaires personnelles, tandis que seules les décisions économiques sont transférées au contrôle collectif
explanation: |
  Le texte indique clairement que le socialisme et le communisme remplacent "le contrat, le libre choix et l'autonomie individuelle par une direction politique" Dans ces systèmes, "les échanges volontaires et mutuellement bénéfiques cèdent la place aux réglementations et aux soi-disant services publics" Le processus démocratique oblige les citoyens à "acquiescer à un programme global parmi des options réduites, sans réel contrôle sur les événements ultérieurs", ce qui contraste fortement avec le contrôle direct que les individus exercent sur leurs décisions quotidiennes. Cela représente un changement fondamental de l'action individuelle vers un contrôle politique collectif dans toutes les sphères de la vie.
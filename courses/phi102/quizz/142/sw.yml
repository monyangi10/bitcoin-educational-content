question: Kulingana na uchambuzi wa mifumo isiyo ya uhuru, nini hutokea kwa uchaguzi wa mtu binafsi chini ya tawala za kijamaa na kikomunisti?
answer: Chaguzi za kibinafsi hubadilishwa na maamuzi ya pamoja ya kisiasa yanayofanywa kupitia chaguzi za kidemokrasia huku chaguzi zikiwa chache.
wrong_answers:
  - Chaguzi za kibinafsi huimarishwa kupitia majadiliano ya pamoja na ushiriki mpana wa kidemokrasia katika mipango ya kiuchumi
  - Chaguzi za kibinafsi hubaki bila kubadilika lakini huratibiwa tu kupitia mifumo ya serikali ili kuhakikisha maelewano ya kijamii
  - Chaguzi za kibinafsi huhifadhiwa katika masuala ya kibinafsi huku maamuzi ya kiuchumi pekee yakihamishiwa kwenye udhibiti wa pamoja
explanation: |
  Maandishi yanasema wazi kwamba ujamaa na ukomunisti hubadilisha 'mkataba, uhuru wa kuchagua na uhuru wa mtu binafsi na mwelekeo wa kisiasa.' Chini ya mifumo hii, 'mabadilishano ya hiari na yenye manufaa kwa pande zote huruhusu kanuni na kile kinachoitwa huduma za umma.' Mchakato wa kidemokrasia huwalazimisha raia 'kukubali mpango wa jumla miongoni mwa chaguzi zilizopunguzwa, bila udhibiti halisi wa matukio yanayofuata,' tofauti kabisa na udhibiti wa moja kwa moja ambao watu binafsi wanao juu ya maamuzi yao ya kila siku. Hii inawakilisha mabadiliko ya msingi kutoka kwa wakala wa mtu binafsi hadi udhibiti wa pamoja wa kisiasa katika nyanja zote za maisha.
question: 非自由主義体制の分析によれば、社会主義体制と共産主義体制の下では、個人の選択はどうなるのか？
answer: 個人の選択は、限られた選択肢の中で民主的な選挙を通じて行われる集団的な政治的決定に取って代わられる。
wrong_answers:
  - 個人の選択は、集団的熟議と経済計画への民主的参加の拡大を通じて強化される。
  - 個人の選択はそのままに、社会的調和を確保するために国家機構を通じて調整されるだけである。
  - 個人的な問題については個人の選択が維持され、経済的な決定だけが集団的な管理に移される。
explanation: |
  この文章には、社会主義も共産主義も「契約、自由な選択、個人の自主性を政治的指導に置き換える」とはっきり書かれている。これらの制度の下では、「自発的で互恵的な交換が、規制やいわゆる公共サービスに取って代わられる」。民主主義のプロセスは、市民に「その後の出来事を実質的にコントロールすることなく、削減された選択肢の中から全体的なプログラムを受け入れる」ことを強制し、個人が日々の決定を直接コントロールするのとは対照的である。これは、個人の主体性から、生活のあらゆる領域にわたる集団的な政治的統制への根本的な転換を意味する。
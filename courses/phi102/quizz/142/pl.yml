question: Zgodnie z analizą systemów niewolnościowych, co dzieje się z indywidualnym wyborem w reżimach socjalistycznych i komunistycznych?
answer: Indywidualne wybory są zastępowane zbiorowymi decyzjami politycznymi podejmowanymi w drodze demokratycznych wyborów z ograniczonymi opcjami
wrong_answers:
  - Indywidualne wybory są wzmocnione dzięki zbiorowej deliberacji i rozszerzonemu demokratycznemu uczestnictwu w planowaniu gospodarczym
  - Indywidualne wybory pozostają nienaruszone, ale są po prostu koordynowane przez mechanizmy państwowe w celu zapewnienia harmonii społecznej
  - Indywidualne wybory są zachowane w sprawach osobistych, podczas gdy tylko decyzje ekonomiczne są przekazywane do zbiorowej kontroli
explanation: |
  Tekst wyraźnie stwierdza, że zarówno socjalizm, jak i komunizm zastępują "umowę, wolny wybór i indywidualną autonomię kierownictwem politycznym" W tych systemach "dobrowolna i wzajemnie korzystna wymiana ustępuje miejsca regulacjom i tak zwanym usługom publicznym" Proces demokratyczny zmusza obywateli do "przyzwolenia na ogólny program spośród ograniczonych opcji, bez rzeczywistej kontroli nad późniejszymi wydarzeniami", co wyraźnie kontrastuje z bezpośrednią kontrolą, jaką jednostki mają nad swoimi codziennymi decyzjami. Stanowi to fundamentalne przejście od indywidualnej sprawczości do zbiorowej kontroli politycznej we wszystkich sferach życia.
question: Какво се случва с индивидуалния избор при социалистическите и комунистическите режими според анализа на системите без свобода?
answer: Индивидуалният избор се заменя с колективни политически решения, вземани чрез демократични избори с ограничени възможности
wrong_answers:
  - Индивидуалният избор се подобрява чрез колективно обсъждане и разширено демократично участие в икономическото планиране
  - Индивидуалният избор остава непокътнат, но просто се координира чрез държавни механизми, за да се осигури социална хармония
  - Индивидуалният избор се запазва по отношение на личните въпроси, а само икономическите решения се прехвърлят на колективен контрол
explanation: |
  В текста ясно се посочва, че както социализмът, така и комунизмът заменят "договора, свободния избор и индивидуалната автономия с политическо ръководство" При тези системи "доброволната и взаимноизгодна размяна отстъпва място на регулациите и така наречените обществени услуги" Демократичният процес принуждава гражданите "да се съгласяват с обща програма сред ограничени възможности, без реален контрол върху последващите събития", което рязко контрастира с прекия контрол, който хората имат върху ежедневните си решения. Това представлява фундаментална промяна от индивидуално действие към колективен политически контрол във всички сфери на живота.
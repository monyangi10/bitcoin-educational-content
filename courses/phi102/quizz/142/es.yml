question: Según el análisis de los sistemas de no libertad, ¿qué ocurre con la elección individual en los regímenes socialista y comunista?
answer: Las opciones individuales se sustituyen por decisiones políticas colectivas tomadas a través de elecciones democráticas con opciones limitadas
wrong_answers:
  - Las opciones individuales mejoran gracias a la deliberación colectiva y a una mayor participación democrática en la planificación económica
  - Las decisiones individuales permanecen intactas, pero se coordinan a través de mecanismos estatales para garantizar la armonía social
  - Se mantienen las opciones individuales en asuntos personales, mientras que sólo las decisiones económicas se transfieren al control colectivo
explanation: |
  El texto afirma claramente que tanto el socialismo como el comunismo sustituyen "el contrato, la libre elección y la autonomía individual por la dirección política" Bajo estos sistemas, "los intercambios voluntarios y mutuamente beneficiosos dan paso a las regulaciones y a los llamados servicios públicos" El proceso democrático obliga a los ciudadanos a "aceptar un programa general entre opciones reducidas, sin control real sobre los acontecimientos posteriores", lo que contrasta claramente con el control directo que tienen los individuos sobre sus decisiones cotidianas. Esto representa un cambio fundamental de la agencia individual al control político colectivo en todas las esferas de la vida.
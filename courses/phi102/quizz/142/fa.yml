question: بر اساس تحلیل سیستم‌های غیرآزادی، چه اتفاقی برای انتخاب فردی در رژیم‌های سوسیالیستی و کمونیستی می‌افتد؟
answer: انتخاب‌های فردی با تصمیمات سیاسی جمعی که از طریق انتخابات دموکراتیک با گزینه‌های محدود اتخاذ می‌شوند، جایگزین می‌شوند.
wrong_answers:
  - انتخاب‌های فردی از طریق مشورت جمعی و مشارکت دموکراتیک گسترده‌تر در برنامه‌ریزی اقتصادی تقویت می‌شوند.
  - انتخاب‌های فردی دست‌نخورده باقی می‌مانند اما صرفاً از طریق مکانیسم‌های دولتی هماهنگ می‌شوند تا هماهنگی اجتماعی تضمین شود.
  - انتخاب‌های فردی در امور شخصی حفظ می‌شوند، در حالی که تنها تصمیمات اقتصادی به کنترل جمعی منتقل می‌شوند.
explanation: |
  متن به وضوح بیان می‌کند که هم سوسیالیسم و هم کمونیسم 'قرارداد، انتخاب آزاد و خودمختاری فردی را با جهت‌گیری سیاسی جایگزین می‌کنند.' تحت این سیستم‌ها، 'مبادلات داوطلبانه و متقابل سودمند جای خود را به مقررات و خدمات عمومی به اصطلاح می‌دهند.' فرآیند دموکراتیک شهروندان را مجبور می‌کند تا 'به یک برنامه کلی در میان گزینه‌های کاهش‌یافته رضایت دهند، بدون کنترل واقعی بر رویدادهای بعدی،' که به شدت با کنترل مستقیمی که افراد بر تصمیمات روزانه خود دارند، در تضاد است. این نشان‌دهنده تغییری اساسی از عاملیت فردی به کنترل سیاسی جمعی در تمام حوزه‌های زندگی است.
question: De acordo com a análise dos sistemas sem liberdade, o que acontece à escolha individual nos regimes socialista e comunista?
answer: As escolhas individuais são substituídas por decisões políticas colectivas tomadas através de eleições democráticas com opções limitadas
wrong_answers:
  - As escolhas individuais são reforçadas através da deliberação colectiva e da participação democrática alargada no planeamento económico
  - As escolhas individuais permanecem intactas, mas são simplesmente coordenadas através de mecanismos estatais para garantir a harmonia social
  - As escolhas individuais são preservadas em questões pessoais, enquanto apenas as decisões económicas são transferidas para o controlo coletivo
explanation: |
  O texto afirma claramente que tanto o socialismo como o comunismo substituem "o contrato, a livre escolha e a autonomia individual pela direção política" Nestes sistemas, "as trocas voluntárias e mutuamente benéficas dão lugar a regulamentos e aos chamados serviços públicos" O processo democrático força os cidadãos a "aceitarem um programa global entre opções reduzidas, sem controlo real sobre os acontecimentos subsequentes", o que contrasta fortemente com o controlo direto que os indivíduos têm sobre as suas decisões diárias. Isto representa uma mudança fundamental do arbítrio individual para o controlo político coletivo em todas as esferas da vida.
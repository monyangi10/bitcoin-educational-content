question: Co se podle analýzy nesvobodných systémů děje s individuální volbou v socialistických a komunistických režimech?
answer: Individuální volba je nahrazena kolektivním politickým rozhodnutím v demokratických volbách s omezenými možnostmi
wrong_answers:
  - Individuální volby jsou posíleny kolektivním zvažováním a rozšířenou demokratickou účastí na ekonomickém plánování
  - Individuální volby zůstávají nedotčeny, ale jsou pouze koordinovány prostřednictvím státních mechanismů, aby byla zajištěna sociální harmonie
  - Individuální volba v osobních záležitostech zůstává zachována, zatímco do kolektivní kontroly se přenášejí pouze ekonomická rozhodnutí
explanation: |
  V textu se jasně uvádí, že socialismus i komunismus nahrazují "smlouvu, svobodnou volbu a autonomii jednotlivce politickým řízením" V těchto systémech "dobrovolná a vzájemně výhodná směna ustupuje regulacím a takzvaným veřejným službám" Demokratický proces nutí občany "souhlasit s celkovým programem mezi omezenými možnostmi bez skutečné kontroly nad následnými událostmi", což ostře kontrastuje s přímou kontrolou, kterou mají jednotlivci nad svými každodenními rozhodnutími. To představuje zásadní posun od individuálního jednání ke kolektivní politické kontrole ve všech oblastech života.
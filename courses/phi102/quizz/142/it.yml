question: Secondo l'analisi dei sistemi di non libertà, cosa succede alla scelta individuale nei regimi socialisti e comunisti?
answer: Le scelte individuali sono sostituite da decisioni politiche collettive prese attraverso elezioni democratiche con opzioni limitate
wrong_answers:
  - Le scelte individuali sono rafforzate dalla deliberazione collettiva e dall'ampliamento della partecipazione democratica alla pianificazione economica
  - Le scelte individuali rimangono intatte, ma sono semplicemente coordinate attraverso meccanismi statali per garantire l'armonia sociale
  - Le scelte individuali vengono mantenute nelle questioni personali, mentre solo le decisioni economiche vengono trasferite al controllo collettivo
explanation: |
  Il testo afferma chiaramente che sia il socialismo che il comunismo sostituiscono "il contratto, la libera scelta e l'autonomia individuale con la direzione politica" In questi sistemi, "gli scambi volontari e reciprocamente vantaggiosi lasciano il posto a regolamenti e ai cosiddetti servizi pubblici" Il processo democratico costringe i cittadini ad "accettare un programma generale tra opzioni ridotte, senza un reale controllo sugli eventi successivi", in netto contrasto con il controllo diretto che gli individui hanno sulle loro decisioni quotidiane. Questo rappresenta un passaggio fondamentale dall'agenzia individuale al controllo politico collettivo in tutte le sfere della vita.
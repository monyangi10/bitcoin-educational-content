question: Ni igiki gituma igihe n’imiterere y’ibisubizo bitandukanye cane hagati y’ingingo z’isoko n’ingingo za politike mu nzego za demokarasi?
answer: Ivyemezo vy’isoko bitanga inyishu zihita kandi zitaziguye zituma umuntu ashobora guhindura inyifato yiwe ashingiye ku vyo yiboneye, mu gihe ingingo za politike zituma habaho ingaruka zicerezwa, zihurikiye hamwe zigora abantu gusubira inyuma ku mahitamwo yabo yihariye .
wrong_answers:
  - Ivyemezo vy’isoko birimwo ugutegura ibintu bikomeye vy’igihe kirekire mu gihe ingingo za politike zishingiye ku nyishu z’inyiyumvo zihita zishobora gusuzumwa ningoga .
  - Ivyemezo vy'isoko bisaba kwubaka ubumwe rusangi mu gihe ingingo za politike zituma umuntu yigenga kandi akagenzura neza ivyavuyemwo .
  - Ivyemezo vy'isoko bifatwa gake cane bifise ingaruka zihoraho mu gihe ingingo za politike zifatwa ku musi ku musi bifise ingaruka zishobora gusubirwamwo bitagoranye .
explanation: |
  Iki gice gishimika ku vy’uko amahitamwo y’isoko atanga ibisubizo vyihuta, bishobora gukurikirana aho abantu bashobora kugereranya ata guca ku ruhande ukunyurwa no guhindura inyifato bishingiye ku bumenyi. Mu buryo butandukanye n’ubwo, ingingo za politike ‘zirashirwa mu gihe’ zikaba zigira ingaruka rusangi zituma abanyagihugu badashobora gutahura ingaruka zose z’amatora yabo. Ingingo za politike zirashobora gutera ingorane abantu umutora atigera abona ata guca ku ruhande, kandi amatora arimwo porogarama zikomeye aho kuba amahitamwo yoroshe kandi ata guca ku ruhande. Ubwo butandukaniro bw’igihe n’ubw’ibisubizo ni ngirakamaro cane kugira ngo umuntu atahure igituma hariho ikibazo c’uburezi bwa demokarasi - abanyagihugu bitezwe gufata ingingo zikomeye cane (iz’ivya politike) zidafise uburyo bwo gutanga inyishu zidashobora kwizigirwa kuruta ingingo zoroshe (iz’ubutunzi) zifise ingaruka zica zihita kandi zitomoye.
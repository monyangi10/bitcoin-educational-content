question: 市場の意思決定と民主主義体制における政治的意思決定とでは、フィードバックのタイミングや性質が根本的に異なるのはなぜか？
answer: 一方、政治的な意思決定は、個人にとって特定の選択まで遡ることが困難な、遅延した集団的な結果をもたらす。
wrong_answers:
  - 市場の決定は複雑で長期的な計画を伴うが、政治的決定はすぐに評価できる感情的な反応に基づいている。
  - 市場の意思決定には集団的な合意形成が必要である一方、政治的な意思決定には個人の自律性と結果に対する直接的な個人的コントロールが必要である。
  - 市場の意思決定は、永久的な結果を伴う頻繁には行われないが、政治的な意思決定は、容易に可逆的な影響を伴う日常的なものである。
explanation: |
  この章では、市場の選択は、個人が満足度を直接比較し、経験に基づいて行動を調整することができる、即時で追跡可能な結果を提供することを強調している。これとは対照的に、政治的な決定は「時間の間隔が空く」ものであり、集団的な結果を伴うため、市民は自分の一票が及ぼす影響を完全に理解することは不可能である。政治的措置は、有権者が直接目にすることのない人々に害を及ぼすかもしれないし、選挙は単純で直接的な選択ではなく、複雑なプログラムを伴う。この時間的・フィードバック的な違いは、なぜ民主主義の訓育パラドックスが存在するのかを理解する上で極めて重要である。市民は、すぐに明確な結果が得られる単純な意思決定（経済的）よりも、信頼性の低いフィードバック・メカニズムを持つより複雑な意思決定（政治的）を行うことが期待されているのである。
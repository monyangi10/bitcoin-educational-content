question: 在民主制度下，市场决策与政治决策在反馈的时间和性质上有何本质区别？
answer: 市场决策提供即时、直接的反馈，使个人能够根据个人经验调整行为，而政治决策则产生延迟的集体后果，个人难以追溯到自己的具体选择
wrong_answers:
  - 市场决策涉及复杂的长期规划，而政治决策则基于可快速评估的即时情绪反应
  - 市场决策需要达成集体共识，而政治决策则允许个人自主并直接控制结果
  - 市场决策不经常做出，会产生永久性后果，而政治决策每天都在做出，其影响很容易逆转
explanation: |
  本章强调，市场选择提供即时、可追溯的结果，个人可以直接比较满意度，并根据经验调整行为。相比之下，政治决策是 "时间上的间隔"，具有集体后果，公民不可能了解其投票的全部影响。政治措施可能会对选民从未直接接触过的人造成伤害，选举涉及复杂的程序，而不是简单直接的选择。这种时间和反馈上的差异对于理解为什么会出现民主监护悖论至关重要--人们期望公民做出更复杂的决策（政治决策），但其反馈机制却不那么可靠，而做出更简单的决策（经济决策）则会立即产生明确的结果。
question: Mille poolest on tagasiside ajastus ja iseloom põhimõtteliselt erinev turumajanduslike otsuste ja poliitiliste otsuste vahel demokraatlikes süsteemides?
answer: Turuotsused annavad vahetut, otsest tagasisidet, mis võimaldab üksikisikutel kohandada käitumist isikliku kogemuse põhjal, samas kui poliitilised otsused tekitavad hilinenud, kollektiivseid tagajärgi, mida üksikisikutel on raske jälgida oma konkreetsete valikute suhtes
wrong_answers:
  - Turuotsused hõlmavad keerulist pikaajalist planeerimist, samas kui poliitilised otsused põhinevad kiirelt hinnataval emotsionaalsel reageerimisel
  - Turuotsused nõuavad kollektiivset konsensuse saavutamist, samas kui poliitilised otsused võimaldavad individuaalset autonoomiat ja otsest isiklikku kontrolli tulemuste üle
  - Turuotsuseid tehakse harva ja püsivate tagajärgedega, samas kui poliitilisi otsuseid tehakse iga päev ja nende mõju on kergesti pöörduv
explanation: |
  Peatükis rõhutatakse, et turuvalikud pakuvad koheseid, jälgitavaid tulemusi, kus üksikisikud saavad otseselt võrrelda rahulolu ja kohandada käitumist kogemuste põhjal. Seevastu poliitilised otsused on "ajaliselt hajutatud", mille kollektiivsed tagajärjed ei võimalda kodanikel mõista oma häälte täielikku mõju. Poliitilised meetmed võivad kahjustada inimesi, keda valija kunagi otseselt ei näe, ning valimised hõlmavad pigem keerulisi programme kui lihtsaid, otseseid valikuid. See ajaline ja tagasiside erinevus on otsustava tähtsusega, et mõista, miks on olemas demokraatliku eestkoste paradoks - kodanikelt oodatakse keerulisemaid otsuseid (poliitilisi), mille tagasiside mehhanismid on vähem usaldusväärsed, kui lihtsamaid otsuseid (majanduslikke), mille tulemused on kohesed ja selged.
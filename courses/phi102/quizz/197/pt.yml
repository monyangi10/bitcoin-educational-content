question: O que é que faz com que o momento e a natureza do feedback sejam fundamentalmente diferentes entre as decisões de mercado e as decisões políticas nos sistemas democráticos?
answer: As decisões de mercado proporcionam um feedback imediato e direto que permite aos indivíduos ajustarem o seu comportamento com base na sua experiência pessoal, enquanto as decisões políticas produzem consequências colectivas tardias que dificilmente podem ser associadas às suas escolhas específicas
wrong_answers:
  - As decisões de mercado envolvem um planeamento complexo a longo prazo, enquanto as decisões políticas se baseiam em respostas emocionais imediatas que podem ser avaliadas rapidamente
  - As decisões de mercado exigem a formação de consensos colectivos, enquanto as decisões políticas permitem a autonomia individual e o controlo pessoal direto dos resultados
  - As decisões de mercado são tomadas com pouca frequência e têm consequências permanentes, enquanto as decisões políticas são tomadas diariamente e têm efeitos facilmente reversíveis
explanation: |
  O capítulo sublinha que as escolhas de mercado oferecem resultados imediatos e rastreáveis, em que os indivíduos podem comparar diretamente as satisfações e ajustar o comportamento com base na experiência. Em contrapartida, as decisões políticas são "espaçadas no tempo", com consequências colectivas que tornam impossível aos cidadãos compreenderem o impacto total dos seus votos. As medidas políticas podem prejudicar pessoas que o eleitor nunca vê diretamente, e as eleições envolvem programas complexos em vez de escolhas simples e diretas. Esta diferença temporal e de feedback é crucial para compreender por que razão existe o paradoxo da tutela democrática - espera-se que os cidadãos tomem decisões mais complexas (políticas) com mecanismos de feedback menos fiáveis do que decisões mais simples (económicas) com resultados imediatos e claros.
question: 在民主體制中，市場決策與政治決策在回饋的時間與性質上有何根本不同？
answer: 市場決策提供即時、直接的回饋，讓個人可以根據個人經驗調整行為，而政治決策則會產生延遲、集體的後果，個人很難追溯到自己的特定選擇。
wrong_answers:
  - 市場決策涉及複雜的長期規劃，而政治決策則基於可快速評估的即時情感反應。
  - 市場決策需要集體建立共識，而政治決策則允許個人自主，並由個人直接控制結果
  - 市場決策不經常有永久性的後果，而政治決策則是每天都會發生，且影響容易逆轉。
explanation: |
  本章強調，市場選擇提供即時、可追溯的結果，個人可以直接比較滿意度，並根據經驗調整行為。相比之下，政治決策則是「時間上的間隔」，具有集體後果，使得公民無法瞭解其投票的完整影響。政治措施可能會傷害選民從未直接見到的人，而且選舉涉及複雜的程式，而非簡單直接的選擇。這種時間和回饋上的差異，對於理解民主監督悖論的存在原因至關重要--公民被期望做出更複雜的決策（政治），但其回饋機制卻不那麼可靠，而不是做出簡單的決策（經濟），但其結果卻是直接明確的。
question: 민주주의 시스템에서 시장 결정과 정치적 결정 사이에 피드백의 시기와 성격이 근본적으로 다른 이유는 무엇일까요?
answer: 시장 결정은 개인이 개인적인 경험을 바탕으로 행동을 조정할 수 있도록 즉각적이고 직접적인 피드백을 제공하는 반면, 정치적 결정은 개인이 특정 선택을 추적하기 어려운 지연된 집단적 결과를 초래합니다
wrong_answers:
  - 시장 결정에는 복잡한 장기 계획이 수반되는 반면, 정치적 결정은 즉각적인 감정적 반응에 기반하여 신속하게 평가할 수 있습니다
  - 시장 결정은 집단적 합의 형성이 필요한 반면, 정치적 결정은 개인의 자율성과 결과에 대한 직접적인 개인 통제를 허용합니다
  - 시장 결정은 영구적인 결과를 초래하는 경우가 드물지만 정치적 결정은 쉽게 되돌릴 수 있는 영향을 미치며 매일 이루어집니다
explanation: |
  이 장에서는 시장 선택은 개인이 직접 만족도를 비교하고 경험을 바탕으로 행동을 조정할 수 있는 즉각적이고 추적 가능한 결과를 제공한다는 점을 강조합니다. 이와는 대조적으로 정치적 결정은 '시차를 두고' 집단적인 결과를 초래하기 때문에 시민들이 자신의 투표가 미치는 영향을 완전히 이해하는 것이 불가능합니다. 정치적 조치는 유권자가 직접 보지 못하는 사람들에게 피해를 줄 수 있으며, 선거는 단순하고 직접적인 선택이 아닌 복잡한 프로그램을 포함합니다. 이러한 시간적 차이와 피드백의 차이는 민주적 후견의 역설이 존재하는 이유를 이해하는 데 중요한데, 시민들은 즉각적이고 명확한 결과가 나타나는 단순한 결정(경제적)보다 덜 신뢰할 수 있는 피드백 메커니즘을 가진 더 복잡한 결정(정치적)을 내릴 것으로 예상됩니다.
question: なぜこの章では、経済的な市場の選択は、個々の市民にとっての政治的な選択よりも根本的に単純であると主張しているのか？
answer: 経済的な選択は、測定可能な個人的な結果を即座に直接フィードバックし、容易に比較したり、経験に基づいて調整したりすることができる。
wrong_answers:
  - 経済的な選択は、政治的な決定に関わる巨額の予算に比べ、より少額の資金と資源を伴う。
  - 経済的な選択は専門的な知識を持つ個人によって行われるが、政治的な選択には複雑な憲法を理解する必要がある。
  - 経済的選択は市場メカニズムによって規制されるが、政治的選択は明確なルールのない非構造的な環境で行われる
explanation: |
  テキストでは、経済的選択は、即時のフィードバック、直接的な個人的結果、結果を比較し、経験に基づいて行動を調整する能力を提供するため、より単純であることを強調している。市民は、自分が知っている商品を評価し、自分自身への直接的な影響を理解することができる。対照的に、政治的選択は時間的間隔があり、追跡が困難な集団的結果をもたらし、目に見えない人々に害を及ぼす可能性があり、全体を理解するのが困難な複雑なプログラムを含んでいる。他の選択肢は、フィードバックの仕組みや結果の見え方の根本的な違いではなく、資金や専門知識、規制に焦点を当てることで、議論を誤魔化している。
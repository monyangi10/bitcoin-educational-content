question: Dlaczego w tym rozdziale argumentuje się, że ekonomiczne wybory rynkowe są zasadniczo prostsze niż wybory polityczne dla poszczególnych obywateli?
answer: Wybory ekonomiczne zapewniają natychmiastową, bezpośrednią informację zwrotną z wymiernymi osobistymi konsekwencjami, które można łatwo porównać i dostosować w oparciu o doświadczenie
wrong_answers:
  - Wybory ekonomiczne wiążą się z mniejszymi kwotami pieniędzy i zasobów w porównaniu do ogromnych budżetów związanych z decyzjami politycznymi
  - Wybory ekonomiczne są dokonywane przez osoby posiadające specjalistyczną wiedzę, podczas gdy wybory polityczne wymagają zrozumienia złożonego prawa konstytucyjnego
  - Wybory ekonomiczne są regulowane przez mechanizmy rynkowe, podczas gdy wybory polityczne działają w nieustrukturyzowanym środowisku bez jasnych zasad
explanation: |
  Tekst podkreśla, że wybory ekonomiczne są prostsze, ponieważ oferują natychmiastową informację zwrotną, bezpośrednie osobiste konsekwencje oraz możliwość porównywania wyników i dostosowywania zachowań w oparciu o doświadczenie. Obywatele mogą oceniać produkty, które znają i rozumieją ich bezpośredni wpływ na siebie. W przeciwieństwie do tego, wybory polityczne są rozłożone w czasie, mają zbiorowe konsekwencje, które są trudne do prześledzenia, mogą zaszkodzić niewidocznym osobom i obejmują złożone programy, które są trudne do zrozumienia w całości. Inne opcje błędnie przedstawiają argument, koncentrując się na pieniądzach, wiedzy specjalistycznej lub regulacjach, a nie na fundamentalnej różnicy w mechanizmach sprzężenia zwrotnego i widoczności konsekwencji.
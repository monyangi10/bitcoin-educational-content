question: ¿Por qué argumenta el capítulo que las opciones económicas de mercado son fundamentalmente más sencillas que las opciones políticas para los ciudadanos individuales?
answer: Las decisiones económicas proporcionan información inmediata y directa con consecuencias personales cuantificables que pueden compararse y ajustarse fácilmente en función de la experiencia
wrong_answers:
  - Las decisiones económicas implican menores cantidades de dinero y recursos en comparación con los presupuestos masivos de las decisiones políticas
  - Las decisiones económicas son tomadas por personas con conocimientos especializados, mientras que las políticas exigen la comprensión de complejas leyes constitucionales
  - Las decisiones económicas están reguladas por mecanismos de mercado, mientras que las políticas se desarrollan en un entorno desestructurado, sin normas claras
explanation: |
  El texto subraya que las opciones económicas son más sencillas porque ofrecen información inmediata, consecuencias personales directas y la posibilidad de comparar resultados y ajustar el comportamiento en función de la experiencia. Los ciudadanos pueden evaluar los productos que conocen y comprender el impacto directo sobre ellos mismos. En cambio, las opciones políticas se espacian en el tiempo, tienen consecuencias colectivas difíciles de rastrear, pueden perjudicar a personas invisibles e implican programas complejos difíciles de comprender en su totalidad. Las otras opciones tergiversan el argumento al centrarse en el dinero, la experiencia o la regulación en lugar de en la diferencia fundamental de los mecanismos de retroalimentación y la visibilidad de las consecuencias.
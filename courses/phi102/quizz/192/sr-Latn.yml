question: Zašto poglavlje tvrdi da su ekonomski tržišni izbori suštinski jednostavniji od političkih izbora za pojedinačne građane?
answer: Ekonomski izbori pružaju trenutne, direktne povratne informacije sa merljivim ličnim posledicama koje se lako mogu uporediti i prilagoditi na osnovu iskustva.
wrong_answers:
  - Ekonomski izbori uključuju manje količine novca i resursa u poređenju sa ogromnim budžetima uključenim u političke odluke.
  - Ekonomske izbore donose pojedinci sa specijalizovanim znanjem, dok politički izbori zahtevaju razumevanje složenog ustavnog prava.
  - Ekonomski izbori su regulisani tržišnim mehanizmima dok politički izbori funkcionišu u nestrukturisanom okruženju bez jasnih pravila
explanation: |
  Tekst naglašava da su ekonomski izbori jednostavniji jer nude trenutne povratne informacije, direktne lične posledice i mogućnost poređenja rezultata i prilagođavanja ponašanja na osnovu iskustva. Građani mogu da procene proizvode koje poznaju i razumeju direktan uticaj na sebe. Nasuprot tome, politički izbori su raspoređeni tokom vremena, imaju kolektivne posledice koje je teško pratiti, mogu naštetiti nevidljivim ljudima i uključuju složene programe koje je teško u potpunosti razumeti. Druge opcije pogrešno predstavljaju argument fokusirajući se na novac, stručnost ili regulaciju umesto na fundamentalnu razliku u mehanizmima povratnih informacija i vidljivosti posledica.
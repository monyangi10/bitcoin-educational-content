question: Защо в главата се твърди, че икономическият пазарен избор е принципно по-прост от политическия избор за отделните граждани?
answer: Икономическият избор осигурява незабавна, пряка обратна връзка с измерими лични последици, които могат лесно да се сравняват и коригират въз основа на опита
wrong_answers:
  - Икономическият избор е свързан с по-малки суми пари и ресурси в сравнение с огромните бюджети, свързани с политическите решения
  - Икономическият избор се прави от хора със специализирани познания, докато политическият избор изисква разбиране на сложно конституционно право
  - Икономическият избор се регулира от пазарни механизми, докато политическият избор се осъществява в неструктурирана среда без ясни правила
explanation: |
  В текста се подчертава, че икономическите избори са по-прости, защото предлагат незабавна обратна връзка, преки лични последици и възможност за сравняване на резултатите и коригиране на поведението въз основа на опита. Гражданите могат да оценяват продукти, които познават и разбират прякото им въздействие върху тях самите. За разлика от тях политическият избор е разпределен във времето, има колективни последици, които трудно могат да бъдат проследени, може да навреди на невидими хора и включва сложни програми, които трудно могат да бъдат разбрани в тяхната цялост. Другите варианти представят аргумента погрешно, като се фокусират върху парите, експертните познания или регулирането, а не върху фундаменталната разлика в механизмите за обратна връзка и видимостта на последиците.
question: Porque é que o capítulo defende que as escolhas económicas de mercado são fundamentalmente mais simples do que as escolhas políticas de cada cidadão?
answer: As escolhas económicas fornecem um feedback imediato e direto com consequências pessoais mensuráveis que podem ser facilmente comparadas e ajustadas com base na experiência
wrong_answers:
  - As escolhas económicas envolvem montantes mais reduzidos de dinheiro e recursos em comparação com os orçamentos maciços envolvidos nas decisões políticas
  - As escolhas económicas são feitas por indivíduos com conhecimentos especializados, enquanto as escolhas políticas exigem a compreensão do complexo direito constitucional
  - As escolhas económicas são reguladas por mecanismos de mercado, enquanto as escolhas políticas funcionam num ambiente não estruturado e sem regras claras
explanation: |
  O texto sublinha que as escolhas económicas são mais simples porque oferecem feedback imediato, consequências pessoais diretas e a possibilidade de comparar resultados e ajustar o comportamento com base na experiência. Os cidadãos podem avaliar produtos que conhecem e compreendem o impacto direto sobre si próprios. Em contrapartida, as escolhas políticas são espaçadas no tempo, têm consequências colectivas difíceis de identificar, podem prejudicar pessoas invisíveis e envolvem programas complexos que são difíceis de compreender na sua totalidade. As outras opções deturpam o argumento, centrando-se no dinheiro, nos conhecimentos especializados ou na regulamentação, em vez de se centrarem na diferença fundamental dos mecanismos de feedback e da visibilidade das consequências.
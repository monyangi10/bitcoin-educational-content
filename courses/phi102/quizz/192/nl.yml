question: Waarom stelt het hoofdstuk dat economische marktkeuzes fundamenteel eenvoudiger zijn dan politieke keuzes voor individuele burgers?
answer: Economische keuzes geven onmiddellijke, directe feedback met meetbare persoonlijke gevolgen die gemakkelijk vergeleken en aangepast kunnen worden op basis van ervaring
wrong_answers:
  - Bij economische keuzes gaat het om kleinere hoeveelheden geld en middelen in vergelijking met de enorme budgetten die gemoeid zijn met politieke beslissingen
  - Economische keuzes worden gemaakt door individuen met gespecialiseerde kennis, terwijl politieke keuzes inzicht vereisen in ingewikkeld constitutioneel recht
  - Economische keuzes worden gereguleerd door marktmechanismen, terwijl politieke keuzes plaatsvinden in een ongestructureerde omgeving zonder duidelijke regels
explanation: |
  De tekst benadrukt dat economische keuzes eenvoudiger zijn omdat ze onmiddellijke feedback, directe persoonlijke gevolgen en de mogelijkheid om resultaten te vergelijken en gedrag aan te passen op basis van ervaring bieden. Burgers kunnen producten evalueren die ze kennen en begrijpen wat de directe gevolgen voor henzelf zijn. Politieke keuzes daarentegen zijn gespreid in de tijd, hebben collectieve gevolgen die moeilijk te traceren zijn, kunnen ongeziene mensen schaden en omvatten complexe programma's die moeilijk in hun geheel te begrijpen zijn. De andere opties geven een verkeerd beeld van het argument door te focussen op geld, expertise of regelgeving in plaats van op het fundamentele verschil in feedbackmechanismen en zichtbaarheid van gevolgen.
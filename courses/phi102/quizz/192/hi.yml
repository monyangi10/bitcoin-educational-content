question: Why does the chapter argue that economic market choices are fundamentally simpler than political choices for individual citizens?
answer: Economic choices provide immediate, direct feedback with measurable personal consequences that can be easily compared and adjusted based on experience
wrong_answers:
  - Economic choices involve smaller amounts of money and resources compared to the massive budgets involved in political decisions
  - Economic choices are made by individuals with specialized knowledge while political choices require understanding complex constitutional law
  - Economic choices are regulated by market mechanisms while political choices operate in an unstructured environment without clear rules
explanation: |
  The text emphasizes that economic choices are simpler because they offer immediate feedback, direct personal consequences, and the ability to compare results and adjust behavior based on experience. Citizens can evaluate products they know and understand the direct impact on themselves. In contrast, political choices are spaced over time, have collective consequences that are difficult to trace, may harm unseen people, and involve complex programs that are hard to comprehend in their entirety. The other options misrepresent the argument by focusing on money, expertise, or regulation rather than the fundamental difference in feedback mechanisms and consequence visibility.
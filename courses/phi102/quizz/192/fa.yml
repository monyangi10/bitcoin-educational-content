question: چرا این فصل استدلال می‌کند که انتخاب‌های بازار اقتصادی به‌طور اساسی ساده‌تر از انتخاب‌های سیاسی برای شهروندان فردی هستند؟
answer: انتخاب‌های اقتصادی بازخورد فوری و مستقیمی با پیامدهای شخصی قابل اندازه‌گیری ارائه می‌دهند که می‌توان به‌راحتی آن‌ها را بر اساس تجربه مقایسه و تنظیم کرد.
wrong_answers:
  - انتخاب‌های اقتصادی شامل مقادیر کمتری پول و منابع در مقایسه با بودجه‌های عظیمی است که در تصمیم‌گیری‌های سیاسی دخیل هستند.
  - انتخاب‌های اقتصادی توسط افرادی با دانش تخصصی انجام می‌شود، در حالی که انتخاب‌های سیاسی نیاز به درک قوانین پیچیده قانون اساسی دارد.
  - انتخاب‌های اقتصادی توسط مکانیزم‌های بازار تنظیم می‌شوند در حالی که انتخاب‌های سیاسی در محیطی بدون ساختار و بدون قوانین واضح عمل می‌کنند.
explanation: |
  متن تأکید می‌کند که انتخاب‌های اقتصادی ساده‌تر هستند زیرا بازخورد فوری، پیامدهای شخصی مستقیم و توانایی مقایسه نتایج و تنظیم رفتار بر اساس تجربه را ارائه می‌دهند. شهروندان می‌توانند محصولاتی را که می‌شناسند ارزیابی کنند و تأثیر مستقیم آن‌ها بر خودشان را درک کنند. در مقابل، انتخاب‌های سیاسی در طول زمان فاصله دارند، پیامدهای جمعی دارند که ردیابی آن‌ها دشوار است، ممکن است به افراد نادیده آسیب برسانند و شامل برنامه‌های پیچیده‌ای هستند که درک کامل آن‌ها دشوار است. گزینه‌های دیگر با تمرکز بر پول، تخصص یا مقررات به جای تفاوت اساسی در مکانیزم‌های بازخورد و قابلیت مشاهده پیامدها، استدلال را نادرست نشان می‌دهند.
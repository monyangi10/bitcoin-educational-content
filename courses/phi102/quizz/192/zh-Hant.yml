question: 本章為何主張經濟市場選擇根本上比個別公民的政治選擇簡單？
answer: 經濟選擇提供即時、直接的回饋，具有可衡量的個人後果，可輕鬆比較並根據經驗進行調整
wrong_answers:
  - 與政治決策所涉及的龐大預算相比，經濟選擇所涉及的金錢和資源較少
  - 經濟選擇由具備專業知識的個人做出，而政治選擇則需要瞭解複雜的憲法。
  - 經濟選擇受到市場機制的規範，而政治選擇則在沒有明確規則的非結構化環境中運作
explanation: |
  文中強調經濟選擇比較簡單，因為它提供即時的回饋、直接的個人後果，以及比較結果和根據經驗調整行為的能力。公民可以評估他們所知道的產品，並瞭解對自己的直接影響。相比之下，政治選擇的時間間隔較長，其集體後果難以追溯，可能會傷害到不認識的人，而且涉及複雜的程式，難以理解其全部。其他方案歪曲了這一論點，將焦點放在金錢、專業知識或規範上，而不是回饋機制和後果可見度的根本差異上。
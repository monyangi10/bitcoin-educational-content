question: Tại sao chương này lại lập luận rằng các lựa chọn trên thị trường kinh tế về cơ bản đơn giản hơn các lựa chọn chính trị đối với từng công dân?
answer: Các lựa chọn kinh tế mang lại phản hồi trực tiếp, tức thì với những hậu quả cá nhân có thể đo lường được, dễ dàng so sánh và điều chỉnh dựa trên kinh nghiệm.
wrong_answers:
  - Các quyết định kinh tế liên quan đến số tiền và nguồn lực nhỏ hơn so với ngân sách khổng lồ trong các quyết định chính trị.
  - Các quyết định kinh tế được đưa ra bởi các cá nhân có kiến thức chuyên môn, trong khi các quyết định chính trị đòi hỏi sự hiểu biết về luật hiến pháp phức tạp.
  - Các lựa chọn kinh tế được điều chỉnh bởi cơ chế thị trường, trong khi các lựa chọn chính trị hoạt động trong một môi trường không có cấu trúc rõ ràng và không có quy tắc cụ thể.
explanation: |
  Văn bản nhấn mạnh rằng các lựa chọn kinh tế đơn giản hơn vì chúng mang lại phản hồi tức thì, hậu quả trực tiếp đối với cá nhân và khả năng so sánh kết quả cũng như điều chỉnh hành vi dựa trên kinh nghiệm. Công dân có thể đánh giá các sản phẩm mà họ biết và hiểu được tác động trực tiếp đến bản thân. Ngược lại, các lựa chọn chính trị diễn ra theo thời gian, có hậu quả tập thể khó theo dõi, có thể gây hại cho những người không nhìn thấy và liên quan đến các chương trình phức tạp khó hiểu toàn diện. Các lựa chọn khác đã xuyên tạc lập luận bằng cách tập trung vào tiền bạc, chuyên môn hoặc quy định thay vì sự khác biệt cơ bản về cơ chế phản hồi và khả năng nhận biết hậu quả.
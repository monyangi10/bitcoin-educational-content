question: Hubungan mendasar apa yang ada antara kondisi material dan kebebasan individu menurut analisis perkembangan sejarah?
answer: Kebebasan pada dasarnya bergantung pada kondisi material yang memungkinkan manusia untuk mengatasi kebutuhan yang mendesak
wrong_answers:
  - Kebebasan adalah murni aspirasi filosofis yang tidak bergantung pada keadaan ekonomi dan material
  - Kebebasan individu muncul secara alamiah terlepas dari tingkat perkembangan teknologi atau ekonomi
  - Otonomi pribadi menurun seiring dengan perkembangan kondisi material dan kemampuan teknis masyarakat yang lebih baik
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa kebebasan bukan hanya aspirasi filosofis yang abstrak, tetapi secara fundamental bergantung pada kondisi material yang memungkinkan manusia untuk membebaskan diri mereka sendiri dari kebutuhan yang paling mendesak. Masyarakat kuno dengan produksi yang rendah dan sangat sensitif terhadap bahaya alam memberikan ruang yang terbatas untuk otonomi pribadi. Ketika masyarakat mengembangkan kemampuan teknis dan menciptakan surplus, mereka menjadi lebih independen dari kendala alam, sehingga memperluas kemungkinan untuk kebebasan individu. Hal ini menunjukkan korelasi langsung antara kemajuan material dan perluasan kebebasan pribadi.
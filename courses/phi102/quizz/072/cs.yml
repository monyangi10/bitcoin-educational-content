question: Jaký základní vztah existuje mezi materiálními podmínkami a individuální svobodou podle analýzy historického vývoje?
answer: Svoboda zásadně závisí na materiálních podmínkách, které lidem umožňují překonat naléhavé potřeby
wrong_answers:
  - Svoboda je čistě filozofická aspirace nezávislá na ekonomických a materiálních okolnostech
  - Individuální svoboda vzniká přirozeně bez ohledu na úroveň technologického nebo ekonomického rozvoje
  - Osobní autonomie se snižuje s tím, jak se ve společnosti zlepšují materiální podmínky a technické možnosti
explanation: |
  V textu se výslovně uvádí, že svoboda není jen abstraktní filozofickou aspirací, ale že zásadně závisí na materiálních podmínkách, které lidem umožňují osvobodit se od nejnaléhavějších potřeb. Starověké společnosti s nízkou produkcí a extrémní citlivostí na přírodní nebezpečí nabízely omezený prostor pro osobní autonomii. S rozvojem technických možností a vytvářením přebytků se společnosti stávaly nezávislejšími na přírodních omezeních, čímž se rozšiřovaly možnosti osobní svobody. To dokazuje přímou souvislost mezi materiálním pokrokem a rozšiřováním osobní svobody.
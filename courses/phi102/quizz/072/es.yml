question: ¿Qué relación fundamental existe entre las condiciones materiales y la libertad individual según el análisis del desarrollo histórico?
answer: La libertad depende fundamentalmente de condiciones materiales que permitan a los seres humanos superar necesidades apremiantes
wrong_answers:
  - La libertad es una aspiración puramente filosófica, independiente de las circunstancias económicas y materiales
  - La libertad individual surge de forma natural independientemente del nivel de desarrollo tecnológico o económico
  - La autonomía personal disminuye a medida que las sociedades desarrollan mejores condiciones materiales y capacidades técnicas
explanation: |
  El texto afirma explícitamente que la libertad no es una mera aspiración filosófica abstracta, sino que depende fundamentalmente de condiciones materiales que permitan a los seres humanos liberarse de las necesidades más acuciantes. Las sociedades antiguas con escasa producción y extrema sensibilidad a los riesgos naturales ofrecían un espacio limitado para la autonomía personal. A medida que las sociedades desarrollaron capacidades técnicas y crearon excedentes, se hicieron más independientes de las limitaciones naturales, ampliando así las posibilidades de libertad individual. Esto demuestra una correlación directa entre el progreso material y la expansión de la libertad personal.
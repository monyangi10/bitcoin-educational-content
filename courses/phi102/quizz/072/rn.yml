question: Ni isano irihe ry’ishimikiro riri hagati y’ibintu vy’umubiri n’umwidegemvyo w’umuntu ku giti ciwe hakurikijwe isesengura ry’iterambere ry’amateka?
answer: Umwidegemvyo uva ahanini ku mibereho y’umubiri ituma abantu bashobora gutsinda ivya nkenerwa vyihutirwa .
wrong_answers:
  - Umwidegemvyo ni icipfuzo ca filozofiya gusa kidashingiye ku vy'ubutunzi n'ivy'umubiri .
  - Umwidegemvyo w'umuntu ku giti ciwe uraza mu buryo busanzwe ataco ushizeko urugero rw'iterambere ry'ubuhinga canke ry'ubutunzi .
  - Ukwigenga kw'umuntu kuragabanuka uko imibano itera imbere mu vy'ubutunzi no mu bushobozi bw'ubuhinga .
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko umwidegemvyo atari gusa icipfuzo ca filozofiya kitaboneka, ahubwo ko kivana ahanini n’ibintu vy’umubiri bituma abantu bashobora kwibohora ku bintu vy’ingenzi vyihutirwa kuruta ibindi vyose. Ibisata vya kera vyari bifise umwimbu mutoyi kandi vyari bifise ubushobozi bwo gutahura cane ingorane z’ibidukikije, vyari bifise umwanya mutoyi wo kwigenga. Uko amashirahamwe yatera imbere mu bushobozi bw’ubuhinga no kurema ibisigaye, ni ko yarushiriza kwigenga ku ngorane z’ibidukikije, gutyo akagira ubushobozi bwo kwidegemvya kw’umuntu ku giti ciwe. Ivyo vyerekana ko hariho isano ritaziguye hagati y’iterambere ry’ivy’umubiri n’ukwaguka kw’umwidegemvyo w’umuntu ku giti ciwe.
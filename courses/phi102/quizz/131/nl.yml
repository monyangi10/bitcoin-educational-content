question: Wat maakt, volgens de harmonie van belangen theorie, dat moderne oorlogvoering steeds meer zelfvernietigend is voor alle naties in vergelijking met conflicten in de 15e of 16e eeuw?
answer: Wereldwijde economische onderlinge afhankelijkheid betekent dat conflicten waar dan ook nu alle handelspartners wereldwijd verarmen
wrong_answers:
  - Moderne wapens zijn destructiever en veroorzaken milieuschade die neutrale landen treft
  - Internationaal recht maakt het nu illegaal voor naties om te profiteren van oorlogsvoering door territoriale verovering
  - Democratische regeringen hebben meer binnenlandse tegenstand tegen oorlog dan historische monarchieën hadden
explanation: |
  De tekst legt uit dat in de 15e-16e eeuw conflicten in afgelegen gebieden nauwelijks invloed hadden op andere bevolkingen omdat de uitwisselingssferen beperkt waren en samenlevingen in relatieve zelfvoorziening leefden. De wereldwijde onderlinge afhankelijkheid van vandaag betekent dat elke verstoring van de productie waar dan ook een kettingreactie van verarming veroorzaakt bij alle handelspartners. De Amerikaanse Burgeroorlog illustreert dit - deze ruïneerde de Europese textielindustrie in Lyon door eenvoudigweg de handelsrelaties te verbreken, wat aantoont hoe moderne economische integratie alle deelnemers kwetsbaar maakt voor conflicten waar dan ook in het systeem.
question: Huvide harmoonia teooria kohaselt, mis muudab tänapäeva sõjapidamise kõigi riikide jaoks üha enam enesehävituslikuks võrreldes 15. või 16. sajandi konfliktidega?
answer: Ülemaailmne majanduslik vastastikune sõltuvus tähendab, et konfliktid kuskil vaesustavad nüüd kõiki kaubanduspartnereid kogu maailmas
wrong_answers:
  - Kaasaegsed relvad on hävitavamad ja tekitavad keskkonnakahjustusi, mis mõjutavad neutraalseid riike
  - Rahvusvahelise õiguse kohaselt on nüüd ebaseaduslik, et riigid saavad sõjapidamisest territoriaalse vallutuse kaudu kasu
  - Demokraatlikud valitsused seisavad sõja suhtes silmitsi suurema siseriikliku vastuseisuga kui ajaloolised monarhiad
explanation: |
  Tekstis selgitatakse, et 15.-16. sajandil mõjutasid kaugetes piirkondades toimunud konfliktid teisi elanikkondi vaevalt, sest vahetussfäärid olid piiratud ja ühiskonnad elasid suhtelises isevarustuses. Tänapäeva globaalne vastastikune sõltuvus tähendab, et igasugune tootmise häirimine kus tahes tekitab ahelreaktsiooni, mis toob kaasa vaesumise kõigi kaubanduspartnerite seas. Ameerika kodusõja näide illustreerib seda - see hävitas Euroopa tekstiilitööstuse Lyonis lihtsalt kaubandussuhete katkemisega, näidates, kuidas kaasaegne majanduslik integratsioon muudab kõik osalejad süsteemi kõikjal konfliktide suhtes haavatavaks.
question: Enligt teorin om intresseharmoni, vad är det som gör att modern krigföring i allt högre grad är självförgörande för alla nationer jämfört med konflikter på 1400- och 1500-talen?
answer: Det globala ekonomiska ömsesidiga beroendet innebär att konflikter var som helst nu utarmar alla handelspartner över hela världen
wrong_answers:
  - Moderna vapen är mer destruktiva och skapar miljöskador som drabbar neutrala länder
  - Enligt internationell rätt är det nu olagligt för nationer att dra nytta av krigföring genom territoriell erövring
  - Demokratiska regeringar möter större inhemskt motstånd mot krig än historiska monarkier gjorde
explanation: |
  I texten förklaras att konflikter i avlägsna regioner under 15-1600-talet knappt påverkade andra befolkningar eftersom utbytet var begränsat och samhällena levde i relativ självförsörjning. Dagens globala ömsesidiga beroende innebär att varje störning i produktionen någonstans skapar en kedjereaktion av utarmning hos alla handelspartner. Exemplet med det amerikanska inbördeskriget illustrerar detta - det förstörde europeiska textilindustrier i Lyon helt enkelt genom att bryta handelsrelationer, vilket visar hur modern ekonomisk integration gör alla deltagare sårbara för konflikter var som helst i systemet.
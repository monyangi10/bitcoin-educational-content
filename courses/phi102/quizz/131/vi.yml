question: Theo lý thuyết về sự hài hòa lợi ích, điều gì khiến chiến tranh hiện đại ngày càng phản tác dụng đối với tất cả các quốc gia so với các cuộc xung đột trong thế kỷ 15 hoặc 16?
answer: Sự phụ thuộc kinh tế toàn cầu có nghĩa là các cuộc xung đột ở bất cứ đâu hiện nay đều làm nghèo đi tất cả các đối tác thương mại trên toàn thế giới.
wrong_answers:
  - Vũ khí hiện đại có sức tàn phá lớn hơn và gây ra thiệt hại môi trường ảnh hưởng đến các quốc gia trung lập.
  - Luật quốc tế hiện nay quy định việc các quốc gia thu lợi từ chiến tranh thông qua chinh phục lãnh thổ là bất hợp pháp.
  - Các chính phủ dân chủ phải đối mặt với sự phản đối chiến tranh trong nước lớn hơn so với các chế độ quân chủ trong lịch sử.
explanation: |
  Văn bản giải thích rằng vào thế kỷ 15-16, các cuộc xung đột ở những vùng xa xôi hầu như không ảnh hưởng đến các cộng đồng dân cư khác vì phạm vi trao đổi hàng hóa bị hạn chế và các xã hội sống trong tình trạng tương đối tự cung tự cấp. Ngày nay, sự phụ thuộc lẫn nhau toàn cầu có nghĩa là bất kỳ sự gián đoạn nào trong sản xuất ở bất cứ đâu cũng tạo ra một phản ứng dây chuyền làm nghèo đi trên khắp các đối tác thương mại. Ví dụ về Nội chiến Hoa Kỳ minh họa điều này - nó đã phá hủy ngành công nghiệp dệt may châu Âu ở Lyon chỉ đơn giản bằng cách phá vỡ các mối quan hệ thương mại, cho thấy sự hội nhập kinh tế hiện đại khiến tất cả các bên tham gia dễ bị tổn thương trước các cuộc xung đột ở bất cứ đâu trong hệ thống.
question: Zgodnie z teorią harmonii interesów, co sprawia, że współczesne działania wojenne są coraz bardziej samobójcze dla wszystkich narodów w porównaniu z konfliktami w XV lub XVI wieku?
answer: Globalna współzależność gospodarcza oznacza, że konflikty w dowolnym miejscu zubożają wszystkich partnerów handlowych na całym świecie
wrong_answers:
  - Nowoczesna broń jest bardziej niszczycielska i powoduje szkody środowiskowe, które mają wpływ na kraje neutralne
  - Prawo międzynarodowe zabrania teraz narodom czerpania korzyści z działań wojennych poprzez podbój terytorialny
  - Rządy demokratyczne napotykają na większy wewnętrzny sprzeciw wobec wojny niż historyczne monarchie
explanation: |
  Tekst wyjaśnia, że w XV-XVI wieku konflikty w odległych regionach nie miały wpływu na inne populacje, ponieważ sfery wymiany były ograniczone, a społeczeństwa żyły we względnej samowystarczalności. Dzisiejsza globalna współzależność oznacza, że każde zakłócenie produkcji w dowolnym miejscu powoduje reakcję łańcuchową zubożenia u wszystkich partnerów handlowych. Ilustruje to przykład amerykańskiej wojny secesyjnej, która zrujnowała europejski przemysł tekstylny w Lyonie po prostu poprzez zerwanie relacji handlowych, pokazując, jak nowoczesna integracja gospodarcza czyni wszystkich uczestników podatnymi na konflikty w dowolnym miejscu systemu.
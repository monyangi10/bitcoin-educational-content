question: Según la teoría de la armonía de intereses, ¿qué hace que la guerra moderna sea cada vez más contraproducente para todas las naciones en comparación con los conflictos de los siglos XV o XVI?
answer: La interdependencia económica mundial implica que los conflictos en cualquier lugar empobrecen ya a todos los socios comerciales del mundo
wrong_answers:
  - Las armas modernas son más destructivas y provocan daños medioambientales que afectan a países neutrales
  - El Derecho internacional prohíbe ahora que las naciones se beneficien de la guerra mediante la conquista territorial
  - Los gobiernos democráticos se enfrentan a una mayor oposición interna a la guerra que las monarquías históricas
explanation: |
  El texto explica que en los siglos XV-XVI los conflictos en regiones lejanas apenas afectaban a otras poblaciones porque las esferas de intercambio eran limitadas y las sociedades vivían en relativa autosuficiencia. En la actualidad, la interdependencia mundial significa que cualquier perturbación de la producción en cualquier lugar crea una reacción en cadena de empobrecimiento en todos los socios comerciales. El ejemplo de la Guerra Civil estadounidense lo ilustra: arruinó las industrias textiles europeas en Lyon simplemente rompiendo las relaciones comerciales, lo que demuestra cómo la integración económica moderna hace que todos los participantes sean vulnerables a los conflictos en cualquier punto del sistema.
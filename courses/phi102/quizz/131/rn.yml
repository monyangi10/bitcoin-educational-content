question: Dukurikije inyigisho y’uguhuza inyungu, ni igiki gituma intambara zo muri iki gihe zirushiriza kwinesha amahanga yose ugereranije n’intambara zo mu kinjana ca 15 canke ca 16?
answer: Ugufatanya kw'ubutunzi kw'isi yose bisigura ko amakimbirane aho hose ubu akenye abafatanyabikorwa bose mu bucuruzi kw'isi yose
wrong_answers:
  - Ibirwanisho vyo muri iki gihe birarushiriza gusenyura kandi biratuma ibidukikije bihungabana bitera ingorane ibihugu bitagira aho bigarukira .
  - Amategeko mpuzamakungu ubu atuma amahanga ashobora kuronka inyungu mu ntambara biciye mu kwigarurira intara .
  - Intwaro za demokarasi zihura n’ukurwanywa gukomeye mu gihugu ku bijanye n’intambara kuruta uko intwaro z’abami za kera zari zihanganye .
explanation: |
  Ico canditswe kirasigura yuko mu kinjana ca 15-16, intambara zo mu turere twa kure zitagira ico zikoze ku bandi bantu kubera ko ivyicaro vyo guhanahana amakuru vyari bike kandi imibano yabaho mu kwitunga. Ugufatanya kw’isi yose kw’uyu musi bisigura ko uguhungabana kwose kw’umwimbu aho hose gutuma haba uruhererekane rw’ubukene mu bafatanyabikorwa bose mu bucuruzi. Akarorero k’intambara y’abanyagihugu muri Amerika karavyerekana - yarononekaye inganda z’impuzu zo mu Buraya i Lyon mu guca gusa imigenderanire y’ubudandaji, yerekana ingene ubufatanye bw’ubutunzi bwo muri iki gihe butuma abayigize bose bashobora gushikirwa n’indyane aho hose muri iyo nzira.
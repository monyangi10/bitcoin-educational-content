question: Secondo la teoria dell'armonia degli interessi, cosa rende la guerra moderna sempre più autolesionista per tutte le nazioni rispetto ai conflitti del XV o XVI secolo?
answer: L'interdipendenza economica globale fa sì che i conflitti ovunque si verifichino impoveriscano tutti i partner commerciali a livello mondiale
wrong_answers:
  - Le armi moderne sono più distruttive e creano danni ambientali che colpiscono i paesi neutrali
  - Il diritto internazionale rende ora illegale per le nazioni trarre profitto dalla guerra attraverso la conquista del territorio
  - I governi democratici devono affrontare una maggiore opposizione interna alla guerra rispetto alle monarchie storiche
explanation: |
  Il testo spiega che nel XV-XVI secolo, i conflitti in regioni lontane non avevano quasi ripercussioni sulle altre popolazioni perché le sfere di scambio erano limitate e le società vivevano in relativa autosufficienza. L'interdipendenza globale di oggi significa che qualsiasi interruzione della produzione in qualsiasi luogo crea una reazione a catena di impoverimento in tutti i partner commerciali. L'esempio della guerra civile americana lo illustra: ha rovinato le industrie tessili europee a Lione semplicemente interrompendo le relazioni commerciali, dimostrando come la moderna integrazione economica renda tutti i partecipanti vulnerabili ai conflitti in qualsiasi punto del sistema.
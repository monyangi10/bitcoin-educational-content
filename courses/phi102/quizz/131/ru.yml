question: Что, согласно теории гармонии интересов, делает современную войну все более невыгодной для всех стран по сравнению с конфликтами XV или XVI веков?
answer: Глобальная экономическая взаимозависимость означает, что конфликты в любой точке мира теперь приводят к обнищанию всех торговых партнеров по всему миру
wrong_answers:
  - Современное оружие более разрушительно и наносит ущерб окружающей среде, который затрагивает нейтральные страны
  - Международное право теперь запрещает государствам извлекать выгоду из войны путем завоевания территорий
  - Демократические правительства сталкиваются с большей внутренней оппозицией войне, чем исторические монархии
explanation: |
  В тексте объясняется, что в XV-XVI веках конфликты в отдаленных регионах почти не затрагивали другие народы, поскольку сферы обмена были ограничены, а общества жили в условиях относительной самодостаточности. Сегодняшняя глобальная взаимозависимость означает, что любой сбой в производстве где бы то ни было вызывает цепную реакцию обнищания всех торговых партнеров. Пример Гражданской войны в Америке иллюстрирует это - она разрушила европейскую текстильную промышленность в Лионе, просто разорвав торговые отношения, демонстрируя, как современная экономическая интеграция делает всех участников уязвимыми к конфликтам в любой точке системы.
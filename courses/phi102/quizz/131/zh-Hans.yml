question: 根据利益和谐理论，与 15 或 16 世纪的冲突相比，是什么使得现代战争对所有国家都越来越不利？
answer: 全球经济相互依存意味着任何地方的冲突都会使全球所有贸易伙伴陷入贫困
wrong_answers:
  - 现代武器更具破坏性，对环境造成的破坏影响到中立国家
  - 国际法现在规定，国家通过征服领土从战争中获利是非法的
  - 与历史上的君主政体相比，民主政府在战争中面临的国内反对声音更大
explanation: |
  文中解释说，在 15-16 世纪，遥远地区的冲突几乎不会影响到其他人口，因为当时的交流范围有限，社会相对自给自足。如今，全球相互依存，任何地方的生产中断都会对所有贸易伙伴造成连锁贫困。美国内战的例子就说明了这一点--它仅仅通过破坏商业关系就毁掉了里昂的欧洲纺织业，这说明了现代经济一体化如何使所有参与者都容易受到系统中任何地方冲突的影响。
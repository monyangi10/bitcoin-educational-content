question: Menurut teori harmoni kepentingan, apa yang membuat peperangan modern semakin merugikan semua negara dibandingkan dengan konflik pada abad ke-15 atau ke-16?
answer: Saling ketergantungan ekonomi global berarti konflik di mana pun sekarang memiskinkan semua mitra dagang di seluruh dunia
wrong_answers:
  - Senjata modern lebih merusak dan menciptakan kerusakan lingkungan yang berdampak pada negara-negara netral
  - Hukum internasional sekarang membuat ilegal bagi negara-negara untuk mengambil keuntungan dari peperangan melalui penaklukan wilayah
  - Pemerintah demokratis menghadapi penentangan domestik yang lebih besar terhadap perang daripada yang dihadapi oleh monarki historis
explanation: |
  Teks tersebut menjelaskan bahwa pada abad ke-15 hingga ke-16, konflik di wilayah yang jauh hampir tidak memengaruhi populasi lain karena ruang pertukaran terbatas dan masyarakat hidup dalam swasembada relatif. Saling ketergantungan global saat ini berarti setiap gangguan pada produksi di mana pun akan menciptakan reaksi berantai pemiskinan di seluruh mitra dagang. Contoh Perang Saudara Amerika mengilustrasikan hal ini - perang ini menghancurkan industri tekstil Eropa di Lyon hanya dengan memutus hubungan komersial, yang menunjukkan bagaimana integrasi ekonomi modern membuat semua partisipan rentan terhadap konflik di mana pun dalam sistem.
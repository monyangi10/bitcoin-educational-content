question: Mikä tekee nykyaikaisesta sodankäynnistä etujen harmoniaa koskevan teorian mukaan kaikille kansakunnille yhä itsetuhoisempaa kuin 1400- tai 1500-luvun konfliktit?
answer: Maailmanlaajuinen taloudellinen keskinäinen riippuvuus tarkoittaa, että konfliktit missä tahansa voivat nyt köyhdyttää kaikkia kauppakumppaneita maailmanlaajuisesti
wrong_answers:
  - Nykyaikaiset aseet ovat tuhoisampia ja aiheuttavat ympäristövahinkoja, jotka vaikuttavat puolueettomiin maihin
  - Kansainvälisen oikeuden mukaan kansakuntien on nyt laitonta hyötyä sodankäynnistä aluevaltauksilla
  - Demokraattiset hallitukset kohtaavat enemmän sodan sisäistä vastustusta kuin historialliset monarkiat
explanation: |
  Tekstissä selitetään, että 1500- ja 1500-luvuilla kaukaisilla alueilla tapahtuneet konfliktit eivät juuri vaikuttaneet muihin väestöihin, koska vaihtoyhteydet olivat rajalliset ja yhteiskunnat elivät suhteellisen omavaraisesti. Nykypäivän maailmanlaajuinen keskinäisriippuvuus tarkoittaa, että mikä tahansa tuotantohäiriö missä tahansa aiheuttaa ketjureaktion, joka johtaa kaikkien kauppakumppanien köyhtymiseen. Yhdysvaltain sisällissota on tästä hyvä esimerkki - se tuhosi Euroopan tekstiiliteollisuuden Lyonissa yksinkertaisesti katkaisemalla kauppasuhteet, mikä osoittaa, miten nykyaikainen taloudellinen yhdentyminen tekee kaikista osallistujista haavoittuvia konflikteille missä tahansa järjestelmän osassa.
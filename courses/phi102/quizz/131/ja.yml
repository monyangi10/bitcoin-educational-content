question: 利害の調和理論によれば、15世紀や16世紀の紛争と比較して、現代の戦争がすべての国にとってますます自滅的になっているのはなぜか？
answer: 世界経済の相互依存は、どこで紛争が起きても、世界中のすべての貿易相手国が困窮することを意味する。
wrong_answers:
  - 近代兵器はより破壊的で、中立国に影響を与える環境破壊を引き起こす
  - 国際法は現在、国家が領土征服を通じて戦争から利益を得ることを違法としている。
  - 民主的な政府は、歴史的な君主制よりも戦争に対する国内の反対が大きい。
explanation: |
  15世紀から16世紀にかけて、遠く離れた地域で起こった紛争は、他の住民にほとんど影響を与えなかった。今日のグローバルな相互依存は、どこであれ生産に混乱が生じれば、すべての貿易相手国に連鎖的な貧困化をもたらすことを意味する。アメリカの南北戦争の例は、このことを物語っている。リヨンのヨーロッパの繊維産業は、単に商業的な関係を断ち切っただけで、壊滅的な打撃を受けたのである。
question: Çıkarların uyumu teorisine göre, 15. veya 16. yüzyıllardaki çatışmalarla karşılaştırıldığında modern savaşları tüm uluslar için giderek daha fazla kendi kendini yenilgiye uğratan şey nedir?
answer: Küresel ekonomik karşılıklı bağımlılık, artık herhangi bir yerdeki çatışmanın dünya çapındaki tüm ticaret ortaklarını yoksullaştırması anlamına geliyor
wrong_answers:
  - Modern silahlar daha yıkıcıdır ve tarafsız ülkeleri etkileyen çevresel zararlar yaratır
  - Uluslararası hukuk artık ulusların toprak fethi yoluyla savaştan kazanç elde etmesini yasadışı kılıyor
  - Demokratik hükümetler, tarihsel monarşilere kıyasla savaşa karşı daha büyük bir iç muhalefetle karşı karşıyadır
explanation: |
  Metin, 15.-16. yüzyıllarda uzak bölgelerdeki çatışmaların diğer halkları pek etkilemediğini, çünkü değişim alanlarının sınırlı olduğunu ve toplumların görece kendi kendine yeterlilik içinde yaşadığını açıklıyor. Günümüzün küresel karşılıklı bağımlılığı, herhangi bir yerde üretimin kesintiye uğramasının tüm ticaret ortakları arasında zincirleme bir yoksullaşma reaksiyonu yaratması anlamına gelmektedir. Amerikan İç Savaşı örneği bunu göstermektedir - Lyon'daki Avrupa tekstil endüstrilerini sadece ticari ilişkileri bozarak mahvetmiştir, bu da modern ekonomik entegrasyonun tüm katılımcıları sistemin herhangi bir yerindeki çatışmalara karşı nasıl savunmasız hale getirdiğini göstermektedir.
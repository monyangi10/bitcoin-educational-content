question: Hva er det som ifølge teorien om harmoniske interesser gjør at moderne krigføring i økende grad er selvødeleggende for alle nasjoner sammenlignet med konflikter på 1400- og 1500-tallet?
answer: Global økonomisk gjensidig avhengighet betyr at konflikter hvor som helst nå utarmer alle handelspartnere over hele verden
wrong_answers:
  - Moderne våpen er mer destruktive og skaper miljøskader som påvirker nøytrale land
  - Internasjonal lov gjør det nå ulovlig for nasjoner å tjene penger på krigføring gjennom territoriell erobring
  - Demokratiske regjeringer møter større motstand mot krig på hjemmebane enn historiske monarkier gjorde
explanation: |
  Teksten forklarer at på 1400-1600-tallet påvirket konflikter i fjerne regioner knapt nok andre befolkninger fordi utvekslingsområdene var begrensede og samfunnene levde i relativ selvforsyning. Dagens globale gjensidige avhengighet betyr at enhver forstyrrelse i produksjonen et eller annet sted skaper en kjedereaksjon av utarming hos alle handelspartnere. Den amerikanske borgerkrigen illustrerer dette - den ruinerte den europeiske tekstilindustrien i Lyon bare ved å bryte handelsforbindelsene, noe som viser hvordan moderne økonomisk integrasjon gjør alle deltakerne sårbare for konflikter hvor som helst i systemet.
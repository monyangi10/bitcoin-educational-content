question: 이해관계의 조화 이론에 따르면, 15세기나 16세기의 분쟁에 비해 현대의 전쟁이 모든 국가에게 점점 더 자멸적인 이유는 무엇일까요?
answer: 글로벌 경제의 상호의존성으로 인해 분쟁이 발생하면 전 세계 모든 무역 파트너가 빈곤해집니다
wrong_answers:
  - 현대 무기는 더 파괴적이며 중립국에 영향을 미치는 환경 피해를 일으킵니다
  - 이제 국제법은 국가가 영토 정복을 통해 전쟁을 통해 이익을 얻는 것을 불법으로 규정하고 있습니다
  - 민주 정부는 과거 군주제보다 전쟁에 대한 국내 반대가 더 큽니다
explanation: |
  15~16세기에는 교류 영역이 제한적이고 사회가 상대적 자급자족 속에 살았기 때문에 먼 지역에서 발생한 분쟁이 다른 지역에 거의 영향을 미치지 않았다고 설명합니다. 오늘날의 글로벌 상호의존성은 어느 한 곳에서 생산에 차질이 생기면 모든 교역 파트너에게 연쇄적인 빈곤이 발생한다는 것을 의미합니다. 미국 남북전쟁의 예는 이를 잘 보여줍니다. 리옹의 유럽 섬유 산업은 단순히 상업적 관계를 단절시킴으로써 파멸했고, 현대 경제 통합이 모든 참여자를 시스템 내 분쟁에 취약하게 만드는 방법을 보여줍니다.
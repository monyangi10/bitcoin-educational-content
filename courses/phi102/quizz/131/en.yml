question: According to the harmony of interests theory, what makes modern warfare increasingly self-defeating for all nations compared to conflicts in the 15th or 16th centuries?
answer: Global economic interdependence means conflicts anywhere now impoverish all trading partners worldwide
wrong_answers:
  - Modern weapons are more destructive and create environmental damage that affects neutral countries
  - International law now makes it illegal for nations to profit from warfare through territorial conquest
  - Democratic governments face greater domestic opposition to war than historical monarchies did
explanation: |
  The text explains that in the 15th-16th centuries, conflicts in distant regions barely affected other populations because exchange spheres were limited and societies lived in relative self-sufficiency. Today's global interdependence means any disruption to production anywhere creates a chain reaction of impoverishment across all trading partners. The American Civil War example illustrates this - it ruined European textile industries in Lyon simply by breaking commercial relationships, demonstrating how modern economic integration makes all participants vulnerable to conflicts anywhere in the system.

question: Was führt nach der Theorie der Interessenharmonie dazu, dass moderne Kriege im Vergleich zu den Konflikten des 15. oder 16. Jahrhunderts für alle Nationen zunehmend selbstschädigend sind?
answer: Globale wirtschaftliche Interdependenz bedeutet, dass Konflikte, die irgendwo auftreten, alle Handelspartner weltweit verarmen lassen
wrong_answers:
  - Moderne Waffen sind zerstörerischer und verursachen Umweltschäden, die neutrale Länder betreffen
  - Nach internationalem Recht ist es nun illegal, dass Staaten durch die Eroberung von Territorien von Kriegen profitieren
  - Demokratische Regierungen sind innenpolitisch stärker gegen den Krieg eingestellt als historische Monarchien
explanation: |
  In dem Text wird erläutert, dass im 15. und 16. Jahrhundert Konflikte in weit entfernten Regionen kaum Auswirkungen auf andere Bevölkerungen hatten, weil die Austauschbereiche begrenzt waren und die Gesellschaften in relativer Autarkie lebten. Die heutige globale Verflechtung bedeutet, dass jede Störung der Produktion irgendwo eine Kettenreaktion der Verarmung bei allen Handelspartnern auslöst. Das Beispiel des Amerikanischen Bürgerkriegs veranschaulicht dies - er ruinierte die europäische Textilindustrie in Lyon allein dadurch, dass er die Handelsbeziehungen abbrach, was zeigt, wie die moderne wirtschaftliche Integration alle Beteiligten anfällig für Konflikte überall im System macht.
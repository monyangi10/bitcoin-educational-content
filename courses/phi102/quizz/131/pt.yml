question: De acordo com a teoria da harmonia de interesses, o que faz com que a guerra moderna seja cada vez mais auto-destrutiva para todas as nações, em comparação com os conflitos dos séculos XV ou XVI?
answer: A interdependência económica global significa que os conflitos em qualquer parte do mundo empobrecem todos os parceiros comerciais a nível mundial
wrong_answers:
  - As armas modernas são mais destrutivas e causam danos ambientais que afectam países neutros
  - O direito internacional torna agora ilegal que as nações lucrem com a guerra através da conquista territorial
  - Os governos democráticos enfrentam uma maior oposição interna à guerra do que as monarquias históricas
explanation: |
  O texto explica que, nos séculos XV e XVI, os conflitos em regiões distantes quase não afectavam outras populações porque as esferas de intercâmbio eram limitadas e as sociedades viviam em relativa autossuficiência. Hoje em dia, a interdependência global significa que qualquer perturbação na produção em qualquer lugar cria uma reação em cadeia de empobrecimento em todos os parceiros comerciais. O exemplo da Guerra Civil Americana ilustra este facto - arruinou as indústrias têxteis europeias em Lyon simplesmente por quebrar relações comerciais, demonstrando como a integração económica moderna torna todos os participantes vulneráveis a conflitos em qualquer ponto do sistema.
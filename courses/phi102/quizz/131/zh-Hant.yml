question: 根據利益和諧理論，與 15 或 16 世紀的衝突相比，是什麼讓現代戰爭對所有國家而言越來越不自量力？
answer: 全球經濟相互依存，意味著任何地方的衝突都會使全球所有貿易夥伴陷入貧困。
wrong_answers:
  - 現代武器的破壞力更強，會造成環境破壞，影響中立國家
  - 國際法現在規定，國家通過征服領土從戰爭中獲利是非法的。
  - 民主政府比歷史上的君主政府面臨更大的國內戰爭反對聲音
explanation: |
  文中解釋，在 15-16 世紀，遙遠地區的衝突幾乎不會影響到其他國家的人民，因為當時的交換範圍有限，而且各社會都過著相對自給自足的生活。今天，全球的相互依存意味著任何地方的生產中斷都會造成所有貿易夥伴的連鎖貧窮化。美國內戰的例子就說明了這一點 - 純粹透過破壞商業關係，就毀掉了里昂的歐洲紡織業，這說明了現代經濟整合如何讓所有參與者都容易受到系統中任何地方衝突的影響。
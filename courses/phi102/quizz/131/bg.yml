question: Според теорията за хармонията на интересите какво прави съвременните войни все по-самоунищожителни за всички нации в сравнение с конфликтите през XV или XVI век?
answer: Глобалната икономическа взаимозависимост означава, че конфликтите навсякъде вече водят до обедняване на всички търговски партньори по света
wrong_answers:
  - Съвременните оръжия са по-разрушителни и нанасят щети на околната среда, които засягат неутрални държави
  - Според международното право сега е незаконно държавите да печелят от войни чрез завладяване на територии
  - Демократичните правителства се сблъскват с по-голямо вътрешно противопоставяне на войната, отколкото историческите монархии
explanation: |
  В текста се обяснява, че през XV-XVI в. конфликтите в отдалечени региони почти не са засягали други населения, тъй като сферите на обмен са били ограничени и обществата са живеели в относителна самодостатъчност. Днешната глобална взаимозависимост означава, че всяко прекъсване на производството където и да е, предизвиква верижна реакция на обедняване на всички търговски партньори. Примерът с Американската гражданска война илюстрира това - тя съсипва европейските текстилни индустрии в Лион просто чрез прекъсване на търговските отношения, демонстрирайки как съвременната икономическа интеграция прави всички участници уязвими от конфликти навсякъде в системата.
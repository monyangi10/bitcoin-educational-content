question: Prema teoriji harmonije interesa, moderni ratovi postaju sve više samoporažavajući za sve nacije zbog međusobne povezanosti globalnih ekonomija i društava. Za razliku od sukoba u 15. ili 16. veku, gde su koristi od osvajanja mogle nadmašiti troškove, savremeni ratovi često rezultiraju ekonomskim gubicima, političkom nestabilnošću i humanitarnim krizama koje negativno utiču na sve uključene strane.
answer: Globalna ekonomska međuzavisnost znači da sukobi bilo gde sada osiromašuju sve trgovinske partnere širom sveta
wrong_answers:
  - Moderno oružje je destruktivnije i stvara ekološku štetu koja pogađa neutralne zemlje
  - Međunarodno pravo sada čini ilegalnim da nacije profitiraju od ratovanja putem teritorijalnog osvajanja.
  - Demokratske vlade suočavaju se sa većim domaćim protivljenjem ratu nego što su to činile istorijske monarhije.
explanation: |
  Tekst objašnjava da su u 15-16. veku sukobi u udaljenim regionima jedva uticali na druge populacije jer su sfere razmene bile ograničene i društva su živela u relativnoj samodovoljnosti. Današnja globalna međuzavisnost znači da bilo kakav poremećaj u proizvodnji bilo gde stvara lančanu reakciju osiromašenja kod svih trgovinskih partnera. Primer Američkog građanskog rata to ilustruje - uništio je evropske tekstilne industrije u Lionu jednostavno prekidom komercijalnih odnosa, pokazujući kako moderna ekonomska integracija čini sve učesnike ranjivim na sukobe bilo gde u sistemu.
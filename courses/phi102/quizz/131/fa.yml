question: بر اساس نظریه هماهنگی منافع، چه چیزی باعث می‌شود که جنگ‌های مدرن نسبت به درگیری‌های قرن 15 یا 16 برای همه کشورها به طور فزاینده‌ای خود شکست‌دهنده باشد؟
answer: وابستگی اقتصادی جهانی به این معناست که درگیری‌ها در هر نقطه‌ای اکنون تمامی شرکای تجاری در سراسر جهان را فقیر می‌کند.
wrong_answers:
  - سلاح‌های مدرن مخرب‌تر هستند و آسیب‌های زیست‌محیطی ایجاد می‌کنند که بر کشورهای بی‌طرف تأثیر می‌گذارد.
  - قانون بین‌المللی اکنون تصرف سرزمینی برای سود بردن از جنگ را برای کشورها غیرقانونی می‌داند.
  - دولت‌های دموکراتیک با مخالفت داخلی بیشتری نسبت به پادشاهی‌های تاریخی در برابر جنگ مواجه هستند
explanation: |
  متن توضیح می‌دهد که در قرون ۱۵ تا ۱۶، درگیری‌ها در مناطق دوردست به‌ندرت بر سایر جمعیت‌ها تأثیر می‌گذاشت زیرا حوزه‌های تبادل محدود بود و جوامع در خودکفایی نسبی زندگی می‌کردند. وابستگی متقابل جهانی امروز به این معناست که هرگونه اختلال در تولید در هر نقطه‌ای، واکنش زنجیره‌ای از فقر را در میان همه شرکای تجاری ایجاد می‌کند. مثال جنگ داخلی آمریکا این را نشان می‌دهد - این جنگ صنایع نساجی اروپا در لیون را تنها با قطع روابط تجاری نابود کرد و نشان داد که چگونه یکپارچگی اقتصادی مدرن همه شرکت‌کنندگان را در برابر درگیری‌ها در هر نقطه‌ای از سیستم آسیب‌پذیر می‌کند.
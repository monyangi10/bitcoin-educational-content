question: Selon la théorie de l'harmonie des intérêts, qu'est-ce qui fait que les guerres modernes sont de plus en plus vouées à l'échec pour toutes les nations par rapport aux conflits des 15e et 16e siècles ?
answer: L'interdépendance économique mondiale signifie que les conflits, où qu'ils se produisent, appauvrissent aujourd'hui tous les partenaires commerciaux du monde entier
wrong_answers:
  - Les armes modernes sont plus destructrices et créent des dommages environnementaux qui affectent les pays neutres
  - Le droit international interdit désormais aux nations de tirer profit de la guerre par la conquête de territoires
  - Les gouvernements démocratiques sont confrontés à une plus grande opposition intérieure à la guerre que les monarchies historiques
explanation: |
  Le texte explique qu'aux 15e et 16e siècles, les conflits dans des régions éloignées n'affectaient guère les autres populations parce que les sphères d'échange étaient limitées et que les sociétés vivaient dans une relative autosuffisance. Aujourd'hui, l'interdépendance mondiale signifie que toute perturbation de la production, où qu'elle se produise, entraîne une réaction en chaîne d'appauvrissement chez tous les partenaires commerciaux. L'exemple de la guerre de Sécession illustre ce phénomène : elle a ruiné les industries textiles européennes à Lyon simplement en rompant les relations commerciales, démontrant ainsi que l'intégration économique moderne rend tous les participants vulnérables aux conflits, où qu'ils se trouvent dans le système.
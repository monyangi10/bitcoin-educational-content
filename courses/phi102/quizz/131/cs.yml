question: Co podle teorie harmonie zájmů způsobuje, že moderní válka je pro všechny národy stále více sebezničující ve srovnání s konflikty v 15. nebo 16. století?
answer: Globální ekonomická provázanost znamená, že konflikty kdekoli na světě nyní ochuzují všechny obchodní partnery
wrong_answers:
  - Moderní zbraně jsou ničivější a způsobují škody na životním prostředí, které ovlivňují neutrální země
  - Podle mezinárodního práva je nyní nezákonné, aby státy profitovaly z válečných akcí prostřednictvím dobývání území
  - Demokratické vlády čelí větší domácí opozici vůči válce než historické monarchie
explanation: |
  Text vysvětluje, že v 15.-16. století konflikty ve vzdálených regionech téměř neovlivňovaly ostatní obyvatelstvo, protože sféry výměny byly omezené a společnosti žily v relativní soběstačnosti. Dnešní globální vzájemná závislost znamená, že jakékoli narušení výroby kdekoli na světě vyvolá řetězovou reakci ochuzení všech obchodních partnerů. To ilustruje příklad americké občanské války - ta zničila evropský textilní průmysl v Lyonu jednoduše tím, že přerušila obchodní vztahy, což ukazuje, jak moderní ekonomická integrace činí všechny účastníky zranitelnými vůči konfliktům kdekoli v systému.
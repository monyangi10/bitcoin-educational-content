question: ตามทฤษฎีความกลมกลืนของผลประโยชน์ อะไรที่ทำให้สงครามสมัยใหม่กลายเป็นการทำลายตนเองมากขึ้นสำหรับทุกประเทศเมื่อเทียบกับความขัดแย้งในศตวรรษที่ 15 หรือ 16?
answer: การพึ่งพาเศรษฐกิจโลกหมายความว่าความขัดแย้งที่เกิดขึ้นที่ใดก็ตามในขณะนี้จะทำให้คู่ค้าทั้งหมดทั่วโลกยากจนลง
wrong_answers:
  - อาวุธสมัยใหม่มีความทำลายล้างมากขึ้นและสร้างความเสียหายต่อสิ่งแวดล้อมที่ส่งผลกระทบต่อประเทศที่เป็นกลาง
  - กฎหมายระหว่างประเทศในขณะนี้ทำให้การแสวงหาผลประโยชน์จากสงครามผ่านการพิชิตดินแดนเป็นสิ่งผิดกฎหมายสำหรับประเทศต่างๆ
  - รัฐบาลประชาธิปไตยเผชิญกับการต่อต้านสงครามภายในประเทศมากกว่าราชาธิปไตยในประวัติศาสตร์
explanation: |
  ข้อความอธิบายว่าในช่วงศตวรรษที่ 15-16 ความขัดแย้งในภูมิภาคที่ห่างไกลแทบจะไม่ส่งผลกระทบต่อประชากรอื่น ๆ เพราะวงการแลกเปลี่ยนมีขีดจำกัดและสังคมดำรงชีวิตด้วยความพึ่งพาตนเองเป็นหลัก การพึ่งพาอาศัยกันในระดับโลกในปัจจุบันหมายความว่าการหยุดชะงักในการผลิตที่ใดก็ตามจะสร้างปฏิกิริยาลูกโซ่ของความยากจนในหมู่คู่ค้าทั้งหมด ตัวอย่างสงครามกลางเมืองอเมริกันแสดงให้เห็นถึงเรื่องนี้ - มันทำลายอุตสาหกรรมสิ่งทอของยุโรปในเมืองลียงเพียงแค่การตัดความสัมพันธ์ทางการค้า แสดงให้เห็นว่าการบูรณาการทางเศรษฐกิจสมัยใหม่ทำให้ผู้เข้าร่วมทั้งหมดมีความเสี่ยงต่อความขัดแย้งที่เกิดขึ้นที่ใดก็ตามในระบบ
question: Wie erklärt der Wirtschaftsliberalismus das Verhältnis zwischen Eigeninteresse und Innovation als Motor des gesellschaftlichen Fortschritts?
answer: Eigeninteresse motiviert den Einzelnen, nützliche Innovationen zu schaffen, die sowohl persönliche Bedürfnisse als auch die Nachfrage des Marktes befriedigen, was zu natürlichem Fortschritt durch freiwilligen Austausch führt
wrong_answers:
  - Eigeninteresse schafft Wettbewerb, der staatliche Institutionen zu effizienteren Innovationen zwingt, um ihre Monopolstellung in Schlüsselsektoren zu erhalten
  - "Das Eigeninteresse treibt den Einzelnen dazu, auf Kosten anderer Wohlstand anzuhäufen, was staatliche Regulierung erfordert, um diese Energie in sozial nützliche Innovationen zu lenken
  - Eigeninteresse führt zu kurzfristigem Denken, das Innovationen hemmt, so dass sich Gesellschaften auf kollektive Planung verlassen müssen, um langfristigen technologischen Fortschritt zu erzielen
explanation: |
  Nach der vorgestellten liberalen Theorie treibt das Eigeninteresse die Innovation natürlich an, weil der Einzelne, der sich selbst bereichern und seine Bedürfnisse befriedigen will, für andere nützlich handeln muss. So entsteht ein Kreislauf, in dem die persönliche Zufriedenheit voraussetzt, dass der Gesellschaft durch neue Lösungen und Verbesserungen ein Mehrwert geboten wird. Im Text wird betont, dass dieses Eigeninteresse über den engen Egoismus hinausgeht und auch die Familie und soziale Kreise einschließt, so dass Innovation eine natürliche Reaktion auf sich verändernde Umstände ist. Die falschen Antworten stellen diese Beziehung falsch dar, indem sie entweder suggerieren, dass die Regierung effektiv innovieren kann, dass Regulierung notwendig ist, um das Eigeninteresse positiv zu kanalisieren, oder dass kollektive Planung die individuelle Initiative übertrifft.
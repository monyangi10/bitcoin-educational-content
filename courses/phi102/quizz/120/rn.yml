question: Ni gute uburenganzira bwo kwidegemvya mu vy’ubutunzi busigura isano riri hagati y’ukwikunda n’uguhingura ibintu bishasha mu gutuma ikibano gitera imbere?
answer: Inyungu z’umuntu ku giti ciwe zituma abantu barema ibintu bishasha vy’ingirakamaro bihaza ivyo umuntu akeneye be n’ivyo isoko risaba, bikaba bituma umuntu atera imbere mu buryo busanzwe biciye mu guhanahana amakuru ku bushake .
wrong_answers:
  - Inyungu z’umuntu bwite zituma haba uguhiganwa guhatira inzego za Leta gukora ibintu bishasha kugira ngo zigumye zifise ivyicaro vy’ubutegetsi mu nzego z’ingenzi .
  - "Inyungu z'umuntu bwite zituma abantu birundanya ubutunzi ku giciro c'abandi, bisaba amategeko ya Leta kugira ngo izo nguvu zikoreshwe mu guhingura ibintu bishasha bifitiye akamaro abantu".
  - Inyungu z’umuntu ubwiwe zituma umuntu yiyumvira igihe gito bibuza gukora ibintu bishasha, ni co gituma imiryango itegerezwa kwizigira igenamigambi rusangi kugira ngo ishike ku gutera imbere kw’ubuhinga kw’igihe kirekire .
explanation: |
  Dushingiye ku ciyumviro c’ubwigenge cashikirijwe, inyungu z’umuntu ku giti ciwe ni zo zituma umuntu agira ubuhinga bushasha kubera ko abantu barondera kwitunga no guhazwa n’ivyo bakeneye bategerezwa gukorera abandi ibintu bifise akamaro. Ivyo bituma haba uruziga aho ukunyurwa kw’umuntu ku giti ciwe bisaba gutanga agaciro ku kibano biciye mu gutorera umuti ibibazo bishasha no gutera imbere. Ico canditswe gishimika ku vy’uko iyo nyungu y’ukwikunda irengeye ubwikunzi bukeyi kugira ngo ishiremwo n’imiryango n’imibano, bigatuma ubuhinga bushasha buba inyishu isanzwe ku bintu bihinduka. Inyishu zitari zo zigaragaza nabi iyo nzira mu gutanga iciyumviro c’uko Leta ishobora gukora ibintu bishasha mu buryo bwiza, ko amategeko akenewe kugira ngo inyungu z’umuntu ku giti ciwe zigende neza, canke ko igenamigambi ry’abantu bose rirengeye umugambi w’umuntu ku giti ciwe.
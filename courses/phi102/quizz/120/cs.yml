question: Jak ekonomický liberalismus vysvětluje vztah mezi vlastním zájmem a inovacemi, které jsou hnací silou společenského pokroku?
answer: Vlastní zájem motivuje jednotlivce k vytváření užitečných inovací, které uspokojují jak osobní potřeby, tak požadavky trhu, což vede k přirozenému pokroku prostřednictvím dobrovolné směny
wrong_answers:
  - Vlastní zájem vytváří konkurenci, která nutí vládní instituce k efektivnějším inovacím, aby si udržely monopolní postavení v klíčových odvětvích
  - "Vlastní zájem vede jednotlivce k hromadění bohatství na úkor ostatních, což vyžaduje státní regulaci, která tuto energii nasměruje na společensky prospěšné inovace."
  - Vlastní zájem vede ke krátkodobému myšlení, které brzdí inovace, takže společnosti se musí spoléhat na kolektivní plánování, aby dosáhly dlouhodobého technologického pokroku
explanation: |
  Podle předložené liberální teorie je vlastní zájem přirozeně hnací silou inovací, protože jednotlivci, kteří se snaží obohatit a uspokojit své potřeby, musí jednat užitečně pro ostatní. Vzniká tak cyklus, v němž osobní uspokojení vyžaduje poskytování hodnoty společnosti prostřednictvím nových řešení a zlepšení. Text zdůrazňuje, že tento vlastní zájem přesahuje úzký egoismus a zahrnuje i rodinné a společenské kruhy, takže inovace jsou přirozenou reakcí na měnící se okolnosti. Špatné odpovědi tento vztah zkreslují buď tím, že naznačují, že vláda může efektivně inovovat, že je nutná regulace, která pozitivně usměrní vlastní zájem, nebo že kolektivní plánování převyšuje individuální iniciativu.
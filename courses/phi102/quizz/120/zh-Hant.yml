question: 經濟自由主義如何解釋自我利益與創新在推動社會進步上的關係？
answer: 自我利益驅使個人創造有用的創新，滿足個人需求和市場需求，透過自願交換達到自然進步。
wrong_answers:
  - 自身利益造成競爭，迫使政府機構更有效率地創新，以維持其在關鍵部門的壟斷地位
  - 「自身利益驅使個人以犧牲他人利益為代價累積財富，這就需要國家的規範，將這股能量引導至對社會有益的創新」。
  - 自身利益導致短期思考，抑制創新，因此社會必須仰賴集體規劃來達成長期的技術進步
explanation: |
  根據所提出的自由主義理論，自我利益自然會驅使創新，因為個人想要充實自己並滿足自己的需求，就必須採取對他人有用的行動。這就形成了一個循環，個人的滿足需要透過新的解決方案和改進為社會提供價值。文中強調，這種自我利益超越了狹隘的利己主義，延伸到家庭和社會圈子，使得創新成為對環境變化的自然反應。錯誤的答案歪曲了這種關係，有的認為政府可以有效地創新，有的認為需要法規來正面引導利己主義，有的認為集體規劃超越了個人自發性。
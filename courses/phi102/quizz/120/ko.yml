question: 경제적 자유주의는 사회 발전을 이끄는 데 있어 이기심과 혁신의 관계를 어떻게 설명할 수 있을까요?
answer: 이기심은 개인이 개인의 필요와 시장 수요를 모두 충족하는 유용한 혁신을 창출하도록 동기를 부여하여 자발적인 교환을 통해 자연스러운 발전으로 이어집니다
wrong_answers:
  - 이기주의는 정부 기관이 주요 부문에서 독점적 지위를 유지하기 위해 더 효율적으로 혁신하도록 강요하는 경쟁을 만듭니다
  - "이기심은 개인이 타인의 희생으로 부를 축적하도록 유도하며, 이러한 에너지를 사회적으로 유익한 혁신으로 전환하기 위해 국가 규제가 필요합니다."
  - 이기주의는 혁신을 저해하는 단기적 사고로 이어지므로 사회는 장기적인 기술 발전을 달성하기 위해 집단적 계획에 의존해야 합니다
explanation: |
  제시된 자유주의 이론에 따르면, 자신을 풍요롭게 하고 자신의 욕구를 충족시키려는 개인은 다른 사람에게 유용한 행동을 해야 하기 때문에 이기심은 자연스럽게 혁신을 주도합니다. 이는 개인의 만족을 위해 새로운 솔루션과 개선을 통해 사회에 가치를 제공해야 하는 순환을 만들어냅니다. 이 텍스트는 이러한 이기심이 좁은 이기주의를 넘어 가족과 사회로 확장되어 혁신이 변화하는 상황에 대한 자연스러운 반응이 된다는 점을 강조합니다. 오답은 정부가 효과적으로 혁신할 수 있다거나, 이기심을 긍정적으로 유도하기 위해 규제가 필요하다거나, 집단적 계획이 개인의 주도권을 능가한다고 제시함으로써 이 관계를 잘못 표현하고 있습니다.
question: Hoe verklaart het economisch liberalisme de relatie tussen eigenbelang en innovatie als drijvende kracht achter maatschappelijke vooruitgang?
answer: Eigenbelang motiveert individuen om nuttige innovaties te creëren die zowel aan persoonlijke behoeften als aan de marktvraag voldoen, wat leidt tot natuurlijke vooruitgang door vrijwillige uitwisseling
wrong_answers:
  - Eigenbelang creëert concurrentie die overheidsinstellingen dwingt om efficiënter te innoveren om hun monopolieposities in belangrijke sectoren te behouden
  - "Eigenbelang zet individuen ertoe aan om rijkdom te vergaren ten koste van anderen, waardoor overheidsregulering nodig is om deze energie te kanaliseren naar maatschappelijk nuttige innovaties."
  - Eigenbelang leidt tot kortetermijndenken dat innovatie afremt, dus moeten samenlevingen vertrouwen op collectieve planning om technologische vooruitgang op lange termijn te bereiken
explanation: |
  Volgens de gepresenteerde liberale theorie is eigenbelang de natuurlijke drijfveer voor innovatie omdat individuen die zichzelf willen verrijken en hun behoeften willen bevredigen, zich nuttig moeten maken voor anderen. Dit creëert een cyclus waarin persoonlijke bevrediging het leveren van waarde aan de maatschappij vereist door middel van nieuwe oplossingen en verbeteringen. De tekst benadrukt dat dit eigenbelang verder reikt dan eng egoïsme en ook familie en sociale kringen omvat, waardoor innovatie een natuurlijk antwoord is op veranderende omstandigheden. De foute antwoorden geven een verkeerd beeld van deze relatie door ofwel te suggereren dat de overheid effectief kan innoveren, dat er regelgeving nodig is om het eigenbelang positief te kanaliseren, of dat collectieve planning het individuele initiatief overtreft.
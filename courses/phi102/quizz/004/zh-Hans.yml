question: 根据法国自由主义传统，为什么个人的感觉和知觉对社会组织具有根本性的重要意义？
answer: 因为感觉是无法共享的个人体验，所以个人决策比集体决策更有依据
wrong_answers:
  - 因为当通过集体决策进行适当协调时，个人感受会创造社会和谐
  - 因为感觉很容易在人与人之间传递，从而实现高效的集体规划
  - 因为个人认知是不可靠的，必须通过群体共识加以纠正
explanation: |
  文中强调，感觉从根本上说是个人的--一个人不可能通过另一个人体验饥饿，也不可能通过别人的眼睛看东西。这种个体性意味着，与集体决策相比，基于直接感知的个人决策具有更高的信息质量。当集体决策试图综合不同的个人需求和感知时，由于人们的需求在时间和强度上各不相同，因此这些决策不可避免地会变得不那么适应每个人的实际情况。
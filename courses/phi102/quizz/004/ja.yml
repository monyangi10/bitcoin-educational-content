question: フランス自由主義の伝統によれば、なぜ個人の感覚や知覚が社会組織にとって基本的に重要なのか？
answer: 感覚は個人的な体験であり、共有することはできない。
wrong_answers:
  - 個人の感覚は、集団的な意思決定を通じて適切に調整されたとき、社会の調和を生み出すからだ
  - 感覚は人と人の間で容易に伝達されるため、効率的な集団計画を立てることができる。
  - 個人の認識は信頼性に欠け、集団のコンセンサスによって修正されなければならないからだ。
explanation: |
  この文章では、感覚は基本的に個人的なものであり、他人を通して空腹を体験したり、他人の目を通して見たりすることはできない、と強調されている。このような個別性は、直接的な知覚に基づく個人的な意思決定が、集団的な意思決定と比較して情報の質が優れていることを意味する。集団的な決定は、異なる個人のニーズや知覚を集約しようとすると、必然的に各人の実際の状況に適応しなくなる。
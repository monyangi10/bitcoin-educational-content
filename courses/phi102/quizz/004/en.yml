question: According to the French liberal tradition, why are individual sensations and perceptions fundamentally important for social organization?
answer: Because sensations are individual experiences that cannot be shared, making personal decisions more informed than collective ones
wrong_answers:
  - Because individual sensations create social harmony when properly coordinated through collective decision-making
  - Because sensations can be easily transmitted between people, allowing for efficient collective planning
  - Because individual perceptions are unreliable and must be corrected through group consensus
explanation: |
  The text emphasizes that sensations are fundamentally individual - one cannot experience hunger through another person or see through someone else's eyes. This individuality means that personal decisions based on direct perceptions have superior information quality compared to collective decisions. When collective decisions try to aggregate different individual needs and perceptions, they inevitably become less adapted to each person's real situation, as people's needs differ in timing and intensity.

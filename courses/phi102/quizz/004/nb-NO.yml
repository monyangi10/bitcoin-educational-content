question: Hvorfor er individuelle sanseinntrykk og persepsjoner fundamentalt viktige for sosial organisering, ifølge den franske liberale tradisjonen?
answer: Fordi opplevelser er individuelle erfaringer som ikke kan deles, blir personlige beslutninger mer velbegrunnede enn kollektive
wrong_answers:
  - Fordi individuelle følelser skaper sosial harmoni når de koordineres riktig gjennom kollektiv beslutningstaking
  - Fordi sanseinntrykk lett kan overføres mellom mennesker, noe som muliggjør effektiv kollektiv planlegging
  - Fordi individuelle oppfatninger er upålitelige og må korrigeres gjennom gruppekonsensus
explanation: |
  Teksten understreker at sanseinntrykk er grunnleggende individuelle - man kan ikke oppleve sult gjennom en annen person eller se gjennom en annens øyne. Denne individualiteten gjør at personlige beslutninger basert på direkte persepsjoner har bedre informasjonskvalitet enn kollektive beslutninger. Når kollektive beslutninger forsøker å aggregere ulike individuelle behov og oppfatninger, blir de uunngåelig mindre tilpasset hver enkelt persons reelle situasjon, ettersom menneskers behov varierer i timing og intensitet.
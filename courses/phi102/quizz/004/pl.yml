question: Zgodnie z francuską tradycją liberalną, dlaczego indywidualne odczucia i percepcje są fundamentalnie ważne dla organizacji społecznej?
answer: Ponieważ doznania są indywidualnymi doświadczeniami, którymi nie można się dzielić, osobiste decyzje są bardziej świadome niż decyzje zbiorowe
wrong_answers:
  - Ponieważ indywidualne odczucia tworzą harmonię społeczną, gdy są odpowiednio skoordynowane poprzez zbiorowe podejmowanie decyzji
  - Ponieważ odczucia mogą być łatwo przekazywane między ludźmi, umożliwiając efektywne planowanie zbiorowe
  - Ponieważ indywidualne postrzeganie jest niewiarygodne i musi być korygowane poprzez konsensus grupowy
explanation: |
  Tekst podkreśla, że doznania są zasadniczo indywidualne - nie można odczuwać głodu przez inną osobę ani widzieć cudzymi oczami. Ta indywidualność oznacza, że osobiste decyzje oparte na bezpośredniej percepcji mają lepszą jakość informacji w porównaniu do decyzji zbiorowych. Kiedy decyzje zbiorowe próbują agregować różne indywidualne potrzeby i percepcje, nieuchronnie stają się mniej dostosowane do rzeczywistej sytuacji każdej osoby, ponieważ potrzeby ludzi różnią się pod względem czasu i intensywności.
question: Proč jsou podle francouzské liberální tradice individuální pocity a vjemy zásadně důležité pro uspořádání společnosti?
answer: Protože vjemy jsou individuálními zážitky, které nelze sdílet, jsou osobní rozhodnutí informovanější než kolektivní
wrong_answers:
  - Protože individuální vjemy vytvářejí společenskou harmonii, pokud jsou správně koordinovány prostřednictvím kolektivního rozhodování
  - Protože vjemy lze snadno přenášet mezi lidmi, což umožňuje efektivní kolektivní plánování
  - Protože individuální vnímání je nespolehlivé a musí být korigováno skupinovým konsensem
explanation: |
  Text zdůrazňuje, že pocity jsou v zásadě individuální - člověk nemůže prožívat hlad prostřednictvím jiného člověka nebo vidět očima někoho jiného. Tato individualita znamená, že osobní rozhodnutí založená na přímých vjemech mají vyšší informační kvalitu než kolektivní rozhodnutí. Když se kolektivní rozhodnutí snaží agregovat různé individuální potřeby a vjemy, nevyhnutelně se méně přizpůsobují skutečné situaci každého člověka, protože potřeby lidí se liší v čase a intenzitě.
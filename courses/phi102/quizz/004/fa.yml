question: طبق سنت لیبرال فرانسوی، چرا احساسات و ادراکات فردی برای سازماندهی اجتماعی به طور بنیادی مهم هستند؟
answer: زیرا احساسات تجربیات فردی هستند که نمی‌توان آنها را به اشتراک گذاشت، تصمیم‌گیری‌های شخصی آگاهانه‌تر از تصمیم‌گیری‌های جمعی است
wrong_answers:
  - زیرا احساسات فردی زمانی که از طریق تصمیم‌گیری جمعی به‌طور مناسب هماهنگ شوند، هماهنگی اجتماعی ایجاد می‌کنند
  - زیرا احساسات می‌توانند به‌راحتی بین افراد منتقل شوند و برنامه‌ریزی جمعی مؤثر را امکان‌پذیر می‌سازند.
  - زیرا ادراکات فردی غیرقابل‌اعتماد هستند و باید از طریق اجماع گروهی اصلاح شوند
explanation: |
  متن تأکید می‌کند که احساسات به‌طور اساسی فردی هستند - هیچ‌کس نمی‌تواند گرسنگی را از طریق شخص دیگری تجربه کند یا از طریق چشمان شخص دیگری ببیند. این فردیت به این معناست که تصمیمات شخصی بر اساس ادراکات مستقیم دارای کیفیت اطلاعاتی برتری نسبت به تصمیمات جمعی هستند. هنگامی که تصمیمات جمعی سعی می‌کنند نیازها و ادراکات فردی مختلف را تجمیع کنند، به‌طور اجتناب‌ناپذیری کمتر با وضعیت واقعی هر فرد سازگار می‌شوند، زیرا نیازهای افراد از نظر زمان‌بندی و شدت متفاوت است.
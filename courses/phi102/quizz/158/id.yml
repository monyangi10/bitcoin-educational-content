question: Menurut kritik Pierre de Boisguilbert terhadap Ancien Régime, konsepsi fundamental apa yang mendasari sistem perpajakan yang sewenang-wenang pada akhir abad ke-17?
answer: Penguasa dianggap sebagai pemilik semua tanah dan rakyat, membuat individu menjadi milik bangsa
wrong_answers:
  - Perpajakan didasarkan pada kontrak sukarela antara warga negara dan negara untuk layanan tertentu
  - Sistem pajak dirancang untuk memastikan kontribusi proporsional dari semua kelas sosial secara merata
  - Warga negara dipandang sebagai kontraktor independen yang dapat menegosiasikan kewajiban pajak mereka secara bebas
explanation: |
  Kritik Boisguilbert mengidentifikasi bahwa perpajakan sewenang-wenang dari Ancien Régime (seperti taille) berakar pada konsepsi di mana penguasa memiliki segala sesuatu dan semua orang. Hal ini membuat individu pada dasarnya menjadi milik negara, tunduk pada kehendak penguasa terkait sumber daya mereka. Pilihan-pilihan lain secara keliru menyarankan hubungan sukarela, proporsional, atau kontraktual yang bertentangan dengan konsepsi feodal yang sebenarnya tentang kepemilikan absolut oleh penguasa atas rakyat dan wilayah.
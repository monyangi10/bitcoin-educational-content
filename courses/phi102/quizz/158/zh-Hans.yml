question: 根据皮埃尔-德-博伊斯吉贝尔对旧政体的批判，17 世纪末的任意征税制度是以什么基本概念为基础的？
answer: 君主被视为所有土地和臣民的所有者，个人成为国家的财产
wrong_answers:
  - 税收基于公民与国家就特定服务签订的自愿合同
  - 税收制度的设计旨在确保各社会阶层平等地按比例缴税
  - 公民被视为独立承包人，可以自由协商纳税义务
explanation: |
  博伊斯吉贝尔（Boisguilbert）的批判指出，旧政体的任意征税（如 "尾税"）植根于这样一种观念，即君主拥有一切和所有人。这使得个人本质上成为国家的财产，在资源方面受制于统治者的意志。其他选项错误地暗示了自愿、按比例或契约关系，这与君主对臣民和领土的绝对所有权这一实际的封建概念相矛盾。
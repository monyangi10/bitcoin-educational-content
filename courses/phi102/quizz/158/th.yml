question: ตามคำวิจารณ์ของ Pierre de Boisguilbert เกี่ยวกับ Ancien Régime แนวคิดพื้นฐานที่อยู่เบื้องหลังระบบการเก็บภาษีตามอำเภอใจในช่วงปลายศตวรรษที่ 17 คืออะไร?
answer: พระมหากษัตริย์ถือเป็นเจ้าของที่ดินและประชาชนทั้งหมด ทำให้บุคคลเป็นทรัพย์สินของชาติ
wrong_answers:
  - การเก็บภาษีขึ้นอยู่กับสัญญาโดยสมัครใจระหว่างพลเมืองและรัฐสำหรับบริการเฉพาะ
  - ระบบภาษีถูกออกแบบมาเพื่อให้แน่ใจว่ามีการมีส่วนร่วมตามสัดส่วนจากทุกชนชั้นทางสังคมอย่างเท่าเทียมกัน
  - ประชาชนถูกมองว่าเป็นผู้รับเหมาอิสระที่สามารถเจรจาภาระภาษีของตนได้อย่างเสรี
explanation: |
  การวิพากษ์วิจารณ์ของ Boisguilbert ระบุว่าการเก็บภาษีตามอำเภอใจของ Ancien Régime (เช่น taille) มีรากฐานมาจากแนวคิดที่ว่าผู้ปกครองเป็นเจ้าของทุกสิ่งและทุกคน ซึ่งทำให้บุคคลกลายเป็นทรัพย์สินของชาติ อยู่ภายใต้ความประสงค์ของผู้ปกครองเกี่ยวกับทรัพยากรของพวกเขา ตัวเลือกอื่น ๆ ที่กล่าวถึงความสัมพันธ์แบบสมัครใจ สัดส่วน หรือสัญญานั้นไม่ถูกต้อง เนื่องจากขัดแย้งกับแนวคิดศักดินาที่แท้จริงของการเป็นเจ้าของโดยสมบูรณ์โดยผู้ปกครองเหนืออาสาสมัครและดินแดน
question: Selon la critique de l'Ancien Régime de Pierre de Boisguilbert, quelle conception fondamentale sous-tend l'arbitraire fiscal de la fin du XVIIe siècle ?
answer: Le souverain était considéré comme le propriétaire de toutes les terres et de tous les sujets, ce qui faisait des individus la propriété de la nation
wrong_answers:
  - La fiscalité était basée sur des contrats volontaires entre les citoyens et l'État pour des services spécifiques
  - Le système fiscal a été conçu pour assurer une contribution proportionnelle de toutes les classes sociales de manière égale
  - Les citoyens étaient considérés comme des entrepreneurs indépendants qui pouvaient négocier librement leurs obligations fiscales
explanation: |
  La critique de Boisguilbert a mis en évidence le fait que les impôts arbitraires de l'Ancien Régime (comme la taille) étaient enracinés dans une conception selon laquelle le souverain possédait tout et tout le monde. Les individus devenaient ainsi essentiellement des propriétés de la nation, soumis à la volonté du souverain en ce qui concerne leurs ressources. Les autres options suggèrent à tort des relations volontaires, proportionnelles ou contractuelles qui contredisent la conception féodale actuelle de la propriété absolue du souverain sur ses sujets et son territoire.
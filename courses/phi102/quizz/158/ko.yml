question: 피에르 드 부아길베르의 앙시앵 레짐 비판에 따르면, 17세기 후반의 자의적인 조세 제도의 근간이 된 근본적인 개념은 무엇일까요?
answer: 주권자는 모든 토지와 신민의 소유자로 간주되어 개인을 국가의 재산으로 만들었습니다
wrong_answers:
  - 과세는 특정 서비스에 대한 시민과 국가 간의 자발적 계약을 기반으로 합니다
  - 세금 시스템은 모든 사회 계층의 기여를 동등하게 보장하도록 설계되었습니다
  - 시민들은 납세 의무를 자유롭게 협상할 수 있는 독립적인 계약자로 간주되었습니다
explanation: |
  부아길베르의 비판에 따르면 앙시앵 레짐의 자의적 과세(테일과 같은)는 주권자가 모든 것을 소유한다는 관념에 뿌리를 두고 있었습니다. 이로 인해 개인은 본질적으로 국가의 재산이 되었고, 자원에 대한 통치자의 의지에 따라 좌우되었습니다. 다른 옵션은 자발적, 비례적 또는 계약적 관계를 잘못 제시하고 있는데, 이는 신민과 영토에 대한 주권자의 절대적 소유라는 실제 봉건적 개념과 모순되는 것입니다.
question: Según la crítica de Pierre de Boisguilbert al Antiguo Régimen, ¿qué concepción fundamental subyacía en el arbitrario sistema fiscal de finales del siglo XVII?
answer: El soberano se consideraba dueño de todas las tierras y súbditos, lo que convertía a los individuos en propiedad de la nación
wrong_answers:
  - La fiscalidad se basaba en contratos voluntarios entre los ciudadanos y el Estado por servicios específicos
  - El sistema fiscal se diseñó para garantizar la contribución proporcional de todas las clases sociales por igual
  - Los ciudadanos eran considerados contratistas independientes que podían negociar libremente sus obligaciones fiscales
explanation: |
  La crítica de Boisguilbert señalaba que la fiscalidad arbitraria del Antiguo Régimen (como la taille) estaba arraigada en una concepción según la cual el soberano era dueño de todo y de todos. Esto hacía que los individuos fueran esencialmente propiedad de la nación, sujetos a la voluntad del gobernante en lo que respecta a sus recursos. Las otras opciones sugieren incorrectamente relaciones voluntarias, proporcionales o contractuales que contradecían la concepción feudal real de propiedad absoluta del soberano sobre los súbditos y el territorio.
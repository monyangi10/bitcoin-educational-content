question: ピエール・ド・ボワギルベールのアンシャン・レジーム批判によれば、17世紀末の恣意的な税制の根底にはどのような基本概念があったのか？
answer: 君主はすべての土地と臣民の所有者とみなされ、個人は国家の所有物となった。
wrong_answers:
  - 課税は、特定のサービスに対する市民と国家との間の自発的な契約に基づくものであった。
  - 税制は、すべての社会階層から均等に比例して拠出されるように設計された。
  - 市民は、納税義務について自由に交渉できる独立した契約者とみなされた。
explanation: |
  ボワギルベールの批評は、アンシャン・レジームの恣意的な課税（テールなど）が、君主があらゆるものを所有するという概念に根ざしていることを明らかにした。これにより、個人は本質的に国家の所有物となり、その資源に関して支配者の意志に従うことになった。他の選択肢は、臣民や領土に対する主権者の絶対的所有権という実際の封建的概念に反する、自発的、比例的、または契約的関係を誤って示唆している。
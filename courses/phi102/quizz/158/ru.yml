question: Согласно критике Пьера де Буагильбера в отношении Анцианского режима, какая фундаментальная концепция лежала в основе произвольной системы налогообложения конца XVII века?
answer: Суверен считался владельцем всех земель и подданных, что делало людей собственностью нации
wrong_answers:
  - Налогообложение было основано на добровольных договорах между гражданами и государством за определенные услуги
  - Налоговая система была разработана таким образом, чтобы обеспечить пропорциональный вклад всех социальных слоев в равной степени
  - Граждане рассматривались как независимые подрядчики, которые могли свободно договариваться о своих налоговых обязательствах
explanation: |
  Критика Буагильбера показала, что произвольное налогообложение Древнего режима (например, taille) было основано на концепции, согласно которой государь владел всем и всеми. Это делало людей по сути собственностью нации, подчиненной воле правителя в отношении их ресурсов. Другие варианты неверно предполагают добровольные, пропорциональные или договорные отношения, которые противоречат реальной феодальной концепции абсолютной собственности суверена на подданных и территорию.
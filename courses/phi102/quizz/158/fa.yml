question: بر اساس نقد پیر دو بواگیلبر از رژیم قدیم، چه مفهوم بنیادی در سیستم مالیات‌گیری خودسرانه اواخر قرن هفدهم نهفته بود؟
answer: حاکم به عنوان مالک تمام زمین‌ها و افراد تلقی می‌شد، و افراد را به عنوان دارایی ملت می‌دانست.
wrong_answers:
  - مالیات بر اساس قراردادهای داوطلبانه بین شهروندان و دولت برای خدمات خاص بود.
  - سیستم مالیاتی به گونه‌ای طراحی شده بود که مشارکت متناسب از تمامی طبقات اجتماعی به‌طور مساوی تضمین شود.
  - شهروندان به عنوان پیمانکاران مستقل تلقی می‌شدند که می‌توانستند تعهدات مالیاتی خود را آزادانه مذاکره کنند.
explanation: |
  انتقاد بواگیلبر نشان داد که مالیات‌گیری خودسرانه رژیم قدیم (مانند تایل) ریشه در مفهومی داشت که در آن حاکم مالک همه چیز و همه کس بود. این امر افراد را اساساً به عنوان دارایی ملت قرار می‌داد، تابع اراده حاکم در مورد منابعشان. گزینه‌های دیگر به اشتباه روابط داوطلبانه، متناسب یا قراردادی را پیشنهاد می‌دهند که با مفهوم فئودالی مالکیت مطلق حاکم بر افراد و قلمرو در تضاد بود.
question: Pierre de Boisguilbert'i Ancien Régime'i kriitika kohaselt, milline põhikontseptsioon oli 17. sajandi lõpu omavolilise maksusüsteemi aluseks?
answer: Suverääni peeti kõigi maade ja alamate omanikuks, muutes üksikisikud rahva omandiks
wrong_answers:
  - Maksustamine põhines kodanike ja riigi vahelistel vabatahtlikel lepingutel konkreetsete teenuste eest
  - Maksusüsteem oli kavandatud nii, et tagada kõigi ühiskonnaklasside proportsionaalne panus võrdselt
  - Kodanikke peeti iseseisvateks töövõtjateks, kes võisid oma maksukohustusi vabalt läbi rääkida
explanation: |
  Boisguilberti kriitika tuvastas, et Ancien Régime'i omavoliline maksustamine (nagu taille) põhines arusaamal, mille kohaselt suveräänile kuulus kõik ja igaüks. See muutis üksikisikud sisuliselt riigi omandiks, alludes valitseja tahtele nende ressursside suhtes. Teised valikud viitavad ekslikult vabatahtlikele, proportsionaalsetele või lepingulistele suhetele, mis olid vastuolus tegeliku feodaalse kontseptsiooniga, mille kohaselt valitseja oli alamate ja territooriumi suhtes absoluutne omandiõigus.
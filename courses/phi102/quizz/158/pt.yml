question: De acordo com a crítica de Pierre de Boisguilbert ao Ancien Régime, que conceção fundamental estava subjacente ao sistema de tributação arbitrária do final do século XVII?
answer: O soberano era considerado o proprietário de todas as terras e súbditos, tornando os indivíduos propriedade da nação
wrong_answers:
  - A tributação baseava-se em contratos voluntários entre os cidadãos e o Estado para serviços específicos
  - O sistema fiscal foi concebido para garantir uma contribuição proporcional de todas as classes sociais de forma equitativa
  - Os cidadãos eram vistos como contratantes independentes que podiam negociar livremente as suas obrigações fiscais
explanation: |
  A crítica de Boisguilbert identificou que a tributação arbitrária do Ancien Régime (como a taille) estava enraizada numa conceção em que o soberano era dono de tudo e de todos. Isto tornava os indivíduos essencialmente propriedade da nação, sujeitos à vontade do soberano relativamente aos seus recursos. As outras opções sugerem incorretamente relações voluntárias, proporcionais ou contratuais que contradizem a verdadeira conceção feudal de propriedade absoluta do soberano sobre os súbditos e o território.
question: Enligt Pierre de Boisguilberts kritik av Ancien Régime, vilken grundläggande uppfattning låg till grund för det godtyckliga skattesystemet i slutet av 1600-talet?
answer: Suveränen ansågs vara ägare till alla länder och undersåtar, vilket gjorde individer till nationens egendom
wrong_answers:
  - Beskattningen byggde på frivilliga avtal mellan medborgarna och staten om specifika tjänster
  - Skattesystemet var utformat för att säkerställa proportionella bidrag från alla samhällsklasser på ett likvärdigt sätt
  - Medborgarna betraktades som oberoende entreprenörer som fritt kunde förhandla om sina skatteskyldigheter
explanation: |
  Boisguilberts kritik visade att Ancien Régimes godtyckliga beskattning (som taille) var rotad i en uppfattning där suveränen ägde allt och alla. Detta gjorde att individer i huvudsak var nationens egendom, underkastade härskarens vilja när det gällde deras resurser. De andra alternativen antyder felaktigt frivilliga, proportionella eller avtalsmässiga relationer som motsäger den faktiska feodala uppfattningen om suveränens absoluta äganderätt över undersåtar och territorium.
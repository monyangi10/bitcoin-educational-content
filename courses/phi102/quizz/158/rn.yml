question: Dukurikije ukuntu Pierre de Boisguilbert yaneguye Intwaro ya kera, ni iciyumviro nyamukuru ikihe cari gishingiyeko uburyo bwo gutanga imisoro ata co buvuze mu mpera z’ikinjana ca 17?
answer: Umukuru w’igihugu yabonwa ko ari we nyen’ibihugu vyose n’abatwarwa bose, ivyo bikaba vyatuma umuntu ku giti ciwe aba umutungo w’igihugu .
wrong_answers:
  - Imisoro yari ishingiye ku masezerano y’ubushake hagati y’abanyagihugu na Leta ku bikorwa vyihariye .
  - Uburyo bwo gutanga imisoro bwagenewe gutuma abantu bose batanga intererano zingana .
  - Abanyagihugu babonwa ko ari abakozi bigenga bashobora guhanahana amasezerano yabo mu mwidegemvyo .
explanation: |
  Ivyo Boisguilbert yaneguye vyerekanye ko ugusoresha ataco bimaze kwa Ancien Régime (nk’uko taille) kwari gushingiye ku ciyumviro c’uko umukuru w’igihugu ari we afise vyose n’abantu bose. Ivyo vyatuma abantu ku giti cabo baba ahanini ivy’igihugu, bishingiye ku bugombe bw’umutware ku bijanye n’ubutunzi bwabo. Ayandi mahitamwo atanga iciyumviro kitari co ku bijanye n’imigenderanire y’ubushake, y’uburinganire canke y’amasezerano yari ivuguruza iciyumviro nyaco c’abanyagihugu c’uko umukuru w’igihugu ari we afise ububasha bwose ku bihugu n’intara.
question: Pierre de Boisguilbert'in Ancien Régime eleştirisine göre, 17. yüzyılın sonlarındaki keyfi vergilendirme sisteminin altında hangi temel anlayış yatmaktadır?
answer: Egemen, tüm toprakların ve tebaanın sahibi olarak görülüyor ve bireyleri ulusun mülkü haline getiriyordu
wrong_answers:
  - Vergilendirme, vatandaşlar ile devlet arasında belirli hizmetler için yapılan gönüllü sözleşmelere dayanıyordu
  - Vergi sistemi, tüm sosyal sınıfların eşit oranda katkıda bulunmasını sağlayacak şekilde tasarlanmıştır
  - Vatandaşlar, vergi yükümlülüklerini serbestçe müzakere edebilen bağımsız yükleniciler olarak görülüyordu
explanation: |
  Boisguilbert'in eleştirisi, Ancien Régime'in keyfi vergilendirmesinin (taille gibi), egemenin her şeye ve herkese sahip olduğu bir anlayışa dayandığını tespit etmiştir. Bu durum, bireyleri esasen ulusun mülkü haline getirmiş ve kaynaklarına ilişkin olarak hükümdarın iradesine tabi kılmıştır. Diğer seçenekler yanlış bir şekilde, hükümdarın tebaa ve toprak üzerindeki mutlak mülkiyetine ilişkin gerçek feodal anlayışla çelişen gönüllü, orantılı veya sözleşmeye dayalı ilişkiler önermektedir.
question: According to Pierre de Boisguilbert's critique of the Ancien Régime, what fundamental conception underlied the arbitrary taxation system of the late 17th century?
answer: The sovereign was considered the owner of all lands and subjects, making individuals property of the nation
wrong_answers:
  - Taxation was based on voluntary contracts between citizens and the state for specific services
  - The tax system was designed to ensure proportional contribution from all social classes equally
  - Citizens were viewed as independent contractors who could negotiate their tax obligations freely
explanation: |
  Boisguilbert's critique identified that the Ancien Régime's arbitrary taxation (like the taille) was rooted in a conception where the sovereign owned everything and everyone. This made individuals essentially property of the nation, subject to the ruler's will regarding their resources. The other options incorrectly suggest voluntary, proportional, or contractual relationships that contradicted the actual feudal conception of absolute ownership by the sovereign over subjects and territory.
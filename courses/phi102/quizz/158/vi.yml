question: Theo phê bình của Pierre de Boisguilbert về chế độ cũ, quan niệm cơ bản nào đã chi phối hệ thống thuế má tùy tiện của cuối thế kỷ 17?
answer: Quốc vương được coi là chủ sở hữu của tất cả đất đai và thần dân, biến mỗi cá nhân thành tài sản của quốc gia.
wrong_answers:
  - Hệ thống thuế dựa trên các hợp đồng tự nguyện giữa công dân và nhà nước về các dịch vụ cụ thể.
  - Hệ thống thuế được thiết kế để đảm bảo sự đóng góp tương xứng từ tất cả các tầng lớp xã hội một cách bình đẳng.
  - Công dân được coi là những người lao động tự do, có thể tự do thương lượng về nghĩa vụ thuế của mình.
explanation: |
  Phê bình của Boisguilbert chỉ ra rằng việc đánh thuế tùy tiện của chế độ cũ (như thuế taille) bắt nguồn từ quan niệm cho rằng nhà vua sở hữu mọi thứ và mọi người. Điều này khiến các cá nhân về cơ bản trở thành tài sản của quốc gia, phụ thuộc vào ý chí của người cai trị về nguồn lực của họ. Các lựa chọn khác lại đưa ra những mối quan hệ tự nguyện, tương xứng hoặc theo hợp đồng, trái ngược với quan niệm phong kiến thực tế về quyền sở hữu tuyệt đối của nhà vua đối với thần dân và lãnh thổ.
question: Jaká základní koncepce byla podle Pierra de Boisguilberta v kritice Ancien Régime základem svévolného daňového systému konce 17. století?
answer: Panovník byl považován za vlastníka všech pozemků a poddaných, takže jednotlivci se stali majetkem národa
wrong_answers:
  - Zdanění bylo založeno na dobrovolných smlouvách mezi občany a státem za konkrétní služby
  - Daňový systém byl navržen tak, aby zajistil poměrný příspěvek všech sociálních vrstev rovnoměrně
  - Občané byli považováni za nezávislé smluvní partnery, kteří si mohli svobodně vyjednat své daňové povinnosti
explanation: |
  Boisguilbertova kritika zjistila, že svévolné zdanění v Ancien Régime (stejně jako taille) vycházelo z koncepce, podle níž panovník vlastnil všechno a všechny. Jednotlivci se tak v podstatě stávali majetkem národa a podléhali vůli panovníka, pokud jde o jejich zdroje. Ostatní možnosti nesprávně naznačují dobrovolné, poměrné nebo smluvní vztahy, které byly v rozporu se skutečným feudálním pojetím absolutního vlastnictví panovníka nad poddanými a územím.
question: Kulingana na ukosoaji wa Pierre de Boisguilbert kuhusu Ancien Régime, ni dhana gani ya msingi iliyosababisha mfumo wa kodi holela wa mwishoni mwa karne ya 17?
answer: Mfalme alichukuliwa kuwa mmiliki wa ardhi na raia wote, na kuwafanya watu binafsi kuwa mali ya taifa.
wrong_answers:
  - Ushuru ulitegemea mikataba ya hiari kati ya raia na serikali kwa huduma maalum
  - Mfumo wa kodi uliundwa ili kuhakikisha michango sawia kutoka kwa matabaka yote ya kijamii kwa usawa
  - Raia walionekana kama wakandarasi huru ambao wangeweza kujadili majukumu yao ya kodi kwa uhuru
explanation: |
  Ukosoaji wa Boisguilbert uligundua kuwa kodi isiyo ya lazima ya Ancien Régime (kama taille) ilitokana na dhana ambapo mtawala alimiliki kila kitu na kila mtu. Hii iliwafanya watu binafsi kuwa mali ya taifa, chini ya mapenzi ya mtawala kuhusu rasilimali zao. Chaguzi zingine zinaonyesha kimakosa uhusiano wa hiari, sawia, au wa kimkataba ambao ulipingana na dhana halisi ya kimwinyi ya umiliki kamili wa mtawala juu ya raia na eneo.
question: Mis on peamine põhjus, miks kollektiivsed otsused on prantsuse liberaalse mõtteviisi kohaselt vähem tõhusad kui individuaalsed otsused?
answer: Kollektiivsed otsused ei pääse ligi iga inimese otsestele, individuaalsetele arusaamadele ja vajadustele
wrong_answers:
  - Kollektiivsete otsuste rakendamine võtab liiga palju aega ja on seetõttu ebatõhus
  - Kollektiivseid otsuseid teevad poliitikud, kellel puudub piisav haridus ja asjatundlikkus
  - Kollektiivsed otsused tekitavad liiga palju bürokraatiat ja halduskoormust
explanation: |
  Prantsuse liberaalse traditsiooni kohaselt on aistingud ja tajud põhimõtteliselt individuaalsed - te ei saa kogeda nälga kellegi teise kaudu ega näha teise inimese silmadega. Selline tajude individuaalsus tähendab, et individuaalsed otsused, mis põhinevad otsesel isiklikul kogemusel, on kollektiivsete otsustega võrreldes parema kvaliteediga. Kui tehakse kollektiivseid otsuseid selliste küsimuste kohta nagu toidu jaotamine, tuleb neis koondada mitme üksikisiku erinevad tajud ja vajadused, kelle vajadused on ajaliselt ja intensiivselt erinevad. Tulemus on paratamatult vähem kohandatud iga inimese tegelikule olukorrale kui otsused, mida üksikisikud teevad oma otseste arusaamade ja vajaduste põhjal.
question: Quelle est la principale raison pour laquelle les décisions collectives sont moins efficaces que les décisions individuelles selon la pensée libérale française ?
answer: Les décisions collectives ne peuvent pas accéder aux perceptions et aux besoins directs et individuels de chaque personne
wrong_answers:
  - Les décisions collectives prennent trop de temps à mettre en œuvre et sont donc inefficaces
  - Les décisions collectives sont prises par des politiciens qui manquent d'éducation et d'expertise
  - Les décisions collectives créent trop de bureaucratie et de complexité administrative
explanation: |
  Selon la tradition libérale française, les sensations et les perceptions sont fondamentalement individuelles - on ne peut pas ressentir la faim à travers quelqu'un d'autre ou voir à travers les yeux d'une autre personne. Cette individualité de la perception signifie que les décisions individuelles, basées sur l'expérience personnelle directe, ont une qualité d'information supérieure à celle des décisions collectives. Lorsque des décisions collectives sont prises sur des questions telles que la distribution de nourriture, elles doivent agréger les différentes perceptions et les besoins de plusieurs individus dont les exigences varient en termes de temps et d'intensité. Le résultat est nécessairement moins adapté à la situation réelle de chaque personne que les décisions prises par des individus sur la base de leurs propres perceptions et besoins directs.
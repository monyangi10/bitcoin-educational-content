question: Wat is de belangrijkste reden waarom collectieve beslissingen volgens het Franse liberale gedachtegoed minder effectief zijn dan individuele beslissingen?
answer: Collectieve beslissingen hebben geen toegang tot de directe, individuele waarnemingen en behoeften van elke persoon
wrong_answers:
  - Collectieve beslissingen kosten te veel tijd om uit te voeren en zijn daarom inefficiënt
  - Collectieve beslissingen worden genomen door politici die niet de juiste opleiding en expertise hebben
  - Collectieve beslissingen creëren te veel bureaucratie en administratieve complexiteit
explanation: |
  Volgens de Franse liberale traditie zijn gewaarwordingen en percepties fundamenteel individueel - je kunt geen honger ervaren door iemand anders of zien door de ogen van een ander. Deze individualiteit van de waarneming betekent dat individuele beslissingen, gebaseerd op directe persoonlijke ervaring, een superieure informatiekwaliteit hebben in vergelijking met collectieve beslissingen. Wanneer collectieve beslissingen worden genomen over zaken als voedseldistributie, moeten ze de verschillende percepties en behoeften van meerdere individuen samenvoegen, wiens behoeften variëren in timing en intensiteit. Het resultaat is noodzakelijkerwijs minder aangepast aan de werkelijke situatie van elke persoon dan beslissingen die individuen nemen op basis van hun eigen directe waarnemingen en behoeften.
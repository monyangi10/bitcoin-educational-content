question: 根据法国自由主义思想，集体决策不如个人决策有效的主要原因是什么？
answer: 集体决策无法了解每个人直接的、个人的看法和需求
wrong_answers:
  - 集体决策的执行耗时过长，因此效率低下
  - 集体决策由缺乏适当教育和专业知识的政治家做出
  - 集体决策造成过多的官僚主义和行政复杂性
explanation: |
  根据法国自由主义传统，感觉和知觉从根本上说是个人的--你不能通过别人体验饥饿，也不能通过别人的眼睛看东西。这种感知的个体性意味着，与集体决策相比，基于个人直接经验的个体决策具有更高的信息质量。在就食物分配等问题做出集体决策时，必须综合考虑多个个体的不同感知和需求，而这些个体的需求在时间和强度上各不相同。其结果必然不如个人根据自己的直接感知和需求做出的决定更适应每个人的实际情况。
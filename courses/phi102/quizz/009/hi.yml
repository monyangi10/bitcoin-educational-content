question: फ्रांसीसी उदारवादी विचारधारा के अनुसार, सामूहिक निर्णय व्यक्तिगत निर्णयों की तुलना में कम प्रभावी क्यों होते हैं, इसका मुख्य कारण क्या है?
answer: सामूहिक निर्णय प्रत्येक व्यक्ति की प्रत्यक्ष, व्यक्तिगत धारणाओं और आवश्यकताओं को नहीं जान सकते।
wrong_answers:
  - सामूहिक निर्णयों को लागू करने में बहुत अधिक समय लगता है और इसलिए वे अप्रभावी होते हैं।
  - सामूहिक निर्णय ऐसे राजनेताओं द्वारा लिए जाते हैं जिनके पास उचित शिक्षा और विशेषज्ञता का अभाव होता है।
  - सामूहिक निर्णयों से अत्यधिक नौकरशाही और प्रशासनिक जटिलता उत्पन्न होती है।
explanation: |
  फ्रांसीसी उदारवादी परंपरा के अनुसार, संवेदनाएँ और धारणाएँ मूल रूप से व्यक्तिगत होती हैं - आप किसी दूसरे के माध्यम से भूख का अनुभव नहीं कर सकते या किसी दूसरे की आँखों से नहीं देख सकते। धारणा की यह व्यक्तिगतता दर्शाती है कि प्रत्यक्ष व्यक्तिगत अनुभव पर आधारित व्यक्तिगत निर्णयों में सामूहिक निर्णयों की तुलना में बेहतर सूचना गुणवत्ता होती है। जब भोजन वितरण जैसे मामलों पर सामूहिक निर्णय लिए जाते हैं, तो उनमें कई व्यक्तियों की अलग-अलग धारणाओं और आवश्यकताओं को शामिल करना पड़ता है, जिनकी आवश्यकताएँ समय और तीव्रता में भिन्न होती हैं। परिणामस्वरूप, परिणाम स्वरूप लिए गए निर्णय प्रत्येक व्यक्ति की वास्तविक स्थिति के अनुरूप उतने अनुकूल नहीं होते जितने कि व्यक्तिगत रूप से अपनी प्रत्यक्ष धारणाओं और आवश्यकताओं के आधार पर लिए गए निर्णय होते हैं।
question: Koji je glavni razlog zašto su kolektivne odluke manje efikasne od individualnih odluka prema francuskoj liberalnoj misli?
answer: Kolektivne odluke ne mogu pristupiti direktnim, individualnim percepcijama i potrebama svake osobe
wrong_answers:
  - Kolektivne odluke zahtevaju previše vremena za sprovođenje i stoga su neefikasne.
  - Kolektivne odluke donose političari koji nemaju odgovarajuće obrazovanje i stručnost
  - Kolektivne odluke stvaraju previše birokratije i administrativne složenosti
explanation: |
  Prema francuskoj liberalnoj tradiciji, senzacije i percepcije su fundamentalno individualne - ne možete iskusiti glad kroz nekog drugog niti videti kroz oči druge osobe. Ova individualnost percepcije znači da individualne odluke, zasnovane na direktnom ličnom iskustvu, imaju superioran kvalitet informacija u poređenju sa kolektivnim odlukama. Kada se donose kolektivne odluke o pitanjima kao što je distribucija hrane, one moraju da agregiraju različite percepcije i potrebe više pojedinaca čiji se zahtevi razlikuju u vremenu i intenzitetu. Rezultat je nužno manje prilagođen stvarnoj situaciji svake osobe nego odluke koje donose pojedinci na osnovu svojih direktnih percepcija i potreba.
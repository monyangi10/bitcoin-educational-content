question: Was ist der Hauptgrund dafür, dass kollektive Entscheidungen dem französischen liberalen Denken zufolge weniger wirksam sind als individuelle Entscheidungen?
answer: Kollektive Entscheidungen haben keinen Zugang zu den unmittelbaren, individuellen Wahrnehmungen und Bedürfnissen der einzelnen Personen
wrong_answers:
  - Kollektive Entscheidungen benötigen zu viel Zeit für ihre Umsetzung und sind daher ineffizient
  - Kollektive Entscheidungen werden von Politikern getroffen, denen es an Bildung und Fachwissen mangelt
  - Kollektive Entscheidungen schaffen zu viel Bürokratie und Verwaltungsaufwand
explanation: |
  Nach der französischen liberalen Tradition sind Empfindungen und Wahrnehmungen grundsätzlich individuell - man kann nicht durch einen anderen Menschen Hunger empfinden oder mit den Augen eines anderen Menschen sehen. Diese Individualität der Wahrnehmung bedeutet, dass individuelle Entscheidungen, die auf direkten persönlichen Erfahrungen beruhen, eine höhere Informationsqualität haben als kollektive Entscheidungen. Wenn kollektive Entscheidungen über Angelegenheiten wie die Verteilung von Nahrungsmitteln getroffen werden, müssen sie die unterschiedlichen Wahrnehmungen und Bedürfnisse mehrerer Personen zusammenfassen, deren Bedürfnisse in Bezug auf Zeitpunkt und Intensität variieren. Das Ergebnis ist zwangsläufig weniger an die tatsächliche Situation der einzelnen Personen angepasst als Entscheidungen, die von Einzelpersonen auf der Grundlage ihrer eigenen unmittelbaren Wahrnehmungen und Bedürfnisse getroffen werden.
question: Jaki jest główny powód, dla którego decyzje zbiorowe są mniej skuteczne niż decyzje indywidualne według francuskiej myśli liberalnej?
answer: Decyzje zbiorowe nie mają dostępu do bezpośredniego, indywidualnego postrzegania i potrzeb każdej osoby
wrong_answers:
  - Wdrażanie decyzji zbiorowych zajmuje zbyt wiele czasu, przez co są one nieefektywne
  - Decyzje zbiorowe są podejmowane przez polityków, którym brakuje odpowiedniego wykształcenia i wiedzy specjalistycznej
  - Decyzje zbiorowe powodują nadmierną biurokrację i złożoność administracyjną
explanation: |
  Zgodnie z francuską tradycją liberalną, doznania i percepcja są zasadniczo indywidualne - nie można odczuwać głodu przez kogoś innego ani widzieć oczami innej osoby. Ta indywidualność percepcji oznacza, że indywidualne decyzje, oparte na bezpośrednim osobistym doświadczeniu, mają lepszą jakość informacji w porównaniu z decyzjami zbiorowymi. Gdy podejmowane są zbiorowe decyzje dotyczące kwestii takich jak dystrybucja żywności, muszą one łączyć różne postrzeganie i potrzeby wielu osób, których wymagania różnią się pod względem czasu i intensywności. Rezultat jest z konieczności mniej dostosowany do rzeczywistej sytuacji każdej osoby niż decyzje podejmowane przez jednostki w oparciu o ich własne bezpośrednie postrzeganie i potrzeby.
question: Mikä on tärkein syy siihen, miksi kollektiiviset päätökset ovat ranskalaisen liberaalin ajattelun mukaan vähemmän tehokkaita kuin yksilölliset päätökset?
answer: Kollektiivisilla päätöksillä ei voida ottaa huomioon kunkin henkilön välittömiä, yksilöllisiä käsityksiä ja tarpeita
wrong_answers:
  - Kollektiivisten päätösten täytäntöönpano vie liikaa aikaa ja on siksi tehotonta
  - Kollektiivisia päätöksiä tekevät poliitikot, joilla ei ole asianmukaista koulutusta ja asiantuntemusta
  - Kollektiiviset päätökset aiheuttavat liikaa byrokratiaa ja hallinnollista monimutkaisuutta
explanation: |
  Ranskalaisen liberaalin perinteen mukaan aistimukset ja havainnot ovat pohjimmiltaan yksilöllisiä - et voi kokea nälkää jonkun toisen ihmisen kautta tai nähdä toisen ihmisen silmien kautta. Tämä havaintojen yksilöllisyys tarkoittaa, että yksilöllisillä päätöksillä, jotka perustuvat välittömään henkilökohtaiseen kokemukseen, on parempi informaation laatu kuin kollektiivisilla päätöksillä. Kun tehdään kollektiivisia päätöksiä esimerkiksi ruoan jakelusta, niissä on yhdistettävä useiden yksilöiden erilaiset havainnot ja tarpeet, joiden tarpeet vaihtelevat ajoitukseltaan ja voimakkuudeltaan. Tulos on väistämättä vähemmän mukautettu kunkin henkilön todelliseen tilanteeseen kuin päätökset, jotka yksilöt tekevät omien välittömien havaintojensa ja tarpeidensa perusteella.
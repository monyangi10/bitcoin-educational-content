question: Jaký je hlavní důvod, proč jsou podle francouzského liberálního myšlení kolektivní rozhodnutí méně účinná než individuální?
answer: Kolektivní rozhodnutí nemohou mít přístup k přímému individuálnímu vnímání a potřebám každého člověka
wrong_answers:
  - Kolektivní rozhodnutí vyžadují příliš mnoho času na realizaci, a proto jsou neefektivní
  - Kolektivní rozhodnutí přijímají politici, kteří nemají patřičné vzdělání a odborné znalosti
  - Kolektivní rozhodnutí vytvářejí příliš mnoho byrokracie a administrativní složitosti
explanation: |
  Podle francouzské liberální tradice jsou pocity a vjemy v zásadě individuální - nemůžete prožívat hlad skrze někoho jiného nebo vidět očima jiného člověka. Tato individuálnost vnímání znamená, že individuální rozhodnutí založená na přímé osobní zkušenosti mají ve srovnání s kolektivními rozhodnutími vyšší informační kvalitu. Když se přijímají kolektivní rozhodnutí o záležitostech, jako je distribuce potravin, musí se v nich agregovat různé vjemy a potřeby více jednotlivců, jejichž požadavky se liší v čase a intenzitě. Výsledek je nutně méně přizpůsoben skutečné situaci každého člověka než rozhodnutí jednotlivců založená na jejich vlastním přímém vnímání a potřebách.
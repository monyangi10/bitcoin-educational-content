question: Какова основная причина того, что коллективные решения менее эффективны, чем индивидуальные, согласно французской либеральной мысли?
answer: Коллективные решения не могут учитывать непосредственное, индивидуальное восприятие и потребности каждого человека
wrong_answers:
  - Коллективные решения требуют слишком много времени на реализацию и поэтому неэффективны
  - Коллективные решения принимаются политиками, не имеющими должного образования и опыта
  - Коллективные решения создают слишком много бюрократии и административных сложностей
explanation: |
  Согласно французской либеральной традиции, ощущения и восприятие принципиально индивидуальны - вы не можете испытывать голод через другого человека или видеть глазами другого человека. Эта индивидуальность восприятия означает, что индивидуальные решения, основанные на непосредственном личном опыте, обладают более высоким качеством информации по сравнению с коллективными решениями. Когда принимаются коллективные решения по таким вопросам, как распределение пищи, они должны объединять различные восприятия и потребности множества людей, чьи требования различаются по времени и интенсивности. Результат неизбежно оказывается менее адаптированным к реальной ситуации каждого человека, чем решения, принимаемые отдельными людьми на основе их непосредственного восприятия и потребностей.
question: Segundo o pensamento liberal francês, qual é a principal razão pela qual as decisões colectivas são menos eficazes do que as decisões individuais?
answer: As decisões colectivas não podem ter acesso às percepções e necessidades diretas e individuais de cada pessoa
wrong_answers:
  - As decisões colectivas levam demasiado tempo a implementar e são, por isso, ineficientes
  - As decisões colectivas são tomadas por políticos que não possuem formação e conhecimentos adequados
  - As decisões colectivas criam demasiada burocracia e complexidade administrativa
explanation: |
  De acordo com a tradição liberal francesa, as sensações e as percepções são fundamentalmente individuais - não se pode sentir fome através de outra pessoa ou ver através dos olhos de outra pessoa. Esta individualidade da perceção significa que as decisões individuais, baseadas na experiência pessoal direta, têm uma qualidade de informação superior às decisões colectivas. Quando são tomadas decisões colectivas sobre questões como a distribuição de alimentos, estas têm de agregar as diferentes percepções e necessidades de vários indivíduos cujas necessidades variam em termos de tempo e intensidade. O resultado é necessariamente menos adaptado à situação real de cada pessoa do que as decisões tomadas por indivíduos com base nas suas próprias percepções e necessidades diretas.
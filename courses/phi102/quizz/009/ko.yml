question: 프랑스 자유주의 사상에 따르면 집단적 결정이 개인적 결정보다 덜 효과적인 주된 이유는 무엇인가요?
answer: 집단적 결정은 각 개인의 직접적이고 개별적인 인식과 요구에 접근할 수 없습니다
wrong_answers:
  - 집단적 의사 결정은 실행에 너무 많은 시간이 걸리므로 비효율적입니다
  - 적절한 교육과 전문 지식이 부족한 정치인들이 집단적 결정을 내립니다
  - 집단적 결정은 너무 많은 관료주의와 행정적 복잡성을 야기합니다
explanation: |
  프랑스 자유주의 전통에 따르면 감각과 지각은 근본적으로 개별적이기 때문에 다른 사람을 통해 배고픔을 경험하거나 다른 사람의 눈을 통해 볼 수 없습니다. 이러한 지각의 개별성은 직접적인 개인적 경험을 바탕으로 한 개인의 결정이 집단적 결정에 비해 정보 품질이 우수하다는 것을 의미합니다. 식량 배급과 같은 문제에 대해 집단적 결정을 내릴 때는 시기와 강도가 다른 여러 개인의 서로 다른 인식과 요구를 종합해야 합니다. 그 결과는 개인이 자신의 직접적인 인식과 필요에 따라 내린 결정보다 각 개인의 실제 상황에 덜 적합할 수밖에 없습니다.
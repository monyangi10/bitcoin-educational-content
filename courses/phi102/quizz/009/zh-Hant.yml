question: 根據法國自由主義思想，集體決策不如個人決策有效的主要原因是什麼？
answer: 集體決策無法獲得每個人直接、個別的認知與需求
wrong_answers:
  - 集體決策需要太多時間來執行，因此效率不高
  - 集體決策由缺乏適當教育與專業知識的政治人物所制定
  - 集體決策造成過多的官僚作風和行政複雜性
explanation: |
  根據法國自由主義傳統，感覺和知覺根本上是個人的 - 你無法透過別人來體驗飢餓，也無法透過別人的眼睛來看東西。感知的個體性意味著，與集體決策相比，基於直接個人經驗的個人決策具有更高的資訊品質。當集體決策是關於食物分配等問題時，他們必須彙總多個人的不同感知和需求，而這些人的需求在時間和強度上都不盡相同。其結果必然不如個人根據自己的直接感知和需求做出的決策更適合每個人的實際情況。
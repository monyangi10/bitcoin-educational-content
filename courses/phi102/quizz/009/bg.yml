question: Коя е основната причина, поради която колективните решения са по-малко ефективни от индивидуалните според френската либерална мисъл?
answer: Колективните решения не могат да получат достъп до преките, индивидуални възприятия и нужди на всеки човек
wrong_answers:
  - Колективните решения отнемат твърде много време за изпълнение и поради това са неефективни
  - Колективните решения се вземат от политици, които нямат подходящо образование и опит
  - Колективните решения създават твърде много бюрокрация и административна сложност
explanation: |
  Според френската либерална традиция усещанията и възприятията са фундаментално индивидуални - не можеш да изпитваш глад чрез някой друг или да виждаш с очите на друг човек. Тази индивидуалност на възприятията означава, че индивидуалните решения, основани на пряк личен опит, имат по-високо качество на информацията в сравнение с колективните решения. Когато се вземат колективни решения по въпроси като разпределянето на храна, те трябва да обединяват различните възприятия и потребности на множество индивиди, чиито изисквания се различават по време и интензивност. Резултатът непременно е по-малко адаптиран към реалната ситуация на всеки човек, отколкото решенията, взети от отделни лица въз основа на техните собствени преки възприятия и потребности.
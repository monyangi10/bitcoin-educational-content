question: Hva er hovedgrunnen til at kollektive beslutninger er mindre effektive enn individuelle beslutninger ifølge fransk liberal tenkning?
answer: Kollektive beslutninger har ikke tilgang til hver enkelt persons direkte, individuelle oppfatninger og behov
wrong_answers:
  - Kollektive beslutninger tar for lang tid å gjennomføre og er derfor ineffektive
  - Kollektive beslutninger tas av politikere som mangler riktig utdanning og kompetanse
  - Kollektive beslutninger skaper for mye byråkrati og administrativ kompleksitet
explanation: |
  Ifølge den franske liberale tradisjonen er sansninger og persepsjoner grunnleggende individuelle - man kan ikke oppleve sult gjennom en annen eller se gjennom en annen persons øyne. Denne individuelle persepsjonen betyr at individuelle beslutninger, basert på direkte personlig erfaring, har bedre informasjonskvalitet enn kollektive beslutninger. Når kollektive beslutninger skal fattes, for eksempel om matfordeling, må de sammenfatte de ulike oppfatningene og behovene til flere individer som har ulike behov når det gjelder tidspunkt og intensitet. Resultatet blir nødvendigvis mindre tilpasset den enkeltes reelle situasjon enn beslutninger som fattes av enkeltpersoner basert på deres egne direkte oppfatninger og behov.
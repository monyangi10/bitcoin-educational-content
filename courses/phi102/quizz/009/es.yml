question: ¿Cuál es la razón principal por la que las decisiones colectivas son menos eficaces que las individuales según el pensamiento liberal francés?
answer: Las decisiones colectivas no pueden acceder a las percepciones y necesidades directas e individuales de cada persona
wrong_answers:
  - Las decisiones colectivas requieren demasiado tiempo y, por tanto, son ineficaces
  - Las decisiones colectivas las toman políticos que carecen de la formación y los conocimientos adecuados
  - Las decisiones colectivas crean demasiada burocracia y complejidad administrativa
explanation: |
  Según la tradición liberal francesa, las sensaciones y percepciones son fundamentalmente individuales: no se puede experimentar el hambre a través de otra persona ni ver a través de los ojos de otra persona. Este carácter individual de la percepción significa que las decisiones individuales, basadas en la experiencia personal directa, tienen una calidad de información superior a la de las decisiones colectivas. Cuando se toman decisiones colectivas sobre asuntos como la distribución de alimentos, éstas deben agregar las diferentes percepciones y necesidades de múltiples individuos cuyas necesidades varían en tiempo e intensidad. El resultado es necesariamente menos adaptado a la situación real de cada persona que las decisiones tomadas por individuos basándose en sus propias percepciones y necesidades directas.
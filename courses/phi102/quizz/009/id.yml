question: Apa alasan utama mengapa keputusan kolektif kurang efektif dibandingkan keputusan individu menurut pemikiran liberal Prancis?
answer: Keputusan kolektif tidak dapat mengakses persepsi dan kebutuhan individu secara langsung dan individual dari setiap orang
wrong_answers:
  - Keputusan kolektif membutuhkan terlalu banyak waktu untuk diimplementasikan dan karena itu tidak efisien
  - Keputusan kolektif dibuat oleh para politisi yang tidak memiliki pendidikan dan keahlian yang memadai
  - Keputusan kolektif menciptakan terlalu banyak birokrasi dan kerumitan administratif
explanation: |
  Menurut tradisi liberal Prancis, sensasi dan persepsi pada dasarnya bersifat individual - Anda tidak dapat mengalami rasa lapar melalui orang lain atau melihat melalui mata orang lain. Persepsi yang bersifat individual ini berarti bahwa keputusan individu, yang didasarkan pada pengalaman pribadi secara langsung, memiliki kualitas informasi yang lebih unggul dibandingkan dengan keputusan kolektif. Ketika keputusan kolektif dibuat mengenai hal-hal seperti distribusi makanan, mereka harus menggabungkan persepsi dan kebutuhan yang berbeda dari beberapa individu yang kebutuhannya berbeda-beda dalam hal waktu dan intensitas. Hasilnya tentu saja kurang sesuai dengan situasi nyata setiap orang dibandingkan dengan keputusan yang dibuat oleh individu yang didasarkan pada persepsi dan kebutuhan mereka sendiri.
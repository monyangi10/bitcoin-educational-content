question: دلیل اصلی اینکه چرا تصمیمات جمعی نسبت به تصمیمات فردی کمتر مؤثر هستند از نظر تفکر لیبرال فرانسوی چیست؟
answer: تصمیمات جمعی نمی‌توانند به ادراکات و نیازهای مستقیم و فردی هر شخص دسترسی پیدا کنند.
wrong_answers:
  - تصمیمات جمعی زمان زیادی برای اجرا می‌برند و بنابراین ناکارآمد هستند.
  - تصمیمات جمعی توسط سیاستمدارانی گرفته می‌شود که فاقد آموزش و تخصص مناسب هستند.
  - تصمیمات جمعی باعث ایجاد بوروکراسی و پیچیدگی اداری بیش از حد می‌شوند.
explanation: |
  بر اساس سنت لیبرال فرانسوی، احساسات و ادراکات به‌طور بنیادی فردی هستند - شما نمی‌توانید گرسنگی را از طریق شخص دیگری تجربه کنید یا از چشمان فرد دیگری ببینید. این فردیت ادراک به این معناست که تصمیمات فردی، که بر اساس تجربه شخصی مستقیم گرفته می‌شوند، دارای کیفیت اطلاعاتی برتری نسبت به تصمیمات جمعی هستند. هنگامی که تصمیمات جمعی در مورد مسائلی مانند توزیع غذا گرفته می‌شود، باید ادراکات و نیازهای مختلف افراد متعددی را که نیازهایشان از نظر زمان و شدت متفاوت است، تجمیع کنند. نتیجه لزوماً کمتر با وضعیت واقعی هر فرد سازگار است نسبت به تصمیماتی که توسط افراد بر اساس ادراکات و نیازهای مستقیم خودشان گرفته می‌شود.
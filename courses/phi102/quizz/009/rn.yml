question: Ni igiki nyamukuru gituma ingingo z’abantu bose zidakora neza nk’ingingo z’umuntu ku giti ciwe hakurikijwe ivyiyumviro vy’ubwigenge bw’Abafaransa?
answer: Ivyemezo rusangi ntibishobora gushika ku vyo umuntu wese abona n’ivyo akeneye ataco akora .
wrong_answers:
  - Ivyemezo rusangi bifata umwanya munini cane kugira ngo bishirwe mu ngiro kandi rero ntibigira akamaro .
  - Ivyemezo rusangi bifatwa n'abanyapolitike batagira inyigisho n'ubuhinga bikwiye .
  - Ivyemezo rusangi bituma haba uburongozi bwinshi cane n'ubutegetsi bugoranye
explanation: |
  Dushingiye ku migenzo y’abafaransa y’ubwigenge, inyiyumvo n’ivyo umuntu abona ni ivy’umuntu ku giti ciwe - ntushobora gushikirwa n’inzara biciye ku wundi muntu canke ngo ubone biciye ku maso y’uwundi muntu. Ukwo gutahura kw’umuntu ku giti ciwe bisigura ko ingingo z’umuntu ku giti ciwe, zishingiye ku bumenyi bwiwe bwite butaziguye, zifise uburyo bw’amakuru burengeye ubw’ingingo z’abantu bose. Iyo ingingo rusangi zifatwa ku bintu nk’ugusangira ibifungurwa, zitegerezwa gukoranya ukuntu abantu benshi babona ibintu n’ivyo bakeneye bitandukanye, ivyo basaba bikaba bitandukanye mu gihe no mu bukomezi. Ico bivamwo ni ngombwa ko kidahuye cane n’ukuntu umuntu wese ameze vy’ukuri kuruta ingingo abantu bafata bishingiye ku kuntu babona ibintu be n’ivyo bakeneye ata guca ku ruhande.
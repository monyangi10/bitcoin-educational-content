question: Fransız liberal düşüncesine göre kolektif kararların bireysel kararlardan daha az etkili olmasının temel nedeni nedir?
answer: Kolektif kararlar her bir kişinin doğrudan, bireysel algılarına ve ihtiyaçlarına erişemez
wrong_answers:
  - Kolektif kararların uygulanması çok zaman alır ve bu nedenle verimsizdir
  - Kolektif kararlar, uygun eğitim ve uzmanlıktan yoksun politikacılar tarafından alınmaktadır
  - Kolektif kararlar çok fazla bürokrasi ve idari karmaşıklık yaratır
explanation: |
  Fransız liberal geleneğine göre, duyumlar ve algılar temelde bireyseldir - açlığı bir başkası aracılığıyla deneyimleyemez veya bir başkasının gözünden göremezsiniz. Algının bu bireyselliği, doğrudan kişisel deneyime dayanan bireysel kararların, kolektif kararlara kıyasla daha üstün bilgi kalitesine sahip olduğu anlamına gelir. Gıda dağıtımı gibi konularda kolektif kararlar alınırken, gereksinimleri zamanlama ve yoğunluk açısından farklılık gösteren çok sayıda bireyin farklı algı ve ihtiyaçlarının bir araya getirilmesi gerekir. Sonuç, bireylerin kendi doğrudan algı ve ihtiyaçlarına dayanarak verdikleri kararlara kıyasla, her bir kişinin gerçek durumuna daha az uyarlanmış olacaktır.
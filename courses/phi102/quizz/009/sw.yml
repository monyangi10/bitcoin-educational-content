question: Ni sababu gani kuu kwa nini maamuzi ya pamoja hayana ufanisi mkubwa kuliko maamuzi ya mtu binafsi kulingana na mawazo ya kiliberali ya Ufaransa?
answer: Maamuzi ya pamoja hayawezi kufikia mitazamo na mahitaji ya moja kwa moja ya kila mtu
wrong_answers:
  - Maamuzi ya pamoja huchukua muda mwingi kutekeleza na kwa hivyo hayana ufanisi
  - Maamuzi ya pamoja hufanywa na wanasiasa ambao hawana elimu na utaalamu unaofaa
  - Maamuzi ya pamoja yanaunda urasimu mwingi na ugumu wa kiutawala
explanation: |
  Kulingana na utamaduni wa kiliberali wa Ufaransa, hisia na mitazamo kimsingi ni ya mtu binafsi - huwezi kupata njaa kupitia mtu mwingine au kuona kupitia macho ya mtu mwingine. Upekee huu wa mitazamo unamaanisha kwamba maamuzi ya mtu binafsi, kulingana na uzoefu wa moja kwa moja wa kibinafsi, yana ubora wa juu wa taarifa ikilinganishwa na maamuzi ya pamoja. Maamuzi ya pamoja yanapofanywa kuhusu masuala kama usambazaji wa chakula, lazima yajumuishe mitazamo na mahitaji tofauti ya watu wengi ambao mahitaji yao hutofautiana katika muda na nguvu. Matokeo yake hayaendani sana na hali halisi ya kila mtu kuliko maamuzi yanayofanywa na watu binafsi kulingana na mitazamo na mahitaji yao ya moja kwa moja.
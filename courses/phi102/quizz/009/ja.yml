question: フランス自由主義思想によれば、集団的決定が個人的決定より効果的でない主な理由は何か？
answer: 集団的な意思決定では、各人の直接的で個別的な認識やニーズにアクセスできない。
wrong_answers:
  - 集団的決定は実施に時間がかかりすぎるため、非効率的である。
  - 適切な教育や専門知識を持たない政治家によって、集団的な決定が下される。
  - 集団的決定は官僚主義と行政の複雑さを生みすぎる
explanation: |
  フランスの自由主義の伝統によれば、感覚や知覚は基本的に個人的なものであり、他人を通して空腹を体験したり、他人の目を通して見たりすることはできない。このような知覚の個人性は、直接的な個人的経験に基づく個人の意思決定が、集団的な意思決定と比較して情報の質が優れていることを意味する。食糧分配のような事柄について集団的な決定を下す場合、要求のタイミングや強度が異なる複数の個人の異なる認識やニーズを集約しなければならない。その結果、各個人が自分の直接的な認識やニーズに基づいて下す意思決定よりも、各個人の実際の状況への適応度は必然的に低くなる。
question: Theo tư tưởng tự do Pháp, lý do chính khiến các quyết định tập thể kém hiệu quả hơn các quyết định cá nhân là gì?
answer: Các quyết định tập thể không thể tiếp cận trực tiếp những nhận thức và nhu cầu cá nhân của mỗi người.
wrong_answers:
  - Việc đưa ra quyết định tập thể tốn quá nhiều thời gian và do đó không hiệu quả.
  - Các quyết định tập thể được đưa ra bởi các chính trị gia thiếu trình độ học vấn và chuyên môn cần thiết.
  - Các quyết định tập thể tạo ra quá nhiều thủ tục hành chính và sự phức tạp trong quản lý.
explanation: |
  Theo truyền thống tự do của Pháp, cảm giác và nhận thức về cơ bản là mang tính cá nhân - bạn không thể trải nghiệm cơn đói thông qua người khác hoặc nhìn mọi thứ qua con mắt của người khác. Tính cá nhân trong nhận thức này có nghĩa là các quyết định cá nhân, dựa trên kinh nghiệm trực tiếp của bản thân, có chất lượng thông tin cao hơn so với các quyết định tập thể. Khi đưa ra các quyết định tập thể về các vấn đề như phân phối thực phẩm, cần phải tổng hợp các nhận thức và nhu cầu khác nhau của nhiều cá nhân, với các yêu cầu khác nhau về thời điểm và cường độ. Kết quả tất yếu là ít phù hợp với hoàn cảnh thực tế của mỗi người hơn so với các quyết định được đưa ra bởi các cá nhân dựa trên nhận thức và nhu cầu trực tiếp của chính họ.
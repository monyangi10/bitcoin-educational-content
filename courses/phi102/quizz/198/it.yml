question: Quale principio fondamentale dovrebbe guidare il rapporto tra meccanismi democratici e libertà individuale secondo il pensiero costituzionale liberale?
answer: La democrazia deve essere trattata come un mezzo per proteggere i diritti individuali, non come un fine in sé, e deve essere vincolata da limiti costituzionali
wrong_answers:
  - La regola della maggioranza democratica dovrebbe sempre prevalere sulle preferenze individuali, poiché la saggezza collettiva supera il giudizio personale
  - La libertà individuale deve essere subordinata ai risultati democratici perché la volontà del popolo rappresenta la massima autorità morale
  - Le istituzioni democratiche dovrebbero ampliare la loro portata normativa per massimizzare il benessere collettivo anche a scapito dell'autonomia personale
explanation: |
  Il pensiero costituzionale liberale, esemplificato da pensatori come Benjamin Constant, sottolinea che la democrazia è uno strumento prezioso ma potenzialmente pericoloso, che deve essere limitato da regole costituzionali e da un'opinione pubblica illuminata. La democrazia serve a proteggere i diritti individuali e a organizzare una governance efficace, ma quando diventa fine a se stessa, rischia di trasformarsi in un dispotismo democratico in cui la maggioranza opprime la libertà individuale. Le altre opzioni suggeriscono erroneamente che i risultati democratici debbano prevalere sui diritti individuali o che l'espansione del controllo democratico sia intrinsecamente benefica, mancando la fondamentale intuizione liberale sulla natura strumentale della democrazia.
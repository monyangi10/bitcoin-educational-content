question: Welk grondbeginsel moet volgens het liberale constitutionele gedachtegoed de relatie tussen democratische mechanismen en individuele vrijheid bepalen?
answer: Democratie moet worden behandeld als een middel om individuele rechten te beschermen, niet als een doel op zich, en moet worden beperkt door grondwettelijke beperkingen
wrong_answers:
  - Democratische meerderheidsregel moet altijd voorrang hebben op individuele voorkeuren, omdat collectieve wijsheid boven persoonlijk oordeel gaat
  - Individuele vrijheid moet ondergeschikt worden gemaakt aan democratische resultaten omdat de wil van het volk de hoogste morele autoriteit vertegenwoordigt
  - Democratische instellingen moeten hun regelgevend bereik uitbreiden om collectieve welvaart te maximaliseren, zelfs ten koste van persoonlijke autonomie
explanation: |
  Het liberale constitutionele gedachtegoed, geïllustreerd door denkers als Benjamin Constant, benadrukt dat democratie een waardevol maar potentieel gevaarlijk instrument is dat begrensd moet worden door grondwettelijke regels en een verlichte publieke opinie. Democratie dient het doel van het beschermen van individuele rechten en het organiseren van effectief bestuur, maar wanneer het een doel op zich wordt, dreigt het te veranderen in democratisch despotisme waar de meerderheid individuele vrijheid onderdrukt. De andere opties suggereren ten onrechte dat democratische resultaten zwaarder zouden moeten wegen dan individuele rechten of dat het uitbreiden van democratische controle inherent gunstig is, waarbij het cruciale liberale inzicht over de instrumentele aard van democratie ontbreekt.
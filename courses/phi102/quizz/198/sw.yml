question: Ni kanuni gani ya msingi inapaswa kuongoza uhusiano kati ya mifumo ya kidemokrasia na uhuru wa mtu binafsi kulingana na mawazo ya kikatiba ya kiliberali?
answer: Demokrasia inapaswa kuchukuliwa kama njia ya kulinda haki za mtu binafsi, si kama lengo lenyewe, na lazima izuiliwe na mipaka ya kikatiba.
wrong_answers:
  - Utawala wa wengi wa kidemokrasia unapaswa kuchukua nafasi ya kwanza kuliko mapendeleo ya mtu binafsi kwani hekima ya pamoja inazidi hukumu ya kibinafsi
  - Uhuru wa mtu binafsi lazima uwe chini ya matokeo ya kidemokrasia kwa sababu matakwa ya watu yanawakilisha mamlaka ya juu zaidi ya kimaadili
  - Taasisi za kidemokrasia zinapaswa kupanua wigo wao wa udhibiti ili kuongeza ustawi wa pamoja hata kwa gharama ya uhuru wa kibinafsi
explanation: |
  Mawazo ya kikatiba ya kiliberali, yaliyoonyeshwa na wanafikra kama Benjamin Constant, yanasisitiza kwamba demokrasia ni chombo muhimu lakini kinachoweza kuwa hatari ambacho lazima kifungwe na sheria za kikatiba na maoni ya umma yaliyoelimika. Demokrasia hutimiza kusudi la kulinda haki za mtu binafsi na kupanga utawala bora, lakini inapokuwa mwisho yenyewe, ina hatari ya kubadilika kuwa udikteta wa kidemokrasia ambapo walio wengi hukandamiza uhuru wa mtu binafsi. Chaguzi zingine zinaonyesha kimakosa kwamba matokeo ya kidemokrasia yanapaswa kuzidi haki za mtu binafsi au kwamba kupanua udhibiti wa kidemokrasia kuna manufaa kiasili, na kukosa ufahamu muhimu wa kiliberali kuhusu asili ya demokrasia.
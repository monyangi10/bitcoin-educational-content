question: Ni ingingo ngenderwako iyihe y’ishimikiro ikwiye kuyobora isano hagati y’uburyo bwa demokarasi n’umwidegemvyo w’umuntu ku giti ciwe hakurikijwe iciyumviro c’itegeko nshinga ry’ubwigenge?
answer: Demokarasi ikwiye gufatwa nk’uburyo bwo kurinda uburenganzira bw’umuntu ku giti ciwe, atari nk’intumbero ubwayo, kandi itegerezwa gufatwa n’imipaka y’itegeko nshinga .
wrong_answers:
  - Intwaro ya demokarasi y’abantu benshi ikwiye kwama ifata imbere y’ivyo umuntu akunda kuko ubwenge rusangi buruta urubanza rw’umuntu ku giti ciwe .
  - Umwidegemvyo w'umuntu ku giti ciwe utegerezwa gushirwa munsi y'ingaruka za demokarasi kuko ubugombe bw'abantu buserukira ubukuru bwo mu vy'inyifato runtu burengeye ubundi bwose .
  - Inzego za demokarasi zikwiye kwagura urugero rwazo rwo gutegeka kugira ngo zishire imbere imibereho myiza y'abantu bose mbere n'aho vyoba ari ugutakaza ubwigenge bw'umuntu ku giti ciwe .
explanation: |
  Iciyumviro c’itegeko nshinga c’ubwigenge, gishikirizwa akarorero k’abanyabwenge nka Benjamin Constant, gishimika ku vy’uko demokarasi ari igikoresho c’agaciro ariko gishobora gutera akaga, kigomba gushingira ku mategeko y’itegeko nshinga be n’ivyiyumviro vya bose bifise umuco. Demokarasi ifise intumbero yo kurinda uburenganzira bw’umuntu ku giti ciwe no gutunganya ubutegetsi bwiza, ariko iyo ibaye intumbero ubwayo, irashobora guhinduka ubutegetsi bw’agahomerabunwa bwa demokarasi aho benshi bahahaza umwidegemvyo w’umuntu ku giti ciwe. Ayandi mahitamwo avuga mu buryo butari bwo ko ingaruka za demokarasi zikwiye gusumba uburenganzira bw’umuntu ku giti ciwe canke ko kwagura ubugenzuzi bwa demokarasi ari ngirakamaro mu buryo busanzwe, bikabura ubumenyi buhambaye bw’ubwigenge ku bijanye n’ingene demokarasi ari igikoresho.
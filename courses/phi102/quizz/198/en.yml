question: What fundamental principle should guide the relationship between democratic mechanisms and individual liberty according to liberal constitutional thought?
answer: Democracy should be treated as a means to protect individual rights, not as an end in itself, and must be constrained by constitutional limits
wrong_answers:
  - Democratic majority rule should always take precedence over individual preferences since collective wisdom surpasses personal judgment
  - Individual liberty must be subordinated to democratic outcomes because the will of the people represents the highest moral authority
  - Democratic institutions should expand their regulatory scope to maximize collective welfare even at the expense of personal autonomy
explanation: |
  Liberal constitutional thought, exemplified by thinkers like Benjamin Constant, emphasizes that democracy is a valuable but potentially dangerous tool that must be bounded by constitutional rules and enlightened public opinion. Democracy serves the purpose of protecting individual rights and organizing effective governance, but when it becomes an end in itself, it risks transforming into democratic despotism where the majority oppresses individual liberty. The other options incorrectly suggest that democratic outcomes should override individual rights or that expanding democratic control is inherently beneficial, missing the crucial liberal insight about democracy's instrumental nature.

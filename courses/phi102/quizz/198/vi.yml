question: Theo tư tưởng hiến pháp tự do, nguyên tắc cơ bản nào nên định hướng mối quan hệ giữa các cơ chế dân chủ và tự do cá nhân?
answer: Dân chủ nên được coi là phương tiện để bảo vệ quyền cá nhân, chứ không phải là mục đích tự thân, và phải bị ràng buộc bởi các giới hạn hiến pháp.
wrong_answers:
  - Nguyên tắc đa số dân chủ luôn phải được ưu tiên hơn sở thích cá nhân vì trí tuệ tập thể vượt trội hơn phán đoán cá nhân.
  - Tự do cá nhân phải được đặt dưới sự chi phối của các kết quả dân chủ vì ý chí của nhân dân đại diện cho thẩm quyền đạo đức cao nhất.
  - Các thể chế dân chủ nên mở rộng phạm vi quản lý của mình để tối đa hóa phúc lợi tập thể, ngay cả khi phải hy sinh quyền tự chủ cá nhân.
explanation: |
  Tư tưởng hiến pháp tự do, được thể hiện qua các nhà tư tưởng như Benjamin Constant, nhấn mạnh rằng dân chủ là một công cụ quý giá nhưng tiềm ẩn nguy hiểm, cần phải được giới hạn bởi các quy tắc hiến pháp và dư luận công khai sáng suốt. Dân chủ phục vụ mục đích bảo vệ quyền cá nhân và tổ chức quản trị hiệu quả, nhưng khi nó trở thành mục đích tự thân, nó có nguy cơ biến thành chế độ chuyên chế dân chủ, nơi đa số đàn áp tự do cá nhân. Các lựa chọn khác cho rằng kết quả dân chủ nên lấn át quyền cá nhân hoặc việc mở rộng quyền kiểm soát dân chủ vốn dĩ có lợi, bỏ qua nhận thức quan trọng của tư tưởng tự do về bản chất công cụ của dân chủ.
question: چه اصل بنیادی باید رابطه بین سازوکارهای دموکراتیک و آزادی فردی را بر اساس اندیشه قانون اساسی لیبرال هدایت کند؟
answer: دموکراسی باید به عنوان وسیله‌ای برای حفاظت از حقوق فردی تلقی شود، نه به عنوان هدفی در خود، و باید توسط محدودیت‌های قانون اساسی محدود شود.
wrong_answers:
  - حکومت اکثریت دموکراتیک باید همیشه بر ترجیحات فردی اولویت داشته باشد زیرا خرد جمعی از قضاوت شخصی برتر است.
  - آزادی فردی باید به نتایج دموکراتیک تابع شود زیرا اراده مردم بالاترین مرجع اخلاقی را نمایندگی می‌کند.
  - نهادهای دموکراتیک باید دامنه نظارتی خود را گسترش دهند تا رفاه جمعی را به حداکثر برسانند، حتی به قیمت کاهش خودمختاری شخصی.
explanation: |
  اندیشه قانون اساسی لیبرال، که توسط متفکرانی مانند بنجامین کنستانت به نمایش گذاشته شده است، تأکید می‌کند که دموکراسی ابزاری ارزشمند اما بالقوه خطرناک است که باید توسط قوانین قانون اساسی و افکار عمومی روشنفکر محدود شود. دموکراسی به منظور حفاظت از حقوق فردی و سازماندهی حکومت مؤثر خدمت می‌کند، اما زمانی که به خودی خود هدف قرار گیرد، خطر تبدیل شدن به استبداد دموکراتیک را دارد که در آن اکثریت آزادی فردی را سرکوب می‌کند. گزینه‌های دیگر به اشتباه پیشنهاد می‌کنند که نتایج دموکراتیک باید بر حقوق فردی غلبه کنند یا اینکه گسترش کنترل دموکراتیک ذاتاً مفید است، و بینش مهم لیبرال درباره ماهیت ابزاری دموکراسی را نادیده می‌گیرند.
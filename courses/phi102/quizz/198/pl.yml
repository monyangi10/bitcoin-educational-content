question: Jaka podstawowa zasada powinna kierować relacją między mechanizmami demokratycznymi a wolnością jednostki zgodnie z liberalną myślą konstytucyjną?
answer: Demokracja powinna być traktowana jako środek do ochrony praw jednostki, a nie jako cel sam w sobie i musi być ograniczona konstytucyjnymi ograniczeniami
wrong_answers:
  - Demokratyczne rządy większości powinny zawsze mieć pierwszeństwo przed indywidualnymi preferencjami, ponieważ zbiorowa mądrość przewyższa osobisty osąd
  - Indywidualna wolność musi być podporządkowana demokratycznym wynikom, ponieważ wola ludu stanowi najwyższy autorytet moralny
  - Instytucje demokratyczne powinny rozszerzyć swój zakres regulacyjny, aby zmaksymalizować zbiorowy dobrobyt nawet kosztem osobistej autonomii
explanation: |
  Liberalna myśl konstytucyjna, której przykładem są myśliciele tacy jak Benjamin Constant, podkreśla, że demokracja jest cennym, ale potencjalnie niebezpiecznym narzędziem, które musi być ograniczone zasadami konstytucyjnymi i oświeconą opinią publiczną. Demokracja służy ochronie praw jednostki i organizowaniu skutecznych rządów, ale gdy staje się celem samym w sobie, grozi przekształceniem się w demokratyczny despotyzm, w którym większość uciska wolność jednostki. Inne opcje błędnie sugerują, że demokratyczne wyniki powinny być nadrzędne wobec praw jednostki lub że rozszerzanie demokratycznej kontroli jest z natury korzystne, pomijając kluczowy liberalny wgląd w instrumentalną naturę demokracji.
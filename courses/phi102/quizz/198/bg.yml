question: Кой основен принцип трябва да ръководи връзката между демократичните механизми и индивидуалната свобода според либералната конституционна мисъл?
answer: Демокрацията трябва да се разглежда като средство за защита на индивидуалните права, а не като самоцел, и трябва да бъде ограничена от конституционните ограничения
wrong_answers:
  - Демократичното управление на мнозинството винаги трябва да има предимство пред индивидуалните предпочитания, тъй като колективната мъдрост превъзхожда личната преценка
  - Индивидуалната свобода трябва да бъде подчинена на демократичните резултати, защото волята на народа представлява най-висшата морална сила
  - Демократичните институции трябва да разширят регулаторния си обхват, за да максимизират колективното благосъстояние дори за сметка на личната автономия
explanation: |
  Либералната конституционна мисъл, пример за която са мислители като Бенджамин Констант, подчертава, че демокрацията е ценен, но потенциално опасен инструмент, който трябва да бъде ограничен от конституционни правила и просветено обществено мнение. Демокрацията служи за защита на индивидуалните права и за организиране на ефективно управление, но когато се превърне в самоцел, тя рискува да се превърне в демократичен деспотизъм, при който мнозинството потиска индивидуалната свобода. Другите варианти неправилно внушават, че демократичните резултати трябва да имат предимство пред индивидуалните права или че разширяването на демократичния контрол е по своята същност полезно, като пропускат решаващото либерално прозрение за инструменталния характер на демокрацията.
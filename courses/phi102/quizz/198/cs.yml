question: Jakým základním principem by se měl řídit vztah mezi demokratickými mechanismy a svobodou jednotlivce podle liberálního ústavního myšlení?
answer: Demokracie by měla být považována za prostředek ochrany práv jednotlivce, nikoli za cíl sám o sobě, a musí být omezena ústavními limity
wrong_answers:
  - Vláda demokratické většiny by měla mít vždy přednost před individuálními preferencemi, protože kolektivní moudrost převyšuje osobní úsudek
  - Svoboda jednotlivce musí být podřízena demokratickým výsledkům, protože vůle lidu představuje nejvyšší morální autoritu
  - Demokratické instituce by měly rozšířit svou regulační působnost tak, aby maximalizovaly kolektivní blahobyt i na úkor osobní autonomie
explanation: |
  Liberální ústavní myšlení, jehož příkladem jsou myslitelé jako Benjamin Constant, zdůrazňuje, že demokracie je cenný, ale potenciálně nebezpečný nástroj, který musí být omezen ústavními pravidly a osvíceným veřejným míněním. Demokracie slouží k ochraně práv jednotlivce a organizování efektivní správy věcí veřejných, ale pokud se stane cílem sama o sobě, hrozí, že se promění v demokratický despotismus, v němž většina potlačuje svobodu jednotlivce. Ostatní varianty nesprávně naznačují, že demokratické výsledky by měly být nadřazeny individuálním právům nebo že rozšiřování demokratické kontroly je ze své podstaty prospěšné, přičemž jim uniká zásadní liberální poznatek o instrumentální povaze demokracie.
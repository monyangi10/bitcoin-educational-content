question: Koji fundamentalni princip treba da vodi odnos između demokratskih mehanizama i individualne slobode prema liberalnoj ustavnoj misli?
answer: Demokratija treba da se tretira kao sredstvo za zaštitu individualnih prava, a ne kao cilj sam po sebi, i mora biti ograničena ustavnim granicama.
wrong_answers:
  - Demokratska većina treba uvek da ima prednost nad individualnim preferencijama jer kolektivna mudrost nadmašuje lični sud.
  - Individualna sloboda mora biti podređena demokratskim ishodima jer volja naroda predstavlja najviši moralni autoritet
  - Demokratske institucije treba da prošire svoj regulatorni opseg kako bi maksimizirale kolektivnu dobrobit čak i na račun lične autonomije
explanation: |
  Liberalna ustavna misao, koju su primerili mislioci poput Benjamina Constanta, naglašava da je demokratija vredan, ali potencijalno opasan alat koji mora biti ograničen ustavnim pravilima i prosvetljenim javnim mnjenjem. Demokratija služi svrsi zaštite individualnih prava i organizovanja efikasne vlasti, ali kada postane cilj sama po sebi, rizikuje da se pretvori u demokratski despotizam gde većina ugnjetava individualnu slobodu. Druge opcije pogrešno sugerišu da demokratski ishodi treba da nadvladaju individualna prava ili da je širenje demokratske kontrole inherentno korisno, propuštajući ključni liberalni uvid o instrumentalnoj prirodi demokratije.
question: 根据自由主义宪法思想，民主机制与个人自由之间的关系应遵循什么基本原则？
answer: 民主应被视为保护个人权利的手段，而非目的本身，必须受到宪法限制
wrong_answers:
  - 民主多数决制应始终优先于个人偏好，因为集体智慧超越个人判断
  - 个人自由必须服从民主结果，因为人民的意愿代表着最高的道德权威
  - 民主机构应扩大监管范围，即使牺牲个人自主权，也要实现集体福利最大化
explanation: |
  以本杰明-康斯坦特等思想家为代表的自由宪政思想强调，民主是一种有价值但潜在危险的工具，必须受到宪法规则和开明舆论的约束。民主的目的是保护个人权利和组织有效的治理，但当民主本身成为目的时，它就有可能转变为民主专制，由多数人压制个人自由。其他方案错误地认为，民主的结果应凌驾于个人权利之上，或认为扩大民主控制本质上是有益的，而忽略了自由主义关于民主工具性的重要见解。
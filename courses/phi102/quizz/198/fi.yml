question: Minkä perusperiaatteen pitäisi liberaalin valtiosääntöajattelun mukaan ohjata demokraattisten mekanismien ja yksilönvapauden välistä suhdetta?
answer: Demokratiaa on pidettävä keinona suojella yksilön oikeuksia, ei päämääränä sinänsä, ja sitä on rajoitettava perustuslaillisin rajoituksin
wrong_answers:
  - Demokraattisen enemmistösäännön pitäisi aina olla etusijalla yksilöllisiin mieltymyksiin nähden, koska kollektiivinen viisaus on henkilökohtaisen harkinnan yläpuolella
  - Yksilön vapaus on alistettava demokraattisille tuloksille, koska kansan tahto on korkein moraalinen auktoriteetti
  - Demokraattisten instituutioiden olisi laajennettava sääntelynsä soveltamisalaa maksimoidakseen kollektiivisen hyvinvoinnin jopa henkilökohtaisen autonomian kustannuksella
explanation: |
  Liberaalinen valtiosääntöajattelu, josta esimerkkinä ovat Benjamin Constantin kaltaiset ajattelijat, korostaa, että demokratia on arvokas mutta potentiaalisesti vaarallinen väline, jota on rajoitettava perustuslaillisilla säännöillä ja valistuneella yleisellä mielipiteellä. Demokratian tarkoituksena on suojella yksilön oikeuksia ja järjestää tehokas hallinto, mutta kun siitä tulee itsetarkoitus, se on vaarassa muuttua demokraattiseksi despotismiksi, jossa enemmistö sortaa yksilönvapautta. Muut vaihtoehdot viittaavat virheellisesti siihen, että demokraattisten tulosten pitäisi syrjäyttää yksilön oikeudet tai että demokraattisen valvonnan laajentaminen on luonnostaan hyödyllistä, ja niissä ei oteta huomioon demokratian välineellistä luonnetta koskevaa ratkaisevaa liberaalia näkemystä.
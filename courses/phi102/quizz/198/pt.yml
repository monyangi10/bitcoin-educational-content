question: Que princípio fundamental deve orientar a relação entre os mecanismos democráticos e a liberdade individual, de acordo com o pensamento constitucional liberal?
answer: A democracia deve ser tratada como um meio para proteger os direitos individuais, não como um fim em si mesma, e deve ser restringida por limites constitucionais
wrong_answers:
  - A regra da maioria democrática deve ter sempre precedência sobre as preferências individuais, uma vez que a sabedoria colectiva ultrapassa o julgamento pessoal
  - A liberdade individual deve ser subordinada aos resultados democráticos porque a vontade do povo representa a mais alta autoridade moral
  - As instituições democráticas devem alargar o seu âmbito regulamentar para maximizar o bem-estar coletivo, mesmo à custa da autonomia pessoal
explanation: |
  O pensamento constitucional liberal, exemplificado por pensadores como Benjamin Constant, salienta que a democracia é um instrumento valioso, mas potencialmente perigoso, que deve ser limitado por regras constitucionais e por uma opinião pública esclarecida. A democracia serve o objetivo de proteger os direitos individuais e organizar uma governação eficaz, mas quando se torna um fim em si mesma, corre o risco de se transformar num despotismo democrático em que a maioria oprime a liberdade individual. As outras opções sugerem incorretamente que os resultados democráticos devem sobrepor-se aos direitos individuais ou que a expansão do controlo democrático é inerentemente benéfica, falhando a visão liberal crucial sobre a natureza instrumental da democracia.
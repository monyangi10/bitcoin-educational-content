question: Prinsip dasar apa yang harus memandu hubungan antara mekanisme demokrasi dan kebebasan individu menurut pemikiran konstitusional liberal?
answer: Demokrasi harus diperlakukan sebagai sarana untuk melindungi hak-hak individu, bukan sebagai tujuan, dan harus dibatasi oleh batas-batas konstitusional
wrong_answers:
  - Aturan mayoritas yang demokratis harus selalu diutamakan daripada preferensi individu karena kebijaksanaan kolektif melampaui penilaian pribadi
  - Kebebasan individu harus tunduk pada hasil demokratis karena kehendak rakyat merupakan otoritas moral tertinggi
  - Lembaga-lembaga demokratis harus memperluas cakupan peraturan mereka untuk memaksimalkan kesejahteraan kolektif bahkan dengan mengorbankan otonomi pribadi
explanation: |
  Pemikiran konstitusional liberal, yang dicontohkan oleh para pemikir seperti Benjamin Constant, menekankan bahwa demokrasi adalah alat yang berharga namun berpotensi berbahaya yang harus dibatasi oleh aturan konstitusional dan opini publik yang tercerahkan. Demokrasi memiliki tujuan untuk melindungi hak-hak individu dan mengatur pemerintahan yang efektif, tetapi ketika demokrasi menjadi tujuan itu sendiri, demokrasi berisiko berubah menjadi despotisme demokratis di mana mayoritas menindas kebebasan individu. Pilihan-pilihan lain secara keliru menyatakan bahwa hasil-hasil demokratis harus mengesampingkan hak-hak individu atau bahwa perluasan kontrol demokratis secara inheren bermanfaat, dan kehilangan wawasan liberal yang penting tentang sifat instrumental demokrasi.
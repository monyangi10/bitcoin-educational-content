question: ¿Qué principio fundamental debe guiar la relación entre los mecanismos democráticos y la libertad individual según el pensamiento constitucional liberal?
answer: La democracia debe tratarse como un medio para proteger los derechos individuales, no como un fin en sí misma, y debe estar sujeta a límites constitucionales
wrong_answers:
  - La regla de la mayoría democrática debe prevalecer siempre sobre las preferencias individuales, ya que la sabiduría colectiva supera el juicio personal
  - La libertad individual debe subordinarse a los resultados democráticos porque la voluntad del pueblo representa la máxima autoridad moral
  - Las instituciones democráticas deben ampliar su ámbito regulador para maximizar el bienestar colectivo incluso a expensas de la autonomía personal
explanation: |
  El pensamiento constitucional liberal, ejemplificado por pensadores como Benjamin Constant, subraya que la democracia es una herramienta valiosa pero potencialmente peligrosa que debe estar limitada por normas constitucionales y por una opinión pública ilustrada. La democracia sirve para proteger los derechos individuales y organizar una gobernanza eficaz, pero cuando se convierte en un fin en sí misma, corre el riesgo de transformarse en un despotismo democrático en el que la mayoría oprime la libertad individual. Las otras opciones sugieren incorrectamente que los resultados democráticos deben prevalecer sobre los derechos individuales o que ampliar el control democrático es intrínsecamente beneficioso, pasando por alto la idea liberal crucial sobre la naturaleza instrumental de la democracia.
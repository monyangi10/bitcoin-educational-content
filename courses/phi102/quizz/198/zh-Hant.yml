question: 根據自由憲政思想，民主機制與個人自由之間的關係應該遵循什麼基本原則？
answer: 民主應被視為保護個人權利的手段，而非目的本身，且必須受到憲法限制的約束
wrong_answers:
  - 民主多數統治應永遠優先於個人偏好，因為集體智慧超越個人判斷
  - 個人自由必須從屬於民主結果，因為人民的意願代表最高的道德權威
  - 民主機構應擴大其監管範圍，即使犧牲個人自主權，也要使集體福利最大化
explanation: |
  以Benjamin Constant等思想家為代表的自由憲法思想強調，民主是一種有價值但潛在危險的工具，必須受到憲法規則和開明民意的約束。民主的目的是保護個人權利和組織有效的治理，但當民主本身成為目的時，它就有可能轉變為民主專制，由多數壓迫個人自由。其他選項錯誤地認為民主的結果應該凌駕於個人權利之上，或是擴大民主控制本身就是有益的，而忽略了自由主義關於民主工具性的重要洞見。
question: Vilken grundläggande princip bör enligt liberalt konstitutionellt tänkande styra förhållandet mellan demokratiska mekanismer och individuell frihet?
answer: Demokrati bör betraktas som ett medel för att skydda individuella rättigheter, inte som ett mål i sig, och måste begränsas av konstitutionella gränser
wrong_answers:
  - Demokratiska majoritetsregler bör alltid ha företräde framför individuella preferenser eftersom kollektiv visdom överträffar personligt omdöme
  - Individuell frihet måste underordnas demokratiska resultat eftersom folkets vilja utgör den högsta moraliska auktoriteten
  - Demokratiska institutioner bör utvidga sitt regleringsområde för att maximera den kollektiva välfärden även på bekostnad av den personliga autonomin
explanation: |
  Liberalt konstitutionellt tänkande, exemplifierat av tänkare som Benjamin Constant, betonar att demokrati är ett värdefullt men potentiellt farligt verktyg som måste begränsas av konstitutionella regler och en upplyst allmän opinion. Demokrati tjänar syftet att skydda individuella rättigheter och organisera effektiv styrning, men när den blir ett självändamål riskerar den att omvandlas till demokratisk despotism där majoriteten förtrycker individuell frihet. De andra alternativen antyder felaktigt att demokratiska resultat bör åsidosätta individuella rättigheter eller att utökad demokratisk kontroll i sig är fördelaktigt, vilket missar den viktiga liberala insikten om demokratins instrumentella natur.
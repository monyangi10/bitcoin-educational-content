question: Hvilket grunnleggende prinsipp bør ifølge liberal forfatningstenkning styre forholdet mellom demokratiske mekanismer og individuell frihet?
answer: Demokrati bør behandles som et middel til å beskytte individuelle rettigheter, ikke som et mål i seg selv, og må begrenses av konstitusjonelle rammer
wrong_answers:
  - Demokratisk flertallsstyre bør alltid gå foran individuelle preferanser, siden kollektiv visdom overgår personlig dømmekraft
  - Individuell frihet må underordnes demokratiske resultater fordi folkets vilje representerer den høyeste moralske autoritet
  - Demokratiske institusjoner bør utvide sitt reguleringsområde for å maksimere kollektiv velferd, selv på bekostning av personlig autonomi
explanation: |
  Liberal forfatningstenkning, eksemplifisert av tenkere som Benjamin Constant, understreker at demokratiet er et verdifullt, men potensielt farlig verktøy som må begrenses av konstitusjonelle regler og en opplyst opinion. Demokratiet tjener formålet om å beskytte individuelle rettigheter og organisere et effektivt styresett, men når det blir et mål i seg selv, risikerer det å utvikle seg til demokratisk despoti der flertallet undertrykker den individuelle friheten. De andre alternativene antyder feilaktig at demokratiske resultater bør overstyre individuelle rettigheter, eller at utvidet demokratisk kontroll i seg selv er fordelaktig, og går dermed glipp av den avgjørende liberale innsikten om demokratiets instrumentelle natur.
question: Mis õigustab peatüki kohaselt seda, et demokraatlikus protsessis tuleks küsida igaühe arvamust?
answer: Iga inimene kogeb vahetult seaduste mõju oma individuaalsete rõõmude ja valude kaudu
wrong_answers:
  - Kõigil kodanikel on võrdne intelligentsus ja seega võrdne võime teha poliitilisi otsuseid
  - Demokraatlik osalemine tagab, et enamus teeb alati õige valiku
  - Iga inimene panustab ühiskonda võrdselt ja väärib seetõttu võrdset poliitilist esindatust
explanation: |
  Peatükis selgitatakse, et üldine valimisõigus on õigustatud, sest rõõmud ja valud on individuaalsed kogemused - iga inimene tunneb vahetult seaduste mõju oma elule. Erinevad inimesed võivad tajuda samu olukordi erinevalt ja kujundada oma isikliku kogemuse põhjal hinnanguid. See individuaalse kogemuse reaalsus, mitte eeldused võrdse intelligentsuse, enamuse korrektsuse või võrdse ühiskondliku panuse kohta, on aluseks sellele, et demokraatlikes protsessides taotletakse igaühe panust.
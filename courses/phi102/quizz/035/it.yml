question: Secondo il capitolo, cosa giustifica il fatto che nel processo democratico si debba cercare l'opinione di tutti?
answer: Ogni persona sperimenta direttamente gli effetti delle leggi attraverso i propri piaceri e dolori individuali
wrong_answers:
  - Tutti i cittadini hanno la stessa intelligenza e quindi la stessa capacità di prendere decisioni politiche
  - La partecipazione democratica garantisce che la maggioranza faccia sempre la scelta giusta
  - Ogni persona contribuisce in egual misura alla società e quindi merita una pari rappresentanza politica
explanation: |
  Il capitolo spiega che il suffragio universale è giustificato perché i piaceri e i dolori sono esperienze individuali: ogni persona sente direttamente gli effetti delle leggi sulla propria vita. Individui diversi possono percepire le stesse situazioni in modo diverso e formulare giudizi basati sulla loro esperienza personale. Questa realtà dell'esperienza individuale, piuttosto che le ipotesi di uguale intelligenza, correttezza della maggioranza o uguale contributo sociale, costituisce la base per cercare il contributo di tutti nei processi democratici.
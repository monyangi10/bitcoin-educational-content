question: 根據本章的內容，在民主過程中應該尋求每個人的意見的理由是什麼？
answer: 每個人透過自己個別的快樂與痛苦，直接體驗法律的效果
wrong_answers:
  - 所有公民都有同等智慧，因此也有同等能力做出政治決策
  - 民主參與可確保大多數人永遠做出正確的選擇
  - 每個人對社會的貢獻都是平等的，因此應該享有平等的政治代表權
explanation: |
  本章說明普選是合理的，因為快樂和痛苦都是個人的經驗--每個人都直接感受到法律對自己生活的影響。不同的人可能對相同的情況有不同的感知，並根據個人經驗形成判斷。這種個人經驗的現實，而不是對同等智慧、大多數人的正確性或同等社會貢獻的假設，構成了在民主過程中尋求每個人的投入的基礎。
question: Hva er det som ifølge kapittelet rettferdiggjør at alle skal få si sin mening i den demokratiske prosessen?
answer: Hver enkelt person opplever direkte effekten av lovene gjennom sine egne individuelle gleder og smerter
wrong_answers:
  - Alle borgere har samme intelligens og dermed samme evne til å ta politiske beslutninger
  - Demokratisk deltakelse sikrer at flertallet alltid vil ta det riktige valget
  - Alle mennesker bidrar like mye til samfunnet og fortjener derfor lik politisk representasjon
explanation: |
  Kapitlet forklarer at allmenn stemmerett er berettiget fordi gleder og smerter er individuelle erfaringer - hver enkelt person føler direkte hvordan lovene påvirker deres eget liv. Ulike individer kan oppfatte de samme situasjonene ulikt og dømme ut fra sine personlige erfaringer. Denne individuelle erfaringen, snarere enn antakelser om lik intelligens, flertallets korrekthet eller like sosiale bidrag, danner grunnlaget for å søke alles innspill i demokratiske prosesser.
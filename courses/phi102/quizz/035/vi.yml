question: Theo chương này, điều gì biện minh cho việc cần phải thu thập ý kiến của mọi người trong quá trình dân chủ?
answer: Mỗi người trực tiếp trải nghiệm tác động của các quy luật thông qua những niềm vui và nỗi buồn cá nhân của chính mình.
wrong_answers:
  - Mọi công dân đều có trí thông minh như nhau và do đó có khả năng đưa ra các quyết định chính trị như nhau.
  - Sự tham gia dân chủ đảm bảo rằng đa số sẽ luôn đưa ra lựa chọn đúng đắn.
  - Mỗi người đều đóng góp như nhau cho xã hội và do đó xứng đáng được đại diện chính trị bình đẳng.
explanation: |
  Chương này giải thích rằng quyền bầu cử phổ thông là chính đáng vì niềm vui và nỗi buồn là những trải nghiệm cá nhân - mỗi người trực tiếp cảm nhận tác động của luật pháp lên cuộc sống của chính mình. Các cá nhân khác nhau có thể nhận thức cùng một tình huống theo cách khác nhau và hình thành phán đoán dựa trên kinh nghiệm cá nhân của họ. Thực tế về trải nghiệm cá nhân này, chứ không phải những giả định về trí thông minh ngang nhau, sự đúng đắn của đa số, hay sự đóng góp xã hội ngang nhau, tạo nên nền tảng cho việc tìm kiếm ý kiến đóng góp của mọi người trong các quá trình dân chủ.
question: Dushingiye ku gice, ni igiki gituma iciyumviro ca buri wese kironderwa mu nzira ya demokarasi?
answer: Umuntu wese arabona ata guca ku ruhande ingaruka z’amategeko biciye ku munezero wiwe n’imibabaro yiwe bwite .
wrong_answers:
  - Abanyagihugu bose bafise ubwenge bungana, rero bafise ubushobozi bungana bwo gufata ingingo za politike .
  - Ukwifatanya kwa demokarasi gutuma benshi bama bahitamwo neza .
  - Umuntu wese atanga umusanzu ungana mu kibano rero akwiye guserukirwa mu buryo bungana mu vya politike .
explanation: |
  Ico gice kirasigura ko uburenganzira bwo gutora kw’isi yose bubereye kubera ko umunezero n’imibabaro ari ibintu umuntu wese abona - umuntu wese yumva ataco yishisha ingaruka z’amategeko ku buzima bwiwe bwite. Abantu batandukanye boshobora kubona ibintu bimwe bimwe mu buryo butandukanye maze bagaca imanza bivanye n’ivyo baciyemwo. Ukwo kuri kw’ubumenyi bw’umuntu ku giti ciwe, aho kwiyumvira ko ubwenge bungana, ukugororoka kw’abantu benshi, canke intererano ingana mu kibano, ni vyo bishingira intahe kurondera inyishu y’umuntu wese mu nzira za demokarasi.
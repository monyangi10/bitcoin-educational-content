question: Согласно этой главе, что оправдывает необходимость учета мнения каждого в демократическом процессе?
answer: Каждый человек непосредственно испытывает действие законов через свои индивидуальные удовольствия и боль
wrong_answers:
  - Все граждане обладают равным интеллектом и, следовательно, равной способностью принимать политические решения
  - Демократическое участие гарантирует, что большинство всегда будет делать правильный выбор
  - Каждый человек вносит одинаковый вклад в развитие общества и поэтому заслуживает равного политического представительства
explanation: |
  В главе объясняется, что всеобщее избирательное право оправдано, потому что удовольствия и страдания - это индивидуальный опыт: каждый человек непосредственно ощущает влияние законов на свою жизнь. Разные люди могут по-разному воспринимать одни и те же ситуации и формировать суждения на основе своего личного опыта. Эта реальность индивидуального опыта, а не предположения о равном интеллекте, правильности большинства или равном социальном вкладе, является основой для обеспечения участия каждого в демократических процессах.
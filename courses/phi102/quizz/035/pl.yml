question: Zgodnie z rozdziałem, co uzasadnia, że w procesie demokratycznym należy zabiegać o opinię wszystkich?
answer: Każda osoba bezpośrednio doświadcza skutków praw poprzez własne indywidualne przyjemności i bóle
wrong_answers:
  - Wszyscy obywatele mają równą inteligencję, a zatem równą zdolność do podejmowania decyzji politycznych
  - Demokratyczne uczestnictwo gwarantuje, że większość zawsze dokona właściwego wyboru
  - Każda osoba w równym stopniu przyczynia się do rozwoju społeczeństwa i dlatego zasługuje na równą reprezentację polityczną
explanation: |
  Rozdział wyjaśnia, że powszechne prawo wyborcze jest uzasadnione, ponieważ przyjemności i bóle są indywidualnymi doświadczeniami - każda osoba bezpośrednio odczuwa wpływ prawa na swoje życie. Różne osoby mogą postrzegać te same sytuacje w różny sposób i formułować osądy w oparciu o swoje osobiste doświadczenia. Ta rzeczywistość indywidualnego doświadczenia, a nie założenia o równej inteligencji, poprawności większości lub równym wkładzie społecznym, stanowi podstawę do poszukiwania wkładu każdego w procesy demokratyczne.
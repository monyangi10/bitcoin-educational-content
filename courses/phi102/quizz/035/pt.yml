question: De acordo com o capítulo, o que justifica que a opinião de todos deva ser procurada no processo democrático?
answer: Cada pessoa experimenta diretamente os efeitos das leis através dos seus próprios prazeres e dores
wrong_answers:
  - Todos os cidadãos têm a mesma inteligência e, por conseguinte, a mesma capacidade de tomar decisões políticas
  - A participação democrática garante que a maioria fará sempre a escolha correta
  - Todas as pessoas contribuem de igual modo para a sociedade e, por conseguinte, merecem igual representação política
explanation: |
  O capítulo explica que o sufrágio universal se justifica porque os prazeres e as dores são experiências individuais - cada pessoa sente diretamente os efeitos das leis na sua própria vida. Indivíduos diferentes podem percecionar as mesmas situações de forma diferente e formar juízos baseados na sua experiência pessoal. Esta realidade da experiência individual, em vez de suposições sobre a igualdade de inteligência, a correção da maioria ou a igualdade de contribuição social, constitui a base para procurar o contributo de todos nos processos democráticos.
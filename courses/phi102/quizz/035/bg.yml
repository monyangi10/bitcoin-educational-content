question: Какво обосновава, според главата, че в демократичния процес трябва да се търси мнението на всички?
answer: Всеки човек изпитва пряко въздействието на законите чрез своите индивидуални удоволствия и болки
wrong_answers:
  - Всички граждани имат еднакъв интелект и следователно еднакъв капацитет да вземат политически решения
  - Демократичното участие гарантира, че мнозинството винаги ще направи правилния избор
  - Всеки човек допринася еднакво за обществото и затова заслужава еднакво политическо представителство
explanation: |
  В главата се обяснява, че всеобщото избирателно право е оправдано, тъй като удоволствията и болките са индивидуални преживявания - всеки човек пряко усеща въздействието на законите върху собствения си живот. Различните хора могат да възприемат едни и същи ситуации по различен начин и да формират преценки въз основа на личния си опит. Тази реалност на индивидуалния опит, а не предположенията за еднаква интелигентност, коректност на мнозинството или еднакъв социален принос, формира основата за търсене на приноса на всеки в демократичните процеси.
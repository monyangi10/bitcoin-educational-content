question: Bu bölüme göre, demokratik süreçte herkesin görüşünün alınması gerektiğini haklı kılan nedir?
answer: Her kişi yasaların etkilerini kendi bireysel zevkleri ve acıları aracılığıyla doğrudan yaşar
wrong_answers:
  - Tüm vatandaşlar eşit zekaya ve dolayısıyla siyasi karar alma konusunda eşit kapasiteye sahiptir
  - Demokratik katılım, çoğunluğun her zaman doğru seçimi yapmasını sağlar
  - Her insan topluma eşit katkıda bulunur ve bu nedenle eşit siyasi temsili hak eder
explanation: |
  Bu bölümde genel oy hakkının haklı olduğu, çünkü zevklerin ve acıların bireysel deneyimler olduğu, her bireyin yasaların kendi yaşamı üzerindeki etkilerini doğrudan hissettiği anlatılmaktadır. Farklı bireyler aynı durumları farklı algılayabilir ve kişisel deneyimlerine dayalı yargılar oluşturabilir. Eşit zeka, çoğunluğun doğruluğu ya da eşit toplumsal katkı gibi varsayımlardan ziyade bu bireysel deneyim gerçekliği, demokratik süreçlerde herkesin katkısını aramanın temelini oluşturur.
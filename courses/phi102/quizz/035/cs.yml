question: Čím je podle kapitoly zdůvodněno, že by se v demokratickém procesu měl zjišťovat názor každého?
answer: Každý člověk přímo zažívá účinky zákonů prostřednictvím svých vlastních individuálních potěšení a bolestí
wrong_answers:
  - Všichni občané mají stejnou inteligenci, a tedy i stejnou schopnost činit politická rozhodnutí
  - Demokratická účast zaručuje, že se většina vždy rozhodne správně
  - Každý člověk přispívá společnosti stejnou měrou, a proto si zaslouží stejné politické zastoupení
explanation: |
  Kapitola vysvětluje, že všeobecné volební právo je oprávněné, protože slasti a bolesti jsou individuální zkušeností - každý člověk přímo pociťuje účinky zákonů na svůj vlastní život. Různí jedinci mohou stejné situace vnímat odlišně a vytvářet si úsudky na základě svých osobních zkušeností. Tato realita individuální zkušenosti, spíše než předpoklady o stejné inteligenci, většinové správnosti nebo stejném společenském přínosu, tvoří základ pro snahu o zapojení každého do demokratických procesů.
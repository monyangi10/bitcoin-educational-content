question: Was rechtfertigt nach diesem Kapitel, dass im demokratischen Prozess die Meinung aller gefragt sein sollte?
answer: Jeder Mensch erfährt die Auswirkungen von Gesetzen unmittelbar durch seine eigenen individuellen Freuden und Schmerzen
wrong_answers:
  - Alle Bürger haben die gleiche Intelligenz und daher die gleiche Fähigkeit, politische Entscheidungen zu treffen
  - Die demokratische Beteiligung gewährleistet, dass die Mehrheit immer die richtige Entscheidung trifft
  - Jeder Mensch trägt gleichermaßen zur Gesellschaft bei und verdient daher eine gleichberechtigte politische Vertretung
explanation: |
  In dem Kapitel wird erläutert, dass das allgemeine Wahlrecht gerechtfertigt ist, weil Freuden und Leiden individuelle Erfahrungen sind - jeder Mensch spürt die Auswirkungen von Gesetzen auf sein eigenes Leben unmittelbar. Verschiedene Personen können dieselben Situationen unterschiedlich wahrnehmen und sich auf der Grundlage ihrer persönlichen Erfahrungen ein Urteil bilden. Diese Realität der individuellen Erfahrung und nicht die Annahmen über gleiche Intelligenz, mehrheitliche Korrektheit oder gleichen sozialen Beitrag bilden die Grundlage für die Einbeziehung aller in demokratische Prozesse.
question: この章によれば、民主主義のプロセスにおいて、すべての人の意見を求めるべきであることを正当化するものは何か？
answer: 各人がそれぞれの快楽と苦痛を通して、法の効果を直接体験する。
wrong_answers:
  - すべての国民は同等の知性を持っており、したがって政治的決定を下す能力も同等である
  - 民主的な参加は、多数派が常に正しい選択をすることを保証する。
  - すべての人は平等に社会に貢献しており、したがって平等な政治的代表に値する
explanation: |
  この章では、普通選挙が正当化されるのは、快楽や苦痛は個人の経験であり、各人が法律の影響を直接感じるからだと説明している。同じ状況でも個人によって受け止め方は異なり、個人的な経験に基づいて判断が下される。平等な知性、多数派の正しさ、平等な社会貢献といった仮定ではなく、このような個人の経験という現実が、民主主義のプロセスにおいてすべての人の意見を求める基礎を形成している。
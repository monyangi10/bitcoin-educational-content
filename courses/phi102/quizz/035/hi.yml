question: According to the chapter, what justifies that everyone's opinion should be sought in the democratic process?
answer: Each person directly experiences the effects of laws through their own individual pleasures and pains
wrong_answers:
  - All citizens have equal intelligence and therefore equal capacity to make political decisions
  - Democratic participation ensures that the majority will always make the correct choice
  - Every person contributes equally to society and therefore deserves equal political representation
explanation: |
  The chapter explains that universal suffrage is justified because pleasures and pains are individual experiences - each person directly feels the effects of laws on their own life. Different individuals may perceive the same situations differently and form judgments based on their personal experience. This reality of individual experience, rather than assumptions about equal intelligence, majority correctness, or equal social contribution, forms the foundation for seeking everyone's input in democratic processes.
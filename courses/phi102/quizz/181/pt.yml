question: De acordo com a crítica liberal apresentada, porque é que a definição de liberdade de Montesquieu como "o direito de fazer tudo o que as leis permitem" é considerada fundamentalmente perigosa?
answer: Permite qualquer violação das liberdades individuais inocentes, desde que uma lei autorize essas violações
wrong_answers:
  - Não distingue os diferentes tipos de leis e os seus diferentes graus de legitimidade
  - Cria um quadro demasiado restritivo que impede a necessária intervenção do Estado nos mercados
  - Estabelece um âmbito de ação individual demasiado vasto que prejudica a coesão social e o bem-estar coletivo
explanation: |
  A definição de Montesquieu é criticada porque torna a liberdade inteiramente dependente da permissão legal, o que significa que qualquer lei - por mais opressiva que seja - pode legitimamente restringir a liberdade individual. Esta conceção não reconhece que deve existir uma esfera de ação individual inocente que permanece livre independentemente do que as leis possam dizer. Pensadores liberais como Destutt de Tracy e Benjamin Constant defendiam que a verdadeira liberdade exige a distinção entre o poder legítimo do governo e a esfera inviolável dos direitos individuais, em vez de tornar a liberdade dependente de autorização legal.
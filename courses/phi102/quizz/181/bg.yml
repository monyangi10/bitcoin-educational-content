question: Защо според представената либерална критика определението на Монтескьо за свободата като "право да се прави всичко, което законите позволяват" се смята за фундаментално опасно?
answer: Тя позволява всяко нарушение на индивидуалните невинни свободи, стига законът да разрешава такива нарушения
wrong_answers:
  - Той не прави разлика между различните видове закони и техните различни степени на легитимност
  - Създава прекалено рестриктивна рамка, която предотвратява необходимата държавна намеса на пазарите
  - Той установява твърде широк обхват на индивидуалните действия, който подкопава социалното сближаване и колективното благосъстояние
explanation: |
  Определението на Монтескьо е критикувано, защото поставя свободата в пълна зависимост от правното разрешение, което означава, че всеки закон - независимо колко репресивен - може легитимно да ограничи индивидуалната свобода. Това схващане не признава, че трябва да съществува сфера на невинни индивидуални действия, която да остава свободна независимо от това, какво казват законите. Либерални мислители като Дестют дьо Траси и Бенджамин Констант твърдят, че истинската свобода изисква да се прави разлика между легитимната държавна власт и неприкосновената сфера на индивидуалните права, а не свободата да зависи от законовото разрешение.
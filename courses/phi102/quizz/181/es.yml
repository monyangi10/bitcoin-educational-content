question: Según la crítica liberal presentada, ¿por qué se considera fundamentalmente peligrosa la definición de libertad de Montesquieu como "el derecho a hacer todo lo que las leyes permiten"?
answer: Permite cualquier violación de las libertades individuales inocentes siempre que una ley autorice dichas violaciones
wrong_answers:
  - No distingue entre los distintos tipos de leyes y sus diferentes grados de legitimidad
  - Crea un marco excesivamente restrictivo que impide la necesaria intervención pública en los mercados
  - Establece un ámbito de actuación individual demasiado amplio que socava la cohesión social y el bienestar colectivo
explanation: |
  La definición de Montesquieu es criticada porque hace que la libertad dependa por completo del permiso legal, lo que significa que cualquier ley -por muy opresiva que sea- puede restringir legítimamente la libertad individual. Esta concepción no reconoce que debe existir una esfera de acción individual inocente que siga siendo libre independientemente de lo que digan las leyes. Pensadores liberales como Destutt de Tracy y Benjamin Constant sostenían que la verdadera libertad exige distinguir entre el poder legítimo del gobierno y la esfera inviolable de los derechos individuales, en lugar de supeditar la libertad a la autorización legal.
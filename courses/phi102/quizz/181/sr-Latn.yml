question: Prema liberalnoj kritici koja je predstavljena, zašto se Montesquieuova definicija slobode kao 'pravo da se čini sve što zakoni dopuštaju' smatra fundamentalno opasnom?
answer: Dozvoljava bilo kakvo kršenje individualnih nevinih sloboda sve dok zakon odobrava takva kršenja.
wrong_answers:
  - Ne uspeva da razlikuje različite vrste zakona i njihove različite stepene legitimnosti.
  - Stvara previše restriktivan okvir koji sprečava neophodnu intervenciju vlade na tržištima
  - Ona uspostavlja preširok opseg individualnog delovanja koji podriva društvenu koheziju i kolektivnu dobrobit
explanation: |
  Montesquieuova definicija je kritikovana jer slobodu čini potpuno zavisnom od pravnog dopuštenja, što znači da bilo koji zakon - bez obzira koliko represivan bio - može legitimno ograničiti individualnu slobodu. Ova koncepcija ne prepoznaje da bi trebalo postojati područje nevine individualne akcije koje ostaje slobodno bez obzira na to šta zakoni mogu reći. Liberalni mislioci poput Destutt de Tracyja i Benjamina Constanta tvrdili su da prava sloboda zahteva razlikovanje između legitimne vladine moći i nepovredivog područja individualnih prava, umesto da sloboda zavisi od pravnog odobrenja.
question: Theo phê bình của phe tự do, tại sao định nghĩa về tự do của Montesquieu là "quyền được làm mọi thứ mà pháp luật cho phép" lại bị coi là nguy hiểm về mặt cơ bản?
answer: Nó cho phép bất kỳ hành vi vi phạm nào đối với các quyền tự do cá nhân vô tội miễn là luật pháp cho phép những hành vi vi phạm đó.
wrong_answers:
  - Nó không phân biệt được giữa các loại luật khác nhau và mức độ hợp pháp khác nhau của chúng.
  - Nó tạo ra một khuôn khổ quá hạn chế, ngăn cản sự can thiệp cần thiết của chính phủ vào thị trường.
  - Nó thiết lập phạm vi hành động cá nhân quá rộng, làm suy yếu sự gắn kết xã hội và phúc lợi tập thể.
explanation: |
  Định nghĩa của Montesquieu bị chỉ trích vì nó khiến tự do hoàn toàn phụ thuộc vào sự cho phép của pháp luật, có nghĩa là bất kỳ luật nào - dù hà khắc đến đâu - cũng có thể hợp pháp hạn chế tự do cá nhân. Quan niệm này không nhận ra rằng cần phải có một phạm vi hành động cá nhân vô hại, vẫn được tự do bất kể luật pháp quy định điều gì. Các nhà tư tưởng tự do như Destutt de Tracy và Benjamin Constant lập luận rằng tự do đích thực đòi hỏi phải phân biệt giữa quyền lực chính phủ hợp pháp và phạm vi bất khả xâm phạm của các quyền cá nhân, chứ không phải là làm cho tự do phụ thuộc vào sự cho phép của pháp luật.
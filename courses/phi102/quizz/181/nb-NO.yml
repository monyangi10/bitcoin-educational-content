question: Hvorfor er Montesquieus definisjon av frihet som "retten til å gjøre alt som lovene tillater" grunnleggende farlig, ifølge den liberale kritikken som presenteres?
answer: Den tillater enhver krenkelse av individuelle uskyldige friheter så lenge en lov autoriserer slike krenkelser
wrong_answers:
  - Den skiller ikke mellom ulike typer lover og deres varierende grad av legitimitet
  - Det skaper et altfor restriktivt rammeverk som hindrer nødvendig statlig inngripen i markedene
  - Den etablerer et for bredt individuelt handlingsrom som undergraver det sosiale samholdet og den kollektive velferden
explanation: |
  Montesquieus definisjon kritiseres fordi den gjør friheten helt avhengig av lovens tillatelse, noe som betyr at enhver lov - uansett hvor undertrykkende den er - legitimt kan begrense individets frihet. Denne oppfatningen tar ikke hensyn til at det bør finnes en sfære av uskyldige individuelle handlinger som forblir frie uavhengig av hva lovene måtte si. Liberale tenkere som Destutt de Tracy og Benjamin Constant argumenterte for at sann frihet krever at man skiller mellom legitim statsmakt og den ukrenkelige sfæren av individuelle rettigheter, i stedet for å gjøre friheten avhengig av juridisk autorisasjon.
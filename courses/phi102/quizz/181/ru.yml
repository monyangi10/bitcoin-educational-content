question: Согласно представленной либеральной критике, почему определение Монтескье свободы как "права делать все, что разрешают законы" считается фундаментально опасным?
answer: Он допускает любое нарушение индивидуальных невинных свобод, если закон разрешает такие нарушения
wrong_answers:
  - Он не проводит различия между разными типами законов и их разной степенью легитимности
  - Он создает чрезмерно ограничительные рамки, препятствующие необходимому вмешательству государства в работу рынков
  - Он устанавливает слишком широкую сферу индивидуальных действий, что подрывает социальную сплоченность и коллективное благосостояние
explanation: |
  Определение Монтескье критикуют за то, что в нем свобода полностью зависит от разрешения закона, а это значит, что любой закон, каким бы деспотичным он ни был, может законно ограничить свободу личности. Эта концепция не признает, что должна существовать сфера невинных индивидуальных действий, которая остается свободной независимо от того, что могут сказать законы. Либеральные мыслители, такие как Дестют де Траси и Бенджамин Констан, утверждали, что истинная свобода требует проведения различия между законной властью правительства и неприкосновенной сферой индивидуальных прав, а не ставить свободу в зависимость от разрешения закона.
question: Zgodnie z przedstawioną liberalną krytyką, dlaczego definicja wolności Monteskiusza jako "prawa do robienia wszystkiego, na co pozwalają prawa" jest uważana za zasadniczo niebezpieczną?
answer: Pozwala to na dowolne naruszanie niewinnych wolności jednostki, o ile prawo zezwala na takie naruszenia
wrong_answers:
  - Nie rozróżnia różnych rodzajów praw i ich różnych stopni legalności
  - Tworzy zbyt restrykcyjne ramy, które uniemożliwiają niezbędną interwencję rządu na rynkach
  - Ustanawia zbyt szeroki zakres indywidualnych działań, które podważają spójność społeczną i zbiorowy dobrobyt
explanation: |
  Definicja Monteskiusza jest krytykowana, ponieważ czyni wolność całkowicie zależną od pozwolenia prawnego, co oznacza, że każde prawo - bez względu na to, jak opresyjne - może legalnie ograniczać wolność jednostki. Koncepcja ta nie uznaje, że powinna istnieć sfera niewinnych indywidualnych działań, która pozostaje wolna niezależnie od tego, co mówią przepisy prawa. Liberalni myśliciele, tacy jak Destutt de Tracy i Benjamin Constant, argumentowali, że prawdziwa wolność wymaga rozróżnienia między legalną władzą rządu a nienaruszalną sferą praw jednostki, a nie uzależniania wolności od zezwolenia prawnego.
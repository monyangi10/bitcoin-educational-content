question: Proč je podle předložené liberální kritiky Montesquieuova definice svobody jako "práva dělat vše, co zákony dovolují", považována za zásadně nebezpečnou?
answer: Umožňuje jakékoliv porušování nevinných svobod jednotlivce, pokud je zákon povoluje
wrong_answers:
  - Nerozlišuje mezi různými typy zákonů a jejich různou mírou legitimity
  - Vytváří příliš restriktivní rámec, který brání nezbytným vládním zásahům na trzích
  - Zavádí příliš široký rozsah individuálního jednání, který podkopává sociální soudržnost a kolektivní blahobyt
explanation: |
  Montesquieuova definice je kritizována, protože činí svobodu zcela závislou na právním povolení, což znamená, že jakýkoli zákon - bez ohledu na to, jak represivní - může legitimně omezit svobodu jednotlivce. Toto pojetí neuznává, že by měla existovat sféra nevinného individuálního jednání, která zůstává svobodná bez ohledu na to, co říkají zákony. Liberální myslitelé jako Destutt de Tracy a Benjamin Constant tvrdili, že skutečná svoboda vyžaduje rozlišování mezi legitimní vládní mocí a nedotknutelnou sférou individuálních práv, a nikoli podmiňování svobody zákonným povolením.
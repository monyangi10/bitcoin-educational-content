question: 根據所提出的自由主義批判，為什麼孟德斯鸠將自由定義為「做法律允許的一切事情的權利」會被認為具有根本性的危險？
answer: 只要法律授權，它就允許任何違反個人無辜自由的行為。
wrong_answers:
  - 它沒有區分不同類型的法律及其不同程度的合法性
  - 它創造了一個過度限制性的框架，阻止政府對市場進行必要的干預
  - 它所建立的個人行動範圍太廣，會破壞社會凝聚力和集體福利
explanation: |
  孟德斯鸠的定義受到批評，因為它使自由完全取決於法律許可，這意味著任何法律 - 無論如何壓迫 - 都可以合法地限制個人自由。這種概念沒有承認，無論法律如何規定，都應該有一個保持自由的無辜個人行為領域。自由主義思想家Destutt de Tracy和Benjamin Constant認為，真正的自由需要區分合法的政府權力和不可侵犯的個人權利領域，而不是讓自由取決於法律授權。
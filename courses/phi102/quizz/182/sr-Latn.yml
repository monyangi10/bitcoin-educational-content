question: Prema francuskoj liberalnoj tradiciji 19. veka, koja je osnovna greška socijalizma kada pokušava da redefiniše slobodu u smislu pozitivne slobode?
answer: Zbunjuje sposobnost postizanja željenih ishoda sa istinskom slobodom, što dovodi do sistema koji uništava negativnu slobodu i ne uspeva da isporuči obećane pozitivne ishode.
wrong_answers:
  - Previše se fokusira na individualna vlasnička prava, dok zanemaruje kolektivno dobro i društvenu harmoniju neophodnu za istinsku slobodu.
  - Održava zastarelo shvatanje negativne slobode koje sprečava državu da obezbedi jednake mogućnosti svim građanima za ostvarivanje njihovih prava.
  - Stvara prekomernu ekonomsku nejednakost dopuštajući neograničenim tržišnim silama da određuju raspodelu resursa i društvenih beneficija
explanation: |
  Analiza Paula Leroy-Beaulieua pokazuje da redefinicija slobode u socijalizmu kao pozitivne slobode (sposobnost da se dobije ono što se želi) stvara fundamentalnu konceptualnu grešku. Ovaj pristup napušta čvrstu osnovu negativne slobode (odsustvo prepreka za nevinu akciju) ukorenjenu u pravima vlasništva. Ključni uvid je da socijalizam 'dvostruko ne uspeva' - uništava istinsku slobodu koju razumeju liberali, dok istovremeno ne uspeva da isporuči obećane pozitivne ishode koje tvrdi da pruža kroz državnu intervenciju.
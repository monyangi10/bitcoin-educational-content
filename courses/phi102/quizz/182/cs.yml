question: Jaké zásadní chyby se podle francouzské liberální tradice 19. století dopouští socialismus, když se pokouší nově definovat svobodu ve smyslu pozitivní svobody?
answer: Zaměňuje schopnost dosáhnout požadovaných výsledků se skutečnou svobodou, což vede k systému, který ničí jak negativní svobodu, tak nepřináší slibované pozitivní výsledky
wrong_answers:
  - Příliš se zaměřuje na individuální vlastnická práva a opomíjí kolektivní dobro a sociální harmonii, které jsou nezbytné pro skutečnou svobodu
  - Zachovává zastaralé pojetí negativní svobody, které brání státu zajistit všem občanům rovné příležitosti k uplatnění jejich práv
  - Vytváří nadměrnou ekonomickou nerovnost tím, že umožňuje neomezeným tržním silám určovat rozdělování zdrojů a sociálních výhod
explanation: |
  Analýza Paula Leroy-Beaulieua ukazuje, že socialistická redefinice svobody jako pozitivní svobody (schopnost získat to, po čem člověk touží) vytváří zásadní koncepční chybu. Tento přístup opouští pevný základ negativní svobody (neexistence překážek nevinného jednání) zakotvený ve vlastnických právech. Kritický poznatek spočívá v tom, že socialismus "selhává dvojnásobně" - ničí skutečnou svobodu, jak ji chápou liberálové, a zároveň nedokáže přinést slibované pozitivní výsledky, které údajně poskytuje prostřednictvím státních zásahů.
question: Hva er den mest slående logiske inkonsekvensen i moderne politiske systemers syn på borgernes kompetanse, ifølge sofismen om demokratisk formynderskap?
answer: Borgerne anses som inkompetente til å ta personlige beslutninger, men kompetente til å ta kollektive beslutninger for alle gjennom demokratisk stemmegivning
wrong_answers:
  - Innbyggerne anses som for emosjonelle for økonomiske valg, men rasjonelle nok for politiske beslutninger som krever større objektivitet
  - Innbyggerne har tillit til komplekse økonomiske beslutninger, men trenger veiledning i enklere saker som helse- og utdanningsvalg
  - Innbyggerne anses å være i stand til å ta beslutninger i lokalsamfunnet, men inkompetente til å delta i demokratiske prosesser på nasjonalt nivå
explanation: |
  Det sentrale paradokset som identifiseres i teksten, er at de samme individene som anses som ute av stand til å styre seg selv i dagliglivet gjennom personlige valg, samtidig blir betrodd å styre hele kollektivet gjennom demokratiske mekanismer. Denne selvmotsigelsen er spesielt slående fordi politiske valg i seg selv er mer komplekse enn personlige økonomiske beslutninger, men systemet forutsetter kompetanse for førstnevnte, mens det benekter den for sistnevnte. De andre alternativene gir en feilaktig fremstilling av den faktiske motsetningen ved å antyde ulike kompetansesfærer snarere enn den grunnleggende inkonsekvensen om de samme individenes beslutningsevne.
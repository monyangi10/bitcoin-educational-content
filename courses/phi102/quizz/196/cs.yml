question: Co podle sofismu demokratické péče vytváří nejnápadnější logický rozpor v tom, jak současné politické systémy nahlížejí na kompetence občanů?
answer: Občané jsou považováni za nekompetentní činit osobní rozhodnutí, ale kompetentní činit kolektivní rozhodnutí za všechny prostřednictvím demokratického hlasování
wrong_answers:
  - Občané jsou považováni za příliš emocionální pro ekonomická rozhodnutí, ale dostatečně racionální pro politická rozhodnutí, která vyžadují větší objektivitu
  - Občané mají důvěru ve složitých finančních rozhodnutích, ale potřebují poradenství v jednodušších záležitostech, jako je zdravotní péče a volba vzdělání
  - Občané jsou považováni za schopné rozhodovat na místní úrovni, ale nekompetentní účastnit se demokratických procesů na národní úrovni
explanation: |
  Základní paradox, který je v textu identifikován, spočívá v tom, že stejní jedinci, kteří jsou považováni za neschopné řídit sami sebe v každodenním životě prostřednictvím osobních rozhodnutí, jsou zároveň pověřeni řízením celého kolektivu prostřednictvím demokratických mechanismů. Tento rozpor je obzvláště nápadný, protože politická rozhodnutí jsou ze své podstaty složitější než osobní ekonomická rozhodnutí, avšak systém předpokládá kompetenci v prvním případě, zatímco v druhém ji popírá. Ostatní možnosti zkreslují skutečný rozpor tím, že naznačují spíše různé sféry kompetencí než zásadní rozpor týkající se rozhodovací schopnosti týchž jednotlivců.
question: Prema sofizmu demokratskog tutorstva, šta stvara najupečatljiviju logičku nedoslednost u načinu na koji savremeni politički sistemi posmatraju kompetenciju građana?
answer: Građani se smatraju nesposobnim da donose lične odluke, ali sposobnim da donose kolektivne odluke za sve putem demokratskog glasanja.
wrong_answers:
  - Građani se smatraju previše emotivnim za ekonomske izbore, ali dovoljno racionalnim za političke odluke koje zahtevaju veću objektivnost.
  - Građanima se veruje da donose složene finansijske odluke, ali im je potrebna pomoć za jednostavnija pitanja kao što su izbori u zdravstvu i obrazovanju.
  - Građani se smatraju sposobnim za donošenje odluka na nivou lokalne zajednice, ali nesposobnim za učešće u demokratskim procesima na nacionalnom nivou.
explanation: |
  Osnovni paradoks identifikovan u tekstu je da se isti pojedinci koji se smatraju nesposobnima da upravljaju sobom u svakodnevnom životu kroz lične izbore istovremeno smatraju sposobnima da upravljaju celokupnim kolektivom kroz demokratske mehanizme. Ova kontradikcija je posebno upečatljiva jer su politički izbori inherentno složeniji od ličnih ekonomskih odluka, a sistem pretpostavlja kompetenciju za prvo dok je negira za drugo. Druge opcije pogrešno predstavljaju stvarnu kontradikciju sugerišući različite sfere kompetencije umesto osnovne nedoslednosti u vezi sa sposobnošću istih pojedinaca za donošenje odluka.
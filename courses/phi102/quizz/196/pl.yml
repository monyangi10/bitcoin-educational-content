question: Zgodnie z sofizmatem demokratycznej kurateli, co tworzy najbardziej uderzającą logiczną niespójność w tym, jak współczesne systemy polityczne postrzegają kompetencje obywatelskie?
answer: Obywatele są uznawani za niekompetentnych do podejmowania osobistych decyzji, ale kompetentnych do podejmowania zbiorowych decyzji dla wszystkich poprzez demokratyczne głosowanie
wrong_answers:
  - Obywatele są uważani za zbyt emocjonalnych w przypadku wyborów ekonomicznych, ale wystarczająco racjonalnych w przypadku decyzji politycznych, które wymagają większego obiektywizmu
  - Obywatele mają zaufanie do złożonych decyzji finansowych, ale potrzebują wskazówek w prostszych kwestiach, takich jak opieka zdrowotna i wybory edukacyjne
  - Obywatele są uznawani za zdolnych do podejmowania decyzji na szczeblu lokalnym, ale niekompetentnych do uczestniczenia w procesach demokratycznych na szczeblu krajowym
explanation: |
  Podstawowym paradoksem zidentyfikowanym w tekście jest to, że tym samym jednostkom, które są uważane za niezdolne do rządzenia sobą w życiu codziennym poprzez osobiste wybory, jednocześnie powierza się rządzenie całym kolektywem za pomocą mechanizmów demokratycznych. Sprzeczność ta jest szczególnie uderzająca, ponieważ wybory polityczne są z natury bardziej złożone niż osobiste decyzje ekonomiczne, a jednak system zakłada kompetencje w przypadku tych pierwszych, jednocześnie odmawiając ich w przypadku tych drugich. Pozostałe opcje błędnie przedstawiają faktyczną sprzeczność, sugerując różne sfery kompetencji, a nie fundamentalną niespójność dotyczącą zdolności podejmowania decyzji przez te same osoby.
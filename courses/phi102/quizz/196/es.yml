question: Según el sofisma de la tutela democrática, ¿qué es lo que crea la incoherencia lógica más llamativa en la forma en que los sistemas políticos contemporáneos ven la competencia ciudadana?
answer: Los ciudadanos se consideran incompetentes para tomar decisiones personales, pero competentes para tomar decisiones colectivas para todos mediante el voto democrático
wrong_answers:
  - Se considera que los ciudadanos son demasiado emocionales para las decisiones económicas, pero suficientemente racionales para las decisiones políticas que requieren mayor objetividad
  - A los ciudadanos se les confían decisiones financieras complejas, pero necesitan orientación para asuntos más sencillos, como la sanidad o la educación
  - Se considera que los ciudadanos son capaces de tomar decisiones a nivel local, pero incompetentes para participar en procesos democráticos a nivel nacional
explanation: |
  La paradoja central identificada en el texto es que a los mismos individuos que se consideran incapaces de gobernarse a sí mismos en la vida cotidiana a través de elecciones personales se les confía al mismo tiempo el gobierno de todo el colectivo a través de mecanismos democráticos. Esta contradicción es especialmente llamativa porque las opciones políticas son intrínsecamente más complejas que las decisiones económicas personales y, sin embargo, el sistema asume la competencia para las primeras mientras que la niega para las segundas. Las otras opciones tergiversan la contradicción real sugiriendo diferentes esferas de competencia en lugar de la incoherencia fundamental sobre la capacidad de decisión de los mismos individuos.
question: Според софизма на демократичната опека кое е най-фрапиращото логическо противоречие в начина, по който съвременните политически системи разглеждат компетентността на гражданите?
answer: Гражданите се считат за некомпетентни да вземат лични решения, но са компетентни да вземат колективни решения за всички чрез демократично гласуване
wrong_answers:
  - Гражданите се смятат за твърде емоционални за икономически решения, но достатъчно рационални за политически решения, които изискват по-голяма обективност
  - На гражданите се доверяват сложни финансови решения, но те се нуждаят от напътствия по по-прости въпроси като избор на здравни грижи и образование
  - Счита се, че гражданите са способни да вземат решения на местно ниво, но не са компетентни да участват в демократичните процеси на национално ниво
explanation: |
  Основният парадокс, посочен в текста, се състои в това, че на същите лица, които се смятат за неспособни да управляват себе си в ежедневието чрез личен избор, същевременно се поверява управлението на целия колектив чрез демократични механизми. Това противоречие е особено поразително, тъй като политическият избор по своята същност е по-сложен от личните икономически решения, но системата приема компетентността за първите, докато я отрича за вторите. Другите варианти изопачават действителното противоречие, като предполагат различни сфери на компетентност, а не основното противоречие относно способността на едни и същи лица да вземат решения.
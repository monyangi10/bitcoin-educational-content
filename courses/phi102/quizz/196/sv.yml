question: Enligt den demokratiska förmyndarskaps-sofismen, vad skapar den mest slående logiska inkonsekvensen i hur samtida politiska system ser på medborgarnas kompetens?
answer: Medborgare anses vara oförmögna att fatta personliga beslut men kompetenta att fatta kollektiva beslut för alla genom demokratisk röstning
wrong_answers:
  - Medborgarna anses vara för känslomässiga för ekonomiska val, men tillräckligt rationella för politiska beslut som kräver större objektivitet
  - Medborgarna har förtroende för komplexa ekonomiska beslut men behöver vägledning i enklare frågor som vård och utbildning
  - Medborgarna anses kunna fatta beslut i lokalsamhället, men är oförmögna att delta i demokratiska processer på nationell nivå
explanation: |
  Den centrala paradox som identifieras i texten är att samma individer som anses oförmögna att styra sig själva i det dagliga livet genom personliga val samtidigt är betrodda att styra hela kollektivet genom demokratiska mekanismer. Denna motsägelse är särskilt slående eftersom politiska val till sin natur är mer komplexa än personliga ekonomiska beslut, men systemet förutsätter kompetens för de förra medan det förnekar den för de senare. De andra alternativen ger en felaktig bild av den faktiska motsägelsen genom att föreslå olika kompetensområden snarare än den grundläggande motsägelsen om samma individers beslutskapacitet.
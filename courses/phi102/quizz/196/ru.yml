question: Согласно софизму демократической опеки, что создает наиболее поразительное логическое несоответствие в том, как современные политические системы рассматривают компетентность гражданина?
answer: Граждане считаются некомпетентными для принятия личных решений, но компетентными для принятия коллективных решений за всех посредством демократического голосования
wrong_answers:
  - Считается, что граждане слишком эмоциональны для экономического выбора, но достаточно рациональны для политических решений, требующих большей объективности
  - Гражданам доверяют сложные финансовые решения, но они нуждаются в руководстве по более простым вопросам, таким как здравоохранение и выбор образования
  - Считается, что граждане способны принимать решения на местном уровне, но неспособны участвовать в демократических процессах на национальном уровне
explanation: |
  Основной парадокс, выявленный в тексте, заключается в том, что тем же самым людям, которые считаются неспособными управлять собой в повседневной жизни посредством личного выбора, одновременно доверяется управление всем коллективом через демократические механизмы. Это противоречие особенно поразительно, поскольку политический выбор по своей природе сложнее, чем личные экономические решения, однако система предполагает компетентность в первом случае и отрицает ее во втором. Другие варианты искажают реальное противоречие, предполагая различные сферы компетенции, а не фундаментальное несоответствие в отношении способности одних и тех же людей принимать решения.
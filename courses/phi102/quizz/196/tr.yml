question: Demokratik vesayet sofizmine göre, çağdaş siyasi sistemlerin vatandaş yetkinliğine bakışında en çarpıcı mantıksal tutarsızlığı yaratan nedir?
answer: Vatandaşlar kişisel karar alma konusunda yetersiz, ancak demokratik oylama yoluyla herkes için kolektif karar alma konusunda yetkin kabul edilir
wrong_answers:
  - Vatandaşların ekonomik tercihler için fazla duygusal, ancak daha fazla nesnellik gerektiren siyasi kararlar için yeterince rasyonel olduğu düşünülmektedir
  - Vatandaşlar karmaşık finansal kararlar konusunda güvenilirdir ancak sağlık ve eğitim seçimleri gibi daha basit konularda rehberliğe ihtiyaç duyarlar
  - Vatandaşların yerel topluluk kararlarını alabilecek yetkinlikte oldukları ancak ulusal düzeydeki demokratik süreçlere katılma konusunda yetersiz oldukları kabul edilir
explanation: |
  Metinde tanımlanan temel paradoks, kişisel tercihler yoluyla günlük hayatta kendilerini yönetmekten aciz oldukları düşünülen aynı bireylerin, aynı anda demokratik mekanizmalar yoluyla tüm kolektifi yöneteceklerine güvenilmesidir. Bu çelişki özellikle çarpıcıdır çünkü siyasi tercihler doğası gereği kişisel ekonomik kararlardan daha karmaşıktır, ancak sistem birincisi için yetkinlik varsayarken ikincisi için bunu reddetmektedir. Diğer seçenekler, aynı bireylerin karar verme kapasitesiyle ilgili temel tutarsızlıktan ziyade farklı yetki alanlarını öne sürerek asıl çelişkiyi yanlış yansıtmaktadır.
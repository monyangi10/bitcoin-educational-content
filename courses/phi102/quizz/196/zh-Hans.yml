question: 根据民主监护诡辩论，在当代政治制度如何看待公民能力方面，什么造成了最显著的逻辑不一致？
answer: 公民被认为没有能力做出个人决定，但有能力通过民主投票为所有人做出集体决定
wrong_answers:
  - 公民被认为在做出经济选择时过于感性，但在做出需要更加客观的政治决策时却足够理性
  - 公民在复杂的财务决策方面得到信任，但在医疗保健和教育选择等简单问题上需要指导
  - 公民被认为有能力做出地方社区决定，但没有能力参与国家级民主进程
explanation: |
  文中指出的核心悖论是，那些被认为没有能力在日常生活中通过个人选择管理自己的人，却同时被信任可以通过民主机制管理整个集体。这一矛盾尤为突出，因为政治选择在本质上比个人经济决策更为复杂，但制度却假定前者有能力，而否认后者有能力。其他选项歪曲了实际的矛盾，提出了不同的权限范围，而不是同一个人决策能力的根本不一致。
question: Mikä on demokraattisen holhouksen sofismin mukaan silmiinpistävin looginen epäjohdonmukaisuus siinä, miten nykyiset poliittiset järjestelmät suhtautuvat kansalaisten pätevyyteen?
answer: Kansalaisten katsotaan olevan kykenemättömiä tekemään henkilökohtaisia päätöksiä, mutta päteviä tekemään kollektiivisia päätöksiä kaikkien puolesta demokraattisen äänestyksen avulla
wrong_answers:
  - Kansalaisten katsotaan olevan liian tunnepitoisia taloudellisten valintojen tekemiseen, mutta riittävän rationaalisia poliittisiin päätöksiin, jotka edellyttävät suurempaa objektiivisuutta
  - Monimutkaisten taloudellisten päätösten tekeminen on kansalaisten vastuulla, mutta he tarvitsevat ohjausta yksinkertaisemmissa asioissa, kuten terveydenhuolto- ja koulutusvalinnoissa
  - Kansalaisten katsotaan kykenevän paikallisyhteisön päätöksentekoon, mutta heidän katsotaan olevan kykenemättömiä osallistumaan kansallisen tason demokraattisiin prosesseihin
explanation: |
  Tekstin keskeinen paradoksi on, että samojen yksilöiden, joita pidetään kykenemättöminä hallitsemaan itseään jokapäiväisessä elämässä henkilökohtaisten valintojen kautta, uskotaan samanaikaisesti hallitsevan koko kollektiivia demokraattisten mekanismien avulla. Tämä ristiriita on erityisen silmiinpistävä, koska poliittiset valinnat ovat luonnostaan monimutkaisempia kuin henkilökohtaiset taloudelliset päätökset, mutta silti järjestelmä olettaa, että ensin mainitut ovat päteviä, kun taas jälkimmäiset eivät ole. Muut vaihtoehdot vääristelevät varsinaista ristiriitaa, sillä ne viittaavat pikemminkin erilaisiin toimivaltuuksiin kuin perustavanlaatuiseen epäjohdonmukaisuuteen samojen yksilöiden päätöksentekokyvyn suhteen.
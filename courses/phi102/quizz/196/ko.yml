question: 민주적 후견주의 궤변에 따르면, 현대 정치 시스템이 시민 역량을 바라보는 방식에서 가장 두드러진 논리적 모순을 만드는 것은 무엇일까요?
answer: 시민은 개인적 의사 결정에는 무능하지만 민주적 투표를 통해 모두를 위한 집단적 의사 결정에는 유능한 것으로 간주됩니다
wrong_answers:
  - 시민은 경제적 선택에는 지나치게 감정적이지만 객관성이 요구되는 정치적 결정에는 충분히 이성적인 것으로 간주됩니다
  - 시민들은 복잡한 재정적 결정은 신뢰할 수 있지만 의료 및 교육 선택과 같은 간단한 문제에 대해서는 안내가 필요합니다
  - 시민들은 지역 사회의 의사 결정은 가능하지만 국가 차원의 민주적 절차에 참여하기에는 무능하다고 간주됩니다
explanation: |
  본문에서 확인된 핵심 역설은 일상 생활에서 개인적 선택을 통해 자신을 통치할 능력이 없다고 여겨지는 개인이 동시에 민주적 메커니즘을 통해 전체 집단을 통치할 수 있다고 신뢰받는다는 것입니다. 이러한 모순은 특히 정치적 선택이 개인의 경제적 결정보다 본질적으로 더 복잡하지만, 시스템은 전자의 경우 능력을 가정하는 반면 후자의 경우 이를 부정하기 때문에 더욱 두드러집니다. 다른 옵션은 동일한 개인의 의사 결정 능력에 대한 근본적인 불일치보다는 다른 영역의 능력을 제시함으로써 실제 모순을 잘못 표현합니다.
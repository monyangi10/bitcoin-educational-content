question: Secondo il sofisma della tutela democratica, qual è l'incoerenza logica più evidente nel modo in cui i sistemi politici contemporanei considerano le competenze dei cittadini?
answer: I cittadini sono ritenuti incompetenti a prendere decisioni personali, ma competenti a prendere decisioni collettive per tutti attraverso il voto democratico
wrong_answers:
  - I cittadini sono considerati troppo emotivi per le scelte economiche, ma abbastanza razionali per le decisioni politiche che richiedono una maggiore obiettività
  - I cittadini sono in grado di prendere decisioni finanziarie complesse, ma hanno bisogno di una guida per questioni più semplici, come le scelte in materia di sanità e istruzione
  - I cittadini sono ritenuti capaci di prendere decisioni a livello locale, ma incapaci di partecipare ai processi democratici a livello nazionale
explanation: |
  Il paradosso centrale individuato nel testo è che gli stessi individui che sono considerati incapaci di governare se stessi nella vita quotidiana attraverso le scelte personali sono allo stesso tempo ritenuti in grado di governare l'intera collettività attraverso i meccanismi democratici. Questa contraddizione è particolarmente evidente perché le scelte politiche sono intrinsecamente più complesse di quelle economiche personali, eppure il sistema assume la competenza per le prime mentre la nega per le seconde. Le altre opzioni travisano la contraddizione reale, suggerendo sfere di competenza diverse piuttosto che l'incoerenza fondamentale sulla capacità decisionale degli stessi individui.
question: According to the democratic tutelage sophism, what creates the most striking logical inconsistency in how contemporary political systems view citizen competence?
answer: Citizens are deemed incompetent to make personal decisions but competent to make collective decisions for everyone through democratic voting
wrong_answers:
  - Citizens are considered too emotional for economic choices but rational enough for political decisions that require greater objectivity
  - Citizens are trusted with complex financial decisions but require guidance for simpler matters like healthcare and education choices
  - Citizens are deemed capable of local community decisions but incompetent to participate in national-level democratic processes
explanation: |
  The core paradox identified in the text is that the same individuals who are considered incapable of governing themselves in daily life through personal choices are simultaneously trusted to govern the entire collective through democratic mechanisms. This contradiction is particularly striking because political choices are inherently more complex than personal economic decisions, yet the system assumes competence for the former while denying it for the latter. The other options misrepresent the actual contradiction by suggesting different spheres of competence rather than the fundamental inconsistency about the same individuals' decision-making capacity.
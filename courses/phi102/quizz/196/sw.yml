question: Kulingana na usomi wa kidemokrasia wa ufundishaji, ni nini kinachounda kutolingana kwa kimantiki kwa kushangaza zaidi katika jinsi mifumo ya kisiasa ya kisasa inavyoona uwezo wa raia?
answer: Raia wanaonekana kutokuwa na uwezo wa kufanya maamuzi binafsi lakini wana uwezo wa kufanya maamuzi ya pamoja kwa kila mtu kupitia upigaji kura wa kidemokrasia.
wrong_answers:
  - Raia wanachukuliwa kuwa na hisia nyingi kwa ajili ya chaguzi za kiuchumi lakini wana busara ya kutosha kwa ajili ya maamuzi ya kisiasa yanayohitaji upendeleo zaidi
  - Raia wanaaminika katika maamuzi magumu ya kifedha lakini wanahitaji mwongozo kwa mambo rahisi kama vile huduma za afya na chaguzi za elimu
  - Raia wanaonekana kuwa na uwezo wa kufanya maamuzi ya jamii lakini hawana uwezo wa kushiriki katika michakato ya kidemokrasia ya ngazi ya kitaifa.
explanation: |
  Kitendawili kikuu kinachotambuliwa katika maandishi ni kwamba watu wale wale ambao wanachukuliwa kuwa hawawezi kujitawala katika maisha ya kila siku kupitia chaguzi za kibinafsi wanaaminika kwa wakati mmoja kutawala kundi zima kupitia mifumo ya kidemokrasia. Kitendawili hiki kinashangaza hasa kwa sababu chaguzi za kisiasa ni ngumu zaidi kuliko maamuzi ya kibinafsi ya kiuchumi, lakini mfumo unachukua uwezo wa kwanza huku ukiukataa kwa upande wa pili. Chaguzi zingine zinapotosha utata halisi kwa kupendekeza nyanja tofauti za uwezo badala ya kutofautiana kwa msingi kuhusu uwezo wa watu wale wale wa kufanya maamuzi.
question: 根據民主監護的歪論，當代政治體系看待公民能力時，什麼會造成最明顯的邏輯不一致？
answer: 公民被視為無能力做出個人決策，但有能力透過民主投票為所有人做出集體決策
wrong_answers:
  - 公民被認為對於經濟選擇過於感性，但對於需要更客觀性的政治決策則夠理性
  - 公民在複雜的財務決策上獲得信任，但在醫療照護和教育選擇等較簡單的事項上則需要指導
  - 公民被認為有能力做出地方社區決策，但無能力參與國家級的民主進程
explanation: |
  文中指出的核心悖論是，那些被認為無法在日常生活中透過個人選擇來管理自己的個人，卻同時被信任能夠透過民主機制來管理整個集體。這個矛盾特別明顯，因為政治選擇在本質上比個人經濟決策更為複雜，但制度卻假定前者有能力，而否定後者的能力。其他選項歪曲了實際的矛盾，暗示了不同的權限範圍，而非相同個人決策能力的根本不一致。
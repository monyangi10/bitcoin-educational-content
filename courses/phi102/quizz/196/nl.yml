question: Wat is volgens de democratische voogdij drogreden de meest opvallende logische inconsistentie in hoe hedendaagse politieke systemen aankijken tegen de competentie van burgers?
answer: Burgers worden incompetent geacht om persoonlijke beslissingen te nemen, maar competent om collectieve beslissingen te nemen voor iedereen door middel van democratisch stemmen
wrong_answers:
  - Burgers worden als te emotioneel beschouwd voor economische keuzes, maar rationeel genoeg voor politieke beslissingen die meer objectiviteit vereisen
  - Burgers worden vertrouwd met complexe financiële beslissingen, maar hebben begeleiding nodig voor eenvoudigere zaken zoals gezondheidszorg en onderwijskeuzes
  - Burgers worden in staat geacht lokale gemeenschapsbeslissingen te nemen, maar zijn niet in staat deel te nemen aan democratische processen op nationaal niveau
explanation: |
  De kern van de paradox in de tekst is dat dezelfde individuen die niet in staat worden geacht om zichzelf te besturen in het dagelijks leven door middel van persoonlijke keuzes, tegelijkertijd worden vertrouwd om het hele collectief te besturen door middel van democratische mechanismen. Deze tegenstrijdigheid is vooral opvallend omdat politieke keuzes inherent complexer zijn dan persoonlijke economische beslissingen, maar toch gaat het systeem uit van competentie voor de eerstgenoemde terwijl het die voor de laatstgenoemde ontkent. De andere opties geven een verkeerd beeld van de feitelijke tegenstrijdigheid door verschillende bevoegdheidsgebieden te suggereren in plaats van de fundamentele tegenstrijdigheid over de beslissingsbevoegdheid van dezelfde individuen.
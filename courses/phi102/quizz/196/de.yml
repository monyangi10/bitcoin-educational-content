question: Was ist nach dem Sophismus der demokratischen Vormundschaft die auffälligste logische Ungereimtheit in der Art und Weise, wie heutige politische Systeme die Kompetenz der Bürger betrachten?
answer: Die Bürger werden als unfähig angesehen, persönliche Entscheidungen zu treffen, aber als kompetent, durch demokratische Abstimmungen kollektive Entscheidungen für alle zu treffen
wrong_answers:
  - Die Bürger werden als zu emotional für wirtschaftliche Entscheidungen angesehen, aber als rational genug für politische Entscheidungen, die mehr Objektivität erfordern
  - Den Bürgern werden komplexe Finanzentscheidungen zugetraut, sie benötigen jedoch Beratung in einfacheren Angelegenheiten wie Gesundheitsfürsorge und Bildungsentscheidungen
  - Die Bürger werden als fähig angesehen, auf lokaler Ebene Entscheidungen zu treffen, aber als unfähig, sich an demokratischen Prozessen auf nationaler Ebene zu beteiligen
explanation: |
  Das Kernparadoxon, das im Text herausgearbeitet wird, besteht darin, dass dieselben Personen, die als unfähig gelten, sich im täglichen Leben durch persönliche Entscheidungen selbst zu regieren, gleichzeitig das gesamte Kollektiv durch demokratische Mechanismen regieren sollen. Dieser Widerspruch ist besonders auffällig, weil politische Entscheidungen von Natur aus komplexer sind als persönliche wirtschaftliche Entscheidungen, das System aber für erstere Kompetenz voraussetzt, während es für letztere Kompetenz verneint. Die anderen Optionen stellen den tatsächlichen Widerspruch falsch dar, indem sie unterschiedliche Zuständigkeitsbereiche suggerieren, anstatt den grundlegenden Widerspruch in Bezug auf die Entscheidungsfähigkeit derselben Personen zu verdeutlichen.
question: Theo luận điểm ngụy biện về sự hướng dẫn dân chủ, điều gì tạo nên sự mâu thuẫn logic nổi bật nhất trong cách các hệ thống chính trị đương đại nhìn nhận năng lực của công dân?
answer: Công dân được coi là không đủ năng lực để đưa ra quyết định cá nhân nhưng lại đủ năng lực để đưa ra quyết định tập thể cho tất cả mọi người thông qua bỏ phiếu dân chủ.
wrong_answers:
  - Người dân được cho là quá cảm tính trong các lựa chọn kinh tế nhưng lại đủ lý trí cho các quyết định chính trị đòi hỏi tính khách quan cao hơn.
  - Người dân được tin tưởng giao phó những quyết định tài chính phức tạp nhưng cần được hướng dẫn đối với những vấn đề đơn giản hơn như lựa chọn chăm sóc sức khỏe và giáo dục.
  - Công dân được coi là có khả năng đưa ra quyết định ở cấp cộng đồng địa phương nhưng lại không đủ năng lực tham gia vào các quy trình dân chủ cấp quốc gia.
explanation: |
  Nghịch lý cốt lõi được chỉ ra trong văn bản là những cá nhân được cho là không có khả năng tự quản lý cuộc sống hàng ngày thông qua các lựa chọn cá nhân lại đồng thời được tin tưởng để quản lý toàn bộ tập thể thông qua các cơ chế dân chủ. Mâu thuẫn này đặc biệt nổi bật bởi vì các lựa chọn chính trị vốn dĩ phức tạp hơn các quyết định kinh tế cá nhân, thế nhưng hệ thống lại giả định năng lực đối với các lựa chọn chính trị trong khi phủ nhận năng lực đó đối với các quyết định kinh tế cá nhân. Các lựa chọn khác đã xuyên tạc mâu thuẫn thực sự bằng cách đề xuất các phạm vi năng lực khác nhau thay vì sự mâu thuẫn cơ bản về khả năng ra quyết định của cùng một cá nhân.
question: Mis tekitab demokraatliku eestkostetava sofismi kohaselt kõige silmatorkavama loogilise vastuolu selles, kuidas tänapäeva poliitilised süsteemid suhtuvad kodanike pädevusse?
answer: Kodanikke peetakse ebapädevaks tegema isiklikke otsuseid, kuid pädevaks tegema kollektiivseid otsuseid kõigi jaoks demokraatliku hääletamise kaudu
wrong_answers:
  - Kodanikke peetakse majanduslike valikute tegemiseks liiga emotsionaalseteks, kuid piisavalt ratsionaalseteks poliitilisteks otsusteks, mis nõuavad suuremat objektiivsust
  - Kodanikele usaldatakse keerulisi finantsotsuseid, kuid nad vajavad juhendamist lihtsamate küsimuste, näiteks tervishoiu- ja haridusvalikute puhul
  - Kodanikke peetakse võimeliseks tegema kohalikke kogukondlikke otsuseid, kuid ebapädevaks osalema riikliku tasandi demokraatlikes protsessides
explanation: |
  Tekstis tuvastatud põhiline paradoks on see, et samadele üksikisikutele, keda peetakse võimetuks end igapäevaelus isiklike valikute kaudu valitsema, usaldatakse samal ajal kogu kollektiivi valitsemine demokraatlike mehhanismide kaudu. See vastuolu on eriti silmatorkav, sest poliitilised valikud on oma olemuselt keerulisemad kui isiklikud majanduslikud otsused, kuid süsteem eeldab pädevust esimeste puhul, kuid eitab seda viimaste puhul. Teised valikud moonutavad tegelikku vastuolu, viidates pigem erinevatele pädevussfääridele kui põhimõttelisele vastuolule samade üksikisikute otsustusvõime osas.
question: De acordo com o sofisma da tutela democrática, o que é que cria a inconsistência lógica mais marcante na forma como os sistemas políticos contemporâneos encaram a competência dos cidadãos?
answer: Os cidadãos são considerados incompetentes para tomar decisões pessoais, mas competentes para tomar decisões colectivas para todos através do voto democrático
wrong_answers:
  - Os cidadãos são considerados demasiado emotivos para as escolhas económicas, mas suficientemente racionais para as decisões políticas que exigem maior objetividade
  - Os cidadãos são responsáveis por decisões financeiras complexas, mas necessitam de orientação em questões mais simples, como as escolhas em matéria de cuidados de saúde e educação
  - Os cidadãos são considerados capazes de tomar decisões a nível da comunidade local, mas incompetentes para participar em processos democráticos a nível nacional
explanation: |
  O paradoxo central identificado no texto é que os mesmos indivíduos que são considerados incapazes de se governarem a si próprios na vida quotidiana através de escolhas pessoais são simultaneamente considerados capazes de governar todo o coletivo através de mecanismos democráticos. Esta contradição é particularmente notória porque as escolhas políticas são inerentemente mais complexas do que as decisões económicas pessoais, mas o sistema assume a competência para as primeiras e nega-a para as segundas. As outras opções deturpam a contradição real, sugerindo diferentes esferas de competência, em vez da inconsistência fundamental sobre a capacidade de decisão dos mesmos indivíduos.
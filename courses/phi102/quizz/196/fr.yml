question: Selon le sophisme de la tutelle démocratique, quelle est l'incohérence logique la plus frappante dans la manière dont les systèmes politiques contemporains considèrent la compétence des citoyens ?
answer: Les citoyens sont jugés incapables de prendre des décisions personnelles, mais compétents pour prendre des décisions collectives au nom de tous par le biais du vote démocratique
wrong_answers:
  - Les citoyens sont considérés comme trop émotifs pour les choix économiques, mais suffisamment rationnels pour les décisions politiques qui requièrent une plus grande objectivité
  - Les citoyens se voient confier des décisions financières complexes mais ont besoin d'être guidés pour des questions plus simples telles que les choix en matière de soins de santé et d'éducation
  - Les citoyens sont jugés capables de prendre des décisions au niveau local, mais incapables de participer aux processus démocratiques au niveau national
explanation: |
  Le paradoxe central identifié dans le texte est que les mêmes individus qui sont considérés comme incapables de se gouverner eux-mêmes dans la vie quotidienne par le biais de choix personnels sont en même temps considérés comme capables de gouverner l'ensemble de la collectivité par le biais de mécanismes démocratiques. Cette contradiction est particulièrement frappante parce que les choix politiques sont intrinsèquement plus complexes que les décisions économiques personnelles, et pourtant le système suppose la compétence pour les premiers tout en la refusant pour les seconds. Les autres options déforment la contradiction réelle en suggérant des sphères de compétence différentes plutôt que l'incohérence fondamentale concernant la capacité de prise de décision des mêmes individus.
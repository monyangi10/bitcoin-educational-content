question: Menurut sofisme pengawasan demokratis, apa yang menciptakan ketidakkonsistenan logis yang paling mencolok dalam bagaimana sistem politik kontemporer memandang kompetensi warga negara?
answer: Warga negara dianggap tidak kompeten untuk membuat keputusan pribadi, tetapi kompeten untuk membuat keputusan kolektif untuk semua orang melalui pemungutan suara yang demokratis
wrong_answers:
  - Warga negara dianggap terlalu emosional untuk pilihan ekonomi, tetapi cukup rasional untuk keputusan politik yang membutuhkan objektivitas yang lebih besar
  - Warga negara dipercaya untuk membuat keputusan keuangan yang rumit, tetapi membutuhkan panduan untuk hal-hal yang lebih sederhana seperti pilihan perawatan kesehatan dan pendidikan
  - Warga negara dianggap mampu mengambil keputusan di tingkat lokal tetapi tidak kompeten untuk berpartisipasi dalam proses demokrasi di tingkat nasional
explanation: |
  Paradoks utama yang diidentifikasi dalam teks ini adalah bahwa individu yang sama yang dianggap tidak mampu mengatur diri mereka sendiri dalam kehidupan sehari-hari melalui pilihan pribadi secara bersamaan dipercaya untuk mengatur seluruh kolektif melalui mekanisme demokrasi. Kontradiksi ini sangat mencolok karena pilihan politik pada dasarnya lebih kompleks daripada keputusan ekonomi pribadi, namun sistem mengasumsikan kompetensi untuk yang pertama dan menolaknya untuk yang kedua. Pilihan-pilihan lain salah menggambarkan kontradiksi yang sebenarnya dengan menyarankan lingkup kompetensi yang berbeda daripada ketidakkonsistenan mendasar tentang kapasitas pengambilan keputusan individu yang sama.
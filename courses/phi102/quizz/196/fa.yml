question: بر اساس سفسطه قیمومیت دموکراتیک، چه چیزی بیشترین ناسازگاری منطقی را در نحوه دیدگاه سیستم‌های سیاسی معاصر نسبت به شایستگی شهروندان ایجاد می‌کند؟
answer: شهروندان برای گرفتن تصمیمات شخصی ناتوان تلقی می‌شوند اما برای گرفتن تصمیمات جمعی برای همه از طریق رأی‌گیری دموکراتیک توانمند هستند.
wrong_answers:
  - شهروندان برای انتخاب‌های اقتصادی بیش از حد احساسی در نظر گرفته می‌شوند، اما برای تصمیمات سیاسی که نیاز به عینیت بیشتری دارند، به اندازه کافی منطقی تلقی می‌شوند.
  - شهروندان به تصمیمات مالی پیچیده اعتماد دارند اما برای مسائل ساده‌تری مانند انتخاب‌های بهداشتی و آموزشی نیاز به راهنمایی دارند.
  - شهروندان قادر به تصمیم‌گیری در جامعه محلی تلقی می‌شوند اما برای مشارکت در فرآیندهای دموکراتیک در سطح ملی ناتوان محسوب می‌شوند.
explanation: |
  پارادوکس اصلی که در متن شناسایی شده این است که همان افرادی که در زندگی روزمره از طریق انتخاب‌های شخصی ناتوان در اداره خود تلقی می‌شوند، همزمان به آنها اعتماد می‌شود که کل جمع را از طریق مکانیزم‌های دموکراتیک اداره کنند. این تناقض به‌ویژه چشمگیر است زیرا انتخاب‌های سیاسی ذاتاً پیچیده‌تر از تصمیمات اقتصادی شخصی هستند، با این حال سیستم برای اولی صلاحیت فرض می‌کند در حالی که برای دومی آن را انکار می‌کند. گزینه‌های دیگر تناقض واقعی را با پیشنهاد حوزه‌های مختلف صلاحیت نادرست نشان می‌دهند، به جای ناسازگاری اساسی در مورد ظرفیت تصمیم‌گیری همان افراد.
question: Dushingiye ku buhinga bwa demokarasi, ni igiki gituma habaho ukudahuza gukomeye cane mu buryo ubutegetsi bwa politike bwo muri iki gihe bubona ubushobozi bw’abanyagihugu?
answer: Abanyagihugu babonwa ko badashobora gufata ingingo z’umuntu ku giti ciwe ariko bafise ubushobozi bwo gufata ingingo rusangi ku muntu wese biciye mu matora ya demokarasi .
wrong_answers:
  - Abanyagihugu babonwa ko bafise inyiyumvo nyinshi cane ku mahitamwo y’ubutunzi ariko bafise ivyiyumviro bihagije ku ngingo za politike zisaba ko umuntu agira intumbero nyinshi .
  - Abanyagihugu barizigirwa mu ngingo zikomeye z’ivy’amahera ariko basaba ubuyobozi ku bintu vyoroshe nk’ubuvuzi n’amahitamwo y’uburezi .
  - Abanyagihugu babonwa ko bashoboye gufata ingingo z'abanyagihugu ariko ntibashobora kugira uruhara mu migenderanire ya demokarasi ku rwego rw'igihugu .
explanation: |
  Ikintu nyamukuru giteye ubwoba kigaragazwa muri ico canditswe ni uko abo bantu nyene babonwa ko badashobora kwitegeka mu buzima bwa misi yose biciye mu mahitamwo yabo bwite, ari bo bizigirwa icarimwe gutwara igihugu cose biciye mu buryo bwa demokarasi. Ivyo bivuguruzanya biratangaje cane kubera ko amahitamwo ya politike ari ay’agaciro kuruta ingingo z’ubutunzi z’umuntu ku giti ciwe, yamara rero iyo nzira ifata ubushobozi ku vya mbere mu gihe ivyihakana ku vya nyuma. Ayandi mahitamwo agaragaza nabi ukuvuguruzanya nyakuri mu gutanga ivyiyumviro vy’inzego zitandukanye z’ubushobozi aho gutanga ivyiyumviro vy’ukudahuza kw’ishimikiro ku bijanye n’ubushobozi bw’abantu bamwebamwe bwo gufata ingingo.
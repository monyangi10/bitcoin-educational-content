question: 民主主義の教育詭弁によれば、現代の政治制度が市民の能力をどのように見ているのかについて、最も顕著な論理的矛盾を生み出しているのは何か。
answer: 市民は個人的な決定を下すことはできないが、民主的な投票を通じて皆のために集団的な決定を下すことはできるとみなされる。
wrong_answers:
  - 市民は経済的な選択には感情的すぎるが、より客観性を必要とする政治的な決定には十分合理的であると考えられている。
  - 市民は複雑な金銭的決定については信頼されているが、医療や教育の選択のような単純な問題については指導を必要としている。
  - 市民は地域社会の意思決定には有能だが、国家レベルの民主的プロセスには参加できないとみなされる。
explanation: |
  本文で指摘されている核心的なパラドックスは、個人的な選択を通じて日常生活で自分自身を統治することができないと考えられている同じ個人が、同時に民主的メカニズムを通じて集団全体を統治することを信頼されているということである。この矛盾が特に顕著なのは、政治的選択は本来、個人的な経済的決定よりも複雑であるにもかかわらず、制度は前者の能力を前提とする一方で、後者の能力を否定しているからである。他の選択肢は、同じ個人の意思決定能力に関する根本的な矛盾ではなく、異なる能力領域を示唆することで、実際の矛盾を誤魔化している。
question: Co ilustruje příklad majitele nemovitosti, který chce přemalovat svůj dům, o moderních vlastnických právech v rámci rozsáhlých regulací?
answer: Vlastník se stal pouhým uživatelem, zatímco kolektivní vlastník fakticky vlastní majetek
wrong_answers:
  - Vlastník si zachovává plná vlastnická práva, ale musí dodržovat přiměřené estetické zásady
  - Stát poskytuje užitečné pokyny k zajištění stabilní hodnoty nemovitostí v obci
  - Individuální vlastnická práva jsou posílena kolektivním dohledem a demokratickými procesy
explanation: |
  Podle analýzy Gustava de Molinariho uvedené v textu vlastník nemovitosti, který zjistí, že se nemůže svobodně rozhodnout, zda svůj dům přemaluje, odhaluje, že již není skutečným vlastníkem, ale stal se pouhým uživatelem - někým s právem dočasného užívání. Skutečné vlastnictví fakticky přešlo na stát nebo kolektiv, který nyní diktuje, jak může být nemovitost využívána. To ilustruje, jak rozsáhlé regulace představují formu vyvlastnění, kdy se jednotlivci domnívají, že vlastní majetek, ale ve skutečnosti mají pouze omezená práva na užívání pod kontrolou státu.
question: Evini yeniden boyamak isteyen bir mülk sahibi örneği, kapsamlı düzenlemeler altındaki modern mülkiyet hakları hakkında neyi göstermektedir?
answer: Mal sahibi yalnızca bir intifa hakkı sahibi haline gelirken, kolektif mülkün fiilen sahibi olmuştur
wrong_answers:
  - Mal sahibi tüm mülkiyet haklarını korur ancak makul estetik kurallara uymak zorundadır
  - Eyalet, toplumda mülk değerlerinin sabit kalmasını sağlamak için yardımcı rehberlik sağlar
  - Bireysel mülkiyet hakları, kolektif gözetim ve demokratik süreçler yoluyla güçlendirilir
explanation: |
  Gustave de Molinari'nin metinde sunulan analizine göre, evini yeniden boyamayı özgürce seçemeyeceğini keşfeden mülk sahibi, artık gerçekten mülk sahibi olmadığını, yalnızca geçici kullanım haklarına sahip bir intifa hakkı sahibi haline geldiğini ortaya koymaktadır. Gerçek mülkiyet, artık mülkün nasıl kullanılacağını dikte eden devlete ya da kolektife geçmiştir. Bu durum, kapsamlı düzenlemelerin, bireylerin mülk sahibi olduklarına inandıkları ancak aslında devlet kontrolü altında yalnızca sınırlı kullanım haklarına sahip oldukları bir mülksüzleştirme biçimini nasıl oluşturduğunu göstermektedir.
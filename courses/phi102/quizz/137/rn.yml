question: Akarorero k’umuntu afise umutungo yipfuza gusubira gusigira inzu yiwe karerekana iki ku bijanye n’uburenganzira bwo gutunga umutungo bwo muri iki gihe bushingiye ku mategeko menshi?
answer: Uwufise umutungo yacitse umunyagihugu gusa mu gihe umugwi w’abantu bose ari wo ufise umutungo .
wrong_answers:
  - Nyir'umutungo aragumya uburenganzira bwose bw'umutungo ariko ategerezwa gukurikiza amabwirizwa y'ubwiza
  - Leta itanga ubuyobozi bufasha kugira ngo agaciro k'itunga kagume gashikamye mu kibano .
  - Uburenganzira bw'umuntu ku giti ciwe burakomezwa biciye mu kugenzura rusangi no mu nzira za demokarasi .
explanation: |
  Dushingiye ku nseguro ya Gustave de Molinari yashikirijwe muri ico canditswe, nyen’itongo abonye ko adashobora guhitamwo mu mwidegemvyo gusubira gusiga inzu yiwe, ahishura ko atagifise vy’ukuri nyen’itongo ahubwo ko yacitse gusa umunyagihugu - umuntu afise uburenganzira bwo gukoresha inzu mu gihe gito. Ubutunzi nyabwo bwaciye buja kuri Leta canke ku gisata rusangi, ubu kikaba ari co kigena ingene uwo mutungo ushobora gukoreshwa. Ivyo vyerekana ingene amategeko yagutse ari uburyo bwo kwigarurira aho abantu bizera ko bafise umutungo ariko mu vy’ukuri bafise uburenganzira buke bwo gukoresha umutungo ugenzurwa na Leta.
question: 一位業主想要重新粉刷他的房子，這個例子說明了廣泛法規下的現代財產權是什麼？
answer: 所有者僅成為用益權人，而集體實際擁有該財產
wrong_answers:
  - 業主維持完整的財產權，但必須遵循合理的美學準則
  - 州政府提供有用的指導，以確保社區內的財產價值保持穩定
  - 透過集體監督和民主程序強化個人財產權
explanation: |
  根據 Gustave de Molinari 在文中提出的分析，業主若發現他無法自由選擇重新粉刷他的房子，就顯示他不再是真正的業主，而只是一個用益物主 - 一個擁有臨時使用權的人。真正的所有權實際上已經轉移給國家或集體，由他們來決定如何使用財產。這說明了廣泛的法規如何構成一種剝奪，個人相信他們擁有財產，但實際上在國家控制下只擁有有限的使用權。
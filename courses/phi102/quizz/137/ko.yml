question: 집을 다시 칠하고 싶어하는 집주인의 사례는 광범위한 규제에 따른 현대의 재산권에 대해 무엇을 설명하나요?
answer: 소유자는 단지 사용권자에 불과한 반면, 단체는 실질적으로 부동산을 소유하고 있습니다
wrong_answers:
  - 소유자는 모든 재산권을 보유하지만 합리적인 미적 가이드라인을 따라야 합니다
  - 주정부는 커뮤니티에서 부동산 가치가 안정적으로 유지될 수 있도록 유용한 지침을 제공합니다
  - 집단적 감독과 민주적 절차를 통해 개인의 재산권을 강화합니다
explanation: |
  본문에 제시된 구스타브 드 몰리나리의 분석에 따르면, 자신의 집을 자유롭게 다시 칠할 수 없다는 사실을 알게 된 부동산 소유자는 더 이상 진정한 소유주가 아니라 일시적인 사용권을 가진 사용권자에 불과한 존재가 되었습니다. 실제 소유권은 사실상 국가나 단체로 이전되었고, 이제 국가나 단체가 부동산의 사용 방법을 결정하게 됩니다. 이는 광범위한 규제가 개인이 재산을 소유하고 있다고 믿지만 실제로는 국가의 통제 하에 제한된 사용권만 소유하는 일종의 소유권 박탈을 구성하는 방법을 보여줍니다.
question: Mitä esimerkki kiinteistönomistajasta, joka haluaa maalata talonsa uudelleen, kuvaa nykyaikaisista omistusoikeuksista laajojen säännösten puitteissa?
answer: Omistajasta on tullut pelkkä käyttöoikeuden haltija, kun taas kollektiivi tosiasiallisesti omistaa omaisuuden
wrong_answers:
  - Omistajalla on täydet omistusoikeudet, mutta hänen on noudatettava kohtuullisia esteettisiä ohjeita
  - Valtio antaa hyödyllisiä ohjeita, joilla varmistetaan, että kiinteistöjen arvot pysyvät yhteisössä vakaina
  - Yksilön omistusoikeuksia vahvistetaan kollektiivisen valvonnan ja demokraattisten prosessien avulla
explanation: |
  Tekstissä esitetyn Gustave de Molinarin analyysin mukaan kiinteistönomistaja, joka huomaa, ettei hän voi vapaasti valita talonsa uudelleenmaalausta, paljastaa, ettei hän ole enää todellinen omistaja vaan pelkkä käyttöoikeuden haltija - joku, jolla on tilapäinen käyttöoikeus. Todellinen omistusoikeus on tosiasiassa siirtynyt valtiolle tai kollektiiville, joka nyt sanelee, miten omaisuutta voidaan käyttää. Tämä havainnollistaa, miten laajat säädökset muodostavat eräänlaisen pakkolunastuksen, jossa yksilöt luulevat omistavansa omaisuutta, mutta tosiasiassa heillä on vain rajoitetut käyttöoikeudet valtion valvonnassa.
question: Ni ibihe bintu bitatu vy’ingenzi bisabwa kugira ngo umusaruro w’ubutunzi ubeho hakurikijwe inyigisho y’ubutunzi bw’ubwigenge?
answer: Umwidegemvyo wo guhitamwo uburyo n’intumbero, uburenganzira bw’umutungo n’ibikoresho, n’umutekano ku bugizi bwa nabi canke ubusuma .
wrong_answers:
  - Itegeko rya Leta ry’amasoko, Leta ifise uburyo bwo gukora, n’igenamigambi ry’ubutunzi ry’abantu bose
  - Kuronka ubutunzi, kuronka abakozi bafise ubuhinga, no gutera imbere mu vy’ubuhinga bwo guhingura ibintu .
  - Ivyo abaguzi basaba ku bicuruzwa, ukuboneka kw'ishoramari, n'imiterere y'isoko ry'amahiganwa
explanation: |
  Ico gice kiradondora neza ibintu bitatu vy’ishimikiro bikenewe kugira ngo umuntu ashobore gukora: ica mbere, umwidegemvyo wo guhitamwo neza uburyo n’intumbero (bisaba kwitunga no gufata ingingo zishingiye ku vyiyumviro); ica kabiri, uburenganzira bwo kuronka ibintu, ibikoresho n’umubiri wiwe bwite (kubera ko ata muntu afise uburenganzira bwo kubitunga, ntaco bimaze gukora); n’ica gatatu, umutekano w’ubukazi, ugutera ubwoba n’ubusuma (atavyo nta mugambi wo gukora ibintu ushobora gushingwa). Ayandi mahitamwo adondora uburyo bugenzurwa na Leta buvuguruza inyigisho y’ubwigenge, canke ibintu vy’ubutunzi bihambaye ariko bitari ivy’ishimikiro vyavuzwe muri iyi nzira.
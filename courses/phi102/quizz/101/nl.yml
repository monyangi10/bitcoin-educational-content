question: Wat zijn de drie essentiële voorwaarden voor economische productie volgens de liberale economische theorie?
answer: Vrije keuze van middelen en doelen, eigendomsrechten over middelen en gereedschappen, en bescherming tegen geweld of diefstal
wrong_answers:
  - Overheidsregulering van markten, staatseigendom van productiemiddelen en gecentraliseerde economische planning
  - Toegang tot natuurlijke hulpbronnen, beschikbaarheid van geschoolde arbeidskrachten en technologische vooruitgang in de productie
  - Consumentenvraag naar goederen, beschikbaarheid van kapitaalinvesteringen en concurrerende marktstructuren
explanation: |
  Het hoofdstuk schetst duidelijk drie fundamentele voorwaarden voor productie: ten eerste, de vrijheid om de juiste keuzes te maken over middelen en doelen (wat zelfeigenaarschap en rationele besluitvorming vereist); ten tweede, eigendomsrechten over spullen, gereedschap en het eigen lichaam (want zonder eigendom is productie onmogelijk); en ten derde, veiligheid tegen geweld, bedreigingen en diefstal (zonder welke geen levensvatbaar productieproject kan worden opgezet). De andere opties beschrijven ofwel door de staat gecontroleerde systemen die in tegenspraak zijn met de liberale theorie, of economische factoren die belangrijk zijn maar niet de basisvoorwaarden die in dit raamwerk besproken worden.
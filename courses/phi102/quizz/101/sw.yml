question: Ni masharti gani matatu muhimu yanayohitajika ili uzalishaji wa kiuchumi utokee kulingana na nadharia ya uchumi huria?
answer: Uhuru wa kuchagua kwa njia na malengo, haki za kumiliki mali kuhusu rasilimali na vifaa, na usalama dhidi ya vurugu au wizi
wrong_answers:
  - Udhibiti wa serikali wa masoko, umiliki wa serikali wa njia za uzalishaji, na mipango ya uchumi ya kati
  - Upatikanaji wa rasilimali asilia, upatikanaji wa wafanyakazi wenye ujuzi, na maendeleo ya kiteknolojia katika utengenezaji
  - Mahitaji ya watumiaji wa bidhaa, upatikanaji wa uwekezaji wa mitaji, na miundo ya soko yenye ushindani
explanation: |
  Sura hiyo inaelezea wazi masharti matatu ya msingi ya uzalishaji: kwanza, uhuru wa kufanya maamuzi sahihi kuhusu njia na malengo (yanayohitaji umiliki binafsi na kufanya maamuzi ya busara); pili, haki za mali juu ya vitu, zana, na mwili wa mtu mwenyewe (kwa kuwa bila umiliki, uzalishaji hauwezekani); na tatu, usalama dhidi ya vurugu, vitisho, na wizi (ambavyo bila hivyo hakuna mradi mzuri wa uzalishaji unaoweza kuanzishwa). Chaguzi zingine zinaelezea ama mifumo inayodhibitiwa na serikali ambayo inapingana na nadharia ya kiliberali, au mambo ya kiuchumi ambayo ni muhimu lakini si masharti ya msingi yanayojadiliwa katika mfumo huu.
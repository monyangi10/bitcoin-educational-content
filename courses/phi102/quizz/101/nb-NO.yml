question: Hva er de tre viktigste forutsetningene for at økonomisk produksjon skal finne sted ifølge liberal økonomisk teori?
answer: Frihet til å velge midler og mål, eiendomsrett til ressurser og verktøy, og sikkerhet mot vold og tyveri
wrong_answers:
  - Statlig regulering av markeder, statlig eierskap av produksjonsmidler og sentralisert økonomisk planlegging
  - Tilgang til naturressurser, tilgang på kvalifisert arbeidskraft og teknologiske fremskritt innen produksjon
  - Forbrukernes etterspørsel etter varer, tilgang på kapitalinvesteringer og konkurransedyktige markedsstrukturer
explanation: |
  Kapitlet skisserer tydelig tre grunnleggende forutsetninger for produksjon: for det første friheten til å foreta hensiktsmessige valg av midler og mål (noe som krever selveierskap og rasjonell beslutningstaking), for det andre eiendomsrett til ting, verktøy og egen kropp (for uten eiendomsrett er produksjon umulig), og for det tredje sikkerhet mot vold, trusler og tyveri (uten dette kan ikke et levedyktig produksjonsprosjekt etableres). De andre alternativene beskriver enten statskontrollerte systemer som strider mot liberal teori, eller økonomiske faktorer som er viktige, men som ikke er de grunnleggende betingelsene som diskuteres i dette rammeverket.
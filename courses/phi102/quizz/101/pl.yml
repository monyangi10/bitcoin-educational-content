question: Jakie są trzy podstawowe warunki wymagane do zaistnienia produkcji ekonomicznej zgodnie z liberalną teorią ekonomiczną?
answer: Wolność wyboru środków i celów, prawa własności do zasobów i narzędzi oraz bezpieczeństwo przed przemocą lub kradzieżą
wrong_answers:
  - Rządowa regulacja rynków, państwowa własność środków produkcji i scentralizowane planowanie gospodarcze
  - Dostęp do zasobów naturalnych, dostępność wykwalifikowanej siły roboczej i postęp technologiczny w produkcji
  - Popyt konsumentów na towary, dostępność inwestycji kapitałowych i konkurencyjne struktury rynkowe
explanation: |
  Rozdział ten jasno określa trzy podstawowe warunki produkcji: po pierwsze, wolność dokonywania właściwych wyborów dotyczących środków i celów (wymagająca samo-własności i racjonalnego podejmowania decyzji); po drugie, prawa własności do rzeczy, narzędzi i własnego ciała (ponieważ bez własności produkcja jest niemożliwa); i po trzecie, bezpieczeństwo przed przemocą, groźbami i kradzieżą (bez którego nie można ustanowić żadnego opłacalnego projektu produkcyjnego). Pozostałe opcje opisują albo systemy kontrolowane przez państwo, które są sprzeczne z teorią liberalną, albo czynniki ekonomiczne, które są ważne, ale nie są podstawowymi warunkami omawianymi w tych ramach.
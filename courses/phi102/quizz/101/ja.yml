question: 自由主義経済理論によれば、経済生産に必要な3つの必須条件とは何か？
answer: 手段と目的の選択の自由、資源と道具の所有権、暴力や盗難からの安全保障
wrong_answers:
  - 政府による市場の規制、生産手段の国家所有、中央集権的な経済計画
  - 天然資源へのアクセス、熟練労働者の確保、製造業の技術進歩
  - 消費者の商品需要、設備投資の可能性、競争的な市場構造
explanation: |
  第一に、手段と目的について適切な選択をする自由（自己所有と合理的な意思決定を必要とする）、第二に、物、道具、自分の身体に対する所有権（所有権がなければ生産は不可能だから）、第三に、暴力、脅迫、盗難からの安全（これがなければ、実行可能な生産プロジェクトは成立しない）。その他の選択肢は、自由主義理論と矛盾する国家統制システムか、重要ではあるがこの枠組みで議論される基礎条件ではない経済的要因について述べている。
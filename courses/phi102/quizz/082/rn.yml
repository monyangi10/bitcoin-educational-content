question: Dushingiye ku nseguro y’amateka, ni igiki nyamukuru catuma umutungo w’abantu ku giti cabo udahuye n’imibano ya kera?
answer: Ibikorwa vyo kwibeshaho nk'uguhiga vyasaba amatongo manini manini adashobora kuba ay'abantu ku giti cabo .
wrong_answers:
  - Ivyizerwa vy'idini vyabujije umuntu ku giti ciwe kuba uwufise ubutaka n'ubutunzi bw'ibidukikije
  - Abarongozi ba politike barabujije n’ibigirankana ivy’abantu ku giti cabo kugira ngo bagume bafise ububasha bwose
  - Ubuhinga bwa none bwatumye bidashoboka gushiramwo ikimenyetso no kurwanira imbibe z'itongo .
explanation: |
  Ico canditswe kirasigura mu buryo budasanzwe yuko mu mibano ya kera, ivy’ukubaho, canecane uguhiga, vyasaba ko umuntu agira uturere twinshi cane tudahuye n’itunga ry’abantu ku giti cabo. Ivyo vyari inzitizi y’imibumbe ishingiye ku vyo umuntu akeneye kugira ngo ashobore kurokoka aho gushingiye ku vyiyumviro, ku vya politike canke ku buhinga bwa none. Ibindi bihitamwo, naho bishobora kwemerwa mu bihe bimwebimwe vy’amateka, ntibishigikirwa n’isesengura ry’ico kigabane, ryibanda ku ngorane z’ubutunzi n’ibikorwa aho kwibanda ku ngorane z’idini, ku kugenzura politike n’ibigirankana, canke ku mipaka y’ugushira ibimenyetso mu vy’ubuhinga.
question: Co bylo podle historické analýzy hlavním důvodem, proč bylo soukromé vlastnictví neslučitelné se starověkými společnostmi?
answer: Živobytí, jako je lov, vyžadovalo rozsáhlá území, která nemohla být v soukromém vlastnictví
wrong_answers:
  - Náboženské přesvědčení zakazovalo individuální vlastnictví půdy a přírodních zdrojů
  - Političtí vůdci záměrně zabránili soukromému vlastnictví, aby si udrželi absolutní kontrolu
  - Technologická omezení znemožnila označit a chránit hranice pozemků
explanation: |
  Text konkrétně vysvětluje, že v primitivních společnostech vyžadovaly podmínky obživy, zejména lov, rozsáhlá území, která byla neslučitelná se soukromým vlastnictvím. Jednalo se o strukturální omezení vycházející z potřeb přežití, nikoli z ideologických, politických nebo technologických faktorů. Ostatní možnosti, ačkoli jsou v některých historických souvislostech potenciálně pravděpodobné, nejsou podpořeny analýzou kapitoly, která se zaměřuje spíše na ekonomická a praktická omezení než na náboženské zákazy, záměrnou politickou kontrolu nebo technologická omezení označování.
question: Secondo l'analisi storica, qual era la ragione principale per cui la proprietà privata era incompatibile con le società antiche?
answer: Le attività di sussistenza, come la caccia, richiedevano vasti territori che non potevano essere di proprietà privata
wrong_answers:
  - Le credenze religiose proibivano la proprietà individuale della terra e delle risorse naturali
  - I leader politici hanno deliberatamente impedito la proprietà privata per mantenere il controllo assoluto
  - Le limitazioni tecnologiche rendevano impossibile segnare e difendere i confini delle proprietà
explanation: |
  Il testo spiega in particolare che nelle società primitive le condizioni di sussistenza, in particolare la caccia, richiedevano vasti territori incompatibili con la proprietà privata. Si trattava di un vincolo strutturale basato su esigenze di sopravvivenza piuttosto che su fattori ideologici, politici o tecnologici. Le altre opzioni, pur essendo potenzialmente plausibili in alcuni contesti storici, non sono supportate dall'analisi del capitolo, che si concentra su vincoli economici e pratici piuttosto che su divieti religiosi, controllo politico deliberato o limitazioni tecnologiche.
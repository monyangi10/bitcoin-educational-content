question: 根據歷史分析，私有財產與古代社會不相容的主要原因是什麼？
answer: 狩獵等謀生活動需要廣大的領土，而這些領土不可能歸私人所有。
wrong_answers:
  - 宗教信仰禁止個人擁有土地和自然資源
  - 政治領袖刻意阻止私有財產，以維持絕對控制
  - 技術上的限制使得無法標示和保護財產邊界
explanation: |
  文中特別說明，在原始社會中，謀生的條件，特別是狩獵，需要廣大的領土，而這些領土與私有財產是不相容的。這是基於生存需要的結構性限制，而非意識形態、政治或科技因素。其他的選項雖然在某些歷史背景下可能是合理的，但本章的分析並不支持這些選項，本章的分析著重於經濟與實際的限制，而非宗教禁令、刻意的政治控制或技術標記的限制。
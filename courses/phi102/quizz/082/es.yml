question: Según el análisis histórico, ¿cuál era la razón principal por la que la propiedad privada era incompatible con las sociedades antiguas?
answer: Las actividades de subsistencia, como la caza, requerían vastos territorios que no podían ser propiedad privada
wrong_answers:
  - Las creencias religiosas prohibían la propiedad individual de la tierra y los recursos naturales
  - Los dirigentes políticos impidieron deliberadamente la propiedad privada para mantener el control absoluto
  - Las limitaciones tecnológicas hacían imposible marcar y defender los límites de las propiedades
explanation: |
  El texto explica concretamente que, en las sociedades primitivas, las condiciones de subsistencia, en particular la caza, exigían vastos territorios incompatibles con la propiedad privada. Se trataba de una limitación estructural basada en las necesidades de supervivencia más que en factores ideológicos, políticos o tecnológicos. Las otras opciones, aunque potencialmente plausibles en algunos contextos históricos, no se ven respaldadas por el análisis del capítulo, que se centra en las limitaciones económicas y prácticas más que en las prohibiciones religiosas, el control político deliberado o las limitaciones de marcado tecnológico.
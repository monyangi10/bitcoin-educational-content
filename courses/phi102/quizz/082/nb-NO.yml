question: Hva var, ifølge den historiske analysen, den viktigste grunnen til at privat eiendom var uforenlig med antikkens samfunn?
answer: Subsistensaktiviteter som jakt krevde store territorier som ikke kunne eies av private
wrong_answers:
  - Religiøs tro forbød individuell eiendomsrett til land og naturressurser
  - Politiske ledere forhindret bevisst privat eiendom for å opprettholde absolutt kontroll
  - Teknologiske begrensninger gjorde det umulig å markere og forsvare eiendomsgrenser
explanation: |
  Teksten forklarer spesifikt at i primitive samfunn krevde livsgrunnlaget, særlig jakt, store territorier som var uforenlige med privat eiendom. Dette var en strukturell begrensning basert på overlevelsesbehov snarere enn ideologiske, politiske eller teknologiske faktorer. De andre alternativene, selv om de kan være plausible i noen historiske sammenhenger, støttes ikke av kapitlets analyse, som fokuserer på økonomiske og praktiske begrensninger snarere enn religiøse forbud, bevisst politisk kontroll eller teknologiske markeringsbegrensninger.
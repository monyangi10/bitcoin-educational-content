question: Theo phân tích lịch sử, lý do chính khiến chế độ sở hữu tư nhân không phù hợp với các xã hội cổ đại là gì?
answer: Các hoạt động sinh kế như săn bắn đòi hỏi những vùng lãnh thổ rộng lớn mà tư nhân không thể sở hữu.
wrong_answers:
  - Các tín ngưỡng tôn giáo cấm sở hữu cá nhân đất đai và tài nguyên thiên nhiên.
  - Các nhà lãnh đạo chính trị cố tình ngăn cản quyền sở hữu tư nhân để duy trì quyền kiểm soát tuyệt đối.
  - Những hạn chế về công nghệ đã khiến việc đánh dấu và bảo vệ ranh giới tài sản trở nên bất khả thi.
explanation: |
  Văn bản giải thích cụ thể rằng trong các xã hội nguyên thủy, điều kiện sinh tồn, đặc biệt là săn bắn, đòi hỏi những vùng lãnh thổ rộng lớn không tương thích với chế độ sở hữu tư nhân. Đây là một hạn chế về cấu trúc dựa trên nhu cầu sinh tồn chứ không phải do các yếu tố ý thức hệ, chính trị hay công nghệ. Các lựa chọn khác, mặc dù có thể hợp lý trong một số bối cảnh lịch sử, nhưng không được phân tích trong chương này ủng hộ, vì nó tập trung vào các hạn chế về kinh tế và thực tiễn hơn là các lệnh cấm tôn giáo, sự kiểm soát chính trị có chủ đích hoặc các hạn chế về mặt công nghệ.
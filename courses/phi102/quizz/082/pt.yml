question: De acordo com a análise histórica, qual era a principal razão pela qual a propriedade privada era incompatível com as sociedades antigas?
answer: As actividades de subsistência, como a caça, exigiam vastos territórios que não podiam ser propriedade privada
wrong_answers:
  - As crenças religiosas proibiam a propriedade individual da terra e dos recursos naturais
  - Os líderes políticos impediram deliberadamente a propriedade privada para manter o controlo absoluto
  - As limitações tecnológicas tornaram impossível a marcação e a defesa dos limites das propriedades
explanation: |
  O texto explica especificamente que, nas sociedades primitivas, as condições de subsistência, nomeadamente a caça, exigiam territórios vastos, incompatíveis com a propriedade privada. Tratava-se de um constrangimento estrutural baseado em necessidades de sobrevivência e não em factores ideológicos, políticos ou tecnológicos. As outras opções, embora potencialmente plausíveis em certos contextos históricos, não são apoiadas pela análise do capítulo, que se centra nos constrangimentos económicos e práticos e não nas proibições religiosas, no controlo político deliberado ou nas limitações da marcação tecnológica.
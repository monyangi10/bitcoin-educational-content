question: Согласно историческому анализу, какова была основная причина, по которой частная собственность была несовместима с древними обществами?
answer: Для ведения натурального хозяйства, например охоты, требовались огромные территории, которые не могли находиться в частной собственности
wrong_answers:
  - Религиозные убеждения запрещали индивидуальную собственность на землю и природные ресурсы
  - Политические лидеры намеренно препятствовали развитию частной собственности, чтобы сохранить абсолютный контроль
  - Технологические ограничения делали невозможным обозначение и защиту границ собственности
explanation: |
  В тексте специально поясняется, что в первобытных обществах условия существования, в частности охота, требовали огромных территорий, несовместимых с частной собственностью. Это было структурное ограничение, основанное на потребностях выживания, а не на идеологических, политических или технологических факторах. Другие варианты, хотя и являются потенциально правдоподобными в некоторых исторических контекстах, не поддерживаются анализом главы, который фокусируется на экономических и практических ограничениях, а не на религиозных запретах, намеренном политическом контроле или технологических ограничениях.
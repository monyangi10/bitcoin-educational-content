question: Mis oli ajaloolise analüüsi kohaselt peamine põhjus, miks eraomand oli antiikühiskondades kokkusobimatu?
answer: Elutegevused nagu jahipidamine nõudsid suuri territooriume, mis ei saanud olla eraomandis
wrong_answers:
  - Usulised tõekspidamised keelasid maa ja loodusvarade individuaalse omandiõiguse
  - Poliitilised liidrid takistasid tahtlikult eraomandit, et säilitada absoluutset kontrolli
  - Tehnoloogilised piirangud ei võimaldanud kinnistute piire tähistada ja kaitsta
explanation: |
  Tekstis selgitatakse konkreetselt, et primitiivsetes ühiskondades tingisid elatustaseme, eriti jahipidamise tingimused, suured territooriumid, mis olid eraomandiga kokkusobimatud. See oli struktuuriline piirang, mis põhines pigem ellujäämisvajadustel kui ideoloogilistel, poliitilistel või tehnoloogilistel teguritel. Kuigi teised võimalused on mõnes ajaloolises kontekstis potentsiaalselt usutavad, ei toeta neid peatüki analüüs, mis keskendub pigem majanduslikele ja praktilistele piirangutele kui religioossetele keeldudele, tahtlikule poliitilisele kontrollile või tehnoloogilistele märgistuspiirangutele.
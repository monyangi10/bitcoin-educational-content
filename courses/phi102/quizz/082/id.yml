question: Menurut analisis historis, apa alasan utama mengapa kepemilikan pribadi tidak sesuai dengan masyarakat kuno?
answer: Kegiatan subsisten seperti berburu membutuhkan wilayah yang luas yang tidak dapat dimiliki secara pribadi
wrong_answers:
  - Keyakinan agama melarang kepemilikan individu atas tanah dan sumber daya alam
  - Para pemimpin politik dengan sengaja mencegah kepemilikan pribadi untuk mempertahankan kontrol absolut
  - Keterbatasan teknologi membuat tidak mungkin untuk menandai dan mempertahankan batas-batas properti
explanation: |
  Teks tersebut secara khusus menjelaskan bahwa dalam masyarakat primitif, kondisi subsisten, khususnya perburuan, membutuhkan wilayah yang luas yang tidak sesuai dengan kepemilikan pribadi. Ini adalah kendala struktural yang didasarkan pada kebutuhan untuk bertahan hidup, bukan karena faktor ideologis, politis, atau teknologi. Opsi-opsi lain, meskipun berpotensi masuk akal dalam beberapa konteks historis, tidak didukung oleh analisis bab ini, yang berfokus pada kendala ekonomi dan praktis daripada larangan agama, kontrol politik yang disengaja, atau batasan penandaan teknologi.
question: 歴史的分析によれば、私有財産が古代社会と相容れなかった主な理由は何だったのか？
answer: 狩猟のような自給自足活動には、私有できない広大な領土が必要だった。
wrong_answers:
  - 宗教的信念により、土地や天然資源の個人所有が禁止された。
  - 政治指導者たちは、絶対的な支配を維持するために、意図的に私有財産を阻止した。
  - 技術的な限界により、土地の境界をマークして守ることが不可能になった。
explanation: |
  原始社会では、自給自足の条件、特に狩猟のために、私有財産とは相容れない広大な領土が必要であった。これはイデオロギー的、政治的、技術的な要因ではなく、生存の必要性に基づく構造的な制約であった。他の選択肢は、歴史的文脈によってはもっともらしいが、宗教的禁止、意図的な政治的統制、技術的マーキングの制限ではなく、経済的・実際的な制約に焦点を当てたこの章の分析では支持されない。
question: 역사적 분석에 따르면, 사유 재산이 고대 사회와 양립할 수 없었던 주된 이유는 무엇이었나요?
answer: 사냥과 같은 생계 활동에는 개인 소유가 불가능한 광활한 영토가 필요했습니다
wrong_answers:
  - 종교적 신념으로 인해 토지와 천연 자원에 대한 개인 소유가 금지되었습니다
  - 정치 지도자들이 절대적 통제를 유지하기 위해 의도적으로 사유 재산을 막는 행위
  - 기술적 한계로 인해 부동산 경계를 표시하고 방어하는 것이 불가능했습니다
explanation: |
  본문은 원시 사회에서 생존 조건, 특히 사냥을 위해서는 사유 재산과 양립할 수 없는 광대한 영토가 필요했다고 구체적으로 설명합니다. 이는 이념적, 정치적, 기술적 요인보다는 생존의 필요에 따른 구조적 제약이었습니다. 다른 옵션은 일부 역사적 맥락에서는 그럴듯할 수 있지만 종교적 금지, 고의적인 정치적 통제 또는 기술적 표시 제한보다는 경제적, 실용적 제약에 초점을 맞춘 이 장의 분석에서는 뒷받침되지 않습니다.
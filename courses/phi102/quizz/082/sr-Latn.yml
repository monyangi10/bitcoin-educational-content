question: Prema istorijskoj analizi, koji je bio primarni razlog zašto je privatna svojina bila nespojiva sa drevnim društvima?
answer: Aktivnosti za preživljavanje poput lova zahtevale su ogromne teritorije koje nije bilo moguće privatno posedovati.
wrong_answers:
  - Verska uverenja su zabranjivala individualno vlasništvo nad zemljom i prirodnim resursima.
  - Politički lideri su namerno sprečili privatno vlasništvo kako bi održali apsolutnu kontrolu
  - Tehnološka ograničenja onemogućila su označavanje i odbranu granica poseda
explanation: |
  Tekst posebno objašnjava da su u primitivnim društvima uslovi za opstanak, posebno lov, zahtevali ogromne teritorije koje su bile nespojive sa privatnom svojinom. Ovo je bila strukturna ograničenost zasnovana na potrebama za preživljavanjem, a ne na ideološkim, političkim ili tehnološkim faktorima. Druge opcije, iako potencijalno verodostojne u nekim istorijskim kontekstima, nisu podržane analizom poglavlja koje se fokusira na ekonomska i praktična ograničenja, a ne na verske zabrane, namernu političku kontrolu ili tehnološka ograničenja obeležavanja.
question: D'après l'analyse historique, quelle est la principale raison pour laquelle la propriété privée était incompatible avec les sociétés anciennes ?
answer: Les activités de subsistance telles que la chasse nécessitent de vastes territoires qui ne peuvent être détenus par des particuliers
wrong_answers:
  - Les croyances religieuses interdisent la propriété individuelle des terres et des ressources naturelles
  - Les dirigeants politiques ont délibérément empêché la propriété privée afin de maintenir un contrôle absolu
  - Les limites technologiques ont rendu impossible le marquage et la défense des limites de propriété
explanation: |
  Le texte explique notamment que dans les sociétés primitives, les conditions de subsistance, notamment la chasse, nécessitaient de vastes territoires incompatibles avec la propriété privée. Il s'agissait d'une contrainte structurelle basée sur des besoins de survie plutôt que sur des facteurs idéologiques, politiques ou technologiques. Les autres options, bien que potentiellement plausibles dans certains contextes historiques, ne sont pas étayées par l'analyse du chapitre, qui met l'accent sur les contraintes économiques et pratiques plutôt que sur les interdits religieux, le contrôle politique délibéré ou les limites du marquage technologique.
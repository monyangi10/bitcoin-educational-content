question: Wat was volgens de historische analyse de belangrijkste reden waarom privébezit onverenigbaar was met samenlevingen in de oudheid?
answer: Voor bestaansactiviteiten zoals jagen waren uitgestrekte gebieden nodig die niet in privébezit konden zijn
wrong_answers:
  - Religieuze overtuigingen verboden individueel eigendom van land en natuurlijke hulpbronnen
  - Politieke leiders verhinderden opzettelijk privébezit om absolute controle te behouden
  - Technologische beperkingen maakten het onmogelijk om eigendomsgrenzen te markeren en te verdedigen
explanation: |
  De tekst legt specifiek uit dat in primitieve samenlevingen de omstandigheden voor levensonderhoud, met name de jacht, uitgestrekte gebieden noodzakelijk maakten die onverenigbaar waren met privébezit. Dit was een structurele beperking die eerder gebaseerd was op overlevingsbehoeften dan op ideologische, politieke of technologische factoren. De andere opties, hoewel mogelijk plausibel in sommige historische contexten, worden niet ondersteund door de analyse van het hoofdstuk, die zich richt op economische en praktische beperkingen in plaats van religieuze verboden, opzettelijke politieke controle of technologische markeringsbeperkingen.
question: According to the historical analysis, what was the primary reason why private property was incompatible with ancient societies?
answer: Subsistence activities like hunting required vast territories that could not be privately owned
wrong_answers:
  - Religious beliefs prohibited individual ownership of land and natural resources
  - Political leaders deliberately prevented private property to maintain absolute control
  - Technological limitations made it impossible to mark and defend property boundaries
explanation: |
  The text specifically explains that in primitive societies, subsistence conditions, particularly hunting, necessitated vast territories that were incompatible with private property. This was a structural constraint based on survival needs rather than ideological, political, or technological factors. The other options, while potentially plausible in some historical contexts, are not supported by the chapter's analysis, which focuses on economic and practical constraints rather than religious prohibitions, deliberate political control, or technological marking limitations.

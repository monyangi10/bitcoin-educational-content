question: Vad var enligt den historiska analysen det främsta skälet till att privat ägande var oförenligt med antika samhällen?
answer: Aktiviteter som jakt krävde stora territorier som inte kunde vara privatägda
wrong_answers:
  - Religiös övertygelse förbjöd individuellt ägande av mark och naturresurser
  - Politiska ledare förhindrade medvetet privat egendom för att upprätthålla absolut kontroll
  - Teknologiska begränsningar gjorde det omöjligt att markera och försvara fastighetsgränser
explanation: |
  I texten förklaras särskilt att i primitiva samhällen krävde försörjningsvillkoren, särskilt jakt, stora territorier som var oförenliga med privat egendom. Detta var en strukturell begränsning som baserades på överlevnadsbehov snarare än ideologiska, politiska eller tekniska faktorer. Även om de andra alternativen kan vara rimliga i vissa historiska sammanhang, stöds de inte av kapitlets analys, som fokuserar på ekonomiska och praktiska begränsningar snarare än religiösa förbud, medveten politisk kontroll eller tekniska begränsningar.
question: 자유주의의 자유 교리에 따르면 개인의 자유를 제한하는 주된 정당성은 무엇인가요?
answer: 다른 개인의 유사한 자유와 권리를 위험으로부터 보호하기 위해
wrong_answers:
  - 개인의 관심사보다 집단 이익에 봉사하고 국가 통합을 촉진하기 위해
  - 사회 질서를 유지하고 모든 형태의 시민 불복종이나 반대를 방지하기 위해
  - 경제적 효율성을 보장하고 사회 전반의 생산성을 극대화하기 위해
explanation: |
  이 원칙은 '개인의 자유에 허용되는 유일한 제한은 타인의 자유를 보호하는 데 있다'고 명시하고 있습니다 이 원칙은 개인의 자율성이 가장 중요하지만 타인의 평등권을 침해할 경우 제약을 받아야 한다는 자유주의적 기초를 반영합니다. 오답은 구체적인 개인의 권리를 보호하기보다는 개인의 자유를 추상적인 집단적 재화에 종속시키는 집단주의, 권위주의 또는 공리주의적 접근법을 나타내며, 이 장에서는 명시적으로 거부하고 있습니다.
question: Согласно либеральной доктрине свободы, что является главным оправданием для ограничения свободы личности?
answer: Защищать аналогичные свободы и права других лиц от причинения им вреда
wrong_answers:
  - Служить коллективным интересам и способствовать национальному единству, а не индивидуальным заботам
  - Поддержание общественного порядка и предотвращение любых форм гражданского неповиновения или несогласия
  - Обеспечение экономической эффективности и максимизация общей производительности общества
explanation: |
  В тексте прямо говорится, что "единственное допустимое ограничение свободы личности заключается в защите свобод других людей" Этот принцип отражает либеральную основу, согласно которой индивидуальная автономия имеет первостепенное значение, но должна быть ограничена, если она ущемляет равные права других. Неправильные ответы представляют коллективистский, авторитарный или утилитарный подходы, которые глава прямо отвергает, поскольку они подчиняют индивидуальную свободу абстрактным коллективным благам, а не защите конкретных индивидуальных прав.
question: Según la doctrina liberal de la libertad, ¿cuál es la principal justificación para limitar la libertad individual?
answer: Proteger de daños las libertades y derechos similares de otras personas
wrong_answers:
  - Servir al interés colectivo y promover la unidad nacional por encima de las preocupaciones individuales
  - Mantener el orden social e impedir cualquier forma de desobediencia civil o disidencia
  - Garantizar la eficiencia económica y maximizar la productividad global de la sociedad
explanation: |
  El texto afirma explícitamente que "la única limitación admisible a la libertad individual reside en la protección de las libertades de los demás" Este principio refleja el fundamento liberal de que la autonomía individual es primordial, pero debe limitarse cuando atente contra la igualdad de derechos de los demás. Las respuestas erróneas representan planteamientos colectivistas, autoritarios o utilitaristas que el capítulo rechaza explícitamente, ya que subordinan la libertad individual a bienes colectivos abstractos en lugar de proteger derechos individuales concretos.
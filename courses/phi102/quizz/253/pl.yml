question: Jakie jest główne uzasadnienie ograniczania wolności jednostki zgodnie z liberalną doktryną wolności?
answer: Ochrona podobnych wolności i praw innych osób przed szkodą
wrong_answers:
  - Służyć zbiorowym interesom i promować jedność narodową ponad indywidualnymi troskami
  - Utrzymanie porządku społecznego i zapobieganie wszelkim formom obywatelskiego nieposłuszeństwa lub sprzeciwu
  - Zapewnienie efektywności ekonomicznej i maksymalizacja ogólnej produktywności społeczeństwa
explanation: |
  Tekst wyraźnie stanowi, że "jedynym dopuszczalnym ograniczeniem wolności jednostki jest ochrona wolności innych osób" Zasada ta odzwierciedla liberalny fundament, zgodnie z którym autonomia jednostki jest najważniejsza, ale musi być ograniczona, gdy narusza równe prawa innych. Błędne odpowiedzi reprezentują kolektywistyczne, autorytarne lub utylitarne podejścia, które rozdział wyraźnie odrzuca, ponieważ podporządkowują one wolność jednostki abstrakcyjnym dobrom zbiorowym, zamiast chronić konkretne prawa jednostki.
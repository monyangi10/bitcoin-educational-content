question: Kulingana na mafundisho ya uhuru wa kiliberali, ni nini sababu kuu ya kuweka mipaka ya uhuru wa mtu binafsi?
answer: Kulinda uhuru na haki sawa za watu wengine kutokana na madhara
wrong_answers:
  - Kutumikia maslahi ya pamoja na kukuza umoja wa kitaifa kuliko masuala ya mtu binafsi
  - Kudumisha utulivu wa kijamii na kuzuia aina yoyote ya uasi wa kiraia au upinzani
  - Kuhakikisha ufanisi wa kiuchumi na kuongeza tija kwa ujumla katika jamii
explanation: |
  Maandishi yanasema waziwazi kwamba 'kizuizi pekee kinachokubalika kwa uhuru wa mtu binafsi kiko katika ulinzi wa uhuru wa wengine.' Kanuni hii inaonyesha msingi wa kiliberali kwamba uhuru wa mtu binafsi ni muhimu, lakini lazima uzuiliwe wakati ungekiuka haki sawa za wengine. Majibu yasiyo sahihi yanawakilisha mbinu za pamoja, za kimabavu, au za matumizi ambazo sura hiyo inakataa waziwazi, kwani zinaweka uhuru wa mtu binafsi chini ya bidhaa za pamoja badala ya kulinda haki halisi za mtu binafsi.
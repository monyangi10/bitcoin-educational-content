question: Theo học thuyết tự do của chủ nghĩa tự do, lý do chính đáng nhất để hạn chế tự do cá nhân là gì?
answer: Để bảo vệ các quyền tự do và quyền lợi tương tự của các cá nhân khác khỏi bị tổn hại.
wrong_answers:
  - Phục vụ lợi ích tập thể và thúc đẩy sự đoàn kết dân tộc hơn là lợi ích cá nhân.
  - Nhằm duy trì trật tự xã hội và ngăn chặn mọi hình thức bất tuân dân sự hoặc phản đối.
  - Nhằm đảm bảo hiệu quả kinh tế và tối đa hóa năng suất chung của xã hội.
explanation: |
  Văn bản nêu rõ rằng "giới hạn duy nhất được chấp nhận đối với tự do cá nhân nằm ở việc bảo vệ tự do của người khác". Nguyên tắc này phản ánh nền tảng tự do rằng quyền tự chủ cá nhân là tối quan trọng, nhưng phải bị hạn chế khi nó xâm phạm đến quyền bình đẳng của người khác. Các câu trả lời sai thể hiện các quan điểm tập thể, độc đoán hoặc vị lợi mà chương này bác bỏ một cách rõ ràng, vì chúng đặt tự do cá nhân dưới sự chi phối của các lợi ích tập thể trừu tượng thay vì bảo vệ các quyền cá nhân cụ thể.
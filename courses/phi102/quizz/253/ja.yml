question: リベラルの自由の教義によれば、個人の自由を制限する主な正当化理由は何か？
answer: 他の個人の同様の自由と権利を危害から守るため
wrong_answers:
  - 集団の利益に奉仕し、個人の関心事よりも国民の団結を促進する。
  - 社会秩序を維持し、あらゆる形態の市民的不服従や反対運動を防止する。
  - 経済効率を確保し、社会全体の生産性を最大化する。
explanation: |
  この条文では、「個人の自由に対する唯一の許容される制限は、他者の自由を保護することにある」と明言されている。この原則は、個人の自律性が最優先されるが、それが他者の平等な権利を侵害する場合には制約されなければならないという自由主義の基盤を反映している。誤答は、集団主義的、権威主義的、功利主義的なアプローチを表しており、具体的な個人の権利を保護するのではなく、抽象的な集団の財に個人の自由を従属させるものであるため、この章では明確に否定している。
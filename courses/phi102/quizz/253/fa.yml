question: طبق دکترین آزادی لیبرال، چه توجیه اصلی برای محدود کردن آزادی فردی وجود دارد؟
answer: برای محافظت از آزادی‌ها و حقوق مشابه دیگر افراد از آسیب
wrong_answers:
  - برای خدمت به منافع جمعی و ترویج وحدت ملی بالاتر از نگرانی‌های فردی
  - برای حفظ نظم اجتماعی و جلوگیری از هرگونه نافرمانی مدنی یا مخالفت
  - برای اطمینان از کارایی اقتصادی و حداکثر کردن بهره‌وری کلی جامعه
explanation: |
  متن به‌طور صریح بیان می‌کند که «تنها محدودیت قابل قبول برای آزادی فردی در حفاظت از آزادی‌های دیگران نهفته است.» این اصل بازتاب‌دهنده‌ی بنیاد لیبرالی است که خودمختاری فردی را برتر می‌داند، اما باید محدود شود زمانی که به حقوق برابر دیگران تجاوز کند. پاسخ‌های نادرست نمایانگر رویکردهای جمع‌گرایانه، اقتدارگرا یا فایده‌گرا هستند که فصل به‌طور صریح آن‌ها را رد می‌کند، زیرا آزادی فردی را به کالاهای جمعی انتزاعی تابع می‌کنند به‌جای حفاظت از حقوق فردی ملموس.
question: Selon la doctrine libérale de la liberté, quelle est la principale justification de la limitation de la liberté individuelle ?
answer: Protéger les libertés et les droits similaires d'autres personnes contre les préjudices
wrong_answers:
  - Servir l'intérêt collectif et promouvoir l'unité nationale au-delà des préoccupations individuelles
  - Maintenir l'ordre social et prévenir toute forme de désobéissance civile ou de dissidence
  - Assurer l'efficacité économique et maximiser la productivité globale de la société
explanation: |
  Le texte stipule explicitement que "la seule limite admissible à la liberté individuelle réside dans la protection des libertés d'autrui" Ce principe reflète le fondement libéral selon lequel l'autonomie individuelle est primordiale, mais doit être limitée lorsqu'elle porte atteinte à l'égalité des droits d'autrui. Les mauvaises réponses représentent des approches collectivistes, autoritaires ou utilitaires que le chapitre rejette explicitement, car elles subordonnent la liberté individuelle à des biens collectifs abstraits plutôt que de protéger des droits individuels concrets.
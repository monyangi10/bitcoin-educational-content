question: En quoi le traitement par l'État démocratique des intérêts minoritaires et des générations futures contredit-il les principes démocratiques fondamentaux ?
answer: La majorité sacrifie systématiquement les droits des minorités tout en imposant des dettes aux générations futures qui n'ont pas été représentées dans ces décisions
wrong_answers:
  - L'État ne fournit pas les protections constitutionnelles adéquates mais respecte le principe de l'imposition avec représentation
  - Les intérêts des minorités sont protégés par un contrôle juridictionnel, mais les générations futures bénéficient des investissements publics hérités
  - Le système électoral garantit une représentation proportionnelle mais crée des politiques fiscales non viables pour les futurs citoyens
explanation: |
  La bonne réponse identifie la contradiction fondamentale de la démocratie : la règle de la majorité piétine naturellement les droits des minorités sans contraintes constitutionnelles suffisantes, et surtout, les générations futures héritent de dettes et d'obligations auxquelles elles n'ont jamais consenti. Cette situation viole le principe fondamental de la révolution américaine selon lequel il ne peut y avoir de taxation sans représentation. Les mauvaises réponses dénaturent les protections dont bénéficient les minorités, suggèrent à tort que les générations futures bénéficient des décisions actuelles ou décrivent de manière incorrecte le fonctionnement réel des systèmes démocratiques.
question: Jinsi serikali ya kidemokrasia inavyoshughulikia maslahi ya wachache na vizazi vijavyo inapinganaje na kanuni za msingi za kidemokrasia?
answer: Walio wengi hujitolea haki za wachache kimfumo huku wakitoza madeni kwa vizazi vijavyo ambavyo havikuwa na uwakilishi katika maamuzi hayo.
wrong_answers:
  - Serikali inashindwa kutoa ulinzi wa kutosha wa kikatiba lakini inaheshimu kanuni ya ushuru na uwakilishi
  - Maslahi ya wachache yanalindwa kupitia mapitio ya mahakama lakini vizazi vijavyo vinanufaika kutokana na uwekezaji wa umma uliorithiwa
  - Mfumo wa uchaguzi unahakikisha uwakilishi sawia lakini huunda sera za fedha zisizo endelevu kwa raia wa siku zijazo
explanation: |
  Jibu sahihi linabainisha utata mkuu wa kidemokrasia: utawala wa wengi kwa kawaida hukandamiza haki za wachache bila vikwazo vya kutosha vya kikatiba, na muhimu zaidi, vizazi vijavyo hurithi madeni na majukumu ambayo havikukubali kamwe. Hii inakiuka kanuni ya msingi kutoka kwa Mapinduzi ya Marekani kwamba hapapaswi kuwa na kodi bila uwakilishi. Majibu yasiyo sahihi ama yanapotosha ulinzi unaopatikana kwa wachache, yanaonyesha kwa uongo kwamba vizazi vijavyo vinanufaika na maamuzi ya sasa, au yanaelezea kimakosa jinsi mifumo ya kidemokrasia inavyofanya kazi kivitendo.
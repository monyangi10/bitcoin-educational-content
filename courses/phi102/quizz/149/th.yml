question: การปฏิบัติต่อผลประโยชน์ของชนกลุ่มน้อยและคนรุ่นอนาคตของรัฐประชาธิปไตยขัดแย้งกับหลักการพื้นฐานของประชาธิปไตยอย่างไร?
answer: เสียงข้างมากเสียสละสิทธิของเสียงข้างน้อยอย่างเป็นระบบ ในขณะที่กำหนดหนี้สินให้กับคนรุ่นหลังที่ไม่มีตัวแทนในการตัดสินใจเหล่านั้น
wrong_answers:
  - รัฐล้มเหลวในการจัดหาการคุ้มครองตามรัฐธรรมนูญที่เพียงพอ แต่เคารพหลักการของการเก็บภาษีโดยมีผู้แทน
  - ผลประโยชน์ของชนกลุ่มน้อยได้รับการคุ้มครองผ่านการพิจารณาของศาล แต่คนรุ่นหลังได้รับประโยชน์จากการลงทุนสาธารณะที่สืบทอดมา
  - ระบบการเลือกตั้งช่วยให้มีการเป็นตัวแทนตามสัดส่วนแต่สร้างนโยบายการคลังที่ไม่ยั่งยืนสำหรับพลเมืองในอนาคต
explanation: |
  คำตอบที่ถูกต้องระบุถึงความขัดแย้งหลักของประชาธิปไตย: การปกครองโดยเสียงข้างมากมักจะละเมิดสิทธิของชนกลุ่มน้อยหากไม่มีข้อจำกัดตามรัฐธรรมนูญที่เพียงพอ และที่สำคัญคือ คนรุ่นหลังได้รับมรดกหนี้สินและภาระผูกพันที่พวกเขาไม่เคยยินยอม ซึ่งเป็นการละเมิดหลักการพื้นฐานจากการปฏิวัติอเมริกาที่ว่าไม่ควรมีการเก็บภาษีโดยไม่มีตัวแทน คำตอบที่ผิดจะบิดเบือนการคุ้มครองที่มีให้กับชนกลุ่มน้อย แนะนำอย่างผิดๆ ว่าคนรุ่นหลังได้รับประโยชน์จากการตัดสินใจในปัจจุบัน หรืออธิบายผิดเกี่ยวกับการทำงานของระบบประชาธิปไตยในทางปฏิบัติ
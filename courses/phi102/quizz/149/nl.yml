question: Hoe is de manier waarop de democratische staat omgaat met minderheidsbelangen en toekomstige generaties in tegenspraak met fundamentele democratische principes?
answer: De meerderheid offert systematisch rechten van minderheden op en legt schulden op aan toekomstige generaties die geen vertegenwoordiging hadden in deze beslissingen
wrong_answers:
  - De staat biedt geen adequate grondwettelijke bescherming, maar respecteert het principe van belasting met vertegenwoordiging
  - Minderheidsbelangen worden beschermd door rechterlijke toetsing, maar toekomstige generaties profiteren van geërfde overheidsinvesteringen
  - Het kiesstelsel zorgt voor evenredige vertegenwoordiging, maar creëert een onhoudbaar fiscaal beleid voor toekomstige burgers
explanation: |
  Het juiste antwoord identificeert de kern van de democratische tegenstrijdigheid: de meerderheidsregel vertrapt van nature de rechten van minderheden zonder voldoende grondwettelijke beperkingen en, wat cruciaal is, toekomstige generaties erven schulden en verplichtingen waar ze nooit mee hebben ingestemd. Dit is in strijd met het fundamentele principe van de Amerikaanse Revolutie dat er geen belasting mag worden geheven zonder vertegenwoordiging. De foute antwoorden geven een verkeerd beeld van de bescherming van minderheden, suggereren ten onrechte dat toekomstige generaties profiteren van huidige beslissingen of beschrijven onjuist hoe democratische systemen in de praktijk werken.
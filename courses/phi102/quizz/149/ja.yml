question: 民主主義国家が少数派の利益や将来世代を扱うことは、基本的な民主主義の原則とどのように矛盾するのか？
answer: 多数派は、少数派の権利を組織的に犠牲にする一方で、その決定において代表権を持たなかった将来の世代に負債を押し付ける。
wrong_answers:
  - 州は十分な憲法上の保護を提供していないが、代表による課税の原則は尊重している。
  - 少数派の利益は司法審査によって保護されるが、将来の世代は継承された公共投資から利益を得る。
  - 選挙制度は比例代表制を保証するが、将来の市民のために持続不可能な財政政策を生み出す
explanation: |
  正解は、民主主義の核となる矛盾を明らかにしたものである。多数決は、十分な憲法上の制約なしに少数派の権利を自然に踏みにじるものであり、決定的なのは、将来の世代が、彼らが同意した覚えのない負債や義務を引き継ぐことである。これは「代表なくして課税なし」というアメリカ独立革命の基本原則に反する。間違った答えは、少数派が利用できる保護について誤って説明しているか、現在の決定から将来の世代が利益を得ることを誤って示唆しているか、民主主義制度が実際にどのように機能しているかを誤って説明しているかのいずれかである。
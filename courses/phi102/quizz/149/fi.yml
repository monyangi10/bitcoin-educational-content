question: Miten demokraattisen valtion suhtautuminen vähemmistöjen etuihin ja tuleviin sukupolviin on ristiriidassa demokraattisten perusperiaatteiden kanssa?
answer: Enemmistö uhraa järjestelmällisesti vähemmistöjen oikeuksia ja sysää velkoja tuleville sukupolville, joilla ei ole ollut edustusta näissä päätöksissä
wrong_answers:
  - Valtio ei tarjoa riittävää perustuslaillista suojaa, mutta kunnioittaa verotuksen ja edustuksen periaatetta
  - Vähemmistöjen etuja suojellaan oikeudellisella valvonnalla, mutta tulevat sukupolvet hyötyvät perityistä julkisista investoinneista
  - Vaalijärjestelmä takaa suhteellisen edustuksen, mutta luo kestämätöntä finanssipolitiikkaa tuleville kansalaisille
explanation: |
  Oikea vastaus osoittaa demokratian keskeisen ristiriidan: enemmistön valta polkee luonnollisesti vähemmistöjen oikeuksia ilman riittäviä perustuslaillisia rajoituksia, ja mikä tärkeintä, tulevat sukupolvet perivät velat ja velvoitteet, joihin ne eivät koskaan suostuneet. Tämä on vastoin Amerikan vallankumouksen perusperiaatetta, jonka mukaan verotus ei saa tapahtua ilman edustusta. Väärissä vastauksissa joko esitetään väärin vähemmistöjen käytettävissä oleva suoja, annetaan virheellisesti ymmärtää, että tulevat sukupolvet hyötyvät nykyisistä päätöksistä, tai kuvataan virheellisesti, miten demokraattiset järjestelmät käytännössä toimivat.
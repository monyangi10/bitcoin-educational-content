question: 民主國家對待少數人利益和後代的方式，與基本民主原則有何矛盾？
answer: 多數人有系統地犧牲少數人的權利，同時將債務強加於在這些決策中沒有代表的後代身上。
wrong_answers:
  - 國家未能提供足夠的憲法保護，但尊重有代表徵稅的原則
  - 少數人的利益可透過司法審查獲得保護，但後代卻可從承襲的公共投資中獲益
  - 選舉制度確保了比例代表制，但卻為未來的公民製造了無法持續的財政政策
explanation: |
  正確答案指出了民主的核心矛盾：多數人的統治自然會踐踏少數人的權利，而沒有足夠的憲法約束，最重要的是，後代會繼承他們從未同意的債務和義務。這違反了美國革命的基本原則，即沒有代表就不應該徵稅。錯誤的答案或是歪曲了少數族群所能獲得的保護，或是錯誤地暗示後代子孫會從目前的決策中獲益，或是錯誤地描述了民主制度實際上是如何運作的。
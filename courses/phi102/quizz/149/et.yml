question: Kuidas on demokraatliku riigi kohtlemine vähemuste huvide ja tulevaste põlvkondade suhtes vastuolus demokraatlike aluspõhimõtetega?
answer: Enamus ohverdab süstemaatiliselt vähemuste õigusi, samal ajal kui ta surub võlgu tulevastele põlvkondadele, kes ei olnud nendes otsustes esindatud
wrong_answers:
  - Riik ei paku piisavat põhiseaduslikku kaitset, kuid järgib maksustamise põhimõtet koos esindatusega
  - Vähemuse huve kaitstakse kohtuliku läbivaatamise kaudu, kuid tulevased põlvkonnad saavad kasu päritud riiklikest investeeringutest
  - Valimissüsteem tagab proportsionaalse esindatuse, kuid loob tulevaste kodanike jaoks jätkusuutmatu eelarvepoliitika
explanation: |
  Õige vastus määratleb demokraatliku põhivastuolu: enamuse valitsemine tallab loomulikult vähemuste õigusi ilma piisavate põhiseadusest tulenevate piiranguteta ning mis kõige tähtsam, tulevased põlvkonnad pärivad võlad ja kohustused, millega nad ei ole kunagi nõustunud. See rikub Ameerika revolutsioonist pärinevat aluspõhimõtet, mille kohaselt ei tohiks olla maksustamist ilma esinduseta. Valed vastused kas moonutavad vähemuste kaitsevõimalusi, viitavad ekslikult sellele, et tulevased põlvkonnad saavad kasu praegustest otsustest, või kirjeldavad valesti, kuidas demokraatlikud süsteemid tegelikult toimivad.
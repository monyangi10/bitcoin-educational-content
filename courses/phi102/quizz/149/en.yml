question: How does the democratic state's treatment of minority interests and future generations contradict fundamental democratic principles?
answer: The majority systematically sacrifices minority rights while imposing debts on future generations who had no representation in those decisions
wrong_answers:
  - The state fails to provide adequate constitutional protections but respects the principle of taxation with representation
  - Minority interests are protected through judicial review but future generations benefit from inherited public investments
  - The electoral system ensures proportional representation but creates unsustainable fiscal policies for future citizens
explanation: |
  The correct answer identifies the core democratic contradiction: majority rule naturally tramples minority rights without sufficient constitutional constraints, and crucially, future generations inherit debts and obligations they never consented to. This violates the fundamental principle from the American Revolution that there should be no taxation without representation. The wrong answers either misrepresent the protections available to minorities, falsely suggest future generations benefit from current decisions, or incorrectly describe how democratic systems actually function in practice.

question: Bagaimana perlakuan negara demokratis terhadap kepentingan minoritas dan generasi mendatang bertentangan dengan prinsip-prinsip dasar demokrasi?
answer: Mayoritas secara sistematis mengorbankan hak-hak minoritas dan membebankan utang kepada generasi mendatang yang tidak memiliki perwakilan dalam keputusan-keputusan tersebut
wrong_answers:
  - Negara gagal memberikan perlindungan konstitusional yang memadai tetapi menghormati prinsip perpajakan dengan perwakilan
  - Kepentingan minoritas dilindungi melalui tinjauan yudisial, tetapi generasi mendatang mendapat manfaat dari investasi publik yang diwariskan
  - Sistem pemilihan umum menjamin representasi proporsional tetapi menciptakan kebijakan fiskal yang tidak berkelanjutan bagi warga negara di masa depan
explanation: |
  Jawaban yang benar mengidentifikasi kontradiksi demokrasi yang utama: kekuasaan mayoritas secara alami menginjak-injak hak-hak minoritas tanpa batasan konstitusional yang memadai, dan yang paling penting, generasi mendatang mewarisi utang dan kewajiban yang tidak pernah mereka setujui. Hal ini melanggar prinsip dasar Revolusi Amerika yang menyatakan bahwa tidak boleh ada pajak tanpa perwakilan. Jawaban yang salah akan memberikan gambaran yang keliru tentang perlindungan yang tersedia bagi kaum minoritas, secara keliru menunjukkan bahwa generasi mendatang akan mendapat manfaat dari keputusan yang dibuat saat ini, atau secara keliru menggambarkan bagaimana sistem demokrasi benar-benar berfungsi dalam praktiknya.
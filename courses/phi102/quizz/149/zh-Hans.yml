question: 民主国家对待少数人利益和子孙后代的做法如何违背了基本的民主原则？
answer: 多数人有计划地牺牲少数人的权利，同时将债务强加给在这些决策中没有代表权的后代人
wrong_answers:
  - 国家未能提供充分的宪法保护，但尊重有代表权的征税原则
  - 少数人的利益通过司法审查得到保护，但子孙后代却从继承的公共投资中受益
  - 选举制度确保了比例代表制，但却为未来公民制定了不可持续的财政政策
explanation: |
  正确答案指出了民主的核心矛盾：在没有充分宪法约束的情况下，多数人的统治自然会践踏少数人的权利，最关键的是，后代人会继承他们从未同意的债务和义务。这违反了美国革命的基本原则，即没有代表就不应该征税。错误答案要么歪曲了对少数群体的保护，要么错误地暗示了后代会从当前的决定中受益，要么错误地描述了民主制度在实践中是如何运作的。
question: På vilket sätt strider den demokratiska statens behandling av minoritetsintressen och framtida generationer mot grundläggande demokratiska principer?
answer: Majoriteten offrar systematiskt minoriteters rättigheter samtidigt som den ålägger skulder på framtida generationer som inte hade någon representation i dessa beslut
wrong_answers:
  - Staten misslyckas med att tillhandahålla adekvata konstitutionella skydd men respekterar principen om beskattning med representation
  - Minoritetsintressen skyddas genom rättslig prövning, men framtida generationer drar nytta av ärvda offentliga investeringar
  - Valsystemet garanterar proportionell representation men skapar en ohållbar finanspolitik för framtida medborgare
explanation: |
  Det rätta svaret identifierar den grundläggande demokratiska motsägelsen: majoritetsstyre trampar naturligtvis på minoriteters rättigheter utan tillräckliga konstitutionella begränsningar, och framför allt ärver framtida generationer skulder och skyldigheter som de aldrig samtyckt till. Detta bryter mot den grundläggande principen från den amerikanska revolutionen att det inte ska finnas någon beskattning utan representation. De felaktiga svaren ger antingen en felaktig bild av det skydd som finns för minoriteter, antyder felaktigt att framtida generationer gynnas av nuvarande beslut eller beskriver felaktigt hur demokratiska system faktiskt fungerar i praktiken.
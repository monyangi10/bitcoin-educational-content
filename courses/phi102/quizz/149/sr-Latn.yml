question: Kako tretman manjinskih interesa i budućih generacija od strane demokratske države protivreči osnovnim demokratskim principima?
answer: Većina sistematski žrtvuje prava manjina dok nameće dugove budućim generacijama koje nisu imale predstavništvo u tim odlukama.
wrong_answers:
  - Država ne uspeva da obezbedi adekvatne ustavne zaštite, ali poštuje princip oporezivanja uz zastupljenost.
  - Manjinski interesi su zaštićeni kroz sudsku reviziju, ali buduće generacije imaju koristi od nasleđenih javnih investicija.
  - Izborni sistem osigurava proporcionalnu zastupljenost, ali stvara neodržive fiskalne politike za buduće građane.
explanation: |
  Tačan odgovor identifikuje suštinsku demokratsku kontradikciju: vladavina većine prirodno gazi prava manjina bez dovoljnih ustavnih ograničenja, i što je ključno, buduće generacije nasleđuju dugove i obaveze na koje nikada nisu pristale. Ovo krši osnovni princip iz Američke revolucije da ne sme biti oporezivanja bez zastupljenosti. Pogrešni odgovori ili pogrešno predstavljaju zaštite dostupne manjinama, lažno sugerišu da buduće generacije imaju koristi od trenutnih odluka, ili netačno opisuju kako demokratski sistemi zapravo funkcionišu u praksi.
question: W jaki sposób traktowanie przez państwo demokratyczne interesów mniejszości i przyszłych pokoleń jest sprzeczne z podstawowymi zasadami demokracji?
answer: Większość systematycznie poświęca prawa mniejszości, jednocześnie nakładając długi na przyszłe pokolenia, które nie miały reprezentacji w tych decyzjach
wrong_answers:
  - Państwo nie zapewnia odpowiedniej ochrony konstytucyjnej, ale przestrzega zasady opodatkowania z reprezentacją
  - Interesy mniejszości są chronione poprzez kontrolę sądową, ale przyszłe pokolenia korzystają z odziedziczonych inwestycji publicznych
  - System wyborczy zapewnia proporcjonalną reprezentację, ale tworzy niezrównoważoną politykę fiskalną dla przyszłych obywateli
explanation: |
  Prawidłowa odpowiedź identyfikuje podstawową sprzeczność demokracji: rządy większości naturalnie depczą prawa mniejszości bez wystarczających ograniczeń konstytucyjnych, a co najważniejsze, przyszłe pokolenia dziedziczą długi i zobowiązania, na które nigdy nie wyraziły zgody. Narusza to fundamentalną zasadę rewolucji amerykańskiej, że nie powinno być opodatkowania bez reprezentacji. Nieprawidłowe odpowiedzi albo błędnie przedstawiają ochronę dostępną dla mniejszości, fałszywie sugerują, że przyszłe pokolenia korzystają z obecnych decyzji, albo nieprawidłowo opisują, w jaki sposób systemy demokratyczne faktycznie funkcjonują w praktyce.
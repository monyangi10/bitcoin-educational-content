question: Ni gute ukuntu Leta ya demokarasi ifata inyungu z’abantu batobato n’ibihe bizoza bivuguruza ingingo ngenderwako z’ishimikiro za demokarasi?
answer: Abenshi baratanga uburenganzira bw’abantu bakeyi mu buryo butegekanijwe mu gihe bashira imyenda ku bihe bizoza bitagira uwubiserukira muri izo ngingo .
wrong_answers:
  - Leta ntishobora gutanga uburinzi bubereye bushingiye kw’itegeko nshinga ariko yubaha ingingo ngenderwako y’imisoro n’uwuyiserukira .
  - Inyungu z'abantu bake zirindwa biciye mu gusubiramwo ivy'ubutungane ariko uruvyaro ruzoza rwungukira ku vyo Leta irazwe .
  - Uburyo bw'amatora buratuma habaho uguserukira abantu mu buryo buringaniye ariko bugatuma habaho politike z'ubutunzi zidashobora kuramba ku bazoba abanyagihugu .
explanation: |
  Inyishu ibereye yerekana ukuvuguruzanya nyamukuru kwa demokarasi: ubutegetsi bw’abantu benshi burahonyanga uburenganzira bw’abantu bake ata n’itegeko nshinga rihagije ribubuza, kandi ikiruta vyose, abazoza bararagwa imyenda n’inshingano batigeze bemera. Ivyo bica ku ngingo ngenderwako y’ishimikiro yava mu mpinduka y’Abanyamerika y’uko ata misoro ikwiye kubaho ata n’umwe aserukira. Inyishu zitari zo zishobora guserura nabi uburinzi buboneka ku bantu batobato, zigatanga iciyumviro c’ikinyoma c’uko uruvyaro ruzoza ruzokwungukira ku ngingo zifatwa ubu, canke zigasobanura nabi ingene mu vy’ukuri uburyo bwa demokarasi bukora mu bikorwa.
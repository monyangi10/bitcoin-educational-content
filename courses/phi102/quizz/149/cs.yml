question: Jak je zacházení demokratického státu se zájmy menšin a budoucích generací v rozporu se základními demokratickými principy?
answer: Většina systematicky obětuje práva menšin a zároveň zadlužuje budoucí generace, které se na těchto rozhodnutích nepodílely
wrong_answers:
  - Stát neposkytuje odpovídající ústavní ochranu, ale respektuje zásadu zdanění se zastoupením
  - Menšinové zájmy jsou chráněny soudním přezkumem, ale budoucí generace mají prospěch ze zděděných veřejných investic
  - Volební systém zajišťuje poměrné zastoupení, ale vytváří neudržitelnou fiskální politiku pro budoucí občany
explanation: |
  Správná odpověď identifikuje základní demokratický rozpor: vláda většiny přirozeně pošlapává práva menšin bez dostatečných ústavních omezení, a co je zásadní, budoucí generace dědí dluhy a závazky, s nimiž nikdy nesouhlasily. To porušuje základní zásadu z americké revoluce, že by nemělo existovat zdanění bez zastoupení. Špatné odpovědi buď zkreslují ochranu, kterou mají menšiny k dispozici, nebo falešně naznačují, že budoucí generace mají prospěch ze současných rozhodnutí, nebo nesprávně popisují, jak demokratické systémy v praxi skutečně fungují.
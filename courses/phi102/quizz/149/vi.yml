question: Cách thức nhà nước dân chủ đối xử với lợi ích của các nhóm thiểu số và các thế hệ tương lai mâu thuẫn như thế nào với các nguyên tắc dân chủ cơ bản?
answer: Đa số thường xuyên hy sinh quyền lợi của thiểu số, đồng thời đặt gánh nặng nợ nần lên các thế hệ tương lai, những người không có tiếng nói trong các quyết định đó.
wrong_answers:
  - Nhà nước không cung cấp đủ sự bảo vệ theo hiến pháp nhưng lại tôn trọng nguyên tắc đánh thuế kèm theo đại diện.
  - Quyền lợi của thiểu số được bảo vệ thông qua xem xét tư pháp, nhưng các thế hệ tương lai được hưởng lợi từ các khoản đầu tư công được thừa hưởng.
  - Hệ thống bầu cử đảm bảo sự đại diện theo tỷ lệ nhưng lại tạo ra các chính sách tài chính không bền vững cho các thế hệ công dân tương lai.
explanation: |
  Câu trả lời đúng chỉ ra mâu thuẫn cốt lõi của nền dân chủ: sự cai trị của đa số đương nhiên sẽ chà đạp lên quyền của thiểu số nếu không có đủ các ràng buộc hiến pháp, và quan trọng hơn, các thế hệ tương lai sẽ thừa hưởng những khoản nợ và nghĩa vụ mà họ chưa từng đồng ý. Điều này vi phạm nguyên tắc cơ bản từ Cách mạng Mỹ rằng không nên đánh thuế mà không có đại diện. Các câu trả lời sai hoặc xuyên tạc các biện pháp bảo vệ dành cho thiểu số, hoặc cho rằng các thế hệ tương lai được hưởng lợi từ các quyết định hiện tại, hoặc mô tả không chính xác cách thức hoạt động thực tế của các hệ thống dân chủ.
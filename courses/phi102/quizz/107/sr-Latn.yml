question: Koji fundamentalni princip objašnjava zašto se dobrovoljni ugovori i razmene prirodno dešavaju između pojedinaca u slobodnoj tržišnoj ekonomiji?
answer: Obe strane imaju koristi od razmene, što je čini igrom sa pozitivnom sumom gde svaki učesnik dobija vrednost
wrong_answers:
  - Jedna strana uvek ima više koristi od druge, stvarajući konkurentsku prednost u budućim pregovorima.
  - Vladine regulative osiguravaju pravednu raspodelu beneficija između ugovornih strana
  - Društveni pritisak i kulturne norme primoravaju pojedince da se uključe u međusobno korisne transakcije
explanation: |
  Tekst naglašava da je dobrovoljna razmena suštinski igra sa pozitivnim ishodom gde obe strane imaju koristi. Kao što je objašnjeno kroz analizu Abbé de Saint-Pierre-a, ljudi se upuštaju u ugovore i razmene samo kada percipiraju ličnu korist - inače bi jednostavno odlučili da ne učestvuju. Ovaj princip uzajamne koristi objašnjava zašto se dobrovoljna trgovina prirodno dešava bez spoljne prinude, jer svaki učesnik vrednuje ono što dobija više od onoga što daje, stvarajući istinsko bogatstvo za obe uključene strane.
question: Que princípio fundamental explica por que razão os contratos e as trocas voluntárias ocorrem naturalmente entre indivíduos numa economia de mercado livre?
answer: Ambas as partes beneficiam da troca, tornando-a um jogo de soma positiva em que cada participante ganha valor
wrong_answers:
  - Uma das partes beneficia sempre mais do que a outra, criando uma vantagem competitiva em futuras negociações
  - Os regulamentos governamentais garantem uma distribuição justa dos benefícios entre as partes contratantes
  - A pressão social e as normas culturais obrigam os indivíduos a envolverem-se em transacções mutuamente benéficas
explanation: |
  O texto sublinha que a troca voluntária é fundamentalmente um jogo de soma positiva em que ambas as partes beneficiam. Como explicado na análise do Abade de Saint-Pierre, as pessoas só se envolvem em contratos e trocas quando se apercebem de vantagens pessoais - caso contrário, optariam simplesmente por não participar. Este princípio de benefício mútuo explica porque é que o comércio voluntário ocorre naturalmente sem coerção externa, uma vez que cada participante valoriza mais o que recebe do que aquilo de que abdica, criando uma verdadeira riqueza para ambas as partes envolvidas.
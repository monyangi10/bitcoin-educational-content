question: Hvilket grunnleggende prinsipp forklarer hvorfor frivillige kontrakter og bytter naturlig oppstår mellom individer i en fri markedsøkonomi?
answer: Begge parter drar nytte av utvekslingen, noe som gjør det til et pluss-sum-spill der hver deltaker vinner verdi
wrong_answers:
  - Den ene parten har alltid større fordeler enn den andre, noe som skaper et konkurransefortrinn i fremtidige forhandlinger
  - Offentlige reguleringer sikrer en rettferdig fordeling av fordelene mellom avtalepartene
  - Sosialt press og kulturelle normer tvinger individer til å delta i gjensidig fordelaktige transaksjoner
explanation: |
  Teksten understreker at frivillig bytte i bunn og grunn er et pluss-sum-spill der begge parter tjener på det. Som Abbé de Saint-Pierre forklarer gjennom sin analyse, inngår folk bare kontrakter og bytter når de ser en personlig fordel - ellers ville de rett og slett valgt å ikke delta. Dette prinsippet om gjensidig nytte forklarer hvorfor frivillig handel skjer naturlig uten ytre tvang, ettersom hver deltaker verdsetter det de får mer enn det de gir fra seg, noe som skaper reell velstand for begge parter.
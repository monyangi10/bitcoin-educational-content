question: Ni kanuni gani ya msingi inayoelezea kwa nini mikataba na mabadilishano ya hiari hutokea kiasili kati ya watu binafsi katika uchumi wa soko huria?
answer: Pande zote mbili zinanufaika na ubadilishanaji, na kuufanya kuwa mchezo wa jumla chanya ambapo kila mshiriki anapata thamani
wrong_answers:
  - Upande mmoja hufaidika zaidi kuliko mwingine, na hivyo kuunda faida ya ushindani katika mazungumzo yajayo
  - Kanuni za serikali zinahakikisha usambazaji wa haki wa faida kati ya pande zinazohusika katika mkataba
  - Shinikizo la kijamii na kanuni za kitamaduni huwalazimisha watu binafsi kushiriki katika miamala yenye manufaa kwa pande zote mbili
explanation: |
  Maandishi yanasisitiza kwamba ubadilishanaji wa hiari kimsingi ni mchezo chanya na jumla ambapo pande zote mbili zinanufaika. Kama ilivyoelezwa kupitia uchambuzi wa Abbé de Saint-Pierre, watu hushiriki mikataba na ubadilishanaji tu wanapoona faida binafsi - vinginevyo wangechagua tu kutoshiriki. Kanuni hii ya manufaa ya pande zote inaelezea kwa nini biashara ya hiari hutokea kiasili bila kulazimishwa kutoka nje, kwani kila mshiriki anathamini kile anachopokea zaidi ya kile anachoacha, na hivyo kutengeneza utajiri wa kweli kwa pande zote mbili zinazohusika.
question: Milline aluspõhimõte selgitab, miks vabas turumajanduses toimuvad üksikisikute vahel loomulikult vabatahtlikud lepingud ja vahetused?
answer: Mõlemad osapooled saavad vahetusest kasu, mistõttu on tegemist positiivse summaga mänguga, kus mõlemad osalejad saavad kasu
wrong_answers:
  - Üks pool saab alati rohkem kasu kui teine, mis loob konkurentsieelise tulevastel läbirääkimistel
  - Valitsuse määrused tagavad õiglase kasu jaotamise lepinguosaliste vahel
  - Sotsiaalne surve ja kultuurinormid sunnivad inimesi tegema vastastikku kasulikke tehinguid
explanation: |
  Tekstis rõhutatakse, et vabatahtlik vahetus on põhimõtteliselt positiivse summaga mäng, millest võidavad mõlemad pooled. Nagu Abbé de Saint-Pierre'i analüüsis selgitatakse, osalevad inimesed lepingutes ja vahetustes ainult siis, kui nad tajuvad isiklikku kasu - vastasel juhul otsustaksid nad lihtsalt mitte osaleda. See vastastikuse kasu põhimõte seletab, miks vabatahtlik kauplemine toimub loomulikult ilma välise sunnita, kuna mõlemad osalejad hindavad seda, mida nad saavad, rohkem kui seda, millest nad loobuvad, luues nii mõlemale osapoolele tõelist rikkust.
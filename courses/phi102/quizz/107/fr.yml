question: Quel principe fondamental explique pourquoi les contrats et les échanges volontaires se produisent naturellement entre les individus dans une économie de marché libre ?
answer: Les deux parties bénéficient de l'échange, ce qui en fait un jeu à somme positive où chaque participant gagne de la valeur
wrong_answers:
  - Une partie profite toujours plus que l'autre, ce qui crée un avantage concurrentiel dans les négociations futures
  - Les réglementations gouvernementales garantissent une répartition équitable des avantages entre les parties contractantes
  - La pression sociale et les normes culturelles obligent les individus à s'engager dans des transactions mutuellement bénéfiques
explanation: |
  Le texte souligne que l'échange volontaire est fondamentalement un jeu à somme positive où les deux parties sont gagnantes. Comme l'explique l'analyse de l'abbé de Saint-Pierre, les gens ne s'engagent dans des contrats et des échanges que s'ils y trouvent un avantage personnel - sinon, ils choisiraient simplement de ne pas y participer. Ce principe de l'avantage mutuel explique pourquoi l'échange volontaire se produit naturellement sans contrainte extérieure, car chaque participant accorde plus d'importance à ce qu'il reçoit qu'à ce qu'il abandonne, créant ainsi une véritable richesse pour les deux parties impliquées.
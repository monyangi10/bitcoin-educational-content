question: 自由市場経済において、個人間で自発的な契約や交換が自然に行われる理由を説明する基本原則は何か？
answer: 両者が交換から利益を得ることで、参加者それぞれが価値を得るポジティブサムゲームとなる。
wrong_answers:
  - 一方の当事者は常に他方より多くの利益を得ており、将来の交渉において競争上の優位性を生み出している。
  - 政府の規制は、契約当事者間の公平な利益配分を保証する。
  - 社会的圧力と文化的規範が、個人を互恵的な取引に従事させる
explanation: |
  この文章では、自発的な交換は基本的に双方が利益を得るポジティブサムゲームであることが強調されている。アベ・ド・サン＝ピエールの分析を通じて説明されているように、人は個人的な利益を認識したときにのみ契約や交換に参加する。この相互利益原則は、自発的な取引が外部からの強制なしに自然に行われる理由を説明する。参加者はそれぞれ、自分があきらめるものよりも自分が受け取るもののほうに価値を見出し、当事者双方に真の富を生み出すからである。
question: Кой фундаментален принцип обяснява защо в свободната пазарна икономика между хората естествено се сключват доброволни договори и размяна?
answer: И двете страни печелят от размяната, което я превръща в игра с положителна сума, при която всеки участник печели стойност
wrong_answers:
  - Едната страна винаги печели повече от другата, което създава конкурентно предимство при бъдещи преговори
  - Правителствените разпоредби гарантират справедливо разпределение на ползите между договарящите се страни
  - Социалният натиск и културните норми принуждават хората да участват във взаимноизгодни сделки
explanation: |
  В текста се подчертава, че доброволната размяна по същество е игра с положителна сума, от която печелят и двете страни. Както е обяснено чрез анализа на абат дьо Сен-Пиер, хората участват в договори и размяна само когато виждат лична полза - в противен случай те просто биха избрали да не участват. Този принцип на взаимната изгода обяснява защо доброволната търговия се осъществява по естествен начин, без външна принуда, тъй като всеки участник оценява това, което получава, повече от това, от което се отказва, създавайки истинско богатство и за двете участващи страни.
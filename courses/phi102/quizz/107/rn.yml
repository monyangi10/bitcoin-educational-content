question: Ni ingingo ngenderwako iyihe y’ishimikiro isigura igituma amasezerano n’uguhanahana ibintu ku bushake bishika mu buryo busanzwe hagati y’abantu mu bukungu bw’isoko ry’uburenganzira?
answer: Bompi barahezagirwa n’uguhanahana, bikaba bituma haba urukino rw’amahera meza aho umwe wese muri bo aronka agaciro .
wrong_answers:
  - Uruhande rumwe rwama ruronka inyungu kuruta urundi, ivyo bikaba bituma haba akamaro mu bijanye n’uguhiganwa mu biganiro vyo muri kazoza .
  - Amabwirizwa ya Leta aratuma inyungu zigabanwa mu buryo bubereye hagati y'abagiranye amasezerano .
  - Igitutu co mu kibano be n’imigenzo y’imico kama bihatira abantu kwifatanya n’abandi mu bikorwa vy’ubudandaji bifitiye akamaro bose
explanation: |
  Ico canditswe gishimika ku vy’uko uguhanahana amakuru ku bushake ari urukino rw’amahera meza aho abo bompi bungukira. Nk’uko vyasiguwe biciye mu icegeranyo ca Abbé de Saint-Pierre, abantu bagira amasezerano n’uguhanahana gusa iyo babonye inyungu y’umuntu ku giti ciwe - ahandi ho bohitamwo gusa kutagira uruharamwo. Iryo hame ry’inyungu z’abantu bose rirasigura igituma ubudandaji bw’ubushake bubaho mu buryo busanzwe ata guhatira umuntu hanze, kuko umwe wese mu bari muri iyo nama aha agaciro ivyo aronka kuruta ivyo aheba, ivyo bikaba bituma abo bompi bagira ubutunzi nyakuri.
question: Serbest piyasa ekonomisinde bireyler arasında gönüllü sözleşmelerin ve değiş tokuşların neden doğal olarak gerçekleştiğini açıklayan temel ilke hangisidir?
answer: Her iki taraf da değiş tokuştan fayda sağlar, bu da her katılımcının değer kazandığı pozitif toplamlı bir oyun haline gelir
wrong_answers:
  - Taraflardan biri her zaman diğerinden daha fazla fayda sağlar ve gelecekteki müzakerelerde rekabet avantajı yaratır
  - Hükümet düzenlemeleri, faydaların sözleşme tarafları arasında adil bir şekilde dağıtılmasını sağlar
  - Sosyal baskı ve kültürel normlar bireyleri karşılıklı fayda sağlayan işlemlerde bulunmaya zorlar
explanation: |
  Metin, gönüllü mübadelenin temelde her iki tarafın da fayda sağladığı pozitif toplamlı bir oyun olduğunu vurgulamaktadır. Abbé de Saint-Pierre'in analiziyle açıklandığı üzere, insanlar yalnızca kişisel avantaj algıladıklarında sözleşmelere ve değiş tokuşlara katılırlar - aksi takdirde katılmamayı tercih ederler. Bu karşılıklı fayda ilkesi, gönüllü ticaretin neden dış zorlama olmaksızın doğal bir şekilde gerçekleştiğini açıklar; çünkü her katılımcı aldığına verdiğinden daha fazla değer verir ve ilgili her iki taraf için de gerçek bir zenginlik yaratır.
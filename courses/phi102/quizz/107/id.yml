question: Prinsip dasar apa yang menjelaskan mengapa kontrak dan pertukaran sukarela secara alami terjadi di antara individu dalam ekonomi pasar bebas?
answer: Kedua belah pihak mendapat manfaat dari pertukaran, menjadikannya permainan jumlah positif di mana setiap peserta mendapatkan nilai
wrong_answers:
  - Satu pihak selalu diuntungkan lebih banyak daripada pihak lain, menciptakan keunggulan kompetitif dalam negosiasi di masa depan
  - Peraturan pemerintah memastikan distribusi manfaat yang adil di antara para pihak yang berkontrak
  - Tekanan sosial dan norma-norma budaya memaksa individu untuk terlibat dalam transaksi yang saling menguntungkan
explanation: |
  Teks ini menekankan bahwa pertukaran sukarela pada dasarnya adalah permainan jumlah positif di mana kedua belah pihak diuntungkan. Seperti yang dijelaskan melalui analisis Abbé de Saint-Pierre, orang hanya terlibat dalam kontrak dan pertukaran ketika mereka merasakan keuntungan pribadi - jika tidak, mereka akan memilih untuk tidak berpartisipasi. Prinsip saling menguntungkan ini menjelaskan mengapa perdagangan sukarela terjadi secara alami tanpa paksaan dari luar, karena setiap peserta lebih menghargai apa yang mereka terima daripada apa yang mereka serahkan, sehingga menciptakan kekayaan yang sesungguhnya bagi kedua belah pihak yang terlibat.
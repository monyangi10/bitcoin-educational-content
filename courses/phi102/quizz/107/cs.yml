question: Jaký základní princip vysvětluje, proč ve volném tržním hospodářství přirozeně dochází k dobrovolným smlouvám a směnám mezi jednotlivci?
answer: Obě strany mají ze směny prospěch, takže se jedná o hru s kladným součtem, kdy každý účastník získává hodnotu
wrong_answers:
  - Jedna strana má vždy větší prospěch než druhá, což jí v budoucích jednáních přináší konkurenční výhodu
  - Vládní nařízení zajišťují spravedlivé rozdělení výhod mezi smluvní strany
  - Sociální tlak a kulturní normy nutí jednotlivce k vzájemně výhodným transakcím
explanation: |
  Text zdůrazňuje, že dobrovolná směna je v zásadě hra s kladným součtem, z níž mají prospěch obě strany. Jak vysvětluje analýza abbé de Saint-Pierra, lidé se zapojují do smluv a směn pouze tehdy, když vnímají osobní výhodu - jinak by se prostě rozhodli neúčastnit se. Tento princip vzájemného prospěchu vysvětluje, proč dobrovolná výměna probíhá přirozeně bez vnějšího donucení, protože každý účastník si cení toho, co dostává, více než toho, čeho se vzdává, což vytváří skutečné bohatství pro obě zúčastněné strany.
question: ¿Qué principio fundamental explica por qué se producen de forma natural contratos e intercambios voluntarios entre particulares en una economía de libre mercado?
answer: Ambas partes se benefician del intercambio, lo que lo convierte en un juego de suma positiva en el que cada participante gana valor
wrong_answers:
  - Una de las partes siempre se beneficia más que la otra, lo que crea una ventaja competitiva en futuras negociaciones
  - La normativa gubernamental garantiza un reparto equitativo de los beneficios entre las partes contratantes
  - La presión social y las normas culturales obligan a las personas a realizar transacciones mutuamente beneficiosas
explanation: |
  El texto subraya que el intercambio voluntario es fundamentalmente un juego de suma positiva en el que ambas partes salen beneficiadas. Como explica el análisis del Abbé de Saint-Pierre, las personas sólo participan en contratos e intercambios cuando perciben una ventaja personal; de lo contrario, simplemente optarían por no participar. Este principio de beneficio mutuo explica por qué el comercio voluntario se produce de forma natural, sin coacción externa, ya que cada participante valora más lo que recibe que lo que cede, creando una auténtica riqueza para ambas partes implicadas.
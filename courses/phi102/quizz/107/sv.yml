question: Vilken grundläggande princip förklarar varför frivilliga avtal och utbyten naturligt uppstår mellan individer i en fri marknadsekonomi?
answer: Båda parter gynnas av utbytet, vilket gör det till ett spel med positiv summa där varje deltagare får ett värde
wrong_answers:
  - Den ena parten gynnas alltid mer än den andra, vilket skapar en konkurrensfördel i framtida förhandlingar
  - Statliga bestämmelser säkerställer rättvis fördelning av förmåner mellan avtalsparterna
  - Sociala påtryckningar och kulturella normer tvingar individer att engagera sig i ömsesidigt fördelaktiga transaktioner
explanation: |
  I texten betonas att frivilligt utbyte i grunden är ett plussummespel där båda parter gynnas. Som framgår av Abbé de Saint-Pierres analys deltar människor endast i avtal och utbyten när de ser en personlig fördel - annars skulle de helt enkelt välja att inte delta. Denna princip om ömsesidig nytta förklarar varför frivillig handel sker naturligt utan yttre tvång, eftersom varje deltagare värderar det de får mer än det de ger upp, vilket skapar verklig rikedom för båda inblandade parter.
question: Welches Grundprinzip erklärt, warum es in einer freien Marktwirtschaft zu freiwilligen Verträgen und Tauschgeschäften zwischen Individuen kommt?
answer: Beide Parteien profitieren von dem Austausch, so dass es sich um ein Positivsummenspiel handelt, bei dem jeder Teilnehmer einen Gewinn erzielt
wrong_answers:
  - Eine Partei profitiert immer mehr als die andere, was zu einem Wettbewerbsvorteil bei zukünftigen Verhandlungen führt
  - Staatliche Regelungen sorgen für eine gerechte Verteilung des Nutzens zwischen den Vertragspartnern
  - Sozialer Druck und kulturelle Normen zwingen den Einzelnen, sich auf Transaktionen einzulassen, die für beide Seiten von Vorteil sind
explanation: |
  Der Text unterstreicht, dass der freiwillige Austausch grundsätzlich ein Positivsummenspiel ist, bei dem beide Parteien profitieren. Wie in der Analyse von Abbé de Saint-Pierre erläutert, lassen sich Menschen nur dann auf Verträge und Tauschgeschäfte ein, wenn sie einen persönlichen Vorteil darin sehen - andernfalls würden sie sich einfach nicht beteiligen. Dieses Prinzip des gegenseitigen Nutzens erklärt, warum freiwilliger Handel auf natürliche Weise und ohne äußeren Zwang zustande kommt, da jeder Teilnehmer das, was er erhält, mehr schätzt als das, was er aufgibt, und so echten Wohlstand für beide Parteien schafft.
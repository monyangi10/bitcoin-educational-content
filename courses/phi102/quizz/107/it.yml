question: Quale principio fondamentale spiega perché i contratti e gli scambi volontari avvengono naturalmente tra gli individui in un'economia di libero mercato?
answer: Entrambe le parti traggono vantaggio dallo scambio, rendendolo un gioco a somma positiva in cui ogni partecipante guadagna valore
wrong_answers:
  - Una parte beneficia sempre di più dell'altra, creando un vantaggio competitivo nelle trattative future
  - I regolamenti governativi garantiscono un'equa distribuzione dei benefici tra le parti contraenti
  - La pressione sociale e le norme culturali costringono gli individui a impegnarsi in transazioni reciprocamente vantaggiose
explanation: |
  Il testo sottolinea che lo scambio volontario è fondamentalmente un gioco a somma positiva in cui entrambe le parti traggono vantaggio. Come spiega l'analisi dell'Abbé de Saint-Pierre, le persone si impegnano in contratti e scambi solo quando percepiscono un vantaggio personale, altrimenti sceglierebbero semplicemente di non partecipare. Questo principio di mutuo vantaggio spiega perché lo scambio volontario avviene naturalmente senza coercizione esterna, poiché ogni partecipante valuta ciò che riceve più di ciò che cede, creando una vera ricchezza per entrambe le parti coinvolte.
question: چه اصل بنیادی توضیح می‌دهد که چرا قراردادها و مبادلات داوطلبانه به طور طبیعی بین افراد در یک اقتصاد بازار آزاد رخ می‌دهد؟
answer: هر دو طرف از این تبادل سود می‌برند و آن را به یک بازی با مجموع مثبت تبدیل می‌کنند که در آن هر شرکت‌کننده ارزش کسب می‌کند.
wrong_answers:
  - همیشه یک طرف بیشتر از طرف دیگر سود می‌برد و این امر در مذاکرات آینده یک مزیت رقابتی ایجاد می‌کند.
  - مقررات دولتی توزیع عادلانه منافع بین طرفین قرارداد را تضمین می‌کنند.
  - فشار اجتماعی و هنجارهای فرهنگی افراد را وادار می‌کنند تا در معاملات متقابل سودمند شرکت کنند.
explanation: |
  متن تأکید می‌کند که مبادله داوطلبانه اساساً یک بازی با مجموع مثبت است که در آن هر دو طرف سود می‌برند. همان‌طور که از طریق تحلیل Abbé de Saint-Pierre توضیح داده شده است، مردم تنها زمانی در قراردادها و مبادلات شرکت می‌کنند که احساس کنند منفعت شخصی دارند - در غیر این صورت، به سادگی انتخاب می‌کنند که شرکت نکنند. این اصل سود متقابل توضیح می‌دهد که چرا تجارت داوطلبانه به طور طبیعی بدون اجبار خارجی رخ می‌دهد، زیرا هر شرکت‌کننده آنچه را که دریافت می‌کند بیشتر از آنچه که از دست می‌دهد ارزش‌گذاری می‌کند و ثروت واقعی برای هر دو طرف درگیر ایجاد می‌کند.
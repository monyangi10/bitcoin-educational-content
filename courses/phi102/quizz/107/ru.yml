question: Какой фундаментальный принцип объясняет, почему в условиях свободной рыночной экономики между людьми естественным образом возникают добровольные контракты и обмены?
answer: Обе стороны получают выгоду от обмена, что превращает его в игру с положительной суммой, в которой каждый участник получает свою выгоду
wrong_answers:
  - Одна сторона всегда получает больше выгоды, чем другая, что создает конкурентное преимущество в будущих переговорах
  - Государственное регулирование обеспечивает справедливое распределение выгод между договаривающимися сторонами
  - Социальное давление и культурные нормы заставляют людей вступать во взаимовыгодные сделки
explanation: |
  В тексте подчеркивается, что добровольный обмен по своей сути является игрой с положительной суммой, в которой выигрывают обе стороны. Как следует из анализа аббата де Сен-Пьера, люди участвуют в контрактах и обменах только тогда, когда видят в этом личную выгоду - в противном случае они просто предпочли бы не участвовать. Этот принцип взаимной выгоды объясняет, почему добровольная торговля происходит естественным образом, без внешнего принуждения, поскольку каждый участник ценит то, что он получает, больше, чем то, от чего он отказывается, создавая подлинное богатство для обеих участвующих сторон.
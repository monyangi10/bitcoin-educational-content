question: Welk fundamenteel principe verklaart waarom vrijwillige contracten en uitwisselingen van nature voorkomen tussen individuen in een vrije markteconomie?
answer: Beide partijen profiteren van de uitwisseling, waardoor het een positief-somspel wordt waarbij elke deelnemer waarde wint
wrong_answers:
  - De ene partij profiteert altijd meer dan de andere, wat een concurrentievoordeel oplevert in toekomstige onderhandelingen
  - Overheidsregels zorgen voor een eerlijke verdeling van voordelen tussen de contractpartijen
  - Sociale druk en culturele normen dwingen individuen tot wederzijds voordelige transacties
explanation: |
  De tekst benadrukt dat vrijwillige uitwisseling in wezen een spel is waarbij beide partijen profiteren. Zoals uitgelegd in de analyse van Abbé de Saint-Pierre, gaan mensen alleen contracten en uitwisselingen aan als ze persoonlijk voordeel zien - anders zouden ze er gewoon voor kiezen om niet deel te nemen. Dit principe van wederzijds voordeel verklaart waarom vrijwillige handel van nature plaatsvindt zonder dwang van buitenaf, omdat elke deelnemer meer waarde hecht aan wat hij ontvangt dan aan wat hij opgeeft, waardoor echte rijkdom ontstaat voor beide betrokken partijen.
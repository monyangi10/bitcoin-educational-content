question: Nguyên tắc cơ bản nào giải thích tại sao các hợp đồng và giao dịch tự nguyện lại diễn ra một cách tự nhiên giữa các cá nhân trong nền kinh tế thị trường tự do?
answer: Cả hai bên đều được hưởng lợi từ cuộc trao đổi, biến nó thành một trò chơi có lợi cho cả hai bên, trong đó mỗi bên đều thu được giá trị.
wrong_answers:
  - Một bên luôn được hưởng lợi nhiều hơn bên kia, tạo ra lợi thế cạnh tranh trong các cuộc đàm phán tương lai.
  - Các quy định của chính phủ đảm bảo sự phân bổ công bằng các lợi ích giữa các bên ký kết.
  - Áp lực xã hội và chuẩn mực văn hóa thúc đẩy các cá nhân tham gia vào các giao dịch cùng có lợi.
explanation: |
  Văn bản nhấn mạnh rằng trao đổi tự nguyện về cơ bản là một trò chơi có lợi cho cả hai bên. Như được giải thích qua phân tích của Abbé de Saint-Pierre, mọi người chỉ tham gia vào các hợp đồng và trao đổi khi họ nhận thấy lợi ích cá nhân - nếu không, họ sẽ đơn giản là chọn không tham gia. Nguyên tắc cùng có lợi này giải thích tại sao thương mại tự nguyện diễn ra một cách tự nhiên mà không cần sự ép buộc từ bên ngoài, vì mỗi người tham gia đều coi trọng những gì họ nhận được hơn những gì họ phải từ bỏ, tạo ra sự giàu có thực sự cho cả hai bên liên quan.
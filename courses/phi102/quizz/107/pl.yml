question: Jaka fundamentalna zasada wyjaśnia, dlaczego w gospodarce wolnorynkowej dobrowolne umowy i wymiany naturalnie występują między jednostkami?
answer: Obie strony czerpią korzyści z wymiany, co sprawia, że jest to gra o sumie dodatniej, w której każdy uczestnik zyskuje wartość
wrong_answers:
  - Jedna strona zawsze zyskuje więcej niż druga, tworząc przewagę konkurencyjną w przyszłych negocjacjach
  - Regulacje rządowe zapewniają sprawiedliwy podział korzyści między umawiającymi się stronami
  - Presja społeczna i normy kulturowe zmuszają jednostki do angażowania się w transakcje korzystne dla obu stron
explanation: |
  Tekst podkreśla, że dobrowolna wymiana jest zasadniczo grą o sumie dodatniej, w której obie strony odnoszą korzyści. Jak wyjaśniono w analizie Abbé de Saint-Pierre'a, ludzie angażują się w umowy i wymiany tylko wtedy, gdy dostrzegają osobistą korzyść - w przeciwnym razie po prostu zdecydowaliby się nie uczestniczyć. Ta zasada wzajemnych korzyści wyjaśnia, dlaczego dobrowolny handel odbywa się naturalnie bez zewnętrznego przymusu, ponieważ każdy uczestnik ceni to, co otrzymuje, bardziej niż to, z czego rezygnuje, tworząc prawdziwe bogactwo dla obu zaangażowanych stron.
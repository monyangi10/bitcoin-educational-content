question: ¿Por qué argumentaban los fisiócratas que la libertad del comercio de cereales conduciría a una mejor asignación de los recursos que el control estatal?
answer: Los agentes individuales responden a señales de precios y condiciones locales que las autoridades centrales no pueden percibir
wrong_answers:
  - Los comerciantes privados tienen un carácter moral superior y son más dignos de confianza que los funcionarios públicos
  - El libre comercio elimina automáticamente todas las fluctuaciones del mercado y garantiza un suministro estable de cereales
  - La competencia entre comerciantes crea excedentes permanentes que benefician por igual a todas las clases sociales
explanation: |
  Los fisiócratas desarrollaron el concepto de "l'œil du maître" (el ojo del amo) para explicar cómo los agentes económicos individuales poseen un conocimiento íntimo de las condiciones locales, los patrones de demanda y la disponibilidad de recursos que ninguna autoridad central puede igualar. Argumentaban que los fenómenos económicos, especialmente en el caso de productos esenciales como el grano, operan a escalas demasiado grandes y complejas para que el poder político pueda comprenderlas. Gracias a la libertad, cada agente responde con sus propias intuiciones a señales como los precios y la competencia, dando lugar a respuestas adecuadas a los acontecimientos económicos. Las respuestas erróneas tergiversan su argumento al centrarse en la superioridad moral, los resultados perfectos del mercado o la igualdad garantizada, en lugar de en los problemas de información y coordinación que hacen imposible la planificación central.
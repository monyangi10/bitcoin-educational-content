question: Zašto su fiziokrati tvrdili da bi sloboda trgovine žitom dovela do bolje raspodele resursa nego državna kontrola?
answer: Pojedinačni agenti reaguju na cenovne signale i lokalne uslove koje centralne vlasti ne mogu da percipiraju.
wrong_answers:
  - Privatni trgovci imaju superioran moralni karakter i pouzdaniji su od državnih službenika.
  - Slobodna trgovina automatski eliminiše sve tržišne fluktuacije i garantuje stabilno snabdevanje žitaricama.
  - Konkurencija između trgovaca stvara trajne viškove koji podjednako koriste svim društvenim klasama
explanation: |
  Fiziokrati su razvili koncept 'l'œil du maître' (oko gospodara) kako bi objasnili kako pojedinačni ekonomski agenti poseduju intimno znanje o lokalnim uslovima, obrascima potražnje i dostupnosti resursa koje nijedna centralna vlast ne može da nadmaši. Tvrdili su da ekonomski fenomeni, posebno za osnovne proizvode poput žita, funkcionišu na skalama koje su prevelike i previše složene da bi ih politička moć mogla razumeti. Kroz slobodu, svaki agent reaguje svojim intuicijama na signale poput cena i konkurencije, što dovodi do odgovarajućih reakcija na ekonomske događaje. Pogrešni odgovori pogrešno predstavljaju njihov argument fokusirajući se na moralnu superiornost, savršene tržišne ishode ili zagarantovanu jednakost, umesto na probleme informacija i koordinacije koji onemogućavaju centralno planiranje.
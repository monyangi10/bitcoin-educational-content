question: Ni kuki abahinga mu vy’ubuhinga bwa none bavuga ko umwidegemvyo wo gucuruza intete wotuma haba ugutanga neza ubutunzi kuruta uko Leta igenzura?
answer: Abakozi ku giti cabo barishura ku bimenyetso vy'ibiciro no ku mibereho yo mu karere ubutegetsi bwa Leta butashobora gutahura .
wrong_answers:
  - Abacuruzi b’abikorera ku giti cabo barafise inyifato runtu iruta izindi kandi ni abo kwizigirwa kuruta abategetsi ba leta .
  - Ubucuruzi bw'ubuntu burakuraho uguhinduka kwose kw'isoko kandi bugatuma intete zidahinduka .
  - Guhiganwa hagati y'abacuruzi bituma habaho amasaranganya ahoraho agira akamaro ku bantu bose mu buryo bungana .
explanation: |
  Abanyabwenge b’ivy’ubuhinga bwa none barateguye iciyumviro c’uko ‘l’œil du maître’ (ijisho rya shebuja) kugira ngo basigure ingene abakozi b’ubutunzi ku giti cabo bafise ubumenyi bwimbitse ku bijanye n’ivyo mu karere, ingene abantu basaba, n’ukuntu ubutunzi buboneka ata butegetsi buhambaye bushobora kubigereranya. Bavuga ko ibintu vy’ubutunzi, cane cane ku bicuruzwa vy’ingenzi nk’intete, bikora ku rugero runini cane kandi rutoroshe ku buryo ubutegetsi bwa politike butashobora kubitahura. Biciye mu mwidegemvyo, umukozi wese arishura n’ivyiyumviro vyiwe bwite ku bimenyetso nk’ibiciro n’uguhiganwa, bikajana ku nyishu zibereye ku bintu vy’ubutunzi. Inyishu zitari zo ziserura nabi imvo yabo mu kwibanda ku gusumba abandi mu vy’inyifato runtu, ku ngaruka zitunganye z’isoko, canke ku kungana gushingiye ku vyemezo aho kwibanda ku ngorane z’amakuru n’uguhuza ibikorwa zituma igenamigambi ry’imbere ridashoboka.
question: 為什麼理論家認為穀物貿易自由會比國家控制帶來更好的資源分配？
answer: 個別代理人會對中央機關無法察覺的價格訊號和當地情況作出回應
wrong_answers:
  - 與政府官員相比，私人商人具有優越的道德品格，更值得信賴
  - 自由貿易自動消除所有市場波動，保證穩定的穀物供應
  - 商人之間的競爭創造了永久性的盈餘，使所有社會階級平等受益
explanation: |
  理論家提出了「主宰者的眼睛」(l'œil du maître)的概念，以解釋個人經濟代理人如何對當地條件、需求模式和資源可用性擁有中央權威無法比擬的深入瞭解。他們認為，經濟現象，尤其是像穀物這樣的必需品，其運作規模之大、複雜程度之高，是政治權力所無法理解的。透過自由，每個人都能以自己的直覺回應價格和競爭等信號，進而對經濟事件做出適當的反應。錯誤的答案歪曲了他們的論點，著重於道德優越、完美的市場結果或保證平等，而不是使中央計劃無法實現的資訊與協調問題。
question: Why did the physiocrats argue that freedom of grain trade would lead to better resource allocation than state control?
answer: Individual agents respond to price signals and local conditions that central authorities cannot perceive
wrong_answers:
  - Private traders have superior moral character and are more trustworthy than government officials
  - Free trade automatically eliminates all market fluctuations and guarantees stable grain supplies
  - Competition between traders creates permanent surpluses that benefit all social classes equally
explanation: |
  The physiocrats developed the concept of 'l'œil du maître' (the master's eye) to explain how individual economic agents possess intimate knowledge of local conditions, demand patterns, and resource availability that no central authority can match. They argued that economic phenomena, especially for essential commodities like grain, operate on scales too large and complex for political power to comprehend. Through freedom, each agent responds with their own intuitions to signals like prices and competition, leading to appropriate responses to economic events. The wrong answers misrepresent their argument by focusing on moral superiority, perfect market outcomes, or guaranteed equality rather than the information and coordination problems that make central planning impossible.
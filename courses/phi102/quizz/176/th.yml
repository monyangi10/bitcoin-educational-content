question: ทำไมพวกฟีซิโอแครตถึงโต้แย้งว่าการค้าเมล็ดพืชอย่างเสรีจะนำไปสู่การจัดสรรทรัพยากรที่ดีกว่าการควบคุมโดยรัฐ?
answer: ตัวแทนแต่ละรายตอบสนองต่อสัญญาณราคาและสภาพท้องถิ่นที่หน่วยงานกลางไม่สามารถรับรู้ได้
wrong_answers:
  - พ่อค้าเอกชนมีลักษณะทางศีลธรรมที่เหนือกว่าและน่าเชื่อถือมากกว่าเจ้าหน้าที่รัฐบาล
  - การค้าเสรีกำจัดความผันผวนของตลาดโดยอัตโนมัติและรับประกันการจัดหาธัญพืชที่มั่นคง
  - การแข่งขันระหว่างผู้ค้า สร้างส่วนเกินถาวรที่เป็นประโยชน์ต่อทุกชนชั้นในสังคมอย่างเท่าเทียมกัน
explanation: |
  พวกฟิสิโอแครตได้พัฒนาแนวคิด 'l'œil du maître' (ดวงตาของนาย) เพื่ออธิบายว่าตัวแทนทางเศรษฐกิจแต่ละรายมีความรู้ลึกซึ้งเกี่ยวกับสภาพท้องถิ่น รูปแบบความต้องการ และความพร้อมของทรัพยากรที่ไม่มีอำนาจกลางใดสามารถเทียบได้ พวกเขาโต้แย้งว่าปรากฏการณ์ทางเศรษฐกิจ โดยเฉพาะอย่างยิ่งสำหรับสินค้าจำเป็นเช่นธัญพืช ดำเนินการในระดับที่ใหญ่และซับซ้อนเกินกว่าที่อำนาจทางการเมืองจะเข้าใจได้ ผ่านเสรีภาพ ตัวแทนแต่ละรายตอบสนองด้วยสัญชาตญาณของตนเองต่อสัญญาณเช่นราคาและการแข่งขัน นำไปสู่การตอบสนองที่เหมาะสมต่อเหตุการณ์ทางเศรษฐกิจ คำตอบที่ผิดพลาดจะบิดเบือนข้อโต้แย้งของพวกเขาโดยมุ่งเน้นไปที่ความเหนือกว่าทางศีลธรรม ผลลัพธ์ของตลาดที่สมบูรณ์แบบ หรือความเท่าเทียมที่รับประกัน แทนที่จะเป็นปัญหาด้านข้อมูลและการประสานงานที่ทำให้การวางแผนจากศูนย์กลางเป็นไปไม่ได้
question: Warum argumentierten die Physiokraten, dass die Freiheit des Getreidehandels zu einer besseren Ressourcenallokation führen würde als staatliche Kontrolle?
answer: Einzelne Akteure reagieren auf Preissignale und lokale Bedingungen, die die zentralen Behörden nicht wahrnehmen können
wrong_answers:
  - Private Händler haben einen besseren moralischen Charakter und sind vertrauenswürdiger als Regierungsbeamte
  - Der freie Handel eliminiert automatisch alle Marktschwankungen und garantiert eine stabile Getreideversorgung
  - Der Wettbewerb zwischen den Händlern schafft permanente Überschüsse, die allen sozialen Schichten gleichermaßen zugute kommen
explanation: |
  Die Physiokraten entwickelten das Konzept des "l'œil du maître" (das Auge des Meisters), um zu erklären, dass die einzelnen Wirtschaftsakteure über intime Kenntnisse der lokalen Bedingungen, der Nachfragemuster und der Verfügbarkeit von Ressourcen verfügen, die keine zentrale Behörde erreichen kann. Sie argumentierten, dass wirtschaftliche Phänomene, insbesondere bei lebenswichtigen Gütern wie Getreide, auf einer Ebene ablaufen, die zu groß und komplex ist, als dass sie von der politischen Macht erfasst werden könnte. Durch die Freiheit reagiert jeder Akteur mit seiner eigenen Intuition auf Signale wie Preise und Wettbewerb, was zu angemessenen Reaktionen auf wirtschaftliche Ereignisse führt. Die falschen Antworten stellen ihr Argument falsch dar, indem sie sich auf moralische Überlegenheit, perfekte Marktergebnisse oder garantierte Gleichheit konzentrieren, anstatt auf die Informations- und Koordinationsprobleme, die eine zentrale Planung unmöglich machen.
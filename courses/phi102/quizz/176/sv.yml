question: Varför hävdade fysiokraterna att fri handel med spannmål skulle leda till bättre resursfördelning än statlig kontroll?
answer: Enskilda aktörer reagerar på prissignaler och lokala förhållanden som centrala myndigheter inte kan uppfatta
wrong_answers:
  - Privata handlare har högre moralisk karaktär och är mer pålitliga än statliga tjänstemän
  - Frihandel eliminerar automatiskt alla marknadssvängningar och garanterar stabila spannmålsleveranser
  - Konkurrens mellan handlare skapar permanenta överskott som gynnar alla samhällsklasser lika mycket
explanation: |
  Fysiokraterna utvecklade begreppet "l'œil du maître" (mästarens öga) för att förklara hur enskilda ekonomiska aktörer besitter en intim kunskap om lokala förhållanden, efterfrågemönster och resurstillgång som ingen central myndighet kan mäta sig med. De hävdade att ekonomiska fenomen, särskilt när det gäller viktiga råvaror som spannmål, verkar på skalor som är för stora och komplexa för att den politiska makten ska kunna förstå dem. Genom friheten kan varje aktör reagera med sina egna intuitioner på signaler som priser och konkurrens, vilket leder till lämpliga reaktioner på ekonomiska händelser. De felaktiga svaren förvränger sitt argument genom att fokusera på moralisk överlägsenhet, perfekta marknadsresultat eller garanterad jämlikhet snarare än de informations- och samordningsproblem som gör central planering omöjlig.
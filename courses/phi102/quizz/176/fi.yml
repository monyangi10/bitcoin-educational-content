question: Miksi fysiokraatit väittivät, että viljakaupan vapaus johtaisi parempaan resurssien kohdentamiseen kuin valtion valvonta?
answer: Yksittäiset toimijat reagoivat hintasignaaleihin ja paikallisiin olosuhteisiin, joita keskusviranomaiset eivät pysty havaitsemaan
wrong_answers:
  - Yksityisillä elinkeinonharjoittajilla on parempi moraalinen luonne ja he ovat luotettavampia kuin valtion virkamiehet
  - Vapaakauppa poistaa automaattisesti kaikki markkinavaihtelut ja takaa vakaat viljatoimitukset
  - Kauppiaiden välinen kilpailu luo pysyviä ylijäämiä, jotka hyödyttävät kaikkia yhteiskuntaluokkia tasapuolisesti
explanation: |
  Fysiokraatit kehittivät käsitteen "l'œil du maître" (isännän silmä) selittääkseen, miten yksittäisillä talouden toimijoilla on paikallisia olosuhteita, kysyntämalleja ja resurssien saatavuutta koskeva intiimi tieto, jota mikään keskusviranomainen ei voi saavuttaa. He väittivät, että taloudelliset ilmiöt, erityisesti viljan kaltaisten välttämättömien hyödykkeiden osalta, toimivat liian suurissa ja monimutkaisissa mittakaavoissa, jotta poliittinen valta voisi ymmärtää niitä. Vapauden ansiosta kukin toimija reagoi omilla intuitioillaan hintojen ja kilpailun kaltaisiin signaaleihin, mikä johtaa asianmukaisiin reaktioihin taloudellisiin tapahtumiin. Väärät vastaukset vääristelevät argumenttiaan keskittymällä moraaliseen ylivoimaisuuteen, täydellisiin markkinatuloksiin tai taattuun tasa-arvoon niiden informaatio- ja koordinointiongelmien sijaan, jotka tekevät keskussuunnittelun mahdottomaksi.
question: Защо физиократите твърдят, че свободата на търговията със зърно ще доведе до по-добро разпределение на ресурсите, отколкото държавният контрол?
answer: Индивидуалните агенти реагират на ценови сигнали и местни условия, които централните власти не могат да възприемат
wrong_answers:
  - Частните търговци имат по-добри морални качества и заслужават по-голямо доверие от държавните служители
  - Свободната търговия автоматично елиминира всички пазарни колебания и гарантира стабилни доставки на зърно
  - Конкуренцията между търговците създава постоянни излишъци, от които се възползват еднакво всички социални класи
explanation: |
  Физиократите разработват концепцията за "окото на майстора", за да обяснят как отделните икономически агенти притежават задълбочени познания за местните условия, моделите на търсене и наличието на ресурси, които не могат да бъдат сравнени с централната власт. Те твърдят, че икономическите явления, особено при основните стоки като зърното, действат в мащаби, които са твърде големи и сложни, за да могат да бъдат обхванати от политическата власт. Благодарение на свободата си всеки агент реагира със собствена интуиция на сигнали като цените и конкуренцията, което води до подходящи реакции на икономическите събития. Неправилните отговори представят погрешно своя аргумент, като се фокусират върху моралното превъзходство, перфектните пазарни резултати или гарантираното равенство, а не върху проблемите с информацията и координацията, които правят централното планиране невъзможно.
question: Perché i fisiocratici sostenevano che la libertà di commercio dei cereali avrebbe portato a una migliore allocazione delle risorse rispetto al controllo statale?
answer: I singoli agenti rispondono a segnali di prezzo e a condizioni locali che le autorità centrali non possono percepire
wrong_answers:
  - I commercianti privati hanno una moralità superiore e sono più affidabili dei funzionari pubblici
  - Il libero scambio elimina automaticamente tutte le fluttuazioni del mercato e garantisce forniture stabili di cereali
  - La concorrenza tra i commercianti crea eccedenze permanenti che vanno a beneficio di tutte le classi sociali in egual misura
explanation: |
  I fisiocratici svilupparono il concetto di "l'œil du maître" (l'occhio del padrone) per spiegare come i singoli agenti economici possiedano una conoscenza intima delle condizioni locali, dei modelli di domanda e della disponibilità di risorse che nessuna autorità centrale può eguagliare. Essi sostenevano che i fenomeni economici, soprattutto per quanto riguarda i beni di prima necessità come il grano, operano su scale troppo grandi e complesse perché il potere politico possa comprenderli. Grazie alla libertà, ogni agente risponde con le proprie intuizioni a segnali come i prezzi e la concorrenza, portando a risposte appropriate agli eventi economici. Le risposte sbagliate travisano la loro argomentazione concentrandosi sulla superiorità morale, sui risultati perfetti del mercato o sull'uguaglianza garantita piuttosto che sui problemi di informazione e coordinamento che rendono impossibile la pianificazione centrale.
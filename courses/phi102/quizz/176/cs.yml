question: Proč fyziokraté tvrdili, že svoboda obchodu s obilím povede k lepší alokaci zdrojů než státní kontrola?
answer: Jednotlivé subjekty reagují na cenové signály a místní podmínky, které centrální orgány nemohou vnímat
wrong_answers:
  - Soukromí obchodníci mají vyšší morální kvality a jsou důvěryhodnější než státní úředníci
  - Volný obchod automaticky eliminuje veškeré výkyvy na trhu a zaručuje stabilní dodávky obilí
  - Konkurence mezi obchodníky vytváří trvalé přebytky, z nichž mají stejný prospěch všechny společenské vrstvy
explanation: |
  Fyziokraté vyvinuli pojem "oko mistra" (l'œil du maître), aby vysvětlili, že jednotlivé ekonomické subjekty mají důvěrnou znalost místních podmínek, struktury poptávky a dostupnosti zdrojů, které se žádná centrální autorita nemůže rovnat. Tvrdili, že ekonomické jevy, zejména v případě základních komodit, jako je obilí, fungují v příliš velkém a složitém měřítku, než aby je politická moc mohla pochopit. Díky svobodě reaguje každý subjekt na signály, jako jsou ceny a konkurence, vlastními intuicemi, což vede k odpovídajícím reakcím na ekonomické události. Špatné odpovědi zkreslují svůj argument tím, že se zaměřují na morální nadřazenost, dokonalé výsledky trhu nebo zaručenou rovnost, a nikoli na problémy s informacemi a koordinací, které znemožňují centrální plánování.
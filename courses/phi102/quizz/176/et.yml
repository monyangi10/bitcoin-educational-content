question: Miks väitsid füsiokraadid, et teraviljakaubanduse vabadus toob kaasa parema ressursside jaotuse kui riiklik kontroll?
answer: Üksikud osalejad reageerivad hinnasignaalidele ja kohalikele tingimustele, mida keskvõimud ei suuda tajuda
wrong_answers:
  - Eraettevõtjatel on kõrgem moraal ja nad on usaldusväärsemad kui riigiametnikud
  - Vabakaubandus kõrvaldab automaatselt kõik turukõikumised ja tagab stabiilsed teraviljavarud
  - Ettevõtjate vaheline konkurents loob püsiva ülejäägi, millest saavad võrdselt kasu kõik ühiskonnaklassid
explanation: |
  Füsiokraadid töötasid välja mõiste "l'œil du maître" (peremehe silm), et selgitada, kuidas üksikud majandussubjektid omavad põhjalikke teadmisi kohalikest tingimustest, nõudlusmudelitest ja ressursside kättesaadavusest, mida ükski keskvõimuasutus ei suuda saavutada. Nad väitsid, et majandusnähtused, eriti selliste oluliste kaupade nagu teravilja puhul, toimivad liiga suurtes ja keerulistes mõõtkavades, mida poliitiline võim ei suuda mõista. Vabaduse kaudu reageerib iga toimija oma intuitsiooni abil sellistele signaalidele nagu hinnad ja konkurents, mis viib majandussündmustele asjakohase reageeringuni. Väärad vastused moonutavad oma argumenti, keskendudes pigem moraalsele üleolekule, täiuslikele turutulemustele või garanteeritud võrdsusele kui teabe- ja koordineerimisprobleemidele, mis muudavad tsentraalse planeerimise võimatuks.
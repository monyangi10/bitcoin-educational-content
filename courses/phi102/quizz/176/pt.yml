question: Porque é que os fisiocratas defendiam que a liberdade do comércio de cereais conduziria a uma melhor afetação de recursos do que o controlo estatal?
answer: Os agentes individuais respondem a sinais de preços e a condições locais que as autoridades centrais não conseguem perceber
wrong_answers:
  - Os comerciantes privados têm um carácter moral superior e são mais dignos de confiança do que os funcionários públicos
  - O comércio livre elimina automaticamente todas as flutuações do mercado e garante um abastecimento estável de cereais
  - A concorrência entre os comerciantes cria excedentes permanentes que beneficiam igualmente todas as classes sociais
explanation: |
  Os fisiocratas desenvolveram o conceito de "l'œil du maître" (o olho do mestre) para explicar como os agentes económicos individuais possuem um conhecimento íntimo das condições locais, dos padrões de procura e da disponibilidade de recursos que nenhuma autoridade central pode igualar. Argumentavam que os fenómenos económicos, especialmente no caso de bens essenciais como os cereais, operam a escalas demasiado grandes e complexas para serem compreendidas pelo poder político. Através da liberdade, cada agente responde com as suas próprias intuições a sinais como os preços e a concorrência, conduzindo a respostas adequadas aos acontecimentos económicos. As respostas erradas deturpam o seu argumento, centrando-se na superioridade moral, em resultados de mercado perfeitos ou na garantia de igualdade, em vez de se centrarem nos problemas de informação e coordenação que tornam impossível o planeamento central.
question: Kwa nini wanafizikia walibishana kwamba uhuru wa biashara ya nafaka ungesababisha mgao bora wa rasilimali kuliko udhibiti wa serikali?
answer: Mawakala binafsi huitikia ishara za bei na hali za ndani ambazo mamlaka kuu haziwezi kutambua
wrong_answers:
  - Wafanyabiashara binafsi wana tabia bora ya kimaadili na wanaaminika zaidi kuliko maafisa wa serikali.
  - Biashara huria huondoa kiotomatiki mabadiliko yote ya soko na kuhakikisha usambazaji thabiti wa nafaka
  - Ushindani kati ya wafanyabiashara huunda ziada ya kudumu inayofaidisha matabaka yote ya kijamii kwa usawa
explanation: |
  Wanafiziokrasia waliunda dhana ya 'l'œil du maître' (jicho la bwana) ili kuelezea jinsi mawakala wa kiuchumi binafsi wanavyo na ujuzi wa kina wa hali za ndani, mifumo ya mahitaji, na upatikanaji wa rasilimali ambazo hakuna mamlaka kuu inayoweza kuzilinganisha. Walisema kwamba matukio ya kiuchumi, hasa kwa bidhaa muhimu kama nafaka, hufanya kazi kwa mizani kubwa sana na ngumu kwa nguvu ya kisiasa kuelewa. Kupitia uhuru, kila mawakala hujibu kwa hisia zake mwenyewe kwa ishara kama vile bei na ushindani, na kusababisha majibu sahihi kwa matukio ya kiuchumi. Majibu yasiyo sahihi hupotosha hoja yao kwa kuzingatia ubora wa maadili, matokeo kamili ya soko, au usawa uliohakikishwa badala ya matatizo ya habari na uratibu ambayo hufanya upangaji mkuu usiwezekane.
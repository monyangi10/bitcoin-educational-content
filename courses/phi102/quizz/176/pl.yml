question: Dlaczego fizjokraci twierdzili, że wolność handlu zbożem doprowadzi do lepszej alokacji zasobów niż kontrola państwa?
answer: Poszczególne podmioty reagują na sygnały cenowe i warunki lokalne, których władze centralne nie są w stanie dostrzec
wrong_answers:
  - Prywatni przedsiębiorcy mają lepszy charakter moralny i są bardziej godni zaufania niż urzędnicy państwowi
  - Wolny handel automatycznie eliminuje wszelkie wahania rynkowe i gwarantuje stabilne dostawy zboża
  - Konkurencja między handlowcami tworzy stałe nadwyżki, z których korzystają w równym stopniu wszystkie klasy społeczne
explanation: |
  Fizjokraci opracowali koncepcję "l'œil du maître" (oka mistrza), aby wyjaśnić, w jaki sposób poszczególne podmioty gospodarcze posiadają dogłębną wiedzę na temat lokalnych warunków, wzorców popytu i dostępności zasobów, której nie może dorównać żadna władza centralna. Argumentowali, że zjawiska gospodarcze, zwłaszcza w przypadku podstawowych towarów, takich jak zboże, działają na zbyt dużą i złożoną skalę, aby władza polityczna mogła je zrozumieć. Dzięki wolności każdy agent reaguje własnymi intuicjami na sygnały takie jak ceny i konkurencja, co prowadzi do odpowiednich reakcji na wydarzenia gospodarcze. Błędne odpowiedzi błędnie przedstawiają ich argumenty, koncentrując się na moralnej wyższości, doskonałych wynikach rynkowych lub gwarantowanej równości, a nie na problemach z informacją i koordynacją, które uniemożliwiają centralne planowanie.
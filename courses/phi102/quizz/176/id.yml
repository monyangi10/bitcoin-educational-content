question: Mengapa kaum fisiokrat berpendapat bahwa kebebasan perdagangan biji-bijian akan menghasilkan alokasi sumber daya yang lebih baik daripada kontrol negara?
answer: Agen individu merespons sinyal harga dan kondisi lokal yang tidak dapat dilihat oleh otoritas pusat
wrong_answers:
  - Pedagang swasta memiliki karakter moral yang lebih unggul dan lebih dapat dipercaya daripada pejabat pemerintah
  - Perdagangan bebas secara otomatis menghilangkan semua fluktuasi pasar dan menjamin pasokan biji-bijian yang stabil
  - Persaingan antar pedagang menciptakan surplus permanen yang menguntungkan semua kelas sosial secara merata
explanation: |
  Kaum fisiokrat mengembangkan konsep 'l'œil du maître' (mata tuan) untuk menjelaskan bagaimana pelaku ekonomi individu memiliki pengetahuan mendalam tentang kondisi lokal, pola permintaan, dan ketersediaan sumber daya yang tidak dapat ditandingi oleh otoritas pusat. Mereka berargumen bahwa fenomena ekonomi, terutama untuk komoditas penting seperti biji-bijian, beroperasi dalam skala yang terlalu besar dan kompleks untuk dipahami oleh kekuatan politik. Melalui kebebasan, setiap pelaku pasar merespons dengan intuisi mereka sendiri terhadap sinyal-sinyal seperti harga dan persaingan, yang mengarah pada respons yang tepat terhadap peristiwa-peristiwa ekonomi. Jawaban yang salah salah menggambarkan argumen mereka dengan berfokus pada superioritas moral, hasil pasar yang sempurna, atau jaminan kesetaraan, bukan pada masalah informasi dan koordinasi yang membuat perencanaan terpusat menjadi tidak mungkin.
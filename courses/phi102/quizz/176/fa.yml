question: چرا فیزیوکرات‌ها استدلال کردند که آزادی تجارت غلات به تخصیص بهتر منابع نسبت به کنترل دولتی منجر می‌شود؟
answer: عوامل فردی به سیگنال‌های قیمتی و شرایط محلی پاسخ می‌دهند که مقامات مرکزی نمی‌توانند درک کنند.
wrong_answers:
  - بازرگانان خصوصی دارای شخصیت اخلاقی برتری هستند و نسبت به مقامات دولتی قابل اعتمادترند.
  - تجارت آزاد به طور خودکار تمام نوسانات بازار را از بین می‌برد و عرضه پایدار غلات را تضمین می‌کند.
  - رقابت بین معامله‌گران مازاد دائمی ایجاد می‌کند که به طور مساوی به نفع همه طبقات اجتماعی است.
explanation: |
  فیزیوکرات‌ها مفهوم 'l'œil du maître' (چشم استاد) را توسعه دادند تا توضیح دهند که چگونه عوامل اقتصادی فردی دارای دانش عمیق از شرایط محلی، الگوهای تقاضا و دسترسی به منابع هستند که هیچ مرجع مرکزی نمی‌تواند با آن مطابقت کند. آن‌ها استدلال کردند که پدیده‌های اقتصادی، به ویژه برای کالاهای اساسی مانند غلات، در مقیاس‌هایی بسیار بزرگ و پیچیده عمل می‌کنند که قدرت سیاسی قادر به درک آن نیست. از طریق آزادی، هر عامل با شهود خود به سیگنال‌هایی مانند قیمت‌ها و رقابت پاسخ می‌دهد و منجر به واکنش‌های مناسب به رویدادهای اقتصادی می‌شود. پاسخ‌های نادرست استدلال آن‌ها را با تمرکز بر برتری اخلاقی، نتایج کامل بازار، یا برابری تضمین‌شده به جای مشکلات اطلاعات و هماهنگی که برنامه‌ریزی مرکزی را غیرممکن می‌سازد، نادرست نشان می‌دهند.
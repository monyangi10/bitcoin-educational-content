question: Fizyokratlar neden tahıl ticareti özgürlüğünün devlet kontrolünden daha iyi kaynak tahsisine yol açacağını savunuyorlardı?
answer: Bireysel aktörler, merkezi otoritelerin algılayamadığı fiyat sinyallerine ve yerel koşullara yanıt verir
wrong_answers:
  - Özel tüccarlar üstün ahlaki karaktere sahiptir ve devlet memurlarından daha güvenilirdir
  - Serbest ticaret tüm piyasa dalgalanmalarını otomatik olarak ortadan kaldırır ve istikrarlı tahıl arzını garanti eder
  - Tüccarlar arasındaki rekabet, tüm sosyal sınıflara eşit fayda sağlayan kalıcı fazlalıklar yaratır
explanation: |
  Fizyokratlar 'l'œil du maître' (ustanın gözü) kavramını geliştirerek, bireysel ekonomik aktörlerin yerel koşullar, talep kalıpları ve kaynak mevcudiyeti hakkında hiçbir merkezi otoritenin sahip olamayacağı yakın bilgiye nasıl sahip olduklarını açıklamaya çalışmışlardır. Ekonomik olguların, özellikle de tahıl gibi temel mallar için, siyasi iktidarın kavrayamayacağı kadar büyük ve karmaşık ölçeklerde işlediğini savunmuşlardır. Özgürlük sayesinde her bir aktör, fiyatlar ve rekabet gibi sinyallere kendi sezgileriyle yanıt verir ve bu da ekonomik olaylara uygun tepkiler verilmesine yol açar. Yanlış cevaplar, merkezi planlamayı imkansız kılan bilgi ve koordinasyon sorunları yerine ahlaki üstünlüğe, mükemmel piyasa sonuçlarına veya garantili eşitliğe odaklanarak argümanlarını yanlış yansıtmaktadır.
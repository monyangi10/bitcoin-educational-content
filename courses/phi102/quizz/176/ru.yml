question: Почему физиократы утверждали, что свобода торговли зерном приведет к лучшему распределению ресурсов, чем государственный контроль?
answer: Индивидуальные агенты реагируют на ценовые сигналы и местные условия, которые не могут воспринимать центральные власти
wrong_answers:
  - Частные торговцы обладают более высокими моральными качествами и заслуживают большего доверия, чем государственные служащие
  - Свободная торговля автоматически устраняет все колебания рынка и гарантирует стабильные поставки зерна
  - Конкуренция между торговцами создает постоянный излишек, от которого в равной степени выигрывают все социальные классы
explanation: |
  Физиократы разработали концепцию "глаза хозяина" (l'œil du maître), чтобы объяснить, как отдельные экономические агенты обладают глубокими знаниями о местных условиях, структуре спроса и наличии ресурсов, с которыми не может сравниться ни одна центральная власть. Они утверждали, что экономические явления, особенно в отношении таких товаров первой необходимости, как зерно, происходят в масштабах, слишком больших и сложных для того, чтобы политическая власть могла их постичь. Благодаря свободе каждый агент реагирует на такие сигналы, как цены и конкуренция, руководствуясь собственной интуицией, что приводит к адекватной реакции на экономические события. Неправильные ответы искажают аргументацию, делая акцент на моральном превосходстве, идеальных рыночных результатах или гарантированном равенстве, а не на проблемах информации и координации, которые делают невозможным централизованное планирование.
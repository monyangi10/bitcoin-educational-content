question: Pourquoi les physiocrates affirmaient-ils que la liberté du commerce des céréales permettrait une meilleure répartition des ressources que le contrôle de l'État ?
answer: Les agents individuels réagissent aux signaux de prix et aux conditions locales que les autorités centrales ne peuvent pas percevoir
wrong_answers:
  - Les commerçants privés ont une moralité supérieure et sont plus dignes de confiance que les fonctionnaires
  - Le libre-échange élimine automatiquement toutes les fluctuations du marché et garantit la stabilité de l'approvisionnement en céréales
  - La concurrence entre les commerçants crée des excédents permanents qui profitent à toutes les classes sociales de manière égale
explanation: |
  Les physiocrates ont développé le concept de "l'œil du maître" pour expliquer comment les agents économiques individuels possèdent une connaissance intime des conditions locales, des modèles de demande et de la disponibilité des ressources qu'aucune autorité centrale ne peut égaler. Selon eux, les phénomènes économiques, en particulier pour les produits de base comme les céréales, opèrent à des échelles trop grandes et trop complexes pour que le pouvoir politique puisse les appréhender. Grâce à la liberté, chaque agent réagit avec ses propres intuitions à des signaux tels que les prix et la concurrence, ce qui conduit à des réponses appropriées aux événements économiques. Les mauvaises réponses déforment leur argument en mettant l'accent sur la supériorité morale, les résultats parfaits du marché ou l'égalité garantie plutôt que sur les problèmes d'information et de coordination qui rendent la planification centrale impossible.
question: Waarom beweerden de fysiocraten dat vrije graanhandel zou leiden tot een betere toewijzing van hulpbronnen dan staatscontrole?
answer: Individuele agenten reageren op prijssignalen en lokale omstandigheden die centrale autoriteiten niet kunnen waarnemen
wrong_answers:
  - Particuliere handelaren hebben een superieur moreel karakter en zijn betrouwbaarder dan overheidsfunctionarissen
  - Vrije handel elimineert automatisch alle marktschommelingen en garandeert een stabiele graanbevoorrading
  - Concurrentie tussen handelaren creëert permanente overschotten die alle sociale klassen gelijkelijk ten goede komen
explanation: |
  De fysiocraten ontwikkelden het concept van 'l'œil du maître' (het oog van de meester) om uit te leggen hoe individuele economische agenten een grondige kennis hebben van lokale omstandigheden, vraagpatronen en de beschikbaarheid van grondstoffen die geen centrale autoriteit kan evenaren. Ze stelden dat economische fenomenen, vooral voor essentiële goederen zoals graan, op schalen werken die te groot en complex zijn om door de politieke macht begrepen te worden. Door de vrijheid reageert elke agent met zijn eigen intuïties op signalen zoals prijzen en concurrentie, wat leidt tot passende reacties op economische gebeurtenissen. De foute antwoorden geven een verkeerd beeld van hun argument door te focussen op morele superioriteit, perfecte marktresultaten of gegarandeerde gelijkheid in plaats van de informatie- en coördinatieproblemen die centrale planning onmogelijk maken.
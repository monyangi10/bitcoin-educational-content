question: Tại sao trường phái kinh tế trọng nông lại cho rằng tự do buôn bán ngũ cốc sẽ dẫn đến phân bổ nguồn lực hiệu quả hơn so với sự kiểm soát của nhà nước?
answer: Các tác nhân riêng lẻ phản ứng với tín hiệu giá cả và điều kiện địa phương mà chính quyền trung ương không thể nhận biết được.
wrong_answers:
  - Các thương nhân tư nhân có phẩm chất đạo đức cao hơn và đáng tin cậy hơn các quan chức chính phủ.
  - Thương mại tự do tự động loại bỏ mọi biến động thị trường và đảm bảo nguồn cung ngũ cốc ổn định.
  - Cạnh tranh giữa các thương nhân tạo ra thặng dư bền vững, mang lại lợi ích bình đẳng cho mọi tầng lớp xã hội.
explanation: |
  Trường phái kinh tế trọng nông đã phát triển khái niệm "l'œil du maître" (con mắt của bậc thầy) để giải thích cách các tác nhân kinh tế cá nhân sở hữu kiến thức sâu sắc về điều kiện địa phương, mô hình nhu cầu và nguồn lực sẵn có mà không một cơ quan trung ương nào có thể sánh kịp. Họ lập luận rằng các hiện tượng kinh tế, đặc biệt là đối với các mặt hàng thiết yếu như ngũ cốc, hoạt động trên quy mô quá lớn và phức tạp để quyền lực chính trị có thể hiểu được. Thông qua tự do, mỗi tác nhân phản ứng bằng trực giác của riêng mình đối với các tín hiệu như giá cả và cạnh tranh, dẫn đến những phản ứng thích hợp đối với các sự kiện kinh tế. Những câu trả lời sai lệch đã xuyên tạc lập luận của họ bằng cách tập trung vào sự ưu việt về mặt đạo đức, kết quả thị trường hoàn hảo hoặc sự bình đẳng được đảm bảo, thay vì các vấn đề về thông tin và phối hợp khiến việc lập kế hoạch tập trung trở nên bất khả thi.
question: 为什么重农主义者认为谷物贸易自由比国家控制能更好地分配资源？
answer: 个体行为主体对价格信号和地方条件做出反应，而中央政府无法感知这些信号和条件
wrong_answers:
  - 与政府官员相比，私人商人品德高尚，更值得信赖
  - 自由贸易自动消除所有市场波动，保证稳定的粮食供应
  - 商人之间的竞争创造了永久性盈余，使所有社会阶层平等受益
explanation: |
  重农学派提出了 "大师之眼"（l'œil du maître）的概念，以解释个体经济主体如何对当地条件、需求模式和资源可用性拥有中央权威无法比拟的深刻了解。他们认为，经济现象，尤其是谷物等必需品的经济现象，其运作的规模和复杂程度是政治权力所无法理解的。通过自由，每个人都能以自己的直觉对价格和竞争等信号做出反应，从而对经济事件做出适当的回应。错误的答案歪曲了他们的论点，把重点放在道德优越性、完美的市场结果或保证平等上，而不是放在使中央计划不可能实现的信息和协调问题上。
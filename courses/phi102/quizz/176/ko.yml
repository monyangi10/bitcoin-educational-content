question: 생리학자들은 왜 곡물 거래의 자유가 국가 통제보다 더 나은 자원 배분으로 이어질 것이라고 주장했을까요?
answer: 개별 에이전트는 중앙 당국이 인지할 수 없는 가격 신호와 현지 상황에 대응합니다
wrong_answers:
  - 개인 트레이더는 정부 공무원보다 도덕성이 뛰어나고 더 신뢰할 수 있습니다
  - 자유 무역은 모든 시장 변동을 자동으로 제거하고 안정적인 곡물 공급을 보장합니다
  - 트레이더 간의 경쟁은 모든 사회 계층에 동등하게 이익이 되는 영구적인 잉여를 창출합니다
explanation: |
  피지리학자들은 개별 경제 주체들이 지역 상황, 수요 패턴, 자원 가용성에 대해 중앙 권력이 따라잡을 수 없는 밀접한 지식을 보유하고 있다는 점을 설명하기 위해 '주인의 눈'이라는 개념을 개발했습니다. 이들은 특히 곡물과 같은 필수 상품의 경우 경제 현상은 정치권력이 이해하기에는 너무 크고 복잡한 규모로 작동한다고 주장했습니다. 각 주체들은 자유를 통해 가격이나 경쟁과 같은 신호에 각자의 직관에 따라 반응하고, 경제 현상에 적절히 대응할 수 있습니다. 오답은 중앙 계획을 불가능하게 만드는 정보 및 조정 문제보다는 도덕적 우월성, 완벽한 시장 결과 또는 보장된 평등에 초점을 맞추어 주장을 잘못 표현합니다.
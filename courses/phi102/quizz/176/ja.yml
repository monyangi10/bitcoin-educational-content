question: なぜフィジオクラートは、穀物貿易の自由が国家統制よりも優れた資源配分につながると主張したのか？
answer: 個々のエージェントは、中央当局が感知できない価格シグナルや地域の状況に反応する。
wrong_answers:
  - 民間の商人はモラルに優れ、政府役人よりも信頼できる。
  - 自由貿易は市場の変動を自動的に排除し、安定した穀物供給を保証する。
  - 業者間の競争は、すべての社会階層に等しく利益をもたらす恒常的な余剰を生み出す。
explanation: |
  フィジオクラートたちは、個々の経済主体が、中央権力には及ばないような地域の状況、需要パターン、資源の利用可能性に関する深い知識を持っていることを説明するために、「主人の目（l'œil du maître）」という概念を開発した。彼らは、経済現象、特に穀物のような必需品は、政治権力には理解できないほど大きく複雑なスケールで動いていると主張した。自由を通じて、各エージェントは価格や競争のようなシグナルに自らの直感で反応し、経済的な出来事への適切な対応を導く。間違った答えは、中央計画を不可能にする情報や協調の問題ではなく、道徳的優越性、完全な市場結果、保証された平等に焦点を当てることで、彼らの主張を誤って伝えている。
question: Hvorfor argumenterte fysiokratene for at fri handel med korn ville føre til bedre ressursallokering enn statlig kontroll?
answer: Individuelle aktører reagerer på prissignaler og lokale forhold som sentrale myndigheter ikke kan oppfatte
wrong_answers:
  - Private næringsdrivende har høyere moral og er mer pålitelige enn offentlige tjenestemenn
  - Frihandel eliminerer automatisk alle markedssvingninger og garanterer stabile kornforsyninger
  - Konkurransen mellom næringsdrivende skaper permanente overskudd som kommer alle samfunnsklasser til gode
explanation: |
  Fysiokratene utviklet begrepet "l'œil du maître" (mesterens øye) for å forklare hvordan individuelle økonomiske aktører besitter en intim kunnskap om lokale forhold, etterspørselsmønstre og ressurstilgang som ingen sentral myndighet kan matche. De hevdet at økonomiske fenomener, særlig når det gjelder viktige råvarer som korn, opererer på en skala som er for stor og kompleks til at den politiske makten kan forstå den. Gjennom frihet reagerer hver enkelt aktør med sine egne intuisjoner på signaler som priser og konkurranse, noe som fører til hensiktsmessige reaksjoner på økonomiske hendelser. De gale svarene fordreier argumentasjonen ved å fokusere på moralsk overlegenhet, perfekte markedsresultater eller garantert likhet i stedet for de informasjons- og koordineringsproblemene som gjør sentral planlegging umulig.
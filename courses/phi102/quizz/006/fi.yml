question: Mikä on ranskalaisten liberaalien ajattelijoiden mukaan suurin ongelma siinä, että vapaus jaetaan eri kategorioihin (poliittinen vs. taloudellinen vapaus)?
answer: Se luo loogista epäjohdonmukaisuutta soveltamalla yksilön valinnanvapauden periaatteita valikoivasti
wrong_answers:
  - Se tekee taloudellisesta vapaudesta poliittista vapautta tärkeämmän
  - Se estää hallituksia sääntelemästä markkinoita tehokkaasti
  - Se poistaa kokonaan mahdollisuuden kollektiiviseen päätöksentekoon
explanation: |
  Ranskalaisen liberaalin perinteen mukaan vapauden jakaminen "hyviin" kategorioihin (kuten poliittinen vapaus) ja "huonoihin" kategorioihin (kuten taloudellinen vapaus) luo perustavanlaatuisen loogisen epäjohdonmukaisuuden. Samat periaatteet, joilla perustellaan uskonnollinen suvaitsevaisuus ja yleinen äänioikeus - nimittäin yksilön kyky tehdä valintoja - pitäisi loogisesti ulottaa myös taloudellisiin päätöksiin. Tällainen pirstaloituminen supistaa vapauden pelkkään poliittisten johtajien ajoittaiseen valintaan ja jättää huomiotta sen, että yksilön valinnanvapauden taustalla olevat periaatteet ovat yleismaailmallisia ja että niitä pitäisi soveltaa johdonmukaisesti kaikilla ihmisen toiminnan aloilla.
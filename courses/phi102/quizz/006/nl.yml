question: Wat is volgens Franse liberale denkers het grootste probleem met het opsplitsen van vrijheid in verschillende categorieën (politieke versus economische vrijheid)?
answer: Het creëert logische inconsistentie door principes van individuele keuze selectief toe te passen
wrong_answers:
  - Het maakt economische vrijheid belangrijker dan politieke vrijheid
  - Het verhindert overheden om markten effectief te reguleren
  - Het elimineert de mogelijkheid van collectieve besluitvorming volledig
explanation: |
  De Franse liberale traditie stelt dat het scheiden van vrijheid in 'goede' categorieën (zoals politieke vrijheid) en 'slechte' categorieën (zoals economische vrijheid) een fundamentele logische inconsistentie creëert. Dezelfde principes die religieuze tolerantie en algemeen kiesrecht rechtvaardigen - namelijk het vermogen van het individu om te kiezen - zouden zich logischerwijs ook moeten uitstrekken tot economische beslissingen. Door deze fragmentatie wordt vrijheid gereduceerd tot het slechts periodiek kiezen van politieke leiders, terwijl voorbij wordt gegaan aan het feit dat de principes die ten grondslag liggen aan individuele keuze universeel zijn en consistent van toepassing zouden moeten zijn op alle gebieden van menselijk handelen.
question: Secondo i pensatori liberali francesi, qual è il problema principale della frammentazione della libertà in diverse categorie (libertà politica e libertà economica)?
answer: Crea un'incoerenza logica applicando i principi della scelta individuale in modo selettivo
wrong_answers:
  - Rende la libertà economica più importante della libertà politica
  - Impedisce ai governi di regolare efficacemente i mercati
  - Elimina del tutto la possibilità di un processo decisionale collettivo
explanation: |
  La tradizione liberale francese sostiene che separare la libertà in categorie "buone" (come la libertà politica) e "cattive" (come la libertà economica) crea una fondamentale incoerenza logica. Gli stessi principi che giustificano la tolleranza religiosa e il suffragio universale - ovvero la capacità di scelta dell'individuo - dovrebbero logicamente estendersi anche alle decisioni economiche. Questa frammentazione riduce la libertà alla mera scelta periodica dei leader politici, ignorando che i principi alla base della scelta individuale sono universali e dovrebbero essere applicati in modo coerente in tutte le sfere dell'azione umana.
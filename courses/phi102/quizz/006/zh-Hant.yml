question: 根據法國自由主義思想家的看法，將自由分割成不同類別（政治自由 vs 經濟自由）的主要問題是什麼？
answer: 選擇性地應用個人選擇的原則，造成邏輯上的不一致
wrong_answers:
  - 它讓經濟自由比政治自由更重要
  - 它使政府無法有效地規管市場
  - 它完全消除了集體決策的可能性
explanation: |
  法國自由主義傳統認為，將自由分為「好」的類別（如政治自由）和「壞」的類別（如經濟自由），會造成基本的邏輯不一致。證明宗教容忍與普選權合理的原則，也就是個人的選擇能力，在邏輯上也應該延伸到經濟決策上。這種分割將自由貶低為只是定期選擇政治領袖，卻忽略了個人選擇的基本原則是普遍的，應該一致地適用於人類行動的所有領域。
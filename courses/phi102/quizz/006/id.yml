question: Menurut para pemikir liberal Prancis, apa masalah utama dengan memecah kebebasan menjadi beberapa kategori (kebebasan politik vs kebebasan ekonomi)?
answer: Ini menciptakan ketidakkonsistenan logis dengan menerapkan prinsip-prinsip pilihan individu secara selektif
wrong_answers:
  - Hal ini membuat kebebasan ekonomi lebih penting daripada kebebasan politik
  - Hal ini mencegah pemerintah untuk mengatur pasar secara efektif
  - Ini menghilangkan kemungkinan pengambilan keputusan kolektif sepenuhnya
explanation: |
  Tradisi liberal Prancis berpendapat bahwa memisahkan kebebasan ke dalam kategori 'baik' (seperti kebebasan politik) dan 'buruk' (seperti kebebasan ekonomi) menciptakan ketidakkonsistenan logis yang mendasar. Prinsip-prinsip yang sama yang membenarkan toleransi beragama dan hak pilih universal - yaitu kapasitas individu untuk memilih - secara logis harus diperluas ke keputusan ekonomi juga. Fragmentasi ini mereduksi kebebasan menjadi sekadar memilih pemimpin politik secara berkala, sementara mengabaikan bahwa prinsip-prinsip yang mendasari pilihan individu bersifat universal dan harus diterapkan secara konsisten di semua bidang tindakan manusia.
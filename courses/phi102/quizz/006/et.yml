question: Milline on Prantsuse liberaalsete mõtlejate arvates peamine probleem vabaduse killustamisel eri kategooriatesse (poliitiline vs. majanduslik vabadus)?
answer: See tekitab loogilist ebajärjekindlust, kohaldades valikuliselt individuaalse valiku põhimõtteid
wrong_answers:
  - See muudab majandusliku vabaduse tähtsamaks kui poliitilise vabaduse
  - See takistab valitsustel turgude tõhusat reguleerimist
  - See välistab täielikult kollektiivse otsustamise võimaluse
explanation: |
  Prantsuse liberaalne traditsioon väidab, et vabaduse jagamine "headeks" kategooriateks (nagu poliitiline vabadus) ja "halbadeks" kategooriateks (nagu majanduslik vabadus) tekitab põhimõttelise loogilise vastuolu. Samad põhimõtted, mis õigustavad usulist sallivust ja üldist valimisõigust - nimelt üksikisiku valikuvõime - peaksid loogiliselt laienema ka majanduslikele otsustele. Selline killustatus taandab vabaduse pelgalt poliitiliste juhtide perioodiliseks valimiseks, jättes samas tähelepanuta, et individuaalse valiku aluseks olevad põhimõtted on universaalsed ja peaksid kehtima järjepidevalt kõigis inimtegevuse valdkondades.
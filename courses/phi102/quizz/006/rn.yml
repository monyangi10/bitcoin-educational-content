question: Nk’uko abafaransa biyumvira mu vy’ubwigenge babivuga, ni ikihe kibazo nyamukuru co gucapura umwidegemvyo mu mice itandukanye (umwidegemvyo wa politike n’uw’ubutunzi)?
answer: Bituma habaho ukudahuza guhuye n’ubwenge mu gushira mu ngiro ingingo ngenderwako z’uguhitamwo kw’umuntu ku giti ciwe mu buryo butoranijwe .
wrong_answers:
  - Bituma umwidegemvyo wo mu vy'ubutunzi uba uwuhambaye kuruta umwidegemvyo wo mu vya politike .
  - Bibuza intwaro gutunganya neza amasoko .
  - Bikuraho ubushobozi bwo gufata ingingo rusangi burundu .
explanation: |
  Umugenzo w’ubwigenge bw’Abafaransa uvuga ko gutandukanya umwidegemvyo mu mice ‘myiza’ (nk’umwidegemvyo wa politike) n’imice ‘mbi’ (nk’umwidegemvyo w’ubutunzi) bituma habaho ukudahuza kw’ishimikiro kw’ubwenge. Izo ngingo ngenderwako nyene zituma umuntu wese yihanganira idini n’uburenganzira bwo gutora - ni ukuvuga ubushobozi bw’umuntu bwo guhitamwo - zikwiye gushika no ku ngingo z’ubutunzi. Ukwo guca ibice kugabanya umwidegemvyo wo guhitamwo gusa abarongozi ba politike mu bihe bitandukanye, mu gihe umuntu yirengagiza ko ingingo ngenderwako zishingiye ku guhitamwo kw’umuntu ku giti ciwe ari izo kw’isi yose kandi ko zikwiye gukurikizwa mu buryo budahinduka mu nzego zose z’ibikorwa vy’umuntu.
question: Hva er ifølge franske liberale tenkere hovedproblemet med å dele opp friheten i ulike kategorier (politisk vs. økonomisk frihet)?
answer: Den skaper logisk inkonsistens ved å anvende prinsipper om individuelle valg selektivt
wrong_answers:
  - Det gjør økonomisk frihet viktigere enn politisk frihet
  - Det hindrer myndighetene i å regulere markedene effektivt
  - Det eliminerer muligheten for kollektiv beslutningstaking fullstendig
explanation: |
  Den franske liberale tradisjonen hevder at det å dele frihet inn i "gode" kategorier (som politisk frihet) og "dårlige" kategorier (som økonomisk frihet) skaper en grunnleggende logisk inkonsekvens. De samme prinsippene som ligger til grunn for religiøs toleranse og allmenn stemmerett - nemlig individets evne til å velge - bør logisk sett også gjelde for økonomiske beslutninger. Denne fragmenteringen reduserer friheten til kun å gjelde valg av politiske ledere med jevne mellomrom, samtidig som man ignorerer at prinsippene som ligger til grunn for individuelle valg, er universelle og bør gjelde konsekvent på alle områder av menneskelig handling.
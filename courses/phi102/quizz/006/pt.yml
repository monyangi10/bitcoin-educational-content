question: Segundo os pensadores liberais franceses, qual é o principal problema da fragmentação da liberdade em diferentes categorias (liberdade política vs liberdade económica)?
answer: Cria uma incoerência lógica ao aplicar seletivamente os princípios da escolha individual
wrong_answers:
  - Torna a liberdade económica mais importante do que a liberdade política
  - Impede que os governos regulem os mercados de forma eficaz
  - Elimina totalmente a possibilidade de uma tomada de decisão colectiva
explanation: |
  A tradição liberal francesa argumenta que a separação da liberdade em categorias "boas" (como a liberdade política) e "más" (como a liberdade económica) cria uma inconsistência lógica fundamental. Os mesmos princípios que justificam a tolerância religiosa e o sufrágio universal - nomeadamente, a capacidade de escolha do indivíduo - devem logicamente estender-se também às decisões económicas. Esta fragmentação reduz a liberdade à mera escolha periódica de líderes políticos, ignorando que os princípios subjacentes à escolha individual são universais e devem ser aplicados de forma coerente em todas as esferas da ação humana.
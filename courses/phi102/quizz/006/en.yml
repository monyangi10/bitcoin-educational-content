question: According to French liberal thinkers, what is the main problem with fragmenting liberty into different categories (political vs economic freedom)?
answer: It creates logical inconsistency by applying principles of individual choice selectively
wrong_answers:
  - It makes economic freedom more important than political freedom
  - It prevents governments from regulating markets effectively
  - It eliminates the possibility of collective decision-making entirely
explanation: |
  The French liberal tradition argues that separating liberty into 'good' categories (like political freedom) and 'bad' categories (like economic freedom) creates fundamental logical inconsistency. The same principles that justify religious tolerance and universal suffrage - namely, the individual's capacity for choice - should logically extend to economic decisions as well. This fragmentation reduces liberty to merely choosing political leaders periodically, while ignoring that the principles underlying individual choice are universal and should apply consistently across all spheres of human action.

question: Vad är enligt franska liberala tänkare det största problemet med att dela upp friheten i olika kategorier (politisk kontra ekonomisk frihet)?
answer: Den skapar logisk inkonsekvens genom att tillämpa principerna om individuella val selektivt
wrong_answers:
  - Den ekonomiska friheten blir viktigare än den politiska friheten
  - Det hindrar regeringar från att reglera marknader på ett effektivt sätt
  - Det eliminerar helt och hållet möjligheten till kollektivt beslutsfattande
explanation: |
  I den franska liberala traditionen hävdas att en uppdelning av friheten i "goda" kategorier (som politisk frihet) och "dåliga" kategorier (som ekonomisk frihet) skapar en grundläggande logisk inkonsekvens. Samma principer som motiverar religiös tolerans och allmän rösträtt - nämligen individens förmåga att välja - borde logiskt sett även gälla ekonomiska beslut. Denna fragmentering reducerar friheten till att enbart handla om att välja politiska ledare med jämna mellanrum, samtidigt som man bortser från att de principer som ligger till grund för individens val är universella och bör tillämpas konsekvent inom alla områden av mänskligt handlande.
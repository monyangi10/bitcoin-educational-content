question: Was ist nach Ansicht französischer liberaler Denker das Hauptproblem bei der Aufteilung der Freiheit in verschiedene Kategorien (politische und wirtschaftliche Freiheit)?
answer: Sie schafft logische Widersprüche, indem sie die Grundsätze der individuellen Wahl selektiv anwendet
wrong_answers:
  - Sie macht die wirtschaftliche Freiheit wichtiger als die politische Freiheit
  - Sie hindert Regierungen daran, Märkte wirksam zu regulieren
  - Die Möglichkeit einer kollektiven Entscheidungsfindung wird dadurch vollständig ausgeschlossen
explanation: |
  Die französische liberale Tradition argumentiert, dass die Unterteilung der Freiheit in "gute" Kategorien (wie die politische Freiheit) und "schlechte" Kategorien (wie die wirtschaftliche Freiheit) zu einer grundlegenden logischen Inkonsistenz führt. Die gleichen Grundsätze, die religiöse Toleranz und das allgemeine Wahlrecht rechtfertigen - nämlich die Wahlfreiheit des Einzelnen - sollten logischerweise auch für wirtschaftliche Entscheidungen gelten. Diese Aufsplitterung reduziert die Freiheit auf die periodische Wahl der politischen Führer und ignoriert dabei, dass die Grundsätze, die der individuellen Wahl zugrunde liegen, universell sind und in allen Bereichen menschlichen Handelns einheitlich gelten sollten.
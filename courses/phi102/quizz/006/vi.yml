question: Theo các nhà tư tưởng tự do Pháp, vấn đề chính của việc phân chia tự do thành các phạm trù khác nhau (tự do chính trị so với tự do kinh tế) là gì?
answer: Nó tạo ra sự mâu thuẫn logic bằng cách áp dụng các nguyên tắc lựa chọn cá nhân một cách có chọn lọc.
wrong_answers:
  - Điều đó khiến tự do kinh tế trở nên quan trọng hơn tự do chính trị.
  - Nó ngăn cản các chính phủ điều tiết thị trường một cách hiệu quả.
  - Nó loại bỏ hoàn toàn khả năng ra quyết định tập thể.
explanation: |
  Truyền thống tự do Pháp cho rằng việc phân chia tự do thành các loại "tốt" (như tự do chính trị) và "xấu" (như tự do kinh tế) tạo ra sự mâu thuẫn logic cơ bản. Những nguyên tắc tương tự biện minh cho sự khoan dung tôn giáo và quyền bầu cử phổ thông - cụ thể là khả năng lựa chọn của cá nhân - về mặt logic cũng phải được mở rộng đến các quyết định kinh tế. Sự phân mảnh này thu hẹp tự do chỉ còn là việc lựa chọn các nhà lãnh đạo chính trị định kỳ, trong khi bỏ qua rằng các nguyên tắc làm nền tảng cho sự lựa chọn cá nhân là phổ quát và phải được áp dụng nhất quán trong mọi lĩnh vực hoạt động của con người.
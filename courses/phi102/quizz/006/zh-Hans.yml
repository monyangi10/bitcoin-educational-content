question: 法国自由主义思想家认为，将自由划分为不同类别（政治自由与经济自由）的主要问题是什么？
answer: 它有选择地适用个人选择原则，造成了逻辑上的不一致
wrong_answers:
  - 它使经济自由比政治自由更重要
  - 它阻碍了政府对市场的有效监管
  - 它完全消除了集体决策的可能性
explanation: |
  法国自由主义传统认为，将自由分为 "好 "的类别（如政治自由）和 "坏 "的类别（如经济自由）会造成根本的逻辑不一致。从逻辑上讲，证明宗教宽容和普选权合理的原则--即个人的选择能力--也应适用于经济决策。这种割裂将自由简化为只是定期选择政治领导人，而忽视了个人选择的基本原则是普遍的，应一致适用于人类行动的所有领域。
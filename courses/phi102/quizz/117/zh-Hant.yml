question: 根據經濟理論，領取配給券的公民無法有效參與供需定律的主要原因是什麼？
answer: 他們缺乏根據個人喜好和環境變化調整消費的自由
wrong_answers:
  - 他們不瞭解市場價格如何反映商品和服務的真正價值
  - 由於收入限制，他們無法以市價購買商品
  - 他們無法取得有關可用產品及其品質的資訊
explanation: |
  供求定律需要以自由為基本先決條件才能正常運作。持有配給券的公民無法根據自己的喜好增加或減少需求，因為他們的消費是由政府分配預先決定的。這使得自然價格信號機制無法運作，因為消費者的選擇無法自由影響市場需求。其他選項的重點在於瞭解、負擔能力或資訊取得，但核心問題是缺乏選擇本身，而非做出明智或負擔得起的選擇的能力。
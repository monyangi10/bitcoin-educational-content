question: Jaký je podle ekonomické teorie hlavní důvod, proč se občané, kteří dostávají přídělové kupony, nemohou účinně podílet na zákonu nabídky a poptávky?
answer: Chybí jim svoboda přizpůsobit svou spotřebu osobním preferencím a měnícím se okolnostem
wrong_answers:
  - Nechápou, jak tržní ceny odrážejí skutečnou hodnotu zboží a služeb
  - Nemohou si dovolit nakupovat zboží za tržní ceny z důvodu omezených příjmů
  - Nemají přístup k informacím o dostupných produktech a jejich kvalitě
explanation: |
  Zákon nabídky a poptávky vyžaduje svobodu jako základní předpoklad pro správné fungování. Občané s přídělovými kupony nemohou zvýšit nebo snížit svou poptávku podle svých preferencí, protože jejich spotřeba je předem určena vládním přídělem. To znemožňuje fungování přirozeného mechanismu cenové signalizace, protože volby spotřebitelů nemohou svobodně ovlivňovat tržní poptávku. Ostatní možnosti se zaměřují na porozumění, cenovou dostupnost nebo přístup k informacím, ale hlavním problémem je samotná absence volby, nikoliv možnost informované nebo cenově dostupné volby.
question: Secondo la teoria economica, qual è la ragione principale per cui i cittadini che ricevono i coupon di razionamento non possono partecipare efficacemente alla legge della domanda e dell'offerta?
answer: Non hanno la libertà di adattare i propri consumi in base alle preferenze personali e alle mutate circostanze
wrong_answers:
  - Non capiscono come i prezzi di mercato riflettano il vero valore di beni e servizi
  - Non possono permettersi di acquistare beni a prezzi di mercato a causa di limitazioni di reddito
  - Non sono in grado di accedere alle informazioni sui prodotti disponibili e sulla loro qualità
explanation: |
  La legge della domanda e dell'offerta richiede la libertà come prerequisito fondamentale per funzionare correttamente. I cittadini con coupon di razionamento non possono aumentare o diminuire la loro domanda in base alle loro preferenze, perché il loro consumo è predeterminato dall'allocazione governativa. Questo impedisce al meccanismo naturale di segnalazione dei prezzi di funzionare, poiché le scelte dei consumatori non possono influenzare liberamente la domanda di mercato. Le altre opzioni si concentrano sulla comprensione, sull'accessibilità economica o sull'accesso alle informazioni, ma il problema centrale è l'assenza di scelta in sé, non la capacità di fare scelte informate o accessibili.
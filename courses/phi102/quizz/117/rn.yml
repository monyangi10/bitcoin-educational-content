question: Dushingiye ku ciyumviro c’ubutunzi, ni imvo nyamukuru iyihe ituma abanyagihugu baronka amakupo y’ibifungurwa badashobora kugira uruhara neza mw’itegeko ry’ugutanga n’ugusaba?
answer: Ntibagira umwidegemvyo wo guhindura ivyo barya bivanye n’ivyo bakunda be n’ivyo bihinduka .
wrong_answers:
  - Ntibatahura ingene ibiciro vyo kw’isoko vyerekana agaciro nyakuri k’ibintu n’ibikorwa .
  - Ntibashobora kugura ibintu ku biciro vy'isoko kubera amafaranga make .
  - Ntibashobora kuronka amakuru yerekeye ibintu biriho n'uburyo bwavyo .
explanation: |
  Itegeko ry’ugutanga n’ugusaba risaba umwidegemvyo nk’ikintu nyamukuru gikenewe kugira ngo umuntu akore neza. Abanyagihugu bafise ama coupons y’ibifungurwa ntibashobora kwongera canke kugabanya ivyo basaba bivanye n’ivyo bakunda kuko ivyo bakoresha bigenwa mbere n’ivyo Leta ibaha. Ivyo bibuza uburyo bwo gutanga ikimenyetso c’igiciro busanzwe gukora, kuko amahitamwo y’abaguzi adashobora guhindura mu mwidegemvyo ivyo isoko risaba. Ayandi mahitamwo yibanda ku gutahura, ku gushobora kuronka amakuru, canke ku kuronka amakuru, ariko ikibazo nyamukuru ni ukutagira amahitamwo ubwayo, si ubushobozi bwo guhitamwo umuntu afise amakuru canke ashoboka.
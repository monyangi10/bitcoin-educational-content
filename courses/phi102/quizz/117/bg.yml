question: Според икономическата теория коя е основната причина, поради която гражданите, получаващи талони за разпределение, не могат да участват ефективно в закона за търсенето и предлагането?
answer: Липсва им свободата да коригират потреблението си в зависимост от личните предпочитания и променящите се обстоятелства
wrong_answers:
  - Те не разбират как пазарните цени отразяват истинската стойност на стоките и услугите
  - Те не могат да си позволят да купуват стоки на пазарни цени поради ограничения в доходите
  - Те нямат достъп до информация за наличните продукти и тяхното качество
explanation: |
  Законът за търсенето и предлагането изисква свобода като основна предпоставка за правилното му функциониране. Гражданите с талони за нормиране не могат да увеличат или намалят търсенето си според своите предпочитания, тъй като потреблението им е предопределено от държавното разпределение. Това пречи на естествения механизъм за сигнализиране на цените да функционира, тъй като изборът на потребителите не може свободно да влияе върху пазарното търсене. Другите варианти се фокусират върху разбирането, достъпността или достъпа до информация, но основният проблем е липсата на самия избор, а не способността да се направи информиран или достъпен избор.
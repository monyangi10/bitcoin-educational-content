question: Prema ekonomskoj teoriji, glavni razlog zašto građani koji primaju bonove za racionisanje ne mogu efikasno učestvovati u zakonu ponude i potražnje je taj što bonovi ograničavaju količinu robe koju mogu kupiti, bez obzira na njihovu spremnost ili sposobnost da plate više za dodatne količine.
answer: Nedostaje im sloboda da prilagode svoju potrošnju na osnovu ličnih preferencija i promenljivih okolnosti.
wrong_answers:
  - Oni ne razumeju kako tržišne cene odražavaju pravu vrednost robe i usluga
  - Ne mogu priuštiti kupovinu robe po tržišnim cenama zbog ograničenih prihoda.
  - Oni nisu u mogućnosti da pristupe informacijama o dostupnim proizvodima i njihovom kvalitetu.
explanation: |
  Zakon ponude i potražnje zahteva slobodu kao osnovni preduslov za pravilno funkcionisanje. Građani sa bonovima za racionalizaciju ne mogu povećati ili smanjiti svoju potražnju prema svojim preferencijama jer je njihova potrošnja unapred određena vladinom alokacijom. Ovo sprečava prirodni mehanizam signalizacije cena da funkcioniše, jer potrošački izbori ne mogu slobodno uticati na tržišnu potražnju. Druge opcije se fokusiraju na razumevanje, pristupačnost ili pristup informacijama, ali suštinski problem je odsustvo samog izbora, a ne sposobnost donošenja informisanih ili pristupačnih izbora.
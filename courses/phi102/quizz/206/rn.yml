question: Dushingiye ku nseguro ya Bastiat, ni igiki giserukira ubuhinga bwiza bwo gushinga umwidegemvyo nyakuri w’ubutunzi mu kibano?
answer: Kumenya no gusenyura mu buryo butunganye ivyiyumviro bitari vyo bishigikira uburyo bwo kutagira umwidegemvyo
wrong_answers:
  - Gushira mu ngiro ivugurura ry'amategeko buhoro buhoro mu gihe hagumyeho ingingo z'uburinzi zisanzweho kugira ngo habeho ugutekana
  - Kwibanda canecane ku guhindura demokarasi ya politike nk'umushinge w'ubundi bwoko bwose bw'umwidegemvyo .
  - Gushinga amasezerano y'ubudandaji mpuzamakungu ahuza inyungu z'igihugu n'ubumwe bw'ubutunzi kw'isi yose .
explanation: |
  Bastiat yashimikiye ko umwidegemvyo nyakuri wo mu vy’ubutunzi usaba ko umuntu abanza gusenyura uburyo bwo guhiganwa bushingiye ku vyiyumviro bitari vyo. Yaratahura yuko ubuhinga bwa sophisme ari bwo butanga umushinge w’ubwenge w’ubukomunisita, amategeko arenze urugero be n’imisoro y’agahahazo. Aho kwibanda ku buryo bwa politike canke bwo gutegeka, Bastiat yarashigikiye inyigisho zikomeye z’ubutunzi no gukwiragiza ivyiyumviro vy’ubutunzi vy’ubwigenge kugira ngo ivyo bitari vyo bihuye n’ubwenge bigaragazwe. Uburyo bwiwe bwari ubwo kwerekana amakosa y’ukuri n’utunenge two gutekereza ku mpamvu zirwanya umwidegemvyo, yemera ko naho abahinga mu vy’ubutunzi bamenyerejwe bashobora kumenya izo nzira z’ubuhinga, abantu muri rusangi barakeneye ubuyobozi kugira ngo bazimenye.
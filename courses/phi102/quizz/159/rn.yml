question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni imvo nyamukuru iyihe ituma ugusoresha iterambere bibonwa ko ari ingorane ugereranije n’ugusoresha bihuye?
answer: Ifata abantu ku giti cabo nk’itunga ry’umugwi aho kwemera ko bose bakingiwe n’amategeko .
wrong_answers:
  - Bituma ubutegetsi bugorana bituma gutora imisoro bidakora neza kandi bikaba bitwara amahera menshi .
  - Bigabanya inyungu za Leta mu guca intege ibikorwa vy'ubutunzi ku rwego rwo hejuru rw'inyungu .
  - Bica ku ngingo ngenderwako y'ubutegetsi bw'abantu benshi mu gushigikira inyungu z'abantu bake kuruta ivyo bose bakeneye .
explanation: |
  Abahinga mu vy’ubutunzi b’abanyagihugu bavuga ko imisoro itera imbere igereranya ugusubira mu vyiyumviro vya kera aho abantu ku giti cabo baba ari abo mu gisata c’abantu bose. Kubera ko abanyagihugu bose bakingirwa mu buryo bungana mu bijanye n’amategeko, bakwiye gutanga intererano zihuye aho gutera imbere. Gutanga imisoro itera imbere bisobanura ko abantu bamwebamwe bafise umwenda munini ku kibano kubera gusa ivyo baroraniwe, bakabafata nk’itunga ry’umugwi aho kubafata nk’abanyagihugu banganye bafise uburenganzira n’amabanga bingana.
question: 自由主義経済理論によれば、累進課税が比例課税に比べて問題があるとされる主な理由は何か？
answer: 法の下での平等な保護を認めず、個人を集団の所有物として扱う。
wrong_answers:
  - 行政の複雑さが徴税を非効率で高コストなものにしている。
  - 高所得層の経済活動を抑制し、政府歳入を減少させる。
  - 集団のニーズよりも少数派の利益を優先することで、多数決の原則に反する。
explanation: |
  自由主義経済学者は、累進課税は個人が集団に属するという古代の概念への回帰を意味すると主張した。すべての市民は法的枠組みのもとで平等な保護を受けているのだから、累進的にではなく、比例的に貢献すべきである。累進課税は、ある個人は単にその成功によって社会により多くの義務を負い、平等な権利と責任を持つ平等な市民としてではなく、集団の所有物として扱われることを意味する。
question: Según la teoría económica liberal, ¿cuál es la razón principal por la que la fiscalidad progresiva se considera problemática en comparación con la fiscalidad proporcional?
answer: Trata a los individuos como propiedad del grupo en lugar de reconocer la igualdad de protección ante la ley
wrong_answers:
  - Crea una complejidad administrativa que hace que la recaudación de impuestos sea ineficaz y costosa
  - Reduce los ingresos públicos al desincentivar la actividad económica en los niveles de renta más altos
  - Viola el principio de la regla de la mayoría al favorecer los intereses minoritarios frente a las necesidades colectivas
explanation: |
  Los economistas liberales sostenían que la fiscalidad progresiva representa un retorno a concepciones antiguas en las que los individuos pertenecen a la colectividad. Dado que todos los ciudadanos reciben la misma protección en el marco legal, deberían contribuir proporcionalmente en lugar de progresivamente. La fiscalidad progresiva implica que algunos individuos deben más a la sociedad simplemente por su éxito, tratándolos como propiedad del grupo en lugar de como ciudadanos iguales con los mismos derechos y responsabilidades.
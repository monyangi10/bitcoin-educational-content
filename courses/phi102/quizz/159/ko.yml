question: 자유주의 경제 이론에 따르면, 누진세가 비례 과세에 비해 문제가 있다고 여겨지는 주된 이유는 무엇인가요?
answer: 법에 따른 동등한 보호를 인정하지 않고 개인을 그룹의 재산으로 취급합니다
wrong_answers:
  - 세금 징수를 비효율적이고 비용이 많이 드는 행정적 복잡성을 야기합니다
  - 고소득층의 경제 활동을 억제하여 정부 수입을 감소시킵니다
  - 집단적 필요보다 소수의 이익을 우선시하여 다수결의 원칙에 위배됩니다
explanation: |
  자유주의 경제학자들은 누진세는 개인이 집단에 속하는 고대의 개념으로 돌아가는 것이라고 주장합니다. 모든 시민은 법의 테두리 안에서 동등한 보호를 받기 때문에 누진세가 아니라 비례적으로 기여해야 한다는 것입니다. 누진세는 일부 개인이 단순히 성공했다는 이유로 사회에 더 많은 빚을 지는 것을 의미하며, 이들을 동등한 권리와 책임을 가진 동등한 시민이 아닌 집단의 재산으로 취급합니다.
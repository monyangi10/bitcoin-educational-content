question: Wat is volgens de liberale economische theorie de belangrijkste reden waarom progressieve belastingen als problematisch worden beschouwd in vergelijking met proportionele belastingen?
answer: Het behandelt individuen als eigendom van de groep in plaats van gelijke bescherming onder de wet te erkennen
wrong_answers:
  - Het creëert administratieve complexiteit die het innen van belastingen inefficiënt en duur maakt
  - Het vermindert de overheidsinkomsten door economische activiteit op hogere inkomensniveaus te ontmoedigen
  - Het schendt het principe van de meerderheidsregel door minderheidsbelangen te bevoordelen boven collectieve behoeften
explanation: |
  Liberale economen stelden dat progressieve belastingen een terugkeer betekenen naar oude opvattingen waarbij individuen tot het collectief behoren. Aangezien alle burgers gelijke bescherming genieten binnen het wettelijke kader, zouden ze proportioneel moeten bijdragen in plaats van progressief. Progressieve belastingen impliceren dat sommige individuen meer verschuldigd zijn aan de maatschappij enkel en alleen omwille van hun succes, waarbij ze behandeld worden als eigendom van de groep in plaats van als gelijke burgers met gelijke rechten en verantwoordelijkheden.
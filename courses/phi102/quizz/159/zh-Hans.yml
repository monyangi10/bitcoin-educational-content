question: 根据自由主义经济理论，与比例税相比，累进税被认为存在问题的主要原因是什么？
answer: 它将个人视为群体的财产，而不是承认法律的平等保护
wrong_answers:
  - 它造成了行政管理的复杂性，使税收效率低下、成本高昂
  - 它阻碍了较高收入水平的经济活动，从而减少了政府收入
  - 它违反了少数服从多数的原则，使少数人的利益高于集体的需要
explanation: |
  自由派经济学家认为，累进税代表着回归到个人属于集体的古老观念。由于所有公民都受到法律框架的平等保护，他们应该按比例而不是累进地缴税。累进税意味着一些人仅仅因为成功而对社会负有更多的责任，将他们视为集体的财产，而不是享有平等权利和责任的平等公民。
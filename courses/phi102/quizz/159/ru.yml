question: Согласно либеральной экономической теории, какова основная причина, по которой прогрессивное налогообложение считается проблематичным по сравнению с пропорциональным?
answer: Он рассматривает людей как собственность группы, а не признает равную защиту со стороны закона
wrong_answers:
  - Это создает административные сложности, которые делают сбор налогов неэффективным и дорогостоящим
  - Снижает доходы государства, поскольку препятствует экономической активности людей с более высоким уровнем дохода
  - Нарушает принцип правления большинства, отдавая предпочтение интересам меньшинства перед коллективными потребностями
explanation: |
  Либеральные экономисты утверждали, что прогрессивное налогообложение представляет собой возврат к древним представлениям, в которых индивиды принадлежат коллективу. Поскольку все граждане пользуются равной защитой в рамках законодательства, они должны вносить взносы пропорционально, а не прогрессивно. Прогрессивное налогообложение подразумевает, что некоторые люди должны обществу больше просто в силу своего успеха, рассматривая их как собственность группы, а не как равных граждан с равными правами и обязанностями.
question: Was ist nach der liberalen Wirtschaftstheorie der Hauptgrund, warum die progressive Besteuerung im Vergleich zur proportionalen Besteuerung als problematisch angesehen wird?
answer: Sie behandelt den Einzelnen als Eigentum der Gruppe, anstatt ihm gleichen Schutz vor dem Gesetz zu gewähren
wrong_answers:
  - Sie schafft eine komplexe Verwaltung, die die Steuererhebung ineffizient und kostspielig macht
  - Sie verringert die Staatseinnahmen, indem sie die Wirtschaftstätigkeit auf höheren Einkommensstufen behindert
  - Sie verstößt gegen den Grundsatz der Mehrheitsregel, da sie die Interessen von Minderheiten gegenüber den kollektiven Bedürfnissen bevorzugt
explanation: |
  Liberale Ökonomen argumentierten, dass die progressive Besteuerung eine Rückkehr zu alten Vorstellungen darstellt, bei denen der Einzelne zum Kollektiv gehört. Da alle Bürgerinnen und Bürger durch den gesetzlichen Rahmen den gleichen Schutz genießen, sollten sie ihren Beitrag proportional und nicht progressiv leisten. Die progressive Besteuerung impliziert, dass einige Personen der Gesellschaft allein aufgrund ihres Erfolges mehr schulden, und behandelt sie als Eigentum der Gruppe und nicht als gleichberechtigte Bürger mit gleichen Rechten und Pflichten.
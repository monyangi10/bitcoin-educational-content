question: Prema liberalnoj ekonomskoj teoriji, koji je primarni razlog zašto se progresivno oporezivanje smatra problematičnim u poređenju sa proporcionalnim oporezivanjem?
answer: Tretira pojedince kao vlasništvo grupe umesto da priznaje jednaku zaštitu prema zakonu
wrong_answers:
  - Stvara administrativnu složenost koja čini naplatu poreza neefikasnom i skupom.
  - Smanjuje prihode vlade obeshrabrivanjem ekonomske aktivnosti na višim nivoima prihoda
  - Krši princip vladavine većine favorizovanjem interesa manjine nad kolektivnim potrebama
explanation: |
  Liberalni ekonomisti su tvrdili da progresivno oporezivanje predstavlja povratak drevnim shvatanjima gde pojedinci pripadaju kolektivu. Pošto svi građani dobijaju jednaku zaštitu u okviru pravnog sistema, trebalo bi da doprinose proporcionalno, a ne progresivno. Progresivno oporezivanje implicira da neki pojedinci duguju više društvu samo zbog svog uspeha, tretirajući ih kao vlasništvo grupe, a ne kao jednake građane sa jednakim pravima i odgovornostima.
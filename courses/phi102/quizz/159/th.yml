question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม เหตุผลหลักที่การเก็บภาษีก้าวหน้าถูกมองว่ามีปัญหาเมื่อเทียบกับการเก็บภาษีแบบสัดส่วนคืออะไร?
answer: มันปฏิบัติต่อบุคคลเป็นทรัพย์สินของกลุ่มแทนที่จะยอมรับการคุ้มครองที่เท่าเทียมกันภายใต้กฎหมาย
wrong_answers:
  - มันสร้างความซับซ้อนในการบริหารที่ทำให้การเก็บภาษีไม่มีประสิทธิภาพและมีค่าใช้จ่ายสูง
  - มันลดรายได้ของรัฐบาลโดยการกีดกันกิจกรรมทางเศรษฐกิจในระดับรายได้ที่สูงขึ้น
  - มันละเมิดหลักการของการปกครองโดยเสียงข้างมากโดยการให้ความสำคัญกับผลประโยชน์ของชนกลุ่มน้อยมากกว่าความต้องการร่วมกัน
explanation: |
  นักเศรษฐศาสตร์เสรีนิยมแย้งว่าการเก็บภาษีก้าวหน้าเป็นการกลับไปสู่แนวคิดโบราณที่มองว่าบุคคลเป็นส่วนหนึ่งของส่วนรวม เนื่องจากพลเมืองทุกคนได้รับการคุ้มครองอย่างเท่าเทียมกันภายใต้กรอบกฎหมาย พวกเขาจึงควรมีส่วนร่วมตามสัดส่วนมากกว่าตามความก้าวหน้า การเก็บภาษีก้าวหน้าหมายความว่าบางคนเป็นหนี้สังคมมากขึ้นเพียงเพราะความสำเร็จของพวกเขา ซึ่งถือว่าพวกเขาเป็นทรัพย์สินของกลุ่มมากกว่าที่จะเป็นพลเมืองที่เท่าเทียมกันซึ่งมีสิทธิและความรับผิดชอบเท่าเทียมกัน
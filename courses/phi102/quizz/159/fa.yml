question: بر اساس نظریه اقتصادی لیبرال، دلیل اصلی اینکه چرا مالیات تصاعدی در مقایسه با مالیات نسبی مشکل‌ساز تلقی می‌شود چیست؟
answer: این افراد را به عنوان مالکیت گروه در نظر می‌گیرد، به جای اینکه حفاظت برابر تحت قانون را به رسمیت بشناسد.
wrong_answers:
  - این امر پیچیدگی اداری ایجاد می‌کند که جمع‌آوری مالیات را ناکارآمد و پرهزینه می‌سازد.
  - این امر با دلسرد کردن فعالیت‌های اقتصادی در سطوح درآمدی بالاتر، درآمد دولت را کاهش می‌دهد.
  - این اصل حاکمیت اکثریت را با ترجیح دادن منافع اقلیت بر نیازهای جمعی نقض می‌کند.
explanation: |
  اقتصاددانان لیبرال استدلال کردند که مالیات تصاعدی بازگشتی به مفاهیم باستانی است که در آن افراد به جمع تعلق دارند. از آنجا که همه شهروندان تحت چارچوب قانونی از حمایت برابر برخوردارند، باید به صورت متناسب و نه تصاعدی مشارکت کنند. مالیات تصاعدی به این معناست که برخی افراد به دلیل موفقیت خود بیشتر به جامعه بدهکارند و آنها را به عنوان دارایی گروه تلقی می‌کند، نه به عنوان شهروندان برابر با حقوق و مسئولیت‌های برابر.
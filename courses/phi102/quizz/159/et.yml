question: Mis on liberaalse majandusteooria kohaselt peamine põhjus, miks peetakse progressiivset maksustamist võrreldes proportsionaalse maksustamisega problemaatiliseks?
answer: See kohtleb üksikisikuid kui grupi omandit, selle asemel et tunnustada võrdset kaitset seaduse alusel
wrong_answers:
  - See tekitab halduskoormuse, mis muudab maksude kogumise ebatõhusaks ja kulukaks
  - See vähendab riigi tulusid, kuna see pärsib majandustegevust kõrgemate sissetulekute puhul
  - See rikub enamuse põhimõtet, eelistades vähemuse huve kollektiivsetele vajadustele
explanation: |
  Liberaalsed majandusteadlased väitsid, et progressiivne maksustamine kujutab endast tagasipöördumist iidsete arusaamade juurde, kus üksikisikud kuuluvad kollektiivile. Kuna kõik kodanikud saavad õigusraamistiku alusel võrdset kaitset, peaksid nad panustama pigem proportsionaalselt kui progresseeruvalt. Progressiivne maksustamine tähendab, et mõned inimesed võlgnevad ühiskonnale rohkem lihtsalt oma edu tõttu, käsitledes neid pigem grupi omandina kui võrdsete kodanike võrdsete õiguste ja kohustustega.
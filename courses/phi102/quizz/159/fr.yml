question: Selon la théorie économique libérale, quelle est la principale raison pour laquelle l'imposition progressive est considérée comme problématique par rapport à l'imposition proportionnelle ?
answer: Elle traite les individus comme des propriétés du groupe au lieu de leur reconnaître une protection égale en vertu de la loi
wrong_answers:
  - Elle crée une complexité administrative qui rend la perception de l'impôt inefficace et coûteuse
  - Elle réduit les recettes publiques en décourageant l'activité économique à des niveaux de revenus plus élevés
  - Elle viole le principe de la règle de la majorité en favorisant les intérêts minoritaires au détriment des besoins collectifs
explanation: |
  Les économistes libéraux ont soutenu que l'impôt progressif représentait un retour à des conceptions anciennes où les individus appartiennent à la collectivité. Puisque tous les citoyens bénéficient d'une protection égale dans le cadre juridique, ils devraient contribuer proportionnellement plutôt que progressivement. L'impôt progressif implique que certains individus doivent plus à la société simplement en raison de leur succès, les traitant comme la propriété du groupe plutôt que comme des citoyens égaux avec des droits et des responsabilités égaux.
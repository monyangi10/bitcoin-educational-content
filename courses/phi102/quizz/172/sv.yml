question: Enligt fysiokraternas analys, varför misslyckas den statliga planeringen av ekonomisk aktivitet i grunden?
answer: Staten saknar "mästarens öga" - den detaljerade lokala kunskap som endast enskilda ekonomiska aktörer besitter i sin dagliga verksamhet
wrong_answers:
  - Staten har otillräckliga finansiella resurser för att effektivt samordna alla ekonomiska sektorer över stora territorier
  - Politiska ledare är korrupta och prioriterar personlig vinning framför effektiv ekonomisk förvaltning
  - Demokratiska röstningsprocesser är för långsamma för att snabbt kunna reagera på snabbt föränderliga marknadsförhållanden
explanation: |
  Fysiokraterna identifierade ett grundläggande epistemologiskt problem med statlig planering: omöjligheten att centralt samla in och bearbeta den omfattande, komplexa och ständigt föränderliga information som driver den ekonomiska aktiviteten. De hävdade att endast enskilda ekonomiska aktörer, som verkar i sina specifika sammanhang, besitter den detaljerade kunskap ("l'œil du maître") som krävs för att fatta lämpliga ekonomiska beslut. Denna insikt föregick och föregrep den moderna österrikiska skolans argument om kunskapsproblemet i socialistiska kalkyler och visade att misslyckandet med central planering inte beror på resursbegränsningar eller korruption, utan på den inneboende omöjligheten att ersätta spridd individuell kunskap med centraliserat byråkratiskt beslutsfattande.
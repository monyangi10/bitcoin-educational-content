question: 根据重农主义者的分析，国家对经济活动的计划为什么会从根本上失败？
answer: 国家缺乏 "主观能动性"--只有个体经济主体在日常活动中才会掌握的详尽的地方知识
wrong_answers:
  - 国家财政资源不足，无法有效协调大片领土上的所有经济部门
  - 政治领导人天生腐败，将个人利益置于高效经济管理之上
  - 民主投票程序过于缓慢，无法对瞬息万变的市场环境做出快速反应
explanation: |
  重农主义者发现了国家计划在认识论上的一个根本问题：不可能集中收集和处理推动经济活动的大量、复杂和不断变化的信息。他们认为，只有在特定环境中运行的个体经济主体才拥有做出适当经济决策所需的详细知识（"l'œil du maître"）。这一见解早于并预见了现代奥地利学派关于社会主义计算中的知识问题的论点，表明中央计划的失败并非源于资源限制或腐败，而是源于以集中的官僚决策取代分散的个人知识的内在不可能性。
question: フィジオクラートの分析によれば、なぜ国家による経済活動の計画は根本的に失敗するのだろうか？
answer: 国家には、個々の経済主体だけが日常的に持っている「主人の目」、つまり地域の詳細な知識が欠けている。
wrong_answers:
  - 広大な領土にまたがるすべての経済部門を効果的に調整するには、国家の財源が不十分である。
  - 政治指導者は本質的に腐敗しており、効率的な経済運営よりも個人的な利益を優先する
  - 民主的な投票プロセスは、急速に変化する市場環境に迅速に対応するには遅すぎる。
explanation: |
  フィジオクラートたちは、国家計画における根本的な認識論的問題、すなわち、経済活動の原動力となる膨大かつ複雑で絶えず変化する情報を一元的に収集・処理することの不可能性を指摘した。彼らは、適切な経済的意思決定を行うために必要な詳細な知識（「l'œil du maître」）を持っているのは、特定の文脈で活動する個々の経済主体だけであると主張した。この洞察は、社会主義的計算における知識の問題についての現代のオーストリア学派の議論を先取りし、先取りしたものであり、中央計画の失敗は資源の制約や腐敗に起因するのではなく、分散した個人の知識を中央集権的な官僚的意思決定で置き換えることの本質的な不可能性に起因することを実証した。
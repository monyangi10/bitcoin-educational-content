question: Согласно анализу физиократов, почему государственное планирование экономической деятельности принципиально не работает?
answer: Государству не хватает "хозяйского глаза" - детального знания местности, которым обладают только отдельные экономические агенты в своей повседневной деятельности
wrong_answers:
  - Государство не располагает достаточными финансовыми ресурсами для эффективной координации всех секторов экономики на больших территориях
  - Политические лидеры по своей природе коррумпированы и отдают предпочтение личной выгоде перед эффективным управлением экономикой
  - Демократические процессы голосования слишком медленны, чтобы быстро реагировать на быстро меняющиеся условия рынка
explanation: |
  Физиократы выявили фундаментальную эпистемологическую проблему государственного планирования: невозможность централизованного сбора и обработки обширной, сложной и постоянно меняющейся информации, которая является движущей силой экономической деятельности. Они утверждали, что только отдельные экономические агенты, действующие в своем специфическом контексте, обладают детальными знаниями ("l'œil du maître"), необходимыми для принятия соответствующих экономических решений. Эта мысль предшествовала и предвосхитила современные аргументы австрийской школы о проблеме знаний в социалистических расчетах, показав, что неудача централизованного планирования связана не с нехваткой ресурсов или коррупцией, а с неотъемлемой невозможностью заменить разрозненные индивидуальные знания централизованным бюрократическим принятием решений.
question: Waarom faalt de staatsplanning van economische activiteit fundamenteel volgens de analyse van de fysiocraten?
answer: De staat mist het 'oog van de meester' - de gedetailleerde lokale kennis die alleen individuele economische agenten bezitten in hun dagelijkse activiteiten
wrong_answers:
  - De staat heeft onvoldoende financiële middelen om alle economische sectoren in grote gebieden effectief te coördineren
  - Politieke leiders zijn van nature corrupt en geven voorrang aan persoonlijk gewin boven efficiënt economisch beheer
  - Democratische stemprocessen zijn te traag om snel te reageren op snel veranderende marktomstandigheden
explanation: |
  De fysiocraten identificeerden een fundamenteel epistemologisch probleem met staatsplanning: de onmogelijkheid om de enorme, complexe en voortdurend veranderende informatie die economische activiteit aanstuurt centraal te verzamelen en te verwerken. Ze stelden dat alleen individuele economische agenten, die in hun specifieke context opereren, de gedetailleerde kennis ('l'œil du maître') bezitten die nodig is om de juiste economische beslissingen te nemen. Dit inzicht ging vooraf aan en liep vooruit op de argumenten van de moderne Oostenrijkse school over het kennisprobleem in socialistische berekeningen, door aan te tonen dat het falen van centrale planning niet voortkomt uit beperkte middelen of corruptie, maar uit de inherente onmogelijkheid om verspreide individuele kennis te vervangen door gecentraliseerde bureaucratische besluitvorming.
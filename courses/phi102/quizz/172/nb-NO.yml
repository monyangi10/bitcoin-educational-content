question: Hvorfor mislykkes statlig planlegging av økonomisk aktivitet fundamentalt, ifølge fysiokratenes analyse?
answer: Staten mangler "mesterens blikk" - den detaljerte lokalkunnskapen som bare den enkelte økonomiske aktør besitter i sitt daglige virke
wrong_answers:
  - Staten har ikke tilstrekkelige økonomiske ressurser til å koordinere alle økonomiske sektorer på tvers av store territorier
  - Politiske ledere er iboende korrupte og prioriterer personlig vinning fremfor effektiv økonomisk styring
  - Demokratiske avstemningsprosesser er for trege til å reagere raskt på raskt skiftende markedsforhold
explanation: |
  Fysiokratene identifiserte et grunnleggende epistemologisk problem med statlig planlegging: det er umulig å samle inn og behandle den enorme, komplekse og stadig skiftende informasjonen som driver den økonomiske aktiviteten. De hevdet at bare individuelle økonomiske aktører, som opererer i sine spesifikke kontekster, besitter den detaljkunnskapen ("l'œil du maître") som er nødvendig for å fatte hensiktsmessige økonomiske beslutninger. Denne innsikten foregrep og foregrep den moderne østerrikske skolens argumenter om kunnskapsproblemet i sosialistisk kalkulasjon, og viste at sentral planlegging ikke mislykkes på grunn av ressursbegrensninger eller korrupsjon, men fordi det er umulig å erstatte spredt individuell kunnskap med sentraliserte byråkratiske beslutningsprosesser.
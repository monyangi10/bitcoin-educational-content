question: Según el análisis de los fisiócratas, ¿por qué fracasa fundamentalmente la planificación estatal de la actividad económica?
answer: El Estado carece del "ojo del amo", es decir, del conocimiento local detallado que sólo poseen los agentes económicos individuales en sus actividades cotidianas
wrong_answers:
  - El Estado no dispone de recursos financieros suficientes para coordinar eficazmente todos los sectores económicos en territorios extensos
  - Los líderes políticos son intrínsecamente corruptos y dan prioridad al beneficio personal frente a una gestión económica eficiente
  - Los procesos democráticos de votación son demasiado lentos para responder con rapidez a las cambiantes condiciones del mercado
explanation: |
  Los fisiócratas identificaron un problema epistemológico fundamental en la planificación estatal: la imposibilidad de reunir y procesar de forma centralizada la vasta, compleja y constantemente cambiante información que impulsa la actividad económica. Sostenían que sólo los agentes económicos individuales, que operan en sus contextos específicos, poseen el conocimiento detallado ('l'œil du maître') necesario para tomar las decisiones económicas apropiadas. Esta idea precedió y anticipó los argumentos de la escuela austriaca moderna sobre el problema del conocimiento en el cálculo socialista, demostrando que el fracaso de la planificación central no se debe a la escasez de recursos o a la corrupción, sino a la imposibilidad inherente de sustituir el conocimiento individual disperso por una toma de decisiones burocrática centralizada.
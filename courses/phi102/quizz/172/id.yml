question: Menurut analisis kaum fisiokrat, mengapa perencanaan kegiatan ekonomi negara pada dasarnya gagal?
answer: Negara tidak memiliki 'mata tuan' - pengetahuan lokal yang terperinci yang hanya dimiliki oleh pelaku ekonomi individu dalam kegiatan sehari-hari mereka
wrong_answers:
  - Negara tidak memiliki sumber daya keuangan yang cukup untuk mengkoordinasikan semua sektor ekonomi di seluruh wilayah yang luas secara efektif
  - Para pemimpin politik pada dasarnya korup dan memprioritaskan keuntungan pribadi di atas pengelolaan ekonomi yang efisien
  - Proses pemungutan suara yang demokratis terlalu lambat untuk merespons kondisi pasar yang berubah dengan cepat
explanation: |
  Kaum fisiokrat mengidentifikasi masalah epistemologis yang mendasar dalam perencanaan negara: ketidakmungkinan untuk mengumpulkan dan memproses informasi yang sangat banyak, kompleks, dan terus berubah yang mendorong aktivitas ekonomi secara terpusat. Mereka berargumen bahwa hanya pelaku ekonomi individu, yang beroperasi dalam konteks spesifik mereka, yang memiliki pengetahuan terperinci ('l'œil du maître') yang diperlukan untuk membuat keputusan ekonomi yang tepat. Wawasan ini mendahului dan mengantisipasi argumen mazhab Austria modern tentang masalah pengetahuan dalam perhitungan sosialis, yang menunjukkan bahwa kegagalan perencanaan terpusat bukan berasal dari keterbatasan sumber daya atau korupsi, tetapi dari ketidakmungkinan yang melekat untuk menggantikan pengetahuan individu yang tersebar dengan pengambilan keputusan birokratis yang terpusat.
question: Theo phân tích của trường phái kinh tế trọng nông, tại sao việc nhà nước hoạch định chính sách kinh tế lại thất bại về cơ bản?
answer: Nhà nước thiếu "con mắt của người chủ" - kiến thức chi tiết về địa phương mà chỉ các tác nhân kinh tế cá nhân mới có được trong hoạt động hàng ngày của họ.
wrong_answers:
  - Nhà nước không có đủ nguồn lực tài chính để điều phối hiệu quả tất cả các lĩnh vực kinh tế trên phạm vi lãnh thổ rộng lớn.
  - Các nhà lãnh đạo chính trị vốn dĩ tham nhũng và ưu tiên lợi ích cá nhân hơn là quản lý kinh tế hiệu quả.
  - Các quy trình bỏ phiếu dân chủ quá chậm để phản ứng nhanh chóng với các điều kiện thị trường thay đổi nhanh chóng.
explanation: |
  Trường phái kinh tế trọng nông đã chỉ ra một vấn đề nhận thức luận cơ bản trong kế hoạch hóa nhà nước: sự bất khả thi trong việc thu thập và xử lý tập trung lượng thông tin khổng lồ, phức tạp và liên tục thay đổi thúc đẩy hoạt động kinh tế. Họ lập luận rằng chỉ có các tác nhân kinh tế cá nhân, hoạt động trong bối cảnh cụ thể của mình, mới sở hữu kiến thức chi tiết ('l'œil du maître') cần thiết để đưa ra các quyết định kinh tế phù hợp. Nhận định này đã có trước và dự đoán các lập luận của trường phái kinh tế Áo hiện đại về vấn đề kiến thức trong tính toán xã hội chủ nghĩa, chứng minh rằng sự thất bại của kế hoạch hóa tập trung không bắt nguồn từ sự hạn chế về nguồn lực hay tham nhũng, mà từ sự bất khả thi vốn có trong việc thay thế kiến thức cá nhân phân tán bằng việc ra quyết định tập trung của bộ máy quan liêu.
question: Kulingana na uchambuzi wa physiocrats, kwa nini mipango ya serikali ya shughuli za kiuchumi inashindwa kimsingi?
answer: Jimbo halina 'jicho la bwana' - maarifa ya kina ya wenyeji ambayo ni mawakala wa kiuchumi pekee wanao katika shughuli zao za kila siku.
wrong_answers:
  - Jimbo halina rasilimali za kifedha za kutosha kuratibu vyema sekta zote za kiuchumi katika maeneo makubwa
  - Viongozi wa kisiasa kwa asili ni wafisadi na wanapa kipaumbele faida binafsi kuliko usimamizi bora wa uchumi
  - Michakato ya kupiga kura ya kidemokrasia ni ya polepole sana kujibu haraka hali ya soko inayobadilika haraka
explanation: |
  Wanafiziokrati walitambua tatizo la msingi la epistemolojia katika upangaji wa serikali: kutowezekana kwa kukusanya na kusindika taarifa kubwa, ngumu, na zinazobadilika kila mara zinazoendesha shughuli za kiuchumi. Walisema kwamba ni mawakala wa kiuchumi binafsi pekee, wanaofanya kazi katika miktadha yao maalum, wanaomiliki maarifa ya kina ('l'œil du maître') muhimu ili kufanya maamuzi sahihi ya kiuchumi. Ufahamu huu ulitangulia na kutarajiwa hoja za shule za kisasa za Austria kuhusu tatizo la maarifa katika hesabu ya ujamaa, zikionyesha kwamba kushindwa kwa upangaji mkuu hakutokani na vikwazo vya rasilimali au ufisadi, bali kutokana na kutowezekana kwa asili kwa kubadilisha maarifa ya mtu binafsi yaliyotawanyika na kufanya maamuzi ya urasimu wa kati.
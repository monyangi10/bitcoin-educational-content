question: 물리학자들의 분석에 따르면, 국가 경제 활동 계획이 근본적으로 실패하는 이유는 무엇일까요?
answer: 국가는 개별 경제 주체만이 일상 활동에서 가지고 있는 상세한 지역 지식인 '마스터의 눈'이 부족합니다
wrong_answers:
  - 국가는 넓은 영토에 걸쳐 모든 경제 부문을 효과적으로 조정할 재정 자원이 충분하지 않습니다
  - 정치 지도자들은 본질적으로 부패하고 효율적인 경제 관리보다 개인적 이익을 우선시합니다
  - 민주적 투표 절차는 급변하는 시장 상황에 신속하게 대응하기에는 너무 느립니다
explanation: |
  피지리학자들은 국가 계획의 근본적인 인식론적 문제, 즉 경제 활동을 주도하는 방대하고 복잡하며 끊임없이 변화하는 정보를 중앙에서 수집하고 처리하는 것이 불가능하다는 점을 파악했습니다. 그들은 개별 경제 주체만이 각자의 특정한 맥락에서 활동하며 적절한 경제적 결정을 내리는 데 필요한 세부적인 지식('l'œil du maître')을 보유하고 있다고 주장했습니다. 이러한 통찰은 사회주의 계산의 지식 문제에 대한 현대 오스트리아 학파의 주장보다 앞서 있었고, 중앙 계획의 실패가 자원 제약이나 부패 때문이 아니라 분산된 개별 지식을 중앙집권적인 관료적 의사 결정으로 대체할 수 없다는 본질적인 불가능성에서 비롯된다는 것을 보여주었습니다.
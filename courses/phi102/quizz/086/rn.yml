question: Ni igiki cari ikintu nyamukuru kiranga umusaruro mu mibano ya kera cari kibujije gushinga umwidegemvyo n’itunga ry’abantu ku giti cabo?
answer: Umusaruro wari ugoye cane n'ibisubizo bidahagije n'ibintu vyinshi bidatomoye .
wrong_answers:
  - Ivyo bikoresho vyari bigenzurwa n’inzego z’idini zikomeye zabuza abantu kwitunga .
  - Uburyo bwo guhingura bwari buteye imbere cane ku buryo imiryango yoroshe itashobora kuyirongora neza .
  - Umusaruro wari uganzwa n'abacuruzi bo hanze babuza uburenganzira bwo kuronka umutungo wo mu karere .
explanation: |
  Dukurikije icegeranyo c’amateka, imibano ya kera yari ihanganye n’ingorane zikomeye cane z’uguhingura ibintu bitari bihagije be n’ibintu vyinshi bidatomoye. Ukwo kudatekana kw’ubutunzi kwatumye ubuzima rusangi ari bwo buhambaye kuruta ubwigenge bw’umuntu ku giti ciwe. Uko ubuhinga bwari buteye akaga bwasobanura ko amashirahamwe adashobora kuronka ubutunzi bw’abantu ku giti cabo canke umwidegemvyo w’umuntu ku giti ciwe, kuko ivyo vyari gutuma umugwi udashobora kubaho. Ayandi mahitamwo ntabwo ari meza kuko avuga ko hariho ubugenzuzi bwo hanze (inzego z’idini, abacuruzi bo hanze) canke ugutera imbere kw’ubuhinga, mu gihe ingorane nyayo yari ukudashikama kw’ishimikiro n’ukudakwiriye kw’uburyo bwo guhingura mu gushitsa ivya nkenerwa vy’ishimikiro vyo kurokoka.
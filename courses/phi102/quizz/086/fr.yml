question: Quelle est la principale caractéristique de la production dans les sociétés anciennes qui a empêché l'établissement de la liberté et de la propriété privée ?
answer: La production était extrêmement précaire, avec des résultats insuffisants et de nombreuses incertitudes
wrong_answers:
  - La production était contrôlée par de puissantes institutions religieuses qui interdisaient la propriété privée
  - Les méthodes de production étaient trop avancées pour que les sociétés simples puissent les gérer efficacement
  - La production était dominée par des négociants étrangers qui empêchaient l'exercice des droits de propriété locaux
explanation: |
  Selon l'analyse historique, les sociétés anciennes étaient confrontées à une extrême précarité de la production avec des résultats insuffisants et de nombreuses incertitudes. Cette instabilité économique a fait de la survie collective la priorité absolue sur l'autonomie individuelle. La précarité de la production ne permettait pas aux sociétés de s'offrir le luxe de la propriété privée ou de la liberté individuelle, qui auraient menacé la survie du groupe. Les autres options sont incorrectes car elles suggèrent un contrôle externe (institutions religieuses, commerçants étrangers) ou un progrès technologique, alors que le problème réel était l'instabilité fondamentale et l'inadéquation des méthodes de production à la satisfaction des besoins élémentaires de survie.
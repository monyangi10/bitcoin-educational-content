question: 資本主義的發展如何影響社會對創新者的待遇？
answer: 創新者從受迫害轉變為現代社會的英雄
wrong_answers:
  - 創新者在所有歷史時期都持續受到迫害
  - 無論經濟體系如何，創新者總是受到讚揚
  - 隨著資本主義的進一步發展，創新者日益被邊緣化
explanation: |
  本章說明資本主義和物質條件的改善，從根本上改變了社會與創新的關係。在中世紀時代，創新者受到迫害，因為他們為日復一日、幾無盈餘的社會製造了不確定性。然而，隨著資本主義的發展，創造了更好的物質條件與盈餘，社會變得更能容忍不確定性與改變。這種轉變使創新者成為現代社會的英雄，而不是社會穩定的威脅。
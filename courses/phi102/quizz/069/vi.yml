question: Sự phát triển của chủ nghĩa tư bản đã ảnh hưởng như thế nào đến cách đối xử với những người đổi mới trong xã hội?
answer: Những nhà đổi mới đã chuyển mình từ chỗ bị đàn áp trở thành những anh hùng của xã hội hiện đại.
wrong_answers:
  - Những người đổi mới luôn bị đàn áp trong suốt các thời kỳ lịch sử.
  - Những người tiên phong luôn được tôn vinh bất kể hệ thống kinh tế hiện hành như thế nào.
  - Khi chủ nghĩa tư bản phát triển hơn nữa, những người tiên phong ngày càng bị gạt ra ngoài lề.
explanation: |
  Chương này giải thích rằng chủ nghĩa tư bản và điều kiện vật chất được cải thiện đã thay đổi căn bản mối quan hệ của xã hội với sự đổi mới. Vào thời trung cổ, những người đổi mới bị đàn áp vì họ tạo ra sự bất ổn trong xã hội vốn sống lay lắt qua ngày với rất ít thặng dư. Tuy nhiên, khi chủ nghĩa tư bản phát triển và tạo ra điều kiện vật chất tốt hơn với thặng dư, xã hội trở nên khoan dung hơn với sự bất ổn và thay đổi. Sự chuyển đổi này đã biến những người đổi mới thành những anh hùng của xã hội hiện đại thay vì là mối đe dọa đối với sự ổn định xã hội.
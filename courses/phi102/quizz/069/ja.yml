question: 資本主義の発展は、社会におけるイノベーターの扱いにどのような影響を与えたのか？
answer: 迫害から一転、現代社会の英雄となったイノベーターたち
wrong_answers:
  - イノベーターはどの時代も一貫して迫害され続けた
  - 経済体制に関係なく、イノベーターは常に称賛された
  - 資本主義がさらに発展するにつれて、イノベーターはますます疎外されるようになった。
explanation: |
  この章では、資本主義と物質的条件の向上が、社会とイノベーションの関係を根本的に変えたと説明している。中世の時代には、イノベーターは余剰の少ない日々を送る社会に不確実性をもたらすとして迫害された。しかし、資本主義が発展し、余剰を伴うより良い物質的条件が整うと、社会は不確実性や変化に対して寛容になった。この変化により、イノベーターは社会の安定を脅かす存在ではなく、近代社会のヒーローとなったのである。
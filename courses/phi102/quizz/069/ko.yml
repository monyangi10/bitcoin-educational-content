question: 자본주의의 발전은 사회에서 혁신가들의 처우에 어떤 영향을 미쳤나요?
answer: 박해의 대상에서 현대 사회의 영웅으로 변신한 혁신가들
wrong_answers:
  - 혁신가들은 모든 역사적 시기에 걸쳐 지속적으로 박해를 받아왔습니다
  - 혁신가들은 경제 체제에 관계없이 항상 축하를 받았습니다
  - 자본주의가 더욱 발전함에 따라 혁신가들은 점점 더 소외되고 있습니다
explanation: |
  이 장에서는 자본주의와 물질적 조건의 개선이 사회와 혁신의 관계를 근본적으로 변화시켰다고 설명합니다. 중세 시대에는 잉여가 거의 없이 하루하루를 살아가는 사회에 불확실성을 야기한다는 이유로 혁신가들이 핍박을 받았습니다. 그러나 자본주의가 발전하고 잉여로 더 나은 물질적 여건이 조성되면서 사회는 불확실성과 변화에 더 관대해졌습니다. 이러한 변화는 혁신가들을 사회 안정을 위협하는 존재가 아닌 현대 사회의 영웅으로 만들었습니다.
question: In che modo lo sviluppo del capitalismo ha influenzato il trattamento degli innovatori nella società?
answer: Gli innovatori si sono trasformati da perseguitati a eroi delle società moderne
wrong_answers:
  - Gli innovatori sono stati costantemente perseguitati in tutti i periodi storici
  - Gli innovatori sono sempre stati celebrati a prescindere dal sistema economico in vigore
  - Gli innovatori sono stati sempre più emarginati con l'ulteriore sviluppo del capitalismo
explanation: |
  Il capitolo spiega che il capitalismo e il miglioramento delle condizioni materiali hanno cambiato radicalmente il rapporto della società con l'innovazione. Nel Medioevo gli innovatori erano perseguitati perché creavano incertezza in società che vivevano giorno per giorno con poche eccedenze. Tuttavia, con lo sviluppo del capitalismo e la creazione di migliori condizioni materiali con eccedenze, le società sono diventate più tolleranti nei confronti dell'incertezza e del cambiamento. Questa trasformazione ha trasformato gli innovatori in eroi delle società moderne piuttosto che in minacce alla stabilità sociale.
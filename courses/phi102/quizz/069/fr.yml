question: Comment le développement du capitalisme a-t-il affecté le traitement des innovateurs dans la société ?
answer: Les innovateurs sont passés du statut de persécutés à celui de héros des sociétés modernes
wrong_answers:
  - Les innovateurs ont toujours été persécutés, quelle que soit la période historique
  - Les innovateurs ont toujours été célébrés, quel que soit le système économique en place
  - Les innovateurs ont été de plus en plus marginalisés au fur et à mesure que le capitalisme se développait
explanation: |
  Le chapitre explique que le capitalisme et l'amélioration des conditions matérielles ont fondamentalement changé la relation de la société avec l'innovation. À l'époque médiévale, les innovateurs étaient persécutés parce qu'ils créaient de l'incertitude dans des sociétés qui vivaient au jour le jour avec peu de surplus. Toutefois, à mesure que le capitalisme s'est développé et a créé de meilleures conditions matérielles avec des surplus, les sociétés sont devenues plus tolérantes à l'égard de l'incertitude et du changement. Cette transformation a fait des innovateurs des héros des sociétés modernes plutôt que des menaces pour la stabilité sociale.
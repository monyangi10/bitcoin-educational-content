question: Como é que o desenvolvimento do capitalismo afectou o tratamento dos inovadores na sociedade?
answer: Os inovadores deixaram de ser perseguidos para se tornarem heróis das sociedades modernas
wrong_answers:
  - Os inovadores continuaram a ser constantemente perseguidos ao longo de todos os períodos históricos
  - Os inovadores foram sempre celebrados, independentemente do sistema económico em vigor
  - Os inovadores foram sendo cada vez mais marginalizados à medida que o capitalismo se desenvolvia
explanation: |
  O capítulo explica que o capitalismo e a melhoria das condições materiais alteraram fundamentalmente a relação da sociedade com a inovação. Na época medieval, os inovadores eram perseguidos porque criavam incerteza em sociedades que viviam o dia a dia com poucos excedentes. No entanto, à medida que o capitalismo se desenvolveu e criou melhores condições materiais com excedentes, as sociedades tornaram-se mais tolerantes à incerteza e à mudança. Esta transformação transformou os inovadores em heróis das sociedades modernas e não em ameaças à estabilidade social.
question: Как развитието на капитализма се отразява на отношението към новаторите в обществото?
answer: Иноваторите се превръщат от преследвани в герои на съвременните общества
wrong_answers:
  - Иноваторите остават последователно преследвани през всички исторически периоди
  - Новаторите винаги са били приветствани, независимо от съществуващата икономическа система
  - С по-нататъшното развитие на капитализма новаторите стават все по-маргинални
explanation: |
  В главата се обяснява, че капитализмът и подобрените материални условия са променили из основи отношението на обществото към иновациите. През Средновековието новаторите са били преследвани, тъй като са създавали несигурност в общества, които са живеели ден за ден с малко излишъци. С развитието на капитализма и създаването на по-добри материални условия с излишъци обаче обществата стават по-толерантни към несигурността и промените. Тази трансформация превърна новаторите в герои на модерните общества, а не в заплаха за социалната стабилност.
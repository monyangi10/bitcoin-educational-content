question: Ni gute iterambere ry’ubu kapitalizimu ryagize ico rihinduye ku kuntu abahinguzi b’ibintu bishasha bafatwa mu kibano?
answer: Abahinguzi b'ibintu bishasha barahindutse bava mu gutotezwa baja mu kuba intwari z'imibano ya none .
wrong_answers:
  - Abahinguzi b’ibintu bishasha bagumye bahamwa mu bihe vyose vya kahise .
  - Abahinguzi b'ibintu bishasha bama bahimbazwa ata kuraba uburyo bw'ubutunzi bwariho .
  - Abahinguzi b'ibintu bishasha bararushirije gushirwa ku ruhande uko ubu kapitalizimu bwagenda buratera imbere .
explanation: |
  Ico kigabane kirasigura yuko ubu kapitalizimu be n’ugutera imbere kw’ibintu vy’umubiri vyahinduye cane ubucuti abantu bafitaniye n’uguhingura ibintu bishasha. Mu bihe vya kera, abahinga mu guhingura ibintu bishasha baratotezwa kubera ko vyatuma haba ukudakeka mu mibano yabaho ku musi ku musi ata n’imwe isigaye. Ariko rero, uko ubu kapitalizimu bwatera imbere kandi bukarema ibintu vyiza vy’umubiri bifise amasaranganya, ni ko imibano yarushiriza kwihanganira ukudakeka n’uguhinduka. Iryo hinduka ryatumye abahinguzi b’ibintu bishasha baba intwari z’imibano y’ubu aho kuba abatera ubwoba ugutekana kw’imibano.
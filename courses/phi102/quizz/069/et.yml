question: Kuidas mõjutas kapitalismi areng uuendajate kohtlemist ühiskonnas?
answer: Uuendajad muutusid tagakiusamisest kaasaegsete ühiskondade kangelasteks
wrong_answers:
  - Uuendajaid on järjepidevalt taga kiusatud kõikidel ajaloolistel perioodidel
  - Uuendajaid on alati tähistatud sõltumata kehtivast majandussüsteemist
  - Uuendajad muutusid kapitalismi edasise arenguga üha enam marginaliseerituks
explanation: |
  Peatükis selgitatakse, et kapitalism ja paranenud materiaalsed tingimused muutsid põhjalikult ühiskonna suhet innovatsiooni. Keskajal kiusati uuendajaid taga, sest nad tekitasid ebakindlust ühiskonnas, mis elas igapäevaselt vähese ülejäägiga. Kuid kui kapitalism arenes ja lõi paremad materiaalsed tingimused koos ülejääkidega, muutusid ühiskonnad ebakindluse ja muutuste suhtes sallivamaks. See muutus muutis uuendajad pigem moodsate ühiskondade kangelasteks kui ohuks sotsiaalsele stabiilsusele.
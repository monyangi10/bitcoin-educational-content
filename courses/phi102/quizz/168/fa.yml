question: انگیزه اصلی پشت حمایت‌گرایی کارگران و قوانین ضد مهاجرت طبق نظر اقتصاددانان لیبرال قرن ۱۹ چه بود؟
answer: برای محافظت از کارگران داخلی در برابر رقابت با کارگران خارجی که مایل به کار با دستمزدهای پایین‌تر هستند
wrong_answers:
  - برای جلوگیری از ورود بیماری‌ها و تضادهای فرهنگی توسط کارگران خارجی به کشور
  - برای حفظ امنیت ملی با محدود کردن دسترسی به صنایع حساس و موقعیت‌های دولتی
  - برای حفظ روش‌های سنتی صنایع دستی در برابر صنعتی‌سازی و مکانیزاسیون
explanation: |
  بر اساس فصل، اقتصاددانان لیبرال قرن نوزدهم، حمایت‌گرایی کارگران را اساساً اقتصادی می‌دانستند - کارگران داخلی به دنبال محافظت در برابر رقابت با کارگران خارجی بودند، به‌ویژه آن‌هایی که مایل به کار در معادن و صنایع دیگر با دستمزدهای رقابتی بودند. این مشابه روشی بود که صاحبان کسب‌وکار از حمایت‌گرایی تعرفه‌ای برای محافظت از خود در برابر رقابت محصولات خارجی استفاده می‌کردند. گزینه‌های دیگر بر نگرانی‌های فرهنگی، امنیتی یا فناوری تمرکز دارند، اما اقتصاددانان لیبرال به‌طور خاص این را به‌عنوان یک مکانیزم حمایت اقتصادی می‌دیدند که در آن کارگران از طریق ابزارهای سیاسی از رقابت بازار اجتناب می‌کردند، مشابه چگونگی حذف کارگران چینی از معادن استرالیا و کالیفرنیا علیرغم تمایل آن‌ها به مشارکت از طریق قرارداد و مبادله.
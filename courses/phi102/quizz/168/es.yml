question: ¿Cuál era la principal motivación del proteccionismo obrero y las leyes antiinmigración según los economistas liberales del siglo XIX?
answer: Proteger a los trabajadores nacionales de la competencia de trabajadores extranjeros dispuestos a trabajar por salarios más bajos
wrong_answers:
  - Evitar que los trabajadores extranjeros introduzcan enfermedades y conflictos culturales en el país
  - Mantener la seguridad nacional limitando el acceso a industrias y cargos públicos sensibles
  - Preservar los métodos artesanales tradicionales frente a la industrialización y la mecanización
explanation: |
  Según el capítulo, los economistas liberales del siglo XIX identificaron el proteccionismo de los trabajadores como de naturaleza fundamentalmente económica: los trabajadores nacionales buscaban protección frente a la competencia de los trabajadores extranjeros, en particular de aquellos dispuestos a trabajar en minas y otras industrias por salarios competitivos. Esto era paralelo a la forma en que los empresarios utilizaban el proteccionismo arancelario para protegerse de la competencia de los productos extranjeros. Las otras opciones se centran en cuestiones culturales, de seguridad o tecnológicas, pero los economistas liberales lo consideraban específicamente un mecanismo de protección económica en el que los trabajadores utilizaban medios políticos para evitar la competencia del mercado, de forma similar a cómo se excluyó a los trabajadores chinos de las minas australianas y californianas a pesar de su voluntad de participar mediante contratos e intercambios.
question: Jaka była główna motywacja stojąca za protekcjonizmem pracowniczym i przepisami antyimigracyjnymi według liberalnych ekonomistów z XIX wieku?
answer: Ochrona pracowników krajowych przed konkurencją ze strony pracowników zagranicznych, którzy chcą pracować za niższe wynagrodzenie
wrong_answers:
  - Zapobieganie wnoszeniu do kraju chorób i konfliktów kulturowych przez zagranicznych pracowników
  - Utrzymanie bezpieczeństwa narodowego poprzez ograniczenie dostępu do wrażliwych branż i stanowisk rządowych
  - Zachowanie tradycyjnych metod rzemieślniczych przed industrializacją i mechanizacją
explanation: |
  Zgodnie z tym rozdziałem, XIX-wieczni liberalni ekonomiści zidentyfikowali protekcjonizm pracowniczy jako zasadniczo ekonomiczny - pracownicy krajowi szukali ochrony przed konkurencją z pracownikami zagranicznymi, szczególnie tymi, którzy chcieli pracować w kopalniach i innych branżach za konkurencyjne płace. Było to analogiczne do tego, jak właściciele firm wykorzystywali protekcjonizm taryfowy do ochrony przed konkurencją ze strony zagranicznych produktów. Inne opcje koncentrują się na kwestiach kulturowych, bezpieczeństwa lub technologicznych, ale liberalni ekonomiści postrzegali to w szczególności jako mechanizm ochrony ekonomicznej, w którym pracownicy wykorzystywali środki polityczne, aby uniknąć konkurencji rynkowej, podobnie jak chińscy pracownicy zostali wykluczeni z australijskich i kalifornijskich kopalni, pomimo ich chęci uczestnictwa w umowie i wymianie.
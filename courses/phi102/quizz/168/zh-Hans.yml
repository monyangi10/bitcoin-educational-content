question: 19 世纪的自由派经济学家认为，工人保护主义和反移民法的主要动机是什么？
answer: 保护本国工人免受愿意以较低工资工作的外国工人的竞争
wrong_answers:
  - 防止外籍劳工将疾病和文化冲突带入本国
  - 通过限制进入敏感行业和政府职位来维护国家安全
  - 保护传统工艺方法，抵御工业化和机械化
explanation: |
  该章指出，19 世纪的自由主义经济学家认为工人保护主义从根本上说是经济性的--本国工人寻求保护，以免与外国工人竞争，特别是那些愿意在矿山和其他行业工作、工资具有竞争力的工人。这与企业主如何利用关税保护主义使自己免受外国产品竞争的影响相类似。其他选择侧重于文化、安全或技术方面的考虑，但自由派经济学家特别将其视为一种经济保护机制，即工人利用政治手段来避免市场竞争，这与中国工人尽管愿意通过合同和交换参与，但却被排除在澳大利亚和加利福尼亚矿山之外的情况类似。
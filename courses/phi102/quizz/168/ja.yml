question: 19世紀の自由主義経済学者によれば、労働者保護主義や移民排斥法の背景にある主な動機は何だったのか？
answer: 低賃金で働く外国人労働者との競争から国内労働者を守る。
wrong_answers:
  - 外国人労働者が国内に病気や文化的対立を持ち込まないようにする。
  - 機密産業や政府の役職へのアクセスを制限することで、国家安全保障を維持する。
  - 工業化や機械化に対抗し、伝統的な職人技を守る。
explanation: |
  この章によれば、19世紀の自由主義経済学者たちは、労働者保護主義を基本的に経済的な性質のものであると認識し、国内労働者は外国人労働者、特に鉱山やその他の産業で競争力のある賃金で働くことを望む労働者との競争からの保護を求めた。これは、企業経営者が外国製品との競争から身を守るために関税保護主義を利用したことと類似している。他の選択肢は文化的、安全保障的、あるいは技術的な懸念に焦点を当てているが、自由主義経済学者たちは特にこれを、労働者が政治的手段を用いて市場競争を回避する経済的保護メカニズムとみなしており、中国人労働者が契約や交換を通じて参加する意思があったにもかかわらず、オーストラリアやカリフォルニアの鉱山から排除されたのと同様である。
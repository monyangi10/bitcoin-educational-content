question: Mikä oli 1800-luvun liberaalien taloustieteilijöiden mukaan työntekijöiden protektionismin ja maahanmuuttovastaisten lakien ensisijainen motiivi?
answer: Suojella kotimaisia työntekijöitä kilpailulta ulkomaalaisten työntekijöiden kanssa, jotka ovat valmiita työskentelemään alhaisemmalla palkalla
wrong_answers:
  - Estetään ulkomaisia työntekijöitä tuomasta maahan sairauksia ja kulttuuriristiriitoja
  - Kansallisen turvallisuuden ylläpitäminen rajoittamalla pääsyä arkaluonteisille teollisuudenaloille ja valtionhallinnon tehtäviin
  - Perinteisten käsityömenetelmien säilyttäminen teollistumista ja koneellistumista vastaan
explanation: |
  Luvun mukaan 1800-luvun liberaalit taloustieteilijät pitivät työntekijöiden protektionismia pohjimmiltaan taloudellisena - kotimaiset työntekijät halusivat suojaa kilpailulta ulkomaisten työntekijöiden kanssa, erityisesti niiden, jotka olivat valmiita työskentelemään kaivoksissa ja muilla teollisuudenaloilla kilpailukykyisellä palkalla. Tämä oli samansuuntaista kuin se, miten yritysten omistajat käyttivät tulliprotektionismia suojellakseen itseään ulkomaisten tuotteiden kilpailulta. Muissa vaihtoehdoissa keskityttiin kulttuurisiin, turvallisuuteen liittyviin tai teknologisiin huolenaiheisiin, mutta liberaalit taloustieteilijät pitivät tätä nimenomaan taloudellisena suojamekanismina, jossa työntekijät käyttivät poliittisia keinoja välttääkseen markkinakilpailun, samaan tapaan kuin kiinalaiset työläiset suljettiin pois australialaisilta ja kalifornialaisilta kaivoksilta, vaikka he olivat halukkaita osallistumaan sopimus- ja vaihtotoimintaan.
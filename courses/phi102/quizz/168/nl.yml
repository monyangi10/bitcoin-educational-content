question: Wat was volgens liberale economen in de 19e eeuw de belangrijkste motivatie achter arbeidersprotectionisme en anti-immigratiewetten?
answer: Binnenlandse werknemers beschermen tegen concurrentie van buitenlandse werknemers die bereid zijn voor lagere lonen te werken
wrong_answers:
  - Voorkomen dat buitenlandse werknemers ziekten en culturele conflicten het land binnenbrengen
  - De nationale veiligheid handhaven door de toegang tot gevoelige sectoren en overheidsfuncties te beperken
  - Traditionele ambachtelijke methoden behouden tegen industrialisatie en mechanisatie
explanation: |
  Volgens het hoofdstuk identificeerden 19e-eeuwse liberale economen arbeidersprotectionisme als fundamenteel economisch van aard - binnenlandse arbeiders zochten bescherming tegen concurrentie van buitenlandse arbeiders, vooral degenen die bereid waren om in mijnen en andere industrieën te werken tegen concurrerende lonen. Dit komt overeen met de manier waarop ondernemers tariefprotectionisme gebruikten om zichzelf te beschermen tegen concurrentie van buitenlandse producten. De andere opties richten zich op culturele, veiligheids- of technologische overwegingen, maar de liberale economen beschouwden dit specifiek als een economisch beschermingsmechanisme waarbij arbeiders politieke middelen gebruikten om concurrentie op de markt te vermijden, vergelijkbaar met hoe de Chinese arbeiders werden uitgesloten van de Australische en Californische mijnen ondanks hun bereidheid om deel te nemen door middel van contracten en uitwisseling.
question: Vad var det främsta motivet bakom arbetarprotektionism och antiimmigrationslagar enligt liberala ekonomer på 1800-talet?
answer: Att skydda inhemska arbetstagare från konkurrens med utländska arbetstagare som är villiga att arbeta för lägre löner
wrong_answers:
  - Att förhindra att utländska arbetstagare för med sig sjukdomar och kulturella konflikter till landet
  - Att upprätthålla nationell säkerhet genom att begränsa tillträdet till känsliga industrier och statliga befattningar
  - Att bevara traditionella hantverksmetoder mot industrialisering och mekanisering
explanation: |
  Enligt kapitlet identifierade 1800-talets liberala ekonomer arbetarprotektionism som något i grunden ekonomiskt - inhemska arbetare sökte skydd från konkurrens med utländska arbetare, särskilt sådana som var villiga att arbeta i gruvor och andra industrier för konkurrenskraftiga löner. Detta var en parallell till hur företagare använde tullprotektionism för att skydda sig mot konkurrens från utländska produkter. De andra alternativen fokuserar på kulturella, säkerhetsmässiga eller tekniska frågor, men de liberala ekonomerna såg detta specifikt som en ekonomisk skyddsmekanism där arbetarna använde politiska medel för att undvika konkurrens på marknaden, på samma sätt som de kinesiska arbetarna utestängdes från australiensiska och kaliforniska gruvor trots att de var villiga att delta genom avtal och utbyte.
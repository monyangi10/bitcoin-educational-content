question: What was the primary motivation behind worker protectionism and anti-immigration laws according to liberal economists of the 19th century?
answer: To protect domestic workers from competition with foreign workers willing to work for lower wages
wrong_answers:
  - To prevent foreign workers from bringing diseases and cultural conflicts into the country
  - To maintain national security by limiting access to sensitive industries and government positions
  - To preserve traditional craftsmanship methods against industrialization and mechanization
explanation: |
  According to the chapter, 19th-century liberal economists identified worker protectionism as fundamentally economic in nature - domestic workers sought protection from competition with foreign workers, particularly those willing to work in mines and other industries for competitive wages. This paralleled how business owners used tariff protectionism to shield themselves from foreign product competition. The other options focus on cultural, security, or technological concerns, but the liberal economists specifically viewed this as an economic protection mechanism where workers used political means to avoid market competition, similar to how the Chinese workers were excluded from Australian and Californian mines despite their willingness to participate through contract and exchange.
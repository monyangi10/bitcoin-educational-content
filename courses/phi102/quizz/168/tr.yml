question: 19'uncu yüzyılın liberal ekonomistlerine göre işçi korumacılığının ve göç karşıtı yasaların ardındaki temel motivasyon neydi?
answer: Yerli işçileri daha düşük ücretlerle çalışmak isteyen yabancı işçilerle rekabetten korumak
wrong_answers:
  - Yabancı işçilerin ülkeye hastalık ve kültürel çatışmalar getirmesini önlemek
  - Hassas sektörlere ve devlet pozisyonlarına erişimi sınırlandırarak ulusal güvenliği korumak
  - Sanayileşme ve makineleşmeye karşı geleneksel zanaatkarlık yöntemlerini korumak
explanation: |
  Bu bölüme göre, 19. yüzyıl liberal ekonomistleri işçi korumacılığını temelde ekonomik olarak tanımlamışlardır - yerli işçiler, özellikle madenlerde ve diğer endüstrilerde rekabetçi ücretler karşılığında çalışmak isteyen yabancı işçilerle rekabetten korunmak istemişlerdir. Bu, işletme sahiplerinin kendilerini yabancı ürün rekabetinden korumak için tarife korumacılığını kullanmalarına paraleldir. Diğer seçenekler kültürel, güvenlik veya teknolojik kaygılara odaklansa da liberal ekonomistler bunu, Çinli işçilerin sözleşme ve mübadele yoluyla katılmaya istekli olmalarına rağmen Avustralya ve Kaliforniya madenlerinden dışlanmalarına benzer şekilde, işçilerin piyasa rekabetinden kaçınmak için siyasi yollara başvurduğu ekonomik bir koruma mekanizması olarak görmüştür.
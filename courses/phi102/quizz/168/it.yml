question: Qual era la motivazione principale del protezionismo dei lavoratori e delle leggi anti-immigrazione secondo gli economisti liberali del XIX secolo?
answer: Proteggere i lavoratori domestici dalla concorrenza di lavoratori stranieri disposti a lavorare per salari più bassi
wrong_answers:
  - Per evitare che i lavoratori stranieri portino nel paese malattie e conflitti culturali
  - Mantenere la sicurezza nazionale limitando l'accesso a industrie e posizioni governative sensibili
  - Preservare i metodi artigianali tradizionali contro l'industrializzazione e la meccanizzazione
explanation: |
  Secondo il capitolo, gli economisti liberali del XIX secolo hanno identificato il protezionismo dei lavoratori come un fenomeno di natura fondamentalmente economica: i lavoratori nazionali cercavano di essere protetti dalla concorrenza dei lavoratori stranieri, in particolare quelli disposti a lavorare nelle miniere e in altre industrie per salari competitivi. Ciò corrisponde al modo in cui gli imprenditori hanno usato il protezionismo tariffario per proteggersi dalla concorrenza dei prodotti stranieri. Le altre opzioni si concentrano su questioni culturali, di sicurezza o tecnologiche, ma gli economisti liberali considerano questo meccanismo come un meccanismo di protezione economica in cui i lavoratori utilizzano mezzi politici per evitare la concorrenza del mercato, in modo simile a come i lavoratori cinesi sono stati esclusi dalle miniere australiane e californiane nonostante la loro volontà di partecipare attraverso contratti e scambi.
question: Was war nach Ansicht der liberalen Ökonomen des 19. Jahrhunderts der Hauptgrund für den Protektionismus der Arbeitnehmer und die Anti-Einwanderungsgesetze?
answer: Schutz inländischer Arbeitnehmer vor dem Wettbewerb mit ausländischen Arbeitnehmern, die bereit sind, für niedrigere Löhne zu arbeiten
wrong_answers:
  - Um zu verhindern, dass ausländische Arbeitnehmer Krankheiten und kulturelle Konflikte ins Land bringen
  - Aufrechterhaltung der nationalen Sicherheit durch Beschränkung des Zugangs zu sensiblen Branchen und Regierungspositionen
  - Bewahrung traditioneller Handwerksmethoden gegen Industrialisierung und Mechanisierung
explanation: |
  Dem Kapitel zufolge erkannten liberale Ökonomen im 19. Jahrhundert, dass der Protektionismus von Arbeitnehmern im Wesentlichen wirtschaftlicher Natur ist - einheimische Arbeitnehmer suchten Schutz vor dem Wettbewerb mit ausländischen Arbeitnehmern, insbesondere solchen, die bereit waren, in Bergwerken und anderen Industrien zu konkurrenzfähigen Löhnen zu arbeiten. Dies entsprach der Art und Weise, wie Unternehmer den Zollprotektionismus einsetzten, um sich vor der Konkurrenz ausländischer Produkte zu schützen. Die anderen Optionen konzentrieren sich auf kulturelle, sicherheitspolitische oder technologische Belange, aber die liberalen Ökonomen betrachteten dies speziell als einen wirtschaftlichen Schutzmechanismus, bei dem die Arbeitnehmer politische Mittel einsetzten, um den Wettbewerb auf dem Markt zu vermeiden, ähnlich wie die chinesischen Arbeiter von den australischen und kalifornischen Minen ausgeschlossen wurden, obwohl sie bereit waren, sich durch Verträge und Austausch zu beteiligen.
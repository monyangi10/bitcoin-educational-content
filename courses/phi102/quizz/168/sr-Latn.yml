question: Koja je bila primarna motivacija iza zaštite radnika i zakona protiv imigracije prema liberalnim ekonomistima 19. veka?
answer: Da bi se zaštitili domaći radnici od konkurencije sa stranim radnicima koji su spremni da rade za niže plate
wrong_answers:
  - Da se spreči da strani radnici unesu bolesti i kulturne sukobe u zemlju
  - Da bi se održala nacionalna bezbednost ograničavanjem pristupa osetljivim industrijama i državnim pozicijama
  - Da se očuvaju tradicionalne zanatske metode protiv industrijalizacije i mehanizacije
explanation: |
  Prema poglavlju, ekonomisti liberali iz 19. veka identifikovali su radnički protekcionizam kao fundamentalno ekonomski po prirodi - domaći radnici su tražili zaštitu od konkurencije sa stranim radnicima, posebno onima koji su bili spremni da rade u rudnicima i drugim industrijama za konkurentne plate. Ovo je bilo paralelno sa načinom na koji su vlasnici preduzeća koristili tarifni protekcionizam da se zaštite od konkurencije stranih proizvoda. Druge opcije se fokusiraju na kulturne, bezbednosne ili tehnološke brige, ali su liberali ekonomisti ovo specifično videli kao ekonomski mehanizam zaštite gde su radnici koristili politička sredstva da izbegnu tržišnu konkurenciju, slično kako su kineski radnici bili isključeni iz australijskih i kalifornijskih rudnika uprkos njihovoj spremnosti da učestvuju putem ugovora i razmene.
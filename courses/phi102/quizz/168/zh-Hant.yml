question: 19 世紀的自由派經濟學家認為，工人保護主義和反移民法背後的主要動機是什麼？
answer: 保護國內勞工免於與願意以較低工資工作的外籍勞工競爭
wrong_answers:
  - 防止外籍勞工將疾病和文化衝突帶進國內
  - 透過限制進入敏感產業和政府職位，以維護國家安全
  - 保留傳統工藝方法，以對抗工業化和機械化
explanation: |
  本章指出，19 世紀的自由經濟學家認為工人保護主義根本上是經濟性的--國內工人尋求保護，以避免與外國工人競爭，尤其是那些願意在礦山和其他行業工作以獲得有競爭力工資的工人。這與企業主如何利用關稅保護主義來保護自己免受外國產品競爭的方式類似。其他的選擇則著重於文化、安全或技術上的考量，但自由經濟學家特別將其視為一種經濟保護機制，工人利用政治手段來避免市場競爭，這與中國工人儘管願意透過合約與交換來參與，卻被排除在澳洲與加州礦場的情況類似。
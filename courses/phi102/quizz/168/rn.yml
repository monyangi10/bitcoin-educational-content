question: Ni igiki cari ikintu nyamukuru catumye habaho amategeko yo gukingira abakozi be n’amategeko arwanya abimukira nk’uko abahinga mu vy’ubutunzi bo mu kinjana ca 19 babivuga?
answer: Kugira ngo abakozi bo mu rugo ntibahiganwe n’abakozi bo hanze biteguye gukorera umushahara mutoyi .
wrong_answers:
  - Kugira ngo abakozi bo hanze ntibazane indwara n'indyane z'imico kama mu gihugu .
  - Kubungabunga umutekano w'igihugu mu kugabanya uburenganzira bwo gushika mu nganda zihambaye no mu bibanza vya Leta .
  - Kuzigama uburyo bwa kera bwo gukora ibikorwa vy'ubuhinga bwo kurwanya inganda n'amashini
explanation: |
  Dushingiye ku kigabane, abahinga mu vy’ubutunzi b’abanyagihugu bo mu kinjana ca 19 bamenyesheje ko ugukingira abakozi ari ubutunzi bw’ishimikiro - abakozi bo mu rugo barondera uburinzi bwo guhiganwa n’abakozi bo hanze, cane cane abashaka gukora mu mamine no mu zindi nganda kugira ngo baronke umushahara ushobora guhiganwa. Ivyo vyari bihuye n’ingene ba nyen’ubudandaji bakoresha uburyo bwo gukingira amakori kugira ngo bakingire amahiganwa y’ibicuruzwa vyo mu mahanga. Ayandi mahitamwo yibanda ku mico kama, umutekano, canke ivy'ubuhinga, ariko abahinga mu vy'ubutunzi b'abanyagihugu babona ko ivyo ari uburyo bwo gukingira ubutunzi aho abakozi bakoresha uburyo bwa politike kugira ngo ntibahiganwe mw'isoko, nk'uko abakozi b'abashinwa bakurwa mu mamine yo muri Australiya na California naho bari biteguye kugira uruhara mu guhanahana amakuru biciye mu masezerano.
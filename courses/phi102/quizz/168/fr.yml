question: Selon les économistes libéraux du XIXᵉ siècle, quelle était la principale motivation du protectionnisme des travailleurs et des lois anti-immigration ?
answer: Protéger les travailleurs nationaux de la concurrence des travailleurs étrangers prêts à travailler pour des salaires inférieurs
wrong_answers:
  - Empêcher les travailleurs étrangers d'introduire des maladies et des conflits culturels dans le pays
  - Maintenir la sécurité nationale en limitant l'accès aux industries sensibles et aux postes gouvernementaux
  - Préserver les méthodes artisanales traditionnelles contre l'industrialisation et la mécanisation
explanation: |
  Selon ce chapitre, les économistes libéraux du XIXᵉ siècle ont identifié le protectionnisme des travailleurs comme étant de nature fondamentalement économique : les travailleurs nationaux cherchaient à se protéger de la concurrence des travailleurs étrangers, en particulier ceux qui étaient prêts à travailler dans les mines et dans d'autres industries pour des salaires compétitifs. Cela correspondait à la façon dont les chefs d'entreprise utilisaient le protectionnisme tarifaire pour se protéger de la concurrence des produits étrangers. Les autres options se concentrent sur des préoccupations culturelles, sécuritaires ou technologiques, mais les économistes libéraux considèrent spécifiquement qu'il s'agit d'un mécanisme de protection économique dans lequel les travailleurs utilisent des moyens politiques pour éviter la concurrence du marché, de la même manière que les travailleurs chinois ont été exclus des mines australiennes et californiennes malgré leur volonté de participer par le biais d'un contrat et d'un échange.

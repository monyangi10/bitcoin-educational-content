question: Segundo os economistas liberais do século XIX, qual era a principal motivação subjacente ao protecionismo dos trabalhadores e às leis anti-imigração?
answer: Para proteger os trabalhadores nacionais da concorrência de trabalhadores estrangeiros dispostos a trabalhar por salários mais baixos
wrong_answers:
  - Evitar que os trabalhadores estrangeiros tragam doenças e conflitos culturais para o país
  - Para manter a segurança nacional, limitando o acesso a sectores sensíveis e a cargos governamentais
  - Preservar os métodos artesanais tradicionais contra a industrialização e a mecanização
explanation: |
  De acordo com o capítulo, os economistas liberais do século XIX identificaram o protecionismo dos trabalhadores como sendo de natureza fundamentalmente económica - os trabalhadores nacionais procuravam proteção contra a concorrência de trabalhadores estrangeiros, em especial os que estavam dispostos a trabalhar nas minas e noutras indústrias por salários competitivos. Isto é semelhante à forma como os empresários utilizavam o protecionismo pautal para se protegerem da concorrência de produtos estrangeiros. As outras opções centram-se em preocupações culturais, de segurança ou tecnológicas, mas os economistas liberais consideravam especificamente que se tratava de um mecanismo de proteção económica em que os trabalhadores recorriam a meios políticos para evitar a concorrência do mercado, à semelhança da forma como os trabalhadores chineses eram excluídos das minas australianas e californianas, apesar da sua vontade de participar através de contratos e trocas.
question: Mis oli 19. sajandi liberaalsete majandusteadlaste arvates tööliste protektsionismi ja immigratsioonivastaste seaduste peamine motivatsioon?
answer: Kaitsta kodumaiseid töötajaid konkurentsi eest välismaiste töötajatega, kes on valmis töötama madalama palga eest
wrong_answers:
  - Vältida, et välistöötajad tooksid riiki haigusi ja kultuurikonflikte
  - Riikliku julgeoleku säilitamine, piirates juurdepääsu tundlikele tööstusharudele ja valitsuse ametikohtadele
  - Traditsiooniliste käsitöömeetodite säilitamine industrialiseerimise ja mehhaniseerimise vastu
explanation: |
  Peatüki kohaselt tuvastasid 19. sajandi liberaalsed majandusteadlased, et töötajate protektsionism on oma olemuselt põhimõtteliselt majanduslik - kodumaised töölised otsisid kaitset välismaiste tööliste konkurentsi eest, eriti nende eest, kes olid valmis töötama kaevandustes ja muudes tööstusharudes konkurentsivõimelise palga eest. See oli paralleelne sellega, kuidas ettevõtjad kasutasid tariifset protektsionismi, et kaitsta end välismaiste toodete konkurentsi eest. Teised võimalused keskenduvad kultuurilistele, julgeoleku- või tehnoloogilistele probleemidele, kuid liberaalsed majandusteadlased nägid seda konkreetselt majandusliku kaitsemehhanismina, kus töötajad kasutasid poliitilisi vahendeid, et vältida turukonkurentsi, sarnaselt sellega, kuidas Hiina töölised jäeti Austraalia ja Kalifornia kaevandustest välja, hoolimata nende valmisolekust osaleda lepingu ja vahetuse kaudu.
question: Bu bölüme göre, tarih öncesi toplumlarda kabile topluluklarını terk etmeye çalışan kadınların tipik kaderi neydi?
answer: Bağımsız üretken kapasitelerinin olmaması nedeniyle kesin ölümle karşı karşıya kaldılar
wrong_answers:
  - Komşu kabileler tarafından değerli üyeler olarak karşılandılar
  - Çölde başarılı bir şekilde bağımsız yerleşimler kurdular
  - Cezalandırıldılar ancak bir süre sürgünde kaldıktan sonra geri dönmelerine izin verildi
explanation: |
  Bölümde, kampından kaçarak 'özgürlüğü tatmak' isteyen bir kadının, bağımsız olarak hayatta kalamaması nedeniyle kesin bir ölümle karşı karşıya kalacağı özellikle belirtilmektedir. Metin, yetişkin erkek desteği olmadan hayatta kalmanın imkansız olduğunu, çünkü kadınların tarih öncesinin sert ortamında avcılık, balıkçılık ve toplayıcılık için gerekli üretken kapasiteden yoksun olduğunu açıklamaktadır. Bu da ideolojik tercihlerin değil maddi kısıtlamaların sosyal düzenlemeleri nasıl belirlediğini göstermektedir. Diğer seçenekler yanlıştır çünkü kadınların uygulanabilir alternatifleri olduğunu veya bağımsız olarak hayatta kalabileceklerini öne sürmektedirler ki bu da bölümün tarih öncesi toplumlarda bireysel özerkliği neredeyse imkansız kılan aşırı maddi kısıtlamalara yaptığı vurguyla çelişmektedir.
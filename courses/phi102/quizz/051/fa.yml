question: طبقاً به فصل، سرنوشت معمول زنانی که در جوامع قبیله‌ای پیشاتاریخی تلاش می‌کردند تا جامعه خود را ترک کنند چه بود؟
answer: آن‌ها به دلیل کمبود ظرفیت تولید مستقل با مرگ حتمی مواجه شدند.
wrong_answers:
  - آنها توسط قبایل همسایه به عنوان اعضای ارزشمند مورد استقبال قرار گرفتند
  - آن‌ها به‌طور موفقیت‌آمیزی سکونتگاه‌های مستقلی در بیابان ایجاد کردند.
  - آن‌ها مجازات شدند اما پس از مدتی تبعید اجازه یافتند بازگردند.
explanation: |
  این فصل به‌طور خاص بیان می‌کند که زنی که می‌خواست با فرار از اردوگاه خود «طعم آزادی» را بچشد، به دلیل ناتوانی در بقا به‌طور مستقل با مرگ حتمی روبرو می‌شد. متن توضیح می‌دهد که بدون حمایت مردان بالغ، بقا غیرممکن بود زیرا زنان فاقد ظرفیت تولیدی لازم برای شکار، ماهیگیری و جمع‌آوری در محیط سخت پیشاتاریخی بودند. این نشان می‌دهد که محدودیت‌های مادی، نه ترجیحات ایدئولوژیک، تعیین‌کننده ترتیبات اجتماعی بودند. گزینه‌های دیگر نادرست هستند زیرا پیشنهاد می‌دهند که زنان گزینه‌های قابل‌دوام داشتند یا می‌توانستند به‌طور مستقل زنده بمانند، که این با تأکید فصل بر محدودیت‌های مادی شدید که خودمختاری فردی را در جوامع پیشاتاریخی عملاً غیرممکن می‌کرد، در تضاد است.
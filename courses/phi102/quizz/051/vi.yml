question: Theo chương này, số phận điển hình của những phụ nữ cố gắng rời bỏ cộng đồng bộ lạc của họ trong các xã hội tiền sử là gì?
answer: Họ đối mặt với cái chết chắc chắn do thiếu khả năng sản xuất độc lập.
wrong_answers:
  - Họ được các bộ lạc lân cận chào đón như những thành viên quý giá.
  - Họ đã thành công trong việc thiết lập các khu định cư độc lập trong vùng hoang dã.
  - Họ bị trừng phạt nhưng được phép trở về sau một thời gian lưu đày.
explanation: |
  Chương này nêu rõ rằng một người phụ nữ muốn "nếm trải tự do" bằng cách bỏ trốn khỏi trại của mình sẽ phải đối mặt với cái chết chắc chắn vì không có khả năng tự sinh tồn. Văn bản giải thích rằng nếu không có sự hỗ trợ của người lớn nam giới, sự sống sót là điều không thể vì phụ nữ thiếu khả năng sản xuất cần thiết cho việc săn bắn, đánh bắt cá và hái lượm trong môi trường tiền sử khắc nghiệt. Điều này minh họa cách thức các hạn chế vật chất, chứ không phải sở thích về tư tưởng, đã quyết định các sắp xếp xã hội. Các lựa chọn khác là không chính xác vì chúng cho rằng phụ nữ có những lựa chọn khả thi khác hoặc có thể tự sinh tồn, điều này mâu thuẫn với sự nhấn mạnh của chương về những hạn chế vật chất cực độ khiến quyền tự chủ cá nhân gần như không thể thực hiện được trong các xã hội tiền sử.
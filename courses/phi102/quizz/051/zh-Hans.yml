question: 根据本章内容，在史前社会中，试图离开部落社会的妇女的典型命运是什么？
answer: 由于缺乏独立的生产能力，他们必死无疑
wrong_answers:
  - 他们受到邻近部落的欢迎，被视为宝贵的成员
  - 他们成功地在荒野中建立了独立的定居点
  - 他们受到惩罚，但在流放一段时间后获准返回
explanation: |
  这一章特别指出，想要逃离营地 "尝尝自由的滋味 "的妇女由于无法独立生存，必将面临死亡。文中解释说，没有成年男性的支持，妇女就不可能生存，因为妇女缺乏在恶劣的史前环境中狩猎、捕鱼和采集所需的生产能力。这说明了物质限制而非意识形态偏好是如何决定社会安排的。其他选项都不正确，因为它们暗示妇女有其他可行的选择，或者可以独立生存，这与本章强调的极端物质限制相矛盾，在史前社会，个人自主实际上是不可能的。
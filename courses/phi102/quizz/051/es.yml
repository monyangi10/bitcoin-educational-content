question: Según el capítulo, ¿cuál era el destino típico de las mujeres que intentaban abandonar sus comunidades tribales en las sociedades prehistóricas?
answer: Se enfrentaban a una muerte segura por falta de capacidad productiva independiente
wrong_answers:
  - Fueron acogidos por las tribus vecinas como miembros valiosos
  - Establecieron con éxito asentamientos independientes en el desierto
  - Fueron castigados pero se les permitió regresar tras un periodo de exilio
explanation: |
  El capítulo afirma específicamente que una mujer que quisiera "saborear la libertad" huyendo de su campamento se enfrentaría a una muerte segura debido a su incapacidad para sobrevivir de forma independiente. El texto explica que, sin el apoyo de un hombre adulto, la supervivencia era imposible porque las mujeres carecían de la capacidad productiva necesaria para cazar, pescar y recolectar en el duro entorno prehistórico. Esto ilustra cómo las limitaciones materiales, y no las preferencias ideológicas, determinaban los acuerdos sociales. Las otras opciones son incorrectas porque sugieren que las mujeres tenían alternativas viables o podían sobrevivir de forma independiente, lo que contradice el énfasis del capítulo en las extremas limitaciones materiales que hacían prácticamente imposible la autonomía individual en las sociedades prehistóricas.
question: 根據本章所述，在史前社會中，試圖離開部落社區的婦女的典型命運是什麼？
answer: 由於缺乏獨立的生產能力，他們面臨死亡。
wrong_answers:
  - 他們受到鄰近部落的歡迎，成為有價值的成員。
  - 他們成功地在荒野中建立了獨立的聚落
  - 他們受到懲罰，但在流放一段時間後獲准返回。
explanation: |
  本章特別指出，想要逃離營地「嘗試自由」的婦女會因為無法獨立生存而必死無疑。文中解釋，如果沒有成年男性的支持，婦女是不可能生存的，因為婦女缺乏在嚴酷的史前環境中狩獵、捕魚和採集所需的生產能力。這說明了物質的限制而非意識形態的偏好如何決定了社會的安排。其他的選項是不對的，因為它們暗示婦女有其他可行的選擇或可以獨立生存，這與本章強調在史前社會中，極端的物質限制使得個人自主幾乎是不可能的。
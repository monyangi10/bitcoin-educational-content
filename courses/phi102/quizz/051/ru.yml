question: Согласно главе, какова была типичная судьба женщин, которые пытались покинуть свои племенные общины в доисторических обществах?
answer: Им грозила верная смерть из-за отсутствия самостоятельного производственного потенциала
wrong_answers:
  - Они были приняты соседними племенами как ценные члены
  - Они успешно основали независимые поселения в дикой местности
  - Они были наказаны, но им разрешили вернуться после периода изгнания
explanation: |
  В главе особо отмечается, что женщину, которая захочет "почувствовать вкус свободы", сбежав из лагеря, ждет верная смерть из-за ее неспособности выжить самостоятельно. В тексте объясняется, что без поддержки взрослых мужчин выжить было невозможно, поскольку женщины не обладали производственным потенциалом, необходимым для охоты, рыбалки и собирательства в суровых доисторических условиях. Это иллюстрирует, как материальные ограничения, а не идеологические предпочтения, определяли социальное устройство. Другие варианты неверны, поскольку предполагают, что у женщин были жизнеспособные альтернативы или они могли выжить самостоятельно, что противоречит акценту главы на крайних материальных ограничениях, которые делали индивидуальную автономию практически невозможной в доисторических обществах.
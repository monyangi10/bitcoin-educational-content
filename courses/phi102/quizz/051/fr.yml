question: D'après le chapitre, quel était le sort typique des femmes qui tentaient de quitter leur communauté tribale dans les sociétés préhistoriques ?
answer: Ils étaient confrontés à une mort certaine en raison de l'absence d'une capacité de production indépendante
wrong_answers:
  - Ils ont été accueillis par les tribus voisines comme des membres précieux
  - Ils ont réussi à établir des colonies indépendantes dans les régions sauvages
  - Ils ont été punis mais ont été autorisés à revenir après une période d'exil
explanation: |
  Le chapitre précise qu'une femme qui voudrait "goûter à la liberté" en fuyant son camp s'exposerait à une mort certaine en raison de son incapacité à survivre de manière indépendante. Le texte explique que sans le soutien d'un adulte masculin, la survie était impossible car les femmes n'avaient pas la capacité de production nécessaire pour la chasse, la pêche et la cueillette dans le rude environnement préhistorique. Cela illustre la manière dont les contraintes matérielles, et non les préférences idéologiques, déterminent les arrangements sociaux. Les autres options sont incorrectes car elles suggèrent que les femmes disposaient d'alternatives viables ou qu'elles pouvaient survivre de manière indépendante, ce qui contredit l'accent mis dans le chapitre sur les contraintes matérielles extrêmes qui rendaient l'autonomie individuelle pratiquement impossible dans les sociétés préhistoriques.
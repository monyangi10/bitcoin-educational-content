question: Dushingiye ku kigabane, abagore bagerageza kuva mu mibano y’imiryango yabo mu mibano y’imbere y’amateka, bashikirwa n’ikihe?
answer: Bahuye n'urupfu rumwe rumwe kubera ukubura ubushobozi bwo kwitanga bwigenga .
wrong_answers:
  - Bakiriwe n'imiryango ibakikije nk'abagize umuryango w'agaciro .
  - Barashoboye gushinga imihana yigenga mu bugaragwa .
  - Barahanwe ariko barekurirwa gusubirayo inyuma y’igihe kanaka bari mu bunyagano .
explanation: |
  Ico gice kivuga vyihariye ko umugore yipfuza ‘kuronka umwidegemvyo’ mu guhunga ikambi yiwe yoshikirwa n’urupfu rudakeka kubera ukuntu adashobora kurokoka yigenga. Ico canditswe kirasigura yuko iyo ata nkunga y’abagabo bakuze, ukurokoka kwari gushoboka kubera ko abagore batagira ubushobozi bwo guhigira, kuroba no gukorakoranya ibintu mu bidukikije bikomeye vy’imbere y’amateka. Ivyo vyerekana ingene ingorane z’ivy’umubiri zari zigena indinganizo z’imibano, atari ivyo umuntu akunda mu vy’ingengabitekerezo. Ayandi mahitamwo ntabwo ari meza kuko yerekana ko abagore bari bafise ubundi buryo bwo kubaho canke ko boshobora kubaho bigenjeje neza, ivyo bikaba bivuguruza ivyo ikigabane gishimikiyeko ku bijanye n’imipaka y’ivy’umubiri ikaze cane yatuma ubwigenge bw’umuntu ku giti ciwe budashoboka mu mibano y’imbere y’amateka.
question: この章によると、有史以前の社会で部族社会を離れようとした女性の典型的な運命は何だったのだろうか？
answer: 自立した生産能力がないため、彼らは確実な死に直面していた。
wrong_answers:
  - 彼らは近隣の部族から貴重なメンバーとして歓迎された。
  - 彼らは荒野に独立した入植地を築くことに成功した。
  - 彼らは処罰されたが、追放期間を経て戻ることを許された。
explanation: |
  この章では特に、キャンプから逃れて『自由を味わいたい』と望む女性は、自立して生き延びることができないため、確実に死に直面すると述べている。厳しい先史時代の環境では、女性には狩猟、漁労、採集に必要な生産能力がないため、男性の大人のサポートがなければ、生存は不可能であったと説明されている。これは、イデオロギー的嗜好ではなく、物質的制約がいかに社会的取り決めを決定していたかを示している。他の選択肢は、女性には実行可能な代替手段があったとか、自立して生き延びることができたということを示唆しており、先史時代の社会では個人の自律が事実上不可能であったという極端な物質的制約を強調する本章の内容と矛盾しているため、正しくない。
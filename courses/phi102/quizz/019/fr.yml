question: Que doit-il se passer avant la consommation d'un bien selon les principes de la propriété ?
answer: L'appropriation doit précéder la consommation
wrong_answers:
  - La production doit précéder la consommation
  - Exchange doit précéder la consommation
  - La distribution doit précéder la consommation
explanation: |
  Le texte indique clairement que l'appropriation précède nécessairement la consommation, en prenant l'exemple que pour consommer une pomme, il faut d'abord se l'approprier. Cette appropriation a un caractère individuel, et c'est précisément parce que nous nous approprions les biens individuellement que nous en ressentons personnellement les effets. Si la production, l'échange et la distribution sont des processus économiques importants, le principe fondamental établi est que l'appropriation - le fait de s'approprier un bien - doit avoir lieu avant toute consommation.
question: สิ่งใดต้องเกิดขึ้นก่อนการบริโภคสินค้าตามหลักการของทรัพย์สิน?
answer: การจัดสรรต้องมาก่อนการบริโภค
wrong_answers:
  - การผลิตต้องมาก่อนการบริโภค
  - Exchange ต้องมาก่อนการบริโภค
  - การกระจายต้องมาก่อนการบริโภค
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าการจัดสรรทรัพยากรต้องเกิดขึ้นก่อนการบริโภค โดยใช้ตัวอย่างว่าการจะบริโภคแอปเปิ้ลได้ ต้องจัดสรรแอปเปิ้ลนั้นก่อน การจัดสรรนี้มีลักษณะเฉพาะบุคคล และเป็นเพราะเราจัดสรรทรัพยากรเป็นรายบุคคล เราจึงได้รับผลกระทบจากการบริโภคเป็นการส่วนตัว แม้ว่าการผลิต การแลกเปลี่ยน และการกระจายจะเป็นกระบวนการทางเศรษฐกิจที่สำคัญ หลักการพื้นฐานที่กำหนดไว้คือการจัดสรรทรัพยากร - การครอบครอง - ต้องเกิดขึ้นก่อนที่การบริโภคจะเกิดขึ้นได้
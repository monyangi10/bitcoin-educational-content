question: Что должно произойти перед потреблением любого блага в соответствии с принципами собственности?
answer: Присвоение должно предшествовать потреблению
wrong_answers:
  - Производство должно предшествовать потреблению
  - ГВ-0 должно предшествовать потреблению
  - Распространение должно предшествовать потреблению
explanation: |
  В тексте четко сказано, что присвоение обязательно предшествует потреблению, на примере того, что для того, чтобы съесть яблоко, его нужно сначала присвоить. Это присвоение носит индивидуальный характер, и именно потому, что мы присваиваем товары индивидуально, мы испытываем на себе их воздействие. Хотя производство, обмен и распределение являются важными экономическими процессами, основополагающий принцип заключается в том, что присвоение - вступление в права собственности - должно произойти до того, как возникнет потребление.
question: Vad måste ske innan en vara konsumeras enligt äganderättsliga principer?
answer: Tilldelning måste föregå konsumtion
wrong_answers:
  - Produktion måste föregå konsumtion
  - Exchange måste föregå konsumtion
  - Distribution måste föregå konsumtion
explanation: |
  I texten står det klart och tydligt att tillägnelse nödvändigtvis föregår konsumtion, med exemplet att man först måste tillägna sig ett äpple för att kunna konsumera det. Detta tillägnande har en individuell karaktär, och det är just för att vi tillägnar oss varor individuellt som vi upplever deras effekter personligen. Produktion, utbyte och distribution är visserligen viktiga ekonomiska processer, men den grundläggande princip som fastställs är att tillägnande - att ta över ägandet - måste ske innan någon konsumtion kan äga rum.
question: O que é que deve ocorrer antes do consumo de qualquer bem, de acordo com os princípios da propriedade?
answer: A apropriação deve preceder o consumo
wrong_answers:
  - A produção deve preceder o consumo
  - O Exchange deve preceder o consumo
  - A distribuição deve preceder o consumo
explanation: |
  O texto afirma claramente que a apropriação precede necessariamente o consumo, utilizando o exemplo de que, para consumir uma maçã, é necessário apropriar-se dela. Esta apropriação tem um carácter individual, e é precisamente porque nos apropriamos dos bens individualmente que sentimos os seus efeitos pessoalmente. Embora a produção, a troca e a distribuição sejam processos económicos importantes, o princípio fundamental estabelecido é o de que a apropriação - a tomada de posse - deve ocorrer antes de qualquer consumo.
question: Was muss nach den Grundsätzen des Eigentums vor dem Konsum einer Ware geschehen?
answer: Die Aneignung muss dem Verbrauch vorausgehen
wrong_answers:
  - Die Produktion muss dem Verbrauch vorausgehen
  - Exchange muss dem Verbrauch vorausgehen
  - Die Verteilung muss vor dem Verbrauch erfolgen
explanation: |
  Der Text macht deutlich, dass die Aneignung notwendigerweise dem Konsum vorausgeht, indem er das Beispiel anführt, dass man sich einen Apfel erst aneignen muss, um ihn zu konsumieren. Diese Aneignung hat einen individuellen Charakter, und gerade weil wir uns die Güter individuell aneignen, erleben wir ihre Auswirkungen persönlich. Produktion, Austausch und Verteilung sind zwar wichtige wirtschaftliche Prozesse, aber das grundlegende Prinzip ist, dass die Aneignung - die Übernahme des Eigentums - erfolgen muss, bevor es zu einem Konsum kommen kann.
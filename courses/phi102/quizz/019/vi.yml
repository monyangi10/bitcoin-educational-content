question: Theo các nguyên tắc về quyền sở hữu, điều gì phải xảy ra trước khi tiêu thụ bất kỳ hàng hóa nào?
answer: Việc chiếm dụng phải diễn ra trước khi tiêu thụ.
wrong_answers:
  - Sản xuất phải diễn ra trước tiêu thụ.
  - Exchange phải có trước khi tiêu thụ.
  - Việc phân phối phải diễn ra trước khi tiêu thụ.
explanation: |
  Văn bản nêu rõ rằng việc chiếm hữu nhất thiết phải diễn ra trước khi tiêu thụ, lấy ví dụ rằng để tiêu thụ một quả táo, người ta phải chiếm hữu nó trước. Việc chiếm hữu này mang tính cá nhân, và chính vì chúng ta chiếm hữu hàng hóa một cách cá nhân nên chúng ta trải nghiệm tác động của chúng một cách cá nhân. Mặc dù sản xuất, trao đổi và phân phối là những quá trình kinh tế quan trọng, nguyên tắc cơ bản được thiết lập là việc chiếm hữu - giành quyền sở hữu - phải diễn ra trước khi bất kỳ sự tiêu thụ nào có thể xảy ra.
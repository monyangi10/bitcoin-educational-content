question: Hva må skje før man kan forbruke en vare i henhold til eiendomsprinsippene?
answer: Tilegnelse må gå forut for forbruk
wrong_answers:
  - Produksjon må gå forut for forbruk
  - Exchange må gå forut for forbruk
  - Distribusjon må gå forut for forbruk
explanation: |
  Teksten er tydelig på at tilegnelse nødvendigvis går forut for forbruk, og bruker eksemplet med at man først må tilegne seg et eple for å kunne forbruke det. Denne tilegnelsen har en individuell karakter, og det er nettopp fordi vi tilegner oss varer individuelt at vi opplever virkningene av dem personlig. Selv om produksjon, bytte og distribusjon er viktige økonomiske prosesser, er det grunnleggende prinsippet at tilegnelse - det å ta eierskap - må skje før forbruk kan finne sted.
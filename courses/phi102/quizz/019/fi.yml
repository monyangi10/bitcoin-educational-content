question: Mitä on tapahduttava ennen kuin jokin tavara kulutetaan omistusoikeuden periaatteiden mukaisesti?
answer: Kulutusta on edeltävä käyttötarkoituksen omaksuminen
wrong_answers:
  - Tuotannon on edettävä ennen kulutusta
  - Exchange:n on edeltävä kulutusta
  - Jakelun on edettävä ennen kulutusta
explanation: |
  Tekstissä todetaan selvästi, että haltuunotto edeltää välttämättä kulutusta, ja käytetään esimerkkiä, jonka mukaan omenan kuluttaminen edellyttää sen haltuunottoa. Omistautuminen on yksilöllistä, ja juuri siksi, että omaksumme tavarat yksilöllisesti, koemme niiden vaikutukset henkilökohtaisesti. Vaikka tuotanto, vaihto ja jakelu ovat tärkeitä taloudellisia prosesseja, perusperiaatteena on, että haltuunoton - omistusoikeuden ottamisen - on tapahduttava ennen kuin kulutusta voi tapahtua.
question: Mis peab toimuma enne mis tahes kauba tarbimist vastavalt omandipõhimõtetele?
answer: Omandamine peab eelnema tarbimisele
wrong_answers:
  - Tarbimisele peab eelnema tootmine
  - Exchange peab eelnema tarbimisele
  - Jaotamine peab eelnema tarbimisele
explanation: |
  Tekstis on selgelt öeldud, et tarbimisele peab tingimata eelnema omastamine, kasutades näidet, et õuna tarbimiseks tuleb see kõigepealt omastada. See omastamine on individuaalse iseloomuga ja just seetõttu, et me omastame kaupu individuaalselt, kogeme nende mõju isiklikult. Kuigi tootmine, vahetus ja jaotamine on olulised majanduslikud protsessid, on kehtestatud põhiprintsiip, et omastamine - omandamine - peab toimuma enne tarbimist.
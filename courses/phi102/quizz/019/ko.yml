question: 재산의 원칙에 따라 재화를 소비하기 전에 어떤 일이 일어나야 하나요?
answer: 소비에 앞서 지출이 선행되어야 합니다
wrong_answers:
  - 생산이 소비보다 선행되어야 합니다
  - Exchange이 소비보다 선행되어야 함
  - 유통이 소비보다 선행되어야 합니다
explanation: |
  본문은 사과를 소비하기 위해서는 먼저 사과를 적절히 사용해야 한다는 예를 들어 소비에 앞서 전유가 반드시 선행되어야 함을 분명히 밝히고 있습니다. 이러한 전유는 개별적인 성격을 가지며, 우리가 재화를 개별적으로 전유하기 때문에 우리는 그 효과를 개인적으로 경험합니다. 생산, 교환, 분배는 중요한 경제 과정이지만, 소비가 일어나기 전에 소유권을 갖는 전유가 먼저 이루어져야 한다는 기본 원칙이 확립되어 있습니다.
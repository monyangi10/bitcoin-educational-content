question: Ni igiki Tocqueville yerekana ko ari co kintu gihambaye kuruta ibindi vyose umuntu afise mu bikorwa?
answer: Kwibagirwa ikibano kinini kugira ngo umuntu yibande kuri we nyene no ku bo bakundana
wrong_answers:
  - Kwitandukanya n'abandi no kwanka imigenderanire yose n'amabanga yose
  - Gukurikirana gusa inyungu z’ivy’umubiri zo vuba ataco twitaye ku ngaruka zo muri kazoza .
  - Gutuma ubutunzi bw’umuntu buba bwinshi kubera ibindi vyose umuntu yokwiyumvira .
explanation: |
  Dukurikije ivyo Tocqueville yihweje mu gitabu ciwe citwa ‘Demokarasi muri Amerika,’ ubwikunzi nyakuri abantu bashobora gukora ni ukwibagirwa ikibano kinini mu gihe bitwararika bo ubwabo n’abo baba kumwe (umuryango, abo bakundana hafi). Ivyo birerekana yuko inyungu z’umuntu ubwiwe atari izo umuntu afise gusa, ahubwo ko zishika no ku bijanye n’umuryango be n’imigenderanire ya hafi yo mu kibano. Ayandi mahitamwo adondora uburyo bw’ubwikunzi buke Tocqueville avuga ko budahuye n’inyifato y’umuntu iboneka, kuko abantu mu bisanzwe bashiramwo ivyiyumviro vyabo birenze imbibe zikomeye z’umuntu ku giti ciwe kugira ngo bashiremwo ababo n’abanyagihugu bo hafi.
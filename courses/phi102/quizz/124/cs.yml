question: Co Tocqueville označuje za maximální míru lidského egoismu v praxi?
answer: Zapomenout na širší společnost a soustředit se na sebe a své blízké okolí
wrong_answers:
  - Úplná izolace a odmítnutí všech sociálních vazeb a odpovědností
  - Sledování pouze okamžitých materiálních zisků bez ohledu na budoucí důsledky
  - Maximalizace osobního bohatství na úkor všech ostatních hledisek
explanation: |
  Podle Tocquevillových postřehů v knize Demokracie v Americe je jediným skutečným egoismem, kterého jsou lidé schopni, zapomínat na větší společnost a soustředit se na sebe a své nejbližší okolí (rodinu, blízké spolupracovníky). To ukazuje, že sobectví není čistě individualistické, ale rozšiřuje se i na rodinu a blízké společenské vazby. Ostatní možnosti popisují formy úzkého sobectví, které podle Tocquevilla neodpovídají pozorovatelnému lidskému chování, protože lidé přirozeně rozšiřují svůj zájem za přísné individuální hranice a zahrnují své blízké a nejbližší společenství.
question: Mida nimetab Tocqueville inimese egoismi maksimaalseks ulatuseks praktikas?
answer: Suurema ühiskonna unustamine, et keskenduda iseendale ja oma lähikonnale
wrong_answers:
  - Täielik isoleeritus ja kõigi sotsiaalsete sidemete ja kohustuste tagasilükkamine
  - Ainult vahetu materiaalse kasu taotlemine, arvestamata tulevasi tagajärgi
  - Isikliku rikkuse maksimeerimine kõigi teiste kaalutluste arvelt
explanation: |
  Tocqueville'i tähelepanekute kohaselt "Demokraatia Ameerikas" on ainus tõeline egoism, milleks inimesed on võimelised, see, et nad unustavad suurema ühiskonna, keskendudes iseendale ja oma lähimale ringkonnale (perekond, lähikondlased). See näitab, et egoism ei ole puhtalt individualistlik, vaid laieneb ka perekonnale ja lähedastele sotsiaalsetele sidemetele. Teised valikud kirjeldavad kitsa egoismi vorme, mis Tocqueville'i väitel ei vasta täheldatavale inimkäitumisele, sest inimesed laiendavad oma muret loomulikult üle rangete individuaalsete piiride, et hõlmata oma lähedasi ja lähikonda.
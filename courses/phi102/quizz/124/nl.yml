question: Wat beschouwt Tocqueville als de maximale omvang van menselijk egoïsme in de praktijk?
answer: De maatschappij vergeten om zich op zichzelf en zijn naaste omgeving te richten
wrong_answers:
  - Volledig isolement en afwijzing van alle sociale banden en verantwoordelijkheden
  - Alleen onmiddellijk materieel gewin nastreven zonder rekening te houden met toekomstige gevolgen
  - Maximaliseren van persoonlijke rijkdom ten koste van alle andere overwegingen
explanation: |
  Volgens Tocqueville's observaties in 'Democratie in Amerika' is het enige echte egoïsme waartoe mensen in staat zijn, het vergeten van de grotere maatschappij en zich richten op zichzelf en hun directe omgeving (familie, naaste medewerkers). Dit laat zien dat eigenbelang niet puur individualistisch is, maar ook familie en nauwe sociale banden omvat. De andere opties beschrijven vormen van bekrompen egoïsme waarvan Tocqueville stelt dat ze niet overeenkomen met waarneembaar menselijk gedrag, omdat mensen van nature hun bezorgdheid uitstrekken over strikte individuele grenzen heen om ook hun dierbaren en directe gemeenschap te omvatten.
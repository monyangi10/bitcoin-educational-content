question: Quelle est, selon Tocqueville, l'étendue maximale de l'égoïsme humain dans la pratique ?
answer: Oublier la société dans son ensemble pour se concentrer sur soi-même et son cercle proche
wrong_answers:
  - Isolement complet et rejet de tous les liens sociaux et de toutes les responsabilités
  - Rechercher uniquement des gains matériels immédiats sans se soucier des conséquences futures
  - Maximiser la richesse personnelle au détriment de toute autre considération
explanation: |
  Selon les observations de Tocqueville dans "La démocratie en Amérique", le seul véritable égoïsme dont l'homme est capable consiste à oublier la société dans son ensemble et à se concentrer sur lui-même et son entourage immédiat (famille, proches). Cela révèle que l'intérêt personnel n'est pas purement individualiste, mais qu'il s'étend à la famille et aux relations sociales étroites. Les autres options décrivent des formes d'égoïsme étroit qui, selon Tocqueville, ne correspondent pas au comportement humain observable, car les gens étendent naturellement leurs préoccupations au-delà des strictes limites individuelles pour englober leurs proches et leur communauté immédiate.
question: Mitä Tocqueville pitää ihmisen egoismin enimmäislaajuutena käytännössä?
answer: Unohdetaan laajempi yhteiskunta ja keskitytään itseensä ja lähipiiriinsä
wrong_answers:
  - Täydellinen eristäytyminen ja kaikkien sosiaalisten siteiden ja velvollisuuksien hylkääminen
  - Ainoastaan välittömien aineellisten voittojen tavoittelu ottamatta huomioon tulevia seurauksia
  - Henkilökohtaisen varallisuuden maksimointi kaikkien muiden näkökohtien kustannuksella
explanation: |
  Tocquevillen "Demokratia Amerikassa" -teoksessa tekemien havaintojen mukaan ainoa todellinen egoismi, johon ihmiset kykenevät, on se, että he unohtavat laajemman yhteiskunnan ja keskittyvät itseensä ja lähipiiriinsä (perheeseen ja lähipiiriin). Tämä paljastaa, että itsekkyys ei ole puhtaasti yksilökeskeistä, vaan se ulottuu myös perheeseen ja läheisiin sosiaalisiin suhteisiin. Muut vaihtoehdot kuvaavat kapean itsekkyyden muotoja, jotka eivät Tocquevillen mukaan vastaa havaittavaa inhimillistä käyttäytymistä, sillä ihmiset luonnollisesti laajentavat huolensa tiukasti yksilöllisiä rajoja pidemmälle käsittäen myös läheisensä ja lähiyhteisönsä.
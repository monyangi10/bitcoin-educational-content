question: Co Tocqueville określa jako maksymalny zakres ludzkiego egoizmu w praktyce?
answer: Zapominanie o całym społeczeństwie, by skupić się na sobie i swoim bliskim otoczeniu
wrong_answers:
  - Całkowita izolacja i odrzucenie wszelkich więzi społecznych i obowiązków
  - Dążenie wyłącznie do natychmiastowych korzyści materialnych bez względu na przyszłe konsekwencje
  - Maksymalizacja osobistego bogactwa kosztem wszystkich innych względów
explanation: |
  Zgodnie z obserwacjami Tocqueville'a w "Democracy in America", jedynym prawdziwym egoizmem, do którego zdolni są ludzie, jest zapominanie o większym społeczeństwie i skupianie się na sobie i swoim najbliższym otoczeniu (rodzinie, bliskich współpracownikach). Pokazuje to, że interes własny nie jest czysto indywidualistyczny, ale rozciąga się na rodzinę i bliskie więzi społeczne. Pozostałe opcje opisują formy wąskiego egoizmu, które według Tocqueville'a nie odpowiadają obserwowalnym ludzkim zachowaniom, ponieważ ludzie w naturalny sposób wykraczają poza ścisłe indywidualne granice, obejmując swoich bliskich i najbliższą społeczność.
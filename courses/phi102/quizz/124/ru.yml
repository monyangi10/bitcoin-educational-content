question: Что Токвиль называет максимальной степенью человеческого эгоизма на практике?
answer: Забудьте об обществе, чтобы сосредоточиться на себе и своем близком окружении
wrong_answers:
  - Полная изоляция и отказ от всех социальных связей и обязанностей
  - Стремиться только к сиюминутной материальной выгоде, не задумываясь о будущих последствиях
  - Максимизация личного богатства в ущерб всем остальным соображениям
explanation: |
  Согласно наблюдениям Токвиля в "Демократии в Америке", единственный истинный эгоизм, на который способны люди, - это забыть о большом обществе, сосредоточившись на себе и своем ближайшем окружении (семье, близких людях). Это говорит о том, что эгоизм не является чисто индивидуалистическим, а включает в себя семью и близкие социальные связи. Другие варианты описывают формы узкого эгоизма, которые, по мнению Токвиля, не соответствуют наблюдаемому поведению человека, поскольку люди естественным образом выходят за строгие индивидуальные рамки, охватывая своих близких и ближайшее окружение.
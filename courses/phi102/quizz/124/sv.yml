question: Vad anser Tocqueville vara den maximala omfattningen av mänsklig egoism i praktiken?
answer: Glömmer samhället i stort för att fokusera på sig själv och sin närmaste krets
wrong_answers:
  - Fullständig isolering och förkastande av alla sociala band och ansvarsområden
  - Sträva efter omedelbara materiella vinster utan hänsyn till framtida konsekvenser
  - Maximering av den personliga förmögenheten på bekostnad av alla andra överväganden
explanation: |
  Enligt Tocquevilles observationer i "Democracy in America" är den enda sanna egoism som människan är kapabel till att glömma bort samhället i stort och fokusera på sig själv och sin närmaste krets (familj, nära medarbetare). Detta visar att egenintresset inte är rent individualistiskt utan även omfattar familjen och nära sociala kontakter. De andra alternativen beskriver former av snäv själviskhet som Tocqueville hävdar inte motsvarar observerbart mänskligt beteende, eftersom människor naturligt utvidgar sin omtanke bortom strikta individuella gränser till att omfatta sina nära och kära och det närmaste samhället.
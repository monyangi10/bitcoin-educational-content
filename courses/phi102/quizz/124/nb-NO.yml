question: Hva mener Tocqueville er det maksimale omfanget av menneskelig egoisme i praksis?
answer: Glemmer storsamfunnet for å fokusere på seg selv og sin nærmeste krets
wrong_answers:
  - Fullstendig isolasjon og avvisning av alle sosiale bånd og ansvar
  - Jakter kun på umiddelbare materielle gevinster uten å ta hensyn til fremtidige konsekvenser
  - Maksimering av personlig rikdom på bekostning av alle andre hensyn
explanation: |
  Ifølge Tocquevilles observasjoner i "Democracy in America" er den eneste sanne egoismen mennesket er i stand til å utøve, å glemme storsamfunnet og fokusere på seg selv og sin nærmeste krets (familie, nære medarbeidere). Dette viser at egeninteressen ikke er rent individualistisk, men at den også omfatter familie og nære sosiale forbindelser. De andre alternativene beskriver former for snever egoisme som Tocqueville hevder ikke samsvarer med observerbar menneskelig atferd, ettersom mennesker naturlig nok strekker seg utover strenge individuelle grenser til å omfatte sine nærmeste og det nærmeste samfunnet.
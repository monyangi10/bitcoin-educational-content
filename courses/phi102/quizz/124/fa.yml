question: توکویل حداکثر میزان خودخواهی انسانی در عمل را چگونه شناسایی می‌کند؟
answer: فراموش کردن جامعه بزرگتر برای تمرکز بر خود و دایره نزدیکان خود
wrong_answers:
  - انزوای کامل و رد تمام پیوندها و مسئولیت‌های اجتماعی
  - دنبال کردن تنها منافع مادی فوری بدون توجه به پیامدهای آینده
  - حداکثر کردن ثروت شخصی به بهای نادیده گرفتن سایر ملاحظات
explanation: |
  بر اساس مشاهدات توکویل در 'دموکراسی در آمریکا'، تنها خودخواهی واقعی که انسان‌ها قادر به آن هستند، فراموش کردن جامعه بزرگ‌تر در حالی است که بر خود و دایره نزدیک خود (خانواده، همکاران نزدیک) تمرکز می‌کنند. این نشان می‌دهد که منافع شخصی صرفاً فردگرایانه نیست بلکه شامل خانواده و ارتباطات اجتماعی نزدیک نیز می‌شود. گزینه‌های دیگر اشکالی از خودخواهی محدود را توصیف می‌کنند که توکویل استدلال می‌کند با رفتار قابل مشاهده انسانی مطابقت ندارند، زیرا مردم به طور طبیعی نگرانی خود را فراتر از مرزهای فردی سخت‌گیرانه گسترش می‌دهند تا عزیزان و جامعه نزدیک خود را در بر بگیرند.
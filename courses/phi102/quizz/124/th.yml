question: Tocqueville ระบุว่าขอบเขตสูงสุดของความเห็นแก่ตัวของมนุษย์ในทางปฏิบัติคืออะไร?
answer: ลืมสังคมที่ใหญ่กว่าเพื่อมุ่งเน้นที่ตัวเองและวงใกล้ชิดของตัวเอง
wrong_answers:
  - การแยกตัวอย่างสมบูรณ์และการปฏิเสธพันธะและความรับผิดชอบทางสังคมทั้งหมด
  - การแสวงหาผลประโยชน์ทางวัตถุในทันทีโดยไม่คำนึงถึงผลที่ตามมาในอนาคต
  - การเพิ่มความมั่งคั่งส่วนบุคคลโดยไม่คำนึงถึงปัจจัยอื่นใด
explanation: |
  จากการสังเกตของ Tocqueville ใน 'Democracy in America' ความเห็นแก่ตัวที่แท้จริงเพียงอย่างเดียวที่มนุษย์สามารถทำได้คือการลืมสังคมที่ใหญ่กว่าในขณะที่มุ่งเน้นไปที่ตนเองและวงแคบของพวกเขา (ครอบครัว ผู้ร่วมงานใกล้ชิด) สิ่งนี้เผยให้เห็นว่าผลประโยชน์ส่วนตนไม่ใช่เรื่องของปัจเจกบุคคลเพียงอย่างเดียว แต่ขยายไปถึงครอบครัวและความสัมพันธ์ทางสังคมที่ใกล้ชิด ตัวเลือกอื่น ๆ อธิบายถึงรูปแบบของความเห็นแก่ตัวที่แคบซึ่ง Tocqueville โต้แย้งว่าไม่สอดคล้องกับพฤติกรรมของมนุษย์ที่สังเกตได้ เนื่องจากผู้คนมักจะขยายความห่วงใยของพวกเขาออกไปนอกเหนือจากขอบเขตของปัจเจกบุคคลอย่างเคร่งครัดเพื่อครอบคลุมถึงคนที่พวกเขารักและชุมชนใกล้เคียงของพวกเขา
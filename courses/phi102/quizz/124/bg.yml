question: Какво определя Токвил като максимална степен на човешкия егоизъм на практика?
answer: Забравяне на обществото, за да се съсредоточите върху себе си и близкото си обкръжение
wrong_answers:
  - Пълна изолация и отхвърляне на всички социални връзки и отговорности
  - Преследване само на непосредствени материални ползи без оглед на бъдещите последици
  - Максимизиране на личното богатство за сметка на всички останали съображения
explanation: |
  Според наблюденията на Токвил в "Демокрацията в Америка" единственият истински егоизъм, на който хората са способни, е да забравят за обществото, като се съсредоточат върху себе си и най-близкото си обкръжение (семейство, близки сътрудници). Това разкрива, че егоизмът не е чисто индивидуален, а се разпростира и върху семейството и близките социални връзки. Другите варианти описват форми на тесен егоизъм, за които Токвил твърди, че не съответстват на наблюдаваното човешко поведение, тъй като хората естествено разширяват своята загриженост отвъд строгите индивидуални граници, за да обхванат близките си и най-близкото обкръжение.
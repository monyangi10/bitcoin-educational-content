question: Tocqueville anabainisha nini kama kiwango cha juu zaidi cha ubinafsi wa kibinadamu katika vitendo?
answer: Kusahau jamii kubwa zaidi ili kuzingatia nafsi yako na mzunguko wa karibu wa mtu
wrong_answers:
  - Kutengwa kabisa na kukataliwa kwa vifungo na majukumu yote ya kijamii
  - Kufuatilia faida za kimwili za papo hapo bila kujali matokeo ya baadaye
  - Kuongeza utajiri wa kibinafsi kwa gharama ya mambo mengine yote
explanation: |
  Kulingana na uchunguzi wa Tocqueville katika 'Demokrasia Amerika,' ubinafsi pekee wa kweli ambao wanadamu wanaweza kuwa nao ni kusahau jamii kubwa zaidi huku wakizingatia wao wenyewe na mzunguko wao wa karibu (familia, washirika wa karibu). Hii inaonyesha kwamba maslahi binafsi si ya kibinafsi tu bali yanajumuisha familia na miunganisho ya karibu ya kijamii. Chaguzi zingine zinaelezea aina za ubinafsi finyu ambazo Tocqueville anasema haziendani na tabia inayoonekana ya kibinadamu, kwani watu kwa kawaida hupanua wasiwasi wao zaidi ya mipaka mikali ya kibinafsi ili kuwajumuisha wapendwa wao na jamii ya karibu.
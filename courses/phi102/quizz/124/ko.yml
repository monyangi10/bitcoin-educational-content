question: 토크빌은 현실에서 인간 이기주의의 최대 범위를 무엇이라고 보았나요?
answer: 더 큰 사회를 잊고 자신과 가까운 사람에게만 집중하는 것
wrong_answers:
  - 모든 사회적 유대와 책임의 완전한 고립과 거부
  - 미래의 결과를 고려하지 않고 즉각적인 물질적 이익만 추구하는 행위
  - 다른 모든 고려 사항을 희생하면서 개인의 부를 극대화하는 방법
explanation: |
  토크빌이 '미국의 민주주의'에서 관찰한 바에 따르면, 인간이 할 수 있는 유일한 진정한 이기주의는 자신과 가까운 범위(가족, 가까운 동료)에 집중하면서 더 큰 사회를 잊어버리는 것입니다. 이는 이기주의가 순전히 개인주의적인 것이 아니라 가족과 가까운 사회적 관계를 포함하는 것으로 확장된다는 것을 보여줍니다. 다른 옵션은 좁은 이기심의 형태를 설명하는 것으로, 토크빌은 사람들이 자연스럽게 엄격한 개인 경계를 넘어 사랑하는 사람과 가까운 커뮤니티까지 관심을 확장하기 때문에 관찰 가능한 인간 행동과 일치하지 않는다고 주장합니다.
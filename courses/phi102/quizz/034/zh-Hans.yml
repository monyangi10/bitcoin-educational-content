question: 根据互不侵犯原则，什么基本生物事实为个人自由确立了自然界限？
answer: 疼痛是我们感知身体自由和财产受到侵犯的机制
wrong_answers:
  - 恐惧造成心理障碍，阻止我们对他人采取任何行动
  - 体力决定谁有权对弱者行使自由权
  - 人类之间的基因差异造成了限制某些自由的自然等级制度
explanation: |
  本章解释说，疼痛是一种普遍的生物机制，我们的自由和身体财产受到攻击时，疼痛就会在我们的意识中显现出来。如果没有这种通过神经系统传递的现象，我们就不可能感知到对我们身体完整性的侵犯。这一生理事实证明，任何导致他人疼痛的行为都是对其自我所有权的侵犯。其他选项都不正确，因为恐惧被描述为一种次要的心理效应，而不是基本的生物机制，体力并不能决定不侵犯框架中的权利，遗传差异也没有被提及为自由的自然限制。
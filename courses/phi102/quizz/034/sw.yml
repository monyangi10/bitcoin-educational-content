question: Ni ukweli gani wa msingi wa kibiolojia unaoweka kikomo cha asili cha uhuru wa mtu binafsi kulingana na kanuni ya kutokuchokoza?
answer: Maumivu hutumika kama utaratibu ambao ukiukwaji wa uhuru wetu wa kimwili na mali huonekana.
wrong_answers:
  - Hofu huunda vikwazo vya kisaikolojia vinavyotuzuia kuchukua hatua yoyote dhidi ya wengine
  - Nguvu za kimwili huamua ni nani ana haki ya kutumia uhuru dhidi ya watu dhaifu
  - Tofauti za kijenetiki kati ya wanadamu huunda mfumo wa asili unaopunguza uhuru fulani
explanation: |
  Sura hiyo inaelezea kwamba maumivu huunda utaratibu wa kibiolojia wa ulimwengu wote ambao mashambulizi dhidi ya uhuru wetu na mali ya mwili yanaonekana kwa fahamu zetu. Bila jambo hili linalopitishwa kupitia mfumo wa neva, haingewezekana kutambua ukiukwaji wa uadilifu wetu wa kimwili. Ukweli huu wa kisaikolojia unathibitisha kwamba kitendo chochote kinachosababisha maumivu kwa mtu mwingine ni shambulio dhidi ya umiliki wake. Chaguzi zingine si sahihi kwa sababu hofu inaelezewa kama athari ya pili ya kisaikolojia badala ya utaratibu wa msingi wa kibiolojia, nguvu za kimwili haziamui haki katika mfumo usio wa uchokozi, na tofauti za kijenetiki hazijatajwa kama kuweka mipaka ya asili ya uhuru.
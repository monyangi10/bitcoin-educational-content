question: Koja fundamentalna biološka činjenica uspostavlja prirodnu granicu individualne slobode prema principu nenapadanja?
answer: Bol služi kao mehanizam kroz koji se percipiraju povrede naše telesne slobode i imovine.
wrong_answers:
  - Strah stvara psihološke barijere koje nas sprečavaju da preduzmemo bilo kakvu akciju protiv drugih.
  - Fizička snaga određuje ko ima pravo da vrši slobodu nad slabijim pojedincima
  - Genetske razlike između ljudi stvaraju prirodne hijerarhije koje ograničavaju određene slobode
explanation: |
  Poglavlje objašnjava da bol predstavlja univerzalni biološki mehanizam putem kojeg se napadi na našu slobodu i telesnu svojinu manifestuju u našoj svesti. Bez ovog fenomena koji se prenosi kroz nervni sistem, bilo bi nemoguće percipirati povrede našeg fizičkog integriteta. Ova fiziološka stvarnost uspostavlja da svaka akcija koja uzrokuje bol drugoj osobi predstavlja napad na njihovo samovlasništvo. Ostale opcije su netačne jer je strah opisan kao sekundarni psihološki efekat, a ne kao osnovni biološki mehanizam, fizička snaga ne određuje prava u okviru nenasilne agresije, a genetske razlike nisu pomenute kao uspostavljanje prirodnih granica slobode.
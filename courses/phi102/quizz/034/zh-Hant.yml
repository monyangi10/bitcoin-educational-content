question: 根據不侵犯原則，什麼基本生物事實確立了個人自由的自然限制？
answer: 疼痛是一種機制，透過它我們可以感知到身體自由和財產受到了侵犯。
wrong_answers:
  - 恐懼會造成心理障礙，使我們無法對他人採取任何行動
  - 體力決定誰有權利對較弱的人行使自由
  - 人類之間的遺傳差異造成了限制某些自由的自然等級制度
explanation: |
  本章說明疼痛是一種普遍的生物機制，我們的自由和身體財產受到攻擊時，疼痛就會顯現在我們的意識中。如果沒有這種透過神經系統傳遞的現象，我們就不可能感知到對我們身體完整性的侵犯。這個生理現實確定了任何導致他人疼痛的行為都構成對他人自我所有權的攻擊。其他選項都不對，因為恐懼被描述為次要的心理效應，而非基本的生物機制，體力強弱在非攻擊框架中並不能決定權利，而且遺傳差異也沒有被提及為建立自由的自然限制。
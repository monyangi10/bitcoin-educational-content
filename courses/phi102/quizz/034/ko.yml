question: 비침략 원칙에 따라 개인의 자유에 대한 자연적 한계를 설정하는 근본적인 생물학적 사실은 무엇인가요?
answer: 고통은 우리의 신체적 자유와 재산에 대한 침해를 인식하는 메커니즘으로 작용합니다
wrong_answers:
  - 두려움은 심리적 장벽을 만들어 다른 사람에 대해 어떤 행동도 취하지 못하게 합니다
  - 체력이 약자에 대한 자유를 행사할 권리를 결정합니다
  - 인간 간의 유전적 차이는 특정 자유를 제한하는 자연스러운 계층을 만듭니다
explanation: |
  이 장에서는 통증이 우리의 자유와 신체적 재산에 대한 공격이 의식에 나타나는 보편적인 생물학적 메커니즘을 구성한다고 설명합니다. 신경계를 통해 전달되는 이 현상이 없다면 우리의 신체적 완전성에 대한 침해를 인식하는 것은 불가능할 것입니다. 이 생리적 현실은 다른 사람에게 고통을 주는 모든 행동이 자기 소유권에 대한 공격을 구성한다는 것을 입증합니다. 다른 옵션은 공포가 근본적인 생물학적 메커니즘이 아닌 부차적인 심리적 효과로 설명되고, 비공격성 프레임워크에서 신체적 힘이 권리를 결정하지 않으며, 유전적 차이가 자유에 대한 자연적 한계를 설정하는 것으로 언급되지 않기 때문에 올바르지 않습니다.
question: Welk fundamenteel biologisch feit stelt de natuurlijke grens aan individuele vrijheid volgens het non-agressieprincipe?
answer: Pijn dient als het mechanisme waarmee schendingen van onze lichamelijke vrijheid en eigendom worden waargenomen
wrong_answers:
  - Angst creëert psychologische barrières die ons ervan weerhouden actie te ondernemen tegen anderen
  - Fysieke kracht bepaalt wie het recht heeft om vrijheid uit te oefenen over zwakkere individuen
  - Genetische verschillen tussen mensen creëren natuurlijke hiërarchieën die bepaalde vrijheden beperken
explanation: |
  Het hoofdstuk legt uit dat pijn het universele biologische mechanisme is waarmee aanvallen op onze vrijheid en lichamelijke bezittingen zich manifesteren in ons bewustzijn. Zonder dit fenomeen dat via het zenuwstelsel wordt doorgegeven, zou het onmogelijk zijn om schendingen van onze lichamelijke integriteit waar te nemen. Deze fysiologische realiteit stelt vast dat elke handeling die pijn veroorzaakt bij een ander persoon een aanval is op diens zelfeigenaarschap. De andere opties zijn onjuist omdat angst wordt beschreven als een secundair psychologisch effect in plaats van als het fundamentele biologische mechanisme, fysieke kracht niet bepalend is voor rechten in het niet-aanvalskader en genetische verschillen niet worden genoemd als de natuurlijke grenzen van vrijheid.
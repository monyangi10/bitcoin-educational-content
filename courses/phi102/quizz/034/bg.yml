question: Кой фундаментален биологичен факт определя естествената граница на индивидуалната свобода според принципа на ненападението?
answer: Болката служи като механизъм, чрез който се възприемат нарушенията на нашата телесна свобода и собственост
wrong_answers:
  - Страхът създава психологически бариери, които ни пречат да предприемем действия срещу другите
  - Физическата сила определя кой има право да упражнява свободата си над по-слабите
  - Генетичните различия между хората създават естествени йерархии, които ограничават някои свободи
explanation: |
  В тази глава се обяснява, че болката е универсалният биологичен механизъм, чрез който посегателствата върху нашата свобода и телесна собственост се проявяват в нашето съзнание. Без този феномен, предаван чрез нервната система, би било невъзможно да възприемаме нарушенията на физическата ни цялост. Тази физиологична реалност установява, че всяко действие, причиняващо болка на друго лице, представлява посегателство върху неговата самособственост. Другите варианти са неправилни, защото страхът е описан като вторичен психологически ефект, а не като основен биологичен механизъм, физическата сила не определя правата в рамките на ненападението, а генетичните различия не са споменати като установяващи естествените граници на свободата.
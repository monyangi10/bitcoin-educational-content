question: What fundamental biological fact establishes the natural limit to individual freedom according to the non-aggression principle?
answer: Pain serves as the mechanism through which violations of our bodily freedom and property are perceived
wrong_answers:
  - Fear creates psychological barriers that prevent us from taking any action against others
  - Physical strength determines who has the right to exercise freedom over weaker individuals
  - Genetic differences between humans create natural hierarchies that limit certain freedoms
explanation: |
  The chapter explains that pain constitutes the universal biological mechanism by which attacks on our freedom and bodily property manifest to our consciousness. Without this phenomenon transmitted through the nervous system, it would be impossible to perceive violations of our physical integrity. This physiological reality establishes that any action causing pain to another person constitutes an attack on their self-ownership. The other options are incorrect because fear is described as a secondary psychological effect rather than the fundamental biological mechanism, physical strength doesn't determine rights in the non-aggression framework, and genetic differences are not mentioned as establishing natural limits to freedom.
question: Какой фундаментальный биологический факт устанавливает естественный предел индивидуальной свободы в соответствии с принципом ненападения?
answer: Боль служит механизмом, с помощью которого воспринимаются нарушения нашей телесной свободы и собственности
wrong_answers:
  - Страх создает психологические барьеры, которые не позволяют нам предпринимать какие-либо действия против других людей
  - Физическая сила определяет, кто имеет право пользоваться свободой по отношению к более слабым людям
  - Генетические различия между людьми создают естественную иерархию, которая ограничивает некоторые свободы
explanation: |
  В главе объясняется, что боль представляет собой универсальный биологический механизм, с помощью которого посягательства на нашу свободу и телесную собственность проявляются в нашем сознании. Без этого феномена, передающегося через нервную систему, было бы невозможно воспринимать нарушения нашей физической целостности. Эта физиологическая реальность устанавливает, что любое действие, причиняющее боль другому человеку, представляет собой посягательство на его самообладание. Остальные варианты неверны, поскольку страх описывается как вторичный психологический эффект, а не как фундаментальный биологический механизм, физическая сила не определяет права в рамках концепции ненападения, а генетические различия не упоминаются как устанавливающие естественные пределы свободы.
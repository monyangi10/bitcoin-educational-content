question: Quel fait biologique fondamental établit la limite naturelle de la liberté individuelle selon le principe de non-agression ?
answer: La douleur est le mécanisme par lequel sont perçues les atteintes à la liberté et à la propriété du corps
wrong_answers:
  - La peur crée des barrières psychologiques qui nous empêchent d'agir contre les autres
  - La force physique détermine qui a le droit d'exercer sa liberté sur les individus plus faibles
  - Les différences génétiques entre les hommes créent des hiérarchies naturelles qui limitent certaines libertés
explanation: |
  Le chapitre explique que la douleur constitue le mécanisme biologique universel par lequel les atteintes à notre liberté et à nos biens corporels se manifestent à notre conscience. Sans ce phénomène transmis par le système nerveux, il serait impossible de percevoir les atteintes à notre intégrité physique. Cette réalité physiologique établit que toute action causant de la douleur à une autre personne constitue une atteinte à sa propriété personnelle. Les autres options sont incorrectes car la peur est décrite comme un effet psychologique secondaire plutôt que comme le mécanisme biologique fondamental, la force physique ne détermine pas les droits dans le cadre de la non-agression et les différences génétiques ne sont pas mentionnées comme établissant des limites naturelles à la liberté.
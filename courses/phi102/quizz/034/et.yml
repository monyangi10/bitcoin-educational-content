question: Milline fundamentaalne bioloogiline asjaolu seab vastavalt mitteagressiivsuse põhimõttele individuaalse vabaduse loomuliku piiri?
answer: Valu on mehhanism, mille kaudu tajutakse meie kehalise vabaduse ja omandiõiguse rikkumisi
wrong_answers:
  - Hirm tekitab psühholoogilisi tõkkeid, mis takistavad meid tegutsemast teiste vastu
  - Füüsiline tugevus määrab, kellel on õigus kasutada vabadust nõrgemate isikute üle
  - Geneetilised erinevused inimeste vahel loovad looduslikud hierarhiad, mis piiravad teatud vabadusi
explanation: |
  Peatükis selgitatakse, et valu on universaalne bioloogiline mehhanism, mille kaudu meie vabaduse ja kehaliste omaduste vastu suunatud rünnakud ilmnevad meie teadvuses. Ilma selle närvisüsteemi kaudu edastatava nähtuseta oleks võimatu tajuda meie füüsilise puutumatuse rikkumisi. See füsioloogiline reaalsus sätestab, et igasugune teisele inimesele valu põhjustav tegevus kujutab endast rünnakut tema eneseomandi vastu. Teised valikud on valed, sest hirmu kirjeldatakse pigem sekundaarse psühholoogilise efektina kui fundamentaalse bioloogilise mehhanismina, füüsiline jõud ei määra õigusi mitteagressiooni raamistikus ja geneetilisi erinevusi ei mainita kui vabaduse loomulike piiride kehtestamist.
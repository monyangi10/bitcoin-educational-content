question: Vilket grundläggande biologiskt faktum sätter den naturliga gränsen för individuell frihet enligt icke-aggressionsprincipen?
answer: Smärta fungerar som en mekanism genom vilken kränkningar av vår kroppsliga frihet och egendom uppfattas
wrong_answers:
  - Rädsla skapar psykologiska barriärer som hindrar oss från att vidta åtgärder mot andra
  - Fysisk styrka avgör vem som har rätt att utöva frihet över svagare individer
  - Genetiska skillnader mellan människor skapar naturliga hierarkier som begränsar vissa friheter
explanation: |
  I kapitlet förklaras att smärta utgör den universella biologiska mekanism genom vilken angrepp på vår frihet och kroppsliga egendom manifesteras i vårt medvetande. Utan detta fenomen som överförs via nervsystemet skulle det vara omöjligt att uppfatta kränkningar av vår fysiska integritet. Denna fysiologiska verklighet slår fast att varje handling som orsakar smärta hos en annan person utgör ett angrepp på dennes självägande. De andra alternativen är felaktiga eftersom rädsla beskrivs som en sekundär psykologisk effekt snarare än den grundläggande biologiska mekanismen, fysisk styrka inte avgör rättigheter inom ramen för icke-aggression och genetiska skillnader inte nämns som naturliga gränser för frihet.
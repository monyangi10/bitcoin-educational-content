question: Theo nguyên tắc không xâm phạm, sự thật sinh học cơ bản nào xác định giới hạn tự nhiên của tự do cá nhân?
answer: Đau đớn đóng vai trò như một cơ chế mà qua đó sự xâm phạm đến tự do và quyền sở hữu thân thể của chúng ta được cảm nhận.
wrong_answers:
  - Nỗi sợ hãi tạo ra những rào cản tâm lý ngăn cản chúng ta hành động chống lại người khác.
  - Sức mạnh thể chất quyết định ai có quyền thực thi tự do đối với những người yếu hơn.
  - Sự khác biệt về gen giữa con người tạo ra các hệ thống phân cấp tự nhiên, hạn chế một số quyền tự do nhất định.
explanation: |
  Chương này giải thích rằng đau đớn cấu thành cơ chế sinh học phổ quát mà qua đó các cuộc tấn công vào tự do và tài sản thân thể của chúng ta được biểu hiện đến ý thức. Nếu không có hiện tượng này được truyền qua hệ thần kinh, sẽ không thể nhận thức được sự vi phạm toàn vẹn thể chất của chúng ta. Thực tế sinh lý này khẳng định rằng bất kỳ hành động nào gây đau đớn cho người khác đều cấu thành một cuộc tấn công vào quyền tự chủ của họ. Các lựa chọn khác không chính xác vì nỗi sợ hãi được mô tả như một hiệu ứng tâm lý thứ cấp chứ không phải là cơ chế sinh học cơ bản, sức mạnh thể chất không quyết định quyền trong khuôn khổ không gây hấn, và sự khác biệt về gen không được đề cập như là yếu tố thiết lập giới hạn tự nhiên cho tự do.
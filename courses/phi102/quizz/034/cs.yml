question: Jaký základní biologický fakt určuje přirozenou hranici svobody jednotlivce podle principu neútočení?
answer: Bolest slouží jako mechanismus, kterým vnímáme porušování naší tělesné svobody a vlastnictví
wrong_answers:
  - Strach vytváří psychologické bariéry, které nám brání podniknout jakékoli kroky proti druhým
  - Fyzická síla určuje, kdo má právo uplatňovat svobodu vůči slabším jedincům
  - Genetické rozdíly mezi lidmi vytvářejí přirozené hierarchie, které omezují určité svobody
explanation: |
  Kapitola vysvětluje, že bolest představuje univerzální biologický mechanismus, kterým se v našem vědomí projevují útoky na naši svobodu a tělesné vlastnictví. Bez tohoto jevu přenášeného nervovým systémem by nebylo možné vnímat narušení naší tělesné integrity. Tato fyziologická realita stanoví, že jakákoli činnost způsobující bolest jiné osobě představuje útok na její sebevlastnictví. Ostatní možnosti jsou nesprávné, protože strach je popsán jako sekundární psychologický účinek, nikoli jako základní biologický mechanismus, fyzická síla neurčuje práva v rámci neútočení a genetické rozdíly nejsou zmíněny jako stanovení přirozených hranic svobody.
question: Saldırmazlık ilkesine göre bireysel özgürlüğün doğal sınırını hangi temel biyolojik gerçek oluşturur?
answer: Acı, bedensel özgürlüğümüze ve mülkiyetimize yönelik ihlallerin algılandığı bir mekanizma olarak hizmet eder
wrong_answers:
  - Korku, başkalarına karşı herhangi bir eylemde bulunmamızı engelleyen psikolojik bariyerler yaratır
  - Fiziksel güç, kimin daha zayıf bireyler üzerinde özgürlük kullanma hakkına sahip olduğunu belirler
  - İnsanlar arasındaki genetik farklılıklar, belirli özgürlükleri sınırlayan doğal hiyerarşiler yaratır
explanation: |
  Bu bölüm, acının, özgürlüğümüze ve bedensel mülkiyetimize yönelik saldırıların bilincimize yansıdığı evrensel biyolojik mekanizmayı oluşturduğunu açıklamaktadır. Sinir sistemi aracılığıyla aktarılan bu olgu olmasaydı, fiziksel bütünlüğümüze yönelik ihlalleri algılamamız imkansız olurdu. Bu fizyolojik gerçeklik, başka bir kişiye acı veren herhangi bir eylemin, onun öz mülkiyetine yönelik bir saldırı teşkil ettiğini ortaya koymaktadır. Diğer seçenekler yanlıştır çünkü korku temel biyolojik mekanizmadan ziyade ikincil bir psikolojik etki olarak tanımlanmaktadır, fiziksel güç saldırmazlık çerçevesinde hakları belirlemez ve genetik farklılıkların özgürlüğe doğal sınırlar getirdiğinden bahsedilmemektedir.
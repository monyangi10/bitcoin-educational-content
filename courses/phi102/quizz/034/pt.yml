question: Que facto biológico fundamental estabelece o limite natural da liberdade individual de acordo com o princípio da não agressão?
answer: A dor serve como mecanismo através do qual as violações da nossa liberdade e propriedade corporal são percebidas
wrong_answers:
  - O medo cria barreiras psicológicas que nos impedem de tomar qualquer ação contra os outros
  - A força física determina quem tem o direito de exercer a liberdade sobre os indivíduos mais fracos
  - As diferenças genéticas entre os seres humanos criam hierarquias naturais que limitam certas liberdades
explanation: |
  O capítulo explica que a dor constitui o mecanismo biológico universal através do qual os atentados à nossa liberdade e aos nossos bens corporais se manifestam à nossa consciência. Sem este fenómeno transmitido pelo sistema nervoso, seria impossível perceber as violações da nossa integridade física. Esta realidade fisiológica estabelece que qualquer ação que cause dor a outra pessoa constitui um atentado à sua auto-propriedade. As outras opções estão incorrectas porque o medo é descrito como um efeito psicológico secundário e não como um mecanismo biológico fundamental, a força física não determina direitos no quadro da não agressão e as diferenças genéticas não são mencionadas como estabelecendo limites naturais à liberdade.
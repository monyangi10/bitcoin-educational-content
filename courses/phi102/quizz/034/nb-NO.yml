question: Hvilket grunnleggende biologisk faktum setter den naturlige grensen for individuell frihet i henhold til ikke-aggresjonsprinsippet?
answer: Smerte fungerer som en mekanisme som gjør at krenkelser av vår kroppslige frihet og eiendom oppfattes
wrong_answers:
  - Frykt skaper psykologiske barrierer som hindrer oss i å gjøre noe mot andre
  - Fysisk styrke avgjør hvem som har rett til å utøve frihet over svakere individer
  - Genetiske forskjeller mellom mennesker skaper naturlige hierarkier som begrenser visse friheter
explanation: |
  Kapitlet forklarer at smerte utgjør den universelle biologiske mekanismen som gjør at angrep på vår frihet og kroppslige eiendom manifesterer seg i vår bevissthet. Uten dette fenomenet, som overføres gjennom nervesystemet, ville det være umulig å oppfatte krenkelser av vår fysiske integritet. Denne fysiologiske realiteten slår fast at enhver handling som påfører en annen person smerte, utgjør et angrep på vedkommendes selveierskap. De andre alternativene er feil fordi frykt beskrives som en sekundær psykologisk effekt snarere enn den grunnleggende biologiske mekanismen, fysisk styrke er ikke bestemmende for rettigheter i ikke-aggresjonsrammeverket, og genetiske forskjeller nevnes ikke som naturlige grenser for frihet.
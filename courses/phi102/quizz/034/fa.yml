question: کدام واقعیت بنیادی زیستی، حد طبیعی آزادی فردی را بر اساس اصل عدم تجاوز تعیین می‌کند؟
answer: درد به عنوان مکانیزمی عمل می‌کند که از طریق آن نقض آزادی بدنی و مالکیت ما درک می‌شود.
wrong_answers:
  - ترس موانع روانی ایجاد می‌کند که ما را از اقدام علیه دیگران بازمی‌دارد.
  - قدرت بدنی تعیین می‌کند که چه کسی حق دارد آزادی را بر افراد ضعیف‌تر اعمال کند.
  - تفاوت‌های ژنتیکی بین انسان‌ها سلسله‌مراتب طبیعی ایجاد می‌کنند که برخی آزادی‌ها را محدود می‌کنند.
explanation: |
  این فصل توضیح می‌دهد که درد مکانیزم بیولوژیکی جهانی است که از طریق آن حملات به آزادی و مالکیت بدنی ما به آگاهی ما منتقل می‌شود. بدون این پدیده که از طریق سیستم عصبی منتقل می‌شود، درک نقض‌های یکپارچگی فیزیکی ما غیرممکن خواهد بود. این واقعیت فیزیولوژیکی تأیید می‌کند که هر عملی که به شخص دیگری درد وارد کند، حمله‌ای به مالکیت شخصی او محسوب می‌شود. گزینه‌های دیگر نادرست هستند زیرا ترس به عنوان یک اثر روان‌شناختی ثانویه توصیف شده است و نه مکانیزم بیولوژیکی اساسی، قدرت فیزیکی در چارچوب عدم تجاوز حقوق را تعیین نمی‌کند و تفاوت‌های ژنتیکی به عنوان محدودیت‌های طبیعی آزادی ذکر نشده‌اند.
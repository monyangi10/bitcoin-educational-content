question: Quale fatto biologico fondamentale stabilisce il limite naturale alla libertà individuale secondo il principio di non aggressione?
answer: Il dolore è il meccanismo attraverso il quale vengono percepite le violazioni della nostra libertà e proprietà corporea
wrong_answers:
  - La paura crea barriere psicologiche che ci impediscono di agire contro gli altri
  - La forza fisica determina chi ha il diritto di esercitare la libertà sugli individui più deboli
  - Le differenze genetiche tra gli esseri umani creano gerarchie naturali che limitano alcune libertà
explanation: |
  Il capitolo spiega che il dolore costituisce il meccanismo biologico universale con cui gli attacchi alla nostra libertà e alla proprietà corporea si manifestano alla nostra coscienza. Senza questo fenomeno trasmesso attraverso il sistema nervoso, sarebbe impossibile percepire le violazioni della nostra integrità fisica. Questa realtà fisiologica stabilisce che qualsiasi azione che provochi dolore a un'altra persona costituisce un attacco alla sua proprietà personale. Le altre opzioni non sono corrette, perché la paura è descritta come un effetto psicologico secondario piuttosto che come un meccanismo biologico fondamentale, la forza fisica non determina i diritti nel quadro della non aggressione e le differenze genetiche non sono menzionate come limiti naturali alla libertà.
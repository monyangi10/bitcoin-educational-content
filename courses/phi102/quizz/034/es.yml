question: ¿Qué hecho biológico fundamental establece el límite natural de la libertad individual según el principio de no agresión?
answer: El dolor es el mecanismo a través del cual se perciben las violaciones de nuestra libertad y propiedad corporales
wrong_answers:
  - El miedo crea barreras psicológicas que nos impiden actuar contra los demás
  - La fuerza física determina quién tiene derecho a ejercer la libertad sobre los individuos más débiles
  - Las diferencias genéticas entre los humanos crean jerarquías naturales que limitan ciertas libertades
explanation: |
  El capítulo explica que el dolor constituye el mecanismo biológico universal por el que se manifiestan a nuestra conciencia los atentados contra nuestra libertad y nuestra propiedad corporal. Sin este fenómeno transmitido a través del sistema nervioso, sería imposible percibir las violaciones de nuestra integridad física. Esta realidad fisiológica establece que cualquier acción que cause dolor a otra persona constituye un ataque a su autopropiedad. Las otras opciones son incorrectas porque el miedo se describe como un efecto psicológico secundario y no como el mecanismo biológico fundamental, la fuerza física no determina los derechos en el marco de la no agresión y no se mencionan las diferencias genéticas como establecimiento de límites naturales a la libertad.
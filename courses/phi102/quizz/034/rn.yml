question: Ni ikintu ikihe c’ishimikiro co mu binyabuzima gishinga urugero kamere rw’umwidegemvyo w’umuntu ku giti ciwe hakurikijwe ingingo ngenderwako y’ukutagira ubukazi?
answer: Ububabare bukora nk'uburyo bwo guhonyanga umwidegemvyo w'umubiri wacu n'itunga ryacu bimenyekana .
wrong_answers:
  - Ubwoba buratuma tugira intambamyi zo mu mutwe zitubuza kugira ico dukoze ku bandi .
  - Inkomezi z'umubiri ni zo zigena uwufise uburenganzira bwo gukoresha umwidegemvyo ku bantu bagoyagoya .
  - Ubutandukane bw'ivy'ivyaduka hagati y'abantu buratuma habaho ubukuru busanzwe bugabanya umwidegemvyo kanaka .
explanation: |
  Ico kigabane kirasigura yuko ububabare ari bwo buryo bw’ibinyabuzima bwo kw’isi yose bukoreshwa n’ibitero ku mwidegemvyo wacu no ku mutungo w’umubiri wacu ku mutima wacu. Iyo ico kintu kitamenyekana biciye mu nzira y’imitsi, ntivyoshoboka ko umuntu abona ko hariho ukurenga ku butungane bwacu bwo ku mubiri. Ukwo kuri kw’umubiri gushingira intahe ko igikorwa cose gitera ububabare uwundi muntu ari igitero ku bwiwe bwite. Ayandi mahitamwo ntabwo ari meza kuko ubwoba budondorwa nk’ingaruka zibiri zo mu mutwe aho kuba uburyo bw’ishimikiro bw’ibinyabuzima, inkomezi z’umubiri ntizigena uburenganzira mu rwego rwo kutagira ubukazi, kandi ubudasa bw’ivy’ivyaduka ntibuvugwa nk’ugushinga imipaka kamere y’umwidegemvyo.
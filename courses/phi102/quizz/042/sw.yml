question: Kulingana na maandishi, ni makosa gani mawili makubwa ya ukweli katika mifumo inayodai uporaji wa ardhi asilia kwa nguvu?
answer: Wanafikiri utajiri wa kiotomatiki na kupuuza kwamba utajiri wa sasa unatokana na kazi halali na ubadilishanaji wa hiari
wrong_answers:
  - Wanapuuza jukumu la udhibiti wa serikali na kuzidisha ufanisi wa soko la kibinafsi
  - Wanapuuza mambo ya mazingira na kudhani kuwa maliasili zisizo na kikomo zinapatikana kila wakati
  - Wanathamini ardhi ya kilimo kupita kiasi na kupuuza umuhimu wa maendeleo ya viwanda
explanation: |
  Maandishi yanabainisha makosa mawili mahususi ya ukweli katika mifumo inayodai uporaji wa ardhi asili. Kwanza, mifumo hii inadhani kimakosa kuna urahisi wa moja kwa moja katika utajiri, ikipuuza hatari za mara kwa mara, kazi ngumu, na matatizo ambayo wajasiriamali wanakabiliana nayo. Pili, kama uporaji wa asili ungekuwa kweli, tunapaswa kuona wazao wa wanyakuzi hawa wa ardhi miongoni mwa familia tajiri zaidi za leo, lakini ukweli unaonyesha kwamba mali za sasa zinatokana na kazi halali na ubadilishanaji wa thamani kwa hiari, sio wizi wa kihistoria.
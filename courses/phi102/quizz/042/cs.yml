question: Jaké jsou podle textu dvě hlavní faktické chyby v systémech, které tvrdí, že původní půda byla násilně vyvlastněna?
answer: Předpokládají automatické obohacení a ignorují, že současné bohatství je výsledkem legitimní práce a dobrovolné směny
wrong_answers:
  - Podceňují roli vládní regulace a přeceňují efektivitu soukromého trhu
  - Ignorují faktory životního prostředí a předpokládají, že přírodní zdroje jsou vždy k dispozici v neomezeném množství
  - Přeceňují zemědělskou půdu a podceňují význam průmyslového rozvoje
explanation: |
  V textu jsou uvedeny dvě konkrétní věcné chyby v systémech, které tvrdí, že došlo k původnímu rozkradení pozemků. Zaprvé tyto systémy mylně předpokládají, že obohacení je automaticky snadné, a ignorují neustálá rizika, vyčerpávající práci a obtíže, kterým podnikatelé čelí. Za druhé, pokud by původní spoliation byla pravdivá, měli bychom potomky těchto uchvatitelů půdy vidět mezi dnešními nejbohatšími rodinami, ale realita ukazuje, že současný majetek je výsledkem legální práce a dobrovolné směny hodnoty za hodnotu, nikoliv historické krádeže.
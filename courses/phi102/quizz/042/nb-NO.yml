question: Hva er, ifølge teksten, de to største faktafeilene i systemer som hevder at den opprinnelige jorda ble plyndret med makt?
answer: De forutsetter automatisk berikelse og ignorerer at dagens rikdom er et resultat av legitimt arbeid og frivillig utveksling
wrong_answers:
  - De undervurderer betydningen av statlig regulering og overvurderer effektiviteten i det private markedet
  - De ignorerer miljøfaktorer og antar at ubegrensede naturressurser alltid er tilgjengelige
  - De overvurderer landbruksarealer og undervurderer betydningen av industriutvikling
explanation: |
  Teksten identifiserer to spesifikke faktafeil i systemer som hevder at det er snakk om opprinnelig landran. For det første antar disse systemene feilaktig at det automatisk er lett å berike seg, og ignorerer den konstante risikoen, det utmattende arbeidet og vanskelighetene entreprenører står overfor. For det andre: Hvis det opprinnelige landtyveriet var sant, burde vi se etterkommere av disse landranerne blant dagens rikeste familier, men virkeligheten viser at dagens eiendommer er et resultat av legitimt arbeid og frivillig bytte av verdi for verdi, ikke historisk tyveri.
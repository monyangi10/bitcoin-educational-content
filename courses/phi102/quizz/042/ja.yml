question: 本文によれば、武力による土地収奪を主張するシステムにおける2つの大きな事実誤認とは何か？
answer: 彼らは自動的に豊かになると思い込み、現在の富が合法的な労働と自発的な交換によってもたらされることを無視している。
wrong_answers:
  - 政府の規制の役割を過小評価し、民間市場の効率性を過大評価している。
  - 環境要因を無視し、無限の天然資源が常に利用可能であると思い込んでいる
  - 農地を過大評価し、工業開発の重要性を過小評価している。
explanation: |
  本書は、土地収奪を主張する制度における2つの具体的な事実誤認を指摘している。第一に、これらの制度は、起業家が直面する絶え間ないリスク、疲弊した仕事、困難を無視して、自動的に簡単に豊かになれると誤って想定している。第二に、もし本来の土地収奪が真実であれば、今日の富豪一族の中に土地収奪者の子孫を見ることができるはずだが、現実は現在の財産が合法的な労働と自発的な価値交換によるものであり、歴史的な窃盗によるものではないことを示している。
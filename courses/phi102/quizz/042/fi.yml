question: Mitkä ovat tekstin mukaan kaksi suurinta asiavirhettä järjestelmissä, joissa väitetään, että alkuperäiset maat on pakkolunastettu?
answer: He olettavat automaattisen rikastumisen ja jättävät huomiotta sen, että nykyinen vauraus on tulosta laillisesta työstä ja vapaaehtoisesta vaihdosta
wrong_answers:
  - Ne aliarvioivat julkisen sääntelyn roolia ja yliarvioivat yksityisten markkinoiden tehokkuutta
  - Ne eivät ota huomioon ympäristötekijöitä ja olettavat, että luonnonvaroja on aina rajattomasti saatavilla
  - Ne yliarvioivat maatalousmaata ja aliarvioivat teollisen kehityksen merkitystä
explanation: |
  Tekstissä yksilöidään kaksi erityistä asiavirhettä järjestelmissä, joissa väitetään, että maa-alueet on alun perin hävitetty. Ensinnäkin näissä järjestelmissä oletetaan virheellisesti, että rikastuminen on automaattisesti helppoa, ja jätetään huomiotta yrittäjien kohtaamat jatkuvat riskit, uuvuttava työ ja vaikeudet. Toiseksi, jos alkuperäinen maanryöstö olisi totta, meidän pitäisi nähdä näiden maanryöstäjien jälkeläisiä nykypäivän rikkaimpien perheiden joukossa, mutta todellisuus osoittaa, että nykyiset omaisuudet ovat tulosta laillisesta työstä ja vapaaehtoisesta arvoa vasten tapahtuvasta vaihdosta, eivät historiallisesta varkaudesta.
question: 根据课文内容，在声称以武力掠夺原始土地的体系中，有哪两个主要的事实错误？
answer: 他们认为财富是自动积累的，而忽视了当前的财富是合法劳动和自愿交换的结果
wrong_answers:
  - 他们低估了政府监管的作用，高估了私人市场的效率
  - 他们忽视了环境因素，认为自然资源总是无限的
  - 他们高估了农业用地的价值，低估了工业发展的重要性
explanation: |
  文中指出了主张原始土地掠夺制度中的两个具体事实错误。首先，这些制度错误地认为致富是一件轻而易举的事，而忽视了企业家所面临的持续风险、艰苦工作和困难。其次，如果最初的土地掠夺是真的，我们就应该看到这些土地掠夺者的后代成为当今最富有的家庭，但现实表明，目前的财产来自合法的劳动和自愿的价值交换，而不是历史上的盗窃。
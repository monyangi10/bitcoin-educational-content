question: Secondo il testo, quali sono i due principali errori di fatto nei sistemi che rivendicano la spoliazione originaria della terra con la forza?
answer: Presuppongono un arricchimento automatico e ignorano che la ricchezza attuale è il risultato di un lavoro legittimo e di uno scambio volontario
wrong_answers:
  - Sottovalutano il ruolo della regolamentazione governativa e sopravvalutano l'efficienza del mercato privato
  - Ignorano i fattori ambientali e presumono che le risorse naturali illimitate siano sempre disponibili
  - Sopravvalutano i terreni agricoli e sottovalutano l'importanza dello sviluppo industriale
explanation: |
  Il testo individua due specifici errori di fatto nei sistemi che rivendicano la spoliazione della terra originaria. In primo luogo, questi sistemi presuppongono erroneamente che l'arricchimento sia automaticamente facile, ignorando i rischi costanti, il lavoro estenuante e le difficoltà che gli imprenditori devono affrontare. In secondo luogo, se la spoliazione originaria fosse vera, dovremmo vedere i discendenti di questi rapinatori di terre tra le famiglie più ricche di oggi, ma la realtà dimostra che le proprietà attuali sono il risultato di un lavoro legittimo e di scambi volontari di valore, non di un furto storico.
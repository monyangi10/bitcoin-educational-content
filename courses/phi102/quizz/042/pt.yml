question: De acordo com o texto, quais são os dois principais erros factuais dos sistemas que reivindicam a espoliação original das terras pela força?
answer: Pressupõem um enriquecimento automático e ignoram que a riqueza atual resulta de trabalho legítimo e de trocas voluntárias
wrong_answers:
  - Subestimam o papel da regulamentação governamental e sobrestimam a eficiência do mercado privado
  - Ignoram os factores ambientais e partem do princípio de que há sempre recursos naturais ilimitados disponíveis
  - Sobrevalorizam as terras agrícolas e subestimam a importância do desenvolvimento industrial
explanation: |
  O texto identifica dois erros factuais específicos nos sistemas que alegam a espoliação de terras originais. Em primeiro lugar, estes sistemas assumem erradamente que há uma facilidade automática no enriquecimento, ignorando os riscos constantes, o trabalho exaustivo e as dificuldades que os empresários enfrentam. Em segundo lugar, se a espoliação original fosse verdadeira, deveríamos ver descendentes desses grileiros entre as famílias mais ricas de hoje, mas a realidade mostra que as propriedades actuais resultam de trabalho legítimo e de trocas voluntárias de valor por valor, e não de roubo histórico.
question: Prema tekstu, koje su dve glavne činjenične greške u sistemima koji tvrde da je došlo do prvobitne otimačine zemlje silom?
answer: Pretpostavljaju automatsko obogaćivanje i ignorišu da trenutno bogatstvo proizlazi iz legitimnog rada i dobrovoljne razmene.
wrong_answers:
  - Potcenjuju ulogu državne regulative i precenjuju efikasnost privatnog tržišta.
  - Oni ignorišu faktore životne sredine i pretpostavljaju da su neograničeni prirodni resursi uvek dostupni
  - Precjenjuju poljoprivredno zemljište i potcenjuju značaj industrijskog razvoja
explanation: |
  Tekst identifikuje dve specifične činjenične greške u sistemima koji tvrde da je došlo do originalne otimačine zemlje. Prvo, ovi sistemi pogrešno pretpostavljaju da postoji automatska lakoća u bogaćenju, ignorišući stalne rizike, iscrpljujući rad i poteškoće sa kojima se preduzetnici suočavaju. Drugo, ako bi originalna otimačina bila istinita, trebalo bi da vidimo potomke ovih otimača zemlje među današnjim najbogatijim porodicama, ali stvarnost pokazuje da trenutna imovina proizlazi iz legitimnog rada i dobrovoljnih razmena vrednosti za vrednost, a ne iz istorijske krađe.
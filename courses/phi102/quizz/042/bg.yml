question: Според текста кои са двете основни фактологически грешки в системите, които твърдят, че първоначалното отнемане на земята е извършено със сила?
answer: Те предполагат автоматично обогатяване и пренебрегват факта, че настоящото богатство е резултат от законен труд и доброволна размяна
wrong_answers:
  - Те подценяват ролята на държавното регулиране и надценяват ефективността на частния пазар
  - Те пренебрегват факторите на околната среда и приемат, че винаги са налице неограничени природни ресурси
  - Те надценяват земеделските земи и подценяват значението на индустриалното развитие
explanation: |
  В текста се посочват две конкретни фактически грешки в системите, които твърдят, че първоначално са били отнети земи. Първо, тези системи погрешно приемат, че е налице автоматична лекота при обогатяването, като пренебрегват постоянните рискове, изтощителната работа и трудностите, с които се сблъскват предприемачите. Второ, ако първоначалното разхищение беше вярно, би трябвало да видим потомци на тези заграбители на земя сред днешните най-богати семейства, но реалността показва, че сегашните имоти са резултат от законен труд и доброволна размяна на стойност срещу стойност, а не от историческа кражба.
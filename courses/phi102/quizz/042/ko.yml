question: 본문에 따르면, 무력에 의한 원시 토지 수탈을 주장하는 시스템에서 두 가지 주요 사실 오류는 무엇인가요?
answer: 그들은 자동 부를 가정하고 현재의 부는 합법적인 노동과 자발적인 교환에서 비롯된다는 사실을 무시합니다
wrong_answers:
  - 정부 규제의 역할을 과소평가하고 민간 시장의 효율성을 과대평가합니다
  - 환경적 요인을 무시하고 천연 자원이 항상 무한하다고 가정합니다
  - 농지를 과대평가하고 산업 발전의 중요성을 과소평가합니다
explanation: |
  이 글은 원시 토지 분할을 주장하는 시스템에서 두 가지 구체적인 사실상의 오류를 지적합니다. 첫째, 이러한 시스템은 기업가들이 직면하는 끊임없는 위험, 고된 노동, 어려움을 무시한 채 자동으로 쉽게 부를 축적할 수 있다고 잘못 가정합니다. 둘째, 원조 토지수탈이 사실이라면 오늘날 가장 부유한 가문에서 토지를 차지한 이들의 후손을 볼 수 있어야 하지만 현실은 현재의 재산이 역사적 절도가 아니라 합법적인 노동과 자발적인 가치 교환의 결과라는 것을 보여줍니다.
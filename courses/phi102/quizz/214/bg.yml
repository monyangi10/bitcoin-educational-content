question: Според либералната икономическа теория кой е основният механизъм, чрез който богатството трябва да се поддържа непрекъснато в съвременните капиталистически общества?
answer: Постоянна ежедневна работа по анализ на пазара и инвестиции за поддържане на стойността на капитала
wrong_answers:
  - Наследени права на собственост, които автоматично осигуряват доход без усилия
  - Правителствени политики за преразпределение, които гарантират, че концентрацията на богатството остава стабилна
  - Фиксирани социални йерархии, които гарантират предаването на богатството между поколенията
explanation: |
  Либералната икономическа теория, представена от Пол Леруа-Бьоло, твърди, че съвременните общества са организирани около труда, където богатството трябва постоянно да се "откупува" чрез труд. Самото остойностяване на капитала представлява ежедневна работа по пазарен анализ и инвестиции. Това противоречи на марксисткия класов анализ, като показва, че дори собствениците на капитала трябва непрекъснато да работят, за да запазят позицията си. Грешните отговори отразяват характеристиките на древните общества или социалистическите системи, които либералната теория изрично отхвърля като несъвместими със съвременните свободни общества.
question: De acordo com a teoria económica liberal, qual é o principal mecanismo pelo qual a riqueza deve ser continuamente mantida nas sociedades capitalistas modernas?
answer: Trabalho diário constante de análise do mercado e de investimento para manter o valor do capital
wrong_answers:
  - Direitos de propriedade herdados que geram automaticamente rendimentos generate sem esforço
  - Políticas governamentais de redistribuição que garantam a estabilidade da concentração da riqueza
  - Hierarquias sociais fixas que garantem a transmissão de riqueza entre gerações
explanation: |
  A teoria económica liberal, tal como apresentada por Paul Leroy-Beaulieu, defende que as sociedades modernas estão organizadas em torno do trabalho, onde a riqueza tem de ser constantemente "readquirida" através do trabalho. A própria valorização do capital constitui um trabalho quotidiano de análise do mercado e de investimento. Isto contradiz a análise de classe marxista, mostrando que mesmo os proprietários de capital têm de trabalhar continuamente para manter a sua posição. As respostas erradas reflectem caraterísticas de sociedades antigas ou de sistemas socialistas que a teoria liberal rejeita explicitamente como incompatíveis com as sociedades livres modernas.
question: Liberal ekonomi teorisine göre, modern kapitalist toplumlarda zenginliğin sürekli olarak sürdürülmesini sağlayan temel mekanizma nedir?
answer: Sermaye değerini korumak için sürekli günlük piyasa analizi ve yatırım çalışması
wrong_answers:
  - Çaba sarf etmeden otomatik olarak generate geliri sağlayan miras alınan mülkiyet hakları
  - Servet yoğunlaşmasının sabit kalmasını sağlayan devlet yeniden dağıtım politikaları
  - Nesiller arasında servet aktarımını garanti eden sabit sosyal hiyerarşiler
explanation: |
  Paul Leroy-Beaulieu tarafından sunulan liberal ekonomi teorisi, modern toplumların çalışma etrafında örgütlendiğini ve servetin emek yoluyla sürekli olarak 'yeniden satın alınması' gerektiğini savunur. Sermayenin değerlenmesi, piyasa analizi ve yatırımın günlük işlerini oluşturmaktadır. Bu, sermaye sahiplerinin bile konumlarını korumak için sürekli çalışmak zorunda olduklarını göstererek Marksist sınıf analiziyle çelişir. Yanlış cevaplar, liberal teorinin modern özgür toplumlarla bağdaşmadığı gerekçesiyle açıkça reddettiği eski toplumların veya sosyalist sistemlerin özelliklerini yansıtmaktadır.
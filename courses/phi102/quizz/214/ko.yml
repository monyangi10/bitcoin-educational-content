question: 자유주의 경제 이론에 따르면, 현대 자본주의 사회에서 부를 지속적으로 유지해야 하는 주요 메커니즘은 무엇인가요?
answer: 자본 가치 유지를 위한 시장 분석 및 투자에 대한 끊임없는 일상 업무
wrong_answers:
  - 노력 없이 자동으로 generate 소득이 발생하는 상속 재산권
  - 부의 집중을 안정적으로 유지하는 정부 재분배 정책
  - 여러 세대에 걸쳐 부의 대물림을 보장하는 사회 계층 구조 수정
explanation: |
  폴 르로이-보리유가 제시한 자유주의 경제 이론에 따르면 현대 사회는 노동을 중심으로 조직되어 있으며, 부는 노동을 통해 끊임없이 '재구매'되어야 한다고 주장합니다. 자본의 가치 평가 자체가 시장 분석과 투자라는 일상적인 작업으로 구성됩니다. 이는 자본 소유자조차도 자신의 지위를 유지하기 위해 끊임없이 일해야 한다는 마르크스주의 계급 분석과 모순됩니다. 오답은 자유주의 이론이 현대 자유 사회와 양립할 수 없다고 명시적으로 거부하는 고대 사회 또는 사회주의 체제의 특성을 반영합니다.
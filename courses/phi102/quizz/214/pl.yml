question: Zgodnie z liberalną teorią ekonomiczną, jaki jest podstawowy mechanizm, za pomocą którego bogactwo musi być stale utrzymywane we współczesnych społeczeństwach kapitalistycznych?
answer: Stała codzienna praca nad analizą rynku i inwestycjami w celu utrzymania wartości kapitału
wrong_answers:
  - Odziedziczone prawa własności, które automatycznie generate dochód bez wysiłku
  - Rządowe polityki redystrybucji, które zapewniają, że koncentracja bogactwa pozostaje stabilna
  - Stałe hierarchie społeczne gwarantujące przekazywanie bogactwa z pokolenia na pokolenie
explanation: |
  Liberalna teoria ekonomiczna, przedstawiona przez Paula Leroy-Beaulieu, twierdzi, że współczesne społeczeństwa są zorganizowane wokół pracy, w której bogactwo musi być stale "odkupywane" poprzez pracę. Sama waloryzacja kapitału stanowi codzienną pracę związaną z analizą rynku i inwestycjami. Zaprzecza to marksistowskiej analizie klasowej, pokazując, że nawet właściciele kapitału muszą nieustannie pracować, aby utrzymać swoją pozycję. Błędne odpowiedzi odzwierciedlają cechy starożytnych społeczeństw lub systemów socjalistycznych, które teoria liberalna wyraźnie odrzuca jako niezgodne z nowoczesnymi wolnymi społeczeństwami.
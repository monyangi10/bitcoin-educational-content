question: Wat is volgens de liberale economische theorie het belangrijkste mechanisme waardoor rijkdom in moderne kapitalistische samenlevingen voortdurend in stand moet worden gehouden?
answer: Constante dagelijkse werkzaamheden van marktanalyse en investeringen om kapitaalwaarde te behouden
wrong_answers:
  - Geërfde eigendomsrechten die automatisch generate inkomen opleveren zonder inspanning
  - Herverdelingsbeleid van de overheid dat ervoor zorgt dat de rijkdomconcentratie stabiel blijft
  - Vaste sociale hiërarchieën die de overdracht van rijkdom tussen generaties garanderen
explanation: |
  De liberale economische theorie, zoals gepresenteerd door Paul Leroy-Beaulieu, stelt dat moderne samenlevingen georganiseerd zijn rond werk, waar rijkdom voortdurend moet worden 'teruggekocht' door arbeid. De valorisatie van kapitaal zelf vormt het dagelijkse werk van marktanalyse en investering. Dit is in tegenspraak met de marxistische klassenanalyse, omdat het aantoont dat zelfs kapitaalbezitters voortdurend moeten werken om hun positie te behouden. De foute antwoorden weerspiegelen kenmerken van oude samenlevingen of socialistische systemen die de liberale theorie expliciet verwerpt als onverenigbaar met moderne vrije samenlevingen.
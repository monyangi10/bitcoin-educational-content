question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni ubuhe buryo nyamukuru ubutunzi butegerezwa gukomeza kubungabungwa mu mibano y’abanyagihugu bo muri iki gihe?
answer: Ibikorwa vya misi yose vy'isesengura ry'isoko n'ishoramari kugira ngo ugume ufise agaciro k'umutungo kamere
wrong_answers:
  - Uburenganzira bw'umutungo burazwe buca bwihuta generate inyungu ata kigoro
  - Amategeko ya Leta yo gusubira gusangira atuma ubutunzi buguma bushikamye
  - Uburongozi buhoraho bw'imibano bushobora gutuma ubutunzi bukwiragizwa mu mayaruka yose
explanation: |
  Ivyiyumviro vy’ubutunzi vy’ubwigenge, nk’uko vyashikirijwe na Paul Leroy-Beaulieu, bivuga ko imibano yo muri iki gihe itunganijwe ikikuje akazi, aho ubutunzi butegerezwa kwama ‘bugurwa’ biciye ku bikorwa. Guha agaciro umutungo ubwawo ni igikorwa ca misi yose co gusuzuma isoko no gushiramwo amahera. Ivyo bivuguruza isesengura ry’imigwi y’aba Marxiste mu kwerekana ko mbere n’abafise umutungo bategerezwa kubandanya bakora kugira ngo bagumane ikibanza cabo. Inyishu zitari zo zirerekana ibiranga imibano ya kera canke uburyo bw’ubusosiyalisiti inyigisho y’ubwigenge yanse mu buryo butomoye ko idahuye n’imibano y’ubu yidegemvya.
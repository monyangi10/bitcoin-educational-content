question: 自由主義経済理論によれば、現代の資本主義社会において富を継続的に維持しなければならない主なメカニズムは何か？
answer: 資本価値を維持するための市場分析と投資に関する日々の絶え間ない作業
wrong_answers:
  - 努力なしに自動的にgenerate収入を得る相続財産権
  - 富の集中を安定させる政府の再分配政策
  - 世代を超えた富の伝達を保証する固定的な社会階層
explanation: |
  ポール・ルロワ＝ボリューが提示した自由主義経済理論は、近代社会は労働を中心に組織されており、富は常に労働を通じて「買い戻され」なければならないと主張している。資本の価値化そのものが、市場分析と投資という日々の仕事を構成している。これは、資本所有者であっても、その地位を維持するために絶えず働かなければならないことを示し、マルクス主義の階級分析と矛盾する。間違った答えは、自由主義理論が現代の自由社会とは相容れないものとして明確に否定している古代社会や社会主義体制の特徴を反映している。
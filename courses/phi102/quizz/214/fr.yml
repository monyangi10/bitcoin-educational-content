question: Selon la théorie économique libérale, quel est le principal mécanisme par lequel la richesse doit être maintenue en permanence dans les sociétés capitalistes modernes ?
answer: Travail quotidien constant d'analyse du marché et d'investissement pour maintenir la valeur du capital
wrong_answers:
  - Droits de propriété hérités qui génèrent automatiquement des revenus generate sans effort
  - Politiques gouvernementales de redistribution qui garantissent la stabilité de la concentration des richesses
  - Des hiérarchies sociales fixes qui garantissent la transmission des richesses d'une génération à l'autre
explanation: |
  La théorie économique libérale, telle que présentée par Paul Leroy-Beaulieu, affirme que les sociétés modernes sont organisées autour du travail, où la richesse doit constamment être "rachetée" par le travail. La valorisation du capital lui-même constitue un travail quotidien d'analyse du marché et d'investissement. Cela contredit l'analyse marxiste des classes sociales en montrant que même les détenteurs de capitaux doivent continuellement travailler pour maintenir leur position. Les mauvaises réponses reflètent les caractéristiques des sociétés anciennes ou des systèmes socialistes que la théorie libérale rejette explicitement comme étant incompatibles avec les sociétés libres modernes.
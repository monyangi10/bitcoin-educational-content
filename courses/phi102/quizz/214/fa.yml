question: بر اساس نظریه اقتصادی لیبرال، مکانیزم اصلی که از طریق آن ثروت باید به طور مداوم در جوامع سرمایه‌داری مدرن حفظ شود چیست؟
answer: کار مداوم روزانه تحلیل بازار و سرمایه‌گذاری برای حفظ ارزش سرمایه
wrong_answers:
  - حقوق مالکیت موروثی که به‌طور خودکار درآمد generate را بدون تلاش ایجاد می‌کنند
  - سیاست‌های بازتوزیع دولتی که اطمینان حاصل می‌کنند تمرکز ثروت پایدار می‌ماند
  - سلسله مراتب اجتماعی ثابت که انتقال ثروت را در نسل‌ها تضمین می‌کنند
explanation: |
  نظریه اقتصادی لیبرال، همان‌طور که توسط پل لروی-بولو ارائه شده است، استدلال می‌کند که جوامع مدرن حول محور کار سازماندهی شده‌اند، جایی که ثروت باید به طور مداوم از طریق کار «بازخرید» شود. ارزش‌گذاری سرمایه خود شامل کار روزانه تحلیل بازار و سرمایه‌گذاری است. این امر با تحلیل طبقاتی مارکسیستی در تضاد است زیرا نشان می‌دهد که حتی صاحبان سرمایه نیز باید به طور مداوم کار کنند تا موقعیت خود را حفظ کنند. پاسخ‌های نادرست ویژگی‌های جوامع باستانی یا سیستم‌های سوسیالیستی را منعکس می‌کنند که نظریه لیبرال به‌طور صریح آن‌ها را به‌عنوان ناسازگار با جوامع آزاد مدرن رد می‌کند.
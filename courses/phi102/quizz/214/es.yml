question: Según la teoría económica liberal, ¿cuál es el principal mecanismo por el que debe mantenerse continuamente la riqueza en las sociedades capitalistas modernas?
answer: Trabajo diario constante de análisis de mercado e inversión para mantener el valor del capital
wrong_answers:
  - Derechos de propiedad heredados que automáticamente generate ingresos sin esfuerzo
  - Políticas gubernamentales de redistribución que garanticen la estabilidad de la concentración de la riqueza
  - Jerarquías sociales fijas que garantizan la transmisión de la riqueza entre generaciones
explanation: |
  La teoría económica liberal, tal como la presentó Paul Leroy-Beaulieu, sostiene que las sociedades modernas están organizadas en torno al trabajo, donde la riqueza debe "recomprarse" constantemente mediante el trabajo. La valorización del propio capital constituye el trabajo cotidiano de análisis e inversión en el mercado. Esto contradice el análisis de clase marxista al demostrar que incluso los propietarios del capital deben trabajar continuamente para mantener su posición. Las respuestas erróneas reflejan características de sociedades antiguas o sistemas socialistas que la teoría liberal rechaza explícitamente por ser incompatibles con las sociedades libres modernas.
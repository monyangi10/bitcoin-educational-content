question: Prema liberalnoj ekonomskoj teoriji, primarni mehanizam putem kojeg se bogatstvo mora kontinuirano održavati u modernim kapitalističkim društvima je tržišna konkurencija.
answer: Stalan dnevni rad na analizi tržišta i investiranju radi održavanja vrednosti kapitala
wrong_answers:
  - Nasledna prava na imovinu koja automatski generate prihod bez napora
  - Vladine politike preraspodele koje osiguravaju da koncentracija bogatstva ostane stabilna
  - Fiksne društvene hijerarhije koje garantuju prenos bogatstva kroz generacije
explanation: |
  Liberalna ekonomska teorija, kako je predstavio Paul Leroy-Beaulieu, tvrdi da su moderna društva organizovana oko rada, gde se bogatstvo mora konstantno 'ponovo kupovati' kroz rad. Valorizacija kapitala sama po sebi predstavlja svakodnevni rad analize tržišta i investicija. Ovo je u suprotnosti sa marksističkom klasnom analizom pokazujući da čak i vlasnici kapitala moraju kontinuirano raditi kako bi održali svoju poziciju. Pogrešni odgovori odražavaju karakteristike drevnih društava ili socijalističkih sistema koje liberalna teorija eksplicitno odbacuje kao nespojive sa modernim slobodnim društvima.
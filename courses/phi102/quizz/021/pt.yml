question: De acordo com os princípios discutidos, qual é o fundamento da propriedade legítima da terra?
answer: Trabalho e mão de obra investidos para tornar a terra produtiva
wrong_answers:
  - Autorização governamental e documentação legal
  - Herança histórica das gerações anteriores
  - Direito natural baseado apenas na ocupação física
explanation: |
  O texto sublinha que a propriedade da terra se baseia fundamentalmente no trabalho nela investido. O exemplo da terra suada mais clara ilustra este princípio - a terra virgem não pode satisfazer as necessidades humanas enquanto não for desbravada, cultivada e mantida pelo trabalho. Este trabalho transforma a terra improdutiva em algo útil, estabelecendo a base legítima para a propriedade. A autorização governamental representa uma formalidade legal em vez de uma justificação fundamental, a herança transfere direitos de propriedade existentes em vez de os criar, e a mera ocupação física sem trabalho produtivo não estabelece a mesma reivindicação legítima que o investimento laboral.
question: In base ai principi discussi, su cosa si basa la legittima proprietà della terra?
answer: Lavoro e manodopera investiti per rendere produttiva la terra
wrong_answers:
  - Autorizzazione governativa e documentazione legale
  - Eredità storica delle generazioni precedenti
  - Diritto naturale basato sulla sola occupazione fisica
explanation: |
  Il testo sottolinea che la proprietà della terra si basa fondamentalmente sul lavoro investito in essa. L'esempio della terra sudata più chiara illustra questo principio: la terra vergine non può soddisfare i bisogni umani finché non viene dissodata, coltivata e mantenuta attraverso il lavoro. Questo lavoro trasforma la terra improduttiva in qualcosa di utile, stabilendo la base legittima per la proprietà. L'autorizzazione governativa rappresenta una formalità legale piuttosto che una giustificazione fondamentale, l'eredità trasferisce i diritti di proprietà esistenti piuttosto che crearli, e la mera occupazione fisica senza lavoro produttivo non stabilisce la stessa legittima rivendicazione dell'investimento lavorativo.
question: Что, согласно рассмотренным принципам, служит основой для законного права собственности на землю?
answer: Работа и труд, вложенные в то, чтобы сделать землю продуктивной
wrong_answers:
  - Разрешение правительства и юридическая документация
  - Историческое наследство от предыдущих поколений
  - Естественное право, основанное только на физическом занятии
explanation: |
  В тексте подчеркивается, что в основе права собственности на землю лежит вложенный в нее труд. Пример с потеющей землей наглядно иллюстрирует этот принцип: девственная земля не может удовлетворить человеческие потребности, пока она не расчищена, не обработана и не ухожена трудом. Этот труд превращает непродуктивную землю в нечто полезное, создавая законную основу для владения. Разрешение правительства представляет собой скорее юридическую формальность, чем фундаментальное обоснование, наследование передает существующие права собственности, а не создает их, а простое физическое занятие без производительного труда не устанавливает таких же законных притязаний, как вложение труда.
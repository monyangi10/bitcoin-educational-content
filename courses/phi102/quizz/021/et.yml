question: Mis on käsitletud põhimõtete kohaselt maa õiguspärase omandiõiguse aluseks?
answer: Töö ja töö, mis on investeeritud maa tootlikuks muutmisse
wrong_answers:
  - Valitsuse luba ja juriidilised dokumendid
  - Ajalooline pärand eelmistelt põlvkondadelt
  - Ainult füüsilisel hõivamisel põhinev loomulik õigus
explanation: |
  Tekstis rõhutatakse, et maa omandiõigus põhineb põhimõtteliselt sellesse investeeritud tööl. Näide higistavast maast illustreerib seda põhimõtet selgemalt - puutumatu maa ei saa rahuldada inimvajadusi enne, kui seda ei ole tööga puhastatud, haritud ja hooldatud. See töö muudab tootmatu maa millekski kasulikuks, luues omandiõiguse seadusliku aluse. Valitsuse luba kujutab endast pigem õiguslikku formaalsust kui põhimõttelist õigustust, pärimine annab üle olemasolevad omandiõigused, mitte ei loo neid, ja pelgalt füüsiline hõivamine ilma tootliku töö tegemiseta ei loo samasugust õigustatud nõuet nagu tööjõuinvesteeringud.
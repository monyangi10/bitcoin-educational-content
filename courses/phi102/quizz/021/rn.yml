question: Dushingiye ku ngingo ngenderwako zavuzwe, ni igiki gikora nk’umushinge wo kugira ubutaka mu buryo bubereye?
answer: Akazi n'abakozi bashizwe mu gutuma ubutaka bugira umwimbu .
wrong_answers:
  - Uruhusha rwa Leta n'inyandiko zitegekanijwe n'amategeko
  - Iragi ry'amateka ry'ibihe vya kera
  - Uburenganzira bushingiye ku kazi k'umubiri gusa
explanation: |
  Ico canditswe gishimika ku vy’uko ubutunzi bw’ubutaka bushingiye ahanini ku gikorwa bushizwemwo. Akarorero k’ubutaka buvyuka karerekana neza iyo ngingo ngenderwako - ubutaka bw’isugi ntibushobora guhazwa n’ivyo umuntu akeneye gushika busukuwe, burimwa, bugatunganirizwa biciye mu bikorwa. Ico gikorwa gihindura ubutaka butagira umwimbu bukaba ikintu c’ingirakamaro, kigashinga intahe ibereye yo kuba uwufise. Uruhusha rwa Leta rugereranya uburyo butegekanijwe n’amategeko aho gushingira intahe ivy’ishimikiro, iragi ritanga uburenganzira bw’umutungo buriho aho kuburema, kandi akazi k’umubiri gusa ata gikorwa kizana inyungu ntigashinga intahe nk’uko ishoramari ry’abakozi rigira.
question: D'après les principes évoqués, sur quoi repose la légitimité de la propriété foncière ?
answer: Travail et main-d'œuvre investis pour rendre la terre productive
wrong_answers:
  - Autorisation gouvernementale et documentation juridique
  - Héritage historique des générations précédentes
  - Droit naturel fondé sur la seule occupation physique
explanation: |
  Le texte souligne que la propriété de la terre est fondamentalement basée sur le travail investi dans celle-ci. L'exemple du défricheur illustre ce principe : la terre vierge ne peut satisfaire les besoins humains tant qu'elle n'est pas défrichée, cultivée et entretenue par le travail. Ce travail transforme une terre improductive en quelque chose d'utile, établissant ainsi la base légitime de la propriété. L'autorisation gouvernementale représente une formalité juridique plutôt qu'une justification fondamentale, l'héritage transfère des droits de propriété existants plutôt qu'il ne les crée, et la simple occupation physique sans travail productif n'établit pas la même revendication légitime que l'investissement en travail.
question: Co je podle probraných zásad základem legitimního vlastnictví půdy?
answer: Práce a práce vynaložené na zúrodnění půdy
wrong_answers:
  - Vládní povolení a právní dokumentace
  - Historické dědictví po předchozích generacích
  - Přirozené právo založené pouze na fyzickém obsazení
explanation: |
  Text zdůrazňuje, že vlastnictví pozemku je zásadně založeno na práci do něj vložené. Příklad potící se půdy tento princip ilustruje jasněji - panenská půda nemůže uspokojit lidské potřeby, dokud není vyčištěna, obdělávána a udržována prací. Tato práce přeměňuje neproduktivní půdu v něco užitečného a vytváří legitimní základ pro vlastnictví. Vládní povolení představuje spíše právní formalitu než zásadní zdůvodnění, dědictví převádí existující vlastnická práva, nikoliv je vytváří, a pouhé fyzické obsazení bez produktivní práce nezakládá stejný legitimní nárok jako investice do práce.
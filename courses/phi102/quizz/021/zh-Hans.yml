question: 根据所讨论的原则，什么是土地合法财产所有权的基础？
answer: 为使土地具有生产力而投入的工作和劳动
wrong_answers:
  - 政府授权和法律文件
  - 前人留下的历史遗产
  - 仅以实际占领为基础的自然权利
explanation: |
  课文强调，土地的财产所有权从根本上说是建立在投入劳动的基础上的。汗流浃背的土地的例子更清楚地说明了这一原则--处女地只有通过劳动开垦、耕种和维护，才能满足人类的需求。这种劳动将非生产性土地转化为有用的东西，为所有权奠定了合法基础。政府授权代表的是法律形式而非根本理由，继承转移的是现有产权而非创造产权，仅仅实际占有而不进行生产性劳动并不能像劳动投资那样确立合法权利主张。
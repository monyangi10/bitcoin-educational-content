question: Menurut prinsip-prinsip yang telah dibahas, apa yang menjadi dasar kepemilikan properti yang sah atas tanah?
answer: Pekerjaan dan tenaga kerja yang diinvestasikan untuk membuat lahan menjadi produktif
wrong_answers:
  - Otorisasi pemerintah dan dokumentasi hukum
  - Warisan sejarah dari generasi sebelumnya
  - Hak alamiah berdasarkan pendudukan fisik semata
explanation: |
  Teks ini menekankan bahwa kepemilikan properti atas tanah pada dasarnya didasarkan pada kerja yang diinvestasikan di dalamnya. Contoh tanah yang berkeringat menggambarkan prinsip ini - tanah yang masih perawan tidak dapat memenuhi kebutuhan manusia sampai tanah tersebut dibuka, diolah, dan dipelihara melalui kerja keras. Pekerjaan ini mengubah tanah yang tidak produktif menjadi sesuatu yang berguna, membangun dasar yang sah untuk kepemilikan. Otorisasi pemerintah lebih merupakan formalitas hukum daripada pembenaran mendasar, warisan hanya memindahkan hak milik yang sudah ada daripada menciptakannya, dan pendudukan fisik semata tanpa kerja produktif tidak memberikan klaim yang sah seperti halnya investasi tenaga kerja.
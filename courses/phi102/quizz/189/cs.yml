question: Jaký základní vztah mezi právem a právy jednotlivce odlišuje teorii Benjamina Constanta od Montesquieuova pojetí svobody?
answer: Constant rozlišuje sféru nevinného individuálního jednání od sféry moci, kde vláda zaručuje práva, aniž by určovala individuální vůli nebo jednání
wrong_answers:
  - Constant tvrdí, že zákony by měly rozšířit svou působnost na všechny aspekty individuálního chování, zatímco Montesquieu omezuje právní zásahy na ekonomické záležitosti
  - Constant se domnívá, že svoboda jednotlivce závisí na zmnožení zákonů, zatímco Montesquieu prosazuje redukci právních rámců
  - Constant navrhuje, aby vláda aktivně formovala individuální přání a volby, zatímco Montesquieu to ponechává zcela na společenských zvyklostech
explanation: |
  Benjamin Constant vytvořil svou teorii právě v rozporu s nebezpečnou Montesquieuovou definicí svobody jako "práva dělat vše, co zákony dovolují" Constantovým klíčovým poznatkem bylo jasné oddělení sféry nevinného individuálního jednání (které by mělo zůstat svobodné) od sféry vládní moci (která by měla pouze zaručovat výkon práv). To zabraňuje tomu, aby stát určoval individuální vůli nebo jednání, na rozdíl od Montesquieuova pojetí, které umožňuje jakékoli omezení, pokud je zákonem povoleno.
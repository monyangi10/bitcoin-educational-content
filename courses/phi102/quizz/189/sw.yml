question: Ni uhusiano gani wa msingi kati ya sheria na haki za mtu binafsi unaotofautisha nadharia ya Benjamin Constant na dhana ya Montesquieu kuhusu uhuru?
answer: Constant hutofautisha nyanja ya hatua ya mtu binafsi isiyo na hatia na nyanja ya madaraka, ambapo serikali inahakikisha haki bila kuamua utashi au matendo ya mtu binafsi.
wrong_answers:
  - Constant anasema kwamba sheria zinapaswa kupanua wigo wake ili kufidia vipengele vyote vya tabia ya mtu binafsi huku Montesquieu akiweka mipaka ya uingiliaji kati wa kisheria kwa masuala ya kiuchumi.
  - Constant anaamini kwamba uhuru wa mtu binafsi unategemea kuzidisha sheria huku Montesquieu akitetea kupunguzwa kwa mifumo ya kisheria
  - Constant anapendekeza kwamba serikali inapaswa kuunda kikamilifu matamanio na chaguzi za mtu binafsi huku Montesquieu akiacha hili kabisa kwa desturi za kijamii
explanation: |
  Benjamin Constant aliendeleza nadharia yake haswa kinyume na ufafanuzi hatari wa Montesquieu wa uhuru kama 'haki ya kufanya kila kitu ambacho sheria inaruhusu.' Ufahamu muhimu wa Constant ulikuwa kutenganisha waziwazi nyanja ya hatua ya mtu binafsi isiyo na hatia (ambayo inapaswa kubaki huru) kutoka nyanja ya nguvu ya kiserikali (ambayo inapaswa kuhakikisha tu utekelezaji wa haki). Hii inazuia serikali kuamua utashi au vitendo vya mtu binafsi, tofauti na dhana ya Montesquieu ambayo inaruhusu kizuizi chochote mradi tu imeidhinishwa kisheria.
question: Ni ubucuti bw’ishimikiro ubuhe buri hagati y’amategeko n’uburenganzira bw’umuntu ku giti ciwe butandukanya inyigisho ya Benjamin Constant n’iciyumviro ca Montesquieu ku bijanye n’umwidegemvyo?
answer: Constant itandukanya urugero rw’ibikorwa vy’umuntu ku giti ciwe ataco yakoze n’urugero rw’ububasha, aho Leta itanga uburenganzira ataco igena ubushake canke ibikorwa vy’umuntu ku giti ciwe .
wrong_answers:
  - Constant avuga ko amategeko akwiye kwagura urugero rwayo kugira ngo afate imice yose y’inyifato y’umuntu ku giti ciwe mu gihe Montesquieu agarukira ku bijanye n’ubutunzi .
  - Constant wemera ko umwidegemvyo w’umuntu ku giti ciwe uva ku kugwiza amategeko mu gihe Montesquieu avugira ko amategeko yogabanywa .
  - Constant asaba ko Leta ikwiye guhindura n’umwete ivyipfuzo n’amahitamwo y’umuntu ku giti ciwe mu gihe Montesquieu ivyo vyose abisiga ku migenzo y’abantu .
explanation: |
  Benjamin Constant yashize imbere iyo nyigisho yiwe mu buryo bunyuranye canecane n'insobanuro iteye akaga ya Montesquieu y'umwidegemvyo, ikaba ari 'uburenganzira bwo gukora ikintu cose amategeko yemerera.' Iciyumviro nyamukuru Constant yari afise ni ugutandukanya neza urugero rw’ibikorwa vy’umuntu ku giti ciwe ataco yakoze (ivyo bikwiye kuguma ari umwidegemvyo) n’ivyo ububasha bwa Leta (ivyo bikwiye gusa gutuma uburenganzira bukoreshwa). Ivyo bibuza Leta gufata ingingo y’ubushake canke ibikorwa vy’umuntu, bitandukanye n’ivyiyumviro vya Montesquieu vyemerera uburenganzira bwose igihe cose vyemewe n’amategeko.
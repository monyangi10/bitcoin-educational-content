question: Коя фундаментална връзка между закона и индивидуалните права отличава теорията на Бенджамин Констант от концепцията за свободата на Монтескьо?
answer: Констант разграничава сферата на невинните индивидуални действия от сферата на властта, където правителството гарантира права, без да определя индивидуалната воля или действия
wrong_answers:
  - Констант твърди, че законите трябва да разширят обхвата си, за да обхванат всички аспекти на индивидуалното поведение, докато Монтескьо ограничава правната намеса до икономическите въпроси
  - Констант смята, че индивидуалната свобода зависи от увеличаването на законите, докато Монтескьо се застъпва за намаляване на правните рамки
  - Констант предлага правителството активно да формира индивидуалните желания и избори, докато Монтескьо оставя това изцяло на социалните обичаи
explanation: |
  Бенджамин Констант разработва своята теория именно в противоречие с опасното определение на Монтескьо за свободата като "правото да се прави всичко, което законите позволяват" Ключовото прозрение на Констант е ясното разграничаване на сферата на невинните индивидуални действия (които трябва да останат свободни) от сферата на държавната власт (която трябва само да гарантира упражняването на правата). По този начин се предотвратява възможността държавата да определя индивидуалната воля или действия, за разлика от концепцията на Монтескьо, която допуска всякакви ограничения, стига да са разрешени от закона.
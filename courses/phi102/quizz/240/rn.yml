question: Dushingiye ku ciyumviro ca politike c’ubwigenge, ni igiki giserukira ingorane ikomeye cane mu bijanye no kwimurira ibikorwa vya Leta mu nzego z’intara aho kubishira mu nzego z’abikorera ku giti cabo?
answer: Intwaro z'intara ntizigira uburenganzira bwinshi kurusha intwaro nkuru zo kwivanga mu buryo buhungabanya umwidegemvyo w'ishimikiro w'umuntu ku giti ciwe .
wrong_answers:
  - Intwaro z'intara zidakora neza kurusha intwaro za Leta kubera ubutunzi buke .
  - Intwaro z'intara zitera ingorane zo guhuza ibikorwa zituma politike y'igihugu idashoboka gushirwa mu ngiro mu turere dutandukanye .
  - Intwaro z'intara zibura ubuhinga n'ubuhinga bikenewe kugira ngo zishobore gucunga neza ibikorwa vya Leta bikomeye .
explanation: |
  Iciyumviro c’ubwigenge kiranka cane cane kwegereza ubutegetsi abaturage nk’umuti ubereye kuko bihindura gusa aho ubutegetsi butemewe buri aho gutorera umuti ikibazo nyamukuru c’uko Leta ishobora gushika kure. Ico canditswe gishimika ku vy’uko intwaro z’intara zitagira uburenganzira burengeye ubw’intwaro nkuru bwo kwivanga mu buryo butari bwo ku mwidegemvyo w’umuntu ku giti ciwe. Intumbero nyayo y’ubwigenge ni ugushira ibikorwa mu bikorwa vy’abantu ku giti cabo, mu mashirahamwe yigenga, no mu bikorwa vy’ubudandaji - atari gusa kubikura ku rwego rumwe rwa Leta bikaja ku rundi. Iryo tandukaniro ni ngirakamaro cane kuko ryerekana ko ingorane atari urugero rw’ingene Leta igira ico ikoze, ahubwo ari ingingo ngenderwako y’ibikorwa vya Leta vy’agahato ubwavyo iyo birenze ibikorwa bikenewe nk’ubutungane n’ukwigwanira.
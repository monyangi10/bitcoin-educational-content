question: Prema liberalnoj političkoj teoriji, koji predstavlja najznačajniji problem sa prenosom državnih funkcija na lokalne vlasti umesto na privatne entitete?
answer: Lokalne vlasti nemaju veću legitimnost od centralne vlade da intervenišu na načine koji krše individualne osnovne slobode.
wrong_answers:
  - Lokalne vlade su inherentno manje efikasne od centralne vlade zbog manjih ekonomija obima.
  - Lokalne vlade stvaraju probleme koordinacije koji onemogućavaju sprovođenje nacionalne politike u različitim regionima
  - Lokalne vlasti nemaju tehničku stručnost i resurse potrebne za efikasno upravljanje složenim javnim uslugama
explanation: |
  Liberalna misao fundamentalno odbacuje decentralizaciju kao adekvatno rešenje jer ona samo premešta lokaciju nelegitimne moći umesto da se bavi suštinskim problemom prekomernog delovanja države. Tekst naglašava da lokalne vlasti nemaju veću legitimnost od centralne vlasti da zloupotrebljavajući intervenišu protiv individualnih sloboda. Pravi liberalni cilj je prebacivanje funkcija na privatne aktivnosti, slobodno udruživanje i preduzetništvo - a ne samo njihovo premeštanje sa jednog nivoa vlasti na drugi. Ova razlika je ključna jer otkriva da problem nije u obimu državne intervencije, već u principu prinudne državne akcije same po sebi kada se proteže izvan neophodnih funkcija kao što su pravda i odbrana.
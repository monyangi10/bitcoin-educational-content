question: Theo lý thuyết chính trị tự do, vấn đề quan trọng nhất khi chuyển giao chức năng nhà nước cho chính quyền địa phương thay vì cho các thực thể tư nhân là gì?
answer: Chính quyền địa phương thiếu tính chính đáng cao hơn chính quyền trung ương để can thiệp theo những cách vi phạm các quyền tự do cơ bản của cá nhân.
wrong_answers:
  - Chính quyền địa phương vốn dĩ kém hiệu quả hơn chính quyền trung ương do quy mô kinh tế nhỏ hơn.
  - Chính quyền địa phương tạo ra những vấn đề về phối hợp, khiến việc thực thi chính sách quốc gia trở nên bất khả thi ở các vùng khác nhau.
  - Chính quyền địa phương thiếu chuyên môn kỹ thuật và nguồn lực cần thiết để quản lý hiệu quả các dịch vụ công phức tạp.
explanation: |
  Tư tưởng tự do về cơ bản bác bỏ việc phân quyền như một giải pháp thỏa đáng vì nó chỉ đơn thuần dịch chuyển vị trí của quyền lực bất hợp pháp chứ không giải quyết được vấn đề cốt lõi là sự lạm quyền của nhà nước. Văn bản nhấn mạnh rằng chính quyền địa phương không có tính hợp pháp cao hơn chính quyền trung ương trong việc can thiệp một cách lạm dụng vào các quyền tự do cá nhân. Mục tiêu tự do thực sự là chuyển giao các chức năng cho hoạt động tư nhân, hiệp hội tự do và doanh nghiệp - chứ không chỉ đơn giản là chuyển chúng từ cấp chính quyền này sang cấp chính quyền khác. Sự phân biệt này rất quan trọng vì nó cho thấy vấn đề không phải là quy mô can thiệp của chính phủ, mà là nguyên tắc hành động cưỡng chế của nhà nước khi nó vượt ra ngoài các chức năng cần thiết như tư pháp và quốc phòng.
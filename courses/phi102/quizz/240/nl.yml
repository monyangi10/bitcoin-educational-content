question: Wat is volgens de liberale politieke theorie het belangrijkste probleem bij het overhevelen van overheidstaken naar lokale overheden in plaats van naar particuliere entiteiten?
answer: Lokale overheden missen meer legitimiteit dan de centrale overheid om in te grijpen op manieren die individuele fundamentele vrijheden schenden
wrong_answers:
  - Lokale overheden zijn inherent minder efficiënt dan centrale overheden vanwege kleinere schaalvoordelen
  - Lokale overheden creëren coördinatieproblemen die de implementatie van nationaal beleid in verschillende regio's onmogelijk maken
  - Lokale overheden missen de technische expertise en middelen die nodig zijn om complexe overheidsdiensten effectief te beheren
explanation: |
  Het liberale gedachtegoed verwerpt decentralisatie fundamenteel als een adequate oplossing omdat het slechts de locatie van onwettige macht verschuift in plaats van het kernprobleem van overmatige staatsinmenging aan te pakken. De tekst benadrukt dat lokale overheden geen grotere legitimiteit bezitten dan de centrale overheid om misbruik te maken van individuele vrijheden. Het echte liberale doel is het overdragen van functies aan particuliere activiteiten, vrije associatie en ondernemerschap - niet simpelweg het verplaatsen ervan van het ene naar het andere overheidsniveau. Dit onderscheid is cruciaal omdat het laat zien dat het probleem niet de omvang van de overheidsbemoeienis is, maar het principe van dwingende staatsbemoeienis zelf wanneer het verder gaat dan noodzakelijke functies zoals rechtspraak en defensie.
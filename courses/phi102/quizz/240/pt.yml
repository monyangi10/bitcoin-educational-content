question: De acordo com a teoria política liberal, qual é o problema mais significativo da transferência de funções do Estado para os governos locais em vez de para entidades privadas?
answer: Os governos locais não têm maior legitimidade do que o governo central para intervir de forma a violar as liberdades fundamentais individuais
wrong_answers:
  - As administrações locais são inerentemente menos eficientes do que a administração central devido a economias de escala mais pequenas
  - Os governos locais criam problemas de coordenação que impossibilitam a implementação de políticas nacionais em diferentes regiões
  - As autarquias locais não dispõem das competências técnicas e dos recursos necessários para gerir eficazmente serviços públicos complexos
explanation: |
  O pensamento liberal rejeita fundamentalmente a descentralização como uma solução adequada, porque se limita a deslocar a localização do poder ilegítimo, em vez de abordar a questão central do excesso de poder do Estado. O texto sublinha que os governos locais não possuem maior legitimidade do que o governo central para intervir abusivamente contra as liberdades individuais. O verdadeiro objetivo liberal é transferir funções para a atividade privada, a livre associação e a empresa - e não simplesmente transferi-las de um nível de governo para outro. Esta distinção é crucial porque revela que o problema não é a escala da intervenção governamental, mas o princípio da ação coerciva do Estado quando se estende para além das funções necessárias como a justiça e a defesa.
question: Согласно либеральной политической теории, что представляет собой наиболее серьезную проблему при передаче государственных функций местным органам власти, а не частным структурам?
answer: Местные органы власти не обладают большей легитимностью, чем центральное правительство, чтобы вмешиваться в дела, нарушающие основные свободы личности
wrong_answers:
  - Местные органы власти по своей сути менее эффективны, чем центральные, из-за меньшего эффекта масштаба
  - Местные органы власти создают проблемы координации, которые делают невозможным проведение национальной политики в разных регионах
  - Местным органам власти не хватает технических знаний и ресурсов, необходимых для эффективного управления сложными государственными услугами
explanation: |
  Либеральная мысль в корне отвергает децентрализацию как адекватное решение, поскольку она лишь переносит местоположение нелегитимной власти, а не решает основную проблему - чрезмерное влияние государства. В тексте подчеркивается, что местные органы власти обладают не большей легитимностью, чем центральное правительство, чтобы злоупотреблять индивидуальными свободами. Истинная либеральная цель заключается в передаче функций частной деятельности, свободным ассоциациям и предпринимательству, а не в простом переносе их с одного уровня власти на другой. Это различие крайне важно, поскольку оно показывает, что проблема заключается не в масштабах государственного вмешательства, а в самом принципе принудительных действий государства, когда они выходят за рамки таких необходимых функций, как правосудие и оборона.
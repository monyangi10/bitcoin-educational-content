question: Kulingana na nadharia ya siasa huria, ni nini kinachowakilisha tatizo kubwa zaidi la kuhamisha kazi za serikali kwa serikali za mitaa badala ya vyombo vya kibinafsi?
answer: Serikali za mitaa hazina uhalali mkubwa kuliko serikali kuu kuingilia kati kwa njia zinazokiuka uhuru wa msingi wa mtu binafsi
wrong_answers:
  - Serikali za mitaa kwa asili hazina ufanisi mkubwa kuliko serikali kuu kutokana na uchumi mdogo wa kiwango cha juu.
  - Serikali za mitaa huunda matatizo ya uratibu ambayo hufanya utekelezaji wa sera za kitaifa usiwezekane katika maeneo tofauti
  - Serikali za mitaa hazina utaalamu wa kiufundi na rasilimali zinazohitajika ili kusimamia huduma tata za umma kwa ufanisi
explanation: |
  Mawazo ya kiliberali kimsingi yanakataa ugatuzi kama suluhisho la kutosha kwa sababu hubadilisha tu eneo la mamlaka haramu badala ya kushughulikia suala kuu la ukandamizaji wa serikali. Maandishi hayo yanasisitiza kwamba serikali za mitaa hazina uhalali mkubwa kuliko serikali kuu kuingilia kati kwa njia isiyofaa dhidi ya uhuru wa mtu binafsi. Lengo la kweli la kiliberali ni kuhamisha kazi hadi shughuli za kibinafsi, chama huru, na biashara - sio kuzihamisha tu kutoka ngazi moja ya serikali hadi nyingine. Tofauti hii ni muhimu kwa sababu inaonyesha kwamba tatizo si ukubwa wa uingiliaji kati wa serikali, bali ni kanuni ya hatua za kulazimisha serikali zenyewe zinapozidi majukumu muhimu kama vile haki na ulinzi.
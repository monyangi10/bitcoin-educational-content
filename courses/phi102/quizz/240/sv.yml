question: Vilket är enligt liberal politisk teori det största problemet med att överföra statliga funktioner till lokala myndigheter i stället för till privata enheter?
answer: Lokala myndigheter saknar större legitimitet än centralregeringen att ingripa på sätt som kränker individens grundläggande friheter
wrong_answers:
  - Lokala myndigheter är till sin natur mindre effektiva än centrala myndigheter på grund av mindre stordriftsfördelar
  - Lokala myndigheter skapar samordningsproblem som gör det omöjligt att genomföra nationell politik i olika regioner
  - Lokala myndigheter saknar den tekniska expertis och de resurser som krävs för att hantera komplexa offentliga tjänster på ett effektivt sätt
explanation: |
  Liberalt tänkande avvisar i grunden decentralisering som en lämplig lösning eftersom den bara flyttar den illegitima maktens plats i stället för att ta itu med kärnfrågan om statens övergrepp. I texten betonas att lokala myndigheter inte har större legitimitet än centralregeringen att ingripa på ett otillbörligt sätt mot individuella friheter. Det verkligt liberala målet är att överföra funktioner till privat verksamhet, föreningsfrihet och företagande - inte bara att flytta dem från en myndighetsnivå till en annan. Denna distinktion är avgörande eftersom den avslöjar att problemet inte är omfattningen av statliga ingripanden, utan själva principen om statliga tvångsåtgärder när de sträcker sig bortom nödvändiga funktioner som rättvisa och försvar.
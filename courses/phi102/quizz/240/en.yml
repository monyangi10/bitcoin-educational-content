question: According to liberal political theory, what represents the most significant problem with transferring state functions to local governments rather than to private entities?
answer: Local governments lack greater legitimacy than central government to intervene in ways that violate individual fundamental freedoms
wrong_answers:
  - Local governments are inherently less efficient than central government due to smaller economies of scale
  - Local governments create coordination problems that make national policy implementation impossible across different regions
  - Local governments lack the technical expertise and resources necessary to manage complex public services effectively
explanation: |
  Liberal thought fundamentally rejects decentralization as an adequate solution because it merely shifts the location of illegitimate power rather than addressing the core issue of state overreach. The text emphasizes that local governments possess no greater legitimacy than central government to intervene abusively against individual liberties. The true liberal objective is transferring functions to private activity, free association, and enterprise - not simply moving them from one level of government to another. This distinction is crucial because it reveals that the problem isn't the scale of government intervention, but the principle of coercive state action itself when it extends beyond necessary functions like justice and defense.

question: ตามทฤษฎีการเมืองเสรีนิยม ปัญหาที่สำคัญที่สุดในการโอนหน้าที่ของรัฐไปยังรัฐบาลท้องถิ่นแทนที่จะเป็นหน่วยงานเอกชนคืออะไร?
answer: รัฐบาลท้องถิ่นขาดความชอบธรรมมากกว่ารัฐบาลกลางในการแทรกแซงในลักษณะที่ละเมิดเสรีภาพขั้นพื้นฐานของบุคคล
wrong_answers:
  - รัฐบาลท้องถิ่นมีประสิทธิภาพน้อยกว่ารัฐบาลกลางโดยเนื้อแท้เนื่องจากขนาดเศรษฐกิจที่เล็กกว่า
  - รัฐบาลท้องถิ่นสร้างปัญหาการประสานงานที่ทำให้การดำเนินนโยบายระดับชาติเป็นไปไม่ได้ในแต่ละภูมิภาค
  - รัฐบาลท้องถิ่นขาดความเชี่ยวชาญทางเทคนิคและทรัพยากรที่จำเป็นในการจัดการบริการสาธารณะที่ซับซ้อนได้อย่างมีประสิทธิภาพ
explanation: |
  แนวคิดเสรีนิยมปฏิเสธการกระจายอำนาจว่าเป็นทางออกที่เพียงพอ เพราะมันเพียงแค่ย้ายตำแหน่งของอำนาจที่ไม่ชอบธรรมแทนที่จะจัดการกับปัญหาหลักของการล่วงเกินของรัฐ ข้อความนี้เน้นว่ารัฐบาลท้องถิ่นไม่มีความชอบธรรมมากกว่ารัฐบาลกลางในการแทรกแซงอย่างไม่เหมาะสมต่อเสรีภาพส่วนบุคคล วัตถุประสงค์ที่แท้จริงของเสรีนิยมคือการถ่ายโอนหน้าที่ไปสู่กิจกรรมส่วนตัว การรวมกลุ่มอย่างเสรี และการประกอบการ - ไม่ใช่เพียงแค่การย้ายจากระดับหนึ่งของรัฐบาลไปยังอีกระดับหนึ่ง ความแตกต่างนี้มีความสำคัญเพราะมันเผยให้เห็นว่าปัญหาไม่ใช่ขนาดของการแทรกแซงของรัฐบาล แต่เป็นหลักการของการกระทำที่บังคับของรัฐเองเมื่อมันขยายเกินหน้าที่ที่จำเป็นเช่นความยุติธรรมและการป้องกันประเทศ
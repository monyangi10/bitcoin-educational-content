question: Według liberalnej teorii politycznej, co stanowi największy problem z przekazywaniem funkcji państwowych samorządom lokalnym, a nie podmiotom prywatnym?
answer: Władze lokalne nie mają większej legitymacji niż rząd centralny do interweniowania w sposób naruszający podstawowe wolności jednostki
wrong_answers:
  - Samorządy lokalne są z natury mniej wydajne niż rząd centralny ze względu na mniejsze korzyści skali
  - Samorządy lokalne stwarzają problemy z koordynacją, które uniemożliwiają wdrażanie polityki krajowej w różnych regionach
  - Samorządom lokalnym brakuje specjalistycznej wiedzy technicznej i zasobów niezbędnych do skutecznego zarządzania złożonymi usługami publicznymi
explanation: |
  Myśl liberalna zasadniczo odrzuca decentralizację jako adekwatne rozwiązanie, ponieważ przesuwa ona jedynie lokalizację nielegalnej władzy, zamiast zajmować się podstawową kwestią, jaką jest nadmierna władza państwa. Tekst podkreśla, że władze lokalne nie mają większej legitymacji niż rząd centralny do nadużywania wolności jednostki. Prawdziwym liberalnym celem jest przeniesienie funkcji na działalność prywatną, wolne stowarzyszenia i przedsiębiorczość - a nie tylko przeniesienie ich z jednego poziomu rządu na drugi. To rozróżnienie jest kluczowe, ponieważ ujawnia, że problemem nie jest skala interwencji rządu, ale sama zasada przymusowych działań państwa, gdy wykraczają one poza niezbędne funkcje, takie jak wymiar sprawiedliwości i obrona.
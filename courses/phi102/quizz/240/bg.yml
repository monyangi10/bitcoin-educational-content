question: Според либералната политическа теория кой е най-същественият проблем при прехвърлянето на държавни функции на местните власти, а не на частни субекти?
answer: Местните власти нямат по-голяма легитимност от централното правителство да се намесват по начини, които нарушават основните свободи на личността
wrong_answers:
  - Местните власти по своята същност са по-неефективни от централното правителство поради по-малките икономии от мащаба
  - Местните власти създават проблеми с координацията, които правят невъзможно прилагането на националната политика в различните региони
  - Местните власти не разполагат с техническия опит и ресурсите, необходими за ефективното управление на сложни обществени услуги
explanation: |
  Либералната мисъл по принцип отхвърля децентрализацията като адекватно решение, тъй като тя просто премества мястото на незаконната власт, а не решава основния проблем с прекомерната власт на държавата. В текста се подчертава, че местните власти не притежават по-голяма легитимност от централната власт да се намесват неправомерно срещу индивидуалните свободи. Истинската либерална цел е прехвърлянето на функции към частната дейност, свободното сдружаване и предприемачеството - а не просто преместването им от едно ниво на управление на друго. Това разграничение е от решаващо значение, защото разкрива, че проблемът не е в мащаба на правителствената намеса, а в самия принцип на принудителните действия на държавата, когато те се простират отвъд необходимите функции като правосъдие и отбрана.
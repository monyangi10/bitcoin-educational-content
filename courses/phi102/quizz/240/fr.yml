question: Selon la théorie politique libérale, quel est le problème le plus important que pose le transfert des fonctions de l'État aux collectivités locales plutôt qu'à des entités privées ?
answer: Les gouvernements locaux n'ont pas une plus grande légitimité que le gouvernement central pour intervenir d'une manière qui viole les libertés fondamentales des individus
wrong_answers:
  - Les gouvernements locaux sont par nature moins efficaces que les gouvernements centraux en raison d'économies d'échelle moindres
  - Les gouvernements locaux créent des problèmes de coordination qui rendent impossible la mise en œuvre des politiques nationales dans les différentes régions
  - Les collectivités locales ne disposent pas de l'expertise technique et des ressources nécessaires pour gérer efficacement des services publics complexes
explanation: |
  La pensée libérale rejette fondamentalement la décentralisation comme une solution adéquate parce qu'elle ne fait que déplacer la localisation du pouvoir illégitime au lieu de s'attaquer au problème central de l'excès de pouvoir de l'État. Le texte souligne que les gouvernements locaux n'ont pas plus de légitimité que le gouvernement central pour intervenir abusivement contre les libertés individuelles. Le véritable objectif libéral est de transférer des fonctions à l'activité privée, à la libre association et à l'entreprise — et non pas simplement de les déplacer d'un niveau de gouvernement à un autre. Cette distinction est cruciale, car elle révèle que le problème n'est pas l'ampleur de l'intervention gouvernementale, mais le principe même de l'action coercitive de l'État lorsqu'elle s'étend au-delà des fonctions nécessaires telles que la justice et la défense.

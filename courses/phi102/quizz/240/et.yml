question: Milline on liberaalse poliitilise teooria kohaselt kõige suurem probleem, kui riigi funktsioonid antakse üle kohalikele omavalitsustele, mitte eraõiguslikele üksustele?
answer: Kohalikel omavalitsustel puudub keskvalitsusest suurem legitiimsus sekkuda viisil, mis rikub üksikisiku põhivabadusi
wrong_answers:
  - Kohalikud omavalitsused on väiksema mastaabisäästu tõttu olemuslikult vähem tõhusad kui keskvalitsus
  - Kohalikud omavalitsused tekitavad koordineerimisprobleeme, mis muudavad riikliku poliitika rakendamise erinevates piirkondades võimatuks
  - Kohalikel omavalitsustel puuduvad tehnilised teadmised ja ressursid, mis on vajalikud keeruliste avalike teenuste tõhusaks haldamiseks
explanation: |
  Liberaalne mõtteviis lükkab detsentraliseerimise kui adekvaatse lahenduse põhimõtteliselt tagasi, sest see üksnes nihutab ebaseadusliku võimu asukoha, mitte ei lahenda riigi ülemvõimu põhiprobleemi. Tekstis rõhutatakse, et kohalikel omavalitsustel ei ole keskvalitsusest suuremat legitiimsust kui keskvalitsusel, et sekkuda kuritarvitavalt üksikisiku vabaduste vastu. Tõeline liberaalne eesmärk on funktsioonide üleandmine eraõiguslikule tegevusele, vabale ühinemisele ja ettevõtlusele - mitte lihtsalt nende üleviimine ühelt valitsustasandilt teisele. See eristamine on oluline, sest see näitab, et probleem ei ole mitte valitsuse sekkumise ulatus, vaid riigi sunniviisilise tegevuse põhimõte ise, kui see ulatub vajalikest funktsioonidest, nagu õigusemõistmine ja kaitse, kaugemale.
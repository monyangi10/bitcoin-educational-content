question: 根据自由主义政治理论，将国家职能移交给地方政府而非私营实体的最大问题是什么？
answer: 与中央政府相比，地方政府缺乏更大的合法性，无法以侵犯个人基本自由的方式进行干预
wrong_answers:
  - 由于规模经济较小，地方政府的效率本来就低于中央政府
  - 地方政府造成协调问题，使国家政策无法在不同地区实施
  - 地方政府缺乏有效管理复杂公共服务所需的技术专长和资源
explanation: |
  自由主义思想从根本上反对将权力下放作为适当的解决方案，因为它只是转移了非法权力的位置，而不是解决国家越权的核心问题。文中强调，地方政府并不比中央政府拥有更大的合法性来滥用权力干预个人自由。真正的自由主义目标是将职能转移给私人活动、自由结社和企业，而不是简单地将职能从一级政府转移到另一级政府。这一区别至关重要，因为它揭示了问题不在于政府干预的规模，而在于国家强制行动的原则本身，当它超出了司法和国防等必要职能时。
question: Liberal siyaset teorisine göre, devlet işlevlerinin özel kuruluşlar yerine yerel yönetimlere devredilmesindeki en önemli sorun nedir?
answer: Yerel yönetimler, bireysel temel özgürlükleri ihlal edecek şekilde müdahalede bulunma konusunda merkezi hükümetten daha fazla meşruiyete sahip değildir
wrong_answers:
  - Yerel yönetimler, ölçek ekonomilerinin daha küçük olması nedeniyle merkezi yönetime göre doğal olarak daha az verimlidir
  - Yerel yönetimler, ulusal politikaların farklı bölgelerde uygulanmasını imkansız hale getiren koordinasyon sorunları yaratmaktadır
  - Yerel yönetimler karmaşık kamu hizmetlerini etkin bir şekilde yönetmek için gerekli teknik uzmanlık ve kaynaklardan yoksundur
explanation: |
  Liberal düşünce, adem-i merkeziyetçiliği yeterli bir çözüm olarak temelden reddeder, çünkü devletin aşırıya kaçması temel sorununu ele almak yerine sadece gayrimeşru gücün yerini değiştirir. Metin, yerel yönetimlerin bireysel özgürlüklere karşı kötü niyetle müdahale etme konusunda merkezi hükümetten daha fazla meşruiyete sahip olmadığını vurgulamaktadır. Gerçek liberal amaç, işlevleri özel faaliyetlere, serbest örgütlenmeye ve girişime devretmektir - bunları sadece bir hükümet düzeyinden diğerine taşımak değil. Bu ayrım çok önemlidir çünkü sorunun hükümet müdahalesinin ölçeği değil, adalet ve savunma gibi gerekli işlevlerin ötesine geçtiğinde zorlayıcı devlet eylemi ilkesinin kendisi olduğunu ortaya koymaktadır.
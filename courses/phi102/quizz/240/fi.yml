question: Mikä on liberaalin poliittisen teorian mukaan merkittävin ongelma siinä, että valtion tehtäviä siirretään yksityisten tahojen sijasta paikallisille hallintoelimille?
answer: Paikallishallinnolla ei ole keskushallintoa suurempaa legitimiteettiä puuttua asioihin, jotka loukkaavat yksilön perusvapauksia
wrong_answers:
  - Paikallishallinto on luonnostaan tehottomampi kuin keskushallinto, koska mittakaavaedut ovat pienemmät
  - Paikallishallinnot aiheuttavat koordinointiongelmia, jotka tekevät kansallisen politiikan toteuttamisen mahdottomaksi eri alueilla
  - Paikallishallinnolta puuttuu teknistä asiantuntemusta ja resursseja, joita tarvitaan monitahoisten julkisten palvelujen tehokkaaseen hallinnointiin
explanation: |
  Liberaalinen ajattelu hylkää hajauttamisen asianmukaisena ratkaisuna, koska se vain siirtää laittoman vallan sijaintia sen sijaan, että se puuttuisi valtion liiallisen vallan käytön ydinkysymykseen. Tekstissä korostetaan, että paikallishallinnolla ei ole keskushallintoa suurempaa oikeutusta puuttua väärin perustein yksilönvapauksiin. Todellinen liberaali tavoite on siirtää toimintoja yksityiselle toiminnalle, vapaalle yhdistymiselle ja yrittäjyydelle - ei vain siirtää niitä hallinnon tasolta toiselle. Tämä erottelu on ratkaiseva, koska se paljastaa, että ongelma ei ole hallituksen väliintulon laajuus vaan itse valtion pakkotoiminnan periaate, kun se ulottuu oikeuden ja puolustuksen kaltaisten välttämättömien toimintojen ulkopuolelle.
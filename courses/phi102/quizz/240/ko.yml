question: 자유주의 정치 이론에 따르면, 국가 기능을 민간 기관이 아닌 지방 정부로 이양할 때 가장 큰 문제점은 무엇인가요?
answer: 지방 정부는 중앙 정부보다 개인의 기본적 자유를 침해하는 방식으로 개입할 수 있는 정당성이 부족합니다
wrong_answers:
  - 지방 정부는 규모의 경제가 작기 때문에 본질적으로 중앙 정부보다 효율성이 떨어집니다
  - 지방 정부는 여러 지역에 걸쳐 국가 정책 시행을 불가능하게 만드는 조정 문제를 야기합니다
  - 지방 정부는 복잡한 공공 서비스를 효과적으로 관리하는 데 필요한 기술 전문 지식과 리소스가 부족합니다
explanation: |
  자유주의 사상은 근본적으로 분권화를 적절한 해결책으로 거부하는데, 이는 분권화가 국가의 과도한 권한이라는 핵심 문제를 해결하기보다는 불법적인 권력의 위치를 옮기는 것에 불과하기 때문입니다. 이 글은 지방 정부가 중앙 정부보다 개인의 자유에 과도하게 개입할 수 있는 정당성을 갖지 못한다는 점을 강조합니다. 진정한 자유주의의 목표는 기능을 단순히 한 수준의 정부에서 다른 수준으로 옮기는 것이 아니라 사적 활동, 자유로운 결사, 기업에 이양하는 것입니다. 이러한 구분은 정부의 개입 규모가 문제가 아니라 사법 및 국방과 같은 필수 기능을 넘어서는 강압적 국가 행동의 원칙 자체가 문제라는 점을 드러내기 때문에 매우 중요합니다.
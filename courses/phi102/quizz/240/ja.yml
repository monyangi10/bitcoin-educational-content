question: リベラル派の政治理論によれば、国家機能を民間団体ではなく地方自治体に移管することの最も大きな問題点は何か？
answer: 地方政府は中央政府よりも、個人の基本的自由を侵害するような方法で介入する正当性を欠いている。
wrong_answers:
  - 地方自治体は規模の経済が小さいため、中央政府よりも本質的に効率が悪い。
  - 地方政府は、異なる地域間で国の政策実施を不可能にする調整問題を引き起こす。
  - 地方自治体には、複雑な公共サービスを効果的に管理するために必要な技術的専門知識や資源が不足している。
explanation: |
  自由主義思想は、地方分権が適切な解決策であることを根本的に否定している。なぜなら、地方分権は国家の行き過ぎという核心的な問題に対処するのではなく、非合法な権力の所在を移すだけだからである。この文章は、地方政府が個人の自由に対して乱暴な介入を行う正当性を中央政府ほど持っていないことを強調している。真のリベラルの目的は、私的活動、自由な結社、企業に機能を移すことであり、単に政府のあるレベルから別のレベルに移すことではない。この区別は、政府の介入の規模が問題なのではなく、司法や防衛のような必要な機能を超えた強制的な国家行動原理そのものが問題なのだということを明らかにするものであり、極めて重要である。
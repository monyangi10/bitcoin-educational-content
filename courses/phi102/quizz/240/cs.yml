question: Co podle liberální politické teorie představuje nejvýznamnější problém při převodu funkcí státu na místní samosprávy namísto na soukromé subjekty?
answer: Místní samosprávy nemají větší legitimitu k zásahům, které porušují základní svobody jednotlivce, než centrální vláda
wrong_answers:
  - Místní samosprávy jsou ze své podstaty méně efektivní než ústřední orgány státní správy kvůli menším úsporám z rozsahu
  - Místní samosprávy vytvářejí problémy s koordinací, které znemožňují provádění národní politiky v různých regionech
  - Místní samosprávy nemají dostatečné technické znalosti a zdroje potřebné k efektivnímu řízení komplexních veřejných služeb
explanation: |
  Liberální myšlení zásadně odmítá decentralizaci jako adekvátní řešení, protože pouze přesouvá umístění nelegitimní moci, místo aby řešila hlavní problém nadměrné moci státu. V textu se zdůrazňuje, že místní vlády nemají větší legitimitu než vláda centrální k tomu, aby zneužívajícím způsobem zasahovaly proti svobodám jednotlivců. Skutečným liberálním cílem je přenesení funkcí na soukromé aktivity, svobodné sdružování a podnikání - nikoliv pouhé přesunutí z jedné úrovně vlády na druhou. Toto rozlišení je zásadní, protože odhaluje, že problémem není rozsah vládních zásahů, ale samotný princip donucovací činnosti státu, pokud přesahuje rámec nezbytných funkcí, jako je spravedlnost a obrana.
question: 根據自由主義政治理論，將國家職能轉移給地方政府而非私人實體的最大問題是什麼？
answer: 地方政府比中央政府缺乏更大的合法性，無法以侵犯個人基本自由的方式進行干預
wrong_answers:
  - 由於規模經濟規模較小，地方政府在本質上不如中央政府有效率
  - 地方政府造成協調問題，使國家政策無法在不同地區執行
  - 地方政府缺乏有效管理複雜公共服務所需的技術專業知識和資源
explanation: |
  自由主義思想從根本上拒絕將分權作為充分的解決方案，因為它只是轉移非法權力的位置，而不是解決國家越權的核心問題。文中強調，地方政府並不比中央政府擁有更大的合法性來對個人自由進行濫權干預。真正的自由主義目標是將功能轉移給私人活動、自由結社和企業，而不只是將它們從一層政府移到另一層政府。這個區別非常重要，因為它揭示了問題不在於政府干預的規模，而在於強制國家行動本身的原則，當它超越了司法和國防等必要的功能時。
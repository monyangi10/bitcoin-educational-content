question: Secondo la teoria politica liberale, qual è il problema più significativo del trasferimento di funzioni statali ai governi locali piuttosto che a entità private?
answer: I governi locali non sono più legittimati del governo centrale a intervenire in modi che violano le libertà fondamentali dell'individuo
wrong_answers:
  - Le amministrazioni locali sono intrinsecamente meno efficienti di quelle centrali a causa delle minori economie di scala
  - I governi locali creano problemi di coordinamento che rendono impossibile l'attuazione delle politiche nazionali nelle diverse regioni
  - Le amministrazioni locali non dispongono delle competenze tecniche e delle risorse necessarie per gestire efficacemente servizi pubblici complessi
explanation: |
  Il pensiero liberale rifiuta fondamentalmente il decentramento come soluzione adeguata, perché si limita a spostare la sede del potere illegittimo piuttosto che affrontare il problema centrale dell'eccesso di potere da parte dello Stato. Il testo sottolinea che i governi locali non sono più legittimati del governo centrale a intervenire abusivamente contro le libertà individuali. Il vero obiettivo liberale è trasferire le funzioni all'attività privata, alla libera associazione e all'impresa, non semplicemente spostarle da un livello di governo a un altro. Questa distinzione è cruciale perché rivela che il problema non è la portata dell'intervento governativo, ma il principio stesso dell'azione coercitiva dello Stato quando si estende oltre le funzioni necessarie come la giustizia e la difesa.
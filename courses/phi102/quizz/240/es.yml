question: Según la teoría política liberal, ¿cuál es el problema más importante de transferir funciones estatales a los gobiernos locales en lugar de a entidades privadas?
answer: Los gobiernos locales carecen de mayor legitimidad que el gobierno central para intervenir de forma que se violen las libertades fundamentales individuales
wrong_answers:
  - Los gobiernos locales son intrínsecamente menos eficientes que el gobierno central debido a las menores economías de escala
  - Los gobiernos locales crean problemas de coordinación que imposibilitan la aplicación de las políticas nacionales en las distintas regiones
  - Los gobiernos locales carecen de los conocimientos técnicos y los recursos necesarios para gestionar eficazmente servicios públicos complejos
explanation: |
  El pensamiento liberal rechaza fundamentalmente la descentralización como solución adecuada porque se limita a desplazar la ubicación del poder ilegítimo en lugar de abordar la cuestión central de la extralimitación del Estado. El texto subraya que los gobiernos locales no poseen mayor legitimidad que el gobierno central para intervenir abusivamente contra las libertades individuales. El verdadero objetivo liberal es transferir funciones a la actividad privada, la libre asociación y la empresa, no simplemente trasladarlas de un nivel de gobierno a otro. Esta distinción es crucial porque revela que el problema no es la escala de la intervención gubernamental, sino el propio principio de la acción coercitiva del Estado cuando se extiende más allá de funciones necesarias como la justicia y la defensa.
question: Menurut teori politik liberal, apa yang menjadi masalah paling signifikan dalam mengalihkan fungsi-fungsi negara kepada pemerintah daerah daripada kepada entitas swasta?
answer: Pemerintah daerah tidak memiliki legitimasi yang lebih besar daripada pemerintah pusat untuk melakukan intervensi dengan cara-cara yang melanggar kebebasan fundamental individu
wrong_answers:
  - Pemerintah daerah pada dasarnya kurang efisien dibandingkan pemerintah pusat karena skala ekonomi yang lebih kecil
  - Pemerintah daerah menciptakan masalah koordinasi yang membuat implementasi kebijakan nasional menjadi tidak mungkin dilakukan di berbagai daerah
  - Pemerintah daerah tidak memiliki keahlian teknis dan sumber daya yang diperlukan untuk mengelola layanan publik yang kompleks secara efektif
explanation: |
  Pemikiran liberal pada dasarnya menolak desentralisasi sebagai solusi yang memadai karena desentralisasi hanya memindahkan lokasi kekuasaan yang tidak sah dan bukannya mengatasi masalah inti dari jangkauan negara yang berlebihan. Teks ini menekankan bahwa pemerintah daerah tidak memiliki legitimasi yang lebih besar daripada pemerintah pusat untuk melakukan intervensi secara sewenang-wenang terhadap kebebasan individu. Tujuan liberal yang sebenarnya adalah mengalihkan fungsi-fungsi kepada aktivitas swasta, asosiasi bebas, dan perusahaan - tidak hanya memindahkannya dari satu tingkat pemerintahan ke tingkat yang lain. Perbedaan ini sangat penting karena menunjukkan bahwa masalahnya bukan pada skala intervensi pemerintah, tetapi pada prinsip tindakan koersif negara itu sendiri ketika melampaui fungsi-fungsi yang diperlukan seperti keadilan dan pertahanan.
question: Was ist nach der liberalen politischen Theorie das größte Problem bei der Übertragung staatlicher Aufgaben auf lokale Regierungen statt auf private Einrichtungen?
answer: Lokale Regierungen haben keine größere Legitimation als die Zentralregierung, in einer Weise einzugreifen, die die individuellen Grundfreiheiten verletzt
wrong_answers:
  - Lokale Verwaltungen sind von Natur aus weniger effizient als zentrale Verwaltungen, da sie weniger Größenvorteile haben
  - Lokale Regierungen schaffen Koordinierungsprobleme, die die Umsetzung der nationalen Politik in verschiedenen Regionen unmöglich machen
  - Den Kommunalverwaltungen fehlt es an technischem Fachwissen und Ressourcen, um komplexe öffentliche Dienstleistungen effizient zu verwalten
explanation: |
  Der liberale Gedanke lehnt die Dezentralisierung als angemessene Lösung grundsätzlich ab, da sie lediglich den Ort illegitimer Macht verlagert, anstatt das Kernproblem staatlicher Übergriffe anzugehen. Der Text betont, dass lokale Regierungen keine größere Legitimität als die Zentralregierung besitzen, um missbräuchlich in die individuellen Freiheiten einzugreifen. Das wahre liberale Ziel ist die Übertragung von Aufgaben auf private Aktivitäten, freie Vereinigungen und Unternehmen - und nicht einfach die Verlagerung dieser Aufgaben von einer Regierungsebene auf eine andere. Diese Unterscheidung ist von entscheidender Bedeutung, denn sie macht deutlich, dass das Problem nicht das Ausmaß staatlicher Eingriffe ist, sondern das Prinzip staatlicher Zwangsmaßnahmen selbst, wenn sie über notwendige Funktionen wie Justiz und Verteidigung hinausgehen.
question: بر اساس نظریه سیاسی لیبرال، مهم‌ترین مشکل انتقال وظایف دولتی به دولت‌های محلی به جای نهادهای خصوصی چیست؟
answer: دولت‌های محلی مشروعیت بیشتری نسبت به دولت مرکزی برای مداخله به روش‌هایی که آزادی‌های اساسی فردی را نقض می‌کنند، ندارند.
wrong_answers:
  - دولت‌های محلی ذاتاً به دلیل مقیاس‌های اقتصادی کوچکتر، کارایی کمتری نسبت به دولت مرکزی دارند.
  - دولت‌های محلی مشکلات هماهنگی ایجاد می‌کنند که اجرای سیاست‌های ملی را در مناطق مختلف غیرممکن می‌سازد.
  - دولت‌های محلی فاقد تخصص فنی و منابع لازم برای مدیریت مؤثر خدمات عمومی پیچیده هستند
explanation: |
  اندیشه لیبرال به طور اساسی تمرکززدایی را به عنوان یک راه‌حل مناسب رد می‌کند زیرا این کار تنها مکان قدرت نامشروع را تغییر می‌دهد و به مسئله اصلی تجاوز دولت نمی‌پردازد. متن تأکید می‌کند که دولت‌های محلی هیچ مشروعیت بیشتری نسبت به دولت مرکزی برای مداخله سوءاستفاده‌گرانه علیه آزادی‌های فردی ندارند. هدف واقعی لیبرال انتقال وظایف به فعالیت‌های خصوصی، انجمن‌های آزاد و کسب‌وکار است - نه صرفاً انتقال آن‌ها از یک سطح دولت به سطح دیگر. این تمایز حیاتی است زیرا نشان می‌دهد که مشکل مقیاس مداخله دولت نیست، بلکه اصل اقدام اجباری دولت است که وقتی فراتر از وظایف ضروری مانند عدالت و دفاع گسترش می‌یابد، مشکل‌ساز می‌شود.
question: Hva er, ifølge liberal politisk teori, det største problemet med å overføre statlige oppgaver til lokale myndigheter i stedet for til private aktører?
answer: Lokale myndigheter har ikke større legitimitet enn sentrale myndigheter til å gripe inn på måter som krenker individets grunnleggende friheter
wrong_answers:
  - Lokale myndigheter er i utgangspunktet mindre effektive enn sentrale myndigheter på grunn av mindre stordriftsfordeler
  - Lokale myndigheter skaper koordineringsproblemer som gjør det umulig å gjennomføre nasjonal politikk på tvers av ulike regioner
  - Lokale myndigheter mangler den tekniske ekspertisen og de ressursene som er nødvendige for å forvalte komplekse offentlige tjenester på en effektiv måte
explanation: |
  Liberal tenkning avviser desentralisering som en adekvat løsning fordi den bare flytter den illegitime maktens plassering i stedet for å ta tak i kjerneproblemet med statlig overstyring. Teksten understreker at lokale myndigheter ikke har større legitimitet enn sentrale myndigheter til å gripe inn mot individuelle friheter på en utilbørlig måte. Det sanne liberale målet er å overføre funksjoner til privat aktivitet, frie sammenslutninger og foretak - ikke bare å flytte dem fra ett forvaltningsnivå til et annet. Denne distinksjonen er avgjørende fordi den avslører at problemet ikke er omfanget av statlig inngripen, men selve prinsippet om statlig tvangsinngripen når den går ut over nødvendige funksjoner som rettsvesen og forsvar.
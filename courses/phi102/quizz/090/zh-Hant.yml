question: 在中世紀，自由競爭的主要問題是什麼？
answer: 當地生產者，如麵包師，擁有保留市場，對消費者造成支配。
wrong_answers:
  - 運輸成本過高，競爭無利可圖
  - 宗教當局禁止商人之間的商業競爭
  - 農業技術不足以支援多個互相競爭的生產者
explanation: |
  根據文中所述，在中世紀時期，自由競爭似乎並不實際，因為生產者是在孤立的地方市場中運作。所舉的例子是一個小鎮的麵包師，他有一個保留市場，這造成了生產者支配消費者的情況，而不是為了更好地服務消費者而競爭。這種情況在 18 世紀發生了變化，因為全球商業的發展，打破了這些地方性的壟斷，創造了真正的競爭，讓消費者可以透過更佳的價格和品質而受惠，使得自由貿易變得實際可行。
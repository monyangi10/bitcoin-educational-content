question: Mis oli keskajal vaba konkurentsi peamine probleem, mis muutis selle ebapraktiliseks?
answer: Kohalikud tootjad, näiteks pagarid, olid reserveeritud turgudel, mis tekitasid tarbijate üle domineerimise
wrong_answers:
  - Transpordikulud olid liiga kõrged, et konkurents oleks olnud kasumlik
  - Religioossed võimud keelasid kaupmeeste vahelise kaubandusliku konkurentsi
  - Põllumajandustehnoloogia ei olnud piisav, et toetada mitut konkureerivat tootjat
explanation: |
  Teksti kohaselt tundus keskajal vaba konkurents ebapraktiline, sest tootjad tegutsesid isoleeritud kohalikel turgudel. Näitena tuuakse näide väikelinna pagarist, kellel oli reserveeritud turg, mis tekitas olukorra, kus tootjad domineerisid tarbijate üle, selle asemel et konkureerida nende paremaks teenindamiseks. See muutus 18. sajandil, kui tekkis ülemaailmne kaubandus, mis muutis vabakaubanduse praktiliseks, purustades need kohalikud monopolid ja luues tõelise konkurentsi, mis tõi tarbijatele kasu parema hinna ja kvaliteedi kaudu.
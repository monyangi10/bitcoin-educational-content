question: Ortaçağda serbest rekabetin uygulanamaz görünmesine neden olan temel sorun neydi?
answer: Fırıncılar gibi yerel üreticiler, tüketiciler üzerinde hakimiyet kuran ayrılmış pazarlara sahipti
wrong_answers:
  - Nakliye maliyetleri rekabeti karlı hale getirmek için çok yüksekti
  - Dini makamlar tüccarlar arasında ticari rekabeti yasakladı
  - Tarımsal teknoloji birden fazla rakip üreticiyi desteklemek için yetersizdi
explanation: |
  Metne göre, ortaçağda serbest rekabet pratik görünmüyordu çünkü üreticiler izole edilmiş yerel pazarlarda faaliyet gösteriyordu. Verilen örnek, küçük bir kasabadaki fırıncının ayrılmış bir pazara sahip olması ve bunun da üreticilerin tüketicilere daha iyi hizmet vermek için rekabet etmek yerine onlara hükmettiği bir durum yaratmasıdır. Bu durum 18. yüzyılda küresel ticaretin gelişmesiyle değişmiş, bu yerel tekelleri yıkarak serbest ticareti pratik hale getirmiş ve daha iyi fiyatlar ve kalite yoluyla tüketicilere fayda sağlayan gerçek bir rekabet yaratmıştır.
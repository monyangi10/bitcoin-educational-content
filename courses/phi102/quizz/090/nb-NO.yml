question: Hva var hovedproblemet med fri konkurranse i middelalderen, som gjorde at den virket upraktisk?
answer: Lokale produsenter, som bakere, hadde reserverte markeder som skapte dominans over forbrukerne
wrong_answers:
  - Transportkostnadene var for høye til at det var lønnsomt å konkurrere
  - Religiøse myndigheter forbød kommersiell konkurranse mellom kjøpmenn
  - Landbruksteknologien var utilstrekkelig til å støtte flere konkurrerende produsenter
explanation: |
  Ifølge teksten virket fri konkurranse i middelalderen upraktisk fordi produsentene opererte i isolerte lokale markeder. Eksemplet som nevnes, er en baker i en liten by som hadde et avgrenset marked, noe som skapte en situasjon der produsentene dominerte forbrukerne i stedet for å konkurrere om å betjene dem bedre. Dette endret seg på 1700-tallet, da den globale handelen utviklet seg og gjorde frihandel praktisk mulig ved å bryte ned disse lokale monopolene og skape reell konkurranse som kom forbrukerne til gode i form av bedre priser og kvalitet.
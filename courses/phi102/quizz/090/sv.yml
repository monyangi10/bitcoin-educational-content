question: Vad var det största problemet med fri konkurrens på medeltiden som gjorde att den verkade opraktisk?
answer: Lokala producenter som bagerier hade reserverade marknader, vilket skapade dominans över konsumenterna
wrong_answers:
  - Transportkostnaderna var för höga för att konkurrens skulle vara lönsamt
  - Religiösa myndigheter förbjöd kommersiell konkurrens mellan köpmän
  - Jordbrukstekniken var otillräcklig för att stödja flera konkurrerande producenter
explanation: |
  Enligt texten verkade fri konkurrens under medeltiden vara opraktiskt eftersom producenterna verkade på isolerade lokala marknader. Det exempel som ges är en bagare i en liten stad som hade en reserverad marknad, vilket skapade en situation där producenterna dominerade konsumenterna i stället för att konkurrera om att betjäna dem bättre. Detta förändrades på 1700-talet när den globala handeln utvecklades, vilket gjorde frihandeln praktisk genom att bryta ner dessa lokala monopol och skapa verklig konkurrens som gynnade konsumenterna genom bättre priser och kvalitet.
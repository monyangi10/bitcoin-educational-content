question: Koji je bio glavni problem slobodne konkurencije u srednjem veku koji je činio da izgleda nepraktično?
answer: Lokalni proizvođači poput pekara imali su rezervisana tržišta stvarajući dominaciju nad potrošačima
wrong_answers:
  - Troškovi transporta bili su previsoki da bi konkurencija bila profitabilna.
  - Verske vlasti zabranile su komercijalnu konkurenciju između trgovaca
  - Poljoprivredna tehnologija nije bila dovoljna da podrži više konkurentskih proizvođača
explanation: |
  Prema tekstu, u srednjem veku slobodna konkurencija se činila nepraktičnom jer su proizvođači poslovali na izolovanim lokalnim tržištima. Dat je primer pekara u malom gradu koji je imao rezervisano tržište, što je stvorilo situaciju u kojoj su proizvođači dominirali potrošačima umesto da se takmiče kako bi im bolje služili. To se promenilo u 18. veku kada se razvila globalna trgovina, čineći slobodnu trgovinu praktičnom razbijanjem ovih lokalnih monopola i stvaranjem prave konkurencije koja je koristila potrošačima kroz bolje cene i kvalitet.
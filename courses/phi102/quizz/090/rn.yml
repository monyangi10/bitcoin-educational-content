question: Ni ikihe kibazo nyamukuru cari mu bihe vya kera co guhiganwa ku buntu catumye bisa n’ibidashoboka?
answer: Abahinguzi bo mu karere nk'abakora imikate bari bafise amasoko yihariye, ivyo bikaba vyatumye baganza abaguzi
wrong_answers:
  - Ibiciro vy'ugutwara abantu vyari vyinshi cane ku buryo amarushanwa yoshobora kuronka inyungu .
  - Abakuru b’idini barabujije uguhiganwa mu vy’ubudandaji hagati y’abadandaza .
  - Ubuhinga bwo mu buhinzi ntibwari buhagije kugira ngo bufashe abahinguzi benshi bariko barahiganwa .
explanation: |
  Dukurikije ico canditswe, mu bihe vya kera, uguhiganwa ku buntu vyasa n’ibidashoboka kubera ko abahinguzi bakorera mu masoko yo mu karere ari ukwayo. Akarorero katanzwe ni ak’umutetsi wo mu gisagara gitoyi yari afise isoko ry’ibintu vy’agaciro, ivyo bikaba vyatumye abahinguzi baganzwa n’abaguzi aho guhiganwa kugira ngo babakoreshe neza. Ivyo vyahindutse mu kinjana ca 18 igihe ubudandaji bwo kw’isi yose bwatera imbere, bituma ubudandaji bw’ubuntu buba ngirakamaro mu gusenyura ivyo bihugu vy’ubudandaji vy’aho hantu no gutuma haba uguhiganwa nyakuri kwagirira akamaro abaguzi biciye ku bici- ro vyiza no ku buryo bwiza.
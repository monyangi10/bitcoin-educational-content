question: 中世纪自由竞争的主要问题是什么？
answer: 面包师等本地生产商保留了市场，从而形成了对消费者的控制
wrong_answers:
  - 运输成本太高，竞争无利可图
  - 宗教当局禁止商人之间的商业竞争
  - 农业技术不足以支持多个相互竞争的生产者
explanation: |
  根据课文内容，在中世纪，自由竞争似乎是不切实际的，因为生产者在孤立的地方市场上经营。所举的例子是一个小镇上的面包师，他拥有一个保留市场，这就造成了生产者支配消费者，而不是通过竞争更好地服务消费者的局面。这种情况在 18 世纪发生了变化，当时全球商业得到了发展，打破了这些地方垄断，形成了真正的竞争，通过提高价格和质量使消费者受益，从而使自由贸易变得切实可行。
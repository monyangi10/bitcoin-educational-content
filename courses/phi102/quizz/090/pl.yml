question: Jaki był główny problem z wolną konkurencją w średniowieczu, który sprawiał, że wydawała się ona niepraktyczna?
answer: Lokalni producenci, tacy jak piekarze, mieli zarezerwowane rynki, tworząc dominację nad konsumentami
wrong_answers:
  - Koszty transportu były zbyt wysokie, by konkurencja była opłacalna
  - Władze religijne zakazały konkurencji handlowej między kupcami
  - Technologia rolnicza była niewystarczająca do wspierania wielu konkurujących ze sobą producentów
explanation: |
  Zgodnie z tekstem, w średniowieczu wolna konkurencja wydawała się niepraktyczna, ponieważ producenci działali na odizolowanych rynkach lokalnych. Podano przykład piekarza w małym mieście, który miał zastrzeżony rynek, co stworzyło sytuację, w której producenci dominowali nad konsumentami, zamiast konkurować, aby lepiej im służyć. Zmieniło się to w XVIII wieku, kiedy rozwinął się globalny handel, dzięki czemu wolny handel stał się praktyczny, przełamując te lokalne monopole i tworząc prawdziwą konkurencję, która przyniosła korzyści konsumentom dzięki lepszym cenom i jakości.
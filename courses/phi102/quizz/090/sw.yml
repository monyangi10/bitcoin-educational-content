question: Tatizo kuu la ushindani huru katika nyakati za enzi za kati lilikuwa nini kilichofanya ionekane kuwa haiwezekani?
answer: Wazalishaji wa ndani kama waokaji mikate walikuwa wameweka akiba ya masoko na kusababisha utawala juu ya watumiaji
wrong_answers:
  - Gharama za usafiri zilikuwa kubwa mno kiasi cha kufanya ushindani uwe na faida
  - Mamlaka za kidini zilipiga marufuku ushindani wa kibiashara kati ya wafanyabiashara
  - Teknolojia ya kilimo haitoshi kuwasaidia wazalishaji wengi wanaoshindana
explanation: |
  Kulingana na maandishi hayo, katika nyakati za enzi za kati ushindani huru ulionekana kuwa hauwezekani kwa sababu wazalishaji walifanya kazi katika masoko ya ndani yaliyotengwa. Mfano uliotolewa ni wa mwokaji mikate katika mji mdogo ambaye alikuwa na soko lililotengwa, ambalo liliunda hali ambapo wazalishaji waliwatawala watumiaji badala ya kushindana kuwahudumia vyema. Hii ilibadilika katika karne ya 18 wakati biashara ya kimataifa ilipoendelea, na kufanya biashara huria kuwa ya vitendo kwa kuvunja ukiritimba huu wa ndani na kuunda ushindani halisi uliowanufaisha watumiaji kupitia bei na ubora bora.
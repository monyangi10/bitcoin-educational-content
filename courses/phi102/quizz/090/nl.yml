question: Wat was het grootste probleem met vrije concurrentie in de middeleeuwen waardoor het onpraktisch leek?
answer: Lokale producenten zoals bakkers hadden gereserveerde markten en creëerden zo dominantie over consumenten
wrong_answers:
  - Transportkosten waren te hoog om concurrentie rendabel te maken
  - Religieuze autoriteiten verboden commerciële concurrentie tussen kooplieden
  - De landbouwtechnologie was ontoereikend om meerdere concurrerende producenten te ondersteunen
explanation: |
  Volgens de tekst leek vrije concurrentie in de middeleeuwen onpraktisch omdat producenten op geïsoleerde lokale markten opereerden. Het voorbeeld dat gegeven wordt is dat van een bakker in een kleine stad die een gereserveerde markt had, waardoor een situatie ontstond waarin producenten de consumenten domineerden in plaats van met elkaar te concurreren om hen beter van dienst te zijn. Dit veranderde in de 18e eeuw toen de wereldhandel zich ontwikkelde, waardoor vrije handel praktisch werd door deze lokale monopolies af te breken en echte concurrentie te creëren die consumenten ten goede kwam door betere prijzen en kwaliteit.
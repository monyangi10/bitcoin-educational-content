question: Vấn đề chính của cạnh tranh tự do thời trung cổ là gì, khiến nó trở nên không thực tế?
answer: Các nhà sản xuất địa phương như thợ làm bánh có thị trường độc quyền, tạo ra sự chi phối đối với người tiêu dùng.
wrong_answers:
  - Chi phí vận chuyển quá cao khiến việc cạnh tranh không mang lại lợi nhuận.
  - Các nhà chức trách tôn giáo đã cấm cạnh tranh thương mại giữa các thương nhân.
  - Công nghệ nông nghiệp chưa đủ để hỗ trợ nhiều nhà sản xuất cạnh tranh cùng lúc.
explanation: |
  Theo văn bản, vào thời trung cổ, cạnh tranh tự do dường như không khả thi vì các nhà sản xuất hoạt động trong các thị trường địa phương biệt lập. Ví dụ được đưa ra là về một người thợ làm bánh ở một thị trấn nhỏ có thị trường độc quyền, tạo ra tình trạng các nhà sản xuất thống trị người tiêu dùng thay vì cạnh tranh để phục vụ họ tốt hơn. Điều này đã thay đổi vào thế kỷ 18 khi thương mại toàn cầu phát triển, làm cho thương mại tự do trở nên khả thi bằng cách phá vỡ các thế độc quyền địa phương này và tạo ra sự cạnh tranh thực sự có lợi cho người tiêu dùng thông qua giá cả và chất lượng tốt hơn.
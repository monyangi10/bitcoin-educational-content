question: ¿Qué papel desempeña la libertad de prensa en el funcionamiento democrático según la filosofía del derecho natural?
answer: Permite el debate público sobre las instituciones políticas y su reforma a través de una opinión informada
wrong_answers:
  - Impide que los funcionarios tomen decisiones sin la aprobación pública previa
  - Garantiza que sólo las élites instruidas puedan participar en el discurso político y en las votaciones
  - Garantiza que todas las opiniones publicadas estén igualmente representadas en la política gubernamental
explanation: |
  La libertad de prensa es un mecanismo crucial para el funcionamiento democrático, ya que permite a los ciudadanos expresar sus percepciones de las consecuencias políticas y participar en una crítica constructiva de las instituciones. El texto explica que las acciones políticas afectan a los individuos de forma diferente, y cada persona debe poder expresar su opinión sobre los efectos políticos. Se crea así un "tribunal de la opinión pública" que puede observar los efectos de las leyes e identificar los problemas, lo que permite una reforma institucional gradual. Las respuestas erróneas tergiversan este concepto: la libertad de prensa no requiere la aprobación del gobierno para cada decisión, no limita la participación a las élites y no garantiza la representación equitativa de todas las opiniones en la política.
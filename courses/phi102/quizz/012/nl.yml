question: Welke rol speelt persvrijheid in het democratisch functioneren volgens de natuurrechtfilosofie?
answer: Het maakt een publiek debat over politieke instellingen en hun hervorming mogelijk door middel van een geïnformeerde opinie
wrong_answers:
  - Het voorkomt dat overheidsfunctionarissen beslissingen nemen zonder voorafgaande goedkeuring van het publiek
  - Het zorgt ervoor dat alleen hoogopgeleide elites kunnen deelnemen aan het politieke debat en stemmen
  - Het garandeert dat alle gepubliceerde meningen gelijkelijk worden vertegenwoordigd in het regeringsbeleid
explanation: |
  Persvrijheid is een cruciaal mechanisme voor het democratisch functioneren doordat het burgers in staat stelt hun perceptie van politieke gevolgen te uiten en constructieve kritiek te leveren op instellingen. De tekst legt uit dat politieke acties een verschillend effect hebben op individuen en dat iedereen zijn mening moet kunnen geven over de gevolgen van het beleid. Dit creëert een "tribunaal van de publieke opinie" dat de effecten van wetten kan observeren en problemen kan identificeren, waardoor geleidelijke institutionele hervorming mogelijk wordt. De foute antwoorden geven een verkeerde voorstelling van dit concept: persvrijheid vereist geen goedkeuring van de regering voor elke beslissing, beperkt deelname niet tot elites en garandeert geen gelijke vertegenwoordiging van alle meningen in het beleid.
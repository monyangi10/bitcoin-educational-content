question: Hvilken rolle spiller pressefriheten i et velfungerende demokrati ifølge naturrettsfilosofien?
answer: Det muliggjør offentlig debatt om politiske institusjoner og reform av disse gjennom en informert opinion
wrong_answers:
  - Den hindrer myndighetspersoner i å ta beslutninger uten offentlig godkjenning på forhånd
  - Det sikrer at bare utdannede eliter kan delta i den politiske diskursen og stemme
  - Den garanterer at alle offentliggjorte meninger blir likt representert i regjeringens politikk
explanation: |
  Pressefriheten er en avgjørende mekanisme for at demokratiet skal fungere, ved at borgerne kan gi uttrykk for sine oppfatninger av politiske konsekvenser og utøve konstruktiv kritikk av institusjoner. Teksten forklarer at politiske tiltak påvirker individer ulikt, og at hver enkelt må kunne gi uttrykk for sitt syn på politikkens virkninger. Dette skaper en "opinionens domstol" som kan observere virkningene av lover og identifisere problemer, noe som muliggjør gradvise institusjonelle reformer. De gale svarene gir en feilaktig fremstilling av dette konseptet: Pressefrihet krever ikke at myndighetene må godkjenne alle beslutninger, den begrenser ikke deltakelse til eliten, og den garanterer ikke lik representasjon av alle meninger i politikken.
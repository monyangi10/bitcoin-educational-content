question: Jakou roli hraje svoboda tisku v demokratickém fungování podle filozofie přirozeného práva?
answer: Umožňuje veřejnou diskusi o politických institucích a jejich reformě prostřednictvím informovaného veřejného mínění
wrong_answers:
  - Zabraňuje vládním úředníkům přijímat jakákoli rozhodnutí bez předchozího souhlasu veřejnosti
  - Zajišťuje, že se politického diskurzu a hlasování mohou účastnit pouze vzdělané elity
  - Zaručuje, že všechny zveřejněné názory budou ve vládní politice zastoupeny stejnou měrou
explanation: |
  Svoboda tisku slouží jako klíčový mechanismus pro fungování demokracie, protože umožňuje občanům vyjádřit své vnímání politických důsledků a zapojit se do konstruktivní kritiky institucí. Text vysvětluje, že politické kroky mají na jednotlivce různý dopad a každý člověk musí mít možnost vyjádřit svůj názor na politické dopady. Vzniká tak "tribunál veřejného mínění", který může sledovat účinky zákonů a identifikovat problémy, což umožňuje postupnou reformu institucí. Špatné odpovědi tento koncept zkreslují: svoboda tisku nevyžaduje souhlas vlády s každým rozhodnutím, neomezuje účast elit a nezaručuje rovné zastoupení všech názorů v politice.
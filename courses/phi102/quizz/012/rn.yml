question: Ni uruhara uruhe umwidegemvyo w’itangazamakuru ufise mu gukora kwa demokarasi hakurikijwe filozofiya y’amategeko kavukire?
answer: Bituma habaho impaka za bose ku nzego za politike n'ivugurura ryazo biciye mu vyiyumviro bishingiye ku makuru .
wrong_answers:
  - Bibuza abategetsi ba Leta gufata ingingo iyo ari yo yose batabanje kwemezwa na bose .
  - Bituma abantu bize bonyene bashobora kuja mu nsiguro za politike no mu gutora .
  - Biremeza ko ivyiyumviro vyose bizosohoka bizoserukirwa mu buryo bungana muri politike ya Leta .
explanation: |
  Umwidegemvyo w’itangazamakuru ni uburyo buhambaye bwo gutuma demokarasi ikora mu kureka abanyagihugu bagaserura uko babona ingaruka za politike no kwifatanya mu kunegura inzego mu buryo bwubaka. Ico canditswe gisigura ko ibikorwa vya politike bigira ingaruka ku bantu mu buryo butandukanye, kandi umuntu wese ategerezwa kuba ashoboye guserura ivyiyumviro vyiwe ku ngaruka za politike. Ivyo bituma haba ‘urukiko rw’ivyiyumviro vya bose’ rushobora kwihweza ingaruka z’amategeko no kumenya ingorane, ivyo bikaba bituma habaho ivugurura ry’inzego buhorobuhoro. Inyishu zitari zo zigaragaza nabi ico ciyumviro: umwidegemvyo w’itangazamakuru ntusaba kwemezwa na Leta ku ngingo yose, ntugarukira ku bantu b’inkerebutsi, kandi ntutuma ivyiyumviro vyose biserukira kimwe mu ngingo ngenderwako.
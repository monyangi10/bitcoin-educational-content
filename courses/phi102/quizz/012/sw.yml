question: Uhuru wa vyombo vya habari una jukumu gani katika utendaji kazi wa kidemokrasia kulingana na falsafa ya sheria asilia?
answer: Inawezesha mjadala wa umma kuhusu taasisi za kisiasa na mageuzi yake kupitia maoni yenye taarifa sahihi
wrong_answers:
  - Inawazuia maafisa wa serikali kufanya maamuzi yoyote bila idhini ya umma hapo awali
  - Inahakikisha kwamba wasomi walioelimika pekee ndio wanaweza kushiriki katika mijadala ya kisiasa na kupiga kura
  - Inahakikisha kwamba maoni yote yaliyochapishwa yatawakilishwa kwa usawa katika sera ya serikali
explanation: |
  Uhuru wa vyombo vya habari hutumika kama utaratibu muhimu wa utendaji wa kidemokrasia kwa kuwaruhusu raia kuelezea maoni yao kuhusu matokeo ya kisiasa na kushiriki katika ukosoaji wa kujenga taasisi. Maandishi yanaelezea kwamba vitendo vya kisiasa huathiri watu binafsi kwa njia tofauti, na kila mtu lazima aweze kutoa maoni yake kuhusu athari za sera. Hii huunda 'kambi ya maoni ya umma' ambayo inaweza kuona athari za sheria na kutambua matatizo, na kuwezesha mageuzi ya taratibu ya kitaasisi. Majibu yasiyo sahihi yanapotosha dhana hii: uhuru wa vyombo vya habari hauhitaji idhini ya serikali kwa kila uamuzi, hauzuii ushiriki kwa wasomi, na hauhakikishi uwakilishi sawa wa maoni yote katika sera.
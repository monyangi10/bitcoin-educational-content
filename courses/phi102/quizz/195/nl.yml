question: Waarom zijn de gevolgen van politieke beslissingen voor individuele burgers bijzonder moeilijk in te schatten in vergelijking met persoonlijke economische keuzes?
answer: Politieke gevolgen zijn collectief en in de tijd verspreid, waardoor het voor individuen onmogelijk is om de volledige impact op ongeziene getroffen partijen direct waar te nemen
wrong_answers:
  - Politieke beslissingen vereisen gespecialiseerde kennis die alleen getrainde economen en beleidsexperts adequaat kunnen begrijpen en evalueren
  - Bij politieke keuzes spelen morele overwegingen een rol die rationele berekening overstijgen, in tegenstelling tot economische beslissingen die puur utilitair zijn
  - Politieke systemen verdoezelen opzettelijk informatie om hun macht te behouden, terwijl markten transparante prijssignalen geven aan alle deelnemers
explanation: |
  De tekst legt specifiek uit dat politieke beslissingen collectieve gevolgen hebben die "voor elk individu moeilijk te onderzoeken zijn" en dat "een politieke maatregel perfect mensen kan schaden die de burger niet rechtstreeks ziet" Deze temporele en ruimtelijke scheiding van gevolgen, gecombineerd met hun collectieve aard, maakt politieke keuzes inherent moeilijker te evalueren dan directe, persoonlijke economische beslissingen waarbij de resultaten direct waarneembaar en aanpasbaar zijn.
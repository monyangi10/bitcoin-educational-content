question: 개인의 경제적 선택에 비해 정치적 결정의 결과를 개별 시민이 평가하기 특히 어려운 이유는 무엇일까요?
answer: 정치적 결과는 집단적이고 시간적으로 분산되어 있어 개인이 보이지 않는 피해 당사자에게 미치는 영향을 직접 관찰하는 것이 불가능합니다
wrong_answers:
  - 정치적 결정에는 훈련된 경제학자 및 정책 전문가만이 적절하게 이해하고 평가할 수 있는 전문 지식이 필요합니다
  - 정치적 선택은 순전히 공리주의적인 경제적 결정과 달리 이성적 계산을 초월하는 도덕적 고려를 수반합니다
  - 정치 시스템은 권력을 유지하기 위해 의도적으로 정보를 은폐하는 반면, 시장은 모든 참여자에게 투명한 가격 신호를 제공합니다
explanation: |
  이 텍스트는 정치적 결정은 '개인별로 검토하기 어려운' 집단적 결과를 초래하며, '정치적 조치는 시민이 직접 보지 못하는 사람들에게도 완벽하게 해를 끼칠 수 있다'고 구체적으로 설명합니다 이러한 시간적, 공간적 결과와의 분리와 집단적 특성이 결합되어 정치적 선택은 결과를 직접 관찰하고 조정할 수 있는 즉각적이고 개인적인 경제적 결정보다 본질적으로 평가하기가 더 어렵습니다.
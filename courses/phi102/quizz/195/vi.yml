question: Điều gì khiến việc đánh giá hậu quả của các quyết định chính trị trở nên khó khăn hơn đối với từng công dân so với việc đánh giá các lựa chọn kinh tế cá nhân?
answer: Hậu quả chính trị mang tính tập thể và phân tán theo thời gian, khiến cho các cá nhân không thể trực tiếp quan sát toàn bộ tác động của chúng lên các bên bị ảnh hưởng vô hình.
wrong_answers:
  - Các quyết định chính trị đòi hỏi kiến thức chuyên môn mà chỉ các nhà kinh tế và chuyên gia hoạch định chính sách được đào tạo bài bản mới có thể hiểu và đánh giá một cách đầy đủ.
  - Các lựa chọn chính trị liên quan đến những cân nhắc đạo đức vượt lên trên tính toán lý trí, khác với các quyết định kinh tế chỉ dựa trên lợi ích thuần túy.
  - Các hệ thống chính trị cố tình che giấu thông tin để duy trì quyền lực, trong khi thị trường cung cấp tín hiệu giá cả minh bạch cho tất cả các bên tham gia.
explanation: |
  Văn bản này giải thích cụ thể rằng các quyết định chính trị có những hậu quả tập thể mà 'rất khó để đánh giá đối với từng cá nhân' và rằng 'một biện pháp chính trị hoàn toàn có thể gây hại cho những người mà công dân không trực tiếp nhìn thấy'. Sự tách biệt về thời gian và không gian với hậu quả, kết hợp với bản chất tập thể của chúng, khiến cho các lựa chọn chính trị vốn dĩ khó đánh giá hơn so với các quyết định kinh tế cá nhân, tức thời, nơi kết quả có thể quan sát và điều chỉnh trực tiếp.
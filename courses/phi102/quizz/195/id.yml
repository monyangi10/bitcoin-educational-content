question: Apa yang membuat konsekuensi dari keputusan politik sangat sulit dievaluasi oleh warga negara dibandingkan dengan pilihan ekonomi pribadi?
answer: Konsekuensi politik bersifat kolektif dan tersebar secara temporer, sehingga tidak mungkin bagi individu untuk secara langsung mengamati dampaknya secara menyeluruh terhadap pihak-pihak yang terkena dampak yang tidak terlihat
wrong_answers:
  - Keputusan politik membutuhkan pengetahuan khusus yang hanya dapat dipahami dan dievaluasi oleh para ekonom dan ahli kebijakan yang terlatih
  - Pilihan politik melibatkan pertimbangan moral yang melampaui perhitungan rasional, tidak seperti keputusan ekonomi yang murni bersifat utilitarian
  - Sistem politik dengan sengaja mengaburkan informasi untuk mempertahankan kekuasaan, sementara pasar memberikan sinyal harga yang transparan untuk semua peserta
explanation: |
  Teks tersebut secara khusus menjelaskan bahwa keputusan politik memiliki konsekuensi kolektif yang 'sulit untuk diperiksa oleh setiap individu' dan bahwa 'tindakan politik dapat sangat merugikan orang yang tidak dilihat secara langsung oleh warga negara Pemisahan temporal dan spasial dari konsekuensi ini, dikombinasikan dengan sifat kolektif mereka, membuat pilihan politik secara inheren lebih sulit untuk dievaluasi daripada keputusan ekonomi yang bersifat langsung dan pribadi di mana hasilnya dapat diamati dan disesuaikan secara langsung.
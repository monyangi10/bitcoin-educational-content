question: Was macht es für den einzelnen Bürger besonders schwierig, die Folgen politischer Entscheidungen im Vergleich zu persönlichen wirtschaftlichen Entscheidungen zu beurteilen?
answer: Die politischen Folgen sind kollektiv und zeitlich verstreut, so dass es für den Einzelnen unmöglich ist, die Auswirkungen auf die unsichtbaren Betroffenen direkt und vollständig zu beobachten
wrong_answers:
  - Politische Entscheidungen erfordern Spezialwissen, das nur ausgebildete Wirtschaftswissenschaftler und Politikexperten angemessen verstehen und bewerten können
  - Politische Entscheidungen beinhalten moralische Überlegungen, die über rationales Kalkül hinausgehen, im Gegensatz zu wirtschaftlichen Entscheidungen, die rein utilitaristisch sind
  - Politische Systeme verschleiern absichtlich Informationen, um ihre Macht zu erhalten, während Märkte transparente Preissignale für alle Teilnehmer liefern
explanation: |
  In dem Text wird ausdrücklich darauf hingewiesen, dass politische Entscheidungen kollektive Folgen haben, die "für den Einzelnen schwer zu prüfen" sind, und dass "eine politische Maßnahme durchaus Menschen schaden kann, die der Bürger nicht direkt sieht" Diese zeitliche und räumliche Trennung von den Folgen in Verbindung mit ihrem kollektiven Charakter macht politische Entscheidungen von Natur aus schwieriger zu bewerten als unmittelbare, persönliche wirtschaftliche Entscheidungen, deren Ergebnisse direkt beobachtbar und anpassbar sind.
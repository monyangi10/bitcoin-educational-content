question: Šta posledice političkih odluka čini posebno teškim za procenu pojedinačnih građana u poređenju sa ličnim ekonomskim izborima?
answer: Političke posledice su kolektivne i vremenski raspršene, što onemogućava pojedincima da direktno posmatraju njihov potpuni uticaj na neviđene pogođene strane.
wrong_answers:
  - Političke odluke zahtevaju specijalizovano znanje koje samo obučeni ekonomisti i stručnjaci za politiku mogu adekvatno razumeti i proceniti.
  - Politički izbori uključuju moralne razmatranje koja nadilaze racionalnu kalkulaciju, za razliku od ekonomskih odluka koje su isključivo utilitarne.
  - Politički sistemi namerno zamagljuju informacije kako bi zadržali moć, dok tržišta pružaju transparentne cenovne signale za sve učesnike.
explanation: |
  Tekst posebno objašnjava da političke odluke imaju kolektivne posledice koje je 'teško ispitati za svakog pojedinca' i da 'politička mera može savršeno naškoditi ljudima koje građanin ne vidi direktno.' Ovo vremensko i prostorno odvajanje od posledica, u kombinaciji sa njihovom kolektivnom prirodom, čini političke izbore inherentno težim za procenu nego neposredne, lične ekonomske odluke gde su rezultati direktno uočljivi i prilagodljivi.
question: Qu'est-ce qui rend les conséquences des décisions politiques particulièrement difficiles à évaluer pour les citoyens individuels par rapport aux choix économiques personnels ?
answer: Les conséquences politiques sont collectives et dispersées dans le temps, de sorte qu'il est impossible pour les individus d'observer directement leur impact total sur les parties affectées invisibles
wrong_answers:
  - Les décisions politiques requièrent des connaissances spécialisées que seuls des économistes et des experts politiques qualifiés peuvent comprendre et évaluer de manière adéquate
  - Les choix politiques impliquent des considérations morales qui transcendent le calcul rationnel, contrairement aux décisions économiques qui sont purement utilitaires
  - Les systèmes politiques obscurcissent délibérément l'information pour conserver le pouvoir, alors que les marchés fournissent des signaux de prix transparents pour tous les participants
explanation: |
  Le texte explique spécifiquement que les décisions politiques ont des conséquences collectives qui sont "difficiles à examiner pour chaque individu" et qu'"une mesure politique peut parfaitement nuire à des personnes que le citoyen ne voit pas directement" Cette séparation temporelle et spatiale des conséquences, combinée à leur nature collective, rend les choix politiques intrinsèquement plus difficiles à évaluer que les décisions économiques immédiates et personnelles dont les résultats sont directement observables et ajustables.
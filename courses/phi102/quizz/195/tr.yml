question: Siyasi kararların sonuçlarının bireysel vatandaşlar tarafından değerlendirilmesini kişisel ekonomik tercihlere kıyasla özellikle zorlaştıran nedir?
answer: Siyasi sonuçlar kolektif ve zamansal olarak dağınıktır, bu da bireylerin görünmeyen etkilenen taraflar üzerindeki tam etkilerini doğrudan gözlemlemelerini imkansız kılar
wrong_answers:
  - Siyasi kararlar, yalnızca eğitimli ekonomistlerin ve politika uzmanlarının yeterince kavrayabileceği ve değerlendirebileceği özel bilgiler gerektirir
  - Siyasi tercihler, tamamen faydacı olan ekonomik kararların aksine, rasyonel hesaplamanın ötesine geçen ahlaki değerlendirmeleri içerir
  - Siyasi sistemler gücü korumak için kasıtlı olarak bilgiyi gizlerken, piyasalar tüm katılımcılar için şeffaf fiyatlandırma sinyalleri sağlar
explanation: |
  Metin özellikle siyasi kararların 'her bir birey için incelenmesi zor' kolektif sonuçları olduğunu ve 'siyasi bir önlemin vatandaşın doğrudan görmediği insanlara mükemmel bir şekilde zarar verebileceğini' açıklamaktadır Sonuçlardan bu zamansal ve mekansal ayrılık, kolektif doğaları ile birleştiğinde, siyasi tercihlerin değerlendirilmesini, sonuçların doğrudan gözlemlenebilir ve ayarlanabilir olduğu anlık, kişisel ekonomik kararlardan daha zor hale getirmektedir.
question: Mis teeb poliitiliste otsuste tagajärjed kodanike jaoks eriti raskesti hinnatavaks võrreldes isiklike majanduslike valikutega?
answer: Poliitilised tagajärjed on kollektiivsed ja ajaliselt hajutatud, mistõttu on üksikisikutel võimatu otseselt jälgida nende täielikku mõju nähtamatutele mõjutatud osapooltele
wrong_answers:
  - Poliitilised otsused nõuavad eriteadmisi, mida ainult koolitatud majandusteadlased ja poliitikaeksperdid suudavad adekvaatselt mõista ja hinnata
  - Poliitilised valikud hõlmavad moraalseid kaalutlusi, mis ületavad ratsionaalset kalkulatsiooni, erinevalt majanduslikest otsustest, mis on puhtalt utilitaristlikud
  - Poliitilised süsteemid varjavad teadlikult teavet, et säilitada võimu, samas kui turud annavad kõigile osalejatele läbipaistvaid hinnasignaale
explanation: |
  Tekstis selgitatakse konkreetselt, et poliitilistel otsustel on kollektiivsed tagajärjed, mida "on raske uurida iga üksikisiku jaoks", ja et "poliitiline meede võib suurepäraselt kahjustada inimesi, keda kodanik ei näe otseselt" Selline ajaline ja ruumiline eraldatus tagajärgedest koos nende kollektiivse iseloomuga muudab poliitilised valikud olemuslikult raskemini hinnatavaks kui vahetud, isiklikud majandusotsused, mille tulemused on otseselt jälgitavad ja reguleeritavad.
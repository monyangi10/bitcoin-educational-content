question: Ni igiki gituma ingaruka z’ingingo za politike zigora cane cane abanyagihugu ku giti cabo gusuzuma ugereranije n’amahitamwo y’ubutunzi bwite?
answer: Inkurikizi za politike zirahurikiyeko kandi zirashira hamwe mu gihe gito, bikaba bituma abantu badashobora kwihweza ata guca ku ruhande ingaruka zazo zose ku migambwe itaboneka ishikirwa n’ingorane .
wrong_answers:
  - Ivyemezo vya politike bisaba ubumenyi bwihariye abahinga mu vy’ubutunzi n’abahinga mu vy’amategeko bamenyerejwe gusa bashobora gutahura no gusuzuma neza .
  - Amahitamwo ya politike arimwo ivyerekeye inyifato runtu birenze uguharura gushingiye ku vyiyumviro, bitandukanye n’ingingo z’ubutunzi zijanye n’ubutunzi gusa .
  - Uburyo bwa politike burapfuka amakuru n’ibigirankana kugira ngo bugumye ububasha, mu gihe amasoko atanga ibimenyetso vy’ibiciro bigaragara ku bari muri iyo nama bose .
explanation: |
  Ico canditswe kirasigura mu buryo budasanzwe yuko ingingo za politike zigira ingaruka rusangi 'zigoye gusuzuma ku muntu wese' be n'uko 'ingero ya politike ishobora gutera ingorane abantu mu buryo butagira agasembwa umunyagihugu atabona ata guca ku ruhande.' Ukwo gutandukanya ingaruka mu gihe no mu kibanza, hamwe n’akameremere kazo rusangi, bituma amahitamwo ya politike agora cane gusuzuma kuruta ingingo z’ubutunzi zihita zifatwa, z’umuntu ku giti ciwe aho ingaruka zishobora kwihwezwa ata guca ku ruhande kandi zigahindurwa.
question: Что делает последствия политических решений особенно сложными для оценки отдельными гражданами по сравнению с личным экономическим выбором?
answer: Политические последствия носят коллективный характер и разнесены во времени, что не позволяет отдельным людям непосредственно наблюдать за их полным воздействием на невидимые пострадавшие стороны
wrong_answers:
  - Принятие политических решений требует специальных знаний, которые могут адекватно понять и оценить только подготовленные экономисты и эксперты в области политики
  - Политический выбор предполагает моральные соображения, выходящие за рамки рационального расчета, в отличие от экономических решений, которые являются чисто утилитарными
  - Политические системы намеренно скрывают информацию, чтобы сохранить власть, в то время как рынки предоставляют прозрачные ценовые сигналы для всех участников
explanation: |
  В тексте специально поясняется, что политические решения имеют коллективные последствия, которые "трудно изучить для каждого отдельного человека", и что "политические меры могут прекрасно навредить людям, которых гражданин не видит непосредственно" Такая временная и пространственная отделенность от последствий, в сочетании с их коллективным характером, делает политический выбор изначально более сложным для оценки, чем непосредственные, личные экономические решения, где результаты можно непосредственно наблюдать и регулировать.
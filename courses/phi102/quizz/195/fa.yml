question: چه چیزی پیامدهای تصمیمات سیاسی را برای شهروندان فردی در مقایسه با انتخاب‌های اقتصادی شخصی به‌طور خاص دشوار می‌سازد؟
answer: پیامدهای سیاسی جمعی و به‌طور زمانی پراکنده هستند، که این امر مشاهده مستقیم تأثیر کامل آن‌ها بر طرف‌های متأثر نادیده را برای افراد غیرممکن می‌سازد.
wrong_answers:
  - تصمیمات سیاسی نیاز به دانش تخصصی دارند که تنها اقتصاددانان و کارشناسان سیاست آموزش‌دیده می‌توانند به‌طور مناسب درک و ارزیابی کنند.
  - انتخاب‌های سیاسی شامل ملاحظات اخلاقی هستند که فراتر از محاسبات عقلانی می‌روند، برخلاف تصمیمات اقتصادی که صرفاً فایده‌گرایانه هستند.
  - سیستم‌های سیاسی به‌طور عمدی اطلاعات را برای حفظ قدرت مبهم می‌کنند، در حالی که بازارها سیگنال‌های قیمت‌گذاری شفافی را برای همه شرکت‌کنندگان فراهم می‌کنند.
explanation: |
  متن به‌طور خاص توضیح می‌دهد که تصمیمات سیاسی پیامدهای جمعی دارند که 'بررسی آن‌ها برای هر فرد دشوار است' و اینکه 'یک اقدام سیاسی می‌تواند به‌طور کامل به افرادی آسیب برساند که شهروند به‌طور مستقیم آن‌ها را نمی‌بیند.' این جدایی زمانی و مکانی از پیامدها، همراه با ماهیت جمعی آن‌ها، باعث می‌شود که انتخاب‌های سیاسی ذاتاً دشوارتر از تصمیمات اقتصادی فوری و شخصی باشند که نتایج آن‌ها به‌طور مستقیم قابل مشاهده و تنظیم است.
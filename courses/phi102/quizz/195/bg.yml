question: Какво прави последиците от политическите решения особено трудни за оценяване от отделните граждани в сравнение с личните икономически избори?
answer: Политическите последици са колективни и разпръснати във времето, което прави невъзможно за отделните хора да наблюдават пряко цялостното им въздействие върху невидимите засегнати страни
wrong_answers:
  - Политическите решения изискват специализирани познания, които само обучени икономисти и експерти по политики могат да разберат и оценят адекватно
  - Политическият избор включва морални съображения, които надхвърлят рационалното изчисление, за разлика от икономическите решения, които са чисто утилитарни
  - Политическите системи умишлено прикриват информацията, за да запазят властта си, докато пазарите осигуряват прозрачни сигнали за ценообразуване за всички участници
explanation: |
  В текста специално се обяснява, че политическите решения имат колективни последици, които са "трудни за разглеждане от всеки отделен човек", и че "една политическа мярка може напълно да навреди на хора, които гражданинът не вижда пряко" Това времево и пространствено отделяне от последствията, съчетано с колективния им характер, прави политическите решения по своята същност по-трудни за оценка от непосредствените, лични икономически решения, при които резултатите са пряко наблюдаеми и регулируеми.
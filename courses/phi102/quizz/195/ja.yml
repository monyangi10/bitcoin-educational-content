question: 個人的な経済的選択と比較して、政治的決定の結果を個々の市民が評価することが特に難しいのはなぜか？
answer: 政治的結果は集団的で時間的に分散しているため、目に見えない影響を受ける当事者への影響を個人が直接観察することは不可能である。
wrong_answers:
  - 政治的な決定には、訓練を受けた経済学者や政策の専門家だけが適切に理解し評価できる専門的な知識が必要である。
  - 政治的選択は、純粋に功利主義的な経済的決定とは異なり、合理的な計算を超越した道徳的配慮を伴う。
  - 政治システムは権力を維持するために意図的に情報を曖昧にするが、市場はすべての参加者に透明な価格シグナルを提供する。
explanation: |
  この文章では、政治的決定には集団的結果があり、それは「各個人にとって検討するのが困難」であり、「政治的措置は、市民が直接目にすることのない人々に完璧な危害を加えることができる」と具体的に説明されている。このような時間的・空間的な隔たりは、その集団的な性質と相まって、政治的選択を、結果が直接観察・調整可能な即時的・個人的な経済的決定よりも本質的に評価しにくくしている。
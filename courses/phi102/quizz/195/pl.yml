question: Co sprawia, że konsekwencje decyzji politycznych są szczególnie trudne do oceny dla poszczególnych obywateli w porównaniu z osobistymi wyborami ekonomicznymi?
answer: Konsekwencje polityczne mają charakter zbiorowy i są rozproszone w czasie, co uniemożliwia jednostkom bezpośrednie obserwowanie ich pełnego wpływu na niewidoczne strony, których dotyczą
wrong_answers:
  - Decyzje polityczne wymagają specjalistycznej wiedzy, którą tylko wyszkoleni ekonomiści i eksperci ds. polityki mogą odpowiednio zrozumieć i ocenić
  - Wybory polityczne obejmują względy moralne, które wykraczają poza racjonalną kalkulację, w przeciwieństwie do decyzji ekonomicznych, które są czysto utylitarne
  - Systemy polityczne celowo zaciemniają informacje, aby utrzymać władzę, podczas gdy rynki zapewniają przejrzyste sygnały cenowe dla wszystkich uczestników
explanation: |
  Tekst wyjaśnia w szczególności, że decyzje polityczne mają zbiorowe konsekwencje, które są "trudne do zbadania dla każdej jednostki" i że "środek polityczny może doskonale zaszkodzić ludziom, których obywatel nie widzi bezpośrednio" To czasowe i przestrzenne oddzielenie od konsekwencji, w połączeniu z ich zbiorowym charakterem, sprawia, że wybory polityczne są z natury trudniejsze do oceny niż bezpośrednie, osobiste decyzje gospodarcze, których wyniki są bezpośrednio obserwowalne i regulowane.
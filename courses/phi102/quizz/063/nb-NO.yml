question: Hvilken historisk trend identifiserer teksten når det gjelder forholdet mellom tekniske fremskritt og menneskelig frihet?
answer: Den tekniske utviklingen skapte gradvis forutsetninger som gjorde frihet både mulig og nødvendig
wrong_answers:
  - Den tekniske utviklingen forsterket konsekvent eksisterende systemer for dominans og kontroll
  - Teknologiske fremskritt hadde ingen vesentlig innvirkning på sosiale strukturer eller menneskelig frihet
  - Den tekniske utviklingen kom først og fremst herskerne til gode ved å styrke deres autoritet over undersåttene
explanation: |
  Teksten er tydelig på at de tekniske endringene gradvis endret levekårene og gjorde frihet ikke bare mulig, men nødvendig. Etter hvert som produksjonen ble mer intellektuell og krevde kreativitet, ble gamle herredømmesystemer som slaveriet overflødige. Teksten understreker at frihet framstår som en konkret realitet avhengig av materielle og sosiale forhold, ikke bare som et abstrakt ideal. Den tekniske utviklingen skapte nye muligheter for autonomi og gjorde institusjoner som tidligere hadde begrenset friheten, overflødige, noe som viser en grunnleggende historisk trend mot større menneskelig frihet.
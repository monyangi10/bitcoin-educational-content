question: Ni ikihe kintu ca kahise ico canditswe kigaragaza ku bijanye n’isano riri hagati y’iterambere ry’ubuhinga n’umwidegemvyo w’umuntu?
answer: Impinduka zijanye n'ubuhinga zatumye buhoro buhoro haba ibintu vyatumye umwidegemvyo ushoboka kandi ukaba ukenewe .
wrong_answers:
  - Iterambere ry'ubuhinga ryakomeje ubudasiba uburyo bwariho bwo kuganza no kugenzura
  - Amaterambere y’ubuhinga nta ngaruka zikomeye yagize ku mibano canke ku mwidegemvyo wa muntu .
  - Iterambere ry’ubuhinga ryarafashije canecane abategetsi mu gukomeza ubukuru bwabo ku batwarwa .
explanation: |
  Ico canditswe kivuga neza yuko ihinduka ry’ubuhinga ryahinduye buhorobuhoro ubuzima, bituma umwidegemvyo udashoboka gusa ariko ukaba ukenewe. Uko uguhingura vyagenda birarushiriza kuba ivy’ubwenge kandi bisaba ubuhinga bwo kurema, ni ko n’uburyo bwa kera bwo kuganza nk’ubuja bwaciye buvaho. Ico canditswe gishimika ku vy’uko umwidegemvyo ugaragara nk’ikintu nyaco gishingiye ku mibereho y’abantu n’imibano, atari iciyumviro gusa kitaboneka. Iterambere ry’ubuhinga ryatumye habaho uburyo bushasha bwo kwigenga kandi ryatumye inzego zahora zigabanya umwidegemvyo zidakenewe, ivyo bikaba vyerekana umurongo w’ishimikiro w’amateka ujana ku mwidegemvyo mwinshi w’abantu.
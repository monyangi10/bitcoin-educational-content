question: ¿Qué tendencia histórica identifica el texto respecto a la relación entre progreso técnico y libertad humana?
answer: Las transformaciones técnicas crearon gradualmente las condiciones que hicieron posible y necesaria la libertad
wrong_answers:
  - El progreso técnico reforzó sistemáticamente los sistemas de dominación y control existentes
  - Los avances tecnológicos no tuvieron un impacto significativo en las estructuras sociales ni en la libertad humana
  - Los avances técnicos beneficiaron principalmente a los gobernantes al reforzar su autoridad sobre los súbditos
explanation: |
  El texto afirma claramente que las transformaciones técnicas modificaron progresivamente las condiciones de vida, haciendo que la libertad no sólo fuera posible, sino necesaria. A medida que la producción se hacía más intelectual y requería creatividad, los antiguos sistemas de dominación, como la esclavitud, quedaron obsoletos. El texto subraya que la libertad surge como una realidad concreta dependiente de las condiciones materiales y sociales, no sólo como un ideal abstracto. El progreso técnico creó nuevas posibilidades de autonomía e hizo innecesarias las instituciones que antes limitaban la libertad, mostrando una tendencia histórica fundamental hacia una mayor libertad humana.
question: Quale tendenza storica individua il testo in merito al rapporto tra progresso tecnico e libertà umana?
answer: Le trasformazioni tecniche hanno gradualmente creato condizioni che hanno reso la libertà possibile e necessaria
wrong_answers:
  - Il progresso tecnico ha costantemente rafforzato i sistemi di dominio e controllo esistenti
  - I progressi tecnologici non hanno avuto un impatto significativo sulle strutture sociali o sulla libertà umana
  - Gli sviluppi tecnici hanno avvantaggiato soprattutto i governanti, rafforzando la loro autorità sui sudditi
explanation: |
  Il testo afferma chiaramente che le trasformazioni tecniche hanno progressivamente modificato le condizioni di vita, rendendo la libertà non solo possibile ma necessaria. Quando la produzione è diventata più intellettuale e ha richiesto creatività, i vecchi sistemi di dominio come la schiavitù sono diventati obsoleti. Il testo sottolinea che la libertà emerge come una realtà concreta dipendente dalle condizioni materiali e sociali, non solo come un ideale astratto. Il progresso tecnico ha creato nuove possibilità di autonomia e ha reso superflue le istituzioni che prima limitavano la libertà, mostrando una tendenza storica fondamentale verso una maggiore libertà umana.
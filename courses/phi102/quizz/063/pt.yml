question: Que tendência histórica identifica o texto no que respeita à relação entre progresso técnico e liberdade humana?
answer: As transformações técnicas criaram gradualmente condições que tornaram a liberdade possível e necessária
wrong_answers:
  - O progresso técnico reforçou sistematicamente os sistemas de dominação e controlo existentes
  - Os avanços tecnológicos não tiveram um impacto significativo nas estruturas sociais ou na liberdade humana
  - Os desenvolvimentos técnicos beneficiaram principalmente os governantes, reforçando a sua autoridade sobre os súbditos
explanation: |
  O texto afirma claramente que as transformações técnicas modificaram progressivamente as condições de vida, tornando a liberdade não só possível como necessária. À medida que a produção se tornou mais intelectual e exigiu criatividade, antigos sistemas de dominação, como a escravatura, tornaram-se obsoletos. O texto sublinha que a liberdade surge como uma realidade concreta, dependente das condições materiais e sociais, e não apenas como um ideal abstrato. O progresso técnico criou novas possibilidades de autonomia e tornou desnecessárias as instituições que antes limitavam a liberdade, mostrando uma tendência histórica fundamental para uma maior liberdade humana.
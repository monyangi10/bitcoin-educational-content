question: Vilken historisk trend identifierar texten när det gäller förhållandet mellan tekniska framsteg och mänsklig frihet?
answer: Tekniska omvandlingar skapade gradvis förutsättningar som gjorde frihet både möjlig och nödvändig
wrong_answers:
  - Tekniska framsteg förstärkte konsekvent befintliga system för dominans och kontroll
  - De tekniska framstegen hade ingen betydande inverkan på samhällsstrukturer eller mänsklig frihet
  - Den tekniska utvecklingen gynnade i första hand härskarna genom att stärka deras makt över undersåtarna
explanation: |
  I texten framgår tydligt att tekniska förändringar successivt förändrade levnadsvillkoren och gjorde frihet inte bara möjlig utan nödvändig. I takt med att produktionen blev mer intellektuell och krävde kreativitet, blev gamla härskarsystem som slaveri föråldrade. I texten betonas att frihet framstår som en konkret verklighet beroende av materiella och sociala förhållanden, inte bara som ett abstrakt ideal. De tekniska framstegen skapade nya möjligheter till självständighet och gjorde institutioner som tidigare begränsat friheten onödiga, vilket visar på en grundläggande historisk trend mot större mänsklig frihet.
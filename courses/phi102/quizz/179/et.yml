question: Miks on liberaalse analüüsi kohaselt demokraatlikku poliitilist toimimist võimatu säilitada kommunistliku majandussüsteemi tingimustes?
answer: Kuna tootmis- ja turustamisprotsesside juhtimine nõuab pidevat autoritaarset kontrolli, mida ei saa riskida süsteemi oponentidele üle anda
wrong_answers:
  - Kuna töötajad keskenduvad liiga palju majanduslikule planeerimisele, et osaleda tõhusalt demokraatlikes protsessides ja poliitilises otsustusprotsessis
  - Kuna majandustegevuse koordineerimise keerukus ei jäta aega poliitilisteks aruteludeks ja demokraatlikeks konsultatsiooniprotseduurideks
  - Kuna kollektiivne omandiõigus kaotab individuaalsed omandiõigused, mis on igasuguse demokraatliku poliitilise osaluse vajalik alus
explanation: |
  Tekstis selgitatakse, et demokraatlik toimimine ei võimalda tootmis- ja jaotamisprotsesside jätkusuutlikku juhtimist. Pidev eestkostja võim muutub hädavajalikuks ja kommunistid ei saa nõustuda, et see võim antakse üle süsteemi vastastele. See tekitab loomuliku vastuolu demokraatliku võimu üleandmise ja majandusliku protsessi pideva autoritaarse kontrolli vajaduse vahel. Teised võimalused keskenduvad pigem praktilistele piirangutele kui sellele põhimõttelisele poliitilisele vastuolule.
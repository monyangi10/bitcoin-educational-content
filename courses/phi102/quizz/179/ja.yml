question: 自由主義的な分析によれば、なぜ共産主義的な経済体制のもとでは民主主義的な政治機能を維持することが不可能になるのか？
answer: というのも、生産と流通のプロセスを管理するには、システム反対派に移管される危険を冒すことのできない、永続的な権威主義的統制が必要だからだ。
wrong_answers:
  - 労働者が経済計画に集中するあまり、民主的プロセスや政治的意思決定に効果的に参加できないからだ。
  - 経済活動を調整することの複雑さから、政治的な議論や民主的な協議手続きを行う時間がない。
  - なぜなら、集団所有は、民主的な政治参加に必要な基盤である個人の財産権を排除してしまうからである。
explanation: |
  本文では、民主主義的機能では生産と流通のプロセスを持続的に管理することはできないと説明されている。共産主義者は、この権力が体制の敵対者に移譲されることを受け入れることができない。このことは、民主的な権力移譲と、経済プロセスに対する継続的な権威主義的統制の必要性との間に、本質的な矛盾を生み出す。他の選択肢は、この根本的な政治的矛盾よりも、むしろ現実的な制約に焦点を当てている。
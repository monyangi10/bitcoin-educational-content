question: Enligt den liberala analysen, varför blir det omöjligt att upprätthålla en demokratisk politisk funktion under ett kommunistiskt ekonomiskt system?
answer: Eftersom hantering av produktions- och distributionsprocesser kräver permanent auktoritär kontroll som inte kan riskera att överföras till systemmotståndare
wrong_answers:
  - Eftersom arbetstagarna blir alltför fokuserade på ekonomisk planering för att effektivt kunna delta i demokratiska processer och politiskt beslutsfattande
  - Eftersom det är så komplicerat att samordna ekonomiska aktiviteter finns det inte tid för politiska debatter och demokratiska samrådsförfaranden
  - Eftersom kollektivt ägande eliminerar individuell äganderätt, som är den nödvändiga grunden för allt demokratiskt politiskt deltagande
explanation: |
  I texten förklaras att en demokratisk funktion inte kan möjliggöra en hållbar förvaltning av produktions- och distributionsprocesserna. En permanent förmyndarmakt blir nödvändig, och kommunister kan inte acceptera att denna makt överförs till systemets motståndare. Detta skapar en inneboende motsägelse mellan demokratisk maktöverföring och behovet av kontinuerlig auktoritär kontroll över ekonomiska processer. De andra alternativen fokuserar på praktiska begränsningar snarare än på denna grundläggande politiska oförenlighet.
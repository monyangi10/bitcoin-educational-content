question: Waarom is volgens de liberale analyse democratisch politiek functioneren onmogelijk te handhaven onder een communistisch economisch systeem?
answer: Omdat het beheer van productie- en distributieprocessen permanente autoritaire controle vereist waarvan het risico niet kan worden overgedragen aan systeemtegenstanders
wrong_answers:
  - Omdat arbeiders zich te veel richten op economische planning om effectief deel te nemen aan democratische processen en politieke besluitvorming
  - Omdat er door de complexiteit van het coördineren van economische activiteiten geen tijd is voor politieke debatten en democratische raadplegingsprocedures
  - Omdat collectief eigendom individuele eigendomsrechten elimineert, die de noodzakelijke basis vormen voor elke democratische politieke participatie
explanation: |
  De tekst legt uit dat democratisch functioneren geen duurzaam beheer van productie- en distributieprocessen mogelijk maakt. Een permanente voogdijmacht wordt onmisbaar en communisten kunnen niet accepteren dat deze macht wordt overgedragen aan tegenstanders van het systeem. Dit creëert een inherente tegenstelling tussen democratische machtsoverdracht en de behoefte aan voortdurende autoritaire controle over economische processen. De andere opties richten zich meer op praktische beperkingen dan op deze fundamentele politieke onverenigbaarheid.
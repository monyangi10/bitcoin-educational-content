question: 根據自由主義的分析，為什麼在共產主義經濟體系下，民主政治的運作無法維持？
answer: 因為管理生產和配送流程需要永久性的專制控制，而這種控制不能冒險轉移給系統對手
wrong_answers:
  - 因為工人太專注於經濟規劃，無法有效參與民主程序和政治決策
  - 由於協調經濟活動的複雜性，沒有時間進行政治辯論和民主協商程序
  - 因為集體所有權消除了個人財產權，而個人財產權是任何民主政治參與的必要基礎。
explanation: |
  文中解釋，民主的運作無法讓生產與分配過程得到永續的管理。永久性的監護權力變得不可或缺，而共產黨人不能接受這種權力轉移給制度的對手。這在民主的權力轉移與持續專制控制經濟過程的需求之間，產生了固有的矛盾。其他方案的重點在於實際的限制，而非這種根本的政治不相容性。
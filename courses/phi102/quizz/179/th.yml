question: ตามการวิเคราะห์แบบเสรีนิยม ทำไมการทำงานทางการเมืองแบบประชาธิปไตยจึงกลายเป็นสิ่งที่ไม่สามารถรักษาไว้ได้ภายใต้ระบบเศรษฐกิจแบบคอมมิวนิสต์?
answer: เนื่องจากการจัดการกระบวนการผลิตและการกระจายสินค้าต้องการการควบคุมแบบเผด็จการถาวรที่ไม่สามารถเสี่ยงต่อการถูกโอนย้ายไปยังฝ่ายตรงข้ามของระบบ
wrong_answers:
  - เพราะคนงานมุ่งเน้นไปที่การวางแผนเศรษฐกิจมากเกินไปจนไม่สามารถมีส่วนร่วมอย่างมีประสิทธิภาพในกระบวนการประชาธิปไตยและการตัดสินใจทางการเมือง
  - เนื่องจากความซับซ้อนของการประสานงานกิจกรรมทางเศรษฐกิจทำให้ไม่มีเวลาในการอภิปรายทางการเมืองและกระบวนการปรึกษาหารือแบบประชาธิปไตย
  - เพราะการเป็นเจ้าของร่วมกันกำจัดสิทธิในทรัพย์สินส่วนบุคคลซึ่งเป็นรากฐานที่จำเป็นสำหรับการมีส่วนร่วมทางการเมืองในระบอบประชาธิปไตย
explanation: |
  ข้อความอธิบายว่าการทำงานแบบประชาธิปไตยไม่สามารถอนุญาตให้มีการจัดการที่ยั่งยืนของกระบวนการผลิตและการกระจายสินค้าได้ อำนาจการปกครองที่ถาวรกลายเป็นสิ่งจำเป็น และคอมมิวนิสต์ไม่สามารถยอมรับให้อำนาจนี้ถูกโอนไปยังฝ่ายตรงข้ามของระบบได้ สิ่งนี้สร้างความขัดแย้งโดยธรรมชาติระหว่างการโอนอำนาจแบบประชาธิปไตยและความจำเป็นในการควบคุมแบบเผด็จการอย่างต่อเนื่องเหนือกระบวนการทางเศรษฐกิจ ตัวเลือกอื่น ๆ มุ่งเน้นไปที่ข้อจำกัดในทางปฏิบัติมากกว่าความไม่ลงรอยกันทางการเมืองพื้นฐานนี้
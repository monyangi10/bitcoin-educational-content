question: According to the liberal analysis, why does democratic political functioning become impossible to maintain under a communist economic system?
answer: Because managing production and distribution processes requires permanent authoritarian control that cannot risk being transferred to system opponents
wrong_answers:
  - Because workers become too focused on economic planning to participate effectively in democratic processes and political decision-making
  - Because the complexity of coordinating economic activities leaves no time for political debates and democratic consultation procedures
  - Because collective ownership eliminates individual property rights which are the necessary foundation for any democratic political participation
explanation: |
  The text explains that democratic functioning cannot allow for sustainable management of production and distribution processes. A permanent tutelary power becomes indispensable, and communists cannot accept that this power be transferred to adversaries of the system. This creates an inherent contradiction between democratic transfer of power and the need for continuous authoritarian control over economic processes. The other options focus on practical constraints rather than this fundamental political incompatibility.
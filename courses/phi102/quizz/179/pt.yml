question: De acordo com a análise liberal, por que razão o funcionamento político democrático se torna impossível de manter num sistema económico comunista?
answer: Porque a gestão dos processos de produção e de distribuição exige um controlo autoritário permanente que não pode correr o risco de ser transferido para os adversários do sistema
wrong_answers:
  - Porque os trabalhadores se concentram demasiado no planeamento económico para participarem efetivamente nos processos democráticos e na tomada de decisões políticas
  - Porque a complexidade da coordenação das actividades económicas não deixa tempo para debates políticos e processos de consulta democrática
  - Porque a propriedade colectiva elimina os direitos de propriedade individuais, que são a base necessária para qualquer participação política democrática
explanation: |
  O texto explica que o funcionamento democrático não pode permitir uma gestão sustentável dos processos de produção e de distribuição. Torna-se indispensável um poder tutelar permanente, e os comunistas não podem aceitar que esse poder seja transferido para os adversários do sistema. Cria-se assim uma contradição inerente entre a transferência democrática do poder e a necessidade de um controlo autoritário permanente dos processos económicos. As outras opções centram-se mais nos condicionalismos práticos do que nesta incompatibilidade política fundamental.
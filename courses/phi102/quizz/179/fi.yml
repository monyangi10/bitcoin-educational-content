question: Miksi liberaalin analyysin mukaan demokraattista poliittista toimintaa on mahdotonta ylläpitää kommunistisessa talousjärjestelmässä?
answer: Koska tuotanto- ja jakeluprosessien hallinta edellyttää jatkuvaa autoritaarista valvontaa, jota ei voida vaarantaa siirtämällä sitä järjestelmän vastustajille
wrong_answers:
  - Koska työntekijät keskittyvät liikaa talouden suunnitteluun osallistuakseen tehokkaasti demokraattisiin prosesseihin ja poliittiseen päätöksentekoon
  - Koska taloudellisen toiminnan koordinoinnin monimutkaisuus ei jätä aikaa poliittisille keskusteluille ja demokraattisille kuulemismenettelyille
  - Koska yhteisomistus poistaa yksilön omistusoikeudet, jotka ovat demokraattisen poliittisen osallistumisen välttämätön perusta
explanation: |
  Tekstissä selitetään, että demokraattinen toiminta ei voi mahdollistaa tuotanto- ja jakeluprosessien kestävää hallintaa. Pysyvä holhousvalta tulee välttämättömäksi, eivätkä kommunistit voi hyväksyä, että tämä valta siirretään järjestelmän vastustajille. Tämä luo luontaisen ristiriidan demokraattisen vallansiirron ja talousprosessien jatkuvan autoritaarisen valvonnan tarpeen välille. Muissa vaihtoehdoissa keskitytään pikemminkin käytännön rajoituksiin kuin tähän perustavanlaatuiseen poliittiseen ristiriitaan.
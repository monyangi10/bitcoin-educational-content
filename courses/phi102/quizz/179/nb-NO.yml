question: Hvorfor blir det umulig å opprettholde en demokratisk politisk funksjon under et kommunistisk økonomisk system, ifølge den liberale analysen?
answer: Fordi styring av produksjons- og distribusjonsprosesser krever permanent autoritær kontroll som ikke kan risikere å bli overført til systemmotstandere
wrong_answers:
  - Fordi arbeiderne blir for fokusert på økonomisk planlegging til å delta effektivt i demokratiske prosesser og politiske beslutningsprosesser
  - Fordi kompleksiteten i koordineringen av økonomiske aktiviteter ikke gir tid til politiske debatter og demokratiske konsultasjonsprosedyrer
  - Fordi kollektivt eierskap eliminerer den individuelle eiendomsretten, som er det nødvendige grunnlaget for enhver demokratisk politisk deltakelse
explanation: |
  Teksten forklarer at en demokratisk funksjonsmåte ikke kan muliggjøre en bærekraftig styring av produksjons- og distribusjonsprosessene. En permanent formyndermakt blir uunnværlig, og kommunistene kan ikke akseptere at denne makten overføres til systemets motstandere. Dette skaper en iboende motsetning mellom demokratisk maktoverføring og behovet for kontinuerlig autoritær kontroll over de økonomiske prosessene. De andre alternativene fokuserer på praktiske begrensninger snarere enn på denne grunnleggende politiske uforenligheten.
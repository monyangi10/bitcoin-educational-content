question: Theo phân tích của phe tự do, tại sao hoạt động chính trị dân chủ lại trở nên bất khả thi dưới một hệ thống kinh tế cộng sản?
answer: Vì việc quản lý các quy trình sản xuất và phân phối đòi hỏi sự kiểm soát độc đoán lâu dài mà không thể để mất vào tay những kẻ chống đối hệ thống.
wrong_answers:
  - Vì người lao động quá tập trung vào kế hoạch kinh tế mà không thể tham gia hiệu quả vào các quy trình dân chủ và việc ra quyết định chính trị.
  - Vì sự phức tạp trong việc điều phối các hoạt động kinh tế nên không còn thời gian cho các cuộc tranh luận chính trị và các thủ tục tham vấn dân chủ.
  - Bởi vì sở hữu tập thể loại bỏ quyền sở hữu cá nhân, vốn là nền tảng cần thiết cho bất kỳ sự tham gia chính trị dân chủ nào.
explanation: |
  Văn bản giải thích rằng hoạt động dân chủ không thể cho phép quản lý bền vững các quá trình sản xuất và phân phối. Một quyền lực giám hộ thường trực trở nên không thể thiếu, và những người cộng sản không thể chấp nhận việc chuyển giao quyền lực này cho những kẻ thù của hệ thống. Điều này tạo ra một mâu thuẫn cố hữu giữa việc chuyển giao quyền lực dân chủ và nhu cầu kiểm soát độc đoán liên tục đối với các quá trình kinh tế. Các lựa chọn khác tập trung vào những hạn chế thực tiễn hơn là sự bất tương thích chính trị cơ bản này.
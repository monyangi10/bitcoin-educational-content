question: Menurut analisis liberal, mengapa fungsi politik yang demokratis menjadi tidak mungkin dipertahankan di bawah sistem ekonomi komunis?
answer: Karena mengelola proses produksi dan distribusi membutuhkan kontrol otoriter permanen yang tidak dapat mengambil risiko ditransfer ke lawan sistem
wrong_answers:
  - Karena pekerja menjadi terlalu fokus pada perencanaan ekonomi untuk berpartisipasi secara efektif dalam proses demokrasi dan pengambilan keputusan politik
  - Karena kompleksitas koordinasi kegiatan ekonomi tidak menyisakan waktu untuk perdebatan politik dan prosedur konsultasi yang demokratis
  - Karena kepemilikan kolektif menghilangkan hak milik individu yang merupakan fondasi penting bagi partisipasi politik yang demokratis
explanation: |
  Teks tersebut menjelaskan bahwa fungsi demokrasi tidak dapat memungkinkan pengelolaan proses produksi dan distribusi yang berkelanjutan. Sebuah kekuasaan tutor yang permanen menjadi sangat diperlukan, dan komunis tidak dapat menerima bahwa kekuasaan ini dialihkan kepada musuh-musuh sistem. Hal ini menciptakan kontradiksi yang inheren antara pengalihan kekuasaan secara demokratis dan kebutuhan akan kontrol otoriter yang terus menerus terhadap proses-proses ekonomi. Pilihan-pilihan lain berfokus pada kendala-kendala praktis daripada ketidakcocokan politik yang mendasar ini.
question: Mis on liberaalse teooria kohaselt põhiline põhjus, miks riigimehhanismid on majandustegevuses struktuuriliselt puudulikud?
answer: Riigil puudub individuaalse algatuse ja ettevõtlikkuse alus, mis takistab isikliku huvi täielikku arengut
wrong_answers:
  - Riik tegutseb ebapiisavate rahaliste vahenditega võrreldes eraettevõtetega konkurentsivõimelistel turgudel
  - Riik võtab tööle töötajaid, kellel puuduvad erasektori spetsialistide tehnilised teadmised ja eriteadmised
  - Riik seisab silmitsi liigsete bürokraatlike regulatsioonidega, mis aeglustavad otsustusprotsesse võrreldes eraettevõtetega
explanation: |
  Liberaalne teooria väidab, et riigi struktuuriline puudus tuleneb tema põhimõttelisest võimetusest rakendada individuaalset algatust ja isiklikku huvi, mis on majandusliku tõhususe liikumapanev jõud. Erinevalt bürokraatlikust ebaefektiivsusest või ressursside piiratusest on see filosoofiline põhiprobleem: riik ei suuda jäljendada motivatsioonistruktuure, mis muudavad eraettevõtluse tõhusaks. Teised valikud kirjeldavad pigem sümptomeid või praktilisi probleeme kui struktuurseid põhjusi, mida liberaalsed mõtlejad peavad ületamatuks.
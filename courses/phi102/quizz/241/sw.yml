question: Nadharia huria inabainisha nini kama sababu ya msingi kwa nini mifumo ya serikali ina upungufu wa kimuundo katika shughuli za kiuchumi?
answer: Serikali haina msingi wa mpango wa mtu binafsi na biashara, hivyo kuzuia maslahi binafsi kukua kikamilifu
wrong_answers:
  - Serikali inafanya kazi bila rasilimali za kifedha za kutosha ikilinganishwa na makampuni binafsi katika masoko ya ushindani
  - Serikali inaajiri wafanyakazi ambao hawana utaalamu wa kiufundi na ujuzi maalum wa wataalamu wa sekta binafsi.
  - Jimbo linakabiliwa na kanuni nyingi za urasimu zinazopunguza kasi ya michakato ya kufanya maamuzi ikilinganishwa na makampuni binafsi
explanation: |
  Nadharia ya kiliberali inasema kwamba upungufu wa kimuundo wa serikali unatokana na kutoweza kwake kutumia mpango wa mtu binafsi na maslahi binafsi, ambayo ni nguvu zinazoendesha ufanisi wa kiuchumi. Tofauti na ukosefu wa ufanisi wa urasimu au mapungufu ya rasilimali, hii inawakilisha tatizo kuu la kifalsafa: serikali haiwezi kuiga miundo ya motisha inayofanya biashara binafsi iwe na ufanisi. Chaguzi zingine zinaelezea dalili au matatizo ya kiutendaji badala ya sababu ya msingi ya kimuundo ambayo wanafikra huria huitambua kama isiyoweza kushindwa.
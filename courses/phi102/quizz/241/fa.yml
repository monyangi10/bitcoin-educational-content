question: نظریه لیبرال به عنوان دلیل اساسی که چرا مکانیسم‌های دولتی در فعالیت‌های اقتصادی به‌طور ساختاری ناکارآمد هستند، چه چیزی را شناسایی می‌کند؟
answer: دولت فاقد بنیان ابتکار و کارآفرینی فردی است و این امر مانع از توسعه کامل منافع شخصی می‌شود.
wrong_answers:
  - دولت با منابع مالی ناکافی در مقایسه با شرکت‌های خصوصی در بازارهای رقابتی فعالیت می‌کند.
  - دولت کارگرانی را استخدام می‌کند که فاقد تخصص فنی و دانش تخصصی حرفه‌ای‌های بخش خصوصی هستند.
  - ایالت با مقررات بوروکراتیک بیش از حدی مواجه است که فرآیندهای تصمیم‌گیری را در مقایسه با شرکت‌های خصوصی کند می‌کند.
explanation: |
  نظریه لیبرال استدلال می‌کند که نقص ساختاری دولت ناشی از ناتوانی اساسی آن در بهره‌گیری از ابتکار فردی و منافع شخصی است، که نیروهای محرک کارایی اقتصادی هستند. برخلاف ناکارآمدی بوروکراتیک یا محدودیت‌های منابع، این یک مشکل فلسفی اساسی را نشان می‌دهد: دولت نمی‌تواند ساختارهای انگیزشی را که باعث اثربخشی بنگاه‌های خصوصی می‌شود، تکرار کند. گزینه‌های دیگر علائم یا مشکلات عملی را توصیف می‌کنند نه علت ساختاری زیربنایی که متفکران لیبرال آن را غیرقابل‌حل می‌دانند.
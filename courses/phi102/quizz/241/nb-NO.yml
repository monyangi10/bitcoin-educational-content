question: Hva er ifølge liberal teori den grunnleggende årsaken til at statlige mekanismer er strukturelt mangelfulle i økonomisk virksomhet?
answer: Staten mangler grunnlaget for individuelt initiativ og foretaksomhet, noe som hindrer personlige interesser i å utvikle seg fullt ut
wrong_answers:
  - Staten opererer med utilstrekkelige økonomiske ressurser sammenlignet med private bedrifter i konkurranseutsatte markeder
  - Staten ansetter arbeidstakere som mangler den tekniske ekspertisen og spesialkunnskapen som fagfolk i privat sektor har
  - Staten står overfor et omfattende byråkratisk regelverk som forsinker beslutningsprosessene sammenlignet med private selskaper
explanation: |
  Liberal teori hevder at statens strukturelle mangel skyldes dens grunnleggende manglende evne til å utnytte individuelt initiativ og personlig interesse, som er drivkreftene bak økonomisk effektivitet. I motsetning til byråkratisk ineffektivitet eller ressursbegrensninger representerer dette et filosofisk kjerneproblem: Staten kan ikke gjenskape de motivasjonsstrukturene som gjør privat virksomhet effektiv. De andre alternativene beskriver symptomer eller praktiske problemer snarere enn den underliggende strukturelle årsaken som liberale tenkere identifiserer som uoverkommelig.
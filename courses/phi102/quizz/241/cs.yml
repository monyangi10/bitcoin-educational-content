question: Co liberální teorie označuje za základní důvod, proč jsou státní mechanismy v ekonomických aktivitách strukturálně nedostatečné?
answer: Stát postrádá základ individuální iniciativy a podnikavosti, což brání plnému rozvoji osobního zájmu
wrong_answers:
  - Stát disponuje nedostatečnými finančními zdroji ve srovnání se soukromými podniky na konkurenčních trzích
  - Stát zaměstnává pracovníky, kteří nemají technickou odbornost a specializované znalosti odborníků ze soukromého sektoru
  - Stát se potýká s nadměrnou byrokratickou regulací, která zpomaluje rozhodovací procesy ve srovnání se soukromými společnostmi
explanation: |
  Liberální teorie tvrdí, že strukturální nedostatek státu pramení z jeho zásadní neschopnosti využít individuální iniciativu a osobní zájem, které jsou hnací silou ekonomické efektivnosti. Na rozdíl od byrokratické neefektivnosti nebo omezených zdrojů představuje tento problém základní filozofický problém: stát nemůže replikovat motivační struktury, které činí soukromé podnikání efektivním. Ostatní možnosti popisují spíše symptomy nebo praktické problémy než základní strukturální příčinu, kterou liberální myslitelé označují za nepřekonatelnou.
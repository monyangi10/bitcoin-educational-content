question: Lý thuyết tự do chỉ ra nguyên nhân cơ bản nào khiến các cơ chế nhà nước có những thiếu sót về mặt cấu trúc trong các hoạt động kinh tế?
answer: Nhà nước thiếu nền tảng của sáng kiến và tinh thần doanh nghiệp cá nhân, ngăn cản sự phát triển đầy đủ của lợi ích cá nhân.
wrong_answers:
  - So với các doanh nghiệp tư nhân trong thị trường cạnh tranh, nhà nước hoạt động với nguồn tài chính không đủ.
  - Nhà nước sử dụng lao động thiếu chuyên môn kỹ thuật và kiến thức chuyên ngành như các chuyên gia trong khu vực tư nhân.
  - Nhà nước phải đối mặt với các quy định hành chính rườm rà, làm chậm quá trình ra quyết định so với các công ty tư nhân.
explanation: |
  Lý thuyết tự do cho rằng sự thiếu hụt về cấu trúc của nhà nước bắt nguồn từ sự bất lực cơ bản trong việc khai thác sáng kiến cá nhân và lợi ích cá nhân, vốn là động lực thúc đẩy hiệu quả kinh tế. Không giống như sự kém hiệu quả của bộ máy quan liêu hay những hạn chế về nguồn lực, đây là một vấn đề triết học cốt lõi: nhà nước không thể sao chép các cấu trúc động lực làm cho doanh nghiệp tư nhân hoạt động hiệu quả. Các lựa chọn khác mô tả các triệu chứng hoặc các vấn đề thực tiễn hơn là nguyên nhân cấu trúc cơ bản mà các nhà tư tưởng tự do xác định là không thể vượt qua.
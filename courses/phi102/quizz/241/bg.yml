question: Коя е основната причина, която либералната теория определя като структурен недостатък на държавните механизми в икономическите дейности?
answer: Държавата не разполага с основата на индивидуалната инициатива и предприемчивост, което пречи на личния интерес да се развие пълноценно
wrong_answers:
  - Държавата оперира с недостатъчни финансови ресурси в сравнение с частните предприятия на конкурентни пазари
  - Държавата наема работници, които не разполагат с техническия опит и специализираните знания на специалистите от частния сектор
  - Държавата е изправена пред прекомерни бюрократични разпоредби, които забавят процесите на вземане на решения в сравнение с частните компании
explanation: |
  Либералната теория твърди, че структурният недостатък на държавата се дължи на нейната основна неспособност да използва индивидуалната инициатива и личния интерес, които са движещите сили на икономическата ефективност. За разлика от бюрократичната неефективност или ограничеността на ресурсите, това представлява основен философски проблем: държавата не може да възпроизведе мотивационните структури, които правят частните предприятия ефективни. Другите варианти описват симптоми или практически проблеми, а не основната структурна причина, която либералните мислители определят като непреодолима.
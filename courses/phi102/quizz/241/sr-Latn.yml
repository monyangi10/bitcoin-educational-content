question: Koji je osnovni razlog zbog kojeg liberalna teorija smatra da su državni mehanizmi strukturno manjkavi u ekonomskim aktivnostima?
answer: Država nema temelje individualne inicijative i preduzetništva, što sprečava da se lični interes u potpunosti razvije.
wrong_answers:
  - Država posluje sa nedovoljnim finansijskim resursima u poređenju sa privatnim preduzećima na konkurentnim tržištima
  - Država zapošljava radnike koji nemaju tehničku stručnost i specijalizovano znanje kao profesionalci u privatnom sektoru.
  - Država se suočava sa prekomernim birokratskim propisima koji usporavaju procese donošenja odluka u poređenju sa privatnim kompanijama.
explanation: |
  Liberalna teorija tvrdi da strukturni nedostatak države proizlazi iz njene fundamentalne nesposobnosti da iskoristi individualnu inicijativu i lični interes, koji su pokretačke snage ekonomske efikasnosti. Za razliku od birokratske neefikasnosti ili ograničenja resursa, ovo predstavlja suštinski filozofski problem: država ne može replicirati motivacione strukture koje čine privatno preduzeće efikasnim. Ostale opcije opisuju simptome ili praktične probleme, a ne osnovni strukturni uzrok koji liberalni mislioci smatraju nepremostivim.
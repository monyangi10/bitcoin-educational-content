question: Mikä on liberaalin teorian mukaan perussyy siihen, että valtiolliset mekanismit ovat rakenteellisesti puutteellisia taloudellisessa toiminnassa?
answer: Valtiolta puuttuu yksilön aloitteellisuuden ja yritteliäisyyden perusta, mikä estää henkilökohtaisen edun täysimääräisen kehittymisen
wrong_answers:
  - Valtion taloudelliset resurssit ovat riittämättömät verrattuna yksityisiin yrityksiin kilpailluilla markkinoilla
  - Valtio työllistää työntekijöitä, joilla ei ole yksityisen sektorin ammattilaisten teknistä asiantuntemusta ja erityistietämystä
  - Valtion byrokraattinen sääntely on liiallinen ja hidastaa päätöksentekoprosesseja yksityisiin yrityksiin verrattuna
explanation: |
  Liberalistisen teorian mukaan valtion rakenteellinen puute johtuu sen perustavanlaatuisesta kyvyttömyydestä valjastaa yksilön aloitteellisuus ja henkilökohtainen etu, jotka ovat taloudellisen tehokkuuden liikkeellepanevia voimia. Toisin kuin byrokratian tehottomuus tai resurssien rajallisuus, tämä on filosofinen ydinongelma: valtio ei pysty jäljittelemään motivaatiorakenteita, jotka tekevät yksityisyrityksistä tehokkaita. Muut vaihtoehdot kuvaavat pikemminkin oireita tai käytännön ongelmia kuin taustalla olevia rakenteellisia syitä, joita liberaalit ajattelijat pitävät ylitsepääsemättöminä.
question: Co teoria liberalna identyfikuje jako podstawowy powód, dla którego mechanizmy państwowe są strukturalnie niewystarczające w działalności gospodarczej?
answer: Państwo nie ma podstaw dla indywidualnej inicjatywy i przedsiębiorczości, uniemożliwiając pełny rozwój osobistych interesów
wrong_answers:
  - Państwo działa z niewystarczającymi zasobami finansowymi w porównaniu z prywatnymi przedsiębiorstwami na konkurencyjnych rynkach
  - Państwo zatrudnia pracowników, którym brakuje wiedzy technicznej i specjalistycznej wiedzy profesjonalistów z sektora prywatnego
  - Państwo boryka się z nadmiernymi regulacjami biurokratycznymi, które spowalniają procesy decyzyjne w porównaniu z firmami prywatnymi
explanation: |
  Teoria liberalna argumentuje, że strukturalny niedobór państwa wynika z jego fundamentalnej niezdolności do okiełznania indywidualnej inicjatywy i osobistego interesu, które są siłą napędową efektywności gospodarczej. W przeciwieństwie do biurokratycznej nieefektywności lub ograniczeń zasobów, stanowi to podstawowy problem filozoficzny: państwo nie może replikować struktur motywacyjnych, które sprawiają, że prywatna przedsiębiorczość jest skuteczna. Pozostałe opcje opisują raczej symptomy lub praktyczne problemy, a nie leżące u ich podstaw przyczyny strukturalne, które liberalni myśliciele identyfikują jako niemożliwe do przezwyciężenia.
question: Ni igiki inyigisho y’ubwigenge yerekana ko ari yo mpamvu nyamukuru ituma uburyo bwa Leta bugira ubukene mu mibumbe mu bikorwa vy’ubutunzi?
answer: Leta ibura umushinge w’umugambi n’ubuhinga bw’umuntu ku giti ciwe, bikaba bibuza inyungu z’umuntu ku giti ciwe gutera imbere bimwe bishitse .
wrong_answers:
  - Leta ikora n'amahera adahagije ugereranyije n'ibigo vyigenga biri mu masoko y'amahiganwa .
  - Leta ikoresha abakozi badafise ubuhinga n'ubumenyi bwihariye nk'ubw'abahinga bo mu nzego z'abikorera ku giti cabo .
  - Leta ihanganye n’amategeko arenze urugero y’uburongozi atuma umuntu afata ingingo buhoro ugereranyije n’amashirahamwe yigenga .
explanation: |
  Ivyiyumviro vy’abanyagihugu bivuga ko ubukene bw’imiterere ya Leta buva ku kubura ubushobozi bwayo bw’ishimikiro bwo gukoresha umugambi w’umuntu ku giti ciwe n’inyungu z’umuntu ku giti ciwe, ari vyo bituma ubutunzi bugenda neza. Ivyo bitandukanye n’ukudakora neza kw’uburongozi canke ukudakora neza kw’ubutunzi, ivyo bigereranya ingorane nyamukuru ya filozofiya: Leta ntishobora gusubiramwo imiterere y’intumbero ituma amashirahamwe yigenga akora neza. Ayandi mahitamwo adondora ibimenyetso canke ingorane ziboneka aho kudondora imvo nyamukuru y’imiterere iyo abazirikana b’abanyagihugu babona ko idashobora gutorwa.
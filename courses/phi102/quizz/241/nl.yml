question: Wat is volgens de liberale theorie de fundamentele reden waarom staatsmechanismen structureel tekortschieten in economische activiteiten?
answer: De staat mist de basis voor individueel initiatief en ondernemerschap, waardoor persoonlijke belangen zich niet volledig kunnen ontwikkelen
wrong_answers:
  - De staat werkt met onvoldoende financiële middelen in vergelijking met particuliere ondernemingen in concurrerende markten
  - De staat heeft werknemers in dienst die de technische expertise en gespecialiseerde kennis van professionals uit de particuliere sector missen
  - De staat heeft te maken met buitensporige bureaucratische regels die het besluitvormingsproces vertragen in vergelijking met particuliere bedrijven
explanation: |
  De liberale theorie stelt dat de structurele tekortkoming van de staat voortkomt uit zijn fundamentele onvermogen om individueel initiatief en persoonlijk belang, de drijvende krachten achter economische efficiëntie, aan te wenden. In tegenstelling tot bureaucratische inefficiëntie of beperkte middelen, vertegenwoordigt dit een kernfilosofisch probleem: de staat kan de motivatiestructuren die privé-ondernemingen effectief maken niet repliceren. De andere opties beschrijven symptomen of praktische problemen in plaats van de onderliggende structurele oorzaak die liberale denkers als onoverkomelijk beschouwen.
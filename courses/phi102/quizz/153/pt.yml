question: Qual é a principal diferença entre a forma como os indivíduos sentem as consequências das suas escolhas nas relações contratuais e nas decisões políticas?
answer: Nos contratos, os indivíduos sentem diretamente os efeitos através da dor ou do prazer pessoal e podem modificar a sua conduta, enquanto as escolhas políticas são demasiado complexas e abrangentes para que os indivíduos possam medir os seus efeitos pessoais
wrong_answers:
  - Nos contratos, os indivíduos tomam decisões com base no voto da maioria, enquanto as decisões políticas são tomadas através da deliberação individual e da responsabilidade pessoal
  - Nos contratos, as consequências são impostas por autoridades externas, enquanto as decisões políticas permitem que os indivíduos escolham livremente e modifiquem o seu comportamento com base nos resultados
  - Nos contratos, os indivíduos não podem alterar os seus planos depois de se comprometerem, enquanto as decisões políticas oferecem uma flexibilidade contínua e a capacidade de se retirarem de acordos desfavoráveis
explanation: |
  O texto sublinha que as relações contratuais permitem aos indivíduos observar diretamente a sua realidade e sentir os efeitos das suas escolhas através da dor ou do prazer, o que lhes permite modificar livremente a sua conduta. Em contrapartida, as escolhas políticas são descritas como demasiado complexas e abrangentes para que os indivíduos possam medir os seus efeitos pessoais, o que torna o mecanismo de feedback muito menos direto e eficaz do que nas disposições contratuais voluntárias.
question: 在契约关系中，个人如何体验其选择的后果，与在政治决策中，个人如何体验其选择的后果，两者之间的主要区别是什么？
answer: 在合同中，个人通过个人的痛苦或快乐直接感受到影响，并能改变自己的行为，而政治选择则过于复杂和包罗万象，个人无法衡量其个人影响
wrong_answers:
  - 在合同中，个人根据多数票做出决定，而政治决定则通过个人审议和个人责任做出
  - 在合同中，后果是由外部当局强加的，而政治决策则允许个人根据结果自由选择和修改自己的行为
  - 在合同中，个人一旦承诺就不能改变计划，而政治决策则提供了持续的灵活性和退出不利安排的能力
explanation: |
  文中强调，契约关系允许个人直接观察自己的现实，并通过痛苦或快乐感受到自己选择的效果，使他们能够自由地修正自己的行为。相比之下，政治选择被描述得过于复杂和包罗万象，个人无法衡量其个人影响，因此反馈机制远不如自愿契约安排直接有效。
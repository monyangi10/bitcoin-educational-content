question: Jaký je klíčový rozdíl mezi tím, jak jednotlivci pociťují důsledky svých rozhodnutí ve smluvních vztazích a politických rozhodnutích?
answer: V případě smluv jednotlivci přímo pociťují dopady prostřednictvím osobní bolesti nebo potěšení a mohou změnit své chování, zatímco politická rozhodnutí jsou příliš složitá a obsáhlá na to, aby jednotlivci mohli měřit jejich osobní dopady
wrong_answers:
  - Ve smlouvách se jednotlivci rozhodují na základě většinového hlasování, zatímco politická rozhodnutí jsou přijímána na základě individuálního uvážení a osobní odpovědnosti
  - Ve smlouvách jsou důsledky vynucovány vnějšími orgány, zatímco politická rozhodnutí umožňují jednotlivcům svobodně se rozhodnout a změnit své chování na základě výsledků
  - Ve smlouvách nemohou jednotlivci své plány měnit, jakmile se k nim zaváží, zatímco politická rozhodnutí nabízejí neustálou flexibilitu a možnost odstoupit od nevýhodných ujednání
explanation: |
  Text zdůrazňuje, že smluvní vztahy umožňují jednotlivcům přímo pozorovat svou realitu a pociťovat důsledky svých rozhodnutí prostřednictvím bolesti nebo potěšení, což jim umožňuje svobodně měnit své chování. Naproti tomu politické volby jsou popisovány jako příliš složité a obsáhlé na to, aby jednotlivci mohli měřit jejich osobní účinky, takže mechanismus zpětné vazby je mnohem méně přímý a účinný než u dobrovolných smluvních ujednání.
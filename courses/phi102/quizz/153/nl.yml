question: Wat is het belangrijkste verschil tussen hoe individuen de gevolgen van hun keuzes ervaren in contractuele relaties versus politieke beslissingen?
answer: Bij contracten voelen individuen direct de effecten door persoonlijke pijn of plezier en kunnen ze hun gedrag aanpassen, terwijl politieke keuzes te complex en omvattend zijn voor individuen om de persoonlijke effecten te meten
wrong_answers:
  - In contracten nemen individuen beslissingen op basis van een meerderheid van stemmen, terwijl politieke beslissingen worden genomen op basis van individueel overleg en persoonlijke verantwoordelijkheid
  - Bij contracten worden de gevolgen opgelegd door externe autoriteiten, terwijl politieke beslissingen individuen in staat stellen om vrij te kiezen en hun gedrag aan te passen op basis van resultaten
  - In contracten kunnen individuen hun plannen niet meer veranderen als ze zich eenmaal hebben vastgelegd, terwijl politieke beslissingen continue flexibiliteit bieden en de mogelijkheid om zich terug te trekken uit ongunstige regelingen
explanation: |
  De tekst benadrukt dat contractuele relaties individuen in staat stellen om hun realiteit direct waar te nemen en de effecten van hun keuzes te voelen door pijn of plezier, waardoor ze hun gedrag vrijelijk kunnen aanpassen. Politieke keuzes daarentegen worden beschreven als te complex en omvattend voor individuen om hun persoonlijke effecten te kunnen meten, waardoor het feedbackmechanisme veel minder direct en effectief is dan in vrijwillige contractuele regelingen.
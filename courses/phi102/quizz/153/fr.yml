question: Quelle est la différence essentielle entre la manière dont les individus subissent les conséquences de leurs choix dans les relations contractuelles et les décisions politiques ?
answer: Dans les contrats, les individus ressentent directement les effets à travers la douleur ou le plaisir personnel et peuvent modifier leur conduite, alors que les choix politiques sont trop complexes et englobants pour que les individus puissent mesurer leurs effets personnels
wrong_answers:
  - Dans les contrats, les individus prennent des décisions sur la base d'un vote à la majorité, tandis que les décisions politiques sont prises sur la base d'une délibération individuelle et d'une responsabilité personnelle
  - Dans les contrats, les conséquences sont imposées par des autorités externes, alors que les décisions politiques permettent aux individus de choisir librement et de modifier leur comportement en fonction des résultats
  - Dans les contrats, les individus ne peuvent pas modifier leurs plans une fois qu'ils se sont engagés, alors que les décisions politiques offrent une flexibilité continue et la possibilité de se retirer d'arrangements défavorables
explanation: |
  Le texte souligne que les relations contractuelles permettent aux individus d'observer directement leur réalité et de ressentir les effets de leurs choix par la douleur ou le plaisir, ce qui leur permet de modifier librement leur conduite. En revanche, les choix politiques sont décrits comme trop complexes et trop vastes pour que les individus puissent en mesurer les effets personnels, ce qui rend le mécanisme de rétroaction beaucoup moins direct et efficace que dans les accords contractuels volontaires.
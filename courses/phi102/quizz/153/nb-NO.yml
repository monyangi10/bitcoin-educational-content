question: Hva er den viktigste forskjellen mellom hvordan individer opplever konsekvensene av sine valg i kontraktsforhold og politiske beslutninger?
answer: I kontrakter føler individene effektene direkte gjennom personlig smerte eller glede og kan endre sin atferd, mens politiske valg er for komplekse og omfattende til at individene kan måle de personlige effektene
wrong_answers:
  - I kontrakter tar enkeltpersoner beslutninger basert på flertallsavstemninger, mens politiske beslutninger tas gjennom individuelle overveielser og personlig ansvar
  - I kontrakter pålegges konsekvensene av eksterne myndigheter, mens politiske beslutninger tillater individer å velge fritt og endre sin atferd basert på resultater
  - I kontrakter kan ikke enkeltpersoner endre planene sine når de først har forpliktet seg, mens politiske beslutninger gir kontinuerlig fleksibilitet og mulighet til å trekke seg fra ugunstige ordninger
explanation: |
  Teksten legger vekt på at kontraktsrelasjoner gjør det mulig for individer å observere virkeligheten direkte og føle effekten av valgene sine gjennom smerte eller glede, noe som gjør det mulig for dem å endre sin atferd fritt. Politiske valg beskrives derimot som for komplekse og omfattende til at enkeltpersoner kan måle de personlige effektene av dem, noe som gjør tilbakemeldingsmekanismen mye mindre direkte og effektiv enn i frivillige kontraktsordninger.
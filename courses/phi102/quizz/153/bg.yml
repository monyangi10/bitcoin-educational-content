question: Каква е основната разлика между начина, по който хората преживяват последиците от своя избор в договорните отношения, и политическите решения?
answer: При договорите индивидите директно усещат последиците чрез лична болка или удоволствие и могат да променят поведението си, докато политическият избор е твърде сложен и всеобхватен, за да могат индивидите да измерят личните му последици
wrong_answers:
  - При договорите хората вземат решения въз основа на гласовете на мнозинството, докато политическите решения се вземат чрез индивидуално обмисляне и лична отговорност
  - При договорите последствията се налагат от външни органи, докато политическите решения позволяват на хората да избират свободно и да променят поведението си въз основа на резултатите
  - При договорите хората не могат да променят плановете си, след като веднъж са се ангажирали, докато политическите решения предлагат постоянна гъвкавост и възможност за оттегляне от неизгодни споразумения
explanation: |
  В текста се подчертава, че договорните отношения позволяват на индивидите да наблюдават пряко своята реалност и да усещат последиците от своя избор чрез болка или удоволствие, което им позволява да променят свободно своето поведение. За разлика от тях политическият избор е описан като твърде сложен и всеобхватен, за да могат индивидите да измерват личните си ефекти, което прави механизма за обратна връзка много по-малко пряк и ефективен, отколкото при доброволните договорни отношения.
question: بر اساس تحلیل قرون وسطایی نیکلاس اورسمه، پیامد اصلی زمانی که مقامات سیاسی به‌طور خودسرانه محتوای واحدهای پولی را تغییر می‌دهند چیست؟
answer: این باعث تورم می‌شود و با نامشخص کردن سیگنال پولی، قیمت‌ها را بی‌ثبات می‌کند.
wrong_answers:
  - این امر با نشان دادن اقتدار حاکمیتی بر ارز، روابط تجاری بین‌المللی را تقویت می‌کند.
  - این امر با امکان جمع‌آوری کارآمدتر مالیات‌ها و خراج‌ها، بدهی دولت را کاهش می‌دهد.
  - این امر با حفظ کنترل دقیق بر سیاست پولی داخلی، از سفته‌بازی خارجی جلوگیری می‌کند.
explanation: |
  اورسمه تشخیص داد که وقتی حاکمان به‌طور خودسرانه محتوای فلزی یا ارزش پول را تغییر می‌دهند، این امر باعث ایجاد عدم اطمینان در سیستم پولی می‌شود. این عدم اطمینان مکانیزم قیمت را مختل می‌کند زیرا بازرگانان و تجار نمی‌توانند به معیارهای ثابت ارزش تکیه کنند. تورم ناشی از این وضعیت به دلیل غیرقابل اعتماد شدن سیگنال پولی رخ می‌دهد و باعث می‌شود شرکت‌کنندگان در بازار نتوانند به‌طور دقیق قیمت کالاها و خدمات را تعیین کنند. گزینه‌های دیگر به‌اشتباه نتایج مثبتی از دستکاری پولی پیشنهاد می‌دهند، در حالی که تحلیل اورسمه به‌طور خاص بر اثرات مضر چنین اقداماتی بر ثبات تجاری تمرکز داشت.
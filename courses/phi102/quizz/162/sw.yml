question: Kulingana na uchambuzi wa enzi za kati wa Nicolas Oresme, ni nini matokeo ya msingi wakati mamlaka za kisiasa zinapobadilisha kiholela maudhui ya vitengo vya fedha?
answer: Husababisha mfumuko wa bei na kudhoofisha bei kwa kufanya ishara ya fedha kutokuwa na uhakika
wrong_answers:
  - Inaimarisha uhusiano wa kibiashara wa kimataifa kwa kuonyesha mamlaka huru juu ya sarafu
  - Inapunguza deni la serikali kwa kuruhusu ukusanyaji bora wa kodi na kodi
  - Inazuia uvumi wa kigeni kwa kudumisha udhibiti mkali wa sera ya fedha ya ndani
explanation: |
  Oresme alibainisha kwamba watawala wanapobadilisha kiholela kiwango cha metali au thamani ya pesa, husababisha kutokuwa na uhakika katika mfumo wa fedha. Kutokuwa na uhakika huku huvuruga utaratibu wa bei kwa sababu wafanyabiashara na wafanyabiashara hawawezi kutegemea vipimo thabiti vya thamani. Mfumuko wa bei unaotokana hutokea kwa sababu ishara ya fedha inakuwa isiyoaminika, na kufanya iwe vigumu kwa washiriki wa soko kupanga bei kwa usahihi bidhaa na huduma. Chaguzi zingine zinaonyesha kimakosa matokeo chanya kutokana na udanganyifu wa fedha, wakati uchambuzi wa Oresme ulilenga haswa athari mbaya za vitendo hivyo kwenye utulivu wa kibiashara.
question: Zgodnie ze średniowieczną analizą Nicolasa Oresme, jaka jest główna konsekwencja arbitralnej modyfikacji zawartości jednostek monetarnych przez władze polityczne?
answer: Powoduje inflację i destabilizuje ceny, czyniąc sygnał monetarny niepewnym
wrong_answers:
  - Wzmacnia międzynarodowe relacje handlowe, demonstrując suwerenną władzę nad walutą
  - Zmniejsza dług publiczny, umożliwiając bardziej efektywne pobieranie podatków i danin
  - Zapobiega spekulacjom zagranicznym, utrzymując ścisłą kontrolę nad krajową polityką pieniężną
explanation: |
  Oresme stwierdził, że gdy władcy arbitralnie zmieniają zawartość metalu lub wartość pieniądza, powoduje to niepewność w systemie monetarnym. Niepewność ta zakłóca mechanizm cenowy, ponieważ kupcy i handlowcy nie mogą polegać na stabilnych miernikach wartości. Wynikająca z tego inflacja pojawia się, ponieważ sygnał pieniężny staje się niewiarygodny, co utrudnia uczestnikom rynku dokładną wycenę towarów i usług. Pozostałe opcje błędnie sugerują pozytywne skutki manipulacji monetarnych, podczas gdy analiza Oresme koncentrowała się w szczególności na szkodliwym wpływie takich praktyk na stabilność handlową.
question: Enligt Nicolas Oresmes medeltida analys, vad är den främsta konsekvensen när politiska myndigheter godtyckligt ändrar innehållet i monetära enheter?
answer: Det skapar inflation och destabiliserar priserna genom att göra den monetära signalen osäker
wrong_answers:
  - Det stärker internationella handelsrelationer genom att visa på suverän auktoritet över valutan
  - Den minskar statsskulden genom att möjliggöra en mer effektiv uppbörd av skatter och avgifter
  - Den förhindrar utländska spekulationer genom att upprätthålla en strikt kontroll över den inhemska penningpolitiken
explanation: |
  Oresme konstaterade att när makthavare godtyckligt ändrar metallinnehållet eller värdet på pengar skapas osäkerhet i det monetära systemet. Denna osäkerhet stör prismekanismen eftersom köpmän och handlare inte kan förlita sig på stabila värdemätare. Inflation uppstår eftersom den monetära signalen blir otillförlitlig, vilket gör det svårt för marknadsaktörerna att korrekt prissätta varor och tjänster. De andra alternativen antyder felaktigt positiva resultat av penningmanipulation, när Oresmes analys specifikt fokuserade på de skadliga effekterna av sådana metoder på den kommersiella stabiliteten.
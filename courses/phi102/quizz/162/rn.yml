question: Dukurikije icegeranyo ca Nicolas Oresme co mu kinjana ca mbere, ni ingaruka nyamukuru iyihe iyo abategetsi ba politike bahinduye ata co bazi ibiri mu bice vy’amahera?
answer: Bituma ibiciro vyiyongera kandi bikaba bituma ibiciro bidashikama mu gutuma ikimenyetso c’amahera kidatomoye .
wrong_answers:
  - Ikomeza ubucuti bw'ubudandaji mpuzamakungu mu kwerekana ububasha bw'ubusegaba ku mafaranga .
  - Bigabanya umwenda wa Leta mu kwemera ko imisoro n'imisoro bishobora gukusanywa neza .
  - Bibuza amahanga gucuruza amafaranga mu kubungabunga cane politike y’amafaranga yo mu gihugu .
explanation: |
  Oresme yerekanye yuko iyo abategetsi bahinduye ata co bazi ivy’ivyuma canke agaciro k’amahera, bituma haba ukudakeka mu bijanye n’ubuhinga bw’amahera. Ukwo kudakeka guhungabanya uburyo bw’igiciro kubera ko abacuruzi n’abacuruzi badashobora kwizigira ingero zihamye z’agaciro. Ivyo bituma haba ugutera imbere kw’ibiciro kubera ko ikimenyetso c’amahera kidashobora kwizigirwa, bikaba bigora abaje mw’isoko gutanga igiciro c’ibintu n’ibikorwa neza. Ibindi bihitamwo bivuga mu buryo butari bwo ingaruka nziza zivuye mu gukoresha nabi amahera, mu gihe isesengura rya Oresme ryibanze canecane ku ngaruka mbi z’ivyo bikorwa ku gushikama kw’ubudandaji.
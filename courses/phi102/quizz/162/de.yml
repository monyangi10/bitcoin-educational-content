question: Was ist nach der mittelalterlichen Analyse von Nicolas Oresme die wichtigste Folge, wenn politische Behörden den Inhalt von Geldeinheiten willkürlich verändern?
answer: Sie erzeugt Inflation und destabilisiert die Preise, indem sie das Geldsignal unsicher macht
wrong_answers:
  - Sie stärkt die internationalen Handelsbeziehungen, indem sie die souveräne Autorität über die Währung demonstriert
  - Es reduziert die Staatsverschuldung, indem es eine effizientere Erhebung von Steuern und Abgaben ermöglicht
  - Sie verhindert ausländische Spekulationen, indem sie eine strenge Kontrolle über die inländische Geldpolitik ausübt
explanation: |
  Oresme stellte fest, dass die willkürliche Änderung des Metallgehalts oder des Wertes des Geldes durch die Herrscher zu Unsicherheit im Geldsystem führt. Diese Ungewissheit stört den Preismechanismus, da sich Kaufleute und Händler nicht auf stabile Wertmaßstäbe verlassen können. Die daraus resultierende Inflation entsteht, weil das Geldsignal unzuverlässig wird, was es den Marktteilnehmern erschwert, die Preise für Waren und Dienstleistungen genau zu bestimmen. Die anderen Optionen suggerieren fälschlicherweise positive Auswirkungen von Währungsmanipulationen, während sich die Analyse von Oresme speziell auf die schädlichen Auswirkungen solcher Praktiken auf die Handelsstabilität konzentriert.
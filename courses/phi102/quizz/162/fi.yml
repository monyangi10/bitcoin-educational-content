question: Mikä on Nicolas Oresmen keskiaikaisen analyysin mukaan ensisijainen seuraus siitä, että poliittiset viranomaiset muuttavat mielivaltaisesti rahayksiköiden sisältöä?
answer: Se aiheuttaa inflaatiota ja horjuttaa hintoja tekemällä rahapoliittisen signaalin epävarmaksi
wrong_answers:
  - Se vahvistaa kansainvälisiä kauppasuhteita osoittamalla suvereenia valuuttavaltaa
  - Se vähentää valtion velkaa, koska se mahdollistaa tehokkaamman verojen ja maksujen keräämisen
  - Se estää ulkomaisen keinottelun pitämällä tiukasti kurissa kotimaista rahapolitiikkaa
explanation: |
  Oresme totesi, että kun hallitsijat muuttavat mielivaltaisesti rahan metallipitoisuutta tai arvoa, se luo epävarmuutta rahajärjestelmään. Tämä epävarmuus häiritsee hintamekanismia, koska kauppiaat ja elinkeinonharjoittajat eivät voi luottaa vakaaseen arvon mittaamiseen. Seurauksena on inflaatio, koska rahasignaali muuttuu epäluotettavaksi, jolloin markkinatoimijoiden on vaikea hinnoitella tavaroita ja palveluja tarkasti. Muissa vaihtoehdoissa annetaan virheellisesti ymmärtää rahapolitiikan manipuloinnin myönteisiä vaikutuksia, vaikka Oresmen analyysissä keskityttiin nimenomaan tällaisten käytäntöjen haitallisiin vaikutuksiin kaupan vakaudelle.
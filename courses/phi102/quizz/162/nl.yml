question: Wat is volgens de middeleeuwse analyse van Nicolas Oresme het belangrijkste gevolg als politieke autoriteiten willekeurig de inhoud van monetaire eenheden wijzigen?
answer: Het veroorzaakt inflatie en destabiliseert prijzen door het monetaire signaal onzeker te maken
wrong_answers:
  - Het versterkt internationale handelsrelaties door soeverein gezag over valuta uit te stralen
  - Het verlaagt de staatsschuld door een efficiëntere inning van belastingen en heffingen mogelijk te maken
  - Het voorkomt buitenlandse speculatie door strikte controle te houden over het binnenlandse monetaire beleid
explanation: |
  Oresme stelde vast dat wanneer heersers willekeurig de metaalinhoud of waarde van geld veranderen, dit onzekerheid creëert in het monetaire systeem. Deze onzekerheid verstoort het prijsmechanisme omdat kooplieden en handelaren niet kunnen vertrouwen op stabiele waardemaatstaven. De resulterende inflatie ontstaat omdat het monetaire signaal onbetrouwbaar wordt, waardoor het voor marktdeelnemers moeilijk wordt om goederen en diensten accuraat te prijzen. De andere opties suggereren ten onrechte positieve resultaten van monetaire manipulatie, terwijl de analyse van Oresme zich specifiek richt op de schadelijke effecten van dergelijke praktijken op de commerciële stabiliteit.
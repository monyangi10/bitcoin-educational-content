question: De acordo com a análise medieval de Nicolas Oresme, qual é a principal consequência quando as autoridades políticas modificam arbitrariamente o conteúdo das unidades monetárias?
answer: Produz inflação e desestabiliza os preços ao tornar o sinal monetário incerto
wrong_answers:
  - Reforça as relações comerciais internacionais, demonstrando a autoridade soberana sobre a moeda
  - Reduz a dívida pública ao permitir uma cobrança mais eficiente de impostos e tributos
  - Evita a especulação estrangeira, mantendo um controlo rigoroso da política monetária nacional
explanation: |
  Oresme identificou que, quando os governantes alteram arbitrariamente o conteúdo metálico ou o valor da moeda, isso cria incerteza no sistema monetário. Esta incerteza perturba o mecanismo de preços porque os comerciantes não podem confiar em medidas de valor estáveis. A inflação resultante ocorre porque o sinal monetário se torna pouco fiável, dificultando a fixação exacta dos preços dos bens e serviços pelos participantes no mercado. As outras opções sugerem incorretamente resultados positivos da manipulação monetária, quando a análise da Oresme se centrou especificamente nos efeitos negativos de tais práticas para a estabilidade comercial.
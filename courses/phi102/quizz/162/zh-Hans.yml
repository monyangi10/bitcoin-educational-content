question: 根据尼古拉-奥雷斯姆的中世纪分析，当政治当局任意修改货币单位的内容时，主要后果是什么？
answer: 它使货币信号不确定，从而产生通货膨胀并破坏价格稳定
wrong_answers:
  - 它通过展示对货币的主权权威来加强国际贸易关系
  - 它能更有效地征收税款和贡品，从而减少政府债务
  - 通过严格控制国内货币政策，防止外国投机活动
explanation: |
  奥雷斯姆指出，当统治者任意改变货币的金属含量或价值时，就会给货币体系带来不确定性。这种不确定性破坏了价格机制，因为商人和贸易商无法依赖稳定的价值衡量标准。由于货币信号变得不可靠，市场参与者难以对商品和服务进行准确定价，从而导致通货膨胀。其他方案错误地暗示了货币操纵的积极结果，而 Oresme 的分析特别关注此类做法对商业稳定的有害影响。
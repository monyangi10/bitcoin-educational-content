question: ตามการวิเคราะห์ในยุคกลางของ Nicolas Oresme ผลที่ตามมาหลักเมื่อเจ้าหน้าที่ทางการเมืองปรับเปลี่ยนเนื้อหาของหน่วยเงินตราโดยพลการคืออะไร?
answer: มันก่อให้เกิดเงินเฟ้อและทำให้ราคาผันผวนโดยทำให้สัญญาณทางการเงินไม่แน่นอน
wrong_answers:
  - มันเสริมสร้างความสัมพันธ์ทางการค้าระหว่างประเทศโดยการแสดงอำนาจอธิปไตยเหนือสกุลเงิน
  - มันลดหนี้ของรัฐบาลโดยการอนุญาตให้มีการเก็บภาษีและส่วยอย่างมีประสิทธิภาพมากขึ้น
  - มันป้องกันการเก็งกำไรจากต่างประเทศโดยการควบคุมอย่างเข้มงวดนโยบายการเงินภายในประเทศ
explanation: |
  Oresme ระบุว่าเมื่อผู้ปกครองเปลี่ยนแปลงเนื้อหาของโลหะหรือมูลค่าของเงินอย่างตามอำเภอใจ มันจะสร้างความไม่แน่นอนในระบบการเงิน ความไม่แน่นอนนี้ทำให้กลไกราคาถูกรบกวนเพราะพ่อค้าและผู้ค้าจะไม่สามารถพึ่งพามาตรการที่มั่นคงของมูลค่าได้ อัตราเงินเฟ้อที่เกิดขึ้นเป็นผลมาจากสัญญาณทางการเงินที่ไม่น่าเชื่อถือ ทำให้ผู้เข้าร่วมตลาดประเมินราคาสินค้าและบริการได้ยาก ตัวเลือกอื่น ๆ ที่เสนอผลลัพธ์เชิงบวกจากการจัดการทางการเงินนั้นไม่ถูกต้อง เมื่อการวิเคราะห์ของ Oresme มุ่งเน้นไปที่ผลกระทบที่เป็นอันตรายของการปฏิบัติเช่นนี้ต่อเสถียรภาพทางการค้าโดยเฉพาะ
question: Prema srednjovekovnoj analizi Nikolasa Oresma, koja je glavna posledica kada političke vlasti proizvoljno menjaju sadržaj monetarnih jedinica?
answer: Proizvodi inflaciju i destabilizuje cene čineći monetarni signal neizvesnim
wrong_answers:
  - Jača međunarodne trgovinske odnose demonstrirajući suvereni autoritet nad valutom
  - Smanjuje državni dug omogućavajući efikasnije prikupljanje poreza i dažbina
  - Sprečava stranu špekulaciju održavanjem stroge kontrole nad domaćom monetarnom politikom
explanation: |
  Oresme je identifikovao da kada vladari proizvoljno menjaju metalni sadržaj ili vrednost novca, to stvara nesigurnost u monetarnom sistemu. Ova nesigurnost narušava mehanizam cena jer trgovci i trgovci ne mogu da se oslone na stabilne mere vrednosti. Rezultujuća inflacija se javlja jer monetarni signal postaje nepouzdan, što otežava učesnicima na tržištu da tačno odrede cene robe i usluga. Druge opcije pogrešno sugerišu pozitivne ishode monetarne manipulacije, dok se Oresmeova analiza posebno fokusirala na štetne efekte takvih praksi na komercijalnu stabilnost.
question: Menurut analisis abad pertengahan Nicolas Oresme, apa konsekuensi utama ketika otoritas politik secara sewenang-wenang mengubah isi unit moneter?
answer: Ini menghasilkan inflasi dan mengacaukan harga dengan membuat sinyal moneter menjadi tidak pasti
wrong_answers:
  - Memperkuat hubungan perdagangan internasional dengan menunjukkan otoritas kedaulatan atas mata uang
  - Ini mengurangi utang pemerintah dengan memungkinkan pengumpulan pajak dan upeti yang lebih efisien
  - Mencegah spekulasi asing dengan mempertahankan kontrol yang ketat atas kebijakan moneter domestik
explanation: |
  Oresme mengidentifikasi bahwa ketika penguasa secara sewenang-wenang mengubah kandungan logam atau nilai uang, hal ini menciptakan ketidakpastian dalam sistem moneter. Ketidakpastian ini mengganggu mekanisme harga karena para pedagang dan pedagang tidak dapat mengandalkan ukuran nilai yang stabil. Inflasi yang dihasilkan terjadi karena sinyal moneter menjadi tidak dapat diandalkan, sehingga menyulitkan para pelaku pasar untuk menentukan harga barang dan jasa secara akurat. Opsi-opsi lain secara keliru menunjukkan hasil positif dari manipulasi moneter, padahal analisis Oresme secara khusus berfokus pada dampak berbahaya dari praktik-praktik semacam itu terhadap stabilitas komersial.
question: 니콜라스 오레스메의 중세 분석에 따르면, 정치 당국이 화폐 단위의 내용을 임의로 수정하면 어떤 주요 결과가 초래될까요?
answer: 통화 신호를 불확실하게 만들어 인플레이션을 유발하고 물가를 불안정하게 만듭니다
wrong_answers:
  - 통화에 대한 주권적 권한을 보여줌으로써 국제 무역 관계를 강화합니다
  - 세금과 공물을 보다 효율적으로 징수하여 정부 부채를 줄입니다
  - 국내 통화 정책에 대한 엄격한 통제를 유지하여 외국인 투기를 방지합니다
explanation: |
  오레스미는 통치자가 화폐의 금속 함량이나 가치를 임의로 변경하면 화폐 시스템에 불확실성이 생긴다는 사실을 발견했습니다. 이러한 불확실성은 상인과 거래자들이 안정적인 가치 측정에 의존할 수 없기 때문에 가격 메커니즘을 혼란에 빠뜨립니다. 결과적으로 인플레이션이 발생하는 이유는 통화 신호가 신뢰할 수 없게 되어 시장 참여자들이 상품과 서비스의 가격을 정확하게 책정하기 어렵기 때문입니다. 다른 옵션들은 통화 조작의 긍정적인 결과를 잘못 제시하고 있는데, 오레스미의 분석은 이러한 관행이 상업적 안정성에 미치는 해로운 영향에 초점을 맞췄습니다.
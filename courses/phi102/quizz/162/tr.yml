question: Nicolas Oresme'nin ortaçağ analizine göre, siyasi otoriteler parasal birimlerin içeriğini keyfi olarak değiştirdiğinde ortaya çıkan temel sonuç nedir?
answer: Enflasyon üretir ve parasal sinyali belirsiz hale getirerek fiyatları istikrarsızlaştırır
wrong_answers:
  - Para birimi üzerinde egemen otoriteyi göstererek uluslararası ticari ilişkileri güçlendirir
  - Vergi ve haraçların daha etkin bir şekilde toplanmasını sağlayarak devlet borcunu azaltır
  - Yurtiçi para politikası üzerinde sıkı kontrol sağlayarak yabancı spekülasyonları önler
explanation: |
  Oresme, yöneticiler paranın metalik içeriğini veya değerini keyfi olarak değiştirdiğinde, bunun parasal sistemde belirsizlik yarattığını tespit etmiştir. Bu belirsizlik fiyat mekanizmasını bozar çünkü tüccarlar ve tacirler istikrarlı değer ölçülerine güvenemezler. Sonuçta enflasyon ortaya çıkar çünkü parasal sinyal güvenilmez hale gelir ve piyasa katılımcılarının mal ve hizmetleri doğru bir şekilde fiyatlandırmasını zorlaştırır. Oresme'nin analizi özellikle bu tür uygulamaların ticari istikrar üzerindeki zararlı etkilerine odaklanırken, diğer seçenekler yanlış bir şekilde parasal manipülasyonun olumlu sonuçlarını öne sürmektedir.
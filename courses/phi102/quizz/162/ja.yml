question: ニコラ・オレズメの中世の分析によれば、政治当局が貨幣単位の内容を恣意的に変更した場合の主な結果は何か？
answer: インフレを引き起こし、金融シグナルを不確実なものにすることで物価を不安定にする。
wrong_answers:
  - 通貨に対する主権を示すことで、国際貿易関係を強化する。
  - 税金や年貢の効率的な徴収を可能にすることで、政府の債務を削減する。
  - 国内の金融政策を厳格に管理することで、海外からの投機を防ぐ。
explanation: |
  オレスメは、支配者が貨幣の金属含有量や価値を恣意的に変更すると、貨幣制度に不確実性が生じると指摘した。この不確実性は、商人やトレーダーが安定した価値の尺度に頼ることができないため、価格メカニズムを混乱させる。その結果、貨幣のシグナルが信頼できなくなり、市場参加者が財やサービスを正確に値付けすることが困難になるため、インフレが起こる。オレスメの分析では、このような慣行が商業の安定に及ぼす悪影響に特に焦点が当てられているにもかかわらず、他の選択肢は、金融操作によるポジティブな結果を誤って示唆している。
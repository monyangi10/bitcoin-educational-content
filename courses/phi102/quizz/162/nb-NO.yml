question: Hva er, ifølge Nicolas Oresmes middelalderanalyse, den primære konsekvensen av at politiske myndigheter vilkårlig endrer innholdet i pengeenheter?
answer: Det skaper inflasjon og destabiliserer prisene ved å gjøre det monetære signalet usikkert
wrong_answers:
  - Det styrker internasjonale handelsforbindelser ved å demonstrere suveren myndighet over valutaen
  - Det reduserer statsgjelden ved å muliggjøre en mer effektiv innkreving av skatter og avgifter
  - Den forhindrer utenlandsk spekulasjon ved å opprettholde streng kontroll over den innenlandske pengepolitikken
explanation: |
  Oresme identifiserte at når makthavere vilkårlig endrer pengenes metallinnhold eller verdi, skaper det usikkerhet i pengesystemet. Denne usikkerheten forstyrrer prismekanismen fordi kjøpmenn og handelsmenn ikke kan stole på stabile verdimål. Inflasjon oppstår fordi det monetære signalet blir upålitelig, noe som gjør det vanskelig for markedsaktørene å sette nøyaktige priser på varer og tjenester. De andre alternativene antyder feilaktig positive resultater av pengemanipulasjon, mens Oresmes analyse spesifikt fokuserer på de skadelige effektene slik praksis har på den kommersielle stabiliteten.
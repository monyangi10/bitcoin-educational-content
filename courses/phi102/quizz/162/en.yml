question: According to Nicolas Oresme's medieval analysis, what is the primary consequence when political authorities arbitrarily modify the content of monetary units?
answer: It produces inflation and destabilizes prices by making the monetary signal uncertain
wrong_answers:
  - It strengthens international trade relationships by demonstrating sovereign authority over currency
  - It reduces government debt by allowing more efficient collection of taxes and tributes
  - It prevents foreign speculation by maintaining strict control over domestic monetary policy
explanation: |
  Oresme identified that when rulers arbitrarily change the metallic content or value of money, it creates uncertainty in the monetary system. This uncertainty disrupts the price mechanism because merchants and traders cannot rely on stable measures of value. The resulting inflation occurs because the monetary signal becomes unreliable, making it difficult for market participants to accurately price goods and services. The other options incorrectly suggest positive outcomes from monetary manipulation, when Oresme's analysis specifically focused on the harmful effects of such practices on commercial stability.

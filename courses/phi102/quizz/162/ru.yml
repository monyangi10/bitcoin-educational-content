question: Согласно средневековому анализу Николя Оресме, что является главным последствием, когда политические власти произвольно изменяют содержание денежных единиц?
answer: Он порождает инфляцию и дестабилизирует цены, делая денежный сигнал неопределенным
wrong_answers:
  - Он укрепляет международные торговые отношения, демонстрируя суверенную власть над валютой
  - Он уменьшает государственный долг, позволяя более эффективно собирать налоги и подати
  - Предотвращает иностранные спекуляции, сохраняя строгий контроль над внутренней денежно-кредитной политикой
explanation: |
  Оресме определил, что когда правители произвольно меняют металлическое содержание или стоимость денег, это создает неопределенность в денежной системе. Эта неопределенность нарушает механизм ценообразования, поскольку купцы и торговцы не могут полагаться на стабильные показатели стоимости. В результате возникает инфляция, потому что денежный сигнал становится ненадежным, что затрудняет участникам рынка точное определение цен на товары и услуги. Другие варианты неверно предполагают положительные результаты от монетарных манипуляций, в то время как анализ Oresme специально сосредоточен на пагубном влиянии такой практики на коммерческую стабильность.
question: Selon l'analyse médiévale de Nicolas Oresme, quelle est la principale conséquence d'une modification arbitraire du contenu des unités monétaires par les autorités politiques ?
answer: Elle produit de l'inflation et déstabilise les prix en rendant le signal monétaire incertain
wrong_answers:
  - Elle renforce les relations commerciales internationales en démontrant l'autorité souveraine sur la monnaie
  - Il réduit la dette publique en permettant une collecte plus efficace des impôts et des taxes
  - Elle empêche la spéculation étrangère en maintenant un contrôle strict sur la politique monétaire nationale
explanation: |
  Oresme a constaté que lorsque les dirigeants modifient arbitrairement le contenu métallique ou la valeur de la monnaie, cela crée de l'incertitude dans le système monétaire. Cette incertitude perturbe le mécanisme des prix, car les marchands et les négociants ne peuvent pas s'appuyer sur des mesures stables de la valeur. L'inflation qui en résulte est due au fait que le signal monétaire n'est plus fiable et qu'il est difficile pour les acteurs du marché de fixer avec précision le prix des biens et des services. Les autres options suggèrent à tort des résultats positifs de la manipulation monétaire, alors que l'analyse d'Oresme se concentre spécifiquement sur les effets néfastes de telles pratiques sur la stabilité commerciale.
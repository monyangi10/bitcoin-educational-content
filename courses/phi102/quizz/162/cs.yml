question: Jaký je podle středověké analýzy Nicolase Oresmeho hlavní důsledek toho, když politické orgány svévolně mění obsah peněžních jednotek?
answer: Vyvolává inflaci a destabilizuje ceny tím, že činí měnový signál nejistým
wrong_answers:
  - Posiluje mezinárodní obchodní vztahy tím, že demonstruje svrchovanou autoritu nad měnou
  - Snižuje státní dluh tím, že umožňuje efektivnější výběr daní a poplatků
  - Brání zahraničním spekulacím tím, že udržuje přísnou kontrolu nad domácí měnovou politikou
explanation: |
  Oresme zjistil, že když vládci svévolně mění kovový obsah nebo hodnotu peněz, vytváří to v peněžním systému nejistotu. Tato nejistota narušuje cenový mechanismus, protože obchodníci a podnikatelé se nemohou spolehnout na stabilní měřítka hodnoty. V důsledku toho dochází k inflaci, protože peněžní signál se stává nespolehlivým, což účastníkům trhu ztěžuje přesné stanovení cen zboží a služeb. Ostatní varianty nesprávně naznačují pozitivní důsledky měnové manipulace, zatímco Oresmeho analýza se konkrétně zaměřila na škodlivé dopady těchto praktik na obchodní stabilitu.
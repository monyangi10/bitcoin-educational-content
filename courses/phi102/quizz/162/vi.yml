question: Theo phân tích thời trung cổ của Nicolas Oresme, hậu quả chính là gì khi chính quyền tự ý thay đổi nội dung của các đơn vị tiền tệ?
answer: Nó gây ra lạm phát và làm mất ổn định giá cả bằng cách làm cho tín hiệu tiền tệ trở nên không chắc chắn.
wrong_answers:
  - Nó củng cố các mối quan hệ thương mại quốc tế bằng cách thể hiện quyền lực tối cao đối với tiền tệ.
  - Nó giúp giảm nợ công bằng cách cho phép thu thuế và cống nạp hiệu quả hơn.
  - Nó ngăn chặn sự đầu cơ nước ngoài bằng cách duy trì sự kiểm soát chặt chẽ đối với chính sách tiền tệ trong nước.
explanation: |
  Oresme đã chỉ ra rằng khi các nhà cầm quyền tùy tiện thay đổi hàm lượng kim loại hoặc giá trị của tiền tệ, điều đó tạo ra sự bất ổn trong hệ thống tiền tệ. Sự bất ổn này làm gián đoạn cơ chế giá cả vì các thương nhân và người buôn bán không thể dựa vào các thước đo giá trị ổn định. Lạm phát xảy ra do tín hiệu tiền tệ trở nên không đáng tin cậy, khiến những người tham gia thị trường khó định giá chính xác hàng hóa và dịch vụ. Các lựa chọn khác đưa ra nhận định sai lầm về những kết quả tích cực từ việc thao túng tiền tệ, trong khi phân tích của Oresme tập trung cụ thể vào những tác hại của các hành vi đó đối với sự ổn định thương mại.
question: Secondo l'analisi medievale di Nicolas Oresme, qual è la principale conseguenza quando le autorità politiche modificano arbitrariamente il contenuto delle unità monetarie?
answer: Produce inflazione e destabilizza i prezzi rendendo incerto il segnale monetario
wrong_answers:
  - Rafforza le relazioni commerciali internazionali dimostrando l'autorità sovrana sulla valuta
  - Riduce il debito pubblico consentendo una più efficiente riscossione di tasse e tributi
  - Impedisce la speculazione estera mantenendo uno stretto controllo sulla politica monetaria interna
explanation: |
  Oresme ha individuato che quando i governanti cambiano arbitrariamente il contenuto metallico o il valore della moneta, si crea incertezza nel sistema monetario. L'incertezza altera il meccanismo dei prezzi perché i mercanti e i commercianti non possono contare su misure di valore stabili. L'inflazione che ne deriva è dovuta al fatto che il segnale monetario diventa inaffidabile, rendendo difficile per gli operatori di mercato prezzare accuratamente beni e servizi. Le altre opzioni suggeriscono erroneamente risultati positivi dalla manipolazione monetaria, mentre l'analisi di Oresme si è concentrata specificamente sugli effetti dannosi di tali pratiche sulla stabilità commerciale.
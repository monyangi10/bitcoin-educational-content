question: Според средновековния анализ на Никола Оресме каква е основната последица, когато политическите власти произволно променят съдържанието на паричните единици?
answer: Той предизвиква инфлация и дестабилизира цените, като прави паричния сигнал несигурен
wrong_answers:
  - Той укрепва международните търговски отношения, като демонстрира суверенна власт над валутата
  - Намалява държавния дълг, като позволява по-ефективно събиране на данъци и налози
  - Тя предотвратява чуждестранните спекулации, като поддържа строг контрол върху вътрешната парична политика
explanation: |
  Оресме установява, че когато управляващите произволно променят металното съдържание или стойността на парите, това създава несигурност в паричната система. Тази несигурност нарушава ценовия механизъм, тъй като търговците не могат да разчитат на стабилни измерители на стойността. В резултат на това възниква инфлация, тъй като паричният сигнал става ненадежден, което затруднява пазарните участници да определят точни цени на стоките и услугите. Другите варианти неправилно внушават положителни резултати от паричните манипулации, докато анализът на Oresme се фокусира конкретно върху вредните последици от подобни практики за търговската стабилност.
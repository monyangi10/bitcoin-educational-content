question: Según el análisis medieval de Nicolas Oresme, ¿cuál es la principal consecuencia cuando las autoridades políticas modifican arbitrariamente el contenido de las unidades monetarias?
answer: Produce inflación y desestabiliza los precios al hacer incierta la señal monetaria
wrong_answers:
  - Refuerza las relaciones comerciales internacionales al demostrar la autoridad soberana sobre la moneda
  - Reduce la deuda pública al permitir una recaudación más eficaz de impuestos y tributos
  - Evita la especulación extranjera manteniendo un estricto control de la política monetaria nacional
explanation: |
  Oresme identificó que cuando los gobernantes cambian arbitrariamente el contenido metálico o el valor del dinero, se crea incertidumbre en el sistema monetario. Esta incertidumbre perturba el mecanismo de los precios porque los comerciantes y mercaderes no pueden confiar en medidas estables del valor. La inflación resultante se produce porque la señal monetaria se vuelve poco fiable, lo que dificulta que los participantes en el mercado fijen con precisión el precio de los bienes y servicios. Las otras opciones sugieren incorrectamente resultados positivos de la manipulación monetaria, cuando el análisis de Oresme se centra específicamente en los efectos perjudiciales de tales prácticas sobre la estabilidad comercial.
question: 根據 Nicolas Oresme 的中世紀分析，當政治當局任意修改貨幣單位的內容時，主要的後果是什麼？
answer: 它會造成通貨膨脹，並透過使貨幣訊號不確定而使價格不穩定。
wrong_answers:
  - 它透過顯示對貨幣的主權來強化國際貿易關係
  - 它可以更有效率地收取稅金和貢獻，從而減少政府債務。
  - 透過嚴格控制國內貨幣政策，防止外國投機活動
explanation: |
  Oresme 認為，當統治者任意改變貨幣的金屬含量或價值時，就會在貨幣體系中產生不確定性。這種不確定性打亂了價格機制，因為商人和交易者無法依賴穩定的價值衡量。由於貨幣信號變得不可靠，市場參與者很難對商品和服務進行準確的定價，因此導致了通貨膨脹。其他選項錯誤地暗示貨幣操縱的正面結果，而 Oresme 的分析特別著重於這種做法對商業穩定的有害影響。
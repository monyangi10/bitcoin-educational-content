question: Milline on Nicolas Oresme'i keskaegse analüüsi kohaselt peamine tagajärg, kui poliitilised võimud muudavad meelevaldselt rahaühikute sisu?
answer: See tekitab inflatsiooni ja destabiliseerib hindu, muutes rahasignaali ebakindlaks
wrong_answers:
  - See tugevdab rahvusvahelisi kaubandussuhteid, näidates suveräänset võimu valuuta üle
  - See vähendab valitsemissektori võlga, võimaldades tõhusamalt koguda makse ja maksu
  - Ta takistab välisspekulatsioone, säilitades range kontrolli siseriikliku rahapoliitika üle
explanation: |
  Oresme tuvastas, et kui valitsejad muudavad omavoliliselt raha metallisisaldust või väärtust, tekitab see rahasüsteemis ebakindlust. See ebakindlus häirib hinnamehhanismi, sest kaupmehed ja kauplejad ei saa toetuda stabiilsetele väärtuse mõõdikutele. Sellest tulenev inflatsioon tekib, sest rahasignaal muutub ebausaldusväärseks, mis raskendab turuosalistel kaupade ja teenuste täpset hinnakujundust. Teised valikud viitavad ekslikult rahapoliitiliste manipulatsioonide positiivsetele tulemustele, kuigi Oresme analüüsis keskenduti konkreetselt selliste tavade kahjulikule mõjule kaubandusstabiilsusele.
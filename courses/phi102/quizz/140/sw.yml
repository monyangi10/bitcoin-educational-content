question: Kulingana na uchambuzi wa kodi za kutaifisha na kanuni za uvamizi, ni nini kinachotofautisha kodi halali na aina za zisizo za uhuru?
answer: Kodi halali hufadhili huduma za haki na polisi zinazohakikisha uhuru na usalama, huku kodi za kunyang'anywa zikifanya kazi kama kunyang'anywa halisi.
wrong_answers:
  - Kodi halali hukusanywa kupitia michakato ya kidemokrasia, huku kodi za kunyang'anywa zikitozwa na watendaji wasiochaguliwa.
  - Kodi halali zinatumika kwa usawa kwa raia wote, huku kodi za kunyang'anywa zikilenga makundi maalum ya kijamii au kiuchumi.
  - Kodi halali hufadhili huduma muhimu za umma kama vile elimu na huduma za afya, huku kodi za kunyang'anywa zikifadhili upanuzi wa kijeshi
explanation: |
  Maandishi yanatofautisha haswa kati ya kodi zinazotumika kufadhili haki na huduma za polisi - ambazo kwa kweli zinalinda uhuru na usalama - dhidi ya zile zinazofanya kazi kama unyang'anyi halisi. Kigezo muhimu si mchakato wa kidemokrasia, matumizi sawa, au huduma maalum zinazofadhiliwa, bali kama kodi hiyo inasaidia mfumo wa msingi unaowezesha uhuru (haki na usalama) au kama inanyang'anya mali na kuzuia uchaguzi wa mtu binafsi. Ushuru wa kunyang'anya unawakilisha aina tofauti ya kutokuwa na uhuru ambayo inadhoofisha haki za mali na uhuru wa mtu binafsi.
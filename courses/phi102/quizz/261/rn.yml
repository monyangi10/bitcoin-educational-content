question: Ni igiki inyigisho y’ubwigenge yerekana ko ari co kintu nyamukuru co kubona amahanga nk’ibigo bifise canke biganzwa n’abantu ku giti cabo?
answer: Bivuguruza ivyiyumviro vy’ukuri vy’uko ubushake bw’umuntu ku giti ciwe n’uguhimbarirwa ari vyo vy’ukuri vy’intango, atari ubushake canke ubutunzi rusangi .
wrong_answers:
  - Bibuza amahanga gutunganya neza ubutungane n’uburongozi bwa polisi mu mipaka y’intara zayo .
  - Bica bihungabanya uburenganzira bw’amateka amahanga yaronse biciye ku bumwe bw’imico kama n’ururimi mu gihe c’igihe .
  - Bica bigoyagoya urufatiro rw'amasezerano mu gutuma abantu bigenga cane ku buryo badashobora gukora amasezerano rusangi ahamye .
explanation: |
  Inyigisho y’ubwigenge yashikirijwe ishimika ku vy’uko ubushake bw’umuntu ku giti ciwe n’uguhimbarirwa ari ibintu vy’ukuri, mu gihe ubushake bw’abantu bose buva ku bindi kandi buva gusa biciye mu guhanahana n’amasezerano. Ico canditswe kivuga mu buryo butomoye yuko 'tudahimbarwa n'ibintu hamwe, tutagira ubushake bwo gukorana, ahubwo dufise ubushake bw'umuntu ku giti ciwe ari bwo bwacu bwite.' Iyo amahanga abonwa nk’ibigo bisumba ibindi bifise abantu ku giti cabo, ivyo birahindura ubucuti bukwiye kandi bikahakana uruhara rw’ishimikiro rw’ukwigenga kw’umuntu ku giti ciwe mu bijanye n’imitunganirize ya politike.
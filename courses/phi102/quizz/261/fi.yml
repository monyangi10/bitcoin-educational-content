question: Mikä on liberaalin opin mukaan perusvirhe siinä, että kansakuntia pidetään yksilöitä hallitsevina tai hallitsevina kokonaisuuksina?
answer: Se on ristiriidassa sen tosiasioihin perustuvan havainnon kanssa, että yksilön tahto ja nautinto ovat ensisijainen todellisuus, ei kollektiivinen tahto tai omistus
wrong_answers:
  - Se estää kansakuntia järjestämästä tehokkaasti oikeus- ja poliisihallintoa alueensa rajojen sisällä
  - Se heikentää historiallista legitiimiyttä, jonka kansakunnat ovat saavuttaneet kulttuurisen ja kielellisen yhtenäisyyden kautta aikojen kuluessa
  - Se heikentää sopimuspohjaa tekemällä yksilöistä liian itsenäisiä vakaiden työehtosopimusten muodostamiseksi
explanation: |
  Esitetyssä liberaalissa opissa korostetaan, että yksilön tahto ja nautinto ovat tosiasiallisia realiteetteja, kun taas kollektiivinen tahto on johdannainen ja syntyy vain vaihdon ja sopimuksen kautta. Tekstissä todetaan nimenomaisesti, että "emme nauti asioista kollektiivisesti, meillä ei ole synnynnäistä kollektiivista tahtoa, vaan pikemminkin yksilöllinen tahto, joka on meidän oma tahtomme" Kun kansakuntia pidetään ylivertaisina kokonaisuuksina, jotka omistavat yksilöitä, tämä kääntää oikean suhteen päinvastaiseksi ja kieltää yksilön autonomian perustavanlaatuisen roolin poliittisessa organisaatiossa.
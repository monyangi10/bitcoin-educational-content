question: Vad är enligt den liberala doktrinen det grundläggande felet med att betrakta nationer som enheter som äger eller dominerar individer?
answer: Det motsäger den faktiska observationen att individuell vilja och njutning är den primära verkligheten, inte kollektiv vilja eller besittning
wrong_answers:
  - Det hindrar nationer från att effektivt organisera rättsväsendet och polisväsendet inom sina territoriella gränser
  - Den undergräver den historiska legitimitet som nationer har förvärvat genom kulturell och språklig enhet över tiden
  - Det försvagar avtalsbasen genom att göra individerna alltför självständiga för att kunna ingå stabila kollektivavtal
explanation: |
  Den liberala doktrin som presenteras betonar att individuell vilja och njutning är faktiska realiteter, medan den kollektiva viljan är härledd och endast uppstår genom utbyte och avtal. I texten sägs uttryckligen att "vi njuter inte av saker kollektivt, vi har inte en medfödd kollektiv vilja, utan snarare en individuell vilja som är vår egen" När nationer betraktas som överordnade enheter som äger individer, vänder man på det rätta förhållandet och förnekar den grundläggande roll som individuell autonomi har i politisk organisation.
question: В чем, по мнению либеральной доктрины, заключается основной недостаток рассмотрения наций как субъектов, которые обладают или доминируют над людьми?
answer: Это противоречит фактическому наблюдению, согласно которому первичными являются индивидуальная воля и наслаждение, а не коллективная воля или обладание
wrong_answers:
  - Она не позволяет государствам эффективно организовывать правосудие и полицейское управление в пределах своих территориальных границ
  - Он подрывает историческую легитимность, которую нации приобрели благодаря культурному и языковому единству в течение долгого времени
  - Ослабляет договорную основу, делая людей слишком независимыми, чтобы они могли заключать стабильные коллективные соглашения
explanation: |
  В представленной либеральной доктрине подчеркивается, что индивидуальная воля и наслаждение являются фактическими реалиями, в то время как коллективная воля производна и возникает только в результате обмена и заключения договоров. В тексте прямо говорится, что "мы не наслаждаемся вещами коллективно, у нас нет врожденной коллективной воли, а скорее индивидуальная воля, которая является нашей собственной" Когда нации рассматриваются как высшие образования, обладающие индивидами, это меняет правильные отношения и отрицает основополагающую роль индивидуальной автономии в политической организации.
question: Hva er det den liberale doktrinen identifiserer som den grunnleggende feilen ved å betrakte nasjoner som enheter som besitter eller dominerer individer?
answer: Det strider mot den faktiske observasjonen at individuell vilje og nytelse er den primære virkeligheten, ikke kollektiv vilje eller besittelse
wrong_answers:
  - Den hindrer nasjoner i å organisere rettsvesen og politi effektivt innenfor sine territoriale grenser
  - Det undergraver den historiske legitimiteten som nasjoner har opparbeidet seg gjennom kulturell og språklig enhet over tid
  - Det svekker avtalegrunnlaget ved å gjøre enkeltpersoner for uavhengige til å inngå stabile kollektive avtaler
explanation: |
  Den liberale doktrinen som presenteres, legger vekt på at individuell vilje og nytelse er faktiske realiteter, mens den kollektive viljen er avledet og bare oppstår gjennom utveksling og kontrakt. Teksten sier eksplisitt at "vi nyter ikke ting kollektivt, vi har ikke en medfødt kollektiv vilje, men snarere en individuell vilje som er vår egen" Når nasjoner betraktes som overordnede enheter som besitter individer, snur man om på det riktige forholdet og benekter den grunnleggende rollen individuell autonomi har i politisk organisering.
question: Qual è il difetto fondamentale che la dottrina liberale individua nel considerare le nazioni come entità che possiedono o dominano gli individui?
answer: Contraddice la constatazione di fatto che la volontà e il godimento individuali sono la realtà primaria, non la volontà o il possesso collettivi
wrong_answers:
  - Impedisce alle nazioni di organizzare efficacemente l'amministrazione della giustizia e della polizia all'interno dei loro confini territoriali
  - Mina la legittimità storica che le nazioni hanno acquisito attraverso l'unità culturale e linguistica nel corso del tempo
  - Indebolisce la base contrattuale rendendo gli individui troppo indipendenti per formare accordi collettivi stabili
explanation: |
  La dottrina liberale presentata sottolinea che la volontà e il godimento individuali sono realtà di fatto, mentre la volontà collettiva è derivata ed emerge solo attraverso lo scambio e il contratto. Il testo afferma esplicitamente che "non godiamo delle cose collettivamente, non abbiamo una volontà collettiva innata, ma piuttosto una volontà individuale che è nostra" Quando le nazioni vengono viste come entità superiori che possiedono gli individui, si inverte il rapporto corretto e si nega il ruolo fondamentale dell'autonomia individuale nell'organizzazione politica.
question: Co doktryna liberalna określa jako fundamentalną wadę postrzegania narodów jako jednostek, które posiadają lub dominują nad jednostkami?
answer: Zaprzecza to faktycznemu spostrzeżeniu, że indywidualna wola i przyjemność są podstawową rzeczywistością, a nie zbiorowa wola czy posiadanie
wrong_answers:
  - Uniemożliwia narodom skuteczne organizowanie wymiaru sprawiedliwości i administracji policyjnej w ich granicach terytorialnych
  - Podważa to historyczną legitymację, którą narody uzyskały dzięki kulturowej i językowej jedności na przestrzeni czasu
  - Osłabia to podstawę umowną, czyniąc jednostki zbyt niezależnymi, aby tworzyć stabilne umowy zbiorowe
explanation: |
  Przedstawiona doktryna liberalna podkreśla, że indywidualna wola i przyjemność są rzeczywistością faktyczną, podczas gdy wola zbiorowa jest pochodną i pojawia się tylko poprzez wymianę i umowę. Tekst wyraźnie stwierdza, że "nie cieszymy się rzeczami zbiorowo, nie mamy wrodzonej woli zbiorowej, ale raczej indywidualną wolę, która jest naszą własną" Kiedy narody są postrzegane jako nadrzędne jednostki, które posiadają jednostki, odwraca to właściwą relację i zaprzecza fundamentalnej roli autonomii jednostki w organizacji politycznej.
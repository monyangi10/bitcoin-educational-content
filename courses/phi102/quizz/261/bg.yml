question: Какъв е основният недостатък на либералната доктрина, която разглежда нациите като субекти, които притежават или доминират над индивидите?
answer: То противоречи на фактическото наблюдение, че индивидуалната воля и удоволствие са основната реалност, а не колективната воля или притежание
wrong_answers:
  - Тя пречи на държавите да организират ефективно правосъдие и полицейска администрация в рамките на териториалните си граници
  - Тя подкопава историческата легитимност, която нациите са придобили чрез културно и езиково единство с течение на времето
  - Тя отслабва договорната основа, като прави хората твърде независими, за да могат да сключват стабилни колективни споразумения
explanation: |
  Представената либерална доктрина подчертава, че индивидуалната воля и удоволствие са фактически реалности, докато колективната воля е производна и се появява само чрез размяна и договор. В текста изрично се посочва, че "ние не се наслаждаваме на нещата колективно, нямаме вродена колективна воля, а по-скоро индивидуална воля, която е наша собствена" Когато на нациите се гледа като на висши субекти, които притежават индивиди, това обръща правилното отношение и отрича основополагащата роля на индивидуалната автономия в политическата организация.
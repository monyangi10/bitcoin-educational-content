question: دکترین لیبرال چه نقص اساسی را در دیدگاه‌هایی که ملت‌ها را به عنوان موجوداتی که افراد را در اختیار دارند یا بر آن‌ها تسلط دارند، شناسایی می‌کند؟
answer: این با مشاهده واقعی که اراده و لذت فردی واقعیت اصلی هستند، نه اراده یا مالکیت جمعی، در تضاد است.
wrong_answers:
  - این امر مانع از آن می‌شود که کشورها به طور مؤثر عدالت و اداره پلیس را در مرزهای سرزمینی خود سازماندهی کنند.
  - این امر مشروعیت تاریخی‌ای را که ملت‌ها از طریق وحدت فرهنگی و زبانی در طول زمان به دست آورده‌اند، تضعیف می‌کند.
  - این امر پایه قراردادی را تضعیف می‌کند زیرا افراد را بیش از حد مستقل می‌سازد تا بتوانند توافقات جمعی پایدار تشکیل دهند.
explanation: |
  دکترین لیبرال ارائه شده تأکید می‌کند که اراده و لذت فردی واقعیت‌های واقعی هستند، در حالی که اراده جمعی مشتق شده و تنها از طریق مبادله و قرارداد پدیدار می‌شود. متن به صراحت بیان می‌کند که «ما به صورت جمعی از چیزها لذت نمی‌بریم، ما اراده جمعی ذاتی نداریم، بلکه اراده فردی داریم که متعلق به خودمان است.» هنگامی که ملت‌ها به عنوان موجودیت‌های برتری که افراد را در اختیار دارند دیده می‌شوند، این رابطه صحیح را معکوس کرده و نقش بنیادی خودمختاری فردی در سازمان سیاسی را انکار می‌کند.
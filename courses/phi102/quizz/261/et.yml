question: Mis on liberaalse doktriini kohaselt põhiline viga selles, et rahvusi vaadeldakse kui üksusi, mis omavad või domineerivad üksikisikute üle?
answer: See on vastuolus faktilise tähelepanekuga, et individuaalne tahe ja nauding on esmane reaalsus, mitte kollektiivne tahe või valdamine
wrong_answers:
  - See takistab riikidel tõhusalt korraldada õigusemõistmist ja politseihaldust oma territoriaalsetes piirides
  - See õõnestab ajaloolist legitiimsust, mille rahvad on aja jooksul omandanud kultuurilise ja keelelise ühtsuse kaudu
  - See nõrgestab lepingulist alust, kuna muudab üksikisikud liiga sõltumatuks, et sõlmida stabiilseid kollektiivlepinguid
explanation: |
  Esitatud liberaalne doktriin rõhutab, et individuaalne tahe ja nauding on faktiline reaalsus, samas kui kollektiivne tahe on tuletatud ja tekib ainult vahetuse ja lepingu kaudu. Tekstis on sõnaselgelt öeldud, et "me ei naudi asju kollektiivselt, meil ei ole kaasasündinud kollektiivset tahet, vaid pigem individuaalset tahet, mis on meie oma Kui riike vaadeldakse kui kõrgemate üksuste, mis omavad indiviide, siis pööratakse sellega ümber õige suhe ja eitatakse individuaalse autonoomia põhiline roll poliitilises korralduses.
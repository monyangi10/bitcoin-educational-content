question: Liberal düşünceye göre, hangi temel değişim insan ilişkilerini şiddetli rekabetten barışçıl işbirliğine dönüştürmüştür?
answer: Mevcut doğal kaynaklara el koymaktan yeni mal ve hizmet üretimine geçiş
wrong_answers:
  - Rakip gruplar arasında barışı sağlayabilecek güçlü askeri kuvvetlerin kurulması
  - Şiddeti caydıran ve işbirliğini teşvik eden dini ve ahlaki sistemlerin geliştirilmesi
  - Kaynakları tüm vatandaşlar arasında adil bir şekilde yeniden dağıtabilecek devlet kurumlarının oluşturulması
explanation: |
  Metin, insanlık tarihinin erken dönemlerinde insanların, kimsenin üretmediği sınırlı doğal kaynaklar -meyveler, balıklar ve diğer doğal ürünler- için şiddetle rekabet ettiklerini açıklamaktadır. Temel dönüşüm, insanların tarım gibi faaliyetler yoluyla yeni zenginlikler üretmeye başlaması ve buğday tarlalarını yeni zenginlik kaynakları olarak yaratmasıyla gerçekleşmiştir. Bu yeni zenginliklerin üretimi, mevcut kaynaklar için sıfır toplamlı rekabetin yerini pozitif toplamlı işbirliğine bırakarak her iki tarafı da zenginleştiren gönüllü değiş tokuşlara olanak sağladı. Diğer seçenekler, işbirliğini ilgili tüm taraflar için doğal olarak faydalı kılan temel ekonomik dönüşümden ziyade dış yaptırım mekanizmalarına odaklanmaktadır.
question: Welcher fundamentale Wandel in den zwischenmenschlichen Beziehungen vom gewaltsamen Wettbewerb zur friedlichen Zusammenarbeit ist nach liberaler Auffassung zu beobachten?
answer: Die Verlagerung von der Aneignung vorhandener natürlicher Ressourcen auf die Produktion neuer Güter und Versorgungsleistungen
wrong_answers:
  - Die Schaffung starker militärischer Kräfte, die den Frieden zwischen konkurrierenden Gruppen durchsetzen könnten
  - Die Entwicklung religiöser und moralischer Systeme, die von Gewalt abraten und Zusammenarbeit fördern
  - Die Schaffung staatlicher Institutionen, die eine gerechte Umverteilung der Ressourcen unter allen Bürgern ermöglichen
explanation: |
  Der Text erklärt, dass die Menschen in der frühen Menschheitsgeschichte gewaltsam um begrenzte natürliche Ressourcen konkurrierten, die niemand produziert hatte - Früchte, Fische und andere natürliche Güter. Ein grundlegender Wandel trat ein, als die Menschen begannen, durch Aktivitäten wie die Landwirtschaft neuen Wohlstand zu produzieren, indem sie Weizenfelder als Quellen neuen Reichtums anlegten. Diese Produktion neuer Güter ermöglichte einen freiwilligen Austausch, der beide Seiten bereicherte und den Nullsummenwettbewerb um die vorhandenen Ressourcen durch eine Positivsummenkooperation ersetzte. Die anderen Optionen konzentrieren sich auf externe Durchsetzungsmechanismen und nicht auf die zugrundeliegenden wirtschaftlichen Veränderungen, die die Zusammenarbeit zu einem natürlichen Vorteil für alle Beteiligten gemacht haben.
question: بر اساس تفکر لیبرال، چه تغییر بنیادی روابط انسانی را از رقابت خشونت‌آمیز به همکاری مسالمت‌آمیز تبدیل کرد؟
answer: تغییر از تخصیص منابع طبیعی موجود به تولید کالاها و خدمات جدید
wrong_answers:
  - ایجاد نیروهای نظامی قوی که بتوانند صلح را بین گروه‌های رقیب برقرار کنند
  - توسعه سیستم‌های دینی و اخلاقی که خشونت را منع و همکاری را ترویج می‌کردند
  - ایجاد نهادهای دولتی که بتوانند منابع را به طور عادلانه در میان همه شهروندان توزیع کنند
explanation: |
  متن توضیح می‌دهد که در اوایل تاریخ بشر، مردم برای منابع طبیعی محدودی که هیچ‌کس تولید نکرده بود - میوه‌ها، ماهی‌ها و سایر کالاهای طبیعی - به‌طور خشونت‌آمیزی رقابت می‌کردند. تحول اساسی زمانی رخ داد که انسان‌ها شروع به تولید ثروت جدید از طریق فعالیت‌هایی مانند کشاورزی کردند و مزارع گندم را به‌عنوان منابع ثروت جدید ایجاد کردند. این تولید امکانات جدید، مبادلات داوطلبانه‌ای را ممکن ساخت که هر دو طرف را غنی می‌کرد و رقابت صفر-جمع برای منابع موجود را با همکاری مثبت-جمع جایگزین کرد. گزینه‌های دیگر بر مکانیزم‌های اجرای خارجی تمرکز دارند نه بر تحول اقتصادی اساسی که همکاری را به‌طور طبیعی برای همه طرف‌های درگیر سودمند کرد.
question: Jaká zásadní změna podle liberálního myšlení změnila lidské vztahy z násilné konkurence na mírovou spolupráci?
answer: Přechod od využívání stávajících přírodních zdrojů k výrobě nových statků a služeb
wrong_answers:
  - Vytvoření silných vojenských sil, které by mohly vynutit mír mezi soupeřícími skupinami
  - Rozvoj náboženských a morálních systémů, které odrazovaly od násilí a podporovaly spolupráci
  - Vytvoření vládních institucí, které by spravedlivě rozdělovaly zdroje mezi všechny občany
explanation: |
  Text vysvětluje, že v rané historii lidstva lidé násilně soupeřili o omezené přírodní zdroje, které nikdo nevyprodukoval - ovoce, ryby a další přírodní statky. Zásadní proměna nastala, když lidé začali produkovat nové bohatství prostřednictvím činností, jako je zemědělství, a vytvořili tak pšeničná pole jako zdroje nového bohatství. Tato produkce nových užitků umožnila dobrovolnou směnu, která obohatila obě strany a nahradila soupeření o stávající zdroje s nulovým součtem spoluprací s pozitivním součtem. Ostatní možnosti se zaměřují spíše na vnější donucovací mechanismy než na základní ekonomickou transformaci, díky níž se spolupráce stala přirozeně výhodnou pro všechny zúčastněné strany.
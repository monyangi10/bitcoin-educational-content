question: Prema liberalnoj misli, koja je fundamentalna promena transformisala ljudske odnose iz nasilne konkurencije u mirnu saradnju?
answer: Prelazak sa prisvajanja postojećih prirodnih resursa na proizvodnju novih dobara i usluga
wrong_answers:
  - Uspostavljanje snažnih vojnih snaga koje bi mogle da sprovode mir između suparničkih grupa
  - Razvoj religijskih i moralnih sistema koji su obeshrabrivali nasilje i podsticali saradnju
  - Stvaranje vladinih institucija koje bi mogle pravedno raspodeliti resurse među svim građanima
explanation: |
  Tekst objašnjava da su se u ranoj ljudskoj istoriji ljudi nasilno takmičili za ograničene prirodne resurse koje niko nije proizveo - voće, ribu i druge prirodne dobrote. Fundamentalna transformacija se dogodila kada su ljudi počeli da proizvode novo bogatstvo kroz aktivnosti poput poljoprivrede, stvarajući polja pšenice kao izvore novih bogatstava. Ova proizvodnja novih korisnosti omogućila je dobrovoljne razmene koje su obogatile obe strane, zamenjujući takmičenje sa nultim zbirom za postojeće resurse sa saradnjom sa pozitivnim zbirom. Druge opcije se fokusiraju na mehanizme spoljne primene umesto na osnovnu ekonomsku transformaciju koja je učinila saradnju prirodno korisnom za sve uključene strane.
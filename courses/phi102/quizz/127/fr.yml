question: Selon la pensée libérale, quel changement fondamental a transformé les relations humaines d'une compétition violente à une coopération pacifique ?
answer: Le passage de l'appropriation des ressources naturelles existantes à la production de nouveaux biens et services publics
wrong_answers:
  - La mise en place de forces militaires puissantes capables d'imposer la paix entre des groupes rivaux
  - Le développement de systèmes religieux et moraux qui découragent la violence et encouragent la coopération
  - La création d'institutions gouvernementales capables de redistribuer les ressources de manière équitable entre tous les citoyens
explanation: |
  Le texte explique qu'au début de l'histoire de l'humanité, les gens se disputaient violemment des ressources naturelles limitées que personne n'avait produites - fruits, poissons et autres biens naturels. La transformation fondamentale s'est produite lorsque les hommes ont commencé à produire de nouvelles richesses grâce à des activités telles que l'agriculture, créant des champs de blé comme sources de nouvelles richesses. Cette production de nouvelles utilités a permis des échanges volontaires qui ont enrichi les deux parties, remplaçant la concurrence à somme nulle pour les ressources existantes par une coopération à somme positive. Les autres options mettent l'accent sur les mécanismes d'application externes plutôt que sur la transformation économique sous-jacente qui a rendu la coopération naturellement bénéfique pour toutes les parties concernées.
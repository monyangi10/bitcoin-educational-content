question: Dukurikije ivyiyumviro vy’abanyagihugu, ni irihe hinduka ry’ishimikiro ryahinduye imigenderanire y’abantu kuva ku guhiganwa kw’ubukazi gushika ku gukorana mu mahoro?
answer: Guhinduka kuva ku kwigarurira ubutunzi busanzweho gushika ku guhingura ibintu bishasha n'ibikorwa vy'ubuhinga .
wrong_answers:
  - Gushinga ingabo zikomeye zoshobora gutuma haba amahoro hagati y’imigwi iriko irahiganwa .
  - Guteza imbere inzego z’idini n’iz’inyifato runtu zaca intege ubukazi zigatuma haba ugusenyera ku mugozi umwe .
  - Gushinga inzego za Leta zishobora gusubira gusangira ubutunzi mu buryo bubereye mu benegihugu bose .
explanation: |
  Ico canditswe kirasigura ko mu ntango z’amateka y’abantu, abantu bariko barahiganwa cane kugira ngo baronke ubutunzi bukeyi ata n’umwe yari yaravyaye - ivyamwa, ifi, n’ibindi bintu vy’akameremere. Ihinduka ry’ishimikiro ryabaye igihe abantu batangura gutanga ubutunzi bushasha biciye mu bikorwa nk’uburimyi, bagahingura imirima y’ingano nk’isoko y’ubutunzi bushasha. Ukwo guhingura ibikoresho bishasha vy’ubuhinga bwa none vyatumye habaho uguhanahana amakuru ku bushake kwatunganije impande zompi, gusubirira uguhiganwa kw’amahera ataco amaze ku bijanye n’ubutunzi bwariho, n’ugukorana kw’amahera meza. Ayandi mahitamwo yibanda ku buryo bwo gushitsa amategeko bwo hanze aho kwibanda ku mpinduka y’ubutunzi yatumye ubufatanye bugira akamaro ku mpande zose zibigiramwo uruhara.
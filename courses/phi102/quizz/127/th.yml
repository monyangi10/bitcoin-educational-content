question: ตามแนวคิดเสรีนิยม การเปลี่ยนแปลงพื้นฐานใดที่เปลี่ยนแปลงความสัมพันธ์ของมนุษย์จากการแข่งขันที่รุนแรงไปสู่ความร่วมมืออย่างสันติ?
answer: การเปลี่ยนจากการใช้ทรัพยากรธรรมชาติที่มีอยู่ไปสู่การผลิตสินค้าและสาธารณูปโภคใหม่
wrong_answers:
  - การจัดตั้งกองกำลังทหารที่แข็งแกร่งซึ่งสามารถบังคับใช้สันติภาพระหว่างกลุ่มที่แข่งขันกัน
  - การพัฒนาระบบศาสนาและศีลธรรมที่ไม่สนับสนุนความรุนแรงและส่งเสริมความร่วมมือ
  - การสร้างสถาบันของรัฐบาลที่สามารถกระจายทรัพยากรอย่างเป็นธรรมในหมู่พลเมืองทุกคน
explanation: |
  ข้อความอธิบายว่าในประวัติศาสตร์มนุษย์ยุคแรก ผู้คนแข่งขันกันอย่างรุนแรงเพื่อทรัพยากรธรรมชาติที่มีอยู่อย่างจำกัดซึ่งไม่มีใครผลิตขึ้น - ผลไม้, ปลา, และสินค้าธรรมชาติอื่นๆ การเปลี่ยนแปลงพื้นฐานเกิดขึ้นเมื่อมนุษย์เริ่มผลิตความมั่งคั่งใหม่ผ่านกิจกรรมต่างๆ เช่น เกษตรกรรม สร้างทุ่งข้าวสาลีเป็นแหล่งความมั่งคั่งใหม่ การผลิตประโยชน์ใหม่เหล่านี้ทำให้เกิดการแลกเปลี่ยนโดยสมัครใจที่ทำให้ทั้งสองฝ่ายร่ำรวยขึ้น แทนที่การแข่งขันแบบผลรวมศูนย์สำหรับทรัพยากรที่มีอยู่ด้วยความร่วมมือแบบผลรวมบวก ตัวเลือกอื่นๆ มุ่งเน้นไปที่กลไกการบังคับใช้ภายนอกแทนที่จะเป็นการเปลี่ยนแปลงทางเศรษฐกิจพื้นฐานที่ทำให้ความร่วมมือเป็นประโยชน์ตามธรรมชาติสำหรับทุกฝ่ายที่เกี่ยวข้อง
question: Според либералната мисъл коя фундаментална промяна е променила човешките отношения от насилствена конкуренция към мирно сътрудничество?
answer: Преминаването от усвояване на съществуващите природни ресурси към производство на нови стоки и комунални услуги
wrong_answers:
  - Създаване на силни военни сили, които да налагат мир между враждуващи групи
  - Развитието на религиозни и морални системи, които не поощряват насилието и насърчават сътрудничеството
  - Създаване на държавни институции, които да разпределят справедливо ресурсите между всички граждани
explanation: |
  В текста се обяснява, че в ранната история на човечеството хората са се конкурирали жестоко за ограничените природни ресурси, които никой не е произвеждал - плодове, риба и други природни блага. Фундаменталната трансформация настъпва, когато хората започват да произвеждат нови блага чрез дейности като земеделие, създавайки пшенични полета като източници на нови богатства. Това производство на нови блага даде възможност за доброволна размяна, която обогати и двете страни, като замени съревнованието с нулева сума за съществуващите ресурси със сътрудничество с положителна сума. Другите варианти се фокусират върху механизмите за външно правоприлагане, а не върху основната икономическа трансформация, която направи сътрудничеството естествено изгодно за всички участващи страни.
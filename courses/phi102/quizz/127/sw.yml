question: Kulingana na mawazo ya kiliberali, ni mabadiliko gani ya msingi yaliyobadilisha mahusiano ya kibinadamu kutoka ushindani mkali hadi ushirikiano wa amani?
answer: Mabadiliko kutoka kwa kutumia rasilimali asilia zilizopo hadi kuzalisha bidhaa na huduma mpya
wrong_answers:
  - Kuanzishwa kwa vikosi imara vya kijeshi ambavyo vinaweza kutekeleza amani kati ya makundi yanayoshindana
  - Maendeleo ya mifumo ya kidini na kimaadili ambayo ilizuia vurugu na kukuza ushirikiano
  - Kuundwa kwa taasisi za serikali ambazo zinaweza kusambaza rasilimali kwa usawa miongoni mwa raia wote
explanation: |
  Maandishi yanaelezea kwamba katika historia ya awali ya binadamu, watu walishindana kwa nguvu kwa ajili ya rasilimali asili chache ambazo hakuna mtu aliyezalisha - matunda, samaki, na bidhaa zingine za asili. Mabadiliko ya msingi yalitokea wakati wanadamu walipoanza kuzalisha utajiri mpya kupitia shughuli kama vile kilimo, na kuunda mashamba ya ngano kama vyanzo vya utajiri mpya. Uzalishaji huu wa huduma mpya uliwezesha ubadilishanaji wa hiari ambao ulitajirisha pande zote mbili, ukibadilisha ushindani wa sifuri kwa rasilimali zilizopo na ushirikiano chanya wa jumla. Chaguzi zingine zinazingatia mifumo ya utekelezaji wa nje badala ya mabadiliko ya kiuchumi yaliyowekwa ambayo yalifanya ushirikiano uwe na manufaa kwa pande zote zinazohusika.
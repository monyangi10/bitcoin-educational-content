question: De acordo com o pensamento liberal, que mudança fundamental transformou as relações humanas de competição violenta em cooperação pacífica?
answer: A passagem da apropriação dos recursos naturais existentes para a produção de novos bens e serviços
wrong_answers:
  - A criação de forças militares fortes que pudessem impor a paz entre grupos concorrentes
  - O desenvolvimento de sistemas religiosos e morais que desencorajem a violência e promovam a cooperação
  - A criação de instituições governamentais capazes de redistribuir os recursos de forma justa entre todos os cidadãos
explanation: |
  O texto explica que, nos primórdios da história da humanidade, as pessoas competiam violentamente por recursos naturais limitados que ninguém produzia - frutos, peixe e outros bens naturais. A transformação fundamental ocorreu quando os seres humanos começaram a produzir novas riquezas através de actividades como a agricultura, criando campos de trigo como fontes de novas riquezas. Esta produção de novas utilidades permitiu trocas voluntárias que enriqueceram ambas as partes, substituindo a competição de soma zero pelos recursos existentes por uma cooperação de soma positiva. As outras opções centram-se nos mecanismos externos de aplicação da lei e não na transformação económica subjacente que tornou a cooperação naturalmente benéfica para todas as partes envolvidas.
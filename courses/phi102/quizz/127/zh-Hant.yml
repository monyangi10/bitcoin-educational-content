question: 根據自由主義思想，人類關係從暴力競爭轉變為和平合作的根本改變是什麼？
answer: 從佔用現有天然資源轉向生產新商品與公用事業
wrong_answers:
  - 建立強大的軍事力量，可以在相互競爭的群體之間實現和平
  - 發展勸阻暴力、促進合作的宗教與道德體系
  - 建立可在所有公民之間公平地重新分配資源的政府機構
explanation: |
  文中解釋，在早期的人類歷史中，人們為了爭奪有限的、沒有人生產的自然資源 - 水果、魚類和其他自然物品，而進行激烈的競爭。當人類開始透過農業等活動生產新財富，創造麥田作為新財富的來源時，就發生了根本性的轉變。這種新公用事業的生產使得自願交換成為可能，使交換雙方都能致富，以正和合作取代了對現有資源的零和競爭。其他選項的重點在於外部執行機制，而非使合作自然而然對所有參與方有利的基本經濟轉型。
question: 자유주의 사상에 따르면, 인간 관계를 폭력적인 경쟁에서 평화로운 협력으로 변화시킨 근본적인 변화는 무엇일까요?
answer: 기존 천연 자원의 활용에서 새로운 상품과 유틸리티 생산으로의 전환
wrong_answers:
  - 경쟁 그룹 간의 평화를 강제할 수 있는 강력한 군사력 구축
  - 폭력을 억제하고 협력을 촉진하는 종교 및 도덕 체계의 발전
  - 모든 시민에게 공평하게 자원을 재분배할 수 있는 정부 기관의 설립
explanation: |
  이 텍스트는 초기 인류 역사에서 사람들이 과일, 생선, 기타 자연 재화 등 아무도 생산하지 않은 한정된 천연 자원을 차지하기 위해 격렬하게 경쟁했다고 설명합니다. 근본적인 변화는 인류가 농업과 같은 활동을 통해 새로운 부를 생산하기 시작하면서 밀밭을 새로운 부의 원천으로 만들었을 때 일어났습니다. 이러한 새로운 공익재의 생산은 기존 자원에 대한 제로섬 경쟁을 포지티브섬 협력으로 대체하여 양측 모두를 풍요롭게 하는 자발적 교환을 가능하게 했습니다. 다른 옵션은 협력이 자연스럽게 모든 당사자에게 이익이 되는 근본적인 경제 변화보다는 외부 강제 메커니즘에 초점을 맞추고 있습니다.
question: Hvilken grunnleggende endring har ifølge liberal tenkning forvandlet menneskelige relasjoner fra voldelig konkurranse til fredelig samarbeid?
answer: Overgangen fra å tilegne seg eksisterende naturressurser til å produsere nye varer og tjenester
wrong_answers:
  - Etablering av sterke militære styrker som kunne håndheve fred mellom konkurrerende grupper
  - Utviklingen av religiøse og moralske systemer som motvirket vold og fremmet samarbeid
  - Opprettelsen av statlige institusjoner som kunne omfordele ressurser rettferdig mellom alle borgere
explanation: |
  Teksten forklarer at i menneskets tidlige historie konkurrerte menneskene voldsomt om begrensede naturressurser som ingen hadde produsert - frukt, fisk og andre naturgoder. Den grunnleggende forandringen skjedde da menneskene begynte å produsere ny rikdom gjennom aktiviteter som jordbruk, og hveteåkrene ble kilder til ny rikdom. Denne produksjonen av nye goder muliggjorde frivillige utvekslinger som beriket begge parter, og erstattet nullsum-konkurransen om eksisterende ressurser med et plussum-samarbeid. De andre alternativene fokuserer på eksterne håndhevelsesmekanismer i stedet for den underliggende økonomiske transformasjonen som gjorde samarbeid naturlig fordelaktig for alle involverte parter.
question: According to liberal thought, what fundamental change transformed human relationships from violent competition to peaceful cooperation?
answer: The shift from appropriating existing natural resources to producing new goods and utilities
wrong_answers:
  - The establishment of strong military forces that could enforce peace between competing groups
  - The development of religious and moral systems that discouraged violence and promoted cooperation
  - The creation of government institutions that could redistribute resources fairly among all citizens
explanation: |
  The text explains that in early human history, people competed violently for limited natural resources that nobody had produced - fruits, fish, and other natural goods. The fundamental transformation occurred when humans began producing new wealth through activities like agriculture, creating wheat fields as sources of new riches. This production of new utilities enabled voluntary exchanges that enriched both parties, replacing the zero-sum competition for existing resources with positive-sum cooperation. The other options focus on external enforcement mechanisms rather than the underlying economic transformation that made cooperation naturally beneficial for all parties involved.
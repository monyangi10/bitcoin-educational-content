question: Kako mehanizam profita vodi preduzetnike da donose proizvodne odluke koje su u skladu sa potrebama potrošača u tržišnoj ekonomiji?
answer: Visoki profiti signaliziraju neispunjenu potražnju i privlače nove proizvođače, dok niski profiti obeshrabruju proizvodnju sve dok ponuda ne odgovara stvarnoj potrošnji potrošača.
wrong_answers:
  - Profiti omogućavaju preduzetnicima da akumuliraju kapital koji zatim investiraju u proizvode koje lično preferiraju da proizvode
  - Vladini propisi koriste podatke o profitu kako bi usmerili preduzetnike ka društveno korisnoj proizvodnji putem poreskih podsticaja i subvencija.
  - Profiti stvaraju konkurenciju između proizvođača koji zatim snižavaju cene sve dok samo najefikasnije kompanije ne mogu priuštiti da nastave sa radom
explanation: |
  Mehanizam profita služi kao ključni informacioni sistem na slobodnim tržištima. Kada su profiti visoki u određenom sektoru, to signalizira da potražnja potrošača premašuje trenutnu ponudu, privlačeći nove preduzetnike da uđu na to tržište. Suprotno tome, niski ili negativni profiti ukazuju na prekomernu ponudu ili nedostatak potražnje, obeshrabrujući dalju proizvodnju. Ovo stvara samoregulirajući sistem gde se proizvodnja prirodno usklađuje sa stvarnim preferencijama i potrebama potrošača, umesto političkih odluka ili ličnih preferencija proizvođača.
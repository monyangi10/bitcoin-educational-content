question: Ni gute uburyo bwo kuronka inyungu buyobora abacuruzi mu gufata ingingo z’uguhingura zihuye n’ivyo abaguzi bakeneye mu bukungu bw’isoko?
answer: Inyungu nyinshi zigaragaza ko ataco umuntu asaba kandi zikwegera abahinguzi bashasha, mu gihe inyungu nto zica intege abahinguzi gushika ivyo abaguzi bakeneye bihuye n’ivyo abaguzi basaba .
wrong_answers:
  - Inyungu zituma abashoramare birundanira umutungo baca bashira mu bicuruzwa vyose bo ubwabo bakunda gukora .
  - Amategeko ya Leta akoresha amakuru yerekeye inyungu kugira ngo ayobore abashoramare ku bijanye n’uguhingura ibintu bifise akamaro ku kibano biciye mu gutanga imisoro n’infashanyo .
  - Inyungu zituma haba uguhiganwa hagati y’abahinguzi bagaca bagabanya ibiciro gushika aho amashirahamwe akora neza cane ari yo yonyene ashobora kubandanya akora .
explanation: |
  Uburyo bwo kuronka inyungu bukora nk’uburyo bw’amakuru buhambaye cane mu masoko y’uburenganzira. Iyo inyungu ari nyinshi mu rwego runaka, ivyo bigaragaza ko ivyo abaguzi basaba birenze ivyo bakeneye ubu, bikaba bikwegera abacuruzi bashasha kwinjira muri iryo soko. Ku rundi ruhande, inyungu ntoyi canke mbi yerekana ko hariho ibintu birenze urugero canke ko ata vyo umuntu asaba, ivyo bikaba bituma umuntu adashobora gukora vyinshi. Ivyo bituma habaho uburyo bwo kwitunganya aho umusaruro ujanye n’ivyo abaguzi bakunda n’ivyo bakeneye, aho gufatanya n’ingingo za politike canke ivyo abahinguzi bakunda.
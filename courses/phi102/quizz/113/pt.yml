question: Como é que o mecanismo do lucro orienta os empresários para tomarem decisões de produção que correspondam às necessidades dos consumidores numa economia de mercado?
answer: Lucros elevados sinalizam uma procura não satisfeita e atraem novos produtores, enquanto lucros baixos desencorajam a produção até que a oferta corresponda à procura efectiva dos consumidores
wrong_answers:
  - Os lucros permitem aos empresários acumular capital que depois investem nos produtos que preferem produzir pessoalmente
  - Os regulamentos governamentais utilizam dados sobre os lucros para orientar os empresários para uma produção socialmente benéfica através de incentivos fiscais e subsídios
  - Os lucros criam concorrência entre os produtores que, por sua vez, baixam os preços até que apenas as empresas mais eficientes possam continuar a operar
explanation: |
  O mecanismo de lucro funciona como um sistema de informação crucial nos mercados livres. Quando os lucros são elevados num determinado sector, isso indica que a procura dos consumidores excede a oferta atual, atraindo novos empresários para esse mercado. Por outro lado, lucros baixos ou negativos indicam excesso de oferta ou falta de procura, desencorajando a continuação da produção. Isto cria um sistema de autorregulação em que a produção se alinha naturalmente com as preferências e necessidades reais dos consumidores, em vez de decisões políticas ou preferências pessoais dos produtores.
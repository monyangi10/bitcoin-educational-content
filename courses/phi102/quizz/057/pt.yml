question: Segundo pensadores liberais franceses como Gustave de Beaumont, qual era a principal diferença entre a escravatura antiga e a escravatura na América dos séculos XVIII e XIX?
answer: A escravatura antiga tinha alguma justificação histórica devido a restrições económicas, enquanto a escravatura moderna era mantida artificialmente pela autoridade política
wrong_answers:
  - A escravatura antiga era mais brutal e desumana do que as condições relativamente suaves da escravatura americana
  - A escravatura antiga baseava-se em diferenças raciais, enquanto a escravatura americana era de natureza puramente económica
  - A escravatura antiga durou mais tempo e foi mais generalizada do que o sistema temporário de escravatura americano
explanation: |
  Os pensadores liberais franceses reconheciam que a escravatura antiga se tinha desenvolvido como resposta a constrangimentos económicos e de segurança genuínos das sociedades primitivas, onde a força física era essencial para a sobrevivência e a produção. No entanto, encaravam a escravatura americana dos séculos XVIII e XIX como um paradoxo histórico - uma instituição anacrónica que persistia apesar dos progressos tecnológicos e sociais que a tinham tornado desnecessária. Defendiam que a escravatura moderna era mantida artificialmente pelo poder político e não pela necessidade económica, o que a tornava moralmente injustificável, ao contrário da sua congénere antiga.
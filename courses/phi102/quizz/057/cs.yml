question: Jaký byl podle francouzských liberálních myslitelů, jako byl Gustave de Beaumont, hlavní rozdíl mezi starověkým otroctvím a otroctvím v Americe 18. a 19. století?
answer: Starověké otroctví mělo určité historické opodstatnění kvůli ekonomickým omezením, zatímco moderní otroctví bylo uměle udržováno politickou autoritou
wrong_answers:
  - Starověké otroctví bylo brutálnější a nelidštější než relativně mírné podmínky amerického otroctví
  - Starověké otroctví bylo založeno na rasových rozdílech, zatímco americké otroctví mělo čistě ekonomický charakter
  - Starověké otroctví trvalo déle a bylo rozšířenější než dočasný americký otrokářský systém
explanation: |
  Francouzští liberální myslitelé uznávali, že starověké otroctví se vyvinulo jako reakce na skutečná ekonomická a bezpečnostní omezení primitivních společností, kde byla fyzická síla nezbytná pro přežití a výrobu. Americké otroctví 18.-19. století však považovali za historický paradox - anachronickou instituci, která přetrvávala navzdory technologickému a sociálnímu pokroku, díky němuž se stala zbytečnou. Tvrdili, že moderní otroctví bylo uměle udržováno spíše politickou mocí než ekonomickou nutností, a proto bylo na rozdíl od svého starověkého protějšku morálně neospravedlnitelné.
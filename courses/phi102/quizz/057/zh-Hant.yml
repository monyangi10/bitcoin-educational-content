question: 根據法國自由主義思想家 Gustave de Beaumont 等人的看法，古代的奴隸制與 18-19 世紀美國的奴隸制的主要差異是什麼？
answer: 古代的奴隸制因經濟限制而有一定的歷史合理性，而現代的奴隸制是由政治權威人為地維持的。
wrong_answers:
  - 古代的奴隸制度比美國相對溫和的奴隸制度更殘忍、更不人道
  - 古代的奴隸制是基於種族差異，而美國的奴隸制是純粹的經濟性質
  - 古代的奴隸制度比美國臨時的奴隸制度持續的時間更長、範圍更廣
explanation: |
  法國的自由主義思想家承認，古代的奴隸制是為了應對原始社會真正的經濟和安全限制而發展起來的，在原始社會中，武力對於生存和生產是必不可少的。然而，他們認為 18-19 世紀的美國奴隸制是一種歷史悖論 - 儘管技術和社會的進步使奴隸制變得不再必要，但這種不合時宜的制度仍然存在。他們認為，現代奴隸制是由政治權力而非經濟需要所人工維持的，因此與古代的奴隸制不同，現代奴隸制在道德上是不合理的。
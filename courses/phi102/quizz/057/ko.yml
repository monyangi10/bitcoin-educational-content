question: 구스타브 드 보몽과 같은 프랑스 자유주의 사상가들에 따르면 고대 노예제와 18~19세기 미국의 노예제의 주요 차이점은 무엇이었을까요?
answer: 고대 노예제는 경제적 제약으로 인해 역사적 정당성이 있었지만, 현대 노예제는 정치 권력에 의해 인위적으로 유지되었습니다
wrong_answers:
  - 고대 노예제는 비교적 온화한 미국 노예제보다 더 잔인하고 비인간적이었습니다
  - 고대 노예제는 인종적 차이에 기반한 반면, 미국 노예제는 순전히 경제적 이유에서 비롯되었습니다
  - 고대 노예 제도는 일시적인 미국 노예 제도보다 더 오래 지속되었고 더 널리 퍼져있었습니다
explanation: |
  프랑스의 자유주의 사상가들은 고대 노예제도가 생존과 생산을 위해 물리적 힘이 필수적이었던 원시 사회의 진정한 경제적, 안보적 제약에 대한 대응책으로 발전했다는 사실을 인정했습니다. 그러나 그들은 18~19세기 미국의 노예제도를 기술 및 사회적 진보로 인해 노예제가 불필요해졌음에도 불구하고 지속된 시대착오적인 제도인 역사적 역설로 간주했습니다. 그들은 현대의 노예제도는 경제적 필요성보다는 정치적 권력에 의해 인위적으로 유지되었기 때문에 고대의 노예제도와는 달리 도덕적으로 정당화될 수 없다고 주장했습니다.
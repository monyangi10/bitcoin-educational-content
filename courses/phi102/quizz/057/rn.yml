question: Nk’uko abafaransa biyumvira mu vy’ubwigenge nka Gustave de Beaumont babivuga, ni irihe tandukaniro nyamukuru ryari hagati y’ubuja bwa kera n’ubuja bwo muri Amerika yo mu kinjana ca 18-19?
answer: Ubuja bwa kera bwari bufise imvo zimwe zimwe z’akahise kubera ingorane z’ubutunzi, mu gihe ubuja bwa none bwari bugumyeho mu buryo bw’ubuhinga n’ubukuru bwa politike .
wrong_answers:
  - Ubuja bwa kera bwari ububisha kandi butagira ubuntu kuruta uko ubuja bwa Amerika bwari busanzwe .
  - Ubuja bwa kera bwari bushingiye ku gutandukanya ubwoko mu gihe ubuja bwa Amerika bwari bushingiye ku bukungu gusa .
  - Ubuja bwa kera bwaramaze igihe kirekire kandi bwarakwiragiye cane kuruta ubuja bw’igihe gito bwa Amerika .
explanation: |
  Abanyabwenge b’Abafaransa b’abanyagihugu b’abanyagihugu baremeye yuko ubuja bwa kera bwari bwateye imbere nk’inyishu y’ingorane nyazo z’ubutunzi n’umutekano z’imibano ya kera, aho inguvu z’umubiri zari zikenewe kugira ngo umuntu ashobore kubaho no kugira ngo ashobore gukora. Ariko rero, babona ko ubuja bw’Abanyamerika bwo mu kinjana ca 18-19 ari ikintu giteye ubwoba mu mateka - ikigo c’ivya kera cagumyeho naho ubuhinga n’imibano vyari vyarateye imbere vyari vyatumye bidakenewe. Bavuga yuko ubuja bwo muri iki gihe bwari bushingiye ku buhinga bwa politike aho gukomezwa n’ivy’ubutunzi, ivyo bikaba vyatuma butagira ishingiro mu vy’inyifato runtu bitandukanye n’ubwo bwa kera.
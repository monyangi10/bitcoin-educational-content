question: Milline oli Prantsuse liberaalsete mõtlejate, nagu Gustave de Beaumont, arvates peamine erinevus iidse orjuse ja 18.-19. sajandi Ameerika orjuse vahel?
answer: Vana aegne orjapidamine oli ajalooliselt õigustatud majanduslike piirangute tõttu, samas kui tänapäeva orjapidamine oli kunstlikult säilitatud poliitilise võimu poolt
wrong_answers:
  - Vana aegne orjapidamine oli jõhkram ja ebainimlikum kui Ameerika orjapidamise suhteliselt leebed tingimused
  - Vanaorjus põhines rassilistel erinevustel, samas kui Ameerika orjapidamine oli puhtalt majandusliku iseloomuga
  - Vanaorjus kestis kauem ja oli laiemalt levinud kui ajutine Ameerika orjandussüsteem
explanation: |
  Prantsuse liberaalsed mõtlejad tunnistasid, et iidne orjus oli arenenud vastusena primitiivsete ühiskondade tõelistele majanduslikele ja julgeolekupiirangutele, kus füüsiline jõud oli ellujäämiseks ja tootmiseks hädavajalik. Siiski pidasid nad 18.-19. sajandi Ameerika orjapidamist ajalooliseks paradoksiks - anakronistlikuks institutsiooniks, mis püsis hoolimata tehnoloogilisest ja sotsiaalsest arengust, mis oli muutnud selle tarbetuks. Nad väitsid, et kaasaegset orjapidamist hoitakse kunstlikult üleval pigem poliitilise võimu kui majandusliku vajaduse tõttu, mis muudab selle erinevalt oma iidsest vasteist moraalselt õigustamatuks.
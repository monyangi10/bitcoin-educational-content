question: Enligt franska liberala tänkare som Gustave de Beaumont, vad var den största skillnaden mellan det antika slaveriet och slaveriet i 1700-1900-talets Amerika?
answer: Det antika slaveriet hade ett visst historiskt berättigande på grund av ekonomiska begränsningar, medan det moderna slaveriet upprätthölls på konstgjord väg av den politiska makten
wrong_answers:
  - Det antika slaveriet var mer brutalt och omänskligt än de relativt milda förhållandena i det amerikanska slaveriet
  - Det antika slaveriet var baserat på rasskillnader medan det amerikanska slaveriet var rent ekonomiskt till sin natur
  - Det antika slaveriet varade längre och var mer utbrett än det tillfälliga amerikanska slaveriet
explanation: |
  Franska liberala tänkare erkände att det antika slaveriet hade utvecklats som ett svar på de primitiva samhällenas ekonomiska och säkerhetsmässiga begränsningar, där fysiskt våld var nödvändigt för överlevnad och produktion. De betraktade dock 1700-1900-talets amerikanska slaveri som en historisk paradox - en anakronistisk institution som bestod trots att tekniska och sociala framsteg hade gjort den onödig. De hävdade att det moderna slaveriet var artificiellt upprätthållet av politisk makt snarare än ekonomisk nödvändighet, vilket gjorde det moraliskt oförsvarbart till skillnad från dess antika motsvarighet.
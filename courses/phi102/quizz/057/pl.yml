question: Według francuskich liberalnych myślicieli, takich jak Gustave de Beaumont, jaka była główna różnica między starożytnym niewolnictwem a niewolnictwem w XVIII-XIX-wiecznej Ameryce?
answer: Starożytne niewolnictwo miało pewne historyczne uzasadnienie ze względu na ograniczenia gospodarcze, podczas gdy współczesne niewolnictwo było sztucznie utrzymywane przez władzę polityczną
wrong_answers:
  - Starożytne niewolnictwo było bardziej brutalne i nieludzkie niż stosunkowo łagodne warunki niewolnictwa amerykańskiego
  - Starożytne niewolnictwo opierało się na różnicach rasowych, podczas gdy niewolnictwo amerykańskie miało charakter czysto ekonomiczny
  - Starożytne niewolnictwo trwało dłużej i było bardziej rozpowszechnione niż tymczasowy amerykański system niewolnictwa
explanation: |
  Francuscy myśliciele liberalni uznali, że starożytne niewolnictwo rozwinęło się jako odpowiedź na rzeczywiste ograniczenia ekonomiczne i bezpieczeństwa prymitywnych społeczeństw, w których siła fizyczna była niezbędna do przetrwania i produkcji. Jednakże postrzegali oni amerykańskie niewolnictwo z XVIII-XIX wieku jako historyczny paradoks - anachroniczną instytucję, która przetrwała pomimo postępu technologicznego i społecznego, który uczynił ją niepotrzebną. Argumentowali, że współczesne niewolnictwo było sztucznie utrzymywane przez władzę polityczną, a nie konieczność ekonomiczną, co czyniło je moralnie nieuzasadnionym w przeciwieństwie do jego starożytnego odpowiednika.
question: Hva var, ifølge franske liberale tenkere som Gustave de Beaumont, den største forskjellen mellom antikkens slaveri og slaveriet i Amerika på 1700- og 1800-tallet?
answer: Antikkens slaveri hadde en viss historisk berettigelse på grunn av økonomiske begrensninger, mens det moderne slaveriet ble kunstig opprettholdt av politiske myndigheter
wrong_answers:
  - Det antikke slaveriet var mer brutalt og umenneskelig enn det amerikanske slaveriets relativt milde forhold
  - Antikkens slaveri var basert på raseforskjeller, mens det amerikanske slaveriet var av rent økonomisk karakter
  - Det antikke slaveriet varte lenger og var mer utbredt enn det midlertidige amerikanske slaveriet
explanation: |
  Franske liberale tenkere anerkjente at slaveriet i antikken hadde utviklet seg som et svar på reelle økonomiske og sikkerhetsmessige begrensninger i primitive samfunn, der fysisk makt var avgjørende for overlevelse og produksjon. De så imidlertid på 1700- og 1800-tallets amerikanske slaveri som et historisk paradoks - en anakronistisk institusjon som vedvarte til tross for teknologiske og sosiale fremskritt som hadde gjort det unødvendig. De hevdet at det moderne slaveriet ble kunstig opprettholdt av politisk makt snarere enn av økonomisk nødvendighet, noe som gjorde det moralsk uforsvarlig i motsetning til dets antikke motstykke.
question: 古斯塔夫-德-博蒙等法国自由主义思想家认为，古代奴隶制与 18-19 世纪美国奴隶制的主要区别是什么？
answer: 古代的奴隶制由于经济上的限制有一定的历史合理性，而现代的奴隶制则是由政治权力人为维持的
wrong_answers:
  - 与相对温和的美国奴隶制相比，古代奴隶制更加残酷和不人道
  - 古代的奴隶制基于种族差异，而美国的奴隶制则纯粹是经济性质的
  - 古代奴隶制比美国临时奴隶制持续时间更长、范围更广
explanation: |
  法国自由主义思想家认识到，古代奴隶制是为了应对原始社会真正的经济和安全限制而发展起来的，在原始社会，武力是生存和生产的必要条件。然而，他们认为 18-19 世纪的美国奴隶制是一个历史悖论--尽管技术和社会进步已使奴隶制变得没有必要，但这种不合时宜的制度却依然存在。他们认为，现代奴隶制是由政治权力而非经济需要人为维持的，因此与古代奴隶制不同，现代奴隶制在道德上是不合理的。
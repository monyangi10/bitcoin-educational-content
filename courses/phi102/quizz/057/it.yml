question: Secondo i pensatori liberali francesi come Gustave de Beaumont, qual era la principale differenza tra la schiavitù antica e quella dell'America del XVIII-XIX secolo?
answer: La schiavitù antica aveva una qualche giustificazione storica dovuta a vincoli economici, mentre la schiavitù moderna è stata mantenuta artificialmente dall'autorità politica
wrong_answers:
  - La schiavitù antica era più brutale e disumana delle condizioni relativamente miti della schiavitù americana
  - La schiavitù antica si basava su differenze razziali, mentre quella americana era di natura puramente economica
  - La schiavitù antica è durata più a lungo ed è stata più diffusa del sistema di schiavitù temporanea americano
explanation: |
  I pensatori liberali francesi riconobbero che l'antica schiavitù si era sviluppata come risposta alle reali limitazioni economiche e di sicurezza delle società primitive, dove la forza fisica era essenziale per la sopravvivenza e la produzione. Tuttavia, consideravano la schiavitù americana del XVIII-XIX secolo come un paradosso storico, un'istituzione anacronistica che persisteva nonostante i progressi tecnologici e sociali l'avessero resa inutile. Sostenevano che la schiavitù moderna fosse mantenuta artificialmente dal potere politico piuttosto che dalla necessità economica, rendendola moralmente ingiustificabile a differenza della sua controparte antica.
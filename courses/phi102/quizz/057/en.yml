question: According to French liberal thinkers like Gustave de Beaumont, what was the main difference between ancient slavery and slavery in 18th-19th century America?
answer: Ancient slavery had some historical justification due to economic constraints, while modern slavery was artificially maintained by political authority
wrong_answers:
  - Ancient slavery was more brutal and inhumane than the relatively mild conditions of American slavery
  - Ancient slavery was based on racial differences while American slavery was purely economic in nature
  - Ancient slavery lasted longer and was more widespread than the temporary American slavery system
explanation: |
  French liberal thinkers recognized that ancient slavery had developed as a response to genuine economic and security constraints of primitive societies, where physical force was essential for survival and production. However, they viewed 18th-19th century American slavery as a historical paradox - an anachronistic institution that persisted despite technological and social progress that had made it unnecessary. They argued that modern slavery was artificially maintained by political power rather than economic necessity, making it morally unjustifiable unlike its ancient counterpart.

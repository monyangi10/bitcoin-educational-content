question: Según pensadores liberales franceses como Gustave de Beaumont, ¿cuál era la principal diferencia entre la esclavitud antigua y la esclavitud en la América del siglo XVIII-XIX?
answer: La esclavitud antigua tenía cierta justificación histórica debido a las limitaciones económicas, mientras que la esclavitud moderna era mantenida artificialmente por la autoridad política
wrong_answers:
  - La esclavitud antigua era más brutal e inhumana que las condiciones relativamente suaves de la esclavitud americana
  - La antigua esclavitud se basaba en diferencias raciales, mientras que la esclavitud estadounidense era de naturaleza puramente económica
  - La esclavitud antigua duró más y estaba más extendida que el sistema de esclavitud temporal estadounidense
explanation: |
  Los pensadores liberales franceses reconocieron que la esclavitud antigua se había desarrollado como respuesta a las auténticas limitaciones económicas y de seguridad de las sociedades primitivas, en las que la fuerza física era esencial para la supervivencia y la producción. Sin embargo, consideraban que la esclavitud estadounidense de los siglos XVIII y XIX era una paradoja histórica, una institución anacrónica que persistía a pesar del progreso tecnológico y social que la había hecho innecesaria. Sostenían que la esclavitud moderna se mantenía artificialmente por el poder político y no por la necesidad económica, lo que la hacía moralmente injustificable, a diferencia de su homóloga antigua.
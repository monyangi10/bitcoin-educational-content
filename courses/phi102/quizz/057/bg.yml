question: Според френски либерални мислители като Гюстав дьо Бомон, каква е основната разлика между древното робство и робството в Америка през 18-19 век?
answer: Древното робство е имало известно историческо оправдание поради икономически ограничения, докато съвременното робство е изкуствено поддържано от политическата власт
wrong_answers:
  - Древното робство е било по-брутално и нечовешко от сравнително леките условия на американското робство
  - Древното робство се е основавало на расови различия, докато американското робство е било чисто икономическо
  - Древното робство е продължило по-дълго и е било по-разпространено от временната американска система на робство
explanation: |
  Френските либерални мислители признават, че древното робство се е развило в отговор на истинските икономически ограничения и ограниченията на сигурността на примитивните общества, в които физическата сила е била от съществено значение за оцеляването и производството. Въпреки това те разглеждат американското робство от XVIII-XIX в. като исторически парадокс - анахронична институция, която продължава да съществува въпреки технологичния и социалния прогрес, който я прави ненужна. Те твърдяха, че съвременното робство е изкуствено поддържано от политическата власт, а не от икономическата необходимост, което го прави морално неоправдано за разлика от древния му аналог.
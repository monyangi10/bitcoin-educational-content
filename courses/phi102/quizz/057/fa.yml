question: به گفته متفکران لیبرال فرانسوی مانند گوستاو دو بومون، تفاوت اصلی بین برده‌داری باستان و برده‌داری در آمریکا در قرون ۱۸ و ۱۹ چه بود؟
answer: برده‌داری باستانی به دلیل محدودیت‌های اقتصادی دارای توجیه تاریخی بود، در حالی که برده‌داری مدرن به‌طور مصنوعی توسط قدرت سیاسی حفظ شد.
wrong_answers:
  - برده‌داری باستانی نسبت به شرایط نسبتاً ملایم برده‌داری آمریکایی، بی‌رحمانه‌تر و غیرانسانی‌تر بود.
  - برده‌داری باستانی بر اساس تفاوت‌های نژادی بود، در حالی که برده‌داری آمریکایی صرفاً ماهیت اقتصادی داشت.
  - برده‌داری باستانی طولانی‌تر و گسترده‌تر از سیستم موقت برده‌داری آمریکایی بود.
explanation: |
  اندیشمندان لیبرال فرانسوی اذعان داشتند که برده‌داری باستانی به عنوان پاسخی به محدودیت‌های واقعی اقتصادی و امنیتی جوامع ابتدایی توسعه یافته بود، جایی که نیروی فیزیکی برای بقا و تولید ضروری بود. با این حال، آنها برده‌داری آمریکایی قرون ۱۸-۱۹ را به عنوان یک پارادوکس تاریخی می‌دیدند - نهادی کهنه که علی‌رغم پیشرفت‌های تکنولوژیکی و اجتماعی که آن را غیرضروری کرده بود، همچنان ادامه داشت. آنها استدلال می‌کردند که برده‌داری مدرن به‌طور مصنوعی توسط قدرت سیاسی حفظ می‌شد نه به دلیل ضرورت اقتصادی، که آن را برخلاف همتای باستانی‌اش از نظر اخلاقی غیرقابل توجیه می‌کرد.
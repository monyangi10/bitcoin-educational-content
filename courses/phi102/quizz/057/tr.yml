question: Gustave de Beaumont gibi Fransız liberal düşünürlere göre, eski kölelik ile 18-19. yüzyıl Amerika'sındaki kölelik arasındaki temel fark neydi?
answer: Eski köleliğin ekonomik kısıtlamalar nedeniyle bazı tarihsel gerekçeleri varken, modern kölelik siyasi otorite tarafından yapay olarak sürdürülmüştür
wrong_answers:
  - Antik kölelik, Amerikan köleliğinin nispeten ılımlı koşullarından daha acımasız ve insanlık dışıydı
  - Eski kölelik ırksal farklılıklara dayanırken, Amerikan köleliği tamamen ekonomik nitelikteydi
  - Antik kölelik, geçici Amerikan kölelik sisteminden daha uzun sürdü ve daha yaygındı
explanation: |
  Fransız liberal düşünürler, eski köleliğin, fiziksel gücün hayatta kalmak ve üretim için gerekli olduğu ilkel toplumların gerçek ekonomik ve güvenlik kısıtlamalarına bir yanıt olarak geliştiğini kabul etmişlerdir. Bununla birlikte, 18. ve 19. yüzyıl Amerikan köleliğini tarihsel bir paradoks, yani onu gereksiz kılan teknolojik ve sosyal ilerlemeye rağmen varlığını sürdüren anakronik bir kurum olarak görmüşlerdir. Modern köleliğin ekonomik gereklilikten ziyade siyasi güç tarafından yapay bir şekilde sürdürüldüğünü ve bunun da onu eski muadilinden farklı olarak ahlaki açıdan haksız kıldığını savunmuşlardır.
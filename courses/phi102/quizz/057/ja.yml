question: ギュスターヴ・ド・ボーモンのようなフランスの自由主義思想家によれば、古代の奴隷制と18～19世紀のアメリカの奴隷制の主な違いは何だったのか？
answer: 古代の奴隷制度は経済的な制約から歴史的に正当化されていたが、現代の奴隷制度は政治権力によって人為的に維持されている
wrong_answers:
  - 古代の奴隷制度は、比較的温和なアメリカの奴隷制度よりも残虐で非人道的だった
  - 古代の奴隷制度は人種的な違いに基づいていたが、アメリカの奴隷制度は純粋に経済的なものだった。
  - 古代の奴隷制度は、アメリカの一時的な奴隷制度よりも長く続き、広く普及していた
explanation: |
  フランスの自由主義思想家たちは、古代の奴隷制度が、生存と生産に物理的な力が不可欠であった原始社会の真の経済的・安全保障的制約への対応として発展したことを認識していた。しかし、彼らは18世紀から19世紀にかけてのアメリカの奴隷制を歴史的パラドックス、つまり技術や社会の進歩によって不要になったにもかかわらず存続した時代錯誤の制度とみなした。彼らは、現代の奴隷制度は経済的必要性よりもむしろ政治的権力によって人為的に維持されており、古代のそれとは異なり道徳的に正当化できないと主張した。
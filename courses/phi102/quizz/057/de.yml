question: Was war nach Ansicht französischer liberaler Denker wie Gustave de Beaumont der Hauptunterschied zwischen der antiken Sklaverei und der Sklaverei im Amerika des 18. und 19
answer: Die antike Sklaverei war aufgrund wirtschaftlicher Zwänge in gewissem Maße historisch gerechtfertigt, während die moderne Sklaverei von der politischen Autorität künstlich aufrechterhalten wurde
wrong_answers:
  - Die Sklaverei der Antike war brutaler und unmenschlicher als die relativ milden Bedingungen der amerikanischen Sklaverei
  - Die antike Sklaverei beruhte auf Rassenunterschieden, während die amerikanische Sklaverei rein wirtschaftlicher Natur war
  - Die antike Sklaverei dauerte länger und war weiter verbreitet als das vorübergehende amerikanische Sklavereisystem
explanation: |
  Französische liberale Denker erkannten an, dass sich die Sklaverei in der Antike als Reaktion auf die tatsächlichen wirtschaftlichen und sicherheitstechnischen Zwänge primitiver Gesellschaften entwickelt hatte, in denen körperliche Gewalt für das Überleben und die Produktion unerlässlich war. Sie betrachteten jedoch die amerikanische Sklaverei im 18. und 19. Jahrhundert als ein historisches Paradoxon - eine anachronistische Institution, die trotz des technischen und sozialen Fortschritts, der sie überflüssig gemacht hatte, fortbestand. Sie argumentierten, dass die moderne Sklaverei künstlich durch politische Macht und nicht durch wirtschaftliche Notwendigkeit aufrechterhalten wurde, was sie im Gegensatz zu ihrem antiken Gegenstück moralisch nicht rechtfertigbar machte.
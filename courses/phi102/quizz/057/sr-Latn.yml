question: Prema francuskim liberalnim misliocima poput Gustava de Beaumonta, glavna razlika između antičkog ropstva i ropstva u Americi 18.-19. veka bila je u rasnom aspektu.
answer: Drevno ropstvo imalo je neku istorijsku opravdanost zbog ekonomskih ograničenja, dok je moderno ropstvo veštački održavano političkim autoritetom.
wrong_answers:
  - Drevno ropstvo bilo je brutalnije i nehumanije od relativno blagih uslova američkog ropstva
  - Drevno ropstvo je bilo zasnovano na rasnim razlikama dok je američko ropstvo bilo isključivo ekonomske prirode
  - Drevno ropstvo je trajalo duže i bilo je rasprostranjenije od privremenog američkog sistema ropstva.
explanation: |
  Francuski liberalni mislioci prepoznali su da se drevno ropstvo razvilo kao odgovor na stvarna ekonomska i sigurnosna ograničenja primitivnih društava, gde je fizička sila bila ključna za opstanak i proizvodnju. Međutim, oni su posmatrali američko ropstvo 18-19. veka kao istorijski paradoks - anakronističku instituciju koja je opstajala uprkos tehnološkom i društvenom napretku koji ju je učinio nepotrebnom. Tvrdili su da je moderno ropstvo veštački održavano političkom moći, a ne ekonomskom nužnošću, što ga čini moralno neopravdanim za razliku od njegovog drevnog pandana.
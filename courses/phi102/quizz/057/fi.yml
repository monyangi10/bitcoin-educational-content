question: Mikä oli Gustave de Beaumontin kaltaisten ranskalaisten liberaalien ajattelijoiden mukaan tärkein ero antiikin orjuuden ja 1700-1900-luvun Amerikan orjuuden välillä?
answer: Muinaisella orjuudella oli jonkinlainen historiallinen oikeutus taloudellisten rajoitteiden vuoksi, kun taas nykyaikainen orjuus oli poliittisen vallan keinotekoisesti ylläpitämää
wrong_answers:
  - Muinainen orjuus oli raaempaa ja epäinhimillisempää kuin amerikkalaisen orjuuden suhteellisen lievät olosuhteet
  - Muinainen orjuus perustui rotueroihin, kun taas amerikkalainen orjuus oli luonteeltaan puhtaasti taloudellista
  - Muinainen orjuus kesti pidempään ja oli laajemmalle levinnyt kuin väliaikainen amerikkalainen orjuusjärjestelmä
explanation: |
  Ranskalaiset liberaalit ajattelijat tunnustivat, että muinainen orjuus oli kehittynyt vastauksena alkukantaisten yhteiskuntien todellisiin taloudellisiin ja turvallisuuteen liittyviin rajoitteisiin, joissa fyysinen voima oli välttämätöntä selviytymisen ja tuotannon kannalta. He pitivät kuitenkin 1700-1900-luvun amerikkalaista orjuutta historiallisena paradoksina - anakronistisena instituutiona, joka säilyi huolimatta teknologisesta ja yhteiskunnallisesta kehityksestä, joka oli tehnyt siitä tarpeettoman. He väittivät, että nykyaikaista orjuutta pidettiin keinotekoisesti yllä pikemminkin poliittisen vallan kuin taloudellisen välttämättömyyden vuoksi, mikä teki siitä moraalisesti perusteettoman, toisin kuin sen muinaisesta vastineesta.
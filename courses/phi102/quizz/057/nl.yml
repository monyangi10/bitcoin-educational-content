question: Wat was volgens Franse liberale denkers als Gustave de Beaumont het belangrijkste verschil tussen slavernij in de oudheid en slavernij in het Amerika van de 18e-19e eeuw?
answer: Slavernij in de oudheid had een historische rechtvaardiging vanwege economische beperkingen, terwijl moderne slavernij kunstmatig in stand werd gehouden door politiek gezag
wrong_answers:
  - Slavernij in de oudheid was wreder en onmenselijker dan de relatief milde omstandigheden van de Amerikaanse slavernij
  - Slavernij in de oudheid was gebaseerd op raciale verschillen, terwijl Amerikaanse slavernij puur economisch van aard was
  - De slavernij in de oudheid duurde langer en was wijdverspreider dan het tijdelijke Amerikaanse slavernijsysteem
explanation: |
  Franse liberale denkers erkenden dat slavernij zich in de oudheid had ontwikkeld als antwoord op de echte economische en veiligheidsbeperkingen van primitieve samenlevingen, waar fysieke kracht essentieel was om te overleven en te produceren. Ze beschouwden de 18e-19e eeuwse Amerikaanse slavernij echter als een historische paradox - een anachronistisch instituut dat bleef voortbestaan ondanks technologische en sociale vooruitgang die het overbodig had gemaakt. Ze stelden dat moderne slavernij kunstmatig in stand werd gehouden door politieke macht in plaats van economische noodzaak, waardoor het moreel niet te rechtvaardigen was, in tegenstelling tot zijn oude tegenhanger.
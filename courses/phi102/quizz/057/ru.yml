question: По мнению французских либеральных мыслителей, таких как Гюстав де Бомон, в чем заключалось главное отличие между античным рабством и рабством в Америке XVIII-XIX веков?
answer: Древнее рабство имело некоторое историческое оправдание из-за экономических трудностей, в то время как современное рабство искусственно поддерживается политической властью
wrong_answers:
  - Древнее рабство было более жестоким и бесчеловечным, чем относительно мягкие условия американского рабства
  - Древнее рабство было основано на расовых различиях, в то время как американское рабство носило чисто экономический характер
  - Древнее рабство длилось дольше и было более распространено, чем временная американская рабовладельческая система
explanation: |
  Французские либеральные мыслители признавали, что древнее рабство возникло как реакция на реальные экономические трудности и проблемы безопасности примитивных обществ, где физическая сила была необходима для выживания и производства. Однако американское рабство XVIII-XIX веков они рассматривали как исторический парадокс - анахроничный институт, сохранившийся вопреки технологическому и социальному прогрессу, который сделал его ненужным. Они утверждали, что современное рабство искусственно поддерживается политической властью, а не экономической необходимостью, что делает его морально неоправданным в отличие от его древнего аналога.
question: Selon des penseurs libéraux français comme Gustave de Beaumont, quelle est la principale différence entre l'esclavage antique et l'esclavage dans l'Amérique des XVIIIᵉ et XIXᵉ siècles ?
answer: L'esclavage ancien avait une certaine justification historique en raison de contraintes économiques, tandis que l'esclavage moderne a été maintenu artificiellement par l'autorité politique
wrong_answers:
  - L'esclavage dans l'Antiquité était plus brutal et inhumain que les conditions relativement douces de l'esclavage américain
  - L'esclavage antique était fondé sur des différences raciales, tandis que l'esclavage américain était de nature purement économique
  - L'esclavage antique a duré plus longtemps et était plus répandu que le système d'esclavage américain temporaire
explanation: |
  Les penseurs libéraux français ont reconnu que l'esclavage antique s'était développé en réponse à de véritables contraintes économiques et sécuritaires des sociétés primitives, où la force physique était essentielle à la survie et à la production. Cependant, ils considéraient l'esclavage américain des XVIIIᵉ et XIXᵉ siècles comme un paradoxe historique — une institution anachronique qui persistait en dépit des progrès technologiques et sociaux qui l'avaient rendue inutile. Selon eux, l'esclavage moderne est artificiellement maintenu par le pouvoir politique plutôt que par la nécessité économique, ce qui le rend moralement injustifiable, contrairement à son homologue antique.

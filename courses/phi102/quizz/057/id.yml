question: Menurut pemikir liberal Prancis seperti Gustave de Beaumont, apa perbedaan utama antara perbudakan kuno dan perbudakan di Amerika pada abad ke-18 dan 19?
answer: Perbudakan kuno memiliki beberapa pembenaran historis karena kendala ekonomi, sementara perbudakan modern dipertahankan secara artifisial oleh otoritas politik
wrong_answers:
  - Perbudakan kuno lebih brutal dan tidak manusiawi dibandingkan dengan kondisi perbudakan di Amerika yang relatif lebih ringan
  - Perbudakan kuno didasarkan pada perbedaan ras, sementara perbudakan di Amerika murni bersifat ekonomi
  - Perbudakan kuno berlangsung lebih lama dan lebih luas daripada sistem perbudakan Amerika yang bersifat sementara
explanation: |
  Para pemikir liberal Prancis mengakui bahwa perbudakan kuno telah berkembang sebagai respons terhadap kendala ekonomi dan keamanan masyarakat primitif, di mana kekuatan fisik sangat penting untuk kelangsungan hidup dan produksi. Namun, mereka memandang perbudakan di Amerika pada abad ke-18 hingga 19 sebagai sebuah paradoks sejarah - sebuah institusi anakronistik yang tetap ada meskipun kemajuan teknologi dan sosial telah membuatnya tidak diperlukan lagi. Mereka berpendapat bahwa perbudakan modern secara artifisial dipertahankan oleh kekuatan politik dan bukan karena kebutuhan ekonomi, sehingga secara moral tidak dapat dibenarkan, tidak seperti perbudakan pada zaman kuno.
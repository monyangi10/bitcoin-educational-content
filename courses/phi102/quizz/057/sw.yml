question: Kulingana na wanafikra huru wa Ufaransa kama Gustave de Beaumont, tofauti kuu kati ya utumwa wa kale na utumwa katika karne ya 18-19 ya Amerika ilikuwa ipi?
answer: Utumwa wa kale ulikuwa na uhalali fulani wa kihistoria kutokana na vikwazo vya kiuchumi, huku utumwa wa kisasa ukidumishwa bandia na mamlaka ya kisiasa.
wrong_answers:
  - Utumwa wa kale ulikuwa wa kikatili zaidi na usio wa kibinadamu kuliko hali ndogo za utumwa wa Marekani.
  - Utumwa wa kale ulitegemea tofauti za rangi huku utumwa wa Marekani ukitegemea uchumi tu.
  - Utumwa wa kale ulidumu kwa muda mrefu zaidi na ulienea zaidi kuliko mfumo wa utumwa wa muda wa Marekani
explanation: |
  Wanafikra huru wa Ufaransa walitambua kwamba utumwa wa kale ulikuwa umeibuka kama jibu la vikwazo halisi vya kiuchumi na usalama vya jamii za zamani, ambapo nguvu ya kimwili ilikuwa muhimu kwa ajili ya kuishi na uzalishaji. Hata hivyo, waliona utumwa wa Marekani wa karne ya 18-19 kama kitendawili cha kihistoria - taasisi isiyo ya kihistoria ambayo iliendelea licha ya maendeleo ya kiteknolojia na kijamii ambayo yaliufanya kuwa sio lazima. Walisema kwamba utumwa wa kisasa ulidumishwa bandia na nguvu za kisiasa badala ya ulazima wa kiuchumi, na kuufanya usihesabiwe kuwa wa kimaadili tofauti na mwenzake wa zamani.
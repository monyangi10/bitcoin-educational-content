question: Jaký základní princip vysvětluje, proč jsou podle liberální filozofie nadměrné daně a regulace vlastnictví formou územní agrese?
answer: Porušují stejné vlastnické hranice, které jsou respektovány na národní úrovni, ale popírány na úrovni jednotlivce
wrong_answers:
  - Brání vládám ve výběru příjmů potřebných k poskytování základních veřejných služeb občanům
  - Vytvářejí ekonomickou neefektivitu, která snižuje celkovou tvorbu bohatství a sociální blahobyt pro všechny
  - Vytvářejí precedenty, které podněcují cizí státy k nerespektování domácí suverenity a územní celistvosti
explanation: |
  Podle liberální analýzy textu představují nadměrné daně a regulace teritoriální agresi, protože porušují individuální vlastnická práva stejným mechanismem, který by byl odsouzen na národní úrovni. Stejně jako socialisté brání národní hranice proti cizí invazi a uznávají kolektivní vlastnická práva, nedůsledně upírají tutéž ochranu hranic jednotlivcům. Když stát zabírá majetek nad rámec legitimních příspěvků na služby nebo omezuje způsob, jakým vlastníci svůj majetek využívají, dopouští se stejného typu narušení hranic, které by bylo považováno za agresi mezi národy. To odhaluje geometrickou variabilitu v uznávání vlastnictví, kterou text kritizuje.
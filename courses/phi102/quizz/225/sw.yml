question: Ni kanuni gani ya msingi inayoelezea kwa nini kodi nyingi na kanuni za mali hujumuisha aina za uchokozi wa kimaeneo kulingana na falsafa ya kiliberali?
answer: Wanakiuka mipaka ile ile ya mali ambayo inaheshimiwa katika ngazi ya kitaifa lakini inakataliwa katika ngazi ya mtu binafsi
wrong_answers:
  - Zinazuia serikali kukusanya mapato yanayohitajika ili kutoa huduma muhimu za umma kwa raia
  - Husababisha ukosefu wa ufanisi wa kiuchumi unaopunguza uzalishaji wa utajiri kwa ujumla na ustawi wa jamii kwa kila mtu
  - Zinaweka mifano inayohimiza mataifa ya kigeni kutoheshimu uhuru wa ndani na uadilifu wa eneo
explanation: |
  Kulingana na uchambuzi huria wa maandishi, kodi na kanuni nyingi zinawakilisha uchokozi wa eneo kwa sababu zinakiuka haki za mali za mtu binafsi kupitia utaratibu uleule ambao ungeshutumiwa katika ngazi ya kitaifa. Kama vile wasoshalisti wanavyotetea mipaka ya kitaifa dhidi ya uvamizi wa kigeni, wakitambua haki za mali za pamoja, wanakataa ulinzi huu wa mipaka kwa watu binafsi bila mpangilio. Serikali inapochukua mali zaidi ya michango halali ya huduma au kuzuia jinsi wamiliki wanavyotumia mali zao, inafanya aina ile ile ya ukiukaji wa mipaka ambao ungechukuliwa kuwa uchokozi kati ya mataifa. Hii inaonyesha tofauti ya kijiometri katika utambuzi wa mali ambayo maandishi yanaikosoa.
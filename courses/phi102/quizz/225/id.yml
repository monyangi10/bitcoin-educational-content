question: Prinsip dasar apa yang menjelaskan mengapa pajak yang berlebihan dan peraturan properti merupakan bentuk agresi teritorial menurut filosofi liberal?
answer: Mereka melanggar batas-batas properti yang sama yang dihormati di tingkat nasional tetapi ditolak di tingkat individu
wrong_answers:
  - Mereka mencegah pemerintah mengumpulkan pendapatan yang diperlukan untuk menyediakan layanan publik yang penting bagi warga negara
  - Mereka menciptakan inefisiensi ekonomi yang mengurangi penciptaan kekayaan secara keseluruhan dan kesejahteraan sosial bagi semua orang
  - Mereka membangun preseden yang mendorong negara-negara asing untuk tidak menghormati kedaulatan dan integritas teritorial dalam negeri
explanation: |
  Menurut analisis liberal dari teks tersebut, pajak dan peraturan yang berlebihan merupakan agresi teritorial karena melanggar hak milik individu melalui mekanisme yang sama yang akan dikutuk di tingkat nasional. Sama seperti kaum sosialis yang mempertahankan perbatasan nasional dari invasi asing, mengakui hak milik kolektif, mereka secara tidak konsisten menolak perlindungan perbatasan yang sama untuk individu. Ketika negara mengambil properti di luar kontribusi layanan yang sah atau membatasi bagaimana pemilik menggunakan properti mereka, negara melakukan jenis pelanggaran perbatasan yang sama yang akan dianggap sebagai agresi antar negara. Hal ini menunjukkan variabilitas geometris dalam pengakuan properti yang dikritik oleh teks tersebut.
question: 根据自由主义哲学，过度征税和财产管制构成领土侵略的形式，其基本原则是什么？
answer: 它们侵犯了在国家层面受到尊重，但在个人层面却被剥夺的同样的财产界限
wrong_answers:
  - 它们使政府无法获得为公民提供基本公共服务所需的收入
  - 它们造成经济效率低下，降低了整体财富创造和每个人的社会福利
  - 它们开创了鼓励外国不尊重国内主权和领土完整的先例
explanation: |
  根据该文本的自由主义分析，过度征税和管制代表着领土侵略，因为它们通过在国家层面上受到谴责的相同机制侵犯了个人财产权。社会主义者捍卫国家边界抵御外来入侵，承认集体财产权，但他们却前后矛盾地拒绝为个人提供同样的边界保护。当国家获取的财产超出了合法的服务贡献或限制了所有者使用其财产的方式时，它就犯下了被视为国家间侵略的同样类型的侵犯边界行为。这揭示了文本所批评的财产承认方面的几何变异性。
question: Quel principe fondamental explique que la fiscalité excessive et la réglementation de la propriété constituent des formes d'agression territoriale selon la philosophie libérale ?
answer: Ils violent les mêmes limites de propriété qui sont respectées au niveau national mais refusées au niveau individuel
wrong_answers:
  - Ils empêchent les gouvernements de collecter les recettes nécessaires pour fournir des services publics essentiels aux citoyens
  - Ils créent des inefficacités économiques qui réduisent la création globale de richesses et le bien-être social pour tous
  - Ils créent des précédents qui encouragent les nations étrangères à ne pas respecter la souveraineté nationale et l'intégrité territoriale
explanation: |
  Selon l'analyse libérale du texte, une fiscalité et une réglementation excessives représentent une agression territoriale car elles violent les droits de propriété individuels par le même mécanisme que celui qui serait condamné au niveau national. Tout comme les socialistes défendent les frontières nationales contre les invasions étrangères, en reconnaissant les droits de propriété collectifs, ils refusent de manière incohérente ces mêmes protections des frontières aux individus. Lorsque l'État s'approprie des biens au-delà des contributions légitimes aux services ou qu'il restreint l'usage que les propriétaires font de leurs biens, il commet le même type de violation des frontières que celui qui serait considéré comme une agression entre nations. Cela révèle la variabilité géométrique de la reconnaissance de la propriété que le texte critique.
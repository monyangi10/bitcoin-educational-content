question: Mikä perusperiaate selittää, miksi liiallinen verotus ja omaisuutta koskevat säännökset ovat liberaalin filosofian mukaan alueellisen aggression muotoja?
answer: Ne rikkovat samoja omistusrajoja, joita kunnioitetaan kansallisella tasolla mutta kielletään yksilötasolla
wrong_answers:
  - Ne estävät hallituksia keräämästä tuloja, joita tarvitaan keskeisten julkisten palvelujen tarjoamiseen kansalaisille
  - Ne aiheuttavat taloudellista tehottomuutta, joka vähentää yleistä vaurauden luomista ja sosiaalista hyvinvointia kaikille
  - Ne luovat ennakkotapauksia, jotka rohkaisevat ulkomaisia kansakuntia kunnioittamaan kansallista suvereniteettia ja alueellista koskemattomuutta
explanation: |
  Tekstin liberaalin analyysin mukaan liiallinen verotus ja sääntely ovat alueellista aggressiota, koska ne loukkaavat yksilön omistusoikeuksia samalla mekanismilla, joka tuomittaisiin kansallisella tasolla. Aivan kuten sosialistit puolustavat kansallisia rajoja ulkomaisia hyökkäyksiä vastaan ja tunnustavat kollektiiviset omistusoikeudet, he epäjohdonmukaisesti kieltävät saman rajasuojan yksilöiltä. Kun valtio ottaa omaisuutta yli laillisten palvelumaksujen tai rajoittaa omistajien tapaa käyttää omaisuuttaan, se syyllistyy samantyyppiseen rajarikkomukseen, jota pidettäisiin kansakuntien välisenä hyökkäyksenä. Tämä paljastaa tekstissä kritisoidun geometrisen vaihtelun omaisuuden tunnustamisessa.
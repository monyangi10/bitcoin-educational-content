question: Кой фундаментален принцип обяснява защо прекомерното данъчно облагане и регулирането на собствеността представляват форми на териториална агресия според либералната философия?
answer: Те нарушават същите граници на собственост, които се спазват на национално ниво, но се отричат на индивидуално ниво
wrong_answers:
  - Те пречат на правителствата да събират приходи, необходими за предоставянето на основни обществени услуги на гражданите
  - Те създават икономическа неефективност, която намалява цялостното създаване на богатство и социалното благосъстояние за всички
  - Те създават прецеденти, които насърчават чуждите държави да не зачитат националния суверенитет и териториалната цялост
explanation: |
  Според либералния анализ на текста прекомерното данъчно облагане и регулиране представляват териториална агресия, тъй като нарушават индивидуалните права на собственост чрез същия механизъм, който би бил осъден на национално равнище. Точно както социалистите защитават националните граници от чуждестранна инвазия, признавайки колективните права на собственост, те непоследователно отричат същата гранична защита на индивидите. Когато държавата отнема собствеността извън легитимните вноски за услуги или ограничава начина, по който собствениците използват собствеността си, тя извършва същия вид нарушаване на границите, което би се считало за агресия между нациите. Това разкрива геометричната променливост в признаването на собствеността, която текстът критикува.
question: ¿Qué principio fundamental explica por qué la fiscalidad excesiva y la regulación de la propiedad constituyen formas de agresión territorial según la filosofía liberal?
answer: Violan los mismos límites de propiedad que se respetan a nivel nacional pero se niegan a nivel individual
wrong_answers:
  - Impiden a los gobiernos recaudar los ingresos necesarios para prestar servicios públicos esenciales a los ciudadanos
  - Crean ineficiencias económicas que reducen la creación de riqueza y el bienestar social para todos
  - Sientan precedentes que animan a los países extranjeros a no respetar la soberanía nacional y la integridad territorial
explanation: |
  Según el análisis liberal del texto, los impuestos y regulaciones excesivos representan una agresión territorial porque violan los derechos de propiedad individual a través del mismo mecanismo que se condenaría a nivel nacional. Del mismo modo que los socialistas defienden las fronteras nacionales contra la invasión extranjera, reconociendo los derechos de propiedad colectiva, niegan incoherentemente estas mismas protecciones fronterizas a los individuos. Cuando el Estado se apropia de la propiedad más allá de las contribuciones legítimas al servicio o restringe el modo en que los propietarios utilizan su propiedad, comete el mismo tipo de violación de límites que se consideraría agresión entre naciones. Esto revela la variabilidad geométrica en el reconocimiento de la propiedad que critica el texto.
question: Какой фундаментальный принцип объясняет, почему чрезмерное налогообложение и регулирование собственности представляют собой формы территориальной агрессии в соответствии с либеральной философией?
answer: Они нарушают те самые границы собственности, которые соблюдаются на национальном уровне, но отрицаются на индивидуальном
wrong_answers:
  - Они мешают правительствам собирать доходы, необходимые для предоставления гражданам основных государственных услуг
  - Они создают экономическую неэффективность, которая снижает общий уровень создания богатства и социального благосостояния для всех
  - Они создают прецеденты, побуждающие иностранные государства пренебрегать суверенитетом и территориальной целостностью страны
explanation: |
  Согласно либеральному анализу текста, чрезмерное налогообложение и регулирование представляют собой территориальную агрессию, поскольку нарушают права индивидуальной собственности через тот же механизм, который был бы осужден на национальном уровне. Подобно тому, как социалисты защищают национальные границы от иностранного вторжения, признавая права коллективной собственности, они непоследовательно отказывают в защите этих же границ отдельным людям. Когда государство забирает собственность сверх законных служебных взносов или ограничивает использование владельцами своей собственности, оно совершает тот же тип нарушения границ, который считается агрессией между государствами. В этом проявляется геометрическая изменчивость в признании собственности, которую критикует текст.
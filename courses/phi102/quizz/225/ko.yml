question: 자유주의 철학에 따르면 과도한 과세와 재산 규제가 영토 침략의 한 형태가 되는 이유를 설명하는 근본적인 원칙은 무엇인가요?
answer: 국가 차원에서는 존중되지만 개인 차원에서는 거부되는 동일한 재산 경계를 위반합니다
wrong_answers:
  - 정부가 시민들에게 필수 공공 서비스를 제공하는 데 필요한 세금을 징수하지 못하도록 막습니다
  - 이는 전반적인 부의 창출과 사회 복지를 감소시키는 경제적 비효율을 초래합니다
  - 외국 국가가 국내 주권과 영토 보전을 무시하도록 조장하는 선례를 남깁니다
explanation: |
  본문의 자유주의적 분석에 따르면, 과도한 과세와 규제는 국가 차원에서 비난받을 수 있는 동일한 메커니즘을 통해 개인의 재산권을 침해하기 때문에 영토 침략에 해당합니다. 사회주의자들이 외국의 침략으로부터 국경을 방어하고 집단적 재산권을 인정하는 것처럼, 그들은 개인에 대한 동일한 국경 보호를 일관되게 거부합니다. 국가가 정당한 서비스 기여를 넘어 재산을 빼앗거나 소유자의 재산 사용 방법을 제한하는 것은 국가 간 침략으로 간주되는 것과 동일한 유형의 경계 침범을 저지르는 것입니다. 이는 본문에서 비판하는 재산 인식의 기하학적 가변성을 드러냅니다.
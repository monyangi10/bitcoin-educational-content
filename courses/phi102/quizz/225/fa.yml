question: کدام اصل بنیادی توضیح می‌دهد که چرا مالیات‌های بیش از حد و مقررات مالکیت به عنوان اشکالی از تجاوز ارضی طبق فلسفه لیبرال محسوب می‌شوند؟
answer: آن‌ها همان مرزهای مالکیتی را نقض می‌کنند که در سطح ملی محترم شمرده می‌شوند اما در سطح فردی نادیده گرفته می‌شوند.
wrong_answers:
  - آنها مانع از جمع‌آوری درآمد توسط دولت‌ها می‌شوند که برای ارائه خدمات عمومی ضروری به شهروندان مورد نیاز است.
  - آن‌ها ناکارآمدی‌های اقتصادی ایجاد می‌کنند که باعث کاهش ایجاد ثروت کلی و رفاه اجتماعی برای همه می‌شود.
  - آن‌ها سوابقی را ایجاد می‌کنند که ملت‌های خارجی را تشویق می‌کند به حاکمیت داخلی و تمامیت ارضی بی‌احترامی کنند.
explanation: |
  بر اساس تحلیل لیبرال متن، مالیات و مقررات بیش از حد نمایانگر تجاوز ارضی هستند زیرا از طریق همان مکانیزمی که در سطح ملی محکوم می‌شود، حقوق مالکیت فردی را نقض می‌کنند. همان‌طور که سوسیالیست‌ها از مرزهای ملی در برابر تهاجم خارجی دفاع می‌کنند و حقوق مالکیت جمعی را به رسمیت می‌شناسند، به طور ناسازگارانه‌ای این همان حفاظت‌های مرزی را برای افراد انکار می‌کنند. هنگامی که دولت بیش از سهم خدمات مشروع، مالکیت را تصاحب می‌کند یا نحوه استفاده مالکان از اموالشان را محدود می‌کند، همان نوع نقض مرزی را مرتکب می‌شود که به عنوان تجاوز بین ملت‌ها محسوب می‌شود. این نشان‌دهنده تغییرپذیری هندسی در به رسمیت شناختن مالکیت است که متن از آن انتقاد می‌کند.
question: Que princípio fundamental explica por que razão a tributação excessiva e a regulamentação da propriedade constituem formas de agressão territorial de acordo com a filosofia liberal?
answer: Violam os mesmos limites de propriedade que são respeitados a nível nacional mas negados a nível individual
wrong_answers:
  - Impedem os governos de arrecadar as receitas necessárias para prestar serviços públicos essenciais aos cidadãos
  - Criam ineficiências económicas que reduzem a criação global de riqueza e o bem-estar social para todos
  - Estabelecem precedentes que encorajam as nações estrangeiras a desrespeitar a soberania nacional e a integridade territorial
explanation: |
  De acordo com a análise liberal do texto, a tributação e a regulamentação excessivas representam uma agressão territorial porque violam os direitos de propriedade individuais através do mesmo mecanismo que seria condenado a nível nacional. Da mesma forma que os socialistas defendem as fronteiras nacionais contra a invasão estrangeira, reconhecendo os direitos de propriedade colectiva, negam incoerentemente essas mesmas protecções de fronteiras aos indivíduos. Quando o Estado se apodera da propriedade para além das legítimas contribuições para o serviço ou restringe a forma como os proprietários utilizam a sua propriedade, comete o mesmo tipo de violação de fronteiras que seria considerada agressão entre nações. Isto revela a variabilidade geométrica no reconhecimento da propriedade que o texto critica.
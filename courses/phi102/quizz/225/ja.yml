question: 自由主義哲学によれば、過剰な課税や財産規制が領土侵略の一形態となる理由を説明する基本原則は何か？
answer: 国家レベルでは尊重されるが、個人レベルでは否定される財産的境界線を侵害する。
wrong_answers:
  - 国民に必要不可欠な公共サービスを提供するために必要な歳入を政府が集めるのを妨げる。
  - 経済的非効率を生み出し、全体的な富の創出と社会福祉を低下させる。
  - 外国が国内の主権と領土の一体性を軽視することを奨励する前例を作る。
explanation: |
  リベラル派の分析によれば、過剰な課税や規制は、国家レベルで非難されるのと同じメカニズムで個人の財産権を侵害するため、領土侵略を意味する。社会主義者が集団的財産権を認め、外国の侵略から国境を守るのと同じように、個人に対する同じ境界の保護を否定するのは矛盾している。国家が合法的な奉仕活動を超えて財産を取得したり、所有者の財産の使用方法を制限したりする場合、国家間の侵略と見なされるのと同じ種類の境界侵害を犯している。このことは、本文が批判している財産認識の幾何学的なばらつきを明らかにしている。
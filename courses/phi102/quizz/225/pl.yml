question: Jaka fundamentalna zasada wyjaśnia, dlaczego nadmierne opodatkowanie i regulacje dotyczące własności stanowią formy agresji terytorialnej według filozofii liberalnej?
answer: Naruszają one te same granice własności, które są respektowane na poziomie krajowym, ale negowane na poziomie indywidualnym
wrong_answers:
  - Uniemożliwiają one rządom pobieranie dochodów niezbędnych do świadczenia podstawowych usług publicznych na rzecz obywateli
  - Powodują one nieefektywność ekonomiczną, która zmniejsza ogólne tworzenie bogactwa i dobrobyt społeczny dla wszystkich
  - Ustanawiają precedensy, które zachęcają obce narody do lekceważenia suwerenności i integralności terytorialnej kraju
explanation: |
  Zgodnie z liberalną analizą tekstu, nadmierne opodatkowanie i regulacje stanowią agresję terytorialną, ponieważ naruszają indywidualne prawa własności za pomocą tego samego mechanizmu, który byłby potępiany na poziomie krajowym. Tak jak socjaliści bronią granic państwowych przed obcą inwazją, uznając zbiorowe prawa własności, tak niekonsekwentnie odmawiają tej samej ochrony granic jednostkom. Kiedy państwo przejmuje własność wykraczającą poza uzasadniony wkład w usługi lub ogranicza sposób, w jaki właściciele korzystają ze swojej własności, popełnia ten sam rodzaj naruszenia granic, który zostałby uznany za agresję między narodami. Ujawnia to geometryczną zmienność w uznawaniu własności, którą tekst krytykuje.
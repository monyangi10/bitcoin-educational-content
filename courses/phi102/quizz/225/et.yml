question: Milline aluspõhimõte selgitab, miks ülemäärane maksustamine ja omandiõiguse reguleerimine on liberaalse filosoofia kohaselt territoriaalse agressiooni vormid?
answer: Nad rikuvad samu omandipiire, mida riiklikul tasandil austatakse, kuid individuaalsel tasandil eiratakse
wrong_answers:
  - Nad takistavad valitsusi kogumast tulusid, mis on vajalikud kodanikele oluliste avalike teenuste osutamiseks
  - Nad tekitavad majanduslikku ebaefektiivsust, mis vähendab üldist jõukuse loomist ja sotsiaalset heaolu kõigi jaoks
  - Nad loovad pretsedendid, mis julgustavad välisriike austama riigi suveräänsust ja territoriaalset terviklikkust
explanation: |
  Teksti liberaalse analüüsi kohaselt kujutavad ülemäärane maksustamine ja reguleerimine endast territoriaalset agressiooni, sest need rikuvad üksikisiku omandiõigust sama mehhanismi kaudu, mis mõistetaks hukka riiklikul tasandil. Nii nagu sotsialistid kaitsevad riigipiire välisriikide sissetungi eest, tunnustades kollektiivseid omandiõigusi, eitavad nad järjekindlusetult neid samu piirikaitsevahendeid üksikisikutele. Kui riik võtab omandit üle õiguspärase teenistusmakse või piirab omanike omandi kasutamist, siis paneb ta toime sama tüüpi piiride rikkumise, mida peetaks rahvustevaheliseks agressiooniks. See paljastab omandi tunnustamise geomeetrilise varieeruvuse, mida tekstis kritiseeritakse.
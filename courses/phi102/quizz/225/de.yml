question: Welches Grundprinzip erklärt, warum übermäßige Besteuerung und Eigentumsregulierung nach der liberalen Philosophie Formen der territorialen Aggression darstellen?
answer: Sie verletzen dieselben Eigentumsgrenzen, die auf nationaler Ebene respektiert, auf individueller Ebene jedoch verweigert werden
wrong_answers:
  - Sie hindern die Regierungen daran, Einnahmen zu erzielen, die für die Bereitstellung wesentlicher öffentlicher Dienstleistungen für die Bürger erforderlich sind
  - Sie führen zu wirtschaftlichen Ineffizienzen, die den allgemeinen Wohlstand und die soziale Wohlfahrt für alle verringern
  - Sie schaffen Präzedenzfälle, die fremde Nationen dazu ermutigen, die nationale Souveränität und territoriale Integrität zu missachten
explanation: |
  Nach der liberalen Analyse des Textes stellen übermäßige Besteuerung und Regulierung eine territoriale Aggression dar, da sie individuelle Eigentumsrechte durch denselben Mechanismus verletzen, der auf nationaler Ebene verurteilt würde. So wie Sozialisten die nationalen Grenzen gegen ausländische Invasionen verteidigen und dabei kollektive Eigentumsrechte anerkennen, verweigern sie inkonsequenterweise dem Einzelnen den gleichen Schutz der Grenzen. Wenn der Staat Eigentum über die legitimen Leistungen hinaus an sich reißt oder die Art und Weise einschränkt, wie die Eigentümer ihr Eigentum nutzen, begeht er dieselbe Art von Grenzverletzung, die als Aggression zwischen Nationen betrachtet werden würde. Hier zeigt sich die geometrische Variabilität bei der Anerkennung von Eigentum, die im Text kritisiert wird.
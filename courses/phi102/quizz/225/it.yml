question: Quale principio fondamentale spiega perché l'eccessiva tassazione e la regolamentazione della proprietà costituiscono forme di aggressione territoriale secondo la filosofia liberale?
answer: Violano gli stessi confini di proprietà che sono rispettati a livello nazionale ma negati a livello individuale
wrong_answers:
  - Impediscono ai governi di raccogliere le entrate necessarie per fornire servizi pubblici essenziali ai cittadini
  - Creano inefficienze economiche che riducono la creazione di ricchezza complessiva e il benessere sociale di tutti
  - Stabiliscono precedenti che incoraggiano le nazioni straniere a non rispettare la sovranità nazionale e l'integrità territoriale
explanation: |
  Secondo l'analisi liberale del testo, una tassazione e una regolamentazione eccessive rappresentano un'aggressione territoriale perché violano i diritti di proprietà individuali attraverso lo stesso meccanismo che sarebbe condannato a livello nazionale. Così come i socialisti difendono i confini nazionali dall'invasione straniera, riconoscendo i diritti di proprietà collettivi, incoerentemente negano queste stesse protezioni ai confini individuali. Quando lo Stato si appropria della proprietà al di là dei legittimi contributi di servizio o limita il modo in cui i proprietari usano la loro proprietà, commette lo stesso tipo di violazione dei confini che sarebbe considerata un'aggressione tra nazioni. Questo rivela la variabilità geometrica nel riconoscimento della proprietà che il testo critica.
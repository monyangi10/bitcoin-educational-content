question: Ni ingingo ngenderwako iyihe y’ishimikiro isigura igituma imisoro n’amategeko agenga ivy’itunga birenze urugero ari uburyo bwo gutera intara nk’uko filozofiya y’ubwigenge ibivuga?
answer: Baca ku ruhande rw’imipaka y’itunga nyene yubahirizwa ku rwego rw’igihugu ariko igahakanwa ku rwego rw’umuntu ku giti ciwe .
wrong_answers:
  - Bibuza intwaro gukusanya amafaranga akenewe kugira ngo zihe abanyagihugu ibikorwa vya Leta bihambaye .
  - Bituma ubutunzi bugira ubukene bugabanya ubutunzi muri rusangi n'imibereho myiza y'abantu bose .
  - Bishiraho ingero ziremesha amahanga gusuzugura ubusegaba bwo mu gihugu n’ubumwe bw’intara .
explanation: |
  Dushingiye ku nseguro y’ubwigenge bw’ico canditswe, imisoro n’amategeko birenze urugero bigereranya ubukazi bw’intara kuko bihungabanya uburenganzira bw’umuntu ku giti ciwe biciye ku buryo bumwe bwocirirwa urubanza ku rwego rw’igihugu. Nk’uko nyene abasosiyalisiti barwanira imipaka y’ibihugu ku bitero vy’amahanga, bakemera uburenganzira bw’umutungo rusangi, barahakana ata guhinduka iyo mipaka nyene ku bantu ku giti cabo. Iyo Leta ifashe umutungo urenze intererano z’ibikorwa zitegekanijwe canke igahagarika ingene ba nyen’umutungo bakoresha umutungo wabo, iba ikora ubwo bwoko nyene bwo kurenga ku mipaka bwofatwa nk’ubukazi hagati y’ibihugu. Ivyo birerekana uguhinduka kw’ubuhinga bw’ubuhinga bwo kwemera umutungo ico canditswe kinegura.
question: What fundamental principle explains why excessive taxation and property regulations constitute forms of territorial aggression according to liberal philosophy?
answer: They violate the same property boundaries that are respected at the national level but denied at the individual level
wrong_answers:
  - They prevent governments from collecting revenue needed to provide essential public services to citizens
  - They create economic inefficiencies that reduce overall wealth creation and social welfare for everyone
  - They establish precedents that encourage foreign nations to disrespect domestic sovereignty and territorial integrity
explanation: |
  According to the text's liberal analysis, excessive taxation and regulations represent territorial aggression because they violate individual property rights through the same mechanism that would be condemned at the national level. Just as socialists defend national borders against foreign invasion, recognizing collective property rights, they inconsistently deny these same boundary protections to individuals. When the state takes property beyond legitimate service contributions or restricts how owners use their property, it commits the same type of boundary violation that would be considered aggression between nations. This reveals the geometric variability in property recognition that the text criticizes.

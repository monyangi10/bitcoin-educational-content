question: Nguyên tắc cơ bản nào giải thích tại sao việc đánh thuế quá mức và các quy định về sở hữu tài sản lại cấu thành các hình thức xâm lược lãnh thổ theo triết học tự do?
answer: Họ vi phạm chính những ranh giới sở hữu tài sản được tôn trọng ở cấp quốc gia nhưng lại bị phủ nhận ở cấp cá nhân.
wrong_answers:
  - Chúng ngăn cản chính phủ thu ngân sách cần thiết để cung cấp các dịch vụ công thiết yếu cho người dân.
  - Chúng tạo ra sự kém hiệu quả về kinh tế, làm giảm tổng sản lượng tạo ra và phúc lợi xã hội cho tất cả mọi người.
  - Chúng tạo ra những tiền lệ khuyến khích các quốc gia nước ngoài coi thường chủ quyền quốc gia và toàn vẹn lãnh thổ.
explanation: |
  Theo phân tích tự do trong văn bản này, việc đánh thuế và quản lý quá mức là hành vi xâm lược lãnh thổ vì chúng vi phạm quyền sở hữu cá nhân thông qua cùng một cơ chế bị lên án ở cấp quốc gia. Cũng giống như những người theo chủ nghĩa xã hội bảo vệ biên giới quốc gia chống lại sự xâm lược của nước ngoài, công nhận quyền sở hữu tập thể, họ lại không nhất quán khi phủ nhận những sự bảo vệ biên giới tương tự đối với cá nhân. Khi nhà nước lấy tài sản vượt quá mức đóng góp dịch vụ hợp pháp hoặc hạn chế cách chủ sở hữu sử dụng tài sản của họ, nó đã phạm phải cùng một loại vi phạm biên giới mà sẽ bị coi là hành vi xâm lược giữa các quốc gia. Điều này cho thấy sự biến đổi hình học trong việc công nhận quyền sở hữu mà văn bản này chỉ trích.
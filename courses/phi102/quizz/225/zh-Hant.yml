question: 根據自由哲學，過度課稅和財產規範構成地域侵略的形式，這是什麼基本原則？
answer: 他們違反了在國家層面上受到尊重，但在個人層面上卻被拒絕的相同財產界限
wrong_answers:
  - 它們妨礙政府收取必要的稅收，為公民提供必要的公共服務
  - 它們造成經濟效率低落，降低整體財富創造及每個人的社會福利。
  - 它們開創了先例，鼓勵外國不尊重國內主權和領土完整。
explanation: |
  根據文中自由主義者的分析，過度的課稅與法規代表了領土侵略，因為它們透過相同的機制侵犯了個人的財產權，而這些機制在國家層面也會受到譴責。就像社會主義者捍衛國家邊界不受外來侵略，承認集體財產權一樣，他們卻不一致地拒絕對個人提供這些相同的邊界保護。當國家取得超出合法服務貢獻的財產，或限制所有者如何使用他們的財產時，它就犯下了國家之間會被視為侵略的同一種侵犯邊界的行為。這揭示了文中所批判的財產承認的幾何變異性。
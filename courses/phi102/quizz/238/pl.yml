question: Dlaczego myśl liberalna odrzuca decentralizację jako adekwatne rozwiązanie nadmiernej interwencji państwa?
answer: Ponieważ przeniesienie funkcji państwowych na władze lokalne jedynie przenosi problem, zamiast eliminować bezprawną interwencję rządu
wrong_answers:
  - Ponieważ decentralizacja powoduje zbyt dużą złożoność administracyjną i nieefektywność biurokratyczną, aby zapewnić skuteczne zarządzanie
  - Ponieważ władzom lokalnym brakuje specjalistycznej wiedzy technicznej i zasobów niezbędnych do skutecznego zarządzania złożonymi usługami publicznymi
  - Ponieważ decentralizacja podważa jedność narodową i tworzy niebezpieczną fragmentację władzy politycznej
explanation: |
  Liberalni myśliciele twierdzą, że decentralizacja nie rozwiązuje fundamentalnej kwestii bezprawnej interwencji państwa. Samo przeniesienie funkcji z rządu centralnego do władz lokalnych (gmin, regionów) nie rozwiązuje problemu, ponieważ władze lokalne nie mają większej legitymacji niż rząd centralny do interweniowania w obszarach, które powinny należeć do działalności prywatnej. Celem nie jest przeniesienie władzy państwowej, ale całkowite przekazanie tych funkcji do domeny prywatnej - osobom fizycznym, wolnym stowarzyszeniom i przedsiębiorstwom. Prawdziwa liberalna reforma wymaga całkowitego wyeliminowania nieodpowiednich ról rządu, a nie tylko zmiany poziomu, na którym rząd je wykonuje.
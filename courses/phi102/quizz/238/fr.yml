question: Pourquoi la pensée libérale rejette-t-elle la décentralisation comme solution adéquate à l'intervention excessive de l'État ?
answer: Parce que le transfert des fonctions de l'État aux autorités locales ne fait que déplacer le problème au lieu d'éliminer l'intervention illégitime du gouvernement
wrong_answers:
  - Parce que la décentralisation crée trop de complexité administrative et d'inefficacité bureaucratique pour une gouvernance efficace
  - Parce que les autorités locales ne disposent pas de l'expertise technique et des ressources nécessaires pour gérer efficacement des services publics complexes
  - Parce que la décentralisation sape l'unité nationale et crée une dangereuse fragmentation de l'autorité politique
explanation: |
  Les penseurs libéraux affirment que la décentralisation n'aborde pas la question fondamentale de l'intervention illégitime de l'État. Le simple transfert de fonctions du gouvernement central au gouvernement local (municipalités, régions) ne résout pas le problème car les autorités locales n'ont pas plus de légitimité que le gouvernement central pour intervenir dans des domaines qui devraient appartenir à l'activité privée. L'objectif n'est pas de délocaliser le pouvoir de l'État, mais de transférer ces fonctions entièrement au domaine privé - aux individus, aux associations libres et aux entreprises. Une véritable réforme libérale exige l'élimination totale des rôles inappropriés de l'État, et non pas seulement un changement du niveau de gouvernement qui les exerce.
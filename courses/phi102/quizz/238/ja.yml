question: なぜリベラル思想は、過剰な国家介入に対する適切な解決策として地方分権を否定するのか？
answer: 国家機能を地方当局に移管することは、違法な政府の介入を排除するのではなく、問題を移転させるだけだからだ。
wrong_answers:
  - 地方分権は行政の複雑さと官僚的非効率を生み、効果的なガバナンスを実現できないからだ。
  - 地方自治体には、複雑な公共サービスを効果的に管理するために必要な技術的専門知識や資源が不足しているためである。
  - 地方分権は国民の団結を損ない、政治的権威の危険な分断を生み出すからだ。
explanation: |
  リベラル派は、地方分権は国家の非合法な介入という根本的な問題に対処できていないと主張する。中央政府から地方政府（市町村、地域）に機能を移すだけでは問題は解決しない。なぜなら、地方当局は民間活動に属するべき領域に介入する正当性を中央政府以上に持っていないからだ。目標は国家権力を移転することではなく、これらの機能を完全に私的領域、つまり個人、自由団体、企業に移すことである。真の自由主義改革には、どのレベルの政府が行うかを変えるだけでなく、不適切な政府の役割を完全に排除することが必要なのだ。
question: Hvorfor avviser liberal tenkning desentralisering som en adekvat løsning på overdreven statlig inngripen?
answer: Fordi overføring av statlige funksjoner til lokale myndigheter bare flytter problemet i stedet for å eliminere illegitime statlige inngrep
wrong_answers:
  - Fordi desentralisering skaper for mye administrativ kompleksitet og byråkratisk ineffektivitet for effektiv styring
  - Fordi lokale myndigheter mangler den tekniske ekspertisen og ressursene som er nødvendige for å forvalte komplekse offentlige tjenester på en effektiv måte
  - Fordi desentralisering undergraver nasjonal enhet og skaper en farlig fragmentering av politisk autoritet
explanation: |
  Liberale tenkere hevder at desentralisering ikke løser det grunnleggende problemet med illegitim statlig inngripen. Problemet løses ikke ved å overføre funksjoner fra staten til lokale myndigheter (kommuner, regioner), fordi lokale myndigheter ikke har større legitimitet enn staten til å gripe inn på områder som burde tilhøre privat aktivitet. Målet er ikke å flytte statsmakt, men å overføre disse funksjonene helt og holdent til det private domene - til enkeltpersoner, frie sammenslutninger og foretak. En ekte liberal reform krever at man fjerner uhensiktsmessige statlige roller helt og holdent, ikke bare at man endrer hvilket forvaltningsnivå som utfører dem.
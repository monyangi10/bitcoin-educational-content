question: Zašto liberalna misao odbacuje decentralizaciju kao adekvatno rešenje za prekomernu državnu intervenciju?
answer: Jer prebacivanje državnih funkcija na lokalne vlasti samo premješta problem umesto da eliminiše nelegitimnu intervenciju vlade
wrong_answers:
  - Zato što decentralizacija stvara previše administrativne složenosti i birokratske neefikasnosti za efikasno upravljanje
  - Zbog nedostatka tehničke stručnosti i resursa, lokalne vlasti nisu u mogućnosti da efikasno upravljaju složenim javnim uslugama.
  - Zato što decentralizacija podriva nacionalno jedinstvo i stvara opasnu fragmentaciju političkog autoriteta
explanation: |
  Liberalni mislioci tvrde da decentralizacija ne rešava osnovni problem nelegitimne državne intervencije. Samo prebacivanje funkcija sa centralne na lokalnu vlast (opštine, regioni) ne rešava problem jer lokalne vlasti nemaju veću legitimnost od centralne vlasti da intervenišu u oblastima koje bi trebalo da pripadaju privatnoj aktivnosti. Cilj nije preseliti državnu moć, već potpuno preneti te funkcije u privatnu sferu - na pojedince, slobodna udruženja i preduzeća. Prava liberalna reforma zahteva eliminisanje neprimerenih uloga vlade u potpunosti, a ne samo promenu nivoa vlasti koji ih obavlja.
question: Warum lehnt das liberale Denken die Dezentralisierung als angemessene Lösung für übermäßige staatliche Eingriffe ab?
answer: Weil die Übertragung staatlicher Aufgaben auf die lokalen Behörden das Problem nur verlagert und nicht die unrechtmäßigen staatlichen Eingriffe beseitigt
wrong_answers:
  - Weil die Dezentralisierung zu viel verwaltungstechnische Komplexität und bürokratische Ineffizienz für eine effektive Regierungsführung schafft
  - Weil den lokalen Behörden das technische Fachwissen und die Ressourcen fehlen, um komplexe öffentliche Dienstleistungen effizient zu verwalten
  - Weil die Dezentralisierung die nationale Einheit untergräbt und zu einer gefährlichen Zersplitterung der politischen Autorität führt
explanation: |
  Liberale Denker argumentieren, dass die Dezentralisierung das grundlegende Problem der illegitimen staatlichen Intervention nicht angeht. Die bloße Verlagerung von Aufgaben von der Zentralregierung auf die lokalen Behörden (Gemeinden, Regionen) löst das Problem nicht, da die lokalen Behörden keine größere Legitimation als die Zentralregierung haben, in Bereiche einzugreifen, die eigentlich der Privatwirtschaft gehören. Das Ziel besteht nicht darin, staatliche Macht zu verlagern, sondern diese Funktionen vollständig in den privaten Bereich zu übertragen - an Einzelpersonen, freie Vereinigungen und Unternehmen. Eine echte liberale Reform erfordert die völlige Abschaffung unangemessener staatlicher Aufgaben und nicht nur eine Änderung der Regierungsebene, die diese Aufgaben wahrnimmt.
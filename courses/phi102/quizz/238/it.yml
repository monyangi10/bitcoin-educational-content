question: Perché il pensiero liberale rifiuta il decentramento come soluzione adeguata all'eccessivo intervento dello Stato?
answer: Perché il trasferimento di funzioni statali alle autorità locali non fa altro che trasferire il problema, anziché eliminare l'intervento illegittimo del governo
wrong_answers:
  - Perché il decentramento crea troppa complessità amministrativa e inefficienza burocratica per una governance efficace
  - Perché le autorità locali non hanno le competenze tecniche e le risorse necessarie per gestire efficacemente servizi pubblici complessi
  - Perché il decentramento mina l'unità nazionale e crea una pericolosa frammentazione dell'autorità politica
explanation: |
  I pensatori liberali sostengono che il decentramento non riesce ad affrontare la questione fondamentale dell'intervento illegittimo dello Stato. Il semplice trasferimento di funzioni dal governo centrale a quello locale (comuni, regioni) non risolve il problema, perché le autorità locali non sono più legittimate del governo centrale a intervenire in aree che dovrebbero appartenere all'attività privata. L'obiettivo non è quello di trasferire il potere dello Stato, ma di trasferire queste funzioni interamente al settore privato - agli individui, alle libere associazioni e alle imprese. Una vera riforma liberale richiede l'eliminazione totale dei ruoli governativi inappropriati, non solo la modifica del livello di governo che li svolge.
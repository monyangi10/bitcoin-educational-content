question: Waarom verwerpt het liberale gedachtegoed decentralisatie als een adequate oplossing voor overmatige staatsinterventie?
answer: Omdat het overhevelen van staatsfuncties naar lokale overheden het probleem alleen maar verplaatst in plaats van onwettige overheidsinterventie te elimineren
wrong_answers:
  - Omdat decentralisatie leidt tot te veel administratieve complexiteit en bureaucratische inefficiëntie voor effectief bestuur
  - Omdat lokale overheden niet beschikken over de technische expertise en middelen die nodig zijn om complexe overheidsdiensten effectief te beheren
  - Omdat decentralisatie de nationale eenheid ondermijnt en leidt tot een gevaarlijke versnippering van het politieke gezag
explanation: |
  Liberale denkers stellen dat decentralisatie het fundamentele probleem van onrechtmatige staatsinterventie niet aanpakt. Simpelweg functies overdragen van de centrale naar de lokale overheid (gemeenten, regio's) lost het probleem niet op omdat lokale overheden geen grotere legitimiteit hebben dan de centrale overheid om in te grijpen in gebieden die aan particuliere activiteiten zouden moeten toebehoren. Het doel is niet om de macht van de staat te verplaatsen maar om deze functies volledig over te hevelen naar het privédomein - naar individuen, vrije verenigingen en ondernemingen. Echte liberale hervormingen vereisen het volledig elimineren van ongepaste overheidstaken, niet alleen het veranderen van het overheidsniveau dat ze uitvoert.
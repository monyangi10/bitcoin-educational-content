question: Miksi liberaali ajattelu hylkää hajauttamisen riittävänä ratkaisuna liialliseen valtion puuttumiseen?
answer: Koska valtion tehtävien siirtäminen paikallisille viranomaisille vain siirtää ongelman muualle sen sijaan, että se poistaisi laittoman valtion puuttumisen
wrong_answers:
  - Koska hajauttaminen aiheuttaa liikaa hallinnollista monimutkaisuutta ja byrokraattista tehottomuutta tehokkaan hallinnon kannalta
  - Koska paikallisviranomaisilla ei ole teknistä asiantuntemusta ja resursseja, joita tarvitaan monitahoisten julkisten palvelujen tehokkaaseen hallinnointiin
  - Koska hajauttaminen heikentää kansallista yhtenäisyyttä ja aiheuttaa vaarallista poliittisen vallan pirstaloitumista
explanation: |
  Liberaalit ajattelijat väittävät, että hajauttamisella ei pystytä ratkaisemaan perustavanlaatuista ongelmaa, joka liittyy valtion laittomaan väliintuloon. Pelkkä toimintojen siirtäminen keskushallinnolta paikallishallinnolle (kunnille, alueille) ei ratkaise ongelmaa, koska paikallisviranomaisilla ei ole keskushallintoa suurempaa legitimiteettiä puuttua alueisiin, joiden pitäisi kuulua yksityiselle toiminnalle. Tavoitteena ei ole valtion vallan siirtäminen vaan näiden toimintojen siirtäminen kokonaan yksityiselle alalle - yksityishenkilöille, vapaille yhdistyksille ja yrityksille. Todellinen liberaali uudistus edellyttää, että sopimattomat valtion tehtävät poistetaan kokonaan, eikä vain muuteta sitä, mikä hallinnon taso niitä hoitaa.
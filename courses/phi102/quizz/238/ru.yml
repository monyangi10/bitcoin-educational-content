question: Почему либеральная мысль отвергает децентрализацию как адекватное решение проблемы чрезмерного государственного вмешательства?
answer: Поскольку передача государственных функций местным властям лишь переносит проблему, а не устраняет нелегитимное вмешательство государства
wrong_answers:
  - Потому что децентрализация создает слишком много административных сложностей и бюрократической неэффективности для эффективного управления
  - Поскольку местным властям не хватает технических знаний и ресурсов, необходимых для эффективного управления сложными государственными услугами
  - Потому что децентрализация подрывает национальное единство и создает опасную фрагментацию политической власти
explanation: |
  Либеральные мыслители утверждают, что децентрализация не решает фундаментальную проблему нелегитимного вмешательства государства. Простая передача функций от центрального правительства к местному (муниципалитетам, регионам) не решает проблему, поскольку местные власти не обладают большей легитимностью, чем центральное правительство, чтобы вмешиваться в сферы, которые должны принадлежать частной деятельности. Цель состоит не в том, чтобы переместить государственную власть, а в том, чтобы полностью передать эти функции в частную сферу - частным лицам, свободным ассоциациям и предприятиям. Настоящая либеральная реформа требует полного устранения неподобающих функций правительства, а не просто изменения того, какой уровень власти их выполняет.
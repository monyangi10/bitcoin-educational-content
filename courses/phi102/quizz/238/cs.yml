question: Proč liberální myšlení odmítá decentralizaci jako adekvátní řešení nadměrných státních zásahů?
answer: Protože přenesením státních funkcí na místní orgány se problém pouze přesouvá, místo aby se odstranily nelegitimní státní zásahy
wrong_answers:
  - Protože decentralizace vytváří příliš velkou administrativní složitost a byrokratickou neefektivitu pro efektivní správu věcí veřejných
  - Protože místní orgány nemají dostatek technických znalostí a zdrojů potřebných k efektivnímu řízení komplexních veřejných služeb
  - Protože decentralizace podkopává národní jednotu a vytváří nebezpečnou fragmentaci politické moci
explanation: |
  Liberální myslitelé tvrdí, že decentralizace neřeší základní problém nelegitimních státních zásahů. Pouhý přesun funkcí z centrální vlády na místní (obce, kraje) problém neřeší, protože místní orgány nemají větší legitimitu než centrální vláda zasahovat do oblastí, které by měly patřit soukromým aktivitám. Cílem není přesunout státní moc, ale přenést tyto funkce zcela do soukromé sféry - na jednotlivce, svobodná sdružení a podniky. Skutečná liberální reforma vyžaduje úplné odstranění nevhodných vládních rolí, nikoli pouze změnu toho, která úroveň vlády je vykonává.
question: ¿Por qué el pensamiento liberal rechaza la descentralización como solución adecuada a la excesiva intervención del Estado?
answer: Porque la transferencia de funciones estatales a las autoridades locales no hace más que trasladar el problema, en lugar de eliminar la intervención ilegítima del gobierno
wrong_answers:
  - Porque la descentralización crea demasiada complejidad administrativa e ineficacia burocrática para una gobernanza eficaz
  - Porque las autoridades locales carecen de los conocimientos técnicos y los recursos necesarios para gestionar eficazmente servicios públicos complejos
  - Porque la descentralización socava la unidad nacional y crea una peligrosa fragmentación de la autoridad política
explanation: |
  Los pensadores liberales sostienen que la descentralización no aborda la cuestión fundamental de la intervención ilegítima del Estado. La simple transferencia de funciones del gobierno central al local (municipios, regiones) no resuelve el problema porque las autoridades locales no tienen mayor legitimidad que el gobierno central para intervenir en ámbitos que deberían pertenecer a la actividad privada. El objetivo no es deslocalizar el poder estatal, sino transferir esas funciones por completo al ámbito privado: a los individuos, las asociaciones libres y las empresas. La verdadera reforma liberal exige eliminar por completo las funciones inapropiadas del gobierno, no sólo cambiar qué nivel de gobierno las desempeña.
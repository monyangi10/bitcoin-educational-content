question: Porque é que o pensamento liberal rejeita a descentralização como uma solução adequada para a intervenção excessiva do Estado?
answer: Porque a transferência de funções do Estado para as autoridades locais apenas deslocaliza o problema, em vez de eliminar a intervenção ilegítima do governo
wrong_answers:
  - Porque a descentralização cria demasiada complexidade administrativa e ineficiência burocrática para uma governação eficaz
  - Porque as autoridades locais não dispõem das competências técnicas e dos recursos necessários para gerir eficazmente serviços públicos complexos
  - Porque a descentralização mina a unidade nacional e cria uma perigosa fragmentação da autoridade política
explanation: |
  Os pensadores liberais argumentam que a descentralização não consegue resolver a questão fundamental da intervenção ilegítima do Estado. A simples transferência de funções do governo central para o governo local (municípios, regiões) não resolve o problema porque as autoridades locais não têm maior legitimidade do que o governo central para intervir em áreas que deveriam pertencer à atividade privada. O objetivo não é deslocalizar o poder do Estado, mas transferir essas funções inteiramente para o domínio privado - para indivíduos, associações livres e empresas. A verdadeira reforma liberal exige a eliminação total das funções governamentais inadequadas e não apenas a alteração do nível de governo que as desempenha.
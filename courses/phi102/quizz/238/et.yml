question: Miks lükkab liberaalne mõtlemine tagasi detsentraliseerimise kui adekvaatse lahenduse liigse riikliku sekkumise vastu?
answer: Kuna riigi funktsioonide üleandmine kohalikele omavalitsustele üksnes paigutab probleemi ümber, mitte ei kõrvalda ebaseaduslikku valitsuse sekkumist
wrong_answers:
  - Kuna detsentraliseerimine tekitab tõhusaks valitsemiseks liiga palju halduslikku keerukust ja bürokraatlikku ebatõhusust
  - Kuna kohalikel omavalitsustel puuduvad tehnilised teadmised ja ressursid, mis on vajalikud keeruliste avalike teenuste tõhusaks haldamiseks
  - Kuna detsentraliseerimine õõnestab riiklikku ühtsust ja tekitab ohtliku poliitilise võimu killustatuse
explanation: |
  Liberaalsed mõtlejad väidavad, et detsentraliseerimine ei lahenda riigi ebaseadusliku sekkumise põhiprobleemi. Lihtsalt funktsioonide üleandmine keskvalitsuselt kohalikele omavalitsustele (omavalitsused, piirkonnad) ei lahenda probleemi, sest kohalikel omavalitsustel ei ole keskvalitsusest suuremat legitiimsust sekkuda valdkondadesse, mis peaksid kuuluma eraõiguslikule tegevusele. Eesmärk ei ole mitte riigivõimu ümberpaigutamine, vaid nende funktsioonide täielik üleandmine erasektorile - üksikisikutele, vabadele ühendustele ja ettevõtetele. Tõeline liberaalne reform nõuab sobimatute valitsemisülesannete täielikku kaotamist, mitte ainult selle muutmist, milline valitsustasand neid täidab.
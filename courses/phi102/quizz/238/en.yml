question: Why does liberal thought reject decentralization as an adequate solution to excessive state intervention?
answer: Because transferring state functions to local authorities merely relocates the problem rather than eliminating illegitimate government intervention
wrong_answers:
  - Because decentralization creates too much administrative complexity and bureaucratic inefficiency for effective governance
  - Because local authorities lack the technical expertise and resources necessary to manage complex public services effectively
  - Because decentralization undermines national unity and creates dangerous fragmentation of political authority
explanation: |
  Liberal thinkers argue that decentralization fails to address the fundamental issue of illegitimate state intervention. Simply transferring functions from central to local government (municipalities, regions) doesn't solve the problem because local authorities have no greater legitimacy than central government to intervene in areas that should belong to private activity. The goal isn't to relocate state power but to transfer these functions entirely to the private domain - to individuals, free associations, and enterprises. True liberal reform requires eliminating inappropriate government roles altogether, not just changing which level of government performs them.

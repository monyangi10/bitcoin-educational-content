question: Защо либералната мисъл отхвърля децентрализацията като адекватно решение на прекомерната държавна намеса?
answer: Тъй като прехвърлянето на държавните функции на местните власти само премества проблема, а не премахва нелегитимната държавна намеса
wrong_answers:
  - Тъй като децентрализацията създава твърде голяма административна сложност и бюрократична неефективност за ефективно управление
  - Тъй като местните власти не разполагат с техническия опит и ресурсите, необходими за ефективното управление на сложни обществени услуги
  - Тъй като децентрализацията подкопава националното единство и създава опасна фрагментация на политическата власт
explanation: |
  Либералните мислители твърдят, че децентрализацията не успява да реши основния въпрос за нелегитимната държавна намеса. Простото прехвърляне на функции от централната към местната власт (общини, региони) не решава проблема, защото местните власти нямат по-голяма легитимност от централната власт да се намесват в области, които би трябвало да принадлежат на частната дейност. Целта не е да се премести държавната власт, а да се прехвърлят тези функции изцяло в частната сфера - на индивидите, свободните сдружения и предприятията. Истинската либерална реформа изисква изцяло да се премахнат неподходящите държавни функции, а не само да се промени нивото на управление, което ги изпълнява.
question: Theo nghịch lý về sự hướng dẫn dân chủ, mâu thuẫn cơ bản nào tồn tại trong các hệ thống chính trị đương đại liên quan đến năng lực cá nhân?
answer: Công dân được cho là không có khả năng đưa ra quyết định cá nhân nhưng lại có khả năng đưa ra các quyết định chính trị tập thể cho tất cả mọi người.
wrong_answers:
  - Người dân được cho là có khả năng đưa ra các lựa chọn kinh tế nhưng lại không có khả năng hiểu các nguyên tắc hiến pháp.
  - Cá nhân có thể đưa ra quyết định nhanh chóng một cách hiệu quả nhưng lại gặp khó khăn trong việc lập kế hoạch chính trị dài hạn và tầm nhìn xa.
  - Người dân thể hiện năng lực trong quản lý địa phương nhưng thiếu chuyên môn để tham gia dân chủ ở cấp quốc gia.
explanation: |
  Nghịch lý cốt lõi được chỉ ra trong văn bản cho thấy rằng các hệ thống dân chủ đồng thời nắm giữ hai niềm tin trái ngược nhau về năng lực của công dân. Một mặt, các quy định rộng rãi và sự giám sát của nhà nước giả định rằng các cá nhân không thể tự quản lý bản thân và cần sự hướng dẫn liên tục để tránh những lựa chọn sai lầm. Mặt khác, các cơ chế dân chủ lại cho rằng chính những cá nhân này hoàn toàn có khả năng đưa ra các quyết định tập thể phức tạp về quản trị, so sánh các chương trình và đánh giá hậu quả chính trị. Sự mâu thuẫn này đặc biệt nổi bật bởi vì các lựa chọn kinh tế cá nhân đơn giản và tức thời hơn so với các quyết định chính trị phức tạp ảnh hưởng đến toàn xã hội.
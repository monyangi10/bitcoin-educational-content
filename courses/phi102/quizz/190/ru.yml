question: Согласно парадоксу демократической опеки, какое фундаментальное противоречие существует в современных политических системах в отношении индивидуальных способностей?
answer: Граждане считаются неспособными принимать личные решения, но способными принимать коллективные политические решения за всех
wrong_answers:
  - Граждане считаются способными к экономическому выбору, но неспособными понять конституционные принципы
  - Люди могут эффективно принимать сиюминутные решения, но с трудом справляются с долгосрочным политическим планированием и предвидением
  - Люди демонстрируют компетентность в вопросах местного управления, но не обладают достаточным опытом для участия в демократических процессах на национальном уровне
explanation: |
  Основной парадокс, выявленный в тексте, показывает, что демократические системы одновременно придерживаются двух противоречивых убеждений относительно возможностей граждан. С одной стороны, широкое регулирование и государственный надзор предполагают, что люди не могут управлять собой и нуждаются в постоянном руководстве, чтобы предотвратить неправильный выбор. С другой стороны, демократические механизмы предполагают, что те же самые люди вполне способны принимать сложные коллективные решения об управлении, сравнивать программы и оценивать политические последствия. Это противоречие особенно поразительно, поскольку индивидуальный экономический выбор проще и непосредственнее, чем сложные политические решения, затрагивающие целые общества.
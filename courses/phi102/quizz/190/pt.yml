question: De acordo com o paradoxo da tutela democrática, que contradição fundamental existe nos sistemas políticos contemporâneos relativamente à capacidade individual?
answer: Os cidadãos são considerados incapazes de tomar decisões pessoais, mas capazes de tomar decisões políticas colectivas para todos
wrong_answers:
  - Os cidadãos são considerados capazes de fazer escolhas económicas, mas incapazes de compreender os princípios constitucionais
  - Os indivíduos podem tomar decisões imediatas de forma eficaz, mas têm dificuldade em planear e prever políticas a longo prazo
  - As pessoas demonstram competência na governação local, mas não possuem os conhecimentos necessários para uma participação democrática a nível nacional
explanation: |
  O paradoxo central identificado no texto revela que os sistemas democráticos têm simultaneamente duas crenças contraditórias sobre a capacidade dos cidadãos. Por um lado, a regulamentação extensiva e a supervisão pública pressupõem que os indivíduos não se podem governar a si próprios e precisam de orientação constante para evitar más escolhas. Por outro lado, os mecanismos democráticos pressupõem que esses mesmos indivíduos são perfeitamente capazes de tomar decisões colectivas complexas sobre governação, comparar programas e avaliar consequências políticas. Esta contradição é particularmente notória porque as escolhas económicas individuais são mais simples e mais imediatas do que as decisões políticas complexas que afectam sociedades inteiras.
question: Welcher grundlegende Widerspruch besteht nach dem demokratischen Vormundschaftsparadoxon in den heutigen politischen Systemen in Bezug auf die individuellen Fähigkeiten?
answer: Die Bürger werden als unfähig angesehen, persönliche Entscheidungen zu treffen, aber als fähig, kollektive politische Entscheidungen für alle zu treffen
wrong_answers:
  - Die Bürger werden als fähig angesehen, wirtschaftliche Entscheidungen zu treffen, aber als unfähig, Verfassungsgrundsätze zu verstehen
  - Der Einzelne kann sofortige Entscheidungen treffen, hat aber Schwierigkeiten mit langfristiger politischer Planung und Voraussicht
  - Die Menschen zeigen Kompetenz in lokaler Regierungsführung, verfügen aber nicht über das Fachwissen für die demokratische Beteiligung auf nationaler Ebene
explanation: |
  Das im Text aufgezeigte Kernparadoxon macht deutlich, dass demokratische Systeme gleichzeitig zwei widersprüchliche Annahmen über die Fähigkeiten der Bürger vertreten. Einerseits gehen umfassende Vorschriften und öffentliche Aufsicht davon aus, dass der Einzelne nicht in der Lage ist, sich selbst zu regieren, und ständige Anleitung braucht, um Fehlentscheidungen zu vermeiden. Andererseits gehen demokratische Mechanismen davon aus, dass dieselben Individuen durchaus in der Lage sind, komplexe kollektive Entscheidungen über das Regieren zu treffen, Programme zu vergleichen und die politischen Konsequenzen zu bewerten. Dieser Widerspruch ist besonders auffällig, weil individuelle wirtschaftliche Entscheidungen einfacher und unmittelbarer sind als komplexe politische Entscheidungen, die ganze Gesellschaften betreffen.
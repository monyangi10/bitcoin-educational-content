question: Jaký zásadní rozpor existuje podle paradoxu demokratické péče v současných politických systémech, pokud jde o schopnost jednotlivce?
answer: Občané jsou považováni za neschopné činit osobní rozhodnutí, ale schopné činit kolektivní politická rozhodnutí za všechny
wrong_answers:
  - Občané jsou považováni za schopné ekonomických rozhodnutí, ale neschopné pochopit ústavní principy
  - Jednotlivci dokáží efektivně přijímat okamžitá rozhodnutí, ale mají problémy s dlouhodobým politickým plánováním a předvídavostí
  - Lidé prokazují schopnosti v oblasti místní správy, ale nemají dostatečné odborné znalosti pro demokratickou účast na celostátní úrovni
explanation: |
  Základní paradox identifikovaný v textu ukazuje, že demokratické systémy mají současně dvě protichůdná přesvědčení o schopnosti občanů. Na jedné straně rozsáhlé regulace a veřejný dohled předpokládají, že jednotlivci si nedokážou vládnout sami a potřebují neustálé vedení, aby se vyhnuli špatným rozhodnutím. Na druhé straně demokratické mechanismy předpokládají, že titíž jednotlivci jsou dokonale schopni přijímat složitá kolektivní rozhodnutí o správě věcí veřejných, porovnávat programy a vyhodnocovat politické důsledky. Tento rozpor je obzvláště zarážející, protože individuální ekonomická rozhodnutí jsou jednodušší a bezprostřednější než složitá politická rozhodnutí ovlivňující celé společnosti.
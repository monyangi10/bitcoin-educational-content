question: Mikä on demokraattisen holhouksen paradoksin mukaan nykyisissä poliittisissa järjestelmissä vallitseva perustavanlaatuinen ristiriita yksilön kyvykkyyden suhteen?
answer: Kansalaisten katsotaan olevan kykenemättömiä tekemään henkilökohtaisia päätöksiä mutta kykeneviä tekemään kollektiivisia poliittisia päätöksiä kaikkien puolesta
wrong_answers:
  - Kansalaisten katsotaan kykenevän taloudellisiin valintoihin mutta kykenemättömiksi ymmärtämään perustuslain periaatteita
  - Yksilöt pystyvät tekemään välittömiä päätöksiä tehokkaasti, mutta heillä on vaikeuksia pitkän aikavälin poliittisen suunnittelun ja ennakoinnin kanssa
  - Ihmiset osoittavat osaamista paikallishallinnossa, mutta heiltä puuttuu asiantuntemusta kansallisen tason demokraattiseen osallistumiseen
explanation: |
  Tekstissä tunnistettu ydinparadoksi paljastaa, että demokraattisissa järjestelmissä on samanaikaisesti kaksi ristiriitaista uskomusta kansalaisten kyvyistä. Toisaalta laajoissa säännöksissä ja julkisessa valvonnassa oletetaan, että yksilöt eivät pysty hallitsemaan itse itseään ja että he tarvitsevat jatkuvaa ohjausta huonojen valintojen estämiseksi. Toisaalta demokraattiset mekanismit olettavat, että nämä samat yksilöt ovat täysin kykeneviä tekemään monimutkaisia kollektiivisia päätöksiä hallinnosta, vertailemaan ohjelmia ja arvioimaan poliittisia seurauksia. Tämä ristiriita on erityisen silmiinpistävä, koska yksittäiset taloudelliset valinnat ovat yksinkertaisempia ja välittömämpiä kuin monimutkaiset poliittiset päätökset, jotka vaikuttavat kokonaisiin yhteiskuntiin.
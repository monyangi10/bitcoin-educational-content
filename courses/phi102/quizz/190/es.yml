question: Según la paradoja de la tutela democrática, ¿qué contradicción fundamental existe en los sistemas políticos contemporáneos respecto a la capacidad individual?
answer: Se considera a los ciudadanos incapaces de tomar decisiones personales pero capaces de tomar decisiones políticas colectivas para todos
wrong_answers:
  - Se considera a los ciudadanos capaces de tomar decisiones económicas pero incapaces de comprender los principios constitucionales
  - Los individuos pueden tomar decisiones inmediatas con eficacia, pero tienen dificultades con la planificación política y la previsión a largo plazo
  - Las personas demuestran competencia en la gobernanza local, pero carecen de los conocimientos necesarios para la participación democrática a nivel nacional
explanation: |
  La paradoja central identificada en el texto revela que los sistemas democráticos mantienen simultáneamente dos creencias contradictorias sobre la capacidad de los ciudadanos. Por un lado, las amplias normativas y la supervisión pública presuponen que los individuos no pueden gobernarse a sí mismos y necesitan una dirección constante para evitar malas elecciones. Por otro lado, los mecanismos democráticos presuponen que estos mismos individuos son perfectamente capaces de tomar decisiones colectivas complejas sobre la gobernanza, comparar programas y evaluar las consecuencias políticas. Esta contradicción es especialmente llamativa porque las elecciones económicas individuales son más sencillas e inmediatas que las complejas decisiones políticas que afectan a sociedades enteras.
question: Selon le paradoxe de la tutelle démocratique, quelle contradiction fondamentale existe-t-il dans les systèmes politiques contemporains en ce qui concerne la capacité individuelle ?
answer: Les citoyens sont considérés comme incapables de prendre des décisions personnelles, mais capables de prendre des décisions politiques collectives pour tout le monde
wrong_answers:
  - Les citoyens sont considérés comme capables de faire des choix économiques mais incapables de comprendre les principes constitutionnels
  - Les individus peuvent prendre des décisions immédiates de manière efficace, mais ont du mal à planifier des politiques à long terme et à faire preuve de prévoyance
  - Les citoyens font preuve de compétences en matière de gouvernance locale, mais n'ont pas l'expertise nécessaire pour participer à la vie démocratique au niveau national
explanation: |
  Le paradoxe central identifié dans le texte révèle que les systèmes démocratiques entretiennent simultanément deux croyances contradictoires sur la capacité des citoyens. D'une part, les réglementations étendues et la surveillance publique supposent que les individus ne peuvent pas se gouverner eux-mêmes et qu'ils ont besoin d'une orientation constante pour éviter les mauvais choix. D'autre part, les mécanismes démocratiques présupposent que ces mêmes individus sont parfaitement capables de prendre des décisions collectives complexes en matière de gouvernance, de comparer les programmes et d'évaluer les conséquences politiques. Cette contradiction est d'autant plus frappante que les choix économiques individuels sont plus simples et plus immédiats que les décisions politiques complexes qui affectent des sociétés entières.
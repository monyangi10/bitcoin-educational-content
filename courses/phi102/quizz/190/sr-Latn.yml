question: Prema paradoksu demokratskog tutorstva, koji fundamentalni kontradikt postoji u savremenim političkim sistemima u vezi sa sposobnošću pojedinca?
answer: Građani se smatraju nesposobnim za donošenje ličnih odluka, ali sposobnim za donošenje kolektivnih političkih odluka za sve.
wrong_answers:
  - Građani se smatraju sposobnim za ekonomske izbore, ali nesposobnim za razumevanje ustavnih principa
  - Pojedinci mogu donositi trenutne odluke efikasno, ali imaju poteškoća sa dugoročnim političkim planiranjem i predviđanjem.
  - Ljudi pokazuju kompetenciju u lokalnoj upravi, ali im nedostaje stručnost za učešće na nacionalnom nivou demokratije.
explanation: |
  Osnovni paradoks identifikovan u tekstu otkriva da demokratski sistemi istovremeno drže dva kontradiktorna uverenja o sposobnosti građana. S jedne strane, opsežni propisi i javni nadzor pretpostavljaju da pojedinci ne mogu sami da se upravljaju i da im je potrebna stalna usmerenost kako bi se sprečili loši izbori. S druge strane, demokratski mehanizmi pretpostavljaju da su ti isti pojedinci savršeno sposobni da donose složene kolektivne odluke o upravljanju, upoređuju programe i procenjuju političke posledice. Ova kontradikcija je posebno upečatljiva jer su pojedinačni ekonomski izbori jednostavniji i neposredniji od složenih političkih odluka koje utiču na čitava društva.
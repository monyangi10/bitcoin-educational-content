question: According to the democratic tutelage paradox, what fundamental contradiction exists in contemporary political systems regarding individual capacity?
answer: Citizens are deemed incapable of making personal decisions but capable of making collective political decisions for everyone
wrong_answers:
  - Citizens are considered capable of economic choices but incapable of understanding constitutional principles
  - Individuals can make immediate decisions effectively but struggle with long-term political planning and foresight
  - People demonstrate competence in local governance but lack the expertise for national-level democratic participation
explanation: |
  The core paradox identified in the text reveals that democratic systems simultaneously hold two contradictory beliefs about citizen capacity. On one hand, extensive regulations and public oversight assume individuals cannot govern themselves and need constant direction to prevent poor choices. On the other hand, democratic mechanisms presuppose these same individuals are perfectly capable of making complex collective decisions about governance, comparing programs, and evaluating political consequences. This contradiction is particularly striking because individual economic choices are simpler and more immediate than complex political decisions affecting entire societies.
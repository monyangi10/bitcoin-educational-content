question: Menurut paradoks pengawasan demokratis, kontradiksi mendasar apa yang ada dalam sistem politik kontemporer mengenai kapasitas individu?
answer: Warga negara dianggap tidak mampu membuat keputusan pribadi tetapi mampu membuat keputusan politik kolektif untuk semua orang
wrong_answers:
  - Warga negara dianggap mampu membuat pilihan ekonomi tetapi tidak mampu memahami prinsip-prinsip konstitusional
  - Individu dapat membuat keputusan langsung secara efektif tetapi kesulitan dengan perencanaan politik jangka panjang dan pandangan ke depan
  - Orang-orang menunjukkan kompetensi dalam pemerintahan lokal tetapi tidak memiliki keahlian untuk berpartisipasi dalam partisipasi demokratis di tingkat nasional
explanation: |
  Paradoks utama yang diidentifikasi dalam teks tersebut mengungkapkan bahwa sistem demokrasi secara bersamaan memegang dua keyakinan yang kontradiktif tentang kapasitas warga negara. Di satu sisi, peraturan yang ekstensif dan pengawasan publik mengasumsikan bahwa individu tidak dapat mengatur diri mereka sendiri dan membutuhkan arahan yang konstan untuk mencegah pilihan yang buruk. Di sisi lain, mekanisme demokratis mengandaikan bahwa individu-individu yang sama sangat mampu membuat keputusan kolektif yang kompleks tentang tata kelola pemerintahan, membandingkan program-program, dan mengevaluasi konsekuensi-konsekuensi politik. Kontradiksi ini sangat mencolok karena pilihan-pilihan ekonomi individu lebih sederhana dan lebih cepat daripada keputusan politik yang kompleks yang mempengaruhi seluruh masyarakat.
question: Според парадокса на демократичното попечителство какво фундаментално противоречие съществува в съвременните политически системи по отношение на индивидуалните способности?
answer: Гражданите се считат за неспособни да вземат лични решения, но способни да вземат колективни политически решения за всички
wrong_answers:
  - Счита се, че гражданите са способни на икономически избор, но не са способни да разбират конституционните принципи
  - Хората могат да вземат ефективни незабавни решения, но трудно се справят с дългосрочното политическо планиране и предвиждане
  - Хората демонстрират компетентност в областта на местното управление, но не разполагат с опит за демократично участие на национално равнище
explanation: |
  Основният парадокс, идентифициран в текста, разкрива, че демократичните системи поддържат едновременно две противоречиви убеждения за капацитета на гражданите. От една страна, обширните регулации и общественият надзор предполагат, че хората не могат да се управляват сами и се нуждаят от постоянно насочване, за да предотвратят лошия избор. От друга страна, демократичните механизми предполагат, че същите тези индивиди са напълно способни да вземат сложни колективни решения относно управлението, да сравняват програми и да оценяват политическите последици. Това противоречие е особено поразително, тъй като индивидуалните икономически решения са по-прости и непосредствени от сложните политически решения, засягащи цели общества.
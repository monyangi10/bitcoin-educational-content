question: بر اساس پارادوکس قیمومیت دموکراتیک، چه تناقض اساسی در سیستم‌های سیاسی معاصر در مورد ظرفیت فردی وجود دارد؟
answer: شهروندان ناتوان از گرفتن تصمیمات شخصی تلقی می‌شوند اما قادر به گرفتن تصمیمات سیاسی جمعی برای همه هستند.
wrong_answers:
  - شهروندان قادر به انتخاب‌های اقتصادی در نظر گرفته می‌شوند اما ناتوان در درک اصول قانون اساسی
  - افراد می‌توانند تصمیمات فوری را به‌طور مؤثر بگیرند اما در برنامه‌ریزی سیاسی بلندمدت و آینده‌نگری دچار مشکل می‌شوند.
  - افراد در مدیریت محلی شایستگی نشان می‌دهند اما فاقد تخصص لازم برای مشارکت دموکراتیک در سطح ملی هستند.
explanation: |
  پارادوکس اصلی شناسایی شده در متن نشان می‌دهد که سیستم‌های دموکراتیک به‌طور همزمان دو باور متناقض درباره ظرفیت شهروندان دارند. از یک سو، مقررات گسترده و نظارت عمومی فرض می‌کنند که افراد نمی‌توانند خود را اداره کنند و نیاز به هدایت مداوم دارند تا از انتخاب‌های نادرست جلوگیری شود. از سوی دیگر، مکانیسم‌های دموکراتیک فرض می‌کنند که همین افراد به‌طور کامل قادر به اتخاذ تصمیمات جمعی پیچیده درباره حکومت، مقایسه برنامه‌ها و ارزیابی پیامدهای سیاسی هستند. این تناقض به‌ویژه چشمگیر است زیرا انتخاب‌های اقتصادی فردی ساده‌تر و فوری‌تر از تصمیمات سیاسی پیچیده‌ای هستند که بر کل جوامع تأثیر می‌گذارند.
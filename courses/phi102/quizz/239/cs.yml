question: Co podle liberální politické teorie představuje nejúčinnější náhradu za státní zásahy do ekonomických a sociálních aktivit?
answer: Volné sdružování, dobrovolná spolupráce a tržní koordinace prostřednictvím smluv a směny
wrong_answers:
  - Individuální podnikání bez jakékoli formy kolektivní organizace nebo koordinace
  - Decentralizované vládní struktury, které přenášejí státní pravomoci z centrální na místní správní úroveň
  - Profesní cechy a regulovaná průmyslová sdružení, která působí pod státním dohledem a kontrolou
explanation: |
  Liberální myšlení zdůrazňuje, že alternativou ke státním zásahům není izolovaný individualismus, ale dobrovolná spolupráce prostřednictvím svobodného sdružování, soukromého podnikání a tržní koordinace založené na smlouvách a směně. V textu se výslovně uvádí, že "stát nenahrazuje samotný jednotlivec, ale svobodné sdružování a koordinace individuálních sil na základě směny a smluv" Tím se liberální teorie odlišuje od pouhého individualismu, odmítané decentralizace (která pouze přenáší státní moc) a regulovaných sdružení, která udržují státní kontrolu.
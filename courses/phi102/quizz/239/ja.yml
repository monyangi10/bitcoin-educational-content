question: 自由主義政治理論によれば、経済・社会活動に対する国家の介入に代わる最も効果的なものは何か？
answer: 自由な結社、自発的な協力、契約や交換を通じた市場ベースの調整
wrong_answers:
  - 集団的な組織や協調性を持たず、独立独歩で行動する個々の起業家精神
  - 国家権力を中央から地方行政レベルに移譲する分権化された政府構造
  - 州の監督・監視下で運営される専門職ギルドおよび規制業界団体
explanation: |
  自由主義思想は、国家の介入に代わるものは孤立した個人主義ではなく、自由連合、私企業、契約と交換に基づく市場調整による自発的な協力であると強調する。この文章では、「国家に代わるのは個人だけでなく、自由な団体であり、交換と契約に基づく個人の力の調整である」と明言している。これによって自由主義理論は、単なる個人主義や、（国家権力を移譲するだけの）地方分権の否定、国家統制を維持する規制結社とは一線を画している。
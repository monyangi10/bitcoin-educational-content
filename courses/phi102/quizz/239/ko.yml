question: 자유주의 정치 이론에 따르면, 경제 및 사회 활동에 대한 국가 개입을 가장 효과적으로 대체할 수 있는 것은 무엇인가요?
answer: 계약과 교환을 통한 자유로운 결사, 자발적 협력, 시장 기반 조정
wrong_answers:
  - 어떤 형태의 집단 조직이나 조정 없이 독립적으로 행동하는 개인 기업가 정신
  - 국가 권한을 중앙에서 지방 행정 수준으로 이양하는 분산형 정부 구조
  - 국가의 감독과 감독 하에 운영되는 전문 길드 및 규제 대상 산업 협회
explanation: |
  자유주의 사상은 국가 개입의 대안이 고립된 개인주의가 아니라 계약과 교환에 기반한 자유로운 결사, 사기업, 시장 조정을 통한 자발적 협력임을 강조합니다. 본문은 '국가를 대체하는 것은 개인만이 아니라 교환과 계약에 기초한 개별 세력의 자유로운 결사와 조정'이라고 명시적으로 언급하고 있습니다 이는 자유주의 이론을 단순한 개인주의, 거부된 분권화(국가 권력만 이양하는 것), 국가 통제를 유지하는 규제된 결사체와 구별합니다.
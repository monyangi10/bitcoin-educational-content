question: Ni izihe nzira zibiri z’ishimikiro zivuga neza ukwigira umuntu hakurikijwe ingingo ngenderwako z’umwidegemvyo mu vy’ubutunzi?
answer: Inyiyumvo ku rubanza ku ciyumviro, no kwihweza ku gutekereza ku kumenyera
wrong_answers:
  - Umwimbu ukaja mu gukoresha ukawuhindura, n'abakozi ukaja mu mutungo ukaja mu butunzi
  - Umuntu ku giti ciwe akeneye gukorana kugira ngo abantu bahurire hamwe, no gukora kugira ngo haboneke umutungo kugira ngo hashirwe ishoramari
  - Ubutunzi bwite ku bucuruzi bwigenga ku mahiganwa y’isoko, n’inyungu z’umuntu ku giti ciwe ku nyungu rusangi ku gutera imbere kw’ubutunzi
explanation: |
  Ico canditswe kirerekana neza inzinguzingu zibiri zitomoye zigize umushinge w’ukwigira uwundi. Inzinguzingu ya mbere itera imbere kuva ku vyo umuntu yumva (ukuntu abona ibintu) gushika ku rubanza (ugufata ingingo ataco yishisha) gushika ku vyiyumviro (bishikana ku mwidegemvyo w’itangazamakuru, uburezi n’idini). Inzinguzingu ya kabiri iva ku kwihweza ikaja ku gutekereza ku bintu (gushinga isano hagati y’imvo n’imvano) ikaja ku kumenyera (gukora bisunze imigambi y’umuntu ku giti ciwe). Ivyo bice vyerekana ingene abantu bafata amakuru mu buryo busanzwe kandi bagafata ingingo, bikaba ari vyo bishingirako uburenganzira bwose bw’itunga. Ibindi bihitamwo, naho birimwo ivyiyumviro vy’ubutunzi, ntibigereranya inzira zidasanzwe zo mu mutwe n’ubumenyi Jules Simon yerekanye ko ari ngirakamaro mu kwigira.
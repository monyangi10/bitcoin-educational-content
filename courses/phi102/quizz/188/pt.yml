question: Que erro concetual fundamental comete a conceção positiva da liberdade que permite justificações socialistas para a intervenção do Estado?
answer: Redefine a liberdade como a capacidade de obter os resultados desejados e não como a ausência de obstáculos a uma ação inocente
wrong_answers:
  - Não distingue entre direitos individuais e responsabilidades colectivas nos processos democráticos de tomada de decisão
  - Parte incorretamente do princípio de que os direitos de propriedade podem ser separados da autonomia pessoal e da autodeterminação individual
  - Confunde o papel legítimo do direito na sociedade com os limites naturais impostos pela escassez e pela natureza humana
explanation: |
  O erro fundamental da liberdade positiva reside no facto de transformar a liberdade de um conceito negativo (ausência de coerção) num conceito positivo (capacidade de realização). Esta mudança quebra a ligação entre a liberdade e os direitos de propriedade, uma vez que sugere que as pessoas devem ser "livres" para obter coisas que não possuem. Esta redefinição justifica a intervenção do Estado para proporcionar estes resultados, violando os direitos de propriedade de outros. As outras opções, apesar de tocarem em conceitos políticos relacionados, não têm em conta esta transformação concetual fundamental que permite os argumentos socialistas.
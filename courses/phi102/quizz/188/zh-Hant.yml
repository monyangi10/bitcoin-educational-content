question: 正面的自由概念犯了什麼根本性的概念錯誤，使得社會主義能夠為國家干預辯護？
answer: 它將自由重新定義為取得預期結果的能力，而非無辜行動的障礙。
wrong_answers:
  - 它未能區分民主決策過程中的個人權利與集體責任
  - 它錯誤地假設財產權可以與個人自主和個人自決分開。
  - 它混淆了法律在社會中的合法角色與稀缺性和人性所施加的自然限制。
explanation: |
  積極自由的根本錯誤在於把自由從一個消極的概念（沒有強迫）轉變成一個積極的概念（實現的能力）。這個轉變打破了自由與財產權之間的關係，因為它暗示人們應該「自由」獲得他們並不擁有的東西。這種重新定義為國家干預提供這些結果提供了理由，侵犯了他人的財產權。其他的選擇儘管觸及了相關的政治概念，卻錯過了這個讓社會主義論點得以實現的核心概念轉換。
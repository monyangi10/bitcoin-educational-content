question: Ni irihe kosa ry’ishimikiro ry’ivyiyumviro ry’ivyiyumviro vyiza vy’umwidegemvyo rituma habaho imvo z’abasosiyalisiti zo gufasha Leta?
answer: Risubira gusobanura umwidegemvyo nk’ubushobozi bwo kuronka ivyo wipfuza aho kutagira intambamyi zituma umuntu akora ataco yakoze .
wrong_answers:
  - Rirananirwa gutandukanya uburenganzira bw'umuntu ku giti ciwe n'inshingano z'abantu bose mu nzira zo gufata ingingo za demokarasi .
  - Rifata mu buryo butari bwo ko uburenganzira bw’umutungo bushobora gutandukanywa n’ukwigenga kw’umuntu ku giti ciwe n’ukwiyemeza kw’umuntu ku giti ciwe .
  - Bitera urujijo uruhara rubereye rw’amategeko mu kibano n’imipaka kamere iterwa n’ubukene be n’akameremere k’umuntu .
explanation: |
  Ikosa ry’ishimikiro ry’umwidegemvyo mwiza riri mu guhindura umwidegemvyo uva ku ciyumviro kibi (ukutagira uguhatira) ukawugira iciyumviro ciza (ubushobozi bwo gushika ku kintu). Iryo hinduka rica isano hagati y’umwidegemvyo n’uburenganzira bw’itunga, kuko rivuga ko abantu bakwiye ‘kwidegemvya’ kugira ngo bashobore kuronka ibintu badafise. Ukwo gusubira gusobanura gutuma Leta igira ico ikoze kugira ngo itange ivyo biheze, igahungabanya uburenganzira bw’abandi bwo kuronka ivyo bintu. Ayandi mahitamwo, naho akora ku vyiyumviro vya politike bifitaniye isano, arabura iyo mpinduka nyamukuru y’ivyiyumviro ishoboza imvo z’abanyagihugu.
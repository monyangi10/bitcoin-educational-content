question: Quan niệm tích cực về tự do mắc phải sai lầm cơ bản nào về mặt khái niệm, dẫn đến việc các nhà xã hội chủ nghĩa biện minh cho sự can thiệp của nhà nước?
answer: Nó định nghĩa lại tự do là khả năng đạt được kết quả mong muốn, chứ không phải là sự vắng mặt của những trở ngại đối với hành động vô hại.
wrong_answers:
  - Nó không phân biệt được giữa quyền cá nhân và trách nhiệm tập thể trong các quy trình ra quyết định dân chủ.
  - Nó cho rằng một cách sai lầm rằng quyền sở hữu có thể tách rời khỏi quyền tự chủ cá nhân và quyền tự quyết của mỗi cá nhân.
  - Nó nhầm lẫn vai trò hợp pháp của pháp luật trong xã hội với những giới hạn tự nhiên do sự khan hiếm và bản chất con người đặt ra.
explanation: |
  Sai lầm cơ bản của chủ nghĩa tự do tích cực nằm ở chỗ nó biến đổi tự do từ một khái niệm tiêu cực (không có sự cưỡng ép) thành một khái niệm tích cực (khả năng đạt được). Sự thay đổi này phá vỡ mối liên hệ giữa tự do và quyền sở hữu, vì nó cho rằng mọi người nên được 'tự do' để có được những thứ họ không sở hữu. Định nghĩa lại này biện minh cho sự can thiệp của nhà nước để mang lại những kết quả đó, vi phạm quyền sở hữu của người khác. Các lựa chọn khác, mặc dù đề cập đến các khái niệm chính trị có liên quan, nhưng lại bỏ qua sự chuyển đổi khái niệm cốt lõi này, điều làm nền tảng cho các lập luận xã hội chủ nghĩa.
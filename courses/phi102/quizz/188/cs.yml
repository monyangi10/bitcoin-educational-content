question: Jaké zásadní koncepční chyby se dopouští pozitivní pojetí svobody, které umožňuje socialistické ospravedlnění státních zásahů?
answer: Nově definuje svobodu jako schopnost dosáhnout žádoucích výsledků, nikoli jako absenci překážek nevinného jednání
wrong_answers:
  - Nerozlišuje mezi individuálními právy a kolektivní odpovědností v demokratických rozhodovacích procesech
  - Nesprávně předpokládá, že vlastnická práva lze oddělit od osobní autonomie a sebeurčení jednotlivce
  - Zaměňuje legitimní roli práva ve společnosti s přirozenými limity danými nedostatkem a lidskou přirozeností
explanation: |
  Základní chyba pozitivní svobody spočívá v tom, že se svoboda mění z negativního pojmu (absence donucení) na pozitivní (schopnost dosáhnout). Tento posun narušuje vazbu mezi svobodou a vlastnickými právy, neboť naznačuje, že lidé by měli být "svobodní" v získávání věcí, které nevlastní. Tato redefinice ospravedlňuje státní zásahy, které mají tyto výsledky zajistit a porušují vlastnická práva ostatních. Ostatní možnosti se sice dotýkají souvisejících politických konceptů, ale postrádají tuto základní koncepční proměnu, která umožňuje socialistickou argumentaci.
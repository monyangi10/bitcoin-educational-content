question: 积极的自由概念究竟犯了什么根本性的概念错误，使得社会主义者有理由进行国家干预？
answer: 它将自由重新定义为获得理想结果的能力，而不是没有障碍的天真行动
wrong_answers:
  - 它没有区分民主决策过程中的个人权利和集体责任
  - 它错误地假定财产权可以与个人自主和个人自决相分离
  - 它混淆了法律在社会中的合法作用与稀缺性和人性所施加的自然限制
explanation: |
  积极自由的根本错误在于将自由从一个消极概念（没有胁迫）转变为一个积极概念（实现的能力）。这种转变打破了自由与财产权之间的联系，因为它暗示人们应该 "自由 "获得他们并不拥有的东西。这种重新定义为国家干预提供了理由，侵犯了他人的财产权。其他方案虽然涉及相关的政治概念，但却忽略了这一核心概念的转变，而这一转变正是社会主义论证的基础。
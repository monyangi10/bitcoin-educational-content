question: O que é que o texto identifica como a principal justificação para a criação de profissões regulamentadas e de monopólios profissionais?
answer: Um princípio de precaução que procura evitar potenciais abusos, estabelecendo uma supervisão preventiva em vez de punir as violações efectivas
wrong_answers:
  - A necessidade de garantir padrões de qualidade e competência profissional através de requisitos rigorosos de formação e certificação
  - Ganhos de eficiência económica alcançados através da eliminação da concorrência desnecessária e da coordenação da produção através de um planeamento centralizado
  - A proteção do bem-estar dos consumidores através da garantia de serviços normalizados e da prevenção de falhas do mercado em sectores essenciais
explanation: |
  O texto indica explicitamente que a regulamentação e os monopólios profissionais são estabelecidos "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (em nome de um princípio de precaução, de um sistema preventivo e não repressivo). Cria-se assim um "regime de tutela" sobre profissões inteiras sob o pretexto de que alguns indivíduos podem cometer abusos. As outras opções, embora superficialmente plausíveis para justificar a regulamentação, não são mencionadas no texto como a verdadeira razão de ser destas restrições à liberdade de trabalho.
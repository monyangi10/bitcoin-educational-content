question: Quale è la giustificazione principale che il testo individua per l'istituzione di professioni regolamentate e monopoli professionali?
answer: Un principio di precauzione che cerca di prevenire potenziali abusi istituendo un controllo preventivo piuttosto che punire le violazioni effettive
wrong_answers:
  - La necessità di garantire standard di qualità e competenza professionale attraverso requisiti rigorosi di formazione e certificazione
  - Guadagni di efficienza economica ottenuti eliminando gli sprechi della concorrenza e coordinando la produzione attraverso una pianificazione centralizzata
  - La tutela del benessere dei consumatori, garantendo servizi standardizzati e prevenendo i fallimenti del mercato in settori essenziali
explanation: |
  Il testo afferma esplicitamente che i regolamenti e i monopoli professionali sono stabiliti "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (in nome di un principio di precauzione, di un sistema preventivo piuttosto che repressivo). In questo modo si crea un "régime de tutelle" (regime di tutela) su intere professioni con il pretesto che alcuni individui potrebbero commettere abusi. Le altre opzioni, pur essendo giustificazioni superficialmente plausibili per la regolamentazione, non sono menzionate nel testo come l'effettiva motivazione di queste restrizioni alla libertà di lavoro.
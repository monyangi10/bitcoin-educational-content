question: Metin, düzenlenmiş mesleklerin ve mesleki tekellerin kurulmasının temel gerekçesi olarak neyi tanımlamaktadır?
answer: Fiili ihlalleri cezalandırmak yerine önleyici gözetim tesis ederek potansiyel ihlalleri önlemeyi amaçlayan ihtiyati bir ilke
wrong_answers:
  - Sıkı eğitim ve belgelendirme gereklilikleri yoluyla kalite standartlarının ve mesleki yeterliliğin sağlanması ihtiyacı
  - Savurgan rekabetin ortadan kaldırılması ve merkezi planlama yoluyla üretimin koordine edilmesiyle elde edilen ekonomik verimlilik kazanımları
  - Standartlaştırılmış hizmetlerin garanti altına alınması ve temel sektörlerde piyasa aksaklıklarının önlenmesi yoluyla tüketici refahının korunması
explanation: |
  Metin, mesleki düzenlemelerin ve tekellerin 'au nom d'un principe de précaution, d'un système préventif plutôt que répressif' (ihtiyatlılık ilkesi adına, baskıcı değil önleyici bir sistem adına) kurulduğunu açıkça belirtmektedir. Bu, bazı bireylerin suistimallerde bulunabileceği bahanesiyle tüm meslekler üzerinde bir 'régime de tutelle' (vesayet rejimi) yaratmaktadır. Diğer seçenekler, düzenleme için yüzeysel olarak makul gerekçeler olsa da, metinde çalışma özgürlüğüne getirilen bu kısıtlamaların arkasındaki asıl gerekçe olarak belirtilmemiştir.
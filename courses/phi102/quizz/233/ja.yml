question: 規制された専門職と専門職独占を確立する主な正当化理由は何であると、本文は指摘しているか？
answer: 予防原則とは、実際の違反を罰するのではなく、予防的な監視を確立することによって、潜在的な乱用を防止しようとするものである。
wrong_answers:
  - 厳格なトレーニングと認定要件を通じて、品質基準と専門的能力を確保する必要性
  - 無駄な競争を排除し、集中計画によって生産を調整することによって達成される経済効率の向上
  - 標準化されたサービスを保証し、必要不可欠な分野における市場の失敗を防止することにより、消費者の福祉を保護する。
explanation: |
  この条文では、専門職の規制と独占は「予防原則、抑圧的ではなく予防的な制度の名の下に」確立されると明言されている。これは、一部の個人が虐待を犯すかもしれないという口実のもとに、職業全体に対する「保護体制（régime de tutelle）」を作り出すものである。他の選択肢は、表面的には規制を正当化するもっともらしい理由ではあるが、労働の自由を制限する実際の理由としては本文中で言及されていない。
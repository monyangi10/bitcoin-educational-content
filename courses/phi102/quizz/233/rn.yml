question: Ni igiki ico canditswe kigaragaza ko ari co gituma habaho imvo nyamukuru yo gushinga imyuga itegekanijwe n’ubuhinga bwo gukorana n’abandi?
answer: Ingingo ngenderwako y’ukwiyubara irondera gukingira ukurenganywa gushobora kubaho mu gushinga ubugenzuzi bwo kwirinda aho guhana abarenganye vy’ukuri .
wrong_answers:
  - Ivyerekeye gukurikirana ingingo mfatirwako z’uburyo n’ubushobozi bw’umwuga biciye mu mahugurwa akomeye n’ibisabwa kugira ngo umuntu aronke icemezo
  - Inyungu z'ubutunzi zishikwako mu gukuraho uguhiganwa kw'ubusa no guhuza umusaruro biciye mu gutegura ibintu bimwe bimwe
  - Ugukingira imibereho myiza y'abaguzi mu gutanga ibikorwa bihuye no gukingira ukunanirwa kw'isoko mu nzego z'ingenzi
explanation: |
  Ico canditswe kivuga neza ko amategeko y’umwuga n’ubutegetsi bw’abantu bamwebamwe bishingwa ‘au nom d’un principe de précaution, d’un système préventif plutôt que répressif’ (mw’izina ry’ingingo ngenderwako y’ukwiyubara, y’uburyo bwo kwirinda aho gukandamiza). Ivyo bituma haba ‘régime de tutelle’ (intwaro y’uburezi) ku myuga yose bishingiye ku kwitwaza ko hari abantu boshobora gukora ibikorwa vy’ububisha. Ibindi bihitamwo, naho ari imvo zishobora kwemerwa zo gushinga amategeko, ntibivugwa muri ico canditswe nk’imvo nyayo y’inyuma y’ivyo bibujijwe ku mwidegemvyo wo gukora.
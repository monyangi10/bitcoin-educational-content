question: متن چه چیزی را به عنوان توجیه اصلی برای ایجاد حرفه‌های تنظیم‌شده و انحصارهای حرفه‌ای شناسایی می‌کند؟
answer: یک اصل احتیاطی که به دنبال جلوگیری از سوءاستفاده‌های احتمالی با ایجاد نظارت پیشگیرانه به جای مجازات تخلفات واقعی است.
wrong_answers:
  - نیاز به اطمینان از استانداردهای کیفیت و شایستگی حرفه‌ای از طریق الزامات آموزشی و صدور گواهینامه دقیق
  - دستاوردهای بهره‌وری اقتصادی با حذف رقابت‌های بیهوده و هماهنگی تولید از طریق برنامه‌ریزی متمرکز
  - حفاظت از رفاه مصرف‌کننده با تضمین خدمات استاندارد و جلوگیری از شکست‌های بازار در بخش‌های ضروری
explanation: |
  متن به‌طور صریح بیان می‌کند که مقررات حرفه‌ای و انحصارات 'به نام یک اصل احتیاطی، یک سیستم پیشگیرانه به‌جای سرکوبگرانه' (au nom d'un principe de précaution, d'un système préventif plutôt que répressif) ایجاد شده‌اند. این امر یک 'رژیم قیمومیت' (régime de tutelle) بر کل حرفه‌ها تحت این بهانه که برخی افراد ممکن است سوءاستفاده کنند، ایجاد می‌کند. گزینه‌های دیگر، در حالی که به‌طور سطحی توجیهات قابل قبولی برای مقررات به نظر می‌رسند، در متن به‌عنوان دلایل واقعی پشت این محدودیت‌ها بر آزادی کار ذکر نشده‌اند.
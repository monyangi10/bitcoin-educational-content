question: 본문에서 규제 대상 직업과 직업 독점을 확립하는 주된 근거로 제시하는 것은 무엇인가요?
answer: 실제 위반을 처벌하기보다는 예방적 감독을 확립하여 잠재적 남용을 방지하고자 하는 사전 예방 원칙
wrong_answers:
  - 엄격한 교육 및 인증 요건을 통해 품질 표준과 전문 역량을 확보해야 할 필요성
  - 중앙 집중식 계획을 통해 낭비적인 경쟁을 없애고 생산을 조정하여 경제적 효율성 증대
  - 표준화된 서비스를 보장하고 필수 부문의 시장 실패를 방지하여 소비자 후생 보호
explanation: |
  본문은 전문직 규제와 독점이 '예방적 원칙, 억압적 시스템이 아닌 예방적 시스템의 이름으로'(사전 예방적 원칙, 억압적 시스템이라는 이름으로) 확립된다고 명시적으로 명시하고 있습니다. 이는 일부 개인이 학대를 저지를 수 있다는 구실로 전체 직업에 대한 '후견인 제도'(후견인 체제)를 만드는 것입니다. 다른 옵션은 표면적으로는 그럴듯한 규제 명분이기는 하지만, 이러한 직업의 자유를 제한하는 실제 이유에 대해서는 본문에서 언급되지 않았습니다.
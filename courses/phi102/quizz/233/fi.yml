question: Mikä on tekstin mukaan ensisijainen peruste säänneltyjen ammattien ja ammatillisten monopolien perustamiselle?
answer: Ennalta varautumisen periaate, jolla pyritään ehkäisemään mahdollisia väärinkäytöksiä ottamalla käyttöön ennaltaehkäisevää valvontaa sen sijaan, että rangaistaisiin todellisista rikkomuksista
wrong_answers:
  - Tarve varmistaa laatustandardit ja ammatillinen pätevyys tiukoilla koulutus- ja sertifiointivaatimuksilla
  - Taloudellinen tehokkuus paranee, kun turha kilpailu poistetaan ja tuotantoa koordinoidaan keskitetyllä suunnittelulla
  - Kuluttajien hyvinvoinnin suojelu takaamalla standardoidut palvelut ja estämällä markkinahäiriöt keskeisillä aloilla
explanation: |
  Tekstissä todetaan nimenomaisesti, että ammatilliset säännöt ja monopolit vahvistetaan "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (ennalta varautumisen periaatteen nimissä, ennaltaehkäisevän järjestelmän nimissä, ei niinkään sortojärjestelmän nimissä). Tällä tavoin luodaan "régime de tutelle" (holhousjärjestelmä), joka kattaa kokonaisia ammatteja sillä verukkeella, että jotkut henkilöt saattavat syyllistyä väärinkäytöksiin. Vaikka muut vaihtoehdot ovatkin pinnallisesti uskottavia perusteluja sääntelylle, niitä ei mainita tekstissä todellisena perusteena näille työnvapauden rajoituksille.
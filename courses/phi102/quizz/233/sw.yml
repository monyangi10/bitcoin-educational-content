question: Maandishi yanabainisha nini kama sababu kuu ya kuanzisha taaluma zinazodhibitiwa na ukiritimba wa kitaaluma?
answer: Kanuni ya tahadhari inayolenga kuzuia ukiukwaji unaowezekana kwa kuanzisha usimamizi wa kinga badala ya kuadhibu ukiukwaji halisi
wrong_answers:
  - Haja ya kuhakikisha viwango vya ubora na uwezo wa kitaaluma kupitia mafunzo makali na mahitaji ya uidhinishaji
  - Mafanikio ya ufanisi wa kiuchumi yanayopatikana kwa kuondoa ushindani usio na tija na kuratibu uzalishaji kupitia mipango ya pamoja
  - Ulinzi wa ustawi wa watumiaji kwa kuhakikisha huduma sanifu na kuzuia kushindwa kwa soko katika sekta muhimu
explanation: |
  Maandishi yanasema waziwazi kwamba kanuni na ukiritimba wa kitaaluma umeanzishwa 'au nom d'un principe de précaution, d'un system preventif plutôt que répressif' (kwa jina la kanuni ya tahadhari, ya mfumo wa kuzuia badala ya ukandamizaji). Hii inaunda 'régime de tutelle' (utaratibu wa ulezi) juu ya taaluma nzima kwa kisingizio kwamba baadhi ya watu wanaweza kufanya ukiukwaji. Chaguzi zingine, ingawa ni uhalalishaji wa juu juu wa kanuni, hazijatajwa katika maandishi kama sababu halisi nyuma ya vikwazo hivi vya uhuru wa kufanya kazi.
question: Apa yang diidentifikasi oleh teks sebagai pembenaran utama untuk menetapkan profesi yang diatur dan monopoli profesi?
answer: Prinsip kehati-hatian yang berupaya mencegah potensi pelanggaran dengan membangun pengawasan preventif daripada menghukum pelanggaran yang sebenarnya
wrong_answers:
  - Kebutuhan untuk memastikan standar kualitas dan kompetensi profesional melalui pelatihan yang ketat dan persyaratan sertifikasi
  - Keuntungan efisiensi ekonomi yang dicapai dengan menghilangkan persaingan yang sia-sia dan mengoordinasikan produksi melalui perencanaan terpusat
  - Perlindungan kesejahteraan konsumen dengan menjamin layanan terstandardisasi dan mencegah kegagalan pasar di sektor-sektor penting
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa peraturan dan monopoli profesi dibuat 'atas nama prinsip kehati-hatian, atas nama sistem yang lebih bersifat preventif daripada represif' (atas nama prinsip kehati-hatian, atas nama sistem yang lebih bersifat preventif daripada represif). Hal ini menciptakan 'régime de tutelle' (rezim perwalian) atas seluruh profesi dengan dalih bahwa beberapa individu mungkin melakukan pelanggaran. Pilihan-pilihan lain, meskipun secara permukaan merupakan pembenaran yang masuk akal untuk regulasi, tidak disebutkan dalam teks sebagai alasan sebenarnya di balik pembatasan kebebasan bekerja ini.
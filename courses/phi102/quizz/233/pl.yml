question: Jakie jest główne uzasadnienie ustanowienia zawodów regulowanych i monopoli zawodowych?
answer: Zasada ostrożności, której celem jest zapobieganie potencjalnym nadużyciom poprzez ustanowienie nadzoru prewencyjnego, a nie karanie faktycznych naruszeń
wrong_answers:
  - Potrzeba zapewnienia standardów jakości i kompetencji zawodowych poprzez rygorystyczne wymogi w zakresie szkoleń i certyfikacji
  - Wzrost wydajności ekonomicznej osiągnięty dzięki wyeliminowaniu marnotrawnej konkurencji i koordynacji produkcji poprzez scentralizowane planowanie
  - Ochrona dobrobytu konsumentów poprzez zagwarantowanie znormalizowanych usług i zapobieganie niedoskonałościom rynku w kluczowych sektorach
explanation: |
  Tekst wyraźnie stwierdza, że regulacje i monopole zawodowe są ustanawiane "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (w imię zasady ostrożności, systemu prewencyjnego, a nie represyjnego). Tworzy to "régime de tutelle" (reżim opiekuńczy) nad całymi zawodami pod pretekstem, że niektóre osoby mogą popełniać nadużycia. Pozostałe opcje, choć pozornie stanowią wiarygodne uzasadnienie dla regulacji, nie zostały wymienione w tekście jako faktyczne uzasadnienie tych ograniczeń wolności pracy.
question: Văn bản này xác định lý do chính đáng nào để thiết lập các ngành nghề được quản lý và các độc quyền nghề nghiệp?
answer: Nguyên tắc phòng ngừa nhằm mục đích ngăn chặn các hành vi lạm dụng tiềm tàng bằng cách thiết lập cơ chế giám sát phòng ngừa thay vì trừng phạt các vi phạm thực tế.
wrong_answers:
  - Cần phải đảm bảo các tiêu chuẩn chất lượng và năng lực chuyên môn thông qua các yêu cầu đào tạo và chứng nhận nghiêm ngặt.
  - Hiệu quả kinh tế được cải thiện nhờ loại bỏ cạnh tranh lãng phí và điều phối sản xuất thông qua kế hoạch hóa tập trung.
  - Bảo vệ quyền lợi người tiêu dùng bằng cách đảm bảo các dịch vụ đạt tiêu chuẩn và ngăn ngừa sự thất bại của thị trường trong các lĩnh vực thiết yếu.
explanation: |
  Văn bản nêu rõ rằng các quy định nghề nghiệp và độc quyền được thiết lập 'au nom d'un principe de précaution, d'un système préventif plutôt que répressif' (nhân danh một nguyên tắc phòng ngừa, một hệ thống phòng ngừa hơn là đàn áp). Điều này tạo ra một 'régime de tutelle' (chế độ giám hộ) đối với toàn bộ các ngành nghề với lý do rằng một số cá nhân có thể lạm dụng quyền lực. Các lựa chọn khác, mặc dù thoạt nhìn có vẻ hợp lý để biện minh cho việc điều tiết, nhưng không được đề cập trong văn bản như là lý do thực sự đằng sau những hạn chế này đối với tự do làm việc.
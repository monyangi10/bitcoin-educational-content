question: Koji je primarni razlog za uspostavljanje regulisanih profesija i profesionalnih monopola prema tekstu?
answer: Princip principa predostrožnosti koji nastoji da spreči potencijalne zloupotrebe uspostavljanjem preventivnog nadzora umesto kažnjavanja stvarnih prekršaja
wrong_answers:
  - Potrebа dа se obezbede standardi kvaliteta i profesionalna kompetencija kroz rigorozne zahteve za obuku i sertifikaciju
  - Ekonomska efikasnost postignuta eliminacijom beskorisne konkurencije i koordinacijom proizvodnje kroz centralizovano planiranje
  - Zaštita dobrobiti potrošača garantovanjem standardizovanih usluga i sprečavanjem tržišnih neuspeha u ključnim sektorima
explanation: |
  Tekst izričito navodi da su profesionalni propisi i monopoli uspostavljeni 'au nom d'un principe de précaution, d'un système préventif plutôt que répressif' (u ime načela predostrožnosti, preventivnog sistema radije nego represivnog). Ovo stvara 'régime de tutelle' (režim starateljstva) nad čitavim profesijama pod izgovorom da bi neki pojedinci mogli počiniti zloupotrebe. Druge opcije, iako površno izgledaju kao opravdanja za regulaciju, nisu pomenute u tekstu kao stvarno obrazloženje iza ovih ograničenja slobode rada.
question: Wat is volgens de tekst de belangrijkste rechtvaardiging voor het oprichten van gereguleerde beroepen en beroepsmonopolies?
answer: Een voorzorgsprincipe dat probeert potentieel misbruik te voorkomen door preventief toezicht in te stellen in plaats van feitelijke schendingen te bestraffen
wrong_answers:
  - De noodzaak om kwaliteitsnormen en professionele competentie te garanderen door middel van strenge opleidings- en certificeringseisen
  - Economische efficiëntiewinst door het elimineren van verspillende concurrentie en het coördineren van de productie via gecentraliseerde planning
  - De bescherming van het welzijn van de consument door het garanderen van gestandaardiseerde diensten en het voorkomen van marktfalen in essentiële sectoren
explanation: |
  De tekst stelt expliciet dat beroepsreglementen en monopolies worden ingesteld "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (in naam van een voorzorgsprincipe, van een preventief in plaats van repressief systeem). Dit creëert een 'régime de tutelle' (voogdijregime) over hele beroepen onder het voorwendsel dat sommige individuen misbruik zouden kunnen plegen. De andere opties, hoewel oppervlakkig gezien plausibele rechtvaardigingen voor regulering, worden in de tekst niet genoemd als de werkelijke redenering achter deze beperkingen van de vrijheid van werk.
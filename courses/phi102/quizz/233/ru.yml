question: Что в тексте является главным обоснованием для создания регулируемых профессий и профессиональных монополий?
answer: Принцип предосторожности, направленный на предотвращение потенциальных злоупотреблений путем установления превентивного надзора, а не наказания за фактические нарушения
wrong_answers:
  - Необходимость обеспечения стандартов качества и профессиональной компетентности с помощью строгих требований к обучению и сертификации
  - Повышение экономической эффективности за счет устранения нерациональной конкуренции и координации производства с помощью централизованного планирования
  - Защита благосостояния потребителей путем гарантирования стандартизированных услуг и предотвращения провалов рынка в основных секторах
explanation: |
  В тексте прямо говорится, что профессиональные правила и монополии устанавливаются "во имя принципа предосторожности, превентивной, а не репрессивной системы". Это создает "режим опеки" над целыми профессиями под предлогом того, что некоторые люди могут совершать злоупотребления. Другие варианты, хотя и являются внешне правдоподобными обоснованиями для регулирования, не упоминаются в тексте в качестве фактического обоснования этих ограничений свободы труда.
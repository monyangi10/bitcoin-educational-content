question: 根據自由經濟理論，政治當局操控貨幣對商業交易的主要後果是什麼？
answer: 這會造成價格不穩定和不確定性，因為當政府可以任意修改貨幣內容時，貨幣訊號就會變得不可靠。
wrong_answers:
  - 它藉由對國界內的經濟交易建立明確的領土控制來強化國家主權
  - 它允許集中協調各市場的匯率和標準定價機制，從而提高了經濟效率。
  - 它消除了使用多種競爭貨幣的需要，簡化了商業計算，從而降低了交易成本。
explanation: |
  本章解釋了貨幣操控會產生通貨膨脹並造成價格不穩定，因為當主管機關可以任意修改貨幣內容時，貨幣訊號就會變得不確定。Nicolas Oresme 的中世紀分析顯示貨幣貶值如何破壞商業交換。錯誤的答案反映了國家貨幣控制的常見理由，但自由主義的批判強調，這種操縱是為了政治融資而非經濟效率服務，使得信用狀等自願交換機制比強加的貨幣更為可取。
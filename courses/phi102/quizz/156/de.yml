question: Was ist nach der liberalen Wirtschaftstheorie die wichtigste Folge von Währungsmanipulationen durch politische Behörden auf den Handelsmärkten?
answer: Sie führt zu Preisinstabilität und Unsicherheit, weil das geldpolitische Signal unzuverlässig wird, wenn die Behörden den Inhalt der Währung willkürlich ändern können
wrong_answers:
  - Sie stärkt die nationale Souveränität, indem sie eine klare territoriale Kontrolle über wirtschaftliche Transaktionen innerhalb der Staatsgrenzen schafft
  - Es verbessert die wirtschaftliche Effizienz, indem es eine zentrale Koordinierung der Wechselkurse und standardisierte Preisbildungsmechanismen auf allen Märkten ermöglicht
  - Es senkt die Transaktionskosten, indem es den Bedarf an mehreren konkurrierenden Währungen beseitigt und die kommerziellen Berechnungen vereinfacht
explanation: |
  In diesem Kapitel wird erläutert, dass Währungsmanipulationen zu Inflation führen und die Preise destabilisieren, weil das Währungssignal unsicher wird, wenn die Behörden den Inhalt der Währung willkürlich ändern können. Die mittelalterliche Analyse von Nicolas Oresme zeigt, wie die Entwertung von Währungen den Handelsaustausch stört. Die falschen Antworten spiegeln gängige Rechtfertigungen für staatliche Geldkontrolle wider, aber die liberale Kritik betont, dass solche Manipulationen eher der politischen Finanzierung als der wirtschaftlichen Effizienz dienen und daher freiwillige Tauschmechanismen wie Akkreditive den aufgezwungenen Währungen vorzuziehen sind.
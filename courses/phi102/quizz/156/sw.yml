question: Kulingana na nadharia ya uchumi huria, ni nini matokeo ya msingi ya udanganyifu wa fedha unaofanywa na mamlaka za kisiasa kwenye masoko ya kibiashara?
answer: Inasababisha kutokuwa na utulivu wa bei na kutokuwa na uhakika kwa sababu ishara ya fedha inakuwa isiyoaminika wakati mamlaka zinaweza kurekebisha maudhui ya sarafu kiholela.
wrong_answers:
  - Inaimarisha uhuru wa kitaifa kwa kuanzisha udhibiti wazi wa eneo juu ya miamala ya kiuchumi ndani ya mipaka ya majimbo
  - Inaboresha ufanisi wa kiuchumi kwa kuruhusu uratibu wa viwango vya ubadilishaji wa fedha na mifumo sanifu ya bei katika masoko yote.
  - Inapunguza gharama za miamala kwa kuondoa hitaji la sarafu nyingi zinazoshindana na kurahisisha hesabu za kibiashara
explanation: |
  Sura hiyo inaelezea kwamba udanganyifu wa fedha husababisha mfumuko wa bei na kudhoofisha bei kwa sababu ishara ya fedha inakuwa isiyo na uhakika wakati mamlaka zinaweza kurekebisha kiholela maudhui ya sarafu. Uchambuzi wa enzi za kati wa Nicolas Oresme ulionyesha jinsi upunguzaji wa thamani ya sarafu unavyovuruga ubadilishanaji wa fedha za kibiashara. Majibu yasiyo sahihi yanaonyesha uhalali wa kawaida wa udhibiti wa fedha za serikali, lakini ukosoaji wa kiliberali unasisitiza kwamba udanganyifu huo hutumikia ufadhili wa kisiasa badala ya ufanisi wa kiuchumi, na kufanya mifumo ya ubadilishanaji wa hiari kama vile barua za mikopo iwe bora kuliko sarafu zilizowekwa.
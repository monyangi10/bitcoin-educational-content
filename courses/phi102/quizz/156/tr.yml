question: Liberal ekonomi teorisine göre, siyasi otoritelerin parasal manipülasyonlarının ticari mübadeleler üzerindeki birincil sonucu nedir?
answer: Fiyat istikrarsızlığı ve belirsizlik yaratır çünkü yetkililer para birimi içeriğini keyfi olarak değiştirebildiklerinde parasal sinyal güvenilmez hale gelir
wrong_answers:
  - Devlet sınırları içindeki ekonomik işlemler üzerinde açık bir bölgesel kontrol tesis ederek ulusal egemenliği güçlendirir
  - Döviz kurlarının merkezi koordinasyonuna ve piyasalar arasında standartlaştırılmış fiyatlandırma mekanizmalarına izin vererek ekonomik verimliliği artırır
  - Birden fazla rakip para birimine olan ihtiyacı ortadan kaldırarak ve ticari hesaplamaları basitleştirerek işlem maliyetlerini azaltır
explanation: |
  Bu bölümde parasal manipülasyonun enflasyona yol açtığı ve fiyatları istikrarsızlaştırdığı, çünkü yetkililer para biriminin içeriğini keyfi olarak değiştirebildiğinde parasal sinyalin belirsizleştiği açıklanmaktadır. Nicolas Oresme'nin ortaçağ analizi, para biriminin değerinin düşürülmesinin ticari alışverişleri nasıl bozduğunu göstermiştir. Yanlış cevaplar devletin parasal kontrolü için yaygın gerekçeleri yansıtır, ancak liberal eleştiri bu tür manipülasyonların ekonomik verimlilikten ziyade siyasi finansmana hizmet ettiğini ve akreditif gibi gönüllü değişim mekanizmalarını dayatılan para birimlerine tercih edilebilir hale getirdiğini vurgular.
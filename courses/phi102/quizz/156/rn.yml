question: Dushingiye ku ciyumviro c’ubutunzi bw’uburenganzira, ni ingaruka iyihe nyamukuru y’ugukoresha nabi amahera n’abategetsi ba politike ku bijanye n’ubudandaji?
answer: Bituma ibiciro bidashikama kandi ntibimenyekana kubera ko ikimenyetso c’amahera kidashobora kwizigirwa iyo abategetsi bashobora guhindura ibirimwo amahera ataco bimaze .
wrong_answers:
  - Ikomeza ubusegaba bw'igihugu mu gushinga ubugenzuzi butomoye bw'intara ku bikorwa vy'ubutunzi biri mu mipaka ya Leta .
  - Bituma ubutunzi butera imbere mu kwemera guhuza ibiciro vy'amahera n'uburyo bwo gushinga ibiciro mu masoko yose .
  - Bigabanya igiciro c’ugucuruza mu gukuraho ivy’ugukenera amafaranga menshi ahanganye no kworohereza imibare y’ubudandaji .
explanation: |
  Ico gice kirasigura ko gukoresha nabi amahera bituma habaho ugutera imbere kw’ibiciro kandi bikaba bituma ibiciro bidahungabana kubera ko ikimenyetso c’amahera kidatomoye igihe abategetsi bashobora guhindura mu buryo butari bwo ibiri mu mafaranga. Isesengura rya Nicolas Oresme ryo mu kinjana ca mbere ryerekanye ingene ugucika intege kw’amahera bihungabanya ubudandaji. Inyishu zitari zo zirerekana imvo rusangi zo kugenzura amafaranga ya Leta, ariko abanegura b’abanyagihugu bashimika ku vy’uko ukwo gukoresha nabi gufasha mu gutanga amafaranga y’ivya politike aho gufasha mu gutuma ubutunzi bugira akamaro, bikaba bituma uburyo bwo guhindura amafaranga ku bushake nk’amakete y’inguzanyo ari bwo bwiza kuruta amafaranga ategekanijwe.
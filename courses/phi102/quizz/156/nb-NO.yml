question: Hva er ifølge liberal økonomisk teori den viktigste konsekvensen av at politiske myndigheter manipulerer pengepolitikken på handelsmarkedet?
answer: Det skaper ustabile priser og usikkerhet fordi det monetære signalet blir upålitelig når myndighetene vilkårlig kan endre valutaens innhold
wrong_answers:
  - Den styrker den nasjonale suvereniteten ved å etablere klar territoriell kontroll over økonomiske transaksjoner innenfor statens grenser
  - Det forbedrer den økonomiske effektiviteten ved å muliggjøre sentralisert koordinering av valutakurser og standardiserte prismekanismer på tvers av markeder
  - Det reduserer transaksjonskostnadene ved å eliminere behovet for flere konkurrerende valutaer og forenkle kommersielle beregninger
explanation: |
  Kapitlet forklarer at pengemanipulasjon skaper inflasjon og destabiliserer prisene fordi det monetære signalet blir usikkert når myndighetene vilkårlig kan endre valutaens innhold. Nicolas Oresmes middelalderanalyse viste hvordan valutadevaluering forstyrrer handelsutvekslingen. De gale svarene gjenspeiler vanlige begrunnelser for statlig pengekontroll, men den liberale kritikken legger vekt på at slik manipulering tjener politisk finansiering snarere enn økonomisk effektivitet, noe som gjør frivillige byttemekanismer som remburser å foretrekke fremfor påtvungne valutaer.
question: Wat is volgens de liberale economische theorie het belangrijkste gevolg van monetaire manipulatie door politieke autoriteiten op commerciële uitwisselingen?
answer: Het creëert prijsinstabiliteit en onzekerheid omdat het monetaire signaal onbetrouwbaar wordt wanneer autoriteiten de inhoud van valuta willekeurig kunnen wijzigen
wrong_answers:
  - Het versterkt de nationale soevereiniteit door een duidelijke territoriale controle op economische transacties binnen de staatsgrenzen
  - Het verbetert de economische efficiëntie door gecentraliseerde coördinatie van wisselkoersen en gestandaardiseerde prijsmechanismen op verschillende markten mogelijk te maken
  - Het verlaagt de transactiekosten door de noodzaak van meerdere concurrerende valuta's weg te nemen en commerciële berekeningen te vereenvoudigen
explanation: |
  Het hoofdstuk legt uit dat monetaire manipulatie inflatie veroorzaakt en prijzen destabiliseert omdat het monetaire signaal onzeker wordt als autoriteiten willekeurig de inhoud van valuta kunnen wijzigen. De middeleeuwse analyse van Nicolas Oresme liet zien hoe muntontwaarding commerciële uitwisselingen verstoort. De foute antwoorden weerspiegelen gangbare rechtvaardigingen voor monetaire controle door de staat, maar de liberale kritiek benadrukt dat dergelijke manipulatie eerder politieke financiering dient dan economische efficiëntie, waardoor vrijwillige uitwisselingsmechanismen zoals kredietbrieven de voorkeur verdienen boven opgelegde valuta.
question: Согласно либеральной экономической теории, каково основное последствие монетарных манипуляций политических властей для коммерческих бирж?
answer: Это создает ценовую нестабильность и неопределенность, поскольку монетарный сигнал становится ненадежным, когда власти могут произвольно изменять содержание валюты
wrong_answers:
  - Укрепляет национальный суверенитет, устанавливая четкий территориальный контроль над экономическими операциями в пределах государственных границ
  - Он повышает экономическую эффективность, позволяя централизованно координировать обменные курсы и стандартизировать механизмы ценообразования на разных рынках
  - Он снижает затраты на транзакции, устраняя необходимость использования нескольких конкурирующих валют и упрощая коммерческие расчеты
explanation: |
  В главе объясняется, что денежные манипуляции приводят к инфляции и дестабилизируют цены, поскольку денежный сигнал становится неопределенным, когда власти могут произвольно изменять содержание валюты. Средневековый анализ Николя Оресме показал, как обесценивание валюты нарушает коммерческий обмен. Неправильные ответы отражают обычные оправдания государственного денежного контроля, но либеральная критика подчеркивает, что такое манипулирование служит скорее политическому финансированию, чем экономической эффективности, делая добровольные механизмы обмена, такие как аккредитивы, предпочтительными по сравнению с навязанными валютами.
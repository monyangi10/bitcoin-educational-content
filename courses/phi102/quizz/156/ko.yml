question: 자유주의 경제 이론에 따르면, 정치 당국의 통화 조작이 상업적 거래에 미치는 주요 결과는 무엇인가요?
answer: 당국이 통화 내용을 임의로 수정할 수 있게 되면 통화 신호의 신뢰성이 떨어지기 때문에 가격 불안정성과 불확실성을 야기합니다
wrong_answers:
  - 국가 경계 내 경제 거래에 대한 명확한 영토 통제를 확립하여 국가 주권을 강화합니다
  - 시장 전반의 환율과 표준화된 가격 메커니즘을 중앙 집중식으로 조정하여 경제적 효율성을 향상시킵니다
  - 여러 경쟁 통화를 사용할 필요가 없고 상업적 계산을 간소화하여 거래 비용을 절감합니다
explanation: |
  이 장에서는 당국이 통화 내용을 임의로 수정할 수 있게 되면 통화 신호가 불확실해지기 때문에 통화 조작이 인플레이션을 일으키고 물가를 불안정하게 만든다고 설명합니다. 니콜라스 오레스메의 중세 분석은 통화 절하가 상업적 교환을 어떻게 방해하는지 보여줍니다. 오답은 국가의 통화 통제에 대한 일반적인 정당성을 반영하지만, 자유주의적 비판은 그러한 조작이 경제적 효율성보다는 정치적 자금 조달에 기여하므로 신용장 같은 자발적 교환 메커니즘이 강제 통화보다 더 바람직하다는 점을 강조합니다.
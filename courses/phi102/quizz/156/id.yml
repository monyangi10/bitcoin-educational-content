question: Menurut teori ekonomi liberal, apa konsekuensi utama dari manipulasi moneter oleh otoritas politik pada bursa komersial?
answer: Ini menciptakan ketidakstabilan dan ketidakpastian harga karena sinyal moneter menjadi tidak dapat diandalkan ketika pihak berwenang dapat secara sewenang-wenang mengubah konten mata uang
wrong_answers:
  - Memperkuat kedaulatan nasional dengan menetapkan kontrol teritorial yang jelas atas transaksi ekonomi di dalam batas-batas negara
  - Ini meningkatkan efisiensi ekonomi dengan memungkinkan koordinasi nilai tukar terpusat dan mekanisme penetapan harga standar di seluruh pasar
  - Ini mengurangi biaya transaksi dengan menghilangkan kebutuhan akan beberapa mata uang yang bersaing dan menyederhanakan perhitungan komersial
explanation: |
  Bab ini menjelaskan bahwa manipulasi moneter menghasilkan inflasi dan mengacaukan harga karena sinyal moneter menjadi tidak pasti ketika pihak berwenang dapat secara sewenang-wenang mengubah konten mata uang. Analisis abad pertengahan Nicolas Oresme menunjukkan bagaimana pelemahan mata uang mengganggu pertukaran komersial. Jawaban yang salah mencerminkan pembenaran umum untuk kontrol moneter negara, tetapi kritik liberal menekankan bahwa manipulasi seperti itu melayani pembiayaan politik daripada efisiensi ekonomi, membuat mekanisme pertukaran sukarela seperti surat kredit lebih disukai daripada mata uang yang dipaksakan.
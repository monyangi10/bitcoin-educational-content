question: According to the liberal political theory presented, what fundamental error underlies most historical attempts at nation-building and territorial expansion?
answer: They were based on political clientele expansion rather than genuine linguistic, cultural, or natural affinities
wrong_answers:
  - They failed to establish proper democratic institutions before attempting territorial consolidation
  - They prioritized economic interests over the establishment of secure borders and defensive capabilities
  - They neglected to create adequate legal frameworks for protecting individual property rights
explanation: |
  The text explicitly states that wars expanding territories were not based on linguistic or cultural affinities as commonly claimed, but rather on opportunities for political clientele expansion by ruling powers. The colonization movement exemplifies this clientele expansion without regard for language or culture unity. This reveals that historical justifications for national unity (language, culture, history) don't withstand impartial analysis, as territorial expansion served political power rather than natural community formation.

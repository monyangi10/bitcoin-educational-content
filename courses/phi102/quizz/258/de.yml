question: Welcher grundlegende Fehler liegt nach der vorgestellten liberalen politischen Theorie den meisten historischen Versuchen der Nationenbildung und territorialen Expansion zugrunde?
answer: Sie beruhten eher auf der Ausweitung der politischen Klientel als auf echten sprachlichen, kulturellen oder natürlichen Affinitäten
wrong_answers:
  - Sie haben es versäumt, angemessene demokratische Institutionen zu schaffen, bevor sie eine territoriale Konsolidierung versuchten
  - Sie gaben wirtschaftlichen Interessen Vorrang vor der Schaffung sicherer Grenzen und Verteidigungsmöglichkeiten
  - Sie haben es versäumt, einen angemessenen rechtlichen Rahmen für den Schutz der individuellen Eigentumsrechte zu schaffen
explanation: |
  Im Text wird ausdrücklich darauf hingewiesen, dass Kriege zur Ausdehnung von Gebieten nicht auf sprachlichen oder kulturellen Affinitäten beruhen, wie gemeinhin behauptet wird, sondern auf den Möglichkeiten der politischen Klientelerweiterung durch die herrschenden Mächte. Die Kolonisierungsbewegung ist ein Beispiel für diese Klientelerweiterung ohne Rücksicht auf die Einheit von Sprache und Kultur. Dies zeigt, dass die historischen Rechtfertigungen für die nationale Einheit (Sprache, Kultur, Geschichte) einer unvoreingenommenen Analyse nicht standhalten, da die territoriale Expansion eher der politischen Macht als der natürlichen Gemeinschaftsbildung diente.
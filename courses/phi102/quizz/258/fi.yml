question: Esitetyn liberaalin poliittisen teorian mukaan mikä perustavanlaatuinen virhe on useimpien historiallisten kansakunnan rakentamis- ja alueellisten laajentumispyrkimysten taustalla?
answer: Ne perustuivat pikemminkin poliittiseen asiakaskunnan laajentumiseen kuin todelliseen kielelliseen, kulttuuriseen tai luonnolliseen sukulaisuuteen
wrong_answers:
  - Ne eivät onnistuneet luomaan kunnollisia demokraattisia instituutioita ennen kuin ne yrittivät vahvistaa alueitaan
  - Ne asettivat taloudelliset edut etusijalle turvallisten rajojen ja puolustusvalmiuksien luomiseen nähden
  - Ne laiminlöivät riittävien oikeudellisten puitteiden luomisen yksilön omistusoikeuksien suojelemiseksi
explanation: |
  Tekstissä todetaan nimenomaisesti, että sotien laajentamisalueet eivät perustuneet kielelliseen tai kulttuuriseen sukulaisuuteen, kuten yleisesti väitetään, vaan pikemminkin hallitsevien valtojen mahdollisuuksiin laajentaa poliittista asiakaskuntaansa. Kolonisaatioliike on esimerkki tästä asiakaskunnan laajentumisesta ottamatta huomioon kielellistä tai kulttuurista yhtenäisyyttä. Tämä paljastaa, että historialliset perustelut kansalliselle yhtenäisyydelle (kieli, kulttuuri, historia) eivät kestä puolueetonta analyysia, sillä alueellinen laajentuminen palveli pikemminkin poliittista valtaa kuin luonnollista yhteisön muodostumista.
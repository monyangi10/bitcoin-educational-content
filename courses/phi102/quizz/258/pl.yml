question: Zgodnie z przedstawioną liberalną teorią polityczną, jaki fundamentalny błąd leży u podstaw większości historycznych prób budowania narodów i ekspansji terytorialnej?
answer: Opierały się one raczej na politycznej ekspansji klienteli niż na prawdziwych pokrewieństwach językowych, kulturowych czy naturalnych
wrong_answers:
  - Nie udało im się ustanowić odpowiednich instytucji demokratycznych przed podjęciem próby konsolidacji terytorialnej
  - Przedkładali oni interesy gospodarcze nad ustanowienie bezpiecznych granic i zdolności obronnych
  - Zaniedbały one stworzenie odpowiednich ram prawnych dla ochrony indywidualnych praw własności
explanation: |
  Tekst wyraźnie stwierdza, że wojny rozszerzające terytoria nie opierały się na podobieństwach językowych lub kulturowych, jak powszechnie twierdzono, ale raczej na możliwościach politycznej ekspansji klienteli przez rządzące mocarstwa. Ruch kolonizacyjny jest przykładem ekspansji klienteli bez względu na jedność języka czy kultury. Ujawnia to, że historyczne uzasadnienia jedności narodowej (język, kultura, historia) nie wytrzymują bezstronnej analizy, ponieważ ekspansja terytorialna służyła raczej władzy politycznej niż tworzeniu naturalnej społeczności.
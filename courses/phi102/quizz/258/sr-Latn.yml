question: Prema liberalnoj političkoj teoriji koja je predstavljena, koja fundamentalna greška leži u osnovi većine istorijskih pokušaja izgradnje nacije i teritorijalne ekspanzije?
answer: Bili su zasnovani na širenju političke klijentele, a ne na istinskim jezičkim, kulturnim ili prirodnim afinitetima.
wrong_answers:
  - Nisu uspeli da uspostave odgovarajuće demokratske institucije pre nego što su pokušali teritorijalnu konsolidaciju.
  - Oni su dali prioritet ekonomskim interesima nad uspostavljanjem sigurnih granica i odbrambenih sposobnosti.
  - Oni su zanemarili stvaranje adekvatnih pravnih okvira za zaštitu individualnih prava vlasništva.
explanation: |
  Tekst eksplicitno navodi da ratovi za širenje teritorija nisu bili zasnovani na jezičkim ili kulturnim afinitetima kako se obično tvrdi, već na prilikama za širenje političke klijentele vladajućih sila. Pokret kolonizacije predstavlja ovo širenje klijentele bez obzira na jezičko ili kulturno jedinstvo. Ovo otkriva da istorijska opravdanja za nacionalno jedinstvo (jezik, kultura, istorija) ne izdržavaju nepristrasnu analizu, jer je teritorijalno širenje služilo političkoj moći, a ne prirodnom formiranju zajednice.
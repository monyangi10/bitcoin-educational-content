question: Menurut teori politik liberal yang dipaparkan, kesalahan mendasar apa yang mendasari sebagian besar upaya historis dalam pembangunan bangsa dan perluasan wilayah?
answer: Mereka didasarkan pada perluasan klien politik daripada afinitas linguistik, budaya, atau alam yang asli
wrong_answers:
  - Mereka gagal membangun lembaga-lembaga demokratis yang tepat sebelum mencoba konsolidasi teritorial
  - Mereka memprioritaskan kepentingan ekonomi di atas pembentukan perbatasan yang aman dan kemampuan pertahanan
  - Mereka lalai dalam menciptakan kerangka hukum yang memadai untuk melindungi hak-hak kepemilikan individu
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa perang memperluas wilayah tidak didasarkan pada kedekatan bahasa atau budaya seperti yang biasa diklaim, tetapi lebih pada peluang untuk perluasan klien politik oleh kekuatan yang berkuasa. Gerakan kolonisasi mencontohkan perluasan klien ini tanpa memperhatikan kesatuan bahasa atau budaya. Hal ini menunjukkan bahwa pembenaran historis untuk kesatuan nasional (bahasa, budaya, sejarah) tidak dapat bertahan dalam analisis yang tidak memihak, karena perluasan wilayah lebih melayani kekuasaan politik daripada pembentukan komunitas secara alami.
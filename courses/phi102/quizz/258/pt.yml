question: De acordo com a teoria política liberal apresentada, que erro fundamental está subjacente à maioria das tentativas históricas de construção de nações e de expansão territorial?
answer: Baseavam-se mais na expansão da clientela política do que em afinidades linguísticas, culturais ou naturais genuínas
wrong_answers:
  - Não conseguiram criar instituições democráticas adequadas antes de tentarem a consolidação territorial
  - Deram prioridade aos interesses económicos em detrimento do estabelecimento de fronteiras seguras e de capacidades defensivas
  - Negligenciaram a criação de quadros jurídicos adequados para proteger os direitos de propriedade individuais
explanation: |
  O texto afirma explicitamente que as guerras que expandiram territórios não se basearam em afinidades linguísticas ou culturais, como geralmente se afirma, mas antes em oportunidades de expansão de clientelas políticas por parte dos poderes dominantes. O movimento de colonização exemplifica essa expansão clientelista, sem levar em conta a unidade linguística ou cultural. Isto revela que as justificações históricas para a unidade nacional (língua, cultura, história) não resistem a uma análise imparcial, uma vez que a expansão territorial serviu mais o poder político do que a formação de comunidades naturais.
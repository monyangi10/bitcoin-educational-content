question: Kulingana na nadharia ya kisiasa ya kiliberali iliyowasilishwa, ni kosa gani la msingi linalosababisha majaribio mengi ya kihistoria ya ujenzi wa taifa na upanuzi wa eneo?
answer: Zilitegemea upanuzi wa wateja wa kisiasa badala ya uhusiano halisi wa lugha, kitamaduni, au asilia
wrong_answers:
  - Walishindwa kuanzisha taasisi sahihi za kidemokrasia kabla ya kujaribu kuunganisha maeneo
  - Walipa kipaumbele maslahi ya kiuchumi kuliko uanzishwaji wa mipaka salama na uwezo wa kujilinda
  - Walipuuza kuunda mifumo ya kisheria inayofaa kwa ajili ya kulinda haki za mali za mtu binafsi
explanation: |
  Maandishi yanasema waziwazi kwamba vita vinavyopanuka maeneo havikutegemea mishikamano ya lugha au kitamaduni kama inavyodaiwa kawaida, bali fursa za upanuzi wa wateja wa kisiasa na mamlaka tawala. Harakati za ukoloni zinaonyesha upanuzi huu wa wateja bila kuzingatia umoja wa lugha au utamaduni. Hii inaonyesha kwamba uhalalishaji wa kihistoria wa umoja wa kitaifa (lugha, utamaduni, historia) haustahimili uchambuzi usioegemea upande wowote, kwani upanuzi wa maeneo ulitumikia nguvu ya kisiasa badala ya uundaji wa jamii asilia.
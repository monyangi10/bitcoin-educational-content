question: Theo lý thuyết chính trị tự do được trình bày, sai lầm cơ bản nào nằm dưới hầu hết các nỗ lực xây dựng quốc gia và mở rộng lãnh thổ trong lịch sử?
answer: Những sự hợp tác đó dựa trên việc mở rộng mối quan hệ chính trị chứ không phải dựa trên sự tương đồng thực sự về ngôn ngữ, văn hóa hay nguồn gốc tự nhiên.
wrong_answers:
  - Họ đã thất bại trong việc thiết lập các thể chế dân chủ đúng đắn trước khi tiến hành sáp nhập lãnh thổ.
  - Họ ưu tiên lợi ích kinh tế hơn việc thiết lập biên giới an toàn và năng lực phòng thủ.
  - Họ đã bỏ qua việc xây dựng các khuôn khổ pháp lý đầy đủ để bảo vệ quyền sở hữu cá nhân.
explanation: |
  Văn bản này nêu rõ rằng các cuộc chiến tranh mở rộng lãnh thổ không dựa trên sự tương đồng về ngôn ngữ hay văn hóa như thường được khẳng định, mà dựa trên cơ hội mở rộng ảnh hưởng chính trị của các thế lực cầm quyền. Phong trào thuộc địa hóa là một ví dụ điển hình cho việc mở rộng ảnh hưởng này mà không quan tâm đến sự thống nhất về ngôn ngữ hay văn hóa. Điều này cho thấy rằng những lý lẽ lịch sử biện minh cho sự thống nhất quốc gia (ngôn ngữ, văn hóa, lịch sử) không thể đứng vững trước sự phân tích khách quan, bởi vì việc mở rộng lãnh thổ phục vụ cho quyền lực chính trị hơn là sự hình thành cộng đồng tự nhiên.
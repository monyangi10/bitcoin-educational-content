question: Enligt den liberala politiska teori som presenteras, vilket grundläggande fel ligger till grund för de flesta historiska försök till nationsbyggande och territoriell expansion?
answer: De baserades på politisk klientelexpansion snarare än på genuin språklig, kulturell eller naturlig samhörighet
wrong_answers:
  - De misslyckades med att etablera lämpliga demokratiska institutioner innan de försökte konsolidera sina territorier
  - De prioriterade ekonomiska intressen framför upprättandet av säkra gränser och försvarsförmåga
  - De försummade att skapa lämpliga rättsliga ramar för att skydda enskildas äganderätt
explanation: |
  I texten sägs uttryckligen att krigens expansion inte baserades på språklig eller kulturell samhörighet, vilket ofta hävdas, utan snarare på makthavarnas möjligheter att utöka sitt politiska klientel. Kolonisationsrörelsen exemplifierar denna expansion av klientel utan hänsyn till språklig eller kulturell enhet. Detta visar att historiska motiveringar för nationell enhet (språk, kultur, historia) inte tål en opartisk analys, eftersom den territoriella expansionen tjänade politisk makt snarare än naturlig samhällsbildning.
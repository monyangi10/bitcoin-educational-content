question: بر اساس نظریه سیاسی لیبرال ارائه شده، چه خطای اساسی در اکثر تلاش‌های تاریخی برای ملت‌سازی و گسترش سرزمینی وجود دارد؟
answer: آنها بر اساس گسترش مشتریان سیاسی بودند تا وابستگی‌های واقعی زبانی، فرهنگی یا طبیعی.
wrong_answers:
  - آنها قبل از تلاش برای تحکیم سرزمینی، نتوانستند نهادهای دموکراتیک مناسب را ایجاد کنند.
  - آن‌ها منافع اقتصادی را بر ایجاد مرزهای امن و توانایی‌های دفاعی اولویت دادند.
  - آن‌ها از ایجاد چارچوب‌های قانونی مناسب برای حفاظت از حقوق مالکیت فردی غفلت کردند.
explanation: |
  متن به‌طور صریح بیان می‌کند که جنگ‌هایی که به گسترش قلمروها منجر شدند، برخلاف ادعاهای رایج، بر اساس وابستگی‌های زبانی یا فرهنگی نبودند، بلکه بر اساس فرصت‌هایی برای گسترش مشتری‌مداری سیاسی توسط قدرت‌های حاکم بودند. جنبش استعمار نمونه‌ای از این گسترش مشتری‌مداری است که بدون توجه به وحدت زبان یا فرهنگ صورت گرفت. این نشان می‌دهد که توجیهات تاریخی برای وحدت ملی (زبان، فرهنگ، تاریخ) در برابر تحلیل بی‌طرفانه مقاومت نمی‌کنند، زیرا گسترش قلمرو به قدرت سیاسی خدمت می‌کرد نه به تشکیل جامعه طبیعی.
question: Según la teoría política liberal presentada, ¿qué error fundamental subyace en la mayoría de los intentos históricos de construcción nacional y expansión territorial?
answer: Se basaban más en la expansión de la clientela política que en auténticas afinidades lingüísticas, culturales o naturales
wrong_answers:
  - No establecieron instituciones democráticas adecuadas antes de intentar la consolidación territorial
  - Dieron prioridad a los intereses económicos frente al establecimiento de fronteras seguras y capacidades defensivas
  - No crearon los marcos jurídicos adecuados para proteger los derechos de propiedad individual
explanation: |
  El texto afirma explícitamente que las guerras que expandieron los territorios no se basaron en afinidades lingüísticas o culturales, como se afirma comúnmente, sino en las oportunidades de expansión política clientelar de las potencias gobernantes. El movimiento de colonización ejemplifica esta expansión clientelar sin tener en cuenta la unidad lingüística o cultural. Esto revela que las justificaciones históricas de la unidad nacional (lengua, cultura, historia) no resisten un análisis imparcial, ya que la expansión territorial sirvió al poder político más que a la formación natural de comunidades.
question: Согласно представленной либеральной политической теории, какая фундаментальная ошибка лежит в основе большинства исторических попыток государственного строительства и территориальной экспансии?
answer: Они были основаны на расширении политической клиентуры, а не на подлинном языковом, культурном или природном родстве
wrong_answers:
  - Они не смогли создать надлежащие демократические институты, прежде чем приступить к территориальной консолидации
  - Они отдавали предпочтение экономическим интересам перед созданием безопасных границ и обороноспособности
  - Они пренебрегли созданием адекватной правовой базы для защиты индивидуальных прав собственности
explanation: |
  В тексте прямо говорится, что войны за расширение территорий велись не из-за языкового или культурного родства, как обычно утверждается, а из-за возможностей для расширения политической клиентуры правящих держав. Колонизационное движение служит примером такой экспансии клиентуры без учета языкового или культурного единства. Это показывает, что исторические обоснования национального единства (язык, культура, история) не выдерживают беспристрастного анализа, поскольку территориальная экспансия служила скорее политической власти, чем естественному формированию сообщества.
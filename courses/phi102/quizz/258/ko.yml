question: 제시된 자유주의 정치 이론에 따르면, 국가 건설과 영토 확장에 대한 대부분의 역사적 시도의 근본적인 오류는 무엇입니까?
answer: 진정한 언어적, 문화적, 자연적 친밀감보다는 정치적 고객 확대에 기반한 것이었습니다
wrong_answers:
  - 그들은 영토 통합을 시도하기 전에 적절한 민주적 제도를 확립하지 못했습니다
  - 그들은 안전한 국경과 방어 능력 구축보다 경제적 이익을 우선시했습니다
  - 개인의 재산권을 보호하기 위한 적절한 법적 프레임워크를 만드는 데 소홀했습니다
explanation: |
  이 텍스트는 영토를 확장하는 전쟁이 일반적으로 알려진 것처럼 언어적 또는 문화적 유사성에 기반한 것이 아니라 지배 세력에 의한 정치적 고객 확장의 기회에 기반한 것임을 명시하고 있습니다. 식민지화 운동은 언어나 문화적 동질성을 고려하지 않고 고객층을 확장한 대표적인 사례입니다. 이는 영토 확장이 자연스러운 공동체 형성보다는 정치적 권력에 봉사했다는 점에서 민족 통합의 역사적 정당성(언어, 문화, 역사)이 공정한 분석을 견디지 못한다는 것을 드러냅니다.
question: Milline põhimõtteline viga on esitatud liberaalse poliitilise teooria kohaselt enamiku ajalooliste riikide loomise ja territoriaalse laienemise katsete aluseks?
answer: Need põhinesid pigem poliitilisel klientuuri laienemisel kui tõelistel keelelistel, kultuurilistel või looduslikel sugulussuhetel
wrong_answers:
  - Nad ei suutnud enne territoriaalse konsolideerimise katset luua korralikke demokraatlikke institutsioone
  - Nad seadsid majandushuvid turvaliste piiride ja kaitsevõime loomisest ettepoole
  - Nad jätsid tähelepanuta piisava õigusliku raamistiku loomise individuaalsete omandiõiguste kaitsmiseks
explanation: |
  Tekstis märgitakse selgesõnaliselt, et territooriume laiendavad sõjad ei põhinenud mitte keelelistel või kultuurilistel sugulussuhetel, nagu tavaliselt väidetakse, vaid pigem valitsevate võimude poliitilistel kliendipoolsetel laienemisvõimalustel. Kolonisatsiooniliikumine on selle kliendipoolse laienemise näide, mis ei arvesta keele- ega kultuurilise ühtsusega. See näitab, et rahvusliku ühtsuse ajaloolised põhjendused (keel, kultuur, ajalugu) ei pea vastu erapooletule analüüsile, sest territoriaalne laienemine teenis pigem poliitilist võimu kui loomulikku kogukonna moodustamist.
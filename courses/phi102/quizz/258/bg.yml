question: Според представената либерална политическа теория коя основна грешка е в основата на повечето исторически опити за изграждане на нации и териториално разширяване?
answer: Те се основават по-скоро на разширяване на политическата клиентела, отколкото на истинска езикова, културна или природна близост
wrong_answers:
  - Те не успяха да създадат подходящи демократични институции, преди да се опитат да извършат териториална консолидация
  - Те дадоха приоритет на икономическите интереси пред изграждането на сигурни граници и отбранителни способности
  - Пренебрегват създаването на адекватна правна рамка за защита на индивидуалните права на собственост
explanation: |
  В текста изрично се посочва, че войните за разширяване на териториите не се основават на езикова или културна близост, както обикновено се твърди, а по-скоро на възможностите за разширяване на политическата клиентела на управляващите сили. Движението за колонизация е пример за това разширяване на клиентелата без оглед на езиковото или културното единство. Това разкрива, че историческите оправдания за националното единство (език, култура, история) не издържат на безпристрастен анализ, тъй като териториалната експанзия е служила по-скоро на политическата власт, отколкото на естественото формиране на общността.
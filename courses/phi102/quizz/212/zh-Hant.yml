question: 根據自由經濟學的分析，試圖將富有的藝術家、職業運動員和知識分子歸類於傳統馬克思主義的階級類別時，出現的主要矛盾是什麼？
answer: 儘管他們擁有財富，但嚴格來說，他們仍是無產階級，因為他們不擁有生產工具，而是用自己的雙手和智慧工作。
wrong_answers:
  - 他們代表了一個新的資產階級，透過娛樂和文化操控來剝削工人階級的消費者。
  - 「他們形成了資本家和工人之間的中間階級，證明了馬克思的二元階級體系在根本上是正確的」
  - 他們之所以是資本主義者，是因為他們的高收入允許他們投資並控制各種生產手段。
explanation: |
  Paul Leroy-Beaulieu 的分析揭示了馬克思主義的分類在應用於現代社會時的荒謬性。富有的藝術家、足球運動員、新聞記者和律師在馬克思主義的理論下，嚴格來說都是無產階級，因為他們用自己的雙手/智力工作，卻不擁有自己的生產工具。這個矛盾說明了馬克思的二元階級體系如何無法捕捉現代經濟關係的複雜性，在現代社會中，財富和階級地位與生產工具的所有權並不一致。
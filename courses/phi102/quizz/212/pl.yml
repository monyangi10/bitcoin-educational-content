question: Według liberalnej analizy ekonomicznej, jaka jest główna sprzeczność, która pojawia się przy próbie sklasyfikowania bogatych artystów, zawodowych sportowców i intelektualistów w ramach tradycyjnych marksistowskich kategorii klasowych?
answer: Są oni technicznie proletariuszami pomimo swojego bogactwa, ponieważ nie posiadają środków produkcji, ale pracują rękami i intelektem
wrong_answers:
  - Reprezentują nową klasę burżuazyjną, która wykorzystuje konsumentów z klasy robotniczej poprzez rozrywkę i manipulację kulturową
  - "Tworzą klasę pośrednią między kapitalistami a robotnikami, co dowodzi, że binarny system klasowy Marksa jest zasadniczo poprawny"
  - Są kapitalistami, ponieważ ich wysokie dochody pozwalają im inwestować i kontrolować różne środki produkcji
explanation: |
  Analiza Paula Leroy-Beaulieu ujawnia absurdalność marksistowskich klasyfikacji w odniesieniu do współczesnego społeczeństwa. Bogaci artyści, piłkarze, dziennikarze i prawnicy technicznie rzecz biorąc byliby proletariuszami według teorii marksistowskiej, ponieważ pracują rękami/umysłem, nie posiadając narzędzi produkcji. Ta sprzeczność pokazuje, jak binarny system klasowy Marksa nie jest w stanie uchwycić złożoności współczesnych relacji gospodarczych, w których bogactwo i pozycja klasowa nie pokrywają się z własnością środków produkcji.
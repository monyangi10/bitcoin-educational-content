question: Jaký je podle liberální ekonomické analýzy hlavní rozpor, který vzniká při pokusu zařadit bohaté umělce, profesionální sportovce a intelektuály do tradičních marxistických třídních kategorií?
answer: Navzdory svému bohatství jsou technicky vzato proletáři, protože nevlastní výrobní prostředky, ale pracují rukama a intelektem
wrong_answers:
  - Představují novou buržoazní třídu, která prostřednictvím zábavy a kulturní manipulace vykořisťuje spotřebitele z řad pracujících
  - "Tvoří mezitřídu mezi kapitalisty a dělníky, což dokazuje, že Marxův binární třídní systém je v zásadě správný."
  - Jsou to kapitalisté, protože jejich vysoké příjmy jim umožňují investovat do různých výrobních prostředků a ovládat je
explanation: |
  Analýza Paula Leroy-Beaulieua odhaluje absurditu marxistických klasifikací při aplikaci na moderní společnost. Bohatí umělci, fotbalisté, novináři a právníci by podle marxistické teorie byli technicky vzato proletáři, protože pracují rukama/intelektem, aniž by vlastnili výrobní nástroje. Tento rozpor ukazuje, jak Marxův binární třídní systém nedokáže postihnout složitost moderních ekonomických vztahů, kde bohatství a třídní postavení není v souladu s vlastnictvím výrobních prostředků.
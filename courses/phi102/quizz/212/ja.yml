question: 自由主義経済分析によれば、裕福な芸術家、プロのスポーツ選手、知識人を伝統的なマルクス主義的階級分類の中に分類しようとするときに現れる主な矛盾とは何か？
answer: 彼らは生産手段を所有していないが、手と知性を使って働いているため、富裕であるにもかかわらず、技術的にはプロレタリアなのだ
wrong_answers:
  - 彼らは、エンターテインメントや文化的操作を通じて労働者階級の消費者から搾取する新しいブルジョア階級を象徴している。
  - 「彼らは資本家と労働者の間に中間階級を形成しており、マルクスの二元的階級制度が基本的に正しいことを証明している」。
  - 彼らが資本家であるのは、その高い収入によって、さまざまな生産手段に投資し、管理することができるからである。
explanation: |
  ポール・ルロワ＝ボリューの分析は、マルクス主義の分類を現代社会に適用した場合の不合理さを明らかにしている。裕福な芸術家、サッカー選手、ジャーナリスト、弁護士は、生産道具を所有することなく手や知性を使って働いているため、マルクス主義の理論では厳密にはプロレタリアとなる。この矛盾は、マルクスの二元的階級制度が、富と階級的地位が生産手段の所有と一致しない現代の経済関係の複雑さをいかに捉え損なっているかを示している。
question: Според либералния икономически анализ кое е основното противоречие, което възниква при опита да се класифицират богатите артисти, професионални спортисти и интелектуалци в рамките на традиционните марксистки класови категории?
answer: Въпреки богатството си те са технически пролетарии, защото не притежават средствата за производство, а работят с ръцете и интелекта си
wrong_answers:
  - Те представляват нова буржоазна класа, която експлоатира потребителите от работническата класа чрез развлечения и културни манипулации
  - "Те формират междинна класа между капиталистите и работниците, което доказва, че бинарната класова система на Маркс е принципно правилна"
  - Те са капиталисти, защото високите им доходи им позволяват да инвестират в различни средства за производство и да ги контролират
explanation: |
  Анализът на Пол Леруа-Божо разкрива абсурдността на марксистките класификации, когато се прилагат към съвременното общество. Богатите художници, футболисти, журналисти и адвокати технически биха били пролетарии според марксистката теория, тъй като работят с ръцете/интелекта си, без да притежават оръдия за производство. Това противоречие показва как бинарната класова система на Маркс не успява да обхване сложността на съвременните икономически отношения, където богатството и класовото положение не съвпадат със собствеността върху средствата за производство.
question: Según el análisis económico liberal, ¿cuál es la principal contradicción que surge cuando se intenta clasificar a los artistas, deportistas profesionales e intelectuales ricos dentro de las categorías de clase marxistas tradicionales?
answer: Son técnicamente proletarios a pesar de su riqueza, porque no poseen los medios de producción, sino que trabajan con sus manos y su intelecto
wrong_answers:
  - Representan una nueva clase burguesa que explota a los consumidores de la clase trabajadora mediante el entretenimiento y la manipulación cultural
  - "Forman una clase intermedia entre capitalistas y trabajadores que demuestra que el sistema binario de clases de Marx es fundamentalmente correcto"
  - Son capitalistas porque sus elevados ingresos les permiten invertir en diversos medios de producción y controlarlos
explanation: |
  El análisis de Paul Leroy-Beaulieu revela lo absurdo de las clasificaciones marxistas cuando se aplican a la sociedad moderna. Los artistas, futbolistas, periodistas y abogados ricos serían técnicamente proletarios según la teoría marxista, ya que trabajan con sus manos/intelecto sin poseer sus herramientas de producción. Esta contradicción demuestra que el sistema binario de clases de Marx no capta la complejidad de las relaciones económicas modernas, en las que la riqueza y la posición de clase no coinciden con la propiedad de los medios de producción.
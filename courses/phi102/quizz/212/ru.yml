question: Какое основное противоречие, согласно либеральному экономическому анализу, возникает при попытке классифицировать богатых художников, профессиональных спортсменов и интеллектуалов в рамках традиционных марксистских классовых категорий?
answer: Несмотря на свое богатство, они формально являются пролетариями, потому что не владеют средствами производства, а работают руками и интеллектом
wrong_answers:
  - Они представляют собой новый буржуазный класс, который эксплуатирует потребителей из рабочего класса с помощью развлечений и культурных манипуляций
  - "Они образуют промежуточный класс между капиталистами и рабочими, что доказывает принципиальную правильность бинарной классовой системы Маркса"
  - Они являются капиталистами, потому что их высокие доходы позволяют им инвестировать в различные средства производства и контролировать их
explanation: |
  Анализ Поля Леруа-Болье показывает абсурдность марксистских классификаций в применении к современному обществу. Богатые художники, футболисты, журналисты и юристы, согласно марксистской теории, технически являются пролетариями, поскольку они работают руками/интеллектом, не владея орудиями производства. Это противоречие демонстрирует, как бинарная классовая система Маркса не может отразить всю сложность современных экономических отношений, где богатство и классовое положение не совпадают с владением средствами производства.
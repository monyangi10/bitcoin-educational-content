question: Dushingiye ku nseguro y’ubutunzi y’ubwigenge, ni igiki kivuguruzanya nyamukuru kigaragara iyo umuntu agerageje gushiramwo abahinga mu vy’ubuhinga bw’amasanamu b’abatunzi, abakinnyi b’imikino ngororamubiri b’umwuga, n’abanyabwenge mu migwi y’imigwi y’abamarxiste ba kera?
answer: Ni aba proletariat mu buryo bw’ubuhinga naho bafise ubutunzi kuko nta buryo bafise bwo gukora ahubwo bakora n’amaboko yabo n’ubwenge bwabo .
wrong_answers:
  - Baserukira umugwi mushasha w’abanyagihugu ukoresha nabi abaguzi b’abakozi biciye mu vyo kwisamaza no gukoresha nabi umuco .
  - "\"Bagize umugwi wo hagati hagati y'abanyagihugu n'abakozi bigaragaza ko uburyo bwa Marx bw'imigwi ibiri ari bwo bubereye\"."
  - Ni aba kapitaliste kuko amahera menshi baronka abafasha gushiramwo amahera no kugenzura uburyo butandukanye bwo guhingura .
explanation: |
  Isesengura rya Paul Leroy-Beaulieu ryerekana ubujuju bw’ugushira abantu mu migwi kw’aba Marxiste iyo bukoreshejwe mu kibano ca none. Abatunzi b’abanyabugenegene, abakinyi b’umupira w’amaguru, abanyamakuru, n’abavoka mu buryo bw’ubuhinga boba ari abakozi b’abanyagihugu mu gihe c’inyigisho ya Marxiste kuko bakora n’ibiganza/ubwenge bwabo ata bikoresho vyabo vyo gukora. Ivyo bivuguruzanya vyerekana ingene uburyo bwa Marx bw’imigwi ibiri butashobora gufata uburemere bw’imigenderanire y’ubutunzi yo muri iki gihe, aho ubutunzi n’ikibanza c’imigwi bidahuye n’ubutunzi bw’uburyo bwo guhingura.
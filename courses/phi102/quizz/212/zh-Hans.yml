question: 根据自由主义经济分析，在试图将富有的艺术家、职业运动员和知识分子归入传统的马克思主义阶级类别时，出现的主要矛盾是什么？
answer: 尽管他们很富有，但从技术上讲，他们还是无产者，因为他们并不拥有生产资料，而是用双手和智力劳动
wrong_answers:
  - 他们代表了一个新的资产阶级阶层，通过娱乐和文化操纵剥削工人阶级消费者
  - "他们构成了介于资本家和工人之间的中间阶层，证明马克思的二元阶级体系从根本上是正确的"
  - 他们是资本家，因为他们的高收入使他们能够投资和控制各种生产资料
explanation: |
  保罗-勒鲁瓦-博略的分析揭示了马克思主义分类法在应用于现代社会时的荒谬性。富有的艺术家、足球运动员、记者和律师在技术上属于马克思主义理论下的无产者，因为他们用双手/智力工作，却不拥有生产工具。这一矛盾表明，马克思的二元阶级体系未能捕捉到现代经济关系的复杂性，在现代经济关系中，财富和阶级地位与生产工具的所有权并不一致。
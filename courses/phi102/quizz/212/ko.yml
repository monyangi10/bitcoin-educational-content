question: 자유주의 경제 분석에 따르면, 부유한 예술가, 프로 운동선수, 지식인을 전통적인 마르크스주의 계급 범주 안에 분류하려고 할 때 나타나는 주요 모순은 무엇일까요?
answer: 그들은 생산 수단을 소유하지 않고 손과 지성으로 일하기 때문에 부에도 불구하고 기술적으로 프롤레타리아입니다
wrong_answers:
  - 그들은 엔터테인먼트와 문화 조작을 통해 노동 계급 소비자를 착취하는 새로운 부르주아 계급을 대표합니다
  - "자본가와 노동자 사이의 중간 계급을 형성하여 마르크스의 이분법적 계급 체계가 근본적으로 옳다는 것을 증명한다"
  - 그들은 높은 소득으로 다양한 생산 수단에 투자하고 통제할 수 있기 때문에 자본가입니다
explanation: |
  폴 르로이-보리외의 분석은 현대 사회에 적용했을 때 마르크스주의적 분류의 불합리함을 드러냅니다. 부유한 예술가, 축구 선수, 언론인, 변호사는 생산 수단을 소유하지 않고 손과 지성으로 일하기 때문에 마르크스주의 이론에 따르면 엄밀히 말하면 프롤레타리아가 될 수 있습니다. 이러한 모순은 마르크스의 이분법적 계급 체계가 부와 계급적 지위가 생산 수단의 소유와 일치하지 않는 현대 경제 관계의 복잡성을 포착하는 데 실패했음을 보여줍니다.
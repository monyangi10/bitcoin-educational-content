question: Wat is volgens de liberale economische analyse de belangrijkste tegenstrijdigheid als je rijke artiesten, professionele atleten en intellectuelen probeert in te delen in traditionele marxistische klassencategorieën?
answer: Ondanks hun rijkdom zijn ze technisch gezien proletariërs omdat ze de productiemiddelen niet bezitten, maar met hun handen en intellect werken
wrong_answers:
  - Ze vertegenwoordigen een nieuwe burgerlijke klasse die consumenten uit de arbeidersklasse uitbuit door middel van entertainment en culturele manipulatie
  - "Ze vormen een tussenklasse tussen kapitalisten en arbeiders die bewijst dat Marx' binaire klassensysteem fundamenteel juist is"
  - Ze zijn kapitalisten omdat hun hoge inkomens hen in staat stellen te investeren in verschillende productiemiddelen en deze te controleren
explanation: |
  Paul Leroy-Beaulieu's analyse onthult de absurditeit van marxistische classificaties wanneer deze worden toegepast op de moderne samenleving. Rijke artiesten, voetballers, journalisten en advocaten zouden technisch gezien proletariërs zijn volgens de marxistische theorie omdat ze met hun handen/intellect werken zonder hun productiemiddelen te bezitten. Deze tegenstrijdigheid laat zien hoe Marx' binaire klassensysteem er niet in slaagt de complexiteit van moderne economische relaties te vatten, waar rijkdom en klassepositie niet samenvallen met het bezit van productiemiddelen.
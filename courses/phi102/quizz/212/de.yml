question: "Worin besteht nach der liberalen Wirtschaftsanalyse der Hauptwiderspruch bei dem Versuch, reiche Künstler, Profisportler und Intellektuelle in traditionelle marxistische Klassenkategorien einzuordnen?"
answer: "Sie sind trotz ihres Reichtums technisch gesehen Proletarier, weil sie nicht die Produktionsmittel besitzen, sondern mit ihren Händen und ihrem Verstand arbeiten"
wrong_answers:
  - "Sie repräsentieren eine neue bürgerliche Klasse, die die Konsumenten der Arbeiterklasse durch Unterhaltung und kulturelle Manipulation ausbeutet"
  - "Sie bilden eine Zwischenklasse zwischen Kapitalisten und Arbeitern, die beweist, dass das binäre Klassensystem von Marx grundsätzlich richtig ist"
  - "Sie sind Kapitalisten, weil ihr hohes Einkommen es ihnen ermöglicht, in verschiedene Produktionsmittel zu investieren und diese zu kontrollieren"
explanation: |
  Paul Leroy-Beaulieus Analyse offenbart die Absurdität der marxistischen Klassifizierungen, wenn sie auf die moderne Gesellschaft angewendet werden. Wohlhabende Künstler, Fußballer, Journalisten und Anwälte wären nach der marxistischen Theorie eigentlich Proletarier, da sie mit ihren Händen/ihrem Verstand arbeiten, ohne ihre Produktionsmittel zu besitzen. Dieser Widerspruch zeigt, dass das binäre Klassensystem von Marx die Komplexität moderner wirtschaftlicher Beziehungen nicht erfassen kann, in denen Reichtum und Klassenposition nicht mit dem Eigentum an Produktionsmitteln übereinstimmen.

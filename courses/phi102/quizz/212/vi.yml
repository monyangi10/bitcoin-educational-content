question: Theo phân tích kinh tế tự do, mâu thuẫn chính nảy sinh khi cố gắng phân loại các nghệ sĩ giàu có, vận động viên chuyên nghiệp và trí thức vào các phạm trù giai cấp Mác-xít truyền thống là gì?
answer: Về mặt kỹ thuật, họ là giai cấp vô sản bất chấp sự giàu có của họ vì họ không sở hữu tư liệu sản xuất mà chỉ lao động bằng tay và trí tuệ.
wrong_answers:
  - Họ đại diện cho một tầng lớp tư sản mới, bóc lột người tiêu dùng thuộc tầng lớp lao động thông qua giải trí và thao túng văn hóa.
  - "Họ tạo thành một tầng lớp trung gian giữa các nhà tư bản và công nhân, chứng minh rằng hệ thống giai cấp nhị nguyên của Marx về cơ bản là đúng."
  - Họ là những nhà tư bản vì thu nhập cao cho phép họ đầu tư và kiểm soát nhiều phương tiện sản xuất khác nhau.
explanation: |
  Phân tích của Paul Leroy-Beaulieu cho thấy sự phi lý của các phân loại Mác-xít khi áp dụng vào xã hội hiện đại. Về mặt lý thuyết, các nghệ sĩ, cầu thủ bóng đá, nhà báo và luật sư giàu có sẽ được coi là giai cấp vô sản theo lý thuyết Mác-xít vì họ làm việc bằng tay/trí tuệ mà không sở hữu công cụ sản xuất. Mâu thuẫn này chứng minh hệ thống giai cấp nhị nguyên của Marx đã thất bại trong việc nắm bắt sự phức tạp của các mối quan hệ kinh tế hiện đại, nơi sự giàu có và vị thế giai cấp không tương xứng với quyền sở hữu phương tiện sản xuất.
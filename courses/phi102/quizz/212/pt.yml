question: De acordo com a análise económica liberal, qual é a principal contradição que surge quando se tenta classificar os artistas ricos, os atletas profissionais e os intelectuais dentro das categorias de classe marxistas tradicionais?
answer: São tecnicamente proletários, apesar da sua riqueza, porque não possuem os meios de produção, mas trabalham com as mãos e o intelecto
wrong_answers:
  - Representam uma nova classe burguesa que explora os consumidores da classe trabalhadora através do entretenimento e da manipulação cultural
  - "Formam uma classe intermédia entre capitalistas e trabalhadores, o que prova que o sistema binário de classes de Marx é fundamentalmente correto"
  - São capitalistas porque os seus rendimentos elevados lhes permitem investir e controlar vários meios de produção
explanation: |
  A análise de Paul Leroy-Beaulieu revela o absurdo das classificações marxistas quando aplicadas à sociedade moderna. Os artistas ricos, os futebolistas, os jornalistas e os advogados seriam tecnicamente proletários segundo a teoria marxista, uma vez que trabalham com as suas mãos/intelecto sem possuírem os seus instrumentos de produção. Esta contradição demonstra como o sistema binário de classes de Marx não consegue captar a complexidade das relações económicas modernas, em que a riqueza e a posição de classe não se alinham com a propriedade dos meios de produção.
question: Liberal ekonomik analize göre, varlıklı sanatçıları, profesyonel sporcuları ve entelektüelleri geleneksel Marksist sınıf kategorileri içinde sınıflandırmaya çalışırken ortaya çıkan temel çelişki nedir?
answer: Servetlerine rağmen teknik olarak proleterdirler çünkü üretim araçlarına sahip değildirler, elleri ve akıllarıyla çalışırlar
wrong_answers:
  - Eğlence ve kültürel manipülasyon yoluyla işçi sınıfı tüketicilerini sömüren yeni bir burjuva sınıfını temsil ediyorlar
  - "Kapitalistler ve işçiler arasında, Marx'ın ikili sınıf sisteminin temelde doğru olduğunu kanıtlayan bir ara sınıf oluştururlar"
  - Kapitalisttirler çünkü yüksek gelirleri çeşitli üretim araçlarına yatırım yapmalarına ve bunları kontrol etmelerine olanak sağlar
explanation: |
  Paul Leroy-Beaulieu'nun analizi, modern topluma uygulandığında Marksist sınıflandırmaların saçmalığını ortaya koymaktadır. Varlıklı sanatçılar, futbolcular, gazeteciler ve avukatlar, üretim araçlarına sahip olmadan elleriyle/akıllarıyla çalıştıkları için Marksist teoriye göre teknik olarak proleter olacaktır. Bu çelişki, Marx'ın ikili sınıf sisteminin, zenginlik ve sınıf konumunun üretim araçlarının mülkiyeti ile aynı hizada olmadığı modern ekonomik ilişkilerin karmaşıklığını yakalamakta nasıl başarısız olduğunu göstermektedir.
question: Hva er ifølge liberal økonomisk analyse den primære motsetningen som oppstår når man forsøker å klassifisere velstående kunstnere, profesjonelle idrettsutøvere og intellektuelle innenfor tradisjonelle marxistiske klassekategorier?
answer: De er teknisk sett proletarer til tross for sin rikdom, fordi de ikke eier produksjonsmidlene, men arbeider med hendene og intellektet
wrong_answers:
  - De representerer en ny borgerklasse som utnytter arbeiderklassens forbrukere gjennom underholdning og kulturell manipulasjon
  - "De utgjør en mellomklasse mellom kapitalister og arbeidere som beviser at Marx' binære klassesystem er grunnleggende riktig"
  - De er kapitalister fordi de høye inntektene deres gjør det mulig for dem å investere i og kontrollere ulike produksjonsmidler
explanation: |
  Paul Leroy-Beaulieus analyse avslører det absurde i marxistiske klassifikasjoner når de anvendes på det moderne samfunnet. Velstående kunstnere, fotballspillere, journalister og advokater ville teknisk sett vært proletarer ifølge marxistisk teori, siden de arbeider med hendene/intelligensen uten å eie produksjonsredskapene sine. Denne selvmotsigelsen viser hvordan Marx' binære klassesystem ikke klarer å fange opp kompleksiteten i moderne økonomiske forhold, der rikdom og klasseposisjon ikke stemmer overens med eierskap til produksjonsmidler.
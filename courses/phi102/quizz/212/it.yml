question: Secondo l'analisi economica liberale, qual è la contraddizione principale che emerge quando si cerca di classificare artisti ricchi, atleti professionisti e intellettuali all'interno delle tradizionali categorie di classe marxiste?
answer: Sono tecnicamente proletari nonostante la loro ricchezza, perché non possiedono i mezzi di produzione, ma lavorano con le loro mani e il loro intelletto
wrong_answers:
  - Rappresentano una nuova classe borghese che sfrutta i consumatori della classe operaia attraverso l'intrattenimento e la manipolazione culturale
  - "Formano una classe intermedia tra capitalisti e operai che dimostra che il sistema binario delle classi di Marx è fondamentalmente corretto"
  - Sono capitalisti perché i loro alti redditi permettono loro di investire e controllare diversi mezzi di produzione
explanation: |
  L'analisi di Paul Leroy-Beaulieu rivela l'assurdità delle classificazioni marxiste quando vengono applicate alla società moderna. Artisti ricchi, calciatori, giornalisti e avvocati sarebbero tecnicamente proletari secondo la teoria marxista, poiché lavorano con le loro mani/intelletto senza possedere gli strumenti di produzione. Questa contraddizione dimostra come il sistema binario delle classi di Marx non riesca a cogliere la complessità delle relazioni economiche moderne, dove la ricchezza e la posizione di classe non si allineano con la proprietà dei mezzi di produzione.
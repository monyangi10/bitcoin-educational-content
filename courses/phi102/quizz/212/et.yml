question: Milline on liberaalse majandusanalüüsi kohaselt peamine vastuolu, mis tekib, kui püütakse liigitada jõukaid kunstnikke, profisportlasi ja intellektuaale traditsioonilistesse marksistlikesse klassikategooriatesse?
answer: Nad on oma rikkusest hoolimata tehniliselt proletaarlased, sest nad ei oma tootmisvahendeid, vaid töötavad oma kätega ja intellektiga
wrong_answers:
  - Nad esindavad uut kodanlikku klassi, mis kasutab töölisklassi tarbijaid ära meelelahutuse ja kultuurilise manipuleerimise kaudu
  - "Nad moodustavad vahepealse klassi kapitalistide ja tööliste vahel, mis tõestab, et Marxi binaarne klassisüsteem on põhimõtteliselt õige"
  - Nad on kapitalistid, sest nende suur sissetulek võimaldab neil investeerida erinevatesse tootmisvahenditesse ja kontrollida neid
explanation: |
  Paul Leroy-Beaulieu analüüs paljastab marksistlike klassifikatsioonide absurdsuse, kui neid rakendada tänapäeva ühiskonnas. Rikkad kunstnikud, jalgpallurid, ajakirjanikud ja juristid oleksid marksistliku teooria kohaselt tehniliselt proletaarlased, sest nad töötavad oma kätega/intellektiga, ilma et nad omaksid oma tootmisvahendeid. See vastuolu näitab, kuidas Marxi binaarne klassisüsteem ei suuda tabada kaasaegsete majandussuhete keerukust, kus rikkus ja klassipositsioon ei ühti tootmisvahendite omandiõigusega.
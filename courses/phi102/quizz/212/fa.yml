question: بر اساس تحلیل اقتصادی لیبرال، تناقض اصلی که هنگام تلاش برای طبقه‌بندی هنرمندان ثروتمند، ورزشکاران حرفه‌ای و روشنفکران در دسته‌بندی‌های طبقاتی سنتی مارکسیستی به وجود می‌آید چیست؟
answer: آن‌ها از نظر فنی پرولتاریا هستند با وجود ثروتشان، زیرا مالک وسایل تولید نیستند بلکه با دستان و عقل خود کار می‌کنند.
wrong_answers:
  - آن‌ها نماینده یک طبقه بورژوای جدید هستند که مصرف‌کنندگان طبقه کارگر را از طریق سرگرمی و دستکاری فرهنگی استثمار می‌کنند.
  - "آن‌ها یک طبقه میانی بین سرمایه‌داران و کارگران تشکیل می‌دهند که نشان می‌دهد سیستم دوگانه طبقاتی مارکس اساساً درست است"
  - آن‌ها سرمایه‌دار هستند زیرا درآمدهای بالای آن‌ها به آن‌ها اجازه می‌دهد در وسایل مختلف تولید سرمایه‌گذاری و کنترل کنند.
explanation: |
  تحلیل پل لروی-بولو نشان‌دهندهٔ پوچی طبقه‌بندی‌های مارکسیستی است وقتی که به جامعهٔ مدرن اعمال می‌شود. هنرمندان ثروتمند، فوتبالیست‌ها، روزنامه‌نگاران و وکلا از نظر تئوری مارکسیستی به‌طور فنی پرولتاریا محسوب می‌شوند زیرا با دست‌ها/عقل خود کار می‌کنند بدون اینکه مالک ابزار تولید خود باشند. این تناقض نشان می‌دهد که چگونه سیستم طبقاتی دوتایی مارکس نمی‌تواند پیچیدگی روابط اقتصادی مدرن را به‌درستی به تصویر بکشد، جایی که ثروت و موقعیت طبقاتی با مالکیت ابزار تولید همخوانی ندارد.
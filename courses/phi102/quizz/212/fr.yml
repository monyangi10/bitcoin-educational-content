question: Selon l'analyse économique libérale, quelle est la principale contradiction qui émerge lorsqu'on tente de classer les artistes, les athlètes professionnels et les intellectuels fortunés dans les catégories de classe marxistes traditionnelles ?
answer: Ils sont techniquement prolétaires malgré leur richesse car ils ne possèdent pas les moyens de production mais travaillent avec leurs mains et leur intellect
wrong_answers:
  - Ils représentent une nouvelle classe bourgeoise qui exploite les consommateurs de la classe ouvrière par le biais du divertissement et de la manipulation culturelle
  - Ils forment une classe intermédiaire entre les capitalistes et les travailleurs, ce qui prouve que le système de classes binaires de Marx est fondamentalement correct
  - Ils sont capitalistes parce que leurs revenus élevés leur permettent d'investir dans divers moyens de production et de les contrôler
explanation: |
  L'analyse de Paul Leroy-Beaulieu révèle l'absurdité des classifications marxistes lorsqu'elles sont appliquées à la société moderne. Les artistes, footballeurs, journalistes et avocats fortunés seraient techniquement des prolétaires selon la théorie marxiste puisqu'ils travaillent avec leurs mains/intellect sans posséder leurs outils de production. Cette contradiction démontre que le système de classes binaire de Marx ne parvient pas à saisir la complexité des relations économiques modernes, où la richesse et la position de classe ne s'alignent pas sur la propriété des moyens de production.

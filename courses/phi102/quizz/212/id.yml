question: Menurut analisis ekonomi liberal, apa kontradiksi utama yang muncul ketika mencoba mengklasifikasikan seniman kaya, atlet profesional, dan intelektual ke dalam kategori kelas Marxis tradisional?
answer: Mereka secara teknis adalah proletar meskipun mereka kaya karena mereka tidak memiliki alat produksi tetapi bekerja dengan tangan dan kecerdasan mereka
wrong_answers:
  - Mereka mewakili kelas borjuis baru yang mengeksploitasi konsumen kelas pekerja melalui hiburan dan manipulasi budaya
  - "Mereka membentuk kelas menengah antara kapitalis dan pekerja yang membuktikan bahwa sistem kelas biner Marx pada dasarnya benar"
  - Mereka adalah kapitalis karena pendapatan mereka yang tinggi memungkinkan mereka untuk berinvestasi dan mengendalikan berbagai alat produksi
explanation: |
  Analisis Paul Leroy-Beaulieu mengungkapkan absurditas klasifikasi Marxis ketika diterapkan pada masyarakat modern. Seniman, pesepakbola, jurnalis, dan pengacara yang kaya secara teknis akan menjadi proletar di bawah teori Marxis karena mereka bekerja dengan tangan/intelek tanpa memiliki alat produksi. Kontradiksi ini menunjukkan bagaimana sistem kelas biner Marx gagal menangkap kompleksitas hubungan ekonomi modern, di mana kekayaan dan posisi kelas tidak selaras dengan kepemilikan alat produksi.
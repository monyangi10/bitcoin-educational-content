question: Prema liberalnoj ekonomskoj analizi, koja je primarna kontradikcija koja se javlja kada se pokušava klasifikovati bogate umetnike, profesionalne sportiste i intelektualce unutar tradicionalnih marksističkih klasnih kategorija?
answer: Oni su tehnički proletarijat uprkos svom bogatstvu jer ne poseduju sredstva za proizvodnju, već rade svojim rukama i intelektom.
wrong_answers:
  - Oni predstavljaju novu buržoasku klasu koja eksploatiše potrošače radničke klase kroz zabavu i kulturnu manipulaciju.
  - "Čine međuklasu između kapitalista i radnika što dokazuje da je Marksov binarni klasni sistem suštinski tačan"
  - Oni su kapitalisti jer im njihovi visoki prihodi omogućavaju da investiraju u i kontrolišu različita sredstva proizvodnje.
explanation: |
  Analiza Paula Leroy-Beaulieua otkriva apsurdnost marksističkih klasifikacija kada se primene na moderno društvo. Bogati umetnici, fudbaleri, novinari i advokati bi tehnički bili proletarijat prema marksističkoj teoriji, jer rade rukama/inteligencijom bez posedovanja svojih sredstava za proizvodnju. Ova kontradikcija pokazuje kako Marksov binarni klasni sistem ne uspeva da obuhvati složenost modernih ekonomskih odnosa, gde bogatstvo i klasna pozicija nisu u skladu sa vlasništvom nad sredstvima za proizvodnju.
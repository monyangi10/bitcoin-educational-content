question: Mikä on liberaalin talousanalyysin mukaan ensisijainen ristiriita, joka syntyy, kun rikkaita taiteilijoita, ammattiurheilijoita ja älymystöä yritetään luokitella perinteisiin marxilaisiin luokkakategorioihin?
answer: He ovat rikkaudestaan huolimatta teknisesti proletaareja, koska he eivät omista tuotantovälineitä vaan tekevät työtä käsillään ja älyllään
wrong_answers:
  - Ne edustavat uutta porvarillista luokkaa, joka riistää työväenluokan kuluttajia viihteen ja kulttuurin manipuloinnin avulla
  - "He muodostavat kapitalistien ja työläisten väliin jäävän luokan, joka todistaa, että Marxin binäärinen luokkajärjestelmä on pohjimmiltaan oikea"
  - He ovat kapitalisteja, koska he voivat suurten tulojensa ansiosta investoida erilaisiin tuotantovälineisiin ja hallita niitä
explanation: |
  Paul Leroy-Beaulieun analyysi paljastaa marxilaisen luokittelun järjettömyyden sovellettuna nyky-yhteiskuntaan. Varakkaat taiteilijat, jalkapalloilijat, toimittajat ja lakimiehet olisivat marxilaisen teorian mukaan teknisesti proletaareita, koska he työskentelevät käsillään/älyllään omistamatta tuotantovälineitään. Tämä ristiriita osoittaa, miten Marxin binäärinen luokkajärjestelmä ei pysty vangitsemaan nykyaikaisten taloudellisten suhteiden monimutkaisuutta, jossa varallisuus ja luokka-asema eivät vastaa tuotantovälineiden omistusta.
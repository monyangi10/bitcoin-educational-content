question: پیشرفت فنی و ماشین‌ها چگونه اساس سلطه اجتماعی در جوامع انسانی را تغییر دادند؟
answer: آن‌ها به سلطه‌گری مبتنی بر قدرت فیزیکی پایان دادند و روابط تبادل مسالمت‌آمیز را ترویج کردند.
wrong_answers:
  - آن‌ها با تمرکز ثروت در میان قوی‌ترین‌ها، ساختارهای قدرت سنتی را تقویت کردند.
  - آن‌ها اشکال جدیدی از سلطه را بر اساس دسترسی به منابع طبیعی ایجاد کردند.
  - آن‌ها برتری نظامی را به عنوان منبع اصلی کنترل اجتماعی برقرار کردند.
explanation: |
  این فصل توضیح می‌دهد که سرمایه‌داری، که به عنوان پیشرفت فنی جایگزین کردن ماشین‌ها به جای نیروی فیزیکی در تولید تعریف می‌شود، به طور اساسی روابط اجتماعی را متحول کرد. هنگامی که بهره‌وری بیشتر به هوش وابسته شد تا قدرت عضلانی، سلطه سنتی مبتنی بر قدرت فیزیکی توجیه خود را از دست داد. این تغییر به ویژه به نفع زنان بود، زیرا سهم اقتصادی آن‌ها با توجه به اینکه ماشین‌ها به نیروی فیزیکی کمتری و مهارت‌های فکری بیشتری نیاز داشتند، ارزش بیشتری پیدا کرد. گزینه‌های دیگر نادرست هستند زیرا پیشرفت فنی در واقع ساختارهای قدرت سنتی را تضعیف کرد نه تقویت، جامعه را از درگیری‌های مبتنی بر منابع به سمت فعالیت‌های تولیدی سوق داد و روابط قراردادی مسالمت‌آمیز را بر سلطه نظامی ترجیح داد.
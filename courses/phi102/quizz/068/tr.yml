question: Teknik ilerleme ve makineler insan toplumlarında sosyal egemenliğin temelini nasıl değiştirdi?
answer: Fiziksel güce dayalı tahakküme son verdiler ve barışçıl değişim ilişkilerini teşvik ettiler
wrong_answers:
  - Serveti en güçlüler arasında yoğunlaştırarak geleneksel güç yapılarını pekiştirdiler
  - Doğal kaynaklara erişim temelinde yeni tahakküm biçimleri yarattılar
  - Sosyal kontrolün birincil kaynağı olarak askeri üstünlük kurdular
explanation: |
  Bu bölümde, üretimde kaba kuvvetin yerini makinelerin aldığı teknik ilerleme olarak tanımlanan kapitalizmin toplumsal ilişkileri temelden dönüştürdüğü anlatılmaktadır. Üretkenlik kas gücünden çok zekaya bağlı olmaya başladığında, fiziksel güce dayalı geleneksel tahakküm gerekçesini yitirmiştir. Bu değişimden özellikle kadınlar yararlanmış, makineler daha az fiziksel güç ve daha fazla entelektüel beceri gerektirdiğinden ekonomik katkıları daha değerli hale gelmiştir. Diğer seçenekler yanlıştır çünkü teknik ilerleme aslında geleneksel güç yapılarını güçlendirmek yerine zayıflatmış, toplumu kaynak temelli çatışmalardan üretken faaliyetlere doğru kaydırmış ve askeri hakimiyet yerine barışçıl sözleşme ilişkilerini teşvik etmiştir.
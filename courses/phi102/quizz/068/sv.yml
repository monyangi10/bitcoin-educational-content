question: Hur förändrade tekniska framsteg och maskiner grunden för social dominans i mänskliga samhällen?
answer: De gjorde slut på dominans baserad på fysisk styrka och främjade fredliga utbytesrelationer
wrong_answers:
  - De förstärkte traditionella maktstrukturer genom att koncentrera rikedomarna till de starkaste
  - De skapade nya former av dominans baserade på tillgång till naturresurser
  - De etablerade militär överlägsenhet som den primära källan till social kontroll
explanation: |
  Kapitlet förklarar att kapitalismen, definierad som den tekniska utvecklingen där maskiner ersätter råstyrka i produktionen, i grunden förändrade de sociala relationerna. När produktiviteten började bero mer på intelligens än på muskelstyrka förlorade den traditionella dominansen baserad på fysisk styrka sitt berättigande. Detta skifte gynnade särskilt kvinnor, vars ekonomiska bidrag blev mer uppskattat när maskinerna krävde mindre fysisk kraft och mer intellektuella färdigheter. De andra alternativen är felaktiga eftersom den tekniska utvecklingen snarare försvagade än förstärkte traditionella maktstrukturer, förflyttade samhället från resursbaserade konflikter till produktiva aktiviteter och främjade fredliga avtalsförhållanden framför militär dominans.
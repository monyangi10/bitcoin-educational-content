question: 技術進歩と機械は、人間社会における社会的支配の基盤をどのように変えたのか？
answer: 体力による支配に終止符を打ち、平和的な交流関係を促進した。
wrong_answers:
  - 彼らは富を強い者に集中させることで伝統的な権力構造を強化した。
  - 天然資源へのアクセスに基づく新たな支配形態を生み出した。
  - 彼らは社会支配の主要な源として軍事的優位を確立した。
explanation: |
  この章では、資本主義とは、技術的進歩によって生産が機械に代替され、社会関係が根本的に変化したものだと説明されている。生産性が筋力よりも知力に依存するようになると、肉体的な力に基づく伝統的な支配は正当性を失った。この変化は特に女性に恩恵をもたらし、機械が身体的な力を必要としなくなり、知的スキルが必要とされるようになったことで、女性の経済的貢献がより評価されるようになった。技術進歩は伝統的な権力構造を強化するどころかむしろ弱体化させ、社会を資源に基づく争いから生産的活動へと向かわせ、軍事的支配よりも平和的な契約関係を促進したのだから、他の選択肢は正しくない。
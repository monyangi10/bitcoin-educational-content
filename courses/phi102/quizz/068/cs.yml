question: Jak technický pokrok a stroje změnily základ sociální nadvlády v lidských společnostech?
answer: Ukončili nadvládu založenou na fyzické síle a podpořili mírové vztahy založené na výměně
wrong_answers:
  - Posílily tradiční mocenské struktury tím, že soustředily bohatství mezi nejsilnějšími
  - Vytvořili nové formy nadvlády založené na přístupu k přírodním zdrojům
  - Zavedli vojenskou převahu jako hlavní zdroj společenské kontroly
explanation: |
  Kapitola vysvětluje, že kapitalismus, definovaný jako technický pokrok nahrazující hrubou sílu ve výrobě stroji, zásadně změnil společenské vztahy. Když produktivita začala záviset více na inteligenci než na svalové síle, tradiční nadvláda založená na fyzické síle ztratila své opodstatnění. Tento posun prospěl zejména ženám, jejichž ekonomický přínos se stal cennějším, protože stroje vyžadovaly méně fyzické síly a více intelektuálních schopností. Ostatní možnosti jsou nesprávné, protože technický pokrok ve skutečnosti spíše oslabil než posílil tradiční mocenské struktury, přesunul společnost od konfliktů založených na zdrojích k produktivním činnostem a podpořil mírové smluvní vztahy namísto vojenské nadvlády.
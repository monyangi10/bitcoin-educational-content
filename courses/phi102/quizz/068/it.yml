question: In che modo il progresso tecnico e le macchine hanno cambiato le basi della dominazione sociale nelle società umane?
answer: Hanno messo fine alla dominazione basata sulla forza fisica e hanno promosso relazioni di scambio pacifiche
wrong_answers:
  - Hanno rafforzato le strutture di potere tradizionali concentrando la ricchezza tra i più forti
  - Hanno creato nuove forme di dominio basate sull'accesso alle risorse naturali
  - Hanno stabilito la superiorità militare come fonte primaria di controllo sociale
explanation: |
  Il capitolo spiega che il capitalismo, definito come il progresso tecnico che sostituisce le macchine alla forza bruta nella produzione, ha trasformato radicalmente le relazioni sociali. Quando la produttività ha iniziato a dipendere più dall'intelligenza che dalla forza muscolare, il dominio tradizionale basato sulla potenza fisica ha perso la sua giustificazione. Di questo cambiamento hanno beneficiato soprattutto le donne, il cui contributo economico è stato valorizzato dal momento che le macchine richiedevano meno forza fisica e più capacità intellettuali. Le altre opzioni non sono corrette, perché il progresso tecnico in realtà ha indebolito piuttosto che rafforzato le strutture di potere tradizionali, ha spostato la società dai conflitti basati sulle risorse alle attività produttive e ha promosso relazioni contrattuali pacifiche rispetto alla dominazione militare.
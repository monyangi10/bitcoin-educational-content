question: Wie haben technischer Fortschritt und Maschinen die Grundlage der sozialen Herrschaft in menschlichen Gesellschaften verändert?
answer: Sie beendeten die auf physischer Stärke beruhende Vorherrschaft und förderten friedliche Austauschbeziehungen
wrong_answers:
  - Sie stärkten die traditionellen Machtstrukturen, indem sie den Wohlstand auf die Stärksten konzentrierten
  - Sie schufen neue Formen der Herrschaft, die auf dem Zugang zu natürlichen Ressourcen beruhten
  - Sie etablierten die militärische Überlegenheit als wichtigste Quelle der sozialen Kontrolle
explanation: |
  In diesem Kapitel wird erläutert, dass der Kapitalismus, definiert als technischer Fortschritt, der Maschinen an die Stelle roher Gewalt in der Produktion setzt, die sozialen Beziehungen grundlegend verändert hat. Als die Produktivität mehr von Intelligenz als von Muskelkraft abhing, verlor die traditionelle, auf körperlicher Kraft basierende Herrschaft ihre Berechtigung. Dieser Wandel kam vor allem den Frauen zugute, deren wirtschaftlicher Beitrag stärker gewürdigt wurde, da die Maschinen weniger Körperkraft und mehr intellektuelle Fähigkeiten erforderten. Die anderen Optionen sind falsch, denn der technische Fortschritt hat die traditionellen Machtstrukturen eher geschwächt als gestärkt, die Gesellschaft von ressourcenbasierten Konflikten weg und hin zu produktiven Tätigkeiten geführt und friedliche vertragliche Beziehungen gegenüber militärischer Vorherrschaft gefördert.
question: Kuidas muutsid tehnika areng ja masinad sotsiaalset domineerimist inimühiskondades?
answer: Nad lõpetasid füüsilisel jõul põhineva domineerimise ja edendasid rahumeelseid vahetussuhteid
wrong_answers:
  - Nad tugevdasid traditsioonilisi võimustruktuure, koondades jõukuse kõige tugevamate hulka
  - Nad lõid uusi domineerimise vorme, mis põhinesid juurdepääsul loodusvaradele
  - Nad kehtestasid sõjalise ülemvõimu kui sotsiaalse kontrolli peamise allika
explanation: |
  Peatükis selgitatakse, et kapitalism, mida määratletakse kui tehnilist progressi, mis asendas tootmises toore jõu masinatega, muutis põhjalikult ühiskondlikke suhteid. Kui tootlikkus hakkas rohkem sõltuma intelligentsusest kui lihasjõust, kaotas traditsiooniline füüsilisel jõul põhinev domineerimine oma õigustuse. See muutus tuli eriti kasuks naistele, kelle majanduslikku panust hakati rohkem hindama, kuna masinad nõudsid vähem füüsilist jõudu ja rohkem intellektuaalseid oskusi. Teised variandid on valed, sest tehniline areng pigem nõrgestas kui tugevdas traditsioonilisi jõustruktuure, viis ühiskonna ressursipõhistelt konfliktidelt tootliku tegevuse suunas ja edendas sõjalise domineerimise asemel rahumeelseid lepingulisi suhteid.
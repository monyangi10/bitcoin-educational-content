question: Maendeleo ya kiufundi na mashine zilibadilishaje msingi wa utawala wa kijamii katika jamii za wanadamu?
answer: Walikomesha utawala kwa msingi wa nguvu za kimwili na kukuza mahusiano ya kubadilishana kwa amani
wrong_answers:
  - Waliimarisha miundo ya nguvu ya jadi kwa kujilimbikizia utajiri miongoni mwa wenye nguvu zaidi
  - Waliunda aina mpya za utawala kulingana na upatikanaji wa maliasili
  - Waliweka ubora wa kijeshi kama chanzo kikuu cha udhibiti wa kijamii
explanation: |
  Sura hiyo inaelezea kwamba ubepari, unaofafanuliwa kama maendeleo ya kiufundi yanayobadilisha mashine badala ya nguvu kali katika uzalishaji, kimsingi ulibadilisha mahusiano ya kijamii. Wakati tija ilipoanza kutegemea zaidi akili kuliko nguvu ya misuli, utawala wa kitamaduni unaotegemea nguvu ya kimwili ulipoteza uhalali wake. Mabadiliko haya yaliwanufaisha wanawake hasa, ambao mchango wao wa kiuchumi ulithaminiwa zaidi kwani mashine zilihitaji nguvu kidogo ya kimwili na ujuzi zaidi wa kiakili. Chaguzi zingine si sahihi kwa sababu maendeleo ya kiufundi yalidhoofisha badala ya kuimarisha miundo ya nguvu ya kitamaduni, yalihamisha jamii mbali na migogoro inayotegemea rasilimali kuelekea shughuli za uzalishaji, na kukuza mahusiano ya amani ya kimkataba kuliko utawala wa kijeshi.
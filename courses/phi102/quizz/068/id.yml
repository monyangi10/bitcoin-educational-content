question: Bagaimana kemajuan teknis dan mesin mengubah dasar dominasi sosial dalam masyarakat manusia?
answer: Mereka mengakhiri dominasi berdasarkan kekuatan fisik dan mempromosikan hubungan pertukaran yang damai
wrong_answers:
  - Mereka memperkuat struktur kekuasaan tradisional dengan memusatkan kekayaan di antara yang terkuat
  - Mereka menciptakan bentuk-bentuk dominasi baru berdasarkan akses terhadap sumber daya alam
  - Mereka membangun superioritas militer sebagai sumber utama kontrol sosial
explanation: |
  Bab ini menjelaskan bahwa kapitalisme, yang didefinisikan sebagai kemajuan teknis yang menggantikan mesin dengan tenaga kasar dalam produksi, secara fundamental mengubah hubungan sosial. Ketika produktivitas mulai lebih bergantung pada kecerdasan daripada kekuatan otot, dominasi tradisional yang didasarkan pada kekuatan fisik kehilangan pembenarannya. Pergeseran ini secara khusus menguntungkan perempuan, yang kontribusi ekonominya menjadi lebih dihargai karena mesin tidak membutuhkan kekuatan fisik dan lebih banyak keterampilan intelektual. Pilihan lain tidak tepat karena kemajuan teknis justru melemahkan dan bukannya memperkuat struktur kekuasaan tradisional, menjauhkan masyarakat dari konflik berbasis sumber daya ke arah kegiatan produktif, dan mendorong hubungan kontrak yang damai daripada dominasi militer.
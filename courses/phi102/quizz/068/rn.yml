question: Ni gute ugutera imbere kw’ubuhinga n’amamashini vyahinduye ishimikiro ry’ubutegetsi bw’abantu mu mibano y’abantu?
answer: Baciye bahagarika ubutegetsi bushingiye ku nkomezi z’umubiri maze barateza imbere ubucuti bw’amahoro bwo guhanahana .
wrong_answers:
  - Bakomeje imiterere y’ubutegetsi ya kera mu gushiramwo ubutunzi mu bakomeye cane .
  - Baciye bashiraho uburyo bushasha bwo kuganza bushingiye ku kuronka ubutunzi bw'ibidukikije .
  - Bashizeho ubusumbasumbane bw’igisirikare nk’isoko nyamukuru y’ubugenzuzi bw’imibano .
explanation: |
  Ico gice kirasigura ko ubu kapitalizimu, busobanurwa nk’iterambere ry’ubuhinga risubirira imashini inguvu z’ubukazi mu guhingura, bwahinduye cane imigenderanire y’abantu. Igihe umusaruro watangura gushingira cane ku bwenge kuruta ku nkomezi z’imitsi, ubutegetsi bwa kera bushingiye ku bubasha bw’umubiri bwaciye butakaza imvo n’imvano. Iryo hinduka ryaragiriye akamaro canecane abagore, kuko umusanzu wabo mu vy’ubutunzi wararushirije guhabwa agaciro kubera ko imashini zasaba inguvu nkeyi z’umubiri be n’ubuhinga bwinshi bwo mu bwenge. Ayandi mahitamwo ntabwo ari meza kubera ko mu vy’ukuri iterambere ry’ubuhinga ryagoyagoya aho gukomeza imibumbe y’ubutegetsi ya kera, ryatumye abantu bava mu ntambara zishingiye ku butunzi baja mu bikorwa vy’inyungu, kandi ryatumye haba imigenderanire y’amasezerano y’amahoro ku bijanye n’ubutegetsi bw’igisirikare.
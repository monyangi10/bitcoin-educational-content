question: Miten tekninen kehitys ja koneet muuttivat yhteiskunnallisen vallan perustan ihmisyhteisöissä?
answer: Ne lopettivat fyysiseen voimaan perustuvan ylivallan ja edistivät rauhanomaisia vaihtosuhteita
wrong_answers:
  - Ne vahvistivat perinteisiä valtarakenteita keskittämällä varallisuuden vahvimmille
  - Ne loivat uusia hallinnan muotoja, jotka perustuivat luonnonvarojen saatavuuteen
  - Ne vakiinnuttivat sotilaallisen ylivoiman ensisijaiseksi sosiaalisen kontrollin lähteeksi
explanation: |
  Luvussa selitetään, että kapitalismi, joka määritellään teknisenä edistyksenä, joka korvaa raa'an voiman koneilla tuotannossa, muutti perusteellisesti sosiaalisia suhteita. Kun tuottavuus alkoi riippua enemmän älykkyydestä kuin lihasvoimasta, perinteinen fyysiseen voimaan perustuva herruus menetti oikeutuksensa. Tämä muutos hyödytti erityisesti naisia, joiden taloudellista panosta arvostettiin enemmän, kun koneet vaativat vähemmän fyysistä voimaa ja enemmän älyllisiä taitoja. Muut vaihtoehdot ovat virheellisiä, koska tekninen kehitys pikemminkin heikensi kuin vahvisti perinteisiä valtarakenteita, siirsi yhteiskunnan pois resursseihin perustuvista konflikteista kohti tuottavaa toimintaa ja edisti rauhanomaisia sopimussuhteita sotilaallisen ylivallan sijaan.
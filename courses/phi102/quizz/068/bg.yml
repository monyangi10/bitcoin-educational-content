question: Как техническият прогрес и машините са променили основите на социалното господство в човешките общества?
answer: Те сложиха край на господството, основано на физическа сила, и насърчиха отношенията на мирен обмен
wrong_answers:
  - Те укрепиха традиционните структури на властта, като концентрираха богатството сред най-силните
  - Те създават нови форми на господство, основани на достъпа до природни ресурси
  - Те утвърждават военното превъзходство като основен източник на социален контрол
explanation: |
  В тази глава се обяснява, че капитализмът, дефиниран като технически прогрес, който замества грубата сила в производството с машини, променя из основи социалните отношения. Когато производителността започва да зависи повече от интелекта, отколкото от мускулната сила, традиционното господство, основано на физическата сила, губи своето оправдание. От тази промяна се възползваха най-вече жените, чийто икономически принос стана по-ценен, тъй като машините изискваха по-малко физическа сила и повече интелектуални умения. Другите варианти са неправилни, тъй като техническият прогрес всъщност отслаби, а не укрепи традиционните структури на властта, премести обществото от конфликти, основани на ресурси, към продуктивни дейности и насърчи мирните договорни отношения вместо военното господство.
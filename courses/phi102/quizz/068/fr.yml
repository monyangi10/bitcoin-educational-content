question: Comment le progrès technique et les machines ont-ils modifié les bases de la domination sociale dans les sociétés humaines ?
answer: Ils ont mis fin à la domination fondée sur la force physique et ont favorisé des relations d'échange pacifiques
wrong_answers:
  - Ils ont renforcé les structures de pouvoir traditionnelles en concentrant les richesses entre les mains des plus forts
  - Ils ont créé de nouvelles formes de domination basées sur l'accès aux ressources naturelles
  - Ils ont établi la supériorité militaire comme principale source de contrôle social
explanation: |
  Le chapitre explique que le capitalisme, défini comme le progrès technique substituant les machines à la force brute dans la production, a fondamentalement transformé les relations sociales. Lorsque la productivité a commencé à dépendre davantage de l'intelligence que de la force musculaire, la domination traditionnelle fondée sur la puissance physique a perdu sa justification. Ce changement a particulièrement profité aux femmes, dont la contribution économique a été davantage valorisée à mesure que les machines exigeaient moins de force physique et plus de compétences intellectuelles. Les autres options sont incorrectes parce que le progrès technique a en fait affaibli plutôt que renforcé les structures de pouvoir traditionnelles, a éloigné la société des conflits fondés sur les ressources au profit d'activités productives et a favorisé les relations contractuelles pacifiques au détriment de la domination militaire.
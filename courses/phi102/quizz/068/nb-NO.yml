question: Hvordan endret tekniske fremskritt og maskiner grunnlaget for sosial dominans i menneskesamfunnene?
answer: De gjorde slutt på dominans basert på fysisk styrke og fremmet fredelige utvekslingsforhold
wrong_answers:
  - De forsterket de tradisjonelle maktstrukturene ved å konsentrere rikdommen blant de sterkeste
  - De skapte nye former for herredømme basert på tilgang til naturressurser
  - De etablerte militær overlegenhet som den primære kilden til sosial kontroll
explanation: |
  Kapitalismen, definert som den tekniske utviklingen som erstattet rå kraft i produksjonen med maskiner, forandret de sosiale relasjonene fundamentalt. Da produktiviteten ble mer avhengig av intelligens enn muskelstyrke, mistet den tradisjonelle dominansen basert på fysisk makt sin berettigelse. Dette skiftet kom særlig kvinnene til gode, hvis økonomiske bidrag ble mer verdsatt ettersom maskinene krevde mindre fysisk kraft og mer intellektuelle ferdigheter. De andre alternativene er feil fordi den tekniske utviklingen snarere svekket enn forsterket tradisjonelle maktstrukturer, flyttet samfunnet fra ressursbaserte konflikter til produktive aktiviteter og fremmet fredelige kontraktsforhold framfor militær dominans.
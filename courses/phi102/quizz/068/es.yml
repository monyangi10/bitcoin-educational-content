question: ¿Cómo modificaron el progreso técnico y las máquinas las bases de la dominación social en las sociedades humanas?
answer: Acabaron con la dominación basada en la fuerza física y fomentaron las relaciones pacíficas de intercambio
wrong_answers:
  - Reforzaron las estructuras de poder tradicionales concentrando la riqueza entre los más fuertes
  - Crearon nuevas formas de dominación basadas en el acceso a los recursos naturales
  - Establecieron la superioridad militar como principal fuente de control social
explanation: |
  El capítulo explica que el capitalismo, definido como el progreso técnico que sustituye la fuerza bruta por máquinas en la producción, transformó fundamentalmente las relaciones sociales. Cuando la productividad empezó a depender más de la inteligencia que de la fuerza muscular, la dominación tradicional basada en el poder físico perdió su justificación. Este cambio benefició especialmente a las mujeres, cuya contribución económica pasó a ser más valorada a medida que las máquinas requerían menos fuerza física y más habilidades intelectuales. Las otras opciones son incorrectas porque, en realidad, el progreso técnico debilitó las estructuras de poder tradicionales en lugar de reforzarlas, alejó a la sociedad de los conflictos basados en los recursos y la orientó hacia actividades productivas, y promovió las relaciones contractuales pacíficas frente a la dominación militar.
question: 技術進步和機器如何改變人類社會的社會支配基礎？
answer: 他們結束了基於體力的統治，並促進了和平的交流關係
wrong_answers:
  - 它們將財富集中在最強大的階層，從而強化了傳統的權力結構。
  - 他們在取得天然資源的基礎上創造了新的統治形式
  - 他們建立了軍事優勢作為社會控制的主要來源
explanation: |
  本章解釋了資本主義（定義為在生產中以機器取代蠻力的技術進步）從根本上改變了社會關係。當生產力開始更多地依賴智慧而非肌肉力量時，傳統以體力為基礎的統治就失去了合理性。這一轉變對婦女特別有利，因為機器對體力的要求降低，而對智力的要求提高，婦女的經濟貢獻變得更有價值。其他選項都是錯誤的，因為技術進步實際上削弱而不是強化了傳統的權力結構，使社會從以資源為基礎的衝突轉向生產活動，並促進和平的合約關係而非軍事統治。
question: Como é que o progresso técnico e as máquinas alteraram a base da dominação social nas sociedades humanas?
answer: Acabaram com a dominação baseada na força física e promoveram relações de intercâmbio pacíficas
wrong_answers:
  - Reforçaram as estruturas tradicionais de poder, concentrando a riqueza entre os mais fortes
  - Criaram novas formas de dominação baseadas no acesso aos recursos naturais
  - Estabeleceram a superioridade militar como a principal fonte de controlo social
explanation: |
  O capítulo explica que o capitalismo, definido como o progresso técnico que substitui a força bruta na produção por máquinas, transformou fundamentalmente as relações sociais. Quando a produtividade passou a depender mais da inteligência do que da força muscular, a dominação tradicional baseada na força física perdeu a sua justificação. Esta mudança beneficiou particularmente as mulheres, cuja contribuição económica passou a ser mais valorizada, uma vez que as máquinas exigiam menos força física e mais capacidades intelectuais. As outras opções estão incorrectas porque o progresso técnico enfraqueceu, em vez de reforçar, as estruturas de poder tradicionais, afastou a sociedade dos conflitos baseados nos recursos e orientou-a para actividades produtivas e promoveu relações contratuais pacíficas em detrimento do domínio militar.
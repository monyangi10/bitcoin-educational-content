question: Hoe veranderden technische vooruitgang en machines de basis van sociale overheersing in menselijke samenlevingen?
answer: Ze maakten een einde aan overheersing op basis van fysieke kracht en bevorderden vreedzame uitwisselingsrelaties
wrong_answers:
  - Ze versterkten de traditionele machtsstructuren door de rijkdom te concentreren bij de sterksten
  - Ze creëerden nieuwe vormen van overheersing gebaseerd op toegang tot natuurlijke hulpbronnen
  - Ze vestigden militaire superioriteit als de primaire bron van sociale controle
explanation: |
  Het hoofdstuk legt uit dat het kapitalisme, gedefinieerd als technische vooruitgang die machines vervangt door brute kracht in de productie, de sociale relaties fundamenteel veranderde. Toen de productiviteit meer afhankelijk werd van intelligentie dan van spierkracht, verloor de traditionele overheersing op basis van fysieke kracht haar rechtvaardiging. Deze verschuiving kwam vooral ten goede aan vrouwen, wier economische bijdrage meer gewaardeerd werd naarmate machines minder fysieke kracht en meer intellectuele vaardigheden vereisten. De andere opties zijn onjuist omdat de technische vooruitgang de traditionele machtsstructuren eerder verzwakte dan versterkte, de samenleving verplaatste van conflicten op basis van grondstoffen naar productieve activiteiten en vreedzame contractuele relaties bevorderde in plaats van militaire overheersing.
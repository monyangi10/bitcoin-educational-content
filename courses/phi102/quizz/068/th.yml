question: ความก้าวหน้าทางเทคนิคและเครื่องจักรเปลี่ยนแปลงพื้นฐานของการครอบงำทางสังคมในสังคมมนุษย์อย่างไร?
answer: พวกเขายุติการครอบงำที่อิงจากพละกำลังทางกายภาพและส่งเสริมความสัมพันธ์แลกเปลี่ยนอย่างสันติ
wrong_answers:
  - พวกเขาเสริมสร้างโครงสร้างอำนาจแบบดั้งเดิมโดยการรวมความมั่งคั่งไว้กับผู้ที่แข็งแกร่งที่สุด
  - พวกเขาสร้างรูปแบบการครอบงำใหม่โดยอิงจากการเข้าถึงทรัพยากรธรรมชาติ
  - พวกเขาได้สร้างความเหนือกว่าทางทหารเป็นแหล่งหลักของการควบคุมทางสังคม
explanation: |
  บทนี้อธิบายว่าทุนนิยม ซึ่งนิยามว่าเป็นความก้าวหน้าทางเทคนิคที่ใช้เครื่องจักรแทนแรงกายในการผลิต ได้เปลี่ยนแปลงความสัมพันธ์ทางสังคมอย่างพื้นฐาน เมื่อผลิตภาพเริ่มพึ่งพาสติปัญญามากกว่าแรงกาย การครอบงำแบบดั้งเดิมที่อิงกับพลังทางกายภาพจึงสูญเสียความชอบธรรม การเปลี่ยนแปลงนี้เป็นประโยชน์ต่อผู้หญิงเป็นพิเศษ เนื่องจากการมีส่วนร่วมทางเศรษฐกิจของพวกเธอได้รับการยอมรับมากขึ้นเมื่อเครื่องจักรต้องการแรงกายน้อยลงและทักษะทางปัญญามากขึ้น ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะความก้าวหน้าทางเทคนิคได้ทำให้โครงสร้างอำนาจแบบดั้งเดิมอ่อนแอลงแทนที่จะเสริมสร้างมัน เคลื่อนย้ายสังคมออกจากความขัดแย้งที่อิงกับทรัพยากรไปสู่กิจกรรมการผลิต และส่งเสริมความสัมพันธ์ทางสัญญาที่สงบสุขมากกว่าการครอบงำทางทหาร
question: 기술 발전과 기계는 인류 사회에서 사회 지배의 기반을 어떻게 변화시켰나요?
answer: 물리적 힘에 기반한 지배를 종식하고 평화로운 교류 관계를 촉진했습니다
wrong_answers:
  - 그들은 가장 강한 자에게 부를 집중시킴으로써 전통적인 권력 구조를 강화했습니다
  - 천연 자원에 대한 접근성을 기반으로 새로운 형태의 지배를 창출했습니다
  - 그들은 군사적 우월성을 사회 통제의 주요 원천으로 확립했습니다
explanation: |
  이 장에서는 생산에서 무력을 기계로 대체하는 기술 발전으로 정의되는 자본주의가 사회 관계를 근본적으로 변화시켰다고 설명합니다. 생산성이 근력보다 지능에 더 많이 의존하기 시작하면서 물리적 힘에 기반한 전통적인 지배는 그 정당성을 잃었습니다. 이러한 변화는 특히 여성에게 유리하게 작용했는데, 기계가 육체적 힘을 덜 필요로 하고 지적 능력을 더 많이 요구하면서 여성의 경제적 기여가 더욱 중요해졌기 때문입니다. 다른 선택지는 기술 발전이 전통적인 권력 구조를 강화하기보다는 오히려 약화시켰고, 사회를 자원 기반 갈등에서 생산적 활동으로 전환했으며, 군사적 지배보다 평화적 계약 관계를 촉진했기 때문에 틀린 선택지입니다.
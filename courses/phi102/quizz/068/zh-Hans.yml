question: 技术进步和机器是如何改变人类社会统治基础的？
answer: 他们结束了以体力为基础的统治，促进了和平的交流关系
wrong_answers:
  - 它们将财富集中在最强大的群体中，从而强化了传统的权力结构
  - 他们在获取自然资源的基础上创造了新的统治形式
  - 他们将军事优势确立为社会控制的主要来源
explanation: |
  该章解释说，资本主义是指在生产中用机器代替蛮力的技术进步，它从根本上改变了社会关系。当生产力开始更多地依赖智力而非肌肉力量时，传统的基于体力的统治就失去了合理性。这种转变尤其使妇女受益，因为机器对体力的要求更低，而对智力的要求更高，因此妇女的经济贡献更受重视。其他选项都是错误的，因为技术进步实际上削弱而不是加强了传统的权力结构，使社会从基于资源的冲突转向生产活动，并促进了和平的契约关系而不是军事统治。
question: Kako su tehnički napredak i mašine promenili osnovu društvene dominacije u ljudskim društvima?
answer: Oni su okončali dominaciju zasnovanu na fizičkoj snazi i promovisali mirne odnose razmene.
wrong_answers:
  - Oni su ojačali tradicionalne strukture moći koncentrisanjem bogatstva među najjačima.
  - Oni su stvorili nove oblike dominacije zasnovane na pristupu prirodnim resursima
  - Usvojili su vojnu nadmoć kao primarni izvor društvene kontrole
explanation: |
  Poglavlje objašnjava da je kapitalizam, definisan kao tehnički napredak koji zamenjuje mašine za fizičku snagu u proizvodnji, fundamentalno transformisao društvene odnose. Kada je produktivnost počela više zavisiti od inteligencije nego od mišićne snage, tradicionalna dominacija zasnovana na fizičkoj moći izgubila je svoje opravdanje. Ova promena je posebno koristila ženama, čiji je ekonomski doprinos postao vredniji jer su mašine zahtevale manje fizičke snage, a više intelektualnih veština. Ostale opcije su netačne jer je tehnički napredak zapravo oslabio, a ne ojačao tradicionalne strukture moći, pomerio društvo od sukoba zasnovanih na resursima ka produktivnim aktivnostima i promovisao mirne ugovorne odnose nad vojnom dominacijom.
question: W jaki sposób postęp techniczny i maszyny zmieniły podstawy dominacji społecznej w społeczeństwach ludzkich?
answer: Zakończyli dominację opartą na sile fizycznej i promowali pokojowe relacje wymiany
wrong_answers:
  - Wzmocniły one tradycyjne struktury władzy, koncentrując bogactwo wśród najsilniejszych
  - Stworzyli nowe formy dominacji oparte na dostępie do zasobów naturalnych
  - Ustanowili przewagę militarną jako główne źródło kontroli społecznej
explanation: |
  Rozdział ten wyjaśnia, że kapitalizm, definiowany jako postęp techniczny zastępujący maszyny brutalną siłą w produkcji, zasadniczo przekształcił stosunki społeczne. Kiedy produktywność zaczęła bardziej zależeć od inteligencji niż siły mięśni, tradycyjna dominacja oparta na sile fizycznej straciła swoje uzasadnienie. Zmiana ta przyniosła szczególne korzyści kobietom, których wkład ekonomiczny stał się bardziej ceniony, ponieważ maszyny wymagały mniej siły fizycznej, a więcej umiejętności intelektualnych. Pozostałe opcje są błędne, ponieważ postęp techniczny w rzeczywistości osłabił, a nie wzmocnił tradycyjne struktury władzy, przesunął społeczeństwo z konfliktów opartych na zasobach w kierunku produktywnych działań i promował pokojowe relacje umowne zamiast dominacji wojskowej.
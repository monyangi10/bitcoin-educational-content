question: Как технический прогресс и машины изменили основы социального господства в человеческих обществах?
answer: Они положили конец господству, основанному на физической силе, и способствовали развитию отношений мирного обмена
wrong_answers:
  - Они укрепляли традиционные структуры власти, концентрируя богатство среди сильнейших
  - Они создали новые формы господства, основанные на доступе к природным ресурсам
  - Они утвердили военное превосходство в качестве основного источника социального контроля
explanation: |
  В главе объясняется, что капитализм, определяемый как технический прогресс, заменивший в производстве грубую силу машинами, коренным образом изменил общественные отношения. Когда производительность труда стала в большей степени зависеть от интеллекта, а не от мускульной силы, традиционное господство, основанное на физической силе, потеряло свое оправдание. От этого сдвига особенно выиграли женщины, чей экономический вклад стал цениться больше, поскольку машины требовали меньше физической силы и больше интеллектуальных навыков. Остальные варианты неверны, поскольку технический прогресс на самом деле ослабил, а не укрепил традиционные структуры власти, перевел общество от конфликтов, основанных на использовании ресурсов, к продуктивной деятельности и способствовал развитию мирных договорных отношений вместо военного господства.
question: How did technical progress and machines change the basis of social domination in human societies?
answer: They ended domination based on physical strength and promoted peaceful exchange relationships
wrong_answers:
  - They reinforced traditional power structures by concentrating wealth among the strongest
  - They created new forms of domination based on access to natural resources
  - They established military superiority as the primary source of social control
explanation: |
  The chapter explains that capitalism, defined as technical progress substituting machines for brute force in production, fundamentally transformed social relations. When productivity began depending more on intelligence than muscular strength, traditional domination based on physical power lost its justification. This shift particularly benefited women, whose economic contribution became more valued as machines required less physical force and more intellectual skills. The other options are incorrect because technical progress actually weakened rather than reinforced traditional power structures, moved society away from resource-based conflicts toward productive activities, and promoted peaceful contractual relationships over military domination.

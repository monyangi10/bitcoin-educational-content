question: Sự tiến bộ kỹ thuật và máy móc đã thay đổi nền tảng của sự thống trị xã hội trong xã hội loài người như thế nào?
answer: Họ đã chấm dứt sự thống trị dựa trên sức mạnh thể chất và thúc đẩy các mối quan hệ giao lưu hòa bình.
wrong_answers:
  - Họ củng cố các cấu trúc quyền lực truyền thống bằng cách tập trung của cải vào tay những người mạnh nhất.
  - Họ đã tạo ra những hình thức thống trị mới dựa trên quyền tiếp cận tài nguyên thiên nhiên.
  - Họ thiết lập ưu thế quân sự như là nguồn lực chính để kiểm soát xã hội.
explanation: |
  Chương này giải thích rằng chủ nghĩa tư bản, được định nghĩa là sự tiến bộ kỹ thuật thay thế sức lao động thô sơ bằng máy móc trong sản xuất, đã làm thay đổi căn bản các mối quan hệ xã hội. Khi năng suất bắt đầu phụ thuộc nhiều hơn vào trí tuệ hơn là sức mạnh cơ bắp, sự thống trị truyền thống dựa trên sức mạnh thể chất đã mất đi tính chính đáng. Sự thay đổi này đặc biệt có lợi cho phụ nữ, những người có đóng góp kinh tế được đánh giá cao hơn khi máy móc đòi hỏi ít sức lao động thể chất hơn và nhiều kỹ năng trí tuệ hơn. Các lựa chọn khác không chính xác vì sự tiến bộ kỹ thuật thực sự làm suy yếu chứ không phải củng cố các cấu trúc quyền lực truyền thống, đưa xã hội chuyển từ các xung đột dựa trên tài nguyên sang các hoạt động sản xuất và thúc đẩy các mối quan hệ hợp đồng hòa bình hơn là sự thống trị quân sự.
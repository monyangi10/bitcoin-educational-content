question: Z jakého základního předpokladu vychází přístup systému veřejného opatrovnictví k prevenci potenciálně škodlivých individuálních činů?
answer: Občané jsou ze své podstaty neschopní samosprávy a potřebují preventivní vedení, aby se vyhnuli nesprávným rozhodnutím
wrong_answers:
  - Individuální práva musí být vyvážena kolektivní bezpečností prostřednictvím demokratického konsensu a vlády většiny
  - Škodlivé činy občanů v minulosti ukazují, že je třeba spíše reaktivních trestů než preventivních opatření
  - Selhání ekonomického trhu dokazují, že k nápravě systematických chyb v rozhodování je nutný politický zásah
explanation: |
  V textu se výslovně uvádí, že veřejná péče "spočívá na jasném postulátu: le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles" Tento předpoklad základní neschopnosti vede k upřednostnění předvídání a rámce před represí skutečných porušení. Ostatní možnosti zkreslují logiku systému poručnictví tím, že se zaměřují na demokratickou rovnováhu, reaktivní přístupy nebo ekonomické zdůvodnění, a nikoli na základní předpoklad vrozené neschopnosti občanů.
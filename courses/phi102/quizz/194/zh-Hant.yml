question: 公共監督系統預防可能有害的個人行為的方法是基於什麼基本假設？
answer: 公民天生無法自我治理，需要先發制人的指導，以避免做出不當的選擇
wrong_answers:
  - 個人權利與集體安全必須透過民主共識與多數統治取得平衡
  - 公民過往的有害行為顯示，有必要採取被動的懲罰，而非預防措施
  - 經濟市場失效證明政治干預是必要的，以糾正系統性的決策錯誤
explanation: |
  案文中明確指出，公共管教「依據一個簡單的假設：公民根本上無法自導自演，因此需要一個總的方向，以預防的方式，避免潛在的滋擾行為」。這種根本無能力的假設，驅使人們傾向於預測和框架，而非鎮壓實際的違法行為。其他選項歪曲了監護制度的邏輯，它們著重於民主平衡、反應式方法或經濟理由，而非公民固有無能力的核心假設。
question: Jakie fundamentalne założenie leży u podstaw podejścia systemu publicznego nadzoru do zapobiegania potencjalnie szkodliwym czynom indywidualnym?
answer: Obywatele są z natury niezdolni do samozarządzania i potrzebują wskazówek zapobiegawczych, aby uniknąć dokonywania niewłaściwych wyborów
wrong_answers:
  - Prawa jednostki muszą być zrównoważone z bezpieczeństwem zbiorowym poprzez demokratyczny konsensus i rządy większości
  - Wcześniejsze szkodliwe działania obywateli wskazują na potrzebę reaktywnego karania, a nie środków zapobiegawczych
  - Niedoskonałości rynku ekonomicznego dowodzą, że interwencja polityczna jest konieczna do skorygowania systematycznych błędów decyzyjnych
explanation: |
  W tekście wyraźnie stwierdzono, że opieka publiczna "opiera się na postulacie précis: le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles" To założenie o fundamentalnej niezdolności prowadzi do preferowania przewidywania i ram nad represjonowaniem rzeczywistych naruszeń. Pozostałe opcje błędnie przedstawiają logikę systemu kurateli, koncentrując się na równowadze demokratycznej, podejściach reaktywnych lub uzasadnieniach ekonomicznych, a nie na podstawowym założeniu o nieodłącznej niezdolności obywateli.
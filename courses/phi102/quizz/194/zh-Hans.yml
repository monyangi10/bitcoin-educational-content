question: 公共监护制度在预防可能有害的个人行为方面所依据的基本假设是什么？
answer: 公民本质上不具备自治能力，需要先发制人的指导，以避免做出不当选择
wrong_answers:
  - 必须通过民主共识和多数决制，在个人权利与集体安全之间取得平衡
  - 公民过去的有害行为表明，有必要采取被动的惩罚措施，而不是预防措施
  - 经济市场失灵证明有必要进行政治干预，以纠正系统性决策失误
explanation: |
  该文本明确指出，公共监护 "依赖于一个简单的假设：公民从根本上没有能力自己管理自己，因此需要一个总的指导，通过预防来避免潜在的滋扰行为"。这种根本无能力的假设促使人们更倾向于预测和框架，而不是镇压实际的侵权行为。其他方案则歪曲了监护制度的逻辑，将重点放在民主平衡、被动应对或经济理由上，而不是公民固有能力这一核心假设上。
question: Hvilken grunnleggende antakelse ligger til grunn for det offentlige formyndersystemets tilnærming til forebygging av potensielt skadelige individuelle handlinger?
answer: Borgerne er iboende ute av stand til å styre seg selv og trenger forebyggende veiledning for å unngå å ta feilaktige valg
wrong_answers:
  - Individuelle rettigheter må balanseres mot kollektiv sikkerhet gjennom demokratisk konsensus og flertallsstyre
  - Tidligere skadelige handlinger utført av borgere viser at det er behov for reaktive straffetiltak snarere enn forebyggende tiltak
  - Økonomisk markedssvikt viser at politisk inngripen er nødvendig for å korrigere systematiske beslutningsfeil
explanation: |
  Teksten slår eksplisitt fast at offentlig formynderi "repose sur un postulat précis : le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles" Denne antakelsen om grunnleggende inkompetanse ligger til grunn for at man foretrekker foregripelse og rammeverk fremfor represjon av faktiske krenkelser. De andre alternativene gir en feilaktig fremstilling av formyndersystemets logikk ved å fokusere på demokratisk balanse, reaktive tilnærminger eller økonomiske begrunnelser i stedet for den grunnleggende antakelsen om borgernes iboende udugelighet.
question: چه فرض اساسی در رویکرد سیستم سرپرستی عمومی برای جلوگیری از اعمال فردی بالقوه مضر وجود دارد؟
answer: شهروندان ذاتاً ناتوان از خودگردانی هستند و نیاز به راهنمایی پیشگیرانه دارند تا از انجام انتخاب‌های نادرست جلوگیری کنند.
wrong_answers:
  - حقوق فردی باید از طریق اجماع دموکراتیک و حاکمیت اکثریت با امنیت جمعی متعادل شوند.
  - اعمال مضر گذشته توسط شهروندان نیاز به مجازات واکنشی را به جای اقدامات پیشگیرانه نشان می‌دهد.
  - شکست‌های بازار اقتصادی نشان می‌دهند که مداخله سیاسی برای اصلاح خطاهای سیستماتیک در تصمیم‌گیری ضروری است.
explanation: |
  متن به‌طور صریح بیان می‌کند که قیمومیت عمومی 'بر یک فرضیه دقیق استوار است: شهروند اساساً ناتوان از هدایت خود است و نیاز به یک هدایت کلی دارد تا با پیشگیری، از اعمال بالقوه مضر جلوگیری کند.' این فرضیه ناتوانی بنیادی، ترجیح به پیش‌بینی و چارچوب‌بندی را بر سرکوب نقض‌های واقعی هدایت می‌کند. گزینه‌های دیگر منطق سیستم قیمومیت را با تمرکز بر تعادل دموکراتیک، رویکردهای واکنشی، یا توجیهات اقتصادی به‌جای فرضیه اصلی ناتوانی ذاتی شهروند، نادرست نشان می‌دهند.
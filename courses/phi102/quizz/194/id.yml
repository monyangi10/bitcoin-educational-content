question: Asumsi dasar apa yang mendasari pendekatan sistem pengawasan publik untuk mencegah tindakan individu yang berpotensi membahayakan?
answer: Warga negara pada dasarnya tidak mampu mengatur dirinya sendiri dan membutuhkan panduan untuk menghindari pengambilan keputusan yang tidak tepat
wrong_answers:
  - Hak-hak individu harus diseimbangkan dengan keamanan kolektif melalui konsensus demokratis dan aturan mayoritas
  - Tindakan berbahaya di masa lalu oleh warga negara menunjukkan perlunya hukuman reaktif daripada tindakan pencegahan
  - Kegagalan pasar ekonomi membuktikan bahwa intervensi politik diperlukan untuk memperbaiki kesalahan pengambilan keputusan yang sistematis
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa pengawasan publik 'bertumpu pada sebuah postulat yang sudah pasti: warga negara pada dasarnya tidak mampu untuk melakukan sendiri dan membutuhkan sebuah arahan umum untuk menghindari, dengan pencegahan, tindakan-tindakan yang berpotensi menimbulkan masalah' Asumsi ketidakmampuan mendasar ini mendorong preferensi untuk antisipasi dan kerangka kerja di atas penindasan terhadap pelanggaran yang sebenarnya. Pilihan-pilihan lain salah mengartikan logika sistem pengawasan dengan berfokus pada keseimbangan demokratis, pendekatan reaktif, atau pembenaran ekonomi, bukan pada asumsi utama ketidakmampuan warga negara yang melekat.
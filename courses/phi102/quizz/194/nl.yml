question: Welke fundamentele aanname ligt ten grondslag aan de aanpak van het publieke voogdijsysteem om potentieel schadelijke individuele handelingen te voorkomen?
answer: Burgers zijn inherent niet in staat tot zelfbestuur en hebben preventieve begeleiding nodig om te voorkomen dat ze verkeerde keuzes maken
wrong_answers:
  - Individuele rechten moeten worden afgewogen tegen collectieve veiligheid door middel van democratische consensus en meerderheidsregel
  - Schadelijke daden van burgers in het verleden tonen de noodzaak aan van reactieve straffen in plaats van preventieve maatregelen
  - Economisch falen van de markt bewijst dat politiek ingrijpen nodig is om systematische fouten in de besluitvorming te corrigeren
explanation: |
  De tekst stelt expliciet dat publieke voogdij "berust op een précis postulat : le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles Deze aanname van fundamenteel onvermogen is de drijfveer achter de voorkeur voor anticipatie en omkadering boven repressie van daadwerkelijke schendingen. De andere opties geven een verkeerd beeld van de logica van het voogdijsysteem door zich te richten op democratisch evenwicht, reactieve benaderingen of economische rechtvaardigingen in plaats van de kernaanname van inherent onvermogen van burgers.
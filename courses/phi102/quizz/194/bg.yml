question: Кое фундаментално допускане лежи в основата на подхода на системата за обществено попечителство към предотвратяването на потенциално вредни индивидуални действия?
answer: Гражданите са неспособни да се самоуправляват и се нуждаят от изпреварващи напътствия, за да избегнат вземането на неправилни решения
wrong_answers:
  - Индивидуалните права трябва да бъдат балансирани с колективната сигурност чрез демократичен консенсус и управление на мнозинството
  - Вредните действия на гражданите в миналото показват необходимостта от реактивно наказание, а не от превантивни мерки
  - Икономическите пазарни неуспехи доказват, че е необходима политическа намеса, за да се коригират системните грешки при вземането на решения
explanation: |
  В текста изрично се посочва, че общественото попечителство "се основава на един прост постулат: le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles" Това допускане за фундаментална неспособност води до предпочитане на предвиждането и рамката пред репресията на действителните нарушения. Другите варианти представят погрешно логиката на системата за попечителство, като акцентират върху демократичния баланс, реактивните подходи или икономическите обосновки, а не върху основното допускане за присъщата неспособност на гражданите.
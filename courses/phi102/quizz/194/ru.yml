question: Какое фундаментальное предположение лежит в основе подхода системы общественной опеки к предотвращению потенциально опасных индивидуальных действий?
answer: Граждане по своей природе неспособны к самоуправлению и нуждаются в упреждающем руководстве, чтобы избежать неправильного выбора
wrong_answers:
  - Индивидуальные права должны быть сбалансированы с коллективной безопасностью посредством демократического консенсуса и правления большинства
  - Прошлые вредные действия граждан свидетельствуют о необходимости применения реактивных, а не превентивных мер наказания
  - Провалы экономического рынка доказывают, что политическое вмешательство необходимо для исправления систематических ошибок в принятии решений
explanation: |
  В тексте прямо говорится, что государственная опека "опирается на четкий постулат: гражданин в основе своей неспособен управлять собой и нуждается в общем руководстве, чтобы предотвратить, путем профилактики, потенциально опасные действия" Это предположение об основополагающей неспособности определяет предпочтение предвосхищения и рамочного подхода перед репрессиями в отношении фактических нарушений. Другие варианты искажают логику системы опеки, фокусируясь на демократическом балансе, реактивных подходах или экономических обоснованиях, а не на основном предположении о врожденной недееспособности граждан.
question: Ni dhana gani ya msingi inayoongoza mbinu ya mfumo wa ulezi wa umma ya kuzuia vitendo vinavyoweza kuwa na madhara kwa watu binafsi?
answer: Raia kwa asili hawawezi kujitawala na wanahitaji mwongozo wa kuzuia ili kuepuka kufanya maamuzi yasiyofaa
wrong_answers:
  - Haki za mtu binafsi lazima zilingane dhidi ya usalama wa pamoja kupitia makubaliano ya kidemokrasia na utawala wa wengi
  - Vitendo vya zamani vya madhara vilivyofanywa na raia vinaonyesha hitaji la adhabu ya haraka badala ya hatua za kuzuia
  - Kushindwa kwa soko la kiuchumi kunathibitisha kwamba uingiliaji kati wa kisiasa ni muhimu ili kurekebisha makosa ya kimfumo ya kufanya maamuzi
explanation: |
  Maandishi yanasema kwa uwazi kwamba ufundishaji wa umma 'repose sur un postulat précis : le citoyen serait fondamentalement incapable de se conduire lui-même et necessiterait une direction générale pour éviter, par prévention, les acts potentiblesement null.' Dhana hii ya kutokuwa na uwezo wa kimsingi inasukuma upendeleo wa kutarajia na mfumo juu ya ukandamizaji wa ukiukaji halisi. Chaguzi zingine zinawakilisha vibaya mantiki ya mfumo wa ufundishaji kwa kuzingatia usawa wa kidemokrasia, mbinu tendaji, au uhalali wa kiuchumi badala ya dhana ya kimsingi ya kutokuwa na uwezo wa raia.
question: Ni iciyumviro ikihe c’ishimikiro gishingiye ku buryo uburyo bwo kurera abantu bose bukoresha mu gukingira ibikorwa vy’umuntu ku giti ciwe bishobora gutera ingorane?
answer: Abanyagihugu ntibashobora kwitegeka kandi basaba ubuyobozi bubanza kugira ngo ntibahitemwo nabi .
wrong_answers:
  - Uburenganzira bw'umuntu ku giti ciwe butegerezwa guhuzwa n'umutekano rusangi biciye mu kwumvikana kwa demokarasi no ku butegetsi bw'abantu benshi .
  - Ibikorwa bibi vya kera vyakozwe n'abanyagihugu vyerekana ko bikenewe guhanwa aho gufata ingingo zo kwirinda .
  - Isoko ry'ubutunzi ridakora neza ryerekana ko politike igira ico ikoze kugira ngo ikosore amakosa atunganijwe mu gufata ingingo .
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko uburezi bwa bose 'bushingiye ku ciyumviro nyaco: uwo muntu ni ikintu c'ishimikiro kidashobora kuyobora ubuzima kandi gikeneye uburongozi rusangi kugira ngo, kugira ngo umuntu yikingire, ibikorwa bishobora gutera ingorane.' Ivyo vyiyumviro vy’ubumuga bw’ishimikiro bituma abantu bakunda kwitega n’ugushinga intahe kuruta guhagarika ivyaha vy’ukuri. Ayandi mahitamwo agaragaza nabi ivyiyumviro vy’uburyo bwo kurera mu kwibanda ku buringanire bwa demokarasi, uburyo bwo gusubiza, canke imvo z’ubutunzi aho kwibanda ku ciyumviro nyamukuru c’ubugoyagoye bw’abanyagihugu.
question: Quelle hypothèse fondamentale sous-tend l'approche du système de tutelle publique pour prévenir les actes individuels potentiellement nuisibles ?
answer: Les citoyens sont intrinsèquement incapables de s'autogouverner et ont besoin de conseils préventifs pour éviter de faire de mauvais choix
wrong_answers:
  - Les droits individuels doivent être mis en balance avec la sécurité collective par le biais du consensus démocratique et de la règle de la majorité
  - Les actes préjudiciables commis par le passé par des citoyens démontrent la nécessité de sanctions réactives plutôt que de mesures préventives
  - Les échecs économiques du marché prouvent que l'intervention politique est nécessaire pour corriger les erreurs systématiques de prise de décision
explanation: |
  Le texte indique explicitement que la tutelle publique "repose sur un postulat précis : le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement nuisibles". Ce postulat d'incapacité fondamentale conduit à préférer l'anticipation et l'encadrement à la répression des violations effectives. Les autres options dénaturent la logique du système de tutelle en mettant l'accent sur l'équilibre démocratique, les approches réactives ou les justifications économiques plutôt que sur l'hypothèse fondamentale de l'incapacité inhérente du citoyen.

question: Mikä perusolettamus on julkisen holhousjärjestelmän lähestymistavan taustalla, kun pyritään ehkäisemään mahdollisesti haitallisia yksittäisiä tekoja?
answer: Kansalaiset ovat luonnostaan kykenemättömiä itsehallintoon ja tarvitsevat ennaltaehkäisevää ohjausta, jotta he eivät tekisi vääriä valintoja
wrong_answers:
  - Yksilön oikeudet ja kollektiivinen turvallisuus on sovitettava yhteen demokraattisen konsensuksen ja enemmistösäännön avulla
  - Kansalaisten aiemmat vahingolliset teot osoittavat, että ennaltaehkäisevien toimenpiteiden sijaan tarvitaan reaktiivisia rangaistuksia
  - Taloudelliset markkinahäiriöt osoittavat, että poliittinen puuttuminen on välttämätöntä järjestelmällisten päätöksentekovirheiden korjaamiseksi
explanation: |
  Tekstissä todetaan nimenomaisesti, että julkinen holhoustoimi "perustuu yhteen periaatteelliseen lähtökohtaan: le citoyen serait fondamentalement incapable de se conduire lui-même et nécessiterait une direction générale pour éviter, par prévention, les actes potentiellement harmisibles" Tämä olettamus perustavanlaatuisesta kyvyttömyydestä johtaa siihen, että ennakointia ja puitteita suositaan todellisten rikkomusten tukahduttamisen sijasta. Muut vaihtoehdot vääristelevät holhousjärjestelmän logiikkaa keskittymällä demokraattiseen tasapainoon, reaktiivisiin lähestymistapoihin tai taloudellisiin perusteluihin sen sijaan, että keskityttäisiin perusolettamukseen kansalaisten luontaisesta kyvyttömyydestä.
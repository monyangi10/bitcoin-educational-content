question: 史前社会实行集体所有制而非私有财产的主要原因是什么？
answer: 物质条件的限制要求游牧生活方式和广阔的狩猎和采集活动地域
wrong_answers:
  - 宗教信仰规定，所有财产应由部落成员平等分享
  - 政治领导人实行集体所有制，以保持对民众的控制
  - 道德原则强调社区团结而非个人物质积累
explanation: |
  该章指出，史前社会的集体所有制并非出于意识形态或偏好，而是出于实际需要。狩猎野牛等活动需要在广阔的地域内游牧，因此不可能在狭小的封闭区域内建立私人土地所有权。生存的物质限制--狩猎、捕鱼和采集需要广阔的空间--使得集体财产成为对环境条件的理性适应，而不是有意识的意识形态选择。
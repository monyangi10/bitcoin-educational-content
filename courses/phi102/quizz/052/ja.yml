question: 先史時代の社会が私有財産ではなく、集団所有を実践していた主な理由は何か？
answer: 物質的な制約から、遊牧生活と狩猟採集活動のための広大な領土が必要とされた。
wrong_answers:
  - 宗教的信念により、すべての財産は部族のメンバー間で平等に共有されるべきとされた。
  - 政治指導者たちは集団所有権を押し付け、住民の支配を維持した。
  - 道徳的原則は、個人の物質的蓄積よりも共同体の連帯を重視した
explanation: |
  この章によれば、有史以前の社会における集団所有は、イデオロギーや好みによってではなく、現実的な必要性によって推進された。バイソン狩猟のような活動には、広大なテリトリーを移動する遊牧が必要であり、閉鎖された小さな土地に私的な土地所有権を確立することは不可能であった。狩猟、漁労、採集のために広い土地が必要という生存のための物質的な制約が、集団所有を意識的なイデオロギー的選択ではなく、環境条件への合理的な適応としたのである。
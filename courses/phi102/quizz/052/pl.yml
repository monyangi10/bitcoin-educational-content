question: Jaki był główny powód, dla którego prehistoryczne społeczeństwa praktykowały kolektywną własność zamiast własności prywatnej?
answer: Ograniczenia materialne wymagały koczowniczego trybu życia i rozległych terytoriów do polowań i zbieractwa
wrong_answers:
  - Przekonania religijne nakazywały, by cały majątek był równo dzielony między członków plemienia
  - Przywódcy polityczni narzucili kolektywną własność, aby utrzymać kontrolę nad ludnością
  - Zasady moralne kładły nacisk na solidarność społeczną ponad indywidualną akumulację materialną
explanation: |
  Według tego rozdziału, kolektywna własność w prehistorycznych społeczeństwach nie była napędzana ideologią lub preferencjami, ale praktyczną koniecznością. Działania takie jak polowanie na żubry wymagały koczowniczego przemieszczania się po rozległych terytoriach, co uniemożliwiało ustanowienie prywatnej własności ziemi na małych, zamkniętych obszarach. Materialne ograniczenia przetrwania - potrzeba dużych przestrzeni do polowania, łowienia ryb i zbieractwa - sprawiły, że własność zbiorowa była racjonalną adaptacją do warunków środowiskowych, a nie świadomym wyborem ideologicznym.
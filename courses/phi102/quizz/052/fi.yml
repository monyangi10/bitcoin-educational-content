question: Mikä oli tärkein syy siihen, että esihistoriallisissa yhteiskunnissa käytettiin kollektiivista omistusta yksityisomistuksen sijasta?
answer: Aineelliset rajoitteet edellyttivät nomadista elämäntapaa ja laajoja alueita metsästys- ja keräilytoimintaa varten
wrong_answers:
  - Uskonnollinen vakaumus määräsi, että kaikki omaisuus jaetaan tasan heimon jäsenten kesken
  - Poliittiset johtajat asettivat kollektiivisen omistuksen säilyttääkseen väestön hallinnan
  - Moraaliset periaatteet korostivat yhteisön solidaarisuutta yksilöllisen aineellisen kartuttamisen sijaan
explanation: |
  Luvun mukaan esihistoriallisissa yhteiskunnissa kollektiivinen omistus ei perustunut ideologiaan tai mieltymyksiin vaan käytännön tarpeeseen. Biisonien metsästyksen kaltaiset toiminnot edellyttivät liikkumista laajoilla alueilla, joten yksityisen maanomistuksen perustaminen pienille suljetuille alueille oli mahdotonta. Selviytymiseen liittyvät aineelliset rajoitteet - laajojen alueiden tarve metsästystä, kalastusta ja keräilyä varten - tekivät yhteisomistuksesta rationaalisen sopeutumisen ympäristöolosuhteisiin, ei tietoista ideologista valintaa.
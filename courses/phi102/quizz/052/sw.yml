question: Ni sababu gani kuu kwa nini jamii za kale ziliendesha umiliki wa pamoja badala ya mali binafsi?
answer: Upungufu wa mali ulihitaji mtindo wa maisha wa kuhamahama na maeneo makubwa kwa shughuli za uwindaji na kukusanya
wrong_answers:
  - Imani za kidini ziliamuru kwamba mali zote zigawanywe kwa usawa miongoni mwa wanakabila
  - Viongozi wa kisiasa waliweka umiliki wa pamoja ili kudumisha udhibiti wa idadi ya watu
  - Kanuni za maadili zilisisitiza mshikamano wa jamii dhidi ya mkusanyiko wa nyenzo za mtu binafsi
explanation: |
  Kulingana na sura hiyo, umiliki wa pamoja katika jamii za kihistoria haukuendeshwa na itikadi au upendeleo, bali na umuhimu wa vitendo. Shughuli kama vile uwindaji wa nyati zilihitaji harakati za kuhamahama katika maeneo makubwa, na hivyo kufanya iwe vigumu kuanzisha umiliki wa ardhi ya kibinafsi katika maeneo madogo yaliyofungwa. Vikwazo vya nyenzo vya kuishi - kuhitaji nafasi kubwa kwa ajili ya uwindaji, uvuvi, na kukusanya - vilifanya mali ya pamoja kuwa marekebisho ya busara kwa hali ya mazingira, si chaguo la kiitikadi la ufahamu.
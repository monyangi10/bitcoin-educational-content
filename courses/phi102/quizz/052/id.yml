question: Apa alasan utama mengapa masyarakat prasejarah mempraktikkan kepemilikan kolektif daripada kepemilikan pribadi?
answer: Keterbatasan material mengharuskan gaya hidup nomaden dan wilayah yang luas untuk kegiatan berburu dan meramu
wrong_answers:
  - Kepercayaan agama mengamanatkan bahwa semua harta benda harus dibagi rata di antara anggota suku
  - Para pemimpin politik memberlakukan kepemilikan kolektif untuk mempertahankan kontrol atas populasi
  - Prinsip-prinsip moral menekankan solidaritas komunitas di atas akumulasi materi individu
explanation: |
  Menurut bab ini, kepemilikan kolektif pada masyarakat prasejarah tidak didorong oleh ideologi atau preferensi, tetapi oleh kebutuhan praktis. Kegiatan seperti berburu bison membutuhkan pergerakan nomaden melintasi wilayah yang luas, sehingga mustahil untuk membangun kepemilikan tanah pribadi di area kecil yang tertutup. Hambatan material untuk bertahan hidup - membutuhkan ruang yang luas untuk berburu, memancing, dan meramu - menjadikan kepemilikan kolektif sebagai adaptasi rasional terhadap kondisi lingkungan, bukan sebagai pilihan ideologis yang disadari.
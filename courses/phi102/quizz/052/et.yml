question: Mis oli peamine põhjus, miks eelajaloolised ühiskonnad kasutasid eraomandi asemel kollektiivset omandit?
answer: Materiaalsed piirangud nõudsid nomaadlikku eluviisi ja suuri territooriume jahipidamiseks ja kogumistegevuseks
wrong_answers:
  - Usulised tõekspidamised kohustasid, et kogu vara tuleb jagada võrdselt hõimu liikmete vahel
  - Poliitilised juhid kehtestasid kollektiivse omandiõiguse, et säilitada kontroll elanikkonna üle
  - Moraalipõhimõtted rõhutasid kogukonna solidaarsust individuaalse materiaalse akumulatsiooni asemel
explanation: |
  Peatüki kohaselt ei ajendanud eelajalooliste ühiskondade kollektiivset omandiõigust mitte ideoloogia või eelistused, vaid praktiline vajadus. Tegevused, nagu piisonijaht, nõudsid nomaadilist liikumist suurtel territooriumidel, mistõttu oli võimatu luua eraomandit väikestel suletud aladel. Ellujäämise materiaalsed piirangud - vajadus suurte pindalade järele jahipidamiseks, kalapüügiks ja kogumiseks - muutsid kollektiivse omandiõiguse ratsionaalseks kohanemiseks keskkonnatingimustega, mitte teadlikuks ideoloogiliseks valikuks.
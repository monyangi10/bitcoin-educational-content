question: What was the primary reason why prehistoric societies practiced collective ownership rather than private property?
answer: Material constraints required nomadic lifestyle and vast territories for hunting and gathering activities
wrong_answers:
  - Religious beliefs mandated that all property should be shared equally among tribe members
  - Political leaders imposed collective ownership to maintain control over the population
  - Moral principles emphasized community solidarity over individual material accumulation
explanation: |
  According to the chapter, collective ownership in prehistoric societies was not driven by ideology or preference, but by practical necessity. Activities like hunting bison required nomadic movement across vast territories, making it impossible to establish private land ownership on small enclosed areas. The material constraints of survival - needing large spaces for hunting, fishing, and gathering - made collective property a rational adaptation to environmental conditions, not a conscious ideological choice.
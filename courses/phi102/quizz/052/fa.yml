question: دلیل اصلی اینکه جوامع پیشاتاریخی مالکیت جمعی را به جای مالکیت خصوصی تمرین می‌کردند چه بود؟
answer: محدودیت‌های مادی نیازمند سبک زندگی کوچ‌نشینی و قلمروهای وسیع برای فعالیت‌های شکار و جمع‌آوری بودند.
wrong_answers:
  - باورهای مذهبی حکم می‌کرد که تمام اموال باید به طور مساوی بین اعضای قبیله تقسیم شود.
  - رهبران سیاسی مالکیت جمعی را برای حفظ کنترل بر جمعیت تحمیل کردند.
  - اصول اخلاقی بر همبستگی جامعه به جای انباشت مادی فردی تأکید داشتند
explanation: |
  بر اساس این فصل، مالکیت جمعی در جوامع پیشاتاریخی نه به دلیل ایدئولوژی یا ترجیح، بلکه به دلیل ضرورت عملی شکل گرفته بود. فعالیت‌هایی مانند شکار بیزون نیازمند حرکت‌های کوچ‌نشینی در سراسر قلمروهای وسیع بود که امکان ایجاد مالکیت خصوصی بر زمین‌های کوچک محصور را غیرممکن می‌ساخت. محدودیت‌های مادی بقا - نیاز به فضاهای بزرگ برای شکار، ماهیگیری و جمع‌آوری - مالکیت جمعی را به عنوان یک سازگاری منطقی با شرایط محیطی تبدیل کرده بود، نه یک انتخاب ایدئولوژیک آگاهانه.
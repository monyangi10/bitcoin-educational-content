question: Ni imvo nyamukuru iyihe yatumye imiryango yo mu gihe c’imbere y’amateka ikoresha ubutunzi rusangi aho gukoresha ubutunzi bw’abantu ku giti cabo?
answer: Intambamyi z’umubiri zasaba ubuzima bw’abanyamahanga be n’intara nini zo guhigira no kwegeranya .
wrong_answers:
  - Ivyizerwa vy'idini vyasaba ko umutungo wose ukwiye gusangizwa kimwe hagati y'abagize umuryango .
  - Abarongozi ba politike barashizeho ubutunzi rusangi kugira ngo bagume bagenzura abanyagihugu .
  - Ingingo ngenderwako zo mu vy’inyifato runtu zashimikiye cane ku bumwe bw’abanyagihugu kuruta ku kwirundanira ibintu vy’umuntu ku giti ciwe .
explanation: |
  Dushingiye ku kigabane, ubutunzi rusangi mu mibano y’imbere y’amateka ntibwari bushingiye ku ngengabitekerezo canke ku vyo umuntu akunda, ahubwo bwari bushingiye ku nkenerwa. Ibikorwa nk’uguhiga ibikoko vy’ibisiga vyasaba ko abantu bimukira mu bice bininibinini, ivyo bikaba vyatuma bidashoboka gushinga ubutaka bw’abantu ku giti cabo ku bibanza bitobito vyugarijwe. Intambamyi z’umubiri zo kurokoka - zikeneye ibibanza binini vyo guhigira, kuroba no gukorakoranya - vyatumye umutungo rusangi uba uguhuza n’ibidukikije, atari uguhitamwo kw’ingengabitekerezo umuntu abizi.
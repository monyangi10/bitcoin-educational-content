question: Tarih öncesi toplumların özel mülkiyet yerine kolektif mülkiyet uygulamalarının temel nedeni neydi?
answer: Maddi kısıtlamalar göçebe yaşam tarzını ve avcılık ve toplayıcılık faaliyetleri için geniş toprakları gerektiriyordu
wrong_answers:
  - Dini inançlar, tüm mülklerin kabile üyeleri arasında eşit olarak paylaşılmasını zorunlu kılıyordu
  - Siyasi liderler nüfus üzerindeki kontrolü sürdürmek için kolektif mülkiyeti dayattı
  - Ahlaki ilkeler, bireysel maddi birikim yerine toplumsal dayanışmayı vurguluyordu
explanation: |
  Bu bölüme göre, tarih öncesi toplumlarda kolektif mülkiyet ideoloji ya da tercihten değil, pratik gerekliliklerden kaynaklanıyordu. Bizon avlamak gibi faaliyetler geniş topraklarda göçebe hareket etmeyi gerektirdiğinden, küçük kapalı alanlarda özel toprak mülkiyeti kurmak imkansızdı. Hayatta kalmanın maddi kısıtlamaları - avlanmak, balık tutmak ve toplamak için geniş alanlara ihtiyaç duymak - kolektif mülkiyeti bilinçli bir ideolojik tercih değil, çevresel koşullara rasyonel bir adaptasyon haline getirmiştir.
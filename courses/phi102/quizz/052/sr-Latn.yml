question: Koji je bio primarni razlog zašto su praistorijska društva praktikovala kolektivno vlasništvo umesto privatne svojine?
answer: Materijalna ograničenja zahtevala su nomadski način života i ogromne teritorije za lov i sakupljanje.
wrong_answers:
  - Verska uverenja su nalagala da sva imovina treba biti ravnomerno podeljena među članovima plemena.
  - Politički lideri su nametnuli kolektivno vlasništvo kako bi zadržali kontrolu nad stanovništvom.
  - Moralni principi su naglašavali solidarnost zajednice nad individualnim materijalnim akumuliranjem
explanation: |
  Prema poglavlju, kolektivno vlasništvo u praistorijskim društvima nije bilo vođeno ideologijom ili preferencijama, već praktičnom nužnošću. Aktivnosti poput lova na bizone zahtevale su nomadsko kretanje preko velikih teritorija, što je činilo nemogućim uspostavljanje privatnog vlasništva nad malim ograđenim područjima. Materijalna ograničenja preživljavanja - potreba za velikim prostorima za lov, ribolov i sakupljanje - činila su kolektivno vlasništvo racionalnom adaptacijom na uslove okoline, a ne svesnim ideološkim izborom.
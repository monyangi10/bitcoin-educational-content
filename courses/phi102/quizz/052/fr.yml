question: Quelle est la principale raison pour laquelle les sociétés préhistoriques pratiquaient la propriété collective plutôt que la propriété privée ?
answer: Les contraintes matérielles imposaient un mode de vie nomade et de vastes territoires pour les activités de chasse et de cueillette
wrong_answers:
  - Les croyances religieuses imposent que tous les biens soient partagés équitablement entre les membres de la tribu
  - Les dirigeants politiques ont imposé la propriété collective pour maintenir leur contrôle sur la population
  - Les principes moraux mettent l'accent sur la solidarité communautaire plutôt que sur l'accumulation matérielle individuelle
explanation: |
  Selon ce chapitre, la propriété collective dans les sociétés préhistoriques n'était pas motivée par une idéologie ou une préférence, mais par une nécessité pratique. Des activités telles que la chasse au bison nécessitaient des déplacements nomades sur de vastes territoires, ce qui rendait impossible l'établissement d'une propriété foncière privée sur de petits espaces clos. Les contraintes matérielles de la survie — besoin de grands espaces pour la chasse, la pêche et la cueillette — ont fait de la propriété collective une adaptation rationnelle aux conditions environnementales, et non un choix idéologique conscient.

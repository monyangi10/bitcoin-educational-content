question: Каква основна функция е изпълнявало робството извън икономическото производство в древните общества според текста?
answer: Той осигурява социално осигуряване и сигурност за работниците в един опасен свят
wrong_answers:
  - Тя установява религиозни йерархии и духовен ред в общностите
  - Създава образователни системи за предаване на знания на бъдещите поколения
  - Разработва военни стратегии и отбранителни укрепления срещу враговете
explanation: |
  Според текста робството е служило като форма на социална застраховка в древните общества, характеризиращи се с постоянна несигурност. За някои работници този статут е позволявал да допринасят за производството, без да рискуват ежедневно живота си в опасни дейности. Другите варианти са неправилни, тъй като описват функции, които не са споменати в главата - робството не е било предимно свързано с религията, образованието или военната стратегия, а по-скоро с осигуряването на сигурност и намаляването на индивидуалния риск в една по същество опасна среда, в която оцеляването е било несигурно.
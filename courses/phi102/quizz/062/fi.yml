question: Mikä oli tekstin mukaan orjuuden ensisijainen tehtävä muinaisissa yhteiskunnissa taloudellisen tuotannon lisäksi?
answer: Se tarjosi työntekijöille sosiaaliturvaa ja sosiaaliturvaa vaarallisessa maailmassa
wrong_answers:
  - Se loi uskonnolliset hierarkiat ja hengellisen järjestyksen yhteisöihin
  - Se loi koulutusjärjestelmiä tiedon siirtämiseksi tuleville sukupolville
  - Se kehitti sotilaallisia strategioita ja puolustuslinnoituksia vihollisia vastaan
explanation: |
  Tekstin mukaan orjuus oli sosiaalivakuutus muinaisissa yhteiskunnissa, joissa vallitsi jatkuva turvattomuus. Tämä asema antoi tietyille työntekijöille mahdollisuuden osallistua tuotantoon vaarantamatta päivittäin henkeään vaarallisissa tehtävissä. Muut vaihtoehdot ovat virheellisiä, koska niissä kuvataan toimintoja, joita ei mainita luvussa - orjuudessa ei ollut ensisijaisesti kyse uskonnosta, koulutuksesta tai sotilaallisesta strategiasta vaan pikemminkin turvallisuuden tarjoamisesta ja yksilön riskien vähentämisestä luonnostaan vaarallisessa ympäristössä, jossa selviytyminen oli epävarmaa.
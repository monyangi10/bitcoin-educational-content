question: Welche Hauptfunktion hatte die Sklaverei dem Text zufolge in den antiken Gesellschaften über die wirtschaftliche Produktion hinaus?
answer: Sie bot Sozialversicherung und Sicherheit für Arbeitnehmer in einer gefährlichen Welt
wrong_answers:
  - Sie schuf religiöse Hierarchien und eine geistliche Ordnung in den Gemeinschaften
  - Sie schuf Bildungssysteme zur Weitergabe von Wissen an künftige Generationen
  - Sie entwickelte militärische Strategien und Verteidigungsanlagen gegen Feinde
explanation: |
  Dem Text zufolge diente die Sklaverei in den von ständiger Unsicherheit geprägten antiken Gesellschaften als eine Form der sozialen Absicherung. Für bestimmte Arbeiter ermöglichte dieser Status, zur Produktion beizutragen, ohne täglich ihr Leben bei gefährlichen Tätigkeiten zu riskieren. Die anderen Optionen sind falsch, da sie Funktionen beschreiben, die im Kapitel nicht erwähnt werden - bei der Sklaverei ging es nicht in erster Linie um Religion, Bildung oder militärische Strategie, sondern vielmehr um die Gewährleistung von Sicherheit und die Verringerung des individuellen Risikos in einem von Natur aus gefährlichen Umfeld, in dem das Überleben unsicher war.
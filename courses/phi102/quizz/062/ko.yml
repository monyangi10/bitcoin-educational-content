question: 본문에 따르면 고대 사회에서 노예 제도는 경제적 생산 외에 어떤 주요 기능을 수행했습니까?
answer: 위험한 환경에서 일하는 근로자를 위한 사회 보험과 보안을 제공했습니다
wrong_answers:
  - 커뮤니티에서 종교적 위계와 영적 질서를 확립했습니다
  - 미래 세대에 지식을 전수하기 위한 교육 시스템을 구축했습니다
  - 적에 대한 군사 전략과 방어 요새를 개발했습니다
explanation: |
  본문에 따르면 노예제도는 영구적인 불안정으로 특징지어지는 고대 사회에서 일종의 사회 보험 역할을 했습니다. 특정 노동자의 경우, 이러한 지위를 통해 매일 위험한 활동에 목숨을 걸지 않고도 생산에 기여할 수 있었습니다. 다른 옵션은 이 장에서 언급되지 않은 기능을 설명하므로 올바르지 않습니다. 노예제는 주로 종교, 교육 또는 군사 전략에 관한 것이 아니라 생존이 불확실한 본질적으로 위험한 환경에서 안전을 제공하고 개인의 위험을 줄이기 위한 것이었습니다.
question: D'après le texte, quelle fonction principale l'esclavage remplissait-il au-delà de la production économique dans les sociétés anciennes ?
answer: Elle fournit une assurance sociale et une sécurité aux travailleurs dans un monde dangereux
wrong_answers:
  - Elle a établi des hiérarchies religieuses et un ordre spirituel dans les communautés
  - Elle a créé des systèmes éducatifs pour transmettre les connaissances aux générations futures
  - Elle a développé des stratégies militaires et des fortifications défensives contre les ennemis
explanation: |
  Selon le texte, l'esclavage a servi d'assurance sociale dans les sociétés anciennes marquées par une insécurité permanente. Pour certains travailleurs, ce statut leur permettait de contribuer à la production sans risquer quotidiennement leur vie dans des activités dangereuses. Les autres options sont incorrectes, car elles décrivent des fonctions qui ne sont pas mentionnées dans le chapitre — l'esclavage n'avait pas pour but premier la religion, l'éducation ou la stratégie militaire, mais plutôt la sécurité et la réduction des risques individuels dans un environnement intrinsèquement dangereux où la survie était incertaine.

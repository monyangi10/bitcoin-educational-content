question: Hvilken funksjon utover økonomisk produksjon hadde slaveriet i antikkens samfunn, ifølge teksten?
answer: Det ga sosialforsikring og trygghet for arbeidere i en farlig verden
wrong_answers:
  - Den etablerte religiøse hierarkier og åndelig orden i samfunnene
  - Den skapte utdanningssystemer for overføring av kunnskap til fremtidige generasjoner
  - Den utviklet militære strategier og forsvarsverk mot fiender
explanation: |
  Ifølge teksten fungerte slaveriet som en form for sosial forsikring i antikkens samfunn preget av permanent utrygghet. For enkelte arbeidere gjorde denne statusen det mulig å bidra til produksjonen uten å risikere livet i farlige aktiviteter hver dag. De andre alternativene er feil, ettersom de beskriver funksjoner som ikke nevnes i kapittelet - slaveriet handlet ikke først og fremst om religion, utdanning eller militærstrategi, men snarere om å skape trygghet og redusere individuell risiko i et iboende farlig miljø der overlevelse var usikker.
question: De acordo com o texto, qual era a principal função da escravatura para além da produção económica nas sociedades antigas?
answer: Assegurou a segurança social e a segurança dos trabalhadores num mundo perigoso
wrong_answers:
  - Estabeleceu hierarquias religiosas e ordem espiritual nas comunidades
  - Criou sistemas educativos para a transmissão de conhecimentos às gerações futuras
  - Desenvolveu estratégias militares e fortificações defensivas contra os inimigos
explanation: |
  De acordo com o texto, a escravatura servia como uma forma de seguro social em sociedades antigas marcadas pela insegurança permanente. Para certos trabalhadores, este estatuto permitia-lhes contribuir para a produção sem arriscarem diariamente a vida em actividades perigosas. As outras opções estão incorrectas, pois descrevem funções não mencionadas no capítulo - a escravatura não tinha como principal objetivo a religião, a educação ou a estratégia militar, mas sim a segurança e a redução do risco individual num ambiente inerentemente perigoso, onde a sobrevivência era incerta.
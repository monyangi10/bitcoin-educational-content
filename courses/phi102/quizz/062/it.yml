question: Secondo il testo, quale funzione primaria aveva la schiavitù al di là della produzione economica nelle società antiche?
answer: Ha fornito assicurazioni sociali e sicurezza ai lavoratori in un mondo pericoloso
wrong_answers:
  - Stabilisce gerarchie religiose e ordine spirituale nelle comunità
  - Ha creato sistemi educativi per trasmettere la conoscenza alle generazioni future
  - Ha sviluppato strategie militari e fortificazioni difensive contro i nemici
explanation: |
  Secondo il testo, la schiavitù serviva come forma di assicurazione sociale nelle società antiche caratterizzate da insicurezza permanente. Per alcuni lavoratori, questo status permetteva di contribuire alla produzione senza rischiare quotidianamente la vita in attività pericolose. Le altre opzioni non sono corrette perché descrivono funzioni non menzionate nel capitolo: la schiavitù non aveva come scopo principale la religione, l'istruzione o la strategia militare, ma piuttosto la sicurezza e la riduzione del rischio individuale in un ambiente intrinsecamente pericoloso in cui la sopravvivenza era incerta.
question: 根据课文内容，奴隶制在古代社会中除了经济生产之外还有什么主要功能？
answer: 在危险的世界里，它为工人提供社会保险和保障
wrong_answers:
  - 它在社区中建立了宗教等级和精神秩序
  - 它创建了向后代传授知识的教育体系
  - 它制定了军事战略和防御工事来抵御敌人
explanation: |
  根据该文本，在长期不安全的古代社会，奴隶制是一种社会保险形式。对某些工人来说，这种身份使他们能够为生产做出贡献，而不必每天冒着生命危险从事危险活动。其他选项都不正确，因为它们描述的是本章中没有提到的功能--奴隶制主要不是为了宗教、教育或军事战略，而是为了在生存不确定的固有危险环境中提供安全和减少个人风险。
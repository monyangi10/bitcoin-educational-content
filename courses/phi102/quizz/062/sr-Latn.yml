question: Koju je primarnu funkciju ropstvo imalo osim ekonomske proizvodnje u drevnim društvima prema tekstu?
answer: Pružao je socijalno osiguranje i sigurnost za radnike u opasnom svetu
wrong_answers:
  - Uspostavilo je verske hijerarhije i duhovni poredak u zajednicama
  - Stvorio je obrazovne sisteme za prenošenje znanja budućim generacijama
  - Razvijao je vojne strategije i odbrambene utvrde protiv neprijatelja.
explanation: |
  Prema tekstu, ropstvo je služilo kao oblik socijalnog osiguranja u drevnim društvima obeleženim stalnom nesigurnošću. Za određene radnike, ovaj status im je omogućavao da doprinesu proizvodnji bez svakodnevnog rizikovanja života u opasnim aktivnostima. Ostale opcije su netačne jer opisuju funkcije koje nisu pomenute u poglavlju - ropstvo nije bilo prvenstveno vezano za religiju, obrazovanje ili vojnu strategiju, već za pružanje sigurnosti i smanjenje individualnog rizika u inherentno opasnom okruženju gde je opstanak bio neizvestan.
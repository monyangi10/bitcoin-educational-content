question: Utumwa ulikuwa na jukumu gani la msingi zaidi ya uzalishaji wa kiuchumi katika jamii za kale kulingana na maandishi?
answer: Ilitoa bima ya kijamii na usalama kwa wafanyakazi katika ulimwengu hatari
wrong_answers:
  - Ilianzisha uongozi wa kidini na utaratibu wa kiroho katika jamii
  - Iliunda mifumo ya elimu kwa ajili ya kusambaza maarifa kwa vizazi vijavyo
  - Iliunda mikakati ya kijeshi na ngome za kujilinda dhidi ya maadui
explanation: |
  Kulingana na maandishi, utumwa ulitumika kama aina ya bima ya kijamii katika jamii za kale zilizokuwa na ukosefu wa usalama wa kudumu. Kwa baadhi ya wafanyakazi, hali hii iliwaruhusu kuchangia uzalishaji bila kuhatarisha maisha yao kila siku katika shughuli hatari. Chaguzi zingine si sahihi kwani zinaelezea kazi ambazo hazijatajwa katika sura hiyo - utumwa haukuwa hasa kuhusu dini, elimu, au mkakati wa kijeshi, bali ulikuwa kuhusu kutoa usalama na kupunguza hatari ya mtu binafsi katika mazingira hatari ambapo kuishi hakukuwa na uhakika.
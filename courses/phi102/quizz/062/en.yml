question: What primary function did slavery serve beyond economic production in ancient societies according to the text?
answer: It provided social insurance and security for workers in a dangerous world
wrong_answers:
  - It established religious hierarchies and spiritual order in communities
  - It created educational systems for transmitting knowledge to future generations
  - It developed military strategies and defensive fortifications against enemies
explanation: |
  According to the text, slavery served as a form of social insurance in ancient societies marked by permanent insecurity. For certain workers, this status allowed them to contribute to production without daily risking their lives in dangerous activities. The other options are incorrect as they describe functions not mentioned in the chapter - slavery was not primarily about religion, education, or military strategy, but rather about providing security and reducing individual risk in an inherently dangerous environment where survival was uncertain.

question: Jakou primární funkci podle textu plnilo otroctví ve starověkých společnostech kromě ekonomické výroby?
answer: Zajišťovala sociální pojištění a bezpečnost pracovníků v nebezpečném světě
wrong_answers:
  - Zavedla náboženskou hierarchii a duchovní řád v komunitách
  - Vytvořila vzdělávací systémy pro předávání znalostí budoucím generacím
  - Rozvíjela vojenské strategie a obranná opevnění proti nepřátelům
explanation: |
  Podle textu sloužilo otroctví jako forma sociálního pojištění ve starověkých společnostech, které se vyznačovaly trvalou nejistotou. Některým pracovníkům tento status umožňoval podílet se na výrobě, aniž by denně riskovali život při nebezpečných činnostech. Ostatní možnosti jsou nesprávné, protože popisují funkce, které nejsou v kapitole zmíněny - otroctví nebylo primárně o náboženství, vzdělání nebo vojenské strategii, ale spíše o zajištění bezpečnosti a snížení individuálního rizika v přirozeně nebezpečném prostředí, kde bylo přežití nejisté.
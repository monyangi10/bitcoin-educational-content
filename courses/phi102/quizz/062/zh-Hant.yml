question: 根據文中所述，在古代社會中，除了經濟生產之外，奴隸制還有什麼主要功能？
answer: 它在危險的世界中為工人提供社會保險和保障
wrong_answers:
  - 它在社群中建立宗教等級與靈性秩序
  - 它創造了將知識傳給後代的教育系統
  - 它發展了軍事策略和防禦工事來對抗敵人
explanation: |
  根據文中所述，在長期缺乏安全感的古代社會中，奴隸制是一種社會保險的形式。對於某些工人來說，這種身份讓他們可以為生產做出貢獻，而不用每天冒著生命危險去從事危險的活動。其他選項是不正確的，因為它們描述的是本章沒有提到的功能 - 奴隸制主要不是關於宗教、教育或軍事策略，而是在一個固有的生存不確定的危險環境中提供安全和降低個人風險。
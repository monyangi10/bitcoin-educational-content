question: Какую основную функцию, помимо экономического производства, выполняло рабство в древних обществах, согласно тексту?
answer: Она обеспечивала социальное страхование и безопасность трудящихся в опасном мире
wrong_answers:
  - Она устанавливала религиозную иерархию и духовный порядок в общинах
  - Она создала образовательные системы для передачи знаний будущим поколениям
  - Она разработала военные стратегии и оборонительные укрепления против врагов
explanation: |
  Согласно тексту, рабство служило формой социального страхования в древних обществах, отличавшихся постоянным отсутствием безопасности. Для некоторых работников этот статус позволял вносить вклад в производство, не рискуя ежедневно своей жизнью на опасных работах. Остальные варианты неверны, так как описывают функции, не упомянутые в главе - рабство в первую очередь было связано не с религией, образованием или военной стратегией, а с обеспечением безопасности и снижением индивидуального риска в изначально опасной среде, где выживание было неопределенным.
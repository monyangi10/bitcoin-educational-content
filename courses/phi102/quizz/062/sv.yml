question: Vilken primär funktion hade slaveriet utöver den ekonomiska produktionen i de antika samhällena enligt texten?
answer: Det gav socialförsäkring och trygghet för arbetare i en farlig värld
wrong_answers:
  - Den upprättade religiösa hierarkier och andlig ordning i samhällena
  - Det skapade utbildningssystem för att överföra kunskap till kommande generationer
  - Man utvecklade militära strategier och försvarsanläggningar mot fiender
explanation: |
  Enligt texten fungerade slaveriet som en form av socialförsäkring i antika samhällen som präglades av ständig osäkerhet. För vissa arbetare innebar denna status att de kunde bidra till produktionen utan att dagligen riskera sina liv i farliga aktiviteter. De andra alternativen är felaktiga eftersom de beskriver funktioner som inte nämns i kapitlet - slaveriet handlade inte i första hand om religion, utbildning eller militär strategi, utan snarare om att skapa trygghet och minska den individuella risken i en till sin natur farlig miljö där överlevnaden var osäker.
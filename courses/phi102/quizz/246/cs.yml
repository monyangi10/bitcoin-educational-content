question: Co liberální teoretici označili za hlavní mechanismus, který odlišuje účinné společnosti vzájemné pomoci od státních systémů sociální péče z hlediska zlepšení fungování?
answer: Konkurence mezi různými organizacemi a metodami, která umožnila rozkvět úspěšných postupů, zatímco neefektivní postupy byly opuštěny
wrong_answers:
  - Demokratické volební systémy, které umožňovaly členům přímo volit vedení a určovat politiku rozdělování dávek
  - Náboženské a morální rámce, které kladly důraz na individuální ctnost a komunitní odpovědnost před materiální pomocí
  - Decentralizované modely financování, které se spoléhaly na místní dary namísto centralizovaných systémů zdanění a přerozdělování
explanation: |
  Podle textu liberální teoretici zdůrazňovali, že společnosti vzájemné pomoci fungují spíše prostřednictvím konkurence než státního monopolu. Toto konkurenční prostředí umožňovalo neustálé zlepšování tím, že umožňovalo uspět nejefektivnějším postupům, zatímco neúspěšné metody byly opuštěny. Jiné možnosti, ačkoli byly potenciálně přítomny v některých společnostech vzájemné pomoci, nebyly označeny za základní rozlišovací mechanismus, který by vedl k provozní dokonalosti ve srovnání se státními systémy.
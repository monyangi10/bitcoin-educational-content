question: Ni igiki abahinga mu vy’uburenganzira bw’abantu bamenyesheje ko ari co kintu nyamukuru catandukanya amashirahamwe y’ugufashanya n’imibereho myiza ya Leta mu bijanye no guteza imbere ibikorwa?
answer: Uguhiganwa hagati y’imiryango itandukanye n’uburyo bwatuma imigenzo iroranirwa itera imbere mu gihe idakora neza yahevye .
wrong_answers:
  - Uburyo bwo gutora bwa demokarasi bwatumye abanywanyi batora uburongozi ataco baciyeko no kugena ingene inyungu zigabanwa
  - Inzego z’idini n’iz’inyifato runtu zashimika ku ngeso nziza z’umuntu ku giti ciwe no ku nshingano z’abanyagihugu ku bijanye n’ugufashwa mu vy’umubiri .
  - Uburyo bwo gutanga amafaranga bushingiye ku ntererano zo mu karere aho gushingira ku misoro n'uburyo bwo gusubira gutanga amafaranga
explanation: |
  Dukurikije ico canditswe, abahinga mu vy’ubwigenge barashimikiye ko amashirahamwe y’ugufashanya akora biciye mu guhiganwa aho gukoresha Leta yonyene. Ivyo bibanza vy’uguhiganwa vyatumye habaho ugutera imbere gukomeza mu kureka ingendo nziza cane zigatera imbere mu gihe uburyo butatera imbere bwahebwe. Ibindi bihitamwo, naho bishobora kuba biri mu mashirahamwe amwe amwe y’ugufashanya, ntivyamenyekanye nk’uburyo nyamukuru bwo gutandukanya abantu bwatuma habaho ubuhinga bwiza bwo gukora ugereranyije n’uburyo bwa Leta.
question: Čím se podle Bastiatovy analýzy v "Les Harmonies économiques" liší povaha zájmů v liberální společnosti od zájmů v primitivních společnostech?
answer: V liberálních společnostech jsou zájmy harmonické díky dobrovolné směně, z níž mají prospěch obě strany, na rozdíl od primitivních společností, kde byly zájmy skutečně antagonistické kvůli soutěži o omezené zdroje s nulovým součtem
wrong_answers:
  - Liberální společnosti vytvářejí složitější antagonismy mezi třídami, zatímco primitivní společnosti měly jednodušší, ale přímočařejší konflikty týkající se okamžitých potřeb přežití
  - Liberální společnosti potlačují přirozené konkurenční instinkty prostřednictvím regulace, zatímco primitivní společnosti umožňovaly svobodné vyjádření protichůdných zájmů prostřednictvím přímé konfrontace
  - Liberální společnosti transformují antagonistické zájmy na kooperativní prostřednictvím vládních zásahů, zatímco primitivním společnostem chyběly institucionální mechanismy k řešení konfliktů
explanation: |
  Bastiat tvrdí, že dobrovolná směna v liberálních společnostech vytváří vzájemný prospěch a zájmy jsou spíše harmonické než protichůdné. Dává to do kontrastu s primitivními společnostmi, kde skutečný nedostatek (například dva kmeny soupeřící o stejné loviště) vytvářel skutečné antagonismy. Špatné odpovědi zkreslují jeho teorii tím, že jako klíčové faktory naznačují třídní konflikty, regulační potlačování nebo vládní zásahy, zatímco Bastiat zdůrazňuje, že harmonie vzniká přirozeně z dobrovolných tržních vztahů bez donucování.
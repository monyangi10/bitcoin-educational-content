question: Selon l'analyse de Bastiat dans "Les Harmonies économiques", qu'est-ce qui distingue la nature des intérêts dans une société libérale de celle des sociétés primitives ?
answer: Dans les sociétés libérales, les intérêts sont harmonisés grâce à un échange volontaire dont les deux parties tirent profit, contrairement aux sociétés primitives où les intérêts étaient véritablement antagonistes en raison d'une concurrence à somme nulle pour des ressources limitées
wrong_answers:
  - Les sociétés libérales créent des antagonismes plus complexes entre les classes, alors que les sociétés primitives connaissaient des conflits plus simples, mais plus directs, liés aux besoins immédiats de survie
  - Les sociétés libérales répriment les instincts compétitifs naturels par la réglementation, tandis que les sociétés primitives permettent la libre expression d'intérêts contradictoires par la confrontation directe
  - Les sociétés libérales transforment les intérêts antagonistes en intérêts coopératifs grâce à l'intervention de l'État, tandis que les sociétés primitives ne disposaient pas de mécanismes institutionnels pour résoudre les conflits
explanation: |
  Bastiat affirme que l'échange volontaire dans les sociétés libérales crée des avantages mutuels, rendant les intérêts harmonieux plutôt que conflictuels. Il compare cette situation à celle des sociétés primitives où la rareté réelle (comme deux tribus se disputant le même terrain de chasse) créait de véritables antagonismes. Les mauvaises réponses déforment sa théorie en suggérant que les conflits de classes, la suppression des réglementations ou l'intervention du gouvernement sont des facteurs clés, alors que Bastiat insiste sur le fait que l'harmonie émerge naturellement des relations de marché volontaires sans coercition.
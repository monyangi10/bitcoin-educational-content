question: バスティアの『経済的調和』（Les Harmonies économiques）における分析によれば、自由主義社会と原始的な社会における利害の本質を区別するものは何か？
answer: 自由主義社会では、限られた資源をめぐるゼロサム競争によって利害が純粋に対立していた原始社会とは異なり、双方が利益を得る自発的な交換を通じて利害が調和する。
wrong_answers:
  - リベラルな社会では階級間の対立がより複雑であるのに対し、原始的な社会では生存に必要な直接的な対立がより単純であった。
  - リベラルな社会は規制によって自然な競争本能を抑制するが、原始的な社会は直接対決によって対立する利害の自由な発現を許容した。
  - 自由主義社会は政府の介入によって対立する利害を協力的なものに変えるが、原始社会には対立を解決する制度的メカニズムが欠けていた。
explanation: |
  バスティアは、自由主義社会における自発的な交換は相互利益を生み出し、利害を対立させるのではなく調和させると主張する。彼はこれを、本物の希少性（2つの部族が同じ狩場を奪い合うような）が現実の対立を生み出した原始社会と対比している。バスティアが強調しているのは、強制力のない自発的な市場関係から調和が自然に生まれるということなのに、不正解者は、階級対立、規制による抑圧、政府の介入を重要な要因として示唆し、彼の理論を誤って伝えている。
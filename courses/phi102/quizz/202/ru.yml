question: Согласно анализу, проведенному Бастиа в книге "Экономические гармонии", что отличает природу интересов в либеральном обществе от интересов в примитивных обществах?
answer: В либеральных обществах интересы гармонично сочетаются благодаря добровольному обмену, в котором выигрывают обе стороны, в отличие от примитивных обществ, где интересы действительно антагонистичны из-за конкуренции с нулевой суммой за ограниченные ресурсы
wrong_answers:
  - Либеральные общества создают более сложный антагонизм между классами, в то время как в примитивных обществах были более простые, но более прямые конфликты, связанные с непосредственными потребностями выживания
  - Либеральные общества подавляют естественные инстинкты конкуренции с помощью регулирования, в то время как примитивные общества допускают свободное выражение конфликтующих интересов путем прямого противостояния
  - В либеральных обществах антагонистические интересы трансформируются в кооперативные благодаря вмешательству государства, в то время как в примитивных обществах отсутствовали институциональные механизмы для разрешения конфликтов
explanation: |
  Бастиат утверждает, что добровольный обмен в либеральных обществах создает взаимную выгоду, делая интересы гармоничными, а не противоречивыми. Он противопоставляет это примитивным обществам, в которых реальный дефицит (например, два племени, конкурирующие за одно и то же охотничье угодье) порождал настоящие антагонизмы. Неправильные ответы искажают его теорию, предполагая в качестве ключевых факторов классовый конфликт, подавление регуляторов или вмешательство государства, в то время как Бастиат подчеркивает, что гармония возникает естественным образом из добровольных рыночных отношений без принуждения.
question: 바스티앙의 분석에 따르면 '레 하모니 에코노미크'에서 자유주의 사회에서 이해관계의 본질은 원시 사회의 그것과 무엇이 다를까요?
answer: 자유주의 사회에서는 제한된 자원에 대한 제로섬 경쟁으로 인해 이해관계가 적대적이었던 원시 사회와 달리, 양쪽 모두에게 이익이 되는 자발적인 교환을 통해 이해관계가 조화를 이룹니다
wrong_answers:
  - 자유주의 사회는 계급 간 더 복잡한 적대감을 형성하는 반면 원시 사회는 더 단순하지만 즉각적인 생존 필요를 둘러싼 직접적인 갈등을 겪었습니다
  - 자유주의 사회는 규제를 통해 자연스러운 경쟁 본능을 억제하는 반면 원시 사회는 직접적인 대결을 통해 상충되는 이해관계를 자유롭게 표현할 수 있었습니다
  - 자유주의 사회는 정부의 개입을 통해 적대적 이해관계를 협력적 이해관계로 전환하는 반면, 원시 사회는 갈등을 해결할 수 있는 제도적 장치가 부족했습니다
explanation: |
  바스티아트는 자유주의 사회에서 자발적인 교환은 상호 이익을 창출하여 이해관계가 상충하기보다는 조화를 이룬다고 주장합니다. 그는 이를 같은 사냥터를 두고 경쟁하는 두 부족처럼 진정한 희소성이 실제 적대감을 불러일으키는 원시 사회와 대조합니다. 오답은 계급 갈등, 규제 억압 또는 정부 개입을 핵심 요인으로 제시함으로써 그의 이론을 잘못 표현하고 있는데, 바스티아는 조화는 강압 없이 자발적인 시장 관계에서 자연스럽게 나온다고 강조합니다.
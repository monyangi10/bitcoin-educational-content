question: 根据巴斯蒂亚在《经济和谐》中的分析，自由社会与原始社会的利益性质有何不同？
answer: 在自由社会中，利益通过自愿交换实现和谐，双方都能从中受益，而不是像原始社会那样，由于对有限资源的零和竞争，利益是真正对立的。
wrong_answers:
  - 自由社会的阶级对立更为复杂，而原始社会的阶级对立则更为简单，但更多的是为了满足眼前的生存需要而发生的直接冲突。
  - 自由社会通过监管抑制自然竞争本能，而原始社会则允许通过直接对抗自由表达利益冲突
  - 自由社会通过政府干预将对立利益转化为合作利益，而原始社会则缺乏解决冲突的制度机制
explanation: |
  巴斯蒂亚认为，自由社会中的自愿交换创造了互惠互利，使利益和谐而非冲突。他将此与原始社会形成对比，在原始社会中，真正的稀缺性（如两个部落争夺同一个狩猎场）造成了真正的对立。错误答案歪曲了他的理论，认为阶级冲突、监管压制或政府干预是关键因素，而巴斯蒂亚强调和谐是在自愿的市场关系中自然产生的，不存在强制。
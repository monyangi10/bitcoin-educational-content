question: Според анализа на Бастиа в "Икономически хармонии" какво отличава естеството на интересите в едно либерално общество от тези в примитивните общества?
answer: В либералните общества интересите са хармонизирани чрез доброволен обмен, от който печелят и двете страни, за разлика от примитивните общества, където интересите са били истински антагонистични поради конкуренцията за ограничени ресурси с нулев резултат
wrong_answers:
  - Либералните общества създават по-сложни антагонизми между класите, докато примитивните общества са имали по-прости, но по-директни конфликти, свързани с непосредствените нужди за оцеляване
  - Либералните общества потискат естествените конкурентни инстинкти чрез регулиране, докато примитивните общества позволяват свободно изразяване на противоречиви интереси чрез пряка конфронтация
  - Либералните общества превръщат антагонистичните интереси в кооперативни чрез правителствена намеса, докато примитивните общества не разполагат с институционални механизми за разрешаване на конфликти
explanation: |
  Бастиа твърди, че доброволната размяна в либералните общества създава взаимна изгода, като прави интересите хармонични, а не противоречиви. Той контрастира с примитивните общества, в които истинският недостиг (например две племена, които се конкурират за едно и също ловно поле) създава истински антагонизъм. Неправилните отговори изопачават теорията му, като предполагат, че ключови фактори са класовите конфликти, регулаторното потискане или държавната намеса, докато Бастиа подчертава, че хармонията възниква естествено от доброволните пазарни отношения без принуда.
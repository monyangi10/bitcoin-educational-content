question: Abbé de Saint-Pierre đã sử dụng phép so sánh nào để mô tả các thể chế chính trị và nhu cầu bảo trì thường xuyên của chúng?
answer: Ông so sánh chúng với những chiếc đồng hồ cần được lên dây cót thường xuyên.
wrong_answers:
  - Ông so sánh chúng với những khu vườn cần được tưới nước và cắt tỉa thường xuyên.
  - Ông so sánh chúng với những cỗ máy cần thay dầu và sửa chữa định kỳ.
  - Ông so sánh chúng với những tòa nhà cần được kiểm tra cấu trúc thường xuyên.
explanation: |
  Abbé de Saint-Pierre đã so sánh các thể chế chính trị với những chiếc đồng hồ (horloges) cần được lên dây cót thường xuyên để hoạt động đúng cách. Hình ảnh ẩn dụ này minh họa rằng các thể chế cần được quan tâm, tranh luận và cải cách liên tục để duy trì hiệu quả và đáp ứng nhu cầu của xã hội. Các so sánh khác, mặc dù tương tự về mặt khái niệm trong việc gợi ý nhu cầu bảo trì, không phải là sự so sánh thực sự mà Abbé de Saint-Pierre đã đưa ra trong văn bản và sẽ đại diện cho các quan điểm triết học khác nhau về việc duy trì thể chế.
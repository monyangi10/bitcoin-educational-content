question: Millist võrdlust kasutas Abbé de Saint-Pierre, et kirjeldada poliitilisi institutsioone ja nende regulaarset hooldamist?
answer: Ta võrdles neid kelladega, mida tuleb regulaarselt üles kerida
wrong_answers:
  - Ta võrdles neid aedadega, mis vajavad pidevat kastmist ja pügamist
  - Ta võrdles neid masinatega, mis vajavad perioodilist õlivahetust ja remonti
  - Ta võrdles neid hoonetega, mis vajavad regulaarset ehituskontrolli
explanation: |
  Abbé de Saint-Pierre võrdles poliitilisi institutsioone konkreetselt kelladega (horloge), mis vajavad regulaarset üleskeeramist, et jätkata korralikult töötamist. See metafoor illustreerib, et institutsioonid vajavad pidevat tähelepanu, arutelu ja reformi, et jääda tõhusaks ja vastata ühiskonna vajadustele. Kuigi teised võrdlused on kontseptuaalselt sarnased, viidates hooldusvajadustele, ei ole need tegelikud võrdlused, mida Abbé de Saint-Pierre tekstis esitas, ja esindavad erinevaid filosoofilisi vaatenurki institutsioonide hooldamisele.
question: Ni ikigereranyo ikihe Abbé de Saint-Pierre yakoresheje kugira ngo adondore inzego za politike be n’uko zikeneye gutunganirizwa ubudasiba?
answer: Yazigereranije n’amasaha akeneye guzingwa ubudasiba .
wrong_answers:
  - Yazigereranije n’imirima ikeneye kwama ivomerwa kandi igakata .
  - Yazigereranije n’amamashini akenera guhindura amavuta no gusanura rimwe na rimwe .
  - Yazigereranije n’inyubakwa zikeneye gusuzumwa ubudasiba .
explanation: |
  Abbé de Saint-Pierre yagereranije canecane inzego za politike n’amasaha (horloges) asaba guhindurwa ubudasiba kugira ngo abandanye gukora neza. Iyi mvugo ngereranyo yerekana ko inzego zikeneye gukomeza kwitwararikwa, guhanahana ivyiyumviro no guhindurwa kugira ngo zigume zikora neza kandi zisubiza ivyo abantu bakeneye. Ibindi bigereranyo, naho bisa mu vyiyumviro mu gutanga iciyumviro c’ivyo gutunganywa, si vyo bigereranywa nyavyo vyakozwe na Abbé de Saint-Pierre mu canditswe kandi vyoshobora guserura ivyiyumviro bitandukanye vya filozofiya ku bijanye no gutunganywa kw’inzego.
question: What comparison did Abbé de Saint-Pierre use to describe political institutions and their need for regular maintenance?
answer: He compared them to clocks that need to be wound up regularly
wrong_answers:
  - He compared them to gardens that need constant watering and pruning
  - He compared them to machines that need periodic oil changes and repairs
  - He compared them to buildings that need regular structural inspections
explanation: |
  Abbé de Saint-Pierre specifically compared political institutions to clocks (horloges) that require regular winding to continue functioning properly. This metaphor illustrates that institutions need ongoing attention, debate, and reform to remain effective and responsive to society's needs. The other comparisons, while conceptually similar in suggesting maintenance needs, are not the actual comparison made by Abbé de Saint-Pierre in the text and would represent different philosophical perspectives on institutional maintenance.

question: Vilken jämförelse använde Abbé de Saint-Pierre för att beskriva politiska institutioner och deras behov av regelbundet underhåll?
answer: Han jämförde dem med klockor som måste dras upp regelbundet
wrong_answers:
  - Han jämförde dem med trädgårdar som ständigt behöver vattnas och beskäras
  - Han jämförde dem med maskiner som behöver oljebyten och reparationer med jämna mellanrum
  - Han jämförde dem med byggnader som behöver regelbundna strukturella inspektioner
explanation: |
  Abbé de Saint-Pierre jämförde politiska institutioner med klockor (horloges) som behöver dras upp regelbundet för att fortsätta fungera korrekt. Denna metafor illustrerar att institutionerna behöver kontinuerlig uppmärksamhet, debatt och reformer för att förbli effektiva och svara mot samhällets behov. De andra jämförelserna, även om de begreppsmässigt liknar varandra genom att antyda underhållsbehov, är inte den faktiska jämförelse som Abbé de Saint-Pierre gör i texten och skulle representera olika filosofiska perspektiv på institutionellt underhåll.
question: Abbé de Saint-Pierre เปรียบเทียบสถาบันทางการเมืองกับเครื่องจักรที่ต้องการการบำรุงรักษาอย่างสม่ำเสมอ
answer: เขาเปรียบเทียบพวกเขากับนาฬิกาที่ต้องไขลานเป็นประจำ
wrong_answers:
  - เขาเปรียบเทียบพวกเขากับสวนที่ต้องรดน้ำและตัดแต่งกิ่งอย่างสม่ำเสมอ
  - เขาเปรียบเทียบพวกเขากับเครื่องจักรที่ต้องการการเปลี่ยนน้ำมันและการซ่อมแซมเป็นระยะ
  - เขาเปรียบเทียบพวกเขากับอาคารที่ต้องมีการตรวจสอบโครงสร้างเป็นประจำ
explanation: |
  Abbé de Saint-Pierre เปรียบเทียบสถาบันทางการเมืองกับนาฬิกา (horloges) ที่ต้องการการไขลานอย่างสม่ำเสมอเพื่อให้ทำงานได้อย่างถูกต้อง การเปรียบเทียบนี้แสดงให้เห็นว่าสถาบันต่าง ๆ ต้องการความสนใจ การอภิปราย และการปฏิรูปอย่างต่อเนื่องเพื่อให้มีประสิทธิภาพและตอบสนองต่อความต้องการของสังคม การเปรียบเทียบอื่น ๆ แม้จะคล้ายกันในแนวคิดที่แนะนำถึงความต้องการในการบำรุงรักษา แต่ก็ไม่ใช่การเปรียบเทียบที่ Abbé de Saint-Pierre ทำในข้อความและจะเป็นตัวแทนของมุมมองทางปรัชญาที่แตกต่างกันเกี่ยวกับการบำรุงรักษาสถาบัน
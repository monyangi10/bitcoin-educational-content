question: Koje je poređenje Abbé de Saint-Pierre koristio da opiše političke institucije i njihovu potrebu za redovnim održavanjem?
answer: Uporedio ih je sa satovima koje treba redovno navijati.
wrong_answers:
  - Uporedio ih je sa baštama koje treba stalno zalivati i orezivati.
  - Uporedio ih je sa mašinama koje zahtevaju periodične promene ulja i popravke.
  - Uporedio ih je sa zgradama koje zahtevaju redovne strukturne inspekcije
explanation: |
  Abbé de Saint-Pierre je posebno uporedio političke institucije sa satovima (horloges) koji zahtevaju redovno navijanje kako bi nastavili da funkcionišu ispravno. Ova metafora ilustruje da institucijama treba stalna pažnja, debata i reforma kako bi ostale efikasne i odgovarale potrebama društva. Ostala poređenja, iako konceptualno slična u sugerisanju potreba za održavanjem, nisu stvarno poređenje koje je napravio Abbé de Saint-Pierre u tekstu i predstavljala bi različite filozofske perspektive o održavanju institucija.
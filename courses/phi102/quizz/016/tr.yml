question: Abbé de Saint-Pierre siyasi kurumları ve bunların düzenli bakım ihtiyacını tanımlamak için hangi karşılaştırmayı kullanmıştır?
answer: Onları düzenli olarak kurulması gereken saatlere benzetti
wrong_answers:
  - Onları sürekli sulanması ve budanması gereken bahçelere benzetti
  - Onları periyodik yağ değişimi ve onarım gerektiren makinelerle karşılaştırdı
  - Onları düzenli olarak yapısal denetimden geçirilmesi gereken binalarla karşılaştırdı
explanation: |
  Abbé de Saint-Pierre özellikle siyasi kurumları, düzgün bir şekilde çalışmaya devam etmek için düzenli olarak kurmaya ihtiyaç duyan saatlere (horloges) benzetmiştir. Bu metafor, kurumların etkili ve toplumun ihtiyaçlarına cevap verebilir durumda kalabilmeleri için sürekli dikkat, tartışma ve reforma ihtiyaç duyduklarını göstermektedir. Diğer karşılaştırmalar, kavramsal olarak bakım ihtiyaçlarına işaret etmeleri bakımından benzer olsalar da, Abbé de Saint-Pierre'in metinde yaptığı asıl karşılaştırma değildir ve kurumsal bakıma ilişkin farklı felsefi bakış açılarını temsil etmektedir.
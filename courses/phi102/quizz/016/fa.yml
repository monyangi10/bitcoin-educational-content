question: آبه دو سن-پیر از چه مقایسه‌ای برای توصیف نهادهای سیاسی و نیاز آنها به نگهداری منظم استفاده کرد؟
answer: او آنها را به ساعت‌هایی تشبیه کرد که نیاز به کوک کردن منظم دارند.
wrong_answers:
  - او آنها را به باغ‌هایی تشبیه کرد که نیاز به آبیاری و هرس مداوم دارند.
  - او آنها را به ماشین‌هایی تشبیه کرد که نیاز به تعویض روغن و تعمیرات دوره‌ای دارند
  - او آنها را به ساختمان‌هایی که نیاز به بازرسی‌های منظم ساختاری دارند مقایسه کرد.
explanation: |
  آبه دو سن پیر به طور خاص نهادهای سیاسی را به ساعت‌هایی (horloges) تشبیه کرد که برای ادامه عملکرد صحیح نیاز به کوک منظم دارند. این استعاره نشان می‌دهد که نهادها برای باقی ماندن در حالت مؤثر و پاسخگو به نیازهای جامعه، به توجه مداوم، بحث و اصلاح نیاز دارند. مقایسه‌های دیگر، اگرچه از نظر مفهومی در پیشنهاد نیاز به نگهداری مشابه هستند، اما مقایسه واقعی انجام شده توسط آبه دو سن پیر در متن نیستند و نمایانگر دیدگاه‌های فلسفی متفاوتی در مورد نگهداری نهادها خواهند بود.
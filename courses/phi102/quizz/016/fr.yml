question: Quelle comparaison l'abbé de Saint-Pierre utilise-t-il pour décrire les institutions politiques et leur besoin d'entretien régulier ?
answer: Il les a comparés à des horloges qu'il faut remonter régulièrement
wrong_answers:
  - Il les a comparés à des jardins qui ont besoin d'être arrosés et taillés en permanence
  - Il les a comparés à des machines qui nécessitent des vidanges et des réparations périodiques
  - Il les a comparés à des bâtiments qui doivent faire l'objet d'inspections structurelles régulières
explanation: |
  L'abbé de Saint-Pierre a comparé les institutions politiques à des horloges qui ont besoin d'être remontées régulièrement pour continuer à fonctionner correctement. Cette métaphore illustre le fait que les institutions ont besoin d'une attention, d'un débat et d'une réforme continus pour rester efficaces et répondre aux besoins de la société. Les autres comparaisons, bien que conceptuellement similaires en ce qu'elles suggèrent des besoins de maintenance, ne sont pas la comparaison réelle faite par l'abbé de Saint-Pierre dans le texte et représenteraient des perspectives philosophiques différentes sur la maintenance des institutions.
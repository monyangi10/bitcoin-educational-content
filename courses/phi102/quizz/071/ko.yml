question: 농업이 발달하기 전 초기 인류 사회의 주요 경제적 특징은 무엇이었나요?
answer: 그들은 새로운 부를 창출하지 않고 사냥, 낚시, 채집을 통해 기존 자원을 추출하는 데 의존했습니다
wrong_answers:
  - 그들은 자원을 얻기 위해 이웃 부족과 거래할 도구와 무기를 만드는 데 집중했습니다
  - 그들은 복잡한 농업 시스템을 개발했지만 상당한 잉여를 창출할 기술이 부족했습니다
  - 그들은 겨울철 식량을 효율적으로 생산하고 저장할 수 있는 영구 정착지를 마련했습니다
explanation: |
  텍스트에 따르면 초기 인류 사회는 새로운 부를 생산하지 않고 사냥, 낚시, 채집을 통해 주변 환경으로부터 자원을 추출하는 '파괴의 경제'로 운영되었습니다. 이 시스템은 자원의 자연적 재생에 전적으로 의존하게 만들었고, 이로 인해 집단 규모가 제한되고 복잡한 사회의 출현을 막았습니다. 다른 옵션은 나중에 농업 발전과 기술 진보로 인해 더 발전된 경제 활동을 설명하기 때문에 틀린 답입니다.
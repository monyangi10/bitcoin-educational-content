question: 農耕が発達する以前の初期の人類社会の主な経済的特徴は何か？
answer: 彼らは新たな富を生み出すことなく、狩猟、漁労、採集を通じて既存の資源を採取することに頼っていた。
wrong_answers:
  - 彼らは近隣の部族と交易して資源を得るため、道具や武器の製造に力を注いだ。
  - 彼らは複雑な農業システムを開発したが、大きな余剰を生み出す技術には欠けていた。
  - 彼らは恒久的な集落を築き、そこで冬のための食料を効率的に生産し、貯蔵することができた。
explanation: |
  本文によれば、初期の人類社会は「破壊の経済」を営んでおり、新たな富を生み出さず、狩猟、漁労、採集を通じて環境から資源を採取していた。このシステムは、資源の自然再生に完全に依存するものであり、集団の規模を制限し、複雑な社会の出現を妨げた。他の選択肢は、農業の発展や技術の進歩に伴って後に登場した、より高度な経済活動について述べているため、不正解である。
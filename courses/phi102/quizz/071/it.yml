question: Qual era la caratteristica economica principale delle prime società umane prima dello sviluppo dell'agricoltura?
answer: Si basavano sull'estrazione delle risorse esistenti attraverso la caccia, la pesca e la raccolta, senza creare nuove ricchezze
wrong_answers:
  - Si concentrarono sulla produzione di strumenti e armi per commerciare con le tribù vicine in cambio di risorse
  - Hanno sviluppato sistemi complessi di agricoltura, ma non hanno avuto la tecnologia necessaria per creare eccedenze significative
  - Stabilirono insediamenti permanenti dove poter produrre e conservare in modo efficiente il cibo per l'inverno
explanation: |
  Secondo il testo, le prime società umane operavano con una "economia della distruzione", in cui non producevano nuove ricchezze ma estraevano risorse dall'ambiente attraverso la caccia, la pesca e la raccolta. Questo sistema li rendeva completamente dipendenti dal rinnovo naturale delle risorse, limitando le dimensioni dei gruppi e impedendo la nascita di società complesse. Le altre opzioni non sono corrette perché descrivono attività economiche più avanzate che si sono sviluppate successivamente con lo sviluppo agricolo e il progresso tecnologico.
question: 在農業發展之前，早期人類社會的主要經濟特徵是什麼？
answer: 他們依靠狩獵、捕魚和採集來獲取現有的資源，而沒有創造新的財富。
wrong_answers:
  - 他們專注於製造工具和武器，與鄰近部落交易資源
  - 他們發展了複雜的農業系統，但缺乏技術來創造大量盈餘。
  - 他們建立了永久的聚落，可以有效率地生產和儲存過冬的食物。
explanation: |
  根據文中所述，早期人類社會以「破壞經濟」的方式運作，他們不生產新的財富，而是透過狩獵、捕魚和採集從環境中擷取資源。這個系統使他們完全依賴資源的自然更新，這限制了族群的規模，也阻止了複雜社會的出現。其他選項是不正確的，因為它們描述的是後來隨著農業發展和科技進步而出現的更先進的經濟活動。
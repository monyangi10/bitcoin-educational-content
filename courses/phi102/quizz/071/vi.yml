question: Đặc điểm kinh tế chủ yếu của các xã hội loài người thời kỳ đầu trước khi nông nghiệp phát triển là gì?
answer: Họ dựa vào việc khai thác các nguồn tài nguyên hiện có thông qua săn bắn, đánh bắt cá và hái lượm mà không tạo ra của cải mới.
wrong_answers:
  - Họ tập trung vào việc chế tạo công cụ và vũ khí để trao đổi với các bộ lạc lân cận nhằm lấy tài nguyên.
  - Họ đã phát triển các hệ thống nông nghiệp phức tạp nhưng lại thiếu công nghệ để tạo ra thặng dư đáng kể.
  - Họ lập nên các khu định cư lâu dài, nơi họ có thể sản xuất và dự trữ lương thực một cách hiệu quả cho mùa đông.
explanation: |
  Theo văn bản, các xã hội loài người thời kỳ đầu hoạt động dựa trên "nền kinh tế hủy diệt", nơi họ không tạo ra của cải mới mà thay vào đó khai thác tài nguyên từ môi trường thông qua săn bắn, đánh bắt cá và hái lượm. Hệ thống này khiến họ hoàn toàn phụ thuộc vào sự tái tạo tự nhiên của tài nguyên, điều này hạn chế quy mô nhóm và ngăn cản sự hình thành các xã hội phức tạp. Các lựa chọn khác không chính xác vì chúng mô tả các hoạt động kinh tế tiên tiến hơn xuất hiện sau này cùng với sự phát triển nông nghiệp và tiến bộ công nghệ.
question: Mis oli varaste inimühiskondade peamine majanduslik tunnus enne põllumajanduse arengut?
answer: Nad tuginesid olemasolevate ressursside kaevandamisele jahi, kalapüügi ja kogumise kaudu, ilma et nad oleksid loonud uut rikkust
wrong_answers:
  - Nad keskendusid tööriistade ja relvade valmistamisele, et kaubelda naaberhõimudega ressursside eest
  - Nad arendasid välja keerulised põllumajandussüsteemid, kuid neil puudus tehnoloogia märkimisväärse ülejäägi loomiseks
  - Nad rajasid alalisi asulaid, kus nad said tõhusalt toota ja säilitada talviseks ajaks toitu
explanation: |
  Teksti kohaselt toimisid varased inimühiskonnad "hävitamismajanduse" alusel, kus nad ei tootnud uut rikkust, vaid võetavad ressursse oma keskkonnast jahipidamise, kalapüügi ja kogumise teel. See süsteem muutis nad täielikult sõltuvaks loodusvarade looduslikust uuenemisest, mis piiras rühmade suurust ja takistas keeruliste ühiskondade tekkimist. Teised valikud on valed, sest need kirjeldavad arenenumat majandustegevust, mis tekkis hiljem põllumajanduse arengu ja tehnoloogilise progressiga.
question: ¿Cuál era la principal característica económica de las primeras sociedades humanas antes del desarrollo de la agricultura?
answer: Se basaban en la extracción de los recursos existentes mediante la caza, la pesca y la recolección, sin crear nuevas riquezas
wrong_answers:
  - Se centraron en la fabricación de herramientas y armas para comerciar con las tribus vecinas en busca de recursos
  - Desarrollaron sistemas complejos de agricultura pero carecían de la tecnología necesaria para crear excedentes significativos
  - Establecieron asentamientos permanentes donde podían producir y almacenar alimentos para el invierno
explanation: |
  Según el texto, las primeras sociedades humanas funcionaban con una "economía de destrucción" en la que no producían nuevas riquezas, sino que extraían recursos de su entorno mediante la caza, la pesca y la recolección. Este sistema les hacía completamente dependientes de la renovación natural de los recursos, lo que limitaba el tamaño de los grupos e impedía la aparición de sociedades complejas. Las otras opciones son incorrectas porque describen actividades económicas más avanzadas que llegaron más tarde con el desarrollo agrícola y el progreso tecnológico.
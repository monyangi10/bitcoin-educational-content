question: Hva var det viktigste økonomiske kjennetegnet ved de tidlige menneskelige samfunnene før jordbruket ble utviklet?
answer: De baserte seg på å utvinne eksisterende ressurser gjennom jakt, fiske og sanking uten å skape ny rikdom
wrong_answers:
  - De fokuserte på å produsere verktøy og våpen for å handle med nabostammene om ressurser
  - De utviklet komplekse jordbrukssystemer, men manglet teknologien til å skape et betydelig overskudd
  - De etablerte permanente bosetninger der de effektivt kunne produsere og lagre mat for vinteren
explanation: |
  Ifølge teksten opererte de tidlige menneskesamfunnene med en "ødeleggelsens økonomi", der de ikke produserte ny rikdom, men i stedet hentet ut ressurser fra omgivelsene gjennom jakt, fiske og sanking. Dette systemet gjorde dem helt avhengige av den naturlige fornyelsen av ressurser, noe som begrenset gruppestørrelsene og forhindret fremveksten av komplekse samfunn. De andre alternativene er feil fordi de beskriver mer avanserte økonomiske aktiviteter som kom senere med jordbruksutviklingen og teknologiske fremskritt.
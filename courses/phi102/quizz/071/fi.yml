question: Mikä oli varhaisten ihmisyhteisöjen ensisijainen taloudellinen ominaisuus ennen maanviljelyn kehittymistä?
answer: He luottivat olemassa olevien luonnonvarojen hyödyntämiseen metsästämällä, kalastamalla ja keräämällä luomatta uutta vaurautta
wrong_answers:
  - He keskittyivät valmistamaan työkaluja ja aseita käydäkseen kauppaa naapuriheimojen kanssa resursseista
  - Ne kehittivät monimutkaisia maatalousjärjestelmiä, mutta niillä ei ollut teknologiaa merkittävän ylijäämän tuottamiseksi
  - He perustivat pysyviä siirtokuntia, joissa he pystyivät tehokkaasti tuottamaan ja varastoimaan ruokaa talven varalle
explanation: |
  Tekstin mukaan varhaiset ihmisyhteisöt toimivat "tuhon taloudessa", jossa ne eivät tuottaneet uutta vaurautta vaan ottivat resursseja ympäristöstään metsästämällä, kalastamalla ja keräämällä. Tämä järjestelmä teki ihmisistä täysin riippuvaisia luonnonvarojen uusiutumisesta, mikä rajoitti ryhmäkokoja ja esti monimutkaisten yhteiskuntien syntymisen. Muut vaihtoehdot ovat virheellisiä, koska ne kuvaavat kehittyneempää taloudellista toimintaa, joka syntyi myöhemmin maatalouden kehityksen ja teknisen kehityksen myötä.
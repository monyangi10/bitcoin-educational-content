question: Quelle était la principale caractéristique économique des premières sociétés humaines avant le développement de l'agriculture ?
answer: Ils s'appuyaient sur l'extraction des ressources existantes par la chasse, la pêche et la cueillette, sans créer de nouvelles richesses
wrong_answers:
  - Ils se sont concentrés sur la fabrication d'outils et d'armes pour commercer avec les tribus voisines afin d'obtenir des ressources
  - Ils ont mis au point des systèmes agricoles complexes, mais n'avaient pas la technologie nécessaire pour créer des excédents importants
  - Ils ont établi des colonies permanentes où ils pouvaient produire et stocker efficacement de la nourriture pour l'hiver
explanation: |
  Selon le texte, les premières sociétés humaines fonctionnaient selon une "économie de la destruction" : elles ne produisaient pas de nouvelles richesses, mais extrayaient les ressources de leur environnement par la chasse, la pêche et la cueillette. Ce système les rendait complètement dépendants du renouvellement naturel des ressources, ce qui limitait la taille des groupes et empêchait l'émergence de sociétés complexes. Les autres options sont incorrectes car elles décrivent des activités économiques plus avancées qui sont apparues plus tard avec le développement de l'agriculture et le progrès technologique.
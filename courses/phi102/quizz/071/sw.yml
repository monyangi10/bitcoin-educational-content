question: Je, sifa kuu ya kiuchumi ya jamii za mwanzo za wanadamu kabla ya maendeleo ya kilimo ilikuwa ipi?
answer: Walitegemea kupata rasilimali zilizopo kupitia uwindaji, uvuvi, na kukusanya bila kuunda utajiri mpya.
wrong_answers:
  - Walijikita katika kutengeneza zana na silaha ili kufanya biashara na makabila jirani kwa ajili ya rasilimali
  - Waliunda mifumo tata ya kilimo lakini hawakuwa na teknolojia ya kuzalisha ziada kubwa
  - Walianzisha makazi ya kudumu ambapo wangeweza kuzalisha na kuhifadhi chakula kwa ufanisi kwa ajili ya majira ya baridi kali.
explanation: |
  Kulingana na maandishi hayo, jamii za awali za wanadamu ziliendeshwa kwa 'uchumi wa uharibifu' ambapo hazikuzaa utajiri mpya bali badala yake zilitoa rasilimali kutoka kwa mazingira yao kupitia uwindaji, uvuvi, na ukusanyaji. Mfumo huu uliwafanya wategemee kabisa upyaji wa asili wa rasilimali, ambao ulipunguza ukubwa wa makundi na kuzuia kuibuka kwa jamii tata. Chaguzi zingine si sahihi kwa sababu zinaelezea shughuli za kiuchumi zilizoendelea zaidi zilizokuja baadaye na maendeleo ya kilimo na maendeleo ya kiteknolojia.
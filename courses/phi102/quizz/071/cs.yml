question: Jaká byla hlavní ekonomická charakteristika raných lidských společností před rozvojem zemědělství?
answer: Spoléhali se na těžbu existujících zdrojů lovem, rybolovem a sběrem, aniž by vytvářeli nové bohatství
wrong_answers:
  - Zaměřili se na výrobu nástrojů a zbraní, aby mohli obchodovat se sousedními kmeny o zdroje
  - Vyvinuli složité zemědělské systémy, ale neměli technologie, které by jim umožnily vytvářet významné přebytky
  - Zakládali stálá sídla, kde mohli efektivně vyrábět a skladovat potraviny na zimu
explanation: |
  Podle textu fungovaly rané lidské společnosti na principu "ekonomiky destrukce", kdy nevytvářely nové bohatství, ale získávaly zdroje ze svého prostředí lovem, rybolovem a sběrem. Tento systém je činil zcela závislými na přirozené obnově zdrojů, což omezovalo velikost skupin a bránilo vzniku komplexních společností. Ostatní možnosti jsou nesprávné, protože popisují pokročilejší ekonomické aktivity, které přišly později s rozvojem zemědělství a technologickým pokrokem.
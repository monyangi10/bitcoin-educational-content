question: Qual era a principal caraterística económica das sociedades humanas primitivas antes do desenvolvimento da agricultura?
answer: Baseavam-se na extração dos recursos existentes através da caça, da pesca e da recolha, sem criar novas riquezas
wrong_answers:
  - Concentravam-se no fabrico de ferramentas e armas para negociar recursos com as tribos vizinhas
  - Desenvolveram sistemas complexos de agricultura, mas não dispunham de tecnologia para criar excedentes significativos
  - Estabeleceram povoações permanentes onde podiam produzir e armazenar eficazmente os alimentos para o inverno
explanation: |
  De acordo com o texto, as sociedades humanas primitivas funcionavam com base numa "economia de destruição", em que não produziam novas riquezas, mas extraíam recursos do seu ambiente através da caça, da pesca e da recolha. Este sistema tornava-os completamente dependentes da renovação natural dos recursos, o que limitava a dimensão dos grupos e impedia o aparecimento de sociedades complexas. As outras opções estão incorrectas porque descrevem actividades económicas mais avançadas que surgiram mais tarde com o desenvolvimento da agricultura e o progresso tecnológico.
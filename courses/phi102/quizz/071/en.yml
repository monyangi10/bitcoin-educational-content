question: What was the primary economic characteristic of early human societies before the development of agriculture?
answer: They relied on extracting existing resources through hunting, fishing, and gathering without creating new wealth
wrong_answers:
  - They focused on manufacturing tools and weapons to trade with neighboring tribes for resources
  - They developed complex systems of agriculture but lacked the technology to create significant surplus
  - They established permanent settlements where they could efficiently produce and store food for winter
explanation: |
  According to the text, early human societies operated on an 'economy of destruction' where they did not produce new wealth but instead extracted resources from their environment through hunting, fishing, and gathering. This system made them completely dependent on the natural renewal of resources, which limited group sizes and prevented the emergence of complex societies. The other options are incorrect because they describe more advanced economic activities that came later with agricultural development and technological progress.

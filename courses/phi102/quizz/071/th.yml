question: ลักษณะทางเศรษฐกิจหลักของสังคมมนุษย์ยุคแรกก่อนการพัฒนาการเกษตรคืออะไร?
answer: พวกเขาพึ่งพาการสกัดทรัพยากรที่มีอยู่ผ่านการล่าสัตว์ การตกปลา และการเก็บเกี่ยว โดยไม่สร้างความมั่งคั่งใหม่
wrong_answers:
  - พวกเขามุ่งเน้นการผลิตเครื่องมือและอาวุธเพื่อแลกเปลี่ยนกับชนเผ่าใกล้เคียงสำหรับทรัพยากร
  - พวกเขาพัฒนาระบบการเกษตรที่ซับซ้อนแต่ขาดเทคโนโลยีในการสร้างส่วนเกินที่มีนัยสำคัญ
  - พวกเขาได้ก่อตั้งถิ่นฐานถาวรที่พวกเขาสามารถผลิตและเก็บรักษาอาหารสำหรับฤดูหนาวได้อย่างมีประสิทธิภาพ
explanation: |
  ตามข้อความ สังคมมนุษย์ยุคแรกดำเนินการบน 'เศรษฐกิจแห่งการทำลายล้าง' ซึ่งพวกเขาไม่ได้สร้างความมั่งคั่งใหม่ แต่กลับสกัดทรัพยากรจากสิ่งแวดล้อมผ่านการล่าสัตว์ การตกปลา และการเก็บของป่า ระบบนี้ทำให้พวกเขาพึ่งพาการฟื้นฟูตามธรรมชาติของทรัพยากรอย่างสมบูรณ์ ซึ่งจำกัดขนาดของกลุ่มและป้องกันการเกิดขึ้นของสังคมที่ซับซ้อน ตัวเลือกอื่น ๆ ไม่ถูกต้องเพราะพวกเขาอธิบายกิจกรรมทางเศรษฐกิจที่ก้าวหน้ามากขึ้นซึ่งเกิดขึ้นในภายหลังพร้อมกับการพัฒนาทางการเกษตรและความก้าวหน้าทางเทคโนโลยี
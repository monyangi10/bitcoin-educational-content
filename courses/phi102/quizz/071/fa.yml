question: ویژگی اصلی اقتصادی جوامع انسانی اولیه قبل از توسعه کشاورزی چه بود؟
answer: آن‌ها به استخراج منابع موجود از طریق شکار، ماهیگیری و جمع‌آوری متکی بودند بدون اینکه ثروت جدیدی ایجاد کنند.
wrong_answers:
  - آن‌ها بر تولید ابزار و سلاح‌ها تمرکز کردند تا با قبایل همسایه برای منابع تجارت کنند.
  - آن‌ها سیستم‌های پیچیده‌ای از کشاورزی را توسعه دادند اما فاقد فناوری لازم برای ایجاد مازاد قابل توجه بودند.
  - آن‌ها سکونتگاه‌های دائمی ایجاد کردند که در آنجا می‌توانستند به‌طور مؤثر غذا برای زمستان تولید و ذخیره کنند.
explanation: |
  بر اساس متن، جوامع اولیه انسانی بر اساس "اقتصاد تخریب" عمل می‌کردند، جایی که آن‌ها ثروت جدیدی تولید نمی‌کردند بلکه از طریق شکار، ماهیگیری و جمع‌آوری منابع از محیط خود استخراج می‌کردند. این سیستم آن‌ها را کاملاً به تجدید طبیعی منابع وابسته می‌کرد که اندازه گروه‌ها را محدود می‌کرد و مانع از ظهور جوامع پیچیده می‌شد. گزینه‌های دیگر نادرست هستند زیرا فعالیت‌های اقتصادی پیشرفته‌تری را توصیف می‌کنند که بعداً با توسعه کشاورزی و پیشرفت فناوری به وجود آمدند.
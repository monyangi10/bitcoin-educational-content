question: Apa karakteristik ekonomi utama masyarakat manusia purba sebelum perkembangan pertanian?
answer: Mereka mengandalkan ekstraksi sumber daya yang ada melalui berburu, menangkap ikan, dan meramu tanpa menciptakan kekayaan baru
wrong_answers:
  - Mereka berfokus pada pembuatan alat dan senjata untuk diperdagangkan dengan suku-suku tetangga untuk mendapatkan sumber daya
  - Mereka mengembangkan sistem pertanian yang kompleks tetapi tidak memiliki teknologi untuk menciptakan surplus yang signifikan
  - Mereka mendirikan pemukiman permanen di mana mereka dapat memproduksi dan menyimpan makanan untuk musim dingin secara efisien
explanation: |
  Menurut teks tersebut, masyarakat manusia purba beroperasi dengan 'ekonomi kehancuran' di mana mereka tidak menghasilkan kekayaan baru, melainkan mengekstraksi sumber daya dari lingkungan mereka melalui berburu, memancing, dan meramu. Sistem ini membuat mereka sepenuhnya bergantung pada pembaruan sumber daya secara alami, yang membatasi ukuran kelompok dan mencegah munculnya masyarakat yang kompleks. Pilihan lainnya tidak tepat karena menggambarkan kegiatan ekonomi yang lebih maju yang muncul kemudian dengan perkembangan pertanian dan kemajuan teknologi.
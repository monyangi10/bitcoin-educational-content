question: 在农业发展之前，早期人类社会的主要经济特征是什么？
answer: 他们依靠狩猎、捕鱼和采集来获取现有资源，而不创造新的财富
wrong_answers:
  - 他们专注于制造工具和武器，与周边部落进行资源贸易
  - 他们发展了复杂的农业系统，但缺乏创造大量盈余的技术
  - 他们建立了永久性定居点，在那里可以有效地生产和储存过冬食物
explanation: |
  根据课文内容，早期人类社会是在 "毁灭经济 "的基础上运行的，他们不生产新的财富，而是通过狩猎、捕鱼和采集从环境中获取资源。这种制度使他们完全依赖于资源的自然更新，这限制了群体的规模，阻碍了复杂社会的出现。其他选项不正确，因为它们描述的是后来随着农业发展和技术进步而出现的更先进的经济活动。
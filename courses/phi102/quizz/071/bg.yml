question: Каква е основната икономическа характеристика на ранните човешки общества преди развитието на земеделието?
answer: Разчитали са на извличането на съществуващите ресурси чрез лов, риболов и събирателство, без да създават нови богатства
wrong_answers:
  - Те се съсредоточават върху производството на инструменти и оръжия за търговия със съседните племена за ресурси
  - Те са развили сложни системи на земеделие, но не са разполагали с технологии за създаване на значителен излишък
  - Те създават постоянни селища, където могат ефективно да произвеждат и съхраняват храна за зимата
explanation: |
  Според текста ранните човешки общества са работили в условията на "икономика на разрушението", при която те не са произвеждали нови блага, а са извличали ресурси от околната среда чрез лов, риболов и събирателство. Тази система ги е направила напълно зависими от естественото обновяване на ресурсите, което е ограничило размера на групите и е попречило на възникването на сложни общества. Другите варианти са неправилни, защото описват по-напреднали икономически дейности, които се появяват по-късно с развитието на земеделието и технологичния прогрес.
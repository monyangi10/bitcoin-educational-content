question: Wat was het belangrijkste economische kenmerk van de vroege menselijke samenlevingen vóór de ontwikkeling van de landbouw?
answer: Ze vertrouwden op het ontginnen van bestaande hulpbronnen door middel van jagen, vissen en verzamelen zonder nieuwe rijkdom te creëren
wrong_answers:
  - Ze richtten zich op het maken van gereedschappen en wapens om te handelen met naburige stammen voor grondstoffen
  - Ze ontwikkelden complexe landbouwsystemen, maar misten de technologie om aanzienlijke overschotten te creëren
  - Ze vestigden permanente nederzettingen waar ze efficiënt voedsel konden produceren en opslaan voor de winter
explanation: |
  Volgens de tekst werkten vroege menselijke samenlevingen op basis van een 'economie van vernietiging', waarbij ze geen nieuwe rijkdom produceerden maar in plaats daarvan hulpbronnen uit hun omgeving haalden door te jagen, vissen en verzamelen. Dit systeem maakte hen volledig afhankelijk van de natuurlijke vernieuwing van hulpbronnen, wat de groepsgrootte beperkte en het ontstaan van complexe samenlevingen verhinderde. De andere opties zijn onjuist omdat ze meer geavanceerde economische activiteiten beschrijven die later kwamen met de ontwikkeling van de landbouw en technologische vooruitgang.
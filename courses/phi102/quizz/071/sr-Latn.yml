question: Primarna ekonomska karakteristika ranih ljudskih društava pre razvoja poljoprivrede bila je lov i sakupljanje.
answer: Oni su se oslanjali na iskorišćavanje postojećih resursa kroz lov, ribolov i sakupljanje bez stvaranja novog bogatstva.
wrong_answers:
  - Fokusirali su se na proizvodnju alata i oružja kako bi trgovali sa susednim plemenima za resurse.
  - Razvili su složene sisteme poljoprivrede, ali im je nedostajala tehnologija za stvaranje značajnog viška.
  - Osnovali su stalna naselja gde su mogli efikasno proizvoditi i skladištiti hranu za zimu.
explanation: |
  Prema tekstu, rane ljudske zajednice su funkcionisale na 'ekonomiji uništenja' gde nisu proizvodile novo bogatstvo već su izvlačile resurse iz svoje okoline kroz lov, ribolov i sakupljanje. Ovaj sistem ih je činio potpuno zavisnim od prirodnog obnavljanja resursa, što je ograničavalo veličinu grupa i sprečavalo pojavu složenih društava. Ostale opcije su netačne jer opisuju naprednije ekonomske aktivnosti koje su došle kasnije sa razvojem poljoprivrede i tehnološkim napretkom.
question: Tarımın gelişmesinden önceki ilk insan toplumlarının temel ekonomik özelliği neydi?
answer: Yeni zenginlik yaratmadan avcılık, balıkçılık ve toplayıcılık yoluyla mevcut kaynakları çıkarmaya bel bağlamışlardır
wrong_answers:
  - Kaynaklar için komşu kabilelerle ticaret yapmak üzere alet ve silah üretimine odaklandılar
  - Karmaşık tarım sistemleri geliştirdiler ancak önemli miktarda üretim fazlası yaratacak teknolojiden yoksundular
  - Kış için verimli bir şekilde yiyecek üretip depolayabilecekleri kalıcı yerleşimler kurdular
explanation: |
  Metne göre, ilk insan toplumları yeni zenginlikler üretmek yerine avcılık, balıkçılık ve toplayıcılık yoluyla çevrelerinden kaynak elde ettikleri bir 'yıkım ekonomisi' üzerinde faaliyet göstermişlerdir. Bu sistem onları tamamen kaynakların doğal yenilenmesine bağımlı kılmış, bu da grup büyüklüklerini sınırlamış ve karmaşık toplumların ortaya çıkmasını engellemiştir. Diğer seçenekler, tarımsal gelişme ve teknolojik ilerleme ile daha sonra gelen daha gelişmiş ekonomik faaliyetleri tanımladıkları için yanlıştır.
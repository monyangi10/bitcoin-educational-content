question: Was war das wichtigste wirtschaftliche Merkmal der frühen menschlichen Gesellschaften vor der Entwicklung der Landwirtschaft?
answer: Sie verließen sich darauf, die vorhandenen Ressourcen durch Jagen, Fischen und Sammeln zu nutzen, ohne neuen Reichtum zu schaffen
wrong_answers:
  - Sie konzentrierten sich auf die Herstellung von Werkzeugen und Waffen, um mit benachbarten Stämmen um Ressourcen zu handeln
  - Sie entwickelten komplexe landwirtschaftliche Systeme, verfügten aber nicht über die Technologie, um erhebliche Überschüsse zu erzielen
  - Sie errichteten dauerhafte Siedlungen, in denen sie effizient Nahrungsmittel für den Winter produzieren und lagern konnten
explanation: |
  Dem Text zufolge basierten die frühen menschlichen Gesellschaften auf einer "Ökonomie der Zerstörung", in der sie keinen neuen Reichtum produzierten, sondern stattdessen durch Jagen, Fischen und Sammeln Ressourcen aus ihrer Umwelt entnahmen. Dieses System machte sie völlig abhängig von der natürlichen Erneuerung der Ressourcen, was die Gruppengröße begrenzte und die Entstehung komplexer Gesellschaften verhinderte. Die anderen Optionen sind falsch, da sie fortschrittlichere wirtschaftliche Aktivitäten beschreiben, die erst später mit der landwirtschaftlichen Entwicklung und dem technischen Fortschritt entstanden.
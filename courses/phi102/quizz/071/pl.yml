question: Jaka była główna cecha ekonomiczna wczesnych społeczeństw ludzkich przed rozwojem rolnictwa?
answer: Polegali oni na wydobywaniu istniejących zasobów poprzez łowiectwo, rybołówstwo i zbieractwo bez tworzenia nowego bogactwa
wrong_answers:
  - Skupili się na wytwarzaniu narzędzi i broni, by handlować z sąsiednimi plemionami w zamian za surowce
  - Rozwinęli oni złożone systemy rolnictwa, ale nie dysponowali technologią pozwalającą na wytworzenie znacznych nadwyżek
  - Założyli stałe osady, w których mogli efektywnie produkować i przechowywać żywność na zimę
explanation: |
  Zgodnie z tekstem, wczesne społeczeństwa ludzkie działały w oparciu o "ekonomię destrukcji", w której nie wytwarzały nowego bogactwa, ale zamiast tego wydobywały zasoby ze swojego środowiska poprzez polowanie, rybołówstwo i zbieractwo. System ten sprawił, że byli całkowicie zależni od naturalnego odnawiania się zasobów, co ograniczyło rozmiary grup i uniemożliwiło powstanie złożonych społeczeństw. Pozostałe opcje są nieprawidłowe, ponieważ opisują bardziej zaawansowane działania gospodarcze, które pojawiły się później wraz z rozwojem rolnictwa i postępem technologicznym.
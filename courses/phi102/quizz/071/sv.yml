question: Vilken var den primära ekonomiska egenskapen hos tidiga mänskliga samhällen innan jordbruket utvecklades?
answer: De förlitade sig på att utvinna befintliga resurser genom jakt, fiske och samlande utan att skapa nya rikedomar
wrong_answers:
  - De fokuserade på att tillverka verktyg och vapen för att kunna handla med grannstammar för att få resurser
  - De utvecklade komplexa jordbrukssystem men saknade tekniken för att skapa ett betydande överskott
  - De etablerade permanenta bosättningar där de på ett effektivt sätt kunde producera och lagra mat inför vintern
explanation: |
  Enligt texten bedrev de tidiga mänskliga samhällena en "förstörelsens ekonomi" där de inte producerade nya rikedomar utan istället utvann resurser från sin omgivning genom jakt, fiske och insamling. Detta system gjorde dem helt beroende av den naturliga förnyelsen av resurserna, vilket begränsade gruppstorlekarna och förhindrade uppkomsten av komplexa samhällen. De andra alternativen är felaktiga eftersom de beskriver mer avancerade ekonomiska aktiviteter som kom senare i och med jordbruksutvecklingen och de tekniska framstegen.
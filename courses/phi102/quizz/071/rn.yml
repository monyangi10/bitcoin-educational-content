question: Ni igiki cari ikintu nyamukuru kiranga ubutunzi bw’imiryango y’abantu ba kera imbere y’uko uburimyi butera imbere?
answer: Bari bizigiye gukura ubutunzi bwariho biciye mu guhigira, kuroba no kwegeranya ata butunzi bushasha bashizeho .
wrong_answers:
  - Baciye bibanda ku guhingura ibikoresho n’ibirwanisho vyo gucuruza n’imiryango ibakikije kugira ngo baronke ubutunzi .
  - Baciye bategura uburyo butoroshe bwo kurima ariko ntibagira ubuhinga bwo gutuma habaho amasaranganya menshi .
  - Bashinze amazu ahoraho aho bashobora guhingura neza no kubika ivyo barya mu gihe c’imbeho .
explanation: |
  Dukurikije ico canditswe, imiryango y’abantu ya kera yakoresha ‘ubutunzi bwo gusenyura’ aho itazana ubutunzi bushasha ahubwo yakura ubutunzi mu bidukikije vyayo biciye mu guhigira, kuroba no kwegeranya. Uwo murongo waratumye bava ku gusubira gusubirana kw’ibintu, ivyo bikaba vyagabanya ubunini bw’imigwi kandi bikabuza ko habaho imibano igoye. Ayandi mahitamwo ntabwo ari meza kuko adondora ibikorwa vy’ubutunzi vyateye imbere cane vyaje mu nyuma n’iterambere ry’uburimyi n’iterambere ry’ubuhinga.
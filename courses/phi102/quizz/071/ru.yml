question: Что было основной экономической характеристикой ранних человеческих обществ до развития сельского хозяйства?
answer: Они полагались на добычу существующих ресурсов с помощью охоты, рыболовства и собирательства, не создавая новых богатств
wrong_answers:
  - Они сосредоточились на изготовлении инструментов и оружия для торговли с соседними племенами за ресурсы
  - Они разработали сложные системы сельского хозяйства, но не имели технологий для создания значительных излишков
  - Они создавали постоянные поселения, где могли эффективно добывать и хранить пищу на зиму
explanation: |
  Согласно тексту, ранние человеческие общества работали по принципу "экономики разрушения", когда они не производили новых благ, а добывали ресурсы из окружающей среды с помощью охоты, рыбалки и собирательства. Такая система делала их полностью зависимыми от естественного возобновления ресурсов, что ограничивало размеры групп и препятствовало возникновению сложных обществ. Остальные варианты неверны, поскольку описывают более развитые виды экономической деятельности, которые появились позже, с развитием сельского хозяйства и технологического прогресса.
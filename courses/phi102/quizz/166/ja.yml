question: 19世紀の自由主義経済学者によれば、「コンクールの習慣」（douane des concours）制度が職業能力開発にもたらした主な結果とは何だったのだろうか？
answer: 個人を硬直化させ、イノベーターや発明家の出現を妨げた。
wrong_answers:
  - プロフェッショナルのための体系的な学習経路を構築することで、起業家的イノベーションを奨励した。
  - 政府が設計したカリキュラムを標準化することで、専門教育のコストを削減した。
  - 専門的な資格を誰でも取得できるようにすることで、競争を激化させた。
explanation: |
  ドゥアン・デ・コンクール」制度は、規制された学習チャンネルを作り出し、特定の職業に表面的には利益をもたらしたが、最終的にはイノベーションに害を及ぼした。この制度は、国家が設計したプログラムを起業家の進歩に代えることで、個人を厳格なルーティンワークに適合させ、その分野を発展させる天才、革新者、発明家の出現を妨げた。競争やイノベーションを促進するどころか、専門職の育成を決められたカリキュラムを暗記することに限定し、自由市場システムで自然に生じるはずの創造的進歩を抑制したのである。
question: Kulingana na wanauchumi huria wa karne ya 19, matokeo ya msingi ya mfumo wa 'desturi za mashindano' (douane des concours) kwenye maendeleo ya kitaaluma yalikuwa nini?
answer: Iliunda watu binafsi katika utendaji kazi mgumu na kuzuia kuibuka kwa wavumbuzi na wavumbuzi
wrong_answers:
  - Ilihimiza uvumbuzi wa ujasiriamali kwa kuunda njia zilizopangwa za kujifunza kwa wataalamu
  - Ilipunguza gharama ya elimu ya kitaaluma kwa kuweka mitaala iliyobuniwa na serikali katika viwango sawa.
  - Iliongeza ushindani kwa kufanya sifa za kitaaluma zipatikane kwa kila mtu
explanation: |
  Mfumo wa 'douane des concours' uliunda njia za kujifunza zilizodhibitiwa ambazo zilinufaisha fani fulani kijuujuu lakini hatimaye ziliharibu uvumbuzi. Kwa kubadilisha programu zilizoundwa na serikali kwa ajili ya maendeleo ya ujasiriamali, mfumo huu ulibadilisha watu kuwa utendaji kazi mgumu, wa kawaida ambao ulizuia kuibuka kwa wataalamu wenye akili, wavumbuzi, na wavumbuzi ambao wangeweza kuendeleza nyanja zao. Badala ya kukuza ushindani au uvumbuzi, ulipunguza maendeleo ya kitaaluma hadi kukariri mitaala iliyopangwa awali, na kukandamiza maendeleo ya ubunifu ambayo yangetokea kiasili katika mfumo wa soko huria.
question: Według XIX-wiecznych liberalnych ekonomistów, jaki był główny wpływ systemu "zwyczajów konkursowych" (douane des concours) na rozwój zawodowy?
answer: Sformatował jednostki do sztywnego funkcjonowania i uniemożliwił pojawienie się innowatorów i wynalazców
wrong_answers:
  - Zachęcał do innowacji w zakresie przedsiębiorczości poprzez tworzenie ustrukturyzowanych ścieżek kształcenia dla profesjonalistów
  - Zmniejszyło to koszty kształcenia zawodowego poprzez standaryzację programów nauczania opracowanych przez rząd
  - Zwiększyło to konkurencję, czyniąc kwalifikacje zawodowe bardziej dostępnymi dla każdego
explanation: |
  System "douane des concours" stworzył regulowane kanały edukacyjne, które przyniosły powierzchowne korzyści niektórym zawodom, ale ostatecznie zaszkodziły innowacjom. Zastępując programy zaprojektowane przez państwo rozwojem przedsiębiorczości, system ten formatował jednostki do sztywnego, rutynowego funkcjonowania, które uniemożliwiało pojawienie się geniuszy, innowatorów i wynalazców, którzy mogliby rozwijać swoje dziedziny. Zamiast promować konkurencję lub innowacje, ograniczał rozwój zawodowy do zapamiętywania z góry określonych programów nauczania, tłumiąc kreatywny postęp, który naturalnie pojawiłby się w systemie wolnorynkowym.
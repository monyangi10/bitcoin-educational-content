question: 根据 19 世纪自由主义经济学家的观点，"竞赛习俗"（douane des concours）制度对职业发展的主要影响是什么？
answer: 它使个人陷入僵化的运作模式，阻碍了创新者和发明家的出现
wrong_answers:
  - 通过为专业人员创建结构化的学习途径，鼓励创业创新
  - 通过将政府设计的课程标准化，降低了专业教育的成本
  - 它使每个人都更容易获得专业资格，从而增加了竞争
explanation: |
  douane des concours "制度创造了规范的学习渠道，表面上有利于某些行业，但最终却损害了创新。这种制度以国家设计的课程取代企业发展课程，使个人陷入僵化的例行公事中，从而阻碍了天才、创新者和发明家的出现，使他们无法推动各自领域的发展。它非但没有促进竞争或创新，反而将职业发展局限于死记硬背预定的课程，扼杀了自由市场体系中自然会出现的创造性进步。
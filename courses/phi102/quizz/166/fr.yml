question: Selon les économistes libéraux du XIXᵉ siècle, quelle est la principale conséquence du système de la "douane des concours" sur le développement professionnel ?
answer: Elle a formaté les individus à un fonctionnement rigide et a empêché l'émergence d'innovateurs et d'inventeurs
wrong_answers:
  - Elle a encouragé l'innovation entrepreneuriale en créant des parcours d'apprentissage structurés pour les professionnels
  - Elle a permis de réduire le coût de la formation professionnelle en normalisant les programmes d'études conçus par le gouvernement
  - Elle a renforcé la concurrence en rendant les qualifications professionnelles plus accessibles à tous
explanation: |
  Le système de la "douane des concours" a créé des canaux d'apprentissage réglementés qui ont profité superficiellement à certaines professions, mais qui ont finalement nui à l'innovation. En substituant des programmes conçus par l'État au développement de l'esprit d'entreprise, ce système a formaté les individus à un fonctionnement rigide et routinier qui a empêché l'émergence de génies, d'innovateurs et d'inventeurs capables de faire progresser leur domaine. Plutôt que de promouvoir la concurrence ou l'innovation, il a limité le développement professionnel à la mémorisation de programmes prédéterminés, étouffant ainsi le progrès créatif qui se produirait naturellement dans un système de marché libre.

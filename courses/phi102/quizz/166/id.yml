question: Menurut para ekonom liberal abad ke-19, apa konsekuensi utama dari sistem 'kebiasaan kompetisi' (douane des concours) terhadap pengembangan profesional?
answer: Ini memformat individu untuk berfungsi secara kaku dan mencegah munculnya inovator dan penemu
wrong_answers:
  - Mendorong inovasi kewirausahaan dengan menciptakan jalur pembelajaran yang terstruktur bagi para profesional
  - Ini mengurangi biaya pendidikan profesional dengan menstandarisasi kurikulum yang dirancang pemerintah
  - Ini meningkatkan persaingan dengan membuat kualifikasi profesional lebih mudah diakses oleh semua orang
explanation: |
  Sistem 'douane des concours' menciptakan saluran pembelajaran yang diatur yang menguntungkan profesi tertentu secara dangkal tetapi pada akhirnya merugikan inovasi. Dengan menggantikan program yang dirancang negara untuk kemajuan kewirausahaan, sistem ini memformat individu untuk melakukan fungsi rutin yang kaku yang mencegah munculnya para jenius, inovator, dan penemu yang dapat memajukan bidang mereka. Alih-alih mendorong kompetisi atau inovasi, sistem ini membatasi pengembangan profesional untuk menghafal kurikulum yang telah ditentukan, sehingga menghambat kemajuan kreatif yang secara alamiah akan terjadi dalam sistem pasar bebas.
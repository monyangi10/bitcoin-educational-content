question: Vilken var enligt 1800-talets liberala ekonomer den främsta konsekvensen av systemet med "tävlingstullar" (douane des concours) för den yrkesmässiga utvecklingen?
answer: Det formaterade individer till rigida funktioner och förhindrade framväxten av innovatörer och uppfinnare
wrong_answers:
  - Det uppmuntrade entreprenöriell innovation genom att skapa strukturerade utbildningsvägar för yrkesverksamma
  - Den minskade kostnaden för yrkesutbildning genom att standardisera statligt utformade läroplaner
  - Den ökade konkurrensen genom att göra yrkeskvalifikationer mer tillgängliga för alla
explanation: |
  Systemet med "douane des concours" skapade reglerade inlärningskanaler som ytligt sett gynnade vissa yrken men som i slutändan skadade innovationen. Genom att ersätta entreprenöriella framsteg med statligt utformade program formaterade detta system individer till rigida, rutinmässiga funktioner som förhindrade uppkomsten av genier, innovatörer och uppfinnare som kunde utveckla sina områden. I stället för att främja konkurrens eller innovation begränsades den professionella utvecklingen till att memorera förutbestämda läroplaner, vilket kvävde de kreativa framsteg som naturligt skulle uppstå i ett fritt marknadssystem.
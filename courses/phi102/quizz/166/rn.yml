question: Nk’uko abahinga mu vy’ubutunzi bo mu kinjana ca 19 babivuga, ni ingaruka nyamukuru iyihe y’urutonde rw’‘imigenzo y’amarushanwa’ (douane des concours) ku bijanye n’iterambere ry’umwuga?
answer: Yaratunganije abantu ku giti cabo kugira ngo bakore neza kandi ibuza abahinguzi b’ibintu bishasha n’abahinguzi b’ibintu bishasha guseruka .
wrong_answers:
  - Yaremesheje ubuhinga bushasha bwo gukora ibikorwa vy'ubudandaji mu kurema inzira z'inyigisho zitunganijwe ku bahinga .
  - Yagabanyije igiciro c’inyigisho z’umwuga mu gutuma inyigisho zateguwe na Leta zija ku rugero rumwe .
  - Rwaratumye haba uguhiganwa mu gutuma umuntu wese ashobora kuronka impapuro z’umutsindo z’umwuga .
explanation: |
  Uburyo bwa ‘douane des concours’ bwatumye habaho inzira z’inyigisho zitunganijwe zari zigirira akamaro imyuga imwimwe ku rugero rwo hejuru ariko amaherezo zigatuma habaho uguhingura ibintu bishasha. Mu gusubirira porogarama zateguwe na Leta kugira ngo abantu batere imbere mu vy’ubudandaji, iyo nzira yaratumye abantu bakora ibintu bikomeye kandi bimenyerewe, ivyo bikaba vyabuza ko habaho abanyabwenge, abahinga mu guhingura ibintu bishasha be n’abahinga mu vy’ubuhinga bushasha bashobora guteza imbere ibikorwa vyabo. Aho guteza imbere uguhiganwa canke uguhingura ibintu bishasha, vyatumye ugutera imbere mu vy’ubuhinga bigarukira ku gufata mu mutwe inyigisho zategekanijwe imbere y’igihe, bikaba vyatumye habaho ugutera imbere kw’ubuhinga bwo kurema kwobayeho mu buryo busanzwe mu bijanye n’isoko ry’uburenganzira.
question: Wat was volgens 19e-eeuwse liberale economen het belangrijkste gevolg van het systeem van 'douane des concours' voor de professionele ontwikkeling?
answer: Het vormde individuen tot starre functionarissen en verhinderde de opkomst van vernieuwers en uitvinders
wrong_answers:
  - Het moedigde ondernemende innovatie aan door gestructureerde leertrajecten te creëren voor professionals
  - Het verlaagde de kosten van beroepsonderwijs door door de overheid ontworpen curricula te standaardiseren
  - Het verhoogde de concurrentie door beroepskwalificaties toegankelijker te maken voor iedereen
explanation: |
  Het 'douane des concours'-systeem creëerde gereguleerde leerkanalen die oppervlakkige voordelen opleverden voor bepaalde beroepen, maar uiteindelijk schadelijk waren voor innovatie. Door door de staat ontworpen programma's te vervangen door ondernemende vooruitgang, vormde dit systeem individuen tot rigide, routinematig functioneren dat de opkomst van genieën, vernieuwers en uitvinders die hun vakgebied vooruit konden helpen, verhinderde. In plaats van concurrentie of innovatie te bevorderen, beperkte het de professionele ontwikkeling tot het uit het hoofd leren van vooraf bepaalde leerplannen, waardoor de creatieve vooruitgang die van nature zou plaatsvinden in een vrijemarktsysteem werd gesmoord.
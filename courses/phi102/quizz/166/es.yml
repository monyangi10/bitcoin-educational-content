question: Según los economistas liberales del siglo XIX, ¿cuál era la principal consecuencia del sistema de "costumbres de concursos" (douane des concours) sobre el desarrollo profesional?
answer: Formateó a los individuos a un funcionamiento rígido e impidió la aparición de innovadores e inventores
wrong_answers:
  - Fomentó la innovación empresarial creando vías de aprendizaje estructuradas para los profesionales
  - Redujo el coste de la educación profesional al estandarizar los planes de estudios diseñados por el gobierno
  - Aumentó la competencia al hacer más accesibles a todos las cualificaciones profesionales
explanation: |
  El sistema de "douane des concours" creaba canales de aprendizaje regulados que beneficiaban superficialmente a determinadas profesiones pero que, en última instancia, perjudicaban a la innovación. Al sustituir el avance empresarial por programas diseñados por el Estado, este sistema formateaba a los individuos para un funcionamiento rígido y rutinario que impedía la aparición de genios, innovadores e inventores capaces de hacer avanzar sus campos. En lugar de promover la competencia o la innovación, limitaba el desarrollo profesional a la memorización de planes de estudios predeterminados, sofocando el progreso creativo que se produciría de forma natural en un sistema de libre mercado.
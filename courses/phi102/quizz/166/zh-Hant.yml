question: 根據 19 世紀自由經濟學家的看法，「競賽風俗」(douane des concours) 制度對職業發展的主要影響是什麼？
answer: 它讓個人陷入僵化的運作模式，並阻止了創新者和發明家的出現。
wrong_answers:
  - 它透過為專業人員建立有系統的學習途徑，鼓勵企業創新
  - 透過標準化政府設計的課程，降低專業教育的成本
  - 它使每個人都更容易獲得專業資格，從而增加了競爭。
explanation: |
  douane des concours」制度創造了受管制的學習管道，表面上有利於某些專業，但最終卻損害了創新。這個制度以國家設計的課程來取代企業的進步，讓個人陷入僵化、例行公事的運作模式，妨礙了天才、創新者和發明家的出現，無法推動其領域的發展。它非但沒有促進競爭或創新，反而將專業發展限制於背誦預設的課程，扼殺了自由市場體系中自然會出現的創造性進步。
question: Mikä oli 1800-luvun liberaalien taloustieteilijöiden mukaan "kilpailutapojen" (douane des concours) järjestelmän tärkein seuraus ammatilliseen kehitykseen?
answer: Se muotoili yksilöt jäykkään toimintaan ja esti innovaattoreiden ja keksijöiden syntymisen
wrong_answers:
  - Se edisti yrittäjyyteen perustuvaa innovointia luomalla jäsenneltyjä oppimispolkuja ammattilaisille
  - Se alensi ammatillisen koulutuksen kustannuksia standardoimalla hallituksen laatimat opetussuunnitelmat
  - Se lisäsi kilpailua tekemällä ammattipätevyydestä helpommin kaikkien saatavilla olevaa tietoa
explanation: |
  Douane des concours -järjestelmä loi säänneltyjä oppimiskanavia, jotka hyödyttivät pinnallisesti tiettyjä ammatteja mutta haittasivat lopulta innovointia. Koska järjestelmä korvasi yrittäjyyden edistämisen valtion suunnittelemilla ohjelmilla, se muotoili yksilöt jäykkiin, rutiininomaisiin toimintatapoihin, jotka estivät sellaisten nerojen, innovaattoreiden ja keksijöiden syntymisen, jotka voisivat edistää alaansa. Sen sijaan, että se olisi edistänyt kilpailua tai innovointia, se rajoitti ammatillisen kehityksen ennalta määrättyjen opetussuunnitelmien ulkoa opetteluun ja tukahdutti luovan edistyksen, joka luonnollisesti tapahtuisi vapaassa markkinajärjestelmässä.
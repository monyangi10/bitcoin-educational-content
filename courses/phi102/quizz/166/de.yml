question: Was war nach Ansicht der liberalen Ökonomen des 19. Jahrhunderts die wichtigste Auswirkung des Systems der "Wettbewerbszölle" (douane des concours) auf die berufliche Entwicklung?
answer: Sie zwang die Menschen zu einem starren Funktionieren und verhinderte das Entstehen von Innovatoren und Erfindern
wrong_answers:
  - Es fördert die unternehmerische Innovation durch die Schaffung strukturierter Lernwege für Fachleute
  - Sie reduzierte die Kosten der Berufsausbildung durch die Standardisierung der von der Regierung entworfenen Lehrpläne
  - Sie hat den Wettbewerb verstärkt, indem sie berufliche Qualifikationen für jedermann zugänglich gemacht hat
explanation: |
  Das System der "douane des concours" schuf regulierte Lernkanäle, die bestimmten Berufen vordergründig zugute kamen, letztlich aber der Innovation schadeten. Indem es staatlich festgelegte Programme an die Stelle der unternehmerischen Förderung setzte, formte dieses System den Einzelnen zu einem starren, routinemäßigen Funktionieren, das die Entstehung von Genies, Innovatoren und Erfindern verhinderte, die ihre Bereiche voranbringen konnten. Anstatt Wettbewerb und Innovation zu fördern, beschränkte es die berufliche Entwicklung auf das Auswendiglernen vorgegebener Lehrpläne und erstickte so den kreativen Fortschritt, der in einem System der freien Marktwirtschaft auf natürliche Weise entstehen würde.
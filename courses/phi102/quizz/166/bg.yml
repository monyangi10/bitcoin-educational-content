question: Според либералните икономисти от XIX в. каква е основната последица от системата на "състезателните обичаи" (douane des concours) върху професионалното развитие?
answer: Тя форматира хората към закостеняло функциониране и възпрепятства появата на новатори и изобретатели
wrong_answers:
  - Насърчава предприемаческите иновации чрез създаване на структурирани пътища за обучение на специалисти
  - Намаляване на разходите за професионално образование чрез стандартизиране на разработените от правителството учебни програми
  - Увеличава конкуренцията, като прави професионалните квалификации по-достъпни за всички
explanation: |
  Системата "douane des concours" създаде регулирани канали за обучение, които облагодетелстваха някои професии повърхностно, но в крайна сметка навредиха на иновациите. Като замества държавните програми за развитие на предприемачеството, тази система приспособява хората към строгото, рутинно функциониране, което предотвратява появата на гении, новатори и изобретатели, които могат да развият своите области. Вместо да насърчава конкуренцията или иновациите, тя ограничава професионалното развитие до заучаване на предварително определени учебни програми, като по този начин задушава творческия напредък, който естествено би възникнал в една свободна пазарна система.
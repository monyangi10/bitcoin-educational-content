question: Hva var, ifølge 1800-tallets liberale økonomer, den viktigste konsekvensen av "konkurranseskikken" (douane des concours) for den faglige utviklingen?
answer: Den formaterte individer til å fungere på en rigid måte og forhindret fremveksten av innovatører og oppfinnere
wrong_answers:
  - Det oppmuntret til entreprenøriell innovasjon ved å skape strukturerte læringsløp for fagfolk
  - Den reduserte kostnadene ved profesjonsutdanning ved å standardisere statlig utformede læreplaner
  - Det økte konkurransen ved å gjøre yrkeskvalifikasjoner mer tilgjengelige for alle
explanation: |
  Douane des concours-systemet skapte regulerte læringskanaler som overfladisk sett var til fordel for visse yrker, men som til syvende og sist skadet innovasjonen. Ved å erstatte entreprenørskap med statlig utformede programmer, formaterte dette systemet individer til en rigid, rutinemessig funksjon som forhindret fremveksten av genier, innovatører og oppfinnere som kunne fremme sine felt. I stedet for å fremme konkurranse eller innovasjon, begrenset det faglig utvikling til å pugge forhåndsbestemte læreplaner, noe som kvelte den kreative fremgangen som naturlig ville oppstå i et fritt markedssystem.
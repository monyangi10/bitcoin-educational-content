question: По мнению либеральных экономистов XIX века, какое основное влияние на профессиональное развитие оказала система "конкурсных обычаев" (douane des concours)?
answer: Она настраивала людей на жесткое функционирование и препятствовала появлению новаторов и изобретателей
wrong_answers:
  - Она поощряла предпринимательские инновации, создавая структурированные учебные программы для профессионалов
  - Снижение стоимости профессионального образования за счет стандартизации разработанных правительством учебных программ
  - Она повысила конкуренцию, сделав профессиональные квалификации более доступными для всех
explanation: |
  Система "douane des concours" создавала регулируемые каналы обучения, которые приносили поверхностную пользу определенным профессиям, но в конечном итоге вредили инновациям. Подменяя государственные программы предпринимательским развитием, эта система настраивала людей на жесткое, рутинное функционирование, которое препятствовало появлению гениев, новаторов и изобретателей, способных продвигать свои области. Вместо того чтобы способствовать конкуренции или инновациям, она сводила профессиональное развитие к заучиванию заранее составленных учебных программ, подавляя творческий прогресс, который естественным образом происходил бы в системе свободного рынка.
question: Theo các nhà kinh tế học tự do thế kỷ 19, hậu quả chính của hệ thống "tập quán thi đấu" (douane des concours) đối với sự phát triển nghề nghiệp là gì?
answer: Nó đã định hình tư duy của cá nhân theo lối mòn và ngăn cản sự xuất hiện của những người đổi mới và phát minh.
wrong_answers:
  - Nó khuyến khích sự đổi mới trong kinh doanh bằng cách tạo ra các lộ trình học tập có cấu trúc dành cho các chuyên gia.
  - Nó đã giảm chi phí giáo dục chuyên nghiệp bằng cách chuẩn hóa chương trình giảng dạy do chính phủ thiết kế.
  - Nó đã thúc đẩy cạnh tranh bằng cách giúp mọi người dễ dàng tiếp cận hơn với các chứng chỉ chuyên môn.
explanation: |
  Hệ thống "douane des concours" tạo ra các kênh học tập được quy định, mang lại lợi ích bề ngoài cho một số ngành nghề nhất định nhưng cuối cùng lại gây hại cho sự đổi mới. Bằng cách thay thế các chương trình do nhà nước thiết kế cho sự phát triển tinh thần khởi nghiệp, hệ thống này đã định hình các cá nhân vào lối làm việc cứng nhắc, theo khuôn mẫu, ngăn cản sự xuất hiện của những thiên tài, nhà đổi mới và nhà phát minh có thể thúc đẩy sự tiến bộ trong lĩnh vực của họ. Thay vì thúc đẩy cạnh tranh hoặc đổi mới, nó giới hạn sự phát triển nghề nghiệp vào việc ghi nhớ các chương trình giảng dạy đã được xác định trước, kìm hãm sự tiến bộ sáng tạo vốn sẽ diễn ra một cách tự nhiên trong một hệ thống thị trường tự do.
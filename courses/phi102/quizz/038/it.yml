question: Secondo il testo, cosa succede quando la proprietà è detenuta collettivamente anziché privatamente?
answer: I cittadini non si sentono realmente padroni e le risorse vengono trascurate senza "l'occhio del padrone"
wrong_answers:
  - I cittadini si impegnano maggiormente nella manutenzione e nel miglioramento delle risorse condivise
  - Il governo gestisce in modo efficiente le risorse attraverso amministratori professionisti
  - Le risorse sono distribuite in modo più equo tra tutti i membri della società
explanation: |
  L'analisi di Paul Leroy-Beaulieu mostra che la proprietà collettiva crea un problema fondamentale: quando tutti possiedono teoricamente una piccola frazione di qualcosa (come una foresta pubblica), nessuno si sente un vero proprietario. Questo porta alla perdita dell'"occhio del padrone" - l'attenzione e la cura speciale che solo un vero proprietario fornisce. Senza questo investimento personale, le risorse vengono trascurate e sottoutilizzate. La proprietà privata crea forti incentivi alla manutenzione e al miglioramento che la proprietà collettiva non può replicare, in quanto gli individui hanno un interesse diretto nel preservare e accrescere il valore della loro proprietà.
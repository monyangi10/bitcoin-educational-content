question: 본문에 따르면 재산을 개인적으로 보유하지 않고 공동으로 보유하면 어떻게 되나요?
answer: 시민들은 진정한 주인의식을 느끼지 못하고 '주인의 눈'이 없으면 자원이 방치됩니다
wrong_answers:
  - 시민들은 공유 리소스의 유지 및 개선에 더 많은 투자를 하게 됩니다
  - 정부는 전문 관리자를 통해 리소스를 효율적으로 관리합니다
  - 자원이 모든 사회 구성원에게 보다 공평하게 분배됩니다
explanation: |
  폴 르로이-보리외의 분석에 따르면 집단적 소유권은 근본적인 문제를 야기합니다. 이론적으로 모든 사람이 공유림과 같이 아주 작은 부분을 소유하고 있을 때, 아무도 진정한 소유자처럼 느끼지 못한다는 것이죠. 이는 진정한 소유자만이 제공할 수 있는 특별한 관심과 보살핌인 '주인의 눈'을 잃게 되는 결과를 초래합니다. 이러한 개인적인 투자가 없으면 자원은 방치되고 활용도가 떨어지게 됩니다. 개인 소유는 개인이 재산의 가치를 보존하고 향상시키는 데 직접적인 이해관계가 있기 때문에 집단 소유가 흉내 낼 수 없는 유지 관리 및 개선에 대한 강력한 인센티브를 창출합니다.
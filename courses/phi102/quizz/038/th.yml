question: ตามข้อความเกิดอะไรขึ้นเมื่อทรัพย์สินถูกถือครองร่วมกันแทนที่จะเป็นของส่วนตัว?
answer: ประชาชนรู้สึกว่าไม่มีความเป็นเจ้าของที่แท้จริงและทรัพยากรถูกละเลยเมื่อไม่มี 'สายตาของนาย'
wrong_answers:
  - พลเมืองมีความสนใจมากขึ้นในการรักษาและปรับปรุงทรัพยากรร่วม
  - รัฐบาลบริหารจัดการทรัพยากรอย่างมีประสิทธิภาพผ่านผู้บริหารมืออาชีพ
  - ทรัพยากรถูกแจกจ่ายอย่างเท่าเทียมกันมากขึ้นในหมู่สมาชิกทุกคนของสังคม
explanation: |
  การวิเคราะห์ของ Paul Leroy-Beaulieu แสดงให้เห็นว่าการเป็นเจ้าของร่วมกันสร้างปัญหาพื้นฐาน: เมื่อทุกคนเป็นเจ้าของเศษเสี้ยวเล็ก ๆ ของบางสิ่ง (เช่น ป่าสาธารณะ) ในทางทฤษฎี ไม่มีใครรู้สึกว่าเป็นเจ้าของจริง สิ่งนี้นำไปสู่การสูญเสีย 'สายตาของเจ้าของ' - ความสนใจและการดูแลเป็นพิเศษที่มีเพียงเจ้าของที่แท้จริงเท่านั้นที่ให้ได้ โดยไม่มีการลงทุนส่วนตัวนี้ ทรัพยากรจะถูกละเลยและใช้งานไม่เต็มที่ การเป็นเจ้าของส่วนตัวสร้างแรงจูงใจที่แข็งแกร่งสำหรับการบำรุงรักษาและการปรับปรุงที่การเป็นเจ้าของร่วมกันไม่สามารถทำซ้ำได้ เนื่องจากบุคคลมีส่วนได้เสียโดยตรงในการรักษาและเพิ่มมูลค่าทรัพย์สินของตน
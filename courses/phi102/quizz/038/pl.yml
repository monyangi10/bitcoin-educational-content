question: Zgodnie z tekstem, co się dzieje, gdy własność jest posiadana zbiorowo, a nie prywatnie?
answer: Obywatele nie czują się prawdziwymi właścicielami, a zasoby są zaniedbywane bez "oka mistrza"
wrong_answers:
  - Obywatele stają się bardziej zaangażowani w utrzymanie i ulepszanie wspólnych zasobów
  - Rząd efektywnie zarządza zasobami poprzez profesjonalnych administratorów
  - Zasoby są rozdzielane bardziej równomiernie pomiędzy wszystkich członków społeczeństwa
explanation: |
  Analiza przeprowadzona przez Paula Leroy-Beaulieu pokazuje, że kolektywna własność stwarza fundamentalny problem: kiedy każdy teoretycznie posiada niewielki ułamek czegoś (jak las publiczny), nikt nie czuje się jak prawdziwy właściciel. Prowadzi to do utraty "oka mistrza" - szczególnej uwagi i troski, którą zapewnia tylko prawdziwy właściciel. Bez tej osobistej inwestycji zasoby stają się zaniedbane i niedostatecznie wykorzystywane. Własność prywatna stwarza silne zachęty do konserwacji i ulepszania, których własność zbiorowa nie może powielić, ponieważ jednostki mają bezpośrednie udziały w zachowaniu i zwiększaniu wartości swojej nieruchomości.
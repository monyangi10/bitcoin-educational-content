question: Menurut teks tersebut, apa yang terjadi jika properti dimiliki secara kolektif dan bukan secara pribadi?
answer: Warga merasa tidak memiliki kepemilikan yang nyata dan sumber daya terabaikan tanpa 'mata tuan'
wrong_answers:
  - Warga menjadi lebih berinvestasi dalam memelihara dan meningkatkan sumber daya bersama
  - Pemerintah mengelola sumber daya secara efisien melalui administrator yang profesional
  - Sumber daya didistribusikan secara lebih merata di antara semua anggota masyarakat
explanation: |
  Analisis Paul Leroy-Beaulieu menunjukkan bahwa kepemilikan kolektif menciptakan masalah mendasar: ketika setiap orang secara teoritis memiliki sebagian kecil dari sesuatu (seperti hutan umum), tidak ada yang merasa seperti pemilik sebenarnya. Hal ini menyebabkan hilangnya 'mata sang tuan' - perhatian dan kepedulian khusus yang hanya diberikan oleh pemilik sejati. Tanpa investasi pribadi ini, sumber daya akan terabaikan dan kurang dimanfaatkan. Kepemilikan pribadi menciptakan insentif yang kuat untuk pemeliharaan dan peningkatan yang tidak dapat ditiru oleh kepemilikan kolektif, karena setiap orang memiliki kepentingan langsung dalam melestarikan dan meningkatkan nilai properti mereka.
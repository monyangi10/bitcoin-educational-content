question: Metne göre, mülkiyet özel olarak değil de kolektif olarak elde tutulduğunda ne olur?
answer: Vatandaşlar gerçek bir sahiplenme hissetmiyor ve kaynaklar 'ustanın gözü' olmadan ihmal ediliyor
wrong_answers:
  - Vatandaşlar ortak kaynakların korunması ve geliştirilmesine daha fazla yatırım yapar hale gelir
  - Hükümet, profesyonel yöneticiler aracılığıyla kaynakları etkin bir şekilde yönetir
  - Kaynaklar toplumun tüm üyeleri arasında daha eşit dağıtılır
explanation: |
  Paul Leroy-Beaulieu'nun analizi, kolektif mülkiyetin temel bir sorun yarattığını göstermektedir: herkes teorik olarak bir şeyin küçük bir kısmına sahip olduğunda (bir kamu ormanı gibi), hiç kimse kendini gerçek bir sahip gibi hissetmez. Bu da 'efendinin gözünün' -sadece gerçek bir mal sahibinin sağladığı özel ilgi ve bakımın- kaybolmasına yol açar. Bu kişisel yatırım olmadan kaynaklar ihmal edilir ve yeterince kullanılmaz. Özel mülkiyet, bakım ve iyileştirme için kolektif mülkiyetin kopyalayamayacağı güçlü teşvikler yaratır, çünkü bireylerin mülklerinin değerini koruma ve artırmada doğrudan payları vardır.
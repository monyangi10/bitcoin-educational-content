question: Hva skjer, ifølge teksten, når eiendom eies kollektivt i stedet for privat?
answer: Innbyggerne føler ikke noe reelt eierskap, og ressursene blir forsømt uten "mesterens blikk
wrong_answers:
  - Innbyggerne blir mer engasjert i å vedlikeholde og forbedre de felles ressursene
  - Myndighetene forvalter ressursene effektivt gjennom profesjonelle administratorer
  - Ressursene fordeles mer rettferdig mellom alle samfunnsmedlemmene
explanation: |
  Paul Leroy-Beaulieus analyse viser at kollektivt eierskap skaper et grunnleggende problem: Når alle i teorien eier en bitteliten del av noe (som en offentlig skog), er det ingen som føler seg som en ekte eier. Dette fører til at man mister "mesterens øye" - den spesielle oppmerksomheten og omsorgen som bare en ekte eier kan gi. Uten denne personlige investeringen blir ressursene forsømt og underutnyttet. Privat eierskap skaper sterke insentiver for vedlikehold og forbedring som kollektivt eierskap ikke kan gjenskape, ettersom enkeltpersoner har direkte interesser i å bevare og øke eiendommens verdi.
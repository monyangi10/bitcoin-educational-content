question: Mis juhtub teksti kohaselt, kui omandit hoitakse kollektiivselt, mitte eraviisiliselt?
answer: Kodanikud ei tunne tegelikku omandiõigust ja ressursse jäetakse hooletusse ilma "peremehe silmata"
wrong_answers:
  - Kodanikud hakkavad rohkem investeerima ühiste ressursside säilitamisse ja parandamisse
  - Valitsus haldab ressursse tõhusalt professionaalsete administraatorite kaudu
  - Ressursid jaotuvad võrdsemalt kõigi ühiskonnaliikmete vahel
explanation: |
  Paul Leroy-Beaulieu analüüs näitab, et kollektiivne omandiõigus tekitab põhimõttelise probleemi: kui teoreetiliselt kuulub kõigile vaid väike osa millestki (näiteks avalikust metsast), ei tunne keegi end tegeliku omanikuna. See toob kaasa "peremehe silma" kaotamise - erilise tähelepanu ja hoolitsuse, mida pakub ainult tõeline omanik. Ilma sellise isikliku investeeringuta muutuvad ressursid hooletusse jäetud ja alakasutatud. Eraomand loob tugevad stiimulid hoolduseks ja parendamiseks, mida kollektiivne omandiõigus ei suuda korrata, kuna üksikisikutel on otsene huvi oma vara väärtuse säilitamise ja suurendamise vastu.
question: Vad händer enligt texten när egendom innehas kollektivt i stället för privat?
answer: Medborgarna känner inget verkligt ägande och resurserna försummas utan "mästarens öga
wrong_answers:
  - Medborgarna blir mer engagerade i att underhålla och förbättra de gemensamma resurserna
  - Regeringen förvaltar resurserna effektivt genom professionella administratörer
  - Resurserna fördelas mer jämlikt mellan alla samhällsmedlemmar
explanation: |
  Paul Leroy-Beaulieus analys visar att kollektivt ägande skapar ett grundläggande problem: när alla teoretiskt sett äger en liten del av något (som en allmän skog) känner sig ingen som en riktig ägare. Detta leder till att "mästarens öga" går förlorat - den särskilda uppmärksamhet och omsorg som bara en äkta ägare kan ge. Utan denna personliga investering blir resurserna försummade och underutnyttjade. Privat ägande skapar starka incitament för underhåll och förbättringar som kollektivt ägande inte kan återskapa, eftersom individer har direkta intressen i att bevara och öka värdet på sin egendom.
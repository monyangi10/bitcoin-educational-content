question: 本文によれば、財産が私的にではなく集団的に保有される場合、何が起こるのか？
answer: 市民は真の所有権を感じず、資源は「主人の目」なしにないがしろにされている。
wrong_answers:
  - 共有資源の維持・改善に市民がより積極的に参加するようになる。
  - 政府は専門的な管理者により効率的に資源を管理する。
  - 資源は社会のすべての構成員により平等に分配される。
explanation: |
  ポール・ルロワ＝ボリューの分析は、集団所有が根本的な問題を引き起こすことを示している。理論上、誰もが（公有林のような）何かのほんの一部を所有している場合、誰も本当の所有者であるとは感じない。このことは、「主人の目」、つまり真の所有者だけが提供する特別な注意や配慮を失うことにつながる。このような個人的な投資がなければ、資源は放置され、十分に活用されなくなる。私的所有権は、集団所有では真似のできない、維持・改善への強いインセンティブを生み出す。
question: Kulingana na maandishi, nini hutokea wakati mali inaposhikiliwa kwa pamoja badala ya faragha?
answer: Raia hawaoni umiliki halisi na rasilimali zinapuuzwa bila 'jicho la bwana'
wrong_answers:
  - Raia huwekeza zaidi katika kudumisha na kuboresha rasilimali zinazoshirikiwa
  - Serikali inasimamia rasilimali kwa ufanisi kupitia wasimamizi wataalamu
  - Rasilimali zinasambazwa kwa usawa zaidi miongoni mwa wanajamii wote
explanation: |
  Uchambuzi wa Paul Leroy-Beaulieu unaonyesha kwamba umiliki wa pamoja husababisha tatizo la msingi: wakati kila mtu kinadharia anamiliki sehemu ndogo ya kitu (kama msitu wa umma), hakuna mtu anayehisi kama mmiliki halisi. Hii husababisha kupotea kwa 'jicho la bwana' - umakini na utunzaji maalum ambao mmiliki wa kweli hutoa. Bila uwekezaji huu binafsi, rasilimali hupuuzwa na kutumiwa vibaya. Umiliki binafsi huunda motisha kali za matengenezo na uboreshaji ambazo umiliki wa pamoja hauwezi kuiga, kwani watu binafsi wana hisa za moja kwa moja katika kuhifadhi na kuongeza thamani ya mali zao.
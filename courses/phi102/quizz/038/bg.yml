question: Какво се случва според текста, когато собствеността е колективна, а не частна?
answer: Гражданите не се чувстват истински собственици и ресурсите се пренебрегват без "окото на господаря"
wrong_answers:
  - Гражданите са по-ангажирани в поддържането и подобряването на общите ресурси
  - Правителството управлява ефективно ресурсите чрез професионални администратори
  - Ресурсите се разпределят по-равномерно между всички членове на обществото
explanation: |
  Анализът на Пол Лерой-Болио показва, че колективната собственост създава основен проблем: когато всеки теоретично притежава малка част от нещо (например обществена гора), никой не се чувства като истински собственик. Това води до загуба на "окото на господаря" - специалното внимание и грижа, които само истинският собственик осигурява. Без тази лична инвестиция ресурсите стават занемарени и недостатъчно използвани. Частната собственост създава силни стимули за поддържане и подобряване, които колективната собственост не може да възпроизведе, тъй като хората имат пряк интерес от запазването и повишаването на стойността на собствеността си.
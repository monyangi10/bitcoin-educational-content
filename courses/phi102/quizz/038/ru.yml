question: Согласно тексту, что происходит, когда собственность становится не частной, а коллективной?
answer: Граждане не чувствуют реальной собственности, а ресурсами пренебрегают без "хозяйского присмотра
wrong_answers:
  - Граждане становятся более заинтересованными в поддержании и улучшении общих ресурсов
  - Правительство эффективно управляет ресурсами с помощью профессиональных администраторов
  - Ресурсы распределяются более равномерно между всеми членами общества
explanation: |
  Анализ Поля Леруа-Болье показывает, что коллективная собственность создает фундаментальную проблему: когда каждый теоретически владеет крошечной долей чего-то (например, общественным лесом), никто не чувствует себя настоящим владельцем. Это приводит к потере "хозяйского взгляда" - особого внимания и заботы, которые обеспечивает только настоящий владелец. Без такого личного вклада ресурсы становятся заброшенными и неиспользуемыми. Частная собственность создает сильные стимулы для обслуживания и улучшения, которые не может повторить коллективная собственность, поскольку люди напрямую заинтересованы в сохранении и повышении ценности своей собственности.
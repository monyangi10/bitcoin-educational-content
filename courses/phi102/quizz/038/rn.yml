question: Dushingiye ku canditswe, bigenda gute iyo umutungo ufise abantu bose aho gufatwa ku giti cabo?
answer: Abanyagihugu bumva ko ata n’umwe afise uburenganzira nyabwo kandi ubutunzi burasuzugurwa ata ‘jisho rya shebuja’.
wrong_answers:
  - Abanyagihugu barushiriza gushiramwo amahera yo kubungabunga no kunoza ubutunzi basangiye .
  - Leta icungera neza umutungo biciye ku barongozi b'abahinga
  - Ubutunzi buragabanywa mu buryo bungana mu bantu bose bo mu kibano .
explanation: |
  Isesengura rya Paul Leroy-Beaulieu ryerekana ko ubutunzi rusangi butera ingorane y’ishimikiro: iyo umuntu wese mu vyiyumviro afise agace gatoyi k’ikintu (nk’ishyamba rya bose), nta n’umwe yumva ko ari nyen’ikintu nyakuri. Ivyo bituma umuntu atakaza ‘ijisho rya shebuja’ - ukwitwararika n’ukwitwararika bidasanzwe bitangwa na nyen’umutungo nyakuri gusa. Iyo ata n’iryo shoramari ry’umuntu ku giti ciwe, ubutunzi burasuzugurwa kandi ntibukoreshwa nabi. Ubutunzi bw’abantu ku giti cabo buratuma habaho inguvu zikomeye zo kubungabunga no kunoza ivyo ubutunzi rusangi budashobora kwisubirako, kuko abantu ku giti cabo bafise uruhara rudasanzwe mu kuzigama no kwongerera agaciro umutungo wabo.
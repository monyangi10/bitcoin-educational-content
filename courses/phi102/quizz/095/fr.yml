question: Selon l'analyse du texte sur l'optimisation de la liberté, qu'est-ce qui permet d'obtenir le maximum d'effet utile de l'exercice de la liberté ?
answer: Développements technologiques et techniques résultant du progrès historique
wrong_answers:
  - Les instincts humains naturels et les capacités morales innées qui existent dès la naissance
  - Les institutions politiques et les systèmes judiciaires qui régulent le comportement individuel
  - Enseignements religieux et conseils spirituels qui orientent les choix moraux
explanation: |
  Le texte indique explicitement que l'optimisation de la liberté pour produire le maximum d'effets utiles est rendue possible par les développements technologiques et techniques qui sont les fruits d'un long cheminement historique. Cela démontre que l'efficacité de la liberté dépend du progrès de la civilisation plutôt que des dotations naturelles, du contrôle institutionnel ou de l'orientation religieuse. L'auteur souligne que la liberté est un processus de construction et d'apprentissage qui dépend de la moralisation et de l'industrialisation de l'humanité, et non quelque chose de donné naturellement ou d'imposé de l'extérieur par des règlements ou des doctrines spirituelles.
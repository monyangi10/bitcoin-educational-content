question: De acordo com a análise que o texto faz da otimização da liberdade, o que permite obter o máximo efeito útil do exercício da liberdade?
answer: Desenvolvimentos tecnológicos e técnicos resultantes do progresso histórico
wrong_answers:
  - Instintos humanos naturais e capacidades morais inatas que existem desde o nascimento
  - Instituições políticas e sistemas judiciais que regulam o comportamento individual
  - Ensinamentos religiosos e orientação espiritual que orientam as escolhas morais
explanation: |
  O texto afirma explicitamente que a otimização da liberdade para produzir o máximo efeito útil é possível graças a desenvolvimentos tecnológicos e técnicos que são fruto de um longo percurso histórico. Isto demonstra que a eficácia da liberdade depende mais do progresso civilizacional do que dos dotes naturais, do controlo institucional ou da orientação religiosa. O autor enfatiza que a liberdade é um processo de construção e aprendizagem dependente da moralização e industrialização da humanidade, e não algo dado naturalmente ou imposto externamente através de regulamentos ou doutrina espiritual.
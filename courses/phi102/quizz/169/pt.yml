question: Qual foi o contraste histórico entre as atitudes do século XVIII em relação aos trabalhadores estrangeiros e as políticas proteccionistas modernas?
answer: No século XVIII, era comum aceitar estrangeiros em funções públicas e no serviço militar, ao passo que as sociedades modernas restringem cada vez mais esses cargos aos cidadãos nacionais
wrong_answers:
  - No século XVIII, todos os trabalhadores estrangeiros eram excluídos do serviço público, enquanto as sociedades modernas adoptaram políticas de abertura total das fronteiras
  - O século XVIII só permitia trabalhadores estrangeiros na indústria privada, ao passo que as sociedades modernas preferem trabalhadores estrangeiros em cargos governamentais
  - O século XVIII proibiu totalmente o serviço militar estrangeiro, enquanto as sociedades modernas dependem fortemente de mercenários estrangeiros nos seus exércitos
explanation: |
  O capítulo contrasta explicitamente a abertura do século XVIII, citando exemplos como o Ministro Necker e os guardas suíços ao serviço de governos estrangeiros, com as modernas restrições proteccionistas às funções públicas. Esta mudança histórica demonstra como as forças democráticas promoveram o protecionismo dos trabalhadores, passando de uma era de relativa abertura para outra em que a nacionalidade se torna uma barreira ao emprego na função pública, reflectindo tendências proteccionistas mais amplas nas sociedades democráticas modernas.
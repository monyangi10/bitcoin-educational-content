question: تفاوت تاریخی بین نگرش‌های قرن هجدهم نسبت به کارگران خارجی و سیاست‌های حمایت‌گرایانه مدرن چه بود؟
answer: قرن هجدهم به طور معمول خارجی‌ها را در وظایف عمومی و خدمات نظامی می‌پذیرفت، در حالی که جوامع مدرن به طور فزاینده‌ای چنین موقعیت‌هایی را به شهروندان محدود می‌کنند.
wrong_answers:
  - قرن هجدهم همه کارگران خارجی را از خدمات عمومی محدود کرد، در حالی که جوامع مدرن سیاست‌های مرزهای کاملاً باز را اتخاذ کرده‌اند.
  - قرن هجدهم تنها به کارگران خارجی در صنعت خصوصی اجازه می‌داد، در حالی که جوامع مدرن کارگران خارجی را در موقعیت‌های دولتی ترجیح می‌دهند.
  - قرن هجدهم به طور کامل خدمت نظامی خارجی را ممنوع کرد، در حالی که جوامع مدرن به شدت به مزدوران خارجی در ارتش‌های خود متکی هستند.
explanation: |
  این فصل به‌طور صریح به مقایسه باز بودن قرن هجدهم، با ذکر مثال‌هایی مانند وزیر نکر و نگهبانان سوئیسی که به دولت‌های خارجی خدمت می‌کردند، با محدودیت‌های حمایتی مدرن در وظایف عمومی می‌پردازد. این تغییر تاریخی نشان می‌دهد که چگونه نیروهای دموکراتیک حمایت‌گرایی کارگران را ترویج کرده‌اند، از دوره‌ای با باز بودن نسبی به دوره‌ای که ملیت به مانعی برای اشتغال در خدمات عمومی تبدیل می‌شود، که نشان‌دهنده تمایلات حمایتی گسترده‌تر در جوامع دموکراتیک مدرن است.
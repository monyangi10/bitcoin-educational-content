question: ความแตกต่างทางประวัติศาสตร์ระหว่างทัศนคติในศตวรรษที่ 18 ต่อแรงงานต่างชาติและนโยบายปกป้องในยุคปัจจุบันคืออะไร?
answer: ในศตวรรษที่ 18 มีการยอมรับชาวต่างชาติในหน้าที่สาธารณะและการบริการทางทหารอย่างแพร่หลาย ขณะที่สังคมสมัยใหม่มีแนวโน้มที่จะจำกัดตำแหน่งดังกล่าวให้เฉพาะกับพลเมืองของตนมากขึ้น
wrong_answers:
  - ในศตวรรษที่ 18 มีการจำกัดแรงงานต่างชาติทั้งหมดจากการบริการสาธารณะ ในขณะที่สังคมสมัยใหม่ได้นำนโยบายเปิดพรมแดนอย่างสมบูรณ์มาใช้
  - ในศตวรรษที่ 18 อนุญาตให้เฉพาะแรงงานต่างชาติในอุตสาหกรรมเอกชน ในขณะที่สังคมสมัยใหม่ชอบแรงงานต่างชาติในตำแหน่งรัฐบาล
  - ในศตวรรษที่ 18 ได้ห้ามการบริการทหารต่างชาติอย่างสิ้นเชิง ในขณะที่สังคมสมัยใหม่พึ่งพาทหารรับจ้างต่างชาติในกองทัพของพวกเขาอย่างมาก
explanation: |
  บทนี้เปรียบเทียบอย่างชัดเจนถึงความเปิดกว้างในศตวรรษที่ 18 โดยยกตัวอย่างเช่น รัฐมนตรี Necker และทหารรักษาการณ์ชาวสวิสที่ทำงานให้กับรัฐบาลต่างชาติ กับข้อจำกัดแบบปกป้องในหน้าที่สาธารณะในยุคปัจจุบัน การเปลี่ยนแปลงทางประวัติศาสตร์นี้แสดงให้เห็นถึงวิธีที่พลังประชาธิปไตยได้ส่งเสริมการปกป้องแรงงาน โดยเปลี่ยนจากยุคที่เปิดกว้างไปสู่ยุคที่สัญชาติกลายเป็นอุปสรรคต่อการจ้างงานในบริการสาธารณะ สะท้อนถึงแนวโน้มการปกป้องที่กว้างขึ้นในสังคมประชาธิปไตยสมัยใหม่
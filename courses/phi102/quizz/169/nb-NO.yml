question: Hva var den historiske kontrasten mellom 1700-tallets holdninger til utenlandske arbeidere og moderne proteksjonistisk politikk?
answer: På 1700-tallet var det vanlig å akseptere utlendinger i offentlige funksjoner og militærtjeneste, mens moderne samfunn i økende grad begrenser slike stillinger til egne statsborgere
wrong_answers:
  - På 1700-tallet ble alle utenlandske arbeidere utestengt fra offentlig tjeneste, mens moderne samfunn har innført en fullstendig åpen grensepolitikk
  - På 1700-tallet tillot man bare utenlandske arbeidere i det private næringsliv, mens moderne samfunn foretrekker utenlandske arbeidere i offentlige stillinger
  - På 1700-tallet ble utenlandsk militærtjeneste helt forbudt, mens moderne samfunn i stor grad benytter seg av utenlandske leiesoldater i sine hærer
explanation: |
  Kapitlet setter 1700-tallets åpenhet, med eksempler som minister Necker og sveitsiske vakter i tjeneste for utenlandske regjeringer, eksplisitt opp mot moderne proteksjonistiske restriksjoner på offentlige funksjoner. Dette historiske skiftet viser hvordan demokratiske krefter har fremmet arbeiderproteksjonisme, fra en tid med relativ åpenhet til en tid der nasjonalitet blir et hinder for ansettelse i offentlig tjeneste, noe som gjenspeiler bredere proteksjonistiske tendenser i moderne demokratiske samfunn.
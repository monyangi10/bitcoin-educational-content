question: What was the historical contrast between 18th-century attitudes toward foreign workers and modern protectionist policies?
answer: The 18th century commonly accepted foreigners in public functions and military service, while modern societies increasingly restrict such positions to nationals
wrong_answers:
  - The 18th century restricted all foreign workers from public service, while modern societies have adopted complete open borders policies
  - The 18th century only allowed foreign workers in private industry, while modern societies prefer foreign workers in government positions
  - The 18th century banned foreign military service entirely, while modern societies rely heavily on foreign mercenaries in their armies
explanation: |
  The chapter explicitly contrasts 18th-century openness, citing examples like Minister Necker and Swiss guards serving foreign governments, with modern protectionist restrictions on public functions. This historical shift demonstrates how democratic forces have promoted worker protectionism, moving from an era of relative openness to one where nationality becomes a barrier to employment in public service, reflecting broader protectionist tendencies in modern democratic societies.
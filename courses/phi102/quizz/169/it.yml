question: Qual è stato il contrasto storico tra gli atteggiamenti del XVIII secolo nei confronti dei lavoratori stranieri e le moderne politiche protezionistiche?
answer: Nel XVIII secolo gli stranieri erano comunemente accettati nelle funzioni pubbliche e nel servizio militare, mentre le società moderne limitano sempre più tali posizioni ai cittadini
wrong_answers:
  - Nel XVIII secolo tutti i lavoratori stranieri erano esclusi dal servizio pubblico, mentre le società moderne hanno adottato politiche di completa apertura delle frontiere
  - Nel XVIII secolo i lavoratori stranieri erano ammessi solo nell'industria privata, mentre le società moderne preferiscono i lavoratori stranieri nelle posizioni di governo
  - Il XVIII secolo ha vietato completamente il servizio militare straniero, mentre le società moderne fanno grande affidamento su mercenari stranieri nei loro eserciti
explanation: |
  Il capitolo contrappone esplicitamente l'apertura del XVIII secolo, citando esempi come il ministro Necker e le guardie svizzere al servizio di governi stranieri, alle moderne restrizioni protezionistiche sulle funzioni pubbliche. Questo cambiamento storico dimostra come le forze democratiche abbiano promosso il protezionismo dei lavoratori, passando da un'epoca di relativa apertura a una in cui la nazionalità diventa un ostacolo all'impiego nel servizio pubblico, riflettendo le più ampie tendenze protezionistiche delle moderne società democratiche.
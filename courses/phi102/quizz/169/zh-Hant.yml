question: 18 世紀對外勞的態度與現代的保護主義政策之間的歷史對比是什麼？
answer: 18 世紀普遍接受外國人擔任公職和服兵役，而現代社會則越來越多地將這些職位限制給國民。
wrong_answers:
  - 18 世紀限制所有外籍勞工擔任公職，而現代社會則採取完全開放的邊界政策
  - 18 世紀只允許外籍勞工在私人產業工作，而現代社會則偏好外籍勞工擔任政府職位
  - 18 世紀完全禁止外國人服兵役，而現代社會的軍隊則嚴重依賴外國僱傭兵
explanation: |
  本章明確對比 18 世紀的開放，舉出內克大臣 (Minister Necker) 和為外國政府服務的瑞士守衛等例子，與現代對公職的保護主義限制。這種歷史性的轉變顯示出民主力量如何促進勞工保護主義，從相對開放的時代轉變為國籍成為公職就業的障礙，反映出現代民主社會更廣泛的保護主義傾向。
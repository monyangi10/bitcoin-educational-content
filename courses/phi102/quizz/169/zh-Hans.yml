question: 18 世纪对外国工人的态度与现代保护主义政策之间的历史对比是什么？
answer: 18 世纪普遍接受外国人担任公职和服兵役，而现代社会则越来越多地将此类职位限制在本国人担任
wrong_answers:
  - 18 世纪限制所有外籍工人担任公职，而现代社会则采取了完全开放的边境政策
  - 18 世纪只允许外籍工人在私营企业工作，而现代社会则更喜欢外籍工人担任政府职位
  - 18 世纪完全禁止外国军队服役，而现代社会的军队则严重依赖外国雇佣军
explanation: |
  本章引用内克尔大臣和瑞士卫兵为外国政府服务等例子，明确对比了 18 世纪的开放与现代对公共职能的保护主义限制。这一历史性转变展示了民主力量如何推动工人保护主义，从一个相对开放的时代转变为一个国籍成为公职就业障碍的时代，反映了现代民主社会更广泛的保护主义倾向。
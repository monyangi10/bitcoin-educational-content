question: Wat was het historische contrast tussen de 18e-eeuwse houding tegenover buitenlandse werknemers en het moderne protectionistische beleid?
answer: In de 18e eeuw werden buitenlanders algemeen geaccepteerd in openbare functies en militaire dienst, terwijl moderne samenlevingen dergelijke functies steeds meer beperken tot eigen onderdanen
wrong_answers:
  - In de 18e eeuw werden alle buitenlandse werknemers uitgesloten van overheidsdiensten, terwijl moderne samenlevingen een volledig opengrenzenbeleid hebben aangenomen
  - In de 18e eeuw mochten buitenlandse werknemers alleen in de privé-industrie werken, terwijl moderne samenlevingen de voorkeur geven aan buitenlandse werknemers in overheidsfuncties
  - De 18e eeuw verbood buitenlandse militaire dienst volledig, terwijl moderne samenlevingen zwaar leunen op buitenlandse huurlingen in hun legers
explanation: |
  Het hoofdstuk zet expliciet 18e-eeuwse openheid tegenover moderne protectionistische beperkingen op openbare functies, door voorbeelden aan te halen zoals minister Necker en Zwitserse bewakers die buitenlandse regeringen dienden. Deze historische verschuiving laat zien hoe democratische krachten werknemersprotectionisme hebben bevorderd, van een tijdperk van relatieve openheid naar een tijdperk waarin nationaliteit een barrière wordt voor tewerkstelling in overheidsdienst, wat bredere protectionistische tendensen in moderne democratische samenlevingen weerspiegelt.
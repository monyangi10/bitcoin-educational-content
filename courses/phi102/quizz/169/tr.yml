question: Yabancı işçilere yönelik 18. yüzyıl tutumları ile modern korumacı politikalar arasındaki tarihsel zıtlık neydi?
answer: 18. yüzyılda yabancılar kamu görevlerinde ve askerlik hizmetinde yaygın olarak kabul görürken, modern toplumlar bu tür pozisyonları giderek daha fazla vatandaşlarla sınırlandırmaktadır
wrong_answers:
  - 18. yüzyılda tüm yabancı işçiler kamu hizmetlerinden kısıtlanırken, modern toplumlar tamamen açık sınır politikalarını benimsemişlerdir
  - 18. yüzyılda yabancı işçilere sadece özel sektörde izin verilirken, modern toplumlar yabancı işçileri devlet kadrolarında tercih etmektedir
  - 18. yüzyılda yabancı askerlik hizmeti tamamen yasaklanırken, modern toplumlar ordularında büyük ölçüde yabancı paralı askerlere güvenmektedir
explanation: |
  Bu bölüm, Bakan Necker ve yabancı hükümetlere hizmet eden İsviçreli muhafızlar gibi örneklere atıfta bulunarak 18. yüzyıldaki açıklık ile kamu görevlerine yönelik modern korumacı kısıtlamaları açıkça karşılaştırmaktadır. Bu tarihsel değişim, demokratik güçlerin işçi korumacılığını nasıl teşvik ettiğini, göreceli bir açıklık döneminden, modern demokratik toplumlardaki daha geniş korumacı eğilimleri yansıtan, uyruğun kamu hizmetinde istihdam için bir engel haline geldiği bir döneme nasıl geçildiğini göstermektedir.
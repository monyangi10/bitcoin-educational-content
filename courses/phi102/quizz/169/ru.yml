question: В чем исторический контраст между отношением к иностранным рабочим в XVIII веке и современной протекционистской политикой?
answer: В XVIII веке иностранцев обычно принимали на государственные должности и военную службу, в то время как в современных обществах на такие должности все чаще назначают граждан страны
wrong_answers:
  - В XVIII веке все иностранные работники не допускались к государственной службе, в то время как современные общества проводят политику полного открытия границ
  - В XVIII веке иностранные работники допускались только в частную промышленность, в то время как современные общества предпочитают использовать иностранцев на государственных должностях
  - В XVIII веке была полностью запрещена иностранная военная служба, в то время как современные общества в значительной степени полагаются на иностранных наемников в своих армиях
explanation: |
  В главе явно противопоставляется открытость XVIII века, приводятся такие примеры, как министр Неккер и швейцарские гвардейцы, служившие иностранным правительствам, и современные протекционистские ограничения на выполнение государственных функций. Этот исторический сдвиг демонстрирует, как демократические силы способствовали протекционизму работников, переходя от эпохи относительной открытости к эпохе, когда национальность становится барьером для приема на государственную службу, что отражает более широкие протекционистские тенденции в современных демократических обществах.
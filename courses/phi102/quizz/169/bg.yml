question: Какъв е историческият контраст между отношението към чуждестранните работници през XVIII в. и съвременните протекционистки политики?
answer: През XVIII в. чужденците обикновено са приемани на обществени длъжности и военна служба, докато съвременните общества все повече ограничават тези длъжности до граждани
wrong_answers:
  - През XVIII век всички чуждестранни работници са били ограничавани да работят в държавната администрация, докато съвременните общества са възприели политики на напълно отворени граници
  - През XVIII век чуждестранните работници са били допускани само в частната индустрия, докато съвременните общества предпочитат чуждестранни работници на държавни длъжности
  - През XVIII в. чуждестранната военна служба е напълно забранена, докато съвременните общества разчитат в голяма степен на чуждестранни наемници в армиите си
explanation: |
  В главата изрично се противопоставя откритостта от XVIII в., като се посочват примери като министър Некер и швейцарските гвардейци, обслужващи чужди правителства, на съвременните протекционистични ограничения на обществените функции. Тази историческа промяна показва как демократичните сили са насърчавали протекционизма на работниците, преминавайки от епоха на относителна отвореност към епоха, в която националността се превръща в пречка за наемане на работа в държавната администрация, отразявайки по-широките протекционистични тенденции в съвременните демократични общества.
question: Jaký byl historický kontrast mezi postojem k zahraničním pracovníkům v 18. století a moderní ochranářskou politikou?
answer: V 18. století byli cizinci běžně přijímáni do veřejných funkcí a vojenské služby, zatímco moderní společnosti tyto funkce stále více omezují na státní příslušníky
wrong_answers:
  - 18. století omezovalo přístup všech zahraničních pracovníků do veřejných služeb, zatímco moderní společnosti přijaly politiku naprostého otevření hranic
  - V 18. století byli zahraniční pracovníci povoleni pouze v soukromém průmyslu, zatímco moderní společnosti dávají přednost zahraničním pracovníkům ve vládních pozicích
  - V 18. století byla zahraniční vojenská služba zcela zakázána, zatímco moderní společnosti ve svých armádách do značné míry spoléhají na zahraniční žoldnéře
explanation: |
  Kapitola výslovně staví do kontrastu otevřenost v 18. století a uvádí příklady jako ministr Necker a švýcarská garda ve službách zahraničních vlád s moderními ochranářskými omezeními veřejných funkcí. Tento historický posun ukazuje, jak demokratické síly podpořily protekcionismus pracovníků a přešly z éry relativní otevřenosti do doby, kdy se státní příslušnost stala překážkou pro zaměstnání ve veřejných službách, což odráží širší protekcionistické tendence v moderních demokratických společnostech.
question: Ni itandukaniro irihe ryari riri hagati y’inyifato yo mu kinjana ca 18 ku bijanye n’abakozi bo mu mahanga be n’ingingo mfatirwako zo muri iki gihe zo gukingira abantu?
answer: Mu kinjana ca 18, abantu benshi bemera abanyamahanga mu bikorwa vya Leta no mu gisirikare, mu gihe abantu bo muri iki gihe barushiriza guhagarika ivyo bibanza ku banyagihugu .
wrong_answers:
  - Ikinyejana ca 18 carabujije abakozi bose bo hanze gukora ibikorwa vya Leta, mu gihe imibano ya none yemeye amategeko yuzuye y’imipaka yuguruye .
  - Ikinyejana ca 18 cemerera gusa abakozi b'abanyamahanga mu bikorwa vy'abikorera ku giti cabo, mu gihe imiryango yo muri iki gihe ikunda abakozi b'abanyamahanga mu bibanza vya leta .
  - Ikinyejana ca 18 carabujije rwose igikorwa c’igisirikare c’amahanga, mu gihe imibano yo muri iki gihe yizigira cane abacangero b’amahanga mu ngabo zayo .
explanation: |
  Ico gice kiratandukanya neza ukuntu abantu bafunguye abantu mu kinjana ca 18, kigatanga ingero nka Minisitiri Necker n’abacungera umutekano bo mu Busuwisi bakorera intwaro z’amahanga, n’amategeko y’ubu y’uburinzi ku bikorwa vya Leta. Iryo hinduka ry’amateka ryerekana ingene inguvu za demokarasi zateje imbere uburinzi bw’abakozi, ziva mu gihe c’ugufungura cane zija mu gihe ubwenegihugu buba intambamyi ku kazi mu bikorwa vya Leta, ivyo bikaba vyerekana impengamiro zagutse zo gukingira abakozi mu bihugu vya demokarasi vya none.
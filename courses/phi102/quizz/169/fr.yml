question: Quel est le contraste historique entre les attitudes du XVIIIe siècle à l'égard des travailleurs étrangers et les politiques protectionnistes modernes ?
answer: Au XVIIIe siècle, les étrangers étaient communément acceptés dans les fonctions publiques et le service militaire, alors que les sociétés modernes réservent de plus en plus souvent ces postes aux ressortissants nationaux
wrong_answers:
  - Au XVIIIe siècle, tous les travailleurs étrangers étaient exclus de la fonction publique, alors que les sociétés modernes ont adopté des politiques d'ouverture totale des frontières
  - Le XVIIIe siècle n'autorisait les travailleurs étrangers que dans l'industrie privée, alors que les sociétés modernes préfèrent les travailleurs étrangers dans les postes gouvernementaux
  - Le 18e siècle a totalement interdit le service militaire à l'étranger, alors que les sociétés modernes font largement appel à des mercenaires étrangers dans leurs armées
explanation: |
  Le chapitre oppose explicitement l'ouverture du XVIIIe siècle, citant des exemples tels que le ministre Necker et les gardes suisses au service de gouvernements étrangers, aux restrictions protectionnistes modernes sur les fonctions publiques. Cette évolution historique montre comment les forces démocratiques ont favorisé le protectionnisme des travailleurs, passant d'une ère d'ouverture relative à une ère où la nationalité devient un obstacle à l'emploi dans le service public, reflétant ainsi les tendances protectionnistes plus larges des sociétés démocratiques modernes.
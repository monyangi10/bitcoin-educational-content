question: 暴力競爭與契約競爭的資源分配方式有何根本差異？
answer: 暴力競爭會重新分配現有資源，但不會增加總產量，而合約競爭既能公平分配資源，又能增加總產量。
wrong_answers:
  - 暴力競爭會為社會創造更多財富，而合約競爭只會讓富裕的參與者在交換中獲益。
  - 暴力競爭在資源分配上更有效率，而合約競爭則會導致浪費和低效率的物品分配
  - 暴力競爭可以讓我們有更好的長期規劃，而合約競爭則會造成資源分配的不確定性與不穩定性。
explanation: |
  本章說明暴力競爭和政治再分配只是將現有的資源移動，並沒有創造新的財富，而以自願交換為基礎的契約競爭則具有雙重功能。它不僅能在貢獻者之間公平地分配資源，還能透過個人利益和互惠互利的動機增加總產量。這代表著文明的進步，從破壞性的零和競爭轉變為生產性的正和合作。
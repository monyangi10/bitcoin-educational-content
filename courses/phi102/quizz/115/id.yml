question: Apa perbedaan mendasar antara bagaimana sumber daya didistribusikan dalam persaingan yang keras dengan persaingan kontraktual?
answer: Persaingan kekerasan mendistribusikan kembali sumber daya yang ada tanpa meningkatkan total produksi, sementara persaingan kontraktual mendistribusikan sumber daya secara adil dan meningkatkan produksi secara keseluruhan
wrong_answers:
  - Persaingan yang sehat menciptakan lebih banyak kekayaan bagi masyarakat, sementara persaingan kontraktual hanya menguntungkan peserta yang kaya dalam bursa
  - Persaingan yang keras lebih efisien dalam alokasi sumber daya, sementara persaingan kontraktual menyebabkan pemborosan dan distribusi barang yang tidak efisien
  - Persaingan yang sehat memungkinkan perencanaan jangka panjang yang lebih baik, sementara persaingan kontraktual menciptakan ketidakpastian dan ketidakstabilan dalam distribusi sumber daya
explanation: |
  Bab ini menjelaskan bahwa kompetisi kekerasan dan redistribusi politik hanya memindahkan sumber daya yang ada tanpa menciptakan kekayaan baru, sementara kompetisi kontraktual yang didasarkan pada pertukaran sukarela memiliki fungsi ganda. Kompetisi ini tidak hanya mendistribusikan sumber daya secara adil di antara para kontributor, tetapi juga meningkatkan produksi total melalui motivasi kepentingan pribadi dan keuntungan bersama. Hal ini menunjukkan kemajuan peradaban dari kompetisi zero-sum yang merusak menjadi kerja sama positif yang produktif.
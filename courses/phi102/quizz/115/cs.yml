question: Jaký je zásadní rozdíl mezi rozdělováním zdrojů v násilné soutěži a ve smluvní soutěži?
answer: Násilná konkurence přerozděluje stávající zdroje, aniž by zvýšila celkovou produkci, zatímco smluvní konkurence spravedlivě rozděluje zdroje a zvyšuje celkovou produkci
wrong_answers:
  - Násilná konkurence vytváří větší bohatství pro společnost, zatímco smluvní konkurence přináší prospěch pouze bohatým účastníkům směny
  - Násilná konkurence je efektivnější při rozdělování zdrojů, zatímco smluvní konkurence vede k plýtvání a neefektivnímu rozdělování zboží
  - Násilná konkurence umožňuje lepší dlouhodobé plánování, zatímco smluvní konkurence vytváří nejistotu a nestabilitu v rozdělování zdrojů
explanation: |
  Kapitola vysvětluje, že násilná konkurence a politické přerozdělování pouze přesouvají existující zdroje, aniž by vytvářely nové bohatství, zatímco smluvní konkurence založená na dobrovolné směně plní dvojí funkci. Nejenže spravedlivě rozděluje zdroje mezi přispěvatele, ale také zvyšuje celkovou produkci díky motivaci osobního zájmu a vzájemného prospěchu. To představuje civilizační pokrok od destruktivní soutěže s nulovým součtem k produktivní spolupráci s pozitivním součtem.
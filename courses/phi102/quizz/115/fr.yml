question: Quelle est la différence fondamentale entre la répartition des ressources dans le cadre d'une concurrence violente et d'une concurrence contractuelle ?
answer: La concurrence violente redistribue les ressources existantes sans augmenter la production totale, tandis que la concurrence contractuelle répartit équitablement les ressources et augmente la production globale
wrong_answers:
  - La concurrence violente crée plus de richesse pour la société, tandis que la concurrence contractuelle ne profite qu'aux riches participants aux échanges
  - La concurrence violente est plus efficace dans l'allocation des ressources, tandis que la concurrence contractuelle conduit au gaspillage et à une distribution inefficace des biens
  - La concurrence violente permet une meilleure planification à long terme, tandis que la concurrence contractuelle crée de l'incertitude et de l'instabilité dans la distribution des ressources
explanation: |
  Le chapitre explique que la concurrence violente et la redistribution politique ne font que déplacer les ressources existantes sans créer de nouvelles richesses, tandis que la concurrence contractuelle basée sur l'échange volontaire remplit une double fonction. Non seulement elle distribue équitablement les ressources entre les contributeurs, mais elle augmente également la production totale grâce à la motivation de l'intérêt personnel et du bénéfice mutuel. Cela représente le progrès de la civilisation, qui est passée d'une concurrence destructrice à somme nulle à une coopération productive à somme positive.
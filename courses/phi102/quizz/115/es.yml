question: ¿Cuál es la diferencia fundamental entre cómo se distribuyen los recursos en la competencia violenta y en la competencia contractual?
answer: La competencia violenta redistribuye los recursos existentes sin aumentar la producción total, mientras que la competencia contractual distribuye los recursos equitativamente y aumenta la producción total
wrong_answers:
  - La competencia violenta crea más riqueza para la sociedad, mientras que la competencia contractual sólo beneficia a los participantes ricos en los intercambios
  - La competencia violenta es más eficiente en la asignación de recursos, mientras que la competencia contractual conduce al despilfarro y a una distribución ineficiente de los bienes
  - La competencia violenta permite una mejor planificación a largo plazo, mientras que la competencia contractual crea incertidumbre e inestabilidad en la distribución de recursos
explanation: |
  El capítulo explica que la competencia violenta y la redistribución política se limitan a desplazar los recursos existentes sin crear nueva riqueza, mientras que la competencia contractual basada en el intercambio voluntario cumple una doble función. No sólo distribuye los recursos con justicia entre los contribuyentes, sino que también aumenta la producción total mediante la motivación del interés personal y el beneficio mutuo. Esto representa el progreso de la civilización desde la destructiva competencia de suma cero a la productiva cooperación de suma positiva.
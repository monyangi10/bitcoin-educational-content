question: Mikä on perustavanlaatuinen ero siinä, miten resurssit jaetaan väkivaltaisessa kilpailussa ja sopimuskilpailussa?
answer: Väkivaltainen kilpailu jakaa olemassa olevia resursseja uudelleen lisäämättä kokonaistuotantoa, kun taas sopimusperusteinen kilpailu sekä jakaa resurssit oikeudenmukaisesti että lisää kokonaistuotantoa
wrong_answers:
  - Väkivaltainen kilpailu luo yhteiskunnalle lisää vaurautta, kun taas sopimuskilpailu hyödyttää vain varakkaita vaihto-osapuolia
  - Väkivaltainen kilpailu on tehokkaampaa resurssien kohdentamisessa, kun taas sopimuskilpailu johtaa tuhlaukseen ja tavaroiden tehottomaan jakamiseen
  - Väkivaltainen kilpailu mahdollistaa paremman pitkän aikavälin suunnittelun, kun taas sopimuskilpailu luo epävarmuutta ja epävakautta resurssien jakeluun
explanation: |
  Luvussa selitetään, että väkivaltainen kilpailu ja poliittinen uudelleenjako vain siirtävät olemassa olevia resursseja luomatta uutta vaurautta, kun taas vapaaehtoiseen vaihtoon perustuvalla sopimuskilpailulla on kaksitahoinen tehtävä. Sen lisäksi, että se jakaa resurssit oikeudenmukaisesti tekijöiden kesken, se myös lisää kokonaistuotantoa henkilökohtaisen edun ja keskinäisen hyödyn motivoimana. Tämä edustaa sivilisaation edistymistä tuhoisasta nollasummakilpailusta tuottavaan positiivisen summan yhteistyöhön.
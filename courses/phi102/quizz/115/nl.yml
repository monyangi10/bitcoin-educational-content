question: Wat is het fundamentele verschil tussen hoe middelen worden verdeeld in gewelddadige concurrentie versus contractuele concurrentie?
answer: Gewelddadige concurrentie herverdeelt bestaande middelen zonder de totale productie te verhogen, terwijl contractuele concurrentie middelen eerlijk verdeelt en de totale productie verhoogt
wrong_answers:
  - Gewelddadige concurrentie creëert meer rijkdom voor de samenleving, terwijl contractuele concurrentie alleen ten goede komt aan de rijke deelnemers aan de uitwisselingen
  - Gewelddadige concurrentie is efficiënter in het toewijzen van middelen, terwijl contractuele concurrentie leidt tot verspilling en inefficiënte distributie van goederen
  - Gewelddadige concurrentie maakt betere langetermijnplanning mogelijk, terwijl contractuele concurrentie onzekerheid en instabiliteit in de verdeling van hulpbronnen creëert
explanation: |
  Het hoofdstuk legt uit dat gewelddadige concurrentie en politieke herverdeling slechts bestaande middelen verplaatsen zonder nieuwe rijkdom te creëren, terwijl contractuele concurrentie op basis van vrijwillige ruil een dubbele functie heeft. Het verdeelt niet alleen middelen op een rechtvaardige manier onder de bijdragers maar verhoogt ook de totale productie door de motivatie van persoonlijk belang en wederzijds voordeel. Dit vertegenwoordigt de vooruitgang van de beschaving van destructieve zero-sum competitie naar productieve positive-sum samenwerking.
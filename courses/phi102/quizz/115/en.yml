question: What is the fundamental difference between how resources are distributed in violent competition versus contractual competition?
answer: Violent competition redistributes existing resources without increasing total production, while contractual competition both distributes resources fairly and increases overall production
wrong_answers:
  - Violent competition creates more wealth for society while contractual competition only benefits the wealthy participants in exchanges
  - Violent competition is more efficient at resource allocation while contractual competition leads to waste and inefficient distribution of goods
  - Violent competition allows for better long-term planning while contractual competition creates uncertainty and instability in resource distribution
explanation: |
  The chapter explains that violent competition and political redistribution merely move existing resources around without creating new wealth, while contractual competition based on voluntary exchange serves a dual function. It not only distributes resources justly among contributors but also increases total production through the motivation of personal interest and mutual benefit. This represents civilization's progress from destructive zero-sum competition to productive positive-sum cooperation.

question: Sự khác biệt cơ bản giữa cách phân bổ nguồn lực trong cạnh tranh khốc liệt và cạnh tranh dựa trên hợp đồng là gì?
answer: Cạnh tranh khốc liệt phân phối lại các nguồn lực hiện có mà không làm tăng tổng sản lượng, trong khi cạnh tranh theo hợp đồng vừa phân phối nguồn lực một cách công bằng vừa làm tăng tổng sản lượng.
wrong_answers:
  - Cạnh tranh khốc liệt tạo ra nhiều của cải hơn cho xã hội, trong khi cạnh tranh dựa trên hợp đồng chỉ mang lại lợi ích cho những người giàu có tham gia vào các giao dịch.
  - Cạnh tranh khốc liệt hiệu quả hơn trong việc phân bổ nguồn lực, trong khi cạnh tranh dựa trên hợp đồng dẫn đến lãng phí và phân phối hàng hóa không hiệu quả.
  - Cạnh tranh khốc liệt cho phép lập kế hoạch dài hạn tốt hơn, trong khi cạnh tranh dựa trên hợp đồng tạo ra sự không chắc chắn và bất ổn trong phân bổ nguồn lực.
explanation: |
  Chương này giải thích rằng cạnh tranh bạo lực và phân phối lại chính trị chỉ đơn thuần là di chuyển các nguồn lực hiện có mà không tạo ra của cải mới, trong khi cạnh tranh dựa trên hợp đồng và trao đổi tự nguyện phục vụ chức năng kép. Nó không chỉ phân phối nguồn lực một cách công bằng giữa các bên đóng góp mà còn làm tăng tổng sản lượng thông qua động lực lợi ích cá nhân và lợi ích chung. Điều này thể hiện sự tiến bộ của nền văn minh từ cạnh tranh hủy diệt theo kiểu "được ăn cả, mất tất cả" sang hợp tác hiệu quả theo kiểu "được ăn cả, mất tất cả".
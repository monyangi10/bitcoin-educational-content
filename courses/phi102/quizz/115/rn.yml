question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’ingene ubutunzi bugabanwa mu mahiganwa y’ubukazi n’amahiganwa y’amasezerano?
answer: Uguhiganwa kw’ubukazi gusubira gusangira ubutunzi buriho ata kwongera umusaruro wose, mu gihe uguhiganwa kw’amasezerano kwongerekana ubutunzi mu buryo bubereye kandi kwongerekana umusaruro wose .
wrong_answers:
  - Uguhiganwa kw’ubukazi gutuma abantu baronka ubutunzi bwinshi mu gihe uguhiganwa kw’amasezerano kugirira akamaro gusa abatunzi bari mu bikorwa vyo guhanahana amakuru .
  - Uguhiganwa kw'ubukazi ni kwo gukora neza cane mu gutanga umutungo mu gihe uguhiganwa kw'amasezerano bituma haba ugusesagura no gutanga ibicuruzwa nabi .
  - Uguhiganwa kw’ubukazi gutuma habaho igenamigambi ryiza ry’igihe kirekire mu gihe uguhiganwa kw’amasezerano gutuma habaho ukudakeka n’ukudashikama mu gutanga umutungo .
explanation: |
  Ico gice kirasigura ko uguhiganwa kw’ubukazi n’ugusubira gusangira politike bituma gusa ubutunzi buriho bugendagenda ata butunzi bushasha butera, mu gihe uguhiganwa kw’amasezerano gushingiye ku guhinduranya ubushake gukora ibikorwa bibiri. Ntigabanura gusa ubutunzi mu buryo bubereye mu batanga, ariko kandi iratuma umusaruro wose ugenda uragwira biciye mu gutuma umuntu agira inyungu z’umuntu ku giti ciwe n’inyungu z’abantu bose. Ivyo bigereranya iterambere ry’ubutekerezi kuva ku guhiganwa gusenyura kw’amahera ataco amaze gushika ku gukorana neza kw’amahera.
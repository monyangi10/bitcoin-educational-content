question: Hva er den grunnleggende forskjellen mellom hvordan ressurser fordeles i voldelig konkurranse og i kontraktbasert konkurranse?
answer: Voldelig konkurranse omfordeler eksisterende ressurser uten å øke den totale produksjonen, mens kontraktsbasert konkurranse både fordeler ressursene rettferdig og øker den totale produksjonen
wrong_answers:
  - Voldelig konkurranse skaper mer velstand for samfunnet, mens kontraktskonkurranse bare er til fordel for de velstående deltakerne i utvekslingene
  - Voldelig konkurranse er mer effektiv når det gjelder ressursallokering, mens kontraktskonkurranse fører til sløsing og ineffektiv fordeling av goder
  - Voldsom konkurranse gir bedre mulighet for langsiktig planlegging, mens kontraktsbasert konkurranse skaper usikkerhet og ustabilitet i ressursfordelingen
explanation: |
  Kapitlet forklarer at voldelig konkurranse og politisk omfordeling bare flytter rundt på eksisterende ressurser uten å skape ny velstand, mens kontraktskonkurranse basert på frivillig bytte har en dobbel funksjon. Den fordeler ikke bare ressursene rettferdig mellom bidragsyterne, men øker også den totale produksjonen gjennom motivasjon av personlig interesse og gjensidig nytte. Dette representerer sivilisasjonens utvikling fra destruktiv nullsumskonkurranse til produktivt plussumssamarbeid.
question: Qual è la differenza fondamentale tra la distribuzione delle risorse in una competizione violenta e in una competizione contrattuale?
answer: La concorrenza violenta ridistribuisce le risorse esistenti senza aumentare la produzione totale, mentre la concorrenza contrattuale distribuisce equamente le risorse e aumenta la produzione complessiva
wrong_answers:
  - La competizione violenta crea più ricchezza per la società, mentre la competizione contrattuale avvantaggia solo i partecipanti più ricchi agli scambi
  - La concorrenza violenta è più efficiente nell'allocazione delle risorse, mentre la concorrenza contrattuale porta a sprechi e a una distribuzione inefficiente dei beni
  - La concorrenza violenta consente una migliore pianificazione a lungo termine, mentre la concorrenza contrattuale crea incertezza e instabilità nella distribuzione delle risorse
explanation: |
  Il capitolo spiega che la competizione violenta e la redistribuzione politica si limitano a spostare le risorse esistenti senza creare nuova ricchezza, mentre la competizione contrattuale basata sullo scambio volontario svolge una duplice funzione. Non solo distribuisce le risorse in modo equo tra i contribuenti, ma aumenta anche la produzione totale grazie alla motivazione dell'interesse personale e del vantaggio reciproco. Questo rappresenta il progresso della civiltà dalla distruttiva competizione a somma zero alla produttiva cooperazione a somma positiva.
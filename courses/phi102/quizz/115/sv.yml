question: Vad är den grundläggande skillnaden mellan hur resurser fördelas i en våldsam konkurrens och en avtalsbaserad konkurrens?
answer: Våldsam konkurrens omfördelar befintliga resurser utan att öka den totala produktionen, medan avtalsbaserad konkurrens både fördelar resurserna rättvist och ökar den totala produktionen
wrong_answers:
  - Våldsam konkurrens skapar mer välstånd för samhället, medan avtalsbaserad konkurrens endast gynnar de rika deltagarna i utbytet
  - Våldsam konkurrens är mer effektiv när det gäller resursfördelning, medan avtalsbaserad konkurrens leder till slöseri och ineffektiv fördelning av varor
  - Våldsam konkurrens möjliggör bättre långsiktig planering medan avtalsbaserad konkurrens skapar osäkerhet och instabilitet i resursfördelningen
explanation: |
  I kapitlet förklaras att våldsam konkurrens och politisk omfördelning bara flyttar runt befintliga resurser utan att skapa nya rikedomar, medan avtalsbaserad konkurrens som bygger på frivilligt utbyte har en dubbel funktion. Den fördelar inte bara resurser rättvist mellan bidragsgivarna utan ökar också den totala produktionen genom att motivera till personligt intresse och ömsesidig nytta. Detta representerar civilisationens framsteg från destruktiv nollsummetävling till produktivt positivsummesamarbete.
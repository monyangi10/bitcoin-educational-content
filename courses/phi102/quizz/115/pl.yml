question: Jaka jest podstawowa różnica między sposobem dystrybucji zasobów w brutalnej konkurencji a konkurencją kontraktową?
answer: Brutalna konkurencja redystrybuuje istniejące zasoby bez zwiększania całkowitej produkcji, podczas gdy konkurencja kontraktowa zarówno sprawiedliwie dystrybuuje zasoby, jak i zwiększa ogólną produkcję
wrong_answers:
  - Brutalna konkurencja tworzy więcej bogactwa dla społeczeństwa, podczas gdy konkurencja kontraktowa przynosi korzyści tylko bogatym uczestnikom wymiany
  - Brutalna konkurencja jest bardziej efektywna w alokacji zasobów, podczas gdy konkurencja kontraktowa prowadzi do marnotrawstwa i nieefektywnej dystrybucji dóbr
  - Gwałtowna konkurencja pozwala na lepsze długoterminowe planowanie, podczas gdy konkurencja kontraktowa powoduje niepewność i niestabilność w dystrybucji zasobów
explanation: |
  Rozdział ten wyjaśnia, że brutalna konkurencja i polityczna redystrybucja jedynie przemieszczają istniejące zasoby bez tworzenia nowego bogactwa, podczas gdy konkurencja kontraktowa oparta na dobrowolnej wymianie pełni podwójną funkcję. Nie tylko sprawiedliwie rozdziela zasoby między współtwórców, ale także zwiększa całkowitą produkcję poprzez motywację osobistych interesów i wzajemnych korzyści. Stanowi to postęp cywilizacyjny od destrukcyjnej konkurencji o sumie zerowej do produktywnej współpracy o sumie dodatniej.
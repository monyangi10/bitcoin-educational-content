question: 폭력적 경쟁과 계약 경쟁에서 자원이 분배되는 방식의 근본적인 차이점은 무엇인가요?
answer: 폭력적 경쟁은 총 생산량을 늘리지 않고 기존 자원을 재분배하는 반면, 계약 경쟁은 자원을 공정하게 분배하고 전체 생산량을 늘립니다
wrong_answers:
  - 폭력적인 경쟁은 사회에 더 많은 부를 창출하는 반면, 계약 경쟁은 거래소의 부유한 참여자에게만 혜택을 줍니다
  - 폭력적인 경쟁은 자원 배분에서 더 효율적인 반면, 계약 경쟁은 낭비와 비효율적인 재화 분배로 이어집니다
  - 치열한 경쟁은 더 나은 장기 계획을 가능하게 하는 반면, 계약 경쟁은 자원 분배의 불확실성과 불안정성을 야기합니다
explanation: |
  이 장에서는 폭력적 경쟁과 정치적 재분배는 새로운 부를 창출하지 않고 기존 자원을 이동시킬 뿐이지만, 자발적 교환에 기반한 계약 경쟁은 두 가지 기능을 수행한다고 설명합니다. 기여자들 간에 자원을 공정하게 배분할 뿐만 아니라 개인의 이익과 상호 이익이라는 동기를 통해 총 생산량을 증가시킵니다. 이는 파괴적인 제로섬 경쟁에서 생산적인 포지티브섬 협력으로 문명이 발전하고 있음을 나타냅니다.
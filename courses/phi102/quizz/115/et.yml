question: Milline on põhimõtteline erinevus ressursside jaotamise vahel vägivaldses konkurentsis ja lepingulises konkurentsis?
answer: Vägivaldne konkurents jaotab olemasolevad ressursid ümber, suurendamata kogutoodangut, samas kui lepinguline konkurents jaotab ressursid õiglaselt ja suurendab kogutoodangut
wrong_answers:
  - Vägivaldne konkurents loob ühiskonnale rohkem jõukust, samas kui lepinguline konkurents toob kasu ainult jõukatele vahetuses osalejatele
  - Vägivaldne konkurents on ressursside jaotamisel tõhusam, samas kui lepinguline konkurents toob kaasa raiskamise ja kaupade ebaefektiivse jaotamise
  - Vägivaldne konkurents võimaldab paremat pikaajalist planeerimist, samas kui lepinguline konkurents tekitab ebakindlust ja ebastabiilsust ressursside jaotamisel
explanation: |
  Peatükis selgitatakse, et vägivaldne konkurents ja poliitiline ümberjagamine lihtsalt liigutavad olemasolevaid ressursse, ilma et nad looksid uut rikkust, samas kui vabatahtlikul vahetusel põhinev lepinguline konkurents täidab kahte funktsiooni. See mitte ainult ei jaga ressursse õiglaselt panustajate vahel, vaid suurendab ka kogutoodangut isikliku huvi ja vastastikuse kasu motivatsiooni kaudu. See kujutab endast tsivilisatsiooni arengut hävitavast nullsummalisest konkurentsist produktiivse positiivsummalise koostöö suunas.
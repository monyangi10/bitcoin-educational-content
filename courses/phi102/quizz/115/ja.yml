question: 暴力的な競争と契約上の競争における資源の分配方法の根本的な違いは何か？
answer: 暴力的な競争は、総生産を増加させることなく、既存の資源を再分配する。一方、契約による競争は、資源を公正に分配し、総生産を増加させる。
wrong_answers:
  - 暴力的な競争は社会により多くの富をもたらすが、契約上の競争は交換の参加者である富裕層に利益をもたらすだけである。
  - 暴力的な競争は資源配分の効率が高いが、契約による競争は無駄と非効率的な財の配分をもたらす。
  - 暴力的な競争はより良い長期計画を可能にするが、契約上の競争は資源分配に不確実性と不安定性をもたらす。
explanation: |
  この章では、暴力的な競争や政治的な再分配は、新たな富を生み出すことなく既存の資源を移動させるだけであるのに対し、自発的な交換に基づく契約上の競争は、二重の機能を果たすと説明している。自発的な交換に基づく契約上の競争は二重の機能を果たす。契約上の競争は、貢献者間に資源を公正に分配するだけでなく、個人的利益と相互利益という動機を通じて総生産を増大させる。これは、破壊的なゼロサム競争から生産的なプラスサム協力への文明の進歩を表している。
question: 暴力竞争与契约竞争的资源分配方式有何本质区别？
answer: 暴力竞争会重新分配现有资源，但不会增加总产量，而契约竞争既能公平分配资源，又能增加总产量
wrong_answers:
  - 暴力竞争能为社会创造更多财富，而契约竞争只能让参与交换的富人受益
  - 暴力竞争在资源分配方面更有效率，而契约竞争则会导致浪费和低效的货物分配
  - 暴力竞争可以更好地进行长期规划，而契约竞争则会造成资源分配的不确定性和不稳定性
explanation: |
  本章解释说，暴力竞争和政治再分配只是将现有资源四处转移，而不会创造新的财富，而基于自愿交换的契约竞争则具有双重功能。它不仅在贡献者之间公正地分配资源，而且通过个人利益和互惠互利的激励增加了总产量。这代表了文明从破坏性的零和竞争到生产性的正和合作的进步。
question: Qual é a diferença fundamental entre a forma como os recursos são distribuídos numa concorrência violenta e numa concorrência contratual?
answer: A concorrência violenta redistribui os recursos existentes sem aumentar a produção total, enquanto a concorrência contratual distribui os recursos de forma justa e aumenta a produção global
wrong_answers:
  - A concorrência violenta gera mais riqueza para a sociedade, enquanto a concorrência contratual apenas beneficia os participantes ricos nas trocas
  - A concorrência violenta é mais eficiente na afetação de recursos, enquanto a concorrência contratual conduz ao desperdício e à distribuição ineficiente de bens
  - A concorrência violenta permite um melhor planeamento a longo prazo, enquanto a concorrência contratual cria incerteza e instabilidade na distribuição dos recursos
explanation: |
  O capítulo explica que a concorrência violenta e a redistribuição política se limitam a deslocar os recursos existentes sem criar novas riquezas, ao passo que a concorrência contratual baseada na troca voluntária tem uma dupla função. Não só distribui os recursos de forma justa entre os contribuintes, como também aumenta a produção total através da motivação do interesse pessoal e do benefício mútuo. Isto representa o progresso da civilização da competição destrutiva de soma zero para a cooperação produtiva de soma positiva.
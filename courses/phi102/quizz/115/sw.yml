question: Kuna tofauti gani ya msingi kati ya jinsi rasilimali zinavyosambazwa katika ushindani mkali dhidi ya ushindani wa kimkataba?
answer: Ushindani wa vurugu husambaza upya rasilimali zilizopo bila kuongeza uzalishaji wote, huku ushindani wa kimkataba ukisambaza rasilimali kwa usawa na kuongeza uzalishaji kwa ujumla.
wrong_answers:
  - Ushindani wa vurugu huleta utajiri zaidi kwa jamii huku ushindani wa kimkataba ukinufaisha tu washiriki matajiri katika mabadilishano
  - Ushindani wa vurugu una ufanisi zaidi katika ugawaji wa rasilimali huku ushindani wa kimkataba ukisababisha upotevu na usambazaji usiofaa wa bidhaa.
  - Ushindani mkali huruhusu mipango bora ya muda mrefu huku ushindani wa kimkataba ukileta kutokuwa na uhakika na kutokuwa na utulivu katika usambazaji wa rasilimali
explanation: |
  Sura hiyo inaelezea kwamba ushindani mkali na ugawaji upya wa kisiasa huhamisha tu rasilimali zilizopo bila kuunda utajiri mpya, huku ushindani wa kimkataba unaotegemea ubadilishanaji wa hiari ukifanya kazi mbili. Sio tu kwamba husambaza rasilimali kwa haki miongoni mwa wachangiaji lakini pia huongeza uzalishaji mzima kupitia motisha ya maslahi binafsi na manufaa ya pande zote. Hii inawakilisha maendeleo ya ustaarabu kutoka kwa ushindani usio na kikomo hadi ushirikiano wenye tija wa jumla.
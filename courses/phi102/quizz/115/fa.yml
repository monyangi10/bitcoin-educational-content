question: تفاوت اساسی بین نحوه توزیع منابع در رقابت خشونت‌آمیز و رقابت قراردادی چیست؟
answer: رقابت خشونت‌آمیز منابع موجود را بدون افزایش تولید کل توزیع می‌کند، در حالی که رقابت قراردادی هم منابع را به‌طور عادلانه توزیع می‌کند و هم تولید کلی را افزایش می‌دهد.
wrong_answers:
  - رقابت خشونت‌آمیز ثروت بیشتری برای جامعه ایجاد می‌کند، در حالی که رقابت قراردادی تنها به شرکت‌کنندگان ثروتمند در مبادلات سود می‌رساند.
  - رقابت خشونت‌آمیز در تخصیص منابع کارآمدتر است، در حالی که رقابت قراردادی منجر به هدررفت و توزیع ناکارآمد کالاها می‌شود.
  - رقابت خشونت‌آمیز امکان برنامه‌ریزی بهتر بلندمدت را فراهم می‌کند، در حالی که رقابت قراردادی باعث ایجاد عدم قطعیت و بی‌ثباتی در توزیع منابع می‌شود.
explanation: |
  فصل توضیح می‌دهد که رقابت خشونت‌آمیز و بازتوزیع سیاسی صرفاً منابع موجود را جابجا می‌کنند بدون اینکه ثروت جدیدی ایجاد کنند، در حالی که رقابت قراردادی مبتنی بر مبادله داوطلبانه دو وظیفه را انجام می‌دهد. این نه تنها منابع را به‌طور عادلانه در میان مشارکت‌کنندگان توزیع می‌کند، بلکه از طریق انگیزه منافع شخصی و سود متقابل، تولید کل را نیز افزایش می‌دهد. این نشان‌دهنده پیشرفت تمدن از رقابت مخرب با مجموع صفر به همکاری سازنده با مجموع مثبت است.
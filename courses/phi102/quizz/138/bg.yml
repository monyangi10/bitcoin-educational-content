question: Защо според анализа на Фредерик Бастиа свободата, собствеността и равенството са фундаментално неразделни понятия?
answer: Защото истинската свобода означава свободно ползване на собствеността, а равенството изисква всички хора да се ползват еднакво от правото си на собственост, без да бъдат разваляни от другите
wrong_answers:
  - Защото преразпределението на собствеността е необходимо за постигане на равенство, което след това създава условия за процъфтяване на индивидуалната свобода в обществото
  - Тъй като равенството на резултатите трябва да бъде наложено чрез колективна собственост, която след това гарантира еднаква свобода за всички социални класи
  - Тъй като свободата изисква държавна намеса за изравняване на разпределението на собствеността, като се гарантира, че свободата не е концентрирана сред богатите собственици на имоти
explanation: |
  Концепцията на Бастиа показва, че свободата по същество е собственост - да бъдеш свободен означава да използваш законните си притежания по свое желание. Истинско равенство съществува, когато правата на собственост на всички се зачитат еднакво, а не когато резултатите се изравняват изкуствено. Системите без свобода създават неравенство, като позволяват на едни да се наслаждават на собствеността си, докато други са разглезени. Неправилните отговори изопачават това, като предполагат, че преразпределението или държавната намеса създават свобода, докато Бастиа твърди, че те всъщност разрушават връзката собственост-свобода.
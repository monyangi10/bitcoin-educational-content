question: Waarom zijn vrijheid, eigendom en gelijkheid volgens de analyse van Frédéric Bastiat fundamenteel onafscheidelijke concepten?
answer: Omdat echte vrijheid betekent dat je je eigendom vrijelijk kunt gebruiken, en gelijkheid vereist dat alle individuen in gelijke mate genieten van hun eigendomsrechten zonder te worden bedorven door anderen
wrong_answers:
  - Omdat herverdeling van eigendom noodzakelijk is om gelijkheid te bereiken, wat vervolgens de voorwaarden schept voor individuele vrijheid om te floreren in de samenleving
  - Omdat gelijkheid van resultaten moet worden afgedwongen door collectief eigendom, dat vervolgens gelijke vrijheid garandeert voor alle sociale klassen
  - Omdat vrijheid staatsinterventie vereist om de verdeling van eigendommen gelijk te trekken, moet ervoor worden gezorgd dat vrijheid niet wordt geconcentreerd bij rijke eigenaars
explanation: |
  Bastiat's concept laat zien dat vrijheid in essentie eigendom is - vrij zijn betekent je legitieme bezittingen naar eigen inzicht gebruiken. Echte gelijkheid bestaat wanneer ieders eigendomsrechten in gelijke mate worden gerespecteerd, niet wanneer de resultaten kunstmatig worden geëgaliseerd. Systemen zonder vrijheid creëren ongelijkheid door sommigen van hun eigendom te laten genieten terwijl anderen verwend worden. De foute antwoorden geven dit verkeerd weer door te suggereren dat herverdeling of staatsinterventie vrijheid creëert, terwijl Bastiat stelt dat deze juist de connectie tussen eigendom en vrijheid vernietigen.
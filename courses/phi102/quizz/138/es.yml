question: Según el análisis de Frédéric Bastiat, ¿por qué la libertad, la propiedad y la igualdad son conceptos fundamentalmente inseparables?
answer: Porque la verdadera libertad consiste en utilizar libremente los bienes, y la igualdad exige que todas las personas disfruten por igual de sus derechos de propiedad sin que los demás se los estropeen
wrong_answers:
  - Porque la redistribución de la propiedad es necesaria para lograr la igualdad, que a su vez crea las condiciones para que la libertad individual florezca en la sociedad
  - Porque la igualdad de resultados debe imponerse a través de la propiedad colectiva, que garantiza la misma libertad a todas las clases sociales
  - Porque la libertad requiere la intervención del Estado para igualar la distribución de la propiedad, garantizando que la libertad no se concentre entre los propietarios ricos
explanation: |
  El concepto de Bastiat muestra que la libertad es esencialmente propiedad: ser libre significa utilizar las posesiones legítimas de uno como se desee. La verdadera igualdad existe cuando se respetan por igual los derechos de propiedad de todos, no cuando se igualan artificialmente los resultados. Los sistemas de no-libertad crean desigualdad al permitir que algunos disfruten de su propiedad mientras que otros son mimados. Las respuestas erróneas tergiversan esto sugiriendo que la redistribución o la intervención estatal crean libertad, cuando Bastiat argumenta que en realidad destruyen la conexión entre propiedad y libertad.
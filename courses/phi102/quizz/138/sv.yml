question: Enligt Frédéric Bastiats analys, varför är frihet, egendom och jämlikhet i grunden oskiljaktiga begrepp?
answer: Eftersom verklig frihet innebär att man kan använda sin egendom fritt, och jämlikhet kräver att alla individer har samma rätt till sin egendom utan att bli förfördelade av andra
wrong_answers:
  - Eftersom omfördelning av egendom är nödvändig för att uppnå jämlikhet, vilket sedan skapar förutsättningar för att den individuella friheten ska blomstra i samhället
  - Eftersom lika utfall måste genomdrivas genom kollektivt ägande av egendom, vilket sedan garanterar lika frihet för alla sociala klasser
  - Eftersom frihet kräver statligt ingripande för att utjämna egendomsfördelningen och säkerställa att friheten inte koncentreras till rika fastighetsägare
explanation: |
  Bastiats begrepp visar att frihet i grunden är egendom - att vara fri innebär att använda sina legitima ägodelar som man vill. Sann jämlikhet råder när allas äganderätt respekteras lika mycket, inte när utfallet utjämnas på konstgjord väg. System som inte bygger på frihet skapar ojämlikhet genom att tillåta vissa att njuta av sin egendom medan andra blir bortskämda. I de felaktiga svaren framställs detta felaktigt genom att omfördelning eller statliga ingripanden anses skapa frihet, när Bastiat menar att dessa faktiskt förstör sambandet mellan egendom och frihet.
question: 根據自由主義哲學，社會主義思想中關於不同組織規模的財產權有什麼根本不一致的地方？
answer: 社會主義者捍衛國家層級的集體財產權，同時拒絕個人財產權，儘管兩者都源自於相同的擁有與改良原則。
wrong_answers:
  - 社會主義者支持個人的私有財產，但反對團體的集體所有權，這在他們的經濟理論中造成了矛盾
  - 社會主義者同樣拒絕所有形式的財產權，不論是個人或集體的，這使得他們的立場內部一致，但實際上卻不可能
  - 社會主義者只接受農地的財產權，但拒絕工業資產的財產權，在財產類型之間製造武斷的區別
explanation: |
  本章揭示了社會主義者在抨擊個人財產權的同時，卻自相矛盾地保護國家邊界和集體財產權。國家領土和私人財產都是透過類似發現、改良和捍衛的過程而產生的。國家透過勘探獲得領土，並透過農業和基礎建設發展這些領土，就像個人獲得和改善私人財產一樣。儘管兩者都是基於相同的擁有、勞動和改良原則，但不一致之處在於一方面承認集體的財產權，另一方面卻剝奪個人相同的基本權利。
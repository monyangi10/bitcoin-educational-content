question: Liberal felsefeye göre, farklı örgütlenme ölçeklerinde mülkiyet haklarına ilişkin sosyalist düşüncede hangi temel tutarsızlık vardır?
answer: Sosyalistler ulusal düzeyde kolektif mülkiyet haklarını savunurken, her ikisi de aynı mülkiyet ve iyileştirme ilkelerinden kaynaklanmasına rağmen bireysel mülkiyet haklarını reddederler
wrong_answers:
  - Sosyalistler, bireyler için özel mülkiyeti desteklerken, gruplar tarafından kolektif mülkiyete karşı çıkarak ekonomi teorilerinde bir çelişki yaratırlar
  - Sosyalistler, ister bireysel ister kolektif olsun, mülkiyet haklarının tüm biçimlerini eşit derecede reddederler, bu da konumlarını içsel olarak tutarlı ancak pratik olarak imkansız kılar
  - Sosyalistler mülkiyet haklarını sadece tarım arazileri için kabul ederken, endüstriyel varlıklar için reddederek mülkiyet türleri arasında keyfi bir ayrım yaratırlar
explanation: |
  Bu bölüm, sosyalistlerin paradoksal bir şekilde ulusal sınırları ve kolektif mülkiyet haklarını savunurken bireysel mülkiyet haklarına saldırdıklarını ortaya koymaktadır. Hem ulusal topraklar hem de özel mülkiyet benzer keşif, geliştirme ve savunma süreçleriyle ortaya çıkmaktadır. Tıpkı bireylerin özel mülkiyeti edinmesi ve geliştirmesi gibi, uluslar da keşifler yoluyla toprak edinmiş ve bu toprakları tarım ve altyapı yoluyla geliştirmiştir. Tutarsızlık, her ikisi de aynı mülkiyet, emek ve iyileştirme ilkelerine dayanmasına rağmen, kolektifler için mülkiyet haklarını tanırken, bireyler için aynı temel hakları reddetmekte yatmaktadır.
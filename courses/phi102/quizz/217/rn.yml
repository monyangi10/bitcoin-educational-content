question: Dushingiye kuri filozofiya y’ubwigenge, ni ukudahuza gute kw’ishimikiro kuri mu vyiyumviro vy’abasosiyalisiti ku bijanye n’uburenganzira bw’itunga ku rugero rutandukanye rw’imitunganirize?
answer: Abasosiyalisiti barwanira uburenganzira bw’umutungo rusangi ku rwego rw’igihugu mu gihe banka uburenganzira bw’umutungo w’umuntu ku giti ciwe, naho vyose bikomoka ku ngingo ngenderwako zimwe z’ugutunga no gutera imbere .
wrong_answers:
  - Abasosiyalisiti bashigikira umutungo w’abantu ku giti cabo ariko bakarwanya umutungo rusangi w’imigwi, ivyo bikaba bituma habaho ukuvuguruzanya mu vyiyumviro vyabo vy’ubutunzi .
  - Abasosiyalisiti banka ubwoko bwose bw’uburenganzira bw’itunga mu buryo bungana, bwaba ubw’umuntu ku giti ciwe canke ubw’abantu bose, ivyo bikaba bituma ikibanza cabo gihuye imbere mu mutima ariko mu vy’ukuri kidashoboka .
  - Abasosiyalisiti bemera uburenganzira bw’umutungo ku butaka bw’uburimyi gusa ariko bakabwanka ku mutungo w’inganda, ivyo bikaba bituma habaho itandukaniro ry’ubujuju hagati y’ubwoko bw’umutungo .
explanation: |
  Ico gice kirerekana ko abasosiyalisiti barwanira mu buryo buteye ubwoba imipaka y’igihugu n’uburenganzira bw’umutungo rusangi mu gihe batera uburenganzira bw’umutungo w’umuntu ku giti ciwe. Intara z’igihugu n’iz’abantu ku giti cabo zompi zikomoka ku nzira zisa n’izo zo kuvumbura, gutera imbere no kwikingira. Amahanga yaronka intara biciye mu gutohoza, akaziteza imbere biciye mu burimyi no mu bikorwa remezo, nk’uko nyene abantu ku giti cabo baronka kandi bagateza imbere ivy’abantu ku giti cabo. Ivyo bidahuye biri mu kwemera uburenganzira bw’itunga ku bantu bose mu gihe bahakana uburenganzira bumwe bw’ishimikiro ku bantu ku giti cabo, naho vyose bishingiye ku ngingo ngenderwako zimwe z’ugutunga, ugukora n’ugutera imbere.
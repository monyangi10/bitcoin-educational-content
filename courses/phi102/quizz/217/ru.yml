question: Согласно либеральной философии, какое фундаментальное несоответствие существует в социалистическом мышлении относительно прав собственности на разных уровнях организации?
answer: Социалисты защищают права коллективной собственности на национальном уровне, отвергая при этом права индивидуальной собственности, несмотря на то, что и те, и другие исходят из одних и тех же принципов владения и совершенствования
wrong_answers:
  - Социалисты поддерживают частную собственность для отдельных лиц, но выступают против коллективной собственности для групп, что создает противоречие в их экономической теории
  - Социалисты отвергают все формы прав собственности в равной степени, будь то индивидуальные или коллективные, что делает их позицию внутренне последовательной, но практически невозможной
  - Социалисты признают право собственности только на сельскохозяйственные земли и отказываются от него в отношении промышленных активов, создавая произвольное различие между видами собственности
explanation: |
  В главе показано, что социалисты парадоксальным образом защищают национальные границы и права коллективной собственности, одновременно нападая на права индивидуальной собственности. И национальные территории, и частная собственность возникают в результате схожих процессов открытия, улучшения и защиты. Нации приобретали территории путем освоения и развивали их с помощью сельского хозяйства и инфраструктуры, точно так же как отдельные люди приобретают и улучшают частную собственность. Непоследовательность заключается в признании прав собственности для коллективов и одновременном отрицании тех же фундаментальных прав для отдельных лиц, несмотря на то, что обе собственности основаны на идентичных принципах владения, труда и совершенствования.
question: Co by se podle textu stalo, kdyby regulační stát zasahoval do individuální volby práce?
answer: Narušuje přirozený řetězec tím, že zavádí jednotné akční plány bez ohledu na individuální dispozice
wrong_answers:
  - Zvyšuje individuální svobodu tím, že poskytuje jasné pokyny pro optimální pracovní výkon
  - Efektivní koordinací různorodého individuálního úsilí vytváří lepší hospodářské výsledky
  - Chrání pracovníky před vykořisťováním tím, že zajišťuje spravedlivé rozdělování zdrojů a příležitostí
explanation: |
  Podle textu, když regulační stát zasahuje, narušuje přirozený proces, kdy jednotlivci reagují na své osobní potřeby podle svých vlastních dispozic, vkusu a schopností. Stát vnucuje jednotná řešení, která ignorují základní skutečnost, že lidé prožívají potřeby různě a mají různé schopnosti je řešit. Tento zásah je v rozporu se zásadou, že vzhledem k tomu, že potřeby jsou osobní a individuální, měli by mít lidé možnost reagovat na ně způsobem, který považují za nejvhodnější vzhledem ke své konkrétní situaci.
question: 如果管制國家介入個人的工作選擇，文中暗示會發生什麼事？
answer: 它打破了自然鏈，強加了統一的行動計劃，而沒有考慮到個人的性情
wrong_answers:
  - 它透過提供最佳工作表現的明確指引，提升個人自由度
  - 透過有效協調不同的個人努力，創造更好的經濟成果
  - 它透過確保資源與機會的公平分配，保護勞工免於剝削。
explanation: |
  根據文中所述，當規範國家介入時，就會破壞個人根據自己的性情、品味和能力回應個人需求的自然過程。國家強加劃一的解決方案，卻忽略了一個基本現實：人們有不同的需求經驗，也有不同的解決能力。這種干預違反了以下原則：既然需求是個人的和個別的，人們就應該可以自由地以他們認為最適合其具體情況的方式來滿足這些需求。
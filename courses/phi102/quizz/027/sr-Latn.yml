question: Šta tekst sugeriše da bi se desilo ako bi regulatorna država intervenisala u individualne izbore rada?
answer: To prekida prirodni lanac namećući jedinstvene planove akcije bez razmatranja pojedinačnih sklonosti.
wrong_answers:
  - Poboljšava individualnu slobodu pružanjem jasnih smernica za optimalan radni učinak
  - Stvara bolje ekonomske rezultate efikasnim koordinisanjem različitih individualnih napora.
  - Štiti radnike od eksploatacije osiguravajući pravednu raspodelu resursa i mogućnosti.
explanation: |
  Prema tekstu, kada regulatorna država interveniše, ona narušava prirodni proces u kojem pojedinci odgovaraju na svoje lične potrebe prema sopstvenim sklonostima, ukusima i sposobnostima. Država nameće uniformna rešenja koja ignorišu osnovnu stvarnost da ljudi različito doživljavaju potrebe i imaju različite kapacitete da ih zadovolje. Ova intervencija je u suprotnosti sa principom da, budući da su potrebe lične i individualne, ljudi treba da budu slobodni da na njih odgovaraju na načine koje smatraju najprikladnijim za svoje specifične okolnosti.
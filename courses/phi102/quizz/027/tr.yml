question: Metin, düzenleyici bir devletin bireysel çalışma tercihlerine müdahale etmesi durumunda ne olacağını öne sürüyor?
answer: Bireysel eğilimleri dikkate almadan tek tip eylem planları dayatarak doğal zinciri kırar
wrong_answers:
  - Optimum iş performansı için net yönergeler sağlayarak bireysel özgürlüğü artırır
  - Farklı bireysel çabaları etkin bir şekilde koordine ederek daha iyi ekonomik sonuçlar yaratır
  - Kaynakların ve fırsatların adil dağılımını sağlayarak çalışanları sömürüden korur
explanation: |
  Metne göre, düzenleyici bir devlet müdahale ettiğinde, bireylerin kişisel ihtiyaçlarına kendi eğilimlerine, zevklerine ve yeteneklerine göre yanıt verdikleri doğal süreci bozar. Devlet, insanların ihtiyaçları farklı şekilde deneyimledikleri ve bunları karşılamak için farklı kapasitelere sahip oldukları temel gerçekliğini göz ardı eden tek tip çözümler dayatır. Bu müdahale, ihtiyaçlar kişisel ve bireysel olduğundan, insanların kendi özel koşullarına en uygun olduğuna karar verdikleri yollarla bunlara yanıt vermekte özgür olmaları gerektiği ilkesiyle çelişmektedir.
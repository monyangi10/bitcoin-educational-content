question: Selon le texte, que se passerait-il si un État régulateur intervenait dans les choix individuels en matière de travail ?
answer: Elle rompt la chaîne naturelle en imposant des plans d'action uniformes sans tenir compte des dispositions individuelles
wrong_answers:
  - Il renforce la liberté individuelle en fournissant des lignes directrices claires pour une performance professionnelle optimale
  - Elle permet d'obtenir de meilleurs résultats économiques en coordonnant efficacement les différents efforts individuels
  - Elle protège les travailleurs de l'exploitation en garantissant une répartition équitable des ressources et des opportunités
explanation: |
  Selon le texte, lorsqu'un État régulateur intervient, il perturbe le processus naturel par lequel les individus répondent à leurs besoins personnels en fonction de leurs dispositions, de leurs goûts et de leurs capacités. L'État impose des solutions uniformes qui ignorent la réalité fondamentale selon laquelle les personnes ressentent leurs besoins différemment et ont des capacités variables pour y répondre. Cette intervention contredit le principe selon lequel les besoins étant personnels et individuels, les personnes devraient être libres d'y répondre de la manière qu'elles jugent la plus appropriée à leur situation spécifique.
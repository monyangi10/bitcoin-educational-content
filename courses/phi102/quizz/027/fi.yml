question: Mitä tekstin mukaan tapahtuisi, jos sääntelyvaltio puuttuisi yksilön työvalintoihin?
answer: Se katkaisee luonnollisen ketjun määräämällä yhdenmukaisia toimintasuunnitelmia ottamatta huomioon yksilöllisiä valmiuksia
wrong_answers:
  - Se lisää yksilön vapautta antamalla selkeät suuntaviivat optimaalista työsuoritusta varten
  - Se luo parempia taloudellisia tuloksia koordinoimalla tehokkaasti erilaisia yksittäisiä toimia
  - Se suojaa työntekijöitä hyväksikäytöltä varmistamalla resurssien ja mahdollisuuksien oikeudenmukaisen jakautumisen
explanation: |
  Tekstin mukaan kun sääntelyvaltio puuttuu asiaan, se häiritsee luonnollista prosessia, jossa yksilöt vastaavat henkilökohtaisiin tarpeisiinsa omien taipumustensa, makunsa ja kykyjensä mukaisesti. Valtio määrää yhdenmukaisia ratkaisuja, joissa ei oteta huomioon sitä perustavanlaatuista tosiasiaa, että ihmiset kokevat tarpeet eri tavoin ja heillä on erilaiset valmiudet vastata niihin. Tällainen puuttuminen on ristiriidassa sen periaatteen kanssa, että koska tarpeet ovat henkilökohtaisia ja yksilöllisiä, ihmisten pitäisi olla vapaita vastaamaan niihin tavalla, jonka he katsovat sopivimmaksi omiin olosuhteisiinsa.
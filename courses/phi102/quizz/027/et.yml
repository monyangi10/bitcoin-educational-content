question: Mis peaks teksti kohaselt juhtuma, kui reguleeriv riik sekkub individuaalsetesse töövalikutesse?
answer: See katkestab loomuliku ahela, kehtestades ühtsed tegevuskavad, arvestamata individuaalseid dispositsioone
wrong_answers:
  - See suurendab individuaalset vabadust, andes selged suunised optimaalseks töötulemuseks
  - See loob paremaid majandustulemusi, koordineerides tõhusalt erinevaid individuaalseid jõupingutusi
  - See kaitseb töötajaid ekspluateerimise eest, tagades ressursside ja võimaluste õiglase jaotuse
explanation: |
  Teksti kohaselt häirib reguleeriv riik sekkudes loomulikku protsessi, kus üksikisikud reageerivad oma isiklikele vajadustele vastavalt oma kalduvustele, maitsele ja võimetele. Riik kehtestab ühtsed lahendused, mis ignoreerivad põhilist reaalsust, et inimesed kogevad vajadusi erinevalt ja neil on erinevad võimed nendega tegelemiseks. Selline sekkumine on vastuolus põhimõttega, et kuna vajadused on isiklikud ja individuaalsed, peaksid inimesed olema vabad neile reageerima viisil, mida nad ise peavad oma konkreetsele olukorrale kõige sobivamaks.
question: متن پیشنهاد می‌کند که اگر یک دولت نظارتی در انتخاب‌های کاری فردی مداخله کند، چه اتفاقی می‌افتد؟
answer: این زنجیره طبیعی را با تحمیل برنامه‌های عملی یکنواخت بدون در نظر گرفتن تمایلات فردی می‌شکند.
wrong_answers:
  - این با ارائه دستورالعمل‌های واضح برای عملکرد بهینه کاری، آزادی فردی را افزایش می‌دهد.
  - این با هماهنگ‌سازی مؤثر تلاش‌های متنوع فردی، نتایج اقتصادی بهتری ایجاد می‌کند.
  - این از استثمار کارگران با تضمین توزیع عادلانه منابع و فرصت‌ها محافظت می‌کند.
explanation: |
  بر اساس متن، زمانی که یک دولت نظارتی مداخله می‌کند، فرآیند طبیعی که در آن افراد به نیازهای شخصی خود بر اساس تمایلات، سلیقه‌ها و توانایی‌های خود پاسخ می‌دهند را مختل می‌کند. دولت راه‌حل‌های یکنواختی را تحمیل می‌کند که واقعیت اساسی را نادیده می‌گیرد که مردم نیازها را به‌طور متفاوتی تجربه می‌کنند و ظرفیت‌های متنوعی برای پاسخگویی به آن‌ها دارند. این مداخله با اصل این که از آنجا که نیازها شخصی و فردی هستند، مردم باید آزاد باشند تا به آن‌ها به شیوه‌ای که برای شرایط خاص خود مناسب‌ترین می‌دانند پاسخ دهند، در تضاد است.
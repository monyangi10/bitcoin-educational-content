question: D'après le texte, quelle question fondamentale se pose lorsque des lois uniformes et une administration centralisée sont appliquées à la société humaine ?
answer: Elles contredisent la diversité naturelle de l'humanité en imposant des modes de travail et de jouissance des biens standardisés
wrong_answers:
  - Elles créent une trop grande complexité bureaucratique qui ralentit les processus de prise de décision du gouvernement
  - Ils entraînent une inefficacité économique en empêchant la spécialisation et la division du travail sur les marchés
  - Elles se traduisent par une augmentation des impôts et des dépenses publiques qui pèsent sur les citoyens productifs
explanation: |
  Le texte indique explicitement que les lois uniformes et l'administration centralisée "entrent en contradiction directe avec la diversité naturelle de l'humanité" Ces systèmes imposent des façons uniformes de travailler et de jouir de la propriété, alors que la propriété devrait conférer la liberté de faire ce que l'on veut de ses biens. Cela contredit la nature humaine, car chaque personne naît avec une personnalité distincte qui se manifeste tout au long de la vie et qui exige des satisfactions différentes en fonction du rythme individuel et des besoins particuliers, et non des solutions standardisées imposées d'en haut.
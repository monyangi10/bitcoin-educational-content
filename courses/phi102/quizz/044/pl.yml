question: Według tekstu, jaki fundamentalny problem pojawia się, gdy jednolite prawa i scentralizowana administracja są stosowane w społeczeństwie ludzkim?
answer: Zaprzeczają one naturalnej różnorodności ludzkości, narzucając standardowe sposoby pracy i korzystania z własności
wrong_answers:
  - Tworzą one zbyt dużą biurokratyczną złożoność, która spowalnia rządowe procesy decyzyjne
  - Prowadzą one do nieefektywności ekonomicznej, zapobiegając specjalizacji i podziałowi pracy na rynkach
  - Skutkują one wyższymi podatkami i zwiększonymi wydatkami rządowymi, które obciążają produktywnych obywateli
explanation: |
  Tekst wyraźnie stwierdza, że jednolite prawa i scentralizowana administracja "stoją w bezpośredniej sprzeczności z naturalną różnorodnością ludzkości" Systemy te narzucają jednolite sposoby pracy i korzystania z własności, podczas gdy własność powinna dawać wolność robienia tego, co się chce ze swoimi dobrami. Jest to sprzeczne z ludzką naturą, ponieważ każda osoba rodzi się z odrębną osobowością, która przejawia się przez całe życie, wymagając różnych satysfakcji w zależności od indywidualnego rytmu i konkretnych potrzeb, a nie standardowych rozwiązań narzuconych z góry.
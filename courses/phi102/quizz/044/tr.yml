question: Metne göre, tek tip yasalar ve merkezi yönetim insan toplumuna uygulandığında hangi temel sorun ortaya çıkar?
answer: Standartlaştırılmış çalışma ve mülkiyetten yararlanma yöntemlerini dayatarak insanlığın doğal çeşitliliğiyle çelişirler
wrong_answers:
  - Hükümetin karar alma süreçlerini yavaşlatan çok fazla bürokratik karmaşıklık yaratırlar
  - Piyasalarda uzmanlaşmayı ve işbölümünü engelleyerek ekonomik verimsizliğe yol açarlar
  - Üretken vatandaşlara yük getiren daha yüksek vergiler ve artan devlet harcamaları ile sonuçlanırlar
explanation: |
  Metin, tek tip yasaların ve merkezi yönetimin 'insanlığın doğal çeşitliliğiyle doğrudan çeliştiğini' açıkça belirtmektedir Bu sistemler, mülkiyetin kişiye mallarıyla dilediğini yapma özgürlüğü vermesi gerekirken, tek tip çalışma ve mülkiyetten yararlanma yolları dayatmaktadır. Bu insan doğasına aykırıdır çünkü her insan yaşamı boyunca kendini gösteren, bireysel ritme ve özel ihtiyaçlara göre farklı tatminler gerektiren farklı bir kişilikle doğar, yukarıdan dayatılan standart çözümler değil.
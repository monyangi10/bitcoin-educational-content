question: 根據文中所述，當統一的法律和中央集权的行政管理適用於人類社會時，會產生什麼基本問題？
answer: 它們強加標準化的工作和享受財產的方式，與人類的自然多樣性產生矛盾。
wrong_answers:
  - 它們造成過多的官僚複雜性，拖慢政府的決策程序
  - 它們妨礙了市場的專業化和分工，導致經濟效率低下。
  - 它們會導致稅收提高和政府支出增加，加重有生產力的公民的負擔。
explanation: |
  文中明確指出，統一的法律和中央集权的行政管理「與人性的自然多樣性直接相悖」。這些制度強加了統一的工作和享受財產的方式，而財產應該賦予人們對自己的物品隨心所欲的自由。這與人類的天性相違背，因為每個人生來就有獨特的個性，這些個性在一生中都會表現出來，需要根據個人的節奏和特殊需求而得到不同的滿足，而不是從上面強加的標準化解決方案。
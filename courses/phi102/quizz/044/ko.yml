question: 본문에 따르면, 획일적인 법과 중앙집권적인 행정이 인간 사회에 적용될 때 어떤 근본적인 문제가 발생하나요?
answer: 표준화된 일과 재산 향유 방식을 강요함으로써 인류의 자연스러운 다양성과 모순됩니다
wrong_answers:
  - 너무 많은 관료적 복잡성으로 인해 정부 의사 결정 프로세스가 느려집니다
  - 시장의 전문화와 분업을 방해하여 경제적 비효율성을 초래합니다
  - 이는 생산적인 시민에게 부담을 주는 세금 인상과 정부 지출 증가로 이어집니다
explanation: |
  본문은 획일적인 법과 중앙집권적인 행정이 '인류의 자연적 다양성과 정면으로 모순된다'고 명시적으로 언급하고 있습니다 이러한 시스템은 재산을 소유하고 향유하는 방식에 획일적인 방식을 강요하는데, 재산은 자신이 원하는 것을 할 수 있는 자유를 부여해야 합니다. 각 사람은 일생 동안 나타나는 뚜렷한 개성을 가지고 태어나며, 위로부터 부과된 표준화된 해결책이 아니라 개인의 리듬과 특정 요구에 따라 다른 만족을 필요로 하기 때문에 이는 인간의 본성과 모순됩니다.
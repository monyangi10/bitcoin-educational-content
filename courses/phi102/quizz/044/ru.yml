question: Согласно тексту, какая фундаментальная проблема возникает, когда к человеческому обществу применяются единые законы и централизованное управление?
answer: Они противоречат естественному разнообразию человечества, навязывая стандартные способы работы и пользования собственностью
wrong_answers:
  - Они создают слишком много бюрократических сложностей, которые замедляют процесс принятия государственных решений
  - Они приводят к экономической неэффективности, препятствуя специализации и разделению труда на рынках
  - Они приводят к повышению налогов и увеличению государственных расходов, которые ложатся бременем на продуктивных граждан
explanation: |
  В тексте прямо говорится, что единообразные законы и централизованное управление "вступают в прямое противоречие с естественным разнообразием человечества" Эти системы навязывают единообразные способы работы и пользования собственностью, в то время как собственность должна предоставлять свободу делать со своими благами все, что заблагорассудится. Это противоречит человеческой природе, поскольку каждый человек рождается с индивидуальностью, которая проявляется на протяжении всей жизни и требует различного удовлетворения в соответствии с индивидуальным ритмом и конкретными потребностями, а не стандартизированных решений, навязанных сверху.
question: Според текста какъв основен проблем възниква, когато в човешкото общество се прилагат единни закони и централизирана администрация?
answer: Те противоречат на естественото разнообразие на човечеството, като налагат стандартизирани начини на работа и ползване на собствеността
wrong_answers:
  - Те създават твърде много бюрократични усложнения, които забавят процесите на вземане на решения в правителството
  - Те водят до икономическа неефективност, тъй като възпрепятстват специализацията и разделението на труда на пазарите
  - Те водят до по-високи данъци и увеличени държавни разходи, които натоварват продуктивните граждани
explanation: |
  В текста изрично се посочва, че унифицираните закони и централизираната администрация "влизат в пряко противоречие с естественото многообразие на човечеството" Тези системи налагат унифицирани начини на работа и ползване на собствеността, докато собствеността би трябвало да предоставя свободата да правиш каквото пожелаеш със своите блага. Това противоречи на човешката природа, тъй като всеки човек се ражда с различна индивидуалност, която се проявява през целия живот, изисквайки различни удовлетворения според индивидуалния ритъм и конкретните нужди, а не стандартизирани решения, наложени отгоре.
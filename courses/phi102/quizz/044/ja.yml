question: 本文によれば、画一的な法律や中央集権的な行政が人間社会に適用された場合、どのような根本的な問題が生じるのか？
answer: 標準化された働き方や財産の楽しみ方を押し付けることで、人類の自然な多様性に反する。
wrong_answers:
  - 官僚主義的な複雑さを生み出しすぎて、政府の意思決定プロセスを遅らせる。
  - 市場における専門化と分業を妨げることにより、経済的非効率をもたらす。
  - その結果、増税や政府支出の増加が生じ、生産性の高い市民に負担を強いることになる。
explanation: |
  この文章は、画一的な法律と中央集権的な行政は、『人類の自然な多様性と真っ向から対立する』と明言している。これらの制度は、財産によって自分の望むことをする自由が与えられるべきなのに、画一的な働き方や財産の享受の仕方を押し付けている。なぜなら、各人には生まれながらにして明確な個性があり、それは生涯を通じて発揮されるものであり、上から押し付けられた画一的な解決策ではなく、個人のリズムや特定のニーズに応じて異なる満足を必要とするからである。
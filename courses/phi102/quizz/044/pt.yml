question: De acordo com o texto, que questão fundamental surge quando se aplicam leis uniformes e uma administração centralizada à sociedade humana?
answer: Contrariam a diversidade natural da humanidade, impondo formas estandardizadas de trabalhar e usufruir da propriedade
wrong_answers:
  - Criam demasiada complexidade burocrática que atrasa os processos de decisão do governo
  - Conduzem à ineficiência económica, impedindo a especialização e a divisão do trabalho nos mercados
  - Resultam em impostos mais elevados e num aumento das despesas públicas que sobrecarregam os cidadãos produtivos
explanation: |
  O texto afirma explicitamente que as leis uniformes e a administração centralizada "entram em contradição direta com a diversidade natural da humanidade" Estes sistemas impõem formas uniformes de trabalho e de usufruto da propriedade, quando a propriedade deveria conferir a liberdade de fazer o que se quer com os seus bens. Isto contradiz a natureza humana porque cada pessoa nasce com uma personalidade distinta que se manifesta ao longo da vida, exigindo satisfações diferentes de acordo com o ritmo individual e as necessidades particulares, e não soluções padronizadas impostas de cima para baixo.
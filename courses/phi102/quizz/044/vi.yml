question: Theo văn bản, vấn đề cơ bản nào nảy sinh khi luật pháp thống nhất và quản lý tập trung được áp dụng cho xã hội loài người?
answer: Họ đi ngược lại sự đa dạng tự nhiên của nhân loại bằng cách áp đặt những phương thức làm việc và hưởng thụ tài sản tiêu chuẩn hóa.
wrong_answers:
  - Chúng tạo ra quá nhiều sự phức tạp về thủ tục hành chính, làm chậm quá trình ra quyết định của chính phủ.
  - Chúng dẫn đến sự kém hiệu quả về kinh tế bằng cách ngăn cản sự chuyên môn hóa và phân công lao động trong thị trường.
  - Điều này dẫn đến thuế cao hơn và chi tiêu chính phủ tăng lên, gây gánh nặng cho những công dân chăm chỉ.
explanation: |
  Văn bản này nêu rõ rằng luật lệ thống nhất và quản lý tập trung "mâu thuẫn trực tiếp với sự đa dạng tự nhiên của nhân loại". Những hệ thống này áp đặt những cách thức làm việc và hưởng thụ tài sản thống nhất, trong khi tài sản lẽ ra phải mang lại sự tự do để làm những gì mình muốn với của cải của mình. Điều này trái với bản chất con người bởi vì mỗi người sinh ra đều có một cá tính riêng biệt, thể hiện suốt cuộc đời, đòi hỏi những sự thỏa mãn khác nhau theo nhịp điệu cá nhân và nhu cầu cụ thể, chứ không phải những giải pháp tiêu chuẩn áp đặt từ trên xuống.
question: Was war der Hauptgrund dafür, dass die Sphäre des Privatlebens, wie wir sie heute verstehen, in prähistorischen Gesellschaften nicht existierte?
answer: Der Einzelne war vollständig den Stammesregeln unterworfen, die alle seine Handlungen, auch die persönlichsten, regelten
wrong_answers:
  - Die Menschen entschieden sich für ein Leben in der Gemeinschaft, weil sie glaubten, dass kollektive Entscheidungen moralisch überlegen seien
  - Das Konzept der Privatsphäre war noch nicht erfunden worden, da es keine Schriftsprache und keine formale Bildung gab
  - Der religiöse Glaube verlangte, dass alle Aspekte des Lebens zu spirituellen Zwecken offen mit der Gemeinschaft geteilt werden sollten
explanation: |
  Dem Text zufolge waren die prähistorischen Individuen durch ein umfassendes Regelwerk, das alle ihre Handlungen, auch die persönlichsten, regelte, vollständig dem Stamm unterworfen. Die private Sphäre, die wir heute als Raum der Freiheit definieren, gab es einfach nicht. Dies war keine Frage der Wahl, des religiösen Glaubens oder der mangelnden konzeptionellen Entwicklung, sondern eine strukturelle Realität, in der sich die Kontrolle des Stammes auf jeden Aspekt des individuellen Verhaltens erstreckte und persönliche Autonomie unmöglich machte.
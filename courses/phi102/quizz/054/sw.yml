question: Ni sababu gani kuu kwa nini nyanja ya maisha ya kibinafsi, kama tunavyoielewa leo, haikuwepo katika jamii za kihistoria?
answer: Watu binafsi walitii kabisa sheria za kikabila zilizotawala matendo yao yote, ikiwa ni pamoja na yale ya kibinafsi zaidi
wrong_answers:
  - Watu walichagua kuishi pamoja kwa sababu waliamini kufanya maamuzi ya pamoja kulikuwa bora kimaadili
  - Dhana ya faragha bado haikuwa imebuniwa kutokana na ukosefu wa lugha iliyoandikwa na elimu rasmi.
  - Imani za kidini zilihitaji vipengele vyote vya maisha kushirikiwa waziwazi na jamii kwa madhumuni ya kiroho
explanation: |
  Kulingana na maandishi, watu binafsi wa kihistoria walitiishwa kabisa chini ya kabila kupitia seti kamili ya sheria zilizodhibiti matendo yao yote, ikiwa ni pamoja na yale ya kibinafsi zaidi. Nyanja ya kibinafsi ambayo tunaifafanua leo kama nafasi ya uhuru haikuwepo. Hili halikuwa suala la uchaguzi, imani ya kidini, au ukosefu wa maendeleo ya dhana, bali lilikuwa ukweli wa kimuundo ambapo udhibiti wa kikabila ulienea hadi kila kipengele cha tabia ya mtu binafsi, na kufanya uhuru wa kibinafsi usiwezekane.
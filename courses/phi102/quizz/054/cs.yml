question: Co bylo hlavním důvodem, proč v pravěkých společnostech neexistovala sféra soukromého života, jak ji chápeme dnes?
answer: Jednotlivci se zcela podřizovali kmenovým pravidlům, jimiž se řídily všechny jejich činnosti, včetně těch nejosobnějších
wrong_answers:
  - Lidé se rozhodli žít ve společenství, protože věřili, že kolektivní rozhodování je morálně lepší
  - Pojem soukromí ještě nebyl vynalezen kvůli nedostatku spisovného jazyka a formálního vzdělání
  - Náboženské přesvědčení vyžadovalo, aby byly všechny aspekty života otevřeně sdíleny s komunitou pro duchovní účely
explanation: |
  Podle textu byli pravěcí jedinci zcela podřízeni kmeni prostřednictvím komplexního souboru pravidel, který upravoval veškeré jejich jednání, včetně těch nejosobnějších. Soukromá sféra, kterou dnes definujeme jako prostor svobody, jednoduše neexistovala. Nešlo o otázku volby, náboženského přesvědčení nebo nedostatečného koncepčního rozvoje, ale spíše o strukturální realitu, kdy se kmenová kontrola vztahovala na všechny aspekty chování jednotlivce, což znemožňovalo osobní autonomii.
question: Mikä oli tärkein syy siihen, että yksityiselämän alaa, sellaisena kuin me sen nykyään ymmärrämme, ei ollut olemassa esihistoriallisissa yhteiskunnissa?
answer: Yksilöt olivat täysin heimosääntöjen alaisia, jotka ohjasivat kaikkia heidän toimiaan, myös kaikkein henkilökohtaisimpia
wrong_answers:
  - Ihmiset valitsivat yhteisöllisen elämäntavan, koska he uskoivat kollektiivisen päätöksenteon olevan moraalisesti ylivertaista
  - Yksityisyyden käsitettä ei ollut vielä keksitty kirjakielen ja muodollisen koulutuksen puuttuessa
  - Uskonnollinen vakaumus edellytti, että kaikki elämän osa-alueet jaetaan avoimesti yhteisön kanssa hengellisistä syistä
explanation: |
  Tekstin mukaan esihistorialliset yksilöt olivat täysin heimon alaisia kattavan säännöstön avulla, joka sääteli kaikkia heidän toimiaan, myös kaikkein henkilökohtaisimpia. Yksityistä aluetta, jonka me nykyään määrittelemme vapauden tilaksi, ei yksinkertaisesti ollut olemassa. Kyse ei ollut valinnasta, uskonnollisesta vakaumuksesta tai käsitteellisen kehityksen puutteesta, vaan pikemminkin rakenteellisesta todellisuudesta, jossa heimojen valvonta ulottui yksilön käyttäytymisen jokaiseen osa-alueeseen, mikä teki henkilökohtaisen autonomian mahdottomaksi.
question: Qual era a principal razão pela qual a esfera da vida privada, tal como a entendemos atualmente, não existia nas sociedades pré-históricas?
answer: Os indivíduos estavam completamente sujeitos às regras tribais que regiam todas as suas acções, incluindo as mais pessoais
wrong_answers:
  - As pessoas escolheram viver em comunidade porque acreditavam que a tomada de decisões colectivas era moralmente superior
  - O conceito de privacidade ainda não tinha sido inventado devido à falta de linguagem escrita e de educação formal
  - As crenças religiosas exigiam que todos os aspectos da vida fossem partilhados abertamente com a comunidade para fins espirituais
explanation: |
  De acordo com o texto, os indivíduos pré-históricos estavam inteiramente sujeitos à tribo através de um conjunto abrangente de regras que regulavam todas as suas acções, incluindo as mais pessoais. A esfera privada que hoje definimos como um espaço de liberdade simplesmente não existia. Não se tratava de uma questão de escolha, de crença religiosa ou de falta de desenvolvimento concetual, mas sim de uma realidade estrutural em que o controlo tribal se estendia a todos os aspectos do comportamento individual, tornando impossível a autonomia pessoal.
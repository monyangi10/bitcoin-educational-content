question: Bugün anladığımız şekliyle özel yaşam alanının tarih öncesi toplumlarda var olmamasının temel nedeni neydi?
answer: Bireyler, en kişisel olanlar da dahil olmak üzere tüm eylemlerini yöneten kabile kurallarına tamamen tabiydi
wrong_answers:
  - İnsanlar toplu halde yaşamayı seçtiler çünkü kolektif karar almanın ahlaki açıdan daha üstün olduğuna inanıyorlardı
  - Yazılı dil ve örgün eğitim eksikliği nedeniyle mahremiyet kavramı henüz icat edilmemişti
  - Dini inançlar, manevi amaçlarla yaşamın tüm yönlerinin toplumla açıkça paylaşılmasını gerektiriyordu
explanation: |
  Metne göre, tarih öncesi bireyler, en kişisel olanlar da dahil olmak üzere tüm eylemlerini düzenleyen kapsamlı bir kurallar dizisi aracılığıyla tamamen kabileye tabiydi. Bugün bir özgürlük alanı olarak tanımladığımız özel alan basitçe mevcut değildi. Bu bir seçim, dini inanç ya da kavramsal gelişim eksikliği meselesi değil, kabile kontrolünün bireysel davranışın her yönüne yayıldığı ve kişisel özerkliği imkansız kılan yapısal bir gerçeklikti.
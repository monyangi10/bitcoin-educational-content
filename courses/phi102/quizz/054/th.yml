question: เหตุผลหลักที่ทำให้ขอบเขตของชีวิตส่วนตัวตามที่เราเข้าใจในปัจจุบันไม่ปรากฏในสังคมก่อนประวัติศาสตร์คืออะไร?
answer: บุคคลต้องอยู่ภายใต้กฎของชนเผ่าอย่างสมบูรณ์ซึ่งควบคุมการกระทำทั้งหมดของพวกเขา รวมถึงการกระทำที่เป็นส่วนตัวที่สุด
wrong_answers:
  - ผู้คนเลือกที่จะอยู่ร่วมกันเป็นชุมชนเพราะพวกเขาเชื่อว่าการตัดสินใจร่วมกันนั้นมีความเหนือกว่าทางศีลธรรม
  - แนวคิดเรื่องความเป็นส่วนตัวยังไม่ได้ถูกคิดค้นขึ้นเนื่องจากการขาดภาษาที่เป็นลายลักษณ์อักษรและการศึกษาที่เป็นทางการ
  - ความเชื่อทางศาสนากำหนดให้ทุกแง่มุมของชีวิตต้องถูกแบ่งปันอย่างเปิดเผยกับชุมชนเพื่อวัตถุประสงค์ทางจิตวิญญาณ
explanation: |
  ตามข้อความ บุคคลในยุคก่อนประวัติศาสตร์ถูกผูกพันกับชนเผ่าอย่างสมบูรณ์ผ่านชุดกฎระเบียบที่ครอบคลุมซึ่งควบคุมการกระทำทั้งหมดของพวกเขา รวมถึงการกระทำที่เป็นส่วนตัวที่สุด พื้นที่ส่วนตัวที่เรากำหนดในวันนี้ว่าเป็นพื้นที่แห่งเสรีภาพนั้นไม่มีอยู่จริง นี่ไม่ใช่เรื่องของการเลือก ความเชื่อทางศาสนา หรือการขาดพัฒนาการทางแนวคิด แต่เป็นความจริงเชิงโครงสร้างที่การควบคุมของชนเผ่าขยายไปถึงทุกแง่มุมของพฤติกรรมของบุคคล ทำให้การมีอิสระส่วนบุคคลเป็นไปไม่ได้
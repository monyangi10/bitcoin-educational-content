question: Mis oli esitatud ajaloolise analüüsi kohaselt peamine struktuuriline takistus eraomandi kehtestamisel primitiivsetes ühiskondades?
answer: Jahindus nõudis suuri territooriume, mis ei sobinud kokku väikese eraomandiga
wrong_answers:
  - Usulised tõekspidamised keelasid maa ja ressursside individuaalse omandiõiguse
  - Hõimuliidrid takistasid tahtlikult eraomandit, et säilitada oma võimu
  - Kirjalike seaduste puudumine muutis omandiõiguste kehtestamise võimatuks
explanation: |
  Tekstis selgitatakse konkreetselt, et iidsetes ühiskondades tingisid tootmistingimused, eriti jahindus, suured territooriumid, mis ei sobinud kokku väikese eraomandiga. See oli materiaalne reaalsus, mis tulenes nende majandustegevuse iseloomust, mitte tahtlik poliitiline valik või religioosne piirang. Tootmise äärmuslik ebakindlus ja ebapiisavad tulemused aitasid kaasa ka kollektiivsetele organisatsioonivormidele, kus individuaalne vabadus jäi pigem püüdluseks kui konkreetseks reaalsuseks.
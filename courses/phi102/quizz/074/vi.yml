question: Theo phân tích lịch sử đã trình bày, trở ngại cấu trúc chính nào đã cản trở việc thiết lập quyền sở hữu tư nhân trong các xã hội nguyên thủy?
answer: Săn bắn đòi hỏi những vùng lãnh thổ rộng lớn, không phù hợp với những khu đất tư nhân nhỏ.
wrong_answers:
  - Các tín ngưỡng tôn giáo cấm sở hữu cá nhân đất đai và tài nguyên.
  - Các thủ lĩnh bộ lạc cố tình ngăn cản việc sở hữu tư nhân để duy trì quyền lực của họ.
  - Việc thiếu luật thành văn đã khiến việc thiết lập quyền sở hữu trở nên bất khả thi.
explanation: |
  Văn bản này giải thích cụ thể rằng trong các xã hội cổ đại, điều kiện sản xuất, đặc biệt là săn bắn, đòi hỏi những vùng lãnh thổ rộng lớn, không tương thích với sở hữu tư nhân nhỏ lẻ. Đây là thực tế vật chất do bản chất hoạt động kinh tế của họ áp đặt, chứ không phải là lựa chọn chính trị có chủ ý hay hạn chế tôn giáo. Tình trạng sản xuất bấp bênh cùng cực và kết quả không đủ cũng góp phần hình thành các hình thức tổ chức tập thể, nơi tự do cá nhân vẫn chỉ là khát vọng hơn là hiện thực cụ thể.
question: D'après l'analyse historique présentée, quel était l'obstacle structurel majeur à l'établissement de la propriété privée dans les sociétés primitives ?
answer: La chasse nécessite de vastes territoires incompatibles avec la petite propriété privée
wrong_answers:
  - Les croyances religieuses interdisent la propriété individuelle des terres et des ressources
  - Les chefs de tribus ont délibérément empêché la propriété privée pour conserver leur pouvoir
  - L'absence de lois écrites rendait impossible l'établissement de droits de propriété
explanation: |
  Le texte explique précisément que dans les sociétés anciennes, les conditions de production, notamment la chasse, nécessitaient de vastes territoires incompatibles avec la petite propriété privée. Il s'agit d'une réalité matérielle imposée par la nature de leurs activités économiques, et non d'un choix politique délibéré ou d'une restriction religieuse. L'extrême précarité de la production et l'insuffisance des résultats ont également contribué à des formes d'organisation collective où la liberté individuelle restait plus une aspiration qu'une réalité concrète.
question: Co bylo podle předložené historické analýzy hlavní strukturální překážkou pro zavedení soukromého vlastnictví v primitivních společnostech?
answer: Lov vyžadoval rozsáhlá území, která byla neslučitelná s malým soukromým majetkem
wrong_answers:
  - Náboženské přesvědčení zakazovalo individuální vlastnictví půdy a zdrojů
  - Kmenoví vůdci záměrně bránili soukromému vlastnictví, aby si udrželi svou moc
  - Nedostatek psaných zákonů znemožnil stanovit vlastnická práva
explanation: |
  Text konkrétně vysvětluje, že ve starověkých společnostech vyžadovaly podmínky výroby, zejména lovu, rozsáhlá území, která byla neslučitelná s malým soukromým vlastnictvím. Jednalo se o materiální realitu danou povahou jejich ekonomických aktivit, nikoli o záměrnou politickou volbu nebo náboženské omezení. Extrémní nejistota výroby a nedostatečné výsledky také přispívaly ke kolektivním formám organizace, kde individuální svoboda zůstávala spíše aspirací než konkrétní realitou.
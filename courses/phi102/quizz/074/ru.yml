question: Согласно представленному историческому анализу, что было основным структурным препятствием для создания частной собственности в первобытных обществах?
answer: Для охоты требовались огромные территории, которые были несовместимы с небольшими частными владениями
wrong_answers:
  - Религиозные убеждения запрещали индивидуальную собственность на землю и ресурсы
  - Вожди племен намеренно препятствовали частной собственности, чтобы сохранить свою власть
  - Отсутствие писаных законов не позволяло установить права собственности
explanation: |
  В тексте специально поясняется, что в древних обществах условия производства, особенно охоты, требовали огромных территорий, которые были несовместимы с мелкой частной собственностью. Это была материальная реальность, обусловленная характером хозяйственной деятельности, а не сознательный политический выбор или религиозное ограничение. Крайняя неустойчивость производства и недостаточные результаты также способствовали возникновению коллективных форм организации, в которых индивидуальная свобода оставалась скорее стремлением, чем конкретной реальностью.
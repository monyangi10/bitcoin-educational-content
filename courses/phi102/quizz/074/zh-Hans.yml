question: 根据历史分析，在原始社会建立私有财产的主要结构性障碍是什么？
answer: 狩猎需要广阔的领地，这与小型私有财产不相容
wrong_answers:
  - 宗教信仰禁止个人拥有土地和资源
  - 部落首领故意阻止私人所有权，以维持其权力
  - 由于缺乏成文法，无法确立财产权
explanation: |
  文中特别解释说，在古代社会，生产条件，尤其是狩猎条件，要求有广阔的领地，这与小私有财产是不相容的。这是经济活动的性质所造成的物质现实，而不是刻意的政治选择或宗教限制。生产的极端不稳定性和成果的不充分性也促成了集体组织形式，在这种组织形式中，个人自由更多的是一种愿望，而不是具体的现实。
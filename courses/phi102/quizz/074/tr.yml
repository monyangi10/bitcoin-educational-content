question: Sunulan tarihsel analize göre, ilkel toplumlarda özel mülkiyetin kurulmasının önündeki en büyük yapısal engel neydi?
answer: Avcılık, küçük özel mülkiyetle bağdaşmayan geniş topraklar gerektiriyordu
wrong_answers:
  - Dini inançlar toprak ve kaynaklar üzerinde bireysel mülkiyeti yasaklıyordu
  - Kabile liderleri güçlerini korumak için özel mülkiyeti kasıtlı olarak engellediler
  - Yazılı yasaların olmaması mülkiyet haklarının tesis edilmesini imkansız hale getirmiştir
explanation: |
  Metin, antik toplumlarda üretim koşullarının, özellikle de avcılığın, küçük özel mülkiyetle bağdaşmayan geniş topraklar gerektirdiğini özellikle açıklamaktadır. Bu, kasıtlı bir siyasi tercih ya da dini kısıtlama değil, ekonomik faaliyetlerinin doğası gereği dayatılan maddi bir gerçeklikti. Üretimin aşırı güvencesizliği ve sonuçların yetersizliği de bireysel özgürlüğün somut bir gerçeklikten ziyade bir özlem olarak kaldığı kolektif örgütlenme biçimlerine katkıda bulunmuştur.
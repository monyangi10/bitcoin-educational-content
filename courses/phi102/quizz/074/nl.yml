question: Wat was volgens de gepresenteerde historische analyse een belangrijk structureel obstakel voor het vestigen van privé-eigendom in primitieve samenlevingen?
answer: Jacht vereiste uitgestrekte gebieden die onverenigbaar waren met klein privébezit
wrong_answers:
  - Religieuze overtuigingen verboden individueel eigendom van land en grondstoffen
  - Inheemse leiders verhinderden opzettelijk privébezit om hun macht te behouden
  - Gebrek aan geschreven wetten maakte het onmogelijk om eigendomsrechten vast te stellen
explanation: |
  De tekst legt specifiek uit dat in oude samenlevingen de productieomstandigheden, met name de jacht, uitgestrekte gebieden nodig maakten die onverenigbaar waren met klein privébezit. Dit was een materiële realiteit die werd opgelegd door de aard van hun economische activiteiten, geen bewuste politieke keuze of religieuze beperking. De extreme precariteit van de productie en de ontoereikende resultaten droegen ook bij aan collectieve organisatievormen waar individuele vrijheid meer een streven bleef dan een concrete realiteit.
question: 제시된 역사적 분석에 따르면, 원시 사회에서 사유 재산을 확립하는 데 가장 큰 구조적 장애물은 무엇이었나요?
answer: 사냥에는 작은 사유지와 양립할 수 없는 광활한 영토가 필요했습니다
wrong_answers:
  - 종교적 신념으로 인해 토지와 자원의 개인 소유가 금지되었습니다
  - 부족 지도자들은 자신의 권력을 유지하기 위해 의도적으로 사적 소유를 막았습니다
  - 문서화된 법률이 없어 재산권 확립이 불가능했습니다
explanation: |
  본문은 고대 사회에서 생산 조건, 특히 사냥을 위해서는 작은 사유 재산과 양립할 수 없는 광대한 영토가 필요했다고 구체적으로 설명합니다. 이는 고의적인 정치적 선택이나 종교적 제한이 아니라 경제 활동의 본질에 의해 부과된 물질적 현실이었습니다. 생산의 극심한 불안정성과 불충분한 결과는 또한 개인의 자유가 구체적인 현실이라기보다는 열망에 머물러 있는 집단적 형태의 조직을 형성하는 데 기여했습니다.
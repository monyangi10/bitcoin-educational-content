question: According to the historical analysis presented, what was a major structural obstacle to establishing private property in primitive societies?
answer: Hunting required vast territories that were incompatible with small private property
wrong_answers:
  - Religious beliefs prohibited individual ownership of land and resources
  - Tribal leaders deliberately prevented private ownership to maintain their power
  - Lack of written laws made it impossible to establish property rights
explanation: |
  The text specifically explains that in ancient societies, the conditions of production, particularly hunting, necessitated vast territories that were incompatible with small private property. This was a material reality imposed by the nature of their economic activities, not a deliberate political choice or religious restriction. The extreme precarity of production and insufficient results also contributed to collective forms of organization where individual freedom remained more of an aspiration than a concrete reality.

question: Hva var, ifølge den historiske analysen, et viktig strukturelt hinder for å etablere privat eiendom i primitive samfunn?
answer: Jakt krevde store territorier som var uforenlige med liten privat eiendom
wrong_answers:
  - Religiøs tro forbød individuell eiendomsrett til land og ressurser
  - Stammeledere forhindret bevisst privat eierskap for å opprettholde sin makt
  - Mangel på skrevne lover gjorde det umulig å etablere eiendomsrett
explanation: |
  Teksten forklarer spesifikt at produksjonsforholdene i antikkens samfunn, særlig jakt, nødvendiggjorde store territorier som var uforenlige med liten privat eiendom. Dette var en materiell realitet som lå i den økonomiske virksomhetens natur, og ikke et bevisst politisk valg eller en religiøs restriksjon. Produksjonens ekstreme usikkerhet og utilstrekkelige resultater bidro også til kollektive organisasjonsformer der individuell frihet forble mer en aspirasjon enn en konkret realitet.
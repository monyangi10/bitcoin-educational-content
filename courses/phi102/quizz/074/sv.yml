question: Enligt den historiska analys som presenteras, vad var ett stort strukturellt hinder för att etablera privat egendom i primitiva samhällen?
answer: Jakt krävde stora territorier som var oförenliga med små privata egendomar
wrong_answers:
  - Religiösa övertygelser förbjöd individuellt ägande av mark och resurser
  - Stamledare förhindrade medvetet privat ägande för att behålla sin makt
  - Avsaknad av skrivna lagar gjorde det omöjligt att fastställa äganderätt
explanation: |
  Texten förklarar specifikt att i forntida samhällen krävde produktionsförhållandena, särskilt jakt, stora territorier som var oförenliga med liten privat egendom. Detta var en materiell realitet som följde av den ekonomiska verksamhetens natur, inte ett medvetet politiskt val eller en religiös begränsning. Produktionens extrema osäkerhet och otillräckliga resultat bidrog också till kollektiva organisationsformer där individuell frihet förblev mer av en strävan än en konkret verklighet.
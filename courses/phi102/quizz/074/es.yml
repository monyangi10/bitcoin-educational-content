question: Según el análisis histórico presentado, ¿cuál era el principal obstáculo estructural para el establecimiento de la propiedad privada en las sociedades primitivas?
answer: La caza requería vastos territorios que eran incompatibles con la pequeña propiedad privada
wrong_answers:
  - Las creencias religiosas prohibían la propiedad individual de la tierra y los recursos
  - Los líderes tribales impidieron deliberadamente la propiedad privada para mantener su poder
  - La falta de leyes escritas impedía establecer derechos de propiedad
explanation: |
  El texto explica concretamente que, en las sociedades antiguas, las condiciones de producción, en particular la caza, exigían vastos territorios incompatibles con la pequeña propiedad privada. Se trataba de una realidad material impuesta por la naturaleza de sus actividades económicas, no de una elección política deliberada ni de una restricción religiosa. La extrema precariedad de la producción y la insuficiencia de los resultados también contribuyeron a formas colectivas de organización en las que la libertad individual seguía siendo más una aspiración que una realidad concreta.
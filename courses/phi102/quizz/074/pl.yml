question: Zgodnie z przedstawioną analizą historyczną, co było główną przeszkodą strukturalną w ustanowieniu własności prywatnej w społeczeństwach pierwotnych?
answer: Polowania wymagały rozległych terytoriów, które były nie do pogodzenia z małą własnością prywatną
wrong_answers:
  - Przekonania religijne zabraniały indywidualnej własności ziemi i zasobów
  - Przywódcy plemienni celowo uniemożliwiali prywatną własność, aby utrzymać swoją władzę
  - Brak spisanych praw uniemożliwił ustanowienie praw własności
explanation: |
  Tekst wyjaśnia w szczególności, że w starożytnych społeczeństwach warunki produkcji, w szczególności polowania, wymagały rozległych terytoriów, które były nie do pogodzenia z małą własnością prywatną. Była to materialna rzeczywistość narzucona przez naturę ich działalności gospodarczej, a nie celowy wybór polityczny lub ograniczenie religijne. Ekstremalna niepewność produkcji i niewystarczające wyniki również przyczyniły się do powstania kolektywnych form organizacji, w których wolność jednostki pozostawała bardziej aspiracją niż konkretną rzeczywistością.
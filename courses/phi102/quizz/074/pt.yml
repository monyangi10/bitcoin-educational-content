question: De acordo com a análise histórica apresentada, qual foi o principal obstáculo estrutural ao estabelecimento da propriedade privada nas sociedades primitivas?
answer: A caça exigia vastos territórios que eram incompatíveis com a pequena propriedade privada
wrong_answers:
  - As crenças religiosas proibiam a propriedade individual de terras e recursos
  - Os líderes tribais impediram deliberadamente a propriedade privada para manter o seu poder
  - A falta de leis escritas impossibilitava o estabelecimento de direitos de propriedade
explanation: |
  O texto explica concretamente que, nas sociedades antigas, as condições de produção, nomeadamente a caça, exigiam territórios vastos, incompatíveis com a pequena propriedade privada. Tratava-se de uma realidade material imposta pela natureza das suas actividades económicas e não de uma escolha política deliberada ou de uma restrição religiosa. A extrema precariedade da produção e a insuficiência dos resultados contribuíram também para formas de organização colectiva em que a liberdade individual era mais uma aspiração do que uma realidade concreta.
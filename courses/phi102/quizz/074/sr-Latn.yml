question: Prema istorijskoj analizi koja je predstavljena, šta je bila glavna strukturna prepreka za uspostavljanje privatne svojine u primitivnim društvima?
answer: Lov je zahtevao ogromne teritorije koje nisu bile kompatibilne sa malim privatnim posedom.
wrong_answers:
  - Verska uverenja zabranjivala su individualno vlasništvo nad zemljom i resursima
  - Plemenske vođe su namerno sprečavale privatno vlasništvo kako bi zadržale svoju moć
  - Nedostatak pisanih zakona onemogućio je uspostavljanje vlasničkih prava
explanation: |
  Tekst posebno objašnjava da su u drevnim društvima uslovi proizvodnje, posebno lov, zahtevali ogromne teritorije koje su bile nespojive sa malim privatnim vlasništvom. Ovo je bila materijalna stvarnost nametnuta prirodom njihovih ekonomskih aktivnosti, a ne nameran politički izbor ili versko ograničenje. Ekstremna nesigurnost proizvodnje i nedovoljni rezultati takođe su doprineli kolektivnim oblicima organizacije gde je individualna sloboda ostala više kao težnja nego kao konkretna stvarnost.
question: Secondo l'analisi storica presentata, qual è stato il principale ostacolo strutturale all'istituzione della proprietà privata nelle società primitive?
answer: La caccia richiedeva territori vasti, incompatibili con la piccola proprietà privata
wrong_answers:
  - Le credenze religiose proibivano la proprietà individuale della terra e delle risorse
  - I capi tribali hanno deliberatamente impedito la proprietà privata per mantenere il loro potere
  - La mancanza di leggi scritte rendeva impossibile stabilire i diritti di proprietà
explanation: |
  Il testo spiega specificamente che nelle società antiche le condizioni di produzione, in particolare la caccia, richiedevano vasti territori che erano incompatibili con una piccola proprietà privata. Si trattava di una realtà materiale imposta dalla natura delle attività economiche, non di una scelta politica deliberata o di una restrizione religiosa. L'estrema precarietà della produzione e l'insufficienza dei risultati contribuirono anche a forme di organizzazione collettiva in cui la libertà individuale rimaneva più un'aspirazione che una realtà concreta.
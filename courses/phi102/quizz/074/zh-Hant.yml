question: 根據所提出的歷史分析，在原始社會建立私有財產的主要結構性障礙是什麼？
answer: 狩獵需要廣大的領土，與小私有財產不相容
wrong_answers:
  - 宗教信仰禁止個人擁有土地和資源
  - 部落領袖故意阻止私人擁有，以維持其權力
  - 由於缺乏成文法，因此無法確立財產權
explanation: |
  文中特別說明，在古代社會中，生產條件，尤其是狩獵，必須要有廣大的領土，與小私有財產不相容。這是他們經濟活動的本質所強加的物質現實，而非刻意的政治選擇或宗教限制。生產的極度不穩定性和成果的不足也促成了集體的組織形式，在這種形式下，個人自由更多的是一種願望，而非具體的現實。
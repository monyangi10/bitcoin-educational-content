question: Berdasarkan analisis historis yang dipaparkan, apa yang menjadi hambatan struktural utama untuk membangun kepemilikan pribadi di masyarakat primitif?
answer: Berburu membutuhkan wilayah yang luas yang tidak sesuai dengan properti pribadi yang kecil
wrong_answers:
  - Keyakinan agama melarang kepemilikan individu atas tanah dan sumber daya
  - Para pemimpin suku dengan sengaja mencegah kepemilikan pribadi untuk mempertahankan kekuasaan mereka
  - Kurangnya hukum tertulis membuat tidak mungkin untuk menetapkan hak milik
explanation: |
  Teks tersebut secara khusus menjelaskan bahwa dalam masyarakat kuno, kondisi produksi, khususnya perburuan, membutuhkan wilayah yang luas yang tidak sesuai dengan kepemilikan pribadi yang kecil. Ini adalah realitas material yang dipaksakan oleh sifat kegiatan ekonomi mereka, bukan pilihan politik yang disengaja atau pembatasan agama. Kelangkaan produksi yang ekstrem dan hasil yang tidak mencukupi juga berkontribusi pada bentuk-bentuk organisasi kolektif di mana kebebasan individu tetap lebih merupakan aspirasi daripada realitas konkret.
question: Според представения исторически анализ коя е била основната структурна пречка за установяването на частна собственост в примитивните общества?
answer: Ловът изискваше обширни територии, които бяха несъвместими с малките частни имоти
wrong_answers:
  - Религиозните вярвания забраняват индивидуалната собственост върху земя и ресурси
  - Племенните лидери умишлено възпрепятстват частната собственост, за да запазят властта си
  - Липсата на писани закони не позволява да се установят права на собственост
explanation: |
  В текста се обяснява, че в древните общества условията на производство, особено ловът, са изисквали обширни територии, които са били несъвместими с малка частна собственост. Това е била материална реалност, наложена от естеството на икономическите им дейности, а не съзнателен политически избор или религиозно ограничение. Изключителната несигурност на производството и недостатъчните резултати също са допринесли за колективни форми на организация, при които индивидуалната свобода е оставала по-скоро стремеж, отколкото конкретна реалност.
question: Dushingiye ku nseguro y’amateka yashikirijwe, ni igiki cari intambamyi ikomeye y’imibumbe yo gushinga umutungo w’abantu ku giti cabo mu mibano ya kera?
answer: Guhigira vyasaba uturere twinshi cane tudahuye n’itongo ritoyi ry’abantu ku giti cabo .
wrong_answers:
  - Ivyizerwa vy'idini vyabujije umuntu ku giti ciwe kuba uwufise ubutaka n'itunga
  - Abarongozi b'imiryango barabujije n'ibigirankana ubutunzi bw'abantu ku giti cabo kugira ngo bagumane ububasha bwabo .
  - Kubura amategeko yanditse vyatumye bidashoboka gushinga uburenganzira bw’umutungo .
explanation: |
  Ico canditswe kirasigura mu buryo budasanzwe yuko mu mibano ya kera, ivy’uguhingura, canecane uguhiga, vyasaba ko haba uturere twinshi cane tudahuye n’ibintu bitobito vy’abantu ku giti cabo. Ivyo vyari ibintu vy’ukuri vy’umubiri vyategetswe n’ingene ibikorwa vyabo vy’ubutunzi vyari bimeze, atari uguhitamwo kwa politike canke uburenganzira bw’idini babigiranye ubushake. Ugutekana gukomeye kw’ibikorwa n’ibisubizo bidahagije na vyo nyene vyatumye habaho uburyo bwo gutunganya ibintu rusangi aho umwidegemvyo w’umuntu ku giti ciwe waguma ari icipfuzo kuruta kuba ikintu nyaco.
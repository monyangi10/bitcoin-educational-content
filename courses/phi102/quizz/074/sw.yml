question: Kulingana na uchambuzi wa kihistoria uliowasilishwa, ni kipi kilikuwa kikwazo kikubwa cha kimuundo katika kuanzisha mali binafsi katika jamii za kizamani?
answer: Uwindaji ulihitaji maeneo makubwa ambayo hayakuwa sawa na mali ndogo za kibinafsi
wrong_answers:
  - Imani za kidini zilipiga marufuku umiliki wa ardhi na rasilimali binafsi
  - Viongozi wa kikabila walizuia kimakusudi umiliki binafsi ili kudumisha mamlaka yao
  - Ukosefu wa sheria zilizoandikwa ulifanya iwe vigumu kuanzisha haki za mali
explanation: |
  Maandishi yanaelezea haswa kwamba katika jamii za kale, hali za uzalishaji, hasa uwindaji, zilihitaji maeneo makubwa ambayo hayakuwa sawa na mali ndogo za kibinafsi. Huu ulikuwa ukweli halisi uliowekwa na asili ya shughuli zao za kiuchumi, si chaguo la kisiasa la makusudi au kizuizi cha kidini. Uhaba mkubwa wa uzalishaji na matokeo yasiyotosha pia vilichangia aina za pamoja za upangaji ambapo uhuru wa mtu binafsi ulibaki kuwa matarajio zaidi kuliko ukweli halisi.
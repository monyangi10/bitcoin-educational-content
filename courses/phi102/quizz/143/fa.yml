question: بر اساس تحلیل سیستم‌های غیرآزاد، چه چیزی نمایانگر شدیدترین شکل از تسلیم فردی در رژیم‌های کمونیستی است؟
answer: کنترل کامل بر تمام دارایی‌ها به جز آگاهی مصون و آزادی متافیزیکی اندیشه
wrong_answers:
  - حذف کامل تمام حقوق فردی از جمله آگاهی و فرآیندهای فکری
  - توقیف انتخابی اموال مادی در حالی که حقوق مالکیت خانواده و کار حفظ می‌شود
  - جایگزینی تدریجی خدمات خصوصی با خدمات عمومی از طریق فرآیندهای انتخاباتی دموکراتیک
explanation: |
  متن به‌صراحت بیان می‌کند که در سیستم‌های کمونیستی، فرد تنها آن دسته از ویژگی‌های خود را حفظ می‌کند که شکست‌ناپذیر هستند - یعنی آگاهی غیرقابل‌نقض و آزادی متافیزیکی اندیشه، زیرا اندیشه‌ی غیرظاهرشده تحت کنترل فرد باقی می‌ماند. تمامی آزادی‌های دیگر ناپدید می‌شوند: حقوق خانوادگی، مالکیت مادی، مالکیت زمین و کنترل بر کار خود با تنظیمات دولتی جایگزین می‌شوند. پاسخ‌های نادرست یا کنترل را بیش از حد بیان می‌کنند (حتی اندیشه را حذف می‌کنند)، یا آن را کمتر از حد بیان می‌کنند (حفظ برخی حقوق مالکیت)، یا روش‌های سوسیالیستی به‌جای کمونیستی را توصیف می‌کنند.
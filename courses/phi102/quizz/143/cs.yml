question: Co podle analýzy nesvobodných systémů představuje nejextrémnější formu podřízení jednotlivce v komunistických režimech?
answer: Úplná kontrola nad veškerým majetkem s výjimkou nedotknutelného vědomí a metafyzické svobody myšlení
wrong_answers:
  - Úplná eliminace všech individuálních práv, včetně vědomí a myšlenkových procesů
  - Selektivní konfiskace hmotných statků při zachování rodinných a pracovních práv
  - Postupné nahrazování soukromých služeb veřejnými prostřednictvím demokratických volebních procesů
explanation: |
  V textu se výslovně uvádí, že v komunistických systémech si jedinec zachovává pouze ty vlastnosti sebe sama, které nelze zlomit - totiž nedotknutelné vědomí a metafyzickou svobodu myšlení, protože neprojevené myšlení zůstává pod individuální kontrolou. Všechny ostatní svobody mizí: rodinná práva, hmotné vlastnictví, vlastnictví půdy a kontrola nad vlastní prací jsou nahrazeny státní regulací. Špatné odpovědi buď kontrolu přeceňují (odstraňují dokonce i myšlení), podceňují (zachovávají některá vlastnická práva), nebo popisují spíše socialistické než komunistické metody.
question: Dushingiye ku gusesangura uburyo butagira umwidegemvyo, ni igiki giserukira uburyo burengeje urugero bwo kuganza umuntu ku giti ciwe mu ntwaro z’abakomunisita?
answer: Ubugenzuzi bwose ku mutungo wose kiretse umutima udashobora guhungabanywa n'umwidegemvyo w'ivyiyumviro vy'ubuhinga
wrong_answers:
  - Gukuraho burundu uburenganzira bwose bw'umuntu ku giti ciwe harimwo n'ubumenyi n'imigenderanire y'ivyiyumviro
  - Gufata ibintu vy’umubiri mu buryo butoranijwe mu gihe umuntu azigama uburenganzira bw’umuryango n’uburenganzira bw’akazi
  - Gusubirira buhoro buhoro ibikorwa vy'abikorera ku giti cabo n'ivya Leta biciye mu nzira z'amatora za demokarasi .
explanation: |
  Ico canditswe kivuga neza ko mu mice y’abakomunisita, umuntu agumana gusa izo kamere z’umuntu zidashobora gusenyuka - ni ukuvuga ubumenyi butagira aho bugarukira n’umwidegemvyo w’ivyiyumviro w’ivy’ubuhinga bw’ivy’ubuhinga, kuko iciyumviro kitagaragara kiguma kiri munsi y’ububasha bw’umuntu ku giti ciwe. Uwundi mwidegemvyo wose urazimangana: uburenganzira bwo mu muryango, ivy’umubiri, ubutaka, n’ugucungera akazi k’umuntu bwite, birasubirizwa n’amategeko ya Leta. Inyishu zitari zo zishobora kurenga urugero ku bijanye n’ubugenzuzi (gukuraho mbere n’ivyiyumviro), zikabigabanya (kuzigama uburenganzira bumwe bumwe bw’itunga), canke zigadondora uburyo bw’abasosiyalisiti aho gusobanura uburyo bw’abakomunisita.
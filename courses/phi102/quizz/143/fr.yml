question: D'après l'analyse des systèmes de non-liberté, quelle est la forme la plus extrême d'assujettissement individuel dans les régimes communistes ?
answer: Contrôle total de tous les biens, à l'exception de la conscience inviolable et de la liberté de pensée métaphysique
wrong_answers:
  - Élimination complète de tous les droits individuels, y compris la conscience et les processus de pensée
  - Confiscation sélective des biens matériels tout en préservant les droits de propriété de la famille et du travail
  - Remplacement progressif des services privés par des services publics par le biais de processus électoraux démocratiques
explanation: |
  Le texte indique explicitement que dans les systèmes communistes, l'individu ne conserve que les propriétés de lui-même qui sont impossibles à briser, à savoir la conscience inviolable et la liberté de pensée métaphysique, puisque la pensée non manifestée reste sous le contrôle de l'individu. Toutes les autres libertés disparaissent : les droits familiaux, la propriété matérielle, la propriété foncière et le contrôle de son propre travail sont remplacés par la réglementation de l'État. Les mauvaises réponses exagèrent le contrôle (en éliminant même la pensée), le sous-estiment (en préservant certains droits de propriété) ou décrivent des méthodes socialistes plutôt que communistes.
question: Според анализа на несвободните системи коя е най-крайната форма на подчинение на индивида в комунистическите режими?
answer: Пълен контрол над цялата собственост с изключение на неприкосновеното съзнание и метафизичната свобода на мисълта
wrong_answers:
  - Пълно елиминиране на всички индивидуални права, включително съзнанието и мисловните процеси
  - Селективна конфискация на материални блага при запазване на правото на собственост върху семейството и труда
  - Постепенна замяна на частните услуги с обществени чрез демократични изборни процеси
explanation: |
  В текста изрично се посочва, че в комунистическите системи индивидът запазва само онези свойства на себе си, които е невъзможно да бъдат нарушени - а именно неприкосновеното съзнание и метафизичната свобода на мисълта, тъй като непроявената мисъл остава под индивидуален контрол. Всички останали свободи изчезват: семейните права, материалната собственост, собствеността върху земята и контролът върху собствения труд се заменят с държавна регулация. Неправилните отговори или преувеличават контрола (елиминирайки дори мисълта), или го подценяват (запазвайки някои права на собственост), или описват по-скоро социалистически, отколкото комунистически методи.
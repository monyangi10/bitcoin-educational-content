question: Secondo l'analisi dei sistemi di non libertà, qual è la forma più estrema di sottomissione individuale nei regimi comunisti?
answer: Controllo totale su tutte le proprietà, ad eccezione della coscienza inviolabile e della libertà metafisica di pensiero
wrong_answers:
  - Eliminazione completa di tutti i diritti individuali, compresi la coscienza e i processi di pensiero
  - Confisca selettiva dei beni materiali, preservando i diritti di proprietà della famiglia e del lavoro
  - Sostituzione graduale dei servizi privati con quelli pubblici attraverso processi elettorali democratici
explanation: |
  Il testo afferma esplicitamente che nei sistemi comunisti l'individuo conserva solo le proprietà del sé impossibili da infrangere, ossia la coscienza inviolabile e la libertà metafisica di pensiero, poiché il pensiero immanifesto rimane sotto il controllo individuale. Tutte le altre libertà scompaiono: i diritti familiari, la proprietà materiale, la proprietà della terra e il controllo sul proprio lavoro sono sostituiti dalla regolamentazione statale. Le risposte sbagliate o esagerano il controllo (eliminando anche il pensiero), o lo sottovalutano (preservando alcuni diritti di proprietà), o descrivono metodi socialisti piuttosto che comunisti.
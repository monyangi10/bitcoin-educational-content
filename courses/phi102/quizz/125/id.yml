question: Menurut analisis Paul Leroy-Beaulieu pada tahun 1883, bagaimana sistem kolektivis biasanya memperoleh inovasi teknologi dan prosedural?
answer: Mereka meniru inovasi yang dikembangkan secara eksternal oleh masyarakat pasar bebas karena mereka tidak dapat melakukan inovasi internal generate
wrong_answers:
  - Mereka mengembangkan inovasi melalui komite penelitian terpusat yang mengoordinasikan kemajuan ilmiah
  - Mereka menciptakan inovasi dengan mengumpulkan pengetahuan kolektif dan menghilangkan hambatan kompetitif untuk berkolaborasi
  - Mereka generate inovasi melalui lembaga-lembaga yang didanai negara yang memfokuskan sumber daya pada peningkatan sistematis
explanation: |
  Paul Leroy-Beaulieu meramalkan bahwa sistem kolektivis secara struktural tidak akan mampu melakukan inovasi internal karena sifat birokratis dan kurangnya insentif individu. Dia dengan tepat mengantisipasi bahwa masyarakat komunis akan bergantung pada peniruan inovasi dari masyarakat bebas daripada menghasilkan inovasi mereka sendiri, karena tidak adanya mekanisme penghargaan pribadi dan kerangka kerja peraturan yang kaku mencegah pengambilan risiko dan inisiatif kreatif yang diperlukan untuk inovasi yang sesungguhnya.
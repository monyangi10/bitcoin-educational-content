question: Volgens de analyse van Paul Leroy-Beaulieu uit 1883, hoe verwerven collectivistische systemen gewoonlijk technologische en procedurele innovaties?
answer: Ze kopiëren innovaties die extern door vrije-marktmaatschappijen zijn ontwikkeld, omdat ze geen generate interne innovatie kunnen realiseren
wrong_answers:
  - Ze ontwikkelen innovaties via gecentraliseerde onderzoekscommissies die de wetenschappelijke vooruitgang coördineren
  - Ze creëren innovaties door collectieve kennis te bundelen en concurrentiebelemmeringen voor samenwerking weg te nemen
  - Ze generate innovaties via door de staat gefinancierde instellingen die hun middelen richten op systematische verbetering
explanation: |
  Paul Leroy-Beaulieu voorspelde dat collectivistische systemen structureel niet in staat zouden zijn tot interne innovatie vanwege hun bureaucratische aard en gebrek aan individuele prikkels. Hij verwachtte terecht dat communistische samenlevingen eerder zouden vertrouwen op het kopiëren van innovaties uit vrije samenlevingen dan op het genereren van hun eigen innovaties, omdat de afwezigheid van persoonlijke beloningsmechanismen en rigide regelgevende kaders het nemen van risico's en creatief initiatief, nodig voor echte innovatie, verhinderen.
question: 1883년 폴 르로이-보리외의 분석에 따르면, 집단주의 시스템은 일반적으로 어떻게 기술 및 절차적 혁신을 획득할 수 있을까요?
answer: 자유 시장 사회에서 외부에서 개발된 혁신을 모방하는 이유는 내부 혁신을 generate화할 수 없기 때문입니다
wrong_answers:
  - 과학적 발전을 조율하는 중앙 집중식 연구 위원회를 통해 혁신을 개발합니다
  - 집단 지식을 모으고 협업을 가로막는 경쟁적 장벽을 제거하여 혁신을 창출합니다
  - 체계적인 개선에 자원을 집중하는 국영 기관을 통해 generate 혁신을 추진합니다
explanation: |
  폴 르로이-보리유는 집단주의 체제는 관료주의적 성격과 개인적 인센티브 부족으로 인해 구조적으로 내부 혁신이 불가능할 것이라고 예측했습니다. 그는 공산주의 사회는 개인 보상 메커니즘의 부재와 경직된 규제 체계로 인해 진정한 혁신에 필요한 위험을 감수하고 창의적으로 주도하는 것을 방해하기 때문에 자체적인 혁신보다는 자유 사회의 혁신을 모방하는 데 의존할 것이라고 정확하게 예측했습니다.
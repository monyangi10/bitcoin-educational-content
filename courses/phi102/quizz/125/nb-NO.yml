question: Hvordan tilegner kollektivistiske systemer seg teknologiske og prosessuelle innovasjoner, ifølge Paul Leroy-Beaulieus analyse fra 1883?
answer: De kopierer innovasjoner som er utviklet eksternt av frie markedssamfunn, siden de ikke kan generate intern innovasjon
wrong_answers:
  - De utvikler innovasjoner gjennom sentraliserte forskningskomiteer som koordinerer den vitenskapelige utviklingen
  - De skaper innovasjoner ved å samle kollektiv kunnskap og eliminere konkurransemessige hindringer for samarbeid
  - De generate-innovasjoner gjennom statsfinansierte institusjoner som fokuserer ressurser på systematisk forbedring
explanation: |
  Paul Leroy-Beaulieu forutså at kollektivistiske systemer ville være strukturelt ute av stand til intern innovasjon på grunn av deres byråkratiske natur og mangel på individuelle insentiver. Han forutså helt riktig at kommunistiske samfunn ville basere seg på å kopiere innovasjoner fra frie samfunn i stedet for å skape sine egne, siden fraværet av personlige belønningsmekanismer og rigide regelverk hindrer den risikotakingen og det kreative initiativet som er nødvendig for ekte innovasjon.
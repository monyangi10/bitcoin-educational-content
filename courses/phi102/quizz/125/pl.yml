question: Zgodnie z analizą Paula Leroy-Beaulieu z 1883 r., w jaki sposób systemy kolektywistyczne zazwyczaj nabywają innowacje technologiczne i proceduralne?
answer: Kopiują innowacje opracowane zewnętrznie przez społeczeństwa wolnorynkowe, ponieważ nie mogą generate wewnętrznych innowacji
wrong_answers:
  - Rozwijają innowacje poprzez scentralizowane komitety badawcze, które koordynują postęp naukowy
  - Tworzą innowacje poprzez łączenie zbiorowej wiedzy i eliminowanie konkurencyjnych barier we współpracy
  - generate innowacje poprzez instytucje finansowane przez państwo, które koncentrują zasoby na systematycznym doskonaleniu
explanation: |
  Paul Leroy-Beaulieu przewidywał, że systemy kolektywistyczne będą strukturalnie niezdolne do wewnętrznych innowacji ze względu na ich biurokratyczny charakter i brak indywidualnych zachęt. Trafnie przewidział, że społeczeństwa komunistyczne będą polegać na kopiowaniu innowacji z wolnych społeczeństw, zamiast generować własne, ponieważ brak osobistych mechanizmów nagradzania i sztywne ramy regulacyjne uniemożliwiają podejmowanie ryzyka i kreatywną inicjatywę niezbędną do prawdziwej innowacji.
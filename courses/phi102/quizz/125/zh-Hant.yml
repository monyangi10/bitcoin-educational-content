question: 根據 Paul Leroy-Beaulieu 1883 年的分析，集體主義制度通常如何獲得技術和程序上的創新？
answer: 他們抄襲自由市場社會從外部開發的創新，因為他們無法 generate 內部創新。
wrong_answers:
  - 他們透過中央研究委員會協調科學進步，以發展創新。
  - 他們透過匯集集體知識和消除合作的競爭障礙來創造創新
  - 他們透過國家資助的機構進行 generate 創新，這些機構將資源集中在有系統的改進上。
explanation: |
  Paul Leroy-Beaulieu曾預言，集體主義體系由於其官僚性質和缺乏個人獎勵，在結構上無法進行內部創新。他正確地預測，共產主義社會將依賴複製自由社會的創新，而非創造自己的創新，因為缺乏個人獎勵機制與僵化的規範架構，會妨礙真正創新所需的風險承擔與創造主動性。
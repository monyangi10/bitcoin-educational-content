question: Согласно анализу Поля Леруа-Болье, проведенному в 1883 году, как коллективистские системы обычно приобретают технологические и процедурные инновации?
answer: Они копируют внешние инновации, разработанные свободными рыночными обществами, поскольку не могут generate внутренние инновации
wrong_answers:
  - Они разрабатывают инновации с помощью централизованных исследовательских комитетов, которые координируют научные разработки
  - Они создают инновации, объединяя коллективные знания и устраняя конкурентные барьеры для сотрудничества
  - Они generate инновации через финансируемые государством учреждения, которые направляют ресурсы на систематическое совершенствование
explanation: |
  Поль Леруа-Болье предсказал, что коллективистские системы будут структурно неспособны к внутренним инновациям из-за их бюрократической природы и отсутствия индивидуальных стимулов. Он правильно предвидел, что коммунистические общества будут полагаться на копирование инноваций из свободных обществ, а не на создание собственных, поскольку отсутствие механизмов индивидуального вознаграждения и жесткие нормативные рамки препятствуют риску и творческой инициативе, необходимым для подлинных инноваций.
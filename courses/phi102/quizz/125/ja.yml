question: ポール・ルロワ＝ボリューの1883年の分析によれば、集団主義システムは通常、どのようにして技術革新や手続き的革新を獲得するのだろうか？
answer: 自由市場社会が外部で開発したイノベーションをコピーする。
wrong_answers:
  - 科学的進歩を調整する中央研究委員会を通じてイノベーションを開発する。
  - 集合的な知識をプールし、コラボレーションに対する競争上の障壁を排除することによって、イノベーションを生み出す。
  - generateでは、組織的な改善にリソースを集中させる国家出資の機関を通じてイノベーションを起こす。
explanation: |
  ポール・ルロワ＝ボリューは、集団主義体制は官僚主義的な性質と個人のインセンティブの欠如により、構造的に内部イノベーションを起こすことができないと予測した。個人的な報酬の仕組みがなく、厳格な規制の枠組みが、真のイノベーションに必要なリスクテイクや創造的イニシアチブを妨げるからである。
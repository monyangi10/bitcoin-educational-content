question: Secondo l'analisi di Paul Leroy-Beaulieu del 1883, in che modo i sistemi collettivisti acquisiscono tipicamente innovazioni tecnologiche e procedurali?
answer: Copiano le innovazioni sviluppate all'esterno dalle società del libero mercato, poiché non sono in grado di fare innovazione interna
wrong_answers:
  - Sviluppano innovazioni attraverso comitati di ricerca centralizzati che coordinano l'avanzamento scientifico
  - Creano innovazioni mettendo in comune le conoscenze collettive ed eliminando le barriere competitive alla collaborazione
  - generate innovazioni attraverso istituzioni finanziate dallo Stato che concentrano le risorse sul miglioramento sistematico
explanation: |
  Paul Leroy-Beaulieu aveva previsto che i sistemi collettivisti sarebbero stati strutturalmente incapaci di innovazione interna a causa della loro natura burocratica e della mancanza di incentivi individuali. Prevedeva correttamente che le società comuniste si sarebbero affidate a copiare le innovazioni delle società libere piuttosto che a generarne di proprie, poiché l'assenza di meccanismi di ricompensa personale e di quadri normativi rigidi impediscono l'assunzione di rischi e l'iniziativa creativa necessarie per una vera innovazione.
question: De acordo com a análise de Paul Leroy-Beaulieu (1883), como é que os sistemas colectivistas adquirem tipicamente inovações tecnológicas e processuais?
answer: Copiam as inovações desenvolvidas externamente pelas sociedades de mercado livre, uma vez que não podem fazer generate na inovação interna
wrong_answers:
  - Desenvolvem inovações através de comités de investigação centralizados que coordenam o avanço científico
  - Criam inovações através da partilha de conhecimentos colectivos e da eliminação de barreiras competitivas à colaboração
  - generate inovações através de instituições financiadas pelo Estado que concentram recursos na melhoria sistemática
explanation: |
  Paul Leroy-Beaulieu previu que os sistemas colectivistas seriam estruturalmente incapazes de inovação interna devido à sua natureza burocrática e à falta de incentivos individuais. Previu corretamente que as sociedades comunistas se baseariam na cópia de inovações de sociedades livres em vez de gerarem as suas próprias inovações, uma vez que a ausência de mecanismos de recompensa pessoal e de quadros regulamentares rígidos impedem a tomada de riscos e a iniciativa criativa necessárias a uma inovação genuína.
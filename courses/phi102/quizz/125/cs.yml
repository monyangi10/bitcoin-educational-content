question: Jak podle analýzy Paula Leroy-Beaulieua z roku 1883 kolektivistické systémy obvykle získávají technologické a procedurální inovace?
answer: Kopírují inovace vyvinuté společnostmi volného trhu zvenčí, protože nemohou provádět interní inovace
wrong_answers:
  - Vyvíjejí inovace prostřednictvím centralizovaných výzkumných výborů, které koordinují vědecký pokrok
  - Vytvářejí inovace sdružováním kolektivních znalostí a odstraňováním konkurenčních překážek spolupráce
  - generate inovace prostřednictvím státem financovaných institucí, které zaměřují zdroje na systematické zlepšování
explanation: |
  Paul Leroy-Beaulieu předpověděl, že kolektivistické systémy budou strukturálně neschopné vnitřních inovací kvůli své byrokratické povaze a nedostatku individuálních pobídek. Správně předpokládal, že komunistické společnosti budou spíše spoléhat na kopírování inovací ze svobodných společností než na vytváření vlastních, protože absence mechanismů osobní odměny a rigidní regulační rámce brání podstupování rizika a tvůrčí iniciativě, které jsou pro skutečné inovace nezbytné.
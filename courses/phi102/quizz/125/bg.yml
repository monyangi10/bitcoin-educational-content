question: Според анализа на Пол Леруа-Божо от 1883 г., как колективистичните системи обикновено придобиват технологични и процедурни иновации?
answer: Те копират иновациите, разработени отвън от обществата на свободния пазар, тъй като не могат да се възползват от вътрешните иновации
wrong_answers:
  - Те разработват иновации чрез централизирани изследователски комитети, които координират научния напредък
  - Те създават иновации чрез обединяване на колективни знания и премахване на конкурентните бариери пред сътрудничеството
  - Иновациите в generate се осъществяват чрез финансирани от държавата институции, които насочват ресурсите си към системно подобряване
explanation: |
  Пол Леруа-Божо прогнозира, че колективистичните системи ще бъдат структурно неспособни на вътрешни иновации поради бюрократичния си характер и липсата на индивидуални стимули. Той правилно е предвидил, че комунистическите общества ще разчитат на копиране на иновации от свободните общества, вместо да създават свои собствени, тъй като липсата на механизми за лично възнаграждение и строгите регулаторни рамки възпрепятстват поемането на риск и творческата инициатива, необходими за истински иновации.
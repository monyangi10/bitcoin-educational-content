question: Ni ikihe kintu c’ubutunzi gishingiyeko kirema uguhiganwa kw’ibisanzwe uburinzi bushaka kwirinda?
answer: Ubukene bw'ibikoresho biriho bisaba gutanga no gusangira abantu ku giti cabo .
wrong_answers:
  - Amategeko ya Leta arenze urugero agabanya ibikorwa vy'isoko ry'ubuntu n'ubudandaji
  - Ugusangira ubutunzi mu buryo butaringaniye bivuye ku nyungu zitari zo zihabwa abahiganwa bo hanze .
  - Kubura inyigisho n’amahugurwa akwiye ku bakozi bo mu rugo n’abahingura .
explanation: |
  Dushingiye ku gice, uburinzi buseruka nk’inyishu y’uguhiganwa kw’ibidukikije kubaho kubera ubukene bw’ishimikiro bw’ubutunzi. Ukwo kubura gutuma habaho ivy’uguronka no gutanga bishobora gushika biciye mu masezerano y’ubushake canke biciye mu buryo bwa politike. Ico gice kirasigura ko iyo nzira y’uguhiganwa kamere ihemba utwigoro dutanga inyungu ariko ata kabuza igasiga inyuma abantu bamwebamwe - abatagira inyungu nyinshi canke bafata ingingo mbi mu vy’ubutunzi. Ugukingira rero ni co kiba umuti bakunda kugira ngo ntibahiganwe muri iyo nzira y’ibidukikije. Ayandi mahitamwo avuga mu buryo butari bwo ko uguhiganwa kuremeshwa n’amategeko, inyungu z’amahanga zidatunganye, canke ubukene bw’inyigisho, aho kuvyemera nk’ingaruka z’ubukene bw’ubutunzi.
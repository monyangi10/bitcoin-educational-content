question: ¿Qué condición económica subyacente crea la competencia natural que el proteccionismo trata de evitar?
answer: La escasez de recursos disponibles que requiere su asignación y distribución entre los individuos
wrong_answers:
  - La excesiva regulación gubernamental que limita el libre funcionamiento del mercado y el espíritu empresarial
  - La desigual distribución de la riqueza creada por las ventajas injustas concedidas a los competidores extranjeros
  - La falta de programas adecuados de educación y formación para los trabajadores domésticos y los productores
explanation: |
  Según el capítulo, el proteccionismo surge como respuesta a la competencia natural que existe debido a la escasez fundamental de recursos. Esta escasez crea una necesidad de adquisición y distribución que puede producirse mediante contratos voluntarios o por medios políticos. El capítulo explica que esta competencia natural recompensa los esfuerzos productivos, pero inevitablemente deja atrás a algunas personas: las que son menos productivas o toman malas decisiones económicas. El proteccionismo se convierte entonces en su solución preferida para evitar competir en este sistema natural. Las otras opciones sugieren incorrectamente que la competencia es creada artificialmente por la regulación, las ventajas extranjeras injustas o las deficiencias educativas, en lugar de reconocerla como una consecuencia inherente a la escasez de recursos.
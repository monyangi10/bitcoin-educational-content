question: 보호무역주의가 피하고자 하는 자연스러운 경쟁을 유발하는 근본적인 경제 조건은 무엇인가요?
answer: 개인 간 할당 및 분배가 필요한 가용 자원의 희소성
wrong_answers:
  - 자유 시장 운영과 기업가 정신을 제한하는 과도한 정부 규제
  - 해외 경쟁업체에 대한 불공정한 혜택으로 인한 부의 불균등 분배
  - 가사 노동자와 생산자를 위한 적절한 교육 및 훈련 프로그램의 부재
explanation: |
  이 장에 따르면 보호주의는 자원의 근본적인 희소성으로 인해 존재하는 자연스러운 경쟁에 대한 대응으로 등장합니다. 이러한 희소성은 자발적인 계약이나 정치적 수단을 통해 발생할 수 있는 획득과 분배의 필요성을 야기합니다. 이 장에서는 이러한 자연스러운 경쟁이 생산적인 노력에 대한 보상을 제공하지만 생산성이 낮거나 경제적 결정을 잘못 내리는 일부 사람들은 필연적으로 뒤처질 수밖에 없다고 설명합니다. 따라서 보호주의는 이러한 자연스러운 시스템에서 경쟁을 피하기 위해 그들이 선호하는 해결책이 됩니다. 다른 옵션은 경쟁을 자원 부족의 본질적인 결과로 인식하기보다는 규제, 불공정한 외국의 이점 또는 교육적 결함에 의해 인위적으로 만들어지는 것으로 잘못 인식합니다.
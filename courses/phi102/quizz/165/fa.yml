question: چه شرایط اقتصادی زیربنایی رقابت طبیعی را ایجاد می‌کند که حمایت‌گرایی سعی در اجتناب از آن دارد؟
answer: کمبود منابع موجود که نیاز به تخصیص و توزیع بین افراد دارد
wrong_answers:
  - مقررات دولتی بیش از حد که عملیات بازار آزاد و کارآفرینی را محدود می‌کند
  - توزیع نابرابر ثروت که توسط مزایای ناعادلانه‌ای که به رقبای خارجی داده می‌شود ایجاد شده است
  - کمبود برنامه‌های آموزشی و آموزشی مناسب برای کارگران و تولیدکنندگان داخلی
explanation: |
  بر اساس فصل، حمایت‌گرایی به عنوان پاسخی به رقابت طبیعی که به دلیل کمبود اساسی منابع وجود دارد، پدیدار می‌شود. این کمبود، نیاز به کسب و توزیع را ایجاد می‌کند که می‌تواند یا از طریق قراردادهای داوطلبانه یا از طریق وسایل سیاسی رخ دهد. فصل توضیح می‌دهد که این رقابت طبیعی تلاش‌های تولیدی را پاداش می‌دهد اما به‌طور اجتناب‌ناپذیری برخی افراد را که کمتر تولیدی هستند یا تصمیمات اقتصادی ضعیفی می‌گیرند، پشت سر می‌گذارد. حمایت‌گرایی سپس به راه‌حل ترجیحی آن‌ها برای اجتناب از رقابت در این سیستم طبیعی تبدیل می‌شود. گزینه‌های دیگر به اشتباه پیشنهاد می‌کنند که رقابت به‌طور مصنوعی توسط مقررات، مزایای ناعادلانه خارجی یا کمبودهای آموزشی ایجاد شده است، به جای اینکه آن را به عنوان نتیجه ذاتی کمبود منابع بشناسند.
question: What underlying economic condition creates the natural competition that protectionism seeks to avoid?
answer: The scarcity of available resources that requires allocation and distribution among individuals
wrong_answers:
  - The excessive government regulation that limits free market operations and entrepreneurship
  - The unequal distribution of wealth created by unfair advantages given to foreign competitors
  - The lack of proper education and training programs for domestic workers and producers
explanation: |
  According to the chapter, protectionism emerges as a response to natural competition that exists due to the fundamental scarcity of resources. This scarcity creates a necessity for acquisition and distribution that can occur either through voluntary contracts or through political means. The chapter explains that this natural competition rewards productive efforts but inevitably leaves some people behind - those who are less productive or make poor economic decisions. Protectionism then becomes their preferred solution to avoid competing in this natural system. The other options incorrectly suggest that competition is artificially created by regulation, unfair foreign advantages, or educational deficiencies, rather than recognizing it as an inherent consequence of resource scarcity.

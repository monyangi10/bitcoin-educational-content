question: Quelle condition économique sous-jacente crée la concurrence naturelle que le protectionnisme cherche à éviter ?
answer: La rareté des ressources disponibles qui nécessite une allocation et une distribution entre les individus
wrong_answers:
  - La réglementation gouvernementale excessive qui limite le fonctionnement du marché libre et l'esprit d'entreprise
  - La répartition inégale des richesses créée par les avantages injustes accordés aux concurrents étrangers
  - L'absence de programmes d'éducation et de formation appropriés pour les travailleurs domestiques et les producteurs
explanation: |
  Selon ce chapitre, le protectionnisme apparaît comme une réponse à la concurrence naturelle qui existe en raison de la rareté fondamentale des ressources. Cette rareté crée un besoin d'acquisition et de distribution qui peut se produire soit par le biais de contrats volontaires, soit par des moyens politiques. Le chapitre explique que cette concurrence naturelle récompense les efforts productifs, mais qu'elle laisse inévitablement des laissés-pour-compte - ceux qui sont moins productifs ou qui prennent de mauvaises décisions économiques. Le protectionnisme devient alors leur solution préférée pour éviter la concurrence dans ce système naturel. Les autres options suggèrent à tort que la concurrence est créée artificiellement par la réglementation, les avantages étrangers déloyaux ou les lacunes en matière d'éducation, au lieu de la reconnaître comme une conséquence inhérente à la rareté des ressources.
question: Ni hali gani ya kiuchumi inayosababisha ushindani wa asili ambao ulinzi unajaribu kuepuka?
answer: Uhaba wa rasilimali zinazopatikana unaohitaji mgao na usambazaji miongoni mwa watu binafsi
wrong_answers:
  - Kanuni za serikali zinazozidi mipaka zinazozuia shughuli za soko huria na ujasiriamali
  - Usambazaji usio sawa wa utajiri unaosababishwa na faida zisizo za haki zinazotolewa kwa washindani wa kigeni
  - Ukosefu wa programu sahihi za elimu na mafunzo kwa wafanyakazi wa majumbani na wazalishaji
explanation: |
  Kulingana na sura hiyo, ulinzi unaibuka kama jibu la ushindani wa asili uliopo kutokana na uhaba wa kimsingi wa rasilimali. Uhaba huu unaunda umuhimu wa upatikanaji na usambazaji ambao unaweza kutokea ama kupitia mikataba ya hiari au kupitia njia za kisiasa. Sura hiyo inaelezea kwamba ushindani huu wa asili huzawadia juhudi zenye tija lakini bila shaka huwaacha baadhi ya watu nyuma - wale ambao hawana tija sana au hufanya maamuzi duni ya kiuchumi. Ulinzi kisha unakuwa suluhisho lao linalopendelewa ili kuepuka kushindana katika mfumo huu wa asili. Chaguzi zingine zinaonyesha kimakosa kwamba ushindani huundwa bandia kwa kanuni, faida zisizo za haki za kigeni, au upungufu wa kielimu, badala ya kuutambua kama matokeo ya asili ya uhaba wa rasilimali.
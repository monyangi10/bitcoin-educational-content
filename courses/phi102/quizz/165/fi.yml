question: Mikä taloudellinen perusedellytys luo luonnollisen kilpailun, jota protektionismilla pyritään välttämään?
answer: Käytettävissä olevien resurssien niukkuus, joka edellyttää niiden jakamista ja jakamista yksilöiden kesken
wrong_answers:
  - Liiallinen valtion sääntely, joka rajoittaa vapaiden markkinoiden toimintaa ja yrittäjyyttä
  - Ulkomaisille kilpailijoille annettujen epäoikeudenmukaisten etujen aiheuttama vaurauden epätasainen jakautuminen
  - Kotitaloustyöntekijöiden ja tuottajien asianmukaisten koulutusohjelmien puute
explanation: |
  Luvun mukaan protektionismi syntyy vastauksena luonnolliseen kilpailuun, joka johtuu resurssien perustavanlaatuisesta niukkuudesta. Tämä niukkuus luo tarpeen hankkia ja jakaa resursseja, mikä voi tapahtua joko vapaaehtoisten sopimusten tai poliittisten keinojen avulla. Luvussa selitetään, että tämä luonnollinen kilpailu palkitsee tuottavia ponnisteluja, mutta jättää väistämättä joitakin ihmisiä jälkeen - niitä, jotka ovat vähemmän tuottavia tai tekevät huonoja taloudellisia päätöksiä. Protektionismista tulee silloin heidän ensisijainen ratkaisunsa, jolla he välttävät kilpailemasta tässä luonnollisessa järjestelmässä. Muut vaihtoehdot viittaavat virheellisesti siihen, että kilpailu on keinotekoisesti luotu sääntelyllä, epäoikeudenmukaisilla ulkomaisilla eduilla tai koulutuspuutteilla sen sijaan, että se tunnustettaisiin luonnonvarojen niukkuuden luontaiseksi seuraukseksi.
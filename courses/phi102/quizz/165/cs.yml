question: Jaké základní ekonomické podmínky vytvářejí přirozenou konkurenci, které se protekcionismus snaží zabránit?
answer: Nedostatek dostupných zdrojů, který vyžaduje rozdělení a distribuci mezi jednotlivce
wrong_answers:
  - Nadměrná vládní regulace, která omezuje fungování volného trhu a podnikání
  - Nerovnoměrné rozdělení bohatství způsobené nespravedlivým zvýhodněním zahraničních konkurentů
  - Nedostatek vhodných vzdělávacích a školicích programů pro domácí pracovníky a výrobce
explanation: |
  Podle této kapitoly vzniká protekcionismus jako reakce na přirozenou konkurenci, která existuje v důsledku zásadního nedostatku zdrojů. Tento nedostatek vytváří nutnost získávání a rozdělování, k němuž může docházet buď prostřednictvím dobrovolných smluv, nebo politickými prostředky. Kapitola vysvětluje, že tato přirozená konkurence odměňuje produktivní úsilí, ale nevyhnutelně nechává některé lidi pozadu - ty, kteří jsou méně produktivní nebo činí špatná ekonomická rozhodnutí. Protekcionismus se pak stává jejich preferovaným řešením, jak se vyhnout soutěži v tomto přirozeném systému. Ostatní možnosti nesprávně naznačují, že konkurence je uměle vytvářena regulacemi, nespravedlivými zahraničními výhodami nebo nedostatky ve vzdělání, místo aby ji uznali jako přirozený důsledek nedostatku zdrojů.
question: 保護主義が避けようとする自然な競争を生み出す根本的な経済状況とは何か？
answer: 利用可能な資源が乏しく、個人間の配分と分配が必要であること。
wrong_answers:
  - 自由な市場運営と起業家精神を制限する政府の過剰な規制
  - 外国の競争相手に与えられた不当な優位性によって生み出された富の不平等な分配
  - 家事労働者や生産者に対する適切な教育・訓練プログラムの欠如
explanation: |
  この章によれば、保護主義は、資源の根本的な希少性によって存在する自然な競争への対応として現れる。この希少性によって、自発的な契約や政治的手段による獲得と分配の必要性が生じる。この章では、この自然競争は生産的な努力には報いるが、必然的に一部の人々、つまり生産性の低い人々や経済的判断の誤った人々を取り残すと説明している。そして保護主義は、この自然なシステムでの競争を避けるために、彼らが好む解決策となる。他の選択肢は、競争を資源不足の本質的な結果として認識するのではなく、規制や不公正な外国の優位性、教育の欠陥によって人為的に作り出されたものだと誤って示唆している。
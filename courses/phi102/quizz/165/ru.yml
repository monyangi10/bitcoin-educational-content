question: Какие экономические условия создают естественную конкуренцию, которой стремится избежать протекционизм?
answer: Нехватка имеющихся ресурсов, требующая их распределения между людьми
wrong_answers:
  - Чрезмерное государственное регулирование, ограничивающее свободную рыночную деятельность и предпринимательство
  - Неравномерное распределение богатства, вызванное несправедливым предоставлением преимуществ иностранным конкурентам
  - Отсутствие надлежащего образования и программ обучения для домашних работников и производителей
explanation: |
  Согласно этой главе, протекционизм возникает как реакция на естественную конкуренцию, которая существует из-за фундаментальной нехватки ресурсов. Эта нехватка порождает необходимость приобретения и распределения, которое может происходить либо через добровольные контракты, либо политическими средствами. В главе объясняется, что эта естественная конкуренция вознаграждает продуктивные усилия, но неизбежно оставляет позади некоторых людей - тех, кто менее продуктивен или принимает неверные экономические решения. Тогда протекционизм становится предпочтительным решением, чтобы избежать конкуренции в этой естественной системе. Другие варианты неверно предполагают, что конкуренция искусственно создается регулированием, несправедливыми иностранными преимуществами или недостатками образования, вместо того чтобы признать ее неотъемлемым следствием нехватки ресурсов.
question: Jakie warunki ekonomiczne tworzą naturalną konkurencję, której protekcjonizm stara się uniknąć?
answer: Niedobór dostępnych zasobów, który wymaga alokacji i dystrybucji między jednostkami
wrong_answers:
  - Nadmierne regulacje rządowe, które ograniczają działalność wolnorynkową i przedsiębiorczość
  - Nierówny podział bogactwa spowodowany nieuczciwymi korzyściami dla zagranicznych konkurentów
  - Brak odpowiednich programów edukacyjnych i szkoleniowych dla pracowników domowych i producentów
explanation: |
  Według tego rozdziału protekcjonizm pojawia się jako odpowiedź na naturalną konkurencję, która istnieje z powodu fundamentalnego niedoboru zasobów. Niedobór ten stwarza konieczność nabywania i dystrybucji, która może odbywać się albo poprzez dobrowolne umowy, albo za pomocą środków politycznych. Rozdział wyjaśnia, że ta naturalna konkurencja nagradza produktywne wysiłki, ale nieuchronnie pozostawia niektórych ludzi w tyle - tych, którzy są mniej produktywni lub podejmują złe decyzje gospodarcze. Protekcjonizm staje się wtedy preferowanym rozwiązaniem, by uniknąć konkurowania w tym naturalnym systemie. Inne opcje błędnie sugerują, że konkurencja jest sztucznie tworzona przez regulacje, nieuczciwe zagraniczne korzyści lub braki w edukacji, zamiast uznawać ją za nieodłączną konsekwencję niedoboru zasobów.
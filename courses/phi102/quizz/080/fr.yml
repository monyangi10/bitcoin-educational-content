question: Quel changement fondamental la naissance de l'agriculture a-t-elle introduit pour créer les conditions de la liberté individuelle ?
answer: Elle a introduit la production pacifique et a permis l'accumulation de surplus
wrong_answers:
  - Elle a éliminé le besoin d'organisation collective dans les sociétés
  - Elle a créé de vastes territoires propices à la propriété privée
  - Elle a réduit la précarité de la production grâce aux techniques de chasse
explanation: |
  La naissance de l'agriculture est un tournant majeur, car elle introduit des méthodes de production pacifiques et permet l'accumulation de biens excédentaires. Cette création de surplus est cruciale, car elle fonde les échanges commerciaux et les relations contractuelles basées sur l'accord mutuel plutôt que sur la force. Les mauvaises réponses dénaturent l'impact de la révolution agricole : l'organisation collective est restée nécessaire, l'agriculture a en fait rendu de plus petits territoires viables pour la propriété privée (et non de plus grands), et l'agriculture a remplacé la chasse au lieu d'améliorer les techniques de chasse.

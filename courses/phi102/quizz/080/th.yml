question: การเปลี่ยนแปลงพื้นฐานที่การเกิดขึ้นของเกษตรกรรมได้นำมา ซึ่งสร้างเงื่อนไขสำหรับเสรีภาพส่วนบุคคลคืออะไร?
answer: มันได้แนะนำการผลิตอย่างสันติและอนุญาตให้มีการสะสมส่วนเกิน
wrong_answers:
  - มันกำจัดความจำเป็นในการจัดองค์กรร่วมในสังคม
  - มันสร้างดินแดนขนาดใหญ่ที่เหมาะสมสำหรับการเป็นเจ้าของทรัพย์สินส่วนตัว
  - มันลดความไม่แน่นอนของการผลิตผ่านเทคนิคการล่าสัตว์
explanation: |
  การเกิดขึ้นของเกษตรกรรมเป็นจุดเปลี่ยนสำคัญเพราะมันแนะนำวิธีการผลิตที่สงบสุขและทำให้สามารถสะสมสินค้าส่วนเกินได้ การสร้างส่วนเกินนี้มีความสำคัญเนื่องจากมันเป็นพื้นฐานสำหรับการแลกเปลี่ยนทางการค้าและความสัมพันธ์ตามสัญญาที่อิงตามข้อตกลงร่วมกันแทนที่จะใช้กำลัง คำตอบที่ผิดแสดงให้เห็นถึงผลกระทบของการปฏิวัติเกษตรกรรมในทางที่ผิด: การจัดองค์กรแบบรวมยังคงจำเป็น เกษตรกรรมทำให้ดินแดนขนาดเล็กสามารถเป็นทรัพย์สินส่วนตัวได้ (ไม่ใช่ดินแดนขนาดใหญ่) และเกษตรกรรมแทนที่การล่าสัตว์แทนที่จะปรับปรุงเทคนิคการล่าสัตว์
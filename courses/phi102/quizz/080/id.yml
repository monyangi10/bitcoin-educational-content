question: Perubahan mendasar apa yang diperkenalkan oleh kelahiran pertanian yang menciptakan kondisi untuk kebebasan individu?
answer: Hal ini memperkenalkan produksi yang damai dan memungkinkan akumulasi surplus
wrong_answers:
  - Ini menghilangkan kebutuhan akan organisasi kolektif dalam masyarakat
  - Ini menciptakan wilayah besar yang cocok untuk kepemilikan properti pribadi
  - Ini mengurangi kerentanan produksi melalui teknik berburu
explanation: |
  Kelahiran pertanian merupakan titik balik utama karena memperkenalkan metode produksi secara damai dan memungkinkan akumulasi barang surplus. Penciptaan surplus ini sangat penting karena memberikan dasar bagi pertukaran komersial dan hubungan kontrak berdasarkan kesepakatan bersama, bukan paksaan. Jawaban yang salah menggambarkan dampak revolusi pertanian secara keliru: organisasi kolektif tetap diperlukan, pertanian sebenarnya membuat wilayah yang lebih kecil menjadi layak untuk dimiliki secara pribadi (bukan wilayah yang lebih besar), dan pertanian menggantikan perburuan dan bukannya meningkatkan teknik berburu.
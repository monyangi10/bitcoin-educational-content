question: 農業の誕生がもたらした根本的な変化とは？
answer: 平和的生産を導入し、余剰の蓄積を可能にした
wrong_answers:
  - それは、社会における集団的な組織の必要性をなくした。
  - 私有地所有に適した広大な領土を作り出した
  - 狩猟技術によって生産の不安定さを軽減した
explanation: |
  農業の誕生は、平和的な生産方法を導入し、余剰財の蓄積を可能にしたため、大きな転換点となった。この余剰財の蓄積は、武力ではなく相互の合意に基づく商業的交流や契約関係の基盤となったため、極めて重要であった。間違った答えは、農業革命の影響を誤って表現している。集団組織は依然として必要であり、農業は実際には私有財産としてより小さな領土を成立させるものであり（より大きな領土を成立させるものではない）、農業は狩猟技術を向上させるのではなく、狩猟に取って代わるものであった。
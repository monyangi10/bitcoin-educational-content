question: Jakou zásadní změnu přinesl vznik zemědělství, který vytvořil podmínky pro svobodu jednotlivce?
answer: Zavedla mírovou výrobu a umožnila akumulaci přebytků
wrong_answers:
  - Odstranila potřebu kolektivní organizace ve společnostech
  - Vytvořila rozsáhlá území vhodná pro soukromé vlastnictví
  - Snížila nejistotu výroby díky loveckým technikám
explanation: |
  Vznik zemědělství byl zásadním zlomem, protože zavedl mírové výrobní metody a umožnil hromadění přebytečného zboží. Tato tvorba přebytků měla zásadní význam, protože poskytla základ pro obchodní směnu a smluvní vztahy založené na vzájemné dohodě, nikoli na síle. Špatné odpovědi zkreslují dopad zemědělské revoluce: kolektivní organizace zůstala nutná, zemědělství ve skutečnosti umožnilo soukromé vlastnictví menších území (nikoliv větších) a zemědělství nahradilo lov, nikoliv zlepšilo lovecké techniky.
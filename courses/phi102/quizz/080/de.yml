question: Welche grundlegende Veränderung brachte die Entstehung der Landwirtschaft mit sich, die die Voraussetzungen für individuelle Freiheit schuf?
answer: Sie führte eine friedliche Produktion ein und ermöglichte die Akkumulation von Überschüssen
wrong_answers:
  - Sie hat die Notwendigkeit einer kollektiven Organisation in den Gesellschaften beseitigt
  - Sie schuf große Territorien, die sich für Privateigentum eigneten
  - Sie reduzierte die Prekarität der Produktion durch Jagdtechniken
explanation: |
  Die Entstehung der Landwirtschaft war ein wichtiger Wendepunkt, denn sie führte friedliche Produktionsmethoden ein und ermöglichte die Anhäufung von Überschussgütern. Die Schaffung von Überschüssen war von entscheidender Bedeutung, da sie die Grundlage für den Handel und vertragliche Beziehungen bildete, die auf gegenseitigem Einverständnis und nicht auf Gewalt beruhten. Die falschen Antworten stellen die Auswirkungen der landwirtschaftlichen Revolution falsch dar: kollektive Organisation blieb notwendig, die Landwirtschaft machte kleinere Territorien für Privateigentum nutzbar (und nicht größere), und die Landwirtschaft ersetzte die Jagd, anstatt die Jagdtechniken zu verbessern.
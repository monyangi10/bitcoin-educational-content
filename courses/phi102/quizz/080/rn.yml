question: Ni ihinduka irihe ry’ishimikiro ryazanywe n’ivuka ry’uburimyi ryatumye umuntu agira umwidegemvyo?
answer: Yarashizeho uguhingura mu mahoro kandi yemerera kwirundanira amasaranganya .
wrong_answers:
  - Yarakuyeho ivy'ugutunganirizwa hamwe mu mibano .
  - Yararemye uturere tunini dubereye abantu ku giti cabo .
  - Yagabanyije ukudatekana kw'umwimbu biciye ku buhinga bwo guhigira .
explanation: |
  Ivuka ry’uburimyi ryabaye ihinduka rikomeye kuko ryatumye habaho uburyo bwo guhingura ibintu mu mahoro, rikatuma habaho ukwirundanira ibintu vy’amasaranganya. Ukwo kurema kw’amasaranganya kwari guhambaye cane kuko kwatanga umushinge w’uguhanahana ubudandaji n’imigenderanire y’amasezerano ishingiye ku masezerano aho gushingira ku nguvu. Inyishu zitari zo zigaragaza nabi ingaruka z’ihinduka ry’uburimyi: ugutunganya ibintu rusangi kwagumye ari ngombwa, uburimyi mu vy’ukuri bwatumye uturere dutoduto dushobora gukoreshwa mu gutunga abantu ku giti cabo (atari uturere tunini), kandi uburimyi bwasubiriye uguhiga aho gutuma ubuhinga bwo guhigira butera imbere.
question: 農業的誕生帶來了什麼根本性的改變，為個人自由創造了條件？
answer: 它引進和平生產，並允許累積剩餘
wrong_answers:
  - 它消除了社會對集體組織的需求
  - 它創造了適合私人財產所有的廣大領土
  - 它透過狩獵技術降低生產的不穩定性
explanation: |
  農業的誕生是一個重要的轉捩點，因為它引進了和平的生產方法，使剩餘商品得以累積。這種盈餘的創造是至關重要的，因為它為商業交流和基於相互協議而非武力的契約關係提供了基礎。錯誤的答案歪曲了農業革命的影響：集體組織仍然是必要的、農業實際上使較小的領土也可以成為私有財產（而不是較大的領土）、農業取代了狩獵而不是改進了狩獵技術。
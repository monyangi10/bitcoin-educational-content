question: Que mudança fundamental introduziu o nascimento da agricultura que criou condições para a liberdade individual?
answer: Introduziu a produção pacífica e permitiu a acumulação de excedentes
wrong_answers:
  - Eliminou a necessidade de organização colectiva nas sociedades
  - Criou grandes territórios adequados à propriedade privada
  - Reduziu a precariedade da produção através de técnicas de caça
explanation: |
  O nascimento da agricultura foi um ponto de viragem importante porque introduziu métodos de produção pacíficos e permitiu a acumulação de bens excedentários. Esta criação de excedentes foi crucial, uma vez que constituiu a base para as trocas comerciais e as relações contratuais baseadas no acordo mútuo e não na força. As respostas erradas deturpam o impacto da revolução agrícola: a organização colectiva continuou a ser necessária, a agricultura viabilizou territórios mais pequenos para a propriedade privada (e não territórios maiores) e a agricultura substituiu a caça em vez de melhorar as técnicas de caça.
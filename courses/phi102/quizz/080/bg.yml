question: Каква фундаментална промяна, която създава условия за индивидуална свобода, е свързана с появата на земеделието?
answer: Тя въвежда мирно производство и позволява натрупване на излишъци
wrong_answers:
  - Той премахва необходимостта от колективна организация в обществата
  - Тя създава големи територии, подходящи за частна собственост
  - Той намалява несигурността на производството чрез ловни техники
explanation: |
  Възникването на земеделието е важен поврат, тъй като то въвежда мирни методи на производство и дава възможност за натрупване на излишни стоки. Създаването на излишъци е било от решаващо значение, тъй като е осигурило основата за търговски обмен и договорни отношения, основани на взаимно съгласие, а не на сила. Грешните отговори представят погрешно въздействието на селскостопанската революция: колективната организация остава необходима, селското стопанство всъщност прави по-малките територии жизнеспособни за частна собственост (а не по-големите) и селското стопанство заменя лова, а не подобрява ловните техники.
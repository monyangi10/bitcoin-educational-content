question: Ni dhana gani ambayo wataalamu wa fiziokrati walitumia kuelezea kwa nini mawakala wa kiuchumi binafsi ni bora katika kufanya maamuzi ya kiuchumi kuliko wapangaji wakuu?
answer: 'Jicho la bwana' - uwezo wa kutambua hali halisi ya kiuchumi ambayo watu binafsi pekee ndio wanao katika maisha yao ya kila siku
wrong_answers:
  - "Mkono usioonekana" - nguvu asilia ya soko ambayo huratibu shughuli zote za kiuchumi kiotomatiki"
  - "Kanuni ya 'mhusika mwenye mantiki' - dhana kwamba watu wote hufanya maamuzi ya kiuchumi yenye mantiki kikamilifu"
  - "'Athari ya maarifa ya wenyeji' - taarifa bora inayotokana na kuishi katika jamii ndogo, zilizotengwa"
explanation: |
  Wanafiziokrati walitumia haswa neno 'l'œil du maître' (jicho la bwana) kuelezea uwezo wa kipekee ambao watu binafsi wanao wa kutambua na kujibu hali halisi ya kiuchumi katika mazingira yao ya karibu. Dhana hii inaelezea kwa nini mipango ya serikali inashindwa - matukio ya kiuchumi ni magumu sana na hutokea kwa kiwango kikubwa sana kwa mamlaka kuu kuelewa ipasavyo, huku mawakala binafsi wakiweza kujibu kwa ufanisi ishara za bei na ushindani wanaoupata moja kwa moja. Chaguzi zingine ama hurejelea nadharia tofauti za kiuchumi au hupotosha hoja halisi za wanafiziokrati kuhusu kufanya maamuzi kwa njia ya ugatuzi.
question: 重农主义者用什么概念来解释为什么个体经济主体比中央计划者更善于做出经济决策？
answer: 大师之眼"--只有个人在日常生活中才具备的洞察经济现实的能力
wrong_answers:
  - "'看不见的手'--自动协调所有经济活动的自然市场力量"
  - "'理性行为者原则'--假定所有人都会做出完全符合逻辑的经济选择"
  - "地方知识效应"--生活在与世隔绝的小社区中获得的卓越信息"
explanation: |
  重农主义者特别使用了 "l'œil du maître"（主人的眼睛）一词来描述个人在其直接环境中感知和应对经济现实的独特能力。这一概念解释了为什么国家计划会失败--经济现象过于复杂，发生的规模过于庞大，中央政府无法正确理解，而个体行为者却能对他们直接经历的价格信号和竞争做出有效反应。其他选项要么参考了不同的经济理论，要么歪曲了重农主义者关于分散决策的实际论点。
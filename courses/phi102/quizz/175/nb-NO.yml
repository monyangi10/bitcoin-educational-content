question: Hvilket begrep brukte fysiokratene for å forklare hvorfor individuelle økonomiske aktører er bedre til å ta økonomiske beslutninger enn sentrale planleggere?
answer: "Mesterens øye" - evnen til å oppfatte økonomiske realiteter som bare enkeltpersoner har i sitt daglige liv
wrong_answers:
  - "Den usynlige hånden" - den naturlige markedskraften som automatisk koordinerer all økonomisk aktivitet"
  - "Prinsippet om den rasjonelle aktør" - antakelsen om at alle individer foretar helt logiske økonomiske valg"
  - "Lokalkunnskapseffekten" - den overlegne informasjonen som kommer av å bo i små, isolerte samfunn"
explanation: |
  Fysiokratene brukte uttrykket "l'œil du maître" (mesterens øye) for å beskrive den unike evnen individer har til å oppfatte og reagere på økonomiske realiteter i sine umiddelbare omgivelser. Dette begrepet forklarer hvorfor statlig planlegging mislykkes - økonomiske fenomener er for komplekse og foregår i for stor skala til at sentrale myndigheter kan forstå dem, mens individuelle aktører kan reagere effektivt på prissignaler og konkurranse som de opplever direkte. De andre alternativene refererer enten til andre økonomiske teorier eller gir en feilaktig fremstilling av fysiokratenes faktiske argumenter for desentralisert beslutningstaking.
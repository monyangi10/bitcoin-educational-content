question: แนวคิดใดที่นักเศรษฐศาสตร์ฟิสิโอแครตใช้เพื่ออธิบายว่าทำไมนักเศรษฐศาสตร์รายบุคคลจึงดีกว่าในการตัดสินใจทางเศรษฐกิจมากกว่านักวางแผนส่วนกลาง?
answer: "'สายตาของเจ้านาย' - ความสามารถในการรับรู้ความเป็นจริงทางเศรษฐกิจที่มีเพียงบุคคลเท่านั้นที่มีในชีวิตประจำวันของพวกเขา"
wrong_answers:
  - "\"มือที่มองไม่เห็น\" - แรงตลาดตามธรรมชาติที่ประสานกิจกรรมทางเศรษฐกิจทั้งหมดโดยอัตโนมัติ"
  - "\"หลักการของผู้กระทำที่มีเหตุผล\" - สมมติฐานที่ว่าบุคคลทุกคนตัดสินใจทางเศรษฐกิจอย่างมีเหตุผลอย่างสมบูรณ์แบบ"
  - "\"ผลกระทบจากความรู้ท้องถิ่น\" - ข้อมูลที่เหนือกว่าที่มาจากการอาศัยอยู่ในชุมชนเล็ก ๆ ที่แยกตัวออกมา"
explanation: |
  พวกฟิสิโอแครตใช้คำว่า 'l'œil du maître' (ดวงตาของนาย) เพื่ออธิบายความสามารถเฉพาะตัวที่บุคคลมีในการรับรู้และตอบสนองต่อความเป็นจริงทางเศรษฐกิจในสภาพแวดล้อมที่พวกเขาอยู่ แนวคิดนี้อธิบายว่าทำไมการวางแผนของรัฐจึงล้มเหลว - ปรากฏการณ์ทางเศรษฐกิจมีความซับซ้อนเกินไปและเกิดขึ้นในขนาดที่ใหญ่เกินกว่าที่หน่วยงานกลางจะเข้าใจได้อย่างถูกต้อง ในขณะที่ตัวแทนแต่ละคนสามารถตอบสนองต่อสัญญาณราคาและการแข่งขันที่พวกเขาประสบได้อย่างมีประสิทธิภาพ ตัวเลือกอื่น ๆ อ้างอิงถึงทฤษฎีเศรษฐกิจที่แตกต่างกันหรือบิดเบือนข้อโต้แย้งที่แท้จริงของพวกฟิสิโอแครตเกี่ยวกับการตัดสินใจแบบกระจายอำนาจ
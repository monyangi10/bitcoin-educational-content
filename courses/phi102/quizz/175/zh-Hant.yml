question: 相對於中央計畫者，個人經濟主體更擅長做出經濟決策，相對於此，理論民主派用什麼概念來解釋？
answer: 大師之眼」 - 只有個人在日常生活中才具備的感知經濟現實的能力
wrong_answers:
  - "「無形之手」--自動協調所有經濟活動的自然市場力量"
  - 「「理性行為者原則」--假設所有個人都會做出完全符合邏輯的經濟選擇」
  - 「「當地知識效應」--生活在與世隔絕的小社區中所獲得的優越資訊」
explanation: |
  理論家特別使用「l'œil du maître」（主宰者的眼睛）一詞來描述個人在其直接環境中感知和回應經濟現實的獨特能力。這個概念解釋了為什麼國家規劃會失敗 - 經濟現象太複雜、發生的規模太大，中央政府無法正確理解，而個體代理人卻能有效回應他們直接體驗到的價格訊號與競爭。其他選項不是參考了不同的經濟理論，就是歪曲了理論家有關分散決策的實際論據。
question: Welches Konzept verwendeten die Physiokraten, um zu erklären, warum einzelne Wirtschaftsakteure bessere wirtschaftliche Entscheidungen treffen können als zentrale Planer?
answer: Das "Auge des Meisters" - die Fähigkeit, wirtschaftliche Realitäten wahrzunehmen, die nur der Einzelne in seinem täglichen Leben besitzt
wrong_answers:
  - "\"Die 'unsichtbare Hand'\" - die natürliche Kraft des Marktes, die automatisch alle wirtschaftlichen Aktivitäten koordiniert"
  - "\"Das 'Prinzip des rationalen Akteurs'\" - die Annahme, dass alle Individuen vollkommen logische wirtschaftliche Entscheidungen treffen"
  - "\"Der 'local knowledge effect'\" - der Informationsvorsprung, der sich aus dem Leben in kleinen, isolierten Gemeinschaften ergibt"
explanation: |
  Die Physiokraten verwendeten insbesondere den Begriff "l'œil du maître" (das Auge des Meisters), um die einzigartige Fähigkeit des Einzelnen zu beschreiben, die wirtschaftlichen Gegebenheiten in seiner unmittelbaren Umgebung wahrzunehmen und darauf zu reagieren. Dieses Konzept erklärt, warum die staatliche Planung scheitert - wirtschaftliche Phänomene sind zu komplex und treten in einem zu großen Maßstab auf, als dass die zentralen Behörden sie richtig erfassen könnten, während die einzelnen Akteure wirksam auf die Preissignale und den Wettbewerb reagieren können, die sie unmittelbar erfahren. Die anderen Optionen beziehen sich entweder auf andere Wirtschaftstheorien oder stellen die eigentlichen Argumente der Physiokraten zur dezentralen Entscheidungsfindung falsch dar.
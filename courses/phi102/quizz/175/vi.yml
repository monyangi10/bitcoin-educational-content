question: Trường phái kinh tế trọng nông đã sử dụng khái niệm nào để giải thích tại sao các tác nhân kinh tế cá thể lại đưa ra các quyết định kinh tế tốt hơn so với các nhà hoạch định chính sách tập trung?
answer: "\"Con mắt của bậc thầy\" - khả năng nhận thức thực tế kinh tế mà chỉ những cá nhân mới có được trong cuộc sống thường nhật."
wrong_answers:
  - "Bàn tay vô hình - lực lượng thị trường tự nhiên điều phối mọi hoạt động kinh tế một cách tự động."
  - "Nguyên tắc 'người hành động lý trí' - giả định rằng tất cả các cá nhân đều đưa ra những lựa chọn kinh tế hoàn toàn hợp lý."
  - "Hiệu ứng 'kiến thức địa phương' - thông tin vượt trội có được từ việc sinh sống trong các cộng đồng nhỏ, biệt lập."
explanation: |
  Trường phái kinh tế trọng nông sử dụng cụ thể thuật ngữ 'l'œil du maître' (con mắt của người chủ) để mô tả khả năng độc đáo của các cá nhân trong việc nhận thức và phản ứng với thực tế kinh tế trong môi trường trực tiếp của họ. Khái niệm này giải thích tại sao kế hoạch hóa nhà nước thất bại - các hiện tượng kinh tế quá phức tạp và diễn ra trên quy mô quá lớn khiến chính quyền trung ương không thể hiểu thấu đáo, trong khi các tác nhân cá nhân có thể phản ứng hiệu quả với tín hiệu giá cả và cạnh tranh mà họ trực tiếp trải nghiệm. Các lựa chọn khác hoặc đề cập đến các lý thuyết kinh tế khác nhau hoặc xuyên tạc lập luận thực sự của trường phái trọng nông về việc ra quyết định phi tập trung.
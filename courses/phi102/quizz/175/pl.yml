question: Jakiej koncepcji używali fizjokraci, aby wyjaśnić, dlaczego indywidualne podmioty gospodarcze są lepsze w podejmowaniu decyzji gospodarczych niż centralni planiści?
answer: "\"Oko mistrza\" - zdolność postrzegania realiów gospodarczych, którą w codziennym życiu posiadają tylko jednostki"
wrong_answers:
  - "\"Niewidzialna ręka\" - naturalna siła rynkowa, która automatycznie koordynuje wszystkie działania gospodarcze"
  - "\"Zasada racjonalnego aktora\" - założenie, że wszystkie jednostki dokonują całkowicie logicznych wyborów ekonomicznych."
  - "\"Efekt wiedzy lokalnej\" - lepsze informacje pochodzące z życia w małych, odizolowanych społecznościach"
explanation: |
  Fizjokraci używali w szczególności terminu "l'œil du maître" (oko mistrza), aby opisać wyjątkową zdolność jednostek do postrzegania i reagowania na realia gospodarcze w ich bezpośrednim otoczeniu. Koncepcja ta wyjaśnia, dlaczego planowanie państwowe zawodzi - zjawiska gospodarcze są zbyt złożone i występują na zbyt dużą skalę, aby władze centralne mogły je właściwie zrozumieć, podczas gdy indywidualni agenci mogą skutecznie reagować na sygnały cenowe i konkurencję, której bezpośrednio doświadczają. Pozostałe opcje albo odwołują się do różnych teorii ekonomicznych, albo błędnie przedstawiają rzeczywiste argumenty fizjokratów dotyczące zdecentralizowanego podejmowania decyzji.
question: Quale concetto usarono i fisiocratici per spiegare perché i singoli agenti economici sono più bravi dei pianificatori centrali a prendere decisioni economiche?
answer: L'"occhio del padrone": la capacità di percepire le realtà economiche che solo gli individui possiedono nella loro vita quotidiana
wrong_answers:
  - "La 'mano invisibile': la forza naturale del mercato che coordina automaticamente tutte le attività economiche"
  - "Il 'principio dell'attore razionale': l'ipotesi che tutti gli individui compiano scelte economiche perfettamente logiche"
  - l'"effetto conoscenza locale": la superiorità delle informazioni che deriva dal vivere in comunità piccole e isolate"
explanation: |
  I fisiocratici usavano specificamente il termine "l'œil du maître" (l'occhio del padrone) per descrivere la capacità unica degli individui di percepire e rispondere alle realtà economiche nel loro ambiente immediato. Questo concetto spiega perché la pianificazione statale fallisce: i fenomeni economici sono troppo complessi e si verificano su una scala troppo ampia perché le autorità centrali possano comprenderli adeguatamente, mentre gli agenti individuali possono rispondere efficacemente ai segnali di prezzo e alla concorrenza che sperimentano direttamente. Le altre opzioni fanno riferimento a teorie economiche diverse o travisano le reali argomentazioni dei fisiocratici sul processo decisionale decentralizzato.
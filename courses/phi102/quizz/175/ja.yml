question: フィジオクラットは、中央のプランナーよりも個々の経済主体の方が経済的意思決定に優れている理由を説明するために、どのような概念を用いたか？
answer: 達人の目」-日常生活で個人だけが持っている経済的現実を見抜く能力
wrong_answers:
  - 見えざる手」-すべての経済活動を自動的に調整する自然な市場の力"
  - 「合理的行為者の原則」-すべての個人が完全に論理的な経済的選択をするという仮定
  - 「地元の知識効果」-孤立した小さなコミュニティで暮らすことで得られる優れた情報
explanation: |
  フィジオクラテスは、特に「主人の目（l'œil du maître）」という言葉を使って、個人が身近な環境における経済的現実を認識し、それに対応するユニークな能力を表現した。この概念は、国家計画が失敗する理由を説明している。経済現象はあまりにも複雑で、中央当局が適切に理解するにはあまりにも大規模に発生する。他の選択肢は、異なる経済理論を参照しているか、分権化された意思決定に関するフィジオクラートの実際の主張を誤って伝えている。
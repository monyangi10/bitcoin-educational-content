question: Quel concept les physiocrates ont-ils utilisé pour expliquer pourquoi les agents économiques individuels sont plus aptes à prendre des décisions économiques que les planificateurs centraux ?
answer: L'œil du maître, la capacité à percevoir les réalités économiques que seuls les individus possèdent dans leur vie quotidienne
wrong_answers:
  - la main invisible, la force naturelle du marché qui coordonne automatiquement toutes les activités économiques
  - Le principe de l'acteur rationnel, l'hypothèse selon laquelle tous les individus font des choix économiques parfaitement logiques
  - l'effet du savoir local, l'information supérieure qui découle de la vie dans de petites communautés isolées
explanation: |
  Les physiocrates utilisaient spécifiquement l'expression "l'œil du maître" pour décrire la capacité unique qu'ont les individus de percevoir les réalités économiques dans leur environnement immédiat et d'y répondre. Ce concept explique l'échec de la planification étatique : les phénomènes économiques sont trop complexes et se produisent à trop grande échelle pour que les autorités centrales puissent les appréhender correctement, tandis que les agents individuels peuvent réagir efficacement aux signaux de prix et à la concurrence dont ils font directement l'expérience. Les autres options font référence à des théories économiques différentes ou déforment les arguments des physiocrates sur la décentralisation des décisions.

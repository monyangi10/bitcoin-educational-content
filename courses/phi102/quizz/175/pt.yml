question: Que conceito utilizaram os fisiocratas para explicar por que razão os agentes económicos individuais são melhores a tomar decisões económicas do que os planeadores centrais?
answer: O "olho do mestre" - a capacidade de perceber realidades económicas que só os indivíduos possuem na sua vida quotidiana
wrong_answers:
  - "A 'mão invisível' - a força natural do mercado que coordena automaticamente todas as actividades económicas"
  - "O 'princípio do ator racional' - o pressuposto de que todos os indivíduos fazem escolhas económicas perfeitamente lógicas"
  - "O 'efeito do conhecimento local' - a informação superior que advém do facto de se viver em comunidades pequenas e isoladas"
explanation: |
  Os fisiocratas utilizaram especificamente o termo "l'œil du maître" (o olho do mestre) para descrever a capacidade única que os indivíduos têm de perceber e responder às realidades económicas no seu ambiente imediato. Este conceito explica por que razão o planeamento estatal falha - os fenómenos económicos são demasiado complexos e ocorrem a uma escala demasiado grande para que as autoridades centrais os possam compreender adequadamente, enquanto os agentes individuais podem responder eficazmente aos sinais de preços e à concorrência que experimentam diretamente. As outras opções ou fazem referência a teorias económicas diferentes ou deturpam os argumentos reais dos fisiocratas sobre a tomada de decisões descentralizada.
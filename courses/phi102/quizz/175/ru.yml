question: Какую концепцию использовали физиократы, чтобы объяснить, почему отдельные экономические агенты лучше принимают экономические решения, чем центральные планировщики?
answer: Глаз мастера" - способность воспринимать экономические реалии, которой обладают только отдельные люди в своей повседневной жизни
wrong_answers:
  - "Невидимая рука" - естественная рыночная сила, которая автоматически координирует всю экономическую деятельность"
  - "Принцип рационального актера" - предположение, что все люди делают совершенно логичный экономический выбор"
  - "Эффект местных знаний" - превосходная информация, полученная в результате жизни в небольших, изолированных сообществах"
explanation: |
  Физиократы использовали термин "l'œil du maître" ("глаз мастера") для описания уникальной способности людей воспринимать и реагировать на экономические реалии в своем непосредственном окружении. Эта концепция объясняет, почему государственное планирование терпит неудачу: экономические явления слишком сложны и происходят в слишком больших масштабах, чтобы центральные власти могли их правильно понять, в то время как отдельные агенты могут эффективно реагировать на ценовые сигналы и конкуренцию, которые они непосредственно ощущают. Другие варианты либо ссылаются на различные экономические теории, либо искажают фактические аргументы физиократов о децентрализованном принятии решений.
question: ¿Qué concepto utilizaron los fisiócratas para explicar por qué los agentes económicos individuales son mejores a la hora de tomar decisiones económicas que los planificadores centrales?
answer: "El \"ojo del amo\": la capacidad de percibir realidades económicas que sólo poseen los individuos en su vida cotidiana"
wrong_answers:
  - "\"La 'mano invisible'\": la fuerza natural del mercado que coordina automáticamente todas las actividades económicas"
  - "\"El 'principio del actor racional'\": el supuesto de que todos los individuos toman decisiones económicas perfectamente lógicas"
  - "\"El 'efecto del conocimiento local'\": la información superior que proviene de vivir en comunidades pequeñas y aisladas"
explanation: |
  Los fisiócratas utilizaron específicamente el término "l'œil du maître" (el ojo del maestro) para describir la capacidad única que tienen los individuos de percibir y responder a las realidades económicas de su entorno inmediato. Este concepto explica por qué fracasa la planificación estatal: los fenómenos económicos son demasiado complejos y se producen a una escala demasiado grande para que las autoridades centrales puedan comprenderlos adecuadamente, mientras que los agentes individuales pueden responder eficazmente a las señales de precios y a la competencia que experimentan directamente. Las otras opciones hacen referencia a teorías económicas diferentes o tergiversan los argumentos reales de los fisiócratas sobre la toma de decisiones descentralizada.
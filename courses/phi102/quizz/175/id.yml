question: Konsep apa yang digunakan oleh kaum fisiokrat untuk menjelaskan mengapa pelaku ekonomi individu lebih baik dalam membuat keputusan ekonomi daripada perencana pusat?
answer: 'Mata sang ahli' - kemampuan untuk melihat realitas ekonomi yang hanya dimiliki oleh individu dalam kehidupan sehari-hari mereka
wrong_answers:
  - "Tangan tak terlihat" - kekuatan pasar alami yang secara otomatis mengkoordinasikan semua kegiatan ekonomi"
  - "Prinsip aktor rasional" - asumsi bahwa semua individu membuat pilihan ekonomi yang sangat logis"
  - "Efek 'pengetahuan lokal' - informasi unggul yang berasal dari hidup di komunitas kecil dan terisolasi"
explanation: |
  Kaum fisiokrat secara khusus menggunakan istilah 'l'œil du maître' (mata tuan) untuk menggambarkan kapasitas unik yang dimiliki setiap orang untuk memahami dan merespons realitas ekonomi di lingkungan terdekat mereka. Konsep ini menjelaskan mengapa perencanaan negara gagal - fenomena ekonomi terlalu kompleks dan terjadi dalam skala yang terlalu besar untuk dipahami dengan baik oleh pemerintah pusat, sementara para pelaku ekonomi secara individu dapat merespons secara efektif terhadap sinyal-sinyal harga dan persaingan yang mereka alami secara langsung. Pilihan-pilihan lainnya merujuk pada teori ekonomi yang berbeda atau salah menggambarkan argumen sebenarnya dari para fisiokrat mengenai pengambilan keputusan yang terdesentralisasi.
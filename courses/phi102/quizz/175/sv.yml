question: Vilket begrepp använde fysiokraterna för att förklara varför enskilda ekonomiska aktörer är bättre på att fatta ekonomiska beslut än centralplanerare?
answer: "\"Mästarens öga\" - förmågan att uppfatta ekonomiska realiteter som endast enskilda personer har i sitt dagliga liv"
wrong_answers:
  - "\"Den 'osynliga handen'\" - den naturliga marknadskraften som automatiskt samordnar alla ekonomiska aktiviteter"
  - "\"Principen om den rationella aktören\" - antagandet att alla individer gör helt logiska ekonomiska val"
  - "\"Lokalkännedomseffekten\" - den överlägsna information som kommer av att leva i små, isolerade samhällen"
explanation: |
  Fysiokraterna använde specifikt termen "l'œil du maître" (mästarens öga) för att beskriva den unika förmåga som individer har att uppfatta och reagera på ekonomiska realiteter i sin omedelbara omgivning. Detta begrepp förklarar varför statlig planering misslyckas - ekonomiska fenomen är alltför komplexa och förekommer i alltför stor skala för att centrala myndigheter ska kunna förstå dem ordentligt, medan enskilda aktörer kan reagera effektivt på prissignaler och konkurrens som de direkt upplever. De andra alternativen hänvisar antingen till olika ekonomiska teorier eller ger en felaktig bild av fysiokraternas faktiska argument om decentraliserat beslutsfattande.
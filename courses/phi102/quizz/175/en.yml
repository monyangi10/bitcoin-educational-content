question: What concept did the physiocrats use to explain why individual economic agents are better at making economic decisions than central planners?
answer: The 'eye of the master' - the ability to perceive economic realities that only individuals possess in their daily lives
wrong_answers:
  - "The 'invisible hand' - the natural market force that automatically coordinates all economic activities"
  - "The 'rational actor principle' - the assumption that all individuals make perfectly logical economic choices"
  - "The 'local knowledge effect' - the superior information that comes from living in small, isolated communities"
explanation: |
  The physiocrats specifically used the term 'l'œil du maître' (the eye of the master) to describe the unique capacity individuals have to perceive and respond to economic realities in their immediate environment. This concept explains why state planning fails - economic phenomena are too complex and occur on too large a scale for central authorities to properly comprehend, while individual agents can respond effectively to price signals and competition they directly experience. The other options either reference different economic theories or misrepresent the physiocrats' actual arguments about decentralized decision-making.

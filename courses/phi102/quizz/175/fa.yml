question: فیزیوکرات‌ها از چه مفهومی برای توضیح این که چرا عوامل اقتصادی فردی بهتر از برنامه‌ریزان مرکزی می‌توانند تصمیمات اقتصادی بگیرند، استفاده کردند؟
answer: «چشم استاد» - توانایی درک واقعیت‌های اقتصادی که تنها افراد در زندگی روزمره خود دارند
wrong_answers:
  - "«دست نامرئی» - نیروی طبیعی بازار که به‌طور خودکار تمامی فعالیت‌های اقتصادی را هماهنگ می‌کند"
  - "اصل 'کنشگر عقلانی' - این فرض که همه افراد انتخاب‌های اقتصادی کاملاً منطقی انجام می‌دهند"
  - "\"اثر دانش محلی\" - اطلاعات برتری که از زندگی در جوامع کوچک و منزوی به دست می‌آید"
explanation: |
  فیزیوکرات‌ها به‌طور خاص از اصطلاح 'l'œil du maître' (چشم استاد) برای توصیف ظرفیت منحصربه‌فردی که افراد برای درک و پاسخ به واقعیت‌های اقتصادی در محیط بلافصل خود دارند، استفاده کردند. این مفهوم توضیح می‌دهد که چرا برنامه‌ریزی دولتی شکست می‌خورد - پدیده‌های اقتصادی بسیار پیچیده و در مقیاسی بسیار بزرگ رخ می‌دهند که مقامات مرکزی نمی‌توانند به‌درستی آن‌ها را درک کنند، در حالی که عوامل فردی می‌توانند به‌طور مؤثر به سیگنال‌های قیمتی و رقابتی که مستقیماً تجربه می‌کنند، پاسخ دهند. گزینه‌های دیگر یا به نظریه‌های اقتصادی متفاوتی اشاره دارند یا استدلال‌های واقعی فیزیوکرات‌ها درباره تصمیم‌گیری غیرمتمرکز را نادرست نشان می‌دهند.
question: Каква концепция използват физиократите, за да обяснят защо отделните икономически агенти са по-добри във вземането на икономически решения от централните плановици?
answer: "Окото на майстора" - способността да се възприемат икономическите реалности, която само хората притежават в ежедневието си
wrong_answers:
  - "Невидимата ръка" - естествената пазарна сила, която автоматично координира всички икономически дейности."
  - "Принцип на рационалния участник" - предположението, че всички хора правят напълно логичен икономически избор"
  - "Ефектът на местното познание" - по-добрата информация, която идва от живота в малки, изолирани общности."
explanation: |
  Физиократите използват термина "окото на майстора", за да опишат уникалната способност на хората да възприемат и реагират на икономическите реалности в непосредствената си среда. Тази концепция обяснява защо държавното планиране се проваля - икономическите явления са твърде сложни и се случват в твърде големи мащаби, за да могат централните власти да ги разберат правилно, докато отделните агенти могат да реагират ефективно на ценовите сигнали и конкуренцията, които изпитват пряко. Другите варианти или се позовават на различни икономически теории, или изопачават действителните аргументи на физиократите относно децентрализираното вземане на решения.
question: Minkä käsitteen avulla fysiokraatit selittivät, miksi yksittäiset taloudelliset toimijat pystyvät tekemään taloudellisia päätöksiä paremmin kuin keskussuunnittelijat?
answer: "\"Mestarin silmä\" - kyky havaita taloudellisia realiteetteja, joita vain yksilöillä on jokapäiväisessä elämässään"
wrong_answers:
  - "\"Näkymätön käsi\" - luonnollinen markkinavoima, joka automaattisesti koordinoi kaikkea taloudellista toimintaa"
  - "\"Rationaalisen toimijan periaate\" - oletus, että kaikki yksilöt tekevät täysin loogisia taloudellisia valintoja"
  - "\"Paikallistuntemuksen vaikutus\" - ylivoimainen tieto, joka tulee pienissä, eristyneissä yhteisöissä elämisestä"
explanation: |
  Fysiokraatit käyttivät erityisesti termiä "l'œil du maître" (mestarin silmä) kuvaamaan yksilöiden ainutlaatuista kykyä havaita ja reagoida lähiympäristönsä taloudellisiin realiteetteihin. Tämä käsite selittää, miksi valtiollinen suunnittelu epäonnistuu - taloudelliset ilmiöt ovat liian monimutkaisia ja tapahtuvat liian laajassa mittakaavassa, jotta keskusviranomaiset pystyisivät ymmärtämään niitä kunnolla, kun taas yksittäiset toimijat pystyvät reagoimaan tehokkaasti suoraan kokemiinsa hintasignaaleihin ja kilpailuun. Muissa vaihtoehdoissa joko viitataan erilaisiin talousteorioihin tai vääristellään fysiokraattien todellisia väitteitä hajautetusta päätöksenteosta.
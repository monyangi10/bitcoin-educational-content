question: 물리학자들은 왜 개별 경제 주체들이 중앙 계획가보다 경제적 결정을 더 잘 내리는지 설명하기 위해 어떤 개념을 사용했나요?
answer: "'마스터의 눈' - 개인만이 일상에서 가지고 있는 경제 현실을 인식하는 능력"
wrong_answers:
  - "모든 경제 활동을 자동으로 조정하는 자연스러운 시장의 힘인 '보이지 않는 손'"
  - "'합리적 행위자 원칙' - 모든 개인이 완벽하게 논리적인 경제적 선택을 한다는 가정"
  - "'지역 지식 효과' - 작고 고립된 지역사회에 살면서 얻을 수 있는 우수한 정보"
explanation: |
  경제학자들은 개인이 자신의 주변 환경에서 경제 현실을 인식하고 대응하는 고유한 능력을 설명하기 위해 '주인의 눈'이라는 용어를 구체적으로 사용했습니다. 이 개념은 국가 계획이 실패하는 이유를 설명합니다. 경제 현상은 너무 복잡하고 너무 큰 규모로 발생하여 중앙 당국이 제대로 이해하기 어려운 반면, 개별 주체들은 직접 경험하는 가격 신호와 경쟁에 효과적으로 대응할 수 있기 때문입니다. 다른 옵션은 다른 경제 이론을 참조하거나 탈중앙화된 의사 결정에 대한 경제학자들의 실제 주장을 잘못 표현하고 있습니다.
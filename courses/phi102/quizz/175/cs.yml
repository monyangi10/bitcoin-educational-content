question: Jakou koncepci používali fyziokraté k vysvětlení toho, proč individuální ekonomické subjekty lépe přijímají ekonomická rozhodnutí než centrální plánovači?
answer: "\"Oko mistra\" - schopnost vnímat ekonomické skutečnosti, kterou mají pouze jednotlivci v každodenním životě"
wrong_answers:
  - "\"Neviditelná ruka\" - přirozená tržní síla, která automaticky koordinuje všechny ekonomické aktivity."
  - "\"Princip racionálního aktéra\" - předpoklad, že všichni jednotlivci se rozhodují naprosto logicky."
  - "\"Efekt místní znalosti\" - vynikající informace, které plynou z života v malých, izolovaných komunitách"
explanation: |
  Fyziokraté konkrétně používali termín "l'œil du maître" (oko mistra), aby popsali jedinečnou schopnost jednotlivců vnímat a reagovat na ekonomickou realitu v jejich bezprostředním okolí. Tento koncept vysvětluje, proč státní plánování selhává - ekonomické jevy jsou příliš složité a probíhají v příliš velkém měřítku, než aby je centrální orgány mohly správně pochopit, zatímco jednotlivé subjekty mohou účinně reagovat na cenové signály a konkurenci, kterou přímo zažívají. Ostatní možnosti buď odkazují na jiné ekonomické teorie, nebo zkreslují skutečné argumenty fyziokratů o decentralizovaném rozhodování.
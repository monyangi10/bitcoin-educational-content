question: Ni iciyumviro ikihe abahinga mu vy’ubutunzi bakoresheje kugira ngo basigure igituma abakozi b’ubutunzi ku giti cabo bashobora gufata ingingo z’ubutunzi kuruta abategura imigambi hagati?
answer: "'Ijisho rya shebuja' - ubushobozi bwo gutahura ibintu vy'ukuri vy'ubutunzi abantu bonyene bafise mu buzima bwabo bwa misi yose"
wrong_answers:
  - "\"Ikiganza kitaboneka\" - inguvu z'isoko kavukire zihuza ibikorwa vyose vy'ubutunzi"
  - "\"Ingingo ngenderwako y'umukinyi w'ubwenge\" - iciyumviro c'uko abantu bose bakora amahitamwo y'ubutunzi abereye"
  - "\"Ingaruka y'ubumenyi bwo mu karere\" - amakuru asumba ayandi ava mu kuba mu mibano mito mito, iri ukwayo"
explanation: |
  Abanyabwenge b’ivy’umubiri bakoresheje canecane ijambo ‘l’œil du maître’ (ijisho rya shebuja) kugira ngo bavuge ubushobozi budasanzwe abantu bafise bwo gutahura no kwishura ku bintu vy’ukuri vy’ubutunzi biri mu bidukikije vyabo vya hafi. Ico ciyumviro kirasigura igituma igenamigambi rya Leta ridashobora gushika - ibintu vy’ubutunzi biragoye cane kandi bishika ku rugero runini cane ku buryo ubutegetsi bwa Leta butashobora kubitahura neza, mu gihe abakozi ku giti cabo bashobora kwishura neza ku bimenyetso vy’ibiciro n’uguhiganwa bahura navyo ata guca ku ruhande. Ayandi mahitamwo yoshobora kwerekeza ku vyiyumviro bitandukanye vy’ubutunzi canke agaserura nabi imvo nyazo z’abanyabwenge b’ivy’ubutunzi ku bijanye n’ugufata ingingo zitandukanye.
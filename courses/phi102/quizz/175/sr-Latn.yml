question: Koji su koncept fiziokrati koristili da objasne zašto su individualni ekonomski agenti bolji u donošenju ekonomskih odluka od centralnih planera?
answer: 'Oko gospodara' - sposobnost da se uoče ekonomske stvarnosti koje samo pojedinci poseduju u svom svakodnevnom životu
wrong_answers:
  - "Nevidljiva ruka" - prirodna tržišna sila koja automatski koordinira sve ekonomske aktivnosti
  - "Princip racionalnog aktera" - pretpostavka da svi pojedinci donose savršeno logične ekonomske odluke"
  - "Efekat 'lokalnog znanja' - superiorne informacije koje dolaze iz života u malim, izolovanim zajednicama"
explanation: |
  Fiziokrate su posebno koristile izraz 'l'œil du maître' (oko gospodara) da opišu jedinstvenu sposobnost pojedinaca da opažaju i reaguju na ekonomske stvarnosti u svom neposrednom okruženju. Ovaj koncept objašnjava zašto državno planiranje ne uspeva - ekonomski fenomeni su previše složeni i odvijaju se u prevelikom obimu da bi ih centralne vlasti pravilno razumele, dok pojedinačni agenti mogu efikasno reagovati na cenovne signale i konkurenciju koju direktno doživljavaju. Druge opcije ili se odnose na različite ekonomske teorije ili pogrešno predstavljaju stvarne argumente fiziokrata o decentralizovanom donošenju odluka.
question: Fizyokratlar, bireysel ekonomik aktörlerin ekonomik kararlar alma konusunda neden merkezi planlamacılardan daha iyi olduğunu açıklamak için hangi kavramı kullanmışlardır?
answer: "'Ustanın gözü' - sadece bireylerin günlük yaşamlarında sahip oldukları ekonomik gerçekleri algılama yeteneği"
wrong_answers:
  - "'Görünmez el' - tüm ekonomik faaliyetleri otomatik olarak koordine eden doğal piyasa gücü"
  - "'Rasyonel aktör ilkesi' - tüm bireylerin tamamen mantıklı ekonomik tercihler yaptığı varsayımı"
  - "'Yerel bilgi etkisi' - küçük, izole topluluklarda yaşamanın getirdiği üstün bilgi"
explanation: |
  Fizyokratlar özellikle 'l'œil du maître' (ustanın gözü) terimini, bireylerin yakın çevrelerindeki ekonomik gerçekleri algılamak ve bunlara yanıt vermek için sahip oldukları benzersiz kapasiteyi tanımlamak için kullanmışlardır. Bu kavram devlet planlamasının neden başarısız olduğunu açıklamaktadır: ekonomik olgular merkezi otoritelerin tam olarak kavrayamayacağı kadar karmaşık ve büyük ölçekte gerçekleşirken, bireysel aktörler doğrudan deneyimledikleri fiyat sinyallerine ve rekabete etkili bir şekilde yanıt verebilirler. Diğer seçenekler ya farklı ekonomik teorilere atıfta bulunmakta ya da fizyokratların ademi merkeziyetçi karar alma konusundaki gerçek argümanlarını yanlış yansıtmaktadır.
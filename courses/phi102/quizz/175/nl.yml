question: Welk concept gebruikten de fysiocraten om uit te leggen waarom individuele economische agenten beter zijn in het nemen van economische beslissingen dan centrale planners?
answer: Het 'oog van de meester' - het vermogen om economische realiteiten waar te nemen die alleen individuen in hun dagelijks leven bezitten
wrong_answers:
  - "De 'onzichtbare hand' - de natuurlijke marktkracht die automatisch alle economische activiteiten coördineert"
  - "Het 'rationele actor principe' - de aanname dat alle individuen volstrekt logische economische keuzes maken"
  - "Het 'lokale kenniseffect' - de superieure informatie die voortkomt uit het leven in kleine, geïsoleerde gemeenschappen"
explanation: |
  De fysiocraten gebruikten specifiek de term 'l'œil du maître' (het oog van de meester) om het unieke vermogen van individuen te beschrijven om economische realiteiten in hun directe omgeving waar te nemen en erop te reageren. Dit concept verklaart waarom staatsplanning mislukt - economische fenomenen zijn te complex en doen zich op te grote schaal voor om door centrale autoriteiten goed begrepen te worden, terwijl individuele agenten effectief kunnen reageren op prijssignalen en concurrentie die ze rechtstreeks ervaren. De andere opties verwijzen naar andere economische theorieën of geven de argumenten van de fysiocraten over gedecentraliseerde besluitvorming verkeerd weer.
question: Millist mõistet kasutasid füsiokraadid, et selgitada, miks üksikud majandussubjektid on majandusotsuste tegemisel paremad kui kesksed planeerijad?
answer: "\"peremehe silm\" - võime tajuda majanduslikku tegelikkust, mida ainult üksikisikud omavad oma igapäevaelus"
wrong_answers:
  - "\"Nähtamatu käsi\" - loomulik turujõud, mis koordineerib automaatselt kogu majandustegevust"
  - "\"Ratsionaalse tegutseja põhimõte\" - eeldus, et kõik üksikisikud teevad täiesti loogilisi majanduslikke valikuid"
  - "\"Kohalike teadmiste efekt\" - parem teave, mis tuleneb väikestes, isoleeritud kogukondades elamisest"
explanation: |
  Füsiokraadid kasutasid konkreetselt terminit "l'œil du maître" ("peremehe silm"), et kirjeldada üksikisikute ainulaadset võimet tajuda ja reageerida oma vahetu keskkonna majanduslikule tegelikkusele. See mõiste selgitab, miks riiklik planeerimine ebaõnnestub - majanduslikud nähtused on liiga keerulised ja toimuvad liiga suures ulatuses, et keskvõimud suudaksid neid õigesti mõista, samas kui üksikisikud suudavad tõhusalt reageerida hinnasignaalidele ja konkurentsile, mida nad vahetult kogevad. Teised valikud viitavad kas erinevatele majandusteooriatele või moonutavad füsiokraatide tegelikke argumente detsentraliseeritud otsuste tegemise kohta.
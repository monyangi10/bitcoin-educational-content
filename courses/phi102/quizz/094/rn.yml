question: Dushingiye ku gutera imbere kw’amateka kwadondowe, ni urutonde uruhe rugereranya ugutera imbere gushika ku kibano c’abantu bidegemvya?
answer: Kuva mu buja gushika mu buja, hanyuma tukaja mu mwidegemvyo ugenda urushiriza kuba mutoyi kandi ufise aho ugarukira .
wrong_answers:
  - Kuva ku mwidegemvyo wa kera gushika ku buja, hanyuma gushika ku mwidegemvyo wo muri iki gihe
  - Kuva ku mwidegemvyo w’akameremere gushika ku masezerano y’imibano, hanyuma gushika kuri demokarasi y’inzego
  - Kuva ku bufeodalite gushika ku butegetsi bw’umwami, hanyuma tukaja ku butegetsi bwa repubulika .
explanation: |
  Ico canditswe kiradondora neza ukuntu amateka yateye imbere aho 'ugutera imbere kw'ukwitegeka kwatumye habaho iterambere rikomeye kuva mu bihe vya kera no mu bihe vya kera, kuva ku buja gushika ku buja, hanyuma gushika ku mwidegemvyo ugenda urushiriza kuba mutoyi kandi ufise aho ugarukira.' Ukwo gukurikirana kwerekana ko umwidegemvyo atari ikintu gisanzwe ahubwo ko ari ingaruka y’ingendo y’ubutekerezi. Ayandi mahitamwo yoshobora guhindura iterambere nyaryo ryavuzwe, agashimika ku mibumbe ya politike aho kwibanda ku guteza imbere umwidegemvyo w’umuntu ku giti ciwe, canke agaserura nabi intango y’iryo terambere ry’amateka.
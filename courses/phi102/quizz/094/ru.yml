question: В какой последовательности, согласно описанной исторической прогрессии, происходит эволюция к обществу свободных людей?
answer: От рабства к крепостному праву, затем к все менее регулируемой и ограниченной свободе
wrong_answers:
  - От первобытной свободы к рабству, затем к современной регулируемой свободе
  - От естественной свободы к общественному договору, затем к институциональной демократии
  - От феодализма к монархии, затем к республиканским формам правления
explanation: |
  В тексте прямо описывается историческая последовательность, в которой "прогресс самоуправления позволил добиться значительных успехов с древних и первобытных времен, ведя от рабства к крепостному праву, а затем ко все менее регулируемой и ограниченной свободе" Эта последовательность демонстрирует, что свобода - не естественное состояние, а результат цивилизационного процесса. Другие варианты либо меняют фактическую последовательность, либо фокусируются на политических структурах, а не на развитии индивидуальной свободы, либо искажают отправную точку этой исторической эволюции.
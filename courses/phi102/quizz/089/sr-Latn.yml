question: Koji ključni infrastrukturni razvoj je pomogao da se prekine izolacija lokalnih tržišta i podstakne konkurencija prema istorijskoj analizi?
answer: Razvoj transportne infrastrukture i međunarodne trgovine
wrong_answers:
  - Osnivanje lokalnih bankarskih sistema i razmena valuta
  - Stvaranje vladinih regulatornih agencija i trgovinskih zakona
  - Izum štamparskih presa i komunikacionih mreža
explanation: |
  Tekst posebno pominje da je razvoj transportne infrastrukture i međunarodne trgovine razbio izolaciju lokalnih tržišta, stimulisao konkurenciju i pomogao u balansiranju poljoprivrednih nesigurnosti između regiona. Ovaj razvoj infrastrukture bio je ključan u stvaranju uslova u kojima su sloboda i slobodna trgovina mogli cvetati, jer je povezivao prethodno izolovana tržišta i stvarao šire ekonomske mreže koje su učinile konkurenciju održivom.
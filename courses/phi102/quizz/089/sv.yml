question: Vilken viktig infrastrukturutveckling bidrog till att bryta isoleringen av lokala marknader och stimulera konkurrensen enligt den historiska analysen?
answer: Utveckling av transportinfrastruktur och internationell handel
wrong_answers:
  - Etablering av lokala banksystem och valutaväxling
  - Inrättande av statliga tillsynsmyndigheter och handelslagar
  - Uppfinningen av tryckpressar och kommunikationsnätverk
explanation: |
  I texten nämns särskilt att utvecklingen av transportinfrastruktur och internationell handel bröt isoleringen av lokala marknader, stimulerade konkurrens och bidrog till att balansera osäkerheter i jordbruket mellan regioner. Denna utveckling av infrastrukturen var avgörande för att skapa förutsättningar för frihet och frihandel, eftersom den kopplade samman tidigare isolerade marknader och skapade bredare ekonomiska nätverk som gjorde konkurrensen livskraftig.
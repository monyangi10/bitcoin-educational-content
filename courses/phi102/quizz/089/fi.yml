question: Mikä keskeinen infrastruktuurin kehitys auttoi historiallisen analyysin mukaan murtamaan paikallisten markkinoiden eristyneisyyden ja edistämään kilpailua?
answer: Liikenneinfrastruktuurin ja kansainvälisen kaupan kehittäminen
wrong_answers:
  - Paikallisten pankkijärjestelmien ja valuutanvaihdon perustaminen
  - Valtion sääntelyvirastojen ja kauppalakien luominen
  - Kirjapainokoneiden ja viestintäverkkojen keksiminen
explanation: |
  Tekstissä mainitaan erityisesti, että liikenneinfrastruktuurin ja kansainvälisen kaupan kehittäminen mursi paikallisten markkinoiden eristyneisyyden, edisti kilpailua ja auttoi tasapainottamaan alueiden välisiä maatalouden epävarmuustekijöitä. Infrastruktuurin kehittäminen oli ratkaisevan tärkeää sellaisten olosuhteiden luomisessa, joissa vapaus ja vapaakauppa saattoivat kukoistaa, sillä se yhdisti aiemmin eristyksissä olleet markkinat ja loi laajempia taloudellisia verkostoja, jotka tekivät kilpailusta elinkelpoista.
question: Кое ключово развитие на инфраструктурата е помогнало да се преодолее изолацията на местните пазари и да се стимулира конкуренцията според историческия анализ?
answer: Развитие на транспортната инфраструктура и международната търговия
wrong_answers:
  - Създаване на местни банкови системи и обмен на валута
  - Създаването на правителствени регулаторни агенции и търговски закони
  - Изобретяването на печатарските машини и комуникационните мрежи
explanation: |
  В текста специално се споменава, че развитието на транспортната инфраструктура и международната търговия са разчупили изолацията на местните пазари, стимулирали са конкуренцията и са спомогнали за балансиране на несигурността в селското стопанство между регионите. Развитието на инфраструктурата е от решаващо значение за създаването на условия за процъфтяване на свободата и свободната търговия, тъй като свързва изолирани преди това пазари и създава по-широки икономически мрежи, които правят конкуренцията жизнеспособна.
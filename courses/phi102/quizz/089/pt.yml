question: Que desenvolvimento de infra-estruturas essenciais contribuiu para quebrar o isolamento dos mercados locais e estimular a concorrência, de acordo com a análise histórica?
answer: O desenvolvimento das infra-estruturas de transporte e do comércio internacional
wrong_answers:
  - A criação de sistemas bancários e de câmbio locais
  - A criação de agências reguladoras governamentais e de leis comerciais
  - A invenção da imprensa e das redes de comunicação
explanation: |
  O texto refere especificamente que o desenvolvimento das infra-estruturas de transporte e do comércio internacional quebrou o isolamento dos mercados locais, estimulou a concorrência e ajudou a equilibrar as incertezas agrícolas entre regiões. Este desenvolvimento de infra-estruturas foi crucial para criar as condições para o florescimento da liberdade e do comércio livre, uma vez que ligou mercados anteriormente isolados e criou redes económicas mais amplas que tornaram a concorrência viável.
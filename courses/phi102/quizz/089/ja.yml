question: 歴史的な分析によれば、地方市場の孤立を解消し、競争を活性化させるのに役立った主要なインフラ開発は何か？
answer: 交通インフラと国際商業の発展
wrong_answers:
  - 現地の銀行システムの確立と通貨交換
  - 政府規制機関の設立と貿易法
  - 印刷機と通信網の発明
explanation: |
  本文では、交通インフラと国際商業の発展が地方市場の孤立を解消し、競争を刺激し、地域間の農業の不確実性のバランスをとるのに役立ったと特に言及している。このインフラ整備は、それまで孤立していた市場を結びつけ、競争を可能にする広範な経済ネットワークを作り上げたため、自由と自由貿易が花開く条件を作り出す上で極めて重要だった。
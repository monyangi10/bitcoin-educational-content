question: Pembangunan infrastruktur utama apa yang membantu memecah isolasi pasar lokal dan merangsang persaingan menurut analisis historis?
answer: Pengembangan infrastruktur transportasi dan perdagangan internasional
wrong_answers:
  - Pembentukan sistem perbankan lokal dan penukaran mata uang
  - Pembentukan badan regulasi pemerintah dan undang-undang perdagangan
  - Penemuan mesin cetak dan jaringan komunikasi
explanation: |
  Teks tersebut secara khusus menyebutkan bahwa pembangunan infrastruktur transportasi dan perdagangan internasional telah memecah isolasi pasar lokal, mendorong persaingan, dan membantu menyeimbangkan ketidakpastian pertanian antar wilayah. Pembangunan infrastruktur ini sangat penting dalam menciptakan kondisi di mana kebebasan dan perdagangan bebas dapat berkembang, karena menghubungkan pasar-pasar yang sebelumnya terisolasi dan menciptakan jaringan ekonomi yang lebih luas yang membuat persaingan menjadi layak.
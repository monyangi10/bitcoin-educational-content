question: 과거 분석에 따르면 지역 시장의 고립을 깨고 경쟁을 촉진하는 데 도움이 된 주요 인프라 개발은 무엇이었나요?
answer: 교통 인프라 및 국제 상거래의 발전
wrong_answers:
  - 현지 은행 시스템 구축 및 환전
  - 정부 규제 기관 및 무역법 제정
  - 인쇄기와 통신 네트워크의 발명
explanation: |
  본문에서는 특히 교통 인프라와 국제 상업의 발달이 지역 시장의 고립을 깨고 경쟁을 촉진하며 지역 간 농업 불확실성의 균형을 맞추는 데 도움이 되었다고 언급하고 있습니다. 이러한 인프라 개발은 이전에 고립되어 있던 시장을 연결하고 경쟁을 가능하게 하는 광범위한 경제 네트워크를 만들어 자유와 자유무역이 번성할 수 있는 여건을 조성하는 데 결정적인 역할을 했습니다.
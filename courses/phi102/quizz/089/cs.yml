question: Jaký klíčový rozvoj infrastruktury pomohl podle historické analýzy prolomit izolaci místních trhů a stimulovat hospodářskou soutěž?
answer: Rozvoj dopravní infrastruktury a mezinárodního obchodu
wrong_answers:
  - Zavedení místních bankovních systémů a směnáren
  - Vytvoření vládních regulačních agentur a obchodních zákonů
  - Vynález tiskařských strojů a komunikačních sítí
explanation: |
  V textu se konkrétně uvádí, že rozvoj dopravní infrastruktury a mezinárodního obchodu prolomil izolaci místních trhů, podnítil hospodářskou soutěž a pomohl vyrovnat nejistotu v zemědělství mezi regiony. Tento rozvoj infrastruktury měl zásadní význam pro vytvoření podmínek, v nichž mohla vzkvétat svoboda a volný obchod, neboť propojil dříve izolované trhy a vytvořil širší hospodářské sítě, které umožnily hospodářskou soutěž.
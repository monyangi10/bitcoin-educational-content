question: Ni iterambere irihe ry’ingenzi ry’ibikorwa remezo ryafashije gukuraho ukwitandukanya kw’amasoko yo mu karere no gutuma habaho uguhiganwa hakurikijwe isesengura ry’amateka?
answer: Iterambere ry'ibikorwa remezo vyo gutwara abantu n'ibintu n'ubudandaji mpuzamakungu
wrong_answers:
  - Gushinga uburyo bwo gukoresha amabanki yo mu karere no guhindura amafaranga
  - Gushinga inzego za Leta zijejwe gucungera amategeko n'ubudandaji
  - Guhingura amashini acapura n'imihora y'itumanaho
explanation: |
  Ico canditswe kivuga canecane ko uguteza imbere ibikorwa remezo vy’ugutwara abantu n’ibintu be n’ubudandaji mpuzamakungu vyatumye amasoko yo mu karere yitandukanya n’ayandi, bituma haba uguhiganwa, kandi bikaba vyatumye habaho uburinganire bw’ukudakeka kw’uburimyi hagati y’uturere. Iryo terambere ry’ibikorwa remezo ryari rihambaye cane mu kurema ibintu bishobora gutuma umwidegemvyo n’ubudandaji bwigenga bishobora gutera imbere, kuko vyahuza amasoko yari yitandukanije mbere, rikazana n’imirongo y’ubutunzi yagutse yatuma uguhiganwa gushoboka.
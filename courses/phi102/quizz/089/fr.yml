question: Quel développement d'infrastructure clé a contribué à rompre l'isolement des marchés locaux et à stimuler la concurrence selon l'analyse historique ?
answer: Le développement des infrastructures de transport et du commerce international
wrong_answers:
  - La mise en place de systèmes bancaires locaux et de systèmes de change
  - La création d'agences gouvernementales de régulation et de lois commerciales
  - L'invention des presses d'imprimerie et des réseaux de communication
explanation: |
  Le texte mentionne spécifiquement que le développement des infrastructures de transport et du commerce international a brisé l'isolement des marchés locaux, stimulé la concurrence et contribué à équilibrer les incertitudes agricoles entre les régions. Ce développement des infrastructures a joué un rôle crucial dans la création de conditions propices à la liberté et au libre-échange, car il a permis de relier des marchés auparavant isolés et de créer des réseaux économiques plus vastes qui ont rendu la concurrence viable.
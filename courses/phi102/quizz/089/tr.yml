question: Tarihsel analize göre hangi kilit altyapı gelişimi yerel piyasaların izolasyonunu kırmaya ve rekabeti canlandırmaya yardımcı oldu?
answer: Ulaşım altyapısının ve uluslararası ticaretin geliştirilmesi
wrong_answers:
  - Yerel bankacılık sistemlerinin kurulması ve döviz değişimi
  - Devlet düzenleyici kurumlarının ve ticaret yasalarının oluşturulması
  - Matbaanın ve iletişim ağlarının icadı
explanation: |
  Metinde özellikle ulaşım altyapısının ve uluslararası ticaretin gelişmesinin yerel pazarların izolasyonunu kırdığı, rekabeti teşvik ettiği ve bölgeler arasındaki tarımsal belirsizliklerin dengelenmesine yardımcı olduğu belirtilmektedir. Bu altyapı gelişimi, daha önce izole edilmiş pazarları birbirine bağladığı ve rekabeti uygulanabilir kılan daha geniş ekonomik ağlar yarattığı için özgürlüğün ve serbest ticaretin gelişebileceği koşulların yaratılmasında çok önemliydi.
question: Welke belangrijke infrastructuurontwikkeling heeft volgens de historische analyse geholpen om het isolement van lokale markten te doorbreken en concurrentie te stimuleren?
answer: De ontwikkeling van transportinfrastructuur en internationale handel
wrong_answers:
  - Het opzetten van lokale banksystemen en valutawissels
  - De oprichting van regelgevende overheidsinstanties en handelswetten
  - De uitvinding van drukpersen en communicatienetwerken
explanation: |
  De tekst vermeldt specifiek dat de ontwikkeling van transportinfrastructuur en internationale handel het isolement van lokale markten doorbrak, concurrentie stimuleerde en agrarische onzekerheden tussen regio's in evenwicht hielp brengen. Deze ontwikkeling van de infrastructuur was cruciaal voor het creëren van omstandigheden waarin vrijheid en vrije handel konden floreren, omdat het voorheen geïsoleerde markten met elkaar verbond en bredere economische netwerken creëerde die concurrentie mogelijk maakten.
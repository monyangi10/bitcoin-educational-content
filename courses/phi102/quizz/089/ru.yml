question: Какое ключевое развитие инфраструктуры помогло разрушить изоляцию местных рынков и стимулировать конкуренцию, согласно историческому анализу?
answer: Развитие транспортной инфраструктуры и международной торговли
wrong_answers:
  - Создание местных банковских систем и обмен валюты
  - Создание государственных регулирующих органов и законов о торговле
  - Изобретение печатных станков и коммуникационных сетей
explanation: |
  В тексте особо отмечается, что развитие транспортной инфраструктуры и международной торговли нарушило изоляцию местных рынков, стимулировало конкуренцию и помогло сбалансировать сельскохозяйственную неопределенность между регионами. Развитие инфраструктуры сыграло решающую роль в создании условий для процветания свободы и свободной торговли, поскольку оно соединило ранее изолированные рынки и создало более широкие экономические сети, которые сделали конкуренцию жизнеспособной.
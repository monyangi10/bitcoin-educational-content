question: Prema teoriji harmonije interesa, kakvu ulogu tehnološki napredak u transportu igra u stvaranju mirnih međunarodnih odnosa?
answer: Omogućava redovnije i opsežnije razmene koje stvaraju međusobnu ekonomsku zavisnost između nacija
wrong_answers:
  - Omogućava vojnim snagama da se brže rasporede kako bi sprečile sukobe pre nego što eskaliraju
  - "Olakšava kulturnu razmenu koja pomaže nacijama da razumeju vrednosti i tradicije jedni drugih"
  - Smanjuje troškove prirodnih resursa tako što ih čini dostupnim iz više globalnih izvora
explanation: |
  Tekst posebno identifikuje transportne tehnologije kao jedan od ključnih faktora koji su omogućili pojavu 'lanca harmonije' između ekonomskih agenata. Omogućavajući redovnije i opsežnije razmene, ove tehnologije su stvorile ekonomsku međuzavisnost gde poremećaji bilo gde utiču na sve. Ova međusobna zavisnost čini rat skupim za sve strane, stvarajući podsticaje za mir. Druge opcije se fokusiraju na vojne, kulturne ili resursne faktore koji nisu naglašeni u okviru harmonije interesa koji je predstavljen.
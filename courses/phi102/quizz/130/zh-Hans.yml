question: 根据利益和谐理论，交通领域的技术进步在创建和平的国际关系中发挥了什么作用？
answer: 它使交流更加定期和广泛，从而在各国之间建立起经济上的相互依存关系
wrong_answers:
  - 它使军队能够更快地部署，在冲突升级之前就加以预防
  - "它促进文化交流，帮助各国了解彼此的价值观和传统"
  - 通过从全球多个来源获取自然资源，降低了自然资源的成本
explanation: |
  文中特别指出，运输技术是促成经济主体之间出现 "和谐链 "的关键因素之一。这些技术允许更有规律、更广泛的交流，从而形成了经济上的相互依赖，任何地方的混乱都会影响到每一个人。这种相互依赖使得战争对各方都代价高昂，从而产生了和平的动力。其他选项侧重于军事、文化或资源因素，而这些因素在所提出的利益和谐框架中并未得到强调。
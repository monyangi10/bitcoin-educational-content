question: De acordo com a teoria da harmonia de interesses, que papel desempenha o avanço tecnológico nos transportes na criação de relações internacionais pacíficas?
answer: Permite intercâmbios mais regulares e alargados que criam uma dependência económica mútua entre as nações
wrong_answers:
  - Permite que as forças militares se desloquem mais rapidamente para prevenir conflitos antes que estes se agravem
  - "Facilita o intercâmbio cultural que ajuda as nações a compreenderem os valores e as tradições umas das outras"
  - Reduz o custo dos recursos naturais, tornando-os acessíveis a partir de múltiplas fontes mundiais
explanation: |
  O texto identifica especificamente as tecnologias de transporte como um dos principais factores que permitiram o aparecimento da "cadeia de harmonia" entre os agentes económicos. Ao permitir trocas mais regulares e extensas, estas tecnologias criaram uma interdependência económica em que as perturbações em qualquer lugar afectam todos. Esta dependência mútua torna a guerra onerosa para todas as partes, criando incentivos à paz. As outras opções centram-se em factores militares, culturais ou de recursos que não são realçados no quadro de harmonia de interesses apresentado.
question: 根據利益和諧理論，運輸技術的進步在創造和平的國際關係上扮演什麼角色？
answer: 它使更多定期和廣泛的交流成為可能，從而在各國之間建立起相互的經濟依賴。
wrong_answers:
  - 它可讓軍隊更快速地部署，在衝突升級前加以預防
  - 「它促進了文化交流，有助於各國瞭解彼此的價值觀和傳統」
  - 可從全球多個來源取得天然資源，從而降低天然資源的成本
explanation: |
  文中特別指出運輸技術是促成經濟體之間「和諧鏈」出現的關鍵因素之一。這些技術允許更有規律、更廣泛的交流，從而創造了經濟上的相互依賴，任何地方的中斷都會影響到每個人。這種相互依賴使得戰爭對各方來說都是代價高昂的，為和平創造了誘因。其他選項著重於軍事、文化或資源因素，這些因素在所提出的利益和諧框架中並沒有強調。
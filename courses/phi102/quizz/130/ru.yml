question: Согласно теории гармонии интересов, какую роль играет технологический прогресс в области транспорта в создании мирных международных отношений?
answer: Он позволяет осуществлять более регулярные и широкие обмены, которые создают взаимную экономическую зависимость между странами
wrong_answers:
  - Это позволяет быстрее развертывать вооруженные силы для предотвращения конфликтов до их эскалации
  - "Он способствует культурному обмену, который помогает странам понять ценности и традиции друг друга"
  - Снижает стоимость природных ресурсов, делая их доступными из многочисленных глобальных источников
explanation: |
  В тексте транспортные технологии названы одним из ключевых факторов, обеспечивших возникновение "цепочки гармонии" между экономическими агентами. Обеспечивая более регулярный и широкий обмен, эти технологии создали экономическую взаимозависимость, при которой сбои в любой точке сказываются на всех. Такая взаимная зависимость делает войну дорогостоящей для всех сторон, создавая стимулы для мира. Другие варианты сосредоточены на военных, культурных или ресурсных факторах, которые не акцентируются в представленной схеме гармонии интересов.
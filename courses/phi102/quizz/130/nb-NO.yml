question: Hvilken rolle spiller teknologiske fremskritt innen transport for å skape fredelige internasjonale relasjoner, ifølge teorien om harmoni mellom interesser?
answer: Det muliggjør mer regelmessig og omfattende utveksling som skaper gjensidig økonomisk avhengighet mellom nasjoner
wrong_answers:
  - Det gjør det mulig å sette inn militære styrker raskere for å forhindre konflikter før de eskalerer
  - "Det legger til rette for kulturutveksling som hjelper nasjoner til å forstå hverandres verdier og tradisjoner"
  - Det reduserer kostnadene for naturressurser ved å gjøre dem tilgjengelige fra flere globale kilder
explanation: |
  Teksten identifiserer transportteknologien som en av nøkkelfaktorene som gjorde det mulig å skape en "harmonisk kjede" mellom de økonomiske aktørene. Ved å muliggjøre mer regelmessige og omfattende utvekslinger skapte disse teknologiene en gjensidig økonomisk avhengighet der forstyrrelser hvor som helst påvirker alle. Denne gjensidige avhengigheten gjør krig kostbart for alle parter, noe som skaper insentiver for fred. De andre alternativene fokuserer på militære, kulturelle eller ressursmessige faktorer som ikke vektlegges i det presenterte rammeverket for harmoni av interesser.
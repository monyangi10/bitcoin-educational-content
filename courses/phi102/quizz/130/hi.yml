question: According to the harmony of interests theory, what role does technological advancement in transportation play in creating peaceful international relations?
answer: It enables more regular and extensive exchanges that create mutual economic dependence between nations
wrong_answers:
  - It allows military forces to deploy more quickly to prevent conflicts before they escalate
  - "It facilitates cultural exchange that helps nations understand each other's values and traditions"
  - It reduces the cost of natural resources by making them accessible from multiple global sources
explanation: |
  The text specifically identifies transportation technologies as one of the key factors that enabled the emergence of the 'chain of harmony' between economic agents. By allowing more regular and extensive exchanges, these technologies created economic interdependence where disruptions anywhere affect everyone. This mutual dependence makes war costly for all parties, creating incentives for peace. The other options focus on military, cultural, or resource factors that aren't emphasized in the harmony of interests framework presented.
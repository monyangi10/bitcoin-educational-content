question: Welche Rolle spielt nach der Theorie der Interessenharmonie der technische Fortschritt im Verkehrswesen bei der Schaffung friedlicher internationaler Beziehungen?
answer: Sie ermöglicht einen regelmäßigeren und umfassenderen Austausch, der eine gegenseitige wirtschaftliche Abhängigkeit zwischen den Nationen schafft
wrong_answers:
  - Sie ermöglicht einen schnelleren Einsatz der Streitkräfte, um Konflikte zu verhindern, bevor sie eskalieren
  - "Sie erleichtert den kulturellen Austausch, der den Nationen hilft, die Werte und Traditionen der anderen zu verstehen
  - Sie senkt die Kosten für natürliche Ressourcen, indem sie sie aus mehreren globalen Quellen zugänglich macht
explanation: |
  In dem Text werden insbesondere die Transporttechnologien als einer der Schlüsselfaktoren genannt, die das Entstehen einer "Kette der Harmonie" zwischen den Wirtschaftsakteuren ermöglichten. Indem sie einen regelmäßigeren und umfangreicheren Austausch ermöglichten, schufen diese Technologien eine wirtschaftliche Interdependenz, bei der sich Störungen überall auf alle auswirken. Diese gegenseitige Abhängigkeit macht den Krieg für alle Parteien kostspielig und schafft Anreize für den Frieden. Die anderen Optionen konzentrieren sich auf militärische, kulturelle oder ressourcenbezogene Faktoren, die in dem vorgestellten Rahmen der Interessenharmonie nicht betont werden.
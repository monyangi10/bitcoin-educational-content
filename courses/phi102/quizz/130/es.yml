question: Según la teoría de la armonía de intereses, ¿qué papel desempeña el avance tecnológico en el transporte en la creación de unas relaciones internacionales pacíficas?
answer: Permite intercambios más regulares y amplios que crean una dependencia económica mutua entre las naciones
wrong_answers:
  - Permite a las fuerzas militares desplegarse más rápidamente para prevenir conflictos antes de que se agraven
  - "Facilita el intercambio cultural que ayuda a las naciones a comprender los valores y tradiciones de las demás"
  - Reduce el coste de los recursos naturales haciéndolos accesibles desde múltiples fuentes mundiales
explanation: |
  El texto identifica específicamente las tecnologías del transporte como uno de los factores clave que permitieron la aparición de la "cadena de armonía" entre los agentes económicos. Al permitir intercambios más regulares y extensos, estas tecnologías crearon una interdependencia económica en la que las perturbaciones en cualquier lugar afectan a todos. Esta dependencia mutua hace que la guerra sea costosa para todas las partes, creando incentivos para la paz. Las otras opciones se centran en factores militares, culturales o de recursos que no se destacan en el marco de armonía de intereses presentado.
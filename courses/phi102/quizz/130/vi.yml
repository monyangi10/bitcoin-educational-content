question: Theo lý thuyết hài hòa lợi ích, sự tiến bộ công nghệ trong lĩnh vực giao thông vận tải đóng vai trò gì trong việc tạo dựng quan hệ quốc tế hòa bình?
answer: Nó tạo điều kiện cho các cuộc trao đổi thường xuyên và rộng rãi hơn, tạo ra sự phụ thuộc kinh tế lẫn nhau giữa các quốc gia.
wrong_answers:
  - Điều này cho phép lực lượng quân sự triển khai nhanh hơn để ngăn chặn xung đột trước khi chúng leo thang.
  - "Nó tạo điều kiện thuận lợi cho việc giao lưu văn hóa, giúp các quốc gia hiểu rõ hơn về các giá trị và truyền thống của nhau."
  - Nó giúp giảm chi phí tài nguyên thiên nhiên bằng cách cho phép tiếp cận chúng từ nhiều nguồn trên toàn cầu.
explanation: |
  Văn bản này đặc biệt nhấn mạnh công nghệ vận tải là một trong những yếu tố then chốt cho phép hình thành "chuỗi hài hòa" giữa các tác nhân kinh tế. Bằng cách cho phép trao đổi thường xuyên và rộng rãi hơn, các công nghệ này đã tạo ra sự phụ thuộc lẫn nhau về kinh tế, trong đó sự gián đoạn ở bất cứ đâu đều ảnh hưởng đến tất cả mọi người. Sự phụ thuộc lẫn nhau này khiến chiến tranh trở nên tốn kém đối với tất cả các bên, tạo ra động lực cho hòa bình. Các lựa chọn khác tập trung vào các yếu tố quân sự, văn hóa hoặc tài nguyên mà không được nhấn mạnh trong khuôn khổ hài hòa lợi ích được trình bày.
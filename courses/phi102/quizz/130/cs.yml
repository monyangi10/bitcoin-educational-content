question: Jakou roli hraje podle teorie harmonie zájmů technologický pokrok v dopravě při vytváření mírových mezinárodních vztahů?
answer: Umožňuje pravidelnější a rozsáhlejší výměnu, která vytváří vzájemnou hospodářskou závislost mezi národy
wrong_answers:
  - Umožňuje rychlejší nasazení vojenských sil, aby se zabránilo konfliktům dříve, než se vyhrotí
  - "Usnadňuje kulturní výměnu, která pomáhá národům pochopit vzájemné hodnoty a tradice."
  - Snižuje náklady na přírodní zdroje tím, že je zpřístupňuje z více globálních zdrojů
explanation: |
  Text konkrétně označuje dopravní technologie za jeden z klíčových faktorů, které umožnily vznik "řetězce harmonie" mezi ekonomickými subjekty. Tím, že tyto technologie umožnily pravidelnější a rozsáhlejší výměnu, vytvořily vzájemnou ekonomickou závislost, v níž narušení kdekoli ovlivňuje všechny. Tato vzájemná závislost činí válku nákladnou pro všechny strany a vytváří pobídky k míru. Ostatní možnosti se zaměřují na vojenské, kulturní nebo zdrojové faktory, které nejsou v předloženém rámci harmonie zájmů zdůrazněny.
question: Dushingiye ku ciyumviro c’uguhuza inyungu, ni uruhara uruhe iterambere ry’ubuhinga bwo gutwara abantu n’ibintu rigira mu gutuma habaho imigenderanire mpuzamakungu y’amahoro?
answer: Bituma habaho uguhanahana amakuru guhoraho kandi kwagutse gutuma amahanga agira ubufatanye mu vy’ubutunzi .
wrong_answers:
  - Bituma ingabo zishobora gushika vuba cane kugira ngo zikingire intambara imbere y’uko zikomera .
  - "\"Birafasha guhanahana imico kama bifasha amahanga gutahura agaciro n'imigenzo ya buri wese\"."
  - Bigabanya igiciro c'itunga ry'ibidukikije mu gutuma rishobora gushikirwa n'ibintu vyinshi vyo kw'isi yose .
explanation: |
  Ico canditswe kigaragaza canecane ubuhinga bwo gutwara abantu n’ibintu nk’ikimwe mu bintu nyamukuru vyatumye habaho ‘uruzitiro rw’uguhuza’ hagati y’abakozi b’ubutunzi. Mu kwemera ko haba uguhanahana amakuru guhoraho kandi gukomeye, izo tekinoloji zatumye habaho ugufatanya mu vy’ubutunzi aho uguhungabana aho hose bigira ico bikoze kuri bose. Ukwo kwisungana gutuma intambara itwara amahera menshi ku mpande zose, bikaba bituma habaho inguvu zituma haba amahoro. Ayandi mahitamwo yibanda ku bijanye n’igisirikare, umuco canke ubutunzi bitashimikwako mu bijanye n’uguhuza inyungu zashikirijwe.
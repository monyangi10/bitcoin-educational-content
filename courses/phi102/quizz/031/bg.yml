question: От какво произтича принципът на децентрализация в политическата свобода според главата?
answer: Разнообразието от човешки нужди, предпочитания и обстоятелства, които са в основата си индивидуални
wrong_answers:
  - Универсалната потребност от сигурност, която не може да бъде задоволена само от отделни хора
  - Икономическите взаимоотношения между клиенти и доставчици на свободните пазари
  - Физиологичното усещане за болка, предавано чрез нервната система
explanation: |
  Принципът на децентрализация се основава на човешкото разнообразие - фактът, че хората имат различни нужди, предпочитания и обстоятелства, които са предимно индивидуални по своята същност. Това многообразие логично подкрепя прокарването на децентрализацията до индивидуална автономия, както я защитава Бенджамин Констант. Другите варианти са свързани с различни концепции: универсалните потребности от сигурност обясняват изискванията за колективна защита, отношенията клиент-доставчик създават социална хармония чрез взаимна изгода, а предаването на болката установява физиологичната основа на принципа на ненападение. Единствено човешкото разнообразие пряко обосновава политическата децентрализация, като показва защо централизираното планиране не може да работи за различни индивиди.
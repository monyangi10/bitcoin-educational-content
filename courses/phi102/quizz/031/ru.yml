question: Из чего, согласно главе, вытекает принцип децентрализации в политической свободе?
answer: Разнообразие человеческих потребностей, предпочтений и обстоятельств, которые являются сугубо индивидуальными
wrong_answers:
  - Всеобщая потребность в безопасности, которая не может быть удовлетворена только отдельными людьми
  - Экономические отношения между клиентами и поставщиками на свободных рынках
  - Физиологическое ощущение боли, передающееся через нервную систему
explanation: |
  Принцип децентрализации находит свое основание в человеческом разнообразии - в том, что люди имеют различные потребности, предпочтения и обстоятельства, которые носят в первую очередь индивидуальный характер. Это разнообразие логически поддерживает продвижение децентрализации к индивидуальной автономии, как отстаивал Бенжамен Констан. Другие варианты связаны с различными концепциями: универсальные потребности в безопасности объясняют требования коллективной защиты, отношения между клиентами и поставщиками создают социальную гармонию благодаря взаимной выгоде, а передача боли создает физиологическую основу для принципа ненападения. Только человеческое разнообразие напрямую оправдывает политическую децентрализацию, демонстрируя, почему централизованное планирование не может работать для разных людей.
question: Z čeho podle kapitoly vyplývá princip decentralizace politické svobody?
answer: Různorodost lidských potřeb, preferencí a okolností, které jsou v zásadě individuální
wrong_answers:
  - Univerzální potřeba bezpečí, kterou nemůže uspokojit pouze jednotlivec
  - Ekonomické vztahy mezi zákazníky a dodavateli na volných trzích
  - Fyziologická zkušenost bolesti přenášená nervovým systémem
explanation: |
  Princip decentralizace vychází z lidské rozmanitosti - ze skutečnosti, že lidé mají různé potřeby, preference a okolnosti, které jsou především individuální povahy. Tato rozmanitost logicky podporuje prosazování decentralizace do individuální autonomie, jak ji hájí Benjamin Constant. Další možnosti se vztahují k různým koncepcím: univerzální bezpečnostní potřeby vysvětlují požadavky kolektivní ochrany, vztahy mezi klienty a dodavateli vytvářejí sociální harmonii prostřednictvím vzájemného prospěchu a přenos bolesti vytváří fyziologický základ pro princip neútočení. Pouze lidská rozmanitost přímo ospravedlňuje politickou decentralizaci tím, že ukazuje, proč centralizované plánování nemůže fungovat pro různorodé jedince.
question: Na čemu se prema poglavlju zasniva princip decentralizacije u političkoj slobodi?
answer: Raznovrsnost ljudskih potreba, preferencija i okolnosti koje su suštinski individualne
wrong_answers:
  - Univerzalna potreba za sigurnošću koju pojedinci sami ne mogu zadovoljiti
  - Ekonomski odnosi između klijenata i dobavljača na slobodnim tržištima
  - Fiziološko iskustvo bola preneto kroz nervni sistem
explanation: |
  Princip decentralizacije nalazi svoje temelje u ljudskoj raznolikosti - činjenici da ljudi imaju različite potrebe, preferencije i okolnosti koje su prvenstveno individualne prirode. Ova raznolikost logično podržava guranje decentralizacije ka individualnoj autonomiji, kako je branio Benjamin Konstan. Druge opcije se odnose na različite koncepte: univerzalne potrebe za sigurnošću objašnjavaju kolektivne zahteve za zaštitom, odnosi klijent-dobavljač stvaraju društvenu harmoniju kroz uzajamnu korist, a prenos bola uspostavlja fiziološku osnovu za princip nenapadanja. Samo ljudska raznolikost direktno opravdava političku decentralizaciju pokazujući zašto centralizovano planiranje ne može funkcionisati za različite pojedince.
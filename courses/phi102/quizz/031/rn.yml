question: None ingingo ngenderwako y’ukwegereza ubutegetsi abaturage mu mwidegemvyo wa politike ikomoka hehe hakurikijwe ikigabane?
answer: Ubwoko bw'ivyo umuntu akeneye, ivyo akunda n'ivyo abayeho bishingiye ku muntu ku giti ciwe
wrong_answers:
  - Ivyipfuzo vy’umutekano kw’isi yose bidashobora guhazwa n’abantu ku giti cabo bonyene .
  - Ubucuti bw'ubutunzi hagati y'abaguzi n'abaguzi mu masoko y'ubuntu
  - Ivyiyumviro vy'umubiri vy'ububabare buca mu nzira y'imitsi
explanation: |
  Ingingo ngenderwako y’ukwegereza ubutegetsi abantu bose isanga umushinge wayo mu butandukanye bw’abantu - ukuntu abantu bafise ivyo bakeneye bitandukanye, ivyo bakunda, n’ivyo bashikirwamwo bitandukanye, ivyo bikaba ari ivy’umuntu ku giti ciwe. Ubwo butandukanye burashigikira mu buryo bubereye gusunika ukwigenga kw’umuntu ku giti ciwe, nk’uko vyaburaniwe na Benjamin Constant. Ibindi bihitamwo bifitaniye isano n’ivyiyumviro bitandukanye: ivyipfuzo vy’umutekano kw’isi yose bisigura ibisabwa vyo kurinda rusangi, ubucuti hagati y’abaguzi n’abaguzi buratuma haba uguhuza abantu biciye mu kuvyungukirako, kandi ugukwiragiza ububabare gushinga urufatiro rw’umubiri rw’ingingo ngenderwako y’ukutagira ubukazi. Ubutandukane bw’abantu ni bwo bwonyene bushingira intahe ata guca ku ruhande ugusenyura politike mu kwerekana igituma igenamigambi ry’ubumwe ridashobora gukorera abantu batandukanye.
question: Hvilket grunnleggende prinsipp, ifølge Charles Comtes analyse av sosial lagdeling, skiller samfunn med frihet fra samfunn uten frihet opp gjennom historien?
answer: Individets evne til å velge selv kontra det å bli pålagt valg av andre
wrong_answers:
  - Tilstedeværelsen eller fraværet av privat eiendomsrett blant ulike sosiale klasser
  - Graden av økonomisk ulikhet og formuesfordeling i befolkningen
  - Det teknologiske fremskrittet og den industrielle utviklingen som samfunnet har oppnådd
explanation: |
  Charles Comtes analyse, som vi refererte til i kapittelet, identifiserte det grunnleggende skillet mellom frie og ufrie samfunn som evnen til individuelle valg kontra påtvungne beslutninger. Dette prinsippet overskrider økonomiske faktorer som eierskap eller fordeling av rikdom, og fokuserer i stedet på personlig autonomi og selvbestemmelse. Selv om økonomisk ulikhet og teknologisk utvikling er viktige sosiale faktorer, fremhevet Comte friheten til å ta egne valg som det definerende kjennetegnet som skilte ulike typer samfunn opp gjennom historien, fra antikkens sivilisasjoner til moderne tid.
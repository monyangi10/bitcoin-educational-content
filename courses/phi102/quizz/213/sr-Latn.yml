question: Prema analizi društvene stratifikacije Šarla Komtea, koji je osnovni princip razlikovao društva slobode od društava neslobode kroz istoriju?
answer: Sposobnost pojedinaca da sami biraju naspram nametnutih izbora od strane drugih
wrong_answers:
  - Prisustvo ili odsustvo privatnog vlasništva među različitim društvenim klasama
  - Stepen ekonomske nejednakosti i raspodela bogatstva unutar populacije
  - Nivo tehnološkog napretka i industrijskog razvoja koji je društvo postiglo
explanation: |
  Analiza Charlesa Comtea, kako je navedeno u poglavlju, identifikovala je fundamentalnu razliku između slobodnih i neslobodnih društava kao sposobnost za individualni izbor naspram nametnutih odluka. Ovaj princip prevazilazi puke ekonomske faktore poput vlasništva nad imovinom ili raspodele bogatstva, fokusirajući se umesto toga na ličnu autonomiju i samoodređenje. Dok su ekonomska nejednakost i tehnološki razvoj važni društveni faktori, Comteov okvir je posebno naglašavao slobodu da se donose sopstvene odluke kao definisajuću karakteristiku koja je razdvajala različite tipove društava kroz istoriju, od drevnih civilizacija do modernih vremena.
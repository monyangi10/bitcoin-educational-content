question: Jaký základní princip podle analýzy sociální stratifikace Charlese Comta odlišoval v dějinách společnosti svobody od společností nesvobody?
answer: Schopnost jednotlivce rozhodovat se sám za sebe oproti volbám, které mu vnucují ostatní
wrong_answers:
  - Přítomnost či nepřítomnost soukromého vlastnictví v různých společenských vrstvách
  - Míra ekonomické nerovnosti a rozdělení bohatství v rámci populace
  - Úroveň technologického pokroku a průmyslového rozvoje, které společnost dosáhla
explanation: |
  Charles Comte ve své analýze, na kterou se v této kapitole odkazujeme, označil za základní rozdíl mezi svobodnými a nesvobodnými společnostmi schopnost individuální volby oproti vnuceným rozhodnutím. Tento princip překračuje pouhé ekonomické faktory, jako je vlastnictví majetku nebo rozdělení bohatství, a zaměřuje se naopak na osobní autonomii a sebeurčení. Zatímco ekonomická nerovnost a technologický rozvoj jsou důležitými společenskými faktory, Comtův rámec výslovně zdůrazňoval svobodu vlastního rozhodování jako určující charakteristiku, která oddělovala různé typy společností v průběhu dějin, od starověkých civilizací až po moderní dobu.
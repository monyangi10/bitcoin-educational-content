question: 찰스 콩트의 사회 계층화 분석에 따르면, 역사상 자유 사회와 비자유 사회를 구별한 근본적인 원리는 무엇인가요?
answer: 개인이 스스로 선택할 수 있는 능력과 타인이 강요하는 선택의 차이
wrong_answers:
  - 다양한 사회 계층 간의 사유 재산 소유권 유무
  - 인구 내 경제적 불평등과 부의 분배 정도
  - 사회가 달성한 기술 발전 및 산업 발전 수준
explanation: |
  이 장에서 언급된 찰스 콩트의 분석에 따르면 자유 사회와 비자유 사회의 근본적인 차이는 개인의 선택 능력과 강요된 결정으로 구분됩니다. 이 원칙은 재산 소유나 부의 분배와 같은 단순한 경제적 요소를 초월하여 개인의 자율성과 자기 결정에 초점을 맞추고 있습니다. 경제적 불평등과 기술 발전도 중요한 사회적 요소이지만, 콩트의 프레임워크는 고대 문명부터 현대에 이르기까지 역사적으로 다양한 유형의 사회를 구분하는 특징으로서 개인의 선택의 자유를 특별히 강조했습니다.
question: Enligt Charles Comtes analys av den sociala stratifieringen, vilken grundläggande princip har genom historien skiljt samhällen med frihet från samhällen utan frihet?
answer: Individens förmåga att välja själv kontra att få sina val påtvingade av andra
wrong_answers:
  - Förekomsten eller frånvaron av privat ägande bland olika samhällsklasser
  - Graden av ekonomisk ojämlikhet och förmögenhetsfördelning inom befolkningen
  - Den nivå av tekniskt framåtskridande och industriell utveckling som samhället uppnår
explanation: |
  Charles Comtes analys, som refereras i kapitlet, identifierade den grundläggande skillnaden mellan fria och icke-fria samhällen som förmågan till individuella val kontra påtvingade beslut. Denna princip går bortom rent ekonomiska faktorer som ägande eller förmögenhetsfördelning och fokuserar i stället på personlig autonomi och självbestämmande. Även om ekonomisk ojämlikhet och teknisk utveckling är viktiga sociala faktorer, betonade Comte i sitt ramverk särskilt friheten att göra egna val som den avgörande egenskap som skiljer olika typer av samhällen åt genom historien, från antika civilisationer till modern tid.
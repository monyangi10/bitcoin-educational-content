question: Zgodnie z analizą rozwarstwienia społecznego przeprowadzoną przez Charlesa Comte'a, jaka podstawowa zasada odróżniała społeczeństwa wolnościowe od społeczeństw niewolnych na przestrzeni dziejów?
answer: Zdolność jednostek do samodzielnego dokonywania wyborów w przeciwieństwie do wyborów narzucanych przez innych
wrong_answers:
  - Obecność lub brak własności prywatnej wśród różnych klas społecznych
  - Stopień nierówności ekonomicznych i dystrybucji bogactwa w populacji
  - Poziom zaawansowania technologicznego i rozwoju przemysłowego osiągnięty przez społeczeństwo
explanation: |
  Analiza Charlesa Comte'a, o której mowa w tym rozdziale, zidentyfikowała podstawową różnicę między wolnymi i niewolnymi społeczeństwami jako zdolność do indywidualnego wyboru w porównaniu z narzuconymi decyzjami. Zasada ta wykracza poza zwykłe czynniki ekonomiczne, takie jak własność nieruchomości lub dystrybucja bogactwa, koncentrując się zamiast tego na osobistej autonomii i samostanowieniu. Podczas gdy nierówności ekonomiczne i rozwój technologiczny są ważnymi czynnikami społecznymi, ramy Comte'a szczególnie podkreślały wolność dokonywania własnych wyborów jako cechę definiującą, która oddzielała różne typy społeczeństw na przestrzeni dziejów, od starożytnych cywilizacji po czasy współczesne.
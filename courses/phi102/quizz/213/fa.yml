question: بر اساس تحلیل چارلز کومت از طبقه‌بندی اجتماعی، چه اصل بنیادی جوامع آزادی را از جوامع غیرآزادی در طول تاریخ متمایز می‌کند؟
answer: توانایی افراد برای انتخاب برای خود در مقابل داشتن انتخاب‌هایی که توسط دیگران تحمیل می‌شود
wrong_answers:
  - وجود یا عدم وجود مالکیت خصوصی در میان طبقات اجتماعی مختلف
  - درجه نابرابری اقتصادی و توزیع ثروت درون جمعیت
  - سطح پیشرفت فناوری و توسعه صنعتی که توسط جامعه به دست آمده است
explanation: |
  تحلیل چارلز کنت، همان‌طور که در فصل اشاره شده است، تمایز اساسی بین جوامع آزاد و غیرآزاد را به‌عنوان ظرفیت انتخاب فردی در مقابل تصمیمات تحمیلی شناسایی کرد. این اصل فراتر از عوامل صرفاً اقتصادی مانند مالکیت یا توزیع ثروت است و به جای آن بر خودمختاری و تعیین سرنوشت شخصی تمرکز دارد. در حالی که نابرابری اقتصادی و توسعه فناوری عوامل اجتماعی مهمی هستند، چارچوب کنت به‌طور خاص آزادی انتخاب فردی را به‌عنوان ویژگی تعیین‌کننده‌ای که انواع مختلف جوامع را در طول تاریخ، از تمدن‌های باستان تا زمان‌های مدرن، از هم جدا می‌کند، مورد تأکید قرار داد.
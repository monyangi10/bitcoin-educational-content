question: De acordo com a análise de Charles Comte sobre a estratificação social, que princípio fundamental distinguiu as sociedades de liberdade das sociedades de não-liberdade ao longo da história?
answer: A capacidade dos indivíduos de escolherem por si próprios em vez de terem escolhas impostas por outros
wrong_answers:
  - A presença ou ausência de propriedade privada entre as diferentes classes sociais
  - O grau de desigualdade económica e a distribuição da riqueza na população
  - O nível de avanço tecnológico e de desenvolvimento industrial alcançado pela sociedade
explanation: |
  A análise de Charles Comte, tal como referido no capítulo, identificou a distinção fundamental entre sociedades livres e não livres como a capacidade de escolha individual versus decisões impostas. Este princípio transcende os meros factores económicos, como a propriedade ou a distribuição da riqueza, centrando-se antes na autonomia pessoal e na autodeterminação. Embora a desigualdade económica e o desenvolvimento tecnológico sejam factores sociais importantes, o quadro de Comte realçava especificamente a liberdade de fazer as próprias escolhas como a caraterística definidora que separava os diferentes tipos de sociedades ao longo da história, desde as civilizações antigas até aos tempos modernos.
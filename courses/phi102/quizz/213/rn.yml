question: Dukurikije icegeranyo ca Charles Comte ku bijanye n’ugushira abantu mu migwi, ni ingingo ngenderwako iyihe y’ishimikiro yatandukanya imibano y’abantu bafise umwidegemvyo n’imiryango idafise umwidegemvyo mu mateka yose?
answer: Ubushobozi bw'abantu bwo kwihitiramwo n'ukugira amahitamwo ategetswe n'abandi .
wrong_answers:
  - Kuba canke kutabaho kw'umutungo w'abantu ku giti cabo mu migwi itandukanye y'abantu .
  - Urugero rw'ubusumbasumbane mu vy'ubutunzi n'ugusangira ubutunzi mu bantu
  - Urugero rw'iterambere ry'ubuhinga n'iterambere ry'inganda vyashitsweko n'abanyagihugu
explanation: |
  Isesengura rya Charles Comte, nk’uko ryavuzwe muri ico kigabane, ryerekanye itandukaniro ry’ishimikiro hagati y’imibano yidegemvya n’iyitagira umwidegemvyo nk’ubushobozi bwo guhitamwo umuntu ku giti ciwe n’ingingo zitegekanijwe. Iryo hame rirenze ibintu vy’ubutunzi gusa nk’ukugira umutungo canke gusangira ubutunzi, ahubwo ryibanda ku kwigenga kw’umuntu ku giti ciwe no kwiyemeza. Naho ubusumbasumbane mu vy’ubutunzi n’iterambere ry’ubuhinga ari ibintu bihambaye mu kibano, inzego za Comte zashimikiye canecane ku mwidegemvyo wo kwihitiramwo nk’ikintu gisobanura catandukanya ubwoko butandukanye bw’imibano muri kahise, kuva ku mateka ya kera gushika ku bihe vya none.
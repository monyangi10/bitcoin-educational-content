question: Според анализа на социалното разслоение на Шарл Конт кой основен принцип е отличавал обществата на свободата от обществата на несвободата в историята?
answer: Възможността на хората да избират сами срещу налагането на избори от други
wrong_answers:
  - Наличието или отсъствието на частна собственост сред различните социални класи
  - Степента на икономическо неравенство и разпределение на богатството сред населението
  - Нивото на технологичен напредък и индустриално развитие, постигнато от обществото
explanation: |
  Анализът на Шарл Конт, споменат в главата, определя основното различие между свободните и несвободните общества като възможност за индивидуален избор и наложени решения. Този принцип надхвърля обикновените икономически фактори като собственост или разпределение на богатството, като вместо това се фокусира върху личната автономия и самоопределение. Макар че икономическото неравенство и технологичното развитие са важни социални фактори, рамката на Конт изрично подчертава свободата да се прави собствен избор като определяща характеристика, която разделя различните видове общества в историята - от древните цивилизации до съвременността.
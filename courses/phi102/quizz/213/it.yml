question: Secondo l'analisi di Charles Comte sulla stratificazione sociale, quale principio fondamentale ha distinto nel corso della storia le società di libertà da quelle di non libertà?
answer: La capacità degli individui di scegliere per se stessi rispetto alle scelte imposte da altri
wrong_answers:
  - La presenza o l'assenza di proprietà privata tra le diverse classi sociali
  - Il grado di disuguaglianza economica e di distribuzione della ricchezza all'interno della popolazione
  - Il livello di avanzamento tecnologico e di sviluppo industriale raggiunto dalla società
explanation: |
  L'analisi di Charles Comte, citata nel capitolo, ha identificato la distinzione fondamentale tra società libere e non libere nella capacità di scelta individuale rispetto alle decisioni imposte. Questo principio trascende i meri fattori economici come la proprietà o la distribuzione della ricchezza, concentrandosi invece sull'autonomia personale e sull'autodeterminazione. Sebbene la disuguaglianza economica e lo sviluppo tecnologico siano fattori sociali importanti, il quadro di Comte enfatizzava specificamente la libertà di fare le proprie scelte come caratteristica distintiva che separava diversi tipi di società nel corso della storia, dalle civiltà antiche ai tempi moderni.
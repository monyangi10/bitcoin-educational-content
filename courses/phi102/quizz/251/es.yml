question: Según la teoría liberal, ¿cuál fue el principal factor que permitió la emancipación de la mujer de su estatus históricamente subordinado en las sociedades primitivas?
answer: Avance tecnológico mediante herramientas y máquinas que igualaron la capacidad productiva entre hombres y mujeres
wrong_answers:
  - Legislación gubernamental e intervención del Estado que impusieron legalmente la igualdad de derechos para las mujeres
  - "Reformas religiosas y morales que cambiaron las actitudes culturales hacia el papel social de la mujer"
  - Movimientos políticos democráticos que otorgaron a las mujeres derecho de voto y representación política
explanation: |
  La teoría liberal sostiene que la emancipación de la mujer se produjo gracias al capitalismo y al progreso tecnológico, concretamente al desarrollo de herramientas y máquinas que hicieron que la capacidad productiva de la mujer fuera igual o superior a la del hombre. Este avance tecnológico desplazó el valor social de la fuerza bruta (que favorecía a los hombres en las sociedades primitivas) a la perseverancia y las virtudes morales/intelectuales. Las otras opciones representan soluciones políticas o impulsadas por el Estado, que contradicen el énfasis liberal en el cambio basado en el mercado y no en el impuesto por el gobierno.
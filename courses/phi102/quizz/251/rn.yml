question: Dushingiye ku ciyumviro c’ubwigenge, ni igiki ca mbere catumye abagore bidegemvya mu kibanza bari bafise mu mateka mu mibano ya kera?
answer: Iterambere ry'ubuhinga biciye ku bikoresho n'amamashini vyari bingana ubushobozi bwo gutanga umusaruro hagati y'abagabo n'abagore .
wrong_answers:
  - Amategeko ya Leta n'ingene Leta igira ico ikoze vyasaba ko abagore bagira uburenganzira bungana
  - "Impinduka z'idini n'inyifato runtu zahinduye inyifato y'imico kama ku bijanye n'uruhara rw'abagore mu kibano"
  - Imigwi ya politike ya demokarasi yaha abagore uburenganzira bwo gutora no guserukira politike
explanation: |
  Ivyiyumviro vy’abanyagihugu bivuga ko ukwidegemvya kw’abagore kwabaye biciye mu bu kapitalizimu no mu gutera imbere kw’ubuhinga, cane cane mu gutegura ibikoresho n’amamashini vyatumye ubushobozi bw’abagore bwo gutanga umusaruro bungana canke busumba ubw’abagabo. Iryo terambere ry’ubuhinga ryahinduye agaciro k’ikibano kuva ku nguvu z’ubukazi (zari zikunda abagabo mu mibano ya kera) gushika ku gushikama no ku ngeso nziza z’inyifato runtu/ubwenge. Ayandi mahitamwo agereranya inyishu zirongowe na Leta canke za politike, zivuguruza ugushimika kw’abanyagihugu ku mpinduka zishingiye ku masoko aho gushimika ku mpinduka zishingiye kuri Leta.
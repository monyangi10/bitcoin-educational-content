question: 自由主義理論によれば、原始社会における歴史的に従属的な地位からの女性の解放を可能にした主な要因は何か？
answer: 男女の生産能力を平等にした道具や機械による技術の進歩
wrong_answers:
  - 女性の平等な権利を法的に義務づけた政府の立法と国家の介入
  - "女性の社会的役割に対する文化的態度を変えた宗教的・道徳的改革"
  - 女性に選挙権と政治的代表権を与えた民主政治運動
explanation: |
  自由主義理論は、女性の解放は資本主義と技術の進歩、特に女性の生産能力を男性と同等かそれ以上にする道具や機械の開発によって起こったと主張する。この技術的進歩は、社会の価値を（原始社会では男性に有利だった）武力から、忍耐や道徳的・知的美徳へとシフトさせた。その他の選択肢は、国家主導の解決策や政治的解決策であり、政府が強制する変化ではなく、市場原理を重視する自由主義とは矛盾する。
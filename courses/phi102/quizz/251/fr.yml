question: Selon la théorie libérale, quel est le principal facteur qui a permis aux femmes de s'émanciper de leur statut historiquement subordonné dans les sociétés primitives ?
answer: Le progrès technologique grâce aux outils et aux machines a permis d'égaliser la capacité de production des hommes et des femmes
wrong_answers:
  - La législation gouvernementale et l'intervention de l'État qui ont rendu obligatoire l'égalité des droits pour les femmes
  - Réformes religieuses et morales qui ont modifié les attitudes culturelles à l'égard du rôle social des femmes
  - Mouvements politiques démocratiques qui ont donné aux femmes le droit de vote et la représentation politique
explanation: |
  La théorie libérale affirme que l'émancipation des femmes s'est produite grâce au capitalisme et au progrès technologique, en particulier le développement d'outils et de machines qui ont rendu la capacité de production des femmes égale ou supérieure à celle des hommes. Ce progrès technologique a fait passer la valeur sociétale de la force brute (qui favorisait les hommes dans les sociétés primitives) à la persévérance et aux vertus morales/intellectuelles. Les autres options représentent des solutions politiques ou pilotées par l'État, qui contredisent l'accent mis par les libéraux sur les changements fondés sur le marché plutôt que sur les changements imposés par le gouvernement.

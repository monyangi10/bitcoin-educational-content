question: Mikä oli liberaalin teorian mukaan ensisijainen tekijä, joka mahdollisti naisten vapautumisen heidän historiallisesti alisteisesta asemastaan primitiivisissä yhteiskunnissa?
answer: Teknologinen kehitys työkalujen ja koneiden avulla, jotka tasoittivat miesten ja naisten tuotantokapasiteettia
wrong_answers:
  - Hallituksen lainsäädäntö ja valtion väliintulo, jolla naisten yhtäläiset oikeudet säädettiin laillisesti
  - "Uskonnolliset ja moraaliset uudistukset, jotka muuttivat kulttuurisia asenteita naisten yhteiskunnallisia rooleja kohtaan"
  - Demokraattiset poliittiset liikkeet, jotka antoivat naisille äänioikeuden ja poliittisen edustuksen
explanation: |
  Liberalistisen teorian mukaan naisten emansipaatio tapahtui kapitalismin ja teknisen kehityksen ansiosta, erityisesti sellaisten työkalujen ja koneiden kehittämisen ansiosta, jotka tekivät naisten tuotantokyvystä miesten tuotantokykyä vastaavan tai paremman. Teknologinen kehitys siirsi yhteiskunnallisen arvon raa'asta voimasta (joka suosi miehiä alkukantaisissa yhteiskunnissa) sinnikkyyteen ja moraalisiin/älyllisiin hyveisiin. Muut vaihtoehdot edustavat valtiovetoisia tai poliittisia ratkaisuja, jotka ovat ristiriidassa sen kanssa, että liberaalit painottavat pikemminkin markkinapohjaista kuin hallituksen määräämää muutosta.
question: According to liberal theory, what was the primary factor that enabled women's emancipation from their historically subordinate status in primitive societies?
answer: Technological advancement through tools and machines that equalized productive capacity between men and women
wrong_answers:
  - Government legislation and state intervention that legally mandated equal rights for women
  - "Religious and moral reforms that changed cultural attitudes toward women's social roles"
  - Democratic political movements that gave women voting rights and political representation
explanation: |
  Liberal theory argues that women's emancipation occurred through capitalism and technological progress, specifically the development of tools and machines that made women's productive capacity equal or superior to men's. This technological advancement shifted societal value from brute force (which favored men in primitive societies) to perseverance and moral/intellectual virtues. The other options represent state-driven or political solutions, which contradict the liberal emphasis on market-based rather than government-mandated change.
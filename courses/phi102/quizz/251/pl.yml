question: Według teorii liberalnej, jaki był główny czynnik, który umożliwił emancypację kobiet z ich historycznie podporządkowanego statusu w prymitywnych społeczeństwach?
answer: Postęp technologiczny dzięki narzędziom i maszynom, które zrównały zdolności produkcyjne mężczyzn i kobiet
wrong_answers:
  - Ustawodawstwo rządowe i interwencja państwa, które prawnie nakazały równe prawa dla kobiet
  - "Reformy religijne i moralne, które zmieniły postawy kulturowe wobec ról społecznych kobiet"
  - Demokratyczne ruchy polityczne, które zapewniły kobietom prawa wyborcze i reprezentację polityczną
explanation: |
  Teoria liberalna twierdzi, że emancypacja kobiet nastąpiła dzięki kapitalizmowi i postępowi technologicznemu, a konkretnie rozwojowi narzędzi i maszyn, które sprawiły, że zdolność produkcyjna kobiet była równa lub wyższa niż mężczyzn. Ten postęp technologiczny przesunął wartość społeczną z brutalnej siły (która faworyzowała mężczyzn w prymitywnych społeczeństwach) na wytrwałość i cnoty moralne / intelektualne. Pozostałe opcje reprezentują rozwiązania państwowe lub polityczne, które są sprzeczne z liberalnym naciskiem na zmiany oparte na rynku, a nie nakazane przez rząd.
question: Menurut teori liberal, apa faktor utama yang memungkinkan emansipasi wanita dari status subordinat mereka secara historis dalam masyarakat primitif?
answer: Kemajuan teknologi melalui alat dan mesin yang menyetarakan kapasitas produktif antara laki-laki dan perempuan
wrong_answers:
  - Peraturan pemerintah dan intervensi negara yang secara hukum mengamanatkan kesetaraan hak bagi perempuan
  - "Reformasi agama dan moral yang mengubah sikap budaya terhadap peran sosial perempuan"
  - Gerakan politik demokratis yang memberikan hak suara dan perwakilan politik kepada perempuan
explanation: |
  Teori liberal berpendapat bahwa emansipasi wanita terjadi melalui kapitalisme dan kemajuan teknologi, khususnya pengembangan alat dan mesin yang membuat kapasitas produktif wanita setara atau lebih unggul dari pria. Kemajuan teknologi ini menggeser nilai masyarakat dari kekerasan (yang diunggulkan oleh laki-laki dalam masyarakat primitif) menjadi ketekunan dan kebajikan moral/intelektual. Pilihan lainnya merupakan solusi yang digerakkan oleh negara atau solusi politik, yang bertentangan dengan penekanan liberal pada perubahan berbasis pasar dan bukan perubahan yang diamanatkan oleh pemerintah.
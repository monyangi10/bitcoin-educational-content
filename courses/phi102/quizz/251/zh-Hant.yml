question: 根據自由主義理論，讓婦女得以從原始社會的歷史從屬地位中解放出來的主要因素是什麼？
answer: 透過工具和機器實現技術進步，使男女生產力平等
wrong_answers:
  - 政府立法和國家干預，在法律上規定婦女享有平等權利
  - 「宗教和道德改革改變了對婦女社會角色的文化態度」
  - 賦予婦女投票權和政治代表權的民主政治運動
explanation: |
  自由主義理論認為，婦女解放是透過資本主義和技術進步而發生的，特別是工具和機器的發展，使得婦女的生產能力等同或優於男性。這種技術進步將社會價值從野蠻力量（在原始社會中偏向於男性）轉移到毅力和道德/智力美德。其他選項代表國家驅動或政治解決方案，與自由主義強調以市場為基礎而非由政府強制的改變相矛盾。
question: De acordo com a teoria liberal, qual foi o principal fator que permitiu a emancipação das mulheres do seu estatuto historicamente subordinado nas sociedades primitivas?
answer: Avanço tecnológico através de ferramentas e máquinas que igualaram a capacidade produtiva entre homens e mulheres
wrong_answers:
  - Legislação governamental e intervenção do Estado que impuseram legalmente a igualdade de direitos às mulheres
  - "Reformas religiosas e morais que alteraram as atitudes culturais relativamente aos papéis sociais das mulheres"
  - Movimentos políticos democráticos que deram às mulheres direito de voto e representação política
explanation: |
  A teoria liberal defende que a emancipação das mulheres ocorreu através do capitalismo e do progresso tecnológico, especificamente o desenvolvimento de ferramentas e máquinas que tornaram a capacidade produtiva das mulheres igual ou superior à dos homens. Este avanço tecnológico fez com que o valor social deixasse de ser a força bruta (que favorecia os homens nas sociedades primitivas) e passasse a ser a perseverança e as virtudes morais/intelectuais. As outras opções representam soluções políticas ou orientadas para o Estado, que contradizem a ênfase liberal na mudança baseada no mercado e não na mudança imposta pelo governo.
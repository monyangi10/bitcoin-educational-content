question: Согласно либеральной теории, какой основной фактор позволил женщинам освободиться от исторически подчиненного положения в примитивных обществах?
answer: Технологический прогресс благодаря инструментам и машинам, которые уравняли производственные возможности мужчин и женщин
wrong_answers:
  - Законодательство и вмешательство государства, которые юридически закрепляли равные права для женщин
  - "Религиозные и моральные реформы, которые изменили культурное отношение к социальной роли женщин"
  - Демократические политические движения, предоставившие женщинам избирательные права и политическое представительство
explanation: |
  Либеральная теория утверждает, что эмансипация женщин произошла благодаря капитализму и техническому прогрессу, в частности разработке инструментов и машин, которые сделали производственный потенциал женщин равным или превосходящим мужской. Этот технологический прогресс сместил общественные ценности с грубой силы (которая в примитивных обществах была в пользу мужчин) на упорство и моральные/интеллектуальные добродетели. Остальные варианты представляют собой государственные или политические решения, которые противоречат либеральному акценту на рыночных, а не государственных изменениях.
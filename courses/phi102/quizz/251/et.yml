question: Milline oli liberaalse teooria kohaselt peamine tegur, mis võimaldas naiste vabanemist nende ajalooliselt allutatud staatusest primitiivsetes ühiskondades?
answer: Tehnoloogiline areng tööriistade ja masinate abil, mis võrdsustas meeste ja naiste tootmisvõimsuse
wrong_answers:
  - Valitsuse seadusandlus ja riigi sekkumine, mis seadustas naiste võrdsed õigused
  - "Religioossed ja moraalireformid, mis muutsid kultuurilisi hoiakuid naiste sotsiaalsete rollide suhtes"
  - Demokraatlikud poliitilised liikumised, mis andsid naistele hääleõiguse ja poliitilise esindatuse
explanation: |
  Liberaalne teooria väidab, et naiste emantsipatsioon toimus tänu kapitalismile ja tehnoloogilisele arengule, täpsemalt tööriistade ja masinate arendamisele, mis muutis naiste tootmisvõimsuse meeste omaga võrdseks või kõrgemaks. See tehnoloogiline areng nihutas ühiskondliku väärtuse toorelt jõult (mis primitiivsetes ühiskondades eelistas mehi) püsivusele ja moraalsetele/intellektuaalsetele voorustele. Teised valikud esindavad riigipoolseid või poliitilisi lahendusi, mis on vastuolus liberaalse rõhuasetusega pigem turupõhistele kui valitsuse korraldatud muutustele.
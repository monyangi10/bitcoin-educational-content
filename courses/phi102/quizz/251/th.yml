question: ตามทฤษฎีเสรีนิยม ปัจจัยหลักที่ทำให้ผู้หญิงได้รับการปลดปล่อยจากสถานะที่ด้อยกว่าทางประวัติศาสตร์ในสังคมดั้งเดิมคืออะไร?
answer: ความก้าวหน้าทางเทคโนโลยีผ่านเครื่องมือและเครื่องจักรที่ทำให้ความสามารถในการผลิตระหว่างผู้ชายและผู้หญิงเท่าเทียมกัน
wrong_answers:
  - กฎหมายของรัฐบาลและการแทรกแซงของรัฐที่บังคับใช้สิทธิเสรีภาพที่เท่าเทียมกันสำหรับผู้หญิง
  - "การปฏิรูปทางศาสนาและศีลธรรมที่เปลี่ยนทัศนคติทางวัฒนธรรมต่อบทบาททางสังคมของผู้หญิง"
  - ขบวนการเคลื่อนไหวทางการเมืองแบบประชาธิปไตยที่ให้สิทธิสตรีในการลงคะแนนเสียงและการเป็นตัวแทนทางการเมือง
explanation: |
  ทฤษฎีเสรีนิยมโต้แย้งว่าการปลดปล่อยสตรีเกิดขึ้นผ่านระบบทุนนิยมและความก้าวหน้าทางเทคโนโลยี โดยเฉพาะการพัฒนาเครื่องมือและเครื่องจักรที่ทำให้ความสามารถในการผลิตของผู้หญิงเทียบเท่าหรือเหนือกว่าผู้ชาย ความก้าวหน้าทางเทคโนโลยีนี้ได้เปลี่ยนคุณค่าของสังคมจากแรงกาย (ซึ่งเป็นที่โปรดปรานของผู้ชายในสังคมดั้งเดิม) ไปสู่ความพากเพียรและคุณธรรมทางศีลธรรม/ปัญญา ตัวเลือกอื่น ๆ แสดงถึงการแก้ปัญหาที่ขับเคลื่อนโดยรัฐหรือการเมือง ซึ่งขัดแย้งกับการเน้นย้ำของเสรีนิยมในเรื่องการเปลี่ยนแปลงที่ขับเคลื่อนโดยตลาดแทนที่จะเป็นการบังคับใช้โดยรัฐบาล
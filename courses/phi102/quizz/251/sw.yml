question: Kulingana na nadharia ya kiliberali, ni jambo gani kuu lililowezesha ukombozi wa wanawake kutoka katika hadhi yao ya chini kihistoria katika jamii za kizamani?
answer: Maendeleo ya kiteknolojia kupitia zana na mashine zilizosawazisha uwezo wa uzalishaji kati ya wanaume na wanawake
wrong_answers:
  - Sheria za serikali na uingiliaji kati wa serikali uliolazimisha kisheria haki sawa kwa wanawake
  - "Mageuzi ya kidini na kimaadili yaliyobadilisha mitazamo ya kitamaduni kuhusu majukumu ya kijamii ya wanawake"
  - Harakati za kisiasa za kidemokrasia zilizowapa wanawake haki za kupiga kura na uwakilishi wa kisiasa
explanation: |
  Nadharia ya kiliberali inasema kwamba ukombozi wa wanawake ulitokea kupitia ubepari na maendeleo ya kiteknolojia, haswa ukuzaji wa zana na mashine zilizofanya uwezo wa uzalishaji wa wanawake kuwa sawa au bora kuliko wa wanaume. Maendeleo haya ya kiteknolojia yalibadilisha thamani ya kijamii kutoka kwa nguvu kali (ambayo iliwapendelea wanaume katika jamii za zamani) hadi uvumilivu na fadhila za maadili/kiakili. Chaguzi zingine zinawakilisha suluhisho zinazoendeshwa na serikali au kisiasa, ambazo zinapingana na msisitizo wa kiliberali juu ya mabadiliko yanayotegemea soko badala ya yaliyoamriwa na serikali.
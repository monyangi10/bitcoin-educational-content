question: Liberal teoriye göre, kadınların ilkel toplumlardaki tarihsel olarak ikincil konumlarından kurtulmalarını sağlayan temel faktör neydi?
answer: Kadın ve erkek arasındaki üretken kapasiteyi eşitleyen alet ve makineler aracılığıyla teknolojik ilerleme
wrong_answers:
  - Kadınlar için eşit hakları yasal olarak zorunlu kılan hükümet mevzuatı ve devlet müdahalesi
  - "Kadınların toplumsal rollerine yönelik kültürel tutumları değiştiren dini ve ahlaki reformlar"
  - Kadınlara oy hakkı ve siyasi temsil hakkı veren demokratik siyasi hareketler
explanation: |
  Liberal teori, kadınların özgürleşmesinin kapitalizm ve teknolojik ilerleme, özellikle de kadınların üretim kapasitesini erkeklerinkine eşit veya üstün kılan alet ve makinelerin geliştirilmesi yoluyla gerçekleştiğini savunur. Bu teknolojik ilerleme, toplumsal değerleri kaba kuvvetten (ilkel toplumlarda erkeklerin lehine olan) azim ve ahlaki/entelektüel erdemlere kaydırmıştır. Diğer seçenekler ise devlet güdümlü ya da siyasi çözümleri temsil etmekte olup, devlet eliyle değişim yerine piyasa temelli değişime yapılan liberal vurguyla çelişmektedir.
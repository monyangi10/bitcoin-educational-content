question: Secondo la teoria liberale, qual è stato il fattore principale che ha permesso l'emancipazione delle donne dal loro status storicamente subordinato nelle società primitive?
answer: Il progresso tecnologico, grazie a strumenti e macchine che hanno equiparato la capacità produttiva di uomini e donne, ha portato a un aumento della produttività
wrong_answers:
  - La legislazione governativa e l'intervento dello Stato che ha imposto per legge la parità di diritti per le donne
  - "Riforme religiose e morali che hanno cambiato l'atteggiamento culturale nei confronti del ruolo sociale della donna"
  - Movimenti politici democratici che hanno dato alle donne il diritto di voto e la rappresentanza politica
explanation: |
  La teoria liberale sostiene che l'emancipazione delle donne è avvenuta grazie al capitalismo e al progresso tecnologico, in particolare allo sviluppo di strumenti e macchine che hanno reso la capacità produttiva delle donne pari o superiore a quella degli uomini. Questo progresso tecnologico ha spostato il valore della società dalla forza bruta (che nelle società primitive favoriva gli uomini) alla perseveranza e alle virtù morali e intellettuali. Le altre opzioni rappresentano soluzioni politiche o guidate dallo Stato, che contraddicono l'enfasi liberale sul cambiamento basato sul mercato piuttosto che su quello imposto dal governo.
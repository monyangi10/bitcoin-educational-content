question: Was war nach der liberalen Theorie der wichtigste Faktor, der die Emanzipation der Frauen aus ihrer historisch untergeordneten Stellung in primitiven Gesellschaften ermöglichte?
answer: Technologischer Fortschritt durch Werkzeuge und Maschinen, die die Produktionskapazität von Männern und Frauen angleichen
wrong_answers:
  - Regierungsgesetze und staatliche Eingriffe, die die Gleichberechtigung von Frauen gesetzlich festschreiben
  - "Religiöse und moralische Reformen, die die kulturelle Einstellung zur sozialen Rolle der Frau veränderten"
  - Demokratische politische Bewegungen, die Frauen das Wahlrecht und die politische Vertretung gaben
explanation: |
  In der liberalen Theorie wird argumentiert, dass die Emanzipation der Frauen durch den Kapitalismus und den technischen Fortschritt, insbesondere die Entwicklung von Werkzeugen und Maschinen, die die Produktionskapazität der Frauen der der Männer gleichstellte oder übertraf, erreicht wurde. Durch diesen technologischen Fortschritt verlagerte sich der gesellschaftliche Wert von roher Gewalt (die in primitiven Gesellschaften die Männer begünstigte) auf Ausdauer und moralische/intellektuelle Tugenden. Bei den anderen Optionen handelt es sich um staatlich gesteuerte oder politische Lösungen, die im Widerspruch zu der liberalen Betonung des marktbasierten und nicht des staatlich verordneten Wandels stehen.
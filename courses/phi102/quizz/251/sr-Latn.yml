question: Prema liberalnoj teoriji, koji je bio primarni faktor koji je omogućio emancipaciju žena iz njihovog istorijski podređenog statusa u primitivnim društvima?
answer: Tehnološki napredak kroz alate i mašine koji su izjednačili proizvodni kapacitet između muškaraca i žena
wrong_answers:
  - Vladina zakonodavstva i državna intervencija koja su zakonski nalagala jednaka prava za žene
  - "Religijske i moralne reforme koje su promenile kulturne stavove prema društvenim ulogama žena"
  - Demokratski politički pokreti koji su ženama dali pravo glasa i političku reprezentaciju
explanation: |
  Liberalna teorija tvrdi da je emancipacija žena nastala kroz kapitalizam i tehnološki napredak, posebno razvoj alata i mašina koji su učinili da ženski proizvodni kapacitet bude jednak ili superiorniji od muškog. Ovaj tehnološki napredak pomerio je društvenu vrednost sa fizičke snage (koja je favorizovala muškarce u primitivnim društvima) na istrajnost i moralne/intelektualne vrline. Druge opcije predstavljaju rešenja vođena državom ili politikom, što je u suprotnosti sa liberalnim naglaskom na promenama zasnovanim na tržištu, a ne na promenama koje nameće vlada.
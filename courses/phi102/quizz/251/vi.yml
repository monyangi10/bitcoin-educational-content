question: Theo lý thuyết tự do, yếu tố chính nào đã giúp phụ nữ thoát khỏi vị thế lệ thuộc trong lịch sử xã hội nguyên thủy?
answer: Sự tiến bộ về công nghệ thông qua các công cụ và máy móc đã giúp cân bằng năng lực sản xuất giữa nam giới và phụ nữ.
wrong_answers:
  - Luật pháp và sự can thiệp của chính phủ đã quy định quyền bình đẳng cho phụ nữ.
  - "Những cải cách tôn giáo và đạo đức đã làm thay đổi thái độ văn hóa đối với vai trò xã hội của phụ nữ."
  - Các phong trào chính trị dân chủ đã trao quyền bầu cử và đại diện chính trị cho phụ nữ.
explanation: |
  Lý thuyết tự do cho rằng sự giải phóng phụ nữ diễn ra thông qua chủ nghĩa tư bản và tiến bộ công nghệ, cụ thể là sự phát triển của các công cụ và máy móc giúp năng lực sản xuất của phụ nữ ngang bằng hoặc vượt trội so với nam giới. Sự tiến bộ công nghệ này đã chuyển đổi giá trị xã hội từ sức mạnh thô bạo (vốn ưu tiên nam giới trong các xã hội nguyên thủy) sang sự kiên trì và các đức tính đạo đức/trí tuệ. Các lựa chọn khác đại diện cho các giải pháp do nhà nước hoặc chính trị thúc đẩy, trái ngược với sự nhấn mạnh của lý thuyết tự do vào sự thay đổi dựa trên thị trường hơn là sự thay đổi do chính phủ ban hành.
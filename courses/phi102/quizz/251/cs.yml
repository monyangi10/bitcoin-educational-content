question: Co bylo podle liberální teorie hlavním faktorem, který umožnil emancipaci žen z jejich historicky podřízeného postavení v primitivních společnostech?
answer: Technologický pokrok díky nástrojům a strojům, které vyrovnaly výrobní kapacitu mužů a žen
wrong_answers:
  - Vládní legislativa a státní zásahy, které právně nařídily rovná práva žen
  - "Náboženské a morální reformy, které změnily kulturní postoje ke společenské roli žen."
  - Demokratická politická hnutí, která dala ženám volební právo a politické zastoupení
explanation: |
  Liberální teorie tvrdí, že k emancipaci žen došlo díky kapitalismu a technologickému pokroku, konkrétně díky vývoji nástrojů a strojů, díky nimž se výrobní schopnosti žen vyrovnaly nebo převýšily výrobní schopnosti mužů. Tento technologický pokrok posunul společenské hodnoty od hrubé síly (která v primitivních společnostech zvýhodňovala muže) k vytrvalosti a morálním/intelektuálním ctnostem. Ostatní možnosti představují státem řízená nebo politická řešení, která jsou v rozporu s liberálním důrazem na změny založené na trhu, nikoli na vládním příkazu.
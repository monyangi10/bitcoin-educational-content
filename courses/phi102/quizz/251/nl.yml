question: Wat was volgens de liberale theorie de belangrijkste factor die de emancipatie van vrouwen uit hun historisch ondergeschikte status in primitieve samenlevingen mogelijk maakte?
answer: Technologische vooruitgang door gereedschappen en machines die de productiecapaciteit van mannen en vrouwen gelijktrok
wrong_answers:
  - Overheidswetgeving en staatsinterventie die gelijke rechten voor vrouwen wettelijk verplicht stelde
  - "Religieuze en morele hervormingen die de culturele houding ten opzichte van de sociale rol van vrouwen veranderden"
  - Democratische politieke bewegingen die vrouwen stemrecht en politieke vertegenwoordiging gaven
explanation: |
  De liberale theorie stelt dat de emancipatie van de vrouw plaatsvond door het kapitalisme en technologische vooruitgang, in het bijzonder de ontwikkeling van gereedschappen en machines die de productiecapaciteit van vrouwen gelijk of superieur maakten aan die van mannen. Deze technologische vooruitgang verschoof de maatschappelijke waarde van brute kracht (die mannen in primitieve samenlevingen bevoordeelde) naar doorzettingsvermogen en morele/intellectuele deugden. De andere opties vertegenwoordigen door de staat gestuurde of politieke oplossingen, die in tegenspraak zijn met de liberale nadruk op marktgebaseerde in plaats van door de overheid opgelegde veranderingen.
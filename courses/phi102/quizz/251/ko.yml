question: 자유주의 이론에 따르면, 원시 사회에서 여성이 역사적으로 종속적인 지위에서 해방될 수 있었던 주요 요인은 무엇이었나요?
answer: 도구와 기계를 통한 기술 발전으로 남성과 여성의 생산 능력이 동등해졌습니다
wrong_answers:
  - 여성의 평등권을 법적으로 의무화한 정부 입법 및 국가 개입
  - "여성의 사회적 역할에 대한 문화적 태도를 바꾼 종교적, 도덕적 개혁"
  - 여성에게 투표권과 정치적 대표성을 부여한 민주적 정치 운동
explanation: |
  자유주의 이론은 자본주의와 기술 발전, 특히 여성의 생산 능력을 남성과 동등하거나 우월하게 만든 도구와 기계의 발달을 통해 여성 해방이 이루어졌다고 주장합니다. 이러한 기술 발전은 사회적 가치를 원시 사회에서 남성에게 유리했던 무력에서 인내와 도덕적/지적 미덕으로 전환시켰습니다. 다른 옵션은 국가 주도 또는 정치적 해결책으로, 정부가 주도하는 변화보다는 시장 기반에 중점을 두는 자유주의와 모순됩니다.
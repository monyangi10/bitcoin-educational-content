question: Hva var ifølge liberal teori den viktigste faktoren som gjorde det mulig for kvinner å frigjøre seg fra sin historisk sett underordnede status i primitive samfunn?
answer: Teknologiske fremskritt gjennom verktøy og maskiner som utjevnet produksjonskapasiteten mellom menn og kvinner
wrong_answers:
  - Lovgivning og statlig inngripen som lovfestet like rettigheter for kvinner
  - "Religiøse og moralske reformer som endret den kulturelle holdningen til kvinners sosiale roller"
  - Demokratiske politiske bevegelser som ga kvinner stemmerett og politisk representasjon
explanation: |
  Liberal teori hevder at kvinners frigjøring skjedde gjennom kapitalismen og teknologiske fremskritt, nærmere bestemt utviklingen av verktøy og maskiner som gjorde kvinners produksjonskapasitet lik eller bedre enn menns. Denne teknologiske utviklingen førte til at samfunnets verdier ble forskjøvet fra rå makt (som favoriserte menn i primitive samfunn) til utholdenhet og moralske/intellektuelle dyder. De andre alternativene representerer statsdrevne eller politiske løsninger, noe som står i motsetning til den liberale vektleggingen av markedsbaserte snarere enn statlig pålagte endringer.
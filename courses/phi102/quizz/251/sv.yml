question: Vilken var enligt liberal teori den främsta faktorn som möjliggjorde kvinnors frigörelse från sin historiskt sett underordnade ställning i primitiva samhällen?
answer: Teknologiska framsteg genom verktyg och maskiner som utjämnade produktionskapaciteten mellan män och kvinnor
wrong_answers:
  - Regeringens lagstiftning och statliga ingripanden som lagstadgade lika rättigheter för kvinnor
  - "Religiösa och moraliska reformer som förändrade kulturella attityder till kvinnors sociala roller"
  - Demokratiska politiska rörelser som gav kvinnor rösträtt och politisk representation
explanation: |
  Liberal teori hävdar att kvinnans frigörelse skedde genom kapitalismen och den tekniska utvecklingen, särskilt utvecklingen av verktyg och maskiner som gjorde kvinnans produktiva kapacitet lika stor eller större än mannens. Denna tekniska utveckling flyttade samhällets värderingar från råstyrka (som gynnade män i primitiva samhällen) till uthållighet och moraliska/intellektuella dygder. De andra alternativen representerar statligt drivna eller politiska lösningar, som strider mot den liberala betoningen på marknadsbaserad snarare än statligt påbjuden förändring.
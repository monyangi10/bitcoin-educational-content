question: بر اساس نظریه لیبرال، عامل اصلی که موجب رهایی زنان از وضعیت تاریخی تابعیت آنها در جوامع ابتدایی شد، چه بود؟
answer: پیشرفت تکنولوژیکی از طریق ابزارها و ماشین‌آلاتی که ظرفیت تولیدی بین مردان و زنان را برابر کرد
wrong_answers:
  - قانون‌گذاری دولت و مداخله دولتی که به‌طور قانونی حقوق برابر برای زنان را الزام‌آور کرد
  - "اصلاحات دینی و اخلاقی که نگرش‌های فرهنگی نسبت به نقش‌های اجتماعی زنان را تغییر داد"
  - جنبش‌های سیاسی دموکراتیک که به زنان حق رأی و نمایندگی سیاسی دادند
explanation: |
  نظریه لیبرال استدلال می‌کند که رهایی زنان از طریق سرمایه‌داری و پیشرفت تکنولوژیکی رخ داده است، به‌ویژه توسعه ابزارها و ماشین‌هایی که ظرفیت تولیدی زنان را برابر یا برتر از مردان کرده است. این پیشرفت تکنولوژیکی ارزش اجتماعی را از نیروی بدنی (که در جوامع ابتدایی به نفع مردان بود) به پشتکار و فضایل اخلاقی/فکری تغییر داد. گزینه‌های دیگر نمایانگر راه‌حل‌های دولتی یا سیاسی هستند که با تأکید لیبرال بر تغییر مبتنی بر بازار به‌جای تغییرات تحمیلی دولتی در تضاد است.
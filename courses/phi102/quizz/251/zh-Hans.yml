question: 根据自由主义理论，使妇女摆脱原始社会历史上的从属地位的主要因素是什么？
answer: 通过工具和机器实现技术进步，使男女之间的生产能力平等
wrong_answers:
  - 政府立法和国家干预，从法律上规定妇女享有平等权利
  - "宗教和道德改革改变了人们对妇女社会角色的文化态度"
  - 赋予妇女选举权和政治代表权的民主政治运动
explanation: |
  自由主义理论认为，妇女解放是通过资本主义和技术进步实现的，特别是工具和机器的发展使妇女的生产能力与男子相当或优于男子。这种技术进步将社会价值从蛮力（在原始社会有利于男性）转向毅力和道德/智力美德。其他选项代表了国家驱动或政治解决方案，这与自由主义强调以市场为基础而非由政府强制推行变革的理念相悖。
question: Според либералната теория кой е бил основният фактор, който е позволил на жените да се еманципират от исторически подчиненото си положение в примитивните общества?
answer: Технологичен напредък чрез инструменти и машини, които изравняват производствения капацитет на мъжете и жените
wrong_answers:
  - Правителствено законодателство и намеса на държавата, които законово налагат равни права на жените
  - "Религиозни и морални реформи, които променят културните нагласи към социалните роли на жените"
  - Демократични политически движения, които дават на жените право на глас и политическо представителство
explanation: |
  Либералната теория твърди, че еманципацията на жените е настъпила благодарение на капитализма и технологичния прогрес, по-специално на разработването на инструменти и машини, които са направили производствените възможности на жените равни или по-добри от тези на мъжете. Този технологичен напредък е изместил обществената ценност от грубата сила (която е била в полза на мъжете в примитивните общества) към упоритостта и моралните/интелектуалните добродетели. Другите варианти представляват държавни или политически решения, които са в противоречие с либералния акцент върху пазарната, а не върху държавно разпоредената промяна.
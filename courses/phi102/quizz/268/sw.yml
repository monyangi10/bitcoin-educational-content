question: Maandishi yanabainisha udhaifu gani mkuu unaoruhusu mifumo isiyo ya uhuru kudumisha uungwaji mkono wa umma licha ya kushindwa mara kwa mara?
answer: Wanategemea nadharia za kipuuzi zinazounda uwakilishi wa uwongo wa ukweli ili kuhifadhi imani ya umma
wrong_answers:
  - Zinaonyesha matokeo bora ya kiuchumi kupitia mipango ya pamoja na umiliki wa pamoja
  - Hutoa usalama na utulivu zaidi kwa kuondoa kutokuwa na uhakika wa ushindani wa soko
  - Wanatoa usambazaji sawa zaidi wa rasilimali kupitia michakato ya kufanya maamuzi ya kidemokrasia
explanation: |
  Maandishi yanasema waziwazi kwamba mifumo isiyo ya uhuru hujiendeleza kupitia 'aina zenye makosa ya kinadharia ambazo zinaweza kuhesabiwa kama dhana potofu' ambazo huunda 'uwakilishi wa uwongo wa ukweli' unaoruhusu umma kudumisha imani katika mifumo iliyoshindwa. Majibu yasiyo sahihi yanawakilisha uhalali wa kawaida wa mifumo ya uingiliaji kati lakini yanapingana na uchambuzi wa sura kwamba mifumo hii huvunja mifumo ya msingi ya kibinadamu na kuchukua nafasi ya mafunzo badala ya chaguo la kibinafsi, hatimaye hushindwa inapochunguzwa kwa uzito.
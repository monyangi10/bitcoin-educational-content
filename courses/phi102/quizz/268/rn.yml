question: Ni igiki ico canditswe kigaragaza nk’intege nke nyamukuru ituma uburyo butagira umwidegemvyo buguma bushigikirwa na bose naho buguma bunanirwa?
answer: Bishingiye ku vyiyumviro vy’ubupfumu bituma habaho ibimenyetso vy’ukuri bitari vyo kugira ngo abantu bose bazigame .
wrong_answers:
  - Bagaragaza ingaruka nziza cane z'ubutunzi biciye mu gutegura ibintu bimwe bimwe no mu kuba umutunzi rusangi .
  - Bitanga umutekano mwinshi n’ugushikama mu gukuraho ukudakeka kw’uguhiganwa kw’isoko .
  - Bitanga ugusangira ubutunzi mu buryo bubereye biciye mu nzira zo gufata ingingo mu buryo bwa demokarasi .
explanation: |
  Ico canditswe kivuga neza ko uburyo butagira umwidegemvyo bwigumya biciye mu ‘mice y’amakosa mu vyiyumviro ishobora gufatwa nk’ubuhinga bwa sophisme’ burema ‘ibimenyetso vy’ukuri vy’ibinyoma’ bituma abantu bose bagumana icizigiro mu buryo butashoboye. Inyishu zitari zo zigereranya imvo rusangi z’uburyo bwo gufasha abantu ariko zivuguruza isesengura ry’ikigabane ry’uko ubwo buryo buca uburyo bw’ishimikiro bw’abantu kandi bugasubirira uburezi mu guhitamwo kw’umuntu ku giti ciwe, amaherezo bukananirwa iyo busuzumwe bimwe bikomeye.
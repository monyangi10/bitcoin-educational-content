question: Văn bản này chỉ ra điểm yếu chính nào cho phép các hệ thống phi tự do duy trì được sự ủng hộ của công chúng bất chấp những thất bại liên tiếp của chúng?
answer: Họ dựa vào những ngụy biện lý thuyết tạo ra những hình ảnh sai lệch về thực tế để duy trì lòng tin của công chúng.
wrong_answers:
  - Họ thể hiện hiệu quả kinh tế vượt trội thông qua kế hoạch hóa tập trung và sở hữu tập thể.
  - Chúng mang lại sự an toàn và ổn định cao hơn bằng cách loại bỏ những bất ổn của cạnh tranh thị trường.
  - Chúng mang lại sự phân bổ nguồn lực công bằng hơn thông qua các quy trình ra quyết định dân chủ.
explanation: |
  Văn bản nêu rõ rằng các hệ thống phi tự do duy trì sự tồn tại của chúng thông qua "các hình thức sai lầm về mặt lý thuyết, có thể được coi là ngụy biện", tạo ra "những hình ảnh sai lệch về thực tế", cho phép công chúng duy trì niềm tin vào các hệ thống thất bại. Những câu trả lời sai này đại diện cho những lý lẽ biện minh phổ biến cho các hệ thống can thiệp, nhưng lại mâu thuẫn với phân tích của chương này rằng các hệ thống đó phá vỡ các cơ chế cơ bản của con người và thay thế sự hướng dẫn bằng sự lựa chọn cá nhân, cuối cùng dẫn đến thất bại khi được xem xét một cách nghiêm túc.
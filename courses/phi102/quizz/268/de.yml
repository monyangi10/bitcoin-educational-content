question: Was wird in dem Text als die Hauptschwäche genannt, die es nicht freiheitlichen Systemen ermöglicht, trotz ihres wiederholten Scheiterns öffentliche Unterstützung zu erhalten?
answer: Sie stützen sich auf theoretische Spitzfindigkeiten, die ein falsches Bild der Realität vermitteln, um das Vertrauen der Öffentlichkeit zu erhalten
wrong_answers:
  - Sie zeigen überlegene wirtschaftliche Ergebnisse durch zentrale Planung und kollektives Eigentum
  - Sie bieten mehr Sicherheit und Stabilität, da sie die Unwägbarkeiten des Marktwettbewerbs ausschalten
  - Sie bieten eine gerechtere Verteilung der Ressourcen durch demokratische Entscheidungsprozesse
explanation: |
  Der Text stellt ausdrücklich fest, dass sich nicht freiheitliche Systeme durch "theoretisch fehlerhafte Formen, die als Sophismen bezeichnet werden können", selbst erhalten, die "falsche Darstellungen der Realität" schaffen, die es der Öffentlichkeit ermöglichen, das Vertrauen in gescheiterte Systeme aufrechtzuerhalten. Die falschen Antworten stellen gängige Rechtfertigungen für interventionistische Systeme dar, widersprechen aber der Analyse des Kapitels, dass diese Systeme grundlegende menschliche Mechanismen unterbrechen und Vormundschaft an die Stelle persönlicher Entscheidungen setzen, was letztlich zum Scheitern führt, wenn es ernsthaft untersucht wird.
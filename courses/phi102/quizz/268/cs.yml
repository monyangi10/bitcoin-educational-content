question: Co je v textu označeno za hlavní slabinu, která umožňuje neliberálním systémům udržet si podporu veřejnosti navzdory jejich opakovaným selháním?
answer: Spoléhají se na teoretické sofismy, které vytvářejí falešné představy o realitě, aby si zachovaly důvěru veřejnosti
wrong_answers:
  - Prokazují vynikající ekonomické výsledky díky centralizovanému plánování a kolektivnímu vlastnictví
  - Poskytují větší jistotu a stabilitu tím, že eliminují nejistotu tržní konkurence
  - Nabízejí spravedlivější rozdělování zdrojů prostřednictvím demokratických rozhodovacích procesů
explanation: |
  V textu se výslovně uvádí, že systémy, které nejsou svobodné, se udržují prostřednictvím "teoreticky chybných forem, které lze kvalifikovat jako sofismy", jež vytvářejí "falešné reprezentace reality", které umožňují veřejnosti udržovat si důvěru v neúspěšné systémy. Chybné odpovědi představují běžná ospravedlnění intervencionistických systémů, ale jsou v rozporu s analýzou kapitoly, podle níž tyto systémy porušují základní lidské mechanismy a nahrazují osobní volbu tutorstvím, což v konečném důsledku při seriózním zkoumání selhává.
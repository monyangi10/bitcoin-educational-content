question: Was ist nach Bastiats Analyse das logische Problem an Proudhons Aussage "Eigentum ist Diebstahl"?
answer: Wenn Eigentum Diebstahl ist, dann wird Diebstahl zu Eigentum, was einen logischen Widerspruch darstellt
wrong_answers:
  - Eigentum kann nicht ohne staatliche Regulierung und rechtliche Rahmenbedingungen existieren
  - Diebstahl ist moralisch falsch, während Eigentum unter allen Umständen moralisch richtig ist
  - Eigentum setzt physischen Besitz voraus, während Diebstahl einen vorübergehenden Erwerb bedeutet
explanation: |
  Bastiat demonstrierte den inneren logischen Widerspruch in Proudhons berühmtem Satz, indem er zeigte, dass, wenn wir akzeptieren, dass Eigentum gleich Diebstahl ist, Diebstahl logischerweise gleich Eigentum sein muss. Dies führt zu einem unmöglichen Zirkelschluss, bei dem etwas Legitimes gleichzeitig illegitim ist. Bastiat argumentierte stattdessen, dass sich das Eigentum natürlich aus der Arbeit, dem Selbsteigentum und den menschlichen Fähigkeiten ableitet, was es zu einem grundlegenden und logischen Konzept und nicht zu einer Form des Diebstahls macht.
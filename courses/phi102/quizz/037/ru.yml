question: Согласно анализу Бастиана, в чем логическая проблема утверждения Прудона "собственность - это кража"?
answer: Если собственность - это кража, то кража становится собственностью, что создает логическое противоречие
wrong_answers:
  - Собственность не может существовать без государственного регулирования и правовых рамок
  - Кража - это моральный проступок, а собственность - моральное право при любых обстоятельствах
  - Собственность требует физического обладания, в то время как кража предполагает временное приобретение
explanation: |
  Бастиат продемонстрировал внутреннее логическое противоречие в знаменитой фразе Прудона, показав, что если мы признаем, что собственность равна краже, то по логике вещей кража должна быть равна собственности. Это создает невозможное круговое рассуждение, в котором нечто законное одновременно является незаконным. Вместо этого Бастиат утверждал, что собственность естественным образом вытекает из труда, самообладания и человеческих способностей, что делает ее фундаментальной и логичной концепцией, а не формой кражи.
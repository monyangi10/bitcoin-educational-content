question: Quel exemple historique montre comment l'absence d'une presse accessible a empêché une opinion publique informée de soutenir les réformes nécessaires ?
answer: L'échec des réformes de Turgot en France, malgré l'influence des Lumières, en raison de l'absence de journaux accessibles
wrong_answers:
  - "La suppression des écrits scientifiques de Galilée par l'Église catholique à la Renaissance"
  - La censure des pamphlets politiques pendant la guerre civile anglaise sous le roi Charles Iᵉʳ
  - L'interdiction des presses à imprimer dans l'Empire ottoman jusqu'au 18ᵉ siècle
explanation: |
  Le chapitre mentionne notamment que malgré l'influence des Lumières en France, l'absence de journaux accessibles au peuple a empêché la formation d'une opinion publique informée capable de soutenir les réformes de Turgot. Cette absence de liberté de la presse a eu pour conséquence que les transformations nécessaires n'ont pu être accomplies que par le biais d'une révolution plutôt que par des réformes pacifiques. Les autres options, bien qu'elles soient des exemples historiquement exacts de restrictions de la presse, ne sont pas mentionnées dans ce chapitre et n'illustrent pas la relation spécifique entre la liberté de la presse et les réformes démocratiques que le texte met en avant.

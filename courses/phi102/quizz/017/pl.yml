question: Jaki historyczny przykład pokazuje, jak brak dostępnej prasy uniemożliwił świadomej opinii publicznej wsparcie niezbędnych reform?
answer: Niepowodzenie reform Turgota we Francji pomimo wpływu Oświecenia z powodu braku dostępnych gazet
wrong_answers:
  - "Tłumienie pism naukowych Galileusza przez Kościół katolicki w okresie renesansu"
  - Cenzura pamfletów politycznych podczas angielskiej wojny domowej pod rządami króla Karola I
  - Zakaz prasy drukarskiej w Imperium Osmańskim do XVIII wieku
explanation: |
  Rozdział ten w szczególności wspomina, że pomimo wpływu Oświecenia we Francji, brak gazet dostępnych dla ludzi uniemożliwił ukształtowanie się świadomej opinii publicznej zdolnej do poparcia reform Turgota. Ten brak wolności prasy oznaczał, że niezbędne transformacje można było przeprowadzić jedynie w drodze rewolucji, a nie pokojowych reform. Inne opcje, choć historycznie dokładne przykłady ograniczeń prasy, nie zostały wspomniane w tym rozdziale i nie ilustrują szczególnego związku między wolnością prasy a reformami demokratycznymi, które podkreśla tekst.
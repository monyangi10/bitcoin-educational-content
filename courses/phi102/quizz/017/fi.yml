question: Mikä historiallinen esimerkki osoittaa, miten helppokäyttöisen lehdistön puuttuminen esti valistunutta julkista mielipidettä tukemasta tarvittavia uudistuksia?
answer: Turgot'n uudistusten epäonnistuminen Ranskassa valistuksen vaikutuksesta huolimatta, koska sanomalehtiä ei ollut saatavilla
wrong_answers:
  - "Galileon tieteellisten kirjoitusten tukahduttaminen katolisen kirkon toimesta renessanssin aikana"
  - Poliittisten pamflettien sensuuri Englannin sisällissodan aikana kuningas Kaarle I:n aikana
  - Kirjapainojen kieltäminen ottomaanien valtakunnassa 1700-luvulle asti
explanation: |
  Luvussa mainitaan erityisesti, että valistuksen vaikutuksesta huolimatta Ranskassa kansan saatavilla olevien sanomalehtien puuttuminen esti sellaisen tietoon perustuvan yleisen mielipiteen muodostumisen, joka olisi voinut tukea Turgot'n uudistuksia. Lehdistönvapauden puute merkitsi sitä, että tarvittavat muutokset voitiin toteuttaa vain vallankumouksen eikä rauhanomaisten uudistusten avulla. Vaikka muut vaihtoehdot ovatkin historiallisesti tarkkoja esimerkkejä lehdistön rajoituksista, niitä ei mainita tässä luvussa, eivätkä ne havainnollista sitä erityistä lehdistönvapauden ja demokraattisten uudistusten välistä suhdetta, jota tekstissä korostetaan.
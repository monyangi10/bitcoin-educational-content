question: 哪個歷史範例可以說明，缺乏便利的新聞媒體如何妨礙知情的大眾輿論支持必要的改革？
answer: 儘管受到啟蒙運動的影響，杜爾哥（Turgot）的改革仍在法國失敗，原因是缺乏可閱的報紙
wrong_answers:
  - 「文藝復興時期天主教會對伽利略科學著作的壓制」
  - 英王查理一世統治下的英國內戰期間對政治小冊子的審查
  - 直到 18 世紀，鄂圖曼帝國都禁止印刷機的使用
explanation: |
  本章特別提到，儘管啟蒙運動在法國發揮了影響力，但由於人民無法獲得報紙，因此無法形成能夠支持杜爾哥改革的知情民意。缺乏新聞自由意味著必要的轉變只能透過革命來完成，而非和平的改革。其他選項雖然在歷史上是新聞限制的準確例子，但本章並未提及，也無法說明文中所強調的新聞自由與民主改革之間的特定關係。
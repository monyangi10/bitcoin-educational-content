question: 접근 가능한 언론의 부재가 어떻게 정보에 입각한 여론이 필요한 개혁을 지지하지 못하게 했는지를 보여주는 역사적 사례는 무엇인가요?
answer: 계몽주의의 영향에도 불구하고 프랑스에서 투르고의 개혁이 실패한 이유는 접근 가능한 신문의 부족 때문이었습니다
wrong_answers:
  - "르네상스 시대 가톨릭 교회에 의한 갈릴레오의 과학 저술 탄압"
  - 찰스 1세 영국 내전 당시의 정치 팸플릿 검열
  - 18세기까지 오스만 제국의 인쇄기 금지령
explanation: |
  이 장에서는 프랑스에서 계몽주의의 영향에도 불구하고 대중이 접할 수 있는 신문이 없었기 때문에 투르고의 개혁을 지지할 수 있는 정보에 입각한 여론이 형성되지 못했다고 구체적으로 언급하고 있습니다. 언론 자유의 부재는 필요한 변화를 평화적 개혁이 아닌 혁명을 통해서만 달성할 수 있다는 것을 의미했습니다. 다른 옵션은 역사적으로 정확한 언론 제한의 예이기는 하지만 이 장에서는 언급되지 않았으며 본문에서 강조하는 언론 자유와 민주적 개혁 사이의 구체적인 관계를 설명하지 않습니다.
question: कौन सा ऐतिहासिक उदाहरण यह दर्शाता है कि सुलभ प्रेस की अनुपस्थिति ने किस प्रकार सूचित जनमत को आवश्यक सुधारों का समर्थन करने से रोका?
answer: प्रबोधन काल के प्रभाव के बावजूद, सुलभ समाचार पत्रों की कमी के कारण फ्रांस में तुर्गोट के सुधार विफल रहे।
wrong_answers:
  - पुनर्जागरण काल ​​के दौरान कैथोलिक चर्च द्वारा गैलीलियो के वैज्ञानिक लेखन का दमन।
  - इंग्लैंड के गृहयुद्ध के दौरान राजा चार्ल्स प्रथम के शासनकाल में राजनीतिक पर्चों पर प्रतिबंध
  - 18वीं शताब्दी तक ओटोमन साम्राज्य में प्रिंटिंग प्रेस पर प्रतिबंध था।
explanation: |
  इस अध्याय में विशेष रूप से उल्लेख किया गया है कि फ्रांस में प्रबोधन काल के प्रभाव के बावजूद, आम जनता तक समाचार पत्रों की पहुँच न होने के कारण एक ऐसा जनमत नहीं बन पाया जो तुर्गोट के सुधारों का समर्थन कर सके। प्रेस की स्वतंत्रता के इस अभाव का अर्थ यह था कि आवश्यक परिवर्तन शांतिपूर्ण सुधार के बजाय क्रांति के माध्यम से ही संभव हो सके। प्रेस पर प्रतिबंधों के अन्य विकल्प, यद्यपि ऐतिहासिक रूप से सटीक उदाहरण हैं, इस अध्याय में उल्लेखित नहीं हैं और प्रेस की स्वतंत्रता तथा लोकतांत्रिक सुधार के बीच उस विशिष्ट संबंध को स्पष्ट नहीं करते जिस पर पाठ में ज़ोर दिया गया है।
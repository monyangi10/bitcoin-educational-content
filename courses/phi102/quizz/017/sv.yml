question: Vilket historiskt exempel visar hur avsaknaden av en tillgänglig press hindrade en informerad allmän opinion från att stödja nödvändiga reformer?
answer: Turgots reformer misslyckas i Frankrike trots upplysningens inflytande på grund av bristen på tillgängliga tidningar
wrong_answers:
  - "Den katolska kyrkans förtryck av Galileos vetenskapliga skrifter under renässansen"
  - Censuren av politiska pamfletter under det engelska inbördeskriget under kung Karl I
  - Förbudet mot tryckpressar i det ottomanska riket fram till 1700-talet
explanation: |
  I kapitlet nämns särskilt att trots upplysningens inflytande i Frankrike hindrade avsaknaden av tidningar som var tillgängliga för folket bildandet av en informerad allmän opinion som kunde stödja Turgots reformer. Bristen på pressfrihet innebar att nödvändiga förändringar endast kunde åstadkommas genom revolution snarare än genom fredliga reformer. De andra alternativen är visserligen historiskt korrekta exempel på pressbegränsningar, men de nämns inte i detta kapitel och illustrerar inte det specifika samband mellan pressfrihet och demokratiska reformer som texten betonar.
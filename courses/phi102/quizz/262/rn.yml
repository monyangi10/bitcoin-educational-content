question: Dushingiye ku nseguro y’ico canditswe ku bijanye n’iterambere ry’amateka, ni ihinduka irihe ry’ishimikiro riranga uguhinduka kuva mu mibano ya kera gushika mu mibano y’ubu yidegemvya?
answer: Gusubirizwa buhoro buhoro uburyo bushingiye ku bubasha n'imigenderanire ishingiye ku masezerano
wrong_answers:
  - Uguhinduka buhoro buhoro kuva ku burenganzira bw'umutungo w'umuntu ku giti ciwe gushika ku burenganzira bw'umutungo rusangi
  - Ugutera imbere kuva ku butegetsi bw'imiryango bushizwe ahantu hamwe gushika ku butegetsi bwa Leta bushizwe ahantu hamwe
  - Guhinduka kuva ku buryo bwo guhanahana amakuru mu mahoro gushika ku buryo bwo guhanahana amakuru bushingiye ku bugizi bwa nabi
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko amateka yerekana ‘impengamiro idasanzwe yo gusubirira ubukuru n’amasezerano,’ ivyo bikaba bituma dutahura yuko mu vy’ukuri inyishu z’abanyagihugu n’iz’abanyagihugu zisubira inyuma. Iryo hinduka rigereranya uguhinduka kw’ishimikiro kuva ku mice y’uguhatira gushika ku ntunganyo z’ubushake. Inyishu zitari zo zihindura iyo nzira y’iterambere ry’amateka canke zigatanga nabi inzira y’iterambere idondora mu kigabane.
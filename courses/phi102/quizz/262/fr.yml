question: D'après l'analyse du développement historique présentée dans le texte, quelle transformation fondamentale caractérise l'évolution des sociétés anciennes vers les sociétés libres modernes ?
answer: Le remplacement progressif des systèmes fondés sur l'autorité par des relations fondées sur le contrat
wrong_answers:
  - Le passage progressif des droits de propriété individuels à la propriété collective des ressources
  - L'évolution d'une gouvernance tribale décentralisée vers un contrôle étatique centralisé
  - Le passage de mécanismes d'échange pacifiques à des systèmes compétitifs fondés sur la violence
explanation: |
  Le texte indique explicitement que l'histoire démontre "une tendance remarquable au remplacement de l'autorité par le contrat", ce qui nous permet de comprendre que les solutions socialistes et interventionnistes sont en réalité rétrogrades. Cette transformation représente l'évolution fondamentale des systèmes coercitifs vers des accords volontaires. Les mauvaises réponses inversent cette progression historique ou caractérisent mal la direction du développement décrite dans le chapitre.
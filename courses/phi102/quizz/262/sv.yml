question: Enligt textens analys av den historiska utvecklingen, vilken grundläggande omvandling kännetecknar utvecklingen från antika samhällen till moderna fria samhällen?
answer: Successivt ersättande av auktoritetsbaserade system med avtalsbaserade relationer
wrong_answers:
  - Den gradvisa övergången från individuell äganderätt till kollektivt ägande av resurser
  - Utvecklingen från decentraliserad stamstyrning till centraliserad statlig kontroll
  - Övergången från fredliga utbytesmekanismer till våldsbaserade konkurrenssystem
explanation: |
  I texten sägs uttryckligen att historien visar "en anmärkningsvärd tendens mot att ersätta auktoritet med kontrakt", vilket gör att vi kan förstå att socialistiska och interventionistiska lösningar faktiskt är bakåtblickande. Denna omvandling representerar kärnan i utvecklingen från tvångssystem till frivilliga arrangemang. De felaktiga svaren vänder på denna historiska utveckling eller ger en felaktig bild av den utvecklingsriktning som beskrivs i kapitlet.
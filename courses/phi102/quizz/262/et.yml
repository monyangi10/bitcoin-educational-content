question: Milline põhimõtteline muutus iseloomustab tekstis esitatud ajaloolise arengu analüüsi kohaselt arengut antiikühiskondadest kaasaegsete vabade ühiskondadeni?
answer: Autoriteedipõhiste süsteemide järkjärguline asendamine lepingupõhiste suhetega
wrong_answers:
  - Järkjärguline üleminek individuaalsetelt omandiõigustelt ressursside kollektiivsele omandiõigusele
  - Areng detsentraliseeritud hõimuhaldusest tsentraliseeritud riikliku kontrolli juurde
  - Üleminek rahumeelsetelt vahetusmehhanismidelt konkurentsivõimelisel vägivallal põhinevatele süsteemidele
explanation: |
  Tekstis märgitakse selgesõnaliselt, et ajalugu näitab "märkimisväärset suundumust võimu asendamiseks lepinguga", mis võimaldab meil mõista, et sotsialistlikud ja sekkumislahendused on tegelikult tagasipööratud. See ümberkujundamine kujutab endast põhilist arengut sunniviisilistest süsteemidest vabatahtlikele kokkulepetele. Valed vastused muudavad selle ajaloolise arengu vastupidiseks või iseloomustavad valesti peatükis kirjeldatud arengusuunda.
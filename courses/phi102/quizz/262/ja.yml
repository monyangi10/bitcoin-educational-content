question: 歴史的発展に関する本文の分析によれば、古代社会から現代の自由社会への進化を特徴づける根本的な変化は何か？
answer: 権限に基づくシステムから契約に基づく関係への漸進的な置き換え
wrong_answers:
  - 個人の所有権から資源の集団所有への段階的移行
  - 分権的な部族統治から中央集権的な国家管理への進化
  - 平和的交換メカニズムから暴力に基づく競争システムへの移行
explanation: |
  この文章では、歴史が「契約による権威の代替に向かう顕著な傾向」を示していると明言されており、社会主義や介入主義的な解決策が実際には後ろ向きであることを理解することができる。この変化は、強制的な制度から自発的な取り決めへの核心的な進化を表している。間違った答えは、この歴史的経過を逆行させるか、この章で述べられている発展の方向性を誤って表現している。
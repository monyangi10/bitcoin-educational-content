question: Secondo il testo, perché la proprietà esiste in tutte le epoche e in tutte le società, anche tra gli animali?
answer: Perché il principio fondamentale della proprietà rimane costante nelle diverse condizioni di produzione
wrong_answers:
  - Perché tutte le società hanno sviluppato sistemi legali simili per proteggere i diritti individuali
  - Perché la proprietà è un comportamento appreso che si diffonde attraverso la trasmissione culturale
  - Perché i governi di tutte le epoche hanno stabilito leggi sulla proprietà per mantenere l'ordine sociale
explanation: |
  Il testo spiega che la proprietà è osservata universalmente in tutte le epoche e in tutte le società perché il principio fondamentale rimane costante, anche se le forme di proprietà possono variare in base alle diverse condizioni di produzione. Il testo menziona specificamente che anche gli animali dimostrano un comportamento territoriale, difendendo gli spazi dalle intrusioni, il che dimostra che si tratta di un principio naturale piuttosto che di una costruzione legale o culturale. Sebbene le forme di proprietà si adattino alle circostanze (come la proprietà collettiva tribale durante l'età della pietra per la caccia), il principio di base dell'appropriazione e della difesa delle risorse è universale e naturale, non dipende dai sistemi legali o dall'istituzione di un governo.
question: D'après le texte, pourquoi la propriété existe-t-elle à toutes les époques et dans toutes les sociétés, même chez les animaux ?
answer: Parce que le principe fondamental de la propriété reste constant dans les différentes conditions de production
wrong_answers:
  - Parce que toutes les sociétés ont développé des systèmes juridiques similaires pour protéger les droits individuels
  - Parce que la propriété est un comportement appris qui se propage par transmission culturelle
  - Parce que les gouvernements de toutes les époques ont établi des lois sur la propriété pour maintenir l'ordre social
explanation: |
  Le texte explique que la propriété est observée universellement à travers tous les âges et toutes les sociétés parce que le principe fondamental reste constant, même si les formes de propriété peuvent varier en fonction des différentes conditions de production. Le texte mentionne spécifiquement que même les animaux font preuve d'un comportement territorial, défendant les espaces contre les intrusions, ce qui montre qu'il s'agit d'un principe naturel plutôt que d'une construction juridique ou culturelle. Si les formes de propriété s'adaptent aux circonstances (comme la propriété collective tribale à l'âge de pierre pour la chasse), le principe sous-jacent d'appropriation et de défense des ressources est universel et naturel, et ne dépend pas des systèmes juridiques ou de l'établissement d'un gouvernement.
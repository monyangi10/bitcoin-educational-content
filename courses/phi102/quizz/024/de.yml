question: Warum gibt es dem Text zufolge in allen Zeitaltern und Gesellschaften Eigentum, sogar bei Tieren?
answer: Weil das Grundprinzip des Eigentums unter verschiedenen Produktionsbedingungen konstant bleibt
wrong_answers:
  - Weil alle Gesellschaften ähnliche Rechtssysteme zum Schutz der individuellen Rechte entwickelt haben
  - Weil Eigentum ein erlerntes Verhalten ist, das sich durch kulturelle Übertragung verbreitet
  - Weil die Regierungen in allen Epochen Eigentumsgesetze zur Aufrechterhaltung der sozialen Ordnung erlassen haben
explanation: |
  Der Text erklärt, dass Eigentum über alle Zeitalter und Gesellschaften hinweg universell zu beobachten ist, weil das grundlegende Prinzip konstant bleibt, auch wenn die Formen des Eigentums je nach den unterschiedlichen Produktionsbedingungen variieren können. Im Text wird ausdrücklich erwähnt, dass selbst Tiere territoriales Verhalten zeigen und Räume gegen Eindringlinge verteidigen, was zeigt, dass es sich um ein natürliches Prinzip und nicht um ein rechtliches oder kulturelles Konstrukt handelt. Zwar passen sich die Formen des Eigentums an die jeweiligen Umstände an (wie das kollektive Eigentum der Stämme in der Steinzeit für die Jagd), doch das zugrunde liegende Prinzip der Aneignung und Verteidigung von Ressourcen ist universell und natürlich und nicht von Rechtssystemen oder staatlichen Einrichtungen abhängig.
question: 본문에 따르면, 모든 시대와 사회, 심지어 동물들 사이에서도 재산이 존재하는 이유는 무엇일까요?
answer: 재산의 기본 원칙은 다양한 생산 조건에서도 일정하게 유지되기 때문입니다
wrong_answers:
  - 모든 사회가 개인의 권리를 보호하기 위해 유사한 법률 시스템을 발전시켜 왔기 때문입니다
  - 재산은 문화적 전승을 통해 확산되는 학습된 행동이기 때문입니다
  - 모든 시대의 정부는 사회 질서를 유지하기 위해 재산법을 제정해 왔습니다
explanation: |
  본문은 재산의 형태는 생산 조건에 따라 달라질 수 있지만 기본 원칙은 변하지 않기 때문에 모든 시대와 사회에서 보편적으로 관찰된다고 설명합니다. 본문은 특히 동물도 영역 행동을 통해 침입으로부터 공간을 방어한다는 점을 언급하며, 이는 재산이 법적 또는 문화적 구성물이 아닌 자연적인 원리임을 보여줍니다. 석기 시대의 사냥을 위한 부족의 공동 재산처럼 재산의 형태는 상황에 따라 달라지지만, 자원의 배분과 방어라는 기본 원칙은 법률 시스템이나 정부 설립에 의존하지 않는 보편적이고 자연스러운 원리입니다.
question: Metne göre, mülkiyet neden tüm çağlarda ve toplumlarda, hatta hayvanlar arasında bile var?
answer: Mülkiyetin temel ilkesi farklı üretim koşullarında sabit kaldığı için
wrong_answers:
  - Çünkü tüm toplumlar bireysel hakları korumak için benzer hukuk sistemleri geliştirmiştir
  - Çünkü mülkiyet, kültürel aktarım yoluyla yayılan öğrenilmiş bir davranıştır
  - Çünkü tüm çağlarda hükümetler sosyal düzeni korumak için mülkiyet yasaları oluşturmuşlardır
explanation: |
  Metin, mülkiyetin tüm çağlarda ve toplumlarda evrensel olarak gözlemlendiğini, çünkü mülkiyet biçimleri farklı üretim koşullarına göre değişebilse de temel ilkenin sabit kaldığını açıklamaktadır. Metinde özellikle hayvanların bile bölgeci davranışlar sergilediğinden, alanları izinsiz girişlere karşı savunduğundan bahsedilmektedir ki bu da bunun yasal ya da kültürel bir yapıdan ziyade doğal bir ilke olduğunu göstermektedir. Mülkiyet biçimleri koşullara uyum sağlasa da (taş devrinde avcılık için kabile kolektif mülkiyeti gibi), kaynakların temellük edilmesi ve savunulmasının altında yatan ilke evrensel ve doğaldır, yasal sistemlere veya hükümet kuruluşuna bağlı değildir.
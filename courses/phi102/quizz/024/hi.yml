question: According to the text, why does property exist in all ages and societies, even among animals?
answer: Because the fundamental principle of property remains constant across different conditions of production
wrong_answers:
  - Because all societies have developed similar legal systems to protect individual rights
  - Because property is a learned behavior that spreads through cultural transmission
  - Because governments in all eras have established property laws to maintain social order
explanation: |
  The text explains that property is observed universally across all ages and societies because the fundamental principle remains constant, even though the forms of property may vary according to different production conditions. The text specifically mentions that even animals demonstrate territorial behavior, defending spaces against intrusions, which shows this is a natural principle rather than a legal or cultural construct. While the forms of property adapt to circumstances (like tribal collective property during the stone age for hunting), the underlying principle of appropriation and defense of resources is universal and natural, not dependent on legal systems or government establishment.
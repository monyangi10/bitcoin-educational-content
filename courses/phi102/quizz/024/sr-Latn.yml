question: Prema tekstu, zašto imovina postoji u svim dobima i društvima, čak i među životinjama?
answer: Jer osnovni princip svojine ostaje konstantan u različitim uslovima proizvodnje
wrong_answers:
  - Zato što su sva društva razvila slične pravne sisteme za zaštitu individualnih prava
  - Jer je vlasništvo naučeno ponašanje koje se širi putem kulturnog prenosa
  - Zato što su vlade u svim epohama uspostavljale zakone o vlasništvu kako bi održale društveni poredak
explanation: |
  Tekst objašnjava da se svojina univerzalno posmatra kroz sve vekove i društva jer osnovni princip ostaje konstantan, iako se oblici svojine mogu razlikovati u skladu sa različitim uslovima proizvodnje. Tekst posebno pominje da čak i životinje pokazuju teritorijalno ponašanje, braneći prostore od upada, što pokazuje da je ovo prirodni princip, a ne pravna ili kulturna konstrukcija. Dok se oblici svojine prilagođavaju okolnostima (kao što je plemenska kolektivna svojina tokom kamenog doba za lov), osnovni princip prisvajanja i odbrane resursa je univerzalan i prirodan, ne zavisi od pravnih sistema ili uspostavljanja vlade.
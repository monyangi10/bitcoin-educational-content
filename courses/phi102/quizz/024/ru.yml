question: Согласно тексту, почему собственность существует во всех эпохах и обществах, даже среди животных?
answer: Поскольку основополагающий принцип собственности остается неизменным в различных условиях производства
wrong_answers:
  - Поскольку все общества разработали схожие правовые системы для защиты индивидуальных прав
  - Потому что собственность - это выученное поведение, которое распространяется через культурную передачу
  - Потому что во все эпохи правительства устанавливали законы о собственности для поддержания социального порядка
explanation: |
  В тексте объясняется, что собственность наблюдается во всех эпохах и обществах, потому что основополагающий принцип остается неизменным, хотя формы собственности могут варьироваться в зависимости от условий производства. В тексте особо отмечается, что даже животные демонстрируют территориальное поведение, защищая свое пространство от вторжения, что свидетельствует о том, что это естественный принцип, а не юридическая или культурная конструкция. Хотя формы собственности адаптируются к обстоятельствам (например, коллективная собственность племен в каменном веке для охоты), основной принцип присвоения и защиты ресурсов является универсальным и естественным, не зависящим от правовых систем или государственного устройства.
question: 根據文中所述，為什麼財產存在於所有時代和社會中，甚至存在於動物之間？
answer: 因為財產的基本原則在不同的生產條件下保持不變
wrong_answers:
  - 因為所有社會都發展了類似的法律制度來保護個人權利
  - 因為財產是一種透過文化傳播的學習行為
  - 因為各個時代的政府都制定財產法來維持社會秩序
explanation: |
  文中解釋，財產在各個時代、各個社會都受到普遍的觀察，因為基本原則是恆定不變的，儘管財產的形式可能會根據不同的生產條件而有所不同。文中特別提到，即使是動物也會表現出領土行為，捍衛空間不受侵擾，這說明這是一項自然原則，而非法律或文化建構。儘管財產的形式會因應情況而有所調整（就像石器時代的部落集體財產用於狩獵），但資源的佔用與防衛的基本原則是普遍且自然的，並不取決於法律制度或政府的建立。
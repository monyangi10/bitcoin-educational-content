question: Według tekstu, dlaczego własność istnieje we wszystkich epokach i społeczeństwach, nawet wśród zwierząt?
answer: Ponieważ podstawowa zasada własności pozostaje niezmienna w różnych warunkach produkcji
wrong_answers:
  - Ponieważ wszystkie społeczeństwa rozwinęły podobne systemy prawne w celu ochrony praw jednostki
  - Ponieważ własność jest wyuczonym zachowaniem, które rozprzestrzenia się poprzez transmisję kulturową
  - Ponieważ rządy we wszystkich epokach ustanawiały prawa własności w celu utrzymania porządku społecznego
explanation: |
  Tekst wyjaśnia, że własność jest obserwowana powszechnie we wszystkich epokach i społeczeństwach, ponieważ podstawowa zasada pozostaje niezmienna, nawet jeśli formy własności mogą się różnić w zależności od różnych warunków produkcji. Tekst wyraźnie wspomina, że nawet zwierzęta wykazują zachowania terytorialne, broniąc przestrzeni przed wtargnięciem, co pokazuje, że jest to raczej naturalna zasada niż konstrukcja prawna lub kulturowa. Podczas gdy formy własności dostosowują się do okoliczności (takich jak zbiorowa własność plemienna w epoce kamienia łupanego), podstawowa zasada zawłaszczania i obrony zasobów jest uniwersalna i naturalna, niezależna od systemów prawnych lub ustanowienia rządu.
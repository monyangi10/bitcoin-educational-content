question: Kulingana na maandishi, kwa nini mali ipo katika rika na jamii zote, hata miongoni mwa wanyama?
answer: Kwa sababu kanuni ya msingi ya mali hubaki thabiti katika hali tofauti za uzalishaji
wrong_answers:
  - Kwa sababu jamii zote zimeunda mifumo sawa ya kisheria ili kulinda haki za mtu binafsi
  - Kwa sababu mali ni tabia ya kujifunza ambayo huenea kupitia uenezaji wa kitamaduni
  - Kwa sababu serikali katika enzi zote zimeanzisha sheria za mali ili kudumisha utulivu wa kijamii
explanation: |
  Maandishi yanaelezea kwamba mali huzingatiwa kote ulimwenguni katika rika na jamii zote kwa sababu kanuni ya msingi inabaki thabiti, ingawa aina za mali zinaweza kutofautiana kulingana na hali tofauti za uzalishaji. Maandishi yanataja haswa kwamba hata wanyama huonyesha tabia ya eneo, wakilinda nafasi dhidi ya uvamizi, jambo ambalo linaonyesha kuwa hii ni kanuni ya asili badala ya muundo wa kisheria au kitamaduni. Ingawa aina za mali hubadilika kulingana na hali (kama vile mali ya pamoja ya kikabila wakati wa enzi ya mawe kwa ajili ya uwindaji), kanuni ya msingi ya umiliki na ulinzi wa rasilimali ni ya ulimwengu wote na ya asili, haitegemei mifumo ya kisheria au uanzishwaji wa serikali.
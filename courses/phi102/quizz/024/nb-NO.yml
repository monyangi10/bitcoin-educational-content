question: Hvorfor finnes det, ifølge teksten, eiendom til alle tider og i alle samfunn, også blant dyr?
answer: Fordi det grunnleggende prinsippet om eiendom forblir konstant på tvers av ulike produksjonsforhold
wrong_answers:
  - Fordi alle samfunn har utviklet lignende rettssystemer for å beskytte individuelle rettigheter
  - Fordi eiendom er en tillært atferd som sprer seg gjennom kulturell overføring
  - Fordi regjeringer i alle tider har etablert eiendomslover for å opprettholde sosial orden
explanation: |
  Teksten forklarer at eiendomsretten er universell på tvers av alle tidsaldre og samfunn fordi det grunnleggende prinsippet forblir konstant, selv om eiendomsformene kan variere avhengig av ulike produksjonsforhold. Teksten nevner spesifikt at til og med dyr utviser territoriell atferd og forsvarer sine områder mot inntrengere, noe som viser at dette er et naturlig prinsipp snarere enn en juridisk eller kulturell konstruksjon. Selv om eiendomsformene tilpasser seg omstendighetene (som kollektiv stammeeiendom for jakt i steinalderen), er det underliggende prinsippet om tilegnelse og forsvar av ressurser universelt og naturlig, og ikke avhengig av rettssystemer eller statsetablering.
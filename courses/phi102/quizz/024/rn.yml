question: Dukurikije ico canditswe, ni kuki umutungo uriho mu myaka yose no mu mibano yose, mbere no mu bikoko?
answer: Kubera ko ingingo ngenderwako y’ishimikiro y’umutungo iguma ari imwe mu bihe bitandukanye vy’uguhingura .
wrong_answers:
  - Kubera ko imiryango yose yashizeho uburyo busa n’ubwo bwo kurinda uburenganzira bw’umuntu ku giti ciwe .
  - Kuko umutungo ni inyifato yize ikwiragizwa biciye mu gutanga umuco .
  - Kubera ko intwaro zo mu bihe vyose zashizeho amategeko agenga ivy’itunga kugira ngo abantu bagumane urutonde .
explanation: |
  Ico canditswe kirasigura ko umutungo wihwezwa kw’isi yose mu myaka yose no mu mibano yose kubera ko ingingo ngenderwako y’ishimikiro iguma ari imwe, naho uburyo bw’umutungo bushobora guhinduka bivanye n’imibereho itandukanye y’uguhingura. Ico canditswe kivuga canecane ko mbere n’ibikoko vyerekana inyifato y’intara, bikagwanira ibibanza ku binjira, ivyo bikaba vyerekana ko iyo ari ingingo ngenderwako y’akameremere aho kuba inyubakwa y’amategeko canke y’umuco. Naho uburyo bw’umutungo bujanye n’ivyo bihe (nk’umutungo w’imiryango rusangi mu gihe c’amabuye yo guhigira), ingingo ngenderwako y’ishimikiro yo kwigarurira no kurwanira umutungo ni iyo kw’isi yose kandi ni iyo mu kamere, ntivana n’imirongo ngenderwako y’amategeko canke ishingwa rya Leta.
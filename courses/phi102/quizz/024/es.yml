question: Según el texto, ¿por qué existe la propiedad en todas las épocas y sociedades, incluso entre los animales?
answer: Porque el principio fundamental de la propiedad permanece constante en las diferentes condiciones de producción
wrong_answers:
  - Porque todas las sociedades han desarrollado sistemas jurídicos similares para proteger los derechos individuales
  - Porque la propiedad es un comportamiento aprendido que se propaga por transmisión cultural
  - Porque los gobiernos de todas las épocas han establecido leyes de propiedad para mantener el orden social
explanation: |
  El texto explica que la propiedad se observa universalmente en todas las épocas y sociedades porque el principio fundamental permanece constante, aunque las formas de propiedad puedan variar según las distintas condiciones de producción. El texto menciona específicamente que incluso los animales demuestran un comportamiento territorial, defendiendo espacios contra intrusiones, lo que demuestra que se trata de un principio natural más que de una construcción legal o cultural. Aunque las formas de propiedad se adaptan a las circunstancias (como la propiedad colectiva tribal durante la Edad de Piedra para la caza), el principio subyacente de apropiación y defensa de los recursos es universal y natural, no depende de sistemas jurídicos ni del establecimiento de gobiernos.
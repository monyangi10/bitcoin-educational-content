question: Menurut teks tersebut, mengapa harta benda ada di segala zaman dan masyarakat, bahkan di antara hewan?
answer: Karena prinsip dasar properti tetap konstan di berbagai kondisi produksi
wrong_answers:
  - Karena semua masyarakat telah mengembangkan sistem hukum yang serupa untuk melindungi hak-hak individu
  - Karena properti adalah perilaku yang dipelajari yang menyebar melalui transmisi budaya
  - Karena pemerintah di semua era telah menetapkan hukum properti untuk menjaga ketertiban sosial
explanation: |
  Teks tersebut menjelaskan bahwa properti diamati secara universal di segala usia dan masyarakat karena prinsip dasarnya tetap konstan, meskipun bentuk-bentuk properti dapat bervariasi sesuai dengan kondisi produksi yang berbeda. Teks tersebut secara khusus menyebutkan bahwa bahkan hewan pun menunjukkan perilaku teritorial, mempertahankan wilayahnya dari gangguan, yang menunjukkan bahwa hal ini merupakan prinsip alamiah dan bukan konstruksi hukum atau budaya. Meskipun bentuk-bentuk properti beradaptasi dengan keadaan (seperti properti kolektif suku pada zaman batu untuk berburu), prinsip yang mendasari perampasan dan pertahanan sumber daya adalah universal dan alami, tidak tergantung pada sistem hukum atau pendirian pemerintah.
question: Waarom bestaat eigendom volgens de tekst in alle tijden en samenlevingen, zelfs onder dieren?
answer: Omdat het fundamentele principe van eigendom constant blijft in verschillende productieomstandigheden
wrong_answers:
  - Omdat alle samenlevingen vergelijkbare rechtssystemen hebben ontwikkeld om individuele rechten te beschermen
  - Omdat eigendom aangeleerd gedrag is dat zich verspreidt via culturele overdracht
  - Omdat regeringen in alle tijden eigendomswetten hebben ingesteld om de sociale orde te handhaven
explanation: |
  De tekst legt uit dat eigendom universeel wordt waargenomen in alle tijden en samenlevingen omdat het basisprincipe constant blijft, ook al kunnen de vormen van eigendom variëren afhankelijk van de productieomstandigheden. De tekst vermeldt specifiek dat zelfs dieren territoriaal gedrag vertonen en ruimtes verdedigen tegen indringers, wat aantoont dat dit een natuurlijk principe is in plaats van een juridische of culturele constructie. Hoewel de vormen van eigendom zich aanpassen aan de omstandigheden (zoals collectief eigendom van stammen in het stenen tijdperk voor de jacht), is het onderliggende principe van toe-eigening en verdediging van hulpbronnen universeel en natuurlijk, niet afhankelijk van rechtssystemen of overheidsinstellingen.
question: Varför finns det, enligt texten, egendom i alla tider och samhällen, även bland djur?
answer: Eftersom den grundläggande principen om äganderätt förblir oförändrad under olika produktionsförhållanden
wrong_answers:
  - Eftersom alla samhällen har utvecklat liknande rättssystem för att skydda individuella rättigheter
  - Eftersom egendom är ett inlärt beteende som sprids genom kulturell överföring
  - Eftersom regeringar i alla tider har infört äganderättslagar för att upprätthålla samhällsordningen
explanation: |
  I texten förklaras att äganderätten är universell i alla tider och samhällen eftersom den grundläggande principen förblir konstant, även om formerna för äganderätten kan variera beroende på olika produktionsförhållanden. I texten nämns särskilt att även djur uppvisar ett territoriellt beteende och försvarar sina områden mot intrång, vilket visar att detta är en naturlig princip snarare än en juridisk eller kulturell konstruktion. Även om egendomsformerna anpassas till omständigheterna (som stammens kollektiva egendom under stenåldern för jakt) är den underliggande principen om tillägnande och försvar av resurser universell och naturlig, inte beroende av rättssystem eller regeringsbildning.
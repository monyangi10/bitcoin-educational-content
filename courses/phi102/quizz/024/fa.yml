question: بر اساس متن، چرا مالکیت در تمام دوران‌ها و جوامع، حتی در میان حیوانات وجود دارد؟
answer: زیرا اصل اساسی مالکیت در شرایط مختلف تولید ثابت می‌ماند
wrong_answers:
  - زیرا همه جوامع سیستم‌های حقوقی مشابهی برای حفاظت از حقوق فردی توسعه داده‌اند
  - زیرا مالکیت یک رفتار آموخته شده است که از طریق انتقال فرهنگی گسترش می‌یابد
  - زیرا دولت‌ها در تمام دوران‌ها قوانین مالکیت را برای حفظ نظم اجتماعی وضع کرده‌اند
explanation: |
  متن توضیح می‌دهد که مالکیت به‌طور جهانی در تمام سنین و جوامع مشاهده می‌شود زیرا اصل اساسی ثابت می‌ماند، حتی اگر اشکال مالکیت ممکن است بر اساس شرایط تولید متفاوت باشد. متن به‌طور خاص اشاره می‌کند که حتی حیوانات رفتار قلمرویی نشان می‌دهند و از فضاها در برابر تجاوزات دفاع می‌کنند، که نشان می‌دهد این یک اصل طبیعی است نه یک ساختار قانونی یا فرهنگی. در حالی که اشکال مالکیت با شرایط سازگار می‌شوند (مانند مالکیت جمعی قبیله‌ای در دوران سنگ برای شکار)، اصل اساسی تصاحب و دفاع از منابع جهانی و طبیعی است و به سیستم‌های قانونی یا تأسیس دولت وابسته نیست.
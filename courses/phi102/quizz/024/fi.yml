question: Miksi tekstin mukaan omaisuutta on olemassa kaikissa aikakausissa ja yhteiskunnissa, jopa eläinten keskuudessa?
answer: Koska omaisuuden perusperiaate pysyy muuttumattomana eri tuotanto-olosuhteissa
wrong_answers:
  - Koska kaikki yhteiskunnat ovat kehittäneet samankaltaisia oikeusjärjestelmiä yksilön oikeuksien suojelemiseksi
  - Koska omaisuus on opittua käyttäytymistä, joka leviää kulttuurin välityksellä
  - Koska hallitukset ovat kaikkina aikakausina säätäneet omistusoikeutta koskevia lakeja pitääkseen yllä sosiaalista järjestystä
explanation: |
  Tekstissä selitetään, että omistusoikeus on havaittavissa yleisesti kaikissa aikakausissa ja yhteiskunnissa, koska perusperiaate pysyy vakiona, vaikka omistusoikeuden muodot voivat vaihdella eri tuotanto-olosuhteiden mukaan. Tekstissä mainitaan erityisesti, että jopa eläimet käyttäytyvät alueellisesti ja puolustavat alueita tunkeutumiselta, mikä osoittaa, että kyseessä on luonnollinen periaate eikä oikeudellinen tai kulttuurinen konstruktio. Vaikka omistusmuodot mukautuvat olosuhteiden mukaan (kuten heimojen kollektiivinen omistus metsästystä varten kivikaudella), perimmäinen periaate resurssien haltuunotosta ja puolustamisesta on yleismaailmallinen ja luonnollinen, eikä se ole riippuvainen oikeudellisista järjestelmistä tai hallituksen perustamisesta.
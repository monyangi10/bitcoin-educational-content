question: Proč podle textu existuje vlastnictví ve všech dobách a společnostech, dokonce i mezi zvířaty?
answer: Protože základní princip vlastnictví zůstává konstantní v různých výrobních podmínkách
wrong_answers:
  - Protože všechny společnosti vyvinuly podobné právní systémy na ochranu individuálních práv
  - Protože vlastnictví je naučené chování, které se šíří kulturním přenosem
  - Protože vlády ve všech dobách zaváděly majetkové právo, aby udržely společenský řád
explanation: |
  Text vysvětluje, že vlastnictví je pozorováno univerzálně ve všech dobách a společnostech, protože základní princip zůstává konstantní, i když se formy vlastnictví mohou lišit podle různých výrobních podmínek. V textu je konkrétně zmíněno, že i zvířata vykazují teritoriální chování a brání prostor před narušením, což ukazuje, že se jedná o přirozený princip, nikoliv o právní či kulturní konstrukt. Formy vlastnictví se sice přizpůsobují okolnostem (jako kmenové kolektivní vlastnictví v době kamenné při lovu), ale základní princip přivlastňování a obrany zdrojů je univerzální a přirozený, nezávisí na právních systémech ani na vládním zřízení.
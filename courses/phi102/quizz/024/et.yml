question: Miks on teksti järgi omand olemas kõikides ajastutes ja ühiskondades, isegi loomade seas?
answer: Kuna omandi põhiprintsiip jääb erinevates tootmistingimustes püsivaks
wrong_answers:
  - Kuna kõik ühiskonnad on välja töötanud sarnased õigussüsteemid üksikisiku õiguste kaitsmiseks
  - Kuna omand on õpitud käitumine, mis levib kultuurilise edasikandumise kaudu
  - Kuna valitsused on kõigil ajastutel kehtestanud omandiseadused sotsiaalse korra säilitamiseks
explanation: |
  Tekstis selgitatakse, et omand on täheldatav universaalselt kõigis ajastutes ja ühiskondades, sest põhiprintsiip jääb samaks, kuigi omandivormid võivad erineda vastavalt erinevatele tootmistingimustele. Tekstis mainitakse konkreetselt, et isegi loomad näitavad territoriaalset käitumist, kaitstes ruumi sissetungi eest, mis näitab, et tegemist on pigem loodusliku põhimõttega kui juriidilise või kultuurilise konstruktsiooniga. Kuigi omandivormid kohanduvad vastavalt oludele (nagu hõimude kollektiivne omand kiviaja ajal jahipidamiseks), on ressursside omastamise ja kaitsmise aluspõhimõte universaalne ja loomulik, mitte sõltuv õigussüsteemidest või valitsuse kehtestamisest.
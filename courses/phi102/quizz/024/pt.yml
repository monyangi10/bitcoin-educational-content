question: De acordo com o texto, porque é que a propriedade existe em todas as épocas e sociedades, mesmo entre os animais?
answer: Porque o princípio fundamental da propriedade permanece constante em diferentes condições de produção
wrong_answers:
  - Porque todas as sociedades desenvolveram sistemas jurídicos semelhantes para proteger os direitos individuais
  - Porque a propriedade é um comportamento aprendido que se propaga através da transmissão cultural
  - Porque os governos de todas as épocas estabeleceram leis de propriedade para manter a ordem social
explanation: |
  O texto explica que a propriedade é observada universalmente em todas as épocas e sociedades, porque o princípio fundamental permanece constante, embora as formas de propriedade possam variar de acordo com as diferentes condições de produção. O texto menciona especificamente que até os animais demonstram um comportamento territorial, defendendo os espaços contra intrusões, o que mostra que se trata de um princípio natural e não de uma construção jurídica ou cultural. Embora as formas de propriedade se adaptem às circunstâncias (como a propriedade colectiva tribal durante a idade da pedra para a caça), o princípio subjacente de apropriação e defesa dos recursos é universal e natural, não dependendo de sistemas legais ou da criação de governos.
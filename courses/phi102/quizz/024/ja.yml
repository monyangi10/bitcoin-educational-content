question: 本文によれば、なぜ動物の間にも、あらゆる時代や社会に財産が存在するのか？
answer: 財産の基本原理は、さまざまな生産条件においても不変だからだ。
wrong_answers:
  - すべての社会は、個人の権利を守るために似たような法制度を発展させてきたからだ。
  - 財産は文化的な伝播を通じて広まる学習された行動だからだ。
  - いつの時代も、政府は社会秩序を維持するために財産法を制定してきた。
explanation: |
  この文章では、財産の形はさまざまな生産条件によって異なるかもしれないが、基本的な原理は不変であるため、財産はあらゆる時代や社会で普遍的に観察されると説明されている。この文章では特に、動物でさえも侵入から空間を守る縄張り行動を示すことに触れており、これが法律や文化的構築物ではなく、自然原理であることを示している。財産の形態は状況に適応するが（狩猟のための石器時代の部族的集団財産のように）、資源の充当と防衛という根底にある原理は普遍的かつ自然なものであり、法制度や政府の確立に左右されるものではない。
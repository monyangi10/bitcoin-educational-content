question: ตามข้อความ ทำไมทรัพย์สินถึงมีอยู่ในทุกยุคทุกสังคม แม้กระทั่งในหมู่สัตว์?
answer: เพราะหลักการพื้นฐานของทรัพย์สินยังคงที่ภายใต้เงื่อนไขการผลิตที่แตกต่างกัน
wrong_answers:
  - เพราะทุกสังคมได้พัฒนาระบบกฎหมายที่คล้ายคลึงกันเพื่อปกป้องสิทธิส่วนบุคคล
  - เพราะทรัพย์สินเป็นพฤติกรรมที่เรียนรู้ซึ่งแพร่กระจายผ่านการถ่ายทอดทางวัฒนธรรม
  - เพราะรัฐบาลในทุกยุคสมัยได้จัดตั้งกฎหมายทรัพย์สินเพื่อรักษาความสงบเรียบร้อยของสังคม
explanation: |
  ข้อความอธิบายว่าทรัพย์สินถูกสังเกตเห็นอย่างแพร่หลายทั่วทุกยุคทุกสมัยและสังคม เพราะหลักการพื้นฐานยังคงที่ แม้ว่ารูปแบบของทรัพย์สินอาจแตกต่างกันไปตามเงื่อนไขการผลิตที่แตกต่างกัน ข้อความระบุโดยเฉพาะว่าแม้แต่สัตว์ก็แสดงพฤติกรรมการครอบครองอาณาเขต โดยปกป้องพื้นที่จากการบุกรุก ซึ่งแสดงให้เห็นว่านี่เป็นหลักการตามธรรมชาติไม่ใช่การสร้างทางกฎหมายหรือวัฒนธรรม ในขณะที่รูปแบบของทรัพย์สินปรับตัวตามสถานการณ์ (เช่น ทรัพย์สินรวมของชนเผ่าในยุคหินสำหรับการล่าสัตว์) หลักการพื้นฐานของการครอบครองและการป้องกันทรัพยากรเป็นสิ่งที่เป็นสากลและเป็นธรรมชาติ ไม่ขึ้นอยู่กับระบบกฎหมายหรือการจัดตั้งรัฐบาล
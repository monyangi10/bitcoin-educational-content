question: เหตุผลหลักที่การวางแผนเศรษฐกิจแบบรวมศูนย์ล้มเหลวในการประสานการผลิตอย่างมีประสิทธิภาพตามทฤษฎีเศรษฐศาสตร์คืออะไร?
answer: มันขาดสัญญาณราคาเพื่อบ่งบอกถึงความต้องการที่แท้จริงของผู้บริโภคและลำดับความสำคัญในการผลิต
wrong_answers:
  - มันพึ่งพาแรงจูงใจในการแสวงหากำไรมากเกินไปซึ่งทำให้การตัดสินใจของรัฐบาลเสื่อมเสีย
  - มันสร้างการแข่งขันที่มากเกินไประหว่างรัฐวิสาหกิจสำหรับทรัพยากร
  - มันอนุญาตให้มีเสรีภาพส่วนบุคคลมากเกินไปในการเลือกผลิตและบริโภค
explanation: |
  การวางแผนแบบรวมศูนย์ล้มเหลวเพราะมันกำจัดกลไกราคา ซึ่งทำหน้าที่เป็นระบบข้อมูลที่สำคัญในตลาดเสรี เมื่อไม่มีราคาที่ผันผวนตามอุปสงค์และอุปทาน ผู้วางแผนแบบรวมศูนย์จะดำเนินการอย่างมืดบอด ไม่สามารถรู้ได้ว่าผู้บริโภคต้องการอะไรจริง ๆ เมื่อใดที่พวกเขาต้องการ หรือพวกเขายินดีที่จะเสียสละมากน้อยเพียงใด ราคาทำหน้าที่เหมือนเข็มทิศในเศรษฐกิจที่ซับซ้อน ชี้นำผู้ผลิตไปสู่โอกาสที่มีกำไรซึ่งสอดคล้องกับความต้องการที่แท้จริงของผู้บริโภค คำตอบที่ผิดนั้นไม่ถูกต้องเพราะ: การวางแผนแบบรวมศูนย์จริง ๆ แล้วกำจัดแทนที่จะพึ่งพาแรงจูงใจในการทำกำไร; มันมักจะลดลงแทนที่จะเพิ่มการแข่งขัน; และมันจำกัดแทนที่จะอนุญาตเสรีภาพทางเศรษฐกิจส่วนบุคคล
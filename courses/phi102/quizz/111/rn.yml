question: Ni igiki nyamukuru gituma igenamigambi ry’ubutunzi ry’imbere mu gihugu ridashobora guhuza neza umusaruro hakurikijwe inyigisho y’ubutunzi?
answer: Nta bimenyetso vy'igiciro vyerekana ivyo abaguzi bakeneye vy'ukuri n'ivyo bashira imbere
wrong_answers:
  - Rishingiye cane ku ntumbero zo kuronka inyungu zituma Leta ifata ingingo zitari zo .
  - Bituma haba uguhiganwa birenze urugero hagati y’ibigo vya Leta ku bijanye n’ubutunzi .
  - Bituma umuntu agira umwidegemvyo mwinshi cane mu guhitamwo ivyo akora n'ivyo akoresha .
explanation: |
  Itegeko ry’imbere mu gihugu rirananirwa kuko rikuraho uburyo bw’igiciro bukora nk’uburyo bw’amakuru buhambaye mu masoko yidegemvya. Ata bici- ro bihinduka bivanye n’ivyo umuntu asaba n’ivyo asaba, abategura ivy’ubuhinga bwa none bakora ataco bazi, badashobora kumenya ivyo abaguzi bashaka vy’ukuri, igihe babishaka, canke ingene biteguye kwitanga kubera ivyo. Ibiciro bikora nk’ubusobanuro bw’ibintu mu bukungu butoroshe, bikayobora abahinguzi ku mahirwe y’inyungu ajanye n’ivyo abaguzi bakeneye vy’ukuri. Inyishu zitari zo ntizibereye kuko: igenamigambi ry’imbere mu vy’ukuri rikuraho aho kwizigira intumbero z’inyungu; mu bisanzwe biragabanya aho kwongerera uguhiganwa; kandi rigabanya aho kwemera umwidegemvyo w’umuntu ku giti ciwe mu vy’ubutunzi.
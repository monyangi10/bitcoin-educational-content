question: Theo lý thuyết kinh tế, nguyên nhân chính khiến kế hoạch kinh tế tập trung thất bại trong việc điều phối sản xuất hiệu quả là gì?
answer: Nó thiếu các tín hiệu về giá cả để phản ánh nhu cầu thực sự của người tiêu dùng và các ưu tiên sản xuất.
wrong_answers:
  - Nó quá phụ thuộc vào động cơ lợi nhuận, điều làm tha hóa quá trình ra quyết định của chính phủ.
  - Điều này tạo ra sự cạnh tranh quá mức giữa các doanh nghiệp nhà nước để giành giật nguồn lực.
  - Nó cho phép quá nhiều tự do cá nhân trong các lựa chọn sản xuất và tiêu dùng.
explanation: |
  Nền kinh tế kế hoạch hóa tập trung thất bại vì nó loại bỏ cơ chế giá cả, vốn đóng vai trò là hệ thống thông tin quan trọng trong thị trường tự do. Nếu không có sự biến động giá cả dựa trên cung và cầu, các nhà hoạch định chính sách tập trung sẽ hoạt động một cách mù quáng, không thể biết người tiêu dùng thực sự muốn gì, khi nào họ muốn, hoặc họ sẵn sàng hy sinh bao nhiêu cho điều đó. Giá cả hoạt động như một la bàn trong nền kinh tế phức tạp, hướng dẫn các nhà sản xuất đến những cơ hội sinh lời phù hợp với nhu cầu thực tế của người tiêu dùng. Các câu trả lời sai là không chính xác vì: nền kinh tế kế hoạch hóa tập trung thực chất loại bỏ chứ không phải dựa vào động cơ lợi nhuận; nó thường làm giảm chứ không làm tăng cạnh tranh; và nó hạn chế chứ không cho phép tự do kinh tế cá nhân.
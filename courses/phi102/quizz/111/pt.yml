question: Qual é a principal razão pela qual o planeamento económico centralizado não consegue coordenar eficazmente a produção de acordo com a teoria económica?
answer: Não há sinais de preços que indiquem as necessidades reais dos consumidores e as prioridades de produção
wrong_answers:
  - Baseia-se demasiado em motivos de lucro que corrompem a tomada de decisões governamentais
  - Cria uma concorrência excessiva entre as empresas públicas pelos recursos
  - Permite demasiada liberdade individual nas escolhas de produção e consumo
explanation: |
  O planeamento centralizado falha porque elimina o mecanismo de preços que funciona como um sistema de informação crucial nos mercados livres. Sem a flutuação dos preços com base na oferta e na procura, os planeadores centrais operam às cegas, incapazes de saber o que os consumidores realmente querem, quando o querem, ou quanto estão dispostos a sacrificar por isso. Os preços funcionam como uma bússola em economias complexas, orientando os produtores para oportunidades lucrativas que se alinham com as necessidades reais dos consumidores. As respostas erradas são incorrectas porque: o planeamento centralizado elimina, em vez de se basear em motivos de lucro; normalmente reduz, em vez de aumentar, a concorrência; e restringe, em vez de permitir, a liberdade económica individual.
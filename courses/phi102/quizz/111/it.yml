question: Qual è la ragione principale per cui la pianificazione economica centralizzata non riesce a coordinare efficacemente la produzione secondo la teoria economica?
answer: Mancano segnali di prezzo che indichino le reali esigenze dei consumatori e le priorità di produzione
wrong_answers:
  - Si basa troppo su motivazioni di profitto che corrompono il processo decisionale del governo
  - Crea un'eccessiva competizione tra le imprese statali per le risorse
  - Permette un'eccessiva libertà individuale nelle scelte di produzione e consumo
explanation: |
  La pianificazione centralizzata fallisce perché elimina il meccanismo dei prezzi che funge da sistema informativo cruciale nei mercati liberi. Senza i prezzi che fluttuano in base alla domanda e all'offerta, i pianificatori centrali operano alla cieca, incapaci di sapere cosa i consumatori vogliono realmente, quando lo vogliono o quanto sono disposti a sacrificare per averlo. I prezzi agiscono come una bussola nelle economie complesse, guidando i produttori verso opportunità redditizie che si allineano alle reali esigenze dei consumatori. Le risposte sbagliate sono errate perché: la pianificazione centralizzata elimina di fatto i motivi di profitto, anziché basarsi su di essi; in genere riduce anziché aumentare la concorrenza; limita anziché consentire la libertà economica individuale.
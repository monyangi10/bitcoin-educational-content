question: Коя е основната причина, поради която централизираното икономическо планиране не успява да координира ефективно производството според икономическата теория?
answer: Липсват ценови сигнали, които да показват реалните нужди на потребителите и производствените приоритети
wrong_answers:
  - Тя разчита твърде много на мотивите за печалба, които опорочават вземането на решения от страна на правителството
  - Създава прекомерна конкуренция между държавните предприятия за ресурси
  - Позволява твърде голяма индивидуална свобода при избора на производство и потребление
explanation: |
  Централизираното планиране се проваля, защото елиминира ценовия механизъм, който служи като основна информационна система на свободните пазари. Без цените, които се променят в зависимост от търсенето и предлагането, централните плановици действат сляпо, без да могат да знаят какво всъщност искат потребителите, кога го искат и колко са готови да жертват за него. Цените действат като компас в сложните икономики, насочвайки производителите към печеливши възможности, които съответстват на реалните нужди на потребителите. Грешните отговори са неправилни, защото: централизираното планиране всъщност премахва, а не разчита на мотивите за печалба; то обикновено намалява, а не увеличава конкуренцията; и по-скоро ограничава, а не позволява индивидуалната икономическа свобода.
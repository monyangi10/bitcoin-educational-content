question: 経済理論によれば、中央集権的な経済計画が効果的な生産調整に失敗する主な理由は何か？
answer: 消費者の真のニーズと生産の優先順位を示す価格シグナルが欠如している。
wrong_answers:
  - 政府の意思決定を腐敗させる利益動機に過度に依存している。
  - 国有企業間で資源をめぐる過度な競争を引き起こす。
  - 生産と消費の選択において、個人の自由を認めすぎている。
explanation: |
  中央集権的な計画が失敗するのは、自由市場において重要な情報システムとして機能している価格メカニズムを排除してしまうからだ。需要と供給に基づいて価格が変動しなければ、中央計画担当者は、消費者が実際に何を欲しがっているのか、いつ欲しがるのか、そのためにどれだけの犠牲を払うつもりなのかを知ることができず、やみくもに動くことになる。価格は複雑な経済における羅針盤のような役割を果たし、生産者を実際の消費者のニーズに沿った収益性の高い機会へと導く。中央集権的な計画は、利潤動機に依存するのではなく、むしろ排除するものであり、競争を激化させるのではなく、むしろ減少させるのが一般的であり、個人の経済的自由を認めるのではなく、むしろ制限するものである。
question: Mis on peamine põhjus, miks tsentraliseeritud majandusplaneerimine ei suuda majandusteooria kohaselt tootmist tõhusalt koordineerida?
answer: Puuduvad hinnasignaalid, mis näitaksid tarbijate tegelikke vajadusi ja tootmisprioriteete
wrong_answers:
  - See tugineb liiga palju kasumimotiividele, mis rikuvad valitsuse otsuste tegemist
  - See tekitab liigset konkurentsi riigiettevõtete vahel ressursside pärast
  - See võimaldab liiga suurt individuaalset vabadust tootmis- ja tarbimisvalikutes
explanation: |
  Tsentraliseeritud planeerimine ebaõnnestub, sest see kaotab hinnamehhanismi, mis on vabade turgude oluline infosüsteem. Ilma pakkumise ja nõudluse alusel muutuvate hindadeta tegutsevad kesksed planeerijad pimesi, sest nad ei saa teada, mida tarbijad tegelikult tahavad, millal nad seda tahavad või kui palju nad on valmis selle eest ohverdama. Hinnad toimivad keerulises majanduses nagu kompass, mis suunab tootjaid kasumlike võimaluste suunas, mis on kooskõlas tarbijate tegelike vajadustega. Valed vastused on valed, sest: tsentraliseeritud planeerimine tegelikult pigem välistab kui tugineb kasumimotiividele; tavaliselt pigem vähendab kui suurendab konkurentsi; ja pigem piirab kui võimaldab individuaalset majanduslikku vabadust.
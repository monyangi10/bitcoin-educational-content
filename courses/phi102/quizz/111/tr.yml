question: Ekonomi teorisine göre merkezi ekonomik planlamanın üretimi etkin bir şekilde koordine edememesinin temel nedeni nedir?
answer: Gerçek tüketici ihtiyaçlarını ve üretim önceliklerini gösteren fiyat sinyallerinden yoksundur
wrong_answers:
  - Hükümetin karar alma mekanizmasını yozlaştıran kar güdülerine çok fazla dayanıyor
  - Kamu iktisadi teşebbüsleri arasında kaynaklar için aşırı rekabet yaratır
  - Üretim ve tüketim tercihlerinde çok fazla bireysel özgürlüğe izin verir
explanation: |
  Merkezi planlama başarısız olur çünkü serbest piyasalarda çok önemli bir bilgi sistemi olarak hizmet eden fiyat mekanizmasını ortadan kaldırır. Arz ve talebe göre dalgalanan fiyatlar olmadan merkezi planlamacılar körü körüne çalışır, tüketicilerin gerçekte ne istediklerini, ne zaman istediklerini veya bunun için ne kadar fedakarlık yapmaya hazır olduklarını bilemezler. Fiyatlar karmaşık ekonomilerde bir pusula görevi görerek üreticileri gerçek tüketici ihtiyaçlarına uygun karlı fırsatlara yönlendirir. Yanlış cevaplar yanlıştır çünkü: merkezi planlama aslında kar güdüsüne dayanmak yerine onu ortadan kaldırır; tipik olarak rekabeti artırmak yerine azaltır; ve bireysel ekonomik özgürlüğe izin vermek yerine onu kısıtlar.
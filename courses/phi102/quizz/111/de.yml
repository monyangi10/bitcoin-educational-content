question: Was ist der Hauptgrund dafür, dass eine zentralisierte Wirtschaftsplanung die Produktion nach der Wirtschaftstheorie nicht effektiv koordinieren kann?
answer: Es fehlt an Preissignalen, die den tatsächlichen Bedarf der Verbraucher und die Produktionsprioritäten anzeigen
wrong_answers:
  - Sie stützt sich zu sehr auf Gewinnmotive, die die Entscheidungsfindung der Regierung korrumpieren
  - Sie schafft einen übermäßigen Wettbewerb zwischen staatlichen Unternehmen um Ressourcen
  - Sie lässt dem Einzelnen zu viel Freiheit bei Produktions- und Verbrauchsentscheidungen
explanation: |
  Die zentrale Planung scheitert, weil sie den Preismechanismus ausschaltet, der auf freien Märkten als entscheidendes Informationssystem dient. Ohne Preise, die auf der Grundlage von Angebot und Nachfrage schwanken, agieren die zentralen Planer blind und sind nicht in der Lage zu wissen, was die Verbraucher tatsächlich wollen, wann sie es wollen oder wie viel sie bereit sind, dafür zu opfern. Die Preise wirken in komplexen Volkswirtschaften wie ein Kompass, der den Produzenten den Weg zu profitablen Möglichkeiten weist, die mit den tatsächlichen Bedürfnissen der Verbraucher übereinstimmen. Die falschen Antworten sind falsch, denn: Zentralisierte Planung beseitigt eher das Gewinnmotiv, als dass sie sich darauf stützt; sie verringert in der Regel den Wettbewerb, anstatt ihn zu verstärken; und sie schränkt die individuelle wirtschaftliche Freiheit ein, anstatt sie zu ermöglichen.
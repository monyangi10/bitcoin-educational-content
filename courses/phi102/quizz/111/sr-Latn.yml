question: Koji je primarni razlog zbog kojeg centralizovano ekonomsko planiranje ne uspeva da efikasno koordinira proizvodnju prema ekonomskoj teoriji?
answer: Nedostaju mu cenovni signali koji bi ukazali na stvarne potrebe potrošača i proizvodne prioritete.
wrong_answers:
  - Oslanja se previše na motive profita koji korumpiraju donošenje odluka u vladi
  - Stvara prekomernu konkurenciju između državnih preduzeća za resurse
  - Omogućava previše individualne slobode u izborima proizvodnje i potrošnje
explanation: |
  Centralizovano planiranje ne uspeva jer eliminiše mehanizam cena koji služi kao ključni informacioni sistem na slobodnim tržištima. Bez cena koje fluktuiraju na osnovu ponude i potražnje, centralni planeri rade naslepo, nesposobni da znaju šta potrošači zaista žele, kada to žele, ili koliko su spremni da žrtvuju za to. Cene deluju kao kompas u složenim ekonomijama, usmeravajući proizvođače ka profitabilnim prilikama koje su u skladu sa stvarnim potrebama potrošača. Pogrešni odgovori su netačni jer: centralizovano planiranje zapravo eliminiše umesto da se oslanja na motive profita; obično smanjuje umesto da povećava konkurenciju; i ograničava umesto da omogućava individualnu ekonomsku slobodu.
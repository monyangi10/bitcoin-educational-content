question: Ni sababu gani kuu inayofanya mipango ya uchumi wa kati kushindwa kuratibu uzalishaji kwa ufanisi kulingana na nadharia ya kiuchumi?
answer: Haina ishara za bei zinazoonyesha mahitaji halisi ya watumiaji na vipaumbele vya uzalishaji
wrong_answers:
  - Inategemea sana nia za faida kuliko kupotosha maamuzi ya serikali
  - Inaleta ushindani mkubwa kati ya makampuni yanayomilikiwa na serikali kwa ajili ya rasilimali
  - Inaruhusu uhuru mwingi wa mtu binafsi katika uchaguzi wa uzalishaji na matumizi
explanation: |
  Kupanga kwa pamoja hushindwa kwa sababu huondoa utaratibu wa bei unaotumika kama mfumo muhimu wa taarifa katika masoko huria. Bila bei kubadilika kulingana na usambazaji na mahitaji, wapangaji wakuu hufanya kazi bila kujua, hawawezi kujua watumiaji wanataka nini hasa, wakati wanachotaka, au ni kiasi gani wako tayari kujitolea kwa ajili yake. Bei hufanya kazi kama dira katika uchumi mgumu, zikiwaongoza wazalishaji kuelekea fursa zenye faida zinazoendana na mahitaji halisi ya watumiaji. Majibu yasiyo sahihi si sahihi kwa sababu: kupanga kwa pamoja huondoa badala ya kutegemea nia ya faida; kwa kawaida hupunguza badala ya kuongeza ushindani; na huzuia badala ya kuruhusu uhuru wa kiuchumi wa mtu binafsi.
question: 찰스 두노이어의 원시 사회 분석은 자유의 본질에 대해 무엇을 보여줄 수 있을까요?
answer: 자유는 자연스러운 상태가 아니라 도덕적, 지적 발달을 필요로 하는 구조입니다
wrong_answers:
  - 원시 사회가 현대 문명 사회보다 더 큰 자유를 누렸다는 사실
  - 자연적 인간은 본질적으로 자유롭지만 사회 제도에 의해 타락한다는 믿음
  - 자유는 도덕적 발전 및 사회적 진보와 독립적으로 존재합니다
explanation: |
  여행자들의 기록을 바탕으로 원시 사회를 분석한 찰스 뒤노이어는 자유를 강화하기보다는 오히려 제한하는 방랑, 요실금, 임프레보아스와 같은 특성을 밝혀냈습니다. 이는 루소의 낭만적인 자연인관과 모순되는 것으로, 자유는 타고난 상태가 아니라 도덕적, 지적 발달을 통해 생겨나는 구성물이라는 것을 보여주었습니다. 자유는 인간의 도덕화와 산업화에 따라 달라지는 '불 드베니르와 불 아프렌티스'(되는 것과 배우는 과정)임을 강조하며 진정한 자유는 단순히 외부의 제약이 없는 것이 아니라 자기 통치 능력을 필요로 한다는 것을 보여 줍니다.
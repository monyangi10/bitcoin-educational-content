question: Co ukazuje analýza primitivních společností, kterou provedl Charles Dunoyer, o povaze svobody?
answer: Že svoboda je konstrukce vyžadující morální a intelektuální rozvoj, nikoli přirozený stav
wrong_answers:
  - Že primitivní společnosti měly větší svobodu než moderní civilizované společnosti
  - Že přirození lidé jsou přirozeně svobodní, ale zkažení společenskými institucemi
  - Že svoboda existuje nezávisle na morálním vývoji a společenském pokroku
explanation: |
  Analýza primitivních společností, kterou Charles Dunoyer provedl na základě vyprávění cestovatelů, odhalila rysy jako voracité, inkontinence a nepředvídavost, které svobodu spíše omezovaly, než aby ji posilovaly. To bylo v rozporu s Rousseauovým romantizujícím pohledem na přirozeného člověka a ukázalo, že svoboda není vrozený stav, ale spíše konstrukce, která vzniká morálním a intelektuálním vývojem. Text zdůrazňuje, že svoboda je "un devenir et un apprentissage" (stávání se a proces učení), který závisí na moralizaci a industrializaci člověka, a ukazuje, že skutečná svoboda vyžaduje spíše schopnost sebeřízení než pouhou absenci vnějších omezení.
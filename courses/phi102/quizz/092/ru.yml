question: Что анализ первобытных обществ, проведенный Шарлем Дюнойе, демонстрирует в отношении природы свободы?
answer: Что свобода - это конструкция, требующая морального и интеллектуального развития, а не естественное состояние
wrong_answers:
  - Что первобытные общества обладали большей свободой, чем современные цивилизованные общества
  - Что естественные люди по своей природе свободны, но испорчены социальными институтами
  - Что свобода существует независимо от нравственного развития и социального прогресса
explanation: |
  Анализ первобытных обществ, проведенный Шарлем Дюнойе на основе рассказов путешественников, выявил такие черты, как прожорливость, недержание и непроницательность, которые скорее ограничивали свободу, чем расширяли ее. Это противоречит романтизированному представлению Руссо о естественном человеке и демонстрирует, что свобода - это не врожденное состояние, а скорее конструкция, возникающая в процессе морального и интеллектуального развития. В тексте подчеркивается, что свобода - это "становление и обучение", зависящее от морализации и индустриализации человека, и показывается, что истинная свобода требует способности к самоуправлению, а не просто отсутствия внешних ограничений.
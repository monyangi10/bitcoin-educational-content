question: Ni igiki isesengura rya Charles Dunoyer ku mibano ya kera ryerekana ku bijanye n’ingene umwidegemvyo umeze?
answer: Uwo mwidegemvyo ni inyubakwa isaba gutera imbere mu vy’inyifato runtu no mu bwenge, si ikintu gisanzwe .
wrong_answers:
  - Ko imibano ya kera yari ifise umwidegemvyo mwinshi kuruta imibano y’ubu yateye imbere .
  - Ko abantu b’akameremere bafise umwidegemvyo mu kameremere ariko bononekajwe n’inzego z’imibano .
  - Uwo mwidegemvyo urabaho ata gutera imbere mu vy’inyifato runtu no mu kibano .
explanation: |
  Isesengura rya Charles Dunoyer ku mibano ya kera, ashingiye ku nkuru z’abagenzi, ryahishuye kamere nk’ukurya cane, ukudashobora kwifata be n’ukudashobora kwifata, mu vy’ukuri vyagabanya umwidegemvyo aho kuwutera imbere. Ivyo vyari bivuguruza ukuntu Rousseau abona umuntu kavukire mu buryo bw’urukundo, kandi vyerekana ko umwidegemvyo atari ikintu umuntu avukana, ahubwo ko ari inyubakwa ivuka biciye mu gutera imbere mu vy’inyifato runtu no mu bwenge. Ico canditswe gishimika ku vy’uko umwidegemvyo ari ‘un devenir et un apprentissage’ (uguhinduka n’ukwiga) bivana n’uguhindura abantu inyifato runtu n’uguhindura inganda, bikaba vyerekana ko umwidegemvyo nyawo usaba ubushobozi bwo kwitegeka aho gusaba ukubura gusa inzitizi zo hanze.
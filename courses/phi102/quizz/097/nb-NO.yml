question: Hva sier teksten om forholdet mellom teknologisk utvikling og optimalisering av frihet?
answer: Den teknologiske utviklingen gjør det mulig å oppnå maksimal nytteeffekt av frihet gjennom historiske fremskritt
wrong_answers:
  - Den teknologiske utviklingen begrenser friheten først og fremst ved å skape nye former for avhengighet og kontroll
  - Teknologisk utvikling er irrelevant for friheten, siden den bare påvirker materielle forhold, ikke friheten
  - Den teknologiske utviklingen garanterer automatisk frihet uten at det kreves læring eller moralsk utvikling
explanation: |
  Teksten sier eksplisitt at optimaliseringen av friheten for å oppnå maksimal nytteeffekt er muliggjort av den teknologiske og tekniske utviklingen som er et resultat av en lang historisk utvikling. Dette knytter teknologisk fremgang sammen med økt evne til å bruke friheten effektivt. De gale svarene gir en feilaktig fremstilling av dette forholdet ved å antyde at teknologi begrenser friheten, er irrelevant for den, eller automatisk garanterer den uten den nødvendige læringsprosessen som teksten fremhever som grunnleggende for riktig bruk av frihet.
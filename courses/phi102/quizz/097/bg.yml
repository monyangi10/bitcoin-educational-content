question: Какво подсказва текстът за връзката между технологичното развитие и оптимизирането на свободата?
answer: Технологичното развитие дава възможност за постигане на максимален полезен ефект от свободата чрез историческия прогрес
wrong_answers:
  - Технологичното развитие ограничава свободата най-вече чрез създаване на нови форми на зависимост и контрол
  - Технологичното развитие няма отношение към свободата, тъй като засяга само материалните условия, а не свободата
  - Технологичното развитие автоматично гарантира свободата, без да изисква обучение или морално развитие
explanation: |
  В текста изрично се посочва, че оптимизирането на свободата за постигане на максимален полезен ефект е възможно благодарение на технологичното и техническото развитие, което е резултат от дълъг исторически прогрес. По този начин технологичният напредък се свързва с повишената способност за ефективно използване на свободата. Неправилните отговори изопачават тази връзка, като предполагат, че технологиите ограничават свободата, нямат отношение към нея или автоматично я гарантират без необходимия процес на обучение, който текстът подчертава като основен за правилното използване на свободата.
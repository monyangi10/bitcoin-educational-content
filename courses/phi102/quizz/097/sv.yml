question: Vad säger texten om förhållandet mellan teknisk utveckling och optimering av frihet?
answer: Den tekniska utvecklingen gör det möjligt att uppnå maximal nyttoeffekt av frihet genom historiska framsteg
wrong_answers:
  - Den tekniska utvecklingen begränsar friheten främst genom att skapa nya former av beroende och kontroll
  - Den tekniska utvecklingen är irrelevant för friheten eftersom den endast påverkar materiella förhållanden, inte friheten
  - Den tekniska utvecklingen garanterar automatiskt frihet utan att det krävs någon inlärning eller moralisk utveckling
explanation: |
  I texten anges uttryckligen att optimeringen av friheten för att uppnå maximal nyttoeffekt möjliggörs genom teknisk utveckling som är resultatet av en lång historisk utveckling. Detta kopplar samman tekniska framsteg med en förbättrad förmåga att använda friheten effektivt. De felaktiga svaren ger en felaktig bild av detta förhållande genom att antyda att tekniken begränsar friheten, är irrelevant för den eller automatiskt garanterar den utan den nödvändiga inlärningsprocess som texten betonar som grundläggande för korrekt användning av friheten.
question: O que é que o texto sugere sobre a relação entre a evolução tecnológica e a otimização da liberdade?
answer: A evolução tecnológica permite obter o máximo efeito útil da liberdade através do progresso histórico
wrong_answers:
  - Os desenvolvimentos tecnológicos restringem essencialmente a liberdade ao criarem novas formas de dependência e de controlo
  - Os desenvolvimentos tecnológicos são irrelevantes para a liberdade, uma vez que apenas afectam as condições materiais, não a liberdade
  - A evolução tecnológica garante automaticamente a liberdade sem exigir qualquer aprendizagem ou desenvolvimento moral
explanation: |
  O texto afirma explicitamente que a otimização da liberdade para produzir o máximo efeito útil é possível graças aos desenvolvimentos tecnológicos e técnicos que são o resultado de um longo progresso histórico. Este facto relaciona o avanço tecnológico com o aumento da capacidade de usar a liberdade de forma eficaz. As respostas erradas deturpam essa relação, sugerindo que a tecnologia restringe a liberdade, é irrelevante para ela ou a garante automaticamente sem o necessário processo de aprendizagem que o texto enfatiza como fundamental para o uso correto da liberdade.
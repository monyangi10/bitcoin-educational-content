question: Wat suggereert de tekst over de relatie tussen technologische ontwikkelingen en het optimaliseren van vrijheid?
answer: Technologische ontwikkelingen maken het mogelijk om door historische vooruitgang een maximaal nuttig effect van vrijheid te bereiken
wrong_answers:
  - Technologische ontwikkelingen beperken vooral de vrijheid door nieuwe vormen van afhankelijkheid en controle te creëren
  - Technologische ontwikkelingen zijn irrelevant voor vrijheid omdat ze alleen invloed hebben op materiële omstandigheden, niet op vrijheid
  - Technologische ontwikkelingen garanderen automatisch vrijheid zonder dat daar enige scholing of morele ontwikkeling voor nodig is
explanation: |
  De tekst stelt expliciet dat de optimalisatie van vrijheid om een maximaal nuttig effect te bereiken mogelijk wordt gemaakt door technologische en technische ontwikkelingen die het resultaat zijn van lange historische vooruitgang. Dit verbindt technologische vooruitgang met de verbeterde capaciteit om vrijheid effectief te gebruiken. De foute antwoorden geven deze relatie verkeerd weer door te suggereren dat technologie vrijheid beperkt, er niet toe doet, of automatisch garandeert zonder het noodzakelijke leerproces dat de tekst benadrukt als fundamenteel voor juist gebruik van vrijheid.
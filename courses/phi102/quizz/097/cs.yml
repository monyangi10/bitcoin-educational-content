question: Co text naznačuje o vztahu mezi technologickým rozvojem a optimalizací svobody?
answer: Technologický vývoj umožňuje dosáhnout maximálního užitečného účinku svobody díky historickému pokroku
wrong_answers:
  - Technologický vývoj omezuje svobodu především tím, že vytváří nové formy závislosti a kontroly
  - Technologický vývoj je pro svobodu irelevantní, protože ovlivňuje pouze materiální podmínky, nikoli svobodu
  - Technologický vývoj automaticky zaručuje svobodu, aniž by vyžadoval jakékoli učení nebo morální rozvoj
explanation: |
  V textu se výslovně uvádí, že optimalizace svobody k dosažení maximálního užitečného účinku je umožněna technologickým a technickým vývojem, který je výsledkem dlouhého historického pokroku. To spojuje technologický pokrok se zvýšenou schopností efektivně využívat svobodu. Špatné odpovědi tento vztah zkreslují tím, že naznačují, že technologie svobodu omezuje, je pro ni irelevantní nebo ji automaticky zaručuje bez nutného procesu učení, který text zdůrazňuje jako zásadní pro správné využívání svobody.
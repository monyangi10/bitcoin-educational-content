question: Ico canditswe kivuga iki ku bijanye n’isano riri hagati y’iterambere ry’ubuhinga n’ugutuma umwidegemvyo ugira akamaro?
answer: Iterambere ry'ubuhinga rituma umuntu ashobora kuronka ingaruka nziza cane zivuye mu mwidegemvyo biciye mu gutera imbere mu mateka .
wrong_answers:
  - Iterambere ry'ubuhinga rigabanya canecane umwidegemvyo mu kurema uburyo bushasha bwo kwisunga no kugenzura .
  - Iterambere ry’ubuhinga ntaco rivuze ku mwidegemvyo kuko rigira ico rihinduye ku mibereho y’umubiri gusa, ntirigira ku mwidegemvyo .
  - Iterambere ry’ubuhinga rituma umuntu agira umwidegemvyo ata kwiga canke gutera imbere mu vy’inyifato runtu .
explanation: |
  Ico canditswe kivuga neza yuko ugutuma umwidegemvyo ugira ingaruka nziza cane bishobozwa n’iterambere ry’ubuhinga n’ubuhinga riterwa n’iterambere ry’amateka rirerire. Ivyo bihuza iterambere ry’ubuhinga n’ubushobozi bwo gukoresha neza umwidegemvyo. Inyishu zitari zo zigaragaza nabi iyo nzira mu gutanga iciyumviro c’uko ubuhinga bugabanya umwidegemvyo, ko butagira akamaro kuri wo, canke ko buyishingira intahe ata nzira y’ukwiga ikenewe ico canditswe gishimikirako nk’ishimikiro ryo gukoresha neza umwidegemvyo.
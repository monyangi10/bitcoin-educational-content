question: На какой экономический механизм опирается свобода договора, чтобы обе стороны получали выгоду от добровольного обмена?
answer: Субъективная оценка каждой стороны, которая делает обмен предпочтительным по сравнению с воздержанием от него
wrong_answers:
  - Государственное регулирование, обеспечивающее равное распределение выгод между договаривающимися сторонами
  - Контроль рыночных цен, гарантирующий справедливую компенсацию для всех участников обмена
  - Объективное измерение стоимости, создающее математически эквивалентную выгоду для обеих сторон
explanation: |
  Добровольные контракты приводят к взаимному обогащению, поскольку каждый индивид решает участвовать в них только тогда, когда субъективно ценит то, что он получает, больше, чем то, от чего он отказывается. Это субъективное предпочтение, а не какое-либо внешнее регулирование или объективное измерение стоимости, определяет положительно-суммовой характер добровольного обмена. Государственное регулирование или контроль над ценами фактически подорвут этот добровольный механизм, а объективное измерение стоимости игнорирует личные предпочтения, которые побуждают людей заключать договор в первую очередь.
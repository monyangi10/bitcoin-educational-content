question: Sözleşme özgürlüğü, her iki tarafın da gönüllü mübadelelerden fayda sağlamasını temin etmek için öncelikle hangi ekonomik mekanizmaya dayanır?
answer: Her bir tarafın, takası takastan kaçınmaya tercih edilebilir kılan öznel değerlendirmesi
wrong_answers:
  - Sözleşme tarafları arasında faydaların eşit dağılımını sağlayan devlet düzenlemesi
  - Borsadaki tüm katılımcılar için adil tazminatı garanti eden piyasa fiyat kontrolleri
  - Her iki taraf için de matematiksel olarak eşdeğer kazançlar yaratan objektif değer ölçümü
explanation: |
  Gönüllü sözleşmeler karşılıklı zenginleşme yaratır, çünkü her birey sadece öznel olarak aldıklarına verdiklerinden daha fazla değer verdiğinde katılmayı seçer. Bu öznel tercih, herhangi bir dış düzenleme veya nesnel değer ölçümünden ziyade, gönüllü mübadelenin pozitif toplamlı doğasını yönlendirir. Devlet düzenlemeleri ya da fiyat kontrolleri aslında bu gönüllü mekanizmayı baltalayacaktır, objektif değer ölçümü ise bireyleri ilk etapta sözleşme yapmaya motive eden kişisel tercihleri göz ardı eder.
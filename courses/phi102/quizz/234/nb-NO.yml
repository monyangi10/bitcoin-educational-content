question: Hvilken økonomisk mekanisme er det kontraktsfriheten først og fremst baserer seg på for å sikre at begge parter drar nytte av frivillige utvekslinger?
answer: Hver parts subjektive vurdering som gjør at utvekslingen er å foretrekke fremfor å avstå fra den
wrong_answers:
  - Statlig regulering som sikrer lik fordeling av goder mellom avtalepartene
  - Markedspriskontroller som garanterer rettferdig kompensasjon for alle deltakere på børsen
  - Objektiv verdimåling som skaper matematisk like store gevinster for begge parter
explanation: |
  Frivillige kontrakter skaper gjensidig berikelse fordi hver enkelt person velger å delta bare når de subjektivt verdsetter det de får mer enn det de gir fra seg. Det er denne subjektive preferansen, og ikke noen ekstern regulering eller objektiv verdimåling, som er drivkraften bak den positive summen i frivillig bytte. Statlige reguleringer eller priskontroller vil faktisk undergrave denne frivillige mekanismen, mens objektiv verdimåling ignorerer de personlige preferansene som motiverer individer til å inngå kontrakter i utgangspunktet.
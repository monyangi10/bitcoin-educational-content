question: Auf welchen wirtschaftlichen Mechanismus stützt sich die Vertragsfreiheit in erster Linie, um sicherzustellen, dass beide Parteien von einem freiwilligen Tausch profitieren?
answer: Die subjektive Bewertung jeder Partei, die den Austausch dem Verzicht auf ihn vorzieht
wrong_answers:
  - Staatliche Regulierung, die eine gleichmäßige Verteilung der Vorteile zwischen den Vertragspartnern gewährleistet
  - Marktpreiskontrollen, die einen fairen Ausgleich für alle Teilnehmer an der Börse garantieren
  - Objektive Messung des Wertes, die für beide Seiten mathematisch gleichwertige Gewinne schafft
explanation: |
  Freiwillige Verträge führen zu gegenseitiger Bereicherung, weil jeder Einzelne sich nur dann zur Teilnahme entschließt, wenn er das, was er erhält, subjektiv mehr schätzt als das, was er aufgibt. Diese subjektive Präferenz und nicht eine externe Regulierung oder objektive Wertmessung ist der Grund für den positiven Summencharakter des freiwilligen Austauschs. Staatliche Regulierung oder Preiskontrollen würden diesen freiwilligen Mechanismus untergraben, während die objektive Wertmessung die persönlichen Präferenzen ignoriert, die den Einzelnen überhaupt erst dazu motivieren, einen Vertrag abzuschließen.
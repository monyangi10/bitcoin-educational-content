question: مکانیسم اقتصادی که آزادی قراردادی عمدتاً به آن متکی است تا اطمینان حاصل کند که هر دو طرف از مبادلات داوطلبانه بهره‌مند می‌شوند چیست؟
answer: ارزیابی ذهنی هر طرف که مبادله را به خودداری از آن ترجیح می‌دهد
wrong_answers:
  - مقررات دولتی که توزیع برابر منافع بین طرفین قرارداد را تضمین می‌کند
  - کنترل‌های قیمت بازار که جبران منصفانه برای همه شرکت‌کنندگان در مبادله را تضمین می‌کند
  - اندازه‌گیری عینی ارزش که سودهای معادل ریاضی برای هر دو طرف ایجاد می‌کند
explanation: |
  قراردادهای داوطلبانه باعث غنای متقابل می‌شوند زیرا هر فرد تنها زمانی تصمیم به مشارکت می‌گیرد که به صورت ذهنی ارزش آنچه دریافت می‌کند را بیشتر از آنچه که از دست می‌دهد، بداند. این ترجیح ذهنی، به جای هرگونه مقررات خارجی یا اندازه‌گیری ارزش عینی، محرک طبیعت مثبت‌جمع مبادله داوطلبانه است. مقررات دولتی یا کنترل قیمت در واقع این مکانیزم داوطلبانه را تضعیف می‌کنند، در حالی که اندازه‌گیری ارزش عینی، ترجیحات شخصی که افراد را به قرارداد بستن ترغیب می‌کند، نادیده می‌گیرد.
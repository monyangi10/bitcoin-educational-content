question: Mekanisme ekonomi apa yang menjadi dasar kebebasan kontrak untuk memastikan bahwa kedua belah pihak mendapatkan keuntungan dari pertukaran sukarela?
answer: Penilaian subjektif masing-masing pihak yang membuat pertukaran lebih disukai daripada tidak melakukannya
wrong_answers:
  - Peraturan pemerintah yang memastikan distribusi manfaat yang setara antara pihak-pihak yang berkontrak
  - Kontrol harga pasar yang menjamin kompensasi yang adil bagi semua peserta di bursa
  - Pengukuran nilai objektif yang menciptakan keuntungan yang setara secara matematis bagi kedua belah pihak
explanation: |
  Kontrak sukarela menciptakan pengayaan timbal balik karena setiap individu memilih untuk berpartisipasi hanya jika mereka secara subjektif menghargai apa yang mereka terima lebih dari apa yang mereka lepaskan. Preferensi subjektif ini, dan bukannya peraturan eksternal atau pengukuran nilai objektif, mendorong sifat pertukaran sukarela yang bersifat positif. Regulasi pemerintah atau kontrol harga justru akan merusak mekanisme sukarela ini, sementara pengukuran nilai objektif mengabaikan preferensi pribadi yang memotivasi individu untuk melakukan kontrak.
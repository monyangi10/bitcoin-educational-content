question: Op welk economisch mechanisme vertrouwt contractuele vrijheid voornamelijk om ervoor te zorgen dat beide partijen profiteren van vrijwillige uitwisselingen?
answer: De subjectieve waardering van elke partij waardoor de uitwisseling te verkiezen is boven het niet deelnemen aan de uitwisseling
wrong_answers:
  - Overheidsregulering die zorgt voor een gelijke verdeling van voordelen tussen contractpartijen
  - Marktprijscontroles die een eerlijke compensatie voor alle deelnemers aan de beurs garanderen
  - Objectieve waardemeting die mathematisch gelijkwaardige winsten oplevert voor beide partijen
explanation: |
  Vrijwillige contracten creëren wederzijdse verrijking omdat elk individu er alleen voor kiest om deel te nemen als hij subjectief meer waarde hecht aan wat hij ontvangt dan aan wat hij opgeeft. Deze subjectieve voorkeur, eerder dan enige externe regulering of objectieve waardemeting, bepaalt de positieve aard van vrijwillige ruil. Overheidsregulering of prijscontroles zouden dit vrijwillige mechanisme juist ondermijnen, terwijl objectieve waardemeting de persoonlijke voorkeuren negeert die individuen in de eerste plaats motiveren om contracten af te sluiten.
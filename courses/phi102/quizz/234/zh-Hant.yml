question: 契約自由主要依靠什麼經濟機制來確保雙方都能從自願交換中獲益？
answer: 每一方的主觀價值，使得交換比放棄交換更可取
wrong_answers:
  - 確保訂約雙方利益平均分配的政府法規
  - 保證交易所所有參與者獲得公平報酬的市場價格控制
  - 客觀的價值測量，為雙方創造數學上等值的收益
explanation: |
  自願契約創造了互惠互利，因為每個人只有在他們主觀上重視他們所得到的多於他們所放棄的時，才會選擇參與。這種主觀的偏好，而非任何外在的規範或客觀的價值衡量，推動了自願交換的正和本質。政府的管制或價格控制實際上會破壞這種自願機制，而客觀的價值衡量則忽略了個人的偏好，而個人偏好正是締結契約的動機。
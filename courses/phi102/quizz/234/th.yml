question: กลไกทางเศรษฐกิจใดที่เสรีภาพในสัญญาพึ่งพาเป็นหลักเพื่อให้แน่ใจว่าทั้งสองฝ่ายได้รับประโยชน์จากการแลกเปลี่ยนโดยสมัครใจ?
answer: การประเมินมูลค่าเชิงอัตวิสัยของแต่ละฝ่ายที่ทำให้การแลกเปลี่ยนเป็นที่น่าพึงพอใจมากกว่าการงดเว้นจากการแลกเปลี่ยนนั้น
wrong_answers:
  - กฎระเบียบของรัฐบาลที่รับรองการกระจายผลประโยชน์อย่างเท่าเทียมกันระหว่างคู่สัญญา
  - การควบคุมราคาตลาดที่รับประกันค่าตอบแทนที่เป็นธรรมสำหรับผู้เข้าร่วมทุกคนในการแลกเปลี่ยน
  - การวัดมูลค่าเชิงวัตถุประสงค์ที่สร้างผลกำไรที่เทียบเท่าทางคณิตศาสตร์สำหรับทั้งสองฝ่าย
explanation: |
  สัญญาโดยสมัครใจสร้างความมั่งคั่งร่วมกันเพราะแต่ละบุคคลเลือกที่จะเข้าร่วมเฉพาะเมื่อพวกเขาให้คุณค่ากับสิ่งที่ได้รับมากกว่าสิ่งที่พวกเขายอมสละ นี่คือความชอบส่วนบุคคล ไม่ใช่กฎระเบียบภายนอกหรือการวัดมูลค่าเชิงวัตถุ ที่ขับเคลื่อนธรรมชาติของการแลกเปลี่ยนโดยสมัครใจที่เป็นบวก การควบคุมของรัฐบาลหรือการควบคุมราคาจะบ่อนทำลายกลไกโดยสมัครใจนี้ ในขณะที่การวัดมูลค่าเชิงวัตถุจะมองข้ามความชอบส่วนบุคคลที่กระตุ้นให้บุคคลทำสัญญาตั้งแต่แรก
question: Wat is volgens de gepresenteerde kritiek het fundamentele verschil tussen individuele en politieke besluitvormingsprocessen?
answer: Individuele beslissingen gaan gepaard met langzame, vreedzame beraadslagingen met persoonlijke verantwoordelijkheid voor de gevolgen, terwijl politieke beslissingen voortkomen uit electorale opwinding en kortetermijndenken
wrong_answers:
  - Individuele beslissingen zijn gebaseerd op emotionele impulsen, terwijl politieke beslissingen worden genomen op basis van rationele collectieve analyse en langetermijnplanning
  - Individuele beslissingen zijn gericht op persoonlijk gewin, terwijl politieke beslissingen prioriteit geven aan het algemeen belang door middel van democratische consensus en wijsheid van de meerderheid
  - Individuele beslissingen missen expertise, terwijl politieke beslissingen profiteren van gespecialiseerde kennis en professionele competentie van gekozen vertegenwoordigers
explanation: |
  De tekst zet individuele besluitvorming, waarbij men zorgvuldig observeert en rustig nadenkt voordat men handelt, duidelijk af tegen politieke besluitvorming die voortkomt uit verkiezingskoorts en onrust. Individuele beslissingen stellen mensen in staat om de gevolgen van hun keuzes te voelen en hun gedrag dienovereenkomstig aan te passen, terwijl politieke beslissingen worden genomen in een klimaat van kortetermijndenken dat ongeschikt is voor de complexe oordelen die nodig zijn. De foute antwoorden weerspiegelen gangbare verdedigingen van politieke processen die in het hoofdstuk expliciet worden verworpen.
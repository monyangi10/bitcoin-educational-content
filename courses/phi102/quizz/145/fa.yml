question: بر اساس نقد ارائه شده، تفاوت اساسی بین فرآیندهای تصمیم‌گیری فردی و تصمیم‌گیری سیاسی چیست؟
answer: تصمیمات فردی شامل بررسی‌های آهسته و آرام با مسئولیت شخصی برای پیامدها هستند، در حالی که تصمیمات سیاسی از تحریکات انتخاباتی و تفکر کوتاه‌مدت ناشی می‌شوند.
wrong_answers:
  - تصمیمات فردی بر اساس انگیزه‌های احساسی گرفته می‌شوند، در حالی که تصمیمات سیاسی از طریق تحلیل جمعی منطقی و برنامه‌ریزی بلندمدت انجام می‌شوند.
  - تصمیمات فردی بر سود شخصی تمرکز دارند، در حالی که تصمیمات سیاسی از طریق اجماع دموکراتیک و خرد اکثریت، اولویت را به خیر عمومی می‌دهند.
  - تصمیمات فردی فاقد تخصص هستند، در حالی که تصمیمات سیاسی از دانش تخصصی و شایستگی حرفه‌ای نمایندگان منتخب بهره‌مند می‌شوند.
explanation: |
  متن به وضوح تصمیم‌گیری فردی را که شامل مشاهده دقیق و تأمل آرام قبل از اقدام است، با تصمیم‌گیری سیاسی که از تب انتخاباتی و تحریک ناشی می‌شود، مقایسه می‌کند. تصمیمات فردی به افراد اجازه می‌دهد تا پیامدهای انتخاب‌های خود را احساس کرده و رفتار خود را بر این اساس تعدیل کنند، در حالی که تصمیمات سیاسی در فضایی از کوتاه‌مدت‌گرایی اتخاذ می‌شوند که برای قضاوت‌های پیچیده مورد نیاز مناسب نیست. پاسخ‌های نادرست دفاعیات رایج از فرآیندهای سیاسی را منعکس می‌کنند که فصل به‌طور صریح آن‌ها را رد می‌کند.
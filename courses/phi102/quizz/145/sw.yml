question: Kulingana na ukosoaji uliowasilishwa, ni tofauti gani ya msingi kati ya michakato ya kufanya maamuzi ya mtu binafsi na michakato ya kufanya maamuzi ya kisiasa?
answer: Maamuzi ya mtu binafsi yanahusisha majadiliano ya polepole na ya amani na uwajibikaji wa kibinafsi kwa matokeo, huku maamuzi ya kisiasa yakitokana na ghasia za uchaguzi na mawazo ya muda mfupi.
wrong_answers:
  - Maamuzi ya mtu binafsi yanategemea misukumo ya kihisia huku maamuzi ya kisiasa yakifanywa kupitia uchambuzi wa pamoja wenye mantiki na mipango ya muda mrefu.
  - Maamuzi ya mtu binafsi yanalenga faida binafsi huku maamuzi ya kisiasa yakipa kipaumbele manufaa ya wote kupitia makubaliano ya kidemokrasia na hekima ya wengi.
  - Maamuzi ya kibinafsi hayana utaalamu huku maamuzi ya kisiasa yakinufaika na maarifa maalum na uwezo wa kitaaluma wa wawakilishi waliochaguliwa.
explanation: |
  Maandishi yanatofautisha waziwazi ufanyaji maamuzi wa mtu binafsi, ambao unahusisha uchunguzi makini na tafakari ya amani kabla ya kutenda, na ufanyaji maamuzi wa kisiasa unaotokana na homa ya uchaguzi na msukosuko. Maamuzi ya mtu binafsi huwaruhusu watu kuhisi matokeo ya uchaguzi wao na kurekebisha tabia zao ipasavyo, huku maamuzi ya kisiasa yakifanywa katika hali ya muda mfupi isiyofaa kwa hukumu ngumu zinazohitajika. Majibu yasiyo sahihi yanaonyesha ulinzi wa kawaida wa michakato ya kisiasa ambayo sura hiyo inakataa waziwazi.
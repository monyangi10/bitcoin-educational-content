question: Jaký je podle předložené kritiky zásadní rozdíl mezi individuálním rozhodováním a politickým rozhodovacím procesem?
answer: Individuální rozhodnutí zahrnují pomalé, klidné zvažování s osobní odpovědností za důsledky, zatímco politická rozhodnutí vznikají na základě volební agitace a krátkodobého uvažování
wrong_answers:
  - Individuální rozhodnutí jsou založena na emocionálních impulsech, zatímco politická rozhodnutí jsou přijímána na základě racionální kolektivní analýzy a dlouhodobého plánování
  - Individuální rozhodnutí se zaměřují na osobní prospěch, zatímco politická rozhodnutí upřednostňují společné dobro prostřednictvím demokratického konsensu a moudrosti většiny
  - Individuální rozhodnutí postrádají odbornost, zatímco politická rozhodnutí těží ze specializovaných znalostí a odborné způsobilosti volených zástupců
explanation: |
  Text jasně staví do protikladu individuální rozhodování, které zahrnuje pečlivé pozorování a klidné uvažování před jednáním, a politické rozhodování, které vzniká v důsledku volební horečky a agitace. Individuální rozhodování umožňuje lidem pocítit důsledky svých rozhodnutí a podle toho upravit své chování, zatímco politická rozhodnutí jsou činěna v atmosféře krátkodobosti nevhodné pro komplexní úsudky, které jsou zapotřebí. Špatné odpovědi odrážejí běžné obhajoby politických procesů, které kapitola výslovně odmítá.
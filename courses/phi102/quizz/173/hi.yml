question: According to Paul Leroy-Beaulieu's analysis, what makes communist slavery worse than traditional slavery?
answer: In communist systems, individuals have no possibility of earning money or buying their freedom, creating inescapable bondage
wrong_answers:
  - Communist slavery involves more physical punishment and harsher working conditions than traditional slavery
  - Traditional slaves had access to education while communist workers are deliberately kept ignorant by the state
  - Communist slavery lasts longer in duration compared to the temporary nature of traditional slavery systems
explanation: |
  Leroy-Beaulieu argued that communist slavery was worse than traditional slavery because it eliminated any path to freedom. While traditional slaves could sometimes accumulate money (pécule) and potentially purchase their freedom, communist systems provided no such escape route. Individuals were permanently deprived of liberty with no possibility of achieving self-ownership, individual autonomy, or freedom to act according to their own conceptions. The other options focus on physical conditions, education, or duration, which were not the core of Leroy-Beaulieu's argument about the fundamental impossibility of liberation.
question: بر اساس تحلیل پل لروی-بولو، چه چیزی برده‌داری کمونیستی را بدتر از برده‌داری سنتی می‌کند؟
answer: در سیستم‌های کمونیستی، افراد هیچ امکانی برای کسب درآمد یا خرید آزادی خود ندارند، که منجر به اسارت غیرقابل فرار می‌شود.
wrong_answers:
  - برده‌داری کمونیستی شامل مجازات‌های بدنی بیشتر و شرایط کاری سخت‌تر از برده‌داری سنتی است.
  - بردگان سنتی به آموزش دسترسی داشتند، در حالی که کارگران کمونیست عمداً توسط دولت در نادانی نگه داشته می‌شوند.
  - برده‌داری کمونیستی از نظر مدت زمان طولانی‌تر از ماهیت موقتی سیستم‌های برده‌داری سنتی است.
explanation: |
  لروی-بولو استدلال کرد که بردگی کمونیستی بدتر از بردگی سنتی است زیرا هر راهی به سوی آزادی را از بین می‌برد. در حالی که بردگان سنتی گاهی می‌توانستند پول (پکول) جمع کنند و به طور بالقوه آزادی خود را بخرند، سیستم‌های کمونیستی هیچ راه فراری ارائه نمی‌دادند. افراد به طور دائمی از آزادی محروم می‌شدند و هیچ امکانی برای دستیابی به مالکیت خود، خودمختاری فردی یا آزادی برای عمل بر اساس تصورات خود نداشتند. گزینه‌های دیگر بر شرایط فیزیکی، آموزش یا مدت زمان تمرکز دارند که هسته اصلی استدلال لروی-بولو درباره عدم امکان بنیادی رهایی نبودند.
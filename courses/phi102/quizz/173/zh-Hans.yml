question: 根据保罗-勒鲁瓦-博略的分析，共产主义奴隶制比传统奴隶制更糟糕的原因是什么？
answer: 在共产主义制度下，个人没有赚钱或购买自由的可能，这就造成了无法摆脱的束缚
wrong_answers:
  - 与传统奴隶制相比，共产主义奴隶制涉及更多的体罚和更恶劣的工作条件
  - 传统奴隶有机会接受教育，而共产主义工人则被国家故意愚弄
  - 与传统奴隶制的临时性相比，共产主义奴隶制的持续时间更长
explanation: |
  勒鲁瓦-博略（Leroy-Beaulieu）认为，共产主义奴隶制比传统奴隶制更糟糕，因为它消除了任何获得自由的途径。传统奴隶制有时可以积累金钱（pécule）并有可能购买自由，而共产主义制度却没有提供这样的逃脱途径。个人被永久剥夺了自由，不可能实现自我所有权、个人自治或按照自己的观念行事的自由。其他选择主要集中在物质条件、教育或期限上，而这些并非勒鲁瓦-博略关于解放根本不可能的论点的核心。
question: Según el análisis de Paul Leroy-Beaulieu, ¿qué hace que la esclavitud comunista sea peor que la esclavitud tradicional?
answer: En los sistemas comunistas, los individuos no tienen posibilidad de ganar dinero ni de comprar su libertad, lo que crea una esclavitud ineludible
wrong_answers:
  - La esclavitud comunista implica más castigos físicos y condiciones de trabajo más duras que la esclavitud tradicional
  - Los esclavos tradicionales tenían acceso a la educación, mientras que el Estado mantiene deliberadamente ignorantes a los trabajadores comunistas
  - La esclavitud comunista es más duradera que la esclavitud tradicional, de carácter temporal
explanation: |
  Leroy-Beaulieu sostenía que la esclavitud comunista era peor que la tradicional porque eliminaba cualquier vía de libertad. Mientras que los esclavos tradicionales podían a veces acumular dinero (pécule) y comprar potencialmente su libertad, los sistemas comunistas no ofrecían esa vía de escape. Los individuos estaban permanentemente privados de libertad sin posibilidad de alcanzar la autopropiedad, la autonomía individual o la libertad de actuar según sus propias concepciones. Las otras opciones se centran en las condiciones físicas, la educación o la duración, que no eran el núcleo del argumento de Leroy-Beaulieu sobre la imposibilidad fundamental de la liberación.
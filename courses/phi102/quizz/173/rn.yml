question: Dukurikije icegeranyo ca Paul Leroy-Beaulieu, ni igiki gituma ubuja bw’abakomunisita buba bubi kuruta ubuja bwa kera?
answer: Mu ntwaro z’abakomunisita, abantu ku giti cabo nta bushobozi bafise bwo kuronka amahera canke kugura umwidegemvyo wabo, ivyo bikaba bituma haba ubuja butagira uko bungana .
wrong_answers:
  - Ubuja bw’abakomunisita bujanye n’ibihano vyinshi vyo ku mubiri be n’ibikorwa bikomeye kuruta ubuja bwa kera .
  - Abaja b’imigenzo bari bafise uburenganzira bwo kwiga mu gihe abakozi b’abakomunisita baguma batagira ico bazi na Leta .
  - Ubuja bw’abakomunisita buramara igihe kirekire cane ugereranije n’ingene ubuja bwa kera bwari ubw’igihe gito .
explanation: |
  Leroy-Beaulieu yavuze ko ubuja bw’abakomunisita bwari bubi kuruta ubuja bwa kera kuko bwakuraho inzira iyo ari yo yose yo kwidegemvya. Naho rimwe na rimwe abaja b’imigenzo bashobora kwirundanira amahera (pécule) maze bagashobora kugura umwidegemvyo wabo, uburyo bw’abakomunisita ntibwatanga iyo nzira yo guhunga. Abantu ku giti cabo baramburwa umwidegemvyo ubudasiba ata n’ubushobozi bwo kwironsa, kwigenga ku giti cabo canke umwidegemvyo wo gukora ivyo bo ubwabo biyumvira. Ayandi mahitamwo yibanda ku mibereho y’umubiri, inyigisho canke igihe umuntu amara, ivyo bikaba bitari vyo vyari bishingiyeko ivyiyumviro vya Leroy-Beaulieu ku bijanye n’ukudashoboka kw’ishimikiro kw’ukwidegemvya.
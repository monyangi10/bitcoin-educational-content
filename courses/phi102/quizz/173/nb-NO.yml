question: Hva gjør kommunistisk slaveri verre enn tradisjonelt slaveri, ifølge Paul Leroy-Beaulieus analyse?
answer: I kommunistiske systemer har individene ingen mulighet til å tjene penger eller kjøpe seg fri, noe som skaper uunngåelig trelldom
wrong_answers:
  - Kommunistisk slaveri innebærer mer fysisk avstraffelse og hardere arbeidsforhold enn tradisjonelt slaveri
  - Tradisjonelle slaver hadde tilgang til utdanning, mens kommunistiske arbeidere bevisst holdes uvitende av staten
  - Kommunistisk slaveri varer lenger enn det tradisjonelle slaveriet, som er av midlertidig karakter
explanation: |
  Leroy-Beaulieu hevdet at kommunistisk slaveri var verre enn tradisjonelt slaveri fordi det eliminerte enhver vei til frihet. Mens tradisjonelle slaver noen ganger kunne samle penger (pécule) og potensielt kjøpe seg fri, ga kommunistiske systemer ingen slik fluktrute. Individer ble permanent fratatt friheten uten mulighet til å oppnå selveierskap, individuell autonomi eller frihet til å handle etter egne oppfatninger. De andre alternativene fokuserer på fysiske forhold, utdanning eller varighet, som ikke var kjernen i Leroy-Beaulieus argument om frigjøringens grunnleggende umulighet.
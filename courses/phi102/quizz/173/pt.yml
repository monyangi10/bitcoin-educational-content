question: De acordo com a análise de Paul Leroy-Beaulieu, o que torna a escravatura comunista pior do que a escravatura tradicional?
answer: Nos sistemas comunistas, os indivíduos não têm qualquer possibilidade de ganhar dinheiro ou de comprar a sua liberdade, criando uma escravatura inevitável
wrong_answers:
  - A escravatura comunista envolve mais castigos físicos e condições de trabalho mais duras do que a escravatura tradicional
  - Os escravos tradicionais tinham acesso à educação, enquanto os trabalhadores comunistas são deliberadamente mantidos na ignorância pelo Estado
  - A escravatura comunista tem uma duração mais longa do que o carácter temporário dos sistemas de escravatura tradicionais
explanation: |
  Leroy-Beaulieu argumentava que a escravatura comunista era pior do que a escravatura tradicional porque eliminava qualquer via de liberdade. Enquanto os escravos tradicionais podiam, por vezes, acumular dinheiro (pécule) e potencialmente comprar a sua liberdade, os sistemas comunistas não ofereciam tal via de escape. Os indivíduos eram permanentemente privados de liberdade, sem qualquer possibilidade de se tornarem proprietários de si próprios, de terem autonomia individual ou de agirem de acordo com as suas próprias concepções. As outras opções centram-se nas condições físicas, na educação ou na duração, que não eram o cerne do argumento de Leroy-Beaulieu sobre a impossibilidade fundamental da libertação.
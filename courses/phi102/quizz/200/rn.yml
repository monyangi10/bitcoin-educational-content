question: Mu vyo Bastiat anegura ubutunzi, ni irihe kosa ry’ishimikiro ry’ubwenge rishingiye ku ciyumviro c’abakingira igihugu c’uko Ubufaransa bukwiye kwirinda gutunga Ubwongereza biciye mu bucuruzi?
answer: Iciyumviro c’ikinyoma c’uko inyungu z’ubutunzi zirwanya aho guhuza mu guhanahana amakuru ku bushake .
wrong_answers:
  - Iciyumviro kitari co c’uko Ubufaransa butagira ubutunzi buhagije bwo guhangana n’Ubwongereza .
  - "Iciyumviro kitari co c'uko ubushobozi bw'inganda bw'Ubwongereza buyiha akamaro katari ko mu vy'ubuhinga"
  - Iciyumviro kitari co c’uko amadeni y’ubudandaji ahita atera ugusubira inyuma kw’ubutunzi bw’igihugu .
explanation: |
  Bastiat yerekanye ko abaharanira uburinzi bw’igihugu babona nabi imigenderanire y’ubutunzi biciye ku nzira ya kera y’inyungu zihushanye, nk’uko nyene imiryango ya kera yarwana kubera ahantu ho guhigira. Mu vy’ukuri, uguhanahana amakuru ku bushake biragirira akamaro abo bompi - iyo abakiriya n’abaguzi bagurisha mu mwidegemvyo, bompi bararonka agaciro. Ubwoba bw’abanyagihugu bwo ‘gutunga abansi’ biciye mu bucuruzi bugaragaza ukutumvikana kw’ishimikiro kw’ingene imigenderanire y’isoko ikora, aho inyungu rusangi aho guhiganwa ataco bimaze ari vyo biranga imigenderanire nyakuri y’ubutunzi.
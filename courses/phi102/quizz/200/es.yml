question: En la crítica de Bastiat a los sofismas económicos, ¿qué error lógico fundamental subyace en el argumento proteccionista de que Francia debe evitar enriquecer a Inglaterra mediante el comercio?
answer: El falso supuesto de que los intereses económicos son antagónicos en lugar de armoniosos en los intercambios voluntarios
wrong_answers:
  - La creencia errónea de que Francia carece de recursos naturales suficientes para competir con Inglaterra
  - "La idea errónea de que la capacidad industrial de Inglaterra le da una ventaja tecnológica injusta"
  - La suposición errónea de que los déficits comerciales conducen automáticamente al declive económico nacional
explanation: |
  Bastiat señaló que los proteccionistas ven erróneamente las relaciones económicas a través de una lente arcaica de intereses contrapuestos, similar a las antiguas tribus que luchaban por los cotos de caza. En realidad, los intercambios voluntarios benefician a ambas partes: cuando clientes y proveedores comercian libremente, ambos ganan valor. El temor proteccionista a "enriquecer a los enemigos" a través del comercio refleja una incomprensión fundamental del funcionamiento de las relaciones de mercado, en las que el beneficio mutuo y no la competencia de suma cero caracterizan las interacciones económicas genuinas.
question: Коя основна логическа грешка в критиката на Бастиа на икономическите софизми е в основата на протекционисткия аргумент, че Франция трябва да избягва обогатяването на Англия чрез търговия?
answer: Погрешното предположение, че икономическите интереси са антагонистични, а не хармонични при доброволния обмен
wrong_answers:
  - Неправилното убеждение, че Франция не разполага с достатъчно природни ресурси, за да се конкурира с Англия
  - "Погрешната представа, че индустриалният капацитет на Англия й дава несправедливо технологично предимство"
  - Погрешното предположение, че търговските дефицити автоматично водят до спад на националната икономика
explanation: |
  Бастиа установява, че протекционистите погрешно разглеждат икономическите отношения през архаична оптика на конфликтни интереси, подобно на древните племена, които се борят за ловни територии. В действителност доброволната размяна е от полза и за двете страни - когато клиентите и доставчиците търгуват свободно, и двете страни печелят. Страхът на протекционистите от "обогатяване на враговете" чрез търговията отразява фундаментално неразбиране на начина, по който функционират пазарните отношения, при които взаимната изгода, а не конкуренцията с нулев резултат, характеризира истинските икономически взаимодействия.
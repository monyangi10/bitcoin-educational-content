question: I Bastiats kritik av ekonomiska sofismer, vilket grundläggande logiskt fel ligger till grund för det protektionistiska argumentet att Frankrike bör undvika att berika England genom handel?
answer: Det felaktiga antagandet att ekonomiska intressen är antagonistiska snarare än harmoniska i frivilliga utbyten
wrong_answers:
  - Den felaktiga uppfattningen att Frankrike saknar tillräckliga naturresurser för att konkurrera med England
  - "Den felaktiga uppfattningen att Englands industriella kapacitet ger landet en orättvis teknisk fördel"
  - Det felaktiga antagandet att underskott i handelsbalansen automatiskt leder till ekonomisk nedgång i ett land
explanation: |
  Bastiat konstaterade att protektionisterna felaktigt ser ekonomiska relationer genom en ålderdomlig lins av motstridiga intressen, liknande gamla stammar som slåss om jaktmarker. I själva verket gynnar frivilliga utbyten båda parter - när kunder och leverantörer handlar fritt får båda ett mervärde. Den protektionistiska rädslan för att "berika fiender" genom handel återspeglar en grundläggande missuppfattning av hur marknadsrelationer fungerar, där ömsesidig nytta snarare än nollsummespel kännetecknar genuina ekonomiska interaktioner.
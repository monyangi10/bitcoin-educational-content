question: Dalam kritik Bastiat terhadap sofisme ekonomi, kesalahan logis mendasar apa yang mendasari argumen proteksionis bahwa Prancis harus menghindari memperkaya Inggris melalui perdagangan?
answer: Asumsi keliru bahwa kepentingan ekonomi bersifat antagonis dan bukannya harmonis dalam pertukaran sukarela
wrong_answers:
  - Keyakinan yang salah bahwa Prancis tidak memiliki sumber daya alam yang cukup untuk bersaing dengan Inggris
  - "Gagasan yang keliru bahwa kapasitas industri Inggris memberikan keuntungan teknologi yang tidak adil"
  - Asumsi yang keliru bahwa defisit perdagangan secara otomatis menyebabkan penurunan ekonomi nasional
explanation: |
  Bastiat mengidentifikasi bahwa kaum proteksionis secara keliru melihat hubungan ekonomi melalui lensa kuno yang penuh dengan kepentingan yang saling bertentangan, seperti suku-suku kuno yang memperebutkan wilayah perburuan. Pada kenyataannya, pertukaran sukarela menguntungkan kedua belah pihak - ketika pelanggan dan pemasok berdagang secara bebas, keduanya mendapatkan nilai tambah. Ketakutan proteksionis untuk 'memperkaya musuh' melalui perdagangan mencerminkan kesalahpahaman mendasar tentang bagaimana hubungan pasar bekerja, di mana saling menguntungkan dan bukannya persaingan tanpa hasil menjadi ciri interaksi ekonomi yang sesungguhnya.
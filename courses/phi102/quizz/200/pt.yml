question: Na crítica de Bastiat aos sofismas económicos, que erro lógico fundamental está subjacente ao argumento protecionista de que a França deve evitar enriquecer a Inglaterra através do comércio?
answer: O falso pressuposto de que os interesses económicos são antagónicos e não harmoniosos nas trocas voluntárias
wrong_answers:
  - A convicção incorrecta de que a França não possui recursos naturais suficientes para competir com a Inglaterra
  - "A ideia errada de que a capacidade industrial da Inglaterra lhe dá uma vantagem tecnológica injusta"
  - O pressuposto errado de que os défices comerciais conduzem automaticamente ao declínio económico nacional
explanation: |
  Bastiat identificou que os proteccionistas vêem erradamente as relações económicas através de uma lente arcaica de interesses conflituosos, semelhante à das antigas tribos que lutavam por territórios de caça. Na realidade, as trocas voluntárias beneficiam ambas as partes - quando clientes e fornecedores negoceiam livremente, ambos ganham valor. O receio protecionista de "enriquecer os inimigos" através do comércio reflecte um mal-entendido fundamental sobre o funcionamento das relações de mercado, em que o benefício mútuo, e não a concorrência de soma zero, caracteriza as verdadeiras interações económicas.
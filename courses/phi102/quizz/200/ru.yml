question: В критике экономических софизмов Бастиа, какая фундаментальная логическая ошибка лежит в основе протекционистского аргумента о том, что Франция должна избегать обогащения Англии за счет торговли?
answer: Ложное предположение о том, что экономические интересы в добровольных обменах скорее антагонистичны, чем гармоничны
wrong_answers:
  - Ошибочное мнение, что Франция не обладает достаточными природными ресурсами, чтобы конкурировать с Англией
  - "Ошибочная идея о том, что промышленный потенциал Англии дает ей несправедливое технологическое преимущество"
  - Ошибочное предположение о том, что дефицит торгового баланса автоматически ведет к экономическому спаду в стране
explanation: |
  Бастиат считает, что сторонники протекционизма ошибочно рассматривают экономические отношения через архаичную призму конфликтующих интересов, подобно древним племенам, воюющим за охотничьи угодья. В действительности добровольные обмены выгодны обеим сторонам - когда клиенты и поставщики свободно торгуют, выгоду получают и те, и другие. Протекционистский страх "обогатить врагов" за счет торговли отражает фундаментальное непонимание того, как работают рыночные отношения, где взаимная выгода, а не конкуренция с нулевой суммой характеризует подлинное экономическое взаимодействие.
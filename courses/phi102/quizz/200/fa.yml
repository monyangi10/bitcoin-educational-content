question: در نقد باستیا از سفسطه‌های اقتصادی، چه خطای منطقی اساسی در استدلال حمایت‌گرایانه وجود دارد که فرانسه باید از طریق تجارت از غنی‌سازی انگلستان اجتناب کند؟
answer: این فرض نادرست که منافع اقتصادی در مبادلات داوطلبانه متضاد هستند نه هماهنگ.
wrong_answers:
  - باور نادرست که فرانسه منابع طبیعی کافی برای رقابت با انگلستان ندارد
  - "ایده اشتباه که ظرفیت صنعتی انگلستان به آن یک مزیت ناعادلانه تکنولوژیکی می‌دهد"
  - این فرض نادرست که کسری تجاری به طور خودکار منجر به افول اقتصادی ملی می‌شود
explanation: |
  باستیا شناسایی کرد که حمایت‌گرایان به اشتباه روابط اقتصادی را از طریق یک لنز کهنه از منافع متضاد می‌بینند، مشابه قبایل باستانی که بر سر زمین‌های شکار می‌جنگیدند. در واقعیت، مبادلات داوطلبانه به نفع هر دو طرف است - وقتی مشتریان و تأمین‌کنندگان آزادانه تجارت می‌کنند، هر دو ارزش کسب می‌کنند. ترس حمایت‌گرایان از 'غنی‌سازی دشمنان' از طریق تجارت، یک سوءتفاهم اساسی از نحوه کارکرد روابط بازار را منعکس می‌کند، جایی که منفعت متقابل به جای رقابت صفر-جمع، تعاملات اقتصادی واقعی را مشخص می‌کند.
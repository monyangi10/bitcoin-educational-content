question: Dushingiye ku ciyumviro c’isoko ry’uburenganzira, ni uruhara uruhe ukutagira inyungu bigira iyo abashoramare bagerageje gushiramwo ibintu bishasha imbere y’uko habaho ivyipfuzo bihagije vy’abaguzi?
answer: Bikora nk’ikintu gisanzwe kibuza ishoramari ry’ubusa kandi kigatanga ikimenyetso ku bashoramari ko bosubira gukoresha ubutunzi ahandi .
wrong_answers:
  - Irahimiriza abacuruzi benshi kwinjira mw’isoko kugira ngo basubize inyuma ivyo bahomvye mu ntango biciye mu nkunga za Leta .
  - Bituma haba ubukene bw’ibintu bishasha bituma amaherezo abantu bavyipfuza kandi bikaba bituma ubuhinga bushasha bugira inyungu uko igihe kigenda kirarenga .
  - Birerekana ko bikenewe ko hakorwa utwigoro two kwamamaza kugira ngo abaguzi bigishwe ivyiza biva ku kintu gishasha .
explanation: |
  Mu nzira y’isoko ry’uburenganzira, ukutagira inyungu bikora nk’uburyo buhambaye bwo gutanga inyishu bubuza gushiramwo amahera mbere y’igihe mu guhingura ibintu bishasha. Iyo abashoramare biteze imbere y’igihe ivyo basaba bitarabaho, ukubura inyungu birabaca intege mu bisanzwe kugira ngo ntibabandanye kandi bikabuza abandi kubikurikira, gutyo bikaba birinda gutanga ubutunzi mu buryo butari bwo. Ubwo buryo bwo kwikosora buratuma ubutunzi buja mu bikenewe vy’ukuri vy’abaguzi aho kuja mu bikorwa vy’ugutekereza ku bintu, bikaba vyerekana ubushobozi bw’ibimenyetso vy’isoko ku bijanye n’ugutegura ibintu bimwe bimwe canke gufasha abantu.
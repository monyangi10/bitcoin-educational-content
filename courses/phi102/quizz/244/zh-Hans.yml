question: 根据自由主义理论，自愿互助社会有别于国家提供的福利制度的基本原则是什么？
answer: 互助会通过竞争和自愿联合的方式运作，允许不断改进和个人选择
wrong_answers:
  - 互助会通过集中规划和统一分配方法，提供了更全面的保障
  - 互助社会通过建立对所有资源的集体所有权，消除了个人责任的必要性
  - 互助会通过政府监管运作，确保所有成员享有平等机会和标准福利
explanation: |
  文中明确指出，19 世纪的互助会是现代福利制度的先驱，但其运作是基于竞争而非国家垄断。这种竞争使实践得以不断改进，成功的方法得以发扬光大，无效的方法则被抛弃。自愿的性质尊重个人的选择和尊严，与官僚主义的公共援助形成鲜明对比，文中认为官僚主义的公共援助降低了个人的地位，使他们处于依赖状态。错误答案错误地暗示了中央集权、集体所有制或政府监管--所有这些都与所描述的自由主义原则背道而驰。
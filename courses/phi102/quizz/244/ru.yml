question: Согласно либеральной теории, какой основополагающий принцип отличает добровольные общества взаимопомощи от систем социального обеспечения, предоставляемых государством?
answer: Общества взаимопомощи действовали на основе конкуренции и добровольного объединения, обеспечивая постоянное совершенствование и индивидуальный выбор
wrong_answers:
  - Общества взаимопомощи обеспечивали более полный охват благодаря централизованному планированию и единым методам распределения
  - Общества взаимопомощи устранили необходимость индивидуальной ответственности, создав коллективную собственность на все ресурсы
  - Общества взаимопомощи, функционирующие на основе государственного регулирования для обеспечения равного доступа и стандартных льгот для всех членов
explanation: |
  В тексте четко показано, что общества взаимопомощи XIX века были прародителями современных систем социального обеспечения, но функционировали на основе конкуренции, а не государственной монополии. Такая конкуренция позволяла постоянно совершенствовать практику, процветать успешным методам и отказываться от неэффективных. Добровольный характер обеспечивал уважение индивидуального выбора и достоинства, в отличие от бюрократической государственной помощи, которая, как утверждается в тексте, унижает человека и держит его в состоянии зависимости. Неправильные ответы неверно предполагают централизацию, коллективную собственность или государственное регулирование - все это противоречит описанным либеральным принципам.
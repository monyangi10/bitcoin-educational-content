question: Kulingana na nadharia ya kiliberali, ni kanuni gani ya msingi inayotofautisha jamii za usaidizi wa pamoja za hiari na mifumo ya ustawi inayotolewa na serikali?
answer: Vyama vya misaada ya pande zote viliendeshwa kupitia ushindani na vyama vya hiari, na kuruhusu uboreshaji endelevu na chaguo la mtu binafsi.
wrong_answers:
  - Vyama vya misaada ya pande zote vilitoa huduma kamili zaidi kupitia mipango ya pamoja na mbinu za usambazaji sare
  - Vyama vya misaada ya pande zote viliondoa hitaji la uwajibikaji wa mtu binafsi kwa kuunda umiliki wa pamoja wa rasilimali zote
  - Vyama vya misaada ya pande zote viliendeshwa kupitia kanuni za serikali ili kuhakikisha upatikanaji sawa na manufaa sanifu kwa wanachama wote
explanation: |
  Maandishi yanathibitisha wazi kwamba jamii za misaada ya pande zote za karne ya 19 zilikuwa mababu wa mifumo ya kisasa ya ustawi lakini zilifanya kazi kwa ushindani badala ya ukiritimba wa serikali. Ushindani huu uliruhusu uboreshaji endelevu wa mazoea, huku mbinu zilizofanikiwa zikistawi na zile zisizofaa zikiachwa. Asili ya hiari iliheshimu chaguo na utu wa mtu binafsi, tofauti na usaidizi wa umma wa urasimu ambao maandishi hayo yanasema unawadhalilisha watu binafsi na kuwaweka katika hali ya utegemezi. Majibu yasiyo sahihi yanaonyesha kimakosa ujumuishaji mkuu, umiliki wa pamoja, au kanuni za serikali - yote yakipingana na kanuni za kiliberali zilizoelezwa.
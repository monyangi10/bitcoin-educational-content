question: Hvilket grunnleggende prinsipp i liberal teori skiller frivillige, gjensidige hjelpeorganisasjoner fra statlige velferdssystemer?
answer: Gjensidige hjelpesamfunn som fungerte gjennom konkurranse og frivillig sammenslutning, noe som muliggjorde kontinuerlig forbedring og individuelle valg
wrong_answers:
  - Gjensidige hjelpeselskaper ga mer omfattende dekning gjennom sentralisert planlegging og enhetlige distribusjonsmetoder
  - Gjensidige hjelpesamfunn eliminerte behovet for individuelt ansvar ved å skape kollektivt eierskap til alle ressurser
  - Gjensidige hjelpeorganisasjoner ble drevet gjennom statlig regulering for å sikre lik tilgang og standardiserte fordeler for alle medlemmer
explanation: |
  Teksten viser tydelig at 1800-tallets gjensidige hjelpeselskaper var forfedrene til de moderne velferdssystemene, men at de fungerte på grunnlag av konkurranse snarere enn statlige monopoler. Konkurransen gjorde det mulig å kontinuerlig forbedre praksis, slik at vellykkede metoder blomstret og ineffektive metoder ble forlatt. Frivilligheten respekterte individets valgfrihet og verdighet, i motsetning til byråkratisk offentlig hjelp som ifølge teksten degraderer individer og holder dem i en tilstand av avhengighet. De gale svarene antyder sentralisering, kollektivt eierskap eller statlig regulering - alt sammen i strid med de liberale prinsippene som beskrives.
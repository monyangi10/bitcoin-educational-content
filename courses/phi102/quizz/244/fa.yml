question: بر اساس نظریه لیبرال، چه اصل بنیادی، جوامع کمک متقابل داوطلبانه را از سیستم‌های رفاهی دولتی متمایز می‌کند؟
answer: انجمن‌های کمک متقابل از طریق رقابت و انجمن‌های داوطلبانه عمل می‌کردند و امکان بهبود مستمر و انتخاب فردی را فراهم می‌کردند.
wrong_answers:
  - انجمن‌های کمک متقابل از طریق برنامه‌ریزی متمرکز و روش‌های توزیع یکنواخت پوشش جامع‌تری ارائه دادند.
  - انجمن‌های کمک متقابل با ایجاد مالکیت جمعی بر تمام منابع، نیاز به مسئولیت فردی را از بین بردند.
  - انجمن‌های کمک متقابل از طریق مقررات دولتی عمل می‌کردند تا دسترسی برابر و مزایای استاندارد برای همه اعضا تضمین شود.
explanation: |
  متن به وضوح بیان می‌کند که انجمن‌های کمک متقابل قرن نوزدهم، نیاکان سیستم‌های رفاهی مدرن بودند اما بر اساس رقابت به جای انحصار دولتی عمل می‌کردند. این رقابت اجازه بهبود مستمر روش‌ها را می‌داد، به طوری که روش‌های موفق رشد می‌کردند و روش‌های ناکارآمد کنار گذاشته می‌شدند. ماهیت داوطلبانه آن به انتخاب و کرامت فردی احترام می‌گذاشت، که در تضاد با کمک‌های عمومی بوروکراتیک است که متن ادعا می‌کند افراد را تحقیر کرده و آنها را در حالت وابستگی نگه می‌دارد. پاسخ‌های نادرست به اشتباه تمرکزگرایی، مالکیت جمعی یا تنظیمات دولتی را پیشنهاد می‌دهند - که همگی با اصول لیبرالی توصیف شده در تضاد هستند.
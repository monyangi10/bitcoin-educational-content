question: Welches Grundprinzip unterscheidet nach der liberalen Theorie freiwillige Hilfsvereine auf Gegenseitigkeit von staatlichen Wohlfahrtssystemen?
answer: Gesellschaften auf Gegenseitigkeit, die durch Wettbewerb und freiwilligen Zusammenschluss funktionieren und kontinuierliche Verbesserungen und individuelle Entscheidungen ermöglichen
wrong_answers:
  - Hilfsvereine auf Gegenseitigkeit boten eine umfassendere Abdeckung durch zentrale Planung und einheitliche Verteilungsmethoden
  - Gesellschaften der gegenseitigen Hilfe beseitigten die Notwendigkeit individueller Verantwortung, indem sie kollektives Eigentum an allen Ressourcen schufen
  - Hilfsvereine auf Gegenseitigkeit, die durch staatliche Regulierung betrieben werden, um gleichen Zugang und standardisierte Leistungen für alle Mitglieder zu gewährleisten
explanation: |
  Der Text macht deutlich, dass die Hilfsvereine auf Gegenseitigkeit im 19. Jahrhundert die Vorläufer der modernen Wohlfahrtssysteme waren, aber auf der Grundlage des Wettbewerbs und nicht des staatlichen Monopols funktionierten. Dieser Wettbewerb ermöglichte eine kontinuierliche Verbesserung der Praktiken, wobei erfolgreiche Methoden florierten und unwirksame aufgegeben wurden. Die Freiwilligkeit respektierte die individuelle Wahl und die Würde des Einzelnen, im Gegensatz zur bürokratischen öffentlichen Hilfe, die, wie der Text argumentiert, den Einzelnen entwürdigt und in einem Zustand der Abhängigkeit hält. Die falschen Antworten suggerieren fälschlicherweise Zentralisierung, kollektives Eigentum oder staatliche Regulierung - alles Gegensätze zu den beschriebenen liberalen Grundsätzen.
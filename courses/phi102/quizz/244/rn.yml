question: Dukurikije inyigisho y’ubwigenge, ni ingingo ngenderwako iyihe y’ishimikiro itandukanya amashirahamwe y’ugufashanya ku bushake n’imibereho myiza itangwa na Leta?
answer: Amashirahamwe y’ugufashanya yakora biciye mu mahiganwa no mu gukorana n’abandi ku bushake, ivyo bikaba vyatuma umuntu abandanya gutera imbere no guhitamwo umuntu ku giti ciwe .
wrong_answers:
  - Amashirahamwe y'imfashanyo yaratanze ubumenyi bushitse biciye mu gutegura ibintu bimwe bimwe no mu buryo bumwe bwo kubitanga .
  - Amashirahamwe y'ugufashanya yarakuyeho ivy'uko umuntu wese akeneye inshingano mu gutuma ibintu vyose biba ivy'abantu bose .
  - Amashirahamwe y'imfashanyo akora biciye mu mategeko ya Leta kugira ngo abanywanyi bose bashobore kuronka inyungu zingana kandi baronke inyungu zihuye
explanation: |
  Ico canditswe kirerekana neza yuko amashirahamwe y’ugufashanya yo mu kinjana ca 19 ari yo yatumye habaho uburyo bwo kubungabunga abantu muri iki gihe ariko ko yakorana n’uguhiganwa aho gukoreshwa na Leta yonyene. Iryo higanwa ryatumye habaho ugukomeza gutera imbere mu migenzo, uburyo buroranye bukatera imbere, uburyo butagira akamaro na bwo bugahebwa. Kamere y’ubushake yubaha amahitamwo y’umuntu ku giti ciwe n’uburenganzira bwiwe, itandukanye n’imfashanyo ya Leta y’ubutegetsi ico canditswe kivuga ko itesha agaciro umuntu ku giti ciwe kandi ikamugumiza mu gihe c’ukwisunga. Inyishu zitari zo zivuga nabi ko hariho ugushira hamwe, ubutunzi rusangi, canke amategeko ya Leta - vyose bikaba biteye kubiri n’ingingo ngenderwako z’ubwigenge zadondowe.
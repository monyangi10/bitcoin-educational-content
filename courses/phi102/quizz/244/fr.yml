question: Selon la théorie libérale, quel principe fondamental distingue les sociétés d'entraide volontaires des systèmes d'aide sociale fournis par l'État ?
answer: Les sociétés d'entraide fonctionnent par le biais de la concurrence et de l'association volontaire, ce qui permet une amélioration continue et un choix individuel
wrong_answers:
  - Les sociétés de secours mutuel assurent une couverture plus complète grâce à une planification centralisée et à des méthodes de distribution uniformes
  - Les sociétés d'entraide ont éliminé le besoin de responsabilité individuelle en créant une propriété collective de toutes les ressources
  - Les sociétés d'aide mutuelle fonctionnent grâce à une réglementation gouvernementale visant à garantir l'égalité d'accès et la standardisation des avantages pour tous les membres
explanation: |
  Le texte établit clairement que les sociétés de secours mutuel du XIXᵉ siècle sont les ancêtres des systèmes de protection sociale modernes, mais qu'elles fonctionnaient sur la base de la concurrence et non du monopole d'État. Cette concurrence permettait une amélioration continue des pratiques, les méthodes efficaces se développant et les méthodes inefficaces étant abandonnées. Le caractère volontaire respectait le choix et la dignité de l'individu, contrastant avec l'assistance publique bureaucratique qui, selon le texte, dégrade les individus et les maintient dans un état de dépendance. Les mauvaises réponses suggèrent à tort la centralisation, la propriété collective ou la réglementation gouvernementale, autant d'éléments contraires aux principes libéraux décrits.

question: Secondo la teoria liberale, quale principio fondamentale distingue le società di mutuo soccorso volontarie dai sistemi di welfare statali?
answer: Le società di mutuo soccorso operavano attraverso la concorrenza e l'associazione volontaria, consentendo il miglioramento continuo e la scelta individuale
wrong_answers:
  - Le società di mutuo soccorso fornivano una copertura più completa grazie a una pianificazione centralizzata e a metodi di distribuzione uniformi
  - Le società di mutuo soccorso hanno eliminato la necessità di una responsabilità individuale creando una proprietà collettiva di tutte le risorse
  - Società di mutuo soccorso gestite attraverso una regolamentazione governativa per garantire a tutti i membri un accesso paritario e benefici standardizzati
explanation: |
  Il testo stabilisce chiaramente che le società di mutuo soccorso del XIX secolo erano gli antenati dei moderni sistemi di welfare, ma funzionavano in base alla concorrenza piuttosto che al monopolio statale. Questa competizione permetteva un continuo miglioramento delle pratiche, con il prosperare dei metodi di successo e l'abbandono di quelli inefficaci. La natura volontaria rispettava la scelta e la dignità individuale, in contrasto con l'assistenza pubblica burocratica che, secondo il testo, degrada gli individui e li mantiene in uno stato di dipendenza. Le risposte sbagliate suggeriscono erroneamente la centralizzazione, la proprietà collettiva o la regolamentazione governativa, tutte antitetiche ai principi liberali descritti.
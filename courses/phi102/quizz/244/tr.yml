question: Liberal teoriye göre, gönüllü karşılıklı yardım topluluklarını devlet tarafından sağlanan refah sistemlerinden ayıran temel ilke nedir?
answer: Rekabet ve gönüllü birliktelik yoluyla işleyen, sürekli gelişime ve bireysel seçime olanak tanıyan karşılıklı yardım toplulukları
wrong_answers:
  - Karşılıklı yardımlaşma dernekleri, merkezi planlama ve tek tip dağıtım yöntemleri sayesinde daha kapsamlı bir kapsama alanı sağlamıştır
  - Karşılıklı yardımlaşma toplumları, tüm kaynakların kolektif sahipliğini yaratarak bireysel sorumluluk ihtiyacını ortadan kaldırdı
  - Tüm üyelere eşit erişim ve standart faydalar sağlamak için hükümet düzenlemeleri yoluyla işletilen karşılıklı yardım toplulukları
explanation: |
  Metin, 19. yüzyıldaki karşılıklı yardımlaşma derneklerinin modern refah sistemlerinin ataları olduğunu, ancak devlet tekelinden ziyade rekabete dayalı olarak işlediğini açıkça ortaya koymaktadır. Bu rekabet, başarılı yöntemlerin gelişmesi ve etkisiz olanların terk edilmesiyle birlikte uygulamaların sürekli olarak iyileştirilmesine olanak sağlamıştır. Gönüllülük esası, metnin bireyleri aşağıladığını ve onları bağımlı bir durumda tuttuğunu savunduğu bürokratik kamu yardımının aksine, bireysel seçim ve saygınlığa saygı göstermiştir. Yanlış cevaplar yanlış bir şekilde merkezileşmeyi, kolektif mülkiyeti veya hükümet düzenlemelerini önermektedir - bunların hepsi açıklanan liberal ilkelere karşıttır.
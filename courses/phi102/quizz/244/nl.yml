question: Welk basisprincipe onderscheidt volgens de liberale theorie vrijwillige samenlevingen voor wederzijdse hulp van door de staat verzorgde welzijnssystemen?
answer: Onderlinge hulporganisaties werkten via concurrentie en vrijwillige vereniging, waardoor continue verbetering en individuele keuze mogelijk waren
wrong_answers:
  - Wederzijdse hulporganisaties boden een uitgebreidere dekking door gecentraliseerde planning en uniforme distributiemethoden
  - Samenlevingen voor wederzijdse hulp elimineerden de behoefte aan individuele verantwoordelijkheid door collectief eigendom van alle hulpbronnen te creëren
  - Onderlinge hulporganisaties werkten via overheidsregulering om gelijke toegang en gestandaardiseerde voordelen voor alle leden te garanderen
explanation: |
  De tekst stelt duidelijk vast dat 19e-eeuwse onderlinge hulporganisaties de voorouders waren van de moderne welzijnssystemen, maar eerder op basis van concurrentie functioneerden dan op basis van een staatsmonopolie. Deze concurrentie zorgde voor een voortdurende verbetering van de praktijken, waarbij succesvolle methoden floreerden en ineffectieve werden afgeschaft. De vrijwillige aard respecteerde de individuele keuze en waardigheid, in tegenstelling tot bureaucratische openbare hulp die volgens de tekst individuen degradeert en hen in een staat van afhankelijkheid houdt. De foute antwoorden suggereren ten onrechte centralisatie, collectief eigendom of overheidsregulering - allemaal tegengesteld aan de beschreven liberale principes.
question: According to liberal theory, what fundamental principle distinguishes voluntary mutual aid societies from state-provided welfare systems?
answer: Mutual aid societies operated through competition and voluntary association, allowing for continuous improvement and individual choice
wrong_answers:
  - Mutual aid societies provided more comprehensive coverage through centralized planning and uniform distribution methods
  - Mutual aid societies eliminated the need for individual responsibility by creating collective ownership of all resources
  - Mutual aid societies operated through government regulation to ensure equal access and standardized benefits for all members
explanation: |
  The text clearly establishes that 19th-century mutual aid societies were the ancestors of modern welfare systems but functioned on competition rather than state monopoly. This competition allowed for continuous improvement of practices, with successful methods thriving and ineffective ones being abandoned. The voluntary nature respected individual choice and dignity, contrasting with bureaucratic public assistance that the text argues degrades individuals and maintains them in a state of dependence. The wrong answers incorrectly suggest centralization, collective ownership, or government regulation - all antithetical to the liberal principles described.

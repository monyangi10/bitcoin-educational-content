question: De acordo com a teoria liberal, qual é o princípio fundamental que distingue as sociedades de ajuda mútua voluntária dos sistemas de proteção social fornecidos pelo Estado?
answer: As sociedades de ajuda mútua funcionavam através da concorrência e da associação voluntária, permitindo a melhoria contínua e a escolha individual
wrong_answers:
  - As sociedades de ajuda mútua proporcionaram uma cobertura mais abrangente através de um planeamento centralizado e de métodos de distribuição uniformes
  - As sociedades de ajuda mútua eliminaram a necessidade de responsabilidade individual, criando a propriedade colectiva de todos os recursos
  - As sociedades de ajuda mútua funcionavam através de regulamentação governamental para garantir a igualdade de acesso e benefícios normalizados para todos os membros
explanation: |
  O texto estabelece claramente que as sociedades de ajuda mútua do século XIX foram os antepassados dos sistemas de proteção social modernos, mas funcionavam com base na concorrência e não no monopólio estatal. Esta concorrência permitia a melhoria contínua das práticas, com os métodos bem sucedidos a prosperar e os ineficazes a serem abandonados. O carácter voluntário respeitava a escolha individual e a dignidade, contrastando com a assistência pública burocrática que, segundo o texto, degrada os indivíduos e os mantém num estado de dependência. As respostas erradas sugerem incorretamente a centralização, a propriedade colectiva ou a regulamentação governamental - todas elas antitéticas aos princípios liberais descritos.
question: Menurut teori liberal, prinsip dasar apa yang membedakan masyarakat gotong royong sukarela dengan sistem kesejahteraan yang disediakan negara?
answer: Perkumpulan gotong royong yang beroperasi melalui kompetisi dan asosiasi sukarela, memungkinkan peningkatan berkelanjutan dan pilihan individu
wrong_answers:
  - Masyarakat gotong royong memberikan cakupan yang lebih komprehensif melalui perencanaan terpusat dan metode distribusi yang seragam
  - Masyarakat gotong royong menghilangkan kebutuhan akan tanggung jawab individu dengan menciptakan kepemilikan bersama atas semua sumber daya
  - Perkumpulan gotong royong yang beroperasi melalui peraturan pemerintah untuk memastikan akses yang sama dan manfaat standar bagi semua anggota
explanation: |
  Teks tersebut dengan jelas menetapkan bahwa masyarakat gotong royong abad ke-19 merupakan nenek moyang sistem kesejahteraan modern, tetapi berfungsi berdasarkan kompetisi dan bukan monopoli negara. Kompetisi ini memungkinkan perbaikan praktik secara terus menerus, dengan metode yang berhasil berkembang dan metode yang tidak efektif ditinggalkan. Sifat sukarela menghormati pilihan dan martabat individu, kontras dengan bantuan publik birokratis yang menurut teks tersebut merendahkan individu dan membuat mereka tetap dalam kondisi ketergantungan. Jawaban yang salah secara keliru menyarankan sentralisasi, kepemilikan kolektif, atau peraturan pemerintah - semuanya bertentangan dengan prinsip-prinsip liberal yang dijelaskan.
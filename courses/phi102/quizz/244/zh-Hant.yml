question: 根據自由主義理論，自願互助社會有別於國家提供的福利制度的基本原則是什麼？
answer: 互助會透過競爭和自願結社的方式運作，允許持續改善和個人選擇
wrong_answers:
  - 互助會透過集中規劃和統一分發方式，提供更全面的覆蓋範圍
  - 互助社會透過建立所有資源的集體所有權，消除了個人責任的需要
  - 互助會透過政府監管運作，以確保所有會員享有平等機會和標準福利
explanation: |
  文中明確指出，19 世紀的互助會是現代福利制度的先驅，但其運作是以競爭而非國家壟斷為基礎。這種競爭允許不斷地改善實踐，成功的方法得以蓬勃發展，而無效的方法則被摒棄。其自願性質尊重個人的選擇和尊嚴，與文中所說的官僚式公共援助形成對比，官僚式公共援助貶低了個人的人格，使他們處於依賴狀態。錯誤的答案不正確地暗示了中央集权、集體所有或政府管制 - 這些都與所述的自由原則背道而馳。
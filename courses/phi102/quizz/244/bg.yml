question: Кой основен принцип според либералната теория отличава доброволните общества за взаимопомощ от държавните системи за социално подпомагане?
answer: Дружества за взаимопомощ, функциониращи чрез конкуренция и доброволно сдружаване, които дават възможност за непрекъснато усъвършенстване и индивидуален избор
wrong_answers:
  - Дружествата за взаимопомощ осигуряват по-всеобхватно покритие чрез централизирано планиране и единни методи на разпределение
  - Обществата за взаимопомощ премахват необходимостта от индивидуална отговорност, като създават колективна собственост върху всички ресурси
  - Дружества за взаимопомощ, функциониращи чрез правителствено регулиране, за да се гарантира равен достъп и стандартизирани ползи за всички членове
explanation: |
  Текстът ясно показва, че дружествата за взаимопомощ от XIX в. са предшественици на съвременните системи за социално подпомагане, но са функционирали на основата на конкуренцията, а не на държавния монопол. Тази конкуренция е позволила непрекъснато подобряване на практиките, като успешните методи са се развивали, а неефективните са били изоставяни. Доброволният характер е уважавал индивидуалния избор и достойнство, контрастирайки с бюрократичната обществена помощ, която според текста унижава хората и ги поддържа в състояние на зависимост. Неправилните отговори неправилно предполагат централизация, колективна собственост или държавно регулиране - всички те са противоположни на описаните либерални принципи.
question: บาสเตียตระบุว่าความผิดพลาดทางตรรกะหลักที่ทำให้ทั้งคอมมิวนิสต์และการควบคุมที่มากเกินไปยังคงมีความชอบธรรมทางปัญญาแม้จะต่อต้านเสรีภาพทางเศรษฐกิจก็คืออะไร?
answer: พวกเขาพึ่งพาการใช้เหตุผลทางเศรษฐศาสตร์ที่ผิดพลาด - การใช้เหตุผลที่บิดเบือนซึ่งกลับด้านวิธีการและจุดประสงค์ สร้างความสัมพันธ์เชิงสาเหตุที่ผิดพลาด และนำเสนอการต่อต้านที่สมมติขึ้นระหว่างผลประโยชน์
wrong_answers:
  - พวกเขาใช้ประโยชน์จากความขัดแย้งทางคณิตศาสตร์ที่แท้จริงในทฤษฎีตลาดเสรีที่แสดงให้เห็นถึงความเป็นไปไม่ได้ของการเติบโตทางเศรษฐกิจอย่างยั่งยืนโดยปราศจากการแทรกแซงของรัฐ
  - พวกเขาใช้ประโยชน์จากความไม่เสถียรโดยธรรมชาติของระบบการแลกเปลี่ยนโดยสมัครใจซึ่งมีแนวโน้มที่จะผูกขาดและต้องการการแก้ไขโดยการกำกับดูแล
  - พวกเขาใช้ประโยชน์จากรูปแบบทางประวัติศาสตร์ที่พิสูจน์แล้วว่าตลาดที่ไม่มีข้อจำกัดจะนำไปสู่สงครามชนชั้นและการล่มสลายทางสังคมอย่างหลีกเลี่ยงไม่ได้หากไม่มีการกำกับดูแลจากรัฐบาล
explanation: |
  ข้อมูลเชิงลึกพื้นฐานของ Bastiat คือระบบที่ต่อต้านเสรีภาพทางเศรษฐกิจรักษาตัวเองผ่าน sophisms - โดยเฉพาะรูปแบบการให้เหตุผลที่ผิดพลาดรวมถึงการมองว่างานเป็นจุดจบแทนที่จะเป็นวิธีการ, การสร้างความเชื่อมโยงเชิงสาเหตุที่ผิดพลาด, และการสร้างความขัดแย้งเทียมระหว่างผลประโยชน์ทั่วไปและเฉพาะเจาะจง คำตอบที่ผิดแนะนำอย่างไม่ถูกต้องว่าระบบเหล่านี้มีรากฐานทางตรรกะที่ถูกต้องตามกฎหมาย, ในขณะที่จุดของ Bastiat คือพวกมันอยู่รอดได้เพียงผ่านข้อผิดพลาดทางตรรกะและการบิดเบือน, ไม่ใช่ความขัดแย้งที่แท้จริงในทฤษฎีเสรีนิยม
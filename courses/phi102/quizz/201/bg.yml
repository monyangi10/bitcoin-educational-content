question: Коя е основната логическа грешка, която позволява на комунизма и на прекомерното регулиране да запазят интелектуалната си легитимност въпреки противопоставянето си на икономическата свобода?
answer: Те разчитат на икономически софизми - погрешни разсъждения, които обръщат средства и цели, създават фалшиви причинно-следствени връзки и представят фиктивни противопоставяния между интереси
wrong_answers:
  - Те се възползват от истински математически противоречия в теорията на свободния пазар, които показват невъзможността за устойчив икономически растеж без държавна намеса
  - Те се възползват от присъщата нестабилност на системите за доброволна размяна, които естествено се стремят към монополизация и изискват регулаторна корекция
  - Те се възползват от доказания исторически модел, че неограничените пазари неизбежно водят до класова война и социален колапс без държавен надзор
explanation: |
  Основното прозрение на Бастиа е, че системите, които се противопоставят на икономическата свобода, се поддържат чрез софизми - по-конкретно погрешни модели на разсъждение, включващи разглеждането на работата като цел, а не като средство, установяването на фалшиви причинно-следствени връзки и създаването на изкуствено противопоставяне между общите и конкретните интереси. Неправилните отговори неправилно предполагат, че тези системи имат легитимни логически основания, докато смисълът на Бастиа е именно в това, че те оцеляват само благодарение на логически грешки и изкривявания, а не на истински противоречия в либералната теория.
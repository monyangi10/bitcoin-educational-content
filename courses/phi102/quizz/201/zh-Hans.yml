question: 巴斯蒂亚认为，尽管共产主义和过度监管与经济自由对立，但它们仍能保持思想合法性的核心逻辑谬误是什么？
answer: 它们依靠的是经济诡辩--颠倒手段和目的、制造虚假因果关系、虚构利益对立的谬误推理
wrong_answers:
  - 他们利用自由市场理论中真正的数学矛盾，证明没有国家干预就不可能有持续的经济增长
  - 它们利用了自愿交换系统固有的不稳定性，这种系统自然会趋向垄断，需要监管部门加以纠正
  - 没有政府的监督，无限制的市场必然导致阶级斗争和社会崩溃，他们利用了这一已被证明的历史规律
explanation: |
  巴斯蒂亚的基本见解是，反对经济自由的制度是通过诡辩来维持自身的--具体来说就是谬误的推理模式，包括将工作视为目的而非手段，建立虚假的因果联系，以及人为地将普遍利益与特殊利益对立起来。错误的答案错误地暗示这些体系具有合法的逻辑基础，而巴斯蒂亚的观点恰恰是，它们只是通过逻辑错误和错误的表述而生存，而不是自由主义理论中的真正矛盾。
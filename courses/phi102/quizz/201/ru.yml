question: Что Бастиат называет основным логическим заблуждением, которое позволяет и коммунизму, и чрезмерному регулированию сохранять интеллектуальную легитимность, несмотря на их противостояние экономической свободе?
answer: Они опираются на экономические софизмы - ошибочные рассуждения, которые инвертируют средства и цели, создают ложные причинно-следственные связи и представляют фиктивные противоположности между интересами
wrong_answers:
  - Они используют подлинные математические противоречия теории свободного рынка, которые демонстрируют невозможность устойчивого экономического роста без вмешательства государства
  - Они используют нестабильность, присущую системам добровольного обмена, которые, естественно, склонны к монополизации и нуждаются в регуляторной коррекции
  - Они используют проверенную историей закономерность, что неограниченные рынки неизбежно приводят к классовой войне и социальному коллапсу без государственного надзора
explanation: |
  Фундаментальная мысль Бастиата заключается в том, что системы, выступающие против экономической свободы, поддерживают себя с помощью софизмов - в частности, ошибочных схем рассуждений, включая рассмотрение труда как цели, а не средства, установление ложных причинно-следственных связей и создание искусственного противопоставления общих и частных интересов. Неправильные ответы неверно предполагают, что эти системы имеют законные логические основания, в то время как суть Бастиана как раз в том, что они выживают только благодаря логическим ошибкам и искажениям, а не подлинным противоречиям в либеральной теории.
question: ¿Cuál es, según Bastiat, la falacia lógica fundamental que permite tanto al comunismo como a la regulación excesiva mantener la legitimidad intelectual a pesar de su oposición a la libertad económica?
answer: Se basan en sofismas económicos: razonamientos falaces que invierten los medios y los fines, crean falsas relaciones causales y presentan oposiciones ficticias entre los intereses
wrong_answers:
  - Explotan auténticas contradicciones matemáticas de la teoría del libre mercado que demuestran la imposibilidad de un crecimiento económico sostenido sin intervención estatal
  - Se aprovechan de la inestabilidad inherente a los sistemas de intercambio voluntario, que tienden naturalmente a la monopolización y requieren una corrección reglamentaria
  - Aprovechan el patrón histórico demostrado de que los mercados sin restricciones conducen inevitablemente a la guerra de clases y al colapso social sin supervisión gubernamental
explanation: |
  La idea fundamental de Bastiat es que los sistemas que se oponen a la libertad económica se mantienen a sí mismos mediante sofismas - específicamente patrones de razonamiento falaces que incluyen tratar el trabajo como un fin y no como un medio, establecer falsos vínculos causales y crear una oposición artificial entre intereses generales y particulares. Las respuestas incorrectas sugieren erróneamente que estos sistemas tienen fundamentos lógicos legítimos, cuando el punto de Bastiat es precisamente que sobreviven sólo a través de errores lógicos y tergiversaciones, no de contradicciones genuinas en la teoría liberal.
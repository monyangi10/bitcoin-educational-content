question: Hva er ifølge Bastiat den sentrale logiske feilslutningen som gjør at både kommunisme og overdreven regulering kan opprettholde intellektuell legitimitet til tross for at de står i motsetning til økonomisk frihet?
answer: De baserer seg på økonomiske spissfindigheter - feilaktige resonnementer som bytter om på mål og midler, skaper falske årsakssammenhenger og fremstiller fiktive motsetninger mellom interesser
wrong_answers:
  - De utnytter reelle matematiske selvmotsigelser i teorien om det frie markedet som viser at det er umulig å oppnå vedvarende økonomisk vekst uten statlig inngripen
  - De utnytter den iboende ustabiliteten i frivillige byttesystemer, som naturlig nok tenderer mot monopolisering og krever regulatorisk korreksjon
  - De utnytter det historisk beviste mønsteret at ubegrensede markeder uunngåelig fører til klassekamp og sosial kollaps uten statlig overvåkning
explanation: |
  Bastiats grunnleggende innsikt er at systemer som motarbeider økonomisk frihet, opprettholder seg selv gjennom sofismer - nærmere bestemt villedende resonneringsmønstre som å behandle arbeid som et mål snarere enn et middel, etablere falske årsakssammenhenger og skape kunstige motsetninger mellom allmenne og partikulære interesser. De gale svarene antyder feilaktig at disse systemene har et legitimt logisk fundament, mens Bastiats poeng nettopp er at de kun overlever på grunn av logiske feil og feilaktige fremstillinger, og ikke på grunn av reelle motsetninger i liberal teori.
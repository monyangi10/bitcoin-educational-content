question: O que é que Bastiat identifica como a principal falácia lógica que permite que tanto o comunismo como a regulamentação excessiva mantenham a legitimidade intelectual apesar da sua oposição à liberdade económica?
answer: Recorrem a sofismas económicos - raciocínios falaciosos que invertem meios e fins, criam falsas relações causais e apresentam oposições fictícias entre interesses
wrong_answers:
  - Exploram as verdadeiras contradições matemáticas da teoria do mercado livre que demonstram a impossibilidade de um crescimento económico sustentado sem a intervenção do Estado
  - Aproveitam a instabilidade inerente aos sistemas de troca voluntária que tendem naturalmente para a monopolização e requerem uma correção regulamentar
  - Aproveitam o padrão histórico comprovado de que os mercados sem restrições conduzem inevitavelmente à guerra de classes e ao colapso social sem supervisão governamental
explanation: |
  A visão fundamental de Bastiat é que os sistemas que se opõem à liberdade económica se mantêm através de sofismas - padrões de raciocínio especificamente falaciosos, incluindo o tratamento do trabalho como um fim e não como um meio, estabelecendo falsas ligações causais e criando uma oposição artificial entre interesses gerais e particulares. As respostas erradas sugerem incorretamente que estes sistemas têm fundamentos lógicos legítimos, quando a questão de Bastiat é precisamente que eles sobrevivem apenas através de erros lógicos e deturpações, e não de contradições genuínas na teoria liberal.
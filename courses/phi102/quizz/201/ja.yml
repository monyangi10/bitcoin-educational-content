question: バスティアは、共産主義と過剰な規制の両方が、経済的自由と対立しているにもかかわらず、知的正当性を維持することを可能にしている核心的な論理的誤謬として、何を挙げているのだろうか？
answer: 彼らは経済的詭弁-手段と目的を逆転させ、誤った因果関係を作り出し、利害間の架空の対立を提示する誤った推論-に依存している。
wrong_answers:
  - 彼らは、国家の介入なしには持続的な経済成長が不可能であることを示す、自由市場理論における本物の数学的矛盾を利用している。
  - 自主的な交換システムが本来持っている不安定さを利用したもので、当然ながら独占に向かう傾向があり、規制による是正を必要とする。
  - 政府の監視がなければ、無制限な市場は必然的に階級闘争と社会崩壊を招くという歴史的に証明されたパターンを活用するのである。
explanation: |
  バスティアの基本的な洞察は、経済的自由に反対する体制は、詭弁、具体的には、労働を手段ではなく目的として扱うこと、誤った因果関係を確立すること、一般的利益と特定の利益の間に人為的な対立を作り出すことなどを含む、誤った推論パターンによって自らを維持しているということである。バスティアの指摘はまさに、自由主義理論における真の矛盾ではなく、論理的誤りや誤った表現によってのみ存続しているということなのだ。
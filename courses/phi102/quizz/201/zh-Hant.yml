question: Bastiat 認為，儘管共產主義和過度規管與經濟自由背道而馳，但兩者仍能維持理論合法性的核心邏輯謬誤是什麼？
answer: 他們仰賴經濟詭辯 - 顛倒手段與目的的謬誤推理、製造虛假的因果關係，以及提出虛構的利益對立。
wrong_answers:
  - 他們利用自由市場理論中真正的數學矛盾，證明沒有國家干預經濟不可能持續成長。
  - 它們利用了自願交換系統固有的不穩定性，而自願交換系統自然會趨向壟斷，並需要監管糾正。
  - 他們利用已被證實的歷史模式，即在沒有政府監督的情況下，不受限制的市場必然會導致階級戰爭和社會崩潰。
explanation: |
  巴斯蒂亞的基本見解是，反對經濟自由的體系透過詭辯來維持自身，具體來說就是謬誤的推理模式，包括將工作視為目的而非手段、建立錯誤的因果關係，以及在一般利益與特殊利益之間製造人為的對立。錯誤的答案錯誤地暗示這些體系有合法的邏輯基礎，而巴斯蒂亞的觀點恰恰是這些體系只是透過邏輯錯誤和錯誤的表述而存活，而非自由理論中真正的矛盾。
question: Bastiat, hem komünizmin hem de aşırı düzenlemelerin ekonomik özgürlüğe karşı olmalarına rağmen entelektüel meşruiyetlerini korumalarını sağlayan temel mantıksal yanılgı olarak neyi tanımlamaktadır?
answer: Ekonomik safsatalara dayanırlar - araçları ve amaçları tersine çeviren, yanlış nedensel ilişkiler yaratan ve çıkarlar arasında hayali karşıtlıklar sunan yanlış akıl yürütmeler
wrong_answers:
  - Devlet müdahalesi olmadan sürdürülebilir ekonomik büyümenin imkansızlığını gösteren serbest piyasa teorisindeki gerçek matematiksel çelişkilerden yararlanıyorlar
  - Doğal olarak tekelleşme eğiliminde olan ve düzenleyici düzeltme gerektiren gönüllü değişim sistemlerinin doğasında var olan istikrarsızlıktan faydalanırlar
  - Sınırlandırılmamış piyasaların, devlet denetimi olmaksızın kaçınılmaz olarak sınıf savaşına ve toplumsal çöküşe yol açtığına dair kanıtlanmış tarihsel modelden yararlanıyorlar
explanation: |
  Bastiat'nın temel kavrayışı, ekonomik özgürlüğe karşı çıkan sistemlerin kendilerini safsatalarla -özellikle de çalışmayı araçtan ziyade amaç olarak ele almak, yanlış nedensel bağlantılar kurmak ve genel ve özel çıkarlar arasında yapay bir karşıtlık yaratmak gibi yanlış akıl yürütme kalıplarıyla- ayakta tuttuklarıdır. Yanlış cevaplar yanlış bir şekilde bu sistemlerin meşru mantıksal temellere sahip olduğunu öne sürmektedir, oysa Bastiat'nın işaret ettiği nokta tam da bu sistemlerin liberal teorideki gerçek çelişkiler değil, sadece mantıksal hatalar ve yanlış temsiller yoluyla ayakta kaldıklarıdır.
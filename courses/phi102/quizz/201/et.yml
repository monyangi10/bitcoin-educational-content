question: Mida nimetab Bastiat peamiseks loogiliseks eksituseks, mis võimaldab nii kommunismil kui ka ülemäärasel reguleerimisel säilitada intellektuaalset legitiimsust, hoolimata nende vastuseisust majanduslikule vabadusele?
answer: Nad tuginevad majanduslikele sofismidele - ekslikule arutluskäigule, mis pöörab vahendid ja eesmärgid ümber, loob valesid põhjuslikke seoseid ja esitab fiktiivseid vastandusi huvide vahel
wrong_answers:
  - Nad kasutavad ära tõelisi matemaatilisi vastuolusid vabaturu teoorias, mis näitavad, et jätkusuutlik majanduskasv on võimatu ilma riigi sekkumiseta
  - Nad kasutavad ära vabatahtlikele vahetussüsteemidele omast ebastabiilsust, mis loomulikult kipuvad monopoliseerumise poole ja vajavad regulatiivset korrigeerimist
  - Nad kasutavad ära tõestatud ajaloolist mustrit, et piiramata turud viivad ilma valitsuse järelevalveta paratamatult klassisõja ja sotsiaalse kokkuvarisemisega
explanation: |
  Bastiat' põhiline arusaam on, et majanduslikku vabadust vastandavad süsteemid säilitavad end sofismide - täpsemalt ekslike arutlusmudelite - abil, sealhulgas käsitledes tööd pigem eesmärgina kui vahendina, luues valesid põhjuslikke seoseid ning luues kunstliku vastandamise üldiste ja erihuvide vahel. Valed vastused viitavad ekslikult sellele, et neil süsteemidel on õigustatud loogilised alused, kuigi Bastiat'i mõte on just selles, et nad püsivad ainult loogiliste vigade ja väärkajastamiste, mitte liberaalse teooria tõeliste vastuolude kaudu.
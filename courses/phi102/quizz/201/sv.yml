question: Vad identifierar Bastiat som det grundläggande logiska felslutet som gör att både kommunism och överdriven reglering kan behålla intellektuell legitimitet trots att de motsätter sig ekonomisk frihet?
answer: De förlitar sig på ekonomiska sofismer - felaktiga resonemang som vänder upp och ner på medel och mål, skapar falska orsakssamband och presenterar fiktiva motsättningar mellan intressen
wrong_answers:
  - De utnyttjar verkliga matematiska motsägelser i teorin om den fria marknaden som visar att det är omöjligt att uppnå hållbar ekonomisk tillväxt utan statligt ingripande
  - De utnyttjar den inneboende instabiliteten i frivilliga utbytessystem som naturligt tenderar mot monopolisering och kräver reglering
  - De utnyttjar det bevisade historiska mönstret att obegränsade marknader oundvikligen leder till klasskrig och social kollaps utan statlig tillsyn
explanation: |
  Bastiats grundläggande insikt är att system som motsätter sig ekonomisk frihet upprätthåller sig själva genom sofismer - i synnerhet felaktiga resonemangsmönster som att behandla arbete som ett mål snarare än ett medel, etablera falska orsakssamband och skapa en konstlad motsättning mellan allmänna och särskilda intressen. De felaktiga svaren antyder felaktigt att dessa system har legitima logiska grunder, när Bastiats poäng är just att de överlever endast genom logiska fel och felaktiga framställningar, inte genom genuina motsägelser i liberal teori.
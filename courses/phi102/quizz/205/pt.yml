question: De acordo com a análise de Bastiat, que erro concetual fundamental leva tanto os proteccionistas como os socialistas a construírem argumentos falaciosos contra a liberdade económica?
answer: Invertem os meios e os fins, tratando os conceitos instrumentais como objectivos últimos, em vez de examinarem o que esses conceitos realmente alcançam
wrong_answers:
  - Não compreendem os cálculos matemáticos do equilíbrio da oferta e da procura em mercados competitivos
  - Assumem incorretamente que a intervenção do Estado produz sempre resultados mais eficientes do que a iniciativa privada
  - Não compreendem os precedentes históricos, aplicando modelos económicos ultrapassados às condições de mercado actuais
explanation: |
  Bastiat identifica um erro lógico sistemático em que os opositores da liberdade económica confundem meios com fins. Os proteccionistas tratam o trabalho como um fim em si mesmo e não como um meio de satisfação, enquanto os sistemas políticos apresentam frequentemente a democracia como um objetivo final e não como um meio para alcançar a liberdade civil e económica. Esta inversão permite que o raciocínio falacioso floresça, porque desvia a atenção dos resultados e dos efeitos reais. As outras opções descrevem desacordos políticos específicos ou erros metodológicos, mas perdem a visão mais profunda de Bastiat sobre a confusão concetual fundamental que está na base de múltiplas formas de sofismas económicos.
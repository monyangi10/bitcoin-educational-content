question: Kulingana na uchambuzi wa Bastiat, ni kosa gani la msingi la dhana linalowaongoza watetezi na wasoshalisti kujenga hoja za uongo dhidi ya uhuru wa kiuchumi?
answer: Hubadilisha njia na kuishia kwa kuzichukulia dhana za vifaa kama malengo ya mwisho badala ya kuchunguza kile ambacho dhana hizi zinafanikisha hasa.
wrong_answers:
  - Wanashindwa kuelewa hesabu za hisabati za usawa wa ugavi na mahitaji katika masoko ya ushindani
  - Wanadhani kimakosa kwamba uingiliaji kati wa serikali daima hutoa matokeo bora zaidi kuliko biashara binafsi
  - Hawaelewi mifano ya kihistoria kwa kutumia mifumo ya kiuchumi iliyopitwa na wakati katika hali ya soko la kisasa.
explanation: |
  Bastiat hutambua kosa la kimantiki la kimfumo ambapo wapinzani wa uhuru wa kiuchumi huchanganya njia na malengo. Watetezi wa haki za binadamu huchukulia kazi kama lengo lenyewe badala ya kama njia ya kuridhika, huku mifumo ya kisiasa mara nyingi ikiwasilisha demokrasia kama lengo kuu badala ya njia ya kufikia uhuru wa kiraia na kiuchumi. Ugeuzi huu huruhusu hoja potofu kushamiri kwa sababu huhamisha mwelekeo mbali na matokeo na matokeo halisi. Chaguzi zingine zinaelezea kutokubaliana kwa sera maalum au makosa ya kimbinu, lakini wanakosa ufahamu wa kina wa Bastiat kuhusu mkanganyiko wa kimsingi wa dhana unaosababisha aina nyingi za ujanja wa kiuchumi.
question: Welke fundamentele conceptuele fout leidt er volgens Bastiat toe dat zowel protectionisten als socialisten misleidende argumenten tegen economische vrijheid construeren?
answer: Ze keren middelen en doelen om door instrumentele concepten als uiteindelijke doelen te behandelen in plaats van te onderzoeken wat deze concepten eigenlijk bereiken
wrong_answers:
  - Ze begrijpen de wiskundige berekeningen van het evenwicht tussen vraag en aanbod in concurrerende markten niet
  - Ze gaan er ten onrechte van uit dat overheidsinterventie altijd efficiëntere resultaten oplevert dan particulier ondernemerschap
  - Ze begrijpen historische precedenten verkeerd door verouderde economische modellen toe te passen op hedendaagse marktomstandigheden
explanation: |
  Bastiat identificeert een systematische logische fout waarbij tegenstanders van economische vrijheid middelen met doelen verwarren. Protectionisten behandelen werk als een doel op zich in plaats van als een middel tot bevrediging, terwijl politieke systemen democratie vaak presenteren als een ultiem doel in plaats van als een middel om burgerlijke en economische vrijheid te bereiken. Deze omkering laat misleidende redeneringen gedijen omdat het de focus wegleidt van de werkelijke resultaten en uitkomsten. De andere opties beschrijven specifieke beleidsverschillen of methodologische fouten, maar missen Bastiat's diepere inzicht over de fundamentele conceptuele verwarring die ten grondslag ligt aan meerdere vormen van economische drogredenen.
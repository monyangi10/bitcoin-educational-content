question: Prema Bastiatovoj analizi, osnovna konceptualna greška koja navodi i protekcioniste i socijaliste da konstruiraju pogrešne argumente protiv ekonomske slobode je nerazumevanje ili zanemarivanje spontanog poretka tržišta i prirodne harmonije interesa u slobodnoj ekonomiji.
answer: Oni obrću sredstva i ciljeve tretirajući instrumentalne pojmove kao krajnje ciljeve umesto da ispitaju šta ti pojmovi zapravo postižu
wrong_answers:
  - Ne razumeju matematičke proračune ravnoteže ponude i potražnje na konkurentnim tržištima.
  - Oni pogrešno pretpostavljaju da državna intervencija uvek proizvodi efikasnije rezultate od privatnog preduzetništva
  - Pogrešno razumeju istorijske presedane primenjujući zastarele ekonomske modele na savremene tržišne uslove.
explanation: |
  Bastiat identifikuje sistematsku logičku grešku gde protivnici ekonomske slobode mešaju sredstva sa ciljevima. Protekcionisti tretiraju rad kao cilj sam po sebi, a ne kao sredstvo za zadovoljstvo, dok politički sistemi često predstavljaju demokratiju kao krajnji cilj, a ne kao sredstvo za postizanje građanske i ekonomske slobode. Ova inverzija omogućava da pogrešno rasuđivanje cveta jer preusmerava fokus sa stvarnih rezultata i ishoda. Druge opcije opisuju specifične političke nesuglasice ili metodološke greške, ali propuštaju Bastiatov dublji uvid o fundamentalnoj konceptualnoj konfuziji koja leži u osnovi više oblika ekonomske sofisterije.
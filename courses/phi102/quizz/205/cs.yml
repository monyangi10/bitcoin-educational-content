question: Jaká základní koncepční chyba vede podle Bastiatovy analýzy protekcionisty i socialisty ke konstrukci chybných argumentů proti ekonomické svobodě?
answer: Převracejí prostředky a cíle tím, že považují instrumentální koncepty za konečné cíle, místo aby zkoumali, čeho tyto koncepty skutečně dosahují
wrong_answers:
  - Nechápou matematické výpočty rovnováhy nabídky a poptávky na konkurenčních trzích
  - Nesprávně předpokládají, že státní zásahy vždy vedou k efektivnějším výsledkům než soukromé podnikání
  - Chybně chápou historické precedenty tím, že na současné tržní podmínky aplikují zastaralé ekonomické modely
explanation: |
  Bastiat identifikuje systematickou logickou chybu, kdy odpůrci ekonomické svobody zaměňují prostředky za cíle. Protekcionisté považují práci za cíl sám o sobě, nikoli za prostředek k dosažení spokojenosti, zatímco politické systémy často prezentují demokracii jako konečný cíl, nikoli jako prostředek k dosažení občanské a ekonomické svobody. Tato inverze umožňuje rozkvět chybného uvažování, protože přesouvá pozornost od skutečných výsledků a výstupů. Ostatní možnosti popisují konkrétní politické neshody nebo metodologické chyby, ale postrádají Bastiatův hlubší vhled do zásadního pojmového zmatku, který je základem mnoha forem ekonomické sofistiky.
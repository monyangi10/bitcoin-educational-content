question: Dushingiye ku nseguro ya Bastiat, ni irihe kosa ry’ishimikiro ry’ivyiyumviro rituma abaharanira uburenganzira bw’abantu n’abaharanira uburenganzira bw’abantu bubaka imvo zitari zo zirwanya umwidegemvyo w’ubutunzi?
answer: Bahindura uburyo n’iherezo mu gufata ivyiyumviro vy’ibikoresho nk’intumbero nyamukuru aho gusuzuma ivyo ivyo vyiyumviro bishikako mu vy’ukuri .
wrong_answers:
  - Bananirwa gutahura imibare y'imibare y'uburinganire bw'ugutanga n'ugusaba mu masoko y'amahiganwa .
  - Bafata nabi yuko gufasha kwa Leta kwama kuzana ingaruka nziza kuruta ugufasha kw’ibigo vy’abikorera ku giti cabo .
  - Batahura nabi ivyabaye kera mu gukoresha uburyo bw’ubutunzi bwa kera ku bijanye n’imibereho y’isoko ryo muri iki gihe .
explanation: |
  Bastiat yerekana ikosa ry’ubwenge ry’urutonde aho abarwanya umwidegemvyo w’ubutunzi batera urujijo uburyo n’intumbero. Abaharanira uburenganzira bw’abantu bafata igikorwa nk’intumbero ubwaco aho kugifata nk’uburyo bwo kunyurwa, mu gihe uburyo bwa politike akenshi bugaragaza demokarasi nk’intumbero nyamukuru aho kugifata nk’uburyo bwo gushika ku mwidegemvyo w’abanyagihugu n’uw’ubutunzi. Ukwo guhindura bituma ivyiyumviro bitari vyo bitera imbere kubera ko bikuraho ivyiyumviro ku ngaruka n’ingaruka nyavyo. Ayandi mahitamwo adondora ukutumvikana kw’ingingo mfatirwako canke amakosa y’uburyo, ariko arabura ubumenyi bwimbitse bwa Bastiat ku bijanye n’urujijo rw’ishimikiro rw’ivyiyumviro rushingiye ku buryo bwinshi bw’ubuhinga bw’ubutunzi.
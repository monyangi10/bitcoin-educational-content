question: 根据法国自由主义传统，为什么竞争是人类生存不可避免的一个方面？
answer: 因为世界上的资源是有限的，必须在个人之间进行分配
wrong_answers:
  - 因为人类天生具有攻击性，并寻求支配他人
  - 因为政治制度有意制造竞争，以维持控制
  - 因为社会习俗人为地建立了竞争关系
explanation: |
  文中解释说，竞争必然产生于资源的有限性，而不是人性或社会建构。因为苹果不是无限量存在的，所以必须由个人占有。思想家们认识到，即使是集体主义制度也无法消除竞争--它们只是将竞争转向政治关系、排队等候或行政特权。因此，竞争是物质世界稀缺性的基本结果，问题不在于竞争是否会存在，而在于用什么规则来管理竞争。
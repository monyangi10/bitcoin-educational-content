question: 프랑스 자유주의 전통에 따르면 경쟁이 인간 존재의 불가피한 측면인 이유는 무엇일까요?
answer: 세상의 자원은 유한하기 때문에 개인에게 할당해야 합니다
wrong_answers:
  - 인간은 본능적으로 공격적이고 다른 사람을 지배하려고 하기 때문입니다
  - 정치 시스템은 통제권을 유지하기 위해 의도적으로 경쟁을 유발하기 때문입니다
  - 사회적 관습이 인위적으로 경쟁 관계를 설정했기 때문에
explanation: |
  이 책은 경쟁이 인간의 본성이나 사회적 구조가 아니라 자원의 유한성에서 비롯된다는 점을 설명합니다. 사과는 무한히 존재하는 것이 아니기 때문에 개인이 적절히 배분해야 합니다. 이데올로그들은 집단주의 체제에서도 경쟁을 제거할 수 없으며 단지 정치적 관계, 대기열 또는 행정적 특권으로 경쟁의 방향을 전환할 뿐이라는 사실을 인식했습니다. 따라서 경쟁은 물리적 세계에서 희소성의 근본적인 결과이며, 문제는 경쟁의 존재 여부가 아니라 어떤 규칙이 경쟁을 지배할 것인가 하는 것입니다.
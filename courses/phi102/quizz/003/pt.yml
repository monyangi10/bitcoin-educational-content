question: De acordo com a tradição liberal francesa, porque é que a concorrência é um aspeto inevitável da existência humana?
answer: Porque os recursos no mundo são finitos e devem ser distribuídos entre os indivíduos
wrong_answers:
  - Porque os seres humanos são naturalmente agressivos e procuram dominar os outros
  - Porque os sistemas políticos criam deliberadamente a concorrência para manter o controlo
  - Porque as convenções sociais estabeleceram artificialmente relações de concorrência
explanation: |
  O texto explica que a concorrência surge necessariamente da finitude dos recursos e não da natureza humana ou de construções sociais. Uma vez que as maçãs não existem em número infinito, têm de ser apropriadas pelos indivíduos. Os Idéologues reconheceram que mesmo os sistemas colectivistas não podem eliminar a concorrência - apenas a redireccionam para relações políticas, filas de espera ou privilégios administrativos. A competição é, portanto, uma consequência fundamental da escassez no mundo físico, fazendo com que a questão não seja se a competição existirá, mas que regras a governarão.
question: Waarom is concurrentie volgens de Franse liberale traditie een onvermijdelijk aspect van het menselijk bestaan?
answer: Omdat hulpbronnen in de wereld eindig zijn en onder individuen moeten worden verdeeld
wrong_answers:
  - Omdat mensen van nature agressief zijn en anderen willen domineren
  - Omdat politieke systemen opzettelijk concurrentie creëren om de controle te behouden
  - Omdat sociale conventies kunstmatig concurrerende relaties hebben gevestigd
explanation: |
  De tekst legt uit dat concurrentie noodzakelijkerwijs voortkomt uit de eindigheid van hulpbronnen, niet uit de menselijke natuur of sociale constructies. Omdat appels niet in oneindige aantallen bestaan, moeten ze worden toegeëigend door individuen. De Idéologues erkenden dat zelfs collectivistische systemen concurrentie niet kunnen elimineren - ze leiden het slechts om naar politieke verhoudingen, wachtrijen of administratieve privileges. Concurrentie is dus een fundamenteel gevolg van schaarste in de fysieke wereld, waardoor de vraag niet is of er concurrentie zal bestaan, maar welke regels ervoor zullen gelden.
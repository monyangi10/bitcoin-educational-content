question: Warum ist der Wettbewerb nach der französischen liberalen Tradition ein unvermeidlicher Aspekt der menschlichen Existenz?
answer: Weil die Ressourcen in der Welt endlich sind und unter den Menschen aufgeteilt werden müssen
wrong_answers:
  - Weil Menschen von Natur aus aggressiv sind und danach streben, andere zu dominieren
  - Weil politische Systeme absichtlich Wettbewerb schaffen, um die Kontrolle zu behalten
  - Weil soziale Konventionen künstliche Wettbewerbsbeziehungen geschaffen haben
explanation: |
  Der Text erklärt, dass der Wettbewerb notwendigerweise aus der Endlichkeit der Ressourcen entsteht, nicht aus der menschlichen Natur oder sozialen Konstruktionen. Da es Äpfel nicht in unendlicher Zahl gibt, müssen sie sich von Einzelnen angeeignet werden. Die Idéologen haben erkannt, dass auch kollektivistische Systeme den Wettbewerb nicht ausschalten können - sie lenken ihn lediglich auf politische Beziehungen, Warteschlangen oder Verwaltungsprivilegien um. Der Wettbewerb ist also eine grundlegende Folge der Knappheit in der physischen Welt, so dass sich die Frage nicht stellt, ob es Wettbewerb geben wird, sondern nach welchen Regeln er ablaufen wird.
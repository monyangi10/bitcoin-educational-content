question: Dlaczego, zgodnie z francuską tradycją liberalną, konkurencja jest nieuniknionym aspektem ludzkiej egzystencji?
answer: Ponieważ zasoby na świecie są ograniczone i muszą być rozdzielane między jednostki
wrong_answers:
  - Ponieważ ludzie są z natury agresywni i dążą do dominacji nad innymi
  - Ponieważ systemy polityczne celowo tworzą konkurencję, aby utrzymać kontrolę
  - Ponieważ konwencje społeczne sztucznie ustanowiły konkurencyjne relacje
explanation: |
  Tekst wyjaśnia, że konkurencja wynika ze skończoności zasobów, a nie z ludzkiej natury czy konstrukcji społecznych. Ponieważ jabłka nie istnieją w nieskończonej ilości, muszą być przywłaszczane przez jednostki. Idéologues uznali, że nawet systemy kolektywistyczne nie mogą wyeliminować konkurencji - przekierowują ją jedynie na relacje polityczne, kolejki oczekujących lub przywileje administracyjne. Konkurencja jest zatem podstawową konsekwencją niedoboru w świecie fizycznym, co sprawia, że pytanie nie dotyczy tego, czy konkurencja będzie istnieć, ale jakie zasady będą nią rządzić.
question: Miks on konkurents prantsuse liberaalse traditsiooni kohaselt inimeksistentsi vältimatu osa?
answer: Kuna maailma ressursid on piiratud ja neid tuleb jaotada üksikisikute vahel
wrong_answers:
  - Kuna inimesed on loomupäraselt agressiivsed ja püüavad teisi domineerida
  - Kuna poliitilised süsteemid loovad teadlikult konkurentsi, et säilitada kontroll
  - Kuna sotsiaalsed konventsioonid on kunstlikult kehtestanud konkurentsisuhteid
explanation: |
  Tekstis selgitatakse, et konkurents tuleneb tingimata ressursside piiratusest, mitte inimloomusest või sotsiaalsetest konstruktsioonidest. Kuna õunu ei ole lõpmatus koguses olemas, peavad üksikisikud neid omastama. Idéoloogid tunnistasid, et isegi kollektivistlikud süsteemid ei suuda konkurentsi kõrvaldada - nad lihtsalt suunavad selle ümber poliitilistele suhetele, järjekordadele või administratiivsetele privileegidele. Konkurents on seega füüsilise maailma nappuse põhiline tagajärg, mistõttu küsimus ei ole mitte selles, kas konkurents eksisteerib, vaid selles, millised reeglid seda reguleerivad.
question: Selon la tradition libérale française, pourquoi la concurrence est-elle un aspect inévitable de l'existence humaine ?
answer: Parce que les ressources du monde sont limitées et doivent être réparties entre les individus
wrong_answers:
  - Parce que les humains sont naturellement agressifs et cherchent à dominer les autres
  - Parce que les systèmes politiques créent délibérément de la concurrence pour maintenir le contrôle
  - Parce que les conventions sociales ont artificiellement établi des relations de concurrence
explanation: |
  Le texte explique que la concurrence émerge nécessairement de la finitude des ressources, et non de la nature humaine ou de constructions sociales. Les pommes n'existant pas en nombre infini, elles doivent être appropriées par les individus. Les Idéologues reconnaissent que même les systèmes collectivistes ne peuvent pas éliminer la concurrence - ils ne font que la réorienter vers des relations politiques, des files d'attente ou des privilèges administratifs. La concurrence est donc une conséquence fondamentale de la rareté dans le monde physique, de sorte que la question n'est pas de savoir si la concurrence existera, mais quelles règles la régiront.
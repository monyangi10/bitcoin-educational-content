question: ตามประเพณีเสรีนิยมของฝรั่งเศส ทำไมการแข่งขันจึงเป็นแง่มุมที่หลีกเลี่ยงไม่ได้ของการดำรงอยู่ของมนุษย์?
answer: เนื่องจากทรัพยากรในโลกมีจำกัดและต้องถูกจัดสรรให้กับบุคคลต่าง ๆ
wrong_answers:
  - เพราะมนุษย์มีความก้าวร้าวโดยธรรมชาติและมุ่งหวังที่จะครอบงำผู้อื่น
  - เพราะระบบการเมืองสร้างการแข่งขันอย่างจงใจเพื่อรักษาการควบคุม
  - เพราะบรรทัดฐานทางสังคมได้สร้างความสัมพันธ์เชิงแข่งขันขึ้นอย่างไม่เป็นธรรมชาติ
explanation: |
  ข้อความอธิบายว่าการแข่งขันเกิดขึ้นอย่างหลีกเลี่ยงไม่ได้จากความจำกัดของทรัพยากร ไม่ใช่จากธรรมชาติของมนุษย์หรือโครงสร้างทางสังคม เนื่องจากแอปเปิ้ลไม่ได้มีอยู่ในจำนวนที่ไม่มีที่สิ้นสุด พวกมันจึงต้องถูกครอบครองโดยบุคคล Idéologues ตระหนักได้ว่าระบบรวมหมู่ไม่สามารถกำจัดการแข่งขันได้ - พวกมันเพียงแค่เปลี่ยนทิศทางไปสู่ความสัมพันธ์ทางการเมือง การรอคิว หรือสิทธิพิเศษทางการบริหาร ดังนั้นการแข่งขันจึงเป็นผลที่ตามมาโดยพื้นฐานของความขาดแคลนในโลกทางกายภาพ ทำให้คำถามไม่ใช่ว่าการแข่งขันจะมีอยู่หรือไม่ แต่กฎใดจะควบคุมมัน
question: Fransız liberal geleneğine göre, rekabet neden insan varoluşunun kaçınılmaz bir yönüdür?
answer: Dünyadaki kaynaklar sınırlı olduğundan ve bireyler arasında paylaştırılması gerektiğinden
wrong_answers:
  - Çünkü insanlar doğal olarak saldırgandır ve başkalarına hükmetmeye çalışırlar
  - Çünkü siyasi sistemler kontrolü sürdürmek için kasıtlı olarak rekabet yaratır
  - Çünkü sosyal gelenekler yapay olarak rekabetçi ilişkiler kurmuştur
explanation: |
  Metin, rekabetin insan doğasından ya da sosyal yapılardan değil, kaynakların sonluluğundan kaynaklandığını açıklamaktadır. Elmalar sonsuz sayıda bulunmadığından, bireyler tarafından sahiplenilmeleri gerekir. İdéologues, kolektivist sistemlerin bile rekabeti ortadan kaldıramayacağını, sadece siyasi ilişkilere, bekleme sıralarına veya idari ayrıcalıklara yönlendireceğini kabul etmiştir. Dolayısıyla rekabet, fiziksel dünyadaki kıtlığın temel bir sonucudur ve rekabetin var olup olmayacağı değil, hangi kurallarla yönetileceği sorusunu gündeme getirmektedir.
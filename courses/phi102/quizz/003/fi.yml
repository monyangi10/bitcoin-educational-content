question: Miksi kilpailu on ranskalaisen liberaalin perinteen mukaan väistämätön osa ihmiselämää?
answer: Koska maailman resurssit ovat rajalliset ja ne on jaettava yksilöiden kesken
wrong_answers:
  - Koska ihmiset ovat luonnostaan aggressiivisia ja pyrkivät hallitsemaan muita
  - Koska poliittiset järjestelmät luovat tarkoituksellisesti kilpailua säilyttääkseen hallinnan
  - Koska sosiaaliset konventiot ovat keinotekoisesti luoneet kilpailusuhteet..
explanation: |
  Tekstissä selitetään, että kilpailu syntyy väistämättä resurssien rajallisuudesta, ei ihmisluonnosta tai sosiaalisista rakenteista. Koska omenoita ei ole loputtomasti, yksilöiden on otettava ne haltuunsa. Idéologues tunnusti, että edes kollektivistiset järjestelmät eivät voi poistaa kilpailua - ne vain ohjaavat sen poliittisiin suhteisiin, jonoihin tai hallinnollisiin etuoikeuksiin. Kilpailu on siis fyysisen maailman niukkuuden perustavanlaatuinen seuraus, joten kysymys ei ole siitä, onko kilpailua olemassa, vaan siitä, millä säännöillä sitä säännellään.
question: Theo truyền thống tự do của Pháp, tại sao cạnh tranh lại là một khía cạnh không thể tránh khỏi của sự tồn tại của con người?
answer: Vì nguồn tài nguyên trên thế giới là hữu hạn và cần được phân bổ cho từng cá nhân.
wrong_answers:
  - Bởi vì con người vốn dĩ hung hăng và luôn tìm cách thống trị người khác.
  - Bởi vì các hệ thống chính trị cố tình tạo ra sự cạnh tranh để duy trì quyền kiểm soát.
  - Bởi vì các quy ước xã hội đã thiết lập một cách giả tạo các mối quan hệ cạnh tranh
explanation: |
  Văn bản giải thích rằng cạnh tranh tất yếu nảy sinh từ sự hữu hạn của nguồn lực, chứ không phải từ bản chất con người hay các cấu trúc xã hội. Vì táo không tồn tại với số lượng vô hạn, chúng phải được phân bổ cho từng cá nhân. Các nhà tư tưởng nhận ra rằng ngay cả các hệ thống tập thể cũng không thể loại bỏ cạnh tranh - chúng chỉ đơn thuần chuyển hướng cạnh tranh sang các mối quan hệ chính trị, hàng chờ hoặc đặc quyền hành chính. Do đó, cạnh tranh là hệ quả cơ bản của sự khan hiếm trong thế giới vật chất, đặt ra câu hỏi không phải là liệu cạnh tranh có tồn tại hay không, mà là những quy tắc nào sẽ chi phối nó.
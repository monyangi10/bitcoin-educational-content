question: Menurut tradisi liberal Prancis, mengapa persaingan merupakan aspek yang tak terelakkan dari keberadaan manusia?
answer: Karena sumber daya di dunia ini terbatas dan harus dialokasikan di antara individu-individu
wrong_answers:
  - Karena manusia secara alamiah agresif dan berusaha mendominasi orang lain
  - Karena sistem politik dengan sengaja menciptakan persaingan untuk mempertahankan kontrol
  - Karena konvensi sosial telah membentuk hubungan kompetitif secara artifisial
explanation: |
  Teks tersebut menjelaskan bahwa persaingan muncul karena keterbatasan sumber daya, bukan karena sifat manusia atau konstruksi sosial. Karena apel tidak ada dalam jumlah yang tak terbatas, maka apel harus diambil oleh individu-individu. Kaum Idéolog mengakui bahwa sistem kolektivis sekalipun tidak dapat menghilangkan persaingan - mereka hanya mengarahkannya ke arah hubungan politik, antrean, atau hak istimewa administratif. Persaingan adalah konsekuensi mendasar dari kelangkaan di dunia fisik, sehingga pertanyaannya bukan apakah persaingan akan ada, tetapi aturan apa yang akan mengaturnya.
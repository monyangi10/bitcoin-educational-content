question: Secondo la tradizione liberale francese, perché la competizione è un aspetto inevitabile dell'esistenza umana?
answer: Poiché le risorse nel mondo sono limitate e devono essere ripartite tra gli individui
wrong_answers:
  - Perché gli esseri umani sono naturalmente aggressivi e cercano di dominare gli altri
  - Perché i sistemi politici creano deliberatamente la competizione per mantenere il controllo
  - Perché le convenzioni sociali hanno stabilito artificialmente delle relazioni competitive
explanation: |
  Il testo spiega che la competizione emerge necessariamente dalla finitudine delle risorse, non dalla natura umana o dai costrutti sociali. Dal momento che le mele non esistono in numero infinito, devono essere appropriate dagli individui. Gli Idéologues riconoscevano che anche i sistemi collettivisti non possono eliminare la competizione, ma si limitano a reindirizzarla verso relazioni politiche, file d'attesa o privilegi amministrativi. La concorrenza è quindi una conseguenza fondamentale della scarsità nel mondo fisico, e la questione non è se la concorrenza esisterà, ma quali regole la governeranno.
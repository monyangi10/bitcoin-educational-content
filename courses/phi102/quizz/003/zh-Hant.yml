question: 根據法國自由主義傳統，為什麼競爭是人類生存不可避免的一面？
answer: 因為世界上的資源是有限的，而且必須在個人之間分配
wrong_answers:
  - 因為人類天生具有攻擊性，並尋求支配他人
  - 因為政治體系刻意製造競爭以維持控制
  - 因為社會慣例已經人為地建立了競爭關係
explanation: |
  文中解釋，競爭必然來自於資源的有限性，而非來自於人性或社會建構。由於蘋果並不是無限數量的，因此必須由個人來攫取。偶像派認為，即使是集體主義制度也無法消除競爭 - 它們只是將競爭重新導向政治關係、輪候隊伍或行政特權。因此，競爭是物質世界中稀缺性的基本結果，這使得問題不在於競爭是否存在，而在於用什麼規則來規範競爭。
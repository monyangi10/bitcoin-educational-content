question: Menurut Frédéric Bastiat dan Gustave de Molinari, apa yang menciptakan keharmonisan alami dalam hubungan sosial?
answer: Saling ketergantungan antara klien dan pemasok dalam hubungan pertukaran
wrong_answers:
  - Pemberlakuan peraturan pemerintah yang ketat terhadap kegiatan komersial
  - Penghapusan segala bentuk persaingan ekonomi antar bisnis
  - Perencanaan produksi dan distribusi yang terpusat oleh pihak berwenang
explanation: |
  Bastiat dan Molinari mengidentifikasi bahwa keharmonisan muncul secara alami dari hubungan pertukaran karena klien membutuhkan pemasok untuk barang-barang yang diinginkan, sementara pemasok membutuhkan klien yang makmur dan mampu membeli produk mereka. Hal ini menciptakan hubungan yang saling menguntungkan di semua tingkatan, mulai dari keluarga hingga perdagangan internasional. Pilihan lain bertentangan dengan filosofi mereka: mereka menentang peraturan pemerintah dan perencanaan terpusat, karena mereka percaya bahwa hal tersebut mengganggu keharmonisan alami. Mereka juga mendukung persaingan sebagai sesuatu yang bermanfaat, bukan sesuatu yang harus dihilangkan, karena persaingan mendorong kemajuan dan efisiensi dalam melayani kebutuhan manusia.
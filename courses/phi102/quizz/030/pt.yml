question: Segundo Frédéric Bastiat e Gustave de Molinari, o que é que cria uma harmonia natural nas relações sociais?
answer: A dependência mútua entre clientes e fornecedores nas relações de troca
wrong_answers:
  - A aplicação de regulamentos governamentais rigorosos às actividades comerciais
  - A eliminação de todas as formas de concorrência económica entre empresas
  - O planeamento centralizado da produção e da distribuição pelas autoridades
explanation: |
  Bastiat e Molinari identificaram que a harmonia emerge naturalmente das relações de troca porque os clientes precisam de fornecedores para os bens desejados, enquanto os fornecedores precisam de clientes prósperos que possam pagar os seus produtos. Isto cria relações mutuamente benéficas a todos os níveis, desde a família ao comércio internacional. As outras opções contradizem a sua filosofia: opunham-se à regulamentação governamental e ao planeamento centralizado, acreditando que estes interferiam com a harmonia natural. Também defendiam que a concorrência era benéfica e não algo a eliminar, uma vez que impulsiona o progresso e a eficiência na satisfação das necessidades humanas.
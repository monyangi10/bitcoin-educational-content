question: 根據 Frédéric Bastiat 和 Gustave de Molinari 的看法，是什麼創造了社會關係的自然和諧？
answer: 客戶與供應商在交換關係中的相互依賴性
wrong_answers:
  - 政府對商業活動執行嚴格的規範
  - 消除企業間一切形式的經濟競爭
  - 由主管機關集中規劃生產與分配
explanation: |
  Bastiat 和 Molinari 認為和諧是自然產生於交換關係，因為客戶需要供應商提供所需的商品，而供應商則需要能夠負擔得起其產品的富裕客戶。這在從家庭到國際商業的各個層面都創造了互惠互利的關係。其他的選擇與他們的哲學相矛盾：他們反對政府管制與中央規劃，認為這些會干擾自然和諧。他們也支持競爭，認為競爭是有益的，而不是應該消除的，因為競爭能推動進步，提高服務人類需求的效率。
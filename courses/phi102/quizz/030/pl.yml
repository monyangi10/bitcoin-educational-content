question: Według Frédérica Bastiata i Gustave'a de Molinariego, co tworzy naturalną harmonię w relacjach społecznych?
answer: Wzajemna zależność między klientami i dostawcami w relacjach wymiany
wrong_answers:
  - Egzekwowanie surowych przepisów rządowych dotyczących działalności handlowej
  - Eliminacja wszelkich form konkurencji gospodarczej między przedsiębiorstwami
  - Scentralizowane planowanie produkcji i dystrybucji przez władze
explanation: |
  Bastiat i Molinari stwierdzili, że harmonia wyłania się naturalnie z relacji wymiany, ponieważ klienci potrzebują dostawców pożądanych towarów, podczas gdy dostawcy potrzebują zamożnych klientów, których stać na ich produkty. Tworzy to wzajemnie korzystne relacje na wszystkich poziomach, od rodziny po handel międzynarodowy. Inne opcje są sprzeczne z ich filozofią: sprzeciwiali się regulacjom rządowym i scentralizowanemu planowaniu, wierząc, że zakłócają one naturalną harmonię. Wspierali również konkurencję jako korzystną, a nie coś, co należy wyeliminować, ponieważ napędza ona postęp i wydajność w zaspokajaniu ludzkich potrzeb.
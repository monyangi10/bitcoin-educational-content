question: Hva skaper naturlig harmoni i sosiale relasjoner, ifølge Frédéric Bastiat og Gustave de Molinari?
answer: Den gjensidige avhengigheten mellom kunder og leverandører i bytteforhold
wrong_answers:
  - Håndhevelse av strenge statlige reguleringer av kommersiell virksomhet
  - Eliminering av alle former for økonomisk konkurranse mellom bedrifter
  - Myndighetenes sentraliserte planlegging av produksjon og distribusjon
explanation: |
  Bastiat og Molinari identifiserte at harmoni oppstår naturlig fra bytteforhold fordi kundene trenger leverandører av ønskede varer, mens leverandørene trenger velstående kunder som har råd til produktene deres. Dette skaper gjensidig fordelaktige relasjoner på alle nivåer, fra familie til internasjonal handel. De andre alternativene strider mot deres filosofi: De motsatte seg statlig regulering og sentralisert planlegging, fordi de mente at dette forstyrret den naturlige harmonien. De var også tilhengere av konkurranse, som de mente var et gode og ikke noe som burde avskaffes, siden det driver frem fremskritt og effektivitet i tilfredsstillelsen av menneskelige behov.
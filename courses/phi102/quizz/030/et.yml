question: Mis loob Frédéric Bastiat' ja Gustave de Molinari sõnul sotsiaalsetes suhetes loomulikku harmooniat?
answer: Klientide ja tarnijate vastastikune sõltuvus vahetussuhetes
wrong_answers:
  - Rangete valitsuse määruste jõustamine äritegevuse suhtes
  - Igasuguse majandusliku konkurentsi kaotamine ettevõtete vahel
  - Tootmise ja jaotamise tsentraliseeritud planeerimine ametiasutuste poolt
explanation: |
  Bastiat ja Molinari leidsid, et harmoonia tekib loomulikult vahetus suhetest, sest kliendid vajavad soovitud kaupade jaoks tarnijaid, tarnijad aga jõukaid kliente, kes saavad endale nende tooteid lubada. See loob vastastikku kasulikud suhted kõikidel tasanditel, alates perekonnast kuni rahvusvahelise kaubanduseni. Teised valikud on nende filosoofiaga vastuolus: nad olid vastu riiklikule reguleerimisele ja tsentraliseeritud planeerimisele, sest uskusid, et need segavad loomulikku harmooniat. Samuti toetasid nad konkurentsi kui kasulikku, mitte kui midagi, mida tuleks kõrvaldada, sest see soodustab progressi ja tõhusust inimeste vajaduste teenindamisel.
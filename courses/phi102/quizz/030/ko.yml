question: 프레데릭 바스티앙과 구스타브 드 몰리나리에 따르면, 사회적 관계에서 자연스러운 조화를 이루는 것은 무엇일까요?
answer: 교환 관계에서 고객과 공급업체 간의 상호 의존성
wrong_answers:
  - 상업 활동에 대한 정부의 엄격한 규제 시행
  - 기업 간 모든 형태의 경제적 경쟁을 제거합니다
  - 당국에 의한 생산 및 유통의 중앙 집중식 계획
explanation: |
  바스티아와 몰리나리는 고객은 원하는 상품을 공급하는 공급자가 필요하고, 공급자는 제품을 구매할 수 있는 부유한 고객이 필요하기 때문에 교환 관계에서 자연스럽게 조화가 이루어진다는 사실을 발견했습니다. 이는 가족에서부터 국제 상거래에 이르기까지 모든 수준에서 상호 이익이 되는 관계를 만들어냅니다. 다른 옵션은 그들의 철학과 모순되는 것으로, 이들은 정부 규제와 중앙 집중식 계획이 자연스러운 조화를 방해한다고 믿으며 반대했습니다. 또한 경쟁은 인간의 욕구를 충족시키는 데 있어 진보와 효율성을 촉진하기 때문에 제거해야 할 대상이 아니라 유익한 것으로 지지했습니다.
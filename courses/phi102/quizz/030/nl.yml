question: Wat creëert volgens Frédéric Bastiat en Gustave de Molinari een natuurlijke harmonie in sociale relaties?
answer: De wederzijdse afhankelijkheid tussen klanten en leveranciers in ruilrelaties
wrong_answers:
  - De handhaving van strenge overheidsregels op commerciële activiteiten
  - De eliminatie van alle vormen van economische concurrentie tussen bedrijven
  - De gecentraliseerde planning van productie en distributie door overheden
explanation: |
  Bastiat en Molinari stelden vast dat harmonie op natuurlijke wijze voortkomt uit uitwisselingsrelaties omdat klanten leveranciers nodig hebben voor de gewenste goederen, terwijl leveranciers welvarende klanten nodig hebben die zich hun producten kunnen veroorloven. Dit creëert wederzijds voordelige relaties op alle niveaus, van familie tot internationale handel. De andere opties zijn in tegenspraak met hun filosofie: ze zijn tegen overheidsregulering en gecentraliseerde planning, omdat ze geloven dat deze de natuurlijke harmonie verstoren. Ze steunden ook concurrentie als iets heilzaams, niet iets om uit te bannen, omdat het vooruitgang en efficiëntie in het voorzien in menselijke behoeften stimuleert.
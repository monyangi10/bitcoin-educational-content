question: フレデリック・バスティアとギュスターヴ・ド・モリナーリによれば、社会的関係において自然な調和を生み出すものは何か？
answer: 交換関係における顧客とサプライヤーの相互依存関係
wrong_answers:
  - 商業活動に対する政府の厳しい規制の実施
  - 企業間のあらゆる形態の経済競争の排除
  - 当局による中央集権的な生産・流通計画
explanation: |
  バスティアとモリナーリは、取引関係から調和が自然に生まれると指摘した。なぜなら、顧客は望ましい商品を供給するサプライヤーを必要とし、サプライヤーは自社製品を購入できる豊かな顧客を必要とするからである。これにより、家族から国際的な商取引に至るまで、あらゆるレベルで互恵的な関係が生まれる。他の選択肢は彼らの哲学と矛盾する。彼らは政府の規制や中央集権的な計画に反対し、これらは自然の調和を妨げると考えていた。また、競争は人間のニーズに応えるための進歩や効率を促進するものであり、排除すべきものではなく有益なものとして支持した。
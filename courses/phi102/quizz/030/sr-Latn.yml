question: Prema Frédéricu Bastijatu i Gustavu de Molinariju, prirodnu harmoniju u društvenim odnosima stvara slobodna razmena i tržišna ekonomija.
answer: Međusobna zavisnost između klijenata i dobavljača u razmenama odnosa
wrong_answers:
  - Sprovođenje strogih vladinih propisa o komercijalnim aktivnostima
  - Eliminacija svih oblika ekonomske konkurencije između preduzeća
  - Centralizovano planiranje proizvodnje i distribucije od strane vlasti
explanation: |
  Bastiat i Molinari su identifikovali da harmonija prirodno proizlazi iz odnosa razmene jer klijenti trebaju dobavljače za željenu robu, dok dobavljači trebaju prosperitetne klijente koji mogu priuštiti njihove proizvode. Ovo stvara međusobno korisne odnose na svim nivoima, od porodice do međunarodne trgovine. Druge opcije protivreče njihovoj filozofiji: protivili su se vladinoj regulaciji i centralizovanom planiranju, verujući da oni ometaju prirodnu harmoniju. Takođe su podržavali konkurenciju kao korisnu, a ne nešto što treba eliminisati, jer ona pokreće napredak i efikasnost u zadovoljenju ljudskih potreba.
question: Nadharia ya kiliberali inatambua udhaifu mkuu wa watu waliotengwa unaohitaji vyama vya hiari badala ya kuingilia kati kwa serikali?
answer: Udhaifu wao kwa kutokuwa na uhakika wa maisha na kupungua kwa uwezo wa uzalishaji baada ya muda
wrong_answers:
  - Kutoweza kwao kuunda mikataba yenye mantiki bila mwongozo wa kitaasisi
  - Tabia yao ya kufanya maamuzi yasiyo na ufanisi kiuchumi bila kanuni
  - Ukosefu wao wa maendeleo ya maadili bila miundo ya kijamii ya pamoja
explanation: |
  Kulingana na nadharia ya kiliberali, watu waliotengwa wamekuwa dhaifu kila wakati wanapokabiliwa na kutokuwa na uhakika wa maisha na mageuko ya asili ya uwezo wao wa uzalishaji katika maisha yao yote. Udhaifu huu wa msingi unaelezea kwa nini wanadamu wameishi katika jamii tangu nyakati za kikabila, lakini waliberali wanasema kwamba vyama vya hiari na makampuni binafsi yanapaswa kushughulikia udhaifu huu badala ya kuingilia kati kwa serikali. Majibu yasiyo sahihi yanapotosha mawazo ya kiliberali: waliberali wanaamini watu binafsi wanaweza kuunda mikataba ya busara kwa uhuru, kufanya maamuzi yenye ufanisi kupitia mifumo ya soko, na kukua kimaadili kupitia ushirikiano wa hiari badala ya kuhitaji mwongozo wa serikali au miundo ya pamoja.
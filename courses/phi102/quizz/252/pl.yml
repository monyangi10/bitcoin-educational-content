question: Co teoria liberalna określa jako podstawową słabość odizolowanych jednostek, która wymaga raczej dobrowolnych stowarzyszeń niż interwencji państwa?
answer: Ich podatność na życiową niepewność i malejącą z czasem zdolność produkcyjną
wrong_answers:
  - Ich niezdolność do zawierania racjonalnych umów bez wsparcia instytucjonalnego
  - Ich tendencja do podejmowania nieefektywnych ekonomicznie decyzji bez regulacji
  - Ich brak rozwoju moralnego bez kolektywnych struktur społecznych
explanation: |
  Zgodnie z teorią liberalną, odizolowane jednostki zawsze były słabe w obliczu życiowej niepewności i naturalnej ewolucji ich zdolności produkcyjnych przez całe życie. Ta fundamentalna słabość wyjaśnia, dlaczego ludzie żyją w społeczeństwach od czasów plemiennych, ale liberałowie twierdzą, że dobrowolne stowarzyszenia i prywatne przedsiębiorstwa powinny zająć się tą słabością, a nie interwencją państwa. Błędne odpowiedzi błędnie przedstawiają myśl liberalną: liberałowie wierzą, że jednostki mogą autonomicznie zawierać racjonalne umowy, podejmować skuteczne decyzje za pomocą mechanizmów rynkowych i rozwijać się moralnie poprzez dobrowolną współpracę, a nie wymagać państwowego przewodnictwa lub struktur zbiorowych.
question: Ni igiki inyigisho y’ubwigenge igaragaza ko ari intege nke nyamukuru y’abantu bitandukanije n’abandi ikeneye amashirahamwe y’ubushake aho gufasha Leta?
answer: Uko bashobora gushikirwa n’ibintu bidatomoye mu buzima be n’uko ubushobozi bwabo bwo gutanga umusaruro bugabanuka uko igihe kigenda kirarenga
wrong_answers:
  - Kudashobora kwabo gukora amasezerano ashingiye ku vyiyumviro ata buyobozi bw’inzego .
  - Impengamiro yabo yo gufata ingingo zidafise akamaro mu vy’ubutunzi ata mategeko .
  - Kubura iterambere ryabo mu vy’inyifato runtu ata mibumbe y’imibano rusangi .
explanation: |
  Dukurikije inyigisho y’ubwigenge, abantu bari ukwabo bama ari abagoyagoya igihe bahanganye n’ibintu bidatomoye mu buzima be n’ugutera imbere kw’ubushobozi bwabo bwo gutanga umusaruro mu buzima bwabo bwose. Ukwo guhungabana kw’ishimikiro gusigura igituma abantu babayeho mu mibano kuva mu bihe vy’imiryango, ariko abaharanira umwidegemvyo bavuga ko amashirahamwe y’ubushake n’ibigo vyigenga bikwiye gutorera umuti iyo ntege nke aho gufasha Leta. Inyishu zitari zo ziserura nabi iciyumviro c’abanyagihugu: abanyagihugu bemera ko abantu bashobora gukora amasezerano ashingiye ku vyiyumviro ku giti cabo, bagafata ingingo zibereye biciye mu buryo bw’isoko, bagatera imbere mu vy’inyifato runtu biciye mu gukorana n’abandi ku bushake aho gusaba ubuyobozi bwa Leta canke imibumbe rusangi.
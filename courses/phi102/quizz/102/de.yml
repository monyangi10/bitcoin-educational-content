question: Warum hat Adam Smith dem Text zufolge Rechtsanwälte, Künstler und Ärzte fälschlicherweise als "unproduktive Arbeiter" eingestuft?
answer: Er glaubte, dass ihre Produkte sofort nach der Auslieferung verschwanden
wrong_answers:
  - Er war der Meinung, dass sie nicht zum Bruttoinlandsprodukt beitrugen
  - Er betrachtete ihre Arbeit als rein spekulativ und theoretisch
  - Er war der Meinung, dass sie den Wohlstand nur umverteilen, anstatt ihn zu schaffen
explanation: |
  Adam Smiths Irrtum rührte von seiner engen Auffassung von Produktion als ausschließlich materieller Transformation her. Er stufte Anwälte, Künstler und Ärzte als unproduktiv ein, weil er der Meinung war, dass ihre Produktion unmittelbar nach der Abgabe verschwindet. Diese Sichtweise ist jedoch grundlegend fehlerhaft, weil sie den bleibenden Wert der geistigen und immateriellen Produktion außer Acht lässt. Der Unterricht eines Lehrers verschwindet nicht - er schafft einen dauerhaften intellektuellen Wert. In ähnlicher Weise schafft die Behandlung eines Arztes einen dauerhaften gesundheitlichen Nutzen, und die Arbeit eines Künstlers schafft einen kulturellen Wert. Echte Produktion bedeutet, Nutzen zu schaffen und anderen einen Dienst zu erweisen, unabhängig davon, ob der Output materiell oder immateriell ist. Dieses umfassendere Verständnis erkennt an, dass jede Arbeit, die menschlichen Bedürfnissen dient, eine echte produktive Tätigkeit darstellt.
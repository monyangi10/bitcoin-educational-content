question: Secondo il testo, perché Adam Smith ha erroneamente classificato avvocati, artisti e medici come "lavoratori improduttivi"?
answer: Credeva che i loro prodotti sparissero subito dopo essere stati consegnati
wrong_answers:
  - Pensava che non contribuissero al prodotto interno lordo
  - Considerava il loro lavoro come puramente speculativo e teorico
  - Credeva che si limitassero a ridistribuire la ricchezza piuttosto che a crearla
explanation: |
  L'errore di Adam Smith derivava dalla sua concezione ristretta della produzione, intesa solo come trasformazione materiale. Egli classificò avvocati, artisti e medici come improduttivi perché pensava che la loro produzione svanisse immediatamente dopo la consegna. Tuttavia, questa visione è fondamentalmente errata perché ignora il valore duraturo della produzione intellettuale e immateriale. La lezione di un insegnante non scompare, ma crea un valore intellettuale duraturo. Allo stesso modo, la cura di un medico fornisce benefici duraturi per la salute e l'opera di un artista crea valore culturale. La vera produzione significa creare utilità e fornire servizi agli altri, indipendentemente dal fatto che il risultato sia materiale o immateriale. Questa concezione più ampia riconosce che tutto il lavoro che serve ai bisogni umani costituisce una vera attività produttiva.
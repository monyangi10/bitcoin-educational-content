question: 根據文中所述，為何 Adam Smith 錯誤地將律師、藝術家和醫生歸類為「非生產性工人」？
answer: 他相信他們的產品在送達後立即消失了。
wrong_answers:
  - 他認為他們對國內生產總值沒有貢獻
  - 他認為他們的工作純粹是臆測和理論性的
  - 他認為他們只是重新分配財富，而不是創造財富。
explanation: |
  亞當‧斯密的錯誤來自於他對生產的狹隘概念，認為生產只是物質的轉換。他把律師、藝術家和醫生歸類為非生產性的，因為他認為他們的產出在交付後立即消失。然而，這種觀點存在根本性的缺陷，因為它忽略了智力和非物質生產的持久價值。老師上的課不會消失 - 它會創造持久的知識價值。同樣地，醫生的治療能提供持久的健康效益，藝術家的作品能創造文化價值。真正的生產是指創造效用並為他人提供服務，不論產出是物質或非物質。這種更廣泛的理解承認，所有服務人類需求的工作都構成真正的生產活動。
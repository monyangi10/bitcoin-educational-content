question: Kulingana na maandishi, kwa nini Adam Smith aliwaainisha kimakosa wanasheria, wasanii, na madaktari kama 'wafanyakazi wasio na tija'?
answer: Aliamini bidhaa zao zilitoweka mara tu baada ya kuwasilishwa
wrong_answers:
  - Alidhani hawakuchangia pato la taifa
  - Aliona kazi yao kuwa ya kubahatisha tu na ya kinadharia
  - Aliamini kwamba waligawanya utajiri upya tu badala ya kuuunda
explanation: |
  Kosa la Adam Smith lilitokana na dhana yake finyu ya uzalishaji kama mabadiliko ya nyenzo pekee. Aliainisha wanasheria, wasanii, na madaktari kama wasio na tija kwa sababu alidhani matokeo yao yalitoweka mara tu baada ya kujifungua. Hata hivyo, mtazamo huu kimsingi una kasoro kwa sababu unapuuza thamani ya kudumu ya uzalishaji wa kiakili na usio wa nyenzo. Somo la mwalimu halipotei - linaunda thamani ya kudumu ya kiakili. Vile vile, matibabu ya daktari hutoa faida za kudumu za kiafya, na kazi ya msanii inaunda thamani ya kitamaduni. Uzalishaji wa kweli unamaanisha kuunda matumizi na kutoa huduma kwa wengine, bila kujali kama matokeo ni ya nyenzo au hayana nyenzo. Uelewa huu mpana unatambua kwamba kazi yote inayohudumia mahitaji ya binadamu ni shughuli halisi ya uzalishaji.
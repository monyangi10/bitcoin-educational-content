question: ตามข้อความ ทำไมอดัม สมิธจึงจัดประเภททนายความ ศิลปิน และแพทย์อย่างไม่ถูกต้องว่าเป็น 'แรงงานที่ไม่ก่อให้เกิดผลผลิต'?
answer: เขาเชื่อว่าสินค้าของพวกเขาหายไปทันทีหลังจากที่ถูกส่งมอบ
wrong_answers:
  - เขาคิดว่าพวกเขาไม่ได้มีส่วนร่วมในผลิตภัณฑ์มวลรวมภายในประเทศ
  - เขาถือว่างานของพวกเขาเป็นเพียงการคาดเดาและทฤษฎีเท่านั้น
  - เขาเชื่อว่าพวกเขาเพียงแค่กระจายความมั่งคั่งใหม่แทนที่จะสร้างมันขึ้นมา
explanation: |
  ข้อผิดพลาดของ Adam Smith เกิดจากการที่เขามองการผลิตในแง่แคบ ๆ ว่าเป็นเพียงการเปลี่ยนแปลงทางวัตถุเท่านั้น เขาจัดประเภททนายความ ศิลปิน และแพทย์ว่าไม่มีผลิตภาพ เพราะเขาคิดว่าผลผลิตของพวกเขาหายไปทันทีหลังจากส่งมอบ อย่างไรก็ตาม มุมมองนี้มีข้อบกพร่องอย่างมากเพราะมันมองข้ามคุณค่าที่ยั่งยืนของการผลิตทางปัญญาและไม่มีตัวตน บทเรียนของครูไม่ได้หายไป - มันสร้างคุณค่าทางปัญญาที่ยั่งยืน ในทำนองเดียวกัน การรักษาของแพทย์ให้ประโยชน์ต่อสุขภาพที่ยั่งยืน และงานของศิลปินสร้างคุณค่าทางวัฒนธรรม การผลิตที่แท้จริงหมายถึงการสร้างประโยชน์ใช้สอยและให้บริการแก่ผู้อื่น ไม่ว่าจะเป็นผลผลิตที่มีตัวตนหรือไม่มีตัวตน ความเข้าใจที่กว้างขึ้นนี้ยอมรับว่างานทั้งหมดที่ตอบสนองความต้องการของมนุษย์ถือเป็นกิจกรรมการผลิตที่แท้จริง
question: Theo văn bản, tại sao Adam Smith lại phân loại sai luật sư, nghệ sĩ và bác sĩ là "những người lao động không hiệu quả"?
answer: Ông ta tin rằng sản phẩm của họ biến mất ngay lập tức sau khi được giao.
wrong_answers:
  - Ông ta cho rằng chúng không đóng góp vào tổng sản phẩm quốc nội.
  - Ông cho rằng công trình của họ chỉ mang tính chất suy đoán và lý thuyết thuần túy.
  - Ông tin rằng họ chỉ phân phối lại của cải chứ không phải tạo ra của cải.
explanation: |
  Sai lầm của Adam Smith bắt nguồn từ quan niệm hẹp hòi của ông về sản xuất chỉ là sự biến đổi vật chất. Ông xếp luật sư, nghệ sĩ và bác sĩ vào nhóm không sản xuất vì cho rằng sản phẩm của họ biến mất ngay sau khi hoàn thành. Tuy nhiên, quan điểm này về cơ bản là sai lầm vì nó bỏ qua giá trị lâu dài của sản xuất trí tuệ và phi vật chất. Bài học của một giáo viên không biến mất - nó tạo ra giá trị trí tuệ bền vững. Tương tự, phương pháp điều trị của bác sĩ mang lại lợi ích sức khỏe lâu dài, và tác phẩm của một nghệ sĩ tạo ra giá trị văn hóa. Sản xuất thực sự có nghĩa là tạo ra tiện ích và cung cấp dịch vụ cho người khác, bất kể sản phẩm đầu ra là vật chất hay phi vật chất. Quan niệm rộng hơn này thừa nhận rằng tất cả công việc phục vụ nhu cầu của con người đều cấu thành hoạt động sản xuất đích thực.
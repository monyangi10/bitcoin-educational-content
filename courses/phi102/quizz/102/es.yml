question: Según el texto, ¿por qué Adam Smith clasificó erróneamente a los abogados, artistas y médicos como "trabajadores improductivos"?
answer: Creía que sus productos desaparecían inmediatamente después de ser entregados
wrong_answers:
  - Pensaba que no contribuían al producto interior bruto
  - Consideraba que su trabajo era puramente especulativo y teórico
  - Creía que sólo redistribuían la riqueza en lugar de crearla
explanation: |
  El error de Adam Smith provenía de su estrecha concepción de la producción como mera transformación material. Clasificó a los abogados, artistas y médicos como improductivos porque pensaba que su producción desaparecía inmediatamente después de la entrega. Sin embargo, este punto de vista es fundamentalmente erróneo porque ignora el valor duradero de la producción intelectual e inmaterial. La lección de un profesor no desaparece: crea un valor intelectual duradero. Del mismo modo, el tratamiento de un médico proporciona beneficios duraderos para la salud, y la obra de un artista crea valor cultural. La verdadera producción significa crear utilidad y prestar servicios a otros, independientemente de que el producto sea material o inmaterial. Esta concepción más amplia reconoce que todo trabajo que sirve a las necesidades humanas constituye una auténtica actividad productiva.
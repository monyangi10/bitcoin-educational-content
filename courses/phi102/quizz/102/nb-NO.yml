question: Hvorfor klassifiserte Adam Smith feilaktig advokater, kunstnere og leger som "uproduktive arbeidere", ifølge teksten?
answer: Han mente at produktene deres forsvant umiddelbart etter at de ble levert
wrong_answers:
  - Han mente at de ikke bidro til bruttonasjonalproduktet
  - Han anså arbeidet deres for å være rent spekulativt og teoretisk
  - Han mente at de bare omfordelte rikdom i stedet for å skape den
explanation: |
  Adam Smiths feil skyldtes hans snevre oppfatning av produksjon som kun materiell omdannelse. Han klassifiserte advokater, kunstnere og leger som uproduktive fordi han trodde at deres produksjon forsvant umiddelbart etter levering. Dette synet er imidlertid grunnleggende feil fordi det ignorerer den varige verdien av intellektuell og immateriell produksjon. En lærers undervisning forsvinner ikke - den skaper varig intellektuell verdi. På samme måte gir en leges behandling varige helsegevinster, og en kunstners arbeid skaper kulturell verdi. Ekte produksjon betyr å skape nytteverdi og å yte tjenester til andre, uavhengig av om resultatet er materielt eller immaterielt. Denne bredere forståelsen anerkjenner at alt arbeid som tjener menneskelige behov, utgjør ekte produktiv aktivitet.
question: 본문에 따르면 아담 스미스는 왜 변호사, 예술가, 의사를 '비생산적 노동자'로 잘못 분류했을까요?
answer: 그는 제품이 배송된 후 바로 사라졌다고 믿었습니다
wrong_answers:
  - 그는 국내총생산에 기여하지 않는다고 생각했습니다
  - 그는 그들의 연구가 순전히 사변적이고 이론적이라고 생각했습니다
  - 그는 부를 창출하기보다는 재분배할 뿐이라고 믿었습니다
explanation: |
  아담 스미스의 오류는 생산을 물질적 변화로만 좁게 생각한 데서 비롯되었습니다. 그는 변호사, 예술가, 의사를 비생산적인 직업으로 분류했는데, 그 이유는 그들의 생산물이 출산 직후에 사라진다고 생각했기 때문입니다. 그러나 이러한 관점은 지적 생산과 비물질적 생산의 지속적인 가치를 무시하기 때문에 근본적으로 결함이 있습니다. 교사의 수업은 사라지는 것이 아니라 지속적인 지적 가치를 창출합니다. 마찬가지로 의사의 치료는 지속적인 건강상의 이점을 제공하고 예술가의 작품은 문화적 가치를 창출합니다. 진정한 생산이란 결과물이 물질적이든 비물질적이든 상관없이 효용을 창출하고 다른 사람에게 서비스를 제공하는 것을 의미합니다. 이러한 폭넓은 이해는 인간의 필요에 부응하는 모든 작업이 진정한 생산 활동에 해당한다는 것을 인정합니다.
question: Dukurikije ico canditswe, ni kuki Adamu Smith yashize mu buryo butari bwo abavoka, abahinga mu vy’ubuhinga bw’amasanamu n’abaganga ko ari ‘abakozi batagira ico bakora’?
answer: Yarizera ko ibintu vyabo vyazimangana ubwo nyene bimaze gushikirizwa .
wrong_answers:
  - Yariyumviriye ko ataco batanga ku musaruro wose w'igihugu .
  - Yabona ko igikorwa cabo ari ugutekereza ku bintu gusa be n’ugutekereza ku bintu .
  - Yarizera ko basubira gusangira ubutunzi aho kuburema .
explanation: |
  Ikosa rya Adamu Smith ryakomotse ku ciyumviro ciwe gitoyi c'uko uguhingura ari uguhindura ibintu gusa. Yashize mu rutonde abavoka, abahinga mu vy’ubuhinga bw’amasanamu n’abaganga nk’abatagira ico bakora kubera ko yiyumvira ko ivyo bakora bica bizimangana ubwo nyene bamaze kuvyara. Ariko rero, iyo mbonerahamwe irafise amakosa mu vy’ukuri kubera ko yirengagiza agaciro karamba k’uguhingura ibintu mu bwenge no mu bintu bitagira umubiri. Icigwa c’umwigisha ntikizimangana - kirema agaciro k’ubwenge karamba. Mu buryo nk’ubwo, ubuvuzi bw’umuganga buratanga inyungu ziramvye ku buzima, kandi igikorwa c’umuhinga mu vy’ubuhinga bw’ugushushanya kiratuma umuntu agira agaciro k’umuco. Uguhingura vy’ukuri bisigura kurema inyungu no guha abandi ibikorwa, ata kuraba ko umusaruro ari uw’ibintu canke udafise. Ukwo gutahura kwagutse kwemera yuko igikorwa cose gifasha umuntu gufasha ari igikorwa nyakuri kizana inyungu.
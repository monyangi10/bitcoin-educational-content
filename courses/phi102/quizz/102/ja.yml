question: 本文によれば、アダム・スミスが弁護士、芸術家、医師を「非生産的労働者」として誤って分類したのはなぜか？
answer: 彼は、彼らの製品は配達された直後に消えてしまったと考えていた
wrong_answers:
  - 国内総生産に貢献していないと考えていた。
  - 彼は、彼らの仕事は純粋に推測的で理論的なものだと考えていた。
  - 彼は、彼らは富を生み出すのではなく、富を再分配しているだけだと考えていた。
explanation: |
  アダム・スミスの誤りは、生産を物質的変化のみとする彼の狭い概念に起因する。アダム・スミスは、弁護士、芸術家、医師を非生産的なものとして分類した。しかし、この考え方は、知的生産と非物質的生産の永続的価値を無視しているため、根本的な欠陥がある。教師の授業は消えることはなく、永続的な知的価値を生み出す。同様に、医師の治療は永続的な健康上の利益をもたらし、芸術家の作品は文化的価値を生み出す。真の生産とは、生産物が物質的であるか非物質的であるかにかかわらず、効用を生み出し、他者にサービスを提供することである。この広い理解は、人間のニーズに応えるすべての仕事が真の生産活動にあたることを認識するものである。
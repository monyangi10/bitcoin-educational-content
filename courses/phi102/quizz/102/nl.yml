question: Waarom classificeerde Adam Smith volgens de tekst advocaten, kunstenaars en artsen ten onrechte als 'onproductieve arbeiders'?
answer: Hij geloofde dat hun producten onmiddellijk na levering verdwenen
wrong_answers:
  - Hij vond dat ze niet bijdroegen aan het bruto binnenlands product
  - Hij beschouwde hun werk als puur speculatief en theoretisch
  - Hij geloofde dat ze rijkdom alleen herverdeelden in plaats van creëerden
explanation: |
  De fout van Adam Smith kwam voort uit zijn beperkte opvatting van productie als alleen materiële transformatie. Hij classificeerde advocaten, kunstenaars en artsen als onproductief omdat hij dacht dat hun productie onmiddellijk na levering verdween. Deze opvatting is echter fundamenteel fout omdat het de blijvende waarde van intellectuele en immateriële productie negeert. De les van een leraar verdwijnt niet - hij creëert blijvende intellectuele waarde. Op dezelfde manier levert de behandeling van een arts blijvende gezondheidsvoordelen op en creëert het werk van een kunstenaar culturele waarde. Echte productie betekent het creëren van nut en het leveren van diensten aan anderen, ongeacht of de output materieel of immaterieel is. Dit bredere begrip erkent dat al het werk dat menselijke behoeften dient een echte productieve activiteit is.
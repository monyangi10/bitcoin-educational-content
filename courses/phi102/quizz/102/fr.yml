question: D'après le texte, pourquoi Adam Smith a-t-il classé à tort les avocats, les artistes et les médecins dans la catégorie des "travailleurs improductifs" ?
answer: Il pensait que leurs produits disparaissaient immédiatement après avoir été livrés
wrong_answers:
  - Il estimait qu'ils ne contribuaient pas au produit intérieur brut
  - Il considère leur travail comme purement spéculatif et théorique
  - Il estimait qu'elles ne faisaient que redistribuer la richesse au lieu de la créer
explanation: |
  L'erreur d'Adam Smith provient de sa conception étroite de la production, qui se limite à la transformation matérielle. Il considérait les avocats, les artistes et les médecins comme improductifs parce qu'il pensait que leur production disparaissait immédiatement après la livraison. Or, cette conception est fondamentalement erronée car elle ignore la valeur durable de la production intellectuelle et immatérielle. La leçon d'un enseignant ne disparaît pas, elle crée une valeur intellectuelle durable. De même, le traitement d'un médecin procure des avantages durables en matière de santé, et l'œuvre d'un artiste crée une valeur culturelle. La véritable production consiste à créer de l'utilité et à fournir des services aux autres, que le résultat soit matériel ou immatériel. Cette conception plus large reconnaît que tout travail qui répond à des besoins humains constitue une véritable activité productive.
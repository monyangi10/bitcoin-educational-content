question: According to the text, why did Adam Smith incorrectly classify lawyers, artists, and doctors as 'unproductive workers'?
answer: He believed their products disappeared immediately after being delivered
wrong_answers:
  - He thought they did not contribute to the gross domestic product
  - He considered their work to be purely speculative and theoretical
  - He believed they only redistributed wealth rather than creating it
explanation: |
  Adam Smith's error stemmed from his narrow conception of production as only material transformation. He classified lawyers, artists, and doctors as unproductive because he thought their output vanished immediately after delivery. However, this view is fundamentally flawed because it ignores the lasting value of intellectual and immaterial production. A teacher's lesson doesn't disappear - it creates enduring intellectual value. Similarly, a doctor's treatment provides lasting health benefits, and an artist's work creates cultural value. True production means creating utility and providing services to others, regardless of whether the output is material or immaterial. This broader understanding recognizes that all work that serves human needs constitutes genuine productive activity.

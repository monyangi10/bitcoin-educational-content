question: Menurut teks tersebut, mengapa Adam Smith salah mengklasifikasikan pengacara, seniman, dan dokter sebagai 'pekerja tidak produktif'?
answer: Dia percaya bahwa produk mereka menghilang segera setelah dikirim
wrong_answers:
  - Dia berpikir bahwa mereka tidak berkontribusi terhadap produk domestik bruto
  - Dia menganggap pekerjaan mereka murni spekulatif dan teoritis
  - Dia percaya bahwa mereka hanya mendistribusikan kembali kekayaan dan bukan menciptakannya
explanation: |
  Kesalahan Adam Smith berasal dari konsepsi sempitnya tentang produksi hanya sebagai transformasi material. Dia mengklasifikasikan pengacara, seniman, dan dokter sebagai tidak produktif karena menurutnya hasil kerja mereka lenyap segera setelah melahirkan. Namun, pandangan ini pada dasarnya cacat karena mengabaikan nilai abadi dari produksi intelektual dan immaterial. Pelajaran yang diberikan oleh seorang guru tidak akan hilang - pelajaran tersebut menciptakan nilai intelektual yang abadi. Demikian pula, perawatan dokter memberikan manfaat kesehatan yang langgeng, dan karya seniman menciptakan nilai budaya. Produksi yang sebenarnya berarti menciptakan kegunaan dan memberikan layanan kepada orang lain, terlepas dari apakah hasilnya berupa materi atau non-materi. Pemahaman yang lebih luas ini mengakui bahwa semua pekerjaan yang melayani kebutuhan manusia merupakan aktivitas produktif yang sesungguhnya.
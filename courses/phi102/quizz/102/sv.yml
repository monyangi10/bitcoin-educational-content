question: Enligt texten, varför klassificerade Adam Smith felaktigt advokater, konstnärer och läkare som "improduktiva arbetare"?
answer: Han trodde att deras produkter försvann omedelbart efter att de levererats
wrong_answers:
  - Han ansåg att de inte bidrog till bruttonationalprodukten
  - Han ansåg att deras arbete var rent spekulativt och teoretiskt
  - Han menade att de bara omfördelade välstånd snarare än skapade det
explanation: |
  Adam Smiths misstag berodde på att han hade en snäv syn på produktion, som endast omfattade materiell omvandling. Han klassade advokater, konstnärer och läkare som improduktiva eftersom han trodde att deras produktion försvann omedelbart efter leverans. Detta synsätt är dock i grunden felaktigt eftersom det bortser från det bestående värdet av intellektuell och immateriell produktion. En lärares lektion försvinner inte - den skapar ett bestående intellektuellt värde. På samma sätt ger en läkares behandling bestående hälsofördelar, och en konstnärs arbete skapar kulturellt värde. Verklig produktion innebär att skapa nytta och tillhandahålla tjänster till andra, oavsett om resultatet är materiellt eller immateriellt. Denna bredare förståelse innebär att allt arbete som tillgodoser mänskliga behov utgör genuin produktiv verksamhet.
question: De acordo com a teoria liberal, que caraterística fundamental distingue a assistência privada da assistência pública em termos do seu impacto no desenvolvimento humano?
answer: A assistência privada eleva os indivíduos, respeitando a sua individualidade e promovendo o progresso, ao passo que a assistência pública os degrada até à dependência servil
wrong_answers:
  - A assistência privada fornece mais recursos financeiros por beneficiário, enquanto a assistência pública distribui fundos limitados por populações maiores
  - A assistência privada centra-se na ajuda temporária de emergência, enquanto a assistência pública cria redes de segurança permanentes para a estabilidade a longo prazo
  - A assistência privada funciona através de instituições religiosas que promovem os valores morais, enquanto a assistência pública continua a ter uma abordagem estritamente secular
explanation: |
  A teoria liberal defende que a assistência privada difere fundamentalmente da assistência pública na sua abordagem à dignidade humana e ao desenvolvimento. A assistência privada respeita a autonomia individual e incentiva o crescimento pessoal, enquanto a assistência pública burocrática cria relações de dependência semelhantes à servidão feudal. Esta distinção reflecte a ênfase liberal na associação voluntária versus a coerção estatal, em que a ajuda voluntária mantém a agência humana, enquanto a assistência institucional cria uma dependência degradante que inibe o progresso individual e a autodeterminação.
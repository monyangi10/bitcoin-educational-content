question: Kulingana na nadharia ya kiliberali, ni sifa gani ya msingi inayotofautisha usaidizi wa kibinafsi na usaidizi wa umma kulingana na athari zake kwa maendeleo ya binadamu?
answer: Msaada wa kibinafsi huwainua watu binafsi kwa kuheshimu utu wao na kukuza maendeleo, huku usaidizi wa umma ukiwafanya wategemee kama watumwa.
wrong_answers:
  - Usaidizi wa kibinafsi hutoa rasilimali zaidi za kifedha kwa kila mpokeaji, huku usaidizi wa umma ukisambaza fedha chache kwa idadi kubwa ya watu
  - Msaada wa kibinafsi unalenga katika misaada ya dharura ya muda, huku usaidizi wa umma ukiunda mitandao ya usalama ya kudumu kwa ajili ya utulivu wa muda mrefu
  - Msaada wa kibinafsi hufanya kazi kupitia taasisi za kidini zinazokuza maadili, huku usaidizi wa umma ukibaki kuwa wa kidunia pekee.
explanation: |
  Nadharia ya kiliberali inasema kwamba usaidizi wa kibinafsi hutofautiana kimsingi na usaidizi wa umma katika mbinu yake ya utu na maendeleo ya binadamu. Usaidizi wa kibinafsi unaheshimu uhuru wa mtu binafsi na unahimiza ukuaji wa kibinafsi, huku usaidizi wa umma wa urasimu ukiunda uhusiano wa utegemezi sawa na utumwa wa kimwinyi. Tofauti hii inaonyesha msisitizo wa kiliberali katika ushirika wa hiari dhidi ya kulazimishwa na serikali, ambapo usaidizi wa hiari hudumisha uwakala wa kibinadamu huku ustawi wa taasisi ukiunda utegemezi unaoshusha chini unaozuia maendeleo ya mtu binafsi na kujitawala.
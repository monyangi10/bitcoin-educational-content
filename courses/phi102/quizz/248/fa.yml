question: بر اساس نظریه لیبرال، چه ویژگی اساسی کمک‌های خصوصی را از کمک‌های عمومی از نظر تأثیر آن بر توسعه انسانی متمایز می‌کند؟
answer: کمک خصوصی با احترام به فردیت افراد و ترویج پیشرفت، آن‌ها را ارتقا می‌دهد، در حالی که کمک عمومی آن‌ها را به وابستگی شبیه به رعیت تنزل می‌دهد.
wrong_answers:
  - کمک خصوصی منابع مالی بیشتری را به ازای هر گیرنده فراهم می‌کند، در حالی که کمک عمومی بودجه محدودی را در بین جمعیت‌های بزرگ‌تر توزیع می‌کند.
  - کمک خصوصی بر امداد اضطراری موقت تمرکز دارد، در حالی که کمک عمومی شبکه‌های ایمنی دائمی برای ثبات بلندمدت ایجاد می‌کند.
  - کمک خصوصی از طریق نهادهای مذهبی که ارزش‌های اخلاقی را ترویج می‌کنند، عمل می‌کند، در حالی که کمک عمومی به طور کاملاً سکولار عمل می‌کند.
explanation: |
  نظریه لیبرال استدلال می‌کند که کمک‌های خصوصی از نظر رویکرد به کرامت انسانی و توسعه، اساساً با کمک‌های عمومی متفاوت است. کمک‌های خصوصی به خودمختاری فردی احترام می‌گذارد و رشد شخصی را تشویق می‌کند، در حالی که کمک‌های عمومی بوروکراتیک روابط وابستگی مشابه با بندگی فئودالی ایجاد می‌کند. این تمایز، تأکید لیبرال بر انجمن داوطلبانه در مقابل اجبار دولتی را منعکس می‌کند، جایی که کمک داوطلبانه عاملیت انسانی را حفظ می‌کند، در حالی که رفاه نهادی وابستگی تحقیرآمیزی ایجاد می‌کند که پیشرفت فردی و خودتعیینی را مهار می‌کند.
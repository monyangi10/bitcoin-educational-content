question: Kulingana na falsafa ya kiliberali, ni nini kinachofanya kodi nyingi kupita kiasi kuwa zaidi ya michango halali ya huduma kuwa sawa na aina ya uchokozi wa eneo?
answer: Inajumuisha uvamizi wa haki za mali za mtu binafsi sawa na jinsi taifa moja linavyokiuka uhuru wa eneo la mwingine.
wrong_answers:
  - Inazuia serikali kutekeleza majukumu yake ya msingi ya ulinzi na kudumisha huduma muhimu za umma
  - Inaleta ukosefu wa ufanisi wa kiuchumi unaopunguza utajiri wa taifa kwa ujumla na uwezo wa uzalishaji baada ya muda.
  - Inakiuka kanuni za kidemokrasia kwa kuweka mzigo wa kifedha bila uwakilishi sahihi katika maamuzi ya serikali
explanation: |
  Maandishi yanathibitisha kwamba kodi ya kupita kiasi inawakilisha aina ya uchokozi wa eneo dhidi ya mali ya mtu binafsi, kama vile uvamizi wa kijeshi unavyokiuka uhuru wa eneo la kitaifa. Sambamba hii inaonyesha hoja ya kiliberali kwamba haki za mali zinapaswa kuheshimiwa kila mara katika viwango vyote - kuanzia ngazi ya mtu binafsi hadi ya kitaifa. Chaguzi zingine zinazingatia masuala ya vitendo au ya kidemokrasia badala ya ukiukaji wa msingi wa haki za mali ambao falsafa ya kiliberali inasisitiza.
question: 根据自由主义哲学，是什么使超出合法服务贡献的过度征税等同于一种领土侵略？
answer: 它构成了对个人财产权的侵犯，就像一个国家侵犯另一个国家的领土主权一样
wrong_answers:
  - 它妨碍了国家履行其基本的保护职能和维持基本的公共服务
  - 它造成经济效率低下，随着时间的推移会减少国家的整体财富和生产能力
  - 它违反了民主原则，在政府决策中没有适当的代表权而强加财政负担
explanation: |
  文中指出，过度征税是对个人财产的一种领土侵略，就像军事入侵侵犯国家领土主权一样。这种并列关系表明了自由主义的论点，即从个人到国家所有层面的财产权都应始终得到尊重。其他选择侧重于实际或民主方面的关切，而不是自由主义哲学所强调的对基本财产权的侵犯。
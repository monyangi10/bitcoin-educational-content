question: 根據自由哲學，是什麼讓超出合法服務貢獻的過度課稅等同於一種領土侵略？
answer: 這構成對個人財產權的侵犯，就像一個國家侵犯另一個國家的領土主權一樣。
wrong_answers:
  - 它妨礙國家履行其基本的保護職能，並維持基本的公共服務
  - 它造成經濟效率低落，長期降低整體國家財富和生產力
  - 它違反了民主原則，在政府決策中沒有適當代表的情況下強加財務負擔。
explanation: |
  文中指出，過度徵稅是對個人財產的一種領土侵略，就像軍事入侵侵犯國家領土主權一樣。這一平行證明了自由主義的論點，即從個人到國家層級，所有規模的財產權都應該受到一致的尊重。其他選項著重於實際或民主的考量，而非自由哲學所強調的侵犯基本財產權。
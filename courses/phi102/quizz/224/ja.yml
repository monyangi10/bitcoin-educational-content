question: 自由主義哲学によれば、合法的な奉仕活動への寄付を超えた過剰な課税が、領土侵略に相当するのはなぜか？
answer: それは、ある国が他の国の領土主権を侵害するのと同様に、個人の財産権の侵害にあたる。
wrong_answers:
  - 国家が基本的な保護機能を果たし、必要不可欠な公共サービスを維持することを妨げる。
  - 経済的な非効率性を生み出し、国全体の富と生産能力を長期にわたって低下させる。
  - 政府の決定において適切な代表者がいないまま財政負担を課すことで、民主主義の原則に違反している。
explanation: |
  この文章は、軍事侵攻が国家の領土主権を侵害するのと同様に、過剰な課税が個人の財産に対する領土侵略の一形態であることを立証している。この平行線は、財産権は個人から国家レベルまで、あらゆる規模において一貫して尊重されるべきだというリベラルの主張を実証している。他の選択肢は、リベラルの哲学が強調する基本的な財産権の侵害ではなく、実際的あるいは民主的な懸念に焦点を当てている。
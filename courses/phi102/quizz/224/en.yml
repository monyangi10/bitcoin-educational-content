question: According to liberal philosophy, what makes excessive taxation beyond legitimate service contributions equivalent to a form of territorial aggression?
answer: It constitutes an invasion of individual property rights similar to how one nation violates another's territorial sovereignty
wrong_answers:
  - It prevents the state from fulfilling its basic protective functions and maintaining essential public services
  - It creates economic inefficiencies that reduce overall national wealth and productive capacity over time
  - It violates democratic principles by imposing financial burdens without proper representation in government decisions
explanation: |
  The text establishes that excessive taxation represents a form of territorial aggression against individual property, just as military invasion violates national territorial sovereignty. This parallel demonstrates the liberal argument that property rights should be consistently respected at all scales - from individual to national levels. The other options focus on practical or democratic concerns rather than the fundamental property rights violation that the liberal philosophy emphasizes.

question: Dukurikije filozofiya y’ubwigenge, ni igiki gituma gutanga imisoro irenze urugero rw’intererano z’ibikorwa zibereye bingana n’uburyo bumwe bwo gutera intara?
answer: Ni ugutera uburenganzira bw’umuntu ku giti ciwe nk’uko igihugu kimwe gihungabanya ubusegaba bw’intara y’ikindi .
wrong_answers:
  - Bibuza Leta gushitsa ibikorwa vyayo vy’ishimikiro vyo kurinda no kubungabunga ibikorwa vya Leta bihambaye .
  - Bituma ubutunzi bugira ubukene bugabanya ubutunzi bw’igihugu muri rusangi n’ubushobozi bwo gutanga umusaruro uko igihe kigenda kirarenga .
  - Rirarenga ku ngingo ngenderwako za demokarasi mu gushiraho imitwaro y’amahera ata n’umwe aserukira neza mu ngingo za Leta .
explanation: |
  Ico canditswe gishinga intahe ko gutanga imisoro birenze urugero bigereranya uburyo bwo gutera intara ku mutungo w’umuntu ku giti ciwe, nk’uko nyene igitero c’igisirikare gihungabanya ubusegaba bw’intara y’igihugu. Ivyo bisa n’ivyo vyerekana ko uburenganzira bw’umutungo bukwiye kwubahirizwa ubudasiba ku rugero rwose - kuva ku muntu ku giti ciwe gushika ku rwego rw’igihugu. Ayandi mahitamwo yibanda ku bijanye n’ibikorwa canke demokarasi aho kwibanda ku kurenga kw’uburenganzira bw’umutungo bw’ishimikiro nk’uko filozofiya y’ubwigenge ishimikirako.
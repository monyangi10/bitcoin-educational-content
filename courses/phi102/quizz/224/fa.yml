question: بر اساس فلسفه لیبرال، چه چیزی باعث می‌شود که مالیات‌گیری بیش از حد که فراتر از مشارکت‌های خدمات مشروع است، معادل نوعی تجاوز ارضی تلقی شود؟
answer: این به منزله تجاوز به حقوق مالکیت فردی است، مشابه با چگونگی نقض حاکمیت ارضی یک کشور توسط کشور دیگر.
wrong_answers:
  - این امر مانع از آن می‌شود که دولت وظایف حفاظتی اساسی خود را انجام دهد و خدمات عمومی ضروری را حفظ کند.
  - این امر ناکارآمدی‌های اقتصادی ایجاد می‌کند که به مرور زمان ثروت ملی کلی و ظرفیت تولیدی را کاهش می‌دهد.
  - این امر با تحمیل بارهای مالی بدون نمایندگی مناسب در تصمیم‌گیری‌های دولتی، اصول دموکراتیک را نقض می‌کند.
explanation: |
  متن بیان می‌کند که مالیات بیش از حد نوعی تجاوز ارضی به مالکیت فردی است، همان‌طور که تهاجم نظامی حاکمیت ارضی ملی را نقض می‌کند. این شباهت نشان‌دهنده استدلال لیبرالی است که حقوق مالکیت باید در تمام سطوح - از فردی تا ملی - به طور مداوم محترم شمرده شود. گزینه‌های دیگر بر نگرانی‌های عملی یا دموکراتیک تمرکز دارند، نه بر نقض اساسی حقوق مالکیت که فلسفه لیبرالی بر آن تأکید دارد.
question: Wat maakt, volgens de liberale filosofie, buitensporige belastingheffing boven de legitieme dienstbijdragen gelijk aan een vorm van territoriale agressie?
answer: Het is een inbreuk op individuele eigendomsrechten, vergelijkbaar met hoe een land de territoriale soevereiniteit van een ander land schendt
wrong_answers:
  - Het verhindert de staat om zijn fundamentele beschermende functies te vervullen en essentiële openbare diensten in stand te houden
  - Het creëert economische inefficiënties die de algehele nationale welvaart en productiecapaciteit in de loop der tijd verminderen
  - Het schendt democratische principes door financiële lasten op te leggen zonder een goede vertegenwoordiging in overheidsbesluiten
explanation: |
  De tekst stelt vast dat buitensporige belasting een vorm van territoriale agressie tegen individueel eigendom is, net zoals een militaire invasie de nationale territoriale soevereiniteit schendt. Deze parallel toont het liberale argument dat eigendomsrechten consequent gerespecteerd moeten worden op alle schaalniveaus - van individueel tot nationaal niveau. De andere opties richten zich op praktische of democratische overwegingen in plaats van op de fundamentele schending van eigendomsrechten die de liberale filosofie benadrukt.
question: Liberal felsefeye göre, meşru hizmet katkılarının ötesinde aşırı vergilendirmeyi bir tür bölgesel saldırganlıkla eşdeğer kılan nedir?
answer: Bir ulusun diğerinin toprak egemenliğini ihlal etmesine benzer şekilde bireysel mülkiyet haklarına bir saldırı teşkil eder
wrong_answers:
  - Devletin temel koruyucu işlevlerini yerine getirmesini ve temel kamu hizmetlerini sürdürmesini engeller
  - Zaman içinde toplam ulusal zenginliği ve üretken kapasiteyi azaltan ekonomik verimsizlikler yaratır
  - Hükümet kararlarında uygun temsil olmaksızın mali yükler getirerek demokratik ilkeleri ihlal eder
explanation: |
  Metin, tıpkı askeri işgalin ulusal toprak egemenliğini ihlal etmesi gibi, aşırı vergilendirmenin de bireysel mülkiyete karşı bir tür toprak saldırısı olduğunu ortaya koymaktadır. Bu paralellik, mülkiyet haklarına bireysel düzeyden ulusal düzeye kadar her ölçekte tutarlı bir şekilde saygı gösterilmesi gerektiği yönündeki liberal argümanı ortaya koymaktadır. Diğer seçenekler, liberal felsefenin vurguladığı temel mülkiyet hakları ihlalinden ziyade pratik veya demokratik kaygılara odaklanmaktadır.
question: Según la filosofía liberal, ¿qué hace que una fiscalidad excesiva más allá de las contribuciones legítimas a los servicios equivalga a una forma de agresión territorial?
answer: Constituye una invasión de los derechos de propiedad individual similar a la forma en que una nación viola la soberanía territorial de otra
wrong_answers:
  - Impide al Estado cumplir sus funciones básicas de protección y mantener los servicios públicos esenciales
  - Crea ineficiencias económicas que reducen con el tiempo la riqueza nacional global y la capacidad productiva
  - Viola los principios democráticos al imponer cargas financieras sin la debida representación en las decisiones de gobierno
explanation: |
  El texto establece que los impuestos excesivos representan una forma de agresión territorial contra la propiedad individual, del mismo modo que la invasión militar viola la soberanía territorial nacional. Este paralelismo demuestra el argumento liberal de que los derechos de propiedad deben respetarse sistemáticamente a todas las escalas, desde el nivel individual hasta el nacional. Las otras opciones se centran en preocupaciones prácticas o democráticas más que en la violación fundamental de los derechos de propiedad que subraya la filosofía liberal.
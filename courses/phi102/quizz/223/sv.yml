question: Vilken logisk inkonsekvens uppstår när socialister motsätter sig individuellt arv samtidigt som de accepterar att franska medborgare ärver det franska nationella territoriet från tidigare generationer?
answer: Socialister accepterar kollektivt arv av nationell rikedom men förkastar individuellt arv, vilket avslöjar godtyckligt erkännande av äganderätt baserat på skala snarare än princip
wrong_answers:
  - Socialister motsätter sig konsekvent alla former av arv, inklusive nationellt medborgarskap, vilket gör deras ståndpunkt logiskt sammanhängande över olika organisationsskalor
  - Inkonsekvensen visar att socialister föredrar individuell äganderätt framför kollektiv, vilket motsäger deras uttalade preferens för gemensamt ägande
  - Socialister löser detta genom att förespråka en global omfördelning av alla nationella rikedomar för att eliminera både individuellt och kollektivt arv helt och hållet
explanation: |
  Texten avslöjar en grundläggande motsägelse i socialistiskt tänkande: samtidigt som socialister motsätter sig individuellt arv som orättvist, accepterar de underförstått att franska medborgare ärver Frankrikes kollektiva rikedomar och territorium bara genom att vara födda franska. Detta avslöjar att socialister faktiskt erkänner arvsrätten på nationell nivå - franska medborgare ärver från tidigare franska generationer - samtidigt som de förnekar samma princip på individnivå. Författaren menar att detta visar på en godtycklig tillämpning av äganderättsprinciper som baseras på skala snarare än konsekvent logik, eftersom både individuellt och nationellt arv följer samma grundläggande princip om generationsöverföring av rikedomar och resurser.
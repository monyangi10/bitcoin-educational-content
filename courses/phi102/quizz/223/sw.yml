question: Ni kutofautiana gani kwa kimantiki kunakojitokeza wakati wasoshalisti wanapinga urithi wa mtu binafsi huku wakikubali kwamba raia wa Ufaransa wanarithi eneo la kitaifa la Ufaransa kutoka kwa vizazi vilivyopita?
answer: Wasoshalisti wanakubali urithi wa pamoja wa utajiri wa taifa huku wakikataa urithi wa mtu binafsi, wakifichua utambuzi wa kiholela wa haki za mali kulingana na kipimo badala ya kanuni.
wrong_answers:
  - Wasoshalisti wanapinga kila mara aina zote za urithi ikiwa ni pamoja na uraia wa kitaifa, na kufanya msimamo wao kuwa thabiti kimantiki katika mizani tofauti ya shirika.
  - Kutolingana huko kunaonyesha kwamba wasoshalisti wanapendelea haki za mali za mtu binafsi kuliko zile za pamoja, wakipinga upendeleo wao uliotajwa wa umiliki wa jumuiya.
  - Wasoshalisti hutatua hili kwa kutetea ugawaji upya wa utajiri wote wa taifa duniani ili kuondoa kabisa urithi wa mtu binafsi na wa pamoja.
explanation: |
  Maandishi yanafichua utata wa kimsingi katika fikra za kijamaa: huku wakipinga urithi wa mtu binafsi kama usio wa haki, wasoshalisti wanakubali waziwazi kwamba raia wa Ufaransa wanarithi utajiri na eneo la pamoja la Ufaransa kwa kuzaliwa Wafaransa. Hii inaonyesha kwamba wasoshalisti wanatambua haki za urithi katika ngazi ya kitaifa - raia wa Ufaransa wanarithi kutoka kwa vizazi vilivyopita vya Ufaransa - huku wakikataa kanuni hiyo hiyo katika ngazi ya mtu binafsi. Mwandishi anasema hii inaonyesha matumizi ya kiholela ya kanuni za mali kulingana na kipimo badala ya mantiki thabiti, kwani urithi wa mtu binafsi na kitaifa hufuata kanuni ile ile ya msingi ya uhamisho wa utajiri na rasilimali kwa vizazi.
question: Que incoerência lógica surge quando os socialistas se opõem à herança individual e aceitam que os cidadãos franceses herdem o território nacional francês das gerações anteriores?
answer: Os socialistas aceitam a herança colectiva da riqueza nacional, mas rejeitam a herança individual, revelando um reconhecimento arbitrário dos direitos de propriedade baseado na escala e não nos princípios
wrong_answers:
  - Os socialistas opõem-se sistematicamente a todas as formas de herança, incluindo a cidadania nacional, o que torna a sua posição logicamente coerente em diferentes escalas de organização
  - A incoerência mostra que os socialistas favorecem os direitos de propriedade individuais em detrimento dos colectivos, contradizendo a sua preferência declarada pela propriedade comunal
  - Os socialistas resolvem esta questão defendendo a redistribuição global de toda a riqueza nacional para eliminar completamente a herança individual e colectiva
explanation: |
  O texto expõe uma contradição fundamental no pensamento socialista: ao mesmo tempo que se opõem à herança individual como injusta, os socialistas aceitam implicitamente que os cidadãos franceses herdem a riqueza colectiva e o território de França simplesmente por terem nascido franceses. Isto revela que os socialistas reconhecem efetivamente os direitos de herança a nível nacional - os cidadãos franceses herdam das gerações francesas anteriores - enquanto negam o mesmo princípio a nível individual. O autor argumenta que este facto demonstra uma aplicação arbitrária dos princípios de propriedade baseada na escala e não numa lógica coerente, uma vez que tanto a herança individual como a nacional seguem o mesmo princípio básico de transferência geracional de riqueza e recursos.
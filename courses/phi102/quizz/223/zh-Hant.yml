question: 社會主義者一方面反對個人繼承，另一方面又接受法國公民繼承上一代的法國國家領土，這會出現什麼邏輯上的矛盾？
answer: 社會主義者接受國家財富的集體繼承，卻拒絕個人繼承，揭示出基於規模而非原則對財產權的任意承認
wrong_answers:
  - 社會主義者始終反對所有形式的繼承，包括國家公民權，這使得他們的立場在不同的組織規模上都邏輯上是一致的。
  - 這種不一致顯示出社會主義者偏好個人財產權而非集體財產權，這與他們所宣稱的偏好共同所有權相矛盾
  - 社會主義者為了解決這個問題，主張在全球重新分配所有國家的財富，以完全消除個人和集體繼承權。
explanation: |
  這篇文章揭露了社會主義思想中的一個基本矛盾：社會主義者一方面反對個人繼承權是不公正的，另一方面又含蓄地接受法國公民僅僅因為生為法國人就繼承了法國的集體財富和領土。這揭示了社會主義者實際上承認國家層面的繼承權 - 法國公民繼承法國前代的繼承權 - 但卻否定個人層面的相同原則。作者認為，這顯示出財產原則的任意應用是基於規模而非一致的邏輯，因為個人和國家繼承權都遵循相同的基本原則，即財富和資源的世代轉移。
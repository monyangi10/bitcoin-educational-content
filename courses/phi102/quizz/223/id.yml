question: Ketidakkonsistenan logis apa yang muncul ketika kaum sosialis menentang warisan individu sementara menerima bahwa warga negara Prancis mewarisi wilayah nasional Prancis dari generasi sebelumnya?
answer: Sosialis menerima warisan kolektif atas kekayaan nasional sementara menolak warisan individu, mengungkapkan pengakuan sewenang-wenang atas hak milik berdasarkan skala dan bukan prinsip
wrong_answers:
  - Kaum sosialis secara konsisten menentang semua bentuk pewarisan termasuk kewarganegaraan nasional, sehingga posisi mereka secara logis koheren di berbagai skala organisasi
  - Ketidakkonsistenan ini menunjukkan bahwa kaum sosialis lebih menyukai hak milik individu daripada hak milik kolektif, yang bertentangan dengan preferensi mereka yang menyatakan bahwa mereka lebih menyukai kepemilikan komunal
  - Kaum sosialis menyelesaikannya dengan mengadvokasi redistribusi global semua kekayaan nasional untuk menghilangkan warisan individu dan kolektif sepenuhnya
explanation: |
  Teks tersebut memperlihatkan kontradiksi mendasar dalam pemikiran sosialis: meskipun menentang warisan individu sebagai sesuatu yang tidak adil, kaum sosialis secara implisit menerima bahwa warga negara Prancis mewarisi kekayaan kolektif dan wilayah Prancis hanya karena terlahir sebagai orang Prancis. Hal ini menunjukkan bahwa kaum sosialis sebenarnya mengakui hak waris di tingkat nasional - warga negara Prancis mewarisi dari generasi Prancis sebelumnya - namun menolak prinsip yang sama di tingkat individu. Penulis berpendapat bahwa hal ini menunjukkan penerapan prinsip-prinsip properti yang sewenang-wenang berdasarkan skala daripada logika yang konsisten, karena warisan individu dan nasional mengikuti prinsip dasar yang sama, yaitu transfer kekayaan dan sumber daya secara turun-temurun.
question: Jaka logiczna niespójność pojawia się, gdy socjaliści sprzeciwiają się indywidualnemu dziedziczeniu, jednocześnie akceptując fakt, że francuscy obywatele dziedziczą francuskie terytorium narodowe od poprzednich pokoleń?
answer: Socjaliści akceptują zbiorowe dziedziczenie bogactwa narodowego, jednocześnie odrzucając indywidualne dziedziczenie, ujawniając arbitralne uznanie praw własności opartych na skali, a nie na zasadach
wrong_answers:
  - Socjaliści konsekwentnie sprzeciwiają się wszelkim formom dziedziczenia, w tym obywatelstwu narodowemu, dzięki czemu ich stanowisko jest logicznie spójne w różnych skalach organizacji
  - Niespójność ta pokazuje, że socjaliści faworyzują indywidualne prawa własności nad zbiorowymi, co jest sprzeczne z ich deklarowaną preferencją dla własności wspólnej
  - Socjaliści rozwiązują ten problem, opowiadając się za globalną redystrybucją całego bogactwa narodowego, aby całkowicie wyeliminować zarówno indywidualne, jak i zbiorowe dziedziczenie
explanation: |
  Tekst ujawnia fundamentalną sprzeczność w myśleniu socjalistów: sprzeciwiając się indywidualnemu dziedziczeniu jako niesprawiedliwemu, socjaliści domyślnie akceptują fakt, że obywatele francuscy dziedziczą zbiorowe bogactwo i terytorium Francji po prostu rodząc się Francuzami. Ujawnia to, że socjaliści faktycznie uznają prawa do dziedziczenia na poziomie krajowym - francuscy obywatele dziedziczą po poprzednich francuskich pokoleniach - jednocześnie zaprzeczając tej samej zasadzie na poziomie indywidualnym. Autor argumentuje, że dowodzi to arbitralnego stosowania zasad własności opartych raczej na skali niż spójnej logice, ponieważ zarówno dziedziczenie indywidualne, jak i narodowe opiera się na tej samej podstawowej zasadzie pokoleniowego transferu bogactwa i zasobów.
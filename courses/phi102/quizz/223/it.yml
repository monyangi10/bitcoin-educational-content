question: Quale incoerenza logica emerge quando i socialisti si oppongono all'eredità individuale pur accettando che i cittadini francesi ereditino il territorio nazionale dalle generazioni precedenti?
answer: I socialisti accettano l'eredità collettiva della ricchezza nazionale e rifiutano l'eredità individuale, rivelando un riconoscimento arbitrario dei diritti di proprietà basato sulla scala piuttosto che sul principio
wrong_answers:
  - I socialisti si oppongono coerentemente a tutte le forme di eredità, compresa la cittadinanza nazionale, rendendo la loro posizione logicamente coerente attraverso diverse scale di organizzazione
  - L'incoerenza dimostra che i socialisti favoriscono i diritti di proprietà individuali rispetto a quelli collettivi, contraddicendo la loro dichiarata preferenza per la proprietà comune
  - I socialisti risolvono questo problema sostenendo una ridistribuzione globale di tutte le ricchezze nazionali per eliminare completamente l'eredità individuale e collettiva
explanation: |
  Il testo espone una contraddizione fondamentale nel pensiero socialista: pur opponendosi all'eredità individuale come ingiusta, i socialisti accettano implicitamente che i cittadini francesi ereditino la ricchezza collettiva e il territorio della Francia per il semplice fatto di essere nati francesi. Questo rivela che i socialisti in realtà riconoscono i diritti di eredità a livello nazionale - i cittadini francesi ereditano dalle precedenti generazioni francesi - mentre negano lo stesso principio a livello individuale. L'autore sostiene che ciò dimostra un'applicazione arbitraria dei principi di proprietà basata su una scala piuttosto che su una logica coerente, poiché sia l'eredità individuale che quella nazionale seguono lo stesso principio di base del trasferimento generazionale di ricchezza e risorse.
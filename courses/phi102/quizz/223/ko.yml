question: 사회주의자들이 개인 상속을 반대하면서 프랑스 시민이 이전 세대로부터 프랑스 국토를 상속받는 것을 인정할 때 어떤 논리적 모순이 발생합니까?
answer: 사회주의자들은 국부의 집단적 상속을 인정하는 반면 개인 상속은 거부하여 원칙보다는 규모에 따른 자의적 재산권 인정을 드러냅니다
wrong_answers:
  - 사회주의자들은 국적을 포함한 모든 형태의 상속에 일관되게 반대하며, 다양한 규모의 조직에 걸쳐 논리적으로 일관된 입장을 취하고 있습니다
  - 이 모순은 사회주의자들이 집단적 재산권보다 개인의 재산권을 선호한다는 것을 보여 주며, 공동 소유를 선호한다고 밝힌 것과 모순됩니다
  - 사회주의자들은 개인 및 집단 상속을 완전히 없애기 위해 모든 국부의 글로벌 재분배를 주장함으로써 이 문제를 해결합니다
explanation: |
  이 텍스트는 사회주의 사고의 근본적인 모순을 드러냅니다. 사회주의자들은 개인 상속을 부당하다고 반대하면서도 프랑스 시민이 프랑스인으로 태어났다는 이유만으로 프랑스의 집단적 부와 영토를 상속받는다는 것을 암묵적으로 인정합니다. 이는 사회주의자들이 실제로 프랑스 시민이 이전 프랑스 세대로부터 상속받는 국가적 차원의 상속권을 인정하면서도 개인 차원에서는 동일한 원칙을 부정하고 있음을 드러냅니다. 저자는 개인 상속과 국가 상속 모두 부와 자원의 세대 간 이전이라는 동일한 기본 원칙을 따르기 때문에 이는 일관된 논리가 아닌 규모에 따른 재산 원칙의 자의적 적용을 보여준다고 주장합니다.
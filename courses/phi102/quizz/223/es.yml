question: ¿Qué incoherencia lógica surge cuando los socialistas se oponen a la herencia individual al tiempo que aceptan que los ciudadanos franceses hereden el territorio nacional francés de las generaciones anteriores?
answer: Los socialistas aceptan la herencia colectiva de la riqueza nacional al tiempo que rechazan la herencia individual, lo que revela un reconocimiento arbitrario de los derechos de propiedad basado en la escala y no en los principios
wrong_answers:
  - Los socialistas se oponen sistemáticamente a todas las formas de herencia, incluida la ciudadanía nacional, lo que hace que su posición sea lógicamente coherente a través de diferentes escalas de organización
  - La incoherencia demuestra que los socialistas favorecen los derechos de propiedad individuales frente a los colectivos, contradiciendo su declarada preferencia por la propiedad comunal
  - Los socialistas lo resuelven abogando por una redistribución global de toda la riqueza nacional para eliminar por completo la herencia tanto individual como colectiva
explanation: |
  El texto expone una contradicción fundamental del pensamiento socialista: al tiempo que se oponen a la herencia individual por injusta, los socialistas aceptan implícitamente que los ciudadanos franceses hereden la riqueza colectiva y el territorio de Francia por el mero hecho de haber nacido franceses. Esto revela que los socialistas en realidad reconocen los derechos de herencia a nivel nacional - los ciudadanos franceses heredan de las generaciones francesas anteriores - mientras que niegan el mismo principio a nivel individual. El autor argumenta que esto demuestra una aplicación arbitraria de los principios de propiedad basada en la escala y no en una lógica coherente, ya que tanto la herencia individual como la nacional siguen el mismo principio básico de transferencia generacional de riqueza y recursos.
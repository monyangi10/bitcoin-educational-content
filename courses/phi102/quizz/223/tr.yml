question: Sosyalistler bireysel mirasa karşı çıkarken, Fransız vatandaşlarının Fransız ulusal topraklarını önceki nesillerden miras aldıklarını kabul ettiklerinde nasıl bir mantıksal tutarsızlık ortaya çıkmaktadır?
answer: Sosyalistler, ulusal servetin kolektif mirasını kabul ederken, bireysel mirası reddederek, mülkiyet haklarının ilkeden ziyade ölçeğe dayalı olarak keyfi bir şekilde tanındığını ortaya koymaktadır
wrong_answers:
  - Sosyalistler, ulusal vatandaşlık da dahil olmak üzere tüm miras biçimlerine tutarlı bir şekilde karşı çıkmakta, bu da konumlarını farklı örgütlenme ölçekleri arasında mantıksal olarak tutarlı kılmaktadır
  - Bu tutarsızlık, sosyalistlerin bireysel mülkiyet haklarını kolektif olanlara tercih ettiklerini göstermekte ve ortak mülkiyet tercihleriyle çelişmektedir
  - Sosyalistler bunu, hem bireysel hem de kolektif mirası tamamen ortadan kaldırmak için tüm ulusal servetin küresel olarak yeniden dağıtılmasını savunarak çözerler
explanation: |
  Metin sosyalist düşüncedeki temel bir çelişkiyi ortaya koymaktadır: sosyalistler bireysel mirasa adaletsiz olduğu gerekçesiyle karşı çıkarken, Fransız vatandaşlarının sadece Fransız olarak doğdukları için Fransa'nın kolektif zenginliğini ve topraklarını miras aldıklarını zımnen kabul etmektedirler. Bu, sosyalistlerin aslında ulusal düzeyde miras haklarını tanıdıklarını - Fransız vatandaşları önceki Fransız nesillerinden miras alırlar - ancak aynı ilkeyi bireysel düzeyde reddettiklerini ortaya koymaktadır. Yazar bunun, tutarlı bir mantıktan ziyade ölçeğe dayalı mülkiyet ilkelerinin keyfi bir şekilde uygulandığını gösterdiğini, zira hem bireysel hem de ulusal mirasın, servet ve kaynakların nesiller arası aktarımına ilişkin aynı temel ilkeyi izlediğini savunmaktadır.
question: 社会主义者一方面反对个人继承，另一方面又承认法国公民继承了前几代人的法国国土，这在逻辑上有什么不一致？
answer: 社会主义者接受国家财富的集体继承，但反对个人继承，揭示了基于规模而非原则的财产权的任意承认
wrong_answers:
  - 社会主义者一贯反对包括国家公民身份在内的一切形式的继承，这使得他们的立场在不同的组织规模上具有逻辑一致性
  - 这种不一致表明，社会主义者倾向于个人财产权而非集体财产权，这与他们宣称的公有制偏好相矛盾
  - 社会主义者为解决这一问题，主张在全球范围内重新分配所有国民财富，以彻底消除个人和集体继承权。
explanation: |
  这段文字揭露了社会主义思想中的一个根本矛盾：社会主义者一方面反对个人继承权，认为这是不公正的，另一方面又默认法国公民只要生为法国人，就可以继承法国的集体财富和领土。这揭示了社会主义者实际上承认国家层面的继承权--法国公民继承法国前几代人的遗产--却否认个人层面的继承权。作者认为，这表明财产原则的适用是基于规模而非一致的逻辑，因为个人继承和国家继承都遵循相同的财富和资源世代相传的基本原则。
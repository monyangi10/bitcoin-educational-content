question: Welche logische Inkonsequenz ergibt sich, wenn Sozialisten das individuelle Erbe ablehnen und gleichzeitig akzeptieren, dass französische Bürger das französische Staatsgebiet von früheren Generationen erben?
answer: Die Sozialdemokraten akzeptieren die kollektive Vererbung des nationalen Reichtums, lehnen aber die individuelle Vererbung ab, was die willkürliche Anerkennung von Eigentumsrechten offenbart, die eher auf dem Umfang als auf dem Prinzip basieren
wrong_answers:
  - Die Sozialdemokraten lehnen konsequent alle Formen der Vererbung ab, einschließlich der nationalen Staatsbürgerschaft, was ihre Position über verschiedene Ebenen der Organisation hinweg logisch kohärent macht
  - Diese Ungereimtheit zeigt, dass die Sozialisten individuelle Eigentumsrechte den kollektiven vorziehen, was im Widerspruch zu ihrer erklärten Vorliebe für gemeinschaftliches Eigentum steht
  - Die Sozialdemokraten lösen dieses Problem, indem sie für eine globale Umverteilung des gesamten nationalen Reichtums eintreten, um sowohl die individuelle als auch die kollektive Vererbung vollständig zu beseitigen
explanation: |
  Der Text deckt einen grundlegenden Widerspruch im sozialistischen Denken auf: Während die Sozialisten das individuelle Erbe als ungerecht ablehnen, akzeptieren sie implizit, dass die französischen Bürger den kollektiven Reichtum und das Territorium Frankreichs erben, indem sie einfach als Franzosen geboren werden. Dies zeigt, dass die Sozialisten tatsächlich Erbrechte auf nationaler Ebene anerkennen - französische Bürger erben von früheren französischen Generationen - während sie dasselbe Prinzip auf individueller Ebene ablehnen. Der Autor argumentiert, dies zeige eine willkürliche Anwendung von Eigentumsgrundsätzen, die eher auf dem Maßstab als auf einer kohärenten Logik beruhen, da sowohl das individuelle als auch das nationale Erbe demselben Grundprinzip der Übertragung von Reichtum und Ressourcen von Generation zu Generation folgen.
question: What logical inconsistency emerges when socialists oppose individual inheritance while accepting that French citizens inherit French national territory from previous generations?
answer: Socialists accept collective inheritance of national wealth while rejecting individual inheritance, revealing arbitrary recognition of property rights based on scale rather than principle
wrong_answers:
  - Socialists consistently oppose all forms of inheritance including national citizenship, making their position logically coherent across different scales of organization
  - The inconsistency shows that socialists favor individual property rights over collective ones, contradicting their stated preference for communal ownership
  - Socialists resolve this by advocating for global redistribution of all national wealth to eliminate both individual and collective inheritance completely
explanation: |
  The text exposes a fundamental contradiction in socialist thinking: while opposing individual inheritance as unjust, socialists implicitly accept that French citizens inherit the collective wealth and territory of France simply by being born French. This reveals that socialists actually recognize inheritance rights at the national level - French citizens inherit from previous French generations - while denying the same principle at the individual level. The author argues this demonstrates arbitrary application of property principles based on scale rather than consistent logic, since both individual and national inheritance follow the same basic principle of generational transfer of wealth and resources.

question: Welke logische inconsistentie ontstaat er wanneer socialisten zich verzetten tegen individuele erfenissen terwijl ze aanvaarden dat Franse burgers het Franse nationale grondgebied erven van vorige generaties?
answer: Socialisten accepteren collectief erven van nationale rijkdom terwijl ze individueel erven afwijzen, wat een willekeurige erkenning van eigendomsrechten onthult die eerder gebaseerd is op schaal dan op principe
wrong_answers:
  - Socialisten verzetten zich consequent tegen alle vormen van erfenis, inclusief nationaal burgerschap, waardoor hun standpunt logisch coherent is over verschillende organisatorische schalen heen
  - De inconsistentie laat zien dat socialisten de voorkeur geven aan individuele eigendomsrechten boven collectieve, wat in tegenspraak is met hun uitgesproken voorkeur voor gemeenschappelijk eigendom
  - Socialisten lossen dit op door te pleiten voor een wereldwijde herverdeling van alle nationale rijkdom om zowel individueel als collectief erven volledig uit te bannen
explanation: |
  De tekst legt een fundamentele tegenstrijdigheid in het socialistische denken bloot: terwijl ze zich verzetten tegen individuele erfenissen als onrechtvaardig, aanvaarden socialisten impliciet dat Franse burgers de collectieve rijkdom en het grondgebied van Frankrijk erven gewoon omdat ze als Fransman geboren zijn. Dit onthult dat socialisten eigenlijk erfrechten erkennen op nationaal niveau - Franse burgers erven van vorige Franse generaties - terwijl ze hetzelfde principe ontkennen op individueel niveau. De auteur argumenteert dat dit getuigt van een arbitraire toepassing van eigendomsbeginselen op basis van schaal in plaats van consistente logica, aangezien zowel individuele als nationale erfenissen hetzelfde basisprincipe van generatie-overdracht van rijkdom en middelen volgen.
question: چه تناقض منطقی‌ای به وجود می‌آید وقتی سوسیالیست‌ها با ارث فردی مخالفند اما می‌پذیرند که شهروندان فرانسوی قلمرو ملی فرانسه را از نسل‌های قبلی به ارث می‌برند؟
answer: سوسیالیست‌ها ارث‌بری جمعی از ثروت ملی را می‌پذیرند در حالی که ارث‌بری فردی را رد می‌کنند، که نشان‌دهنده شناسایی دل‌بخواهی حقوق مالکیت بر اساس مقیاس به جای اصول است.
wrong_answers:
  - سوسیالیست‌ها به طور مداوم با همه اشکال ارث، از جمله تابعیت ملی، مخالفت می‌کنند و موضع آن‌ها را در مقیاس‌های مختلف سازماندهی به طور منطقی سازگار می‌سازد.
  - ناسازگاری نشان می‌دهد که سوسیالیست‌ها حقوق مالکیت فردی را بر حقوق جمعی ترجیح می‌دهند و این با ترجیح اعلام‌شده آن‌ها برای مالکیت جمعی در تضاد است.
  - سوسیالیست‌ها این مسئله را با حمایت از توزیع مجدد جهانی تمام ثروت ملی برای حذف کامل ارث فردی و جمعی حل می‌کنند.
explanation: |
  این متن یک تناقض اساسی در تفکر سوسیالیستی را آشکار می‌کند: در حالی که با ارث فردی به عنوان ناعادلانه مخالفت می‌کنند، سوسیالیست‌ها به طور ضمنی می‌پذیرند که شهروندان فرانسوی با تولد به عنوان فرانسوی، ثروت و قلمرو جمعی فرانسه را به ارث می‌برند. این نشان می‌دهد که سوسیالیست‌ها در واقع حقوق ارث را در سطح ملی به رسمیت می‌شناسند - شهروندان فرانسوی از نسل‌های قبلی فرانسوی به ارث می‌برند - در حالی که همین اصل را در سطح فردی انکار می‌کنند. نویسنده استدلال می‌کند که این نشان‌دهنده کاربرد دلخواه اصول مالکیت بر اساس مقیاس است، نه منطق سازگار، زیرا هم ارث فردی و هم ملی از همان اصل اساسی انتقال نسلی ثروت و منابع پیروی می‌کنند.
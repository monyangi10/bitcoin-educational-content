question: Ni ukudahuza gute guhuye n’ubwenge kuvyuka iyo abasosiyalisiti barwanya iragi ry’umuntu ku giti ciwe mu gihe bemera ko abanyagihugu b’Ubufaransa baragwa intara y’igihugu y’Ubufaransa kuva ku mayaruka ya kera?
answer: Abasosiyalisiti bemera iragi rusangi ry’ubutunzi bw’igihugu mu gihe banka iragi ry’umuntu ku giti ciwe, ivyo bikaba bihishura kwemera ataco bimaze uburenganzira bw’umutungo bishingiye ku rugero aho gushingira ku ngingo ngenderwako .
wrong_answers:
  - Abasosiyalisiti bararwanya ubudasiba ubwoko bwose bw’iragi harimwo n’ubwenegihugu bw’igihugu, ivyo bikaba bituma ikibanza cabo gihuye neza mu nzego zitandukanye z’imiteguro .
  - Ukwo kudahuza kwerekana ko abasosiyalisiti bakunda uburenganzira bw’umuntu ku giti ciwe kuruta uburenganzira bw’abantu bose, bikaba bivuguruza ivyo bavuga ko bakunda uburenganzira bw’abantu bose .
  - Abasosiyalisiti baratorera umuti ivyo mu gusaba ko ubutunzi bwose bw’igihugu bwosubira gusangira kw’isi yose kugira ngo iragi ry’umuntu ku giti ciwe n’iry’abantu bose rikurweho burundu .
explanation: |
  Ico canditswe kirashira ahabona ukuvuguruzanya kw’ishimikiro mu vyiyumviro vy’abasosiyalisiti: naho barwanya iragi ry’umuntu ku giti ciwe nk’ikitari co, abasosiyalisiti bemera ataco baciyeko ko abanyagihugu b’Ubufaransa baragwa ubutunzi n’intara rusangi vy’Ubufaransa mu kuvuka gusa ari Abafaransa. Ivyo birerekana ko abasosiyalisiti mu vy’ukuri bemera uburenganzira bw’iragi ku rwego rw’igihugu - abanyagihugu b’Ubufaransa bararagira amayaruka y’Abafaransa ya kera - mu gihe bahakana iyo ngingo nyene ku rwego rw’umuntu ku giti ciwe. Umwanditsi avuga ko ivyo vyerekana ugukoresha ataco bimaze ingingo ngenderwako z’itunga zishingiye ku rugero aho gushingira ku nsiguro zihuye, kuko iragi ry’umuntu ku giti ciwe n’iry’igihugu bikurikiza ingingo ngenderwako imwe y’ishimikiro y’uguhererekanya ubutunzi n’ubutunzi ku ruvyaro.
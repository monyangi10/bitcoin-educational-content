question: Mikä looginen epäjohdonmukaisuus ilmenee, kun sosialistit vastustavat yksilöllistä perintöä ja hyväksyvät samalla, että Ranskan kansalaiset perivät Ranskan kansallisen alueen edellisiltä sukupolvilta?
answer: Sosialistit hyväksyvät kansallisvarallisuuden kollektiivisen perimisen ja hylkäävät samalla yksilöllisen perimisen, mikä osoittaa, että omistusoikeudet tunnustetaan mielivaltaisesti pikemminkin mittakaavan kuin periaatteen perusteella
wrong_answers:
  - Sosialistit vastustavat johdonmukaisesti kaikkia perinnön muotoja, mukaan lukien kansallinen kansalaisuus, mikä tekee heidän kannastaan loogisesti johdonmukaisen eri organisaatiotasoilla
  - Epäjohdonmukaisuus osoittaa, että sosialistit suosivat yksilöllisiä omistusoikeuksia kollektiivisten sijaan, mikä on ristiriidassa heidän ilmoittamansa yhteisomistuksen suosimisen kanssa
  - Sosialistit ratkaisevat tämän vaatimalla kaiken kansallisen varallisuuden globaalia uudelleenjakoa, jotta sekä yksilöllinen että kollektiivinen perintö saadaan poistettua kokonaan
explanation: |
  Teksti paljastaa sosialistisen ajattelun perustavanlaatuisen ristiriidan: vaikka sosialistit vastustavat yksilöllistä perintöä epäoikeudenmukaisena, he hyväksyvät implisiittisesti sen, että Ranskan kansalaiset perivät Ranskan kollektiivisen rikkauden ja alueen pelkästään syntymällä ranskalaisiksi. Tämä paljastaa, että sosialistit itse asiassa tunnustavat perintöoikeudet kansallisella tasolla - Ranskan kansalaiset perivät edellisiltä ranskalaisilta sukupolvilta - mutta kieltävät saman periaatteen yksilötasolla. Kirjoittaja väittää, että tämä osoittaa omaisuusperiaatteiden mielivaltaista soveltamista, joka perustuu pikemminkin mittakaavaan kuin johdonmukaiseen logiikkaan, koska sekä yksilöllinen että kansallinen perintö noudattaa samaa perusperiaatetta, joka koskee varallisuuden ja resurssien siirtämistä sukupolvelta toiselle.
question: Hvilken logisk inkonsekvens oppstår når sosialister motsetter seg individuell arv, samtidig som de aksepterer at franske borgere arver det franske nasjonale territoriet fra tidligere generasjoner?
answer: Sosialister aksepterer kollektiv arv av nasjonalformuen, men avviser individuell arv, noe som avslører en vilkårlig anerkjennelse av eiendomsrett basert på skala snarere enn prinsipp
wrong_answers:
  - Sosialister er konsekvent imot alle former for arv, inkludert nasjonalt statsborgerskap, noe som gjør deres standpunkt logisk sammenhengende på tvers av ulike organisasjonsnivåer
  - Inkonsistensen viser at sosialister foretrekker individuell eiendomsrett fremfor kollektiv, noe som strider mot deres uttalte preferanse for felles eierskap
  - Sosialister løser dette ved å gå inn for en global omfordeling av all nasjonal rikdom for å eliminere både individuell og kollektiv arv fullstendig
explanation: |
  Teksten avslører en grunnleggende selvmotsigelse i sosialistisk tenkning: Samtidig som sosialister motsetter seg individuell arv som urettferdig, aksepterer de implisitt at franske borgere arver Frankrikes kollektive rikdom og territorium bare ved å være født franske. Dette avslører at sosialistene faktisk anerkjenner arveretten på nasjonalt nivå - franske borgere arver fra tidligere franske generasjoner - mens de benekter det samme prinsippet på individuelt nivå. Forfatteren hevder at dette viser en vilkårlig anvendelse av eiendomsprinsipper basert på skala snarere enn konsekvent logikk, siden både individuell og nasjonal arv følger det samme grunnleggende prinsippet om generasjonsoverføring av rikdom og ressurser.
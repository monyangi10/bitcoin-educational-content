question: ความไม่สอดคล้องทางตรรกะเกิดขึ้นเมื่อสังคมนิยมคัดค้านการรับมรดกส่วนบุคคลในขณะที่ยอมรับว่าพลเมืองฝรั่งเศสได้รับมรดกดินแดนแห่งชาติฝรั่งเศสจากรุ่นก่อนหน้าอย่างไร?
answer: นักสังคมนิยมยอมรับมรดกร่วมของความมั่งคั่งของชาติในขณะที่ปฏิเสธมรดกส่วนบุคคล ซึ่งเผยให้เห็นการยอมรับสิทธิในทรัพย์สินอย่างตามอำเภอใจโดยอิงจากขนาดมากกว่าหลักการ
wrong_answers:
  - นักสังคมนิยมคัดค้านการสืบทอดทุกรูปแบบอย่างต่อเนื่อง รวมถึงการเป็นพลเมืองของประเทศ ทำให้จุดยืนของพวกเขามีความสอดคล้องกันในระดับต่างๆ ของการจัดองค์กร
  - ความไม่สอดคล้องกันแสดงให้เห็นว่าสังคมนิยมสนับสนุนสิทธิในทรัพย์สินส่วนบุคคลมากกว่าสิทธิร่วมกัน ซึ่งขัดแย้งกับความชอบที่พวกเขาประกาศไว้สำหรับการเป็นเจ้าของร่วมกัน
  - นักสังคมนิยมแก้ปัญหานี้โดยการสนับสนุนการกระจายความมั่งคั่งของชาติทั้งหมดในระดับโลกเพื่อกำจัดมรดกทั้งส่วนบุคคลและส่วนรวมอย่างสิ้นเชิง
explanation: |
  ข้อความนี้เปิดเผยความขัดแย้งพื้นฐานในความคิดแบบสังคมนิยม: ในขณะที่ต่อต้านการรับมรดกส่วนบุคคลว่าไม่ยุติธรรม นักสังคมนิยมกลับยอมรับโดยปริยายว่าพลเมืองฝรั่งเศสได้รับมรดกรวมของความมั่งคั่งและดินแดนของฝรั่งเศสเพียงแค่เกิดเป็นชาวฝรั่งเศส สิ่งนี้เผยให้เห็นว่านักสังคมนิยมยอมรับสิทธิการรับมรดกในระดับชาติ - พลเมืองฝรั่งเศสได้รับมรดกจากคนรุ่นก่อนของฝรั่งเศส - ในขณะที่ปฏิเสธหลักการเดียวกันในระดับบุคคล ผู้เขียนโต้แย้งว่าสิ่งนี้แสดงให้เห็นถึงการประยุกต์ใช้หลักการทรัพย์สินที่ไม่สม่ำเสมอตามขนาดมากกว่าตรรกะที่สอดคล้องกัน เนื่องจากทั้งการรับมรดกส่วนบุคคลและระดับชาติปฏิบัติตามหลักการพื้นฐานเดียวกันของการถ่ายโอนความมั่งคั่งและทรัพยากรระหว่างรุ่น
question: 社会主義者が個人の相続に反対する一方で、フランス国民が前の世代からフランスの国土を受け継いでいることを認めるとき、どのような論理的矛盾が生じるのだろうか？
answer: 社会主義者は、国富の集団的相続を容認する一方で、個人的相続を否定し、原則よりも規模に基づく財産権の恣意的な承認を明らかにしている。
wrong_answers:
  - 社会主義者は一貫して、国家市民権を含むあらゆる形態の相続に反対しており、その立場は、組織のさまざまな規模にわたって論理的に首尾一貫している。
  - この矛盾は、社会主義者が集団的所有権よりも個人的所有権を支持していることを示している。
  - 社会主義者は、すべての国富の世界的再分配を提唱し、個人的相続と集団的相続の両方を完全に排除することによって、この問題を解決する。
explanation: |
  この文章は、社会主義者の思考における根本的な矛盾を露呈している。個人の相続を不当なものとして反対する一方で、社会主義者は、フランス国民がフランス人として生まれたというだけで、フランスの集合的な富と領土を相続することを暗黙のうちに認めているのだ。このことは、社会主義者が実際には国家レベルでは相続権を認めていること、つまりフランス国民は以前のフランス人の世代から相続する一方で、個人レベルでは同じ原則を否定していることを明らかにしている。著者は、これは一貫した論理ではなく、規模に基づく財産原則の恣意的な適用を示すものであると主張する。
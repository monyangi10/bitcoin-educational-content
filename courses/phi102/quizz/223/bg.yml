question: Каква логическа непоследователност се появява, когато социалистите се противопоставят на индивидуалното наследяване и същевременно приемат, че френските граждани наследяват френската национална територия от предишните поколения?
answer: Социалистите приемат колективното наследяване на националното богатство, като същевременно отхвърлят индивидуалното наследяване, разкривайки произволно признаване на права на собственост, основани на мащаба, а не на принципа
wrong_answers:
  - Социалистите последователно се противопоставят на всички форми на наследяване, включително на националното гражданство, което прави позицията им логически последователна в различните мащаби на организация
  - Несъответствието показва, че социалистите предпочитат индивидуалните права на собственост пред колективните, което противоречи на заявеното от тях предпочитание към общностната собственост
  - Социалистите решават този проблем, като се застъпват за глобално преразпределение на цялото национално богатство, за да се премахне напълно както индивидуалното, така и колективното наследяване
explanation: |
  Текстът разкрива основно противоречие в социалистическото мислене: макар да се противопоставят на индивидуалното наследяване като несправедливо, социалистите приемат, че френските граждани наследяват колективното богатство и територията на Франция само защото са родени французи. Това разкрива, че социалистите всъщност признават правото на наследяване на национално ниво - френските граждани наследяват от предишните френски поколения - докато отричат същия принцип на индивидуално ниво. Авторът твърди, че това демонстрира произволно прилагане на принципите на собственост, основано на мащаба, а не на последователна логика, тъй като както индивидуалното, така и националното наследяване следват един и същ основен принцип на прехвърляне на богатство и ресурси между поколенията.
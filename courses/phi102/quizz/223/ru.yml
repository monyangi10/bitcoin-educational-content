question: Какое логическое несоответствие возникает, когда социалисты выступают против индивидуального наследования, соглашаясь с тем, что граждане Франции наследуют национальную территорию страны от предыдущих поколений?
answer: Социалисты принимают коллективное наследование национального богатства, отвергая при этом индивидуальное наследование, демонстрируя произвольное признание прав собственности, основанное на масштабе, а не на принципе
wrong_answers:
  - Социалисты последовательно выступают против всех форм наследования, включая национальное гражданство, что делает их позицию логически последовательной в различных масштабах организации
  - Это несоответствие показывает, что социалисты предпочитают индивидуальные права собственности коллективным, что противоречит их заявленному предпочтению общинной собственности
  - Социалисты решают эту проблему, выступая за глобальное перераспределение всех национальных богатств, чтобы полностью исключить как индивидуальное, так и коллективное наследование
explanation: |
  Текст раскрывает фундаментальное противоречие в социалистическом мышлении: выступая против индивидуального наследования как несправедливого, социалисты неявно признают, что граждане Франции наследуют коллективное богатство и территорию Франции просто потому, что родились французами. Это показывает, что социалисты фактически признают права наследования на национальном уровне - французские граждане наследуют от предыдущих французских поколений - и в то же время отрицают тот же принцип на индивидуальном уровне. Автор утверждает, что это свидетельствует о произвольном применении принципов собственности, основанном на масштабе, а не на последовательной логике, поскольку и индивидуальное, и национальное наследование следуют одному и тому же базовому принципу передачи богатства и ресурсов от поколения к поколению.
question: Jaký logický rozpor vzniká, když socialisté vystupují proti individuálnímu dědictví a zároveň uznávají, že francouzští občané dědí francouzské národní území po předchozích generacích?
answer: Socialisté uznávají kolektivní dědictví národního bohatství a zároveň odmítají individuální dědictví, což ukazuje na svévolné uznávání vlastnických práv založených spíše na rozsahu než na principu
wrong_answers:
  - Socialisté důsledně vystupují proti všem formám dědictví včetně národního občanství, což činí jejich postoj logicky koherentním napříč různými stupnicemi organizace
  - Tento rozpor ukazuje, že socialisté upřednostňují individuální vlastnická práva před kolektivními, což je v rozporu s jejich deklarovanou preferencí společného vlastnictví
  - Socialisté to řeší tak, že prosazují globální přerozdělení veškerého národního bohatství, aby se zcela odstranilo individuální i kolektivní dědictví
explanation: |
  Text odhaluje základní rozpor v socialistickém myšlení: socialisté sice odmítají individuální dědictví jako nespravedlivé, ale zároveň implicitně uznávají, že francouzští občané dědí kolektivní bohatství a území Francie už jen tím, že se narodili jako Francouzi. To odhaluje, že socialisté ve skutečnosti uznávají dědická práva na národní úrovni - francouzští občané dědí po předchozích francouzských generacích - a zároveň popírají stejný princip na úrovni jednotlivce. Autor tvrdí, že to svědčí o svévolném uplatňování vlastnických principů na základě měřítka, nikoliv důsledné logiky, neboť jak individuální, tak národní dědictví se řídí stejným základním principem generačního předávání bohatství a zdrojů.
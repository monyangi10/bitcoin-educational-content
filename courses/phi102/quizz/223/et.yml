question: Milline loogiline vastuolu ilmneb, kui sotsialistid on vastu individuaalsele pärimisele, kuid aktsepteerivad samal ajal, et Prantsuse kodanikud pärivad Prantsuse riigi territooriumi eelmistelt põlvkondadelt?
answer: Sotsiaaldemokraadid aktsepteerivad rahvusliku rikkuse kollektiivset pärimist, kuid lükkavad tagasi individuaalse pärimise, mis näitab, et omandiõiguse tunnustamine on meelevaldne ja põhineb pigem mastaabis kui põhimõttel
wrong_answers:
  - Sotsiaaldemokraadid on järjekindlalt vastu kõikidele pärandamise vormidele, sealhulgas rahvuslikule kodakondsusele, mis muudab nende seisukoha loogiliselt sidusaks eri organisatsiooniliste skaalade lõikes
  - Vastuolu näitab, et sotsialistid eelistavad individuaalseid omandiõigusi kollektiivsetele, mis on vastuolus nende deklareeritud eelistusega ühisomandile
  - Sotsiaaldemokraadid lahendavad selle probleemi, propageerides kogu rahvusliku rikkuse globaalset ümberjaotamist, et kaotada täielikult nii individuaalne kui ka kollektiivne pärandamine
explanation: |
  Tekst paljastab sotsialistliku mõtlemise põhilise vastuolu: kuigi sotsialistid on vastu individuaalsele pärimisele kui ebaõiglasele, nõustuvad nad kaudselt sellega, et Prantsuse kodanikud pärivad Prantsusmaa kollektiivse rikkuse ja territooriumi lihtsalt seetõttu, et nad on sündinud prantslastena. See näitab, et sotsialistid tunnustavad tegelikult pärimisõigust riiklikul tasandil - Prantsuse kodanikud pärivad eelmistelt prantsuse põlvkondadelt -, kuid eitavad sama põhimõtet individuaalsel tasandil. Autor väidab, et see näitab omandiõiguse põhimõtete meelevaldset kohaldamist, mis põhineb pigem skaalal kui järjekindlal loogikal, sest nii individuaalne kui ka riiklik pärimine järgib sama põhiprintsiipi, milleks on jõukuse ja ressursside põlvkondadevaheline üleandmine.
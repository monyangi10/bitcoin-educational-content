question: Koja se logička nedoslednost javlja kada se socijalisti protive individualnom nasleđivanju, a prihvataju da francuski građani nasleđuju francusku nacionalnu teritoriju od prethodnih generacija?
answer: Socijalisti prihvataju kolektivno nasleđe nacionalnog bogatstva dok odbacuju individualno nasleđe, otkrivajući proizvoljno priznavanje prava svojine zasnovano na razmeri, a ne na principu.
wrong_answers:
  - Socijalisti dosledno se protive svim oblicima nasleđa, uključujući nacionalno državljanstvo, čineći njihov stav logički koherentnim na različitim nivoima organizacije.
  - Nedoslednost pokazuje da socijalisti favorizuju individualna vlasnička prava nad kolektivnim, što je u suprotnosti sa njihovom izjavljenom preferencijom za zajedničko vlasništvo.
  - Socijalisti to rešavaju zagovaranjem globalne preraspodele celokupnog nacionalnog bogatstva kako bi se potpuno eliminisalo i individualno i kolektivno nasleđe
explanation: |
  Tekst izlaže fundamentalnu kontradikciju u socijalističkom razmišljanju: dok se protive individualnom nasleđivanju kao nepravednom, socijalisti implicitno prihvataju da francuski građani nasleđuju kolektivno bogatstvo i teritoriju Francuske jednostavno time što su rođeni kao Francuzi. Ovo otkriva da socijalisti zapravo priznaju prava nasleđivanja na nacionalnom nivou - francuski građani nasleđuju od prethodnih francuskih generacija - dok negiraju isti princip na individualnom nivou. Autor tvrdi da ovo pokazuje proizvoljnu primenu principa vlasništva zasnovanu na skali, a ne na doslednoj logici, budući da i individualno i nacionalno nasleđivanje slede isti osnovni princip generacijskog prenosa bogatstva i resursa.
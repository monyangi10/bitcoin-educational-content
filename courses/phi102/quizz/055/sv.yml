question: Enligt Aristoteles observation som nämns i texten, vad var den främsta anledningen till att slaveri existerade i forntida samhällen?
answer: Det fanns inga maskiner tillgängliga för att ersätta mänsklig arbetskraft
wrong_answers:
  - Det fanns för många krigsfångar för att hantera
  - Religiösa övertygelser krävde att slaveri tillämpades
  - Ekonomisk ojämlikhet ansågs vara naturlig och permanent
explanation: |
  Aristoteles påpekade att slaveriet existerade eftersom det inte fanns några maskiner som kunde utföra det arbete som slavarna utförde. Han konstaterade att om produktionen hade kunnat mekaniseras hade samhället kunnat avstå från slavar. Denna insikt belyser hur tekniska begränsningar under antiken gjorde mänskligt arbete, till och med tvångsarbete, nödvändigt för grundläggande produktionsbehov. De andra alternativen kan visserligen vara faktorer i vissa historiska sammanhang, men de representerar inte Aristoteles specifika resonemang om den grundläggande ekonomiska nödvändighet som låg bakom slaveriet i de antika samhällena.
question: Secondo l'osservazione di Aristotele citata nel testo, qual era la ragione principale per cui la schiavitù esisteva nelle società antiche?
answer: Non esistevano macchine in grado di sostituire il lavoro umano
wrong_answers:
  - C'erano troppi prigionieri di guerra da gestire
  - Le credenze religiose imponevano la pratica della schiavitù
  - La disuguaglianza economica era considerata naturale e permanente
explanation: |
  Aristotele osservò specificamente che la schiavitù esisteva perché non c'erano macchine per svolgere il lavoro degli schiavi. Egli osservò che se la produzione fosse stata meccanizzata, la società avrebbe potuto fare a meno degli schiavi. Questa intuizione evidenzia come le limitazioni tecnologiche dell'antichità rendessero il lavoro umano, anche quello forzato, essenziale per le esigenze produttive di base. Le altre opzioni, pur essendo potenzialmente fattori in alcuni contesti storici, non rappresentano il ragionamento specifico di Aristotele sulla necessità economica fondamentale che ha spinto l'istituzione della schiavitù nelle società antiche.
question: Dukurikije ivyo Aristote yihweje vyavuzwe muri ico canditswe, ni igiki nyamukuru catumye ubuja bubaho mu mibano ya kera?
answer: Nta mashini zariho zo gusubirira ibikorwa vy’abantu .
wrong_answers:
  - Hariho imbohe z'intambara nyinshi cane ku buryo zitashobora gucungera .
  - Imyizere y’idini yasaba ko umuntu akora ubuja .
  - Ubusumbasumbane mu vy'ubutunzi bwabonwa ko ari ikintu gisanzwe kandi kidahera .
explanation: |
  Aristote yarabonye mu buryo budasanzwe yuko ubuja bwariho kubera ko ata mashini zariho zo gukora igikorwa abaja bakora. Yavuze yuko iyo ubuhinga bwo guhingura ibintu bushobora gukoreshwa n’imashini, abantu bari gushobora guhagarika abaja. Ukwo gutahura kurashira ahabona ingene ubukene bw’ubuhinga bwo mu bihe vya kera bwatuma igikorwa c’abantu, mbere n’igikorwa c’agahato, kiba ikintu gihambaye kugira ngo umuntu ashobore gukora ibintu vy’ishimikiro. Ibindi bishobora gukoreshwa, naho bishobora kuba ari ibintu bimwebimwe vyabaye mu mateka, ntibigereranya ivyiyumviro vyihariye vya Aristote ku bijanye n’ivy’ubutunzi vy’ishimikiro vyatumye habaho ubuja mu mibano ya kera.
question: Според наблюденията на Аристотел, споменати в текста, коя е основната причина за съществуването на робството в древните общества?
answer: Не е имало машини, които да заменят човешкия труд
wrong_answers:
  - Имаше твърде много военнопленници, за да се справят с тях
  - Религиозните вярвания изискват практикуването на робство
  - Икономическото неравенство се смяташе за естествено и постоянно
explanation: |
  Аристотел отбелязва, че робството е съществувало, защото не е имало машини, които да извършват работата, която робите са вършили. Той отбелязва, че ако производството можеше да бъде механизирано, обществото можеше да се освободи от робите. Това прозрение подчертава как технологичните ограничения в древността са направили човешкия труд, дори принудителния, съществен за основните производствени нужди. Другите варианти, макар и да са потенциални фактори в някои исторически контексти, не представляват специфичните разсъждения на Аристотел за фундаменталната икономическа необходимост, която е стимулирала институцията на робството в древните общества.
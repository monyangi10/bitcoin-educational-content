question: 본문에 언급된 아리스토텔레스의 관찰에 따르면, 고대 사회에서 노예 제도가 존재했던 주된 이유는 무엇이었습니까?
answer: 인간의 노동력을 대체할 수 있는 기계가 없었습니다
wrong_answers:
  - 관리하기에는 포로가 너무 많았습니다
  - 종교적 신념으로 인해 노예제도가 필요했습니다
  - 경제적 불평등은 자연스럽고 영구적인 것으로 간주되었습니다
explanation: |
  아리스토텔레스는 노예가 하는 일을 수행할 수 있는 기계가 없었기 때문에 노예제도가 존재했다고 주장했습니다. 그는 생산이 기계화될 수 있었다면 사회가 노예를 필요로 하지 않았을 것이라고 지적했습니다. 이러한 통찰은 고대의 기술적 한계로 인해 인간의 노동력, 심지어 강제 노동이 기본적인 생산 요구에 필수적이었음을 강조합니다. 다른 옵션은 일부 역사적 맥락을 잠재적으로 고려할 수 있지만, 고대 사회에서 노예 제도를 이끈 근본적인 경제적 필요성에 대한 아리스토텔레스의 구체적인 추론을 대표하지는 않습니다.
question: 根据文中提到的亚里士多德的观察，古代社会存在奴隶制的主要原因是什么？
answer: 没有机器可以替代人类劳动
wrong_answers:
  - 战俘太多，难以管理
  - 宗教信仰要求实行奴隶制
  - 经济不平等被认为是自然的、永久的
explanation: |
  亚里士多德特别指出，奴隶制之所以存在，是因为没有机器来完成奴隶所做的工作。他指出，如果生产可以机械化，社会就可以不需要奴隶。这一见解凸显了古代技术的局限性如何使人类劳动，甚至是强迫劳动，成为基本生产需求的必要条件。其他选项虽然在某些历史背景下可能是因素，但并不代表亚里士多德对古代社会驱动奴隶制的基本经济必要性的具体推理。
question: Mis oli tekstis mainitud Aristotelese tähelepaneku kohaselt peamine põhjus, miks orjus antiikühiskondades eksisteeris?
answer: Inimtööjõu asendamiseks puudusid masinad
wrong_answers:
  - Sõjavange oli liiga palju, et neid hallata
  - Usulised tõekspidamised nõudsid orjapidamise praktikat
  - Majanduslikku ebavõrdsust peeti loomulikuks ja püsivaks
explanation: |
  Aristoteles märkis konkreetselt, et orjapidamine oli olemas, sest ei olnud masinaid, mis oleks võinud teha tööd, mida orjad tegid. Ta märkis, et kui tootmine oleks olnud võimalik mehhaniseerida, oleks ühiskond võinud orjadest loobuda. See arusaam toob esile, kuidas tehnoloogilised piirangud muutsid inimtöö, isegi sunnitöö, antiikajal põhiliste tootmisvajaduste rahuldamiseks hädavajalikuks. Teised võimalused, kuigi mõnes ajaloolises kontekstis potentsiaalsed tegurid, ei esinda Aristotelese konkreetseid arutlusi selle kohta, milline majanduslik vajadus ajendas orjuse institutsiooni antiikühiskondades.
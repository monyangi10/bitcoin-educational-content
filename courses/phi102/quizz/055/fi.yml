question: Mikä oli tekstissä mainitun Aristoteleen havainnon mukaan tärkein syy orjuuden olemassaoloon antiikin yhteiskunnissa?
answer: Ei ollut olemassa koneita, jotka olisivat voineet korvata ihmistyön
wrong_answers:
  - Sotavankeja oli liikaa, jotta heitä olisi voitu hallita
  - Uskonnollinen vakaumus edellytti orjuuden harjoittamista
  - Taloudellista eriarvoisuutta pidettiin luonnollisena ja pysyvänä
explanation: |
  Aristoteles totesi erityisesti, että orjuus oli olemassa, koska ei ollut koneita, jotka olisivat voineet tehdä orjien tekemän työn. Hän totesi, että jos tuotanto olisi voitu koneellistaa, yhteiskunta olisi voinut luopua orjista. Tämä oivallus korostaa sitä, miten teknologiset rajoitukset muinaisina aikoina tekivät ihmistyön, jopa pakkotyön, välttämättömäksi perustuotantotarpeiden kannalta. Vaikka muut vaihtoehdot ovatkin potentiaalisia tekijöitä joissakin historiallisissa yhteyksissä, ne eivät edusta Aristoteleen erityistä päättelyä siitä perustavanlaatuisesta taloudellisesta välttämättömyydestä, joka ajoi orjuuden instituutiota antiikin yhteiskunnissa.
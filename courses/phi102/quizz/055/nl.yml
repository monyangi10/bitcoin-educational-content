question: Wat was volgens Aristoteles' observatie, die in de tekst wordt genoemd, de belangrijkste reden dat slavernij in oude samenlevingen bestond?
answer: Er waren geen machines beschikbaar om menselijke arbeid te vervangen
wrong_answers:
  - Er waren te veel krijgsgevangenen om te beheren
  - Religieuze overtuigingen vereisten de praktijk van slavernij
  - Economische ongelijkheid werd als natuurlijk en permanent beschouwd
explanation: |
  Aristoteles merkte specifiek op dat slavernij bestond omdat er geen machines waren om het werk dat slaven deden uit te voeren. Hij merkte op dat als de productie gemechaniseerd had kunnen worden, de maatschappij slaven overbodig had kunnen maken. Dit inzicht benadrukt hoe technologische beperkingen in de oudheid menselijke arbeid, zelfs dwangarbeid, essentieel maakten voor basisproductiebehoeften. De andere opties, hoewel mogelijk factoren in bepaalde historische contexten, vertegenwoordigen niet Aristoteles' specifieke redenering over de fundamentele economische noodzaak die de slavernij in samenlevingen in de oudheid dreef.
question: Menurut pengamatan Aristoteles yang disebutkan dalam teks, apa alasan utama perbudakan ada di masyarakat kuno?
answer: Tidak ada mesin yang tersedia untuk menggantikan tenaga kerja manusia
wrong_answers:
  - Terlalu banyak tawanan perang yang harus dikelola
  - Keyakinan agama mengharuskan adanya praktik perbudakan
  - Ketimpangan ekonomi dianggap sebagai hal yang wajar dan permanen
explanation: |
  Aristoteles secara khusus mengamati bahwa perbudakan ada karena tidak ada mesin untuk melakukan pekerjaan yang dilakukan oleh para budak. Dia mencatat bahwa jika produksi dapat dimekanisasi, masyarakat dapat meniadakan budak. Wawasan ini menyoroti bagaimana keterbatasan teknologi pada zaman kuno membuat tenaga kerja manusia, bahkan kerja paksa, sangat penting untuk kebutuhan produksi dasar. Pilihan-pilihan lain, meskipun berpotensi menjadi faktor dalam beberapa konteks historis, tidak mewakili alasan spesifik Aristoteles tentang kebutuhan ekonomi mendasar yang mendorong institusi perbudakan dalam masyarakat kuno.
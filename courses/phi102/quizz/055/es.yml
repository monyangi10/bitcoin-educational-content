question: Según la observación de Aristóteles mencionada en el texto, ¿cuál era la razón principal por la que existía la esclavitud en las sociedades antiguas?
answer: No había máquinas disponibles para sustituir el trabajo humano
wrong_answers:
  - Había demasiados prisioneros de guerra para manejar
  - Las creencias religiosas exigían la práctica de la esclavitud
  - La desigualdad económica se consideraba natural y permanente
explanation: |
  Aristóteles observó específicamente que la esclavitud existía porque no había máquinas para realizar el trabajo que hacían los esclavos. Señaló que si se hubiera podido mecanizar la producción, la sociedad habría podido prescindir de los esclavos. Esta idea pone de relieve que las limitaciones tecnológicas de la antigüedad hacían que el trabajo humano, incluso el forzado, fuera esencial para las necesidades básicas de producción. Las otras opciones, aunque pueden ser factores en algunos contextos históricos, no representan el razonamiento específico de Aristóteles sobre la necesidad económica fundamental que impulsó la institución de la esclavitud en las sociedades antiguas.
question: De acordo com a observação de Aristóteles mencionada no texto, qual era a principal razão para a existência da escravatura nas sociedades antigas?
answer: Não havia máquinas disponíveis para substituir o trabalho humano
wrong_answers:
  - Havia demasiados prisioneiros de guerra para gerir
  - As crenças religiosas exigiam a prática da escravatura
  - A desigualdade económica era considerada natural e permanente
explanation: |
  Aristóteles observou especificamente que a escravatura existia porque não havia máquinas para realizar o trabalho que os escravos faziam. Ele observou que, se a produção pudesse ser mecanizada, a sociedade poderia ter dispensado os escravos. Esta ideia realça o facto de as limitações tecnológicas da antiguidade terem tornado o trabalho humano, mesmo o trabalho forçado, essencial para as necessidades básicas de produção. As outras opções, embora potencialmente factores em alguns contextos históricos, não representam o raciocínio específico de Aristóteles sobre a necessidade económica fundamental que levou à instituição da escravatura nas sociedades antigas.
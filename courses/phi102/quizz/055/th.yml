question: ตามการสังเกตของอริสโตเติลที่กล่าวถึงในข้อความ เหตุผลหลักที่การมีทาสมีอยู่ในสังคมโบราณคืออะไร?
answer: ไม่มีเครื่องจักรที่สามารถทดแทนแรงงานมนุษย์ได้
wrong_answers:
  - มีเชลยศึกมากเกินกว่าจะจัดการได้
  - ความเชื่อทางศาสนาต้องการการปฏิบัติทาส
  - ความไม่เท่าเทียมทางเศรษฐกิจถูกมองว่าเป็นเรื่องธรรมชาติและถาวร
explanation: |
  อริสโตเติลสังเกตว่า การมีอยู่ของทาสเกิดขึ้นเพราะไม่มีเครื่องจักรที่จะทำงานที่ทาสทำ เขาได้กล่าวว่าหากการผลิตสามารถใช้เครื่องจักรได้ สังคมก็อาจไม่จำเป็นต้องมีทาส ข้อสังเกตนี้ชี้ให้เห็นถึงข้อจำกัดทางเทคโนโลยีในสมัยโบราณที่ทำให้แรงงานมนุษย์ แม้กระทั่งแรงงานบังคับ เป็นสิ่งจำเป็นสำหรับความต้องการการผลิตขั้นพื้นฐาน ตัวเลือกอื่น ๆ แม้อาจเป็นปัจจัยในบางบริบททางประวัติศาสตร์ แต่ไม่ได้เป็นเหตุผลเฉพาะของอริสโตเติลเกี่ยวกับความจำเป็นทางเศรษฐกิจพื้นฐานที่ผลักดันให้เกิดสถาบันทาสในสังคมโบราณ
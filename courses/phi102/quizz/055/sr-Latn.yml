question: Prema Aristotelovom zapažanju pomenutom u tekstu, koji je bio primarni razlog postojanja ropstva u drevnim društvima?
answer: Nije bilo dostupnih mašina za zamenu ljudskog rada
wrong_answers:
  - Bilo je previše ratnih zarobljenika da bi se njima upravljalo.
  - Verska uverenja su zahtevala praksu ropstva
  - Ekonomska nejednakost smatrana je prirodnom i trajnom
explanation: |
  Aristotel je posebno primetio da je ropstvo postojalo zato što nije bilo mašina koje bi obavljale posao koji su robovi radili. On je naveo da bi društvo moglo da se oslobodi robova ako bi proizvodnja mogla biti mehanizovana. Ovaj uvid ističe kako su tehnološka ograničenja u drevnim vremenima činila ljudski rad, čak i prisilni rad, neophodnim za osnovne proizvodne potrebe. Druge opcije, iako potencijalno faktori u nekim istorijskim kontekstima, ne predstavljaju Aristotelovo specifično razmišljanje o fundamentalnoj ekonomskoj potrebi koja je pokretala instituciju ropstva u drevnim društvima.
question: Co v liberální společnosti zásadně vyžaduje zásada "mlčení zákona" Benjamina Constanta?
answer: Zákony musí mlčet, když jednotlivci uplatňují svou svobodu a vlastnická práva, aniž by poškozovali podobná práva ostatních
wrong_answers:
  - Zákony musí být napsány jednoduchým jazykem, kterému všichni občané rozumí bez právního výkladu
  - Vládní úředníci se v zájmu zachování neutrality musí zdržet veřejných komentářů ke kontroverzním politickým otázkám
  - Zákonodárné orgány by se měly vyhýbat vytváření nových zákonů, pokud neexistuje drtivá shoda obyvatelstva na změně
explanation: |
  Zásada Benjamina Constanta "mlčení zákona" znamená, že zákony by neměly zasahovat, když jednotlivci spravedlivě a legitimně využívají své svobody a majetku. Toto mlčení je nezbytné, protože jediným přijatelným omezením svobody jednotlivce je ochrana podobných svobod ostatních. Špatné odpovědi si to mylně vykládají jako jazykovou čistotu, neutralitu vlády nebo legislativní zdrženlivost, ale Constantův princip se konkrétně zabývá tím, kdy by zákony neměly regulovat individuální jednání, které nepoškozuje práva ostatních.
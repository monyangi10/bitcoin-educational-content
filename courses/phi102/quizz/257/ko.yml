question: 벤자민 콘스탄트의 '법의 침묵' 원칙은 자유주의 사회에서 근본적으로 무엇을 요구할까요?
answer: 법은 개인이 타인의 유사한 권리를 해치지 않고 자유와 재산권을 행사할 때 침묵을 지켜야 합니다
wrong_answers:
  - 법률은 법률 해석 없이 모든 국민이 이해할 수 있는 쉬운 언어로 작성되어야 합니다
  - 정부 공무원은 중립성을 유지하기 위해 논란이 되는 정치적 이슈에 대한 공개 논평을 자제해야 합니다
  - 입법 기관은 변화에 대한 압도적인 대중적 합의가 없는 한 새로운 법률을 만들지 않아야 합니다
explanation: |
  벤자민 콘스탄트의 '법의 침묵' 원칙은 개인이 자신의 자유와 재산을 정당하고 합법적으로 사용할 때 법이 간섭해서는 안 된다는 것을 의미합니다. 개인의 자유에 대한 유일한 허용 가능한 제한은 타인의 유사한 자유를 보호하는 것이기 때문에 이러한 침묵은 필수적입니다. 오답은 이를 언어적 명확성, 정부의 중립성 또는 입법적 제한으로 잘못 해석하지만, 콘스탄트의 원칙은 타인의 권리를 해치지 않는 개인의 행동을 법이 규제해서는 안 되는 경우를 구체적으로 다루고 있습니다.
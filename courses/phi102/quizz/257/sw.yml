question: Kanuni ya Benjamin Constant ya 'kunyamazisha sheria' inahitaji nini kimsingi katika jamii huria?
answer: Sheria lazima zibaki kimya wakati watu binafsi wanapotumia uhuru wao na haki zao za kumiliki mali bila kudhuru haki sawa za wengine.
wrong_answers:
  - Sheria lazima ziandikwe kwa lugha rahisi ambayo raia wote wanaweza kuelewa bila tafsiri ya kisheria.
  - Maafisa wa serikali lazima wajiepushe na maoni ya umma kuhusu masuala tata ya kisiasa ili kudumisha kutoegemea upande wowote
  - Vyombo vya sheria vinapaswa kuepuka kuunda sheria mpya isipokuwa kama kuna makubaliano mengi ya wananchi kuhusu mabadiliko
explanation: |
  Kanuni ya Benjamin Constant ya 'kunyamazisha sheria' inamaanisha kwamba sheria hazipaswi kuingilia kati wakati watu binafsi wanapotumia uhuru na mali zao kwa haki na halali. Ukimya huu ni muhimu kwa sababu kikomo pekee kinachokubalika kwa uhuru wa mtu binafsi ni kulinda uhuru sawa wa wengine. Majibu yasiyo sahihi hutafsiri hili kama uwazi wa lugha, kutoegemea upande wowote kwa serikali, au kizuizi cha kisheria, lakini kanuni ya Constant inashughulikia haswa wakati sheria hazipaswi kudhibiti vitendo vya mtu binafsi ambavyo havidhuru haki za wengine.
question: اصل «سکوت قانون» بنجامین کنستانت در یک جامعه لیبرال اساساً چه چیزی را ایجاب می‌کند؟
answer: قوانین باید زمانی که افراد آزادی و حقوق مالکیت خود را بدون آسیب رساندن به حقوق مشابه دیگران اعمال می‌کنند، ساکت بمانند.
wrong_answers:
  - قوانین باید به زبانی ساده نوشته شوند که همه شهروندان بدون نیاز به تفسیر حقوقی بتوانند آن را درک کنند.
  - مقامات دولتی باید از اظهار نظر عمومی در مورد مسائل سیاسی بحث‌برانگیز خودداری کنند تا بی‌طرفی را حفظ کنند.
  - نهادهای قانون‌گذاری باید از ایجاد قوانین جدید خودداری کنند مگر اینکه توافق عمومی گسترده‌ای برای تغییر وجود داشته باشد.
explanation: |
  اصل بنجامین کنستانت درباره 'سکوت قانون' به این معناست که قوانین نباید در زمانی که افراد به طور عادلانه و مشروع از آزادی و دارایی خود استفاده می‌کنند، دخالت کنند. این سکوت ضروری است زیرا تنها محدودیت قابل قبول بر آزادی فردی، حفاظت از آزادی‌های مشابه دیگران است. پاسخ‌های نادرست این اصل را به عنوان وضوح زبانی، بی‌طرفی دولتی، یا محدودیت قانون‌گذاری تفسیر می‌کنند، اما اصل کنستانت به طور خاص به زمانی اشاره دارد که قوانین نباید اقدامات فردی را که به حقوق دیگران آسیب نمی‌رسانند، تنظیم کنند.
question: Hva krever Benjamin Constants prinsipp om "lovens taushet" i bunn og grunn i et liberalt samfunn?
answer: Lovene må forholde seg tause når enkeltpersoner utøver sin frihet og eiendomsrett uten å skade andres tilsvarende rettigheter
wrong_answers:
  - Lovene må være skrevet på et enkelt språk som alle borgere kan forstå uten juridisk tolkning
  - Myndighetspersoner må avstå fra å uttale seg offentlig om kontroversielle politiske spørsmål for å opprettholde nøytraliteten
  - Lovgivende organer bør unngå å lage nye lover med mindre det er overveldende konsensus i befolkningen for endring
explanation: |
  Benjamin Constants prinsipp om "lovens taushet" innebærer at lovene ikke skal gripe inn når enkeltpersoner gjør rettferdig og legitim bruk av sin frihet og eiendom. Denne tausheten er viktig fordi den eneste akseptable begrensningen på individets frihet er å beskytte andres tilsvarende frihet. Feil svar feiltolker dette som språklig klarhet, statlig nøytralitet eller lovgivningsmessig tilbakeholdenhet, men Constants prinsipp handler spesifikt om når lover ikke bør regulere individuelle handlinger som ikke skader andres rettigheter.
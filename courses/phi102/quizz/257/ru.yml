question: Чего требует принцип Бенжамена Констана "молчание закона" в либеральном обществе?
answer: Законы должны хранить молчание, когда люди осуществляют свои права на свободу и собственность, не нанося ущерба аналогичным правам других людей
wrong_answers:
  - Законы должны быть написаны простым языком, понятным всем гражданам без юридического толкования
  - Государственные служащие должны воздерживаться от публичных комментариев по спорным политическим вопросам, чтобы сохранить нейтралитет
  - Законодательные органы должны избегать создания новых законов, если только не существует подавляющего консенсуса населения в пользу изменений
explanation: |
  Принцип Бенджамина Констана "молчание закона" означает, что законы не должны вмешиваться, когда люди справедливо и законно используют свою свободу и собственность. Это молчание необходимо, поскольку единственным приемлемым ограничением свободы индивида является защита аналогичных свобод других людей. Неправильные ответы неверно интерпретируют это как лингвистическую ясность, правительственный нейтралитет или законодательную сдержанность, но принцип Константа конкретно рассматривает, когда законы не должны регулировать индивидуальные действия, которые не наносят ущерба правам других.
question: Šta Benjamin Constantov princip 'ćutanja zakona' fundamentalno zahteva u liberalnom društvu?
answer: Zakoni moraju ostati tihi kada pojedinci ostvaruju svoja prava na slobodu i imovinu bez narušavanja sličnih prava drugih.
wrong_answers:
  - Zakoni moraju biti napisani jednostavnim jezikom koji svi građani mogu razumeti bez pravnog tumačenja.
  - Vladiničari moraju da se uzdrže od javnih komentara o kontroverznim političkim pitanjima kako bi održali neutralnost.
  - Zakonodavna tela treba da izbegavaju kreiranje novih zakona osim ako ne postoji preovlađujući popularni konsenzus za promenu
explanation: |
  Princip 'ćutanja zakona' Benžamina Konstanta znači da zakoni ne bi trebalo da se mešaju kada pojedinci pravedno i legitimno koriste svoju slobodu i imovinu. Ovo ćutanje je ključno jer je jedino prihvatljivo ograničenje individualne slobode zaštita sličnih sloboda drugih. Pogrešni odgovori pogrešno tumače ovo kao jezičku jasnoću, neutralnost vlade ili zakonodavno uzdržavanje, ali Konstantov princip se specifično odnosi na to kada zakoni ne bi trebalo da regulišu pojedinačne akcije koje ne štete pravima drugih.
question: Mida nõuab Benjamin Constanti "seaduse vaikimise" põhimõte liberaalses ühiskonnas põhimõtteliselt?
answer: Seadused peavad vaikima, kui üksikisikud kasutavad oma vabadust ja omandiõigust, kahjustamata seejuures teiste sarnaseid õigusi
wrong_answers:
  - Seadused peavad olema kirjutatud lihtsas keeles, millest kõik kodanikud saavad aru ilma juriidilise tõlgendamiseta
  - Valitsuse ametnikud peavad neutraalsuse säilitamiseks hoiduma vastuoluliste poliitiliste küsimuste avalikust kommenteerimisest
  - Seadusandlikud organid peaksid vältima uute seaduste loomist, välja arvatud juhul, kui rahva ülekaalukas konsensus muudatuste suhtes on olemas
explanation: |
  Benjamin Constanti põhimõte "seaduse vaikimine" tähendab, et seadused ei tohiks sekkuda, kui üksikisikud kasutavad oma vabadust ja omandit õiglaselt ja seaduslikult. See vaikimine on oluline, sest ainus vastuvõetav piirang üksikisiku vabadusele on teiste sarnaste vabaduste kaitsmine. Valed vastused tõlgendavad seda valesti kui keelelist selgust, valitsuse neutraalsust või seadusandlikku piirangut, kuid Constant'i põhimõte käsitleb konkreetselt seda, millal seadused ei tohiks reguleerida individuaalseid tegevusi, mis ei kahjusta teiste õigusi.
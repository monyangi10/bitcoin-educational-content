question: Mitä Benjamin Constantin "lain vaikenemisen" periaate pohjimmiltaan edellyttää liberaalissa yhteiskunnassa?
answer: Lakien on pysyttävä hiljaa, kun yksilöt käyttävät vapauttaan ja omistusoikeuttaan vahingoittamatta muiden vastaavia oikeuksia
wrong_answers:
  - Lait on kirjoitettava yksinkertaisella kielellä, jonka kaikki kansalaiset voivat ymmärtää ilman oikeudellista tulkintaa
  - Hallituksen virkamiesten on pidättäydyttävä kommentoimasta julkisesti kiistanalaisia poliittisia kysymyksiä puolueettomuuden säilyttämiseksi
  - Lainsäätäjien olisi vältettävä uusien lakien luomista, ellei muutosta kannateta ylivoimaisen yksimielisesti
explanation: |
  Benjamin Constantin periaate "lain vaikenemisesta" tarkoittaa, että lakien ei pitäisi puuttua siihen, että yksilöt käyttävät vapauttaan ja omaisuuttaan oikeudenmukaisesti ja laillisesti. Hiljaisuus on välttämätöntä, koska ainoa hyväksyttävä rajoitus yksilön vapaudelle on muiden vastaavien vapauksien suojeleminen. Väärissä vastauksissa tämä tulkitaan virheellisesti kielelliseksi selkeydeksi, hallituksen neutraaliudeksi tai lainsäädännölliseksi pidättyvyydeksi, mutta Constantin periaate koskee nimenomaan sitä, milloin lakien ei pitäisi säännellä yksilön toimia, jotka eivät vahingoita muiden oikeuksia.
question: หลักการ 'ความเงียบของกฎหมาย' ของ Benjamin Constant ต้องการอะไรในสังคมเสรีนิยม?
answer: กฎหมายต้องเงียบเมื่อบุคคลใช้เสรีภาพและสิทธิในทรัพย์สินของตนโดยไม่ทำลายสิทธิที่คล้ายกันของผู้อื่น
wrong_answers:
  - กฎหมายต้องเขียนด้วยภาษาที่เรียบง่ายที่พลเมืองทุกคนสามารถเข้าใจได้โดยไม่ต้องตีความทางกฎหมาย
  - เจ้าหน้าที่รัฐบาลต้องงดเว้นจากการแสดงความคิดเห็นในที่สาธารณะเกี่ยวกับประเด็นทางการเมืองที่เป็นข้อขัดแย้งเพื่อรักษาความเป็นกลาง
  - หน่วยงานนิติบัญญัติควรหลีกเลี่ยงการสร้างกฎหมายใหม่ เว้นแต่จะมีฉันทามติจากประชาชนอย่างท่วมท้นในการเปลี่ยนแปลง
explanation: |
  หลักการ 'ความเงียบของกฎหมาย' ของ Benjamin Constant หมายถึง กฎหมายไม่ควรแทรกแซงเมื่อบุคคลใช้เสรีภาพและทรัพย์สินของตนอย่างยุติธรรมและชอบธรรม ความเงียบนี้มีความสำคัญเพราะข้อจำกัดที่ยอมรับได้เพียงอย่างเดียวต่อเสรีภาพของบุคคลคือการปกป้องเสรีภาพที่คล้ายคลึงกันของผู้อื่น คำตอบที่ผิดจะตีความผิดว่าเป็นความชัดเจนทางภาษา ความเป็นกลางของรัฐบาล หรือการยับยั้งการออกกฎหมาย แต่หลักการของ Constant กล่าวถึงโดยเฉพาะเมื่อกฎหมายไม่ควรควบคุมการกระทำของบุคคลที่ไม่ทำลายสิทธิของผู้อื่น
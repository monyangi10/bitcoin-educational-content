question: 在自由社會中，Benjamin Constant 的「法律的沉默」原則根本上需要什麼？
answer: 當個人行使其自由和財產權時，法律必須保持沉默，而不傷害他人的類似權利
wrong_answers:
  - 法律必須以所有公民都能理解的簡單語言撰寫，而無需法律解釋
  - 政府官員必須避免公開評論具爭議性的政治議題，以維持中立性
  - 立法機關應避免制定新法律，除非有絕大多數的民眾共識要求變革
explanation: |
  Benjamin Constant 的「法律的沉默」原則意指當個人公正合法地使用其自由和財產時，法律不應干涉。這種沉默是必要的，因為對個人自由唯一可接受的限制是保護他人類似的自由。錯誤的答案將此誤解為語言清晰、政府中立或立法克制，但 Constant 的原則特別針對法律何時不應規範不傷害他人權利的個人行為。
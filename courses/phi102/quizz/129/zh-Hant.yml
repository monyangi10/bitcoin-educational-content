question: 是什麼歷史發展從根本上改變了人類獲取財富的方式，從零和競爭轉變為互惠互利的關係？
answer: 農業和新公用事業生產的出現，在不破壞現有資源的情況下創造財富
wrong_answers:
  - 建立國際法律架構，以規範貿易及防止自然資源衝突
  - 運輸技術的發展，使現有的天然資源得以更有效率的分配
  - 建立貨幣制度，取代易貨交易，使資源分配更公平
explanation: |
  本章說明，在早期人類歷史中，人們為了爭奪有限的自然資源而激烈競爭，而這些資源是沒有人生產的。當農業出現時發生了根本性的轉變，農業透過生產而非攫取來創造新的財富。這使得自願交換成為可能，雙方都能受益，人類關係從破壞性競爭轉變為和平合作。法律框架、運輸和貨幣體系是後來的發展，它們支持了這一轉變，但並不是從零和互動轉變為正和互動的根本原因。
question: 是什么历史发展从根本上改变了人类获取财富的方式，从零和竞争转变为互惠互利的关系？
answer: 在不破坏现有资源的情况下，农业的出现和新公用事业的生产创造了财富
wrong_answers:
  - 建立国际法律框架，规范贸易，防止自然资源冲突
  - 运输技术的发展使现有自然资源的分配更有效率
  - 建立货币体系，取代易货贸易，使资源分配更加公平
explanation: |
  这一章解释说，在人类早期历史中，人们为了争夺有限的自然资源而展开激烈竞争。当农业出现时，发生了根本性的转变，农业通过生产而不是占有创造了新的财富。这使得双方都能从中获益的自愿交换成为可能，从而将人类关系从破坏性竞争转变为和平合作。法律框架、交通和货币体系是后来的发展，它们支持了这种转变，但并不是从零和互动转变为正和互动的根本原因。
question: Какое историческое событие коренным образом изменило способы приобретения богатства людьми, перейдя от конкуренции с нулевой суммой к взаимовыгодным отношениям?
answer: Возникновение сельского хозяйства и производство новых товаров, которые создавали богатство, не разрушая существующие ресурсы
wrong_answers:
  - Создание международных правовых рамок, регулирующих торговлю и предотвращающих конфликты из-за природных ресурсов
  - Развитие транспортных технологий, позволяющих более эффективно распределять имеющиеся природные ресурсы
  - Создание денежных систем, которые заменили бартер и сделали распределение ресурсов более справедливым
explanation: |
  В главе рассказывается, что на ранних этапах истории человечества люди жестоко конкурировали за ограниченные природные ресурсы, которые никто не добывал. Фундаментальный сдвиг произошел с появлением сельского хозяйства, создавшего новые богатства за счет производства, а не присвоения. Это позволило осуществлять добровольные обмены, от которых выигрывали обе стороны, превратив человеческие отношения из разрушительной конкуренции в мирное сотрудничество. Правовые рамки, транспорт и денежные системы стали более поздними разработками, которые поддержали эту трансформацию, но не были первопричиной перехода от взаимодействия с нулевой суммой к взаимодействию с положительной суммой.
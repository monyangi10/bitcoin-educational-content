question: ゼロサム競争から互恵関係へと移行し、人間が富を獲得する方法を根本的に変えた歴史的展開とは？
answer: 農業の出現と、既存の資源を破壊することなく富を生み出す新しい公益事業の生産
wrong_answers:
  - 貿易を規制し、天然資源をめぐる紛争を防止する国際的な法的枠組みの確立。
  - 既存の天然資源をより効率的に分配することを可能にした輸送技術の発展
  - 物々交換に取って代わり、資源配分をより公平にする貨幣制度の創設。
explanation: |
  この章では、人類史の初期において、人々は誰も生産していない限られた天然資源を激しく奪い合ったと説明している。根本的な転換が起こったのは、農業が勃興し、収奪ではなく生産によって新たな富を生み出すようになってからである。これにより、双方が利益を得る自発的な交換が可能になり、人間関係は破壊的な競争から平和的な協力へと変化した。法的枠組み、交通手段、貨幣制度は、この転換を支えた後発のものであるが、ゼロサムからポジティブサムの相互作用への転換の根本的な原因ではなかった。
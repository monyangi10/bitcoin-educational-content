question: 인간이 부를 획득하는 방식을 제로섬 경쟁에서 상호 이익이 되는 관계로 근본적으로 변화시킨 역사적 발전은 무엇일까요?
answer: 농업의 출현과 기존 자원을 파괴하지 않고 부를 창출하는 새로운 유틸리티의 생산
wrong_answers:
  - 무역을 규제하고 천연 자원을 둘러싼 분쟁을 예방하는 국제 법적 프레임워크의 확립
  - 기존 천연 자원을 보다 효율적으로 분배할 수 있는 운송 기술의 개발
  - 물물교환을 대체하고 자원 배분을 보다 공평하게 만드는 화폐 시스템의 탄생
explanation: |
  이 장에서는 초기 인류 역사에서 사람들은 아무도 생산하지 않은 한정된 천연자원을 놓고 치열한 경쟁을 벌였다고 설명합니다. 하지만 농업이 등장하면서 소비가 아닌 생산을 통해 새로운 부를 창출하는 근본적인 변화가 일어났습니다. 이를 통해 양쪽 모두에게 이익이 되는 자발적인 교류가 가능해졌고, 인간 관계는 파괴적인 경쟁에서 평화로운 협력으로 바뀌었습니다. 법적 프레임워크, 교통수단, 화폐 시스템은 이후 이러한 변화를 뒷받침하는 발전이었지만 제로섬에서 포지티브섬 상호작용으로의 전환의 근본 원인은 아니었습니다.
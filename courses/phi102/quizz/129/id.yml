question: Perkembangan historis apa yang secara fundamental mengubah cara manusia memperoleh kekayaan, beralih dari kompetisi zero-sum menjadi hubungan yang saling menguntungkan?
answer: Munculnya pertanian dan produksi utilitas baru yang menciptakan kekayaan tanpa merusak sumber daya yang ada
wrong_answers:
  - Pembentukan kerangka hukum internasional yang mengatur perdagangan dan mencegah konflik atas sumber daya alam
  - Perkembangan teknologi transportasi yang memungkinkan distribusi sumber daya alam yang ada secara lebih efisien
  - Terciptanya sistem moneter yang menggantikan barter dan membuat alokasi sumber daya menjadi lebih adil
explanation: |
  Bab ini menjelaskan bahwa pada awal sejarah manusia, manusia bersaing dengan keras untuk mendapatkan sumber daya alam yang terbatas dan belum pernah diproduksi oleh siapa pun. Pergeseran mendasar terjadi ketika pertanian muncul, menciptakan kekayaan baru melalui produksi dan bukan perampasan. Hal ini memungkinkan terjadinya pertukaran sukarela di mana kedua belah pihak diuntungkan, mengubah hubungan manusia dari persaingan yang merusak menjadi kerja sama yang damai. Kerangka hukum, transportasi, dan sistem moneter merupakan perkembangan selanjutnya yang mendukung transformasi ini, tetapi bukan merupakan akar penyebab pergeseran dari interaksi zero-sum ke positive-sum.
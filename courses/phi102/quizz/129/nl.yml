question: Welke historische ontwikkeling veranderde fundamenteel de manier waarop mensen rijkdom konden verwerven, door van nulsomconcurrentie over te stappen op wederzijds voordelige relaties?
answer: De opkomst van de landbouw en de productie van nieuwe nutsvoorzieningen die rijkdom creëerden zonder bestaande hulpbronnen te vernietigen
wrong_answers:
  - De oprichting van internationale juridische kaders die de handel reguleren en conflicten over natuurlijke hulpbronnen voorkomen
  - De ontwikkeling van transporttechnologieën die een efficiëntere distributie van bestaande natuurlijke hulpbronnen mogelijk maakten
  - De creatie van monetaire systemen die ruilhandel vervingen en de toewijzing van middelen rechtvaardiger maakten
explanation: |
  Het hoofdstuk legt uit dat in de vroege menselijke geschiedenis mensen gewelddadig concurreerden om beperkte natuurlijke hulpbronnen die niemand had geproduceerd. De fundamentele verschuiving vond plaats toen de landbouw opkwam, waardoor nieuwe rijkdom werd gecreëerd door productie in plaats van toe-eigening. Dit maakte vrijwillige uitwisselingen mogelijk waar beide partijen van profiteerden, waardoor menselijke relaties veranderden van destructieve concurrentie naar vreedzame samenwerking. Juridische kaders, transport en monetaire systemen waren latere ontwikkelingen die deze transformatie ondersteunden, maar waren niet de hoofdoorzaak van de verschuiving van zero-sum naar positive-sum interacties.
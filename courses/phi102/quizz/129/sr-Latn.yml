question: Koji istorijski razvoj je fundamentalno promenio način na koji ljudi mogu sticati bogatstvo, prelazeći sa igre sa nultim zbirom na međusobno korisne odnose?
answer: Pojava poljoprivrede i proizvodnja novih korisnih sredstava koja su stvarala bogatstvo bez uništavanja postojećih resursa
wrong_answers:
  - Uspostavljanje međunarodnih pravnih okvira koji su regulisali trgovinu i sprečavali sukobe oko prirodnih resursa
  - Razvoj transportnih tehnologija koje su omogućile efikasniju distribuciju postojećih prirodnih resursa
  - Kreiranje monetarnih sistema koji su zamenili barter i učinili raspodelu resursa pravednijom
explanation: |
  Poglavlje objašnjava da su se u ranoj ljudskoj istoriji ljudi nasilno takmičili za ograničene prirodne resurse koje niko nije proizveo. Fundamentalna promena dogodila se kada se pojavila poljoprivreda, stvarajući novo bogatstvo kroz proizvodnju umesto prisvajanja. Ovo je omogućilo dobrovoljne razmene u kojima su obe strane imale koristi, transformišući ljudske odnose iz destruktivnog takmičenja u mirnu saradnju. Pravni okviri, transport i monetarni sistemi su kasniji razvoj koji je podržao ovu transformaciju, ali nisu bili osnovni uzrok prelaska sa interakcija sa nultim zbirom na interakcije sa pozitivnim zbirom.
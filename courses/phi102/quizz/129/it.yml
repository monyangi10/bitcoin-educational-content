question: Quale sviluppo storico ha cambiato radicalmente il modo in cui gli esseri umani potevano acquisire ricchezza, passando da una competizione a somma zero a relazioni reciprocamente vantaggiose?
answer: L'emergere dell'agricoltura e della produzione di nuovi servizi che creavano ricchezza senza distruggere le risorse esistenti
wrong_answers:
  - L'istituzione di quadri giuridici internazionali che regolamentassero il commercio e prevenissero i conflitti per le risorse naturali
  - Lo sviluppo di tecnologie di trasporto che hanno permesso una distribuzione più efficiente delle risorse naturali esistenti
  - La creazione di sistemi monetari che sostituirono il baratto e resero più equa l'allocazione delle risorse
explanation: |
  Il capitolo spiega che all'inizio della storia dell'umanità le persone competevano violentemente per le limitate risorse naturali che nessuno aveva prodotto. Il cambiamento fondamentale è avvenuto quando è emersa l'agricoltura, che ha creato nuova ricchezza attraverso la produzione piuttosto che l'appropriazione. Questo ha permesso scambi volontari di cui hanno beneficiato entrambe le parti, trasformando le relazioni umane da una competizione distruttiva a una cooperazione pacifica. I quadri giuridici, i trasporti e i sistemi monetari sono stati sviluppi successivi che hanno sostenuto questa trasformazione, ma non sono stati la causa principale del passaggio da interazioni a somma zero a interazioni a somma positiva.
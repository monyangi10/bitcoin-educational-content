question: Welche historische Entwicklung veränderte grundlegend die Art und Weise, wie Menschen Reichtum erwerben konnten, indem sie von einem Nullsummenwettbewerb zu gegenseitig vorteilhaften Beziehungen übergingen?
answer: Das Aufkommen der Landwirtschaft und die Produktion neuer Versorgungsleistungen, die Wohlstand schufen, ohne die vorhandenen Ressourcen zu zerstören
wrong_answers:
  - Die Schaffung eines internationalen Rechtsrahmens, der den Handel regelt und Konflikte um natürliche Ressourcen verhindert
  - Die Entwicklung von Transporttechnologien, die eine effizientere Verteilung der vorhandenen natürlichen Ressourcen ermöglichen
  - Die Schaffung von Geldsystemen, die den Tauschhandel ersetzten und die Ressourcenverteilung gerechter machten
explanation: |
  In diesem Kapitel wird erläutert, dass die Menschen in der frühen Menschheitsgeschichte gewaltsam um begrenzte natürliche Ressourcen konkurrierten, die niemand produziert hatte. Der grundlegende Wandel vollzog sich mit dem Aufkommen der Landwirtschaft, die neuen Wohlstand durch Produktion statt durch Aneignung schuf. Dies ermöglichte einen freiwilligen Austausch, von dem beide Seiten profitierten, und verwandelte die menschlichen Beziehungen von destruktiver Konkurrenz in friedliche Zusammenarbeit. Rechtliche Rahmenbedingungen, Transportmittel und Geldsysteme waren spätere Entwicklungen, die diesen Wandel unterstützten, aber nicht die eigentliche Ursache für den Wechsel von Nullsummen- zu Positivsummen-Interaktionen waren.
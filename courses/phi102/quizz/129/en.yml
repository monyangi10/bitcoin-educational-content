question: What historical development fundamentally changed how humans could acquire wealth, moving from zero-sum competition to mutually beneficial relationships?
answer: The emergence of agriculture and production of new utilities that created wealth without destroying existing resources
wrong_answers:
  - The establishment of international legal frameworks that regulated trade and prevented conflicts over natural resources
  - The development of transportation technologies that allowed for more efficient distribution of existing natural resources
  - The creation of monetary systems that replaced barter and made resource allocation more equitable
explanation: |
  The chapter explains that in early human history, people competed violently for limited natural resources that no one had produced. The fundamental shift occurred when agriculture emerged, creating new wealth through production rather than appropriation. This allowed for voluntary exchanges where both parties benefited, transforming human relationships from destructive competition to peaceful cooperation. Legal frameworks, transportation, and monetary systems were later developments that supported this transformation but were not the root cause of the shift from zero-sum to positive-sum interactions.

question: Milline ajalooline areng muutis põhjalikult seda, kuidas inimesed said rikkust omandada, liikudes nullsumma konkurentsist vastastikku kasulikele suhetele?
answer: Põllumajanduse tekkimine ja uute kommunaalteenuste tootmine, mis lõi jõukust ilma olemasolevaid ressursse hävitamata
wrong_answers:
  - Rahvusvahelise õigusliku raamistiku loomine, mis reguleeris kaubandust ja ennetas konflikte loodusvarade üle
  - Transporditehnoloogiate arendamine, mis võimaldas olemasolevaid loodusvarasid tõhusamalt jaotada
  - Rahasüsteemide loomine, mis asendasid vahetuskaubandust ja muutsid ressursside jaotuse õiglasemaks
explanation: |
  Peatükis selgitatakse, et inimkonna varases ajaloos konkureerisid inimesed vägivaldselt piiratud loodusvarade pärast, mida keegi ei tootnud. Põhimõtteline muutus toimus siis, kui tekkis põllumajandus, mis lõi uut rikkust pigem tootmise kui omastamise kaudu. See võimaldas vabatahtlikku vahetust, millest said kasu mõlemad osapooled, muutes inimsuhteid hävitavast konkurentsist rahumeelseks koostööks. Õiguslikud raamistikud, transport ja rahasüsteemid olid hilisemad arengud, mis toetasid seda muutust, kuid ei olnud nullsummaliselt suhtluselt positiivse summa suhtlusele ülemineku algpõhjus.
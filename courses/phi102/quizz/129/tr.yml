question: Hangi tarihsel gelişme, sıfır toplamlı rekabetten karşılıklı fayda sağlayan ilişkilere geçerek insanların servet edinme yöntemlerini temelden değiştirdi?
answer: Tarımın ortaya çıkışı ve mevcut kaynakları yok etmeden zenginlik yaratan yeni kamu hizmetlerinin üretimi
wrong_answers:
  - Ticareti düzenleyen ve doğal kaynaklar üzerindeki çatışmaları önleyen uluslararası yasal çerçevelerin oluşturulması
  - Mevcut doğal kaynakların daha verimli bir şekilde dağıtılmasını sağlayan ulaşım teknolojilerinin geliştirilmesi
  - Takasın yerini alan ve kaynak dağılımını daha adil hale getiren parasal sistemlerin oluşturulması
explanation: |
  Bu bölüm, insanlık tarihinin erken dönemlerinde insanların, kimsenin üretmediği sınırlı doğal kaynaklar için şiddetle rekabet ettiklerini açıklamaktadır. Temel değişim, tarımın ortaya çıkması ve el koyma yerine üretim yoluyla yeni bir zenginlik yaratmasıyla gerçekleşmiştir. Bu durum, her iki tarafın da fayda sağladığı gönüllü değiş tokuşlara olanak sağlayarak insan ilişkilerini yıkıcı rekabetten barışçıl işbirliğine dönüştürmüştür. Yasal çerçeveler, ulaşım ve parasal sistemler bu dönüşümü destekleyen daha sonraki gelişmelerdi ancak sıfır toplamlı etkileşimlerden pozitif toplamlı etkileşimlere geçişin temel nedeni değillerdi.
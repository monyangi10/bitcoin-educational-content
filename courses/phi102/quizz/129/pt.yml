question: Que desenvolvimento histórico mudou fundamentalmente a forma como os seres humanos podiam adquirir riqueza, passando da competição de soma zero para relações mutuamente benéficas?
answer: O aparecimento da agricultura e a produção de novas utilidades que criaram riqueza sem destruir os recursos existentes
wrong_answers:
  - O estabelecimento de quadros jurídicos internacionais que regulavam o comércio e evitavam conflitos sobre os recursos naturais
  - O desenvolvimento de tecnologias de transporte que permitiram uma distribuição mais eficiente dos recursos naturais existentes
  - A criação de sistemas monetários que substituíram a troca direta e tornaram a atribuição de recursos mais equitativa
explanation: |
  O capítulo explica que, nos primórdios da história da humanidade, as pessoas competiam violentamente por recursos naturais limitados que ninguém produzia. A mudança fundamental ocorreu quando surgiu a agricultura, criando novas riquezas através da produção e não da apropriação. Este facto permitiu trocas voluntárias em que ambas as partes beneficiaram, transformando as relações humanas de competição destrutiva em cooperação pacífica. Os quadros jurídicos, os transportes e os sistemas monetários foram desenvolvimentos posteriores que apoiaram esta transformação, mas não foram a causa fundamental da passagem das interações de soma zero para as de soma positiva.
question: کدام تحول تاریخی به طور اساسی نحوه کسب ثروت توسط انسان‌ها را تغییر داد و از رقابت با حاصل جمع صفر به روابط متقابل سودمند منتقل کرد؟
answer: ظهور کشاورزی و تولید ابزارهای جدید که ثروت ایجاد کردند بدون اینکه منابع موجود را از بین ببرند
wrong_answers:
  - ایجاد چارچوب‌های قانونی بین‌المللی که تجارت را تنظیم کرده و از بروز درگیری‌ها بر سر منابع طبیعی جلوگیری می‌کند
  - توسعه فناوری‌های حمل‌ونقل که توزیع کارآمدتر منابع طبیعی موجود را امکان‌پذیر ساخت
  - ایجاد سیستم‌های پولی که جایگزین مبادله کالا به کالا شدند و تخصیص منابع را عادلانه‌تر کردند
explanation: |
  این فصل توضیح می‌دهد که در اوایل تاریخ بشر، مردم برای منابع طبیعی محدودی که هیچ‌کس تولید نکرده بود، به‌طور خشونت‌آمیزی رقابت می‌کردند. تغییر اساسی زمانی رخ داد که کشاورزی ظهور کرد و با تولید به‌جای تصاحب، ثروت جدیدی ایجاد کرد. این امر مبادلات داوطلبانه‌ای را ممکن ساخت که در آن هر دو طرف سود می‌بردند و روابط انسانی را از رقابت مخرب به همکاری مسالمت‌آمیز تبدیل کرد. چارچوب‌های قانونی، سیستم‌های حمل‌ونقل و پولی بعدها توسعه یافتند که از این تحول حمایت کردند اما علت اصلی تغییر از تعاملات صفر-جمع به مثبت-جمع نبودند.
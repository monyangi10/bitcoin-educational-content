question: Кое историческо развитие е променило из основи начина, по който хората могат да придобиват богатство, преминавайки от конкуренция с нулев резултат към взаимоизгодни отношения?
answer: Възникването на земеделието и производството на нови комунални услуги, които създават богатство, без да унищожават съществуващите ресурси
wrong_answers:
  - Създаването на международна правна рамка, която регулира търговията и предотвратява конфликтите за природни ресурси
  - Развитието на транспортните технологии, които позволяват по-ефективно разпределение на съществуващите природни ресурси
  - Създаването на парични системи, които заместват размяната и правят разпределението на ресурсите по-справедливо
explanation: |
  В главата се обяснява, че в ранната човешка история хората са се конкурирали жестоко за ограничените природни ресурси, които никой не е произвеждал. Фундаменталната промяна настъпва с появата на земеделието, което създава ново богатство чрез производство, а не чрез присвояване. Това позволява доброволна размяна, от която печелят и двете страни, и трансформира човешките взаимоотношения от разрушителна конкуренция към мирно сътрудничество. Правните рамки, транспортът и паричните системи са по-късни развития, които подпомагат тази трансформация, но не са основната причина за преминаването от взаимодействие с нулева сума към взаимодействие с положителна сума.
question: Hvilken historisk utvikling endret fundamentalt hvordan mennesker kunne tilegne seg rikdom, fra nullsumskonkurranse til gjensidig fordelaktige relasjoner?
answer: Fremveksten av jordbruk og produksjon av nye hjelpemidler som skapte velstand uten å ødelegge eksisterende ressurser
wrong_answers:
  - Etableringen av internasjonale juridiske rammeverk som regulerte handel og forhindret konflikter om naturressurser
  - Utviklingen av transportteknologi som muliggjorde en mer effektiv fordeling av eksisterende naturressurser
  - Opprettelsen av pengesystemer som erstattet byttehandel og gjorde ressursfordelingen mer rettferdig
explanation: |
  Kapitlet forklarer at i menneskets tidlige historie konkurrerte menneskene voldsomt om begrensede naturressurser som ingen hadde produsert. Det grunnleggende skiftet skjedde da jordbruket vokste frem, og skapte ny rikdom gjennom produksjon i stedet for tilegnelse. Dette åpnet for frivillige utvekslinger som begge parter tjente på, og forvandlet menneskelige relasjoner fra destruktiv konkurranse til fredelig samarbeid. Rettslige rammeverk, transport og pengesystemer var senere utviklingstrekk som støttet opp om denne endringen, men de var ikke den grunnleggende årsaken til skiftet fra nullsum- til plussum-samspill.
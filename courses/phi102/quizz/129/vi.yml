question: Sự phát triển lịch sử nào đã thay đổi căn bản cách thức con người tích lũy của cải, chuyển từ cạnh tranh thắng thua tuyệt đối sang các mối quan hệ cùng có lợi?
answer: Sự ra đời của nông nghiệp và việc sản xuất các sản phẩm tiện ích mới đã tạo ra của cải mà không phá hủy các nguồn tài nguyên hiện có.
wrong_answers:
  - Việc thiết lập các khuôn khổ pháp lý quốc tế nhằm điều chỉnh thương mại và ngăn ngừa xung đột về tài nguyên thiên nhiên.
  - Sự phát triển của các công nghệ vận tải cho phép phân phối tài nguyên thiên nhiên hiện có một cách hiệu quả hơn.
  - Việc tạo ra các hệ thống tiền tệ thay thế hình thức trao đổi hàng hóa và giúp phân bổ nguồn lực công bằng hơn.
explanation: |
  Chương này giải thích rằng trong lịch sử sơ khai của loài người, con người đã cạnh tranh khốc liệt để giành giật các nguồn tài nguyên thiên nhiên hạn chế mà không ai sản xuất ra. Sự thay đổi cơ bản xảy ra khi nông nghiệp xuất hiện, tạo ra của cải mới thông qua sản xuất thay vì chiếm đoạt. Điều này cho phép các cuộc trao đổi tự nguyện, trong đó cả hai bên đều có lợi, chuyển đổi các mối quan hệ giữa con người từ cạnh tranh hủy diệt sang hợp tác hòa bình. Các khuôn khổ pháp lý, giao thông vận tải và hệ thống tiền tệ là những phát triển sau này hỗ trợ cho sự chuyển đổi này nhưng không phải là nguyên nhân gốc rễ của sự chuyển dịch từ tương tác "tổng bằng không" sang tương tác "tổng có lợi".
question: Jaký historický vývoj zásadně změnil způsob, jakým lidé mohou získávat bohatství, a přešel od soutěže s nulovým součtem ke vzájemně výhodným vztahům?
answer: Vznik zemědělství a výroba nových užitkových předmětů, které vytvářely bohatství, aniž by ničily stávající zdroje
wrong_answers:
  - Vytvoření mezinárodního právního rámce, který reguloval obchod a zabraňoval konfliktům o přírodní zdroje
  - Vývoj dopravních technologií, které umožnily efektivnější distribuci stávajících přírodních zdrojů
  - Vytvoření peněžních systémů, které nahradily směnný obchod a umožnily spravedlivější rozdělování zdrojů
explanation: |
  Kapitola vysvětluje, že v rané historii lidstva lidé násilně soupeřili o omezené přírodní zdroje, které nikdo nevytvářel. Zásadní změna nastala, když se objevilo zemědělství, které vytvářelo nové bohatství spíše produkcí než přivlastňováním. To umožnilo dobrovolnou výměnu, z níž měly prospěch obě strany, a lidské vztahy se tak změnily z destruktivní konkurence na mírovou spolupráci. Právní rámce, doprava a peněžní systémy byly pozdějším vývojem, který tuto transformaci podpořil, ale nebyly hlavní příčinou přechodu od interakcí s nulovým součtem k interakcím s pozitivním součtem.
question: การพัฒนาทางประวัติศาสตร์ใดที่เปลี่ยนแปลงวิธีการที่มนุษย์สามารถสร้างความมั่งคั่งได้อย่างพื้นฐาน โดยเปลี่ยนจากการแข่งขันแบบผลรวมศูนย์ไปสู่ความสัมพันธ์ที่เป็นประโยชน์ร่วมกัน?
answer: การเกิดขึ้นของการเกษตรและการผลิตสาธารณูปโภคใหม่ที่สร้างความมั่งคั่งโดยไม่ทำลายทรัพยากรที่มีอยู่
wrong_answers:
  - การจัดตั้งกรอบกฎหมายระหว่างประเทศที่ควบคุมการค้าและป้องกันความขัดแย้งเกี่ยวกับทรัพยากรธรรมชาติ
  - การพัฒนาเทคโนโลยีการขนส่งที่ช่วยให้การกระจายทรัพยากรธรรมชาติที่มีอยู่มีประสิทธิภาพมากขึ้น
  - การสร้างระบบการเงินที่มาแทนที่การแลกเปลี่ยนสินค้าและทำให้การจัดสรรทรัพยากรมีความเท่าเทียมมากขึ้น
explanation: |
  บทนี้อธิบายว่าในประวัติศาสตร์มนุษย์ยุคแรก ผู้คนแข่งขันกันอย่างรุนแรงเพื่อแย่งชิงทรัพยากรธรรมชาติที่มีจำกัดซึ่งไม่มีใครผลิตขึ้น การเปลี่ยนแปลงพื้นฐานเกิดขึ้นเมื่อการเกษตรเกิดขึ้น สร้างความมั่งคั่งใหม่ผ่านการผลิตแทนการยึดครอง สิ่งนี้ทำให้เกิดการแลกเปลี่ยนโดยสมัครใจที่ทั้งสองฝ่ายได้รับประโยชน์ เปลี่ยนความสัมพันธ์ของมนุษย์จากการแข่งขันที่ทำลายล้างไปสู่ความร่วมมืออย่างสันติ กรอบกฎหมาย การขนส่ง และระบบการเงินเป็นการพัฒนาภายหลังที่สนับสนุนการเปลี่ยนแปลงนี้ แต่ไม่ใช่สาเหตุหลักของการเปลี่ยนแปลงจากปฏิสัมพันธ์แบบผลรวมศูนย์ไปสู่ผลรวมบวก
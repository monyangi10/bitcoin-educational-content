question: Mikä historiallinen kehitys muutti perustavanlaatuisesti ihmisten tapaa hankkia vaurautta siirtymällä nollasummakilpailusta molempia osapuolia hyödyttäviin suhteisiin?
answer: Maatalouden kehittyminen ja uusien hyödykkeiden tuotanto, jotka loivat vaurautta tuhoamatta olemassa olevia resursseja
wrong_answers:
  - Sellaisten kansainvälisten oikeudellisten puitteiden luominen, jotka säätelivät kauppaa ja estivät luonnonvaroja koskevia konflikteja
  - Kuljetusteknologian kehittäminen, joka mahdollisti nykyisten luonnonvarojen tehokkaamman jakelun
  - Rahajärjestelmien luominen, jotka korvasivat vaihtokaupan ja tekivät resurssien jakamisesta oikeudenmukaisempaa
explanation: |
  Luvussa kerrotaan, että ihmiskunnan varhaishistoriassa ihmiset kilpailivat väkivaltaisesti rajallisista luonnonvaroista, joita kukaan ei ollut tuottanut. Perusmuutos tapahtui, kun maanviljely syntyi, ja se loi uutta vaurautta pikemminkin tuottamalla kuin anastamalla. Tämä mahdollisti vapaaehtoisen vaihdon, jossa molemmat osapuolet hyötyivät, ja ihmissuhteet muuttuivat tuhoisasta kilpailusta rauhanomaiseksi yhteistyöksi. Oikeudelliset puitteet, liikenne ja rahajärjestelmät olivat myöhempiä kehityskulkuja, jotka tukivat tätä muutosta, mutta ne eivät olleet perimmäinen syy siirtymiseen nollasummavuorovaikutuksesta positiivisen summan vuorovaikutukseen.
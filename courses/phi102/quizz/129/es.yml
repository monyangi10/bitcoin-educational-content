question: ¿Qué acontecimiento histórico cambió fundamentalmente la forma en que los seres humanos podían adquirir riqueza, pasando de la competencia de suma cero a las relaciones mutuamente beneficiosas?
answer: La aparición de la agricultura y la producción de nuevas utilidades que crearon riqueza sin destruir los recursos existentes
wrong_answers:
  - El establecimiento de marcos jurídicos internacionales que regularan el comercio y evitaran conflictos por los recursos naturales
  - El desarrollo de tecnologías de transporte que permitieron una distribución más eficiente de los recursos naturales existentes
  - La creación de sistemas monetarios que sustituyeron al trueque e hicieron más equitativa la asignación de recursos
explanation: |
  El capítulo explica que en los primeros tiempos de la historia de la humanidad, las personas competían violentamente por unos recursos naturales limitados que nadie había producido. El cambio fundamental se produjo cuando surgió la agricultura, que creó nueva riqueza mediante la producción en lugar de la apropiación. Esto permitió intercambios voluntarios en los que ambas partes se beneficiaron, transformando las relaciones humanas de la competencia destructiva a la cooperación pacífica. Los marcos jurídicos, el transporte y los sistemas monetarios fueron desarrollos posteriores que apoyaron esta transformación, pero no fueron la causa fundamental del cambio de las interacciones de suma cero a las de suma positiva.
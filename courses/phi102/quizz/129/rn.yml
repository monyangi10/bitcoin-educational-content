question: Ni igiki cabaye muri kahise cahinduye cane ukuntu abantu bashobora kuronka ubutunzi, bakava ku guhiganwa ata co bamaze, bakaja ku migenderanire y’inyungu bose?
answer: Guseruka kw'uburimyi n'uguhingura ibikoresho bishasha vyatuma haba ubutunzi ata gusenyura ubutunzi bwariho .
wrong_answers:
  - Gushinga amategeko mpuzamakungu yatunganya ubudandaji no gukingira amakimbirane kubera ubutunzi bw'ibidukikije .
  - Guteza imbere ubuhinga bwo gutwara abantu n'ibintu bwatumye habaho ugukwiragiza neza ubutunzi bwariho .
  - Gushinga uburyo bw'amahera bwasubiriye uguhinduranya no gutuma ugutanga umutungo bigenda neza
explanation: |
  Ico kigabane kirasigura yuko mu ntango z’amateka y’abantu, abantu bariko barahiganwa bimwe bikomeye kugira ngo baronke ubutunzi bukeyi ata n’umwe yari yarabuvuyemwo. Ihinduka ry’ishimikiro ryabaye igihe uburimyi bwaza, bugatuma habaho ubutunzi bushasha biciye mu guhingura aho kwigarurira. Ivyo vyatumye habaho uguhanahana amakuru ku bushake aho abo bompi bavyungukirako, bihindura imigenderanire y’abantu kuva ku guhiganwa gusenyura gushika ku gukorana mu mahoro. Inzego z’amategeko, ivy’ugutwara abantu n’ibintu, n’uburyo bw’amahera ni vyo vyaje mu nyuma vyashigikiye iyo mpinduka ariko ntivyari vyo vyatumye habaho uguhinduka kuva ku migenderanire y’umubare zero gushika ku migenderanire y’umubare mwiza.
question: Jaki historyczny rozwój zasadniczo zmienił sposób, w jaki ludzie mogli zdobywać bogactwo, przechodząc od konkurencji o sumie zerowej do wzajemnie korzystnych relacji?
answer: Pojawienie się rolnictwa i produkcji nowych mediów, które tworzyły bogactwo bez niszczenia istniejących zasobów
wrong_answers:
  - Ustanowienie międzynarodowych ram prawnych, które regulowały handel i zapobiegały konfliktom o zasoby naturalne
  - Rozwój technologii transportowych, które pozwoliły na bardziej wydajną dystrybucję istniejących zasobów naturalnych
  - Stworzenie systemów monetarnych, które zastąpiły handel wymienny i uczyniły alokację zasobów bardziej sprawiedliwą
explanation: |
  Rozdział ten wyjaśnia, że we wczesnej historii ludzkości ludzie brutalnie rywalizowali o ograniczone zasoby naturalne, których nikt nie produkował. Zasadnicza zmiana nastąpiła, gdy pojawiło się rolnictwo, tworząc nowe bogactwo poprzez produkcję, a nie przywłaszczanie. Umożliwiło to dobrowolną wymianę, na której skorzystały obie strony, przekształcając relacje międzyludzkie z destrukcyjnej konkurencji w pokojową współpracę. Ramy prawne, transport i systemy monetarne były późniejszymi osiągnięciami, które wspierały tę transformację, ale nie były główną przyczyną przejścia od interakcji o sumie zerowej do interakcji o sumie dodatniej.
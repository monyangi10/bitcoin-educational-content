question: Quelle évolution historique a fondamentalement changé la manière dont les humains pouvaient acquérir des richesses, en passant d'une concurrence à somme nulle à des relations mutuellement bénéfiques ?
answer: L'émergence de l'agriculture et la production de nouvelles utilités qui ont créé de la richesse sans détruire les ressources existantes
wrong_answers:
  - La mise en place de cadres juridiques internationaux qui réglementent le commerce et préviennent les conflits liés aux ressources naturelles
  - Le développement de technologies de transport qui ont permis une distribution plus efficace des ressources naturelles existantes
  - La création de systèmes monétaires qui ont remplacé le troc et rendu l'allocation des ressources plus équitable
explanation: |
  Le chapitre explique qu'au début de l'histoire de l'humanité, les gens se disputaient violemment des ressources naturelles limitées que personne n'avait produites. Le changement fondamental s'est produit avec l'apparition de l'agriculture, qui a créé de nouvelles richesses par la production plutôt que par l'appropriation. Cela a permis des échanges volontaires dont les deux parties ont bénéficié, transformant les relations humaines d'une compétition destructrice en une coopération pacifique. Les cadres juridiques, les transports et les systèmes monétaires sont des développements ultérieurs qui ont soutenu cette transformation, mais qui ne sont pas à l'origine du passage d'interactions à somme nulle à des interactions à somme positive.
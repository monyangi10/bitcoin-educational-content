question: Vilken historisk utveckling förändrade i grunden hur människor kunde skaffa sig rikedomar, från nollsummespel till ömsesidigt fördelaktiga relationer?
answer: Uppkomsten av jordbruk och produktion av nya nyttigheter som skapade välstånd utan att förstöra befintliga resurser
wrong_answers:
  - Inrättandet av internationella regelverk som reglerade handeln och förhindrade konflikter om naturresurser
  - Utvecklingen av transportteknik som möjliggjorde en effektivare fördelning av befintliga naturresurser
  - Skapandet av monetära system som ersatte byteshandel och gjorde resursfördelningen mer rättvis
explanation: |
  I kapitlet förklaras att i människans tidiga historia tävlade människor våldsamt om begränsade naturresurser som ingen hade producerat. Den grundläggande förändringen skedde när jordbruket växte fram och skapade nya rikedomar genom produktion snarare än tillägnande. Detta möjliggjorde frivilliga utbyten där båda parter gynnades, vilket omvandlade mänskliga relationer från destruktiv konkurrens till fredligt samarbete. Juridiska ramverk, transporter och monetära system var senare utvecklingar som stödde denna omvandling men var inte grundorsaken till skiftet från nollsummespel till plussummespel.
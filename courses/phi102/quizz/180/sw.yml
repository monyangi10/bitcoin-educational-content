question: Kulingana na uchambuzi wa physiocrats, ni uwezo gani wa msingi ambao serikali haina wakati wa kujaribu kupanga uzalishaji na usambazaji wa kiuchumi?
answer: "'Jicho la bwana' - uwezo wa kutambua hali halisi ya kiuchumi ambayo watu binafsi pekee ndio wanao katika maisha yao ya kila siku"
wrong_answers:
  - Rasilimali za kifedha za kutosha kufadhili mipango mikubwa ya kiuchumi na mipango ya kuingilia kati
  - Mamlaka ya kisheria ya kutekeleza upendeleo wa uzalishaji na udhibiti wa bei katika sekta mbalimbali za kiuchumi
  - Utaalamu wa kiufundi katika mbinu za kilimo na michakato ya uzalishaji wa viwandani
explanation: |
  Wanafiziokrati walianzisha dhana ya 'l'œil du maître' (jicho la bwana) kuelezea kwa nini mipango ya serikali inashindwa. Hii inarejelea maarifa ya ndani na ya kina ambayo watendaji wa uchumi binafsi wana kuhusu hali zao mahususi, mahitaji, na fursa. Jimbo halina uelewa huu wa jumla wa vigezo tata vya kiuchumi kama vile mahitaji, usambazaji, rasilimali, na bei zinazofaa. Ingawa jimbo linaweza kuwa na rasilimali za kifedha, mamlaka ya kisheria, au maarifa ya kiufundi, haya hayawezi kuchukua nafasi ya akili iliyosambazwa inayojitokeza wakati watu huru wanapoitikia ishara za bei na hali ya soko kulingana na uzoefu wao wa moja kwa moja na maarifa ya ndani.
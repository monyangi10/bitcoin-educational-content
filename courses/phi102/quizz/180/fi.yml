question: Minkälainen perustavanlaatuinen kyky valtiolta puuttuu fysiokraattien analyysin mukaan, kun se yrittää organisoida taloudellista tuotantoa ja jakelua?
answer: "\"Mestarin silmä\" - kyky havaita taloudellisia realiteetteja, joita vain yksilöillä on jokapäiväisessä elämässään"
wrong_answers:
  - Riittävät taloudelliset resurssit laajamittaisen taloussuunnittelun ja interventio-ohjelmien rahoittamiseen
  - Oikeudelliset valtuudet valvoa tuotantokiintiöitä ja hintojen valvontaa eri talouden aloilla
  - Tekninen asiantuntemus maatalousmenetelmistä ja teollisista tuotantoprosesseista
explanation: |
  Fysiokraatit ottivat käyttöön käsitteen "l'œil du maître" (isännän silmä) selittääkseen, miksi valtiollinen suunnittelu epäonnistuu. Tällä viitataan siihen intiimiin ja yksityiskohtaiseen tietämykseen, joka yksittäisillä taloudellisilla toimijoilla on omista erityisolosuhteistaan, tarpeistaan ja mahdollisuuksistaan. Valtiolta puuttuu tämä yksityiskohtainen ymmärrys monimutkaisista taloudellisista muuttujista, kuten kysynnästä, tarjonnasta, resursseista ja asianmukaisesta hinnoittelusta. Vaikka valtiolla voi olla taloudellisia resursseja, oikeudellisia valtuuksia tai teknistä tietämystä, ne eivät voi korvata hajautettua älykkyyttä, joka syntyy, kun vapaat yksilöt reagoivat hintasignaaleihin ja markkinaolosuhteisiin välittömien kokemustensa ja paikallistuntemuksensa perusteella.
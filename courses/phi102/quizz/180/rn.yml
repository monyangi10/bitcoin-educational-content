question: Dushingiye ku nseguro y’aba physiocrates, ni ubuhe bushobozi bw’ishimikiro Leta ibura iyo igerageza gutunganya umusaruro n’ugukwiragiza ubutunzi?
answer: 'Ijisho rya shebuja' - ubushobozi bwo gutahura ibintu vy'ukuri vy'ubutunzi abantu bonyene bafise mu buzima bwabo bwa misi yose
wrong_answers:
  - Amafaranga ahagije yo gufasha mu gutegura ubutunzi ku rugero runini n'imigambi yo gufasha
  - Ububasha bushingiye ku mategeko bwo gushitsa imigabane y'umusaruro n'ugucungera ibiciro mu nzego zitandukanye z'ubutunzi
  - Ubuhinga mu buryo bw'uburimyi n'imigenderanire y'inganda
explanation: |
  Abanyabwenge b’ivy’umubiri bashizeho iciyumviro c’‘l’œil du maître’ (ijisho rya shebuja) kugira ngo basigure igituma igenamigambi rya Leta ridashobora gushika. Ivyo vyerekeye ubumenyi bwimbitse kandi burambuye abakozi b’ubutunzi ku giti cabo bafise ku bijanye n’ivyo bakeneye, ivyo bakeneye be n’amahirwe afise. Leta irabura ukwo gutahura gutomoye kw’ibintu bikomeye vy’ubutunzi nk’ivyo umuntu asaba, ivyo atanga, ubutunzi, n’ibiciro bikwiye. Naho Leta ishobora kuba ifise amafaranga, ububasha bushingiye ku mategeko canke ubumenyi mu vy’ubuhinga, ivyo ntibishobora gusubirira ubwenge busanzwe buza iyo abantu bidegemvya bishura ku bimenyetso vy’ibiciro n’imibereho y’isoko bishingiye ku bumenyi bwabo butaziguye no ku bumenyi bafise mu karere.
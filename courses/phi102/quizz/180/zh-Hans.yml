question: 根据重农主义者的分析，国家在试图组织经济生产和分配时缺乏什么基本能力？
answer: 大师之眼"--只有个人在日常生活中才具备的洞察经济现实的能力
wrong_answers:
  - 为大规模经济规划和干预计划提供充足的财政资源
  - 在不同经济部门实施生产配额和价格控制的法律权力
  - 农业方法和工业生产流程方面的技术专长
explanation: |
  重农主义者提出了 "主人之眼"（l'œil du maître）的概念，以解释国家计划为何会失败。这是指个体经济行为者对其特定环境、需求和机会的深入细致的了解。国家对需求、供应、资源和适当定价等复杂的经济变量缺乏这种细致入微的了解。虽然国家可能拥有财政资源、法律权威或技术知识，但这些都无法取代自由个体根据其直接经验和当地知识对价格信号和市场条件做出反应时所产生的分布式智慧。
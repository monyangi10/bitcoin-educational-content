question: Welk fundamenteel vermogen mist de staat volgens de analyse van de fysiocraten als het gaat om het organiseren van economische productie en distributie?
answer: Het 'oog van de meester' - het vermogen om economische realiteiten waar te nemen die alleen individuen in hun dagelijks leven bezitten
wrong_answers:
  - Voldoende financiële middelen om grootschalige economische planning en interventieprogramma's te financieren
  - Wettelijke bevoegdheid om productiequota en prijscontroles in verschillende economische sectoren af te dwingen
  - Technische expertise in landbouwmethoden en industriële productieprocessen
explanation: |
  De fysiocraten introduceerden het concept 'l'œil du maître' (het oog van de meester) om te verklaren waarom staatsplanning mislukt. Dit verwijst naar de intieme, gedetailleerde kennis die individuele economische actoren hebben over hun specifieke omstandigheden, behoeften en mogelijkheden. De staat ontbeert dit gedetailleerde inzicht in complexe economische variabelen zoals vraag, aanbod, middelen en de juiste prijsstelling. Hoewel de staat over financiële middelen, juridische autoriteit of technische kennis kan beschikken, kunnen deze niet in de plaats komen van de gedistribueerde intelligentie die ontstaat wanneer vrije individuen reageren op prijssignalen en marktomstandigheden op basis van hun directe ervaring en lokale kennis.
question: Zgodnie z analizą fizjokratów, jakiej fundamentalnej zdolności brakuje państwu, gdy próbuje zorganizować produkcję i dystrybucję ekonomiczną?
answer: "Oko mistrza" - zdolność postrzegania realiów gospodarczych, którą w codziennym życiu posiadają tylko jednostki
wrong_answers:
  - Wystarczające zasoby finansowe do sfinansowania zakrojonego na szeroką skalę planowania gospodarczego i programów interwencyjnych
  - Uprawnienia do egzekwowania kwot produkcyjnych i kontroli cen w różnych sektorach gospodarki
  - Wiedza techniczna w zakresie metod rolniczych i procesów produkcji przemysłowej
explanation: |
  Fizjokraci wprowadzili pojęcie "l'œil du maître" (oko mistrza), aby wyjaśnić, dlaczego planowanie państwowe zawodzi. Odnosi się to do intymnej, szczegółowej wiedzy, jaką poszczególne podmioty gospodarcze posiadają na temat swoich specyficznych okoliczności, potrzeb i możliwości. Państwo nie posiada tej szczegółowej wiedzy na temat złożonych zmiennych ekonomicznych, takich jak popyt, podaż, zasoby i odpowiednie ceny. Chociaż państwo może dysponować zasobami finansowymi, władzą prawną lub wiedzą techniczną, nie mogą one zastąpić rozproszonej inteligencji, która pojawia się, gdy wolne jednostki reagują na sygnały cenowe i warunki rynkowe w oparciu o ich bezpośrednie doświadczenie i wiedzę lokalną.
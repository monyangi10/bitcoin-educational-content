question: Prema analizi fiziokrata, koja fundamentalna sposobnost nedostaje državi kada pokušava da organizuje ekonomsku proizvodnju i distribuciju?
answer: "'Oko gospodara' - sposobnost da se uoče ekonomske stvarnosti koje samo pojedinci poseduju u svom svakodnevnom životu"
wrong_answers:
  - Dovoljna finansijska sredstva za finansiranje velikih ekonomskih planova i intervencionih programa
  - Pravna ovlašćenja za sprovođenje proizvodnih kvota i kontrole cena u različitim ekonomskim sektorima
  - Tehnička stručnost u poljoprivrednim metodama i procesima industrijske proizvodnje
explanation: |
  Fiziokrati su uveli koncept 'l'œil du maître' (oko gospodara) kako bi objasnili zašto državno planiranje ne uspeva. Ovo se odnosi na intimno, detaljno znanje koje pojedinačni ekonomski akteri imaju o svojim specifičnim okolnostima, potrebama i prilikama. Državi nedostaje ovo detaljno razumevanje složenih ekonomskih promenljivih kao što su potražnja, ponuda, resursi i odgovarajuće cene. Iako država može imati finansijske resurse, pravni autoritet ili tehničko znanje, oni ne mogu zameniti distribuiranu inteligenciju koja se javlja kada slobodni pojedinci reaguju na cenovne signale i tržišne uslove na osnovu svog direktnog iskustva i lokalnog znanja.
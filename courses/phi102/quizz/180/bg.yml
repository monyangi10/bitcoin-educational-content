question: Според анализа на физиократите каква основна способност липсва на държавата, когато се опитва да организира икономическото производство и разпределение?
answer: "Окото на майстора" - способността да се възприемат икономическите реалности, която само хората притежават в ежедневието си
wrong_answers:
  - Достатъчни финансови ресурси за финансиране на широкомащабни програми за икономическо планиране и интервенция
  - Правни правомощия за налагане на производствени квоти и контрол на цените в различни икономически сектори
  - Технически опит в областта на селскостопанските методи и промишлените производствени процеси
explanation: |
  Физиократите въвеждат концепцията за "окото на господаря", за да обяснят защо държавното планиране се проваля. Това се отнася до интимните, подробни познания, които отделните икономически субекти имат за своите специфични обстоятелства, нужди и възможности. Държавата не разполага с това детайлно разбиране на сложните икономически променливи като търсене, предлагане, ресурси и подходящо ценообразуване. Макар че държавата може да разполага с финансови ресурси, правна власт или технически познания, те не могат да заменят разпределената интелигентност, която се появява, когато свободните индивиди реагират на ценовите сигнали и пазарните условия въз основа на своя пряк опит и местни познания.
question: Fizyokratların analizine göre, devlet ekonomik üretim ve dağıtımı organize etmeye çalışırken hangi temel kabiliyetten yoksundur?
answer: 'Ustanın gözü' - sadece bireylerin günlük yaşamlarında sahip oldukları ekonomik gerçekleri algılama yeteneği
wrong_answers:
  - Büyük ölçekli ekonomik planlama ve müdahale programlarını finanse etmek için yeterli mali kaynak
  - Farklı ekonomik sektörlerde üretim kotaları ve fiyat kontrolleri uygulamak için yasal yetki
  - Tarımsal yöntemler ve endüstriyel üretim süreçlerinde teknik uzmanlık
explanation: |
  Fizyokratlar, devlet planlamasının neden başarısız olduğunu açıklamak için 'l'œil du maître' (ustanın gözü) kavramını ortaya atmışlardır. Bu kavram, bireysel ekonomik aktörlerin kendi özel koşulları, ihtiyaçları ve fırsatları hakkında sahip oldukları yakın ve detaylı bilgiyi ifade eder. Devlet, talep, arz, kaynaklar ve uygun fiyatlandırma gibi karmaşık ekonomik değişkenlere ilişkin bu ayrıntılı anlayıştan yoksundur. Devlet mali kaynaklara, yasal yetkiye veya teknik bilgiye sahip olsa da, bunlar özgür bireylerin doğrudan deneyimlerine ve yerel bilgilerine dayanarak fiyat sinyallerine ve piyasa koşullarına yanıt vermesiyle ortaya çıkan dağıtılmış zekanın yerini tutamaz.
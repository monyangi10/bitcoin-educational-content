question: Welche grundlegende Fähigkeit fehlt dem Staat nach der Analyse der Physiokraten, wenn er versucht, die wirtschaftliche Produktion und Verteilung zu organisieren?
answer: Das "Auge des Meisters" - die Fähigkeit, wirtschaftliche Realitäten wahrzunehmen, die nur der Einzelne in seinem täglichen Leben besitzt
wrong_answers:
  - Ausreichende finanzielle Mittel zur Finanzierung groß angelegter wirtschaftlicher Planungs- und Interventionsprogramme
  - Rechtliche Befugnis zur Durchsetzung von Produktionsquoten und Preiskontrollen in verschiedenen Wirtschaftszweigen
  - Technisches Fachwissen über landwirtschaftliche Methoden und industrielle Produktionsverfahren
explanation: |
  Die Physiokraten führten das Konzept des "l'œil du maître" (das Auge des Meisters) ein, um zu erklären, warum staatliche Planung scheitert. Damit ist das intime, detaillierte Wissen gemeint, das die einzelnen Wirtschaftsakteure über ihre spezifischen Umstände, Bedürfnisse und Möglichkeiten haben. Dem Staat fehlt dieses detaillierte Wissen über komplexe wirtschaftliche Variablen wie Nachfrage, Angebot, Ressourcen und angemessene Preisgestaltung. Der Staat mag zwar über finanzielle Mittel, rechtliche Befugnisse oder technisches Wissen verfügen, doch diese können die verteilte Intelligenz nicht ersetzen, die entsteht, wenn freie Individuen auf der Grundlage ihrer direkten Erfahrungen und lokalen Kenntnisse auf Preissignale und Marktbedingungen reagieren.
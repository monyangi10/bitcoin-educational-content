question: Hvilken grunnleggende evne mangler staten, ifølge fysiokratenes analyse, når den forsøker å organisere økonomisk produksjon og fordeling?
answer: "Mesterens øye" - evnen til å oppfatte økonomiske realiteter som bare enkeltpersoner har i sitt daglige liv
wrong_answers:
  - Tilstrekkelige økonomiske ressurser til å finansiere storskala økonomisk planlegging og intervensjonsprogrammer
  - Juridisk myndighet til å håndheve produksjonskvoter og priskontroller på tvers av ulike økonomiske sektorer
  - Teknisk ekspertise innen landbruksmetoder og industrielle produksjonsprosesser
explanation: |
  Fysiokratene introduserte begrepet "l'œil du maître" (mesterens øye) for å forklare hvorfor statlig planlegging mislykkes. Dette refererer til den intime, detaljerte kunnskapen som individuelle økonomiske aktører har om sine spesifikke omstendigheter, behov og muligheter. Staten mangler denne detaljerte forståelsen av komplekse økonomiske variabler som etterspørsel, tilbud, ressurser og riktig prising. Selv om staten kan ha økonomiske ressurser, juridisk autoritet eller teknisk kunnskap, kan ikke dette erstatte den distribuerte intelligensen som oppstår når frie individer reagerer på prissignaler og markedsforhold basert på sin direkte erfaring og lokalkunnskap.
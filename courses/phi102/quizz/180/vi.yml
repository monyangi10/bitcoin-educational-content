question: Theo phân tích của trường phái kinh tế trọng nông, nhà nước thiếu năng lực cơ bản nào khi cố gắng tổ chức sản xuất và phân phối kinh tế?
answer: "Con mắt của bậc thầy" - khả năng nhận thức thực tế kinh tế mà chỉ những cá nhân mới có được trong cuộc sống thường nhật.
wrong_answers:
  - Nguồn tài chính dồi dào để tài trợ cho các chương trình quy hoạch và can thiệp kinh tế quy mô lớn.
  - Cơ quan có thẩm quyền pháp lý để thực thi hạn ngạch sản xuất và kiểm soát giá cả trên các lĩnh vực kinh tế khác nhau.
  - Kiến thức chuyên môn về phương pháp canh tác và quy trình sản xuất công nghiệp
explanation: |
  Trường phái kinh tế trọng nông đã đưa ra khái niệm "l'œil du maître" (con mắt của người chủ) để giải thích lý do tại sao kế hoạch hóa nhà nước thất bại. Khái niệm này đề cập đến kiến thức sâu sắc, chi tiết mà các chủ thể kinh tế riêng lẻ có được về hoàn cảnh, nhu cầu và cơ hội cụ thể của họ. Nhà nước thiếu sự hiểu biết chi tiết này về các biến số kinh tế phức tạp như cung, cầu, nguồn lực và giá cả phù hợp. Mặc dù nhà nước có thể có nguồn lực tài chính, thẩm quyền pháp lý hoặc kiến thức kỹ thuật, nhưng những điều này không thể thay thế cho trí tuệ phân tán xuất hiện khi các cá nhân tự do phản ứng với tín hiệu giá cả và điều kiện thị trường dựa trên kinh nghiệm trực tiếp và kiến thức địa phương của họ.
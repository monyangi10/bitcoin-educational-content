question: Menurut analisis kaum fisiokrat, kemampuan fundamental apa yang tidak dimiliki negara ketika mencoba mengatur produksi dan distribusi ekonomi?
answer: 'Mata sang ahli' - kemampuan untuk melihat realitas ekonomi yang hanya dimiliki oleh individu dalam kehidupan sehari-hari mereka
wrong_answers:
  - Sumber daya keuangan yang memadai untuk mendanai program perencanaan dan intervensi ekonomi berskala besar
  - Otoritas hukum untuk menegakkan kuota produksi dan kontrol harga di berbagai sektor ekonomi
  - Keahlian teknis dalam metode pertanian dan proses produksi industri
explanation: |
  Kaum fisiokrat memperkenalkan konsep 'l'œil du maître' (mata tuan) untuk menjelaskan mengapa perencanaan negara gagal. Hal ini mengacu pada pengetahuan yang mendalam dan terperinci yang dimiliki oleh para pelaku ekonomi individu tentang keadaan, kebutuhan, dan peluang mereka. Negara tidak memiliki pemahaman yang detail tentang variabel ekonomi yang kompleks seperti permintaan, penawaran, sumber daya, dan harga yang tepat. Meskipun negara mungkin memiliki sumber daya keuangan, otoritas hukum, atau pengetahuan teknis, hal ini tidak dapat menggantikan kecerdasan terdistribusi yang muncul ketika individu-individu yang bebas merespons sinyal harga dan kondisi pasar berdasarkan pengalaman langsung dan pengetahuan lokal mereka.
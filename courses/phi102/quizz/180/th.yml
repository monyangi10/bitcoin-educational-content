question: ตามการวิเคราะห์ของนักเศรษฐศาสตร์ฟิสิโอแครต รัฐขาดความสามารถพื้นฐานอะไรเมื่อพยายามจัดระเบียบการผลิตและการกระจายทางเศรษฐกิจ?
answer: "'สายตาของเจ้านาย' - ความสามารถในการรับรู้ความเป็นจริงทางเศรษฐกิจที่มีเพียงบุคคลเท่านั้นที่มีในชีวิตประจำวันของพวกเขา"
wrong_answers:
  - ทรัพยากรทางการเงินที่เพียงพอสำหรับการวางแผนเศรษฐกิจขนาดใหญ่และโปรแกรมการแทรกแซง
  - อำนาจทางกฎหมายในการบังคับใช้โควตาการผลิตและการควบคุมราคาข้ามภาคเศรษฐกิจต่างๆ
  - ความเชี่ยวชาญทางเทคนิคในวิธีการเกษตรและกระบวนการผลิตในอุตสาหกรรม
explanation: |
  พวกฟีซิโอแครตได้แนะนำแนวคิด 'l'œil du maître' (สายตาของนาย) เพื่ออธิบายว่าทำไมการวางแผนของรัฐจึงล้มเหลว แนวคิดนี้หมายถึงความรู้ที่ละเอียดและใกล้ชิดที่นักเศรษฐกิจแต่ละคนมีเกี่ยวกับสถานการณ์ ความต้องการ และโอกาสเฉพาะของตน รัฐขาดความเข้าใจในรายละเอียดของตัวแปรทางเศรษฐกิจที่ซับซ้อน เช่น อุปสงค์ อุปทาน ทรัพยากร และการตั้งราคาที่เหมาะสม แม้ว่ารัฐอาจมีทรัพยากรทางการเงิน อำนาจทางกฎหมาย หรือความรู้ทางเทคนิค แต่สิ่งเหล่านี้ไม่สามารถทดแทนความฉลาดที่กระจายตัวออกไปได้ ซึ่งเกิดขึ้นเมื่อบุคคลที่มีอิสระตอบสนองต่อสัญญาณราคาและสภาพตลาดตามประสบการณ์ตรงและความรู้ท้องถิ่นของพวกเขา
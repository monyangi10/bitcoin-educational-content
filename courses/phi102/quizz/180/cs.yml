question: Jakou základní schopnost podle analýzy fyziokratů postrádá stát, když se snaží organizovat ekonomickou výrobu a distribuci?
answer: "\"Oko mistra\" - schopnost vnímat ekonomické skutečnosti, kterou mají pouze jednotlivci v každodenním životě"
wrong_answers:
  - Dostatečné finanční zdroje na financování rozsáhlého ekonomického plánování a intervenčních programů
  - Zákonná pravomoc prosazovat výrobní kvóty a cenové kontroly v různých hospodářských odvětvích
  - Technické znalosti zemědělských metod a průmyslových výrobních procesů
explanation: |
  Fyziokraté zavedli pojem "l'œil du maître" (oko pána), aby vysvětlili, proč státní plánování selhává. Ten odkazuje na důvěrné, detailní znalosti, které mají jednotlivé ekonomické subjekty o svých specifických podmínkách, potřebách a možnostech. Stát tuto detailní znalost složitých ekonomických proměnných, jako je poptávka, nabídka, zdroje a vhodné ceny, postrádá. Stát sice může mít finanční zdroje, právní autoritu nebo technické znalosti, ty však nemohou nahradit distribuovanou inteligenci, která vzniká, když svobodní jednotlivci reagují na cenové signály a tržní podmínky na základě svých přímých zkušeností a místních znalostí.
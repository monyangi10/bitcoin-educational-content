question: 물리학자들의 분석에 따르면, 국가가 경제적 생산과 분배를 조직하려고 할 때 부족한 근본적인 능력은 무엇일까요?
answer: "'마스터의 눈' - 개인만이 일상에서 가지고 있는 경제 현실을 인식하는 능력"
wrong_answers:
  - 대규모 경제 계획 및 개입 프로그램에 자금을 지원할 수 있는 충분한 재원 확보
  - 다양한 경제 부문에서 생산 쿼터 및 가격 통제를 시행할 수 있는 법적 권한 부여
  - 농업 방법 및 산업 생산 공정에 대한 기술 전문성
explanation: |
  경제학자들은 국가 계획이 실패하는 이유를 설명하기 위해 '주인의 눈'(l'œil du maître)이라는 개념을 도입했습니다. 이는 개별 경제 주체들이 자신의 특정 상황, 필요, 기회에 대해 가지고 있는 친밀하고 상세한 지식을 의미합니다. 국가는 수요, 공급, 자원, 적절한 가격 책정 등 복잡한 경제 변수에 대한 이러한 세부적인 이해가 부족합니다. 국가가 재정 자원, 법적 권한 또는 기술 지식을 보유하고 있을 수는 있지만, 이는 자유로운 개인이 직접적인 경험과 현지 지식을 바탕으로 가격 신호와 시장 상황에 대응할 때 나타나는 분산된 지능을 대체할 수 없습니다.
question: Según el análisis de los fisiócratas, ¿de qué capacidad fundamental carece el Estado cuando intenta organizar la producción y la distribución económicas?
answer: El "ojo del amo": la capacidad de percibir realidades económicas que sólo poseen los individuos en su vida cotidiana
wrong_answers:
  - Recursos financieros suficientes para financiar programas de planificación e intervención económica a gran escala
  - Autoridad legal para imponer cuotas de producción y controles de precios en los distintos sectores económicos
  - Conocimientos técnicos sobre métodos agrícolas y procesos de producción industrial
explanation: |
  Los fisiócratas introdujeron el concepto de "l'œil du maître" (el ojo del amo) para explicar por qué fracasa la planificación estatal. Se refiere al conocimiento íntimo y detallado que tienen los agentes económicos individuales de sus circunstancias, necesidades y oportunidades específicas. El Estado carece de este conocimiento granular de variables económicas complejas como la demanda, la oferta, los recursos y la fijación de precios adecuados. Aunque el Estado disponga de recursos financieros, autoridad jurídica o conocimientos técnicos, éstos no pueden sustituir a la inteligencia distribuida que surge cuando individuos libres responden a las señales de precios y a las condiciones del mercado basándose en su experiencia directa y en su conocimiento local.
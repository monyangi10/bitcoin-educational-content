question: Milline põhiline võime puudub riigil füsiokraatide analüüsi kohaselt, kui ta püüab korraldada majanduslikku tootmist ja jaotamist?
answer: "\"peremehe silm\" - võime tajuda majanduslikku tegelikkust, mida ainult üksikisikud omavad oma igapäevaelus"
wrong_answers:
  - Piisavad rahalised vahendid laiaulatusliku majandusplaneerimise ja sekkumisprogrammide rahastamiseks
  - Õiguslikud volitused tootmiskvootide ja hinnakontrolli kehtestamiseks erinevates majandussektorites
  - Tehnilised teadmised põllumajandusmeetoditest ja tööstuslikest tootmisprotsessidest
explanation: |
  Füsiokraadid võtsid kasutusele mõiste "l'œil du maître" (peremehe silm), et selgitada, miks riigi planeerimine ebaõnnestub. See viitab intiimsetele, üksikasjalikele teadmistele, mida üksikud majanduses osalejad omavad oma konkreetsete asjaolude, vajaduste ja võimaluste kohta. Riigil puudub selline üksikasjalik arusaam keerulistest majanduslikest muutujatest, nagu nõudlus, pakkumine, ressursid ja asjakohane hinnakujundus. Kuigi riigil võivad olla rahalised vahendid, õiguslikud volitused või tehnilised teadmised, ei saa need asendada hajutatud intelligentsust, mis tekib siis, kui vabad inimesed reageerivad hinnasignaalidele ja turutingimustele oma otseste kogemuste ja kohalike teadmiste põhjal.
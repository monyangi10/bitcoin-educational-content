question: Secondo l'analisi dei fisiocratici, quale capacità fondamentale manca allo Stato quando cerca di organizzare la produzione e la distribuzione economica?
answer: L'"occhio del padrone": la capacità di percepire le realtà economiche che solo gli individui possiedono nella loro vita quotidiana
wrong_answers:
  - Risorse finanziarie sufficienti per finanziare programmi di pianificazione economica e di intervento su larga scala
  - Autorità legale per l'applicazione di quote di produzione e controlli sui prezzi in diversi settori economici
  - Competenza tecnica nei metodi agricoli e nei processi di produzione industriale
explanation: |
  I fisiocratici hanno introdotto il concetto di "l'œil du maître" (l'occhio del padrone) per spiegare perché la pianificazione statale fallisce. Si tratta della conoscenza intima e dettagliata che i singoli attori economici hanno delle loro specifiche circostanze, necessità e opportunità. Allo Stato manca questa comprensione granulare di variabili economiche complesse come la domanda, l'offerta, le risorse e la determinazione dei prezzi. Anche se lo Stato può disporre di risorse finanziarie, autorità legale o conoscenze tecniche, queste non possono sostituire l'intelligenza distribuita che emerge quando gli individui liberi rispondono ai segnali di prezzo e alle condizioni di mercato sulla base della loro esperienza diretta e delle loro conoscenze locali.
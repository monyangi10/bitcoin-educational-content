question: De acordo com a análise dos fisiocratas, que capacidade fundamental falta ao Estado quando tenta organizar a produção e a distribuição económicas?
answer: O "olho do mestre" - a capacidade de perceber realidades económicas que só os indivíduos possuem na sua vida quotidiana
wrong_answers:
  - Recursos financeiros suficientes para financiar programas de planeamento económico e de intervenção em grande escala
  - Autoridade jurídica para impor quotas de produção e controlos de preços em diferentes sectores económicos
  - Conhecimentos técnicos sobre métodos agrícolas e processos de produção industrial
explanation: |
  Os fisiocratas introduziram o conceito de "l'œil du maître" (o olho do mestre) para explicar o fracasso do planeamento estatal. Este conceito refere-se ao conhecimento íntimo e detalhado que os agentes económicos individuais têm sobre as suas circunstâncias, necessidades e oportunidades específicas. O Estado não tem este conhecimento granular de variáveis económicas complexas como a procura, a oferta, os recursos e os preços adequados. Embora o Estado possa ter recursos financeiros, autoridade jurídica ou conhecimentos técnicos, estes não podem substituir a inteligência distribuída que surge quando indivíduos livres respondem aos sinais de preços e às condições de mercado com base na sua experiência direta e nos seus conhecimentos locais.
question: フィジオクラートの分析によれば、経済的生産と分配を組織化しようとするとき、国家にはどのような基本的能力が欠けているのだろうか？
answer: 達人の目」-日常生活で個人だけが持っている経済的現実を見抜く能力
wrong_answers:
  - 大規模な経済計画と介入プログラムに資金を供給する十分な財源
  - 異なる経済部門にまたがる生産割当と価格統制を実施する法的権限
  - 農法および工業生産プロセスに関する技術的専門知識
explanation: |
  フィジオクラットは、国家計画が失敗する理由を説明するために、「主人の目（l'œil du maître）」という概念を導入した。これは、個々の経済主体がそれぞれの状況、ニーズ、機会について持っている親密で詳細な知識のことである。国家には、需要、供給、資源、適切な価格設定といった複雑な経済変動要因に対するこのような緻密な理解が欠けている。国家は財源や法的権限、技術的知識を持っているかもしれないが、自由な個人が直接の経験や地域の知識に基づいて価格シグナルや市場の状況に反応するときに生まれる分散型インテリジェンスに取って代わることはできない。
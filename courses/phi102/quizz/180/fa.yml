question: بر اساس تحلیل فیزیوکرات‌ها، دولت در هنگام تلاش برای سازماندهی تولید و توزیع اقتصادی چه قابلیت بنیادی‌ای را ندارد؟
answer: «چشم استاد» - توانایی درک واقعیت‌های اقتصادی که تنها افراد در زندگی روزمره خود دارند
wrong_answers:
  - منابع مالی کافی برای تأمین مالی برنامه‌ریزی اقتصادی در مقیاس بزرگ و برنامه‌های مداخله‌ای
  - اختیار قانونی برای اجرای سهمیه‌های تولید و کنترل قیمت‌ها در بخش‌های مختلف اقتصادی
  - تخصص فنی در روش‌های کشاورزی و فرآیندهای تولید صنعتی
explanation: |
  فیزیوکرات‌ها مفهوم 'l'œil du maître' (چشم استاد) را برای توضیح اینکه چرا برنامه‌ریزی دولتی شکست می‌خورد، معرفی کردند. این مفهوم به دانش دقیق و جزئی اشاره دارد که بازیگران اقتصادی فردی درباره شرایط خاص، نیازها و فرصت‌های خود دارند. دولت فاقد این درک جزئی از متغیرهای پیچیده اقتصادی مانند تقاضا، عرضه، منابع و قیمت‌گذاری مناسب است. در حالی که دولت ممکن است منابع مالی، قدرت قانونی یا دانش فنی داشته باشد، این‌ها نمی‌توانند جایگزین هوش توزیع‌شده‌ای شوند که زمانی پدیدار می‌شود که افراد آزاد به سیگنال‌های قیمتی و شرایط بازار بر اساس تجربه مستقیم و دانش محلی خود پاسخ می‌دهند.
question: Enligt fysiokraternas analys, vilken grundläggande förmåga saknar staten när den försöker organisera ekonomisk produktion och distribution?
answer: "\"Mästarens öga\" - förmågan att uppfatta ekonomiska realiteter som endast enskilda personer har i sitt dagliga liv"
wrong_answers:
  - Tillräckliga finansiella resurser för att finansiera storskalig ekonomisk planering och interventionsprogram
  - Laglig befogenhet att genomdriva produktionskvoter och priskontroller inom olika ekonomiska sektorer
  - Teknisk expertis inom jordbruksmetoder och industriella produktionsprocesser
explanation: |
  Fysiokraterna introducerade begreppet "l'œil du maître" (mästarens öga) för att förklara varför den statliga planeringen misslyckas. Med detta menas den intima och detaljerade kunskap som enskilda ekonomiska aktörer har om sina specifika omständigheter, behov och möjligheter. Staten saknar denna detaljerade förståelse för komplexa ekonomiska variabler som efterfrågan, utbud, resurser och lämplig prissättning. Även om staten kan ha finansiella resurser, juridisk auktoritet eller teknisk kunskap kan dessa inte ersätta den distribuerade intelligens som uppstår när fria individer reagerar på prissignaler och marknadsförhållanden baserat på deras direkta erfarenhet och lokala kunskap.
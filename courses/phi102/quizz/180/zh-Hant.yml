question: 根據理論派的分析，國家在嘗試組織經濟生產和分配時，缺乏什麼基本能力？
answer: 大師之眼」 - 只有個人在日常生活中才具備的感知經濟現實的能力
wrong_answers:
  - 有足夠的財政資源資助大規模的經濟規劃和干預計畫
  - 在不同經濟部門執行生產配額和價格控制的法律權力
  - 農業方法和工業生產流程方面的專業技術知識
explanation: |
  理論家提出「主宰者的眼睛」(l'œil du maître)的概念，以解釋國家規劃失敗的原因。這指的是個別經濟行動者對其特定環境、需求和機會所擁有的親密、詳細的知識。國家對於需求、供給、資源和適當定價等複雜的經濟變數缺乏這種細微的瞭解。雖然國家可能擁有財政資源、法律權力或技術知識，但這些都無法取代分散式智慧，而分散式智慧是自由的個人根據其直接經驗和當地知識對價格訊號和市場條件做出反應時所產生的。
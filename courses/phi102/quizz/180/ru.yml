question: Согласно анализу физиократов, какой фундаментальной способности не хватает государству при попытке организовать экономическое производство и распределение?
answer: Глаз мастера" - способность воспринимать экономические реалии, которой обладают только отдельные люди в своей повседневной жизни
wrong_answers:
  - Достаточные финансовые ресурсы для финансирования масштабных программ экономического планирования и вмешательства
  - Юридические полномочия по обеспечению соблюдения производственных квот и контроля цен в различных секторах экономики
  - Технические знания в области методов ведения сельского хозяйства и процессов промышленного производства
explanation: |
  Физиократы ввели понятие "l'œil du maître" ("глаз мастера"), чтобы объяснить, почему государственное планирование терпит неудачу. Речь идет об интимном, детальном знании отдельными экономическими субъектами своих конкретных обстоятельств, потребностей и возможностей. Государству не хватает такого детального понимания сложных экономических переменных, таких как спрос, предложение, ресурсы и соответствующее ценообразование. Хотя у государства могут быть финансовые ресурсы, юридические полномочия или технические знания, они не могут заменить распределенный интеллект, возникающий, когда свободные люди реагируют на ценовые сигналы и рыночные условия, основываясь на своем непосредственном опыте и местных знаниях.
question: ¿Cuál fue el principal factor que impidió el desarrollo de la libertad individual en las sociedades prehistóricas?
answer: Debilidad extrema de la capacidad productiva limitada a la caza, la pesca y la recolección
wrong_answers:
  - Falta de leyes escritas y estructuras de gobierno formales para proteger los derechos individuales
  - Creencias religiosas que primaban el culto colectivo sobre la libertad espiritual personal
  - Aislamiento geográfico que impidió el contacto con civilizaciones más avanzadas
explanation: |
  La respuesta correcta identifica la limitación material fundamental que hacía imposible la libertad individual en la prehistoria. La capacidad productiva extremadamente limitada significaba que la supervivencia dependía enteramente del esfuerzo colectivo y de la sumisión a las reglas del grupo. Sin la capacidad de producir de forma independiente, los individuos no podían ejercer la autopropiedad ni la autonomía personal. Las respuestas erróneas se centran en factores políticos, religiosos o geográficos, pero éstos pasan por alto la realidad económica fundamental que subrayaron los pensadores liberales: las condiciones materiales deben apoyar la libertad antes de que pueda ejercerse en la práctica.
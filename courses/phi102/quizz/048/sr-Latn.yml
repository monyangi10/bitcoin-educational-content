question: Koji je bio primarni faktor koji je sprečavao razvoj individualne slobode u praistorijskim društvima?
answer: Ekstremna slabost proizvodnih kapaciteta ograničena na lov, ribolov i sakupljanje
wrong_answers:
  - Nedostatak pisanih zakona i formalnih vladinih struktura za zaštitu individualnih prava
  - Religijska uverenja koja su naglašavala kolektivno obožavanje nad ličnom duhovnom slobodom
  - Geografska izolacija koja je sprečila kontakt sa naprednijim civilizacijama
explanation: |
  Tačan odgovor identifikuje osnovno materijalno ograničenje koje je činilo individualnu slobodu nemogućom u praistorijskim vremenima. Izuzetno ograničeni proizvodni kapacitet značio je da je opstanak u potpunosti zavisio od kolektivnog napora i pokoravanja pravilima grupe. Bez sposobnosti da proizvode nezavisno, pojedinci nisu mogli ostvariti samovlasništvo ili ličnu autonomiju. Pogrešni odgovori se fokusiraju na političke, verske ili geografske faktore, ali oni propuštaju suštinsku ekonomsku stvarnost na koju su liberalni mislioci ukazivali: materijalni uslovi moraju podržavati slobodu pre nego što se ona može praktično ostvariti.
question: Vilken var den främsta faktorn som hindrade utvecklingen av individuell frihet i förhistoriska samhällen?
answer: Extremt svag produktionskapacitet begränsad till jakt, fiske och samlande
wrong_answers:
  - Avsaknad av skrivna lagar och formella myndighetsstrukturer för att skydda individuella rättigheter
  - Religiösa övertygelser som betonade kollektiva gudstjänster framför personlig andlig frihet
  - Geografisk isolering som förhindrade kontakt med mer avancerade civilisationer
explanation: |
  Det rätta svaret identifierar den grundläggande materiella begränsning som gjorde individuell frihet omöjlig under förhistorisk tid. Den extremt begränsade produktionskapaciteten innebar att överlevnaden var helt beroende av kollektiva ansträngningar och underkastelse under gruppens regler. Utan förmåga att producera självständigt kunde individer inte utöva självägande eller personlig autonomi. De felaktiga svaren fokuserar på politiska, religiösa eller geografiska faktorer, men dessa missar den grundläggande ekonomiska verklighet som liberala tänkare betonade: materiella förhållanden måste stödja friheten innan den kan utövas i praktiken.
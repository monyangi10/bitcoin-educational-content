question: Hva var den viktigste faktoren som hindret utviklingen av individuell frihet i forhistoriske samfunn?
answer: Ekstremt svak produksjonskapasitet begrenset til jakt, fiske og sanking
wrong_answers:
  - Mangel på skrevne lover og formelle myndighetsstrukturer for å beskytte individuelle rettigheter
  - Religiøs tro som vektla kollektiv tilbedelse fremfor personlig åndelig frihet
  - Geografisk isolasjon som forhindret kontakt med mer avanserte sivilisasjoner
explanation: |
  Det riktige svaret identifiserer den grunnleggende materielle begrensningen som gjorde individuell frihet umulig i forhistorisk tid. Den ekstremt begrensede produksjonskapasiteten gjorde at overlevelse var helt avhengig av kollektiv innsats og underkastelse under gruppens regler. Uten muligheten til å produsere på egen hånd kunne ikke individet utøve selveierskap eller personlig autonomi. De gale svarene fokuserer på politiske, religiøse eller geografiske faktorer, men disse går glipp av den sentrale økonomiske realiteten som liberale tenkere la vekt på: Materielle forhold må støtte opp under friheten før den kan utøves i praksis.
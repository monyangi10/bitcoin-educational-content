question: 阻碍史前社会个人自由发展的主要因素是什么？
answer: 生产能力极其薄弱，仅限于狩猎、捕鱼和采集
wrong_answers:
  - 缺乏成文法和正式的政府机构来保护个人权利
  - 强调集体礼拜而非个人精神自由的宗教信仰
  - 与世隔绝的地理位置阻碍了与更先进文明的接触
explanation: |
  正确答案指出了史前时代使个人自由成为不可能的基本物质限制。极其有限的生产能力意味着生存完全依赖于集体努力和服从群体规则。没有独立生产的能力，个人就无法行使自我所有权或个人自主权。错误答案集中在政治、宗教或地理因素上，但这些都忽略了自由主义思想家所强调的核心经济现实：在实际行使自由之前，物质条件必须支持自由。
question: 阻止史前社會個人自由發展的主要因素是什麼？
answer: 生產力極度薄弱，僅限於狩獵、捕魚和採集
wrong_answers:
  - 缺乏成文法和正式的政府架構來保護個人權利
  - 強調集體崇拜而非個人靈性自由的宗教信仰
  - 地理隔絕，無法與更先進的文明接觸
explanation: |
  正確答案指出了史前時代不可能實現個人自由的基本物質限制。極度有限的生產能力意味著生存完全取決於集體努力和服從於團體規則。如果沒有獨立生產的能力，個人就無法行使自我所有權或個人自主權。錯誤的答案著重於政治、宗教或地理因素，但這些都忽略了自由主義思想家所強調的核心經濟現實：在實際行使自由之前，物質條件必須支持自由。
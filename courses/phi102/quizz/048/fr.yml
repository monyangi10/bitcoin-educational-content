question: Quel est le principal facteur qui a empêché le développement de la liberté individuelle dans les sociétés préhistoriques ?
answer: Extrême faiblesse de la capacité de production limitée à la chasse, à la pêche et à la cueillette
wrong_answers:
  - Absence de lois écrites et de structures gouvernementales formelles pour protéger les droits individuels
  - Des croyances religieuses qui mettent l'accent sur le culte collectif plutôt que sur la liberté spirituelle personnelle
  - L'isolement géographique qui a empêché tout contact avec des civilisations plus avancées
explanation: |
  La bonne réponse identifie la contrainte matérielle fondamentale qui a rendu la liberté individuelle impossible à l'époque préhistorique. La capacité de production extrêmement limitée signifiait que la survie dépendait entièrement de l'effort collectif et de la soumission aux règles du groupe. Sans la capacité de produire de manière indépendante, les individus ne pouvaient pas exercer leur droit de propriété ou leur autonomie personnelle. Les mauvaises réponses mettent l'accent sur les facteurs politiques, religieux ou géographiques, mais elles ne tiennent pas compte de la réalité économique fondamentale sur laquelle les penseurs libéraux ont insisté : les conditions matérielles doivent soutenir la liberté avant qu'elle puisse être exercée de manière pratique.
question: Co bylo hlavním faktorem, který bránil rozvoji individuální svobody v prehistorických společnostech?
answer: Extrémně slabá produkční schopnost omezená na lov, rybolov a sběr
wrong_answers:
  - Nedostatek psaných zákonů a formálních vládních struktur na ochranu individuálních práv
  - Náboženská víra, která kladla důraz na kolektivní uctívání před osobní duchovní svobodou
  - Geografická izolace, která bránila kontaktu s vyspělejšími civilizacemi
explanation: |
  Správná odpověď označuje základní materiální omezení, které v pravěku znemožňovalo svobodu jednotlivce. Extrémně omezená výrobní kapacita znamenala, že přežití záviselo výhradně na kolektivním úsilí a podřízení se skupinovým pravidlům. Bez schopnosti samostatně vyrábět nemohli jednotlivci uplatňovat své vlastní vlastnictví ani osobní autonomii. Špatné odpovědi se zaměřují na politické, náboženské nebo geografické faktory, ale ty opomíjejí základní ekonomickou realitu, kterou liberální myslitelé zdůrazňovali: materiální podmínky musí podporovat svobodu, aby mohla být prakticky uplatňována.
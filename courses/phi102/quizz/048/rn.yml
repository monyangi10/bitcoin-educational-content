question: Ni igiki nyamukuru catumye umwidegemvyo w’umuntu ku giti ciwe udatera imbere mu mibano y’imbere y’amateka?
answer: Intege nke nyinshi cane z’ubushobozi bwo gutanga umusaruro zigarukira ku guhigira, kuroba no kwegeranya
wrong_answers:
  - Kubura amategeko yanditse n'inzego za Leta zisanzwe zo kurinda uburenganzira bw'umuntu ku giti ciwe .
  - Ivyizerwa vy’idini vyashimika ku gusenga hamwe kuruta umwidegemvyo wo mu vy’impwemu w’umuntu ku giti ciwe .
  - Ukwitandukanya n'abandi kwatuma umuntu adashobora guhura n'abantu bateye imbere cane
explanation: |
  Inyishu ibereye irerekana ikintu nyamukuru co mu vy’umubiri catuma umwidegemvyo w’umuntu ku giti ciwe udashoboka mu bihe vy’imbere y’amateka. Ubushobozi bwo gutanga umusaruro bwari buke cane bwasobanura ko ukurokoka kwavana gusa n’utwigoro twose hamwe no kuyoboka amategeko y’imigwi. Iyo abantu batagira ubushobozi bwo kwivyara bigenjeje neza, ntibashobora kwigira canke kwigenga. Inyishu zitari zo zishimika ku bintu vya politike, ivy’idini canke ivy’aho umuntu aba, ariko ivyo birabura ukuri kw’ubutunzi kw’abanyabwenge b’abanyagihugu bashimikiyeko: ivy’umubiri bitegerezwa gushigikira umwidegemvyo imbere y’uko ushobora gukoreshwa mu buryo ngirakamaro.
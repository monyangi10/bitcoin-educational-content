question: What was the primary factor that prevented the development of individual freedom in prehistoric societies?
answer: Extreme weakness of productive capacity limited to hunting, fishing, and gathering
wrong_answers:
  - Lack of written laws and formal government structures to protect individual rights
  - Religious beliefs that emphasized collective worship over personal spiritual freedom
  - Geographic isolation that prevented contact with more advanced civilizations
explanation: |
  The correct answer identifies the fundamental material constraint that made individual freedom impossible in prehistoric times. The extremely limited productive capacity meant that survival depended entirely on collective effort and submission to group rules. Without the ability to produce independently, individuals could not exercise self-ownership or personal autonomy. The wrong answers focus on political, religious, or geographical factors, but these miss the core economic reality that liberal thinkers emphasized: material conditions must support freedom before it can be practically exercised.
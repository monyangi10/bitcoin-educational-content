question: Кой е бил основният фактор, който е възпрепятствал развитието на индивидуалната свобода в праисторическите общества?
answer: Изключителна слабост на производствения капацитет, ограничен до лов, риболов и събирателство
wrong_answers:
  - Липса на писани закони и официални държавни структури за защита на индивидуалните права
  - Религиозни вярвания, които поставят акцент върху колективното поклонение пред личната духовна свобода
  - Географска изолация, която е възпрепятствала контактите с по-напреднали цивилизации
explanation: |
  Правилният отговор посочва основното материално ограничение, което прави индивидуалната свобода невъзможна в праисторически времена. Изключително ограниченият производствен капацитет е означавал, че оцеляването е зависело изцяло от колективните усилия и подчинението на груповите правила. Без възможност за самостоятелно производство индивидите не са могли да упражняват самостоятелна собственост или лична автономия. Грешните отговори се фокусират върху политически, религиозни или географски фактори, но те пропускат основната икономическа реалност, на която либералните мислители наблягат: материалните условия трябва да подкрепят свободата, преди тя да може да бъде практически упражнявана.
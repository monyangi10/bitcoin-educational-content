question: Согласно анализу экономического либерализма Ива Гийо, что в первую очередь побуждает изобретателей к поиску новых комбинаций и решений?
answer: Стремление к личному удовлетворению тела и духа через полезные действия
wrong_answers:
  - Стремление служить коллективным социальным интересам, определяемым государственными органами
  - Обязанность следовать заранее установленным правилам и сложившимся профессиональным традициям
  - Необходимость сохранения существующих методов производства и сохранения социальной стабильности
explanation: |
  Ив Гийо подчеркивал, что изобретателями движет стремление к личному удовлетворению тела и духа, что, естественно, заставляет их по-разному организовывать свою деятельность и находить новые комбинации. Эта эгоистичная мотивация к самореализации парадоксальным образом служит обществу, создавая полезные инновации. Неправильные ответы отражают характеристики государственных систем, которые на самом деле препятствуют инновациям: следование заранее установленным правилам, служение коллективным интересам или сохранение существующих методов - все это представляет собой тип жестких структур, препятствующих творческому решению проблем, которое движет прогрессом в свободных обществах.
question: Според анализа на икономическия либерализъм, направен от Ив Гийо, какво основно мотивира изобретателите да търсят нови комбинации и решения?
answer: Стремежът към лично удовлетворение на тялото и духа чрез полезни действия
wrong_answers:
  - Желанието да се обслужват колективни социални интереси, определени от държавните органи
  - Задължението да се спазват предварително определени правила и установени професионални традиции
  - Необходимостта да се запазят съществуващите производствени методи и да се съхрани социалната стабилност
explanation: |
  Ив Гийо подчерта, че изобретателите са водени от стремежа си към лично удовлетворение за тялото и духа, което естествено ги кара да организират дейностите си по различен начин и да намират нови комбинации. Тази егоистична мотивация за лична удовлетвореност парадоксално служи на обществото, като създава полезни иновации. Неправилните отговори отразяват характеристиките на контролираните от държавата системи, които всъщност възпрепятстват иновациите - следването на предварително определени правила, обслужването на колективно дефинирани интереси или поддържането на съществуващите методи - всички те представляват вид закостенели структури, които възпрепятстват творческото решаване на проблеми, стимулиращо прогреса в свободните общества.
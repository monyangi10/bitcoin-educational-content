question: Yves Guyot' majandusliberaalsuse analüüsi kohaselt, mis motiveerib leiutajaid eelkõige uute kombinatsioonide ja lahenduste otsimiseks?
answer: Isikliku rahulduse otsimine nii kehale kui ka vaimule kasuliku tegevuse kaudu
wrong_answers:
  - Soov teenida valitsuse poolt määratletud kollektiivseid sotsiaalseid huve
  - Kohustus järgida etteantud eeskirju ja väljakujunenud ametialaseid traditsioone
  - Vajadus säilitada olemasolevad tootmismeetodid ja säilitada sotsiaalne stabiilsus
explanation: |
  Yves Guyot rõhutas, et leiutajad on ajendatud isikliku rahulduse otsimisest nii kehale kui ka vaimule, mis loomulikult viib neid oma tegevusi teisiti korraldama ja uusi kombinatsioone leidma. See isiklikuks rahulduseks mõeldud omakasupüüdlik motivatsioon teenib paradoksaalselt ühiskonda, luues kasulikke uuendusi. Valed vastused peegeldavad riigi poolt kontrollitud süsteemide omadusi, mis tegelikult takistavad innovatsiooni - etteantud reeglite järgimine, kollektiivselt määratletud huvide teenimine või olemasolevate meetodite säilitamine esindavad kõik selliseid jäiku struktuure, mis takistavad loomingulist probleemide lahendamist, mis on vabades ühiskondades edasimineku mootoriks.
question: Theo phân tích của Yves Guyot về chủ nghĩa tự do kinh tế, điều gì chủ yếu thúc đẩy các nhà phát minh theo đuổi những sự kết hợp và giải pháp mới?
answer: Theo đuổi sự thỏa mãn cá nhân về cả thể chất lẫn tinh thần thông qua những hành động hữu ích.
wrong_answers:
  - Mong muốn phục vụ lợi ích xã hội tập thể do chính quyền xác định.
  - Nghĩa vụ tuân thủ các quy định đã được xác định trước và các truyền thống nghề nghiệp đã được thiết lập.
  - Nhu cầu duy trì các phương thức sản xuất hiện có và bảo vệ sự ổn định xã hội.
explanation: |
  Yves Guyot nhấn mạnh rằng các nhà phát minh được thúc đẩy bởi việc theo đuổi sự thỏa mãn cá nhân cả về thể chất lẫn tinh thần, điều này tự nhiên dẫn họ đến việc tổ chức các hoạt động của mình theo những cách khác nhau và tìm ra những sự kết hợp mới. Động lực vị kỷ hướng đến sự thỏa mãn cá nhân này, một cách nghịch lý, lại phục vụ xã hội bằng cách tạo ra những đổi mới hữu ích. Những câu trả lời sai phản ánh đặc điểm của các hệ thống do nhà nước kiểm soát, thực sự kìm hãm sự đổi mới - tuân theo các quy tắc đã được định trước, phục vụ các lợi ích được xác định chung, hoặc duy trì các phương pháp hiện có đều thể hiện loại cấu trúc cứng nhắc ngăn cản việc giải quyết vấn đề một cách sáng tạo, điều thúc đẩy sự tiến bộ trong các xã hội tự do.
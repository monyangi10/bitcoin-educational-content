question: Qual è il motivo per cui la libertà di lavoro è necessaria e giustificata?
answer: Poiché i bisogni sono personali e individuali, ogni persona deve essere libera di rispondervi a modo suo
wrong_answers:
  - Perché lo Stato non può organizzare in modo efficiente tutte le attività economiche per ottenere la massima produttività
  - Perché la concorrenza tra i lavoratori porta a prodotti di migliore qualità e a prezzi più bassi per i consumatori
  - Perché l'esperienza storica dimostra che le economie regolamentate falliscono sempre nel soddisfare i bisogni umani fondamentali
explanation: |
  Il testo stabilisce che la libertà del lavoro ha origine dalla natura personale e individuale dei bisogni umani. Poiché ogni persona sperimenta la propria fame e la propria sofferenza in modo unico, deve essere libera di affrontare questi bisogni come meglio crede. Il testo sottolinea che questo fondamento individualistico giustifica la libertà di lavoro, piuttosto che gli argomenti di efficienza economica, i vantaggi del mercato competitivo o i precedenti storici delle economie regolamentate.
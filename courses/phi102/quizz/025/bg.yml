question: Коя е причината, поради която свободата на труда е необходима и оправдана?
answer: Тъй като потребностите са лични и индивидуални, всеки човек трябва да има свободата да им отговори по свой собствен начин
wrong_answers:
  - Тъй като държавата не може ефективно да организира всички икономически дейности за постигане на максимална производителност
  - Защото конкуренцията между работниците води до по-добро качество на продуктите и по-ниски цени за потребителите
  - Защото историческият опит показва, че регулираните икономики винаги не успяват да задоволят основните човешки потребности
explanation: |
  В текста се посочва, че свободата на труда произтича от личния и индивидуален характер на човешките потребности. Тъй като всеки човек изпитва собствения си глад и страдание по уникален начин, той трябва да бъде свободен да посреща тези нужди, както намери за добре. Текстът подчертава, че тази индивидуалистична основа оправдава свободата на труда, а не аргументите за икономическа ефективност, ползите от конкурентния пазар или историческите прецеденти за регулирани икономики.
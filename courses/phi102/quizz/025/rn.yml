question: Ni igiki ico canditswe kigaragaza ko ari co gituma umwidegemvyo wo gukora ari ngombwa kandi ufise ishingiro?
answer: Kubera ko ivyo umuntu akeneye ari ivy’umuntu ku giti ciwe kandi ari ivy’umuntu ku giti ciwe, umuntu wese ategerezwa kwidegemvya mu kubisubiza mu buryo bwiwe bwite .
wrong_answers:
  - Kuko Leta idashobora gutunganya neza ibikorwa vyose vy’ubutunzi kugira ngo umuntu agire umwimbu mwinshi .
  - Kubera ko uguhiganwa hagati y’abakozi bituma haba ibintu vyiza kandi abaguzi bagacika ibiciro bito .
  - Kubera ko ivyo vyabaye muri kahise vyerekana yuko ubutunzi butunganijwe buma bunanirwa gushitsa ivyo abantu bakeneye vy’ishimikiro .
explanation: |
  Ico canditswe gishinga intahe ko umwidegemvyo wo gukora ukomoka ku kamere y’umuntu ku giti ciwe n’ivyo umuntu akeneye. Kubera ko umuntu wese yiyumvamwo inzara n’imibabaro yiwe mu buryo budasanzwe, ategerezwa kwidegemvya mu gutorera umuti ivyo bikenewe uko abona ko bikwiye. Ico canditswe gishimika ku vy’uko uwo mushinge w’umuntu ku giti ciwe ushingira intahe umwidegemvyo wo gukora, aho gushingira intahe imvo z’ubutunzi, inyungu z’isoko ry’uguhiganwa, canke ivyabaye kera ku bijanye n’ubutunzi butegekanijwe.
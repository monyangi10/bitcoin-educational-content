question: Šta tekst navodi kao razlog zašto je sloboda rada neophodna i opravdana?
answer: Zato što su potrebe lične i individualne, svaka osoba mora biti slobodna da na njih odgovori na svoj način.
wrong_answers:
  - Zato što država ne može efikasno organizovati sve ekonomske aktivnosti za maksimalnu produktivnost
  - Zato što konkurencija među radnicima dovodi do kvalitetnijih proizvoda i nižih cena za potrošače
  - Jer istorijsko iskustvo pokazuje da regulisane ekonomije uvek ne uspevaju da zadovolje osnovne ljudske potrebe
explanation: |
  Tekst ustanovljava da sloboda rada proizlazi iz lične i individualne prirode ljudskih potreba. Pošto svaka osoba doživljava svoju glad i patnju na jedinstven način, mora biti slobodna da te potrebe zadovolji kako smatra prikladnim. Tekst naglašava da ova individualistička osnova opravdava slobodu rada, a ne argumenti ekonomske efikasnosti, koristi konkurentnog tržišta ili istorijski presedani o regulisanim ekonomijama.
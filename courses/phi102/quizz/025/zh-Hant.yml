question: 文中指出工作自由是必要且合理的原因是什麼？
answer: 由於需求是個人的，每個人都必須能自由地以自己的方式回應需求
wrong_answers:
  - 因為國家無法有效率地組織所有經濟活動，以達到最高生產力
  - 因為工人之間的競爭會為消費者帶來更優質的產品和更低的價格
  - 因為歷史經驗顯示，受管制的經濟體總是無法滿足人類的基本需求
explanation: |
  文中規定，工作自由源自於人類需求的個人和個別性質。由於每個人都以獨特的方式體驗自己的飢餓和痛苦，因此他們必須能夠自由地以他們認為合適的方式解決這些需求。文中強調，這種個人主義的基礎是工作自由的理由，而不是經濟效率的論據、競爭市場的利益，或是有關管制經濟的歷史先例。
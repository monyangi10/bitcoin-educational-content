question: Mikä on tekstin mukaan syy siihen, miksi työn vapaus on välttämätöntä ja perusteltua?
answer: Koska tarpeet ovat henkilökohtaisia ja yksilöllisiä, jokaisen on voitava vastata niihin omalla tavallaan
wrong_answers:
  - Koska valtio ei voi tehokkaasti organisoida kaikkea taloudellista toimintaa mahdollisimman tuottavaksi
  - Koska työntekijöiden välinen kilpailu johtaa laadukkaampiin tuotteisiin ja alhaisempiin kuluttajahintoihin
  - Koska historiallinen kokemus osoittaa, että säännellyt taloudet eivät aina täytä ihmisten perustarpeita
explanation: |
  Tekstissä todetaan, että työn vapaus perustuu ihmisen tarpeiden henkilökohtaiseen ja yksilölliseen luonteeseen. Koska jokainen ihminen kokee oman nälkänsä ja kärsimyksensä ainutlaatuisella tavalla, hänen on voitava vapaasti vastata näihin tarpeisiinsa parhaaksi katsomallaan tavalla. Tekstissä korostetaan, että tämä individualistinen perusta oikeuttaa työnvapauden pikemminkin kuin taloudellinen tehokkuusargumentit, kilpailumarkkinoiden edut tai säänneltyjä talouksia koskevat historialliset ennakkotapaukset.
question: Văn bản này chỉ ra lý do nào khiến tự do lao động là cần thiết và chính đáng?
answer: Vì nhu cầu là vấn đề cá nhân và riêng biệt, mỗi người cần được tự do đáp ứng chúng theo cách riêng của mình.
wrong_answers:
  - Vì nhà nước không thể tổ chức hiệu quả tất cả các hoạt động kinh tế để đạt năng suất tối đa.
  - Vì sự cạnh tranh giữa các công nhân dẫn đến sản phẩm chất lượng tốt hơn và giá cả thấp hơn cho người tiêu dùng.
  - Bởi vì kinh nghiệm lịch sử cho thấy các nền kinh tế được điều tiết luôn thất bại trong việc đáp ứng các nhu cầu cơ bản của con người.
explanation: |
  Văn bản này khẳng định rằng tự do lao động bắt nguồn từ bản chất cá nhân và riêng biệt của nhu cầu con người. Vì mỗi người trải nghiệm sự đói khát và đau khổ của riêng mình theo cách độc đáo, họ phải được tự do đáp ứng những nhu cầu này theo cách mà họ thấy phù hợp. Văn bản nhấn mạnh rằng nền tảng cá nhân chủ nghĩa này là cơ sở biện minh cho tự do lao động, chứ không phải các lập luận về hiệu quả kinh tế, lợi ích thị trường cạnh tranh, hay tiền lệ lịch sử về nền kinh tế được điều tiết.
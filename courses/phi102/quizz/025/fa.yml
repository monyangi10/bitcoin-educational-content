question: متن چه دلیلی را برای ضرورت و توجیه آزادی کار شناسایی می‌کند؟
answer: زیرا نیازها شخصی و فردی هستند، هر فرد باید آزاد باشد که به شیوه خود به آن‌ها پاسخ دهد.
wrong_answers:
  - زیرا دولت نمی‌تواند به‌طور کارآمد همه فعالیت‌های اقتصادی را برای حداکثر بهره‌وری سازماندهی کند
  - زیرا رقابت بین کارگران منجر به تولید محصولات با کیفیت بهتر و قیمت‌های پایین‌تر برای مصرف‌کنندگان می‌شود
  - زیرا تجربه تاریخی نشان می‌دهد که اقتصادهای تنظیم‌شده همیشه در برآورده کردن نیازهای اساسی انسانی ناکام می‌مانند.
explanation: |
  متن بیان می‌کند که آزادی کار از ماهیت شخصی و فردی نیازهای انسانی سرچشمه می‌گیرد. از آنجا که هر فرد گرسنگی و رنج خود را به شیوه‌ای منحصر به فرد تجربه می‌کند، باید آزاد باشد تا به این نیازها به شیوه‌ای که مناسب می‌بیند، پاسخ دهد. متن تأکید می‌کند که این پایه فردگرایانه آزادی کار را توجیه می‌کند، نه استدلال‌های کارایی اقتصادی، مزایای بازار رقابتی، یا سوابق تاریخی درباره اقتصادهای تنظیم‌شده.
question: Mis on tekstis nimetatud põhjuseks, miks töövabadus on vajalik ja õigustatud?
answer: Kuna vajadused on isiklikud ja individuaalsed, peab iga inimene olema vaba, et neile omal moel reageerida
wrong_answers:
  - Kuna riik ei saa tõhusalt korraldada kõiki majandustegevusi maksimaalse tootlikkuse saavutamiseks
  - Kuna töötajate vaheline konkurents toob kaasa parema kvaliteediga tooted ja madalamad hinnad tarbijate jaoks
  - Kuna ajalooline kogemus näitab, et reguleeritud majandus ei suuda alati rahuldada inimeste põhivajadusi
explanation: |
  Tekstis sätestatakse, et töövabadus tuleneb inimese vajaduste isiklikust ja individuaalsest olemusest. Kuna iga inimene kogeb oma nälga ja kannatusi ainulaadsel viisil, peab tal olema vabadus nende vajaduste rahuldamiseks, nagu ta ise heaks arvab. Tekstis rõhutatakse, et see individualistlik alus õigustab töövabadust, mitte majandusliku tõhususe argumendid, konkurentsituru eelised või ajaloolised pretsedendid reguleeritud majanduse kohta.
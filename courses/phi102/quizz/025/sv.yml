question: Vad anges i texten som skälet till att friheten i arbetslivet är nödvändig och berättigad?
answer: Eftersom behoven är personliga och individuella måste varje person ha frihet att tillgodose dem på sitt eget sätt
wrong_answers:
  - Eftersom staten inte kan organisera alla ekonomiska aktiviteter på ett effektivt sätt för maximal produktivitet
  - Eftersom konkurrens mellan arbetstagare leder till produkter av bättre kvalitet och lägre priser för konsumenterna
  - Eftersom historiska erfarenheter visar att reglerade ekonomier alltid misslyckas med att tillgodose grundläggande mänskliga behov
explanation: |
  I texten slås fast att arbetets frihet har sitt ursprung i de mänskliga behovens personliga och individuella natur. Eftersom varje person upplever sin egen hunger och sitt eget lidande på ett unikt sätt, måste de vara fria att tillgodose dessa behov på det sätt de finner lämpligt. Texten betonar att denna individualistiska grund motiverar arbetsfrihet, snarare än ekonomiska effektivitetsargument, konkurrensfördelar på marknaden eller historiska exempel på reglerade ekonomier.
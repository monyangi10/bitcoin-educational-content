question: O que é que o texto identifica como a razão pela qual a liberdade de trabalho é necessária e justificada?
answer: Porque as necessidades são pessoais e individuais, cada pessoa deve ser livre de lhes dar resposta à sua maneira
wrong_answers:
  - Porque o Estado não pode organizar eficazmente todas as actividades económicas para obter a máxima produtividade
  - Porque a concorrência entre trabalhadores conduz a produtos de melhor qualidade e a preços mais baixos para os consumidores
  - Porque a experiência histórica mostra que as economias reguladas não conseguem sempre satisfazer as necessidades humanas básicas
explanation: |
  O texto estabelece que a liberdade de trabalho tem origem no carácter pessoal e individual das necessidades humanas. Uma vez que cada pessoa experimenta a sua própria fome e sofrimento de uma forma única, deve ser livre de responder a essas necessidades como entender. O texto sublinha que este fundamento individualista justifica a liberdade de trabalho, e não os argumentos de eficiência económica, os benefícios do mercado competitivo ou os precedentes históricos sobre economias reguladas.
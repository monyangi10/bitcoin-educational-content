question: What does the text identify as the reason why freedom of work is necessary and justified?
answer: Because needs are personal and individual, so each person must be free to respond to them in their own way
wrong_answers:
  - Because the state cannot efficiently organize all economic activities for maximum productivity
  - Because competition between workers leads to better quality products and lower prices for consumers
  - Because historical experience shows that regulated economies always fail to meet basic human needs
explanation: |
  The text establishes that freedom of work originates from the personal and individual nature of human needs. Since each person experiences their own hunger and suffering in a unique way, they must be free to address these needs as they see fit. The text emphasizes that this individualistic foundation justifies work freedom, rather than economic efficiency arguments, competitive market benefits, or historical precedents about regulated economies.

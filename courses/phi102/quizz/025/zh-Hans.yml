question: 文中指出工作自由之所以必要和合理的原因是什么？
answer: 因为需求是个人的、个别的，每个人都必须能够自由地以自己的方式对需求做出反应
wrong_answers:
  - 因为国家无法有效地组织所有经济活动，以实现最大生产力
  - 因为工人之间的竞争会提高产品质量，降低消费者的价格
  - 因为历史经验表明，管制经济总是无法满足人类的基本需求
explanation: |
  该文本规定，工作自由源于人类需求的个人性和个别性。由于每个人都以独特的方式经历着自己的饥饿和痛苦，因此他们必须能够以自己认为合适的方式自由地满足这些需求。文中强调，这种个人主义基础是工作自由的正当理由，而不是经济效率论点、市场竞争利益或有关管制经济的历史先例。
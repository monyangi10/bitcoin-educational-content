question: O que é que a abordagem liberal de Benjamin Constant propõe como quadro essencial para evitar que os sistemas democráticos se tornem despóticos?
answer: As regras constitucionais e uma opinião pública esclarecida devem limitar a democracia, uma vez que esta é um meio e não um fim em si mesma
wrong_answers:
  - Participação direta dos cidadãos em todas as decisões governamentais, a fim de garantir a legitimidade democrática e evitar a captura pelas elites
  - Alargamento do voto democrático a todas as decisões políticas, em vez de o limitar às eleições representativas
  - Reforço dos princípios da regra da maioria para garantir que a vontade colectiva prevaleça sempre sobre as preferências individuais
explanation: |
  A filosofia liberal de Constant reconhece a democracia como um instrumento valioso, mas perigoso, que exige restrições constitucionais e uma cidadania informada para evitar que comprometa a liberdade individual. As respostas erradas reflectem equívocos comuns: uma democracia mais direta aumenta, na verdade, o risco de tirania da maioria, a expansão do processo democrático de tomada de decisões a todas as políticas ampliaria o paradoxo da tutela e o reforço da regra da maioria ignora a preocupação liberal fundamental de proteger os direitos individuais da opressão colectiva.
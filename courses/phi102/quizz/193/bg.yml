question: Какво предлага либералният подход на Бенджамин Констант като основна рамка за предотвратяване на превръщането на демократичните системи в деспотични?
answer: Конституционните правила и просветеното обществено мнение трябва да ограничават демокрацията, тъй като тя е средство, а не самоцел
wrong_answers:
  - Пряко участие на гражданите във всички правителствени решения, за да се гарантира демократичната легитимност и да се предотврати завладяването на елита
  - Разширяване на обхвата на демократичното гласуване, така че да включва всички политически решения, вместо да се ограничава до представителни избори
  - Утвърждаване на принципите за управление на мнозинството, за да се гарантира, че колективната воля винаги надделява над индивидуалните предпочитания
explanation: |
  Либералната философия на Констант признава демокрацията като ценен, но опасен инструмент, който изисква конституционни ограничения и информирани граждани, за да не подкопава индивидуалната свобода. Грешните отговори отразяват често срещани погрешни схващания: по-пряката демокрация всъщност увеличава риска от тирания на мнозинството, разширяването на демократичното вземане на решения за всички политики би засилило парадокса на опеката, а засилването на управлението на мнозинството игнорира фундаменталната либерална загриженост за защитата на индивидуалните права от колективно потисничество.
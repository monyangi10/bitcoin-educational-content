question: ¿Qué propone el enfoque liberal de Benjamin Constant como marco esencial para evitar que los sistemas democráticos se conviertan en despóticos?
answer: Las normas constitucionales y una opinión pública ilustrada deben limitar la democracia, ya que ésta es un medio y no un fin en sí misma
wrong_answers:
  - Participación directa de los ciudadanos en todas las decisiones gubernamentales para garantizar la legitimidad democrática y evitar la captura de las élites
  - Ampliación del voto democrático para incluir todas las decisiones políticas en lugar de limitarlo a las elecciones representativas
  - Reforzar los principios de la regla de la mayoría para garantizar que la voluntad colectiva prevalezca siempre sobre las preferencias individuales
explanation: |
  La filosofía liberal de Constant reconoce la democracia como una herramienta valiosa pero peligrosa que requiere restricciones constitucionales y una ciudadanía informada para evitar que socave la libertad individual. Las respuestas erróneas reflejan ideas equivocadas comunes: una democracia más directa aumenta en realidad el riesgo de tiranía de la mayoría, la ampliación de la toma de decisiones democrática a todas las políticas amplificaría la paradoja de la tutela, y el fortalecimiento de la regla de la mayoría ignora la preocupación liberal fundamental por proteger los derechos individuales frente a la opresión colectiva.
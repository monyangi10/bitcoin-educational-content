question: 本杰明-康斯坦特的自由主义方法提出，防止民主制度沦为专制制度的基本框架是什么？
answer: 宪法规则和开明的公众舆论必须限制民主，因为民主本身只是手段而非目的
wrong_answers:
  - 公民直接参与所有政府决策，以确保民主合法性并防止精英俘虏
  - 扩大民主投票范围，将所有政策决定都包括在内，而不是仅限于代议制选举
  - 加强少数服从多数原则，确保集体意志始终高于个人偏好
explanation: |
  康斯坦丁的自由主义哲学认为，民主是一种有价值但危险的工具，需要宪法约束和知情公民来防止其损害个人自由。错误答案反映了常见的误解：更直接的民主实际上增加了多数暴政的风险，将民主决策扩大到所有政策会放大监护悖论，而加强多数统治则忽视了自由主义关于保护个人权利免受集体压迫的基本关切。
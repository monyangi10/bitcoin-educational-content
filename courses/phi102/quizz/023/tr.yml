question: Pierre de Boisguilbert'in insan motivasyonuna ilişkin gözlemine göre, tüm ticareti öncelikle ne yönetir?
answer: Kendi ihtiyaçlarını karşılamaya çalışan girişimcilerin kişisel çıkarları
wrong_answers:
  - Girişimcilerin kamu hizmeti sağlama ve başkalarına yardım etme arzusu
  - Kaynakların adil dağılımını sağlayan hükümet düzenlemeleri
  - Hayırseverliği ve kolektif refahı teşvik eden dini ilkeler
explanation: |
  Pierre de Boisguilbert, ticaretin temelde, hizmet sunmayı asla düşünmeyen ancak kendi ihtiyaçlarını karşılamaya odaklanan girişimcilerin kişisel çıkarları tarafından yönlendirildiğini tespit etmiştir. Bu kişisel çıkarcı davranış, dünyanın ahengini oluşturan karşılıklı fayda yaratır. Boisguilbert, girişimcilerin başkalarına hizmet etmeyi değil, kendi kişisel ihtiyaçlarını karşılamayı düşündüklerini özellikle belirtmişken, diğer seçenekler yanlış bir şekilde özgeci motivasyonları, hükümet kontrolünü veya dini ilkeleri birincil itici güçler olarak öne sürmektedir.
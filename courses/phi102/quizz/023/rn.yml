question: Dukurikije ivyo Pierre de Boisguilbert yabonye ku bijanye n’intumbero y’umuntu, ni igiki ahanini kigenzura ubudandaji bwose?
answer: Inyungu z’umuntu ku giti ciwe z’abanyamigambi barondera guhazwa n’ivyo bakeneye .
wrong_answers:
  - Icipfuzo c'abanyamigambi co gutanga ibikorwa vya Leta no gufasha abandi .
  - Amabwirizwa ya Leta atuma umutungo ugabanywa mu buryo bubereye
  - Ingingo ngenderwako z'idini ziteza imbere ubugwaneza n'imibereho myiza rusangi .
explanation: |
  Pierre de Boisguilbert yerekanye ko ubudandaji bushingiye ahanini ku nyungu z’abantu b’abanyamigambi batigera biyumvira gutanga ibikorwa ahubwo bakibanda ku guhazwa n’ivyo bakeneye. Iyo nyifato yo kwikunda irema inyungu y’ugusubizanya ituma haba ubumwe bw’isi. Ayandi mahitamwo avuga mu buryo butari bwo imvo z’ubugwaneza, ubugenzuzi bwa Leta, canke ingingo ngenderwako z’idini nk’ibintu nyamukuru bituma umuntu akora ivyo, igihe Boisguilbert yavuze mu buryo bwihariye ko abashoramare batiyumvira gukorera abandi ahubwo biyumvira gushitsa ivyo basabwa ubwabo.
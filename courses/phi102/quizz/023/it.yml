question: Secondo l'osservazione di Pierre de Boisguilbert sulla motivazione umana, cosa governa principalmente il commercio?
answer: L'interesse personale degli imprenditori, che cercano di soddisfare i propri bisogni
wrong_answers:
  - Il desiderio degli imprenditori di fornire un servizio pubblico e aiutare gli altri
  - Regolamenti governativi che assicurano un'equa distribuzione delle risorse
  - Principi religiosi che promuovono la carità e il benessere collettivo
explanation: |
  Pierre de Boisguilbert ha individuato che il commercio è fondamentalmente guidato dall'interesse personale degli imprenditori che non pensano mai a fornire un servizio, ma si concentrano sulla soddisfazione dei propri bisogni. Questo comportamento auto-interessato crea un'utilità reciproca che forma l'armonia del mondo. Le altre opzioni suggeriscono erroneamente motivazioni altruistiche, controllo governativo o principi religiosi come motori primari, quando Boisguilbert ha specificamente osservato che gli imprenditori non pensano a servire gli altri, ma a soddisfare le loro esigenze personali.
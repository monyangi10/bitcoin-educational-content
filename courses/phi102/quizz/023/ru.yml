question: Согласно наблюдениям Пьера де Буагильбера о человеческой мотивации, что в первую очередь управляет любой торговлей?
answer: Личный интерес предпринимателей, которые стремятся удовлетворить свои собственные потребности
wrong_answers:
  - Желание предпринимателей оказывать общественную услугу и помогать другим людям
  - Правительственные постановления, обеспечивающие справедливое распределение ресурсов
  - Религиозные принципы, способствующие благотворительности и коллективному благосостоянию
explanation: |
  Пьер де Буагильбер определил, что в основе коммерции лежит личный интерес предпринимателей, которые никогда не думают о предоставлении услуг, а сосредотачиваются на удовлетворении собственных потребностей. Такое эгоистическое поведение создает взаимную полезность, которая формирует гармонию мира. Другие варианты неверно предполагают альтруистические мотивы, государственный контроль или религиозные принципы в качестве основных движущих сил, в то время как Буагильбер специально отметил, что предприниматели думают не о служении другим, а об удовлетворении своих личных потребностей.
question: Pierre de Boisguilbert'i tähelepaneku kohaselt inimese motivatsiooni kohta, mis juhib eelkõige kogu kaubandust?
answer: Ettevõtjate isiklik huvi, kes püüavad rahuldada oma vajadusi
wrong_answers:
  - Ettevõtjate soov pakkuda avalikku teenust ja aidata teisi
  - Valitsuse määrused, mis tagavad ressursside õiglase jaotuse
  - Religioossed põhimõtted, mis edendavad heategevust ja kollektiivset heaolu
explanation: |
  Pierre de Boisguilbert tuvastas, et kaubandust juhib põhimõtteliselt ettevõtjate isiklik huvi, kes ei mõtle kunagi teenuse osutamisele, vaid keskenduvad oma vajaduste rahuldamisele. See omakasupüüdlik käitumine loob vastastikust kasulikkust, mis moodustab maailma harmoonia. Teised valikud viitavad ekslikult altruistlikele motiividele, valitsuse kontrollile või religioossetele põhimõtetele kui peamistele ajenditele, kuigi Boisguilbert märkis konkreetselt, et ettevõtjad ei mõtle teiste teenimisele, vaid oma isiklike vajaduste rahuldamisele.
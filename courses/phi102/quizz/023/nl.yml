question: Volgens de observatie van Pierre de Boisguilbert over menselijke motivatie, wat beheerst in de eerste plaats alle handel?
answer: Het persoonlijke belang van ondernemers die hun eigen behoeften willen bevredigen
wrong_answers:
  - De wens van ondernemers om openbare diensten te verlenen en anderen te helpen
  - Overheidsregels die zorgen voor een eerlijke verdeling van middelen
  - Religieuze principes die liefdadigheid en collectief welzijn bevorderen
explanation: |
  Pierre de Boisguilbert stelde vast dat handel fundamenteel wordt gedreven door het persoonlijke belang van ondernemers die nooit denken aan het verlenen van service maar zich richten op het bevredigen van hun eigen behoeften. Dit op eigenbelang gerichte gedrag creëert wederzijds nut dat de harmonie van de wereld vormt. De andere opties suggereren ten onrechte altruïstische motivaties, overheidscontrole of religieuze principes als primaire drijfveren, terwijl Boisguilbert juist opmerkte dat ondernemers niet denken aan het dienen van anderen, maar aan het bevredigen van hun persoonlijke behoeften.
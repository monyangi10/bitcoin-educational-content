question: Kulingana na uchunguzi wa Pierre de Boisguilbert kuhusu motisha ya kibinadamu, ni nini hasa kinachotawala biashara zote?
answer: Maslahi binafsi ya wajasiriamali wanaotafuta kukidhi mahitaji yao wenyewe
wrong_answers:
  - Hamu ya wajasiriamali kutoa huduma kwa umma na kuwasaidia wengine
  - Kanuni za serikali zinazohakikisha usambazaji wa rasilimali kwa haki
  - Kanuni za kidini zinazokuza hisani na ustawi wa pamoja
explanation: |
  Pierre de Boisguilbert alibainisha kuwa biashara kimsingi inaendeshwa na maslahi binafsi ya wajasiriamali ambao hawafikirii kamwe kutoa huduma bali huzingatia kukidhi mahitaji yao wenyewe. Tabia hii ya ubinafsi huunda manufaa ya pande zote ambayo huunda maelewano ya ulimwengu. Chaguzi zingine zinaonyesha kimakosa motisha za kujitolea, udhibiti wa serikali, au kanuni za kidini kama vichocheo vikuu, wakati Boisguilbert alipobainisha haswa kwamba wajasiriamali hawafikirii kuwahudumia wengine bali kuhusu kukidhi mahitaji yao binafsi.
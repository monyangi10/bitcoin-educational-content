question: De acordo com a observação de Pierre de Boisguilbert sobre a motivação humana, o que é que rege principalmente todo o comércio?
answer: O interesse pessoal dos empresários que procuram satisfazer as suas próprias necessidades
wrong_answers:
  - O desejo dos empresários de prestar serviço público e ajudar os outros
  - Regulamentos governamentais que garantem uma distribuição justa dos recursos
  - Princípios religiosos que promovem a caridade e o bem-estar coletivo
explanation: |
  Pierre de Boisguilbert identificou que o comércio é fundamentalmente impulsionado pelo interesse pessoal dos empresários que nunca pensam em prestar serviços, mas concentram-se na satisfação das suas próprias necessidades. Este comportamento auto-interessado cria uma utilidade recíproca que forma a harmonia do mundo. As outras opções sugerem incorretamente motivações altruístas, controlo governamental ou princípios religiosos como principais motores, quando Boisguilbert referiu especificamente que os empresários não pensam em servir os outros mas em satisfazer as suas necessidades pessoais.
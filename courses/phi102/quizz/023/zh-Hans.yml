question: 根据 Pierre de Boisguilbert 对人类动机的观察，是什么在支配着所有商业？
answer: 企业家为满足自身需求的个人利益
wrong_answers:
  - 企业家提供公共服务和帮助他人的愿望
  - 确保资源公平分配的政府法规
  - 促进慈善和集体福利的宗教原则
explanation: |
  皮埃尔-德-布瓦吉贝尔指出，商业的根本驱动力是企业家的个人利益，他们从不考虑提供服务，而是专注于满足自己的需求。这种自利行为创造了互惠的效用，形成了世界的和谐。其他选项错误地将利他主义动机、政府控制或宗教原则作为主要驱动力，而 Boisguilbert 特别指出，企业家不会考虑为他人服务，而是满足自己的个人需求。
question: Según la observación de Pierre de Boisguilbert sobre la motivación humana, ¿qué rige principalmente todo el comercio?
answer: El interés personal de los empresarios que buscan satisfacer sus propias necesidades
wrong_answers:
  - El deseo de los empresarios de prestar un servicio público y ayudar a los demás
  - Normativa gubernamental que garantice una distribución equitativa de los recursos
  - Principios religiosos que promueven la caridad y el bienestar colectivo
explanation: |
  Pierre de Boisguilbert identificó que el comercio está impulsado fundamentalmente por el interés personal de los empresarios, que nunca piensan en prestar un servicio, sino que se centran en satisfacer sus propias necesidades. Este comportamiento interesado crea una utilidad recíproca que forma la armonía del mundo. Las otras opciones sugieren erróneamente motivaciones altruistas, el control gubernamental o principios religiosos como principales impulsores, cuando Boisguilbert señaló específicamente que los empresarios no piensan en servir a los demás sino en satisfacer sus necesidades personales.
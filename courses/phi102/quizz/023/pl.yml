question: Zgodnie z obserwacją Pierre'a de Boisguilberta dotyczącą ludzkiej motywacji, co przede wszystkim rządzi całym handlem?
answer: Osobisty interes przedsiębiorców, którzy dążą do zaspokojenia własnych potrzeb
wrong_answers:
  - Chęć przedsiębiorców do świadczenia usług publicznych i pomagania innym
  - Regulacje rządowe zapewniające sprawiedliwy podział zasobów
  - Zasady religijne promujące dobroczynność i zbiorowy dobrobyt
explanation: |
  Pierre de Boisguilbert zidentyfikował, że handel jest zasadniczo napędzany osobistym interesem przedsiębiorców, którzy nigdy nie myślą o świadczeniu usług, ale koncentrują się na zaspokajaniu własnych potrzeb. To samolubne zachowanie tworzy wzajemną użyteczność, która tworzy harmonię świata. Pozostałe opcje błędnie sugerują altruistyczne motywacje, kontrolę rządową lub zasady religijne jako główne czynniki napędzające, podczas gdy Boisguilbert wyraźnie zauważył, że przedsiębiorcy nie myślą o służeniu innym, ale o zaspokajaniu swoich osobistych potrzeb.
question: Ifølge Pierre de Boisguilberts observasjon om menneskelig motivasjon, hva er det som først og fremst styrer all handel?
answer: Den personlige interessen til entreprenører som søker å tilfredsstille sine egne behov
wrong_answers:
  - Entreprenørers ønske om å yte offentlig service og hjelpe andre
  - Statlige reguleringer som sikrer rettferdig fordeling av ressurser
  - Religiøse prinsipper som fremmer nestekjærlighet og kollektiv velferd
explanation: |
  Pierre de Boisguilbert identifiserte at handel i bunn og grunn er drevet av personlige interesser hos entreprenører som aldri tenker på å yte service, men fokuserer på å tilfredsstille sine egne behov. Denne egennyttige atferden skaper gjensidig nytte som skaper harmoni i verden. De andre alternativene antyder feilaktig altruistiske motiver, statlig kontroll eller religiøse prinsipper som primære drivkrefter, når Boisguilbert spesifikt bemerket at entreprenører ikke tenker på å tjene andre, men på å oppfylle sine personlige behov.
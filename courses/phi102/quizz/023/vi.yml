question: Theo quan sát của Pierre de Boisguilbert về động cơ của con người, điều gì chủ yếu chi phối mọi hoạt động thương mại?
answer: Lợi ích cá nhân của các doanh nhân, những người tìm cách thỏa mãn nhu cầu của chính mình.
wrong_answers:
  - Mong muốn của các doanh nhân là cung cấp dịch vụ công cộng và giúp đỡ người khác.
  - Các quy định của chính phủ nhằm đảm bảo phân phối nguồn lực một cách công bằng.
  - Các nguyên tắc tôn giáo đề cao lòng bác ái và phúc lợi tập thể.
explanation: |
  Pierre de Boisguilbert nhận định rằng thương mại về cơ bản được thúc đẩy bởi lợi ích cá nhân của các doanh nhân, những người không bao giờ nghĩ đến việc cung cấp dịch vụ mà chỉ tập trung vào việc thỏa mãn nhu cầu của chính mình. Hành vi vị kỷ này tạo ra lợi ích tương hỗ, hình thành nên sự hài hòa của thế giới. Các lựa chọn khác đều sai lầm khi cho rằng động cơ vị tha, sự kiểm soát của chính phủ hoặc các nguyên tắc tôn giáo là động lực chính, trong khi Boisguilbert đã chỉ rõ rằng các doanh nhân không nghĩ đến việc phục vụ người khác mà chỉ nghĩ đến việc đáp ứng nhu cầu cá nhân của họ.
question: Selon l'observation de Pierre de Boisguilbert sur les motivations humaines, qu'est-ce qui régit en premier lieu tout commerce ?
answer: L'intérêt personnel des entrepreneurs qui cherchent à satisfaire leurs propres besoins
wrong_answers:
  - Le désir des entrepreneurs de fournir un service public et d'aider les autres
  - Les réglementations gouvernementales qui garantissent une répartition équitable des ressources
  - Les principes religieux qui promeuvent la charité et le bien-être collectif
explanation: |
  Pierre de Boisguilbert a identifié que le commerce est fondamentalement guidé par l'intérêt personnel des entrepreneurs qui ne pensent jamais à fournir un service, mais se concentrent sur la satisfaction de leurs propres besoins. Ce comportement intéressé crée une utilité réciproque qui forme l'harmonie du monde. Les autres options suggèrent à tort que les motivations altruistes, le contrôle gouvernemental ou les principes religieux sont les principaux moteurs, alors que Boisguilbert a spécifiquement noté que les entrepreneurs ne pensent pas à servir les autres mais à satisfaire leurs besoins personnels.

question: 根據啟蒙哲學家的說法，他們對自由與經濟條件的關係有什麼基本的見解？
answer: 他們認識到，自由在他們時代的新經濟條件下有效地發揮作用
wrong_answers:
  - 他們相信只有透過暴力革命推翻現有制度，才能獲得自由。
  - 他們的結論是，自由是一種抽象的理想，永遠無法實踐
  - 他們認為自由需要回歸中世紀時期較簡單的經濟結構
explanation: |
  啟蒙運動的思想家，特別是像杜爾哥（Turgot）這樣的理學家和孔多塞（Condorcet）這樣的哲學家，提出了一個關鍵性的觀點：在他們時代的新經濟環境下，自由實際上是可行的。中世紀時期，自由競爭因地方壟斷而看似不切實際，但18世紀新興的全球商業創造了條件，商業自由可以平衡價格，以更低的成本提供商品。這不是抽象的理論，而是對不斷變化的現實的實際認知。
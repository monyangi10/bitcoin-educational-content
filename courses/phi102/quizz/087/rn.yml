question: Nk’uko abafilozofe bo mu gihe c’Umuco babivuga, ni ubuhe bumenyi bw’ishimikiro bari bafise ku bijanye n’isano umwidegemvyo ufitaniye n’ivy’ubutunzi?
answer: Baremeye yuko umwidegemvyo ukora neza mu mibereho mishasha y’ubutunzi yo mu gihe cabo .
wrong_answers:
  - Bemera ko umwidegemvyo ushobora gushikwako gusa biciye mu gutembagaza ubukazi bwariho .
  - Baciye bafata ingingo y’uko umwidegemvyo ari iciyumviro kitaboneka kidashobora kwigera gishirwa mu ngiro .
  - Baciye bafata ingingo y’uko umwidegemvyo usaba gusubira mu mibumbe yoroshe y’ubutunzi yo mu bihe vya kera .
explanation: |
  Abanyabwenge b’umuco, cane cane abahinga b’ivy’umubiri nka Turgot n’abanyabwenge nka Condorcet, baravuze ko umwidegemvyo mu vy’ukuri ukora mu bikorwa mu bihe bishasha vy’ubutunzi vyo mu gihe cabo. Mu buryo butandukanye n’ibihe vya kera aho uguhiganwa ku buntu kwasa n’ukudashoboka kubera ubutegetsi bwo mu karere, ubudandaji bwo kw’isi yose bwariko buratera imbere mu kinjana ca 18 bwatumye haba ibintu aho umwidegemvyo w’ubudandaji woshobora gutuma ibiciro biringanira no gutanga ibicuruzwa ku giciro gitoyi. Ivyo ntivyari ugutanga ivyiyumviro bitaboneka ahubwo vyari ukwemera mu buryo bukora ukuri guhinduka.
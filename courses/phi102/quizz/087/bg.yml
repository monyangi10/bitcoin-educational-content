question: Според философите от Просвещението какво фундаментално прозрение са имали те за връзката на свободата с икономическите условия?
answer: Те признават, че свободата функционира ефективно в новите икономически условия на тяхното време
wrong_answers:
  - Те вярваха, че свободата може да бъде постигната само чрез насилствено революционно сваляне на съществуващите системи
  - Те стигат до заключението, че свободата е абстрактен идеал, който никога не може да бъде осъществен на практика
  - Те смятат, че свободата изисква връщане към по-простите икономически структури от Средновековието
explanation: |
  Мислителите от Просвещението, особено физиократите като Турго и философите като Кондорсе, правят важното наблюдение, че свободата действително работи на практика в новите икономически условия на тяхната епоха. За разлика от Средновековието, когато свободната конкуренция е изглеждала непрактична поради местните монополи, през XVIII в. зараждащата се световна търговия създава условия, при които търговската свобода може да балансира цените и да осигури стоки на по-ниска цена. Това не е абстрактно теоретизиране, а практическо признаване на променящите се реалности.
question: Según los filósofos de la Ilustración, ¿qué idea fundamental tenían sobre la relación de la libertad con las condiciones económicas?
answer: Reconocieron que la libertad funciona eficazmente en las nuevas condiciones económicas de su tiempo
wrong_answers:
  - Creían que la libertad sólo podía alcanzarse mediante el derrocamiento revolucionario violento de los sistemas existentes
  - Llegaron a la conclusión de que la libertad era un ideal abstracto que nunca podría llevarse a la práctica
  - Decidieron que la libertad requería volver a las estructuras económicas más sencillas de la época medieval
explanation: |
  Los pensadores de la Ilustración, en particular los fisiócratas como Turgot y los filósofos como Condorcet, hicieron la observación crucial de que la libertad funciona realmente en la práctica en las nuevas circunstancias económicas de su época. A diferencia de la época medieval, en la que la libre competencia parecía impracticable debido a los monopolios locales, el emergente comercio mundial del siglo XVIII creó unas condiciones en las que la libertad comercial podía equilibrar los precios y proporcionar bienes a menor coste. No se trataba de una teoría abstracta, sino del reconocimiento práctico de realidades cambiantes.
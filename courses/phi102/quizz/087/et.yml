question: Milline põhimõtteline arusaam oli valgustusfilosoofide arvates vabaduse ja majanduslike tingimuste suhte kohta?
answer: Nad tunnistasid, et vabadus toimib tõhusalt nende aja uutes majandustingimustes
wrong_answers:
  - Nad uskusid, et vabadust saab saavutada ainult olemasolevate süsteemide vägivaldse revolutsioonilise kukutamise kaudu
  - Nad jõudsid järeldusele, et vabadus on abstraktne ideaal, mida ei saa kunagi praktiliselt rakendada
  - Nad otsustasid, et vabadus nõuab tagasipöördumist keskaja lihtsamate majandusstruktuuride juurde
explanation: |
  Valgustusajastu mõtlejad, eriti füsiokraadid nagu Turgot ja filosoofid nagu Condorcet, tegid otsustava tähelepaneku, et vabadus tegelikult toimib praktikas nende ajastu uutes majanduslikes tingimustes. Erinevalt keskajast, mil vaba konkurents tundus kohalike monopolide tõttu ebapraktiline, lõi 18. sajandi tekkiv ülemaailmne kaubandus tingimused, kus kaubandusvabadus võimaldas tasakaalustada hindu ja pakkuda kaupu madalamate kuludega. See ei olnud abstraktne teoretiseerimine, vaid muutuvate reaalsuste praktiline tunnustamine.
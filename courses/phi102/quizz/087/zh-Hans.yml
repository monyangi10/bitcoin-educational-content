question: 根据启蒙哲学家的观点，他们对自由与经济条件的关系有什么基本见解？
answer: 他们认识到，在当时新的经济条件下，自由可以有效地发挥作用
wrong_answers:
  - 他们认为，只有通过暴力革命推翻现有制度，才能实现自由
  - 他们的结论是，自由是一种抽象的理想，永远无法切实实现
  - 他们认为，要实现自由，就必须恢复中世纪的简单经济结构
explanation: |
  启蒙思想家们，尤其是杜尔哥等重农主义者和孔多塞等哲学家，提出了一个至关重要的观点，即在他们所处时代的新经济环境下，自由实际上是可行的。与中世纪自由竞争因地方垄断而显得不切实际不同，18 世纪新兴的全球商业创造了条件，商业自由可以平衡价格，以更低的成本提供商品。这不是抽象的理论，而是对现实变化的实际认识。
question: Hvilken grunnleggende innsikt hadde opplysningsfilosofene om frihetens forhold til økonomiske forhold, ifølge dem selv?
answer: De innså at frihet fungerer effektivt under de nye økonomiske forholdene i deres samtid
wrong_answers:
  - De mente at frihet bare kunne oppnås gjennom voldelig revolusjonær omveltning av eksisterende systemer
  - De konkluderte med at frihet var et abstrakt ideal som aldri kunne realiseres i praksis
  - De slo fast at frihet krevde en tilbakevending til middelalderens enklere økonomiske strukturer
explanation: |
  Opplysningstenkerne, særlig fysiokrater som Turgot og filosofer som Condorcet, gjorde den avgjørende observasjonen at frihet faktisk fungerer i praksis under de nye økonomiske omstendighetene i deres samtid. I motsetning til middelalderen, da fri konkurranse virket upraktisk på grunn av lokale monopoler, skapte 1700-tallets fremvoksende globale handel betingelser der kommersiell frihet kunne balansere prisene og gi varer til lavere kostnader. Dette var ikke abstrakt teoretisering, men en praktisk erkjennelse av endrede realiteter.
question: Welk fundamenteel inzicht hadden de Verlichtingsfilosofen over de relatie tussen vrijheid en economische omstandigheden?
answer: Ze erkenden dat vrijheid effectief functioneert in de nieuwe economische omstandigheden van hun tijd
wrong_answers:
  - Zij geloofden dat vrijheid alleen bereikt kon worden door een gewelddadige revolutionaire omverwerping van bestaande systemen
  - Ze concludeerden dat vrijheid een abstract ideaal was dat nooit praktisch geïmplementeerd kon worden
  - Ze stelden vast dat vrijheid een terugkeer vereiste naar de eenvoudigere economische structuren van de middeleeuwen
explanation: |
  De denkers van de Verlichting, met name fysiocraten als Turgot en filosofen als Condorcet, maakten de cruciale observatie dat vrijheid in de praktijk echt werkt onder de nieuwe economische omstandigheden van hun tijd. In tegenstelling tot de middeleeuwen, toen vrije concurrentie onpraktisch leek vanwege lokale monopolies, creëerde de opkomende wereldhandel in de 18e eeuw omstandigheden waarin commerciële vrijheid prijzen in evenwicht kon brengen en goederen tegen lagere kosten kon leveren. Dit was geen abstracte theorie, maar een praktische erkenning van de veranderende realiteit.
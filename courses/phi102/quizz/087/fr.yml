question: Selon les philosophes des Lumières, quelle idée fondamentale ont-ils eue sur la relation entre la liberté et les conditions économiques ?
answer: Ils ont reconnu que la liberté fonctionne efficacement dans les nouvelles conditions économiques de leur époque
wrong_answers:
  - Ils pensaient que la liberté ne pouvait être obtenue que par un renversement révolutionnaire violent des systèmes existants
  - Ils en ont conclu que la liberté était un idéal abstrait qui ne pourrait jamais être mis en œuvre dans la pratique
  - Ils ont estimé que la liberté nécessitait un retour aux structures économiques plus simples de l'époque médiévale
explanation: |
  Les penseurs des Lumières, en particulier les physiocrates comme Turgot et les philosophes comme Condorcet, ont fait l'observation cruciale que la liberté fonctionne en pratique dans les nouvelles circonstances économiques de leur époque. Contrairement à l'époque médiévale où la libre concurrence semblait impraticable en raison des monopoles locaux, l'émergence du commerce mondial au XVIIIe siècle a créé des conditions dans lesquelles la liberté commerciale pouvait équilibrer les prix et fournir des biens à moindre coût. Il ne s'agissait pas de théories abstraites, mais d'une reconnaissance pratique de réalités changeantes.
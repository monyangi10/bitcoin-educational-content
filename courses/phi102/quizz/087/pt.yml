question: De acordo com os filósofos do Iluminismo, que ideia fundamental tinham eles sobre a relação entre a liberdade e as condições económicas?
answer: Reconheceram que a liberdade funciona eficazmente nas novas condições económicas do seu tempo
wrong_answers:
  - Acreditavam que a liberdade só poderia ser alcançada através do derrube revolucionário e violento dos sistemas existentes
  - Concluíram que a liberdade era um ideal abstrato que nunca poderia ser implementado na prática
  - Determinaram que a liberdade exigia um regresso às estruturas económicas mais simples da época medieval
explanation: |
  Os pensadores do Iluminismo, em particular os fisiocratas como Turgot e filósofos como Condorcet, fizeram a observação crucial de que a liberdade funciona na prática sob as novas circunstâncias económicas da sua época. Ao contrário dos tempos medievais, em que a livre concorrência parecia impraticável devido aos monopólios locais, o comércio global emergente do século XVIII criou condições em que a liberdade comercial podia equilibrar os preços e fornecer bens a custos mais baixos. Não se tratava de uma teorização abstrata, mas do reconhecimento prático de realidades em mudança.
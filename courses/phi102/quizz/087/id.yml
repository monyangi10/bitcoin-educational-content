question: Menurut para filsuf Pencerahan, wawasan mendasar apa yang mereka miliki tentang hubungan kebebasan dengan kondisi ekonomi?
answer: Mereka menyadari bahwa kebebasan berfungsi secara efektif dalam kondisi ekonomi baru di zaman mereka
wrong_answers:
  - Mereka percaya bahwa kebebasan hanya dapat dicapai melalui penggulingan revolusioner dengan kekerasan terhadap sistem yang ada
  - Mereka menyimpulkan bahwa kebebasan adalah cita-cita abstrak yang tidak akan pernah bisa diimplementasikan secara praktis
  - Mereka memutuskan bahwa kebebasan membutuhkan kembalinya struktur ekonomi yang lebih sederhana pada abad pertengahan
explanation: |
  Para pemikir Pencerahan, khususnya para fisiokrat seperti Turgot dan filsuf seperti Condorcet, membuat pengamatan penting bahwa kebebasan benar-benar bekerja dalam praktiknya di bawah kondisi ekonomi baru pada zaman mereka. Tidak seperti pada abad pertengahan ketika persaingan bebas tampak tidak praktis karena adanya monopoli lokal, perdagangan global yang muncul pada abad ke-18 menciptakan kondisi di mana kebebasan komersial dapat menyeimbangkan harga dan menyediakan barang dengan biaya yang lebih rendah. Ini bukanlah teori abstrak tetapi pengakuan praktis atas realitas yang berubah.
question: Minkä perustavanlaatuisen oivalluksen valistusfilosofit tekivät vapauden suhteesta taloudellisiin olosuhteisiin?
answer: He tunnustivat, että vapaus toimii tehokkaasti heidän aikansa uusissa taloudellisissa olosuhteissa
wrong_answers:
  - He uskoivat, että vapaus voidaan saavuttaa vain vallankumouksellisella väkivaltaisella vallankumouksellisella vallankumouksella, joka kaataa olemassa olevat järjestelmät
  - He päättelivät, että vapaus oli abstrakti ihanne, jota ei koskaan voitu toteuttaa käytännössä
  - He päättivät, että vapaus edellytti paluuta keskiajan yksinkertaisempiin taloudellisiin rakenteisiin
explanation: |
  Valistusajattelijat, erityisesti fysiokraatit, kuten Turgot, ja filosofit, kuten Condorcet, tekivät ratkaisevan havainnon siitä, että vapaus todella toimii käytännössä heidän aikakautensa uusissa taloudellisissa olosuhteissa. Toisin kuin keskiajalla, jolloin vapaa kilpailu vaikutti epäkäytännölliseltä paikallisten monopolien vuoksi, 1700-luvulla kehittyvä maailmanlaajuinen kaupankäynti loi olosuhteet, joissa kaupallinen vapaus saattoi tasapainottaa hintoja ja tarjota tavaroita halvemmalla. Tämä ei ollut abstraktia teoretisointia vaan muuttuvien realiteettien käytännön tunnustamista.
question: Jakie fundamentalne spostrzeżenia mieli filozofowie oświecenia na temat związku wolności z warunkami ekonomicznymi?
answer: Uznali oni, że wolność funkcjonuje skutecznie w nowych warunkach ekonomicznych ich czasów
wrong_answers:
  - Wierzyli, że wolność można osiągnąć tylko poprzez gwałtowne rewolucyjne obalenie istniejących systemów
  - Doszli do wniosku, że wolność była abstrakcyjnym ideałem, którego nigdy nie można było praktycznie wdrożyć
  - Uznali oni, że wolność wymaga powrotu do prostszych struktur gospodarczych z czasów średniowiecza
explanation: |
  Myśliciele oświeceniowi, w szczególności fizjokraci tacy jak Turgot i filozofowie tacy jak Condorcet, dokonali kluczowej obserwacji, że wolność faktycznie działa w praktyce w nowych okolicznościach gospodarczych ich epoki. W przeciwieństwie do czasów średniowiecza, kiedy wolna konkurencja wydawała się niepraktyczna ze względu na lokalne monopole, w XVIII wieku wyłaniający się globalny handel stworzył warunki, w których wolność handlowa mogła zrównoważyć ceny i dostarczać towary po niższych kosztach. Nie było to abstrakcyjne teoretyzowanie, ale praktyczne rozpoznanie zmieniającej się rzeczywistości.
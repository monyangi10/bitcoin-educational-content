question: Jaký zásadní poznatek měli osvícenští filozofové o vztahu svobody a ekonomických podmínek?
answer: Uvědomovali si, že svoboda účinně funguje v nových ekonomických podmínkách své doby
wrong_answers:
  - Věřili, že svobody lze dosáhnout pouze násilným revolučním svržením stávajících systémů
  - Došli k závěru, že svoboda je abstraktní ideál, který nelze nikdy prakticky realizovat
  - Usoudili, že svoboda vyžaduje návrat k jednodušším ekonomickým strukturám středověku
explanation: |
  Osvícenští myslitelé, zejména fyziokraté jako Turgot a filozofové jako Condorcet, učinili zásadní zjištění, že svoboda v nových ekonomických podmínkách jejich doby skutečně funguje. Na rozdíl od středověku, kdy se volná soutěž zdála být kvůli místním monopolům nepraktická, vytvořil vznikající globální obchod v 18. století podmínky, v nichž mohla obchodní svoboda vyrovnávat ceny a poskytovat zboží s nižšími náklady. Nešlo o abstraktní teoretizování, ale o praktické poznání měnící se reality.
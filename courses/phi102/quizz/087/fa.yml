question: طبق نظر فیلسوفان روشنگری، چه بینش بنیادی‌ای درباره رابطه آزادی با شرایط اقتصادی داشتند؟
answer: آن‌ها دریافتند که آزادی در شرایط اقتصادی جدید زمان آن‌ها به‌طور مؤثری عمل می‌کند.
wrong_answers:
  - آن‌ها معتقد بودند که آزادی تنها از طریق سرنگونی انقلابی خشونت‌آمیز سیستم‌های موجود قابل دستیابی است.
  - آن‌ها نتیجه گرفتند که آزادی یک ایده‌آل انتزاعی است که هرگز نمی‌تواند به‌طور عملی اجرا شود.
  - آن‌ها تعیین کردند که آزادی نیازمند بازگشت به ساختارهای اقتصادی ساده‌تر دوران قرون وسطی است.
explanation: |
  اندیشمندان عصر روشنگری، به ویژه فیزیوکرات‌هایی مانند تورگو و فیلسوفانی مانند کندورسه، مشاهده مهمی داشتند که آزادی در عمل تحت شرایط اقتصادی جدید دوران آن‌ها کار می‌کند. برخلاف دوران قرون وسطی که رقابت آزاد به دلیل انحصارات محلی غیرعملی به نظر می‌رسید، تجارت جهانی نوظهور قرن هجدهم شرایطی را ایجاد کرد که در آن آزادی تجاری می‌توانست قیمت‌ها را متعادل کند و کالاها را با هزینه‌های کمتری ارائه دهد. این نظریه‌پردازی انتزاعی نبود بلکه شناخت عملی از واقعیت‌های در حال تغییر بود.
question: Welche grundlegende Erkenntnis hatten die Philosophen der Aufklärung über das Verhältnis von Freiheit und wirtschaftlichen Bedingungen?
answer: Sie erkannten, dass Freiheit unter den neuen wirtschaftlichen Bedingungen ihrer Zeit effektiv funktioniert
wrong_answers:
  - Sie glaubten, dass Freiheit nur durch einen gewaltsamen revolutionären Umsturz der bestehenden Systeme erreicht werden könne
  - Sie kamen zu dem Schluss, dass die Freiheit ein abstraktes Ideal ist, das niemals praktisch umgesetzt werden kann
  - Sie stellten fest, dass die Freiheit eine Rückkehr zu den einfacheren Wirtschaftsstrukturen des Mittelalters erforderte
explanation: |
  Die Denker der Aufklärung, insbesondere die Physiokraten wie Turgot und Philosophen wie Condorcet, machten die entscheidende Beobachtung, dass die Freiheit unter den neuen wirtschaftlichen Bedingungen ihrer Zeit in der Praxis tatsächlich funktioniert. Anders als im Mittelalter, als der freie Wettbewerb aufgrund lokaler Monopole unpraktisch schien, schuf der aufkommende globale Handel des 18. Jahrhunderts Bedingungen, unter denen die kommerzielle Freiheit die Preise ausgleichen und Waren zu niedrigeren Kosten anbieten konnte. Dies war keine abstrakte Theorie, sondern eine praktische Anerkennung der sich verändernden Realitäten.
question: Prema filozofima prosvetiteljstva, koji su imali fundamentalni uvid o odnosu slobode prema ekonomskim uslovima?
answer: Prepoznali su da sloboda efikasno funkcioniše u novim ekonomskim uslovima njihovog vremena.
wrong_answers:
  - Verovali su da se sloboda može postići samo nasilnim revolucionarnim rušenjem postojećih sistema.
  - Zaključili su da je sloboda apstraktni ideal koji se nikada ne može praktično sprovesti.
  - Odredili su da sloboda zahteva povratak jednostavnijim ekonomskim strukturama srednjovekovnih vremena.
explanation: |
  Prosvetitelji, posebno fiziokrati poput Turgota i filozofi poput Kondorsea, napravili su ključnu opservaciju da sloboda zapravo funkcioniše u praksi pod novim ekonomskim okolnostima njihovog doba. Za razliku od srednjeg veka kada je slobodna konkurencija delovala nepraktično zbog lokalnih monopola, globalna trgovina koja se pojavila u 18. veku stvorila je uslove u kojima je komercijalna sloboda mogla da balansira cene i obezbedi robu po nižim troškovima. Ovo nije bilo apstraktno teoretisanje već praktično prepoznavanje promenljivih stvarnosti.
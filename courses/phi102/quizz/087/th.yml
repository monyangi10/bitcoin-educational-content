question: ตามที่นักปรัชญายุคเรืองปัญญา พวกเขามีความเข้าใจพื้นฐานอะไรเกี่ยวกับความสัมพันธ์ระหว่างเสรีภาพกับสภาพเศรษฐกิจ?
answer: พวกเขาตระหนักว่าเสรีภาพทำงานได้อย่างมีประสิทธิภาพในสภาพเศรษฐกิจใหม่ของยุคสมัยของพวกเขา
wrong_answers:
  - พวกเขาเชื่อว่าเสรีภาพสามารถบรรลุได้ผ่านการโค่นล้มระบบที่มีอยู่ด้วยการปฏิวัติที่รุนแรงเท่านั้น
  - พวกเขาสรุปว่าเสรีภาพเป็นอุดมคติที่เป็นนามธรรมซึ่งไม่สามารถนำไปปฏิบัติได้จริง
  - พวกเขาตัดสินใจว่าเสรีภาพต้องการการกลับไปสู่โครงสร้างเศรษฐกิจที่เรียบง่ายของยุคกลาง
explanation: |
  นักคิดยุคเรืองปัญญา โดยเฉพาะกลุ่มฟิสิโอเครตอย่าง Turgot และนักปรัชญาอย่าง Condorcet ได้สังเกตเห็นอย่างสำคัญว่าเสรีภาพสามารถทำงานได้จริงภายใต้สภาพเศรษฐกิจใหม่ในยุคของพวกเขา แตกต่างจากยุคกลางที่การแข่งขันเสรีดูเหมือนจะไม่สามารถทำได้เนื่องจากการผูกขาดในท้องถิ่น การค้าระหว่างประเทศที่เกิดขึ้นในศตวรรษที่ 18 ได้สร้างเงื่อนไขที่เสรีภาพทางการค้าสามารถปรับสมดุลราคาและจัดหาสินค้าในราคาที่ต่ำลง นี่ไม่ใช่การทฤษฎีเชิงนามธรรม แต่เป็นการยอมรับความเป็นจริงที่เปลี่ยนแปลงไปอย่างปฏิบัติจริง
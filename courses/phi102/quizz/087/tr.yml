question: Aydınlanma filozoflarına göre, özgürlüğün ekonomik koşullarla ilişkisi hakkında hangi temel kavrayışa sahiptiler?
answer: Özgürlüğün kendi zamanlarının yeni ekonomik koşullarında etkin bir şekilde işlediğini fark ettiler
wrong_answers:
  - Özgürlüğün ancak mevcut sistemlerin şiddet yoluyla devrimci bir şekilde yıkılmasıyla elde edilebileceğine inanıyorlardı
  - Özgürlüğün pratikte asla uygulanamayacak soyut bir ideal olduğu sonucuna vardılar
  - Özgürlüğün ortaçağın daha basit ekonomik yapılarına geri dönmeyi gerektirdiğine karar verdiler
explanation: |
  Aydınlanma düşünürleri, özellikle de Turgot gibi fizyokratlar ve Condorcet gibi filozoflar, çağlarının yeni ekonomik koşulları altında özgürlüğün pratikte gerçekten işe yaradığına dair çok önemli bir gözlemde bulundular. Serbest rekabetin yerel tekeller nedeniyle uygulanamaz göründüğü ortaçağ dönemlerinin aksine, 18. yüzyılda ortaya çıkan küresel ticaret, ticari özgürlüğün fiyatları dengeleyebileceği ve malları daha düşük maliyetlerle sağlayabileceği koşullar yarattı. Bu soyut bir teorileştirme değil, değişen gerçeklerin pratik olarak kabul edilmesiydi.
question: Vilken grundläggande insikt hade upplysningsfilosoferna enligt dem själva om frihetens förhållande till ekonomiska villkor?
answer: De insåg att frihet fungerar effektivt under de nya ekonomiska förhållanden som rådde på deras tid
wrong_answers:
  - De trodde att frihet endast kunde uppnås genom våldsam revolutionär omstörtning av befintliga system
  - De drog slutsatsen att frihet var ett abstrakt ideal som aldrig kunde förverkligas i praktiken
  - De slog fast att frihet krävde en återgång till medeltidens enklare ekonomiska strukturer
explanation: |
  Upplysningstänkarna, i synnerhet fysiokrater som Turgot och filosofer som Condorcet, gjorde den avgörande iakttagelsen att frihet faktiskt fungerar i praktiken under de nya ekonomiska omständigheter som rådde under deras tid. Till skillnad från medeltiden, då fri konkurrens verkade opraktisk på grund av lokala monopol, skapade 1700-talets framväxande globala handel förutsättningar för att den kommersiella friheten skulle kunna balansera priserna och tillhandahålla varor till lägre kostnader. Detta var inte abstrakt teoretiserande utan ett praktiskt erkännande av förändrade realiteter.
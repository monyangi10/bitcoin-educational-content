question: Secondo i filosofi illuministi, quale intuizione fondamentale ebbero sul rapporto tra libertà e condizioni economiche?
answer: Hanno riconosciuto che la libertà funziona efficacemente nelle nuove condizioni economiche del loro tempo
wrong_answers:
  - Credevano che la libertà potesse essere raggiunta solo attraverso un violento rovesciamento rivoluzionario dei sistemi esistenti
  - Concludevano che la libertà era un ideale astratto che non avrebbe mai potuto essere attuato praticamente
  - Hanno stabilito che la libertà richiedeva un ritorno alle strutture economiche più semplici del Medioevo
explanation: |
  I pensatori illuministi, in particolare i fisiocrati come Turgot e i filosofi come Condorcet, fecero l'osservazione cruciale che la libertà funziona effettivamente nella pratica nelle nuove circostanze economiche della loro epoca. A differenza del Medioevo, quando la libera concorrenza sembrava impraticabile a causa dei monopoli locali, nel XVIII secolo l'emergere del commercio globale creava condizioni in cui la libertà commerciale poteva bilanciare i prezzi e fornire beni a costi inferiori. Non si trattava di teorizzazioni astratte, ma del riconoscimento pratico di realtà in evoluzione.
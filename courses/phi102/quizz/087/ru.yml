question: Какое фундаментальное представление о связи свободы с экономическими условиями было у философов эпохи Просвещения?
answer: Они признали, что свобода эффективно функционирует в новых экономических условиях своего времени
wrong_answers:
  - Они считали, что свободы можно достичь только путем насильственного революционного свержения существующих систем
  - Они пришли к выводу, что свобода - это абстрактный идеал, который никогда не может быть практически реализован
  - Они решили, что свобода требует возвращения к более простым экономическим структурам средневековья
explanation: |
  Мыслители эпохи Просвещения, в частности физиократы, такие как Турго, и философы, такие как Кондорсе, сделали важнейшее наблюдение о том, что свобода действительно работает на практике в новых экономических условиях их эпохи. В отличие от средневековья, когда свободная конкуренция казалась непрактичной из-за местных монополий, в XVIII веке зарождающаяся глобальная торговля создала условия, в которых свобода торговли могла сбалансировать цены и обеспечить товары по более низким ценам. Это было не абстрактное теоретизирование, а практическое признание меняющихся реалий.
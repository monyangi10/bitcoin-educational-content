question: Theo các triết gia thời Khai sáng, họ có nhận thức cơ bản nào về mối quan hệ giữa tự do và điều kiện kinh tế?
answer: Họ nhận ra rằng tự do phát huy hiệu quả trong điều kiện kinh tế mới của thời đại họ.
wrong_answers:
  - Họ tin rằng tự do chỉ có thể đạt được thông qua cuộc cách mạng lật đổ bạo lực các hệ thống hiện có.
  - Họ kết luận rằng tự do là một lý tưởng trừu tượng không bao giờ có thể được thực hiện trên thực tế.
  - Họ cho rằng tự do đòi hỏi phải quay trở lại với cấu trúc kinh tế đơn giản hơn của thời trung cổ.
explanation: |
  Các nhà tư tưởng thời Khai sáng, đặc biệt là các nhà kinh tế học theo trường phái trọng nông như Turgot và các triết gia như Condorcet, đã đưa ra nhận định quan trọng rằng tự do thực sự có hiệu quả trong thực tiễn dưới bối cảnh kinh tế mới của thời đại họ. Không giống như thời trung cổ khi cạnh tranh tự do dường như không khả thi do sự độc quyền địa phương, thương mại toàn cầu đang nổi lên vào thế kỷ 18 đã tạo ra các điều kiện để tự do thương mại có thể cân bằng giá cả và cung cấp hàng hóa với chi phí thấp hơn. Đây không phải là lý thuyết trừu tượng mà là sự nhận thức thực tiễn về những thực tế đang thay đổi.
question: 根据自由主义经济理论，自由竞争公正分配社会资源的主要机制是什么？
answer: 它根据个人的经济贡献来奖励个人的生产努力
wrong_answers:
  - 它确保所有社会成员不分努力程度平等分配财富
  - 它通过民主投票机制将资源从富人手中重新分配给穷人
  - 它根据政府对市场的规划和监管分配资源
explanation: |
  该章解释说，自由竞争能够公正地分配资源，因为它奖励个人的生产性努力，创造了一个以功绩为基础的体系，在这个体系中，经济成功与生产性贡献相关联。错误答案歪曲了自由主义理论：平均分配忽视了优点和努力，民主再分配代表了政治方法而非契约交换，政府规划违背了自由市场原则，即竞争自然会有效分配资源。
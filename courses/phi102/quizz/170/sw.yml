question: Kulingana na nadharia ya uchumi huria, ni utaratibu gani mkuu ambao ushindani huru husambaza rasilimali katika jamii kwa haki?
answer: Inazawadia juhudi za uzalishaji za watu binafsi kulingana na michango yao ya kiuchumi
wrong_answers:
  - Inahakikisha usambazaji sawa wa utajiri miongoni mwa wanajamii wote bila kujali juhudi zinazofanywa.
  - Inasambaza rasilimali kutoka kwa matajiri hadi kwa maskini kupitia mifumo ya kidemokrasia ya kupiga kura
  - Inagawa rasilimali kulingana na mipango ya serikali na usimamizi wa udhibiti wa masoko
explanation: |
  Sura hiyo inaelezea kwamba ushindani huru husambaza rasilimali kwa haki kwa sababu huzawadia juhudi za uzalishaji za watu binafsi, na kuunda mfumo unaotegemea sifa ambapo mafanikio ya kiuchumi yanahusiana na mchango wenye tija. Majibu yasiyo sahihi yanapotosha nadharia ya kiliberali: usambazaji sawa hupuuza sifa na juhudi, ugawaji upya wa kidemokrasia unawakilisha mbinu ya kisiasa badala ya ubadilishanaji wa mikataba, na mipango ya serikali inapingana na kanuni ya soko huria kwamba ushindani hugawa rasilimali kwa ufanisi kiasili.
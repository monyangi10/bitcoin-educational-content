question: Според либералната икономическа теория кой е основният механизъм, чрез който свободната конкуренция справедливо разпределя ресурсите в обществото?
answer: Тя възнаграждава продуктивните усилия на хората въз основа на техния икономически принос
wrong_answers:
  - Тя осигурява равномерно разпределение на богатството между всички членове на обществото, независимо от усилията им
  - Преразпределя ресурсите от богатите към бедните чрез демократични механизми за гласуване
  - Той разпределя ресурсите въз основа на правителственото планиране и регулаторния надзор на пазарите
explanation: |
  В главата се обяснява, че свободната конкуренция разпределя ресурсите справедливо, тъй като възнаграждава продуктивните усилия на хората, създавайки система, основана на заслугите, в която икономическият успех е свързан с продуктивния принос. Грешните отговори представят погрешно либералната теория: равното разпределение игнорира заслугите и усилията, демократичното преразпределение представлява политически метод, а не договорна размяна, а държавното планиране противоречи на принципа на свободния пазар, според който конкуренцията естествено разпределя ресурсите ефективно.
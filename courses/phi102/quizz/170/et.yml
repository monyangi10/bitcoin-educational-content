question: Milline on liberaalse majandusteooria kohaselt peamine mehhanism, mille kaudu vaba konkurents jaotab õiglaselt ressursse ühiskonnas?
answer: See premeerib üksikisikute tootlikke jõupingutusi nende majandusliku panuse alusel
wrong_answers:
  - See tagab jõukuse võrdse jaotuse kõigi ühiskonnaliikmete vahel, sõltumata pingutustest
  - See jaotab ressursse ümber rikkadelt vaestele demokraatlike hääletusmehhanismide kaudu
  - See jaotab ressursse valitsuse planeerimise ja turgude regulatiivse järelevalve alusel
explanation: |
  Peatükis selgitatakse, et vaba konkurents jaotab ressursse õiglaselt, sest see premeerib üksikisikute produktiivseid jõupingutusi, luues teenetel põhineva süsteemi, kus majanduslik edu korreleerub produktiivse panusega. Väärad vastused moonutavad liberaalset teooriat: võrdne jaotamine eirab teeneid ja jõupingutusi, demokraatlik ümberjaotamine esindab pigem poliitilist meetodit kui lepingulist vahetust ning valitsuse planeerimine on vastuolus vaba turu põhimõttega, et konkurents jaotab ressursse loomulikult tõhusalt.
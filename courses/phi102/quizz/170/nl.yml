question: Wat is volgens de liberale economische theorie het belangrijkste mechanisme waardoor vrije concurrentie de middelen in de samenleving rechtvaardig verdeelt?
answer: Het beloont de productieve inspanningen van individuen op basis van hun economische bijdragen
wrong_answers:
  - Het zorgt voor een gelijke verdeling van rijkdom onder alle leden van de samenleving, ongeacht de inspanning
  - Het herverdeelt middelen van de rijken naar de armen via democratische stemmechanismen
  - Het wijst middelen toe op basis van overheidsplanning en regulerend toezicht op markten
explanation: |
  Het hoofdstuk legt uit dat vrije concurrentie middelen rechtvaardig verdeelt omdat het productieve inspanningen van individuen beloont, waardoor een op verdienste gebaseerd systeem ontstaat waarin economisch succes correleert met productieve bijdrage. De foute antwoorden geven een verkeerd beeld van de liberale theorie: gelijke verdeling negeert verdienste en inspanning, democratische herverdeling vertegenwoordigt de politieke methode in plaats van contractuele uitwisseling en overheidsplanning is in tegenspraak met het vrije marktprincipe dat concurrentie middelen op natuurlijke wijze efficiënt toewijst.
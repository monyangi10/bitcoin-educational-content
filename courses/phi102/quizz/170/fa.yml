question: بر اساس نظریه اقتصادی لیبرال، مکانیزم اصلی که از طریق آن رقابت آزاد منابع را به طور عادلانه در جامعه توزیع می‌کند چیست؟
answer: این به تلاش‌های مولد افراد بر اساس مشارکت‌های اقتصادی آن‌ها پاداش می‌دهد.
wrong_answers:
  - این امر توزیع عادلانه ثروت را در میان همه اعضای جامعه بدون توجه به تلاش تضمین می‌کند.
  - این منابع را از ثروتمندان به فقرا از طریق مکانیزم‌های رأی‌گیری دموکراتیک بازتوزیع می‌کند.
  - این منابع را بر اساس برنامه‌ریزی دولتی و نظارت مقرراتی بر بازارها تخصیص می‌دهد.
explanation: |
  این فصل توضیح می‌دهد که رقابت آزاد منابع را به‌طور عادلانه توزیع می‌کند زیرا تلاش‌های تولیدی افراد را پاداش می‌دهد و سیستمی مبتنی بر شایستگی ایجاد می‌کند که در آن موفقیت اقتصادی با مشارکت تولیدی همبستگی دارد. پاسخ‌های نادرست نظریه لیبرال را نادرست نشان می‌دهند: توزیع برابر شایستگی و تلاش را نادیده می‌گیرد، توزیع مجدد دموکراتیک روش سیاسی را به‌جای تبادل قراردادی نشان می‌دهد، و برنامه‌ریزی دولتی با اصل بازار آزاد که رقابت به‌طور طبیعی منابع را به‌طور کارآمد تخصیص می‌دهد، در تضاد است.
question: Согласно либеральной экономической теории, что является основным механизмом, с помощью которого свободная конкуренция справедливо распределяет ресурсы в обществе?
answer: Вознаграждает продуктивные усилия людей на основе их экономического вклада
wrong_answers:
  - Обеспечивает равное распределение богатства между всеми членами общества независимо от их усилий
  - Перераспределяет ресурсы от богатых к бедным с помощью демократических механизмов голосования
  - Он распределяет ресурсы, основываясь на государственном планировании и регулятивном надзоре за рынками
explanation: |
  В главе объясняется, что свободная конкуренция справедливо распределяет ресурсы, поскольку вознаграждает продуктивные усилия людей, создавая систему, основанную на заслугах, где экономический успех коррелирует с продуктивным вкладом. Неправильные ответы искажают либеральную теорию: равное распределение игнорирует заслуги и усилия, демократическое перераспределение представляет собой политический метод, а не договорной обмен, а государственное планирование противоречит принципу свободного рынка, согласно которому конкуренция естественным образом эффективно распределяет ресурсы.
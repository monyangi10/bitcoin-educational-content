question: Was ist nach der liberalen Wirtschaftstheorie der wichtigste Mechanismus, durch den der freie Wettbewerb die Ressourcen in der Gesellschaft gerecht verteilt?
answer: Sie belohnt die produktiven Anstrengungen des Einzelnen auf der Grundlage seines wirtschaftlichen Beitrags
wrong_answers:
  - Sie sorgt für eine gleichmäßige Verteilung des Wohlstands unter allen Mitgliedern der Gesellschaft, unabhängig von der Anstrengung
  - Durch demokratische Abstimmungsmechanismen werden Ressourcen von den Reichen zu den Armen umverteilt
  - Sie weist die Ressourcen auf der Grundlage staatlicher Planung und regulatorischer Aufsicht über die Märkte zu
explanation: |
  Das Kapitel erklärt, dass der freie Wettbewerb die Ressourcen gerecht verteilt, weil er die produktiven Anstrengungen des Einzelnen belohnt und ein leistungsorientiertes System schafft, in dem wirtschaftlicher Erfolg mit produktivem Beitrag korreliert. Die falschen Antworten stellen die liberale Theorie falsch dar: Gleiche Verteilung ignoriert Verdienst und Anstrengung, demokratische Umverteilung repräsentiert die politische Methode und nicht den vertraglichen Austausch, und staatliche Planung widerspricht dem Prinzip des freien Marktes, dass der Wettbewerb die Ressourcen auf natürliche Weise effizient verteilt.
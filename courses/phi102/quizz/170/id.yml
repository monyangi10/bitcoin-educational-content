question: Menurut teori ekonomi liberal, apa mekanisme utama yang melaluinya persaingan bebas mendistribusikan sumber daya secara adil di masyarakat?
answer: Ini menghargai upaya produktif individu berdasarkan kontribusi ekonomi mereka
wrong_answers:
  - Hal ini memastikan distribusi kekayaan yang merata di antara semua anggota masyarakat tanpa memandang usaha
  - Ini mendistribusikan kembali sumber daya dari yang kaya kepada yang miskin melalui mekanisme pemungutan suara yang demokratis
  - Mengalokasikan sumber daya berdasarkan perencanaan pemerintah dan pengawasan regulasi pasar
explanation: |
  Bab ini menjelaskan bahwa persaingan bebas mendistribusikan sumber daya secara adil karena memberikan penghargaan atas upaya produktif individu, menciptakan sistem berbasis prestasi di mana keberhasilan ekonomi berkorelasi dengan kontribusi produktif. Jawaban yang salah menggambarkan teori liberal: distribusi yang merata mengabaikan prestasi dan usaha, redistribusi demokratis lebih mewakili metode politik daripada pertukaran kontrak, dan perencanaan pemerintah bertentangan dengan prinsip pasar bebas bahwa persaingan secara alami mengalokasikan sumber daya secara efisien.
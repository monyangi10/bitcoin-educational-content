question: 자유주의 경제 이론에 따르면, 자유 경쟁이 사회에서 자원을 공정하게 분배하는 주요 메커니즘은 무엇인가요?
answer: 경제적 기여도에 따라 개인의 생산적 노력을 보상합니다
wrong_answers:
  - 노력에 관계없이 모든 사회 구성원에게 균등한 부의 분배를 보장합니다
  - 민주적인 투표 메커니즘을 통해 부유층에서 빈곤층으로 자원을 재분배합니다
  - 정부 계획과 시장에 대한 규제 감독을 기반으로 리소스를 할당합니다
explanation: |
  이 장에서는 자유 경쟁이 개인의 생산적 노력에 보상하기 때문에 자원을 공정하게 분배하고, 경제적 성공이 생산적 기여와 연관되는 능력 기반 시스템을 만든다고 설명합니다. 오답은 평등 분배는 능력과 노력을 무시하고, 민주적 재분배는 계약 교환이 아닌 정치적 방법을 의미하며, 정부 계획은 경쟁이 자연스럽게 자원을 효율적으로 배분한다는 자유 시장 원칙에 모순된다는 자유주의 이론을 잘못 표현한 것입니다.
question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม กลไกหลักที่การแข่งขันเสรีกระจายทรัพยากรในสังคมอย่างยุติธรรมคืออะไร?
answer: มันให้รางวัลแก่ความพยายามที่มีประสิทธิผลของบุคคลตามการมีส่วนร่วมทางเศรษฐกิจของพวกเขา
wrong_answers:
  - มันรับประกันการกระจายความมั่งคั่งอย่างเท่าเทียมกันในหมู่สมาชิกทุกคนของสังคมโดยไม่คำนึงถึงความพยายาม
  - มันกระจายทรัพยากรจากคนรวยไปยังคนจนผ่านกลไกการลงคะแนนเสียงแบบประชาธิปไตย
  - มันจัดสรรทรัพยากรตามการวางแผนของรัฐบาลและการกำกับดูแลตลาด
explanation: |
  บทนี้อธิบายว่าการแข่งขันเสรีจัดสรรทรัพยากรอย่างยุติธรรมเพราะมันให้รางวัลแก่ความพยายามที่มีประสิทธิผลของบุคคล สร้างระบบที่อิงตามความสามารถที่ความสำเร็จทางเศรษฐกิจสัมพันธ์กับการมีส่วนร่วมที่มีประสิทธิผล คำตอบที่ผิดแสดงให้เห็นทฤษฎีเสรีนิยมในทางที่ผิด: การกระจายที่เท่าเทียมกันไม่สนใจความสามารถและความพยายาม การกระจายใหม่ในระบอบประชาธิปไตยแสดงถึงวิธีการทางการเมืองมากกว่าการแลกเปลี่ยนตามสัญญา และการวางแผนของรัฐบาลขัดแย้งกับหลักการตลาดเสรีที่การแข่งขันจัดสรรทรัพยากรอย่างมีประสิทธิภาพตามธรรมชาติ
question: Theo lý thuyết kinh tế tự do, cơ chế chính mà thông qua đó cạnh tranh tự do phân phối nguồn lực một cách công bằng trong xã hội là gì?
answer: Nó tưởng thưởng cho những nỗ lực sản xuất của cá nhân dựa trên những đóng góp kinh tế của họ.
wrong_answers:
  - Nó đảm bảo sự phân phối của cải công bằng giữa tất cả các thành viên trong xã hội bất kể nỗ lực của họ.
  - Nó phân phối lại nguồn lực từ người giàu sang người nghèo thông qua các cơ chế bỏ phiếu dân chủ.
  - Nó phân bổ nguồn lực dựa trên kế hoạch của chính phủ và sự giám sát quy định của thị trường.
explanation: |
  Chương này giải thích rằng cạnh tranh tự do phân phối nguồn lực một cách công bằng vì nó tưởng thưởng cho những nỗ lực sản xuất của các cá nhân, tạo ra một hệ thống dựa trên thành tích, trong đó thành công kinh tế tương quan với đóng góp sản xuất. Các câu trả lời sai đã xuyên tạc lý thuyết tự do: phân phối bình đẳng bỏ qua thành tích và nỗ lực, phân phối lại dân chủ thể hiện phương pháp chính trị chứ không phải trao đổi theo hợp đồng, và kế hoạch hóa của chính phủ mâu thuẫn với nguyên tắc thị trường tự do rằng cạnh tranh tự nhiên phân bổ nguồn lực một cách hiệu quả.
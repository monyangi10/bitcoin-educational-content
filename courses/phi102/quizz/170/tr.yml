question: Liberal ekonomi teorisine göre, serbest rekabetin toplumdaki kaynakları adil bir şekilde dağıttığı temel mekanizma nedir?
answer: Bireylerin üretken çabalarını ekonomik katkılarına göre ödüllendirir
wrong_answers:
  - Servetin toplumun tüm üyeleri arasında çaba gözetmeksizin eşit dağılımını sağlar
  - Demokratik oylama mekanizmaları aracılığıyla kaynakları zenginlerden yoksullara doğru yeniden dağıtır
  - Kaynakları, hükümet planlamasına ve piyasaların düzenleyici gözetimine dayalı olarak tahsis eder
explanation: |
  Bu bölüm, serbest rekabetin kaynakları adil bir şekilde dağıttığını, çünkü bireylerin üretken çabalarını ödüllendirdiğini ve ekonomik başarının üretken katkı ile ilişkili olduğu liyakate dayalı bir sistem yarattığını açıklamaktadır. Yanlış cevaplar liberal teoriyi yanlış temsil etmektedir: eşit dağıtım liyakat ve çabayı göz ardı eder, demokratik yeniden dağıtım sözleşmeye dayalı mübadeleden ziyade siyasi yöntemi temsil eder ve hükümet planlaması rekabetin doğal olarak kaynakları verimli bir şekilde tahsis ettiği serbest piyasa ilkesiyle çelişir.
question: De acordo com a teoria económica liberal, qual é o principal mecanismo através do qual a livre concorrência distribui de forma justa os recursos na sociedade?
answer: Recompensa os esforços produtivos dos indivíduos com base nas suas contribuições económicas
wrong_answers:
  - Assegura a distribuição equitativa da riqueza entre todos os membros da sociedade, independentemente do esforço
  - Redistribui recursos dos ricos para os pobres através de mecanismos democráticos de votação
  - Atribui recursos com base no planeamento governamental e na supervisão regulamentar dos mercados
explanation: |
  O capítulo explica que a livre concorrência distribui os recursos de forma justa porque recompensa os esforços produtivos dos indivíduos, criando um sistema baseado no mérito em que o sucesso económico está relacionado com a contribuição produtiva. As respostas erradas representam mal a teoria liberal: a distribuição equitativa ignora o mérito e o esforço, a redistribuição democrática representa o método político e não a troca contratual e o planeamento governamental contradiz o princípio do mercado livre, segundo o qual a concorrência afecta naturalmente os recursos de forma eficiente.
question: De acordo com a análise de Bastiat, o que distingue a abordagem do economista liberal para combater os sofismas económicos da capacidade da população em geral para identificar esses argumentos falaciosos?
answer: Os economistas liberais têm de assinalar e demonstrar ativamente as inconsistências lógicas, porque a população em geral não consegue reconhecer espontaneamente estes sofismas, apesar da sua natureza óbvia para observadores treinados
wrong_answers:
  - Os economistas liberais baseiam-se em modelos matemáticos, enquanto a população em geral utiliza o raciocínio intuitivo para identificar as mesmas falácias económicas com igual eficácia
  - Os economistas liberais concentram-se em abstracções teóricas, enquanto a população em geral identifica naturalmente os sofismas através da experiência prática nas transacções económicas diárias
  - Os economistas liberais e a população em geral utilizam métodos idênticos, mas diferem apenas nas suas motivações políticas para expor ou esconder estas falácias económicas
explanation: |
  Bastiat sublinha que, embora os economistas com formação possam reconhecer facilmente os sofismas económicos, a população em geral não identifica espontaneamente estes argumentos falaciosos. Isto cria um papel crucial para os economistas liberais, que devem apontar ativamente os erros factuais e as falhas lógicas no raciocínio sobre a sociedade, a troca e a produção. As outras opções sugerem incorretamente uma capacidade igual entre grupos ou abordagens metodológicas diferentes, quando a questão de Bastiat é especificamente sobre a necessidade de intervenção de peritos para educar contra argumentos sofisticados mas enganadores que sustentam sistemas que se opõem à liberdade económica.
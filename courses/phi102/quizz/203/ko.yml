question: 바스티아의 분석에 따르면, 경제적 궤변에 맞서 싸우는 자유주의 경제학자의 접근 방식과 이러한 잘못된 주장을 식별하는 일반 대중의 능력은 어떤 점에서 차이가 있을까요?
answer: 자유주의 경제학자들은 훈련 된 관찰자에게는 명백한 특성에도 불구하고 일반 대중이 이러한 궤변을 자발적으로 인식 할 수 없기 때문에 논리적 모순을 적극적으로 알리고 입증해야합니다
wrong_answers:
  - 자유주의 경제학자들은 수학적 모델에 의존하는 반면, 일반 대중은 직관적 추론을 통해 동일한 경제적 오류를 동일한 효과로 식별합니다
  - 자유주의 경제학자들은 이론적 추상화에 집중하는 반면, 일반 대중은 일상적인 경제 거래의 실제 경험을 통해 자연스럽게 정교함을 식별합니다
  - 자유주의 경제학자와 일반 대중은 동일한 방법을 사용하지만 이러한 경제적 오류를 폭로하거나 은폐하려는 정치적 동기가 다를 뿐입니다
explanation: |
  바스티아트는 훈련된 경제학자들은 경제적 궤변을 쉽게 알아차릴 수 있지만, 일반 대중은 이러한 잘못된 주장을 자발적으로 식별하지 못한다고 강조합니다. 따라서 사회, 교환, 생산에 관한 추론에서 사실적 오류와 논리적 결함을 적극적으로 지적하는 자유주의 경제학자의 역할이 중요해집니다. 다른 옵션은 그룹 간의 동등한 능력이나 다른 방법론적 접근 방식을 잘못 제안하는데, 특히 경제적 자유에 반대하는 시스템을 유지하는 정교하지만 기만적인 주장에 맞서 교육하기 위해 전문가의 개입이 필요하다는 것이 바스티아의 요점입니다.
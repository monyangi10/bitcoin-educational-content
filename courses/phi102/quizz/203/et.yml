question: Mis eristab Bastiat' analüüsi kohaselt liberaalse majandusteadlase lähenemist majanduslike sofismide vastu võitlemisel elanikkonna võimest neid ekslikke argumente tuvastada?
answer: Liberaalsed majandusteadlased peavad aktiivselt märku andma ja näitama loogilisi vastuolusid, sest elanikkond ei suuda spontaanselt ära tunda neid sofisme, vaatamata nende ilmselgusele koolitatud vaatlejatele
wrong_answers:
  - Liberaalsed majandusteadlased tuginevad matemaatilistele mudelitele, samas kui elanikkond kasutab intuitiivset mõtlemist, et tuvastada samu majanduslikke eksimusi sama tõhusalt
  - Liberaalsed majandusteadlased keskenduvad teoreetilistele abstraktsioonidele, samal ajal kui elanikkond tuvastab sofismid loomulikult igapäevaste majandustehingute praktilise kogemuse kaudu
  - Liberaalsed majandusteadlased ja elanikkond kasutavad identseid meetodeid, kuid erinevad ainult oma poliitiliste motivatsioonide poolest nende majanduslike eksituste paljastamiseks või varjamiseks
explanation: |
  Bastiat rõhutab, et kuigi koolitatud majandusteadlased suudavad kergesti ära tunda majanduslikud sofismid, ei tunne elanikkond neid ekslikke argumente spontaanselt ära. See loob liberaalsetele majandusteadlastele otsustava rolli, et nad aktiivselt osutaksid faktilistele vigadele ja loogilistele puudustele ühiskonda, vahetust ja tootmist käsitlevates arutlustes. Teised valikud viitavad ekslikult kas võrdsetele võimetele rühmade vahel või erinevatele metodoloogilistele lähenemisviisidele, kuigi Bastiat'i mõte on konkreetselt selles, et ekspertide sekkumine on vajalik, et harida vastu keerukatele, kuid petlikele argumentidele, mis toetavad majandusvabaduse vastaseid süsteeme.
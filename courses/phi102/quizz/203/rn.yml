question: Dushingiye ku nseguro ya Bastiat, ni igiki gitandukanya uburyo umuhinga mu vy’ubutunzi w’umunyagihugu akoresha mu kurwanya ubupfumu bw’ubutunzi n’ubushobozi bw’abanyagihugu muri rusangi bwo kumenya izo mpamvu zitari zo?
answer: Abahinga mu vy’ubutunzi b’abanyagihugu bategerezwa gutanga ikimenyetso no kwerekana n’umwete ukudahuza kw’ubwenge kubera ko abantu muri rusangi badashobora kwemera ubwabo ivyo bihimba vy’umubiri naho bigaragara ku bavyihweza bamenyerejwe .
wrong_answers:
  - Abahinga mu vy’ubutunzi b’abanyagihugu bizigira ivyerekanwa vy’imibare mu gihe abantu bose bakoresha ivyiyumviro bitaboneka kugira ngo bamenye amakosa amwe amwe y’ubutunzi afise akamaro kangana .
  - Abahinga mu vy’ubutunzi b’abanyagihugu bibanda ku bintu bitaboneka mu gihe abantu muri rusangi bamenya ubuhinga bushasha biciye mu bumenyi buboneka mu bikorwa vy’ubutunzi vya misi yose .
  - Abahinga mu vy’ubutunzi b’abanyagihugu n’abanyagihugu muri rusangi bakoresha uburyo bumwe ariko batandukanye gusa mu bijanye n’imvo za politike zo gushira ahabona canke guhisha ayo makosa y’ubutunzi .
explanation: |
  Bastiat ashimika ku vy’uko naho abahinga mu vy’ubutunzi bamenyerejwe bashobora kwemera bitagoranye ubupfumu bw’ubutunzi, abantu muri rusangi ntibamenya ubwabo izo mpamvu zitari zo. Ivyo bituma abahinga mu vy’ubutunzi bafise uburenganzira bwo kwerekana n’umwete amakosa y’ukuri n’amakosa yumvikana mu gutekereza ku bijanye n’imibano, uguhinduranya n’uguhingura. Ibindi bihitamwo bivuga nabi ko ubushobozi bungana hagati y’imigwi canke uburyo butandukanye bwo gukora, mu gihe iciyumviro ca Bastiat kivuga canecane ko bikenewe ko abahinga bagira ico bakoze kugira ngo bigishe kurwanya imvo zikomeye ariko zihenda zishigikira uburyo burwanya umwidegemvyo w’ubutunzi.
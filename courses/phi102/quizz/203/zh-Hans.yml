question: 根据巴斯蒂亚的分析，自由派经济学家打击经济诡辩的方法与普通人识别这些谬论的能力有何不同？
answer: 自由派经济学家必须积极发出信号，展示逻辑上的前后矛盾，因为尽管这些诡辩对训练有素的观察者来说是显而易见的，但一般人却无法自发地识别出来
wrong_answers:
  - 自由派经济学家依赖数学模型，而普通人则利用直觉推理来识别同样的经济谬误，而且效果相同
  - 自由主义经济学家专注于理论抽象，而普通民众则通过日常经济交易中的实际经验自然而然地识别出诡辩
  - 自由派经济学家和普通民众使用相同的方法，不同的只是他们揭露或掩盖这些经济谬误的政治动机而已
explanation: |
  巴斯蒂亚强调，虽然训练有素的经济学家很容易识别经济学上的诡辩，但普通民众并不能自发地识别这些谬论。这就需要自由主义经济学家发挥关键作用，积极指出有关社会、交换和生产的推理中的事实错误和逻辑缺陷。巴斯蒂亚的观点特别强调需要专家干预，以教育人们反对那些维持反对经济自由制度的复杂但具有欺骗性的论点。
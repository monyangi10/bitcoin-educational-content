question: Ni ingingo ngenderwako iyihe y’ishimikiro itandukanya intererano yemewe n’imisoro idasanzwe hakurikijwe inyigisho y’ubutunzi y’ubwigenge?
answer: Intererano igereranya uguhanahana ku bushake aho abanyagihugu baronka ibikorwa vyihariye mu gusubiza ivyo barishe .
wrong_answers:
  - Intererano ikusanyirizwa gusa ku banyagihugu batunze mu gihe imisoro ikoreshwa ku mice yose y’imibano kimwe .
  - Intererano igenwa n'itora rya demokarasi mu gihe imisoro itegekwa n'abanyabiro batatowe .
  - Intererano irihwa mu bicuruzwa no mu bikorwa mu gihe umusoro utegerezwa kurihwa mu buryo bw’amahera gusa .
explanation: |
  Ico gice gishinga intahe ko intererano yemewe ikora nk’uguhinduranya ubushake aho abanyagihugu bariha ibikorwa vy’urusangi vyihariye nk’inkiko n’abapolisi bituma haba umutekano w’ibikorwa n’ubuzima bw’amahoro. Ivyo bisa n’ugugura hamwe n’intumbero itomoye y’ugutanga igikorwa ku kwishura. Ku rundi ruhande, ugusoresha ataco bimaze, kuva ku ciyumviro c’uko umukuru w’igihugu ari we afise amatongo yose n’abarongowe, agashiraho ibirego bishingiye ku bushake bwa politike aho gushingira ku gutanga ibikorwa. Ayandi mahitamwo yerekana nabi itandukaniro ry’ishimikiro, ryishimikije uguhinduranya ubushake n’ubutegetsi butegetswe.
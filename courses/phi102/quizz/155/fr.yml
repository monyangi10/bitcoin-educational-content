question: Quel principe fondamental distingue une contribution légitime d'une imposition arbitraire selon la théorie économique libérale ?
answer: La contribution représente un échange volontaire où les citoyens reçoivent des services spécifiques en échange de leur paiement
wrong_answers:
  - La contribution n'est perçue qu'auprès des citoyens aisés, alors que l'impôt s'applique à toutes les classes sociales de la même manière
  - La contribution est déterminée par un vote démocratique tandis que la taxation est imposée par des bureaucrates non élus
  - La contribution est versée sous forme de biens et de services, tandis que l'impôt doit être payé exclusivement sous forme monétaire
explanation: |
  Le chapitre établit que la contribution légitime fonctionne comme un échange volontaire où les citoyens paient pour des services collectifs spécifiques tels que les tribunaux et la police qui garantissent la sécurité des transactions et une vie sociale paisible. Cela ressemble à un achat collectif avec une logique claire de service contre paiement. L'imposition arbitraire, à l'inverse, découle d'une conception selon laquelle le souverain possède toutes les terres et tous les sujets, imposant des charges en fonction de la volonté politique plutôt que de la prestation de services. Les autres options dénaturent la distinction fondamentale, qui est centrée sur l'échange volontaire par opposition à la domination imposée.
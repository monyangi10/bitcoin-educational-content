question: Theo lý thuyết kinh tế tự do, nguyên tắc cơ bản nào phân biệt khoản đóng góp hợp pháp với việc đánh thuế tùy tiện?
answer: Đóng góp là một hình thức trao đổi tự nguyện, trong đó người dân nhận được các dịch vụ cụ thể để đổi lấy khoản phí mà họ đóng.
wrong_answers:
  - Chỉ những công dân giàu có mới đóng góp tài chính trong khi thuế má áp dụng bình đẳng cho mọi tầng lớp xã hội.
  - Mức đóng góp được quyết định bằng bỏ phiếu dân chủ, trong khi thuế được áp đặt bởi các quan chức không do dân bầu.
  - Khoản đóng góp được thanh toán bằng hàng hóa và dịch vụ, trong khi thuế phải được thanh toán hoàn toàn bằng tiền mặt.
explanation: |
  Chương này khẳng định rằng đóng góp hợp pháp hoạt động như một sự trao đổi tự nguyện, trong đó công dân trả tiền cho các dịch vụ tập thể cụ thể như tòa án và cảnh sát, những dịch vụ đảm bảo an ninh giao dịch và đời sống xã hội hòa bình. Điều này giống với một hình thức mua tập thể với logic dịch vụ đổi lấy thanh toán rõ ràng. Ngược lại, thuế tùy tiện bắt nguồn từ quan niệm cho rằng nhà nước sở hữu tất cả đất đai và thần dân, áp đặt các khoản phí theo ý chí chính trị chứ không phải dựa trên việc cung cấp dịch vụ. Các lựa chọn khác đã xuyên tạc sự khác biệt cơ bản, vốn tập trung vào sự trao đổi tự nguyện so với sự thống trị áp đặt.
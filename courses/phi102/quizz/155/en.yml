question: What fundamental principle distinguishes a legitimate contribution from arbitrary taxation according to liberal economic theory?
answer: Contribution represents a voluntary exchange where citizens receive specific services in return for their payment
wrong_answers:
  - Contribution is collected only from wealthy citizens while taxation applies to all social classes equally
  - Contribution is determined by democratic vote while taxation is imposed by unelected bureaucrats
  - Contribution is paid in goods and services while taxation must be paid exclusively in monetary form
explanation: |
  The chapter establishes that legitimate contribution operates like a voluntary exchange where citizens pay for specific collective services such as courts and police that ensure transaction security and peaceful social life. This resembles a collective purchase with clear service-for-payment logic. Arbitrary taxation, conversely, stems from a conception where the sovereign owns all lands and subjects, imposing charges according to political will rather than service provision. The other options misrepresent the fundamental distinction, which centers on voluntary exchange versus imposed domination.

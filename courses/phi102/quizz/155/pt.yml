question: Que princípio fundamental distingue uma contribuição legítima de uma tributação arbitrária, de acordo com a teoria económica liberal?
answer: A contribuição representa uma troca voluntária em que os cidadãos recebem serviços específicos em troca do seu pagamento
wrong_answers:
  - A contribuição é cobrada apenas aos cidadãos ricos, enquanto a tributação se aplica igualmente a todas as classes sociais
  - A contribuição é determinada pelo voto democrático, enquanto a tributação é imposta por burocratas não eleitos
  - A contribuição é paga em bens e serviços, enquanto a tributação deve ser paga exclusivamente em dinheiro
explanation: |
  O capítulo estabelece que a contribuição legítima funciona como uma troca voluntária em que os cidadãos pagam por serviços colectivos específicos, como os tribunais e a polícia, que garantem a segurança das transacções e uma vida social pacífica. Isto assemelha-se a uma compra colectiva com uma lógica clara de serviço contra pagamento. A tributação arbitrária, pelo contrário, deriva de uma conceção em que o soberano é proprietário de todas as terras e súbditos, impondo taxas de acordo com a vontade política e não com a prestação de serviços. As outras opções deturpam a distinção fundamental, que se centra na troca voluntária versus dominação imposta.
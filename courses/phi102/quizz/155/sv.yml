question: Vilken grundläggande princip skiljer ett legitimt bidrag från godtycklig beskattning enligt liberal ekonomisk teori?
answer: Bidraget är ett frivilligt utbyte där medborgarna får specifika tjänster i utbyte mot betalning
wrong_answers:
  - Avgifter tas endast ut från rika medborgare medan beskattning gäller lika för alla samhällsklasser
  - Bidraget bestäms genom demokratisk omröstning medan beskattning införs av icke valda byråkrater
  - Bidrag betalas i form av varor och tjänster medan skatt måste betalas uteslutande i monetär form
explanation: |
  I kapitlet konstateras att legitima bidrag fungerar som ett frivilligt utbyte där medborgarna betalar för specifika kollektiva tjänster som domstolar och polis som säkerställer transaktionssäkerhet och ett fredligt socialt liv. Detta liknar ett kollektivt köp med en tydlig logik där man betalar för en tjänst. Godtycklig beskattning, å andra sidan, härrör från en uppfattning där suveränen äger all mark och alla undersåtar och påför avgifter i enlighet med politisk vilja snarare än tillhandahållande av tjänster. De andra alternativen ger en felaktig bild av den grundläggande distinktionen, som handlar om frivilligt utbyte kontra påtvingad dominans.
question: Quale principio fondamentale distingue un contributo legittimo da una tassazione arbitraria secondo la teoria economica liberale?
answer: Il contributo rappresenta uno scambio volontario in cui i cittadini ricevono servizi specifici in cambio del loro pagamento
wrong_answers:
  - I contributi vengono riscossi solo dai cittadini più abbienti, mentre la tassazione si applica a tutte le classi sociali in egual misura
  - Il contributo è determinato da un voto democratico, mentre la tassazione è imposta da burocrati non eletti
  - Il contributo viene versato in beni e servizi, mentre la tassazione deve essere pagata esclusivamente in forma monetaria
explanation: |
  Il capitolo stabilisce che il contributo legittimo funziona come uno scambio volontario in cui i cittadini pagano per specifici servizi collettivi, come tribunali e polizia, che garantiscono la sicurezza delle transazioni e una vita sociale pacifica. Questo assomiglia a un acquisto collettivo con una chiara logica di servizio in cambio di pagamento. La tassazione arbitraria, al contrario, deriva da una concezione in cui il sovrano possiede tutte le terre e i sudditi, imponendo tasse in base alla volontà politica piuttosto che alla fornitura di servizi. Le altre opzioni travisano la distinzione fondamentale, che è incentrata sullo scambio volontario rispetto al dominio imposto.
question: Milline aluspõhimõte eristab liberaalse majandusteooria kohaselt õiguspärase maksu omavolilisest maksustamisest?
answer: Panus kujutab endast vabatahtlikku vahetust, mille puhul kodanikud saavad tasu eest konkreetseid teenuseid
wrong_answers:
  - Sissemakseid kogutakse ainult jõukatelt kodanikelt, samas kui maksud kehtivad kõigile ühiskonnaklassidele võrdselt
  - Sissemaksed määratakse demokraatliku hääletuse teel, samas kui maksustamise kehtestavad valimata bürokraadid
  - Sissemakseid makstakse kaupade ja teenustega, samas kui maksud tuleb tasuda üksnes rahalises vormis
explanation: |
  Peatükis sätestatakse, et seaduslik panus toimib nagu vabatahtlik vahetus, kus kodanikud maksavad konkreetsete kollektiivsete teenuste eest, nagu kohtud ja politsei, mis tagavad tehingu turvalisuse ja rahumeelse ühiskondliku elu. See meenutab kollektiivset ostu, millel on selge teenuse tasumise loogika. Meelevaldne maksustamine tuleneb seevastu kontseptsioonist, kus suverään omab kõiki maid ja subjekte, kehtestades makse pigem poliitilise tahte kui teenuse osutamise järgi. Teised valikud moonutavad põhilist vahetust, mille keskmes on vabatahtlik vahetus ja pealesunnitud domineerimine.
question: Mikä perusperiaate erottaa liberaalin talousteorian mukaan oikeutetun maksun mielivaltaisesta verotuksesta?
answer: Maksu on vapaaehtoinen vaihto, jossa kansalaiset saavat maksua vastaan tiettyjä palveluja
wrong_answers:
  - Maksuja kerätään vain varakkailta kansalaisilta, kun taas verotus koskee kaikkia yhteiskuntaluokkia tasapuolisesti
  - Maksut määräytyvät demokraattisen äänestyksen perusteella, kun taas verotuksen määräävät valitsemattomat byrokraatit
  - Maksu suoritetaan tavaroina ja palveluina, kun taas vero on maksettava yksinomaan rahana
explanation: |
  Luvussa todetaan, että laillinen maksuosuus toimii vapaaehtoisen vaihdon tapaan, jossa kansalaiset maksavat tietyistä kollektiivisista palveluista, kuten tuomioistuimista ja poliisista, joilla varmistetaan liiketoimien turvallisuus ja rauhallinen yhteiskuntaelämä. Tämä muistuttaa kollektiivista ostoa, jossa on selkeä palvelua maksua vastaan -logiikka. Mielivaltainen verotus sen sijaan juontaa juurensa käsityksestä, jossa suvereeni omistaa kaikki maat ja alamaiset ja perii maksuja pikemminkin poliittisen tahdon kuin palvelujen tarjoamisen mukaan. Muut vaihtoehdot vääristelevät perustavanlaatuista eroa, joka keskittyy vapaaehtoiseen vaihtoon ja määrättyyn hallintaan.
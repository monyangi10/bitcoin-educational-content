question: Jaký základní princip odlišuje legitimní příspěvek od svévolného zdanění podle liberální ekonomické teorie?
answer: Příspěvek představuje dobrovolnou směnu, kdy občané za svou platbu dostávají konkrétní služby
wrong_answers:
  - Příspěvky se vybírají pouze od bohatých občanů, zatímco zdanění se týká všech sociálních vrstev stejně
  - Příspěvek je stanoven demokratickým hlasováním, zatímco zdanění ukládají nevolení byrokraté
  - Příspěvek se platí ve formě zboží a služeb, zatímco daně se musí platit výhradně v penězích
explanation: |
  Kapitola stanoví, že legitimní příspěvek funguje jako dobrovolná směna, kdy občané platí za konkrétní kolektivní služby, jako jsou soudy a policie, které zajišťují bezpečnost transakcí a klidný společenský život. To se podobá kolektivnímu nákupu s jasnou logikou služby za platbu. Svévolné zdanění naopak vychází z koncepce, kdy panovník vlastní všechny pozemky a poddané a ukládá poplatky spíše podle politické vůle než podle poskytování služeb. Ostatní možnosti zkreslují základní rozdíl, který se soustřeďuje na dobrovolnou směnu versus vnucenou nadvládu.
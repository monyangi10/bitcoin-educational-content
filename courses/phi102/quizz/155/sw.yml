question: Ni kanuni gani ya msingi inayotofautisha mchango halali na kodi isiyo ya kiholela kulingana na nadharia ya uchumi huria?
answer: Mchango unawakilisha ubadilishanaji wa hiari ambapo raia hupokea huduma maalum badala ya malipo yao
wrong_answers:
  - Mchango hukusanywa kutoka kwa raia matajiri pekee huku ushuru ukitumika kwa matabaka yote ya kijamii kwa usawa
  - Mchango huamuliwa kwa kura ya kidemokrasia huku ushuru ukitozwa na watendaji wasiochaguliwa
  - Mchango hulipwa katika bidhaa na huduma huku ushuru ukipaswa kulipwa kwa njia ya pesa pekee
explanation: |
  Sura hiyo inathibitisha kwamba mchango halali unafanya kazi kama ubadilishaji wa hiari ambapo raia hulipa huduma maalum za pamoja kama vile mahakama na polisi zinazohakikisha usalama wa miamala na maisha ya kijamii yenye amani. Hii inafanana na ununuzi wa pamoja wenye mantiki iliyo wazi ya huduma-kwa-malipo. Kinyume chake, kodi holela hutokana na dhana ambapo mtawala anamiliki ardhi na raia wote, akitoza ada kulingana na utashi wa kisiasa badala ya utoaji wa huduma. Chaguzi zingine zinapotosha tofauti ya msingi, ambayo inajikita katika ubadilishaji wa hiari dhidi ya utawala uliowekwa.
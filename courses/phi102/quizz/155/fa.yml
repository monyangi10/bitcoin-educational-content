question: کدام اصل بنیادی، یک مشارکت مشروع را از مالیات‌گیری خودسرانه بر اساس نظریه اقتصادی لیبرال متمایز می‌کند؟
answer: مشارکت نمایانگر یک تبادل داوطلبانه است که در آن شهروندان در ازای پرداخت خود خدمات خاصی دریافت می‌کنند.
wrong_answers:
  - مشارکت فقط از شهروندان ثروتمند جمع‌آوری می‌شود در حالی که مالیات به طور مساوی برای همه طبقات اجتماعی اعمال می‌شود.
  - مشارکت با رأی‌گیری دموکراتیک تعیین می‌شود در حالی که مالیات توسط بوروکرات‌های غیرمنتخب تحمیل می‌شود.
  - مشارکت به صورت کالا و خدمات پرداخت می‌شود در حالی که مالیات باید به صورت انحصاری به شکل پولی پرداخت شود.
explanation: |
  این فصل بیان می‌کند که مشارکت مشروع مانند یک مبادله داوطلبانه عمل می‌کند که در آن شهروندان برای خدمات جمعی خاصی مانند دادگاه‌ها و پلیس که امنیت معاملات و زندگی اجتماعی مسالمت‌آمیز را تضمین می‌کنند، پرداخت می‌کنند. این شبیه به یک خرید جمعی با منطق واضح خدمات در برابر پرداخت است. مالیات‌گیری خودسرانه، برعکس، از مفهومی ناشی می‌شود که در آن حاکم مالک تمام زمین‌ها و اتباع است و بر اساس اراده سیاسی و نه ارائه خدمات، هزینه‌ها را تحمیل می‌کند. گزینه‌های دیگر تمایز اساسی را که بر مبادله داوطلبانه در مقابل سلطه تحمیلی متمرکز است، نادرست نشان می‌دهند.
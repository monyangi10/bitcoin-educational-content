question: Was haben die Physiokraten über die neuen Umstände des globalen Handels im 18. Jahrhundert gezeigt?
answer: Diese Umstände erforderten die unternehmerische Freiheit, die Preise auszugleichen und die Waren zu den niedrigsten Kosten zu beschaffen
wrong_answers:
  - Dass diese Umstände eine staatliche Regulierung zum Schutz der einheimischen Hersteller vor ausländischer Konkurrenz erforderlich machten
  - Diese Umstände erforderten die Beibehaltung mittelalterlicher Zunftsysteme, um eine Qualitätskontrolle zu gewährleisten
  - Dass diese Umstände eine Beschränkung des Handels erforderlich machten, um die nationalen Ressourcen und den Wohlstand zu erhalten
explanation: |
  Die Physiokraten beobachteten die Entstehung des Welthandels im 18. Jahrhundert und zeigten, dass diese neuen wirtschaftlichen Bedingungen Handelsfreiheit erforderten. Dies war eine Abkehr von den mittelalterlichen Praktiken, bei denen lokale Produzenten (wie Bäcker in kleinen Städten) Märkte reserviert hatten und die Verbraucher beherrschten. Die Physiokraten zeigten, dass der freie Handel es den Marktkräften ermöglichen würde, die Preise auszugleichen und die Verbraucher in die Lage zu versetzen, Waren zu den geringstmöglichen Kosten zu erwerben, was die Handelsfreiheit nicht nur ideologisch wünschenswert, sondern in der neuen globalen Wirtschaft praktisch notwendig machte.
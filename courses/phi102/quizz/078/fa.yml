question: فیزیوکرات‌ها درباره شرایط جدید تجارت جهانی در قرن هجدهم چه نشان دادند؟
answer: که این شرایط نیاز به آزادی تجاری برای متعادل کردن قیمت‌ها و به‌دست‌آوردن کالاها با کمترین هزینه داشت.
wrong_answers:
  - که این شرایط نیاز به تنظیم مقررات دولتی داشت تا تولیدکنندگان محلی را از رقابت خارجی محافظت کند
  - که این شرایط نیاز به حفظ سیستم‌های صنفی قرون وسطایی برای اطمینان از کنترل کیفیت داشت
  - که این شرایط نیاز به محدود کردن تجارت برای حفظ منابع و ثروت ملی داشت
explanation: |
  فیزیوکرات‌ها شاهد تولد تجارت جهانی در قرن هجدهم بودند و نشان دادند که این شرایط اقتصادی جدید نیازمند آزادی تجاری است. این یک انحراف از شیوه‌های قرون وسطایی بود که در آن تولیدکنندگان محلی (مانند نانوایان در شهرهای کوچک) بازارهای محفوظی داشتند و بر مصرف‌کنندگان تسلط داشتند. فیزیوکرات‌ها نشان دادند که تجارت آزاد به نیروهای بازار اجازه می‌دهد تا قیمت‌ها را متعادل کنند و به مصرف‌کنندگان امکان می‌دهد کالاها را با کمترین هزینه ممکن به دست آورند، و آزادی تجاری را نه تنها از نظر ایدئولوژیک مطلوب بلکه از نظر عملی در اقتصاد جهانی جدید ضروری می‌سازد.
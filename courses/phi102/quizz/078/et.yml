question: Mida näitasid füsiokraadid 18. sajandi globaalse kaubanduse uute asjaolude kohta?
answer: Et need asjaolud nõuavad kaubanduslikku vabadust, et tasakaalustada hindu ja hankida kaupu kõige madalamate kuludega
wrong_answers:
  - Et need asjaolud nõuavad valitsuse reguleerimist, et kaitsta kohalikke tootjaid välismaise konkurentsi eest
  - Et need asjaolud nõudsid keskaegsete kildkondade süsteemide säilitamist, et tagada kvaliteedikontroll
  - Et need asjaolud nõudsid kaubanduse piiramist, et säilitada riiklikke ressursse ja rikkust
explanation: |
  Füsiokraadid jälgisid ülemaailmse kaubanduse sündi 18. sajandil ja näitasid, et need uued majanduslikud tingimused nõuavad kaubandusvabadust. See oli erinevus keskaegsetest tavadest, kus kohalikel tootjatel (nagu pagarid väikelinnades) olid turud reserveeritud ja nad domineerisid tarbijate üle. Füsiokraadid näitasid, et vaba kaubandus võimaldab turujõududel tasakaalustada hindu ja võimaldada tarbijatel saada kaupu võimalikult odavalt, mistõttu kaubandusvabadus ei ole uues maailmamajanduses mitte ainult ideoloogiliselt soovitav, vaid praktiliselt vajalik.
question: Šta su fiziokrati pokazali o novim okolnostima globalne trgovine u 18. veku?
answer: Da su ove okolnosti zahtevale komercijalnu slobodu kako bi se uravnotežile cene i roba nabavila po najnižoj ceni
wrong_answers:
  - Da su ove okolnosti zahtevale regulaciju vlade kako bi se zaštitili lokalni proizvođači od strane konkurencije
  - Da su ove okolnosti zahtevale održavanje srednjovekovnih esnafskih sistema kako bi se osigurala kontrola kvaliteta
  - Da su ove okolnosti zahtevale ograničavanje trgovine kako bi se očuvali nacionalni resursi i bogatstvo
explanation: |
  Fiziokrate su posmatrale rađanje globalne trgovine u 18. veku i pokazale da su ovi novi ekonomski uslovi zahtevali komercijalnu slobodu. Ovo je bilo odstupanje od srednjovekovnih praksi gde su lokalni proizvođači (poput pekara u malim gradovima) imali rezervisana tržišta i dominirali potrošačima. Fiziokrate su pokazale da bi slobodna trgovina omogućila tržišnim silama da balansiraju cene i omoguće potrošačima da dobiju robu po najnižoj mogućoj ceni, čineći komercijalnu slobodu ne samo ideološki poželjnom već i praktično neophodnom u novoj globalnoj ekonomiji.
question: Co ukázali fyziokraté o nových podmínkách světového obchodu 18. století?
answer: Že tyto okolnosti vyžadují obchodní svobodu, aby bylo možné vyrovnat ceny a získat zboží za nejnižší náklady
wrong_answers:
  - Že tyto okolnosti vyžadují vládní regulaci na ochranu místních výrobců před zahraniční konkurencí
  - Tyto okolnosti vyžadovaly zachování středověkých cechovních systémů pro zajištění kontroly kvality
  - Tyto okolnosti vyžadovaly omezení obchodu, aby se zachovaly národní zdroje a bohatství
explanation: |
  Fyziokraté sledovali zrod světového obchodu v 18. století a ukázali, že tyto nové ekonomické podmínky vyžadují obchodní svobodu. To byl odklon od středověké praxe, kdy si místní výrobci (například pekaři v malých městech) vyhrazovali trhy a ovládali spotřebitele. Fyziokraté ukázali, že svobodný obchod umožní tržním silám vyrovnat ceny a umožní spotřebitelům získat zboží za co nejnižší cenu, takže obchodní svoboda je v nové globální ekonomice nejen ideologicky žádoucí, ale i prakticky nezbytná.
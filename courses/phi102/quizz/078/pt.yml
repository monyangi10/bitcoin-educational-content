question: O que é que os fisiocratas demonstraram sobre as novas circunstâncias do comércio global do século XVIII?
answer: Que estas circunstâncias exigiam liberdade comercial para equilibrar os preços e obter bens ao menor custo
wrong_answers:
  - Que estas circunstâncias exigiam regulamentação governamental para proteger os produtores locais da concorrência estrangeira
  - Que estas circunstâncias exigiam a manutenção de sistemas de corporações medievais para garantir o controlo da qualidade
  - Que estas circunstâncias exigiam a restrição das trocas comerciais para preservar os recursos e as riquezas nacionais
explanation: |
  Os fisiocratas observaram o nascimento do comércio global no século XVIII e demonstraram que estas novas condições económicas exigiam a liberdade comercial. Esta situação afastava-se das práticas medievais em que os produtores locais (como os padeiros das pequenas cidades) tinham mercados reservados e dominavam os consumidores. Os fisiocratas mostraram que o comércio livre permitiria que as forças de mercado equilibrassem os preços e permitissem que os consumidores obtivessem bens ao menor custo possível, tornando a liberdade comercial não só ideologicamente desejável mas também praticamente necessária na nova economia global.
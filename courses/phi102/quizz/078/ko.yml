question: 18세기 세계 상업의 새로운 환경에 대해 피히스토텔레스는 무엇을 증명했을까요?
answer: 이러한 상황에서는 가격 균형을 맞추고 최저 비용으로 상품을 확보할 수 있는 상업적 자유가 필요했습니다
wrong_answers:
  - 이러한 상황에서 해외 경쟁으로부터 국내 생산자를 보호하기 위해 정부 규제가 필요했습니다
  - 이러한 상황에서 품질 관리를 위해 중세 길드 시스템을 유지해야 했습니다
  - 이러한 상황으로 인해 국가 자원과 부를 보존하기 위해 무역을 제한해야 했습니다
explanation: |
  피히스토텔레스는 18세기 세계 상업의 탄생을 목격하고 이러한 새로운 경제 상황에 상업적 자유가 필요하다는 것을 증명했습니다. 이는 소도시의 제빵사처럼 지역 생산자가 시장을 독점하고 소비자를 지배하던 중세의 관행에서 벗어난 것이었습니다. 피히스토텔레스는 자유 무역을 통해 시장의 힘으로 가격 균형을 맞추고 소비자가 가능한 최저 비용으로 상품을 구매할 수 있게 함으로써 상업적 자유가 이념적으로 바람직할 뿐만 아니라 새로운 글로벌 경제에서 실질적으로 필요하다는 것을 보여주었습니다.
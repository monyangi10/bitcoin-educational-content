question: What did the physiocrates demonstrate about the new circumstances of 18th century global commerce?
answer: That these circumstances required commercial freedom to balance prices and obtain goods at the lowest cost
wrong_answers:
  - That these circumstances required government regulation to protect local producers from foreign competition
  - That these circumstances required maintaining medieval guild systems to ensure quality control
  - That these circumstances required restricting trade to preserve national resources and wealth
explanation: |
  The physiocrates observed the birth of global commerce in the 18th century and demonstrated that these new economic conditions necessitated commercial freedom. This was a departure from medieval practices where local producers (like bakers in small towns) had reserved markets and dominated consumers. The physiocrates showed that free trade would allow market forces to balance prices and enable consumers to obtain goods at the lowest possible cost, making commercial liberty not just ideologically desirable but practically necessary in the new global economy.

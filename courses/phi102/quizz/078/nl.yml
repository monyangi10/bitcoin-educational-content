question: Wat toonden de fysiocraten aan over de nieuwe omstandigheden van de 18e-eeuwse wereldwijde handel?
answer: Dat deze omstandigheden commerciële vrijheid vereisten om prijzen te balanceren en goederen tegen de laagste kosten te verkrijgen
wrong_answers:
  - Dat deze omstandigheden overheidsregulering vereisten om lokale producenten te beschermen tegen buitenlandse concurrentie
  - Dat deze omstandigheden het handhaven van middeleeuwse gilde systemen vereisten om kwaliteitscontrole te garanderen
  - Dat deze omstandigheden het noodzakelijk maakten om de handel te beperken om nationale hulpbronnen en rijkdom te behouden
explanation: |
  De fysiocraten observeerden het ontstaan van de wereldhandel in de 18e eeuw en toonden aan dat deze nieuwe economische omstandigheden commerciële vrijheid noodzakelijk maakten. Dit was een breuk met de middeleeuwse praktijken waarbij lokale producenten (zoals bakkers in kleine steden) markten hadden gereserveerd en consumenten domineerden. De fysiocraten toonden aan dat vrije handel marktkrachten in staat zou stellen om prijzen in evenwicht te brengen en consumenten in staat zou stellen om goederen tegen de laagst mogelijke kosten te verkrijgen, waardoor commerciële vrijheid niet alleen ideologisch wenselijk maar ook praktisch noodzakelijk werd in de nieuwe wereldeconomie.
question: Physiocrates walionyesha nini kuhusu hali mpya za biashara ya kimataifa ya karne ya 18?
answer: Kwamba hali hizi zilihitaji uhuru wa kibiashara kusawazisha bei na kupata bidhaa kwa gharama ya chini kabisa
wrong_answers:
  - Kwamba hali hizi zilihitaji kanuni za serikali ili kuwalinda wazalishaji wa ndani kutokana na ushindani wa kigeni
  - Kwamba hali hizi zilihitaji kudumisha mifumo ya vyama vya enzi za kati ili kuhakikisha udhibiti wa ubora
  - Kwamba hali hizi zilihitaji kuzuia biashara ili kuhifadhi rasilimali na utajiri wa taifa
explanation: |
  Physiocrates waliona kuzaliwa kwa biashara ya kimataifa katika karne ya 18 na walionyesha kwamba hali hizi mpya za kiuchumi zilihitaji uhuru wa kibiashara. Hii ilikuwa tofauti na desturi za enzi za kati ambapo wazalishaji wa ndani (kama waokaji mikate katika miji midogo) walikuwa na masoko yaliyotengwa na kutawala watumiaji. Physiocrates walionyesha kwamba biashara huria ingeruhusu nguvu za soko kusawazisha bei na kuwawezesha watumiaji kupata bidhaa kwa gharama ya chini kabisa, na kufanya uhuru wa kibiashara sio tu unaohitajika kiitikadi bali pia kuwa muhimu katika uchumi mpya wa dunia.
question: Что продемонстрировали физиократы в новых условиях глобальной торговли XVIII века?
answer: Эти обстоятельства требуют свободы коммерческой деятельности, чтобы сбалансировать цены и получить товары по наименьшей стоимости
wrong_answers:
  - Что эти обстоятельства требовали государственного регулирования для защиты местных производителей от иностранной конкуренции
  - Эти обстоятельства требовали сохранения средневековых систем гильдий для обеспечения контроля качества
  - Что эти обстоятельства требуют ограничения торговли для сохранения национальных ресурсов и богатств
explanation: |
  Физиократы наблюдали за рождением глобальной торговли в XVIII веке и показали, что новые экономические условия требуют свободы торговли. Это был отход от средневековой практики, когда местные производители (например, пекари в небольших городах) занимали свои рынки и доминировали над потребителями. Физиократы показали, что свободная торговля позволит рыночным силам сбалансировать цены и даст возможность потребителям получать товары по минимально возможным ценам, что делает коммерческую свободу не только идеологически желательной, но и практически необходимой в новой глобальной экономике.
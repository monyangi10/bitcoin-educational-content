question: Šta je Charles Dunoyer pokazao o razvoju slobode kroz različite istorijske periode?
answer: Ta sloboda je progresivna konstrukcija i mi smo slobodniji u industrijskim društvima nego u prethodnim erama.
wrong_answers:
  - Ta sloboda je bila najveća u drevnim vremenima i opala je sa modernom civilizacijom.
  - Ta sloboda je ostala konstantna kroz istoriju bez obzira na tehnološki napredak
  - Ta sloboda postoji samo u primitivnim društvima pre nego što su moderna institucije korumpirane.
explanation: |
  Charles Dunoyer je pokazao da sloboda predstavlja progresivnu konstrukciju kroz istoriju. On je pokazao da smo slobodniji u industrijskim društvima nego u feudalnim društvima, slobodniji pod feudalizmom nego pod drevnim ropstvom, i slobodniji pod ropstvom nego u praistorijskim vremenima. Ovo direktno protivreči romantičnim predstavama o izgubljenim zlatnim dobima ili primitivnoj slobodi. Drugi odgovori odražavaju mitove koje su liberalni mislioci sistematski opovrgavali, kao što je Rousseauov koncept plemenitog divljaka ili ideja da je sloboda statična kroz vremenske periode.
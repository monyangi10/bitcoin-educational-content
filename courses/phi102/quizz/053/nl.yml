question: Wat liet Charles Dunoyer zien over de ontwikkeling van vrijheid in verschillende historische perioden?
answer: Dat vrijheid een progressieve constructie is en dat we in industriële samenlevingen vrijer zijn dan in voorgaande tijdperken
wrong_answers:
  - Die vrijheid was het grootst in de oudheid en is afgenomen met de moderne beschaving
  - Die vrijheid is door de geschiedenis heen constant gebleven, ongeacht de technologische vooruitgang
  - Dat vrijheid alleen bestaat in primitieve samenlevingen vóór de corruptie van moderne instellingen
explanation: |
  Charles Dunoyer toonde aan dat vrijheid door de geschiedenis heen een progressieve constructie is. Hij toonde aan dat we vrijer zijn in industriële samenlevingen dan in feodale samenlevingen, vrijer onder feodalisme dan onder oude slavernij, en vrijer onder slavernij dan in prehistorische tijden. Dit is in tegenspraak met romantische opvattingen over verloren gouden tijden of primitieve vrijheid. De andere antwoorden weerspiegelen mythen die liberale denkers systematisch hebben weerlegd, zoals Rousseau's nobele wilde concept of het idee dat vrijheid statisch is in verschillende tijdsperioden.
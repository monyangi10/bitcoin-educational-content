question: Was hat Charles Dunoyer über die Entwicklung der Freiheit in verschiedenen historischen Epochen gezeigt?
answer: Dass die Freiheit eine fortschrittliche Konstruktion ist und wir in den Industriegesellschaften freier sind als in früheren Epochen
wrong_answers:
  - Diese Freiheit war in der Antike am größten und hat mit der modernen Zivilisation abgenommen
  - Diese Freiheit ist im Laufe der Geschichte unabhängig vom technischen Fortschritt konstant geblieben
  - Dass Freiheit nur in primitiven Gesellschaften vor der Korruption durch moderne Institutionen existiert
explanation: |
  Charles Dunoyer wies nach, dass die Freiheit im Laufe der Geschichte eine fortschreitende Konstruktion darstellt. Er zeigte, dass wir in Industriegesellschaften freier sind als in feudalen Gesellschaften, im Feudalismus freier als in der antiken Sklaverei und in der Sklaverei freier als in prähistorischen Zeiten. Dies steht in direktem Widerspruch zu romantischen Vorstellungen von verlorenen goldenen Zeitaltern oder primitiver Freiheit. Die anderen Antworten spiegeln Mythen wider, die von liberalen Denkern systematisch widerlegt wurden, wie z. B. Rousseaus Konzept des edlen Wilden oder die Vorstellung, dass Freiheit über alle Zeiträume hinweg statisch ist.
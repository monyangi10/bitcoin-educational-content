question: ¿Qué demostró Charles Dunoyer sobre el desarrollo de la libertad en los distintos periodos históricos?
answer: Que la libertad es una construcción progresiva y somos más libres en las sociedades industriales que en épocas anteriores
wrong_answers:
  - Esa libertad era mayor en la antigüedad y ha disminuido con la civilización moderna
  - Esa libertad se ha mantenido constante a lo largo de la historia, independientemente de los avances tecnológicos
  - Que la libertad sólo existe en las sociedades primitivas antes de la corrupción de las instituciones modernas
explanation: |
  Charles Dunoyer demostró que la libertad constituye una construcción progresiva a lo largo de la historia. Demostró que somos más libres en las sociedades industriales que en las feudales, más libres bajo el feudalismo que bajo la antigua esclavitud y más libres bajo la esclavitud que en la prehistoria. Esto contradice directamente las nociones románticas de épocas doradas perdidas o de libertad primitiva. Las demás respuestas reflejan mitos que los pensadores liberales refutaron sistemáticamente, como el concepto de noble salvaje de Rousseau o la idea de que la libertad es estática a través de los periodos de tiempo.
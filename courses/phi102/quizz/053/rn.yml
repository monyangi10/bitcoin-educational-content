question: Ni igiki Charles Dunoyer yerekanye ku bijanye n’iterambere ry’umwidegemvyo mu bihe bitandukanye vy’amateka?
answer: Uwo mwidegemvyo ni inyubakwa itera imbere kandi turafise umwidegemvyo mwinshi mu bihugu vy'inganda kuruta mu bihe vya kera .
wrong_answers:
  - Uwo mwidegemvyo wari munini cane mu bihe vya kera kandi waragabanutse n'ubutekerezi bwa none .
  - Uwo mwidegemvyo wagumyeho muri kahise kose ata kuraba iterambere ry’ubuhinga .
  - Uwo mwidegemvyo ubaho gusa mu mibano ya kera imbere y’uko inzego z’ubu zisenyuka .
explanation: |
  Charles Dunoyer yerekanye ko umwidegemvyo ari inyubako itera imbere mu mateka yose. Yarerekanye ko twidegemvya cane mu bihugu vy’inganda kuruta mu bihugu vy’abanyagihugu, ko twidegemvya cane mu gihe c’ubufeodalite kuruta mu gihe c’ubuja bwa kera, kandi ko twidegemvya cane mu gihe c’ubuja kuruta mu bihe vy’imbere y’amateka. Ivyo biravuguruza ata guca ku ruhande ivyiyumviro vy’urukundo vy’ibihe vy’inzahabu vyatakaye canke umwidegemvyo wa kera. Ibindi bisubizo vyerekana inkuru z’imigani abanyabwenge b’abanyagihugu bahakana mu buryo butunganye, nk’iciyumviro ciza cane c’ubunyamaswa ca Rousseau canke iciyumviro c’uko umwidegemvyo udahinduka mu bihe vyose.
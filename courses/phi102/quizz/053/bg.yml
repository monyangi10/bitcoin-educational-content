question: Какво показва Шарл Дюноар за развитието на свободата в различните исторически периоди?
answer: Свободата е прогресивна конструкция и в индустриалните общества сме по-свободни, отколкото в предишни епохи
wrong_answers:
  - Тази свобода е била най-голяма в древността и е намаляла със съвременната цивилизация
  - Тази свобода е останала постоянна в историята, независимо от технологичния прогрес
  - Свободата съществува само в примитивните общества преди покварата на съвременните институции
explanation: |
  Шарл Дюноайе доказва, че свободата е прогресивна конструкция в историята. Той показа, че сме по-свободни в индустриалните общества, отколкото във феодалните, по-свободни при феодализма, отколкото при древното робство, и по-свободни при робството, отколкото в праисторическите времена. Това е в пряко противоречие с романтичните представи за изгубени златни векове или за примитивна свобода. Другите отговори отразяват митове, които либералните мислители систематично опровергават, като например концепцията на Русо за благородния дивак или идеята, че свободата е статична през различните периоди от време.
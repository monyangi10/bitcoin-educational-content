question: 查尔斯-多诺耶对不同历史时期的自由发展有何论证？
answer: 自由是一种渐进的结构，我们在工业社会中比以往时代更加自由
wrong_answers:
  - 这种自由在古代是最伟大的，随着现代文明的发展而衰落
  - 无论技术如何进步，自由在历史上始终不变
  - 自由只存在于现代制度腐蚀之前的原始社会中
explanation: |
  查尔斯-杜诺尔证明，自由是历史上的一种进步。他表明，我们在工业社会中比在封建社会中更自由，在封建制度下比在古代奴隶制下更自由，在奴隶制下比在史前时代更自由。这直接违背了失落的黄金时代或原始自由的浪漫观念。其他答案反映了自由主义思想家系统地驳斥的神话，如卢梭的贵族野蛮人概念或自由在不同时期是静态的观点。
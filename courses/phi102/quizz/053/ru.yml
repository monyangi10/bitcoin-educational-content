question: Что Шарль Дюнуайе продемонстрировал в отношении развития свободы в разные исторические периоды?
answer: Свобода - это прогрессивная конструкция, и в индустриальных обществах мы более свободны, чем в предыдущие эпохи
wrong_answers:
  - Эта свобода была величайшей в древние времена и уменьшилась с развитием современной цивилизации
  - Эта свобода остается неизменной на протяжении всей истории человечества, независимо от технического прогресса
  - Что свобода существует только в примитивных обществах до разложения современными институтами
explanation: |
  Шарль Дюнойе продемонстрировал, что свобода представляет собой прогрессивную конструкцию на протяжении всей истории. Он показал, что мы более свободны в индустриальных обществах, чем в феодальных, более свободны при феодализме, чем при древнем рабстве, и более свободны при рабстве, чем в доисторические времена. Это прямо противоречит романтическим представлениям о потерянных золотых веках или первобытной свободе. Другие ответы отражают мифы, которые либеральные мыслители систематически опровергали, такие как концепция благородного дикаря Руссо или идея о том, что свобода статична в разные периоды времени.
question: Apa yang ditunjukkan oleh Charles Dunoyer tentang perkembangan kebebasan di berbagai periode sejarah?
answer: Kebebasan itu adalah konstruksi yang progresif dan kita lebih bebas dalam masyarakat industri daripada era sebelumnya
wrong_answers:
  - Kebebasan itu adalah yang terbesar di zaman kuno dan telah menurun seiring dengan peradaban modern
  - Kebebasan itu tetap konstan sepanjang sejarah terlepas dari kemajuan teknologi
  - Kebebasan itu hanya ada di masyarakat primitif sebelum adanya korupsi di lembaga-lembaga modern
explanation: |
  Charles Dunoyer menunjukkan bahwa kebebasan merupakan konstruksi progresif sepanjang sejarah. Dia menunjukkan bahwa kita lebih bebas dalam masyarakat industri daripada masyarakat feodal, lebih bebas di bawah feodalisme daripada di bawah perbudakan kuno, dan lebih bebas di bawah perbudakan daripada di zaman prasejarah. Hal ini secara langsung bertentangan dengan gagasan romantis tentang zaman keemasan yang hilang atau kebebasan primitif. Jawaban-jawaban lain mencerminkan mitos yang secara sistematis dibantah oleh para pemikir liberal, seperti konsep biadab yang mulia dari Rousseau atau gagasan bahwa kebebasan bersifat statis di seluruh periode waktu.
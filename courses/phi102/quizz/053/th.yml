question: ชาร์ลส์ ดันนอยเยอร์แสดงให้เห็นถึงการพัฒนาของเสรีภาพในช่วงประวัติศาสตร์ต่าง ๆ อย่างไร?
answer: เสรีภาพนั้นเป็นการก่อสร้างที่ก้าวหน้าและเรามีเสรีภาพมากขึ้นในสังคมอุตสาหกรรมมากกว่ายุคก่อนหน้า
wrong_answers:
  - เสรีภาพนั้นยิ่งใหญ่ที่สุดในสมัยโบราณและได้ลดลงพร้อมกับอารยธรรมสมัยใหม่
  - เสรีภาพนั้นยังคงไม่เปลี่ยนแปลงตลอดประวัติศาสตร์ไม่ว่าจะมีความก้าวหน้าทางเทคโนโลยีเพียงใด
  - เสรีภาพนั้นมีอยู่เฉพาะในสังคมดั้งเดิมก่อนที่สถาบันสมัยใหม่จะเสื่อมทราม
explanation: |
  ชาร์ลส์ ดันนอยเยอร์ แสดงให้เห็นว่าเสรีภาพเป็นการก่อสร้างที่ก้าวหน้าตลอดประวัติศาสตร์ เขาแสดงให้เห็นว่าเรามีเสรีภาพมากขึ้นในสังคมอุตสาหกรรมมากกว่าในสังคมศักดินา มีเสรีภาพมากขึ้นภายใต้ระบบศักดินามากกว่าภายใต้การเป็นทาสในสมัยโบราณ และมีเสรีภาพมากขึ้นภายใต้การเป็นทาสมากกว่าในยุคก่อนประวัติศาสตร์ ซึ่งขัดแย้งโดยตรงกับแนวคิดโรแมนติกเกี่ยวกับยุคทองที่สูญหายหรือเสรีภาพดั้งเดิม คำตอบอื่น ๆ สะท้อนถึงตำนานที่นักคิดเสรีนิยมได้หักล้างอย่างเป็นระบบ เช่น แนวคิดของรูโซเกี่ยวกับคนป่าผู้สูงส่งหรือแนวคิดที่ว่าเสรีภาพคงที่ตลอดช่วงเวลา
question: Dushingiye ku nseguro y’ico canditswe ku bijanye n’ukudahuza kw’abasosiyalisiti, ni kuki abasosiyalisiti bemera imbibe z’intara hagati y’ibihugu mu gihe banka uburenganzira bw’umuntu ku giti ciwe bwo kuronka umutungo?
answer: Baguma bafunzwe mu vyiyumviro vya kera vy’imiryango aho umutungo rusangi wari uw’iyindi miryango gusa ata kwemera ko uburenganzira bw’umuntu ku giti ciwe bushobora gushika .
wrong_answers:
  - Bemera ko imbibe z’igihugu ari ibintu vy’akameremere mu gihe umutungo w’umuntu ku giti ciwe ari ikintu c’ubuhinga c’imibano kizana ubusumbasumbane .
  - Bavuga ko ubutunzi rusangi bufasha bose mu gihe ubutunzi bw’umuntu ku giti ciwe bujana mu gukoresha nabi umugwi w’abakozi .
  - Bavuga ko ubusegaba bw’intara ari ngombwa kugira ngo umuco uzigame mu gihe umutungo w’abantu ku giti cabo uhungabanya ubumwe bw’abantu .
explanation: |
  Ico canditswe kivuga ko abasosiyalisiti bakiri imbohe z’ivyiyumviro vya kera vy’imiryango aho umutungo rusangi w’ibibanza vyo guhigira wari uw’iyindi miryango gusa. Ivyo birerekana ukuntu bakoresha uburenganzira bw’umutungo mu buryo budahuye - barwanira umutungo rusangi ku rwego rw’igihugu (imipaka n’imipaka) mu gihe banse iyo ngingo nyene y’ubwenge ku rwego rw’umuntu ku giti ciwe. Umwanditsi yerekana ivyo bivuguruzanya mu kwibaza igituma uburenganzira bw’umutungo bukwiye kwubahirizwa ku migwi ariko ntibube ku bantu ku giti cabo, akavuga ko iyo dukurikiye insiguro y’umutungo rusangi gushika ku bice bitobito (ibihugu bitobito, imiryango), ata kabuza tuzoshika ku burenganzira bw’umutungo ku muntu ku giti ciwe. Ibindi bisubizo bigereranya imvo z’abasosiyalisiti rusangi ariko ntibibura ivyiyumviro vy’umuryango vyihariye vyerekanwa muri ico canditswe.
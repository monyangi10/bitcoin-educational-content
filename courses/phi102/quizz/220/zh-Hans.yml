question: 根据课文对社会主义不一致性的分析，为什么社会主义者接受国家之间的领土边界，却拒绝个人财产权？
answer: 他们仍然受困于古代部落的观念，即集体财产对其他部落具有排他性，而不承认个人权利的逻辑延伸
wrong_answers:
  - 他们认为国界是自然形成的，而个人财产是人为的社会建构，造成了不平等
  - 他们认为，集体所有制服务于共同利益，而个人财产则导致对工人阶级的剥削
  - 他们认为，领土主权是文化保护的必要条件，而私有财产会破坏社会团结
explanation: |
  文中认为，社会主义者仍然受困于古代部落的观念，即狩猎场的集体财产对其他部落是排他性的。这揭示了他们对财产权的不一致应用--他们在国家层面（边界和疆界）捍卫集体财产，却在个人层面拒绝接受同样的逻辑原则。作者为了证明这一矛盾，提出了为什么要尊重群体的财产权而不尊重个人的财产权的问题，并指出，如果我们按照集体财产的逻辑缩小到更小的单位（微观国家、家庭），我们就不可避免地会得出个人财产权。其他答案代表了常见的社会主义论点，但却忽略了文中提出的具体部落观念批判。
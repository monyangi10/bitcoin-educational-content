question: Secondo l'analisi del testo sull'incoerenza socialista, perché i socialisti accettano i confini territoriali tra le nazioni e rifiutano i diritti di proprietà individuali?
answer: Rimangono intrappolati in antiche concezioni tribali in cui la proprietà collettiva era esclusiva di altre tribù, senza riconoscere l'estensione logica ai diritti individuali
wrong_answers:
  - Ritengono che i confini nazionali siano formazioni naturali, mentre la proprietà individuale sia una costruzione sociale artificiale che crea disuguaglianza
  - Essi sostengono che la proprietà collettiva serve al bene comune, mentre la proprietà individuale porta allo sfruttamento della classe operaia
  - Sostengono che la sovranità territoriale è necessaria per la conservazione della cultura, mentre la proprietà privata mina la solidarietà sociale
explanation: |
  Il testo sostiene che i socialisti sono ancora prigionieri di antiche concezioni tribali in cui la proprietà collettiva dei terreni di caccia era esclusiva delle altre tribù. Ciò rivela la loro incoerente applicazione dei diritti di proprietà: difendono la proprietà collettiva a livello nazionale (frontiere e confini), mentre rifiutano lo stesso principio logico a livello individuale. L'autore dimostra questa contraddizione chiedendosi perché i diritti di proprietà dovrebbero essere rispettati per i gruppi ma non per gli individui, suggerendo che se seguiamo la logica della proprietà collettiva fino a unità più piccole (microstati, famiglie), arriviamo inevitabilmente ai diritti di proprietà individuali. Le altre risposte rappresentano argomentazioni socialiste comuni, ma mancano la critica specifica alla concezione tribale presentata nel testo.
question: Согласно анализу непоследовательности социализма в тексте, почему социалисты принимают территориальные границы между нациями, отвергая при этом права индивидуальной собственности?
answer: Они остаются в ловушке древних племенных представлений, в которых коллективная собственность была исключительной для других племен, не признавая логического продолжения индивидуальных прав
wrong_answers:
  - Они считают, что национальные границы - это естественные образования, а индивидуальная собственность - искусственная социальная конструкция, создающая неравенство
  - Они утверждают, что коллективная собственность служит общему благу, в то время как индивидуальная собственность ведет к эксплуатации рабочего класса
  - Они утверждают, что территориальный суверенитет необходим для сохранения культуры, а частная собственность подрывает социальную солидарность
explanation: |
  В тексте утверждается, что социалисты все еще находятся в плену древних племенных представлений, в которых коллективная собственность на охотничьи угодья была исключительной для других племен. Это показывает их непоследовательное применение прав собственности - они защищают коллективную собственность на национальном уровне (границы и рубежи), отвергая тот же логический принцип на индивидуальном уровне. Автор демонстрирует это противоречие, задаваясь вопросом, почему права собственности должны соблюдаться для групп, но не для индивидуумов, предполагая, что если мы проследим логику коллективной собственности до более мелких единиц (микрогосударств, семей), то неизбежно придем к индивидуальным правам собственности. Остальные ответы представляют собой обычные социалистические аргументы, но не учитывают специфическую критику родоплеменной концепции, представленную в тексте.
question: Menurut analisis teks tentang ketidakkonsistenan sosialis, mengapa kaum sosialis menerima batas-batas teritorial antar negara sementara menolak hak milik individu?
answer: Mereka tetap terjebak dalam konsepsi kesukuan kuno di mana kepemilikan kolektif adalah eksklusif untuk suku lain tanpa mengakui perluasan logis ke hak-hak individu
wrong_answers:
  - Mereka percaya bahwa batas-batas negara adalah bentukan alamiah, sementara kepemilikan individu adalah konstruksi sosial buatan yang menciptakan ketidaksetaraan
  - Mereka berpendapat bahwa kepemilikan kolektif melayani kebaikan bersama sementara kepemilikan individu mengarah pada eksploitasi kelas pekerja
  - Mereka berpendapat bahwa kedaulatan teritorial diperlukan untuk pelestarian budaya, sementara kepemilikan pribadi merusak solidaritas sosial
explanation: |
  Teks tersebut berargumen bahwa kaum sosialis masih terpenjara oleh konsepsi kesukuan kuno di mana kepemilikan kolektif atas tempat berburu adalah eksklusif untuk suku-suku lain. Hal ini menunjukkan penerapan hak milik yang tidak konsisten - mereka mempertahankan hak milik kolektif di tingkat nasional (perbatasan dan batas-batas) sementara menolak prinsip logis yang sama di tingkat individu. Penulis menunjukkan kontradiksi ini dengan mempertanyakan mengapa hak milik harus dihormati untuk kelompok tetapi tidak untuk individu, menunjukkan bahwa jika kita mengikuti logika kepemilikan kolektif ke unit yang lebih kecil (negara mikro, keluarga), kita pasti akan sampai pada hak milik individu. Jawaban-jawaban lain mewakili argumen sosialis yang umum, namun tidak menjawab kritik terhadap konsepsi kesukuan yang disajikan dalam teks.
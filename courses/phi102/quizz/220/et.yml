question: Vastavalt tekstis esitatud sotsialistliku ebajärjekindluse analüüsile, miks sotsialistid aktsepteerivad rahvaste vahelisi territoriaalseid piire, kuid lükkavad samal ajal tagasi individuaalsed omandiõigused?
answer: Nad jäävad vanade hõimukäsitluste lõksu, kus kollektiivne omand oli teistele hõimudele ainuõiguslik, tunnistamata loogilist laiendust individuaalsetele õigustele
wrong_answers:
  - Nad usuvad, et riigipiirid on looduslikud moodustised, samas kui individuaalne omand on kunstlik sotsiaalne konstruktsioon, mis tekitab ebavõrdsust
  - Nad väidavad, et kollektiivne omandiõigus teenib ühist hüve, samas kui individuaalne omand viib töölisklassi ekspluateerimiseni
  - Nad väidavad, et territoriaalne suveräänsus on vajalik kultuuri säilitamiseks, samas kui eraomand õõnestab sotsiaalset solidaarsust
explanation: |
  Tekstis väidetakse, et sotsialistid on ikka veel vanade hõimukäsitluste vangid, kus jahipiirkondade ühisomand oli teiste hõimude ainuõigus. See paljastab nende vastuolulise omandiõiguse rakendamise - nad kaitsevad kollektiivset omandit riiklikul tasandil (piirid ja piirid), kuid lükkavad sama loogilise põhimõtte tagasi individuaalsel tasandil. Autor demonstreerib seda vastuolu, küsides, miks peaks omandiõigust austama rühmade puhul, kuid mitte üksikisikute puhul, ning viitab sellele, et kui me järgime kollektiivse omandi loogikat väiksematele üksustele (mikroriigid, perekonnad), jõuame paratamatult individuaalsete omandiõigusteni. Teised vastused esindavad tavalisi sotsialistlikke argumente, kuid jätavad kõrvale tekstis esitatud konkreetse hõimukontseptsiooni kriitika.
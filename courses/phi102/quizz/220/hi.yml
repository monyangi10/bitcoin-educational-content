question: According to the text's analysis of socialist inconsistency, why do socialists accept territorial boundaries between nations while rejecting individual property rights?
answer: They remain trapped in ancient tribal conceptions where collective property was exclusive to other tribes without recognizing the logical extension to individual rights
wrong_answers:
  - They believe national boundaries are natural formations while individual property is an artificial social construct that creates inequality
  - They argue that collective ownership serves the common good while individual property leads to exploitation of the working class
  - They maintain that territorial sovereignty is necessary for cultural preservation while private property undermines social solidarity
explanation: |
  The text argues that socialists are still prisoners of ancient tribal conceptions where collective property of hunting grounds was exclusive to other tribes. This reveals their inconsistent application of property rights - they defend collective property at the national level (frontiers and boundaries) while rejecting the same logical principle at the individual level. The author demonstrates this contradiction by questioning why property rights should be respected for groups but not for individuals, suggesting that if we follow the logic of collective property down to smaller units (micro-states, families), we inevitably arrive at individual property rights. The other answers represent common socialist arguments but miss the specific tribal conception critique presented in the text.
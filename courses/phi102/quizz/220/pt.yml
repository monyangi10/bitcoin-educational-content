question: De acordo com a análise do texto sobre a incoerência socialista, porque é que os socialistas aceitam as fronteiras territoriais entre nações e rejeitam os direitos de propriedade individuais?
answer: Continuam presos a concepções tribais antigas, em que a propriedade colectiva era exclusiva de outras tribos, sem reconhecerem a extensão lógica aos direitos individuais
wrong_answers:
  - Acreditam que as fronteiras nacionais são formações naturais, enquanto a propriedade individual é uma construção social artificial que cria desigualdade
  - Defendem que a propriedade colectiva serve o bem comum, enquanto a propriedade individual conduz à exploração da classe trabalhadora
  - Defendem que a soberania territorial é necessária para a preservação cultural, enquanto a propriedade privada mina a solidariedade social
explanation: |
  O texto argumenta que os socialistas continuam prisioneiros das antigas concepções tribais, em que a propriedade colectiva dos terrenos de caça era exclusiva das outras tribos. Isto revela a sua aplicação inconsistente dos direitos de propriedade - defendem a propriedade colectiva a nível nacional (fronteiras e limites) enquanto rejeitam o mesmo princípio lógico a nível individual. O autor demonstra esta contradição questionando a razão pela qual os direitos de propriedade devem ser respeitados para os grupos mas não para os indivíduos, sugerindo que se seguirmos a lógica da propriedade colectiva até às unidades mais pequenas (micro-estados, famílias), chegamos inevitavelmente a direitos de propriedade individuais. As outras respostas representam argumentos socialistas comuns, mas não reflectem a crítica específica à conceção tribal apresentada no texto.
question: D'après l'analyse de l'incohérence socialiste présentée dans le texte, pourquoi les socialistes acceptent-ils les frontières territoriales entre les nations tout en rejetant les droits de propriété individuels ?
answer: Ils restent prisonniers d'anciennes conceptions tribales où la propriété collective était exclusive des autres tribus, sans reconnaître l'extension logique des droits individuels
wrong_answers:
  - Ils estiment que les frontières nationales sont des formations naturelles tandis que la propriété individuelle est une construction sociale artificielle qui crée des inégalités
  - Ils affirment que la propriété collective sert le bien commun tandis que la propriété individuelle conduit à l'exploitation de la classe ouvrière
  - Ils soutiennent que la souveraineté territoriale est nécessaire à la préservation de la culture, tandis que la propriété privée sape la solidarité sociale
explanation: |
  Le texte affirme que les socialistes sont encore prisonniers d'anciennes conceptions tribales où la propriété collective des terrains de chasse était exclusive des autres tribus. Cela révèle leur application incohérente des droits de propriété - ils défendent la propriété collective au niveau national (frontières et limites) tout en rejetant le même principe logique au niveau individuel. L'auteur démontre cette contradiction en se demandant pourquoi les droits de propriété devraient être respectés pour les groupes mais pas pour les individus, suggérant que si nous suivons la logique de la propriété collective jusqu'à des unités plus petites (micro-États, familles), nous arrivons inévitablement à des droits de propriété individuels. Les autres réponses représentent des arguments socialistes courants, mais ne tiennent pas compte de la critique spécifique de la conception tribale présentée dans le texte.
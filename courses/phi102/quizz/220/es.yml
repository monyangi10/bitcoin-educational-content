question: Según el análisis del texto sobre la incoherencia socialista, ¿por qué los socialistas aceptan las fronteras territoriales entre naciones al tiempo que rechazan los derechos de propiedad individual?
answer: Siguen atrapados en antiguas concepciones tribales donde la propiedad colectiva era exclusiva de otras tribus sin reconocer la extensión lógica a los derechos individuales
wrong_answers:
  - Creen que las fronteras nacionales son formaciones naturales, mientras que la propiedad individual es una construcción social artificial que crea desigualdades
  - Sostienen que la propiedad colectiva sirve al bien común mientras que la propiedad individual conduce a la explotación de la clase trabajadora
  - Sostienen que la soberanía territorial es necesaria para la preservación cultural, mientras que la propiedad privada socava la solidaridad social
explanation: |
  El texto sostiene que los socialistas siguen prisioneros de antiguas concepciones tribales en las que la propiedad colectiva de los cotos de caza era exclusiva de otras tribus. Esto revela su aplicación incoherente de los derechos de propiedad: defienden la propiedad colectiva a nivel nacional (fronteras y límites) mientras rechazan el mismo principio lógico a nivel individual. El autor demuestra esta contradicción cuestionando por qué los derechos de propiedad deben respetarse para los grupos pero no para los individuos, sugiriendo que si seguimos la lógica de la propiedad colectiva hasta unidades más pequeñas (microestados, familias), llegamos inevitablemente a los derechos de propiedad individual. Las demás respuestas representan argumentos socialistas comunes, pero pasan por alto la crítica específica a la concepción tribal presentada en el texto.
question: Menurut analisis liberal tentang rasisme dalam masyarakat ekonomi abad ke-19, apa alasan utama kaum liberal mendukung percampuran berbagai kelompok manusia?
answer: Persaingan antara berbagai elemen budaya dan intelektual mendorong perkembangan peradaban terbaik melalui kerja sama sukarela
wrong_answers:
  - Kewajiban moral untuk menghapus prasangka rasial membutuhkan intervensi negara untuk menegakkan integrasi semua kelompok sosial
  - Efisiensi ekonomi menuntut standarisasi praktik-praktik budaya untuk mengurangi biaya transaksi dalam pertukaran pasar
  - Stabilitas politik membutuhkan homogenisasi populasi untuk mencegah konflik etnis dan menjaga ketertiban sosial
explanation: |
  Para ahli teori liberal dalam Masyarakat Ekonomi Politik abad ke-19 percaya bahwa persaingan antara berbagai kelompok yang beragam adalah hal yang mendorong dan bahwa menggabungkan elemen budaya dan intelektual yang berbeda melalui kerja sama sukarela dapat membawa peradaban pada perkembangan yang optimal. Pandangan ini bertentangan dengan jawaban yang salah: kaum liberal menentang intervensi negara dalam hubungan sosial, tidak mencari standarisasi budaya (menghargai keragaman), dan menolak homogenisasi yang bertentangan dengan prinsip individualis yang berfokus pada individu daripada kelompok rasial atau nasional.
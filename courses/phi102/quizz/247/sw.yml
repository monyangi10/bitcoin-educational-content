question: Kulingana na uchambuzi wa kiliberali wa ubaguzi wa rangi katika jamii za kiuchumi za karne ya 19, ni sababu gani kuu ya waliberali kuunga mkono mchanganyiko wa makundi tofauti ya wanadamu?
answer: Ushindani kati ya vipengele mbalimbali vya kitamaduni na kiakili huendesha maendeleo bora zaidi ya ustaarabu kupitia ushirikiano wa hiari
wrong_answers:
  - Wajibu wa kimaadili wa kuondoa ubaguzi wa rangi ulihitaji serikali kuingilia kati ili kutekeleza ujumuishaji wa makundi yote ya kijamii
  - Ufanisi wa kiuchumi ulihitaji usanifishaji wa desturi za kitamaduni ili kupunguza gharama za miamala katika masoko ya soko
  - Utulivu wa kisiasa ulihitaji uunganishaji wa idadi ya watu ili kuzuia migogoro ya kikabila na kudumisha utulivu wa kijamii
explanation: |
  Wananadharia wa kiliberali katika Jumuiya ya Uchumi wa Siasa ya karne ya 19 waliamini kwamba ushindani kati ya makundi mbalimbali ulikuwa wa kuchochea na kwamba kuchanganya vipengele tofauti vya kitamaduni na kiakili kupitia ushirikiano wa hiari kulisababisha maendeleo bora ya ustaarabu. Mtazamo huu unapingana na majibu yasiyo sahihi: waliberali walipinga uingiliaji kati wa serikali katika mahusiano ya kijamii, hawakutafuta viwango vya kitamaduni (badala yake wakithamini utofauti), na walikataa ulinganifu kama kinyume na kanuni za ubinafsi zinazozingatia watu binafsi badala ya makundi ya rangi au kitaifa ya pamoja.
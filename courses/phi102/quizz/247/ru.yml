question: Согласно либеральному анализу расизма в экономических обществах XIX века, что было основной причиной, по которой либералы поддерживали смешение различных человеческих групп?
answer: Конкуренция между различными культурными и интеллектуальными элементами способствует наилучшему развитию цивилизации путем добровольного сотрудничества
wrong_answers:
  - Моральное обязательство по искоренению расовых предрассудков требовало вмешательства государства для обеспечения интеграции всех социальных групп
  - Экономическая эффективность требовала стандартизации культурных практик для снижения транзакционных издержек при рыночных обменах
  - Политическая стабильность требовала гомогенизации населения для предотвращения этнических конфликтов и поддержания социального порядка
explanation: |
  Либеральные теоретики из Общества политической экономии XIX века считали, что конкуренция между различными группами является пропульсивной, а объединение различных культурных и интеллектуальных элементов путем добровольного сотрудничества ведет к оптимальному развитию цивилизации. Эта точка зрения противоречит неправильным ответам: либералы выступали против вмешательства государства в социальные отношения, не стремились к культурной стандартизации (ценя разнообразие) и отвергали гомогенизацию как противоречащую индивидуалистическим принципам, ориентированным на отдельных людей, а не на коллективные расовые или национальные группы.
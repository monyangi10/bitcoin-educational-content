question: 19世紀の経済社会における人種差別に関するリベラル派の分析によれば、リベラル派が異なる人間集団の混合を支持した主な理由は何か？
answer: 多様な文化的・知的要素間の競争が、自発的な協力を通じて文明の最良の発展を促す
wrong_answers:
  - 人種的偏見をなくす道徳的義務は、すべての社会集団の統合を強制する国家介入を必要とした。
  - 経済効率は、市場取引における取引コストを削減するために、文化的慣習の標準化を要求した。
  - 政治的安定は、民族紛争を防ぎ、社会秩序を維持するために、人口の均質化を必要とした。
explanation: |
  19世紀の政治経済学会の自由主義理論家たちは、多様な集団間の競争は推進力であり、自発的な協力によって異なる文化的・知的要素を組み合わせることが文明の最適な発展につながると信じていた。リベラル派は社会関係への国家の介入に反対し、文化の標準化を求めず（その代わりに多様性を重視）、集団的な人種や国家ではなく個人に焦点を当てる個人主義の原則に反するとして均質化を拒否したのである。
question: Zgodnie z liberalną analizą rasizmu w XIX-wiecznych społeczeństwach ekonomicznych, jaki był główny powód, dla którego liberałowie popierali mieszanie się różnych grup ludzkich?
answer: Konkurencja między różnorodnymi elementami kulturowymi i intelektualnymi napędza najlepszy możliwy rozwój cywilizacji poprzez dobrowolną współpracę
wrong_answers:
  - Moralny obowiązek wyeliminowania uprzedzeń rasowych wymagał interwencji państwa w celu wymuszenia integracji wszystkich grup społecznych
  - Efektywność ekonomiczna wymagała standaryzacji praktyk kulturowych w celu zmniejszenia kosztów transakcyjnych w wymianie rynkowej
  - Stabilność polityczna wymagała homogenizacji populacji, aby zapobiec konfliktom etnicznym i utrzymać porządek społeczny
explanation: |
  Liberalni teoretycy w XIX-wiecznym Towarzystwie Ekonomii Politycznej wierzyli, że konkurencja między różnymi grupami jest napędowa i że łączenie różnych elementów kulturowych i intelektualnych poprzez dobrowolną współpracę prowadzi do optymalnego rozwoju cywilizacji. Pogląd ten jest sprzeczny z błędnymi odpowiedziami: liberałowie sprzeciwiali się interwencji państwa w stosunki społeczne, nie dążyli do standaryzacji kulturowej (zamiast tego ceniąc różnorodność) i odrzucali homogenizację jako sprzeczną z indywidualistycznymi zasadami, które koncentrują się na jednostkach, a nie na zbiorowych grupach rasowych lub narodowych.
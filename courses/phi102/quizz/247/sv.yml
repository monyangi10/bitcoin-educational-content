question: Enligt liberalernas analys av rasismen i 1800-talets ekonomiska samhällen, vad var det främsta skälet till att liberalerna stödde blandningen av olika mänskliga grupper?
answer: Konkurrens mellan olika kulturella och intellektuella element driver fram den bästa möjliga utvecklingen av civilisationen genom frivilligt samarbete
wrong_answers:
  - Moralisk skyldighet att eliminera rasfördomar krävde statligt ingripande för att genomdriva integration av alla sociala grupper
  - Ekonomisk effektivitet krävde standardisering av kulturella sedvänjor för att minska transaktionskostnaderna i marknadsutbyten
  - Politisk stabilitet krävde homogenisering av befolkningarna för att förhindra etniska konflikter och upprätthålla den sociala ordningen
explanation: |
  Liberala teoretiker i 1800-talets Society of Political Economy ansåg att konkurrens mellan olika grupper var drivande och att en kombination av olika kulturella och intellektuella element genom frivilligt samarbete ledde till civilisationens optimala utveckling. Detta synsätt motsäger de felaktiga svaren: liberaler motsatte sig statlig inblandning i sociala relationer, eftersträvade inte kulturell standardisering (utan värderade istället mångfald) och förkastade homogenisering som stridande mot individualistiska principer som fokuserar på individer snarare än kollektiva ras- eller nationella grupper.
question: Hva var den viktigste grunnen til at liberale gikk inn for å blande ulike menneskegrupper, ifølge en liberal analyse av rasismen i 1800-tallets økonomiske samfunn?
answer: Konkurranse mellom ulike kulturelle og intellektuelle elementer driver sivilisasjonens best mulige utvikling gjennom frivillig samarbeid
wrong_answers:
  - Den moralske forpliktelsen til å eliminere rasefordommer krevde statlig inngripen for å tvinge frem integrering av alle sosiale grupper
  - Økonomisk effektivitet krevde standardisering av kulturelle praksiser for å redusere transaksjonskostnadene i markedsutvekslinger
  - Politisk stabilitet krevde homogenisering av befolkningen for å forhindre etniske konflikter og opprettholde sosial orden
explanation: |
  Liberale teoretikere i 1800-tallets Society of Political Economy mente at konkurranse mellom ulike grupper var fremdrivende, og at kombinasjonen av ulike kulturelle og intellektuelle elementer gjennom frivillig samarbeid førte til sivilisasjonens optimale utvikling. Dette synet står i motsetning til de gale svarene: Liberale var motstandere av statlig inngripen i sosiale relasjoner, de ønsket ikke kulturell standardisering (de verdsatte i stedet mangfold), og de avviste homogenisering som stridende mot individualistiske prinsipper som fokuserer på enkeltindivider snarere enn kollektive rase- eller folkegrupper.
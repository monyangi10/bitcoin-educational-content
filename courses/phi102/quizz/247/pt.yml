question: De acordo com a análise liberal do racismo nas sociedades económicas do século XIX, qual era a principal razão pela qual os liberais apoiavam a mistura de diferentes grupos humanos?
answer: A competição entre diversos elementos culturais e intelectuais impulsiona o melhor desenvolvimento possível da civilização através da cooperação voluntária
wrong_answers:
  - A obrigação moral de eliminar os preconceitos raciais exigia a intervenção do Estado para impor a integração de todos os grupos sociais
  - A eficiência económica exigia a normalização das práticas culturais para reduzir os custos de transação nas trocas comerciais
  - A estabilidade política exigia a homogeneização das populações para evitar conflitos étnicos e manter a ordem social
explanation: |
  Os teóricos liberais da Sociedade de Economia Política do século XIX acreditavam que a competição entre grupos diversos era propulsora e que a combinação de diferentes elementos culturais e intelectuais através da cooperação voluntária conduzia ao desenvolvimento ótimo da civilização. Este ponto de vista contradiz as respostas erradas: os liberais opunham-se à intervenção do Estado nas relações sociais, não procuravam a normalização cultural (valorizando, em vez disso, a diversidade) e rejeitavam a homogeneização por ser contrária aos princípios individualistas que se centram nos indivíduos e não nos grupos colectivos raciais ou nacionais.
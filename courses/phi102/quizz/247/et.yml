question: Milline oli liberaalsete analüüside kohaselt 19. sajandi majandusühiskondades esineva rassismi peamine põhjus, miks liberaalid toetasid erinevate inimrühmade segunemist?
answer: Konkurents erinevate kultuuriliste ja intellektuaalsete elementide vahel soodustab tsivilisatsiooni parimat võimalikku arengut vabatahtliku koostöö kaudu
wrong_answers:
  - Moraalne kohustus kõrvaldada rassilised eelarvamused nõudis riigi sekkumist, et jõustada kõigi sotsiaalsete rühmade integratsioon
  - Majanduslik tõhusus nõudis kultuuritavade standardiseerimist, et vähendada tehingukulusid turuvahetuses
  - Poliitiline stabiilsus tingis elanikkonna homogeniseerimise, et vältida etnilisi konflikte ja säilitada sotsiaalset korda
explanation: |
  19. sajandi Poliitilise Majanduse Seltsi liberaalsed teoreetikud uskusid, et konkurents erinevate rühmade vahel on tõukejõuline ja et erinevate kultuuriliste ja intellektuaalsete elementide ühendamine vabatahtliku koostöö kaudu viib tsivilisatsiooni optimaalse arenguni. See seisukoht on vastuolus valede vastustega: liberaalid olid vastu riigi sekkumisele sotsiaalsetesse suhetesse, ei taotlenud kultuurilist standardiseerimist (väärtustades selle asemel mitmekesisust) ja lükkasid tagasi homogeniseerimise kui individualistlike põhimõtete vastase, mis keskenduvad pigem üksikisikutele kui kollektiivsetele rassilistele või rahvuslikele rühmadele.
question: Dukurikije isesengura ry’abanyagihugu ry’ivangura ry’amoko mu bihugu vy’ubutunzi vyo mu kinjana ca 19, ni imvo nyamukuru iyihe yatumye abanyagihugu bashigikira ukuvanga imigwi itandukanye y’abantu?
answer: Uguhiganwa hagati y'ibintu bitandukanye vy'imico kama n'ubwenge bituma haba iterambere ryiza ry'ubutekerezi biciye mu gukorana n'abandi ku bushake .
wrong_answers:
  - Inshingano yo mu vy’inyifato runtu yo gukuraho urwanko rw’ibara ry’urukoba rwasaba ko Leta igira ico ikoze kugira ngo imigwi yose y’abantu ihurire hamwe .
  - Ubutunzi bwasaba ko imigenzo y’imico kama ihuzwa kugira ngo hagabanuke igiciro c’ugucuruza mu masoko .
  - Ugutekana kwa politike kwari ngombwa ko abantu bose bahuriza hamwe kugira ngo ntihagire amakimbirane y'ubwoko no kubungabunga urutonde rw'imibano .
explanation: |
  Abahinga mu vy'ubutunzi bwa politike bo mu kinjana ca 19 bemera yuko uguhiganwa hagati y'imigwi itandukanye kwari ugutera imbere kandi ko gufatanya ibintu bitandukanye vy'imico kama n'ubwenge biciye mu gukorana ku bushake vyatuma ubutekerezi butera imbere neza. Ivyo vyiyumviro biravuguruza inyishu zitari zo: aba liberals barwanya ko Leta yinjira mu migenderanire y’abantu, ntibarondera guhuza imico kama (guha agaciro ubudasa aho kubigira), kandi banse guhuza abantu nk’aho binyuranye n’ingingo ngenderwako z’umuntu ku giti ciwe zishimika ku bantu ku giti cabo aho kwibanda ku migwi y’ubwoko canke y’igihugu rusangi.
question: Segundo a análise liberal, porque é que a supressão da liberdade económica num sistema coletivista conduz inevitavelmente à perda da liberdade de residência e de domicílio?
answer: Porque sem liberdade de escolha do trabalho, as pessoas têm de viver perto do local de trabalho que lhes foi atribuído e não podem escolher a sua residência
wrong_answers:
  - Porque o Estado precisa de vigiar de perto os cidadãos e deve concentrá-los em zonas residenciais designadas
  - Porque a propriedade colectiva da propriedade significa que os indivíduos não podem ter casa própria e têm de aceitar habitação atribuída pelo Estado
  - Porque o planeamento económico exige que a distribuição da população corresponda à disponibilidade de recursos nas diferentes regiões
explanation: |
  A análise liberal demonstra uma cadeia causal direta: num sistema coletivista, o Estado atribui aos indivíduos empregos e ramos de produção específicos sem que estes escolham. Uma vez que, por razões práticas, as pessoas vivem perto do seu local de trabalho e não podem escolher o seu trabalho, não podem, consequentemente, escolher onde viver. Isto mostra como a falta de liberdade económica cria um efeito dominó, eliminando sistematicamente outras liberdades pessoais que podem parecer não estar relacionadas com a economia.
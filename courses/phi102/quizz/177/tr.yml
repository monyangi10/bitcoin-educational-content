question: Liberal analize göre, kolektivist bir sistemde ekonomik özgürlüğün bastırılması neden kaçınılmaz olarak ikamet ve yerleşme özgürlüğünün kaybına yol açmaktadır?
answer: Çünkü kişinin işini seçme özgürlüğü olmadığında, insanlar kendilerine tahsis edilen iş yerinin yakınında yaşamak zorunda kalırlar ve ikametlerini seçemezler
wrong_answers:
  - Çünkü devletin vatandaşları yakından izlemesi ve onları belirlenmiş yerleşim alanlarında yoğunlaştırması gerekiyor
  - Mülkiyetin kolektif mülkiyeti, bireylerin ev sahibi olamayacağı ve devlet tarafından tahsis edilen konutları kabul etmesi gerektiği anlamına geldiğinden
  - Çünkü ekonomik planlama, nüfus dağılımının farklı bölgelerdeki kaynak mevcudiyetiyle eşleşmesini gerektirir
explanation: |
  Liberal analiz doğrudan bir nedensellik zinciri ortaya koymaktadır: kolektivist bir sistemde devlet, bireyleri kendi seçimleri olmaksızın belirli işlere ve üretim dallarına atar. İnsanlar pratik nedenlerle genellikle işyerlerinin yakınında yaşadıklarından ve işlerini seçemediklerinden, sonuç olarak nerede yaşayacaklarını da seçemezler. Bu da ekonomik özgürlüğün nasıl bir domino etkisi yaratarak, ekonomi ile ilgisi yokmuş gibi görünen diğer kişisel özgürlükleri sistematik olarak ortadan kaldırdığını göstermektedir.
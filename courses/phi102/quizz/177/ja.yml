question: リベラル派の分析によれば、集団主義体制において経済的自由が抑圧されると、居住や住所の自由が必然的に失われるのはなぜか？
answer: なぜなら、仕事を選ぶ自由がなければ、人々は決められた職場の近くに住まなければならず、住居を選ぶことができないからだ
wrong_answers:
  - 国家は市民を厳重に監視する必要があり、指定された居住区に集中させなければならないからだ
  - 財産の集団所有とは、個人が家を所有することができず、国から割り当てられた住宅を受け入れなければならないことを意味する。
  - 経済計画を立てるには、各地域で利用可能な資源に合わせて人口を配分する必要があるからだ。
explanation: |
  リベラル派の分析は、直接的な因果の連鎖を示している。集団主義体制では、国家は個人の選択なしに特定の仕事や生産部門を割り当てる。集団主義体制では、国家は個人の選択なしに特定の仕事や生産部門を割り当てる。人々は通常、現実的な理由から職場の近くに住み、仕事を選べないため、結果的に住む場所も選べない。このことは、経済的不自由がいかにドミノ効果を生み、経済とは無関係に見える他の個人の自由を体系的に排除するかを示している。
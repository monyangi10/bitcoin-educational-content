question: Zgodnie z liberalną analizą, dlaczego tłumienie wolności gospodarczej w systemie kolektywistycznym nieuchronnie prowadzi do utraty wolności pobytu i zamieszkania?
answer: Ponieważ bez swobody wyboru pracy ludzie muszą mieszkać w pobliżu przypisanego im miejsca pracy i nie mogą wybrać miejsca zamieszkania
wrong_answers:
  - Ponieważ państwo musi ściśle monitorować obywateli i koncentrować ich w wyznaczonych obszarach mieszkalnych
  - Ponieważ zbiorowa własność nieruchomości oznacza, że jednostki nie mogą posiadać własnych domów i muszą zaakceptować mieszkania przydzielone przez państwo
  - Ponieważ planowanie gospodarcze wymaga rozmieszczenia populacji w celu dopasowania do dostępności zasobów w różnych regionach
explanation: |
  Analiza liberalna pokazuje bezpośredni łańcuch przyczynowy: w systemie kolektywistycznym państwo przypisuje jednostki do określonych miejsc pracy i gałęzi produkcji bez ich wyboru. Ponieważ ludzie zazwyczaj mieszkają w pobliżu swojego miejsca pracy ze względów praktycznych i nie mogą wybrać swojej pracy, w konsekwencji nie mogą wybrać miejsca zamieszkania. To pokazuje, jak brak wolności ekonomicznej tworzy efekt domina, systematycznie eliminując inne wolności osobiste, które mogą wydawać się niezwiązane z ekonomią.
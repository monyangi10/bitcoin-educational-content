question: Theo phân tích của chủ nghĩa tự do, tại sao việc đàn áp tự do kinh tế trong một hệ thống tập thể lại inevitably dẫn đến việc mất tự do cư trú và nơi thường trú?
answer: Vì nếu không có quyền tự do lựa chọn công việc, mọi người buộc phải sống gần nơi làm việc được chỉ định và không thể tự chọn nơi cư trú.
wrong_answers:
  - Vì nhà nước cần giám sát chặt chẽ người dân và phải tập trung họ vào các khu dân cư được chỉ định.
  - Vì quyền sở hữu tập thể đồng nghĩa với việc cá nhân không thể sở hữu nhà riêng và phải chấp nhận nhà ở do nhà nước cấp.
  - Vì quy hoạch kinh tế đòi hỏi sự phân bổ dân cư phải phù hợp với nguồn lực sẵn có ở các vùng khác nhau.
explanation: |
  Phân tích theo quan điểm tự do cho thấy một chuỗi nhân quả trực tiếp: trong một hệ thống tập thể, nhà nước phân công cá nhân vào các công việc và ngành sản xuất cụ thể mà không có sự lựa chọn của họ. Vì lý do thực tế, mọi người thường sống gần nơi làm việc và không thể lựa chọn công việc của mình, nên họ cũng không thể lựa chọn nơi sinh sống. Điều này cho thấy sự thiếu tự do kinh tế tạo ra hiệu ứng domino, loại bỏ một cách có hệ thống các quyền tự do cá nhân khác tưởng chừng không liên quan đến kinh tế.
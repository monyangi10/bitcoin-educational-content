question: Согласно либеральному анализу, почему подавление экономической свободы в коллективистской системе неизбежно приводит к потере свободы проживания и домициля?
answer: Поскольку без свободы выбора работы люди вынуждены жить рядом с местом работы и не могут выбирать место жительства
wrong_answers:
  - Поскольку государство должно тщательно следить за гражданами и концентрировать их в специально отведенных жилых районах
  - Поскольку коллективное владение собственностью означает, что люди не могут иметь собственные дома и должны принимать жилье, выделенное государством
  - Поскольку экономическое планирование требует распределения населения в соответствии с наличием ресурсов в различных регионах
explanation: |
  Либеральный анализ демонстрирует прямую причинно-следственную цепочку: в коллективистской системе государство распределяет людей по конкретным рабочим местам и отраслям производства без их выбора. Поскольку по практическим соображениям люди обычно живут рядом с местом работы, а работу они выбрать не могут, то, соответственно, не могут выбрать и место жительства. Это показывает, как экономическая несвобода создает эффект домино, систематически устраняя другие личные свободы, которые могут показаться не связанными с экономикой.
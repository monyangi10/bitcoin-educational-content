question: Proč podle liberální analýzy vede potlačení ekonomické svobody v kolektivistickém systému nevyhnutelně ke ztrátě svobody pobytu a bydliště?
answer: Protože bez svobody volby práce musí lidé bydlet v blízkosti přiděleného pracoviště a nemohou si vybrat bydliště
wrong_answers:
  - Protože stát musí občany pečlivě sledovat a musí je soustředit do určených obytných oblastí
  - Protože kolektivní vlastnictví majetku znamená, že jednotlivci nemohou vlastnit domy a musí přijmout státem přidělené bydlení
  - Protože ekonomické plánování vyžaduje, aby rozmístění obyvatelstva odpovídalo dostupnosti zdrojů v různých regionech
explanation: |
  Liberální analýza ukazuje přímý kauzální řetězec: v kolektivistickém systému stát přiděluje jednotlivcům určitá pracovní místa a výrobní odvětví bez jejich volby. Protože lidé z praktických důvodů obvykle bydlí v blízkosti svého pracoviště a nemohou si vybrat svou práci, nemohou si v důsledku toho vybrat ani místo bydliště. To ukazuje, jak ekonomická nesvoboda vytváří dominový efekt, který systematicky eliminuje další osobní svobody, jež by se mohly zdát s ekonomikou nesouvisející.
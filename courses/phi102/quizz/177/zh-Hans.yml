question: 按照自由主义的分析，为什么在集体主义制度下压制经济自由必然导致居住和户籍自由的丧失？
answer: 因为如果没有选择工作的自由，人们就必须住在指定的工作场所附近，无法选择自己的住所
wrong_answers:
  - 因为国家需要密切监视公民，必须将他们集中在指定的居住区内
  - 因为集体财产所有权意味着个人不能拥有住房，必须接受国家分配的住房
  - 因为经济规划要求人口分布与不同地区的资源供应相匹配
explanation: |
  自由主义的分析展示了一个直接的因果链：在集体主义制度中，国家在个人没有选择的情况下将其分配到特定的工作和生产部门。由于实际原因，人们通常住在工作地点附近，他们无法选择自己的工作，因此也就无法选择居住地。这说明了经济上的不自由是如何产生多米诺骨牌效应的，它系统地消除了其他看似与经济无关的个人自由。
question: 자유주의적 분석에 따르면 집단주의 체제에서 경제적 자유의 억압은 왜 필연적으로 거주 및 거주지의 자유의 상실로 이어질 수밖에 없는가?
answer: 직장을 선택할 자유가 없으면 지정된 직장 근처에 살아야 하고 거주지를 선택할 수 없기 때문입니다
wrong_answers:
  - 국가는 시민들을 면밀히 모니터링해야 하고 지정된 주거 지역에 집중해야 하기 때문입니다
  - 부동산의 공동 소유는 개인이 주택을 소유할 수 없고 국가에서 배정하는 주택을 수용해야 한다는 것을 의미하기 때문입니다
  - 경제 계획은 여러 지역의 자원 가용성에 맞게 인구를 배분해야 하기 때문입니다
explanation: |
  자유주의적 분석은 직접적인 인과관계를 보여줍니다. 집단주의 체제에서는 국가가 개인의 선택과 관계없이 특정 직업과 생산 분야에 개인을 배정합니다. 사람들은 일반적으로 현실적인 이유로 직장 근처에 거주하며, 직장을 선택할 수 없기 때문에 결과적으로 거주지를 선택할 수 없습니다. 이는 경제적 자유가 도미노 효과를 일으켜 경제와 무관해 보이는 다른 개인의 자유를 체계적으로 제거하는 방법을 보여줍니다.
question: Secondo l'analisi liberale, perché la soppressione della libertà economica in un sistema collettivista porta inevitabilmente alla perdita della libertà di residenza e di domicilio?
answer: Perché senza la libertà di scegliere il proprio lavoro, le persone devono vivere vicino al posto di lavoro assegnato e non possono scegliere la propria residenza
wrong_answers:
  - Perché lo Stato ha bisogno di monitorare da vicino i cittadini e deve concentrarli in aree residenziali designate
  - Poiché la proprietà collettiva dei beni significa che gli individui non possono essere proprietari di case e devono accettare gli alloggi assegnati dallo Stato
  - Poiché la pianificazione economica richiede una distribuzione della popolazione che corrisponda alla disponibilità di risorse nelle diverse regioni
explanation: |
  L'analisi liberale dimostra una catena causale diretta: in un sistema collettivista, lo Stato assegna gli individui a specifici lavori e rami produttivi senza che essi possano scegliere. Poiché le persone vivono tipicamente vicino al luogo di lavoro per ragioni pratiche e non possono scegliere il proprio lavoro, di conseguenza non possono scegliere dove vivere. Questo dimostra come la mancanza di libertà economica crei un effetto domino, eliminando sistematicamente altre libertà personali che potrebbero sembrare non correlate all'economia.
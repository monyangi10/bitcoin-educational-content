question: Hvorfor fører undertrykkelsen av økonomisk frihet i et kollektivistisk system uunngåelig til tap av bosteds- og hjemstedsfrihet, ifølge en liberal analyse?
answer: For uten frihet til å velge arbeid må folk bo i nærheten av arbeidsplassen de har fått tildelt, og kan ikke selv velge bosted
wrong_answers:
  - Fordi staten må overvåke innbyggerne nøye og må konsentrere dem i utpekte boligområder
  - Fordi kollektivt eierskap til eiendom betyr at enkeltpersoner ikke kan eie boliger og må akseptere statlig tildelte boliger
  - Fordi økonomisk planlegging krever at befolkningsfordelingen tilpasses ressurstilgangen i ulike regioner
explanation: |
  Den liberale analysen viser en direkte årsakskjede: I et kollektivistisk system tildeler staten individer bestemte jobber og produksjonsgrener uten at de har noe valg. Siden folk av praktiske grunner typisk bor i nærheten av arbeidsplassen sin, og de ikke kan velge arbeid, kan de følgelig heller ikke velge hvor de vil bo. Dette viser hvordan økonomisk ufrihet skaper en dominoeffekt som systematisk eliminerer andre personlige friheter som kan virke urelaterte til økonomi.
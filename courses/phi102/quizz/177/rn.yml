question: Dushingiye ku nseguro y’ubwigenge, ni kuki guhagarika umwidegemvyo w’ubutunzi mu nzira y’ubumwe bituma ata kabuza umuntu atakaza umwidegemvyo wo kuba no kuba?
answer: Kubera ko ata mwidegemvyo umuntu afise wo guhitamwo akazi akora, abantu bategerezwa kuba hafi y’aho bashinzwe gukorera kandi ntibashobora guhitamwo aho baba .
wrong_answers:
  - Kuko Leta ikeneye gukurikiranira hafi abanyagihugu kandi itegerezwa kubashira mu bibanza vyagenewe kubamwo .
  - Kubera ko kuba umutungo rusangi bisigura ko umuntu ku giti ciwe adashobora kugira inzu kandi ategerezwa kwemera inzu zahawe na Leta .
  - Kubera ko igenamigambi ry’ubutunzi risaba ko abantu bagabanywa kugira ngo bihure n’ivyo ubutunzi buriho mu turere dutandukanye .
explanation: |
  Isesengura ry’uburenganzira ryerekana uruhererekane rw’inkomoko rutaziguye: mu buryo bw’ubumwe, Leta ishira abantu ku giti cabo mu bikorwa vyihariye no mu mashami y’ubuhinga ataco bahisemwo. Kubera ko abantu mu bisanzwe baba hafi y’aho bakora kubera imvo ngirakamaro, kandi badashobora guhitamwo akazi bakora, ivyo bituma badashobora guhitamwo aho boba. Ivyo vyerekana ingene ukutagira umwidegemvyo mu vy’ubutunzi gutuma habaho ingaruka zikomeye, bikakuraho mu buryo butunganye ubundi mwidegemvyo w’umuntu ku giti ciwe woshobora gusa n’uwudafitaniye isano n’ubutunzi.
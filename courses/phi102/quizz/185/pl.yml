question: Według krytyki Paula Leroy-Beaulieu w "Le Collectivisme", co stanowi fundamentalną podwójną porażkę socjalizmu w odniesieniu do wolności?
answer: Nie zapewnia ani wolności negatywnej cenionej przez liberałów, ani wolności pozytywnej, którą obiecuje poprzez interwencję państwa
wrong_answers:
  - Nie rozróżnia indywidualnych praw od zbiorowych potrzeb, ignorując jednocześnie zasady efektywności ekonomicznej
  - Nie jest w stanie pogodzić prawa własności ze sprawiedliwością społeczną, a jednocześnie nie jest w stanie ustanowić skutecznych instytucji demokratycznych
  - Podważa zarówno mechanizmy rynkowe, jak i dobrowolne zrzeszenia, jednocześnie nie tworząc zrównoważonego wzrostu gospodarczego
explanation: |
  Analiza Leroy-Beaulieu pokazuje, że socjalizm popełnia podwójny błąd: niszczy wolność negatywną (brak przeszkód dla niewinnego działania), którą cenią liberałowie, jednocześnie nie zapewniając wolności pozytywnej (zdolności do osiągania pożądanych rezultatów), którą obiecuje. Krytyka ta pokazuje, że systemy socjalistyczne nie tylko eliminują tradycyjne wolności, ale także nie są w stanie spełnić własnej alternatywnej wizji wolności, pozostawiając jednostki w gorszej sytuacji w ramach obu koncepcji wolności.
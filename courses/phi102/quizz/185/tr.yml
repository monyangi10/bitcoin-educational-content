question: Paul Leroy-Beaulieu'nun 'Le Collectivisme' kitabındaki eleştirisine göre, sosyalizmin özgürlükle ilgili temel çifte başarısızlığını temsil eden nedir?
answer: Ne liberallerin değer verdiği negatif özgürlüğü sağlar ne de devlet müdahalesi yoluyla vaat ettiği pozitif özgürlüğü sunar
wrong_answers:
  - Bireysel haklar ile kolektif ihtiyaçlar arasında ayrım yapmakta başarısız olurken, ekonomik verimlilik ilkelerini de göz ardı etmektedir
  - Mülkiyet hakları ile sosyal adaleti bağdaştıramaz ve aynı zamanda etkili demokratik kurumlar oluşturamaz
  - Sürdürülebilir ekonomik büyüme yaratmada başarısız olurken hem piyasa mekanizmalarını hem de gönüllü birliktelikleri zayıflatır
explanation: |
  Leroy-Beaulieu'nun analizi sosyalizmin çifte hata yaptığını göstermektedir: liberallerin değer verdiği negatif özgürlüğü (masum eylemlerin önünde engellerin olmaması) yok ederken, aynı zamanda vaat ettiği pozitif özgürlüğü (istenen sonuçları elde etme kapasitesi) sağlayamamaktadır. Bu eleştiri, sosyalist sistemlerin yalnızca geleneksel özgürlükleri ortadan kaldırmakla kalmayıp, aynı zamanda kendi alternatif özgürlük vizyonlarını da yerine getiremediğini ve bireyleri her iki özgürlük anlayışı altında da daha kötü durumda bıraktığını göstermektedir.
question: Enligt Paul Leroy-Beaulieus kritik i "Le Collectivisme", vad är socialismens grundläggande dubbla misslyckande i förhållande till frihet?
answer: Den ger varken den negativa frihet som liberaler värdesätter eller den positiva frihet som den utlovar genom statligt ingripande
wrong_answers:
  - Den gör ingen åtskillnad mellan individuella rättigheter och kollektiva behov och bortser dessutom från principer om ekonomisk effektivitet
  - Den kan inte förena äganderätt med social rättvisa samtidigt som den misslyckas med att upprätta effektiva demokratiska institutioner
  - Den undergräver både marknadsmekanismer och frivilliga sammanslutningar och skapar inte någon hållbar ekonomisk tillväxt
explanation: |
  Leroy-Beaulieus analys visar att socialismen begår ett dubbelfel: den förstör den negativa frihet (frånvaron av hinder för oskyldiga handlingar) som liberaler värdesätter, samtidigt som den inte lyckas leverera den positiva frihet (förmåga att uppnå önskade resultat) som den utlovar. Denna kritik visar att socialistiska system inte bara eliminerar traditionella friheter utan inte heller kan uppfylla sin egen alternativa frihetsvision, vilket gör att individer får det sämre under båda frihetsuppfattningarna.
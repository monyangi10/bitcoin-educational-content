question: Согласно критике Поля Леруа-Болье в "Коллективизме", что представляет собой фундаментальный двойной провал социализма по отношению к свободе?
answer: Она не обеспечивает ни негативной свободы, которую ценят либералы, ни позитивной свободы, которую она обещает благодаря вмешательству государства
wrong_answers:
  - Он не проводит различия между индивидуальными правами и коллективными потребностями, а также игнорирует принципы экономической эффективности
  - Она не может примирить права собственности с социальной справедливостью и при этом не может создать эффективные демократические институты
  - Она подрывает как рыночные механизмы, так и добровольные объединения, не обеспечивая при этом устойчивого экономического роста
explanation: |
  Анализ Леруа-Болье показывает, что социализм совершает двойную ошибку: он разрушает негативную свободу (отсутствие препятствий для невинных действий), которую ценят либералы, и одновременно не может обеспечить позитивную свободу (способность добиваться желаемых результатов), которую он обещает. Эта критика показывает, что социалистические системы не только уничтожают традиционные свободы, но и не могут реализовать свое собственное альтернативное видение свободы, в результате чего люди оказываются в худшем положении при обоих представлениях о свободе.
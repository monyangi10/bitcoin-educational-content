question: Wat is volgens de kritiek van Paul Leroy-Beaulieu in 'Le Collectivisme' de fundamentele dubbele mislukking van het socialisme met betrekking tot vrijheid?
answer: Het biedt noch de negatieve vrijheid die door liberalen wordt gewaardeerd, noch de positieve vrijheid die het belooft door middel van staatsinterventie
wrong_answers:
  - Het maakt geen onderscheid tussen individuele rechten en collectieve behoeften en negeert de principes van economische efficiëntie
  - Het kan eigendomsrechten niet verzoenen met sociale rechtvaardigheid terwijl het er ook niet in slaagt om effectieve democratische instellingen op te richten
  - Het ondermijnt zowel marktmechanismen als vrijwilligersorganisaties en slaagt er niet in om duurzame economische groei te creëren
explanation: |
  Leroy-Beaulieu's analyse toont aan dat het socialisme een dubbele fout begaat: het vernietigt de negatieve vrijheid (de afwezigheid van obstakels voor onschuldig handelen) die liberalen waarderen, terwijl het tegelijkertijd niet de positieve vrijheid (het vermogen om gewenste resultaten te behalen) levert die het belooft. Deze kritiek laat zien dat socialistische systemen niet alleen traditionele vrijheden elimineren, maar ook hun eigen alternatieve visie op vrijheid niet kunnen waarmaken, waardoor individuen slechter af zijn onder beide opvattingen van vrijheid.
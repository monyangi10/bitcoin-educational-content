question: Theo phê bình của Paul Leroy-Beaulieu trong tác phẩm 'Le Collectivisme', đâu là thất bại kép cơ bản của chủ nghĩa xã hội đối với tự do?
answer: Nó không mang lại sự tự do tiêu cực mà những người theo chủ nghĩa tự do coi trọng, cũng không mang lại sự tự do tích cực mà nó hứa hẹn thông qua sự can thiệp của nhà nước.
wrong_answers:
  - Nó không phân biệt được giữa quyền cá nhân và nhu cầu tập thể, đồng thời bỏ qua các nguyên tắc về hiệu quả kinh tế.
  - Nó không thể dung hòa quyền sở hữu với công bằng xã hội trong khi lại không thiết lập được các thể chế dân chủ hiệu quả.
  - Nó làm suy yếu cả cơ chế thị trường và các hiệp hội tự nguyện, đồng thời không tạo ra được tăng trưởng kinh tế bền vững.
explanation: |
  Phân tích của Leroy-Beaulieu chứng minh rằng chủ nghĩa xã hội mắc phải sai lầm kép: nó phá hủy tự do tiêu cực (sự vắng mặt của các trở ngại đối với hành động vô hại) mà những người theo chủ nghĩa tự do coi trọng, đồng thời không thể mang lại tự do tích cực (khả năng đạt được kết quả mong muốn) mà nó hứa hẹn. Phê bình này cho thấy các hệ thống xã hội chủ nghĩa không chỉ loại bỏ các quyền tự do truyền thống mà còn không thể thực hiện được tầm nhìn thay thế về tự do của chính mình, khiến các cá nhân rơi vào tình trạng tồi tệ hơn dưới cả hai quan niệm về tự do.
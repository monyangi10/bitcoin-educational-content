question: Co podle kritiky Paula Leroy-Beaulieua v knize "Le Collectivisme" představuje zásadní dvojí selhání socialismu ve vztahu ke svobodě?
answer: Neposkytuje ani negativní svobodu, kterou oceňují liberálové, ani pozitivní svobodu, kterou slibuje prostřednictvím státních zásahů
wrong_answers:
  - Nerozlišuje mezi individuálními právy a kolektivními potřebami a zároveň ignoruje principy ekonomické efektivity
  - Nemůže skloubit vlastnická práva se sociální spravedlností a zároveň nedokáže vytvořit účinné demokratické instituce
  - Podkopává tržní mechanismy i dobrovolná sdružení a zároveň nevede k udržitelnému hospodářskému růstu
explanation: |
  Leroy-Beaulieuova analýza ukazuje, že socialismus se dopouští dvojí chyby: ničí negativní svobodu (neexistenci překážek nevinného jednání), kterou liberálové oceňují, a zároveň neposkytuje pozitivní svobodu (schopnost dosáhnout žádoucích výsledků), kterou slibuje. Tato kritika ukazuje, že socialistické systémy nejenže likvidují tradiční svobody, ale také nedokážou naplnit svou vlastní alternativní vizi svobody, takže jednotlivci jsou na tom v obou pojetích svobody hůře.
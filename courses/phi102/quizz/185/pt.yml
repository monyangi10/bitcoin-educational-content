question: De acordo com a crítica de Paul Leroy-Beaulieu em "Le Collectivisme", o que representa o duplo fracasso fundamental do socialismo em relação à liberdade?
answer: Não proporciona a liberdade negativa valorizada pelos liberais, nem a liberdade positiva que promete através da intervenção do Estado
wrong_answers:
  - Não distingue entre direitos individuais e necessidades colectivas, ignorando também os princípios da eficiência económica
  - Não pode conciliar o direito de propriedade com a justiça social e, ao mesmo tempo, não consegue criar instituições democráticas eficazes
  - Esta situação prejudica tanto os mecanismos de mercado como as associações voluntárias, não conseguindo criar um crescimento económico sustentável
explanation: |
  A análise de Leroy-Beaulieu demonstra que o socialismo comete um duplo erro: destrói a liberdade negativa (a ausência de obstáculos a uma ação inocente) que os liberais valorizam, ao mesmo tempo que não consegue concretizar a liberdade positiva (capacidade de obter os resultados desejados) que promete. Esta crítica mostra que os sistemas socialistas não só eliminam as liberdades tradicionais como também não conseguem cumprir a sua própria visão alternativa da liberdade, deixando os indivíduos em pior situação em ambas as concepções de liberdade.
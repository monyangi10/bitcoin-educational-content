question: According to Paul Leroy-Beaulieu's critique in 'Le Collectivisme', what represents the fundamental double failure of socialism in relation to liberty?
answer: It neither provides the negative liberty valued by liberals nor delivers the positive liberty it promises through state intervention
wrong_answers:
  - It fails to distinguish between individual rights and collective needs while also ignoring economic efficiency principles
  - It cannot reconcile property rights with social justice while also failing to establish effective democratic institutions
  - It undermines both market mechanisms and voluntary associations while failing to create sustainable economic growth
explanation: |
  Leroy-Beaulieu's analysis demonstrates that socialism commits a double error: it destroys negative liberty (the absence of obstacles to innocent action) that liberals value, while simultaneously failing to deliver the positive liberty (capacity to obtain desired outcomes) that it promises. This critique shows that socialist systems not only eliminate traditional freedoms but also cannot fulfill their own alternative vision of liberty, leaving individuals worse off under both conceptions of freedom.
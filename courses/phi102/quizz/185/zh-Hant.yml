question: 根據 Paul Leroy-Beaulieu 在「Le Collectivisme」中的批判，什麼代表了社會主義在自由方面的根本性雙重失敗？
answer: 它既沒有提供自由主義者所重視的消極自由，也沒有透過國家干預來實現其承諾的積極自由。
wrong_answers:
  - 它沒有區分個人權利與集體需求，同時也忽略了經濟效率原則
  - 它無法兼顧財產權與社會正義，同時也無法建立有效的民主體制
  - 這會破壞市場機制和自願結社，同時無法創造可持續的經濟成長。
explanation: |
  Leroy-Beaulieu 的分析顯示，社會主義犯了雙重錯誤：社會主義摧毀了自由主義者所重視的消極自由（無障礙的無辜行動），同時又無法實現其承諾的積極自由（獲得期望結果的能力）。這一批判顯示，社會主義制度不僅消除了傳統自由，也無法實現自己對自由的替代性願景，使得個人在兩種自由概念下的境況都變得更糟。
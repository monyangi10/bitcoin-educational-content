question: Según la crítica de Paul Leroy-Beaulieu en "Le Collectivisme", ¿qué representa el doble fracaso fundamental del socialismo en relación con la libertad?
answer: Ni proporciona la libertad negativa que valoran los liberales ni ofrece la libertad positiva que promete mediante la intervención del Estado
wrong_answers:
  - No distingue entre derechos individuales y necesidades colectivas e ignora los principios de eficiencia económica
  - No puede conciliar los derechos de propiedad con la justicia social mientras no establezca instituciones democráticas eficaces
  - Socava tanto los mecanismos de mercado como las asociaciones voluntarias, al tiempo que no genera un crecimiento económico sostenible
explanation: |
  El análisis de Leroy-Beaulieu demuestra que el socialismo comete un doble error: destruye la libertad negativa (la ausencia de obstáculos a la acción inocente) que los liberales valoran, al tiempo que no consigue la libertad positiva (capacidad de obtener los resultados deseados) que promete. Esta crítica demuestra que los sistemas socialistas no sólo eliminan las libertades tradicionales, sino que tampoco pueden cumplir su propia visión alternativa de la libertad, dejando a los individuos en peor situación bajo ambas concepciones de la libertad.
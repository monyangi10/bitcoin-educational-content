question: Dushingiye ku vyo Paul Leroy-Beaulieu yaneguye mu gitabu ciwe citwa ‘Le Collectivisme’, ni igiki giserukira ukunanirwa kabiri kw’ishimikiro kw’ubusosiyalisimu ku bijanye n’umwidegemvyo?
answer: Nta mwidegemvyo mubi uhabwa agaciro n’abanyagihugu b’abanyagihugu canke ngo itanga umwidegemvyo mwiza isezerana biciye mu gufasha Leta .
wrong_answers:
  - Inanirwa gutandukanya uburenganzira bw'umuntu ku giti ciwe n'ivyo bose bakeneye mu gihe kandi yirengagiza ingingo ngenderwako z'ubutunzi .
  - Ntishobora guhuza uburenganzira bw’umutungo n’ubutungane bw’abantu mu gihe kandi inanirwa gushinga inzego za demokarasi zikora neza .
  - Bitera intege uburyo bwo gukora isoko n’amashirahamwe y’ubushake mu gihe bidashobora gutuma ubutunzi butera imbere buramba .
explanation: |
  Isesengura rya Leroy-Beaulieu ryerekana ko ubusosiyalisimu bukora ikosa ribiri: busenya umwidegemvyo mubi (ukubura intambamyi ku bikorwa vy’inzirakarengane) aba liberaliste baha agaciro, mu gihe nyene butashobora gutanga umwidegemvyo mwiza (ubushobozi bwo kuronka ingaruka yipfuzwa) butanga. Ivyo bimenyetso vyerekana ko ubutegetsi bw’abasosiyalisiti butakuraho gusa umwidegemvyo w’imigenzo ariko kandi ko butashobora gushitsa iciyumviro cabo bwite c’umwidegemvyo, bigatuma abantu bacika intege cane mu gihe c’ivyo vyiyumviro vyose bibiri vy’umwidegemvyo.
question: بر اساس نقد پل لروی-بولو در 'Le Collectivisme'، چه چیزی نمایانگر شکست دوگانه بنیادی سوسیالیسم در رابطه با آزادی است؟
answer: این نه آزادی منفی مورد ارزش لیبرال‌ها را فراهم می‌کند و نه آزادی مثبت وعده داده شده از طریق مداخله دولت را ارائه می‌دهد.
wrong_answers:
  - این نتوانسته است بین حقوق فردی و نیازهای جمعی تمایز قائل شود و در عین حال اصول کارایی اقتصادی را نادیده می‌گیرد.
  - نمی‌تواند حقوق مالکیت را با عدالت اجتماعی آشتی دهد در حالی که در ایجاد نهادهای دموکراتیک مؤثر نیز ناکام است.
  - این هم مکانیسم‌های بازار و هم انجمن‌های داوطلبانه را تضعیف می‌کند و در عین حال نمی‌تواند رشد اقتصادی پایدار ایجاد کند.
explanation: |
  تحلیل لروی-بولو نشان می‌دهد که سوسیالیسم مرتکب یک اشتباه دوگانه می‌شود: آزادی منفی (عدم وجود موانع برای اقدام بی‌گناه) که لیبرال‌ها ارزش می‌نهند را از بین می‌برد، در حالی که همزمان نمی‌تواند آزادی مثبت (توانایی دستیابی به نتایج مطلوب) که وعده می‌دهد را ارائه دهد. این نقد نشان می‌دهد که سیستم‌های سوسیالیستی نه تنها آزادی‌های سنتی را از بین می‌برند بلکه نمی‌توانند دیدگاه جایگزین خود از آزادی را نیز محقق کنند و افراد را در هر دو مفهوم آزادی در وضعیت بدتری قرار می‌دهند.
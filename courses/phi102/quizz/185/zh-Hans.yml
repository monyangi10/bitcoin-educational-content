question: 根据保罗-勒鲁瓦-博略在《集体主义》中的批判，社会主义在自由方面的根本双重失败是什么？
answer: 它既没有提供自由派所珍视的消极自由，也没有通过国家干预实现其所承诺的积极自由
wrong_answers:
  - 它没有区分个人权利和集体需求，同时也忽视了经济效率原则
  - 它无法兼顾财产权与社会正义，同时也无法建立有效的民主体制
  - 它既破坏了市场机制和自愿协会，又无法创造可持续的经济增长
explanation: |
  勒鲁瓦-博略的分析表明，社会主义犯了双重错误：它破坏了自由主义者所珍视的消极自由（对无辜行动不设置障碍），同时又无法实现它所承诺的积极自由（获得理想结果的能力）。这一批判表明，社会主义制度不仅消除了传统自由，也无法实现其自身的另一种自由愿景，从而使个人在两种自由概念下的境况都变得更糟。
question: Kulingana na ukosoaji wa Paul Leroy-Beaulieu katika 'Le Collectivisme', ni nini kinachowakilisha kushindwa maradufu kwa msingi kwa ujamaa kuhusiana na uhuru?
answer: Haitoi uhuru hasi unaothaminiwa na waliberali wala haitoi uhuru chanya unaoahidi kupitia uingiliaji kati wa serikali.
wrong_answers:
  - Inashindwa kutofautisha kati ya haki za mtu binafsi na mahitaji ya pamoja huku pia ikipuuza kanuni za ufanisi wa kiuchumi
  - Haiwezi kupatanisha haki za mali na haki ya kijamii huku pia ikishindwa kuanzisha taasisi za kidemokrasia zenye ufanisi
  - Inadhoofisha mifumo ya soko na vyama vya hiari huku ikishindwa kuunda ukuaji endelevu wa uchumi
explanation: |
  Uchambuzi wa Leroy-Beaulieu unaonyesha kwamba ujamaa hufanya makosa mawili: unaharibu uhuru hasi (kutokuwepo kwa vikwazo kwa hatua zisizo na hatia) ambazo waliberali wanathamini, huku wakati huo huo ukishindwa kutoa uhuru chanya (uwezo wa kupata matokeo yanayotarajiwa) ambao unaahidi. Uhakiki huu unaonyesha kwamba mifumo ya ujamaa sio tu kwamba huondoa uhuru wa kitamaduni lakini pia haiwezi kutimiza maono yao mbadala ya uhuru, na kuwaacha watu wakiwa katika hali mbaya zaidi chini ya dhana zote mbili za uhuru.
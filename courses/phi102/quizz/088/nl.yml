question: Welke belangrijke historische overgang wordt in de tekst genoemd als een keerpunt dat een vreedzame productie introduceerde?
answer: De geboorte van de landbouw
wrong_answers:
  - De uitvinding van de stoommachine
  - De ontwikkeling van de internationale handel
  - Het ontstaan van contractuele relaties
explanation: |
  Het ontstaan van de landbouw wordt specifiek geïdentificeerd als een belangrijk historisch keerpunt dat vreedzame productie introduceerde, waardoor de accumulatie van overtollige hulpbronnen en de ontwikkeling van commerciële uitwisselingen mogelijk werden. Hoewel de stoommachine, internationale handel en contractuele relaties als belangrijke ontwikkelingen worden genoemd, kwamen deze later in de historische ontwikkeling. Landbouw was de fundamentele verandering die samenlevingen weghaalde van de onzekere productiemethoden uit de oudheid, waar overleven onzeker was en collectieve behoeften de individuele autonomie overheersten.
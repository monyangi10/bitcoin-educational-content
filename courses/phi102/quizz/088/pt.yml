question: Que transição histórica importante identifica o texto como representando um ponto de viragem que introduziu a produção pacífica?
answer: O nascimento da agricultura
wrong_answers:
  - A invenção da máquina a vapor
  - O desenvolvimento do comércio internacional
  - O surgimento das relações contratuais
explanation: |
  O nascimento da agricultura é especificamente identificado como um importante ponto de viragem histórico que introduziu a produção pacífica, permitindo a acumulação de recursos excedentários e o desenvolvimento de trocas comerciais. Embora a máquina a vapor, o comércio internacional e as relações contratuais sejam mencionados como desenvolvimentos importantes, estes surgiram mais tarde na progressão histórica. A agricultura foi a mudança fundamental que afastou as sociedades dos métodos de produção precários da Antiguidade, onde a sobrevivência era incerta e as necessidades colectivas dominavam a autonomia individual.
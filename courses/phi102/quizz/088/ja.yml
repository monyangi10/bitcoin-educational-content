question: 平和的生産が導入された転換点として、テキストはどのような主要な歴史的変遷を挙げているか？
answer: 農業の誕生
wrong_answers:
  - 蒸気機関の発明
  - 国際商業の発展
  - 契約関係の出現
explanation: |
  農業の誕生は、平和的な生産を導入し、余剰資源の蓄積と商業的交流の発展を可能にした大きな歴史的転換点であると特に指摘されている。蒸気機関、国際商業、契約関係も重要な発展として言及されているが、それらは歴史的な進展の中では後発のものである。農業は、生存が不確かで集団的なニーズが個人の自主性を支配していた古代の不安定な生産方法から社会をシフトさせる基礎的な変化であった。
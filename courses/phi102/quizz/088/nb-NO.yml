question: Hvilken stor historisk overgang identifiserer teksten som et vendepunkt som innførte fredelig produksjon?
answer: Jordbrukets fødsel
wrong_answers:
  - Oppfinnelsen av dampmaskinen
  - Utviklingen av internasjonal handel
  - Fremveksten av kontraktsforhold
explanation: |
  Jordbrukets fødsel identifiseres spesifikt som et viktig historisk vendepunkt som introduserte fredelig produksjon, noe som muliggjorde akkumulering av overskuddsressurser og utvikling av kommersielle utvekslinger. Selv om dampmaskinen, internasjonal handel og kontraktsforhold nevnes som viktige utviklingstrekk, kom de senere i det historiske forløpet. Jordbruket var den grunnleggende endringen som førte samfunnet bort fra oldtidens usikre produksjonsmetoder, der overlevelse var usikker og kollektive behov dominerte over individuell autonomi.
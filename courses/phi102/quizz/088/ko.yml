question: 본문에서 평화적 생산을 도입한 전환점을 나타내는 주요 역사적 변화는 무엇인가요?
answer: 농업의 탄생
wrong_answers:
  - 증기 기관의 발명
  - 국제 상거래의 발전
  - 계약 관계의 출현
explanation: |
  특히 농업의 탄생은 잉여 자원의 축적과 상업적 교류의 발전을 가능하게 한 평화적 생산을 도입한 주요 역사적 전환점으로 알려져 있습니다. 증기기관, 국제 상업 및 계약 관계도 중요한 발전으로 언급되지만, 이는 역사적 발전의 후반부에 등장한 것입니다. 농업은 생존이 불확실하고 집단적 욕구가 개인의 자율성을 지배하던 고대의 불안정한 생산 방식에서 벗어나 사회를 변화시킨 근본적인 변화였습니다.
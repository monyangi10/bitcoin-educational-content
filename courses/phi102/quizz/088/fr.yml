question: Quelle transition historique majeure le texte identifie-t-il comme représentant un tournant qui a introduit la production pacifique ?
answer: La naissance de l'agriculture
wrong_answers:
  - L'invention de la machine à vapeur
  - Le développement du commerce international
  - L'émergence des relations contractuelles
explanation: |
  La naissance de l'agriculture est spécifiquement identifiée comme un tournant historique majeur qui a introduit la production pacifique, permettant l'accumulation de ressources excédentaires et le développement d'échanges commerciaux. Si la machine à vapeur, le commerce international et les relations contractuelles sont mentionnés comme des développements importants, ils sont intervenus plus tard dans la progression historique. L'agriculture a été le changement fondamental qui a éloigné les sociétés des méthodes de production précaires de l'Antiquité, où la survie était incertaine et où les besoins collectifs dominaient l'autonomie individuelle.
question: Кой важен исторически преход е посочен в текста като повратна точка, която въвежда мирното производство?
answer: Раждането на земеделието
wrong_answers:
  - Изобретяването на парната машина
  - Развитието на международната търговия
  - Възникване на договорни отношения
explanation: |
  Възникването на земеделието е определено като основен исторически поврат, който въвежда мирно производство, позволяващо натрупването на излишни ресурси и развитието на търговски обмен. Макар парната машина, международната търговия и договорните отношения да се споменават като важни развития, те настъпват по-късно в историческия ход. Земеделието е фундаменталната промяна, която измества обществата от несигурните производствени методи от древността, където оцеляването е несигурно и колективните нужди доминират над индивидуалната автономия.
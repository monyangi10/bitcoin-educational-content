question: Ni irihe hinduka rikomeye ry’akahise ico canditswe kigaragaza ko rigereranya ihinduka ry’ibintu ryatumye habaho uguhingura ibintu mu mahoro?
answer: Ivuka ry'uburimyi .
wrong_answers:
  - Uguhingura moteri y'umwotsi
  - Iterambere ry'ubudandaji mpuzamakungu .
  - Uguseruka kw'imigenderanire y'amasezerano .
explanation: |
  Ivuka ry’uburimyi rigaragazwa cane cane nk’ihinduka rikomeye ry’amateka ryatumye habaho umusaruro w’amahoro, bituma habaho ukwirundanira ubutunzi bw’amasaranganya no guteza imbere ubudandaji. Naho moteri y’umwotsi, ubudandaji mpuzamakungu be n’imigenderanire y’amasezerano bivugwa ko ari ibintu bihambaye, vyaje mu nyuma mu bijanye n’iterambere ry’amateka. Ubuhinzi ni bwo bwari ihinduka ry’ishimikiro ryakuye imibano kure y’uburyo bwo guhingura butari bwiza bwo mu bihe vya kera, aho ubuzima bwari butamenyekana kandi ivya nkenerwa rusangi vyari vyiganje ku bwigenge bw’umuntu ku giti ciwe.
question: Koji veliki istorijski prelaz tekst identifikuje kao prekretnicu koja je uvela mirnodopsku proizvodnju?
answer: Rođenje poljoprivrede
wrong_answers:
  - Pronalaženje parne mašine
  - Razvoj međunarodne trgovine
  - Pojava ugovornih odnosa
explanation: |
  Rođenje poljoprivrede je posebno označeno kao velika istorijska prekretnica koja je uvela mirnu proizvodnju, omogućavajući akumulaciju viška resursa i razvoj komercijalnih razmena. Iako se parna mašina, međunarodna trgovina i ugovorni odnosi spominju kao važni razvojni događaji, oni su došli kasnije u istorijskom napretku. Poljoprivreda je bila osnovna promena koja je pomerila društva od nesigurnih metoda proizvodnje drevnih vremena, gde je opstanak bio neizvestan, a kolektivne potrebe su dominirale nad individualnom autonomijom.
question: Според френската либерална традиция какъв е основният проблем на изкуственото противопоставяне между теоретици и практици в обществения дебат?
answer: И теоретиците, и практиците разчитат на теоретични рамки, така че истинският проблем е да се разграничат добрите от лошите теории
wrong_answers:
  - Теоретиците наистина са откъснати от реалността, докато практиците имат по-добри конкретни познания
  - Противопоставянето е валидно, защото практиците никога не използват теоретични рамки в работата си
  - Теоретиците трябва да се фокусират само върху абстрактни понятия, докато практиците трябва да избягват всякакво теоретично мислене
explanation: |
  В главата се обяснява, че противопоставянето между теория и практика е изкуствено, тъй като всички човешки действия, дори прости като изкачването на стълби, се основават на имплицитни теории, като например гравитацията. Практиците постоянно прилагат теоретични рамки, често несъзнателно. Истинското предизвикателство не е да се избира между теория и практика, а по-скоро да се разграничат добрите теории, основани на наблюдаеми факти, от лошите теории, изградени върху заблуди. Това показва, че дихотомията е фалшива, тъй като и двете групи неизбежно използват теоретични основи.
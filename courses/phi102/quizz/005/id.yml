question: Menurut tradisi liberal Prancis, apa masalah utama dari pertentangan artifisial antara para ahli teori dan praktisi dalam debat publik?
answer: Baik ahli teori maupun praktisi bergantung pada kerangka kerja teoretis, jadi masalah sebenarnya adalah membedakan teori yang baik dari yang buruk
wrong_answers:
  - Para ahli teori memang terputus dari kenyataan, sementara para praktisi memiliki pengetahuan konkret yang lebih unggul
  - Pertentangan ini valid karena para praktisi tidak pernah menggunakan kerangka kerja teoretis dalam pekerjaan mereka
  - Para ahli teori harus fokus hanya pada konsep-konsep abstrak, sementara para praktisi harus menghindari semua pemikiran teoritis
explanation: |
  Bab ini menjelaskan bahwa pertentangan antara teori dan praktik adalah artifisial karena semua tindakan manusia, bahkan yang sederhana seperti menaiki tangga, didasarkan pada teori implisit seperti gravitasi. Para praktisi secara konstan menerapkan kerangka kerja teoretis, seringkali tanpa disadari. Tantangan sebenarnya bukanlah memilih antara teori dan praktik, melainkan membedakan teori yang baik berdasarkan fakta-fakta yang dapat diamati dengan teori yang buruk yang dibangun di atas kekeliruan. Hal ini menunjukkan bahwa dikotomi tersebut adalah salah karena kedua kelompok tersebut pasti menggunakan dasar-dasar teori.
question: 프랑스 자유주의 전통에 따르면, 공적 토론에서 이론가와 실무자 간의 인위적인 대립의 주요 문제점은 무엇입니까?
answer: 이론가와 실무자 모두 이론적 틀에 의존하기 때문에 실제 문제는 좋은 이론과 나쁜 이론을 구별하는 것입니다
wrong_answers:
  - 이론가들은 실제로 현실과 단절된 반면 실무자들은 뛰어난 구체적 지식을 가지고 있습니다
  - 실무자가 업무에 이론적 프레임워크를 사용하지 않기 때문에 반대 의견은 타당합니다
  - 이론가는 추상적인 개념에만 집중하고 실무자는 모든 이론적 사고를 피해야 합니다
explanation: |
  이 장에서는 계단을 오르는 것과 같은 단순한 행동을 포함한 모든 인간의 행동은 중력과 같은 암묵적인 이론에 기반하기 때문에 이론과 실제 사이의 대립은 인위적이라고 설명합니다. 실무자는 종종 무의식적으로 이론적 틀을 끊임없이 적용합니다. 진정한 도전은 이론과 실천 중 하나를 선택하는 것이 아니라 관찰 가능한 사실에 기반한 좋은 이론과 오류에 기반한 나쁜 이론을 구별하는 것입니다. 이는 두 그룹 모두 필연적으로 이론적 토대를 사용하기 때문에 이분법이 틀렸다는 것을 보여줍니다.
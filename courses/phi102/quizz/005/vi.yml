question: Theo truyền thống tự do của Pháp, vấn đề chính của sự đối lập giả tạo giữa các nhà lý luận và những người thực hành trong các cuộc tranh luận công khai là gì?
answer: Cả các nhà lý thuyết và những người thực hành đều dựa vào các khung lý thuyết, vì vậy vấn đề thực sự là phân biệt giữa các lý thuyết tốt và các lý thuyết tồi.
wrong_answers:
  - Các nhà lý thuyết thường xa rời thực tế, trong khi những người thực hành lại có kiến thức thực tiễn vượt trội.
  - Sự phản đối này là hợp lý vì những người làm nghề không bao giờ sử dụng các khung lý thuyết trong công việc của họ.
  - Các nhà lý thuyết chỉ nên tập trung vào các khái niệm trừu tượng, trong khi những người thực hành nên tránh mọi tư duy lý thuyết.
explanation: |
  Chương này giải thích rằng sự đối lập giữa lý thuyết và thực tiễn là giả tạo bởi vì tất cả các hành động của con người, ngay cả những hành động đơn giản như leo cầu thang, đều dựa trên các lý thuyết ngầm định như trọng lực. Người thực hành liên tục áp dụng các khung lý thuyết, thường là một cách vô thức. Thử thách thực sự không phải là lựa chọn giữa lý thuyết và thực tiễn, mà là phân biệt các lý thuyết tốt dựa trên các sự kiện có thể quan sát được với các lý thuyết tồi được xây dựng trên những sai lầm. Điều này chứng tỏ rằng sự phân đôi đó là sai lầm vì cả hai nhóm đều không thể tránh khỏi việc sử dụng các nền tảng lý thuyết.
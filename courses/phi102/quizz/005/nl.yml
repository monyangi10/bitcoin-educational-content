question: Wat is volgens de Franse liberale traditie het grootste probleem met de kunstmatige tegenstelling tussen theoretici en uitvoerders in het publieke debat?
answer: Zowel theoretici als praktijkmensen vertrouwen op theoretische kaders, dus het echte probleem is om goede van slechte theorieën te onderscheiden
wrong_answers:
  - Theoretici staan inderdaad los van de werkelijkheid, terwijl praktijkmensen superieure concrete kennis hebben
  - De oppositie is geldig omdat beoefenaars nooit theoretische kaders gebruiken in hun werk
  - Theoretici moeten zich alleen richten op abstracte concepten, terwijl praktijkmensen alle theoretisch denken moeten vermijden
explanation: |
  Het hoofdstuk legt uit dat de tegenstelling tussen theorie en praktijk kunstmatig is omdat alle menselijke handelingen, zelfs eenvoudige zoals traplopen, gebaseerd zijn op impliciete theorieën zoals zwaartekracht. Practici passen voortdurend theoretische kaders toe, vaak onbewust. De echte uitdaging is niet het kiezen tussen theorie en praktijk, maar eerder het onderscheiden van goede theorieën gebaseerd op waarneembare feiten van slechte theorieën gebouwd op drogredenen. Dit toont aan dat de dichotomie onjuist is omdat beide groepen onvermijdelijk gebruik maken van theoretische fundamenten.
question: 根據法國自由主義傳統，在公開辯論中，理論家與實踐者之間的人為對立，主要問題在哪裡？
answer: 理論家和實踐者都依賴於理論框架，因此真正的問題是區分好的理論和壞的理論。
wrong_answers:
  - 理論家確實與現實脫節，而實踐家則擁有優越的具體知識。
  - 這種反對意見是成立的，因為實務工作者從來不會在工作中使用理論架構
  - 理論家應該只專注於抽象概念，而實踐者應該避免所有理論思考
explanation: |
  本章說明，理論與實踐之間的對立是人為的，因為所有的人類行為，即使是像爬樓梯這樣簡單的行為，都是基於隱含的理論，例如重力。實踐者不斷地應用理論框架，而且常常是在無意識的情況下。真正的挑戰並不是在理論與實踐之間做出選擇，而是要區分基於可觀察事實的好理論與建立在謬誤之上的壞理論。這證明了二分法是錯誤的，因為這兩個團體都不可避免地使用理論基礎。
question: 根据法国自由主义传统，在公共辩论中人为地将理论家和实践家对立起来，主要问题是什么？
answer: 理论家和实践者都依赖于理论框架，因此真正的问题是区分好的理论和坏的理论
wrong_answers:
  - 理论家确实与现实脱节，而实践家则拥有卓越的具体知识
  - 反对意见是有道理的，因为实践者在工作中从不使用理论框架
  - 理论家只应关注抽象概念，而实践者则应避免一切理论思考
explanation: |
  该章解释说，理论与实践之间的对立是人为的，因为人类的所有行为，甚至像爬楼梯这样简单的行为，都是建立在重力等隐含理论基础之上的。实践者不断应用理论框架，而且往往是无意识的。真正的挑战不是在理论和实践之间做出选择，而是区分基于可观察事实的好理论和建立在谬误基础上的坏理论。这说明二分法是错误的，因为两类人都不可避免地使用理论基础。
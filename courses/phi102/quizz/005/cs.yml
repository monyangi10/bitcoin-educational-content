question: Jaký je podle francouzské liberální tradice hlavní problém umělého protikladu mezi teoretiky a praktiky ve veřejné diskusi?
answer: Teoretici i praktici se opírají o teoretické rámce, takže skutečným problémem je rozlišit dobré teorie od špatných
wrong_answers:
  - Teoretici jsou skutečně odtrženi od reality, zatímco praktici mají lepší konkrétní znalosti
  - Opozice je platná, protože odborníci z praxe při své práci nikdy nepoužívají teoretické rámce
  - Teoretici by se měli soustředit pouze na abstraktní pojmy, zatímco praktici by se měli vyhnout jakémukoli teoretickému uvažování
explanation: |
  Kapitola vysvětluje, že protiklad mezi teorií a praxí je umělý, protože všechny lidské činnosti, dokonce i ty jednoduché, jako je chůze po schodech, jsou založeny na implicitních teoriích, jako je gravitace. Praktici neustále uplatňují teoretické rámce, často nevědomě. Skutečnou výzvou není volba mezi teorií a praxí, ale spíše rozlišení dobrých teorií založených na pozorovatelných faktech od špatných teorií postavených na omylech. To ukazuje, že dichotomie je falešná, protože obě skupiny nevyhnutelně používají teoretické základy.
question: Mikä on ranskalaisen liberaalin perinteen mukaan suurin ongelma teoreetikoiden ja käytännön toimijoiden keinotekoisessa vastakkainasettelussa julkisessa keskustelussa?
answer: Sekä teoreetikot että käytännön toimijat tukeutuvat teoreettisiin viitekehyksiin, joten varsinainen kysymys on hyvien teorioiden erottaminen huonoista teorioista
wrong_answers:
  - Teoreetikot ovat todellakin irrottautuneet todellisuudesta, kun taas käytännön toimijoilla on ylivoimainen konkreettinen tietämys
  - Vastakkainasettelu on pätevä, koska käytännön toimijat eivät koskaan käytä työssään teoreettisia viitekehyksiä
  - Teoreetikoiden tulisi keskittyä vain abstrakteihin käsitteisiin, kun taas käytännön toimijoiden tulisi välttää kaikkea teoreettista ajattelua
explanation: |
  Luvussa selitetään, että teorian ja käytännön välinen vastakkainasettelu on keinotekoinen, koska kaikki ihmisen toimet, jopa yksinkertaiset, kuten portaiden kiipeäminen, perustuvat implisiittisiin teorioihin, kuten painovoimaan. Käytännön toimijat soveltavat jatkuvasti teoreettisia viitekehyksiä, usein tiedostamattaan. Todellinen haaste ei ole valita teorian ja käytännön välillä, vaan pikemminkin erottaa hyvät, havaittaviin tosiasioihin perustuvat teoriat huonoista, virheisiin perustuvista teorioista. Tämä osoittaa, että kahtiajako on väärä, sillä molemmat ryhmät käyttävät väistämättä teoreettisia perusteita.
question: Fransız liberal geleneğine göre, kamusal tartışmalarda teorisyenler ve uygulayıcılar arasındaki yapay karşıtlığın temel sorunu nedir?
answer: Hem teorisyenler hem de uygulayıcılar teorik çerçevelere dayanırlar, bu nedenle asıl mesele iyi teorileri kötü olanlardan ayırmaktır
wrong_answers:
  - Teorisyenler gerçekten gerçeklikten kopukken, uygulayıcılar üstün somut bilgiye sahiptir
  - Muhalefet geçerlidir çünkü uygulayıcılar çalışmalarında asla teorik çerçeveleri kullanmazlar
  - Teorisyenler sadece soyut kavramlara odaklanmalı, uygulayıcılar ise tüm teorik düşüncelerden kaçınmalıdır
explanation: |
  Bu bölüm, teori ve pratik arasındaki karşıtlığın yapay olduğunu, çünkü merdiven çıkmak gibi basit eylemler de dahil olmak üzere tüm insan eylemlerinin yerçekimi gibi örtük teorilere dayandığını açıklamaktadır. Uygulayıcılar teorik çerçeveleri çoğu zaman bilinçsizce sürekli olarak uygularlar. Asıl zorluk teori ve pratik arasında seçim yapmak değil, gözlemlenebilir gerçeklere dayanan iyi teorileri yanlışlar üzerine inşa edilmiş kötü teorilerden ayırt etmektir. Bu da ikiliğin yanlış olduğunu göstermektedir çünkü her iki grup da kaçınılmaz olarak teorik temelleri kullanmaktadır.
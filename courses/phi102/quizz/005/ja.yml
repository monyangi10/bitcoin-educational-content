question: フランスのリベラルの伝統によれば、公的な議論における理論家と実践家の間の人為的な対立の主な問題点は何か？
answer: 理論家も実務家も理論的枠組みに依存しているため、真の問題は良い理論と悪い理論を区別することである。
wrong_answers:
  - 理論家は現実から切り離されているが、実践家は具体的な知識に優れている。
  - 実務家が理論的枠組みを仕事に使うことはないからだ。
  - 理論家は抽象的な概念にのみ焦点を当てるべきであり、実務家は理論的な思考を避けるべきである。
explanation: |
  この章では、理論と実践の対立は人為的なものであり、人間の行動はすべて、たとえ階段を上るような単純なものであっても、重力のような暗黙の理論に基づいているからだと説明している。実践者は常に理論的枠組みを適用しており、多くの場合、無意識のうちに適用している。真の課題は、理論と実践のどちらかを選ぶことではなく、観察可能な事実に基づいた優れた理論と、誤謬の上に構築された悪しき理論を区別することなのである。このことは、どちらのグループも必然的に理論的な基礎を使用しているため、二分法が誤りであることを示している。
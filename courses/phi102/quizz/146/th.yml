question: อะไรที่ทำให้หน้าที่ที่ถูกต้องตามกฎหมายของรัฐแตกต่างจากหน้าที่ที่เป็นปรสิตตามการวิเคราะห์ที่นำเสนอ?
answer: ฟังก์ชันที่ถูกต้องตามกฎหมายปกป้องสิทธิของบุคคลโดยไม่แทรกแซง ในขณะที่ฟังก์ชันปรสิตแทนที่สัญญาโดยสมัครใจด้วยข้อบังคับทางการบริหาร
wrong_answers:
  - ฟังก์ชันที่ถูกต้องตามกฎหมายเกี่ยวข้องกับการแทรกแซงทางเศรษฐกิจโดยตรง ในขณะที่ฟังก์ชันปรสิตมุ่งเน้นเฉพาะการรักษาความสงบเรียบร้อยและความปลอดภัยของสาธารณะ
  - ฟังก์ชันที่ถูกต้องตามกฎหมายต้องการการอนุมัติจากเสียงข้างมากผ่านกระบวนการประชาธิปไตย ในขณะที่ฟังก์ชันปรสิตถูกกำหนดโดยข้าราชการที่ไม่ได้มาจากการเลือกตั้ง
  - ฟังก์ชันที่ถูกต้องตามกฎหมาย generate สร้างรายได้ให้กับรัฐ ในขณะที่ฟังก์ชันปรสิตทำให้ทรัพยากรสาธารณะหมดไปโดยไม่ให้ประโยชน์ที่วัดได้
explanation: |
  ข้อความนี้แยกแยะอย่างชัดเจนระหว่างสิ่งที่เรียกว่า 'การกำหนดเชิงลบ' ของรัฐ (หน้าที่ที่ชอบธรรม) ที่ปกป้องทรัพย์สิน เสรีภาพ และความปลอดภัยโดยไม่แทรกแซงการแลกเปลี่ยนโดยสมัครใจ กับ 'การกำหนดเชิงบวก' (หน้าที่ปรสิต) ที่ขัดขวาง ป้องกัน และควบคุมกิจกรรมของบุคคลผ่านกฎระเบียบทางปกครองที่แทนที่สัญญาและการแลกเปลี่ยนที่ยินยอมโดยเสรี หน้าที่ที่ชอบธรรมสร้างกรอบสำหรับความสัมพันธ์โดยสมัครใจ ในขณะที่หน้าที่ปรสิตแทนที่การตัดสินใจทางการเมืองสำหรับการเลือกของบุคคลและเสรีภาพในสัญญา
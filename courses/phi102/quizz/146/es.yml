question: ¿Qué distingue las funciones legítimas del Estado de sus funciones parasitarias según el análisis presentado?
answer: Las funciones legítimas protegen los derechos individuales sin intervenir, mientras que las funciones parasitarias sustituyen los contratos voluntarios por reglamentos administrativos
wrong_answers:
  - Las funciones legítimas implican una intervención económica directa, mientras que las parasitarias se centran únicamente en el mantenimiento del orden público y la seguridad
  - Las funciones legítimas requieren la aprobación de la mayoría a través de procesos democráticos, mientras que las funciones parasitarias son impuestas por burócratas no elegidos
  - Las funciones legítimas generan ingresos para el Estado, mientras que las parasitarias agotan los recursos públicos sin aportar beneficios apreciables
explanation: |
  El texto distingue claramente entre lo que denomina "atribuciones negativas" del Estado (funciones legítimas) que protegen la propiedad, la libertad y la seguridad sin intervenir en los intercambios voluntarios, frente a las "atribuciones positivas" (funciones parasitarias) que obstaculizan, impiden y regulan la actividad individual mediante normas administrativas que sustituyen a los contratos e intercambios libremente consentidos. Las funciones legítimas establecen el marco de las relaciones voluntarias, mientras que las funciones parasitarias sustituyen la elección individual y la libertad contractual por decisiones políticas.
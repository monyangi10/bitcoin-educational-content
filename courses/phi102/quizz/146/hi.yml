question: What distinguishes the legitimate functions of the state from its parasitic functions according to the analysis presented?
answer: Legitimate functions protect individual rights without intervening, while parasitic functions replace voluntary contracts with administrative regulations
wrong_answers:
  - Legitimate functions involve direct economic intervention, while parasitic functions focus only on maintaining public order and security
  - Legitimate functions require majority approval through democratic processes, while parasitic functions are imposed by unelected bureaucrats
  - Legitimate functions generate revenue for the state, while parasitic functions drain public resources without providing measurable benefits
explanation: |
  The text clearly distinguishes between what it calls 'negative attributions' of the state (legitimate functions) that protect property, liberty, and security without intervening in voluntary exchanges, versus 'positive attributions' (parasitic functions) that hinder, prevent, and regulate individual activity through administrative rules that replace freely consented contracts and exchanges. The legitimate functions establish the framework for voluntary relationships, while parasitic functions substitute political decisions for individual choice and contractual freedom.
question: Mis eristab esitatud analüüsi kohaselt riigi legitiimseid funktsioone selle parasiitlikest funktsioonidest?
answer: Õiguspärased funktsioonid kaitsevad individuaalseid õigusi ilma sekkumata, samas kui parasiitlikud funktsioonid asendavad vabatahtlikud lepingud haldusnormidega
wrong_answers:
  - Õiguspärased funktsioonid hõlmavad otsest majanduslikku sekkumist, samas kui parasiitlikud funktsioonid keskenduvad ainult avaliku korra ja julgeoleku säilitamisele
  - Õiguspärased funktsioonid nõuavad enamuse heakskiitu demokraatlike protsesside kaudu, samal ajal kui parasiitlikud funktsioonid kehtestavad valimata bürokraadid
  - Õiguspärased funktsioonid generate tulu riigile, samas kui parasiitlikud funktsioonid tühjendavad avalikke vahendeid ilma mõõdetavat kasu pakkumata
explanation: |
  Tekstis eristatakse selgelt riigi "negatiivseid funktsioone" (legitiimseid funktsioone), mis kaitsevad omandit, vabadust ja turvalisust, sekkumata vabatahtlikesse suhetesse, ja "positiivseid funktsioone" (parasiitlikke funktsioone), mis takistavad, takistavad ja reguleerivad individuaalset tegevust haldusnormide kaudu, mis asendavad vabalt sõlmitud lepinguid ja vahetusi. Õiguspärased funktsioonid loovad raamistiku vabatahtlikele suhetele, samas kui parasiitlikud funktsioonid asendavad individuaalse valiku ja lepinguvabaduse poliitiliste otsustega.
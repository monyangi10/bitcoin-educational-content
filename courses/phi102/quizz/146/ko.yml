question: 제시된 분석에 따르면 국가의 합법적 기능과 기생적 기능을 구별하는 것은 무엇입니까?
answer: 합법적 기능은 개입하지 않고 개인의 권리를 보호하는 반면, 기생적 기능은 자발적 계약을 행정 규제로 대체합니다
wrong_answers:
  - 합법적 기능은 직접적인 경제 개입을 포함하지만 기생적 기능은 공공 질서 및 보안 유지에만 초점을 맞춥니다
  - 합법적 기능은 민주적 절차를 통한 다수결의 승인이 필요하지만, 기생적 기능은 선출되지 않은 관료에 의해 부과됩니다
  - 합법적인 기능은 국가에 generate 수익을 가져다주는 반면, 기생 기능은 측정 가능한 혜택을 제공하지 않고 공공 자원을 소모합니다
explanation: |
  본문은 자발적 교환에 개입하지 않고 재산, 자유, 안전을 보호하는 국가의 '부정적 귀속'(합법적 기능)과 자유롭게 동의한 계약과 교환을 대체하는 행정 규칙을 통해 개인의 활동을 방해, 방지, 규제하는 '긍정적 귀속'(기생적 기능)을 명확하게 구분합니다. 합법적 기능은 자발적 관계의 틀을 확립하는 반면, 기생적 기능은 개인의 선택과 계약의 자유를 정치적 결정으로 대체합니다.
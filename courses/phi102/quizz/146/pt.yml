question: O que distingue as funções legítimas do Estado das suas funções parasitárias, de acordo com a análise apresentada?
answer: As funções legítimas protegem os direitos individuais sem intervir, enquanto as funções parasitárias substituem os contratos voluntários por regulamentos administrativos
wrong_answers:
  - As funções legítimas implicam uma intervenção económica direta, enquanto as funções parasitárias se limitam a manter a ordem e a segurança públicas
  - As funções legítimas requerem a aprovação da maioria através de processos democráticos, enquanto as funções parasitárias são impostas por burocratas não eleitos
  - As funções legítimas geram receitas para o Estado, enquanto as funções parasitárias drenam os recursos públicos sem proporcionar benefícios mensuráveis
explanation: |
  O texto distingue claramente entre aquilo a que chama "atribuições negativas" do Estado (funções legítimas), que protegem a propriedade, a liberdade e a segurança sem intervir nas trocas voluntárias, e "atribuições positivas" (funções parasitárias), que dificultam, impedem e regulam a atividade individual através de regras administrativas que substituem os contratos e as trocas livremente consentidas. As funções legítimas estabelecem o quadro para as relações voluntárias, enquanto as funções parasitárias substituem as decisões políticas pela escolha individual e pela liberdade contratual.
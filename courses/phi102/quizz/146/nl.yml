question: Wat onderscheidt de legitieme functies van de staat van zijn parasitaire functies volgens de gepresenteerde analyse?
answer: Legitieme functies beschermen individuele rechten zonder in te grijpen, terwijl parasitaire functies vrijwillige contracten vervangen door administratieve regels
wrong_answers:
  - Legitieme functies omvatten directe economische interventie, terwijl parasitaire functies zich alleen richten op het handhaven van de openbare orde en veiligheid
  - Legitieme functies vereisen goedkeuring door een meerderheid via democratische processen, terwijl parasitaire functies worden opgelegd door ongekozen bureaucraten
  - Legitieme functies leveren de staat generate inkomsten op, terwijl parasitaire functies publieke middelen aftappen zonder meetbare voordelen op te leveren
explanation: |
  De tekst maakt een duidelijk onderscheid tussen wat hij 'negatieve attributies' van de staat noemt (legitieme functies) die eigendom, vrijheid en veiligheid beschermen zonder in te grijpen in vrijwillige uitwisselingen, versus 'positieve attributies' (parasitaire functies) die individuele activiteiten belemmeren, voorkomen en reguleren door middel van administratieve regels die in de plaats komen van vrijelijk overeengekomen contracten en uitwisselingen. De legitieme functies scheppen het kader voor vrijwillige relaties, terwijl parasitaire functies politieke beslissingen in de plaats stellen van individuele keuze en contractuele vrijheid.
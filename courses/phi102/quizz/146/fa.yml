question: چه چیزی وظایف مشروع دولت را از وظایف انگلی آن متمایز می‌کند بر اساس تحلیلی که ارائه شده است؟
answer: عملکردهای مشروع بدون مداخله از حقوق فردی محافظت می‌کنند، در حالی که عملکردهای انگلی قراردادهای داوطلبانه را با مقررات اداری جایگزین می‌کنند.
wrong_answers:
  - عملکردهای مشروع شامل مداخله مستقیم اقتصادی می‌شوند، در حالی که عملکردهای انگلی تنها بر حفظ نظم و امنیت عمومی تمرکز دارند.
  - عملکردهای مشروع نیاز به تأیید اکثریت از طریق فرآیندهای دموکراتیک دارند، در حالی که عملکردهای انگلی توسط بوروکرات‌های غیرمنتخب تحمیل می‌شوند.
  - عملکردهای قانونی generate درآمدی برای دولت ایجاد می‌کنند، در حالی که عملکردهای انگلی منابع عمومی را بدون ارائه مزایای قابل اندازه‌گیری تخلیه می‌کنند.
explanation: |
  متن به وضوح بین آنچه که آن را 'نسبت‌های منفی' دولت (وظایف مشروع) می‌نامد که از مالکیت، آزادی و امنیت بدون دخالت در مبادلات داوطلبانه محافظت می‌کند، در مقابل 'نسبت‌های مثبت' (وظایف انگلی) که فعالیت فردی را از طریق قوانین اداری که جایگزین قراردادها و مبادلات با رضایت آزادانه می‌شوند، مانع، جلوگیری و تنظیم می‌کند، تمایز قائل می‌شود. وظایف مشروع چارچوبی برای روابط داوطلبانه ایجاد می‌کنند، در حالی که وظایف انگلی تصمیمات سیاسی را جایگزین انتخاب فردی و آزادی قراردادی می‌کنند.
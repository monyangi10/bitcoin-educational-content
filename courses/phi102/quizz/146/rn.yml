question: Ni igiki gitandukanya ibikorwa vyemewe vya Leta n’ibikorwa vyayo vy’ubumara hakurikijwe isesengura ryashikirijwe?
answer: Ibikorwa vyemewe birinda uburenganzira bw’umuntu ku giti ciwe ataco bivamwo, mu gihe ibikorwa vy’ibikoko bisubirira amasezerano y’ubushake n’amabwirizwa y’ubutegetsi .
wrong_answers:
  - Ibikorwa vyemewe birimwo ugufasha mu vy’ubutunzi ataco bimaze, mu gihe ibikorwa vy’ibikoko vyibanda gusa ku kubungabunga umutekano wa bose .
  - Ibikorwa vyemewe bisaba kwemezwa na benshi biciye mu nzira za demokarasi, mu gihe ibikorwa vy’ubumara bitegekwa n’abarongozi batatowe .
  - Ibikorwa vyemewe generate inyungu kuri Leta, mu gihe ibikorwa vy’ibikoko bikuraho ubutunzi bwa Leta bitatanga inyungu zigereranywa
explanation: |
  Ico canditswe kiratandukanya neza ivyo cita ‘ibimenyetso bibi’ vya Leta (ibikorwa vyemewe) birinda umutungo, umwidegemvyo, n’umutekano ataco bihinduye mu guhanahana amakuru ku bushake, n’‘ibimenyetso vyiza’ (ibikorwa vy’ibikoko) bibuza, bikabuza, kandi bitunganya ibikorwa vy’umuntu ku giti ciwe biciye mu mategeko y’ubutegetsi ahindurwa n’ubuntu. Inshingano zibereye zishinga urufatiro rw’imigenderanire y’ubushake, mu gihe inshingano z’ibikoko zisubirira ingingo za politike mu guhitamwo kw’umuntu ku giti ciwe n’umwidegemvyo w’amasezerano.
question: Sunulan analize göre devletin meşru işlevlerini parazit işlevlerinden ayıran nedir?
answer: Meşru işlevler bireysel hakları müdahale etmeden korurken, parazit işlevler gönüllü sözleşmelerin yerine idari düzenlemeleri geçirir
wrong_answers:
  - Meşru işlevler doğrudan ekonomik müdahaleyi içerirken, asalak işlevler yalnızca kamu düzeni ve güvenliğini sağlamaya odaklanır
  - Meşru işlevler demokratik süreçler yoluyla çoğunluğun onayını gerektirirken, parazit işlevler seçilmemiş bürokratlar tarafından dayatılır
  - Meşru işlevler devlete gelir sağlarken, parazit işlevler ölçülebilir faydalar sağlamadan kamu kaynaklarını tüketir
explanation: |
  Metin, devletin gönüllü mübadelelere müdahale etmeden mülkiyeti, özgürlüğü ve güvenliği koruyan 'negatif atıfları' (meşru işlevler) ile özgürce rıza gösterilen sözleşmelerin ve mübadelelerin yerini alan idari kurallar yoluyla bireysel faaliyetleri engelleyen, önleyen ve düzenleyen 'pozitif atıfları' (asalak işlevler) arasında net bir ayrım yapmaktadır. Meşru işlevler gönüllü ilişkiler için çerçeve oluştururken, asalak işlevler bireysel seçim ve sözleşme özgürlüğünün yerine siyasi kararları ikame eder.
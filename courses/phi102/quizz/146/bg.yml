question: Какво отличава легитимните функции на държавата от нейните паразитни функции според представения анализ?
answer: Легитимните функции защитават индивидуалните права, без да се намесват, докато паразитните функции заменят доброволните договори с административни разпоредби
wrong_answers:
  - Легитимните функции включват пряка икономическа намеса, докато паразитните функции се съсредоточават само върху поддържането на обществения ред и сигурност
  - Легитимните функции изискват одобрението на мнозинството чрез демократични процеси, докато паразитните функции се налагат от неизбрани бюрократи
  - Легитимните функции носят приходи за държавата, докато паразитните функции източват публичните ресурси, без да осигуряват измерими ползи
explanation: |
  Текстът ясно разграничава това, което нарича "негативни атрибути" на държавата (легитимни функции), които защитават собствеността, свободата и сигурността, без да се намесват в доброволната размяна, от "позитивните атрибути" (паразитни функции), които възпрепятстват, предотвратяват и регулират индивидуалната дейност чрез административни правила, които заместват договорите и размяната по взаимно съгласие. Легитимните функции създават рамката на доброволните отношения, докато паразитните функции заместват индивидуалния избор и договорната свобода с политически решения.
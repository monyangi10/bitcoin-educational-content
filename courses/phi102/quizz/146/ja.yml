question: 提示された分析によれば、国家の合法的な機能と寄生的な機能とを区別するものは何か？
answer: 合法的機能は介入することなく個人の権利を保護し、寄生的機能は自発的な契約を行政規制に置き換える。
wrong_answers:
  - 合法的な機能は直接的な経済介入を伴うが、寄生的な機能は公共の秩序と治安の維持にのみ焦点を当てる。
  - 合法的な機能には民主的プロセスによる多数派の承認が必要だが、寄生的な機能は選挙で選ばれたわけでもない官僚が押し付ける。
  - 一方、寄生的な機能は、測定可能な利益をもたらすことなく公的資源を流出させる。
explanation: |
  このテキストでは、自発的な交換に介入することなく、財産、自由、安全を保護する国家の「消極的帰属」（合法的機能）と、自由に合意した契約や交換に取って代わる行政ルールによって、個人の活動を妨げ、阻止し、規制する「積極的帰属」（寄生的機能）とを明確に区別している。正統的機能は自発的な人間関係の枠組みを確立し、寄生的機能は政治的決定を個人の選択や契約の自由の代わりにする。
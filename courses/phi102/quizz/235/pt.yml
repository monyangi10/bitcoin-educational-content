question: De acordo com o pensamento liberal, que distinção fundamental determina quais as funções do Estado que devem ser mantidas ou eliminadas?
answer: Funções necessárias para estabelecer o Estado de direito, proteger os direitos individuais e fazer cumprir os contratos versus funções que podem ser asseguradas pela iniciativa privada e pelos mecanismos de mercado
wrong_answers:
  - Funções que beneficiam a elite rica versus funções que servem a classe trabalhadora e as populações desfavorecidas
  - Funções desempenhadas a nível nacional versus funções que devem ser descentralizadas para os governos regionais e locais
  - Funções que geram receitas para o Estado versus funções que exigem despesas públicas e impostos
explanation: |
  A teoria liberal faz uma distinção crucial entre as funções necessárias do Estado (Estado de direito, justiça, execução de contratos, proteção dos direitos individuais) e as funções acessórias que podem ser asseguradas através da iniciativa privada, da associação voluntária e da coordenação do mercado. As outras opções deturpam as prioridades liberais: não se trata de privilégio de classe, mas de eficiência institucional; não se trata de centralização versus descentralização, mas de ação estatal versus ação privada; e não se trata de geração de receitas, mas de funções estatais legítimas versus ilegítimas.
question: بر اساس تفکر لیبرال، چه تمایز بنیادی تعیین می‌کند که کدام وظایف دولت باید حفظ شوند و کدام باید حذف شوند؟
answer: عملکردهای ضروری برای برقراری حاکمیت قانون، حفاظت از حقوق فردی و اجرای قراردادها در مقابل عملکردهایی که می‌توانند توسط ابتکار خصوصی و مکانیسم‌های بازار مدیریت شوند.
wrong_answers:
  - عملکردهایی که به نفع نخبگان ثروتمند است در مقابل عملکردهایی که به طبقه کارگر و جمعیت‌های محروم خدمت می‌کنند
  - عملکردهایی که در سطح ملی انجام می‌شوند در مقابل عملکردهایی که باید به دولت‌های منطقه‌ای و محلی غیرمتمرکز شوند
  - عملکردهایی که درآمد generate برای دولت ایجاد می‌کنند در مقابل عملکردهایی که نیاز به هزینه‌های عمومی و مالیات دارند.
explanation: |
  نظریه لیبرال تمایز مهمی بین وظایف ضروری دولت (حاکمیت قانون، عدالت، اجرای قرارداد، حفاظت از حقوق فردی) و وظایف جانبی که می‌توانند از طریق بنگاه‌های خصوصی، انجمن‌های داوطلبانه و هماهنگی بازار انجام شوند، قائل می‌شود. گزینه‌های دیگر اولویت‌های لیبرال را نادرست نشان می‌دهند: موضوع بر سر امتیاز طبقاتی نیست بلکه کارایی نهادی است؛ بر سر تمرکز در مقابل عدم تمرکز نیست بلکه بر سر اقدام دولتی در مقابل اقدام خصوصی است؛ و بر سر تولید درآمد نیست بلکه بر سر نقش‌های مشروع در مقابل نامشروع دولت است.
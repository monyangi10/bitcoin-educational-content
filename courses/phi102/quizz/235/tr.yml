question: Liberal düşünceye göre, hangi temel ayrım devletin hangi işlevlerinin sürdürülmesi ya da ortadan kaldırılması gerektiğini belirler?
answer: Hukukun üstünlüğünü tesis etmek, bireysel hakları korumak ve sözleşmeleri uygulamak için gerekli işlevler ile özel girişim ve piyasa mekanizmaları tarafından yerine getirilebilecek işlevler
wrong_answers:
  - Varlıklı elit kesime fayda sağlayan işlevler ile işçi sınıfı ve dezavantajlı nüfuslara hizmet eden işlevler
  - Ulusal düzeyde yerine getirilen işlevler ile bölgesel ve yerel yönetimlere dağıtılması gereken işlevler
  - Devlete gelir sağlayan işlevler ile kamu harcaması ve vergilendirme gerektiren işlevler
explanation: |
  Liberal teori, devletin gerekli işlevleri (hukukun üstünlüğü, adalet, sözleşmelerin uygulanması, bireysel hakların korunması) ile özel teşebbüs, gönüllü birliktelik ve piyasa koordinasyonu yoluyla üstesinden gelinebilecek aksesuar işlevler arasında önemli bir ayrım yapar. Diğer seçenekler liberal öncelikleri yanlış yansıtmaktadır: mesele sınıf ayrıcalığı değil, kurumsal verimliliktir; merkezileşmeye karşı adem-i merkezileşme değil, devlete karşı özel eylemdir; gelir yaratma değil, meşru ve gayrimeşru devlet rolleridir.
question: Jaký základní rozdíl podle liberálního myšlení určuje, které funkce státu by měly být zachovány a které odstraněny?
answer: Funkce nezbytné pro nastolení právního státu, ochranu práv jednotlivců a vymáhání smluv versus funkce, které lze zvládnout soukromou iniciativou a tržními mechanismy
wrong_answers:
  - Funkce, z nichž má prospěch bohatá elita, versus funkce, které slouží pracující třídě a znevýhodněným skupinám obyvatel
  - Funkce vykonávané na celostátní úrovni versus funkce, které by měly být decentralizovány na regionální a místní samosprávy
  - Funkce, které jsou příjmem státu, versus funkce, které vyžadují veřejné výdaje a zdanění
explanation: |
  Liberální teorie zásadně rozlišuje mezi nezbytnými funkcemi státu (vláda práva, spravedlnost, vymáhání smluv, ochrana práv jednotlivce) a doplňkovými funkcemi, které lze řešit prostřednictvím soukromého podnikání, dobrovolného sdružování a koordinace trhu. Ostatní možnosti zkreslují liberální priority: nejde o třídní privilegia, ale o institucionální efektivitu; nejde o centralizaci versus decentralizaci, ale o státní versus soukromé působení; a nejde o tvorbu příjmů, ale o legitimní versus nelegitimní role státu.
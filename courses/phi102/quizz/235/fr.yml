question: Selon la pensée libérale, quelle distinction fondamentale détermine quelles fonctions de l'État doivent être maintenues ou éliminées ?
answer: Fonctions nécessaires à l'établissement de l'État de droit, à la protection des droits individuels et à l'exécution des contrats par opposition aux fonctions qui peuvent être prises en charge par l'initiative privée et les mécanismes du marché
wrong_answers:
  - Les fonctions qui profitent à l'élite fortunée par opposition aux fonctions qui servent la classe ouvrière et les populations défavorisées
  - Fonctions exercées au niveau national et fonctions qui devraient être décentralisées vers les gouvernements régionaux et locaux
  - Fonctions qui génèrent des recettes pour l'État et fonctions qui nécessitent des dépenses publiques et des impôts
explanation: |
  La théorie libérale établit une distinction cruciale entre les fonctions étatiques nécessaires (État de droit, justice, respect des contrats, protection des droits individuels) et les fonctions accessoires qui peuvent être prises en charge par l'entreprise privée, l'association volontaire et la coordination du marché. Les autres options déforment les priorités libérales : il ne s'agit pas de privilèges de classe mais d'efficacité institutionnelle ; il ne s'agit pas de centralisation ou de décentralisation mais d'action étatique ou privée ; il ne s'agit pas de génération de revenus mais de rôles légitimes ou illégitimes de l'État.
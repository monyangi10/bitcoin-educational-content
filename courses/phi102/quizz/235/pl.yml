question: Według myśli liberalnej, jakie fundamentalne rozróżnienie określa, które funkcje państwa powinny zostać utrzymane, a które wyeliminowane?
answer: Funkcje niezbędne do ustanowienia rządów prawa, ochrony praw jednostki i egzekwowania umów w porównaniu z funkcjami, które mogą być obsługiwane przez prywatną inicjatywę i mechanizmy rynkowe
wrong_answers:
  - Funkcje przynoszące korzyści zamożnym elitom w porównaniu z funkcjami służącymi klasie robotniczej i populacjom znajdującym się w niekorzystnej sytuacji
  - Funkcje wykonywane na szczeblu krajowym a funkcje, które powinny zostać zdecentralizowane na rzecz władz regionalnych i lokalnych
  - Funkcje, które przynoszą państwu dochód generate w porównaniu z funkcjami, które wymagają wydatków publicznych i opodatkowania
explanation: |
  Teoria liberalna dokonuje kluczowego rozróżnienia między niezbędnymi funkcjami państwa (rządy prawa, sprawiedliwość, egzekwowanie umów, ochrona praw jednostki) a funkcjami dodatkowymi, które mogą być obsługiwane przez prywatną przedsiębiorczość, dobrowolne stowarzyszenia i koordynację rynku. Inne opcje błędnie przedstawiają liberalne priorytety: nie chodzi o przywileje klasowe, ale o efektywność instytucjonalną; nie o centralizację kontra decentralizację, ale o działania państwowe kontra prywatne; i nie o generowanie dochodów, ale o legalne kontra nielegalne role państwa.
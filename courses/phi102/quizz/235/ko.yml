question: 자유주의 사상에 따르면, 어떤 국가 기능을 유지하고 제거해야 하는지를 결정하는 근본적인 구분은 무엇인가요?
answer: 법치 확립, 개인 권리 보호, 계약 집행에 필요한 기능과 민간 주도 및 시장 메커니즘으로 처리할 수 있는 기능의 구분
wrong_answers:
  - 부유한 엘리트에게 혜택을 주는 기능 대 노동자 계층과 소외된 계층을 위한 기능
  - 국가 차원에서 수행되는 기능 대 지역 및 지방 정부로 분산되어야 하는 기능
  - 국가 수입이 0인 기능과 공공 지출 및 과세가 필요한 기능 비교
explanation: |
  자유주의 이론은 국가의 필수 기능(법치, 사법, 계약 집행, 개인 권리 보호)과 사기업, 자발적 연합, 시장 조정을 통해 처리할 수 있는 보조 기능을 중요하게 구분합니다. 다른 옵션은 계급적 특권이 아니라 제도적 효율성이, 중앙집권 대 분권화가 아니라 국가 대 사적 행동이, 수익 창출이 아니라 합법적인 국가 역할이 아니라 불법적인 국가 역할이 자유주의적 우선순위를 잘못 표현하고 있습니다.
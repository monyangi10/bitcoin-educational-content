question: 根據自由主義思想，什麼基本區別決定了哪些國家功能應該維持，哪些應該取消？
answer: 建立法治、保護個人權利和執行契約所需的功能，與可由私人主動性和市場機制處理的功能的比較
wrong_answers:
  - 造福富裕菁英的功能與服務勞動階級和弱勢族群的功能
  - 在國家層級執行的職能與應下放到區域和地方政府的職能的比較
  - 為國家創造 generate 收入的功能與需要公共支出和課稅的功能比較
explanation: |
  自由主義理論在必要的國家功能（法治、正義、契約執行、個人權利保護）與可透過私人企業、自願結社和市場協調來處理的附帶功能之間，做了重要的區分。其他選項歪曲了自由主義的優先考量：這不是階級特權的問題，而是制度效率的問題；不是集權與分權的問題，而是國家行動與私人行動的問題；也不是創造收入的問題，而是合法與不合法的國家角色的問題。
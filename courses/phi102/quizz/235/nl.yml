question: Welk fundamenteel onderscheid bepaalt volgens het liberale gedachtegoed welke staatsfuncties behouden moeten blijven of afgeschaft moeten worden?
answer: Functies die nodig zijn voor het vestigen van een rechtsstaat, het beschermen van individuele rechten en het afdwingen van contracten versus functies die kunnen worden uitgevoerd door particulier initiatief en marktmechanismen
wrong_answers:
  - Functies die ten goede komen aan de rijke elite versus functies die de arbeidersklasse en achtergestelde bevolkingsgroepen dienen
  - Functies die op nationaal niveau worden uitgevoerd versus functies die moeten worden gedecentraliseerd naar regionale en lokale overheden
  - Functies die generate inkomsten voor de staat opleveren versus functies die overheidsuitgaven en belastingen vereisen
explanation: |
  De liberale theorie maakt een cruciaal onderscheid tussen noodzakelijke staatsfuncties (rechtsstaat, rechtspraak, handhaving van contracten, bescherming van individuele rechten) en bijkomende functies die kunnen worden uitgevoerd door particulier ondernemerschap, vrijwillige vereniging en marktcoördinatie. De andere opties geven een verkeerd beeld van de liberale prioriteiten: het gaat niet om klasseprivileges maar om institutionele efficiëntie; niet om centralisatie versus decentralisatie maar om staat versus privéactie; en niet om het genereren van inkomsten maar om legitieme versus onwettige staatsrollen.
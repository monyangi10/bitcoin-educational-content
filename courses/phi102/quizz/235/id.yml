question: Menurut pemikiran liberal, perbedaan mendasar apa yang menentukan fungsi negara mana yang harus dipertahankan dan mana yang harus dihilangkan?
answer: Fungsi-fungsi yang diperlukan untuk menegakkan supremasi hukum, melindungi hak-hak individu, dan menegakkan kontrak versus fungsi-fungsi yang dapat ditangani oleh inisiatif swasta dan mekanisme pasar
wrong_answers:
  - Fungsi yang menguntungkan elit kaya versus fungsi yang melayani kelas pekerja dan masyarakat yang kurang beruntung
  - Fungsi-fungsi yang dilakukan di tingkat nasional versus fungsi-fungsi yang seharusnya didesentralisasikan ke pemerintah regional dan lokal
  - Fungsi-fungsi yang menghasilkan pendapatan generate bagi negara versus fungsi-fungsi yang membutuhkan belanja publik dan pajak
explanation: |
  Teori liberal membuat perbedaan penting antara fungsi-fungsi negara yang diperlukan (penegakan hukum, keadilan, penegakan kontrak, perlindungan hak-hak individu) dan fungsi-fungsi tambahan yang dapat ditangani melalui perusahaan swasta, asosiasi sukarela, dan koordinasi pasar. Pilihan-pilihan lain salah menggambarkan prioritas liberal: ini bukan tentang hak istimewa kelas tetapi efisiensi kelembagaan; bukan tentang sentralisasi versus desentralisasi tetapi tentang tindakan negara versus swasta; dan bukan tentang perolehan pendapatan tetapi tentang peran negara yang sah versus yang tidak sah.
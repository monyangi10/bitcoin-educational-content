question: ตามแนวคิดเสรีนิยม ความแตกต่างพื้นฐานใดที่กำหนดว่าหน้าที่ของรัฐใดควรรักษาไว้และควรยกเลิก?
answer: ฟังก์ชันที่จำเป็นสำหรับการสร้างหลักนิติธรรม การคุ้มครองสิทธิส่วนบุคคล และการบังคับใช้สัญญา เทียบกับฟังก์ชันที่สามารถจัดการได้โดยการริเริ่มของเอกชนและกลไกตลาด
wrong_answers:
  - ฟังก์ชันที่เป็นประโยชน์ต่อชนชั้นสูงที่มั่งคั่งเทียบกับฟังก์ชันที่ให้บริการแก่ชนชั้นแรงงานและประชากรที่ด้อยโอกาส
  - ฟังก์ชันที่ดำเนินการในระดับชาติเทียบกับฟังก์ชันที่ควรกระจายอำนาจไปยังรัฐบาลระดับภูมิภาคและท้องถิ่น
  - ฟังก์ชันที่สร้างรายได้ให้กับรัฐ generate เทียบกับฟังก์ชันที่ต้องใช้จ่ายสาธารณะและการเก็บภาษี
explanation: |
  ทฤษฎีเสรีนิยมทำการแยกแยะที่สำคัญระหว่างหน้าที่ของรัฐที่จำเป็น (หลักนิติธรรม ความยุติธรรม การบังคับใช้สัญญา การคุ้มครองสิทธิส่วนบุคคล) และหน้าที่เสริมที่สามารถจัดการได้ผ่านทางองค์กรเอกชน การรวมกลุ่มโดยสมัครใจ และการประสานงานทางตลาด ตัวเลือกอื่น ๆ บิดเบือนลำดับความสำคัญของเสรีนิยม: ไม่ใช่เรื่องสิทธิพิเศษทางชนชั้นแต่เป็นเรื่องประสิทธิภาพของสถาบัน; ไม่ใช่เรื่องการรวมศูนย์กับการกระจายอำนาจแต่เป็นเรื่องการกระทำของรัฐกับเอกชน; และไม่ใช่เรื่องการสร้างรายได้แต่เป็นเรื่องบทบาทของรัฐที่ชอบด้วยกฎหมายกับไม่ชอบด้วยกฎหมาย
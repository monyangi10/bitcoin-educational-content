question: Metnin sosyalist düşünceye yönelttiği eleştiriye göre, sosyalistler ulusal egemenliği savunurken mirasa karşı çıktıklarında hangi temel çelişki ortaya çıkmaktadır?
answer: Ulusal toprakların vatandaşlar tarafından kolektif olarak miras alınmasını kabul ederken, özel mülkiyetin bireysel olarak miras alınmasını reddederler
wrong_answers:
  - Nesiller arasında yerel mülkiyet transferlerine karşı çıkarken servetin uluslararası yeniden dağıtımını destekliyorlar
  - Teoride bireysel mülkiyet haklarını savunurken, pratikte kolektif mülkiyeti desteklemektedirler
  - Ulusların eşit olmayan toprak avantajlarını korumaları gerektiğini savunurken kaynakların eşit dağılımını teşvik ederler
explanation: |
  Metin, sosyalist düşüncedeki temel bir çelişkiyi tanımlamaktadır: sosyalistler, haksız servet aktarımı olarak özel mirasa karşı çıkarken, aynı zamanda ulusal sınırları ve egemenliği savunmaktadırlar ki bu da esasen Fransız vatandaşlarının Fransız topraklarını önceki nesillerden toplu olarak 'miras aldıklarını' kabul etmek anlamına gelmektedir. Bu da mülkiyet ilkelerinin tutarsız bir şekilde uygulandığını ortaya koymaktadır - mirası bireysel düzeyde reddederken kolektif/ulusal düzeyde kabul etmek. Diğer seçenekler, metinde vurgulanan belirli çelişkiyi yanlış yansıtmaktadır.
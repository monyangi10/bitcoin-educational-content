question: Согласно критике социалистической мысли в тексте, какое фундаментальное противоречие возникает, когда социалисты выступают против наследования, защищая при этом национальный суверенитет?
answer: Они признают коллективное наследование гражданами национальной территории, отвергая индивидуальное наследование частной собственности
wrong_answers:
  - Они поддерживают международное перераспределение богатства, но при этом выступают против передачи собственности между поколениями внутри страны
  - Они защищают права индивидуальной собственности в теории и поддерживают коллективную собственность на практике
  - Они выступают за равное распределение ресурсов, утверждая при этом, что государства должны сохранять неравные территориальные преимущества
explanation: |
  Текст выявляет ключевое противоречие в социалистическом мышлении: выступая против частного наследования как несправедливой передачи богатства, социалисты одновременно защищают национальные границы и суверенитет, что, по сути, означает согласие с тем, что граждане Франции коллективно "наследуют" территорию страны от предыдущих поколений. В этом проявляется непоследовательное применение принципов собственности - отвергая наследование на индивидуальном уровне, они в то же время принимают его на коллективном/национальном уровне. Другие варианты искажают конкретное противоречие, выделенное в тексте.
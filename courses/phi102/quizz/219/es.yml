question: Según la crítica del texto al pensamiento socialista, ¿qué contradicción fundamental surge cuando los socialistas se oponen a la herencia al tiempo que defienden la soberanía nacional?
answer: Aceptan la herencia colectiva del territorio nacional por parte de los ciudadanos, al tiempo que rechazan la herencia individual de la propiedad privada
wrong_answers:
  - Apoyan la redistribución internacional de la riqueza mientras se oponen a las transferencias nacionales de propiedad entre generaciones
  - Defienden el derecho de propiedad individual en teoría, pero apoyan la propiedad colectiva en la práctica
  - Promueven la distribución equitativa de los recursos al tiempo que sostienen que las naciones deben mantener ventajas territoriales desiguales
explanation: |
  El texto identifica una contradicción clave en el pensamiento socialista: mientras se oponen a la herencia privada como transmisión injusta de la riqueza, los socialistas defienden simultáneamente las fronteras y la soberanía nacionales, lo que significa esencialmente aceptar que los ciudadanos franceses "hereden" colectivamente el territorio francés de las generaciones anteriores. Esto revela una aplicación incoherente de los principios de propiedad: rechazar la herencia a nivel individual y aceptarla a nivel colectivo/nacional. Las otras opciones tergiversan la contradicción específica que se destaca en el texto.
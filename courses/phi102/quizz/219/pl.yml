question: Zgodnie z zawartą w tekście krytyką myśli socjalistycznej, jaka fundamentalna sprzeczność pojawia się, gdy socjaliści sprzeciwiają się dziedziczeniu, jednocześnie broniąc suwerenności narodowej?
answer: Akceptują zbiorowe dziedziczenie terytorium narodowego przez obywateli, jednocześnie odrzucając indywidualne dziedziczenie własności prywatnej
wrong_answers:
  - Wspierają międzynarodową redystrybucję bogactwa, jednocześnie sprzeciwiając się krajowym transferom własności między pokoleniami
  - W teorii bronią indywidualnych praw własności, a w praktyce wspierają własność zbiorową
  - Promują równy podział zasobów, jednocześnie utrzymując, że narody powinny zachować nierówną przewagę terytorialną
explanation: |
  Tekst identyfikuje kluczową sprzeczność w myśleniu socjalistycznym: sprzeciwiając się prywatnemu dziedziczeniu jako niesprawiedliwemu przekazywaniu bogactwa, socjaliści jednocześnie bronią granic państwowych i suwerenności, co zasadniczo oznacza akceptację faktu, że obywatele francuscy zbiorowo "dziedziczą" francuskie terytorium po poprzednich pokoleniach. Ujawnia to niekonsekwentne stosowanie zasad własności - odrzucanie dziedziczenia na poziomie indywidualnym przy jednoczesnym akceptowaniu go na poziomie zbiorowym/narodowym. Pozostałe opcje błędnie przedstawiają konkretną sprzeczność podkreśloną w tekście.
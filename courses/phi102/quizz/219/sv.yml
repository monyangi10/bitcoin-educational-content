question: Enligt textens kritik av det socialistiska tänkandet, vilken grundläggande motsägelse uppstår när socialister motsätter sig arv samtidigt som de försvarar nationell suveränitet?
answer: De accepterar medborgarnas kollektiva arv av det nationella territoriet, men förkastar individuellt arv av privat egendom
wrong_answers:
  - De stöder internationell omfördelning av rikedomar men motsätter sig inhemska egendomsöverföringar mellan generationer
  - De försvarar individuell äganderätt i teorin men stöder kollektivt ägande i praktiken
  - De förespråkar en rättvis fördelning av resurser samtidigt som de hävdar att nationer bör behålla ojämlika territoriella fördelar
explanation: |
  Texten identifierar en viktig motsägelse i socialistiskt tänkande: samtidigt som socialister motsätter sig privat arv som orättvis överföring av rikedom, försvarar de samtidigt nationella gränser och suveränitet, vilket i huvudsak innebär att de accepterar att franska medborgare kollektivt "ärver" franskt territorium från tidigare generationer. Detta visar på en inkonsekvent tillämpning av egendomsprinciperna - att förkasta arv på individnivå samtidigt som man accepterar det på kollektiv/nationell nivå. De andra alternativen ger en felaktig bild av den specifika motsägelse som lyfts fram i texten.
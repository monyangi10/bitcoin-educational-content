question: Според критиката на социалистическата мисъл в текста, какво фундаментално противоречие възниква, когато социалистите се противопоставят на наследяването и същевременно защитават националния суверенитет?
answer: Те приемат колективното наследяване на националната територия от гражданите, като същевременно отхвърлят индивидуалното наследяване на частната собственост
wrong_answers:
  - Те подкрепят международното преразпределение на богатството, като същевременно се противопоставят на вътрешните прехвърляния на собственост между поколенията
  - На теория те защитават индивидуалните права на собственост, а на практика подкрепят колективната собственост
  - Те насърчават равномерното разпределение на ресурсите, като същевременно поддържат тезата, че държавите трябва да запазят неравностойни териториални предимства
explanation: |
  Текстът идентифицира ключово противоречие в социалистическото мислене: докато се противопоставят на частното наследяване като несправедливо предаване на богатство, социалистите едновременно защитават националните граници и суверенитет, което по същество означава да приемат, че френските граждани колективно "наследяват" френската територия от предишните поколения. Това разкрива непоследователно прилагане на принципите на собствеността - отхвърляне на наследяването на индивидуално ниво и същевременно приемането му на колективно/национално ниво. Другите варианти изопачават конкретното противоречие, подчертано в текста.
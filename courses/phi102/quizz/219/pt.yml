question: De acordo com a crítica do texto ao pensamento socialista, que contradição fundamental surge quando os socialistas se opõem à herança ao mesmo tempo que defendem a soberania nacional?
answer: Aceitam a herança colectiva do território nacional pelos cidadãos e rejeitam a herança individual da propriedade privada
wrong_answers:
  - Apoiam a redistribuição internacional da riqueza, ao mesmo tempo que se opõem às transferências internas de propriedade entre gerações
  - Defendem os direitos de propriedade individuais em teoria e apoiam a propriedade colectiva na prática
  - Promovem a distribuição equitativa dos recursos, ao mesmo tempo que defendem que as nações devem manter vantagens territoriais desiguais
explanation: |
  O texto identifica uma contradição fundamental no pensamento socialista: ao mesmo tempo que se opõem à herança privada como transmissão injusta de riqueza, os socialistas defendem simultaneamente as fronteiras e a soberania nacionais, o que significa essencialmente aceitar que os cidadãos franceses "herdam" coletivamente o território francês das gerações anteriores. Isto revela uma aplicação inconsistente dos princípios de propriedade - rejeitar a herança ao nível individual e aceitá-la ao nível coletivo/nacional. As outras opções deturpam a contradição específica salientada no texto.
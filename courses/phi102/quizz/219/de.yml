question: Welcher grundsätzliche Widerspruch ergibt sich aus der Kritik des Textes am sozialistischen Denken, wenn Sozialisten gegen das Erbe sind und gleichzeitig die nationale Souveränität verteidigen?
answer: Sie akzeptieren die kollektive Vererbung des Staatsgebiets durch die Bürger und lehnen die individuelle Vererbung von Privateigentum ab
wrong_answers:
  - Sie unterstützen die internationale Umverteilung von Reichtum, lehnen aber die Übertragung von Eigentum zwischen den Generationen im Inland ab
  - Sie verteidigen in der Theorie die individuellen Eigentumsrechte und unterstützen in der Praxis das kollektive Eigentum
  - Sie setzen sich für eine gleichmäßige Verteilung der Ressourcen ein und behaupten, dass die Nationen ungleiche territoriale Vorteile behalten sollten
explanation: |
  Der Text zeigt einen zentralen Widerspruch im sozialistischen Denken auf: Während die Sozialisten das private Erbe als ungerechte Vermögensübertragung ablehnen, verteidigen sie gleichzeitig die nationalen Grenzen und die Souveränität, was im Wesentlichen bedeutet, dass sie akzeptieren, dass die französischen Bürger kollektiv das französische Territorium von früheren Generationen "erben". Dies offenbart eine inkonsequente Anwendung der Eigentumsgrundsätze - die Ablehnung von Erbschaften auf individueller Ebene bei gleichzeitiger Akzeptanz von Erbschaften auf kollektiver/nationaler Ebene. Die anderen Optionen stellen den im Text hervorgehobenen spezifischen Widerspruch falsch dar.
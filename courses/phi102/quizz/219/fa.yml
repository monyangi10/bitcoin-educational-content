question: بر اساس نقد متن از اندیشه سوسیالیستی، چه تناقض اساسی‌ای زمانی که سوسیالیست‌ها با ارث مخالف هستند در حالی که از حاکمیت ملی دفاع می‌کنند، پدیدار می‌شود؟
answer: آنها ارث جمعی قلمرو ملی توسط شهروندان را می‌پذیرند در حالی که ارث فردی مالکیت خصوصی را رد می‌کنند.
wrong_answers:
  - آن‌ها از توزیع مجدد ثروت در سطح بین‌المللی حمایت می‌کنند در حالی که با انتقال مالکیت داخلی بین نسل‌ها مخالفند.
  - آن‌ها در تئوری از حقوق مالکیت فردی دفاع می‌کنند در حالی که در عمل از مالکیت جمعی حمایت می‌کنند.
  - آن‌ها ترویج توزیع برابر منابع را می‌دهند در حالی که معتقدند کشورها باید مزایای نابرابر سرزمینی را حفظ کنند.
explanation: |
  متن یک تناقض کلیدی در تفکر سوسیالیستی را شناسایی می‌کند: در حالی که با ارث خصوصی به عنوان انتقال ناعادلانه ثروت مخالفند، سوسیالیست‌ها به طور همزمان از مرزها و حاکمیت ملی دفاع می‌کنند، که اساساً به معنای پذیرش این است که شهروندان فرانسوی به طور جمعی قلمرو فرانسه را از نسل‌های قبلی 'به ارث می‌برند'. این نشان‌دهنده کاربرد ناهماهنگ اصول مالکیت است - رد ارث در سطح فردی در حالی که آن را در سطح جمعی/ملی می‌پذیرند. گزینه‌های دیگر تناقض خاصی که در متن برجسته شده است را نادرست نشان می‌دهند.
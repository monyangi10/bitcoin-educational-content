question: 根据文中对社会主义思想的批判，当社会主义者在捍卫国家主权的同时反对继承时，会出现什么基本矛盾？
answer: 他们接受公民集体继承国家领土，同时反对个人继承私有财产
wrong_answers:
  - 他们支持国际财富再分配，同时反对国内代际之间的财产转移
  - 他们在理论上捍卫个人财产权，在实践中支持集体所有权
  - 他们提倡平等分配资源，同时认为各国应保持不平等的领土优势
explanation: |
  文中指出了社会主义思想中的一个关键矛盾：社会主义者一方面反对私人继承，认为这是不公正的财富转移，另一方面又捍卫国家边界和主权，这实质上意味着接受法国公民集体 "继承 "上一代人的法国领土。这揭示了财产原则应用的不一致性--反对个人层面的继承，同时又接受集体/国家层面的继承。其他选项则歪曲了文中强调的具体矛盾。
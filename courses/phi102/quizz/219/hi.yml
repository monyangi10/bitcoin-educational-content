question: According to the text's critique of socialist thought, what fundamental contradiction emerges when socialists oppose inheritance while defending national sovereignty?
answer: They accept collective inheritance of national territory by citizens while rejecting individual inheritance of private property
wrong_answers:
  - They support international redistribution of wealth while opposing domestic property transfers between generations
  - They defend individual property rights in theory while supporting collective ownership in practice
  - They promote equal distribution of resources while maintaining that nations should keep unequal territorial advantages
explanation: |
  The text identifies a key contradiction in socialist thinking: while opposing private inheritance as unjust wealth transmission, socialists simultaneously defend national borders and sovereignty, which essentially means accepting that French citizens collectively 'inherit' French territory from previous generations. This reveals inconsistent application of property principles - rejecting inheritance at the individual level while accepting it at the collective/national level. The other options misrepresent the specific contradiction highlighted in the text.
question: Jaký zásadní rozpor vzniká podle kritiky socialistického myšlení v textu, když socialisté vystupují proti dědictví a zároveň hájí národní suverenitu?
answer: Akceptují kolektivní dědictví národního území občany a odmítají individuální dědictví soukromého majetku
wrong_answers:
  - Podporují mezinárodní přerozdělování bohatství a zároveň se staví proti domácím mezigeneračním převodům majetku
  - Teoreticky hájí individuální vlastnická práva, zatímco v praxi podporují kolektivní vlastnictví
  - Prosazují rovnoměrné rozdělování zdrojů a zároveň tvrdí, že národy by si měly zachovat nerovné územní výhody
explanation: |
  Text identifikuje klíčový rozpor v socialistickém myšlení: socialisté se staví proti soukromému dědictví jako nespravedlivému předávání bohatství, ale zároveň hájí národní hranice a suverenitu, což v podstatě znamená, že akceptují, že francouzští občané kolektivně "dědí" francouzské území po předchozích generacích. To odhaluje nedůsledné uplatňování principů vlastnictví - odmítání dědictví na individuální úrovni a zároveň jeho akceptace na kolektivní/národní úrovni. Ostatní možnosti zkreslují konkrétní rozpor, na který je v textu upozorněno.
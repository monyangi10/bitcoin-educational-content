question: Wie bestimmt das Naturgesetz der Produktion, wo und wie Waren in einer freien Marktwirtschaft produziert werden?
answer: Die Wirtschaftsakteure verfolgen ihr aufgeklärtes Eigeninteresse, indem sie den Gewinnsignalen folgen, die die Nachfrage und Zahlungsbereitschaft der Verbraucher anzeigen
wrong_answers:
  - Staatliche Vorschriften und zentrale Planungsausschüsse lenken die Produktion auf die gesellschaftlich vorteilhaftesten Standorte und Methoden
  - Traditionelle Bräuche und historische Praktiken veranlassen die Erzeuger automatisch dazu, etablierte Produktionsmuster und -standorte beizubehalten
  - Zufällige Marktkräfte und Zufallsereignisse bestimmen die Produktionsstandorte ohne jede rationale wirtschaftliche Überlegung oder Planung
explanation: |
  Dem Text zufolge wirkt das Naturgesetz der Produktion dadurch, dass die Wirtschaftsakteure nach ihrem eigenen aufgeklärten Eigeninteresse und nicht nach engstirnigem Egoismus streben. Sie sind durch Gewinn und Sicherheit motiviert und orientieren sich an profitablen Produktionszweigen. Gewinne dienen als Signale für die Bereitschaft der Verbraucher, für Güter zu zahlen, die ihr Leben verbessern und ihre Bedürfnisse befriedigen. Preise und Gewinne lenken die Produktion auf natürliche Weise, ohne dass es einer staatlichen Organisation oder Regulierung bedarf, da diese Marktsignale effizient vermitteln, wo die Produktion am meisten gebraucht und geschätzt wird.
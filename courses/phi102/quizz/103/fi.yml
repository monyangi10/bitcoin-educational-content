question: Miten tuotannon luonnollinen laki määrää, missä ja miten tavaroita tuotetaan vapaassa markkinataloudessa?
answer: Talouden toimijat ajavat valistunutta omaa etuaan seuraamalla voittosignaaleja, jotka osoittavat kuluttajien kysynnän ja maksuhalukkuuden
wrong_answers:
  - Hallituksen määräykset ja keskussuunnittelukomiteat ohjaavat tuotantoa yhteiskunnallisesti edullisimpiin paikkoihin ja menetelmiin
  - Perinteiset tavat ja historialliset käytännöt ohjaavat tuottajia automaattisesti säilyttämään vakiintuneet tuotantomallit ja -paikat
  - Satunnaiset markkinavoimat ja sattumanvaraiset tapahtumat määräävät tuotantopaikat ilman rationaalista taloudellista päättelyä tai suunnittelua
explanation: |
  Tekstin mukaan tuotannon luonnonlaki toimii siten, että talouden toimijat pyrkivät valistuneeseen oman edun tavoitteluun, eivät ahtaaseen itsekkyyteen. Heitä motivoivat voitto ja turvallisuus, ja he suuntautuvat kannattaviin tuotannonhaaroihin. Voitot toimivat signaaleina, jotka osoittavat kuluttajien halukkuuden maksaa tavaroista, jotka parantavat heidän elämäänsä ja vastaavat heidän tarpeisiinsa. Hinnat ja voitot ohjaavat tuotantoa luonnollisesti ilman, että se tarvitsee valtion organisaatiota tai sääntelyä, sillä nämä markkinasignaalit viestivät tehokkaasti siitä, missä tuotantoa tarvitaan ja arvostetaan eniten.
question: Üretimin doğal kanunu, serbest piyasa ekonomisinde malların nerede ve nasıl üretileceğini nasıl belirler?
answer: Ekonomik aktörler, tüketici talebini ve ödeme istekliliğini gösteren kar sinyallerini takip ederek aydınlanmış öz çıkarlarının peşinden giderler
wrong_answers:
  - Hükümet düzenlemeleri ve merkezi planlama komiteleri üretimi sosyal açıdan en faydalı yerlere ve yöntemlere yönlendirir
  - Geleneksel adetler ve tarihi uygulamalar, üreticileri yerleşik üretim kalıplarını ve yerlerini korumaları için otomatik olarak yönlendirir
  - Rastgele piyasa güçleri ve tesadüfi olaylar, herhangi bir rasyonel ekonomik muhakeme veya planlama olmaksızın üretim yerlerini belirler
explanation: |
  Metne göre, üretimin doğal yasası, ekonomik aktörlerin dar bencillik yerine kendi aydınlanmış öz çıkarlarını aramaları yoluyla işler. Kâr ve güvenlikle motive olurlar ve kendilerini kârlı üretim dallarına yönlendirirler. Kârlar, tüketicilerin yaşamlarını iyileştiren ve ihtiyaçlarını karşılayan mallar için ödeme yapmaya istekli olduklarını gösteren sinyaller olarak hizmet eder. Bu piyasa sinyalleri üretimin en çok nerede ihtiyaç duyulduğunu ve değer gördüğünü etkin bir şekilde ilettiğinden, fiyatlar ve karlar hükümet organizasyonu veya düzenlemesi gerektirmeden doğal olarak üretimi yönlendirir.
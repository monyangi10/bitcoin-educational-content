question: Hvordan bestemmer naturlovene hvor og hvordan varer produseres i en fri markedsøkonomi?
answer: Økonomiske aktører forfølger sin opplyste egeninteresse ved å følge profittsignaler som indikerer forbrukernes etterspørsel og betalingsvilje
wrong_answers:
  - Statlige reguleringer og sentrale planleggingskomiteer styrer produksjonen til de mest samfunnsnyttige stedene og metodene
  - Tradisjonelle skikker og historisk praksis fører automatisk til at produsentene opprettholder etablerte produksjonsmønstre og -steder
  - Tilfeldige markedskrefter og tilfeldige hendelser bestemmer hvor produksjonen skal foregå, uten rasjonelle økonomiske resonnementer eller planlegging
explanation: |
  Ifølge teksten virker den naturlige produksjonsloven gjennom at økonomiske aktører søker sin egen opplyste egeninteresse, ikke snever egoisme. De motiveres av profitt og sikkerhet, og styrer seg selv mot lønnsomme produksjonsgrener. Profitt fungerer som et signal om at forbrukerne er villige til å betale for varer som forbedrer deres liv og tilfredsstiller deres behov. Priser og profitt styrer dermed produksjonen på en naturlig måte, uten at det er nødvendig med statlig organisering eller regulering, ettersom disse markedssignalene effektivt kommuniserer hvor produksjonen er mest nødvendig og verdsatt.
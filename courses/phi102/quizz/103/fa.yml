question: قانون طبیعی تولید چگونه تعیین می‌کند که کالاها در یک اقتصاد بازار آزاد کجا و چگونه تولید شوند؟
answer: عوامل اقتصادی با دنبال کردن سیگنال‌های سود که نشان‌دهنده تقاضای مصرف‌کننده و تمایل به پرداخت است، به دنبال منافع شخصی روشن‌فکرانه خود هستند.
wrong_answers:
  - مقررات دولتی و کمیته‌های برنامه‌ریزی مرکزی تولید را به سودمندترین مکان‌ها و روش‌های اجتماعی هدایت می‌کنند.
  - رسوم سنتی و رویه‌های تاریخی به‌طور خودکار تولیدکنندگان را به حفظ الگوها و مکان‌های تولیدی تثبیت‌شده هدایت می‌کنند.
  - نیروهای تصادفی بازار و رویدادهای شانسی مکان‌های تولید را بدون هیچ‌گونه استدلال یا برنامه‌ریزی اقتصادی منطقی تعیین می‌کنند.
explanation: |
  بر اساس متن، قانون طبیعی تولید از طریق عوامل اقتصادی که به دنبال منافع خودآگاهانه خود هستند، نه خودخواهی محدود، عمل می‌کند. آنها با انگیزه سود و امنیت، خود را به سمت شاخه‌های تولید سودآور هدایت می‌کنند. سودها به عنوان سیگنال‌هایی عمل می‌کنند که نشان‌دهنده تمایل مصرف‌کنندگان به پرداخت برای کالاهایی است که زندگی آنها را بهبود می‌بخشد و نیازهایشان را برآورده می‌کند. بنابراین، قیمت‌ها و سودها به طور طبیعی تولید را بدون نیاز به سازماندهی یا تنظیم دولت هدایت می‌کنند، زیرا این سیگنال‌های بازار به طور کارآمدی ارتباط می‌دهند که تولید در کجا بیشتر مورد نیاز و ارزشمند است.
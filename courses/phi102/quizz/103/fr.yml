question: Comment la loi naturelle de la production détermine-t-elle où et comment les biens sont produits dans une économie de marché ?
answer: Les agents économiques poursuivent leur intérêt personnel éclairé en suivant les signaux de profit qui indiquent la demande des consommateurs et leur volonté de payer
wrong_answers:
  - Les réglementations gouvernementales et les comités centraux de planification orientent la production vers les lieux et les méthodes les plus bénéfiques pour la société
  - Les coutumes traditionnelles et les pratiques historiques incitent automatiquement les producteurs à maintenir les modèles et les lieux de production établis
  - Les forces aléatoires du marché et les événements fortuits déterminent les lieux de production sans raisonnement économique rationnel ni planification
explanation: |
  Selon le texte, la loi naturelle de la production fonctionne grâce à des agents économiques qui recherchent leur propre intérêt éclairé, et non un égoïsme étroit. Ils sont motivés par le profit et la sécurité, et s'orientent vers des branches de production rentables. Les profits servent de signaux indiquant que les consommateurs sont prêts à payer pour des biens qui améliorent leur vie et répondent à leurs besoins. Les prix et les bénéfices orientent donc naturellement la production sans nécessiter d'organisation ou de réglementation gouvernementale, car ces signaux du marché indiquent efficacement où la production est la plus nécessaire et la plus appréciée.
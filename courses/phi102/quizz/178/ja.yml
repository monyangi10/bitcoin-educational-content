question: 提示されたリベラル派の分析によれば、なぜ集団主義的経済体制のもとでは報道の自由を維持することが不可能なのか？
answer: 国家は印刷機を含むすべての生産手段を管理し、何が出版されるかを決定する。
wrong_answers:
  - 個々のジャーナリストは、質の高いコンテンツを制作する経済的インセンティブに欠ける。
  - 民間の新聞は、国が管理する価格では市民が購入するには高すぎる。
  - 政党がメディア支配をめぐって激しく競争し、検閲につながる。
explanation: |
  集団主義体制では国家がすべての生産手段を所有するため、必然的に印刷機や出版インフラを管理することになる。国家は集団主義体制におけるすべての生産手段を所有しているため、必然的に印刷機や出版インフラを管理することになる。他の選択肢は、経済的支配が政治的可能性を決定するというこの基本的な点を見逃している。
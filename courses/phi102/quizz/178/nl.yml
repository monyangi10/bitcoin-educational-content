question: Waarom zou persvrijheid volgens de gepresenteerde liberale analyse onmogelijk te handhaven zijn onder een collectivistisch economisch systeem?
answer: De staat controleert alle productiemiddelen, inclusief drukpersen, en beslist wat er gepubliceerd wordt
wrong_answers:
  - Individuele journalisten zouden niet de economische stimulans hebben om inhoud van hoge kwaliteit te produceren
  - Particuliere kranten zouden te duur zijn voor burgers om te kopen als de prijs door de staat wordt bepaald
  - Politieke partijen zouden te fel concurreren om controle over de media, wat zou leiden tot censuur
explanation: |
  De liberale analyse identificeert een structurele onmogelijkheid: omdat de staat alle productiemiddelen bezit in een collectivistisch systeem, controleert de staat noodzakelijkerwijs de drukpersen en de uitgeversinfrastructuur. Dit geeft de staat de absolute macht om te bepalen wat er gedrukt en gedistribueerd wordt, waardoor onafhankelijke persvrijheid onmogelijk wordt, ongeacht politieke bedoelingen. De andere opties missen dit fundamentele punt over economische controle die politieke mogelijkheden bepaalt.
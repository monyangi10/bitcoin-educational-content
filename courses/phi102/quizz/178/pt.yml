question: De acordo com a análise liberal apresentada, por que razão seria impossível manter a liberdade de imprensa num sistema económico coletivista?
answer: O Estado controla todos os meios de produção, incluindo as máquinas de impressão, e decide o que é publicado
wrong_answers:
  - Os jornalistas individuais não teriam incentivos económicos para produzir conteúdos de qualidade
  - Os jornais privados seriam demasiado caros para serem comprados pelos cidadãos com preços controlados pelo Estado
  - Os partidos políticos competiriam demasiado intensamente pelo controlo dos meios de comunicação social, o que conduziria à censura
explanation: |
  A análise liberal identifica uma impossibilidade estrutural: uma vez que o Estado detém todos os meios de produção num sistema coletivista, controla necessariamente as prensas de impressão e as infra-estruturas editoriais. Isto dá ao Estado o poder absoluto de determinar o que é impresso e distribuído, tornando impossível a liberdade de imprensa independente, independentemente das intenções políticas. As outras opções não têm em conta este ponto fundamental sobre o controlo económico que determina as possibilidades políticas.
question: Miks oleks esitatud liberaalse analüüsi kohaselt ajakirjandusvabadust võimatu säilitada kollektivistlikus majandussüsteemis?
answer: Riik kontrollib kõiki tootmisvahendeid, sealhulgas trükimasinad, ja otsustab, mida avaldatakse
wrong_answers:
  - Üksikutel ajakirjanikel puuduksid majanduslikud stiimulid kvaliteetse sisu tootmiseks
  - Eralehtede ostmine oleks kodanike jaoks liiga kallis riigi poolt kontrollitud hinnakujunduse korral
  - Poliitilised parteid konkureeriksid liiga intensiivselt meedia kontrolli eest, mis viib tsensuuri tekkimiseni
explanation: |
  Liberaalne analüüs tuvastab struktuurilise võimatuse: kuna kollektivistlikus süsteemis kuuluvad kõik tootmisvahendid riigile, kontrollib ta tingimata trükipresside ja kirjastamisinfrastruktuuri üle. See annab riigile absoluutse võimu määrata, mida trükitakse ja levitatakse, muutes sõltumatu ajakirjandusvabaduse võimatuks, sõltumata poliitilistest kavatsustest. Teistes valikutes ei ole seda põhipunkti, et majanduslik kontroll määrab poliitilisi võimalusi, arvesse võetud.
question: Dushingiye ku nseguro y’ubwigenge yashikirijwe, ni kuki umwidegemvyo w’itangazamakuru woba udashoboka kugumaho mu gihe c’ubutunzi bw’abanyagihugu?
answer: Leta ni yo igenzura uburyo bwose bwo gukora ibitabu harimwo n’amashini acapura kandi ni yo ifata ingingo y’ivyo bisohoka .
wrong_answers:
  - Abanyamakuru ku giti cabo bobura ubutunzi bwo gutanga amakuru meza .
  - Ibinyamakuru vy’abikorera ku giti cabo vyoba bizimvye cane ku buryo abanyagihugu batashobora kubigura mu bici- ro bigenzurwa na Leta .
  - Amashirahamwe ya politike yoshobora guhiganwa cane kugira ngo agenzure ibinyamakuru bigatuma habaho ugucengera
explanation: |
  Isesengura ry’uburenganzira ryerekana ko hariho ikintu kidashoboka mu mibumbe: ko Leta ari yo ifise uburyo bwose bwo gukora ibintu mu buryo bw’abanyagihugu, ni ngombwa ko igenzura amashini y’icapa n’ibikorwa remezo vyo gusohora ibitabu. Ivyo bituma Leta igira ububasha bwose bwo kumenya ivyo icapwa no gukwiragizwa, bikaba bituma umwidegemvyo w’itangazamakuru wigenga udashoboka ataco ushizeko mu migambi ya politike. Ayandi mahitamwo arabura iyo ngingo y’ishimikiro yerekeye ubugenzuzi bw’ubutunzi bugena ubushobozi bwa politike.
question: Theo phân tích theo quan điểm tự do, tại sao tự do báo chí lại không thể duy trì được trong một hệ thống kinh tế tập thể?
answer: Nhà nước kiểm soát mọi phương tiện sản xuất, bao gồm cả máy in, và quyết định những gì được xuất bản.
wrong_answers:
  - Các nhà báo cá nhân sẽ thiếu động lực kinh tế để sản xuất nội dung chất lượng.
  - Dưới chính sách giá do nhà nước kiểm soát, các tờ báo tư nhân sẽ quá đắt đỏ đối với người dân.
  - Các đảng phái chính trị sẽ cạnh tranh quá gay gắt để giành quyền kiểm soát truyền thông, dẫn đến tình trạng kiểm duyệt.
explanation: |
  Phân tích theo quan điểm tự do chỉ ra một bất khả thi về mặt cấu trúc: vì nhà nước sở hữu tất cả các phương tiện sản xuất trong một hệ thống tập thể, nên nó nhất thiết phải kiểm soát các nhà in và cơ sở hạ tầng xuất bản. Điều này trao cho nhà nước quyền lực tuyệt đối để quyết định những gì được in và phân phối, khiến cho tự do báo chí độc lập trở nên bất khả thi bất kể ý định chính trị nào. Các lựa chọn khác bỏ qua điểm cơ bản này về việc kiểm soát kinh tế quyết định các khả năng chính trị.
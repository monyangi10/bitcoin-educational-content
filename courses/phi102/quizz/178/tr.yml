question: Sunulan liberal analize göre, kolektivist bir ekonomik sistem altında basın özgürlüğünü sürdürmek neden imkansız olsun?
answer: Devlet, matbaalar dahil tüm üretim araçlarını kontrol eder ve neyin yayınlanacağına karar verir
wrong_answers:
  - Bireysel gazeteciler kaliteli içerik üretmek için ekonomik teşviklerden yoksun kalacaktır
  - Özel gazeteler, devlet kontrolündeki fiyatlandırma altında vatandaşların satın alması için çok pahalı olacaktır
  - Siyasi partiler medya kontrolü için çok yoğun bir rekabet içine girecek ve bu da sansüre yol açacaktır
explanation: |
  Liberal analiz yapısal bir imkansızlığı tanımlar: kolektivist bir sistemde devlet tüm üretim araçlarına sahip olduğundan, zorunlu olarak matbaaları ve yayıncılık altyapısını kontrol eder. Bu da devlete neyin basılıp dağıtılacağını belirleme konusunda mutlak güç verir ve siyasi niyetler ne olursa olsun bağımsız basın özgürlüğünü imkansız hale getirir. Diğer seçenekler, ekonomik kontrolün siyasi olasılıkları belirlemesiyle ilgili bu temel noktayı gözden kaçırmaktadır.
question: 제시된 자유주의적 분석에 따르면, 집단주의 경제 체제 하에서 언론의 자유가 유지될 수 없는 이유는 무엇일까요?
answer: 국가는 인쇄기를 포함한 모든 생산 수단을 통제하고 출판할 내용을 결정합니다
wrong_answers:
  - 개별 저널리스트는 양질의 콘텐츠를 제작할 경제적 인센티브가 부족합니다
  - 민간 신문은 국가가 통제하는 가격으로는 시민들이 구매하기에는 너무 비쌉니다
  - 정당은 미디어 통제를 위해 지나치게 치열한 경쟁을 벌여 검열로 이어질 수 있습니다
explanation: |
  자유주의적 분석에 따르면 집단주의 체제에서는 국가가 모든 생산 수단을 소유하고 있기 때문에 인쇄기와 출판 인프라를 통제할 수밖에 없다는 구조적 불가능성을 지적합니다. 따라서 국가가 인쇄 및 배포되는 내용을 결정할 수 있는 절대적인 권한을 갖게 되어 정치적 의도와 상관없이 독립적인 언론의 자유가 불가능해집니다. 다른 옵션은 경제적 통제가 정치적 가능성을 결정한다는 근본적인 점을 놓치고 있습니다.
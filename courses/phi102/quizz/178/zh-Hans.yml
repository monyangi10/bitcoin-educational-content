question: 根据自由派的分析，为什么在集体主义经济制度下不可能维持新闻自由？
answer: 国家控制着包括印刷机在内的所有生产手段，并决定出版什么内容
wrong_answers:
  - 记者个人将缺乏制作高质量内容的经济动力
  - 在国家控制定价的情况下，市民购买私营报纸的成本过高
  - 政党对媒体控制权的争夺过于激烈，导致审查制度的出现
explanation: |
  自由主义的分析指出了一种结构性的不可能性：由于在集体主义制度下国家拥有所有生产资料，它必然控制印刷厂和出版基础设施。这就赋予了国家决定印刷和发行内容的绝对权力，无论政治意图如何，都不可能实现独立的新闻自由。其他方案都忽略了经济控制决定政治可能性这一基本点。
question: 根据经济理论，价格在自由市场经济中的主要功能是什么？
answer: 它们是指导生产者生产什么、何时、何地以及如何生产商品和服务的重要信号
wrong_answers:
  - 它们的主要职能是最大限度地增加政府税收，并有效地为公共服务提供资金
  - 它们的主要作用是确保财富在所有社会成员之间的平等分配
  - 其主要功能是防止生产过剩，维持各行业就业水平的稳定
explanation: |
  在自由市场中，价格是重要的信息信号，向生产者传递着消费者的偏好和资源的稀缺程度。当价格上涨时，它们发出需求增加或供应减少的信号，引导企业家寻找有利可图的机会。这种信号机制在没有中央计划的情况下协调经济活动，使市场能够有效地应对不断变化的条件。其他选项错误地认为价格具有再分配、财政或稳定就业的功能，这并不是其主要的市场作用。
question: Каква е основната функция на цените в свободната пазарна икономика според икономическата теория?
answer: Те служат като основни сигнали, които насочват производителите какво, кога, къде и как да произвеждат стоки и услуги
wrong_answers:
  - Тяхната основна функция е да максимизират приходите от данъци и да финансират ефективно обществените услуги
  - Те служат главно за осигуряване на равномерно разпределение на богатството между всички членове на обществото
  - Функцията им е да предотвратяват свръхпроизводството и да поддържат стабилни нива на заетост в различните отрасли
explanation: |
  Цените играят ролята на ключов информационен сигнал на свободните пазари, като съобщават на производителите за предпочитанията на потребителите и за недостига на ресурси. Когато цените се повишават, те сигнализират за повишено търсене или намалено предлагане, насочвайки предприемачите към печеливши възможности. Този сигнален механизъм координира икономическата дейност без централно планиране, като позволява на пазарите да реагират ефективно на променящите се условия. Другите варианти неправилно предполагат, че цените изпълняват преразпределителни, фискални или стабилизиращи заетостта функции, които не са тяхната основна пазарна роля.
question: 根據經濟理論，價格在自由市場經濟中的主要功能是什麼？
answer: 它們是重要的訊號，引導生產者在何時、何地及如何生產商品和服務。
wrong_answers:
  - 它們的主要功能是使政府稅收最大化，並有效率地為公共服務提供資金。
  - 它們的主要作用是確保財富在社會所有成員間的平均分配。
  - 其功能主要是防止生產過剩，並維持各產業的穩定就業水平。
explanation: |
  價格在自由市場中扮演著重要的資訊信號角色，向生產者傳達消費者的偏好和資源稀缺性。當價格上升時，就表示需求增加或供應減少，引導企業家尋找有利可圖的機會。這種信號機制可以在沒有中央計劃的情況下協調經濟活動，讓市場有效率地回應不斷變化的條件。其他選項錯誤地認為價格具有再分配、財政或就業穩定的功能，這些都不是價格的主要市場角色。
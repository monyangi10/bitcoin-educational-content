question: 경제 이론에 따르면 자유 시장 경제에서 가격의 주요 기능은 무엇인가요?
answer: 이는 생산자에게 상품과 서비스를 언제, 어디서, 어떻게 생산할지 안내하는 필수 신호 역할을 합니다
wrong_answers:
  - 주로 정부 세수를 극대화하고 공공 서비스에 효율적으로 자금을 지원하는 기능을 합니다
  - 주로 모든 사회 구성원에게 균등한 부의 분배를 보장하는 역할을 합니다
  - 주로 과잉 생산을 방지하고 산업 전반의 고용 수준을 안정적으로 유지하는 역할을 합니다
explanation: |
  가격은 자유 시장에서 중요한 정보 신호로 작용하여 소비자의 선호도와 자원의 희소성을 생산자에게 전달합니다. 가격이 상승하면 수요 증가 또는 공급 감소를 신호하여 기업가들이 수익성 있는 기회를 포착하도록 유도합니다. 이러한 신호 메커니즘은 중앙 계획 없이도 경제 활동을 조정하여 시장이 변화하는 상황에 효율적으로 대응할 수 있도록 합니다. 다른 옵션은 가격이 시장의 주요 역할이 아닌 재분배, 재정 또는 고용 안정화 기능을 수행한다고 잘못 제안합니다.
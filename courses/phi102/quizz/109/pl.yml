question: Jaka jest podstawowa funkcja cen w gospodarce wolnorynkowej według teorii ekonomii?
answer: Służą one jako podstawowe sygnały, które wskazują producentom, co, kiedy, gdzie i jak produkować towary i usługi
wrong_answers:
  - Działają one przede wszystkim w celu maksymalizacji dochodów podatkowych rządu i efektywnego finansowania usług publicznych
  - Służą one głównie zapewnieniu równego podziału bogactwa między wszystkich członków społeczeństwa
  - Funkcjonują one przede wszystkim w celu zapobiegania nadprodukcji i utrzymania stabilnego poziomu zatrudnienia w różnych branżach
explanation: |
  Ceny działają jako kluczowe sygnały informacyjne na wolnych rynkach, komunikując producentom preferencje konsumentów i niedobór zasobów. Kiedy ceny rosną, sygnalizują zwiększony popyt lub zmniejszoną podaż, kierując przedsiębiorców w stronę zyskownych możliwości. Ten mechanizm sygnalizacyjny koordynuje działalność gospodarczą bez centralnego planowania, pozwalając rynkom skutecznie reagować na zmieniające się warunki. Pozostałe opcje błędnie sugerują, że ceny pełnią funkcje redystrybucyjne, fiskalne lub stabilizujące zatrudnienie, które nie są ich podstawową rolą rynkową.
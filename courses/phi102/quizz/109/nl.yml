question: Wat is volgens de economische theorie de belangrijkste functie van prijzen in een vrijemarkteconomie?
answer: Ze dienen als essentiële signalen voor producenten over wat, wanneer, waar en hoe ze goederen en diensten moeten produceren
wrong_answers:
  - Ze dienen voornamelijk om de belastinginkomsten van de overheid te maximaliseren en overheidsdiensten efficiënt te financieren
  - Ze dienen vooral om de rijkdom gelijk te verdelen onder alle leden van de samenleving
  - Ze dienen vooral om overproductie te voorkomen en de werkgelegenheid in de verschillende sectoren stabiel te houden
explanation: |
  Prijzen fungeren op vrije markten als cruciale informatiesignalen die consumentenvoorkeuren en grondstoffenschaarste doorgeven aan producenten. Wanneer prijzen stijgen, geven ze een signaal af dat de vraag toeneemt of het aanbod afneemt, waardoor ondernemers naar winstgevende mogelijkheden worden geleid. Dit signaalmechanisme coördineert economische activiteit zonder centrale planning, waardoor markten efficiënt kunnen reageren op veranderende omstandigheden. De andere opties suggereren ten onrechte dat prijzen herverdelings-, fiscale of werkgelegenheidsstabiliserende functies hebben, die niet hun primaire marktfunctie zijn.
question: Koja je primarna funkcija cena u slobodnoj tržišnoj ekonomiji prema ekonomskoj teoriji?
answer: Oni služe kao osnovni signali koji usmeravaju proizvođače šta, kada, gde i kako da proizvode robu i usluge.
wrong_answers:
  - Oni prvenstveno funkcionišu kako bi maksimizirali poreske prihode vlade i efikasno finansirali javne usluge.
  - Oni služe uglavnom da obezbede ravnomernu raspodelu bogatstva među svim članovima društva
  - Oni funkcionišu prvenstveno kako bi sprečili prekomernu proizvodnju i održali stabilne nivoe zaposlenosti u različitim industrijama.
explanation: |
  Cene deluju kao ključni informativni signali na slobodnim tržištima, prenoseći preferencije potrošača i oskudicu resursa proizvođačima. Kada cene rastu, one signaliziraju povećanu potražnju ili smanjenu ponudu, usmeravajući preduzetnike ka profitabilnim prilikama. Ovaj mehanizam signalizacije koordinira ekonomsku aktivnost bez centralnog planiranja, omogućavajući tržištima da efikasno reaguju na promene uslova. Druge opcije pogrešno sugerišu da cene služe funkcijama preraspodele, fiskalnim ili stabilizaciji zaposlenosti, što nije njihova primarna uloga na tržištu.
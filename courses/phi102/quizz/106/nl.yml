question: Welk basisprincipe verklaart volgens Abbé de Saint-Pierre's analyse van commerciële uitwisseling waarom vrijwillige handel tussen kooplieden plaatsvindt?
answer: Zowel de koper als de verkoper hebben baat bij de transactie, anders zou geen van beiden instemmen met de handel
wrong_answers:
  - De ene partij wint altijd meer dan de andere, wat een concurrentievoordeel oplevert in toekomstige onderhandelingen
  - De overheid reguleert de prijzen om te zorgen voor een eerlijke verdeling van de winst tussen de handelspartijen
  - Marktkrachten brengen winsten automatisch in evenwicht zodat de totale rijkdom constant blijft over alle transacties
explanation: |
  Abbé de Saint-Pierre erkende dat vrijwillige ruil een spel is waarbij beide partijen profiteren. Hij merkte op dat bij een verkoop tussen kooplieden zowel de verkoper als de koper profiteren omdat zonder wederzijds voordeel geen van beiden zou instemmen met de transactie tegen die prijs. Dit principe toont aan dat vrijwillige handel waarde creëert voor beide partijen in plaats van alleen maar rijkdom van de een naar de ander over te brengen, wat de reden is waarom mensen ervoor kiezen om handel te drijven en contracten af te sluiten.
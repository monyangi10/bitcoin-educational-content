question: Abbé de Saint-Pierre'i kaubavahetuse analüüsi kohaselt selgitab milline põhiprintsiip, miks toimub kaupmeeste vahel vabatahtlik kaubandus?
answer: Nii ostja kui ka müüja saavad tehingust vastastikust kasu, sest vastasel juhul ei nõustuks kumbki kauplemisega
wrong_answers:
  - Üks pool saab alati rohkem kasu kui teine, mis loob konkurentsieelise tulevastel läbirääkimistel
  - Valitsus reguleerib hindu, et tagada kasumi õiglane jaotamine kaubanduspartnerite vahel
  - Turujõud tasakaalustavad automaatselt kasumid, nii et kogu rikkus jääb kõikide tehingute puhul samaks
explanation: |
  Abbé de Saint-Pierre tunnistas, et vabatahtlik vahetus on positiivse summaga mäng, millest võidavad mõlemad pooled. Ta märkis, et kui kaupmeeste vahel toimub müük, võidavad nii müüja kui ka ostja, sest ilma vastastikuse kasu saamata ei nõustuks kumbki tehinguga selle hinnaga. See põhimõte näitab, et vabatahtlik kauplemine loob väärtust mõlemale poolele, mitte lihtsalt ei kanna jõukust ühelt teisele, mistõttu inimesed otsustavad osaleda kaubanduses ja sõlmida lepinguid.
question: 根據 Abbé de Saint-Pierre 對商業交換的分析，什麼基本原則可以解釋為什麼商人之間會進行自願貿易？
answer: 買賣雙方都能從交易中獲益，否則雙方都不會同意交易
wrong_answers:
  - 一方總是比另一方獲得更多，在未來的談判中創造競爭優勢
  - 政府管制價格，以確保利潤在交易各方之間公平分配
  - 市場力量會自動平衡收益，使所有交易的總財富保持不變
explanation: |
  Abbé de Saint-Pierre 認識到自願交換是一種正和遊戲，雙方都會受益。他指出，當商人之間進行交易時，買賣雙方都會獲利，因為如果沒有互惠互利，雙方都不會同意以該價格進行交易。這個原則說明，自願交易能為雙方創造價值，而非只是將財富從一方轉移到另一方，這也是人們選擇從事商業和簽訂契約的原因。
question: بر اساس تحلیل Abbé de Saint-Pierre از تبادل تجاری، چه اصل بنیادی توضیح می‌دهد که چرا تجارت داوطلبانه بین بازرگانان رخ می‌دهد؟
answer: هم خریدار و هم فروشنده از معامله سود متقابل می‌برند، در غیر این صورت هیچ‌کدام به تجارت رضایت نمی‌دهند.
wrong_answers:
  - یک طرف همیشه بیشتر از طرف دیگر سود می‌برد و در مذاکرات آینده یک مزیت رقابتی ایجاد می‌کند.
  - دولت قیمت‌ها را تنظیم می‌کند تا توزیع عادلانه سود بین طرف‌های تجاری را تضمین کند.
  - نیروهای بازار به طور خودکار سودها را متعادل می‌کنند تا ثروت کل در تمام معاملات ثابت بماند.
explanation: |
  آبه دو سن پیر تشخیص داد که مبادله داوطلبانه یک بازی با مجموع مثبت است که در آن هر دو طرف سود می‌برند. او اشاره کرد که وقتی یک فروش بین بازرگانان رخ می‌دهد، هم فروشنده و هم خریدار سود می‌برند زیرا بدون سود متقابل، هیچ‌کدام به معامله با آن قیمت رضایت نمی‌دهند. این اصل نشان می‌دهد که تجارت داوطلبانه برای هر دو طرف ارزش ایجاد می‌کند و صرفاً ثروت را از یکی به دیگری منتقل نمی‌کند، به همین دلیل است که مردم تصمیم به مشارکت در تجارت و قراردادها می‌گیرند.
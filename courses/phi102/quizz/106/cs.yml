question: Jaký základní princip vysvětluje podle analýzy obchodní směny abbého de Saint-Pierre, proč dochází k dobrovolnému obchodu mezi obchodníky?
answer: Kupující i prodávající mají z transakce oboustranný prospěch, jinak by ani jeden z nich nesouhlasil s obchodem
wrong_answers:
  - Jedna strana vždy získá více než druhá, čímž získá konkurenční výhodu při budoucích jednáních
  - Vláda reguluje ceny, aby zajistila spravedlivé rozdělení zisku mezi obchodující strany
  - Tržní síly automaticky vyrovnávají zisky tak, aby celkové bohatství zůstalo při všech transakcích konstantní
explanation: |
  Abbé de Saint-Pierre si uvědomoval, že dobrovolná směna je hra s kladným součtem, z níž mají prospěch obě strany. Poznamenal, že když dojde k prodeji mezi obchodníky, vydělá na tom jak prodávající, tak kupující, protože bez vzájemného prospěchu by ani jeden z nich nesouhlasil s transakcí za tuto cenu. Tato zásada ukazuje, že dobrovolná směna vytváří hodnotu pro obě strany, a nikoliv pouze převádí bohatství z jedné strany na druhou, což je důvod, proč se lidé rozhodují pro obchodování a uzavírání smluv.
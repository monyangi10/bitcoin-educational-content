question: Kulingana na uchambuzi wa Abbé de Saint-Pierre kuhusu ubadilishanaji wa kibiashara, ni kanuni gani ya msingi inayoelezea kwa nini biashara ya hiari hutokea kati ya wafanyabiashara?
answer: Mnunuzi na muuzaji wote wanapata faida ya pande zote mbili kutokana na muamala huo, vinginevyo hakuna yeyote kati yao atakayekubali kufanya biashara.
wrong_answers:
  - Upande mmoja hufaidika zaidi kuliko mwingine, na hivyo kuunda faida ya ushindani katika mazungumzo yajayo
  - Serikali inadhibiti bei ili kuhakikisha usambazaji wa faida kwa usawa kati ya pande zinazofanya biashara
  - Nguvu za soko husawazisha kiotomatiki faida ili utajiri wote ubaki thabiti katika miamala yote
explanation: |
  Abbé de Saint-Pierre alitambua kwamba ubadilishanaji wa hiari ni mchezo mzuri ambapo pande zote mbili zinanufaika. Alibainisha kuwa mauzo yanapotokea kati ya wafanyabiashara, muuzaji na mnunuzi hupata faida kwa sababu bila faida ya pande zote mbili, hakuna hata mmoja wao atakayekubali muamala huo kwa bei hiyo. Kanuni hii inaonyesha kwamba biashara ya hiari huunda thamani kwa pande zote mbili badala ya kuhamisha utajiri kutoka kwa mmoja hadi mwingine, ndiyo maana watu huchagua kushiriki katika biashara na mikataba.
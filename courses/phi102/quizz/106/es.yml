question: Según el análisis del Abbé de Saint-Pierre sobre el intercambio comercial, ¿qué principio fundamental explica por qué se produce el comercio voluntario entre comerciantes?
answer: Tanto el comprador como el vendedor obtienen un beneficio mutuo de la transacción, de lo contrario ninguno de los dos aceptaría comerciar
wrong_answers:
  - Una de las partes siempre gana más que la otra, lo que crea una ventaja competitiva en futuras negociaciones
  - El gobierno regula los precios para garantizar un reparto equitativo de los beneficios entre las partes comerciales
  - Las fuerzas del mercado equilibran automáticamente las ganancias para que la riqueza total se mantenga constante en todas las transacciones
explanation: |
  El abate de Saint-Pierre reconoció que el intercambio voluntario es un juego de suma positiva en el que ambas partes salen beneficiadas. Señaló que cuando se produce una venta entre comerciantes, tanto el vendedor como el comprador salen ganando porque, sin beneficio mutuo, ninguno de los dos aceptaría la transacción a ese precio. Este principio demuestra que el comercio voluntario crea valor para ambas partes en lugar de limitarse a transferir riqueza de una a otra, que es la razón por la que la gente opta por el comercio y los contratos.
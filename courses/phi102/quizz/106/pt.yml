question: De acordo com a análise do Abade de Saint-Pierre sobre as trocas comerciais, qual é o princípio fundamental que explica a existência de trocas voluntárias entre comerciantes?
answer: Tanto o comprador como o vendedor retiram benefícios mútuos da transação, caso contrário nenhum deles aceitaria negociar
wrong_answers:
  - Uma parte ganha sempre mais do que a outra, criando uma vantagem competitiva em futuras negociações
  - O governo regula os preços para garantir uma distribuição equitativa dos lucros entre as partes negociantes
  - As forças de mercado equilibram automaticamente os ganhos de modo a que a riqueza total permaneça constante em todas as transacções
explanation: |
  O Abade de Saint-Pierre reconheceu que a troca voluntária é um jogo de soma positiva em que ambas as partes beneficiam. Observou que, quando uma venda ocorre entre comerciantes, tanto o vendedor como o comprador ganham porque, sem benefício mútuo, nenhum deles concordaria com a transação a esse preço. Este princípio demonstra que o comércio voluntário cria valor para ambas as partes, em vez de se limitar a transferir riqueza de uma para outra, e é por isso que as pessoas optam por se envolver em comércio e contratos.
question: Zgodnie z analizą wymiany handlowej przeprowadzoną przez Abbé de Saint-Pierre'a, jaka podstawowa zasada wyjaśnia, dlaczego dobrowolny handel odbywa się między kupcami?
answer: Zarówno kupujący, jak i sprzedający uzyskują obopólne korzyści z transakcji, w przeciwnym razie żaden z nich nie zgodziłby się na handel
wrong_answers:
  - Jedna strona zawsze zyskuje więcej niż druga, tworząc przewagę konkurencyjną w przyszłych negocjacjach
  - Rząd reguluje ceny, aby zapewnić sprawiedliwy podział zysków między stronami handlowymi
  - Siły rynkowe automatycznie równoważą zyski, dzięki czemu całkowity majątek pozostaje stały we wszystkich transakcjach
explanation: |
  Abbé de Saint-Pierre uznał, że dobrowolna wymiana jest grą o sumie dodatniej, w której obie strony odnoszą korzyści. Zauważył, że gdy dochodzi do sprzedaży między kupcami, zyskują zarówno sprzedający, jak i kupujący, ponieważ bez obopólnych korzyści żaden z nich nie zgodziłby się na transakcję po tej cenie. Zasada ta pokazuje, że dobrowolny handel tworzy wartość dla obu stron, a nie tylko przenosi bogactwo z jednej na drugą, dlatego ludzie decydują się angażować w handel i umowy.
question: Hvilket grunnleggende prinsipp i den franske liberale tradisjonen skiller negativ frihet fra positiv frihet når det gjelder forholdet til eiendomsretten?
answer: Den negative friheten er forankret i eiendomsretten som friheten til å gjøre uskyldig bruk av sin egen eiendom, kropp og evner uten ytre hindringer
wrong_answers:
  - Positiv frihet er forankret i eiendomsretten som evnen til å skaffe seg og akkumulere de materielle godene som er nødvendige for reell frihet
  - Negativ frihet bryter med eiendomsbegrepet ved å fokusere på fraværet av juridiske begrensninger snarere enn eierskap til materielle goder
  - Positiv frihet opprettholder eiendomsretten, mens negativ frihet gir avkall på den til fordel for kollektivt eierskap og felles ressurser
explanation: |
  Teksten slår klart fast at den negative friheten er dypt forankret i eiendomsbegrepet, og defineres som friheten til å gjøre uskyldig bruk av sin eiendom, kropp og evner uten hindringer. Positiv frihet bryter derimot med eiendomsbegrepet ved å fokusere på evnen til å skaffe seg ønskede ting, noe som åpner for sosialistiske begrunnelser for statlig inngripen. Dette skillet er avgjørende fordi den positive frihetens brudd med eiendomsretten fundamentalt endrer frihetsbegrepet fra selveierskap til statsgaranterte resultater.
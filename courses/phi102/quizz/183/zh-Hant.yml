question: 根據所討論的法國自由主義傳統，在與財產權的關係上，消極自由與積極自由的區別在於什麼基本原則？
answer: 消極自由的基礎是財產權，是在沒有外在障礙的情況下，無辜使用自己的財產、身體和能力的自由。
wrong_answers:
  - 積極自由的基礎是財產權，也就是獲得和累積真正自由所需的物質商品的能力。
  - 消極自由打破了財產的概念，著重於沒有法律約束，而非物質物品的所有權。
  - 積極自由維持財產權，而消極自由則放棄財產權，轉而支持集體所有權和資源共享。
explanation: |
  文中清楚地指出，消極自由深深植根於財產概念，定義為無障礙地無辜使用個人財產、身體和能力的自由。相反地，積極自由打破了財產的概念，著重於獲得想要的東西的能力，這為社會主義的國家干預開啟了一扇大門。這個區別是很重要的，因為積極自由背離了財產權，從根本上改變了自由的概念，從自我擁有變成了國家保證的結果。
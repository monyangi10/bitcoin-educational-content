question: フランスの自由主義の伝統によれば、財産権との関係において、消極的自由と積極的自由を区別する基本原則は何か？
answer: 消極的自由は、外的障害なしに自己の財産、身体、能力を無邪気に利用する自由として、財産権に固定されている。
wrong_answers:
  - 積極的自由は、真の自由に必要な物質的財貨を手に入れ、蓄積する能力としての財産権に支えられている。
  - 消極的自由は、物的財産の所有権ではなく、法的制約がないことに焦点を当てることで、財産観念と決別する。
  - 積極的自由は財産権を維持し、消極的自由は財産権を放棄して集団所有と共有資源を支持する。
explanation: |
  この文章は、消極的自由が財産概念に深く根ざしており、自分の財産、身体、能力を妨げられることなく無邪気に利用する自由として定義されていることを明確に立証している。これとは対照的に、積極的自由は、望むものを手に入れる能力に焦点を当てることで、財産概念と決別する。積極的自由が財産権から離れることで、自由の概念が自己所有から国家が保証する結果へと根本的に変わるため、この区別は極めて重要である。
question: 논의된 프랑스 자유주의 전통에 따르면, 재산권과의 관계에서 소극적 자유와 적극적 자유를 구별하는 기본 원칙은 무엇인가요?
answer: 소극적 자유는 외부의 장애 없이 자신의 재산, 신체 및 기능을 무고하게 사용할 수 있는 자유로서 재산권에 기반을 두고 있습니다
wrong_answers:
  - 적극적 자유는 진정한 자유에 필요한 물질적 재화를 획득하고 축적할 수 있는 능력으로서 재산권에 기반을 두고 있습니다
  - 부정적 자유는 물질적 재화의 소유권보다는 법적 제약의 부재에 초점을 맞춰 재산 개념과 결별합니다
  - 적극적 자유는 재산권을 유지하는 반면, 소극적 자유는 집단적 소유권과 공유 자원을 위해 재산권을 포기합니다
explanation: |
  이 텍스트는 소극적 자유가 자신의 재산, 신체, 능력을 장애물 없이 자유롭게 사용할 수 있는 자유로 정의되는 재산 개념에 깊이 뿌리를 두고 있음을 분명히 밝히고 있습니다. 반면, 적극적 자유는 원하는 것을 얻을 수 있는 능력에 초점을 맞춤으로써 재산 개념과 결별하며, 이는 국가 개입에 대한 사회주의적 정당화의 문을 열어줍니다. 적극적 자유가 재산권에서 벗어나면 자유의 개념이 자기 소유에서 국가가 보장하는 결과로 근본적으로 바뀌기 때문에 이 구분은 매우 중요합니다.
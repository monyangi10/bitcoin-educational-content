question: Theo truyền thống tự do Pháp đã thảo luận, nguyên tắc cơ bản nào phân biệt tự do tiêu cực với tự do tích cực xét về mối quan hệ của chúng với quyền sở hữu?
answer: Tự do tiêu cực dựa trên quyền sở hữu, tức là quyền tự do sử dụng tài sản, thân thể và năng lực của bản thân một cách vô hại mà không bị cản trở bởi các yếu tố bên ngoài.
wrong_answers:
  - Tự do tích cực dựa trên quyền sở hữu, tức là khả năng có được và tích lũy của cải vật chất cần thiết cho sự tự do đích thực.
  - Tự do tiêu cực phá vỡ các quan niệm về quyền sở hữu bằng cách tập trung vào sự vắng mặt của các ràng buộc pháp lý hơn là quyền sở hữu vật chất.
  - Tự do tích cực duy trì quyền sở hữu tài sản, trong khi tự do tiêu cực từ bỏ quyền đó để ủng hộ quyền sở hữu tập thể và chia sẻ tài nguyên.
explanation: |
  Văn bản này khẳng định rõ ràng rằng tự do tiêu cực bắt nguồn sâu xa từ các khái niệm về quyền sở hữu, được định nghĩa là quyền tự do sử dụng tài sản, thân thể và năng lực của mình một cách vô hại mà không gặp trở ngại. Ngược lại, tự do tích cực đoạn tuyệt với các quan niệm về quyền sở hữu bằng cách tập trung vào khả năng đạt được những điều mong muốn, điều này mở ra cánh cửa cho những lý lẽ xã hội chủ nghĩa biện minh cho sự can thiệp của nhà nước. Sự phân biệt này rất quan trọng bởi vì sự khác biệt của tự do tích cực so với quyền sở hữu đã làm thay đổi căn bản quan niệm về tự do từ quyền sở hữu cá nhân sang các kết quả được nhà nước bảo đảm.
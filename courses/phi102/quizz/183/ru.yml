question: Согласно рассмотренной французской либеральной традиции, какой основополагающий принцип отличает негативную свободу от позитивной с точки зрения их отношения к правам собственности?
answer: Негативная свобода закреплена в правах собственности как свобода безвредного использования своего имущества, тела и способностей без внешних препятствий
wrong_answers:
  - Позитивная свобода опирается на права собственности как способность получать и накапливать материальные блага, необходимые для подлинной свободы
  - Негативная свобода расходится с представлениями о собственности, делая акцент на отсутствии правовых ограничений, а не на владении материальными благами
  - Позитивная свобода сохраняет права собственности, в то время как негативная свобода отказывается от них в пользу коллективного владения и совместного использования ресурсов
explanation: |
  В тексте четко прослеживается, что негативная свобода глубоко укоренена в понятиях собственности и определяется как свобода беспрепятственно пользоваться своим имуществом, телом и способностями. Позитивная свобода, напротив, порывает с понятиями собственности, фокусируясь на способности получать желаемые вещи, что открывает путь к социалистическому обоснованию государственного вмешательства. Это различие крайне важно, поскольку отход позитивной свободы от прав собственности в корне меняет концепцию свободы: от владения собой до гарантированных государством результатов.
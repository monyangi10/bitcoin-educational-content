question: Kulingana na utamaduni wa kiliberali wa Ufaransa uliojadiliwa, ni kanuni gani ya msingi inayotofautisha uhuru hasi na uhuru chanya katika suala la uhusiano wao na haki za mali?
answer: Uhuru hasi umejikita katika haki za mali kama uhuru wa kutumia mali, mwili, na uwezo wako bila hatia bila vikwazo vya nje.
wrong_answers:
  - Uhuru chanya umejikita katika haki za mali kama uwezo wa kupata na kukusanya mali muhimu kwa uhuru wa kweli.
  - Uhuru hasi huvunja dhana za mali kwa kuzingatia kutokuwepo kwa vikwazo vya kisheria badala ya umiliki wa bidhaa za kimwili.
  - Uhuru chanya hudumisha haki za mali huku uhuru hasi ukiziacha na badala yake zichukuliwe kama umiliki wa pamoja na rasilimali za pamoja.
explanation: |
  Maandishi yanaweka wazi kwamba uhuru hasi umejikita sana katika dhana za mali, zinazofafanuliwa kama uhuru wa kutumia mali, mwili, na uwezo wa mtu bila hatia bila vikwazo. Kwa upande mwingine, uhuru chanya huvunja dhana za mali kwa kuzingatia uwezo wa kupata vitu vinavyohitajika, jambo ambalo hufungua mlango wa uhalalishaji wa kijamaa wa kuingilia kati kwa serikali. Tofauti hii ni muhimu kwa sababu kuondoka kwa uhuru chanya kutoka kwa haki za mali kimsingi hubadilisha dhana ya uhuru kutoka kwa umiliki binafsi hadi matokeo yaliyohakikishwa na serikali.
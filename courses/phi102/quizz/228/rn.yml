question: Ni gute ico canditswe gisigura isano riri hagati y’umwidegemvyo w’amahera n’uw’amabanki be n’ingingo ngenderwako yagutse y’umwidegemvyo wo gukora?
answer: Umwidegemvyo w’amahera n’uw’amabanki ugereranya ugukoresha kwihariye kw’umwidegemvyo wo gukora kuko amahera ari igikorwa gusa n’igicuruzwa gihindurwa mw’isoko .
wrong_answers:
  - Umwidegemvyo w’amahera uratandukanye cane n’umwidegemvyo w’akazi kuko usaba ubusegaba bwa Leta aho guhitamwo akazi k’umuntu ku giti ciwe .
  - Umwidegemvyo wo mu mabanki ukora udashingiye ku ngingo ngenderwako z’umwidegemvyo wo gukora kuko ibikorwa vy’ivy’ubutunzi bisaba amategeko yihariye yo gukingira abantu bose .
  - Politike y'amahera iserukira amasezerano y'imibano rusangi arenga umwidegemvyo w'akazi w'umuntu ku giti ciwe kandi asaba uburyo bwo guhuza ibikorwa .
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko umwidegemvyo wo mu mabanki no mu vy'amahera ari 'ugukoresha mu buryo budasanzwe umwidegemvyo wo gukora, kubera ko amahera agereranya gusa igikorwa gikorwa n'ikintu gihindurwa kw'isoko.' Ivyo vyerekana ingene ingingo ngenderwako z’ubwigenge zigenda zihinduka mu nzego zitandukanye z’ubutunzi. Inyishu zitari zo zivuga nabi ko politike y’amahera ikora hakurikijwe ingingo ngenderwako zitandukanye, igihe ico canditswe kivuga ko amahera akwiye gufatwa nk’iyindi mirimo yose y’isoko hakurikijwe ingingo ngenderwako zimwe z’umwidegemvyo.
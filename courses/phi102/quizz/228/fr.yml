question: Comment le texte explique-t-il la relation entre la liberté monétaire et bancaire et le principe plus large de la liberté du travail ?
answer: La liberté monétaire et bancaire représente une application spécifique de la liberté du travail, puisque l'argent est simplement un service et un produit échangés sur le marché
wrong_answers:
  - La liberté monétaire est fondamentalement différente de la liberté de travail parce qu'elle implique la souveraineté de l'État plutôt que les choix individuels en matière de travail
  - La liberté bancaire fonctionne indépendamment des principes de la liberté du travail, car les services financiers nécessitent des cadres réglementaires spécialisés pour la protection du public
  - La politique monétaire représente un contrat social collectif qui transcende la liberté de travail individuelle et nécessite des mécanismes de coordination centralisés
explanation: |
  Le texte indique explicitement que la liberté bancaire et monétaire constitue "une application particulière de la liberté du travail, puisque l'argent représente simplement un service rendu et un produit échangé sur le marché" Cela démontre que les principes libéraux s'étendent de manière cohérente à différents secteurs économiques. Les mauvaises réponses suggèrent à tort que la politique monétaire fonctionne selon des principes différents, alors que le texte affirme que la monnaie devrait être traitée comme n'importe quel autre service marchand soumis aux mêmes principes de liberté.
question: 文中如何解释货币和银行自由与更广泛的工作自由原则之间的关系？
answer: 货币和银行自由是工作自由的具体应用，因为货币只是市场上交换的一种服务和产品。
wrong_answers:
  - 货币自由与工作自由有着本质区别，因为它涉及国家主权而非个人的劳动选择
  - 银行业自由独立于工作自由原则，因为金融服务需要专门的监管框架来保护公众。
  - 货币政策是一种超越个人工作自由的集体社会契约，需要集中的协调机制
explanation: |
  该文本明确指出，银行和货币自由构成了'工作自由的一种特殊应用，因为货币仅仅代表在市场上提供的一种服务和交换的一种产品'。这说明了自由主义原则是如何在不同的经济领域得到一致推广的。错误答案错误地认为货币政策是根据不同的原则运作的，而文本认为货币应该像任何其他市场服务一样受到同样的自由原则的约束。
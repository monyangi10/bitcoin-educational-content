question: 본문은 화폐 및 은행 업무의 자유와 더 광범위한 노동의 자유 원칙 사이의 관계를 어떻게 설명하나요?
answer: 화폐 및 은행 업무의 자유는 화폐가 단순히 시장에서 교환되는 서비스이자 상품이라는 점에서 노동의 자유의 구체적인 적용을 나타냅니다
wrong_answers:
  - 금전적 자유는 개인의 노동 선택이 아닌 국가 주권과 관련되어 있기 때문에 노동의 자유와는 근본적으로 다릅니다
  - 금융 서비스에는 공공 보호를 위한 특수한 규제 프레임워크가 필요하기 때문에 은행 업무의 자유는 근로의 자유 원칙과 독립적으로 운영됩니다
  - 통화 정책은 개인의 노동 자유를 초월하는 집단적 사회 계약이며 중앙 집중식 조정 메커니즘이 필요합니다
explanation: |
  본문은 은행과 화폐의 자유가 '화폐는 단순히 시장에서 제공되는 서비스와 교환되는 상품을 의미하기 때문에 노동의 자유의 특별한 적용'에 해당한다고 명시적으로 언급하고 있습니다 이는 자유주의 원칙이 여러 경제 분야에 걸쳐 일관되게 적용된다는 것을 보여줍니다. 오답은 본문에서 화폐가 동일한 자유 원칙에 따라 다른 시장 서비스와 같이 취급되어야 한다고 주장하면서 통화 정책이 다른 원칙에 따라 운영된다고 잘못 제시하고 있습니다.
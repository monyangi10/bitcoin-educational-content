question: Как в тексте объясняется связь между денежной и банковской свободой и более широким принципом свободы труда?
answer: Денежная и банковская свобода представляет собой конкретное применение свободы труда, поскольку деньги - это просто услуги и товары, обмениваемые на рынке
wrong_answers:
  - Денежная свобода в корне отличается от свободы труда, потому что она связана с государственным суверенитетом, а не с индивидуальным выбором трудовой деятельности
  - Свобода банковской деятельности действует независимо от принципов свободы труда, поскольку финансовые услуги требуют специальной нормативной базы для защиты общества
  - Денежно-кредитная политика представляет собой коллективный общественный договор, который выходит за рамки индивидуальной свободы труда и требует централизованных механизмов координации
explanation: |
  В тексте прямо говорится, что свобода банковского и денежного обращения представляет собой "особое применение свободы труда, поскольку деньги - это просто оказанная услуга и товар, обмениваемый на рынке" Это демонстрирует, как либеральные принципы последовательно распространяются на различные секторы экономики. Неправильные ответы неверно предполагают, что денежно-кредитная политика действует в соответствии с другими принципами, в то время как в тексте утверждается, что к деньгам следует относиться как к любой другой рыночной услуге, на которую распространяются те же принципы свободы.
question: Jak text vysvětluje vztah mezi měnovou a bankovní svobodou a širším principem svobody práce?
answer: Peněžní a bankovní svoboda představuje specifickou aplikaci svobody práce, protože peníze jsou prostě službou a produktem směňovaným na trhu
wrong_answers:
  - Měnová svoboda se zásadně liší od svobody práce, protože zahrnuje spíše státní suverenitu než individuální volbu práce
  - Bankovní svoboda funguje nezávisle na zásadách svobody práce, protože finanční služby vyžadují specializované regulační rámce pro ochranu veřejnosti
  - Měnová politika představuje kolektivní společenskou smlouvu, která přesahuje individuální pracovní svobodu a vyžaduje centralizované koordinační mechanismy
explanation: |
  V textu se výslovně uvádí, že bankovní a peněžní svoboda představuje "zvláštní uplatnění svobody práce, neboť peníze představují pouze službu poskytovanou a produkt směňovaný na trhu" To ukazuje, jak se liberální zásady důsledně vztahují na různá hospodářská odvětví. Nesprávné odpovědi nesprávně naznačují, že měnová politika funguje podle jiných principů, zatímco text tvrdí, že s penězi by se mělo zacházet jako s jakoukoli jinou tržní službou, na kterou se vztahují stejné principy svobody.
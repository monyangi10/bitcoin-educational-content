question: Hoe legt de tekst de relatie uit tussen monetaire en bancaire vrijheid en het bredere principe van vrijheid van werk?
answer: Monetaire en bancaire vrijheid is een specifieke toepassing van de vrijheid van werk, aangezien geld gewoon een dienst en product is dat op de markt wordt uitgewisseld
wrong_answers:
  - Monetaire vrijheid verschilt fundamenteel van vrijheid van arbeid omdat het gaat om staatssoevereiniteit in plaats van individuele arbeidskeuzes
  - De vrijheid van bankieren werkt onafhankelijk van de principes van de vrijheid van werk, aangezien financiële diensten gespecialiseerde regelgevingskaders vereisen voor de bescherming van het publiek
  - Monetair beleid is een collectief sociaal contract dat de individuele werkvrijheid overstijgt en gecentraliseerde coördinatiemechanismen vereist
explanation: |
  De tekst stelt expliciet dat bank- en monetaire vrijheid "een bijzondere toepassing is van de vrijheid van arbeid, aangezien geld eenvoudigweg een dienst vertegenwoordigt die op de markt wordt verleend en een product dat op de markt wordt verhandeld" Dit laat zien hoe liberale principes zich consequent uitstrekken over verschillende economische sectoren. De foute antwoorden suggereren ten onrechte dat monetair beleid volgens andere principes werkt, terwijl de tekst stelt dat geld moet worden behandeld als elke andere marktdienst waarvoor dezelfde vrijheidsbeginselen gelden.
question: Como é que o texto explica a relação entre a liberdade monetária e bancária e o princípio mais amplo da liberdade de trabalho?
answer: A liberdade monetária e bancária representa uma aplicação específica da liberdade de trabalho, uma vez que o dinheiro é simplesmente um serviço e um produto trocado no mercado
wrong_answers:
  - A liberdade monetária é fundamentalmente diferente da liberdade de trabalho porque envolve a soberania do Estado e não as escolhas individuais de trabalho
  - A liberdade bancária funciona independentemente dos princípios da liberdade de trabalho, uma vez que os serviços financeiros exigem quadros regulamentares especializados para a proteção do público
  - A política monetária representa um contrato social coletivo que transcende a liberdade de trabalho individual e exige mecanismos de coordenação centralizados
explanation: |
  O texto afirma explicitamente que a liberdade bancária e monetária constitui "uma aplicação particular da liberdade de trabalho, uma vez que o dinheiro representa simplesmente um serviço prestado e um produto trocado no mercado" Isto demonstra como os princípios liberais se estendem de forma coerente a diferentes sectores económicos. As respostas erradas sugerem incorretamente que a política monetária funciona segundo princípios diferentes, quando o texto defende que a moeda deve ser tratada como qualquer outro serviço de mercado sujeito aos mesmos princípios de liberdade.
question: Как текстът обяснява връзката между паричната и банковата свобода и по-широкия принцип на свободата на труда?
answer: Паричната и банковата свобода представляват специфично приложение на свободата на труда, тъй като парите са просто услуга и продукт, които се разменят на пазара
wrong_answers:
  - Паричната свобода се различава съществено от свободата на труда, тъй като включва държавен суверенитет, а не индивидуален избор на труд
  - Банковата свобода функционира независимо от принципите на свободата на труда, тъй като финансовите услуги изискват специализирани регулаторни рамки за защита на обществото
  - Паричната политика представлява колективен обществен договор, който надхвърля индивидуалната свобода на работа и изисква централизирани механизми за координация
explanation: |
  В текста изрично се посочва, че банковата и паричната свобода представляват "специфично приложение на свободата на труда, тъй като парите просто представляват услуга, която се предоставя, и продукт, който се разменя на пазара" Това показва как либералните принципи се разпростират последователно в различните икономически сектори. Неправилните отговори неправилно предполагат, че паричната политика функционира на различни принципи, докато текстът твърди, че парите трябва да се третират като всяка друга пазарна услуга, подчинена на същите принципи на свобода.
question: Wie erklärt der Text die Beziehung zwischen Geld- und Bankenfreiheit und dem allgemeineren Grundsatz der Arbeitsfreiheit?
answer: Die Geld- und Bankenfreiheit stellt eine spezifische Anwendung der Arbeitsfreiheit dar, da Geld lediglich eine Dienstleistung und ein Produkt ist, die auf dem Markt ausgetauscht werden
wrong_answers:
  - Die monetäre Freiheit unterscheidet sich grundlegend von der Freiheit der Arbeit, da sie die staatliche Souveränität und nicht die individuellen Arbeitsentscheidungen betrifft
  - Die Freiheit des Bankwesens funktioniert unabhängig von den Grundsätzen der Arbeitsfreiheit, da Finanzdienstleistungen zum Schutz der Öffentlichkeit einen besonderen Regulierungsrahmen erfordern
  - Die Geldpolitik stellt einen kollektiven Gesellschaftsvertrag dar, der über die individuelle Arbeitsfreiheit hinausgeht und zentralisierte Koordinierungsmechanismen erfordert
explanation: |
  Im Text heißt es ausdrücklich, dass die Bank- und Währungsfreiheit "eine besondere Anwendung der Arbeitsfreiheit darstellt, da Geld lediglich eine erbrachte Dienstleistung und ein auf dem Markt getauschtes Produkt repräsentiert" Dies zeigt, dass die liberalen Grundsätze konsequent auf verschiedene Wirtschaftssektoren angewandt werden. Die falschen Antworten suggerieren fälschlicherweise, dass die Geldpolitik nach anderen Grundsätzen funktioniert, während der Text argumentiert, dass Geld wie jede andere Marktdienstleistung behandelt werden sollte, die denselben Freiheitsgrundsätzen unterliegt.
question: การปกป้องทางการค้าเปลี่ยนแปลงกระบวนการจัดสรรทรัพยากรตามธรรมชาติในระบบเศรษฐกิจตลาดเสรีอย่างไร?
answer: มันแทนที่การกระจายตามคุณธรรมผ่านความพยายามที่มีประสิทธิผลด้วยการกระจายทางการเมืองที่เอื้อประโยชน์ต่อบุคคลที่มีประสิทธิผลน้อยกว่า
wrong_answers:
  - มันขจัดความขาดแคลนทรัพยากรโดยการสร้างสำรองของรัฐบาลที่สามารถแจกจ่ายอย่างเท่าเทียมกันในหมู่พลเมืองทั้งหมด
  - มันเพิ่มการแข่งขันตามธรรมชาติโดยการให้โอกาสเริ่มต้นที่เท่าเทียมกันสำหรับผู้เข้าร่วมตลาดทั้งหมดผ่านการอุดหนุน
  - มันสร้างการจัดสรรทรัพยากรที่มีประสิทธิภาพมากขึ้นโดยให้ผู้เชี่ยวชาญของรัฐบาลกำหนดรูปแบบการกระจายที่เหมาะสม
explanation: |
  ตามบทนี้ การแข่งขันตามธรรมชาติในตลาดเสรีจะกระจายทรัพยากรอย่างยุติธรรมโดยให้รางวัลแก่ความพยายามที่มีประสิทธิผลและการตัดสินใจทางเศรษฐกิจที่ดี การปกป้องทางการค้าทำลายระบบที่อิงตามคุณธรรมนี้โดยใช้กลไกทางการเมืองในการกระจายความมั่งคั่งจากบุคคลที่มีความคิดสร้างสรรค์และมีประสิทธิผลไปยังผู้ที่มีประสิทธิผลน้อยกว่าหรือทำการตัดสินใจทางเศรษฐกิจที่ไม่ดี สิ่งนี้สร้างระบบเทียมที่ความสำเร็จถูกกำหนดโดยความโปรดปรานทางการเมืองแทนที่จะเป็นการมีส่วนร่วมทางเศรษฐกิจ ซึ่งเปลี่ยนแปลงวิธีการที่ทรัพยากรไหลผ่านสังคมอย่างพื้นฐาน
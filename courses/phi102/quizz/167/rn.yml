question: Ni gute uburinzi buhindura mu buryo bw’ishimikiro uburyo busanzwe bwo gusangira ubutunzi mu bukungu bw’isoko ry’uburenganzira?
answer: Bisubirira ugusangira bishingiye ku bushobozi biciye mu bikorwa bitanga inyungu n’ugusubira gusangira mu vya politike bifasha abantu badafise inyungu nyinshi .
wrong_answers:
  - Bikuraho ubukene bw'ubutunzi mu gushinga amafaranga Leta ishobora guhabwa kimwe mu benegihugu bose .
  - Bituma habaho uguhiganwa kw’ibidukikije mu gutanga amahirwe angana yo gutangura ku bantu bose bari mw’isoko biciye mu nkunga .
  - Bituma habaho ugutanga neza umutungo mu kwemerera abahinga ba Leta kumenya uburyo bwiza bwo gutanga umutungo .
explanation: |
  Dukurikije ikigabane, uguhiganwa kw’ibisanzwe mu masoko y’uburenganzira kugabanura ubutunzi mu buryo bubereye mu guhemba utwigoro tuzana inyungu n’ingingo nziza z’ubutunzi. Ugukingira ubutunzi burahungabanya iyo nzira ishingiye ku bushobozi mu gukoresha uburyo bwa politike bwo gusubira gusangira ubutunzi buva ku bantu b’abanyamigambi, bafise umwimbu buja ku bantu badafise umwimbu mwinshi canke bafata ingingo mbi mu vy’ubutunzi. Ivyo bituma habaho uburyo bw’ubuhinga aho ukuroranirwa bigenwa n’ugushigikirwa na politike aho gushingira ku ntererano y’ubutunzi, bikaba bihindura canecane ingene ubutunzi bugenda mu kibano.
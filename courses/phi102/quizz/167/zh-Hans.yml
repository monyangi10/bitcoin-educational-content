question: 保护主义如何从根本上改变自由市场经济中资源分配的自然过程？
answer: 它以有利于生产率较低的个人的政治再分配取代了通过生产努力进行的择优分配
wrong_answers:
  - 它通过建立政府储备，在全体公民中平均分配，消除了资源稀缺的问题
  - 通过补贴为所有市场参与者提供平等的起步机会，从而加强自然竞争
  - 它允许政府专家确定最佳分配模式，从而提高资源分配效率
explanation: |
  该章指出，自由市场中的自然竞争通过奖励富有成效的努力和良好的经济决策来公正地分配资源。保护主义利用政治机制将财富从具有创业精神和生产力的个人手中重新分配给生产力较低或经济决策失误的个人，从而破坏了这种择优录取的制度。这就造成了一种人为的制度，在这种制度中，成功与否是由政治利益而不是经济贡献决定的，从根本上改变了资源在社会中的流动方式。
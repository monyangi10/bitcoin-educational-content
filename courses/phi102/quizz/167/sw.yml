question: Je, ulinzi unabadilishaje kimsingi mchakato wa asili wa usambazaji wa rasilimali katika uchumi wa soko huria?
answer: Inachukua nafasi ya usambazaji unaotegemea sifa kupitia juhudi zenye tija na ugawaji upya wa kisiasa unaowapendelea watu wasio na tija kubwa.
wrong_answers:
  - Inaondoa uhaba wa rasilimali kwa kuunda akiba ya serikali ambayo inaweza kusambazwa sawa miongoni mwa raia wote
  - Inaongeza ushindani wa asili kwa kutoa fursa sawa za kuanzia kwa washiriki wote wa soko kupitia ruzuku
  - Inaunda mgawanyo bora wa rasilimali kwa kuruhusu wataalamu wa serikali kubaini mifumo bora ya usambazaji
explanation: |
  Kulingana na sura hiyo, ushindani wa asili katika masoko huria husambaza rasilimali kwa haki kwa kuthawabisha juhudi zenye tija na maamuzi mazuri ya kiuchumi. Ulinzi huvuruga mfumo huu unaotegemea sifa kwa kutumia mifumo ya kisiasa kusambaza tena utajiri kutoka kwa watu binafsi wajasiriamali, wenye tija kwa wale ambao hawana tija sana au wanaofanya maamuzi duni ya kiuchumi. Hii huunda mfumo bandia ambapo mafanikio huamuliwa na upendeleo wa kisiasa badala ya mchango wa kiuchumi, na hivyo kubadilisha kimsingi jinsi rasilimali zinavyopita katika jamii.
question: Kuidas muudab protektsionism põhimõtteliselt looduslikku ressursside jaotamise protsessi vabaturumajanduses?
answer: See asendab tootliku töö kaudu toimuva teenetel põhineva jaotuse poliitilise ümberjaotusega, mis soosib vähem tootlikke isikuid
wrong_answers:
  - See kõrvaldab ressursside nappuse, luues valitsuse reservid, mida saab võrdselt jaotada kõigi kodanike vahel
  - See suurendab loomulikku konkurentsi, pakkudes kõigile turuosalistele võrdseid stardivõimalusi toetuste kaudu
  - See loob tõhusama ressursside jaotamise, võimaldades valitsussektori ekspertidel määrata kindlaks optimaalsed jaotamisviisid
explanation: |
  Peatüki kohaselt jaotab loomulik konkurents vabadel turgudel ressursse õiglaselt, premeerides tootlikke jõupingutusi ja häid majandusotsuseid. Protektsionism häirib seda teenetel põhinevat süsteemi, kasutades poliitilisi mehhanisme rikkuse ümberjaotamiseks ettevõtlikelt ja produktiivsetelt inimestelt neile, kes on vähem produktiivsed või teevad halbu majandusotsuseid. See loob kunstliku süsteemi, kus edu määrab pigem poliitiline soosimine kui majanduslik panus, muutes põhjalikult ressursside liikumist ühiskonnas.
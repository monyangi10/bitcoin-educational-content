question: Comment le protectionnisme modifie-t-il fondamentalement le processus naturel de distribution des ressources dans une économie de marché ?
answer: Elle remplace la distribution fondée sur le mérite et l'effort productif par une redistribution politique qui favorise les individus moins productifs
wrong_answers:
  - Elle élimine la pénurie de ressources en créant des réserves gouvernementales qui peuvent être distribuées de manière égale à tous les citoyens
  - Elle renforce la concurrence naturelle en offrant des chances égales de départ à tous les acteurs du marché par le biais de subventions
  - Il permet une allocation plus efficace des ressources en permettant aux experts gouvernementaux de déterminer les schémas de distribution optimaux
explanation: |
  Selon ce chapitre, la concurrence naturelle sur les marchés libres distribue les ressources de manière équitable en récompensant les efforts productifs et les bonnes décisions économiques. Le protectionnisme perturbe ce système fondé sur le mérite en utilisant des mécanismes politiques pour redistribuer la richesse des individus productifs et entreprenants vers ceux qui sont moins productifs ou qui prennent de mauvaises décisions économiques. Cela crée un système artificiel dans lequel le succès est déterminé par la faveur politique plutôt que par la contribution économique, ce qui modifie fondamentalement la façon dont les ressources circulent dans la société.
question: حمایت‌گرایی چگونه به طور اساسی فرآیند طبیعی توزیع منابع در یک اقتصاد بازار آزاد را تغییر می‌دهد؟
answer: این جایگزین توزیع مبتنی بر شایستگی از طریق تلاش مولد با توزیع مجدد سیاسی است که به نفع افراد کمتر مولد است.
wrong_answers:
  - این کمبود منابع را با ایجاد ذخایر دولتی که می‌تواند به طور مساوی بین همه شهروندان توزیع شود، از بین می‌برد.
  - این با ارائه فرصت‌های شروع برابر برای همه شرکت‌کنندگان بازار از طریق یارانه‌ها، رقابت طبیعی را تقویت می‌کند.
  - این امر تخصیص منابع را کارآمدتر می‌کند، زیرا به کارشناسان دولتی اجازه می‌دهد الگوهای توزیع بهینه را تعیین کنند.
explanation: |
  طبق این فصل، رقابت طبیعی در بازارهای آزاد منابع را به‌طور عادلانه توزیع می‌کند، با پاداش دادن به تلاش‌های مولد و تصمیمات اقتصادی خوب. حمایت‌گرایی این سیستم مبتنی بر شایستگی را با استفاده از مکانیزم‌های سیاسی برای توزیع مجدد ثروت از افراد کارآفرین و مولد به کسانی که کمتر مولد هستند یا تصمیمات اقتصادی ضعیفی می‌گیرند، مختل می‌کند. این امر یک سیستم مصنوعی ایجاد می‌کند که در آن موفقیت به‌جای مشارکت اقتصادی، توسط لطف سیاسی تعیین می‌شود و به‌طور اساسی نحوه جریان منابع در جامعه را تغییر می‌دهد.
question: Como é que o protecionismo altera fundamentalmente o processo natural de distribuição de recursos numa economia de mercado livre?
answer: Substitui a distribuição baseada no mérito através do esforço produtivo por uma redistribuição política que favorece os indivíduos menos produtivos
wrong_answers:
  - Elimina a escassez de recursos através da criação de reservas públicas que podem ser distribuídas equitativamente por todos os cidadãos
  - Reforça a concorrência natural, proporcionando oportunidades iguais de arranque a todos os participantes no mercado através de subsídios
  - Cria uma afetação de recursos mais eficiente, permitindo que os peritos governamentais determinem padrões de distribuição óptimos
explanation: |
  De acordo com o capítulo, a concorrência natural nos mercados livres distribui os recursos de forma justa, recompensando os esforços produtivos e as boas decisões económicas. O protecionismo perturba este sistema baseado no mérito, utilizando mecanismos políticos para redistribuir a riqueza de indivíduos empreendedores e produtivos para aqueles que são menos produtivos ou que tomam más decisões económicas. Isto cria um sistema artificial em que o sucesso é determinado pelo favor político e não pela contribuição económica, alterando fundamentalmente a forma como os recursos circulam na sociedade.
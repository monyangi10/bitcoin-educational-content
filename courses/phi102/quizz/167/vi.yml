question: Chủ nghĩa bảo hộ làm thay đổi căn bản quá trình phân phối tài nguyên tự nhiên trong nền kinh tế thị trường tự do như thế nào?
answer: Nó thay thế việc phân phối dựa trên thành tích thông qua nỗ lực sản xuất bằng việc phân phối lại dựa trên chính trị, ưu tiên những cá nhân kém hiệu quả hơn.
wrong_answers:
  - Nó loại bỏ tình trạng khan hiếm tài nguyên bằng cách tạo ra các kho dự trữ của chính phủ có thể được phân phối đều cho tất cả công dân.
  - Nó thúc đẩy cạnh tranh tự nhiên bằng cách cung cấp cơ hội khởi đầu bình đẳng cho tất cả những người tham gia thị trường thông qua trợ cấp.
  - Nó tạo ra sự phân bổ nguồn lực hiệu quả hơn bằng cách cho phép các chuyên gia chính phủ xác định các mô hình phân phối tối ưu.
explanation: |
  Theo chương này, cạnh tranh tự nhiên trong thị trường tự do phân phối nguồn lực một cách công bằng bằng cách tưởng thưởng cho những nỗ lực sản xuất và các quyết định kinh tế đúng đắn. Chủ nghĩa bảo hộ phá vỡ hệ thống dựa trên thành tích này bằng cách sử dụng các cơ chế chính trị để phân phối lại của cải từ những cá nhân năng động, có tinh thần kinh doanh sang những người kém hiệu quả hơn hoặc đưa ra các quyết định kinh tế sai lầm. Điều này tạo ra một hệ thống nhân tạo, nơi thành công được quyết định bởi sự ưu ái chính trị hơn là đóng góp kinh tế, làm thay đổi căn bản cách thức phân bổ nguồn lực trong xã hội.
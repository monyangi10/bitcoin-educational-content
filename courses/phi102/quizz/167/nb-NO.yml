question: Hvordan endrer proteksjonisme fundamentalt den naturlige ressursfordelingen i en fri markedsøkonomi?
answer: Den erstatter merittbasert fordeling gjennom produktiv innsats med politisk omfordeling som favoriserer mindre produktive individer
wrong_answers:
  - Den eliminerer ressursknapphet ved å skape statlige reserver som kan fordeles likt blant alle borgere
  - Det styrker den naturlige konkurransen ved å gi like startmuligheter for alle markedsaktører gjennom subsidier
  - Det skaper en mer effektiv ressursallokering ved å la eksperter fra myndighetene bestemme optimale fordelingsmønstre
explanation: |
  Ifølge kapittelet fordeler den naturlige konkurransen i frie markeder ressursene rettferdig ved å belønne produktiv innsats og gode økonomiske beslutninger. Proteksjonisme forstyrrer dette merittbaserte systemet ved å bruke politiske mekanismer til å omfordele rikdom fra entreprenørielle, produktive individer til dem som er mindre produktive eller tar dårlige økonomiske beslutninger. Dette skaper et kunstig system der suksess avgjøres av politisk gunst snarere enn av økonomiske bidrag, og endrer fundamentalt hvordan ressursene flyter gjennom samfunnet.
question: Kako protekcionizam fundamentalno menja prirodni proces distribucije resursa u ekonomiji slobodnog tržišta?
answer: Zamenjuje raspodelu zasnovanu na zaslugama kroz produktivan trud političkom preraspodelom koja favorizuje manje produktivne pojedince.
wrong_answers:
  - Eliminiše oskudicu resursa stvaranjem državnih rezervi koje se mogu ravnomerno raspodeliti među svim građanima.
  - Poboljšava prirodnu konkurenciju pružanjem jednakih početnih mogućnosti za sve učesnike na tržištu putem subvencija.
  - Omogućava efikasniju raspodelu resursa tako što omogućava vladinim stručnjacima da odrede optimalne obrasce distribucije
explanation: |
  Prema poglavlju, prirodna konkurencija na slobodnim tržištima pravedno raspodeljuje resurse nagrađujući produktivne napore i dobre ekonomske odluke. Protekcionizam narušava ovaj sistem zasnovan na zaslugama koristeći političke mehanizme za preraspodelu bogatstva od preduzetničkih, produktivnih pojedinaca ka onima koji su manje produktivni ili donose loše ekonomske odluke. Ovo stvara veštački sistem gde je uspeh određen političkom naklonošću umesto ekonomskim doprinosom, što fundamentalno menja način na koji resursi teku kroz društvo.
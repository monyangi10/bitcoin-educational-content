question: Miten protektionismi muuttaa perusteellisesti luonnonvarojen luonnollista jakoprosessia vapaassa markkinataloudessa?
answer: Se korvaa ansioihin perustuvan, tuottavaan ponnisteluun perustuvan jaon poliittisella uudelleenjaolla, joka suosii vähemmän tuottavia yksilöitä
wrong_answers:
  - Se poistaa resurssien niukkuuden luomalla valtion varannot, jotka voidaan jakaa tasaisesti kaikkien kansalaisten kesken
  - Se lisää luonnollista kilpailua tarjoamalla kaikille markkinaosapuolille yhtäläiset lähtömahdollisuudet tukien avulla
  - Se tehostaa resurssien jakamista, kun hallituksen asiantuntijat voivat määrittää optimaaliset jakelumallit
explanation: |
  Luvun mukaan vapaiden markkinoiden luonnollinen kilpailu jakaa resurssit oikeudenmukaisesti palkitsemalla tuottavasta työstä ja hyvistä taloudellisista päätöksistä. Protektionismi häiritsee tätä ansioihin perustuvaa järjestelmää käyttämällä poliittisia mekanismeja varallisuuden uudelleenjakamiseksi yritteliäiltä ja tuottavilta yksilöiltä niille, jotka ovat vähemmän tuottavia tai tekevät huonoja taloudellisia päätöksiä. Näin luodaan keinotekoinen järjestelmä, jossa menestys määräytyy pikemminkin poliittisen suosion kuin taloudellisen panoksen perusteella, mikä muuttaa perusteellisesti resurssien kulkua yhteiskunnassa.
question: Согласно анализу несвободных систем, какую фундаментальную характеристику имеют социализм и коммунизм, несмотря на разные подходы к экономическому контролю?
answer: В обоих случаях индивидуальные контракты, свободный выбор и личная автономия заменяются политическим руководством и коллективным принятием решений
wrong_answers:
  - Оба полностью ликвидируют частную собственность и устанавливают полную государственную собственность на все средства производства
  - Оба сохраняют права индивидуальной собственности, регулируя лишь распределение коллективных ресурсов
  - Оба сохраняют личную автономию в принятии повседневных решений, контролируя лишь масштабное экономическое планирование
explanation: |
  В тексте четко сказано, что социализм в корне схож с коммунизмом: "Замена договора, свободного выбора и индивидуальной автономии политическим руководством" Хотя коммунизм пытается установить полный контроль, а социализм действует как "полукоммунизм", обе системы заменяют добровольные обмены и индивидуальный выбор политическими правилами и коллективными услугами. Остальные варианты неверны, потому что они либо описывают только полную ликвидацию собственности при коммунизме, либо неверно предполагают, что эти системы сохраняют права личности, либо неверно представляют масштаб контроля над личными решениями.
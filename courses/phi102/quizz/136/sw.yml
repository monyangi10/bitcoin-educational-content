question: Kulingana na uchambuzi wa mifumo isiyo ya uhuru, ni sifa gani za msingi ambazo ujamaa na ukomunisti hushiriki licha ya mbinu zao tofauti za udhibiti wa kiuchumi?
answer: Zote mbili hubadilisha mikataba ya mtu binafsi, chaguo huru, na uhuru wa kibinafsi na mwelekeo wa kisiasa na kufanya maamuzi ya pamoja.
wrong_answers:
  - Zote mbili huondoa kabisa mali binafsi na kuanzisha umiliki kamili wa serikali wa njia zote za uzalishaji.
  - Zote mbili zinadumisha haki za mali za mtu binafsi huku zikidhibiti tu usambazaji wa rasilimali za pamoja
  - Zote mbili huhifadhi uhuru wa kibinafsi katika maamuzi ya kila siku huku zikidhibiti tu mipango mikubwa ya kiuchumi
explanation: |
  Maandishi yanasema wazi kwamba kile ambacho ujamaa kimsingi unashiriki na ukomunisti ni 'kubadilisha mkataba, uhuru wa kuchagua na uhuru wa mtu binafsi kwa mwelekeo wa kisiasa.' Ingawa ukomunisti unajaribu udhibiti kamili na ujamaa hufanya kazi kama 'nusu-kikomunisti,' mifumo yote miwili hubadilisha mabadilishano ya hiari na chaguzi za mtu binafsi na kanuni za kisiasa na huduma za pamoja. Chaguzi zingine si sahihi kwa sababu zinaelezea tu ukomunisti kuondoa kabisa mali, zinaonyesha kimakosa mifumo hii inadumisha haki za mtu binafsi, au kupotosha wigo wa udhibiti wao juu ya maamuzi ya kibinafsi.
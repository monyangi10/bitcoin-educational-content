question: Welches grundlegende Merkmal haben Sozialismus und Kommunismus nach der Analyse der Systeme der Unfreiheit trotz ihrer unterschiedlichen Ansätze zur wirtschaftlichen Steuerung gemeinsam?
answer: Beide ersetzen individuelle Verträge, freie Wahl und persönliche Autonomie durch politische Führung und kollektive Entscheidungsfindung
wrong_answers:
  - Beide beseitigen das Privateigentum vollständig und begründen das volle Staatseigentum an allen Produktionsmitteln
  - Beide halten die individuellen Eigentumsrechte aufrecht, regeln aber nur die Verteilung der kollektiven Ressourcen
  - Beide bewahren die persönliche Autonomie bei alltäglichen Entscheidungen und kontrollieren lediglich die groß angelegte Wirtschaftsplanung
explanation: |
  Der Text stellt klar, dass das, was der Sozialismus mit dem Kommunismus im Wesentlichen gemeinsam hat, "die Ersetzung von Vertrag, freier Wahl und individueller Autonomie durch politische Steuerung" ist Während der Kommunismus eine vollständige Kontrolle anstrebt und der Sozialismus als "halb-kommunistisch" agiert, ersetzen beide Systeme freiwilligen Austausch und individuelle Entscheidungen durch politische Regelungen und kollektive Dienstleistungen. Die anderen Optionen sind falsch, weil sie entweder nur die vollständige Abschaffung des Eigentums im Kommunismus beschreiben, fälschlicherweise annehmen, dass diese Systeme individuelle Rechte aufrechterhalten, oder den Umfang ihrer Kontrolle über persönliche Entscheidungen falsch darstellen.
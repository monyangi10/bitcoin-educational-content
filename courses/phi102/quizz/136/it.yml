question: Secondo l'analisi dei sistemi di non libertà, quale caratteristica fondamentale condividono il socialismo e il comunismo nonostante i loro diversi approcci al controllo economico?
answer: Entrambi sostituiscono i contratti individuali, la libera scelta e l'autonomia personale con la direzione politica e il processo decisionale collettivo
wrong_answers:
  - Entrambi eliminano completamente la proprietà privata e stabiliscono la piena proprietà statale di tutti i mezzi di produzione
  - Entrambi mantengono i diritti di proprietà individuale e regolano solo la distribuzione delle risorse collettive
  - Entrambi preservano l'autonomia personale nelle decisioni quotidiane e controllano solo la pianificazione economica su larga scala
explanation: |
  Il testo afferma chiaramente che ciò che il socialismo condivide fondamentalmente con il comunismo è "la sostituzione del contratto, della libera scelta e dell'autonomia individuale con la direzione politica" Mentre il comunismo tenta il controllo totale e il socialismo opera come "mezzo comunista", entrambi i sistemi sostituiscono gli scambi volontari e le scelte individuali con regolamenti politici e servizi collettivi. Le altre opzioni non sono corrette perché descrivono solo l'eliminazione totale della proprietà da parte del comunismo, suggeriscono erroneamente che questi sistemi mantengono i diritti individuali o travisano la portata del loro controllo sulle decisioni personali.
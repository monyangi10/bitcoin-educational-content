question: Theo phân tích về các hệ thống phi tự do, chủ nghĩa xã hội và chủ nghĩa cộng sản có đặc điểm cơ bản nào chung dù có cách tiếp cận khác nhau đối với việc kiểm soát kinh tế?
answer: Cả hai đều thay thế các hợp đồng cá nhân, quyền tự do lựa chọn và quyền tự chủ cá nhân bằng sự chỉ đạo chính trị và việc ra quyết định tập thể.
wrong_answers:
  - Cả hai đều loại bỏ hoàn toàn quyền sở hữu tư nhân và thiết lập quyền sở hữu nhà nước toàn diện đối với mọi phương tiện sản xuất.
  - Cả hai đều duy trì quyền sở hữu cá nhân trong khi chỉ điều chỉnh việc phân phối nguồn lực chung.
  - Cả hai đều duy trì quyền tự chủ cá nhân trong các quyết định hàng ngày, đồng thời chỉ kiểm soát việc lập kế hoạch kinh tế quy mô lớn
explanation: |
  Văn bản nêu rõ điểm chung cơ bản giữa chủ nghĩa xã hội và chủ nghĩa cộng sản là "sự thay thế hợp đồng, quyền tự do lựa chọn và quyền tự chủ cá nhân bằng sự chỉ đạo chính trị". Trong khi chủ nghĩa cộng sản cố gắng kiểm soát hoàn toàn và chủ nghĩa xã hội hoạt động như một "nửa cộng sản", cả hai hệ thống đều thay thế các giao dịch tự nguyện và sự lựa chọn cá nhân bằng các quy định chính trị và dịch vụ tập thể. Các lựa chọn khác không chính xác vì chúng chỉ mô tả việc chủ nghĩa cộng sản loại bỏ hoàn toàn quyền sở hữu, hoặc cho rằng các hệ thống này vẫn duy trì quyền cá nhân, hoặc xuyên tạc phạm vi kiểm soát của chúng đối với các quyết định cá nhân.
question: 非自由主義システムの分析によれば、社会主義と共産主義は、経済統制へのアプローチが異なるにもかかわらず、どのような基本的特徴を共有しているのだろうか？
answer: どちらも、個人の契約、自由な選択、個人の自主性を、政治的な指示や集団的な意思決定に置き換えている。
wrong_answers:
  - どちらも私有財産を完全に排除し、すべての生産手段の完全な国家所有権を確立する。
  - どちらも個人の財産権を維持しながら、集団的資源の分配だけを規制している
  - 両者とも、日常的な意思決定における個人の自主性を維持する一方で、大規模な経済計画だけは統制している。
explanation: |
  この文章は、社会主義が共産主義と根本的に共通しているのは、『契約、自由な選択、個人の自主性を政治的な指示で置き換えること』だと明言している。共産主義は完全な統制を試み、社会主義は『半共産主義』として運営されているが、どちらのシステムも自発的な交換と個人の選択を政治的規制と集団的サービスに置き換えている。他の選択肢は、共産主義による財産の完全な排除のみを記述しているか、これらの制度が個人の権利を維持していると誤って示唆しているか、個人の意思決定に対する支配の範囲を誤って表現しているため、間違っている。
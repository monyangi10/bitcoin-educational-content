question: Welk fundamenteel kenmerk delen socialisme en communisme volgens de analyse van systemen zonder vrijheid, ondanks hun verschillende benaderingen van economische controle?
answer: Beide vervangen individuele contracten, vrije keuze en persoonlijke autonomie door politieke sturing en collectieve besluitvorming
wrong_answers:
  - In beide gevallen wordt privébezit volledig afgeschaft en worden alle productiemiddelen volledig eigendom van de staat
  - Beide handhaven individuele eigendomsrechten terwijl ze alleen de verdeling van collectieve middelen reguleren
  - Beiden behouden persoonlijke autonomie in dagelijkse beslissingen terwijl ze alleen de grootschalige economische planning controleren
explanation: |
  De tekst stelt duidelijk dat wat het socialisme fundamenteel gemeen heeft met het communisme "de vervanging van contract, vrije keuze en individuele autonomie door politieke sturing" is Terwijl het communisme volledige controle probeert te krijgen en het socialisme als 'half-communistisch' functioneert, vervangen beide systemen vrijwillige uitwisselingen en individuele keuzes door politieke regels en collectieve diensten. De andere opties zijn onjuist omdat ze ofwel alleen de totale afschaffing van eigendom door het communisme beschrijven, ten onrechte suggereren dat deze systemen individuele rechten behouden, of een verkeerde voorstelling geven van de reikwijdte van hun controle over persoonlijke beslissingen.
question: Според анализа на несвободните системи коя основна характеристика споделят социализмът и комунизмът въпреки различните си подходи към икономическия контрол?
answer: И двете заместват индивидуалните договори, свободния избор и личната автономия с политическо ръководство и колективно вземане на решения
wrong_answers:
  - И двете напълно премахват частната собственост и установяват пълна държавна собственост върху всички средства за производство
  - И двете запазват индивидуалните права на собственост, като регулират само разпределението на колективните ресурси
  - И двете запазват личната автономия при вземането на ежедневни решения, като контролират само мащабното икономическо планиране
explanation: |
  В текста ясно се посочва, че това, което социализмът има общо с комунизма, е "замяната на договора, свободния избор и индивидуалната автономия с политическо ръководство" Докато комунизмът се опитва да осъществява пълен контрол, а социализмът функционира като "полукомунистически", и двете системи заменят доброволната размяна и индивидуалния избор с политически регулации и колективни услуги. Другите варианти са неправилни, защото или описват само пълното премахване на собствеността при комунизма, или неправилно предполагат, че тези системи запазват индивидуалните права, или представят погрешно обхвата на контрола им върху личните решения.
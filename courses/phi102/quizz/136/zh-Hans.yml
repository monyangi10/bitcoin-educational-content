question: 根据对非自由制度的分析，尽管社会主义和共产主义采取不同的经济控制方法，但它们有什么共同的基本特征？
answer: 两者都以政治指导和集体决策取代了个人契约、自由选择和个人自主权
wrong_answers:
  - 两者都彻底消除了私有财产，建立了对所有生产资料的完全国家所有权
  - 两者都维护个人财产权，但只对集体资源的分配进行调节
  - 两者都保留了个人在日常决策中的自主权，同时只控制大规模的经济规划
explanation: |
  文中明确指出，社会主义与共产主义的根本共同点是'以政治指导取代契约、自由选择和个人自主'。虽然共产主义试图完全控制，而社会主义则作为'半共产主义'运作，但这两种制度都以政治法规和集体服务取代了自愿交换和个人选择。其他选项都不正确，因为它们要么只描述了共产主义彻底消除财产的做法，要么错误地暗示这些制度维护个人权利，要么歪曲了这些制度对个人决定的控制范围。
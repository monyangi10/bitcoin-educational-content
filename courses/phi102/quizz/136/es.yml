question: Según el análisis de los sistemas sin libertad, ¿qué característica fundamental comparten el socialismo y el comunismo a pesar de sus diferentes enfoques del control económico?
answer: Ambos sustituyen los contratos individuales, la libre elección y la autonomía personal por la dirección política y la toma de decisiones colectiva
wrong_answers:
  - Ambos eliminan por completo la propiedad privada y establecen la plena propiedad estatal de todos los medios de producción
  - Ambas mantienen los derechos de propiedad individual y sólo regulan la distribución de los recursos colectivos
  - Ambos preservan la autonomía personal en las decisiones cotidianas y sólo controlan la planificación económica a gran escala
explanation: |
  El texto afirma claramente que lo que el socialismo comparte fundamentalmente con el comunismo es "la sustitución del contrato, la libre elección y la autonomía individual por la dirección política" Mientras que el comunismo intenta un control total y el socialismo funciona como 'medio comunista', ambos sistemas sustituyen los intercambios voluntarios y las elecciones individuales por regulaciones políticas y servicios colectivos. Las demás opciones son incorrectas porque describen únicamente la eliminación total de la propiedad en el comunismo, sugieren erróneamente que estos sistemas mantienen los derechos individuales o tergiversan el alcance de su control sobre las decisiones personales.
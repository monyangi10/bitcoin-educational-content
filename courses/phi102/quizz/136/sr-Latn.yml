question: Prema analizi sistema bez slobode, koja fundamentalna karakteristika je zajednička socijalizmu i komunizmu uprkos njihovim različitim pristupima ekonomskoj kontroli?
answer: Oba zamenjuju pojedinačne ugovore, slobodan izbor i ličnu autonomiju političkim usmeravanjem i kolektivnim donošenjem odluka.
wrong_answers:
  - I potpuno eliminišu privatnu svojinu i uspostavljaju potpuno državno vlasništvo nad svim sredstvima za proizvodnju
  - Oboje zadržavaju individualna vlasnička prava dok samo regulišu distribuciju kolektivnih resursa
  - Oboje očuvaju ličnu autonomiju u svakodnevnim odlukama dok kontrolišu samo planiranje velikih razmera u ekonomiji
explanation: |
  Tekst jasno navodi da ono što socijalizam suštinski deli sa komunizmom jeste 'zamena ugovora, slobodnog izbora i individualne autonomije političkim usmeravanjem.' Dok komunizam pokušava potpunu kontrolu, a socijalizam funkcioniše kao 'polu-komunistički,' oba sistema zamenjuju dobrovoljne razmene i individualne izbore političkim regulacijama i kolektivnim uslugama. Ostale opcije su netačne jer ili opisuju samo komunističko potpuno ukidanje svojine, pogrešno sugerišu da ovi sistemi održavaju individualna prava, ili pogrešno predstavljaju obim njihove kontrole nad ličnim odlukama.
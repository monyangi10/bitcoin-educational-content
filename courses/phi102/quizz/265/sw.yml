question: Kulingana na uchambuzi wa jamii za kale dhidi ya jamii huru, ni nini kilichoainisha njia za uzalishaji za jamii za awali zilizowatofautisha na mifumo ya kiuchumi inayotegemea uhuru?
answer: Zilitokana na vurugu na unyang'anyi wa pamoja wa utajiri uliopo badala ya uundaji wa thamani mpya
wrong_answers:
  - Walisisitiza haki za mali za mtu binafsi lakini hawakuwa na mifumo mizuri ya soko ya kugundua bei
  - Walijikita katika usimamizi endelevu wa rasilimali kupitia makubaliano ya kidemokrasia na ulinzi wa mazingira
  - Waliweka kipaumbele katika uvumbuzi wa kiteknolojia lakini walishindwa kuunda taasisi za fedha za kutosha kwa ajili ya uwekezaji.
explanation: |
  Maandishi yanasema wazi kwamba jamii za kale ziliendeshwa chini ya 'njia za uzalishaji axés sur la violence et l'appropriation collective des richesses plutôt que sur la création de valeur nouvelle' (njia za uzalishaji zilizolenga vurugu na ugawaji wa pamoja wa utajiri badala ya kuunda thamani mpya). Tofauti hii ya msingi inaelezea kwa nini jamii hizi zilitofautiana na mifumo inayotegemea uhuru ambayo inasisitiza ubadilishanaji wa hiari na uundaji wa thamani. Majibu yasiyo sahihi yanaelezea dhana za kisasa za kiuchumi ambazo hazikuwa sifa ya jamii za kale za kikabila, ambazo zilifanya kazi chini ya hali ya hatari ya mara kwa mara na uhaba wa rasilimali ambao ulisababisha tabia za kiuchumi zinazojitegemea badala ya ubunifu.
question: Dushingiye ku nseguro y’imiryango ya kera n’imiryango yidegemvya, ni igiki cari kiranga uburyo bwo guhingura imiryango ya kera yari itandukanye n’imiryango y’ubutunzi ishingiye ku mwidegemvyo?
answer: Zari zishingiye ku bugizi bwa nabi no kwigarurira hamwe ubutunzi bwariho aho kurema agaciro gashasha .
wrong_answers:
  - Bashimikiye cane ku burenganzira bw’umuntu ku giti ciwe ariko ntibagira uburyo bwiza bwo kumenya igiciro c’isoko .
  - Bashize umutima ku gucunga neza umutungo biciye mu kwumvikana mu buryo bwa demokarasi no kubungabunga ibidukikije .
  - Bashize imbere ubuhinga bushasha ariko ntibashobora gutegura ibigo vy’imari bihagije vyo gushiramwo amahera .
explanation: |
  Ico canditswe kivuga neza yuko imiryango ya kera yakora mu buryo bw’‘uburyo bwo guhingura bushingiye ku bukazi no kwigarurira ubutunzi hamwe hamwe n’uguhingura agaciro gashasha’ (uburyo bwo guhingura bwibanda ku bukazi no kwigarurira ubutunzi hamwe aho kurema agaciro gashasha). Iryo tandukaniro ry’ishimikiro rirasigura igituma izo mibano zatandukanye n’imirongo ishingiye ku mwidegemvyo ishimika ku guhanahana ku bushake no kurema agaciro. Inyishu zitari zo zidondora ivyiyumviro vy’ubutunzi vyo muri iki gihe bitaranga imiryango ya kera y’imiryango, yakora mu bihe vy’akaga kahoraho n’ubukene bw’ubutunzi vyatuma haba inyifato z’ubutunzi zibereye aho guhingura.
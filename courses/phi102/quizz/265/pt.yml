question: De acordo com a análise das sociedades antigas versus sociedades livres, o que caracterizava os modos de produção das comunidades primitivas que as distinguia dos sistemas económicos baseados na liberdade?
answer: Baseavam-se na violência e na apropriação colectiva da riqueza existente e não na criação de novos valores
wrong_answers:
  - Davam ênfase aos direitos de propriedade individuais, mas não dispunham de mecanismos de mercado eficazes para a determinação dos preços
  - Centraram-se na gestão sustentável dos recursos através de um consenso democrático e da proteção do ambiente
  - Deram prioridade à inovação tecnológica, mas não conseguiram desenvolver instituições financeiras adequadas para o investimento
explanation: |
  O texto afirma explicitamente que as sociedades antigas funcionavam segundo "modos de produção centrados na violência e na apropriação colectiva das riquezas e não na criação de valor novo". Esta distinção fundamental explica porque é que estas sociedades diferiam dos sistemas baseados na liberdade que enfatizam a troca voluntária e a criação de valor. As respostas erradas descrevem conceitos económicos modernos que não eram caraterísticos das antigas sociedades tribais, que funcionavam em condições de perigo constante e de escassez de recursos, o que levava a comportamentos económicos de apropriação e não de criação.
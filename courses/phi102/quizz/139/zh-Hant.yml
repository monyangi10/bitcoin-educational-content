question: 根據歷史分析，為什麼社會主義在現代仍然存在，而共產主義卻大多失敗？
answer: 社會主義的做法較為溫和，允許部分個人自主，而共產主義的全面控制則過於突然地回歸古代社會
wrong_answers:
  - 社會主義透過市場機制提供更好的經濟成果，而共產主義則完全消除所有形式的經濟效率
  - 社會主義維持民主制度與公民自由，共產主義則廢除所有形式的政治參與與代表權
  - 社會主義適應技術進步和創新，而共產主義則拒絕一切形式的科學和工業進步
explanation: |
  文中解釋，社會主義之所以存在，是因為它代表一種「溫和的非自由形式」，發揮「半共產主義」的功能，在擴大國家控制的同時，維持某些個人選擇。共產主義之所以失敗，是因為它「過於突然地回到過去的社會」，徹底摧毀了現代個人透過智力勞動與自由實踐所發展出來的自治能力。其他選項錯誤地將重點放在經濟效率、民主體制或科技因素上，這些都不是分析中所提出的主要原因。
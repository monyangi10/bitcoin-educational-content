question: Dushingiye ku nseguro y’amateka, ni kuki ubusosiyalisimu bwagumyeho mu bihe vya none mu gihe ubukomunisita bwananiwe ahanini?
answer: Ubusosiyalisiti burafise uburyo buringaniye cane bushobora gutuma umuntu yigenga igice, mu gihe ubukomunisita bwo kugenzura vyose bwari butunguranye cane bwo gusubira mu mibano ya kera .
wrong_answers:
  - Ubusosiyalisimu buratanga ingaruka nziza mu vy’ubutunzi biciye ku buryo bw’isoko, mu gihe ubukomunisita burakuraho burundu uburyo bwose bwo gukora neza mu vy’ubutunzi .
  - Ubusosiyalisimu burabungabunga inzego za demokarasi n’umwidegemvyo w’abanyagihugu, mu gihe ubukomunisita bukuraho uburyo bwose bwo kugira uruhara mu vya politike no guserukira abantu .
  - Ubusosiyalisimu burahuza n’iterambere ry’ubuhinga n’ubuhinga bushasha, mu gihe ubukomunisita bwanka ubwoko bwose bw’iterambere ry’ubuhinga n’iry’inganda .
explanation: |
  Ico canditswe kirasigura yuko ubusosiyalisiti bugumaho kubera ko bugereranya ‘uburyo buringaniye bwo kutagira umwidegemvyo’ bukora ‘igice c’ubukomunisita,’ bugakomeza amahitamwo amwamwe y’umuntu ku giti ciwe mu gihe bwagura ubutegetsi bwa Leta. Ubukomunisita bwarananiwe kubera ko bwari ‘ugusubira mu mibano ya kera mu buryo butunguranye cane,’ bugasenyura burundu ubushobozi bw’umuntu wo muri iki gihe bwo kwitegeka bwari bwarateye imbere biciye ku bikorwa vy’ubwenge no ku migenzo y’umwidegemvyo. Ayandi mahitamwo atari yo yibanda ku bushobozi bw’ubutunzi, ku nzego za demokarasi canke ku bintu vy’ubuhinga, ivyo bikaba atari vyo bituma umuntu agira ico akora mu gusesangura.
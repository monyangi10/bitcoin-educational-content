question: Co se podle analýzy svobody a bezpečnosti stane, když jednotlivec poškozuje ostatní ohrožováním nebo porušováním jejich práv?
answer: Staví se do války s lidstvem a vystavují se ztrátě vlastní svobody
wrong_answers:
  - Posilují svou vlastní svobodu tím, že demonstrují nadvládu nad ostatními
  - Vytvářejí dočasnou nerovnováhu, která se přirozeně upraví bez následků
  - Vytvářejí si nezávislost na společenských omezeních a zvyšují svou svobodu
explanation: |
  V textu se jasně uvádí, že pokud někdo ubližuje druhým vyhrožováním nebo porušováním práv, "dostává se do války s lidstvem" Toto agresivní chování nejenže omezuje svobodu druhých, ale také vystavuje agresora ztrátě vlastní svobody v důsledku zásahu soudních a policejních institucí v organizovaných společnostech. Ostatní možnosti nesprávně naznačují, že poškozování druhých buď agresorovi prospívá, nebo nemá žádné důsledky, což je v rozporu se základní zásadou, že útok na svobodu druhých v konečném důsledku snižuje vlastní svobodu.
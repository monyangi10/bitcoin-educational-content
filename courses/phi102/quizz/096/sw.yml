question: Kulingana na uchambuzi wa uhuru na usalama, nini hutokea mtu anapowadhuru wengine kupitia vitisho au ukiukwaji wa haki zao?
answer: Wanajiweka vitani na ubinadamu na kujiweka katika hatari ya kupoteza uhuru wao wenyewe
wrong_answers:
  - Wanaimarisha uhuru wao wenyewe kwa kuonyesha utawala dhidi ya wengine
  - Huunda usawa wa muda ambao hujirekebisha bila matokeo yoyote
  - Wanajijengea uhuru wao kutokana na vikwazo vya kijamii na kuongeza uhuru wao
explanation: |
  Maandishi yanasema wazi kwamba mtu anapowadhuru wengine kupitia vitisho au ukiukaji wa haki, ‘anajitia vitani na ubinadamu.’ Tabia hii ya uchokozi si tu kwamba hupunguza uhuru wa wengine bali pia humfanya mchokozi apoteze uhuru wake kupitia kuingilia kati kwa taasisi za mahakama na polisi katika jamii zilizopangwa. Chaguzi zingine zinaonyesha kimakosa kwamba kuwadhuru wengine ama kunamfaidi mchokozi au hakuna matokeo, jambo ambalo linapingana na kanuni ya msingi kwamba kushambulia uhuru wa wengine hatimaye hupunguza uhuru wa mtu mwenyewe.
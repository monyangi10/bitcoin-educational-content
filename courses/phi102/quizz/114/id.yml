question: Menurut teori ekonomi pasar bebas, apa yang terjadi jika pengusaha terlalu dini mengantisipasi permintaan konsumen akan sebuah inovasi yang belum ada?
answer: Tidak adanya keuntungan secara alami menghalangi mereka untuk melanjutkan dan mencegah orang lain untuk mengikuti teladan mereka
wrong_answers:
  - Intervensi pemerintah mengarahkan upaya mereka pada proyek-proyek yang lebih bermanfaat secara sosial melalui subsidi
  - Mereka terus berinvestasi hingga preferensi konsumen akhirnya sesuai dengan prediksi awal mereka
  - Peraturan pasar memaksa mereka untuk meninggalkan proyek mereka untuk mencegah pemborosan ekonomi
explanation: |
  Dalam sistem pasar bebas, keuntungan berfungsi sebagai sinyal penting yang menunjukkan permintaan konsumen yang sebenarnya. Ketika pengusaha salah menilai waktu pasar dan mengantisipasi permintaan yang tidak ada, mereka gagal mendapatkan keuntungan generate, yang secara alami mencegah investasi lebih lanjut ke arah itu. Mekanisme koreksi diri ini mencegah sumber daya terbuang percuma untuk inovasi yang prematur. Opsi lainnya secara tidak tepat menyarankan intervensi eksternal atau investasi yang terus-menerus meskipun ada sinyal pasar, yang bertentangan dengan penekanan bab ini tentang bagaimana sinyal keuntungan memandu pengambilan keputusan ekonomi yang rasional.
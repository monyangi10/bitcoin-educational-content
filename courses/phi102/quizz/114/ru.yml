question: Согласно экономической теории свободного рынка, что происходит, когда предприниматели преждевременно прогнозируют потребительский спрос на еще не существующую инновацию?
answer: Отсутствие прибыли, естественно, отбивает у них желание продолжать работу и не позволяет другим следовать их примеру
wrong_answers:
  - Государственное вмешательство перенаправляет их усилия на более общественно полезные проекты с помощью субсидий
  - Они продолжают инвестировать до тех пор, пока потребительские предпочтения не совпадут с их первоначальными прогнозами
  - Рыночные правила заставляют их отказываться от своих проектов, чтобы избежать экономических потерь
explanation: |
  В системе свободного рынка прибыль служит важнейшим сигналом, указывающим на реальный потребительский спрос. Когда предприниматели ошибаются в определении рыночного времени и предвидят несуществующий спрос, они не получают прибыли generate, что, естественно, препятствует дальнейшим инвестициям в этом направлении. Этот самокорректирующийся механизм предотвращает растрату ресурсов на преждевременные инновации. Другие варианты неверно предполагают внешнее вмешательство или постоянные инвестиции, несмотря на сигналы рынка, что противоречит акценту главы на том, как сигналы прибыли направляют принятие рациональных экономических решений.
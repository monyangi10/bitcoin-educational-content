question: Wat gebeurt er volgens de economische theorie van de vrije markt als ondernemers te vroeg anticiperen op de consumentenvraag naar een innovatie die nog niet bestaat?
answer: De afwezigheid van winst weerhoudt hen er natuurlijk van om door te gaan en voorkomt dat anderen hun voorbeeld volgen
wrong_answers:
  - Overheidsinterventie leidt hun inspanningen om naar meer sociaal nuttige projecten door middel van subsidies
  - Ze blijven investeren totdat de voorkeuren van de consument uiteindelijk overeenkomen met hun aanvankelijke voorspellingen
  - Marktregels dwingen hen hun projecten op te geven om economische verspilling te voorkomen
explanation: |
  In een vrijemarktsysteem dienen winsten als cruciale signalen die de echte vraag van de consument aangeven. Wanneer ondernemers de timing van de markt verkeerd inschatten en anticiperen op een vraag die niet bestaat, slagen ze er niet in om generate winst te maken, wat verdere investeringen in die richting natuurlijk ontmoedigt. Dit zelfcorrigerend mechanisme voorkomt dat middelen worden verspild aan voorbarige innovaties. De andere opties suggereren ten onrechte externe interventie of aanhoudende investeringen ondanks marktsignalen, wat in tegenspraak is met de nadruk die in het hoofdstuk wordt gelegd op hoe winstsignalen rationele economische besluitvorming sturen.
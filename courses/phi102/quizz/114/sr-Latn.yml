question: Prema teoriji slobodnog tržišta, kada preduzetnici prerano predvide potražnju potrošača za inovacijom koja još ne postoji, može doći do prekomernog ulaganja u razvoj te inovacije, što može rezultirati finansijskim gubicima ako potražnja ne ispuni očekivanja.
answer: Odsustvo profita prirodno ih odvraća od nastavka i sprečava druge da slede njihov primer.
wrong_answers:
  - Vladina intervencija preusmerava njihove napore ka društveno korisnijim projektima putem subvencija
  - Nastavljaju ulagati sve dok se potrošačke preferencije na kraju ne usklade s njihovim početnim predviđanjima.
  - Tržišni propisi ih primoravaju da napuste svoje projekte kako bi sprečili ekonomsku rasipnost
explanation: |
  U slobodnom tržišnom sistemu, profiti služe kao ključni signali koji ukazuju na stvarnu potrošačku potražnju. Kada preduzetnici pogrešno procene vreme na tržištu i očekuju potražnju koja ne postoji, ne uspevaju da ostvare generate profite, što prirodno obeshrabruje dalja ulaganja u tom pravcu. Ovaj mehanizam samokorekcije sprečava rasipanje resursa na preuranjene inovacije. Druge opcije pogrešno sugerišu spoljašnju intervenciju ili uporno ulaganje uprkos signalima tržišta, što je u suprotnosti sa naglaskom poglavlja na to kako signali profita usmeravaju racionalno ekonomsko odlučivanje.
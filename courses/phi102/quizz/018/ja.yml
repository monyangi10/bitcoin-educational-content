question: 知的ディベートはどのような原則に従って行われるのか？
answer: 経済競争に似た原理で、対立を通じてアイデアが競い合う。
wrong_answers:
  - 多数意見が自動的に勝利する民主的投票の原則
  - 確立された専門家が真実を決定する階層的権威の原則
  - 歴史的先例主義とは、より古い考え方がより有効であるとみなされること。
explanation: |
  この章によれば、知的討論は経済競争に似た原理に従って機能し、対立とオープンな交換を通じて最良のアイデアが生まれ、勝利する。このようなアイデアの競争市場によって、新しい概念が自分の観察や認識と一致しているかどうかを個人が検証することができる。本文では、民主的な多数決や専門家の権威、伝統への敬意ではなく、自由な発想の競争が特に強調されているため、他の選択肢は不正解である。この競争のダイナミズムは、人類の進歩と人類の知的遺産の継続的な向上に不可欠なものとして提示されている。
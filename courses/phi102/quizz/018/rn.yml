question: Ni ingingo ngenderwako iyihe impaka z’ubwenge zikurikiza zituma ivyiyumviro vyiza kuruta ibindi vyose bivaho kandi bikanesha?
answer: Ingingo isa n’uguhiganwa mu vy’ubutunzi aho ivyiyumviro bihiganwa biciye mu guhangana .
wrong_answers:
  - Ingingo ngenderwako y'amatora ya demokarasi aho iciyumviro ca benshi gica gitsinda
  - Ingingo ngenderwako y'ubukuru bw'abakuru aho abahinga bashinzwe bagena ukuri
  - Ingingo ngenderwako y'ivya kera aho ivyiyumviro vya kera bibonwa ko ari vyo bifise akamaro kuruta
explanation: |
  Dushingiye ku gice, impaka z’ubwenge zikora zishingiye ku ngingo ngenderwako isa n’iy’uguhiganwa mu vy’ubutunzi, aho ivyiyumviro vyiza biva kandi bikanesha biciye mu guhangana n’uguhanahana amakuru ata co bihisha. Iryo soko ry’ivyiyumviro ry’uguhiganwa rituma abantu bashobora kugenzura nimba ivyiyumviro bishasha bihuye n’ivyo bo ubwabo babona be n’ivyo babona. Ayandi mahitamwo ntabwo ari meza kubera ko ico canditswe gishimika canecane ku guhiganwa kw’ivyiyumviro mu mwidegemvyo aho gushimika ku butegetsi bwa demokarasi bw’abantu benshi, ubukuru bw’abahinga canke kwubahiriza imigenzo. Uwo muvuduko wo guhiganwa ugaragazwa nk’ingenzi kugira ngo umuntu atere imbere no kugira ngo iragi ry’ubwenge ry’abantu rikomeze ritera imbere.
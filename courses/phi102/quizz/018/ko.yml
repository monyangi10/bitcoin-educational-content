question: 지적 토론에서는 어떤 원칙에 따라 최고의 아이디어가 나오고 승리할 수 있을까요?
answer: 아이디어가 대결을 통해 경쟁하는 경제 경쟁과 유사한 원리입니다
wrong_answers:
  - 다수 의견이 자동으로 승리하는 민주적 투표의 원칙
  - 기존 전문가가 진실을 판단하는 계층적 권위 원칙
  - 오래된 아이디어가 더 유효한 것으로 간주되는 역사적 선례의 원칙
explanation: |
  이 장에 따르면 지적 토론은 대립과 공개적인 교류를 통해 최고의 아이디어가 등장하고 우위를 점하는 경제 경쟁과 유사한 원리에 따라 작동합니다. 이 경쟁적인 아이디어 시장을 통해 개인은 새로운 개념이 자신의 관찰과 인식에 부합하는지 검증할 수 있습니다. 다른 선택지는 민주적 다수결, 전문가의 권위 또는 전통에 대한 존중보다는 아이디어의 자유로운 경쟁을 강조하기 때문에 올바르지 않습니다. 이 경쟁적 역학 관계는 인류의 진보와 인류의 지적 유산을 지속적으로 개선하는 데 필수적인 것으로 제시됩니다.
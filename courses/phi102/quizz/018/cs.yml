question: Jakým principem se řídí intelektuální debata, která umožňuje, aby se objevily a zvítězily nejlepší myšlenky?
answer: Princip podobný hospodářské soutěži, kdy si myšlenky konkurují prostřednictvím konfrontace
wrong_answers:
  - Princip demokratického hlasování, kdy automaticky vítězí názor většiny
  - Princip hierarchické autority, kdy pravdu určují uznávaní odborníci
  - Princip historického precedentu, kdy jsou starší myšlenky považovány za platnější
explanation: |
  Podle této kapitoly funguje intelektuální debata na podobném principu jako ekonomická soutěž, kde nejlepší myšlenky vznikají a vítězí díky konfrontaci a otevřené výměně. Tento konkurenční trh myšlenek umožňuje jednotlivcům ověřit, zda nové koncepty odpovídají jejich vlastním pozorováním a vnímání. Ostatní možnosti jsou nesprávné, protože text výslovně zdůrazňuje volnou soutěž myšlenek, nikoli demokratickou vládu většiny, autoritu odborníků nebo úctu k tradici. Tato konkurenční dynamika je prezentována jako nezbytná pro lidský pokrok a neustálé zlepšování intelektuálního dědictví lidstva.
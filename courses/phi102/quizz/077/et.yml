question: Milline ajalooline liikumine kujutas endast uute vabaduse ideede tekkimist, mis leidsid tänu muutunud materiaalsetele tingimustele praktilist rakendust?
answer: Valgustusliikumine
wrong_answers:
  - Tööstuslik revolutsioon
  - Põllumajanduslik revolutsioon
  - Kommertsrevolutsioon
explanation: |
  Valgustusliikumine kujutas endast uute vabaduse ideede õitsengut, mida oli võimalik praktiliselt rakendada, sest materiaalsed tingimused olid arenenud. Füsiokraadid nagu Turgot ja filosoofid nagu Condorcet töötasid välja kontseptsioonid inimese täiuslikkusest ja ulatuslikumast vabadusest, mis muutusid elujõuliseks tänu majanduslikele muutustele, näiteks ülemaailmsele kaubandusele. Kuigi tööstus-, põllumajandus- ja kaubandusrevolutsioonid olid olulised materiaalsed muutused, viitab valgustus konkreetselt intellektuaalsele liikumisele, mis tõi välja uued poliitilised ja majanduslikud ideed vabaduse kohta, mis sobisid 18. sajandi muutuvate tingimustega.
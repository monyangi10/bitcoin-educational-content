question: Кое историческо движение представлява появата на нови идеи за свободата, които намират практическо приложение благодарение на променените материални условия?
answer: Движението на Просвещението
wrong_answers:
  - Индустриалната революция
  - Селскостопанската революция
  - Търговската революция
explanation: |
  Движението на Просвещението представлява разцвет на нови идеи за свободата, които могат да бъдат приложени на практика, тъй като материалните условия са се развили. Физиократи като Турго и философи като Кондорсе развиват концепции за човешкото усъвършенстване и по-широката свобода, които стават осъществими благодарение на икономическите промени като световната търговия. Докато индустриалната, селскостопанската и търговската революция са важни материални промени, Просвещението се отнася конкретно до интелектуалното движение, което създава нови политически и икономически идеи за свободата, съответстващи на променящите се условия през XVIII век.
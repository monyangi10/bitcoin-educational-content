question: Mikä historiallinen liike edusti uusien vapautta koskevien ajatusten syntymistä, jotka löysivät käytännön sovellutuksen muuttuneiden aineellisten olosuhteiden ansiosta?
answer: Valistusliike
wrong_answers:
  - Teollinen vallankumous
  - Maatalouden vallankumous
  - Kaupallinen vallankumous
explanation: |
  Valistusliike edusti sellaisten uusien vapautta koskevien ajatusten kukoistusta, joita voitiin soveltaa käytännössä, koska aineelliset olosuhteet olivat kehittyneet. Turgot'n kaltaiset fysiokraatit ja Condorcet'n kaltaiset filosofit kehittivät käsityksiä ihmisen täydellisyydestä ja laajemmasta vapaudesta, jotka tulivat toteuttamiskelpoisiksi maailmanlaajuisen kaupankäynnin kaltaisten taloudellisten muutosten ansiosta. Vaikka teollinen, maataloudellinen ja kaupallinen vallankumous olivat tärkeitä aineellisia muutoksia, valistus viittaa erityisesti henkiseen liikkeeseen, joka tuotti uusia poliittisia ja taloudellisia ajatuksia vapaudesta, jotka vastasivat 1700-luvun muuttuvia olosuhteita.
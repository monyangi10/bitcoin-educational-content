question: Hangi tarihsel hareket, değişen maddi koşullar nedeniyle pratik uygulama alanı bulan özgürlükle ilgili yeni fikirlerin ortaya çıkışını temsil etmiştir?
answer: Aydınlanma hareketi
wrong_answers:
  - Sanayi Devrimi
  - Tarım Devrimi
  - Ticari Devrim
explanation: |
  Aydınlanma hareketi, maddi koşullar geliştiği için pratikte uygulanabilecek özgürlükle ilgili yeni fikirlerin çiçek açmasını temsil ediyordu. Turgot gibi fizyokratlar ve Condorcet gibi filozoflar, küresel ticaret gibi ekonomik değişimler nedeniyle uygulanabilir hale gelen insan mükemmelliği ve daha kapsamlı özgürlük kavramlarını geliştirdiler. Sanayi, Tarım ve Ticaret Devrimleri önemli maddi dönüşümler olsa da, Aydınlanma özellikle 18. yüzyılın değişen koşullarına uyan özgürlük hakkında yeni siyasi ve ekonomik fikirler üreten entelektüel hareketi ifade eder.
question: Ni harakati gani ya kihistoria iliyowakilisha kuibuka kwa mawazo mapya kuhusu uhuru ambayo yalipata matumizi ya vitendo kutokana na mabadiliko ya hali ya nyenzo?
answer: Harakati ya Mwangaza
wrong_answers:
  - Mapinduzi ya Viwanda
  - Mapinduzi ya Kilimo
  - Mapinduzi ya Kibiashara
explanation: |
  Harakati ya Mwangaza iliwakilisha maua ya mawazo mapya kuhusu uhuru ambayo yangeweza kutumika kivitendo kwa sababu hali ya nyenzo ilikuwa imebadilika. Wanafizikia kama Turgot na wanafalsafa kama Condorcet waliendeleza dhana za ukamilifu wa binadamu na uhuru mpana zaidi ambao ulipata faida kutokana na mabadiliko ya kiuchumi kama vile biashara ya kimataifa. Ingawa Mapinduzi ya Viwanda, Kilimo, na Biashara yalikuwa mabadiliko muhimu ya nyenzo, Mwangaza hurejelea haswa harakati ya kiakili iliyozalisha mawazo mapya ya kisiasa na kiuchumi kuhusu uhuru ambayo yalilingana na hali zilizobadilika za karne ya 18.
question: Quale movimento storico ha rappresentato l'emergere di nuove idee sulla libertà che hanno trovato applicazione pratica grazie alle mutate condizioni materiali?
answer: Il movimento illuminista
wrong_answers:
  - La rivoluzione industriale
  - La rivoluzione agricola
  - La rivoluzione commerciale
explanation: |
  Il movimento illuminista ha rappresentato il fiorire di nuove idee sulla libertà che potevano essere applicate praticamente grazie all'evoluzione delle condizioni materiali. Fisiocratici come Turgot e filosofi come Condorcet svilupparono concetti di perfettibilità umana e di libertà più ampia che divennero praticabili grazie ai cambiamenti economici come il commercio globale. Mentre le rivoluzioni industriale, agricola e commerciale sono state importanti trasformazioni materiali, l'Illuminismo si riferisce specificamente al movimento intellettuale che ha prodotto nuove idee politiche ed economiche sulla libertà che corrispondevano alle mutate circostanze del XVIII secolo.
question: Ni uwuhe muhari wo mu kahise wari ugereranya ukuza kw’ivyiyumviro bishasha vyerekeye umwidegemvyo vyaronse ugukoreshwa mu buryo ngirakamaro kubera ukuntu ibintu vy’umubiri vyahindutse?
answer: Umuhari w'abamuco
wrong_answers:
  - Impinduka y'inganda
  - Impinduka y'uburimyi
  - Impinduka y'ubudandaji
explanation: |
  Ishirahamwe ry’Umuco ryagereranya ugukura kw’ivyiyumviro bishasha vyerekeye umwidegemvyo vyari gushobora gukoreshwa mu buryo ngirakamaro kubera ko ivy’umubiri vyari vyarahindutse. Abahinga mu vy’umubiri nka Turgot n’abanyabwenge nka Condorcet barateguye ivyiyumviro vy’uko umuntu ashobora gutungana n’umwidegemvyo wagutse cane vyaciye bishoboka kubera ihinduka ry’ubutunzi nk’ubudandaji bwo kw’isi yose. Naho Impinduka z’Inganda, Uburimyi n’Ubucuruzi zari amahinduka ahambaye mu vy’umubiri, Impinduka z’Umuco zivuga canecane umuhari w’ubwenge watumye habaho ivyiyumviro bishasha vya politike n’ubutunzi ku bijanye n’umwidegemvyo bihuye n’ihinduka ry’ibintu vyariho mu kinjana ca 18.
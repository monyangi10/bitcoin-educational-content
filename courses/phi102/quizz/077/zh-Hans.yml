question: 哪场历史运动代表了新的自由思想的出现，并因物质条件的改变而得到实际应用？
answer: 启蒙运动
wrong_answers:
  - 工业革命
  - 农业革命
  - 商业革命
explanation: |
  启蒙运动代表着关于自由的新思想的开花结果，由于物质条件的发展，这些思想可以得到实际应用。杜尔哥（Turgot）等物理学家和孔多塞（Condorcet）等哲学家提出了人类完美性和更广泛自由的概念，这些概念因全球商业等经济变革而变得可行。工业革命、农业革命和商业革命都是重要的物质变革，而启蒙运动则特指产生了与 18 世纪不断变化的环境相匹配的新自由政治和经济思想的思想运动。
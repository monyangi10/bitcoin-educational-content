question: Které historické hnutí představovalo vznik nových myšlenek o svobodě, které našly praktické uplatnění díky změněným materiálním podmínkám?
answer: Osvícenské hnutí
wrong_answers:
  - Průmyslová revoluce
  - Zemědělská revoluce
  - Obchodní revoluce
explanation: |
  Osvícenské hnutí představovalo rozkvět nových myšlenek o svobodě, které bylo možné prakticky uplatnit, protože se vyvinuly materiální podmínky. Fyziokraté jako Turgot a filosofové jako Condorcet rozvíjeli koncepce lidské dokonalosti a rozsáhlejší svobody, které se staly životaschopnými díky ekonomickým změnám, jako byl globální obchod. Zatímco průmyslová, zemědělská a obchodní revoluce byly důležitými materiálními proměnami, osvícenství se konkrétně vztahuje k intelektuálnímu hnutí, které vytvořilo nové politické a ekonomické představy o svobodě, jež odpovídaly měnícím se podmínkám 18. století.
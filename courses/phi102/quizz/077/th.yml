question: ขบวนการทางประวัติศาสตร์ใดที่แสดงถึงการเกิดขึ้นของแนวคิดใหม่เกี่ยวกับเสรีภาพที่นำไปใช้ได้จริงเนื่องจากสภาพวัตถุที่เปลี่ยนแปลงไป?
answer: ขบวนการแห่งการตรัสรู้
wrong_answers:
  - การปฏิวัติอุตสาหกรรม
  - การปฏิวัติการเกษตร
  - การปฏิวัติการค้า
explanation: |
  ขบวนการแห่งการตรัสรู้เป็นตัวแทนของการเบ่งบานของแนวคิดใหม่เกี่ยวกับเสรีภาพที่สามารถนำไปใช้ได้จริงเนื่องจากสภาพวัตถุได้พัฒนาไป นักเศรษฐศาสตร์เช่น Turgot และนักปรัชญาเช่น Condorcet ได้พัฒนาแนวคิดเกี่ยวกับความสามารถในการพัฒนาของมนุษย์และเสรีภาพที่กว้างขวางขึ้นซึ่งกลายเป็นไปได้เนื่องจากการเปลี่ยนแปลงทางเศรษฐกิจเช่นการค้าทั่วโลก แม้ว่าการปฏิวัติอุตสาหกรรม การเกษตร และการค้าเป็นการเปลี่ยนแปลงทางวัตถุที่สำคัญ แต่การตรัสรู้หมายถึงขบวนการทางปัญญาที่ผลิตแนวคิดทางการเมืองและเศรษฐกิจใหม่เกี่ยวกับเสรีภาพที่สอดคล้องกับสถานการณ์ที่เปลี่ยนแปลงไปในศตวรรษที่ 18 โดยเฉพาะ
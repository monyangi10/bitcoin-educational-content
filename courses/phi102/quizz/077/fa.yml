question: کدام جنبش تاریخی نمایانگر ظهور ایده‌های جدید درباره آزادی بود که به دلیل تغییر شرایط مادی به کاربرد عملی رسید؟
answer: جنبش روشنگری
wrong_answers:
  - انقلاب صنعتی
  - انقلاب کشاورزی
  - انقلاب تجاری
explanation: |
  جنبش روشنگری نمایانگر شکوفایی ایده‌های جدید درباره آزادی بود که به دلیل تحول شرایط مادی، به‌طور عملی قابل اجرا بودند. فیزیوکرات‌هایی مانند تورگو و فیلسوفانی مانند کندورسه مفاهیمی از کمال‌پذیری انسان و آزادی گسترده‌تر را توسعه دادند که به دلیل تغییرات اقتصادی مانند تجارت جهانی، قابل اجرا شدند. در حالی که انقلاب‌های صنعتی، کشاورزی و تجاری تحولات مادی مهمی بودند، روشنگری به‌طور خاص به جنبش فکری اشاره دارد که ایده‌های جدید سیاسی و اقتصادی درباره آزادی را تولید کرد که با شرایط متغیر قرن هجدهم مطابقت داشت.
question: Welke historische beweging vertegenwoordigde de opkomst van nieuwe ideeën over vrijheid die praktisch toepasbaar werden door veranderde materiële omstandigheden?
answer: De verlichtingsbeweging
wrong_answers:
  - De industriële revolutie
  - De landbouwrevolutie
  - De commerciële revolutie
explanation: |
  De Verlichting vertegenwoordigde de bloei van nieuwe ideeën over vrijheid die praktisch konden worden toegepast omdat de materiële omstandigheden zich hadden ontwikkeld. Fysiocraten als Turgot en filosofen als Condorcet ontwikkelden concepten van menselijke perfectie en uitgebreidere vrijheid die uitvoerbaar werden door economische veranderingen zoals wereldwijde handel. Terwijl de Industriële, Agrarische en Commerciële Revoluties belangrijke materiële transformaties waren, verwijst de Verlichting specifiek naar de intellectuele beweging die nieuwe politieke en economische ideeën over vrijheid voortbracht die pasten bij de veranderende omstandigheden van de 18e eeuw.
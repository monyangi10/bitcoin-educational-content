question: ¿Qué movimiento histórico representó la aparición de nuevas ideas sobre la libertad que encontraron aplicación práctica debido al cambio de las condiciones materiales?
answer: El movimiento de la Ilustración
wrong_answers:
  - La Revolución Industrial
  - La revolución agrícola
  - La revolución comercial
explanation: |
  El movimiento de la Ilustración representó el florecimiento de nuevas ideas sobre la libertad que podían aplicarse en la práctica porque las condiciones materiales habían evolucionado. Fisiócratas como Turgot y filósofos como Condorcet desarrollaron conceptos de perfectibilidad humana y libertad más amplia que se hicieron viables gracias a cambios económicos como el comercio global. Aunque las revoluciones industrial, agrícola y comercial fueron importantes transformaciones materiales, la Ilustración se refiere específicamente al movimiento intelectual que produjo nuevas ideas políticas y económicas sobre la libertad que se ajustaban a las circunstancias cambiantes del siglo XVIII.
question: Quel mouvement historique a représenté l'émergence de nouvelles idées sur la liberté qui ont trouvé une application pratique grâce à l'évolution des conditions matérielles ?
answer: Le mouvement des Lumières
wrong_answers:
  - La révolution industrielle
  - La révolution agricole
  - La révolution commerciale
explanation: |
  Le mouvement des Lumières a représenté l'épanouissement de nouvelles idées sur la liberté qui pouvaient être appliquées en pratique parce que les conditions matérielles avaient évolué. Des physiocrates comme Turgot et des philosophes comme Condorcet ont développé des concepts de perfectibilité humaine et de liberté plus étendue qui sont devenus viables grâce à des changements économiques tels que le commerce mondial. Si les révolutions industrielle, agricole et commerciale ont constitué d'importantes transformations matérielles, le Siècle des Lumières se réfère spécifiquement au mouvement intellectuel qui a produit de nouvelles idées politiques et économiques sur la liberté qui correspondaient aux circonstances changeantes du XVIIIᵉ siècle.

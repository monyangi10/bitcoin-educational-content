question: イデオローグ」と呼ばれた思想家たちに対するナポレオンの態度は？
answer: 彼は侮蔑的な意味でこの名前をつけたが、後に自らの征服の目的を知らなかったことを認めた。
wrong_answers:
  - 彼は彼らを、抽象的な理論家よりも現実世界を理解している実践的な思想家だと称賛した。
  - 彼は彼らの理論を全面的に採用し、軍事作戦を通じてそれを実行に移した。
  - 彼は、政治的・軍事的な問題とは無関係だと考え、彼らを完全に無視した。
explanation: |
  ナポレオンは侮辱として「イデオローグ」という言葉を作り、これらの思想家を非現実的な理論家と見下した。しかし皮肉なことに、現実離れしていると批判しながらも、ナポレオン自身は後にサンヘレナで、自らの征服の目的すら理解していなかったことを認めている。イデオローグたちは、単なる理論家というレッテルを貼られたにもかかわらず、実際には人間の行動について首尾一貫した理解を持っており、（医師カバニスや農学者デスタット・ド・トレーシーのように）自らも実践者であることが多かったのに対し、「行動する男」であるはずのナポレオンは明確な方向性を持っていなかった。
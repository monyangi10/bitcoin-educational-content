question: Wat was Napoleons houding ten opzichte van de groep denkers die hij 'Idéologues' noemde?
answer: Hij gaf ze deze naam op een pejoratieve manier, maar gaf later toe dat hij het doel van zijn eigen veroveringen niet kende
wrong_answers:
  - Hij prees hen als praktische denkers die de echte wereld beter begrepen dan abstracte theoretici
  - Hij nam hun theorieën volledig over en implementeerde ze tijdens zijn militaire campagnes
  - Hij negeerde ze volledig omdat hij ze irrelevant vond voor politieke en militaire zaken
explanation: |
  Napoleon gebruikte de term 'Idéologues' als een belediging en deed deze denkers af als onpraktische theoretici. De ironie was echter dat Napoleon, terwijl hij hen bekritiseerde omdat ze los stonden van de realiteit, later zelf op Sint-Helena toegaf dat hij het doel van zijn eigen veroveringen niet eens begreep. De Idéologues, ondanks dat ze bestempeld werden als louter theoretici, hadden eigenlijk een samenhangend begrip van menselijke actie en waren vaak zelf praktijkmensen (zoals Cabanis de arts en Destutt de Tracy de landbouwer), terwijl de veronderstelde 'man van actie' Napoleon geen duidelijke richting had.
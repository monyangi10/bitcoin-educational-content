question: 나폴레옹이 '이데올로기'라고 불렀던 사상가 그룹에 대한 나폴레옹의 태도는 어땠을까요?
answer: 그는 경멸적인 의미로 이 이름을 붙였지만, 나중에 자신의 정복 목적을 몰랐다고 인정했습니다
wrong_answers:
  - 그는 그들을 추상적인 이론가보다 현실 세계를 더 잘 이해한 실용적인 사상가라고 칭찬했습니다
  - 그는 그들의 이론을 전면적으로 채택하여 군사 작전 전반에 걸쳐 실행했습니다
  - 그는 정치 및 군사 문제와 관련이 없다고 생각했기 때문에 완전히 무시했습니다
explanation: |
  나폴레옹은 '이데올로그'라는 용어를 만들어 이 사상가들을 비현실적인 이론가라고 폄하했습니다. 그러나 아이러니하게도 나폴레옹 자신은 현실과 동떨어져 있다고 비판하면서도 나중에 생헬레나에서 자신이 정복의 목적조차 이해하지 못했다고 인정했습니다. 이데올로기론자들은 단순한 이론가로 분류되었지만 실제로는 인간의 행동에 대해 일관된 이해를 가지고 있었고, 의사 카바니스와 농업학자 데스투트 드 트레이시처럼 스스로 실천에 옮긴 경우가 많았던 반면, '행동하는 사람'으로 여겨졌던 나폴레옹은 명확한 방향성이 부족했죠.
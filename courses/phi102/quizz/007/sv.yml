question: Vad var Napoleons inställning till den grupp av tänkare som han kallade "Idéologues"?
answer: Han gav dem detta namn på ett nedsättande sätt, men erkände senare att han inte visste syftet med sina egna erövringar
wrong_answers:
  - Han hyllade dem som praktiska tänkare som förstod den verkliga världen bättre än abstrakta teoretiker
  - Han antog deras teorier i sin helhet och implementerade dem under sina militära fälttåg
  - Han ignorerade dem helt eftersom han ansåg att de var irrelevanta för politiska och militära angelägenheter
explanation: |
  Napoleon myntade termen "Idéologues" som en förolämpning och avfärdade dessa tänkare som opraktiska teoretiker. Det ironiska var dock att samtidigt som Napoleon kritiserade dem för att vara verklighetsfrånvända, erkände han själv senare på Sankt Helena att han inte ens förstod syftet med sina egna erövringar. Trots att idéologerna stämplades som teoretiker hade de faktiskt en sammanhängande förståelse för mänskligt handlande och var ofta själva praktiker (som läkaren Cabanis och jordbrukaren Destutt de Tracy), medan den förmodade "handlingens man" Napoleon saknade en tydlig riktning.
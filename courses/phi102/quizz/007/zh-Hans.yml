question: 拿破仑对他称之为 "Idéologues "的思想家群体持什么态度？
answer: 他以贬义的方式给他们起了这个名字，但后来又承认，他并不知道自己征服的目的是什么
wrong_answers:
  - 他称赞他们是务实的思想家，比抽象的理论家更了解现实世界
  - 他全盘接受了他们的理论，并在整个军事行动中加以实施
  - 他完全忽视了他们，因为他认为他们与政治和军事事务无关
explanation: |
  拿破仑创造了 "空想家"（Idéologues）一词，将这些思想家斥之为不切实际的理论家，以此作为对他们的侮辱。然而，讽刺的是，拿破仑在批评他们脱离现实的同时，自己后来在圣赫勒拿岛承认，他甚至不明白自己征服的目的是什么。理想主义者虽然被贴上了理论家的标签，但他们实际上对人类的行动有着连贯的理解，他们自己往往也是实践者（如医生卡巴尼斯和农业家德斯特拉特-德-特雷西），而拿破仑这个所谓的 "行动者 "却缺乏明确的方向。
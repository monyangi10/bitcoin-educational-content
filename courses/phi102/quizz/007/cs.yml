question: Jaký byl Napoleonův postoj ke skupině myslitelů, které nazýval "Idéologové"?
answer: Pojmenoval je takto pejorativně, později však přiznal, že nezná účel svých vlastních výbojů
wrong_answers:
  - Chválil je jako praktické myslitele, kteří rozumějí reálnému světu lépe než abstraktní teoretici
  - Přijal jejich teorie ve velkém a uplatňoval je během svých vojenských tažení
  - Zcela je ignoroval, protože je považoval za nepodstatné pro politické a vojenské záležitosti
explanation: |
  Napoleon použil termín "idéologové" jako urážku a odmítl tyto myslitele jako nepraktické teoretiky. Ironií však bylo, že zatímco je kritizoval za odtrženost od reality, sám Napoleon později na Svaté Heleně přiznal, že nechápe ani smysl svých vlastních výbojů. Idéologové, přestože byli označováni za pouhé teoretiky, ve skutečnosti důsledně chápali lidské jednání a často byli sami praktiky (jako lékař Cabanis a zemědělec Destutt de Tracy), zatímco údajný "muž činu" Napoleon postrádal jasné směřování.
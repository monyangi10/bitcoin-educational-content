question: Какво е било отношението на Наполеон към групата мислители, които той нарича "идеолози"?
answer: Той им дава това име по пренебрежителен начин, но по-късно признава, че не е знаел целта на собствените си завоевания
wrong_answers:
  - Той ги възхвалява като практични мислители, които разбират реалния свят по-добре от абстрактните теоретици
  - Той възприема теориите им и ги прилага по време на военните си кампании
  - Той ги пренебрегва напълно, защото ги смята за неуместни за политическите и военните дела
explanation: |
  Наполеон използва термина "идеолози" като обида, отхвърляйки тези мислители като непрактични теоретици. Иронията обаче се състои в това, че докато ги критикува за това, че са откъснати от реалността, самият Наполеон по-късно признава в Света Елена, че дори не разбира целта на собствените си завоевания. Идеолозите, въпреки че са били наричани просто теоретици, всъщност са имали последователно разбиране за човешките действия и често сами са били практици (като лекаря Кабанис и земеделския производител Дестют дьо Траси), докато на предполагаемия "човек на действието" Наполеон му е липсвала ясна насока.
question: Kakav je bio Napoleonov stav prema grupi mislilaca koju je nazivao 'Idéologues'?
answer: Dao im je ovo ime na pejorativan način, ali je kasnije priznao da nije znao svrhu svojih osvajanja.
wrong_answers:
  - On ih je pohvalio kao praktične mislioce koji su bolje razumeli stvarni svet od apstraktnih teoretičara.
  - Usvojio je njihove teorije u potpunosti i primenio ih tokom svojih vojnih kampanja.
  - Potpuno ih je ignorisao jer ih je smatrao nebitnim za politička i vojna pitanja.
explanation: |
  Napoleon je skovao termin 'Idéologues' kao uvredu, odbacujući ove mislioce kao nepraktične teoretičare. Međutim, ironija je bila u tome što je, dok ih je kritikovao da su odvojeni od stvarnosti, Napoleon sam kasnije priznao na Svetoj Heleni da nije ni razumeo svrhu svojih osvajanja. Idéologues, uprkos tome što su bili označeni kao puki teoretičari, zapravo su imali koherentno razumevanje ljudskog delovanja i često su bili praktičari (poput lekara Cabanisa i poljoprivrednika Destutt de Tracyja), dok je navodni 'čovek akcije' Napoleon nedostajao jasnom pravcu.
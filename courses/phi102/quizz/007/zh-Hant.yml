question: 拿破崙對於被他稱為 "Idéologues "的思想家群體持什麼態度？
answer: 他用貶義的方式給他們起了這個名字，但後來他承認自己不知道自己征服的目的
wrong_answers:
  - 他稱讚他們是實用的思想家，比抽象的理論家更了解現實世界
  - 他全盤採納了他們的理論，並在整個軍事行動中加以實踐。
  - 他完全不理會他們，因為他認為他們與政治和軍事無關
explanation: |
  拿破崙創造了 "Idéologues "這個詞來侮辱這些思想家，認為他們是不切實際的理論家。然而，諷刺的是，在批評他們與現實脫節的同時，拿破崙本人後來在聖赫勒拿島承認，他甚至不瞭解自己征服的目的。Idéologues 儘管被標籤為純理論家，但他們實際上對人類的行動有著一致的理解，而且他們自己往往也是實踐者（如醫生 Cabanis 和農業家 Destutt de Tracy），而被視為「行動者」的拿破崙卻缺乏明確的方向。
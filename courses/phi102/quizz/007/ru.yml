question: Как Наполеон относился к группе мыслителей, которых он называл "Идеологами"?
answer: Он назвал их так в уничижительном смысле, но позже признался, что не знал цели своих завоеваний
wrong_answers:
  - Он превозносил их как практических мыслителей, которые понимали реальный мир лучше, чем абстрактные теоретики
  - Он перенял их теории и внедрял их во время своих военных кампаний
  - Он полностью игнорировал их, считая, что они не имеют отношения к политическим и военным делам
explanation: |
  Наполеон ввел термин "идеологи" как оскорбление, отвергнув этих мыслителей как непрактичных теоретиков. Однако ирония заключалась в том, что, критикуя их за отрыв от реальности, сам Наполеон позже признался на острове Святой Елены, что даже не понимал цели своих собственных завоеваний. Идеологи, несмотря на то, что их называли простыми теоретиками, на самом деле имели целостное понимание человеческих действий и часто сами были практиками (например, врач Кабанис и земледелец Дестют де Траси), в то время как предполагаемый "человек действия" Наполеон не имел четкого направления.
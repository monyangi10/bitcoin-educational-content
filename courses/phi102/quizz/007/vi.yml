question: Thái độ của Napoleon đối với nhóm các nhà tư tưởng mà ông gọi là "các nhà tư tưởng hệ tư tưởng" là như thế nào?
answer: Ông ta đặt cho họ cái tên đó với ý nghĩa miệt thị, nhưng sau đó thừa nhận rằng ông ta không biết mục đích của những cuộc chinh phục của mình.
wrong_answers:
  - Ông ca ngợi họ là những người tư duy thực tế, hiểu rõ thế giới thực hơn những nhà lý thuyết trừu tượng.
  - Ông ta đã tiếp thu toàn bộ lý thuyết của họ và áp dụng chúng trong suốt các chiến dịch quân sự của mình.
  - Ông ta hoàn toàn phớt lờ chúng vì cho rằng chúng không liên quan gì đến các vấn đề chính trị và quân sự.
explanation: |
  Napoleon đã đặt ra thuật ngữ "những nhà tư tưởng lý tưởng" như một lời chế giễu, bác bỏ những nhà tư tưởng này như những nhà lý thuyết thiếu thực tế. Tuy nhiên, trớ trêu thay, trong khi chỉ trích họ vì xa rời thực tế, chính Napoleon sau này lại thừa nhận tại Saint Helena rằng ông thậm chí không hiểu mục đích của những cuộc chinh phạt của mình. Những nhà tư tưởng lý tưởng, mặc dù bị coi là những nhà lý thuyết đơn thuần, thực chất lại có sự hiểu biết mạch lạc về hành động của con người và thường là những người thực hành (như Cabanis, bác sĩ, và Destutt de Tracy, nhà nông học), trong khi Napoleon, người được cho là "người hành động", lại thiếu định hướng rõ ràng.
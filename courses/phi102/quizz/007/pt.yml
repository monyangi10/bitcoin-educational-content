question: Qual era a atitude de Napoleão em relação ao grupo de pensadores a que chamava "Idéologues"?
answer: Deu-lhes este nome de forma pejorativa, mas mais tarde admitiu que não sabia o objetivo das suas próprias conquistas
wrong_answers:
  - Elogiou-os como pensadores práticos que compreendiam melhor o mundo real do que os teóricos abstractos
  - Adoptou as suas teorias por completo e aplicou-as nas suas campanhas militares
  - Ignorou-os completamente porque os considerava irrelevantes para os assuntos políticos e militares
explanation: |
  Napoleão cunhou o termo "Idéologues" como um insulto, considerando estes pensadores como teóricos pouco práticos. No entanto, a ironia é que, enquanto os criticava por estarem desligados da realidade, o próprio Napoleão admitiu mais tarde, em Santa Helena, que nem sequer compreendia o objetivo das suas próprias conquistas. Os Idéologues, apesar de serem rotulados de meros teóricos, tinham, na verdade, uma compreensão coerente da ação humana e eram, muitas vezes, eles próprios praticantes (como Cabanis, o médico, e Destutt de Tracy, o agricultor), enquanto o suposto "homem de ação" Napoleão não tinha uma orientação clara.
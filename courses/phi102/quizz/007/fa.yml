question: نگرش ناپلئون نسبت به گروهی از متفکران که او آنها را 'ایدئولوگ‌ها' می‌نامید، چگونه بود؟
answer: او این نام را به صورت تحقیرآمیز به آنها داد، اما بعداً اعتراف کرد که هدف از فتوحات خود را نمی‌دانست.
wrong_answers:
  - او آنها را به عنوان متفکران عملی ستود که دنیای واقعی را بهتر از نظریه‌پردازان انتزاعی درک می‌کردند.
  - او نظریات آن‌ها را به‌طور کامل پذیرفت و در تمام کمپین‌های نظامی خود اجرا کرد.
  - او آنها را کاملاً نادیده گرفت زیرا آنها را برای امور سیاسی و نظامی بی‌اهمیت می‌دانست.
explanation: |
  ناپلئون اصطلاح 'ایدئولوگ‌ها' را به عنوان یک توهین ابداع کرد و این متفکران را به عنوان نظریه‌پردازان غیرعملی رد کرد. با این حال، طنز ماجرا این بود که در حالی که او آنها را به خاطر قطع ارتباط با واقعیت مورد انتقاد قرار می‌داد، خود ناپلئون بعدها در سنت هلنا اعتراف کرد که حتی هدف از فتوحات خود را نمی‌فهمید. ایدئولوگ‌ها، با وجود اینکه به عنوان نظریه‌پردازان صرف برچسب خورده بودند، در واقع درک منسجمی از عمل انسانی داشتند و اغلب خودشان نیز عمل‌گرا بودند (مانند کابانیس پزشک و دستوت دو تراسی کشاورز)، در حالی که ناپلئون به عنوان 'مرد عمل' فاقد جهت‌گیری واضح بود.
question: Quelle fut l'attitude de Napoléon à l'égard du groupe de penseurs qu'il appelait les "Idéologues" ?
answer: Il leur a donné ce nom de manière péjorative, tout en admettant plus tard qu'il ne connaissait pas le but de ses propres conquêtes
wrong_answers:
  - Il les a loués en tant que penseurs pratiques qui comprenaient mieux le monde réel que les théoriciens abstraits
  - Il a adopté leurs théories en bloc et les a mises en œuvre tout au long de ses campagnes militaires
  - Il les a complètement ignorés parce qu'il les considérait comme sans rapport avec les affaires politiques et militaires
explanation: |
  Napoléon a inventé le terme "Idéologues" comme une insulte, rejetant ces penseurs comme des théoriciens impraticables. L'ironie du sort veut que, tout en les critiquant pour leur déconnexion de la réalité, Napoléon lui-même admette plus tard à Sainte-Hélène qu'il ne comprenait même pas l'objectif de ses propres conquêtes. Les Idéologues, bien que qualifiés de simples théoriciens, avaient en fait une compréhension cohérente de l'action humaine et étaient souvent eux-mêmes des praticiens (comme Cabanis le médecin et Destutt de Tracy l'agriculteur), alors que le supposé "homme d'action" qu'était Napoléon manquait de direction claire.
question: Mtazamo wa Napoleon ulikuwaje kuelekea kundi la wanafikra aliowaita 'Wanafikra'?
answer: Aliwapa jina hili kwa njia ya kejeli, lakini baadaye alikiri kwamba hakujua kusudi la ushindi wake mwenyewe.
wrong_answers:
  - Aliwasifu kama wanafikra wa vitendo walioelewa ulimwengu halisi vizuri zaidi kuliko wananadharia wa kufikirika.
  - Alipitisha nadharia zao kwa jumla na kuzitekeleza katika kampeni zake zote za kijeshi.
  - Alizipuuza kabisa kwa sababu aliziona kuwa hazina umuhimu wowote katika masuala ya kisiasa na kijeshi.
explanation: |
  Napoleon alibuni neno 'Wanaofikiria Idéologues' kama tusi, akiwapuuza wanafalsafa hawa kama wananadharia wasiofaa. Hata hivyo, kejeli ilikuwa kwamba alipokuwa akiwakosoa kwa kutounganishwa na ukweli, Napoleon mwenyewe baadaye alikiri huko Saint Helena kwamba hakuelewa hata kusudi la ushindi wake mwenyewe. Wanaofikiria Idéologues, licha ya kuitwa wananadharia tu, kwa kweli walikuwa na uelewa thabiti wa vitendo vya binadamu na mara nyingi walikuwa watendaji wenyewe (kama Cabanis daktari na Destutt de Tracy mtaalamu wa kilimo), huku Napoleon anayedhaniwa kuwa 'mtu wa vitendo' alikosa mwelekeo wazi.
question: De acordo com o capítulo, que tipo de actividades de produção se caracterizam por serem formas violentas que envolvem mais a destruição do que a criação?
answer: Caça e pesca
wrong_answers:
  - Agricultura e pecuária
  - Fabrico e artesanato
  - Comércio e indústria
explanation: |
  O capítulo afirma explicitamente que a caça e a pesca constituem formas violentas de produção que envolvem destruição em vez de criação. Estas actividades exigem que se tire a vida aos animais existentes, o que as torna predatórias por natureza. Em contraste, a agricultura é apresentada como um avanço em direção a uma produção pacífica que cria harmonia em vez de destruição. A manufatura, o artesanato, o comércio e o comércio são formas de produção pacífica que criam valor sem destruir a vida existente, o que as torna fundamentalmente diferentes da natureza extractiva e violenta da caça e da pesca.
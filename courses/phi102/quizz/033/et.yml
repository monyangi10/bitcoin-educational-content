question: Milliseid tootmistegevusi iseloomustatakse peatüki kohaselt kui vägivaldseid vorme, mis hõlmavad pigem hävitamist kui loomist?
answer: Jahindus ja kalapüük
wrong_answers:
  - Põllumajandus ja põllumajandus
  - Tootmine ja käsitöö
  - Kaubandus ja kaubandus
explanation: |
  Peatükis märgitakse selgesõnaliselt, et jahipidamine ja kalapüük on vägivaldsed tootmisviisid, mis hõlmavad pigem hävitamist kui loomist. Need tegevused eeldavad elu võtmist olemasolevatelt loomadelt, mis muudab nad oma olemuselt röövloomadeks. Seevastu põllumajandus on esitatud kui edasiminek rahumeelse tootmise suunas, mis loob pigem harmooniat kui hävingut. Tootmine, käsitöö, kaubandus ja käsitöö on kõik rahumeelse tootmise vormid, mis loovad väärtust ilma olemasolevat elu hävitamata, mis muudab need põhimõtteliselt erinevaks jahipidamise ja kalapüügi ekstraheerivast, vägivaldsest iseloomust.
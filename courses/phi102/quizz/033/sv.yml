question: Enligt kapitlet, vilken typ av produktionsaktiviteter kännetecknas av våldsamma former som innebär förstörelse snarare än skapande?
answer: Jakt och fiske
wrong_answers:
  - Lantbruk och jordbruk
  - Tillverkning och hantverk
  - Handel och näringsliv
explanation: |
  I kapitlet anges uttryckligen att jakt och fiske utgör våldsamma produktionsformer som innebär förstörelse snarare än skapande. Dessa aktiviteter kräver att man tar livet av existerande djur, vilket gör dem till rovdjur i naturen. Däremot framställs jordbruket som en utveckling mot fredlig produktion som skapar harmoni snarare än förstörelse. Tillverkning, hantverk, handel och kommers är alla former av fredlig produktion som skapar värde utan att förstöra befintligt liv, vilket gör dem fundamentalt annorlunda än jaktens och fiskets extraktiva, våldsamma natur.
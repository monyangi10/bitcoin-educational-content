question: Wat maakt, volgens de liberale economische theorie, contractuele relaties fundamenteel anders dan gecentraliseerde sturing in het bevorderen van menselijke vooruitgang en innovatie?
answer: Contracten stellen individuen in staat om los te komen van gevestigde patronen en nieuwe oplossingen te creëren door middel van uiteenlopende vaardigheden en veranderende omstandigheden
wrong_answers:
  - Contracten bieden beter regelgevend toezicht en mechanismen voor kwaliteitscontrole dan gecentraliseerde systemen kunnen bieden
  - Contracten zorgen voor een gelijke verdeling van middelen en kansen over alle sociale klassen en economische sectoren
  - Contracten creëren gestandaardiseerde procedures die risico en onzekerheid uit economische transacties verwijderen
explanation: |
  De tekst benadrukt dat contractuele vrijheid menselijke perfectie mogelijk maakt omdat gecentraliseerde sturing alleen bekende productiepatronen reproduceert, terwijl vrijheid van werk mensen in staat stelt om buiten de geijkte paden naar nieuwe creaties te gaan. Dit gebeurt omdat individuen verschillende krachten, vaardigheden en doelen hebben die evolueren met veranderende omstandigheden. De foute antwoorden zijn in tegenspraak met liberale kernprincipes: contracten zijn niet primair gericht op regulerende controle, gelijke verdeling of het elimineren van risico's, maar eerder op vrijwillig wederzijds voordeel en innovatie door individuele vrijheid.
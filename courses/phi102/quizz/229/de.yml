question: Was unterscheidet nach der liberalen Wirtschaftstheorie vertragliche Beziehungen grundlegend von zentraler Lenkung bei der Förderung von menschlichem Fortschritt und Innovation?
answer: Verträge ermöglichen es dem Einzelnen, aus etablierten Mustern auszubrechen und durch unterschiedliche Fähigkeiten und wechselnde Umstände neue Lösungen zu schaffen
wrong_answers:
  - Verträge bieten eine bessere Regulierungsaufsicht und Qualitätskontrollmechanismen, als sie zentralisierte Systeme bieten können
  - Verträge gewährleisten eine gleichmäßige Verteilung von Ressourcen und Chancen über alle sozialen Schichten und Wirtschaftssektoren hinweg
  - Verträge schaffen standardisierte Verfahren, die das Risiko und die Ungewissheit bei wirtschaftlichen Transaktionen beseitigen
explanation: |
  Der Text hebt hervor, dass die Vertragsfreiheit die menschliche Perfektionierung ermöglicht, weil die zentrale Steuerung nur bekannte Produktionsmuster reproduziert, während die Arbeitsfreiheit es den Menschen ermöglicht, sich jenseits etablierter Wege zu neuen Kreationen zu bewegen. Dies geschieht, weil die Menschen unterschiedliche Kräfte, Fähigkeiten und Ziele haben, die sich mit den sich ändernden Umständen weiterentwickeln. Die falschen Antworten widersprechen zentralen liberalen Grundsätzen: Verträge zielen nicht in erster Linie auf ordnungspolitische Kontrolle, Gleichverteilung oder Risikobeseitigung ab, sondern auf freiwilligen gegenseitigen Vorteil und Innovation durch individuelle Freiheit.
question: بر اساس نظریه اقتصادی لیبرال، چه چیزی روابط قراردادی را در ترویج پیشرفت و نوآوری انسانی به طور اساسی از هدایت متمرکز متمایز می‌کند؟
answer: قراردادها به افراد اجازه می‌دهند تا از الگوهای تثبیت‌شده رهایی یابند و با استفاده از استعدادهای متنوع و شرایط متغیر، راه‌حل‌های نوآورانه ایجاد کنند.
wrong_answers:
  - قراردادها نظارت نظارتی بهتر و مکانیزم‌های کنترل کیفیت بیشتری نسبت به سیستم‌های متمرکز ارائه می‌دهند.
  - قراردادها توزیع برابر منابع و فرصت‌ها را در تمامی طبقات اجتماعی و بخش‌های اقتصادی تضمین می‌کنند.
  - قراردادها رویه‌های استانداردی ایجاد می‌کنند که ریسک و عدم قطعیت را از معاملات اقتصادی حذف می‌کنند.
explanation: |
  متن تأکید می‌کند که آزادی قراردادی امکان کمال‌پذیری انسان را فراهم می‌کند زیرا هدایت متمرکز تنها الگوهای تولید شناخته‌شده را بازتولید می‌کند، در حالی که آزادی کار به مردم اجازه می‌دهد تا از مسیرهای تثبیت‌شده فراتر رفته و به سوی خلق‌های جدید حرکت کنند. این امر به این دلیل رخ می‌دهد که افراد دارای نیروها، استعدادها و اهداف متنوعی هستند که با تغییر شرایط تکامل می‌یابند. پاسخ‌های نادرست با اصول اصلی لیبرال در تضاد هستند: قراردادها عمدتاً به دنبال کنترل نظارتی، توزیع برابر یا حذف ریسک نیستند، بلکه به دنبال مزیت متقابل داوطلبانه و نوآوری از طریق آزادی فردی هستند.
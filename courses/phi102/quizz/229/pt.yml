question: De acordo com a teoria económica liberal, o que torna as relações contratuais fundamentalmente diferentes da direção centralizada na promoção do progresso humano e da inovação?
answer: Os contratos permitem que os indivíduos se libertem de padrões estabelecidos e criem soluções inovadoras através de aptidões diversas e de circunstâncias variáveis
wrong_answers:
  - Os contratos proporcionam uma melhor supervisão regulamentar e mecanismos de controlo de qualidade do que os sistemas centralizados podem oferecer
  - Os contratos asseguram uma distribuição equitativa dos recursos e das oportunidades entre todas as classes sociais e sectores económicos
  - Os contratos criam procedimentos normalizados que eliminam o risco e a incerteza das transacções económicas
explanation: |
  O texto enfatiza que a liberdade contratual permite a perfetibilidade humana porque a direção centralizada apenas reproduz padrões de produção conhecidos, enquanto a liberdade de trabalho permite que as pessoas ultrapassem os caminhos estabelecidos em direção a novas criações. Isto acontece porque os indivíduos têm forças, aptidões e objectivos diversos que evoluem com a mudança das circunstâncias. As respostas erradas contradizem os princípios liberais fundamentais: os contratos não têm como objetivo principal o controlo regulamentar, a distribuição equitativa ou a eliminação de riscos, mas sim a vantagem mútua voluntária e a inovação através da liberdade individual.
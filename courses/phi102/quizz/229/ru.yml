question: Согласно либеральной экономической теории, что делает договорные отношения принципиально отличными от централизованного руководства в деле содействия человеческому прогрессу и инновациям?
answer: Контракты позволяют людям освобождаться от устоявшихся шаблонов и создавать новые решения благодаря различным способностям и меняющимся обстоятельствам
wrong_answers:
  - Контракты обеспечивают более эффективные механизмы нормативного надзора и контроля качества, чем это могут предложить централизованные системы
  - Договоры обеспечивают равное распределение ресурсов и возможностей между всеми социальными классами и экономическими секторами
  - Контракты создают стандартизированные процедуры, которые устраняют риск и неопределенность в экономических сделках
explanation: |
  В тексте подчеркивается, что свобода договора позволяет человеку совершенствоваться, поскольку централизованное руководство лишь воспроизводит известные модели производства, в то время как свобода труда позволяет людям выходить за рамки установленных путей и создавать новые творения. Это происходит потому, что люди обладают различными силами, склонностями и целями, которые меняются в зависимости от обстоятельств. Неправильные ответы противоречат основным либеральным принципам: контракты в первую очередь направлены не на нормативный контроль, равное распределение или устранение рисков, а на добровольное взаимовыгодное сотрудничество и инновации благодаря индивидуальной свободе.
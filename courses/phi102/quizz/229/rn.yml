question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni igiki gituma imigenderanire y’amasezerano itandukanye cane n’uburongozi bushingiye ku rwego rwo hejuru mu guteza imbere iterambere ry’abantu n’ubuhinga bushasha?
answer: Amasezerano atuma abantu bava ku migenzo yashinzwe maze bagahingura inyishu nshasha biciye ku bushobozi butandukanye no ku bintu bihinduka .
wrong_answers:
  - Amasezerano atanga ubugenzuzi bwiza bw'amategeko n'uburyo bwo kugenzura uburyo kuruta uko uburyo bwo gukora bushobora gutanga .
  - Amasezerano atuma ubutunzi n'amahirwe bigabanywa ku rugero rungana mu nzego zose z'imibano no mu nzego z'ubutunzi .
  - Amasezerano arema uburyo bumwe bumwe bukuraho ingorane n'ukudakeka biva mu bikorwa vy'ubutunzi .
explanation: |
  Ico canditswe gishimika ku vy’uko umwidegemvyo w’amasezerano ushoboza umuntu kuba uwutunganye kubera ko uburongozi bushizwe hagati buvyara gusa uburyo buzwi bwo guhingura, mu gihe umwidegemvyo w’akazi utuma abantu barenga inzira zashinzwe baja ku biremwa bishasha. Ivyo bishika kubera ko abantu bafise inguvu zitandukanye, ubushobozi n’imigambi bitandukanye bihinduka uko ibintu bihinduka. Inyishu zitari zo zivuguruza ingingo ngenderwako nyamukuru z’ubwigenge: amasezerano ntagamije canecane kugenzura amategeko, gusangira ku rugero rungana, canke gukuraho ingorane, ahubwo ni ukugira inyungu ku bushake no gukora ibintu bishasha biciye mu mwidegemvyo w’umuntu ku giti ciwe.
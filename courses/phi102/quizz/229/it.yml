question: Secondo la teoria economica liberale, cosa rende le relazioni contrattuali fondamentalmente diverse dalla direzione centralizzata nel promuovere il progresso umano e l'innovazione?
answer: I contratti consentono agli individui di liberarsi da schemi consolidati e di creare soluzioni nuove grazie alle diverse attitudini e alle circostanze mutevoli
wrong_answers:
  - I contratti forniscono una supervisione normativa e meccanismi di controllo della qualità migliori di quelli offerti dai sistemi centralizzati
  - I contratti garantiscono un'equa distribuzione delle risorse e delle opportunità tra tutte le classi sociali e i settori economici
  - I contratti creano procedure standardizzate che eliminano il rischio e l'incertezza dalle transazioni economiche
explanation: |
  Il testo sottolinea che la libertà contrattuale consente la perfettibilità umana, perché la direzione centralizzata riproduce solo modelli di produzione noti, mentre la libertà di lavoro consente alle persone di andare oltre i percorsi stabiliti verso nuove creazioni. Questo avviene perché gli individui hanno forze, attitudini e obiettivi diversi che si evolvono con il mutare delle circostanze. Le risposte sbagliate contraddicono i principi liberali fondamentali: i contratti non mirano principalmente al controllo normativo, all'equa distribuzione o all'eliminazione del rischio, ma piuttosto al vantaggio reciproco volontario e all'innovazione attraverso la libertà individuale.
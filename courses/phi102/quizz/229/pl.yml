question: Zgodnie z liberalną teorią ekonomiczną, co sprawia, że relacje umowne zasadniczo różnią się od scentralizowanego zarządzania w promowaniu ludzkiego postępu i innowacji?
answer: Kontrakty pozwalają jednostkom wyrwać się z utartych schematów i tworzyć nowatorskie rozwiązania dzięki różnorodnym predyspozycjom i zmieniającym się okolicznościom
wrong_answers:
  - Umowy zapewniają lepszy nadzór regulacyjny i mechanizmy kontroli jakości niż scentralizowane systemy
  - Umowy zapewniają równą dystrybucję zasobów i możliwości we wszystkich klasach społecznych i sektorach gospodarki
  - Umowy tworzą znormalizowane procedury, które eliminują ryzyko i niepewność z transakcji gospodarczych
explanation: |
  Tekst podkreśla, że wolność kontraktowa umożliwia ludzką doskonałość, ponieważ scentralizowane kierownictwo odtwarza tylko znane wzorce produkcji, podczas gdy wolność pracy pozwala ludziom wyjść poza ustalone ścieżki w kierunku nowych kreacji. Dzieje się tak, ponieważ jednostki mają różne siły, zdolności i cele, które ewoluują wraz ze zmieniającymi się okolicznościami. Złe odpowiedzi są sprzeczne z podstawowymi liberalnymi zasadami: kontrakty nie mają na celu przede wszystkim kontroli regulacyjnej, równej dystrybucji lub eliminacji ryzyka, ale raczej dobrowolną wzajemną korzyść i innowację poprzez indywidualną wolność.
question: Что Бастиат называет естественным источником, из которого возникают права собственности?
answer: Право собственности естественным образом вытекает из человеческого труда, самообладания и индивидуальных способностей
wrong_answers:
  - Права собственности возникают в результате государственного распределения и признания государством прав собственности
  - Права собственности развиваются из коллективных соглашений и социальных контрактов в рамках сообществ
  - Права собственности возникают в результате исторического завоевания и последующего юридического подтверждения со стороны властей
explanation: |
  Согласно анализу Бастиа, представленному в тексте, права собственности имеют естественную основу, которая проистекает из трех взаимосвязанных элементов: человеческого труда, самообладания и индивидуальных способностей. Такое понимание опровергает утверждение Прудона о том, что "собственность - это кража", демонстрируя, что собственность органически возникает из человеческой природы и деятельности, а не из искусственных или принудительных систем. Бастиат утверждает, что эти элементы - способность к труду, владение собой и природные способности - являются универсальными чертами, присутствующими во всех обществах на протяжении всей истории человечества. Неправильные ответы представляют альтернативные теории происхождения собственности, которые Бастиат отверг бы: государственные теории предполагают, что права собственности создаются внешней властью, теории коллективного договора предполагают, что собственность создается социально, а теории завоевания соответствуют нарративу "первоначального распыления", который в тексте назван фактологически ошибочным.
question: Mitä Bastiat pitää luonnollisena lähteenä, josta omistusoikeus syntyy?
answer: Varallisuusoikeudet johtuvat luonnollisesti ihmisen työstä, itseomistuksesta ja yksilöllisistä kyvyistä
wrong_answers:
  - Omistusoikeudet syntyvät valtion myöntämän omistusoikeuden ja omistusoikeuden tunnustamisen kautta
  - Omistusoikeudet kehittyvät yhteisöjen kollektiivisten sopimusten ja sosiaalisten sopimusten pohjalta
  - Omistusoikeudet ovat peräisin historiallisesta valloituksesta ja sen jälkeisestä viranomaisten oikeudellisesta vahvistamisesta
explanation: |
  Tekstissä esitetyn Bastiat'n analyysin mukaan omistusoikeuksilla on luonnollinen perusta, joka juontaa juurensa kolmesta toisiinsa liittyvästä elementistä: inhimillisestä työstä, itseomistuksesta ja yksilöllisistä kyvyistä. Tämä käsitys kumoaa Proudhonin väitteen, jonka mukaan "omaisuus on varkautta", osoittamalla, että omaisuus syntyy orgaanisesti ihmisluonnosta ja -toiminnasta eikä keinotekoisista tai pakottavista järjestelmistä. Bastiat väittää, että nämä elementit - työkykymme, omistusoikeutemme ja luontaiset kykymme - ovat yleismaailmallisia piirteitä, jotka ovat esiintyneet kaikissa yhteiskunnissa kautta historian. Väärät vastaukset edustavat vaihtoehtoisia teorioita omaisuuden alkuperästä, jotka Bastiat hylkäisi: valtioon perustuvissa teorioissa oletetaan, että ulkoinen auktoriteetti luo omistusoikeudet, kollektiivisen sopimuksen teorioissa oletetaan, että omistusoikeus on sosiaalisesti rakentunut, ja valloitusta koskevat teoriat ovat linjassa "alkuperäisen riistämisen" kertomuksen kanssa, joka tekstissä tunnistetaan tosiasioihin perustuvaksi virheelliseksi.
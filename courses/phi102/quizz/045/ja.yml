question: バスティアは、所有権が生まれる自然の源泉として何を挙げているか？
answer: 財産権は、人間の労働力、自己所有権、個人の能力から自然に派生するものである。
wrong_answers:
  - 所有権は、政府による割り当てと所有権主張の国家承認から生まれる
  - 財産権は、共同体内の集団的合意や社会契約から発展する
  - 財産権は歴史的な征服と、その後の当局による法的検証に由来する
explanation: |
  本文で紹介されているバスティアの分析によれば、財産権は、人間の労働、自己所有権、個人の能力という、相互に結びついた3つの要素に由来する自然的基盤を持っている。この理解は、財産は人為的・強制的な制度からではなく、人間の本性と活動から有機的に生まれることを示すことで、「財産は窃盗である」というプルードンの主張に対抗するものである。バスティアは、これらの要素-労働能力、自分自身の所有権、自然的能力-は、歴史を通じてすべての社会に存在する普遍的な特徴であると主張している。誤答は、バスティアが否定するであろう財産の起源に関する代替理論を表している。政府に基づく理論は、外部の権威が財産権を創出すると仮定し、集団的合意理論は、財産が社会的に構築されることを示唆し、征服理論は、テキストが事実上欠陥があると指摘している「原初的剥奪」の物語と一致する。
question: O que é que Bastiat identifica como a fonte natural da qual emerge o direito de propriedade?
answer: Os direitos de propriedade derivam naturalmente do trabalho humano, da auto-propriedade e das faculdades individuais
wrong_answers:
  - Os direitos de propriedade emergem da atribuição governamental e do reconhecimento estatal dos direitos de propriedade
  - Os direitos de propriedade resultam de acordos colectivos e contratos sociais no seio das comunidades
  - Os direitos de propriedade têm origem na conquista histórica e na subsequente validação legal pelas autoridades
explanation: |
  De acordo com a análise de Bastiat apresentada no texto, os direitos de propriedade têm um fundamento natural que decorre de três elementos interligados: o trabalho humano, a propriedade de si próprio e as faculdades individuais. Este entendimento contraria a afirmação de Proudhon de que "a propriedade é um roubo", demonstrando que a propriedade emerge organicamente da natureza e da atividade humanas e não de sistemas artificiais ou coercivos. Bastiat defende que estes elementos - a nossa capacidade de trabalhar, a propriedade de nós próprios e as nossas capacidades naturais - são caraterísticas universais presentes em todas as sociedades ao longo da história. As respostas erradas representam teorias alternativas sobre a origem da propriedade que Bastiat rejeitaria: as teorias baseadas no governo pressupõem que uma autoridade externa cria direitos de propriedade, as teorias do acordo coletivo sugerem que a propriedade é socialmente construída e as teorias da conquista estão de acordo com a narrativa da "espoliação original" que o texto identifica como factualmente errada.
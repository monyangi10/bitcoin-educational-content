question: 바스티아트는 재산권이 생겨나는 자연스러운 원천을 무엇으로 파악하고 있나요?
answer: 재산권은 당연히 인간의 노동, 자기 소유권, 개인의 능력에서 비롯됩니다
wrong_answers:
  - 재산권은 정부의 할당과 소유권 주장에 대한 국가의 인정에서 비롯됩니다
  - 재산권은 공동체 내의 단체 협약과 사회 계약에서 발전합니다
  - 재산권은 역사적 정복과 그에 따른 당국의 법적 검증에서 비롯됩니다
explanation: |
  본문에 제시된 바스티앙의 분석에 따르면 재산권은 인간의 노동, 자기 소유권, 개인의 능력이라는 세 가지 상호 연결된 요소에서 비롯된 자연스러운 토대를 가지고 있습니다. 이러한 이해는 재산이 인위적이거나 강압적인 제도가 아니라 인간의 본성과 활동에서 유기적으로 생겨난다는 것을 보여줌으로써 '재산은 도둑질'이라는 프루동의 주장에 반박합니다. 바스티아는 이러한 요소들, 즉 일할 수 있는 능력, 우리 자신에 대한 소유권, 자연적 능력은 역사적으로 모든 사회에 존재하는 보편적인 특징이라고 주장합니다. 오답은 바스티아가 거부하는 재산 기원에 대한 대안적 이론을 나타냅니다. 정부 기반 이론은 외부 권위가 재산권을 창출한다고 가정하고, 단체 협약 이론은 재산이 사회적으로 구성된다고 주장하며, 정복 이론은 텍스트에서 사실적으로 결함이 있다고 밝힌 '원조 수탈' 서술에 부합하는 이론입니다.
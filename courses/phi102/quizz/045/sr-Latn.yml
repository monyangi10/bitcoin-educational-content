question: Koji prirodni izvor Bastiat identifikuje kao izvor iz kojeg proizlaze prava vlasništva?
answer: Svojinska prava prirodno proizlaze iz ljudskog rada, samovlasništva i individualnih sposobnosti.
wrong_answers:
  - Prava svojine proizlaze iz dodeljivanja od strane vlade i državnog priznavanja zahteva za vlasništvo
  - Prava svojine razvijaju se iz kolektivnih sporazuma i društvenih ugovora unutar zajednica
  - Prava svojine potiču iz istorijskog osvajanja i naknadne pravne validacije od strane vlasti
explanation: |
  Prema Bastiatovoj analizi predstavljenoj u tekstu, prava na imovinu imaju prirodnu osnovu koja proizlazi iz tri međusobno povezana elementa: ljudski rad, samoposedovanje i individualne sposobnosti. Ovo razumevanje suprotstavlja se Proudhonovoj tvrdnji da je 'imovina krađa' pokazujući da imovina organski proizlazi iz ljudske prirode i aktivnosti, a ne iz veštačkih ili prisilnih sistema. Bastiat tvrdi da su ovi elementi - naša sposobnost za rad, naše vlasništvo nad sobom i naše prirodne sposobnosti - univerzalne karakteristike prisutne u svim društvima kroz istoriju. Pogrešni odgovori predstavljaju alternativne teorije porekla imovine koje bi Bastiat odbacio: teorije zasnovane na vladi pretpostavljaju da spoljni autoritet stvara prava na imovinu, teorije kolektivnog dogovora sugerišu da je imovina društveno konstruisana, a teorije osvajanja se slažu sa narativom 'originalne pljačke' koji tekst identifikuje kao činjenično pogrešan.
question: Co Bastiat označuje za přirozený zdroj, z něhož vznikají vlastnická práva?
answer: Vlastnická práva přirozeně vyplývají z lidské práce, vlastnického práva a individuálních schopností
wrong_answers:
  - Vlastnická práva vznikají na základě vládního přidělení a státního uznání vlastnických nároků
  - Vlastnická práva vznikají na základě kolektivních dohod a společenských smluv v rámci komunit
  - Vlastnická práva mají původ v historickém dobývání a následném právním potvrzení ze strany úřadů
explanation: |
  Podle Bastiatovy analýzy uvedené v textu mají vlastnická práva přirozený základ, který vychází ze tří vzájemně propojených prvků: lidské práce, vlastnického práva a individuálních schopností. Toto chápání odporuje Proudhonovu tvrzení, že "vlastnictví je krádež", tím, že ukazuje, že vlastnictví vzniká organicky z lidské přirozenosti a činnosti, nikoli z umělých nebo donucovacích systémů. Bastiat tvrdí, že tyto prvky - naše schopnost pracovat, vlastnictví sebe sama a naše přirozené schopnosti - jsou univerzálními rysy přítomnými ve všech společnostech v průběhu dějin. Špatné odpovědi představují alternativní teorie vzniku vlastnictví, které by Bastiat odmítl: teorie založené na vládě předpokládají, že vlastnická práva vytváří vnější autorita, teorie kolektivní dohody naznačují, že vlastnictví je společensky konstruováno, a teorie dobývání se shodují s vyprávěním o "původním rozkrádání", které text označuje za fakticky chybné.
question: Co Bastiat identyfikuje jako naturalne źródło, z którego wyłaniają się prawa własności?
answer: Prawa własności naturalnie wywodzą się z ludzkiej pracy, samoposiadania i indywidualnych zdolności
wrong_answers:
  - Prawa własności wynikają z przydziału rządowego i uznania przez państwo roszczeń własnościowych
  - Prawa własności rozwijają się z porozumień zbiorowych i umów społecznych w społecznościach
  - Prawa własności wywodzą się z historycznego podboju i późniejszego prawnego zatwierdzenia przez władze
explanation: |
  Zgodnie z analizą Bastiata przedstawioną w tekście, prawa własności mają naturalną podstawę, która wynika z trzech powiązanych ze sobą elementów: ludzkiej pracy, samoposiadania i indywidualnych zdolności. Takie rozumienie przeciwstawia się twierdzeniu Proudhona, że "własność jest kradzieżą", pokazując, że własność wyłania się organicznie z ludzkiej natury i działalności, a nie ze sztucznych lub przymusowych systemów. Bastiat argumentuje, że te elementy - nasza zdolność do pracy, nasza własność i nasze naturalne zdolności - są uniwersalnymi cechami obecnymi we wszystkich społeczeństwach na przestrzeni dziejów. Błędne odpowiedzi reprezentują alternatywne teorie pochodzenia własności, które Bastiat by odrzucił: teorie oparte na rządzie zakładają, że władza zewnętrzna tworzy prawa własności, teorie umów zbiorowych sugerują, że własność jest konstruowana społecznie, a teorie podboju są zgodne z narracją "pierwotnego spolszczenia", którą tekst identyfikuje jako wadliwą pod względem faktycznym.
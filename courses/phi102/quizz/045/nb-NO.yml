question: Hva er ifølge Bastiat den naturlige kilden som eiendomsretten springer ut av?
answer: Eiendomsretten er en naturlig følge av menneskelig arbeid, selveierskap og individuelle evner
wrong_answers:
  - Eiendomsrettigheter oppstår gjennom statlig tildeling og statlig anerkjennelse av eierkrav
  - Eiendomsrettigheter utvikler seg fra kollektive avtaler og sosiale kontrakter i lokalsamfunn
  - Eiendomsrettigheter har sin opprinnelse i historisk erobring og påfølgende juridisk validering av myndighetene
explanation: |
  Ifølge Bastiats analyse, som presenteres i teksten, har eiendomsretten et naturlig grunnlag som springer ut av tre sammenhengende elementer: menneskelig arbeid, selveierskap og individuelle evner. Denne forståelsen imøtegår Proudhons påstand om at "eiendom er tyveri" ved å vise at eiendom oppstår organisk fra menneskets natur og aktivitet, snarere enn fra kunstige eller tvangsmessige systemer. Bastiat argumenterer for at disse elementene - vår evne til å arbeide, vårt eierskap til oss selv og våre naturlige evner - er universelle trekk som er til stede i alle samfunn gjennom historien. De gale svarene representerer alternative teorier om eiendomsrettens opprinnelse som Bastiat ville avvist: Statsbaserte teorier går ut på at eiendomsretten skapes av en ekstern autoritet, teorier om kollektive avtaler antyder at eiendomsretten er sosialt konstruert, og erobringsteorier er i tråd med fortellingen om "den opprinnelige plyndringen", som teksten identifiserer som faktafeil.
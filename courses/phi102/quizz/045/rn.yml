question: Ni igiki Bastiat yerekana ko ari co gituma uburenganzira bw’itunga buva?
answer: Uburenganzira bw’umutungo buva ku bikorwa vy’umuntu, ku kwitunga, no ku bushobozi bw’umuntu ku giti ciwe .
wrong_answers:
  - Uburenganzira bw'umutungo buva mu gutanga Leta no kwemera na Leta ivyifuzo vy'umutungo
  - Uburenganzira bw'itunga buva ku masezerano rusangi n'amasezerano y'imibano mu mibano .
  - Uburenganzira bw'umutungo buva ku kwigarurira amateka no kwemezwa n'abategetsi .
explanation: |
  Dushingiye ku nseguro ya Bastiat yashikirijwe muri ico canditswe, uburenganzira bw’itunga burafise umushinge w’akameremere ukomoka ku bintu bitatu bifitaniye isano: igikorwa c’umuntu, ukwigira, n’ubushobozi bw’umuntu ku giti ciwe. Ukwo gutahura kurarwanya ivyo Proudhon avuga ko ‘itunga ari ubusuma’ mu kwerekana ko itunga riva mu kamere k’umuntu n’ibikorwa vyiwe aho kuva mu mice y’ubuhinga canke y’uguhatira. Bastiat avuga ko ivyo bintu - ubushobozi bwacu bwo gukora, ubutunzi bwacu, n’ubushobozi bwacu busanzwe - ari ibintu vy’isi yose biriho mu mibano yose kuva kera na rindi. Inyishu zitari zo zigereranya inyigisho zindi z’inkomoko y’umutungo Bastiat yokwanka: inyigisho zishingiye kuri Leta zifata ko ubukuru bwo hanze burema uburenganzira bw’umutungo, inyigisho z’amasezerano rusangi zivuga ko umutungo wubatswe mu kibano, kandi inyigisho z’ukwigarurira zihuye n’inkuru y’intango y’ugusenya umutungo nk’uko igisomwa kivuga.
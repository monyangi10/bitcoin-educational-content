question: باستیا به چه منبع طبیعی اشاره می‌کند که حقوق مالکیت از آن سرچشمه می‌گیرد؟
answer: حقوق مالکیت به طور طبیعی از کار انسانی، مالکیت بر خود، و توانایی‌های فردی ناشی می‌شوند.
wrong_answers:
  - حقوق مالکیت از تخصیص دولت و شناسایی ادعاهای مالکیت توسط دولت پدیدار می‌شوند.
  - حقوق مالکیت از توافقات جمعی و قراردادهای اجتماعی درون جوامع توسعه می‌یابند.
  - حقوق مالکیت از فتح تاریخی و تأیید قانونی بعدی توسط مقامات نشأت می‌گیرد.
explanation: |
  بر اساس تحلیل باستیا که در متن ارائه شده است، حقوق مالکیت دارای بنیادی طبیعی است که از سه عنصر به هم پیوسته تشکیل شده است: کار انسانی، مالکیت بر خود و توانایی‌های فردی. این درک، ادعای پرودون که «مالکیت دزدی است» را با نشان دادن اینکه مالکیت به طور طبیعی از طبیعت و فعالیت انسانی ناشی می‌شود و نه از سیستم‌های مصنوعی یا اجباری، به چالش می‌کشد. باستیا استدلال می‌کند که این عناصر - توانایی ما برای کار، مالکیت ما بر خودمان و توانایی‌های طبیعی ما - ویژگی‌های جهانی هستند که در تمام جوامع در طول تاریخ وجود داشته‌اند. پاسخ‌های نادرست نمایانگر نظریه‌های جایگزین منشأ مالکیت هستند که باستیا آن‌ها را رد می‌کند: نظریه‌های مبتنی بر دولت فرض می‌کنند که یک مرجع خارجی حقوق مالکیت را ایجاد می‌کند، نظریه‌های توافق جمعی پیشنهاد می‌دهند که مالکیت به صورت اجتماعی ساخته شده است، و نظریه‌های فتح با روایت «غارت اولیه» همسو هستند که متن آن را به عنوان نادرست از نظر واقعی شناسایی می‌کند.
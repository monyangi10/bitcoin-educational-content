question: Bastiat 認為財產權產生的自然來源是什麼？
answer: 財產權自然源自於人類的勞動、自我所有權和個人能力
wrong_answers:
  - 財產權來自於政府的分配和國家對所有權要求的承認
  - 財產權源自於社群內的集體協議和社會契約
  - 財產權源自於歷史上的征服，以及後來由主管機關的法律確認。
explanation: |
  根據 Bastiat 在文中提出的分析，財產權有其自然的基礎，它源自於三個相互關聯的元素：人類勞動、自我所有權和個人能力。這種理解反駁了蒲魯東「財產即盜竊」的主張，證明了財產是有機地從人類的天性和活動中產生，而不是從人為或強制性的制度中產生。巴斯蒂亞認為，這些要素--我們的工作能力、我們對自己的所有權以及我們的自然能力--是歷史上所有社會都存在的普遍特徵。錯誤的答案代表巴斯蒂亞會拒絕的其他財產起源理論：以政府為基礎的理論假設外部權威創造了財產權，集體協議理論認為財產是由社會建構的，而征服理論則符合「原始剝削」的說法，文中指出這種說法在事實上是有缺陷的。
question: Mida nimetab Bastiat loomulikuks allikaks, millest tekivad omandiõigused?
answer: Omandiõigus tuleneb loomulikult inimtööst, eneseomandist ja individuaalsetest võimetest
wrong_answers:
  - Omandiõigused tekivad valitsuse eraldamisest ja omandiõiguste riiklikust tunnustamisest
  - Omandiõigused kujunevad välja kollektiivsetest kokkulepetest ja ühiskondlikest lepingutest kogukondades
  - Omandiõigused tulenevad ajaloolisest vallutusest ja sellele järgnevast juriidilisest kinnitamisest ametiasutuste poolt
explanation: |
  Bastiat' tekstis esitatud analüüsi kohaselt on omandiõigusel loomulik alus, mis tuleneb kolmest omavahel seotud elemendist: inimtöö, eneseomand ja individuaalsed võimed. See arusaam astub vastu Proudhoni väitele, et "omand on vargus", näidates, et omand tuleneb orgaaniliselt inimloomusest ja -tegevusest, mitte aga kunstlikest või sunniviisilistest süsteemidest. Bastiat väidab, et need elemendid - meie töövõime, meie omandiõigus ja meie looduslikud võimed - on universaalsed tunnused, mis on olemas kõikides ühiskondades läbi ajaloo. Valed vastused esindavad alternatiivseid teooriaid omandi päritolu kohta, mille Bastiat lükkaks tagasi: valitsusel põhinevad teooriad eeldavad, et väline võim loob omandiõigused, kollektiivse kokkuleppe teooriad viitavad sellele, et omand on sotsiaalselt konstrueeritud, ja vallutusteooriad ühilduvad "algse raiskamise" narratiiviga, mida tekstis nimetatakse faktiliselt vigaseks.
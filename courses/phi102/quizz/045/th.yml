question: Bastiat ระบุว่าแหล่งที่มาธรรมชาติที่สิทธิในทรัพย์สินเกิดขึ้นคืออะไร?
answer: สิทธิในทรัพย์สินเกิดขึ้นตามธรรมชาติจากแรงงานของมนุษย์ การเป็นเจ้าของตนเอง และความสามารถเฉพาะบุคคล
wrong_answers:
  - สิทธิในทรัพย์สินเกิดขึ้นจากการจัดสรรของรัฐบาลและการรับรองการถือครองกรรมสิทธิ์โดยรัฐ
  - สิทธิในทรัพย์สินพัฒนามาจากข้อตกลงร่วมกันและสัญญาทางสังคมภายในชุมชน
  - สิทธิในทรัพย์สินมีต้นกำเนิดจากการพิชิตทางประวัติศาสตร์และการรับรองทางกฎหมายโดยเจ้าหน้าที่
explanation: |
  ตามการวิเคราะห์ของบาสเตียที่นำเสนอในข้อความ สิทธิในทรัพย์สินมีรากฐานตามธรรมชาติที่มาจากสามองค์ประกอบที่เชื่อมโยงกัน: แรงงานมนุษย์ การเป็นเจ้าของตนเอง และความสามารถส่วนบุคคล ความเข้าใจนี้ขัดแย้งกับคำกล่าวของพราวดองที่ว่า 'ทรัพย์สินคือการขโมย' โดยแสดงให้เห็นว่าทรัพย์สินเกิดขึ้นตามธรรมชาติจากธรรมชาติและกิจกรรมของมนุษย์ ไม่ใช่จากระบบที่ประดิษฐ์ขึ้นหรือบังคับ บาสเตียโต้แย้งว่าองค์ประกอบเหล่านี้ - ความสามารถในการทำงาน การเป็นเจ้าของตนเอง และความสามารถตามธรรมชาติของเรา - เป็นลักษณะสากลที่มีอยู่ในทุกสังคมตลอดประวัติศาสตร์ คำตอบที่ผิดแสดงถึงทฤษฎีทางเลือกของต้นกำเนิดทรัพย์สินที่บาสเตียจะปฏิเสธ: ทฤษฎีที่อิงกับรัฐบาลถือว่าอำนาจภายนอกสร้างสิทธิในทรัพย์สิน ทฤษฎีข้อตกลงร่วมกันเสนอว่าทรัพย์สินถูกสร้างขึ้นทางสังคม และทฤษฎีการพิชิตสอดคล้องกับเรื่องเล่าของ 'การปล้นสะดมดั้งเดิม' ที่ข้อความระบุว่าเป็นข้อบกพร่องทางข้อเท็จจริง
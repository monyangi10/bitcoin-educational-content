question: Какво определя Бастиа като естествен източник, от който възникват правата на собственост?
answer: Правата на собственост естествено произтичат от човешкия труд, собствеността и индивидуалните способности
wrong_answers:
  - Правата на собственост възникват в резултат на правителствено разпределение и държавно признаване на претенциите за собственост
  - Правата на собственост се развиват от колективни споразумения и социални договори в рамките на общностите
  - Правата на собственост произтичат от историческото завладяване и последващото им юридическо утвърждаване от властите
explanation: |
  Според анализа на Бастиа, представен в текста, правата на собственост имат естествена основа, която произтича от три взаимосвързани елемента: човешкия труд, собствеността и индивидуалните способности. Това разбиране се противопоставя на твърдението на Прудон, че "собствеността е кражба", като показва, че собствеността възниква органично от човешката природа и дейност, а не от изкуствени или принудителни системи. Бастиа твърди, че тези елементи - способността ни да работим, собствеността ни върху самите нас и естествените ни способности - са универсални характеристики, присъстващи във всички общества в историята. Неправилните отговори представляват алтернативни теории за произхода на собствеността, които Бастиа би отхвърлил: теориите, основани на правителството, предполагат, че външна власт създава правата на собственост, теориите за колективното споразумение предполагат, че собствеността е социално конструирана, а теориите за завладяването са в съответствие с разказа за "първоначалното разхищение", който текстът определя като фактически погрешен.
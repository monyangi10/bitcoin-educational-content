question: ¿Qué identifica Bastiat como la fuente natural de la que surgen los derechos de propiedad?
answer: Los derechos de propiedad derivan naturalmente del trabajo humano, de la propiedad de uno mismo y de las facultades individuales
wrong_answers:
  - Los derechos de propiedad surgen de la asignación gubernamental y el reconocimiento estatal de las reclamaciones de propiedad
  - Los derechos de propiedad se desarrollan a partir de acuerdos colectivos y contratos sociales dentro de las comunidades
  - Los derechos de propiedad tienen su origen en la conquista histórica y la posterior validación legal por parte de las autoridades
explanation: |
  Según el análisis de Bastiat presentado en el texto, los derechos de propiedad tienen un fundamento natural que se deriva de tres elementos interconectados: el trabajo humano, la autopropiedad y las facultades individuales. Esta concepción contrarresta la afirmación de Proudhon de que "la propiedad es un robo" al demostrar que la propiedad surge orgánicamente de la naturaleza y la actividad humanas y no de sistemas artificiales o coercitivos. Bastiat sostiene que estos elementos -nuestra capacidad de trabajo, la propiedad de nosotros mismos y nuestras habilidades naturales- son características universales presentes en todas las sociedades a lo largo de la historia. Las respuestas incorrectas representan teorías alternativas sobre el origen de la propiedad que Bastiat rechazaría: las teorías basadas en el gobierno suponen que una autoridad externa crea los derechos de propiedad, las teorías del acuerdo colectivo sugieren que la propiedad se construye socialmente y las teorías de la conquista se alinean con la narrativa del "expolio original" que el texto identifica como objetivamente errónea.
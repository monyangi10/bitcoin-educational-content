question: Wat beschouwt Bastiat als de natuurlijke bron waaruit eigendomsrechten voortkomen?
answer: Eigendomsrechten vloeien van nature voort uit menselijke arbeid, zelfeigenaarschap en individuele vermogens
wrong_answers:
  - Eigendomsrechten komen voort uit toewijzing door de overheid en erkenning door de staat van eigendomsaanspraken
  - Eigendomsrechten ontwikkelen zich uit collectieve overeenkomsten en sociale contracten binnen gemeenschappen
  - Eigendomsrechten komen voort uit historische verovering en daaropvolgende wettelijke validatie door autoriteiten
explanation: |
  Volgens Bastiat's analyse in de tekst hebben eigendomsrechten een natuurlijke basis die voortkomt uit drie onderling verbonden elementen: menselijke arbeid, zelfeigenaarschap en individuele vermogens. Dit begrip weerlegt Proudhons bewering dat 'eigendom diefstal is' door aan te tonen dat eigendom organisch voortkomt uit de menselijke natuur en activiteit in plaats van uit kunstmatige of dwingende systemen. Bastiat stelt dat deze elementen - ons vermogen om te werken, ons eigendom van onszelf en onze natuurlijke vermogens - universele kenmerken zijn die aanwezig zijn in alle samenlevingen door de geschiedenis heen. De foute antwoorden staan voor alternatieve theorieën over de oorsprong van eigendom die Bastiat zou afwijzen: theorieën gebaseerd op de overheid gaan ervan uit dat een externe autoriteit eigendomsrechten creëert, theorieën gebaseerd op collectieve overeenkomsten suggereren dat eigendom sociaal geconstrueerd is en veroveringstheorieën sluiten aan bij het 'oorspronkelijke verwoesting'-verhaal dat in de tekst als feitelijk onjuist wordt aangemerkt.
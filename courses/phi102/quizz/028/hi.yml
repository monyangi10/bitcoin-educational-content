question: According to the non-aggression principle, what serves as the natural mechanism by which violations of our physical integrity are perceived?
answer: Pain transmitted through the nervous system
wrong_answers:
  - Fear and psychological constraints on action
  - Economic competition from other individuals
  - Social pressure from community members
explanation: |
  Pain transmitted through the nervous system is the correct answer because the chapter explains that pain constitutes the mechanism by which attacks on our freedom and bodily property manifest to our consciousness. Without this phenomenon transmitted by the nervous system, it would be impossible to perceive violations of our physical integrity. This physiological reality establishes a natural limit to everyone's freedom. While fear is mentioned as a secondary factor that creates psychological constraints, and economic competition is discussed as a type of nuisance, neither serves as the primary biological mechanism for detecting physical violations. Social pressure is not mentioned in this context at all.
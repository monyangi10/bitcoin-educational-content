question: 根據不侵犯原則，什麼才是感知侵犯我們身體完整性的自然機制？
answer: 透過神經系統傳導的疼痛
wrong_answers:
  - 恐懼與行動的心理限制
  - 來自其他個人的經濟競爭
  - 來自社區成員的社會壓力
explanation: |
  透過神經系統傳播的痛楚是正確的答案，因為本章說明痛楚構成了我們的自由和身體財產受到攻擊，並顯示在我們意識中的機制。如果沒有神經系統傳遞的這種現象，我們就不可能感知到對我們身體完整性的侵犯。這個生理現實為每個人的自由建立了自然的限制。雖然恐懼被視為造成心理限制的次要因素，經濟競爭也被視為一種滋擾，但兩者都不是偵測身體侵犯的主要生理機制。社會壓力在這方面完全沒有被提及。
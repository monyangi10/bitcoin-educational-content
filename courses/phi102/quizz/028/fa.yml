question: بر اساس اصل عدم تجاوز، چه چیزی به عنوان مکانیزم طبیعی عمل می‌کند که از طریق آن نقض‌های یکپارچگی فیزیکی ما درک می‌شود؟
answer: درد منتقل شده از طریق سیستم عصبی
wrong_answers:
  - ترس و محدودیت‌های روانی بر عمل
  - رقابت اقتصادی از سوی افراد دیگر
  - فشار اجتماعی از سوی اعضای جامعه
explanation: |
  درد منتقل شده از طریق سیستم عصبی پاسخ صحیح است زیرا فصل توضیح می‌دهد که درد مکانیزمی است که از طریق آن حملات به آزادی و مالکیت بدنی ما به آگاهی ما منتقل می‌شود. بدون این پدیده که توسط سیستم عصبی منتقل می‌شود، درک نقض‌های یکپارچگی فیزیکی ما غیرممکن خواهد بود. این واقعیت فیزیولوژیکی یک حد طبیعی برای آزادی همه افراد تعیین می‌کند. در حالی که ترس به عنوان یک عامل ثانویه که محدودیت‌های روانی ایجاد می‌کند ذکر شده و رقابت اقتصادی به عنوان نوعی مزاحمت بحث شده است، هیچ‌کدام به عنوان مکانیزم بیولوژیکی اصلی برای تشخیص نقض‌های فیزیکی عمل نمی‌کنند. فشار اجتماعی در این زمینه اصلاً ذکر نشده است.
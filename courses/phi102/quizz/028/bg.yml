question: Според принципа за ненападение, какво служи като естествен механизъм, чрез който се възприемат нарушенията на физическата ни цялост?
answer: Болка, предавана чрез нервната система
wrong_answers:
  - Страх и психологически ограничения за действие
  - Икономическа конкуренция от страна на други лица
  - Социален натиск от страна на членовете на общността
explanation: |
  Болката, която се предава чрез нервната система, е правилният отговор, защото в главата се обяснява, че болката представлява механизмът, чрез който посегателствата върху нашата свобода и телесна собственост се проявяват в нашето съзнание. Без този феномен, предаван от нервната система, би било невъзможно да възприемаме нарушенията на телесната ни цялост. Тази физиологична реалност установява естествена граница на свободата на всеки човек. Макар че страхът се споменава като вторичен фактор, който създава психологически ограничения, а икономическата конкуренция се обсъжда като вид неудобство, нито едно от двете не служи като основен биологичен механизъм за откриване на физическите нарушения. Социалният натиск изобщо не се споменава в този контекст.
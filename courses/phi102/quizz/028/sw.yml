question: Kulingana na kanuni ya kutofanya uchokozi, ni nini kinachotumika kama utaratibu wa asili ambao ukiukaji wa uadilifu wetu wa kimwili huonekana?
answer: Maumivu yanayopitishwa kupitia mfumo wa neva
wrong_answers:
  - Hofu na vikwazo vya kisaikolojia katika vitendo
  - Ushindani wa kiuchumi kutoka kwa watu wengine
  - Shinikizo la kijamii kutoka kwa wanajamii
explanation: |
  Maumivu yanayopitishwa kupitia mfumo wa neva ni jibu sahihi kwa sababu sura inaelezea kwamba maumivu huunda utaratibu ambao mashambulizi dhidi ya uhuru wetu na mali ya mwili yanaonekana kwa fahamu zetu. Bila jambo hili linalopitishwa na mfumo wa neva, isingewezekana kutambua ukiukwaji wa uadilifu wetu wa kimwili. Ukweli huu wa kisaikolojia huweka kikomo cha asili kwa uhuru wa kila mtu. Ingawa hofu inatajwa kama jambo la pili linalounda vikwazo vya kisaikolojia, na ushindani wa kiuchumi unajadiliwa kama aina ya usumbufu, hakuna kinachotumika kama utaratibu mkuu wa kibiolojia wa kugundua ukiukwaji wa kimwili. Shinikizo la kijamii halijatajwa katika muktadha huu hata kidogo.
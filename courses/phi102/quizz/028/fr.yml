question: Selon le principe de non-agression, quel est le mécanisme naturel par lequel les atteintes à notre intégrité physique sont perçues ?
answer: Douleur transmise par le système nerveux
wrong_answers:
  - Peur et contraintes psychologiques à l'action
  - Concurrence économique d'autres individus
  - Pression sociale exercée par les membres de la communauté
explanation: |
  La douleur transmise par le système nerveux est la bonne réponse car le chapitre explique que la douleur constitue le mécanisme par lequel les atteintes à notre liberté et à nos biens corporels se manifestent à notre conscience. Sans ce phénomène transmis par le système nerveux, il serait impossible de percevoir les atteintes à notre intégrité physique. Cette réalité physiologique établit une limite naturelle à la liberté de chacun. Si la peur est mentionnée comme un facteur secondaire qui crée des contraintes psychologiques, et si la concurrence économique est évoquée comme un type de nuisance, ni l'une ni l'autre ne sert de mécanisme biologique primaire pour la détection des violations physiques. La pression sociale n'est pas du tout mentionnée dans ce contexte.
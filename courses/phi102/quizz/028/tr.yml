question: Saldırmazlık ilkesine göre, fiziksel bütünlüğümüze yönelik ihlallerin algılandığı doğal mekanizma nedir?
answer: Sinir sistemi yoluyla iletilen ağrı
wrong_answers:
  - Korku ve eylem üzerindeki psikolojik kısıtlamalar
  - Diğer bireylerden gelen ekonomik rekabet
  - Topluluk üyelerinden gelen sosyal baskı
explanation: |
  Sinir sistemi aracılığıyla iletilen ağrı doğru cevaptır çünkü bu bölümde ağrının, özgürlüğümüze ve bedensel mülkiyetimize yönelik saldırıların bilincimize yansıdığı mekanizmayı oluşturduğu açıklanmaktadır. Sinir sistemi tarafından iletilen bu olgu olmasaydı, fiziksel bütünlüğümüze yönelik ihlalleri algılamamız imkansız olurdu. Bu fizyolojik gerçeklik herkesin özgürlüğüne doğal bir sınır koymaktadır. Korkudan psikolojik kısıtlamalar yaratan ikincil bir faktör olarak bahsedilirken ve ekonomik rekabet bir tür sıkıntı olarak tartışılırken, her ikisi de fiziksel ihlalleri tespit etmek için birincil biyolojik mekanizma olarak hizmet etmez. Bu bağlamda sosyal baskıdan hiç bahsedilmemektedir.
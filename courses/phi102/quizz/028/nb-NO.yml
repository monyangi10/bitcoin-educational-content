question: Hva er den naturlige mekanismen for hvordan krenkelser av vår fysiske integritet oppfattes, ifølge ikke-aggresjonsprinsippet?
answer: Smerte overføres gjennom nervesystemet
wrong_answers:
  - Frykt og psykologiske begrensninger på handling
  - Økonomisk konkurranse fra andre individer
  - Sosialt press fra medlemmer av lokalsamfunnet
explanation: |
  Smerte overført gjennom nervesystemet er det riktige svaret fordi kapitlet forklarer at smerte er den mekanismen som gjør at angrep på vår frihet og kroppslige eiendom manifesterer seg for vår bevissthet. Uten dette fenomenet som overføres via nervesystemet, ville det være umulig å oppfatte krenkelser av vår fysiske integritet. Denne fysiologiske realiteten setter en naturlig grense for alles frihet. Frykt nevnes som en sekundær faktor som skaper psykologiske begrensninger, og økonomisk konkurranse omtales som en type plage, men ingen av dem fungerer som den primære biologiske mekanismen for å oppdage fysiske krenkelser. Sosialt press nevnes ikke i det hele tatt i denne sammenhengen.
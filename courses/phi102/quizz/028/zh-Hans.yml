question: 根据 "不侵犯原则"，什么是感知侵犯我们身体完整性的自然机制？
answer: 通过神经系统传递疼痛
wrong_answers:
  - 恐惧和心理对行动的制约
  - 来自其他个人的经济竞争
  - 来自社区成员的社会压力
explanation: |
  通过神经系统传递的疼痛是正确答案，因为本章解释说，疼痛是我们的自由和身体财产受到攻击时在意识中表现出来的机制。如果没有这种由神经系统传递的现象，我们就不可能感知到对我们身体完整性的侵犯。这一生理现实为每个人的自由设定了自然限制。虽然恐惧被认为是造成心理限制的次要因素，经济竞争被认为是一种干扰，但两者都不是发现身体受到侵犯的主要生物机制。在这种情况下，根本没有提到社会压力。
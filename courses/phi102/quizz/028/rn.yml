question: Dushingiye ku ngingo ngenderwako y’ukutagira ubukazi, ni igiki gikora nk’uburyo busanzwe abantu babona ko hariho ukurenga ku butungane bwacu bwo ku mubiri?
answer: Ububabare buca mu nzira y'imitsi
wrong_answers:
  - Ubwoba n'intambamyi zo mu mutwe ku bikorwa
  - Uguhiganwa mu vy'ubutunzi n'abandi bantu
  - Igitutu c'abanyagihugu
explanation: |
  Ububabare buca mu nzira y’imitsi ni inyishu ibereye kuko ico kigabane gisigura ko ububabare ari bwo buryo ibitero ku mwidegemvyo wacu no ku mutungo w’umubiri wacu bigaragazwa mu mutima wacu. Iyo hataba ico kintu gica mu nzira y’imitsi, ntivyoshoboka ko umuntu abona ko hariho ukurenga ku butungane bwacu bwo ku mubiri. Ukwo kuri kw’umubiri gushinga umupaka kamere w’umwidegemvyo w’umuntu wese. Naho ubwoba buvugwa nk’ikintu ca kabiri kirema ingorane zo mu mutwe, kandi uguhiganwa mu vy’ubutunzi kukavugwa nk’ubwoko bw’ibintu bitera umubabaro, nta na kimwe muri vyo gikora nk’uburyo nyamukuru bw’ibinyabuzima bwo kumenya ukurenga ku mubiri. Igitutu co mu kibano ntikivugwa muri iki kiganiro na gato.
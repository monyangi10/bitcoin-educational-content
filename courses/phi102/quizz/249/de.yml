question: Welches Grundprinzip sollte nach der liberalen Theorie die Einwanderungspolitik bestimmen, um mit den liberalen Grundwerten übereinzustimmen?
answer: Einwanderung sollte erlaubt sein, wenn sie auf freiwilligem Austausch, rechtmäßigem Eigentumserwerb und gleichen Verträgen beruht
wrong_answers:
  - Die Einwanderung sollte begrenzt werden, um inländische Arbeitnehmer vor unlauterem Lohnwettbewerb zu schützen und die nationale Identität zu bewahren
  - Die Einwanderung sollte durch demokratische Mehrheitsentscheidungen geregelt werden, um den sozialen Zusammenhalt und die kulturelle Kompatibilität zu gewährleisten
  - Die Einwanderung sollte durch staatliche Quoten auf der Grundlage wirtschaftlicher Bedürfnisse und nationaler Sicherheitserwägungen gesteuert werden
explanation: |
  Die liberale Theorie, wie sie von Gustave de Molinari vertreten wurde, befürwortet die Einwanderungsfreiheit, wenn sie auf freiwilligem Austausch und legitimen Eigentumsrechten beruht. Die Liberalen betrachteten Einwanderungsbeschränkungen als eine Form des Arbeitnehmerprotektionismus, ähnlich dem Industrieprotektionismus. Die anderen Optionen widersprechen den liberalen Grundsätzen, indem sie entweder kollektive Beschränkungen der individuellen Freiheit auferlegen, die Mehrheitsregel über die individuelle Zustimmung stellen oder die staatliche Kontrolle über die freiwillige Bewegung und Vereinigung von Menschen ausweiten.
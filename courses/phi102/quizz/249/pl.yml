question: Zgodnie z teorią liberalną, jaka podstawowa zasada powinna rządzić polityką imigracyjną, aby była zgodna z podstawowymi wartościami liberalnymi?
answer: Imigracja powinna być dozwolona, gdy opiera się na dobrowolnej wymianie, legalnym nabywaniu własności i równych umowach
wrong_answers:
  - Imigracja powinna być ograniczona, aby chronić pracowników domowych przed nieuczciwą konkurencją płacową i zachować tożsamość narodową
  - Imigracja powinna być regulowana demokratyczną większością głosów, aby zapewnić spójność społeczną i kompatybilność kulturową
  - Imigracja powinna być zarządzana poprzez kwoty państwowe oparte na potrzebach gospodarczych i względach bezpieczeństwa narodowego
explanation: |
  Teoria liberalna, której przykładem jest Gustave de Molinari, wspiera swobodę imigracji, gdy opiera się ona na dobrowolnej wymianie i uzasadnionych prawach własności. Liberałowie postrzegali ograniczenia imigracyjne jako formę protekcjonizmu pracowniczego, podobną do protekcjonizmu przemysłowego. Pozostałe opcje są sprzeczne z liberalnymi zasadami, ponieważ nakładają zbiorowe ograniczenia na indywidualną wolność, przedkładają rządy większości nad indywidualną zgodę lub rozszerzają kontrolę państwa nad dobrowolnymi ruchami i stowarzyszeniami ludzi.
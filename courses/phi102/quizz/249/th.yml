question: ตามทฤษฎีเสรีนิยม หลักการพื้นฐานใดที่ควรควบคุมนโยบายการย้ายถิ่นฐานเพื่อให้สอดคล้องกับค่านิยมหลักของเสรีนิยม?
answer: การย้ายถิ่นฐานควรได้รับอนุญาตเมื่ออยู่บนพื้นฐานของการแลกเปลี่ยนโดยสมัครใจ การได้มาซึ่งทรัพย์สินที่ถูกต้องตามกฎหมาย และสัญญาที่เท่าเทียมกัน
wrong_answers:
  - การอพยพย้ายถิ่นฐานควรถูกจำกัดเพื่อปกป้องแรงงานในประเทศจากการแข่งขันค่าจ้างที่ไม่เป็นธรรมและรักษาเอกลักษณ์ของชาติ
  - การอพยพย้ายถิ่นฐานควรถูกควบคุมโดยการลงคะแนนเสียงข้างมากในระบอบประชาธิปไตยเพื่อให้แน่ใจถึงความสามัคคีทางสังคมและความเข้ากันได้ทางวัฒนธรรม
  - การจัดการการอพยพย้ายถิ่นควรดำเนินการผ่านโควต้าของรัฐโดยพิจารณาจากความต้องการทางเศรษฐกิจและข้อพิจารณาด้านความมั่นคงของชาติ
explanation: |
  ทฤษฎีเสรีนิยม ตามที่แสดงโดยกุสตาฟ เดอ โมลินารี สนับสนุนเสรีภาพในการย้ายถิ่นฐานเมื่อมีพื้นฐานจากการแลกเปลี่ยนโดยสมัครใจและสิทธิในทรัพย์สินที่ชอบธรรม เสรีนิยมมองว่าการจำกัดการย้ายถิ่นฐานเป็นรูปแบบหนึ่งของการปกป้องแรงงาน คล้ายกับการปกป้องอุตสาหกรรม ตัวเลือกอื่น ๆ ขัดแย้งกับหลักการเสรีนิยมโดยการกำหนดข้อจำกัดร่วมกันต่อเสรีภาพส่วนบุคคล ให้ความสำคัญกับการปกครองโดยเสียงข้างมากเหนือการยินยอมของบุคคล หรือขยายการควบคุมของรัฐเหนือการเคลื่อนไหวและการรวมกลุ่มของมนุษย์โดยสมัครใจ
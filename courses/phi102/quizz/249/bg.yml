question: Според либералната теория кой основен принцип трябва да ръководи имиграционната политика, за да съответства на основните либерални ценности?
answer: Имиграцията трябва да бъде разрешена, когато се основава на доброволен обмен, законно придобиване на собственост и равноправни договори
wrong_answers:
  - Имиграцията трябва да бъде ограничена, за да се защитят домашните работници от нелоялна конкуренция по отношение на заплащането и да се запази националната идентичност
  - Имиграцията трябва да се регулира с демократично мнозинство, за да се гарантира социално сближаване и културна съвместимост
  - Имиграцията трябва да се управлява чрез държавни квоти, основани на икономическите нужди и съображенията за национална сигурност
explanation: |
  Либералната теория, чийто пример е Густав дьо Молинари, подкрепя свободата на имиграцията, когато тя се основава на доброволна размяна и законни права на собственост. Либералите разглеждат ограниченията на имиграцията като форма на протекционизъм на работниците, подобна на индустриалния протекционизъм. Другите варианти противоречат на либералните принципи, като или налагат колективни ограничения на индивидуалната свобода, или дават приоритет на управлението на мнозинството пред индивидуалното съгласие, или разширяват държавния контрол върху доброволното движение и сдружаване на хората.
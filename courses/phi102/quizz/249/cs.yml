question: Jakým základním principem by se podle liberální teorie měla řídit imigrační politika, aby byla v souladu s hlavními liberálními hodnotami?
answer: Imigrace by měla být povolena na základě dobrovolné výměny, legitimního nabytí majetku a rovných smluv
wrong_answers:
  - Imigrace by měla být omezena, aby se domácí pracovníci chránili před nekalou mzdovou konkurencí a zachovala se národní identita
  - Imigrace by měla být regulována demokratickým většinovým hlasováním, aby byla zajištěna sociální soudržnost a kulturní kompatibilita
  - Imigrace by měla být řízena prostřednictvím státních kvót na základě ekonomických potřeb a hledisek národní bezpečnosti
explanation: |
  Liberální teorie, jejíž příkladem je Gustave de Molinari, podporuje svobodu přistěhovalectví, pokud je založena na dobrovolné směně a legitimních vlastnických právech. Liberálové považovali omezení přistěhovalectví za formu protekcionismu pracovníků, podobnou průmyslovému protekcionismu. Ostatní možnosti jsou v rozporu s liberálními principy, protože buď zavádějí kolektivní omezení svobody jednotlivce, upřednostňují vládu většiny před souhlasem jednotlivce, nebo rozšiřují státní kontrolu nad dobrovolným pohybem a sdružováním lidí.
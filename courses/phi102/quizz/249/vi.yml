question: Theo lý thuyết tự do, nguyên tắc cơ bản nào nên chi phối chính sách nhập cư để phù hợp với các giá trị cốt lõi của chủ nghĩa tự do?
answer: Việc nhập cư nên được cho phép khi dựa trên sự trao đổi tự nguyện, việc mua lại tài sản hợp pháp và các hợp đồng bình đẳng.
wrong_answers:
  - Việc nhập cư cần được hạn chế để bảo vệ người lao động trong nước khỏi sự cạnh tranh tiền lương không công bằng và bảo tồn bản sắc dân tộc.
  - Việc nhập cư nên được điều chỉnh bằng bỏ phiếu đa số dân chủ để đảm bảo sự gắn kết xã hội và sự tương thích văn hóa.
  - Việc nhập cư nên được quản lý thông qua hạn ngạch của các tiểu bang dựa trên nhu cầu kinh tế và các cân nhắc về an ninh quốc gia.
explanation: |
  Lý thuyết tự do, điển hình là Gustave de Molinari, ủng hộ tự do nhập cư khi dựa trên sự trao đổi tự nguyện và quyền sở hữu hợp pháp. Những người theo chủ nghĩa tự do coi các hạn chế nhập cư là một hình thức bảo hộ người lao động, tương tự như chủ nghĩa bảo hộ công nghiệp. Các lựa chọn khác mâu thuẫn với các nguyên tắc tự do bằng cách áp đặt các hạn chế tập thể lên tự do cá nhân, ưu tiên quy tắc đa số hơn sự đồng thuận cá nhân, hoặc mở rộng sự kiểm soát của nhà nước đối với sự di chuyển và liên kết tự nguyện của con người.
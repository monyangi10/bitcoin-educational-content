question: According to liberal theory, what fundamental principle should govern immigration policy to align with core liberal values?
answer: Immigration should be permitted when based on voluntary exchanges, legitimate property acquisition, and equal contracts
wrong_answers:
  - Immigration should be restricted to protect domestic workers from unfair wage competition and preserve national identity
  - Immigration should be regulated by democratic majority vote to ensure social cohesion and cultural compatibility
  - Immigration should be managed through state quotas based on economic needs and national security considerations
explanation: |
  Liberal theory, as exemplified by Gustave de Molinari, supports immigration freedom when grounded in voluntary exchange and legitimate property rights. Liberals viewed immigration restrictions as a form of worker protectionism, similar to industrial protectionism. The other options contradict liberal principles by either imposing collective restrictions on individual freedom, prioritizing majority rule over individual consent, or expanding state control over voluntary human movement and association.
question: Kulingana na nadharia ya kiliberali, ni kanuni gani ya msingi inayopaswa kudhibiti sera ya uhamiaji ili kuendana na maadili ya msingi ya kiliberali?
answer: Uhamiaji unapaswa kuruhusiwa wakati wa kubadilishana kwa hiari, ununuzi halali wa mali, na mikataba sawa
wrong_answers:
  - Uhamiaji unapaswa kuzuiwa ili kuwalinda wafanyakazi wa majumbani dhidi ya ushindani usio wa haki wa mishahara na kuhifadhi utambulisho wa taifa
  - Uhamiaji unapaswa kudhibitiwa kwa kura nyingi za kidemokrasia ili kuhakikisha mshikamano wa kijamii na utangamano wa kitamaduni
  - Uhamiaji unapaswa kusimamiwa kupitia mgao wa serikali kulingana na mahitaji ya kiuchumi na masuala ya usalama wa taifa
explanation: |
  Nadharia ya kiliberali, kama ilivyoonyeshwa na Gustave de Molinari, inaunga mkono uhuru wa uhamiaji inapoegemea katika ubadilishanaji wa hiari na haki halali za mali. Waliberali waliona vikwazo vya uhamiaji kama aina ya ulinzi wa wafanyakazi, sawa na ulinzi wa viwanda. Chaguzi zingine zinapingana na kanuni za kiliberali kwa kuweka vikwazo vya pamoja kwenye uhuru wa mtu binafsi, kuweka kipaumbele utawala wa wengi kuliko ridhaa ya mtu binafsi, au kupanua udhibiti wa serikali juu ya harakati za hiari za binadamu na ushirika.
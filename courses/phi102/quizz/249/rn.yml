question: Dushingiye ku ciyumviro c’ubwigenge, ni ingingo ngenderwako iyihe y’ishimikiro ikwiye gutwara politike y’abimukira kugira ngo ihure n’agaciro nyamukuru k’ubwigenge?
answer: Ukwinjira mu gihugu bikwiye kwemererwa iyo bishingiye ku guhanahana amakuru ku bushake, ku kuronka umutungo wemewe, no ku masezerano angana .
wrong_answers:
  - Ukwinjira mu gihugu gukwiye guhagarara kugira ngo abakozi bo mu rugo ntibahiganwe mu mishahara idakwiriye no kubungabunga akaranga k'igihugu .
  - Ukwinjira mu gihugu gukwiye gutunganirizwa n'amajwi menshi ya demokarasi kugira ngo habeho ubumwe bw'abantu n'uguhuza imico kama
  - Ukwinjira mu gihugu bikwiye gucungirwa biciye mu migabane ya Leta ishingiye ku bikenewe mu vy'ubutunzi no ku bijanye n'umutekano w'igihugu .
explanation: |
  Ivyiyumviro vy’ubwigenge, nk’uko vyatanzwe na Gustave de Molinari, birashigikira umwidegemvyo w’abimukira iyo bishingiye ku guhinduranya ku bushake no ku burenganzira bw’itunga bubereye. Abanyaliberalisme babona ko guhagarika abimukira ari uburyo bwo gukingira abakozi, nk’uko nyene bimeze mu gukingira inganda. Ayandi mahitamwo aravuguruza ingingo ngenderwako z’ubwigenge mu gushinga amategeko rusangi ku mwidegemvyo w’umuntu ku giti ciwe, gushira imbere ubutegetsi bw’abantu benshi kuruta ukwemera kw’umuntu ku giti ciwe, canke kwagura ububasha bwa Leta ku bijanye n’ugutembera kw’abantu ku bushake no kwifatanya.
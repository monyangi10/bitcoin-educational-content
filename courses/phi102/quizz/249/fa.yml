question: بر اساس نظریه لیبرال، چه اصل بنیادی باید سیاست مهاجرت را به گونه‌ای هدایت کند که با ارزش‌های اصلی لیبرال همسو باشد؟
answer: مهاجرت باید زمانی مجاز باشد که بر مبنای مبادلات داوطلبانه، کسب مشروع مالکیت و قراردادهای برابر باشد.
wrong_answers:
  - باید مهاجرت محدود شود تا از کارگران داخلی در برابر رقابت ناعادلانه دستمزد محافظت شود و هویت ملی حفظ گردد.
  - مهاجرت باید با رأی اکثریت دموکراتیک تنظیم شود تا انسجام اجتماعی و سازگاری فرهنگی تضمین شود.
  - باید مهاجرت از طریق سهمیه‌های دولتی بر اساس نیازهای اقتصادی و ملاحظات امنیت ملی مدیریت شود.
explanation: |
  نظریه لیبرال، همان‌طور که توسط گوستاو دو مولیناری نشان داده شده است، از آزادی مهاجرت حمایت می‌کند وقتی که بر مبنای تبادل داوطلبانه و حقوق مالکیت مشروع باشد. لیبرال‌ها محدودیت‌های مهاجرتی را به عنوان شکلی از حمایت‌گرایی کارگری می‌دیدند، مشابه با حمایت‌گرایی صنعتی. گزینه‌های دیگر با اصول لیبرال در تضاد هستند زیرا یا محدودیت‌های جمعی بر آزادی فردی اعمال می‌کنند، یا حکومت اکثریت را بر رضایت فردی اولویت می‌دهند، یا کنترل دولت بر حرکت و ارتباط داوطلبانه انسانی را گسترش می‌دهند.
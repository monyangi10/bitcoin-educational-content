question: Welk basisprincipe moet volgens de liberale theorie het immigratiebeleid bepalen om op één lijn te komen met de liberale kernwaarden?
answer: Immigratie moet worden toegestaan als het gebaseerd is op vrijwillige uitwisselingen, legitieme eigendomsverwerving en gelijke contracten
wrong_answers:
  - Immigratie moet worden beperkt om huishoudelijk personeel te beschermen tegen oneerlijke loonconcurrentie en de nationale identiteit te behouden
  - Immigratie moet bij democratische meerderheid worden geregeld om sociale cohesie en culturele compatibiliteit te garanderen
  - Immigratie moet worden beheerd door middel van staatsquota op basis van economische behoeften en nationale veiligheidsoverwegingen
explanation: |
  De liberale theorie, zoals geïllustreerd door Gustave de Molinari, steunt immigratievrijheid als deze gebaseerd is op vrijwillige uitwisseling en legitieme eigendomsrechten. Liberalen zagen immigratiebeperkingen als een vorm van arbeidersprotectionisme, vergelijkbaar met industrieprotectionisme. De andere opties zijn in tegenspraak met liberale principes door collectieve beperkingen op te leggen aan individuele vrijheid, door meerderheidsheerschappij voorrang te geven boven individuele toestemming, of door de controle van de staat over vrijwillige menselijke beweging en vereniging uit te breiden.
question: Hvilket grunnleggende prinsipp bør ifølge liberal teori styre innvandringspolitikken slik at den er i tråd med liberale kjerneverdier?
answer: Innvandring bør være tillatt når den er basert på frivillig utveksling, legitimt erverv av eiendom og likeverdige kontrakter
wrong_answers:
  - Innvandringen bør begrenses for å beskytte hushjelper mot urettferdig lønnskonkurranse og bevare den nasjonale identiteten
  - Innvandring bør reguleres ved demokratisk flertallsavstemning for å sikre sosial samhørighet og kulturell kompatibilitet
  - Innvandring bør styres gjennom statlige kvoter basert på økonomiske behov og nasjonale sikkerhetshensyn
explanation: |
  Liberal teori, eksemplifisert av Gustave de Molinari, støtter innvandringsfrihet når den er basert på frivillig utveksling og legitime eiendomsrettigheter. Liberale så på innvandringsrestriksjoner som en form for arbeiderproteksjonisme, i likhet med industriproteksjonisme. De andre alternativene strider mot liberale prinsipper ved at de enten innfører kollektive restriksjoner på individets frihet, prioriterer flertallsstyre fremfor individuelt samtykke eller utvider statens kontroll over menneskers frivillige bevegelser og sammenslutninger.
question: Secondo la teoria liberale, quale principio fondamentale dovrebbe governare la politica di immigrazione per allinearsi ai valori liberali fondamentali?
answer: L'immigrazione dovrebbe essere consentita se basata su scambi volontari, acquisizione legittima di proprietà e contratti paritari
wrong_answers:
  - L'immigrazione dovrebbe essere limitata per proteggere i lavoratori domestici dalla concorrenza salariale sleale e preservare l'identità nazionale
  - L'immigrazione dovrebbe essere regolata da un voto democratico a maggioranza per garantire la coesione sociale e la compatibilità culturale
  - L'immigrazione dovrebbe essere gestita attraverso quote statali basate su esigenze economiche e considerazioni di sicurezza nazionale
explanation: |
  La teoria liberale, esemplificata da Gustave de Molinari, sostiene la libertà di immigrazione se fondata sullo scambio volontario e sui legittimi diritti di proprietà. I liberali considerano le restrizioni all'immigrazione come una forma di protezionismo dei lavoratori, simile al protezionismo industriale. Le altre opzioni contraddicono i principi liberali, imponendo restrizioni collettive alla libertà individuale, privilegiando la regola della maggioranza rispetto al consenso individuale o espandendo il controllo dello Stato sui movimenti e le associazioni volontarie.
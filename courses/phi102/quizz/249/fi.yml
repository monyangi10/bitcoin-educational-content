question: Minkä perusperiaatteen pitäisi liberaalin teorian mukaan ohjata maahanmuuttopolitiikkaa, jotta se olisi linjassa liberaalien perusarvojen kanssa?
answer: Maahanmuutto olisi sallittava silloin, kun se perustuu vapaaehtoiseen vaihtoon, lailliseen omaisuuden hankintaan ja tasavertaisiin sopimuksiin
wrong_answers:
  - Maahanmuuttoa olisi rajoitettava, jotta voidaan suojella kotityöntekijöitä epäreilulta palkkakilpailulta ja säilyttää kansallinen identiteetti
  - Maahanmuuttoa olisi säänneltävä demokraattisella enemmistöpäätöksellä sosiaalisen yhteenkuuluvuuden ja kulttuurien yhteensopivuuden varmistamiseksi
  - Maahanmuuttoa olisi ohjattava valtion kiintiöillä, jotka perustuvat taloudellisiin tarpeisiin ja kansalliseen turvallisuuteen
explanation: |
  Gustave de Molinarin edustama liberaali teoria tukee maahanmuuton vapautta, kun se perustuu vapaaehtoiseen vaihtoon ja laillisiin omistusoikeuksiin. Liberaalit pitivät maahanmuuton rajoittamista työntekijöiden protektionismin muotona, joka muistuttaa teollisuuden protektionismia. Muut vaihtoehdot ovat ristiriidassa liberaalien periaatteiden kanssa, sillä ne joko rajoittavat kollektiivisesti yksilön vapautta, asettavat enemmistön vallan yksilön suostumuksen edelle tai laajentavat valtion valvontaa ihmisten vapaaehtoiseen liikkumiseen ja yhdistymiseen.
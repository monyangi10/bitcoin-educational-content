question: Vilken grundläggande princip bör enligt liberal teori styra invandringspolitiken så att den överensstämmer med liberala kärnvärden?
answer: Invandring bör tillåtas om den baseras på frivilliga utbyten, legitimt förvärv av egendom och jämlika avtal
wrong_answers:
  - Invandringen bör begränsas för att skydda hushållsarbetare från orättvis lönekonkurrens och bevara den nationella identiteten
  - Invandring bör regleras genom demokratisk majoritetsomröstning för att säkerställa social sammanhållning och kulturell kompatibilitet
  - Invandringen bör styras genom statliga kvoter som baseras på ekonomiska behov och nationella säkerhetsaspekter
explanation: |
  Liberal teori, som exemplifieras av Gustave de Molinari, stöder invandringsfrihet när den grundas på frivilligt utbyte och legitima äganderätter. Liberaler betraktade invandringsrestriktioner som en form av arbetarprotektionism, liknande industriell protektionism. De andra alternativen strider mot liberala principer genom att antingen införa kollektiva begränsningar av individens frihet, prioritera majoritetsstyre framför individuellt samtycke eller utöka statens kontroll över frivillig mänsklig rörelse och sammanslutning.
question: Prema liberalnoj teoriji, koji fundamentalni princip treba da upravlja politikom imigracije kako bi se uskladila sa osnovnim liberalnim vrednostima?
answer: Imigracija treba biti dozvoljena kada se zasniva na dobrovoljnim razmenama, legitimnom sticanju imovine i ravnopravnim ugovorima
wrong_answers:
  - Imigracija treba biti ograničena kako bi se zaštitili domaći radnici od nepoštene konkurencije u platama i očuvala nacionalna identitet.
  - Imigracija bi trebalo da bude regulisana demokratskim glasanjem većine kako bi se osigurala društvena kohezija i kulturna kompatibilnost
  - Imigracija treba da se upravlja kroz državne kvote zasnovane na ekonomskim potrebama i razmatranjima nacionalne bezbednosti.
explanation: |
  Liberalna teorija, kako je prikazana od strane Gustava de Molinarija, podržava slobodu imigracije kada je zasnovana na dobrovoljnoj razmeni i legitimnim pravima vlasništva. Liberali su posmatrali ograničenja imigracije kao oblik zaštite radnika, slično industrijskom protekcionizmu. Druge opcije protivreče liberalnim principima bilo nametanjem kolektivnih ograničenja na individualnu slobodu, davanjem prioriteta vladavini većine nad individualnim pristankom, ili širenjem državne kontrole nad dobrovoljnim ljudskim kretanjem i udruživanjem.
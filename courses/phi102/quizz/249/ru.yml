question: Согласно либеральной теории, какой основополагающий принцип должен лежать в основе иммиграционной политики, чтобы соответствовать основным либеральным ценностям?
answer: Иммиграция должна быть разрешена, если она основана на добровольном обмене, законном приобретении собственности и равноправных контрактах
wrong_answers:
  - Иммиграция должна быть ограничена, чтобы защитить домашних работников от несправедливой конкуренции за заработную плату и сохранить национальную идентичность
  - Иммиграция должна регулироваться демократическим большинством голосов, чтобы обеспечить социальную сплоченность и культурную совместимость
  - Иммиграция должна регулироваться с помощью государственных квот, основанных на экономических потребностях и соображениях национальной безопасности
explanation: |
  Либеральная теория, примером которой является Гюстав де Молинари, поддерживает свободу иммиграции, если она основана на добровольном обмене и законных правах собственности. Либералы рассматривают иммиграционные ограничения как форму протекционизма в отношении работников, аналогичную промышленному протекционизму. Другие варианты противоречат либеральным принципам, поскольку либо накладывают коллективные ограничения на индивидуальную свободу, либо ставят во главу угла правление большинства, а не индивидуальное согласие, либо расширяют государственный контроль над добровольными перемещениями и объединениями людей.
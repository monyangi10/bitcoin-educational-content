question: リベラル理論によれば、リベラルの中核的価値観に沿うために移民政策を支配すべき基本原則は何か？
answer: 移民は、自発的な交換、合法的な財産の取得、平等な契約に基づく場合に許可されるべきである。
wrong_answers:
  - 家事労働者を不当な賃金競争から守り、国のアイデンティティを維持するために、移民を制限すべきである。
  - 移民は、社会的結束と文化的適合性を確保するために、民主的多数決によって規制されるべきである。
  - 移民は、経済的ニーズと国家安全保障の考慮に基づいて、州の割り当てによって管理されるべきである。
explanation: |
  ギュスターヴ・ド・モリナーリに代表される自由主義理論は、自発的な交換と合法的な財産権に根拠を置く場合、移民の自由を支持する。リベラル派は移民制限を、産業保護主義に似た労働者保護主義の一形態とみなした。その他の選択肢は、個人の自由に対して集団的制限を課すか、個人の同意よりも多数決を優先するか、自発的な人間の移動や結社に対する国家の統制を拡大することによって、リベラルの原則と矛盾する。
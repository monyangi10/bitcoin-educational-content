question: Zgodnie z tekstem, w jaki sposób wczesne społeczności ludzkie pozyskiwały swoje zasoby przed rozwojem rolnictwa?
answer: Poprzez polowanie, łowienie ryb i zbieranie z ich naturalnego środowiska
wrong_answers:
  - Poprzez handel i wymianę z sąsiednimi społecznościami rolniczymi
  - Poprzez prymitywne techniki rolnicze i podstawowe udomowienie zwierząt
  - Poprzez operacje mining i wydobycie zasobów podziemnych
explanation: |
  Rozdział ten wyraźnie stwierdza, że pierwsze społeczeństwa ludzkie nie wytwarzały nowego bogactwa, ale zamiast tego pobierały zasoby ze swojego środowiska poprzez polowanie, rybołówstwo i zbieractwo. Ta "ekonomia destrukcji" sprawiła, że były one całkowicie zależne od naturalnego odnawiania się zasobów, co ograniczyło liczebność grup i uniemożliwiło powstanie złożonych społeczeństw. Pozostałe opcje są nieprawidłowe, ponieważ handel ze społecznościami rolniczymi, techniki rolnicze i mining reprezentują późniejsze zmiany, które nastąpiły po przejściu od wczesnej gospodarki wydobywczej do produktywnego rolnictwa.
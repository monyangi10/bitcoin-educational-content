question: Според текста как ранните човешки общества са получавали ресурсите си преди развитието на земеделието?
answer: Чрез лов, риболов и събиране на реколта от естествената им среда
wrong_answers:
  - Чрез търговия и обмен със съседните земеделски общности
  - Чрез примитивни земеделски техники и основно опитомяване на животни
  - Чрез операции mining и добив на подземни ресурси
explanation: |
  В главата ясно се посочва, че първите човешки общества не са произвеждали нови блага, а са вземали ресурси от околната среда чрез лов, риболов и събирателство. Тази "икономика на разрушението" ги е направила напълно зависими от естественото обновяване на ресурсите, което е ограничило размера на групите и е попречило на появата на сложни общества. Другите варианти са неправилни, тъй като търговията със земеделски общности, земеделските техники и mining представляват по-късни развития, настъпили след прехода от тази ранна добивна икономика към продуктивно земеделие.
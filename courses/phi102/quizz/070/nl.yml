question: Hoe kwamen de vroege menselijke samenlevingen volgens de tekst aan hun hulpbronnen voordat de landbouw zich ontwikkelde?
answer: Door te jagen, vissen en verzamelen in hun natuurlijke omgeving
wrong_answers:
  - Door handel en uitwisseling met naburige landbouwgemeenschappen
  - Door primitieve landbouwtechnieken en elementaire dierlijke domesticatie
  - Door mining operaties en winning van ondergrondse bronnen
explanation: |
  Het hoofdstuk stelt duidelijk dat de eerste menselijke samenlevingen geen nieuwe rijkdommen produceerden, maar in plaats daarvan grondstoffen uit hun omgeving haalden door te jagen, vissen en verzamelen. Deze 'economie van vernietiging' maakte hen volledig afhankelijk van de natuurlijke vernieuwing van hulpbronnen, wat de groepsgrootte beperkte en het ontstaan van complexe samenlevingen verhinderde. De andere opties zijn onjuist omdat handel met landbouwgemeenschappen, landbouwtechnieken en mining allemaal latere ontwikkelingen zijn die kwamen na de overgang van deze vroege extractieve economie naar productieve landbouw.
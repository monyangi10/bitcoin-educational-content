question: Dukurikije ico canditswe, imibano ya kera y’abantu yaronka gute ubutunzi bwayo imbere y’uko uburimyi butera imbere?
answer: Biciye mu guhigira, kuroba no kwegeranya ibintu biva mu bidukikije vyabo .
wrong_answers:
  - Biciye mu bucuruzi n’uguhanahana n’imiryango y’abarimyi babanyi .
  - Biciye mu buhinga bwa kera bwo kurima no gutunga ibikoko
  - Biciye mu bikorwa vya mining no gukura ubutunzi bwo mu butaka
explanation: |
  Ico kigabane kivuga neza yuko imiryango ya mbere y’abantu itavyaye ubutunzi bushasha ahubwo ko yafata ubutunzi mu bidukikije vyayo biciye mu guhigira, kuroba no kwegeranya. Ubwo ‘butunzi bw’ugusambura’ bwatumye bavyifatamwo neza mu buryo bushitse ku gusubira gusubirana kw’ubutunzi, ivyo bikaba vyagabanya ubunini bw’imigwi kandi bikabuza ko habaho imibano igoye. Ayandi mahitamwo ntabwo ari meza kuko ubudandaji n’imiryango y’abarimyi, ubuhinga bwo kurima, na mining vyose bigereranya iterambere ryaje mu nyuma ryaje inyuma y’uguhinduka kuva muri ubwo bukungu bwa kera bwo gukura amabuye y’agaciro gushika mu buhinzi butanga umwimbu.
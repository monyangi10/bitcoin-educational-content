question: Tekstin mukaan miten varhaiset ihmisyhteisöt hankkivat resurssinsa ennen maanviljelyn kehittymistä?
answer: Metsästämällä, kalastamalla ja keräämällä luonnollisesta ympäristöstään..
wrong_answers:
  - Kaupan ja vaihdon kautta naapurimaiden maatalousyhteisöjen kanssa
  - Alkukantaisten viljelytekniikoiden ja eläinten kesyttämisen avulla -
  - mining-toiminnan ja maanalaisten luonnonvarojen louhinnan avulla
explanation: |
  Luvussa todetaan selvästi, että ensimmäiset ihmisyhteisöt eivät tuottaneet uutta vaurautta, vaan ottivat resursseja ympäristöstään metsästämällä, kalastamalla ja keräämällä. Tämä "tuhon talous" teki ihmisistä täysin riippuvaisia luonnonvarojen uusiutumisesta, mikä rajoitti ryhmäkokoja ja esti monimutkaisten yhteiskuntien syntymisen. Muut vaihtoehdot ovat virheellisiä, koska kauppa maatalousyhteisöjen kanssa, viljelytekniikat ja mining edustavat kaikki myöhempää kehitystä, joka tapahtui sen jälkeen, kun tästä varhaisesta louhintataloudesta oli siirrytty tuottavaan maatalouteen.
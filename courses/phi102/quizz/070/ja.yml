question: 本文によれば、農耕が発達する以前の初期の人類社会は、どのようにして資源を得ていたのだろうか？
answer: 狩猟、漁労、自然環境からの採集を通じて
wrong_answers:
  - 近隣の農村との貿易や交流を通じて
  - 原始的な農業技術と基本的な動物の家畜化を通じて
  - miningの操業と地下資源の採掘を通じて
explanation: |
  この章では、最初の人類社会は新たな富を生み出さなかった代わりに、狩猟、漁労、採集を通じて環境から資源を奪っていたと明言している。この「破壊の経済」によって、人類は資源の自然再生に完全に依存するようになり、集団の規模が制限され、複雑な社会の出現を妨げた。農業共同体との交易、農業技術、miningはすべて、このような初期の採取経済から生産的農業への移行後にもたらされた後発の発展であるため、他の選択肢は正しくない。
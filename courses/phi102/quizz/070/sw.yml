question: Kulingana na maandishi, jamii za awali za wanadamu zilipataje rasilimali zao kabla ya maendeleo ya kilimo?
answer: Kupitia uwindaji, uvuvi, na kukusanya kutoka kwa mazingira yao ya asili
wrong_answers:
  - Kupitia biashara na kubadilishana na jamii jirani za kilimo
  - Kupitia mbinu za kilimo cha zamani na ufugaji wa wanyama wa kawaida
  - Kupitia shughuli za mining na uchimbaji wa rasilimali za chini ya ardhi
explanation: |
  Sura hiyo inasema wazi kwamba jamii za kwanza za binadamu hazikuzaa utajiri mpya bali zilichukua rasilimali kutoka kwa mazingira yao kupitia uwindaji, uvuvi, na ukusanyaji. 'Uchumi huu wa uharibifu' uliwafanya wategemee kabisa upyaji wa asili wa rasilimali, ambao ulipunguza ukubwa wa makundi na kuzuia kuibuka kwa jamii changamano. Chaguzi zingine si sahihi kwa sababu biashara na jamii za kilimo, mbinu za kilimo, na mining zote zinawakilisha maendeleo ya baadaye yaliyokuja baada ya mpito kutoka kwa uchumi huu wa awali wa uchimbaji hadi kilimo chenye tija.
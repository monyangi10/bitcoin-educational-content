question: Secondo il testo, come si procuravano le risorse le prime società umane prima dello sviluppo dell'agricoltura?
answer: Attraverso la caccia, la pesca e la raccolta dall'ambiente naturale
wrong_answers:
  - Attraverso il commercio e lo scambio con le comunità agricole vicine
  - Attraverso tecniche agricole primitive e l'addomesticamento di base degli animali
  - Attraverso le operazioni di mining e l'estrazione di risorse sotterranee
explanation: |
  Il capitolo afferma chiaramente che le prime società umane non producevano nuove ricchezze, ma sottraevano risorse all'ambiente circostante attraverso la caccia, la pesca e la raccolta. Questa "economia della distruzione" le rendeva completamente dipendenti dal rinnovo naturale delle risorse, limitando le dimensioni dei gruppi e impedendo la nascita di società complesse. Le altre opzioni non sono corrette, perché il commercio con le comunità agricole, le tecniche agricole e il mining rappresentano tutti sviluppi successivi alla transizione da questa prima economia estrattiva all'agricoltura produttiva.
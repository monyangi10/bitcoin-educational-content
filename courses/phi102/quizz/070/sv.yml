question: Hur skaffade sig de tidiga mänskliga samhällena sina resurser innan jordbruket utvecklades, enligt texten?
answer: Genom jakt, fiske och insamling från deras naturliga miljö
wrong_answers:
  - Genom handel och utbyte med angränsande jordbrukssamhällen
  - Genom primitiva jordbrukstekniker och grundläggande djurhållning
  - Genom mining-verksamhet och utvinning av underjordiska resurser
explanation: |
  I kapitlet framgår det tydligt att de första mänskliga samhällena inte producerade nya rikedomar utan istället tog resurser från sin omgivning genom jakt, fiske och samlande. Denna "förstörelsens ekonomi" gjorde dem helt beroende av den naturliga förnyelsen av resurser, vilket begränsade gruppstorlekarna och förhindrade uppkomsten av komplexa samhällen. De andra alternativen är felaktiga eftersom handel med jordbrukssamhällen, jordbruksteknik och mining alla representerar senare utvecklingar som kom efter övergången från denna tidiga extraktiva ekonomi till produktivt jordbruk.
question: Menurut teks tersebut, bagaimana masyarakat manusia purba memperoleh sumber daya mereka sebelum perkembangan pertanian?
answer: Melalui berburu, memancing, dan mengumpulkan dari lingkungan alam mereka
wrong_answers:
  - Melalui perdagangan dan pertukaran dengan komunitas pertanian tetangga
  - Melalui teknik pertanian primitif dan domestikasi hewan dasar
  - Melalui operasi mining dan ekstraksi sumber daya bawah tanah
explanation: |
  Bab ini dengan jelas menyatakan bahwa masyarakat manusia pertama tidak menghasilkan kekayaan baru, melainkan mengambil sumber daya dari lingkungannya melalui berburu, memancing, dan meramu. 'Ekonomi kehancuran' ini membuat mereka sepenuhnya bergantung pada pembaruan sumber daya secara alami, yang membatasi ukuran kelompok dan mencegah munculnya masyarakat yang kompleks. Pilihan lainnya tidak tepat karena perdagangan dengan komunitas pertanian, teknik pertanian, dan mining semuanya mewakili perkembangan selanjutnya yang terjadi setelah transisi dari ekonomi ekstraktif awal ke pertanian produktif.
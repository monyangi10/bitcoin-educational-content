question: Согласно тексту, как ранние человеческие общества добывали ресурсы до развития сельского хозяйства?
answer: Охота, рыбалка и собирательство в естественной среде обитания
wrong_answers:
  - Благодаря торговле и обмену с соседними сельскохозяйственными общинами
  - Благодаря примитивным методам земледелия и приручению животных
  - Благодаря операциям mining и добыче подземных ресурсов
explanation: |
  В главе четко сказано, что первые человеческие общества не производили новых благ, а брали ресурсы из окружающей среды, занимаясь охотой, рыболовством и собирательством. Такая "экономика разрушения" делала их полностью зависимыми от естественного возобновления ресурсов, что ограничивало размеры групп и препятствовало возникновению сложных обществ. Другие варианты неверны, поскольку торговля с сельскохозяйственными общинами, методы земледелия и mining представляют собой более поздние разработки, появившиеся после перехода от ранней добывающей экономики к продуктивному сельскому хозяйству.
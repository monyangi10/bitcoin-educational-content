question: Según el texto, ¿cómo obtenían sus recursos las primeras sociedades humanas antes del desarrollo de la agricultura?
answer: Mediante la caza, la pesca y la recolección en su entorno natural
wrong_answers:
  - Mediante el comercio y el intercambio con las comunidades agrícolas vecinas
  - Mediante técnicas agrícolas primitivas y la domesticación básica de animales
  - Mediante las operaciones mining y la extracción de recursos subterráneos
explanation: |
  El capítulo afirma claramente que las primeras sociedades humanas no producían nuevas riquezas, sino que extraían recursos de su entorno mediante la caza, la pesca y la recolección. Esta "economía de destrucción" les hizo completamente dependientes de la renovación natural de los recursos, lo que limitó el tamaño de los grupos e impidió la aparición de sociedades complejas. Las otras opciones son incorrectas porque el comercio con las comunidades agrícolas, las técnicas de cultivo y la mining representan desarrollos posteriores que se produjeron tras la transición de esta primitiva economía extractiva a la agricultura productiva.
question: 美国内战对里昂纺织业的影响这一例子说明了什么？
answer: 遥远的冲突可通过中断贸易关系给非参与地区造成直接经济损失
wrong_answers:
  - 军事冲突主要只影响直接卷入战争的国家
  - 南北战争期间，美国竞争减少，欧洲工业从中受益
  - 欧洲纺织品产量增加，以弥补美国市场的干扰
explanation: |
  美国内战的例子说明了经济相互依存是如何在各大洲产生连锁后果的。战争破坏了棉花供应和贸易关系，立即导致法国里昂纺织业的经济崩溃，尽管法国并未卷入冲突。这表明，在相互关联的全球经济中，局部冲突会产生深远影响，当贸易链断裂时，每个人都会变得更穷。其他选项错误地暗示了影响或经济利益的孤立，违背了强调相互依存和损失共担的利益和谐原则。
question: Amerikan İç Savaşı'nın Lyon'un tekstil endüstrileri üzerindeki etkisi örneği ekonomik karşılıklı bağımlılık hakkında ne gösteriyor?
answer: Uzaktaki çatışmalar, ticari ilişkilerin bozulması yoluyla katılımcı olmayan bölgelere anında ekonomik zarar verebilir
wrong_answers:
  - Askeri çatışmalar öncelikle sadece savaşa doğrudan dahil olan ülkeleri etkiler
  - Avrupa endüstrileri İç Savaş döneminde azalan Amerikan rekabetinden yararlandı
  - Amerika'daki pazar aksaklıklarını telafi etmek için Avrupa'da tekstil üretimi arttı
explanation: |
  Amerikan İç Savaşı örneği, ekonomik karşılıklı bağımlılığın kıtalar arasında nasıl bir sonuçlar zinciri yarattığını göstermektedir. Savaş pamuk tedarikini ve ticari ilişkileri sekteye uğrattığında, Fransa çatışmaya dahil olmamasına rağmen Lyon, Fransa'daki tekstil endüstrileri için derhal ekonomik yıkıma neden olmuştur. Bu durum, birbirine bağlı bir küresel ekonomide, yerel çatışmaların geniş kapsamlı etkileri olduğunu ve ticaret zincirleri bozulduğunda herkesi daha yoksul hale getirdiğini göstermektedir. Diğer seçenekler, karşılıklı bağımlılığı ve ortak kayıpları vurgulayan çıkarların uyumu ilkesiyle çelişerek, yanlış bir şekilde etkilerin veya ekonomik faydaların izole edilmesini önermektedir.
question: Mitä esimerkki Amerikan sisällissodan vaikutuksesta Lyonin tekstiiliteollisuuteen osoittaa taloudellisesta keskinäisestä riippuvuudesta?
answer: Etäiset konfliktit voivat aiheuttaa välitöntä taloudellista vahinkoa muille kuin osallistuville alueille kauppasuhteiden häiriintymisen vuoksi
wrong_answers:
  - Sotilaalliset konfliktit vaikuttavat ensisijaisesti vain niihin maihin, jotka osallistuvat suoraan sotaan
  - Euroopan teollisuus hyötyi Yhdysvaltojen kilpailun vähenemisestä sisällissodan aikana
  - Tekstiilituotanto lisääntyi Euroopassa kompensoidakseen Yhdysvaltojen markkinahäiriöitä
explanation: |
  Yhdysvaltain sisällissodan esimerkki osoittaa, miten taloudellinen keskinäinen riippuvuus luo seurausten ketjun yli maanosien. Kun sota keskeytti puuvillan toimitukset ja kauppasuhteet, se aiheutti välittömästi taloudellista tuhoa Ranskan Lyonin tekstiiliteollisuudelle, vaikka Ranska ei osallistunut konfliktiin. Tämä osoittaa, että toisiinsa kytkeytyneessä maailmantaloudessa paikallisilla konflikteilla on kauaskantoisia vaikutuksia, ja kauppaketjujen katketessa kaikki köyhtyvät. Muut vaihtoehdot viittaavat virheellisesti vaikutusten tai taloudellisten hyötyjen eristämiseen, mikä on ristiriidassa etujen harmonian periaatteen kanssa, jossa korostetaan keskinäistä riippuvuutta ja yhteisiä tappioita.
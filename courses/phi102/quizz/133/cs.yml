question: Co ukazuje příklad dopadu americké občanské války na lyonský textilní průmysl o vzájemné ekonomické závislosti?
answer: Vzdálené konflikty mohou nezúčastněným regionům způsobit okamžité hospodářské škody v důsledku narušení obchodních vztahů
wrong_answers:
  - Vojenské konflikty se primárně dotýkají pouze zemí, které se přímo účastní válečného konfliktu
  - Evropský průmysl těžil z omezené americké konkurence v období občanské války
  - Zvýšení textilní výroby v Evropě jako kompenzace za narušení amerického trhu
explanation: |
  Příklad americké občanské války ilustruje, jak vzájemná ekonomická závislost vytváří řetězec důsledků napříč kontinenty. Když válka přerušila dodávky bavlny a obchodní vztahy, způsobila okamžitý hospodářský krach textilnímu průmyslu ve francouzském Lyonu, přestože Francie nebyla do konfliktu zapojena. To dokazuje, že v propojené globální ekonomice mají místní konflikty dalekosáhlé důsledky a po přerušení obchodních řetězců jsou všichni chudší. Ostatní možnosti nesprávně naznačují izolaci účinků nebo ekonomických výhod, což je v rozporu se zásadou harmonie zájmů, která zdůrazňuje vzájemnou závislost a společné ztráty.
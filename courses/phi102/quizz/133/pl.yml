question: Co przykład wpływu amerykańskiej wojny secesyjnej na przemysł tekstylny Lyonu pokazuje na temat współzależności gospodarczej?
answer: Odległe konflikty mogą powodować natychmiastowe szkody gospodarcze w regionach nieuczestniczących w nich poprzez zakłócenie relacji handlowych
wrong_answers:
  - Konflikty zbrojne wpływają przede wszystkim tylko na kraje bezpośrednio zaangażowane w działania wojenne
  - Przemysł europejski skorzystał na zmniejszonej konkurencji amerykańskiej w okresie wojny secesyjnej
  - Produkcja tekstyliów wzrosła w Europie, aby zrekompensować zakłócenia na rynku amerykańskim
explanation: |
  Przykład amerykańskiej wojny secesyjnej ilustruje, w jaki sposób współzależność gospodarcza tworzy łańcuch konsekwencji na różnych kontynentach. Kiedy wojna zakłóciła dostawy bawełny i relacje handlowe, natychmiast spowodowała ruinę gospodarczą przemysłu tekstylnego w Lyonie we Francji, mimo że Francja nie była zaangażowana w konflikt. Pokazuje to, że w połączonej globalnej gospodarce lokalne konflikty mają daleko idące skutki, czyniąc wszystkich biedniejszymi, gdy łańcuchy handlowe są zerwane. Pozostałe opcje błędnie sugerują izolację skutków lub korzyści ekonomicznych, co jest sprzeczne z zasadą harmonii interesów, która podkreśla wzajemną zależność i wspólne straty.
question: Qu'est-ce que l'exemple de l'impact de la guerre de Sécession sur les industries textiles lyonnaises démontre sur l'interdépendance économique ?
answer: Les conflits lointains peuvent causer des dommages économiques immédiats aux régions non participantes en raison de la perturbation des relations commerciales
wrong_answers:
  - Les conflits militaires n'affectent principalement que les pays directement impliqués dans la guerre
  - Les industries européennes ont bénéficié de la réduction de la concurrence américaine pendant la guerre de Sécession
  - La production textile a augmenté en Europe pour compenser les perturbations du marché américain
explanation: |
  L'exemple de la guerre de Sécession illustre la façon dont l'interdépendance économique crée une chaîne de conséquences à travers les continents. Lorsque la guerre a perturbé l'approvisionnement en coton et les relations commerciales, elle a immédiatement causé la ruine économique des industries textiles de Lyon, en France, bien que la France n'ait pas été impliquée dans le conflit. Cela démontre que dans une économie mondiale interconnectée, les conflits locaux ont des effets considérables, rendant tout le monde plus pauvre lorsque les chaînes commerciales sont rompues. Les autres options suggèrent à tort l'isolement des effets ou des avantages économiques, ce qui contredit le principe de l'harmonie des intérêts qui met l'accent sur la dépendance mutuelle et les pertes partagées.
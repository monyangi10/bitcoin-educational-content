question: مثال تأثیر جنگ داخلی آمریکا بر صنایع نساجی لیون چه چیزی را درباره وابستگی اقتصادی متقابل نشان می‌دهد؟
answer: درگیری‌های دور می‌توانند از طریق اختلال در روابط تجاری، به مناطق غیرمشارکت‌کننده آسیب اقتصادی فوری وارد کنند.
wrong_answers:
  - درگیری‌های نظامی عمدتاً فقط بر کشورهایی که مستقیماً در جنگ درگیر هستند تأثیر می‌گذارد.
  - صنایع اروپایی در دوره جنگ داخلی از کاهش رقابت آمریکایی بهره‌مند شدند.
  - تولید منسوجات در اروپا برای جبران اختلالات بازار آمریکا افزایش یافت.
explanation: |
  نمونه جنگ داخلی آمریکا نشان می‌دهد که چگونه وابستگی اقتصادی زنجیره‌ای از پیامدها را در سراسر قاره‌ها ایجاد می‌کند. زمانی که جنگ عرضه پنبه و روابط تجاری را مختل کرد، بلافاصله باعث ویرانی اقتصادی برای صنایع نساجی در لیون، فرانسه شد، با وجود اینکه فرانسه در این درگیری دخیل نبود. این نشان می‌دهد که در یک اقتصاد جهانی به هم پیوسته، درگیری‌های محلی اثرات گسترده‌ای دارند و با شکستن زنجیره‌های تجاری، همه را فقیرتر می‌کنند. گزینه‌های دیگر به اشتباه انزوای اثرات یا منافع اقتصادی را پیشنهاد می‌دهند که با اصل هماهنگی منافع که بر وابستگی متقابل و زیان‌های مشترک تأکید دارد، در تضاد است.
question: ¿Qué demuestra el ejemplo de la repercusión de la Guerra Civil estadounidense en las industrias textiles de Lyon sobre la interdependencia económica?
answer: Los conflictos a distancia pueden causar daños económicos inmediatos a las regiones no participantes a través de la interrupción de las relaciones comerciales
wrong_answers:
  - Los conflictos militares afectan principalmente sólo a los países directamente implicados en la guerra
  - Las industrias europeas se beneficiaron de la menor competencia estadounidense durante la Guerra Civil
  - Aumenta la producción textil en Europa para compensar las perturbaciones del mercado estadounidense
explanation: |
  El ejemplo de la Guerra Civil estadounidense ilustra cómo la interdependencia económica crea una cadena de consecuencias a través de los continentes. Cuando la guerra interrumpió el suministro de algodón y las relaciones comerciales, provocó inmediatamente la ruina económica de las industrias textiles de Lyon (Francia), a pesar de que Francia no participaba en el conflicto. Esto demuestra que en una economía global interconectada, los conflictos locales tienen efectos de largo alcance, empobreciendo a todos cuando se rompen las cadenas comerciales. Las otras opciones sugieren incorrectamente el aislamiento de los efectos o los beneficios económicos, contradiciendo el principio de armonía de intereses que hace hincapié en la dependencia mutua y las pérdidas compartidas.
question: Apa yang ditunjukkan oleh contoh dampak Perang Saudara Amerika terhadap industri tekstil Lyon tentang saling ketergantungan ekonomi?
answer: Konflik jarak jauh dapat menyebabkan kerusakan ekonomi langsung pada wilayah yang tidak berpartisipasi melalui hubungan perdagangan yang terganggu
wrong_answers:
  - Konflik militer terutama hanya mempengaruhi negara-negara yang terlibat langsung dalam peperangan
  - Industri Eropa diuntungkan dari berkurangnya persaingan Amerika selama periode Perang Saudara
  - Produksi tekstil meningkat di Eropa untuk mengimbangi gangguan pasar Amerika
explanation: |
  Contoh Perang Saudara Amerika menggambarkan bagaimana saling ketergantungan ekonomi menciptakan rantai konsekuensi lintas benua. Ketika perang tersebut mengganggu pasokan kapas dan hubungan perdagangan, hal ini segera menyebabkan kehancuran ekonomi bagi industri tekstil di Lyon, Prancis, meskipun Prancis tidak terlibat dalam konflik tersebut. Hal ini menunjukkan bahwa dalam ekonomi global yang saling terhubung, konflik lokal memiliki dampak yang luas, membuat semua orang menjadi lebih miskin ketika rantai perdagangan terputus. Opsi-opsi lain secara keliru menyarankan isolasi efek atau manfaat ekonomi, yang bertentangan dengan prinsip keselarasan kepentingan yang menekankan ketergantungan timbal balik dan kerugian bersama.
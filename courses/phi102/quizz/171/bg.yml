question: Кои са трите основни форми на протекционизъм, определени от либералните икономисти от XIX в. като проява на несвобода?
answer: Тарифен протекционизъм в търговията, бариери пред професионалното лицензиране и антиимиграционни закони
wrong_answers:
  - Промишлени монополи, селскостопански субсидии и банкови регулации
  - Контрол на цените, ограничения на заплатите и манипулиране на валутата
  - Патентна защита, корпоративно данъчно облагане и привилегии на профсъюзите
explanation: |
  В главата се посочват три форми на протекционизъм, които заместват свободния обмен: тарифен протекционизъм (митнически бариери срещу чуждестранни стоки), "обичаи на конкурсите" (професионално лицензиране, което ограничава достъпа до професии) и протекционизъм на работниците чрез антиимиграционни закони. Всеки от тях представлява различен аспект на ограничаване на свободата - в търговията, в труда и в движението. Другите варианти, макар и потенциално протекционистични мерки, не са трите специфични форми, систематично анализирани в тази либерална икономическа рамка като основни проявления на несвободата, заместваща естествената конкуренция.
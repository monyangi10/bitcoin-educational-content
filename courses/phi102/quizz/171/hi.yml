question: What are the three main forms of protectionism identified by 19th-century liberal economists as manifestations of non-freedom?
answer: Tariff protectionism in trade, professional licensing barriers, and anti-immigration laws
wrong_answers:
  - Industrial monopolies, agricultural subsidies, and banking regulations
  - Price controls, wage restrictions, and currency manipulation
  - Patent protection, corporate taxation, and labor union privileges
explanation: |
  The chapter specifically identifies three forms of protectionism that replace free exchange: tariff protectionism (customs barriers against foreign goods), the 'customs of competitions' (professional licensing that limits entry into professions), and worker protectionism through anti-immigration laws. Each represents a different aspect of restricting freedom - in trade, in work, and in movement. The other options, while potentially protectionist measures, are not the three specific forms systematically analyzed in this liberal economic framework as the primary manifestations of non-freedom replacing natural competition.
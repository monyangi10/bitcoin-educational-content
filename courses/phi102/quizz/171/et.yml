question: Millised on kolm peamist protektsionismi vormi, mida 19. sajandi liberaalsed majandusteadlased määratlesid kui mittevabaduse ilminguid?
answer: Tariifne protektsionism kaubanduses, kutsealade litsentsimise tõkked ja immigratsioonivastased seadused
wrong_answers:
  - Tööstusmonopolid, põllumajandustoetused ja panganduse reguleerimine
  - Hinnakontroll, palgapiirangud ja valuutamanipulatsioonid
  - Patendikaitse, ettevõtete maksustamine ja ametiühingute privileegid
explanation: |
  Peatükis tuuakse konkreetselt välja kolm protektsionismi vormi, mis asendavad vaba vahetust: tolliprotektsionism (tollibarjäärid välismaiste kaupade suhtes), "võistlustavad" (kutsetegevuse litsentsimine, mis piirab kutsealadele sisenemist) ja töötajate protektsionism immigratsioonivastaste seaduste kaudu. Igaüks neist esindab vabaduse piiramise eri aspekte - kaubanduses, töös ja liikumises. Kuigi teised võimalused on potentsiaalselt protektsionistlikud meetmed, ei ole need kolm konkreetset vormi, mida selles liberaalses majandusraamistikus süstemaatiliselt analüüsitakse kui loomuliku konkurentsi asendava mittevabaduse esmaseid ilminguid.
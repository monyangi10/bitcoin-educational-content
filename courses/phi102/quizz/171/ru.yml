question: Какие три основные формы протекционизма были названы либеральными экономистами XIX века проявлениями несвободы?
answer: Тарифный протекционизм в торговле, барьеры для лицензирования профессиональной деятельности и антииммиграционные законы
wrong_answers:
  - Промышленные монополии, сельскохозяйственные субсидии и банковское регулирование
  - Контроль цен, ограничение заработной платы и манипуляции с валютой
  - Патентная защита, корпоративное налогообложение и привилегии профсоюзов
explanation: |
  В главе выделены три формы протекционизма, которые заменяют свободный обмен: тарифный протекционизм (таможенные барьеры против иностранных товаров), "обычаи соревнований" (профессиональное лицензирование, ограничивающее вход в профессию) и протекционизм работников через антииммиграционные законы. Каждый из них представляет собой отдельный аспект ограничения свободы - в торговле, в работе и в передвижении. Другие варианты, хотя и являются потенциально протекционистскими мерами, не являются тремя специфическими формами, систематически анализируемыми в рамках либеральной экономической системы как первичные проявления несвободы, замещающей естественную конкуренцию.
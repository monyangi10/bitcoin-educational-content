question: Jaké tři hlavní formy protekcionismu označili liberální ekonomové 19. století za projevy nesvobody?
answer: Celní protekcionismus v obchodě, překážky pro udělování profesních licencí a protiimigrační zákony
wrong_answers:
  - Průmyslové monopoly, zemědělské dotace a bankovní regulace
  - Kontrola cen, mzdová omezení a manipulace s měnou
  - Patentová ochrana, zdanění právnických osob a odborové výsady
explanation: |
  Kapitola konkrétně identifikuje tři formy protekcionismu, které nahrazují volnou výměnu: celní protekcionismus (celní bariéry proti zahraničnímu zboží), "zvyklosti soutěží" (profesní licence, které omezují vstup do profesí) a protekcionismus pracovníků prostřednictvím protiimigračních zákonů. Každý z nich představuje jiný aspekt omezování svobody - v obchodu, v práci a v pohybu. Ostatní možnosti, ačkoli se jedná o potenciálně protekcionistická opatření, nepředstavují tři specifické formy, které jsou systematicky analyzovány v tomto liberálním ekonomickém rámci jako primární projevy nesvobody nahrazující přirozenou konkurenci.
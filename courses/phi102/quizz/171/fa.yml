question: سه شکل اصلی حمایت‌گرایی که توسط اقتصاددانان لیبرال قرن نوزدهم به عنوان نمودهای عدم آزادی شناسایی شده‌اند، کدامند؟
answer: حمایت‌گرایی تعرفه‌ای در تجارت، موانع صدور مجوز حرفه‌ای، و قوانین ضد مهاجرتی
wrong_answers:
  - انحصارهای صنعتی، یارانه‌های کشاورزی، و مقررات بانکی
  - کنترل قیمت‌ها، محدودیت‌های دستمزد، و دستکاری ارز
  - حمایت از حق ثبت اختراع، مالیات شرکت‌ها، و امتیازات اتحادیه‌های کارگری
explanation: |
  این فصل به طور خاص سه شکل از حمایت‌گرایی را که جایگزین تبادل آزاد می‌شوند، شناسایی می‌کند: حمایت‌گرایی تعرفه‌ای (موانع گمرکی علیه کالاهای خارجی)، 'گمرک رقابت‌ها' (مجوزهای حرفه‌ای که ورود به حرفه‌ها را محدود می‌کند)، و حمایت‌گرایی کارگران از طریق قوانین ضد مهاجرت. هر یک جنبه متفاوتی از محدود کردن آزادی را نشان می‌دهد - در تجارت، در کار، و در حرکت. گزینه‌های دیگر، در حالی که ممکن است اقدامات حمایت‌گرایانه باشند، سه شکل خاصی نیستند که به طور سیستماتیک در این چارچوب اقتصادی لیبرال به عنوان تجلیات اصلی عدم آزادی که جایگزین رقابت طبیعی می‌شوند، تحلیل شده‌اند.
question: 19 世紀的自由經濟學家認為保護主義是不自由的表現，那麼保護主義的三種主要形式是什麼？
answer: 貿易中的關稅保護主義、專業執照障礙和反移民法
wrong_answers:
  - 工業壟斷、農業補貼和銀行法規
  - 價格控制、工資限制和貨幣操縱
  - 專利保護、公司稅收與工會特權
explanation: |
  本章特別指出取代自由交流的三種保護主義形式：關稅保護主義（針對外國商品的關稅壁壘）、「競爭風俗」（限制進入專業的專業執照），以及透過反移民法的勞工保護主義。每一種都代表了限制自由的不同層面--在貿易、工作和流動方面。其他的選擇，雖然可能是保護主義的措施，但卻不是這個自由經濟架構所系統性分析的三種特定形式，是非自由取代自然競爭的主要表現。
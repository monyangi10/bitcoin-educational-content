question: 19 世纪的自由主义经济学家认为保护主义是非自由的表现形式，那么保护主义的三种主要形式是什么？
answer: 贸易中的关税保护主义、职业许可壁垒和反移民法
wrong_answers:
  - 工业垄断、农业补贴和银行法规
  - 价格控制、工资限制和货币操纵
  - 专利保护、公司税收和工会特权
explanation: |
  本章特别指出了取代自由交流的三种形式的保护主义：关税保护主义（针对外国商品的关税壁垒）、"竞争习俗"（限制进入职业的职业许可）以及通过反移民法实行的工人保护主义。每种做法都从不同方面限制了贸易、工作和流动自由。其他选择虽然可能是保护主义措施，但并不是这一自由经济框架中系统分析的三种具体形式，因为它们是非自由取代自然竞争的主要表现形式。
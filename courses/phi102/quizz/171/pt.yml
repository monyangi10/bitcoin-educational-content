question: Quais são as três principais formas de protecionismo identificadas pelos economistas liberais do século XIX como manifestações de não-liberdade?
answer: Protecionismo tarifário no comércio, barreiras ao licenciamento profissional e leis anti-imigração
wrong_answers:
  - Monopólios industriais, subsídios agrícolas e regulamentação bancária
  - Controlos de preços, restrições salariais e manipulação de moeda
  - Proteção de patentes, tributação das empresas e privilégios sindicais
explanation: |
  O capítulo identifica especificamente três formas de protecionismo que substituem o livre intercâmbio: o protecionismo pautal (barreiras alfandegárias contra bens estrangeiros), os "costumes da concorrência" (licenças profissionais que limitam a entrada em profissões) e o protecionismo dos trabalhadores através de leis anti-imigração. Cada uma delas representa um aspeto diferente da restrição da liberdade - no comércio, no trabalho e na circulação. As outras opções, embora potencialmente medidas proteccionistas, não são as três formas específicas sistematicamente analisadas neste quadro económico liberal como as principais manifestações da não-liberdade que substitui a concorrência natural.
question: Wat zijn de drie belangrijkste vormen van protectionisme die door 19e-eeuwse liberale economen werden geïdentificeerd als manifestaties van onvrijheid?
answer: Tariefprotectionisme in de handel, professionele licentiebarrières en anti-immigratiewetten
wrong_answers:
  - Industriële monopolies, landbouwsubsidies en bankvoorschriften
  - Prijscontroles, loonbeperkingen en valutamanipulatie
  - Octrooibescherming, vennootschapsbelasting en vakbondsrechten
explanation: |
  Het hoofdstuk identificeert specifiek drie vormen van protectionisme die vrije uitwisseling vervangen: tariefprotectionisme (douanebarrières tegen buitenlandse goederen), de 'gewoontes van competities' (beroepsvergunningen die de toegang tot beroepen beperken) en arbeidersprotectionisme door anti-immigratiewetten. Elk van deze opties vertegenwoordigt een ander aspect van het beperken van de vrijheid - in handel, werk en verkeer. De andere opties, hoewel potentieel protectionistische maatregelen, zijn niet de drie specifieke vormen die systematisch worden geanalyseerd in dit liberale economische kader als de primaire manifestaties van onvrijheid die natuurlijke concurrentie vervangt.
question: Koja su tri glavna oblika protekcionizma koja su identifikovali ekonomisti liberali iz 19. veka kao manifestacije neslobode?
answer: Protektcionizam tarifa u trgovini, barijere profesionalnog licenciranja i zakoni protiv imigracije
wrong_answers:
  - Industrijske monopole, poljoprivredne subvencije i bankarske regulative
  - Kontrola cena, ograničenja plata i manipulacija valutom
  - Zaštita patenata, oporezivanje korporacija i privilegije sindikata
explanation: |
  Poglavlje posebno identifikuje tri oblika protekcionizma koji zamenjuju slobodnu razmenu: tarifni protekcionizam (carinske barijere protiv strane robe), 'carine konkurencije' (profesionalne licence koje ograničavaju ulazak u profesije) i radnički protekcionizam kroz antiimigracione zakone. Svaki predstavlja različit aspekt ograničavanja slobode - u trgovini, radu i kretanju. Druge opcije, iako potencijalno protekcionističke mere, nisu tri specifična oblika sistematski analizirana u ovom liberalnom ekonomskom okviru kao primarne manifestacije neslobode koja zamenjuje prirodnu konkurenciju.
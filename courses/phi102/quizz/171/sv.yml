question: Vilka är de tre huvudsakliga formerna av protektionism som liberala ekonomer på 1800-talet identifierade som uttryck för ofrihet?
answer: Tariffprotektionism inom handel, hinder för yrkeslicenser och lagar mot invandring
wrong_answers:
  - Industriella monopol, jordbrukssubventioner och bankregleringar
  - Priskontroller, lönerestriktioner och valutamanipulation
  - Patentskydd, företagsbeskattning och fackliga privilegier
explanation: |
  I kapitlet identifieras särskilt tre former av protektionism som ersätter fritt utbyte: tullprotektionism (tullhinder mot utländska varor), "tävlingstullar" (yrkeslicenser som begränsar tillträdet till yrken) och arbetarprotektionism genom lagar mot invandring. Var och en av dem representerar en annan aspekt av att begränsa friheten - i handel, i arbete och i rörlighet. De andra alternativen är visserligen potentiellt protektionistiska åtgärder, men de är inte de tre specifika former som systematiskt analyseras i detta liberala ekonomiska ramverk som de primära manifestationerna av ofrihet som ersätter naturlig konkurrens.
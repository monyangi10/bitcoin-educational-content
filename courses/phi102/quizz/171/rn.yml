question: Ni ubuhe buryo butatu nyamukuru bwo gukingira igihugu bwagaragajwe n’abahinga mu vy’ubutunzi bo mu kinjana ca 19 ko ari ibimenyetso vy’ukutagira umwidegemvyo?
answer: Ugukingira amakori mu bucuruzi, intambamyi zo gutanga uruhusha rw'umwuga, n'amategeko arwanya abimukira
wrong_answers:
  - Inganda zifise ubutunzi bumwe, infashanyo z'uburimyi, n'amabwirizwa y'amabanki
  - Gucungera ibiciro, guhagarika umushahara, no gukoresha nabi amafaranga
  - Uburinzi bw'uburenganzira bw'umuhinguzi, imisoro y'amashirahamwe, n'uburenganzira bw'amasendika y'abakozi
explanation: |
  Ico gice kirerekana canecane uburyo butatu bwo gukingira ubutunzi busubirira uguhinduranya amahera ku buntu: ukwikingira amakori (intambamyi z’amaduwani ku bicuruzwa vy’amahanga), ‘imigenzo y’amarushanwa’ (uruhusha rw’umwuga rugabanya kwinjira mu mwuga), n’ugukingira abakozi biciye mu mategeko arwanya abimukira. Imwe yose igereranya umuce utandukanye wo kubuza umwidegemvyo - mu bucuruzi, mu kazi, no mu kwiruka. Ayandi mahitamwo, naho yoba ari ingingo zo gukingira, si uburyo butatu bwihariye busesangurwa mu buryo butunganye muri iyo nzira y’ubutunzi bw’ubwigenge nk’ibimenyetso vya mbere vy’ukutagira umwidegemvyo gusubirira uguhiganwa kw’ibinyabuzima.
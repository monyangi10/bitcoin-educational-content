question: Quali sono le tre principali forme di protezionismo identificate dagli economisti liberali del XIX secolo come manifestazioni di non libertà?
answer: Protezionismo tariffario nel commercio, barriere alle licenze professionali e leggi anti-immigrazione
wrong_answers:
  - Monopoli industriali, sussidi all'agricoltura e regolamentazioni bancarie
  - Controllo dei prezzi, restrizioni salariali e manipolazione della valuta
  - Protezione dei brevetti, tassazione delle imprese e privilegi sindacali
explanation: |
  Il capitolo identifica specificamente tre forme di protezionismo che sostituiscono il libero scambio: il protezionismo tariffario (barriere doganali contro le merci straniere), le "dogane dei concorsi" (licenze professionali che limitano l'ingresso nelle professioni) e il protezionismo dei lavoratori attraverso le leggi anti-immigrazione. Ognuno di essi rappresenta un aspetto diverso della limitazione della libertà - nel commercio, nel lavoro e nella circolazione. Le altre opzioni, pur essendo potenzialmente misure protezionistiche, non sono le tre forme specifiche analizzate sistematicamente in questo quadro economico liberale come manifestazioni primarie della non libertà che sostituisce la concorrenza naturale.
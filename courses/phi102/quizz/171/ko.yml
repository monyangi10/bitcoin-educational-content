question: 19세기 자유주의 경제학자들이 비자유주의의 표현으로 파악한 세 가지 주요 형태의 보호주의는 무엇인가요?
answer: 무역에서의 관세 보호주의, 전문직 라이선스 장벽, 반이민법
wrong_answers:
  - 산업 독점, 농업 보조금 및 은행 규제
  - 가격 통제, 임금 제한 및 통화 조작
  - 특허 보호, 법인세 및 노동조합 특권
explanation: |
  이 장에서는 관세 보호주의(외국 상품에 대한 관세 장벽), '경쟁의 관습'(직업 진입을 제한하는 전문 자격증), 반이민법을 통한 근로자 보호주의의 세 가지 형태의 보호주의가 자유 교역을 대체하는 것으로 구체적으로 설명합니다. 각 방식은 무역, 노동, 이동 등 자유를 제한하는 각기 다른 측면을 나타냅니다. 다른 옵션은 잠재적으로 보호주의적 조치이기는 하지만, 자유주의 경제 프레임워크에서 자연스러운 경쟁을 대체하는 비자유의 주요 징후로 체계적으로 분석된 세 가지 구체적인 형태는 아닙니다.
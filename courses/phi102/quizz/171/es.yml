question: ¿Cuáles son las tres principales formas de proteccionismo identificadas por los economistas liberales del siglo XIX como manifestaciones de la falta de libertad?
answer: Proteccionismo arancelario en el comercio, barreras a las licencias profesionales y leyes contra la inmigración
wrong_answers:
  - Monopolios industriales, subvenciones agrícolas y regulación bancaria
  - Controles de precios, restricciones salariales y manipulación de divisas
  - Protección de patentes, impuesto de sociedades y privilegios sindicales
explanation: |
  El capítulo identifica específicamente tres formas de proteccionismo que sustituyen al libre intercambio: el proteccionismo arancelario (barreras aduaneras contra las mercancías extranjeras), las "costumbres de las competencias" (licencias profesionales que limitan el acceso a las profesiones) y el proteccionismo de los trabajadores a través de leyes contra la inmigración. Cada uno representa un aspecto diferente de la restricción de la libertad: en el comercio, en el trabajo y en la circulación. Las otras opciones, aunque son medidas potencialmente proteccionistas, no son las tres formas específicas analizadas sistemáticamente en este marco económico liberal como las manifestaciones primarias de la no libertad que sustituye a la competencia natural.
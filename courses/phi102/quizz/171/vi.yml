question: Ba hình thức bảo hộ chính mà các nhà kinh tế tự do thế kỷ 19 xác định là biểu hiện của sự thiếu tự do là gì?
answer: Chủ nghĩa bảo hộ thuế quan trong thương mại, rào cản cấp phép hành nghề và luật chống nhập cư.
wrong_answers:
  - Độc quyền công nghiệp, trợ cấp nông nghiệp và quy định ngân hàng
  - Kiểm soát giá cả, hạn chế tiền lương và thao túng tiền tệ
  - Bảo hộ bằng sáng chế, thuế doanh nghiệp và đặc quyền của công đoàn lao động
explanation: |
  Chương này đặc biệt chỉ ra ba hình thức bảo hộ thay thế cho trao đổi tự do: bảo hộ thuế quan (rào cản hải quan đối với hàng hóa nước ngoài), "tập quán cạnh tranh" (cấp phép hành nghề hạn chế gia nhập ngành nghề) và bảo hộ người lao động thông qua luật chống nhập cư. Mỗi hình thức thể hiện một khía cạnh khác nhau của việc hạn chế tự do - trong thương mại, trong việc làm và trong di chuyển. Các lựa chọn khác, mặc dù cũng có khả năng là các biện pháp bảo hộ, nhưng không phải là ba hình thức cụ thể được phân tích một cách có hệ thống trong khuôn khổ kinh tế tự do này như là những biểu hiện chính của việc phi tự do thay thế cạnh tranh tự nhiên.
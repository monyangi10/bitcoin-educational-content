question: Quelle est, selon le texte, la principale méthode de réforme des libertés, et quel exemple historique illustre cette approche ?
answer: Grâce à la mobilisation de l'opinion publique et au débat d'idées, comme l'ont démontré Cobden et la Ligue contre la loi sur le maïs (Anti-Corn Law League) en Angleterre
wrong_answers:
  - Par le biais d'un bouleversement révolutionnaire et d'un remplacement complet du système, comme l'a démontré la transformation de la société par la Révolution française
  - Par l'intervention progressive de l'État et la réforme de la réglementation, comme l'ont montré les politiques de commerce des céréales des physiocrates en France
  - Grâce à la coopération internationale et à la négociation de traités, comme l'ont montré les mouvements de libre-échange européens du 18e siècle
explanation: |
  Le texte plaide explicitement en faveur de la réforme plutôt que de la révolution, citant l'analyse de Tocqueville selon laquelle les révolutions sont coûteuses et consolident souvent le pouvoir centralisé. Il présente Cobden et l'Anti-Corn Law League comme l'approche modèle, parvenant à l'abolition des lois sur les céréales par le biais de réunions organisées et de débats publics dans toute la Grande-Bretagne. Cette méthode s'aligne sur les valeurs libérales de concurrence, de liberté et de perfectibilité par la persuasion plutôt que par la force.

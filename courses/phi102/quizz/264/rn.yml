question: Ni igiki ico canditswe kigaragaza ko ari uburyo nyamukuru bwo guhindura umwidegemvyo, kandi ni akarorero akahe k’akahise kerekana ubwo buryo?
answer: Biciye mu gukoranya ivyiyumviro vya bose no guhanahana ivyiyumviro, nk’uko vyerekanwa na Cobden hamwe n’ishirahamwe ry’amategeko arwanya ibigori ryo mu Bwongereza .
wrong_answers:
  - "\"Biciye mu gutera umuvurungano w'abanyagihugu no gusubirira uburyo bwose, nk'uko vyerekanwa n'ihinduka ry'imibano ry'abanyagihugu b'Abafaransa\"."
  - "\"Biciye mu gufasha Leta buhoro buhoro no guhindura amategeko, nk'uko vyerekanwa n'amategeko y'ubudandaji bw'intete y'abanyagihugu mu Bufaransa\""
  - Biciye ku gukorana n’amakungu no ku biganiro vy’amasezerano, nk’uko vyerekanwa n’imigwi y’ubudandaji bwigenga yo mu Buraya yo mu kinjana ca 18 .
explanation: |
  Ico canditswe kirashigikira mu buryo butomoye ihinduka kuruta amahinduka, kivuga isesengura rya Tocqueville ry’uko amahinduka atwara amahera menshi kandi akenshi akomeza ububasha bushingiye ku rwego rwo hejuru. Irerekana Cobden n’ishirahamwe ry’amategeko arwanya ibigori nk’uburyo bw’akarorero, bushika ku gukuraho amategeko agenga ivy’intete biciye mu nama zitunganijwe no mu mpari za bose mu Bwongereza bwose. Ubwo buryo burahuye n’agaciro k’ubwigenge k’uguhiganwa, umwidegemvyo be n’ugutungana biciye mu kwemeza aho gukoresha inguvu.
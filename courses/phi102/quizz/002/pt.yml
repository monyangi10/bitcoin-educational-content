question: O que é que os Idéologues identificaram como o primeiro facto fundamental sobre os seres humanos que sustenta a teoria da liberdade?
answer: O ser humano constitui um corpo físico que ocupa necessariamente um espaço
wrong_answers:
  - Os seres humanos têm um desejo inato de participação política e de direito de voto
  - Os seres humanos possuem capacidades de pensamento racional que os distinguem dos animais
  - Os seres humanos formam naturalmente contratos sociais para organizar a tomada de decisões colectivas
explanation: |
  Os Idéologues identificaram o facto de os seres humanos constituírem um corpo físico que ocupa o espaço como o facto fundamental que sustenta a liberdade. Esta realidade física cria um uso exclusivo - quando alguém dorme numa cama, ocupa-a exclusivamente, mesmo em sociedades colectivistas. Isto demonstra que a propriedade emerge da nossa existência corpórea e não das convenções sociais. As outras opções centram-se em aspectos políticos, racionais ou sociais, mas os Idéologues enfatizaram a realidade física básica da existência humana como o ponto de partida para a compreensão da liberdade e dos direitos de propriedade.
question: Кой е първият фундаментален факт за човека, който подкрепя теорията за свободата, според идеолозите?
answer: Хората представляват физическо тяло, което задължително заема пространство
wrong_answers:
  - Хората имат вродено желание за политическо участие и право на глас
  - Хората притежават способности за рационално мислене, които ги отличават от животните
  - Хората естествено сключват социални договори, за да организират колективното вземане на решения
explanation: |
  Идеолозите определят факта, че човекът представлява физическо тяло, което заема пространство, като основополагащ факт в подкрепа на свободата. Тази физическа реалност създава изключителна употреба - когато някой спи в едно легло, той го заема изключително дори в колективистичните общества. Това показва, че собствеността възниква от нашето телесно съществуване, а не от социалните конвенции. Другите варианти се фокусират върху политически, рационални или социални аспекти, но Идеолозите наблягат на основната физическа реалност на човешкото съществуване като отправна точка за разбирането на свободата и правото на собственост.
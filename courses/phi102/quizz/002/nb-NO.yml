question: Hva identifiserte Idéologene som det første grunnleggende faktum om mennesket som støtter teorien om frihet?
answer: Mennesket utgjør en fysisk kropp som nødvendigvis opptar plass
wrong_answers:
  - Mennesker har et medfødt ønske om politisk deltakelse og stemmerett
  - Mennesket har en rasjonell tenkeevne som skiller det fra dyrene
  - Mennesker danner naturlig sosiale kontrakter for å organisere kollektiv beslutningstaking
explanation: |
  Idéologene identifiserte det at mennesket utgjør en fysisk kropp som okkuperer et rom, som det grunnleggende faktum som støtter opp om friheten. Denne fysiske realiteten skaper eksklusiv bruk - når noen sover i en seng, okkuperer de den eksklusivt, selv i kollektivistiske samfunn. Dette viser at eiendom springer ut av vår kroppslige eksistens, ikke av sosiale konvensjoner. De andre alternativene fokuserer på politiske, rasjonelle eller sosiale aspekter, men Idéologene vektla den grunnleggende fysiske realiteten i menneskets eksistens som utgangspunkt for å forstå frihet og eiendomsrett.
question: Was haben die Idéologen als erste grundlegende Tatsache über den Menschen identifiziert, die die Theorie der Freiheit stützt?
answer: Der Mensch ist ein physischer Körper, der notwendigerweise Raum einnimmt
wrong_answers:
  - Der Mensch hat einen angeborenen Wunsch nach politischer Beteiligung und Wahlrecht
  - Der Mensch verfügt über rationale Denkfähigkeiten, die ihn von Tieren unterscheiden
  - Menschen schließen von Natur aus soziale Verträge, um kollektive Entscheidungen zu organisieren
explanation: |
  Die Idéologen sahen in der Tatsache, dass der Mensch ein physischer Körper ist, der den Raum besetzt, die Grundlage für die Freiheit. Diese physische Realität führt zu einer exklusiven Nutzung - wenn jemand in einem Bett schläft, nutzt er es exklusiv, selbst in kollektivistischen Gesellschaften. Dies zeigt, dass Eigentum aus unserer körperlichen Existenz erwächst und nicht aus sozialen Konventionen. Die anderen Optionen konzentrieren sich auf politische, rationale oder soziale Aspekte, aber die Idéologen betonen die grundlegende physische Realität der menschlichen Existenz als Ausgangspunkt für das Verständnis von Freiheit und Eigentumsrechten.
question: Quel est, selon les Idéologues, le premier fait fondamental sur l'être humain qui étaye la théorie de la liberté ?
answer: L'homme constitue un corps physique qui occupe nécessairement un espace
wrong_answers:
  - Les êtres humains ont un désir inné de participation politique et de droit de vote
  - L'homme possède des capacités de réflexion rationnelle qui le distinguent de l'animal
  - Les humains forment naturellement des contrats sociaux pour organiser la prise de décision collective
explanation: |
  Les Idéologues ont identifié le fait que les humains constituent un corps physique occupant l'espace comme le fait fondateur de la liberté. Cette réalité physique crée un usage exclusif - lorsque quelqu'un dort dans un lit, il l'occupe exclusivement, même dans les sociétés collectivistes. Cela démontre que la propriété émerge de notre existence corporelle, et non des conventions sociales. Les autres options se concentrent sur des aspects politiques, rationnels ou sociaux, mais les Idéologues ont mis l'accent sur la réalité physique fondamentale de l'existence humaine comme point de départ pour comprendre la liberté et les droits de propriété.
question: Ni igiki aba Idéologues bamenyesheje ko ari co kintu ca mbere c’ishimikiro ku bijanye n’abantu gishigikira inyigisho y’umwidegemvyo?
answer: Abantu bagize umubiri w'umubiri ufata umwanya ata kabuza .
wrong_answers:
  - Abantu barafise icipfuzo co kugira uruhara mu vya politike no kugira uburenganzira bwo gutora
  - Abantu barafise ubushobozi bwo kwiyumvira mu buryo bubereye bubatandukanya n'ibikoko .
  - Abantu mu bisanzwe baragira amasezerano y'imibano kugira ngo batunganye gufata ingingo rusangi
explanation: |
  Aba Idéologues bamenyesheje ko abantu ari umubiri w’umubiri ufata ikibanza nk’ikintu nyamukuru gishigikira umwidegemvyo. Ukwo kuri kw’umubiri kurema ugukoreshwa gusa - iyo umuntu aryamye mu gitanda, babifata gusa mbere no mu mibano y’abanyagihugu. Ivyo vyerekana ko umutungo uva mu kubaho kwacu kw’umubiri, atari mu masezerano y’imibano. Ayandi mahitamwo yibanda ku bijanye n’ivya politike, ivy’ubwenge canke ivy’imibano, ariko aba Idéologues bashimikiye cane ku vy’ukuri vy’umubiri vy’ishimikiro vy’ubuzima bw’umuntu nk’intango yo gutahura umwidegemvyo n’uburenganzira bw’itunga.
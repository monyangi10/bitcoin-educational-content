question: Wanataaluma wa Idéologues walitambua nini kama ukweli wa kwanza wa msingi kuhusu wanadamu unaounga mkono nadharia ya uhuru?
answer: Wanadamu huunda mwili halisi ambao lazima uchukue nafasi
wrong_answers:
  - Wanadamu wana hamu ya asili ya ushiriki wa kisiasa na haki za kupiga kura
  - Binadamu wana uwezo wa kufikiri kwa busara unaowatofautisha na wanyama
  - Binadamu kwa kawaida huunda mikataba ya kijamii ili kupanga maamuzi ya pamoja
explanation: |
  Wanataaluma wa Idéologues walibainisha kuwa wanadamu huunda mwili halisi unaokaa nafasi kama ukweli wa msingi unaounga mkono uhuru. Ukweli huu halisi huunda matumizi ya kipekee - mtu anapolala kitandani, anautumia pekee hata katika jamii za kijamii. Hii inaonyesha kwamba mali hutokana na uhai wetu wa kimwili, si kutokana na mikusanyiko ya kijamii. Chaguzi zingine zinazingatia vipengele vya kisiasa, kimantiki, au kijamii, lakini Wanataaluma wa Idéologues walisisitiza ukweli wa kimwili wa kuwepo kwa binadamu kama mahali pa kuanzia kuelewa uhuru na haki za mali.
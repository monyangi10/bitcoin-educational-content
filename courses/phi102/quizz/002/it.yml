question: Qual è il primo dato fondamentale che gli Idéologues hanno individuato nell'essere umano a sostegno della teoria della libertà?
answer: Gli esseri umani costituiscono un corpo fisico che occupa necessariamente uno spazio
wrong_answers:
  - Gli esseri umani hanno un desiderio innato di partecipazione politica e di diritto di voto
  - Gli esseri umani possiedono capacità di pensiero razionale che li distinguono dagli animali
  - Gli esseri umani formano naturalmente contratti sociali per organizzare il processo decisionale collettivo
explanation: |
  Gli Idéologues hanno individuato nel fatto che gli esseri umani costituiscono un corpo fisico che occupa lo spazio il fatto fondante della libertà. Questa realtà fisica crea un uso esclusivo: quando qualcuno dorme in un letto, lo occupa in modo esclusivo anche nelle società collettiviste. Questo dimostra che la proprietà emerge dalla nostra esistenza corporea, non dalle convenzioni sociali. Le altre opzioni si concentrano su aspetti politici, razionali o sociali, ma gli Idéologues sottolineano la realtà fisica di base dell'esistenza umana come punto di partenza per comprendere la libertà e i diritti di proprietà.
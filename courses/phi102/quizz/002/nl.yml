question: Wat identificeerden de Idéologues als het eerste fundamentele feit over mensen dat de theorie van vrijheid ondersteunt?
answer: Mensen vormen een fysiek lichaam dat noodzakelijkerwijs ruimte inneemt
wrong_answers:
  - Mensen hebben een aangeboren verlangen naar politieke participatie en stemrecht
  - Mensen hebben een rationeel denkvermogen dat hen onderscheidt van dieren
  - Mensen vormen van nature sociale contracten om collectieve besluitvorming te organiseren
explanation: |
  De Idéologues identificeerden dat mensen een fysiek lichaam vormen dat ruimte inneemt als het fundamentele feit dat vrijheid ondersteunt. Deze fysieke realiteit creëert exclusief gebruik - wanneer iemand in een bed slaapt, neemt hij dit exclusief in gebruik, zelfs in collectivistische samenlevingen. Dit toont aan dat eigendom voortkomt uit ons lichamelijke bestaan, niet uit sociale conventies. De andere opties richten zich op politieke, rationele of sociale aspecten, maar de Idéologues benadrukten de fundamentele fysieke realiteit van het menselijk bestaan als uitgangspunt voor het begrijpen van vrijheid en eigendomsrechten.
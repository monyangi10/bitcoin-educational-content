question: イデオローグたちは、自由論を支える人間に関する最初の基本的事実として何を挙げたのか？
answer: 人間は必然的に空間を占める肉体を構成する
wrong_answers:
  - 人間には生来、政治参加と選挙権への欲求がある
  - 人間は動物とは異なる理性的思考能力を持っている
  - 人間は、集団的意思決定を組織するために、自然に社会的契約を結ぶ。
explanation: |
  イデオローグたちは、人間が空間を占有する肉体を構成していることを、自由を支える基礎的な事実として認識した。この物理的現実が排他的な使用を生み出す。誰かがベッドで寝れば、集団主義社会であっても、その人はベッドを排他的に占有する。これは、財産が社会的慣習からではなく、私たちの身体的存在から生まれることを示している。他の選択肢は政治的、合理的、社会的側面に焦点を当てるが、イデオローグは自由と財産権を理解する出発点として、人間存在の基本的な身体的現実を強調した。
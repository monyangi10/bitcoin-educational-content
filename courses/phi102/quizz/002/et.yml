question: Mida Idéologues määratlesid esimese põhilise tõsiasjana inimese kohta, mis toetab vabaduse teooriat?
answer: Inimene moodustab füüsilise keha, mis tingimata võtab ruumi sisse
wrong_answers:
  - Inimestel on loomupärane soov poliitikas osalemiseks ja hääleõiguse saamiseks
  - Inimesel on ratsionaalne mõtlemisvõime, mis eristab teda loomadest
  - Inimesed moodustavad loomulikult sotsiaalseid lepinguid, et organiseerida kollektiivset otsustamist
explanation: |
  Idéoloogid määratlesid, et inimesed moodustavad füüsilise keha, mis hõivab ruumi, kui vabadust toetava põhitõe. See füüsiline reaalsus loob ainuõiguse - kui keegi magab voodis, siis hõivab ta seda isegi kollektivistlikes ühiskondades ainuüksi. See näitab, et omand tuleneb meie kehalisest eksistentsist, mitte sotsiaalsetest konventsioonidest. Teised valikud keskenduvad poliitilistele, ratsionaalsetele või sotsiaalsetele aspektidele, kuid idéoloogid rõhutasid inimeksistentsi füüsilist põhireaalsust kui vabaduse ja omandiõiguse mõistmise lähtepunkti.
question: นักอุดมการณ์ (Idéologues) ระบุข้อเท็จจริงพื้นฐานแรกเกี่ยวกับมนุษย์ที่สนับสนุนทฤษฎีเสรีภาพว่าอะไร?
answer: มนุษย์ประกอบด้วยร่างกายทางกายภาพที่จำเป็นต้องครอบครองพื้นที่
wrong_answers:
  - มนุษย์มีความปรารถนาโดยธรรมชาติในการมีส่วนร่วมทางการเมืองและสิทธิในการลงคะแนนเสียง
  - มนุษย์มีความสามารถในการคิดอย่างมีเหตุผลที่ทำให้พวกเขาแตกต่างจากสัตว์
  - มนุษย์สร้างสัญญาทางสังคมโดยธรรมชาติเพื่อจัดระเบียบการตัดสินใจร่วมกัน
explanation: |
  นักอุดมการณ์ระบุว่ามนุษย์ประกอบด้วยร่างกายทางกายภาพที่ครอบครองพื้นที่เป็นข้อเท็จจริงพื้นฐานที่สนับสนุนเสรีภาพ ความเป็นจริงทางกายภาพนี้สร้างการใช้ประโยชน์เฉพาะบุคคล - เมื่อมีคนหลับในเตียง พวกเขาครอบครองมันโดยเฉพาะแม้ในสังคมแบบรวมหมู่ สิ่งนี้แสดงให้เห็นว่าทรัพย์สินเกิดจากการดำรงอยู่ทางกายภาพของเรา ไม่ใช่จากขนบธรรมเนียมทางสังคม ตัวเลือกอื่น ๆ มุ่งเน้นไปที่ด้านการเมือง เหตุผล หรือสังคม แต่เหล่านักอุดมการณ์เน้นย้ำถึงความเป็นจริงทางกายภาพพื้นฐานของการดำรงอยู่ของมนุษย์เป็นจุดเริ่มต้นในการทำความเข้าใจเสรีภาพและสิทธิในทรัพย์สิน
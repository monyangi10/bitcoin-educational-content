question: Các nhà tư tưởng theo chủ nghĩa duy vật đã xác định đâu là sự thật cơ bản đầu tiên về con người, là nền tảng cho lý thuyết về tự do?
answer: Con người là một thể xác vật lý, và thể xác này nhất thiết phải chiếm không gian.
wrong_answers:
  - Con người vốn có khát vọng bẩm sinh được tham gia chính trị và có quyền bầu cử.
  - Con người sở hữu khả năng tư duy lý trí, điều này giúp phân biệt họ với động vật.
  - Con người vốn dĩ hình thành các khế ước xã hội để tổ chức việc ra quyết định tập thể.
explanation: |
  Các nhà tư tưởng theo chủ nghĩa duy vật xác định rằng con người cấu thành một thể xác vật lý chiếm không gian là thực tế nền tảng hỗ trợ cho tự do. Thực tế vật lý này tạo ra quyền sử dụng độc quyền - khi ai đó ngủ trên giường, họ chiếm giữ nó một cách độc quyền ngay cả trong các xã hội tập thể. Điều này chứng tỏ rằng tài sản phát sinh từ sự tồn tại thể xác của chúng ta, chứ không phải từ các quy ước xã hội. Các lựa chọn khác tập trung vào các khía cạnh chính trị, lý tính hoặc xã hội, nhưng các nhà tư tưởng theo chủ nghĩa duy vật nhấn mạnh thực tế vật lý cơ bản của sự tồn tại của con người như là điểm khởi đầu để hiểu về tự do và quyền sở hữu.
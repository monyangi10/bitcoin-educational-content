question: Что "Идеологи" назвали первым фундаментальным фактом о человеке, который подтверждает теорию свободы?
answer: Человек представляет собой физическое тело, которое обязательно занимает пространство
wrong_answers:
  - У людей есть врожденное стремление к участию в политической жизни и избирательному праву
  - Люди обладают способностью к рациональному мышлению, что отличает их от животных
  - Люди естественным образом заключают социальные договоры для организации коллективного принятия решений
explanation: |
  Основополагающим фактом, поддерживающим свободу, "Идеологи" считали то, что человек представляет собой физическое тело, занимающее пространство. Эта физическая реальность создает исключительное пользование - когда кто-то спит в кровати, он занимает ее исключительно даже в коллективистских обществах. Это доказывает, что собственность возникает из нашего телесного существования, а не из социальных условностей. Другие варианты фокусируются на политических, рациональных или социальных аспектах, но "Идеологи" подчеркивают основную физическую реальность человеческого существования как отправную точку для понимания свободы и прав собственности.
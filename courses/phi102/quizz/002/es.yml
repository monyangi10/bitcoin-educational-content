question: ¿Qué identificaron los idéologues como el primer hecho fundamental sobre el ser humano que sustenta la teoría de la libertad?
answer: Los seres humanos constituyen un cuerpo físico que ocupa necesariamente un espacio
wrong_answers:
  - El ser humano tiene un deseo innato de participación política y derecho al voto
  - Los seres humanos poseen capacidades de pensamiento racional que los distinguen de los animales
  - Los seres humanos forman contratos sociales de forma natural para organizar la toma de decisiones colectiva
explanation: |
  Los idéologues identificaron que los seres humanos constituyen un cuerpo físico que ocupa el espacio como el hecho fundacional que sustenta la libertad. Esta realidad física crea un uso exclusivo: cuando alguien duerme en una cama, la ocupa en exclusiva, incluso en las sociedades colectivistas. Esto demuestra que la propiedad surge de nuestra existencia corpórea, no de convenciones sociales. Las otras opciones se centran en aspectos políticos, racionales o sociales, pero los Idéologues hicieron hincapié en la realidad física básica de la existencia humana como punto de partida para entender la libertad y los derechos de propiedad.
question: İdéologue'lar özgürlük teorisini destekleyen insanlarla ilgili ilk temel olgu olarak neyi tanımlamışlardır?
answer: İnsanlar zorunlu olarak yer kaplayan fiziksel bir beden oluştururlar
wrong_answers:
  - İnsanlar siyasi katılım ve oy kullanma hakları için doğuştan gelen bir arzuya sahiptir
  - İnsanlar, kendilerini hayvanlardan ayıran rasyonel düşünme yeteneklerine sahiptir
  - İnsanlar kolektif karar alma süreçlerini düzenlemek için doğal olarak sosyal sözleşmeler oluştururlar
explanation: |
  İdéologues, özgürlüğü destekleyen temel olgu olarak insanların mekânı işgal eden fiziksel bir beden oluşturduğunu tespit etmiştir. Bu fiziksel gerçeklik münhasır kullanım yaratır - bir kişi bir yatakta uyuduğunda, kolektivist toplumlarda bile o yatağı münhasıran işgal eder. Bu da mülkiyetin toplumsal geleneklerden değil, bedensel varlığımızdan kaynaklandığını göstermektedir. Diğer seçenekler siyasi, rasyonel ya da sosyal yönlere odaklanırken, İdéologues özgürlük ve mülkiyet haklarını anlamak için başlangıç noktası olarak insan varlığının temel fiziksel gerçekliğini vurgulamıştır.
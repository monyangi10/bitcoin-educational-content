question: 思想家們認為支持自由理論的人類第一個基本事實是什麼？
answer: 人類構成必然佔據空間的實體
wrong_answers:
  - 人類與生俱來就有參政與投票權的慾望
  - 人類擁有有別於動物的理性思考能力
  - 人類很自然地會形成社會契約來組織集體決策
explanation: |
  Idéologues認為，人類構成佔據空間的實體，是支持自由的基本事實。這個有形的現實創造了專屬的使用 - 當某人睡在床上時，即使在集體主義社會中，他也是專屬地佔有這張床。這證明財產來自於我們的肉體存在，而非社會慣例。其他方案著重於政治、理性或社會層面，但「偶像派」則強調人類存在的基本物理現實，作為理解自由和財產權的起點。
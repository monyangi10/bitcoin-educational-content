question: Co označili Idéologové za první základní fakt o člověku, který podporuje teorii svobody?
answer: Lidé představují fyzické tělo, které nutně zabírá prostor
wrong_answers:
  - Lidé mají vrozenou touhu po politické účasti a volebním právu
  - Lidé mají schopnost racionálního myšlení, která je odlišuje od zvířat
  - Lidé přirozeně uzavírají společenské smlouvy, aby organizovali kolektivní rozhodování
explanation: |
  Idéologové označili za základní skutečnost podporující svobodu to, že člověk představuje fyzické tělo, které obývá prostor. Tato fyzická realita vytváří výlučné užívání - když někdo spí v posteli, zabírá ji výlučně i v kolektivistických společnostech. To ukazuje, že vlastnictví vyplývá z naší tělesné existence, nikoli ze společenských konvencí. Ostatní možnosti se zaměřují na politické, racionální nebo sociální aspekty, ale Idéologové zdůrazňovali základní fyzickou realitu lidské existence jako výchozí bod pro chápání svobody a vlastnických práv.
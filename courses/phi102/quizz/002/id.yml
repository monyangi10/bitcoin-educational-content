question: Apa yang diidentifikasi oleh para Idéolog sebagai fakta fundamental pertama tentang manusia yang mendukung teori kebebasan?
answer: Manusia merupakan tubuh fisik yang selalu menempati ruang
wrong_answers:
  - Manusia memiliki keinginan bawaan untuk berpartisipasi dalam politik dan memiliki hak suara
  - Manusia memiliki kemampuan berpikir rasional yang membedakan mereka dari hewan
  - Manusia secara alami membentuk kontrak sosial untuk mengatur pengambilan keputusan kolektif
explanation: |
  Para Idéolog mengidentifikasi bahwa manusia merupakan tubuh fisik yang menempati ruang sebagai fakta dasar yang mendukung kebebasan. Realitas fisik ini menciptakan penggunaan eksklusif - ketika seseorang tidur di tempat tidur, mereka menempatinya secara eksklusif bahkan dalam masyarakat kolektivis. Hal ini menunjukkan bahwa properti muncul dari keberadaan tubuh kita, bukan dari konvensi sosial. Pilihan-pilihan lain berfokus pada aspek politik, rasional, atau sosial, tetapi para Idéolog menekankan realitas fisik dasar dari keberadaan manusia sebagai titik awal untuk memahami kebebasan dan hak milik.
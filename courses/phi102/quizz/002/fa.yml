question: ایدئولوگ‌ها اولین واقعیت اساسی درباره انسان‌ها که نظریه آزادی را حمایت می‌کند، چه چیزی شناسایی کردند؟
answer: انسان‌ها یک بدن فیزیکی تشکیل می‌دهند که به‌طور ضروری فضایی را اشغال می‌کند
wrong_answers:
  - انسان‌ها تمایل ذاتی به مشارکت سیاسی و حقوق رأی‌گیری دارند
  - انسان‌ها دارای قابلیت‌های تفکر منطقی هستند که آن‌ها را از حیوانات متمایز می‌کند.
  - انسان‌ها به طور طبیعی قراردادهای اجتماعی را برای سازماندهی تصمیم‌گیری جمعی شکل می‌دهند.
explanation: |
  ایدئولوگ‌ها تشخیص دادند که انسان‌ها یک بدن فیزیکی تشکیل می‌دهند که فضایی را اشغال می‌کند و این واقعیت بنیادی از آزادی حمایت می‌کند. این واقعیت فیزیکی استفاده انحصاری ایجاد می‌کند - وقتی کسی در تختی می‌خوابد، حتی در جوامع جمع‌گرا، آن را به‌طور انحصاری اشغال می‌کند. این نشان می‌دهد که مالکیت از وجود جسمانی ما ناشی می‌شود، نه از قراردادهای اجتماعی. گزینه‌های دیگر بر جنبه‌های سیاسی، عقلانی یا اجتماعی تمرکز دارند، اما ایدئولوگ‌ها بر واقعیت فیزیکی اساسی وجود انسانی به‌عنوان نقطه شروع برای درک آزادی و حقوق مالکیت تأکید کردند.
question: Koju su prvu fundamentalnu činjenicu o ljudskim bićima Idéologues identifikovali kao podršku teoriji slobode?
answer: Ljudi čine fizičko telo koje nužno zauzima prostor
wrong_answers:
  - Ljudi imaju urođenu želju za političkim učešćem i pravom glasa
  - Ljudi poseduju sposobnosti racionalnog razmišljanja koje ih razlikuju od životinja
  - Ljudi prirodno formiraju društvene ugovore kako bi organizovali kolektivno donošenje odluka
explanation: |
  Idéolozi su identifikovali da ljudi čine fizičko telo koje zauzima prostor kao osnovnu činjenicu koja podržava slobodu. Ova fizička stvarnost stvara ekskluzivnu upotrebu - kada neko spava u krevetu, on ga zauzima ekskluzivno čak i u kolektivističkim društvima. Ovo pokazuje da imovina proizlazi iz našeg telesnog postojanja, a ne iz društvenih konvencija. Druge opcije se fokusiraju na političke, racionalne ili društvene aspekte, ali Idéolozi su naglašavali osnovnu fizičku stvarnost ljudskog postojanja kao početnu tačku za razumevanje slobode i prava na imovinu.
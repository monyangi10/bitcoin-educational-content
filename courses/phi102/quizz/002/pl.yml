question: Co Idéologues zidentyfikowali jako pierwszy fundamentalny fakt dotyczący istot ludzkich, który wspiera teorię wolności?
answer: Ludzie stanowią ciało fizyczne, które z konieczności zajmuje przestrzeń
wrong_answers:
  - Ludzie mają wrodzone pragnienie uczestnictwa w życiu politycznym i prawa do głosowania
  - Ludzie posiadają zdolność racjonalnego myślenia, która odróżnia ich od zwierząt
  - Ludzie naturalnie tworzą umowy społeczne, aby organizować zbiorowe podejmowanie decyzji
explanation: |
  Idéologues uznali, że ludzie stanowią fizyczne ciało zajmujące przestrzeń jako podstawowy fakt wspierający wolność. Ta fizyczna rzeczywistość tworzy wyłączne użytkowanie - kiedy ktoś śpi w łóżku, zajmuje je na wyłączność, nawet w społeczeństwach kolektywistycznych. Pokazuje to, że własność wyłania się z naszej cielesnej egzystencji, a nie z konwencji społecznych. Inne opcje koncentrują się na aspektach politycznych, racjonalnych lub społecznych, ale Idéologues podkreślają podstawową fizyczną rzeczywistość ludzkiej egzystencji jako punkt wyjścia do zrozumienia wolności i praw własności.
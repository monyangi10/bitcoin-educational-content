question: Vad identifierade Idéologerna som det första grundläggande faktumet om människor som stöder frihetsteorin?
answer: Människor utgör en fysisk kropp som med nödvändighet upptar utrymme
wrong_answers:
  - Människor har en medfödd önskan om politiskt deltagande och rösträtt
  - Människor har en förmåga till rationellt tänkande som skiljer dem från djur
  - Människor ingår naturligt sociala avtal för att organisera kollektivt beslutsfattande
explanation: |
  Idéologerna identifierade att människor utgör en fysisk kropp som upptar utrymme som det grundläggande faktum som stöder frihet. Denna fysiska realitet skapar exklusiv användning - när någon sover i en säng är det en exklusiv användning, även i kollektivistiska samhällen. Detta visar att egendom uppstår ur vår kroppsliga existens, inte ur sociala konventioner. De andra alternativen fokuserar på politiska, rationella eller sociala aspekter, men Idéologerna betonade den grundläggande fysiska verkligheten i den mänskliga existensen som utgångspunkt för att förstå frihet och äganderätt.
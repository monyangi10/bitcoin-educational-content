question: आइडियोलॉग्स ने मानव जाति के बारे में पहले मूलभूत तथ्य के रूप में किसे पहचाना जो स्वतंत्रता के सिद्धांत का समर्थन करता है?
answer: मनुष्य एक भौतिक शरीर है जो अनिवार्य रूप से स्थान घेरता है।
wrong_answers:
  - मनुष्यों में राजनीतिक भागीदारी और मतदान के अधिकार की स्वाभाविक इच्छा होती है।
  - मनुष्यों में तर्कसंगत सोच की क्षमता होती है जो उन्हें जानवरों से अलग करती है।
  - मनुष्य स्वाभाविक रूप से सामूहिक निर्णय लेने की प्रक्रिया को व्यवस्थित करने के लिए सामाजिक अनुबंध बनाते हैं।
explanation: |
  विचारधारावादियों ने इस बात को स्वतंत्रता का मूलभूत आधार माना कि मनुष्य एक भौतिक शरीर है जो स्थान घेरता है। यह भौतिक वास्तविकता अनन्य उपयोग को जन्म देती है - जब कोई व्यक्ति बिस्तर पर सोता है, तो वह सामूहिक समाजों में भी उस पर अनन्य अधिकार रखता है। इससे यह सिद्ध होता है कि संपत्ति हमारे शारीरिक अस्तित्व से उत्पन्न होती है, न कि सामाजिक रीति-रिवाजों से। अन्य विकल्प राजनीतिक, तर्कसंगत या सामाजिक पहलुओं पर ध्यान केंद्रित करते हैं, लेकिन विचारधारावादियों ने स्वतंत्रता और संपत्ति के अधिकारों को समझने के लिए मानव अस्तित्व की मूलभूत भौतिक वास्तविकता को प्रारंभिक बिंदु के रूप में महत्व दिया।
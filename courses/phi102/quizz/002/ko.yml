question: 이데올로기론자들은 자유 이론을 뒷받침하는 인간에 대한 첫 번째 근본적인 사실로 무엇을 확인했나요?
answer: 인간은 필연적으로 공간을 점유하는 육체를 구성합니다
wrong_answers:
  - 인간은 정치 참여와 투표권에 대한 본능적인 욕구를 가지고 있습니다
  - 인간은 동물과 구별되는 이성적 사고 능력을 가지고 있습니다
  - 인간은 집단적 의사 결정을 조직하기 위해 자연스럽게 사회적 계약을 맺습니다
explanation: |
  이데올로기론자들은 인간이 공간을 점유하는 육체를 구성한다는 사실을 자유를 뒷받침하는 기초적 사실로 파악했습니다. 이 물리적 현실은 배타적 사용을 낳습니다. 누군가가 침대에서 잠을 자면 집단주의 사회에서도 배타적으로 점유하게 됩니다. 이는 재산이 사회적 관습이 아니라 우리의 육체적 존재에서 나온다는 것을 보여줍니다. 다른 옵션은 정치적, 합리적 또는 사회적 측면에 초점을 맞추지만, 이데올로그는 자유와 재산권을 이해하기 위한 출발점으로 인간 존재의 기본적인 물리적 현실을 강조했습니다.
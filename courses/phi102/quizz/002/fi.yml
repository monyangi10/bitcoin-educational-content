question: Mitä idéologit pitivät ensimmäisenä ihmisiin liittyvänä perustavanlaatuisena tosiasiana, joka tukee vapauden teoriaa?
answer: Ihminen muodostaa fyysisen ruumiin, joka välttämättä vie tilaa
wrong_answers:
  - Ihmisillä on synnynnäinen halu poliittiseen osallistumiseen ja äänioikeuteen
  - Ihmisillä on rationaalinen ajattelukyky, joka erottaa heidät eläimistä
  - Ihmiset muodostavat luonnostaan sosiaalisia sopimuksia organisoidakseen kollektiivista päätöksentekoa
explanation: |
  Idéologit pitivät sitä, että ihmiset muodostavat fyysisen ruumiin, joka on tilassa, vapautta tukevana perustavanlaatuisena tosiasiana. Tämä fyysinen todellisuus luo yksinomaisen käytön - kun joku nukkuu sängyssä, hän käyttää sitä yksinomaisesti jopa kollektivistisissa yhteiskunnissa. Tämä osoittaa, että omaisuus syntyy ruumiillisesta olemassaolostamme, ei sosiaalisista konventioista. Muissa vaihtoehdoissa keskitytään poliittisiin, rationaalisiin tai sosiaalisiin näkökohtiin, mutta Idéologues korosti ihmisen olemassaolon fyysistä perustodellisuutta lähtökohtana vapauden ja omistusoikeuden ymmärtämiselle.
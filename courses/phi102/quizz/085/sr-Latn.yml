question: Prema istorijskoj analizi, zašto revolucije obično imaju velike nedostatke u poređenju sa progresivnim reformama?
answer: Oni generate nasilje i nameću više promena nego što su populacije spremne, što dovodi do čestih preokreta.
wrong_answers:
  - Nedostaje im intelektualna osnova koju pružaju filozofija prosvetiteljstva i ekonomska teorija
  - Dešavaju se previše sporo da bi efikasno rešili hitne socijalne i ekonomske probleme
  - Ne uspevaju da uspostave materijalne uslove neophodne za održivi ekonomski razvoj
explanation: |
  Tekst izričito navodi da revolucije imaju velike nedostatke jer generate mnogo nasilja i teže da nametnu više promena nego što je populacija spremna da prihvati, što objašnjava brojne preokrete koji ih prate. Progresivne reforme vođene informisanim javnim mnjenjem predstavljene su kao poželjnije jer omogućavaju da se sloboda usvoji kada uslovi zaista to dozvoljavaju. Druge opcije pogrešno predstavljaju sadržaj - revolucije nisu kritikovane zbog sporosti ili nedostatka intelektualne osnove, već zbog prevelike sile i preuranjenosti.
question: 歴史的な分析によると、なぜ革命は進歩的な改革に比べて大きな欠点を持つ傾向があるのでしょうか？
answer: generateは暴力を振るい、国民が準備できる以上の変化を押し付け、度重なる逆転を招く。
wrong_answers:
  - 啓蒙思想や経済理論が提供する知的基盤を欠いている。
  - 緊急の社会的・経済的問題に効果的に対処するには遅すぎる。
  - 持続可能な経済発展に必要な物質的条件を確立できない。
explanation: |
  この文章では、革命には大きな欠点があると明言している。generateには多くの暴力があり、国民が覚悟している以上の変化を強いる傾向があるからだ。情報に基づいた世論に導かれた進歩的な改革は、条件が本当に許せば自由を採用できるため、望ましいものとして提示されている。他の選択肢は内容を誤って伝えている。革命が遅いとか知的基盤がないとかで批判されるのではなく、強引で時期尚早だから批判されるのである。
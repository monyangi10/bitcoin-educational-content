question: Miks on ajaloolise analüüsi kohaselt revolutsioonidel võrreldes progressiivsete reformidega tavaliselt suured puudused?
answer: Nad generate vägivalda ja kehtestavad rohkem muutusi, kui elanikkond on valmis, mis viib sagedaste tagasilöökideni
wrong_answers:
  - Neil puudub intellektuaalne alus, mille pakkusid valgustusfilosoofia ja majandusteooria
  - Need toimuvad liiga aeglaselt, et tegeleda tõhusalt kiireloomuliste sotsiaalsete ja majanduslike probleemidega
  - Nad ei suuda luua jätkusuutlikuks majandusarenguks vajalikke materiaalseid tingimusi
explanation: |
  Tekstis märgitakse selgesõnaliselt, et revolutsioonidel on suured puudused, sest nad generate palju vägivalda ja kipuvad kehtestama rohkem muutusi, kui elanikkond on valmis, mis seletab neile järgnevaid arvukaid tagasipöördeid. Progressiivseid reforme, mida juhib teadlik avalik arvamus, peetakse paremaks, sest need võimaldavad vabadust vastu võtta siis, kui tingimused seda tõesti võimaldavad. Teised valikud moonutavad sisu - revolutsioone ei kritiseerita mitte selle eest, et nad on aeglased või et neil puudub intellektuaalne alus, vaid selle eest, et nad on liiga jõulised ja enneaegsed.
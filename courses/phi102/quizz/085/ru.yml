question: Почему, согласно историческому анализу, революции, как правило, имеют большие недостатки по сравнению с прогрессивными реформами?
answer: Они применяют насилие generate и навязывают больше изменений, чем население готово к ним, что приводит к частым обратным результатам
wrong_answers:
  - Им не хватает интеллектуального фундамента, заложенного философией и экономической теорией эпохи Просвещения
  - Они происходят слишком медленно, чтобы эффективно решать насущные социальные и экономические проблемы
  - Они не создают материальных условий, необходимых для устойчивого экономического развития
explanation: |
  В тексте прямо говорится, что революции имеют серьезные недостатки, поскольку они generate много насилия и, как правило, навязывают больше изменений, чем население готово к ним, что объясняет многочисленные откаты назад, которые следуют за ними. Прогрессивные реформы, проводимые под влиянием информированного общественного мнения, представляются как более предпочтительные, поскольку они позволяют утвердить свободу, когда условия действительно позволяют это сделать. Другие варианты искажают содержание - революции критикуют не за медлительность или отсутствие интеллектуальной основы, а за излишнюю силу и преждевременность.
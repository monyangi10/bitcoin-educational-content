question: D'après l'analyse historique, pourquoi les révolutions ont-elles tendance à présenter des inconvénients majeurs par rapport aux réformes progressives ?
answer: Ils ont recours à la violence et imposent plus de changements que les populations ne sont prêtes à en supporter, ce qui entraîne de fréquents revirements
wrong_answers:
  - Ils n'ont pas le fondement intellectuel fourni par la philosophie des Lumières et la théorie économique
  - Elles se produisent trop lentement pour permettre de résoudre efficacement les problèmes sociaux et économiques urgents
  - Ils n'établissent pas les conditions matérielles nécessaires à un développement économique durable
explanation: |
  Le texte indique explicitement que les révolutions présentent des inconvénients majeurs car elles generate beaucoup de violence et tendent à imposer plus de changements que la population n'y est préparée, ce qui explique les nombreux revirements qui les suivent. Les réformes progressives guidées par une opinion publique informée sont présentées comme préférables car elles permettent d'adopter la liberté lorsque les conditions le permettent vraiment. Les autres options dénaturent le contenu : les révolutions ne sont pas critiquées pour leur lenteur ou leur manque de fondement intellectuel, mais pour leur caractère trop énergique et prématuré.
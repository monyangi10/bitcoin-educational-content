question: Zgodnie z analizą historyczną, dlaczego rewolucje mają zwykle poważne wady w porównaniu z postępowymi reformami?
answer: Stosują przemoc generate i narzucają więcej zmian, niż społeczeństwa są na to gotowe, co prowadzi do częstych zwrotów akcji
wrong_answers:
  - Brakuje im intelektualnych podstaw zapewnianych przez oświeceniową filozofię i teorię ekonomiczną
  - Pojawiają się one zbyt wolno, aby skutecznie rozwiązywać pilne problemy społeczne i gospodarcze
  - Nie ustanawiają warunków materialnych niezbędnych dla zrównoważonego rozwoju gospodarczego
explanation: |
  W tekście wyraźnie stwierdza się, że rewolucje mają poważne wady, ponieważ generate stosują dużo przemocy i mają tendencję do narzucania większej liczby zmian, niż ludność jest na to przygotowana, co wyjaśnia liczne odwrócenia, które po nich następują. Postępowe reformy kierowane przez świadomą opinię publiczną są przedstawiane jako lepsze, ponieważ pozwalają na przyjęcie wolności, gdy warunki naprawdę na to pozwalają. Inne opcje błędnie przedstawiają treść - rewolucje nie są krytykowane za powolność lub brak podstaw intelektualnych, ale za zbyt dużą siłę i przedwczesność.
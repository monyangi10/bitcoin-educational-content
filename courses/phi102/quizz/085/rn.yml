question: Dushingiye ku nseguro y’amateka, ni kuki amahinduka akunda kugira ingorane zikomeye ugereranije n’amahinduka atera imbere?
answer: Ba generate ubukazi kandi bagategeka amahinduka menshi kuruta ayo abantu biteguriye, bikaba bituma habaho uguhinduka kenshi .
wrong_answers:
  - Babura umushinge w’ubwenge utangwa na filozofiya y’Umuco be n’inyigisho z’ubutunzi .
  - Bishika buhoro cane ku buryo bidashobora gutorera umuti neza ingorane zihutirwa zo mu kibano no mu bukungu .
  - Bananirwa gushinga ivyangombwa vy’umubiri bikenewe kugira ngo ubutunzi butere imbere buramba .
explanation: |
  Ico canditswe kivuga neza ko amahinduka afise ingorane zikomeye kubera ko generate ubukazi bwinshi kandi agakunda gutegeka amahinduka menshi kuruta ayo abanyagihugu biteguriye, ivyo bikaba bisigura amahinduka menshi akurikira. Impinduka zitera imbere zirongowe n’ivyiyumviro vya bose bifise amakuru zigaragazwa ko ari zo zihimbaye kubera ko zituma umwidegemvyo wemerwa igihe vy’ukuri ibintu bivyemerera. Ayandi mahitamwo agaragaza nabi ibirimwo - amahinduka ntanegurwa kubera ko agenda buhoro canke ko ata mushinge w’ubwenge afise, ahubwo ko ari ay’inkomezi nyinshi kandi atarashika.
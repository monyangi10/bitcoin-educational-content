question: Miksi vallankumouksilla on historiallisen analyysin mukaan yleensä suuria haittoja verrattuna edistyksellisiin uudistuksiin?
answer: generate-väkivalta ja muutosten tekeminen enemmän kuin mihin väestö on valmis, mikä johtaa usein käänteisiin
wrong_answers:
  - Niiltä puuttuu valistusfilosofian ja talousteorian tarjoama älyllinen perusta
  - Ne tapahtuvat liian hitaasti, jotta kiireellisiin sosiaalisiin ja taloudellisiin ongelmiin voitaisiin puuttua tehokkaasti
  - Ne eivät luo kestävän talouskehityksen edellyttämiä aineellisia edellytyksiä
explanation: |
  Tekstissä todetaan nimenomaisesti, että vallankumouksilla on suuria haittoja, koska ne aiheuttavat paljon väkivaltaa ja aiheuttavat yleensä enemmän muutoksia kuin mihin väestö on valmistautunut, mikä selittää niitä seuraavat lukuisat käänteet. Tietoon perustuvan yleisen mielipiteen ohjaamia asteittaisia uudistuksia pidetään parempina, koska ne mahdollistavat vapauden käyttöönoton silloin, kun olosuhteet sen todella sallivat. Muut vaihtoehdot vääristelevät sisältöä - vallankumouksia ei kritisoida hitaudesta tai älyllisen perustan puuttumisesta vaan liian voimakkaasta ja ennenaikaisesta toiminnasta.
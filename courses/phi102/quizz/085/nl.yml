question: Waarom hebben revoluties volgens de historische analyse meestal grote nadelen in vergelijking met progressieve hervormingen?
answer: Ze generate geweld en leggen meer veranderingen op dan waar bevolkingen klaar voor zijn, wat leidt tot veelvuldige omkeringen
wrong_answers:
  - Ze missen het intellectuele fundament van de Verlichtingsfilosofie en de economische theorie
  - Ze treden te langzaam op om dringende sociale en economische problemen effectief aan te pakken
  - Ze stellen niet de materiële voorwaarden die nodig zijn voor duurzame economische ontwikkeling
explanation: |
  De tekst stelt expliciet dat revoluties grote nadelen hebben omdat ze generate veel geweld gebruiken en de neiging hebben om meer veranderingen op te leggen dan waar de bevolking op voorbereid is, wat de talrijke omkeringen verklaart die erop volgen. Progressieve hervormingen geleid door een geïnformeerde publieke opinie worden voorgesteld als te verkiezen omdat ze vrijheid mogelijk maken wanneer de omstandigheden het echt toelaten. De andere opties geven een verkeerd beeld van de inhoud - revoluties worden niet bekritiseerd omdat ze traag zijn of een intellectuele basis missen, maar omdat ze te krachtig en voorbarig zijn.
question: ตามการวิเคราะห์ทางประวัติศาสตร์ ทำไมการปฏิวัติจึงมักมีข้อเสียเปรียบใหญ่เมื่อเทียบกับการปฏิรูปที่ก้าวหน้า?
answer: พวกเขา generate ความรุนแรงและบังคับให้มีการเปลี่ยนแปลงมากกว่าที่ประชากรพร้อมจะรับมือ ส่งผลให้เกิดการย้อนกลับบ่อยครั้ง
wrong_answers:
  - พวกเขาขาดรากฐานทางปัญญาที่ปรัชญาแห่งการตรัสรู้และทฤษฎีเศรษฐศาสตร์มอบให้
  - พวกมันเกิดขึ้นช้าเกินไปที่จะจัดการกับปัญหาสังคมและเศรษฐกิจที่เร่งด่วนได้อย่างมีประสิทธิภาพ
  - พวกเขาล้มเหลวในการสร้างเงื่อนไขทางวัตถุที่จำเป็นสำหรับการพัฒนาเศรษฐกิจอย่างยั่งยืน
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าการปฏิวัติมีข้อเสียใหญ่หลวงเพราะพวกเขา generate ความรุนแรงมากและมักจะบังคับให้เกิดการเปลี่ยนแปลงมากกว่าที่ประชากรจะเตรียมพร้อม ซึ่งอธิบายถึงการกลับตัวหลายครั้งที่ตามมา การปฏิรูปที่ก้าวหน้าโดยมีความคิดเห็นของสาธารณชนที่มีข้อมูลเป็นแนวทางนั้นถูกนำเสนอว่าเป็นที่น่าพึงพอใจมากกว่าเพราะพวกเขาอนุญาตให้มีการนำเสรีภาพมาใช้เมื่อเงื่อนไขเอื้ออำนวยจริง ๆ ตัวเลือกอื่น ๆ นำเสนอเนื้อหาอย่างผิด ๆ - การปฏิวัติไม่ได้ถูกวิจารณ์ว่าเป็นไปอย่างช้า ๆ หรือขาดรากฐานทางปัญญา แต่เพราะว่ามันรุนแรงและเกิดขึ้นก่อนเวลาอันควรเกินไป
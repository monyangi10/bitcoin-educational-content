question: Enligt den historiska analysen, varför tenderar revolutioner att ha stora nackdelar jämfört med progressiva reformer?
answer: De generate våld och inför fler förändringar än vad befolkningen är redo för, vilket leder till frekventa bakslag
wrong_answers:
  - De saknar den intellektuella grund som upplysningstidens filosofi och ekonomiska teori utgör
  - De inträffar för långsamt för att man effektivt ska kunna ta itu med akuta sociala och ekonomiska problem
  - De skapar inte de materiella förutsättningar som krävs för en hållbar ekonomisk utveckling
explanation: |
  I texten anges uttryckligen att revolutioner har stora nackdelar eftersom de generate mycket våld och tenderar att införa fler förändringar än befolkningen är beredd på, vilket förklarar de många bakslag som följer på dem. Progressiva reformer som styrs av en informerad allmän opinion framställs som att föredra eftersom de gör det möjligt att införa frihet när förhållandena verkligen tillåter det. De andra alternativen ger en felaktig bild av innehållet - revolutioner kritiseras inte för att vara långsamma eller sakna intellektuell grund, utan för att vara alltför kraftfulla och förhastade.
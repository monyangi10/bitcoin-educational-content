question: 역사적 분석에 따르면 혁명은 점진적 개혁에 비해 큰 단점이 있는 경향이 있는데, 그 이유는 무엇일까요?
answer: GW0 폭력을 행사하고 인구가 받아들일 준비가 된 것보다 더 많은 변화를 강요하여 잦은 역전으로 이어집니다
wrong_answers:
  - 계몽주의 철학과 경제 이론이 제공하는 지적 기반이 부족합니다
  - 긴급한 사회 및 경제 문제를 효과적으로 해결하기에는 너무 느리게 발생합니다
  - 지속 가능한 경제 발전에 필요한 물질적 조건을 확립하지 못합니다
explanation: |
  본문은 혁명은 많은 폭력을 수반하고 대중이 받아들일 수 있는 수준보다 더 많은 변화를 강요하는 경향이 있기 때문에 큰 단점이 있다고 명시하고 있으며, 이는 혁명에 뒤따르는 수많은 반전을 설명합니다. 정보에 입각한 여론에 따른 점진적 개혁은 여건이 진정으로 자유를 허용할 때 채택할 수 있기 때문에 바람직한 것으로 제시됩니다. 다른 옵션은 내용을 잘못 표현하고 있습니다. 혁명은 느리거나 지적 기반이 부족하다는 비판을 받는 것이 아니라 너무 강압적이고 시기상조라는 비판을 받습니다.
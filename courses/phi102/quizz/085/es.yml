question: Según el análisis histórico, ¿por qué las revoluciones suelen tener grandes desventajas en comparación con las reformas progresistas?
answer: Generan violencia e imponen más cambios de los que la población está preparada, lo que provoca frecuentes retrocesos
wrong_answers:
  - Carecen de los fundamentos intelectuales proporcionados por la filosofía de la Ilustración y la teoría económica
  - Se producen con demasiada lentitud para abordar eficazmente los problemas sociales y económicos urgentes
  - No establecen las condiciones materiales necesarias para un desarrollo económico sostenible
explanation: |
  El texto afirma explícitamente que las revoluciones tienen grandes desventajas porque generate mucha violencia y tienden a imponer más cambios de los que la población está preparada, lo que explica los numerosos retrocesos que las siguen. Las reformas progresivas guiadas por una opinión pública informada se presentan como preferibles porque permiten adoptar la libertad cuando las condiciones realmente lo permiten. Las otras opciones tergiversan el contenido: no se critica a las revoluciones por ser lentas o carecer de fundamento intelectual, sino por ser demasiado contundentes y prematuras.
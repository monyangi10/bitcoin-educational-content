question: Secondo la teoria economica liberale, quale problema fondamentale crea il deficit spending nelle società democratiche?
answer: Permette alle generazioni attuali di godere dei benefici trasferendo i costi alle generazioni future che non possono partecipare alle attuali decisioni democratiche
wrong_answers:
  - Crea un'inflazione eccessiva che riduce immediatamente il potere d'acquisto dei contribuenti attuali e destabilizza l'economia
  - Concentra troppo potere economico nelle mani di ricchi creditori che possono influenzare le decisioni politiche del governo
  - Riduce l'efficienza del governo creando una competizione burocratica tra i diversi dipartimenti di spesa per le risorse limitate
explanation: |
  Il capitolo spiega che la spesa in deficit rompe il legame naturale tra godimento e responsabilità, consentendo ai cittadini attuali di beneficiare dei servizi pubblici e trasferendo legalmente i costi alle generazioni future. Questo crea una contraddizione democratica fondamentale, perché i cittadini futuri che sosterranno l'onere finanziario non possono partecipare alle decisioni politiche di oggi che creano il debito. Ciò viola il principio "no taxation without representation", poiché le generazioni future sono di fatto tassate senza avere voce in capitolo nel processo decisionale.
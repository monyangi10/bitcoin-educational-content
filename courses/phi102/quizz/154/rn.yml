question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni ingorane iyihe y’ishimikiro gukoresha amahera y’ikinyuranyo bitera mu bihugu vya demokarasi?
answer: Bituma uruvyaro rwo muri iki gihe rushobora kuronka inyungu mu gihe rwokwimurira ivyo bizotwara uruvyaro ruzoza rudashobora kugira uruhara mu ngingo za demokarasi ziriho ubu .
wrong_answers:
  - Bituma haba ugutera imbere kw’ibiciro birenze urugero bica bigabanya ubushobozi bwo kugura bw’abasoreshwa bariho ubu, bigatuma ubutunzi buhungabana .
  - Bishira ububasha bwinshi cane mu vy’ubutunzi mu minwe y’abatunzi bafise umwenda bashobora rero guhindura ingingo za Leta .
  - Bigabanya ubushobozi bwa Leta mu gutuma haba uguhiganwa hagati y’inzego zitandukanye zikoresha amahera kubera amafaranga make .
explanation: |
  Ico gice gisigura ko gukoresha amahera y’ikinyuranyo bica isano ry’akameremere hagati y’uguhimbarirwa n’inshingano mu kureka abanyagihugu bo muri iki gihe bakavyungukirako mu bikorwa vya Leta mu gihe mu buryo butegekanijwe n’amategeko, ivyo bikoresho birungikwa ku bihe bizoza. Ivyo bituma habaho ukuvuguruzanya kw’ishimikiro kwa demokarasi kuko abo bazokwikorera umuzigo w’amahera badashobora kugira uruhara mu ngingo za politike z’uyu musi zituma haba umwenda. Ivyo bica ku ngingo ngenderwako y’uko ‘ata misoro itagira uwuyiserukira’ kuko uruvyaro ruzoza rusoreshwa neza ata jwi rugira mu gufata ingingo.
question: 자유주의 경제 이론에 따르면, 적자 지출은 민주주의 사회에서 어떤 근본적인 문제를 야기할까요?
answer: 현 세대는 혜택을 누리면서 현재의 민주적 의사 결정에 참여할 수 없는 미래 세대에게 비용을 전가할 수 있습니다
wrong_answers:
  - 이는 현재 납세자의 구매력을 즉시 감소시키고 경제를 불안정하게 만드는 과도한 인플레이션을 야기합니다
  - 정부 정책 결정에 영향을 미칠 수 있는 부유한 채권자들의 손에 너무 많은 경제력이 집중되어 있습니다
  - 한정된 자원을 두고 여러 지출 부서 간에 관료적 경쟁을 유발하여 정부 효율성을 떨어뜨립니다
explanation: |
  이 장에서는 적자 지출이 현재 시민이 정부 서비스의 혜택을 누리는 동시에 그 비용을 미래 세대에게 합법적으로 전가함으로써 혜택과 책임 사이의 자연스러운 연결 고리를 끊는다고 설명합니다. 이는 재정적 부담을 지게 될 미래의 시민들이 부채를 발생시키는 현재의 정치적 결정에 참여할 수 없기 때문에 근본적인 민주주의 모순을 초래합니다. 이는 미래 세대가 의사 결정 과정에서 발언권을 갖지 못한 채 사실상 과세당하는 것이므로 '대표성 없는 과세 금지' 원칙에 위배됩니다.
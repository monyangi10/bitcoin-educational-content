question: Согласно либеральной экономической теории, какую фундаментальную проблему создают дефицитные расходы в демократических обществах?
answer: Она позволяет нынешним поколениям пользоваться благами, перекладывая расходы на будущие поколения, которые не могут участвовать в принятии текущих демократических решений
wrong_answers:
  - Он создает чрезмерную инфляцию, которая немедленно снижает покупательную способность нынешних налогоплательщиков и дестабилизирует экономику
  - Она концентрирует слишком много экономической власти в руках богатых кредиторов, которые затем могут влиять на политические решения правительства
  - Снижает эффективность работы правительства, создавая бюрократическую конкуренцию между различными департаментами за ограниченные ресурсы
explanation: |
  В главе объясняется, что дефицитные расходы нарушают естественную связь между удовольствием и ответственностью, позволяя нынешним гражданам пользоваться государственными услугами и при этом законно перекладывая расходы на будущие поколения. Это создает фундаментальное демократическое противоречие, поскольку будущие граждане, которые будут нести финансовое бремя, не могут участвовать в принятии сегодняшних политических решений, создающих долг. Это нарушает принцип "нет налогам без представительства", поскольку будущие поколения фактически облагаются налогом, не имея права голоса в процессе принятия решений.
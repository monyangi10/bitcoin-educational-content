question: بر اساس نظریه اقتصادی لیبرال، مشکل اساسی که هزینه‌های کسری در جوامع دموکراتیک ایجاد می‌کند چیست؟
answer: این به نسل‌های کنونی اجازه می‌دهد تا از مزایا بهره‌مند شوند در حالی که هزینه‌ها را به نسل‌های آینده که نمی‌توانند در تصمیمات دموکراتیک کنونی شرکت کنند، منتقل می‌کند.
wrong_answers:
  - این باعث ایجاد تورم بیش از حد می‌شود که بلافاصله قدرت خرید مالیات‌دهندگان فعلی را کاهش داده و اقتصاد را بی‌ثبات می‌کند.
  - این امر قدرت اقتصادی زیادی را در دستان طلبکاران ثروتمند متمرکز می‌کند که می‌توانند بر تصمیمات سیاست‌گذاری دولت تأثیر بگذارند.
  - این امر با ایجاد رقابت بوروکراتیک بین بخش‌های مختلف هزینه برای منابع محدود، کارایی دولت را کاهش می‌دهد.
explanation: |
  این فصل توضیح می‌دهد که هزینه‌کرد کسری، پیوند طبیعی بین لذت و مسئولیت را با اجازه دادن به شهروندان فعلی برای بهره‌مندی از خدمات دولتی در حالی که هزینه‌ها را به طور قانونی به نسل‌های آینده منتقل می‌کند، می‌شکند. این امر یک تناقض اساسی دموکراتیک ایجاد می‌کند زیرا آن شهروندان آینده که بار مالی را تحمل خواهند کرد، نمی‌توانند در تصمیمات سیاسی امروز که بدهی را ایجاد می‌کند، شرکت کنند. این اصل «بدون نمایندگی، مالیات نیست» را نقض می‌کند زیرا نسل‌های آینده عملاً بدون داشتن صدایی در فرآیند تصمیم‌گیری، مالیات می‌پردازند.
question: Welk fundamenteel probleem veroorzaakt volgens de liberale economische theorie het spenderen van tekorten in democratische samenlevingen?
answer: Het stelt de huidige generaties in staat om van de voordelen te genieten terwijl de kosten worden doorgeschoven naar toekomstige generaties die niet kunnen deelnemen aan de huidige democratische beslissingen
wrong_answers:
  - Het creëert buitensporige inflatie die onmiddellijk de koopkracht van de huidige belastingbetalers vermindert en de economie destabiliseert
  - Het concentreert te veel economische macht in de handen van rijke schuldeisers die vervolgens de beleidsbeslissingen van de overheid kunnen beïnvloeden
  - Het vermindert de efficiëntie van de overheid door bureaucratische concurrentie te creëren tussen verschillende uitgavendepartementen voor beperkte middelen
explanation: |
  Het hoofdstuk legt uit dat deficit spending de natuurlijke link tussen genieten en verantwoordelijkheid verbreekt door huidige burgers te laten profiteren van overheidsdiensten terwijl de kosten legaal worden doorgeschoven naar toekomstige generaties. Dit creëert een fundamentele democratische tegenstrijdigheid omdat de toekomstige burgers die de financiële last zullen dragen niet kunnen deelnemen aan de politieke beslissingen van vandaag die de schuld creëren. Dit schendt het principe van 'no taxation without representation' aangezien toekomstige generaties effectief belast worden zonder een stem te hebben in het besluitvormingsproces.
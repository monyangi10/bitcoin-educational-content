question: Selon la théorie économique libérale, quel problème fondamental les dépenses déficitaires créent-elles dans les sociétés démocratiques ?
answer: Elle permet aux générations actuelles de profiter des avantages tout en transférant les coûts aux générations futures qui ne peuvent pas participer aux décisions démocratiques actuelles
wrong_answers:
  - Elle crée une inflation excessive qui réduit immédiatement le pouvoir d'achat des contribuables actuels et déstabilise l'économie
  - Il concentre trop de pouvoir économique entre les mains de riches créanciers qui peuvent alors influencer les décisions politiques du gouvernement
  - Elle réduit l'efficacité du gouvernement en créant une concurrence bureaucratique entre les différents départements pour des ressources limitées
explanation: |
  Le chapitre explique que les dépenses déficitaires rompent le lien naturel entre plaisir et responsabilité en permettant aux citoyens actuels de bénéficier des services gouvernementaux tout en transférant légalement les coûts aux générations futures. Cela crée une contradiction démocratique fondamentale, car les futurs citoyens qui supporteront le fardeau financier ne peuvent pas participer aux décisions politiques d'aujourd'hui qui créent la dette. Cela viole le principe "pas de taxation sans représentation" puisque les générations futures sont effectivement taxées sans avoir leur mot à dire dans le processus de prise de décision.
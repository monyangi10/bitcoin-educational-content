question: 根据自由主义经济理论，赤字开支会给民主社会带来什么根本问题？
answer: 它让当代人享受利益，却将成本转嫁给无法参与当前民主决策的子孙后代
wrong_answers:
  - 造成过度通货膨胀，立即降低当前纳税人的购买力，破坏经济稳定
  - 它将太多的经济权力集中在富有的债权人手中，而这些债权人可以影响政府的政策决定
  - 不同支出部门之间为争夺有限资源而展开官僚主义竞争，从而降低了政府效率
explanation: |
  该章解释说，赤字开支打破了享受与责任之间的自然联系，它允许当代公民从政府服务中获益，同时合法地将成本转嫁给子孙后代。这造成了根本性的民主矛盾，因为那些将承担财政负担的未来公民无法参与今天造成债务的政治决策。这违反了 "无代表不纳税 "的原则，因为子孙后代实际上是在决策过程中没有发言权的情况下被征税。
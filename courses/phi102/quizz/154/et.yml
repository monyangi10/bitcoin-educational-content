question: Millise põhiprobleemi tekitab liberaalse majandusteooria kohaselt puudujäägi kulutamine demokraatlikus ühiskonnas?
answer: See võimaldab praegustele põlvkondadele kasu saada, kandes samal ajal kulud üle tulevastele põlvkondadele, kes ei saa osaleda praegustes demokraatlikes otsustes
wrong_answers:
  - See tekitab ülemäärast inflatsiooni, mis vähendab kohe praeguste maksumaksjate ostujõudu ja destabiliseerib majandust
  - See koondab liiga palju majanduslikku võimu jõukate võlausaldajate kätte, kes saavad seejärel mõjutada valitsuse poliitilisi otsuseid
  - See vähendab valitsuse tõhusust, tekitades bürokraatlikku konkurentsi erinevate kulutusi tegevate osakondade vahel piiratud ressursside pärast
explanation: |
  Peatükis selgitatakse, et puudujäägiga kulutused katkestavad loomuliku seose naudingu ja vastutuse vahel, võimaldades praegustele kodanikele saada kasu valitsuse teenustest, kuid kandes kulud seaduslikult üle tulevastele põlvkondadele. See tekitab põhimõttelise demokraatliku vastuolu, sest need tulevased kodanikud, kes kannavad finantskoormust, ei saa osaleda tänastes poliitilistes otsustes, mis tekitavad võlga. See rikub põhimõtet "ei maksustata ilma esinduseta", sest tulevasi põlvkondi maksustatakse tegelikult ilma, et neil oleks otsustusprotsessis sõnaõigus.
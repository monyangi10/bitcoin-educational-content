question: Welches grundlegende Problem entsteht nach der liberalen Wirtschaftstheorie in demokratischen Gesellschaften durch Defizitausgaben?
answer: Sie ermöglicht es den heutigen Generationen, in den Genuss von Vorteilen zu kommen, während die Kosten auf künftige Generationen übertragen werden, die nicht an den aktuellen demokratischen Entscheidungen teilhaben können
wrong_answers:
  - Sie führt zu einer übermäßigen Inflation, die die Kaufkraft der derzeitigen Steuerzahler sofort verringert und die Wirtschaft destabilisiert
  - Es konzentriert zu viel wirtschaftliche Macht in den Händen wohlhabender Gläubiger, die dann die politischen Entscheidungen der Regierung beeinflussen können
  - Sie verringert die Effizienz der Regierung, indem sie einen bürokratischen Wettbewerb zwischen den verschiedenen Ausgabenabteilungen um begrenzte Ressourcen schafft
explanation: |
  In diesem Kapitel wird erläutert, dass Defizitausgaben die natürliche Verbindung zwischen Genuss und Verantwortung durchbrechen, indem sie es den heutigen Bürgern ermöglichen, von staatlichen Leistungen zu profitieren, während sie die Kosten legal auf künftige Generationen übertragen. Dies führt zu einem grundlegenden demokratischen Widerspruch, da die zukünftigen Bürger, die die finanzielle Last tragen werden, nicht an den heutigen politischen Entscheidungen, die die Schulden verursachen, teilnehmen können. Dies verstößt gegen den Grundsatz "keine Besteuerung ohne Vertretung", da künftige Generationen effektiv besteuert werden, ohne ein Mitspracherecht im Entscheidungsprozess zu haben.
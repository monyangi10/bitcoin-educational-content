question: Según la teoría económica liberal, ¿qué problema fundamental crea el gasto deficitario en las sociedades democráticas?
answer: Permite a las generaciones actuales disfrutar de los beneficios mientras transfiere los costes a las generaciones futuras, que no pueden participar en las decisiones democráticas actuales
wrong_answers:
  - Crea una inflación excesiva que reduce inmediatamente el poder adquisitivo de los contribuyentes actuales y desestabiliza la economía
  - Concentra demasiado poder económico en manos de acreedores ricos que pueden influir en las decisiones políticas del gobierno
  - Reduce la eficacia de la Administración al crear una competencia burocrática entre los distintos departamentos de gasto por unos recursos limitados
explanation: |
  El capítulo explica que el gasto deficitario rompe el vínculo natural entre disfrute y responsabilidad al permitir que los ciudadanos actuales se beneficien de los servicios gubernamentales mientras se transfieren legalmente los costes a las generaciones futuras. Esto crea una contradicción democrática fundamental porque los futuros ciudadanos que soportarán la carga financiera no pueden participar en las decisiones políticas actuales que crean la deuda. Esto viola el principio de "no tributación sin representación", ya que se grava a las generaciones futuras sin que tengan voz en el proceso de toma de decisiones.
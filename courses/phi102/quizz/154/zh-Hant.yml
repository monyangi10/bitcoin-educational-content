question: 根據自由經濟理論，赤字支出在民主社會中會造成什麼基本問題？
answer: 它允許現在的世代享受利益，同時將代價轉嫁給不能參與當前民主決策的後代。
wrong_answers:
  - 它會造成過度的通貨膨脹，立即降低目前納稅人的購買力，並使經濟不穩定
  - 它將過多的經濟權力集中在富有的債權人手中，而這些人可以影響政府的政策決定
  - 這會造成不同支出部門之間為爭取有限資源而進行官僚競爭，從而降低政府效率。
explanation: |
  本章解釋了赤字支出打破了享受與責任之間的自然關係，它允許當前公民從政府服務中受益，同時合法地將成本轉嫁給後代子孫。這造成了基本的民主矛盾，因為那些將要承擔財務負擔的未來公民無法參與製造債務的今日政治決策。這違反「無代表不納稅」的原則，因為後代實際上被徵稅，但在決策過程中卻沒有發言權。
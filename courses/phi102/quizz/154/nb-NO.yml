question: Hvilket grunnleggende problem skaper underskudd i demokratiske samfunn, ifølge liberal økonomisk teori?
answer: Det gjør det mulig for dagens generasjoner å nyte godt av fordelene, mens kostnadene overføres til fremtidige generasjoner som ikke kan delta i dagens demokratiske beslutninger
wrong_answers:
  - Det skaper overdreven inflasjon som umiddelbart reduserer kjøpekraften til dagens skattebetalere og destabiliserer økonomien
  - Den konsentrerer for mye økonomisk makt i hendene på velstående kreditorer som deretter kan påvirke regjeringens politiske beslutninger
  - Det reduserer effektiviteten i offentlig forvaltning ved å skape byråkratisk konkurranse mellom ulike avdelinger om begrensede ressurser
explanation: |
  Kapitlet forklarer at underskuddsbudsjettering bryter den naturlige koblingen mellom nytelse og ansvar ved å la dagens borgere nyte godt av offentlige tjenester, samtidig som kostnadene lovlig overføres til fremtidige generasjoner. Dette skaper en grunnleggende demokratisk selvmotsigelse fordi de fremtidige innbyggerne som skal bære den økonomiske byrden, ikke kan delta i dagens politiske beslutninger som skaper gjelden. Dette bryter med prinsippet om "ingen beskatning uten representasjon", siden fremtidige generasjoner i praksis blir beskattet uten å ha en stemme i beslutningsprosessen.
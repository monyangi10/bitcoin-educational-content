question: Zgodnie z liberalną teorią ekonomiczną, jaki fundamentalny problem stwarzają wydatki deficytowe w społeczeństwach demokratycznych?
answer: Pozwala obecnym pokoleniom cieszyć się korzyściami, jednocześnie przenosząc koszty na przyszłe pokolenia, które nie mogą uczestniczyć w bieżących demokratycznych decyzjach
wrong_answers:
  - Tworzy nadmierną inflację, która natychmiast zmniejsza siłę nabywczą obecnych podatników i destabilizuje gospodarkę
  - Koncentruje zbyt dużą władzę ekonomiczną w rękach bogatych wierzycieli, którzy mogą następnie wpływać na decyzje polityczne rządu
  - Zmniejsza wydajność rządu, tworząc biurokratyczną konkurencję między różnymi działami wydatków o ograniczone zasoby
explanation: |
  Rozdział ten wyjaśnia, że wydatki deficytowe zrywają naturalny związek między przyjemnością a odpowiedzialnością, pozwalając obecnym obywatelom korzystać z usług rządowych, jednocześnie legalnie przenosząc koszty na przyszłe pokolenia. Stwarza to fundamentalną demokratyczną sprzeczność, ponieważ przyszli obywatele, którzy poniosą ciężar finansowy, nie mogą uczestniczyć w dzisiejszych decyzjach politycznych, które tworzą dług. Narusza to zasadę "nie ma opodatkowania bez reprezentacji", ponieważ przyszłe pokolenia są skutecznie opodatkowane bez prawa głosu w procesie decyzyjnym.
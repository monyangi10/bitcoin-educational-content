question: Co bylo podle argumentu Benjamina Constanta proti Germaine de Staël pravdivé o antické svobodě?
answer: Antická svoboda nebyla ani skutečná, ani úplná
wrong_answers:
  - Antická svoboda byla dokonalá a měla by být obnovena
  - Antická svoboda byla nadřazena moderní svobodě
  - Antická svoboda byla základem veškeré svobody
explanation: |
  Benjamin Constant konkrétně vyvracel tvrzení Germaine de Staël, že svoboda je starověká a despotismus moderní. Constant prokázal, že starověká svoboda nebyla ani skutečná, ani úplná, a zpochybnil tak romantizující pohled na minulé společnosti. Tato debata ilustruje zásadní protiklad mezi těmi, kdo věřili ve zlatý věk minulé svobody, a liberálními mysliteli, kteří tvrdili, že svoboda je progresivní historická konstrukce, která se vyvíjí v čase prostřednictvím technických a ekonomických zlepšení.
question: Hva var sant om antikkens frihet, ifølge Benjamin Constants argumentasjon mot Germaine de Staël?
answer: Antikkens frihet var verken reell eller fullstendig
wrong_answers:
  - Den antikke friheten var perfekt og bør gjenopprettes
  - Antikkens frihet var overlegen moderne frihet
  - Antikkens frihet var grunnlaget for all frihet
explanation: |
  Benjamin Constant tilbakeviste Germaine de Staëls påstand om at frihet var antikk og despoti var moderne. Constant påviste at den antikke friheten verken var reell eller fullstendig, og utfordret dermed det romantiserte synet på fortidens samfunn. Denne debatten illustrerer den grunnleggende motsetningen mellom dem som trodde på en gullalder av frihet i fortiden, og liberale tenkere som hevdet at frihet er en progressiv historisk konstruksjon som utvikler seg over tid gjennom tekniske og økonomiske forbedringer.
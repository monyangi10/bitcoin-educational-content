question: Menurut argumen Benjamin Constant yang menentang Germaine de Staël, apa yang benar tentang kebebasan kuno?
answer: Kebebasan kuno tidak nyata atau lengkap
wrong_answers:
  - Kebebasan kuno itu sempurna dan harus dipulihkan
  - Kebebasan kuno lebih unggul daripada kebebasan modern
  - Kebebasan kuno adalah dasar dari semua kebebasan
explanation: |
  Benjamin Constant secara khusus membantah klaim Germaine de Staël bahwa kebebasan itu kuno dan despotisme itu modern. Constant menunjukkan bahwa kebebasan kuno itu tidak nyata dan tidak lengkap, menantang pandangan romantisme masyarakat masa lalu. Perdebatan ini menggambarkan pertentangan mendasar antara mereka yang percaya pada masa keemasan kebebasan masa lalu dan para pemikir liberal yang berpendapat bahwa kebebasan adalah konstruksi sejarah progresif yang berkembang dari waktu ke waktu melalui peningkatan teknis dan ekonomi.
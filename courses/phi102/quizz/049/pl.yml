question: Według argumentu Benjamina Constanta przeciwko Germaine de Staël, co było prawdą o starożytnej wolności?
answer: Starożytna wolność nie była ani prawdziwa, ani pełna
wrong_answers:
  - Starożytna wolność była doskonała i powinna zostać przywrócona
  - Starożytna wolność była lepsza od współczesnej
  - Starożytna wolność była podstawą wszelkiej wolności
explanation: |
  Benjamin Constant w szczególności obalił twierdzenie Germaine de Staël, że wolność była starożytna, a despotyzm nowoczesny. Constant wykazał, że starożytna wolność nie była ani prawdziwa, ani kompletna, podważając romantyczny obraz dawnych społeczeństw. Debata ta ilustruje fundamentalną opozycję między tymi, którzy wierzyli w złoty wiek wolności w przeszłości, a liberalnymi myślicielami, którzy twierdzili, że wolność jest postępową konstrukcją historyczną, która rozwija się z czasem dzięki ulepszeniom technicznym i gospodarczym.
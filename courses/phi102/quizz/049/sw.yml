question: Kulingana na hoja ya Benjamin Constant dhidi ya Germaine de Staël, ni nini kilichokuwa kweli kuhusu uhuru wa kale?
answer: Uhuru wa kale haukuwa halisi wala kamili
wrong_answers:
  - Uhuru wa kale ulikuwa mkamilifu na unapaswa kurejeshwa
  - Uhuru wa kale ulikuwa bora kuliko uhuru wa kisasa
  - Uhuru wa kale ulikuwa msingi wa uhuru wote
explanation: |
  Benjamin Constant alikanusha haswa dai la Germaine de Staël kwamba uhuru ulikuwa wa kale na udikteta ulikuwa wa kisasa. Constant alionyesha kwamba uhuru wa kale haukuwa halisi wala kamili, akipinga mtazamo wa kimapenzi wa jamii za zamani. Mjadala huu unaonyesha upinzani wa kimsingi kati ya wale walioamini katika enzi ya dhahabu ya uhuru uliopita na wanafikra huria waliosema kwamba uhuru ni ujenzi wa kihistoria unaoendelea unaoendelea baada ya muda kupitia maboresho ya kiufundi na kiuchumi.
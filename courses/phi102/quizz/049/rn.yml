question: Dukurikije imvo Benjamin Constant yashikirije Germaine de Staël, ni igiki cari ukuri ku bijanye n’umwidegemvyo wa kera?
answer: Umwidegemvyo wa kera ntiwari uw’ukuri canke ngo wuzuye .
wrong_answers:
  - Umwidegemvyo wa kera wari utunganye kandi ukwiye gusubirwamwo .
  - Umwidegemvyo wa kera wari uruta umwidegemvyo wo muri iki gihe .
  - Umwidegemvyo wa kera wari umushinge w'umwidegemvyo wose .
explanation: |
  Benjamin Constant yarahakanye mu buryo budasanzwe ivyo Germaine de Staël yavuze yuko umwidegemvyo wari uwa kera, ubutegetsi bw’agahomerabunwa na bwo bukaba ari ubwa none. Constant yerekanye yuko umwidegemvyo wa kera utari uw’ukuri canke ngo ube uwushitse, ivyo bikaba vyarateye urujijo ukuntu abantu ba kera babona ivy’urukundo. Iyi mpari yerekana ukurwanya kw’ishimikiro hagati y’abemera igihe c’inzahabu c’umwidegemvyo wa kera n’abanyabwenge b’abanyagihugu bavuga ko umwidegemvyo ari inyubakwa y’amateka itera imbere itera imbere uko igihe kigenda kirarenga biciye mu gutera imbere mu vy’ubuhinga no mu vy’ubutunzi.
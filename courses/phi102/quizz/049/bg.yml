question: Според аргумента на Бенджамин Констант срещу Жермен дьо Стаел, какво е вярно за древната свобода?
answer: Древната свобода не е била нито истинска, нито пълна
wrong_answers:
  - Древната свобода е била съвършена и трябва да бъде възстановена
  - Древната свобода превъзхожда съвременната
  - Древната свобода е в основата на всички свободи
explanation: |
  Бенджамин Констант специално опровергава твърдението на Жермен дьо Стаел, че свободата е древна, а деспотизмът - модерен. Констант доказва, че древната свобода не е била нито истинска, нито пълна, оспорвайки романтизираната представа за миналите общества. Този дебат илюстрира фундаменталното противопоставяне между онези, които вярват в златния век на свободата в миналото, и либералните мислители, които твърдят, че свободата е прогресивна историческа конструкция, която се развива с течение на времето чрез технически и икономически подобрения.
question: Prema argumentu Benjamina Constanta protiv Germaine de Staël, drevna sloboda je bila usmerena na kolektivnu slobodu zajednice, gde su pojedinačna prava često bila podređena interesima države.
answer: Drevna sloboda nije bila ni stvarna ni potpuna
wrong_answers:
  - Drevna sloboda je bila savršena i treba je obnoviti
  - Drevna sloboda je bila superiornija od moderne slobode
  - Drevna sloboda bila je temelj sve slobode
explanation: |
  Benjamin Constant je posebno osporio tvrdnju Germaine de Staël da je sloboda bila drevna, a despotizam moderan. Constant je pokazao da drevna sloboda nije bila ni stvarna ni potpuna, izazivajući romantičarski pogled na prošla društva. Ova debata ilustruje temeljnu opoziciju između onih koji su verovali u zlatno doba prošle slobode i liberalnih mislilaca koji su tvrdili da je sloboda progresivna istorijska konstrukcija koja se razvija tokom vremena kroz tehnička i ekonomska poboljšanja.
question: 根据本杰明-康斯坦针对杰曼-德-斯塔尔的论点，古代自由的真实情况是什么？
answer: 古代的自由既不真实也不完整
wrong_answers:
  - 古代的自由是完美的，应予以恢复
  - 古代自由优于现代自由
  - 古代自由是一切自由的基础
explanation: |
  本杰明-康斯坦特驳斥了热尔曼-德-斯塔尔关于自由是古代的而专制是现代的说法。康斯坦证明古代自由既不真实也不完整，对过去社会的浪漫主义观点提出了挑战。这场辩论说明了那些相信过去自由黄金时代的人与自由主义思想家之间的根本对立，后者认为自由是一种渐进的历史建构，随着时间的推移通过技术和经济的改进而发展。
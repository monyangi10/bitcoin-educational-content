question: Según el argumento de Benjamin Constant contra Germaine de Staël, ¿qué había de cierto en la antigua libertad?
answer: La antigua libertad no era real ni completa
wrong_answers:
  - La antigua libertad era perfecta y debe ser restaurada
  - La libertad antigua era superior a la moderna
  - La libertad antigua era la base de toda libertad
explanation: |
  Benjamin Constant refutó específicamente la afirmación de Germaine de Staël de que la libertad era antigua y el despotismo moderno. Constant demostró que la libertad antigua no era real ni completa, cuestionando la visión romántica de las sociedades del pasado. Este debate ilustra la oposición fundamental entre quienes creían en una edad de oro de la libertad pasada y los pensadores liberales que sostenían que la libertad es una construcción histórica progresiva que se desarrolla con el tiempo gracias a las mejoras técnicas y económicas.
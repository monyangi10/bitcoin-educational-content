question: Wat was volgens Benjamin Constants argument tegen Germaine de Staël waar over de vrijheid in de oudheid?
answer: De vrijheid van de oudheid was noch echt noch volledig
wrong_answers:
  - De vrijheid van de oudheid was perfect en moet worden hersteld
  - De vrijheid van de oudheid was superieur aan de vrijheid van vandaag
  - De vrijheid van de oudheid was de basis van alle vrijheid
explanation: |
  Benjamin Constant weerlegde de bewering van Germaine de Staël dat vrijheid oud was en despotisme modern. Constant toonde aan dat vrijheid in de oudheid noch echt noch volledig was, waarmee hij het geromantiseerde beeld van samenlevingen in het verleden uitdaagde. Dit debat illustreert de fundamentele tegenstelling tussen degenen die geloofden in een gouden eeuw van voorbije vrijheid en liberale denkers die beweerden dat vrijheid een progressieve historische constructie is die zich in de loop der tijd ontwikkelt door technische en economische verbeteringen.
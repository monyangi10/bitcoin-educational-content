question: Hvilket grunnleggende problem identifiserer teksten når sosialistiske tenkere forsvarer landegrenser mot utenlandsk aggresjon samtidig som de motsetter seg privat eiendomsrett?
answer: Det avslører en vilkårlig anvendelse av eiendomsprinsipper, som anerkjenner kollektive territoriale rettigheter på nasjonalt nivå, samtidig som det samme logiske grunnlaget for individuell eiendomsrett fornektes
wrong_answers:
  - Den viser at det nasjonale forsvaret krever militære ressurser som bare kan skaffes til veie gjennom sentralisert økonomisk planlegging snarere enn private markedsmekanismer
  - Den viser at kollektivt eierskap i seg selv er mer effektivt enn individuelt eierskap fordi nasjoner kan koordinere ressursallokeringen bedre enn private aktører
  - Det viser at folkeretten trumfer nasjonal eiendomsrett, noe som gjør nasjonal suverenitet til en juridisk nødvendighet, mens privat eiendomsrett forblir en sosial konvensjon
explanation: |
  I teksten argumenteres det for at sosialistisk forsvar av nasjonale grenser innebærer en implisitt anerkjennelse av kollektiv eiendomsrett - grenser er i bunn og grunn grenser for gruppeeiendom som fortjener beskyttelse. Dette skaper en logisk inkonsekvens: Hvis kollektiv eiendom fortjener respekt og forsvar på nasjonalt nivå, bør det samme prinsippet logisk sett også gjelde for mindre grupper og til syvende og sist for individer. De andre alternativene gir en feilaktig fremstilling av argumentet ved å fokusere på praktiske hensyn (militære ressurser, effektivitet, juridiske rammer) i stedet for den grunnleggende filosofiske selvmotsigelsen når det gjelder den selektive anvendelsen av prinsipper for anerkjennelse av eiendom.
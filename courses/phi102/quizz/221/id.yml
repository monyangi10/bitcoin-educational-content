question: Masalah mendasar apa yang diidentifikasi oleh teks tersebut ketika para pemikir sosialis mempertahankan perbatasan nasional dari agresi asing sekaligus menentang hak milik pribadi?
answer: Hal ini menunjukkan penerapan prinsip-prinsip properti yang sewenang-wenang, mengakui hak-hak teritorial kolektif di tingkat nasional sementara menyangkal landasan logis yang sama untuk kepemilikan properti individu
wrong_answers:
  - Hal ini menunjukkan bahwa pertahanan nasional membutuhkan sumber daya militer yang hanya dapat disediakan melalui perencanaan ekonomi terpusat dan bukan melalui mekanisme pasar swasta
  - Hal ini menunjukkan bahwa kepemilikan kolektif secara inheren lebih efisien daripada kepemilikan individu karena negara dapat mengoordinasikan alokasi sumber daya dengan lebih baik daripada aktor swasta
  - Hal ini membuktikan bahwa hukum internasional menggantikan hak milik domestik, menjadikan kedaulatan nasional sebagai kebutuhan hukum sementara kepemilikan pribadi tetap menjadi konvensi sosial
explanation: |
  Teks tersebut berargumen bahwa pertahanan sosialis atas perbatasan nasional merupakan pengakuan implisit atas hak milik kolektif - perbatasan pada dasarnya adalah batas-batas properti kelompok yang layak dilindungi. Hal ini menciptakan ketidakkonsistenan logis: jika hak milik kolektif layak dihormati dan dipertahankan dalam skala nasional, prinsip yang sama seharusnya secara logis diperluas ke kelompok-kelompok yang lebih kecil dan pada akhirnya ke individu-individu. Pilihan-pilihan lain salah mengartikan argumen dengan memfokuskan pada pertimbangan praktis (sumber daya militer, efisiensi, kerangka hukum) dan bukan pada kontradiksi filosofis yang mendasar tentang penerapan selektif prinsip-prinsip pengakuan properti.
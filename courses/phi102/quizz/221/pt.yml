question: Que problema fundamental identifica o texto quando os pensadores socialistas defendem as fronteiras nacionais contra a agressão estrangeira e, simultaneamente, se opõem aos direitos de propriedade privada?
answer: Revela uma aplicação arbitrária dos princípios de propriedade, reconhecendo direitos territoriais colectivos a nível nacional e negando o mesmo fundamento lógico à propriedade individual
wrong_answers:
  - Demonstra que a defesa nacional exige recursos militares que só podem ser fornecidos através de um planeamento económico centralizado e não através de mecanismos de mercado privados
  - Mostra que a propriedade colectiva é inerentemente mais eficiente do que a propriedade individual, porque as nações podem coordenar melhor a afetação de recursos do que os agentes privados
  - Prova que o direito internacional se sobrepõe aos direitos de propriedade nacionais, tornando a soberania nacional uma necessidade jurídica, enquanto a propriedade privada continua a ser uma convenção social
explanation: |
  O texto argumenta que a defesa socialista das fronteiras nacionais constitui um reconhecimento implícito dos direitos de propriedade colectiva - as fronteiras são essencialmente limites de propriedade de grupo que merecem proteção. Isto cria uma inconsistência lógica: se a propriedade colectiva merece respeito e defesa à escala nacional, o mesmo princípio deveria logicamente estender-se a grupos mais pequenos e, em última análise, aos indivíduos. As outras opções deturpam o argumento ao centrarem-se em considerações práticas (recursos militares, eficiência, quadros jurídicos) em vez da contradição filosófica fundamental relativa à aplicação selectiva dos princípios de reconhecimento da propriedade.
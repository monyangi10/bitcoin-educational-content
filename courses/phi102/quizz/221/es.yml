question: ¿Qué problema fundamental identifica el texto cuando los pensadores socialistas defienden las fronteras nacionales frente a la agresión extranjera al tiempo que se oponen a los derechos de propiedad privada?
answer: Revela una aplicación arbitraria de los principios de propiedad, reconociendo derechos territoriales colectivos a nivel nacional mientras niega el mismo fundamento lógico a la propiedad individual
wrong_answers:
  - Demuestra que la defensa nacional requiere recursos militares que sólo pueden proporcionarse mediante una planificación económica centralizada y no mediante mecanismos de mercado privados
  - Demuestra que la propiedad colectiva es intrínsecamente más eficiente que la individual porque las naciones pueden coordinar mejor la asignación de recursos que los agentes privados
  - Demuestra que el derecho internacional prevalece sobre los derechos de propiedad nacionales, convirtiendo la soberanía nacional en una necesidad jurídica, mientras que la propiedad privada sigue siendo una convención social
explanation: |
  El texto argumenta que la defensa socialista de las fronteras nacionales constituye un reconocimiento implícito de los derechos de propiedad colectiva: las fronteras son esencialmente límites de propiedad colectiva que merecen protección. Esto crea una incoherencia lógica: si la propiedad colectiva merece respeto y defensa a escala nacional, el mismo principio debería extenderse lógicamente a grupos más pequeños y, en última instancia, a los individuos. Las demás opciones tergiversan el argumento al centrarse en consideraciones prácticas (recursos militares, eficacia, marcos jurídicos) y no en la contradicción filosófica fundamental relativa a la aplicación selectiva de los principios de reconocimiento de la propiedad.
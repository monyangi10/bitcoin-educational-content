question: Văn bản này chỉ ra vấn đề cơ bản nào khi các nhà tư tưởng xã hội chủ nghĩa bảo vệ biên giới quốc gia chống lại sự xâm lược của nước ngoài đồng thời phản đối quyền sở hữu tư nhân?
answer: Điều này cho thấy sự áp dụng tùy tiện các nguyên tắc về quyền sở hữu, công nhận quyền lãnh thổ tập thể ở cấp quốc gia trong khi phủ nhận cơ sở logic tương tự đối với quyền sở hữu tài sản cá nhân.
wrong_answers:
  - Điều này chứng tỏ rằng quốc phòng đòi hỏi các nguồn lực quân sự chỉ có thể được cung cấp thông qua kế hoạch kinh tế tập trung chứ không phải thông qua các cơ chế thị trường tư nhân.
  - Điều này cho thấy sở hữu tập thể vốn dĩ hiệu quả hơn sở hữu cá nhân vì các quốc gia có thể phối hợp phân bổ nguồn lực tốt hơn so với các cá nhân tư nhân.
  - Điều này chứng minh rằng luật quốc tế có hiệu lực cao hơn quyền sở hữu trong nước, biến chủ quyền quốc gia thành một yêu cầu pháp lý thiết yếu trong khi quyền sở hữu tư nhân vẫn là một quy ước xã hội.
explanation: |
  Văn bản này lập luận rằng việc bảo vệ biên giới quốc gia theo chủ nghĩa xã hội ngầm thừa nhận quyền sở hữu tập thể - biên giới về bản chất là ranh giới của tài sản nhóm cần được bảo vệ. Điều này tạo ra một sự mâu thuẫn logic: nếu tài sản tập thể cần được tôn trọng và bảo vệ ở cấp quốc gia, thì nguyên tắc tương tự cũng cần được mở rộng đến các nhóm nhỏ hơn và cuối cùng là đến các cá nhân. Các lựa chọn khác đã xuyên tạc lập luận bằng cách tập trung vào các cân nhắc thực tiễn (nguồn lực quân sự, hiệu quả, khung pháp lý) thay vì mâu thuẫn triết học cơ bản liên quan đến việc áp dụng có chọn lọc các nguyên tắc công nhận quyền sở hữu.
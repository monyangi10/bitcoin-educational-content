question: Какъв фундаментален проблем идентифицира текстът, когато социалистическите мислители защитават националните граници от чужда агресия и същевременно се противопоставят на правото на частна собственост?
answer: Той разкрива произволно прилагане на принципите на собствеността, като признава колективни териториални права на национално равнище, отричайки същото логическо основание за индивидуалната собственост
wrong_answers:
  - Той показва, че националната отбрана изисква военни ресурси, които могат да бъдат осигурени само чрез централизирано икономическо планиране, а не чрез частни пазарни механизми
  - Той показва, че колективната собственост е по-ефективна от индивидуалната, тъй като държавите могат да координират по-добре разпределението на ресурсите от частните участници
  - Той доказва, че международното право замества националните права на собственост, като превръща националния суверенитет в правна необходимост, докато частната собственост остава социална конвенция
explanation: |
  В текста се твърди, че социалистическата защита на националните граници представлява имплицитно признаване на правата на колективна собственост - границите по същество са граници на групова собственост, които заслужават защита. Това създава логическа непоследователност: ако колективната собственост заслужава уважение и защита в национален мащаб, същият принцип логично трябва да се разпростре върху по-малките групи и в крайна сметка върху индивидите. Другите варианти представят аргумента погрешно, като се съсредоточават върху практически съображения (военни ресурси, ефективност, правни рамки), а не върху фундаменталното философско противоречие относно избирателното прилагане на принципите за признаване на собственост.
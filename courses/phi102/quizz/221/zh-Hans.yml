question: 社会主义思想家在捍卫国家边界抵御外来侵略的同时，又反对私有产权，文中指出了什么根本问题？
answer: 它揭示了对财产原则的任意应用，承认国家一级的集体领土权，却否认个人财产所有权有同样的逻辑基础
wrong_answers:
  - 它表明，国防需要军事资源，而军事资源只能通过中央集权的经济计划而不是私人市场机制来提供
  - 它表明，集体所有制本质上比个人所有制更有效率，因为国家比私人行为者能更好地协调资源分配
  - 它证明了国际法取代了国内财产权，使国家主权成为一种法律需要，而私有财产仍然是一种社会习俗
explanation: |
  文中认为，社会主义对国家边界的捍卫是对集体财产权的默示承认--边界本质上是值得保护的集体财产的边界。这就造成了逻辑上的不一致：如果集体财产在国家范围内值得尊重和捍卫，那么同样的原则在逻辑上也应该延伸到更小的群体，并最终延伸到个人。其他方案歪曲了这一论点，将重点放在实际考虑因素（军事资源、效率、法律框架）上，而不是选择性适用财产承认原则的基本哲学矛盾上。
question: Какую фундаментальную проблему выявляет текст, когда социалистические мыслители защищают национальные границы от иностранной агрессии и одновременно выступают против прав частной собственности?
answer: Он показывает произвольное применение принципов собственности, признавая коллективные территориальные права на национальном уровне и отрицая при этом логическое обоснование индивидуального владения собственностью
wrong_answers:
  - Он показывает, что для национальной обороны необходимы военные ресурсы, которые могут быть предоставлены только с помощью централизованного экономического планирования, а не частных рыночных механизмов
  - Он показывает, что коллективная собственность по своей сути более эффективна, чем индивидуальная, поскольку государства могут лучше координировать распределение ресурсов, чем частные субъекты
  - Он доказывает, что международное право отменяет внутренние права собственности, делая национальный суверенитет юридической необходимостью, в то время как частная собственность остается социальной конвенцией
explanation: |
  В тексте утверждается, что социалистическая защита национальных границ представляет собой косвенное признание прав коллективной собственности - границы, по сути, являются границами групповой собственности, заслуживающими защиты. Это создает логическое несоответствие: если коллективная собственность заслуживает уважения и защиты в национальном масштабе, то тот же принцип логически должен распространяться на более мелкие группы и, в конечном счете, на отдельных людей. Другие варианты искажают аргументацию, фокусируясь на практических соображениях (военные ресурсы, эффективность, правовая база), а не на фундаментальном философском противоречии, касающемся избирательного применения принципов признания собственности.
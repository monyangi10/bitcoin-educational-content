question: Ni ingorane iyihe y’ishimikiro ico canditswe kigaragaza igihe abanyabwenge b’abanyagihugu barwanira imipaka y’igihugu ubugizi bwa nabi bw’amahanga mu gihe nyene barwanya uburenganzira bw’itunga ry’abantu ku giti cabo?
answer: Birahishura ugukoresha ataco bimaze ingingo ngenderwako z’umutungo, kwemera uburenganzira bw’intara rusangi ku rwego rw’igihugu mu gihe bihakana uwo mushinge nyene w’ubwenge w’umuntu ku giti ciwe afise umutungo .
wrong_answers:
  - Birerekana ko uburinzi bw’igihugu busaba uburyo bwa gisirikare bushobora gutangwa gusa biciye mu migambi y’ubutunzi ihuriweko aho gutangwa n’uburyo bw’isoko ry’abikorera ku giti cabo .
  - Birerekana ko ubutunzi rusangi ari bwo bukora neza kurusha ubutunzi bw’umuntu ku giti ciwe kubera ko amahanga ashobora guhuza neza ugutanga umutungo kuruta abakozi b’abikorera ku giti cabo .
  - Birerekana ko amategeko mpuzamakungu asubirira uburenganzira bw’itunga ryo mu gihugu, bigatuma ubusegaba bw’igihugu buba ikintu gikenewe mu vy’amategeko mu gihe itunga ry’abantu ku giti cabo riguma ari isezerano ry’imibano .
explanation: |
  Ico canditswe kivuga ko ubusosiyalisiti bwo kurwanira imipaka y’igihugu ari ukwemera mu buryo butagaragara uburenganzira bw’umutungo rusangi - imipaka ni ahanini imipaka y’umutungo w’imigwi ikwiye kurindwa. Ivyo bituma habaho ukudahuza guhuye n’ubwenge: nimba umutungo rusangi ukwiye kwubahwa no kurwanirwa ku rugero rw’igihugu, iyo ngingo nyene ikwiye gushikira imigwi mitomito, amaherezo igashika no ku bantu ku giti cabo. Ayandi mahitamwo agaragaza nabi iyo mpamvu mu kwibanda ku bintu bikora (ubutunzi bw’igisirikare, ubushobozi, inzego z’amategeko) aho kwibanda ku ntambara y’ishimikiro ya filozofiya ku bijanye n’ugukoresha mu guhitamwo ingingo ngenderwako zo kwemera umutungo.
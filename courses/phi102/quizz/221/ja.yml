question: 社会主義思想家が外国の侵略から国境を守ると同時に、私有財産権に反対する場合、本文はどのような根本的問題を指摘するのか？
answer: これは、財産原則の恣意的な適用を明らかにするものであり、国家レベルで集団的な領土権を認める一方で、個人の財産所有権については同じ論理的基盤を否定するものである。
wrong_answers:
  - 国防には軍事資源が必要であり、それは民間の市場メカニズムではなく、中央集権的な経済計画によってのみ提供されうるということを示している。
  - 集団所有は本来、個人所有よりも効率的であることを示している。なぜなら、国家は民間主体よりも資源配分をうまく調整できるからである。
  - 国際法が国内の財産権に優先することを証明し、国家主権を法的に必要なものにする一方で、私有財産は社会的慣習にとどまっている。
explanation: |
  この文章では、社会主義者が国境を守ることは、集団所有権を暗黙のうちに認めることになると論じている。国境は本質的に、保護に値する集団所有の境界である。集団財産が国家規模で尊重され、防衛に値するのであれば、同じ原則が論理的にはより小さな集団、ひいては個人にも及ぶはずである。他の選択肢は、財産承認原則の選択的適用に関する根本的な哲学的矛盾ではなく、現実的な考慮事項（軍事資源、効率、法的枠組み）に焦点を当てることで、議論を誤魔化している。
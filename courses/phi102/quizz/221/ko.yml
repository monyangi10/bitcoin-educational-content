question: 사회주의 사상가들이 외국의 침략으로부터 국경을 방어하면서 동시에 사유 재산권에 반대하는 근본적인 문제는 무엇이라고 텍스트는 파악하고 있나요?
answer: 이는 재산 원칙을 자의적으로 적용하여 국가 차원에서 집단적 영토권을 인정하는 동시에 개인 재산 소유권에 대한 동일한 논리적 기반을 부정하는 것을 드러냅니다
wrong_answers:
  - 이는 국방에 민간 시장 메커니즘이 아닌 중앙 집중식 경제 계획을 통해서만 제공될 수 있는 군사 자원이 필요하다는 것을 보여줍니다
  - 국가가 민간 행위자보다 자원 배분을 더 잘 조정할 수 있기 때문에 집단적 소유권이 개인 소유권보다 본질적으로 더 효율적이라는 것을 보여줍니다
  - 이는 국제법이 국내 재산권에 우선하여 국가 주권이 법적 필요성이 있는 반면 사유 재산은 사회적 관습으로 남아 있음을 증명합니다
explanation: |
  이 글은 국경에 대한 사회주의적 방어가 집단 재산권에 대한 암묵적 인정을 구성한다고 주장합니다. 국경은 본질적으로 보호받을 가치가 있는 집단 재산의 경계입니다. 이는 논리적 모순을 야기합니다. 집단 재산이 국가 차원에서 존중되고 방어될 가치가 있다면 동일한 원칙이 논리적으로 소규모 집단과 궁극적으로 개인에게까지 확대되어야 합니다. 다른 옵션은 재산 인정 원칙의 선택적 적용에 관한 근본적인 철학적 모순보다는 실용적인 고려 사항(군사 자원, 효율성, 법적 프레임워크)에 초점을 맞추면서 논점을 잘못 표현하고 있습니다.
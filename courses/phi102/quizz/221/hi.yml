question: What fundamental problem does the text identify when socialist thinkers defend national borders against foreign aggression while simultaneously opposing private property rights?
answer: It reveals an arbitrary application of property principles, recognizing collective territorial rights at the national level while denying the same logical foundation for individual property ownership
wrong_answers:
  - It demonstrates that national defense requires military resources that can only be provided through centralized economic planning rather than private market mechanisms
  - It shows that collective ownership is inherently more efficient than individual ownership because nations can better coordinate resource allocation than private actors
  - It proves that international law supersedes domestic property rights, making national sovereignty a legal necessity while private property remains a social convention
explanation: |
  The text argues that socialist defense of national borders constitutes implicit recognition of collective property rights - frontiers are essentially boundaries of group property that deserve protection. This creates a logical inconsistency: if collective property deserves respect and defense at the national scale, the same principle should logically extend to smaller groups and ultimately to individuals. The other options misrepresent the argument by focusing on practical considerations (military resources, efficiency, legal frameworks) rather than the fundamental philosophical contradiction regarding the selective application of property recognition principles.
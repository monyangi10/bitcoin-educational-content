question: Quale problema fondamentale individua il testo quando i pensatori socialisti difendono i confini nazionali dall'aggressione straniera e contemporaneamente si oppongono ai diritti di proprietà privata?
answer: Rivela un'applicazione arbitraria dei principi della proprietà, riconoscendo i diritti territoriali collettivi a livello nazionale e negando lo stesso fondamento logico alla proprietà individuale
wrong_answers:
  - Dimostra che la difesa nazionale richiede risorse militari che possono essere fornite solo attraverso una pianificazione economica centralizzata piuttosto che attraverso meccanismi di mercato privati
  - Dimostra che la proprietà collettiva è intrinsecamente più efficiente di quella individuale, perché le nazioni possono coordinare meglio l'allocazione delle risorse rispetto agli attori privati
  - Dimostra che il diritto internazionale sostituisce i diritti di proprietà nazionali, rendendo la sovranità nazionale una necessità giuridica mentre la proprietà privata rimane una convenzione sociale
explanation: |
  Il testo sostiene che la difesa socialista dei confini nazionali costituisce un riconoscimento implicito dei diritti di proprietà collettiva - le frontiere sono essenzialmente confini di proprietà di gruppo che meritano protezione. Questo crea un'incongruenza logica: se la proprietà collettiva merita rispetto e difesa su scala nazionale, lo stesso principio dovrebbe logicamente estendersi a gruppi più piccoli e infine agli individui. Le altre opzioni travisano l'argomento concentrandosi su considerazioni pratiche (risorse militari, efficienza, quadri giuridici) piuttosto che sulla fondamentale contraddizione filosofica relativa all'applicazione selettiva dei principi di riconoscimento della proprietà.
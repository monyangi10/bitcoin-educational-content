question: Sosyalist düşünürlerin yabancı saldırganlığına karşı ulusal sınırları savunurken aynı zamanda özel mülkiyet haklarına karşı çıkmaları metinde hangi temel sorunu tanımlamaktadır?
answer: Mülkiyet ilkelerinin keyfi bir şekilde uygulandığını ortaya koymakta, ulusal düzeyde kolektif toprak haklarını tanırken, bireysel mülk sahipliği için aynı mantıksal temeli reddetmektedir
wrong_answers:
  - Ulusal savunmanın, özel piyasa mekanizmaları yerine ancak merkezi ekonomik planlama yoluyla sağlanabilecek askeri kaynaklar gerektirdiğini göstermektedir
  - Kolektif mülkiyetin doğası gereği bireysel mülkiyetten daha verimli olduğunu, çünkü ulusların kaynak tahsisini özel aktörlere göre daha iyi koordine edebildiğini göstermektedir
  - Uluslararası hukukun yerel mülkiyet haklarının yerine geçtiğini, ulusal egemenliği yasal bir gereklilik haline getirirken özel mülkiyetin sosyal bir gelenek olarak kaldığını kanıtlıyor
explanation: |
  Metin, ulusal sınırların sosyalist savunusunun kolektif mülkiyet haklarının zımnen tanınması anlamına geldiğini savunmaktadır - sınırlar esasen grup mülkiyetinin korunmayı hak eden sınırlarıdır. Bu mantıksal bir tutarsızlık yaratmaktadır: kolektif mülkiyet ulusal ölçekte saygı ve savunmayı hak ediyorsa, aynı ilke mantıksal olarak daha küçük gruplara ve nihayetinde bireylere kadar uzanmalıdır. Diğer seçenekler, mülkiyet tanıma ilkelerinin seçici olarak uygulanmasına ilişkin temel felsefi çelişkiden ziyade pratik hususlara (askeri kaynaklar, verimlilik, yasal çerçeveler) odaklanarak argümanı yanlış yansıtmaktadır.
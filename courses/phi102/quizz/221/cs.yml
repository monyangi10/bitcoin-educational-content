question: Jaký zásadní problém identifikuje text, když socialističtí myslitelé hájí státní hranice proti zahraniční agresi a zároveň se staví proti právům na soukromé vlastnictví?
answer: Odhaluje svévolné uplatňování vlastnických principů, které uznává kolektivní územní práva na národní úrovni a zároveň popírá stejný logický základ pro individuální vlastnictví
wrong_answers:
  - Ukazuje, že národní obrana vyžaduje vojenské zdroje, které lze zajistit pouze prostřednictvím centralizovaného ekonomického plánování, nikoliv soukromých tržních mechanismů
  - Ukazuje, že kolektivní vlastnictví je ze své podstaty efektivnější než vlastnictví individuální, protože národy mohou lépe koordinovat alokaci zdrojů než soukromé subjekty
  - Dokazuje, že mezinárodní právo je nadřazeno vnitrostátním vlastnickým právům, takže národní suverenita je právní nutností, zatímco soukromé vlastnictví zůstává společenskou konvencí
explanation: |
  Text tvrdí, že socialistická obrana státních hranic představuje implicitní uznání kolektivních vlastnických práv - hranice jsou v podstatě hranicemi skupinového vlastnictví, které si zaslouží ochranu. To vytváří logický rozpor: jestliže si kolektivní vlastnictví zaslouží respekt a obranu v národním měřítku, měl by se stejný princip logicky rozšířit i na menší skupiny a nakonec i na jednotlivce. Ostatní možnosti zkreslují argumentaci tím, že se zaměřují na praktické úvahy (vojenské zdroje, efektivita, právní rámce), a nikoli na základní filozofický rozpor týkající se selektivního uplatňování zásad uznávání vlastnictví.
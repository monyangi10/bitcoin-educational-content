question: Jaki fundamentalny problem identyfikuje tekst, gdy socjalistyczni myśliciele bronią granic państwowych przed obcą agresją, jednocześnie sprzeciwiając się prawom własności prywatnej?
answer: Ujawnia arbitralne stosowanie zasad własności, uznając zbiorowe prawa terytorialne na poziomie krajowym, jednocześnie odmawiając tej samej logicznej podstawy indywidualnej własności nieruchomości
wrong_answers:
  - Pokazuje, że obrona narodowa wymaga zasobów wojskowych, które mogą być zapewnione jedynie poprzez scentralizowane planowanie gospodarcze, a nie prywatne mechanizmy rynkowe
  - Pokazuje, że własność zbiorowa jest z natury bardziej wydajna niż własność indywidualna, ponieważ narody mogą lepiej koordynować alokację zasobów niż podmioty prywatne
  - Dowodzi to, że prawo międzynarodowe zastępuje krajowe prawa własności, czyniąc suwerenność narodową koniecznością prawną, podczas gdy własność prywatna pozostaje konwencją społeczną
explanation: |
  Tekst argumentuje, że socjalistyczna obrona granic państwowych stanowi dorozumiane uznanie zbiorowych praw własności - granice są zasadniczo granicami własności grupowej, które zasługują na ochronę. Tworzy to logiczną niespójność: jeśli własność zbiorowa zasługuje na szacunek i obronę w skali kraju, ta sama zasada powinna logicznie rozciągać się na mniejsze grupy, a ostatecznie na jednostki. Pozostałe opcje błędnie przedstawiają argument, koncentrując się na względach praktycznych (zasoby wojskowe, wydajność, ramy prawne), a nie na fundamentalnej sprzeczności filozoficznej dotyczącej selektywnego stosowania zasad uznawania własności.
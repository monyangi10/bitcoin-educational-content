question: متن چه مشکل اساسی را شناسایی می‌کند زمانی که متفکران سوسیالیست از مرزهای ملی در برابر تجاوز خارجی دفاع می‌کنند در حالی که به طور همزمان با حقوق مالکیت خصوصی مخالف هستند؟
answer: این نشان‌دهنده‌ی کاربرد دلخواه اصول مالکیت است که حقوق سرزمینی جمعی را در سطح ملی به رسمیت می‌شناسد، در حالی که همان پایه منطقی را برای مالکیت فردی بر اموال رد می‌کند.
wrong_answers:
  - این نشان می‌دهد که دفاع ملی به منابع نظامی نیاز دارد که تنها از طریق برنامه‌ریزی اقتصادی متمرکز و نه مکانیسم‌های بازار خصوصی قابل تأمین است.
  - این نشان می‌دهد که مالکیت جمعی ذاتاً کارآمدتر از مالکیت فردی است زیرا کشورها می‌توانند تخصیص منابع را بهتر از بازیگران خصوصی هماهنگ کنند.
  - این ثابت می‌کند که حقوق بین‌الملل بر حقوق مالکیت داخلی برتری دارد و حاکمیت ملی را به یک ضرورت قانونی تبدیل می‌کند، در حالی که مالکیت خصوصی به عنوان یک عرف اجتماعی باقی می‌ماند.
explanation: |
  متن استدلال می‌کند که دفاع سوسیالیستی از مرزهای ملی به‌طور ضمنی به معنای به رسمیت شناختن حقوق مالکیت جمعی است - مرزها اساساً مرزهای مالکیت گروهی هستند که شایسته حفاظت‌اند. این امر یک ناسازگاری منطقی ایجاد می‌کند: اگر مالکیت جمعی در مقیاس ملی شایسته احترام و دفاع است، همین اصل باید به‌طور منطقی به گروه‌های کوچکتر و در نهایت به افراد نیز گسترش یابد. گزینه‌های دیگر با تمرکز بر ملاحظات عملی (منابع نظامی، کارایی، چارچوب‌های قانونی) به‌جای تناقض فلسفی اساسی در مورد کاربرد انتخابی اصول به رسمیت شناختن مالکیت، استدلال را نادرست نشان می‌دهند.
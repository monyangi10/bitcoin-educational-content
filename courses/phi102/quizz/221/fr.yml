question: Quel problème fondamental le texte identifie-t-il lorsque les penseurs socialistes défendent les frontières nationales contre les agressions étrangères tout en s'opposant aux droits de propriété privée ?
answer: Elle révèle une application arbitraire des principes de la propriété, en reconnaissant des droits territoriaux collectifs au niveau national tout en refusant le même fondement logique à la propriété individuelle
wrong_answers:
  - Elle démontre que la défense nationale nécessite des ressources militaires qui ne peuvent être fournies que par une planification économique centralisée plutôt que par des mécanismes de marché privés
  - Elle montre que la propriété collective est intrinsèquement plus efficace que la propriété individuelle, car les nations peuvent mieux coordonner l'allocation des ressources que les acteurs privés
  - Il prouve que le droit international supplante les droits de propriété nationaux, faisant de la souveraineté nationale une nécessité juridique tandis que la propriété privée reste une convention sociale
explanation: |
  Le texte soutient que la défense socialiste des frontières nationales constitue une reconnaissance implicite des droits de propriété collective - les frontières sont essentiellement des limites de la propriété collective qui méritent d'être protégées. Cela crée une incohérence logique : si la propriété collective mérite d'être respectée et défendue à l'échelle nationale, le même principe devrait logiquement s'étendre à des groupes plus petits et, en fin de compte, aux individus. Les autres options déforment l'argument en se concentrant sur des considérations pratiques (ressources militaires, efficacité, cadres juridiques) plutôt que sur la contradiction philosophique fondamentale concernant l'application sélective des principes de reconnaissance de la propriété.
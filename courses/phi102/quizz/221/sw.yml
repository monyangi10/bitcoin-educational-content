question: Ni tatizo gani la msingi ambalo maandishi yanabainisha wakati wanafikra wa kisoshalisti wanapotetea mipaka ya kitaifa dhidi ya uchokozi wa kigeni huku wakipinga haki za mali binafsi kwa wakati mmoja?
answer: Inafichua matumizi ya kiholela ya kanuni za mali, ikitambua haki za pamoja za eneo katika ngazi ya kitaifa huku ikikataa msingi uleule wa kimantiki wa umiliki wa mali ya mtu binafsi.
wrong_answers:
  - Inaonyesha kwamba ulinzi wa taifa unahitaji rasilimali za kijeshi ambazo zinaweza kutolewa tu kupitia mipango ya uchumi ya kati badala ya mifumo ya soko la kibinafsi.
  - Inaonyesha kwamba umiliki wa pamoja una ufanisi zaidi kuliko umiliki wa mtu binafsi kwa sababu mataifa yanaweza kuratibu vyema ugawaji wa rasilimali kuliko watendaji binafsi.
  - Inathibitisha kwamba sheria ya kimataifa inazidi haki za mali za ndani, na kufanya uhuru wa kitaifa kuwa hitaji la kisheria huku mali binafsi ikibaki kuwa mkataba wa kijamii.
explanation: |
  Maandishi yanasema kwamba ulinzi wa kijamaa wa mipaka ya kitaifa unamaanisha utambuzi usio wazi wa haki za mali za pamoja - mipaka kimsingi ni mipaka ya mali za kikundi inayostahili kulindwa. Hii inaunda kutolingana kwa kimantiki: ikiwa mali ya pamoja inastahili heshima na ulinzi katika kiwango cha kitaifa, kanuni hiyo hiyo inapaswa kutumika kimantiki kwa vikundi vidogo na hatimaye kwa watu binafsi. Chaguzi zingine zinapotosha hoja kwa kuzingatia mambo ya vitendo (rasilimali za kijeshi, ufanisi, mifumo ya kisheria) badala ya utata wa kimsingi wa kifalsafa kuhusu matumizi teule ya kanuni za utambuzi wa mali.
question: 當社會主義思想家維護國家邊界不受外來侵略，同時又反對私有產權時，文中指出了什麼基本問題？
answer: 它揭示了財產原則的任意應用，在國家層面上承認集體領土權，卻否定個人財產所有權的相同邏輯基礎。
wrong_answers:
  - 它顯示出國防所需的軍事資源，只能透過中央集权的經濟規劃而非私人市場機制來提供
  - 它顯示集體所有權在本質上比個人所有權更有效率，因為國家比私人行動者更能協調資源分配。
  - 它證明了國際法取代了國內財產權，使國家主權成為法律上的必要，而私有財產仍然是一種社會習俗
explanation: |
  文中認為，社會主義對國家邊界的捍衛構成了對集體財產權的隱含承認--邊界基本上是值得保護的集體財產的邊界。這造成了邏輯上的不一致：如果集體財產在全國範圍內值得尊重和防衛，那麼同樣的原則在邏輯上也應該延伸到較小的群體，並最終延伸到個人。其他方案歪曲了論點，它們只著重於實際考慮（軍事資源、效率、法律框架），而非關於選擇性應用財產承認原則的基本哲學矛盾。
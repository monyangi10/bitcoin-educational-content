question: Dushingiye ku nseguro, ni igiki gitandukanya ubushobozi bw’umuntu wo muri iki gihe bwo kurwanya ubutegetsi bwose bw’abakomunisita n’abantu bo mu bihe vya kera vy’amateka?
answer: Abantu bo muri iki gihe bari baratsimbataje ubuhinga bwo gukora ibikorwa vy’ubwenge be n’imigenzo y’umwidegemvyo vyabaha ubushobozi n’ubushake bwo kwitegeka .
wrong_answers:
  - Abantu bo muri iki gihe bari bafise inkomezi z’umubiri n’ubuhinga bwa gisirikare kugira ngo barwanye neza ubutegetsi bw’agahomerabunwa .
  - Abantu bo muri iki gihe bari bafise uburenganzira bwo kuronka inzego za demokarasi zitanga uburinzi bushingiye ku mategeko kugira ngo Leta ntiyigarurire ubutegetsi burundu .
  - Abantu bo muri iki gihe barahungukiye ku mategeko mpuzamakungu no ku mashirahamwe yo kw’isi yose yabujije ko ubukomunisita bushirwa mu ngiro burundu .
explanation: |
  Ico canditswe kirasigura ko ubukomunisita bwananiwe kubera ko bwari bugereranya ugusubira mu mibano ya kera mu buryo butunguranye cane, mu gihe umuntu wo muri iki gihe yari yararonse biciye mu bikorwa vy’ubwenge no mu migenzo y’umwidegemvyo ubushobozi n’ubushake bwo kwitegeka. Iryo terambere ry’ubwenge n’ubumenyi ryatumye ubutegetsi bwose bw’abakomunisita butahuye n’akameremere k’abantu bo muri iki gihe. Inyishu zitari zo zishimika ku burinzi bwo hanze canke ubushobozi bwo ku mubiri, zibura iciyumviro nyamukuru kijanye n’iterambere ry’ubwenge n’ubumenyi ryo mu mutima ryatumye ukwitegeka gushoboka kandi kwipfuzwa.
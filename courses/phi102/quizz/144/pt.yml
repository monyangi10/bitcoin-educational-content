question: De acordo com a análise, o que distingue a capacidade do indivíduo moderno de resistir ao controlo comunista total das pessoas em períodos históricos anteriores?
answer: Os indivíduos modernos tinham desenvolvido competências de trabalho intelectual e práticas de liberdade que lhes davam a capacidade e a vontade de se autogovernarem
wrong_answers:
  - Os indivíduos modernos possuíam uma força física superior e tecnologia militar para resistir eficazmente ao controlo autoritário
  - Os indivíduos modernos tinham acesso a instituições democráticas que ofereciam proteção jurídica contra a tomada total do poder pelo Estado
  - Os indivíduos modernos beneficiaram de leis internacionais e organizações globais que impediram a implementação total do comunismo
explanation: |
  O texto explica que o comunismo falhou porque representava um regresso demasiado abrupto às sociedades do passado, quando o indivíduo moderno tinha adquirido, através do trabalho intelectual e da prática da liberdade, a capacidade e a vontade de se autogovernar. Este desenvolvimento intelectual e experimental tornou o controlo comunista total incompatível com a natureza humana moderna. As respostas erradas centram-se nas protecções externas ou nas capacidades físicas, ignorando o ponto-chave do desenvolvimento intelectual e experimental interno que tornou possível e desejada a auto-governação.
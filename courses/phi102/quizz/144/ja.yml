question: その分析によれば、共産主義の完全支配に抵抗する現代の個人の能力は、それ以前の歴史的時代の人々と何が違うのか？
answer: 近代的な個人は、知的な労働技能と自由な慣習を発達させ、自治の能力と意志を獲得した。
wrong_answers:
  - 近代の人々は、権威主義的な支配に効果的に抵抗するために、優れた体力と軍事技術を持っていた。
  - 現代の個人は、国家による完全な乗っ取りから法的に保護される民主的な制度を利用することができた。
  - 現代の個人は、共産主義の全面的な実行を妨げた国際法と世界的組織の恩恵を受けている。
explanation: |
  共産主義が失敗したのは、それがあまりにも唐突に過去の社会への回帰を意味したからであり、一方、近代的な個人は、知的労働と自由な実践を通じて、自己統治の能力と意志の両方を獲得していたからだと、この文章は説明している。この知的、経験的な発展が、共産主義による完全な支配を現代の人間の本質とは相容れないものにしていたのである。間違った答えは、外的な保護や身体的な能力に焦点を当て、自己統治を可能にし、またそれを望んだ内的な知的・経験的発展についての重要なポイントを逃している。
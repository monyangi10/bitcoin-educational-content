question: Според философията на естественото право какво прави човешката мисъл и нейното изразяване принципно неприкосновени?
answer: Мисълта е пряко продължение на индивидуалната воля и свободната съвест, което я прави лична собственост, която не може да бъде контролирана от външна власт
wrong_answers:
  - Мисълта е защитена от демократични институции и конституционни рамки, които гарантират основните права на човека
  - Мисълта става неприкосновена чрез социални договори, които установяват взаимно уважение между гражданите и техните правителства
  - Мисълта се защитава от религиозни принципи, които признават божествения произход на човешките способности за разсъждение
explanation: |
  Правилният отговор отразява основата на естественото право, представена в съдържанието. Човешката мисъл се смята за неприкосновена, защото произтича пряко от индивидуалната воля и свободната съвест, което я прави лична собственост, която никой външен орган не може да контролира. Макар че властите могат да потискат физическия израз на идеите, те не могат да контролират самия акт на мислене. Неправилните отговори неправилно предполагат, че защитата на мисълта идва от институционални, социални или религиозни източници, а не от присъщата ѝ природа като продължение на индивидуалната воля и лична собственост.
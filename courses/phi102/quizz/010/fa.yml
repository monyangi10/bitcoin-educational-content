question: بر اساس فلسفه قانون طبیعی، چه چیزی باعث می‌شود که تفکر انسانی و بیان آن به‌طور اساسی غیرقابل‌نقض باشد؟
answer: اندیشه یک امتداد مستقیم از اراده فردی و وجدان آزاد است که آن را به مالکیت شخصی تبدیل می‌کند که نمی‌تواند توسط قدرت خارجی کنترل شود.
wrong_answers:
  - اندیشه توسط نهادهای دموکراتیک و چارچوب‌های قانون اساسی که حقوق اساسی بشر را تضمین می‌کنند، محافظت می‌شود.
  - اندیشه از طریق قراردادهای اجتماعی که احترام متقابل بین شهروندان و دولت‌هایشان را برقرار می‌کند، مصون می‌شود.
  - اندیشه توسط اصول دینی که منشأ الهی توانایی‌های استدلال انسانی را به رسمیت می‌شناسند، محافظت می‌شود.
explanation: |
  پاسخ صحیح بازتاب‌دهنده‌ی بنیان قانون طبیعی ارائه‌شده در محتوا است. اندیشه‌ی انسانی غیرقابل‌تخطی در نظر گرفته می‌شود زیرا مستقیماً از اراده‌ی فردی و وجدان آزاد جریان می‌یابد و آن را به مالکیت شخصی تبدیل می‌کند که هیچ مرجع خارجی نمی‌تواند واقعاً کنترل کند. در حالی که مقامات ممکن است بیان فیزیکی ایده‌ها را سرکوب کنند، نمی‌توانند خود عمل تفکر را کنترل کنند. پاسخ‌های نادرست به اشتباه پیشنهاد می‌کنند که حفاظت از اندیشه از منابع نهادی، اجتماعی یا مذهبی ناشی می‌شود، نه از ماهیت ذاتی آن به عنوان گسترش اراده‌ی فردی و مالکیت شخصی.
question: Co činí podle filosofie přirozeného práva lidské myšlení a jeho projevy zásadně nedotknutelnými?
answer: Myšlenka je přímým pokračováním individuální vůle a svobodného svědomí, což z ní činí osobní vlastnictví, které nemůže být kontrolováno vnější autoritou
wrong_answers:
  - Myšlení je chráněno demokratickými institucemi a ústavními rámci, které zaručují základní lidská práva
  - Myšlení se stává nedotknutelným díky společenským smlouvám, které zakládají vzájemný respekt mezi občany a jejich vládami
  - Myšlení je chráněno náboženskými zásadami, které uznávají božský původ lidských rozumových schopností
explanation: |
  Správná odpověď odráží přirozenoprávní základ prezentovaný v obsahu. Lidské myšlení je považováno za nedotknutelné, protože vychází přímo z individuální vůle a svobodného svědomí, což z něj činí osobní vlastnictví, které žádná vnější autorita nemůže skutečně kontrolovat. Autority sice mohou potlačovat fyzické vyjádření myšlenek, ale nemohou kontrolovat samotný akt myšlení. Nesprávné odpovědi nesprávně naznačují, že ochrana myšlenky pochází z institucionálních, společenských nebo náboženských zdrojů, a nikoli z její přirozené povahy jako prodloužení individuální vůle a osobního vlastnictví.
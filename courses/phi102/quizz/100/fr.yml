question: Selon la théorie économique, quelle est la caractéristique fondamentale qui rend l'échange volontaire bénéfique pour la société ?
answer: Le Exchange est un jeu à somme positive dans lequel les deux parties tirent un bénéfice mutuel
wrong_answers:
  - Exchange crée de la richesse matérielle en transformant des matières premières en produits finis
  - Exchange redistribue les ressources des participants riches aux participants pauvres de manière égale
  - Exchange élimine la rareté en maximisant la quantité totale de biens disponibles
explanation: |
  L'échange volontaire est fondamentalement un jeu à somme positive, car les deux parties s'engagent dans la transaction en espérant en tirer un bénéfice, sinon elles choisiraient simplement de ne pas s'engager. Comme le montre l'analyse de l'abbé de Saint-Pierre, lorsqu'une vente a lieu entre marchands, le vendeur et l'acheteur y gagnent - le vendeur ne vendrait pas à ce prix et l'acheteur n'achèterait pas si les deux n'y trouvaient pas leur compte. Ce principe de l'avantage mutuel explique pourquoi la multiplication des échanges enrichit les sociétés alors que la réduction du commerce diminue la prospérité. Les autres options sont incorrectes car l'échange ne crée pas de richesse matérielle (il crée de l'utilité), ne redistribue pas la richesse de manière égale et n'élimine pas la rareté, mais optimise l'allocation des ressources par le biais de la coopération volontaire.
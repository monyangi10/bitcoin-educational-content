question: Kulingana na nadharia ya kiuchumi, ni sifa gani ya msingi inayofanya ubadilishanaji wa hiari kuwa na manufaa kwa jamii?
answer: Exchange ni mchezo wa jumla chanya ambapo pande zote mbili hupata faida ya pande zote mbili
wrong_answers:
  - Exchange huunda utajiri wa mali kwa kubadilisha malighafi kuwa bidhaa zilizokamilika
  - Exchange inasambaza rasilimali kutoka kwa washiriki matajiri hadi maskini kwa usawa
  - Exchange huondoa uhaba kwa kuongeza jumla ya bidhaa zinazopatikana
explanation: |
  Ubadilishanaji wa hiari kimsingi ni mchezo mzuri wa jumla kwa sababu pande zote mbili huingia katika muamala wakitarajia kunufaika, vinginevyo wangechagua tu kutoshiriki. Kama ilivyoonyeshwa na uchambuzi wa Abbé de Saint-Pierre, wakati mauzo yanapotokea kati ya wafanyabiashara, muuzaji na mnunuzi hupata faida - muuzaji hangeuza kwa bei hiyo na mnunuzi hangenunua isipokuwa wote wawili waone kuwa ni faida. Kanuni hii ya manufaa ya pande zote inaelezea kwa nini kuzidisha ubadilishanaji huimarisha jamii huku kupunguza biashara kunapunguza ustawi. Chaguzi zingine si sahihi kwa sababu ubadilishanaji haujengi utajiri wa kimwili (huunda matumizi), haugawi tena utajiri kwa usawa, na hauondoi uhaba bali huboresha mgao wa rasilimali kupitia ushirikiano wa hiari.
question: Welches grundlegende Merkmal macht nach der Wirtschaftstheorie den freiwilligen Tausch für die Gesellschaft vorteilhaft?
answer: Exchange ist ein Positivsummenspiel, bei dem beide Parteien einen gegenseitigen Nutzen haben
wrong_answers:
  - Exchange schafft materiellen Wohlstand durch die Umwandlung von Rohstoffen in Fertigwaren
  - Exchange verteilt die Ressourcen von wohlhabenden zu armen Teilnehmern gleichmäßig um
  - Exchange beseitigt Knappheit durch Maximierung der Gesamtmenge der verfügbaren Güter
explanation: |
  Der freiwillige Austausch ist grundsätzlich ein Positivsummenspiel, weil beide Parteien die Transaktion in der Erwartung eingehen, davon zu profitieren, sonst würden sie sich einfach nicht beteiligen. Wie die Analyse des Abbé de Saint-Pierre zeigt, profitieren bei einem Verkauf zwischen Kaufleuten sowohl der Verkäufer als auch der Käufer - der Verkäufer würde nicht zu diesem Preis verkaufen und der Käufer würde nicht kaufen, wenn es nicht für beide von Vorteil wäre. Dieses Prinzip des gegenseitigen Nutzens erklärt, warum die Vermehrung des Austauschs die Gesellschaft bereichert, während die Verringerung des Handels den Wohlstand schmälert. Die anderen Optionen sind falsch, weil der Tausch keinen materiellen Reichtum schafft (er schafft Nutzen), den Reichtum nicht gleichmäßig umverteilt und die Knappheit nicht beseitigt, sondern vielmehr die Ressourcenverteilung durch freiwillige Zusammenarbeit optimiert.
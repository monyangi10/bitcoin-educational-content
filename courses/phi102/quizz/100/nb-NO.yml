question: Hvilken grunnleggende egenskap er det ifølge økonomisk teori som gjør frivillig bytte gunstig for samfunnet?
answer: Exchange er et pluss-sum-spill der begge parter oppnår gjensidig nytte
wrong_answers:
  - Exchange skaper materiell velstand ved å omdanne råvarer til ferdige varer
  - Exchange omfordeler ressurser fra velstående til fattige deltakere på en rettferdig måte
  - Exchange eliminerer knapphet ved å maksimere den totale mengden av tilgjengelige varer
explanation: |
  Frivillig bytte er i bunn og grunn et pluss-sum-spill fordi begge parter går inn i transaksjonen med en forventning om å tjene på det, ellers ville de ganske enkelt valgt å la være. Som Abbé de Saint-Pierres analyse viser, tjener både selger og kjøper på et salg mellom kjøpmenn - selgeren ville ikke solgt til den prisen, og kjøperen ville ikke kjøpt hvis ikke begge fant det fordelaktig. Dette prinsippet om gjensidig nytte forklarer hvorfor et samfunn blir rikere av å øke handelen, mens det blir fattigere av å redusere den. De andre alternativene er feil fordi bytte ikke skaper materiell velstand (det skaper nytte), ikke omfordeler velstand likt og ikke eliminerer knapphet, men snarere optimaliserer ressursallokeringen gjennom frivillig samarbeid.
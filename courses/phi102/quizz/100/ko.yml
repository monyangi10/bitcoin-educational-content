question: 경제 이론에 따르면 자발적 교환을 사회에 유익하게 만드는 근본적인 특성은 무엇인가요?
answer: Exchange은 양측이 상호 이익을 얻는 포지티브섬 게임입니다
wrong_answers:
  - Exchange은 원자재를 완제품으로 전환하여 물질적 부를 창출합니다
  - Exchange는 부유한 참가자와 가난한 참가자에게 동등하게 자원을 재분배합니다
  - Exchange는 사용 가능한 상품의 총 수량을 최대화하여 희소성을 제거합니다
explanation: |
  자발적 교환은 기본적으로 양쪽 당사자 모두 이익을 기대하며 거래에 참여하기 때문에 포지티브섬 게임이며, 그렇지 않다면 거래에 참여하지 않으려 할 것입니다. 생피에르 수사의 분석에서 알 수 있듯이, 판매자 간에 판매가 이루어지면 판매자와 구매자 모두 이익을 얻게 되는데, 판매자는 그 가격에 판매하지 않고 구매자는 그 가격에 구매하지 않는다면 둘 다 이득을 얻지 못합니다. 이러한 상호 이익 원칙은 거래가 늘어나면 사회가 풍요로워지고 상거래가 줄어들면 번영이 감소하는 이유를 설명합니다. 교환은 물질적 부를 창출하지 않고(효용을 창출함), 부를 공평하게 재분배하지 않으며, 희소성을 제거하지 않고 자발적인 협력을 통해 자원 배분을 최적화하기 때문에 다른 옵션은 올바르지 않습니다.
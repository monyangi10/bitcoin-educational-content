question: 経済理論によれば、自発的交換が社会にとって有益である基本的特徴は何か？
answer: Exchangeは、双方が利益を得るポジティブサムゲームである。
wrong_answers:
  - Exchangeは、原材料を最終製品に変えることで物質的な豊かさを生み出す。
  - Exchangeは、裕福な参加者から貧しい参加者へ平等に資源を再配分する。
  - Exchangeは、入手可能な財の総量を最大化することによって希少性を排除する。
explanation: |
  自発的な交換は、基本的にポジティブサムゲームである。なぜなら、当事者双方が利益を期待して取引に参加するからであり、そうでなければ、単に参加しないことを選択するだけだからである。サン＝ピエール修道院長の分析が示すように、商人の間で売買が成立すれば、売り手と買い手の双方が得をする。売り手はその値段では売らないし、買い手は双方が有利だと思わなければ買わない。この相互利益原則は、なぜ交換を増やすと社会が豊かになり、逆に商取引を減らすと繁栄が失われるのかを説明している。交換は物質的な富を生み出さず（効用を生み出す）、富を平等に再分配せず、欠乏をなくすのではなく、自発的な協力によって資源配分を最適化するのだから、他の選択肢は正しくない。
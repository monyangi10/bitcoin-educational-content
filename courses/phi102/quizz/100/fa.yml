question: بر اساس نظریه اقتصادی، چه ویژگی اساسی باعث می‌شود که مبادله داوطلبانه برای جامعه مفید باشد؟
answer: Exchange یک بازی با مجموع مثبت است که در آن هر دو طرف از منافع متقابل بهره‌مند می‌شوند.
wrong_answers:
  - Exchange با تبدیل مواد خام به کالاهای نهایی، ثروت مادی ایجاد می‌کند.
  - Exchange منابع را به طور مساوی از شرکت‌کنندگان ثروتمند به شرکت‌کنندگان فقیر بازتوزیع می‌کند.
  - Exchange با حداکثر کردن مقدار کل کالاهای موجود، کمبود را از بین می‌برد.
explanation: |
  مبادله داوطلبانه اساساً یک بازی با مجموع مثبت است زیرا هر دو طرف با انتظار بهره‌مندی وارد معامله می‌شوند، در غیر این صورت به سادگی انتخاب می‌کردند که وارد نشوند. همان‌طور که در تحلیل Abbé de Saint-Pierre نشان داده شده است، زمانی که یک فروش بین بازرگانان رخ می‌دهد، هم فروشنده و هم خریدار سود می‌برند - فروشنده در آن قیمت نمی‌فروشد و خریدار خرید نمی‌کند مگر اینکه هر دو آن را سودمند بیابند. این اصل سود متقابل توضیح می‌دهد که چرا افزایش مبادلات جوامع را غنی می‌کند در حالی که کاهش تجارت باعث کاهش رفاه می‌شود. گزینه‌های دیگر نادرست هستند زیرا مبادله ثروت مادی ایجاد نمی‌کند (بلکه سودمندی ایجاد می‌کند)، ثروت را به طور مساوی توزیع نمی‌کند و کمبود را از بین نمی‌برد بلکه تخصیص منابع را از طریق همکاری داوطلبانه بهینه می‌کند.
question: Welk fundamenteel kenmerk van vrijwillige ruil is volgens de economische theorie gunstig voor de samenleving?
answer: Exchange is een positief-somspel waar beide partijen voordeel bij hebben
wrong_answers:
  - Exchange creëert materiële welvaart door grondstoffen om te zetten in eindproducten
  - Exchange herverdeelt middelen gelijkmatig van rijke naar arme deelnemers
  - Exchange elimineert schaarste door de totale hoeveelheid beschikbare goederen te maximaliseren
explanation: |
  Vrijwillige ruil is fundamenteel een positief-somspel omdat beide partijen de transactie aangaan in de verwachting er voordeel uit te halen, anders zouden ze er gewoon voor kiezen om niet deel te nemen. Zoals de analyse van Abbé de Saint-Pierre aantoont, hebben zowel de verkoper als de koper baat bij een verkoop tussen kooplieden - de verkoper zou niet voor die prijs verkopen en de koper zou niet kopen als beiden het niet voordelig vonden. Dit principe van wederzijds voordeel verklaart waarom het vermenigvuldigen van uitwisselingen samenlevingen verrijkt terwijl het verminderen van de handel de welvaart vermindert. De andere opties zijn onjuist omdat uitwisseling geen materiële rijkdom creëert (het creëert nut), rijkdom niet gelijkelijk herverdeelt en schaarste niet opheft, maar eerder de toewijzing van middelen optimaliseert door vrijwillige samenwerking.
question: Menurut teori ekonomi, karakteristik fundamental apa yang membuat pertukaran sukarela bermanfaat bagi masyarakat?
answer: Exchange adalah permainan jumlah positif di mana kedua belah pihak mendapatkan keuntungan bersama
wrong_answers:
  - Exchange menciptakan kekayaan material dengan mengubah bahan mentah menjadi barang jadi
  - Exchange mendistribusikan sumber daya dari peserta yang kaya ke peserta yang miskin secara merata
  - Exchange menghilangkan kelangkaan dengan memaksimalkan jumlah total barang yang tersedia
explanation: |
  Pertukaran sukarela pada dasarnya adalah permainan jumlah positif karena kedua belah pihak melakukan transaksi dengan harapan mendapatkan keuntungan, jika tidak, mereka akan memilih untuk tidak terlibat. Seperti yang ditunjukkan oleh analisis Abbé de Saint-Pierre, ketika penjualan terjadi di antara para pedagang, baik penjual maupun pembeli sama-sama diuntungkan - penjual tidak akan menjual dengan harga tersebut dan pembeli tidak akan membeli kecuali jika keduanya merasa diuntungkan. Prinsip saling menguntungkan ini menjelaskan mengapa memperbanyak pertukaran dapat memperkaya masyarakat, sementara mengurangi perdagangan akan mengurangi kemakmuran. Pilihan lain tidak benar karena pertukaran tidak menciptakan kekayaan materi (hanya menciptakan utilitas), tidak mendistribusikan kekayaan secara merata, dan tidak menghilangkan kelangkaan, melainkan mengoptimalkan alokasi sumber daya melalui kerja sama sukarela.
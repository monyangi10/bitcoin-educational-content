question: Jaká základní vlastnost podle ekonomické teorie činí dobrovolnou směnu pro společnost výhodnou?
answer: Exchange je hra s kladným součtem, v níž obě strany získávají vzájemný prospěch
wrong_answers:
  - Exchange vytváří materiální bohatství přeměnou surovin na hotové výrobky
  - Exchange přerozděluje rovnoměrně zdroje od bohatých k chudým účastníkům
  - Exchange odstraňuje nedostatek tím, že maximalizuje celkové množství dostupných statků
explanation: |
  Dobrovolná směna je v zásadě hra s kladným součtem, protože obě strany vstupují do transakce s očekáváním prospěchu, jinak by se jednoduše rozhodly do ní nezapojit. Jak ukazuje analýza abbého de Saint-Pierre, když dojde k prodeji mezi obchodníky, vydělá na tom jak prodávající, tak kupující - prodávající by za tuto cenu neprodával a kupující by nekupoval, pokud by to oba nepovažovali za výhodné. Tento princip vzájemného prospěchu vysvětluje, proč rozmnožování směny obohacuje společnost, zatímco omezování obchodu prosperitu snižuje. Ostatní možnosti jsou nesprávné, protože směna nevytváří materiální bohatství (vytváří užitek), nepřerozděluje bohatství rovnoměrně a neodstraňuje nedostatek, ale spíše optimalizuje alokaci zdrojů prostřednictvím dobrovolné spolupráce.
question: Според икономическата теория коя основна характеристика прави доброволната размяна полезна за обществото?
answer: Exchange е игра с положителна сума, при която и двете страни получават взаимна изгода
wrong_answers:
  - Exchange създава материално богатство, като превръща суровините в готови стоки
  - Exchange преразпределя равномерно ресурсите от богатите към бедните участници
  - Exchange елиминира недостига, като максимизира общото количество налични стоки
explanation: |
  Доброволната размяна по същество е игра с положителна сума, тъй като и двете страни влизат в сделката с очакването да се възползват, защото в противен случай те просто биха избрали да не участват. Както се вижда от анализа на абат дьо Сен-Пиер, когато се извършва продажба между търговци, печелят и продавачът, и купувачът - продавачът не би продал на тази цена, а купувачът не би купил, ако и двамата не я намерят за изгодна. Този принцип на взаимната изгода обяснява защо умножаването на обмена обогатява обществата, а намаляването на търговията намалява благосъстоянието. Другите варианти са неправилни, защото размяната не създава материално богатство (тя създава полезност), не преразпределя богатството равномерно и не премахва недостига, а по-скоро оптимизира разпределението на ресурсите чрез доброволно сътрудничество.
question: Enligt ekonomisk teori, vilken grundläggande egenskap gör frivilligt utbyte fördelaktigt för samhället?
answer: Exchange är ett spel med positiv summa där båda parter tjänar på det
wrong_answers:
  - Exchange skapar materiell rikedom genom att omvandla råvaror till färdiga varor
  - Exchange omfördelar resurser från rika till fattiga deltagare på ett jämlikt sätt
  - Exchange eliminerar knapphet genom att maximera den totala kvantiteten av tillgängliga varor
explanation: |
  Frivilligt utbyte är i grunden ett spel med positiv summa eftersom båda parter går in i transaktionen och förväntar sig att vinna på det, annars skulle de helt enkelt välja att inte delta. Som framgår av Abbé de Saint-Pierres analys tjänar både säljaren och köparen på en försäljning mellan köpmän - säljaren skulle inte sälja till det priset och köparen skulle inte köpa om inte båda fann det fördelaktigt. Denna princip om ömsesidig nytta förklarar varför ett ökat utbyte berikar samhällen medan minskad handel minskar välståndet. De andra alternativen är felaktiga eftersom utbyte inte skapar materiell rikedom (det skapar nytta), inte omfördelar rikedomar lika och inte eliminerar knapphet utan snarare optimerar resursfördelningen genom frivilligt samarbete.
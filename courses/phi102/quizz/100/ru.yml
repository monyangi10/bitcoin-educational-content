question: Согласно экономической теории, какая фундаментальная характеристика делает добровольный обмен выгодным для общества?
answer: Exchange - это игра с положительной суммой, в которой обе стороны получают взаимную выгоду
wrong_answers:
  - Exchange создает материальные блага, превращая сырье в готовые изделия
  - Exchange перераспределяет ресурсы от богатых участников к бедным в равной степени
  - Exchange устраняет дефицит, максимизируя общее количество доступных товаров
explanation: |
  Добровольный обмен - это игра с положительной суммой, потому что обе стороны вступают в сделку, ожидая получить выгоду, иначе они просто предпочли бы не вступать в нее. Как показывает анализ аббата де Сен-Пьера, когда происходит продажа между купцами, выигрывают и продавец, и покупатель - продавец не стал бы продавать по такой цене, а покупатель не стал бы покупать, если бы оба не сочли это выгодным. Этот принцип взаимной выгоды объясняет, почему умножение обмена обогащает общество, а сокращение торговли снижает его благосостояние. Остальные варианты неверны, поскольку обмен не создает материальных благ (он создает полезность), не перераспределяет богатство поровну и не устраняет дефицит, а скорее оптимизирует распределение ресурсов посредством добровольного сотрудничества.
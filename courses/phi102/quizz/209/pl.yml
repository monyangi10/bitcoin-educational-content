question: Według analizy Paula Leroy-Beaulieu, dlaczego marksistowskie kategorie klasowe nie opisują dokładnie współczesnych społeczeństw kapitalistycznych?
answer: Ponieważ bogaci artyści, sportowcy i intelektualiści byliby klasyfikowani jako proletariusze pomimo swoich wysokich dochodów, ujawniając absurdalność definicji klasowych opartych na własności
wrong_answers:
  - Ponieważ nowoczesne społeczeństwa wyeliminowały wszelkie formy nierówności ekonomicznych i różnic klasowych poprzez progresywne opodatkowanie i programy opieki społecznej
  - Ponieważ burżuazja z powodzeniem ukryła swoją własność środków produkcji poprzez złożone struktury korporacyjne i instrumenty finansowe
  - Ponieważ postęp technologiczny sprawił, że praca fizyczna stała się przestarzała, czyniąc rozróżnienie między pracownikiem a właścicielem bez znaczenia w gospodarkach postindustrialnych
explanation: |
  Leroy-Beaulieu demonstruje bezsensowność marksistowskich kategorii klasowych, pokazując ich logiczne niespójności w zastosowaniu do rzeczywistych sytuacji. Bogaci artyści, znani piłkarze, dziennikarze i prawnicy byliby klasyfikowani jako proletariusze zgodnie z teorią marksistowską, ponieważ nie są właścicielami środków produkcji, pomimo ich bogactwa i statusu. Ujawnia to, w jaki sposób definicje klasowe oparte na własności nie są w stanie uchwycić złożoności współczesnych społeczeństw, w których tworzenie wartości w coraz większym stopniu zależy od pracy intelektualnej i indywidualnego talentu, a nie od własności kapitału.
question: Miksi marxilaiset luokkakategoriat eivät Paul Leroy-Beaulieun analyysin mukaan pysty kuvaamaan tarkasti nykyaikaisia kapitalistisia yhteiskuntia?
answer: Koska varakkaat taiteilijat, urheilijat ja intellektuellit luokiteltaisiin proletaareiksi suurista tuloistaan huolimatta, mikä paljastaa omistukseen perustuvien luokkamääritelmien järjettömyyden
wrong_answers:
  - Koska nykyaikaiset yhteiskunnat ovat poistaneet kaikenlaisen taloudellisen eriarvoisuuden ja luokkaerot progressiivisen verotuksen ja sosiaalihuolto-ohjelmien avulla
  - Koska porvaristo on onnistunut piilottamaan tuotantovälineiden omistusoikeutensa monimutkaisten yritysrakenteiden ja rahoitusvälineiden avulla
  - Koska teknologinen kehitys on tehnyt fyysisen työn tarpeettomaksi, jolloin työntekijän ja omistajan välinen ero on merkityksetön jälkiteollisissa talouksissa
explanation: |
  Leroy-Beaulieu osoittaa marxilaisten luokkakategorioiden hyödyttömyyden osoittamalla niiden loogiset epäjohdonmukaisuudet, kun niitä sovelletaan todellisiin tilanteisiin. Rikkaat taiteilijat, kuuluisat jalkapalloilijat, toimittajat ja lakimiehet luokiteltaisiin marxilaisen teorian mukaan proletaareiksi, koska he eivät omista tuotantovälineitään varallisuudestaan ja asemastaan huolimatta. Tämä paljastaa, miten omistajuuteen perustuvat luokkamääritelmät eivät pysty kuvaamaan nykyaikaisten yhteiskuntien monimutkaisuutta, joissa arvonluonti riippuu yhä enemmän henkisestä työstä ja yksilöllisestä lahjakkuudesta eikä niinkään pääoman omistuksesta.
question: 根据保罗-勒鲁瓦-博略的分析，为什么马克思主义的阶级分类无法准确描述现代资本主义社会？
answer: 因为富有的艺术家、运动员和知识分子尽管收入很高，却会被归类为无产者，这揭示了以所有权为基础的阶级定义的荒谬性
wrong_answers:
  - 因为现代社会已经通过累进税制和社会福利计划消除了一切形式的经济不平等和阶级差别
  - 因为资产阶级通过复杂的企业结构和金融工具，成功地隐藏了他们对生产资料的所有权
  - 因为技术进步使体力劳动变得过时，在后工业经济时代，工人与所有者的区别变得毫无意义
explanation: |
  勒鲁瓦-博略通过展示马克思主义阶级分类在应用于现实情况时在逻辑上的不一致性，证明了其徒劳无益。根据马克思主义理论，富有的艺术家、知名足球运动员、记者和律师都会被归类为无产者，因为尽管他们富有且地位显赫，但他们并不拥有自己的生产资料。这揭示了基于所有权的阶级定义如何无法捕捉到现代社会的复杂性，在现代社会中，价值创造越来越依赖于智力劳动和个人才能，而不是资本所有权。
question: Según el análisis de Paul Leroy-Beaulieu, ¿por qué las categorías de clase marxistas no describen con precisión las sociedades capitalistas modernas?
answer: Porque los artistas, deportistas e intelectuales ricos serían clasificados como proletarios a pesar de sus elevados ingresos, lo que revela lo absurdo de las definiciones de clase basadas en la propiedad
wrong_answers:
  - Porque las sociedades modernas han eliminado todas las formas de desigualdad económica y de distinción de clases mediante una fiscalidad progresiva y programas de bienestar social
  - Porque la burguesía ha logrado ocultar su propiedad de los medios de producción a través de complejas estructuras empresariales e instrumentos financieros
  - Porque los avances tecnológicos han dejado obsoleto el trabajo físico, lo que hace que la distinción entre trabajador y propietario carezca de sentido en las economías postindustriales
explanation: |
  Leroy-Beaulieu demuestra la inutilidad de las categorías de clase marxistas mostrando sus incoherencias lógicas cuando se aplican a situaciones reales. Los artistas ricos, los futbolistas famosos, los periodistas y los abogados serían clasificados como proletarios según la teoría marxista, ya que no son propietarios de sus medios de producción, a pesar de su riqueza y estatus. Esto revela cómo las definiciones de clase basadas en la propiedad no logran captar la complejidad de las sociedades modernas en las que la creación de valor depende cada vez más del trabajo intelectual y del talento individual que de la propiedad del capital.
question: 폴 르로이-보리외의 분석에 따르면, 마르크스주의 계급 범주가 현대 자본주의 사회를 정확하게 설명하지 못하는 이유는 무엇일까요?
answer: 부유한 예술가, 운동선수, 지식인들은 높은 소득에도 불구하고 프롤레타리아로 분류되어 소유에 기반한 계급 정의의 불합리함을 드러냈기 때문입니다
wrong_answers:
  - 현대 사회는 누진세와 사회복지 프로그램을 통해 모든 형태의 경제적 불평등과 계급 구분을 없앴기 때문입니다
  - 부르주아지는 복잡한 기업 구조와 금융 상품을 통해 생산 수단에 대한 소유권을 성공적으로 숨겼기 때문입니다
  - 기술 발전으로 육체 노동이 쓸모없어지면서 산업화 이후 경제에서 노동자-소유주 구분이 무의미해졌기 때문입니다
explanation: |
  르로이-보리유는 마르크스주의 계급 분류가 실제 상황에 적용될 때 논리적 모순을 보여줌으로써 그 무용함을 보여줍니다. 부유한 예술가, 유명 축구선수, 언론인, 변호사는 부와 지위에도 불구하고 생산 수단을 소유하지 않기 때문에 마르크스주의 이론에서는 모두 프롤레타리아로 분류될 수 있습니다. 이는 소유에 기반한 계급 정의가 가치 창출이 자본 소유보다는 지적 노동과 개인의 재능에 점점 더 의존하는 현대 사회의 복잡성을 포착하지 못한다는 것을 보여줍니다.
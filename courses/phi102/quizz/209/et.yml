question: Paul Leroy-Beaulieu analüüsi kohaselt, miks ei suuda marksistlikud klassikategooriad tänapäeva kapitalistlikke ühiskondi täpselt kirjeldada?
answer: Sest rikkad kunstnikud, sportlased ja intellektuaalid liigitatakse vaatamata oma kõrgele sissetulekule proletaarlasteks, mis paljastab omandil põhinevate klassimääratluste absurdsuse
wrong_answers:
  - Kuna kaasaegsed ühiskonnad on kaotanud igasuguse majandusliku ebavõrdsuse ja klassierinevused progressiivse maksustamise ja sotsiaalhoolekande programmide kaudu
  - Kuna kodanlus on edukalt varjanud oma tootmisvahendite omandiõigust keeruliste korporatiivsete struktuuride ja finantsinstrumentide kaudu
  - Kuna tehnoloogiline areng on muutnud füüsilise töö iganenuks, muutes töötaja ja omaniku eristamise mõttetuks postindustriaalses majanduses
explanation: |
  Leroy-Beaulieu demonstreerib marksistlike klassikategooriate mõttetust, näidates nende loogilisi vastuolusid, kui neid rakendatakse tegelike olukordade suhtes. Rikkad kunstnikud, kuulsad jalgpallurid, ajakirjanikud ja juristid liigitatakse marksistliku teooria kohaselt proletaarlasteks, sest vaatamata oma rikkusele ja staatusele ei ole nad tootmisvahendite omanikud. See näitab, kuidas omandipõhised klassimääratlused ei suuda hõlmata kaasaegsete ühiskondade keerukust, kus väärtuse loomine sõltub üha enam intellektuaalsest tööst ja individuaalsest andekusest, mitte kapitali omamisest.
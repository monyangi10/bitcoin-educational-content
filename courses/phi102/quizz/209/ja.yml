question: ポール・ルロワ＝ボリューの分析によれば、なぜマルクス主義の階級区分は現代の資本主義社会を正確に記述できないのか？
answer: 裕福な芸術家、スポーツ選手、知識人は、高収入にもかかわらずプロレタリアに分類され、所有権に基づく階級定義の不合理さが明らかになるからだ。
wrong_answers:
  - 近代社会は、累進課税や社会福祉プログラムを通じて、あらゆる形態の経済的不平等や階級差別をなくしてきたからだ。
  - なぜなら、ブルジョワジーは複雑な企業構造や金融商品を通じて、生産手段の所有権を隠すことに成功しているからだ。
  - 技術の進歩によって肉体労働は時代遅れとなり、産業革命後の経済では労働者と所有者の区別は意味をなさなくなったからだ。
explanation: |
  ルロワ＝ボリューは、マルクス主義の階級分類の論理的矛盾を現実の状況に当てはめることで、その無益さを示している。金持ちの芸術家、有名なサッカー選手、ジャーナリスト、弁護士などは、その富と地位にもかかわらず生産手段を所有していないため、マルクス主義の理論ではすべてプロレタリアに分類される。このことは、所有権に基づく階級定義が、価値創造が資本所有よりもむしろ知的労働や個人の才能に依存するようになっている現代社会の複雑さをいかに捉え損なっているかを明らかにしている。
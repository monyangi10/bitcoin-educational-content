question: Защо според анализа на Пол Леруа-Божо марксистките класови категории не успяват да опишат точно съвременните капиталистически общества?
answer: Защото богатите артисти, спортисти и интелектуалци биха били класифицирани като пролетарии въпреки високите си доходи, което разкрива абсурдността на класовите дефиниции, основани на собствеността
wrong_answers:
  - Тъй като съвременните общества са премахнали всички форми на икономическо неравенство и класови различия чрез прогресивно данъчно облагане и програми за социално подпомагане
  - Защото буржоазията успешно прикрива собствеността си върху средствата за производство чрез сложни корпоративни структури и финансови инструменти
  - Тъй като технологичният напредък е направил физическия труд излишен, което обезсмисля разграничението между работник и собственик в постиндустриалните икономики
explanation: |
  Леруа-Божо демонстрира безсмислието на марксистките класови категории, като показва логическите им несъответствия, когато се прилагат в реални ситуации. Богатите артисти, известните футболисти, журналистите и адвокатите биха били класифицирани като пролетарии според марксистката теория, тъй като въпреки богатството и статута си те не притежават средства за производство. Това разкрива как класовите дефиниции, основани на собствеността, не успяват да обхванат сложността на съвременните общества, в които създаването на стойност все повече зависи от интелектуалния труд и индивидуалния талант, а не от собствеността върху капитала.
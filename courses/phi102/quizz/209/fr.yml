question: Selon l'analyse de Paul Leroy-Beaulieu, pourquoi les catégories de classe marxistes ne parviennent-elles pas à décrire correctement les sociétés capitalistes modernes ?
answer: En effet, les artistes, les athlètes et les intellectuels fortunés seraient considérés comme des prolétaires en dépit de leurs revenus élevés, ce qui révèle l'absurdité des définitions de classe fondées sur la propriété
wrong_answers:
  - Parce que les sociétés modernes ont éliminé toutes les formes d'inégalité économique et de distinction de classe grâce à une fiscalité progressive et à des programmes de protection sociale
  - Parce que la bourgeoisie a réussi à dissimuler sa propriété des moyens de production à travers des structures d'entreprise et des instruments financiers complexes
  - Parce que les progrès technologiques ont rendu le travail physique obsolète, rendant la distinction entre travailleur et propriétaire sans signification dans les économies post-industrielles
explanation: |
  Leroy-Beaulieu démontre la futilité des catégories de classe marxistes en montrant leurs incohérences logiques lorsqu'elles sont appliquées à des situations réelles. Les artistes riches, les footballeurs célèbres, les journalistes et les avocats seraient tous classés comme prolétaires selon la théorie marxiste puisqu'ils ne possèdent pas leurs moyens de production, malgré leur richesse et leur statut. Cela montre que les définitions des classes fondées sur la propriété ne parviennent pas à saisir la complexité des sociétés modernes où la création de valeur dépend de plus en plus du travail intellectuel et du talent individuel plutôt que de la propriété du capital.
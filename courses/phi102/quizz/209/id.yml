question: Menurut analisis Paul Leroy-Beaulieu, mengapa kategori kelas Marxis gagal menggambarkan masyarakat kapitalis modern secara akurat?
answer: Karena seniman, atlet, dan intelektual kaya akan diklasifikasikan sebagai proletar meskipun pendapatan mereka tinggi, mengungkapkan absurditas definisi kelas berbasis kepemilikan
wrong_answers:
  - Karena masyarakat modern telah menghapuskan semua bentuk ketidaksetaraan ekonomi dan perbedaan kelas melalui perpajakan progresif dan program kesejahteraan sosial
  - Karena kaum borjuis telah berhasil menyembunyikan kepemilikan mereka atas alat-alat produksi melalui struktur perusahaan dan instrumen keuangan yang kompleks
  - Karena kemajuan teknologi telah membuat tenaga kerja fisik menjadi usang, membuat perbedaan antara pekerja dan pemilik menjadi tidak berarti dalam ekonomi pasca-industri
explanation: |
  Leroy-Beaulieu menunjukkan kesia-siaan kategori kelas Marxis dengan menunjukkan ketidakkonsistenan logis mereka ketika diterapkan pada situasi nyata. Artis kaya, pesepak bola terkenal, jurnalis, dan pengacara semuanya akan diklasifikasikan sebagai proletar di bawah teori Marxis karena mereka tidak memiliki alat produksi, terlepas dari kekayaan dan status mereka. Hal ini menunjukkan bagaimana definisi kelas berbasis kepemilikan gagal menangkap kompleksitas masyarakat modern di mana penciptaan nilai semakin bergantung pada kerja intelektual dan bakat individu, bukan pada kepemilikan modal.
question: ตามการวิเคราะห์ของ Paul Leroy-Beaulieu, ทำไมหมวดหมู่ชนชั้นของมาร์กซิสต์จึงล้มเหลวในการอธิบายสังคมทุนนิยมสมัยใหม่อย่างถูกต้อง?
answer: เพราะศิลปิน นักกีฬา และปัญญาชนที่ร่ำรวยจะถูกจัดประเภทเป็นชนชั้นกรรมาชีพแม้ว่าจะมีรายได้สูง ซึ่งเผยให้เห็นถึงความไร้เหตุผลของการกำหนดชนชั้นตามการเป็นเจ้าของ
wrong_answers:
  - เนื่องจากสังคมสมัยใหม่ได้ขจัดความไม่เท่าเทียมทางเศรษฐกิจและความแตกต่างทางชนชั้นทุกรูปแบบผ่านการเก็บภาษีก้าวหน้าและโครงการสวัสดิการสังคม
  - เพราะชนชั้นกลางได้ซ่อนความเป็นเจ้าของในวิธีการผลิตผ่านโครงสร้างบริษัทที่ซับซ้อนและเครื่องมือทางการเงินอย่างสำเร็จ
  - เนื่องจากความก้าวหน้าทางเทคโนโลยีทำให้แรงงานทางกายภาพล้าสมัย ทำให้ความแตกต่างระหว่างคนงานและเจ้าของไม่มีความหมายในเศรษฐกิจหลังอุตสาหกรรม
explanation: |
  Leroy-Beaulieu แสดงให้เห็นถึงความไร้ประโยชน์ของหมวดหมู่ชนชั้นมาร์กซิสต์โดยการชี้ให้เห็นถึงความไม่สอดคล้องกันทางตรรกะเมื่อถูกนำไปใช้กับสถานการณ์จริง ศิลปินที่ร่ำรวย นักฟุตบอลที่มีชื่อเสียง นักข่าว และทนายความ จะถูกจัดประเภทเป็นชนชั้นกรรมาชีพภายใต้ทฤษฎีมาร์กซิสต์เนื่องจากพวกเขาไม่ได้เป็นเจ้าของปัจจัยการผลิตของตนเอง แม้จะมีความมั่งคั่งและสถานะของพวกเขา สิ่งนี้เผยให้เห็นว่าคำจำกัดความของชนชั้นที่อิงกับการเป็นเจ้าของไม่สามารถจับความซับซ้อนของสังคมสมัยใหม่ได้ ซึ่งการสร้างมูลค่าขึ้นอยู่กับงานทางปัญญาและพรสวรรค์ส่วนบุคคลมากกว่าการเป็นเจ้าของทุน
question: बेंजामिन कॉन्स्टेंट की 'राजनीति के सिद्धांत' (1815) के अनुसार, मनुष्य की सबसे पवित्र संपत्ति किसे माना जाता है?
answer: उसका विचार, चाहे वह त्रुटि हो या सत्य।
wrong_answers:
  - उसका शरीर और उसकी भौतिक संपत्ति
  - उनकी लिखित रचनाएँ और बौद्धिक रचनाएँ
  - उनके बोलने और अभिव्यक्ति की स्वतंत्रता के अधिकार
explanation: |
  बेंजामिन कांस्टेंट ने स्पष्ट रूप से कहा था कि 'त्रुटि हो या सत्य, मनुष्य का विचार ही उसकी सबसे पवित्र संपत्ति है' (त्रुटि हो या सत्य, मनुष्य का विचार ही उसकी सबसे पवित्र संपत्ति है)। यह इस बात पर ज़ोर देता है कि विचार की विषयवस्तु या सटीकता, संपत्ति के रूप में उसकी पवित्र प्रकृति से अप्रासंगिक है। अन्य विकल्प, यद्यपि व्यक्तिगत अधिकारों से संबंधित हैं, कांस्टेंट के इस विशिष्ट बिंदु को समझने में विफल रहते हैं कि विचार ही संपत्ति का सबसे मौलिक रूप है। भौतिक संपत्तियाँ भौतिक संपत्ति हैं, लिखित रचनाएँ स्वयं विचार नहीं बल्कि विचार की अभिव्यक्ति हैं, और वाक् अधिकार विचार व्यक्त करने के साधन हैं, लेकिन इनमें से कोई भी कांस्टेंट के इस कथन को पूरी तरह से व्यक्त नहीं करता कि विचार, चाहे उसका सत्य मूल्य कुछ भी हो, सबसे पवित्र संपत्ति है।
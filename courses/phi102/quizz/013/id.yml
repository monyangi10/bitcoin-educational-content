question: Menurut 'Principles of Politics' (1815) karya Benjamin Constant, apa yang dianggap sebagai milik manusia yang paling sakral?
answer: Pemikirannya, apakah itu kesalahan atau kebenaran
wrong_answers:
  - Tubuh fisik dan harta bendanya
  - Karya-karya tulis dan kreasi intelektualnya
  - Kebebasan berbicara dan hak berekspresi
explanation: |
  Benjamin Constant secara eksplisit menyatakan bahwa 'Error or vérité, la pensée de l'homme est sa propriété la plus sacrée' (Kesalahan atau kebenaran, pemikiran manusia adalah miliknya yang paling suci). Hal ini menekankan bahwa isi atau keakuratan pemikiran tidak relevan dengan sifat sakralnya sebagai properti. Pilihan-pilihan lain, meskipun terkait dengan hak-hak individu, kehilangan fokus khusus Constant pada pemikiran itu sendiri sebagai bentuk properti yang paling mendasar. Harta benda fisik adalah properti material, karya tulis adalah ekspresi pemikiran daripada pemikiran itu sendiri, dan hak bicara adalah mekanisme untuk mengekspresikan pemikiran, tetapi tidak ada yang menangkap pernyataan Constant tentang keutamaan pemikiran sebagai properti yang paling suci terlepas dari nilai kebenarannya.
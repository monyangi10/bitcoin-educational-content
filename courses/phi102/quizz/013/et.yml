question: Benjamin Constant'i "Poliitika põhimõtted" (1815) kohaselt peetakse mida peetakse inimese kõige pühamaks omandiks?
answer: Tema mõte, olgu see siis viga või tõde
wrong_answers:
  - Tema füüsiline keha ja materiaalne vara
  - Tema kirjalikud teosed ja intellektuaalne looming
  - Tema sõna- ja sõnavabaduse õigused
explanation: |
  Benjamin Constant ütles selgesõnaliselt, et "Error or vérité, la pensée de l'homme est sa propriété la plus sacrée" (Eksimus või tõde, inimese mõte on tema kõige püham omand). See rõhutab, et mõtte sisu või täpsus ei oma tähtsust selle püha olemuse kui vara suhtes. Teised valikud on küll seotud individuaalsete õigustega, kuid Constant ei keskendu konkreetselt mõttele kui kõige põhilisemale omandivormile. Füüsiline omand on materiaalne omand, kirjalikud teosed on pigem mõtte väljendusviisid kui mõte ise ja kõneõigused on mõtte väljendusmehhanismid, kuid ükski neist ei taba Constant'i väidet mõtte kui kõige pühama omandi ülimuslikkuse kohta, sõltumata selle tõeväärtusest.
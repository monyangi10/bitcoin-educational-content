question: Que evolução histórica relativa aos incómodos e às restrições legais acompanhou o desenvolvimento de uma sociedade mais livre?
answer: A exclusão progressiva de mais tipos de incómodos do quadro jurídico
wrong_answers:
  - Um alargamento das restrições legais a todas as formas de concorrência económica
  - O estabelecimento de regulamentações mais rigorosas contra o progresso tecnológico
  - Um regresso aos padrões medievais de proteção da comunidade contra a mudança
explanation: |
  O capítulo explica que a evolução histórica revela um alargamento progressivo dos incómodos excluídos do quadro jurídico à medida que a sociedade se tornou mais livre. Na época medieval, a concorrência e o progresso tecnológico eram muitas vezes condenados legalmente porque os seus efeitos se concentravam em pequenas comunidades. À medida que a sociedade evoluiu para uma maior liberdade, estas restrições foram gradualmente levantadas, permitindo que a concorrência económica e a inovação florescessem sem condenação legal. Isto representa uma evolução no sentido de distinguir entre queixas legais legítimas e meros inconvenientes económicos que não devem ser objeto de intervenção legal.
question: Milline ajalooline areng seoses ebameeldivuste ja õiguslike piirangutega kaasnes vabama ühiskonna arenguga?
answer: Rohkemate häiringute liikide järkjärguline väljajätmine õiguslikust raamistikust
wrong_answers:
  - Õiguslikke piiranguid laiendatakse kõikidele majandusliku konkurentsi vormidele
  - Rangemate eeskirjade kehtestamine tehnoloogia arengu vastu
  - Tagasipöördumine keskaegsete normide juurde, mis kaitsevad kogukonda muutuste eest
explanation: |
  Peatükis selgitatakse, et ajalooline areng näitab ühiskonna vabamaks muutudes õigusraamistikust välja jäetud ebameeldivuste järkjärgulist laienemist. Keskajal mõisteti konkurents ja tehnoloogiline areng sageli õiguslikult hukka, sest nende mõju keskendus väikestele kogukondadele. Ühiskonna arenedes suurema vabaduse suunas, kaotati need piirangud järk-järgult, võimaldades majanduslikul konkurentsil ja uuendustegevusel õitseda ilma õigusliku hukkamõistuta. See kujutab endast arengut, mille käigus hakati eristama õiguspäraseid õiguslikke kaebusi ja pelgalt majanduslikke ebamugavusi, mille suhtes ei tohiks õiguslikult sekkuda.
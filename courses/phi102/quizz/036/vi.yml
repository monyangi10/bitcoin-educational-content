question: Quá trình phát triển lịch sử nào liên quan đến các vấn đề gây phiền nhiễu và các hạn chế pháp lý đã đi kèm với sự hình thành một xã hội tự do hơn?
answer: Loại trừ dần dần nhiều loại hành vi gây phiền nhiễu hơn khỏi khuôn khổ pháp lý.
wrong_answers:
  - Mở rộng các hạn chế pháp lý để bao trùm tất cả các hình thức cạnh tranh kinh tế.
  - Việc thiết lập các quy định nghiêm ngặt hơn đối với sự tiến bộ công nghệ
  - Trở lại với các tiêu chuẩn thời trung cổ về bảo vệ cộng đồng khỏi sự thay đổi
explanation: |
  Chương này giải thích rằng sự tiến hóa lịch sử cho thấy sự mở rộng dần dần các phiền toái bị loại trừ khỏi khuôn khổ pháp luật khi xã hội trở nên tự do hơn. Vào thời trung cổ, cạnh tranh và tiến bộ công nghệ thường bị lên án về mặt pháp luật vì tác động của chúng tập trung vào các cộng đồng nhỏ. Khi xã hội phát triển theo hướng tự do hơn, những hạn chế này dần được dỡ bỏ, cho phép cạnh tranh kinh tế và đổi mới phát triển mạnh mẽ mà không bị lên án về mặt pháp luật. Điều này thể hiện sự tiến hóa hướng tới việc phân biệt giữa các khiếu nại pháp lý chính đáng và những bất tiện kinh tế đơn thuần không nên bị can thiệp bởi pháp luật.
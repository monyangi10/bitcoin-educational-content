question: Minkälainen historiallinen kehitys haittojen ja oikeudellisten rajoitusten osalta seurasi vapaamman yhteiskunnan kehittymistä?
answer: Yhä useampien haittatyyppien asteittainen jättäminen oikeudellisen kehyksen ulkopuolelle
wrong_answers:
  - Oikeudellisten rajoitusten laajentaminen koskemaan kaikkia taloudellisen kilpailun muotoja
  - Teknologisen kehityksen vastaisen tiukemman sääntelyn luominen
  - Paluu keskiaikaisiin normeihin, jotka koskevat yhteisön suojelua muutoksilta
explanation: |
  Luvussa selitetään, että historiallinen kehitys osoittaa, että yhteiskunnan vapauden lisääntyessä oikeudellisen kehyksen ulkopuolelle jäävien haittojen määrä on asteittain laajentunut. Keskiajalla kilpailu ja tekninen kehitys tuomittiin usein oikeudellisesti, koska niiden vaikutukset keskittyivät pieniin yhteisöihin. Kun yhteiskunta kehittyi kohti suurempaa vapautta, nämä rajoitukset poistettiin vähitellen, jolloin taloudellinen kilpailu ja innovaatiot saattoivat kukoistaa ilman oikeudellista tuomiota. Tämä edustaa kehitystä, jossa on pyritty erottamaan toisistaan oikeutetut oikeudelliset epäkohdat ja pelkät taloudelliset haitat, joihin ei pitäisi puuttua oikeudellisesti.
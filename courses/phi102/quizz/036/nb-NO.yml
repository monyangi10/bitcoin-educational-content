question: Hvilken historisk utvikling når det gjelder plager og juridiske restriksjoner har fulgt utviklingen av et friere samfunn?
answer: En gradvis utelukkelse av flere typer plager fra det juridiske rammeverket
wrong_answers:
  - En utvidelse av de juridiske begrensningene til å omfatte alle former for økonomisk konkurranse
  - Etablering av strengere reguleringer mot teknologisk utvikling
  - En tilbakevending til middelalderens standarder for beskyttelse av samfunnet mot endringer
explanation: |
  Kapitlet forklarer at den historiske utviklingen viser en gradvis utvidelse av hvilke plager som ble ekskludert fra det juridiske rammeverket etter hvert som samfunnet ble friere. I middelalderen ble konkurranse og teknologiske fremskritt ofte rettslig fordømt fordi virkningene av dem var konsentrert om små samfunn. Etter hvert som samfunnet utviklet seg i retning av større frihet, ble disse restriksjonene gradvis opphevet, slik at økonomisk konkurranse og innovasjon kunne blomstre uten juridisk fordømmelse. Dette representerer en utvikling i retning av å skille mellom legitime juridiske klager og rene økonomiske ulemper som ikke bør være gjenstand for rettslig inngripen.
question: ¿Qué evolución histórica en materia de molestias y restricciones legales acompañó al desarrollo de una sociedad más libre?
answer: Exclusión progresiva de más tipos de molestias del marco jurídico
wrong_answers:
  - Ampliación de las restricciones legales a todas las formas de competencia económica
  - El establecimiento de normas más estrictas contra el progreso tecnológico
  - Una vuelta a las normas medievales de protección comunitaria frente al cambio
explanation: |
  El capítulo explica que la evolución histórica muestra una progresiva ampliación de las molestias excluidas del marco jurídico a medida que la sociedad se hacía más libre. En la época medieval, la competencia y el progreso tecnológico solían condenarse legalmente porque sus efectos se concentraban en pequeñas comunidades. A medida que la sociedad evolucionaba hacia una mayor libertad, estas restricciones se fueron levantando gradualmente, permitiendo que la competencia económica y la innovación florecieran sin condena legal. Esto representa una evolución hacia la distinción entre agravios legales legítimos y meros inconvenientes económicos que no deben ser objeto de intervención legal.
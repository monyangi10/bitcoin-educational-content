question: Welke historische evolutie met betrekking tot overlast en wettelijke beperkingen ging gepaard met de ontwikkeling van een vrijere samenleving?
answer: Geleidelijke uitsluiting van meer soorten overlast van het wettelijk kader
wrong_answers:
  - Een uitbreiding van wettelijke beperkingen naar alle vormen van economische concurrentie
  - Het instellen van strengere regels tegen technologische vooruitgang
  - Een terugkeer naar middeleeuwse normen voor de bescherming van de gemeenschap tegen verandering
explanation: |
  Het hoofdstuk legt uit dat de historische evolutie een progressieve verbreding laat zien van overlast die is uitgesloten van het wettelijke kader naarmate de samenleving vrijer werd. In de middeleeuwen werden concurrentie en technologische vooruitgang vaak wettelijk veroordeeld omdat hun effecten zich concentreerden op kleine gemeenschappen. Naarmate de samenleving zich ontwikkelde in de richting van meer vrijheid, werden deze beperkingen geleidelijk opgeheven, waardoor economische concurrentie en innovatie konden floreren zonder wettelijke veroordeling. Dit vertegenwoordigt een evolutie in de richting van een onderscheid tussen legitieme juridische grieven en louter economische ongemakken die niet onderworpen moeten worden aan juridische interventie.
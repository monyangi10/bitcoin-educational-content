question: Vilken historisk utveckling när det gäller olägenheter och rättsliga restriktioner följde med utvecklingen av ett friare samhälle?
answer: Ett gradvis uteslutande av fler typer av olägenheter från den rättsliga ramen
wrong_answers:
  - En utvidgning av de rättsliga restriktionerna till att omfatta alla former av ekonomisk konkurrens
  - Införande av strängare regler mot tekniska framsteg
  - En återgång till medeltida normer för samhällets skydd mot förändringar
explanation: |
  I kapitlet förklaras att den historiska utvecklingen visar en gradvis utvidgning av de olägenheter som undantas från det rättsliga ramverket i takt med att samhället blir friare. Under medeltiden fördömdes konkurrens och tekniska framsteg ofta i lag eftersom deras effekter var koncentrerade till små samhällen. I takt med att samhället utvecklades mot större frihet upphävdes dessa restriktioner gradvis, vilket gjorde att ekonomisk konkurrens och innovation kunde blomstra utan juridiska fördömanden. Detta innebär en utveckling mot att skilja mellan legitima rättsliga klagomål och rena ekonomiska olägenheter som inte bör bli föremål för rättsliga ingripanden.
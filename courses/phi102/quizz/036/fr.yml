question: Quelle évolution historique concernant les nuisances et les restrictions légales a accompagné le développement d'une société plus libre ?
answer: L'exclusion progressive d'un plus grand nombre de types de nuisances du cadre juridique
wrong_answers:
  - L'extension des restrictions légales à toutes les formes de concurrence économique
  - L'établissement de réglementations plus strictes à l'encontre du progrès technologique
  - Un retour aux normes médiévales de protection des communautés contre le changement
explanation: |
  Le chapitre explique que l'évolution historique montre un élargissement progressif des nuisances exclues du cadre juridique au fur et à mesure que la société devient plus libre. À l'époque médiévale, la concurrence et le progrès technologique étaient souvent condamnés par la loi parce que leurs effets étaient concentrés sur de petites communautés. Au fur et à mesure que la société évoluait vers plus de liberté, ces restrictions ont été progressivement levées, permettant à la concurrence économique et à l'innovation de se développer en dehors de toute condamnation légale. Cela représente une évolution vers la distinction entre les griefs légitimes et les simples inconvénients économiques qui ne devraient pas faire l'objet d'une intervention juridique.
question: 선사시대 사회에서 사상의 자유가 발전할 수 없었던 주된 이유는 무엇이었나요?
answer: 생산은 주로 지적 활동보다는 물리적 힘에 의존했습니다
wrong_answers:
  - 종교 지도자들은 독립적 사고를 금지하고 엄격한 영적 규칙을 강요했습니다
  - 부족 협의회는 개별적인 의견이나 토론 없이 모든 결정을 집단적으로 내립니다
  - 문자 언어가 발달하지 않아 아이디어를 기록할 수 없었습니다
explanation: |
  이 장에 따르면 선사 시대의 생산 활동은 생존에 필요한 자원을 얻기 위해 주로 육체적 힘에 의존했기 때문에 사고의 자유가 발달할 수 없었습니다. 이 장에서는 지능은 일상적인 교육과 관찰을 통해 발달하지만, 생존이 정신 능력보다 체력에 의존할 때는 지적 발달의 기회가 거의 없다고 설명합니다. 포터와 기관사의 비교는 기술 혁신으로 인해 단순한 체력을 넘어 다양한 유형의 작업이 요구되고 다양한 인간 역량이 개발되기 시작하면서 사고의 자유가 어떻게 효과적으로 활용될 수 있었는지를 설명합니다.
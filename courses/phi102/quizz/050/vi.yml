question: Nguyên nhân chính nào khiến tự do tư tưởng không thể phát triển trong các xã hội tiền sử?
answer: Sản xuất chủ yếu dựa vào sức lao động thể chất hơn là hoạt động trí tuệ.
wrong_answers:
  - Các nhà lãnh đạo tôn giáo cấm tư duy độc lập và áp đặt những quy tắc tâm linh nghiêm ngặt.
  - Hội đồng bộ lạc đưa ra mọi quyết định tập thể mà không có sự tham gia hay thảo luận riêng lẻ.
  - Vì ngôn ngữ viết chưa được phát triển nên các ý tưởng không thể được ghi lại.
explanation: |
  Theo chương này, tự do tư tưởng không thể phát triển vì các hoạt động sản xuất thời tiền sử chủ yếu dựa vào sức mạnh thể chất để có được các nguồn lực cần thiết cho sự sống còn. Văn bản giải thích rằng trí thông minh phát triển thông qua giáo dục và quan sát hàng ngày, nhưng khi sự sống còn phụ thuộc vào sức mạnh thể chất hơn là khả năng trí tuệ, thì sẽ có rất ít cơ hội cho sự phát triển trí tuệ. Sự so sánh giữa người khuân vác và người lái tàu hỏa minh họa cách những đổi mới kỹ thuật sau này cho phép tự do tư tưởng trở nên hiệu quả, khi các loại công việc khác nhau bắt đầu đòi hỏi và phát triển các khả năng khác nhau của con người vượt ra ngoài sức mạnh thể chất đơn thuần.
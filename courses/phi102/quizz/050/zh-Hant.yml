question: 思想自由無法在史前社會發展的主要原因是什麼？
answer: 生產主要依賴體力而非智力活動
wrong_answers:
  - 宗教領袖禁止獨立思考，並施加嚴格的靈修規範
  - 部落理事會集體作所有決策，不經個人投入或討論
  - 書面語言尚未發展，因此無法記錄想法
explanation: |
  根據本章所述，思想自由之所以無法發展，是因為史前的生產活動主要仰賴野蠻的體力來取得生存所需的資源。文中解釋，智慧是透過日常的教育和觀察來發展的，但是當生存依賴於體力而非心智能力時，智慧發展的機會就很少。挑夫和機車售票員之間的比較說明了技術創新後來如何讓思考自由變得有效率，因為不同類型的工作開始需要並發展不同的人類能力，而不僅僅是體力。
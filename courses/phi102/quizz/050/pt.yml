question: Qual foi a principal razão pela qual a liberdade de pensamento não se pôde desenvolver nas sociedades pré-históricas?
answer: A produção dependia principalmente da força física e não das actividades intelectuais
wrong_answers:
  - Os líderes religiosos proibiram o pensamento independente e impuseram regras espirituais rigorosas
  - Os conselhos tribais tomavam todas as decisões coletivamente, sem qualquer contributo ou discussão individual
  - A linguagem escrita ainda não tinha sido desenvolvida, pelo que as ideias não podiam ser registadas
explanation: |
  Segundo o capítulo, a liberdade de pensamento não podia desenvolver-se porque as actividades de produção pré-históricas se baseavam essencialmente na força física bruta para obter os recursos necessários à sobrevivência. O texto explica que a inteligência se desenvolve através da educação e das observações quotidianas, mas quando a sobrevivência depende mais da força física do que das capacidades mentais, há poucas oportunidades para o desenvolvimento intelectual. A comparação entre um carregador e um maquinista de locomotiva ilustra como as inovações técnicas permitiram, mais tarde, que a liberdade de pensamento se tornasse efectiva, uma vez que diferentes tipos de trabalho começaram a exigir e a desenvolver diferentes capacidades humanas para além da mera força física.
question: Mis oli peamine põhjus, miks mõttevabadus ei saanud areneda eelajaloolistes ühiskondades?
answer: Tootmine sõltus peamiselt füüsilisest jõust, mitte intellektuaalsest tegevusest
wrong_answers:
  - Religioossed juhid keelasid iseseisva mõtlemise ja kehtestasid ranged vaimsed reeglid
  - Hõimunõukogud tegid kõik otsused kollektiivselt ilma individuaalse panuse või aruteluta
  - Kirjakeel ei olnud veel välja töötatud, nii et ideid ei saanud kirja panna
explanation: |
  Peatüki kohaselt ei saanud mõttevabadus areneda, sest eelajalooline tootmistegevus tugines ellujäämiseks vajalike ressursside hankimiseks peamiselt toorele füüsilisele jõule. Tekstis selgitatakse, et intelligentsus areneb igapäevase hariduse ja tähelepanekute kaudu, kuid kui ellujäämine sõltub pigem füüsilisest jõust kui vaimsetest võimetest, on intellektuaalseks arenguks vähe võimalusi. Võrdlus kanduri ja vedurijuhi vahel illustreerib, kuidas tehnilised uuendused võimaldasid hiljem mõtlemisvabadust, kuna eri liiki tööd hakkasid nõudma ja arendama erinevaid inimlikke võimeid, mis ületasid pelgalt füüsilist jõudu.
question: What was the main reason why freedom of thought could not develop in prehistoric societies?
answer: Production depended mainly on physical force rather than intellectual activities
wrong_answers:
  - Religious leaders prohibited independent thinking and imposed strict spiritual rules
  - Tribal councils made all decisions collectively without individual input or discussion
  - Written language had not been developed so ideas could not be recorded
explanation: |
  According to the chapter, freedom of thought could not develop because prehistoric production activities relied primarily on brute physical force to obtain necessary resources for survival. The text explains that intelligence develops through daily education and observations, but when survival depends on physical strength rather than mental capabilities, there is little opportunity for intellectual development. The comparison between a porter and a locomotive conductor illustrates how technical innovations later allowed thinking freedom to become effective, as different types of work began requiring and developing different human capacities beyond mere physical strength.

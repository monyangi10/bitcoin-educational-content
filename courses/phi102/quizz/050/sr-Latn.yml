question: Koji je bio glavni razlog zašto sloboda misli nije mogla da se razvije u praistorijskim društvima?
answer: Proizvodnja je zavisila uglavnom od fizičke sile, a ne od intelektualnih aktivnosti.
wrong_answers:
  - Verske vođe su zabranile samostalno razmišljanje i nametnule stroga duhovna pravila.
  - Plemena veća su donosila sve odluke kolektivno bez pojedinačnih doprinosa ili rasprave.
  - Pisani jezik nije bio razvijen tako da ideje nisu mogle biti zabeležene.
explanation: |
  Prema poglavlju, sloboda misli nije mogla da se razvije jer su se praistorijske proizvodne aktivnosti oslanjale prvenstveno na sirovu fizičku snagu za dobijanje neophodnih resursa za opstanak. Tekst objašnjava da se inteligencija razvija kroz svakodnevno obrazovanje i posmatranja, ali kada opstanak zavisi od fizičke snage umesto mentalnih sposobnosti, postoji malo mogućnosti za intelektualni razvoj. Poređenje između nosača i mašinovođe ilustruje kako su tehničke inovacije kasnije omogućile da sloboda mišljenja postane efikasna, jer su različite vrste poslova počele da zahtevaju i razvijaju različite ljudske sposobnosti izvan puke fizičke snage.
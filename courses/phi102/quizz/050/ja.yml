question: 先史時代の社会で思想の自由が発達しなかった主な理由は何だったのか？
answer: 生産は主に知的活動よりも肉体的な力に依存していた。
wrong_answers:
  - 宗教指導者は独自の考えを禁じ、厳しい精神的ルールを課した。
  - 部族評議会は、個人の意見や議論なしに、すべての決定を集団で行った。
  - 文字が発達していなかったため、アイデアを記録することができなかった。
explanation: |
  この章によれば、先史時代の生産活動は、生存に必要な資源を得るために、主に肉体の力に頼っていたため、思考の自由が発達しなかったという。日常的な教育や観察によって知性は発達するが、生存が精神力ではなく体力に依存している場合は、知的発達の機会はほとんどないと本文は説明する。ポーターと機関車の車掌の比較は、その後、技術革新によって思考の自由が有効に働くようになり、さまざまな種類の仕事が、単なる体力を超えたさまざまな人間の能力を必要とし、発達させるようになったことを示している。
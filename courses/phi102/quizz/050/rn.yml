question: Ni igiki nyamukuru catumye umwidegemvyo wo kwiyumvira udashobora gutera imbere mu mibano y’imbere y’amateka?
answer: Uguhingura vyavana canecane n’inguvu z’umubiri aho gushingira ku bikorwa vy’ubwenge .
wrong_answers:
  - Indongozi z’idini zarabujije kwiyumvira umuntu yigenga kandi zishiraho amategeko akomeye yo mu vy’impwemu .
  - Inama z'imiryango zafata ingingo zose hamwe ata n'umwe yinjije canke ngo agire ico avugako .
  - Ururimi rwanditswe ntirwari rwateguwe rero ivyiyumviro ntivyari gushobora kwandikwa .
explanation: |
  Dukurikije ico kigabane, umwidegemvyo wo kwiyumvira ntiwashobora gutera imbere kubera ko ibikorwa vyo guhingura ibintu vy’imbere y’amateka vyishimikije canecane inguvu z’umubiri zidasanzwe kugira ngo umuntu aronke ivyo akeneye kugira ngo ashobore kubaho. Ico canditswe kirasigura ko ubwenge butera imbere biciye mu kwiga ku musi ku musi no mu kwihweza, ariko iyo ubuzima buvana n’inkomezi z’umubiri aho kuva ku bushobozi bwo mu mutwe, nta karyo ko gutera imbere mu bwenge kaba. Igereranyo hagati y’umutwazi w’ibintu n’umuyobozi w’igariyamoshi ryerekana ingene ubuhinga bushasha bwaje gutuma umwidegemvyo wo kwiyumvira uba ngirakamaro, igihe ubwoko butandukanye bw’ibikorwa bwatanguye gusaba no guteza imbere ubushobozi butandukanye bw’umuntu burenze inkomezi z’umubiri gusa.
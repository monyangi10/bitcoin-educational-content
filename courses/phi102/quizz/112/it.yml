question: Perché la libertà economica consente tempi di produzione superiori all'intervento politico secondo la teoria del libero mercato?
answer: I segnali di profitto guidano gli imprenditori a produrre quando esiste effettivamente una domanda da parte dei consumatori, creando un coordinamento naturale dei tempi
wrong_answers:
  - La pianificazione governativa consente una migliore previsione a lungo termine dei bisogni della società rispetto ai singoli operatori di mercato
  - Il processo decisionale politico incorpora considerazioni sociali più ampie di cui la ricerca del profitto individuale non può tenere conto
  - L'intervento dello Stato può anticipare i bisogni futuri in modo più efficace analizzando sistematicamente le tendenze demografiche ed economiche
explanation: |
  Il capitolo spiega che la libertà economica crea un tempismo superiore grazie ai segnali di profitto che indicano la reale domanda dei consumatori. Quando i profitti sono disponibili, gli imprenditori rispondono rapidamente; quando sono assenti, la produzione prematura viene scoraggiata. Questo crea un coordinamento basato sulle reali preferenze dei consumatori piuttosto che su ipotesi politiche. L'intervento politico si basa su cicli elettorali e soddisfazioni idealizzate che possono non riflettere le reali esigenze del mercato, portando a decisioni di produzione sbagliate.
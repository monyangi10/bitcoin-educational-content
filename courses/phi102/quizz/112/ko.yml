question: 자유 시장 이론에 따르면 경제적 자유가 정치적 개입보다 우월한 생산 타이밍을 가능하게 하는 이유는 무엇일까요?
answer: 이익 신호는 기업가들이 소비자 수요가 실제로 존재할 때 생산하도록 유도하여 자연스럽게 타이밍을 조정합니다
wrong_answers:
  - 정부 계획은 개별 시장 참여자보다 더 나은 장기적 사회 수요 예측을 가능하게 합니다
  - 정치적 의사 결정에는 개인의 이익 추구로는 설명할 수 없는 광범위한 사회적 고려 사항이 포함됩니다
  - 국가의 개입은 인구 통계 및 경제 동향을 체계적으로 분석하여 미래의 수요를 보다 효과적으로 예측할 수 있습니다
explanation: |
  이 장에서는 경제적 자유가 실제 소비자 수요를 나타내는 이익 신호를 통해 우수한 타이밍을 만들어낸다고 설명합니다. 이익이 발생하면 기업가들은 신속하게 대응하고, 이익이 발생하지 않으면 조기 생산이 억제됩니다. 이는 정치적 가정이 아닌 실제 소비자 선호에 기반한 조정을 만들어냅니다. 정치적 개입은 선거 주기와 실제 시장 요구를 반영하지 않을 수 있는 이상화된 만족도에 따라 작동하여 잘못된 생산 결정으로 이어질 수 있습니다.
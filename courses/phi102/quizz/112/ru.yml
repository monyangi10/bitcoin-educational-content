question: Почему, согласно теории свободного рынка, экономическая свобода позволяет устанавливать сроки производства, которые превосходят политическое вмешательство?
answer: Сигналы прибыли заставляют предпринимателей производить продукцию тогда, когда потребительский спрос действительно существует, создавая естественную координацию по времени
wrong_answers:
  - Государственное планирование позволяет лучше, чем отдельные участники рынка, прогнозировать потребности общества на долгосрочную перспективу
  - Принятие политических решений включает в себя более широкие социальные соображения, которые не могут быть учтены индивидуальным стремлением к прибыли
  - Государственное вмешательство может более эффективно предвидеть будущие потребности, если систематически анализировать демографические и экономические тенденции
explanation: |
  В главе объясняется, что экономическая свобода создает превосходные сроки благодаря сигналам прибыли, которые указывают на реальный потребительский спрос. Когда прибыль есть, предприниматели реагируют быстро; когда ее нет, преждевременное производство сдерживается. Это создает координацию, основанную на реальных потребительских предпочтениях, а не на политических предположениях. Политическое вмешательство опирается на избирательные циклы и идеализированное удовлетворение, которое может не отражать реальных потребностей рынка, что приводит к ошибочным производственным решениям.
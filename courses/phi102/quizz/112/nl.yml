question: Waarom maakt economische vrijheid productietiming mogelijk die superieur is aan politieke interventie volgens de theorie van de vrije markt?
answer: Winstsignalen sturen ondernemers om te produceren wanneer er daadwerkelijk vraag is van consumenten, waardoor een natuurlijke timingcoördinatie ontstaat
wrong_answers:
  - Met overheidsplanning kunnen maatschappelijke behoeften beter op lange termijn worden voorspeld dan met individuele marktdeelnemers
  - Politieke besluitvorming omvat bredere sociale overwegingen waar individueel winstbejag geen rekening mee kan houden
  - Staatsinterventie kan beter anticiperen op toekomstige behoeften door demografische en economische trends systematisch te analyseren
explanation: |
  Het hoofdstuk legt uit dat economische vrijheid superieure timing creëert door winstsignalen die de echte vraag van consumenten aangeven. Als er winst is, reageren ondernemers snel; als er geen winst is, wordt voortijdige productie ontmoedigd. Dit creëert coördinatie op basis van werkelijke consumentenvoorkeuren in plaats van politieke aannames. Politieke interventie werkt op basis van electorale cycli en geïdealiseerde bevredigingen die mogelijk niet de echte behoeften van de markt weerspiegelen, wat leidt tot verkeerd getimede productiebeslissingen.
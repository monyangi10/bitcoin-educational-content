question: 為什麼根據自由市場理論，經濟自由能使生產時序優於政治干預？
answer: 利潤訊號引導企業家在消費者需求實際存在時進行生產，創造自然的時間協調
wrong_answers:
  - 與個別市場參與者相比，政府規劃可對社會需求進行更好的長期預測
  - 政治決策包含更廣泛的社會考量，而個人追求利潤的行為無法兼顧這些考量
  - 透過有系統地分析人口與經濟趨勢，國家干預可更有效地預測未來需求
explanation: |
  本章說明，經濟自由透過顯示真正消費者需求的利潤訊號，創造出優越的時機。當有利潤時，企業家會快速反應；當沒有利潤時，過早的生產就會被阻止。這就創造了基於實際消費者偏好而非政治假設的協調。政治干預所依據的是選舉週期和理想化的滿足，可能無法反映真正的市場需求，進而導致錯誤的生產決策。
question: Pourquoi la liberté économique permet-elle une synchronisation de la production supérieure à l'intervention politique selon la théorie du marché libre ?
answer: Les signaux de profit incitent les entrepreneurs à produire lorsque la demande des consommateurs existe réellement, ce qui crée une coordination naturelle du calendrier
wrong_answers:
  - La planification gouvernementale permet de mieux prévoir à long terme les besoins de la société que les acteurs individuels du marché
  - La prise de décision politique intègre des considérations sociales plus larges que la recherche individuelle du profit ne peut prendre en compte
  - L'intervention de l'État peut mieux anticiper les besoins futurs en analysant systématiquement les tendances démographiques et économiques
explanation: |
  Le chapitre explique que la liberté économique crée un meilleur timing grâce aux signaux de profit qui indiquent la demande réelle des consommateurs. Lorsque les bénéfices sont disponibles, les entrepreneurs réagissent rapidement ; lorsqu'ils sont absents, la production prématurée est découragée. Cela crée une coordination basée sur les préférences réelles des consommateurs plutôt que sur des hypothèses politiques. L'intervention politique fonctionne sur la base de cycles électoraux et de satisfactions idéalisées qui peuvent ne pas refléter les besoins réels du marché, ce qui conduit à des décisions de production inopportunes.
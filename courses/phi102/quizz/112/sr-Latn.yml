question: Zašto ekonomska sloboda omogućava vremensko usklađivanje proizvodnje koje je superiornije u odnosu na političku intervenciju prema teoriji slobodnog tržišta?
answer: Signali profita vode preduzetnike da proizvode kada potražnja potrošača zaista postoji, stvarajući prirodnu vremensku koordinaciju
wrong_answers:
  - Vladino planiranje omogućava bolje dugoročno predviđanje društvenih potreba nego pojedinačni učesnici na tržištu
  - Političko odlučivanje uključuje šire društvene razmatranje koja individualna težnja za profitom ne može uzeti u obzir
  - Državna intervencija može efikasnije predvideti buduće potrebe analizom demografskih i ekonomskih trendova na sistematičan način.
explanation: |
  Poglavlje objašnjava da ekonomska sloboda stvara superiorno tempiranje kroz signale profita koji ukazuju na stvarnu potražnju potrošača. Kada su profiti dostupni, preduzetnici brzo reaguju; kada ih nema, prerana proizvodnja se obeshrabruje. Ovo stvara koordinaciju zasnovanu na stvarnim preferencijama potrošača, a ne na političkim pretpostavkama. Politička intervencija deluje na izbornim ciklusima i idealizovanim zadovoljenjima koja možda ne odražavaju stvarne potrebe tržišta, što dovodi do loše tempiranih odluka o proizvodnji.
question: Theo lý thuyết thị trường tự do, tại sao tự do kinh tế cho phép điều chỉnh thời điểm sản xuất tốt hơn so với sự can thiệp chính trị?
answer: Các tín hiệu lợi nhuận hướng dẫn các doanh nghiệp sản xuất khi nhu cầu tiêu dùng thực sự tồn tại, tạo ra sự phối hợp thời gian tự nhiên.
wrong_answers:
  - Việc lập kế hoạch của chính phủ cho phép dự báo nhu cầu xã hội dài hạn tốt hơn so với các cá nhân tham gia thị trường riêng lẻ.
  - Quá trình ra quyết định chính trị bao gồm những cân nhắc xã hội rộng lớn hơn mà việc theo đuổi lợi nhuận cá nhân không thể tính đến.
  - Sự can thiệp của nhà nước có thể dự đoán nhu cầu tương lai hiệu quả hơn bằng cách phân tích một cách có hệ thống các xu hướng nhân khẩu học và kinh tế.
explanation: |
  Chương này giải thích rằng tự do kinh tế tạo ra thời điểm ra quyết định tốt hơn thông qua các tín hiệu lợi nhuận cho thấy nhu cầu thực sự của người tiêu dùng. Khi có lợi nhuận, các doanh nhân sẽ phản ứng nhanh chóng; khi không có lợi nhuận, việc sản xuất sớm sẽ bị hạn chế. Điều này tạo ra sự phối hợp dựa trên sở thích thực tế của người tiêu dùng chứ không phải dựa trên các giả định chính trị. Sự can thiệp chính trị hoạt động dựa trên chu kỳ bầu cử và những kỳ vọng lý tưởng hóa có thể không phản ánh nhu cầu thực tế của thị trường, dẫn đến các quyết định sản xuất không đúng thời điểm.
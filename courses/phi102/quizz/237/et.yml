question: Mida nimetab liberaalne mõtlemine riigi majandustegevuse ebaefektiivsuse peamiseks struktuuriliseks põhjuseks?
answer: Individuaalse algatuse ja isikliku huvi mehhanismide puudumine, mis edendavad tootlikku tõhusust
wrong_answers:
  - Piisavate rahaliste vahendite ja eelarveliste eraldiste puudumine riigiettevõtetele
  - Liigsed bürokraatlikud menetlused ja halduskomplekssus otsustusprotsessides
  - Valitsuse töötajate ebapiisav tehniline pädevus ja erialane koolitus
explanation: |
  Peatüki kohaselt tuleneb riigi struktuuriline ebaefektiivsus peamiselt selle suutmatusest rakendada individuaalset algatust ja isiklikku huvi, mis on tootlikkuse liikumapanev jõud. Tekstis märgitakse konkreetselt, et riigi "moindres puissances productives s'expliquent par le fait qu'il ne repose pas sur l'initiative individuelle et l'entreprise, et qu'il ne permet pas à l'intérêt personnel de se développer pleinement" Kuigi bürokraatia, rahastamine ja ekspertteadmised võivad olla sümptomid, on liberaalse mõtlemise kohaselt riigi ebatõhususe algpõhjuseks turupõhiste stiimulite puudumine.
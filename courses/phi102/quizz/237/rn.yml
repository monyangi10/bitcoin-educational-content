question: Ni igiki iciyumviro c’ubwigenge kigaragaza ko ari co kintu nyamukuru gituma Leta idakora neza mu bikorwa vy’ubutunzi?
answer: Kubura umugambi w'umuntu ku giti ciwe n'uburyo bw'inyungu z'umuntu ku giti ciwe bituma habaho ubushobozi bwo gutanga umusaruro
wrong_answers:
  - Kubura amafaranga ahagije n’ingengo y’imari igenewe ibigo vya Leta .
  - Uburyo burengeje urugero bw'uburongozi n'ubugoyagoye bw'ubutegetsi mu gufata ingingo
  - Ubuhinga n'amahugurwa y'umwuga bidahagije mu bakozi ba Leta .
explanation: |
  Dushingiye ku gice, ukudakora neza kw’imibumbe ya Leta kuva ahanini ku kuntu idashobora gukoresha ingingo z’umuntu ku giti ciwe n’inyungu z’umuntu ku giti ciwe, ari vyo bituma habaho umwimbu. Ico canditswe kivuga mu buryo bwihariye ko 'ububasha buhambaye bwa Leta bushobora gutuma umuntu agira ico akora, kandi bukaba butashobora gutuma abakozi bagira inyungu mu bijanye n'iterambere.' Naho ibibazo vy’uburongozi, amafaranga, n’ubuhinga bishobora kuba ibimenyetso, ivyiyumviro vy’ubwigenge bigaragaza ko ukutagira inkurikizi zishingiye ku masoko ari vyo bituma Leta idakora neza.
question: Was ist nach liberaler Auffassung die wichtigste strukturelle Ursache für die Ineffizienz des Staates bei wirtschaftlichen Aktivitäten?
answer: Das Fehlen von Eigeninitiative und persönlichen Interessen, die die produktive Effizienz vorantreiben
wrong_answers:
  - Das Fehlen ausreichender Finanzmittel und Haushaltszuweisungen für staatliche Unternehmen
  - Die übermäßigen bürokratischen Verfahren und die administrative Komplexität der Entscheidungsprozesse
  - Die unzureichende technische Kompetenz und Berufsausbildung der Regierungsmitarbeiter
explanation: |
  Dem Kapitel zufolge ist die strukturelle Ineffizienz des Staates im Wesentlichen darauf zurückzuführen, dass er nicht in der Lage ist, die individuelle Initiative und das persönliche Interesse zu nutzen, die die treibenden Kräfte der Produktivität sind. In dem Text heißt es ausdrücklich, dass die "geringen Produktivitätsmöglichkeiten des Staates durch die Tatsache zu erklären sind, dass er sich nicht auf die Eigeninitiative und das Unternehmertum stützen kann und dass er es nicht zulässt, dass sich das persönliche Interesse voll entfalten kann" Bürokratie, Finanzierung und Fachwissen mögen zwar Symptome sein, doch liberales Gedankengut sieht im Fehlen marktwirtschaftlicher Anreize die eigentliche Ursache für staatliche Ineffizienz.
question: 자유주의 사상은 국가가 경제 활동을 비효율적으로 하는 주요 구조적 원인으로 무엇을 꼽나요?
answer: 생산적 효율성을 높이는 개인 주도권과 개인적 관심 메커니즘의 부재
wrong_answers:
  - 국영 기업에 대한 충분한 재원 및 예산 할당 부족
  - 의사 결정 과정의 과도한 관료적 절차 및 행정적 복잡성
  - 공무원들의 기술 전문성 및 전문 교육 부족
explanation: |
  이 장에 따르면 국가의 구조적 비효율성은 근본적으로 생산성의 원동력인 개인의 이니셔티브와 개인적 관심을 활용하지 못하는 데서 비롯됩니다. 본문은 특히 국가의 '생산성 저해 요인'이 '개인과 기업의 이니셔티브에 의존하지 않고, 개인의 관심사가 충분히 발전할 수 있도록 허용하지 않기 때문'이라고 명시하고 있습니다 관료주의, 자금, 전문성 문제도 하나의 증상일 수 있지만, 자유주의 사상은 시장 중심의 인센티브 부재를 국가 비효율의 근본 원인으로 보고 있습니다.
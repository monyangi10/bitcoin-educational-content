question: Mikä on liberaalin ajattelun mukaan ensisijainen rakenteellinen syy valtion tehottomuuteen taloudellisessa toiminnassa?
answer: Tuotannollista tehokkuutta edistävien yksilöllisen aloitekyvyn ja henkilökohtaisen edun mekanismien puuttuminen
wrong_answers:
  - Riittävien taloudellisten resurssien ja talousarviomäärärahojen puute valtionyrityksille
  - Liian byrokraattiset menettelyt ja hallinnollinen monimutkaisuus päätöksentekoprosesseissa
  - Hallinnon työntekijöiden riittämätön tekninen asiantuntemus ja ammatillinen koulutus
explanation: |
  Luvun mukaan valtion rakenteellinen tehottomuus johtuu pohjimmiltaan sen kyvyttömyydestä valjastaa yksilön oma-aloitteisuus ja henkilökohtainen kiinnostus, jotka ovat tuottavuuden liikkeellepanevia voimia. Tekstissä todetaan erityisesti, että valtion "moindres puissances productives s'expliquent par le fait qu'il ne repose pas sur l'initiative individual et l'entreprise, et qu'il ne permet pas à l'intérêt personnel de se développer pleinement" Vaikka byrokratia, rahoitus ja asiantuntemukseen liittyvät ongelmat voivat olla oireita, liberaalissa ajattelussa valtiollisen tehottomuuden perimmäisenä syynä pidetään markkinavetoisten kannustimien puuttumista.
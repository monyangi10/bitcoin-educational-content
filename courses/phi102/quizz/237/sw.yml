question: Ni nini kinachotambuliwa na mawazo huria kama sababu kuu ya kimuundo ya kutofanya kazi vizuri kwa serikali katika shughuli za kiuchumi?
answer: Kutokuwepo kwa mipango ya mtu binafsi na mifumo ya maslahi binafsi inayoendesha ufanisi wenye tija
wrong_answers:
  - Ukosefu wa rasilimali za kifedha za kutosha na mgao wa bajeti kwa makampuni ya serikali
  - Taratibu nyingi za urasimu na ugumu wa kiutawala katika michakato ya kufanya maamuzi
  - Utaalamu wa kiufundi na mafunzo ya kitaaluma yasiyotosha miongoni mwa wafanyakazi wa serikali
explanation: |
  Kulingana na sura hiyo, uzembe wa muundo wa serikali unatokana kimsingi na kutokuwa na uwezo wa kutumia mpango wa mtu binafsi na masilahi ya kibinafsi, ambayo ni nguvu za uzalishaji. Maandishi yanasema mahsusi kwamba 'moindres puissances productives' ya serikali ni expliquent par le fait qu'il ne repose pas sur l'initiative individuelle et l'entreprise, et qu'il ne permet pas à l'intérêt personnel de sedéveloper'per. Ingawa urasimu, ufadhili, na masuala ya utaalamu yanaweza kuwa dalili, mawazo huria hubainisha kutokuwepo kwa motisha zinazoendeshwa na soko kama chanzo kikuu cha uzembe wa serikali.
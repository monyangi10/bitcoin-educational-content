question: Ni ingaruka mbi zibiri izihe abanyabwenge b’Abafaransa b’abanyagihugu b’abanyagihugu babonye mu bijanye n’ubuja bwo muri iki gihe bwo muri Amerika yo mu kinjana ca 18-19?
answer: Ugusenyuka kw’ubwenge bw’abaja be n’ugusenyuka kw’inyifato runtu kwa ba nyen’abaja .
wrong_answers:
  - Ubutunzi butari bwiza bw'ibiterwa n'ugusenyuka kw'ubudandaji mpuzamakungu
  - Intambara z’idini hagati y’imiryango n’ugusenyuka kw’imibano .
  - Uguhagarara kw'ubuhinga bwa none mu kibano no kugoyagoya kw'uburinzi bw'igisirikare
explanation: |
  Abafaransa b’abanyabwenge b’abanyagihugu nka Gustave de Beaumont barabonye ingaruka mbi zibiri zidasanzwe z’ubuja bwo muri iki gihe. Ica mbere, abaja ubwabo bari bacitse intege mu bwenge kubera ko iyo nzira yababuza gukoresha ubushobozi bwabo bwo mu mutwe, bikababuza uturyo two kwiteza imbere. Ubwa kabiri, ba nyen’abaja barashikiwe n’ugusenyuka mu vy’inyifato runtu uko batera imbere mu nyifato mbi ku bijanye n’akazi kandi bakizigira inguvu gusa, ivyo bikaba vyatumye habaho ivyiyumviro birwanya umwidegemvyo bidahuye n’ingingo ngenderwako z’uburinganire zikwiye gutwara imibano yo muri iki gihe.
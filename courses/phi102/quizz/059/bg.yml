question: Кои са двете вредни последици, които френските либерални мислители откриват в модерната система на робството в Америка през XVIII-XIX век?
answer: Интелектуалната деградация на робите и моралната поквара на робовладелците
wrong_answers:
  - Икономическата неефективност на плантациите и упадъкът на международната търговия
  - Религиозните конфликти между общностите и разпадането на семейните структури
  - Технологичната стагнация на обществото и отслабването на военната отбрана
explanation: |
  Френски либерални мислители като Гюстав дьо Бомон идентифицират два специфични порочни ефекта на съвременното робство. Първо, самите роби са интелектуално деградирали, тъй като системата им е пречела да използват умствените си способности, лишавайки ги от възможности за личностно развитие. Второ, робовладелците са изпитвали морална поквара, тъй като са развивали негативно отношение към труда и са разчитали единствено на силата, създавайки антилиберални нагласи, несъвместими с принципите на равенство, които би трябвало да управляват съвременните общества.
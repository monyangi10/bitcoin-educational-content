question: 法国自由主义思想家在 18-19 世纪美国的现代奴隶制中发现了哪两种有害影响？
answer: 奴隶的智力退化和奴隶主的道德败坏
wrong_answers:
  - 种植园的经济效益低下和国际贸易的衰退
  - 社区之间的宗教冲突和家庭结构的瓦解
  - 社会技术停滞不前，军事防御能力减弱
explanation: |
  法国自由主义思想家古斯塔夫-德-博蒙（Gustave de Beaumont）等人指出了现代奴隶制的两个具体的不良影响。首先，奴隶本身的智力退化，因为奴隶制度阻止他们发挥自己的智力，剥夺了他们个人发展的机会。其次，奴隶主的道德败坏，因为他们对工作持消极态度，完全依赖武力，形成了与现代社会应遵循的平等原则不相容的反自由心态。
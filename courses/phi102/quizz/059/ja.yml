question: フランスの自由主義思想家たちが18～19世紀アメリカの近代奴隷制度に見出した2つの弊害とは？
answer: 奴隷の知的劣化と奴隷所有者の道徳的堕落
wrong_answers:
  - プランテーションの経済的非効率と国際貿易の衰退
  - コミュニティ間の宗教的対立と家族構造の崩壊
  - 社会の技術的停滞と軍事的防衛力の弱体化
explanation: |
  ギュスターヴ・ド・ボーモンのようなフランスの自由主義思想家は、近代の奴隷制度がもたらす2つの具体的な逆効果を指摘した。第一に、奴隷制度によって精神的能力を発揮できず、人格形成の機会が奪われたため、奴隷自身が知的に劣化した。第二に、奴隷の所有者は、労働に対する否定的な態度を身につけ、力のみに頼るようになったため、道徳的堕落を経験し、近代社会を支配すべき平等原則とは相容れない反自由主義的な考え方を生み出した。
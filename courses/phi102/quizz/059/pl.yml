question: Jakie były dwa szkodliwe skutki, które francuscy myśliciele liberalni zidentyfikowali w nowoczesnym systemie niewolnictwa w XVIII-XIX-wiecznej Ameryce?
answer: Intelektualna degradacja niewolników i moralne zepsucie właścicieli niewolników
wrong_answers:
  - Nieefektywność ekonomiczna plantacji i spadek handlu międzynarodowego
  - Konflikty religijne między społecznościami i rozpad struktur rodzinnych
  - Stagnacja technologiczna społeczeństwa i osłabienie obrony wojskowej
explanation: |
  Francuscy myśliciele liberalni, tacy jak Gustave de Beaumont, zidentyfikowali dwa konkretne perwersyjne skutki współczesnego niewolnictwa. Po pierwsze, sami niewolnicy byli intelektualnie zdegradowani, ponieważ system uniemożliwiał im wykorzystanie ich zdolności umysłowych, pozbawiając ich możliwości rozwoju osobistego. Po drugie, właściciele niewolników doświadczali zepsucia moralnego, ponieważ rozwijali negatywne postawy wobec pracy i polegali wyłącznie na sile, tworząc antyliberalne nastawienie niezgodne z zasadami równości, które powinny rządzić nowoczesnymi społeczeństwami.
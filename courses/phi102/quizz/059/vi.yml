question: Hai tác hại nào mà các nhà tư tưởng tự do Pháp đã chỉ ra trong hệ thống nô lệ hiện đại của nước Mỹ thế kỷ 18-19?
answer: Sự suy thoái trí tuệ của nô lệ và sự tha hóa đạo đức của chủ nô.
wrong_answers:
  - Sự kém hiệu quả về kinh tế của các đồn điền và sự suy giảm của thương mại quốc tế
  - Các xung đột tôn giáo giữa các cộng đồng và sự tan vỡ của cấu trúc gia đình.
  - Sự trì trệ về công nghệ của xã hội và sự suy yếu của hệ thống phòng thủ quân sự.
explanation: |
  Các nhà tư tưởng tự do người Pháp như Gustave de Beaumont đã chỉ ra hai tác động tiêu cực cụ thể của chế độ nô lệ hiện đại. Thứ nhất, bản thân những người nô lệ bị suy thoái về trí tuệ vì hệ thống này ngăn cản họ sử dụng khả năng tư duy, tước đoạt cơ hội phát triển cá nhân của họ. Thứ hai, chủ nô bị tha hóa đạo đức khi họ hình thành thái độ tiêu cực đối với lao động và chỉ dựa vào vũ lực, tạo ra những tư tưởng phản tự do không phù hợp với các nguyên tắc bình đẳng cần chi phối xã hội hiện đại.
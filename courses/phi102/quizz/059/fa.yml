question: دو اثر زیان‌بار که متفکران لیبرال فرانسوی در سیستم برده‌داری مدرن قرن ۱۸-۱۹ آمریکا شناسایی کردند چه بودند؟
answer: انحطاط فکری بردگان و فساد اخلاقی صاحبان برده
wrong_answers:
  - غیرکارآمدی اقتصادی مزارع و افول تجارت بین‌المللی
  - درگیری‌های مذهبی بین جوامع و فروپاشی ساختارهای خانوادگی
  - رکود فناوری جامعه و تضعیف دفاع نظامی
explanation: |
  متفکران لیبرال فرانسوی مانند گوستاو دو بومونت دو اثر مخرب خاص برده‌داری مدرن را شناسایی کردند. اول، خود بردگان از نظر فکری تحقیر می‌شدند زیرا سیستم مانع از استفاده آن‌ها از ظرفیت‌های ذهنی‌شان می‌شد و آن‌ها را از فرصت‌های توسعه شخصی محروم می‌کرد. دوم، صاحبان برده دچار فساد اخلاقی می‌شدند زیرا نگرش‌های منفی نسبت به کار پیدا می‌کردند و تنها به زور متکی بودند، و ذهنیت‌های ضد لیبرالی ایجاد می‌کردند که با اصول برابری که باید جوامع مدرن را اداره کند، ناسازگار بود.
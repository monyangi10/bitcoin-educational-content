question: 프랑스의 자유주의 사상가들이 18~19세기 미국의 근대 노예 제도에서 발견한 두 가지 해로운 영향은 무엇이었나요?
answer: 노예의 지적 타락과 노예 소유주의 도덕적 타락
wrong_answers:
  - 플랜테이션의 경제적 비효율성과 국제 무역의 감소
  - 지역 사회 간의 종교적 갈등과 가족 구조의 붕괴
  - 사회의 기술적 정체와 군사적 방어력 약화
explanation: |
  구스타브 드 보몽과 같은 프랑스의 자유주의 사상가들은 근대 노예제도의 두 가지 폐해를 구체적으로 지적했습니다. 첫째, 노예 제도가 노예의 정신적 능력을 사용하지 못하게 하여 개인적 발전 기회를 박탈함으로써 노예 스스로가 지적으로 타락했습니다. 둘째, 노예 소유주들은 일에 대한 부정적인 태도를 갖고 힘에만 의존하면서 도덕적 타락을 경험했고, 현대 사회를 지배해야 하는 평등 원칙과 양립할 수 없는 반자유주의적 사고방식을 형성했습니다.
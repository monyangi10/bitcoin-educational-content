question: Jaké dva škodlivé důsledky identifikovali francouzští liberální myslitelé v moderním otrokářském systému v Americe 18.-19. století?
answer: Intelektuální degradace otroků a morální zkaženost otrokářů
wrong_answers:
  - Ekonomická neefektivnost plantáží a úpadek mezinárodního obchodu
  - Náboženské konflikty mezi komunitami a rozpad rodinných struktur
  - Technologická stagnace společnosti a oslabení vojenské obrany
explanation: |
  Francouzští liberální myslitelé, jako například Gustave de Beaumont, identifikovali dva specifické zvrácené důsledky moderního otroctví. Zaprvé, samotní otroci byli intelektuálně degradováni, protože jim systém bránil využívat jejich duševní schopnosti a připravoval je o možnosti osobního rozvoje. Za druhé, u otrokářů docházelo k morálnímu rozkladu, protože si vypěstovali negativní postoj k práci a spoléhali se výhradně na sílu, čímž si vytvořili antiliberální smýšlení neslučitelné se zásadami rovnosti, jimiž by se měly řídit moderní společnosti.
question: Какие два вредных эффекта французские либеральные мыслители выявили в современной системе рабства в Америке XVIII-XIX веков?
answer: Интеллектуальная деградация рабов и моральное разложение рабовладельцев
wrong_answers:
  - Экономическая неэффективность плантаций и упадок международной торговли
  - Религиозные конфликты между общинами и распад семейных структур
  - Технологическая стагнация общества и ослабление военной обороны
explanation: |
  Французские либеральные мыслители, такие как Гюстав де Бомон, выявили два конкретных порочных эффекта современного рабства. Во-первых, сами рабы интеллектуально деградировали, поскольку система не позволяла им использовать свои умственные способности, лишая их возможности личностного развития. Во-вторых, рабовладельцы подвергались моральному разложению, поскольку у них формировалось негативное отношение к труду и они полагались исключительно на силу, создавая антилиберальные умонастроения, несовместимые с принципами равенства, которые должны управлять современным обществом.
question: Welches waren die beiden schädlichen Auswirkungen, die französische liberale Denker im modernen Sklavereisystem des 18. und 19. Jahrhunderts in Amerika ausmachten?
answer: Die intellektuelle Degradierung der Sklaven und die moralische Verderbnis der Sklavenhalter
wrong_answers:
  - Die wirtschaftliche Ineffizienz der Plantagen und der Rückgang des internationalen Handels
  - Die religiösen Konflikte zwischen den Gemeinschaften und der Zusammenbruch der Familienstrukturen
  - Die technologische Stagnation der Gesellschaft und die Schwächung der militärischen Verteidigungsmittel
explanation: |
  Französische liberale Denker wie Gustave de Beaumont stellten zwei spezifische perverse Auswirkungen der modernen Sklaverei fest. Erstens wurden die Sklaven selbst intellektuell herabgewürdigt, weil das System sie daran hinderte, ihre geistigen Fähigkeiten zu nutzen, und ihnen so die Möglichkeit zur persönlichen Entwicklung vorenthielt. Zweitens wurden die Sklavenhalter moralisch korrumpiert, da sie eine negative Einstellung zur Arbeit entwickelten und sich ausschließlich auf Gewalt verließen, was zu einer antiliberalen Mentalität führte, die mit den Gleichheitsgrundsätzen, die moderne Gesellschaften leiten sollten, unvereinbar war.
question: ผลกระทบที่เป็นอันตรายสองประการที่นักคิดเสรีนิยมชาวฝรั่งเศสระบุในระบบทาสสมัยใหม่ของอเมริกาในศตวรรษที่ 18-19 คืออะไร?
answer: การเสื่อมถอยทางปัญญาของทาสและการทุจริตทางศีลธรรมของเจ้าของทาส
wrong_answers:
  - ความไม่มีประสิทธิภาพทางเศรษฐกิจของไร่และการลดลงของการค้าระหว่างประเทศ
  - ความขัดแย้งทางศาสนาระหว่างชุมชนและการล่มสลายของโครงสร้างครอบครัว
  - การหยุดชะงักทางเทคโนโลยีของสังคมและการอ่อนแอลงของการป้องกันทางทหาร
explanation: |
  นักคิดเสรีนิยมชาวฝรั่งเศสอย่างกุสตาฟ เดอ โบมองต์ ได้ระบุถึงผลกระทบที่เลวร้ายสองประการของการเป็นทาสสมัยใหม่ ประการแรก ทาสเองถูกลดทอนทางปัญญาเพราะระบบป้องกันไม่ให้พวกเขาใช้ความสามารถทางจิตใจ ทำให้พวกเขาขาดโอกาสในการพัฒนาตนเอง ประการที่สอง เจ้าของทาสประสบกับการทุจริตทางศีลธรรมเนื่องจากพวกเขาพัฒนาทัศนคติเชิงลบต่อการทำงานและพึ่งพาแต่เพียงการบังคับใช้กำลัง สร้างกรอบความคิดต่อต้านเสรีนิยมที่ไม่สอดคล้องกับหลักการแห่งความเสมอภาคที่ควรปกครองสังคมสมัยใหม่
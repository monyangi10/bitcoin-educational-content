question: Mitkä olivat ne kaksi haitallista vaikutusta, jotka ranskalaiset liberaalit ajattelijat tunnistivat 1700-1900-luvun Amerikan modernissa orjuusjärjestelmässä?
answer: Orjien henkinen rappio ja orjanomistajien moraalinen turmeltuneisuus
wrong_answers:
  - Istutusten taloudellinen tehottomuus ja kansainvälisen kaupan väheneminen
  - Yhteisöjen väliset uskonnolliset ristiriidat ja perherakenteiden hajoaminen
  - Yhteiskunnan teknologinen pysähtyneisyys ja sotilaallisen puolustuksen heikkeneminen
explanation: |
  Ranskalaiset liberaalit ajattelijat, kuten Gustave de Beaumont, tunnistivat nykyaikaisen orjuuden kaksi erityistä kieroutunutta vaikutusta. Ensinnäkin orjat itse olivat älyllisesti alentuneita, koska järjestelmä esti heitä käyttämästä henkisiä kykyjään ja vei heiltä mahdollisuudet henkilökohtaiseen kehitykseen. Toiseksi orjanomistajat kokivat moraalista turmelusta, kun he kehittivät kielteisiä asenteita työtä kohtaan ja luottivat yksinomaan voimankäyttöön, mikä loi antiliberaalia ajattelutapaa, joka ei ollut yhteensopiva tasa-arvoperiaatteiden kanssa, joiden pitäisi ohjata nykyaikaisia yhteiskuntia.
question: Ni gute inzira y’isoko ry’uguhiganwa yo kurondera inyishu itandukanye n’inzira ya politike yo gutorera umuti ivyo abantu bakeneye?
answer: Amasoko atuma abantu bihweza uburyo bwinshi bwo kubitorera umuti, bagahingura inyishu zisanzwe, bagahindura amahitamwo ashingiye ku vyiyumviro vy’umuntu ku giti ciwe, mu gihe politike itanga amahitamwo abujijwe, apfutse ategekwa n’ubutegetsi bw’abantu benshi .
wrong_answers:
  - Amasoko yizigira gufata ingingo rusangi no gusangira inshingano, mu gihe politike ishimika ku mahitamwo y’umuntu ku giti ciwe no kubazwa ivyiza bivamwo .
  - Amasoko akora biciye mu guca irya n’ino buhoro buhoro no mu gutegura igihe kirekire, mu gihe politike ishobora gutuma umuntu ashobora kwishura ningoga ku bintu bihinduka biciye mu gutanga inyishu z’amatora vuba .
  - Amasoko avana n’amategeko ya Leta kugira ngo habeho uguhiganwa mu buryo bubereye, mu gihe politike ikora biciye mu guhitamwo ivyiyumviro vyiza kuruta ibindi vyose .
explanation: |
  Ico canditswe gishimika ku vy’uko amasoko ashoboza uburyo nyakuri bwo kuvumbura aho abantu bashobora guhitamwo mu mwidegemvyo mu bindi, bagahingura inyishu zabo bwite, bagahindura bivanye n’ivyo umuntu yiboneye mu bijanye n’umunezero canke umubabaro. Mu buryo butandukanye n’ubwo, amahitamwo ya politike yerekanwa nk’ibintu bibuzanya abantu gushirwaho n’ubutegetsi bw’abantu benshi, bikabuza abantu gutorera umuti ibibazo bihuye n’ivyo bakeneye be n’ivyo barimwo.
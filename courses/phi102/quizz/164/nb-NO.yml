question: Hvilken grunnleggende forskjell skiller det preventive systemet fra det repressive systemet i liberal økonomisk teori?
answer: Det forebyggende systemet regulerer på forhånd for å forhindre potensiell skade, mens det repressive systemet først griper inn etter at den faktiske skaden har skjedd
wrong_answers:
  - Det preventive systemet fokuserer på strafferettslig håndhevelse, mens det repressive systemet tar seg av sivile tvister og kontrakter
  - Det preventive systemet tillater fri konkurranse på markedet, mens det repressive systemet begrenser handelen gjennom statlige inngrep
  - Det preventive systemet beskytter den individuelle eiendomsretten, mens det repressive systemet omfordeler rikdom gjennom beskatning
explanation: |
  Det preventive systemet skaper reguleringer på forhånd for å forhindre potensielle rettighetskrenkelser, men begynner faktisk med å krenke rettighetene selv ved å begrense ufarlig bruk av frihet. Det repressive systemet, som liberalistene foretrekker, er basert på individuelt ansvar, der folk først blir stilt til ansvar etter at de faktisk har krenket andres rettigheter. Dette skillet er avgjørende fordi den preventive tilnærmingen innskrenker friheten på forhånd, mens den repressive tilnærmingen bevarer maksimal frihet inntil den faktiske skaden inntreffer.
question: Trong lý thuyết kinh tế tự do, sự khác biệt cơ bản nào phân biệt hệ thống phòng ngừa với hệ thống trấn áp?
answer: Hệ thống phòng ngừa điều chỉnh trước để ngăn chặn những tác hại tiềm tàng, trong khi hệ thống trấn áp chỉ hành động sau khi tác hại thực sự xảy ra.
wrong_answers:
  - Hệ thống phòng ngừa tập trung vào việc thực thi pháp luật hình sự, trong khi hệ thống trấn áp giải quyết các tranh chấp dân sự và hợp đồng.
  - Hệ thống phòng ngừa cho phép cạnh tranh thị trường tự do, trong khi hệ thống đàn áp hạn chế thương mại thông qua sự can thiệp của chính phủ.
  - Hệ thống phòng ngừa bảo vệ quyền sở hữu cá nhân, trong khi hệ thống trấn áp phân phối lại của cải thông qua thuế.
explanation: |
  Hệ thống phòng ngừa đặt ra các quy định từ trước với mục đích ngăn chặn các vi phạm quyền tiềm tàng, nhưng trên thực tế lại bắt đầu bằng việc vi phạm chính các quyền đó bằng cách hạn chế những cách sử dụng tự do vô hại. Hệ thống đàn áp, được những người theo chủ nghĩa tự do ưa chuộng, dựa trên trách nhiệm cá nhân, trong đó mọi người chỉ phải chịu trách nhiệm sau khi họ thực sự gây tổn hại đến quyền của người khác. Sự khác biệt này rất quan trọng bởi vì phương pháp phòng ngừa hạn chế tự do một cách phủ đầu, trong khi phương pháp đàn áp bảo toàn tối đa tự do cho đến khi thiệt hại thực sự xảy ra.
question: อะไรคือความแตกต่างพื้นฐานที่แยกแยะระบบป้องกันออกจากระบบปราบปรามในทฤษฎีเศรษฐศาสตร์เสรีนิยม?
answer: ระบบป้องกันจะควบคุมล่วงหน้าเพื่อป้องกันอันตรายที่อาจเกิดขึ้น ในขณะที่ระบบปราบปรามจะดำเนินการเฉพาะหลังจากที่เกิดอันตรายจริงแล้วเท่านั้น
wrong_answers:
  - ระบบป้องกันมุ่งเน้นไปที่การบังคับใช้กฎหมายอาญา ในขณะที่ระบบปราบปรามจัดการกับข้อพิพาททางแพ่งและสัญญา
  - ระบบป้องกันอนุญาตให้มีการแข่งขันในตลาดเสรี ในขณะที่ระบบการปราบปรามจำกัดการค้าโดยการแทรกแซงของรัฐบาล
  - ระบบป้องกันคุ้มครองสิทธิในทรัพย์สินส่วนบุคคล ในขณะที่ระบบปราบปรามกระจายความมั่งคั่งผ่านการเก็บภาษี
explanation: |
  ระบบป้องกันสร้างกฎระเบียบล่วงหน้าเพื่อป้องกันการละเมิดสิทธิ์ที่อาจเกิดขึ้น แต่แท้จริงแล้วเริ่มต้นด้วยการละเมิดสิทธิ์เองโดยการจำกัดการใช้เสรีภาพที่ไม่เป็นอันตราย ระบบการปราบปรามที่นิยมโดยเสรีนิยมมีพื้นฐานอยู่บนความรับผิดชอบส่วนบุคคลที่ผู้คนจะต้องรับผิดชอบก็ต่อเมื่อพวกเขาทำให้สิทธิ์ของผู้อื่นเสียหายจริงๆ ความแตกต่างนี้มีความสำคัญเพราะวิธีการป้องกันจำกัดเสรีภาพล่วงหน้า ในขณะที่วิธีการปราบปรามรักษาเสรีภาพสูงสุดจนกว่าจะเกิดความเสียหายจริงๆ
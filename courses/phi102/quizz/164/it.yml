question: Quale differenza fondamentale distingue il sistema preventivo da quello repressivo nella teoria economica liberale?
answer: Il sistema preventivo regolamenta in anticipo per prevenire un danno potenziale, mentre il sistema repressivo agisce solo dopo che il danno effettivo si è verificato
wrong_answers:
  - Il sistema preventivo si concentra sull'applicazione della legge penale, mentre il sistema repressivo si occupa delle controversie civili e dei contratti
  - Il sistema preventivo permette la libera concorrenza del mercato, mentre il sistema repressivo limita il commercio attraverso l'intervento del governo
  - Il sistema preventivo protegge i diritti di proprietà individuali, mentre il sistema repressivo ridistribuisce la ricchezza attraverso la tassazione
explanation: |
  Il sistema preventivo crea regole a priori per prevenire potenziali violazioni dei diritti, ma in realtà inizia a violare i diritti stessi limitando usi innocui della libertà. Il sistema repressivo, favorito dai liberali, si basa sulla responsabilità individuale e le persone sono ritenute responsabili solo dopo aver effettivamente leso i diritti altrui. Questa distinzione è fondamentale perché l'approccio preventivo limita la libertà in modo preventivo, mentre l'approccio repressivo preserva la massima libertà fino a quando non si verifica un danno effettivo.
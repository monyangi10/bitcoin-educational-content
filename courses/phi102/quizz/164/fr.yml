question: Quelle différence fondamentale distingue le système préventif du système répressif dans la théorie économique libérale ?
answer: Le système préventif réglemente à l'avance pour prévenir les dommages potentiels, tandis que le système répressif n'agit qu'une fois que les dommages réels se sont produits
wrong_answers:
  - Le système préventif se concentre sur l'application du droit pénal, tandis que le système répressif s'occupe des litiges civils et des contrats
  - Le système préventif permet la libre concurrence sur le marché, tandis que le système répressif restreint le commerce par l'intervention des pouvoirs publics
  - Le système préventif protège les droits de propriété individuels, tandis que le système répressif redistribue les richesses par le biais de la fiscalité
explanation: |
  Le système préventif crée des règlements à l'avance pour soi-disant prévenir les violations potentielles des droits, mais commence en fait par violer les droits eux-mêmes en restreignant les usages inoffensifs de la liberté. Le système répressif, favorisé par les libéraux, est basé sur la responsabilité individuelle, les personnes n'étant tenues pour responsables qu'après avoir effectivement porté atteinte aux droits d'autrui. Cette distinction est cruciale car l'approche préventive restreint la liberté de manière préventive, tandis que l'approche répressive préserve une liberté maximale jusqu'à ce qu'un dommage réel se produise.
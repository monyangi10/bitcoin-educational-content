question: Vilken grundläggande skillnad skiljer det förebyggande systemet från det repressiva systemet i liberal ekonomisk teori?
answer: Det preventiva systemet reglerar i förväg för att förhindra potentiell skada, medan det repressiva systemet agerar först efter att en faktisk skada har inträffat
wrong_answers:
  - Det preventiva systemet fokuserar på brottsbekämpning, medan det repressiva systemet hanterar civilrättsliga tvister och avtal
  - Det förebyggande systemet tillåter fri konkurrens på marknaden, medan det repressiva systemet begränsar handeln genom statliga ingripanden
  - Det förebyggande systemet skyddar den individuella äganderätten, medan det repressiva systemet omfördelar rikedom genom beskattning
explanation: |
  Det förebyggande systemet skapar regleringar i förväg för att förhindra potentiella rättighetskränkningar, men börjar i själva verket med att själv kränka rättigheter genom att begränsa ofarlig användning av frihet. Det repressiva systemet, som förespråkas av liberaler, bygger på individuellt ansvar där människor hålls ansvariga först efter att de faktiskt skadat andras rättigheter. Denna distinktion är avgörande eftersom den förebyggande strategin begränsar friheten i förebyggande syfte, medan den repressiva strategin bevarar maximal frihet tills faktisk skada uppstår.
question: Ni tofauti gani ya msingi inayotofautisha mfumo wa kinga na mfumo wa ukandamizaji katika nadharia ya uchumi huria?
answer: Mfumo wa kinga hudhibiti mapema ili kuzuia madhara yanayoweza kutokea, huku mfumo wa ukandamizaji ukitenda tu baada ya madhara halisi kutokea.
wrong_answers:
  - Mfumo wa kuzuia unazingatia utekelezaji wa sheria za jinai, huku mfumo wa ukandamizaji ukishughulikia migogoro ya kiraia na mikataba
  - Mfumo wa kinga huruhusu ushindani wa soko huria, huku mfumo wa ukandamizaji ukizuia biashara kupitia uingiliaji kati wa serikali.
  - Mfumo wa kinga hulinda haki za mali za mtu binafsi, huku mfumo wa ukandamizaji ukisambaza utajiri kupitia kodi.
explanation: |
  Mfumo wa kinga huunda kanuni mapema ili kuzuia ukiukwaji unaowezekana wa haki, lakini kwa kweli huanza kwa kukiuka haki zenyewe kwa kuzuia matumizi yasiyo na madhara ya uhuru. Mfumo wa ukandamizaji, unaopendelewa na waliberali, unategemea uwajibikaji wa mtu binafsi ambapo watu huwajibika tu baada ya kudhuru haki za wengine. Tofauti hii ni muhimu kwa sababu mbinu ya kinga huzuia uhuru kabla ya uharibifu, huku mbinu ya ukandamizaji ikihifadhi uhuru wa hali ya juu hadi uharibifu halisi utokee.
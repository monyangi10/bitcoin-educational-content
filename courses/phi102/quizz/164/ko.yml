question: 자유주의 경제 이론에서 예방적 시스템과 억압적 시스템을 구별하는 근본적인 차이점은 무엇인가요?
answer: 예방 시스템은 잠재적 피해를 방지하기 위해 사전에 규제하는 반면, 억압 시스템은 실제 피해가 발생한 후에만 작동합니다
wrong_answers:
  - 예방 시스템은 형사법 집행에 초점을 맞추고, 사후 시스템은 민사 분쟁 및 계약을 처리합니다
  - 예방적 시스템은 자유로운 시장 경쟁을 허용하는 반면, 억압적 시스템은 정부 개입을 통해 거래를 제한합니다
  - 예방적 제도는 개인의 재산권을 보호하고, 억압적 제도는 세금을 통해 부를 재분배합니다
explanation: |
  예방적 시스템은 잠재적인 권리 침해를 예방하기 위해 사전에 규제를 만들지만, 실제로는 무해한 자유의 사용을 제한함으로써 권리 자체를 침해하는 것에서 시작됩니다. 자유주의자들이 선호하는 억압적 시스템은 사람들이 실제로 타인의 권리를 침해한 후에야 책임을 지는 개인 책임에 기반합니다. 예방적 접근 방식은 자유를 선제적으로 제한하는 반면 억압적 접근 방식은 실제 피해가 발생할 때까지 최대한의 자유를 보존하기 때문에 이 차이는 매우 중요합니다.
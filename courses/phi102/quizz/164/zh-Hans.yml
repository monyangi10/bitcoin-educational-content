question: 在自由主义经济理论中，预防性制度与压制性制度有何根本区别？
answer: 预防性系统事先进行监管以防止潜在危害，而压制性系统只是在实际危害发生后才采取行动
wrong_answers:
  - 预防系统侧重于刑事执法，而镇压系统则处理民事纠纷和合同
  - 预防性制度允许自由市场竞争，而压制性制度则通过政府干预限制贸易
  - 预防性制度保护个人财产权，而压制性制度则通过税收进行财富再分配
explanation: |
  预防性制度事先制定法规，据说是为了防止潜在的侵权行为，但实际上是通过限制无害的自由使用来侵犯权利本身。自由主义者青睐的压制性制度则以个人责任为基础，人们只有在实际损害他人权利后才会被追究责任。这一区别至关重要，因为预防性方法是先发制人地限制自由，而压制性方法是在实际损害发生之前最大限度地保留自由。
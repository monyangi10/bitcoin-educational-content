question: Jaka fundamentalna różnica odróżnia system prewencyjny od systemu represyjnego w liberalnej teorii ekonomii?
answer: System prewencyjny reguluje z wyprzedzeniem, aby zapobiec potencjalnym szkodom, podczas gdy system represyjny działa dopiero po wystąpieniu rzeczywistej szkody
wrong_answers:
  - System prewencyjny koncentruje się na egzekwowaniu prawa karnego, podczas gdy system represyjny zajmuje się sporami cywilnymi i umowami
  - System prewencyjny pozwala na wolną konkurencję rynkową, podczas gdy system represyjny ogranicza handel poprzez interwencję rządu
  - System prewencyjny chroni indywidualne prawa własności, podczas gdy system represyjny redystrybuuje bogactwo poprzez opodatkowanie
explanation: |
  System prewencyjny tworzy regulacje z wyprzedzeniem, aby rzekomo zapobiegać potencjalnym naruszeniom praw, ale w rzeczywistości sam zaczyna naruszać prawa, ograniczając nieszkodliwe korzystanie z wolności. System represyjny, preferowany przez liberałów, opiera się na indywidualnej odpowiedzialności, w której ludzie są pociągani do odpowiedzialności dopiero po tym, jak faktycznie naruszają prawa innych. To rozróżnienie jest kluczowe, ponieważ podejście prewencyjne ogranicza wolność z wyprzedzeniem, podczas gdy podejście represyjne zachowuje maksymalną wolność do czasu wystąpienia rzeczywistej szkody.
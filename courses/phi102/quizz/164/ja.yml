question: 自由主義経済理論において、予防的システムと抑圧的システムを区別する根本的な違いは何か？
answer: 予防的システムは、潜在的な危害を防ぐために事前に規制するのに対し、抑圧的システムは、実際に危害が発生した後にのみ行動する。
wrong_answers:
  - 予防システムは刑法の執行に重点を置き、抑圧システムは民事紛争や契約を扱う。
  - 予防的システムは自由な市場競争を可能にし、抑圧的システムは政府の介入によって貿易を制限する。
  - 予防的システムは個人の財産権を保護し、抑圧的システムは課税を通じて富を再分配する。
explanation: |
  予防的システムは、潜在的な権利侵害を防ぐために事前に規制を設けるが、実際には無害な自由の利用を制限することによって、権利そのものを侵害することから始める。リベラル派が好む抑圧的システムは、個人の責任に基づいており、人々が責任を問われるのは、実際に他人の権利を害してからである。予防的アプローチが自由を先制的に制限するのに対し、抑圧的アプローチは実際に損害が発生するまで最大の自由を維持するため、この区別は極めて重要である。
question: 본문에 따르면, 제약 시스템이 인간의 사고를 통제하려고 할 때 어떤 근본적인 모순이 존재하는가?
answer: 생각은 각 개인에게 밀접하게 속해 있으며 창의적이고 비판적인 사고 능력을 파괴하지 않고는 외부에서 통제할 수 없습니다
wrong_answers:
  - 사상 통제는 효과적이지만 시간이 지남에 따라 정치 시스템을 약화시키는 경제적 비효율을 초래합니다
  - 사고의 외부 통제는 잘 작동하지만 현대 사회에서 전문 기술 지식의 필요성과 상충됩니다
  - 생각을 통제하는 것은 가능하지만 경제 발전에 더 잘 사용될 수 있는 자원이 너무 많이 필요합니다
explanation: |
  이 글은 생각은 각 사람의 내면에서 형성되며 자기 소유권의 가장 순수한 표현이라고 설명합니다. 보조금을 받는 언론, 독점적 교육 시스템 또는 규제된 민주주의를 통해 생각을 통제하려는 시스템은 아이디어가 어떻게 형성되고 확산되는지 근본적으로 잘못 이해하고 있습니다. 이러한 통제는 창의적이고 비판적인 사고에 대한 자연스러운 능력을 파괴하여 궁극적으로 인류 발전에 필수적인 혁신과 지적 진보를 억압합니다. 다른 옵션들은 사고 통제가 기술적으로는 가능하지만 비현실적일 뿐이라고 잘못 생각합니다.
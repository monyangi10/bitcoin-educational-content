question: Dukurikije ico canditswe, ni ukuvuguruzanya kw’ishimikiro ukuhe kubaho igihe uburyo bwo guhagarika umuntu bugerageza kugenzura ivyiyumviro vy’umuntu?
answer: Iciyumviro ni ica muntu wese kandi ntigishobora kugenzurwa hanze ataco gisenyuye ubushobozi bwo kurema no guca irya n’ino .
wrong_answers:
  - Gucungera ivyiyumviro birakora neza ariko bitera ubukene mu vy'ubutunzi butera intege uburyo bwa politike uko igihe kigenda kirarenga .
  - Gucungera ivyiyumviro hanze birakora neza ariko birahushanye n’ugukenera ubumenyi bwihariye bw’ubuhinga mu kibano ca none .
  - Gucungera ivyiyumviro birashoboka ariko bisaba ubutunzi bwinshi cane bwoshobora gukoreshwa neza mu guteza imbere ubutunzi .
explanation: |
  Ico canditswe kirasigura ko iciyumviro gihingura imbere mu muntu wese kandi ko ari co kigaragaza neza kuruta ibindi vyose ko umuntu yitunga. Uburyo bugerageza gucungera ivyiyumviro biciye ku binyamakuru bifashwa, uburyo bwo kwigisha bushingiye ku butegetsi bw’umuntu umwe gusa , canke demokarasi itunganijwe, mu vy’ukuri ntibutahura neza ingene ivyiyumviro bihingura kandi bikakwiragira. Mwene ukwo kugenzura gusenyura ubushobozi busanzwe bwo kurema no guca irya n’ino, amaherezo bikabuza gukora ibintu bishasha no gutera imbere mu bwenge bihambaye kugira ngo umuntu atere imbere. Ayandi mahitamwo yerekana mu buryo butari bwo yuko gucungera ivyiyumviro bishoboka mu buryo bw’ubuhinga ariko ko bidashoboka gusa.
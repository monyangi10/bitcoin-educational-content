question: Kulingana na maandishi, ni utata gani wa msingi unaopo wakati mifumo ya vikwazo inapojaribu kudhibiti mawazo ya mwanadamu?
answer: Mawazo ni ya kila mtu binafsi na hayawezi kudhibitiwa kwa nje bila kuharibu uwezo wa kufikiri kwa ubunifu na kwa kina
wrong_answers:
  - Udhibiti wa mawazo unafaa lakini husababisha ukosefu wa ufanisi wa kiuchumi unaodhoofisha mfumo wa kisiasa baada ya muda.
  - Udhibiti wa nje wa mawazo hufanya kazi vizuri lakini unapingana na hitaji la maarifa maalum ya kiufundi katika jamii ya kisasa.
  - Kudhibiti mawazo kunawezekana lakini kunahitaji rasilimali nyingi sana ambazo zingeweza kutumika vyema kwa maendeleo ya kiuchumi
explanation: |
  Maandishi yanaelezea kwamba mawazo huunda ndani ya kila mtu na huunda usemi safi kabisa wa umiliki binafsi. Mifumo inayojaribu kudhibiti mawazo kupitia vyombo vya habari vilivyofadhiliwa, mfumo wa elimu unaotawaliwa, au demokrasia inayodhibitiwa kimsingi haielewi jinsi mawazo yanavyoundwa na kuenea. Udhibiti kama huo huharibu uwezo wa asili wa kufikiri kwa ubunifu na kwa kina, hatimaye kukandamiza uvumbuzi na maendeleo ya kiakili muhimu kwa maendeleo ya binadamu. Chaguzi zingine zinaonyesha kimakosa kwamba udhibiti wa mawazo unawezekana kitaalamu lakini hautekelezeki tu.
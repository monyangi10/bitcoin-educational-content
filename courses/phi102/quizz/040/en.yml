question: According to the text, what fundamental contradiction exists when systems of constraint attempt to control human thought?
answer: Thought belongs intimately to each individual and cannot be controlled externally without destroying creative and critical thinking capacity
wrong_answers:
  - Thought control is effective but creates economic inefficiencies that undermine the political system over time
  - External control of thought works well but conflicts with the need for specialized technical knowledge in modern society
  - Controlling thought is possible but requires too many resources that could be better used for economic development
explanation: |
  The text explains that thought forms inside each person and constitutes the purest expression of self-ownership. Systems attempting to control thought through subsidized press, monopolistic education, or regulated democracy fundamentally misunderstand how ideas form and spread. Such control destroys the natural capacity for creative and critical thinking, ultimately stifling innovation and intellectual progress essential for human development. The other options incorrectly suggest that thought control is technically feasible but merely impractical.

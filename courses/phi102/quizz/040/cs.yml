question: Jaký zásadní rozpor podle textu existuje, když se systémy omezení pokoušejí kontrolovat lidské myšlení?
answer: Myšlení patří intimně ke každému člověku a nelze je ovládat zvenčí, aniž by se zničila schopnost tvůrčího a kritického myšlení
wrong_answers:
  - Kontrola myšlení je účinná, ale vytváří ekonomickou neefektivitu, která časem podkopává politický systém
  - Vnější kontrola myšlení funguje dobře, ale je v rozporu s potřebou specializovaných technických znalostí v moderní společnosti
  - Kontrola myšlení je možná, ale vyžaduje příliš mnoho zdrojů, které by mohly být lépe využity pro hospodářský rozvoj
explanation: |
  Text vysvětluje, že myšlenka se utváří uvnitř každého člověka a je nejčistším projevem vlastnictví sebe sama. Systémy, které se snaží kontrolovat myšlení prostřednictvím dotovaného tisku, monopolního vzdělávacího systému nebo regulované demokracie, zásadně nechápou, jak se myšlenky formují a šíří. Taková kontrola ničí přirozenou schopnost tvůrčího a kritického myšlení a v konečném důsledku potlačuje inovace a intelektuální pokrok nezbytný pro lidský rozvoj. Ostatní možnosti nesprávně naznačují, že kontrola myšlení je technicky proveditelná, ale pouze nepraktická.
question: Tekstin mukaan mikä perustavanlaatuinen ristiriita on olemassa, kun rajoitusjärjestelmät yrittävät hallita ihmisen ajattelua?
answer: Ajatus kuuluu läheisesti jokaiselle yksilölle, eikä sitä voida kontrolloida ulkoisesti tuhoamatta luovaa ja kriittistä ajattelukykyä
wrong_answers:
  - Ajatusvalvonta on tehokasta, mutta se luo taloudellista tehottomuutta, joka ajan mittaan heikentää poliittista järjestelmää
  - Ajattelun ulkoinen ohjaus toimii hyvin, mutta on ristiriidassa teknisen erityisosaamisen tarpeen kanssa nyky-yhteiskunnassa
  - Ajatusten hallinta on mahdollista, mutta se vaatii liikaa resursseja, jotka voitaisiin käyttää paremmin talouden kehittämiseen
explanation: |
  Tekstissä selitetään, että ajatus muodostuu jokaisen ihmisen sisällä ja on itseomistuksen puhtain ilmaus. Järjestelmät, jotka pyrkivät hallitsemaan ajatuksia tuetun lehdistön, monopolistisen koulutusjärjestelmän tai säännellyn demokratian avulla, ymmärtävät pohjimmiltaan väärin, miten ajatukset muodostuvat ja leviävät. Tällainen valvonta tuhoaa luontaisen kyvyn luovaan ja kriittiseen ajatteluun ja lopulta tukahduttaa innovaation ja henkisen edistyksen, jotka ovat välttämättömiä ihmisen kehitykselle. Muut vaihtoehdot antavat virheellisesti ymmärtää, että ajatusten hallinta on teknisesti mahdollista mutta vain epäkäytännöllistä.
question: De acordo com o texto, que contradição fundamental existe quando os sistemas de restrição tentam controlar o pensamento humano?
answer: O pensamento pertence intimamente a cada indivíduo e não pode ser controlado externamente sem destruir a capacidade de pensamento criativo e crítico
wrong_answers:
  - O controlo do pensamento é eficaz mas cria ineficiências económicas que minam o sistema político ao longo do tempo
  - O controlo externo do pensamento funciona bem, mas entra em conflito com a necessidade de conhecimentos técnicos especializados na sociedade moderna
  - Controlar o pensamento é possível, mas exige demasiados recursos que poderiam ser mais bem utilizados no desenvolvimento económico
explanation: |
  O texto explica que o pensamento se forma dentro de cada pessoa e constitui a expressão mais pura da propriedade de si próprio. Os sistemas que tentam controlar o pensamento através de uma imprensa subsidiada, de um sistema educativo monopolista ou de uma democracia regulada não compreendem, fundamentalmente, a forma como as ideias se formam e se propagam. Esse controlo destrói a capacidade natural de pensamento criativo e crítico, acabando por sufocar a inovação e o progresso intelectual essenciais ao desenvolvimento humano. As outras opções sugerem incorretamente que o controlo do pensamento é tecnicamente viável mas meramente impraticável.
question: 根据课文内容，当约束系统试图控制人类思想时，存在着什么基本矛盾？
answer: 思想与每个人息息相关，不能通过外部控制来破坏创造性和批判性思维能力
wrong_answers:
  - 思想控制是有效的，但会造成经济效率低下，从而长期破坏政治制度
  - 外部思想控制效果很好，但与现代社会对专业技术知识的需求相冲突
  - 控制思想是可能的，但需要太多的资源，而这些资源本可以更好地用于经济发展
explanation: |
  文中解释说，思想在每个人的内心形成，是自我所有权最纯粹的表达。试图通过补贴新闻界、垄断教育系统或管制民主来控制思想的制度，从根本上误解了思想的形成和传播方式。这种控制破坏了创造性和批判性思维的自然能力，最终扼杀了对人类发展至关重要的创新和思想进步。其他方案错误地认为，思想控制在技术上是可行的，只是不切实际而已。
question: Според текста какво фундаментално противоречие съществува, когато системите за принуда се опитват да контролират човешката мисъл?
answer: Мисълта принадлежи на всеки човек и не може да бъде контролирана външно, без да се унищожи способността за творческо и критично мислене
wrong_answers:
  - Контролът на мисълта е ефективен, но създава икономическа неефективност, която с течение на времето подкопава политическата система
  - Външният контрол на мисълта работи добре, но е в противоречие с необходимостта от специализирани технически познания в съвременното общество
  - Контролирането на мисълта е възможно, но изисква твърде много ресурси, които биха могли да се използват по-добре за икономическо развитие
explanation: |
  В текста се обяснява, че мисълта се формира във всеки човек и представлява най-чистата проява на самовластие. Системите, които се опитват да контролират мисълта чрез субсидирана преса, монополна образователна система или регулирана демокрация, фундаментално не разбират как се формират и разпространяват идеите. Такъв контрол унищожава естествената способност за творческо и критично мислене, като в крайна сметка задушава иновациите и интелектуалния прогрес, които са от съществено значение за човешкото развитие. Другите варианти неправилно внушават, че контролът върху мисълта е технически възможен, но просто непрактичен.
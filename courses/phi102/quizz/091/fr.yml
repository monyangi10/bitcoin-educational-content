question: D'après le texte, quelle est la principale raison pour laquelle l'alcoolisme est un exemple d'usage autodestructeur de la liberté ?
answer: Elle diminue progressivement la capacité de liberté de l'individu en créant une dépendance et en réduisant les facultés mentales
wrong_answers:
  - Il supprime immédiatement tout choix personnel et élimine le libre arbitre dès le moment de la première consommation
  - Elle nuit principalement à la société en augmentant les taux de criminalité et en réduisant la productivité économique des communautés
  - Elle viole les contrats sociaux en obligeant les autres à supporter la charge financière des soins de santé et des coûts de réadaptation
explanation: |
  Le texte explique notamment que l'alcoolisme est d'abord un acte libre, mais qu'il diminue progressivement la liberté de l'individu en créant une dépendance et en réduisant ses facultés, sa volonté et ses capacités mentales. Cela les rend moins capables d'utiliser leurs capacités d'une manière éclairée. Les mauvaises réponses mettent l'accent sur l'élimination immédiate du choix, le préjudice sociétal ou les charges financières, qui ne sont pas au cœur de l'analyse du texte sur la façon dont l'alcoolisme illustre la liberté autodestructrice.
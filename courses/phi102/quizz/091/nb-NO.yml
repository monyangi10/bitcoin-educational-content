question: Hva er ifølge teksten den viktigste grunnen til at alkoholisme fungerer som et eksempel på selvdestruktiv bruk av frihet?
answer: Den reduserer gradvis individets evne til frihet ved å skape avhengighet og redusere de mentale evnene
wrong_answers:
  - Det fjerner umiddelbart alle personlige valg og eliminerer den frie viljen fra det første inntaket
  - Det skader først og fremst samfunnet ved å øke kriminaliteten og redusere den økonomiske produktiviteten i lokalsamfunnene
  - Det bryter med samfunnskontrakten ved å tvinge andre til å bære den økonomiske byrden av helse- og rehabiliteringskostnader
explanation: |
  Teksten forklarer spesifikt at alkoholisme begynner som en fri handling, men at den gradvis reduserer individets frihet ved å skape avhengighet og redusere deres evner, viljestyrke og mentale kapasitet. Dette gjør dem mindre i stand til å bruke evnene sine på en opplyst måte. De gale svarene fokuserer på umiddelbar eliminering av valgmuligheter, samfunnsmessige skader eller økonomiske byrder, noe som ikke er hovedfokuset i tekstens analyse av hvordan alkoholisme er et eksempel på selvdestruktiv frihet.
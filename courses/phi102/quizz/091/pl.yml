question: Jaki jest główny powód, dla którego alkoholizm służy jako przykład autodestrukcyjnego korzystania z wolności?
answer: Stopniowo zmniejsza zdolność jednostki do wolności, tworząc zależność i ograniczając zdolności umysłowe
wrong_answers:
  - Natychmiast usuwa wszelki osobisty wybór i eliminuje wolną wolę od momentu pierwszej konsumpcji
  - Szkodzi przede wszystkim społeczeństwu, zwiększając wskaźniki przestępczości i zmniejszając produktywność gospodarczą w społecznościach
  - Narusza umowy społeczne, zmuszając innych do ponoszenia finansowego ciężaru kosztów opieki zdrowotnej i rehabilitacji
explanation: |
  Tekst wyjaśnia w szczególności, że alkoholizm zaczyna się jako wolny akt, ale stopniowo zmniejsza wolność jednostki, tworząc uzależnienie i zmniejszając jej zdolności, siłę woli i zdolności umysłowe. Sprawia to, że są oni mniej zdolni do wykorzystywania swoich umiejętności w oświecony sposób. Błędne odpowiedzi koncentrują się na natychmiastowej eliminacji wyboru, szkodach społecznych lub obciążeniach finansowych, które nie są głównym przedmiotem analizy tekstu na temat tego, w jaki sposób alkoholizm jest przykładem autodestrukcyjnej wolności.
question: Prema tekstu, koji je primarni razlog zašto alkoholizam služi kao primer samodestruktivne upotrebe slobode?
answer: Postepeno smanjuje sposobnost pojedinca za slobodu stvarajući zavisnost i smanjujući mentalne sposobnosti.
wrong_answers:
  - Odmah uklanja svaki lični izbor i eliminiše slobodnu volju od trenutka prve konzumacije.
  - To prvenstveno šteti društvu povećanjem stope kriminala i smanjenjem ekonomske produktivnosti u zajednicama.
  - Krši društvene ugovore prisiljavajući druge da snose finansijski teret troškova zdravstvene zaštite i rehabilitacije.
explanation: |
  Tekst posebno objašnjava da alkoholizam počinje kao slobodan čin, ali postepeno smanjuje slobodu pojedinca stvarajući zavisnost i smanjujući njihove sposobnosti, volju i mentalne kapacitete. To ih čini manje sposobnim da koriste svoje sposobnosti na prosvetljen način. Pogrešni odgovori se fokusiraju na trenutno eliminisanje izbora, društvenu štetu ili finansijske terete, što nije primarni fokus analize teksta o tome kako alkoholizam predstavlja samodestruktivnu slobodu.
question: Vad är enligt texten det främsta skälet till att alkoholism fungerar som ett exempel på självdestruktivt utnyttjande av frihet?
answer: Den minskar successivt individens förmåga till frihet genom att skapa beroende och minska de mentala förmågorna
wrong_answers:
  - Det tar omedelbart bort alla personliga val och eliminerar den fria viljan från det ögonblick då den första konsumtionen sker
  - Det skadar främst samhället genom att öka brottsligheten och minska den ekonomiska produktiviteten i samhällen
  - Det bryter mot sociala kontrakt genom att tvinga andra att bära den ekonomiska bördan av vård- och rehabiliteringskostnader
explanation: |
  I texten förklaras särskilt att alkoholism börjar som en fri handling men gradvis minskar individens frihet genom att skapa beroende och minska deras förmågor, viljestyrka och mentala kapacitet. Detta gör dem mindre kapabla att använda sina förmågor på ett upplyst sätt. De felaktiga svaren fokuserar på omedelbar eliminering av valmöjligheter, samhällelig skada eller ekonomiska bördor, vilket inte är det primära fokuset i textens analys av hur alkoholism exemplifierar självdestruktiv frihet.
question: Según el texto, ¿cuál es la razón principal por la que el alcoholismo sirve como ejemplo de uso autodestructivo de la libertad?
answer: Disminuye progresivamente la capacidad de libertad del individuo al crear dependencia y reducir sus facultades mentales
wrong_answers:
  - Elimina inmediatamente toda elección personal y suprime el libre albedrío desde el momento del primer consumo
  - Perjudica principalmente a la sociedad al aumentar los índices de delincuencia y reducir la productividad económica de las comunidades
  - Viola los contratos sociales al obligar a otros a soportar la carga financiera de los costes sanitarios y de rehabilitación
explanation: |
  El texto explica específicamente que el alcoholismo comienza como un acto libre pero disminuye progresivamente la libertad del individuo al crear dependencia y reducir sus facultades, fuerza de voluntad y capacidades mentales. Esto les hace menos capaces de utilizar sus habilidades de una manera ilustrada. Las respuestas incorrectas se centran en la eliminación inmediata de la elección, el daño social o las cargas financieras, que no son el foco principal del análisis del texto sobre cómo el alcoholismo ejemplifica la libertad autodestructiva.
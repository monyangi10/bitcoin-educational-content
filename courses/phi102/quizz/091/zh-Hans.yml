question: 根据课文内容，酗酒是自毁自由的一个例子，其主要原因是什么？
answer: 它通过制造依赖性和降低心智能力，逐步削弱个人的自由能力
wrong_answers:
  - 从第一次消费的那一刻起，它立即取消了所有个人选择，消除了自由意志
  - 它对社会的主要危害是增加犯罪率和降低社区的经济生产力
  - 它违反了社会契约，迫使他人承担医疗和康复费用的经济负担
explanation: |
  文中特别解释说，酗酒开始时是一种自由行为，但会产生依赖性，削弱个人的能力、意志力和心智，从而逐渐减少个人的自由。这使得他们无法以开明的方式使用自己的能力。错误答案的重点是立即消除选择、社会危害或经济负担，而这些并不是文章分析酗酒如何体现自我毁灭自由的主要重点。
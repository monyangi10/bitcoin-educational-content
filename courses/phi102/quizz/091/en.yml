question: According to the text, what is the primary reason why alcoholism serves as an example of self-destructive use of freedom?
answer: It progressively diminishes the individual's capacity for freedom by creating dependency and reducing mental faculties
wrong_answers:
  - It immediately removes all personal choice and eliminates free will from the moment of first consumption
  - It primarily harms society by increasing crime rates and reducing economic productivity in communities
  - It violates social contracts by forcing others to bear the financial burden of healthcare and rehabilitation costs
explanation: |
  The text specifically explains that alcoholism begins as a free act but progressively diminishes the individual's freedom by creating dependency and reducing their faculties, willpower, and mental capacities. This makes them less capable of using their abilities in an enlightened manner. The wrong answers focus on immediate elimination of choice, societal harm, or financial burdens, which are not the primary focus of the text's analysis of how alcoholism exemplifies self-destructive freedom.

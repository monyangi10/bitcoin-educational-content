question: Was unterscheidet nach Tocquevilles Beobachtungen echtes Eigeninteresse von engstirnigem Egoismus in der amerikanischen Gesellschaft?
answer: Das Eigeninteresse geht natürlich über den Einzelnen hinaus und umfasst auch die Familie und weitere soziale Kreise
wrong_answers:
  - Das Eigeninteresse ist strikt auf persönlichen materiellen Gewinn und individuelles Vorankommen beschränkt
  - Eigeninteresse funktioniert durch staatliche Regulierung, die individuelle Wünsche auf kollektive Ziele lenkt
  - Eigeninteresse funktioniert nur, wenn der Einzelne seine persönlichen Wünsche zugunsten des gesellschaftlichen Nutzens vollständig aufgibt
explanation: |
  Tocqueville stellte fest, dass wahres Eigeninteresse kein geometrisch enger Egoismus ist, sondern einen größeren Kreis umfasst, der auch familiäre und soziale Verbindungen einschließt. Der Text unterstreicht, dass der Mensch zu einem "großen Egoismus" fähig ist, der sich von der Familie bis zu breiteren Verbänden erstreckt. Dies widerspricht der Karikatur des Wirtschaftsliberalismus als rein egoistisch und zeigt stattdessen, dass das Eigeninteresse natürlich auch soziale Dimensionen umfasst und nicht auf einen strengen Individualismus reduziert werden kann.
question: Mikä Tocquevillen havaintojen mukaan erottaa aidon oman edun tavoittelun kapeasta egoismista amerikkalaisessa yhteiskunnassa?
answer: Itsekkyys ulottuu luonnollisesti yksilöä laajemmalle ja kattaa perheen ja laajemmat sosiaaliset piirit
wrong_answers:
  - Itsekkyys rajoittuu tiukasti henkilökohtaiseen aineelliseen hyötyyn ja yksilölliseen etenemiseen
  - Itsekkyys toimii valtion sääntelyn kautta, joka kanavoi yksilön halut kohti kollektiivisia tavoitteita
  - Itsekkyys toimii vain silloin, kun yksilöt luopuvat täysin henkilökohtaisista toiveistaan yhteiskunnallisen hyödyn hyväksi
explanation: |
  Tocqueville totesi, että todellinen oman edun tavoittelu ei ole geometrisesti kapeaa itsekkyyttä, vaan se kattaa laajemman piirin, johon kuuluvat myös perhe- ja sosiaaliset suhteet. Tekstissä korostetaan, että ihminen kykenee "suureen egoismiin", joka ulottuu perheestä laajempiin yhteyksiin. Tämä on ristiriidassa talousliberalismin karikatyyrin kanssa, jonka mukaan talousliberalismi on puhtaasti itsekästä, ja osoittaa sen sijaan, että itsekkyys sisältää luonnollisesti sosiaalisia ulottuvuuksia eikä sitä voida pelkistää tiukkaan individualismiin.
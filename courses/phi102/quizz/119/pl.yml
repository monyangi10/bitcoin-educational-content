question: Zgodnie z obserwacjami Tocqueville'a, co odróżnia prawdziwy interes własny od wąskiego egoizmu w społeczeństwie amerykańskim?
answer: Interes własny naturalnie wykracza poza jednostkę, obejmując rodzinę i szersze kręgi społeczne
wrong_answers:
  - Interes własny jest ściśle ograniczony do osobistych korzyści materialnych i indywidualnego rozwoju
  - Interes własny działa poprzez regulacje rządowe, które ukierunkowują indywidualne pragnienia na cele zbiorowe
  - Interes własny funkcjonuje tylko wtedy, gdy jednostki całkowicie porzucają osobiste pragnienia na rzecz korzyści społecznych
explanation: |
  Tocqueville zauważył, że prawdziwy interes własny nie jest geometrycznie wąskim egoizmem, ale obejmuje szerszy krąg, w tym powiązania rodzinne i społeczne. Tekst podkreśla, że ludzie są zdolni do "dużego egoizmu", który rozciąga się od rodziny do szerszych stowarzyszeń. Zaprzecza to karykaturze liberalizmu gospodarczego jako czysto egoistycznego, pokazując zamiast tego, że interes własny naturalnie obejmuje wymiary społeczne i nie może być zredukowany do ścisłego indywidualizmu.
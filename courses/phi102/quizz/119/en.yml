question: According to Tocqueville's observations, what distinguishes genuine self-interest from narrow egoism in American society?
answer: Self-interest naturally extends beyond the individual to encompass family and broader social circles
wrong_answers:
  - Self-interest is strictly limited to personal material gain and individual advancement
  - Self-interest operates through government regulation that channels individual desires toward collective goals
  - Self-interest functions only when individuals completely abandon personal desires for societal benefit
explanation: |
  Tocqueville observed that true self-interest is not geometrically narrow egoism but encompasses a wider circle including family and social connections. The text emphasizes that humans are capable of 'large egoism' that extends from family to broader associations. This contradicts the caricature of economic liberalism as purely selfish, showing instead that self-interest naturally incorporates social dimensions and cannot be reduced to strict individualism.

question: トクヴィルの観察によれば、アメリカ社会における真の利己主義と狭量なエゴイズムを区別するものは何か？
answer: 私利私欲は当然、個人の枠を超え、家族や広範な社会的サークルをも包含する。
wrong_answers:
  - 私利私欲は、個人的な物質的利益と個人の出世に厳しく限定される。
  - 利己主義は、個人の欲望を集団の目標に向かわせる政府の規制を通じて機能する。
  - 利己主義が機能するのは、個人が社会の利益のために個人的な欲望を完全に捨てたときだけである。
explanation: |
  トクヴィルは、真の自己利益とは幾何学的な狭いエゴイズムではなく、家族や社会的なつながりを含むより広い輪を包含するものだと観察した。この文章は、人間には家族からより広いつながりへと広がる「大きなエゴイズム」が可能であることを強調している。これは、経済的自由主義が純粋に利己的であるという風刺画に反するものであり、その代わりに、利己心には社会的な側面が当然含まれており、厳格な個人主義に還元することはできないことを示している。
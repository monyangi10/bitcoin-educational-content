question: 根据托克维尔的观察，美国社会中真正的利己主义与狭隘的利己主义有何区别？
answer: 利己主义自然会超越个人，扩展到家庭和更广泛的社会圈子
wrong_answers:
  - 自我利益严格限于个人物质利益和个人进步
  - 通过政府监管，将个人欲望导向集体目标，从而实现自身利益
  - 只有当个人为了社会利益完全放弃个人欲望时，自利才会发挥作用
explanation: |
  托克维尔认为，真正的利己主义不是狭隘的利己主义，而是包括家庭和社会关系在内的更广泛的利己主义。文中强调，人类能够从家庭延伸到更广泛的社会关系中，实现 "大利己主义"。这与将经济自由主义讽喻为纯粹的自私自利相矛盾，相反，它表明自我利益自然包含了社会层面，不能简化为严格的个人主义。
question: Hva skiller ekte egeninteresse fra snever egoisme i det amerikanske samfunnet, ifølge Tocquevilles observasjoner?
answer: Egeninteressen strekker seg naturlig nok utover individet og omfatter også familien og en bredere sosial krets
wrong_answers:
  - Egeninteressen er strengt begrenset til personlig materiell vinning og individuell fremgang
  - Egeninteressen virker gjennom statlig regulering som kanaliserer individuelle ønsker mot kollektive mål
  - Egeninteressen fungerer bare når individet gir fullstendig avkall på personlige ønsker til fordel for samfunnets beste
explanation: |
  Tocqueville observerte at sann egeninteresse ikke er geometrisk snever egoisme, men omfatter en større krets som inkluderer familie og sosiale forbindelser. Teksten understreker at mennesket er i stand til å utvise en "stor egoisme" som strekker seg fra familien til bredere sammenslutninger. Dette motsier karikaturen av økonomisk liberalisme som rent egoistisk, og viser i stedet at egeninteressen naturlig inkorporerer sosiale dimensjoner og ikke kan reduseres til streng individualisme.
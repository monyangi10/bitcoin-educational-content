question: طبقاً به مشاهدات توکویل، چه چیزی منافع شخصی واقعی را از خودخواهی محدود در جامعه آمریکایی متمایز می‌کند؟
answer: نفع شخصی به طور طبیعی فراتر از فرد به خانواده و دایره‌های اجتماعی گسترده‌تر گسترش می‌یابد.
wrong_answers:
  - نفع شخصی به‌طور دقیق به سود مادی شخصی و پیشرفت فردی محدود می‌شود.
  - منافع شخصی از طریق مقررات دولتی عمل می‌کند که خواسته‌های فردی را به سمت اهداف جمعی هدایت می‌کند.
  - عملکرد منافع شخصی تنها زمانی ممکن است که افراد به طور کامل از خواسته‌های شخصی خود برای منافع جامعه چشم‌پوشی کنند.
explanation: |
  توكویل مشاهده کرد که منافع شخصی واقعی، خودخواهی هندسی باریک نیست بلکه دایره وسیع‌تری را شامل می‌شود که شامل خانواده و ارتباطات اجتماعی است. متن تأکید می‌کند که انسان‌ها قادر به 'خودخواهی بزرگ' هستند که از خانواده به انجمن‌های گسترده‌تر گسترش می‌یابد. این با کاریکاتور لیبرالیسم اقتصادی به عنوان صرفاً خودخواهانه در تضاد است و نشان می‌دهد که منافع شخصی به طور طبیعی ابعاد اجتماعی را در بر می‌گیرد و نمی‌توان آن را به فردگرایی سخت‌گیرانه کاهش داد.
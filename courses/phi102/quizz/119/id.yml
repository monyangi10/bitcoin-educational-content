question: Menurut pengamatan Tocqueville, apa yang membedakan kepentingan pribadi yang tulus dengan egoisme sempit dalam masyarakat Amerika?
answer: Kepentingan pribadi secara alami meluas melampaui individu untuk mencakup keluarga dan lingkaran sosial yang lebih luas
wrong_answers:
  - Kepentingan pribadi sangat terbatas pada keuntungan materi pribadi dan kemajuan individu
  - Kepentingan pribadi beroperasi melalui peraturan pemerintah yang menyalurkan keinginan individu menuju tujuan kolektif
  - Kepentingan pribadi hanya berfungsi jika individu benar-benar meninggalkan keinginan pribadi demi keuntungan masyarakat
explanation: |
  Tocqueville mengamati bahwa kepentingan pribadi yang sebenarnya bukanlah egoisme yang sempit secara geometris, namun mencakup lingkaran yang lebih luas termasuk keluarga dan hubungan sosial. Teks ini menekankan bahwa manusia mampu memiliki 'egoisme besar' yang meluas dari keluarga ke asosiasi yang lebih luas. Hal ini bertentangan dengan karikatur liberalisme ekonomi yang hanya mementingkan diri sendiri, dan menunjukkan bahwa kepentingan pribadi secara alamiah mencakup dimensi sosial dan tidak dapat direduksi menjadi individualisme yang ketat.
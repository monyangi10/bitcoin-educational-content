question: Wat onderscheidt, volgens Tocqueville's observaties, oprecht eigenbelang van bekrompen egoïsme in de Amerikaanse samenleving?
answer: Eigenbelang gaat natuurlijk verder dan het individu en omvat ook familie en bredere sociale kringen
wrong_answers:
  - Eigenbelang is strikt beperkt tot persoonlijk materieel gewin en individuele vooruitgang
  - Eigenbelang werkt via overheidsregulering die individuele wensen kanaliseert naar collectieve doelen
  - Eigenbelang werkt alleen als individuen hun persoonlijke verlangens volledig opgeven voor maatschappelijk voordeel
explanation: |
  Tocqueville merkte op dat waar eigenbelang geen geometrisch smal egoïsme is, maar een bredere cirkel omvat met inbegrip van familie en sociale connecties. De tekst benadrukt dat mensen in staat zijn tot 'groot egoïsme' dat zich uitstrekt van familie tot bredere verbanden. Dit is in tegenspraak met de karikatuur van economisch liberalisme als puur egoïstisch, en laat in plaats daarvan zien dat eigenbelang van nature sociale dimensies omvat en niet kan worden gereduceerd tot strikt individualisme.
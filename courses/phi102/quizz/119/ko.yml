question: 토크빌의 관찰에 따르면, 미국 사회에서 진정한 이기주의와 편협한 이기주의를 구별하는 것은 무엇일까요?
answer: 이기심은 자연스럽게 개인을 넘어 가족과 더 넓은 사회적 영역으로 확장됩니다
wrong_answers:
  - 사익은 개인의 물질적 이득과 개인의 승진으로 엄격하게 제한됩니다
  - 이기주의는 개인의 욕구를 집단적 목표로 유도하는 정부 규제를 통해 작동합니다
  - 이기심은 개인이 사회적 이익을 위해 개인적 욕망을 완전히 포기할 때만 작동합니다
explanation: |
  토크빌은 진정한 이기주의는 기하학적으로 좁은 이기주의가 아니라 가족과 사회적 관계를 포함한 더 넓은 범위를 포괄하는 것이라고 말했습니다. 인간은 가족에서 더 넓은 관계로 확장되는 '대이기주의'를 할 수 있다는 점을 강조합니다. 이는 경제적 자유주의가 순전히 이기적이라는 풍자적 시각과 모순되며, 이기심에는 사회적 차원이 자연스럽게 포함되며 엄격한 개인주의로 환원될 수 없음을 보여줍니다.
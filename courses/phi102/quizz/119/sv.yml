question: Vad skiljer, enligt Tocquevilles observationer, genuint egenintresse från snäv egoism i det amerikanska samhället?
answer: Egenintresset sträcker sig naturligtvis längre än till individen och omfattar även familjen och en bredare social krets
wrong_answers:
  - Egenintresset är strikt begränsat till personlig materiell vinning och individuell utveckling
  - Egenintresset styrs av statliga regleringar som kanaliserar individuella önskningar mot kollektiva mål
  - Egenintresset fungerar bara när individer helt överger sina personliga önskningar till förmån för samhällsnyttan
explanation: |
  Tocqueville konstaterade att sant egenintresse inte är geometriskt snäv egoism utan omfattar en vidare krets som inkluderar familj och sociala kontakter. I texten betonas att människan är kapabel till "stor egoism" som sträcker sig från familjen till bredare sammanslutningar. Detta motsäger karikatyren av ekonomisk liberalism som rent egoistisk, och visar istället att egenintresset naturligt innefattar sociala dimensioner och inte kan reduceras till strikt individualism.
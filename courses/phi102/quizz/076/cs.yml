question: Čím se podle textu vyznačovala výroba ve starověkých společnostech, která bránila nastolení svobody jednotlivce?
answer: Extrémní nejistota s nedostatečnými výsledky, které podléhají mnoha nejistotám
wrong_answers:
  - Hojná nadprodukce, která vytvořila nerovnost mezi společenskými vrstvami
  - Vysoce specializovaná výroba, která vyžadovala složité obchodní sítě
  - Intenzivní zemědělské metody, které rychle vyčerpávají přírodní zdroje
explanation: |
  V textu se výslovně uvádí, že výroba ve starověkých společnostech se vyznačovala "extrémní nejistotou, nedostatečnými výsledky a mnoha nejistotami" Tato nejistá povaha výroby v kombinaci s činnostmi, jako je lov, které vyžadovaly rozsáhlá území neslučitelná s malým soukromým vlastnictvím, vytvořila materiální podmínky, které si vynutily kolektivní formy organizace, kde individuální svoboda zůstávala spíše aspirací než konkrétní realitou. Ostatní možnosti jsou nesprávné, protože popisují podmínky hojnosti, specializace nebo intenzivních metod, které nebyly pro tyto rané společnosti charakteristické.
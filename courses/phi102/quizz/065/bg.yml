question: Каква е ролята на техническия прогрес и машините за трансформирането на социалните отношения според тази глава?
answer: Те замениха грубата сила като основен елемент на производството, слагайки край на господството, основано на физическата сила
wrong_answers:
  - Те увеличават значението на физическата сила и военната мощ в икономическите дейности
  - Те затвърждават традиционните йерархии, като правят ръчния труд по-ценен от интелектуалните умения
  - Те създават нови форми на господство, основани на достъпа до природни ресурси и собствеността върху земята
explanation: |
  В тази глава се обяснява, че капитализмът представлява технически прогрес, който замества грубата сила с машини като основен елемент на производството. Тази трансформация слага край на господството, основано на физическата сила, и благоприятства мирните отношения на размяна. Когато производителността зависеше повече от интелекта, отколкото от мускулната сила, традиционните властови отношения загубиха своето оправдание. Това особено подобри условията на жените, тъй като усъвършенстваните машини изискваха по-малко сила и повече интелект, което даде възможност за самостоятелна собственост на всички, независимо от физическата им сила.
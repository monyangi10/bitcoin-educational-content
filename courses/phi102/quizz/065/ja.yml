question: この章によれば、技術的進歩や機械は、社会関係の変革にどのような役割を果たしたのか？
answer: 彼らは、生産の中心的要素としての武力に取って代わり、肉体的な強さに基づく支配を終わらせた。
wrong_answers:
  - 経済活動における体力と軍事力の重要性を高めた。
  - 知的スキルよりも肉体労働の価値を高めることで、伝統的なヒエラルキーを強化した。
  - 天然資源へのアクセスと土地の所有権に基づく新たな支配形態を生み出した。
explanation: |
  この章では、資本主義が技術的進歩の象徴であり、生産の中心的要素である武力を機械に置き換えたと説明している。この変革は、物理的な力に基づく支配に終止符を打ち、平和的な交換関係を支持した。生産性が筋力よりも知力に依存するようになると、伝統的な力関係は正当性を失った。洗練された機械はより少ない力でより多くの知性を必要とし、体力に関係なくすべての人に自己所有権を与えることができるようになったからである。
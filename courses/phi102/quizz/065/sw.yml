question: Kulingana na sura hiyo, maendeleo ya kiufundi na mashine zilichangia nini katika kubadilisha mahusiano ya kijamii?
answer: Walibadilisha nguvu kali kama kipengele kikuu cha uzalishaji, wakimaliza utawala unaotegemea nguvu za kimwili
wrong_answers:
  - Waliongeza umuhimu wa nguvu za kimwili na nguvu za kijeshi katika shughuli za kiuchumi
  - Waliimarisha uongozi wa kitamaduni kwa kufanya kazi za mikono kuwa na thamani zaidi kuliko ujuzi wa kiakili.
  - Waliunda aina mpya za utawala kulingana na upatikanaji wa maliasili na umiliki wa ardhi
explanation: |
  Sura hiyo inaelezea kwamba ubepari unawakilisha maendeleo ya kiufundi ambayo yalibadilisha mashine badala ya nguvu kali kama kipengele kikuu cha uzalishaji. Mabadiliko haya yalimaliza utawala unaotegemea nguvu za kimwili na kupendelea mahusiano ya kubadilishana kwa amani. Wakati tija ilitegemea zaidi akili kuliko nguvu za misuli, mahusiano ya nguvu za jadi yalipoteza uhalali wake. Hii iliboresha zaidi hali za wanawake, kwani mashine za kisasa zilihitaji nguvu kidogo na akili zaidi, na kuwezesha umiliki binafsi kwa wote bila kujali nguvu za kimwili.
question: Hvilken rolle spilte tekniske fremskritt og maskiner i omformingen av sosiale relasjoner, ifølge kapitlet?
answer: De erstattet rå makt som det sentrale elementet i produksjonen, og gjorde slutt på dominans basert på fysisk styrke
wrong_answers:
  - De økte betydningen av fysisk styrke og militærmakt i økonomiske aktiviteter
  - De forsterket tradisjonelle hierarkier ved å gjøre manuelt arbeid mer verdifullt enn intellektuelle ferdigheter
  - De skapte nye former for herredømme basert på tilgang til naturressurser og eierskap til jord
explanation: |
  Kapitalismen representerer et teknisk fremskritt som har erstattet rå kraft med maskiner som det sentrale elementet i produksjonen. Denne transformasjonen gjorde slutt på dominans basert på fysisk makt og favoriserte fredelige utvekslingsforhold. Når produktiviteten ble mer avhengig av intelligens enn muskelstyrke, mistet de tradisjonelle maktforholdene sin berettigelse. Dette forbedret særlig kvinners vilkår, ettersom sofistikerte maskiner krevde mindre kraft og mer intellekt, noe som muliggjorde selveierskap for alle, uavhengig av fysisk styrke.
question: Secondo il capitolo, che ruolo hanno avuto il progresso tecnico e le macchine nella trasformazione dei rapporti sociali?
answer: Hanno sostituito la forza bruta come elemento centrale della produzione, ponendo fine al dominio basato sulla forza fisica
wrong_answers:
  - Hanno aumentato l'importanza della forza fisica e del potere militare nelle attività economiche
  - Hanno rafforzato le gerarchie tradizionali rendendo il lavoro manuale più prezioso delle capacità intellettuali
  - Hanno creato nuove forme di dominio basate sull'accesso alle risorse naturali e sulla proprietà della terra
explanation: |
  Il capitolo spiega che il capitalismo rappresenta il progresso tecnico che ha sostituito le macchine alla forza bruta come elemento centrale della produzione. Questa trasformazione ha posto fine al dominio basato sulla forza fisica e ha favorito relazioni di scambio pacifiche. Quando la produttività dipendeva più dall'intelligenza che dalla forza muscolare, i rapporti di forza tradizionali perdevano la loro giustificazione. Ciò migliorò in particolare le condizioni delle donne, poiché le macchine sofisticate richiedevano meno forza e più intelletto, consentendo a tutti la proprietà personale, indipendentemente dalla forza fisica.
question: Dushingiye ku kigabane, ni uruhara uruhe iterambere ry’ubuhinga n’amamashini vyagize mu guhindura imigenderanire hagati y’abantu?
answer: Basubiriye inguvu z’agahomerabunwa nk’ikintu nyamukuru co guhingura, baraheza baraheza ubutegetsi bushingiye ku nkomezi z’umubiri .
wrong_answers:
  - Barongeye akamaro k'inkomezi z'umubiri n'ububasha bwa gisirikare mu bikorwa vy'ubutunzi .
  - Bakomeje ubukuru bwa kera mu gutuma igikorwa c’amaboko gifise agaciro kuruta ubuhinga bwo mu bwenge .
  - Baciye bashiraho uburyo bushasha bwo kuganza bushingiye ku kuronka ubutunzi n'ubutaka .
explanation: |
  Ico gice kirasigura ko ubu kapitalizimu bugereranya iterambere ry’ubuhinga ryasubirije imashini inguvu z’agahomerabunwa nk’ikintu nyamukuru co guhingura. Iryo hinduka ryarangije ubutegetsi bushingiye ku bubasha bw’umubiri, rituma haba imigenderanire y’uguhanahana amakuru mu mahoro. Igihe umusaruro wari ushingiye cane ku bwenge kuruta ku nkomezi z’imitsi, imigenderanire y’ububasha ya kera yaratakaje imvo n’imvano. Ivyo vyatumye canecane abagore bamererwa neza, kuko imashini ziteye imbere cane zasaba inguvu nkeyi kandi zikaba zifise ubwenge bwinshi, ivyo bikaba vyatuma bose bashobora kwitunga ata kuraba inkomezi z’umubiri.
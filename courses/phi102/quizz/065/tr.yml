question: Bu bölüme göre, teknik ilerleme ve makineler toplumsal ilişkilerin dönüşümünde nasıl bir rol oynamıştır?
answer: Üretimin merkezi unsuru olarak kaba kuvvetin yerini aldılar ve fiziksel güce dayalı tahakküme son verdiler
wrong_answers:
  - Ekonomik faaliyetlerde fiziksel güç ve askeri gücün önemini artırdılar
  - El emeğini entelektüel becerilerden daha değerli hale getirerek geleneksel hiyerarşileri pekiştirdiler
  - Doğal kaynaklara erişim ve toprak mülkiyetine dayalı yeni tahakküm biçimleri yarattılar
explanation: |
  Bu bölümde kapitalizmin, üretimin merkezi unsuru olarak kaba kuvvetin yerine makineleri ikame eden teknik ilerlemeyi temsil ettiği açıklanmaktadır. Bu dönüşüm fiziksel güce dayalı tahakkümü sona erdirmiş ve barışçıl mübadele ilişkilerini desteklemiştir. Üretkenlik kas gücünden ziyade zekaya bağlı olduğunda, geleneksel güç ilişkileri gerekçelerini yitirmiştir. Sofistike makineler daha az güç ve daha fazla akıl gerektirdiğinden, bu durum özellikle kadınların koşullarını iyileştirdi ve fiziksel güçten bağımsız olarak herkes için kendi mülkiyetine sahip olmayı mümkün kıldı.
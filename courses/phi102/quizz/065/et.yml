question: Millist rolli mängisid peatüki kohaselt tehnika areng ja masinad sotsiaalsete suhete muutmisel?
answer: Nad asendasid toore jõu tootmise keskse elemendina, lõpetades füüsilisel jõul põhineva domineerimise
wrong_answers:
  - Nad suurendasid füüsilise jõu ja sõjalise võimsuse tähtsust majandustegevuses
  - Nad tugevdasid traditsioonilisi hierarhiaid, muutes käsitsitöö väärtuslikumaks kui intellektuaalsed oskused
  - Nad lõid uusi domineerimise vorme, mis põhinesid juurdepääsul loodusvaradele ja maaomandile
explanation: |
  Peatükis selgitatakse, et kapitalism esindab tehnilist progressi, mis asendas tootmise keskse elemendina toore jõu masinatega. See muutus lõpetas füüsilisel jõul põhineva domineerimise ja soodustas rahumeelseid vahetussuhteid. Kui tootlikkus sõltus rohkem intelligentsusest kui lihasjõust, kaotasid traditsioonilised võimusuhted oma õigustuse. See parandas eelkõige naiste olukorda, sest täiustatud masinad nõudsid vähem jõudu ja rohkem intellekti, võimaldades füüsilisest jõust sõltumatult kõigile eneseomandit.
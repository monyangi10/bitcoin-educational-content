question: 이 장에 따르면, 기술 발전과 기계가 사회 관계를 변화시키는 데 어떤 역할을 했나요?
answer: 무차별적인 힘을 생산의 중심 요소로 대체하여 물리적 힘에 기반한 지배를 종식시켰습니다
wrong_answers:
  - 경제 활동에서 체력과 군사력의 중요성이 높아졌습니다
  - 지적 능력보다 육체 노동을 더 가치 있게 만들어 전통적인 위계질서를 강화했습니다
  - 그들은 천연 자원과 토지 소유권에 대한 접근을 기반으로 새로운 형태의 지배를 창출했습니다
explanation: |
  이 장에서는 자본주의가 생산의 중심 요소인 무력을 기계로 대체한 기술적 진보를 대표한다고 설명합니다. 이러한 변화는 물리적 힘에 기반한 지배를 종식시키고 평화로운 교환 관계를 선호하게 되었습니다. 생산성이 근력보다 지능에 더 많이 의존하게 되면서 전통적인 권력 관계는 그 정당성을 잃었습니다. 특히 정교한 기계로 인해 힘은 덜 필요하고 지성은 더 많이 필요해지면서 체력에 관계없이 누구나 자기 소유를 할 수 있게 되면서 여성의 조건이 개선되었습니다.
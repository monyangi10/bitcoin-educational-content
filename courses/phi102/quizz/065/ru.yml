question: Согласно главе, какую роль сыграли технический прогресс и машины в трансформации социальных отношений?
answer: Они заменили грубую силу в качестве центрального элемента производства, положив конец господству, основанному на физической силе
wrong_answers:
  - Они повысили значение физической силы и военной мощи в экономической деятельности
  - Они укрепляли традиционную иерархию, делая ручной труд более ценным, чем интеллектуальные навыки
  - Они создали новые формы господства, основанные на доступе к природным ресурсам и владении землей
explanation: |
  В главе объясняется, что капитализм представляет собой технический прогресс, который заменил грубую силу машинами в качестве центрального элемента производства. Эта трансформация положила конец господству, основанному на физической силе, и способствовала мирным отношениям обмена. Когда производительность труда в большей степени зависела от интеллекта, а не от мускульной силы, традиционные отношения власти потеряли свое оправдание. Это особенно улучшило положение женщин, поскольку сложные машины требовали меньше силы и больше интеллекта, что позволило всем, независимо от физической силы, стать собственниками.
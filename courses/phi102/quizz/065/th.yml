question: ตามบทนี้ ความก้าวหน้าทางเทคนิคและเครื่องจักรมีบทบาทอย่างไรในการเปลี่ยนแปลงความสัมพันธ์ทางสังคม?
answer: พวกเขาแทนที่การใช้กำลังดิบเป็นองค์ประกอบหลักของการผลิต ยุติการครอบงำที่อิงจากพละกำลังทางกายภาพ
wrong_answers:
  - พวกเขาเพิ่มความสำคัญของความแข็งแกร่งทางกายภาพและอำนาจทางทหารในกิจกรรมทางเศรษฐกิจ
  - พวกเขาเสริมสร้างลำดับชั้นแบบดั้งเดิมโดยทำให้แรงงานมือมีคุณค่ามากกว่าทักษะทางปัญญา
  - พวกเขาสร้างรูปแบบใหม่ของการครอบงำโดยอิงจากการเข้าถึงทรัพยากรธรรมชาติและการเป็นเจ้าของที่ดิน
explanation: |
  บทนี้อธิบายว่าทุนนิยมเป็นตัวแทนของความก้าวหน้าทางเทคนิคที่แทนที่เครื่องจักรแทนแรงกายเป็นองค์ประกอบหลักของการผลิต การเปลี่ยนแปลงนี้ยุติการครอบงำที่อิงกับพลังทางกายภาพและส่งเสริมความสัมพันธ์การแลกเปลี่ยนอย่างสันติ เมื่อประสิทธิภาพการผลิตขึ้นอยู่กับความฉลาดมากกว่าความแข็งแรงของกล้ามเนื้อ ความสัมพันธ์ทางอำนาจแบบดั้งเดิมก็สูญเสียความชอบธรรมไป สิ่งนี้ปรับปรุงสภาพของผู้หญิงโดยเฉพาะ เนื่องจากเครื่องจักรที่ซับซ้อนต้องการแรงน้อยลงและใช้สติปัญญามากขึ้น ทำให้ทุกคนสามารถเป็นเจ้าของตนเองได้โดยไม่คำนึงถึงความแข็งแรงทางกายภาพ
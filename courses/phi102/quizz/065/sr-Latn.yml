question: Prema poglavlju, kakvu su ulogu tehnički napredak i mašine imali u transformaciji društvenih odnosa?
answer: Zamenili su grubu silu kao centralni element proizvodnje, okončavajući dominaciju zasnovanu na fizičkoj snazi.
wrong_answers:
  - Povećali su značaj fizičke snage i vojne moći u ekonomskim aktivnostima
  - Oni su ojačali tradicionalne hijerarhije čineći manuelni rad vrednijim od intelektualnih veština.
  - Oni su stvorili nove oblike dominacije zasnovane na pristupu prirodnim resursima i vlasništvu nad zemljom.
explanation: |
  Poglavlje objašnjava da kapitalizam predstavlja tehnički napredak koji je zamenio mašine za surovu silu kao centralni element proizvodnje. Ova transformacija je okončala dominaciju zasnovanu na fizičkoj snazi i favorizovala mirne odnose razmene. Kada je produktivnost više zavisila od inteligencije nego od mišićne snage, tradicionalni odnosi moći izgubili su svoje opravdanje. Ovo je posebno poboljšalo uslove za žene, jer su sofisticirane mašine zahtevale manje sile i više intelekta, omogućavajući samovlasništvo za sve bez obzira na fizičku snagu.
question: Jakou roli hrál podle této kapitoly technický pokrok a stroje při proměně společenských vztahů?
answer: Nahradily hrubou sílu jako hlavní prvek výroby a ukončily nadvládu založenou na fyzické síle
wrong_answers:
  - Zvýšili význam fyzické síly a vojenské moci v ekonomických aktivitách
  - Posílily tradiční hierarchii tím, že manuální práce byla cennější než intelektuální dovednosti
  - Vytvořili nové formy nadvlády založené na přístupu k přírodním zdrojům a vlastnictví půdy
explanation: |
  Kapitola vysvětluje, že kapitalismus představuje technický pokrok, který nahradil hrubou sílu jako hlavní prvek výroby stroji. Tato transformace ukončila nadvládu založenou na fyzické síle a upřednostnila mírové směnné vztahy. Když produktivita závisela více na inteligenci než na svalové síle, tradiční mocenské vztahy ztratily své opodstatnění. To zlepšilo zejména podmínky žen, protože sofistikované stroje vyžadovaly méně síly a více intelektu, což umožnilo sebevlastnictví všem bez ohledu na fyzickou sílu.
question: Millainen rooli teknisellä kehityksellä ja koneilla oli luvun mukaan sosiaalisten suhteiden muuttumisessa?
answer: Ne korvasivat raa'an voiman tuotannon keskeisenä elementtinä ja lopettivat fyysiseen voimaan perustuvan hallinnan
wrong_answers:
  - Ne lisäsivät fyysisen voiman ja sotilaallisen vallan merkitystä taloudellisessa toiminnassa
  - Ne vahvistivat perinteisiä hierarkioita tekemällä ruumiillisesta työstä arvokkaampaa kuin älyllisistä taidoista
  - Ne loivat uusia hallinnan muotoja, jotka perustuivat luonnonvarojen saatavuuteen ja maanomistukseen
explanation: |
  Luvussa selitetään, että kapitalismi edustaa teknistä edistystä, joka on korvannut raa'an voiman koneilla tuotannon keskeisenä tekijänä. Tämä muutos lopetti fyysiseen voimaan perustuvan herruuden ja suosi rauhanomaisia vaihtosuhteita. Kun tuottavuus riippui enemmän älystä kuin lihasvoimasta, perinteiset valtasuhteet menettivät oikeutuksensa. Tämä paransi erityisesti naisten asemaa, sillä kehittyneet koneet vaativat vähemmän voimaa ja enemmän älyä, mikä mahdollisti kaikkien itsensä omistamisen fyysisestä voimasta riippumatta.
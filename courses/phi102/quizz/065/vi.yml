question: Theo nội dung chương này, tiến bộ kỹ thuật và máy móc đã đóng vai trò gì trong việc chuyển đổi các mối quan hệ xã hội?
answer: Họ đã thay thế sức mạnh thô bạo làm yếu tố trung tâm của sản xuất, chấm dứt sự thống trị dựa trên sức mạnh thể chất.
wrong_answers:
  - Họ đã nâng cao tầm quan trọng của sức mạnh thể chất và sức mạnh quân sự trong các hoạt động kinh tế.
  - Họ củng cố các hệ thống phân cấp truyền thống bằng cách coi lao động chân tay có giá trị hơn kỹ năng trí tuệ.
  - Họ đã tạo ra những hình thức thống trị mới dựa trên quyền tiếp cận tài nguyên thiên nhiên và quyền sở hữu đất đai.
explanation: |
  Chương này giải thích rằng chủ nghĩa tư bản đại diện cho sự tiến bộ kỹ thuật, thay thế sức lao động chân tay bằng máy móc như yếu tố trung tâm của sản xuất. Sự chuyển đổi này đã chấm dứt sự thống trị dựa trên sức mạnh thể chất và thúc đẩy các mối quan hệ trao đổi hòa bình. Khi năng suất phụ thuộc nhiều hơn vào trí tuệ hơn là sức mạnh cơ bắp, các mối quan hệ quyền lực truyền thống mất đi tính chính đáng. Điều này đặc biệt cải thiện điều kiện sống của phụ nữ, vì máy móc hiện đại đòi hỏi ít sức mạnh hơn và nhiều trí tuệ hơn, cho phép tất cả mọi người tự làm chủ bất kể sức mạnh thể chất.
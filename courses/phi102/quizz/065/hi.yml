question: According to the chapter, what role did technical progress and machines play in transforming social relations?
answer: They replaced brute force as the central element of production, ending domination based on physical strength
wrong_answers:
  - They increased the importance of physical strength and military power in economic activities
  - They reinforced traditional hierarchies by making manual labor more valuable than intellectual skills
  - They created new forms of domination based on access to natural resources and land ownership
explanation: |
  The chapter explains that capitalism represents technical progress that substituted machines for brute force as the central element of production. This transformation ended domination based on physical power and favored peaceful exchange relationships. When productivity depended more on intelligence than muscular strength, traditional power relationships lost their justification. This particularly improved women's conditions, as sophisticated machines required less force and more intellect, enabling self-ownership for all regardless of physical strength.
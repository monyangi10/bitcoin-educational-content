question: Ni iterambere irihe ry’akahise ico canditswe kidondora ku bijanye n’igikorwa c’ubutunzi c’abantu kuva mu mibano ya kera gushika mu guhingura ibintu muri iki gihe?
answer: Amashirahamwe yarateye imbere kuva ku gukorakoranya ibintu ataco bimaze biciye mu guhigira, kuroba no gukoranya ibintu gushika ku kurema ibikoresho bishasha n’ibikorwa
wrong_answers:
  - Amashirahamwe yarateye imbere kuva ku burimyi bwo kwibeshaho ku giti cabo gushika ku guhingura ibintu vyinshi mu nganda no ku guhingura ibintu vyinshi .
  - Ibikorwa vy'abantu vyateye imbere kuva ku buryo bwo guhinduranya amafaranga gushika ku guhinduranya amafaranga, amaherezo gushika ku masoko y'ivy'ubutunzi asobanutse .
  - Iterambere ry'ubutunzi ryavuye mu kuba umutungo w'abanyagihugu rija mu mitungo y'abantu ku giti cabo hanyuma rija mu mibumbe y'amashirahamwe .
explanation: |
  Ico canditswe kidondora mu buryo bwihariye uguhingura nk’ukwigarurira mu mateka, kigasigura yuko imiryango y’abantu ya kera yari igarukiye ku kwegeranya ubutunzi bwariho biciye mu guhigira, kuroba no kwegeranya ata gikorwa gitoyi c’umwimbu gikora. Ihinduka ry’ingenzi ryari ukuva muri iyo nzira y’ugukoranya ibintu bitagira ico bikora, ivyo igisomwa gisobanura ko ari uguhingura ubuhinga bushasha no gutanga ibikorwa ku bandi canke ku muntu ubwiwe. Ivyo bigereranya uguhinduka kw’ishimikiro kuva ku kwimbura gusa ivyo kamere yatanze gushika ku kurema n’umwete agaciro n’akamaro bitabaho mbere.
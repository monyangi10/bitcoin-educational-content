question: 课文描述了人类经济活动从早期社会到现代生产的哪些历史进程？
answer: 社会从通过狩猎、捕鱼和采集进行被动采集发展到积极创造新的公用设施和服务
wrong_answers:
  - 社会从个体自给农作发展到大规模工业制造和批量生产
  - 人类活动从易货贸易系统发展到货币交换，并最终发展到复杂的金融市场
  - 经济发展从公有财产转向私有财产，再转向公司结构
explanation: |
  文中特别将生产描述为一种历史性的征服，解释了早期人类社会仅限于通过狩猎、捕鱼和采集收集现有资源，生产活动极少。关键的转变是从这种被动的采集转变为主动的生产，文中将主动生产定义为创造新的效用，为他人或自己提供服务。这代表了一种根本性的转变，即从简单地采集自然提供的资源转变为积极创造以前不存在的价值和效用。
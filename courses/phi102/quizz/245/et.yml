question: Kuidas nägid liberaalsed teoreetikud suhet tehnoloogilise arengu ja naiste emantsipatsiooni vahel kapitalistlikes ühiskondades?
answer: Tehnoloogia ja masinad võrdsustasid sugude tootmisvõimsuse, nihutades väärtuse füüsilise jõu asemel moraalsete ja intellektuaalsete vooruste poole
wrong_answers:
  - Tehnoloogia tõi kasu eelkõige meestele, luues tööstuslikke töökohti, mis jätsid naised tööjõust täielikult välja
  - "Tehnoloogiline areng mõjutas soolisi suhteid minimaalselt, naiste staatust mõjutasid eelkõige sotsiaalsed tavad"
  - Masinad tugevdasid traditsioonilisi soorolle, muutes kodutööd tõhusamaks ja hoides naisi kodus
explanation: |
  Esitatud liberaalse analüüsi kohaselt oli tehnoloogiline areng kapitalismi tingimustes naiste emantsipatsiooni jaoks otsustava tähtsusega. Tööriistad ja masinad andsid naistele tootmisvõimsuse, mis oli meestega võrdne või isegi parem, vähendades füüsilise jõu tähtsust, mis domineeris primitiivsetes ühiskondades. See muutus võimaldas ühiskonnal väärtustada rohkem püsivust ja moraalseid/intellektuaalseid omadusi. Teised valikud kujutavad seda suhet vääralt: tehnoloogia ei välistanud naisi, vaid andis neile rohkem võimalusi, sotsiaalsed tavad üksi ei olnud ilma majanduslike muutusteta piisavad ning selle asemel, et tugevdada koduseid rolle, vabastas tehnoloogia naised neist, pakkudes alternatiivseid tootmisvõimalusi.
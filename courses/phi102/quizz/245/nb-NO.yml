question: Hvordan så liberale teoretikere på forholdet mellom teknologisk utvikling og kvinnefrigjøring i kapitalistiske samfunn?
answer: Teknologi og maskiner utjevnet produksjonskapasiteten mellom kjønnene, og flyttet verdien fra fysisk styrke til moralske og intellektuelle dyder
wrong_answers:
  - Teknologien kom først og fremst menn til gode ved å skape industriarbeidsplasser som ekskluderte kvinner helt fra arbeidsstyrken
  - "Teknologiske fremskritt hadde minimal innvirkning på forholdet mellom kjønnene, og sosiale skikker var den viktigste drivkraften for kvinners status"
  - Maskiner forsterket de tradisjonelle kjønnsrollene ved å effektivisere husarbeidet og holde kvinnene hjemme
explanation: |
  Ifølge den liberale analysen som ble presentert, var den teknologiske utviklingen under kapitalismen avgjørende for kvinners frigjøring. Redskaper og maskiner ga kvinner like stor eller større produksjonskapasitet enn menn, og reduserte betydningen av fysisk styrke som hadde dominert i primitive samfunn. Dette skiftet gjorde det mulig for samfunnene å verdsette utholdenhet og moralske/intellektuelle egenskaper høyere. De andre alternativene gir en feilaktig fremstilling av dette forholdet: Teknologien ekskluderte ikke kvinner, men styrket dem, sosiale skikker alene var ikke tilstrekkelig uten økonomiske endringer, og i stedet for å forsterke huslige roller frigjorde teknologien kvinner fra dem ved å tilby alternative produksjonsmuligheter.
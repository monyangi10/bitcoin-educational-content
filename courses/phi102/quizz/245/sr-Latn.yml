question: Kako su liberalni teoretičari gledali na odnos između tehnološkog napretka i emancipacije žena u kapitalističkim društvima?
answer: Tehnologija i mašinerija izjednačile su proizvodne kapacitete između polova, preusmeravajući vrednost sa fizičke snage na moralne i intelektualne vrline.
wrong_answers:
  - Tehnologija je prvenstveno koristila muškarcima stvaranjem industrijskih poslova koji su u potpunosti isključivali žene iz radne snage.
  - "Tehnološki napredak imao je minimalan uticaj na rodne odnose, dok su društveni običaji bili glavni pokretač statusa žena"
  - Mašinerija je ojačala tradicionalne rodne uloge čineći kućne poslove efikasnijim i zadržavajući žene u domu.
explanation: |
  Prema liberalnoj analizi koja je predstavljena, tehnološki napredak pod kapitalizmom bio je ključan za emancipaciju žena. Alati i mašine su ženama dali proizvodne kapacitete jednake ili superiorne u odnosu na muškarce, smanjujući važnost fizičke snage koja je dominirala u primitivnim društvima. Ova promena je omogućila društvima da više cene istrajnost i moralne/intelektualne kvalitete. Druge opcije pogrešno predstavljaju ovaj odnos: tehnologija nije isključila žene već ih je osnažila, društveni običaji sami po sebi nisu bili dovoljni bez ekonomskih promena, i umesto da ojača domaće uloge, tehnologija je oslobodila žene od njih pružajući alternativne proizvodne mogućnosti.
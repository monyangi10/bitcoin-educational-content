question: Hur såg liberala teoretiker på förhållandet mellan tekniska framsteg och kvinnors frigörelse i kapitalistiska samhällen?
answer: Teknik och maskiner utjämnade produktionsförmågan mellan könen och flyttade värdet från fysisk styrka till moraliska och intellektuella dygder
wrong_answers:
  - Tekniken gynnade främst män genom att skapa industriella jobb som uteslöt kvinnor från arbetskraften helt och hållet
  - "Den tekniska utvecklingen hade minimal inverkan på relationerna mellan könen, och sociala sedvänjor var den främsta drivkraften bakom kvinnors ställning"
  - Maskinerna förstärkte de traditionella könsrollerna genom att effektivisera hushållsarbetet och hålla kvar kvinnorna i hemmet
explanation: |
  Enligt den liberala analys som presenteras var den tekniska utvecklingen under kapitalismen avgörande för kvinnans frigörelse. Verktyg och maskiner gav kvinnor lika stor eller större produktionskapacitet än män, vilket minskade betydelsen av fysisk styrka som hade dominerat i primitiva samhällen. Detta skifte gjorde det möjligt för samhällen att värdera uthållighet och moraliska/intellektuella egenskaper högre. De andra alternativen ger en felaktig bild av detta förhållande: tekniken uteslöt inte kvinnor utan stärkte dem, sociala sedvänjor var inte tillräckliga utan ekonomiska förändringar, och i stället för att förstärka hemmets roller befriade tekniken kvinnor från dem genom att erbjuda alternativa produktionsmöjligheter.
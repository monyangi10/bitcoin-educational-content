question: Wie sahen liberale Theoretiker die Beziehung zwischen technischem Fortschritt und der Emanzipation der Frauen in kapitalistischen Gesellschaften?
answer: Technologie und Maschinen glichen die Produktionskapazität zwischen den Geschlechtern an und verlagerten den Wert von körperlicher Kraft auf moralische und intellektuelle Tugenden
wrong_answers:
  - Die Technologie kam in erster Linie den Männern zugute, da sie industrielle Arbeitsplätze schuf, die Frauen vollständig aus dem Erwerbsleben ausschlossen
  - "Der technische Fortschritt hatte nur minimale Auswirkungen auf die Geschlechterbeziehungen, da die sozialen Gepflogenheiten den Status der Frauen in erster Linie bestimmten"
  - Maschinen verstärkten die traditionellen Geschlechterrollen, indem sie die Hausarbeit effizienter machten und die Frauen im Haus hielten
explanation: |
  Nach der vorgestellten liberalen Analyse war der technische Fortschritt im Kapitalismus entscheidend für die Emanzipation der Frauen. Werkzeuge und Maschinen verschafften den Frauen die gleiche oder eine höhere Produktionskapazität als den Männern und verringerten die Bedeutung der Körperkraft, die in primitiven Gesellschaften vorherrschte. Dieser Wandel ermöglichte es den Gesellschaften, Ausdauer und moralische/intellektuelle Qualitäten höher zu bewerten. Die anderen Optionen stellen diese Beziehung falsch dar: Die Technologie schloss Frauen nicht aus, sondern befähigte sie, soziale Bräuche allein reichten ohne wirtschaftliche Veränderungen nicht aus, und anstatt die häuslichen Rollen zu verstärken, befreite die Technologie die Frauen von ihnen, indem sie alternative Produktionsmöglichkeiten bot.
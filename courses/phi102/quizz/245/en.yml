question: How did liberal theorists view the relationship between technological advancement and women's emancipation in capitalist societies?
answer: Technology and machinery equalized productive capacity between genders, shifting value from physical strength to moral and intellectual virtues
wrong_answers:
  - Technology primarily benefited men by creating industrial jobs that excluded women from the workforce entirely
  - "Technological progress had minimal impact on gender relations, with social customs being the primary driver of women's status"
  - Machinery reinforced traditional gender roles by making domestic work more efficient and keeping women in the home
explanation: |
  According to the liberal analysis presented, technological advancement under capitalism was crucial for women's emancipation. Tools and machines gave women productive capacity equal or superior to men, reducing the importance of physical strength that had dominated primitive societies. This shift allowed societies to value perseverance and moral/intellectual qualities more highly. The other options misrepresent this relationship: technology didn't exclude women but empowered them, social customs alone weren't sufficient without economic changes, and rather than reinforcing domestic roles, technology liberated women from them by providing alternative productive opportunities.

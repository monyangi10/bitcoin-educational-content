question: Bagaimana para ahli teori liberal memandang hubungan antara kemajuan teknologi dan emansipasi perempuan dalam masyarakat kapitalis?
answer: Teknologi dan mesin menyetarakan kapasitas produktif antar gender, menggeser nilai dari kekuatan fisik menjadi kebajikan moral dan intelektual
wrong_answers:
  - Teknologi terutama menguntungkan laki-laki dengan menciptakan lapangan kerja industri yang sama sekali tidak melibatkan perempuan dalam angkatan kerja
  - "Kemajuan teknologi memiliki dampak minimal terhadap hubungan gender, dengan adat istiadat sosial sebagai pendorong utama status perempuan"
  - Mesin memperkuat peran gender tradisional dengan membuat pekerjaan rumah tangga menjadi lebih efisien dan membuat perempuan tetap berada di rumah
explanation: |
  Menurut analisis liberal yang disajikan, kemajuan teknologi di bawah kapitalisme sangat penting bagi emansipasi wanita. Alat dan mesin memberikan perempuan kapasitas produktif yang setara atau lebih tinggi daripada laki-laki, mengurangi pentingnya kekuatan fisik yang telah mendominasi masyarakat primitif. Pergeseran ini memungkinkan masyarakat untuk menghargai ketekunan dan kualitas moral/intelektual lebih tinggi. Pilihan lain salah menggambarkan hubungan ini: teknologi tidak mengucilkan perempuan tetapi memberdayakan mereka, adat istiadat sosial saja tidak cukup tanpa perubahan ekonomi, dan alih-alih memperkuat peran domestik, teknologi justru membebaskan perempuan dari peran tersebut dengan menyediakan peluang produktif alternatif.
question: Ni gute abahinga mu vy’uburenganzira bw’abantu babona isano riri hagati y’iterambere ry’ubuhinga n’ukwidegemvya kw’abagore mu bihugu vy’abanyagihugu?
answer: Ikoranabuhanga n’imashini vyatumye ubushobozi bwo gutanga umusaruro bungana hagati y’igitsina, bihindura agaciro kuva ku nkomezi z’umubiri gushika ku ngeso nziza zo mu vy’inyifato runtu no mu bwenge .
wrong_answers:
  - Ikoranabuhanga ryaragiriye akamaro canecane abagabo mu kurema akazi k’inganda katuma abagore badashobora gukora rwose .
  - "Iterambere ry'ubuhinga ryaragize ingaruka nke ku migenderanire y'igitsina, aho imigenzo yo mu kibano ari yo ituma abagore bagira ikibanza kinini"
  - Imashini zakomeje uruhara rw'igitsina rwa kera mu gutuma ibikorwa vyo mu rugo bigenda neza no kugumiza abagore mu rugo .
explanation: |
  Dushingiye ku nseguro y’ubwigenge yashikirijwe, ugutera imbere kw’ubuhinga mu gihe c’ubu kapitalizimu kwari guhambaye cane kugira ngo abagore bidegemvye. Ibikoresho n’amamashini vyatuma abagore bagira ubushobozi bwo gukora bungana canke burengeye ubw’abagabo, ivyo bikaba vyagabanya akamaro k’inkomezi z’umubiri zari ziganje mu mibano ya kera. Iryo hinduka ryatumye imibano iha agaciro cane ukwihangana n’ingeso z’inyifato runtu/ubwenge. Ayandi mahitamwo agaragaza nabi iyo nzira: ubuhinga ntibwakuye abagore ahubwo bwabahaye ububasha, imigenzo yo mu kibano yonyene ntiyari ihagije ata mahinduka mu vy’ubutunzi, kandi aho gukomeza uruhara rwo mu rugo, ubuhinga bwabohoye abagore muri bo mu gutanga ubundi buryo bwo gutanga umusaruro.
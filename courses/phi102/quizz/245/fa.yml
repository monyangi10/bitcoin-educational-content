question: نظریه‌پردازان لیبرال چگونه رابطه بین پیشرفت تکنولوژیکی و رهایی زنان در جوامع سرمایه‌داری را می‌دیدند؟
answer: فناوری و ماشین‌آلات ظرفیت تولیدی را بین جنسیت‌ها برابر کرد و ارزش را از قدرت فیزیکی به فضایل اخلاقی و فکری منتقل نمود.
wrong_answers:
  - فناوری عمدتاً به نفع مردان بود زیرا مشاغل صنعتی ایجاد کرد که زنان را به‌طور کامل از نیروی کار کنار گذاشت.
  - "پیشرفت فناوری تأثیر کمی بر روابط جنسیتی داشت و آداب و رسوم اجتماعی عامل اصلی وضعیت زنان بود"
  - ماشین‌آلات نقش‌های جنسیتی سنتی را تقویت کردند با کارآمدتر کردن کارهای خانگی و نگه‌داشتن زنان در خانه
explanation: |
  بر اساس تحلیل لیبرالی ارائه شده، پیشرفت تکنولوژیکی تحت سرمایه‌داری برای رهایی زنان بسیار مهم بود. ابزارها و ماشین‌ها به زنان ظرفیت تولیدی برابر یا برتر از مردان دادند و اهمیت قدرت فیزیکی که در جوامع ابتدایی غالب بود را کاهش دادند. این تغییر به جوامع اجازه داد تا پشتکار و ویژگی‌های اخلاقی/فکری را بیشتر ارزش‌گذاری کنند. گزینه‌های دیگر این رابطه را نادرست نشان می‌دهند: فناوری زنان را مستثنی نکرد بلکه به آن‌ها قدرت بخشید، آداب و رسوم اجتماعی به تنهایی بدون تغییرات اقتصادی کافی نبودند، و به جای تقویت نقش‌های خانگی، فناوری زنان را از آن‌ها آزاد کرد و فرصت‌های تولیدی جایگزین را فراهم کرد.
question: Liberal teorisyenler kapitalist toplumlarda teknolojik ilerleme ve kadınların özgürleşmesi arasındaki ilişkiye nasıl bakıyorlardı?
answer: Teknoloji ve makineler, üretim kapasitesini cinsiyetler arasında eşitledi ve değeri fiziksel güçten ahlaki ve entelektüel erdemlere kaydırdı
wrong_answers:
  - Teknoloji, kadınları işgücünden tamamen dışlayan endüstriyel işler yaratarak öncelikle erkeklere fayda sağladı
  - "Teknolojik ilerlemenin toplumsal cinsiyet ilişkileri üzerinde çok az etkisi olmuş, kadınların statüsünü belirleyen temel unsur toplumsal gelenekler olmuştur"
  - Makineler ev işlerini daha verimli hale getirerek ve kadınları evde tutarak geleneksel toplumsal cinsiyet rollerini pekiştirdi
explanation: |
  Sunulan liberal analize göre, kapitalizm altındaki teknolojik ilerleme kadınların özgürleşmesi için çok önemliydi. Aletler ve makineler kadınlara erkeklerle eşit ya da daha üstün üretkenlik kapasitesi sağlayarak ilkel toplumlarda hakim olan fiziksel gücün önemini azaltmıştır. Bu değişim, toplumların azim ve ahlaki/entelektüel niteliklere daha fazla değer vermesini sağlamıştır. Diğer seçenekler bu ilişkiyi yanlış yansıtmaktadır: teknoloji kadınları dışlamamış, aksine güçlendirmiştir, ekonomik değişiklikler olmadan sosyal gelenekler tek başına yeterli olmamıştır ve teknoloji ev içi rolleri pekiştirmek yerine alternatif üretken fırsatlar sunarak kadınları bu rollerden kurtarmıştır.
question: Comment les théoriciens libéraux ont-ils envisagé la relation entre le progrès technologique et l'émancipation des femmes dans les sociétés capitalistes ?
answer: La technologie et les machines ont permis d'égaliser les capacités de production entre les sexes, déplaçant la valeur de la force physique vers les vertus morales et intellectuelles
wrong_answers:
  - La technologie a principalement profité aux hommes en créant des emplois industriels qui excluaient totalement les femmes de la main-d'œuvre
  - Le progrès technologique n'a eu qu'un impact minime sur les relations entre les hommes et les femmes, les coutumes sociales étant le principal moteur du statut des femmes
  - Les machines ont renforcé les rôles traditionnels des hommes et des femmes en rendant le travail domestique plus efficace et en maintenant les femmes à la maison
explanation: |
  Selon l'analyse libérale présentée, les progrès technologiques réalisés dans le cadre du capitalisme ont joué un rôle crucial dans l'émancipation des femmes. Les outils et les machines ont donné aux femmes une capacité de production égale ou supérieure à celle des hommes, réduisant ainsi l'importance de la force physique qui avait dominé les sociétés primitives. Ce changement a permis aux sociétés de valoriser davantage la persévérance et les qualités morales et intellectuelles. Les autres options déforment cette relation : la technologie n'a pas exclu les femmes, mais leur a donné plus de pouvoir, les coutumes sociales n'étaient pas suffisantes sans changements économiques, et plutôt que de renforcer les rôles domestiques, la technologie a libéré les femmes de ces rôles en leur offrant d'autres possibilités de production.

question: Como é que os teóricos liberais encaravam a relação entre o avanço tecnológico e a emancipação das mulheres nas sociedades capitalistas?
answer: A tecnologia e a maquinaria igualaram a capacidade produtiva entre os géneros, deslocando o valor da força física para as virtudes morais e intelectuais
wrong_answers:
  - A tecnologia beneficiou principalmente os homens, criando empregos industriais que excluíram totalmente as mulheres da força de trabalho
  - "O progresso tecnológico teve um impacto mínimo nas relações de género, sendo os costumes sociais o principal motor do estatuto das mulheres"
  - A maquinaria reforçou os papéis tradicionais de género ao tornar o trabalho doméstico mais eficiente e ao manter as mulheres em casa
explanation: |
  De acordo com a análise liberal apresentada, o avanço tecnológico do capitalismo foi crucial para a emancipação das mulheres. As ferramentas e as máquinas conferiram às mulheres uma capacidade produtiva igual ou superior à dos homens, reduzindo a importância da força física que dominava as sociedades primitivas. Esta mudança permitiu que as sociedades valorizassem mais a perseverança e as qualidades morais/intelectuais. As outras opções deturpam esta relação: a tecnologia não excluiu as mulheres, mas deu-lhes poder, os costumes sociais por si só não foram suficientes sem mudanças económicas e, em vez de reforçar os papéis domésticos, a tecnologia libertou as mulheres deles, proporcionando-lhes oportunidades produtivas alternativas.
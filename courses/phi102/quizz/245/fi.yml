question: Miten liberaalit teoreetikot suhtautuivat teknologian kehityksen ja naisten emansipaation väliseen suhteeseen kapitalistisissa yhteiskunnissa?
answer: Teknologia ja koneet tasoittivat sukupuolten välisen tuotantokyvyn, jolloin arvo siirtyi fyysisestä voimasta moraalisiin ja älyllisiin hyveisiin
wrong_answers:
  - Teknologia hyödytti ensisijaisesti miehiä luomalla teollisia työpaikkoja, jotka sulkivat naiset kokonaan työvoiman ulkopuolelle
  - "Teknologisella kehityksellä oli minimaalinen vaikutus sukupuolten välisiin suhteisiin, ja sosiaaliset tavat olivat ensisijainen tekijä naisten aseman määrittelyssä."
  - Koneet vahvistivat perinteisiä sukupuolirooleja tehostamalla kotitöitä ja pitämällä naiset kotona
explanation: |
  Esitetyn liberaalin analyysin mukaan kapitalismin aikainen teknologinen kehitys oli ratkaisevan tärkeää naisten emansipaation kannalta. Työkalut ja koneet antoivat naisille yhtä suuren tai paremman tuotantokapasiteetin kuin miehille, mikä vähensi fyysisen voiman merkitystä, joka oli hallinnut alkukantaisia yhteiskuntia. Tämä muutos mahdollisti sen, että yhteiskunnissa arvostettiin enemmän sinnikkyyttä ja moraalisia/älyllisiä ominaisuuksia. Muut vaihtoehdot vääristelevät tätä suhdetta: teknologia ei sulkenut naisia pois vaan voimaannutti heitä, sosiaaliset tavat eivät yksin riittäneet ilman taloudellisia muutoksia, ja sen sijaan, että teknologia olisi vahvistanut kotirooleja, se vapautti naiset niistä tarjoamalla vaihtoehtoisia tuotantomahdollisuuksia.
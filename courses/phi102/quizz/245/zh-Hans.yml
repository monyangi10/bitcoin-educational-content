question: 自由主义理论家如何看待资本主义社会中技术进步与妇女解放之间的关系？
answer: 技术和机械使两性之间的生产能力平等，价值从体力转向道德和智力美德
wrong_answers:
  - 技术主要造福于男性，它创造了工业岗位，将女性完全排除在劳动力之外
  - "技术进步对两性关系的影响微乎其微，社会习俗是妇女地位的主要驱动力"
  - 机械提高了家务劳动的效率，使妇女留在家中，从而强化了传统的性别角色
explanation: |
  根据所提出的自由主义分析，资本主义下的技术进步对妇女解放至关重要。工具和机器赋予了妇女与男性同等或更高的生产能力，降低了原始社会中体力的重要性。这种转变使得社会更加重视毅力和道德/智力品质。其他选项歪曲了这种关系：技术并没有排斥妇女，而是赋予了她们权力；如果没有经济变革，仅靠社会习俗是不够的；技术并没有强化家庭角色，而是通过提供其他生产机会将妇女从家庭角色中解放出来。
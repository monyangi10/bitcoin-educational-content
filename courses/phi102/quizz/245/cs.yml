question: Jak se liberální teoretici dívali na vztah mezi technologickým pokrokem a emancipací žen v kapitalistických společnostech?
answer: Technologie a stroje zrovnoprávnily produktivní schopnosti obou pohlaví a přesunuly hodnotu z fyzické síly na morální a intelektuální ctnosti
wrong_answers:
  - Technologie přinášela prospěch především mužům, protože vytvářela průmyslová pracovní místa, která ženy zcela vylučovala z pracovní síly
  - "Technologický pokrok měl minimální dopad na vztahy mezi muži a ženami, přičemž hlavní roli v postavení žen hrály společenské zvyklosti."
  - Stroje posilovaly tradiční genderové role tím, že zefektivňovaly domácí práce a udržovaly ženy v domácnosti
explanation: |
  Podle předložené liberální analýzy byl technologický pokrok v kapitalismu pro emancipaci žen klíčový. Nástroje a stroje poskytly ženám stejnou nebo vyšší výrobní kapacitu než mužům, čímž se snížil význam fyzické síly, která dominovala v primitivních společnostech. Tento posun umožnil společnostem více oceňovat vytrvalost a morální/intelektuální vlastnosti. Ostatní možnosti tento vztah zkreslují: technologie ženy nevylučovala, ale posilovala, samotné společenské zvyklosti bez ekonomických změn nestačily a technologie spíše než posilování domácích rolí ženy od nich osvobozovala tím, že jim poskytovala alternativní výrobní příležitosti.
question: Co podle textu v zásadě představuje zákon nabídky a poptávky?
answer: Vyjádření vlivu svobody na lidské jednání
wrong_answers:
  - Vládní regulace, která kontroluje tržní ceny
  - Umělý ekonomický konstrukt vytvořený kapitalismem
  - Nástroj, který firmy používají k manipulaci se spotřebiteli
explanation: |
  Text vysvětluje, že zákon nabídky a poptávky je pouze vyjádřením toho, jak svoboda ovlivňuje lidské chování. Když se ceny zvyšují, lidé přirozeně snižují svou poptávku - to je univerzální lidská reakce, kterou nelze odstranit vládním nařízením. Špatné odpovědi nesprávně naznačují, že jde buď o výtvor vlády, umělý konstrukt, nebo nástroj manipulace, zatímco ve skutečnosti jde o přirozený důsledek toho, jak svobodní lidé reagují na měnící se ekonomické podmínky.
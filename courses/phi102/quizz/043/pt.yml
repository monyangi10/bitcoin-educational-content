question: De acordo com o texto, o que é que a lei da oferta e da procura representa fundamentalmente?
answer: A expressão dos efeitos da liberdade nas acções humanas
wrong_answers:
  - Uma regulamentação governamental que controla os preços de mercado
  - Uma construção económica artificial criada pelo capitalismo
  - Uma ferramenta utilizada pelas empresas para manipular os consumidores
explanation: |
  O texto explica que a lei da oferta e da procura é simplesmente a expressão da forma como a liberdade afecta o comportamento humano. Quando os preços aumentam, as pessoas reduzem naturalmente a sua procura - esta é uma resposta humana universal que não pode ser eliminada por decreto governamental. As respostas erradas sugerem incorretamente que se trata de uma criação do governo, de uma construção artificial ou de um instrumento de manipulação, quando na realidade é uma consequência natural da forma como os indivíduos livres respondem às mudanças das condições económicas.
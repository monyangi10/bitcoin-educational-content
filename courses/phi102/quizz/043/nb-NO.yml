question: Hva er det grunnleggende i loven om tilbud og etterspørsel, ifølge teksten?
answer: Uttrykket for frihetens innvirkning på menneskelige handlinger
wrong_answers:
  - En statlig regulering som kontrollerer markedsprisene
  - En kunstig økonomisk konstruksjon skapt av kapitalismen
  - Et verktøy som brukes av bedrifter for å manipulere forbrukere
explanation: |
  Teksten forklarer at loven om tilbud og etterspørsel rett og slett er et uttrykk for hvordan frihet påvirker menneskelig atferd. Når prisene øker, vil folk naturlig nok redusere etterspørselen - dette er en universell menneskelig respons som ikke kan elimineres av myndighetene. De gale svarene antyder feilaktig at loven enten er skapt av myndighetene, en kunstig konstruksjon eller et manipulasjonsverktøy, mens den i virkeligheten er en naturlig konsekvens av hvordan frie individer reagerer på skiftende økonomiske forhold.
question: Kulingana na maandishi, sheria ya ugavi na mahitaji inawakilisha nini kimsingi?
answer: Usemi wa athari za uhuru kwenye matendo ya binadamu
wrong_answers:
  - Kanuni ya serikali inayodhibiti bei za soko
  - Muundo bandia wa kiuchumi ulioundwa na ubepari
  - Chombo kinachotumiwa na biashara kuwadanganya watumiaji
explanation: |
  Maandishi yanaelezea kwamba sheria ya ugavi na mahitaji ni usemi tu wa jinsi uhuru unavyoathiri tabia ya binadamu. Bei zinapoongezeka, watu hupunguza mahitaji yao kwa kawaida - hii ni mwitikio wa kibinadamu wa ulimwengu wote ambao hauwezi kuondolewa kwa amri ya serikali. Majibu yasiyo sahihi yanaonyesha kimakosa kuwa ni uumbaji wa serikali, muundo bandia, au kifaa cha kudanganya, wakati kwa kweli ni matokeo ya asili ya jinsi watu huru wanavyoitikia mabadiliko ya hali ya kiuchumi.
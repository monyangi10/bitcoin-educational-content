question: Según el texto, ¿qué representa fundamentalmente la ley de la oferta y la demanda?
answer: La expresión de los efectos de la libertad en las acciones humanas
wrong_answers:
  - Una normativa gubernamental que controla los precios del mercado
  - Una construcción económica artificial creada por el capitalismo
  - Una herramienta utilizada por las empresas para manipular a los consumidores
explanation: |
  El texto explica que la ley de la oferta y la demanda es simplemente la expresión de cómo la libertad afecta al comportamiento humano. Cuando los precios suben, la gente reduce su demanda de forma natural: se trata de una respuesta humana universal que no puede eliminarse por decreto gubernamental. Las respuestas incorrectas sugieren erróneamente que es una creación del gobierno, una construcción artificial o una herramienta de manipulación, cuando en realidad es una consecuencia natural de cómo los individuos libres responden a las cambiantes condiciones económicas.
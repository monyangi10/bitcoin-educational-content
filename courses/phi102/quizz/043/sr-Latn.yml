question: Prema tekstu, šta zakon ponude i potražnje suštinski predstavlja?
answer: Izražavanje efekata slobode na ljudske postupke
wrong_answers:
  - Vladina regulativa koja kontroliše tržišne cene
  - Veštačka ekonomska konstrukcija stvorena kapitalizmom
  - Alat koji koriste preduzeća za manipulaciju potrošačima
explanation: |
  Tekst objašnjava da je zakon ponude i potražnje jednostavno izraz kako sloboda utiče na ljudsko ponašanje. Kada cene rastu, ljudi prirodno smanjuju svoju potražnju - ovo je univerzalni ljudski odgovor koji se ne može eliminisati vladinim dekretom. Pogrešni odgovori netačno sugerišu da je to ili vladina tvorevina, veštačka konstrukcija, ili alat za manipulaciju, dok je u stvarnosti to prirodna posledica kako slobodni pojedinci reaguju na promene ekonomskih uslova.
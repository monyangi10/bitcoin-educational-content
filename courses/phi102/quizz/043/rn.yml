question: Dukurikije ico canditswe, itegeko ry’ugutanga n’ugusaba rigereranya iki mu vy’ukuri?
answer: Invugo y'ingaruka z'umwidegemvyo ku bikorwa vya muntu
wrong_answers:
  - Itegeko rya Leta rigenzura ibiciro vy'isoko
  - Ubutunzi bukozwe n'abantu bwakozwe n'ubu kapitalizimu
  - Igikoresho gikoreshwa n'ubucuruzi mu guhenda abaguzi
explanation: |
  Ico canditswe kirasigura ko itegeko ry’ugutanga n’ugusaba ari insiguro gusa y’ingene umwidegemvyo ugira ico ukoze ku nyifato y’umuntu. Iyo ibiciro vyiyongereye, abantu mu bisanzwe baragabanya ivyo basaba - iyo ni inyishu y’abantu bose idashobora gukurwaho n’itegeko rya Leta. Inyishu zitari zo zivuga nabi ko ari ikintu Leta yaremye, ikintu umuntu yubatse, canke igikoresho co gukoresha abantu, mu gihe mu vy’ukuri ari ingaruka z’ingene abantu bidegemvya bishura ku mice y’ubutunzi ihinduka.
question: Mitä kysynnän ja tarjonnan laki pohjimmiltaan edustaa tekstin mukaan?
answer: Ilmaisu vapauden vaikutuksista ihmisen toimintaan
wrong_answers:
  - Markkinahintoja säätelevä valtion asetus
  - Kapitalismin luoma keinotekoinen taloudellinen konstruktio
  - Yritysten käyttämä väline kuluttajien manipuloimiseksi
explanation: |
  Tekstissä selitetään, että kysynnän ja tarjonnan laki on yksinkertaisesti ilmaus siitä, miten vapaus vaikuttaa ihmisten käyttäytymiseen. Kun hinnat nousevat, ihmiset luonnollisesti vähentävät kysyntäänsä - tämä on yleismaailmallinen inhimillinen reaktio, jota ei voida poistaa hallituksen määräyksellä. Väärissä vastauksissa annetaan virheellisesti ymmärtää, että se on joko hallituksen luomus, keinotekoinen konstruktio tai manipulointiväline, vaikka todellisuudessa se on luonnollinen seuraus siitä, miten vapaat yksilöt reagoivat muuttuviin taloudellisiin olosuhteisiin.
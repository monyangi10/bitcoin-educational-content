question: Mida kujutab pakkumise ja nõudluse seadus teksti kohaselt põhimõtteliselt endast?
answer: Vabaduse mõju väljendamine inimtegevusele
wrong_answers:
  - Valitsuse määrus, mis kontrollib turuhindu
  - Kapitalismi poolt loodud kunstlik majanduslik konstruktsioon
  - Ettevõtete poolt tarbijate manipuleerimiseks kasutatav vahend
explanation: |
  Tekstis selgitatakse, et pakkumise ja nõudluse seadus on lihtsalt selle väljendus, kuidas vabadus mõjutab inimeste käitumist. Kui hinnad tõusevad, vähendavad inimesed loomulikult oma nõudlust - see on universaalne inimreaktsioon, mida ei saa valitsuse käsuga kõrvaldada. Valed vastused viitavad ekslikult sellele, et tegemist on kas valitsuse loominguga, kunstliku konstruktsiooniga või manipuleerimisvahendiga, kuigi tegelikult on see loomulik tagajärg sellele, kuidas vabad inimesed reageerivad muutuvatele majandustingimustele.
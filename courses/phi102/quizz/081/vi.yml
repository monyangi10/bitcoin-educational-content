question: Sự phát triển kinh tế nào đã tạo điều kiện cho sự xuất hiện của các mối quan hệ hợp đồng dựa trên sự thỏa thuận lẫn nhau thay vì cưỡng bức?
answer: Sự ra đời của nông nghiệp và khả năng tích lũy thặng dư
wrong_answers:
  - Sự phát minh ra động cơ hơi nước và máy móc công nghiệp
  - Việc khám phá ra các lục địa mới và sự mở rộng thị trường.
  - Việc thành lập các phường hội và độc quyền thương mại
explanation: |
  Nông nghiệp là bước ngoặt quan trọng cho phép các xã hội vượt qua giai đoạn sống dựa vào tự cung tự cấp. Bằng cách tạo điều kiện cho việc tích lũy sản lượng thặng dư, nông nghiệp đã tạo ra nền tảng vật chất cho thương mại hòa bình và trao đổi tự nguyện. Lượng thặng dư này có nghĩa là con người có thể chuyên môn hóa vào các hoạt động khác nhau và giao dịch với nhau dựa trên lợi ích chung chứ không phải vì nhu cầu sinh tồn hay ép buộc. Các lựa chọn khác, mặc dù có ý nghĩa lịch sử, xuất hiện muộn hơn nhiều trong quá trình phát triển của loài người và được xây dựng trên nền tảng nông nghiệp, vốn là nền tảng đầu tiên tạo điều kiện cho các mối quan hệ hợp đồng.
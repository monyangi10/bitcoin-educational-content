question: Minkälainen taloudellinen kehitys mahdollisti sellaisten sopimussuhteiden syntymisen, jotka perustuvat pikemminkin keskinäiseen sopimukseen kuin pakottamiseen?
answer: Maatalouden synty ja kyky kerätä ylijäämää
wrong_answers:
  - Höyrykoneen ja teollisuuskoneiden keksiminen
  - Uusien maanosien löytäminen ja markkinoiden laajentuminen
  - Kiltojen ja kauppamonopolien perustaminen
explanation: |
  Maatalous oli ratkaiseva käännekohta, joka mahdollisti yhteiskuntien siirtymisen omavaraista elämää pidemmälle. Mahdollistamalla ylijäämätuotannon kertymisen maatalous loi aineellisen perustan rauhanomaiselle kaupalle ja vapaaehtoiselle vaihdolle. Tämä ylijäämä merkitsi sitä, että ihmiset saattoivat erikoistua eri toimintoihin ja käydä kauppaa keskenään pikemminkin keskinäisen hyödyn kuin selviytymistarpeen tai pakon perusteella. Vaikka muut vaihtoehdot ovatkin historiallisesti merkittäviä, ne tulivat esiin vasta paljon myöhemmin ihmiskunnan kehityksessä, ja ne rakentuivat maatalouden perustalle, joka mahdollisti ensin sopimussuhteet.
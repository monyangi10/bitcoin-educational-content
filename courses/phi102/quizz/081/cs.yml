question: Jaký ekonomický vývoj umožnil vznik smluvních vztahů založených na vzájemné dohodě, nikoli na síle?
answer: Vznik zemědělství a schopnost akumulovat přebytky
wrong_answers:
  - Vynález parního stroje a průmyslových strojů
  - Objevování nových kontinentů a rozšiřování trhů
  - Zakládání cechů a obchodních monopolů
explanation: |
  Zemědělství bylo zásadním zlomem, který umožnil společnostem překročit rámec samozásobitelství. Zemědělství umožnilo hromadění nadprodukce a vytvořilo materiální základ pro mírový obchod a dobrovolnou výměnu. Tento přebytek znamenal, že se lidé mohli specializovat na různé činnosti a obchodovat mezi sebou na základě vzájemného prospěchu, nikoliv nutnosti přežít nebo násilí. Ostatní možnosti, i když historicky významné, přišly mnohem později ve vývoji lidstva a stavěly na zemědělském základu, který nejprve umožnil smluvní vztahy.
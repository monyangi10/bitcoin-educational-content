question: Quale sviluppo economico ha permesso l'emergere di relazioni contrattuali basate sull'accordo reciproco piuttosto che sulla forza?
answer: La nascita dell'agricoltura e la capacità di accumulare surplus
wrong_answers:
  - L'invenzione della macchina a vapore e dei macchinari industriali
  - La scoperta di nuovi continenti e l'espansione dei mercati
  - L'istituzione di corporazioni e monopoli commerciali
explanation: |
  L'agricoltura è stata il punto di svolta cruciale che ha permesso alle società di andare oltre la vita di sussistenza. Consentendo l'accumulo di produzione in eccesso, l'agricoltura ha creato le basi materiali per il commercio pacifico e gli scambi volontari. Questo surplus ha permesso alle persone di specializzarsi in diverse attività e di commerciare tra loro sulla base del reciproco vantaggio piuttosto che della necessità di sopravvivenza o della forza. Le altre opzioni, pur essendo storicamente significative, sono arrivate molto più tardi nello sviluppo umano e si sono sviluppate sulla base dell'agricoltura che per prima ha reso possibili le relazioni contrattuali.
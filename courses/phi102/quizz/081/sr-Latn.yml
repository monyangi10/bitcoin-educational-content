question: Koji ekonomski razvoj je omogućio pojavu ugovornih odnosa zasnovanih na međusobnom dogovoru, a ne na sili?
answer: Rođenje poljoprivrede i sposobnost akumulacije viškova
wrong_answers:
  - Pronalaženje parne mašine i industrijskih mašina
  - Otkrivanje novih kontinenata i širenje tržišta
  - Osnivanje cehova i trgovinskih monopola
explanation: |
  Poljoprivreda je bila ključna prekretnica koja je omogućila društvima da pređu izvan života na rubu egzistencije. Omogućavanjem akumulacije viška proizvodnje, poljoprivreda je stvorila materijalnu osnovu za mirnu trgovinu i dobrovoljne razmene. Ovaj višak je značio da su ljudi mogli da se specijalizuju u različitim aktivnostima i trguju jedni s drugima na osnovu obostrane koristi, a ne iz nužde za preživljavanjem ili sile. Druge opcije, iako istorijski značajne, pojavile su se mnogo kasnije u ljudskom razvoju i izgrađene su na poljoprivrednoj osnovi koja je prva omogućila ugovorne odnose.
question: Milline majanduslik areng võimaldas tekkida lepingulistel suhetel, mis põhinevad pigem vastastikusel kokkuleppel kui jõul?
answer: Põllumajanduse sünd ja võime koguda ülejääke
wrong_answers:
  - Aurumasinate ja tööstuslike masinate leiutamine
  - Uute kontinentide avastamine ja turgude laienemine
  - Gildide ja kaubandusmonopolide loomine
explanation: |
  Põllumajandus oli otsustav pöördepunkt, mis võimaldas ühiskonnal väljuda elatusvajadusest. Võimaldades üleliigse toodangu kogumist, lõi põllumajandus materiaalse aluse rahumeelsele kaubandusele ja vabatahtlikule vahetusele. See ülejääk tähendas, et inimesed võisid spetsialiseeruda erinevatele tegevustele ja kaubelda üksteisega pigem vastastikuse kasu kui ellujäämisvajaduse või jõu alusel. Teised võimalused, kuigi ajalooliselt olulised, tulid inimkonna arengus palju hiljem ja tuginesid põllumajanduslikule alusele, mis esmalt tegi lepingulised suhted võimalikuks.
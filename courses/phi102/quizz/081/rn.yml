question: Ni iterambere irihe ry’ubutunzi ryatumye habaho ubucuti bw’amasezerano bushingiye ku kwumvikana aho gushingira ku nguvu?
answer: Ivuka ry'uburimyi n'ubushobozi bwo kwirundanira amasaranganya .
wrong_answers:
  - Uguhingura moteri y'umwotsi n'imashini z'inganda
  - Kuvumbura imigabane mishasha no kwagura amasoko
  - Gushinga amashirahamwe n'ubudandaji
explanation: |
  Ubuhinzi ni bwo bwari ikintu gihambaye cane catumye imibano ishobora kurenga ubuzima bwo kwibeshaho. Mu gutuma habaho ukwirundanira umusaruro w’amasaranganya, uburimyi bwatumye haba umushinge w’ivy’umubiri wo gucuruza mu mahoro no guhanahana amakuru ku bushake. Ivyo birengeye vyasobanura ko abantu bashobora kwimenyereza ibikorwa bitandukanye no gucuruzanya bishingiye ku nyungu rusangi aho gushingira ku nkenerwa zo kurokoka canke ku nguvu. Ibindi bihitamwo, naho vyari bihambaye mu mateka, vyaje mu nyuma cane mu gutera imbere kw’abantu kandi vyubatswe ku mushinge w’uburimyi wa mbere watumye imigenderanire y’amasezerano ishoboka.
question: 是什麼經濟發展使得基於相互協議而非武力的契約關係得以出現？
answer: 農業的誕生與累積盈餘的能力
wrong_answers:
  - 蒸汽機和工業機械的發明
  - 新大陸的發現和市場的擴張
  - 行會和貿易壟斷的建立
explanation: |
  農業是關鍵的轉捩點，讓社會超越僅能糊口的生活。農業使生產盈餘得以累積，為和平貿易和自願交流創造了物質基礎。這些盈餘意味著人們可以專門從事不同的活動，並在互惠互利的基礎上進行貿易，而不是為了生存的需要或強迫。其他選擇雖然在歷史上很重要，但在人類發展中來得更晚，而且是建立在農業基礎之上，而農業基礎首先使合約關係成為可能。
question: Кое икономическо развитие е позволило появата на договорни отношения, основани на взаимно съгласие, а не на сила?
answer: Раждането на земеделието и възможността за натрупване на излишъци
wrong_answers:
  - Изобретяването на парната машина и промишлените машини
  - Откриване на нови континенти и разширяване на пазарите
  - Създаване на гилдии и търговски монополи
explanation: |
  Земеделието е решаващият поврат, който позволява на обществата да излязат извън рамките на препитанието. Позволявайки натрупването на излишъци от продукция, земеделието създава материалната основа за мирна търговия и доброволен обмен. Този излишък означаваше, че хората могат да се специализират в различни дейности и да търгуват помежду си въз основа на взаимна изгода, а не на необходимостта от оцеляване или на сила. Другите варианти, макар и исторически значими, се появяват много по-късно в човешкото развитие и се основават на земеделската основа, която за първи път прави възможни договорните отношения.
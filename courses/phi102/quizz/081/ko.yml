question: 어떤 경제 발전이 강제가 아닌 상호 합의에 기반한 계약 관계의 출현을 가능하게 했나요?
answer: 농업의 탄생과 잉여를 축적하는 능력
wrong_answers:
  - 증기 기관과 산업 기계의 발명
  - 새로운 대륙의 발견과 시장 확장
  - 길드 및 무역 독점 설립
explanation: |
  농업은 한 사회가 생존을 넘어서는 중요한 전환점이었습니다. 농업은 잉여 생산물의 축적을 가능하게 함으로써 평화로운 무역과 자발적인 교류를 위한 물질적 토대를 마련했습니다. 이러한 잉여는 사람들이 생존의 필요성이나 강압이 아닌 상호 이익을 바탕으로 다양한 활동을 전문화하고 서로 교역할 수 있음을 의미했습니다. 다른 옵션은 역사적으로 중요하지만 인류의 발전 과정에서 훨씬 늦게 등장했으며, 계약 관계를 가능하게 한 농업적 토대 위에 구축되었습니다.
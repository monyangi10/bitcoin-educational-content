question: Perkembangan ekonomi apa yang memungkinkan munculnya hubungan kontraktual yang didasarkan pada kesepakatan bersama dan bukan paksaan?
answer: Kelahiran pertanian dan kemampuan untuk mengakumulasi surplus
wrong_answers:
  - Penemuan mesin uap dan mesin industri
  - Penemuan benua baru dan perluasan pasar
  - Pembentukan serikat pekerja dan monopoli perdagangan
explanation: |
  Pertanian adalah titik balik penting yang memungkinkan masyarakat untuk bergerak melampaui kehidupan subsisten. Dengan memungkinkan akumulasi surplus produksi, pertanian menciptakan fondasi material untuk perdagangan damai dan pertukaran sukarela. Surplus ini berarti orang dapat berspesialisasi dalam berbagai kegiatan dan berdagang satu sama lain berdasarkan keuntungan bersama, bukan karena kebutuhan untuk bertahan hidup atau paksaan. Pilihan-pilihan lain, meskipun secara historis penting, muncul belakangan dalam perkembangan manusia dan dibangun di atas fondasi pertanian yang pertama kali memungkinkan adanya hubungan kontrak.
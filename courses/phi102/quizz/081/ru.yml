question: Какое экономическое развитие способствовало возникновению договорных отношений, основанных на взаимном согласии, а не на силе?
answer: Зарождение сельского хозяйства и возможность накапливать излишки
wrong_answers:
  - Изобретение парового двигателя и промышленного оборудования
  - Открытие новых континентов и расширение рынков сбыта
  - Создание гильдий и торговых монополий
explanation: |
  Сельское хозяйство стало тем переломным моментом, который позволил обществу выйти за рамки натурального хозяйства. Позволяя накапливать излишки продукции, сельское хозяйство создало материальную основу для мирной торговли и добровольных обменов. Этот избыток означал, что люди могли специализироваться на разных видах деятельности и торговать друг с другом на основе взаимной выгоды, а не необходимости выживания или силы. Другие варианты, хотя и имеют историческое значение, появились гораздо позже в развитии человечества и основывались на сельскохозяйственной базе, которая впервые сделала возможными договорные отношения.
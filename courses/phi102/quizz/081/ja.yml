question: 力ではなく、相互の合意に基づく契約関係の出現を可能にしたのは、どのような経済発展だったのだろうか？
answer: 農業の誕生と余剰蓄積能力
wrong_answers:
  - 蒸気機関と産業機械の発明
  - 新大陸の発見と市場の拡大
  - ギルドと貿易独占の確立
explanation: |
  農業は、社会が自給自足の生活を超えることを可能にする決定的な転換点であった。余剰生産物の蓄積を可能にすることで、農業は平和的な交易と自発的な交換のための物質的基盤を作り出した。この余剰は、人々がさまざまな活動に特化し、生存の必要性や力ではなく、相互利益に基づいて互いに取引できることを意味した。他の選択肢は、歴史的に重要なものではあるが、人類の発展においてずっと後に生まれたものであり、契約関係を最初に可能にした農業の基盤の上に築かれたものである。
question: Welche wirtschaftliche Entwicklung ermöglichte die Entstehung von Vertragsbeziehungen, die auf gegenseitigem Einverständnis und nicht auf Zwang beruhen?
answer: Die Entstehung der Landwirtschaft und die Fähigkeit, Überschüsse anzuhäufen
wrong_answers:
  - Die Erfindung der Dampfmaschine und der Industriemaschinen
  - Die Entdeckung neuer Kontinente und die Ausweitung der Märkte
  - Die Gründung von Zünften und Handelsmonopolen
explanation: |
  Die Landwirtschaft war der entscheidende Wendepunkt, der es den Gesellschaften ermöglichte, über das Subsistenzleben hinauszugehen. Indem sie die Anhäufung von Produktionsüberschüssen ermöglichte, schuf die Landwirtschaft die materielle Grundlage für friedlichen Handel und freiwilligen Tausch. Dieser Überschuss bedeutete, dass sich die Menschen auf verschiedene Tätigkeiten spezialisieren und miteinander Handel treiben konnten, der auf gegenseitigem Nutzen und nicht auf Überlebensnotwendigkeit oder Zwang beruhte. Die anderen Optionen sind zwar historisch bedeutsam, kamen aber erst viel später in der menschlichen Entwicklung auf und bauten auf der landwirtschaftlichen Grundlage auf, die vertragliche Beziehungen erst möglich machte.
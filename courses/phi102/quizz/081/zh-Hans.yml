question: 是什么经济发展促成了基于相互协议而非武力的契约关系的出现？
answer: 农业的诞生和积累盈余的能力
wrong_answers:
  - 蒸汽机和工业机械的发明
  - 发现新大陆，拓展新市场
  - 行会和贸易垄断的建立
explanation: |
  农业是社会超越自给自足生活的关键转折点。通过积累剩余产品，农业为和平贸易和自愿交换奠定了物质基础。这种剩余意味着人们可以专门从事不同的活动，并在互惠互利的基础上进行贸易，而不是为了生存或武力。其他选择虽然具有重要的历史意义，但在人类发展过程中出现的时间要晚得多，而且是建立在农业基础之上，而农业基础首先使契约关系成为可能。
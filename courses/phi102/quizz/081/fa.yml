question: چه توسعه اقتصادی امکان ظهور روابط قراردادی مبتنی بر توافق متقابل به جای زور را فراهم کرد؟
answer: تولد کشاورزی و توانایی انباشت مازاد
wrong_answers:
  - اختراع موتور بخار و ماشین‌آلات صنعتی
  - کشف قاره‌های جدید و گسترش بازارها
  - ایجاد اصناف و انحصارات تجاری
explanation: |
  کشاورزی نقطه عطف مهمی بود که به جوامع اجازه داد فراتر از زندگی معیشتی حرکت کنند. با امکان انباشت تولید مازاد، کشاورزی پایه مادی برای تجارت صلح‌آمیز و مبادلات داوطلبانه ایجاد کرد. این مازاد به این معنا بود که مردم می‌توانستند در فعالیت‌های مختلف تخصص پیدا کنند و بر اساس منافع متقابل به جای ضرورت بقا یا اجبار با یکدیگر تجارت کنند. گزینه‌های دیگر، اگرچه از نظر تاریخی مهم هستند، اما بسیار دیرتر در توسعه انسانی ظاهر شدند و بر پایه کشاورزی که اولین بار روابط قراردادی را ممکن ساخت، بنا شدند.
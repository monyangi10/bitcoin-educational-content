question: Ni maendeleo gani ya kiuchumi yaliyowezesha kuibuka kwa mahusiano ya kimkataba yanayotegemea makubaliano ya pande zote badala ya nguvu?
answer: Kuzaliwa kwa kilimo na uwezo wa kukusanya ziada
wrong_answers:
  - Uvumbuzi wa injini ya mvuke na mitambo ya viwandani
  - Ugunduzi wa mabara mapya na upanuzi wa masoko
  - Kuanzishwa kwa vyama vya ushirika na ukiritimba wa biashara
explanation: |
  Kilimo kilikuwa hatua muhimu ya mabadiliko ambayo yaliruhusu jamii kusonga mbele zaidi ya maisha ya kujikimu. Kwa kuwezesha mkusanyiko wa uzalishaji wa ziada, kilimo kiliunda msingi wa mali kwa biashara ya amani na ubadilishanaji wa hiari. Ziada hii ilimaanisha kuwa watu wangeweza utaalamu katika shughuli tofauti na kufanya biashara kati yao kulingana na manufaa ya pande zote badala ya ulazima wa kuishi au nguvu. Chaguzi zingine, ingawa zilikuwa muhimu kihistoria, zilikuja baadaye sana katika maendeleo ya binadamu na zilijengwa juu ya msingi wa kilimo ambao kwanza ulifanya mahusiano ya kimkataba yawezekane.
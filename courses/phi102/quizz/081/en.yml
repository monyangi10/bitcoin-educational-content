question: What economic development enabled the emergence of contractual relationships based on mutual agreement rather than force?
answer: The birth of agriculture and the ability to accumulate surplus
wrong_answers:
  - The invention of the steam engine and industrial machinery
  - The discovery of new continents and expansion of markets
  - The establishment of guilds and trade monopolies
explanation: |
  Agriculture was the crucial turning point that allowed societies to move beyond subsistence living. By enabling the accumulation of surplus production, agriculture created the material foundation for peaceful trade and voluntary exchanges. This surplus meant people could specialize in different activities and trade with each other based on mutual benefit rather than survival necessity or force. The other options, while historically significant, came much later in human development and built upon the agricultural foundation that first made contractual relationships possible.

question: Hangi ekonomik gelişme, güç yerine karşılıklı anlaşmaya dayalı sözleşme ilişkilerinin ortaya çıkmasını sağladı?
answer: Tarımın doğuşu ve üretim fazlası biriktirme yeteneği
wrong_answers:
  - Buhar makinesinin ve endüstriyel makinelerin icadı
  - Yeni kıtaların keşfi ve pazarların genişlemesi
  - Loncaların ve ticaret tekellerinin kurulması
explanation: |
  Tarım, toplumların geçimlik yaşamın ötesine geçmesini sağlayan önemli bir dönüm noktasıydı. Tarım, üretim fazlasının birikmesini sağlayarak barışçıl ticaret ve gönüllü mübadeleler için maddi temel oluşturmuştur. Bu üretim fazlası, insanların farklı faaliyetlerde uzmanlaşabileceği ve birbirleriyle hayatta kalma zorunluluğu ya da zorlamadan ziyade karşılıklı fayda temelinde ticaret yapabileceği anlamına geliyordu. Diğer seçenekler, tarihsel olarak önemli olmakla birlikte, insan gelişiminde çok daha sonra ortaya çıkmış ve ilk olarak sözleşmeye dayalı ilişkileri mümkün kılan tarımsal temel üzerine inşa edilmiştir.
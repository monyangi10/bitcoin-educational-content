question: Welke economische ontwikkeling maakte het ontstaan mogelijk van contractuele relaties op basis van wederzijdse overeenstemming in plaats van dwang?
answer: Het ontstaan van de landbouw en de mogelijkheid om overschotten te accumuleren
wrong_answers:
  - De uitvinding van de stoommachine en industriële machines
  - De ontdekking van nieuwe continenten en uitbreiding van markten
  - De oprichting van gilden en handelsmonopolies
explanation: |
  Landbouw was het cruciale keerpunt dat samenlevingen in staat stelde om verder te gaan dan een leven voor eigen gebruik. Door de accumulatie van productieoverschotten mogelijk te maken, creëerde de landbouw de materiële basis voor vreedzame handel en vrijwillige uitwisselingen. Dit overschot betekende dat mensen zich konden specialiseren in verschillende activiteiten en handel met elkaar konden drijven op basis van wederzijds voordeel in plaats van overlevingsnoodzaak of dwang. De andere opties, hoewel historisch belangrijk, kwamen veel later in de menselijke ontwikkeling en bouwden voort op de agrarische basis die contractuele relaties voor het eerst mogelijk maakte.
question: Quel développement économique a permis l'émergence de relations contractuelles fondées sur l'accord mutuel plutôt que sur la force ?
answer: La naissance de l'agriculture et la capacité d'accumuler des surplus
wrong_answers:
  - L'invention de la machine à vapeur et des machines industrielles
  - La découverte de nouveaux continents et l'expansion des marchés
  - L'établissement de guildes et de monopoles commerciaux
explanation: |
  L'agriculture a été le tournant décisif qui a permis aux sociétés de dépasser le stade de la subsistance. En permettant l'accumulation de surplus de production, l'agriculture a créé les bases matérielles d'un commerce pacifique et d'échanges volontaires. Ce surplus a permis aux gens de se spécialiser dans différentes activités et de commercer les uns avec les autres sur la base d'un bénéfice mutuel plutôt que par nécessité de survie ou par la force. Les autres options, bien qu'importantes d'un point de vue historique, sont apparues bien plus tard dans le développement de l'humanité et se sont appuyées sur les fondements agricoles qui ont rendu possibles les premières relations contractuelles.
question: Jaki rozwój gospodarczy umożliwił pojawienie się stosunków umownych opartych na wzajemnym porozumieniu, a nie na sile?
answer: Narodziny rolnictwa i zdolność do gromadzenia nadwyżek
wrong_answers:
  - Wynalezienie silnika parowego i maszyn przemysłowych
  - Odkrycie nowych kontynentów i ekspansja rynków
  - Ustanowienie gildii i monopoli handlowych
explanation: |
  Rolnictwo było kluczowym punktem zwrotnym, który pozwolił społeczeństwom wyjść poza życie na własne potrzeby. Umożliwiając gromadzenie nadwyżek produkcyjnych, rolnictwo stworzyło materialne podstawy dla pokojowego handlu i dobrowolnej wymiany. Nadwyżka ta oznaczała, że ludzie mogli specjalizować się w różnych działaniach i handlować ze sobą w oparciu o wzajemne korzyści, a nie konieczność przetrwania lub siłę. Inne opcje, choć historycznie znaczące, pojawiły się znacznie później w rozwoju ludzkości i opierały się na rolniczych podstawach, które po raz pierwszy umożliwiły relacje umowne.
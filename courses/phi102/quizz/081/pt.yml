question: Que desenvolvimento económico permitiu o aparecimento de relações contratuais baseadas no acordo mútuo e não na força?
answer: O nascimento da agricultura e a capacidade de acumular excedentes
wrong_answers:
  - A invenção da máquina a vapor e da maquinaria industrial
  - A descoberta de novos continentes e a expansão dos mercados
  - A criação de grémios e monopólios comerciais
explanation: |
  A agricultura foi o ponto de viragem crucial que permitiu às sociedades ultrapassarem a vida de subsistência. Ao permitir a acumulação de excedentes de produção, a agricultura criou a base material para o comércio pacífico e as trocas voluntárias. Este excedente permitiu que as pessoas se especializassem em diferentes actividades e trocassem entre si com base no benefício mútuo e não na necessidade de sobrevivência ou na força. As outras opções, embora historicamente significativas, surgiram muito mais tarde no desenvolvimento humano e assentaram na base agrícola que primeiro tornou possíveis as relações contratuais.
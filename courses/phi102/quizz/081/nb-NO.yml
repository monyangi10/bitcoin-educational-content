question: Hvilken økonomisk utvikling muliggjorde fremveksten av kontraktsforhold basert på gjensidig enighet snarere enn tvang?
answer: Jordbrukets fødsel og muligheten til å akkumulere overskudd
wrong_answers:
  - Oppfinnelsen av dampmaskinen og industrimaskiner
  - Oppdagelsen av nye kontinenter og utvidelsen av markedene
  - Etablering av laug og handelsmonopoler
explanation: |
  Jordbruket var det avgjørende vendepunktet som gjorde det mulig for samfunn å bevege seg forbi selvberging. Ved å muliggjøre akkumulering av overskuddsproduksjon skapte jordbruket det materielle grunnlaget for fredelig handel og frivillig utveksling. Dette overskuddet gjorde det mulig for folk å spesialisere seg på ulike aktiviteter og handle med hverandre basert på gjensidig nytte snarere enn overlevelsesbehov eller tvang. De andre alternativene, selv om de er historisk viktige, kom mye senere i menneskets utvikling og bygde på jordbruksgrunnlaget som først muliggjorde kontraktsmessige relasjoner.
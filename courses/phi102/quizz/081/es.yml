question: ¿Qué desarrollo económico permitió la aparición de relaciones contractuales basadas en el acuerdo mutuo y no en la fuerza?
answer: El nacimiento de la agricultura y la capacidad de acumular excedentes
wrong_answers:
  - La invención de la máquina de vapor y la maquinaria industrial
  - El descubrimiento de nuevos continentes y la expansión de los mercados
  - Creación de gremios y monopolios comerciales
explanation: |
  La agricultura fue el punto de inflexión crucial que permitió a las sociedades ir más allá de la vida de subsistencia. Al permitir la acumulación de excedentes de producción, la agricultura creó la base material para el comercio pacífico y los intercambios voluntarios. Gracias a este excedente, las personas podían especializarse en distintas actividades y comerciar entre sí basándose en el beneficio mutuo y no en la necesidad de supervivencia o la fuerza. Las otras opciones, aunque históricamente significativas, llegaron mucho más tarde en el desarrollo humano y se construyeron sobre la base agrícola que primero hizo posibles las relaciones contractuales.
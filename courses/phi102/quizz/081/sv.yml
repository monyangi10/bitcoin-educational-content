question: Vilken ekonomisk utveckling möjliggjorde uppkomsten av avtalsförhållanden som bygger på ömsesidig överenskommelse snarare än på tvång?
answer: Jordbrukets uppkomst och förmågan att ackumulera överskott
wrong_answers:
  - Uppfinningen av ångmaskinen och industrimaskinerna
  - Upptäckten av nya kontinenter och expansion av marknader
  - Inrättandet av skråväsende och handelsmonopol
explanation: |
  Jordbruket var den avgörande vändpunkt som gjorde det möjligt för samhällen att gå bortom självhushåll. Genom att möjliggöra ackumulering av överskottsproduktion skapade jordbruket den materiella grunden för fredlig handel och frivilliga utbyten. Detta överskott innebar att människor kunde specialisera sig på olika aktiviteter och handla med varandra baserat på ömsesidig nytta snarare än överlevnadsnödvändighet eller tvång. De andra alternativen, även om de är historiskt betydelsefulla, kom mycket senare i människans utveckling och byggde på den jordbruksgrund som först möjliggjorde kontraktsmässiga relationer.
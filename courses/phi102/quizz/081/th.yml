question: การพัฒนาเศรษฐกิจใดที่ทำให้เกิดความสัมพันธ์ตามสัญญาที่มีพื้นฐานจากข้อตกลงร่วมกันแทนที่จะใช้กำลัง?
answer: การเกิดขึ้นของเกษตรกรรมและความสามารถในการสะสมส่วนเกิน
wrong_answers:
  - การประดิษฐ์เครื่องจักรไอน้ำและเครื่องจักรอุตสาหกรรม
  - การค้นพบทวีปใหม่และการขยายตัวของตลาด
  - การก่อตั้งสมาคมและการผูกขาดทางการค้า
explanation: |
  การเกษตรเป็นจุดเปลี่ยนที่สำคัญที่ทำให้สังคมสามารถก้าวข้ามการดำรงชีวิตแบบพึ่งพาตนเองได้ โดยการทำให้สามารถสะสมผลผลิตส่วนเกิน การเกษตรได้สร้างพื้นฐานทางวัตถุสำหรับการค้าขายอย่างสันติและการแลกเปลี่ยนโดยสมัครใจ ผลผลิตส่วนเกินนี้หมายความว่าผู้คนสามารถเชี่ยวชาญในกิจกรรมต่าง ๆ และค้าขายกันบนพื้นฐานของผลประโยชน์ร่วมกันแทนที่จะเป็นความจำเป็นในการอยู่รอดหรือการบังคับ ตัวเลือกอื่น ๆ แม้จะมีความสำคัญทางประวัติศาสตร์ แต่ก็เกิดขึ้นในภายหลังในการพัฒนาของมนุษย์และสร้างขึ้นบนพื้นฐานการเกษตรที่ทำให้ความสัมพันธ์ตามสัญญาเป็นไปได้ในครั้งแรก
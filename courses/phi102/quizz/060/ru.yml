question: Какова была основная причина развития политического подчинения в древних обществах, согласно тексту?
answer: Острая необходимость в безопасности и лидерстве в таких жизненно важных видах деятельности, как охота и боевые действия
wrong_answers:
  - Стремление правителей к накоплению личного богатства и расширению своих территорий
  - Религиозные убеждения, согласно которым определенные люди были избраны Богом для управления другими людьми
  - Необходимость организации сложных торговых сетей и коммерческих отношений
explanation: |
  Политическое подчинение возникло из тех же обстоятельств, что и рабство, - настоятельной потребности в безопасности во враждебном окружении. Без руководства в таких важных для выживания видах деятельности, как охота или сражения, целые группы могли столкнуться с голодом или смертью. Необходимость в руководстве привела к появлению обширной политической власти, охватывающей все аспекты общественной жизни. Остальные варианты неверны, поскольку представляют собой более поздние события или мотивы, которые не были основополагающими причинами политической власти в первобытных обществах, которая в основе своей была направлена на коллективное выживание и безопасность.
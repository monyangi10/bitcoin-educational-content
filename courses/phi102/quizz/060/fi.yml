question: Mikä oli tekstin mukaan tärkein syy poliittisen alistamisen kehittymiseen antiikin yhteiskunnissa?
answer: Turvallisuuden ja johtajuuden kiireellinen tarve elintärkeissä toiminnoissa, kuten metsästyksessä ja taistelussa
wrong_answers:
  - Hallitsijoiden halu kerätä henkilökohtaista varallisuutta ja laajentaa alueitaan
  - Uskonnolliset uskomukset, joiden mukaan tietyt henkilöt on jumalallisesti valittu hallitsemaan muita
  - Tarve organisoida monimutkaisia kauppaverkostoja ja kaupallisia suhteita
explanation: |
  Poliittinen alistaminen sai alkunsa samoista olosuhteista kuin orjuus - pakottavasta turvallisuustarpeesta vihamielisessä ympäristössä. Ilman johtajuutta eloonjäämisen kannalta olennaisissa toiminnoissa, kuten metsästyksessä tai taistelussa, kokonaisia ryhmiä saattoi uhata nälänhätä tai kuolema. Tämä ohjauksen tarve synnytti laajan poliittisen vallan, joka kattoi kaikki sosiaalisen elämän osa-alueet. Muut vaihtoehdot ovat virheellisiä, koska ne edustavat myöhempää kehitystä tai motiiveja, jotka eivät olleet alkukantaisten yhteiskuntien poliittisen vallan perimmäisiä syitä, joissa oli pohjimmiltaan kyse kollektiivisesta selviytymisestä ja turvallisuudesta.
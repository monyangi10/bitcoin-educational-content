question: เหตุผลหลักที่การอยู่ใต้บังคับทางการเมืองพัฒนาในสังคมโบราณตามข้อความคืออะไร?
answer: ความจำเป็นเร่งด่วนสำหรับความปลอดภัยและความเป็นผู้นำในกิจกรรมที่สำคัญเช่นการล่าสัตว์และการต่อสู้
wrong_answers:
  - ความปรารถนาของผู้ปกครองในการสะสมความมั่งคั่งส่วนตัวและขยายดินแดนของตน
  - ความเชื่อทางศาสนาที่ว่าบุคคลบางคนได้รับการเลือกจากพระเจ้าให้ปกครองผู้อื่น
  - ความจำเป็นในการจัดระเบียบเครือข่ายการค้าที่ซับซ้อนและความสัมพันธ์ทางการค้า
explanation: |
  การอยู่ใต้บังคับทางการเมืองเกิดขึ้นจากสถานการณ์เดียวกับการเป็นทาส - ความจำเป็นเร่งด่วนในการรักษาความปลอดภัยในสภาพแวดล้อมที่เป็นศัตรู หากไม่มีผู้นำในกิจกรรมที่จำเป็นต่อการอยู่รอด เช่น การล่าสัตว์หรือการต่อสู้ กลุ่มทั้งหมดอาจเผชิญกับความอดอยากหรือความตาย ความจำเป็นนี้ในการมีทิศทางนำไปสู่การสร้างอำนาจทางการเมืองที่ครอบคลุมทุกด้านของชีวิตสังคม ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะพวกเขาเป็นตัวแทนของการพัฒนาหรือแรงจูงใจที่เกิดขึ้นในภายหลัง ซึ่งไม่ใช่เหตุผลพื้นฐานสำหรับอำนาจทางการเมืองในสังคมดั้งเดิม ซึ่งเป็นเรื่องของการอยู่รอดและความปลอดภัยร่วมกันเป็นหลัก
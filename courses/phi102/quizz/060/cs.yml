question: Co bylo podle textu hlavním důvodem vzniku politické podřízenosti ve starověkých společnostech?
answer: Naléhavá potřeba bezpečnosti a vedení v životně důležitých činnostech, jako je lov a boj
wrong_answers:
  - Touha panovníků hromadit osobní bohatství a rozšiřovat svá území
  - Náboženské přesvědčení, že někteří jedinci byli vyvoleni Bohem, aby vládli ostatním
  - Potřeba organizovat složité obchodní sítě a obchodní vztahy
explanation: |
  Politické poddanství vzniklo za stejných okolností jako otroctví - z nutkavé potřeby bezpečí v nepřátelském prostředí. Bez vedení v základních činnostech pro přežití, jako je lov nebo boj, mohly celé skupiny čelit hladu nebo smrti. Tato nutnost řízení vytvořila rozsáhlou politickou moc pokrývající všechny aspekty společenského života. Ostatní možnosti jsou nesprávné, protože představují pozdější vývoj nebo motivace, které nebyly základním důvodem politické moci v primitivních společnostech, kde šlo v zásadě o kolektivní přežití a bezpečnost.
question: D'après le texte, quelle est la principale raison pour laquelle la sujétion politique s'est développée dans les sociétés anciennes ?
answer: Le besoin urgent de sécurité et de leadership dans des activités vitales comme la chasse et le combat
wrong_answers:
  - Le désir des dirigeants d'accumuler des richesses personnelles et d'étendre leurs territoires
  - Croyances religieuses selon lesquelles certains individus ont été divinement choisis pour gouverner les autres
  - La nécessité d'organiser des réseaux commerciaux et des relations commerciales complexes
explanation: |
  La sujétion politique est née des mêmes circonstances que l'esclavage : le besoin impératif de sécurité dans un environnement hostile. Sans direction dans les activités essentielles à la survie, comme la chasse ou le combat, des groupes entiers risquaient la famine ou la mort. Ce besoin de direction a donné naissance à des pouvoirs politiques étendus couvrant tous les aspects de la vie sociale. Les autres options sont incorrectes parce qu'elles représentent des développements ou des motivations ultérieurs qui n'étaient pas les raisons fondamentales de l'autorité politique dans les sociétés primitives, dont l'objectif fondamental était la survie et la sécurité collectives.
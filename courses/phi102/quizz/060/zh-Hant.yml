question: 根據文中所述，古代社會形成政治臣服的主要原因是什麼？
answer: 狩獵和戰鬥等重要活動對安全和領導力的迫切需求
wrong_answers:
  - 統治者累積個人財富和擴張領土的慾望
  - 宗教信仰，認為某些人是神選來管理他人的
  - 需要組織複雜的貿易網路和商業關係
explanation: |
  政治臣服與奴隸制出現的原因相同，都是在敵對環境中對安全的迫切需求。在狩獵或戰鬥等基本生存活動中，如果沒有領導，整個群體都可能面臨饑荒或死亡。這種對領導的需要創造了廣泛的政治權力，涵蓋了社會生活的所有方面。其他選項都不對，因為它們代表的是後來的發展或動機，而不是原始社會政治權力的根本原因，原始社會的根本原因是集體生存和安全。
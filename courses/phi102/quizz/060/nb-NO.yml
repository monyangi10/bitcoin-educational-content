question: Hva var den viktigste grunnen til at politisk underkastelse utviklet seg i antikkens samfunn, ifølge teksten?
answer: Det presserende behovet for sikkerhet og lederskap i viktige aktiviteter som jakt og kamp
wrong_answers:
  - Herskernes ønske om å samle personlig rikdom og utvide sine territorier
  - Religiøs tro på at visse personer var guddommelig utvalgt til å styre andre
  - Behovet for å organisere komplekse handelsnettverk og kommersielle relasjoner
explanation: |
  Politisk underkastelse oppsto under de samme omstendighetene som slaveriet - det tvingende behovet for sikkerhet i fiendtlige omgivelser. Uten lederskap i viktige overlevelsesaktiviteter som jakt eller kamp kunne hele grupper risikere å sulte eller dø. Dette behovet for styring skapte en omfattende politisk makt som dekket alle aspekter av samfunnslivet. De andre alternativene er feil fordi de representerer senere utviklinger eller motivasjoner som ikke var de grunnleggende årsakene til politisk autoritet i primitive samfunn, som i bunn og grunn handlet om kollektiv overlevelse og sikkerhet.
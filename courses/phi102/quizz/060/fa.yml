question: دلیل اصلی توسعه تبعیت سیاسی در جوامع باستانی طبق متن چه بود؟
answer: نیاز فوری به امنیت و رهبری در فعالیت‌های حیاتی مانند شکار و مبارزه
wrong_answers:
  - تمایل حاکمان به انباشت ثروت شخصی و گسترش قلمروهایشان
  - باورهای مذهبی که برخی افراد به طور الهی برای حکومت بر دیگران برگزیده شده‌اند
  - نیاز به سازماندهی شبکه‌های تجاری پیچیده و روابط تجاری
explanation: |
  تابعیت سیاسی از همان شرایطی که برده‌داری به وجود آمد - نیاز مبرم به امنیت در محیط‌های خصمانه - پدیدار شد. بدون رهبری در فعالیت‌های ضروری بقا مانند شکار یا جنگ، گروه‌های کامل ممکن بود با گرسنگی یا مرگ مواجه شوند. این نیاز به هدایت، قدرت‌های سیاسی گسترده‌ای را ایجاد کرد که تمام جنبه‌های زندگی اجتماعی را پوشش می‌داد. گزینه‌های دیگر نادرست هستند زیرا نمایانگر تحولات یا انگیزه‌های بعدی هستند که دلایل اساسی برای اقتدار سیاسی در جوامع ابتدایی نبودند، که اساساً درباره بقا و امنیت جمعی بود.
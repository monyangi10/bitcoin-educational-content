question: Metne göre eski toplumlarda siyasi boyun eğmenin gelişmesinin temel nedeni neydi?
answer: Avcılık ve savaş gibi hayati faaliyetlerde güvenlik ve liderliğe duyulan acil ihtiyaç
wrong_answers:
  - Yöneticilerin kişisel servet biriktirme ve topraklarını genişletme arzusu
  - Bazı bireylerin diğerlerini yönetmek üzere ilahi olarak seçildiğine dair dini inançlar
  - Karmaşık ticaret ağlarını ve ticari ilişkileri organize etme ihtiyacı
explanation: |
  Siyasi tabiiyet, kölelikle aynı koşullardan ortaya çıkmıştır - düşmanca ortamlarda güvenliğe duyulan zorunlu ihtiyaç. Avlanma ya da savaş gibi temel hayatta kalma faaliyetlerinde liderlik olmazsa, tüm gruplar açlık ya da ölümle karşı karşıya kalabilirdi. Bu yönlendirme ihtiyacı, toplumsal yaşamın tüm yönlerini kapsayan geniş siyasi güçler yaratmıştır. Diğer seçenekler yanlıştır çünkü temelde kolektif hayatta kalma ve güvenlikle ilgili olan ilkel toplumlarda siyasi otoritenin temel nedenleri olmayan daha sonraki gelişmeleri veya motivasyonları temsil etmektedir.
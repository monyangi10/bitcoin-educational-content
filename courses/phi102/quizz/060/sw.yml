question: Ni sababu gani kuu ya unyenyekevu wa kisiasa iliyokuzwa katika jamii za kale kulingana na maandishi?
answer: Haja ya dharura ya usalama na uongozi katika shughuli muhimu kama vile uwindaji na mapigano
wrong_answers:
  - Tamaa ya watawala kujilimbikizia utajiri binafsi na kupanua maeneo yao
  - Imani za kidini kwamba watu fulani walichaguliwa na Mungu kuwatawala wengine
  - Haja ya kupanga mitandao tata ya biashara na mahusiano ya kibiashara
explanation: |
  Utii wa kisiasa ulitokana na hali sawa na utumwa - hitaji muhimu la usalama katika mazingira ya uadui. Bila uongozi katika shughuli muhimu za kuishi kama vile uwindaji au mapigano, vikundi vizima vingeweza kukabiliwa na njaa au kifo. Uhitaji huu wa mwelekeo uliunda mamlaka makubwa ya kisiasa yanayofunika nyanja zote za maisha ya kijamii. Chaguzi zingine si sahihi kwa sababu zinawakilisha maendeleo au motisha za baadaye ambazo hazikuwa sababu za msingi za mamlaka ya kisiasa katika jamii za zamani, ambazo kimsingi zilikuwa kuhusu kuishi na usalama wa pamoja.
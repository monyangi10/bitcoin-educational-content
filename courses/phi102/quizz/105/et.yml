question: Millist rolli mängivad liberaalse majandusteooria kohaselt hinnad ja kasumid tootmise suunamisel?
answer: Need on loomulikud signaalid, mis suunavad tootjaid tarbijate vajaduste rahuldamisele, ilma et oleks vaja valitsuse sekkumist
wrong_answers:
  - Need kujutavad endast kunstlikke tõkkeid, mis takistavad ressursside tõhusat jaotamist turul
  - Nad toimivad valitsuse vahenditena, mille eesmärk on kontrollida ja reguleerida majandustegevuse suunda
  - Nad tekitavad turumoonutusi, mis viivad tootjad eemale tarbijate tegelike nõudmiste rahuldamisest
explanation: |
  Teksti kohaselt on hinnad ja kasumid loomulikud signaalid, mis suunavad tootmist, ilma et see vajaks riiklikku või regulatiivset korraldust. Kui tarbijad on valmis teatud kaupade ja teenuste eest maksma, tekitab see nendes sektorites kasumit, andes tootjatele märku, et need tegevused hõlbustavad tarbijate elu ja rahuldavad nende vajadusi. See tootmise loomulik seadus võimaldab majandustegevusel korraldada end kõige kasulikumal viisil, järgides valgustatud omakasu, selle asemel et nõuda välist juhtimist või kontrolli.
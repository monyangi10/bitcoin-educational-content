question: Ni uruhara uruhe ibiciro n’inyungu bigira mu kuyobora umusaruro hakurikijwe inyigisho y’ubutunzi bw’ubwigenge?
answer: Bikora nk’ibimenyetso bisanzwe biyobora abahinguzi kugira ngo bashobore gushitsa ivyo abaguzi bakeneye ataco bisaba ko Leta igira ico ikoze .
wrong_answers:
  - Bigereranya intambamyi z’ubuhinga zibuza gutanga neza ubutunzi mw’isoko .
  - Bikora nk'ibikoresho vya Leta vyagenewe kugenzura no gutunganya iyo ibikorwa vy'ubutunzi bigenda .
  - Bituma isoko rigoramye bituma abahinguzi badashobora guhazwa n’ivyo abaguzi basaba vy’ukuri .
explanation: |
  Dukurikije ico canditswe, ibiciro n’inyungu ni ibimenyetso vy’akameremere biyobora umusaruro ataco bimaze gushinga ishirahamwe rya Leta canke ry’amategeko. Iyo abaguzi biteguye kwishura ibintu bimwebimwe n’ibikorwa bimwebimwe, ivyo bituma haba inyungu muri izo nzego, bikaba bimenyesha abahinguzi ko ivyo bikorwa vyorosha ubuzima bw’abaguzi kandi bikaba bituma baronka ivyo bakeneye. Iryo tegeko ry’akameremere ry’uguhingura rituma igikorwa c’ubutunzi citunganya mu buryo bw’ingirakamaro kuruta ubundi bwose biciye mu gukurikirana inyungu z’umuntu ku giti ciwe zimurikiwe, aho gusaba ubuyobozi canke ubugenzuzi bwo hanze.
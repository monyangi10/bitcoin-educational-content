question: Kakvu ulogu imaju cene i profiti u usmeravanju proizvodnje prema liberalnoj ekonomskoj teoriji?
answer: Oni služe kao prirodni signali koji usmeravaju proizvođače ka zadovoljenju potreba potrošača bez potrebe za intervencijom vlade.
wrong_answers:
  - Oni predstavljaju veštačke barijere koje sprečavaju efikasnu alokaciju resursa na tržištu
  - Oni funkcionišu kao vladini alati dizajnirani za kontrolu i regulisanje pravca ekonomske aktivnosti
  - Oni stvaraju tržišne distorzije koje odvode proizvođače od zadovoljavanja stvarnih potrošačkih zahteva
explanation: |
  Prema tekstu, cene i profiti predstavljaju prirodne signale koji usmeravaju proizvodnju bez potrebe za vladinom ili regulatornom organizacijom. Kada su potrošači spremni da plate za određenu robu i usluge, to stvara profite u tim sektorima, signalizirajući proizvođačima da te aktivnosti olakšavaju živote potrošača i zadovoljavaju njihove potrebe. Ovaj prirodni zakon proizvodnje omogućava ekonomskoj aktivnosti da se organizuje na najkorisniji način kroz težnju za prosvetljenim ličnim interesom, umesto da zahteva spoljašnje usmeravanje ili kontrolu.
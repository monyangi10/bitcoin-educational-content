question: Jakou roli hrají ceny a zisky při řízení výroby podle liberální ekonomické teorie?
answer: Slouží jako přirozené signály, které vedou výrobce k uspokojování potřeb spotřebitelů, aniž by vyžadovaly zásahy státu
wrong_answers:
  - Představují umělé překážky, které brání efektivnímu rozdělování zdrojů na trhu
  - Fungují jako vládní nástroje určené ke kontrole a regulaci směřování hospodářské činnosti
  - Vytvářejí deformace trhu, které odvádějí výrobce od uspokojování skutečných požadavků spotřebitelů
explanation: |
  Podle textu jsou ceny a zisky přirozenými signály, které usměrňují výrobu, aniž by bylo nutné vytvářet vládní nebo regulační organizace. Pokud jsou spotřebitelé ochotni platit za určité zboží a služby, vytváří to v těchto odvětvích zisky, které výrobcům signalizují, že tyto činnosti usnadňují spotřebitelům život a uspokojují jejich potřeby. Tento přirozený zákon výroby umožňuje, aby se ekonomická činnost organizovala co nejužitečnějším způsobem prostřednictvím sledování osvíceného vlastního zájmu, aniž by vyžadovala vnější řízení nebo kontrolu.
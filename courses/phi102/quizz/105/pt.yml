question: De acordo com a teoria económica liberal, que papel desempenham os preços e os lucros na orientação da produção?
answer: Funcionam como sinais naturais que orientam os produtores no sentido de satisfazerem as necessidades dos consumidores, sem necessidade de intervenção governamental
wrong_answers:
  - Representam barreiras artificiais que impedem uma afetação eficiente dos recursos no mercado
  - Funcionam como instrumentos governamentais destinados a controlar e regular a direção da atividade económica
  - Criam distorções de mercado que afastam os produtores da satisfação das verdadeiras exigências dos consumidores
explanation: |
  De acordo com o texto, os preços e os lucros constituem sinais naturais que orientam a produção sem necessidade de organização governamental ou regulamentar. Quando os consumidores estão dispostos a pagar por determinados bens e serviços, isso gera lucros nesses sectores, sinalizando aos produtores que essas actividades facilitam a vida dos consumidores e satisfazem as suas necessidades. Esta lei natural da produção permite que a atividade económica se organize da forma mais útil através da procura de interesses próprios esclarecidos, em vez de exigir uma direção ou controlo externos.
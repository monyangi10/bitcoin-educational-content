question: Welke rol spelen prijzen en winsten bij het sturen van de productie volgens de liberale economische theorie?
answer: Ze dienen als natuurlijke signalen die producenten helpen om aan de behoeften van de consument te voldoen zonder dat overheidsinterventie nodig is
wrong_answers:
  - Ze vormen kunstmatige barrières die een efficiënte toewijzing van middelen op de markt verhinderen
  - Ze functioneren als overheidsinstrumenten om de richting van economische activiteit te controleren en te reguleren
  - Ze creëren marktverstoringen die ertoe leiden dat producenten niet aan de echte vraag van de consument voldoen
explanation: |
  Volgens de tekst zijn prijzen en winsten natuurlijke signalen die de productie oriënteren zonder dat daarvoor een overheids- of regelgevende organisatie nodig is. Wanneer consumenten bereid zijn te betalen voor bepaalde goederen en diensten, creëert dit winst in die sectoren, wat een signaal is voor producenten dat deze activiteiten het leven van consumenten vergemakkelijken en aan hun behoeften voldoen. Deze natuurlijke productiewet stelt economische activiteit in staat zichzelf op de meest nuttige manier te organiseren door het nastreven van verlicht eigenbelang, in plaats van externe sturing of controle nodig te hebben.
question: Özyönetim kapasitesi analizine göre, modern toplumları bireysel özgürlük açısından ilkel toplumlardan ayıran temel özellik nedir?
answer: Modern bireyler, özgürlüğün aydınlanmış bir şekilde kullanılması için gerekli ahlaki ve entelektüel kapasiteleri edinmişlerdir
wrong_answers:
  - Modern toplumlar, bireysel davranışlar üzerindeki her türlü düzenleme ve yasal kısıtlamayı ortadan kaldırmıştır
  - İlkel toplumlar doğal özgürlüğe sahipken, modern toplumlar kurumlar aracılığıyla yapay kısıtlamalar getirmektedir
  - Modern teknoloji, bireylerin özgürlüklerini sorumlu bir şekilde nasıl kullanacaklarını öğrenme ihtiyacını ortadan kaldırmıştır
explanation: |
  Metin, özgürlüğün doğal bir durum değil, uygarlık sürecinin bir sonucu olduğunu vurgulamaktadır. Charles Dunoyer'in analizi, ilkel toplumların 'doğal olarak özgür' görünmelerine rağmen, aslında bireyleri modern toplumların sunabileceğinden daha az özgür kılan davranışlar (oburluk, idrarını tutamama, cimrilik) sergilediğini göstermektedir. Temel ayrım, modern bireylerin, Rousseau'nun ilkel özgürlüğe ilişkin romantikleştirilmiş görüşüyle çelişecek şekilde, aydınlanmış özgürlük kullanımı için gereken kapasiteleri ahlakileşme ve sanayileşme yoluyla geliştirmiş olmalarıdır.
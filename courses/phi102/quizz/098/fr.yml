question: Selon l'analyse de la capacité d'autogouvernance, quelle est la caractéristique fondamentale qui distingue les sociétés modernes des sociétés primitives en termes de liberté individuelle ?
answer: Les individus modernes ont acquis les capacités morales et intellectuelles nécessaires à un usage éclairé de la liberté
wrong_answers:
  - Les sociétés modernes ont éliminé toute forme de réglementation et de contraintes juridiques sur le comportement individuel
  - Les sociétés primitives jouissaient d'une liberté naturelle, tandis que les sociétés modernes imposent des restrictions artificielles par le biais d'institutions
  - La technologie moderne a supprimé la nécessité pour les individus d'apprendre à exercer leur liberté de manière responsable
explanation: |
  Le texte souligne que la liberté n'est pas un état naturel mais le résultat d'un processus de civilisation. L'analyse de Charles Dunoyer démontre que les sociétés primitives, bien que paraissant "naturellement libres", présentent en réalité des comportements (voracité, incontinence, imprévoyance) qui rendent les individus moins libres que ce que les sociétés modernes peuvent offrir. La distinction essentielle est que les individus modernes ont développé, grâce à la moralisation et à l'industrialisation, les capacités nécessaires à un usage éclairé de la liberté, ce qui contredit la vision romancée de la liberté primitive de Rousseau.
question: 根據自治能力的分析，就個人自由而言，現代社會有什麼基本特徵區別於原始社會？
answer: 現代人已具備開明運用自由所需的道德與智慧能力
wrong_answers:
  - 現代社會消除了對個人行為的各種形式的規範和法律約束
  - 原始社會有自然的自由，而現代社會則透過制度施加人為的限制
  - 現代科技讓個人不再需要學習如何負責任地行使自由
explanation: |
  文中強調自由不是一種自然狀態，而是文明進程的結果。Charles Dunoyer 的分析顯示，原始社會儘管看似「自然自由」，但實際上所表現出的行為（貪婪、大小便失禁、恣意揮霍），使個人的自由度低於現代社會所能提供的。關鍵的區別在於，現代個人透過道德化與工業化，已發展出開明使用自由所需的能力，這與盧梭浪漫化的原始自由觀相矛盾。
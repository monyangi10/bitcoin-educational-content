question: Kulingana na uchambuzi wa uwezo wa kujitawala, ni sifa gani ya msingi inayotofautisha jamii za kisasa na zile za kizamani katika suala la uhuru wa mtu binafsi?
answer: Watu wa kisasa wamepata uwezo wa kimaadili na kiakili unaohitajika kwa matumizi bora ya uhuru
wrong_answers:
  - Jamii za kisasa zimeondoa aina zote za kanuni na vikwazo vya kisheria kuhusu tabia za mtu binafsi
  - Jamii za zamani zilikuwa na uhuru wa asili huku zile za kisasa zikiweka vikwazo bandia kupitia taasisi
  - Teknolojia ya kisasa imeondoa hitaji la watu binafsi kujifunza jinsi ya kutumia uhuru wao kwa uwajibikaji
explanation: |
  Maandishi yanasisitiza kwamba uhuru si hali ya asili bali ni matokeo ya mchakato wa kistaarabu. Uchambuzi wa Charles Dunoyer unaonyesha kwamba jamii za kale, licha ya kuonekana 'huru kiasili,' kwa kweli zinaonyesha tabia (ulafi, kutojizuia, kutokuwa na mpangilio) zinazowafanya watu binafsi kuwa huru kidogo kuliko jamii za kisasa zinavyoweza kutoa. Tofauti kuu ni kwamba watu wa kisasa wameendeleza kupitia maadili na viwanda uwezo unaohitajika kwa matumizi ya uhuru ulioelimika, kinyume na mtazamo wa Rousseau wa kimapenzi kuhusu uhuru wa kale.
question: Dushingiye ku nseguro y’ubushobozi bwo kwitegeka, ni ikihe kintu nyamukuru gitandukanya imibano ya none n’iya kera mu bijanye n’umwidegemvyo w’umuntu ku giti ciwe?
answer: Abantu bo muri iki gihe bararonse ubushobozi bwo mu vy’inyifato runtu no mu bwenge bukenewe kugira ngo bashobore gukoresha umwidegemvyo mu buryo bumurikiwe .
wrong_answers:
  - Imibano yo muri iki gihe yarakuyeho ubwoko bwose bw’amategeko n’amategeko agenga inyifato y’umuntu ku giti ciwe .
  - Imibano ya kera yari ifise umwidegemvyo mu gihe iya none ishiraho amategeko y'ubuhinga biciye mu nzego .
  - Ivyuma vy’ubuhinga bwa none vyakuyeho ivy’uko abantu bakeneye kwiga gukoresha umwidegemvyo wabo mu buryo bubereye .
explanation: |
  Ico canditswe gishimika ku vy’uko umwidegemvyo atari ikintu gisanzwe ahubwo ko ari ingaruka y’ingendo y’ubutekerezi. Isesengura rya Charles Dunoyer ryerekana ko imibano ya kera, naho isa n’iyifise ‘umwidegemvyo mu kameremere,’ mu vy’ukuri yerekana inyifato (ukurya cane, ukudashobora kwifata, ukudakora ivyo ushaka) zituma umuntu ku giti ciwe agira umwidegemvyo muto kuruta ivyo imibano ya none ishobora gutanga. Itandukaniro nyamukuru ni uko abantu bo muri iki gihe bateye imbere biciye mu kwigisha inyifato runtu no gukora inganda ubushobozi bukenewe kugira ngo umuntu akoreshe umwidegemvyo w’umuco, ivyo bikaba bivuguruza ukuntu Rousseau yabona umwidegemvyo wa kera mu buryo bw’urukundo.
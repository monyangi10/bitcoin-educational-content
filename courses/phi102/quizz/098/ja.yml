question: 自治能力の分析によれば、個人の自由という点で、近代社会と原始社会を区別する基本的特徴は何か？
answer: 現代の個人は、自由を啓蒙的に利用するために必要な道徳的・知的能力を獲得している。
wrong_answers:
  - 現代社会は、個人の行動に対するあらゆる規制や法的制約を撤廃してきた。
  - 原始社会には自然な自由があったが、近代社会は制度によって人為的な制限を課している。
  - 現代のテクノロジーは、個人が責任を持って自由を行使する方法を学ぶ必要性をなくしてしまった
explanation: |
  この文章は、自由は自然な状態ではなく、文明のプロセスの結果であることを強調している。シャルル・デュノワイエの分析によれば、原始社会は「自然に自由である」ように見えるにもかかわらず、実際には現代社会が提供できるものよりも個人の自由度を低くする行動（貪欲、失禁、浪費）を示している。重要な違いは、現代の個人は道徳化と工業化を通じて、啓蒙的な自由の行使に必要な能力を発達させてきたということであり、ルソーの原始的自由に対するロマン主義的な見方とは矛盾する。
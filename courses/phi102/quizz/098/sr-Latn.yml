question: Prema analizi kapaciteta za samoupravljanje, koja fundamentalna karakteristika razlikuje moderna društva od primitivnih u pogledu individualne slobode?
answer: Moderni pojedinci su stekli moralne i intelektualne sposobnosti neophodne za prosvetljeno korišćenje slobode
wrong_answers:
  - Moderna društva su eliminisala sve oblike regulacije i pravnih ograničenja na individualno ponašanje
  - Primitivna društva su imala prirodnu slobodu dok moderna nameću veštačka ograničenja kroz institucije.
  - Moderna tehnologija je uklonila potrebu da pojedinci nauče kako da odgovorno koriste svoju slobodu.
explanation: |
  Tekst naglašava da sloboda nije prirodno stanje već rezultat civilizacijskog procesa. Analiza Charlesa Dunoyera pokazuje da primitivna društva, iako se čine 'prirodno slobodnima', zapravo pokazuju ponašanja (proždrljivost, neobuzdanost, nepromišljenost) koja čine pojedince manje slobodnima nego što to moderna društva mogu ponuditi. Ključna razlika je u tome što su moderni pojedinci kroz moralizaciju i industrijalizaciju razvili sposobnosti potrebne za prosvetljeno korišćenje slobode, što je u suprotnosti sa Rousseauovim romantizovanim pogledom na primitivnu slobodu.
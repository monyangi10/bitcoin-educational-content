question: Според анализа на способността за самоуправление коя основна характеристика отличава съвременните общества от примитивните по отношение на индивидуалната свобода?
answer: Съвременните хора са придобили моралните и интелектуалните способности, необходими за просветено използване на свободата
wrong_answers:
  - Съвременните общества са премахнали всички форми на регулация и правни ограничения върху индивидуалното поведение
  - Примитивните общества са имали естествена свобода, докато съвременните налагат изкуствени ограничения чрез институции
  - Съвременните технологии са премахнали необходимостта хората да се учат как да упражняват свободата си отговорно
explanation: |
  В текста се подчертава, че свободата не е естествено състояние, а резултат от цивилизационен процес. Анализът на Шарл Дюноар показва, че примитивните общества, въпреки че изглеждат "естествено свободни", всъщност проявяват поведение (ненаситност, инконтиненция, импровизация), което прави индивидите по-малко свободни от това, което могат да предложат съвременните общества. Ключовото разграничение е, че съвременните индивиди са развили чрез морализацията и индустриализацията способностите, необходими за просветено използване на свободата, което противоречи на романтизирания възглед на Русо за примитивната свобода.
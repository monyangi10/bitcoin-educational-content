question: According to the analysis of self-governance capacity, what fundamental characteristic distinguishes modern societies from primitive ones in terms of individual liberty?
answer: Modern individuals have acquired the moral and intellectual capacities necessary for enlightened use of freedom
wrong_answers:
  - Modern societies have eliminated all forms of regulation and legal constraints on individual behavior
  - Primitive societies had natural freedom while modern ones impose artificial restrictions through institutions
  - Modern technology has removed the need for individuals to learn how to exercise their liberty responsibly
explanation: |
  The text emphasizes that freedom is not a natural state but the result of a civilizational process. Charles Dunoyer's analysis demonstrates that primitive societies, despite appearing 'naturally free,' actually exhibit behaviors (voraciousness, incontinence, improvidence) that make individuals less free than what modern societies can offer. The key distinction is that modern individuals have developed through moralization and industrialization the capacities needed for enlightened liberty use, contradicting Rousseau's romanticized view of primitive freedom.

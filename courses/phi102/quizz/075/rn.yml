question: Dukurikije ico canditswe, ni akahe kamaro nyamukuru k’ihinduka ritera imbere ku bijanye n’ihinduka ry’ubukazi mu kwagura umwidegemvyo?
answer: Bireka abantu bakagira umwidegemvyo igihe vy’ukuri ibintu bivyemerera ata n’ubukazi burengeje urugero butera .
wrong_answers:
  - Bikuraho ivy'uko hakenewe guhindura imibumbe ya politike n'ubutunzi iriho .
  - Biremeza ko abantu bose bo mu kibano bazoca bemera ivyiyumviro bishasha ku bijanye n’umwidegemvyo .
  - Bibuza imigwi iyo ari yo yose y’abarwanya ubutegetsi gushingwa mu bihe vy’ihinduka ry’imibano .
explanation: |
  Ico canditswe kirasigura ko ivugurura ritera imbere ari ryo ryiza kubera ko rituma imiryango igira umwidegemvyo mwinshi mu gihe kibereye igihe vy’ukuri ibintu bivyemerera, iyobowe n’ivyiyumviro vya bose bifise amakuru. Mu buryo butandukanye n’amahinduka y’ubukazi, amahinduka arinda ubukazi burengeje urugero kandi akabuza gutegeka amahinduka menshi kuruta ayo abantu bose biteguriye. Impinduka zikunda gutuma haba ubukazi bukomeye kandi akenshi zituma haba intsinzi kubera ko zisunika birenze ivyo igihugu gishobora gufata, mu gihe impinduka zitera imbere zituma habaho impinduka ziramvye zijanye n’ibintu vy’ukuri.
question: According to the text, what is the main advantage of progressive reforms over violent revolutions in extending freedom?
answer: They allow society to adopt freedom when conditions truly permit it without generating excessive violence
wrong_answers:
  - They eliminate the need for any changes to existing political and economic structures
  - They guarantee that all social classes will immediately accept new ideas about liberty
  - They prevent any opposition groups from forming during periods of social transformation
explanation: |
  The text explains that progressive reforms are preferable because they allow societies to adopt more freedom at the right moment when conditions truly permit it, guided by informed public opinion. Unlike violent revolutions, reforms avoid excessive violence and prevent the imposition of more changes than the public is ready for. Revolutions tend to generate significant violence and often lead to setbacks because they push beyond what society can absorb, while progressive reforms create sustainable change aligned with actual circumstances.

question: Wat is volgens de tekst het belangrijkste voordeel van progressieve hervormingen ten opzichte van gewelddadige revoluties bij het uitbreiden van vrijheid?
answer: Ze stellen de maatschappij in staat om vrijheid toe te passen wanneer de omstandigheden dat echt toelaten, zonder buitensporig geweld te genereren
wrong_answers:
  - Ze maken veranderingen in bestaande politieke en economische structuren overbodig
  - Ze garanderen dat alle sociale klassen nieuwe ideeën over vrijheid onmiddellijk zullen accepteren
  - Ze voorkomen dat er oppositiegroepen ontstaan tijdens perioden van sociale transformatie
explanation: |
  De tekst legt uit dat progressieve hervormingen te verkiezen zijn omdat ze samenlevingen in staat stellen om meer vrijheid in te voeren op het juiste moment wanneer de omstandigheden dat echt toelaten, geleid door een geïnformeerde publieke opinie. In tegenstelling tot gewelddadige revoluties vermijden hervormingen buitensporig geweld en voorkomen ze dat er meer veranderingen worden opgelegd dan waar het publiek klaar voor is. Revoluties hebben de neiging om generate significant geweld te gebruiken en leiden vaak tot terugslagen omdat ze verder gaan dan wat de samenleving kan absorberen, terwijl progressieve hervormingen duurzame verandering creëren die is afgestemd op de feitelijke omstandigheden.
question: Was ist dem Text zufolge der Hauptvorteil von progressiven Reformen gegenüber gewaltsamen Revolutionen bei der Ausdehnung der Freiheit?
answer: Sie ermöglichen es der Gesellschaft, sich die Freiheit zu nehmen, wenn die Bedingungen es wirklich erlauben, ohne dass es zu übermäßiger Gewalt kommt
wrong_answers:
  - Sie machen eine Änderung der bestehenden politischen und wirtschaftlichen Strukturen überflüssig
  - Sie garantieren, dass alle Gesellschaftsschichten neue Ideen über Freiheit sofort akzeptieren werden
  - Sie verhindern, dass sich in Zeiten des gesellschaftlichen Wandels oppositionelle Gruppen bilden
explanation: |
  In dem Text wird erläutert, dass progressive Reformen vorzuziehen sind, weil sie es den Gesellschaften ermöglichen, zum richtigen Zeitpunkt, wenn die Bedingungen es wirklich zulassen, mehr Freiheit einzuführen, geleitet von einer informierten öffentlichen Meinung. Im Gegensatz zu gewaltsamen Revolutionen vermeiden Reformen exzessive Gewalt und verhindern, dass mehr Veränderungen durchgesetzt werden, als die Öffentlichkeit bereit ist zu akzeptieren. Revolutionen neigen zu generate und führen oft zu Rückschlägen, weil sie über das hinausgehen, was die Gesellschaft verkraften kann, während fortschrittliche Reformen einen nachhaltigen, an die tatsächlichen Umstände angepassten Wandel bewirken.
question: 根據文中所述，在擴大自由方面，與暴力革命相比，進步改革的主要優勢是什麼？
answer: 它們允許社會在條件真正允許的情況下實現自由，而不會產生過度的暴力。
wrong_answers:
  - 不需要改變現有的政治和經濟結構
  - 他們保證所有社會階級都會立即接受有關自由的新觀念
  - 他們阻止任何反對團體在社會轉型時期形成
explanation: |
  文中解釋說，循序漸進的改革是可取的，因為它們允許社會在條件真正允許時，在知情民意的引導下，在適當的時機採納更多的自由。與暴力革命不同，改革可以避免過度的暴力，並防止強加比公眾準備好的更多改變。革命往往會造成嚴重的暴力衝突，並經常導致挫折，因為它們超出了社會所能承受的範圍，而漸進式的改革則能創造出符合實際情況的可持續變化。
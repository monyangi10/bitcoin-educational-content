question: Według tekstu, jaka jest główna przewaga postępowych reform nad gwałtownymi rewolucjami w rozszerzaniu wolności?
answer: Pozwalają one społeczeństwu na przyjęcie wolności, gdy warunki naprawdę na to pozwalają, bez generowania nadmiernej przemocy
wrong_answers:
  - Eliminują potrzebę jakichkolwiek zmian w istniejących strukturach politycznych i gospodarczych
  - Gwarantują one, że wszystkie klasy społeczne natychmiast zaakceptują nowe idee dotyczące wolności
  - Zapobiegają one tworzeniu się grup opozycyjnych w okresach transformacji społecznej
explanation: |
  Tekst wyjaśnia, że stopniowe reformy są preferowane, ponieważ pozwalają społeczeństwom na przyjęcie większej wolności w odpowiednim momencie, gdy warunki naprawdę na to pozwalają, kierując się świadomą opinią publiczną. W przeciwieństwie do gwałtownych rewolucji, reformy unikają nadmiernej przemocy i zapobiegają narzucaniu większej liczby zmian, niż społeczeństwo jest na to gotowe. Rewolucje mają tendencję do generate znacznej przemocy i często prowadzą do niepowodzeń, ponieważ wykraczają poza to, co społeczeństwo może wchłonąć, podczas gdy postępowe reformy tworzą trwałe zmiany dostosowane do rzeczywistych okoliczności.
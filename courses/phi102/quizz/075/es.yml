question: Según el texto, ¿cuál es la principal ventaja de las reformas progresivas frente a las revoluciones violentas a la hora de extender la libertad?
answer: Permiten a la sociedad adoptar la libertad cuando las condiciones realmente lo permiten sin generar una violencia excesiva
wrong_answers:
  - Eliminan la necesidad de modificar las estructuras políticas y económicas existentes
  - Garantizan que todas las clases sociales aceptarán inmediatamente las nuevas ideas sobre la libertad
  - Impiden la formación de grupos de oposición durante los periodos de transformación social
explanation: |
  El texto explica que las reformas progresivas son preferibles porque permiten a las sociedades adoptar más libertad en el momento oportuno, cuando las condiciones realmente lo permiten, guiadas por una opinión pública informada. A diferencia de las revoluciones violentas, las reformas evitan la violencia excesiva y previenen la imposición de más cambios de los que el público está preparado. Las revoluciones tienden a generate una violencia significativa y a menudo provocan retrocesos porque presionan más allá de lo que la sociedad puede absorber, mientras que las reformas progresivas crean un cambio sostenible alineado con las circunstancias reales.
question: بر اساس متن، مزیت اصلی اصلاحات تدریجی نسبت به انقلاب‌های خشونت‌آمیز در گسترش آزادی چیست؟
answer: آن‌ها به جامعه اجازه می‌دهند آزادی را زمانی که شرایط واقعاً اجازه می‌دهد، بدون ایجاد خشونت بیش از حد بپذیرد.
wrong_answers:
  - آنها نیاز به هرگونه تغییر در ساختارهای سیاسی و اقتصادی موجود را از بین می‌برند.
  - آنها تضمین می‌کنند که همه طبقات اجتماعی بلافاصله ایده‌های جدید درباره آزادی را خواهند پذیرفت.
  - آن‌ها از تشکیل هرگونه گروه مخالف در دوره‌های تحول اجتماعی جلوگیری می‌کنند.
explanation: |
  متن توضیح می‌دهد که اصلاحات تدریجی ترجیح داده می‌شوند زیرا به جوامع اجازه می‌دهند در لحظه مناسب که شرایط واقعاً اجازه می‌دهد، آزادی بیشتری را بپذیرند، به هدایت افکار عمومی آگاه. برخلاف انقلاب‌های خشونت‌آمیز، اصلاحات از خشونت بیش از حد جلوگیری می‌کنند و از تحمیل تغییراتی که جامعه برای آن آماده نیست، ممانعت می‌کنند. انقلاب‌ها تمایل به خشونت قابل توجهی دارند و اغلب به عقب‌گرد منجر می‌شوند زیرا فراتر از آنچه جامعه می‌تواند جذب کند، پیش می‌روند، در حالی که اصلاحات تدریجی تغییرات پایداری ایجاد می‌کنند که با شرایط واقعی همسو هستند.
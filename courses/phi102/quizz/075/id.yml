question: Menurut teks tersebut, apa keuntungan utama dari reformasi progresif dibandingkan revolusi kekerasan dalam memperluas kebebasan?
answer: Mereka mengizinkan masyarakat untuk mengadopsi kebebasan ketika kondisi benar-benar memungkinkan tanpa menimbulkan kekerasan yang berlebihan
wrong_answers:
  - Mereka menghilangkan kebutuhan akan perubahan apa pun pada struktur politik dan ekonomi yang ada
  - Mereka menjamin bahwa semua kelas sosial akan segera menerima ide-ide baru tentang kebebasan
  - Mereka mencegah terbentuknya kelompok-kelompok oposisi selama periode transformasi sosial
explanation: |
  Teks tersebut menjelaskan bahwa reformasi progresif lebih disukai karena memungkinkan masyarakat untuk mengadopsi lebih banyak kebebasan pada saat yang tepat ketika kondisinya benar-benar memungkinkan, dipandu oleh opini publik yang terinformasi. Tidak seperti revolusi dengan kekerasan, reformasi menghindari kekerasan yang berlebihan dan mencegah pemaksaan perubahan yang lebih besar daripada yang siap diterima oleh masyarakat. Revolusi cenderung generate kekerasan yang signifikan dan sering menyebabkan kemunduran karena mereka mendorong melampaui apa yang dapat diserap oleh masyarakat, sementara reformasi progresif menciptakan perubahan yang berkelanjutan yang selaras dengan keadaan aktual.
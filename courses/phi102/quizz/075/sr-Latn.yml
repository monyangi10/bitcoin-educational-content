question: Prema tekstu, koja je glavna prednost progresivnih reformi u odnosu na nasilne revolucije u širenju slobode?
answer: Oni omogućavaju društvu da usvoji slobodu kada uslovi to zaista dopuštaju, bez generisanja prekomernog nasilja.
wrong_answers:
  - Oni eliminišu potrebu za bilo kakvim promenama postojećih političkih i ekonomskih struktura
  - Oni garantuju da će sve društvene klase odmah prihvatiti nove ideje o slobodi
  - Oni sprečavaju formiranje bilo kakvih opozicionih grupa tokom perioda društvene transformacije
explanation: |
  Tekst objašnjava da su progresivne reforme poželjnije jer omogućavaju društvima da usvoje više slobode u pravom trenutku kada uslovi to zaista dozvoljavaju, vođeni informisanim javnim mnjenjem. Za razliku od nasilnih revolucija, reforme izbegavaju prekomerno nasilje i sprečavaju nametanje više promena nego što je javnost spremna da prihvati. Revolucije obično dovode do značajnog nasilja i često vode ka nazadovanju jer guraju dalje nego što društvo može da apsorbuje, dok progresivne reforme stvaraju održive promene usklađene sa stvarnim okolnostima.
question: Mikä on tekstin mukaan progressiivisten uudistusten tärkein etu vapauden laajentamisessa väkivaltaisiin vallankumouksiin verrattuna?
answer: Niiden avulla yhteiskunta voi ottaa vapauden käyttöön silloin, kun olosuhteet sen todella sallivat, ilman että se aiheuttaa liiallista väkivaltaa
wrong_answers:
  - Ne poistavat tarpeen muuttaa nykyisiä poliittisia ja taloudellisia rakenteita
  - Ne takaavat, että kaikki yhteiskuntaluokat hyväksyvät välittömästi uudet ajatukset vapaudesta
  - Ne estävät oppositioryhmiä muodostumasta yhteiskunnallisen muutoksen aikana
explanation: |
  Tekstissä selitetään, että asteittaiset uudistukset ovat suotavia, koska ne antavat yhteiskunnille mahdollisuuden ottaa käyttöön enemmän vapautta oikealla hetkellä, kun olosuhteet sen todella sallivat, tietoon perustuvan yleisen mielipiteen ohjaamana. Toisin kuin väkivaltaisissa vallankumouksissa, uudistuksissa vältetään liiallista väkivaltaa ja estetään se, että muutoksia tehdään enemmän kuin mihin kansalaiset ovat valmiita. Vallankumouksilla on taipumus käyttää generate merkittävää väkivaltaa, ja ne johtavat usein takaiskuihin, koska ne ylittävät sen, mitä yhteiskunta kykenee ottamaan vastaan, kun taas edistykselliset uudistukset luovat kestävää muutosta, joka vastaa todellisia olosuhteita.
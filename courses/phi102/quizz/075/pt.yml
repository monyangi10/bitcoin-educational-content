question: De acordo com o texto, qual é a principal vantagem das reformas progressivas em relação às revoluções violentas para alargar a liberdade?
answer: Permitem à sociedade adotar a liberdade quando as condições o permitem verdadeiramente, sem gerar uma violência excessiva
wrong_answers:
  - Eliminam a necessidade de quaisquer alterações às estruturas políticas e económicas existentes
  - Garantem que todas as classes sociais aceitarão imediatamente as novas ideias sobre a liberdade
  - Impedem a formação de grupos de oposição em períodos de transformação social
explanation: |
  O texto explica que as reformas progressivas são preferíveis porque permitem que as sociedades adoptem mais liberdade no momento certo, quando as condições o permitem verdadeiramente, guiadas por uma opinião pública informada. Ao contrário das revoluções violentas, as reformas evitam a violência excessiva e impedem a imposição de mais mudanças do que aquelas para as quais a população está preparada. As revoluções tendem a ser muito violentas e conduzem frequentemente a retrocessos, porque vão além do que a sociedade pode absorver, ao passo que as reformas progressivas criam mudanças sustentáveis e adaptadas às circunstâncias actuais.
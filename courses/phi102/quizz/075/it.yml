question: Secondo il testo, qual è il principale vantaggio delle riforme progressive rispetto alle rivoluzioni violente nell'estensione della libertà?
answer: Consentono alla società di adottare la libertà quando le condizioni lo permettono davvero, senza generare eccessiva violenza
wrong_answers:
  - Eliminano la necessità di modificare le strutture politiche ed economiche esistenti
  - Garantiscono che tutte le classi sociali accettino immediatamente le nuove idee sulla libertà
  - Impediscono la formazione di gruppi di opposizione durante i periodi di trasformazione sociale
explanation: |
  Il testo spiega che le riforme progressive sono preferibili perché permettono alle società di adottare maggiori libertà al momento giusto, quando le condizioni lo permettono davvero, guidate da un'opinione pubblica informata. A differenza delle rivoluzioni violente, le riforme evitano la violenza eccessiva e prevengono l'imposizione di più cambiamenti di quelli a cui il pubblico è pronto. Le rivoluzioni tendono a generate con violenza significativa e spesso portano a battute d'arresto perché si spingono oltre ciò che la società può assorbire, mentre le riforme progressive creano un cambiamento sostenibile allineato alle circostanze reali.
question: Mengapa teks tersebut menyatakan bahwa sistem represif lebih unggul daripada sistem preventif ketika menerapkan kebebasan bekerja?
answer: Sistem yang represif memberikan sanksi terhadap pelanggaran nyata dan pelanggaran nyata terhadap hak-hak orang lain daripada membatasi aktivitas setiap orang sebelumnya
wrong_answers:
  - Sistem represif menciptakan efek jera yang lebih kuat melalui hukuman yang lebih keras yang mencegah potensi pelanggaran sebelum terjadi
  - Sistem represif memungkinkan koordinasi yang lebih baik antara berbagai sektor profesional melalui mekanisme pengawasan dan kontrol terpusat
  - Sistem represif menghasilkan lebih banyak pendapatan pajak untuk layanan publik dengan mengenakan denda dan hukuman bagi mereka yang melanggar peraturan
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa mengakui kebebasan bekerja berarti mengakui keunggulan sistem represif, yang memberikan sanksi terhadap pelanggaran nyata dan pelanggaran efektif terhadap hak-hak orang lain, daripada sistem preventif yang menghalangi aktivitas setiap orang secara apriori. Sistem preventif menetapkan perwalian atas semua orang dalam suatu profesi dengan dalih bahwa beberapa individu mungkin melakukan pelanggaran, sementara sistem represif hanya bertindak ketika terjadi pelanggaran yang nyata. Pendekatan ini menghormati kebebasan individu dengan tidak membatasi setiap orang berdasarkan pelanggaran yang mungkin terjadi di masa depan, tetapi hanya menangani pelanggaran yang konkret ketika hal itu benar-benar terjadi.
question: Miks väidetakse tekstis, et repressiivne süsteem on töövabaduse rakendamisel parem kui ennetav süsteem?
answer: Repressiivne süsteem karistab tegelikke kuritarvitusi ja teiste õiguste tegelikke rikkumisi, mitte ei piira igaühe tegevust ette
wrong_answers:
  - Repressiivne süsteem loob tugevama hoiatava mõju karmimate karistuste kaudu, mis hoiavad ära võimalikud rikkumised enne nende toimumist
  - Repressiivne süsteem võimaldab paremat koordineerimist erinevate kutsealade vahel tsentraliseeritud järelevalve- ja kontrollimehhanismide kaudu
  - Repressiivne süsteem toob avalike teenuste jaoks rohkem maksutulu, sest määrates trahve ja karistusi neile, kes rikuvad eeskirju, saadakse rohkem maksutulu
explanation: |
  Tekstis märgitakse selgesõnaliselt, et töövabaduse tunnustamine tähendab repressiivse süsteemi, mis sanktsioneerib tegelikke kuritarvitusi ja teiste õiguste tegelikku rikkumist, ülimuslikkuse tunnistamist võrreldes ennetava süsteemiga, mis takistab a priori igaühe tegevust. Preventiivne süsteem kehtestab eestkoste kõigi kutsealal tegutsevate inimeste üle ettekäändel, et mõned isikud võivad toime panna kuritarvitusi, samas kui repressiivne süsteem tegutseb ainult siis, kui tegelik kahju tekib. Selline lähenemisviis austab individuaalset vabadust, kuna ei piira igaüht hüpoteetiliste tulevaste rikkumiste alusel, vaid käsitleb ainult konkreetseid rikkumisi, kui need tegelikult toimuvad.
question: Dlaczego tekst argumentuje, że system represyjny jest lepszy od systemu prewencyjnego przy wdrażaniu wolności pracy?
answer: Represyjny system sankcjonuje faktyczne nadużycia i rzeczywiste naruszenia praw innych, zamiast z góry ograniczać aktywność wszystkich osób
wrong_answers:
  - System represyjny tworzy silniejszy efekt odstraszający poprzez surowsze kary, które zapobiegają potencjalnym naruszeniom, zanim do nich dojdzie
  - System represyjny pozwala na lepszą koordynację między różnymi sektorami zawodowymi poprzez scentralizowane mechanizmy nadzoru i kontroli
  - Represyjny system generuje większe wpływy z podatków na usługi publiczne poprzez nakładanie grzywien i kar na tych, którzy naruszają przepisy
explanation: |
  Tekst wyraźnie stwierdza, że uznanie wolności pracy oznacza przyznanie wyższości systemu represyjnego, który sankcjonuje rzeczywiste nadużycia i faktyczne naruszenia praw innych osób, nad systemem prewencyjnym, który a priori utrudnia wszystkim działalność. System prewencyjny ustanawia kuratelę nad wszystkimi osobami wykonującymi dany zawód pod pretekstem, że niektóre osoby mogą dopuścić się nadużyć, podczas gdy system represyjny działa tylko wtedy, gdy wystąpi rzeczywista szkoda. Podejście to szanuje wolność jednostki, nie ograniczając wszystkich w oparciu o hipotetyczne przyszłe naruszenia, zamiast tego zajmując się tylko konkretnymi wykroczeniami, gdy faktycznie do nich dojdzie.
question: چرا متن استدلال می‌کند که یک سیستم سرکوبگر در مقایسه با یک سیستم پیشگیرانه هنگام اجرای آزادی کار برتر است؟
answer: یک سیستم سرکوبگر سوءاستفاده‌های واقعی و نقض‌های حقیقی حقوق دیگران را تحریم می‌کند، به جای اینکه فعالیت همه را از پیش محدود کند.
wrong_answers:
  - یک سیستم سرکوبگر با اعمال مجازات‌های شدیدتر، اثرات بازدارنده قوی‌تری ایجاد می‌کند که از وقوع تخلفات احتمالی قبل از وقوع آن‌ها جلوگیری می‌کند.
  - یک سیستم سرکوبگر امکان هماهنگی بهتر بین بخش‌های حرفه‌ای مختلف را از طریق نظارت مرکزی و مکانیسم‌های کنترلی فراهم می‌کند.
  - یک سیستم سرکوبگر با اعمال جریمه‌ها و مجازات‌ها بر کسانی که مقررات را نقض می‌کنند، درآمد مالیاتی بیشتری برای خدمات عمومی ایجاد می‌کند.
explanation: |
  متن به‌صراحت بیان می‌کند که به رسمیت شناختن آزادی کار به معنای پذیرش برتری سیستم سرکوبگر است که سوءاستفاده‌های واقعی و نقض مؤثر حقوق دیگران را تحریم می‌کند، بر سیستم پیشگیرانه‌ای که فعالیت همه را به‌طور پیشینی محدود می‌کند. سیستم پیشگیرانه تحت این بهانه که ممکن است برخی افراد سوءاستفاده کنند، قیمومیت بر همه افراد در یک حرفه را برقرار می‌کند، در حالی که سیستم سرکوبگر تنها زمانی عمل می‌کند که آسیب واقعی رخ دهد. این رویکرد با محدود نکردن همه بر اساس نقض‌های فرضی آینده، به آزادی فردی احترام می‌گذارد و در عوض تنها به تخلفات مشخص زمانی که واقعاً اتفاق می‌افتند، می‌پردازد.
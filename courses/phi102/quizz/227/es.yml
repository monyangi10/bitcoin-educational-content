question: ¿Por qué argumenta el texto que un sistema represivo es superior a un sistema preventivo a la hora de aplicar la libertad de trabajo?
answer: Un sistema represivo sanciona los abusos y las violaciones reales de los derechos de los demás en lugar de restringir de antemano la actividad de todos
wrong_answers:
  - Un sistema represivo crea efectos disuasorios más fuertes a través de castigos más severos que evitan posibles infracciones antes de que se produzcan
  - Un sistema represivo permite una mejor coordinación entre los distintos sectores profesionales mediante mecanismos centralizados de supervisión y control
  - Un sistema represivo genera más ingresos fiscales para los servicios públicos al imponer multas y sanciones a quienes infringen la normativa
explanation: |
  El texto afirma explícitamente que reconocer la libertad de trabajo significa admitir la superioridad del sistema represivo, que sanciona los abusos reales y las violaciones efectivas de los derechos de los demás, sobre el sistema preventivo que obstaculiza a priori la actividad de todos. El sistema preventivo establece una tutela sobre todas las personas que ejercen una profesión so pretexto de que algunos individuos podrían cometer abusos, mientras que el sistema represivo sólo actúa cuando se produce un perjuicio real. Este enfoque respeta la libertad individual al no restringir a todo el mundo basándose en hipotéticas infracciones futuras, sino abordando únicamente las infracciones concretas cuando realmente se producen.
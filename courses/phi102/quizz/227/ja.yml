question: 労働の自由を導入する際、抑圧的なシステムの方が予防的なシステムよりも優れていると主張するのはなぜか？
answer: 抑圧的なシステムは、すべての人の活動を事前に制限するのではなく、実際の虐待や他者の権利侵害に制裁を加える。
wrong_answers:
  - 抑圧的な制度は、潜在的な違反を未然に防ぐ厳罰によって、より強い抑止効果を生み出す。
  - 抑圧的なシステムは、中央集権的な監督・管理機構を通じて、異なる専門部門間のより良い調整を可能にする。
  - 抑圧的なシステムは、規制に違反した者に罰金や罰則を課すことで、公共サービスのための税収を増やす。
explanation: |
  この文章は、労働の自由を認めることは、すべての人の活動を先験的に妨げる予防的制度よりも、現実の虐待や他人の権利の実質的侵害を制裁する抑圧的制度の優位性を認めることを意味する、と明言している。予防的システムは、ある職業に従事するすべての人々に対して、ある個人が虐待を犯すかもしれないという口実のもとに後見制度を確立するのに対して、抑圧的システムは、実際に危害が発生した場合にのみ行動する。このアプローチでは、将来の違反という仮定のもとにすべての人を制限するのではなく、実際に起きた具体的な不正行為にのみ対処することで、個人の自由を尊重する。
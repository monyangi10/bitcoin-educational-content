question: Porque é que o texto defende que um sistema repressivo é superior a um sistema preventivo na implementação da liberdade de trabalho?
answer: Um sistema repressivo sanciona os abusos e as violações reais dos direitos dos outros, em vez de restringir antecipadamente a atividade de todos
wrong_answers:
  - Um sistema repressivo cria efeitos dissuasores mais fortes através de punições mais severas que previnem potenciais violações antes de estas ocorrerem
  - Um sistema repressivo permite uma melhor coordenação entre os diferentes sectores profissionais através de mecanismos centralizados de supervisão e controlo
  - Um sistema repressivo gera mais receitas fiscais para os serviços públicos através da aplicação de coimas e sanções a quem viola a regulamentação
explanation: |
  O texto indica explicitamente que reconhecer a liberdade de trabalho significa admitir a superioridade do sistema repressivo, que sanciona os abusos reais e as violações efectivas dos direitos dos outros, sobre o sistema preventivo que impede a priori a atividade de todos. O sistema preventivo estabelece uma tutela sobre todas as pessoas que exercem uma profissão sob o pretexto de que alguns indivíduos podem cometer abusos, ao passo que o sistema repressivo só actua quando ocorrem danos reais. Esta abordagem respeita a liberdade individual ao não restringir todos os indivíduos com base em hipotéticas infracções futuras, mas apenas em infracções concretas quando estas ocorrem.
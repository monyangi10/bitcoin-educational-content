question: Hvorfor argumenterer teksten for at et repressivt system er bedre enn et preventivt system når det gjelder å implementere arbeidsfrihet?
answer: Et repressivt system sanksjonerer faktiske overgrep og reelle krenkelser av andres rettigheter i stedet for å begrense alles aktivitet på forhånd
wrong_answers:
  - Et repressivt system skaper sterkere avskrekkende effekter gjennom strengere straffer som forhindrer potensielle lovbrudd før de skjer
  - Et repressivt system muliggjør bedre koordinering mellom ulike profesjonelle sektorer gjennom sentraliserte overvåkings- og kontrollmekanismer
  - Et repressivt system genererer mer skatteinntekter til offentlige tjenester ved å ilegge bøter og straffer til dem som bryter regelverket
explanation: |
  Teksten sier eksplisitt at anerkjennelsen av arbeidsfriheten innebærer en innrømmelse av at det repressive systemet, som sanksjonerer reelle overgrep og faktiske krenkelser av andres rettigheter, er overlegent det preventive systemet, som på forhånd hindrer alles aktivitet. Det preventive systemet etablerer et formynderskap over alle som utøver et yrke under påskudd av at noen kan komme til å begå overgrep, mens det repressive systemet bare griper inn når det faktisk skjer en skade. Denne tilnærmingen respekterer den individuelle friheten ved at den ikke begrenser alle basert på hypotetiske fremtidige krenkelser, men kun griper inn mot konkrete lovbrudd når de faktisk skjer.
question: Warum argumentiert der Text, dass ein repressives System einem präventiven System bei der Umsetzung der Arbeitsfreiheit überlegen ist?
answer: Ein repressives System sanktioniert tatsächliche Missbräuche und reale Verletzungen der Rechte anderer, anstatt die Aktivitäten aller im Voraus zu beschränken
wrong_answers:
  - Ein repressives System hat eine stärkere Abschreckungswirkung durch härtere Strafen, die potenzielle Verstöße verhindern, bevor sie auftreten
  - Ein repressives System ermöglicht eine bessere Koordinierung zwischen verschiedenen Berufsgruppen durch zentralisierte Aufsichts- und Kontrollmechanismen
  - Ein repressives System generiert mehr Steuereinnahmen für öffentliche Dienstleistungen, indem es Geldbußen und Strafen gegen diejenigen verhängt, die gegen Vorschriften verstoßen
explanation: |
  Der Text stellt ausdrücklich fest, dass die Anerkennung der Arbeitsfreiheit bedeutet, dass das repressive System, das tatsächliche Missbräuche und effektive Verletzungen der Rechte anderer sanktioniert, dem präventiven System, das die Tätigkeit aller von vornherein behindert, überlegen ist. Das präventive System führt eine Vormundschaft über alle Berufsangehörigen ein, unter dem Vorwand, dass einige Personen einen Missbrauch begehen könnten, während das repressive System nur eingreift, wenn tatsächlich ein Schaden entsteht. Dieser Ansatz respektiert die Freiheit des Einzelnen, indem er nicht jeden auf der Grundlage hypothetischer zukünftiger Verstöße einschränkt, sondern sich nur mit konkretem Fehlverhalten befasst, wenn es tatsächlich geschieht.
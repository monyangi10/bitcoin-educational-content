question: Pourquoi le texte soutient-il qu'un système répressif est supérieur à un système préventif lorsqu'il s'agit de mettre en œuvre la liberté du travail ?
answer: Un système répressif sanctionne les abus et les violations réels des droits d'autrui plutôt que de restreindre à l'avance l'activité de chacun
wrong_answers:
  - Un système répressif crée des effets dissuasifs plus importants grâce à des sanctions plus sévères qui empêchent les violations potentielles avant qu'elles ne se produisent
  - Un système répressif permet une meilleure coordination entre les différents secteurs professionnels grâce à des mécanismes de surveillance et de contrôle centralisés
  - Un système répressif génère davantage de recettes fiscales pour les services publics en imposant des amendes et des pénalités à ceux qui enfreignent les réglementations
explanation: |
  Le texte indique explicitement que reconnaître la liberté du travail, c'est admettre la supériorité du système répressif, qui sanctionne les abus réels et les violations effectives des droits d'autrui, sur le système préventif qui entrave a priori l'activité de chacun. Le système préventif instaure une tutelle sur l'ensemble des personnes exerçant une profession sous prétexte que certains individus pourraient commettre des abus, alors que le système répressif n'agit qu'en cas de préjudice réel. Cette approche respecte la liberté individuelle en ne restreignant pas tout le monde en fonction d'hypothétiques violations futures, mais en ne s'attaquant qu'aux actes répréhensibles concrets lorsqu'ils se produisent.
question: Tại sao văn bản lại lập luận rằng hệ thống đàn áp lại ưu việt hơn hệ thống phòng ngừa khi thực hiện quyền tự do lao động?
answer: Một hệ thống đàn áp sẽ dung túng cho những hành vi lạm dụng và vi phạm thực tế quyền của người khác thay vì hạn chế hoạt động của mọi người từ trước.
wrong_answers:
  - Hệ thống trừng phạt tạo ra hiệu quả răn đe mạnh mẽ hơn thông qua các hình phạt nghiêm khắc hơn, ngăn chặn các hành vi vi phạm tiềm tàng trước khi chúng xảy ra.
  - Hệ thống đàn áp cho phép phối hợp tốt hơn giữa các lĩnh vực chuyên môn khác nhau thông qua các cơ chế giám sát và kiểm soát tập trung.
  - Hệ thống trấn áp tạo ra nhiều nguồn thu thuế hơn cho các dịch vụ công cộng bằng cách áp đặt tiền phạt và hình phạt đối với những người vi phạm quy định.
explanation: |
  Văn bản này nêu rõ rằng việc công nhận tự do lao động đồng nghĩa với việc thừa nhận tính ưu việt của hệ thống trấn áp, vốn dung túng cho những hành vi lạm dụng thực tế và vi phạm quyền của người khác, so với hệ thống phòng ngừa vốn cản trở hoạt động của mọi người ngay từ đầu. Hệ thống phòng ngừa thiết lập sự giám sát đối với tất cả mọi người trong một nghề nghiệp với lý do rằng một số cá nhân có thể phạm sai phạm, trong khi hệ thống trấn áp chỉ hành động khi có thiệt hại thực sự xảy ra. Cách tiếp cận này tôn trọng tự do cá nhân bằng cách không hạn chế mọi người dựa trên những vi phạm giả định trong tương lai, mà chỉ giải quyết những hành vi sai trái cụ thể khi chúng thực sự xảy ra.
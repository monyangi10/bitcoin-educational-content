question: Защо в текста се твърди, че репресивната система е по-добра от превантивната при прилагането на свободата на труда?
answer: Репресивната система санкционира действителните злоупотреби и реалните нарушения на правата на другите, а не ограничава предварително дейността на всички
wrong_answers:
  - Репресивната система създава по-силен възпиращ ефект чрез по-строги наказания, които предотвратяват потенциални нарушения, преди да са се случили
  - Репресивната система дава възможност за по-добра координация между различните професионални сектори чрез централизирани механизми за надзор и контрол
  - Репресивната система генерира повече данъчни приходи за публични услуги чрез налагане на глоби и санкции на онези, които нарушават разпоредбите
explanation: |
  В текста изрично се посочва, че признаването на свободата на труда означава да се признае превъзходството на репресивната система, която санкционира реални злоупотреби и ефективни нарушения на правата на другите, над превантивната система, която априори възпрепятства дейността на всеки. Превантивната система установява опека над всички хора в дадена професия под претекст, че някои лица могат да извършат злоупотреби, докато репресивната система действа само при настъпване на реална вреда. Този подход зачита индивидуалната свобода, като не ограничава всички въз основа на хипотетични бъдещи нарушения, а се занимава само с конкретни нарушения, когато те действително се случат.
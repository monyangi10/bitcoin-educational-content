question: Perché il testo sostiene che un sistema repressivo è superiore a un sistema preventivo nell'attuazione della libertà di lavoro?
answer: Un sistema repressivo sanziona gli abusi effettivi e le reali violazioni dei diritti altrui, anziché limitare preventivamente l'attività di ciascuno
wrong_answers:
  - Un sistema repressivo crea effetti deterrenti più forti attraverso punizioni più severe che prevengono potenziali violazioni prima che si verifichino
  - Un sistema repressivo consente un migliore coordinamento tra i diversi settori professionali attraverso meccanismi di supervisione e controllo centralizzati
  - Un sistema repressivo genera maggiori entrate fiscali per i servizi pubblici imponendo multe e sanzioni a coloro che violano le norme
explanation: |
  Il testo afferma esplicitamente che riconoscere la libertà di lavoro significa ammettere la superiorità del sistema repressivo, che sanziona gli abusi reali e le violazioni effettive dei diritti altrui, rispetto al sistema preventivo che ostacola a priori l'attività di tutti. Il sistema preventivo stabilisce una tutela su tutte le persone che esercitano una professione con il pretesto che alcuni individui potrebbero commettere abusi, mentre il sistema repressivo agisce solo quando si verifica un danno effettivo. Questo approccio rispetta la libertà individuale non limitando tutti sulla base di ipotetiche violazioni future, ma affrontando solo gli illeciti concreti quando si verificano.
question: Zašto tekst tvrdi da je represivni sistem superiorniji od preventivnog sistema prilikom implementacije slobode rada?
answer: Represivni sistem sankcioniše stvarne zloupotrebe i stvarna kršenja prava drugih, umesto da unapred ograničava aktivnosti svih.
wrong_answers:
  - Represivni sistem stvara jače odvraćajuće efekte kroz strože kazne koje sprečavaju potencijalne prekršaje pre nego što se dogode.
  - Represivni sistem omogućava bolju koordinaciju između različitih profesionalnih sektora kroz centralizovane mehanizme nadzora i kontrole.
  - Represivni sistem generiše više poreskih prihoda za javne usluge nametanjem kazni i penala onima koji krše propise.
explanation: |
  Tekst eksplicitno navodi da priznavanje slobode rada znači priznavanje superiornosti represivnog sistema, koji sankcioniše stvarne zloupotrebe i efektivne povrede prava drugih, nad preventivnim sistemom koji apriori ometa aktivnost svih. Preventivni sistem uspostavlja starateljstvo nad svim ljudima u profesiji pod izgovorom da bi neki pojedinci mogli počiniti zloupotrebe, dok represivni sistem deluje samo kada se stvarna šteta dogodi. Ovaj pristup poštuje individualnu slobodu ne ograničavajući sve na osnovu hipotetičkih budućih povreda, već se bavi samo konkretnim prestupima kada se oni zaista dese.
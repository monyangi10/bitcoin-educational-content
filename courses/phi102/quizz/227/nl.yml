question: Waarom stelt de tekst dat een repressief systeem superieur is aan een preventief systeem bij het implementeren van vrijheid van werk?
answer: Een repressief systeem sanctioneert feitelijk misbruik en echte schendingen van andermans rechten in plaats van ieders activiteiten bij voorbaat te beperken
wrong_answers:
  - Een repressief systeem heeft een sterker afschrikkend effect door strengere straffen die potentiële overtredingen voorkomen voordat ze plaatsvinden
  - Een repressief systeem zorgt voor een betere coördinatie tussen verschillende professionele sectoren door gecentraliseerde toezichts- en controlemechanismen
  - Een repressief systeem genereert meer belastinginkomsten voor openbare diensten door boetes en straffen op te leggen aan degenen die de regels overtreden
explanation: |
  De tekst stelt expliciet dat het erkennen van de vrijheid van werk betekent dat men de superioriteit van het repressieve systeem erkent, dat echte misbruiken en effectieve schendingen van andermans rechten bestraft, tegenover het preventieve systeem dat ieders activiteit a priori belemmert. Het preventieve systeem stelt de voogdij in over alle mensen in een beroep onder het voorwendsel dat sommige individuen misbruik zouden kunnen plegen, terwijl het repressieve systeem alleen optreedt wanneer er daadwerkelijk schade optreedt. Deze benadering respecteert de individuele vrijheid door niet iedereen te beperken op basis van hypothetische toekomstige overtredingen, maar alleen concrete overtredingen aan te pakken wanneer deze daadwerkelijk plaatsvinden.
question: 为什么文中认为在落实工作自由时，压制性制度优于预防性制度？
answer: 压制性制度制裁的是实际滥用和真正侵犯他人权利的行为，而不是事先限制每个人的活动
wrong_answers:
  - 镇压性制度通过更严厉的惩罚，在潜在违法行为发生之前就加以预防，从而产生更强的威慑效果
  - 通过中央监督和控制机制，镇压制度可以更好地协调不同专业部门之间的关系
  - 压制性制度通过对违规者处以罚款和处罚，为公共服务创造更多税收
explanation: |
  该文本明确指出，承认工作自由意味着承认镇压性制度优于预防性制度，前者制裁实际滥用权力和有效侵犯他人权利的行为，后者则先验地阻碍每个人的活动。预防性制度以某些人可能会滥用权力为借口，对某一行业的所有人实施监护，而压制性制度只有在实际伤害发生时才采取行动。这种方法尊重个人自由，不根据假设的未来违法行为来限制每个人，而只在实际发生时才处理具体的不法行为。
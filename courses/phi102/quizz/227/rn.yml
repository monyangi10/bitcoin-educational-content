question: Ni kuki ico canditswe kivuga ko uburyo bwo gukandamiza buruta uburyo bwo kwirinda igihe umuntu ashira mu ngiro umwidegemvyo wo gukora?
answer: Uburyo bwo gukandamiza burahana ukugirira nabi vy’ukuri n’uguhohotera uburenganzira bw’abandi vy’ukuri aho guhagarika igikorwa c’umuntu wese imbere y’igihe .
wrong_answers:
  - Uburyo bwo gukandamiza buratuma habaho ingaruka zikomeye cane zo guhagarika abantu biciye mu bihano bikomeye cane bibuza abantu guhungabanya amategeko bishobora gushika imbere y’uko bishika .
  - Uburyo bwo gukandamiza buratuma habaho uguhuza neza hagati y'inzego zitandukanye z'umwuga biciye mu buryo bwo kugenzura no kugenzura .
  - Uburyo bwo gukandamiza butera amafaranga menshi y’imisoro ku bikorwa vya Leta mu gutanga amande n’ibihano ku barenga ku mategeko .
explanation: |
  Ico canditswe kivuga neza ko kwemera umwidegemvyo wo gukora bisobanura kwemera ko uburyo bwo gukandamiza, buhana ukurenganya vy’ukuri n’uguhohotera uburenganzira bw’abandi mu buryo bubereye, buruta uburyo bwo kwirinda bubangamira igikorwa ca buri wese a priori. Uburyo bwo kwirinda bushinga uburezi ku bantu bose bari mu mwuga mu kwitwaza ko abantu bamwebamwe boshobora gukora ibikorwa vy’ububisha, mu gihe uburyo bwo gukandamiza bukora gusa iyo habaye ikibi nyaco. Ubwo buryo burawubaha umwidegemvyo w’umuntu ku giti ciwe mu kutabuza umuntu wese bishingiye ku vyo umuntu yiyumvira ko ari ukurenga ku mategeko muri kazoza, ahubwo bugaca bufata ingingo gusa ku bikorwa bibi vy’ukuri iyo bibaye vy’ukuri.
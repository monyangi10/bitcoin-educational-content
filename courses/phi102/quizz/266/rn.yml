question: Dushingiye ku icegeranyo c’uburyo bw’ubutunzi, ni uruhara uruhe rw’ishimikiro ibiciro n’inyungu bigira mu buryo bwo guhindura amafaranga ataco bimaze?
answer: Bituma abaje mu bikorwa vy’ubucuruzi vy’ubushake bose bashobora kuronka ingaruka zishimishije .
wrong_answers:
  - Basubira gutanga ubutunzi buva ku bahinga buja ku baguzi biciye mu gutegeka isoko .
  - Bashinga ubugenzuzi bwa Leta ku bijanye n'ugutanga umutungo n'ingingo z'uguhingura .
  - Batuma haba ubukene bw'ubuhinga kugira ngo bashobore kuronka inyungu nyinshi ku bakuru b'isoko
explanation: |
  Ico canditswe kivuga neza ko ibiciro n’inyungu bifise uruhara runini mu guhindura amahera ku buntu mu kwemera ko ubudandaji bw’ubushake bushika ku ngaruka zishimishije ku muntu wese ari muri iyo nama. Ubwo buryo buratuma uguhanahana amakuru kugirira akamaro bose, umwe wese akaronka inyungu mu guhanahana amakuru. Inyishu zitari zo zirerekana uburyo bwo kwivanga canke bwo gukoresha nabi buvuguruza kamere y’ubushake y’uguhanahana amakuru ku buntu. Gusubira gusangira biciye mu mategeko birimwo ukwivanga kwa Leta, ukugenzura kwa Leta ku bijanye n’ugusangira birwanya umwidegemvyo w’isoko, kandi uguhingura ubukene bw’ibintu bitari vyo bigereranya ugukoresha nabi isoko aho gukoresha uguhinduranya kw’ukuri kw’ubushake kugirira akamaro abafise uruhara bose.
question: Kulingana na uchambuzi wa mifumo ya kiuchumi, bei na faida zina jukumu gani la msingi katika mifumo ya ubadilishanaji huria?
answer: Zinawezesha matokeo ya kuridhisha pande zote kwa washiriki wote katika miamala ya hiari
wrong_answers:
  - Wanasambaza tena utajiri kutoka kwa wazalishaji kwa watumiaji kupitia udhibiti wa soko
  - Wanaweka udhibiti wa serikali juu ya ugawaji wa rasilimali na maamuzi ya uzalishaji
  - Wanaunda uhaba bandia ili kuongeza faida kwa wachezaji wakubwa wa soko
explanation: |
  Maandishi yanasema wazi kwamba bei na faida zina jukumu muhimu katika ubadilishanaji huru kwa kuruhusu miamala ya hiari kufikia matokeo ya kuridhisha kwa kila mshiriki. Utaratibu huu unahakikisha kwamba ubadilishanaji una manufaa kwa pande zote, huku kila upande ukifaidika kutokana na muamala huo. Majibu yasiyo sahihi yanaonyesha mbinu za uingiliaji kati au za udanganyifu zinazopingana na asili ya hiari ya ubadilishanaji huru. Usambazaji upya kupitia kanuni unahusisha kuingiliwa kwa serikali, udhibiti wa serikali juu ya ugawaji unapinga uhuru wa soko, na uundaji wa uhaba bandia unawakilisha udanganyifu wa soko badala ya ubadilishanaji halisi wa hiari unaonufaisha pande zote zinazohusika.
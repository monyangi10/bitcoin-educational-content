question: Milline on majandusmehhanismide analüüsi kohaselt hindade ja kasumi põhiline roll vaba vahetuse süsteemis?
answer: Nad võimaldavad kõigile vabatahtlikes tehingutes osalejatele vastastikku rahuldavaid tulemusi
wrong_answers:
  - Nad jaotavad jõukust tootjatelt tarbijatele tururegulatsiooni kaudu ümber
  - Nad kehtestavad valitsuse kontrolli ressursside jaotamise ja tootmisotsuste üle
  - Nad loovad kunstliku puuduse, et maksimeerida turgu valitsevate ettevõtjate tulu
explanation: |
  Tekstis märgitakse selgesõnaliselt, et hinnad ja kasumid mängivad vabas kaubavahetuses olulist rolli, võimaldades vabatahtlikel tehingutel saavutada iga osaleja jaoks rahuldavaid tulemusi. See mehhanism tagab, et vahetus on vastastikku kasulik, nii et mõlemad osapooled saavad tehingust kasu. Valed vastused kajastavad sekkumis- või manipuleerivaid lähenemisviise, mis on vastuolus vaba vahetuse vabatahtliku olemusega. Reguleerimise kaudu toimuv ümberjaotamine hõlmab valitsuse sekkumist, valitsuse kontroll jaotamise üle on vastuolus turuvabadusega ning kunstlik puuduse tekitamine kujutab endast pigem turuga manipuleerimist kui tõelist vabatahtlikku vahetust, mis toob kasu kõigile osapooltele.
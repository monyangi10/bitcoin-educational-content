question: Dushingiye ku nseguro y’isano umwidegemvyo ufitaniye n’amasezerano n’ubukuru, ni igiki umurongo w’amateka wo gusubirira ubukuru amasezerano yerekana ku bijanye n’imiti y’abanyagihugu n’abanyagihugu?
answer: Bigereranya inyishu zisubira inyuma, zisubira inyuma zihindura amaterambere y’amateka aja ku mwidegemvyo .
wrong_answers:
  - Bigereranya ugutera imbere kw'imigenderanire y'amasezerano mu mibano y'ubu igoye .
  - Birerekana uburinganire bukenewe hagati y'amasezerano y'umuntu ku giti ciwe n'imiterere y'ubutegetsi rusangi .
  - Birerekana ingene ubukuru bushobora kwemerwa mu buryo bwa demokarasi biciye mu masezerano y’imibano no mu kwemera kwa bose .
explanation: |
  Ico canditswe kivuga neza ko impengamiro y’amateka yo gusubirira ubukuru amasezerano yerekana ko inyishu z’abanyagihugu n’iz’abanyagihugu mu vy’ukuri ari ‘passéistes’ (inyishu zisubira inyuma/zisubira inyuma). Iryo sesangura rivuga ko ubukomunisita bugereranya uburyo busubira inyuma kuruta ubundi bwose, bugasubiza ikibano mu mitunganirize y’imiryango ku rugero rw’igihugu cose. Ivyo bivuguruza iterambere ry’amateka kuva ku mitunganirize y’imibano ishingiye ku butegetsi gushika ku mitunganirize ishingiye ku masezerano, bikaba bituma izo nzira zigira ishingiro ry’ugusubiza inyuma aho gutera imbere.
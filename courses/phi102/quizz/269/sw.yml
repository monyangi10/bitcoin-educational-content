question: Kulingana na uchambuzi wa uhusiano wa uhuru na mkataba na mamlaka, mwelekeo wa kihistoria wa kubadilisha mamlaka na mkataba unafunua nini kuhusu suluhisho za kijamaa na za kuingilia kati?
answer: Zinawakilisha suluhisho zinazorudisha nyuma na zinazoangalia nyuma zinazorudisha nyuma maendeleo ya kihistoria kuelekea uhuru
wrong_answers:
  - Zinawakilisha mageuko ya asili ya mahusiano ya kimkataba katika jamii changamano za kisasa
  - Zinaonyesha usawa unaohitajika kati ya mikataba ya mtu binafsi na miundo ya mamlaka ya pamoja
  - Zinaonyesha jinsi mamlaka yanavyoweza kuhalalishwa kidemokrasia kupitia mikataba ya kijamii na ridhaa ya umma
explanation: |
  Maandishi yanasema waziwazi kwamba mwelekeo wa kihistoria wa kubadilisha mamlaka na mkataba unaonyesha kwamba suluhisho za kijamaa na za kuingilia kati kwa kweli ni 'zilizopita' (suluhisho zinazoangalia nyuma/zinazorudisha nyuma). Uchambuzi unasema kwamba ukomunisti unawakilisha umbo linalorudisha nyuma zaidi, na kurudisha jamii kwenye shirika la kikabila kwa kiwango cha kitaifa. Hii inapingana na maendeleo ya kihistoria kutoka kwa shirika la kijamii linalotegemea mamlaka hadi shirika la kijamii linalotegemea mkataba, na kufanya mifumo hii kimsingi kuwa ya athari badala ya ya kimaendeleo.
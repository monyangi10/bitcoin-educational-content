question: Enligt den franska liberala tradition som diskuteras, vad är det grundläggande skälet till att egendom uppstår i det mänskliga samhället?
answer: Egendom uppstår som en direkt följd av den fysiska existensen av människor som kroppar som upptar utrymme
wrong_answers:
  - Egendom uppstår genom sociala kontrakt som upprättas av politiska myndigheter och rättssystem
  - Egendom uppstår ur ekonomisk konkurrens och önskan att samla på sig materiella tillgångar
  - Egendom uppstår ur kulturella traditioner som förts vidare i generationer och sociala sedvänjor
explanation: |
  De franska liberala tänkarna, i synnerhet ideologerna, slog fast att egendom inte är en godtycklig social konstruktion utan härrör från det grundläggande faktum att människor är fysiska varelser som med nödvändighet upptar utrymme. När någon sover i en säng upptar han eller hon den uteslutande - detta visar att egendom är en naturlig följd av vår kroppsliga existens. Även grundläggande biologiska funktioner som att äta ett äpple eller andas luft innebär appropriering. Detta gör egendom till en grundläggande realitet som är rotad i den mänskliga naturen snarare än en social konvention, ett rättsligt ramverk, ett ekonomiskt system eller en kulturell tradition.
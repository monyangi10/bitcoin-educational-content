question: フランス自由主義の伝統によれば、人間社会で財産が生まれる根本的な理由は何か？
answer: 財産は、空間を占める身体としての人間の物理的存在の直接的な結果として現れる
wrong_answers:
  - 財産は、政治権力と法制度によって確立された社会契約から生まれる
  - 財産は経済的競争と物質的富の蓄積への欲求から生まれる
  - 財産は、何世代にもわたって受け継がれてきた文化的伝統や、社会的慣習から生まれたものである。
explanation: |
  フランスの自由主義思想家たち、とりわけイデオローグたちは、財産とは恣意的な社会的構築物ではなく、人間が空間を必然的に占有する身体的存在であるという基本的事実に由来するものであることを明らかにした。誰かがベッドで寝るとき、その人はベッドを独占的に占有する。このことは、財産が私たちの身体的存在から自然に生まれることを示している。リンゴを食べたり空気を吸ったりするような基本的な生物学的機能でさえ、占有を伴う。このことは、財産が単なる社会的慣習や法的枠組み、経済制度、文化的伝統ではなく、人間の本性に根ざした根本的な現実であることを示している。
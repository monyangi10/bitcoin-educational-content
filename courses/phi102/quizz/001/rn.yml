question: Dushingiye ku mugenzo w’ubwigenge bw’Abafaransa twavuganye, ni imvo nyamukuru iyihe ituma umutungo uvuka mu kibano c’abantu?
answer: Itunga risohoka nk'ingaruka zitaziguye z'ukubaho kw'abantu nk'imibiri ifata ikibanza .
wrong_answers:
  - Itunga riva mu masezerano y'imibano ashingwa n'ubutegetsi bwa politike n'imirongo ngenderwako y'amategeko .
  - Itunga riva mu guhiganwa mu vy’ubutunzi no mu cipfuzo co kwirundanira ubutunzi bw’umubiri .
  - Itunga riva mu migenzo y'imico kama ihereye ku mayaruka n'imigenzo y'imibano .
explanation: |
  Abanyabwenge b’Abafaransa b’abanyagihugu, cane cane aba Ideologues, bamenyesheje ko umutungo atari inyubako y’imibano y’ubujuju ahubwo ko ikomoka ku kintu nyamukuru c’uko abantu ari ibiremwa vy’umubiri bifata ikibanza ata kabuza. Iyo umuntu aryamye mu gitanda, ni we abifata wenyene - ivyo vyerekana ko umutungo uva mu buzima bwacu bw’umubiri. Mbere n’ibikorwa vy’ishimikiro vy’ibinyabuzima nk’ukurya pome canke guhema umuyaga birimwo ukuvyifatamwo neza. Ivyo bituma umutungo uba ikintu nyakuri c’ishimikiro gishingiye kuri kamere y’umuntu aho kuba ikintu gusa gishingiye ku mibano, amategeko, urutonde rw’ubutunzi canke umugenzo w’imico kama.
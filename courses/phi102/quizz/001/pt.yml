question: De acordo com a tradição liberal francesa discutida, qual é a razão fundamental para o surgimento da propriedade na sociedade humana?
answer: A propriedade surge como uma consequência direta da existência física dos seres humanos enquanto corpos que ocupam o espaço
wrong_answers:
  - A propriedade emerge de contratos sociais estabelecidos por autoridades políticas e sistemas jurídicos
  - A propriedade surge da competição económica e do desejo de acumular riqueza material
  - A propriedade emerge das tradições culturais transmitidas através das gerações e dos costumes sociais
explanation: |
  Os pensadores liberais franceses, em particular os Ideólogos, identificaram que a propriedade não é uma construção social arbitrária, mas decorre do facto básico de os seres humanos serem seres físicos que ocupam necessariamente o espaço. Quando alguém dorme numa cama, ocupa-a exclusivamente - isto demonstra que a propriedade emerge naturalmente da nossa existência corpórea. Mesmo as funções biológicas básicas, como comer uma maçã ou respirar ar, envolvem apropriação. Isto faz da propriedade uma realidade fundamental enraizada na natureza humana e não uma mera convenção social, um quadro jurídico, um sistema económico ou uma tradição cultural.
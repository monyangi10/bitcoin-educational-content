question: चर्चा की गई फ्रांसीसी उदारवादी परंपरा के अनुसार, मानव समाज में संपत्ति के उद्भव का मूल कारण क्या है?
answer: संपत्ति का उद्भव मनुष्य के भौतिक अस्तित्व के प्रत्यक्ष परिणाम स्वरूप होता है, जिसमें शरीर स्थान घेरते हैं।
wrong_answers:
  - संपत्ति का उद्भव राजनीतिक अधिकारियों और कानूनी प्रणालियों द्वारा स्थापित सामाजिक अनुबंधों से होता है।
  - संपत्ति का उद्भव आर्थिक प्रतिस्पर्धा और भौतिक धन संचय करने की इच्छा से होता है।
  - संपत्ति पीढ़ियों से चली आ रही सांस्कृतिक परंपराओं और सामाजिक रीति-रिवाजों से उत्पन्न होती है।
explanation: |
  फ्रांसीसी उदारवादी विचारकों, विशेष रूप से विचारधारावादियों ने यह स्पष्ट किया कि संपत्ति कोई मनमानी सामाजिक रचना नहीं है, बल्कि यह इस मूलभूत तथ्य से उत्पन्न होती है कि मनुष्य भौतिक प्राणी हैं और अनिवार्य रूप से स्थान का उपयोग करते हैं। जब कोई व्यक्ति बिस्तर पर सोता है, तो वह उस पर पूर्णतः अधिकार रखता है - यह दर्शाता है कि संपत्ति हमारे शारीरिक अस्तित्व से स्वाभाविक रूप से उत्पन्न होती है। सेब खाना या सांस लेना जैसी बुनियादी जैविक क्रियाएं भी उपयोग में आती हैं। यह संपत्ति को केवल एक सामाजिक प्रथा, कानूनी ढांचा, आर्थिक व्यवस्था या सांस्कृतिक परंपरा के बजाय मानव स्वभाव में निहित एक मूलभूत वास्तविकता बनाती है।
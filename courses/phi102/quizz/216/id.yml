question: Menurut analisis ekonomi liberal, apa alasan utama mengapa prediksi Marxis tradisional tentang peningkatan kemiskinan di bawah kapitalisme telah bertentangan dengan bukti-bukti historis?
answer: Peningkatan berkelanjutan dalam produktivitas dan mekanisme pertukaran sukarela membuat barang-barang konsumsi semakin mudah diakses dengan harga yang lebih rendah sekaligus meningkatkan kondisi kerja
wrong_answers:
  - Intervensi pemerintah dan program-program kesejahteraan telah berhasil mendistribusikan kembali kekayaan dari kapitalis ke pekerja, menutupi dinamika eksploitasi yang mendasarinya
  - Pengangguran teknologi telah diimbangi dengan penciptaan lapangan kerja sektor jasa baru yang memberikan upah yang lebih baik daripada lapangan kerja manufaktur tradisional
  - Perdagangan internasional dan eksploitasi kolonial telah memungkinkan negara-negara kapitalis mengekspor kemiskinan mereka ke negara-negara berkembang sambil memperkaya para pekerja domestik
explanation: |
  Analisis Paul Leroy-Beaulieu menunjukkan bahwa masyarakat pasar bebas yang didasarkan pada kontrak sukarela dan pertukaran secara alami cenderung mengarah pada perbaikan kondisi bagi masyarakat. Mekanisme kuncinya adalah bahwa peningkatan produktivitas membuat barang dapat diakses dengan harga yang lebih rendah sementara kondisi kerja membaik karena tenaga kerja menjadi lebih intelektual dan termekanisasi. Hal ini bertentangan dengan prediksi Marxis tentang meningkatnya imiserasi. Jawaban yang salah mengaitkan perbaikan dengan redistribusi pemerintah, pola penciptaan lapangan kerja, atau eksploitasi internasional, bukan dengan dinamika fundamental pertukaran sukarela dan pertumbuhan produktivitas yang diidentifikasi oleh para ekonom liberal sebagai pendorong utama kemakmuran massa.
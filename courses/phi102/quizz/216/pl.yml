question: Według liberalnej analizy ekonomicznej, jaki jest główny powód, dla którego tradycyjne marksistowskie prognozy dotyczące rosnącego ubóstwa w kapitalizmie zostały zaprzeczone przez dowody historyczne?
answer: Ciągła poprawa produktywności i dobrowolne mechanizmy wymiany sprawiają, że dobra konsumpcyjne stają się coraz bardziej dostępne po niższych cenach, przy jednoczesnej poprawie warunków pracy
wrong_answers:
  - Interwencje rządowe i programy opieki społecznej skutecznie redystrybuowały bogactwo od kapitalistów do pracowników, maskując podstawową dynamikę wyzysku
  - Bezrobocie technologiczne zostało zrównoważone przez tworzenie nowych miejsc pracy w sektorze usług, które zapewniają lepsze płace niż tradycyjne zatrudnienie w przemyśle wytwórczym
  - Handel międzynarodowy i wyzysk kolonialny pozwoliły kapitalistycznym narodom eksportować swoje ubóstwo do krajów rozwijających się, jednocześnie wzbogacając krajowych pracowników
explanation: |
  Analiza Paula Leroy-Beaulieu pokazuje, że społeczeństwa wolnorynkowe oparte na dobrowolnych umowach i wymianie w naturalny sposób dążą do poprawy warunków dla mas. Kluczowym mechanizmem jest to, że poprawa produktywności sprawia, że towary są dostępne po niższych cenach, podczas gdy warunki pracy poprawiają się, gdy praca staje się bardziej intelektualna i zmechanizowana. Jest to sprzeczne z marksistowskimi przewidywaniami dotyczącymi rosnącego unieruchomienia. Błędne odpowiedzi błędnie przypisują poprawę sytuacji rządowej redystrybucji, wzorcom tworzenia miejsc pracy lub międzynarodowemu wyzyskowi, a nie fundamentalnej dynamice dobrowolnej wymiany i wzrostu produktywności, które liberalni ekonomiści identyfikują jako główne czynniki napędzające masowy dobrobyt.
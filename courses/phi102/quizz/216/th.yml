question: ตามการวิเคราะห์เศรษฐศาสตร์เสรีนิยม เหตุผลหลักที่ทำให้การทำนายของมาร์กซิสต์แบบดั้งเดิมเกี่ยวกับความยากจนที่เพิ่มขึ้นภายใต้ระบบทุนนิยมถูกขัดแย้งโดยหลักฐานทางประวัติศาสตร์คืออะไร?
answer: การปรับปรุงอย่างต่อเนื่องในด้านผลิตภาพและกลไกการแลกเปลี่ยนโดยสมัครใจทำให้สินค้าบริโภคเข้าถึงได้มากขึ้นในราคาที่ต่ำลงขณะเดียวกันก็ปรับปรุงสภาพการทำงาน
wrong_answers:
  - การแทรกแซงของรัฐบาลและโครงการสวัสดิการได้กระจายความมั่งคั่งจากนายทุนไปยังแรงงานอย่างสำเร็จ โดยปกปิดพลวัตการแสวงหาประโยชน์ที่อยู่เบื้องหลัง
  - การว่างงานจากเทคโนโลยีได้รับการชดเชยด้วยการสร้างงานในภาคบริการใหม่ที่ให้ค่าจ้างดีกว่าการจ้างงานในภาคการผลิตแบบดั้งเดิม
  - การค้าระหว่างประเทศและการแสวงหาประโยชน์จากอาณานิคมได้เปิดโอกาสให้ประเทศทุนนิยมส่งออกความยากจนไปยังประเทศกำลังพัฒนา ในขณะที่ทำให้คนงานในประเทศร่ำรวยขึ้น
explanation: |
  การวิเคราะห์ของ Paul Leroy-Beaulieu แสดงให้เห็นว่าสังคมตลาดเสรีที่อิงตามสัญญาและการแลกเปลี่ยนโดยสมัครใจมีแนวโน้มที่จะปรับปรุงสภาพความเป็นอยู่ของมวลชนโดยธรรมชาติ กลไกสำคัญคือการปรับปรุงผลิตภาพทำให้สินค้าสามารถเข้าถึงได้ในราคาที่ต่ำลง ในขณะที่สภาพการทำงานดีขึ้นเมื่อแรงงานกลายเป็นงานที่ใช้ความคิดและเครื่องจักรมากขึ้น สิ่งนี้ขัดแย้งกับการทำนายของมาร์กซิสต์เกี่ยวกับความยากลำบากที่เพิ่มขึ้น คำตอบที่ผิดพลาดมักจะระบุว่าการปรับปรุงเกิดจากการกระจายรายได้ของรัฐบาล รูปแบบการสร้างงาน หรือการแสวงหาผลประโยชน์ระหว่างประเทศ แทนที่จะเป็นพลวัตพื้นฐานของการแลกเปลี่ยนโดยสมัครใจและการเติบโตของผลิตภาพที่นักเศรษฐศาสตร์เสรีนิยมระบุว่าเป็นตัวขับเคลื่อนหลักของความมั่งคั่งของมวลชน
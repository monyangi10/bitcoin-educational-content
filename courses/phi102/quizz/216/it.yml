question: Secondo l'analisi economica liberale, qual è la ragione principale per cui le tradizionali previsioni marxiste sull'aumento della povertà sotto il capitalismo sono state contraddette dall'evidenza storica?
answer: Il continuo miglioramento della produttività e i meccanismi di scambio volontario rendono i beni di consumo sempre più accessibili a prezzi più bassi, migliorando le condizioni di lavoro
wrong_answers:
  - L'intervento del governo e i programmi di welfare hanno ridistribuito con successo la ricchezza dai capitalisti ai lavoratori, mascherando le dinamiche di sfruttamento sottostanti
  - La disoccupazione tecnologica è stata compensata dalla creazione di nuovi posti di lavoro nel settore dei servizi che offrono salari migliori rispetto all'occupazione manifatturiera tradizionale
  - Il commercio internazionale e lo sfruttamento coloniale hanno permesso alle nazioni capitaliste di esportare la loro povertà nei paesi in via di sviluppo, arricchendo al contempo i lavoratori domestici
explanation: |
  L'analisi di Paul Leroy-Beaulieu dimostra che le società di libero mercato basate su contratti e scambi volontari tendono naturalmente a migliorare le condizioni delle masse. Il meccanismo chiave è che i miglioramenti della produttività rendono i beni accessibili a prezzi più bassi, mentre le condizioni di lavoro migliorano man mano che il lavoro diventa più intellettuale e meccanizzato. Questo contraddice le previsioni marxiste di una crescente immiserimento. Le risposte sbagliate attribuiscono erroneamente i miglioramenti alla redistribuzione governativa, ai modelli di creazione di posti di lavoro o allo sfruttamento internazionale, piuttosto che alle dinamiche fondamentali dello scambio volontario e della crescita della produttività che gli economisti liberali identificano come i motori principali della prosperità di massa.
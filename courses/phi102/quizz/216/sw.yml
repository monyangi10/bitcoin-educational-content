question: Kulingana na uchambuzi wa uchumi huria, ni sababu gani kuu kwa nini utabiri wa jadi wa Marxist kuhusu kuongezeka kwa umaskini chini ya ubepari umepingwa na ushahidi wa kihistoria?
answer: Uboreshaji endelevu wa uzalishaji na mifumo ya ubadilishanaji wa hiari hufanya bidhaa za matumizi zipatikane kwa bei ya chini huku zikiboresha mazingira ya kazi.
wrong_answers:
  - Programu za kuingilia kati za serikali na ustawi zimefanikiwa kusambaza utajiri kutoka kwa mabepari hadi kwa wafanyakazi, na kuficha mienendo ya unyonyaji iliyopo.
  - Ukosefu wa ajira kiteknolojia umepunguzwa na kuundwa kwa ajira mpya za sekta ya huduma zinazotoa mishahara bora kuliko ajira za kitamaduni za utengenezaji.
  - Biashara ya kimataifa na unyonyaji wa kikoloni vimeruhusu mataifa ya kibepari kuuza nje umaskini wao kwa nchi zinazoendelea huku yakiwatajirisha wafanyakazi wa majumbani.
explanation: |
  Uchambuzi wa Paul Leroy-Beaulieu unaonyesha kwamba jamii za soko huria zinazotegemea mikataba ya hiari na ubadilishanaji kwa kawaida huwa zinaelekea kuboresha hali kwa raia. Utaratibu muhimu ni kwamba maboresho ya tija hufanya bidhaa zipatikane kwa bei ya chini huku hali ya kazi ikiboreka kadri wafanyakazi wanavyozidi kuwa wasomi na wa kiufundi. Hii inapingana na utabiri wa Marx wa kuongezeka kwa unyonyaji. Majibu yasiyo sahihi yanahusisha kimakosa maboresho na ugawaji upya wa serikali, mifumo ya uundaji wa kazi, au unyonyaji wa kimataifa badala ya mienendo ya msingi ya ubadilishanaji wa hiari na ukuaji wa tija ambao wanauchumi huria hutambua kama vichocheo vikuu vya ustawi wa wingi.
question: Was ist laut liberaler Wirtschaftsanalyse der Hauptgrund, warum traditionelle marxistische Vorhersagen über zunehmende Armut im Kapitalismus durch historische Beweise widerlegt wurden?
answer: Die kontinuierliche Verbesserung der Produktivität und die Mechanismen des freiwilligen Austauschs machen Konsumgüter zunehmend zu niedrigeren Preisen zugänglich und verbessern gleichzeitig die Arbeitsbedingungen
wrong_answers:
  - Staatliche Eingriffe und Wohlfahrtsprogramme haben den Reichtum erfolgreich von den Kapitalisten auf die Arbeitnehmer umverteilt und die zugrunde liegende Ausbeutungsdynamik verschleiert
  - Die technologisch bedingte Arbeitslosigkeit wurde durch die Schaffung neuer Arbeitsplätze im Dienstleistungssektor ausgeglichen, die bessere Löhne bieten als die traditionellen Arbeitsplätze im verarbeitenden Gewerbe
  - Der internationale Handel und die koloniale Ausbeutung haben es den kapitalistischen Nationen ermöglicht, ihre Armut in die Entwicklungsländer zu exportieren und gleichzeitig die einheimischen Arbeiter zu bereichern
explanation: |
  Die Analyse von Paul Leroy-Beaulieu zeigt, dass Gesellschaften der freien Marktwirtschaft, die auf freiwilligen Verträgen und Tausch beruhen, von Natur aus zu besseren Bedingungen für die Massen tendieren. Der Schlüsselmechanismus besteht darin, dass durch Produktivitätssteigerungen Waren zu niedrigeren Preisen erhältlich werden, während sich die Arbeitsbedingungen verbessern, da die Arbeit intellektueller und mechanisierter wird. Dies steht im Widerspruch zu den marxistischen Vorhersagen einer zunehmenden Verelendung. Die falschen Antworten schreiben Verbesserungen fälschlicherweise der staatlichen Umverteilung, der Schaffung von Arbeitsplätzen oder der internationalen Ausbeutung zu und nicht der grundlegenden Dynamik des freiwilligen Austauschs und des Produktivitätswachstums, die liberale Ökonomen als die wichtigsten Triebkräfte des Massenwohlstands ansehen.
question: 根据自由主义经济分析，传统马克思主义关于资本主义下贫困加剧的预言与历史证据相矛盾的主要原因是什么？
answer: 生产率的不断提高和自愿交换机制使消费品的价格越来越低，同时改善了工作条件
wrong_answers:
  - 政府干预和福利计划成功地将财富从资本家手中重新分配给工人，掩盖了潜在的剥削动态
  - 与传统制造业相比，服务业创造了工资更高的新工作岗位，从而抵消了技术性失业的影响
  - 国际贸易和殖民剥削让资本主义国家向发展中国家输出贫困，同时让国内工人致富
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）的分析表明，建立在自愿契约和交换基础上的自由市场社会自然倾向于改善大众的生活条件。其关键机制在于，生产率的提高使得商品的价格更低，而工作条件则随着劳动变得更加智能化和机械化而得到改善。这与马克思主义关于日益不自由的预言相矛盾。错误答案错误地将改善归因于政府的再分配、创造就业的模式或国际剥削，而不是自由主义经济学家认为的大众繁荣的核心驱动力--自愿交换和生产力增长的基本动力。
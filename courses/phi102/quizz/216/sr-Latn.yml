question: Prema liberalnoj ekonomskoj analizi, koji je primarni razlog zbog kojeg su tradicionalne marksističke predikcije o rastućem siromaštvu pod kapitalizmom opovrgnute istorijskim dokazima?
answer: Kontinuirano unapređenje produktivnosti i mehanizama dobrovoljne razmene čine potrošačke proizvode sve dostupnijim po nižim cenama, dok poboljšavaju uslove rada.
wrong_answers:
  - Vladina intervencija i programi socijalne pomoći uspešno su preraspodelili bogatstvo sa kapitalista na radnike, prikrivajući osnovnu dinamiku eksploatacije.
  - Tehnološka nezaposlenost je nadoknađena stvaranjem novih radnih mesta u sektoru usluga koja pružaju bolje plate od tradicionalnog zapošljavanja u proizvodnji.
  - Međunarodna trgovina i kolonijalna eksploatacija omogućile su kapitalističkim nacijama da izvezu svoje siromaštvo u zemlje u razvoju, dok istovremeno obogaćuju domaće radnike.
explanation: |
  Analiza Paula Leroy-Beaulieua pokazuje da društva slobodnog tržišta zasnovana na dobrovoljnim ugovorima i razmeni prirodno teže ka poboljšanju uslova za mase. Ključni mehanizam je da poboljšanja produktivnosti čine dobra dostupnim po nižim cenama, dok se radni uslovi poboljšavaju kako rad postaje intelektualniji i mehanizovaniji. Ovo je u suprotnosti sa marksističkim predviđanjima o rastućem osiromašenju. Pogrešni odgovori pogrešno pripisuju poboljšanja državnoj preraspodeli, obrascima kreiranja poslova ili međunarodnoj eksploataciji, umesto temeljnim dinamikama dobrovoljne razmene i rasta produktivnosti koje liberalni ekonomisti identifikuju kao glavne pokretače masovnog prosperiteta.
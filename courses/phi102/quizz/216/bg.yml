question: Според либералния икономически анализ коя е основната причина, поради която традиционните марксистки прогнози за нарастваща бедност в условията на капитализъм са опровергани от историческите доказателства?
answer: Непрекъснатото подобряване на производителността и механизмите за доброволен обмен правят потребителските стоки все по-достъпни на по-ниски цени, като същевременно подобряват условията на труд
wrong_answers:
  - Държавната намеса и програмите за социално подпомагане успешно преразпределят богатството от капиталистите към работниците, прикривайки основната динамика на експлоатация
  - Технологичната безработица се компенсира от създаването на нови работни места в сектора на услугите, които осигуряват по-добро заплащане от традиционната заетост в производството
  - Международната търговия и колониалната експлоатация са позволили на капиталистическите държави да изнасят бедността си в развиващите се страни, като същевременно обогатяват местните работници
explanation: |
  Анализът на Пол Леруа-Божо показва, че обществата на свободния пазар, основани на доброволни договори и размяна, естествено се стремят към подобряване на условията за масите. Основният механизъм е, че подобряването на производителността прави стоките достъпни на по-ниски цени, а условията на труд се подобряват, тъй като трудът става по-интелектуален и механизиран. Това противоречи на марксистките прогнози за нарастваща немотия. Неправилните отговори неправилно приписват подобренията на правителственото преразпределение, моделите за създаване на работни места или международната експлоатация, а не на фундаменталната динамика на доброволната размяна и ръста на производителността, които либералните икономисти определят като основни двигатели на масовия просперитет.
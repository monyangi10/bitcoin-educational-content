question: Jaký je podle liberální ekonomické analýzy hlavní důvod, proč jsou tradiční marxistické předpovědi o rostoucí chudobě v kapitalismu v rozporu s historickými důkazy?
answer: Neustálé zvyšování produktivity a mechanismy dobrovolné výměny umožňují stále větší dostupnost spotřebního zboží za nižší ceny a zároveň zlepšují pracovní podmínky
wrong_answers:
  - Vládní zásahy a sociální programy úspěšně přerozdělily bohatství od kapitalistů k zaměstnancům, čímž zamaskovaly základní dynamiku vykořisťování
  - Technologická nezaměstnanost byla kompenzována vytvořením nových pracovních míst v sektoru služeb, která poskytují lepší mzdy než tradiční zaměstnání ve výrobě
  - Mezinárodní obchod a koloniální vykořisťování umožnily kapitalistickým zemím vyvážet chudobu do rozvojových zemí a zároveň obohacovat domácí pracovníky
explanation: |
  Analýza Paula Leroy-Beaulieua ukazuje, že společnosti volného trhu založené na dobrovolných smlouvách a směně přirozeně směřují ke zlepšení podmínek pro masy. Klíčový mechanismus spočívá v tom, že díky zvyšování produktivity je zboží dostupné za nižší ceny a pracovní podmínky se zlepšují s tím, jak se práce stává intelektuálnější a mechanizovanější. To je v rozporu s marxistickými předpověďmi o rostoucím zneuznání. Nesprávné odpovědi nesprávně přisuzují zlepšení vládnímu přerozdělování, modelům vytváření pracovních míst nebo mezinárodnímu vykořisťování, a nikoli základní dynamice dobrovolné směny a růstu produktivity, které liberální ekonomové označují za hlavní faktory masové prosperity.
question: Según el análisis económico liberal, ¿cuál es la razón principal por la que las predicciones marxistas tradicionales sobre el aumento de la pobreza en el capitalismo han sido desmentidas por la evidencia histórica?
answer: La mejora continua de la productividad y los mecanismos de intercambio voluntario hacen que los bienes de consumo sean cada vez más accesibles a precios más bajos, al tiempo que mejoran las condiciones de trabajo
wrong_answers:
  - La intervención gubernamental y los programas de bienestar han logrado redistribuir la riqueza de los capitalistas a los trabajadores, enmascarando la dinámica de explotación subyacente
  - El desempleo tecnológico se ha visto compensado por la creación de nuevos empleos en el sector servicios que ofrecen mejores salarios que el empleo tradicional en la industria manufacturera
  - El comercio internacional y la explotación colonial han permitido a las naciones capitalistas exportar su pobreza a los países en desarrollo, enriqueciendo al mismo tiempo a los trabajadores nacionales
explanation: |
  El análisis de Paul Leroy-Beaulieu demuestra que las sociedades de libre mercado basadas en contratos e intercambios voluntarios tienden naturalmente a mejorar las condiciones de las masas. El mecanismo clave es que las mejoras en la productividad hacen que los bienes sean accesibles a precios más bajos, mientras que las condiciones de trabajo mejoran a medida que la mano de obra se vuelve más intelectual y mecanizada. Esto contradice las predicciones marxistas de creciente inmiseración. Las respuestas erróneas atribuyen incorrectamente las mejoras a la redistribución gubernamental, a los modelos de creación de empleo o a la explotación internacional, en lugar de a la dinámica fundamental del intercambio voluntario y el crecimiento de la productividad que los economistas liberales identifican como los motores centrales de la prosperidad de las masas.
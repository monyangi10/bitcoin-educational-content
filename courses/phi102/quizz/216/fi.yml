question: Mikä on liberaalin talousanalyysin mukaan tärkein syy siihen, että perinteiset marxilaiset ennusteet köyhyyden lisääntymisestä kapitalismissa ovat olleet ristiriidassa historiallisten todisteiden kanssa?
answer: Tuottavuuden jatkuva parantuminen ja vapaaehtoiset vaihtomekanismit tekevät kulutustavaroista yhä edullisempia ja parantavat samalla työoloja
wrong_answers:
  - Hallituksen väliintulo ja hyvinvointiohjelmat ovat onnistuneesti jakaneet varallisuutta uudelleen kapitalisteilta työntekijöille, mikä on peittänyt taustalla olevan riiston dynamiikan
  - Teknologista työttömyyttä on kompensoitu luomalla uusia palvelualan työpaikkoja, jotka tarjoavat parempaa palkkaa kuin perinteiset teollisuustyöpaikat
  - Kansainvälinen kauppa ja siirtomaahyödyntäminen ovat mahdollistaneet sen, että kapitalistiset kansakunnat ovat voineet viedä köyhyyttään kehitysmaihin ja rikastuttaa samalla kotimaisia työntekijöitä
explanation: |
  Paul Leroy-Beaulieun analyysi osoittaa, että vapaat markkinayhteiskunnat, jotka perustuvat vapaaehtoisiin sopimuksiin ja vaihtoon, pyrkivät luonnollisesti parantamaan massojen oloja. Keskeinen mekanismi on se, että tuottavuuden parantuminen tekee tavaroista halvempia ja työolot paranevat, kun työ muuttuu älyllisemmäksi ja koneellistuu. Tämä on ristiriidassa marxilaisten ennusteiden kanssa, joiden mukaan köyhyys lisääntyy. Väärissä vastauksissa parannukset johtuvat virheellisesti hallituksen uudelleenjaosta, työpaikkojen luomisesta tai kansainvälisestä hyväksikäytöstä sen sijaan, että ne johtuisivat vapaaehtoisen vaihdon ja tuottavuuden kasvun perustavanlaatuisesta dynamiikasta, jonka liberaalit taloustieteilijät määrittelevät massojen vaurauden keskeisiksi ajureiksi.
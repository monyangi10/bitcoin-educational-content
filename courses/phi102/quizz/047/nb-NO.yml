question: Hva var den viktigste grunnen til at det var umulig å etablere privat eiendomsrett til jord i forhistoriske samfunn?
answer: Produktive aktiviteter som jakt og sanking krevde nomadisk bruk av store fellesområder
wrong_answers:
  - Religiøs tro forbød individuelt eierskap og påla kollektiv åndelig tilknytning til jorda
  - Politiske ledere forhindret bevisst privat eierskap for å opprettholde sin absolutte kontroll over ressursene
  - Mangel på skriftspråk gjorde det umulig å lage juridiske dokumenter som fastslo eiendomsretten
explanation: |
  Ifølge kapittelet var privat eiendomsrett til land umulig i forhistoriske samfunn på grunn av praktiske, materielle begrensninger. Aktiviteter som bisonjakt, fiske og sanking krevde nomadisk forflytning over svært store territorier - man kunne ikke jakte effektivt på en liten, avgrenset jordflekk. Kollektiv eiendom var ikke et ideologisk valg, men en rasjonell tilpasning til hvordan folk måtte leve og arbeide for å overleve. De andre alternativene antyder feilaktig religiøse, politiske eller juridiske grunner snarere enn disse grunnleggende økonomiske nødvendighetene.
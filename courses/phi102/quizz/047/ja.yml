question: 有史以前の社会で、土地の私有財産を確立することができなかった主な理由は何だったのか？
answer: 狩猟や採集のような生産活動は、広大な共有スペースを遊牧する必要があった。
wrong_answers:
  - 宗教的信念は個人の所有権を禁じ、土地との集団的な精神的つながりを義務づけていた。
  - 政治指導者たちは、資源に対する絶対的な支配を維持するために、意図的に私的所有権を阻止した。
  - 文字がないため、所有権を確立する法的文書を作成することができなかった。
explanation: |
  この章によれば、先史時代の社会では、現実的な物質的制約から土地の私有は不可能だった。バイソンの狩猟、漁労、採集といった活動は、非常に広大な領土を遊牧しながら移動する必要があった。集団所有はイデオロギー的な選択ではなく、人々が生き残るためにどのように生活し、働かなければならなかったかという現実への合理的な適応だったのだ。他の選択肢は、このような根本的な経済的必要性ではなく、宗教的、政治的、法的な理由を誤って示唆している。
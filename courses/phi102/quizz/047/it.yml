question: Qual era la ragione principale per cui nelle società preistoriche era impossibile stabilire la proprietà privata della terra?
answer: Attività produttive come la caccia e la raccolta richiedevano l'uso nomade di vasti spazi comuni
wrong_answers:
  - Le credenze religiose vietavano la proprietà individuale e imponevano un legame spirituale collettivo con la terra
  - I leader politici hanno deliberatamente impedito la proprietà privata per mantenere il controllo assoluto sulle risorse
  - La mancanza di una lingua scritta ha reso impossibile la creazione di documenti legali che stabiliscano i diritti di proprietà
explanation: |
  Secondo il capitolo, la proprietà privata della terra era impossibile nelle società preistoriche a causa di vincoli materiali pratici. Attività come la caccia al bisonte, la pesca e la raccolta richiedevano spostamenti nomadi su territori molto vasti: non si poteva cacciare in modo efficace su un piccolo appezzamento di terra recintato. La proprietà collettiva non era una scelta ideologica, ma un adattamento razionale alla realtà di come le persone dovevano vivere e lavorare per sopravvivere. Le altre opzioni suggeriscono erroneamente ragioni religiose, politiche o legali piuttosto che queste necessità economiche fondamentali.
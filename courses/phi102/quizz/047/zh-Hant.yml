question: 史前社會無法建立土地私有財產的主要原因是什麼？
answer: 狩獵和採集等生產活動需要游牧民族使用廣闊的公共空間
wrong_answers:
  - 宗教信仰禁止個人擁有權，並強制規定與土地的集體精神連結
  - 政治領袖刻意阻止私人擁有，以維持對資源的絕對控制
  - 由於缺乏書面語言，因此無法製作確立所有權的法律文件
explanation: |
  根據本章所述，由於實際的物質限制，史前社會不可能擁有私人土地財產。狩獵野牛、捕魚和採集等活動需要在非常廣闊的領土上進行遊牧活動 - 你無法在一小塊封閉的土地上進行有效的狩獵。集體財產並不是一種意識形態的選擇，而是一種理性的調整，以適應人們為了生存而必須生活和工作的現實。其他選擇錯誤地暗示了宗教、政治或法律上的原因，而非這些基本的經濟需要。
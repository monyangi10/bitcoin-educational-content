question: Quelle est la principale raison pour laquelle la propriété privée de la terre n'a pas pu être établie dans les sociétés préhistoriques ?
answer: Les activités productives telles que la chasse et la cueillette nécessitaient l'utilisation nomade de vastes espaces communs
wrong_answers:
  - Les croyances religieuses interdisent la propriété individuelle et imposent un lien spirituel collectif avec la terre
  - Les dirigeants politiques ont délibérément empêché la propriété privée afin de maintenir leur contrôle absolu sur les ressources
  - L'absence de langue écrite a rendu impossible la création de documents juridiques établissant les droits de propriété
explanation: |
  Selon le chapitre, la propriété privée de la terre était impossible dans les sociétés préhistoriques en raison de contraintes matérielles pratiques. Des activités telles que la chasse au bison, la pêche et la cueillette nécessitaient des déplacements nomades sur de très vastes territoires - il n'était pas possible de chasser efficacement sur une petite parcelle de terre clôturée. La propriété collective n'était pas un choix idéologique, mais une adaptation rationnelle aux réalités de la vie et du travail pour survivre. Les autres options suggèrent à tort des raisons religieuses, politiques ou juridiques plutôt que ces nécessités économiques fondamentales.
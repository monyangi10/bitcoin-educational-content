question: Mis oli peamine põhjus, miks maa eraomandit ei olnud võimalik luua eelajaloolistes ühiskondades?
answer: Tootlik tegevus, nagu jahipidamine ja kogumine, nõudis suurte ühisruumide nomaadilist kasutamist
wrong_answers:
  - Religioossed uskumused keelasid individuaalse omandiõiguse ja kohustasid kollektiivset vaimset sidet maaga
  - Poliitilised juhid takistasid tahtlikult eraomandit, et säilitada oma absoluutset kontrolli ressursside üle
  - Kirjakeele puudumine tegi võimatuks juriidiliste dokumentide koostamise, millega kehtestati omandiõigused
explanation: |
  Peatüki kohaselt oli maa eraomand eelajaloolistes ühiskondades praktiliste materiaalsete piirangute tõttu võimatu. Sellised tegevused nagu piisonijaht, kalapüük ja kogumine nõudsid nomaadilist liikumist väga suurtel territooriumidel - väikesel suletud maatükil ei saanud tõhusalt jahti pidada. Kollektiivne omandiõigus ei olnud ideoloogiline valik, vaid ratsionaalne kohandumine reaalsusega, kuidas inimesed pidid elama ja töötama, et ellu jääda. Teised valikud viitavad ekslikult pigem religioossetele, poliitilistele või õiguslikele põhjustele kui nendele fundamentaalsetele majanduslikele vajadustele.
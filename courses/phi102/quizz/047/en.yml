question: What was the primary reason why private property of land was impossible to establish in prehistoric societies?
answer: Productive activities like hunting and gathering required nomadic use of vast common spaces
wrong_answers:
  - Religious beliefs prohibited individual ownership and mandated collective spiritual connection to land
  - Political leaders deliberately prevented private ownership to maintain their absolute control over resources
  - Lack of written language made it impossible to create legal documents establishing ownership rights
explanation: |
  According to the chapter, private property of land was impossible in prehistoric societies due to practical material constraints. Activities like hunting bison, fishing, and gathering required nomadic movement across very large territories - you couldn't hunt effectively on a small enclosed plot of land. Collective property wasn't an ideological choice but a rational adaptation to the realities of how people had to live and work to survive. The other options incorrectly suggest religious, political, or legal reasons rather than these fundamental economic necessities.

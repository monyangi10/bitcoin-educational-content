question: ¿Cuál fue la razón principal por la que la propiedad privada de la tierra fue imposible de establecer en las sociedades prehistóricas?
answer: Actividades productivas como la caza y la recolección exigían el uso nómada de vastos espacios comunes
wrong_answers:
  - Las creencias religiosas prohibían la propiedad individual y exigían una conexión espiritual colectiva con la tierra
  - Los dirigentes políticos impidieron deliberadamente la propiedad privada para mantener su control absoluto sobre los recursos
  - La falta de lenguaje escrito imposibilitó la creación de documentos legales que establecieran los derechos de propiedad
explanation: |
  Según el capítulo, la propiedad privada de la tierra era imposible en las sociedades prehistóricas debido a limitaciones materiales prácticas. Actividades como la caza del bisonte, la pesca y la recolección exigían desplazamientos nómadas por territorios muy extensos: no se podía cazar con eficacia en una pequeña parcela cerrada. La propiedad colectiva no era una opción ideológica, sino una adaptación racional a la realidad de cómo la gente tenía que vivir y trabajar para sobrevivir. Las otras opciones sugieren erróneamente razones religiosas, políticas o jurídicas, más que estas necesidades económicas fundamentales.
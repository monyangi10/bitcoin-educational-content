question: Ni sababu gani kuu kwa nini umiliki wa ardhi binafsi haukuwezekana katika jamii za kale?
answer: Shughuli za uzalishaji kama vile uwindaji na ukusanyaji zilihitaji matumizi ya kuhamahama ya nafasi kubwa za pamoja
wrong_answers:
  - Imani za kidini zilikataza umiliki wa mtu binafsi na uhusiano wa kiroho wa pamoja ulioamriwa na ardhi
  - Viongozi wa kisiasa walizuia kwa makusudi umiliki binafsi ili kudumisha udhibiti wao kamili wa rasilimali
  - Ukosefu wa lugha iliyoandikwa ulisababisha kutowezekana kwa uundaji wa hati za kisheria zinazothibitisha haki za umiliki
explanation: |
  Kulingana na sura hiyo, mali ya kibinafsi ya ardhi haikuwezekana katika jamii za kale kutokana na vikwazo vya kimwili. Shughuli kama vile uwindaji wa nyati, uvuvi, na kukusanya zilihitaji harakati za kuhamahama katika maeneo makubwa sana - usingeweza kuwinda kwa ufanisi kwenye eneo dogo lililofungwa. Mali ya pamoja haikuwa chaguo la kiitikadi bali marekebisho ya busara kwa uhalisia wa jinsi watu walivyopaswa kuishi na kufanya kazi ili kuishi. Chaguzi zingine zinaonyesha vibaya sababu za kidini, kisiasa, au kisheria badala ya mahitaji haya ya msingi ya kiuchumi.
question: Vad var det främsta skälet till att privat äganderätt till mark var omöjlig att etablera i förhistoriska samhällen?
answer: Produktiva aktiviteter som jakt och samlande krävde nomadiskt utnyttjande av stora gemensamma utrymmen
wrong_answers:
  - Religiösa övertygelser förbjöd individuellt ägande och föreskrev kollektiv andlig koppling till mark
  - Politiska ledare förhindrade medvetet privat ägande för att behålla sin absoluta kontroll över resurserna
  - Bristen på skriftspråk gjorde det omöjligt att skapa juridiska dokument som fastställde äganderätten
explanation: |
  Enligt kapitlet var privat ägande av mark omöjligt i förhistoriska samhällen på grund av praktiska materiella begränsningar. Aktiviteter som bisonjakt, fiske och samlande krävde nomadiska rörelser över mycket stora territorier - du kunde inte jaga effektivt på en liten sluten tomt. Kollektiv egendom var inte ett ideologiskt val utan en rationell anpassning till hur människor var tvungna att leva och arbeta för att överleva. De andra alternativen antyder felaktigt religiösa, politiska eller juridiska skäl snarare än dessa grundläggande ekonomiska nödvändigheter.
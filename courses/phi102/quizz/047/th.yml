question: เหตุผลหลักที่ทำให้การเป็นเจ้าของที่ดินส่วนตัวเป็นไปไม่ได้ในสังคมก่อนประวัติศาสตร์คืออะไร?
answer: กิจกรรมที่ก่อให้เกิดผลผลิต เช่น การล่าสัตว์และการเก็บรวบรวม จำเป็นต้องใช้พื้นที่ส่วนรวมขนาดใหญ่ในการเคลื่อนย้ายแบบเร่ร่อน
wrong_answers:
  - ความเชื่อทางศาสนาห้ามการเป็นเจ้าของส่วนบุคคลและกำหนดให้มีการเชื่อมโยงทางจิตวิญญาณร่วมกันกับแผ่นดิน
  - ผู้นำทางการเมืองจงใจป้องกันการเป็นเจ้าของทรัพย์สินส่วนตัวเพื่อรักษาการควบคุมทรัพยากรอย่างเบ็ดเสร็จ
  - การขาดภาษาที่เป็นลายลักษณ์อักษรทำให้ไม่สามารถสร้างเอกสารทางกฎหมายที่กำหนดสิทธิ์ความเป็นเจ้าของได้
explanation: |
  ตามบทนี้ ทรัพย์สินส่วนตัวของที่ดินเป็นไปไม่ได้ในสังคมก่อนประวัติศาสตร์เนื่องจากข้อจำกัดทางวัตถุที่เป็นรูปธรรม กิจกรรมต่างๆ เช่น การล่าบัฟฟาโล การตกปลา และการเก็บเกี่ยว จำเป็นต้องมีการเคลื่อนที่แบบเร่ร่อนข้ามดินแดนขนาดใหญ่ - คุณไม่สามารถล่าได้อย่างมีประสิทธิภาพบนที่ดินขนาดเล็กที่ถูกล้อมรั้วไว้ ทรัพย์สินร่วมกันไม่ใช่ทางเลือกทางอุดมการณ์ แต่เป็นการปรับตัวอย่างมีเหตุผลต่อความเป็นจริงของวิธีที่ผู้คนต้องใช้ชีวิตและทำงานเพื่อความอยู่รอด ตัวเลือกอื่นๆ นั้นผิดพลาดที่แนะนำเหตุผลทางศาสนา การเมือง หรือกฎหมาย แทนที่จะเป็นความจำเป็นทางเศรษฐกิจพื้นฐานเหล่านี้
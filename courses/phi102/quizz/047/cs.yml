question: Co bylo hlavním důvodem, proč v pravěkých společnostech nebylo možné zavést soukromé vlastnictví půdy?
answer: Produktivní činnosti jako lov a sběr vyžadovaly kočovné využívání rozsáhlých společných prostor
wrong_answers:
  - Náboženská víra zakazovala individuální vlastnictví a nařizovala kolektivní duchovní spojení s půdou
  - Političtí vůdci záměrně bránili soukromému vlastnictví, aby si udrželi absolutní kontrolu nad zdroji
  - Nedostatek spisovného jazyka znemožnil vytvoření právních dokumentů zakládajících vlastnická práva
explanation: |
  Podle této kapitoly bylo soukromé vlastnictví půdy v pravěkých společnostech nemožné kvůli praktickým materiálním omezením. Činnosti jako lov bizonů, rybolov a sběr vyžadovaly kočovný pohyb po velmi rozsáhlých územích - na malém uzavřeném pozemku nebylo možné efektivně lovit. Kolektivní vlastnictví nebylo ideologickou volbou, ale racionálním přizpůsobením se realitě, v níž lidé museli žít a pracovat, aby přežili. Ostatní možnosti nesprávně naznačují spíše náboženské, politické nebo právní důvody než tyto základní ekonomické potřeby.
question: Tarih öncesi toplumlarda özel toprak mülkiyetinin tesis edilememesinin başlıca nedeni neydi?
answer: Avcılık ve toplayıcılık gibi üretken faaliyetler, geniş ortak alanların göçebe olarak kullanılmasını gerektiriyordu
wrong_answers:
  - Dini inançlar bireysel mülkiyeti yasaklamış ve toprakla kolektif manevi bağı zorunlu kılmıştır
  - Siyasi liderler, kaynaklar üzerindeki mutlak kontrollerini sürdürmek için özel mülkiyeti kasıtlı olarak engellediler
  - Yazılı dilin olmaması, mülkiyet haklarını belirleyen yasal belgelerin oluşturulmasını imkansız hale getirmiştir
explanation: |
  Bu bölüme göre, tarih öncesi toplumlarda pratik maddi kısıtlamalar nedeniyle toprağın özel mülkiyeti mümkün değildi. Bizon avlamak, balık tutmak ve toplayıcılık gibi faaliyetler çok geniş topraklarda göçebe hareket etmeyi gerektiriyordu - küçük, kapalı bir arazide etkili bir şekilde avlanamazdınız. Kolektif mülkiyet ideolojik bir tercih değil, insanların hayatta kalmak için nasıl yaşamak ve çalışmak zorunda olduklarına dair gerçeklere rasyonel bir adaptasyondu. Diğer seçenekler, bu temel ekonomik gerekliliklerden ziyade yanlış bir şekilde dini, siyasi veya yasal nedenleri akla getirmektedir.
question: Jaký významný historický vývoj zavedl mírovou výrobu a umožnil akumulaci nadbytečných zdrojů?
answer: Zrod zemědělství
wrong_answers:
  - Vynález parního stroje
  - Rozvoj mezinárodního obchodu
  - Objevení nových kontinentů
explanation: |
  Zrod zemědělství představuje zásadní zlom v dějinách lidstva, neboť zavedlo mírové výrobní metody, které poprvé umožnily společnostem hromadit přebytečné zdroje. Tato zemědělská revoluce umožnila rozvoj obchodu, smluvních vztahů a postupný odklon od kolektivního života zaměřeného na přežití k individuální autonomii. Zatímco parní stroj, mezinárodní obchod a kontinentální objevy byly důležitým pozdějším vývojem, zemědělství bylo základní změnou, která umožnila akumulaci přebytků a mírovou směnu a připravila půdu pro veškerý následný hospodářský a sociální pokrok směrem k větší lidské svobodě.
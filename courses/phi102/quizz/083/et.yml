question: Milline suur ajalooline areng tõi kaasa rahumeelse tootmise ja võimaldas ressursside ülejäägi kogumist?
answer: Põllumajanduse sündi
wrong_answers:
  - Aurumasinate leiutamine
  - Rahvusvahelise kaubanduse areng
  - Uute kontinentide avastamine
explanation: |
  Põllumajanduse tekkimine kujutab endast olulist pöördepunkti inimkonna ajaloos, kuna see tõi kaasa rahumeelsed tootmismeetodid, mis võimaldasid esimest korda ühiskonnal koguda ressursside ülejääke. See põllumajanduslik revolutsioon võimaldas arendada kaubandust, lepingulisi suhteid ja järkjärgulist liikumist ellujäämisele suunatud kollektiivsest eluviisist individuaalse autonoomia suunas. Kuigi aurumasin, rahvusvaheline kaubandus ja kontinentaalsed avastused olid olulised hilisemad arengud, oli põllumajandus põhiline muutus, mis tegi võimalikuks ülejääkide kogumise ja rahumeelse vahetuse, luues eeldused kogu hilisemale majanduslikule ja sotsiaalsele arengule suurema inimvabaduse suunas.
question: Jaki ważny rozwój historyczny wprowadził pokojową produkcję i umożliwił akumulację nadwyżek zasobów?
answer: Narodziny rolnictwa
wrong_answers:
  - Wynalezienie silnika parowego
  - Rozwój handlu międzynarodowego
  - Odkrycie nowych kontynentów
explanation: |
  Narodziny rolnictwa stanowią fundamentalny punkt zwrotny w historii ludzkości, wprowadzając pokojowe metody produkcji, które po raz pierwszy umożliwiły społeczeństwom gromadzenie nadwyżek zasobów. Ta rewolucja rolnicza umożliwiła rozwój handlu, relacji umownych i stopniowe odchodzenie od kolektywnego życia skoncentrowanego na przetrwaniu w kierunku indywidualnej autonomii. Podczas gdy silnik parowy, handel międzynarodowy i odkrycia kontynentalne były ważnymi późniejszymi wydarzeniami, rolnictwo było fundamentalną zmianą, która umożliwiła akumulację nadwyżek i pokojową wymianę, ustanawiając scenę dla całego późniejszego postępu gospodarczego i społecznego w kierunku większej ludzkiej wolności.
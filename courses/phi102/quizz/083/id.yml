question: Perkembangan sejarah besar apa yang memperkenalkan produksi secara damai dan memungkinkan akumulasi sumber daya yang berlebih?
answer: Kelahiran pertanian
wrong_answers:
  - Penemuan mesin uap
  - Perkembangan perdagangan internasional
  - Penemuan benua baru
explanation: |
  Kelahiran pertanian merupakan titik balik fundamental dalam sejarah manusia dengan memperkenalkan metode produksi damai yang memungkinkan masyarakat untuk mengumpulkan sumber daya surplus untuk pertama kalinya. Revolusi pertanian ini memungkinkan pengembangan perdagangan, hubungan kontrak, dan pergerakan bertahap dari kehidupan kolektif yang berfokus pada kelangsungan hidup menuju otonomi individu. Meskipun mesin uap, perdagangan internasional, dan penemuan benua merupakan perkembangan penting di kemudian hari, pertanian merupakan perubahan mendasar yang memungkinkan akumulasi surplus dan pertukaran secara damai, yang menjadi dasar bagi semua kemajuan ekonomi dan sosial selanjutnya menuju kebebasan manusia yang lebih besar.
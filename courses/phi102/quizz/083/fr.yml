question: Quelle évolution historique majeure a introduit la production pacifique et permis l'accumulation de ressources excédentaires ?
answer: La naissance de l'agriculture
wrong_answers:
  - L'invention de la machine à vapeur
  - Le développement du commerce international
  - La découverte de nouveaux continents
explanation: |
  La naissance de l'agriculture représente un tournant fondamental dans l'histoire de l'humanité en introduisant des méthodes de production pacifiques qui ont permis aux sociétés d'accumuler des ressources excédentaires pour la première fois. Cette révolution agricole a permis le développement du commerce, des relations contractuelles et l'abandon progressif de la vie collective axée sur la survie au profit de l'autonomie individuelle. Si la machine à vapeur, le commerce international et les découvertes continentales ont été des développements ultérieurs importants, l'agriculture a été le changement fondamental qui a rendu possible l'accumulation de surplus et l'échange pacifique, préparant le terrain pour tous les progrès économiques et sociaux ultérieurs vers une plus grande liberté humaine.
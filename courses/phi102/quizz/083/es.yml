question: ¿Qué importante acontecimiento histórico introdujo la producción pacífica y permitió la acumulación de recursos excedentarios?
answer: El nacimiento de la agricultura
wrong_answers:
  - La invención de la máquina de vapor
  - El desarrollo del comercio internacional
  - El descubrimiento de nuevos continentes
explanation: |
  El nacimiento de la agricultura representa un punto de inflexión fundamental en la historia de la humanidad al introducir métodos de producción pacíficos que permitieron a las sociedades acumular excedentes de recursos por primera vez. Esta revolución agrícola permitió el desarrollo del comercio, las relaciones contractuales y el alejamiento gradual de la vida colectiva centrada en la supervivencia hacia la autonomía individual. Aunque la máquina de vapor, el comercio internacional y los descubrimientos continentales fueron importantes desarrollos posteriores, la agricultura fue el cambio fundacional que hizo posible la acumulación de excedentes y el intercambio pacífico, sentando las bases para todo el progreso económico y social posterior hacia una mayor libertad humana.
question: 平和的生産を導入し、余剰資源の蓄積を可能にした主要な歴史的発展は何か？
answer: 農業の誕生
wrong_answers:
  - 蒸気機関の発明
  - 国際商業の発展
  - 新大陸の発見
explanation: |
  農業の誕生は、社会が初めて余剰資源を蓄積できる平和的な生産方法を導入したことで、人類史の根本的な転換点となった。この農業革命によって、貿易や契約関係が発展し、生存に焦点を当てた集団生活から個人の自律へと徐々に移行していった。蒸気機関、国際商業、大陸発見はその後の重要な発展であったが、農業は余剰資源の蓄積と平和的な交換を可能にした基礎的な変化であり、より大きな人間の自由へと向かう、その後のすべての経済的・社会的進歩の舞台となった。
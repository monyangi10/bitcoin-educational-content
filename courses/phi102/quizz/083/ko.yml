question: 평화적 생산을 도입하고 잉여 자원의 축적을 가능하게 한 역사적 주요 발전은 무엇인가요?
answer: 농업의 탄생
wrong_answers:
  - 증기 기관의 발명
  - 국제 상거래의 발전
  - 새로운 대륙의 발견
explanation: |
  농업의 탄생은 사회가 처음으로 잉여 자원을 축적할 수 있는 평화로운 생산 방식을 도입함으로써 인류 역사에 근본적인 전환점을 마련한 사건입니다. 이 농업 혁명은 무역과 계약 관계의 발달을 가능하게 했고, 생존 중심의 집단 생활에서 점차 개인의 자율성을 지향하는 방향으로 나아갈 수 있게 했습니다. 증기기관, 국제 상업, 대륙 발견이 이후 중요한 발전이었지만, 농업은 잉여 축적과 평화적 교류를 가능하게 한 근본적인 변화였으며, 이후 모든 경제적, 사회적 진보가 더 큰 인간의 자유를 향한 발판을 마련했습니다.
question: Hangi büyük tarihsel gelişme barışçıl üretimi getirmiş ve artı kaynak birikimini mümkün kılmıştır?
answer: Tarımın doğuşu
wrong_answers:
  - Buhar makinesinin icadı
  - Uluslararası ticaretin gelişimi
  - Yeni kıtaların keşfi
explanation: |
  Tarımın doğuşu, toplumların ilk kez artı kaynak biriktirmesine olanak tanıyan barışçıl üretim yöntemlerini getirerek insanlık tarihinde temel bir dönüm noktasını temsil etmektedir. Bu tarım devrimi ticaretin, sözleşmeye dayalı ilişkilerin ve hayatta kalma odaklı kolektif yaşamdan bireysel özerkliğe doğru kademeli hareketin gelişmesini sağlamıştır. Buhar makinesi, uluslararası ticaret ve kıtasal keşifler daha sonraki önemli gelişmeler olsa da, tarım, fazla birikimi ve barışçıl mübadeleyi mümkün kılan ve daha fazla insan özgürlüğüne doğru sonraki tüm ekonomik ve sosyal ilerlemeler için zemin hazırlayan temel değişiklikti.
question: Welke belangrijke historische ontwikkeling introduceerde vreedzame productie en maakte de accumulatie van overschotten mogelijk?
answer: De geboorte van de landbouw
wrong_answers:
  - De uitvinding van de stoommachine
  - De ontwikkeling van de internationale handel
  - De ontdekking van nieuwe continenten
explanation: |
  Het ontstaan van de landbouw vormt een fundamenteel keerpunt in de geschiedenis van de mensheid door de introductie van vreedzame productiemethoden die samenlevingen voor het eerst in staat stelden om overschotten te accumuleren. Deze landbouwrevolutie maakte de ontwikkeling mogelijk van handel, contractuele relaties en een geleidelijke verschuiving van een op overleven gericht collectief leven naar individuele autonomie. Hoewel de stoommachine, internationale handel en ontdekkingen op het vasteland belangrijke latere ontwikkelingen waren, was de landbouw de fundamentele verandering die accumulatie van overschotten en vreedzame uitwisseling mogelijk maakte en de weg bereidde voor alle latere economische en sociale vooruitgang naar grotere menselijke vrijheid.
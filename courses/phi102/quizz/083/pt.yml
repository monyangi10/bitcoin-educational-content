question: Que desenvolvimento histórico importante introduziu a produção pacífica e permitiu a acumulação de recursos excedentários?
answer: O nascimento da agricultura
wrong_answers:
  - A invenção da máquina a vapor
  - O desenvolvimento do comércio internacional
  - A descoberta de novos continentes
explanation: |
  O nascimento da agricultura representa um ponto de viragem fundamental na história da humanidade ao introduzir métodos de produção pacíficos que permitiram às sociedades acumular recursos excedentários pela primeira vez. Esta revolução agrícola permitiu o desenvolvimento do comércio, das relações contratuais e o afastamento gradual da vida colectiva centrada na sobrevivência em direção à autonomia individual. Embora a máquina a vapor, o comércio internacional e as descobertas continentais tenham sido importantes desenvolvimentos posteriores, a agricultura foi a mudança fundamental que tornou possível a acumulação de excedentes e o intercâmbio pacífico, preparando o terreno para todo o progresso económico e social subsequente no sentido de uma maior liberdade humana.
question: Hvilken viktig historisk utvikling innførte fredelig produksjon og muliggjorde akkumulering av overskuddsressurser?
answer: Jordbrukets fødsel
wrong_answers:
  - Oppfinnelsen av dampmaskinen
  - Utviklingen av internasjonal handel
  - Oppdagelsen av nye kontinenter
explanation: |
  Jordbrukets fødsel representerer et fundamentalt vendepunkt i menneskehetens historie. For første gang ble det innført fredelige produksjonsmetoder som gjorde det mulig for samfunn å akkumulere overskuddsressurser. Denne jordbruksrevolusjonen muliggjorde utviklingen av handel, kontraktsforhold og en gradvis bevegelse bort fra et overlevelsesfokusert kollektivt liv mot individuell autonomi. Selv om dampmaskinen, internasjonal handel og kontinentale oppdagelser var viktige senere utviklingstrekk, var jordbruket den grunnleggende endringen som muliggjorde akkumulering av overskudd og fredelig utveksling, og som la grunnlaget for alle senere økonomiske og sosiale fremskritt i retning av større menneskelig frihet.
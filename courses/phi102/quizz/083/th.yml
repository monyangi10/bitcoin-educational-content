question: การพัฒนาทางประวัติศาสตร์ที่สำคัญใดที่นำไปสู่การผลิตอย่างสันติและทำให้สามารถสะสมทรัพยากรส่วนเกินได้?
answer: การเกิดขึ้นของเกษตรกรรม
wrong_answers:
  - การประดิษฐ์เครื่องจักรไอน้ำ
  - การพัฒนาการค้าระหว่างประเทศ
  - การค้นพบทวีปใหม่
explanation: |
  การเกิดขึ้นของเกษตรกรรมเป็นจุดเปลี่ยนพื้นฐานในประวัติศาสตร์มนุษย์ โดยการแนะนำวิธีการผลิตที่สงบสุขซึ่งทำให้สังคมสามารถสะสมทรัพยากรส่วนเกินได้เป็นครั้งแรก การปฏิวัติทางการเกษตรนี้ทำให้เกิดการพัฒนาการค้า ความสัมพันธ์ตามสัญญา และการเคลื่อนไหวอย่างค่อยเป็นค่อยไปจากการใช้ชีวิตร่วมกันที่มุ่งเน้นการอยู่รอดไปสู่ความเป็นอิสระของบุคคล แม้ว่าเครื่องจักรไอน้ำ การค้าระหว่างประเทศ และการค้นพบทวีปจะเป็นพัฒนาการที่สำคัญในภายหลัง แต่เกษตรกรรมเป็นการเปลี่ยนแปลงพื้นฐานที่ทำให้การสะสมส่วนเกินและการแลกเปลี่ยนอย่างสงบสุขเป็นไปได้ ซึ่งเป็นการวางรากฐานสำหรับความก้าวหน้าทางเศรษฐกิจและสังคมทั้งหมดที่ตามมาไปสู่เสรีภาพของมนุษย์ที่มากขึ้น
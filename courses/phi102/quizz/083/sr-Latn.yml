question: Koji je glavni istorijski razvoj uveo mirnodopsku proizvodnju i omogućio akumulaciju viška resursa?
answer: Rađanje poljoprivrede
wrong_answers:
  - Pronalaženje parne mašine
  - Razvoj međunarodne trgovine
  - Otkrivanje novih kontinenata
explanation: |
  Rođenje poljoprivrede predstavlja fundamentalnu prekretnicu u ljudskoj istoriji uvođenjem mirnih metoda proizvodnje koje su omogućile društvima da po prvi put akumuliraju višak resursa. Ova poljoprivredna revolucija omogućila je razvoj trgovine, ugovornih odnosa i postepeno udaljavanje od kolektivnog života usmerenog na preživljavanje ka individualnoj autonomiji. Iako su parna mašina, međunarodna trgovina i kontinentalna otkrića bili važni kasniji razvojni događaji, poljoprivreda je bila osnovna promena koja je omogućila akumulaciju viška i mirnu razmenu, postavljajući temelje za sav kasniji ekonomski i društveni napredak ka većoj ljudskoj slobodi.
question: کدام تحول تاریخی عمده تولید صلح‌آمیز را معرفی کرد و امکان انباشت منابع مازاد را فراهم ساخت؟
answer: تولد کشاورزی
wrong_answers:
  - اختراع موتور بخار
  - توسعه تجارت بین‌المللی
  - کشف قاره‌های جدید
explanation: |
  تولد کشاورزی نقطه عطف اساسی در تاریخ بشر را نشان می‌دهد که با معرفی روش‌های تولید صلح‌آمیز، به جوامع اجازه داد برای اولین بار منابع مازاد را انباشته کنند. این انقلاب کشاورزی توسعه تجارت، روابط قراردادی و حرکت تدریجی از زندگی جمعی متمرکز بر بقا به سوی خودمختاری فردی را ممکن ساخت. در حالی که موتور بخار، تجارت بین‌المللی و اکتشافات قاره‌ای تحولات مهمی در مراحل بعدی بودند، کشاورزی تغییر بنیادی بود که انباشت مازاد و تبادل صلح‌آمیز را ممکن ساخت و زمینه را برای تمام پیشرفت‌های اقتصادی و اجتماعی بعدی به سوی آزادی بیشتر انسان فراهم کرد.
question: Кое важно историческо развитие въвежда мирното производство и дава възможност за натрупване на излишни ресурси?
answer: Раждането на земеделието
wrong_answers:
  - Изобретяването на парната машина
  - Развитието на международната търговия
  - Откриването на нови континенти
explanation: |
  Възникването на земеделието представлява фундаментална повратна точка в човешката история, тъй като въвежда мирни методи на производство, които за първи път позволяват на обществата да натрупват излишни ресурси. Тази селскостопанска революция дава възможност за развитие на търговията, договорните отношения и постепенното преминаване от колективен живот, насочен към оцеляване, към индивидуална автономия. Макар парната машина, международната търговия и континенталните открития да са важни по-късни развития, земеделието е основополагащата промяна, която прави възможно натрупването на излишъци и мирния обмен, създавайки предпоставки за целия последващ икономически и социален напредък към по-голяма човешка свобода.
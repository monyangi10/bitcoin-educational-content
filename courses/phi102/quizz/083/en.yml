question: What major historical development introduced peaceful production and enabled the accumulation of surplus resources?
answer: The birth of agriculture
wrong_answers:
  - The invention of the steam engine
  - The development of international commerce
  - The discovery of new continents
explanation: |
  The birth of agriculture represents a fundamental turning point in human history by introducing peaceful production methods that allowed societies to accumulate surplus resources for the first time. This agricultural revolution enabled the development of trade, contractual relationships, and gradual movement away from survival-focused collective living toward individual autonomy. While the steam engine, international commerce, and continental discoveries were important later developments, agriculture was the foundational change that made surplus accumulation and peaceful exchange possible, setting the stage for all subsequent economic and social progress toward greater human freedom.

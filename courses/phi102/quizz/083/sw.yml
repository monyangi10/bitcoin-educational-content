question: Ni maendeleo gani makubwa ya kihistoria yaliyoanzisha uzalishaji wa amani na kuwezesha mkusanyiko wa rasilimali za ziada?
answer: Kuzaliwa kwa kilimo
wrong_answers:
  - Uvumbuzi wa injini ya mvuke
  - Maendeleo ya biashara ya kimataifa
  - Ugunduzi wa mabara mapya
explanation: |
  Kuzaliwa kwa kilimo kunawakilisha hatua muhimu katika historia ya binadamu kwa kuanzisha mbinu za uzalishaji wa amani ambazo ziliruhusu jamii kukusanya rasilimali za ziada kwa mara ya kwanza. Mapinduzi haya ya kilimo yaliwezesha maendeleo ya biashara, mahusiano ya kimkataba, na harakati za taratibu kutoka kwa maisha ya pamoja yanayolenga kuishi kuelekea uhuru wa mtu binafsi. Ingawa injini ya mvuke, biashara ya kimataifa, na uvumbuzi wa bara zilikuwa maendeleo muhimu baadaye, kilimo kilikuwa mabadiliko ya msingi yaliyowezesha mkusanyiko wa ziada na ubadilishanaji wa amani, na kuweka msingi wa maendeleo yote ya kiuchumi na kijamii yaliyofuata kuelekea uhuru mkubwa wa binadamu.
question: Vilken viktig historisk utveckling introducerade fredlig produktion och möjliggjorde ackumulering av överskottsresurser?
answer: Jordbrukets uppkomst
wrong_answers:
  - Uppfinningen av ångmaskinen
  - Utvecklingen av den internationella handeln
  - Upptäckten av nya kontinenter
explanation: |
  Jordbrukets födelse utgör en grundläggande vändpunkt i mänsklighetens historia genom att det introducerade fredliga produktionsmetoder som för första gången gjorde det möjligt för samhällen att ackumulera överskottsresurser. Denna jordbruksrevolution möjliggjorde utvecklingen av handel, avtalsförhållanden och en gradvis rörelse bort från ett överlevnadsfokuserat kollektivt liv mot individuell autonomi. Även om ångmaskinen, internationell handel och kontinentala upptäckter var viktiga senare utvecklingar, var jordbruket den grundläggande förändringen som möjliggjorde ackumulering av överskott och fredligt utbyte, vilket satte scenen för alla efterföljande ekonomiska och sociala framsteg mot större mänsklig frihet.
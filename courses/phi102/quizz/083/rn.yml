question: Ni ikintu gihambaye ikihe cabaye muri kahise catumye habaho uguhingura mu mahoro kandi kigatuma habaho ukwirundanira ubutunzi bwari busigaye?
answer: Ivuka ry'uburimyi .
wrong_answers:
  - Uguhingura moteri y'umwotsi
  - Iterambere ry'ubudandaji mpuzamakungu .
  - Kuvumbura imigabane mishasha
explanation: |
  Ivuka ry’uburimyi rigereranya ihinduka rikomeye cane muri kahise k’abantu mu gushiramwo uburyo bwo guhingura ibintu mu mahoro bwatumye imiryango ishobora kwirundanira ubutunzi bw’amasaranganya ku ncuro ya mbere. Iryo hinduka ry’uburimyi ryatumye habaho iterambere ry’ubudandaji, imigenderanire y’amasezerano, no kuva buhoro buhoro ku buzima rusangi bwibanda ku kurokoka, umuntu akaja ku kwigenga. Naho moteri y’umwotsi, ubudandaji mpuzamakungu, n’ivyo kuvumbura ku migabane vyari bihambaye mu nyuma, uburimyi bwari ihinduka ry’ishimikiro ryatumye ukwirundanira kw’amasaranganya n’uguhanahana amahoro bishoboka, bishiraho inzira y’iterambere ryose ry’ubutunzi n’imibano ryakurikiyeho ryerekeye umwidegemvyo mwinshi w’abantu.
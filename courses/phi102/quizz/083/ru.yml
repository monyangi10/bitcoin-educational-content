question: Какое крупное историческое событие привело к появлению мирного производства и позволило накапливать избыточные ресурсы?
answer: Зарождение сельского хозяйства
wrong_answers:
  - Изобретение парового двигателя
  - Развитие международной торговли
  - Открытие новых континентов
explanation: |
  Зарождение сельского хозяйства представляет собой фундаментальный поворотный момент в истории человечества, поскольку оно внедрило мирные методы производства, впервые позволившие обществу накапливать излишки ресурсов. Эта сельскохозяйственная революция позволила развить торговлю, договорные отношения и постепенно перейти от коллективной жизни, ориентированной на выживание, к индивидуальной автономии. Хотя паровая машина, международная торговля и континентальные открытия были важными последующими событиями, сельское хозяйство стало основополагающим изменением, которое сделало возможным накопление излишков и мирный обмен, заложив основу для всего последующего экономического и социального прогресса в направлении большей свободы человека.
question: Sự phát triển lịch sử quan trọng nào đã mở đường cho sản xuất hòa bình và tạo điều kiện cho việc tích lũy nguồn lực dư thừa?
answer: Sự ra đời của nông nghiệp
wrong_answers:
  - Sự phát minh ra động cơ hơi nước
  - Sự phát triển của thương mại quốc tế
  - Việc khám phá ra các lục địa mới
explanation: |
  Sự ra đời của nông nghiệp đánh dấu một bước ngoặt cơ bản trong lịch sử nhân loại, giới thiệu các phương pháp sản xuất hòa bình cho phép các xã hội tích lũy nguồn lực dư thừa lần đầu tiên. Cuộc cách mạng nông nghiệp này đã tạo điều kiện cho sự phát triển của thương mại, các mối quan hệ hợp đồng và sự chuyển dịch dần dần từ lối sống tập thể hướng đến sinh tồn sang quyền tự chủ cá nhân. Mặc dù động cơ hơi nước, thương mại quốc tế và việc khám phá các lục địa là những phát triển quan trọng sau này, nông nghiệp vẫn là sự thay đổi nền tảng giúp cho việc tích lũy nguồn lực dư thừa và trao đổi hòa bình trở nên khả thi, đặt nền móng cho tất cả những tiến bộ kinh tế và xã hội tiếp theo hướng tới tự do lớn hơn cho con người.
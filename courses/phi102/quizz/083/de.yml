question: Welche wichtige historische Entwicklung führte die friedliche Produktion ein und ermöglichte die Akkumulation von Überschussressourcen?
answer: Die Entstehung der Landwirtschaft
wrong_answers:
  - Die Erfindung der Dampfmaschine
  - Die Entwicklung des internationalen Handels
  - Die Entdeckung neuer Kontinente
explanation: |
  Die Entstehung der Landwirtschaft stellt einen grundlegenden Wendepunkt in der Geschichte der Menschheit dar, da sie friedliche Produktionsmethoden einführte, die es den Gesellschaften erstmals ermöglichten, überschüssige Ressourcen anzuhäufen. Diese landwirtschaftliche Revolution ermöglichte die Entwicklung des Handels, vertraglicher Beziehungen und die allmähliche Abkehr vom überlebensorientierten kollektiven Leben hin zur individuellen Autonomie. Während die Dampfmaschine, der internationale Handel und die Entdeckungen auf dem Kontinent wichtige spätere Entwicklungen waren, war die Landwirtschaft die grundlegende Veränderung, die die Anhäufung von Überschüssen und den friedlichen Austausch ermöglichte und damit die Voraussetzungen für alle nachfolgenden wirtschaftlichen und sozialen Fortschritte hin zu größerer menschlicher Freiheit schuf.
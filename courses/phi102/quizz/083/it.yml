question: Quale importante sviluppo storico ha introdotto la produzione pacifica e ha permesso l'accumulo di risorse in eccesso?
answer: La nascita dell'agricoltura
wrong_answers:
  - L'invenzione della macchina a vapore
  - Lo sviluppo del commercio internazionale
  - La scoperta di nuovi continenti
explanation: |
  La nascita dell'agricoltura rappresenta una svolta fondamentale nella storia dell'umanità, in quanto ha introdotto metodi di produzione pacifici che hanno permesso alle società di accumulare per la prima volta risorse in eccesso. Questa rivoluzione agricola ha permesso lo sviluppo del commercio, delle relazioni contrattuali e del graduale passaggio da una vita collettiva incentrata sulla sopravvivenza all'autonomia individuale. Mentre la macchina a vapore, il commercio internazionale e le scoperte continentali sono stati importanti sviluppi successivi, l'agricoltura è stata il cambiamento fondamentale che ha reso possibile l'accumulo di surplus e lo scambio pacifico, ponendo le basi per tutti i successivi progressi economici e sociali verso una maggiore libertà umana.
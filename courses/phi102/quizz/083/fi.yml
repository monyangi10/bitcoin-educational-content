question: Mikä merkittävä historiallinen kehitys johti rauhanomaiseen tuotantoon ja mahdollisti ylijäämävarojen kasautumisen?
answer: Maatalouden synty
wrong_answers:
  - Höyrykoneen keksiminen
  - Kansainvälisen kaupan kehitys
  - Uusien maanosien löytäminen
explanation: |
  Maatalouden synty edustaa perustavanlaatuista käännekohtaa ihmiskunnan historiassa, sillä se toi mukanaan rauhanomaisia tuotantomenetelmiä, joiden avulla yhteiskunnat pystyivät ensimmäistä kertaa keräämään ylijäämäresursseja. Maatalouden vallankumous mahdollisti kaupan ja sopimussuhteiden kehittymisen sekä asteittaisen siirtymisen pois selviytymiseen keskittyvästä kollektiivisesta elämästä kohti yksilön autonomiaa. Vaikka höyrykone, kansainvälinen kauppa ja mannermaiset löytöretket olivat tärkeitä myöhempiä kehityssuuntia, maatalous oli perustavanlaatuinen muutos, joka mahdollisti ylijäämän kasaamisen ja rauhanomaisen vaihdon ja loi pohjan kaikelle myöhemmälle taloudelliselle ja yhteiskunnalliselle kehitykselle kohti suurempaa inhimillistä vapautta.
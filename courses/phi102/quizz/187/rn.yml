question: Dushingiye ku nseguro y’ubwigenge yashikirijwe, ni igiki gituma ubusofisme butera akaga cane cane nk’intambamyi ku mwidegemvyo mu kibano?
answer: Bitanga imvo n’imvano y’ubwenge ku bijanye n’uburyo bwo kutagira umwidegemvyo mu gihe bishingiye ku vyiyumviro vyiza ariko bitari vyo .
wrong_answers:
  - Biremwa n’ibigirankana n’abanyaruyeri barondera gusenyura umwidegemvyo kugira ngo bironke inyungu zabo bwite .
  - Bigereranya amakosa ya kera yo muri filozofiya ubuhinga bw’ubutunzi bwo muri iki gihe bwahakanye ata gukeka biciye ku bimenyamenya vy’ukuri .
  - Biva ku mpengamiro y’umuntu yo guhitamwo umutekano kuruta umwidegemvyo mu bihe vy’ukudakeka kw’imibano .
explanation: |
  Ivyiyumviro vy’ubusofi birateye akaga canecane kubera ko bifatanya imigambi myiza n’ivyiyumviro bitari vyo, bikaba bituma haba imishinge y’ubwenge yemeza ko umuntu abuza umwidegemvyo. Mu buryo butandukanye n’ububisha bushingiye ku bushake, ubupfumu burabandanya kubera ko busa n’ububereye kandi bugaterwa imbere n’abantu bafise intumbero nziza. Ivyo bituma bigorana kubirwanya kuruta urwanko rutomoye ku mwidegemvyo, kuko vyiyoberanya nk’imvo z’ubwenge zibereye mu gihe mu vy’ukuri bihungabanya umwidegemvyo biciye mu makosa y’ivyiyumviro.
question: Was macht Sophismen nach der vorgestellten liberalen Analyse als Hindernisse für die Freiheit in der Gesellschaft besonders gefährlich?
answer: Sie liefern eine intellektuelle Rechtfertigung für Systeme der Unfreiheit, die zwar auf gut gemeinten, aber fehlerhaften Überlegungen beruhen
wrong_answers:
  - Sie werden absichtlich von böswilligen Akteuren geschaffen, die die Freiheit zu ihrem persönlichen Vorteil zerstören wollen
  - Sie stellen alte philosophische Irrtümer dar, die die moderne Wirtschaftswissenschaft durch empirische Beweise endgültig widerlegt hat
  - Sie ergeben sich aus der natürlichen menschlichen Tendenz, in Zeiten sozialer Unsicherheit die Sicherheit der Freiheit vorzuziehen
explanation: |
  Sophismen sind besonders gefährlich, weil sie gute Absichten mit fehlerhafter Argumentation verbinden und so intellektuelle Grundlagen schaffen, die Einschränkungen der Freiheit legitimieren. Anders als bewusste Böswilligkeit halten sich Sophismen hartnäckig, weil sie vernünftig erscheinen und von wohlmeinenden Menschen gefördert werden. Dadurch sind sie schwieriger zu bekämpfen als offene Freiheitsfeindlichkeit, da sie sich als legitime intellektuelle Argumente ausgeben, während sie in Wirklichkeit die Freiheit durch konzeptionelle Fehler untergraben.
question: Welke onderliggende economische realiteit maakt de overgang van preventieve regulering naar repressieve sanctionering bijzonder uitdagend voor gevestigde professionele monopolies?
answer: Gereglementeerde beroepen hebben institutionele barrières opgeworpen die bestaande beoefenaars beschermen tegen concurrentie, terwijl ze zich beroepen op de openbare veiligheid
wrong_answers:
  - De vraag van consumenten naar professionele diensten neemt natuurlijk af wanneer het regelgevend toezicht op gespecialiseerde industrieën wordt opgeheven
  - Marktmechanismen zijn inherent niet in staat om onderscheid te maken tussen competente en incompetente dienstverleners op complexe professionele gebieden
  - Beroepsverenigingen verliezen hun vermogen om kwaliteitsnormen te handhaven zonder door de overheid opgelegde vereisten voor licenties en certificering
explanation: |
  De tekst legt uit dat professionele regels zich vaak vestigen onder het mom van voorzorg en openbare veiligheid, waardoor er een 'tutelle' (voogdij) systeem ontstaat over hele takken van werk. Deze barrières raken verankerd omdat ze bestaande beroepsbeoefenaars bevoordelen door de concurrentie te beperken, terwijl ze de openbare veiligheid als rechtvaardiging gebruiken. De andere opties gaan ten onrechte uit van marktfalen of de noodzaak van regulerend toezicht, wat in tegenspraak is met het liberale principe dat repressieve systemen (die feitelijke schade bestraffen) superieur zijn aan preventieve (die de activiteit vooraf beperken).
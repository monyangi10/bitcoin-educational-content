question: Welche wirtschaftliche Realität macht den Übergang von präventiver Regulierung zu repressiver Sanktionierung für etablierte Berufsmonopole besonders schwierig?
answer: Reglementierte Berufe haben institutionelle Barrieren geschaffen, die bestehende Berufe vor Wettbewerb schützen und sich gleichzeitig auf die öffentliche Sicherheit berufen
wrong_answers:
  - Die Verbrauchernachfrage nach professionellen Dienstleistungen geht naturgemäß zurück, wenn die regulatorische Aufsicht über spezialisierte Branchen wegfällt
  - Die Marktmechanismen sind von Natur aus nicht in der Lage, zwischen kompetenten und inkompetenten Dienstleistern in komplexen Berufsfeldern zu unterscheiden
  - Berufsverbände verlieren ihre Fähigkeit, Qualitätsstandards ohne staatlich verordnete Zulassungs- und Zertifizierungsanforderungen aufrechtzuerhalten
explanation: |
  In dem Text wird erläutert, dass die Berufsregulierung oft unter dem Deckmantel der Vorsorge und der öffentlichen Sicherheit erfolgt und ein "Tutelle"-System (Vormundschaft) über ganze Berufszweige schafft. Diese Schranken verfestigen sich, weil sie den bestehenden Berufsangehörigen zugute kommen, indem sie den Wettbewerb einschränken und gleichzeitig die öffentliche Sicherheit als Rechtfertigung anführen. Die anderen Optionen gehen fälschlicherweise von einem Marktversagen oder der Notwendigkeit einer Regulierungsaufsicht aus, was dem liberalen Grundsatz widerspricht, dass repressive Systeme (die den tatsächlichen Schaden bestrafen) präventiven Systemen (die die Tätigkeit im Vorfeld einschränken) überlegen sind.
question: 是什么潜在的经济现实使得从预防性监管到压制性制裁的过渡对既有的专业垄断企业尤其具有挑战性？
answer: 受监管的行业设置了体制障碍，保护现有从业者免受竞争，同时声称有公共安全方面的正当理由
wrong_answers:
  - 当专业行业的监管被取消时，消费者对专业服务的需求自然会减少
  - 在复杂的专业领域，市场机制本质上无法区分合格和不合格的服务提供者
  - 如果没有政府授权的许可和认证要求，专业协会将失去维持质量标准的能力
explanation: |
  文中解释说，专业法规往往打着预防和公共安全的幌子，在整个工作领域建立起一种 "监护 "制度。这些壁垒之所以根深蒂固，是因为它们以公共安全为理由，通过限制竞争使现有从业者受益。其他方案错误地假定了市场失灵或监管的必要性，违背了压制性制度（惩罚实际伤害）优于预防性制度（事先限制活动）的自由主义原则。
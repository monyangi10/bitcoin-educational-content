question: چه واقعیت اقتصادی زیربنایی، گذار از تنظیمات پیشگیرانه به تحریم‌های سرکوبگرانه را برای انحصارات حرفه‌ای مستقر به‌ویژه چالش‌برانگیز می‌کند؟
answer: حرفه‌های تنظیم‌شده موانع نهادی ایجاد کرده‌اند که از رقابت با متخصصان موجود محافظت می‌کنند و در عین حال توجیهات ایمنی عمومی را ادعا می‌کنند.
wrong_answers:
  - تقاضای مصرف‌کننده برای خدمات حرفه‌ای به‌طور طبیعی کاهش می‌یابد وقتی نظارت‌های قانونی از صنایع تخصصی برداشته می‌شود.
  - مکانیسم‌های بازار ذاتاً قادر به تمایز بین ارائه‌دهندگان خدمات ماهر و غیرماهر در زمینه‌های حرفه‌ای پیچیده نیستند.
  - انجمن‌های حرفه‌ای بدون الزامات صدور مجوز و گواهینامه‌های اجباری دولتی توانایی خود را برای حفظ استانداردهای کیفیت از دست می‌دهند.
explanation: |
  متن توضیح می‌دهد که مقررات حرفه‌ای اغلب تحت پوشش احتیاط و ایمنی عمومی خود را تثبیت می‌کنند و یک سیستم 'سرپرستی' بر کل شاخه‌های کاری ایجاد می‌کنند. این موانع به دلیل اینکه به نفع فعالان موجود با محدود کردن رقابت هستند، ریشه‌دار می‌شوند، در حالی که از ایمنی عمومی به عنوان توجیه استفاده می‌کنند. گزینه‌های دیگر به اشتباه فرض می‌کنند که شکست‌های بازار یا ضرورت نظارت مقرراتی وجود دارد، که با اصل لیبرال که سیستم‌های سرکوبگر (مجازات آسیب واقعی) برتر از سیستم‌های پیشگیرانه (محدود کردن فعالیت از پیش) هستند، در تضاد است.
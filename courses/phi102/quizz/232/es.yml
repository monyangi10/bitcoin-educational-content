question: ¿Qué realidad económica subyacente hace que la transición de la regulación preventiva a la sanción represiva sea especialmente difícil para los monopolios profesionales establecidos?
answer: Las profesiones reguladas han creado barreras institucionales que protegen a los profesionales existentes de la competencia al tiempo que alegan justificaciones de seguridad pública
wrong_answers:
  - La demanda de servicios profesionales por parte de los consumidores disminuye de forma natural cuando se elimina la supervisión reguladora de los sectores especializados
  - Los mecanismos de mercado son inherentemente incapaces de distinguir entre proveedores de servicios competentes e incompetentes en campos profesionales complejos
  - Las asociaciones profesionales pierden su capacidad de mantener normas de calidad sin los requisitos de licencia y certificación impuestos por el gobierno
explanation: |
  El texto explica que las regulaciones profesionales se establecen a menudo bajo el pretexto de la precaución y la seguridad pública, creando un sistema de "tutela" sobre ramas enteras de trabajo. Estas barreras se afianzan porque benefician a los profesionales existentes al limitar la competencia, al tiempo que utilizan la seguridad pública como justificación. Las otras opciones asumen incorrectamente fallos del mercado o la necesidad de supervisión reguladora, contradiciendo el principio liberal de que los sistemas represivos (que castigan el daño real) son superiores a los preventivos (que restringen la actividad de antemano).
question: Quelle réalité économique sous-jacente rend le passage d'une réglementation préventive à une sanction répressive particulièrement difficile pour les monopoles professionnels établis ?
answer: Les professions réglementées ont créé des barrières institutionnelles qui protègent les praticiens existants de la concurrence tout en invoquant des raisons de sécurité publique
wrong_answers:
  - La demande de services professionnels de la part des consommateurs diminue naturellement lorsque la surveillance réglementaire est supprimée dans les secteurs spécialisés
  - Les mécanismes du marché sont intrinsèquement incapables de faire la distinction entre les prestataires de services compétents et incompétents dans des domaines professionnels complexes
  - Les associations professionnelles perdent leur capacité à maintenir des normes de qualité en l'absence d'exigences en matière de licences et de certifications imposées par le gouvernement
explanation: |
  Le texte explique que les réglementations professionnelles s'établissent souvent sous le couvert de la précaution et de la sécurité publique, créant un système de "tutelle" sur des branches entières du travail. Ces barrières s'enracinent parce qu'elles profitent aux praticiens en place en limitant la concurrence, tout en invoquant la sécurité publique comme justification. Les autres options supposent à tort des défaillances du marché ou la nécessité d'un contrôle réglementaire, ce qui contredit le principe libéral selon lequel les systèmes répressifs (punissant les dommages réels) sont supérieurs aux systèmes préventifs (restreignant l'activité à l'avance).
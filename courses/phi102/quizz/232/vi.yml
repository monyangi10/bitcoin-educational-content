question: Thực tế kinh tế cơ bản nào khiến quá trình chuyển đổi từ quy định phòng ngừa sang trừng phạt mang tính đàn áp trở nên đặc biệt khó khăn đối với các độc quyền chuyên nghiệp đã được thiết lập?
answer: Các ngành nghề được quản lý chặt chẽ đã tạo ra những rào cản về mặt thể chế nhằm bảo vệ những người hành nghề hiện tại khỏi sự cạnh tranh, đồng thời viện dẫn lý do an toàn công cộng.
wrong_answers:
  - Nhu cầu của người tiêu dùng đối với các dịch vụ chuyên nghiệp sẽ giảm tự nhiên khi việc giám sát của cơ quan quản lý được loại bỏ khỏi các ngành chuyên biệt.
  - Các cơ chế thị trường vốn dĩ không thể phân biệt giữa các nhà cung cấp dịch vụ có năng lực và không có năng lực trong các lĩnh vực chuyên môn phức tạp.
  - Các hiệp hội chuyên nghiệp sẽ mất khả năng duy trì các tiêu chuẩn chất lượng nếu không có các yêu cầu cấp phép và chứng nhận do chính phủ quy định.
explanation: |
  Văn bản giải thích rằng các quy định nghề nghiệp thường được thiết lập dưới danh nghĩa phòng ngừa và an toàn công cộng, tạo ra một hệ thống "giám hộ" đối với toàn bộ các ngành nghề. Những rào cản này trở nên vững chắc vì chúng mang lại lợi ích cho những người hành nghề hiện tại bằng cách hạn chế cạnh tranh, đồng thời sử dụng an toàn công cộng làm lý do biện minh. Các lựa chọn khác lại giả định sai lầm về sự thất bại của thị trường hoặc sự cần thiết của việc giám sát quy định, trái ngược với nguyên tắc tự do rằng các hệ thống trấn áp (trừng phạt những thiệt hại thực tế) tốt hơn các hệ thống phòng ngừa (hạn chế hoạt động từ trước).
question: Jaka rzeczywistość gospodarcza sprawia, że przejście od regulacji prewencyjnych do represyjnych sankcji stanowi szczególne wyzwanie dla uznanych monopoli zawodowych?
answer: Zawody regulowane stworzyły bariery instytucjonalne, które chronią istniejących praktyków przed konkurencją, jednocześnie powołując się na uzasadnienia związane z bezpieczeństwem publicznym
wrong_answers:
  - Popyt konsumentów na profesjonalne usługi naturalnie spada, gdy nadzór regulacyjny jest usuwany z wyspecjalizowanych branż
  - Mechanizmy rynkowe z natury nie są w stanie odróżnić kompetentnych od niekompetentnych usługodawców w złożonych dziedzinach zawodowych
  - Stowarzyszenia zawodowe tracą zdolność do utrzymywania standardów jakości bez rządowych wymogów licencyjnych i certyfikacyjnych
explanation: |
  Tekst wyjaśnia, że regulacje zawodowe często ustanawia się pod pozorem ostrożności i bezpieczeństwa publicznego, tworząc system "tutelle" (kurateli) nad całymi gałęziami pracy. Bariery te utrwalają się, ponieważ przynoszą korzyści istniejącym praktykom poprzez ograniczanie konkurencji, jednocześnie wykorzystując bezpieczeństwo publiczne jako uzasadnienie. Pozostałe opcje błędnie zakładają niedoskonałości rynku lub konieczność nadzoru regulacyjnego, zaprzeczając liberalnej zasadzie, że systemy represyjne (karzące za rzeczywiste szkody) są lepsze od systemów prewencyjnych (ograniczających działalność z wyprzedzeniem).
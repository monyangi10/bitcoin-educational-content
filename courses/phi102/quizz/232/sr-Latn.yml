question: Koja osnovna ekonomska stvarnost čini prelazak sa preventivne regulacije na represivno sankcionisanje posebno izazovnim za uspostavljene profesionalne monopole?
answer: Regulisane profesije su stvorile institucionalne barijere koje štite postojeće praktičare od konkurencije, dok pritom tvrde da je to opravdano javnom bezbednošću.
wrong_answers:
  - Potražnja potrošača za profesionalnim uslugama prirodno opada kada se regulatorni nadzor ukloni iz specijalizovanih industrija.
  - Tržišni mehanizmi su inherentno nesposobni da razlikuju kompetentne od nekompetentnih pružalaca usluga u složenim profesionalnim oblastima.
  - Profesionalna udruženja gube sposobnost održavanja standarda kvaliteta bez zahteva za licenciranje i sertifikaciju koje propisuje vlada.
explanation: |
  Tekst objašnjava da se profesionalne regulative često uspostavljaju pod maskom predostrožnosti i javne sigurnosti, stvarajući sistem 'tutelle' (starateljstva) nad čitavim granama rada. Ove barijere postaju ukorenjene jer koriste postojećim praktičarima ograničavanjem konkurencije, dok koriste javnu sigurnost kao opravdanje. Druge opcije pogrešno pretpostavljaju tržišne neuspehe ili nužnost regulatornog nadzora, što je u suprotnosti sa liberalnim principom da su represivni sistemi (kažnjavanje stvarne štete) superiorniji od preventivnih (ograničavanje aktivnosti unapred).
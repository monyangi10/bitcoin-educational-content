question: Каква икономическа реалност прави прехода от превантивно регулиране към репресивно санкциониране особено труден за установените професионални монополи?
answer: Регулираните професии са създали институционални бариери, които защитават съществуващите практикуващи от конкуренция, като същевременно се позовават на обществената безопасност
wrong_answers:
  - Потребителското търсене на професионални услуги естествено намалява, когато се премахне регулаторният надзор върху специализираните отрасли
  - Пазарните механизми не са в състояние да разграничат компетентните от некомпетентните доставчици на услуги в сложни професионални области
  - Професионалните асоциации губят способността си да поддържат стандарти за качество без изисквания за лицензиране и сертифициране, наложени от правителството
explanation: |
  В текста се обяснява, че професионалните разпоредби често се създават под прикритието на предпазливостта и обществената безопасност, като създават система на "tutelle" (опека) над цели отрасли на дейност. Тези бариери се утвърждават, защото са в полза на съществуващите специалисти, като ограничават конкуренцията, а като оправдание се използва обществената безопасност. Другите варианти неправилно предполагат пазарни неуспехи или необходимост от регулаторен надзор, което противоречи на либералния принцип, че репресивните системи (наказващи действителната вреда) са по-добри от превантивните (ограничаващи дейността предварително).
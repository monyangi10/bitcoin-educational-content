question: Hvilken underliggende økonomisk realitet er det som gjør overgangen fra preventiv regulering til repressiv sanksjonering spesielt utfordrende for etablerte yrkesmonopoler?
answer: Regulerte yrker har skapt institusjonelle barrierer som beskytter eksisterende utøvere mot konkurranse, samtidig som de påberoper seg hensynet til offentlig sikkerhet
wrong_answers:
  - Forbrukernes etterspørsel etter profesjonelle tjenester synker naturlig nok når det regulatoriske tilsynet fjernes fra spesialiserte bransjer
  - Markedsmekanismene er i seg selv ute av stand til å skille mellom kompetente og inkompetente tjenesteleverandører på komplekse fagområder
  - Fagforeningene mister muligheten til å opprettholde kvalitetsstandarder uten myndighetspålagte lisensierings- og sertifiseringskrav
explanation: |
  Teksten forklarer at yrkesreguleringer ofte etableres under dekke av forsiktighet og offentlig sikkerhet, og skaper et "tutelle"-system (formynderskap) over hele bransjer. Disse barrierene blir rotfestet fordi de er til fordel for eksisterende utøvere ved å begrense konkurransen, samtidig som de bruker offentlig sikkerhet som begrunnelse. De andre alternativene forutsetter feilaktig markedssvikt eller nødvendigheten av regulatorisk tilsyn, noe som strider mot det liberale prinsippet om at repressive systemer (som straffer faktiske skader) er bedre enn preventive (som begrenser aktivitet på forhånd).
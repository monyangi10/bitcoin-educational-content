question: 予防的規制から抑圧的制裁への移行が、既存のプロフェッショナルな独占企業にとって特に困難なのは、どのような経済的現実が根底にあるのだろうか？
answer: 規制された専門職は、公共の安全の正当性を主張する一方で、既存の開業医を競争から守る制度的障壁を作ってきた。
wrong_answers:
  - 専門サービスに対する消費者の需要は、専門産業から規制当局の監視がなくなれば当然減少する。
  - 市場メカニズムは本来、複雑な専門分野における有能なサービス・プロバイダーと無能なサービス・プロバイダーを区別することができない。
  - 専門家団体は、政府が義務付けるライセンスや認証の要件なしに、品質基準を維持する能力を失う。
explanation: |
  この文章では、専門職の規制はしばしば予防措置や公共の安全を装って確立され、仕事の分野全体に対する「チュテル」（後見人）制度を生み出すと説明している。こうした障壁が定着するのは、競争を制限することで既存の開業医に利益をもたらす一方で、公共の安全を正当化するためである。他の選択肢は、市場の失敗や規制監督の必要性を誤って想定しており、抑圧的な制度（実害を罰する）の方が予防的な制度（事前に活動を制限する）よりも優れているという自由主義の原則に反している。
question: Realitas ekonomi apa yang mendasari transisi dari regulasi preventif ke sanksi represif yang sangat menantang bagi monopoli profesional yang sudah mapan?
answer: Profesi yang diatur telah menciptakan hambatan institusional yang melindungi praktisi yang ada dari persaingan sambil mengklaim pembenaran keselamatan publik
wrong_answers:
  - Permintaan konsumen untuk layanan profesional secara alami menurun ketika pengawasan regulasi dihapus dari industri khusus
  - Mekanisme pasar pada dasarnya tidak dapat membedakan antara penyedia layanan yang kompeten dan tidak kompeten dalam bidang profesional yang kompleks
  - Asosiasi profesional kehilangan kemampuan mereka untuk mempertahankan standar kualitas tanpa persyaratan lisensi dan sertifikasi yang diamanatkan pemerintah
explanation: |
  Teks tersebut menjelaskan bahwa peraturan profesional sering kali dibuat dengan kedok kehati-hatian dan keselamatan publik, menciptakan sistem 'tutelle' (perwalian) atas seluruh cabang pekerjaan. Hambatan-hambatan ini menjadi mengakar karena menguntungkan praktisi yang sudah ada dengan membatasi kompetisi, sementara menggunakan keselamatan publik sebagai pembenaran. Opsi-opsi lain secara keliru mengasumsikan kegagalan pasar atau perlunya pengawasan regulasi, yang bertentangan dengan prinsip liberal bahwa sistem represif (menghukum pelaku kejahatan) lebih unggul daripada sistem preventif (membatasi aktivitas sebelumnya).
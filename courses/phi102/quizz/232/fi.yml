question: Minkä taustalla olevan taloudellisen todellisuuden vuoksi siirtyminen ennaltaehkäisevästä sääntelystä repressiivisiin seuraamuksiin on erityisen haastavaa vakiintuneille ammatillisille monopoleille?
answer: Säännellyt ammatit ovat luoneet institutionaalisia esteitä, jotka suojaavat nykyisiä ammatinharjoittajia kilpailulta ja vetoavat samalla yleiseen turvallisuuteen
wrong_answers:
  - Asiantuntijapalvelujen kysyntä luonnollisesti vähenee, kun sääntelyn valvonta poistetaan erikoistuneilta toimialoilta
  - Markkinamekanismit eivät luonnostaan kykene erottamaan päteviä ja epäpäteviä palveluntarjoajia monimutkaisilla ammattialoilla
  - Ammattiyhdistykset menettävät kykynsä ylläpitää laatustandardeja ilman hallituksen määräämiä lisenssi- ja sertifiointivaatimuksia
explanation: |
  Tekstissä selitetään, että ammatilliset säännökset syntyvät usein ennalta varautumisen ja yleisen turvallisuuden varjolla ja luovat "tutelle"-järjestelmän (holhousjärjestelmä) kokonaisille työaloille. Nämä esteet vakiintuvat, koska ne hyödyttävät nykyisiä ammatinharjoittajia rajoittamalla kilpailua ja perustelevat sitä samalla yleisellä turvallisuudella. Muissa vaihtoehdoissa oletetaan virheellisesti, että markkinat eivät toimi tai että sääntelyn valvonta on välttämätöntä, mikä on ristiriidassa sen liberaalin periaatteen kanssa, jonka mukaan repressiiviset järjestelmät (jotka rankaisevat todellisista vahingoista) ovat parempia kuin ennaltaehkäisevät järjestelmät (jotka rajoittavat toimintaa etukäteen).
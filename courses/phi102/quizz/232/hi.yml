question: What underlying economic reality makes the transition from preventive regulation to repressive sanctioning particularly challenging for established professional monopolies?
answer: Regulated professions have created institutional barriers that protect existing practitioners from competition while claiming public safety justifications
wrong_answers:
  - Consumer demand for professional services naturally decreases when regulatory oversight is removed from specialized industries
  - Market mechanisms are inherently unable to distinguish between competent and incompetent service providers in complex professional fields
  - Professional associations lose their ability to maintain quality standards without government-mandated licensing and certification requirements
explanation: |
  The text explains that professional regulations often establish themselves under the guise of precaution and public safety, creating a 'tutelle' (guardianship) system over entire branches of work. These barriers become entrenched because they benefit existing practitioners by limiting competition, while using public safety as justification. The other options incorrectly assume market failures or necessity of regulatory oversight, contradicting the liberal principle that repressive systems (punishing actual harm) are superior to preventive ones (restricting activity beforehand).
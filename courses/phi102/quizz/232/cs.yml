question: Jaká základní ekonomická realita činí přechod od preventivní regulace k represivním sankcím obzvláště náročným pro zavedené profesní monopoly?
answer: Regulované profese vytvořily institucionální překážky, které chrání stávající odborníky před konkurencí a zároveň se odvolávají na veřejnou bezpečnost
wrong_answers:
  - Poptávka spotřebitelů po odborných službách přirozeně klesá, když se odstraní regulační dohled nad specializovanými odvětvími
  - Tržní mechanismy ze své podstaty nedokážou rozlišit mezi kompetentními a nekompetentními poskytovateli služeb ve složitých profesních oblastech
  - Profesní sdružení ztrácejí schopnost udržovat standardy kvality bez vládou nařízených požadavků na licence a certifikace
explanation: |
  Text vysvětluje, že profesní předpisy se často vytvářejí pod rouškou opatrnosti a veřejné bezpečnosti a vytvářejí systém "tutelle" (poručnictví) nad celými pracovními odvětvími. Tyto překážky se zakořeňují, protože přinášejí prospěch stávajícím odborníkům tím, že omezují konkurenci, přičemž se jako ospravedlnění používá veřejná bezpečnost. Ostatní možnosti nesprávně předpokládají selhání trhu nebo nutnost regulačního dohledu, což je v rozporu s liberální zásadou, že represivní systémy (trestající skutečnou škodu) jsou nadřazeny preventivním (omezujícím činnost předem).
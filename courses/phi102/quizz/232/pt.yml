question: Que realidade económica subjacente torna a transição da regulamentação preventiva para a sanção repressiva particularmente difícil para os monopólios profissionais estabelecidos?
answer: As profissões regulamentadas criaram barreiras institucionais que protegem os profissionais existentes da concorrência, alegando justificações de segurança pública
wrong_answers:
  - A procura de serviços profissionais por parte dos consumidores diminui naturalmente quando a supervisão regulamentar é suprimida nos sectores especializados
  - Os mecanismos de mercado são intrinsecamente incapazes de distinguir entre prestadores de serviços competentes e incompetentes em domínios profissionais complexos
  - As associações profissionais perdem a sua capacidade de manter padrões de qualidade sem requisitos de licenciamento e certificação impostos pelo governo
explanation: |
  O texto explica que as regulamentações profissionais se estabelecem frequentemente sob o pretexto da precaução e da segurança pública, criando um sistema de "tutela" sobre ramos inteiros de atividade. Estas barreiras enraízam-se porque beneficiam os profissionais existentes ao limitarem a concorrência, utilizando a segurança pública como justificação. As outras opções assumem incorretamente as falhas do mercado ou a necessidade de supervisão regulamentar, contradizendo o princípio liberal de que os sistemas repressivos (que punem os danos reais) são superiores aos preventivos (que restringem a atividade antecipadamente).
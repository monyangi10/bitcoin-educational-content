question: Ni ukweli gani wa kiuchumi unaofanya mabadiliko kutoka kwa kanuni za kuzuia hadi vikwazo vya ukandamizaji kuwa changamoto hasa kwa ukiritimba wa kitaalamu ulioanzishwa?
answer: Taaluma zinazodhibitiwa zimeunda vikwazo vya kitaasisi vinavyowalinda watendaji waliopo dhidi ya ushindani huku wakidai uhalali wa usalama wa umma
wrong_answers:
  - Mahitaji ya watumiaji wa huduma za kitaalamu hupungua kiasili wakati usimamizi wa udhibiti unapoondolewa katika tasnia maalum
  - Mifumo ya soko kwa asili haiwezi kutofautisha kati ya watoa huduma wenye uwezo na wasio na uwezo katika nyanja changamano za kitaaluma
  - Vyama vya kitaaluma hupoteza uwezo wao wa kudumisha viwango vya ubora bila leseni na mahitaji ya uidhinishaji yaliyoagizwa na serikali.
explanation: |
  Maandishi yanaelezea kwamba kanuni za kitaaluma mara nyingi hujiweka chini ya kivuli cha tahadhari na usalama wa umma, na kuunda mfumo wa 'ulinzi' juu ya matawi yote ya kazi. Vizuizi hivi hujikita kwa sababu vinawanufaisha watendaji waliopo kwa kupunguza ushindani, huku vikitumia usalama wa umma kama uhalalishaji. Chaguzi zingine zinadhani kimakosa kushindwa kwa soko au ulazima wa usimamizi wa udhibiti, zikipingana na kanuni ya kiliberali kwamba mifumo ya ukandamizaji (kuadhibu madhara halisi) ni bora kuliko ile ya kuzuia (kuzuia shughuli mapema).
question: Quale realtà economica di fondo rende il passaggio dalla regolamentazione preventiva alla sanzione repressiva particolarmente impegnativo per i monopoli professionali consolidati?
answer: Le professioni regolamentate hanno creato barriere istituzionali che proteggono i professionisti esistenti dalla concorrenza, adducendo al contempo giustificazioni di sicurezza pubblica
wrong_answers:
  - La domanda di servizi professionali da parte dei consumatori diminuisce naturalmente quando la supervisione normativa viene eliminata dai settori specializzati
  - I meccanismi di mercato sono intrinsecamente incapaci di distinguere tra fornitori di servizi competenti e incompetenti in campi professionali complessi
  - Le associazioni professionali perdono la capacità di mantenere gli standard di qualità senza requisiti di licenza e certificazione imposti dal governo
explanation: |
  Il testo spiega che le normative professionali spesso si affermano con il pretesto della precauzione e della sicurezza pubblica, creando un sistema di "tutele" su interi rami di lavoro. Queste barriere si radicano perché avvantaggiano i professionisti esistenti limitando la concorrenza e utilizzando la sicurezza pubblica come giustificazione. Le altre opzioni presuppongono erroneamente fallimenti del mercato o la necessità di una supervisione normativa, contraddicendo il principio liberale secondo cui i sistemi repressivi (che puniscono i danni effettivi) sono superiori a quelli preventivi (che limitano l'attività in anticipo).
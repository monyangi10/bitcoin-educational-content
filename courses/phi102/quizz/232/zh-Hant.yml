question: 是什麼基本的經濟現實使得從預防性規範到壓制性制裁的過渡對於既有的專業壟斷企業來說特別具有挑戰性？
answer: 受規範的專業創造了體制障礙，保護現有的從業人員免於競爭，同時聲稱有公共安全的理由
wrong_answers:
  - 當專門產業的法規監督被移除時，消費者對專業服務的需求自然會減少
  - 在複雜的專業領域中，市場機制本質上無法區分有能力和無能力的服務提供者
  - 如果沒有政府強制的執照和認證要求，專業協會將失去維持品質標準的能力
explanation: |
  文中解釋，專業法規往往以預防和公共安全為幌子，對整個工作分支建立「監護」（tutelle）制度。這些障礙之所以根深蒂固，是因為它們透過限制競爭，同時以公共安全為理由，讓現有的從業人員受惠。其他方案錯誤地假設市場失效或管制監督的必要性，違反了壓制性制度（懲罰實際損害）優於預防性制度（事先限制活動）的自由原則。
question: Milline majanduslik tegelikkus muudab ülemineku ennetavalt reguleerimiselt repressiivsele sanktsioneerimisele eriti keeruliseks väljakujunenud professionaalsete monopolide jaoks?
answer: Reguleeritud kutsealad on loonud institutsionaalseid tõkkeid, mis kaitsevad olemasolevaid kutsealade esindajaid konkurentsi eest, väites samal ajal, et see õigustab avalikku julgeolekut
wrong_answers:
  - Tarbijate nõudlus professionaalsete teenuste järele loomulikult väheneb, kui regulatiivne järelevalve eemaldatakse spetsialiseeritud tööstusharudelt
  - Turumehhanismid ei suuda olemuslikult eristada pädevaid ja ebapädevaid teenuseosutajaid keerulistes kutsealades
  - Kutseühingud kaotavad oma võime säilitada kvaliteedistandardeid ilma valitsuse poolt kehtestatud litsentsimis- ja sertifitseerimisnõueteta
explanation: |
  Tekstis selgitatakse, et kutsealased eeskirjad kehtestatakse sageli ettevaatusabinõude ja avaliku julgeoleku varjus, luues "tutelle" (eestkoste) süsteemi tervete töövaldkondade üle. Need tõkked kinnistuvad, sest nad toovad konkurentsi piiramise kaudu kasu olemasolevatele kutsealade esindajatele, kasutades samal ajal õigustusena avalikku turvalisust. Teised võimalused eeldavad ekslikult turutõrkeid või regulatiivse järelevalve vajalikkust, mis on vastuolus liberaalse põhimõttega, et repressiivsed süsteemid (tegeliku kahju eest karistamine) on paremad kui ennetavad süsteemid (tegevuse eelnev piiramine).
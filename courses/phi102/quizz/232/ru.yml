question: Какая основополагающая экономическая реальность делает переход от превентивного регулирования к репрессивным санкциям особенно сложным для устоявшихся профессиональных монополий?
answer: Регулируемые профессии создают институциональные барьеры, которые защищают существующих специалистов от конкуренции, оправдывая это соображениями общественной безопасности
wrong_answers:
  - Потребительский спрос на профессиональные услуги естественным образом снижается, когда с профильных отраслей снимается регуляторный надзор
  - Рыночные механизмы по своей природе не способны провести различие между компетентными и некомпетентными поставщиками услуг в сложных профессиональных областях
  - Профессиональные ассоциации теряют способность поддерживать стандарты качества без установленных государством требований к лицензированию и сертификации
explanation: |
  В тексте объясняется, что профессиональные правила часто устанавливаются под видом предосторожности и общественной безопасности, создавая систему "опеки" над целыми отраслями деятельности. Эти барьеры укореняются, потому что они выгодны существующим практикующим специалистам, ограничивая конкуренцию и используя общественную безопасность в качестве оправдания. Другие варианты неверно предполагают провалы рынка или необходимость регулятивного надзора, что противоречит либеральному принципу, согласно которому репрессивные системы (наказывающие за реальный вред) превосходят превентивные (ограничивающие деятельность заранее).
question: 예방적 규제에서 억압적 제재로 전환하는 것이 기존 전문 독점 기업에 특히 어렵게 만드는 근본적인 경제 현실은 무엇인가요?
answer: 규제 대상 직업은 공공 안전의 정당성을 주장하면서 기존 종사자들을 경쟁으로부터 보호하는 제도적 장벽을 만들었습니다
wrong_answers:
  - 전문 산업에서 규제 감독이 제거되면 전문 서비스에 대한 소비자 수요는 자연스럽게 감소합니다
  - 시장 메커니즘은 본질적으로 복잡한 전문 분야에서 유능한 서비스 제공업체와 무능한 서비스 제공업체를 구분할 수 없습니다
  - 전문가 협회는 정부가 요구하는 라이선스 및 인증 요건 없이는 품질 표준을 유지할 수 없습니다
explanation: |
  이 글은 전문직 규제가 종종 예방과 공공의 안전을 가장하여 업무의 전 분야에 걸쳐 '후견인'(후견인) 제도를 만들어낸다고 설명합니다. 이러한 장벽은 공공의 안전을 명분으로 삼아 경쟁을 제한함으로써 기존 종사자들에게 혜택을 주기 때문에 고착화됩니다. 다른 옵션은 시장 실패나 규제 감독의 필요성을 잘못 가정하여 억압적 시스템(실제 피해를 처벌하는)이 예방적 시스템(사전에 활동을 제한하는)보다 우월하다는 자유주의 원칙과 모순됩니다.
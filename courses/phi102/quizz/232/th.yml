question: ความเป็นจริงทางเศรษฐกิจพื้นฐานใดที่ทำให้การเปลี่ยนจากการควบคุมเชิงป้องกันไปสู่การลงโทษเชิงกดขี่เป็นเรื่องที่ท้าทายโดยเฉพาะสำหรับการผูกขาดวิชาชีพที่จัดตั้งขึ้น?
answer: วิชาชีพที่มีการควบคุมได้สร้างอุปสรรคทางสถาบันที่ปกป้องผู้ปฏิบัติงานที่มีอยู่จากการแข่งขันในขณะที่อ้างเหตุผลด้านความปลอดภัยของสาธารณะ
wrong_answers:
  - ความต้องการของผู้บริโภคสำหรับบริการระดับมือชีพลดลงตามธรรมชาติเมื่อการกำกับดูแลด้านกฎระเบียบถูกยกออกจากอุตสาหกรรมเฉพาะทาง
  - กลไกตลาดไม่สามารถแยกแยะระหว่างผู้ให้บริการที่มีความสามารถและไม่มีความสามารถในสาขาวิชาชีพที่ซับซ้อนได้โดยเนื้อแท้
  - สมาคมวิชาชีพสูญเสียความสามารถในการรักษามาตรฐานคุณภาพหากไม่มีข้อกำหนดการออกใบอนุญาตและการรับรองที่รัฐบาลกำหนด
explanation: |
  ข้อความอธิบายว่ากฎระเบียบวิชาชีพมักจะตั้งขึ้นภายใต้ข้ออ้างของความระมัดระวังและความปลอดภัยสาธารณะ สร้างระบบ 'tutelle' (การปกครอง) เหนือสาขาการทำงานทั้งหมด อุปสรรคเหล่านี้กลายเป็นที่ฝังแน่นเพราะเป็นประโยชน์ต่อผู้ปฏิบัติงานที่มีอยู่โดยการจำกัดการแข่งขัน ในขณะที่ใช้ความปลอดภัยสาธารณะเป็นข้ออ้าง ตัวเลือกอื่น ๆ เข้าใจผิดว่าตลาดล้มเหลวหรือความจำเป็นของการกำกับดูแล ซึ่งขัดแย้งกับหลักการเสรีที่ว่าระบบการปราบปราม (การลงโทษความเสียหายที่เกิดขึ้นจริง) นั้นเหนือกว่าระบบป้องกัน (การจำกัดกิจกรรมล่วงหน้า)
question: Ni ikihe kintu nyaco c’ubutunzi gituma kuva ku mategeko yo kwirinda gushika ku bihano vyo gukandamiza bigorana cane cane ku mashirahamwe y’abahinga ashinzwe?
answer: Imyuga itegekanijwe yaratumye habaho intambamyi z’inzego zikingira abahinga bariho amahiganwa mu gihe bavuga ko bafise imvo z’umutekano wa bose .
wrong_answers:
  - Ivyo abaguzi basaba ku bikorwa vy'umwuga biragabanuka mu buryo busanzwe iyo ubugenzuzi bushingiye ku mategeko bukuwe mu nganda zidasanzwe .
  - Uburyo bw'isoko ntibushobora gutandukanya abatanga ibikorwa bafise ubushobozi n'abatabishoboye mu bikorwa vy'umwuga bikomeye .
  - Amashirahamwe y’abahinga aratakaza ubushobozi bwo kuguma afise ingingo ngenderwako z’uburyo ata ruhusha n’icemezo bisabwa na Leta .
explanation: |
  Ico canditswe kirasigura ko amategeko y’umwuga akenshi yishingira intahe mu kwiyoberanya no gukingira abantu bose, agatuma habaho uburyo bwo ‘tutelle’ (uburezi) ku mashami yose y’akazi. Izo nzitizi zica zishinga imizi kuko zigirira akamaro abazikora bariho mu kugabanya uguhiganwa, mu gihe zikoresha umutekano wa bose nk’imvo n’imvano. Ayandi mahitamwo yiyumvira mu buryo butari bwo ko isoko ridashobora gukora neza canke ko bikenewe ko habaho ubugenzuzi bushingiye ku mategeko, bikaba bivuguruza ingingo ngenderwako y’uko uburyo bwo gukandamiza (guhana ububi nyabwo) buruta uburyo bwo kwirinda (guhagarika igikorwa imbere y’igihe).
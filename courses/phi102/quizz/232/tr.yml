question: Önleyici düzenlemeden baskıcı yaptırıma geçişi yerleşik profesyonel tekeller için özellikle zorlaştıran temel ekonomik gerçeklik nedir?
answer: Düzenlenmiş meslekler, kamu güvenliği gerekçelerini öne sürerken mevcut uygulayıcıları rekabetten koruyan kurumsal engeller yaratmıştır
wrong_answers:
  - Uzmanlaşmış sektörlerden düzenleyici gözetim kaldırıldığında profesyonel hizmetlere yönelik tüketici talebi doğal olarak azalır
  - Piyasa mekanizmaları doğası gereği karmaşık mesleki alanlarda yetkin ve yetersiz hizmet sağlayıcıları ayırt edememektedir
  - Meslek birlikleri, devlet tarafından zorunlu kılınan lisanslama ve belgelendirme gereklilikleri olmadan kalite standartlarını sürdürme yeteneklerini kaybederler
explanation: |
  Metin, mesleki düzenlemelerin genellikle tedbir ve kamu güvenliği kisvesi altında kendini gösterdiğini ve tüm iş kolları üzerinde bir 'vesayet' sistemi yarattığını açıklamaktadır. Bu engeller, kamu güvenliğini gerekçe olarak kullanırken rekabeti sınırlandırarak mevcut uygulayıcılara fayda sağladıkları için yerleşik hale gelmektedir. Diğer seçenekler yanlış bir şekilde piyasa başarısızlıklarını veya düzenleyici gözetimin gerekliliğini varsayarak, baskıcı sistemlerin (fiili zararı cezalandıran) önleyici sistemlerden (faaliyeti önceden kısıtlayan) daha üstün olduğu yönündeki liberal ilkeyle çelişmektedir.
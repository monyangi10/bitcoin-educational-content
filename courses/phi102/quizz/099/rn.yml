question: Ni igiki ico canditswe kigaragaza ko ari co kintu nyamukuru gikenewe kugira ngo umwidegemvyo wishinge intahe vy’ukuri nk’umugambi w’ikibano n’iterambere muri kahise?
answer: Kwiga gukoresha neza umwidegemvyo biciye mu kwiga imbere y'igihe no mu bikorwa .
wrong_answers:
  - Gushinga inzego zikomeye z'ubutungane n'iz'ubupolisi kugira ngo uburenganzira bw'umuntu ku giti ciwe bukingirwe .
  - Gushika ku guteza imbere ubuhinga n'inganda kugira ngo umuntu ashobore kwigenga
  - Gukuraho inyifato za kera n'intege nke zo mu vy'inyifato runtu mu kibano
explanation: |
  Ico canditswe kivuga neza ko kugira ngo umwidegemvyo wishinge intahe vy’ukuri nk’umugambi w’ikibano n’iterambere mu mateka, ni ngombwa ko uwukoresha neza, ivyo bikaba bisaba ko umuntu yiga imbere y’igihe. Ico gisabwa n’ishimikiro kirerekanwa nk’ikintu gikenewe. Naho inzego, ubuhinga n’iterambere ry’inyifato runtu bivugwa ko ari ibintu bihambaye, bishikirizwa nk’ingaruka canke ibintu bishigikira aho gushikirizwa nk’ikintu nyamukuru gikenewe. Ico canditswe gishimika ku vy’uko umwidegemvyo ukoreshwa nabi ushobora guhindukira ukarwanya abawukoresha, ivyo bikaba bituma inyigisho ibereye mu gukoresha umwidegemvyo iba umushinge w’ingenzi w’ikibano ico ari co cose gifise umwidegemvyo.
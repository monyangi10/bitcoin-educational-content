question: Zgodnie z analizą demokratycznego despotyzmu przeprowadzoną przez Tocqueville'a, co stanowi główne zagrożenie, gdy demokracja przekształca się wbrew własnemu celowi?
answer: Państwo staje się reżyserem społeczeństwa, a sama demokratyczna masa ogranicza indywidualne wolności
wrong_answers:
  - Elity polityczne manipulują procesami wyborczymi, aby utrzymać władzę, ignorując wolę większości
  - Nierówności ekonomiczne stają się tak skrajne, że instytucje demokratyczne zostają opanowane przez bogate interesy specjalne
  - Zagraniczne wpływy i propaganda podważają proces demokratyczny poprzez szerzenie dezinformacji wśród wyborców
explanation: |
  Tocqueville określił demokratyczny despotyzm jako zjawisko, w którym demokracja obraca się przeciwko swojemu podstawowemu celowi, jakim jest ochrona praw jednostki. Zamiast organizować skuteczne represje wobec ataków na ludzkie wolności, demokratyczne państwo samo staje się narzędziem ataku na te same prawa i wolności. Niebezpieczeństwo pochodzi z wewnątrz - demokratyczna masa sama kompresuje wolności poprzez kierowanie społeczeństwem przez państwo. Pozostałe opcje opisują zagrożenia zewnętrzne lub zawłaszczanie elit, ale koncepcja Tocqueville'a odnosi się konkretnie do tego, w jaki sposób demokracja może się wewnętrznie skorumpować, gdy państwo staje się dyrektorem społeczeństwa, a nie obrońcą wolności.
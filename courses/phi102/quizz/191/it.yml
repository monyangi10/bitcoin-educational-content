question: Secondo l'analisi di Tocqueville sul dispotismo democratico, qual è il pericolo principale quando la democrazia si trasforma contro il suo stesso scopo?
answer: Lo Stato diventa il regista della società e la stessa massa democratica comprime le libertà individuali
wrong_answers:
  - Le élite politiche manipolano i processi elettorali per mantenere il potere, ignorando la volontà della maggioranza
  - La disuguaglianza economica cresce a tal punto che le istituzioni democratiche vengono catturate da ricchi interessi particolari
  - Le influenze e la propaganda straniere minano il processo democratico diffondendo informazioni errate agli elettori
explanation: |
  Tocqueville identificò il dispotismo democratico come il fenomeno in cui la democrazia si rivolta contro il suo scopo fondamentale di proteggere i diritti individuali. Invece di organizzare un'efficace repressione degli attacchi alle libertà umane, lo Stato democratico diventa esso stesso uno strumento per attaccare quegli stessi diritti e libertà. Il pericolo viene dall'interno: la massa democratica stessa comprime le libertà attraverso la direzione statale della società. Le altre opzioni descrivono le minacce esterne o la cattura delle élite, ma il concetto di Tocqueville affronta specificamente il modo in cui la democrazia può corrompersi internamente quando lo Stato diventa il regista della società piuttosto che il protettore della libertà.
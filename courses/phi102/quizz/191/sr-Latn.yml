question: Prema Tokvilovoj analizi demokratskog despotizma, osnovna opasnost kada se demokratija transformiše protiv svoje svrhe leži u tome što može dovesti do preterane centralizacije vlasti i gubitka individualnih sloboda.
answer: Država postaje direktor društva i sama demokratska masa komprimira individualne slobode
wrong_answers:
  - Političke elite manipulišu izbornim procesima kako bi zadržale vlast, ignorišući volju većine
  - Ekonomska nejednakost postaje toliko ekstremna da demokratske institucije bivaju zarobljene od strane bogatih posebnih interesa
  - Strani uticaji i propaganda potkopavaju demokratski proces širenjem dezinformacija među glasačima.
explanation: |
  Tokvil je identifikovao demokratski despotizam kao fenomen gde se demokratija okreće protiv svoje osnovne svrhe zaštite individualnih prava. Umesto da organizuje efikasnu represiju napada na ljudske slobode, demokratska država sama postaje instrument napada na ta ista prava i slobode. Opasnost dolazi iznutra - sama demokratska masa komprimuje slobode kroz državno usmeravanje društva. Druge opcije opisuju spoljne pretnje ili zauzimanje od strane elite, ali Tokvilov koncept specifično se bavi time kako demokratija može interno da se korumpira kada država postane direktor društva umesto zaštitnik slobode.
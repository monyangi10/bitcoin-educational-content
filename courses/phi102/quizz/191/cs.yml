question: Co podle Tocquevillovy analýzy demokratického despotismu představuje hlavní nebezpečí, když se demokracie mění proti svému vlastnímu účelu?
answer: Stát se stává ředitelem společnosti a demokratická masa sama o sobě stlačuje individuální svobody
wrong_answers:
  - Politické elity manipulují volebními procesy, aby si udržely moc, a ignorují vůli většiny
  - Ekonomická nerovnost roste do té míry, že se demokratické instituce dostávají do područí bohatých zájmových skupin
  - Zahraniční vlivy a propaganda podkopávají demokratický proces šířením dezinformací mezi voliči
explanation: |
  Tocqueville označil demokratický despotismus za jev, kdy se demokracie obrací proti svému základnímu účelu, kterým je ochrana práv jednotlivce. Místo toho, aby organizoval účinnou represi proti útokům na lidské svobody, stává se demokratický stát sám nástrojem útoků na tatáž práva a svobody. Nebezpečí přichází zevnitř - demokratická masa sama stlačuje svobody prostřednictvím státního řízení společnosti. Ostatní možnosti popisují vnější hrozby nebo uchvácení elit, ale Tocquevillova koncepce se konkrétně zabývá tím, jak může demokracie sama sebe vnitřně zkorumpovat, když se stát stane spíše ředitelem společnosti než ochráncem svobody.
question: Enligt Tocquevilles analys av demokratisk despotism, vad utgör den främsta faran när demokratin omvandlas mot sitt eget syfte?
answer: Staten blir samhällets direktör och den demokratiska massan själv komprimerar individuella friheter
wrong_answers:
  - Politiska eliter manipulerar valprocesser för att behålla makten samtidigt som de ignorerar majoritetens vilja
  - Den ekonomiska ojämlikheten blir så extrem att de demokratiska institutionerna fångas upp av rika specialintressen
  - Utländsk påverkan och propaganda undergräver den demokratiska processen genom att sprida felaktig information till väljarna
explanation: |
  Tocqueville identifierade demokratisk despotism som ett fenomen där demokratin vänder sig mot sitt grundläggande syfte att skydda individens rättigheter. I stället för att organisera ett effektivt förtryck av angrepp på mänskliga friheter blir den demokratiska staten själv ett instrument för att angripa samma fri- och rättigheter. Faran kommer inifrån - den demokratiska massan begränsar själv friheterna genom statlig styrning av samhället. De andra alternativen beskriver yttre hot eller elitens maktövertagande, men Tocquevilles koncept tar specifikt upp hur demokratin kan korrumpera sig själv internt när staten blir samhällets ledare snarare än frihetens beskyddare.
question: 根据托克维尔对民主专制主义的分析，当民主发生违背自身目的的转变时，什么是最主要的危险？
answer: 国家成为社会的领导者，民主大众本身压缩了个人自由
wrong_answers:
  - 政治精英操纵选举进程以维持权力，却无视大多数人的意愿
  - 经济不平等发展到极致，民主机构被富裕的特殊利益集团所俘虏
  - 外国影响和宣传通过向选民传播错误信息破坏民主进程
explanation: |
  托克维尔认为，民主专制主义是民主违背其保护个人权利这一根本宗旨的现象。民主国家非但不能有效镇压对人类自由的侵犯，反而成为侵犯这些权利和自由的工具。危险来自内部--民主大众本身通过国家对社会的引导来压缩自由。其他选项描述的是外部威胁或精英俘虏，而托克维尔的概念则专门针对当国家成为社会的指导者而非自由的保护者时，民主如何在内部自我腐化的问题。
question: Según el análisis de los sofismas que apoyan los sistemas no liberales, ¿cuál es el fallo fundamental del "sofisma internacional" relativo a las distinciones de propiedad?
answer: Crea una distinción artificial entre propiedad nacional y propiedad privada que carece de base en la naturaleza fundamental de los derechos de propiedad
wrong_answers:
  - No reconoce que el comercio internacional requiere necesariamente la intervención del gobierno para proteger la propiedad nacional de la explotación extranjera
  - Supone erróneamente que la propiedad privada puede existir independientemente de la soberanía nacional y del control territorial del Estado
  - Pasa por alto la necesidad legítima de la propiedad colectiva de los recursos que atraviesan las fronteras nacionales y afectan a múltiples poblaciones
explanation: |
  El texto identifica el sofisma internacional como uno de los errores teóricos que sustentan los sistemas de no-libertad mediante la creación de falsas distinciones. Este sofisma separa artificialmente la propiedad nacional de la propiedad privada, cuando en realidad ambas se basan en el mismo principio fundamental de derechos de propiedad arraigados en la autopropiedad. Las otras opciones sugieren erróneamente que el fallo del sofisma reside en un reconocimiento insuficiente de la autoridad estatal o de las necesidades colectivas, cuando el problema real es el contrario: la creación de distinciones arbitrarias que socavan el fundamento coherente de los derechos de propiedad en la autonomía individual.
question: Kulingana na uchambuzi wa dhana potofu zinazounga mkono mifumo isiyo ya uhuru, ni nini dosari ya msingi katika 'usopopoto wa kimataifa' kuhusu tofauti za mali?
answer: Inaunda tofauti bandia kati ya mali ya taifa na mali ya kibinafsi ambayo haina msingi wowote katika asili ya msingi ya haki za mali.
wrong_answers:
  - Haitambui kwamba biashara ya kimataifa inahitaji serikali kuingilia kati ili kulinda mali ya ndani kutokana na unyonyaji wa kigeni.
  - Inadhani kimakosa kwamba mali ya kibinafsi inaweza kuwepo bila uhuru wa kitaifa na udhibiti wa eneo na serikali.
  - Inapuuza hitaji halali la umiliki wa pamoja wa rasilimali zinazovuka mipaka ya kitaifa na kuathiri idadi ya watu wengi.
explanation: |
  Maandishi yanatambua ushupavu wa kimataifa kama mojawapo ya makosa ya kinadharia yanayodumisha mifumo isiyo ya uhuru kwa kuunda tofauti za uwongo. Ushupavu huu hutenganisha mali ya taifa na mali ya kibinafsi kwa njia bandia, wakati kwa kweli zote mbili zimejengwa juu ya kanuni moja ya msingi ya haki za mali iliyojikita katika umiliki binafsi. Chaguzi zingine zinaonyesha kimakosa kwamba dosari ya ushupavu iko katika utambuzi usiotosha wa mamlaka ya serikali au mahitaji ya pamoja, wakati tatizo halisi ni kinyume chake - uundaji wa tofauti za kiholela zinazodhoofisha msingi thabiti wa haki za mali katika uhuru wa mtu binafsi.
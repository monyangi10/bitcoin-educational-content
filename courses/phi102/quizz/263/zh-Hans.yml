question: 根据对支持非自由制度的诡辩的分析，关于财产区分的 "国际诡辩 "的根本缺陷是什么？
answer: 它人为地区分了国家财产和私有财产，而这在财产权的基本性质中毫无依据
wrong_answers:
  - 它没有认识到国际贸易必然要求政府进行干预，以保护国内财产不受外国剥削
  - 它错误地假定私有财产可以独立于国家主权和国家对领土的控制而存在
  - 它忽视了对跨越国界、影响多国人口的资源的集体所有权的合理需求
explanation: |
  文中指出，国际诡辩是通过制造虚假区别来维持非自由制度的理论错误之一。这种诡辩人为地将国家财产与私有财产分开，而实际上两者都是建立在同样的以自我所有权为根基的财产权基本原则之上。其他选项错误地认为，诡辩论的缺陷在于对国家权力或集体需求的认识不足，而实际问题恰恰相反--制造任意的区分，破坏了财产权在个人自治中的连贯基础。
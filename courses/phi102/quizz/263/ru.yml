question: Согласно анализу софизмов, поддерживающих несвободные системы, в чем заключается фундаментальный недостаток "международного софизма", касающегося различий в собственности?
answer: Он создает искусственное различие между национальной и частной собственностью, которое не имеет под собой никакой основы в фундаментальном характере прав собственности
wrong_answers:
  - Он не признает, что международная торговля неизбежно требует вмешательства государства для защиты отечественной собственности от иностранной эксплуатации
  - В нем ошибочно предполагается, что частная собственность может существовать независимо от национального суверенитета и территориального контроля со стороны государства
  - Он упускает из виду законную необходимость коллективного владения ресурсами, которые пересекают национальные границы и затрагивают множество групп населения
explanation: |
  В тексте международный софизм рассматривается как одна из теоретических ошибок, поддерживающих несвободные системы путем создания ложных различий. Этот софизм искусственно отделяет национальную собственность от частной, в то время как в действительности обе они основаны на одном и том же фундаментальном принципе прав собственности, коренящемся в самообладании. Другие варианты неверно предполагают, что недостаток софизма заключается в недостаточном признании государственной власти или коллективных потребностей, в то время как на самом деле проблема заключается в обратном - в создании произвольных различий, которые подрывают последовательную основу прав собственности в индивидуальной автономии.
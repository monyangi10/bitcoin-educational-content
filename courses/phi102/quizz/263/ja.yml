question: 非自由主義体制を支持する詭弁の分析によれば、財産の区別に関する「国際的詭弁」の根本的な欠陥は何か？
answer: 国有財産と私有財産の間に人為的な区別を設けるもので、財産権の基本的な性質には何の根拠もない。
wrong_answers:
  - 国際貿易には、外国の搾取から国内の財産を守るために政府の介入が必要であることを認識していない。
  - それは、私有財産が国家主権や国家による領土支配とは無関係に存在しうると誤って想定している。
  - 国境を越え、複数の人々に影響を及ぼす資源の集団所有の正当な必要性を見落としている。
explanation: |
  本書は、誤った区別を作り出すことによって非自由主義体制を維持する理論的誤謬のひとつとして、国際的詭弁を挙げている。この詭弁は国家財産と私有財産を人為的に分離しているが、実際にはどちらも自己所有に根ざした財産権という同じ基本原則の上に成り立っている。他の選択肢は、詭弁の欠陥が国家権力や集団的ニーズの認識不足にあることを誤って示唆しているが、実際の問題はその逆である。恣意的な区別を設けることで、個人の自律性に基づく財産権の首尾一貫した基盤を損なっているのである。
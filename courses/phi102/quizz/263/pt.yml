question: De acordo com a análise dos sofismas que sustentam sistemas não-libertários, qual é a falha fundamental do "sofisma internacional" relativo às distinções de propriedade?
answer: Cria uma distinção artificial entre propriedade nacional e propriedade privada que não tem qualquer base na natureza fundamental dos direitos de propriedade
wrong_answers:
  - Não reconhece que o comércio internacional exige necessariamente a intervenção do Estado para proteger a propriedade nacional da exploração estrangeira
  - Parte incorretamente do princípio de que a propriedade privada pode existir independentemente da soberania nacional e do controlo territorial por parte do Estado
  - Ignora a necessidade legítima de propriedade colectiva dos recursos que atravessam as fronteiras nacionais e afectam múltiplas populações
explanation: |
  O texto identifica o sofisma internacional como um dos erros teóricos que sustentam os sistemas de não-liberdade através da criação de falsas distinções. Este sofisma separa artificialmente a propriedade nacional da propriedade privada, quando, na realidade, ambas assentam no mesmo princípio fundamental de direitos de propriedade enraizados na auto-propriedade. As outras opções sugerem incorretamente que a falha do sofisma reside no reconhecimento insuficiente da autoridade do Estado ou das necessidades colectivas, quando o problema real é o oposto - a criação de distinções arbitrárias que minam a base coerente dos direitos de propriedade na autonomia individual.
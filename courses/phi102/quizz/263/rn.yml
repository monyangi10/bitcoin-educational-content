question: Dushingiye ku gusesangura ama sophisme ashigikira uburyo butagira umwidegemvyo, ni irihe kosa ry’ishimikiro riri muri ‘sophisme mpuzamakungu’ ku bijanye n’ugutandukanya ivy’umutungo?
answer: Bituma habaho itandukaniro ry’ubuhinga hagati y’umutungo w’igihugu n’umutungo w’abantu ku giti cabo ritagira ishingiro mu kamere nyamukuru k’uburenganzira bw’umutungo .
wrong_answers:
  - Rirananirwa kwemera ko ubudandaji mpuzamakungu busaba vy’ukuri ko Leta igira ico ikoze kugira ngo ikingire umutungo wo mu gihugu gukoreshwa nabi n’abanyamahanga .
  - Rifata mu buryo butari bwo ko umutungo w’abantu ku giti cabo ushobora kubaho utagira ubusegaba bw’igihugu n’ubugenzuzi bw’intara bwa Leta .
  - Irarengagiza ivy’uko bikenewe ko abantu bose bagira ubutunzi bujabuka imbibe z’ibihugu kandi bugira ico bukoze ku bantu benshi .
explanation: |
  Ico canditswe kigaragaza ko ubuhinga mpuzamakungu ari bumwe mu makosa y’ivyiyumviro ashigikira uburyo butagira umwidegemvyo mu kurema itandukaniro ry’ibinyoma. Ubwo bupfumu butandukanya mu buryo bw’ubuhinga umutungo w’igihugu n’uw’abantu ku giti cabo, mu gihe mu vy’ukuri vyose bishingiye ku ngingo ngenderwako imwe y’ishimikiro y’uburenganzira bw’umutungo bushingiye ku kwitunga. Ayandi mahitamwo avuga mu buryo butari bwo ko akaga k’ubusofi kari mu kwemera bihagije ubukuru bwa Leta canke ivya nkenerwa rusangi, mu gihe ingorane nyayo ari ibihushanye n’ivyo - ugushiraho itandukaniro ry’ububisha rihungabanya umushinge uhuye w’uburenganzira bw’umutungo mu kwigenga kw’umuntu ku giti ciwe.
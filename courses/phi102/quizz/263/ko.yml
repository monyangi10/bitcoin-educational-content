question: 비자유주의 체제를 지지하는 궤변을 분석한 결과, 재산권 구별에 관한 '국제적 궤변'의 근본적인 결함은 무엇인가요?
answer: 재산권의 기본적 성격에 근거가 없는 국유재산과 사유재산을 인위적으로 구분하는 것입니다
wrong_answers:
  - 국제 무역은 외국의 착취로부터 국내 재산을 보호하기 위해 반드시 정부의 개입이 필요하다는 사실을 인식하지 못합니다
  - 사유 재산이 국가 주권 및 국가의 영토 통제와 독립적으로 존재할 수 있다고 잘못 가정합니다
  - 국경을 넘어 여러 인구에 영향을 미치는 자원의 공동 소유에 대한 정당한 필요성을 간과하고 있습니다
explanation: |
  이 글은 국제적 궤변을 잘못된 구분을 만들어 비자유주의 체제를 유지하는 이론적 오류 중 하나로 지적합니다. 이 궤변은 국유재산과 사유재산을 인위적으로 분리하지만, 실제로는 둘 다 자기 소유권에 뿌리를 둔 재산권이라는 동일한 기본 원칙에 기초하고 있습니다. 다른 옵션은 궤변의 결함이 국가 권위 또는 집단적 필요에 대한 불충분한 인식에 있다고 잘못 제안하지만, 실제 문제는 그 반대인 개인 자율성에서 재산권의 일관된 기반을 훼손하는 자의적 구분의 생성에 있습니다.
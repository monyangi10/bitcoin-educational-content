question: D'après l'analyse de l'acquisition territoriale présentée dans le texte, quel processus a rendu les revendications territoriales des premiers groupes humains légitimes et comparables aux droits de propriété individuels ?
answer: La combinaison de la découverte, des efforts de survie contre les dangers naturels et des améliorations ultérieures grâce à l'agriculture et au développement des infrastructures
wrong_answers:
  - L'établissement de documents juridiques officiels et de traités avec les tribus voisines pour reconnaître les frontières territoriales
  - La conquête d'un territoire par le biais de campagnes militaires organisées et la défaite des occupants précédents
  - Le consensus démocratique entre tous les membres du groupe suivi de la proclamation officielle des revendications territoriales
explanation: |
  Le texte souligne que la légitimité territoriale est le fruit d'un processus en plusieurs étapes : la découverte initiale de nouvelles terres, le travail dangereux de survie dans des conditions inconnues (lutte contre le climat, les prédateurs, etc.) et, surtout, l'amélioration ultérieure du territoire par l'agriculture, la construction de canaux et la construction de routes. Cela reflète la manière dont les individus acquièrent légitimement une propriété par le travail et l'amélioration. Le texte précise qu'il ne s'agit pas de violence ou d'accords formels, mais d'efforts de découverte, de survie et d'amélioration de la valeur de la terre.
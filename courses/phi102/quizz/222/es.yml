question: Según el análisis del texto sobre la adquisición de territorio, ¿qué proceso hizo que las reivindicaciones de los primeros grupos humanos sobre el territorio fueran legítimas y comparables a los derechos de propiedad individual?
answer: La combinación de descubrimientos, esfuerzos de supervivencia frente a los peligros naturales y mejoras posteriores mediante la agricultura y el desarrollo de infraestructuras
wrong_answers:
  - El establecimiento de documentos jurídicos formales y tratados con las tribus vecinas para reconocer los límites territoriales
  - La conquista de territorios mediante campañas militares organizadas y la derrota de los ocupantes anteriores
  - El consenso democrático entre todos los miembros del grupo seguido de la proclamación oficial de las reivindicaciones territoriales
explanation: |
  El texto subraya que la legitimidad territorial surgió a través de un proceso de varias etapas: el descubrimiento inicial de nuevas tierras, el peligroso trabajo de supervivencia en condiciones desconocidas (luchando contra el clima, los depredadores, etc.) y, sobre todo, la posterior mejora del territorio mediante la agricultura, la construcción de canales y la construcción de carreteras. Esto refleja cómo los individuos adquieren legítimamente la propiedad a través del trabajo y la mejora. El texto señala específicamente que no se trataba principalmente de violencia o acuerdos formales, sino del esfuerzo de descubrimiento, supervivencia y mejora del valor de la tierra.
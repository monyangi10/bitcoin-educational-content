question: 본문의 영토 획득에 대한 분석에 따르면, 초기 인류 집단의 영토에 대한 주장이 합법적이고 개인의 재산권에 비견될 수 있게 된 과정은 무엇인가?
answer: 발견, 자연 위험에 대한 생존 노력, 농업 및 인프라 개발을 통한 후속 개선의 결합
wrong_answers:
  - 영토 경계를 인정하기 위해 이웃 부족과 공식적인 법적 문서 및 조약을 체결합니다
  - 조직적인 군사 작전을 통해 영토를 정복하고 이전 거주자를 물리쳤습니다
  - 모든 그룹 구성원 간의 민주적 합의에 따른 영유권 주장 공식 선포
explanation: |
  이 텍스트는 영토의 정당성이 새로운 땅의 최초 발견, 미지의 환경에서 생존을 위한 위험한 작업(기후, 포식자와의 싸움 등), 그리고 결정적으로 농업, 운하 건설, 도로 건설을 통한 영토의 개선이라는 다단계 과정을 통해 발생했음을 강조합니다. 이는 개인이 노동과 개선을 통해 합법적으로 재산을 취득하는 방법을 반영합니다. 특히 이 글은 폭력이나 형식적인 합의가 아니라 발견, 생존, 토지의 가치 향상을 위한 노력의 결과라는 점을 강조합니다.
question: Согласно анализу территориальных приобретений в тексте, какой процесс сделал претензии ранних человеческих групп на территорию легитимными и сопоставимыми с правами индивидуальной собственности?
answer: Сочетание открытий, усилий по выживанию в борьбе с природными опасностями и последующих улучшений за счет развития сельского хозяйства и инфраструктуры
wrong_answers:
  - Создание официальных юридических документов и договоров с соседними племенами для признания территориальных границ
  - Завоевание территории путем организованных военных кампаний и разгрома предыдущих оккупантов
  - Демократический консенсус между всеми членами группы с последующим официальным провозглашением территориальных претензий
explanation: |
  В тексте подчеркивается, что территориальная легитимность возникла в результате многоступенчатого процесса: первоначального открытия новых земель, опасной работы по выживанию в неизвестных условиях (борьба с климатом, хищниками и т. д.) и, что очень важно, последующего улучшения территории посредством сельского хозяйства, строительства каналов и дорог. Это отражает то, как люди законно приобретают собственность через труд и улучшение. В тексте особо отмечается, что речь идет не о насилии или формальных соглашениях, а об усилиях по открытию, выживанию и повышению ценности земли.
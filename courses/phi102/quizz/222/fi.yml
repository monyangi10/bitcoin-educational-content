question: Tekstissä esitetyn aluevaltauksen analyysin mukaan mikä prosessi teki varhaisista ihmisryhmistä oikeutettuja ja yksilön omistusoikeuksiin verrattavia aluevaatimuksia?
answer: Löytämisen, luonnonvaaroista selviytymisen ja myöhempien parannusten yhdistelmä maatalouden ja infrastruktuurin kehittämisen avulla
wrong_answers:
  - Virallisten oikeudellisten asiakirjojen ja sopimusten laatiminen naapuriheimojen kanssa alueellisten rajojen tunnustamiseksi
  - Alueen valloitus järjestäytyneillä sotaretkillä ja aiempien miehittäjien kukistamisella
  - Kaikkien ryhmän jäsenten demokraattinen yksimielisyys, jota seuraa aluevaatimusten virallinen julistaminen
explanation: |
  Tekstissä korostetaan, että alueellinen legitiimiys syntyi monivaiheisen prosessin kautta: uusien maiden löytäminen, vaarallinen selviytymistyö tuntemattomissa olosuhteissa (taistelu ilmastoa, petoja jne. vastaan) ja ennen kaikkea alueen parantaminen maatalouden, kanavien ja teiden rakentamisen avulla. Tämä kuvastaa sitä, miten yksilöt hankkivat laillisesti omaisuutta työn ja parantamisen kautta. Tekstissä todetaan nimenomaan, että kyse ei ollut ensisijaisesti väkivallasta tai muodollisista sopimuksista, vaan löytämisen, selviytymisen ja maan arvon parantamisen ponnisteluista.
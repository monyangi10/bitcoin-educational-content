question: Volgens de analyse van territoriale verwerving in de tekst, welk proces maakte de aanspraken van vroege menselijke groepen op grondgebied legitiem en vergelijkbaar met individuele eigendomsrechten?
answer: De combinatie van ontdekkingen, overlevingspogingen tegen natuurlijke gevaren en daaropvolgende verbeteringen door landbouw en ontwikkeling van de infrastructuur
wrong_answers:
  - Het opstellen van formele juridische documenten en verdragen met naburige stammen om territoriale grenzen te erkennen
  - De verovering van grondgebied door georganiseerde militaire campagnes en het verslaan van vorige bezetters
  - De democratische consensus tussen alle groepsleden, gevolgd door de officiële afkondiging van territoriale aanspraken
explanation: |
  De tekst benadrukt dat territoriale legitimiteit ontstond door een proces dat uit meerdere fasen bestond: de eerste ontdekking van nieuw land, het gevaarlijke werk om te overleven in onbekende omstandigheden (vechten tegen het klimaat, roofdieren, enz.) en, wat cruciaal is, de daaropvolgende verbetering van het territorium door landbouw, de aanleg van kanalen en wegen. Dit weerspiegelt hoe individuen legitiem eigendom verwerven door werk en verbetering. In de tekst wordt specifiek opgemerkt dat het niet in de eerste plaats ging om geweld of formele overeenkomsten, maar om de inspanning van het ontdekken, overleven en het verhogen van de waarde van het land.
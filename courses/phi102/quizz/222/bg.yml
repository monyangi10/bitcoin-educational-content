question: Според анализа на териториалното придобиване, направен в текста, какъв процес е направил претенциите на ранните човешки групи за територия легитимни и сравними с индивидуалните права на собственост?
answer: Комбинацията от открития, усилия за оцеляване срещу природни опасности и последващи подобрения чрез развитие на селското стопанство и инфраструктурата
wrong_answers:
  - Създаване на официални правни документи и договори със съседни племена за признаване на териториалните граници
  - Завладяване на територия чрез организирани военни кампании и разгром на предишните обитатели
  - Демократичният консенсус между всички членове на групата, последван от официално обявяване на териториалните претенции
explanation: |
  В текста се подчертава, че териториалната легитимност възниква в резултат на многоетапен процес: първоначално откриване на нови земи, опасна работа за оцеляване в непознати условия (борба с климата, хищници и др.) и особено важно - последващо облагородяване на територията чрез земеделие, строителство на канали и пътища. Това отразява начина, по който индивидите законно придобиват собственост чрез работа и подобрения. В текста изрично се отбелязва, че това не е било свързано предимно с насилие или формални споразумения, а с усилията за откриване, оцеляване и подобряване на стойността на земята.
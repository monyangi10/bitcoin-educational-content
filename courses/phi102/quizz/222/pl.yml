question: Zgodnie z przeprowadzoną w tekście analizą nabywania terytoriów, jaki proces sprawił, że roszczenia wczesnych grup ludzkich do terytorium stały się uzasadnione i porównywalne z indywidualnymi prawami własności?
answer: Połączenie odkrycia, wysiłków na rzecz przetrwania w obliczu naturalnych zagrożeń oraz późniejszych ulepszeń dzięki rolnictwu i rozwojowi infrastruktury
wrong_answers:
  - Ustanowienie formalnych dokumentów prawnych i traktatów z sąsiednimi plemionami w celu uznania granic terytorialnych
  - Podbój terytorium poprzez zorganizowane kampanie wojskowe i pokonanie poprzednich okupantów
  - Demokratyczny konsensus między wszystkimi członkami grupy, po którym następuje oficjalne ogłoszenie roszczeń terytorialnych
explanation: |
  Tekst podkreśla, że legitymacja terytorialna powstała w wyniku wieloetapowego procesu: początkowego odkrycia nowych ziem, niebezpiecznej pracy nad przetrwaniem w nieznanych warunkach (walka z klimatem, drapieżnikami itp.), A co najważniejsze, późniejszej poprawy terytorium poprzez rolnictwo, budowę kanałów i budowę dróg. Odzwierciedla to sposób, w jaki jednostki legalnie nabywają własność poprzez pracę i ulepszenia. W tekście wyraźnie zauważono, że nie chodziło przede wszystkim o przemoc lub formalne umowy, ale o wysiłek związany z odkryciem, przetrwaniem i zwiększeniem wartości ziemi.
question: Hvilken prosess, ifølge tekstens analyse av territoriell tilegnelse, gjorde tidlige menneskegruppers krav på territorium legitime og sammenlignbare med individuell eiendomsrett?
answer: Kombinasjonen av oppdagelser, overlevelsesforsøk mot naturlige farer og påfølgende forbedringer gjennom jordbruk og utvikling av infrastruktur
wrong_answers:
  - Etablering av formelle juridiske dokumenter og avtaler med nabostammer for å anerkjenne territoriale grenser
  - Erobringen av territorium gjennom organiserte militære felttog og nedkjempelse av tidligere okkupanter
  - Demokratisk konsensus blant alle gruppemedlemmene etterfulgt av offisiell proklamasjon av territoriale krav
explanation: |
  Teksten understreker at territoriell legitimitet oppsto gjennom en prosess i flere trinn: den første oppdagelsen av nytt land, det farefulle arbeidet med å overleve under ukjente forhold (kamp mot klima, rovdyr osv.), og ikke minst den påfølgende forbedringen av territoriet gjennom jordbruk, kanalbygging og veibygging. Dette gjenspeiler hvordan enkeltpersoner legitimt skaffer seg eiendom gjennom arbeid og forbedring. Teksten påpeker at dette ikke først og fremst handlet om vold eller formelle avtaler, men om innsatsen for å oppdage, overleve og øke landets verdi.
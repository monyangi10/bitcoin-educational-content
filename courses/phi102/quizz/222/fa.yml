question: بر اساس تحلیل متن از کسب سرزمینی، چه فرآیندی ادعاهای گروه‌های انسانی اولیه به سرزمین را مشروع و قابل مقایسه با حقوق مالکیت فردی می‌کرد؟
answer: ترکیب کشف، تلاش‌های بقا در برابر خطرات طبیعی، و بهبودهای متعاقب از طریق کشاورزی و توسعه زیرساخت‌ها
wrong_answers:
  - ایجاد اسناد قانونی رسمی و معاهدات با قبایل همسایه برای به رسمیت شناختن مرزهای سرزمینی
  - فتح سرزمین از طریق لشکرکشی‌های نظامی سازمان‌یافته و شکست ساکنان قبلی
  - اجماع دموکراتیک در میان همه اعضای گروه که به دنبال آن اعلام رسمی ادعاهای ارضی صورت گرفت
explanation: |
  متن تأکید می‌کند که مشروعیت سرزمینی از طریق یک فرآیند چند مرحله‌ای به وجود آمد: کشف اولیه سرزمین‌های جدید، کار خطرناک بقا در شرایط ناشناخته (مبارزه با آب و هوا، شکارچیان، و غیره)، و به‌طور حیاتی، بهبود متعاقب سرزمین از طریق کشاورزی، ساخت کانال و جاده‌سازی. این شبیه به چگونگی کسب مشروعیت افراد برای مالکیت از طریق کار و بهبود است. متن به‌طور خاص اشاره می‌کند که این موضوع عمدتاً درباره خشونت یا توافقات رسمی نبود، بلکه درباره تلاش برای کشف، بقا و افزایش ارزش زمین بود.
question: Dukurikije icegeranyo ca Gustave de Molinari, ni ingaruka izihe zibaho mu mutwe iyo abandi bateye ubwoba uburenganzira bwacu?
answer: Ubwoba buduhatira gusubira gusuzuma no guhindura imigambi yacu .
wrong_answers:
  - Ishavu rituma twihora abatugirira nabi .
  - Urujijo rutubuza gufata ingingo zijanye n’ubwenge .
  - Ugutagira ico twitaho bidufasha kwirengagiza ingeramizi zo hanze
explanation: |
  Molinari yerekanye ko ubwoba ari co gisubizo nyamukuru co mu mutwe ku bijanye n’iterabwoba ry’uburenganzira bwacu. Ubwo bwoba burakora nk’inzira y’uguhagarika ibikorwa, bukaduhatira gusubira kwihweza no guhindura imigambi yacu y’intango. Uwo mubabaro wo mu mutwe uragabanya umwidegemvyo wacu ngirakamaro kubera ko tudashobora gukora nk’uko twobigira iyo hataba iyo ngeso mbi. Ayandi mahitamwo ntabwo ari meza: ishavu ryoshobora kubaho ariko si inyishu itunganijwe Molinari yadondora; uguvurungana si co kintu nyamukuru yasuzumye; kandi ukutagira ico twitaho vyoba ari ugutera imbere mu kwikingira kandi ntibijanye n’inyigisho yiwe yerekeye ingene iterabwoba rituma inyifato yacu idakora neza.
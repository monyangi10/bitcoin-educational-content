question: ¿Qué cambio fundamental en la producción hizo que la esclavitud quedara progresivamente obsoleta según el texto?
answer: Las actividades económicas se volvieron más intelectuales, exigiendo creatividad e innovación
wrong_answers:
  - El trabajo físico perdió importancia gracias a la mejora de los sistemas de transporte
  - Los mercados se expanden por todo el mundo y el comercio de esclavos deja de ser rentable
  - Los movimientos religiosos convencieron a la sociedad de que la esclavitud era moralmente incorrecta
explanation: |
  El texto afirma claramente que la esclavitud quedó obsoleta cuando la actividad económica se hizo más intelectual y exigió creatividad e innovación. Aunque los esclavos podían realizar tareas físicas bajo coacción, no podían inventar ni aplicar su vigor mental de forma productiva. Las otras opciones son incorrectas porque el texto no menciona la oposición religiosa como causa, y aunque se habla del transporte y los mercados como limitaciones en la antigüedad, su mejora por sí sola no hizo obsoleta la esclavitud -fue específicamente el cambio hacia el trabajo intelectual lo que hizo que la esclavitud fuera inadecuada.
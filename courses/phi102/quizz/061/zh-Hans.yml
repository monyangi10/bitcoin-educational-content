question: 根据课文内容，是什么根本性的生产变革使奴隶制逐渐过时？
answer: 经济活动变得更加智力化，需要创造力和创新力
wrong_answers:
  - 由于交通系统的改善，体力劳动变得不再重要
  - 市场扩展到全球，使奴隶贸易在经济上无利可图
  - 宗教运动使社会相信奴隶制在道德上是错误的
explanation: |
  文中明确指出，当经济活动变得更加智力化，需要创造力和创新力时，奴隶制就过时了。虽然奴隶可以在受限制的情况下完成体力劳动，但他们无法进行发明创造，也不能有效地运用他们的脑力。其他选项都不正确，因为文中并没有提到宗教反对是原因之一，虽然文中讨论了交通和市场是古代的制约因素，但仅仅是交通和市场的改善并没有使奴隶制过时--具体来说，是向智力劳动的转变使奴隶制变得不足。
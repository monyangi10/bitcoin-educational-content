question: 根據文中所述，生產中的什麼根本性變化使得奴隸制逐漸過時？
answer: 經濟活動變得更加智慧化，需要創意和創新
wrong_answers:
  - 由於運輸系統的改善，體力勞動變得不再重要
  - 市場擴展至全球，使奴隸貿易在經濟上無利可圖
  - 宗教運動使社會相信奴隸制在道德上是錯誤的
explanation: |
  文中清楚地指出，當經濟活動變得更有智慧，需要創意和創新時，奴隸制就變得過時了。雖然奴隸可以在受限制的情況下完成體力勞動，但他們無法發明或有效地運用他們的腦力。其他選項不正確，因為文中並沒有提到宗教反對是原因之一，而且雖然文中討論到交通和市場是古代的限制因素，但它們本身的改善並沒有使奴隸制過時 - 特別是朝向智力工作的轉變使奴隸制變得不夠。
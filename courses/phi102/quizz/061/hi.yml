question: What fundamental change in production made slavery progressively obsolete according to the text?
answer: Economic activities became more intellectual, requiring creativity and innovation
wrong_answers:
  - Physical labor became less important due to improved transportation systems
  - Markets expanded globally making slave trade economically unprofitable
  - Religious movements convinced society that slavery was morally wrong
explanation: |
  The text clearly states that slavery became obsolete when economic activity became more intellectual, requiring creativity and innovation. While slaves could perform physical tasks under constraint, they could not invent or apply their mental vigor productively. The other options are incorrect because the text doesn't mention religious opposition as a cause, and while transportation and markets are discussed as constraints in ancient times, their improvement alone didn't make slavery obsolete - it was specifically the shift toward intellectual work that made slavery inadequate.
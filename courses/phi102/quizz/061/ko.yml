question: 본문에 따르면 생산의 어떤 근본적인 변화가 노예제를 점차적으로 쓸모없게 만들었나요?
answer: 경제 활동은 더욱 지능화되어 창의성과 혁신이 필요해졌습니다
wrong_answers:
  - 개선된 교통 시스템으로 인해 육체 노동의 중요성이 줄어들었습니다
  - 전 세계적으로 시장이 확대되면서 노예 무역의 경제적 수익성이 떨어졌습니다
  - 종교 운동은 노예제도가 도덕적으로 잘못되었다는 것을 사회에 확신시켰습니다
explanation: |
  본문은 경제 활동이 창의성과 혁신을 필요로 하는 지적 활동으로 발전하면서 노예제도가 더 이상 필요하지 않게 되었다고 분명히 말합니다. 노예들은 제약 속에서 육체적 노동은 수행할 수 있었지만, 정신적 활력을 발명하거나 생산적으로 적용할 수는 없었습니다. 다른 옵션은 텍스트에 종교적 반대가 원인으로 언급되어 있지 않고, 고대에 교통과 시장이 제약으로 논의되기는 했지만, 그 개선만으로 노예제가 쓸모없어진 것이 아니라 지적 노동으로의 전환이 노예제를 부적절하게 만든 것이기 때문에 올바르지 않습니다.
question: Metne göre, üretimdeki hangi temel değişiklik köleliği aşamalı olarak geçersiz kılmıştır?
answer: Ekonomik faaliyetler daha entelektüel hale geldi, yaratıcılık ve yenilikçilik gerektirdi
wrong_answers:
  - Ulaşım sistemlerinin gelişmesi nedeniyle fiziksel emeğin önemi azaldı
  - Pazarlar küresel olarak genişledi ve köle ticaretini ekonomik olarak kârsız hale getirdi
  - Dini hareketler toplumu köleliğin ahlaki açıdan yanlış olduğuna ikna etti
explanation: |
  Metin, ekonomik faaliyetler daha entelektüel hale geldiğinde, yaratıcılık ve yenilikçilik gerektirdiğinde köleliğin modasının geçtiğini açıkça belirtmektedir. Köleler kısıtlama altında fiziksel görevleri yerine getirebilirken, icat yapamıyor ya da zihinsel güçlerini verimli bir şekilde kullanamıyorlardı. Diğer seçenekler yanlıştır çünkü metinde bir neden olarak dini muhalefetten bahsedilmemektedir ve ulaşım ve pazarlar eski çağlardaki kısıtlamalar olarak tartışılsa da, bunların gelişmesi tek başına köleliği geçersiz kılmamıştır - köleliği yetersiz kılan özellikle entelektüel çalışmaya geçiş olmuştur.
question: Koja je osnovna promena u proizvodnji učinila ropstvo progresivno zastarelim prema tekstu?
answer: Ekonomske aktivnosti postale su intelektualnije, zahtevajući kreativnost i inovacije.
wrong_answers:
  - Fizički rad je postao manje važan zbog poboljšanih transportnih sistema.
  - Tržišta su se proširila globalno čineći trgovinu robljem ekonomski neisplativom
  - Religiozni pokreti su ubedili društvo da je ropstvo moralno pogrešno.
explanation: |
  Tekst jasno navodi da je ropstvo postalo zastarelo kada je ekonomska aktivnost postala više intelektualna, zahtevajući kreativnost i inovacije. Dok su robovi mogli obavljati fizičke zadatke pod prisilom, nisu mogli izumeti ili produktivno primeniti svoj mentalni napor. Ostale opcije su netačne jer tekst ne spominje versku opoziciju kao uzrok, a iako se transport i tržišta pominju kao ograničenja u drevnim vremenima, njihovo poboljšanje samo po sebi nije učinilo ropstvo zastarelim - to je bio specifično prelazak ka intelektualnom radu koji je učinio ropstvo neadekvatnim.
question: Vilken grundläggande förändring i produktionen gjorde slaveriet gradvis föråldrat enligt texten?
answer: Den ekonomiska verksamheten blev mer intellektuell och krävde kreativitet och innovation
wrong_answers:
  - Fysiskt arbete blev mindre viktigt tack vare förbättrade transportsystem
  - Globala marknader expanderar och slavhandeln blir ekonomiskt olönsam
  - Religiösa rörelser övertygade samhället om att slaveri var moraliskt fel
explanation: |
  I texten framgår det tydligt att slaveriet blev föråldrat när den ekonomiska verksamheten blev mer intellektuell och krävde kreativitet och innovation. Slavar kunde utföra fysiska uppgifter under tvång, men de kunde inte uppfinna eller använda sin mentala kraft på ett produktivt sätt. De andra alternativen är felaktiga eftersom texten inte nämner religiöst motstånd som en orsak, och även om transporter och marknader diskuteras som begränsningar under antiken, gjorde inte enbart deras förbättring slaveriet föråldrat - det var specifikt övergången till intellektuellt arbete som gjorde slaveriet otillräckligt.
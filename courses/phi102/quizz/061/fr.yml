question: Quel changement fondamental dans la production a rendu l'esclavage progressivement obsolète selon le texte ?
answer: Les activités économiques sont devenues plus intellectuelles, faisant appel à la créativité et à l'innovation
wrong_answers:
  - Le travail physique a perdu de son importance grâce à l'amélioration des systèmes de transport
  - L'expansion des marchés à l'échelle mondiale rend la traite des esclaves économiquement non rentable
  - Les mouvements religieux ont convaincu la société que l'esclavage était moralement répréhensible
explanation: |
  Le texte indique clairement que l'esclavage est devenu obsolète lorsque l'activité économique est devenue plus intellectuelle, exigeant créativité et innovation. Si les esclaves pouvaient effectuer des tâches physiques sous la contrainte, ils ne pouvaient pas inventer ou utiliser leur force mentale de manière productive. Les autres options sont incorrectes car le texte ne mentionne pas l'opposition religieuse comme cause, et bien que les transports et les marchés soient considérés comme des contraintes dans l'Antiquité, leur amélioration seule n'a pas rendu l'esclavage obsolète - c'est spécifiquement l'évolution vers le travail intellectuel qui a rendu l'esclavage inadéquat.
question: Ni ihinduka irihe ry’ishimikiro mu bijanye n’uguhingura ryatumye ubuja bugenda burahera nk’uko ico canditswe kibivuga?
answer: Ibikorwa vy’ubutunzi vyaciye birushiriza kuba ivy’ubwenge, bisaba ubuhinga bwo kurema no gukora ibintu bishasha .
wrong_answers:
  - Ibikorwa vy'umubiri vyacitse bike cane kubera uburyo bwo gutwara abantu bwarateye imbere
  - Amasoko yaragutse kw'isi yose bituma ubudandaji bw'abaja butagira inyungu mu vy'ubutunzi
  - Amadini yaremeje abantu yuko ubuja ari ububi mu vy’inyifato runtu .
explanation: |
  Ico canditswe kivuga neza yuko ubuja bwacitse ubusa igihe ibikorwa vy’ubutunzi vyacitse ivy’ubwenge, bikaba bisaba ubuhinga bwo kurema no gukora ibintu bishasha. Naho abaja bashobora gukora ibikorwa vy’umubiri bacitse intege, ntibashobora guhingura canke gukoresha inguvu zabo zo mu mutwe mu buryo buvamwo ivyiza. Ayandi mahitamwo ntaco amaze kuko ico canditswe ntikivuga ko ukurwanywa kw’idini ari kwo kwatumye habaho, kandi naho gutwara abantu n’ibintu n’amasoko bivugwa nk’ibintu vyari bigoranye mu bihe vya kera, ugutera imbere kwavyo kwonyene ntikwatumye ubuja buba ubusa - ni uguhindukira cane cane kuja ku bikorwa vy’ubwenge vyatumye ubuja budakwiriye.
question: Que mudança fundamental na produção tornou a escravatura progressivamente obsoleta, de acordo com o texto?
answer: As actividades económicas tornaram-se mais intelectuais, exigindo criatividade e inovação
wrong_answers:
  - O trabalho físico tornou-se menos importante devido à melhoria dos sistemas de transporte
  - Os mercados expandiram-se a nível mundial, tornando o comércio de escravos economicamente não rentável
  - Os movimentos religiosos convenceram a sociedade de que a escravatura era moralmente errada
explanation: |
  O texto afirma claramente que a escravatura se tornou obsoleta quando a atividade económica se tornou mais intelectual, exigindo criatividade e inovação. Embora os escravos pudessem executar tarefas físicas sob coação, não podiam inventar ou aplicar o seu vigor mental de forma produtiva. As outras opções estão incorrectas, porque o texto não menciona a oposição religiosa como causa e, embora os transportes e os mercados sejam discutidos como constrangimentos na antiguidade, a sua melhoria, por si só, não tornou a escravatura obsoleta - foi especificamente a mudança para o trabalho intelectual que tornou a escravatura inadequada.
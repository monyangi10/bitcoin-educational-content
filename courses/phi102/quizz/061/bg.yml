question: Коя фундаментална промяна в производството прави робството постепенно отживелица според текста?
answer: Икономическите дейности стават по-интелектуални и изискват творчество и иновации
wrong_answers:
  - Физическият труд става по-малко важен поради подобрените транспортни системи
  - Пазарите се разширяват в световен мащаб, което прави търговията с роби икономически неизгодна
  - Религиозните движения убеждават обществото, че робството е морално погрешно
explanation: |
  В текста ясно се посочва, че робството е отживяло времето, когато икономическата дейност е станала по-интелектуална и е изисквала творчество и иновации. Макар че робите са можели да изпълняват физически задачи под натиск, те не са можели да изобретяват или да използват продуктивно умствените си способности. Другите варианти са неправилни, защото в текста не се споменава религиозното противопоставяне като причина и макар че транспортът и пазарите се обсъждат като ограничения в древността, само тяхното усъвършенстване не е направило робството отживелица - именно преминаването към интелектуален труд е направило робството неадекватно.
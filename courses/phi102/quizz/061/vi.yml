question: Theo văn bản, sự thay đổi cơ bản nào trong sản xuất đã khiến chế độ nô lệ dần trở nên lỗi thời?
answer: Các hoạt động kinh tế trở nên mang tính trí tuệ hơn, đòi hỏi sự sáng tạo và đổi mới.
wrong_answers:
  - Do hệ thống giao thông được cải thiện, lao động chân tay trở nên ít quan trọng hơn.
  - Thị trường toàn cầu mở rộng khiến việc buôn bán nô lệ trở nên không còn sinh lợi về mặt kinh tế.
  - Các phong trào tôn giáo đã thuyết phục xã hội rằng chế độ nô lệ là sai trái về mặt đạo đức.
explanation: |
  Văn bản nêu rõ rằng chế độ nô lệ trở nên lỗi thời khi hoạt động kinh tế chuyển sang hướng trí tuệ hơn, đòi hỏi sự sáng tạo và đổi mới. Mặc dù nô lệ có thể thực hiện các công việc chân tay dưới sự ràng buộc, nhưng họ không thể phát minh hoặc vận dụng trí tuệ của mình một cách hiệu quả. Các lựa chọn khác không chính xác vì văn bản không đề cập đến sự phản đối của tôn giáo như một nguyên nhân, và mặc dù vận chuyển và thị trường được thảo luận như những hạn chế trong thời cổ đại, nhưng sự cải thiện của chúng không đủ để làm cho chế độ nô lệ trở nên lỗi thời - chính sự chuyển dịch sang lao động trí tuệ mới khiến chế độ nô lệ trở nên không phù hợp.
question: تغییر اساسی در تولید که به تدریج برده‌داری را منسوخ کرد، چه بود؟
answer: فعالیت‌های اقتصادی بیشتر فکری شدند و به خلاقیت و نوآوری نیاز داشتند.
wrong_answers:
  - کار فیزیکی به دلیل بهبود سیستم‌های حمل و نقل کمتر اهمیت یافت.
  - بازارها به صورت جهانی گسترش یافتند و تجارت برده را از نظر اقتصادی غیرسودآور کردند.
  - جنبش‌های مذهبی جامعه را متقاعد کردند که برده‌داری از نظر اخلاقی نادرست است.
explanation: |
  متن به وضوح بیان می‌کند که برده‌داری زمانی منسوخ شد که فعالیت اقتصادی بیشتر فکری شد و به خلاقیت و نوآوری نیاز داشت. در حالی که بردگان می‌توانستند وظایف فیزیکی را تحت فشار انجام دهند، نمی‌توانستند به طور خلاقانه اختراع کنند یا نیروی ذهنی خود را به طور مؤثر به کار گیرند. گزینه‌های دیگر نادرست هستند زیرا متن به مخالفت مذهبی به عنوان یک علت اشاره نمی‌کند و در حالی که حمل و نقل و بازارها به عنوان محدودیت‌های زمان‌های باستانی مورد بحث قرار می‌گیرند، بهبود آنها به تنهایی برده‌داری را منسوخ نکرد - به طور خاص تغییر به سمت کار فکری بود که برده‌داری را ناکافی کرد.
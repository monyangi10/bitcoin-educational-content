question: Mikä perustavanlaatuinen muutos tuotannossa teki tekstin mukaan orjuuden asteittain tarpeettomaksi?
answer: Taloudellisesta toiminnasta tuli entistä älyllisempää, ja se vaati luovuutta ja innovointia
wrong_answers:
  - Fyysisen työn merkitys väheni kuljetusjärjestelmien parantumisen myötä
  - Markkinat laajenivat maailmanlaajuisesti, mikä teki orjakaupasta taloudellisesti kannattamatonta
  - Uskonnolliset liikkeet vakuuttivat yhteiskunnan siitä, että orjuus oli moraalisesti väärin
explanation: |
  Tekstissä todetaan selvästi, että orjuudesta tuli tarpeetonta, kun taloudellinen toiminta muuttui älyllisemmäksi ja vaati luovuutta ja innovointia. Vaikka orjat pystyivät suorittamaan fyysisiä tehtäviä rajoitetusti, he eivät kyenneet keksimään tai käyttämään henkistä tarmokkuuttaan tuottavasti. Muut vaihtoehdot ovat virheellisiä, koska tekstissä ei mainita uskonnollista vastarintaa syynä, ja vaikka kuljetuksia ja markkinoita käsitelläänkin rajoituksina antiikin aikana, niiden parantuminen ei yksinään tehnyt orjuudesta vanhentunutta - orjuudesta teki riittämättömän nimenomaan siirtyminen kohti henkistä työtä.
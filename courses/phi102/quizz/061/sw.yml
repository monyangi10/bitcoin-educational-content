question: Ni mabadiliko gani ya msingi katika uzalishaji yaliyofanya utumwa upitwe hatua kwa hatua kulingana na maandishi?
answer: Shughuli za kiuchumi zikawa za kiakili zaidi, zikihitaji ubunifu na uvumbuzi
wrong_answers:
  - Kazi ya kimwili ikawa haina umuhimu mkubwa kutokana na mifumo bora ya usafiri
  - Masoko yamepanuka duniani kote na kufanya biashara ya utumwa kutokuwa na faida kiuchumi
  - Harakati za kidini ziliishawishi jamii kwamba utumwa ulikuwa mbaya kimaadili
explanation: |
  Maandishi yanasema wazi kwamba utumwa ulipitwa na wakati shughuli za kiuchumi zilipozidi kuwa za kiakili, zikihitaji ubunifu na uvumbuzi. Ingawa watumwa wangeweza kufanya kazi za kimwili chini ya vikwazo, hawakuweza kubuni au kutumia nguvu zao za kiakili kwa ufanisi. Chaguzi zingine si sahihi kwa sababu maandishi hayataji upinzani wa kidini kama sababu, na ingawa usafiri na masoko vinajadiliwa kama vikwazo katika nyakati za kale, uboreshaji wao pekee haukufanya utumwa upitwe na wakati - hasa ilikuwa mabadiliko kuelekea kazi ya kiakili ambayo yalifanya utumwa usitoshe.
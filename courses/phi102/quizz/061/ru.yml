question: Какое фундаментальное изменение в производстве сделало рабство постепенно устаревшим, согласно тексту?
answer: Экономическая деятельность стала более интеллектуальной, требующей творчества и инноваций
wrong_answers:
  - Физический труд стал менее значимым благодаря совершенствованию транспортных систем
  - Расширение рынков сбыта в глобальном масштабе сделало работорговлю экономически невыгодной
  - Религиозные движения убеждали общество в том, что рабство морально неправильно
explanation: |
  В тексте ясно сказано, что рабство стало немодным, когда экономическая деятельность стала более интеллектуальной, требующей творчества и инноваций. Хотя рабы могли выполнять физические задачи в условиях ограничений, они не могли изобретать или продуктивно применять свои умственные способности. Другие варианты неверны, потому что в тексте не упоминается религиозная оппозиция как причина, и хотя транспорт и рынки обсуждаются как ограничения в древние времена, само по себе их улучшение не сделало рабство устаревшим - именно переход к интеллектуальному труду сделал рабство неадекватным.
question: Welke fundamentele verandering in de productie maakte slavernij volgens de tekst geleidelijk overbodig?
answer: Economische activiteiten werden intellectueler en vereisten creativiteit en innovatie
wrong_answers:
  - Fysieke arbeid werd minder belangrijk door verbeterde transportsystemen
  - Markten breidden zich wereldwijd uit waardoor slavenhandel economisch onrendabel werd
  - Religieuze bewegingen overtuigden de samenleving ervan dat slavernij moreel verkeerd was
explanation: |
  De tekst stelt duidelijk dat slavernij overbodig werd toen economische activiteit intellectueler werd en creativiteit en innovatie vereiste. Terwijl slaven fysieke taken konden uitvoeren onder dwang, konden ze niet uitvinden of hun mentale kracht productief inzetten. De andere opties zijn onjuist omdat de tekst religieuze oppositie niet noemt als een oorzaak, en hoewel transport en markten besproken worden als beperkingen in de oudheid, maakte hun verbetering alleen slavernij niet overbodig - het was specifiek de verschuiving naar intellectueel werk die slavernij inadequaat maakte.
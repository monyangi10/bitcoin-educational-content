question: Hvilken grunnleggende endring i produksjonen gjorde slaveriet gradvis foreldet, ifølge teksten?
answer: Økonomiske aktiviteter ble mer intellektuelle, noe som krevde kreativitet og innovasjon
wrong_answers:
  - Fysisk arbeid ble mindre viktig på grunn av forbedrede transportsystemer
  - Globale markeder ekspanderte og gjorde slavehandel økonomisk ulønnsom
  - Religiøse bevegelser overbeviste samfunnet om at slaveri var moralsk galt
explanation: |
  Teksten er tydelig på at slaveriet ble foreldet da den økonomiske aktiviteten ble mer intellektuell og krevde kreativitet og innovasjon. Mens slaver kunne utføre fysiske oppgaver under tvang, kunne de ikke oppfinne eller bruke sin mentale kraft produktivt. De andre alternativene er feil fordi teksten ikke nevner religiøs motstand som en årsak, og selv om transport og markeder omtales som begrensninger i antikken, var det ikke forbedringen av disse som alene gjorde slaveriet overflødig - det var nettopp overgangen til intellektuelt arbeid som gjorde slaveriet utilstrekkelig.
question: 本文によれば、生産におけるどのような根本的変化が奴隷制を徐々に廃れさせたのか？
answer: 経済活動がより知的なものとなり、創造性と革新性が求められるようになった。
wrong_answers:
  - 交通機関の発達により肉体労働の重要性が低下
  - 市場は世界的に拡大し、奴隷貿易は経済的に採算がとれなくなった。
  - 宗教運動は、奴隷制度は道徳的に間違っていると社会に確信させた。
explanation: |
  この文章には、経済活動がより知的なものになり、創造性や革新性が必要とされるようになると、奴隷制度は時代遅れになったと明確に書かれている。奴隷は制約の中で肉体的な仕事をこなすことはできても、発明したり、精神的な活力を生産的に活用したりすることはできなかった。他の選択肢は間違っている。というのも、本文は宗教的な反対を原因として言及していないし、古代における制約として交通と市場が論じられてはいるが、それらの改善だけでは奴隷制度は時代遅れにはならなかったからである。
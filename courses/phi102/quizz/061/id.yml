question: Perubahan mendasar apa dalam produksi yang membuat perbudakan semakin usang menurut teks?
answer: Kegiatan ekonomi menjadi lebih intelektual, membutuhkan kreativitas dan inovasi
wrong_answers:
  - Kerja fisik menjadi kurang penting karena sistem transportasi yang lebih baik
  - Pasar yang semakin meluas secara global membuat perdagangan budak tidak menguntungkan secara ekonomi
  - Gerakan-gerakan keagamaan meyakinkan masyarakat bahwa perbudakan secara moral adalah salah
explanation: |
  Teks tersebut dengan jelas menyatakan bahwa perbudakan menjadi usang ketika aktivitas ekonomi menjadi lebih intelektual, membutuhkan kreativitas dan inovasi. Meskipun para budak dapat melakukan tugas-tugas fisik di bawah keterbatasan, mereka tidak dapat menciptakan atau menerapkan kekuatan mental mereka secara produktif. Pilihan lain tidak benar karena teks tidak menyebutkan pertentangan agama sebagai penyebabnya, dan meskipun transportasi dan pasar dibahas sebagai kendala di zaman kuno, perbaikannya saja tidak membuat perbudakan menjadi usang - secara khusus pergeseran ke arah pekerjaan intelektual yang membuat perbudakan tidak memadai.
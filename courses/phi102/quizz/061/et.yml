question: Milline põhimõtteline muutus tootmises muutis teksti kohaselt orjuse järk-järgult iganenuks?
answer: Majandustegevus muutus intellektuaalsemaks, nõudes loovust ja uuenduslikkust
wrong_answers:
  - Füüsilise töö tähtsus vähenes tänu täiustatud transpordisüsteemidele
  - Turud laienesid ülemaailmselt, muutes orjakaubanduse majanduslikult kahjumlikuks
  - Religioossed liikumised veensid ühiskonda, et orjapidamine on moraalselt vale
explanation: |
  Tekstis on selgelt öeldud, et orjapidamine muutus iganenuks, kui majandustegevus muutus intellektuaalsemaks, nõudes loovust ja uuenduslikkust. Kuigi orjad võisid füüsilisi ülesandeid sundkorras täita, ei suutnud nad leiutada ega oma vaimset jõudu produktiivselt rakendada. Teised valikud on valed, sest tekstis ei mainita usulist vastuseisu põhjusena ning kuigi transpordist ja turgudest räägitakse kui piirangutest antiikajal, ei muutnud ainuüksi nende täiustamine orjapidamist iganenuks - just üleminek intellektuaalsele tööle muutis orjapidamise ebapiisavaks.
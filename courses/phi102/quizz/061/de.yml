question: Welcher grundlegende Wandel in der Produktion machte dem Text zufolge die Sklaverei nach und nach überflüssig?
answer: Die wirtschaftlichen Aktivitäten wurden intellektueller und erforderten Kreativität und Innovation
wrong_answers:
  - Körperliche Arbeit verlor durch die verbesserten Transportsysteme an Bedeutung
  - Globale Ausweitung der Märkte macht den Sklavenhandel wirtschaftlich unrentabel
  - Religiöse Bewegungen überzeugten die Gesellschaft, dass die Sklaverei moralisch falsch war
explanation: |
  Aus dem Text geht eindeutig hervor, dass die Sklaverei überflüssig wurde, als die Wirtschaftstätigkeit immer intellektueller wurde und Kreativität und Innovation erforderte. Sklaven konnten zwar unter Zwang körperliche Arbeiten verrichten, aber sie konnten keine Erfindungen machen oder ihre geistige Kraft produktiv einsetzen. Die anderen Optionen sind falsch, weil der Text die religiöse Opposition nicht als Ursache erwähnt, und obwohl Transport und Märkte als Zwänge in der Antike diskutiert werden, machte ihre Verbesserung allein die Sklaverei nicht obsolet - es war vor allem die Verlagerung auf geistige Arbeit, die die Sklaverei unangemessen machte.
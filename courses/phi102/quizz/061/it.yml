question: Quale cambiamento fondamentale nella produzione ha reso la schiavitù progressivamente obsoleta secondo il testo?
answer: Le attività economiche sono diventate più intellettuali e richiedono creatività e innovazione
wrong_answers:
  - Il lavoro fisico è diventato meno importante grazie al miglioramento dei sistemi di trasporto
  - I mercati si espansero a livello globale rendendo il commercio degli schiavi economicamente non redditizio
  - I movimenti religiosi convinsero la società che la schiavitù era moralmente sbagliata
explanation: |
  Il testo afferma chiaramente che la schiavitù è diventata obsoleta quando l'attività economica è diventata più intellettuale, richiedendo creatività e innovazione. Mentre gli schiavi potevano svolgere compiti fisici sotto costrizione, non potevano inventare o applicare il loro vigore mentale in modo produttivo. Le altre opzioni non sono corrette perché il testo non menziona l'opposizione religiosa come causa e, sebbene i trasporti e i mercati siano discussi come vincoli nell'antichità, il loro miglioramento da solo non ha reso la schiavitù obsoleta: è stato proprio il passaggio al lavoro intellettuale a rendere la schiavitù inadeguata.
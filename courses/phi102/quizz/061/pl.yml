question: Jaka fundamentalna zmiana w produkcji sprawiła, że niewolnictwo stało się stopniowo przestarzałe?
answer: Działalność gospodarcza stała się bardziej intelektualna, wymagająca kreatywności i innowacyjności
wrong_answers:
  - Praca fizyczna stała się mniej ważna dzięki ulepszonym systemom transportu
  - Rynki rozszerzyły się globalnie, czyniąc handel niewolnikami ekonomicznie nieopłacalnym
  - Ruchy religijne przekonały społeczeństwo, że niewolnictwo jest moralnie złe
explanation: |
  Tekst wyraźnie stwierdza, że niewolnictwo stało się przestarzałe, gdy działalność gospodarcza stała się bardziej intelektualna, wymagająca kreatywności i innowacji. Podczas gdy niewolnicy mogli wykonywać zadania fizyczne pod przymusem, nie mogli wymyślać ani produktywnie wykorzystywać swojej siły umysłowej. Pozostałe opcje są niepoprawne, ponieważ tekst nie wspomina o sprzeciwie religijnym jako przyczynie, a chociaż transport i rynki są omawiane jako ograniczenia w czasach starożytnych, sama ich poprawa nie sprawiła, że niewolnictwo stało się przestarzałe - to właśnie przesunięcie w kierunku pracy intelektualnej sprawiło, że niewolnictwo stało się nieadekwatne.
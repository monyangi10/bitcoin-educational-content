question: การเปลี่ยนแปลงพื้นฐานในกระบวนการผลิตที่ทำให้การเป็นทาสค่อยๆ ล้าสมัยไปตามข้อความคืออะไร?
answer: กิจกรรมทางเศรษฐกิจกลายเป็นเรื่องทางปัญญามากขึ้น ต้องการความคิดสร้างสรรค์และนวัตกรรม
wrong_answers:
  - แรงงานทางกายภาพมีความสำคัญน้อยลงเนื่องจากระบบการขนส่งที่พัฒนาขึ้น
  - ตลาดขยายตัวทั่วโลกทำให้การค้าทาสไม่มีกำไรทางเศรษฐกิจ
  - ขบวนการทางศาสนาได้โน้มน้าวสังคมว่าการเป็นทาสนั้นผิดศีลธรรม
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าการเป็นทาสกลายเป็นสิ่งล้าสมัยเมื่อกิจกรรมทางเศรษฐกิจกลายเป็นเรื่องทางปัญญามากขึ้น ซึ่งต้องการความคิดสร้างสรรค์และนวัตกรรม แม้ว่าทาสจะสามารถทำงานทางกายภาพภายใต้ข้อจำกัดได้ แต่พวกเขาไม่สามารถประดิษฐ์หรือใช้ความกระตือรือร้นทางจิตใจของตนได้อย่างมีประสิทธิภาพ ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะข้อความไม่ได้กล่าวถึงการคัดค้านทางศาสนาเป็นสาเหตุ และแม้ว่าการขนส่งและตลาดจะถูกกล่าวถึงว่าเป็นข้อจำกัดในสมัยโบราณ แต่การปรับปรุงเพียงอย่างเดียวไม่ได้ทำให้การเป็นทาสล้าสมัย - มันเป็นการเปลี่ยนไปสู่การทำงานทางปัญญาโดยเฉพาะที่ทำให้การเป็นทาสไม่เพียงพอ
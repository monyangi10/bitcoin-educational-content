question: Jaká zásadní změna ve výrobě podle textu způsobila, že otroctví postupně zastaralo?
answer: Hospodářské činnosti se staly intelektuálnějšími a vyžadovaly kreativitu a inovace
wrong_answers:
  - Fyzická práce ztratila na významu díky zlepšení dopravních systémů
  - Rozšíření trhů po celém světě způsobilo, že obchod s otroky se stal ekonomicky nevýhodným
  - Náboženská hnutí přesvědčila společnost, že otroctví je morálně špatné
explanation: |
  V textu se jasně uvádí, že otroctví se stalo zastaralým, když se ekonomická činnost stala intelektuálnější a vyžadovala kreativitu a inovace. Zatímco otroci mohli vykonávat fyzické úkoly pod tlakem, nemohli vynalézat nebo produktivně využívat své duševní síly. Ostatní možnosti jsou nesprávné, protože text nezmiňuje náboženský odpor jako příčinu, a i když se o dopravě a trzích hovoří jako o omezeních ve starověku, jejich zdokonalení samo o sobě neznamenalo, že otroctví zastaralo - byl to právě posun k intelektuální práci, který učinil otroctví neadekvátním.
question: According to liberal economic theory, what distinguishes modern voluntary exchange from early human resource competition?
answer: Modern exchange creates new utilities through production, while early competition involved taking existing resources through force
wrong_answers:
  - Modern exchange relies on government regulation, while early competition was based on natural market mechanisms
  - Modern exchange eliminates scarcity entirely, while early competition was caused by limited natural resources
  - Modern exchange requires international treaties, while early competition was resolved through local tribal agreements
explanation: |
  The text explains that early humans competed violently for limited natural resources that no one had produced (fruits, fish, etc.), where enrichment meant taking from others. Modern economic relationships are based on creating new wealth through production (like agriculture), enabling voluntary exchanges that benefit both parties. This fundamental shift from appropriation by force to wealth creation through production transformed human relationships from zero-sum competition to positive-sum cooperation.

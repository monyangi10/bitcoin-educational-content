question: Co według liberalnej teorii ekonomii odróżnia współczesną dobrowolną wymianę od wczesnej konkurencji o zasoby ludzkie?
answer: Nowoczesna wymiana tworzy nowe narzędzia poprzez produkcję, podczas gdy wczesna konkurencja polegała na przejmowaniu istniejących zasobów siłą
wrong_answers:
  - Nowoczesna wymiana opiera się na regulacjach rządowych, podczas gdy wczesna konkurencja opierała się na naturalnych mechanizmach rynkowych
  - Nowoczesna wymiana całkowicie eliminuje niedobór, podczas gdy wczesna konkurencja była spowodowana ograniczonymi zasobami naturalnymi
  - Nowoczesna wymiana wymaga międzynarodowych traktatów, podczas gdy wczesna konkurencja była rozwiązywana poprzez lokalne umowy plemienne
explanation: |
  Tekst wyjaśnia, że pierwsi ludzie brutalnie rywalizowali o ograniczone zasoby naturalne, których nikt nie produkował (owoce, ryby itp.), a wzbogacanie się oznaczało odbieranie innym. Nowoczesne relacje gospodarcze opierają się na tworzeniu nowego bogactwa poprzez produkcję (np. rolnictwo), umożliwiając dobrowolną wymianę, która przynosi korzyści obu stronom. To fundamentalne przejście od zawłaszczania siłą do tworzenia bogactwa poprzez produkcję przekształciło relacje międzyludzkie z konkurencji o sumie zerowej we współpracę o sumie dodatniej.
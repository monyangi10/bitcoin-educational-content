question: Theo lý thuyết kinh tế tự do, điều gì phân biệt trao đổi tự nguyện hiện đại với cạnh tranh nguồn nhân lực thời kỳ đầu?
answer: Trao đổi hiện đại tạo ra các tiện ích mới thông qua sản xuất, trong khi cạnh tranh thời kỳ đầu liên quan đến việc chiếm đoạt các nguồn tài nguyên hiện có bằng vũ lực.
wrong_answers:
  - Trao đổi hiện đại dựa trên sự điều tiết của chính phủ, trong khi cạnh tranh thời kỳ đầu dựa trên các cơ chế thị trường tự nhiên.
  - Trao đổi hiện đại loại bỏ hoàn toàn sự khan hiếm, trong khi cạnh tranh thời kỳ đầu là do nguồn tài nguyên thiên nhiên hạn chế.
  - Trao đổi hiện đại đòi hỏi các hiệp ước quốc tế, trong khi cạnh tranh thời kỳ đầu được giải quyết thông qua các thỏa thuận bộ lạc địa phương.
explanation: |
  Văn bản giải thích rằng người tiền sử đã cạnh tranh khốc liệt để giành giật các nguồn tài nguyên thiên nhiên hạn chế mà không ai sản xuất ra (trái cây, cá, v.v.), trong đó sự giàu có đồng nghĩa với việc lấy đi từ người khác. Các mối quan hệ kinh tế hiện đại dựa trên việc tạo ra của cải mới thông qua sản xuất (như nông nghiệp), cho phép các cuộc trao đổi tự nguyện có lợi cho cả hai bên. Sự chuyển đổi cơ bản này từ việc chiếm đoạt bằng vũ lực sang tạo ra của cải thông qua sản xuất đã biến đổi các mối quan hệ của con người từ cạnh tranh không có lợi sang hợp tác có lợi.
question: Според либералната икономическа теория какво отличава съвременния доброволен обмен от ранната конкуренция на човешки ресурси?
answer: Съвременният обмен създава нови комунални услуги чрез производство, докато ранната конкуренция включва отнемане на съществуващи ресурси чрез сила
wrong_answers:
  - Съвременният обмен се основава на правителствено регулиране, докато ранната конкуренция се основава на естествени пазарни механизми
  - Съвременният обмен елиминира изцяло недостига, докато ранната конкуренция се дължи на ограничените природни ресурси
  - Съвременният обмен изисква международни договори, докато ранната конкуренция се е решавала чрез местни племенни споразумения
explanation: |
  В текста се обяснява, че първите хора са се конкурирали жестоко за ограничените природни ресурси, които никой не е произвеждал (плодове, риба и др.), като обогатяването е означавало да се отнемат от другите. Съвременните икономически взаимоотношения се основават на създаването на нови богатства чрез производство (като земеделието), което дава възможност за доброволна размяна, от която се възползват и двете страни. Тази фундаментална промяна от присвояване със сила към създаване на богатство чрез производство трансформира човешките взаимоотношения от конкуренция с нулева сума към сътрудничество с положителна сума.
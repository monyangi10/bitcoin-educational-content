question: Kulingana na nadharia ya uchumi huria, ni nini kinachotofautisha ubadilishanaji wa hiari wa kisasa na ushindani wa awali wa rasilimali watu?
answer: Ubadilishanaji wa kisasa huunda huduma mpya kupitia uzalishaji, huku ushindani wa mapema ukihusisha kuchukua rasilimali zilizopo kupitia nguvu
wrong_answers:
  - Ubadilishanaji wa kisasa unategemea kanuni za serikali, huku ushindani wa mapema ukitegemea mifumo asilia ya soko
  - Ubadilishanaji wa kisasa huondoa uhaba kabisa, huku ushindani wa mapema ukisababishwa na rasilimali chache za asili
  - Ubadilishanaji wa kisasa unahitaji mikataba ya kimataifa, huku ushindani wa mapema ukitatuliwa kupitia mikataba ya kikabila ya ndani
explanation: |
  Maandishi yanaelezea kwamba wanadamu wa awali walishindana kwa nguvu kwa ajili ya maliasili chache ambazo hakuna mtu aliyezalisha (matunda, samaki, n.k.), ambapo utajiri ulimaanisha kuchukua kutoka kwa wengine. Mahusiano ya kiuchumi ya kisasa yanategemea kuunda utajiri mpya kupitia uzalishaji (kama vile kilimo), kuwezesha ubadilishanaji wa hiari unaonufaisha pande zote mbili. Mabadiliko haya ya msingi kutoka kwa ugawaji kwa nguvu hadi uundaji wa utajiri kupitia uzalishaji yalibadilisha uhusiano wa kibinadamu kutoka kwa ushindani wa jumla isiyo na jumla hadi ushirikiano chanya wa jumla.
question: Wat onderscheidt volgens de liberale economische theorie de moderne vrijwillige uitwisseling van de vroege concurrentie op het gebied van menselijke hulpbronnen?
answer: Moderne uitwisseling creëert nieuwe hulpbronnen door productie, terwijl vroege concurrentie inhield dat bestaande hulpbronnen met geweld werden afgenomen
wrong_answers:
  - Moderne uitwisseling is gebaseerd op overheidsregulering, terwijl vroege concurrentie was gebaseerd op natuurlijke marktmechanismen
  - Moderne ruil elimineert schaarste volledig, terwijl vroege concurrentie werd veroorzaakt door beperkte natuurlijke hulpbronnen
  - Moderne uitwisselingen vereisen internationale verdragen, terwijl vroege concurrentie werd opgelost door overeenkomsten met lokale stammen
explanation: |
  De tekst legt uit dat vroege mensen gewelddadig concurreerden om beperkte natuurlijke hulpbronnen die niemand had geproduceerd (fruit, vis, enz.), waarbij verrijking betekende dat er van anderen werd afgenomen. Moderne economische relaties zijn gebaseerd op het creëren van nieuwe rijkdom door middel van productie (zoals landbouw), waardoor vrijwillige uitwisselingen mogelijk zijn die beide partijen ten goede komen. Deze fundamentele verschuiving van toe-eigening met geweld naar het creëren van rijkdom door productie transformeerde menselijke relaties van nulsomconcurrentie naar positieve samenwerking.
question: Mikä liberaalin talousteorian mukaan erottaa nykyaikaisen vapaaehtoisen vaihdon varhaisesta inhimillisten voimavarojen kilpailusta?
answer: Nykyaikainen vaihto luo uusia hyödykkeitä tuotannon kautta, kun taas varhaisessa kilpailussa otettiin olemassa olevia resursseja väkisin
wrong_answers:
  - Nykyaikainen vaihto perustuu valtion sääntelyyn, kun taas varhainen kilpailu perustui luonnollisiin markkinamekanismeihin
  - Nykyaikainen vaihto poistaa niukkuuden kokonaan, kun taas varhainen kilpailu johtui luonnonvarojen rajallisuudesta
  - Nykyaikainen vaihto edellyttää kansainvälisiä sopimuksia, kun taas varhainen kilpailu ratkaistiin paikallisilla heimosopimuksilla
explanation: |
  Tekstissä selitetään, että varhaiset ihmiset kilpailivat väkivaltaisesti rajallisista luonnonvaroista, joita kukaan ei ollut tuottanut (hedelmät, kalat jne.), ja rikastuminen tarkoitti toisten riistämistä. Nykyaikaiset taloussuhteet perustuvat uuden rikkauden luomiseen tuotannon avulla (kuten maataloudessa), mikä mahdollistaa vapaaehtoisen vaihdon, josta molemmat osapuolet hyötyvät. Tämä perustavanlaatuinen siirtyminen väkisin tapahtuvasta haltuunotosta vaurauden luomiseen tuotannon avulla muutti ihmissuhteet nollasummakilpailusta positiivisen summan yhteistyöhön.
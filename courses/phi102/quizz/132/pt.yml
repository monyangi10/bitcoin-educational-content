question: De acordo com a teoria económica liberal, o que distingue a troca voluntária moderna da competição inicial de recursos humanos?
answer: O intercâmbio moderno cria novas utilidades através da produção, ao passo que a concorrência primitiva implicava a obtenção de recursos existentes através da força
wrong_answers:
  - O intercâmbio moderno assenta na regulamentação governamental, enquanto a concorrência inicial se baseava em mecanismos naturais de mercado
  - O intercâmbio moderno elimina totalmente a escassez, enquanto a concorrência inicial era causada por recursos naturais limitados
  - O intercâmbio moderno exige tratados internacionais, enquanto a concorrência inicial era resolvida através de acordos tribais locais
explanation: |
  O texto explica que os primeiros seres humanos competiam violentamente por recursos naturais limitados que ninguém produzia (frutos, peixe, etc.), em que enriquecer significava tirar aos outros. As relações económicas modernas baseiam-se na criação de novas riquezas através da produção (como a agricultura), permitindo trocas voluntárias que beneficiam ambas as partes. Esta mudança fundamental da apropriação pela força para a criação de riqueza através da produção transformou as relações humanas da competição de soma zero para a cooperação de soma positiva.
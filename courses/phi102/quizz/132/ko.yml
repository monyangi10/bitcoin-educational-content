question: 자유주의 경제 이론에 따르면, 현대의 자발적 교환이 초기의 인적 자원 경쟁과 다른 점은 무엇인가요?
answer: 현대의 교환은 생산을 통해 새로운 유틸리티를 창출하는 반면, 초기 경쟁은 무력을 통해 기존 자원을 빼앗는 것이었습니다
wrong_answers:
  - 현대의 거래소는 정부 규제에 의존하는 반면, 초기 경쟁은 자연스러운 시장 메커니즘에 기반했습니다
  - 초기 경쟁은 제한된 천연 자원으로 인해 발생했지만, 현대의 거래소는 희소성을 완전히 제거합니다
  - 현대의 교류에는 국제 조약이 필요하지만, 초기에는 지역 부족 간 협정을 통해 경쟁이 해결되었습니다
explanation: |
  이 텍스트는 초기 인류가 과일, 생선 등 아무도 생산하지 않은 한정된 천연자원을 놓고 격렬하게 경쟁했으며, 여기서 풍요로움은 다른 사람의 것을 빼앗는 것을 의미했다고 설명합니다. 현대의 경제 관계는 농업과 같은 생산을 통해 새로운 부를 창출하고, 서로에게 이익이 되는 자발적인 교환을 가능하게 하는 데 기반을 두고 있습니다. 무력에 의한 수탈에서 생산을 통한 부의 창출로의 근본적인 변화는 인간 관계를 제로섬 경쟁에서 포지티브섬 협력으로 변화시켰습니다.
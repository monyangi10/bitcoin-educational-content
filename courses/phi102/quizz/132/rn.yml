question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni igiki gitandukanya uguhanahana amakuru ku bushake muri iki gihe n’uguhiganwa kw’abantu kwa kera?
answer: Uguhanahana amakuru muri iki gihe gutuma habaho ivyiza bishasha biciye mu guhingura, mu gihe uguhiganwa kwa kera kwari ugufata ubutunzi bwariho biciye ku nguvu .
wrong_answers:
  - Ubucuruzi bwa none bushingiye ku mategeko ya Leta, mu gihe uguhiganwa kwa kera kwari gushingiye ku buryo bw’isoko ry’akameremere .
  - Uguhanahana amakuru muri iki gihe kurakuraho ubukene burundu, mu gihe uguhiganwa kwa kera kwatewe n’ubutunzi buke .
  - Uguhanahana ibintu muri iki gihe bisaba amasezerano mpuzamakungu, mu gihe uguhiganwa kwa kera kwari gutorwa umuti biciye ku masezerano y’imiryango yo mu karere .
explanation: |
  Ico canditswe kirasigura ko abantu ba mbere bariko barahiganwa n’ubukazi kugira ngo baronke ubutunzi bukeyi ata n’umwe yari yaravyaye (ivyamwa, ifi n’ibindi), aho gutunga vyasobanura gukura ku bandi. Imigenderanire y’ubutunzi yo muri iki gihe ishingiye ku kurema ubutunzi bushasha biciye mu guhingura (nk’uburimyi), bikaba bishoboza uguhanahana ku bushake kugirira akamaro impande zompi. Ukwo guhinduka kw’ishimikiro kuva ku kwifatanya n’inguvu gushika ku kurema ubutunzi biciye mu guhingura, kwahinduye imigenderanire y’abantu kuva ku guhiganwa kw’amahera ataco amaze gushika ku gukorana n’abandi ku buryo bwiza.
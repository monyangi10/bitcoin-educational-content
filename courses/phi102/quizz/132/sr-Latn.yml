question: Prema liberalnoj ekonomskoj teoriji, šta razlikuje modernu dobrovoljnu razmenu od ranog ljudskog takmičenja za resurse?
answer: Moderna razmena stvara nove korisnosti kroz proizvodnju, dok je rana konkurencija uključivala preuzimanje postojećih resursa silom.
wrong_answers:
  - Moderni exchange se oslanja na vladinu regulaciju, dok je rana konkurencija bila zasnovana na prirodnim tržišnim mehanizmima.
  - Moderni razmena potpuno eliminiše oskudicu, dok je rana konkurencija bila uzrokovana ograničenim prirodnim resursima.
  - Moderni razmena zahteva međunarodne sporazume, dok se rana konkurencija rešavala kroz lokalne plemenske sporazume.
explanation: |
  Tekst objašnjava da su se rani ljudi nasilno takmičili za ograničene prirodne resurse koje niko nije proizveo (voće, riba, itd.), gde je obogaćivanje značilo uzimanje od drugih. Savremeni ekonomski odnosi zasnivaju se na stvaranju novog bogatstva kroz proizvodnju (poput poljoprivrede), omogućavajući dobrovoljne razmene koje koriste obe strane. Ova fundamentalna promena sa prisvajanja silom na stvaranje bogatstva kroz proizvodnju transformisala je ljudske odnose iz igre sa nultim zbirom u saradnju sa pozitivnim zbirom.
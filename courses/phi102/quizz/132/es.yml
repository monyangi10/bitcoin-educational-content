question: Según la teoría económica liberal, ¿qué distingue el intercambio voluntario moderno de la primitiva competencia por los recursos humanos?
answer: El intercambio moderno crea nuevas utilidades mediante la producción, mientras que la competencia primitiva consistía en tomar los recursos existentes por la fuerza
wrong_answers:
  - El intercambio moderno depende de la regulación gubernamental, mientras que la competencia primitiva se basaba en los mecanismos naturales del mercado
  - El intercambio moderno elimina por completo la escasez, mientras que la competencia primitiva se debía a la limitación de los recursos naturales
  - Los intercambios modernos requieren tratados internacionales, mientras que la competencia se resolvía mediante acuerdos tribales
explanation: |
  El texto explica que los primeros humanos competían violentamente por unos recursos naturales limitados que nadie había producido (frutas, pescado, etc.), donde enriquecerse significaba quitar a los demás. Las relaciones económicas modernas se basan en la creación de nueva riqueza mediante la producción (como la agricultura), lo que permite intercambios voluntarios que benefician a ambas partes. Este cambio fundamental de la apropiación por la fuerza a la creación de riqueza mediante la producción transformó las relaciones humanas de la competencia de suma cero a la cooperación de suma positiva.
question: Menurut teori ekonomi liberal, apa yang membedakan pertukaran sukarela modern dengan persaingan sumber daya manusia di masa lampau?
answer: Pertukaran modern menciptakan utilitas baru melalui produksi, sementara persaingan awal melibatkan pengambilan sumber daya yang ada melalui kekerasan
wrong_answers:
  - Pertukaran modern bergantung pada peraturan pemerintah, sementara persaingan awal didasarkan pada mekanisme pasar alami
  - Pertukaran modern menghilangkan kelangkaan sepenuhnya, sementara persaingan awal disebabkan oleh sumber daya alam yang terbatas
  - Pertukaran modern membutuhkan perjanjian internasional, sementara persaingan awal diselesaikan melalui perjanjian suku lokal
explanation: |
  Teks ini menjelaskan bahwa manusia purba bersaing dengan keras untuk memperebutkan sumber daya alam yang terbatas dan belum pernah diproduksi oleh siapa pun (buah-buahan, ikan, dan lain-lain), di mana memperkaya diri sendiri berarti mengambil dari orang lain. Hubungan ekonomi modern didasarkan pada penciptaan kekayaan baru melalui produksi (seperti pertanian), yang memungkinkan terjadinya pertukaran sukarela yang menguntungkan kedua belah pihak. Pergeseran mendasar dari perampasan secara paksa menjadi penciptaan kekayaan melalui produksi mengubah hubungan manusia dari kompetisi zero-sum menjadi kerja sama positive-sum.
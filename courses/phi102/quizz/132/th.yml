question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม อะไรที่ทำให้การแลกเปลี่ยนโดยสมัครใจในยุคปัจจุบันแตกต่างจากการแข่งขันทรัพยากรของมนุษย์ในยุคแรก?
answer: การแลกเปลี่ยนสมัยใหม่สร้างประโยชน์ใหม่ผ่านการผลิต ในขณะที่การแข่งขันในยุคแรกเกี่ยวข้องกับการแย่งชิงทรัพยากรที่มีอยู่ผ่านการใช้กำลัง
wrong_answers:
  - การแลกเปลี่ยนในปัจจุบันพึ่งพาการควบคุมของรัฐบาล ในขณะที่การแข่งขันในยุคแรกอาศัยกลไกตลาดตามธรรมชาติ
  - การแลกเปลี่ยนสมัยใหม่กำจัดความขาดแคลนออกไปโดยสิ้นเชิง ในขณะที่การแข่งขันในยุคแรกเกิดจากทรัพยากรธรรมชาติที่จำกัด
  - การแลกเปลี่ยนสมัยใหม่ต้องการสนธิสัญญาระหว่างประเทศ ในขณะที่การแข่งขันในยุคแรก ๆ ได้รับการแก้ไขผ่านข้อตกลงของชนเผ่าท้องถิ่น
explanation: |
  ข้อความอธิบายว่ามนุษย์ยุคแรกแข่งขันกันอย่างรุนแรงเพื่อทรัพยากรธรรมชาติที่มีจำกัดซึ่งไม่มีใครผลิตขึ้น (ผลไม้, ปลา, ฯลฯ) ซึ่งการมั่งคั่งหมายถึงการเอามาจากผู้อื่น ความสัมพันธ์ทางเศรษฐกิจสมัยใหม่มีพื้นฐานมาจากการสร้างความมั่งคั่งใหม่ผ่านการผลิต (เช่น เกษตรกรรม) ทำให้เกิดการแลกเปลี่ยนโดยสมัครใจที่เป็นประโยชน์ต่อทั้งสองฝ่าย การเปลี่ยนแปลงพื้นฐานนี้จากการยึดครองด้วยกำลังไปสู่การสร้างความมั่งคั่งผ่านการผลิตได้เปลี่ยนแปลงความสัมพันธ์ของมนุษย์จากการแข่งขันแบบผลรวมศูนย์ไปสู่ความร่วมมือแบบผลรวมบวก
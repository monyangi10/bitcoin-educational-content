question: Čím se podle liberální ekonomické teorie liší moderní dobrovolná směna od rané konkurence lidských zdrojů?
answer: Moderní směna vytváří nové užitkové hodnoty prostřednictvím výroby, zatímco raná konkurence spočívala v násilném získávání stávajících zdrojů
wrong_answers:
  - Moderní směna se opírá o vládní regulaci, zatímco raná konkurence byla založena na přirozených tržních mechanismech
  - Moderní směna nedostatek zcela eliminuje, zatímco raná konkurence byla způsobena omezenými přírodními zdroji
  - Moderní výměna vyžaduje mezinárodní smlouvy, zatímco raná konkurence se řešila místními kmenovými dohodami
explanation: |
  Text vysvětluje, že první lidé násilně soupeřili o omezené přírodní zdroje, které nikdo nevyráběl (plody, ryby atd.), přičemž obohacování znamenalo brát druhým. Moderní ekonomické vztahy jsou založeny na vytváření nového bohatství prostřednictvím výroby (např. zemědělství), což umožňuje dobrovolnou směnu, z níž mají prospěch obě strany. Tento zásadní posun od násilného přivlastňování k vytváření bohatství prostřednictvím výroby změnil lidské vztahy ze soutěže s nulovým součtem na spolupráci s pozitivním součtem.
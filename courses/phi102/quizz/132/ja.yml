question: 自由主義経済理論によれば、現代の自発的交換と初期の人的資源競争との違いは何か？
answer: 近代的な交換は生産を通じて新たなユーティリティを生み出すが、初期の競争は力によって既存の資源を奪うものだった。
wrong_answers:
  - 現代の交換は政府の規制に依存しているが、初期の競争は自然な市場メカニズムに基づいていた。
  - 現代の交換は希少性を完全に排除しているが、初期の競争は限られた天然資源によって引き起こされていた。
  - 近代的な交流には国際条約が必要だが、初期の競争は地域の部族間の協定によって解決されていた。
explanation: |
  本文では、初期の人類は、誰も生産していない限られた天然資源（果物、魚など）を激しく奪い合い、富を得ることは他者から奪うことを意味していたと説明されている。現代の経済関係は、（農業のような）生産を通じて新たな富を創造することに基づいており、双方に利益をもたらす自発的な交換を可能にしている。力による横領から生産による富の創造へのこの根本的な転換は、人間関係をゼロサム競争からポジティブサム協力へと変えた。
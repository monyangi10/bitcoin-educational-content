question: Selon la théorie économique libérale, qu'est-ce qui distingue l'échange volontaire moderne de l'ancienne concurrence en matière de ressources humaines ?
answer: L'échange moderne crée de nouveaux services publics par le biais de la production, alors que la concurrence initiale consistait à s'approprier les ressources existantes par la force
wrong_answers:
  - Les échanges modernes s'appuient sur une réglementation gouvernementale, alors que la concurrence initiale reposait sur les mécanismes naturels du marché
  - L'échange moderne élimine totalement la rareté, alors que la concurrence initiale était causée par des ressources naturelles limitées
  - Les échanges modernes nécessitent des traités internationaux, alors que la concurrence initiale était résolue par des accords tribaux locaux
explanation: |
  Le texte explique que les premiers hommes étaient en concurrence violente pour des ressources naturelles limitées que personne n'avait produites (fruits, poissons, etc.), où s'enrichir signifiait prendre aux autres. Les relations économiques modernes sont basées sur la création de nouvelles richesses par la production (comme l'agriculture), permettant des échanges volontaires qui profitent aux deux parties. Ce passage fondamental de l'appropriation par la force à la création de richesses par la production a transformé les relations humaines, qui sont passées d'une concurrence à somme nulle à une coopération à somme positive.
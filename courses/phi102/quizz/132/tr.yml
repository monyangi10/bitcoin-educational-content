question: Liberal ekonomi teorisine göre, modern gönüllü mübadeleyi erken dönem insan kaynakları rekabetinden ayıran nedir?
answer: Modern mübadele üretim yoluyla yeni kamu hizmetleri yaratırken, erken dönem rekabet mevcut kaynakların zorla alınmasını içeriyordu
wrong_answers:
  - Modern mübadele devlet düzenlemelerine dayanırken, ilk rekabet doğal piyasa mekanizmalarına dayanıyordu
  - Modern mübadele kıtlığı tamamen ortadan kaldırırken, ilk rekabet sınırlı doğal kaynaklardan kaynaklanıyordu
  - Modern mübadele uluslararası anlaşmalar gerektirirken, erken dönem rekabet yerel kabile anlaşmalarıyla çözülüyordu
explanation: |
  Metin, ilk insanların kimsenin üretmediği sınırlı doğal kaynaklar (meyve, balık vb.) için şiddetle rekabet ettiklerini ve zenginleşmenin diğerlerinden almak anlamına geldiğini açıklamaktadır. Modern ekonomik ilişkiler, üretim yoluyla (tarım gibi) yeni zenginlik yaratmaya dayanmakta ve her iki tarafa da fayda sağlayan gönüllü değiş tokuşlara olanak tanımaktadır. Zorla el koymadan üretim yoluyla zenginlik yaratmaya doğru gerçekleşen bu temel değişim, insan ilişkilerini sıfır toplamlı rekabetten pozitif toplamlı işbirliğine dönüştürmüştür.
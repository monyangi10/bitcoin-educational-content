question: Vad skiljer, enligt liberal ekonomisk teori, det moderna frivilliga utbytet från den tidiga konkurrensen om mänskliga resurser?
answer: Modernt utbyte skapar nya nyttigheter genom produktion, medan tidig konkurrens handlade om att ta befintliga resurser genom våld
wrong_answers:
  - Det moderna utbytet bygger på statliga regleringar, medan den tidiga konkurrensen byggde på naturliga marknadsmekanismer
  - Det moderna utbytet eliminerar knapphet helt och hållet, medan den tidiga konkurrensen orsakades av begränsade naturresurser
  - Moderna utbyten kräver internationella avtal, medan den tidiga konkurrensen löstes genom lokala stamavtal
explanation: |
  I texten förklaras att de första människorna konkurrerade våldsamt om begränsade naturresurser som ingen hade producerat (frukt, fisk etc.), där berikning innebar att ta från andra. Moderna ekonomiska relationer bygger på att skapa nya rikedomar genom produktion (som jordbruk), vilket möjliggör frivilliga utbyten som gynnar båda parter. Denna fundamentala övergång från tillägnande med våld till skapande av välstånd genom produktion förändrade mänskliga relationer från nollsummespel till samarbete med positiva effekter.
question: 根据自由主义经济理论，现代自愿交换与早期人力资源竞争的区别是什么？
answer: 现代交换通过生产创造新的公用事业，而早期竞争则是通过武力夺取现有资源
wrong_answers:
  - 现代交换依赖于政府监管，而早期竞争则以自然市场机制为基础
  - 现代交换完全消除了稀缺性，而早期的竞争是由有限的自然资源造成的
  - 现代交流需要国际条约，而早期的竞争是通过当地部落协议解决的
explanation: |
  课文解释说，早期人类为了争夺有限的、无人生产的自然资源（水果、鱼类等）而展开了激烈的竞争，致富意味着从他人那里索取。现代经济关系的基础是通过生产（如农业）创造新的财富，实现双方受益的自愿交换。从武力占有到通过生产创造财富的这一根本性转变，将人类关系从零和竞争转变为正和合作。
question: 根據自由經濟理論，現代的自願交換與早期的人力資源競爭有何不同？
answer: 現代交換透過生產創造新的公用事業，而早期的競爭則是透過武力奪取現有資源。
wrong_answers:
  - 現代交換依賴政府管制，而早期競爭則以自然市場機制為基礎
  - 現代交換完全消除了稀缺性，而早期的競爭是由有限的自然資源造成的
  - 現代的交流需要國際條約，而早期的競爭則是透過當地的部落協議來解決。
explanation: |
  文中解釋，早期人類為了爭奪有限的自然資源（水果、魚類等）而激烈競爭，沒有人生產這些資源，致富意味著向他人索取。現代的經濟關係是建立在透過生產（如農業）創造新財富的基礎上，使得自願的交換對雙方都有利。這種從強取豪奪到透過生產創造財富的根本性轉變，將人與人之間的關係從零和競爭轉變為正和合作。
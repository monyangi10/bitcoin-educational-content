question: Was unterscheidet nach der liberalen Wirtschaftstheorie den modernen freiwilligen Austausch vom frühen Wettbewerb um Humanressourcen?
answer: Der moderne Austausch schafft neue Versorgungsleistungen durch Produktion, während der frühe Wettbewerb darin bestand, vorhandene Ressourcen mit Gewalt zu nehmen
wrong_answers:
  - Der moderne Austausch stützt sich auf staatliche Regulierung, während der frühe Wettbewerb auf natürlichen Marktmechanismen beruhte
  - Der moderne Austausch beseitigt die Knappheit vollständig, während der frühe Wettbewerb durch begrenzte natürliche Ressourcen verursacht wurde
  - Der moderne Austausch erfordert internationale Verträge, während der frühe Wettbewerb durch lokale Stammesvereinbarungen geregelt wurde
explanation: |
  Der Text erklärt, dass die frühen Menschen gewaltsam um begrenzte natürliche Ressourcen konkurrierten, die niemand produziert hatte (Früchte, Fisch usw.), wobei Bereicherung bedeutete, anderen etwas wegzunehmen. Moderne Wirtschaftsbeziehungen beruhen auf der Schaffung neuen Wohlstands durch Produktion (z. B. Landwirtschaft), die einen freiwilligen Austausch ermöglicht, von dem beide Parteien profitieren. Dieser grundlegende Wandel von der gewaltsamen Aneignung zur Schaffung von Wohlstand durch Produktion hat die menschlichen Beziehungen von einem Nullsummenwettbewerb zu einer Positivsummenkooperation verändert.
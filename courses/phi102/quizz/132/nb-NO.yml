question: Hva skiller, ifølge liberal økonomisk teori, moderne frivillig utveksling fra den tidlige konkurransen om menneskelige ressurser?
answer: Moderne utveksling skaper nye goder gjennom produksjon, mens den tidlige konkurransen handlet om å ta eksisterende ressurser med makt
wrong_answers:
  - Moderne børshandel er avhengig av statlig regulering, mens den tidlige konkurransen var basert på naturlige markedsmekanismer
  - Moderne utveksling eliminerer knapphet helt og holdent, mens den tidlige konkurransen var forårsaket av begrensede naturressurser
  - Moderne utveksling krever internasjonale avtaler, mens den tidlige konkurransen ble løst gjennom lokale stammeavtaler
explanation: |
  Teksten forklarer at de første menneskene konkurrerte voldsomt om begrensede naturressurser som ingen hadde produsert (frukt, fisk osv.), og at berikelse innebar å ta fra andre. Moderne økonomiske relasjoner er basert på å skape ny rikdom gjennom produksjon (som jordbruk), noe som muliggjør frivillige utvekslinger som kommer begge parter til gode. Dette fundamentale skiftet fra tilegnelse med makt til verdiskaping gjennom produksjon forvandlet menneskelige relasjoner fra nullsumskonkurranse til plussumssamarbeid.
question: Что, согласно либеральной экономической теории, отличает современный добровольный обмен от ранней конкуренции за человеческие ресурсы?
answer: Современный обмен создает новые ресурсы путем производства, в то время как ранняя конкуренция предполагала захват существующих ресурсов с помощью силы
wrong_answers:
  - Современный обмен опирается на государственное регулирование, в то время как ранняя конкуренция основывалась на естественных рыночных механизмах
  - Современный обмен полностью исключает дефицит, в то время как ранняя конкуренция была вызвана ограниченностью природных ресурсов
  - Современный обмен требует заключения международных договоров, в то время как ранняя конкуренция решалась с помощью местных племенных соглашений
explanation: |
  В тексте объясняется, что ранние люди жестоко конкурировали за ограниченные природные ресурсы, которые никто не производил (фрукты, рыбу и т. д.), где обогащение означало отъем у других. Современные экономические отношения основаны на создании новых богатств посредством производства (например, сельского хозяйства), что позволяет осуществлять добровольный обмен, выгодный обеим сторонам. Этот фундаментальный сдвиг от насильственного присвоения к созданию богатства через производство трансформировал человеческие отношения от конкуренции с нулевой суммой к сотрудничеству с положительной суммой.
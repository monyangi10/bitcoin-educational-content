question: Mis eristab liberaalse majandusteooria kohaselt kaasaegset vabatahtlikku vahetust varajasest inimressursside konkurentsist?
answer: Kaasaegne vahetus loob uusi hüvesid tootmise kaudu, samas kui varajane konkurents hõlmas olemasolevate ressursside võtmist jõuga
wrong_answers:
  - Kaasaegne vahetus tugineb riiklikule reguleerimisele, samas kui varajane konkurents põhines loomulikel turumehhanismidel
  - Kaasaegne vahetus välistab puuduse täielikult, samas kui varajane konkurents oli tingitud piiratud loodusvaradest
  - Kaasaegne vahetus nõuab rahvusvahelisi lepinguid, samas kui varajane konkurents lahendati kohalike hõimukokkulepete kaudu
explanation: |
  Tekstis selgitatakse, et esimesed inimesed konkureerisid vägivaldselt piiratud loodusressursside pärast, mida keegi ei tootnud (puuviljad, kala jne), kusjuures rikastumine tähendas teistelt äravõtmist. Kaasaegsed majandussuhted põhinevad uue rikkuse loomisel tootmise kaudu (nagu põllumajandus), mis võimaldab vabatahtlikku vahetust, millest saavad kasu mõlemad pooled. See põhimõtteline üleminek jõuga omastamiselt jõukuse loomisele tootmise kaudu muutis inimsuhteid nullsummalisest konkurentsist positiivsummaliseks koostööks.
question: بر اساس نظریه اقتصادی لیبرال، چه چیزی مبادله داوطلبانه مدرن را از رقابت منابع انسانی اولیه متمایز می‌کند؟
answer: مبادله مدرن از طریق تولید، امکانات جدیدی ایجاد می‌کند، در حالی که رقابت اولیه شامل تصاحب منابع موجود از طریق زور بود.
wrong_answers:
  - مبادله مدرن به مقررات دولتی متکی است، در حالی که رقابت اولیه بر اساس مکانیزم‌های طبیعی بازار بود
  - مبادله مدرن کمبود را به‌طور کامل از بین می‌برد، در حالی که رقابت اولیه ناشی از منابع طبیعی محدود بود.
  - مبادله مدرن نیازمند معاهدات بین‌المللی است، در حالی که رقابت اولیه از طریق توافقات قبیله‌ای محلی حل و فصل می‌شد.
explanation: |
  متن توضیح می‌دهد که انسان‌های اولیه برای منابع طبیعی محدودی که هیچ‌کس تولید نکرده بود (میوه‌ها، ماهی‌ها و غیره) به‌طور خشونت‌آمیزی رقابت می‌کردند، جایی که ثروتمند شدن به معنای گرفتن از دیگران بود. روابط اقتصادی مدرن بر اساس ایجاد ثروت جدید از طریق تولید (مانند کشاورزی) استوار است که مبادلات داوطلبانه‌ای را ممکن می‌سازد که به نفع هر دو طرف است. این تغییر اساسی از تصاحب با زور به ایجاد ثروت از طریق تولید، روابط انسانی را از رقابت صفر-جمع به همکاری مثبت-جمع تبدیل کرد.
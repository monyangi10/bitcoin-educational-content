question: Hva er det som skiller statens negative attribusjoner fra dens positive attribusjoner i forhold til individuell frihet?
answer: Negative attribusjoner beskytter individuelle rettigheter uten å gripe inn, mens positive attribusjoner erstatter frivillige avtaler med administrative reguleringer
wrong_answers:
  - Negative attribusjoner krever flertall, mens positive attribusjoner kan iverksettes ved dekret uten lovgivende myndigheters samtykke
  - Negative attribusjoner innebærer direkte offentlige utgifter, mens positive attribusjoner baserer seg på skatteinsentiver og regelverk for implementering
  - Negative attribusjoner gjelder kun strafferetten, mens positive attribusjoner omfatter alle sivile og kommersielle rettsforhold mellom parter
explanation: |
  Teksten skiller klart mellom statens legitime negative attribusjoner (beskyttelse av eiendom, frihet og sikkerhet gjennom retts- og politisystemer) og dens parasittiske positive attribusjoner (lover som hindrer, forhindrer og regulerer individuell aktivitet uten å beskytte rettigheter). Negative attribusjoner skaper et rammeverk for frivillig utveksling og kontrakter ved å sørge for sikkerhet, mens positive attribusjoner erstatter individuelle valg og frivillige avtaler med statlige beslutninger.
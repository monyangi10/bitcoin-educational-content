question: Que caraterística fundamental distingue as atribuições negativas do Estado das suas atribuições positivas em relação à liberdade individual?
answer: As atribuições negativas protegem os direitos individuais sem intervir, enquanto as atribuições positivas substituem os contratos voluntários por regulamentos administrativos
wrong_answers:
  - As atribuições negativas requerem a aprovação da maioria, enquanto as atribuições positivas podem ser implementadas por decreto executivo sem consentimento legislativo
  - As atribuições negativas implicam despesas públicas diretas, enquanto as atribuições positivas dependem de incentivos fiscais e de quadros regulamentares para a sua implementação
  - As atribuições negativas aplicam-se apenas ao direito penal, enquanto as atribuições positivas abrangem todas as relações jurídicas civis e comerciais entre as partes
explanation: |
  O texto distingue claramente entre as atribuições negativas legítimas do Estado (proteger a propriedade, a liberdade e a segurança através de sistemas judiciais e policiais) e as suas atribuições positivas parasitárias (leis que dificultam, impedem e regulam a atividade individual sem proteger os direitos). As atribuições negativas criam o enquadramento para as trocas e contratos voluntários, garantindo a segurança, enquanto as atribuições positivas substituem a escolha individual e os acordos voluntários por decisões governamentais.
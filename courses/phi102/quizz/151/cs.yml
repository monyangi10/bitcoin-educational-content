question: Jaká základní charakteristika odlišuje negativní atributy státu od jeho pozitivních atributů ve vztahu k individuální svobodě?
answer: Negativní atributy chrání individuální práva bez zásahů, zatímco pozitivní atributy nahrazují dobrovolné smlouvy administrativními předpisy
wrong_answers:
  - Negativní atributy vyžadují většinový souhlas, zatímco pozitivní atributy mohou být provedeny výkonným nařízením bez souhlasu zákonodárce
  - Negativní atributy zahrnují přímé vládní výdaje, zatímco pozitivní atributy se opírají o daňové pobídky a regulační rámce pro implementaci
  - Negativní atributy se vztahují pouze na trestní právo, zatímco pozitivní atributy zahrnují všechny občanskoprávní a obchodněprávní vztahy mezi stranami
explanation: |
  Text jasně rozlišuje mezi legitimními negativními atributy státu (ochrana majetku, svobody a bezpečnosti prostřednictvím soudního a policejního systému) a jeho parazitními pozitivními atributy (zákony, které brání, zabraňují a regulují individuální aktivity, aniž by chránily práva). Negativní atributy vytvářejí rámec pro dobrovolnou směnu a smlouvy tím, že zajišťují bezpečnost, zatímco pozitivní atributy nahrazují rozhodnutí vlády individuální volbu a dobrovolné dohody.
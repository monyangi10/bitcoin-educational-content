question: Mikä perusominaisuus erottaa valtion negatiiviset attribuutiot positiivisista attribuutioista suhteessa yksilönvapauteen?
answer: Negatiiviset attribuutiot suojelevat yksilön oikeuksia puuttumatta asiaan, kun taas positiiviset attribuutiot korvaavat vapaaehtoiset sopimukset hallinnollisilla määräyksillä
wrong_answers:
  - Negatiiviset määräykset edellyttävät enemmistön hyväksyntää, kun taas positiiviset määräykset voidaan panna täytäntöön toimeenpanevan elimen asetuksella ilman lainsäätäjän suostumusta
  - Negatiiviset attribuutiot edellyttävät suoria julkisia menoja, kun taas positiiviset attribuutiot tukeutuvat verokannustimiin ja sääntelypuitteisiin
  - Negatiivinen attribuutio koskee vain rikosoikeutta, kun taas positiivinen attribuutio kattaa kaikki osapuolten väliset siviili- ja kauppaoikeudelliset suhteet
explanation: |
  Tekstissä erotetaan selvästi toisistaan valtion oikeutetut negatiiviset tehtävät (omaisuuden, vapauden ja turvallisuuden suojelu oikeus- ja poliisijärjestelmien avulla) ja sen loismaiset positiiviset tehtävät (lait, jotka estävät, estävät ja sääntelevät yksilön toimintaa suojaamatta oikeuksia). Negatiiviset attribuutiot luovat puitteet vapaaehtoiselle vaihdolle ja sopimuksille varmistamalla turvallisuuden, kun taas positiiviset attribuutiot korvaavat yksilön valinnan ja vapaaehtoiset sopimukset valtion päätöksillä.
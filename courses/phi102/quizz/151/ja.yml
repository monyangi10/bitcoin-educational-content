question: 個人の自由に関して、国家の否定的帰属と肯定的帰属を区別する基本的特徴は何か？
answer: 消極的属性は介入することなく個人の権利を保護し、積極的属性は自発的契約を行政規制に置き換える。
wrong_answers:
  - 否定的な属性は過半数の承認を必要とするが、肯定的な属性は立法府の同意なしに行政命令で実施できる。
  - 消極的帰属は政府による直接支出を伴うが、積極的帰属は税制上の優遇措置や規制の枠組みに依存する。
  - 消極的帰責事由は刑法にのみ適用され、積極的帰責事由は当事者間の民事上・商事上の法的関係をすべて包含する。
explanation: |
  本文では、国家の正当な消極的帰属（司法制度や警察制度を通じて財産、自由、治安を保護すること）と、寄生的な積極的帰属（権利を保護することなく、個人の活動を妨げ、防止し、規制する法律）を明確に区別している。消極的帰属は、安全を保障することによって自発的な交換や契約の枠組みを作り出し、積極的帰属は、政府の決定を個人の選択や自発的な合意の代わりにする。
question: Milline põhiline omadus eristab riigi negatiivseid ja positiivseid atribuute seoses üksikisiku vabadusega?
answer: Negatiivsed omistused kaitsevad individuaalseid õigusi ilma sekkumata, samas kui positiivsed omistused asendavad vabatahtlikud lepingud haldusnormidega
wrong_answers:
  - Negatiivsed määrused nõuavad enamuse heakskiitu, samas kui positiivseid määrusi võib rakendada täidesaatva võimu käskkirjaga ilma seadusandliku nõusolekuta
  - Negatiivne omistamine hõlmab otseseid valitsuse kulutusi, samas kui positiivne omistamine tugineb maksusoodustustele ja regulatiivsele raamistikule rakendamise eesmärgil
  - Negatiivne omistamine kehtib ainult kriminaalõiguse puhul, samas kui positiivne omistamine hõlmab kõiki tsiviil- ja kaubandusõiguslikke suhteid poolte vahel
explanation: |
  Tekstis eristatakse selgelt riigi legitiimseid negatiivseid omadusi (omandi, vabaduse ja turvalisuse kaitsmine kohtu- ja politseisüsteemi kaudu) ja tema parasiitlikke positiivseid omadusi (seadused, mis takistavad, takistavad ja reguleerivad üksikisiku tegevust ilma õigusi kaitsmata). Negatiivsed atribuudid loovad raamistiku vabatahtlikele vahetustele ja lepingutele, tagades turvalisuse, samas kui positiivsed atribuudid asendavad valitsuse otsused individuaalsete valikute ja vabatahtlike kokkulepete asemel.
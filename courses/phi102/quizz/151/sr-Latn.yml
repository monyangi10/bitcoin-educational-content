question: Koja fundamentalna karakteristika razlikuje negativne atribucije države od njenih pozitivnih atribucija u odnosu na individualnu slobodu?
answer: Negativna pripisivanja štite individualna prava bez intervencije, dok pozitivna pripisivanja zamenjuju dobrovoljne ugovore administrativnim propisima.
wrong_answers:
  - Negativne atribucije zahtevaju odobrenje većine, dok se pozitivne atribucije mogu sprovesti izvršnim dekretom bez zakonodavnog pristanka.
  - Negativne atribucije uključuju direktnu potrošnju vlade, dok se pozitivne atribucije oslanjaju na poreske podsticaje i regulatorne okvire za implementaciju.
  - Negativne atribucije se primenjuju samo na krivično pravo, dok pozitivne atribucije obuhvataju sve građanske i komercijalne pravne odnose između strana.
explanation: |
  Tekst jasno razlikuje legitimne negativne atribucije države (zaštita imovine, slobode i sigurnosti putem pravosudnih i policijskih sistema) i njene parazitske pozitivne atribucije (zakoni koji ometaju, sprečavaju i regulišu individualnu aktivnost bez zaštite prava). Negativne atribucije stvaraju okvir za dobrovoljne razmene i ugovore osiguravanjem sigurnosti, dok pozitivne atribucije zamenjuju odluke vlade za individualni izbor i dobrovoljne sporazume.
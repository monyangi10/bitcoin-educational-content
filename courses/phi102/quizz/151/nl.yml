question: Welk fundamenteel kenmerk onderscheidt de negatieve attributies van de staat van zijn positieve attributies met betrekking tot individuele vrijheid?
answer: Negatieve toeschrijvingen beschermen individuele rechten zonder in te grijpen, terwijl positieve toeschrijvingen vrijwillige contracten vervangen door administratieve regels
wrong_answers:
  - Voor negatieve toewijzingen is de goedkeuring van de meerderheid vereist, terwijl positieve toewijzingen kunnen worden geïmplementeerd per uitvoerend decreet zonder toestemming van de wetgevende macht
  - Negatieve toewijzingen hebben betrekking op directe overheidsuitgaven, terwijl positieve toewijzingen afhankelijk zijn van belastingprikkels en regelgevende kaders voor implementatie
  - Negatieve toeschrijvingen zijn alleen van toepassing op het strafrecht, terwijl positieve toeschrijvingen alle civiele en commerciële rechtsverhoudingen tussen partijen omvatten
explanation: |
  De tekst maakt een duidelijk onderscheid tussen de legitieme negatieve attributies van de staat (het beschermen van eigendom, vrijheid en veiligheid door gerechtelijke en politiesystemen) en zijn parasitaire positieve attributies (wetten die individuele activiteiten belemmeren, voorkomen en reguleren zonder rechten te beschermen). Negatieve attributies creëren het kader voor vrijwillige uitwisselingen en contracten door veiligheid te garanderen, terwijl positieve attributies overheidsbeslissingen in de plaats stellen van individuele keuze en vrijwillige overeenkomsten.
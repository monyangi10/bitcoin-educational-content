question: Quale caratteristica fondamentale distingue le attribuzioni negative dello Stato da quelle positive in relazione alla libertà individuale?
answer: Le attribuzioni negative proteggono i diritti individuali senza intervenire, mentre le attribuzioni positive sostituiscono i contratti volontari con regolamenti amministrativi
wrong_answers:
  - Le attribuzioni negative richiedono l'approvazione della maggioranza, mentre le attribuzioni positive possono essere attuate per decreto esecutivo senza il consenso legislativo
  - Le attribuzioni negative comportano una spesa pubblica diretta, mentre quelle positive si basano su incentivi fiscali e quadri normativi per l'attuazione
  - Le attribuzioni negative si applicano solo al diritto penale, mentre le attribuzioni positive comprendono tutti i rapporti giuridici civili e commerciali tra le parti
explanation: |
  Il testo distingue chiaramente tra le legittime attribuzioni negative dello Stato (proteggere la proprietà, la libertà e la sicurezza attraverso i sistemi giudiziari e di polizia) e le sue attribuzioni positive parassitarie (leggi che ostacolano, impediscono e regolano l'attività individuale senza proteggere i diritti). Le attribuzioni negative creano il contesto per gli scambi e i contratti volontari garantendo la sicurezza, mentre le attribuzioni positive sostituiscono le decisioni del governo alle scelte individuali e agli accordi volontari.
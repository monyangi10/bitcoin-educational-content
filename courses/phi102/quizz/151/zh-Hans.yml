question: 在个人自由方面，国家的消极归因与积极归因有什么基本特征？
answer: 消极归因不加干预地保护个人权利，而积极归因则以行政法规取代自愿契约
wrong_answers:
  - 消极归属需要大多数人的批准，而积极归属则可以通过行政命令实施，无需立法同意
  - 消极归因涉及政府的直接支出，而积极归因则依靠税收激励和监管框架来实施
  - 消极归属只适用于刑法，而积极归属则包括当事人之间的所有民事和商事法律关系
explanation: |
  文中明确区分了国家合法的消极归属（通过司法和警察系统保护财产、自由和安全）和寄生的积极归属（阻碍、防止和规范个人活动而不保护权利的法律）。消极归因通过确保安全为自愿交换和契约建立框架，而积极归因则以政府决定取代个人选择和自愿协议。
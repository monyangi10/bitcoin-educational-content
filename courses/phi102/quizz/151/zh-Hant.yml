question: 在個人自由方面，國家的負面歸因與正面歸因有何基本特徵區別？
answer: 消極的歸屬保護個人權利而不介入，而積極的歸屬以行政規範取代自願契約
wrong_answers:
  - 負向歸屬需要大多數人的同意，而正向歸屬則可透過行政法令實施，無需立法同意
  - 負向歸因涉及政府的直接支出，而正向歸因依賴稅務獎勵和法規框架來實施
  - 否定式歸屬僅適用於刑法，而肯定式歸屬則包含當事人之間的所有民事和商業法律關係。
explanation: |
  文中清楚區分了國家合法的消極歸屬（透過司法和警察系統保護財產、自由和安全）和寄生的積極歸屬（法律妨礙、阻止和規範個人活動，但不保護權利）。消極歸屬透過確保安全來創造自願交流和契約的框架，而積極歸屬以政府的決定取代個人選擇和自願協議。
question: Коя основна характеристика отличава негативните атрибути на държавата от нейните позитивни атрибути по отношение на индивидуалната свобода?
answer: Негативните атрибути защитават индивидуалните права, без да се намесват, докато позитивните атрибути заменят доброволните договори с административни разпоредби
wrong_answers:
  - Негативните атрибути изискват одобрението на мнозинството, докато позитивните атрибути могат да бъдат прилагани с указ на изпълнителната власт без съгласието на законодателя
  - Негативните атрибути включват преки държавни разходи, докато позитивните атрибути разчитат на данъчни стимули и регулаторни рамки за изпълнение
  - Негативните атрибуции се прилагат само в наказателното право, докато позитивните атрибуции обхващат всички граждански и търговски правоотношения между страните
explanation: |
  В текста ясно се прави разграничение между легитимните негативни атрибути на държавата (защита на собствеността, свободата и сигурността чрез съдебната и полицейската система) и паразитните позитивни атрибути (закони, които възпрепятстват, предотвратяват и регулират индивидуалната дейност, без да защитават правата). Негативните атрибути създават рамката за доброволна размяна и договори, като гарантират сигурността, докато позитивните атрибути заместват правителствените решения с индивидуалния избор и доброволните споразумения.
question: Jaka podstawowa cecha odróżnia negatywne atrybucje państwa od jego pozytywnych atrybucji w odniesieniu do wolności jednostki?
answer: Negatywne atrybucje chronią indywidualne prawa bez interwencji, podczas gdy pozytywne atrybucje zastępują dobrowolne umowy regulacjami administracyjnymi
wrong_answers:
  - Negatywne atrybucje wymagają zgody większości, podczas gdy pozytywne atrybucje mogą być wdrażane dekretem wykonawczym bez zgody ustawodawcy
  - Negatywne atrybucje wiążą się z bezpośrednimi wydatkami rządowymi, podczas gdy pozytywne atrybucje opierają się na zachętach podatkowych i ramach regulacyjnych do wdrożenia
  - Przypisanie negatywne ma zastosowanie wyłącznie do prawa karnego, podczas gdy przypisanie pozytywne obejmuje wszystkie cywilne i handlowe stosunki prawne między stronami
explanation: |
  Tekst wyraźnie rozróżnia między uzasadnionymi negatywnymi atrybucjami państwa (ochrona własności, wolności i bezpieczeństwa poprzez systemy sądownicze i policyjne) a jego pasożytniczymi pozytywnymi atrybucjami (prawa, które utrudniają, zapobiegają i regulują indywidualną działalność bez ochrony praw). Negatywne atrybucje tworzą ramy dla dobrowolnych wymian i umów poprzez zapewnienie bezpieczeństwa, podczas gdy pozytywne atrybucje zastępują decyzje rządu indywidualnym wyborem i dobrowolnymi umowami.
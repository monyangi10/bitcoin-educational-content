question: ¿Qué característica fundamental distingue las atribuciones negativas del Estado de sus atribuciones positivas en relación con la libertad individual?
answer: Las atribuciones negativas protegen los derechos individuales sin intervenir, mientras que las atribuciones positivas sustituyen los contratos voluntarios por reglamentos administrativos
wrong_answers:
  - Las atribuciones negativas requieren la aprobación de la mayoría, mientras que las positivas pueden aplicarse por decreto ejecutivo sin consentimiento legislativo
  - Las atribuciones negativas implican un gasto público directo, mientras que las positivas se basan en incentivos fiscales y marcos normativos para su aplicación
  - Las atribuciones negativas sólo se aplican al Derecho penal, mientras que las positivas abarcan todas las relaciones jurídicas civiles y mercantiles entre las partes
explanation: |
  El texto distingue claramente entre las atribuciones negativas legítimas del Estado (proteger la propiedad, la libertad y la seguridad mediante sistemas judiciales y policiales) y sus atribuciones positivas parasitarias (leyes que obstaculizan, impiden y regulan la actividad individual sin proteger los derechos). Las atribuciones negativas crean el marco para los intercambios y contratos voluntarios al garantizar la seguridad, mientras que las atribuciones positivas sustituyen la elección individual y los acuerdos voluntarios por decisiones gubernamentales.
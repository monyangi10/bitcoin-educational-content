question: Devletin bireysel özgürlükle ilgili olumsuz atıflarını olumlu atıflarından ayıran temel özellik nedir?
answer: Negatif atıflar bireysel hakları müdahale etmeden korurken, pozitif atıflar gönüllü sözleşmelerin yerine idari düzenlemeleri koyar
wrong_answers:
  - Olumsuz atıflar çoğunluğun onayını gerektirirken, olumlu atıflar yasama onayı olmadan yürütme kararnamesi ile uygulanabilir
  - Negatif atıflar doğrudan devlet harcamalarını içerirken, pozitif atıflar uygulama için vergi teşviklerine ve düzenleyici çerçevelere dayanır
  - Negatif atıflar sadece ceza hukukuna uygulanırken, pozitif atıflar taraflar arasındaki tüm medeni ve ticari hukuki ilişkileri kapsar
explanation: |
  Metin, devletin meşru negatif atıfları (yargı ve polis sistemleri aracılığıyla mülkiyet, özgürlük ve güvenliği korumak) ile parazit pozitif atıfları (hakları korumaksızın bireysel faaliyetleri engelleyen, önleyen ve düzenleyen yasalar) arasında net bir ayrım yapmaktadır. Negatif atıflar güvenliği sağlayarak gönüllü mübadeleler ve sözleşmeler için çerçeve oluştururken, pozitif atıflar bireysel seçim ve gönüllü anlaşmalar yerine hükümet kararlarını ikame eder.
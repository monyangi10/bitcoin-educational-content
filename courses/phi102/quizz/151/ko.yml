question: 개인의 자유와 관련하여 국가의 부정적 속성과 긍정적 속성을 구분하는 근본적인 특징은 무엇인가요?
answer: 네거티브 속성은 개입하지 않고 개인의 권리를 보호하는 반면, 포지티브 속성은 자발적 계약을 행정 규제로 대체합니다
wrong_answers:
  - 부정적 속성은 과반수 동의가 필요하지만, 긍정적 속성은 입법부의 동의 없이 행정명령으로 시행할 수 있습니다
  - 부정적 기여는 정부의 직접적인 지출을 수반하는 반면, 긍정적 기여는 세금 인센티브와 규제 프레임워크에 의존하여 이행합니다
  - 부정적 귀속은 형법에만 적용되는 반면, 긍정적 귀속은 당사자 간의 모든 민사 및 상업적 법률 관계를 포괄합니다
explanation: |
  본문은 국가의 정당한 부정적 귀속(사법 및 경찰 시스템을 통해 재산, 자유, 안전을 보호하는 것)과 기생적인 긍정적 귀속(권리를 보호하지 않고 개인의 활동을 방해, 방지, 규제하는 법률)을 명확하게 구분합니다. 부정적 속성은 안전을 보장함으로써 자발적인 교환과 계약의 틀을 만드는 반면, 긍정적 속성은 개인의 선택과 자발적인 합의를 정부의 결정으로 대체합니다.
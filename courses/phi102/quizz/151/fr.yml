question: Quelle caractéristique fondamentale distingue les attributions négatives de l'État de ses attributions positives en matière de liberté individuelle ?
answer: Les attributions négatives protègent les droits individuels sans intervenir, tandis que les attributions positives remplacent les contrats volontaires par des réglementations administratives
wrong_answers:
  - Les attributions négatives requièrent l'approbation de la majorité, tandis que les attributions positives peuvent être mises en œuvre par décret exécutif sans consentement législatif
  - Les attributions négatives impliquent des dépenses publiques directes, tandis que les attributions positives s'appuient sur des incitations fiscales et des cadres réglementaires pour la mise en œuvre
  - Les attributions négatives ne s'appliquent qu'au droit pénal, tandis que les attributions positives englobent toutes les relations juridiques, civiles et commerciales entre les parties
explanation: |
  Le texte distingue clairement les attributions négatives légitimes de l'État (protection de la propriété, de la liberté et de la sécurité par le biais de systèmes judiciaires et policiers) de ses attributions positives parasitaires (lois qui entravent, empêchent et réglementent l'activité individuelle sans protéger les droits). Les attributions négatives créent le cadre des échanges volontaires et des contrats en garantissant la sécurité, tandis que les attributions positives substituent les décisions gouvernementales aux choix individuels et aux accords volontaires.

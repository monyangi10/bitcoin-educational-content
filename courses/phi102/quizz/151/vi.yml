question: Đặc điểm cơ bản nào phân biệt những quy kết tiêu cực của nhà nước với những quy kết tích cực của nhà nước đối với tự do cá nhân?
answer: Các quy kết tiêu cực bảo vệ quyền cá nhân mà không can thiệp, trong khi các quy kết tích cực thay thế các hợp đồng tự nguyện bằng các quy định hành chính.
wrong_answers:
  - Việc quy kết những điều tiêu cực đòi hỏi sự chấp thuận của đa số, trong khi việc quy kết những điều tích cực có thể được thực hiện bằng sắc lệnh hành pháp mà không cần sự đồng thuận của cơ quan lập pháp.
  - Các quy kết tiêu cực liên quan đến chi tiêu trực tiếp của chính phủ, trong khi các quy kết tích cực dựa vào các ưu đãi thuế và khung pháp lý để thực hiện.
  - Các quy kết tiêu cực chỉ áp dụng cho luật hình sự, trong khi các quy kết tích cực bao gồm tất cả các mối quan hệ pháp lý dân sự và thương mại giữa các bên.
explanation: |
  Văn bản này phân biệt rõ ràng giữa các nhiệm vụ tiêu cực chính đáng của nhà nước (bảo vệ tài sản, tự do và an ninh thông qua hệ thống tư pháp và cảnh sát) và các nhiệm vụ tích cực mang tính ký sinh (các luật cản trở, ngăn chặn và điều tiết hoạt động cá nhân mà không bảo vệ quyền). Các nhiệm vụ tiêu cực tạo ra khuôn khổ cho các giao dịch và hợp đồng tự nguyện bằng cách đảm bảo an ninh, trong khi các nhiệm vụ tích cực thay thế các quyết định của chính phủ cho sự lựa chọn cá nhân và các thỏa thuận tự nguyện.
question: Какая фундаментальная характеристика отличает негативные атрибуции государства от его позитивных атрибуций в отношении свободы личности?
answer: Негативные атрибуции защищают права личности без вмешательства, а позитивные атрибуции заменяют добровольные контракты административными правилами
wrong_answers:
  - Негативные атрибуции требуют одобрения большинства, в то время как позитивные атрибуции могут быть реализованы исполнительным указом без согласия законодателей
  - Негативные атрибуции предполагают прямые государственные расходы, в то время как позитивные атрибуции опираются на налоговые стимулы и нормативно-правовую базу для реализации
  - Негативная атрибуция применяется только в уголовном праве, в то время как позитивная атрибуция охватывает все гражданские и коммерческие правоотношения между сторонами
explanation: |
  В тексте четко проводится различие между легитимными негативными атрибуциями государства (защита собственности, свободы и безопасности с помощью судебной и полицейской систем) и паразитическими позитивными атрибуциями (законы, которые препятствуют, предотвращают и регулируют деятельность индивида, не защищая его права). Негативные атрибуции создают основу для добровольных обменов и контрактов, обеспечивая безопасность, в то время как позитивные атрибуции заменяют решения правительства индивидуальным выбором и добровольными соглашениями.
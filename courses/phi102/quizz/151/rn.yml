question: Ni ikihe kintu nyamukuru gitandukanya ibintu bibi Leta itanga n’ivyiza itanga ku bijanye n’umwidegemvyo w’umuntu ku giti ciwe?
answer: Ivyiyumviro bibi birinda uburenganzira bw’umuntu ku giti ciwe ataco bimugirako, mu gihe ivyifuzo vyiza bisubirira amasezerano y’ubushake n’amabwirizwa y’ubutegetsi .
wrong_answers:
  - Ivyiyumviro bibi bisaba kwemezwa na benshi, mu gihe ivyerekeye ivyiza bishobora gushirwa mu ngiro n’itegeko ry’ubutegetsi ata kwemera kw’amategeko .
  - Ivyiyumviro bibi birimwo amahera Leta ikoresha ataco ihinduye, mu gihe ivyiza bishingiye ku nkunga z’imisoro n’ingingo ngenderwako zijanye n’ugushirwa mu ngiro .
  - Ivyiyumviro bibi bikoreshwa gusa ku mategeko agenga ivy’ubugizi bwa nabi, mu gihe ivyifuzo vyiza bikubiyemwo imigenderanire yose y’amategeko y’abanyagihugu n’ay’ubudandaji hagati y’ababuranyi .
explanation: |
  Ico canditswe kiratandukanya neza ivyiza Leta itanga bibereye (kurinda umutungo, umwidegemvyo n’umutekano biciye mu nzira z’ubutungane n’iza polisi) n’ivyiza Leta itanga (amategeko abuza, abuza, kandi atunganya ibikorwa vy’umuntu ku giti ciwe ata kurinda uburenganzira). Ivyiyumviro bibi bituma habaho uguhanahana n’amasezerano ku bushake mu gutuma haba umutekano, mu gihe ivyifuzo vyiza bisubirira ingingo za Leta mu guhitamwo kw’umuntu ku giti ciwe n’amasezerano y’ubushake.
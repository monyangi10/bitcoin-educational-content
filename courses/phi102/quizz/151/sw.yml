question: Ni sifa gani ya msingi inayotofautisha sifa hasi za serikali na sifa zake chanya kuhusiana na uhuru wa mtu binafsi?
answer: Sifa hasi hulinda haki za mtu binafsi bila kuingilia kati, huku sifa chanya zikibadilisha mikataba ya hiari na kanuni za utawala
wrong_answers:
  - Sifa hasi zinahitaji idhini ya wengi, huku sifa chanya zinaweza kutekelezwa kwa amri ya utendaji bila idhini ya kisheria.
  - Sifa hasi zinahusisha matumizi ya moja kwa moja ya serikali, huku sifa chanya zikitegemea motisha za kodi na mifumo ya udhibiti kwa ajili ya utekelezaji.
  - Sifa hasi zinatumika tu kwa sheria ya jinai, huku sifa chanya zikijumuisha mahusiano yote ya kisheria ya kiraia na kibiashara kati ya pande hizo mbili.
explanation: |
  Maandishi yanatofautisha wazi kati ya sifa hasi halali za serikali (kulinda mali, uhuru, na usalama kupitia mifumo ya mahakama na polisi) na sifa zake chanya za vimelea (sheria zinazozuia, kuzuia, na kudhibiti shughuli za mtu binafsi bila kulinda haki). Sifa hasi huunda mfumo wa ubadilishanaji wa hiari na mikataba kwa kuhakikisha usalama, huku sifa chanya zikibadilisha maamuzi ya serikali kwa chaguo la mtu binafsi na makubaliano ya hiari.
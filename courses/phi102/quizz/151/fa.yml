question: چه ویژگی بنیادی، نسبت‌های منفی دولت را از نسبت‌های مثبت آن در رابطه با آزادی فردی متمایز می‌کند؟
answer: نسبت‌های منفی از حقوق فردی بدون مداخله محافظت می‌کنند، در حالی که نسبت‌های مثبت قراردادهای داوطلبانه را با مقررات اداری جایگزین می‌کنند.
wrong_answers:
  - نسبت‌های منفی نیاز به تأیید اکثریت دارند، در حالی که نسبت‌های مثبت می‌توانند بدون رضایت قانون‌گذاری با فرمان اجرایی اجرا شوند.
  - نسبت‌های منفی شامل هزینه‌های مستقیم دولت می‌شوند، در حالی که نسبت‌های مثبت به مشوق‌های مالیاتی و چارچوب‌های نظارتی برای اجرا متکی هستند.
  - انتساب‌های منفی فقط به حقوق کیفری اعمال می‌شوند، در حالی که انتساب‌های مثبت شامل تمام روابط حقوقی مدنی و تجاری بین طرفین می‌شوند.
explanation: |
  متن به وضوح بین ویژگی‌های منفی مشروع دولت (حفاظت از مالکیت، آزادی و امنیت از طریق سیستم‌های قضایی و پلیس) و ویژگی‌های مثبت انگلی آن (قوانینی که فعالیت فردی را بدون حفاظت از حقوق مانع، جلوگیری و تنظیم می‌کنند) تمایز قائل می‌شود. ویژگی‌های منفی با تضمین امنیت، چارچوبی برای مبادلات و قراردادهای داوطلبانه ایجاد می‌کنند، در حالی که ویژگی‌های مثبت تصمیمات دولتی را جایگزین انتخاب فردی و توافقات داوطلبانه می‌کنند.
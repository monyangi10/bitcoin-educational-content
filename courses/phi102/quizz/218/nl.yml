question: Welke analogie trekt de tekst tussen de historische verwerving van grondgebied door stammen en individuele eigendomsverwerving om de legitimiteit van privébezit aan te tonen?
answer: In beide gevallen gaat het om ontdekking, verbetering door arbeid en verdediging tegen bedreigingen, waardoor de processen fundamenteel identiek zijn in hun rechtvaardiging
wrong_answers:
  - Beide vereisen collectieve consensus en democratische goedkeuring van de bestaande bewoners om legitieme eigendomsaanspraken vast te stellen
  - Beide zijn afhankelijk van wettelijke erkenning door gevestigde autoriteiten en formele documentatie om geldige eigendomsrechten te creëren
  - Beide vereisen vreedzame onderhandelingen en compensatie voor eerdere gebruikers in plaats van enige vorm van gewelddadige verwerving
explanation: |
  De tekst legt een directe parallel tussen het verwerven van inheems grondgebied en individuele eigendomsrechten door te benadrukken dat het in beide gevallen gaat om de ontdekking van ongebruikte hulpbronnen, verbetering door arbeid (landbouw, infrastructuur voor stammen; cultivering, ontwikkeling voor individuen) en verdediging tegen bedreigingen van buitenaf. Deze analogie ondersteunt het liberale argument dat als collectieve eigendomsverwerving via deze middelen legitiem is, dat individuele eigendomsverwerving via identieke processen dan ook legitiem zou moeten zijn. De foute antwoorden geven een verkeerd beeld van de historische realiteit die in de tekst wordt beschreven, waarin wordt erkend dat territoriale verwerving vaak gepaard ging met geweld of simpelweg eerste ontdekking, niet met democratische consensus, wettelijke formaliteiten of vreedzame onderhandelingen.
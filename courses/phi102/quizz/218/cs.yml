question: Jaká analogie se v textu objevuje mezi historickým získáváním území kmeny a individuálním získáváním majetku, aby se prokázala legitimita soukromého vlastnictví?
answer: Oba procesy zahrnují objevování, zlepšování prostřednictvím práce a obranu proti hrozbám, takže jejich opodstatnění je v zásadě totožné
wrong_answers:
  - Obojí vyžaduje kolektivní konsenzus a demokratický souhlas stávajících obyvatel, aby bylo možné stanovit legitimní vlastnické nároky
  - Obojí závisí na právním uznání ze strany stanovených orgánů a formální dokumentaci, aby vznikla platná vlastnická práva
  - V obou případech je nutné spíše pokojné vyjednávání a kompenzace předchozím uživatelům než jakákoli forma násilného získání
explanation: |
  Text vytváří přímou paralelu mezi získáváním kmenového území a vlastnickými právy jednotlivců a zdůrazňuje, že v obou případech jde o objevování nevyužitých zdrojů, jejich zlepšování prací (zemědělství, infrastruktura pro kmeny; pěstování, rozvoj pro jednotlivce) a obranu proti vnějším hrozbám. Tato analogie podporuje liberální argument, že pokud je legitimní kolektivní nabývání majetku těmito prostředky, pak by mělo být legitimní i individuální nabývání majetku prostřednictvím totožných procesů. Špatné odpovědi zkreslují historickou realitu popsanou v textu, který uznává, že získávání území často zahrnovalo násilí nebo prostě první objevení, nikoli demokratický konsenzus, právní formality nebo mírové vyjednávání.
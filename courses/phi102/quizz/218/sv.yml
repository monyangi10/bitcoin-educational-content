question: Vilken analogi drar texten mellan stammars historiska förvärv av territorium och enskilda personers förvärv av egendom för att visa på den privata egendomens legitimitet?
answer: Båda innebär upptäckt, förbättring genom arbete och försvar mot hot, vilket gör att processerna i grunden är identiska i sin motivering
wrong_answers:
  - Båda kräver kollektivt samförstånd och demokratiskt godkännande från befintliga invånare för att fastställa legitima äganderättsanspråk
  - Båda är beroende av rättsligt erkännande av etablerade myndigheter och formell dokumentation för att skapa giltiga äganderätter
  - Båda kräver fredliga förhandlingar och kompensation till tidigare användare snarare än någon form av tvångsförvärv
explanation: |
  Texten etablerar en direkt parallell mellan stammens territoriella förvärv och individuell äganderätt, och betonar att båda innebär upptäckt av oanvända resurser, förbättring genom arbete (jordbruk, infrastruktur för stammar; odling, utveckling för individer) och försvar mot yttre hot. Denna analogi stöder det liberala argumentet att om kollektivt äganderättsförvärv på detta sätt är legitimt, så borde även individuellt äganderättsförvärv genom identiska processer vara legitimt. De felaktiga svaren ger en felaktig bild av den historiska verklighet som beskrivs i texten, där det konstateras att territoriella förvärv ofta involverade våld eller helt enkelt första upptäckten, inte demokratiskt samförstånd, juridiska formaliteter eller fredliga förhandlingar.
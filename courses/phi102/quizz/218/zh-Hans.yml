question: 文中是如何类比历史上部落获取领土和个人获取财产来证明私有财产的合法性的？
answer: 两者都涉及到发现、通过劳动改进和抵御威胁，因此，这两个过程的理由在本质上是相同的
wrong_answers:
  - 两者都需要现有居民的集体共识和民主批准，以确立合法的所有权要求
  - 两者都依赖于既定机构的法律承认和正式文件，以建立有效的财产权
  - 两者都需要和平谈判，并对以前的使用者进行补偿，而不是任何形式的强行收购
explanation: |
  文中将部落领地的获取与个人财产权直接相提并论，强调两者都涉及发现未使用的资源、通过劳动改善（对部落而言是农业、基础设施；对个人而言是种植、发展）以及抵御外部威胁。这种类比支持了自由派的论点，即如果通过这些手段获得集体财产是合法的，那么通过相同的过程获得个人财产也应该是合法的。错误的答案歪曲了课文中描述的历史现实，课文承认领土的获取往往涉及暴力或仅仅是首先发现，而不是民主共识、法律手续或和平谈判。
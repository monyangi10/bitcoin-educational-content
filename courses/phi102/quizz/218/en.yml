question: What analogy does the text draw between the historical acquisition of territory by tribes and individual property acquisition to demonstrate the legitimacy of private property?
answer: Both involve discovery, improvement through labor, and defense against threats, making the processes fundamentally identical in their justification
wrong_answers:
  - Both require collective consensus and democratic approval from existing inhabitants to establish legitimate ownership claims
  - Both depend on legal recognition by established authorities and formal documentation to create valid property rights
  - Both necessitate peaceful negotiation and compensation to previous users rather than any form of forceful acquisition
explanation: |
  The text establishes a direct parallel between tribal territory acquisition and individual property rights, emphasizing that both involve discovery of unused resources, improvement through labor (agriculture, infrastructure for tribes; cultivation, development for individuals), and defense against external threats. This analogy supports the liberal argument that if collective property acquisition through these means is legitimate, then individual property acquisition through identical processes should also be legitimate. The wrong answers misrepresent the historical reality described in the text, which acknowledges that territorial acquisition often involved violence or simply first discovery, not democratic consensus, legal formalities, or peaceful negotiation.

question: Ni mlinganisho gani unaotolewa na maandishi kati ya umiliki wa kihistoria wa eneo na makabila na umiliki wa mali ya mtu binafsi ili kuonyesha uhalali wa mali ya kibinafsi?
answer: Zote mbili zinahusisha ugunduzi, uboreshaji kupitia kazi, na ulinzi dhidi ya vitisho, na kufanya michakato hiyo kuwa sawa kimsingi katika uhalali wake.
wrong_answers:
  - Zote zinahitaji makubaliano ya pamoja na idhini ya kidemokrasia kutoka kwa wakazi waliopo ili kuthibitisha madai halali ya umiliki
  - Zote mbili hutegemea utambuzi wa kisheria na mamlaka zilizoanzishwa na nyaraka rasmi ili kuunda haki halali za mali.
  - Zote zinahitaji mazungumzo ya amani na fidia kwa watumiaji wa awali badala ya aina yoyote ya ununuzi wa lazima
explanation: |
  Maandishi yanaweka ulinganifu wa moja kwa moja kati ya upatikanaji wa maeneo ya kikabila na haki za mali za mtu binafsi, yakisisitiza kwamba yote yanahusisha ugunduzi wa rasilimali zisizotumika, uboreshaji kupitia kazi (kilimo, miundombinu ya makabila; kilimo, maendeleo ya watu binafsi), na ulinzi dhidi ya vitisho vya nje. Mfano huu unaunga mkono hoja ya kiliberali kwamba ikiwa upatikanaji wa mali ya pamoja kupitia njia hizi ni halali, basi upatikanaji wa mali ya mtu binafsi kupitia michakato inayofanana pia unapaswa kuwa halali. Majibu yasiyo sahihi yanapotosha ukweli wa kihistoria ulioelezwa katika maandishi, ambayo yanakubali kwamba upatikanaji wa maeneo mara nyingi ulihusisha vurugu au ugunduzi wa kwanza tu, si makubaliano ya kidemokrasia, taratibu za kisheria, au mazungumzo ya amani.
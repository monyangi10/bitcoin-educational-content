question: 私有財産の正当性を示すために、部族による歴史的な領土獲得と個人の財産獲得との間にどのような類似性があるのか？
answer: どちらも、発見、労働による改善、脅威からの防衛を伴うものであり、その正当化のプロセスは基本的に同じである。
wrong_answers:
  - どちらも、正当な所有権を主張するためには、既存の住民の集団的合意と民主的承認が必要である。
  - どちらも、有効な財産権を設定するためには、確立された当局による法的承認と正式な文書に依存する。
  - どちらも、強制的な買収ではなく、平和的な交渉と以前の利用者への補償が必要である。
explanation: |
  この文章は、部族の領土獲得と個人の財産権の間に直接的な並列関係を築き、両者には未利用資源の発見、労働による改善（部族にとっては農業、インフラ、個人にとっては耕作、開発）、外部からの脅威に対する防衛が含まれることを強調している。この類推は、このような手段による集団的財産獲得が合法的であるならば、同じプロセスによる個人の財産獲得も合法的であるべきだというリベラルの主張を支持するものである。間違った答えは、本文で述べられている歴史的現実を誤って伝えている。領土の獲得には、民主的合意や法的手続き、平和的交渉ではなく、しばしば暴力や単なる最初の発見が必要であったことを認めている。
question: Hvilken analogi trekker teksten mellom stammers historiske ervervelse av territorier og individuell eiendomservervelse for å vise legitimiteten til privat eiendom?
answer: Begge involverer oppdagelse, forbedring gjennom arbeid og forsvar mot trusler, noe som gjør prosessene grunnleggende identiske i sin begrunnelse
wrong_answers:
  - Begge krever kollektiv konsensus og demokratisk godkjenning fra eksisterende innbyggere for å etablere legitime eierkrav
  - Begge er avhengige av juridisk anerkjennelse fra etablerte myndigheter og formell dokumentasjon for å skape gyldige eiendomsrettigheter
  - Begge deler krever fredelige forhandlinger og kompensasjon til tidligere brukere, snarere enn noen form for tvangsovertakelse
explanation: |
  Teksten etablerer en direkte parallell mellom stammens ervervelse av territorium og individuell eiendomsrett, og understreker at begge involverer oppdagelse av ubrukte ressurser, forbedring gjennom arbeid (jordbruk, infrastruktur for stammer; dyrking, utvikling for enkeltpersoner) og forsvar mot ytre trusler. Denne analogien støtter det liberale argumentet om at hvis kollektiv ervervelse av eiendom på denne måten er legitimt, så bør også individuell ervervelse av eiendom gjennom identiske prosesser være legitimt. De gale svarene gir en feilaktig fremstilling av den historiske virkeligheten som beskrives i teksten, der det erkjennes at ervervelse av territorier ofte involverte vold eller rett og slett første oppdagelse, og ikke demokratisk konsensus, juridiske formaliteter eller fredelige forhandlinger.
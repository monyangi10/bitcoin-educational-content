question: ¿Qué dos factores principales hicieron que la esclavitud se desarrollara universalmente en las sociedades antiguas según el texto?
answer: La producción dependía casi exclusivamente de la fuerza física y los rendimientos económicos seguían siendo bajos e inciertos
wrong_answers:
  - Las creencias religiosas exigían sacrificios humanos y las tradiciones culturales fomentaban las jerarquías sociales
  - El crecimiento de la población superó la tierra disponible y la conquista militar fue la principal actividad económica
  - Los sistemas educativos no estaban desarrollados y las tecnologías de la comunicación eran inexistentes
explanation: |
  El texto afirma claramente que la esclavitud se desarrolló universalmente en las sociedades antiguas porque la producción dependía casi exclusivamente de la fuerza física (para la caza, la lucha, las conquistas) y porque los rendimientos productivos seguían siendo bajos e inciertos. Estas limitaciones económicas, combinadas con la escasez de transporte y comercio, hicieron de la esclavitud una institución coherente para las sociedades en las que la fuerza era el principal medio de adquisición de recursos. Las demás opciones mencionan factores no identificados específicamente en el texto como razones principales del desarrollo universal de la esclavitud en la Antigüedad.
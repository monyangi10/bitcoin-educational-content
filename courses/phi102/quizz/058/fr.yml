question: D'après le texte, quels sont les deux principaux facteurs qui ont permis à l'esclavage de se développer universellement dans les sociétés anciennes ?
answer: La production dépendait presque exclusivement de la force physique et les rendements économiques restaient faibles et incertains
wrong_answers:
  - Les croyances religieuses exigeaient des sacrifices humains et les traditions culturelles favorisaient les hiérarchies sociales
  - La croissance de la population dépasse celle des terres disponibles et la conquête militaire est la principale activité économique
  - Les systèmes éducatifs étaient peu développés et les technologies de communication totalement absentes
explanation: |
  Le texte indique clairement que l'esclavage s'est développé universellement dans les sociétés anciennes parce que la production dépendait presque exclusivement de la force physique (pour la chasse, les combats, les conquêtes) et parce que les rendements productifs restaient faibles et incertains. Ces contraintes économiques, combinées à des moyens de transport et de commerce limités, ont fait de l'esclavage une institution cohérente pour les sociétés où la force était le principal moyen d'acquisition des ressources. Les autres options mentionnent des facteurs qui ne sont pas spécifiquement identifiés dans le texte comme des raisons principales du développement universel de l'esclavage dans l'Antiquité.
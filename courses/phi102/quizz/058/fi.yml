question: Mitkä kaksi päätekijää saivat tekstin mukaan aikaan sen, että orjuus kehittyi yleisesti antiikin yhteiskunnissa?
answer: Tuotanto riippui lähes yksinomaan fyysisestä voimasta, ja taloudellinen tuotto oli alhainen ja epävarma
wrong_answers:
  - Uskonnolliset uskomukset edellyttivät ihmisuhreja ja kulttuuriset perinteet edistivät sosiaalisia hierarkioita
  - Väestönkasvu ylitti käytettävissä olevan maa-alueen, ja sotilaallinen valloitus oli ensisijainen taloudellinen toiminta
  - Koulutusjärjestelmät olivat kehittymättömiä ja viestintäteknologia puuttui kokonaan
explanation: |
  Tekstissä todetaan selvästi, että orjuus kehittyi antiikin yhteiskunnissa yleisesti, koska tuotanto riippui lähes yksinomaan fyysisestä voimasta (metsästys, taistelut, valloitukset) ja koska tuotannolliset tuotot olivat alhaisia ja epävarmoja. Nämä taloudelliset rajoitteet yhdistettynä rajalliseen liikenteeseen ja kaupankäyntiin tekivät orjuudesta johdonmukaisen instituution yhteiskunnissa, joissa voimankäyttö oli tärkein keino hankkia resursseja. Muissa vaihtoehdoissa mainitaan tekijöitä, joita tekstissä ei erikseen mainita ensisijaisina syinä orjuuden yleiseen kehittymiseen antiikin aikana.
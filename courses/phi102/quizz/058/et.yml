question: Millised kaks peamist tegurit panid teksti kohaselt orjuse universaalselt arenema antiikühiskondades?
answer: Tootmine sõltus peaaegu eranditult füüsilisest jõust ning majanduslik tootlus jäi madalaks ja ebakindlaks
wrong_answers:
  - Religioossed uskumused nõudsid inimohvreid ja kultuuritraditsioonid edendasid sotsiaalseid hierarhiaid
  - Rahvaarvu kasv ületas olemasolevat maad ja sõjaline vallutamine oli peamine majandustegevus
  - Haridussüsteemid olid välja arendamata ja kommunikatsioonitehnoloogiad puudusid täielikult
explanation: |
  Tekstis on selgelt öeldud, et orjapidamine arenes antiikühiskondades üldiselt, sest tootmine sõltus peaaegu eranditult füüsilisest jõust (jahipidamine, võitlus, vallutused) ning kuna tootlik saagikus jäi madalaks ja ebakindlaks. Need majanduslikud piirangud koos piiratud transpordi ja kaubandusega muutsid orjuse sidusaks institutsiooniks ühiskondades, kus jõud oli peamine vahend ressursside omandamiseks. Teistes valikutes mainitakse tegureid, mida tekstis ei ole konkreetselt nimetatud kui orjuse üldise arengu peamisi põhjusi antiikajal.
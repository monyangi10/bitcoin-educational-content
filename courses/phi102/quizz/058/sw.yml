question: Ni mambo gani mawili makuu yaliyosababisha utumwa kukua katika jamii za kale kulingana na maandishi?
answer: Uzalishaji ulitegemea karibu nguvu ya kimwili pekee na mavuno ya kiuchumi yalibaki kuwa ya chini na yasiyo na uhakika
wrong_answers:
  - Imani za kidini zilihitaji kafara ya kibinadamu na mila za kitamaduni zilikuza mfumo wa kijamii
  - Ongezeko la idadi ya watu lilizidi ardhi iliyopo na ushindi wa kijeshi ulikuwa shughuli kuu ya kiuchumi
  - Mifumo ya elimu haikuwa imeendelezwa na teknolojia za mawasiliano hazikuwepo kabisa
explanation: |
  Maandishi yanasema wazi kwamba utumwa ulienea kote katika jamii za kale kwa sababu uzalishaji ulitegemea karibu nguvu za kimwili pekee (kwa ajili ya uwindaji, mapigano, ushindi) na kwa sababu mavuno yenye tija yalibaki kuwa chini na yasiyo na uhakika. Vikwazo hivi vya kiuchumi, pamoja na usafiri mdogo na biashara, vilifanya utumwa kuwa taasisi thabiti kwa jamii ambapo nguvu ilikuwa njia kuu ya kupata rasilimali. Chaguzi zingine zinataja mambo ambayo hayajatambuliwa mahsusi katika maandishi kama sababu kuu za maendeleo ya utumwa kwa ujumla katika nyakati za kale.
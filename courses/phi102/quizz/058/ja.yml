question: 本文によれば、奴隷制度が古代社会で普遍的に発展した主な要因は何か？
answer: 生産はほとんど肉体労働に依存し、経済的収量は低く、不確実なままだった。
wrong_answers:
  - 宗教的信念は人間の犠牲を必要とし、文化的伝統は社会的階層を促進した。
  - 人口の増加が利用可能な土地を上回り、軍事征服が主要な経済活動となった。
  - 教育システムは未発達で、通信技術もまったくなかった。
explanation: |
  本文では、奴隷制度が古代社会で普遍的に発展したのは、生産がほとんど肉体的な力（狩猟、戦闘、征服のため）に依存し、生産収量が低く不確かなままだったからだと明言している。このような経済的制約が、限られた交通手段や商業と相まって、武力が資源獲得の主な手段であった社会にとって、奴隷制度は首尾一貫した制度となった。他の選択肢は、古代において奴隷制度が普遍的に発展した主な理由として、本文では特に挙げられていない要因に言及している。
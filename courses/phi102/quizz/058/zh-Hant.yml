question: 根據文中所述，使奴隸制在古代社會普遍發展的兩個主要因素是什麼？
answer: 生產幾乎完全仰賴體力，經濟收益仍然低且不確定
wrong_answers:
  - 宗教信仰需要人類犧牲，文化傳統則促進社會等級制度
  - 人口增長超過可用土地，軍事征服成為主要經濟活動
  - 教育體系不發達，通訊技術完全缺乏
explanation: |
  文中明確指出，古代社會之所以普遍發展奴隸制，是因為生產幾乎完全依賴武力（用於狩獵、戰鬥、征服），而且產量仍然很低且不確定。這些經濟上的限制，加上有限的運輸和商業，使得奴隸制在以武力為主要獲取資源手段的社會中成為一種連貫的制度。其他選項提到文中未特別指出的因素，作為奴隸制在古代普遍發展的主要原因。
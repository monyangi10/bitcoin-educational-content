question: Theo văn bản, hai yếu tố chính nào đã khiến chế độ nô lệ phát triển phổ biến trong các xã hội cổ đại?
answer: Việc sản xuất gần như hoàn toàn phụ thuộc vào sức lao động thể chất, và năng suất kinh tế vẫn thấp và không chắc chắn.
wrong_answers:
  - Các tín ngưỡng tôn giáo đòi hỏi phải hiến tế người, còn các truyền thống văn hóa thúc đẩy sự phân cấp xã hội.
  - Tăng trưởng dân số vượt quá diện tích đất đai có sẵn và chinh phục quân sự trở thành hoạt động kinh tế chính.
  - Hệ thống giáo dục còn lạc hậu và công nghệ truyền thông hoàn toàn không tồn tại.
explanation: |
  Văn bản nêu rõ rằng chế độ nô lệ phát triển phổ biến trong các xã hội cổ đại vì sản xuất phụ thuộc gần như hoàn toàn vào sức mạnh thể chất (để săn bắn, chiến đấu, chinh phục) và vì năng suất sản xuất vẫn thấp và không chắc chắn. Những hạn chế về kinh tế này, kết hợp với vận tải và thương mại hạn chế, đã khiến chế độ nô lệ trở thành một thể chế phù hợp với các xã hội nơi sức mạnh là phương tiện chính để có được nguồn lực. Các lựa chọn khác đề cập đến các yếu tố không được nêu cụ thể trong văn bản là nguyên nhân chính dẫn đến sự phát triển phổ biến của chế độ nô lệ trong thời cổ đại.
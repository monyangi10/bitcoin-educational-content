question: 根据课文内容，使奴隶制在古代社会普遍发展的两个主要因素是什么？
answer: 生产几乎完全依靠体力，经济收益仍然很低且不确定
wrong_answers:
  - 宗教信仰要求人类献祭，文化传统促进社会等级制度的形成
  - 人口增长超过可用土地，军事征服成为主要经济活动
  - 教育系统不发达，通信技术完全缺乏
explanation: |
  文中明确指出，奴隶制在古代社会普遍发展起来，是因为生产几乎完全依赖于体力（用于狩猎、战斗和征服），而且生产率一直很低且不确定。这些经济制约因素，再加上有限的交通和商业，使奴隶制成为以武力为获取资源的主要手段的社会的一致制度。其他选项提到了文本中没有明确指出的导致奴隶制在古代普遍发展的主要原因。
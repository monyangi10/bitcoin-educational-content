question: Welche beiden Hauptfaktoren führten dazu, dass sich die Sklaverei in den antiken Gesellschaften durchgängig entwickelte?
answer: Die Produktion hing fast ausschließlich von der physischen Kraft ab, und die wirtschaftlichen Erträge blieben gering und unsicher
wrong_answers:
  - Religiöse Überzeugungen erforderten Menschenopfer und kulturelle Traditionen förderten soziale Hierarchien
  - Das Bevölkerungswachstum überstieg das verfügbare Land, und die militärische Eroberung war die wichtigste wirtschaftliche Aktivität
  - Die Bildungssysteme waren unterentwickelt und die Kommunikationstechnologien fehlten völlig
explanation: |
  Aus dem Text geht klar hervor, dass sich die Sklaverei in den antiken Gesellschaften allgemein entwickelte, weil die Produktion fast ausschließlich von physischer Gewalt (für die Jagd, den Kampf, die Eroberung) abhing und weil die Produktionserträge gering und unsicher waren. Diese wirtschaftlichen Zwänge in Verbindung mit begrenzten Transport- und Handelsmöglichkeiten machten die Sklaverei zu einer kohärenten Institution für Gesellschaften, in denen Gewalt das wichtigste Mittel zum Erwerb von Ressourcen war. Die anderen Optionen nennen Faktoren, die im Text nicht ausdrücklich als Hauptgründe für die universelle Entwicklung der Sklaverei in der Antike genannt werden.
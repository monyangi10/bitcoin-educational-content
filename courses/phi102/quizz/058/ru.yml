question: Какие два основных фактора способствовали повсеместному развитию рабства в древних обществах, согласно тексту?
answer: Производство зависело почти исключительно от физической силы, а экономическая доходность оставалась низкой и неопределенной
wrong_answers:
  - Религиозные верования требовали человеческих жертвоприношений, а культурные традиции способствовали установлению социальной иерархии
  - Численность населения превышала количество свободных земель, и основной экономической деятельностью стали военные завоевания
  - Системы образования были неразвиты, а коммуникационные технологии полностью отсутствовали
explanation: |
  В тексте четко сказано, что рабство повсеместно развивалось в древних обществах, поскольку производство зависело почти исключительно от физической силы (для охоты, сражений, завоеваний) и потому, что урожайность оставалась низкой и неопределенной. Эти экономические ограничения в сочетании с ограниченными возможностями транспорта и торговли сделали рабство вполне приемлемым институтом для обществ, где сила была основным средством получения ресурсов. В остальных вариантах упоминаются факторы, не указанные в тексте в качестве основных причин повсеместного развития рабства в древности.
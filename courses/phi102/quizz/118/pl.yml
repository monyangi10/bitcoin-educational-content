question: Zgodnie z teorią liberalizmu gospodarczego, jaki jest główny powód, dla którego instytucje państwowe nie mogą strukturalnie napędzać innowacji?
answer: Pracownikom państwowym brakuje osobistej inicjatywy i proporcjonalnego wynagrodzenia powiązanego z wynikami w zakresie innowacji
wrong_answers:
  - Instytucje państwowe nie dysponują wystarczającymi funduszami, aby wspierać projekty badawczo-rozwojowe na dużą skalę
  - Biurokracja rządowa działa zbyt wolno, by nadążyć za szybko zmieniającymi się warunkami rynkowymi
  - Monopole państwowe nie są narażone na zewnętrzną presję konkurencyjną, która motywowałaby je do ciągłego doskonalenia
explanation: |
  Rozdział ten wyjaśnia, że instytucje państwowe nie mogą wprowadzać innowacji ze względu na ich fundamentalną strukturę opartą na zatrudnieniu w służbie cywilnej. Pracownicy rządowi działają w ramach z góry określonych przepisów, bez osobistej inicjatywy lub rekompensaty związanej z innowacjami. Wszystko jest regulowane przepisami, co nie tworzy ani zachęty, ani zainteresowania innowacjami. Sam system nie jest zaprojektowany z myślą o innowacjach, co ilustrują krajowe systemy edukacji, które raczej rozpowszechniają istniejącą wiedzę niż ją ulepszają. To strukturalne ograniczenie oznacza, że państwa muszą polegać na kopiowaniu innowacji z wolnych sektorów, zamiast tworzyć własne.
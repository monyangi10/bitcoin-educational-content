question: Selon la théorie du libéralisme économique, quelle est la principale raison pour laquelle les institutions publiques ne peuvent structurellement pas stimuler l'innovation ?
answer: Les employés de l'État manquent d'initiative personnelle et de compensation proportionnelle liée aux résultats de l'innovation
wrong_answers:
  - Les institutions publiques ne disposent pas de fonds suffisants pour soutenir des projets de recherche et de développement à grande échelle
  - La bureaucratie gouvernementale est trop lente pour s'adapter à l'évolution rapide des conditions du marché
  - Les monopoles d'État ne sont pas confrontés à la concurrence extérieure pression pour motiver les efforts d'amélioration continue
explanation: |
  Le chapitre explique que les institutions publiques ne peuvent pas innover en raison de leur structure fondamentale basée sur l'emploi dans la fonction publique. Les fonctionnaires travaillent dans le cadre de règlements prédéterminés, sans initiative personnelle ni compensation liée à l'innovation. Tout est régi par des règles, ce qui ne crée ni incitation ni intérêt pour l'innovation. Le système lui-même n'est pas conçu pour l'innovation, comme l'illustrent les systèmes éducatifs nationaux qui diffusent les connaissances existantes plutôt que de les améliorer. Cette limitation structurelle signifie que les États doivent copier les innovations des secteurs libres plutôt que d'en créer de nouvelles.
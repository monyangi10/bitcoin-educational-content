question: Jaký je podle teorie ekonomického liberalismu hlavní důvod, proč státní instituce strukturálně nemohou být motorem inovací?
answer: Státní zaměstnanci postrádají osobní iniciativu a úměrné odměňování vázané na výsledky inovací
wrong_answers:
  - Státní instituce nemají dostatek finančních prostředků na podporu rozsáhlých projektů výzkumu a vývoje
  - Státní byrokracie se pohybuje příliš pomalu, než aby dokázala držet krok s rychle se měnícími podmínkami na trhu
  - Státní monopoly nejsou vystaveny žádnému vnějšímu konkurenčnímu tlaku, který by motivoval k neustálému zlepšování
explanation: |
  Kapitola vysvětluje, že státní instituce nemohou inovovat kvůli své základní struktuře založené na zaměstnávání ve státní správě. Státní zaměstnanci pracují v rámci předem daných předpisů bez osobní iniciativy nebo odměny vázané na inovace. Vše se řídí pravidly, což nevytváří ani motivaci, ani zájem o inovace. Samotný systém není uzpůsoben k inovacím, což ilustrují národní vzdělávací systémy, které spíše distribuují stávající znalosti, než aby je zdokonalovaly. Toto strukturální omezení znamená, že státy se musí spoléhat na kopírování inovací ze svobodných odvětví, místo aby vytvářely vlastní.
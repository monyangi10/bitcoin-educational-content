question: 根據經濟自由主義理論，國家機構在結構上無法推動創新的主要原因是什麼？
answer: 州政府員工缺乏個人主動性，薪酬比例與創新成果脫節
wrong_answers:
  - 國家機構沒有足夠資金支持大型研發專案
  - 政府的官僚作風太慢，跟不上瞬息萬變的市場環境
  - 國家壟斷企業沒有面對外部競爭壓力，無法推動持續改善的努力
explanation: |
  本章說明，由於國家機構的基本結構是以公務員雇用為基礎，因此無法創新。政府員工在預定的規範內運作，沒有個人的主動性，也沒有與創新相關的報酬。一切都在規範之內，既沒有創新的動力，也沒有創新的興趣。這個體系本身也不是為創新而設計的，國家教育體系就說明了這一點，它只是分配現有的知識，而不是改進現有的知識。這種結構上的限制意味著國家必須依賴複製自由產業的創新，而非自行創造。
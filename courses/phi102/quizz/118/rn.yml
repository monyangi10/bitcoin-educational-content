question: Dushingiye ku ciyumviro c’uburenganzira bw’ubutunzi, ni imvo nyamukuru iyihe ituma inzego za Leta mu mibumbe zidashobora gutuma habaho ubuhinga bushasha?
answer: Abakozi ba Leta ntibagira umugambi wabo bwite n'indishi zihuye n'ingaruka z'ubuhinga bushasha
wrong_answers:
  - Inzego za Leta ntizifise amahera ahagije yo gufasha imigambi minini y'ubushakashatsi n'iterambere .
  - Ibiro vya Leta bigenda buhoro cane kugira ngo bijane n'uguhinduka kw'isoko vyihuta .
  - Leta zifise ubutunzi bwihariye ntizihura n'imikazo y'amahiganwa yo hanze kugira ngo zivyure utwigoro two gutera imbere
explanation: |
  Ico gice kirasigura ko inzego za Leta zidashobora gukora ibintu bishasha kubera imiterere yazo y’ishimikiro ishingiye ku kazi k’abakozi ba Leta. Abakozi ba Leta bakora mu mategeko yashinzwe imbere y’igihe ata n’umwe yiyemeje canke indishi iboshe ku guhingura ibintu bishasha. Ivyo vyose bigenwa n’amategeko, ntibituma umuntu agira ico akora canke ngo agire inyungu mu guhingura ibintu bishasha. Ubuhinga ubwabwo ntibwagenewe gukora ibintu bishasha, nk’uko vyerekanwa n’uburyo bw’uburezi bw’igihugu butanga ubumenyi buriho aho kubutera imbere. Uwo mupaka w’imiterere bisigura ko Leta zitegerezwa kwizigira kwigana ubuhinga bushasha buva mu mice y’ubuntu aho kwizigira ivyabo.
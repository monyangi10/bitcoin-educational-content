question: Prema teoriji ekonomskog liberalizma, primarni razlog zašto državne institucije strukturno ne mogu pokretati inovacije je nedostatak konkurencije i podsticaja koji su prisutni u privatnom sektoru.
answer: Državni službenici nemaju ličnu inicijativu i proporcionalnu kompenzaciju povezanu sa rezultatima inovacija
wrong_answers:
  - Državne institucije nemaju dovoljno sredstava za podršku velikim projektima istraživanja i razvoja.
  - Vladina birokratija se kreće presporo da bi držala korak sa brzo promenljivim tržišnim uslovima.
  - Državni monopoli ne suočavaju se sa spoljnim konkurentskim pritiskom koji bi motivisao napore za kontinuirano unapređenje.
explanation: |
  Poglavlje objašnjava da državne institucije ne mogu inovirati zbog svoje fundamentalne strukture zasnovane na zapošljavanju u javnoj službi. Državni službenici rade unutar unapred određenih propisa bez lične inicijative ili naknade povezane sa inovacijama. Sve je regulisano pravilima, što ne stvara podsticaj niti interes za inovacije. Sam sistem nije dizajniran za inovacije, kao što ilustruju nacionalni obrazovni sistemi koji distribuiraju postojeće znanje umesto da ga unapređuju. Ovo strukturno ograničenje znači da države moraju da se oslanjaju na kopiranje inovacija iz slobodnih sektora umesto da generišu sopstvene.
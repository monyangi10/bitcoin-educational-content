question: According to economic liberalism theory, what is the primary reason why state institutions structurally cannot drive innovation?
answer: State employees lack personal initiative and proportional compensation tied to innovation outcomes
wrong_answers:
  - State institutions have insufficient funding to support large-scale research and development projects
  - Government bureaucracy moves too slowly to keep pace with rapidly changing market conditions
  - State monopolies face no external competition pressure to motivate continuous improvement efforts
explanation: |
  The chapter explains that state institutions cannot innovate due to their fundamental structure based on civil service employment. Government employees operate within predetermined regulations without personal initiative or compensation tied to innovation. Everything is governed by rules, creating neither incentive nor interest in innovation. The system itself is not designed for innovation, as illustrated by national education systems that distribute existing knowledge rather than improve it. This structural limitation means states must rely on copying innovations from free sectors rather than generating their own.

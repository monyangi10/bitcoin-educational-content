question: Según la teoría del liberalismo económico, ¿cuál es la razón principal por la que las instituciones estatales estructuralmente no pueden impulsar la innovación?
answer: Los empleados del Estado carecen de iniciativa personal y de una remuneración proporcional ligada a los resultados de la innovación
wrong_answers:
  - Las instituciones públicas no disponen de fondos suficientes para financiar proyectos de investigación y desarrollo a gran escala
  - La burocracia gubernamental avanza con demasiada lentitud para adaptarse a la rápida evolución de las condiciones del mercado
  - Los monopolios estatales no se enfrentan a la presión de la competencia externa para motivar los esfuerzos de mejora continua
explanation: |
  El capítulo explica que las instituciones estatales no pueden innovar debido a su estructura fundamental basada en el empleo funcionarial. Los empleados públicos actúan con arreglo a normas predeterminadas, sin iniciativa personal ni remuneración ligada a la innovación. Todo se rige por normas, lo que no crea incentivos ni interés por la innovación. El propio sistema no está diseñado para la innovación, como ilustran los sistemas educativos nacionales que distribuyen los conocimientos existentes en lugar de mejorarlos. Esta limitación estructural significa que los Estados deben confiar en copiar las innovaciones de los sectores libres en lugar de generar las suyas propias.
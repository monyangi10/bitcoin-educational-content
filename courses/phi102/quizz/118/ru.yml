question: Согласно теории экономического либерализма, какова основная причина, по которой государственные институты структурно не могут стимулировать инновации?
answer: Государственным служащим не хватает личной инициативы и пропорционального вознаграждения, связанного с результатами инноваций
wrong_answers:
  - Государственные учреждения не имеют достаточного финансирования для поддержки масштабных проектов исследований и разработок
  - Государственная бюрократия движется слишком медленно, чтобы поспевать за быстро меняющимися условиями рынка
  - Государственные монополии не сталкиваются с внешним конкурентным давлением, мотивирующим к постоянному совершенствованию
explanation: |
  В главе объясняется, что государственные учреждения не могут внедрять инновации в силу своей фундаментальной структуры, основанной на работе на государственной службе. Государственные служащие действуют в рамках заранее установленных правил, не проявляя личной инициативы и не получая вознаграждения, связанного с инновациями. Все регулируется правилами, что не создает ни стимула, ни интереса к инновациям. Сама система не рассчитана на инновации, о чем свидетельствуют национальные системы образования, которые распространяют существующие знания, а не совершенствуют их. Это структурное ограничение означает, что государства вынуждены полагаться на копирование инноваций из свободных секторов, а не генерировать свои собственные.
question: 경제 자유주의 이론에 따르면, 국가 기관이 구조적으로 혁신을 주도할 수 없는 주된 이유는 무엇인가요?
answer: 주정부 직원들은 개인의 주도성과 혁신 성과에 비례한 보상이 부족합니다
wrong_answers:
  - 국가 기관은 대규모 연구 개발 프로젝트를 지원할 자금이 충분하지 않습니다
  - 정부 관료주의는 급변하는 시장 상황을 따라잡기에는 너무 느리게 움직입니다
  - 국가 독점 기업은 지속적인 개선 노력에 동기를 부여하는 외부 경쟁 압력에 직면하지 않습니다
explanation: |
  이 장에서는 공무원 고용에 기반한 국가 기관의 근본적인 구조 때문에 혁신이 불가능하다고 설명합니다. 공무원은 혁신과 관련된 개인적 주도권이나 보상 없이 정해진 규정 내에서 업무를 수행합니다. 모든 것이 규칙에 의해 지배되기 때문에 혁신에 대한 인센티브나 관심도 없습니다. 기존의 지식을 개선하기보다는 배포하는 국가 교육 시스템에서 알 수 있듯이 시스템 자체가 혁신을 위해 설계되지 않았습니다. 이러한 구조적 한계는 국가가 자체적으로 혁신을 창출하기보다는 자유 부문의 혁신을 모방하는 데 의존해야 한다는 것을 의미합니다.
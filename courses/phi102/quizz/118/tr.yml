question: Ekonomik liberalizm teorisine göre, devlet kurumlarının yapısal olarak inovasyonu teşvik edememesinin temel nedeni nedir?
answer: Devlet çalışanları kişisel inisiyatiften ve inovasyon sonuçlarına bağlı orantılı ücretlendirmeden yoksundur
wrong_answers:
  - Devlet kurumları büyük ölçekli araştırma ve geliştirme projelerini desteklemek için yeterli finansmana sahip değildir
  - Hükümet bürokrasisi hızla değişen piyasa koşullarına ayak uyduramayacak kadar yavaş hareket ediyor
  - Devlet tekelleri, sürekli iyileştirme çabalarını motive edecek dış rekabet baskısıyla karşılaşmaz
explanation: |
  Bu bölüm, devlet kurumlarının kamu hizmeti istihdamına dayalı temel yapıları nedeniyle yenilik yapamadıklarını açıklamaktadır. Kamu çalışanları, kişisel inisiyatif ya da inovasyona bağlı tazminat olmaksızın önceden belirlenmiş düzenlemeler dahilinde faaliyet göstermektedir. Her şey kurallara tabidir ve bu da inovasyon için ne teşvik ne de ilgi yaratır. Mevcut bilgiyi geliştirmek yerine dağıtan ulusal eğitim sistemlerinin de gösterdiği gibi, sistemin kendisi inovasyon için tasarlanmamıştır. Bu yapısal sınırlama, devletlerin kendi inovasyonlarını üretmek yerine serbest sektörlerden gelen inovasyonları kopyalamaya bel bağlaması anlamına gelmektedir.
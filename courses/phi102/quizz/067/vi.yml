question: Theo văn bản, nghịch lý nào tồn tại giữa an ninh và tiến bộ kinh tế?
answer: An ninh vừa là điều kiện tiên quyết cho sự phát triển, vừa là hệ quả của sự phát triển đó.
wrong_answers:
  - An ninh luôn chỉ đạt được sau khi quá trình phát triển kinh tế hoàn tất.
  - Sự phát triển kinh tế đương nhiên sẽ loại bỏ nhu cầu về các biện pháp an ninh.
  - An ninh và tiến bộ kinh tế hoàn toàn độc lập với nhau.
explanation: |
  Chương này giải thích rằng an ninh và tiến bộ kinh tế tạo ra một mối quan hệ nghịch lý: an ninh là cần thiết trước khi phát triển có thể diễn ra (bạn không thể đổi mới hoặc đầu tư dài hạn nếu thiếu nó), nhưng bạn cũng cần thặng dư kinh tế từ sản xuất để tài trợ cho các thể chế cung cấp an ninh. Điều này tạo ra một chu kỳ khó khăn khi bắt đầu, nhưng một khi đã bắt đầu, nó sẽ tự củng cố. Các câu trả lời khác đều sai vì chúng cho rằng đó là mối quan hệ một chiều đơn giản hoặc sự độc lập, thay vì sự phụ thuộc lẫn nhau phức tạp này.
question: Dukurikije ico canditswe, ni igiki gihushanye kiri hagati y’umutekano n’iterambere ry’ubutunzi?
answer: Umutekano ni ikintu gikenewe kugira ngo umuntu atere imbere kandi ni ingaruka zayo .
wrong_answers:
  - Umutekano wama uza inyuma y'iterambere ry'ubutunzi .
  - Iterambere ry'ubutunzi rirakuraho mu bisanzwe ivy'uko hakenewe ingingo zo gucungera umutekano .
  - Umutekano n'iterambere ry'ubutunzi biratandukanye rwose .
explanation: |
  Ico gice gisigura ko umutekano n’iterambere ry’ubutunzi bitera ubucuti buteye ubwoba: umutekano urakenewe imbere y’uko iterambere rishobora kubaho (ntushobora gukora ibintu bishasha canke gushiramwo amahera y’igihe kirekire ataco ufise), ariko kandi urakeneye amasaranganya y’ubutunzi ava mu bikorwa kugira ngo ushobore gufasha inzego zitanga umutekano. Ivyo bituma haba uruziga rugoye gutangura, ariko iyo rumaze gutangura, ruca ruca rwikomeza. Ibindi bisubizo ni bibi kuko bitanga iciyumviro c’ubucuti bworoshe bw’inzira imwe canke ubwigenge, aho gutanga iciyumviro c’ukwo kwifatanya gukomeye.
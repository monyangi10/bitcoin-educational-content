question: Според текста какъв парадокс съществува между сигурността и икономическия прогрес?
answer: Сигурността е както предпоставка за развитие, така и негова последица
wrong_answers:
  - Сигурността винаги идва след постигането на икономическо развитие
  - Икономическият напредък естествено премахва необходимостта от мерки за сигурност
  - Сигурността и икономическият напредък са напълно независими един от друг
explanation: |
  В тази глава се обяснява, че сигурността и икономическият напредък създават парадоксална връзка: сигурността е необходима, за да може да се осъществи развитие (без нея не могат да се правят дългосрочни иновации или инвестиции), но е необходим и икономически излишък от производството, за да се финансират институциите, които осигуряват сигурността. Това създава труден за започване цикъл, но веднъж започнат, той се самоподсилва. Другите отговори са грешни, защото предполагат проста еднопосочна връзка или независимост, а не тази сложна взаимозависимост.
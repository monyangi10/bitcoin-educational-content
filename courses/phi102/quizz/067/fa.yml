question: بر اساس متن، چه پارادوکسی بین امنیت و پیشرفت اقتصادی وجود دارد؟
answer: امنیت هم پیش‌نیاز توسعه است و هم نتیجه آن
wrong_answers:
  - امنیت همیشه پس از دستیابی به توسعه اقتصادی حاصل می‌شود
  - پیشرفت اقتصادی به طور طبیعی نیاز به اقدامات امنیتی را از بین می‌برد.
  - امنیت و پیشرفت اقتصادی کاملاً مستقل از یکدیگر هستند
explanation: |
  این فصل توضیح می‌دهد که امنیت و پیشرفت اقتصادی یک رابطه پارادوکسیکال ایجاد می‌کنند: امنیت قبل از توسعه لازم است (بدون آن نمی‌توانید نوآوری یا سرمایه‌گذاری بلندمدت کنید)، اما همچنین به مازاد اقتصادی از تولید نیاز دارید تا نهادهایی که امنیت را فراهم می‌کنند، تأمین مالی کنید. این یک چرخه دشوار برای شروع ایجاد می‌کند، اما وقتی آغاز شد، به خودی خود تقویت می‌شود. پاسخ‌های دیگر اشتباه هستند زیرا یک رابطه ساده یک‌طرفه یا استقلال را پیشنهاد می‌کنند، نه این وابستگی متقابل پیچیده.
question: 본문에 따르면 안보와 경제 발전 사이에는 어떤 역설이 존재하나요?
answer: 보안은 개발의 전제 조건이자 개발의 결과입니다
wrong_answers:
  - 보안은 항상 경제 발전이 이루어진 후에 이루어집니다
  - 경제 발전은 자연스럽게 보안 조치의 필요성을 없애줍니다
  - 보안과 경제 발전은 서로 완전히 독립적입니다
explanation: |
  이 장에서는 안보와 경제 발전은 역설적인 관계를 형성한다고 설명합니다. 즉, 안보가 없으면 혁신이나 장기 투자가 불가능하기 때문에 발전이 이루어지기 위해서는 안보가 필요하지만, 안보를 제공하는 기관에 자금을 지원하려면 생산에서 발생하는 경제적 잉여가 필요하다는 것이죠. 이 사이클은 시작하기는 어렵지만 일단 시작되면 스스로 강화됩니다. 다른 답은 이러한 복잡한 상호 의존이 아닌 단순한 단방향 관계 또는 독립성을 제시하기 때문에 틀린 답입니다.
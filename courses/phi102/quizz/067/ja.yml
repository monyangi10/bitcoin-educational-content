question: 本文によれば、安全保障と経済発展の間にはどのようなパラドックスが存在するのか？
answer: 安全保障は発展の前提条件であると同時に、発展の結果でもある。
wrong_answers:
  - 安全保障は常に経済発展が達成された後にもたらされる
  - 経済の進歩は、安全保障措置の必要性を自然に排除する
  - 安全保障と経済の進歩は、互いに完全に独立している
explanation: |
  この章では、安全保障と経済的進歩が逆説的な関係を生み出していることを説明している。安全保障は開発の前に必要であり（安全保障がなければ技術革新や長期投資ができない）、安全保障を提供する制度に資金を供給するためには生産による経済的余剰も必要である。しかし、安全保障を提供する制度に資金を供給するためには、生産による経済的余剰も必要なのである。このような循環を始めるのは難しいが、いったん始まれば自己強化につながる。他の答えが間違っているのは、この複雑な相互依存関係ではなく、単純な一方通行の関係や独立性を示唆しているからである。
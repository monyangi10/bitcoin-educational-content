question: Čím se podle francouzské liberální tradice liší definice svobody Charlese Comta od jiných liberálních definic, které předložili Yves Guyot a Paul Leroy-Beaulieu?
answer: Comte zdůrazňuje společenský rozměr tím, že definuje svobodu jako absenci překážek ze strany jiných lidí při rozvíjení své bytosti a uplatňování nevinných schopností
wrong_answers:
  - Comte se zaměřil na ekonomický rozměr a definoval svobodu jako neomezené právo hromadit soukromý majetek a nakládat s ním bez vnějších zásahů
  - "Comte zdůrazňuje politický rozměr tím, že definuje svobodu jako účast občana na demokratických rozhodovacích procesech v ústavních rámcích."
  - "Comte zdůrazňuje morální rozměr tím, že definuje svobodu jako povinnost jednotlivce provádět racionální volbu v souladu s principy přirozeného práva."
explanation: |
  Definice Charlese Comta se konkrétně zabývá mezilidským aspektem svobody a zaměřuje se na to, aby ostatní lidé ("ses semblables") nevytvářeli překážky pro legitimní rozvoj a výkon schopností. Zatímco Guyot klade důraz na sebevlastnictví a vlastnická práva a Leroy-Beaulieu odlišuje svobodu od bezpečnosti a bezrizikovosti, Comte jedinečným způsobem rámuje svobodu z hlediska společenských vztahů a nepřítomnosti lidských zásahů do nevinných činností. Tato sociální perspektiva doplňuje, ale liší se od individualističtějšího rámce založeného na vlastnictví nebo na akceptaci rizika ostatních liberálních myslitelů.
question: 根据法国自由主义传统，夏尔-孔德对自由的定义与伊夫-居约（Yves Guyot）和保罗-勒罗瓦-博略（Paul Leroy-Beaulieu）提出的其他自由主义定义有何不同？
answer: 孔德强调了社会层面，他将自由定义为在发展个人存在和行使天真能力时不受他人的阻碍
wrong_answers:
  - 孔德将自由定义为不受外界干扰地积累和处置私有财产的无限权利，从而将重点放在了经济层面上
  - "孔德强调政治层面，将自由定义为公民在宪法框架内参与民主决策过程"。
  - "孔德将自由定义为个人根据自然法原则进行理性选择的义务，从而突出了道德层面"。
explanation: |
  夏尔-孔德的定义特别涉及自由的人际关系方面，侧重于其他人（'ses semblables'）如何不对一个人的合法发展和能力行使造成障碍。居约（Guyot）强调自我所有权和财产权，勒鲁瓦-博略（Leroy-Beaulieu）将自由与安全和无风险结果区分开来，而孔德则独特地从社会关系和人不干涉无辜活动的角度来界定自由。这种社会视角补充了其他自由主义思想家以财产为基础或以风险接受为基础的个人主义框架，但又与之不同。
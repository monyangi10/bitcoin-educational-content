question: طبق سنت لیبرال فرانسوی، چه چیزی تعریف آزادی چارلز کومته را از دیگر تعاریف لیبرالی ارائه شده توسط ایو گیو و پل لروی-بالیو متمایز می‌کند؟
answer: کنت بر بُعد اجتماعی تأکید می‌کند و آزادی را به عنوان عدم وجود موانع از سوی دیگران در توسعه وجود فرد و اعمال استعدادهای بی‌گناه تعریف می‌کند.
wrong_answers:
  - کنت بر بُعد اقتصادی تمرکز می‌کند و آزادی را به عنوان حق نامحدود برای انباشت و تصرف دارایی خصوصی بدون دخالت خارجی تعریف می‌کند.
  - "کنت بر بُعد سیاسی تأکید می‌کند و آزادی را به‌عنوان مشارکت شهروند در فرآیندهای تصمیم‌گیری دموکراتیک در چارچوب‌های قانون اساسی تعریف می‌کند"
  - "کنت بُعد اخلاقی را با تعریف آزادی به‌عنوان وظیفه فرد در اعمال انتخاب عقلانی مطابق با اصول قانون طبیعی برجسته می‌کند"
explanation: |
  تعریف چارلز کومته به‌طور خاص به جنبه بین‌فردی آزادی می‌پردازد و بر این نکته تمرکز دارد که چگونه دیگران ('ses semblables') نباید مانعی برای توسعه مشروع و اعمال قابلیت‌های فرد ایجاد کنند. در حالی که گیو بر مالکیت شخصی و حقوق مالکیت تأکید دارد و لروی-بولو آزادی را از امنیت و نتایج بدون ریسک متمایز می‌کند، کومته به‌طور منحصربه‌فردی آزادی را از نظر روابط اجتماعی و عدم دخالت انسانی در فعالیت‌های بی‌گناه چارچوب‌بندی می‌کند. این دیدگاه اجتماعی مکمل اما متفاوت از چارچوب‌های مبتنی بر مالکیت فردی یا پذیرش ریسک دیگر متفکران لیبرال است.
question: Dushingiye ku migenzo y’ubwigenge bw’Abafaransa, ni igiki gitandukanya insobanuro ya Charles Comte y’umwidegemvyo n’izindi nsobanuro z’ubwigenge zashikirijwe na Yves Guyot na Paul Leroy-Beaulieu?
answer: Comte ashimika ku rugero rw’imibano mu gusobanura umwidegemvyo nk’ukutagira intambamyi zivuye ku bandi bantu mu guteza imbere ubuzima bw’umuntu no gukoresha ubushobozi bw’inzirakarengane .
wrong_answers:
  - Comte yibanda ku rugero rw’ubutunzi mu gusobanura umwidegemvyo nk’uburenganzira butagira aho bugarukira bwo kwirundanira no gukoresha umutungo w’umuntu ku giti ciwe ata n’umwe abigiramwo uruhara .
  - "Comte ashimika ku rugero rwa politike mu gusobanura umwidegemvyo nk'uruhara rw'umwenegihugu mu gufata ingingo za demokarasi mu rwego rw'itegeko nshinga".
  - "Comte ashira ahabona urugero rw'inyifato runtu mu gusobanura umwidegemvyo nk'inshingano y'umuntu ku giti ciwe yo guhitamwo bishingiye ku ngingo ngenderwako z'amategeko kavukire"
explanation: |
  Insobanuro ya Charles Comte ivuga cane cane ku ruhande rw’umwidegemvyo hagati y’abantu, yibanda ku kuntu abandi bantu (‘ses semblables’) badakwiye kurema intambamyi ku bijanye n’iterambere ry’umuntu n’ugukoresha ubushobozi bwiwe mu buryo bubereye. Naho Guyot ashimika ku kwitunga no kuronka uburenganzira bw’itunga, Leroy-Beaulieu na we agatandukanya umwidegemvyo n’umutekano n’ingaruka zitagira ingorane, Comte we ashiraho umwidegemvyo mu buryo budasanzwe mu bijanye n’imigenderanire y’abantu no kutagira umuntu yivanga mu bikorwa vy’inzirakarengane. Ukwo kubona ibintu mu kibano kurashigikira ariko gutandukanye n’imirongo y’abandi biyumvira b’abanyagihugu ishingiye ku mutungo canke kwemera ingorane.
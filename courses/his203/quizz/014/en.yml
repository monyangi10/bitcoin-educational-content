question: What advertising platform did Erik Voorhees and Ira Miller launch in November 2011 to promote content on Twitter using Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds was an advertising platform launched on November 23, 2011 by Erik Voorhees and Ira Miller. The FeedZeBirds advertising platform allowed users to pay in bitcoins to showcase content on Twitter by buying retweets. BitMunchies was an online food store created by Ira Miller in May 2011, BTCinch was a payment processor developed in the summer of 2011, and Coinapult was an email remittance service developed later by the two partners.

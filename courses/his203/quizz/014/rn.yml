question: Ni uruhe rubuga rwo kwamamaza Erik Voorhees na Ira Miller batanguje mu kwezi kwa 11/2011 kugira ngo bamenyekanishe ibirimwo kuri Twitter bakoresheje Bitcoin?
answer: Gaburira Inyoni
wrong_answers:
  - Coingutera
  - GW-inci 2
  - BitMunchies
explanation: |
 FeedZeBirds yari urubuga rwo kwamamaza rwatangujwe ku wa 23 Ugushyingo 2011 na Erik Voorhees na Ira Miller. Urubuga rwo kwamamaza rwa FeedZeBirds rwatumye abarukoresha bariha
 mu bitcoins kugira ngo yerekane ibirimwo kuri Twitter mu kugura ama retweets. BitMunchies yari iduka ry’ibifungurwa ryo kuri internet ryashinzwe na Ira Miller muri Rusama 2011, BTCinch yari 
 processor yo kwishura yateguwe mu ci ca 2011, kandi Coinapult yari igikorwa co kohereza amahera kuri email categuwe mu nyuma n’abo babiri bafatanya.
reviewed: true
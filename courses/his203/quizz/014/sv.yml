question: Vilken annonsplattform lanserade Erik Voorhees och Ira Miller i november 2011 för att marknadsföra innehåll på Twitter med hjälp av Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTC tum
  - BitMunchies
explanation: |
 FeedZeBirds var en annonsplattform som lanserades den 23 november 2011 av Erik Voorhees och Ira Miller. FeedZeBirds annonseringsplattform tillät användare att betala
 i bitcoins för att visa upp innehåll på Twitter genom att köpa retweets. BitMunchies var en matbutik på nätet som skapades av Ira Miller i maj 2011, BTCinch var en
 betalningsprocessor som utvecklades under sommaren 2011 och Coinapult var en tjänst för överföring via e-post som utvecklades senare av de två partnerna.
reviewed: true
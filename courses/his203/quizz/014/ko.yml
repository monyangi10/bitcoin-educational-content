question: 2011년 11월에 에릭 부어히스와 아이라 밀러가 Bitcoin을 사용하여 트위터에서 콘텐츠를 홍보하기 위해 출시한 광고 플랫폼은 무엇인가요?
answer: FeedZeBirds
wrong_answers:
  - Coin어펄트
  - BTC인치
  - 비트 뭉치
explanation: |
 FeedZeBirds는 2011년 11월 23일 에릭 부어히스와 아이라 밀러가 출시한 광고 플랫폼입니다. 피드제버즈 광고 플랫폼은 사용자가 비트코인으로 결제할 수 있도록 허용했습니다
 리트윗을 구매하여 트위터에 콘텐츠를 노출할 수 있는 플랫폼입니다. 비트먼치스는 2011년 5월에 아이라 밀러가 만든 온라인 식품 스토어였고, BTC인치는
 2011년 여름에 개발된 결제 프로세서이며, Coinapult는 나중에 두 파트너가 개발한 이메일 송금 서비스입니다.
reviewed: true
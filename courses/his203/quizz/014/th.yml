question: แพลตฟอร์มโฆษณาใดที่ Erik Voorhees และ Ira Miller เปิดตัวในเดือนพฤศจิกายน 2011 เพื่อโปรโมทเนื้อหาบน Twitter โดยใช้ Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCนิ้ว
  - บิทมันชี่ส์
explanation: |
 FeedZeBirds เป็นแพลตฟอร์มโฆษณาที่เปิดตัวเมื่อวันที่ 23 พฤศจิกายน 2011 โดย Erik Voorhees และ Ira Miller แพลตฟอร์มโฆษณา FeedZeBirds อนุญาตให้ผู้ใช้จ่ายด้วยบิตคอยน์เพื่อแสดงเนื้อหาบน Twitter โดยการซื้อรีทวีต BitMunchies เป็นร้านค้าอาหารออนไลน์ที่สร้างขึ้นโดย Ira Miller ในเดือนพฤษภาคม 2011, BTCinch เป็นโปรเซสเซอร์การชำระเงินที่พัฒนาขึ้นในช่วงฤดูร้อนของปี 2011 และ Coinapult เป็นบริการโอนเงินทางอีเมลที่พัฒนาขึ้นในภายหลังโดยสองหุ้นส่วนนี้
reviewed: true
question: Welk advertentieplatform lanceerden Erik Voorhees en Ira Miller in november 2011 om inhoud op Twitter te promoten met behulp van Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds was een advertentieplatform dat op 23 november 2011 werd gelanceerd door Erik Voorhees en Ira Miller. Het FeedZeBirds advertentieplatform stelde gebruikers in staat om te betalen
 in bitcoins om inhoud op Twitter onder de aandacht te brengen door retweets te kopen. BitMunchies was een online voedselwinkel die in mei 2011 werd opgericht door Ira Miller, BTCinch was een
 betalingsverwerker die in de zomer van 2011 werd ontwikkeld, en Coinapult was een dienst voor het overmaken van e-mails die later door de twee partners werd ontwikkeld.
reviewed: true
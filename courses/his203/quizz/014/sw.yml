question: Ni jukwaa gani la matangazo ambalo Erik Voorhees na Ira Miller walizindua mnamo Novemba 2011 ili kutangaza maudhui kwenye Twitter kwa kutumia Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinchi
  - BitMunchies
explanation: |
 FeedZeBirds ilikuwa jukwaa la matangazo lililozinduliwa mnamo Novemba 23, 2011 na Erik Voorhees na Ira Miller. Jukwaa la matangazo la FeedZeBirds liliruhusu watumiaji kulipa
 katika bitcoins ili kuonyesha maudhui kwenye Twitter kwa kununua retweet. BitMunchies ilikuwa duka la chakula mtandaoni lililoundwa na Ira Miller mnamo Mei 2011, BTCinch ilikuwa
 kichakataji cha malipo kilichotengenezwa katika msimu wa joto wa 2011, na Coinapult ilikuwa huduma ya kutuma pesa kwa barua pepe iliyotengenezwa baadaye na washirika hao wawili.
reviewed: true
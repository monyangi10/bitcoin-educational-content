question: Erik Voorhees và Ira Miller đã ra mắt nền tảng quảng cáo nào vào tháng 11 năm 2011 để quảng bá nội dung trên Twitter bằng cách sử dụng Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Máy phóng Coin
  - BTC inch
  - BitMunchies
explanation: |
 FeedZeBirds là một nền tảng quảng cáo được Erik Voorhees và Ira Miller ra mắt vào ngày 23 tháng 11 năm 2011. Nền tảng quảng cáo FeedZeBirds cho phép người dùng trả tiền bằng bitcoin để hiển thị nội dung trên Twitter bằng cách mua lượt retweet. BitMunchies là một cửa hàng thực phẩm trực tuyến do Ira Miller tạo ra vào tháng 5 năm 2011, BTCinch là một bộ xử lý thanh toán được phát triển vào mùa hè năm 2011, và Coinapult là một dịch vụ chuyển tiền qua email được hai đối tác phát triển sau đó.
reviewed: true
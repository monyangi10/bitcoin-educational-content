question: Erik Voorhees 和 Ira Miller 于 2011 年 11 月推出了什么广告平台，利用 Bitcoin 在 Twitter 上推广内容？
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTC 英寸
  - BitMunchies
explanation: |
 FeedZeBirds 是埃里克-沃里斯（Erik Voorhees）和艾拉-米勒（Ira Miller）于 2011 年 11 月 23 日推出的一个广告平台。FeedZeBirds 广告平台允许用户以比特币支付
 比特币，通过购买转发在 Twitter 上展示内容。BitMunchies 是艾拉-米勒于 2011 年 5 月创建的一家在线食品商店，BTCinch 是一个
 支付处理器，Coinapult 是两个合作伙伴后来开发的电子邮件汇款服务。
reviewed: true
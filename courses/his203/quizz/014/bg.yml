question: Каква рекламна платформа стартираха Ерик Воорхийс и Айра Милър през ноември 2011 г. за популяризиране на съдържание в Twitter с помощта на Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds е рекламна платформа, стартирана на 23 ноември 2011 г. от Ерик Воорхийс и Айра Милър. Рекламната платформа FeedZeBirds позволява на потребителите да плащат
 в биткойни, за да представят съдържание в Twitter, като купуват ретуитове. BitMunchies е онлайн магазин за храни, създаден от Айра Милър през май 2011 г., BTCinch е
 платежен процесор, разработен през лятото на 2011 г., а Coinapult беше услуга за електронни парични преводи, разработена по-късно от двамата партньори.
reviewed: true
question: Welche Werbeplattform haben Erik Voorhees und Ira Miller im November 2011 ins Leben gerufen, um Inhalte auf Twitter mit Bitcoin zu bewerben?
answer: FeedZeBirds
wrong_answers:
  - Coin-Schleuder
  - BTCZoll
  - BitMunchies
explanation: |
 FeedZeBirds war eine Werbeplattform, die am 23. November 2011 von Erik Voorhees und Ira Miller gegründet wurde. Die FeedZeBirds-Werbeplattform ermöglichte es Nutzern, in Bitcoins zu zahlen
 in Bitcoins bezahlen, um Inhalte auf Twitter zu präsentieren, indem sie Retweets kaufen. BitMunchies war ein Online-Lebensmittelgeschäft, das von Ira Miller im Mai 2011 gegründet wurde, BTCinch war ein
 zahlungsprozessor, der im Sommer 2011 entwickelt wurde, und Coinapult war ein E-Mail-Überweisungsdienst, der später von den beiden Partnern entwickelt wurde.
reviewed: true
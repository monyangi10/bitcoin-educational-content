question: Hvilken annonseringsplattform lanserte Erik Voorhees og Ira Miller i november 2011 for å markedsføre innhold på Twitter ved hjelp av Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTC tommer
  - BitMunchies
explanation: |
 FeedZeBirds var en annonseplattform som ble lansert 23. november 2011 av Erik Voorhees og Ira Miller. FeedZeBirds-annonseringsplattformen tillot brukere å betale
 i bitcoins for å vise frem innhold på Twitter ved å kjøpe retweets. BitMunchies var en nettbasert matbutikk opprettet av Ira Miller i mai 2011, BTCinch var en
 betalingsbehandler som ble utviklet sommeren 2011, og Coinapult var en e-postoverføringstjeneste som ble utviklet senere av de to partnerne.
reviewed: true
question: Koji reklamni platform su Erik Voorhees i Ira Miller pokrenuli u novembru 2011. godine za promociju sadržaja na Twitteru koristeći Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds je bila platforma za oglašavanje pokrenuta 23. novembra 2011. godine od strane Erika Vorhisa i Ire Milera. FeedZeBirds platforma za oglašavanje omogućavala je korisnicima da plaćaju u bitkoinima kako bi prikazali sadržaj na Tviteru kupovinom retvitova. BitMunchies je bila online prodavnica hrane koju je kreirao Ira Miler u maju 2011. godine, BTCinch je bio procesor plaćanja razvijen tokom leta 2011. godine, a Coinapult je bila usluga za slanje novca putem emaila koju su kasnije razvila dva partnera.
reviewed: true
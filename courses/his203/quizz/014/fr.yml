question: Quelle plateforme publicitaire ont lancé Erik Voorhees et Ira Miller en novembre 2011 pour promouvoir du contenu sur Twitter en utilisant Bitcoin ?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds était une plateforme publicitaire lancée le 23 novembre 2011 par Erik Voorhees et Ira Miller. La plateforme publicitaire FeedZeBirds permettait de payer en bitcoins pour mettre en avant un contenu sur Twitter en achetant des retweets. BitMunchies était un magasin en ligne de nourriture créé par Ira Miller en mai 2011, BTCinch était un processeur de paiement développé pendant l'été 2011, et Coinapult était un service d'envoi de fonds par e-mail développé plus tard par les deux associés.
reviewed: false

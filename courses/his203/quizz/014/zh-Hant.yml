question: Erik Voorhees 和 Ira Miller 於 2011 年 11 月推出了什麼廣告平台，使用 Bitcoin 在 Twitter 上宣傳內容？
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds 是 Erik Voorhees 和 Ira Miller 於 2011 年 11 月 23 日推出的廣告平台。FeedZeBirds 廣告平台允許用戶以比特幣支付
 比特幣在 Twitter 上購買轉發來展示內容。BitMunchies 是 Ira Miller 在 2011 年 5 月創建的線上食品商店，BTCinch 是一個
 支付處理器，而 Coinapult 則是兩位合作夥伴後來開發的電子郵件匯款服務。
reviewed: true
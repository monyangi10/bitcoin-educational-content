question: ¿Qué plataforma publicitaria lanzaron Erik Voorhees e Ira Miller en noviembre de 2011 para promocionar contenidos en Twitter mediante Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTC pulgadas
  - BitMunchies
explanation: |
 FeedZeBirds fue una plataforma publicitaria lanzada el 23 de noviembre de 2011 por Erik Voorhees e Ira Miller. La plataforma publicitaria FeedZeBirds permitía a los usuarios pagar
 en bitcoins para mostrar contenidos en Twitter mediante la compra de retweets. BitMunchies era una tienda online de alimentación creada por Ira Miller en mayo de 2011, BTCinch era un
 procesador de pagos desarrollado en el verano de 2011, y Coinapult era un servicio de envío de remesas por correo electrónico desarrollado posteriormente por los dos socios.
reviewed: true
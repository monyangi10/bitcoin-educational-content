question: Platform periklanan apa yang diluncurkan oleh Erik Voorhees dan Ira Miller pada bulan November 2011 untuk mempromosikan konten di Twitter menggunakan Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Pelontar Coin
  - BTC inci
  - BitMunchies
explanation: |
 FeedZeBirds adalah sebuah platform periklanan yang diluncurkan pada tanggal 23 November 2011 oleh Erik Voorhees dan Ira Miller. Platform periklanan FeedZeBirds memungkinkan pengguna untuk membayar
 dalam bitcoin untuk menampilkan konten di Twitter dengan membeli retweet. BitMunchies adalah toko makanan online yang dibuat oleh Ira Miller pada bulan Mei 2011, BTCinch adalah
 prosesor pembayaran yang dikembangkan pada musim panas 2011, dan Coinapult adalah layanan pengiriman uang melalui email yang dikembangkan kemudian oleh kedua mitra tersebut.
reviewed: true
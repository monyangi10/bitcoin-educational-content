question: Jaką platformę reklamową uruchomili Erik Voorhees i Ira Miller w listopadzie 2011 r. w celu promowania treści na Twitterze za pomocą Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTC cale
  - BitMunchies
explanation: |
 FeedZeBirds to platforma reklamowa uruchomiona 23 listopada 2011 r. przez Erika Voorheesa i Irę Millera. Platforma reklamowa FeedZeBirds pozwalała użytkownikom płacić
 w bitcoinach za prezentowanie treści na Twitterze poprzez kupowanie retweetów. BitMunchies był internetowym sklepem spożywczym stworzonym przez Irę Millera w maju 2011 r., BTCinch był procesorem płatności
 gW-4inch był procesorem płatności opracowanym latem 2011 r., a Coinapult był usługą przekazów e-mail opracowaną później przez dwóch partnerów.
reviewed: true
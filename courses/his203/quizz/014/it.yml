question: Quale piattaforma pubblicitaria hanno lanciato Erik Voorhees e Ira Miller nel novembre 2011 per promuovere contenuti su Twitter utilizzando Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds è una piattaforma pubblicitaria lanciata il 23 novembre 2011 da Erik Voorhees e Ira Miller. La piattaforma pubblicitaria FeedZeBirds consentiva agli utenti di pagare in bitcoin
 in bitcoin per mostrare contenuti su Twitter acquistando retweet. BitMunchies era un negozio di alimentari online creato da Ira Miller nel maggio 2011, BTCinch era un processore di pagamento sviluppato nell'estate 2011
 gW-4inch era un processore di pagamenti sviluppato nell'estate del 2011, mentre Coinapult era un servizio di rimesse via e-mail sviluppato successivamente dai due partner.
reviewed: true
question: Какую рекламную платформу Эрик Вурхис и Айра Миллер запустили в ноябре 2011 года для продвижения контента в Twitter с помощью Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - BitMunchies
explanation: |
 FeedZeBirds - рекламная платформа, запущенная 23 ноября 2011 года Эриком Вурхисом и Айрой Миллером. Рекламная платформа FeedZeBirds позволяла пользователям платить
 биткоинами за демонстрацию контента в Twitter путем покупки ретвитов. BitMunchies - интернет-магазин продуктов питания, созданный Айрой Миллером в мае 2011 года, BTCinch - платежный процессор, разработанный летом 2011 года
 платежный процессор, созданный летом 2011 года, а Coinapult - сервис денежных переводов по электронной почте, разработанный двумя партнерами позже.
reviewed: true
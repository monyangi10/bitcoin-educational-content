question: Que plataforma de publicidade foi lançada por Erik Voorhees e Ira Miller em novembro de 2011 para promover conteúdos no Twitter utilizando o Bitcoin?
answer: FeedZeBirds
wrong_answers:
  - Coinapulta
  - BTCpolegadas
  - BitMunchies
explanation: |
 FeedZeBirds foi uma plataforma de publicidade lançada em 23 de novembro de 2011 por Erik Voorhees e Ira Miller. A plataforma de publicidade FeedZeBirds permitia aos utilizadores pagar
 em bitcoins para apresentar conteúdos no Twitter através da compra de retweets. A BitMunchies era uma loja online de produtos alimentares criada por Ira Miller em maio de 2011, a BTCinch era um
 processador de pagamentos desenvolvido no verão de 2011, e o Coinapult era um serviço de remessas por correio eletrónico desenvolvido mais tarde pelos dois sócios.
reviewed: true
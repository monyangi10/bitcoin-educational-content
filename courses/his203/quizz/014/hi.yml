question: एरिक वूरहीस और इरा मिलर ने नवंबर 2011 में Bitcoin का उपयोग करके ट्विटर पर सामग्री को बढ़ावा देने के लिए कौन सा विज्ञापन प्लेटफॉर्म लॉन्च किया था?
answer: फीडज़ीबर्ड्स
wrong_answers:
  - Coinapult
  - BTC इंच
  - बिटमंचीज़
explanation: |
 FeedZeBirds एक विज्ञापन प्लेटफॉर्म था जिसे 23 नवंबर, 2011 को एरिक वूरहीस और इरा मिलर ने लॉन्च किया था। FeedZeBirds विज्ञापन प्लेटफॉर्म उपयोगकर्ताओं को रीट्वीट खरीदकर ट्विटर पर सामग्री प्रदर्शित करने के लिए बिटकॉइन में भुगतान करने की अनुमति देता था। BitMunchies एक ऑनलाइन फूड स्टोर था जिसे इरा मिलर ने मई 2011 में बनाया था, BTCinch एक भुगतान प्रोसेसर था जिसे 2011 की गर्मियों में विकसित किया गया था, और Coinapult एक ईमेल रेमिटेंस सेवा थी जिसे बाद में दोनों भागीदारों द्वारा विकसित किया गया था।
reviewed: true
question: چه پلتفرم تبلیغاتی را اریک وورهیس و ایرا میلر در نوامبر ۲۰۱۱ برای ترویج محتوا در توییتر با استفاده از Bitcoin راه‌اندازی کردند؟
answer: FeedZeBirds
wrong_answers:
  - Coinapult
  - BTCinch
  - بیت‌مانچیز
explanation: |
 FeedZeBirds یک پلتفرم تبلیغاتی بود که در 23 نوامبر 2011 توسط اریک وورهیس و ایرا میلر راه‌اندازی شد. پلتفرم تبلیغاتی FeedZeBirds به کاربران اجازه می‌داد تا با پرداخت بیت‌کوین، محتوا را در توییتر با خرید ریتوییت به نمایش بگذارند. BitMunchies یک فروشگاه آنلاین مواد غذایی بود که توسط ایرا میلر در ماه مه 2011 ایجاد شد، BTCinch یک پردازشگر پرداخت بود که در تابستان 2011 توسعه یافت و Coinapult یک سرویس حواله ایمیل بود که بعداً توسط این دو شریک توسعه یافت.
reviewed: true
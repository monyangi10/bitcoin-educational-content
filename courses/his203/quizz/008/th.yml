question: ประเทศในเอเชียตะวันออกประเทศใดที่ Mark Karpelès ย้ายไปในเดือนมิถุนายน 2009 เนื่องจากความสนใจในวัฒนธรรมท้องถิ่น?
answer: ในญี่ปุ่น
wrong_answers:
  - ในประเทศจีน
  - ในเกาหลีใต้
  - ในสิงคโปร์
explanation: |
 ในฐานะที่เป็นคนคลั่งไคล้ที่มีความสนใจในวิดีโอเกมและมังงะ Mark Karpelès ชื่นชมวัฒนธรรมญี่ปุ่น เขาไม่รู้สึกเหมือนอยู่บ้านในฝรั่งเศส จึงตัดสินใจย้ายถิ่นฐานไปยังดินแดนอาทิตย์อุทัยในปี 2009
reviewed: true
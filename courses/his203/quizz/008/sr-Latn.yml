question: Koju dalekoistočnu zemlju je Mark Karpelès preselio u junu 2009. zbog interesovanja za lokalnu kulturu?
answer: U Japanu
wrong_answers:
  - U Kini
  - U Južnoj Koreji
  - U Singapuru
explanation: |
 Kao štreber sa interesovanjem za video igre i mangu, Mark Karpelès je cenio japansku kulturu. Nije se osećao kao kod kuće u Francuskoj, pa je odlučio da emigrira u Zemlju izlazećeg sunca 2009. godine.
reviewed: true
question: स्थानीय संस्कृति में रुचि के कारण मार्क कार्पेल्स जून 2009 में किस सुदूर पूर्वी देश में चले गए थे?
answer: जापान में
wrong_answers:
  - चाइना में
  - दक्षिण कोरिया में
  - सिंगापुर में
explanation: |
 वीडियो गेम और मंगा में रुचि रखने वाले एक शौकीन व्यक्ति के रूप में, मार्क कार्पेल्स जापानी संस्कृति की सराहना करते थे। उन्हें फ्रांस में घर जैसा महसूस नहीं होता था, इसलिए उन्होंने 2009 में जापान में बसने का फैसला किया।
reviewed: true
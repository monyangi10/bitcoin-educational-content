question: Dans quel pays d'Extrême-Orient Mark Karpelès s'est-il installé en juin 2009 par attrait pour la culture locale ?
answer: Au Japon
wrong_answers:
  - En Chine
  - En Corée du Sud
  - À Singapour
explanation: |
 En tant que geek s'intéressant aux jeux vidéos et aux mangas, Mark Karpelès appréciait la culture japonaise. Il ne se sentait pas chez lui en France, et a donc décidé d'émigrer au pays du soleil levant en 2009.
reviewed: false

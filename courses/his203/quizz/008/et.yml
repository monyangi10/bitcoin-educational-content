question: Millisesse Kaug-Ida riiki kolis Mark Karpelès 2009. aasta juunis kohaliku kultuuri vastu huvi tundes?
answer: Jaapanis
wrong_answers:
  - Hiinas
  - Lõuna-Koreas
  - Singapuris
explanation: |
 Mark Karpelès on videomängude ja mangade vastu huvi tundev geek, kes hindas Jaapani kultuuri kõrgelt. Ta ei tundnud end Prantsusmaal koduselt, mistõttu otsustas ta emigreeruda Prantsusmaale
 tõusva päikese maale 2009. aastal.
reviewed: true
question: В какую дальневосточную страну Марк Карпелес переехал в июне 2009 года из интереса к местной культуре?
answer: В Японии
wrong_answers:
  - В Китае
  - В Южной Корее
  - В Сингапуре
explanation: |
 Будучи гиком, увлекающимся видеоиграми и мангой, Марк Карпелес ценил японскую культуру. Он не чувствовал себя как дома во Франции и решил эмигрировать в
 страну восходящего солнца в 2009 году.
reviewed: true
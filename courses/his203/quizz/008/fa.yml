question: مارک کارپلس در ژوئن 2009 به کدام کشور شرق دور به دلیل علاقه به فرهنگ محلی نقل مکان کرد؟
answer: در ژاپن
wrong_answers:
  - در چین
  - در کره جنوبی
  - در سنگاپور
explanation: |
 به عنوان یک علاقه‌مند به بازی‌های ویدئویی و مانگا، مارک کارپلِس به فرهنگ ژاپنی علاقه داشت. او در فرانسه احساس راحتی نمی‌کرد، بنابراین تصمیم گرفت در سال ۲۰۰۹ به سرزمین آفتاب تابان مهاجرت کند.
reviewed: true
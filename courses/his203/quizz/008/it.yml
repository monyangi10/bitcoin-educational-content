question: In quale paese dell'Estremo Oriente si è trasferito Mark Karpelès nel giugno 2009 per interesse verso la cultura locale?
answer: In Giappone
wrong_answers:
  - In Cina
  - In Corea del Sud
  - A Singapore
explanation: |
 Mark Karpelès, appassionato di videogiochi e manga, apprezza la cultura giapponese. Non sentendosi a casa in Francia, ha deciso di emigrare nel Paese del Sol Levante nel 2009
 nel Paese del Sol Levante nel 2009.
reviewed: true
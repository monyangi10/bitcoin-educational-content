question: Mark Karpelès Haziran 2009'da yerel kültüre duyduğu ilgi nedeniyle hangi Uzak Doğu ülkesine taşındı?
answer: Japonya'da
wrong_answers:
  - Çin'de
  - Güney Kore'de
  - Singapur'da
explanation: |
 Video oyunları ve mangaya ilgi duyan bir geek olarak Mark Karpelès Japon kültürünü takdir ediyordu. Fransa'da kendini evinde hissetmediği için Japonya'ya göç etmeye karar verdi
 2009'da Yükselen Güneş Ülkesi'nde.
reviewed: true
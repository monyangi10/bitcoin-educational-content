question: Which Far Eastern country did Mark Karpelès move to in June 2009 out of an interest in the local culture?
answer: In Japan
wrong_answers:
  - In China
  - In South Korea
  - In Singapore
explanation: |
 As a geek with an interest in video games and manga, Mark Karpelès appreciated Japanese culture. He didn't feel at home in France, so decided to emigrate to
 the Land of the Rising Sun in 2009.
reviewed: true

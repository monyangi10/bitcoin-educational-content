question: Mihin Kaukoidän maahan Mark Karpelès muutti kesäkuussa 2009 kiinnostuksesta paikalliseen kulttuuriin?
answer: Japanissa
wrong_answers:
  - Kiinassa
  - Etelä-Koreassa
  - Singaporessa
explanation: |
 Videopeleistä ja mangasta kiinnostuneena nörttinä Mark Karpelès arvosti japanilaista kulttuuria. Hän ei tuntenut oloaan kotoisaksi Ranskassa, joten hän päätti muuttaa maahan
 nousevan auringon maahan vuonna 2009.
reviewed: true
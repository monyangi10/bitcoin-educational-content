question: Mark Karpelès đã chuyển đến quốc gia nào ở vùng Viễn Đông vào tháng 6 năm 2009 vì hứng thú với văn hóa địa phương?
answer: Tại Nhật Bản
wrong_answers:
  - Tại Trung Quốc
  - Tại Hàn Quốc
  - Tại Singapore
explanation: |
 Là một người đam mê trò chơi điện tử và truyện tranh, Mark Karpelès rất yêu thích văn hóa Nhật Bản. Anh không cảm thấy thoải mái ở Pháp, vì vậy đã quyết định di cư đến xứ sở mặt trời mọc vào năm 2009.
reviewed: true
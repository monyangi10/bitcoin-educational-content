question: Do které země Dálného východu se Mark Karpelès přestěhoval v červnu 2009 ze zájmu o místní kulturu?
answer: V Japonsku
wrong_answers:
  - V Číně
  - V Jižní Koreji
  - V Singapuru
explanation: |
 Jako geek se zájmem o videohry a mangu ocenil Mark Karpelès japonskou kulturu. Ve Francii se necítil doma, a tak se rozhodl emigrovat do Francie
 země vycházejícího slunce v roce 2009.
reviewed: true
question: В коя далекоизточна страна се премества Марк Карпелес през юни 2009 г., за да се запознае с местната култура?
answer: В Япония
wrong_answers:
  - В Китай
  - В Южна Корея
  - В Сингапур
explanation: |
 Като маниак с интерес към видеоигрите и мангата, Марк Карпелес оценява японската култура. Той не се чувства у дома си във Франция и решава да емигрира в
 страната на изгряващото слънце през 2009 г.
reviewed: true
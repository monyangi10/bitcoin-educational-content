question: Mark Karpelès alihamia nchi gani ya Mashariki ya Mbali mnamo Juni 2009 kutokana na kupendezwa na utamaduni wa wenyeji?
answer: Japani
wrong_answers:
  - Nchini China
  - Korea Kusini
  - Nchini Singapuri
explanation: |
 Akiwa mtaalamu wa michezo ya video na manga, Mark Karpelès alithamini utamaduni wa Kijapani. Hakuhisi yuko nyumbani Ufaransa, kwa hivyo aliamua kuhamia Ardhi ya Jua Linalochomoza mnamo 2009.
reviewed: true
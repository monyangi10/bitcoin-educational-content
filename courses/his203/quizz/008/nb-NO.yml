question: Hvilket land i det fjerne Østen flyttet Mark Karpelès til i juni 2009 av interesse for den lokale kulturen?
answer: I Japan
wrong_answers:
  - I Kina
  - I Sør-Korea
  - I Singapore
explanation: |
 Som nerd med interesse for videospill og manga satte Mark Karpelès pris på japansk kultur. Han følte seg ikke hjemme i Frankrike, og bestemte seg derfor for å emigrere til
 til den stigende solens land i 2009.
reviewed: true
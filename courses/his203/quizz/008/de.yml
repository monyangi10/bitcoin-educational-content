  - In Südkorea
  - In Singapur
explanation: |
 Als Geek mit Interesse an Videospielen und Mangas schätzt Mark Karpelès die japanische Kultur. Da er sich in Frankreich nicht zu Hause fühlte, beschloss er, in das
 2009 in das Land der aufgehenden Sonne auszuwandern.
reviewed: true
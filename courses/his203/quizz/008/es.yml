question: ¿A qué país de Extremo Oriente se trasladó Mark Karpelès en junio de 2009 por interés en la cultura local?
answer: En Japón
wrong_answers:
  - En China
  - En Corea del Sur
  - En Singapur
explanation: |
 Como friki interesado en los videojuegos y el manga, Mark Karpelès apreciaba la cultura japonesa. No se sentía como en casa en Francia, así que decidió emigrar al País del Sol Naciente en 2009
 al País del Sol Naciente en 2009.
reviewed: true
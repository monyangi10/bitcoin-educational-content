question: Negara Timur Jauh manakah yang menjadi tujuan Mark Karpelès pada bulan Juni 2009 karena ketertarikannya pada budaya setempat?
answer: Di Jepang
wrong_answers:
  - Di Cina
  - Di Korea Selatan
  - Di Singapura
explanation: |
 Sebagai seorang geek yang memiliki ketertarikan pada video game dan manga, Mark Karpelès mengapresiasi budaya Jepang. Dia tidak betah tinggal di Prancis,
 jadi dia memutuskan untuk beremigrasi ke Negeri Matahari Terbit pada tahun 2009.
reviewed: true

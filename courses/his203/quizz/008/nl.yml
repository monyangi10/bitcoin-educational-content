question: Naar welk land in het Verre Oosten verhuisde Mark Karpelès in juni 2009 uit interesse in de plaatselijke cultuur?
answer: In Japan
wrong_answers:
  - In China
  - In Zuid-Korea
  - In Singapore
explanation: |
 Als geek met interesse in videogames en manga waardeerde Mark Karpelès de Japanse cultuur. Hij voelde zich niet thuis in Frankrijk en besloot in 2009 te emigreren naar het Land van de Rijzende Zon
 het Land van de Rijzende Zon in 2009.
reviewed: true
question: Till vilket land i Fjärran Östern flyttade Mark Karpelès i juni 2009 för att han var intresserad av den lokala kulturen?
answer: I Japan
wrong_answers:
  - I Kina
  - I Sydkorea
  - I Singapore
explanation: |
 Som nörd med intresse för videospel och manga uppskattade Mark Karpelès den japanska kulturen. Han kände sig inte hemma i Frankrike och bestämde sig därför för att emigrera till
 den uppåtgående solens land 2009.
reviewed: true
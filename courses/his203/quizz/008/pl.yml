question: Do którego kraju Dalekiego Wschodu Mark Karpelès przeprowadził się w czerwcu 2009 roku z powodu zainteresowania lokalną kulturą?
answer: W Japonii
wrong_answers:
  - W Chinach
  - W Korei Południowej
  - W Singapurze
explanation: |
 Jako maniak interesujący się grami wideo i mangą, Mark Karpelès docenił japońską kulturę. Nie czuł się jak w domu we Francji, więc zdecydował się wyemigrować do
 kraju Wschodzącego Słońca w 2009 roku.
reviewed: true
question: Ni igihugu ikihe co mu Buseruko bwa kure Mark Karpelès yimukiyemwo muri Ruheshi 2009 kubera ko yakunda cane umuco wo ng’aho?
answer: Mu Buyapani
wrong_answers:
  - Mu Bushinwa
  - Muri Koreya y'Epfo
  - Muri Singapore
explanation: |
 Kubera ko Mark Karpelès yari umuntu w’umunyabwenge cane kandi akunda cane imikino ya videwo be n’imikino ya manga, yarakenguruka cane umuco w’Abayapani. Ntiyabona ko ari muhira mu Bufaransa, ni co gituma yahisemwo kwimukira mu
 Igihugu c’Izuba Rirashe mu 2009.
reviewed: true
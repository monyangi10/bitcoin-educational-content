question: ปัญหาด้านความปลอดภัยที่ค้นพบโดย Russell O'Connor ในเดือนกุมภาพันธ์ 2012 นำไปสู่การสร้าง BIP 30 คืออะไร?
answer: การมีอยู่ของธุรกรรมที่ซ้ำกันบนบล็อกเชน
wrong_answers:
  - ปัญหาของนายพลไบแซนไทน์ที่ทำให้ฉันทามติเป็นโมฆะ
  - การมีอยู่ของข้อบกพร่องในการเรียกซ้ำในคำสั่ง OP_EVAL
  - การกำจัดองค์ประกอบส่วนเกินโดยผู้ปฏิบัติการ OP_CHECKMULTISIG
explanation: |
 นี่คือธุรกรรมรางวัลที่มีตัวระบุเดียวกันรวมอยู่ในบล็อกต่าง ๆ เมื่อวันที่ 4 กุมภาพันธ์ 2012 Russell O'Connor ค้นพบช่องโหว่ที่ทำให้ธุรกรรมทั้งหมดที่เกิดจากหนึ่งในธุรกรรมซ้ำเหล่านี้สามารถถูกลบออกได้โดยสิ้นเชิงผ่านการจัดระเบียบโซ่ใหม่ แพตช์ที่อธิบายไว้ใน BIP 30 โดย Pieter Wuille ถูกนำไปใช้กับเครือข่ายเมื่อวันที่ 15 มีนาคม
reviewed: true
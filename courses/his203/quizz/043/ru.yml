question: Какая проблема безопасности, обнаруженная Расселом О'Коннором в феврале 2012 года, привела к созданию BIP 30?
answer: Наличие дублирующих транзакций в блокчейне
wrong_answers:
  - Проблема византийских генералов, сводящих на нет консенсус
  - Существование дефекта рекурсии в инструкции OP_EVAL
  - Удаление избыточного элемента оператором OP_CHECKMULTISIG
explanation: |
 Это были транзакции вознаграждения с одним и тем же идентификатором, включенные в разные блоки. 4 февраля 2012 года Рассел О'Коннор обнаружил уязвимость, которая
 позволяющую удалять все транзакции, возникающие из одной такой дублирующей транзакции, путем реорганизации цепочки. Заплатка, описанная в
 BIP 30 к Pieter Wuille, было применено к сети 15 марта.
reviewed: true
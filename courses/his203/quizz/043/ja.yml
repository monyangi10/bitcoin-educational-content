question: 2012年2月にラッセル・オコナーが発見し、BIP 30の創設につながったセキュリティ上の問題とは？
answer: ブロックチェーン上の重複取引の存在
wrong_answers:
  - コンセンサスを無効にするビザンチン将軍の問題
  - OP_EVAL命令に再帰の欠陥の存在
  - OP_CHECKMULTISIGオペレーターによる過剰元素の除去
explanation: |
 これらは、異なるブロックに含まれる同じ識別子を持つ報酬取引であった。2012年2月4日、Russell O'Connorは次のような脆弱性を発見した。
 2012年2月4日、Russell O'Connorは、チェーンの再編成によってこれらの重複トランザクションの1つから発生するすべてのトランザクションを完全に削除できる脆弱性を発見した。このパッチは
 Pieter WuilleによるBIP 30に記述されたパッチは3月15日にネットワークに適用された。
reviewed: true
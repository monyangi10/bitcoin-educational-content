question: مشکل امنیتی که توسط راسل اوکانر در فوریه ۲۰۱۲ کشف شد، منجر به ایجاد BIP 30 گردید؟
answer: وجود تراکنش‌های تکراری در بلاکچین
wrong_answers:
  - مشکل ژنرال‌های بیزانسی که اجماع را بی‌اثر می‌کنند
  - وجود یک نقص بازگشتی در دستورالعمل OP_EVAL
  - حذف یک عنصر اضافی توسط اپراتور OP_CHECKMULTISIG
explanation: |
 این‌ها تراکنش‌های پاداش با شناسه یکسان بودند که در بلوک‌های مختلف گنجانده شده بودند. در ۴ فوریه ۲۰۱۲، راسل اوکانر یک آسیب‌پذیری را کشف کرد که 
 اجازه می‌داد تمام تراکنش‌های ناشی از یکی از این تراکنش‌های تکراری به‌طور کامل از طریق سازمان‌دهی مجدد زنجیره حذف شوند. وصله‌ای که در 
 BIP 30 توسط Pieter Wuille توصیف شده بود، در ۱۵ مارس به شبکه اعمال شد.
reviewed: true
question: 2012년 2월 러셀 오코너가 발견한 보안 문제로 인해 BIP 30이 탄생하게 되었나요?
answer: 블록체인에 중복 트랜잭션이 존재하는 경우
wrong_answers:
  - 합의를 무효화하는 비잔틴 장군들의 문제
  - OP_EVAL 명령어에 재귀 결함이 존재합니다
  - OP_CHECKMULTISIG 운영자에 의한 초과 요소 제거
explanation: |
 이는 동일한 식별자가 다른 블록에 포함된 보상 거래였습니다. 2012년 2월 4일, 러셀 오코너는 이러한 중복 트랜잭션 중 하나에서 발생하는 모든 트랜잭션을 체인 재구성을 통해
 이러한 중복 거래 중 하나에서 발생하는 모든 거래가 체인 재구성을 통해 완전히 삭제될 수 있는 취약점을 발견했습니다. 패치는
 BIP 30에 설명된 패치는 3월 15일에 네트워크에 적용되었습니다.
reviewed: true
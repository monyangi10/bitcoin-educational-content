question: फरवरी 2012 में रसेल ओ'कॉनर द्वारा खोजी गई किस सुरक्षा समस्या के कारण BIP 30 का निर्माण हुआ?
answer: ब्लॉकचेन पर डुप्लिकेट लेनदेन की उपस्थिति
wrong_answers:
  - बीजान्टिन जनरलों द्वारा आम सहमति को रद्द करने की समस्या
  - OP_EVAL निर्देश में पुनरावर्तन दोष का अस्तित्व
  - OP_CHECKMULTISIG ऑपरेटर द्वारा अतिरिक्त तत्व को हटाना
explanation: |
 ये अलग-अलग ब्लॉकों में शामिल एक ही पहचानकर्ता वाले रिवॉर्ड ट्रांजैक्शन थे। 4 फरवरी, 2012 को, रसेल ओ'कॉनर ने एक भेद्यता का पता लगाया, जिससे
 चेन पुनर्गठन के माध्यम से इन डुप्लिकेट ट्रांजैक्शनों से उत्पन्न सभी ट्रांजैक्शनों को पूरी तरह से हटाया जा सकता था। Pieter Wuille द्वारा BIP 30 में वर्णित पैच को 15 मार्च को नेटवर्क पर लागू किया गया था।
reviewed: true
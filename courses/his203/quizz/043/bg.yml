question: Кой проблем със сигурността, открит от Ръсел О'Конър през февруари 2012 г., доведе до създаването на BIP 30?
answer: Наличието на дублирани трансакции в блокчейна
wrong_answers:
  - Проблемът с византийските генерали, които обезсилват консенсуса
  - Съществуването на дефект в рекурсията в инструкцията OP_EVAL
  - Премахване на излишен елемент от оператора на OP_CHECKMULTISIG
explanation: |
 Това бяха транзакции за възнаграждение с един и същ идентификатор, включени в различни блокове. На 4 февруари 2012 г. Ръсел О'Конър откри уязвимост, която
 позволяваше всички транзакции, произтичащи от една от тези дублиращи се транзакции, да бъдат изтрити направо чрез реорганизация на веригата. Поправката, описана в
 BIP 30 от Pieter Wuille, беше приложена в мрежата на 15 март.
reviewed: true
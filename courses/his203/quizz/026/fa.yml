question: مزیت اصلی تأیید پرداخت ساده‌شده (SPV) که در BitCoinJ پیاده‌سازی شده و توسط walletهای سبک مانند Bitcoin و Wallet برای اندروید استفاده می‌شود، چیست؟
answer: این امکان را فراهم کرد که تراکنش‌ها بدون نیاز به دانلود کل بلاک‌چین تأیید شوند.
wrong_answers:
  - به‌طور خودکار بیت‌کوین‌ها را هنگام دریافت پرداخت برای بهبود محرمانگی جابجا می‌کرد.
  - این داده‌های wallet را با استفاده از الگوریتم AES-256 رمزگذاری کرد تا از سرقت تروجان جلوگیری کند.
  - این امکان را فراهم کرد تا اتصال به یک نود موجود را ایمن کرده و از حملاتی که از انعطاف‌پذیری تراکنش‌ها سوءاستفاده می‌کنند، جلوگیری کند.
explanation: |
 تأیید پرداخت ساده‌شده (SPV) یک نوآوری مهم بود که در مقاله سفید Bitcoin توصیف شده و به کلاینت‌های سبک اجازه می‌داد تا بدون نیاز به دانلود و ذخیره‌سازی کل داده‌ها، تأیید کنند که تراکنش‌هایشان به بلاکچین تعلق دارد.
reviewed: true
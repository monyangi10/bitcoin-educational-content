question: ข้อได้เปรียบหลักของการตรวจสอบการชำระเงินแบบง่าย (SPV) ที่ถูกนำมาใช้ใน BitCoinJ และใช้โดย wallets แบบเบาเช่น Bitcoin Wallet สำหรับ Android คืออะไร?
answer: มันทำให้สามารถตรวจสอบธุรกรรมได้โดยไม่ต้องดาวน์โหลดบล็อกเชนทั้งหมด
wrong_answers:
  - มันจะสับเปลี่ยนบิตคอยน์โดยอัตโนมัติเมื่อได้รับการชำระเงินเพื่อเพิ่มความเป็นส่วนตัว
  - มันเข้ารหัสข้อมูล wallet โดยใช้อัลกอริธึม AES-256 เพื่อป้องกันการขโมยโทรจัน
  - มันทำให้สามารถรักษาความปลอดภัยของการเชื่อมต่อไปยังโหนดที่มีอยู่เพื่อป้องกันการโจมตีที่ใช้ประโยชน์จากความยืดหยุ่นของธุรกรรม
explanation: |
 Simplified Payment Verification (SPV) เป็นนวัตกรรมที่สำคัญที่อธิบายไว้ในเอกสารไวท์เปเปอร์ Bitcoin ซึ่งช่วยให้ไคลเอนต์แบบบางสามารถตรวจสอบได้ว่าธุรกรรมของพวกเขาอยู่บนบล็อกเชนโดยไม่จำเป็นต้องดาวน์โหลดและจัดเก็บข้อมูลทั้งหมด
reviewed: true
question: 비트코인J에서 구현되고 안드로이드용 Bitcoin Wallet과 같은 경량 wallet에서 사용되는 간소화된 결제 인증(SPV)의 주요 장점은 무엇인가요?
answer: 전체 블록체인을 다운로드할 필요 없이 트랜잭션을 확인할 수 있습니다
wrong_answers:
  - 결제 수령 시 비트코인을 자동으로 섞어 기밀성을 향상시켰습니다
  - 트로이 목마 도용을 방지하기 위해 AES-256 알고리즘을 사용하여 wallet 데이터를 암호화했습니다
  - 트랜잭션의 가변성을 악용하는 공격을 방지하기 위해 기존 노드에 대한 연결을 보호할 수 있게 되었습니다
explanation: |
 간소화된 결제 확인(SPV)은 Bitcoin 백서에 설명된 중요한 혁신으로, 씬 클라이언트가 데이터를 다운로드하거나 다운로드할 필요 없이 자신의 거래가 블록체인에 있는지 확인할 수 있게 해줍니다
 전체 데이터를 다운로드하고 저장할 필요 없이 블록체인에 속해 있는지 확인할 수 있게 해줍니다.
reviewed: true
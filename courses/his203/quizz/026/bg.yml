question: Какво е основното предимство на опростената проверка на плащанията (SPV), внедрена в BitCoinJ и използвана от леки wallet като Bitcoin Wallet за Android?
answer: Той позволява да се проверяват трансакции, без да се налага да се изтегля цялата блокчейн
wrong_answers:
  - Той автоматично разбърква биткойни при получаване на плащане, за да подобри поверителността
  - Той криптира данните на wallet, използвайки алгоритъма AES-256, за да предотврати кражба от троянски кон
  - Това позволи да се защити връзката със съществуващ възел, за да се предотвратят атаки, използващи изменчивостта на транзакциите
explanation: |
 Опростената проверка на плащанията (Simplified Payment Verification - SPV) е ключово нововъведение, описано в бялата книга на Bitcoin, което позволява на тънките клиенти да проверяват дали техните транзакции
 принадлежат на блокчейн, без да е необходимо да изтеглят и съхраняват всички данни.
reviewed: true
question: BitCoinJ में लागू की गई और Android के लिए Bitcoin और Wallet जैसे हल्के wallet संस्करणों द्वारा उपयोग की जाने वाली सरलीकृत भुगतान सत्यापन (SPV) का मुख्य लाभ क्या था?
answer: इससे पूरे ब्लॉकचेन को डाउनलोड किए बिना ही लेनदेन को सत्यापित करना संभव हो गया।
wrong_answers:
  - गोपनीयता बढ़ाने के लिए भुगतान प्राप्त होने पर यह स्वचालित रूप से बिटकॉइन को फेरबदल कर देता था।
  - इसने ट्रोजन हॉर्स की चोरी को रोकने के लिए wallet डेटा को AES-256 एल्गोरिदम का उपयोग करके एन्क्रिप्ट किया।
  - इससे मौजूदा नोड से कनेक्शन को सुरक्षित करना संभव हो गया, जिससे लेनदेन की परिवर्तनशीलता का फायदा उठाने वाले हमलों को रोका जा सके।
explanation: |
 सरलीकृत भुगतान सत्यापन (एसपीवी) Bitcoin श्वेत पत्र में वर्णित एक महत्वपूर्ण नवाचार था जिसने थिन क्लाइंट्स को यह सत्यापित करने में सक्षम बनाया कि उनके लेनदेन ब्लॉकचेन पर हैं, बिना संपूर्ण डेटा को डाउनलोड और संग्रहीत करने की आवश्यकता के।
reviewed: true
question: BitCoinJ 中实施的简化支付验证（SPV）以及安卓版 Bitcoin Wallet 等轻量级 wallet 所使用的简化支付验证（SPV）的主要优势是什么？
answer: 它使交易无需下载整个区块链即可得到验证
wrong_answers:
  - 它在收到付款时自动洗比特币，以提高保密性
  - 它使用 AES-256 算法对 wallet 数据进行加密，以防止木马窃取
  - 它使确保与现有节点的连接安全成为可能，以防止利用交易的可篡改性进行攻击
explanation: |
 简化支付验证（SPV）是 Bitcoin 白皮书中描述的一项重要创新，它使瘦客户机能够验证其交易是否属于区块链，而无需下载并存储整个数据。
 属于区块链，而无需下载和存储整个数据。
reviewed: true
question: BitCoinJに実装され、Bitcoin Wallet for Androidのような軽量walletで採用された簡易決済認証（SPV）の主な利点は何でしたか？
answer: ブロックチェーン全体をダウンロードすることなく、取引の検証が可能になった。
wrong_answers:
  - 機密性を高めるため、支払いの受領時にビットコインを自動的にシャッフルした。
  - トロイの木馬による盗難を防ぐため、AES-256アルゴリズムを使ってwalletのデータを暗号化した。
  - トランザクションの不正性を悪用した攻撃を防ぐために、既存のノードへの接続を保護することが可能になった。
explanation: |
 簡易決済検証（SPV）は、Bitcoinのホワイトペーパーに記載された重要なイノベーションであり、シンクライアントがデータ全体をダウンロードすることなく、自分の取引がブロックチェーンに属していることを検証することを可能にした。
 シンクライアントが、データ全体をダウンロードして保存することなく、その取引がブロックチェーン上に属していることを検証できるようにするものである。
reviewed: true
question: В чем главное преимущество упрощенной верификации платежей (SPV), реализованной в BitCoinJ и используемой в легких wallet, таких как Bitcoin Wallet для Android?
answer: Это позволило проверять транзакции без необходимости загружать весь блокчейн
wrong_answers:
  - Он автоматически перемешивает биткойны при получении платежа, чтобы повысить конфиденциальность
  - Он шифрует данные wallet с помощью алгоритма AES-256, чтобы предотвратить кражу с помощью троянских коней
  - Это позволило защитить соединение с существующим узлом для предотвращения атак, использующих нестабильность транзакций
explanation: |
 Упрощенная верификация платежей (SPV) - важнейшее нововведение, описанное в техническом документе Bitcoin, позволяющее тонким клиентам проверять принадлежность транзакций к блокчейну без необходимости загружать все данные
 принадлежат блокчейну без необходимости загружать и хранить все данные.
reviewed: true
question: 一部のminingプールで採用されているPPLNS（Pay Per Last N Shares）方式とはどのようなものですか？
answer: 採掘されたブロックごとに、miningプールに供給された最後のN個のシェアに比例して、採掘者に報酬を支払う。
wrong_answers:
  - 提供された部品ごとに、その難易度に応じて採掘者に直ちに報酬を支払う。
  - 採掘されたブロックごとに、前回のブロック以降に発見したシェアに応じてマイナーに報酬を与える。
  - 提供された各シェアに対して採掘者に即座に支払うが、miningプールが所有するシェア以上には決して支払わない。
explanation: |
 これは比例モデルの変形であり、評価期間はブロック生産サイクルではなく、サイクルに依存しないN株のウィンドウである。
 PPLNS法はP2Poolなどで使用されている。
reviewed: true
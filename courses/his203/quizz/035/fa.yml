question: روش Pay Per Last N Shares (PPLNS) که در برخی از استخرهای mining استفاده می‌شود، شامل چیست؟
answer: به معدن‌کاران برای هر بلوک استخراج‌شده، به نسبت سهام آن‌ها در آخرین N سهم ارائه‌شده به استخر mining پرداخت کنید.
wrong_answers:
  - بلافاصله به معدنچیان برای هر بخش ارائه شده، بر اساس درجه سختی آن، پاداش دهید.
  - پاداش دادن به ماینرها برای هر بلوک استخراج‌شده، به نسبت سهم‌هایی که از آخرین بلوک پیدا کرده‌اند.
  - بلافاصله به ماینرها برای هر سهم ارائه شده پرداخت کنید، اما هرگز بیشتر از آنچه استخر mining مالک آن است، پرداخت نکنید.
explanation: |
 این یک نوع از مدل نسبی است که در آن دوره ارزیابی چرخه تولید بلوک نیست، بلکه یک بازه از N سهم مستقل از چرخه است. روش PPLNS توسط P2Pool و دیگران استفاده شده است.
reviewed: true
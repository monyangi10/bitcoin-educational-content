question: 某些 mining 奖池采用的 "每最后 N 股付款"（PPLNS）方法包括哪些内容？
answer: 按照向 mining 数据池提供的最后 N 个份额的比例，为开采出的每个区块向矿工支付报酬
wrong_answers:
  - 根据所提供的每个部件的难度，立即向矿工支付报酬
  - 矿工每开采出一个区块，就按照他们自上一个区块以来所发现的份额比例给予奖励
  - 立即向矿工支付所提供的每一份份额，但绝不超过 mining 矿池所拥有的份额
explanation: |
 这是比例模型的一种变体，其中的评估期不是整块生产周期，而是与周期无关的 N 股窗口。
 P2Pool 等公司采用了 PPLNS 方法。
reviewed: true
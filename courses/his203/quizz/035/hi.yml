question: कुछ mining पूलों में उपयोग की जाने वाली पे पर लास्ट एन शेयर्स (PPLNS) विधि में क्या शामिल है?
answer: खनिकों को प्रत्येक खोदे गए ब्लॉक के लिए, mining पूल को आपूर्ति किए गए अंतिम N शेयरों में उनके हिस्से के अनुपात में भुगतान करें।
wrong_answers:
  - खनिकों को प्रत्येक उपलब्ध भाग के लिए, उसकी कठिनाई के स्तर के अनुसार, तुरंत पारिश्रमिक दिया जाए।
  - खनिकों को उनके द्वारा पिछले ब्लॉक के बाद से खोजे गए शेयरों के अनुपात में, प्रत्येक खोदे गए ब्लॉक के लिए पुरस्कृत करें।
  - खनिकों को दिए गए प्रत्येक शेयर के लिए तुरंत भुगतान करें, लेकिन mining पूल के स्वामित्व से अधिक कभी नहीं।
explanation: |
 यह आनुपातिक मॉडल का एक प्रकार है, जिसमें मूल्यांकन अवधि ब्लॉक उत्पादन चक्र नहीं, बल्कि चक्र से स्वतंत्र N शेयरों की एक विंडो होती है।
 PPLNS पद्धति का उपयोग P2Pool और अन्य संस्थाओं द्वारा किया गया है।
reviewed: true
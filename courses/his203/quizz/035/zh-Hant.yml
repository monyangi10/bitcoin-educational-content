question: 某些 mining 遊戲池中使用的「按最後 N 股支付」(PPLNS) 方法包含哪些內容？
answer: 根據礦工在 mining 池中最後供應的 N 份中所佔的比例，為每個已開採的區塊向礦工支付報酬
wrong_answers:
  - 根據所提供的每個部分的難度，立即向礦工支付報酬
  - 每開採出一個區塊，就按照自上一個區塊以來所發現的股數比例來獎勵礦工
  - 每提供一份就立即支付給礦工，但絕不會超過 mining pool 所擁有的份數
explanation: |
 這是比例模型的變體，其中的評估期間不是區塊生產週期，而是獨立於週期的 N 股窗口。
 PPLNS 方法已被 P2Pool 等公司採用。
reviewed: true
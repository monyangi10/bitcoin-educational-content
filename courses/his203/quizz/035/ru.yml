question: В чем заключается метод Pay Per Last N Shares (PPLNS), используемый в некоторых пулах mining?
answer: Платить майнерам за каждый добытый блок, пропорционально их долям в последних N долях, поставленных в пул mining
wrong_answers:
  - Вознаграждайте шахтеров немедленно за каждую предоставленную деталь в соответствии со степенью ее сложности
  - Вознаграждение майнерам за каждый добытый блок пропорционально доле, найденной ими с момента добычи последнего блока
  - Сразу же заплатите майнерам за каждую предоставленную долю, но не больше, чем принадлежит пулу mining
explanation: |
 Это вариант пропорциональной модели, в котором периодом оценки является не цикл производства блока, а окно из N долей, не зависящих от цикла.
 Метод PPLNS использовался, в частности, компанией P2Pool.
reviewed: true
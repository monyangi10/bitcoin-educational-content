question: В какво се състои методът Pay Per Last N Shares (PPLNS), използван в някои пулове mining?
answer: Заплащане на миньорите за всеки добит блок, пропорционално на дела им в последните N дяла, предоставени на пула mining
wrong_answers:
  - Незабавно възнаграждаване на миньорите за всяка предоставена част в зависимост от нейната степен на трудност
  - Възнаграждаване на миньорите за всеки добит блок, пропорционално на акциите, които са намерили след последния блок
  - Плащайте незабавно на миньорите за всеки предоставен дял, но никога повече от притежаваните от пула mining
explanation: |
 Това е вариант на пропорционалния модел, при който периодът на оценка не е производственият цикъл на блока, а прозорец от N акции, независим от цикъла.
 Методът PPLNS е използван от P2Pool, наред с други.
reviewed: true
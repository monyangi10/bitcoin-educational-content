question: วิธีการจ่ายเงินตามจำนวนหุ้นล่าสุด (Pay Per Last N Shares - PPLNS) ที่ใช้ในบางกลุ่ม mining ประกอบด้วยอะไรบ้าง?
answer: จ่ายเงินให้กับนักขุดสำหรับแต่ละบล็อกที่ขุดได้ ตามสัดส่วนของหุ้นของพวกเขาในหุ้น N ล่าสุดที่ส่งไปยังพูล mining
wrong_answers:
  - ชดเชยคนงานเหมืองทันทีสำหรับแต่ละส่วนที่จัดหาให้ ตามระดับความยากของมัน
  - ให้รางวัลนักขุดสำหรับแต่ละบล็อกที่ขุดได้ โดยสัดส่วนตามจำนวนหุ้นที่พวกเขาพบตั้งแต่บล็อกล่าสุด
  - จ่ายเงินให้กับนักขุดทันทีสำหรับแต่ละหุ้นที่ให้ไว้ แต่ไม่เกินกว่าที่กลุ่ม mining เป็นเจ้าของ
explanation: |
 นี่คือรูปแบบหนึ่งของโมเดลสัดส่วน ซึ่งช่วงเวลาการประเมินผลไม่ใช่รอบการผลิตบล็อก แต่เป็นหน้าต่างของหุ้น N ที่ไม่ขึ้นกับรอบ
 วิธี PPLNS ได้ถูกใช้โดย P2Pool และอื่น ๆ
reviewed: true
question: 일부 mining 풀에서 사용되는 마지막 N 주식당 지불(PPLNS) 방식은 어떻게 구성되나요?
answer: 채굴된 각 블록에 대해 채굴자에게 mining 풀에 공급된 마지막 N개의 지분에 비례하여 채굴 보상을 지급합니다
wrong_answers:
  - 난이도에 따라 제공된 각 파트에 대해 광부에게 즉시 보상을 지급합니다
  - 채굴된 각 블록에 대해 마지막 블록 이후 채굴한 지분에 비례하여 채굴자에게 보상을 지급합니다
  - 제공된 각 지분에 대해 채굴자에게 즉시 지불하되, mining 풀이 소유한 것보다 더 많이 지불해서는 안 됩니다
explanation: |
 이는 비례 모델의 변형으로, 평가 기간이 블록 생산 주기가 아니라 주기와 무관한 N개의 주식 창으로 구성됩니다.
 PPLNS 방식은 P2Pool 등에서 사용되었습니다.
reviewed: true
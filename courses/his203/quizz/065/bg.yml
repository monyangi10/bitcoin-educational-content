question: Колко отделни хака преживя платформата за търговия Bitcoinica, преди да обяви фалит?
answer: 3
wrong_answers:
  - 1
  - 2
  - 4
explanation: |
 Трите хаквания бяха следните: хакването на акаунта на Linode, в резултат на което платформата загуби 43 554 биткойна; хакването на акаунта на Rackspace, което доведе до
 хакването на акаунта в Mt. Gox, по време на което хакерът е изтеглил 40 000 биткойна и 40 000 LR-USD. Ликвидирането на Bitcoinica
 е обявена на 1 август 2012 г.
reviewed: true
question: Сколько отдельных взломов пережила торговая платформа Bitcoinica, прежде чем объявить о своем банкротстве?
answer: 3
wrong_answers:
  - 1
  - 2
  - 4
explanation: |
 Три взлома были следующими: взлом аккаунта Linode, в результате которого платформа потеряла 43 554 биткоина; взлом аккаунта Rackspace, который привел к потере 18 574 биткоинов; взлом аккаунта Mt Gox, в ходе которого хакер вывел 40 000 биткоинов и 40 000 LR-USD
 потере 18 574 биткоинов; взлом аккаунта Mt. Gox, в ходе которого хакер вывел 40 000 биткоинов и 40 000 LR-USD. О ликвидации Bitcoinica
 была объявлена 1 августа 2012 года.
reviewed: true
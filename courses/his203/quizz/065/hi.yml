question: Bitcoinica ट्रेडिंग प्लेटफॉर्म को दिवालिया घोषित करने से पहले कितने अलग-अलग हैकिंग हमलों का सामना करना पड़ा?
answer: 3
wrong_answers:
  - 1
  - 2
  - 4
explanation: |
 ये तीन हैकिंग घटनाएं इस प्रकार थीं: लिनोड खाते की हैकिंग, जिसके कारण प्लेटफॉर्म को 43,554 बिटकॉइन का नुकसान हुआ; रैकस्पेस खाते की हैकिंग, जिसके कारण
 18,574 बिटकॉइन का नुकसान हुआ; माउंट गोक्स खाते की हैकिंग, जिसके दौरान हैकर ने 40,000 बिटकॉइन और 40,000 एलआर-यूएसडी निकाल लिए। Bitcoinica के परिसमापन की घोषणा
 1 अगस्त, 2012 को की गई थी।
reviewed: true
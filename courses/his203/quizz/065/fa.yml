question: پلتفرم معاملاتی Bitcoinica قبل از اعلام ورشکستگی چندین حمله جداگانه را تجربه کرد؟
answer: ۳
wrong_answers:
  - ۱
  - ۲
  - ۴
explanation: |
 سه هک به شرح زیر بودند: هک حساب Linode که باعث شد پلتفرم ۴۳,۵۵۴ بیت‌کوین از دست بدهد؛ هک حساب Rackspace آن که منجر به از دست رفتن ۱۸,۵۷۴ بیت‌کوین شد؛ هک حساب Mt. Gox که در طی آن هکر ۴۰,۰۰۰ بیت‌کوین و ۴۰,۰۰۰ LR-USD برداشت کرد. انحلال Bitcoinica در اول اوت ۲۰۱۲ اعلام شد.
reviewed: true
question: Bitcoinica 거래 플랫폼은 파산을 선언하기 전에 얼마나 많은 해킹을 경험했나요?
answer: 3
wrong_answers:
  - 1
  - 2
  - 4
explanation: |
 세 가지 해킹은 다음과 같습니다: 리노드 계정 해킹으로 플랫폼에서 43,554 비트코인이 손실된 사건, 랙스페이스 계정 해킹으로 18,574 비트코인이 손실된 사건, 마운틴곡스 계정 해킹으로
 18,574 비트코인의 손실; 마운트곡스 계정 해킹으로 해커가 40,000 비트코인과 40,000 LR-USD를 인출했습니다. Bitcoinica의 청산
 의 청산이 2012년 8월 1일에 발표되었습니다.
reviewed: true
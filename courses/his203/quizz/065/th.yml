question: แพลตฟอร์มการซื้อขาย Bitcoinica ประสบกับการแฮ็กกี่ครั้งก่อนที่จะประกาศล้มละลาย?
answer: 3
wrong_answers:
  - 1
  - 2
  - 4
explanation: |
 การแฮ็กทั้งสามมีดังนี้: การแฮ็กบัญชี Linode ทำให้แพลตฟอร์มสูญเสียบิตคอยน์จำนวน 43,554 บิตคอยน์; การแฮ็กบัญชี Rackspace ของมันซึ่งนำไปสู่การสูญเสียบิตคอยน์จำนวน 18,574 บิตคอยน์; การแฮ็กบัญชี Mt. Gox ซึ่งในระหว่างนั้นแฮ็กเกอร์ได้ถอนบิตคอยน์จำนวน 40,000 บิตคอยน์และ 40,000 LR-USD การชำระบัญชีของ Bitcoinica ได้รับการประกาศเมื่อวันที่ 1 สิงหาคม 2012
reviewed: true
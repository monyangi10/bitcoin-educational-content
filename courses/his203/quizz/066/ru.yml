question: Кто был косвенно ответственен за последний взлом Bitcoinica, произошедший в июле 2012 года?
answer: Амир Тааки
wrong_answers:
  - Чжоу Тун
  - Чэнь Цзяньхай
  - Марк Карпелес
explanation: |
 7 июля он опубликовал полный исходный код платформы, в котором содержался пароль к сейфу Bitcoinica LastPass, который, в свою очередь, содержал пароль к его
 Счета на Mt. Gox. было выведено 40 000 биткоинов и 40 000 LR-USD. Амир Тааки признал этот поступок, но возложил вину на руководство Bitcoinica,
 с которым он находился в конфликте.
reviewed: true
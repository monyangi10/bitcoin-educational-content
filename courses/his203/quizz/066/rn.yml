question: Ni nde yari afise uruhara mu buryo butaziguye mu bijanye n’ugutera ivyatsi vya nyuma vya Bitcoinica vyabaye muri Nyakanga 2012?
answer: Amir Taaki
wrong_answers:
  - Zhou Tong
  - Chen Jianhai
  - Mariko Karpelesi
explanation: |
 Yasohoye kode yuzuye y’inkomoko y’iyi platform ku wa 7 Nyakanga, yarimwo ijambobanga ry’igisandugu ca Bitcoinica LastPass, na co kikaba carimwo ijambobanga ry’isanduku yiwe . 
 Inkuru y’umusozi Gox. 40.000 z’ama bitcoins n’ama LR-USD 40.000 ni vyo vyakuwemwo. Amir Taaki yaremeye ico gikorwa, ariko ashira icaha ku buyobozi bwa Bitcoinica, 
 uwo yari afise amakimbirane na we.
reviewed: true
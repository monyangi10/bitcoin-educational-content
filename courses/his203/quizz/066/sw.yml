question: Ni nani aliyehusika kwa njia isiyo ya moja kwa moja na udukuzi wa mwisho wa Bitcoinica uliofanyika Julai 2012?
answer: Amir Taaki
wrong_answers:
  - Zhou Tong
  - Chen Jianhai
  - Mark Karpelès
explanation: |
 Alitoa msimbo kamili wa chanzo wa jukwaa hilo mnamo Julai 7, ambao ulikuwa na nenosiri la LastPass salama ya Bitcoinica, ambalo pia lilikuwa na nenosiri la akaunti yake ya Mt. Gox. Bitcoins 40,000 na LR-USD 40,000 ziliondolewa. Amir Taaki alikiri kitendo hiki, lakini alilaumu usimamizi wa Bitcoinica, ambaye alikuwa katika mgogoro naye.
reviewed: true
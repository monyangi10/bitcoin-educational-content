question: چه کسی به طور غیرمستقیم مسئول آخرین هک Bitcoinica بود که در ژوئیه ۲۰۱۲ اتفاق افتاد؟
answer: امیر تاکی
wrong_answers:
  - ژو تونگ
  - چن جیانهای
  - مارک کارپلس
explanation: |
 او در تاریخ ۷ ژوئیه کد منبع کامل پلتفرم را منتشر کرد که شامل رمز عبور گاوصندوق LastPass متعلق به Bitcoinica بود، که به نوبه خود شامل رمز عبور حساب Mt. Gox او بود. ۴۰,۰۰۰ بیت‌کوین و ۴۰,۰۰۰ LR-USD برداشت شد. امیر تاکی این اقدام را تأیید کرد، اما تقصیر را به گردن مدیریت Bitcoinica انداخت، که با آنها در تضاد بود.
reviewed: true
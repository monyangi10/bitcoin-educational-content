question: Кой е непряко отговорен за последния хакерски пробив в Bitcoinica, извършен през юли 2012 г.?
answer: Амир Тааки
wrong_answers:
  - Джоу Тонг
  - Чен Джианхай
  - Марк Карпелес
explanation: |
 На 7 юли той публикува пълния изходен код на платформата, който съдържаше паролата за сейфа LastPass на Bitcoinica, който от своя страна съдържаше паролата за неговия
 Mt. Gox. изтеглени са 40 000 биткойна и 40 000 LR-USD. Амир Тааки признава това действие, но хвърля вината върху ръководството на Bitcoinica,
 с което е бил в конфликт.
reviewed: true
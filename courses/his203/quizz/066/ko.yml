question: 2012년 7월에 발생한 마지막 Bitcoinica 해킹의 간접적 책임자는 누구였나요?
answer: 아미르 타키
wrong_answers:
  - 저우 통
  - 첸 지안하이
  - 마크 카펠레스
explanation: |
 그는 7월 7일에 플랫폼의 전체 소스 코드를 공개했는데, 여기에는 Bitcoinica의 LastPass 금고 비밀번호가 포함되어 있었고, 이 비밀번호에는 자신의
 마운트곡스 계정. 40,000 비트코인과 40,000 LR-USD가 인출되었습니다. 아미르 타키는 이 사실을 인정했지만 그 책임을 Bitcoinica의 경영진에게 돌렸습니다,
 그들과 갈등을 빚고 있었기 때문입니다.
reviewed: true
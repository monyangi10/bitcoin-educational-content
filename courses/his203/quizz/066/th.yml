question: ใครเป็นผู้รับผิดชอบทางอ้อมสำหรับการแฮ็ก Bitcoinica ครั้งล่าสุดที่เกิดขึ้นในเดือนกรกฎาคม 2012?
answer: อาเมียร์ ทากิ
wrong_answers:
  - โจวถง
  - เฉิน เจียนไห่
  - มาร์ค คาร์เปเลส
explanation: |
 เขาเผยแพร่ซอร์สโค้ดทั้งหมดของแพลตฟอร์มเมื่อวันที่ 7 กรกฎาคม ซึ่งมีรหัสผ่านไปยังตู้เซฟ LastPass ของ Bitcoinica ซึ่งมีรหัสผ่านไปยังบัญชี Mt. Gox ของเขา 40,000 บิตคอยน์และ 40,000 LR-USD ถูกถอนออกไป Amir Taaki ยอมรับการกระทำนี้ แต่โทษการจัดการของ Bitcoinica ซึ่งเขามีความขัดแย้งด้วย
reviewed: true
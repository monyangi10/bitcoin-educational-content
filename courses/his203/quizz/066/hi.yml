question: जुलाई 2012 में हुए आखिरी Bitcoinica हैक के लिए अप्रत्यक्ष रूप से कौन जिम्मेदार था?
answer: अमीर ताकी
wrong_answers:
  - झोउ टोंग
  - चेन जियानहाई
  - मार्क कार्पेल्स
explanation: |
 उन्होंने 7 जुलाई को प्लेटफ़ॉर्म का पूरा सोर्स कोड जारी किया, जिसमें Bitcoinica के LastPass सेफ़ का पासवर्ड था, और उस सेफ़ में उनके Mt. Gox खाते का पासवर्ड था।
 इससे 40,000 बिटकॉइन और 40,000 LR-USD निकाले गए। आमिर ताकी ने इस कृत्य को स्वीकार किया, लेकिन इसका दोष Bitcoinica के प्रबंधन पर डाला,
 जिनके साथ उनका विवाद चल रहा था।
reviewed: true
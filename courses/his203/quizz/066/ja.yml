question: "2012年7月に発生した最後のBitcoinicaハッキングに間接的に責任を負ったのは誰ですか？"
answer: アミール・ターキ
wrong_answers:
  - 周 同
  - 陳建海
  - マーク・カルペレス
explanation: |
 彼は7月7日にプラットフォームの完全なソースコードを公開したが、その中にはBitcoinicaのLastPass金庫のパスワードが含まれており、さらにその中には彼の
 Mt.Gox口座のパスワードが含まれていた。40,000ビットコインと40,000LR-USDが引き出された。アミール・タアキはこの行為を認めたが、責任はBitcoinicaの経営陣にある、
 と対立していた。
reviewed: true
question: На коя онлайн борса Ерик Воорхийс извърши неофициално първично публично предлагане през август 2012 г., за да развие онлайн казиното SatoshiDICE?
answer: MPEx
wrong_answers:
  - GLBSE
  - Bitcoinica
  - Bitoption.org
explanation: |
 MPEx е платформата, управлявана от Мирча Попеску и стартирала няколко месеца по-рано. Ерик Воорхис емитира 100 млн. акции (с борсов символ S.DICE) и
 продаде 10, за да набере 34 500 биткойна, или около 372 000 долара.
reviewed: true
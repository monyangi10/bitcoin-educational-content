question: एरिक वूरहीस ने अगस्त 2012 में SatoshiDICE ऑनलाइन कैसीनो को बढ़ावा देने के लिए किस ऑनलाइन स्टॉक एक्सचेंज पर अनौपचारिक आईपीओ किया था?
answer: एमपीएक्स
wrong_answers:
  - जीएलबीएसई
  - Bitcoinिका
  - Bitoption.org
explanation: |
 एमपीएक्स एक ऐसा प्लेटफॉर्म था जिसका प्रबंधन मिर्सेया पोपेस्कु करते थे और इसे कुछ महीने पहले ही लॉन्च किया गया था। एरिक वूरहीस ने 100 मिलियन शेयर (स्टॉक सिंबल S.DICE के साथ) जारी किए और
 10 शेयर बेचकर 34,500 बिटकॉइन, या लगभग $372,000 जुटाए।
reviewed: true
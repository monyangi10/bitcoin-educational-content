question: На какой онлайн-бирже Эрик Вурхиз провел неофициальное IPO в августе 2012 года для развития онлайн-казино SatoshiDICE?
answer: MPEx
wrong_answers:
  - GLBSE
  - Bitcoinica
  - Bitoption.org
explanation: |
 MPEx - это платформа, управляемая Мирчей Попеску и запущенная несколькими месяцами ранее. Эрик Вурхиз выпустил 100 миллионов акций (с биржевым символом S.DICE) и
 продал 10, чтобы выручить 34 500 биткоинов, или около 372 000 долларов.
reviewed: true
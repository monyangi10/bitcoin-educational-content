question: 2012年8月、SatoshiDICEオンラインカジノを成長させるために、エリック・ヴォーヒーズが非公式IPOを行ったオンライン証券取引所はどこですか？
answer: エムピーエックス
wrong_answers:
  - グルービーエスイー
  - Bitcoinica
  - ビットオプション
explanation: |
 MPExはミルチャ・ポペスクが運営するプラットフォームで、その数ヶ月前に立ち上げられた。エリック・ヴォーヒーズは1億株（銘柄記号はS.DICE）を発行し、10株を売却して34,500ビットコイン（約372,000ドル）を調達した。
 10を売却し、34,500ビットコイン、約372,000ドルを調達した。
reviewed: true
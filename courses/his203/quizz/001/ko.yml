question: 사무엘 에드워드 콘킨 3세가 이론화한 정치 철학 중 실크로드 창시자인 로스 울브리히트에게 특히 영향을 미친 것은 무엇인가요?
answer: 아고리즘
wrong_answers:
  - 민본주의
  - 고전적 자유주의
  - Librism
explanation: |
 이는 국가의 영향력을 줄이기 위한 평화적 수단으로서 암시장(콘킨은 이를 '대항 경제'라고 부릅니다)의 실천을 옹호하는 정치 철학입니다
 평화적 수단으로 암시장을 옹호하는 정치 철학입니다. 로스 울브리히트는 2012년 3월 실크로드 포럼에 올린 글에서 아고리즘과의 연관성을 인정했습니다.
reviewed: true
question: کدام فلسفه سیاسی که توسط ساموئل ادوارد کونکین سوم نظریه‌پردازی شده بود، به‌ویژه بر راس اولبریکت در ایجاد جاده ابریشم تأثیر گذاشت؟
answer: آگوریسم
wrong_answers:
  - مینارشیسم
  - لیبرالیسم کلاسیک
  - لیبریسم
explanation: |
 این یک فلسفه سیاسی است که به ترویج بازار سیاه (که کنکین آن را "ضد اقتصاد" می‌نامد) به عنوان وسیله‌ای صلح‌آمیز برای کاهش نفوذ دولت می‌پردازد. راس اولبریکت در یک پست در مارس ۲۰۱۲ در انجمن جاده ابریشم به ارتباط با آگوریسم اذعان کرد.
reviewed: true
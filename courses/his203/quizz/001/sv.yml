question: Vilken politisk filosofi som teoretiserades av Samuel Edward Konkin III påverkade Ross Ulbricht särskilt i skapandet av Silk Road?
answer: Agorism
wrong_answers:
  - Minarkism
  - Klassisk liberalism
  - Librism
explanation: |
 Det är en politisk filosofi som förespråkar den svarta marknaden (som Konkin kallar "motekonomi") som ett fredligt sätt att minska statens inflytande
 statens inflytande. Ross Ulbricht erkände anknytningen till agorism i ett inlägg på Silk Road-forumet i mars 2012.
reviewed: true
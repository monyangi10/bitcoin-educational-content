question: Ni falsafa gani ya kisiasa iliyotokana na nadharia ya Samuel Edward Konkin III iliyomshawishi hasa Ross Ulbricht katika uundaji wa Barabara ya Hariri?
answer: Ugorism
wrong_answers:
  - Utawala wa Minarki
  - Uliberali wa kitamaduni
  - Librism
explanation: |
 Ni falsafa ya kisiasa inayotetea utendaji wa soko jeusi (ambalo Konkin anaita "uchumi unaopingana") kama njia ya amani ya kupunguza ushawishi wa serikali. Ross Ulbricht alikiri kuhusishwa na uchokozi katika chapisho la Machi 2012 kwenye jukwaa la Barabara ya Silk.
reviewed: true
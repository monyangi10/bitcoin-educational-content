question: Milline Samuel Edward Konkin III teoretiseeritud poliitiline filosoofia mõjutas Ross Ulbrichtit eriti Silk Roadi loomisel?
answer: Agorism
wrong_answers:
  - Minarhism
  - Klassikaline liberalism
  - Raamatukogundus
explanation: |
 See on poliitiline filosoofia, mis propageerib musta turu praktikat (mida Konkin nimetab "vastumajanduseks") kui rahumeelset vahendit, et vähendada mõju
 riigi mõju vähendamiseks. Ross Ulbricht tunnistas oma 2012. aasta märtsi postituses Siiditee foorumis seotust agorismiga.
reviewed: true
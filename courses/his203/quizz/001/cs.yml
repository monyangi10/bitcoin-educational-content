question: Jaká politická filozofie, kterou teoreticky formuloval Samuel Edward Konkin III, ovlivnila zejména Rosse Ulbrichta při vytváření Silk Road?
answer: Agorismus
wrong_answers:
  - Minarchismus
  - Klasický liberalismus
  - Librismus
explanation: |
 Jde o politickou filozofii obhajující praxi černého trhu (kterou Konkin nazývá "protiekonomikou") jako mírový prostředek k omezení vlivu na ekonomiku
 státu. Ross Ulbricht přiznal příslušnost k agorismu ve svém příspěvku na fóru Silk Road z března 2012.
reviewed: true
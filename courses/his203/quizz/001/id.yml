question: Filosofi politik apa yang diteorikan oleh Samuel Edward Konkin III yang secara khusus memengaruhi Ross Ulbricht dalam penciptaan Jalur Sutra?
answer: Agorisme
wrong_answers:
  - Minarkisme
  - Liberalisme klasik
  - Librisme
explanation: |
 Ini adalah filosofi politik yang menganjurkan praktik pasar gelap (yang oleh Konkin disebut "ekonomi tandingan") sebagai cara damai untuk mengurangi pengaruh
 dari negara. Ross Ulbricht mengakui afiliasi dengan agorisme dalam sebuah tulisan pada Maret 2012 di forum Jalur Sutra.
reviewed: true
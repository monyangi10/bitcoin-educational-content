question: Quale filosofia politica teorizzata da Samuel Edward Konkin III ha influenzato particolarmente Ross Ulbricht nella creazione di Silk Road?
answer: Agorismo
wrong_answers:
  - Minarchismo
  - Il liberalismo classico
  - Librismo
explanation: |
 È una filosofia politica che sostiene la pratica del mercato nero (che Konkin chiama "contro-economia") come mezzo pacifico per ridurre l'influenza dello Stato
 dello Stato. Ross Ulbricht ha riconosciuto l'affiliazione all'agorismo in un post del marzo 2012 sul forum di Silk Road.
reviewed: true
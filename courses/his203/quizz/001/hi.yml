question: सैमुअल एडवर्ड कोनकिन तृतीय द्वारा प्रतिपादित किस राजनीतिक दर्शन ने सिल्क रोड के निर्माण में रॉस उलब्रिच को विशेष रूप से प्रभावित किया?
answer: एगोरीज़्म
wrong_answers:
  - मिनार्चवाद
  - शास्त्रीय उदारवाद
  - पुस्तकालयवाद
explanation: |
 यह एक राजनीतिक दर्शन है जो राज्य के प्रभाव को कम करने के शांतिपूर्ण साधन के रूप में काला बाजार (जिसे कोनकिन "प्रति-अर्थव्यवस्था" कहते हैं) की प्रथा का समर्थन करता है।
 रॉस उलब्रिच ने मार्च 2012 में सिल्क रोड फोरम पर एक पोस्ट में एगोरीज़्म के साथ अपने जुड़ाव को स्वीकार किया।
reviewed: true
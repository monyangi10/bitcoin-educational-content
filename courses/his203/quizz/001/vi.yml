question: Triết lý chính trị nào do Samuel Edward Konkin III đề xướng đã ảnh hưởng đặc biệt đến Ross Ulbricht trong việc sáng tạo ra Con đường Tơ lụa?
answer: Chủ nghĩa Agor
wrong_answers:
  - Chủ nghĩa tối thiểu
  - Chủ nghĩa tự do cổ điển
  - Chủ nghĩa Librism
explanation: |
 Đó là một triết lý chính trị ủng hộ việc thực hành chợ đen (mà Konkin gọi là "nền kinh tế phản kháng") như một phương tiện hòa bình để giảm bớt ảnh hưởng của nhà nước.
 Ross Ulbricht đã thừa nhận mối liên hệ với chủ nghĩa agorism trong một bài đăng vào tháng 3 năm 2012 trên diễn đàn Con đường Tơ lụa.
reviewed: true
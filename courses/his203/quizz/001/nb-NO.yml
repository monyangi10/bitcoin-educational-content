question: Hvilken politisk filosofi teoretisert av Samuel Edward Konkin III påvirket Ross Ulbricht i særlig grad i etableringen av Silk Road?
answer: Agorisme
wrong_answers:
  - Minarkisme
  - Klassisk liberalisme
  - Librisme
explanation: |
 Det er en politisk filosofi som tar til orde for å praktisere det svarte markedet (som Konkin kaller "motøkonomien") som et fredelig middel til å redusere statens innflytelse
 statens innflytelse. Ross Ulbricht erkjente tilknytningen til agorisme i et innlegg på Silk Road-forumet i mars 2012.
reviewed: true
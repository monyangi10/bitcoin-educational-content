question: Samuel Edward Konkin III tarafından teorize edilen hangi siyasi felsefe, İpek Yolu'nun oluşturulmasında Ross Ulbricht'i özellikle etkilemiştir?
answer: Agorizm
wrong_answers:
  - Minarşizm
  - Klasik liberalizm
  - Kütüphanecilik
explanation: |
 Bu, karaborsanın (Konkin'in "karşı-ekonomi" olarak adlandırdığı) etkisini azaltmanın barışçıl bir yolu olarak uygulanmasını savunan bir siyasi felsefedir
 devletin. Ross Ulbricht Mart 2012'de İpek Yolu forumunda yaptığı bir paylaşımda agorizm ile olan ilişkisini kabul etmiştir.
reviewed: true
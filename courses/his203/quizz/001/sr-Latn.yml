question: Agorizam
answer: Agorizam
wrong_answers:
  - Minarhizam
  - Klasični liberalizam
  - Librizam
explanation: |
 To je politička filozofija koja zagovara praksu crnog tržišta (koje Konkin naziva "kontra-ekonomija") kao mirno sredstvo za smanjenje uticaja države. Ross Ulbricht je priznao povezanost sa agorizmom u postu na Silk Road forumu u martu 2012. godine.
reviewed: true
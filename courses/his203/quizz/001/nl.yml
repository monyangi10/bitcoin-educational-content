question: Welke politieke filosofie getheoretiseerd door Samuel Edward Konkin III beïnvloedde Ross Ulbricht in het bijzonder bij de oprichting van Silk Road?
answer: Agorisme
wrong_answers:
  - Minarchisme
  - Klassiek liberalisme
  - Librisme
explanation: |
 Het is een politieke filosofie die pleit voor de praktijk van de zwarte markt (die Konkin de "contra-economie" noemt) als een vreedzaam middel om de invloed van de staat te verminderen
 van de staat. Ross Ulbricht erkende zijn verwantschap met het agorisme in een post van maart 2012 op het Silk Road forum.
reviewed: true
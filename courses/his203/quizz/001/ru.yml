question: Какая политическая философия, теоретизированная Сэмюэлем Эдвардом Конкином III, оказала особое влияние на Росса Ульбрихта при создании Silk Road?
answer: Агоризм
wrong_answers:
  - Минархизм
  - Классический либерализм
  - Либридерство
explanation: |
 Это политическая философия, пропагандирующая практику черного рынка (который Конкин называет "контрэкономикой") как мирное средство снижения влияния
 государства. Росс Ульбрихт признал свою связь с агоризмом в марте 2012 года в сообщении на форуме "Шелкового пути".
reviewed: true
question: 塞缪尔-爱德华-康金三世（Samuel Edward Konkin III）提出的哪种政治哲学对罗斯-乌布利希特（Ross Ulbricht）创建 "丝绸之路 "产生了特别大的影响？
answer: 农业主义
wrong_answers:
  - 无政府主义
  - 古典自由主义
  - 图书馆主义
explanation: |
 这是一种政治哲学，主张将黑市（康金称之为 "反经济"）作为减少国家影响的和平手段。
 国家的影响。罗斯-乌尔布里切特（Ross Ulbricht）2012 年 3 月在丝绸之路论坛上发表的一篇帖子中承认了与 "反经济 "的关系。
reviewed: true
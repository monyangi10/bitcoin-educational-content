question: ปรัชญาการเมืองที่ทฤษฎีโดย Samuel Edward Konkin III ที่มีอิทธิพลต่อ Ross Ulbricht ในการสร้าง Silk Road คืออะไร?
answer: อโกริซึม
wrong_answers:
  - มินาร์คิสม์
  - ลัทธิเสรีนิยมคลาสสิก
  - Librism
explanation: |
 มันเป็นปรัชญาทางการเมืองที่สนับสนุนการปฏิบัติของตลาดมืด (ซึ่ง Konkin เรียกว่า "เศรษฐกิจคู่ขนาน") เป็นวิธีการที่สงบสุขในการลดอิทธิพลของรัฐ Ross Ulbricht ยอมรับการเชื่อมโยงกับ agorism ในโพสต์เดือนมีนาคม 2012 บนฟอรัม Silk Road
reviewed: true
question: Welche politische Philosophie von Samuel Edward Konkin III hat Ross Ulbricht bei der Gründung der Silk Road besonders beeinflusst?
answer: Agorismus
wrong_answers:
  - Minarchismus
  - Klassischer Liberalismus
  - Bibliothekswesen
explanation: |
 Es handelt sich um eine politische Philosophie, die die Praxis des Schwarzmarktes (die Konkin als "Gegenwirtschaft" bezeichnet) als friedliches Mittel zur Reduzierung des Einflusses des Staates
 des Staates. Ross Ulbricht bestätigte die Zugehörigkeit zum Agorismus in einem Beitrag vom März 2012 im Silk Road Forum.
reviewed: true
question: Jaka filozofia polityczna teoretyzowana przez Samuela Edwarda Konkina III szczególnie wpłynęła na Rossa Ulbrichta przy tworzeniu Silk Road?
answer: Agoryzm
wrong_answers:
  - Minarchizm
  - Klasyczny liberalizm
  - Bibliotekarstwo
explanation: |
 Jest to filozofia polityczna opowiadająca się za praktyką czarnego rynku (którą Konkin nazywa "kontrekonomią") jako pokojowym środkiem zmniejszania wpływów państwa
 państwa. Ross Ulbricht przyznał się do powiązań z agoryzmem w poście z marca 2012 roku na forum Silk Road.
reviewed: true
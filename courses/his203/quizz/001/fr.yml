question: Quelle philosophie politique théorisée par Samuel Edward Konkin III a particulièrement influencé Ross Ulbricht dans la création de Silk Road ?
answer: L'agorisme
wrong_answers:
  - Le minarchisme
  - Le libéralisme classique
  - Le librisme
explanation: |
 Il s'agit d'une philosophie politique prônant la pratique du marché noir (que Konkin appelle la « contre-économie ») comme moyen pacifique de réduire l'influence de l'État. Ross Ulbricht a reconnu la filiation avec l'agorisme dans un message publié en mars 2012 sur le forum de Silk Road.

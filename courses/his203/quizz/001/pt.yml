question: Que filosofia política teorizada por Samuel Edward Konkin III influenciou particularmente Ross Ulbricht na criação da Silk Road?
answer: Agorismo
wrong_answers:
  - Minarquismo
  - Liberalismo clássico
  - Librismos
explanation: |
 É uma filosofia política que defende a prática do mercado negro (que Konkin chama de "contra-economia") como um meio pacífico de reduzir a influência
 influência do Estado. Ross Ulbricht reconheceu a sua afiliação ao agorismo numa publicação de março de 2012 no fórum Silk Road.
reviewed: true
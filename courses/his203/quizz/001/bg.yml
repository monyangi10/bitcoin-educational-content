question: Коя политическа философия, изложена от Самюъл Едуард Конкин III, оказва особено влияние върху Рос Улбрихт при създаването на Silk Road?
answer: Агоризъм
wrong_answers:
  - Минархизъм
  - Класически либерализъм
  - Библиотекарство
explanation: |
 Това е политическа философия, която препоръчва практикуването на черния пазар (който Конкин нарича "контраикономика") като мирно средство за намаляване на влиянието на
 на държавата. Рос Улбрихт признава принадлежността към агоризма в публикация от март 2012 г. във форума "Пътят на коприната".
reviewed: true
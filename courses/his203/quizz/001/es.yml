question: ¿Qué filosofía política teorizada por Samuel Edward Konkin III influyó especialmente a Ross Ulbricht en la creación de Silk Road?
answer: Agorismo
wrong_answers:
  - Minarquismo
  - Liberalismo clásico
  - Librismo
explanation: |
 Es una filosofía política que defiende la práctica del mercado negro (que Konkin denomina "contraeconomía") como medio pacífico de reducir la influencia
 del Estado. Ross Ulbricht reconoció la filiación con el agorismo en un post de marzo de 2012 en el foro de la Ruta de la Seda.
reviewed: true
question: Ni ubuhinga ubuhe bwa politike bwavuzwe na Samuel Edward Konkin wa gatatu bwagize ico bukoze canecane kuri Ross Ulbricht mu kurema Inzira y’Ubudodo?
answer: Agorisme
wrong_answers:
  - Ubunyagami
  - Ukwidegemvya kwa kera
  - Ubuhinga
explanation: |
 Ni filozofiya ya politike ishigikira umugenzo w'isoko ry'umwirabura (iryo Konkin yita "ubutunzi burwanya") nk'uburyo bw'amahoro bwo kugabanya inkurikizi . 
 y’igihugu. Ross Ulbricht yaremeye ko afise ubucuti n’ubupfumu mu vyo yanditse muri Ntwarante 2012 ku nama y’inzira y’ubudodo.
reviewed: true
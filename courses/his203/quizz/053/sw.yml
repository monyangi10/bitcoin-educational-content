question: Jina la huduma ya ubadilishanaji wa fedha za kigeni kutoka kwa watu binafsi hadi kwa watu binafsi iliyozinduliwa na Jeremias Kangas na kaka yake mwezi Juni 2012 lilikuwa lipi?
answer: Bitcoin za Ndani
wrong_answers:
  - BTC KARIBU NAMI
  - Papo Hapo
  - Coinabul
explanation: |
 Huu ulikuwa mfumo wa kupatanisha watu, ambao ulizinduliwa mnamo Juni 7. Katika msimu wa joto, LocalBitcoins iliunganisha mfumo wa escrow, ambao kupitia huo bitcoin zingeweza kushikiliwa kwa muda na jukwaa na kutolewa kupitia SMS kwa malipo kwa mnunuzi. Hasa, hii iliwezesha kubadilishana ana kwa ana, ambapo muuzaji angetoa bitcoin mara tu pesa taslimu zilipopokelewa.
reviewed: true
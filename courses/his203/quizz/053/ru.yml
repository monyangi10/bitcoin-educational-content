question: Как назывался частный обменный сервис, запущенный Йеремиасом Кангасом и его братом в июне 2012 года?
answer: LocalBitcoins
wrong_answers:
  - BTC НЕДАЛЕКО ОТ МЕНЯ
  - BitInstant
  - Coinabul
explanation: |
 Это была платформа для подбора партнеров, которая была запущена 7 июня. Летом LocalBitcoins интегрировала систему эскроу, с помощью которой биткоины можно было
 временно храниться на платформе и выдаваться через SMS для оплаты покупателю. В частности, это позволило осуществлять обмен лицом к лицу, когда продавец
 продавец отпускал биткоины после получения наличных.
reviewed: true
question: Iryo shirahamwe ry’uguhindura amafaranga y’amahanga hagati y’abantu ku giti cabo ryatangujwe na Jeremias Kangas na mwenewabo muri Ruheshi 2012 ryitwa gute?
answer: Amafaranga yo mu karere
wrong_answers:
  - BTC HAFI YANJE
  - Bit Ubwo nyene
  - Coinabulu
explanation: |
 Iyi yari urubuga rwo gushaka abagenzi, rwatangujwe ku wa 7 Ruheshi Mu ci, LocalBitcoins yashizemwo uburyo bwo gushiramwo amahera, biciye ku bitcoins zashobora gukoreshwa .
 mu kanya gatoyi bifatwa n’urubuga maze bikarekurwa biciye ku butumwa bwa SMS kugira ngo bihebwe uwuguze. Canecane ivyo vyatuma umuntu ashobora guhanahana amakuru amaso mu yandi, aho uwugurisha yoba . 
 kurekura ama bitcoins igihe amahera amaze gushika.
reviewed: true
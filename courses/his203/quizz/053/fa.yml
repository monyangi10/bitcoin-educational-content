question: نام سرویس تبادل ارز خارجی خصوصی به خصوصی که توسط جرمیاس کانگاس و برادرش در ژوئن 2012 راه‌اندازی شد، LocalBitcoins بود.
answer: لوکال بیت‌کوینز
wrong_answers:
  - BTC نزدیک من
  - بیت‌اینسنت
  - Coinabul
explanation: |
 این یک پلتفرم همسریابی بود که در ۷ ژوئن راه‌اندازی شد. در طول تابستان، LocalBitcoins یک سیستم امانت‌داری را ادغام کرد که از طریق آن بیت‌کوین‌ها می‌توانستند به طور موقت توسط پلتفرم نگهداری شوند و از طریق پیامک برای پرداخت به خریدار آزاد شوند. به‌ویژه، این امکان تبادلات حضوری را فراهم کرد، جایی که فروشنده بیت‌کوین‌ها را پس از دریافت وجه نقد آزاد می‌کرد.
reviewed: true
question: 2012年6月、ジェレミアス・カンガスと彼の兄弟が立ち上げた個人間外国為替サービスの名前は？
answer: ローカルビットコイン
wrong_answers:
  - BTC 私の近く
  - ビットインスタント
  - Coinabul
explanation: |
 これは6月7日に開始されたマッチメイキング・プラットフォームである。夏の間に、LocalBitcoinsはエスクローシステムを統合した。
 プラットフォームがビットコインを一時的に預かり、買い手への支払いのためにSMSを通じて放出することができる。特に、これは対面での交換を可能にした。
 現金が入金されると、売り手はビットコインを放出する。
reviewed: true
question: Как се наричаше услугата за обмен на валута между частни лица, стартирана от Йеремиас Кангас и брат му през юни 2012 г.?
answer: LocalBitcoins
wrong_answers:
  - BTC БЛИЗО ДО МЕН
  - BitInstant
  - Coinabul
explanation: |
 Това беше платформа за подбор на партньори, която стартира на 7 юни. През лятото LocalBitcoins интегрира система за ескроу, чрез която биткойните могат да бъдат
 временно задържани от платформата и освобождавани чрез SMS за плащане на купувача. По-специално, това даде възможност за размяна лице в лице, при която продавачът ще
 освободи биткойните, след като получи пари в брой.
reviewed: true
question: जून 2012 में जेरेमियास कांगस और उनके भाई द्वारा शुरू की गई निजी-से-निजी विदेशी मुद्रा सेवा का नाम क्या था?
answer: लोकलबिटकॉइन्स
wrong_answers:
  - मेरे पास BTC
  - बिटइंस्टेंट
  - Coinएबुल
explanation: |
 यह एक मैचमेकिंग प्लेटफॉर्म था, जिसे 7 जून को लॉन्च किया गया था। गर्मियों के दौरान, लोकलबिटकॉइन्स ने एक एस्क्रो सिस्टम को एकीकृत किया, जिसके माध्यम से बिटकॉइन को
 प्लेटफॉर्म द्वारा अस्थायी रूप से रखा जा सकता था और खरीदार को भुगतान के लिए एसएमएस के माध्यम से जारी किया जा सकता था। विशेष रूप से, इसने आमने-सामने के लेन-देन को सक्षम बनाया, जहां विक्रेता
 नकद भुगतान प्राप्त होने के बाद बिटकॉइन जारी कर देता था।
reviewed: true
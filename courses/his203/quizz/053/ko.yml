question: 2012년 6월에 제레미아스 캉가스와 그의 형제가 시작한 개인 간 외환 서비스의 이름은 무엇인가요?
answer: 로컬비트코인
wrong_answers:
  - BTC 내 주변
  - 비트인스턴트
  - Coinabul
explanation: |
 6월 7일에 출시된 매치메이킹 플랫폼입니다. 여름 동안 로컬비트코인은 에스크로 시스템을 통합했으며, 이를 통해 비트코인을 플랫폼에서 일시적으로 보관하고
 플랫폼에서 일시적으로 보유하고 있다가 구매자에게 결제할 수 있도록 SMS를 통해 공개했습니다. 특히, 이를 통해 대면 거래가 가능해졌으며, 판매자는 현금으로 비트코인을 결제한 후
 현금이 입금되면 판매자가 비트코인을 릴리스할 수 있었습니다.
reviewed: true
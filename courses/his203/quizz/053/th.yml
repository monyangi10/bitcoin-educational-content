question: ชื่อของบริการแลกเปลี่ยนเงินตราต่างประเทศแบบส่วนตัวต่อส่วนตัวที่เปิดตัวโดย Jeremias Kangas และพี่ชายของเขาในเดือนมิถุนายน 2012 คืออะไร?
answer: LocalBitcoins
wrong_answers:
  - BTC ใกล้ฉัน
  - บิทอินสแตนท์
  - Coinabul
explanation: |
 นี่เป็นแพลตฟอร์มการจับคู่ ซึ่งเปิดตัวเมื่อวันที่ 7 มิถุนายน ในช่วงฤดูร้อน LocalBitcoins ได้รวมระบบเอสโครว์ ซึ่งทำให้บิตคอยน์สามารถถูกถือครองชั่วคราวโดยแพลตฟอร์มและปล่อยผ่าน SMS เพื่อชำระเงินให้กับผู้ซื้อ โดยเฉพาะอย่างยิ่งสิ่งนี้ทำให้การแลกเปลี่ยนแบบพบหน้ากันเป็นไปได้ ซึ่งผู้ขายจะปล่อยบิตคอยน์เมื่อได้รับเงินสดแล้ว
reviewed: true
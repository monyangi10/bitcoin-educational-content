question: นักเศรษฐศาสตร์ที่มีอิทธิพลคนใดวิพากษ์วิจารณ์ Bitcoin ในเดือนกันยายน 2011 สำหรับนโยบายการเงินที่เข้มงวดและก่อให้เกิดภาวะเงินฝืด?
answer: พอล ครุกแมน
wrong_answers:
  - ยานิส วารูฟากิส
  - อลัน Greenspan
  - แบร์รี่ ไอเคนกรีน
explanation: |
 พอล ครุกแมน เป็นนักเศรษฐศาสตร์นีโอเคนส์และผู้ชนะรางวัลโนเบลสาขาเศรษฐศาสตร์ในปี 2008 ในบทความที่ชื่อว่า "Golden Cyberfetters" ซึ่งเผยแพร่บนเว็บไซต์ของ New York Times เมื่อวันที่ 7 กันยายน 2011 เขาได้โต้แย้งว่า "โมเดลมาตรฐานทองคำส่วนตัว" ของ Bitcoin จะนำไปสู่การล่มสลายของมันในฐานะสื่อกลางในการแลกเปลี่ยน
reviewed: true
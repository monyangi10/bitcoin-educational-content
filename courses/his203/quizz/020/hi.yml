question: किस प्रभावशाली अर्थशास्त्री ने सितंबर 2011 में Bitcoin की कठोर, अपस्फीतिकारी मौद्रिक नीति की आलोचना की थी?
answer: पॉल क्रुगमैन
wrong_answers:
  - यानिस वरौफाकिस
  - एलन Greenस्पैन
  - बैरी आइचेनग्रीन
explanation: |
 पॉल क्रुगमैन नव-कीनेसियन अर्थशास्त्री हैं और 2008 के अर्थशास्त्र के नोबेल पुरस्कार के विजेता हैं। 7 सितंबर, 2011 को न्यूयॉर्क टाइम्स की वेबसाइट पर प्रकाशित "गोल्डन साइबरफेटर्स" नामक एक लेख में, उन्होंने तर्क दिया कि Bitcoin का "निजी स्वर्ण मानक मॉडल" विनिमय के माध्यम के रूप में इसके पतन का कारण बनेगा।
reviewed: true
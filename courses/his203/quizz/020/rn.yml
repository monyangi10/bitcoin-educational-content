question: Ni uwuhe muhinga mu vy’ubutunzi afise akosho kanini yaneguye Bitcoin muri Nzero 2011 kubera politike yayo y’amahera idahinduka kandi itera imbere?
answer: Paulo Krugmani
wrong_answers:
  - Yanis Varoufákis
  - Alan GW-igihe kimwe
  - Bari Eyichengreen
explanation: |
 Paul Krugman ni umuhinga mu vy’ubutunzi w’umunya Keynes, akaba yararonse igihembo ca Nobel mu vy’ubutunzi mu 2008. Mu kiganiro citwa "Abanyamibabaro b'inzahabu", casohowe ku kinyamakuru New York .
 Urubuga rwa Times ku wa 7 Nzero 2011, yavuze ko "umurongo w'inzahabu wigenga" wa Bitcoin uzotuma ipfa nk'uburyo bwo guhinduranya.
reviewed: true
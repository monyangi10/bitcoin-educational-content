question: 2011年9月、Bitcoinの硬直的でデフレ的な金融政策を批判した影響力のあるエコノミストは？
answer: ポール・クルーグマン
wrong_answers:
  - ヤニス・ヴァルーファキス
  - アラン・Greenスパン
  - バリー・アイケングリーン
explanation: |
 ポール・クルーグマンは新ケインズ派の経済学者で、2008年にノーベル経済学賞を受賞した。2011年9月7日、ニューヨーク・タイムズのウェブサイトに掲載された「黄金のサイバーフェッター」と題する記事の中で
 Bitcoinの「私的金本位制モデル」は、交換手段としての金本位制の終焉につながると主張している。
reviewed: true
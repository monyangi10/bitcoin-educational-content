question: Welke invloedrijke econoom bekritiseerde Bitcoin in september 2011 voor haar rigide, deflatoire monetaire beleid?
answer: Paul Krugman
wrong_answers:
  - Yánis Varoufákis
  - Alan Greenspan
  - Barry Eichengreen
explanation: |
 Paul Krugman is een neo-Keynesiaans econoom en winnaar van de Nobelprijs voor Economie in 2008. In een artikel getiteld "Gouden Cyberfetters", gepubliceerd op de website van de New York
 Times op 7 september 2011, stelt hij dat het "private goudstandaardmodel" van Bitcoin zal leiden tot de ondergang van de munt als ruilmiddel.
reviewed: true
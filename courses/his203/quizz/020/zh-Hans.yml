question: 2011 年 9 月，哪位有影响力的经济学家批评了 Bitcoin 的僵化通货紧缩货币政策？
answer: 保罗-克鲁格曼
wrong_answers:
  - 亚尼斯-瓦鲁法基斯
  - Alan Greenspan
  - 巴里-艾克格林
explanation: |
 保罗-克鲁格曼是新凯恩斯主义经济学家，2008 年诺贝尔经济学奖得主。2011 年 9 月 7 日，他在《纽约时报》网站上发表了一篇题为 "金色网络羁绊 "的文章。
 他在 2011 年 9 月 7 日发表在《纽约时报》网站上的一篇题为 "Golden Cyberfetters "的文章中认为，Bitcoin 的 "私人金本位模式 "将导致其作为交易媒介的消亡。
reviewed: true
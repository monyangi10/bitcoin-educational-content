question: Eylül 2011'de hangi etkili ekonomist Bitcoin'ı katı ve deflasyonist para politikası nedeniyle eleştirmiştir?
answer: Paul Krugman
wrong_answers:
  - Yánis Varoufákis
  - Alan Greenspan
  - Barry Eichengreen
explanation: |
 Paul Krugman neo-Keynesyen bir ekonomist ve 2008 Nobel Ekonomi Ödülü sahibi. New York'ta yayınlanan "Golden Cyberfetters" başlıklı makalesinde
 Times internet sitesine 7 Eylül 2011 tarihinde verdiği demeçte, Bitcoin'nin "özel altın standardı modelinin" bir değişim aracı olarak ölümüne yol açacağını savundu.
reviewed: true
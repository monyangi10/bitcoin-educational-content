question: 2011년 9월에 Bitcoin의 경직된 디플레이션 통화 정책에 대해 비판한 영향력 있는 경제학자는?
answer: 폴 크루그먼
wrong_answers:
  - 야니스 바루파키스
  - Alan Greenspan
  - 배리 아이청그린
explanation: |
 폴 크루그먼은 신케인즈주의 경제학자이자 2008년 노벨 경제학상 수상자입니다. 2011년 9월 7일 뉴욕타임즈 웹사이트에 게재된 "황금 사이버 족쇄"라는 제목의 기사에서 그는
 2011년 9월 7일, 그는 Bitcoin의 "사적 금본위제 모델"이 교환 수단으로서 소멸할 것이라고 주장했습니다.
reviewed: true
question: Nhà kinh tế học có tầm ảnh hưởng nào đã chỉ trích Bitcoin vào tháng 9 năm 2011 vì chính sách tiền tệ cứng nhắc và gây giảm phát của nó?
answer: Paul Krugman
wrong_answers:
  - Yánis Varoufákis
  - Alan Greenspan
  - Barry Eichengreen
explanation: |
 Paul Krugman là một nhà kinh tế học theo trường phái tân Keynes và là người đoạt giải Nobel Kinh tế năm 2008. Trong một bài báo có tựa đề "Những xiềng xích vàng trên mạng", được đăng trên trang web của tờ New York Times vào ngày 7 tháng 9 năm 2011, ông lập luận rằng "mô hình tiêu chuẩn vàng tư nhân" của Bitcoin sẽ dẫn đến sự sụp đổ của nó như một phương tiện trao đổi.
reviewed: true
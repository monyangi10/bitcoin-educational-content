question: Кой влиятелен икономист критикува Bitcoin през септември 2011 г. за нейната твърда, дефлационна парична политика?
answer: Пол Кругман
wrong_answers:
  - Янис Варуфакис
  - Алън Greenspan
  - Бари Айхенгрийн
explanation: |
 Пол Кругман е неокейнсиански икономист и носител на Нобелова награда за икономика за 2008 г. В статия, озаглавена "Златни кибритени клечки", публикувана в New York
 Таймс на 7 септември 2011 г., той твърди, че "частният модел на златния стандарт" на Bitcoin ще доведе до неговата смърт като средство за размяна.
reviewed: true
question: Ekonom berpengaruh mana yang mengkritik Bitcoin pada bulan September 2011 karena kebijakan moneternya yang kaku dan deflasi?
answer: Paul Krugman
wrong_answers:
  - Yánis Varoufákis
  - Alan Greenspan
  - Barry Eichengreen
explanation: |
 Paul Krugman adalah seorang ekonom neo-Keynesian dan pemenang Hadiah Nobel Ekonomi 2008. Dalam sebuah artikel berjudul "Golden Cyberfetters", yang diterbitkan di situs web New York
 Times pada tanggal 7 September 2011, ia berpendapat bahwa "model standar emas pribadi" Bitcoin akan menyebabkan kehancurannya sebagai alat tukar.
reviewed: true
question: Ni mchumi gani mwenye ushawishi mkubwa aliyeikosoa Bitcoin mnamo Septemba 2011 kwa sera yake ngumu ya fedha na ya kupunguza bei?
answer: Paul Krugman
wrong_answers:
  - Yánis Varoufákis
  - Alan Greenspan
  - Barry Eichengreen
explanation: |
 Paul Krugman ni mchumi wa Keynes ambaye ni neo-Kenesia na mshindi wa Tuzo ya Nobel ya Uchumi ya 2008. Katika makala yenye kichwa "Golden Cyberfetters", iliyochapishwa kwenye tovuti ya New York
 Times mnamo Septemba 7, 2011, alisema kwamba "mfumo wa kiwango cha dhahabu binafsi" wa Bitcoin utasababisha kuangamia kwake kama njia ya kubadilishana.
reviewed: true
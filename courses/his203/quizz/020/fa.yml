question: کدام اقتصاددان برجسته در سپتامبر 2011 از Bitcoin به دلیل سیاست پولی سختگیرانه و ضد تورمی آن انتقاد کرد؟
answer: پل کروگمن
wrong_answers:
  - یانیس واروفاکیس
  - آلن Greenspan
  - بری آیکنگرین
explanation: |
 پل کروگمن یک اقتصاددان نئوکینزی و برنده جایزه نوبل اقتصاد در سال 2008 است. او در مقاله‌ای با عنوان "زنجیرهای طلایی سایبری"، که در تاریخ 7 سپتامبر 2011 در وب‌سایت نیویورک تایمز منتشر شد، استدلال کرد که "مدل استاندارد طلای خصوصی" Bitcoin به نابودی آن به عنوان یک واسطه مبادله منجر خواهد شد.
reviewed: true
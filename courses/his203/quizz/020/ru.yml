question: Какой влиятельный экономист в сентябре 2011 года раскритиковал Bitcoin за жесткую, дефляционную монетарную политику?
answer: Пол Кругман
wrong_answers:
  - Янис Варуфакис
  - Алан Greenспан
  - Барри Айхенгрин
explanation: |
 Пол Кругман - экономист-неокейнсианец, лауреат Нобелевской премии по экономике 2008 года. В статье под названием "Золотые киберфетры", опубликованной на сайте New York
 Times 7 сентября 2011 года, он утверждал, что "частная модель золотого стандарта" Bitcoin приведет к гибели валюты как средства обмена.
reviewed: true
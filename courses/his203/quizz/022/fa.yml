question: نوآوری مالی اصلی ارائه شده توسط پلتفرم Bitcoinica، که در سپتامبر 2011 توسط کارآفرین جوان چینی ژو تونگ راه‌اندازی شد، چه بود؟
answer: اهرم و فروش استقراضی
wrong_answers:
  - انتشار سهام و اوراق قرضه
  - وام با بهره وثیقه‌ای
  - تقریباً تبادل نقدی فوری
explanation: |
 Bitcoinica اولین پلتفرم در اکوسیستم بود که معاملات مارجین را ارائه داد، که به مشتریان امکان استفاده از اهرم برای افزایش سود (و زیان) و فروش استقراضی برای شرط‌بندی بر روی کاهش قیمت سهام را می‌داد. پس از بسته شدن آن، این نوع خدمات توسط پلتفرم Bitfinex که در اکتبر 2012 راه‌اندازی شد و بر اساس همان کد منبع بود، به عهده گرفته شد.
reviewed: true
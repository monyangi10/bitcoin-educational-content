question: What was the main financial innovation offered by the Bitcoinica platform, launched in September 2011 by young Chinese entrepreneur Zhou Tong?
answer: Leverage and short selling
wrong_answers:
  - Issuing shares and bonds
  - The collateralized interest loan
  - Almost instant cash exchange
explanation: |
 Bitcoinica was the first platform in the ecosystem to offer margin trading, which enabled customers to use leverage to amplify their gains (and losses), and to go short to bet on a falling share price. After its closure, this type of service was taken over by the Bitfinex platform, which was launched in October 2012 and was based on the same source code.

question: В чем заключалась главная финансовая инновация платформы Bitcoinica, запущенной в сентябре 2011 года молодым китайским предпринимателем Чжоу Туном?
answer: Кредитное плечо и короткие продажи
wrong_answers:
  - Выпуск акций и облигаций
  - Обеспеченный процентный кредит
  - Почти мгновенный обмен наличных
explanation: |
 Bitcoinica была первой платформой в экосистеме, предлагавшей маржинальную торговлю, что позволяло клиентам использовать кредитное плечо для увеличения прибыли (и убытков), а также делать короткие ставки на падение цены акций
 делать короткие ставки на падение цены акций. После ее закрытия этот вид услуг перешел к платформе Bitfinex, которая была запущена в октябре 2012 года и
 основанная на том же исходном коде.
reviewed: true
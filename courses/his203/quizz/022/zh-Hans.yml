question: 2011 年 9 月，中国青年企业家周彤推出了 Bitcoinica 平台，该平台的主要金融创新是什么？
answer: 杠杆和卖空
wrong_answers:
  - 发行股票和债券
  - 抵押利息贷款
  - 几乎即时兑换现金
explanation: |
 Bitcoinica 是生态系统中第一个提供保证金交易的平台，客户可以利用杠杆放大收益（和亏损），并在股价下跌时做空赌注。
 做空，押注股价下跌。该平台关闭后，此类服务由 2012 年 10 月推出的 Bitfinex 平台接管。
 该平台于 2012 年 10 月推出，基于相同的源代码。
reviewed: true
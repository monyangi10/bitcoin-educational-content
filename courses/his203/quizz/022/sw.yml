question: Ni uvumbuzi gani mkuu wa kifedha uliotolewa na jukwaa la Bitcoinica, uliozinduliwa mnamo Septemba 2011 na mjasiriamali kijana wa China Zhou Tong?
answer: Urahisi na uuzaji mfupi
wrong_answers:
  - Kutoa hisa na dhamana
  - Mkopo wa riba uliowekwa dhamana
  - Ubadilishaji wa pesa taslimu karibu mara moja
explanation: |
 Bitcoinica ilikuwa jukwaa la kwanza katika mfumo ikolojia kutoa biashara ya faida, ambayo iliwawezesha wateja kutumia faida ili kuongeza faida zao (na hasara), na kuacha kuweka dau kwenye bei ya hisa inayoshuka. Baada ya kufungwa kwake, aina hii ya huduma ilichukuliwa na jukwaa la Bitfinex, ambalo lilizinduliwa Oktoba 2012 na lilikuwa na msingi wa msimbo huo huo wa chanzo.
reviewed: true
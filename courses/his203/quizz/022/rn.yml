question: Ni igiki gihambaye mu vy’ubutunzi catanzwe n’urubuga rwa Bitcoinica, rwatangujwe muri Nzero 2011 n’umunyamigambi akiri muto w’Umushinwa yitwa Zhou Tong?
answer: Gukoresha neza no kugurisha bigufi
wrong_answers:
  - Gutanga imigabane n'amabondi
  - Inguzanyo y'inyungu y'ingwati
  - Hafi y'uguhindura amahera
explanation: |
 Bitcoinica ni yo yari urubuga rwa mbere mu bidukikije rwo gutanga ubudandaji bw’amahera, ivyo bikaba vyatumye abakiriya bashobora gukoresha ubuhinga bwo kwongerera inyungu zabo (n’ibihombo), no kugenda .
 mugufi kugira ngo ubeshe ku giciro c’imigabane kigwa. Inyuma y’aho ipfungiwe, ubwo bwoko bw’ibikorwa bwaciye bufatwa n’urubuga rwa Bitfinex, rwatangujwe mu kwezi kwa Gitugutu 2012 n’2012. 
 yari ishingiye kuri iyo kode nyene y’inkomoko.
reviewed: true
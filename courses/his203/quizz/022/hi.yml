question: युवा चीनी उद्यमी झोउ टोंग द्वारा सितंबर 2011 में लॉन्च किए गए Bitcoinica प्लेटफॉर्म द्वारा पेश किया गया मुख्य वित्तीय नवाचार क्या था?
answer: लीवरेज और शॉर्ट सेलिंग
wrong_answers:
  - शेयर और बांड जारी करना
  - संपार्श्विक ब्याज ऋण
  - लगभग तुरंत नकद विनिमय
explanation: |
 Bitcoinica इकोसिस्टम में मार्जिन ट्रेडिंग की सुविधा देने वाला पहला प्लेटफॉर्म था, जिसने ग्राहकों को लाभ (और हानि) बढ़ाने के लिए लीवरेज का उपयोग करने और शेयर की गिरती कीमत पर दांव लगाने के लिए शॉर्ट सेलिंग करने में सक्षम बनाया।
 इसके बंद होने के बाद, इस प्रकार की सेवा Bitfinex प्लेटफॉर्म द्वारा संभाली गई, जिसे अक्टूबर 2012 में लॉन्च किया गया था और
 यह उसी सोर्स कोड पर आधारित था।
reviewed: true
question: 2011년 9월 중국의 젊은 기업가 저우퉁이 출시한 Bitcoinica 플랫폼이 제공하는 주요 금융 혁신은 무엇인가요?
answer: 레버리지 및 공매도
wrong_answers:
  - 주식 및 채권 발행
  - 담보 이자 대출
  - 거의 즉각적인 현금 교환
explanation: |

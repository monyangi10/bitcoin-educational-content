question: Каква е основната финансова иновация, предлагана от платформата Bitcoinica, стартирана през септември 2011 г. от младия китайски предприемач Джоу Тонг?
answer: Ливъридж и къси продажби
wrong_answers:
  - Емитиране на акции и облигации
  - Заемът с обезпечена лихва
  - Почти незабавен обмен на пари в брой
explanation: |
 Bitcoinica беше първата платформа в екосистемата, която предлагаше маржин търговия, което позволи на клиентите да използват ливъридж, за да увеличат печалбите (и загубите) си и да
 къси позиции, за да заложат на падаща цена на акциите. След нейното закриване този тип услуги бяха поети от платформата Bitfinex, която беше пусната през октомври 2012 г. и
 се основаваше на същия изходен код.
reviewed: true
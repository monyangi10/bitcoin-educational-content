question: นวัตกรรมทางการเงินหลักที่เสนอโดยแพลตฟอร์ม Bitcoinica ซึ่งเปิดตัวในเดือนกันยายน 2011 โดยผู้ประกอบการชาวจีนหนุ่ม Zhou Tong คืออะไร?
answer: การใช้เลเวอเรจและการขายชอร์ต
wrong_answers:
  - การออกหุ้นและพันธบัตร
  - เงินกู้ดอกเบี้ยที่มีหลักประกัน
  - แลกเปลี่ยนเงินสดเกือบจะทันที
explanation: |
 Bitcoinica เป็นแพลตฟอร์มแรกในระบบนิเวศที่เสนอการซื้อขายมาร์จิ้น ซึ่งช่วยให้ลูกค้าใช้เลเวอเรจเพื่อขยายผลกำไร (และขาดทุน) และสามารถทำการขายชอร์ตเพื่อเดิมพันกับราคาหุ้นที่ลดลง หลังจากการปิดตัวลง บริการประเภทนี้ถูกเข้ามาดูแลโดยแพลตฟอร์ม Bitfinex ซึ่งเปิดตัวในเดือนตุลาคม 2012 และใช้โค้ดต้นฉบับเดียวกัน
reviewed: true
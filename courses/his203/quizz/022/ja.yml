question: 2011年9月に中国の若手起業家、周通が立ち上げたBitcoinicaプラットフォームが提供した主な金融イノベーションは何だったのか？
answer: レバレッジと空売り
wrong_answers:
  - 株式および債券の発行
  - 利子担保ローン
  - ほぼ即時の現金交換
explanation: |
 BitcoiniCaは、エコシステムの中で初めて信用取引を提供したプラットフォームであり、顧客はレバレッジを利用して利益（および損失）を拡大したり、株価の下落に賭けて空売りをしたりすることができる。
 株価の下落に賭けるショートも可能だった。閉鎖後、この種のサービスは2012年10月に開始されたBitfinexプラット フォームに引き継がれた。
 が引き継いだ。
reviewed: true
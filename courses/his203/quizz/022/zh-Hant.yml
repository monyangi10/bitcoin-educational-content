question: 由中國年輕企業家周彤於 2011 年 9 月推出的 Bitcoinica 平台所提供的主要金融創新是什麼？
answer: 槓桿與賣空
wrong_answers:
  - 發行股份及債券
  - 抵押利息貸款
  - 幾乎可即時兌換現金
explanation: |
 Bitcoinica 是生態系統中第一個提供保證金交易的平台，客戶可以利用槓桿放大收益（和虧損），並在股價下跌時做空以押注。
 做空，押注股價下跌。在其關閉之後，此類服務由 Bitfinex 平台接管，該平台於 2012 年 10 月推出，基於相同的原始碼。
 是基於相同的原始碼。
reviewed: true
question: طرح Pay-to-Script-Hash (P2SH) شامل چه مواردی است؟
answer: قفل کردن وجوه با هش یک اسکریپت، که باید هنگام باز کردن قفل اجرا شود
wrong_answers:
  - نیاز به M امضا از N شرکت‌کننده برای مجاز کردن خرج شدن خروجی تراکنش
  - وابسته کردن خرج کردن بیت‌کوین‌ها به ارائه امضایی که به یک کلید عمومی واحد مرتبط است
  - نوشتن داده‌های دلخواه بر روی بلاکچین با غیرقابل خرج کردن UTXO
explanation: |
 این شامل پرداخت برای یک هش اسکریپت و ارائه‌ی همان اسکریپت هنگام باز کردن قفل وجوه است. چیزی که آن را از پیشنهاد OP_EVAL متمایز می‌کند این است که به‌طور خودکار توسط ماشین مجازی شناسایی می‌شود، به‌طوری که می‌تواند بدون نیاز به هیچ دستورالعمل صریحی اجرا شود.
reviewed: true
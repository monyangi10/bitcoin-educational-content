question: Pay-to-Script-Hash(P2SH) 스크립트 체계는 무엇으로 구성되나요?
answer: 잠금 해제 시 실행해야 하는 스크립트 해시로 자금 잠그기
wrong_answers:
  - 트랜잭션 결과물의 지출을 승인하기 위해 N명의 참여자 중 M명의 서명이 필요합니다
  - 비트코인의 사용은 단일 공개 키에 연결된 서명을 제공하는 것에 의존합니다
  - UTXO를 쓸 수 없게 만들어 블록체인에 임의의 데이터 쓰기
explanation: |
 여기에는 스크립트 해시에 대한 비용을 지불하고 자금을 잠금 해제할 때 해당 스크립트를 제공하는 것이 포함됩니다. OP_EVAL 제안과 다른 점은 다음과 같습니다
 가상 머신이 자동으로 인식하여 명시적인 지시 없이도 실행할 수 있다는 점입니다.
reviewed: true
question: От какво се състои схемата на сценария Pay-to-Script-Hash (P2SH)?
answer: Заключване на средства с хеш на скрипт, който трябва да се изпълни при отключване
wrong_answers:
  - Изискване на M подписа от N участника, за да се разреши изразходването на резултатите от транзакцията
  - Поставяне на разходите за биткойни в зависимост от предоставянето на подпис, свързан с един публичен ключ
  - Записване на произволни данни в блокчейна, като UTXO не може да се харчи
explanation: |
 Това включва плащане за хеш скрипт и предоставяне на споменатия скрипт при отключване на средствата. Това, което го отличава от предложението на OP_EVAL, е, че то е
 разпознава автоматично от виртуалната машина, така че може да бъде изпълнен без необходимост от изрични инструкции.
reviewed: true
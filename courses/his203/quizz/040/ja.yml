question: Pay-to-Script-Hash（P2SH）の脚本スキームはどのようなものですか？
answer: 資金をスクリプトのハッシュでロックする。
wrong_answers:
  - N人の参加者のうちM人の署名を必要とし、トランザクション出力の使用を承認する。
  - ビットコインの使用を、単一の公開鍵にリンクされた署名の提供に依存させる。
  - UTXOを消費不可能にすることで、ブロックチェーン上に任意のデータを書き込む。
explanation: |
 これは、スクリプト・ハッシュの代金を支払い、資金のロックを解除する際に当該スクリプトを提供するというものである。OP_EVALの提案と異なるのは、以下の点である。
 仮想マシンによって自動的に認識され、明示的な指示を必要とせずに実行できることである。
reviewed: true
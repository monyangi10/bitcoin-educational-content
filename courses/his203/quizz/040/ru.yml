question: Из чего состоит схема сценария Pay-to-Script-Hash (P2SH)?
answer: Блокировка средств с помощью хэша скрипта, который должен быть выполнен при разблокировке
wrong_answers:
  - Требуется M подписей из N участников, чтобы санкционировать расходование средств, полученных в результате транзакции
  - Сделать трату биткоинов зависимой от предоставления подписи, связанной с одним открытым ключом
  - Запись произвольных данных в блокчейн, сделав UTXO нерасходуемым
explanation: |
 Это предполагает оплату хэша скрипта и предоставление этого скрипта при разблокировке средств. От предложения OP_EVAL его отличает то, что он
 автоматически распознается виртуальной машиной, поэтому может выполняться без каких-либо явных инструкций.
reviewed: true
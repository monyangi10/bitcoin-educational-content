question: Pay-to-Script-Hash (P2SH) स्क्रिप्ट योजना में क्या-क्या शामिल है?
answer: फंड को स्क्रिप्ट के हैश से लॉक करना, जिसे अनलॉक करते समय निष्पादित किया जाना चाहिए।
wrong_answers:
  - लेनदेन के परिणाम को खर्च करने के लिए अधिकृत करने हेतु N प्रतिभागियों में से M हस्ताक्षरों की आवश्यकता होती है।
  - बिटकॉइन खर्च करने को एक ही सार्वजनिक कुंजी से जुड़े हस्ताक्षर प्रदान करने पर निर्भर बनाना
  - UTXO को गैर-खर्च योग्य बनाकर ब्लॉकचेन पर मनमाना डेटा लिखना
explanation: |
 इसमें स्क्रिप्ट हैश के लिए भुगतान करना और फंड अनलॉक करते समय उक्त स्क्रिप्ट प्रदान करना शामिल है। OP_EVAL प्रस्ताव से इसका अंतर यह है कि इसे वर्चुअल मशीन द्वारा स्वचालित रूप से पहचाना जाता है, जिससे इसे किसी स्पष्ट निर्देश की आवश्यकता के बिना निष्पादित किया जा सकता है।
reviewed: true
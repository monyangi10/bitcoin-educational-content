  - Suvaliste andmete kirjutamine plokiahelasse, muutes UTXO mitte-taotlevaikseks
explanation: |
 See hõlmab skripti hashi eest maksmist ja nimetatud skripti esitamist rahaliste vahendite avamisel. OP_EVAL ettepanekust eristab seda see, et see on
 virtuaalmasin tunneb seda automaatselt ära, nii et seda saab täita ilma selgesõnaliste juhisteta.

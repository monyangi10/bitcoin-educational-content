question: โครงร่างสคริปต์ Pay-to-Script-Hash (P2SH) ประกอบด้วยอะไรบ้าง?
answer: การล็อกเงินด้วยแฮชของสคริปต์ ซึ่งต้องดำเนินการเมื่อทำการปลดล็อก
wrong_answers:
  - ต้องการลายเซ็น M จากผู้เข้าร่วม N คนเพื่ออนุมัติการใช้จ่ายผลลัพธ์ของธุรกรรม
  - ทำให้การใช้จ่ายบิตคอยน์ขึ้นอยู่กับการให้ลายเซ็นที่เชื่อมโยงกับคีย์สาธารณะเดียว
  - การเขียนข้อมูลตามอำเภอใจบนบล็อกเชนโดยทำให้ UTXO ไม่สามารถใช้จ่ายได้
explanation: |
 สิ่งนี้เกี่ยวข้องกับการจ่ายเงินสำหรับแฮชสคริปต์และการให้สคริปต์ดังกล่าวเมื่อปลดล็อกเงิน สิ่งที่ทำให้แตกต่างจากข้อเสนอ OP_EVAL คือมันถูกจดจำโดยอัตโนมัติโดยเครื่องเสมือน ดังนั้นจึงสามารถดำเนินการได้โดยไม่จำเป็นต้องมีคำสั่งที่ชัดเจนใดๆ
reviewed: true
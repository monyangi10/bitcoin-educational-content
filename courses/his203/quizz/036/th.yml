question: "\"pool hopping\" เกี่ยวข้องกับอะไรสำหรับนักขุดที่มอบหมายอัตราแฮชของเขาให้กับพูล mining?"
answer: การตัดการเชื่อมต่อจากกลุ่ม mining เมื่อมีการส่งหุ้นจำนวนหนึ่งในรอบหนึ่ง ๆ และเปลี่ยนเส้นทางพลังการประมวลผลไปยังบัญชีของคุณเองหรือไปยังกลุ่ม mining อื่น
wrong_answers:
  - การนำโปรโตคอลการสื่อสารที่ใช้แบนด์วิดท์สูงมาใช้เพื่อโต้ตอบกับพูล mining เพื่อที่จะลดหุ้นที่ล้าสมัยโดยการปรับปรุงการประกาศบล็อกใหม่ให้มีประสิทธิภาพมากขึ้น
  - ดำเนินการทำธุรกรรมปลอมหลายรายการภายในกลุ่ม mining เพื่อจำลองการโอนความเป็นเจ้าของบิตคอยน์และเพิ่มความเป็นส่วนตัวของนักขุดที่ได้รับมอบหมาย
  - การเขียนชื่อของพูล mining ในช่องป้อนข้อมูลของธุรกรรมรางวัลของบล็อกที่ขุดได้ เพื่อทำให้การดำเนินงานของพูล mining มีความโปร่งใสมากขึ้น
explanation: |
 วิธีนี้ถูกอธิบายโดย Raulo ในเดือนกุมภาพันธ์ 2011 ซึ่งเขาประเมินว่าบุคคลสามารถได้รับบิตคอยน์มากขึ้น 28% ด้วยวิธีนี้ มันเป็นแรงจูงใจให้มีการแนะนำคะแนน "ป้องกันการโกง" ภายในสหกรณ์ Slush
reviewed: true
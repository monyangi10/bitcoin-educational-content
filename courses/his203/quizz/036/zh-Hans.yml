question: 对于将哈希率委托给 mining 池的矿工来说，"跳池 "涉及什么？
answer: 一旦在一个周期内提交了一定数量的份额，即从 mining 池中断开连接，并将计算能力转到自己的账户或另一个 mining 池中
wrong_answers:
  - 采用带宽密集型通信协议与 mining 池进行交互，以通过简化新区块的公告来减少过时的份额
  - 在 mining 矿池中进行若干虚假交易，以模拟比特币所有权的转移，并提高受委托矿工的保密性
  - 在已开采区块的奖励交易输入字段中写入 mining 数据池的名称，使 mining 数据池的运行更加透明

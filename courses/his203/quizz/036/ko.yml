question: 채굴자가 자신의 해시 레이트를 mining 풀에 위임하는 "풀 호핑"이란 무엇인가요?
answer: 한 주기에 특정 수의 공유가 제출되면 mining 풀에서 연결을 끊고 컴퓨팅 성능을 자신의 계정이나 다른 mining 풀로 리디렉션합니다
wrong_answers:
  - 새로운 블록의 발표를 간소화하여 쓸모없는 지분을 줄이기 위해 대역폭 집약적인 통신 프로토콜을 채택하여 mining 풀과 상호 작용합니다
  - 비트코인 소유권 이전을 시뮬레이션하고 위임된 채굴자의 기밀성을 높이기 위해 mining 풀 내에서 여러 가상의 거래를 수행합니다
  - 채굴된 블록의 보상 거래의 입력 필드에 mining 풀의 이름을 작성하여 mining 풀의 운영을 보다 투명하게 만듭니다
explanation: |
 이 방법은 2011년 2월 라울로가 설명한 것으로, 개인이 이 방법으로 28% 더 많은 비트코인을 얻을 수 있다고 추정했습니다. 이는 슬러시 협동조합 내에서
 슬러시 협동조합 내에서 "부정행위 방지" 점수를 도입하게 되었습니다.

question: '"پول هاپینگ" برای یک ماینر که نرخ هش خود را به یک استخر mining واگذار می‌کند، شامل چه مواردی است؟'
answer: قطع ارتباط از یک استخر mining پس از ارسال تعداد معینی سهم در یک چرخه، و هدایت قدرت محاسباتی به حساب خود یا به یک استخر mining دیگر
wrong_answers:
  - اتخاذ یک پروتکل ارتباطی با پهنای باند بالا برای تعامل با استخر mining به منظور کاهش سهام منسوخ شده با ساده‌سازی اعلام بلوک‌های جدید
  - انجام چندین تراکنش ساختگی در استخر mining برای شبیه‌سازی انتقال مالکیت بیت‌کوین و افزایش محرمانگی ماینرهای واگذار شده
  - نوشتن نام استخر mining در فیلد ورودی تراکنش پاداش بلوک استخراج‌شده، برای شفاف‌تر کردن عملکرد استخرهای mining
explanation: |
 این روش توسط رائولو در فوریه ۲۰۱۱ توصیف شد، که تخمین زد یک فرد می‌تواند به این روش ۲۸٪ بیت‌کوین بیشتری به دست آورد. این موضوع انگیزه‌ای برای معرفی یک امتیاز "ضد تقلب" در همکاری اسلاش شد.
reviewed: true
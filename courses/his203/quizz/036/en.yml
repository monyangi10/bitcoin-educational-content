question: What does "pool hopping" involve for a miner delegating his hash rate to a cooperative?
answer: Disconnect from a cooperative once a certain number of shares have been submitted in a cycle, and redirect computing power to your own account or to another cooperative
wrong_answers:
  - Adopt a bandwidth-intensive communication protocol to interact with cooperatives in order to reduce obsolete shares by streamlining the announcement of new blocks
  - Carry out several fictitious transactions within the cooperative to simulate a transfer of bitcoin ownership and increase the confidentiality of the delegated miners
  - Write the name of the cooperative in the input field of the reward transaction of the mined block, to make the operation of cooperatives more transparent
explanation: |
 This method was described by Raulo in February 2011, who estimated that an individual could obtain 28% more bitcoins this way. It motivated the introduction of an "anti-cheating" score within the Slush cooperative.

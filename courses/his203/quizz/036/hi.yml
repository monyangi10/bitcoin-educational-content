question: एक माइनर द्वारा अपनी हैश रेट को mining पूल में डेलीगेट करने के लिए "पूल हॉपिंग" में क्या शामिल होता है?
answer: एक चक्र में निश्चित संख्या में शेयर सबमिट हो जाने के बाद mining पूल से डिस्कनेक्ट करना और कंप्यूटिंग पावर को अपने खाते या किसी अन्य mining पूल में पुनर्निर्देशित करना।
wrong_answers:
  - mining पूल के साथ इंटरैक्ट करने के लिए बैंडविड्थ-इंटेंसिव कम्युनिकेशन प्रोटोकॉल को अपनाना, नए ब्लॉकों की घोषणा को सुव्यवस्थित करके अप्रचलित शेयरों को कम करने में सहायक होगा।
  - बिटकॉइन के स्वामित्व के हस्तांतरण का अनुकरण करने और प्रतिनिधि खनिकों की गोपनीयता बढ़ाने के लिए mining पूल के भीतर कई काल्पनिक लेनदेन करना।
  - माइन किए गए ब्लॉक के रिवॉर्ड ट्रांजैक्शन के इनपुट फील्ड में mining पूल का नाम लिखने से mining पूलों का संचालन अधिक पारदर्शी हो जाता है।
explanation: |
 इस विधि का वर्णन राउलो ने फरवरी 2011 में किया था, जिन्होंने अनुमान लगाया था कि इस तरीके से कोई व्यक्ति 28% अधिक बिटकॉइन प्राप्त कर सकता है। इसी से प्रेरित होकर स्लश कोऑपरेटिव में "धोखाधड़ी रोधी" स्कोर की शुरुआत की गई।
reviewed: true
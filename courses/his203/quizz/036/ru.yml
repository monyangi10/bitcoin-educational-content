question: Что означает "прыжок через пул" для майнера, делегирующего свой хэшрейт пулу mining?
answer: Отключение от пула mining после подачи определенного количества акций в цикле и перенаправление вычислительных мощностей на свой счет или в другой пул mining
wrong_answers:
  - Принятие протокола связи с высокой пропускной способностью для взаимодействия с пулом mining с целью сокращения устаревших долей за счет упрощения объявления новых блоков
  - Проведение нескольких фиктивных транзакций в пуле mining для имитации передачи прав собственности на биткоины и повышения конфиденциальности делегированных майнеров
  - Запись названия пула mining в поле ввода транзакции вознаграждения добытого блока, чтобы сделать работу пулов mining более прозрачной

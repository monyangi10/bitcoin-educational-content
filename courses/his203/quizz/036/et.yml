question: Mida tähendab "basseinihüplemine" kaevuri jaoks, kes delegeerib oma hash-kiiruse mining basseini?
answer: mining-poolilt ühenduse katkestamine, kui teatud arv aktsiaid on tsükli jooksul esitatud, ja arvutusvõimsuse ümberpaigutamine oma kontole või mõnda teise mining-pooli
wrong_answers:

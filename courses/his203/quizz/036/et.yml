  - Mitme fiktiivse tehingu läbiviimine mining basseinis, et simuleerida bitcoini omandiõiguse üleminekut ja suurendada delegeeritud kaevurite konfidentsiaalsust
  - mining basseini nime kirjutamine kaevandatud ploki tasustamistehingu sisendväljale, et muuta mining basseinide toimimine läbipaistvamaks

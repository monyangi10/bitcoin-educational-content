question: 對於將自己的哈希率委託給 mining 池的礦工而言，「跳池」涉及到什麼？
answer: 一旦在一個週期內提交了一定數量的份數，就會與 mining 池斷開連接，並將計算能力重新導向您自己的帳戶或另一個 mining 池
wrong_answers:
  - 採用頻寬密集型通訊協定與 mining pool 進行互動，以便透過簡化新區塊的公告來減少過時的份數
  - 在 mining 池中進行多筆虛構交易，以模擬比特幣擁有權的轉讓，並增加委託礦工的機密性
  - 在已挖掘區塊的獎勵交易輸入欄中寫入 mining pool 的名稱，使 mining pool 的運作更加透明
explanation: |
 Raulo 在 2011 年 2 月描述了這種方法，他估計個人可以用這種方式多獲得 28% 的比特幣。這促使
 Slush 合作夥伴中的 「反作弊 」分數。

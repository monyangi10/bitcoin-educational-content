question: Какво включва "прескачането на басейни" за миньор, който делегира своята скорост на хеширане на басейн mining?
answer: Прекъсване на връзката с пул mining след подаване на определен брой акции в рамките на един цикъл и пренасочване на изчислителната мощност към собствената ви сметка или към друг пул mining
wrong_answers:
  - Приемане на комуникационен протокол с голяма пропускателна способност за взаимодействие с пула mining с цел намаляване на остарелите дялове чрез рационализиране на обявяването на нови блокове
  - Извършване на няколко фиктивни транзакции в рамките на пула mining, за да се симулира прехвърляне на собствеността върху биткойни и да се увеличи поверителността на делегираните миньори
  - Записване на името на пула mining във входното поле на транзакцията за възнаграждение на добития блок, за да се направи работата на пуловете mining по-прозрачна
explanation: |

question: ハッシュレートをminingプールに委譲するマイナーにとって、「プールホッピング」とはどのようなものですか？
answer: miningプールから切り離し、1サイクルで一定数のシェアが提出されたら、コンピューティング・パワーを自分のアカウントまたは別のminingプールにリダイレクトする。
wrong_answers:
  - miningプールとのやりとりに帯域幅集約型の通信プロトコルを採用し、新規ブロックの発表を効率化することで陳腐化したシェアを減らす。
  - miningプール内で複数の架空取引を行い、ビットコインの所有権移転をシミュレートし、委任されたマイナーの機密性を高める。
  - miningプールの運用をより透明化するために、採掘されたブロックの報酬トランザクションの入力フィールドにminingプールの名前を書き込む。
explanation: |
 この方法は2011年2月にRauloによって説明され、彼は個人がこの方法で28％多くビットコインを入手できると推定した。この方法は
 Slush協同組合に「不正行為防止」スコアを導入するきっかけとなった。
reviewed: true
question: Ni jina gani la utani alilopewa Roger Ver kwa ajili ya kukuza kwake Bitcoin kwa bidii?
answer: Yesu wa Bitcoin
wrong_answers:
  - Nabii wa Bitcoin
  - Mwinjilisti wa Bitcoin
  - Masihi wa Bitcoin
explanation: |
 Roger Ver aliitwa "Yesu wa Bitcoin" (Bitcoin Jesus) mnamo Februari 2012 na mfanyabiashara wa Kanada GoWest, kutokana na uenezaji wake mkali wa imani ya kidini ili kukuza Bitcoin.
 
 Jina la utani lilibaki, ingawa hakulidai kamwe.
reviewed: true
question: Jaki przydomek nadano Rogerowi Verowi za jego gorliwe promowanie Bitcoin?
answer: Jezus Bitcoin
wrong_answers:
  - Prorok Bitcoin
  - Ewangelista Bitcoin
  - Bitcoin Mesjasz
explanation: |
 Roger Ver został nazwany "Jezusem Bitcoin" (Bitcoin Jesus) w lutym 2012 roku przez kanadyjskiego tradera GoWest, z powodu jego intensywnego prozelityzmu promującego Bitcoin.
 Przydomek ten przylgnął do niego, choć nigdy się do niego nie przyznał.
reviewed: true
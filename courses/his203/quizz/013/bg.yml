question: Какъв прякор е получил Роджър Вер заради ревностното си популяризиране на Bitcoin?
answer: Исус на Bitcoin
wrong_answers:
  - Пророкът на Bitcoin
  - Евангелист на Bitcoin
  - Bitcoin Месия
explanation: |
 През февруари 2012 г. канадският търговец GoWest нарече Роджър Вер "Исус на Bitcoin" (Bitcoin Jesus) заради интензивната му прозелитична дейност за популяризиране на Bitcoin.
 Прякорът му се прилепва, въпреки че той никога не го е заявявал.
reviewed: true
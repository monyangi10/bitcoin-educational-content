question: Quale soprannome fu dato a Roger Ver per la sua zelante promozione del Bitcoin?
answer: Gesù del Bitcoin
wrong_answers:
  - Il profeta del Bitcoin
  - Evangelista Bitcoin
  - Bitcoin Messia
explanation: |
 Roger Ver è stato soprannominato "il Gesù del Bitcoin" (Bitcoin Jesus) nel febbraio 2012 dal commerciante canadese GoWest, a causa del suo intenso proselitismo per la promozione del Bitcoin.
 Il soprannome gli è rimasto, anche se non l'ha mai rivendicato.
reviewed: true
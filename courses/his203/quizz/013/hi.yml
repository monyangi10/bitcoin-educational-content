question: रोजर वेर को Bitcoin के उनके उत्साही प्रचार के लिए क्या उपनाम दिया गया था?
answer: Bitcoin का यीशु
wrong_answers:
  - Bitcoin का पैगंबर
  - Bitcoin प्रचारक
  - Bitcoin मसीहा
explanation: |
 फरवरी 2012 में कनाडाई व्यापारी गोवेस्ट ने रोजर वेर को "Bitcoin का जीसस" (Bitcoin जीसस) नाम दिया, क्योंकि उन्होंने Bitcoin को बढ़ावा देने के लिए ज़ोरदार प्रचार किया था।
 यह उपनाम उनके साथ जुड़ गया, हालांकि उन्होंने इसे कभी स्वीकार नहीं किया।
reviewed: true
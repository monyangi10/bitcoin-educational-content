question: Quel surnom a été donné à Roger Ver en raison de sa promotion zélée de Bitcoin ?
answer: Le Jésus de Bitcoin
wrong_answers:
  - Le Prophète de Bitcoin
  - L'Évangéliste de Bitcoin
  - Le Messie de Bitcoin
explanation: |
 Roger Ver a été surnommé « le Jésus de Bitcoin » (Bitcoin Jesus) en février 2012 par le tradeur canadien GoWest, en raison de son prosélytisme intense pour promouvoir Bitcoin. Ce surnom lui est resté bien qu'il ne l'ait jamais revendiqué.
reviewed: false

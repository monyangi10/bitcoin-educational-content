question: Welchen Spitznamen erhielt Roger Ver für seine eifrige Förderung von Bitcoin?
answer: Bitcoins Jesus
wrong_answers:
  - Der Prophet von Bitcoin
  - Bitcoin-Evangelist
  - Bitcoin Messias
explanation: |
 Roger Ver wurde im Februar 2012 von dem kanadischen Händler GoWest als "Jesus von Bitcoin" (Bitcoin Jesus) bezeichnet, weil er intensiv für Bitcoin warb.
 Der Spitzname blieb haften, obwohl er ihn nie beanspruchte.
reviewed: true
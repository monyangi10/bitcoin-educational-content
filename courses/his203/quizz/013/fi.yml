question: Mikä lempinimi annettiin Roger Verille hänen innokkaasta Bitcoin:n edistämisestä?
answer: Bitcoin:n Jeesus
wrong_answers:
  - Bitcoin:n profeetta
  - Bitcoin evankelista
  - Bitcoin Messias
explanation: |
 Kanadalaiskauppias GoWest kutsui Roger Veriä helmikuussa 2012 "Bitcoin:n Jeesukseksi" (Bitcoin Jesus), koska hän on harjoittanut voimakasta käännytystyötä Bitcoin:n edistämiseksi.
 Lempinimi jäi, vaikka hän ei koskaan väittänytkään sitä.
reviewed: true
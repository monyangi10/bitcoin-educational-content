question: Julukan apa yang diberikan kepada Roger Ver karena semangatnya mempromosikan Bitcoin?
answer: Yesus Bitcoin
wrong_answers:
  - Nabi Bitcoin
  - Penginjil Bitcoin
  - Bitcoin Mesias
explanation: |
 Roger Ver dijuluki sebagai "Yesus Bitcoin" (Bitcoin Jesus) pada bulan Februari 2012 oleh pedagang Kanada GoWest, karena dakwahnya yang gencar untuk mempromosikan Bitcoin.
 Julukan itu melekat, meskipun ia tidak pernah mengklaimnya.
reviewed: true
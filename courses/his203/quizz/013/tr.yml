question: Roger Ver'e Bitcoin'ı gayretli bir şekilde desteklediği için hangi lakap verilmiştir?
answer: Bitcoin'in İsa'sı
wrong_answers:
  - Bitcoin'nin Peygamberi
  - Bitcoin Evangelist
  - Bitcoin Mesih
explanation: |
 Roger Ver, Bitcoin'i tanıtmak için yaptığı yoğun propaganda nedeniyle Şubat 2012'de Kanadalı tüccar GoWest tarafından "Bitcoin'in İsa'sı" (Bitcoin Jesus) olarak adlandırıldı.
 Kendisi hiçbir zaman sahiplenmese de bu lakap kalıcı oldu.
reviewed: true
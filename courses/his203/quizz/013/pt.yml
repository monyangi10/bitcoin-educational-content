question: Que alcunha foi dada a Roger Ver pela sua zelosa promoção do Bitcoin?
answer: Jesus do Bitcoin
wrong_answers:
  - O Profeta do Bitcoin
  - Evangelista Bitcoin
  - Bitcoin Messias
explanation: |
 Roger Ver foi apelidado de "o Jesus do Bitcoin" (Bitcoin Jesus) em fevereiro de 2012 pelo comerciante canadiano GoWest, devido ao seu intenso proselitismo para promover o Bitcoin.
 A alcunha pegou, embora ele nunca a tenha reivindicado.
reviewed: true
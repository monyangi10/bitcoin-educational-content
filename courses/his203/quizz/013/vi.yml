question: Roger Ver được đặt biệt danh gì vì sự nhiệt tình quảng bá Bitcoin của mình?
answer: Chúa Giê-su của Bitcoin
wrong_answers:
  - Nhà tiên tri của Bitcoin
  - Nhà truyền giáo Bitcoin
  - Đấng Messiah Bitcoin
explanation: |
 Roger Ver được nhà giao dịch người Canada GoWest đặt biệt danh là "Chúa Giê-su của Bitcoin" (Bitcoin Jesus) vào tháng 2 năm 2012, do những nỗ lực truyền bá mạnh mẽ của ông về Bitcoin.
 
 Biệt danh này đã gắn bó với ông, mặc dù ông chưa bao giờ tự nhận nó.
reviewed: true
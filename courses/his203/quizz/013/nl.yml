question: Welke bijnaam kreeg Roger Ver voor zijn ijverige promotie van Bitcoin?
answer: Bitcoin's Jezus
wrong_answers:
  - Bitcoin's Profeet
  - Bitcoin Evangelist
  - Bitcoin Messias
explanation: |
 Roger Ver werd in februari 2012 "de Jezus van Bitcoin" (Bitcoin Jesus) genoemd door de Canadese handelaar GoWest, vanwege zijn intense proselitisme om Bitcoin te promoten.
 De bijnaam bleef hangen, hoewel hij deze nooit heeft opgeëist.
reviewed: true
question: Vilket smeknamn fick Roger Ver för sin nitiska marknadsföring av Bitcoin?
answer: Bitcoin:s Jesus
wrong_answers:
  - Bitcoin:s profet
  - Bitcoin Evangelist
  - Bitcoin Messias
explanation: |
 Roger Ver kallades "Bitcoin:s Jesus" (Bitcoin Jesus) i februari 2012 av den kanadensiska handlaren GoWest, på grund av hans intensiva proselytism för att främja Bitcoin.
 Smeknamnet fastnade, även om han aldrig gjorde anspråk på det.
reviewed: true
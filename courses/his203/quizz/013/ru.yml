question: Какое прозвище было дано Роджеру Веру за его рьяное продвижение Bitcoin?
answer: Иисус Bitcoin
wrong_answers:
  - Пророк Bitcoin
  - Евангелист Bitcoin
  - Bitcoin Мессия
explanation: |
 Роджер Вер был прозван "Иисусом Bitcoin" (Bitcoin Jesus) в феврале 2012 года канадским трейдером GoWest за его активную прозелитическую деятельность по продвижению Bitcoin.
 Прозвище закрепилось за ним, хотя он никогда не заявлял об этом.
reviewed: true
question: ¿Qué apodo recibió Roger Ver por su celosa promoción de Bitcoin?
answer: Jesús de Bitcoin
wrong_answers:
  - El Profeta de Bitcoin
  - Bitcoin Evangelista
  - Bitcoin Mesías
explanation: |
 Roger Ver fue apodado "el Jesús de Bitcoin" (Bitcoin Jesus) en febrero de 2012 por el comerciante canadiense GoWest, debido a su intenso proselitismo para promover Bitcoin.
 El apodo se le quedó, aunque nunca lo reivindicó.
reviewed: true
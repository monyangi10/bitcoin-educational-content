question: Koji nadimak je dat Rogeru Veru zbog njegovog revnosnog promovisanja Bitcoin?
answer: Isus od Bitcoin
wrong_answers:
  - Prorok Bitcoin
  - Bitcoin Evangelist
  - Bitcoin Mesija
explanation: |
 Roger Ver je nazvan "Isusom Bitcoin" (Bitcoin Isus) u februaru 2012. od strane kanadskog trgovca GoWest, zbog njegovog intenzivnog propovedanja u cilju promocije Bitcoin. 
 Nadimak se zadržao, iako ga on nikada nije prisvojio.
reviewed: true
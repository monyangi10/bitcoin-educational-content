question: ฉายาอะไรที่ถูกตั้งให้กับ Roger Ver สำหรับการส่งเสริม Bitcoin อย่างกระตือรือร้น?
answer: พระเยซูของ Bitcoin
wrong_answers:
  - Bitcoin's Prophet
  - Bitcoin ผู้ประกาศข่าวประเสริฐ
  - Bitcoin เมสสิยาห์
explanation: |
 Roger Ver ได้รับฉายาว่า "พระเยซูแห่ง Bitcoin" (Bitcoin Jesus) ในเดือนกุมภาพันธ์ 2012 โดยนักเทรดชาวแคนาดา GoWest เนื่องจากการเผยแพร่อย่างเข้มข้นเพื่อโปรโมต Bitcoin ฉายานี้ติดตัวเขา แม้ว่าเขาไม่เคยอ้างสิทธิ์ก็ตาม
reviewed: true
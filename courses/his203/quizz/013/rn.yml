question: Ni izina ry’akataraboneka irihe Roger Ver yahawe kubera yariko arateza imbere Bitcoin n’umwete?
answer: Yezu wa Bitcoin
wrong_answers:
  - Umuhanuzi wa Bitcoin
  - Bitcoin Umuvugabutumwa
  - Bitcoin Mesiya
explanation: |
 Roger Ver yitwa "Yesu wa Bitcoin" (Bitcoin Yesu) muri Ruhuhuma 2012 n'umucuruzi w'umunyakanada GoWest, kubera uguhindura abantu cane kugira ngo atere imbere Bitcoin. 
 Izina ry’akataraboneka ryaragumye, naho atigeze arivuga.
reviewed: true
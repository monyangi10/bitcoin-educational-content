question: Bitcoin을 열성적으로 홍보한 로저 버에게 붙여진 별명은 무엇인가요?
answer: Bitcoin의 예수
wrong_answers:
  - Bitcoin의 예언자
  - Bitcoin 에반젤리스트
  - Bitcoin 메시아
explanation: |
 로저 버는 2012년 2월 캐나다의 트레이더인 고웨스트가 Bitcoin를 홍보하기 위해 열심히 전도한 덕분에 "Bitcoin의 예수"(Bitcoin 예수)라는 별명을 얻었습니다.
 그 별명은 그가 직접 주장한 적은 없지만 계속 이어졌습니다.
reviewed: true
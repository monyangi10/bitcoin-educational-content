question: Millise hüüdnime sai Roger Ver oma innuka Bitcoin propageerimise eest?
answer: Bitcoin Jeesus
wrong_answers:
  - Bitcoin prohvet
  - Bitcoin evangelist
  - Bitcoin Messias
explanation: |
 Roger Ver nimetati 2012. aasta veebruaris Kanada kaupleja GoWest poolt "Bitcoin Jeesuseks" (Bitcoin Jesus), kuna ta propageeris Bitcoin intensiivselt.
 See hüüdnimi jäi püsima, kuigi ta ei ole seda kunagi väitnud.
reviewed: true
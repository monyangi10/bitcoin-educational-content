question: Hvilket kallenavn fikk Roger Ver for sin nidkjære promotering av Bitcoin?
answer: Bitcoin's Jesus
wrong_answers:
  - Bitcoins profet
  - Bitcoin Evangelist
  - Bitcoin Messias
explanation: |
 Roger Ver ble kalt "Bitcoins Jesus" (Bitcoin Jesus) i februar 2012 av den kanadiske traderen GoWest, på grunn av sin intense misjonering for å fremme Bitcoin.
 Kallenavnet ble sittende fast, selv om han aldri gjorde krav på det.
reviewed: true
question: چه لقبی به راجر ور برای ترویج پرشور Bitcoin داده شد؟
answer: عیسی Bitcoin
wrong_answers:
  - پیامبر Bitcoin
  - مبلغ Bitcoin
  - Bitcoin مسیح
explanation: |
 راجر ور در فوریه ۲۰۱۲ توسط معامله‌گر کانادایی GoWest به عنوان "عیسی Bitcoin" (Bitcoin Jesus) لقب گرفت، به دلیل تبلیغات شدید او برای ترویج Bitcoin.  
 این لقب ماندگار شد، اگرچه او هرگز آن را ادعا نکرد.
reviewed: true
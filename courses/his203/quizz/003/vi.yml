question: Nền tảng Con đường Tơ lụa do Ross Ulbricht sáng lập nhanh chóng được đặt biệt danh là gì?
answer: Rừng Amazon của các loại thuốc
wrong_answers:
  - Hang động của Alibaba
  - eBay của thế giới ngầm
  - Walmart dưới lòng đất
explanation: |
 Con đường tơ lụa được đặt biệt danh như vậy vì sự giống nhau với gã khổng lồ thương mại điện tử Amazon. Biệt danh này phản ánh giao diện thân thiện với người dùng và hiệu quả của nền tảng này trong hoạt động buôn bán bất hợp pháp.
reviewed: true
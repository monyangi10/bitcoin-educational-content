question: Que alcunha foi rapidamente atribuída à plataforma Silk Road criada por Ross Ulbricht?
answer: A Amazónia das drogas
wrong_answers:
  - A caverna do Alibaba
  - O eBay da dark web
  - O Walmart subterrâneo
explanation: |
 A Silk Road foi apelidada devido à sua semelhança com o gigante do comércio eletrónico Amazon. A alcunha reflectia a interface de fácil utilização e a eficiência da plataforma para
 comércio ilegal.
reviewed: true
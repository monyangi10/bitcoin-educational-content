question: Quel surnom a été rapidement donné à la plateforme Silk Road créée par Ross Ulbricht ?
answer: L'Amazon de la drogue
wrong_answers:
  - La caverne d'Alibaba
  - Le eBay du dark web
  - Le Walmart souterrain
explanation: |
 Silk Road a été surnommée comme tel en raison de sa ressemblance avec le géant du commerce électronique Amazon. Ce surnom reflétait l'interface conviviale et l'efficacité de la plateforme pour le commerce illégal.
reviewed: false

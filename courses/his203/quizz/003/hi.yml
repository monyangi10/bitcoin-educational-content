question: रॉस उलब्रिच द्वारा निर्मित सिल्क रोड प्लेटफॉर्म को शीघ्र ही क्या उपनाम दिया गया था?
answer: दवाओं का अमेज़न
wrong_answers:
  - अलीबाबा की गुफा
  - डार्क वेब का ईबे
  - भूमिगत वॉलमार्ट
explanation: |
 सिल्क रोड को ई-कॉमर्स की दिग्गज कंपनी अमेज़न से मिलती-जुलती शक्ल के कारण यह उपनाम दिया गया था। यह उपनाम प्लेटफ़ॉर्म के उपयोगकर्ता-अनुकूल इंटरफ़ेस और अवैध व्यापार के लिए इसकी दक्षता को दर्शाता था।
 
reviewed: true
question: Jaká přezdívka se rychle vžila pro platformu Silk Road, kterou vytvořil Ross Ulbricht?
answer: Amazonka drog
wrong_answers:
  - Jeskyně společnosti Alibaba
  - EBay na temném webu
  - Podzemní obchod Walmart
explanation: |
 Silk Road byla přezdívána pro svou podobnost s gigantem v oblasti elektronického obchodování, společností Amazon. Přezdívka odrážela uživatelsky přívětivé rozhraní platformy a její efektivitu pro
 nelegálního obchodování.
reviewed: true
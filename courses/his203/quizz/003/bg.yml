question: Какъв прякор бързо получи платформата Silk Road, създадена от Рос Улбрихт?
answer: Амазонка на наркотиците
wrong_answers:
  - Пещерата на Alibaba
  - EBay на тъмната мрежа
  - Подземният магазин Walmart
explanation: |
 Пътят на коприната беше наречен така заради приликата му с гиганта в електронната търговия Amazon. Прякорът отразяваше удобния интерфейс на платформата и нейната ефективност за
 незаконна търговия.

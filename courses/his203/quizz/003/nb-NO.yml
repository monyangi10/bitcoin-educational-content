question: Hvilket kallenavn fikk raskt Silk Road-plattformen som Ross Ulbricht opprettet?
answer: Amazonas av narkotika
wrong_answers:
  - Alibabas hule
  - EBay på det mørke nettet
  - Den underjordiske Walmart
explanation: |
 Silk Road fikk kallenavnet på grunn av sin likhet med e-handelsgiganten Amazon. Kallenavnet reflekterte plattformens brukervennlige grensesnitt og effektivitet for
 ulovlig handel.
reviewed: true
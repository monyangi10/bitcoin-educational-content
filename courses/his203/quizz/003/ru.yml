question: Какое прозвище было быстро присвоено платформе Silk Road, созданной Россом Ульбрихтом?
answer: Амазонка наркотиков
wrong_answers:
  - Пещера Алибабы
  - EBay из темной паутины
  - Подпольный Walmart
explanation: |
 Silk Road получила свое прозвище за сходство с гигантом электронной коммерции Amazon. Это прозвище отражало удобный интерфейс платформы и ее эффективность для
 незаконной торговли.
reviewed: true
question: Ni izina ry’akataraboneka irihe ryahawe ningoga urubuga rwa Silk Road rwaremwe na Ross Ulbricht?
answer: Amazone y'ibiyayuramutwe
wrong_answers:
  - Isenga rya Alibaba
  - Urubuga rwa eBay rw'umwiza
  - Walmart iri munsi y'ubutaka
explanation: |
 Silk Road yari yarahawe izina ry’akataraboneka kubera ko isa n’ikigo gikomeye c’ubudandaji co kuri Internet citwa Amazon. Izina ry’akataraboneka ryerekana uburyo urubuga rukoreshwa neza n’ubushobozi bwarwo ku
 ubudandaji butemewe n’amategeko.
reviewed: true
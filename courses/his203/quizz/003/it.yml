question: Quale soprannome è stato rapidamente dato alla piattaforma Silk Road creata da Ross Ulbricht?
answer: L'Amazzonia dei farmaci
wrong_answers:
  - La grotta di Alibaba
  - L'eBay del dark web
  - Il Walmart sotterraneo
explanation: |
 Silk Road è stata soprannominata per la sua somiglianza con il gigante dell'e-commerce Amazon. Il soprannome rifletteva l'interfaccia user-friendly e l'efficienza della piattaforma per il commercio illegale
 commercio illegale.
reviewed: true
question: What nickname was quickly given to the Silk Road platform created by Ross Ulbricht?
answer: The Amazon of drugs
wrong_answers:
  - Alibaba's cave
  - The eBay of the dark web
  - The underground Walmart
explanation: |
 Silk Road was nicknamed for its resemblance to e-commerce giant Amazon. The nickname reflected the platform's user-friendly interface and efficiency for
 illegal trading.
reviewed: true

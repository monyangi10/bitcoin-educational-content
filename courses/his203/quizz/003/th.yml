question: "ถนนสายไหม"
answer: อเมซอนแห่งยา
wrong_answers:
  - ถ้ำของอาลีบาบา
  - อีเบย์ของดาร์กเว็บ
  - The underground Walmart
explanation: |
 เส้นทางสายไหมได้รับฉายาว่าเป็นเพราะความคล้ายคลึงกับยักษ์ใหญ่ด้านอีคอมเมิร์ซ Amazon ฉายานี้สะท้อนถึงอินเทอร์เฟซที่ใช้งานง่ายและประสิทธิภาพของแพลตฟอร์มสำหรับการค้าขายที่ผิดกฎหมาย

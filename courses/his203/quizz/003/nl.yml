question: Welke bijnaam kreeg het Silk Road-platform van Ross Ulbricht al snel?
answer: De Amazone van drugs
wrong_answers:
  - De grot van Alibaba
  - De eBay van het donkere web
  - De ondergrondse Walmart
explanation: |
 Silk Road kreeg de bijnaam omdat het leek op de e-commerce gigant Amazon. De bijnaam weerspiegelde de gebruiksvriendelijke interface en efficiëntie van het platform voor
 illegale handel.
reviewed: true
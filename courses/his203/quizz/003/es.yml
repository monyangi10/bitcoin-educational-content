question: ¿Qué apodo se dio rápidamente a la plataforma Silk Road creada por Ross Ulbricht?
answer: El Amazonas de las drogas
wrong_answers:
  - La cueva de Alibaba
  - El eBay de la web oscura
  - El Walmart clandestino
explanation: |
 Silk Road fue apodada así por su parecido con el gigante del comercio electrónico Amazon. El apodo reflejaba la facilidad de uso y la eficacia de la plataforma para el comercio ilegal
 el comercio ilegal.

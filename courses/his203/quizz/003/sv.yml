question: Vilket smeknamn gavs snabbt till Silk Road-plattformen som skapades av Ross Ulbricht?
answer: Amazonas av droger
wrong_answers:
  - Alibabas grotta
  - EBay på den mörka webben
  - Den underjordiska Walmart
explanation: |
 Silk Road fick sitt smeknamn för att den liknade e-handelsjätten Amazon. Smeknamnet återspeglade plattformens användarvänliga gränssnitt och effektivitet för
 illegal handel.
reviewed: true
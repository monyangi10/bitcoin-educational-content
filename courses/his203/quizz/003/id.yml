question: Julukan apa yang dengan cepat diberikan pada platform Silk Road yang dibuat oleh Ross Ulbricht?
answer: Amazon dari obat-obatan terlarang
wrong_answers:
  - Gua Alibaba
  - EBay dari web gelap
  - Walmart bawah tanah
explanation: |
 Silk Road dijuluki karena kemiripannya dengan raksasa e-commerce Amazon. Julukan itu mencerminkan antarmuka platform yang ramah pengguna dan efisiensi untuk
 perdagangan ilegal.
reviewed: true
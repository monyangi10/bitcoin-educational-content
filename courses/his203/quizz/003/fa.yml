question: چه لقبی به سرعت به پلتفرم جاده ابریشم که توسط راس اولبریکت ایجاد شده بود، داده شد؟
answer: آمازون مواد مخدر
wrong_answers:
  - غار علی‌بابا
  - ای‌بی وب تاریک
  - والمارت زیرزمینی
explanation: |
 جاده ابریشم به دلیل شباهتش به غول تجارت الکترونیک آمازون، لقب گرفته بود. این لقب نشان‌دهنده رابط کاربری دوستانه و کارایی پلتفرم برای تجارت غیرقانونی بود.
reviewed: true
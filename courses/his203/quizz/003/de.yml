question: Welcher Spitzname wurde der von Ross Ulbricht gegründeten Silk Road-Plattform schnell gegeben?
answer: Der Amazonas der Drogen
wrong_answers:
  - Die Höhle von Alibaba
  - Das eBay des Dark Web
  - Der unterirdische Walmart
explanation: |
 Silk Road erhielt seinen Spitznamen aufgrund seiner Ähnlichkeit mit dem E-Commerce-Riesen Amazon. Der Spitzname spiegelt die benutzerfreundliche Oberfläche und die Effizienz der Plattform für
 illegalen Handel.
reviewed: true
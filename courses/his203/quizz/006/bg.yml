question: Какъв приблизителен процент от активността във веригата Bitcoin представлява "Пътят на коприната" в края на лятото на 2011 г.?
answer: 10 %
wrong_answers:
  - 3 %
  - 30 %
  - 90 %
explanation: |
 Според последващ доклад на Chainalysis активността по Пътя на коприната е представлявала почти 10% от обема, търгуван в канала Bitcoin в началото на
 Септември 2011 г.
reviewed: true
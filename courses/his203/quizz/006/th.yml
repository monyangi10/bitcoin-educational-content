question: กิจกรรมประมาณกี่เปอร์เซ็นต์บนเครือข่าย Bitcoin ที่เป็นตัวแทนของ Silk Road ในช่วงปลายฤดูร้อนปี 2011?
answer: 10 %
wrong_answers:
  - 3 %
  - 30 %
  - 90 %
explanation: |
 ตามรายงานที่ตามมาของ Chainalysis กิจกรรมของ Silk Road คิดเป็นเกือบ 10% ของปริมาณการซื้อขายบนช่องทาง Bitcoin ในช่วงต้นเดือนกันยายน 2011
reviewed: true
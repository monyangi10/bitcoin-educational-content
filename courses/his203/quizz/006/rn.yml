question: Ni igice kingana iki c’ibikorwa ku ruzitiro rwa Bitcoin vyari bigereranya Silk Road mu mpera z’icuma c’umwaka w’2011?
answer: 10 %
wrong_answers:
  - 3 %
  - 30 %
  - 90 %
explanation: |
 Nk’uko bigaragara muri raporo yakurikiyeho ya Chainalysis, igikorwa co ku nzira ya Silk Road cari hafi 10% vy’ibintu vyagurishwa ku muhora Bitcoin mu ntango z’umwaka w’2019. 
 Nzero 2011.
reviewed: true
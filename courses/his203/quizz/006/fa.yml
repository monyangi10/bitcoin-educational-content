question: چه درصد تقریبی از فعالیت در زنجیره Bitcoin در پایان تابستان 2011 مربوط به جاده ابریشم بود؟
answer: ۱۰٪
wrong_answers:
  - ۳ ٪
  - ۳۰٪
  - ۹۰٪
explanation: |
 بر اساس گزارش بعدی Chainalysis، فعالیت‌های Silk Road در ابتدای سپتامبر 2011 تقریباً 10٪ از حجم معامله شده در کانال Bitcoin را تشکیل می‌داد.
reviewed: true
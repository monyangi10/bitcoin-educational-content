question: 2011 की गर्मियों के अंत में Bitcoin श्रृंखला पर होने वाली गतिविधि का अनुमानित प्रतिशत सिल्क रोड का प्रतिनिधित्व करता था?
answer: 10%
wrong_answers:
  - 3%
  - 30%
  - 90%
explanation: |
 चेनैलिसिस की एक बाद की रिपोर्ट के अनुसार, सितंबर 2011 की शुरुआत में Bitcoin चैनल पर कारोबार की गई मात्रा का लगभग 10% हिस्सा सिल्क रोड की गतिविधियों से संबंधित था।
 
reviewed: true
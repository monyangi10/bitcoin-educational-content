question: نام مستعار خالق اصلی بازی آنلاین تاس SatoshiDICE چه بود؟
answer: فایرداک
wrong_answers:
  - اِووورهیس
  - توکسوانت
  - هیپیچ
explanation: |
 جوزف گلیسون، معروف به Fireduck، یک توسعه‌دهنده 30 ساله آمریکایی بود. پس از برنامه‌نویسی چند ابزار نرم‌افزاری برای Bitcoin، او در تاریخ 9 آوریل 2012 کازینوی بیت‌کوین SatoshiDICE (که به عنوان یک بازی تاس معرفی می‌شد) را توسعه داد. چند هفته بعد، او این پلتفرم را به اریک وورهیس (Evoorhees) به قیمت 40 بیت‌کوین، یا حدود 200 دلار فروخت.
reviewed: true
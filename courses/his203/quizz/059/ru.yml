question: Какой псевдоним был у создателя онлайн-игры в кости SatoshiDICE?
answer: Fireduck
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Хиппич
explanation: |
 Джозеф Глисон, он же Fireduck, был 30-летним американским разработчиком. После программирования нескольких программных инструментов для Bitcoin он разработал биткоин-казино SatoshiDICE
 казино (которое представляло собой игру в кости) 9 апреля 2012 года. Через несколько недель он продал платформу Эрику Вурхису (Evoorhees) за 40 биткоинов, или
 около 200 долларов.
reviewed: true
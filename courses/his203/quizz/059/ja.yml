question: オンライン・ダイスゲーム『SatoshiDICE』の原作者のペンネームは？
answer: ファイヤーダック
wrong_answers:
  - エボーヒーズ
  - タクサヴァン
  - ヒッピッヒ
explanation: |
 Fireduckことジョセフ・グリーソンは30歳のアメリカ人開発者。Bitcoinのためにいくつかのソフトウェア・ツールをプログラミングした後、彼は2012年4月、SatoshiDICEビットコイン・カジノ（サイコロ・ゲームのように見える）を開発した。
 カジノ（ダイスゲームとして登場）を2012年4月9日に開発した。数週間後、彼はこのプラットフォームをエリック・ボーヒーズ（Evoorhees）に40ビットコイン（約200ドル）で売却した。
 約200ドル。
reviewed: true
question: SatoshiDICE 在线骰子游戏原创作者的笔名是什么？
answer: 火鸭
wrong_answers:
  - Evoorhees
  - Tuxavant
  - 希皮希
explanation: |
 约瑟夫-格里森（Joseph Gleason），又名 Fireduck，是一名 30 岁的美国开发人员。在为 Bitcoin 编写了一些软件工具之后，他于 2012 年 4 月 9 日开发了 SatoshiDICE 比特币赌场（以骰子游戏的形式出现）。
 赌场（以骰子游戏的形式呈现）。几周后，他以 40 个比特币（约合 200 美元）的价格将该平台卖给了 Erik Voorhees（Evoorhees）。
 约 200 美元。
reviewed: true
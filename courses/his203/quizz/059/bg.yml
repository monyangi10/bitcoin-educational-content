question: Какъв е псевдонимът на първоначалния създател на онлайн играта със зарове SatoshiDICE?
answer: Fireduck
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Hippich
explanation: |
 Джоузеф Глийсън, известен още като Fireduck, е 30-годишен американски програмист. След като програмира няколко софтуерни инструмента за Bitcoin, той разработва биткойн системата SatoshiDICE
 казино (което се представя като игра със зарове) на 9 април 2012 г. Няколко седмици по-късно той продава платформата на Ерик Воорхис (Evoorhees) за 40 биткойна, или
 около 200 USD.
reviewed: true
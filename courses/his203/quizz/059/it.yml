question: Qual era lo pseudonimo del creatore originale del gioco di dadi online SatoshiDICE?
answer: Fireduck
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Hippich
explanation: |
 Joseph Gleason, detto Fireduck, era uno sviluppatore americano di 30 anni. Dopo aver programmato alcuni strumenti software per il Bitcoin, ha sviluppato il casinò di bitcoin SatoshiDICE (che si presentava come un gioco di dadi) nell'aprile 2012
 (che si presentava come un gioco di dadi) il 9 aprile 2012. Poche settimane dopo ha venduto la piattaforma a Erik Voorhees (Evoorhees) per 40 bitcoin, ovvero circa 200 dollari
 circa 200 dollari.

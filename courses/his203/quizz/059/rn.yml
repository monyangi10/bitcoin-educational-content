question: Ni irihe zina ry’uruyeri ry’uwaremye urukino rw’amadayimoni rwo kuri Internet SatoshiDICE?
answer: Inka y'umuriro
wrong_answers:
  - Evoors
  - Tuksavant
  - Hipichi
explanation: |
 Joseph Gleason, yitwa Fireduck, yari umunyamerika w’imyaka 30 w’umuhinga mu bijanye n’iterambere. Amaze gutegura ibikoresho bikeyi vya porogarama ya Bitcoin, yarateguye igikoresho citwa SatoshiDICE bitcoin . 
 casino (yari yerekanye ko ari urukino rw’amadayimoni) ku wa 9 Ndamukiza 2012. Haciye indwi nkeyi, yagurishije iyo nzira kuri Erik Voorhees (Evoorhees) ku mahera 40 y’ibiceri, canke . 
 nk’amadolari 200.
reviewed: true
question: Jina bandia la muundaji asilia wa mchezo wa kete mtandaoni wa SatoshiDICE lilikuwa lipi?
answer: Bata
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Hippich
explanation: |
 Joseph Gleason, maarufu kama Fireduck, alikuwa msanidi programu wa Marekani mwenye umri wa miaka 30. Baada ya kupangilia programu chache za Bitcoin, alitengeneza kasino ya bitcoin ya SatoshiDICE (ambayo ilijionyesha kama mchezo wa kete) mnamo Aprili 9, 2012. Wiki chache baadaye, aliuza jukwaa hilo kwa Erik Voorhees (Evoorhees) kwa bitcoin 40, au karibu $200.
reviewed: true
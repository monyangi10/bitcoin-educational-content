question: SatoshiDICE 線上骰子遊戲原創者的筆名是什麼？
answer: 火鴨
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Hippich
explanation: |
 Joseph Gleason，又名 Fireduck，是一位 30 歲的美國開發人員。在為 Bitcoin 編寫了一些軟體工具之後，他於 2012 年 4 月 9 日開發出 SatoshiDICE 比特幣賭場（以骰子遊戲的形式呈現）。
 賭場（以骰子遊戲的形式呈現）。幾個星期之後，他以 40 比特幣（約 200 美元）的價格將這個平台賣給了 Erik Voorhees (Evoorhees)。
 約 200 美元。
reviewed: true
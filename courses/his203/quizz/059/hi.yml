question: SatoshiDICE ऑनलाइन डाइस गेम के मूल निर्माता का छद्म नाम क्या था?
answer: फायरडक
wrong_answers:
  - इवोरहीस
  - टक्सावेंट
  - हिप्पिच
explanation: |
 जोसेफ ग्लीसन, उर्फ ​​फायरडक, एक 30 वर्षीय अमेरिकी डेवलपर थे। Bitcoin के लिए कुछ सॉफ्टवेयर टूल प्रोग्राम करने के बाद, उन्होंने 9 अप्रैल, 2012 को SatoshiDICE बिटकॉइन कैसीनो (जो खुद को एक पासा खेल के रूप में प्रस्तुत करता था) विकसित किया। कुछ हफ्तों बाद, उन्होंने इस प्लेटफॉर्म को एरिक वूरहीस (ईवूरहीस) को 40 बिटकॉइन, या लगभग 200 डॉलर में बेच दिया।
reviewed: true
question: Tên giả của người sáng tạo ban đầu của trò chơi xúc xắc trực tuyến SatoshiDICE là gì?
answer: Vịt nướng
wrong_answers:
  - Evoorhees
  - Tuxavant
  - Hippich
explanation: |
 Joseph Gleason, hay còn gọi là Fireduck, là một nhà phát triển phần mềm người Mỹ 30 tuổi. Sau khi lập trình một vài công cụ phần mềm cho Bitcoin, ông đã phát triển sòng bạc bitcoin SatoshiDICE (tự giới thiệu là một trò chơi xúc xắc) vào ngày 9 tháng 4 năm 2012. Vài tuần sau, ông bán nền tảng này cho Erik Voorhees (Evoorhees) với giá 40 bitcoin, tương đương khoảng 200 đô la Mỹ.
reviewed: true
question: SatoshiDICE 온라인 주사위 게임의 최초 제작자의 가명은 무엇인가요?
answer: 파이어덕
wrong_answers:
  - 에부르히스
  - Tuxavant
  - Hippich
explanation: |
 파이어덕이라고도 불리는 조셉 글리슨은 30세의 미국인 개발자였습니다. 그는 Bitcoin을 위한 몇 가지 소프트웨어 도구를 프로그래밍한 후, 2012년 4월 9일에 주사위 게임으로 등장한 비트코인
 카지노(주사위 게임)를 2012년 4월 9일에 개발했습니다. 몇 주 후, 그는 이 플랫폼을 에릭 부어히스(에부어히스)에게 40비트코인, 즉
 약 200달러에
reviewed: true
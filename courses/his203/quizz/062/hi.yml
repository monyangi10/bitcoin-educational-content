question: मार्च 2012 से किस सबरेडिट पर उपयोगकर्ता बिटकॉइन टिप्स के लिए अपनी नग्न तस्वीरें प्रकाशित कर सकते थे?
answer: r/GirlsGoneBitcoin
wrong_answers:

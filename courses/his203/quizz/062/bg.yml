question: В кой подсайт потребителите можеха да публикуват свои голи снимки срещу съвети за биткойн от март 2012 г.?
answer: r/GirlsGoneBitcoin
wrong_answers:
  - r/GoneWild
  - r/CryptoPorn
  - r/Bitcoin
explanation: |
 r/GirlsGoneBitcoin е открит на 26 март 2012 г. от Джулиан Тош, известен още като Туксавант, защитник на Линукс и неприкосновеността на личния живот, който живее в Лас Вегас. Подредбата имаше почти
 2 000 членове до края на годината.
reviewed: true
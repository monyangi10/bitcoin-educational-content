explanation: |
 r/GirlsGoneBitcoin در 26 مارس 2012 توسط جولیان توش، معروف به Tuxavant، یک حامی لینوکس و حریم خصوصی که در لاس وگاس زندگی می‌کند، افتتاح شد. این ساب‌ردیت تا پایان سال نزدیک به 2,000 عضو داشت.

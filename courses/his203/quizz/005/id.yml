question: Apa produk utama di Silk Road?
answer: Ganja
wrong_answers:
  - Jamur halusinogen
  - Heroin
  - Steroid
explanation: |
 Meskipun platform ini terutama digunakan untuk perdagangan obat terlarang, sejumlah kecil ganja dijual. Ada juga produk legal, seperti buku, karya seni,
 komponen elektronik, emas, dan sebagainya. Tidak ada kartu bank curian, pornografi anak, atau layanan pembunuh bayaran, karena semua itu dilarang oleh piagam situs.
reviewed: true
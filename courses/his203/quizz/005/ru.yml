question: Что было главным товаром на Шелковом пути?
answer: Каннабис
wrong_answers:
  - Галлюциногенные грибы
  - Героин
  - Стероиды
explanation: |
 Хотя платформа использовалась в основном для незаконного оборота наркотиков, продавались и небольшие партии каннабиса. Были и легальные товары, такие как книги, предметы искусства,
 электронные компоненты, золото и так далее. Здесь не продавались краденые банковские карты, детская порнография или услуги киллеров, поскольку все это запрещено уставом сайта.
reviewed: true
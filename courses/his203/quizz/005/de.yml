question: Was war das wichtigste Produkt auf der Seidenstraße?
answer: Cannabis
wrong_answers:
  - Halluzinogene Pilze
  - Heroin
  - Steroide
explanation: |
 Obwohl die Plattform hauptsächlich für den illegalen Drogenhandel genutzt wurde, wurden auch kleine Mengen Cannabis verkauft. Es gab auch legale Produkte, wie Bücher, Kunst,
 elektronische Bauteile, Gold und so weiter. Gestohlene Bankkarten, Kinderpornografie oder Killerdienste wurden nicht angeboten, da dies in der Charta der Website verboten war.
reviewed: true
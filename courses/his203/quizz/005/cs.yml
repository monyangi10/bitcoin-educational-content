question: Co bylo hlavním produktem na Hedvábné stezce?
answer: Konopí
wrong_answers:
  - Halucinogenní houby
  - Heroin
  - Steroidy
explanation: |
 Ačkoli se platforma používala hlavně k nelegálnímu obchodu s drogami, prodávalo se i malé množství konopí. K dispozici byly také legální produkty, jako jsou knihy, umění,
 elektronické součástky, zlato atd. Nebyly zde žádné kradené bankovní karty, dětská pornografie ani služby nájemných vrahů, protože ty byly zakázány statutem webu.
reviewed: true
question: Vad var den viktigaste produkten på Silk Road?
answer: Cannabis
wrong_answers:
  - Hallucinogena svampar
  - Heroin
  - Steroider
explanation: |
 Även om plattformen främst användes för olaglig narkotikahandel såldes små mängder cannabis. Det fanns också lagliga produkter, till exempel böcker, konst,
 elektroniska komponenter, guld och så vidare. Det förekom inga stulna bankkort, barnpornografi eller torpedtjänster, eftersom detta var förbjudet enligt webbplatsens stadgar.
reviewed: true
question: सिल्क रोड का मुख्य उत्पाद क्या था?
answer: कैनबिस
wrong_answers:
  - मतिभ्रम पैदा करने वाले मशरूम
  - हेरोइन
  - "स्टेरॉयड"
explanation: |
 हालांकि इस प्लेटफॉर्म का इस्तेमाल मुख्य रूप से अवैध मादक पदार्थों की तस्करी के लिए किया जाता था, लेकिन थोड़ी मात्रा में गांजा भी बेचा जाता था। यहाँ किताबें, कलाकृतियाँ, इलेक्ट्रॉनिक उपकरण, सोना आदि जैसी कानूनी वस्तुएँ भी बेची जाती थीं। यहाँ चोरी किए गए बैंक कार्ड, बाल पोर्नोग्राफी या सुपारी किराना सेवाएँ जैसी कोई भी सेवाएँ उपलब्ध नहीं थीं, क्योंकि ये साइट के नियमों के अनुसार प्रतिबंधित थीं।
reviewed: true
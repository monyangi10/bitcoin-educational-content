question: ¿Cuál era el principal producto de la Ruta de la Seda?
answer: Cannabis
wrong_answers:
  - Setas alucinógenas
  - Heroína
  - Esteroides
explanation: |
 Aunque la plataforma se utilizaba principalmente para el tráfico ilícito de drogas, se vendían pequeñas cantidades de cannabis. También había productos legales, como libros, arte
 componentes electrónicos, oro, etc. No había tarjetas bancarias robadas, pornografía infantil ni servicios de sicarios, ya que estaban prohibidos por los estatutos del sitio.
reviewed: true
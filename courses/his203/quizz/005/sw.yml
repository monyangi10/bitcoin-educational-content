question: Bidhaa kuu kwenye Barabara ya Hariri ilikuwa nini?
answer: Bangi
wrong_answers:
  - Uyoga unaosababisha maono yasiyoeleweka
  - Heroin
  - Steroids
explanation: |
 Ingawa jukwaa hilo lilitumika zaidi kwa biashara haramu ya dawa za kulevya, kiasi kidogo cha bangi kiliuzwa. Pia kulikuwa na bidhaa halali, kama vile vitabu, sanaa, vipengele vya kielektroniki, dhahabu na kadhalika. Hakukuwa na kadi za benki zilizoibiwa, ponografia ya watoto au huduma za wahalifu, kwani hizi zilipigwa marufuku na hati ya tovuti.
reviewed: true
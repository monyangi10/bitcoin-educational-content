question: Wat was het belangrijkste product op Silk Road?
answer: Cannabis
wrong_answers:
  - Hallucinogene paddenstoelen
  - Heroïne
  - Steroïden
explanation: |
 Hoewel het platform voornamelijk werd gebruikt voor illegale drugshandel, werden er ook kleine hoeveelheden cannabis verkocht. Er waren ook legale producten, zoals boeken, kunst,
 elektronische onderdelen, goud enzovoort. Er waren geen gestolen bankpassen, kinderporno of huurmoordenaars, omdat dit verboden was volgens het handvest van de site.
reviewed: true
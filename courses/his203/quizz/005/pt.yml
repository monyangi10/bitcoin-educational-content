question: Qual era o principal produto da Rota da Seda?
answer: Cannabis
wrong_answers:
  - Cogumelos alucinogénios
  - Heroína
  - Esteróides
explanation: |
 Embora a plataforma fosse principalmente utilizada para o tráfico de drogas ilícitas, eram vendidas pequenas quantidades de canábis. Havia também produtos legais, como livros, arte,
 componentes electrónicos, ouro, etc. Não havia cartões bancários roubados, pornografia infantil ou serviços de assassinos, uma vez que estes eram proibidos pelos estatutos do sítio.
reviewed: true
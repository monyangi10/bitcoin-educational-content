question: Sản phẩm chính trên Con đường Tơ lụa là gì?
answer: Cần sa
wrong_answers:
  - Nấm gây ảo giác
  - Heroin
  - Thuốc steroid
explanation: |
 Mặc dù nền tảng này chủ yếu được sử dụng cho hoạt động buôn bán ma túy bất hợp pháp, nhưng cũng có một lượng nhỏ cần sa được bán. Ngoài ra còn có các sản phẩm hợp pháp, chẳng hạn như sách, tranh ảnh, linh kiện điện tử, vàng, v.v. Không có thẻ ngân hàng bị đánh cắp, nội dung khiêu dâm trẻ em hoặc dịch vụ sát thủ, vì những điều này bị cấm theo điều lệ của trang web.
reviewed: true
question: Hva var hovedproduktet på Silk Road?
answer: Cannabis
wrong_answers:
  - Hallusinogene sopper
  - Heroin
  - Steroider
explanation: |
 Selv om plattformen hovedsakelig ble brukt til ulovlig narkotikahandel, ble det solgt små mengder cannabis. Det ble også solgt lovlige produkter, som bøker, kunst,
 elektroniske komponenter, gull og så videre. Det ble ikke solgt stjålne bankkort, barnepornografi eller leiemordertjenester, ettersom dette var forbudt i henhold til nettstedets vedtekter.
reviewed: true
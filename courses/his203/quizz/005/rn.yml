question: Ni igiki cari igicuruzwa nyamukuru ku nzira ya Silk?
answer: Cannabis
wrong_answers:
  - Ibizinu bitera ubwoba
  - Ibiyayuramutwe
  - Imiti
explanation: |
 Naho iyo nzira yakoreshwa canecane mu gucuruza ibiyayuramutwe, hari ibiyayuramutwe bikeyi vyagurishwa. Hariho kandi ibintu vyemewe n’amategeko, nk’ibitabu, ubuhinga, . 
 ibihimba vy’ubuhinga bwa none, inzahabu n’ibindi. Nta makarita ya banki yibwe, amasanamu y’ibiterasoni y’abana canke ibikorwa vy’ugutera abantu, kuko ivyo vyari bibujijwe n’itegeko ry’urubuga.
reviewed: true
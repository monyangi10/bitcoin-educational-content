question: محصول اصلی در جاده ابریشم چه بود؟
answer: حشیش
wrong_answers:
  - قارچ‌های توهم‌زا
  - هروئین
  - استروئیدها
explanation: |
 اگرچه این پلتفرم عمدتاً برای قاچاق مواد مخدر غیرقانونی استفاده می‌شد، مقادیر کمی از حشیش نیز فروخته می‌شد. همچنین محصولات قانونی مانند کتاب‌ها، هنر، قطعات الکترونیکی، طلا و غیره وجود داشت. کارت‌های بانکی دزدیده شده، پورنوگرافی کودکان یا خدمات آدم‌کشی وجود نداشت، زیرا این‌ها توسط منشور سایت ممنوع شده بودند.
reviewed: true
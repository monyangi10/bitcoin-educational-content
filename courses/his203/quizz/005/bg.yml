question: Какъв е бил основният продукт по Пътя на коприната?
answer: Канабис
wrong_answers:
  - Халюциногенни гъби
  - Хероин
  - Стероиди
explanation: |
 Въпреки че платформата е използвана основно за незаконен трафик на наркотици, са продавани и малки количества канабис. Предлагаха се и легални продукти, като книги, произведения на изкуството,
 електронни компоненти, злато и др. Нямаше крадени банкови карти, детска порнография или услуги на наемни убийци, тъй като те бяха забранени от устава на сайта.
reviewed: true
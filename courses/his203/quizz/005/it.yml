question: Qual era il prodotto principale della Via della Seta?
answer: Cannabis
wrong_answers:
  - Funghi allucinogeni
  - Eroina
  - Steroidi
explanation: |
 Sebbene la piattaforma sia stata utilizzata principalmente per il traffico illecito di droga, sono state vendute piccole quantità di cannabis. C'erano anche prodotti legali, come libri, arte, componenti elettronici, oro e così via,
 componenti elettronici, oro e così via. Non c'erano carte bancarie rubate, pornografia infantile o servizi di sicari, in quanto vietati dallo statuto del sito.
reviewed: true
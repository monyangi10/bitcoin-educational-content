question: Quel produit retrouvait-on principalement sur Silk Road ?
answer: Le cannabis
wrong_answers:
  - Les champignons hallucinogènes
  - L'héroïne
  - Les stéroïdes
explanation: |
 Même si la plateforme servait principalement au trafic de drogue illicite, on y vendait surtout de petites quantités de cannabis. On y trouvait également des produits légaux, comme des livres, de l'art, des composants électroniques, de l'or, etc. Il n'y avait pas de cartes bancaires volées, de pédopornographie ou de services de tueur à gages, car interdits par la charte du site.

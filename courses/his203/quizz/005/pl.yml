question: Jaki był główny produkt na Silk Road?
answer: Konopie indyjskie
wrong_answers:
  - Grzyby halucynogenne
  - Heroina
  - Sterydy
explanation: |
 Chociaż platforma była wykorzystywana głównie do nielegalnego handlu narkotykami, sprzedawano niewielkie ilości marihuany. Były też legalne produkty, takie jak książki, dzieła sztuki,
 podzespoły elektroniczne, złoto itp. Nie było skradzionych kart bankowych, pornografii dziecięcej ani usług zabójców, ponieważ były one zabronione przez statut strony.
reviewed: true
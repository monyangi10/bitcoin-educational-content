question: สินค้าหลักบนเส้นทางสายไหมคืออะไร?
answer: กัญชา
wrong_answers:
  - เห็ดประสาทหลอน
  - เฮโรอีน
  - สเตียรอยด์
explanation: |
 แม้ว่าแพลตฟอร์มนี้จะถูกใช้หลักๆ สำหรับการค้ายาเสพติดที่ผิดกฎหมาย แต่ก็มีการขายกัญชาในปริมาณเล็กน้อย นอกจากนี้ยังมีสินค้าที่ถูกกฎหมาย เช่น หนังสือ ศิลปะ ส่วนประกอบอิเล็กทรอนิกส์ ทองคำ และอื่นๆ ไม่มีบัตรธนาคารที่ถูกขโมย สื่อลามกเด็ก หรือบริการนักฆ่า เนื่องจากสิ่งเหล่านี้ถูกห้ามโดยกฎบัตรของเว็บไซต์
reviewed: true
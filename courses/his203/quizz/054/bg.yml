question: Кой платежен стандарт е регистриран в IANA през септември 2012 г. от софтуерния архитект Дейв Талер?
answer: BIP 21 Схема на URI
wrong_answers:
  - BIP 32 йерархични детерминистични портфейли
  - BIP 70 протокол за плащане
  - BIP 47 кодове за плащане за многократна употреба
explanation: |
 Този стандарт позволи да се формализират заявки за плащане, които бяха под формата на низ от символи или QR код. След няколко предложения беше създаден окончателен URI
 беше описана през януари 2012 г. в рамките на BIP 21 от Мат Корало. Тя беше регистрирана в IANA от Дейв Талер през септември.
reviewed: true
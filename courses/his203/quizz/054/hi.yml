question: सॉफ्टवेयर आर्किटेक्ट डेव थैलेर द्वारा सितंबर 2012 में IANA के साथ कौन सा भुगतान मानक पंजीकृत किया गया था?
answer: BIP 21 URI योजना
wrong_answers:
  - BIP 32 पदानुक्रमित नियतात्मक पोर्टफोलियो
  - BIP 70 भुगतान प्रोटोकॉल
  - BIP 47 पुन: प्रयोज्य भुगतान कोड
explanation: |
 इस मानक ने भुगतान अनुरोधों को औपचारिक रूप देने में मदद की, जो वर्णों की एक स्ट्रिंग या क्यूआर कोड के रूप में होते थे। कई प्रस्तावों के बाद, जनवरी 2012 में मैट कोरालो द्वारा BIP 21 के अंतर्गत एक अंतिम यूआरआई योजना का वर्णन किया गया। सितंबर में डेव थैलेर द्वारा इसे IANA में पंजीकृत किया गया।
reviewed: true
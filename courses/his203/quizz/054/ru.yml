question: Какой платежный стандарт был зарегистрирован в IANA в сентябре 2012 года архитектором программного обеспечения Дэйвом Талером?
answer: BIP 21 Схема URI
wrong_answers:
  - BIP 32 иерархических детерминированных портфеля
  - BIP 70 протокол оплаты
  - BIP 47 многоразовых кодов оплаты
explanation: |
 Этот стандарт позволил формализовать платежные запросы, которые принимали форму строки символов или QR-кода. После нескольких предложений окончательная схема URI
 была описана в январе 2012 года в рамках BIP 21 Мэттом Коралло. В сентябре она была зарегистрирована в IANA Дэйвом Талером.
reviewed: true
question: 2012년 9월 소프트웨어 설계자 데이브 탈러가 IANA에 등록한 결제 표준은 무엇인가요?
answer: BIP 21 URI 체계
wrong_answers:
  - BIP 32 계층적 결정론적 포트폴리오
  - BIP 70 결제 프로토콜
  - BIP 재사용 가능한 결제 코드 47개
explanation: |
 이 표준을 통해 문자열이나 QR코드 형태의 결제 요청을 공식화할 수 있게 되었습니다. 여러 제안을 거쳐 최종 URI
 체계가 2012년 1월 Matt Corallo에 의해 BIP 21에 설명되었습니다. 이 체계는 9월에 데이브 탈러에 의해 IANA에 등록되었습니다.
reviewed: true
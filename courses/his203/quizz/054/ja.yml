question: 2012年9月、ソフトウェア・アーキテクトのデイブ・ターラーがIANAに登録した決済規格は？
answer: BIP 21 URIスキーム
wrong_answers:
  - BIP 32の階層的決定論的ポートフォリオ
  - BIP 70支払いプロトコル
  - BIP 47の再利用可能な支払いコード
explanation: |
 この標準は、文字列またはQRコードの形をとる支払い要求を形式化することを可能にした。いくつかの提案の後、最終的なURI
 スキームが2012年1月、マット・コラロによってBIP 21に記述された。これは9月にDave ThalerによってIANAに登録された。
reviewed: true
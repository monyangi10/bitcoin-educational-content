question: کدام استاندارد پرداخت در سپتامبر ۲۰۱۲ توسط معمار نرم‌افزار دیو ثالر در IANA ثبت شد؟
answer: BIP 21 طرح URI
wrong_answers:
  - BIP 32 پرتفوی سلسله مراتبی قطعی
  - پروتکل پرداخت BIP 70
  - BIP 47 کد پرداخت قابل استفاده مجدد
explanation: |
 این استاندارد امکان رسمی‌سازی درخواست‌های پرداخت را فراهم کرد که به صورت یک رشته کاراکتر یا یک کد QR بود. پس از چندین پیشنهاد، یک طرح نهایی URI در ژانویه ۲۰۱۲ در BIP 21 توسط مت کورالو توصیف شد. این طرح در سپتامبر توسط دیو ثالر با IANA ثبت شد.
reviewed: true
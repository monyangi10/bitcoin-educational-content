question: Which payment standard was registered with IANA in September 2012 by software architect Dave Thaler?
answer: BIP 21 URI scheme
wrong_answers:
  - BIP 32 hierarchical deterministic portfolios
  - BIP 70 payment protocol
  - BIP 47 reusable payment codes
explanation: |
 This standard made it possible to formalize payment requests, which took the form of a string of characters or a QR code. After several proposals, a final URI scheme was described in January 2012 within BIP 21 by Matt Corallo. It was registered with IANA by Dave Thaler in September.

question: มาตรฐานการชำระเงินใดที่ลงทะเบียนกับ IANA ในเดือนกันยายน 2012 โดยสถาปนิกซอฟต์แวร์ Dave Thaler?
answer: BIP 21 URI scheme
wrong_answers:
  - BIP 32 พอร์ตโฟลิโอแบบกำหนดลำดับชั้นเชิงกำหนด
  - BIP 70 โปรโตคอลการชำระเงิน
  - BIP 47 รหัสการชำระเงินที่ใช้ซ้ำได้
explanation: |
 มาตรฐานนี้ทำให้สามารถทำให้คำขอการชำระเงินเป็นทางการได้ ซึ่งมีรูปแบบเป็นสตริงของอักขระหรือรหัส QR หลังจากข้อเสนอหลายครั้ง โครงร่าง URI สุดท้ายได้ถูกอธิบายในเดือนมกราคม 2012 ภายใน BIP 21 โดย Matt Corallo และได้ถูกลงทะเบียนกับ IANA โดย Dave Thaler ในเดือนกันยายน
reviewed: true
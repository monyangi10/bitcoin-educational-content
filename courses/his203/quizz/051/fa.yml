question: بر اساس مطالعه نیکلاس کریستین که در آگوست 2012 منتشر شد، حجم فروش روزانه در ماه مه 2012 چقدر بود؟
answer: ۱۵,۰۰۰ BTC یا $۷۵,۰۰۰
wrong_answers:
  - ۶۰۰ BTC یا ۳,۰۰۰ دلار
  - ۳٬۰۰۰ BTC یا $۱۵٬۰۰۰
  - ۷۵,۰۰۰ BTC یا $۳۷۵,۰۰۰
explanation: |
 حجم فروش روزانه که در ماه مارس به 8,000 BTC رسیده بود، در ماه مه به 15,000 BTC رسید که معادل حدود 75,000 دلار در آن زمان بود. فعالیت به عنوان نسبتی از کل فعالیت زنجیره Bitcoin در طول سال 2012 بین 10٪ و 20٪ در نوسان بود. در اوایل نوامبر، راس به موفقیت این پلتفرم به عنوان "رشد انفجاری" اشاره کرد.
reviewed: true
question: Hva var det daglige salgsvolumet i mai 2012, ifølge Nicolas Christins studie som ble publisert i august 2012?
answer: 15 000 BTC eller 75 000 dollar
wrong_answers:
  - 600 BTC eller 3 000 dollar
  - 3 000 BTC eller 15 000 dollar
  - 75 000 BTC eller 375 000 dollar
explanation: |
 Det daglige salgsvolumet, som lå på 8 000 BTC i mars, nådde 15 000 BTC i mai, noe som tilsvarer rundt 75 000 dollar på det tidspunktet. Aktiviteten som andel av den totale
 Bitcoin-kjedens totale aktivitet lå på mellom 10 % og 20 % i løpet av 2012. I begynnelsen av november omtalte Ross plattformens suksess som "eksplosiv vekst".
reviewed: true
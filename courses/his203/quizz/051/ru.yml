question: Согласно исследованию Николя Кристина, опубликованному в августе 2012 года, каков был ежедневный объем продаж в мае 2012 года?
answer: 15 000 BTC или $75 000
wrong_answers:
  - 600 BTC или $3,000
  - 3,000 BTC или $15,000
  - 75 000 BTC или 375 000 долл
explanation: |
 Ежедневный объем продаж, составлявший в марте 8 000 BTC, в мае достиг 15 000 BTC, что эквивалентно примерно 75 000 долларов США на тот момент. Доля активности в общем объеме
 В течение 2012 года активность цепочки Bitcoin колебалась между 10 и 20 %. В начале ноября Росс назвал успех платформы "взрывным ростом".
reviewed: true
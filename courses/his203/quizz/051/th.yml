question: ตามการศึกษาของ Nicolas Christin ที่เผยแพร่ในเดือนสิงหาคม 2012 ยอดขายรายวันในช่วงเดือนพฤษภาคม 2012 เป็นเท่าใด?
answer: 15,000 BTC หรือ $75,000
wrong_answers:
  - 600 BTC หรือ $3,000
  - 3,000 BTC หรือ $15,000
  - 75,000 BTC หรือ $375,000
explanation: |
 ปริมาณการขายรายวัน ซึ่งอยู่ที่ 8,000 BTC ในเดือนมีนาคม เพิ่มขึ้นเป็น 15,000 BTC ในเดือนพฤษภาคม เทียบเท่ากับประมาณ $75,000 ในขณะนั้น กิจกรรมเป็นสัดส่วนของกิจกรรมทั้งหมดของ Bitcoin chain อยู่ระหว่าง 10% ถึง 20% ในปี 2012 ในช่วงต้นเดือนพฤศจิกายน Ross กล่าวถึงความสำเร็จของแพลตฟอร์มว่าเป็น "การเติบโตอย่างระเบิด"
reviewed: true
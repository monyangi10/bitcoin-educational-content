question: 2012년 8월에 발표된 니콜라스 크리스틴의 연구에 따르면 2012년 5월의 일일 판매량은 얼마였나요?
answer: 15,000 BTC 또는 $75,000
wrong_answers:
  - 600 BTC 또는 $3,000
  - 3,000 BTC 또는 $15,000
  - 75,000 BTC 또는 $375,000
explanation: |
 3월에 8,000BTC였던 일일 판매량은 5월에 15,000BTC에 달했으며, 이는 당시 약 7만 5,000달러에 해당하는 금액입니다. 전체 대비 활동 비율
 2012년 한 해 동안 Bitcoin 체인의 활동은 10%에서 20% 사이를 맴돌았습니다. 11월 초, Ross는 이 플랫폼의 성공을 "폭발적인 성장"이라고 표현했습니다.
reviewed: true
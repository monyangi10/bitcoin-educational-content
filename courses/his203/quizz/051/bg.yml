question: Какъв е бил дневният обем на продажбите през май 2012 г. според проучването на Никола Кристин, публикувано през август 2012 г.?
answer: 15,000 BTC или 75,000 USD
wrong_answers:
  - 600 BTC или 3 000 долара
  - 3,000 BTC или 15,000 USD
  - 75,000 BTC или 375,000 USD
explanation: |
 Дневният обем на продажбите, който през март възлизаше на 8000 BTC, достигна 15 000 BTC през май, което се равняваше на около 75 000 USD по това време. Дейност като дял от общия обем
 Bitcoin по веригата през 2012 г. се колебае между 10 и 20 %. В началото на ноември Рос определи успеха на платформата като "експлозивен растеж".
reviewed: true
question: 根据尼古拉斯-克里斯坦 2012 年 8 月发表的研究报告，2012 年 5 月的日销售量是多少？
answer: 15,000 BTC 或 75,000 美元
wrong_answers:
  - 600 BTC 或 3,000 美元
  - 3,000 BTC 或 15,000 美元
  - 75,000 BTC 或 375,000 美元
explanation: |
 3 月份的日销售量为 8,000 BTC，5 月份达到 15,000 BTC，相当于当时的 75,000 美元左右。活动量占总
 2012 年期间，Bitcoin 连锁店的活动量占总活动量的比例徘徊在 10%至 20%之间。11 月初，罗斯将平台的成功称为 "爆炸式增长"。
reviewed: true
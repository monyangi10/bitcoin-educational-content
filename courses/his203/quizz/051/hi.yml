question: अगस्त 2012 में प्रकाशित निकोलस क्रिस्टिन के अध्ययन के अनुसार, मई 2012 के दौरान दैनिक बिक्री की मात्रा कितनी थी?
answer: 15,000 BTC या $75,000
wrong_answers:
  - 600 BTC या $3,000
  - 3,000 BTC या $15,000
  - 75,000 BTC या $375,000
explanation: |
 दैनिक बिक्री मात्रा, जो मार्च में 8,000 BTC थी, मई में बढ़कर 15,000 BTC हो गई, जो उस समय लगभग $75,000 के बराबर थी। कुल Bitcoin चेन गतिविधि के अनुपात में गतिविधि 2012 के दौरान 10% और 20% के बीच रही। नवंबर की शुरुआत में, रॉस ने प्लेटफॉर्म की सफलता को "विस्फोटक वृद्धि" बताया।
reviewed: true
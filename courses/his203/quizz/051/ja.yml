question: 2012年8月に発表されたニコラス・クリスティンの調査によると、2012年5月の1日の販売量は？
answer: 15,000 BTCまたは75,000ドル
wrong_answers:
  - 600 BTCまたは3,000ドル
  - 3,000 BTCまたは15,000ドル
  - 75,000 BTCまたは375,000ドル
explanation: |
 3月に8,000BTCであった1日の販売量は、5月には15,000BTCに達し、当時の約75,000ドルに相当した。総活動量に占める
 Bitcoinチェーンの活動量は2012年中、10％から20％の間で推移していた。11月初旬、ロスはこのプラットフォームの成功を「爆発的な成長」と表現した。
reviewed: true
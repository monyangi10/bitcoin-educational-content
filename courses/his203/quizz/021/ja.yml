question: 2011年、ガレス・ネルソンとチャーリー・シュレムが外国為替プラットフォームへの入金を容易にするために作ったインスタント外国為替サービスの名前は？
answer: ビットインスタント
wrong_answers:
  - インスタウォレット
  - 暗号Xの変化
  - トラストキャッシュ
explanation: |
 このサービスは、Mt.Goxへの海外送金が遅いという問題を解決するもので、送金元の国で受け取った資金を取引所のプラットフォームに送金する仲介役を果たす。
 に送金する。BitInstantは2011年8月23日に一般公開され、瞬く間に人気を博し、2012年1月までに120万ドルを送金した。
reviewed: true
question: गैरेथ नेल्सन और चार्ली श्रेम द्वारा 2011 में विदेशी मुद्रा प्लेटफार्मों पर जमा राशि को सुविधाजनक बनाने के लिए बनाई गई त्वरित विदेशी मुद्रा सेवा का नाम क्या था?
answer: बिटइंस्टेंट
wrong_answers:
  - इंस्टावॉलेट
  - क्रिप्टो एक्स परिवर्तन
  - ट्रस्टकैश
explanation: |
 यह सेवा मध्यस्थ के रूप में कार्य करके माउंट गोक्स में धीमी अंतरराष्ट्रीय धन हस्तांतरण की समस्या का समाधान करती है, और मूल देश में धनराशि प्राप्त होने के बाद उसे एक्सचेंज प्लेटफॉर्म पर स्थानांतरित करती है। बिटइंस्टेंट ने 23 अगस्त, 2011 को आम जनता के लिए अपनी सेवाएं शुरू कीं और जल्दी ही लोकप्रिय हो गया, जनवरी 2012 तक इसने 1.2 मिलियन डॉलर का हस्तांतरण किया।
reviewed: true
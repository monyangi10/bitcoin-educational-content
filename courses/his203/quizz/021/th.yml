question: ชื่อของบริการแลกเปลี่ยนเงินตราต่างประเทศทันทีที่สร้างโดย Gareth Nelson และ Charlie Shrem ในปี 2011 เพื่ออำนวยความสะดวกในการฝากเงินไปยังแพลตฟอร์มแลกเปลี่ยนเงินตราต่างประเทศคืออะไร?
answer: บิทอินสแตนท์
wrong_answers:
  - อินสตาวอลเล็ต
  - คริปโต X เชนจ์
  - TrustCash
explanation: |
 บริการนี้แก้ปัญหาการโอนเงินระหว่างประเทศที่ล่าช้าไปยัง Mt. Gox โดยทำหน้าที่เป็นตัวกลาง โอนเงินไปยังแพลตฟอร์มแลกเปลี่ยนเมื่อได้รับในประเทศต้นทาง BitInstant เปิดให้บริการแก่สาธารณชนเมื่อวันที่ 23 สิงหาคม 2011 และได้รับความนิยมอย่างรวดเร็ว โดยโอนเงิน $1.2 ล้านภายในเดือนมกราคม 2012
reviewed: true
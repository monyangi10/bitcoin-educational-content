question: Как се наричаше услугата за незабавна обмяна на валута, създадена от Гарет Нелсън и Чарли Шрем през 2011 г., за да улесни депозитите в платформи за обмяна на валута?
answer: BitInstant
wrong_answers:
  - Instawallet
  - Crypto X Change
  - TrustCash
explanation: |
 Тази услуга реши проблема с бавните международни преводи към Mt. Gox, като действаше като посредник и прехвърляше средствата към платформите за обмен, след като ги получи в
 страната на произход. BitInstant отвори врати за обществеността на 23 август 2011 г. и бързо стана популярна, като до януари 2012 г. преведе 1,2 млн. долара.
reviewed: true
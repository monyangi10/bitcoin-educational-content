question: Iryo shirahamwe ry’uguhindura amafaranga y’amahanga ryitwa Gareth Nelson na Charlie Shrem mu 2011 kugira ngo ryoroshe gushiramwo amafaranga y’amahanga?
answer: Bit Ubwo nyene
wrong_answers:
  - Instawallet
  - Crypto X Guhindura
  - Kwizigira amahera
explanation: |
 Iryo shirahamwe ryatorera umuti ingorane y’uko amahera mpuzamakungu yagenda buhoro ku musozi Gox mu gukora nk’umuhuza, akarungika amahera ku bibanza vyo guhanahana amahera amaze gushikirizwa mu 1990. 
 igihugu c’amavukiro. BitInstant yafunguriye abantu bose ku wa 23 Myandagaro 2011 maze iramenyekana cane, irungika amadolari 1.2 miliyoni muri Mukakaro 2012.
reviewed: true
question: Как назывался сервис мгновенного обмена валюты, созданный Гаретом Нельсоном и Чарли Шремом в 2011 году для облегчения пополнения счетов на валютных платформах?
answer: BitInstant
wrong_answers:
  - Instawallet
  - Криптовалюта X Change
  - TrustCash
explanation: |
 Этот сервис решал проблему медленных международных переводов на Mt. Gox, выступая в роли посредника и переводя средства на обменные платформы после их получения в
 стране происхождения. BitInstant открыл свои двери для публики 23 августа 2011 года и быстро стал популярным, переведя 1,2 миллиона долларов к январю 2012 года.
reviewed: true
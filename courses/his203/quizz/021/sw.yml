question: Jina la huduma ya papo hapo ya kubadilisha fedha za kigeni iliyoundwa na Gareth Nelson na Charlie Shrem mwaka wa 2011 ili kurahisisha uwekaji wa amana kwenye mifumo ya kubadilisha fedha za kigeni lilikuwa lipi?
answer: Papo Hapo
wrong_answers:
  - Pochi ya Insta
  - Mabadiliko ya Crypto X
  - TrustCash
explanation: |
 Huduma hii ilitatua tatizo la uhamisho wa polepole wa kimataifa kwenda Mt. Gox kwa kufanya kazi kama mpatanishi, kuhamisha fedha kwenye majukwaa ya kubadilishana fedha mara tu zilipopokelewa katika nchi ya asili. BitInstant ilifungua milango yake kwa umma mnamo Agosti 23, 2011 na haraka ikawa maarufu, ikihamisha dola milioni 1.2 kufikia Januari 2012.
reviewed: true
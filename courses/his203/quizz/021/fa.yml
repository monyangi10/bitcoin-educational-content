question: BitInstant
answer: بیت‌اینسنت
wrong_answers:
  - اینستاوالت
  - کریپتو ایکس چنج
  - تراست‌کش
explanation: |
 این سرویس با عمل به عنوان یک واسطه، مشکل انتقالات بین‌المللی کند به Mt. Gox را حل کرد و پس از دریافت وجوه در کشور مبدأ، آن‌ها را به پلتفرم‌های تبادل منتقل می‌کرد. BitInstant در تاریخ ۲۳ اوت ۲۰۱۱ درهای خود را به روی عموم باز کرد و به سرعت محبوب شد و تا ژانویه ۲۰۱۲ مبلغ ۱.۲ میلیون دلار را منتقل کرد.
reviewed: true
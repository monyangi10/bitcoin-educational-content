question: Какъв проблем трябваше да реши Namecoin - първата алтернативна криптовалута на Bitcoin?
answer: Централизация на имена на домейни
wrong_answers:
  - Управление на онлайн репутацията
  - Проблемът с дисперсията на mining
  - Неравномерното разпределение на биткойните
explanation: |
 Системата за имена на домейни се контролира от ICANN - корпорация с нестопанска цел, учредена съгласно калифорнийското законодателство, което създава проблеми с цензурата. Концепцията на BitDNS
 (по-късно преименувана на Namecoin) се състоеше в поставянето на управлението на тези имена на домейни в блокчейн, подобен на Bitcoin, за да се заобиколи този проблем.
reviewed: true
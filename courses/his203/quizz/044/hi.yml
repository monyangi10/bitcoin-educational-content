question: नेमकॉइन, जो Bitcoin की पहली वैकल्पिक क्रिप्टोकरेंसी थी, किस समस्या का समाधान करने वाली थी?
answer: डोमेन नाम केंद्रीकरण
wrong_answers:
  - ऑनलाइन प्रतिष्ठा प्रबंधन
  - mining भिन्नता की समस्या
  - बिटकॉइन का असमान वितरण
explanation: |
 डोमेन नाम प्रणाली की देखरेख कैलिफोर्नियाई कानून के तहत निगमित एक गैर-लाभकारी निगम, ICANN द्वारा की जाती है, जिससे सेंसरशिप की समस्या उत्पन्न होती है। BitDNS अवधारणा (जिसे बाद में Namecoin नाम दिया गया) में इस समस्या से बचने के लिए इन डोमेन नामों के प्रबंधन को Bitcoin के समान ब्लॉकचेन पर रखने का प्रस्ताव था।
reviewed: true
question: Bitcoinに代わる最初の暗号通貨であるNamecoinは、どのような問題を解決する予定だったのだろうか？
answer: ドメイン名の一元化
wrong_answers:
  - オンライン・レピュテーション・マネジメント
  - miningの分散の問題
  - ビットコインの不平等な分配
explanation: |
 ドメインネームシステムは、カリフォルニア州法に基づいて設立された非営利法人ICANNによって監督されており、検閲の問題がある。BitDNSのコンセプト
 (後にNamecoinと改名）は、この問題を回避するために、これらのドメイン名の管理をBitcoinに似たブロックチェーン上に置くことから成っている。
reviewed: true
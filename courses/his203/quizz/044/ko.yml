question: Bitcoin의 첫 번째 대체 암호화폐인 네임코인은 어떤 문제를 해결하려 했나요?
answer: 도메인 이름 중앙 집중화
wrong_answers:
  - 온라인 평판 관리
  - mining 편차 문제
  - 비트코인의 불평등한 분배
explanation: |
 도메인 네임 시스템은 캘리포니아 법에 따라 설립된 비영리 법인인 ICANN이 감독하며, 검열 문제가 제기될 수 있습니다. BitDNS 개념
 (이후 네임코인으로 명칭 변경)은 이 문제를 해결하기 위해 이러한 도메인 이름의 관리를 Bitcoin와 유사한 블록체인에 배치하는 것으로 구성되었습니다.
reviewed: true
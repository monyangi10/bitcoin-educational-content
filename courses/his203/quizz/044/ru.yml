question: Какую проблему должен был решить Namecoin, первая криптовалюта, альтернативная Bitcoin?
answer: Централизация доменных имен
wrong_answers:
  - Управление онлайн-репутацией
  - Проблема дисперсии mining
  - Неравномерное распределение биткоинов
explanation: |
 Система доменных имен контролируется ICANN, некоммерческой корпорацией, зарегистрированной в соответствии с калифорнийским законодательством, что создает проблемы с цензурой. Концепция BitDNS
 (позже переименованная в Namecoin) заключалась в том, чтобы поместить управление этими доменными именами в блокчейн, подобный Bitcoin, чтобы обойти эту проблему.
reviewed: true
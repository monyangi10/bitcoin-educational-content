question: ปัญหาอะไรที่ Namecoin ซึ่งเป็นสกุลเงินดิจิทัลทางเลือกแรกที่ Bitcoin ควรจะแก้ไข?
answer: การรวมศูนย์ชื่อโดเมน
wrong_answers:
  - การจัดการชื่อเสียงออนไลน์
  - ปัญหาความแปรปรวนของ mining
  - การกระจายตัวของบิตคอยน์ที่ไม่เท่าเทียมกัน
explanation: |
 ระบบชื่อโดเมนถูกดูแลโดย ICANN ซึ่งเป็นองค์กรไม่แสวงหาผลกำไรที่จัดตั้งขึ้นภายใต้กฎหมายของรัฐแคลิฟอร์เนีย ซึ่งก่อให้เกิดปัญหาการเซ็นเซอร์ แนวคิด BitDNS (ต่อมาเปลี่ยนชื่อเป็น Namecoin) ประกอบด้วยการวางการจัดการชื่อโดเมนเหล่านี้บนบล็อกเชนที่คล้ายกับ Bitcoin เพื่อหลีกเลี่ยงปัญหานี้
reviewed: true
question: Namecoin، اولین ارز دیجیتال جایگزین برای Bitcoin، قرار بود چه مشکلی را حل کند؟
answer: متمرکزسازی نام دامنه
wrong_answers:
  - مدیریت شهرت آنلاین
  - مشکل واریانس mining
  - توزیع نابرابر بیت‌کوین‌ها
explanation: |
 سیستم نام دامنه توسط ICANN، یک شرکت غیرانتفاعی که تحت قوانین کالیفرنیا تأسیس شده است، نظارت می‌شود که مشکلات سانسور را به همراه دارد. مفهوم BitDNS (که بعداً به Namecoin تغییر نام داد) شامل قرار دادن مدیریت این نام‌های دامنه بر روی یک بلاکچین مشابه Bitcoin بود تا این مشکل را دور بزند.
reviewed: true
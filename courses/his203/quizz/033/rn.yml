question: Uretse ikimenyetso ciwe ca mining pool, ni ibiki vyinshi mu vyanditswe na Luke-Jr biciye kuri Eligius muri Myandagaro 2011 vyari birimwo?
answer: Amasengesho
wrong_answers:
  - Amasanamu y'ibiterasoni y'abana
  - Memes
  - Ubutumwa bwa politike
explanation: |
 Mu gukurikiza ukwizera kwiwe kw’Abagatolika (sedevacantist), Luke-Jr yashizemwo amasengesho n’ivyanditswe vyeranda mu gutanga impembo ku mabuye yacukuwe n’ikidengeri ciwe ca mining, 
 Eligius, atagishije inama abacukuzi b’amabuye y’agaciro bareba, ivyo bikaba vyatumye habaho impaka nyinshi.
reviewed: true
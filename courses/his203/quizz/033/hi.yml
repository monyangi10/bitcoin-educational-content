question: उनके mining पूल के पहचानकर्ता के अलावा, अगस्त 2011 में ल्यूक-जूनियर से लेकर एलिजियस तक द्वारा बनाए गए अधिकांश शिलालेखों में क्या शामिल था?
answer: प्रार्थना
wrong_answers:
  - बाल पोर्नोग्राफी
  - मीम
  - राजनीतिक संदेश
explanation: |
 अपने कैथोलिक (सेडेवाकैंटिस्ट) विश्वास के अनुरूप, ल्यूक-जूनियर ने अपने mining पूल, एलिजियस द्वारा खनन किए गए ब्लॉकों के लिए इनाम लेनदेन में प्रार्थना और पवित्र ग्रंथों को शामिल किया, संबंधित खनिकों से परामर्श किए बिना, जिससे एक जोरदार बहस छिड़ गई।
reviewed: true
question: 2011년 8월에 루크 주니어가 엘리기우스를 통해 만든 대부분의 비문에는 mining 풀의 식별자 외에 무엇이 포함되어 있었나요?
answer: 기도
wrong_answers:
  - 아동 음란물
  - 밈
  - 정치적 메시지
explanation: |
 루크 주니어는 가톨릭(구원파) 신앙에 따라 mining 풀에서 채굴한 블록에 대한 보상 거래에 기도문과 성구를 포함시켰습니다,
 엘리기우스는 관련 채굴자들과 상의하지 않고 기도문과 성구를 포함시켰고, 이는 활발한 논쟁을 불러 일으켰습니다.
reviewed: true
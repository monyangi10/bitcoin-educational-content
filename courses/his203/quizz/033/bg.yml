question: Освен идентификатора на неговия басейн mining, какво съдържат повечето надписи, направени от Лука-младши чрез Елигиус през август 2011 г.?
answer: Молитви
wrong_answers:
  - Детска порнография
  - Мемове
  - Политически послания
explanation: |
 В съответствие с католическата си вяра (седевакантизъм) Лука-младши включва молитви и свещени текстове в транзакцията за възнаграждение на блоковете, добити от неговия пул mining,
 Eligius, без да се консултира със съответните миньори, което предизвика оживен дебат.
reviewed: true
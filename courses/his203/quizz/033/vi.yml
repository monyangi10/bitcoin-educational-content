question: Ngoài mã định danh của nhóm mining, phần lớn các dòng chữ do Luke-Jr và Eligius viết vào tháng 8 năm 2011 chứa đựng những thông tin gì khác?
answer: Lời cầu nguyện
wrong_answers:
  - Khiêu dâm trẻ em
  - Ảnh chế
  - Thông điệp chính trị
explanation: |
 Phù hợp với đức tin Công giáo (thuyết sedevacantist) của mình, Luke-Jr đã đưa các lời cầu nguyện và kinh sách vào giao dịch phần thưởng cho các khối được khai thác bởi nhóm mining của ông, Eligius, mà không tham khảo ý kiến ​​của những người khai thác có liên quan, điều này đã gây ra một cuộc tranh luận sôi nổi.
reviewed: true
question: นอกจากตัวระบุของพูล mining ของเขาแล้ว ข้อความส่วนใหญ่ที่ Luke-Jr สลักผ่าน Eligius ในเดือนสิงหาคม 2011 มีอะไรบ้าง?
answer: คำอธิษฐาน
wrong_answers:
  - สื่อลามกอนาจารเด็ก
  - มีม
  - ข้อความทางการเมือง
explanation: |
 ตามความเชื่อคาทอลิก (sedevacantist) ของเขา Luke-Jr ได้รวมคำอธิษฐานและข้อความศักดิ์สิทธิ์ไว้ในธุรกรรมรางวัลสำหรับบล็อกที่ขุดโดยกลุ่ม mining ของเขา Eligius โดยไม่ได้ปรึกษากับนักขุดที่เกี่ยวข้อง ซึ่งทำให้เกิดการถกเถียงอย่างคึกคัก
reviewed: true
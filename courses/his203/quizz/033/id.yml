question: Selain pengenal kolam mining miliknya, apa saja isi sebagian besar prasasti yang dibuat oleh Luke-Jr hingga Eligius pada bulan Agustus 2011?
answer: Berdoa
wrong_answers:
  - Pornografi anak
  - Meme
  - Pesan politik
explanation: |
 Sesuai dengan keyakinannya sebagai seorang Katolik (sedevacantist), Luke-Jr memasukkan doa dan teks-teks suci dalam transaksi hadiah untuk blok-blok yang ditambang oleh pool mining miliknya,
 Eligius, tanpa berkonsultasi dengan para penambang yang bersangkutan, yang memicu perdebatan sengit.
reviewed: true
question: In addition to his cooperative's ID, what else did the majority of Luke-Jr's listings via Eligius contain in August 2011?
answer: Prayers
wrong_answers:
  - Child pornography
  - Memes
  - Political messages
explanation: |
 In keeping with his Catholic (sedevacantist) faith, Luke-Jr included prayers and sacred texts in the reward transaction for blocks mined by his cooperative, Eligius, without consulting the miners concerned, which provoked a lively debate.
reviewed: false
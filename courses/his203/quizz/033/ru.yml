question: Кроме идентификатора его пула mining, что содержало большинство надписей, сделанных Люком-младшим через Элигиуса в августе 2011 года?
answer: Молитвы
wrong_answers:
  - Детская порнография
  - Мемы
  - Политические послания
explanation: |
 Следуя своей католической (седевакантистской) вере, Люк-младший включил молитвы и священные тексты в транзакцию вознаграждения за блоки, добытые его пулом mining,
 Eligius, не посоветовавшись с майнерами, что вызвало оживленную дискуссию.
reviewed: true
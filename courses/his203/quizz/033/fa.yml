question: علاوه بر شناسه استخر mining او، اکثر نوشته‌هایی که توسط Luke-Jr از طریق Eligius در آگوست 2011 انجام شد، چه چیزی را شامل می‌شدند؟
answer: دعاها
wrong_answers:
  - پورنوگرافی کودکان
  - میم‌ها
  - پیام‌های سیاسی
explanation: |
 در راستای ایمان کاتولیک (سدوکانتیست) خود، لوک-جونیور دعاها و متون مقدس را در تراکنش پاداش برای بلاک‌هایی که توسط استخر mining او، الیجیوس، استخراج شده بودند، بدون مشورت با ماینرهای مربوطه، گنجاند که این امر باعث بحث و جدل زنده‌ای شد.
reviewed: true
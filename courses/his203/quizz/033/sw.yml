question: Mbali na kitambulisho chake cha mining pool, maandishi mengi yaliyoandikwa na Luke-Jr kupitia Eligius yalikuwa na nini mnamo Agosti 2011?
answer: Maombi
wrong_answers:
  - Ponografia ya watoto
  - Meme
  - Ujumbe wa kisiasa
explanation: |
 Kwa mujibu wa imani yake ya Kikatoliki (ya kupinga uasi), Luke-Jr alijumuisha sala na maandishi matakatifu katika muamala wa zawadi kwa vitalu vilivyochimbwa na bwawa lake la mining, Eligius, bila kushauriana na wachimbaji husika, jambo ambalo lilisababisha mjadala mkali.
reviewed: true
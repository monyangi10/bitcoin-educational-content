question: पे टू स्क्रिप्ट Hash अपग्रेड को विशेष रूप से किन उपयोग मामलों के लिए तैनात किया गया है?
answer: बहुपक्षीय हस्ताक्षर (मल्टीसिग) द्वारा धनराशि सुरक्षित करने के लिए
wrong_answers:
  - एस्क्रो सेवाओं के लिए
  - मर्ज किए गए mining के कारण नेटवर्क कंप्यूटिंग शक्ति बढ़ाने के लिए
  - विदेश में धन भेजने के लिए
explanation: |
 पायरेसी हमलों की बढ़ती संख्या के कारण, धन की सुरक्षा इस समय एक अत्यंत महत्वपूर्ण मुद्दा है। इस विषय को 23 अगस्त, 2011 को परियोजना प्रमुख गैविन एंड्रेसन द्वारा उठाया गया था, जो प्रोटोकॉल में पहले से मौजूद मल्टीसिग्नेचर कार्यक्षमता के मानकीकरण में तेजी लाना चाहते थे।
 इसी के परिणामस्वरूप सर्दियों के दौरान OP_EVAL और फिर P2SH का विकास हुआ।
reviewed: true
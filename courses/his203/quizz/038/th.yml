question: การอัปเกรด Pay to Script Hash ได้ถูกนำไปใช้ในกรณีการใช้งานใดบ้างโดยเฉพาะ?
answer: สำหรับการรักษาความปลอดภัยของเงินทุนด้วยลายเซ็นหลายฝ่าย (multisig)
wrong_answers:
  - สำหรับบริการเอสโครว์
  - เพื่อเพิ่มพลังการประมวลผลเครือข่ายด้วยการรวม mining
  - สำหรับการส่งเงินไปต่างประเทศ
explanation: |
 การรักษาความปลอดภัยของเงินทุนเป็นประเด็นที่สำคัญมากในขณะนี้ เนื่องจากจำนวนการโจมตีจากการละเมิดลิขสิทธิ์ที่เพิ่มขึ้น หัวข้อนี้ถูกนำมาพูดคุยเมื่อวันที่ 23 สิงหาคม 2011 โดย Gavin Andresen ผู้นำโครงการ ซึ่งต้องการเร่งการมาตรฐานของฟังก์ชันการทำงานแบบหลายลายเซ็นที่มีอยู่แล้วในโปรโตคอล สิ่งนี้นำไปสู่การพัฒนา OP_EVAL และต่อมา P2SH ในช่วงฤดูหนาว
reviewed: true
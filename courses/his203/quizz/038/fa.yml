question: ارتقاء Pay to Script Hash به‌طور خاص برای کدام موارد استفاده به‌کار گرفته شده است؟
answer: برای تأمین بودجه با امضای چند طرفه (multisig)
wrong_answers:
  - برای خدمات امانی
  - برای افزایش قدرت محاسبات شبکه به لطف ادغام mining
  - برای ارسال حواله به خارج از کشور
explanation: |
 تأمین بودجه در حال حاضر به دلیل افزایش تعداد حملات دزدی دریایی یک مسئله بسیار مهم است. این موضوع در تاریخ ۲۳ اوت ۲۰۱۱ توسط گوین آندرسن، رهبر پروژه، مطرح شد که می‌خواست استانداردسازی قابلیت چند امضایی که قبلاً در پروتکل وجود داشت را تسریع کند. این منجر به توسعه OP_EVAL و سپس P2SH در طول زمستان شد.
reviewed: true
question: Для каких конкретно случаев использования было развернуто обновление Pay to Script Hash?
answer: Для обеспечения безопасности средств с помощью многосторонней подписи (multisig)
wrong_answers:
  - Для услуг эскроу
  - Увеличение вычислительной мощности сети благодаря объединенному mining
  - Для отправки денежных переводов за границу
explanation: |
 Обеспечение сохранности средств - очень важный вопрос в настоящее время в связи с участившимися случаями пиратских нападений. Эта тема была поднята 23 августа 2011 года
 гэвином Андресеном, руководителем проекта, который хотел ускорить стандартизацию функции мультиподписи, уже присутствующей в протоколе.
 Это привело к разработке OP_EVAL, а затем P2SH в течение зимы.
reviewed: true
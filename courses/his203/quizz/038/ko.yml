question: 특히 어떤 사용 사례에 페이 투 스크립트 Hash 업그레이드가 배포되었나요?
answer: 다자간 서명(다중 서명)으로 자금을 보호하는 경우
wrong_answers:
  - 에스크로 서비스의 경우
  - 병합된 mining로 네트워크 컴퓨팅 성능 향상
  - 해외로 송금하는 경우
explanation: |
 불법 복제 공격의 증가로 인해 자금 확보는 현재 매우 중요한 문제입니다. 이 주제는 2011년 8월 23일, 다중 서명 기능의 표준화를 앞당기고자 했던 프로젝트 리더 Gavin Andresen이
 프로토콜에 이미 존재하는 다중 서명 기능의 표준화 속도를 높이고자 했던 프로젝트 리더 개빈 안드레센에 의해 이 주제가 논의되었습니다.
 이로 인해 겨울 동안 OP_EVAL가 개발되었고 그 후 P2SH가 개발되었습니다.
reviewed: true
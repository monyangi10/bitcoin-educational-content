question: Pay to Script Hashのアップグレードは、特にどのようなユースケースに展開されていますか？
answer: 多者間署名（マルチシグ）による資金確保のため
wrong_answers:
  - エスクロー・サービス
  - miningの統合によるネットワーク・コンピューティング・パワーの向上
  - 海外への送金
explanation: |
 海賊行為の増加により、資金確保は現在非常に重要な課題となっている。この話題は2011年8月23日に持ち上がった。
 プロジェクト・リーダーのギャビン・アンドレセンは、すでにプロトコルに存在するマルチシグネチャ機能の標準化を早めたいと考えていた。
 その結果、冬の間にOP_EVAL、そしてP2SHが開発された。
reviewed: true
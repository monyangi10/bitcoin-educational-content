question: За кои случаи на употреба е внедрена модернизацията Pay to Script Hash?
answer: За осигуряване на средства чрез многостранно подписване (multisig)
wrong_answers:
  - За ескроу услуги
  - Увеличаване на изчислителната мощност на мрежата благодарение на обединените mining
  - За изпращане на парични преводи в чужбина
explanation: |
 Осигуряването на средства е много важен въпрос в момента поради нарастващия брой пиратски атаки. Темата беше поставена на дневен ред на 23 август 2011 г
 от Гавин Андресен, ръководител на проекта, който искаше да ускори стандартизирането на вече наличната в протокола функционалност за множество подписи.
 Това доведе до разработването на OP_EVAL, а след това и на P2SH през зимата.
reviewed: true
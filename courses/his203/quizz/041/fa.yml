question: کدام توسعه‌دهنده Bitcoin به شدت با ارتقاء Pay to Script Hash مخالف بود؟
answer: لوک دش‌جونیور
wrong_answers:
  - امیر تاکی
  - Gregory Maxwell
  - گوین آندرسن
explanation: |
 لوک دش‌جونیور احساس کرد که پیشنهاد OP_EVAL بسیار بهتر بود، زیرا زیباتر بود؛ اینکه P2SH سیستم اسکریپت‌نویسی را با "یک مدل ویژه واحد" جایگزین کرده بود.
 او همچنین از گاوین به خاطر گنجاندن گزارش‌دهی پیش‌فرض در نرم‌افزار انتقاد کرد. در پاسخ، لوک-جونیور کد عملیاتی خود، OP_CHECKHASHVERIFY (BIP 17) را توسعه داد.
reviewed: true
question: Кой от разработчиците на Bitcoin се противопоставяше яростно на надстройката Hash "Pay to Script"?
answer: Лука Дашър
wrong_answers:
  - Амир Тааки
  - Gregory Maxwell
  - Гавин Андресен
explanation: |
 Luke Dashjr смята, че предложението на OP_EVAL е много по-добро, защото е по-елегантно; че P2SH заменя системата за скриптове с "един специален модел".
 Той също така разкритикува Гавин за това, че е включил в софтуера отчети по подразбиране. В отговор на това Люк-Джър разработва свой собствен операционен код - OP_CHECKHASHVERIFY (BIP 17).
reviewed: true
question: Bitcoin के किस डेवलपर ने पे टू स्क्रिप्ट Hash अपग्रेड का पुरजोर विरोध किया था?
answer: ल्यूक डैश जूनियर
wrong_answers:
  - अमीर ताकी
  - Gregory Maxwell
  - गेविन एंड्रेसेन
explanation: |
 ल्यूक डैश जूनियर का मानना ​​था कि OP_EVAL का प्रस्ताव कहीं बेहतर था, क्योंकि यह अधिक सुव्यवस्थित था; P2SH ने स्क्रिप्टिंग सिस्टम को "एक विशेष मॉडल" से बदल दिया था।
 उन्होंने सॉफ्टवेयर में डिफ़ॉल्ट रिपोर्टिंग शामिल करने के लिए गैविन की आलोचना भी की। इसके जवाब में, ल्यूक-जूनियर ने अपना खुद का ऑपरेटिंग कोड, OP_CHECKHASHVERIFY (BIP 17) विकसित किया।
reviewed: true
question: Кто из разработчиков Bitcoin был категорически против обновления Pay to Script Hash?
answer: Люк Дашжр
wrong_answers:
  - Амир Тааки
  - Gregory Maxwell
  - Гэвин Андресен
explanation: |
 Люк Дашир считает, что предложение OP_EVAL было намного лучше, потому что оно было более элегантным; что P2SH заменил систему сценариев "одной специальной моделью".
 Он также критиковал Гэвина за включение в программу отчетов по умолчанию. В ответ Люк-младший разработал свой собственный операционный код, OP_CHECKHASHVERIFY (BIP 17).
reviewed: true
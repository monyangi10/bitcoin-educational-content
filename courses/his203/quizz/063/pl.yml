question: Która usługa ekosystemu Bitcoin NIE została dotknięta włamaniem do usługi hostingowej Linode w dniu 1 marca 2012 r.?
answer: Usługa wymiany walut BitInstant, zarządzana przez Charliego Shrema
wrong_answers:

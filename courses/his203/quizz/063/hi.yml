question: 1 मार्च, 2012 को लिनोड होस्टिंग सेवा हैक से कौन सी Bitcoin इकोसिस्टम सेवा प्रभावित नहीं हुई थी?
answer: बिटइंस्टेंट की विदेशी मुद्रा सेवा का प्रबंधन चार्ली श्रेम करते हैं।
wrong_answers:
  - झोउ टोंग द्वारा प्रबंधित Bitcoinica ट्रेडिंग प्लेटफॉर्म
  - BitcoinCZ Mining mining सहकारी समिति, स्लश द्वारा प्रबंधित
  - गैविन एंड्रेसेन द्वारा प्रबंधित Bitcoin नल
explanation: |
 हैकर ने कंपनी के ग्राहक सेवा पोर्टल तक पहुंच बनाई और आठ खातों पर नियंत्रण कर लिया, जिनमें से सभी का Bitcoin से संबंध था। उसने Bitcoinica से संबंधित 43,554 बिटकॉइन जब्त कर लिए, Slush के को-ऑप हॉट wallet से 3,094 बिटकॉइन निकाल लिए और Gavin के Bitcoin फाउसेट पर मौजूद 5 बिटकॉइन पर कब्जा कर लिया।
reviewed: true
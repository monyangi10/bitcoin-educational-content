question: Какая служба экосистемы Bitcoin НЕ была затронута взломом хостинга Linode 1 марта 2012 года?
answer: Валютный сервис BitInstant, управляемый Чарли Шремом
wrong_answers:
  - Торговая платформа Bitcoinica, управляемая Чжоу Туном
  - BitcoinCZ Mining mining кооператив, управляемый Slush
  - Кран Bitcoin, управляемый Гэвином Андресеном
explanation: |
 Хакер получил доступ к порталу обслуживания клиентов компании и взял под контроль восемь учетных записей, все из которых имели отношение к Bitcoin. Он изъял 43 554
 биткоинов, принадлежащих Bitcoinica, снял 3 094 биткоина с коворкинга Slush's wallet и получил в свои руки 5 биткоинов, присутствовавших на кране Bitcoin Гэвина.
reviewed: true
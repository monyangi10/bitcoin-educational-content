question: کدام سرویس اکوسیستم Bitcoin تحت تأثیر هک سرویس میزبانی Linode در 1 مارس 2012 قرار نگرفت؟
answer: خدمات صرافی BitInstant، مدیریت شده توسط چارلی شرم
wrong_answers:
  - پلتفرم معاملاتی Bitcoinica، مدیریت شده توسط ژو تونگ
  - BitcoinCZ Mining mining تعاونی، مدیریت شده توسط Slush
  - شیر آب Bitcoin، مدیریت شده توسط گاوین آندرسن
explanation: |
 هکر به پورتال خدمات مشتری شرکت دسترسی پیدا کرد و کنترل هشت حساب را به دست گرفت که همگی با Bitcoin رابطه داشتند. او 43,554 بیت‌کوین متعلق به Bitcoinica را تصاحب کرد، 3,094 بیت‌کوین از wallet داغ Slush's co-op برداشت و 5 بیت‌کوین موجود در Bitcoin faucet گاوین را به دست آورد.
reviewed: true
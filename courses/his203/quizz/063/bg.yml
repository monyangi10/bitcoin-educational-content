question: Коя услуга от екосистемата Bitcoin НЕ беше засегната от хакерската атака срещу хостинг услугата Linode на 1 март 2012 г.?
answer: Услугата за обмен на валута BitInstant, управлявана от Чарли Шрем
wrong_answers:
  - Платформата за търговия Bitcoinica, управлявана от Джоу Тонг
  - BitcoinCZ Mining mining кооперация, управлявана от Slush
  - Кранът Bitcoin, управляван от Гавин Андресен
explanation: |
 Хакерът е получил достъп до портала за обслужване на клиенти на компанията и е установил контрол над осем акаунта, всички от които са имали връзка с Bitcoin. Той иззема 43 554
 биткойни, принадлежащи на Bitcoinица, премахнал 3094 биткойна от горещата wallet на кооперацията Slush и се сдобил с 5 биткойна, налични в кранчето на Bitcoin на Гавин.
reviewed: true
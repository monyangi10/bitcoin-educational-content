question: Koji Bitcoin ekosistemski servis NIJE bio pogođen hakovanjem Linode hosting servisa 1. marta 2012?
answer: BitInstant usluga za razmenu stranih valuta, kojom upravlja Charlie Shrem
wrong_answers:
  - Bitcoinica platforma za trgovanje, kojom upravlja Zhou Tong

explanation: |
 Haker je pristupio portalu korisničke službe kompanije i preuzeo kontrolu nad osam naloga, od kojih su svi imali vezu sa Bitcoin. Zaplenio je 43,554 
 bitkoina koji pripadaju Bitcoinica, uklonio 3,094 bitkoina iz Slush-ovog kooperativnog hot wallet i došao do 5 bitkoina prisutnih na Gavinovom Bitcoin faucet-u.

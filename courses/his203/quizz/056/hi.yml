question: पोर्कफेस्ट 2012 में व्यापार के लिए समर्पित उस क्षेत्र का नाम क्या था, जहां आधे से अधिक व्यापारी बिटकॉइन स्वीकार करते थे?
answer: अगोरा घाटी
wrong_answers:
  - Bitcoin स्ट्रीट
  - लिबर्टेरियन रोड
  - हार्ड मनी कैंप
explanation: |
 एगोरा वैली में लगभग चालीस सूचीबद्ध स्टॉल थे, जिनमें खाने-पीने की चीजें, किताबें, कपड़े, चाकू, टोपी और अन्य सामान बेचे जा रहे थे। बिटइंस्टेंट के सदस्यों का भी वहाँ एक स्टॉल था, जिसका नाम था "बर्नैंकेज़ Bitcoin Exchange"।
 यहाँ वे डॉलर एक्सचेंज की सुविधा दे रहे थे और उत्सुक लोगों को Bitcoin का उपयोग करना सिखा रहे थे।
reviewed: true
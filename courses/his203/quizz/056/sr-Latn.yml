question: Ko je bio naziv područja posvećenog trgovini na PorcFestu 2012, gde je više od polovine trgovaca prihvatilo bitcoin?
answer: Agora Valley
wrong_answers:
  - Bitcoin Ulica
  - Libertarijanski put
  - Hard Money Camp
explanation: |
 Agora Valley je uključivala oko četrdeset prijavljenih štandova, koji su prodavali hranu, piće, knjige, odeću, noževe, šešire i još mnogo toga. Članovi BitInstant-a su imali štand tamo, nazvan "Bernanke's Bitcoin Exchange", gde su pružali usluge razmene dolara i učili znatiželjne kako da koriste Bitcoin.
reviewed: true
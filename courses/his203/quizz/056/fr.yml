question: Comment se nommait la zone dédiée au commerce lors du PorcFest 2012, où plus de la moitié des commerçants acceptait le bitcoin ?
answer: L'Agora Valley
wrong_answers:
  - La Bitcoin Street
  - La Libertarian Road
  - Le Hard Money Camp
explanation: |
 Elle comprenait une quarantaine de stands répertoriés, où on pouvait retrouver de la nourriture, des boissons, des livres, des vêtements, des couteaux, des chapeaux, etc. Les membres de BitInstant y tenaient un stand, appelé le « Bernanke's Bitcoin Exchange », où ils assuraient le change avec le dollar et apprennaient aux curieux comment utiliser Bitcoin.
reviewed: false

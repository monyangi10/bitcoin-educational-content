question: Jak nazywała się strefa poświęcona handlowi na PorcFest 2012, gdzie ponad połowa sprzedawców akceptowała bitcoiny?
answer: Agora Valley
wrong_answers:
  - Bitcoin ul
  - Libertariańska droga
  - Obóz twardych pieniędzy
explanation: |
 W Agora Valley znajdowało się około czterdziestu stoisk z jedzeniem, napojami, książkami, ubraniami, nożami, czapkami i nie tylko. Członkowie BitInstant mieli tam stoisko o nazwie
 "Bernanke's Bitcoin Exchange", gdzie zapewniali wymianę dolarów i uczyli ciekawskich, jak korzystać z Bitcoin.
reviewed: true
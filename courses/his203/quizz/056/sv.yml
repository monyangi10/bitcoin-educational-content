question: Vad hette handelsområdet på PorcFest 2012, där mer än hälften av handlarna accepterade bitcoin?
answer: Agora Valley
wrong_answers:
  - Bitcoin Gatan
  - Den libertarianska vägen
  - Läger för hårda pengar
explanation: |
 Agora Valley bestod av ett fyrtiotal listade montrar som sålde mat, dryck, böcker, kläder, knivar, hattar med mera. Medlemmar av BitInstant hade en monter där, kallad
 "Bernanke's Bitcoin Exchange", där de tillhandahöll dollarväxling och lärde nyfikna hur man använder Bitcoin.
reviewed: true
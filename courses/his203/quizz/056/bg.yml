question: Как се наричаше зоната, посветена на търговията на PorcFest 2012, където повече от половината търговци приемаха биткойн?
answer: Долината Агора
wrong_answers:
  - Улица Bitcoin
  - Либертарианският път
  - Лагер за твърди пари
explanation: |
 В долината Агора имаше около четиридесет щанда, на които се продаваха храни, напитки, книги, дрехи, ножове, шапки и др. Членовете на BitInstant имаха щанд там, наречен
 "Bitcoin Exchange на Бернанке", където предоставяха обмен на долари и учеха любопитните как да използват Bitcoin.
reviewed: true
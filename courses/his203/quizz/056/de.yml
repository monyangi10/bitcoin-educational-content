question: Wie hieß der Bereich, der auf dem PorcFest 2012 dem Handel gewidmet war und in dem mehr als die Hälfte der Händler Bitcoin akzeptierten?
answer: Agora-Tal
wrong_answers:
  - Bitcoin Straße
  - Der libertäre Weg
  - Hartgeld-Camp
explanation: |
 Auf der Agora Valley gab es rund vierzig Stände, an denen Essen, Getränke, Bücher, Kleidung, Messer, Hüte und mehr verkauft wurden. Mitglieder von BitInstant hatten dort einen Stand mit dem Namen
 "Bernanke's Bitcoin Exchange", an dem sie Dollar umtauschen und den Neugierigen zeigen konnten, wie man Bitcoin benutzt.
reviewed: true
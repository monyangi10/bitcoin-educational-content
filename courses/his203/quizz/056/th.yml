question: ชื่อของพื้นที่ที่อุทิศให้กับการซื้อขายที่ PorcFest 2012 ซึ่งมีพ่อค้ามากกว่าครึ่งที่ยอมรับบิตคอยน์คืออะไร?
answer: Agora Valley
wrong_answers:
  - Bitcoin ถนน
  - ถนนเสรีนิยม
  - แคมป์เงินสด
explanation: |
 Agora Valley มีบูธที่ลงทะเบียนไว้ประมาณสี่สิบบูธ ขายอาหาร เครื่องดื่ม หนังสือ เสื้อผ้า มีด หมวก และอื่นๆ สมาชิกของ BitInstant มีบูธที่นั่น ชื่อว่า "Bernanke's Bitcoin Exchange" ซึ่งพวกเขาให้บริการแลกเปลี่ยนเงินดอลลาร์และสอนผู้ที่สนใจวิธีการใช้ Bitcoin
reviewed: true
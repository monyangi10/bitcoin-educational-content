question: Akarere kagenewe gucururizamwo mu birori vya PorcFest 2012, aho abacuruzi barenga ica kabiri bemeye bitcoin, hari izina ry’ikihe?
answer: Ikiyaya ca Agora
wrong_answers:
  - Ibarabara Bitcoin
  - Inzira y'Umwidegemvyo
  - Ikambi y'amahera akomeye
explanation: |
 Agora Valley harimwo ibibanza nka mirongo ine vyari vyanditswe, bigurisha ivyokurya, ivyokunywa, ibitabu, impuzu, ibyuma, inkofero n’ibindi. Abagize BitInstant bari bafise urusengero ng’aho, rwitwa . 
 "Bitcoin Exchange ya Bernanke", aho batanga amadolari yo guhindura, bakigisha abashaka kumenya ingene bakoresha Bitcoin.
reviewed: true
question: Apa nama area yang didedikasikan untuk perdagangan di PorcFest 2012, di mana lebih dari separuh pedagang menerima bitcoin?
answer: Lembah Agora
wrong_answers:
  - Jalan Bitcoin
  - Jalan Libertarian
  - Hard Money Camp
explanation: |
 Agora Valley memiliki sekitar empat puluh stan yang terdaftar, menjual makanan, minuman, buku, pakaian, pisau, topi, dan banyak lagi. Anggota BitInstant memiliki stan di sana, yang disebut
 "Bernanke's Bitcoin Exchange", di mana mereka menyediakan penukaran dolar dan mengajari mereka yang ingin tahu cara menggunakan Bitcoin.
reviewed: true
question: Come si chiamava l'area dedicata al trading al PorcFest 2012, dove più della metà dei commercianti accettava bitcoin?
answer: Valle dell'Agora
wrong_answers:
  - Via Bitcoin
  - La strada libertaria
  - Campo per il denaro duro
explanation: |
 Agora Valley comprendeva una quarantina di stand quotati, che vendevano cibo, bevande, libri, vestiti, coltelli, cappelli e altro ancora. I membri di BitInstant avevano uno stand, chiamato
 "Bernanke's Bitcoin Exchange", dove fornivano il cambio del dollaro e insegnavano ai curiosi come usare il Bitcoin.
reviewed: true
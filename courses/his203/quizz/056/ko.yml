question: 2012년 포크페스트에서 절반 이상의 판매자가 비트코인을 받았던 거래 전용 구역의 이름은 무엇인가요?
answer: 아고라 밸리
wrong_answers:
  - Bitcoin 거리
  - 자유주의자 길
  - 하드 머니 캠프
explanation: |
 아고라 밸리에는 음식, 음료, 책, 옷, 칼, 모자 등을 판매하는 40여 개의 부스가 있었습니다. 비트인스턴트 회원들은 그곳에 부스를 차렸습니다
 "버냉키의 Bitcoin Exchange"이라는 부스에서 달러 환전을 제공하고 궁금해하는 사람들에게 Bitcoin 사용법을 알려주었습니다.
reviewed: true
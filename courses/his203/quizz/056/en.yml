question: What was the name of the area dedicated to trading at PorcFest 2012, where more than half the merchants accepted bitcoin?
answer: Agora Valley
wrong_answers:
  - Bitcoin Street
  - The Libertarian Road
  - Hard Money Camp
explanation: |
 It included some forty listed booths, selling food, drinks, books, clothes, knives, hats and more. Members of BitInstant had a booth there, called "Bernanke's Bitcoin Exchange", where they provided dollar exchange and taught the curious how to use Bitcoin.
reviewed: false
question: ポルクフェスト2012のトレーディング専用エリアの名前は何でしたか？
answer: アゴラ渓谷
wrong_answers:
  - Bitcoin通り
  - リバタリアンの道
  - ハード・マネー・キャンプ
explanation: |
 アゴラ・バレーには、食べ物、飲み物、本、洋服、ナイフ、帽子などを売る40ほどのブースがあった。BitInstantのメンバーは、そこに「バーナンキのBitcoin Exchange」というブースを出した。
 「バーナンキのBitcoin Exchange "と呼ばれるブースで、ドル両替を提供し、Bitcoinの使い方を教えた。
reviewed: true
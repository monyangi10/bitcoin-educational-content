question: نام منطقه‌ای که به تجارت در PorcFest 2012 اختصاص داده شده بود و بیش از نیمی از بازرگانان بیت‌کوین قبول می‌کردند چه بود؟
answer: دره آگورا
wrong_answers:
  - خیابان Bitcoin
  - جاده لیبرترین
  - کمپ پول سخت
explanation: |
 دره آگورا شامل حدود چهل غرفه فهرست‌شده بود که غذا، نوشیدنی، کتاب، لباس، چاقو، کلاه و موارد دیگر می‌فروختند. اعضای BitInstant غرفه‌ای به نام "Bernanke's Bitcoin Exchange" داشتند، جایی که مبادله دلار انجام می‌دادند و به کنجکاوان نحوه استفاده از Bitcoin را آموزش می‌دادند.
reviewed: true
question: Jak se jmenoval prostor věnovaný obchodování na PorcFestu 2012, kde více než polovina obchodníků přijímala bitcoiny?
answer: Agora Valley
wrong_answers:
  - Bitcoin Street
  - Libertariánská cesta
  - Hard Money Camp
explanation: |
 Agora Valley zahrnovala asi čtyřicet stánků s jídlem, nápoji, knihami, oblečením, noži, klobouky a dalšími předměty. Členové BitInstant zde měli stánek, tzv
 "Bernankeho Bitcoin Exchange", kde poskytovali směnu dolarů a učili zvědavce, jak Bitcoin používat.
reviewed: true
question: Cómo se llamaba la zona dedicada al comercio en PorcFest 2012, donde más de la mitad de los comerciantes aceptaban bitcoin?
answer: Valle del Ágora
wrong_answers:
  - Calle Bitcoin
  - La vía libertaria
  - Campamento de Dinero Duro
explanation: |
 Agora Valley contaba con unos cuarenta puestos de venta de comida, bebida, libros, ropa, cuchillos, sombreros y mucho más. Los miembros de BitInstant tenían allí un puesto llamado
 "Bernanke's Bitcoin Exchange", donde proporcionaban cambio de dólares y enseñaban a los curiosos a utilizar la Bitcoin.
reviewed: true
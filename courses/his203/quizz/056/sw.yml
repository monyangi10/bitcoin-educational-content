question: Jina la eneo lililotengwa kwa ajili ya biashara katika PorcFest 2012 lilikuwa lipi, ambapo zaidi ya nusu ya wafanyabiashara walikubali bitcoin?
answer: Bonde la Agora
wrong_answers:
  - Mtaa wa Bitcoin
  - Barabara ya Uhuru
  - Kambi ya Pesa Ngumu
explanation: |
 Bonde la Agora lilijumuisha vibanda arobaini vilivyoorodheshwa, vikiuza chakula, vinywaji, vitabu, nguo, visu, kofia na zaidi. Wanachama wa BitInstant walikuwa na kibanda hapo, kilichoitwa "Bernanke's Bitcoin Exchange", ambapo walitoa ubadilishanaji wa dola na kuwafundisha wale waliotaka kujua jinsi ya kutumia Bitcoin.
reviewed: true
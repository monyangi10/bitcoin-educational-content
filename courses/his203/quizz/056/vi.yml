question: Khu vực dành riêng cho giao dịch tại PorcFest 2012, nơi hơn một nửa số người bán chấp nhận bitcoin, có tên là gì?
answer: Thung lũng Agora
wrong_answers:
  - Đường Bitcoin
  - Con đường tự do
  - Trại Tiền Khó
explanation: |
 Thung lũng Agora có khoảng bốn mươi gian hàng được niêm yết, bán đồ ăn, thức uống, sách, quần áo, dao, mũ và nhiều mặt hàng khác. Các thành viên của BitInstant có một gian hàng ở đó, được gọi là "Bernanke's Bitcoin Exchange", nơi họ cung cấp dịch vụ đổi đô la và hướng dẫn những người tò mò cách sử dụng Bitcoin.
reviewed: true
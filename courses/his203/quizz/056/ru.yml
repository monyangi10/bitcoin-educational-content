question: Как называлась зона, посвященная торговле на PorcFest 2012, где более половины торговцев принимали биткоин?
answer: Долина Агора
wrong_answers:
  - Улица Bitcoin
  - Путь либертарианца
  - Лагерь твердых денег
explanation: |
 В Agora Valley было около сорока стендов, где продавались еда, напитки, книги, одежда, ножи, шляпы и многое другое. У членов BitInstant был стенд под названием
 "Bitcoin Exchange Бернанке", где они предлагали обмен долларов и учили любопытных, как использовать Bitcoin.
reviewed: true
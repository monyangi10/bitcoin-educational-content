question: Hva het området dedikert til handel på PorcFest 2012, der mer enn halvparten av kjøpmennene aksepterte bitcoin?
answer: Agora Valley
wrong_answers:
  - Bitcoin Street
  - Den libertarianske veien
  - Hard Money Camp
explanation: |
 Agora Valley hadde et førtitalls oppførte boder som solgte mat, drikke, bøker, klær, kniver, hatter og mye mer. Medlemmer av BitInstant hadde en stand der, kalt
 "Bernanke's Bitcoin Exchange", der de vekslet dollar og lærte de nysgjerrige hvordan man bruker Bitcoin.
reviewed: true
question: Wat was de naam van de handelsruimte op PorcFest 2012, waar meer dan de helft van de handelaren bitcoin accepteerde?
answer: Agora-vallei
wrong_answers:
  - Bitcoin straat
  - De libertaire weg
  - Hard Geld Kamp
explanation: |
 Agora Valley bestond uit zo'n veertig stands die eten, drinken, boeken, kleding, messen, hoeden en meer verkochten. Leden van BitInstant hadden er een stand, genaamd
 "Bernanke's Bitcoin Exchange", waar ze dollars wisselden en nieuwsgierigen leerden hoe ze Bitcoin konden gebruiken.
reviewed: true
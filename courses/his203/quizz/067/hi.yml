question: प्रचलन में मौजूद बिटकॉइन का अनुमानित अनुपात Bitcoin बचत एवं न्यास कोष द्वारा अपने चरम पर प्रबंधित धन का कितना था?
answer: लगभग 5%
wrong_answers:
  - लगभग 0.05
  - लगभग 0.5
  - लगभग 50%
explanation: |
 अगस्त 2012 में अपने चरम पर, ट्रेंडन शेवर्स (उर्फ पायरेटएट40) के फंड ने 500,000 से अधिक बिटकॉइन का प्रबंधन किया, जो प्रचलन में मौजूद 9.7 मिलियन बिटकॉइन का लगभग 5% था!
 इसके तुरंत बाद, विश्वास खत्म होने के कारण Bitcoin सेविंग्स एंड ट्रस्ट ध्वस्त हो गया।
reviewed: true
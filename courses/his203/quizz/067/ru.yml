question: Какую примерно долю биткоинов, находящихся в обращении, составляли деньги, которыми управлял фонд Bitcoin Savings & Trust на пике своего развития?
answer: Приблизительно 5%
wrong_answers:
  - Приблизительно 0,05
  - Приблизительно 0,5
  - Приблизительно 50%
explanation: |
 На пике своего развития в августе 2012 года фонд Трендона Шейверса (он же PirateAt40) управлял более чем 500 000 биткоинов, что составляло около 5% от 9,7 миллиона биткоинов в
 в обращении! Фонд Bitcoin Savings & Trust рухнул сразу после этого, так как доверие к нему улетучилось.
reviewed: true
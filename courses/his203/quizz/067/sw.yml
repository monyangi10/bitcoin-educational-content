question: Ni takribani uwiano gani wa bitcoins katika mzunguko uliwakilisha pesa zinazosimamiwa na mfuko wa Akiba na Udhamini wa Bitcoin katika kilele chake?
answer: Takriban 5%
wrong_answers:
  - Takriban 0.05
  - Takriban 0.5
  - Takriban 50%
explanation: |
 Katika kilele chake mnamo Agosti 2012, mfuko wa Trendon Shavers (pia inajulikana kama PirateAt40) ulisimamia zaidi ya bitcoin 500,000, ambazo ziliwakilisha karibu 5% ya bitcoin milioni 9.7 zilizosambazwa! Akiba na Uaminifu wa Bitcoin ulianguka muda mfupi baadaye, huku imani ikitoweka.
reviewed: true
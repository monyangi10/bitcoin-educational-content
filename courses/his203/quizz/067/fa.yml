question: چه نسبتی تقریبی از بیت‌کوین‌های در گردش نمایانگر پول مدیریت‌شده توسط صندوق Bitcoin Savings & Trust در اوج خود بود؟
answer: حدود ۵٪
wrong_answers:
  - تقریباً 0.05
  - تقریباً 0.5
  - تقریباً 50٪
explanation: |
 در اوج خود در آگوست ۲۰۱۲، صندوق ترندون شیورز (معروف به PirateAt40) بیش از ۵۰۰,۰۰۰ بیت‌کوین را مدیریت می‌کرد که حدود ۵٪ از ۹.۷ میلیون بیت‌کوین در گردش را تشکیل می‌داد! Bitcoin Savings & Trust بلافاصله پس از آن فروپاشید، زیرا اعتماد از بین رفت.
reviewed: true
question: Ni igice kingana iki c’ama bitcoins ariko arakoreshwa cari giserukira amahera yacungiwe n’ikigega ca Bitcoin Savings & Trust igihe cari ku rwego rwo hejuru?
answer: Hafi. 5%
wrong_answers:
  - Hafi. 0.05
  - Hafi. 0.5
  - Hafi. 50%
explanation: |
 Mu kwezi kwa munani 2012, ikigega ca Trendon Shavers (aka PirateAt40) cari gifise amafaranga arenga 500.000, ivyo bikaba vyari hafi 5% vy’amafaranga miliyoni 9,7 mu 2012.
 gukwiragira! Bitcoin Savings & Trust yarasenyutse inyuma gato y’aho, uko ukwizigira kwagenda guhera.
reviewed: true
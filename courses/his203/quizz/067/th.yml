question: ประมาณสัดส่วนของบิตคอยน์ที่หมุนเวียนซึ่งเป็นตัวแทนของเงินที่บริหารโดยกองทุน Bitcoin Savings & Trust ในช่วงสูงสุดคือเท่าใด?
answer: ประมาณ 5%
wrong_answers:
  - ประมาณ 0.05
  - ประมาณ 0.5
  - ประมาณ 50%
explanation: |
 ในช่วงที่รุ่งเรืองที่สุดในเดือนสิงหาคม 2012 กองทุนของ Trendon Shavers (หรือที่รู้จักในชื่อ PirateAt40) ได้จัดการบิทคอยน์กว่า 500,000 เหรียญ ซึ่งคิดเป็นประมาณ 5% ของบิทคอยน์ 9.7 ล้านเหรียญที่หมุนเวียนอยู่! Bitcoin Savings & Trust ล่มสลายลงไม่นานหลังจากนั้น เนื่องจากความเชื่อมั่นหายไป
reviewed: true
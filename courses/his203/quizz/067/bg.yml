question: Какъв приблизителен дял от биткойните в обращение представляват парите, управлявани от спестовния и доверителен фонд Bitcoin в неговия пик?
answer: Приблизително 5%
wrong_answers:
  - Приблизително 0,05
  - Приблизително 0,5
  - Приблизително 50%
explanation: |
 В пика си през август 2012 г. фондът на Трендън Шейвърс (известен още като PirateAt40) управляваше над 500 000 биткойна, което представляваше около 5% от 9,7 милиона биткойна в
 в обращение! Bitcoin Savings & Trust се срина малко след това, тъй като доверието се изпари.
reviewed: true
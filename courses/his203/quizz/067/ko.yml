question: 유통되는 비트코인의 대략적인 비율은 전성기 당시 Bitcoin 저축 및 신탁 펀드가 관리하는 자금의 어느 정도였나요?
answer: 약 5%
wrong_answers:
  - 약 0.05
  - 약 0.5
  - 약 50%
explanation: |
 2012년 8월 정점에 달했던 트렌든 셰이버스(일명 PirateAt40)의 펀드는 50만 개 이상의 비트코인을 관리했는데, 이는 전체 970만 비트코인의 약 5%를 차지했습니다
 유통량! Bitcoin 저축 & 신탁은 얼마 지나지 않아 신뢰가 증발하면서 무너졌습니다.
reviewed: true
question: لوک-جونیور در تاریخ ۶ ژانویه ۲۰۱۲ چه اقدام بحث‌برانگیزی علیه ارز دیجیتال Coiledcoin انجام داد تا از اکوسیستم Bitcoin "محافظت" کند؟
answer: او یک حمله سانسور علیه Coiledcoin با استفاده از استخر Eligius mining خود انجام داد.
wrong_answers:
  - او یک اعلامیه حذف DMCA علیه Coinledcoin به دلیل نقض حق نسخه‌برداری به GitHub ارسال کرد.
  - او صفحه ویکی‌پدیای Coiledcoin را ویرایش کرد تا به‌طور عمومی آن را یک طرح هرمی بنامد.
  - او پیام‌های انبوهی را در بلاکچین Coiledcoin به لطف OP_RETURN ارسال کرد.
explanation: |
 این حمله سانسور (mining از بلوک‌های خالی) به لطف ترکیب mining با Bitcoin انجام شد، که او در استخر mining خود پیاده‌سازی کرده بود. او اقدام خود را با نوشتن این که هیچ ماینر Eligius آسیب ندیده است، توجیه کرد. لوک-جی‌آر یک اعلامیه حذف DMCA با GitHub ثبت کرد، اما علیه SolidCoin.
reviewed: true
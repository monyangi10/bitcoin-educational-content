question: Какое противоречивое действие предпринял Люк-младший против криптовалюты Coiledcoin 6 января 2012 года, чтобы "защитить" экосистему Bitcoin?
answer: Он осуществил цензурную атаку на Coiledcoin, используя свой пул Eligius mining
wrong_answers:
  - Он подал на GitHub уведомление DMCA о нарушении авторских прав Coinledcoin
  - Он отредактировал страницу Coiledcoin в Википедии, чтобы публично назвать ее финансовой пирамидой
  - Он размещал массовые сообщения на блокчейне Coiledcoin благодаря OP_RETURN
explanation: |
 Эта цензурная атака (mining пустых блоков) была проведена благодаря комбинированному mining с Bitcoin, который он реализовал в своем пуле mining. Он оправдал
 свои действия, написав, что ни один майнер Eligius не пострадал. Luke-Jr подал уведомление о DMCA-атаке на GitHub, но против SolidCoin.
reviewed: true
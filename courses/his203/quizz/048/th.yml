question: ลุค-จูเนียร์ได้ดำเนินการที่เป็นที่ถกเถียงกับสกุลเงินดิจิทัล Coiledcoin เมื่อวันที่ 6 มกราคม 2012 เพื่อ "ปกป้อง" ระบบนิเวศ Bitcoin อย่างไร?
answer: เขาได้ดำเนินการโจมตีการเซ็นเซอร์ต่อ Coiledcoin โดยใช้กลุ่ม Eligius mining ของเขา
wrong_answers:
  - เขายื่นคำร้อง DMCA ให้ลบเนื้อหากับ Coinledcoin บน GitHub เนื่องจากการละเมิดลิขสิทธิ์
  - เขาแก้ไขหน้าวิกิพีเดียของ Coiledcoin เพื่อเรียกมันว่าเป็นแชร์ลูกโซ่ต่อสาธารณะ
  - เขาโพสต์ข้อความจำนวนมากบนบล็อกเชนของ Coiledcoin ด้วยความช่วยเหลือจาก OP_RETURN
explanation: |
 การโจมตีการเซ็นเซอร์นี้ (mining ของบล็อกว่าง) ถูกดำเนินการได้ด้วยการรวม mining กับ Bitcoin ซึ่งเขาได้ดำเนินการในกลุ่ม mining ของเขา เขาให้เหตุผลในการกระทำของเขาโดยเขียนว่าไม่มีนักขุด Eligius คนใดได้รับอันตราย Luke-Jr ได้ยื่นคำร้อง DMCA กับ GitHub แต่เป็นการต่อต้าน SolidCoin
reviewed: true
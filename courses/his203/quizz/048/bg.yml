question: Какво спорно действие предприе Лука-младши срещу криптовалутата Coiledcoin на 6 януари 2012 г., за да "защити" екосистемата Bitcoin?
answer: Той извършва цензурна атака срещу Coiledcoin, като използва своя басейн Eligius mining
wrong_answers:
  - Той подава DMCA известие за сваляне на Coinledcoin в GitHub за нарушаване на авторските права
  - Той редактира страницата на Coiledcoin в Уикипедия, за да я нарече публично пирамида
  - Той публикува масови съобщения в блокчейна Coiledcoin благодарение на OP_RETURN
explanation: |
 Тази цензурна атака (mining на празни блокове) е извършена благодарение на комбиниран mining с Bitcoin, който той е приложил в своя mining пул. Той оправдава
 действието си, като пише, че никой миньор от Eligius не е пострадал. Luke-Jr наистина е подал DMCA известие за сваляне в GitHub, но срещу SolidCoin.
reviewed: true
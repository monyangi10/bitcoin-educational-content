question: ल्यूक-जूनियर ने 6 जनवरी, 2012 को Bitcoin इकोसिस्टम की "रक्षा" के लिए क्रिप्टोकरेंसी कॉइल्डकॉइन के खिलाफ कौन सा विवादास्पद कदम उठाया था?
answer: उसने अपने एलिजियस mining पूल का उपयोग करके कोइल्डकॉइन के खिलाफ सेंसरशिप हमला किया।
wrong_answers:
  - उन्होंने कॉपीराइट उल्लंघन के लिए GitHub पर Coinledcoin के खिलाफ DMCA टेकडाउन नोटिस दायर किया।
  - उन्होंने कोइल्डकॉइन के विकिपीडिया पेज को संपादित करके सार्वजनिक रूप से इसे पिरामिड योजना घोषित कर दिया।
  - उन्होंने OP_RETURN की बदौलत Coiledcoin ब्लॉकचेन पर सामूहिक संदेश पोस्ट किए।
explanation: |
 यह सेंसरशिप हमला (खाली ब्लॉकों का mining) mining और Bitcoin के संयोजन के कारण हुआ, जिसे उसने अपने mining पूल में लागू किया था। उसने अपने इस कृत्य को यह कहकर उचित ठहराया कि किसी भी Eligius माइनर को कोई नुकसान नहीं पहुँचा है। Luke-Jr ने GitHub पर SolidCoin के विरुद्ध DMCA टेकडाउन नोटिस दायर किया।
reviewed: true
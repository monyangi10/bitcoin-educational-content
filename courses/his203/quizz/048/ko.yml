question: 루크 주니어는 2012년 1월 6일에 Bitcoin 생태계를 "보호"하기 위해 암호화폐 코일드코인에 대해 어떤 논란의 여지가 있는 조치를 취했나요?
answer: 그는 엘리기우스 mining 풀을 사용하여 코일드코인에 대한 검열 공격을 수행했습니다
wrong_answers:
  - 그는 저작권 침해를 이유로 GitHub에 Coinledcoin에 대한 DMCA 게시 중단 통지를 제출했습니다
  - 그는 코일드코인 위키피디아 페이지를 편집하여 공개적으로 다단계 사기라고 불렀습니다
  - 그는 OP_RETURN 덕분에 코일코인 블록체인에 대량 메시지를 게시했습니다
explanation: |
 이 검열 공격(빈 블록의 mining)은 그가 mining 풀에 구현한 Bitcoin와 mining를 결합한 덕분에 수행되었습니다. 그는 자신의 행동을 정당화했습니다
 엘리기우스 채굴자가 피해를 입지 않았다는 글을 써서 자신의 행동을 정당화했습니다. Luke-Jr은 GitHub에 DMCA 게시 중단 통지를 제출했지만 솔리드코인에 대한 것이었습니다.
reviewed: true
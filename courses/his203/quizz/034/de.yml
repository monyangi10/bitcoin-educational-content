question: Welches Konzept steckt hinter P2Pool, dem verteilten Mining-Pool, der 2011 von Forrest Voight geschaffen wurde?
answer: Die Sharechain
wrong_answers:
  - Lange Abfrage
  - Die Coinbase-Signatur
  - Das FPGA
explanation: |
 Die "Aktienkette" (sharechain) bestand aus Teilnachweisen der von den Teilnehmern geleisteten Arbeit. Sie wurde von den Teilnehmern verwaltet, die untereinander verbunden waren
 peer-to-Peer verbunden waren. Jeder Anteil enthielt den Fingerabdruck des vorherigen Anteils, wodurch die Integrität des Ganzen gewährleistet wurde.
reviewed: true
question: Каква е концепцията на P2Pool, разпределения басейн на mining, създаден от Форест Войт през 2011 г.?
answer: Веригата от акции
wrong_answers:
  - Дългосрочно допитване
  - Подписът на coinbase
  - FPGA
explanation: |
 "Веригата от акции", или sharechain, се състоеше от частични доказателства за извършена работа, предоставени от участниците. Тя се поддържаше от участниците, които бяха свързани
 peer-to-peer. Всеки дял съдържаше пръстовия отпечатък на предишния дял, което гарантираше целостта на цялото.
reviewed: true
question: แนวคิดเบื้องหลัง P2Pool ซึ่งเป็นกลุ่ม mining แบบกระจายที่สร้างโดย Forrest Voight ในปี 2011 คืออะไร?
answer: ห่วงโซ่ของหุ้น
wrong_answers:
  - Long polling
  - ลายเซ็นของคอยน์เบส
  - FPGA
explanation: |
 "ห่วงโซ่ของหุ้น" หรือ sharechain ประกอบด้วยหลักฐานการทำงานบางส่วนที่ผู้เข้าร่วมมีส่วนร่วม มันถูกดูแลโดยผู้เข้าร่วมที่เชื่อมต่อกันแบบ peer-to-peer หุ้นแต่ละหุ้นมีลายนิ้วมือของหุ้นก่อนหน้า เพื่อให้มั่นใจในความสมบูรณ์ของทั้งหมด
reviewed: true
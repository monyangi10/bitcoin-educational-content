question: फॉरेस्ट वॉयट द्वारा 2011 में बनाए गए वितरित mining पूल, P2Pool के पीछे क्या अवधारणा थी?
answer: शेयरों की श्रृंखला
wrong_answers:
  - लंबी मतदान प्रक्रिया
  - कॉइनबेस हस्ताक्षर
  - एफपीजीए
explanation: |
 "शेयरों की श्रृंखला", या शेयरचेन, प्रतिभागियों द्वारा योगदान किए गए कार्य के आंशिक प्रमाणों से बनी थी। इसका रखरखाव प्रतिभागियों द्वारा किया जाता था, जो आपस में पीयर-टू-पीयर रूप से जुड़े हुए थे। प्रत्येक शेयर में पिछले शेयर का फिंगरप्रिंट होता था, जो संपूर्ण की अखंडता सुनिश्चित करता था।
reviewed: true
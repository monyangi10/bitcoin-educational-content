question: Какова была концепция P2Pool, распределенного пула mining, созданного Форрестом Войтом в 2011 году?
answer: Цепочка акций
wrong_answers:
  - Длительный опрос
  - Подпись coinbase
  - ПЛИС
explanation: |
 Цепочка акций, или sharechain, состояла из частичных доказательств работы, предоставленных участниками. Она поддерживалась участниками, которые были связаны
 между собой. Каждая доля содержала отпечаток пальца предыдущей доли, что обеспечивало целостность всей цепи.
reviewed: true
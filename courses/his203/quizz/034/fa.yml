question: مفهوم پشت P2Pool، استخر توزیع‌شده mining که توسط Forrest Voight در سال 2011 ایجاد شد، چه بود؟
answer: زنجیره سهام
wrong_answers:
  - پولینگ بلند
  - امضای کوین‌بیس
  - FPGA
explanation: |
 "زنجیره سهام"، یا sharechain، از اثبات‌های جزئی کار تشکیل شده بود که توسط شرکت‌کنندگان ارائه می‌شد. این زنجیره توسط شرکت‌کنندگان که به صورت همتا به همتا متصل بودند، نگهداری می‌شد. هر سهم شامل اثر انگشت سهم قبلی بود که یکپارچگی کل را تضمین می‌کرد.
reviewed: true
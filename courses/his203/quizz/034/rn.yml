explanation: |
 "Uruhererekane rw'imigabane", canke uruhererekane rw'imigabane, rwari rugizwe n'ibimenyamenya vy'igice c'ibikorwa vyatanzwe n'abaje mu nama. Yari itunganijwe n’abayitavye, bari bahuye .
 urunganwe n’urunganwe. Buri mugabane wari urimwo urutoke rw’umugabane w’imbere, ivyo bikaba vyatuma umugabane wose uba uwutunganye.

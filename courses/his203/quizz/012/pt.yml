question: Quantos bitcoins foram transferidos por Mark Karpelès para provar a solvência da plataforma Mt. Gox em 23 de junho de 2011?
answer: 424.242 bitcoins
wrong_answers:
  - 666 bitcoins
  - 1.337 bitcoins
  - 21.210 bitcoins
explanation: |
 Este era aproximadamente o número de bitcoins que a empresa possuía na altura. O número 42 é a resposta para "a grande questão sobre a vida, o Universo e
 tudo o resto" em H2G2.
reviewed: true
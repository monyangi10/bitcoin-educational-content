question: 23 जून 2011 को मार्क कार्पेल्स द्वारा माउंट गोक्स प्लेटफॉर्म की वित्तीय स्थिरता साबित करने के लिए कितने बिटकॉइन स्थानांतरित किए गए थे?
answer: 424,242 बिटकॉइन
wrong_answers:
  - 666 बिटकॉइन
  - 1,337 बिटकॉइन
  - 21,210 बिटकॉइन
explanation: |
 यह लगभग उतनी ही बिटकॉइन की संख्या थी जितनी उस समय कंपनी के पास थी। संख्या 42, H2G2 में "जीवन, ब्रह्मांड और बाकी सब कुछ के बारे में महान प्रश्न" का उत्तर है।
reviewed: true
question: Колко биткойна бяха прехвърлени от Марк Карпелес, за да докаже платежоспособността на платформата Mt. Gox на 23 юни 2011 г.?
answer: 424 242 биткойна
wrong_answers:
  - 666 биткойна
  - 1 337 биткойна
  - 21 210 биткойна
explanation: |
 Това е приблизително броят на биткойните, които компанията притежава по това време. Числото 42 е отговорът на "големия въпрос за живота, Вселената и
 всичко останало" в H2G2.
reviewed: true
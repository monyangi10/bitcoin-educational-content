question: Koliko je bitkoina Mark Karpelès prebacio da bi dokazao solventnost Mt. Gox platforme 23. juna 2011?
answer: 424.242 bitkoina
wrong_answers:
  - 666 bitcoina
  - 1.337 bitkoina
  - 21.210 bitkoina
explanation: |
 Ovo je otprilike broj bitkoina koje je kompanija posedovala u to vreme. Broj 42 je odgovor na "veliko pitanje o životu, Univerzumu i svemu ostalom" u H2G2.
reviewed: true
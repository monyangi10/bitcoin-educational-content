question: มีการโอนบิตคอยน์จำนวนเท่าใดโดย Mark Karpelès เพื่อพิสูจน์ความสามารถในการชำระหนี้ของแพลตฟอร์ม Mt. Gox เมื่อวันที่ 23 มิถุนายน 2011?
answer: 424,242 บิตคอยน์
wrong_answers:
  - 666 บิตคอยน์
  - 1,337 บิตคอยน์
  - 21,210 บิตคอยน์
explanation: |
 นี่คือจำนวนบิทคอยน์ที่บริษัทเป็นเจ้าของในขณะนั้น เลข 42 เป็นคำตอบของ "คำถามที่ยิ่งใหญ่เกี่ยวกับชีวิต จักรวาล และทุกสิ่งทุกอย่าง" ใน H2G2
reviewed: true
question: مارک کارپلس برای اثبات توانایی پرداخت پلتفرم Mt. Gox در تاریخ ۲۳ ژوئن ۲۰۱۱، چه تعداد بیت‌کوین منتقل کرد؟
answer: ۴۲۴,۲۴۲ بیت‌کوین
wrong_answers:
  - ۶۶۶ بیت‌کوین
  - ۱,۳۳۷ بیت‌کوین
  - ۲۱,۲۱۰ بیت‌کوین
explanation: |
 این تقریباً تعداد بیت‌کوین‌هایی بود که شرکت در آن زمان مالک آن بود. عدد ۴۲ پاسخ "سوال بزرگ درباره زندگی، جهان و همه چیزهای دیگر" در H2G2 است.
reviewed: true
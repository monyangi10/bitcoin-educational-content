question: Combien de bitcoins ont été transférés par Mark Karpelès pour prouver la solvabilité de la plateforme Mt. Gox le 23 juin 2011 ?
answer: 424 242 bitcoins
wrong_answers:
  - 666 bitcoins
  - 1 337 bitcoins
  - 21 210 bitcoins
explanation: |
 C'était à peu près le nombre de bitcoins que l'entreprise possédait alors. Le nombre 42 est la réponse à « la grande question sur la vie, l'Univers et le reste » dans H2G2.

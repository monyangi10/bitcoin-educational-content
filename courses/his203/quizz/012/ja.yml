question: 2011年6月23日、Mt.Goxプラットフォームの支払能力を証明するために、マーク・カーペレスが送金したビットコインの数は？
answer: 424,242ビットコイン
wrong_answers:
  - 666ビットコイン
  - 1,337ビットコイン
  - 21,210ビットコイン
explanation: |
 これは、同社が当時所有していたビットコインの数とほぼ同じだった。42という数字は、H2G2の「生命、宇宙、その他すべてに関する大いなる疑問」の答えである。

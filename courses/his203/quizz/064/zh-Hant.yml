question: Tony76 在 2012 年 4 月 20 日用什麼方法在絲路市場上設置騙局？
answer: 利用其作為賣家無懈可擊的聲譽，要求早日完成交易
wrong_answers:
  - 利用平台上處理比特幣付款的技術漏洞
  - 在 Silk Road 上操縱比特幣價格，人為地抬高價格
  - 勒索一名 Silk Road 員工印刷虛假產品說明
explanation: |
 Tony76 享有極佳的聲譽，這使他能夠要求買家提早完成交易，而不是代管。4 月 20 日對於
 4 月 20 日對大麻消費者來說是一個象徵性的日子，他為了這個日子提供了多種折扣，而且訂單湧入。後來他帶著比特幣消失了，而且
 從來沒有兌現過訂單。
reviewed: true
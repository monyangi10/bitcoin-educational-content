question: टोनी76 ने 20 अप्रैल, 2012 को सिल्क रोड मार्केटप्लेस पर अपना घोटाला करने के लिए किस विधि का उपयोग किया?
answer: विक्रेता के रूप में अपनी बेदाग प्रतिष्ठा का उपयोग करके लेन-देन को शीघ्र पूरा करने की मांग करना।
wrong_answers:
  - प्लेटफ़ॉर्म पर बिटकॉइन भुगतान की प्रक्रिया में मौजूद तकनीकी खामी का फायदा उठाया गया।
  - सिल्क रोड पर कीमतों को कृत्रिम रूप से बढ़ाने के लिए बिटकॉइन की कीमत में हेरफेर करना।
  - सिल्क रोड के एक कर्मचारी को झूठे उत्पाद विवरण छापने के लिए ब्लैकमेल करना।
explanation: |
 टोनी76 की प्रतिष्ठा बहुत अच्छी थी, जिसके चलते वह खरीदारों को एस्क्रो के बजाय शीघ्र भुगतान करने के लिए बाध्य करता था। 20 अप्रैल भांग उपभोक्ताओं के लिए एक महत्वपूर्ण तिथि होने के कारण, उसने इस अवसर पर अपने नियमित उत्पादों पर कई छूटें दीं, और ऑर्डर की बाढ़ आ गई। बाद में वह बिटकॉइन लेकर गायब हो गया, और उसने कभी भी अपने ऑर्डर पूरे नहीं किए।
reviewed: true
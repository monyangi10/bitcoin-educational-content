question: Какъв метод е използвал Тони76, за да организира измамата си на 20 април 2012 г. на пазара Silk Road?
answer: Използване на безупречната му репутация на продавач за искане на ранно приключване на сделките
wrong_answers:
  - Използване на техническа уязвимост при обработката на плащания с биткойн в платформата
  - Манипулиране на цената на биткойн за изкуствено завишаване на цените в Silk Road
  - Изнудване на служител на Silk Road за отпечатване на фалшиви описания на продукти
explanation: |
 Тони76 се радваше на отлична репутация, която му позволяваше да изисква от купувачите да използват ранно финализиране вместо ескроу. 20 април е емблематична дата за
 потребителите на канабис, той предложи многобройни отстъпки на обичайните си продукти по този повод и поръчките заваляха. По-късно той изчезна с биткойните и
 и така и не изпълни поръчките си.
reviewed: true
question: Tony76은 2012년 4월 20일 실크로드 마켓플레이스에서 어떤 방법을 사용하여 사기를 벌였나요?
answer: 판매자로서의 흠잡을 데 없는 평판을 이용해 거래 조기 완료를 요구합니다
wrong_answers:
  - 플랫폼에서 비트코인 결제 처리 시 기술적 취약점 악용
  - 실크로드에서 인위적으로 가격을 부풀리기 위한 비트코인 가격 조작
  - 실크로드 직원을 협박하여 허위 제품 설명을 인쇄하도록 강요한 사례
explanation: |
 Tony76은 평판이 좋았기 때문에 구매자에게 에스크로 대신 조기 결제를 요구할 수 있었습니다. 4월 20일은 대마초 소비자에게 상징적인 날이기 때문에
 대마초 소비자들에게 상징적인 날인 4월 20일을 맞아 평소 판매하던 제품을 여러 차례 할인해 주었고, 주문이 쏟아져 들어왔습니다. 그는 나중에 비트코인을 가지고 사라졌고
 주문을 이행하지 않았습니다.
reviewed: true
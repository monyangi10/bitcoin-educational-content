question: Ni uburyo ubuhe Tony76 yakoresheje kugira ngo ashingeho ubuhendanyi bwiwe bwo ku wa 20 Ndamukiza 2012 kw’isoko rya Silk Road?
answer: Gukoresha izina ryiwe ritagira agasembwa nk’umucuruzi kugira ngo asabe ko amafaranga arangizwa hakiri kare
wrong_answers:
  - Gukoresha ubugoyagoye bw'ubuhinga mu gukora amafaranga y'amahera ya bitcoin ku rubuga
  - Gukoresha nabi igiciro ca bitcoin kugira ngo biduze ibiciro ku nzira ya Silk
  - Gutera ubwoba umukozi wa Silk Road ngo acape insobanuro z'ibinyoma z'ibicuruzwa
explanation: |
 Tony76 yari afise izina ryiza cane, ivyo bikaba vyatumye ashobora gusaba abaguzi gukoresha ubuhinga bwo guheza hakiri kare, aho gukoresha ubuhinga bwo gushiramwo ibintu. Ndamukiza kuba itariki y’ikigereranyo y’umwaka w’2019.
 abaguzi b’ibiyayuramutwe, yaratanga ibiciro vyinshi ku bintu yasanzwe akoresha ku musi mukuru, maze amategeko arasuka. 
 ntiyigeze yubaha amabwirizwa yiwe.
reviewed: true
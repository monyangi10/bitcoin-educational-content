question: تونی76 از چه روشی برای راه‌اندازی کلاهبرداری خود در 20 آوریل 2012 در بازار سیلک رود استفاده کرد؟
answer: استفاده از شهرت بی‌عیب و نقص او به عنوان فروشنده برای درخواست تکمیل زودهنگام معاملات
wrong_answers:
  - سوء استفاده از یک آسیب‌پذیری فنی در پردازش پرداخت‌های بیت‌کوین در پلتفرم
  - دستکاری قیمت بیت‌کوین برای افزایش مصنوعی قیمت‌ها در جاده ابریشم
  - باج‌گیری از یک کارمند جاده ابریشم برای چاپ توضیحات نادرست محصولات
explanation: |
 تونی76 از شهرت بسیار خوبی برخوردار بود که به او این امکان را می‌داد تا از خریداران بخواهد به جای استفاده از امانت‌گذاری، از نهایی‌سازی زودهنگام استفاده کنند. با توجه به اینکه ۲۰ آوریل یک تاریخ نمادین برای مصرف‌کنندگان کانابیس است، او برای این مناسبت تخفیف‌های متعددی بر روی محصولات معمول خود ارائه داد و سفارش‌ها به سرعت سرازیر شدند. او بعدها با بیت‌کوین‌ها ناپدید شد و هرگز سفارش‌های خود را انجام نداد.
reviewed: true
question: Que método utilizou Tony76 para montar o seu esquema de 20 de abril de 2012 no mercado Silk Road?
answer: Utilização da sua reputação impecável como vendedor para exigir a conclusão antecipada das transacções
wrong_answers:
  - Exploração de uma vulnerabilidade técnica no processamento de pagamentos em bitcoin na plataforma
  - Manipulação do preço da bitcoin para inflacionar artificialmente os preços na Silk Road
  - Chantagem de um empregado da Silk Road para imprimir descrições falsas de produtos
explanation: |
 Tony76 gozava de uma excelente reputação, o que lhe permitia exigir que os compradores recorressem à finalização antecipada, em vez da caução. Sendo o dia 20 de abril uma data emblemática para os
 consumidores de canábis, ele ofereceu vários descontos nos seus produtos habituais para a ocasião, e as encomendas afluíram. Mais tarde, desapareceu com os bitcoins e
 nunca honrou as suas encomendas.
reviewed: true
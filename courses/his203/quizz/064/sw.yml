question: Tony76 alitumia njia gani kuanzisha ulaghai wake wa Aprili 20, 2012 kwenye soko la Silk Road?
answer: Kutumia sifa yake isiyo na dosari kama muuzaji kudai kukamilika mapema kwa miamala
wrong_answers:
  - Matumizi mabaya ya udhaifu wa kiufundi katika usindikaji wa malipo ya bitcoin kwenye jukwaa
  - Ubadilishaji wa bei ya bitcoin ili kuongeza bei bandia kwenye Barabara ya Silk
  - Shaka ya mfanyakazi wa Silk Road kuchapisha maelezo ya bidhaa bandia
explanation: |
 Tony76 alifurahia sifa nzuri, ambayo ilimwezesha kuwataka wanunuzi kutumia ukamilishaji wa mapema, badala ya escrow. Aprili 20 ikiwa tarehe ya mfano kwa watumiaji wa bangi, alitoa punguzo nyingi kwa bidhaa zake za kawaida kwa hafla hiyo, na oda zilimwagika. Baadaye alitoweka na bitcoins, na hakuwahi kuheshimu oda zake.
reviewed: true
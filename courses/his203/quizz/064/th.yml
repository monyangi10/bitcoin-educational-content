question: วิธีการที่ Tony76 ใช้ในการตั้งค่าการหลอกลวงของเขาในวันที่ 20 เมษายน 2012 บนตลาด Silk Road คืออะไร?
answer: การใช้ชื่อเสียงที่ไร้ที่ติของเขาในฐานะผู้ขายเพื่อเรียกร้องให้การทำธุรกรรมเสร็จสิ้นก่อนกำหนด
wrong_answers:
  - การใช้ประโยชน์จากช่องโหว่ทางเทคนิคในการประมวลผลการชำระเงินด้วยบิตคอยน์บนแพลตฟอร์ม
  - การจัดการราคาบิทคอยน์เพื่อเพิ่มราคาบน Silk Road อย่างไม่เป็นธรรม
  - การขู่กรรโชกพนักงาน Silk Road ให้พิมพ์คำอธิบายผลิตภัณฑ์เท็จ
explanation: |
 Tony76 มีชื่อเสียงที่ดีเยี่ยม ซึ่งทำให้เขาสามารถกำหนดให้ผู้ซื้อใช้การชำระเงินล่วงหน้าแทนการใช้เอสโครว์ วันที่ 20 เมษายนเป็นวันที่มีความหมายสำหรับผู้บริโภคกัญชา เขาจึงเสนอส่วนลดหลายรายการสำหรับผลิตภัณฑ์ปกติของเขาในโอกาสนี้ และคำสั่งซื้อก็หลั่งไหลเข้ามา ต่อมาเขาหายตัวไปพร้อมกับบิตคอยน์ และไม่เคยส่งสินค้าตามคำสั่งซื้อของเขาเลย
reviewed: true
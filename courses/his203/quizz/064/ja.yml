question: 2012年4月20日、Tony76はどのような方法でSilk Roadマーケットプレイスに詐欺を仕掛けたのか？
answer: 売り手としての非の打ちどころのない評判を利用し、取引の早期完了を要求する。
wrong_answers:
  - プラットフォーム上でのビットコイン決済処理における技術的脆弱性の悪用
  - シルクロードの価格を人為的につり上げるためのビットコイン価格の操作
  - シルクロードの従業員を脅迫し、偽の商品説明を印刷させる
explanation: |
 トニー76は高い評価を得ていたため、エスクローの代わりに早期確定を買い手に要求することができた。4月20日は大麻消費者にとって象徴的な日である。
 大麻消費者にとって4月20日は象徴的な日であったため、彼はこの日のためにいつもの商品を何割引もし、注文が殺到した。その後、彼はビットコインを持って姿を消し、注文に応じることはなかった。
 注文に応じることはなかった。
reviewed: true
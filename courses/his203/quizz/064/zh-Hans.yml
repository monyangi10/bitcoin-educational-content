question: 2012 年 4 月 20 日，托尼 76 用什么方法在丝绸之路市场上设下骗局？
answer: 利用他作为卖家无可挑剔的声誉，要求尽早完成交易
wrong_answers:
  - 利用平台上比特币支付处理过程中的技术漏洞
  - 操纵比特币价格，人为抬高丝绸之路上的价格
  - 勒索一名丝绸之路员工印刷虚假产品说明
explanation: |
 托尼 76 享有极好的声誉，这使他能够要求买主提前完成交易，而不是采用托管方式。4 月 20 日是大麻消费者的
 4 月 20 日对于大麻消费者来说是一个具有象征意义的日子，因此他在这一天为自己的常规产品提供了多重折扣，订单纷至沓来。后来，他带着比特币消失了。
 从未兑现过订单。
reviewed: true
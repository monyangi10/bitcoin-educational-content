question: Welke methode gebruikte Tony76 om zijn zwendel van 20 april 2012 op de Silk Road marktplaats op te zetten?
answer: Zijn onberispelijke reputatie als verkoper gebruiken om een snelle afronding van transacties te eisen
wrong_answers:
  - Uitbuiting van een technische kwetsbaarheid in de verwerking van bitcoinbetalingen op het platform
  - Manipulatie van de bitcoinprijs om de prijzen op Silk Road kunstmatig op te drijven
  - Chantage van een Silk Road-medewerker om valse productbeschrijvingen af te drukken
explanation: |
 Tony76 genoot een uitstekende reputatie, waardoor hij kopers kon verplichten om gebruik te maken van vervroegde afronding, in plaats van escrow. Omdat 20 april een emblematische datum was voor
 bood hij voor de gelegenheid meerdere kortingen aan op zijn gebruikelijke producten en de bestellingen stroomden binnen. Later verdween hij met de bitcoins en
 en kwam zijn bestellingen nooit na.
reviewed: true
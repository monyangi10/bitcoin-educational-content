question: Quel joueur de poker professionnel a soutenu la plateforme de poker en bitcoins Seals with Clubs à partir de janvier 2012 ?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Il a découvert Bitcoin en juin 2011 et est tombé sous le charme, déclarant être « totalement fasciné par les bitcoins ». Bryan Micon a accompagné le développement de Seals with Clubs à partir de janvier 2012, et l'a mis en avant sur sa chaine Youtube personnelle en mars.
reviewed: false

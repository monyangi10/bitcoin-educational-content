question: Vilken professionell pokerspelare stödde Seal:s med Clubs bitcoin pokerplattform från januari 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon upptäckte Bitcoin i juni 2011 och föll för dess förtrollning och förklarade att han var "helt fascinerad av bitcoins". Bryan Micon följde utvecklingen av
 utvecklingen av Seals med Clubs från januari 2012 och marknadsförde den på sin personliga Youtube-kanal i mars.
reviewed: true
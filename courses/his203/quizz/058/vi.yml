question: Tuyển thủ poker chuyên nghiệp nào đã ủng hộ nền tảng poker bitcoin Seals with Clubs từ tháng 1 năm 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon đã phát hiện ra Bitcoin vào tháng 6 năm 2011 và bị cuốn hút bởi nó, tuyên bố rằng ông "hoàn toàn bị mê hoặc bởi bitcoin". Bryan Micon đã đồng hành cùng sự phát triển của Seal với các Câu lạc bộ từ tháng 1 năm 2012 và quảng bá nó trên kênh Youtube cá nhân của mình vào tháng 3.
reviewed: true
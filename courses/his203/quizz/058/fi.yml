question: Kuka pokeriammattilainen tuki Seals seuran bitcoin-pokerialustan kanssa tammikuusta 2012 alkaen?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon löysi Bitcoin:n kesäkuussa 2011 ja joutui sen lumoihin ja ilmoitti olevansa "täysin innostunut bitcoineista". Bryan Micon seurasi
 gW-2:n kehitystä Clubsilla tammikuusta 2012 alkaen ja mainosti sitä henkilökohtaisella Youtube-kanavallaan maaliskuussa.
reviewed: true
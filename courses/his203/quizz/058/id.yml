question: Pemain poker profesional mana yang mendukung Seal dengan platform poker bitcoin Clubs sejak Januari 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon menemukan Bitcoin pada bulan Juni 2011 dan jatuh di bawah pesonanya, menyatakan bahwa ia "benar-benar terpesona oleh bitcoin". Bryan Micon menemani
 pengembangan Seal dengan Clubs dari Januari 2012, dan mempromosikannya di saluran Youtube pribadinya pada bulan Maret.
reviewed: true
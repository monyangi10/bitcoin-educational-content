question: Quale giocatore di poker professionista ha supportato i Seal con la piattaforma di poker bitcoin di Clubs a partire da gennaio 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon ha scoperto il Bitcoin nel giugno 2011 e ne ha subito il fascino, dichiarando di essere "totalmente affascinato dai bitcoin". Bryan Micon ha accompagnato lo
 sviluppo del Seal con i Club a partire da gennaio 2012 e lo ha promosso sul suo canale personale di Youtube a marzo.
reviewed: true
question: Welke professionele pokerspeler ondersteunde vanaf januari 2012 de Seals met het Clubs bitcoin pokerplatform?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon ontdekte Bitcoin in juni 2011 en raakte in de ban. Hij verklaarde dat hij "helemaal gefascineerd was door bitcoins". Bryan Micon begeleidde de
 ontwikkeling van Seal vanaf januari 2012 met Clubs en promootte het in maart op zijn persoonlijke Youtube-kanaal.
reviewed: true
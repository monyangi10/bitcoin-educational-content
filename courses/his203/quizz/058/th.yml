question: นักเล่นโป๊กเกอร์มืออาชีพคนใดที่สนับสนุนแพลตฟอร์มโป๊กเกอร์บิตคอยน์ Seals with Clubs ตั้งแต่เดือนมกราคม 2012?
answer: ไบรอัน ไมคอน
wrong_answers:
  - พราหลัด ฟรีดแมน
  - ฟิล ไอวีย์
  - แดเนียล เนเกรนู
explanation: |
 Bryan Micon ค้นพบ Bitcoin ในเดือนมิถุนายน 2011 และตกอยู่ภายใต้มนต์สะกดของมัน โดยประกาศว่าเขา "หลงใหลในบิตคอยน์อย่างมาก" Bryan Micon ได้ร่วมพัฒนา Seals กับ Clubs ตั้งแต่เดือนมกราคม 2012 และโปรโมทมันบนช่อง Youtube ส่วนตัวของเขาในเดือนมีนาคม
reviewed: true
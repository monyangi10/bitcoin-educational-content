question: 2012年1月からClubsビットコインポーカープラットフォームでSealをサポートしたプロポーカープレイヤーは？
answer: ブライアン・マイコン
wrong_answers:
  - プララド・フリードマン
  - フィル・アイヴィー
  - ダニエル・ネグレアヌ
explanation: |
 ブライアン・マイコンは2011年6月にBitcoinを発見し、その魔法にかかり、「完全にビットコインに魅了された」と宣言した。ブライアン・マイコンは2012年1月から
 2012年1月からクラブでSealの開発に同行し、3月には個人のYoutubeチャンネルで宣伝した。
reviewed: true
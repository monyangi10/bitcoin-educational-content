question: Hvilken profesjonell pokerspiller støttet Seals med Clubs bitcoin pokerplattform fra januar 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon oppdaget Bitcoin i juni 2011 og ble fortryllet av det, og erklærte at han var "fullstendig fascinert av bitcoins". Bryan Micon fulgte utviklingen av
 utviklingen av Seals med Clubs fra januar 2012, og promoterte den på sin personlige Youtube-kanal i mars.
reviewed: true
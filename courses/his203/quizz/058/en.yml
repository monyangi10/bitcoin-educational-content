question: Which professional poker player supported the Seals with Clubs bitcoin poker platform from January 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 He discovered Bitcoin in June 2011 and fell under its spell, declaring that he was "totally fascinated by bitcoins". Bryan Micon accompanied the development of Seals with Clubs from January 2012, and promoted it on his personal Youtube channel in March.

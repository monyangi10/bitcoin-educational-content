question: Que jogador de póquer profissional apoiou o Seals com a plataforma de póquer Clubs bitcoin a partir de janeiro de 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon descobriu o Bitcoin em junho de 2011 e caiu no seu feitiço, declarando que estava "totalmente fascinado por bitcoins". Bryan Micon acompanhou o desenvolvimento
 desenvolvimento do Seal com o Clubs a partir de janeiro de 2012, e promoveu-o no seu canal pessoal do Youtube em março.
reviewed: true
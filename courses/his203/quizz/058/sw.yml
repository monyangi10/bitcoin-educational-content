question: Ni mchezaji gani wa kitaalamu wa poka aliyeunga mkono Seals na jukwaa la poka la Vilabu vya Bitcoin kuanzia Januari 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon aligundua Bitcoin mnamo Juni 2011 na akaanguka chini ya uchawi wake, akitangaza kwamba "alivutiwa kabisa na bitcoins". Bryan Micon aliambatana na maendeleo ya Seals na Vilabu kuanzia Januari 2012, na akaitangaza kwenye chaneli yake ya kibinafsi ya Youtube mnamo Machi.
reviewed: true
question: Który profesjonalny pokerzysta wspierał Seals za pomocą platformy pokerowej Clubs Bitcoin od stycznia 2012 roku?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon odkrył Bitcoin w czerwcu 2011 r. i uległ jego urokowi, deklarując, że jest "całkowicie zafascynowany bitcoinami". Bryan Micon towarzyszył rozwojowi
 rozwojowi Seal wraz z Clubs od stycznia 2012 r., a w marcu promował go na swoim osobistym kanale Youtube.
reviewed: true
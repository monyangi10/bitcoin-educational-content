question: 2012년 1월부터 클럽 비트코인 포커 플랫폼에서 Seal를 지원한 프로 포커 플레이어는 누구인가요?
answer: 브라이언 미콘
wrong_answers:
  - 프라흘라드 프리드먼
  - 필 아이비
  - 다니엘 네그레아누
explanation: |
 브라이언 미콘은 2011년 6월에 Bitcoin을 발견하고 "비트코인에 완전히 매료되었다"고 선언하며 그 매력에 빠져들었습니다. 브라이언 미콘은 2012년 1월부터 클럽과 함께
 2012년 1월부터 클럽과 함께 Seal를 개발했고, 3월에는 개인 유튜브 채널에서 이를 홍보했습니다.
reviewed: true
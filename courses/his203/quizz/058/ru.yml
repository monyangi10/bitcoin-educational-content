question: Какой профессиональный игрок в покер поддерживал Seals с помощью покерной платформы Clubs bitcoin с января 2012 года?
answer: Брайан Майкон
wrong_answers:
  - Прахлад Фридман
  - Фил Айви
  - Даниэль Негреану
explanation: |
 Брайан Майкон обнаружил Bitcoin в июне 2011 года и попал под его чары, заявив, что он "полностью очарован биткоинами". Брайан Майкон сопровождал
 разработку Seal с января 2012 года вместе с Clubs, а в марте стал рекламировать ее на своем личном канале Youtube.
reviewed: true
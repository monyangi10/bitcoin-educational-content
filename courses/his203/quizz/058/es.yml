question: ¿Qué jugador de póquer profesional apoyó los Seal con la plataforma de póquer Clubs bitcoin desde enero de 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon descubrió Bitcoin en junio de 2011 y cayó bajo su hechizo, declarando que estaba "totalmente fascinado por los bitcoins". Bryan Micon acompañó el
 desarrollo de Seal con Clubs a partir de enero de 2012, y lo promocionó en su canal personal de Youtube en marzo.
reviewed: true
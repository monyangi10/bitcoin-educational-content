question: کدام بازیکن حرفه‌ای پوکر از پلتفرم پوکر بیت‌کوین Seals با Clubs از ژانویه 2012 حمایت کرد؟
answer: برایان میکون
wrong_answers:
  - پرهلاد فریدمن
  - فیل آیوی
  - دنیل نگرانو
explanation: |
 برایان میکون در ژوئن ۲۰۱۱ به Bitcoin پی برد و تحت تأثیر آن قرار گرفت و اعلام کرد که "کاملاً مجذوب بیت‌کوین‌ها شده است". برایان میکون از ژانویه ۲۰۱۲ با کلاب‌ها توسعه Seals را همراهی کرد و در ماه مارس آن را در کانال یوتیوب شخصی خود تبلیغ کرد.
reviewed: true
question: Ni uwuhe mukinyi w’umupira w’amaguru w’umwuga yashigikiye Seals n’urubuga rwa poker rwa Clubs bitcoin kuva muri Mukakaro 2012?
answer: Brayani Mikoni
wrong_answers:
  - Prahlad Friedman
  - Fili Ive
  - Daniyeli Negreyanu
explanation: |
 Bryan Micon yavumbuye Bitcoin muri Ruheshi 2011 aca agira ubupfumu bwayo, avuga ko "yashimishijwe cane n'amahera y'ibiceri". Bryan Micon niwe yari kumwe n’aba 
 gutegura Seals n’ama Clubs kuva muri Mukakaro 2012, aca arabimenyekanisha ku muhora wiwe bwite wa Youtube muri Ntwarante.

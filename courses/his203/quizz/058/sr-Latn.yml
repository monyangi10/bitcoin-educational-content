question: Koji profesionalni poker igrač je podržao Seals sa Clubs bitcoin poker platformom od januara 2012?
answer: Bryan Micon
wrong_answers:
  - Prahlad Friedman
  - Phil Ivey
  - Daniel Negreanu
explanation: |
 Bryan Micon je otkrio Bitcoin u junu 2011. godine i pao pod njegovu čaroliju, izjavivši da je "potpuno fasciniran bitcoinima". Bryan Micon je pratio razvoj Seals sa Klubovima od januara 2012. godine i promovisao ga na svom ličnom Youtube kanalu u martu.
reviewed: true
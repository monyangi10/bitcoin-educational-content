question: किस पेशेवर पोकर खिलाड़ी ने जनवरी 2012 से क्लब बिटकॉइन पोकर प्लेटफॉर्म के साथ Seals का समर्थन किया था?
answer: ब्रायन माइकोन
wrong_answers:
  - प्रहलाद फ्रीडमैन
  - फिल आइवी
  - डैनियल नेग्रेनु
explanation: |
 ब्रायन माइकोन ने जून 2011 में Bitcoin की खोज की और इसके जादू में फंस गए, उन्होंने कहा कि वे "बिटकॉइन से पूरी तरह मोहित" हो गए हैं। ब्रायन माइकोन ने जनवरी 2012 से क्लबों के साथ Seal के विकास में सहयोग किया और मार्च में अपने व्यक्तिगत यूट्यूब चैनल पर इसका प्रचार किया।
reviewed: true
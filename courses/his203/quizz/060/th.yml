question: นวัตกรรมทางเทคนิคของ SatoshiDICE ใดที่อนุญาตให้ผู้เล่นตรวจสอบว่าคาสิโนไม่ได้โกง?
answer: การเผยแพร่แฮชลับบนบล็อกเชน ตามด้วยการเผยแพร่ความลับดังกล่าวเพื่อให้สามารถคำนวณผลลัพธ์ใหม่ได้
wrong_answers:
  - การปรับใช้บล็อกเชนการตรวจสอบแบบกระจายศูนย์ซึ่งแต่ละธุรกรรมได้รับการยืนยันโดยโหนดอิสระหลายตัว
  - การใช้ที่อยู่คงที่บนบล็อกเชน ทำให้สามารถตรวจสอบการจับรางวัลได้ จึงมั่นใจได้ถึงความยุติธรรม
  - การดำเนินการคำนวณความน่าจะเป็นโดยตรงบนบล็อกเชนผ่านสัญญาสาธารณะอัตโนมัติ
explanation: |
 SatoshiDICE เป็นการปฏิวัติในแง่ที่ว่าเป็น "ยุติธรรมอย่างแน่นอน" การจับรางวัลที่เชื่อมโยงกับความน่าจะเป็นแต่ละครั้งขึ้นอยู่กับ generated ลับที่เริ่มต้นในแต่ละวัน ซึ่งแฮชของมันถูกเผยแพร่บนบล็อกเชน ความลับนั้นเองถูกเปิดเผยในอีกไม่กี่วันต่อมา ทำให้ผู้ใช้สามารถคำนวณผลลัพธ์ได้ด้วยตนเอง
reviewed: true
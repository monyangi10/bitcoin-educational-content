question: 플레이어가 카지노가 부정 행위를 하지 않는지 확인할 수 있는 SatoshiDICE의 기술 혁신은 무엇인가요?
answer: 블록체인에 비밀 해시를 게시한 후, 해당 비밀을 공개하여 결과를 다시 계산할 수 있도록 합니다
wrong_answers:
  - 각 트랜잭션이 여러 독립 노드에 의해 검증되는 탈중앙화된 검증 블록체인을 배포합니다
  - 블록체인에 고정 주소를 사용하여 추첨을 감사할 수 있으므로 공정성을 보장합니다
  - 자율적인 공개 계약을 통해 블록체인에서 직접 확률 계산을 실행합니다
explanation: |
 SatoshiDICE는 "확실히 공정하다"는 점에서 혁신적이었습니다. 각 확률 연계 추첨은 하루가 시작될 때 비밀 generated에 따라 달라지며, 그 해시는 블록체인에 공개됩니다
 해시가 블록체인에 공개되었습니다. 며칠 후 비밀이 공개되어 사용자가 직접 결과를 다시 계산할 수 있었습니다.
reviewed: true
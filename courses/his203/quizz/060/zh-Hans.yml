question: SatoshiDICE 的哪项技术创新允许玩家检查赌场是否作弊？
answer: 在区块链上公布秘密哈希值，然后公布上述秘密，以便重新计算结果
wrong_answers:
  - 部署去中心化验证区块链，每笔交易都由多个独立节点进行验证
  - 在区块链上使用固定地址，可以对抽签进行审计，从而确保抽签的公平性
  - 通过自主公共合约直接在区块链上执行概率计算
explanation: |
 SatoshiDICE 的革命性在于它 "绝对公平"。每次与概率挂钩的抽奖都取决于当天开始时的秘密 generated，其
 的哈希值公布在区块链上。几天后，秘密本身就会被公开，用户可以自己重新计算结果。
reviewed: true
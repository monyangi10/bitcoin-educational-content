question: Какое техническое новшество SatoshiDICE позволило игрокам проверить, не обманывает ли их казино?
answer: Публикация секретного хэша в блокчейне с последующей публикацией указанных секретов для пересчета результатов
wrong_answers:
  - Развертывание децентрализованного блокчейна с проверкой, на котором каждая транзакция проверяется несколькими независимыми узлами
  - Использование фиксированных адресов в блокчейне, что позволяет проводить аудит розыгрышей, обеспечивая их справедливость
  - Выполнение вероятностных расчетов непосредственно на блокчейне с помощью автономных публичных контрактов
explanation: |
 Революционность SatoshiDICE заключалась в том, что она была "гарантированно честной". Каждый розыгрыш с привязкой к вероятности зависел от секретного generated в начале дня, хэш которого
 хэш которого публиковался в блокчейне. Сам секрет раскрывался через несколько дней, что позволяло пользователям самостоятельно пересчитать результат.
reviewed: true
question: SatoshiDICE के किस तकनीकी नवाचार ने खिलाड़ियों को यह जांचने की अनुमति दी कि कैसीनो धोखा तो नहीं दे रहा है?
answer: ब्लॉकचेन पर गुप्त हैश का प्रकाशन, और उसके बाद उक्त रहस्यों का प्रकाशन ताकि परिणामों की पुनर्गणना की जा सके।
wrong_answers:
  - एक विकेन्द्रीकृत सत्यापन ब्लॉकचेन की तैनाती, जिस पर प्रत्येक लेनदेन को कई स्वतंत्र नोड्स द्वारा सत्यापित किया जाता है।
  - ब्लॉकचेन पर निश्चित पतों का उपयोग, जिससे ड्रॉ का ऑडिट करना संभव हो जाता है, इस प्रकार उनकी निष्पक्षता सुनिश्चित होती है।
  - स्वायत्त सार्वजनिक अनुबंधों के माध्यम से ब्लॉकचेन पर सीधे संभाव्यता गणनाओं का निष्पादन
explanation: |
 SatoshiDICE अपनी "पूरी तरह से निष्पक्ष" होने की वजह से क्रांतिकारी था। प्रत्येक प्रायिकता-आधारित ड्रॉ दिन की शुरुआत में एक गुप्त generated पर निर्भर करता था, जिसका हैश ब्लॉकचेन पर प्रकाशित किया जाता था। यह रहस्य कुछ दिनों बाद उजागर हो जाता था, जिससे उपयोगकर्ता स्वयं परिणाम की पुनर्गणना कर सकते थे।
reviewed: true
question: Кое техническо нововъведение в SatoshiDICE позволява на играчите да проверяват дали казиното не мами?
answer: Публикуване на секретни хешове в блокчейна, последвано от публикуване на посочените секрети, за да се даде възможност за преизчисляване на резултатите
wrong_answers:
  - Разгръщането на децентрализирана блокчейн система за валидиране, в която всяка транзакция се проверява от няколко независими възела
  - Използването на фиксирани адреси в блокчейна дава възможност за проверка на тегленията, като по този начин се гарантира тяхната справедливост
  - Изпълнение на вероятностни изчисления директно в блокчейна чрез автономни публични договори
explanation: |
 SatoshiDICE беше революционна, тъй като беше "сигурно справедлива". Всяко теглене, обвързано с вероятността, зависеше от тайната generated в началото на деня, от
 чийто хеш се публикуваше в блокчейна. Самата тайна се разкриваше няколко дни по-късно, което позволяваше на потребителите сами да преизчислят резултата.
reviewed: true
question: SatoshiDICEの技術革新で、プレイヤーがカジノがイカサマをしていないことを確認できたのは？
answer: ブロックチェーン上でシークレットハッシュを公開し、その後、結果の再計算を可能にするために前記シークレットを公開すること。
wrong_answers:
  - 各取引が複数の独立したノードによって検証される分散型検証ブロックチェーンの展開
  - ブロックチェーン上の固定アドレスを使用することで、抽選の監査が可能になり、公平性が確保される。
  - 自律的なパブリック・コントラクトを通じて、ブロックチェーン上で直接確率計算を実行する。
explanation: |
 SatoshiDICEは "確実に公平 "であるという点で画期的であった。各確率連動の抽選は、その日の最初に行われる秘密のgeneratedに依存し、そのハッシュはブロックチェーン上で公開される。
 そのハッシュはブロックチェーン上で公開された。秘密自体は数日後に公開され、ユーザーは自分で結果を再計算することができた。
reviewed: true
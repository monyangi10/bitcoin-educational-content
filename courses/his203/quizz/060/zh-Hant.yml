question: SatoshiDICE 的哪項技術創新可讓玩家檢查賭場是否作弊？
answer: 在區塊鏈上公佈秘密哈希，然後公佈所述秘密，以便重新計算結果
wrong_answers:
  - 部署分散式驗證區塊鏈，每筆交易都由數個獨立節點進行驗證
  - 在區塊鏈上使用固定地址，使抽籤審核成為可能，從而確保抽籤的公平性
  - 透過自主的公共契約，直接在區塊鏈上執行概率計算
explanation: |
 SatoshiDICE 的革命性之處在於其 「絕對公平」。每次與概率相關的抽獎都取決於當天開始時的秘密 generated，其
 的哈希值公佈在區塊鏈上。秘密本身會在幾天後公開，讓使用者可以自行重新計算結果。
reviewed: true
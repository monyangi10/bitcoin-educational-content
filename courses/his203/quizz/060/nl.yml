question: Met welke technische innovatie van SatoshiDICE konden spelers controleren of het casino niet vals speelde?
answer: De publicatie van geheime hash op de blockchain, gevolgd door de publicatie van genoemde geheimen om de herberekening van resultaten mogelijk te maken
wrong_answers:
  - De inzet van een gedecentraliseerde validatie blockchain waarop elke transactie wordt geverifieerd door meerdere onafhankelijke nodes
  - Het gebruik van vaste adressen op de blockchain, waardoor het mogelijk is om de trekkingen te controleren en zo de eerlijkheid ervan te garanderen
  - Het uitvoeren van kansberekeningen direct op de blockchain door middel van autonome publieke contracten
explanation: |

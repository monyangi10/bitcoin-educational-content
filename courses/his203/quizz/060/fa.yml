question: کدام نوآوری فنی SatoshiDICE به بازیکنان اجازه داد تا بررسی کنند که کازینو تقلب نمی‌کند؟
answer: انتشار هش مخفی در بلاکچین، به دنبال انتشار آن اسرار برای امکان محاسبه مجدد نتایج
wrong_answers:
  - استقرار یک بلاکچین اعتبارسنجی غیرمتمرکز که در آن هر تراکنش توسط چندین نود مستقل تأیید می‌شود
  - استفاده از آدرس‌های ثابت در بلاکچین، امکان ممیزی قرعه‌کشی‌ها را فراهم می‌کند و بدین ترتیب از انصاف آن‌ها اطمینان حاصل می‌شود.
  - اجرای محاسبات احتمالی به‌طور مستقیم بر روی بلاکچین از طریق قراردادهای عمومی خودمختار
explanation: |
 SatoshiDICE انقلابی بود زیرا "به طور قطع منصفانه" بود. هر قرعه‌کشی مرتبط با احتمال به یک generated مخفی در ابتدای روز بستگی داشت که هش آن در بلاکچین منتشر می‌شد. خود راز چند روز بعد فاش می‌شد و به کاربران اجازه می‌داد تا نتیجه را خودشان دوباره محاسبه کنند.
reviewed: true
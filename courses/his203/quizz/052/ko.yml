question: 2011년 12월 비트인스턴트 외환 서비스가 추가한 기능 중 로버트 파이엘라(일명 BTCKing)가 다크웹 재판매 사업에 악용한 것은?
answer: 현금 입금
wrong_answers:
  - 무료 구매
  - 즉시 송금
  - 규정 준수
explanation: |
 비트인스턴트는 2011년 12월 21일에 이 결제 수단을 추가했습니다. 미국 시민은 특정 위치에 현금을 입금하고 원하는 거래소 플랫폼에서 거의 즉시
 선택한 거래소 플랫폼에서 거의 즉시 달러로 입금받을 수 있었습니다. BTCKing으로 알려진 로버트 파이엘라는 이 결제 수단의 상대적 기밀성을 이용해
 이 방법을 이용해 더 높은 수수료를 받고 실크로드에서 재판매 사업을 운영했습니다.
reviewed: true
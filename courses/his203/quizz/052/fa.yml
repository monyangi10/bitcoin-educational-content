question: کدام ویژگی اضافه شده توسط سرویس مبادله ارز خارجی BitInstant در دسامبر 2011 توسط رابرت فایلا، معروف به BTCKing، برای کسب و کار فروش مجدد وب تاریک او مورد سوء استفاده قرار گرفت؟
answer: واریز نقدی
wrong_answers:
  - خریدهای رایگان
  - انتقالات فوری
  - انطباق مقرراتی
explanation: |
 بیت‌اینسنت این روش پرداخت را در ۲۱ دسامبر ۲۰۱۱ به خدمات خود اضافه کرد. برای شهروندان ایالات متحده ممکن بود که در مکان‌های خاصی پول نقد واریز کنند و تقریباً بلافاصله به دلار در پلتفرم تبادل مورد نظر خود اعتبار بگیرند. رابرت فایلا، معروف به BTCKing، از محرمانگی نسبی این روش بهره‌برداری کرد تا یک کسب‌وکار فروش مجدد در سیلک رود با هزینه بالاتر راه‌اندازی کند.
reviewed: true
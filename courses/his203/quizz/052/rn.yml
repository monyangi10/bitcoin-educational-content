question: Ni ikihe kintu congereweko n’ishirahamwe ry’amahera y’amahanga rya BitInstant mu kwezi kwa kigarama 2011 cakoreshejwe na Robert Faiella, aka BTCKing, mu bucuruzi bwiwe bwo gusubira kugurisha urubuga rw’umwiza?
answer: Gushiramwo amahera
wrong_answers:
  - Gugura ku buntu
  - Kwimurirwa ubwo nyene
  - Kubahiriza amategeko
explanation: |
 BitInstant yongeyeko ubu buryo bwo kwishura ku vyo yatanga kw’igenekerezo rya 21 Kigarama 2011. Vyari bishoboka ko abanyagihugu bo muri Amerika bashiramwo amahera ahantu kanaka kandi bakaba . 
 hafi ubwo nyene mu madolari ku rubuga rwo guhindura amahera bahisemwo. Robert Faiella, akaba ari we BTCKing, yarakoresheje akaryo k’ibanga ry’umwaka w’1990. 
 ubu buryo bwo gukora ubucuruzi bwo gusubira kugurisha ku nzira ya Silk, ku giciro kinini.
reviewed: true
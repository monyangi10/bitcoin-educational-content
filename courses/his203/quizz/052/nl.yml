question: Welke functie toegevoegd door de BitInstant valutaservice in december 2011 werd uitgebuit door Robert Faiella, alias BTCKing, voor zijn dark web reselling business?
answer: Contante storting
wrong_answers:
  - Gratis aankopen
  - Directe overschrijvingen
  - Naleving van regelgeving
explanation: |
 BitInstant voegde deze betaalmethode toe aan zijn aanbod op 21 december 2011. Het was mogelijk voor Amerikaanse burgers om geld te storten op specifieke locaties en
 vrijwel direct gecrediteerd worden in dollars op het exchange-platform van hun keuze. Robert Faiella, ook bekend als BTCKing, profiteerde van de relatieve vertrouwelijkheid van deze methode om een wederverkoopbedrijf op te zetten
 van deze methode om een doorverkoopbedrijf op Silk Road te runnen, tegen een hogere vergoeding.
reviewed: true
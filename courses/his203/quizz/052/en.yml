question: Which feature added by the BitInstant foreign exchange service in December 2011 was exploited by Robert Faiella, aka BTCKing, for his dark web reselling business?
answer: Cash deposit
wrong_answers:
  - Free purchases
  - Instant transfers
  - Regulatory compliance
explanation: |
 BitInstant added this payment method to its offering on December 21, 2011. It was possible for US citizens to deposit cash in specific locations and be credited almost instantly in dollars on the exchange platform of their choice. Robert Faiella, aka BTCKing, took advantage of the relative confidentiality of this method to operate a resale business on Silk Road, for a higher fee.
reviewed: false
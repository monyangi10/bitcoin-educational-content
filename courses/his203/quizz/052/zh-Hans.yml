question: BitInstant 外汇服务于 2011 年 12 月添加的哪项功能被罗伯特-法耶拉（又名 BTCKing）用于其暗网转售业务？
answer: 现金存款
wrong_answers:
  - 免费购买
  - 即时转账
  - 遵守法规
explanation: |
 BitInstant 于 2011 年 12 月 21 日在其产品中添加了这种支付方式。美国公民可以在特定地点存入现金，并在他们选择的交易所平台上
 美国公民可以在特定地点存入现金，并在他们选择的交易所平台上几乎即时获得美元贷记。罗伯特-法耶拉（又名 BTCKing）利用这种相对保密的方式经营转售业务。
 在丝绸之路上经营转售业务，收取更高的费用。
reviewed: true
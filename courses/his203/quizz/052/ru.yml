question: Какую функцию, добавленную сервисом обмена валют BitInstant в декабре 2011 года, использовал Роберт Файелла, он же BTCKing, для своего бизнеса по перепродаже в темной паутине?
answer: Депозит наличными
wrong_answers:
  - Бесплатные покупки
  - Мгновенные переводы
  - Соблюдение нормативных требований
explanation: |
 BitInstant добавила этот способ оплаты в свое предложение 21 декабря 2011 года. Теперь граждане США могли вносить наличные в определенных местах и получать
 почти мгновенно зачислялись в долларах на выбранную ими обменную платформу. Роберт Файелла, он же BTCKing, воспользовался относительной конфиденциальностью
 этого метода для ведения бизнеса по перепродаже на Silk Road за более высокую плату.
reviewed: true
question: Ni kipengele gani kilichoongezwa na huduma ya ubadilishanaji wa fedha za kigeni ya BitInstant mnamo Desemba 2011 kilichotumiwa vibaya na Robert Faiella, maarufu kama BTCKing, kwa biashara yake ya kuuza tena mtandaoni?
answer: Amana ya pesa taslimu
wrong_answers:
  - Ununuzi wa bure
  - Uhamisho wa papo hapo
  - Utiifu wa kanuni
explanation: |
 BitInstant iliongeza njia hii ya malipo kwenye ofa yake mnamo Desemba 21, 2011. Iliwezekana kwa raia wa Marekani kuweka pesa taslimu katika maeneo maalum na kupewa sifa karibu mara moja kwa dola kwenye jukwaa la kubadilishana walilolichagua. Robert Faiella, almaarufu BTCKing, alitumia fursa ya usiri wa jamaa wa njia hii kuendesha biashara ya kuuza tena kwenye Barabara ya Silk, kwa ada ya juu zaidi.
reviewed: true
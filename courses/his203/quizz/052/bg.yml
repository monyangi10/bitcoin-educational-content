question: Коя функция, добавена от услугата за обмен на валута BitInstant през декември 2011 г., беше използвана от Робърт Файела, известен още като BTCKing, за неговия бизнес с препродажба в тъмната мрежа?
answer: Депозит в брой
wrong_answers:
  - Безплатни покупки
  - Незабавни трансфери
  - Нормативно съответствие
explanation: |
 BitInstant добави този метод на плащане към офертата си на 21 декември 2011 г. За гражданите на САЩ беше възможно да депозират пари в брой на определени места и да бъдат
 да бъдат кредитирани почти незабавно в долари в платформата за обмен по техен избор. Робърт Файела, известен още като BTCKing, се възползва от относителната поверителност на
 този метод, за да управлява бизнес с препродажба на Пътя на коприната срещу по-високо заплащане.
reviewed: true
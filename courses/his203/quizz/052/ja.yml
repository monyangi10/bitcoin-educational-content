question: 2011年12月にBitInstant外国為替サービスが追加した機能のうち、BTCKingことロバート・ファイアラがダークウェブでの転売ビジネスに悪用したのはどれ？
answer: 現金預金
wrong_answers:
  - 無料購入
  - インスタント・トランスファー
  - 規制遵守
explanation: |
 BitInstantは2011年12月21日にこの支払い方法を追加した。米国市民は、特定の場所で現金を入金し、選択した取引所のプラットフォームでほぼ即座にドル建てで入金されることが可能になった。
 米国市民は、特定の場所に現金を預け入れると、ほぼ即座に選択した取引所のプラットフォームでドル建てで入金されることが可能になった。BTCKingことRobert Faiellaは、この方法の比較的機密性の高い利点を利用した。
 この方法を利用して、Silk Road上で転売ビジネスを行い、高い手数料を得ていた。
reviewed: true
question: BitInstant 外匯服務在 2011 年 12 月新增的哪項功能，被又名 BTCKing 的 Robert Faiella 利用來進行其暗網轉售業務？
answer: 現金存款
wrong_answers:
  - 免費購買
  - 即時轉移
  - 法規遵循
explanation: |
 BitInstant 於 2011 年 12 月 21 日將此付款方式加入其產品中。美國公民可以在特定地點存入現金，並在他們所選擇的交換平台上幾乎即時以美元存入。
 美元存入他們所選擇的交易平台。Robert Faiella，又名 BTCKing，利用這種相對保密的方式經營轉售業務。
 在絲綢之路上經營轉售業務，收取較高的費用。
reviewed: true
question: ฟีเจอร์ใดที่เพิ่มโดยบริการแลกเปลี่ยนเงินตราต่างประเทศ BitInstant ในเดือนธันวาคม 2011 ที่ถูกใช้โดย Robert Faiella หรือที่รู้จักในชื่อ BTCKing สำหรับธุรกิจขายต่อบนเว็บมืดของเขา?
answer: ฝากเงินสด
wrong_answers:
  - การซื้อฟรี
  - การโอนเงินทันที
  - การปฏิบัติตามกฎระเบียบ
explanation: |
 BitInstant เพิ่มวิธีการชำระเงินนี้ในข้อเสนอเมื่อวันที่ 21 ธันวาคม 2011 เป็นไปได้สำหรับพลเมืองสหรัฐฯ ที่จะฝากเงินสดในสถานที่เฉพาะและได้รับเครดิตเกือบจะทันทีในรูปแบบดอลลาร์บนแพลตฟอร์มแลกเปลี่ยนที่พวกเขาเลือก Robert Faiella หรือที่รู้จักในชื่อ BTCKing ใช้ประโยชน์จากความเป็นส่วนตัวของวิธีการนี้ในการดำเนินธุรกิจขายต่อบน Silk Road โดยคิดค่าธรรมเนียมที่สูงขึ้น
reviewed: true
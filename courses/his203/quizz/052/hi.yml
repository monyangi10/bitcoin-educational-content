question: दिसंबर 2011 में बिटइंस्टेंट विदेशी मुद्रा सेवा द्वारा जोड़े गए किस फीचर का रॉबर्ट फैएला, उर्फ ​​BTCKing ने अपने डार्क वेब पुनर्विक्रय व्यवसाय के लिए दुरुपयोग किया?
answer: नकद जमा
wrong_answers:
  - मुफ़्त खरीदारी
  - तत्काल स्थानांतरण
  - विनियामक अनुपालन
explanation: |
 BitInstant ने 21 दिसंबर, 2011 को अपनी सेवाओं में यह भुगतान विधि जोड़ी। अमेरिकी नागरिक विशिष्ट स्थानों पर नकद जमा कर सकते थे और अपनी पसंद के एक्सचेंज प्लेटफॉर्म पर लगभग तुरंत डॉलर में राशि प्राप्त कर सकते थे।
 रॉबर्ट फैएला, उर्फ ​​BTCKing ने इस विधि की अपेक्षाकृत गोपनीयता का लाभ उठाते हुए सिल्क रोड पर अधिक शुल्क लेकर पुनर्विक्रय का कारोबार चलाया।
reviewed: true
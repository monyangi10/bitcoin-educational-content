question: किस प्रोटोकॉल ने सिल्क रोड के बाज़ार को अधिकारियों द्वारा सीधे बंद होने से रोका?
answer: टो
wrong_answers:
  - आई2पी
  - फ्रीनेट
  - बिटटोरेंट
explanation: |
 टोर, जो कि द ओनियन राउटर का संक्षिप्त रूप है, एक प्रोटोकॉल है जो वैश्विक, विकेन्द्रीकृत ओवरले कंप्यूटर नेटवर्क (जिसे आमतौर पर डार्कनेट के नाम से जाना जाता है) का समर्थन करता है।
 यह वेबसाइटों को गुमनाम रूप से और बिना सेंसरशिप के होस्ट करने में सक्षम बनाता है, और रॉस उल्ब्रिच्ट की परियोजना के लिए आदर्श रूप से उपयुक्त था।
reviewed: true
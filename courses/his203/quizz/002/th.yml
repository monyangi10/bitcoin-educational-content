question: โปรโตคอลใดที่ป้องกันไม่ให้ตลาด Silk Road ถูกปิดโดยตรงโดยเจ้าหน้าที่?
answer: ทอร์
wrong_answers:
  - I2P
  - ฟรีเน็ต
  - บิททอร์เรนต์
explanation: |
 Tor, คำย่อที่กลายเป็นคำศัพท์สำหรับ The Onion Router, เป็นโปรโตคอลที่สนับสนุนเครือข่ายคอมพิวเตอร์แบบซ้อนทับที่กระจายศูนย์ทั่วโลก (รู้จักกันทั่วไปว่าเป็น darknet) 
 มันช่วยให้เว็บไซต์สามารถโฮสต์ได้โดยไม่ระบุตัวตนและไม่มีการเซ็นเซอร์ และเหมาะสมอย่างยิ่งกับโครงการของ Ross Ulbricht.
reviewed: true
question: Какъв протокол попречи на властите да затворят директно пазара на Пътя на коприната?
answer: Tor
wrong_answers:
  - I2P
  - Freenet
  - BitTorrent
explanation: |
 Tor, лексикализиран акроним на The Onion Router, е протокол, поддържащ глобална, децентрализирана покривна компютърна мрежа (широко известна като даркнет).
 Той дава възможност за анонимно хостване на уебсайтове без цензура и е идеално подходящ за проекта на Рос Улбрихт.
reviewed: true
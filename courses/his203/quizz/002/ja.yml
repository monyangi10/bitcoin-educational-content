question: シルクロードのマーケットプレイスが当局によって直接閉鎖されるのを防いだのは、どのようなプロトコルだったのだろうか？
answer: トーア
wrong_answers:
  - I2P
  - フリーネット
  - ビットトレント
explanation: |
 Torは、The Onion Routerの頭文字をとったもので、グローバルな分散型オーバーレイ・コンピューター・ネットワーク（一般にダークネットとして知られている）をサポートするプロトコルである。
 ウェブサイトを匿名で検閲なしにホストすることができ、ロス・ウルブリヒトのプロジェクトに理想的だった。
reviewed: true
question: Какой протокол не позволил закрыть рынок Silk Road непосредственно властями?
answer: Тор
wrong_answers:
  - I2P
  - Freenet
  - BitTorrent
explanation: |
 Tor - лексическое сокращение от The Onion Router - это протокол, поддерживающий глобальную, децентрализованную оверлейную компьютерную сеть (широко известную как даркнет).
 Он позволяет размещать веб-сайты анонимно и без цензуры и идеально подходил для проекта Росса Ульбрихта.
reviewed: true
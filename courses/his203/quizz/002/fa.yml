question: چه پروتکلی مانع از تعطیلی مستقیم بازار سیلک رود توسط مقامات شد؟
answer: تور
wrong_answers:
  - آی‌تو‌پی
  - فری‌نت
  - بیت‌تورنت
explanation: |
 تور، یک سرواژه‌ی واژگانی برای The Onion Router، پروتکلی است که از یک شبکه کامپیوتری پوششی جهانی و غیرمتمرکز (که معمولاً به عنوان دارک‌نت شناخته می‌شود) پشتیبانی می‌کند.  
 این پروتکل امکان میزبانی ناشناس و بدون سانسور وب‌سایت‌ها را فراهم می‌کند و به‌طور ایده‌آل برای پروژه‌ی راس اولبریکت مناسب بود.
reviewed: true
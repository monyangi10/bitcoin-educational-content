question: Ni nde yari umuhinga mu bijanye n’ugushirwa mu ngiro kwa mbere kw’ibimenyamenya vy’ubuhinga bwa none vyakozwe muri Myandagaro 2012 biciye ku mafaranga y’ibanga PPCoin?
answer: Umwami w'izuba
wrong_answers:
  - Vitalik Buterin
  - Uze-uvuye-hirya
  - Beni Lori
explanation: |
 Sunny King ni ryo zina ry’ikara ry’uwarongoye uwo mugambi. Iciyumviro cari co gushira mu ngiro uburyo bwo gukorana aho amabuye amwe amwe yemezwa n’ikimenyamenya c’ukubungabunga .
 (bishingiye ku ciyumviro c’imyaka y’igiceri), hamwe n’amabuye yacukuwe na mining isanzwe. Sunny King n’abo bakorana batanguje PPCoin muri Myandagaro 2012 .
 (mu nyuma ryitwa Peercoin). Bavuze ko umuti wabo ari "ugukoresha neza inguvu mu gihe kirekire".
reviewed: true
question: Кто был вдохновителем первого гибридного proof-of-stake, реализованного в августе 2012 года с помощью криптовалюты PPCoin?
answer: Солнечный король
wrong_answers:
  - Виталик Бутерин
  - Come-From-Beyond
  - Бен Лори
explanation: |
 Санни Кинг - это псевдоним ведущего разработчика проекта. Идея заключалась в реализации гибридной модели, в которой определенные блоки подтверждались доказательством сохранения
 (на основе концепции возраста монет), в дополнение к блокам, добываемым обычным mining. Санни Кинг и его соратники запустили PPCoin в августе 2012 года
 (позже переименованную в Peercoin). Они описали свое решение как "энергоэффективное в долгосрочной перспективе".
reviewed: true
question: 2012년 8월에 암호화폐 PP코인을 통해 최초로 하이브리드 지분 증명을 구현한 주인공은 누구였나요?
answer: 써니 킹
wrong_answers:
  - 비탈릭 부테린
  - 컴-프롬-비욘드
  - 벤 로리
explanation: |
 써니 킹은 이 프로젝트의 수석 개발자의 필명이었습니다. 이 아이디어는 특정 블록이 보존 증명으로 검증되는 하이브리드 모델을 구현하는 것이었습니다
 (코인 시대 개념에 기반한)에 의해 특정 블록이 검증되는 하이브리드 모델을 구현하는 것이었습니다. 써니 킹과 그의 공동 작업자들은 2012년 8월에 PPCoin을 출시했습니다
 (이후 피어코인으로 명칭 변경). 이들은 자신들의 솔루션을 "장기적으로 에너지 효율적"이라고 설명했습니다.
reviewed: true
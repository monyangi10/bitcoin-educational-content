question: Кой стои зад първото хибридно прилагане на доказателство за залог, осъществено през август 2012 г. чрез криптовалутата PPCoin?
answer: Слънчев крал
wrong_answers:
  - Виталик Бутерин
  - Come-From-Beyond
  - Бен Лори
explanation: |
 Съни Кинг е псевдонимът на водещия разработчик на проекта. Идеята е била да се приложи хибриден модел, при който определени блокове са били валидирани чрез доказателство за запазване
 (въз основа на концепцията за възрастта на монетите), в допълнение към блоковете, добивани чрез конвенционалните mining. Съни Кинг и неговите сътрудници стартираха PPCoin през август 2012 г
 (по-късно преименуван на Peercoin). Те описват своето решение като "енергийно ефективно в дългосрочен план".
reviewed: true
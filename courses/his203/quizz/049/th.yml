question: ใครคือผู้อยู่เบื้องหลังการดำเนินการพิสูจน์การถือหุ้นแบบไฮบริดครั้งแรกที่ดำเนินการในเดือนสิงหาคม 2012 ผ่านสกุลเงินดิจิทัล PPCoin?
answer: ซันนี่ คิง
wrong_answers:
  - วิตาลิก บูเตริน
  - มาจากเบื้องบน
  - เบน ลอรี
explanation: |
 Sunny King เป็นนามปากกาของหัวหน้าผู้พัฒนาโครงการ แนวคิดคือการนำเสนอรูปแบบไฮบริดที่บล็อกบางส่วนได้รับการตรวจสอบโดย proof of conservation
 (อิงตามแนวคิดอายุของเหรียญ) นอกเหนือจากบล็อกที่ขุดโดย mining แบบดั้งเดิม Sunny King และผู้ร่วมงานของเขาเปิดตัว PPCoin ในเดือนสิงหาคม 2012
 (ต่อมาเปลี่ยนชื่อเป็น Peercoin) พวกเขาอธิบายวิธีแก้ปัญหาของพวกเขาว่า "ประหยัดพลังงานในระยะยาว"
reviewed: true
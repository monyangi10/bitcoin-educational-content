question: Ni nani aliyekuwa mbunifu mkuu nyuma ya utekelezaji wa kwanza mseto wa uthibitisho wa hisa uliofanywa mnamo Agosti 2012 kupitia sarafu ya kidijitali ya PPCoin?
answer: Mfalme wa Jua
wrong_answers:
  - Vitalik Buterin
  - Njoo-Kutoka-Nyuma
  - Ben Laurie
explanation: |
 Sunny King ilikuwa jina la kalamu la msanidi programu mkuu wa mradi huo. Wazo lilikuwa kutekeleza mfumo mseto ambapo vitalu fulani vilithibitishwa kwa uthibitisho wa uhifadhi
 (kulingana na dhana ya umri wa sarafu), pamoja na vitalu vilivyochimbwa na mining ya kawaida. Sunny King na washirika wake walizindua PPCoin mnamo Agosti 2012
 (baadaye ikaitwa Peercoin). Walielezea suluhisho lao kama "linalotumia nishati kwa muda mrefu".
reviewed: true
question: 2012年8月、暗号通貨PPCoinを通じて初めてハイブリッド・プルーフ・オブ・ステークを実施した首謀者は誰だったのか？
answer: サニー・キング
wrong_answers:
  - ヴィタリック・ブテリン
  - カムフロムビヨンド
  - ベン・ローリー
explanation: |
 サニー・キングは、このプロジェクトのリード開発者のペンネームである。そのアイデアは、従来のminingで採掘されたブロックに加え、特定のブロックを保全証明
 (従来のminingによって採掘されるブロックに加えて、（コインエイジの概念に基づく）保全証明によって特定のブロックが検証されるハイブリッドモデルを実装することだった。サニー・キングと彼の共同開発者は2012年8月にPPCoinを立ち上げた。
 (後にPeercoinと改名）を立ち上げた。彼らは自分たちのソリューションを「長期的にエネルギー効率が高い」と説明した。
reviewed: true
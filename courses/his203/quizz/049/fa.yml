question: چه کسی مغز متفکر پشت اولین اجرای ترکیبی اثبات سهام بود که در آگوست 2012 از طریق ارز دیجیتال PPCoin انجام شد؟
answer: سانی کینگ
wrong_answers:
  - ویتالیک بوترین
  - از ماوراء آمده
  - بن لوری
explanation: |
 سانی کینگ نام مستعار توسعه‌دهنده اصلی پروژه بود. ایده این بود که یک مدل ترکیبی پیاده‌سازی شود که در آن برخی از بلاک‌ها با اثبات حفاظت (بر اساس مفهوم سن سکه) اعتبارسنجی شوند، علاوه بر بلاک‌هایی که به‌صورت متعارف توسط mining استخراج می‌شوند. سانی کینگ و همکارانش در آگوست ۲۰۱۲ پی‌پی‌کوین را راه‌اندازی کردند (که بعداً به پیرکوین تغییر نام داد). آن‌ها راه‌حل خود را به‌عنوان "بهره‌وری انرژی در بلندمدت" توصیف کردند.
reviewed: true
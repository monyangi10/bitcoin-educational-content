question: अगस्त 2012 में क्रिप्टोकरेंसी पीपीकॉइन के माध्यम से किए गए पहले हाइब्रिड प्रूफ-ऑफ-स्टेक कार्यान्वयन के पीछे मुख्य साजिशकर्ता कौन था?
answer: सनी किंग
wrong_answers:
  - विटालिक बुटेरिन
  - दूर से आओ
  - बेन लॉरी
explanation: |
 सनी किंग इस प्रोजेक्ट के प्रमुख डेवलपर का छद्म नाम था। इसका उद्देश्य एक हाइब्रिड मॉडल लागू करना था, जिसमें कुछ ब्लॉकों को संरक्षण के प्रमाण (कॉइन एज अवधारणा पर आधारित) द्वारा मान्य किया जाता था, साथ ही पारंपरिक mining द्वारा खनन किए गए ब्लॉकों को भी शामिल किया जाता था।
 
 सनी किंग और उनके सहयोगियों ने अगस्त 2012 में PPCoin लॉन्च किया (बाद में इसका नाम बदलकर Peercoin कर दिया गया)। उन्होंने अपने समाधान को "दीर्घकालिक रूप से ऊर्जा-कुशल" बताया।
reviewed: true
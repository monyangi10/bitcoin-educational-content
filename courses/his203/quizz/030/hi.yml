question: सितंबर 2010 में बिट लॉन्ड्री नामक पहली Bitcoin मिक्सिंग सेवा किसने बनाई थी?
answer: पीटर वेसेनेस
wrong_answers:
  - रोमन स्टर्लिंगोव
  - बेंजामिन रीव्स
  - Gregory Maxwell
explanation: |
 पीटर वेनेसेस एक अमेरिकी उद्यमी थे जिनके पास क्रिप्टोग्राफी की डिग्री थी और उन्होंने स्लैशडॉटिंग के समय Bitcoin की खोज की थी। उन्होंने धन को ट्रैक करना अधिक कठिन बनाने के लिए इस सेवा को विकसित किया। मई 2011 में, आगे आने वाली कानूनी जटिलताओं को भांपते हुए, उन्होंने इस सेवा को कार्यकर्ता माइक गोगुल्स्की को बेच दिया।
reviewed: true
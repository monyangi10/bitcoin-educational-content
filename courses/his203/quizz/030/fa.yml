question: چه کسی اولین سرویس مخلوط‌کننده Bitcoin به نام BitLaundry را در سپتامبر 2010 ایجاد کرد؟
answer: پیتر وسنس
wrong_answers:
  - رومن استرلینگوف
  - بنجامین ریوز
  - Gregory Maxwell
explanation: |
 پیتر ونسیس یک کارآفرین آمریکایی با مدرک رمزنگاری بود که Bitcoin را در زمان اسلش‌داتینگ کشف کرد. او این سرویس را توسعه داد تا ردیابی وجوه را دشوارتر کند. در ماه مه ۲۰۱۱، با احساس پیچیدگی‌های قانونی پیش رو، این سرویس را به فعال مایک گوگولسکی فروخت.
reviewed: true
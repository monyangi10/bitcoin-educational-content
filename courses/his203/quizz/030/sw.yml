question: Ni nani aliyeunda huduma ya kwanza ya kuchanganya Bitcoin, inayoitwa BitLaundry, mnamo Septemba 2010?
answer: Peter Vessenes
wrong_answers:
  - Kirumi Sterlingov
  - Benjamin Reeves
  - Gregory Maxwell
explanation: |
 Peter Venesses alikuwa mjasiriamali wa Marekani mwenye shahada ya usimbaji fiche ambaye aligundua Bitcoin wakati wa kukatwa kwa vipande. Alianzisha huduma hiyo ili kufanya iwe vigumu zaidi kufuatilia fedha. Mnamo Mei 2011, akihisi matatizo ya kisheria yaliyokuwa mbele yake, aliuza huduma hiyo kwa mwanaharakati Mike Gogulski.
reviewed: true
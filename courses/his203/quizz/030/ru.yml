question: Кто создал первый сервис микширования Bitcoin под названием BitLaundry в сентябре 2010 года?
answer: Питер Вессенес
wrong_answers:
  - Роман Стерлингов
  - Бенджамин Ривз
  - Gregory Maxwell
explanation: |
 Питер Венессес - американский предприниматель с ученой степенью в области криптографии, который открыл Bitcoin во времена слэшдотинга. Он разработал сервис, чтобы
 отслеживание денежных средств. В мае 2011 года, предчувствуя юридические сложности, он продал сервис активисту Майку Гогульски.
reviewed: true
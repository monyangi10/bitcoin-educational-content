question: Ni nde yaremye igikorwa ca mbere co guvanga Bitcoin, citwa BitLaundry, muri Nzero 2010?
answer: Petero
wrong_answers:
  - Romani Siteringov
  - Benyamini Reevu
  - Gregory Maxwell
explanation: |
 Peter Venesses yari umunyamerika w’umunyamigambi afise impamyabushobozi mu vy’ubuhinga bwo gukora amakuru y’ibanga, niwe yavumbuye Bitcoin mu gihe c’ugukora slashdotting. Yateguye igikorwa co gutuma . 
 biragoye cane gukurikirana amahera. Muri Rusama 2011, abonye ko hari ingorane zijanye n’amategeko, yagurishije iyo nzira umunyagihugu yitwa Mike Gogulski.
reviewed: true
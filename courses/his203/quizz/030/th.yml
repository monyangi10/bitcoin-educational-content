question: ใครเป็นผู้สร้างบริการผสม Bitcoin แรกที่เรียกว่า BitLaundry ในเดือนกันยายน 2010?
answer: ปีเตอร์ เวสเซนส์
wrong_answers:
  - โรมัน สเตอร์ลิงกอฟ
  - เบนจามิน รีฟส์
  - Gregory Maxwell
explanation: |
 ปีเตอร์ เวเนสเซส เป็นผู้ประกอบการชาวอเมริกันที่มีปริญญาด้านการเข้ารหัสลับซึ่งค้นพบ Bitcoin ในช่วงเวลาของการเผยแพร่บน Slashdot เขาได้พัฒนาบริการนี้เพื่อทำให้การติดตามเงินทุนยากขึ้น ในเดือนพฤษภาคม 2011 เมื่อรู้สึกถึงปัญหาทางกฎหมายที่อาจเกิดขึ้น เขาได้ขายบริการนี้ให้กับนักเคลื่อนไหว ไมค์ โกกุลสกี้
reviewed: true
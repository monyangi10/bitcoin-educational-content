question: Кой създаде първата услуга за смесване на Bitcoin, наречена BitLaundry, през септември 2010 г.?
answer: Питър Весенес
wrong_answers:
  - Роман Стърлингьов
  - Бенджамин Рийвс
  - Gregory Maxwell
explanation: |
 Питър Венес е американски предприемач с диплома по криптография, който открива Bitcoin по времето на slashdotting. Той разработва услугата, за да направи
 проследяването на средства. През май 2011 г., предчувствайки предстоящи правни усложнения, той продава услугата на активиста Майк Гогулски.
reviewed: true
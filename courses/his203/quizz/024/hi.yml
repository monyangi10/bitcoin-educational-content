question: एमपीएक्स प्लेटफॉर्म के संस्थापक मिर्सेया पोपेस्कु किस राष्ट्रीयता के नागरिक थे, जो कॉल और पुट ऑप्शन के साथ-साथ शेयर और बॉन्ड जारी करने की सुविधा भी प्रदान करता था?
answer: रोमानियाई
wrong_answers:
  - अमेरिकी
  - चीनी
  - वह राज्यविहीन था।
explanation: |
 वे समुदाय में एक विवादास्पद व्यक्ति थे। मूल रूप से रोमानिया के ट्रांसिल्वेनिया से आए, उन्होंने अपने ब्लॉग ट्रिलेमा पर रोमानियाई और अंग्रेजी दोनों भाषाओं में व्यापक रूप से लिखा।
 उन्होंने दर्शन, राजनीति और कामुकता सहित सभी प्रकार के विषयों को जानबूझकर उत्तेजक शैली में उठाया। उनका निधन 2021 में 41 वर्ष की आयु में हुआ।
reviewed: true
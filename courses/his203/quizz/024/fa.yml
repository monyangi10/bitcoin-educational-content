question: ملیت میرچا پوپسکو، بنیان‌گذار پلتفرم MPEx که گزینه‌های خرید و فروش و امکان صدور سهام و اوراق قرضه را ارائه می‌داد، چه بود؟
answer: رومانیایی
wrong_answers:
  - آمریکایی
  - چینی
  - او بی‌تابعیت بود
explanation: |
 او یک شخصیت جنجالی در جامعه بود. اصالتاً اهل ترانسیلوانیا در رومانی بود و به طور گسترده‌ای در وبلاگ خود Trilema، به زبان‌های رومانیایی و انگلیسی می‌نوشت.  
 او به موضوعات مختلفی از جمله فلسفه، سیاست و جنسیت می‌پرداخت و به عمد به سبک تحریک‌آمیز می‌نوشت. او در سال 2021 در سن 41 سالگی درگذشت.
reviewed: true
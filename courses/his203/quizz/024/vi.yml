question: Ông Mircea Popescu, người sáng lập nền tảng MPEx, nơi cung cấp các quyền chọn mua và bán cũng như khả năng phát hành cổ phiếu và trái phiếu, mang quốc tịch gì?
answer: tiếng Romania
wrong_answers:
  - người Mỹ
  - Trung Quốc
  - Ông ta không có quốc tịch
explanation: |
 Ông là một nhân vật gây tranh cãi trong cộng đồng. Vốn xuất thân từ Transylvania, Romania, ông viết rất nhiều trên blog Trilema của mình, bằng cả tiếng Romania và tiếng Anh.
 
 Ông đề cập đến đủ loại chủ đề, bao gồm triết học, chính trị và tình dục, với phong cách cố tình khiêu khích. Ông qua đời năm 2021 ở tuổi 41.
reviewed: true
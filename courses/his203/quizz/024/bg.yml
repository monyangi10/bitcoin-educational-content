question: Каква националност има Мирча Попеску, основател на платформата MPEx, която предлага кол и пут опции и възможност за емитиране на акции и облигации?
answer: Румънски
wrong_answers:
  - Американски
  - Китайски
  - Той беше без гражданство
explanation: |
 Той е противоречива личност в общността. Родом от Трансилвания в Румъния, той пишеше много в блога си Trilema, както на румънски, така и на английски език.
 Разглеждаше всякакви теми, включително философия, политика и сексуалност, в умишлено провокативен стил. Умира през 2021 г. на 41-годишна възраст.
reviewed: true
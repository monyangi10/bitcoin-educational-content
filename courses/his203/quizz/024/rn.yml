question: Mircea Popescu, uwashinze urubuga rwa MPEx, rwatanga amahitamwo yo guhamagara no gushiramwo n’ubushobozi bwo gutanga imigabane n’amabondi, yari uwo mu bwoko ubuhe?
answer: Ikirumaniya
wrong_answers:
  - Umunyamerika
  - Igishinwa
  - Yari atagira igihugu 
explanation: |
 Yari umuntu atera impaka mu kibano. Yavukiye muri Transylvanie muri Rumaniya, yanditse cane ku rubuga rwiwe rwitwa Trilema, mu rurimi rw’ikirumaniya no mu congereza.
 Yarafata ingingo z’ubwoko bwose, harimwo n’ivy’ubuhinga bwa filozofiya, politike n’ivy’imibonano mpuzabitsina, mu buryo bwo gutera ubwoba n’ibigirankana. Yapfuye muri 2021 afise imyaka 41 y'amavuka.
reviewed: true
question: コールオプションやプットオプション、株式や債券の発行が可能なMPExプラットフォームの創設者であるミルチャ・ポペスクの国籍は？
answer: ルーマニア語
wrong_answers:
  - アメリカン
  - 中国語
  - 彼は無国籍だった
explanation: |
 ルーマニアのトランシルヴァニア出身の彼は、ブログ『Trilema』（トリレマ）で多くの記事を書いている。ルーマニアのトランシルバニア出身で、自身のブログ『Trilema』にルーマニア語と英語で幅広く執筆。
 哲学、政治、セクシュアリティなどあらゆるテーマに挑発的な文体で挑んだ。2021年、41歳で死去。
reviewed: true
question: 콜 옵션과 풋 옵션, 주식과 채권 발행 가능성을 제공한 MPEx 플랫폼의 창립자 미르체아 포페스쿠는 어떤 국적을 가졌나요?
answer: 루마니아어
wrong_answers:
  - 미국
  - 중국어
  - 그는 무국적자였습니다
explanation: |
 그는 커뮤니티에서 논란이 많은 인물이었습니다. 루마니아 트란실바니아 출신인 그는 자신의 블로그 트리레마에 루마니아어와 영어로 광범위한 글을 썼습니다.
 그는 철학, 정치, 성 등 모든 종류의 주제를 고의적으로 도발적인 스타일로 다루었습니다. 그는 2021년에 41세의 나이로 사망했습니다.
reviewed: true
question: Какой национальности был Мирча Попеску, основатель платформы MPEx, которая предлагала опционы колл и пут, а также возможность выпускать акции и облигации?
answer: Румыния
wrong_answers:
  - Америка
  - Китайский
  - Он был без гражданства
explanation: |
 Он был неоднозначной фигурой в обществе. Родом из Трансильвании (Румыния), он много писал в своем блоге Trilema на румынском и английском языках.
 Он затрагивал всевозможные темы, включая философию, политику и сексуальность, в нарочито провокационном стиле. Он умер в 2021 году в возрасте 41 года.
reviewed: true
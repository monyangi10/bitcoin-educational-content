explanation: |
 Bio je kontroverzna figura u zajednici. Poreklom iz Transilvanije u Rumuniji, pisao je opširno na svom blogu Trilema, na rumunskom i engleskom jeziku. 
 Bavio se raznim temama, uključujući filozofiju, politiku i seksualnost, u namerno provokativnom stilu. Preminuo je 2021. godine u 41. godini života.

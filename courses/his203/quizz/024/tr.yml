question: Alım ve satım opsiyonları ile hisse senedi ve tahvil ihraç etme imkanı sunan MPEx platformunun kurucusu Mircea Popescu hangi uyruktandı?
answer: Romence
wrong_answers:
  - Amerikan
  - Çince
  - O vatansızdı
explanation: |
 Toplumda tartışmalı bir figürdü. Aslen Romanya'nın Transilvanya bölgesinden olan Trilema adlı blogunda hem Romence hem de İngilizce olarak kapsamlı yazılar yazdı.
 Felsefe, siyaset ve cinsellik de dahil olmak üzere her türlü konuyu kasıtlı olarak kışkırtıcı bir üslupla ele aldı. 2021 yılında 41 yaşında öldü.
reviewed: true
question: Welke nationaliteit had Mircea Popescu, de oprichter van het MPEx-platform, dat call- en putopties aanbood en de mogelijkheid om aandelen en obligaties uit te geven?
answer: Roemeens
wrong_answers:
  - Amerikaanse
  - Chinees
  - Hij was staatloos
explanation: |
 Hij was een controversieel figuur in de gemeenschap. Hij kwam oorspronkelijk uit Transsylvanië in Roemenië en schreef uitgebreid op zijn blog Trilema, zowel in het Roemeens als in het Engels.
 Hij behandelde allerlei onderwerpen, waaronder filosofie, politiek en seksualiteit, in een bewust provocerende stijl. Hij stierf in 2021 op 41-jarige leeftijd.
reviewed: true
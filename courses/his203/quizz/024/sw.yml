question: Mircea Popescu, mwanzilishi wa jukwaa la MPEx, ambalo lilitoa chaguzi za kupiga na kuweka na uwezekano wa kutoa hisa na dhamana, alikuwa wa utaifa gani?
answer: Kiromania
wrong_answers:
  - Marekani
  - Kichina
  - Alikuwa hana uraia
explanation: |
 Alikuwa mtu mwenye utata katika jamii. Asili yake ni Transylvania huko Romania, aliandika mengi kwenye blogu yake Trilema, kwa Kiromania na Kiingereza.
 
 Alishughulikia mada za kila aina, ikiwa ni pamoja na falsafa, siasa na ujinsia, kwa mtindo wa kuchochea kwa makusudi. Alifariki mwaka wa 2021 akiwa na umri wa miaka 41.
reviewed: true
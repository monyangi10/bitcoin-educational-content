question: چرا ارتقاء Pay to Script Hash نیاز به ۵۵٪ از قدرت هش شبکه برای فعال‌سازی داشت؟
answer: به‌طوری که "سازگار با نسخه‌های قبلی" باشد و باعث ایجاد انشعاب زنجیره نشود
wrong_answers:
  - زیرا حاکمیت پروتکل به رأی ماینرها بستگی دارد ("یک پردازنده، یک رأی")
  - برای جلوگیری از تمرکز کسب‌وکار mining، سپس تحت سلطه چند استخر mining قرار گرفت.
  - زیرا رهبر پروژه گاوین آندرسن نمی‌خواست یک "دیکتاتور خیرخواه" باشد
explanation: |
 این یک محدودیت از قوانین اجماع بود که بعدها به عنوان "fork نرم" شناخته شد. ارتقاء در صورتی که توسط اکثریت قدرت محاسباتی شبکه پشتیبانی شود، باعث ایجاد انشعاب زنجیره نمی‌شود.
reviewed: true
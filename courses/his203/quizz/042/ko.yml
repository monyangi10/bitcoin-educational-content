question: 페이 투 스크립트 Hash 업그레이드를 활성화하려면 네트워크 해시 파워의 55%가 필요한 이유는 무엇인가요?
answer: '"이전 버전과 호환"되며 체인 분할을 생성하지 않습니다'
wrong_answers:
  - '프로토콜 거버넌스는 채굴자의 투표("한 프로세서, 한 투표")에 의존하기 때문입니다'
  - mining 비즈니스를 중앙 집중화하지 않기 위해 소수의 mining 풀이 지배하는 것을 방지하기 위해
  - 프로젝트 리더인 개빈 안드레센은 "자비로운 독재자"가 되고 싶지 않았기 때문입니다
explanation: |
 이는 합의 규칙의 제한으로, 나중에 "소프트 fork"라고 불리게 됩니다. 네트워크 컴퓨팅 파워의 과반수가 지원하는 경우 업그레이드는 체인 분할을 생성하지 않습니다
 네트워크 컴퓨팅 파워의 대다수가 지원하는 경우에는 체인 분할을 생성하지 않습니다.
reviewed: true
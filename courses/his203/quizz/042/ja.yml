question: ペイ・トゥ・スクリプトのHashアップグレードは、なぜネットワークのハッシュパワーの55％を必要としたのか？
answer: 後方互換性」があり、連鎖的な分裂を起こさないようにする。
wrong_answers:
  - プロトコルのガバナンスはマイナーの投票に依存するため（「1プロセッサ1票」）。
  - 少数のminingプールが独占していたminingビジネスを一極集中させないためである。
  - プロジェクトリーダーのギャビン・アンドレセンは "慈悲深い独裁者 "にはなりたくなかったからだ。
explanation: |
 これはコンセンサスルールの制限であり、後に「ソフトfork」と呼ばれるものである。アップグレードは、それがネットワークの計算能力の過半数によってサポートされている場合には、チェーンの分裂を生じさせない。
 ネットワークの計算能力の過半数によって支持されていれば、アップグレードは連鎖分裂を引き起こさない。
reviewed: true
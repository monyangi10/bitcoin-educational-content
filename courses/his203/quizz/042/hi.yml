question: पे टू स्क्रिप्ट Hash अपग्रेड को सक्रिय करने के लिए नेटवर्क की 55% हैश पावर की आवश्यकता क्यों थी?
answer: ताकि यह "पिछली पीढ़ी के अनुकूल" हो और श्रृंखला में कोई विभाजन न हो।
wrong_answers:
  - क्योंकि प्रोटोकॉल का संचालन खनिकों के मत पर निर्भर करता है ("एक प्रोसेसर, एक वोट")
  - mining व्यवसाय को केंद्रीकृत न करने के लिए, जो उस समय कुछ ही mining पूलों के प्रभुत्व में था।
  - क्योंकि परियोजना प्रमुख गैविन एंड्रेसन "परोपकारी तानाशाह" नहीं बनना चाहते थे।
explanation: |
 यह सर्वसम्मति नियमों का एक प्रतिबंध था, जिसे बाद में "सॉफ्ट fork" कहा गया। यदि नेटवर्क की कंप्यूटिंग शक्ति के बहुमत द्वारा समर्थित हो तो अपग्रेड से चेन स्प्लिट नहीं होता है।
reviewed: true
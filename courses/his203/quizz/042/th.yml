question: ทำไมการอัปเกรด Pay to Script Hash จึงต้องการพลังแฮชของเครือข่ายถึง 55% เพื่อเปิดใช้งาน?
answer: เพื่อให้มัน "เข้ากันได้ย้อนหลัง" และไม่สร้างการแยกโซ่
wrong_answers:
  - เนื่องจากการกำกับดูแลโปรโตคอลขึ้นอยู่กับการลงคะแนนเสียงของนักขุด ("หนึ่งโปรเซสเซอร์ หนึ่งเสียง")
  - เพื่อไม่ให้ธุรกิจ mining ถูกกระจุกตัวอยู่ที่เดียว จากนั้นถูกครอบงำโดยกลุ่ม mining ไม่กี่กลุ่ม
  - เพราะหัวหน้าโครงการ Gavin Andresen ไม่ต้องการเป็น "เผด็จการที่ใจดี"
explanation: |
 นี่เป็นข้อจำกัดของกฎฉันทามติ ซึ่งต่อมาจะถูกเรียกว่า "soft fork" การอัปเกรดนี้จะไม่สร้างการแยกสายโซ่หากได้รับการสนับสนุนจากพลังการคำนวณส่วนใหญ่ของเครือข่าย
reviewed: true
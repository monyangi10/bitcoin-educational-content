question: Защо за активирането на надстройката Pay to Script Hash са необходими 55% от мощността на мрежата?
answer: За да е "обратно съвместим" и да не създава верижно разделяне
wrong_answers:
  - Тъй като управлението на протокола зависи от гласовете на миньорите ("един процесор - един глас")
  - За да не се централизира бизнесът с mining, доминиран тогава от няколко басейна mining
  - Защото ръководителят на проекта Гавин Андресен не искаше да бъде "доброжелателен диктатор"
explanation: |
 Това беше ограничение на правилата на консенсуса, което по-късно щеше да бъде наречено "мек fork". Надграждането не създава разцепване на веригата, ако е подкрепено от
 мнозинството от изчислителната мощност на мрежата.
reviewed: true
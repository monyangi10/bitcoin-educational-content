question: Почему для активации обновления Pay to Script Hash потребовалось 55% хэш-мощности сети?
answer: Чтобы обеспечить "обратную совместимость" и не создавать разветвление цепи
wrong_answers:
  - Поскольку управление протоколом зависит от голосов майнеров ("один процессор - один голос")
  - Чтобы не централизовать бизнес mining, в котором тогда доминировали несколько пулов mining
  - Потому что руководитель проекта Гэвин Андресен не хотел быть "благожелательным диктатором"
explanation: |
 Это было ограничение правил консенсуса, то, что позже назовут "мягким fork". Обновление не приводит к расколу цепи, если его поддерживает
 большинство вычислительных мощностей сети.
reviewed: true
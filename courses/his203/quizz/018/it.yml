 Free Talk Live è stato condotto da Ian Freeman e Mark Edge, che hanno scoperto Bitcoin nel dicembre 2010 e hanno incontrato Gavin Andresen nel febbraio 2011. Il 16 marzo 2011, metà
 della trasmissione è stata dedicata all'uso del Bitcoin su Silk Road, il che ha convinto Roger Ver a impegnarsi maggiormente sul Bitcoin.
reviewed: true
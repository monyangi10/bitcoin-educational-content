 Free Talk Live iliendeshwa na Ian Freeman na Mark Edge, ambao waligundua Bitcoin mnamo Desemba 2010 na kukutana na Gavin Andresen mnamo Februari 2011. Mnamo Machi 16, 2011, nusu ya kipindi hicho kilijikita katika matumizi ya Bitcoin kwenye Barabara ya Silk, jambo lililomshawishi Roger Ver kujihusisha zaidi na Bitcoin.

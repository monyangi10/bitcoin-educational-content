question: کدام برنامه رادیویی لیبرتارین در ایالات متحده یکی از اولین برنامه‌هایی بود که به وجود بازار سیلک رود اشاره کرد؟
answer: گفتگوی آزاد زنده
wrong_answers:
  - نمایش Bitcoin
  - همه چیز در نظر گرفته شد
  - اخبار شبانه اینفوارز
explanation: |
 Free Talk Live توسط ایان فریمن و مارک اج میزبانی می‌شد، که در دسامبر 2010 Bitcoin را کشف کردند و در فوریه 2011 با گوین آندرسن ملاقات کردند. در 16 مارس 2011، نیمی از برنامه به استفاده از Bitcoin در جاده ابریشم اختصاص یافت، که راجر ور را متقاعد کرد تا بیشتر با Bitcoin درگیر شود.
reviewed: true
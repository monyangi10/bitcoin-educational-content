question: Ni ikihe kiganiro co kuri radiyo c’abanyagihugu bo muri U.S. cari kimwe mu vya mbere vyavuze ko hariho isoko ry’inzira ya Silk Road?
answer: Ikiganiro c'ubuntu
wrong_answers:
  - Iyerekanwa rya Bitcoin
  - Ibintu vyose vyiyumviriwe
  - Amakuru y'intambara z'ijoro
explanation: |
 Free Talk Live yari yatunganijwe na Ian Freeman na Mark Edge, bavumbuye Bitcoin mu kwezi kwa kigarama 2010, bahura na Gavin Andresen mu kwezi kwa kabiri 2011. Ku wa 16 Ntwarante 2011, igice c’i 
 y'ikiganiro cari kijanye n'ugukoresha Bitcoin ku nzira ya Silk, ivyo vyatumye Roger Ver arushiriza kwifatanya na Bitcoin.
reviewed: true
question: Który libertariański program radiowy w USA jako jeden z pierwszych wspomniał o istnieniu rynku Jedwabnego Szlaku?
answer: Free Talk Live
wrong_answers:
  - Bitcoin Show
  - All Things Considered
  - Infowars Nightly News
explanation: |
 Free Talk Live był prowadzony przez Iana Freemana i Marka Edge'a, którzy odkryli Bitcoin w grudniu 2010 roku i spotkali Gavina Andresena w lutym 2011 roku. W dniu 16 marca 2011 r. połowa
 połowa programu była poświęcona wykorzystaniu Bitcoin na Silk Road, co przekonało Rogera Vera do większego zaangażowania się w Bitcoin.
reviewed: true
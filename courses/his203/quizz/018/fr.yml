question: Quelle émission de radio libertarienne aux États-Unis a été l'une des premières à évoquer l'existence de la place de marché Silk Road ?
answer: Free Talk Live
wrong_answers:
  - The Bitcoin Show
  - All Things Considered
  - Infowars Nightly News
explanation: |
 Free Talk Live était animée par Ian Freeman et Mark Edge, qui ont découvert Bitcoin en décembre 2010 et rencontré Gavin Andresen en février 2011. Le 16 mars 2011, la moitié de l'émission était consacrée à l'utilisation de Bitcoin sur Silk Road, ce qui a convaincu Roger Ver de s'investir davantage dans Bitcoin.
reviewed: false

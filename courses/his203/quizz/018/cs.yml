question: Který libertariánský rozhlasový pořad v USA jako jeden z prvních zmínil existenci tržiště Silk Road?
answer: Free Talk Live
wrong_answers:
  - Přehlídka Bitcoin
  - Vše, co bylo zváženo
  - Noční zprávy Infowars
explanation: |
 Pořad Free Talk Live moderovali Ian Freeman a Mark Edge, kteří v prosinci 2010 objevili Bitcoin a v únoru 2011 se seznámili s Gavinem Andresenem. Dne 16. března 2011 se polovina
 pořadu věnovala použití Bitcoin na Silk Road, což Rogera Vera přesvědčilo, aby se Bitcoin začal více věnovat.
reviewed: true
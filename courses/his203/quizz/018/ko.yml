question: 실크로드 마켓플레이스의 존재를 최초로 언급한 미국의 자유주의 라디오 쇼는 어느 것일까요?
answer: 무료 토크 라이브
wrong_answers:
  - Bitcoin 쇼
  - 모든 고려 사항
  - 인포워즈 야간 뉴스
explanation: |
 프리 토크 라이브는 2010년 12월에 Bitcoin을 발견하고 2011년 2월에 개빈 안드레센을 만난 이안 프리먼과 마크 엣지가 진행했습니다. 2011년 3월 16일, 쇼의 절반
 의 절반이 실크로드에서의 Bitcoin 활용에 관한 내용으로 진행되었으며, 이를 계기로 Roger Ver는 Bitcoin에 더 많은 관심을 가지게 되었습니다.
reviewed: true
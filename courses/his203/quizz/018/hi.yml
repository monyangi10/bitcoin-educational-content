question: अमेरिका में कौन सा उदारवादी रेडियो शो उन पहले कार्यक्रमों में से एक था जिसने सिल्क रोड बाजार के अस्तित्व का उल्लेख किया था?
answer: फ्री टॉक लाइव
wrong_answers:
  - Bitcoin शो
  - सब बातों पर विचार
  - इंफोवार्स नाइटली न्यूज़
explanation: |
 फ्री टॉक लाइव की मेजबानी इयान फ्रीमैन और मार्क एज ने की थी, जिन्होंने दिसंबर 2010 में Bitcoin की खोज की और फरवरी 2011 में गैविन एंड्रेसन से मुलाकात की। 16 मार्च 2011 को, शो का आधा हिस्सा सिल्क रोड पर Bitcoin के उपयोग को समर्पित था, जिसने रोजर वेर को Bitcoin में और अधिक शामिल होने के लिए प्रेरित किया।
reviewed: true
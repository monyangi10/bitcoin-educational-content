question: シルクロード市場の存在にいち早く言及した米国のリバタリアン系ラジオ番組は？
answer: フリートークライブ
wrong_answers:
  - Bitcoinショー
  - オール・シングス・コンサイドド
  - インフォウォーズ・ナイトリー・ニュース
explanation: |
 フリートークライブは、2010年12月にBitcoinを発見し、2011年2月にギャビン・アンドレセンと出会ったイアン・フリーマンとマーク・エッジが司会を務めた。2011年3月16日、番組の半分が
 番組の半分がSilk RoadでのBitcoinの使用について費やされ、Roger VerはBitcoinにもっと関わるよう説得された。
reviewed: true
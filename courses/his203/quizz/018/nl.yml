question: Welk libertair radioprogramma in de VS was een van de eersten die het bestaan van de marktplaats Silk Road vermeldde?
answer: Gratis live praten
wrong_answers:
  - De Bitcoin Show
  - Alles overwogen
  - Infowars nachtelijk nieuws
explanation: |
 Free Talk Live werd gehost door Ian Freeman en Mark Edge, die Bitcoin ontdekten in december 2010 en Gavin Andresen ontmoetten in februari 2011. Op 16 maart 2011 werd de helft
 van de show gewijd aan het gebruik van Bitcoin op Silk Road, wat Roger Ver overtuigde om meer betrokken te raken bij Bitcoin.
reviewed: true
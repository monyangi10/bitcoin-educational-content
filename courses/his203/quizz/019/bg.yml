question: На какво ниво падна цената на биткойна в края на мечия пазар, последвал големия балон от 2011 г.?
answer: 2 $
wrong_answers:
  - 0,01 $
  - 6 $
  - 17,5 $
explanation: |
 След като достигна най-високата си стойност от 32 USD през юни 2011 г., цената на биткойна спадна драстично до 6 USD в началото на август, след което продължи да спада и накрая достигна около 2 USD през
 Ноември 2011 г. Това представляваше спад от над 90% спрямо върховата стойност през юни.
reviewed: true
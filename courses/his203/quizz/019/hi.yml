question: 2011 के बड़े आर्थिक बुलबुले के बाद आए मंदी के दौर के अंत में बिटकॉइन की कीमत लगभग किस स्तर तक गिरी थी?
answer: 2 डॉलर
wrong_answers:
  - 0.01 डॉलर
  - 6 डॉलर
  - 17.5 डॉलर
explanation: |
 जून 2011 में $32 के उच्चतम स्तर पर पहुंचने के बाद, बिटकॉइन की कीमत अगस्त की शुरुआत में तेजी से गिरकर $6 हो गई, फिर गिरती रही और अंततः नवंबर 2011 में लगभग $2 तक पहुंच गई।
 यह जून के उच्चतम स्तर से 90% से अधिक की गिरावट थी।
reviewed: true
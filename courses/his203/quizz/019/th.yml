question: ราคาของบิทคอยน์ลดลงมาอยู่ที่ระดับประมาณเท่าใดในช่วงสิ้นสุดตลาดหมีที่ตามมาหลังจากฟองสบู่ใหญ่ในปี 2011?
answer: 2 $
wrong_answers:
  - 0,01 $
  - 6 $
  - 17,5 $
explanation: |
 หลังจากพุ่งสูงสุดที่ $32 ในเดือนมิถุนายน 2011 ราคาของบิตคอยน์ลดลงอย่างมากเหลือ $6 ในช่วงต้นเดือนสิงหาคม จากนั้นก็ลดลงต่อเนื่องจนถึงประมาณ $2 ในเดือนพฤศจิกายน 2011 ซึ่งแสดงถึงการลดลงมากกว่า 90% จากจุดสูงสุดในเดือนมิถุนายน
reviewed: true
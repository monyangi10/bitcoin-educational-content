question: Ni ku rugero rungana iki igiciro ca bitcoin caguyeko ku mpera y’isoko ry’idubu ryakurikiye igihuhusi kinini co mu 2011?
answer: 2 $
wrong_answers:
  - 0,01 $
  - 6 $
  - 17,5 $
explanation: |
 Inyuma y’aho igiciro ca bitcoin kigeze ku madolari 32 muri Ruheshi 2011, caragabanutse cane kija ku madolari 6 mu ntango z’ukwezi kwa Myandagaro, hanyuma kirabandanya kigabanuka, amaherezo kigera nko ku madolari 2 mu 2011.
 Ukwezi kwa 11 2011. Ivyo vyagereranya ugugabanuka kw’ibice birenga 90 kw’ijana ugereranije n’isonga ryo muri Ruheshi.
reviewed: true
question: قیمت بیت‌کوین در پایان بازار نزولی که پس از حباب بزرگ سال ۲۰۱۱ رخ داد، به حدود چه سطحی سقوط کرد؟
answer: ۲ $
wrong_answers:
  - ۰,۰۱ $
  - ۶ $
  - ۱۷,۵ $
explanation: |
 پس از رسیدن به اوج 32 دلار در ژوئن 2011، قیمت بیت‌کوین به شدت کاهش یافت و در اوایل آگوست به 6 دلار رسید، سپس به کاهش ادامه داد و در نهایت در نوامبر 2011 به حدود 2 دلار رسید. این کاهش بیش از 90 درصد از اوج ژوئن را نشان می‌دهد.
reviewed: true
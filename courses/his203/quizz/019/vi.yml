question: Giá Bitcoin đã giảm xuống mức nào vào cuối giai đoạn thị trường gấu sau bong bóng lớn năm 2011?
answer: 2 đô la
wrong_answers:
  - 0,01 đô la
  - 6 đô la
  - 17,5 đô la
explanation: |
 Sau khi đạt đỉnh 32 đô la vào tháng 6 năm 2011, giá bitcoin đã giảm mạnh xuống còn 6 đô la vào đầu tháng 8, sau đó tiếp tục giảm, cuối cùng xuống khoảng 2 đô la vào tháng 11 năm 2011. Điều này thể hiện mức giảm hơn 90% so với mức đỉnh tháng 6.
reviewed: true
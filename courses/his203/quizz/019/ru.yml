question: До какого уровня упала цена биткоина в конце медвежьего рынка, который последовал за большим пузырем 2011 года?
answer: 2 $
wrong_answers:
  - 0,01 $
  - 6 $
  - 17,5 $
explanation: |
 После пика в 32 доллара в июне 2011 года цена биткоина резко упала до 6 долларов в начале августа, затем продолжила падение и в итоге достигла около 2 долларов в
 Ноября 2011 года. Это более чем на 90 % ниже июньского пика.
reviewed: true
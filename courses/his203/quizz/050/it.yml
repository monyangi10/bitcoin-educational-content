question: Quale pseudonimo ha usato Ross Ulbricht dal febbraio 2012 come amministratore di Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - L'ombra di Harbringer
  - Il pirata a quarant'anni
explanation: |
 Ross Ulbricht ha scelto questo pseudonimo in riferimento al film del 1987 La principessa sposa. In questo film, il nome è una sorta di titolo che può essere passato da un pirata all'altro, consentendo di nascondere la sua vera identità e di "incutere la paura necessaria" ai suoi nemici
 all'altro, consentendo di nascondere la vera identità del portatore e di "incutere la paura necessaria" ai suoi nemici.
reviewed: true
question: راس اولبریکت از فوریه ۲۰۱۲ به عنوان مدیر جاده ابریشم از نام مستعار "Dread Pirate Roberts" استفاده کرد.
answer: درد پایرت رابرتس
wrong_answers:
  - آلتوید
  - سایه‌ی هاربینگر
  - دزد دریایی در چهل سالگی
explanation: |
 راس اولبریکت این نام مستعار را با اشاره به فیلم عروس شاهزاده در سال ۱۹۸۷ انتخاب کرد. در این فیلم، این نام نوعی عنوان است که می‌تواند از یک دزد دریایی به دزد دریایی دیگر منتقل شود و به حامل آن اجازه می‌دهد هویت واقعی خود را پنهان کند و "ترس لازم" را در دشمنانش ایجاد کند.
reviewed: true
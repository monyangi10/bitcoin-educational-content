question: Какъв псевдоним е използвал Рос Улбрихт от февруари 2012 г. като администратор на Silk Road?
answer: Страховитият пират Робъртс
wrong_answers:
  - Altoid
  - Сянката на Harbringer
  - Пират на четиридесет години
explanation: |
 Рос Улбрихт избира този псевдоним във връзка с филма "Принцесата булка" от 1987 г. В този филм името е вид титла, която може да се предава от един пират
 на друг, което позволява да се прикрие истинската самоличност на носителя и да се "внуши необходимият страх" на враговете му.
reviewed: true
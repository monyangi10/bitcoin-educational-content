question: Ross Ulbricht alitumia jina gani bandia kuanzia Februari 2012 kama msimamizi wa Silk Road?
answer: Roberts Mwoga wa Maharamia
wrong_answers:
  - Altoidi
  - Kivuli cha Harbringer
  - Maharamia Katika Arobaini
explanation: |
 Ross Ulbricht alichagua jina bandia hili akimaanisha filamu ya 1987 The Princess Bride. Katika filamu hii, jina hilo ni aina ya cheo ambacho kinaweza kupitishwa kutoka kwa maharamia mmoja hadi mwingine, na kuwezesha utambulisho halisi wa mwenye jina hilo kufichwa na "kuhamasisha hofu inayohitajika" kwa maadui zake.
reviewed: true
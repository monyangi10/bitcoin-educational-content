question: Ross Ulbricht ใช้นามแฝงว่า "Dread Pirate Roberts" ตั้งแต่เดือนกุมภาพันธ์ 2012 ในฐานะผู้ดูแลของ Silk Road
answer: เดรด ไพเรท โรเบิร์ตส์
wrong_answers:
  - อัลทอยด์
  - เงาแห่งฮาร์บริงเจอร์
  - โจรสลัดตอนอายุสี่สิบ
explanation: |
 Ross Ulbricht เลือกนามแฝงนี้โดยอ้างอิงถึงภาพยนตร์เรื่อง The Princess Bride ในปี 1987 ในภาพยนตร์เรื่องนี้ ชื่อนี้เป็นเหมือนตำแหน่งที่สามารถส่งต่อจากโจรสลัดคนหนึ่งไปยังอีกคนหนึ่งได้ ทำให้สามารถปกปิดตัวตนที่แท้จริงของผู้ถือครองและ "สร้างความกลัวที่จำเป็น" ให้กับศัตรูของเขา
reviewed: true
question: Welches Pseudonym benutzte Ross Ulbricht ab Februar 2012 als Administrator von Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - Schatten des Harbringer
  - Pirat mit vierzig Jahren
explanation: |
 Ross Ulbricht wählte dieses Pseudonym in Anlehnung an den Film Die Braut des Prinzen von 1987. In diesem Film ist der Name eine Art Titel, der von einem Piraten zum anderen weitergegeben werden kann
 weitergegeben werden kann, um die wahre Identität des Trägers zu verbergen und seinen Feinden "die nötige Angst einzujagen".
reviewed: true
question: Que pseudónimo utilizou Ross Ulbricht a partir de fevereiro de 2012 como administrador da Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoide
  - Sombra do Harbringer
  - Pirata aos quarenta
explanation: |
 Ross Ulbricht escolheu este pseudónimo em referência ao filme de 1987 "A Princesa Noiva". Neste filme, o nome é uma espécie de título que pode ser passado de um pirata
 para outro, permitindo esconder a verdadeira identidade do portador e "inspirar o medo necessário" nos seus inimigos.
reviewed: true
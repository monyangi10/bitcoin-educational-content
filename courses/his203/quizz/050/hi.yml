question: रॉस उलब्रिच ने फरवरी 2012 से सिल्क रोड के प्रशासक के रूप में किस छद्म नाम का प्रयोग किया?
answer: ड्रेड पाइरेट रॉबर्ट्स
wrong_answers:
  - अल्टॉइड
  - हार्ब्रिंगर की छाया
  - चालीस वर्ष की आयु में समुद्री डाकू
explanation: |
 रॉस उलब्रिच ने 1987 की फिल्म 'द प्रिंसेस ब्राइड' के संदर्भ में यह छद्म नाम चुना। इस फिल्म में, नाम एक प्रकार की उपाधि है जिसे एक समुद्री डाकू दूसरे समुद्री डाकू को दे सकता है,
 जिससे धारक की असली पहचान छिपी रहती है और उसके दुश्मनों में "आवश्यक भय" पैदा होता है।
reviewed: true
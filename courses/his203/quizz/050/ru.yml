question: Какой псевдоним использовал Росс Ульбрихт с февраля 2012 года в качестве администратора Silk Road?
answer: Ужасный пират Робертс
wrong_answers:
  - Altoid
  - Тень Харбрингера
  - Пират в сорок лет
explanation: |
 Росс Ульбрихт выбрал этот псевдоним в связи с фильмом 1987 года "Принцесса-невеста". В этом фильме имя - это своего рода титул, который может передаваться от одного пирата
 от одного пирата к другому, что позволяет скрывать настоящую личность носителя и "внушать необходимый страх" его врагам.
reviewed: true
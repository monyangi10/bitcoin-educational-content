question: 2012년 2월부터 실크로드 관리자로 활동한 로스 울브리히트는 어떤 가명을 사용했나요?
answer: 공포의 해적 로버츠
wrong_answers:
  - 알토이드
  - 해빙기의 그림자
  - 마흔의 해적
explanation: |
 로스 울브리히트는 1987년 영화 <공주 신부>와 관련하여 이 가명을 선택했습니다. 이 영화에서 이 이름은 한 해적에서 다른 해적에게 전달될 수 있는 일종의 칭호입니다
 에서 다른 해적에게 전달할 수 있는 일종의 칭호로, 소지자의 진짜 신분을 숨기고 적에게 "필요한 공포를 불러일으킬 수 있도록" 합니다.
reviewed: true
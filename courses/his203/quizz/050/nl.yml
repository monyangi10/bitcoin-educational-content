question: Welk pseudoniem gebruikte Ross Ulbricht vanaf februari 2012 als beheerder van Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - Schaduw van Harbringer
  - Piraat op veertig
explanation: |
 Ross Ulbricht koos dit pseudoniem als verwijzing naar de film The Princess Bride uit 1987. In deze film is de naam een soort titel die kan worden doorgegeven van de ene piraat aan de andere
 aan een andere, waardoor de echte identiteit van de drager verborgen kan blijven en "de nodige angst kan inboezemen" bij zijn vijanden.
reviewed: true
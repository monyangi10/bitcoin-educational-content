question: Ross Ulbricht đã sử dụng biệt danh nào từ tháng 2 năm 2012 khi quản trị trang Silk Road?
answer: Tên cướp biển đáng sợ Roberts
wrong_answers:
  - Altoid
  - Bóng tối của Kẻ báo hiệu
  - Cướp biển ở tuổi bốn mươi
explanation: |
 Ross Ulbricht đã chọn biệt danh này dựa trên bộ phim The Princess Bride năm 1987. Trong phim, cái tên này là một loại danh hiệu có thể truyền từ tên cướp biển này sang tên cướp biển khác, cho phép người mang nó che giấu danh tính thật và "gieo rắc nỗi sợ hãi cần thiết" cho kẻ thù của mình.
reviewed: true
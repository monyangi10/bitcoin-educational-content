question: Quel pseudonyme Ross Ulbricht a-t-il utilisé à partir de février 2012 en tant qu'administrateur de Silk Road ?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - Shadow Of Harbringer
  - Pirate At Forty
explanation: |
 Ross Ulbricht a choisi ce pseudonyme en référence au film The Princess Bride de 1987. Dans ce film, le nom est une sorte de titre transmissible d'un pirate à l'autre, permettant de masquer l'identité réelle du porteur et d'« inspirer la peur nécessaire » à ses ennemis.
reviewed: false

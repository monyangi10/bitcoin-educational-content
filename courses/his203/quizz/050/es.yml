question: ¿Qué seudónimo utilizó Ross Ulbricht desde febrero de 2012 como administrador de Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - La sombra de Harbringer
  - Pirata a los cuarenta
explanation: |
 Ross Ulbricht eligió este seudónimo en referencia a la película de 1987 La princesa prometida. En esta película, el nombre es una especie de título que puede pasar de un pirata a otro, lo que permite ocultar la verdadera identidad del portador e "inspirar el miedo necesario" a sus enemigos

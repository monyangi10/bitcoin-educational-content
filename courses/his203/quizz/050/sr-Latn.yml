question: Košnica
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - Senka Glasnika
  - Pirat sa četrdeset godina
explanation: |
 Ross Ulbricht je izabrao ovaj pseudonim u vezi sa filmom iz 1987. godine, Princeza nevesta. U ovom filmu, ime je vrsta titule koja može biti preneta sa jednog pirata na drugog, omogućavajući da se stvarni identitet nosioca sakrije i "ulije potreban strah" njegovim neprijateljima.
reviewed: true
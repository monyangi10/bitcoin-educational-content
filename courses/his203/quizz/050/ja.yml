question: ロス・ウルブリヒトが2012年2月からシルクロードの管理者として使用していたペンネームは？
answer: ドレッド海賊ロバーツ
wrong_answers:
  - アルトイド
  - シャドウ・オブ・ハーブリンガー
  - 40歳の海賊
explanation: |
 ロス・ウルブリヒトがこのペンネームを選んだのは、1987年の映画『プリンセス・ブライド』にちなんだものだ。この映画では、名前は海賊から海賊へと受け継がれる一種の称号である。
 この映画では、名前は海賊から海賊へと受け継がれる一種の称号であり、それによって持ち主の本当の正体を隠し、敵に「必要な恐怖を与える」ことができる。
reviewed: true
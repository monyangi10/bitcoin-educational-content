question: Nama samaran apa yang digunakan Ross Ulbricht sejak Februari 2012 sebagai administrator Silk Road?
answer: Dread Pirate Roberts
wrong_answers:
  - Altoid
  - Shadow Of Harbringer
  - Bajak Laut Di Empat Puluh
explanation: |
 Ross Ulbricht memilih nama samaran ini dengan mengacu pada film The Princess Bride pada tahun 1987. Dalam film ini, nama tersebut adalah semacam gelar yang dapat diberikan dari satu bajak laut ke bajak laut lainnya
 yang lain, memungkinkan identitas asli si pembawa nama disembunyikan dan "mengilhami rasa takut yang diperlukan" pada musuh-musuhnya.
reviewed: true
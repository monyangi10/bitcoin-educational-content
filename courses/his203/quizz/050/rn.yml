question: Ni izina ry’uruyeri irihe Ross Ulbricht yakoresheje kuva muri Ruhuhuma 2012 ari umuyobozi wa Silk Road?
answer: Ubwoba bw'umusuma w'amato Roberts
wrong_answers:
  - Altoyide
  - Igitutu ca Harbringer
  - Pirate ku mirongo ine
explanation: |
 Ross Ulbricht yahisemwo iryo zina ry’uruyeri mu kwerekeza kuri filime yo mu 1987 yitwa Umugeni w’Umwamikazi. Muri iyi filime, iryo zina ni ubwoko bw’izina ry’icubahiro rishobora guca ku musuma umwe .
 ku wundi, bikaba bishoboza akaranga nyakuri k’uwubitwara guhishwa no «gutera ubwoba bukenewe» mu bansi biwe.
reviewed: true
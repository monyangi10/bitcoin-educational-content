question: Na kom online mediju je objavljen članak Adriana Chena koji je skrenuo pažnju javnosti na Silk Road 1. juna 2011?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com je bio uticajan blog gde su brojni autori objavljivali ponekad kontroverzne članke. Bankrotirao je 2016. godine, nakon tužbe Hulka Hogana i Pitera Tila.
reviewed: true
question: W którym medium internetowym opublikowano artykuł Adriana Chena, który zwrócił uwagę opinii publicznej na Silk Road 1 czerwca 2011 r.?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com był wpływowym blogiem, na którym wielu autorów publikowało czasem kontrowersyjne artykuły. Zbankrutował w 2016 r. w następstwie pozwu wniesionego przez
 Hulka Hogana i Petera Thiela.
reviewed: true
question: Ni ku binyamakuru ibihe vyo kuri Internet vyasohoweko ingingo ya Adrian Chen yatumye abantu bose bamenya ivyerekeye Silk Road kw’igenekerezo rya 1 Ruheshi 2011?
answer: Gawker
wrong_answers:
  - Igikoresho
  - Akadomo
  - Amakuru y'abasuma
explanation: |
 Gawker.com yari urubuga rufise akosho aho abanditsi benshi basohora ingingo rimwe na rimwe zitera impaka. Yaciye igira igihombo mu 2016, inyuma y’aho iregwa n’umwaka w’2016. 
 Hulk Hogan na Petero Thiel.
reviewed: true
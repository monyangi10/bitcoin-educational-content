question: Di media online manakah artikel Adrian Chen dipublikasikan yang membawa Silk Road menjadi perhatian publik pada tanggal 1 Juni 2011?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com adalah blog yang berpengaruh di mana banyak penulis menerbitkan artikel yang terkadang kontroversial. Situs ini bangkrut pada tahun 2016, menyusul gugatan dari
 Hulk Hogan dan Peter Thiel.
reviewed: true
question: På vilket nätmedium publicerades Adrian Chens artikel som gjorde Silk Road känt för allmänheten den 1 juni 2011?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com var en inflytelserik blogg där en mängd olika författare publicerade ibland kontroversiella artiklar. Den gick i konkurs 2016, efter en stämning av
 Hulk Hogan och Peter Thiel.
reviewed: true
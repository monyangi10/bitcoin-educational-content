question: บทความของ Adrian Chen ที่ทำให้ Silk Road เป็นที่รู้จักในวงกว้างถูกเผยแพร่บนสื่อออนไลน์ใดในวันที่ 1 มิถุนายน 2011?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com เป็นบล็อกที่มีอิทธิพลซึ่งมีผู้เขียนจำนวนมากเผยแพร่บทความที่บางครั้งก็เป็นที่ถกเถียงกัน มันล้มละลายในปี 2016 หลังจากการฟ้องร้องโดย Hulk Hogan และ Peter Thiel
reviewed: true
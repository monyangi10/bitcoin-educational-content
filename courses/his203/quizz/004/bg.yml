question: В коя онлайн медия е публикувана статията на Адриан Чен, която привлича вниманието на обществеността към Silk Road на 1 юни 2011 г.?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com беше влиятелен блог, в който множество автори публикуваха понякога противоречиви статии. Той фалира през 2016 г. след съдебен иск от страна на
 Хълк Хоган и Питър Тийл.
reviewed: true
question: 2011 年 6 月 1 日，Adrian Chen 在哪个网络媒体上发表了文章，使丝绸之路引起公众关注？
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - 黑客新闻
explanation: |
 Gawker.com曾是一个颇具影响力的博客，众多作者在此发表了时有争议的文章。2016 年，在胡克-霍根（Hulk Hogan）和彼得-蒂尔（Peter Thiel）提起诉讼后，该网站破产。
 胡克-霍根（Hulk Hogan）和彼得-蒂尔（Peter Thiel）提起诉讼后，于 2016 年破产。
reviewed: true
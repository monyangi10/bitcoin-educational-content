question: Op welk online medium werd het artikel van Adrian Chen gepubliceerd dat Silk Road op 1 juni 2011 onder de aandacht bracht?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com was een invloedrijke blog waar een groot aantal auteurs soms controversiële artikelen publiceerde. Het ging failliet in 2016, na een rechtszaak door
 Hulk Hogan en Peter Thiel.
reviewed: true
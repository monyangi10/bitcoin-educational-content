question: В каком интернет-СМИ была опубликована статья Адриана Чена, которая привлекла внимание общественности к Silk Road 1 июня 2011 года?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com был влиятельным блогом, в котором множество авторов публиковали порой противоречивые статьи. Он обанкротился в 2016 году после судебного иска, поданного
 Халка Хогана и Питера Тиля.
reviewed: true
question: Bài viết của Adrian Chen, thu hút sự chú ý của công chúng về Con đường Tơ lụa vào ngày 1 tháng 6 năm 2011, đã được đăng tải trên trang mạng nào?
answer: Gawker
wrong_answers:
  - Gizmodo
  - Slashdot
  - Hackernews
explanation: |
 Gawker.com là một blog có sức ảnh hưởng lớn, nơi nhiều tác giả đăng tải những bài viết đôi khi gây tranh cãi. Blog này đã phá sản vào năm 2016, sau một vụ kiện do Hulk Hogan và Peter Thiel khởi xướng.
reviewed: true
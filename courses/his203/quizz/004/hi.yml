question: एड्रियान चेन का वह लेख, जिसने 1 जून, 2011 को सिल्क रोड को सार्वजनिक ध्यान में लाया, किस ऑनलाइन मीडिया पर प्रकाशित हुआ था?
answer: गॉकर
wrong_answers:
  - गिज़मोडो
  - Slashdot करने
  - हैकरन्यूज़
explanation: |
 Gawker.com एक प्रभावशाली ब्लॉग था जहाँ कई लेखकों ने कभी-कभी विवादास्पद लेख प्रकाशित किए। हल्क होगन और पीटर थील द्वारा दायर मुकदमे के बाद यह 2016 में दिवालिया हो गया।
reviewed: true
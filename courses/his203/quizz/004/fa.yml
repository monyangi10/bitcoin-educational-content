question: مقاله آدریان چن که جاده ابریشم را در تاریخ ۱ ژوئن ۲۰۱۱ به توجه عمومی رساند، در کدام رسانه آنلاین منتشر شد؟
answer: گاكر
wrong_answers:
  - گیزمودو
  - اسلش‌دات
  - هکرنیوز
explanation: |
 Gawker.com یک وبلاگ تأثیرگذار بود که در آن نویسندگان متعددی مقالاتی گاه جنجالی منتشر می‌کردند. این وبلاگ در سال ۲۰۱۶ پس از یک دعوی حقوقی توسط هالک هوگان و پیتر تیل ورشکسته شد.
reviewed: true
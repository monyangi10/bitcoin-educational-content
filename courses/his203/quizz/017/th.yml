question: ข้อคัดค้านหลักที่นักเสรีนิยมชาวอเมริกันยกขึ้นต่อต้าน Bitcoin โดยอ้างถึงทฤษฎีการถดถอยของ Mises คืออะไร?
answer: มันไม่มีมูลค่าในตัวเองและไม่ได้รับการสนับสนุนจากสิ่งที่เป็นรูปธรรมใด ๆ
wrong_answers:
  - มันมีเงินเฟ้อ โดยมีอัตราการออกเงินที่ 40% ต่อปีในปี 2011
  - มันไม่ได้ถูกใช้เป็นหน่วยของบัญชี ซึ่งเป็นคุณสมบัติที่สำคัญของเงิน
  - มันสร้างการกระจายความมั่งคั่งที่ไม่เท่าเทียมกันอย่างลึกซึ้ง
explanation: |
 นักเสรีนิยมชาวอเมริกันบางคนที่ยึดติดกับสำนักออสเตรียปฏิเสธ Bitcoin เพราะมันขัดแย้งกับ (ในมุมมองของพวกเขา) ทฤษฎีการถดถอยของลุดวิก ฟอน มีเซส ซึ่งระบุว่าสินค้าต้องมีมูลค่าการใช้ที่ไม่ใช่เงินอย่างเป็นรูปธรรมก่อนที่จะกลายเป็นสกุลเงินได้ สิ่งนี้เป็นจริงโดยเฉพาะกับปีเตอร์ ชิฟฟ์ ลูกชายของนักรณรงค์ต่อต้านภาษี เออร์วิน ชิฟฟ์ และผู้สนับสนุนมาตรฐานทองคำอย่างแข็งขัน
reviewed: true
question: 美國自由主義者引用米塞斯的回歸定理，對 Bitcoin 提出的主要反對意見是什麼？
answer: 它沒有內在價值，也沒有任何具體的支持。
wrong_answers:
  - 它有貨幣通貨膨脹，2011 年的發行率為每年 40%。
  - 它不被用作計量單位，這是貨幣的基本特質。
  - 它造成了財富分配的極度不平等
explanation: |
 一些依附於奧地利學派的美國自由主義者拒絕 Bitcoin，因為這與路德維希‧馮‧米塞斯 (Ludwig von Mises) 的倒退定理 (在他們看來) 相矛盾、
 該定理指出，物品必須先具有客觀的非貨幣使用價值，才能成為貨幣。彼得‧席夫 (Peter Schiff) 的看法尤其如此。
 他是反稅運動家 Irwin Schiff 的兒子，也是金本位的堅定支持者。
reviewed: true
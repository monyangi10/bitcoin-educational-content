question: 미국의 자유주의자들이 미제스의 회귀 정리를 인용하며 Bitcoin에 대해 제기한 주요 반론은 무엇인가요?
answer: 내재적 가치도 없었고 구체적인 근거도 없었습니다
wrong_answers:
  - 2011년에는 연간 40%의 발행률로 화폐 인플레이션이 발생했습니다
  - 화폐의 필수 단위인 계좌 단위로 사용되지 않았습니다
  - 이는 매우 불평등한 부의 분배를 초래했습니다
explanation: |
 오스트리아 학파에 속한 일부 미국 자유주의자들은 Bitcoin이 루드비히 폰 미제스의 회귀 정리와 모순된다는 이유로 이를 거부했습니다,
 즉, 재화가 화폐가 되기 위해서는 객관적인 비화폐적 사용 가치가 있어야 한다는 것입니다. 이는 특히 반세금 운동가인 어윈 쉬프의 아들인
 반세금 운동가이자 금본위제의 확고한 지지자인 피터 쉬프에게 특히 그러했습니다.
reviewed: true
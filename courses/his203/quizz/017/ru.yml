question: Какое основное возражение выдвигали американские либертарианцы против Bitcoin, ссылаясь на теорему регрессии Мизеса?
answer: Он не имел внутренней ценности и не был подкреплен ничем конкретным
wrong_answers:
  - В стране наблюдалась монетарная инфляция, уровень которой в 2011 году составил 40% в год
  - Он не использовался в качестве счетной единицы, что было неотъемлемым качеством денег
  - Она привела к глубокому неравенству в распределении богатства
explanation: |
 Некоторые американские либертарианцы, принадлежащие к австрийской школе, отвергли Bitcoin, поскольку она противоречила (по их мнению) теореме регрессии Людвига фон Мизеса,
 которая гласит, что товар должен иметь объективную неденежную потребительскую стоимость, прежде чем он станет валютой. Особенно это касалось Питера Шиффа, сына
 ирвина Шиффа, сына антиналогового активиста и убежденного сторонника золотого стандарта.
reviewed: true
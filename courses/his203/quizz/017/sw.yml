question: Ni pingamizi gani kuu ambalo wanaharakati wa uhuru wa Marekani walitoa dhidi ya Bitcoin, wakinukuu nadharia ya urejeshaji ya Mises?
answer: Haikuwa na thamani yoyote ya ndani na haikuungwa mkono na kitu chochote halisi
wrong_answers:
  - Ilikuwa na mfumuko wa bei wa fedha, ikiwa na kiwango cha utoaji cha 40% kwa mwaka mwaka wa 2011
  - Haikutumika kama kitengo cha akaunti, ubora muhimu wa pesa
  - Ilisababisha mgawanyo usio sawa wa utajiri
explanation: |
 Baadhi ya wanaharakati wa uhuru wa Marekani, waliojiunga na shule ya Austria, walikataa Bitcoin kwa sababu ilipingana (kwa maoni yao) na nadharia ya urejelezaji ya Ludwig von Mises, ambayo inasema kwamba bidhaa lazima iwe na thamani isiyo ya kifedha kabla ya kuwa sarafu. Hii ilikuwa kweli hasa kwa Peter Schiff, mwana wa mwanaharakati wa kupinga kodi Irwin Schiff na mfuasi mkubwa wa kiwango cha dhahabu.
reviewed: true
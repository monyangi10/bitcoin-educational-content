question: मीसेस के प्रतिगमन प्रमेय का हवाला देते हुए, अमेरिकी स्वतंत्रतावादियों ने Bitcoin के विरुद्ध मुख्य रूप से क्या आपत्ति उठाई थी?
answer: इसका कोई आंतरिक मूल्य नहीं था और यह किसी ठोस आधार से समर्थित नहीं था।
wrong_answers:
  - इसमें मौद्रिक मुद्रास्फीति थी, और 2011 में इसकी निर्गम दर 40% प्रति वर्ष थी।
  - इसका उपयोग लेखा इकाई के रूप में नहीं किया गया था, जो मुद्रा का एक आवश्यक गुण है।
  - इससे धन का अत्यधिक असमान वितरण हुआ।
explanation: |
 ऑस्ट्रियाई विचारधारा से जुड़े कुछ अमेरिकी स्वतंत्रतावादियों ने स्वर्ण-प्रथम (Bitcoin) को अस्वीकार कर दिया क्योंकि यह (उनके विचार में) लुडविग वॉन मिसेस के प्रतिगमन प्रमेय का खंडन करता था,
 जिसमें कहा गया है कि किसी वस्तु का मुद्रा बनने से पहले उसका एक वस्तुनिष्ठ गैर-मौद्रिक उपयोग मूल्य होना आवश्यक है। यह बात विशेष रूप से पीटर शिफ के संदर्भ में सच थी, जो कर-विरोधी प्रचारक इरविन शिफ के पुत्र और स्वर्ण मानक के कट्टर समर्थक थे।
reviewed: true
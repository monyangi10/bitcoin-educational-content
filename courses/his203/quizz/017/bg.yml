question: Кое беше основното възражение, което американските либертарианци повдигнаха срещу Bitcoin, позовавайки се на регресионната теорема на Мизес?
answer: Тя нямаше вътрешна стойност и не беше подкрепена с нищо конкретно
wrong_answers:
  - Имаше парична инфлация, като през 2011 г. темпът на емитиране беше 40% годишно
  - Не се използва като разчетна единица, което е основно качество на парите
  - Създаде дълбоко неравномерно разпределение на богатството
explanation: |
 Някои американски либертарианци, привърженици на австрийската школа, отхвърлиха Bitcoin, тъй като според тях тя противоречи на теоремата за регресията на Лудвиг фон Мизес,
 която гласи, че една стока трябва да има обективна непарична потребителна стойност, преди да се превърне във валута. Това се отнася особено за Питър Шиф, син на
 който е твърд привърженик на златния стандарт, син на бореца срещу данъците Ървин Шиф.
reviewed: true
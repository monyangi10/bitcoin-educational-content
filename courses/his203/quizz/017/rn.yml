question: Ni igiki ca mbere abaharanira umwidegemvyo bo muri Amerika bavyura ku bijanye na Bitcoin, bavuga ivy’ugusubira inyuma kwa Mises?
answer: Nta gaciro k’imbere ryari rifise kandi nta kintu nyaco ryari rishigikiwe 
wrong_answers:
  - Yari ifise inflation y’amahera, n’igipimo c’isohoka ca 40% ku mwaka mu 2011
  - Ntiyakoreshwa nk’igice c’amahera, uburyo nyamukuru bw’amahera 
  - Yatumye haba ugusangira ubutunzi mu buryo butaringaniye cane 
explanation: |
 Bamwe mu bakunda umwidegemvyo w’Abanyamerika, bafatanye n’ishure ry’i Otirishiya, banse Bitcoin kubera ko yavuguruza (mu vyiyumviro vyabo) ivyiyumviro vya Ludwig von Mises vy’ugusubira inyuma, . 
 ivuga ko ikintu gitegerezwa kuba gifise agaciro k’ikoreshwa katari ukw’amahera imbere y’uko gishobora kuba amahera. Ivyo vyari vyifashe canecane kuri Petero Schiff, umuhungu wa 1914. 
 umunyagihugu arwanya imisoro Irwin Schiff akaba n’umushigikiye cane ingingo ngenderwako y’inzahabu.
reviewed: true
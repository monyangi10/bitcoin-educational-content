question: 美国自由主义者引用米塞斯的回归定理对《全球战略-0》提出的主要反对意见是什么？
answer: 它没有内在价值，也没有任何具体的支持
wrong_answers:
  - 2011 年，货币通胀率为每年 40%。
  - 它不被用作记账单位，这是货币的一个基本特征
  - 它造成了财富分配的极度不平等
explanation: |
 一些属于奥地利学派的美国自由主义者拒绝接受 Bitcoin，因为它（在他们看来）与路德维希-冯-米塞斯的回归定理相矛盾、
 该定理指出，一种商品在成为货币之前必须具有客观的非货币使用价值。反税运动者欧文-希夫（Irwin Schiff）之子彼得-希夫（Peter Schiff）尤其如此。
 彼得-希夫是反税收运动家欧文-希夫（Irwin Schiff）的儿子，也是金本位制的坚定支持者。
reviewed: true
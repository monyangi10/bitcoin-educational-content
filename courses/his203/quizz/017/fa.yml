question: اعتراض اصلی که لیبرترین‌های آمریکایی علیه Bitcoin مطرح کردند، با استناد به قضیه رگرسیون میزس، چه بود؟
answer: این هیچ ارزش ذاتی نداشت و توسط هیچ چیز ملموسی پشتیبانی نمی‌شد.
wrong_answers:
  - این دارای تورم پولی بود، با نرخ انتشار ۴۰٪ در سال ۲۰۱۱
  - به عنوان یک واحد حساب، که یک ویژگی اساسی پول است، استفاده نمی‌شد.
  - این باعث ایجاد توزیع نابرابر عمیق ثروت شد
explanation: |
 برخی از لیبرتارین‌های آمریکایی که به مکتب اتریشی وابسته‌اند، Bitcoin را رد کردند زیرا (به نظر آن‌ها) با قضیه بازگشت لودویگ فون میزس در تضاد بود، 
 که بیان می‌کند یک کالا باید قبل از تبدیل شدن به ارز، دارای ارزش استفاده غیرپولی عینی باشد. این موضوع به‌ویژه در مورد پیتر شیف، پسر 
 مبارز ضد مالیات اروین شیف و حامی سرسخت استاندارد طلا، صادق بود.
reviewed: true
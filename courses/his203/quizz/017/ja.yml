question: アメリカの自由主義者たちが、ミーゼスの回帰定理を引き合いに出してBitcoinに反対した主な理由は何だったのか？
answer: 本質的な価値はなく、具体的な裏付けもない。
wrong_answers:
  - 2011年には年率40％の金融インフレが発生した。
  - 貨幣の本質的な性質である勘定単位として使われることはなかった。
  - それは富の深刻な不平等分配を生み出した。
explanation: |
 オーストリアの学派に属するアメリカの自由主義者たちは、Bitcoinがルートヴィヒ・フォン・ミーゼスの回帰定理に反するとして、これを否定した、
 というのも、Bitcoinがルードヴィヒ・フォン・ミーゼスの回帰定理に反するからである。特に、反税金運動家アーウィン・シフの息子であるピーター・シフがそうであった。
 金本位制の支持者であった。
reviewed: true
question: Welches Ereignis veranlasste Satoshi Nakamoto, sich im Dezember 2010 aus dem Rampenlicht zurückzuziehen?
answer: Veröffentlichung eines PC World-Artikels, in dem WikiLeaks aufgefordert wird, Bitcoin zu verwenden
wrong_answers:
  - Ross Ulbricht startet die Plattform Silk Road
  - Der von In-Q-Tel, dem Investmentfonds der CIA, hergestellte Kontakt
  - Der spektakuläre Anstieg des Preises von BTC von 0,20 $ auf 32 $ in nur wenigen Monaten
explanation: |
 Satoshi äußerte sich im Forum von Bitcoin negativ zu dieser Veröffentlichung und befürchtete, dass sie die Aufmerksamkeit der staatlichen Behörden auf sich ziehen würde. Der Silk Road-Marktplatz
 wurde im Januar 2011 eröffnet, der Kontakt zwischen In-Q-Tel und Gavin Andresen fand im April statt, und der Preisanstieg erreichte im Juni mit 32 Dollar seinen Höhepunkt.
reviewed: true
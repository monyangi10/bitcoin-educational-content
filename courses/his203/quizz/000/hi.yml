question: दिसंबर 2010 में किस घटना के कारण Satoshi Nakamoto अचानक सुर्खियों से गायब हो गया?
answer: पीसी वर्ल्ड में प्रकाशित एक लेख में विकीलीक्स को Bitcoin का उपयोग करने के लिए आमंत्रित किया गया था।
wrong_answers:
  - रॉस उलब्रिच्ट ने सिल्क रोड प्लेटफॉर्म लॉन्च किया
  - सीआईए के निवेश कोष इन-क्यू-टेल द्वारा स्थापित संपर्क
  - कुछ ही महीनों में BTC की कीमत में $0.20 से बढ़कर $32 तक की अभूतपूर्व वृद्धि हुई।
explanation: |
 Satoshi ने Bitcoin फोरम पर इस प्रकाशन पर नकारात्मक टिप्पणी की, क्योंकि उन्हें आशंका थी कि इससे सरकारी अधिकारियों का ध्यान आकर्षित हो सकता है। सिल्क रोड मार्केटप्लेस
 जनवरी 2011 में लॉन्च किया गया था, इन-क्यू-टेल और गैविन एंड्रेसन के बीच अप्रैल में संपर्क हुआ और जून में कीमत में बढ़ोतरी $32 के उच्चतम स्तर पर पहुंच गई।
reviewed: true
question: چه رویدادی باعث شد Satoshi Nakamoto در دسامبر 2010 از کانون توجه خارج شود؟
answer: انتشار مقاله‌ای در PC World که از ویکی‌لیکس دعوت می‌کند تا از Bitcoin استفاده کند
wrong_answers:
  - راس اولبریکت پلتفرم جاده ابریشم را راه‌اندازی می‌کند
  - تماس برقرار شده توسط In-Q-Tel، صندوق سرمایه‌گذاری CIA
  - افزایش چشمگیر قیمت BTC از $0.20 به $32 تنها در چند ماه
explanation: |
 Satoshi در انجمن Bitcoin به طور منفی درباره این انتشار نظر داد و از اینکه ممکن است توجه مقامات دولتی را جلب کند، ابراز نگرانی کرد. بازار سیلک رود در ژانویه 2011 راه‌اندازی شد، تماس بین In-Q-Tel و گوین آندرسن در آوریل صورت گرفت و افزایش قیمت در ژوئن به اوج خود یعنی 32 دلار رسید.
reviewed: true
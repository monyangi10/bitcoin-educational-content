question: เหตุการณ์ใดที่ทำให้ Satoshi Nakamoto ถอนตัวจากการเป็นจุดสนใจในเดือนธันวาคม 2010?
answer: การตีพิมพ์บทความของ PC World เชิญชวน WikiLeaks ให้ใช้ Bitcoin
wrong_answers:
  - Ross Ulbricht เปิดตัวแพลตฟอร์ม Silk Road
  - การติดต่อที่จัดตั้งขึ้นโดย In-Q-Tel, กองทุนการลงทุนของ CIA
  - การเพิ่มขึ้นอย่างน่าทึ่งของราคาของ BTC จาก $0.20 เป็น $32 ในเวลาเพียงไม่กี่เดือน
explanation: |
 Satoshi แสดงความคิดเห็นในเชิงลบเกี่ยวกับสิ่งพิมพ์นี้ในฟอรัม Bitcoin โดยกลัวว่าจะดึงดูดความสนใจจากเจ้าหน้าที่รัฐ ตลาด Silk Road เปิดตัวในเดือนมกราคม 2011 การติดต่อระหว่าง In-Q-Tel และ Gavin Andresen เกิดขึ้นในเดือนเมษายน และการขึ้นราคาถึงจุดสูงสุดที่ $32 ในเดือนมิถุนายน
reviewed: true
question: Какое событие побудило Satoshi Nakamoto уйти из поля зрения в декабре 2010 года?
answer: Публикация статьи PC World с предложением WikiLeaks использовать Bitcoin
wrong_answers:
  - Росс Ульбрихт запускает платформу "Шелковый путь
  - Контакт, установленный In-Q-Tel, инвестиционным фондом ЦРУ
  - Впечатляющий рост цены BTC с $0,20 до $32 всего за несколько месяцев
explanation: |
 Satoshi негативно отозвался об этой публикации на форуме Bitcoin, опасаясь, что она привлечет внимание государственных органов. Торговая площадка "Шелковый путь
 была запущена в январе 2011 года, контакт между In-Q-Tel и Гэвином Андресеном состоялся в апреле, а пик роста цен - 32 доллара - пришелся на июнь.

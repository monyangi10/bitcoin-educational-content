question: Кое събитие накара Satoshi Nakamoto да се оттегли от светлината на прожекторите през декември 2010 г.?
answer: Публикуване на статия в PC World, която приканва WikiLeaks да използва Bitcoin
wrong_answers:
  - Рос Улбрихт стартира платформата Silk Road
  - Контактът, установен от In-Q-Tel, инвестиционния фонд на ЦРУ
  - Грандиозното покачване на цената на BTC от 0,20 долара до 32 долара само за няколко месеца
explanation: |
 Satoshi коментира негативно тази публикация във форума на Bitcoin, опасявайки се, че тя ще привлече вниманието на държавните органи. Пазарът на Пътя на коприната
 е стартирана през януари 2011 г., контактът между In-Q-Tel и Гавин Андресен се осъществява през април, а пикът на цените е достигнат през юни - 32 USD.
reviewed: true
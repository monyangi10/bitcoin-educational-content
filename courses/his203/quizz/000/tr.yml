explanation: |
 Satoshi, devlet yetkililerinin dikkatini çekeceği endişesiyle Bitcoin forumunda bu yayın hakkında olumsuz yorumda bulunmuştur. İpek Yolu pazar yeri
 ocak 2011'de başlatıldı, In-Q-Tel ve Gavin Andresen arasındaki temas Nisan ayında gerçekleşti ve fiyat artışı Haziran ayında 32 $'a ulaştı.

question: Hangi olay Satoshi Nakamoto'ın Aralık 2010'da spot ışıklarından çekilmesine neden oldu?
answer: WikiLeaks'i Bitcoin'i kullanmaya davet eden bir PC World makalesinin yayınlanması
wrong_answers:

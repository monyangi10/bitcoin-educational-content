question: 2010年12月、Satoshi Nakamotoにスポットライトが当たらなくなったきっかけは何だったのか？
answer: ウィキリークスにBitcoinの利用を呼びかけるPCワールドの記事掲載
wrong_answers:
  - ロス・ウルブリヒト、シルクロード・プラットフォームを立ち上げる
  - CIAの投資ファンド、In-Q-Telが設立した連絡先
  - BTCの価格がわずか数ヶ月の間に0.20ドルから32ドルへと華々しく上昇したこと
explanation: |
 SatoshiはBitcoinのフォーラムで、この出版物が国家当局の注意を引くことを恐れ、否定的なコメントをした。シルクロード・マーケットプレイス
 は2011年1月に開始され、In-Q-Telとギャビン・アンドレセンとの接触は4月に行われ、価格高騰のピークは6月の32ドルであった。
reviewed: true
question: 19 जून को माउंट गोक्स के हैक होने का कारण क्या था?
answer: पासवर्ड डेटाबेस तक पहुंच, जिसे MD5 हैश किया गया था, लेकिन सॉल्ट का उपयोग नहीं किया गया था।
wrong_answers:
  - जेड मैककैलेब ने प्लेटफॉर्म पर अपने निजी खाते तक पहुंचने के लिए पासवर्ड लीक कर दिया।
  - बिजली गिरने से एक समुद्री लुटेरा अपनी जमा पूंजी से अधिक बिटकॉइन निकाल सका।
  - खातों से पैसे निकालने के लिए निकासी अनुरोधों में XML का उपयोग किया जाता है।
explanation: |
 इस लीक की बदौलत हैकर कमजोर पासवर्ड (छोटे या आसानी से अनुमान लगाने योग्य) वाले खातों तक पहुंच गया। विशेष रूप से, उसने इसी तरह जेड मैककैलेब के खाते तक पहुंच बनाई।
 उसने बिटकॉइन की कीमत कम करने के लिए उन्हें बेच दिया, ताकि वह अधिकतम बिटकॉइन निकाल सके (दैनिक निकासी सीमा $1,000 थी)।
reviewed: true
explanation: |
 Wyciek ten umożliwił hakerowi dostęp do kont ze słabymi hasłami (krótkimi lub łatwymi do odgadnięcia). W szczególności uzyskał w ten sposób dostęp do konta Jeda McCaleba. On
 sprzedał bitcoiny, aby obniżyć ich cenę i wypłacić maksymalną ich ilość (dzienny limit wypłat wynosił 1000 USD).
reviewed: true
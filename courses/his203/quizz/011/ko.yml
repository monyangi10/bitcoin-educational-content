question: 6월 19일 마운트곡스가 해킹당한 원인은 무엇인가요?
answer: MD5로 해시되었지만 솔트 처리되지 않은 비밀번호 데이터베이스에 액세스합니다
wrong_answers:
  - 플랫폼에서 개인 계정에 액세스하기 위한 비밀번호를 유출한 Jed McCaleb
  - 번개 충돌로 해적은 자신이 가진 것보다 더 많은 비트코인을 인출할 수 있었습니다
  - 출금 요청에 XML을 삽입하여 계정 탈취 방지
explanation: |
 이 유출로 해커는 짧거나 추측하기 쉬운 취약한 비밀번호를 사용하는 계정에 액세스할 수 있었습니다. 특히, 해커는 이러한 방식으로 Jed McCaleb의 계정에 액세스했습니다. 그는
 비트코인을 매도하여 가격을 낮추고 최대 비트코인(일일 인출 한도는 1,000달러)을 인출했습니다.

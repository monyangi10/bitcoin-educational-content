explanation: |
 Bu sızıntı, bilgisayar korsanının zayıf şifreli (kısa veya tahmin edilmesi kolay) hesaplara erişmesini sağladı. Özellikle Jed McCaleb'in hesabına bu şekilde erişmiştir. O

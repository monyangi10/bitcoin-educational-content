question: Какво доведе до хакването на Mt. Gox на 19 юни?
answer: Достъп до базата данни с пароли, които са хеширани с MD5, но не са осолени
wrong_answers:
  - Джед Маккейлъб разкрива паролата за достъп до личния си акаунт в платформата
  - Срив на мълния, който позволява на пирата да изтегли повече биткойни, отколкото е имал
  - Инжектиране на XML в заявките за теглене с цел източване на сметки
explanation: |
 Това изтичане е позволило на хакера да получи достъп до акаунти със слаби пароли (кратки или лесни за отгатване). По-специално, той е получил достъп до акаунта на Джед Маккалеб по този начин. Той
 продал биткойни, за да понижи цената им, така че да изтегли максимален брой биткойни (дневният лимит за теглене е бил 1000 USD).
reviewed: true
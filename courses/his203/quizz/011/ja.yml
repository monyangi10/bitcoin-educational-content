question: Mt.Goxが6月19日にハッキングされた原因は？
answer: MD5でハッシュ化されたパスワード・データベースへのアクセス。
wrong_answers:
  - ジェド・マッカレブ、プラットフォーム上の個人アカウントにアクセスするためのパスワードを流出させる
  - ライトニングクラッシュにより、海賊は持っていたビットコインよりも多くのビットコインを引き出すことができた。
  - 出金依頼にXMLインジェクションを使用し、口座を吸い上げる
explanation: |
 この流出により、ハッカーはパスワードが弱い（短い、または推測しやすい）アカウントにアクセスできるようになった。特に、彼はこの方法でジェド・マッケイレブのアカウントにアクセスした。彼は
 ビットコインを売って価格を下げ、最大限のビットコインを引き出した（1日の引き出し限度額は1,000ドル）。
reviewed: true
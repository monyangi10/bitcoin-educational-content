question: Что стало причиной взлома Mt. Gox 19 июня?
answer: Доступ к базе данных паролей, которые были хэшированы с помощью MD5, но не соленые
wrong_answers:
  - Джед Маккалеб слил пароль для доступа к своему личному аккаунту на платформе
  - Авария молнии, которая позволила пирату вывести больше биткоинов, чем у него было
  - XML-инъекции в заявках на вывод средств для выкачивания денег со счетов
explanation: |
 Эта утечка позволила хакеру получить доступ к аккаунтам со слабыми паролями (короткими или легко угадываемыми). В частности, таким образом он получил доступ к учетной записи Джеда Маккалеба. Он
 продал биткоины, чтобы снизить их цену и снять максимальное количество биткоинов (ежедневный лимит снятия составлял 1000 долларов).
reviewed: true
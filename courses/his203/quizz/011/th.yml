question: อะไรทำให้ Mt. Gox ถูกแฮ็กเมื่อวันที่ 19 มิถุนายน?
answer: การเข้าถึงฐานข้อมูลรหัสผ่าน ซึ่งถูกแฮชด้วย MD5 แต่ไม่ได้ใส่เกลือ
wrong_answers:
  - Jed McCaleb เปิดเผยรหัสผ่านเพื่อเข้าถึงบัญชีส่วนตัวของเขาบนแพลตฟอร์ม
  - ฟ้าผ่าครั้งหนึ่ง ซึ่งทำให้โจรสลัดสามารถถอนบิตคอยน์ได้มากกว่าที่เขามี
  - การฉีด XML ในคำขอถอนเงินเพื่อดูดบัญชีออก
explanation: |
 การรั่วไหลนี้ทำให้แฮ็กเกอร์สามารถเข้าถึงบัญชีที่มีรหัสผ่านที่อ่อนแอ (สั้นหรือเดาง่าย) โดยเฉพาะอย่างยิ่ง เขาเข้าถึงบัญชีของ Jed McCaleb ในลักษณะนี้ เขาขายบิตคอยน์เพื่อกดราคาลง เพื่อที่จะถอนบิตคอยน์ให้ได้มากที่สุด (ขีดจำกัดการถอนรายวันคือ $1,000)
reviewed: true
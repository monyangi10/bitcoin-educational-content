question: 是什麼導致 Mt. Gox 在 6 月 19 日遭到駭客入侵？
answer: 存取密碼資料庫，該資料庫已使用 MD5 散列，但未經過鹽淬處理
wrong_answers:
  - Jed McCaleb 洩露了存取平台上個人帳戶的密碼
  - 閃電崩潰，讓盜版者提取了比他更多的比特幣
  - 在提款請求中注入 XML 以抽走帳戶的資金
explanation: |
 這次洩漏讓駭客得以存取密碼較弱（較短或容易猜到）的帳戶。尤其是，他以這種方式存取了 Jed McCaleb 的帳戶。他
 賣出比特幣以壓低價格，從而提取最大數量的比特幣（每日提取上限為 1000 美元）。
reviewed: true
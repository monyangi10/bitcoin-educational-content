question: 是什么导致了 Mt.Gox 在 6 月 19 日遭到黑客攻击？
answer: 访问使用 MD5 散列但未加盐的密码数据库
wrong_answers:
  - Jed McCaleb 泄露了他在该平台上访问个人账户的密码
  - 闪电崩盘，让海盗提取了比他更多的比特币
  - 在提款申请中注入 XML 以抽走账户资金
explanation: |
 这次泄密使黑客能够访问密码较弱（较短或容易猜到）的账户。特别是，他以这种方式访问了 Jed McCaleb 的账户。他
 卖出比特币以压低价格，从而提取最大数量的比特币（每日提取限额为 1000 美元）。
reviewed: true
question: چه چیزی باعث شد Mt. Gox در ۱۹ ژوئن هک شود؟
answer: دسترسی به پایگاه داده رمز عبور، که با MD5 هش شده بود، اما نمک‌گذاری نشده بود
wrong_answers:
  - جد مک‌کالب رمز عبور دسترسی به حساب شخصی خود در پلتفرم را فاش کرد.
  - یک سقوط رعد و برق که به دزد دریایی اجازه داد بیت‌کوین بیشتری از آنچه داشت برداشت کند
  - تزریق XML در درخواست‌های برداشت برای تخلیه حساب‌ها
explanation: |
 این نشت به هکر اجازه داد تا به حساب‌هایی با رمزهای عبور ضعیف (کوتاه یا آسان برای حدس زدن) دسترسی پیدا کند. به‌ویژه، او به این روش به حساب جد مک‌کالب دسترسی پیدا کرد. او بیت‌کوین‌ها را فروخت تا قیمت را پایین بیاورد، به‌طوری‌که بتواند حداکثر بیت‌کوین‌ها را برداشت کند (حد برداشت روزانه ۱۰۰۰ دلار بود).
reviewed: true
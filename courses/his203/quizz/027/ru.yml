question: Какую проблему решила детерминированная концепция wallet, формализованная разработчиком Gregory Maxwell в июне 2011 года?
answer: Необходимость регулярного резервного копирования закрытых ключей для защиты биткоинов
wrong_answers:
  - Риск пиратства, связанный с хранением биткоинов на подключенном к Интернету устройстве
  - Уязвимость к атакам методом грубой силы из-за низкой энтропии генераторов случайных чисел
  - Невозможность повторного использования учетной записи на другом устройстве
explanation: |
 Детерминированные wallet применяют деривацию ключей: вместо того чтобы быть generated индивидуально случайным образом, как это было сделано в основном программном обеспечении, закрытые ключи получаются
 детерминированно из информации (называемой seed) с помощью криптографических функций. Этот метод был применен в программах BitcoinSpinner и Electrum
 wallet в конце 2011 года.
reviewed: true
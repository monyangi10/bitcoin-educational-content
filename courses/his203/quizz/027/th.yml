question: ปัญหาใดที่แนวคิด wallet แบบกำหนดแนวทางแก้ไขซึ่งได้รับการจัดทำโดยนักพัฒนา Gregory Maxwell ในเดือนมิถุนายน 2011?
answer: ความจำเป็นในการสำรองข้อมูลคีย์ส่วนตัวอย่างสม่ำเสมอเพื่อรักษาความปลอดภัยของบิตคอยน์
wrong_answers:
  - ความเสี่ยงจากการละเมิดลิขสิทธิ์ที่เกี่ยวข้องกับการเก็บบิตคอยน์บนอุปกรณ์ที่เชื่อมต่ออินเทอร์เน็ต
  - ความเสี่ยงต่อการโจมตีแบบ brute force เนื่องจากความสุ่มต่ำของตัวสร้างตัวเลขสุ่ม
  - ไม่สามารถใช้บัญชีซ้ำบนอุปกรณ์อื่นได้
explanation: |
 wallets แบบกำหนดแน่นอนใช้การสืบทอดคีย์: แทนที่จะเป็น generated แบบสุ่มทีละตัวเหมือนที่ทำในซอฟต์แวร์หลัก คีย์ส่วนตัวจะถูกสืบทอด 
 แบบกำหนดแน่นอนจากข้อมูล (เรียกว่า seed) โดยใช้ฟังก์ชันการเข้ารหัส วิธีนี้ถูกใช้โดยซอฟต์แวร์ BitcoinSpinner และ Electrum 
 wallets ในช่วงปลายปี 2011
reviewed: true
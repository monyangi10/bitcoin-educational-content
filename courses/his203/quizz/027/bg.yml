question: Какъв проблем решава детерминистичната концепция wallet, формализирана от разработчика Gregory Maxwell през юни 2011 г.?
answer: Необходимостта от редовно архивиране на частните ключове за защита на биткойните
wrong_answers:
  - Рискът от пиратство, свързан със съхранението на биткойни на устройство, свързано с интернет
  - Уязвимост към атаки с груба сила поради ниската ентропия на генераторите на случайни числа
  - Невъзможност за повторно използване на акаунта на друго устройство
explanation: |
 Детерминистичните wallet прилагат деривация на ключове: вместо да бъдат generated индивидуално на случаен принцип, както е направено в основния софтуер, частните ключове се извличат
 детерминирано от информация (наречена seed), като се използват криптографски функции. Този метод се прилага от софтуера BitcoinSpinner и Electrum
 wallet в края на 2011 г.
reviewed: true
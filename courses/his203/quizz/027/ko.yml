question: 2011년 6월 개발자 Gregory Maxwell에 의해 공식화된 결정론적 wallet 개념은 어떤 문제를 해결했나요?
answer: 비트코인을 보호하기 위해 개인 키를 정기적으로 백업해야 할 필요성
wrong_answers:
  - 인터넷에 연결된 장치에 비트코인을 저장할 때 발생하는 불법 복제 위험
  - 난수 생성기의 낮은 엔트로피로 인한 무차별 대입 공격에 대한 취약성
  - 다른 디바이스에서 계정을 재사용할 수 없는 경우
explanation: |
 결정론적 wallet는 키 도출을 적용합니다: 기본 소프트웨어에서와 같이 개별적으로 무작위로 generated가 되는 대신, 개인 키는 암호화 함수를 사용하여 정보로부터
 암호화 함수를 사용하여 정보(seed이라고 함)로부터 결정론적으로 파생됩니다. 이 방법은 BitcoinSpinner 및 Electrum 소프트웨어에 적용되었습니다
 2011년 말 wallet에 적용되었습니다.
reviewed: true
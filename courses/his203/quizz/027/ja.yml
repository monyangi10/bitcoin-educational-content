question: 2011年6月、開発者のGregory Maxwellによって正式に発表された決定論的walletのコンセプトは、どのような問題を解決したのでしょうか？
answer: ビットコインを保護するための秘密鍵の定期的なバックアップの必要性
wrong_answers:
  - インターネットに接続されたデバイスにビットコインを保管することに伴う違法コピーのリスク
  - 乱数ジェネレータのエントロピーが低いため、ブルートフォース攻撃に対する脆弱性
  - 別のデバイスでアカウントを再利用できないこと
explanation: |
 決定論的walletは、鍵の導出を適用する。メイン・ソフトウェアで行われていたように、個々にランダムにgeneratedされるのではなく、秘密鍵は暗号関数を用いて情報（seedと呼ばれる）から決定論的に導出される。
 情報（seedと呼ばれる）から暗号関数を用いて決定論的に秘密鍵を導出する。この方法は、BitcoinSpinnerとElectrumソフトウェアで適用された。
 2011年末のwallets。
reviewed: true
question: जून 2011 में डेवलपर Gregory Maxwell द्वारा औपचारिक रूप से प्रस्तुत की गई नियतात्मक wallet अवधारणा ने किस समस्या का समाधान किया?
answer: बिटकॉइन की सुरक्षा के लिए निजी कुंजी का नियमित बैकअप लेना आवश्यक है।
wrong_answers:
  - इंटरनेट से जुड़े उपकरणों पर बिटकॉइन स्टोर करने से जुड़े पायरेसी के जोखिम।
  - यादृच्छिक संख्या जनरेटरों की कम एन्ट्रॉपी के कारण ब्रूट फोर्स हमलों के प्रति संवेदनशीलता।
  - किसी अन्य डिवाइस पर खाते का पुनः उपयोग करने में असमर्थता
explanation: |
 नियतात्मक wallet कुंजी व्युत्पत्ति का उपयोग करते हैं: मुख्य सॉफ़्टवेयर में किए गए यादृच्छिक तरीके से व्यक्तिगत रूप से generated करने के बजाय, क्रिप्टोग्राफ़िक कार्यों का उपयोग करके निजी कुंजियाँ सूचना (जिसे seed कहा जाता है) से नियतात्मक रूप से प्राप्त की जाती हैं। इस विधि को Bitcoin स्पिनर और Electrum सॉफ़्टवेयर द्वारा 2011 के अंत में लागू किया गया था।
reviewed: true
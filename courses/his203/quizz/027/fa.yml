question: مشکل مفهومی تعیین‌گر wallet که توسط توسعه‌دهنده Gregory Maxwell در ژوئن 2011 رسمی شد، چه بود؟
answer: نیاز به پشتیبان‌گیری منظم از کلیدهای خصوصی برای امنیت بیت‌کوین‌ها
wrong_answers:
  - خطر دزدی دریایی مرتبط با ذخیره بیت‌کوین‌ها بر روی دستگاه متصل به اینترنت
  - آسیب‌پذیری در برابر حملات جستجوی فراگیر به دلیل پایین بودن آنتروپی تولیدکننده‌های اعداد تصادفی
  - ناتوانی در استفاده مجدد از حساب کاربری در دستگاه دیگر
explanation: |
 walletهای قطعی از مشتق‌سازی کلید استفاده می‌کنند: به جای اینکه به صورت تصادفی و به طور جداگانه generated شوند، همان‌طور که در نرم‌افزار اصلی انجام می‌شد، کلیدهای خصوصی به صورت قطعی از اطلاعات (که seed نامیده می‌شود) با استفاده از توابع رمزنگاری مشتق می‌شوند. این روش توسط نرم‌افزار BitcoinSpinner و Electrum در پایان سال 2011 برای walletها اعمال شد.
reviewed: true
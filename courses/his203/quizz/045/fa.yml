question: چه نوآوری فنی در اکتبر 2011 در ارز دیجیتال نیم‌کوین گنجانده شد؟
answer: ادغام شده mining
wrong_answers:
  - mining مقاوم در برابر GPU
  - گره‌های مورد اعتماد
  - اثبات سهام
explanation: |
 ادغام mining فرآیندی است که در آن کار انجام شده بر روی یک "زنجیره مادر" (یعنی Bitcoin) برای اعتبارسنجی زنجیره‌های "کمکی" کوچکتر استفاده می‌شود. این فرآیند در بحث BitDNS توسط خود Satoshi پیشنهاد شد. ادغام mining در شبکه Namecoin در تاریخ 8 اکتبر 2011، در سطح بلوک 19,200 فعال شد.
reviewed: true
question: Какое техническое новшество было включено в криптовалюту Namecoin в октябре 2011 года?
answer: Слияние mining
wrong_answers:
  - GPU-стойкий mining
  - Доверенные узлы
  - Доказательство ставки
explanation: |
 Объединенный mining - это процесс, в котором работа, проделанная над "материнской цепочкой" (т.е. Bitcoin), повторно используется для проверки более мелких "вспомогательных" цепочек. Этот процесс был
 предложен в обсуждении BitDNS самим Satoshi. Комбинированная mining была активирована в сети Namecoin 8 октября 2011 года на уровне блока 19 200.
reviewed: true
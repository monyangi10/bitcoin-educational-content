question: นวัตกรรมทางเทคนิคอะไรที่ถูกรวมเข้ากับสกุลเงินดิจิทัล Namecoin ในเดือนตุลาคม 2011?
answer: รวม mining
wrong_answers:
  - GPU-resistant mining
  - โหนดที่เชื่อถือได้
  - หลักฐานการถือครองหุ้น
explanation: |
 Merged mining เป็นกระบวนการที่งานที่ทำบน "แม่โซ่" (เช่น Bitcoin) ถูกนำมาใช้ซ้ำเพื่อยืนยันโซ่ "เสริม" ที่เล็กกว่า กระบวนการนี้ถูกเสนอในระหว่างการสนทนา BitDNS โดย Satoshi เอง Combined mining ถูกเปิดใช้งานบนเครือข่าย Namecoin เมื่อวันที่ 8 ตุลาคม 2011 ที่ระดับบล็อก 19,200
reviewed: true
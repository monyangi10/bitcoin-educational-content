question: Каква техническа иновация беше включена в криптовалутата Namecoin през октомври 2011 г.?
answer: Сливане на mining
wrong_answers:
  - Устойчив на GPU mining
  - Доверени възли
  - Доказателство за залог
explanation: |
 Сливането на mining е процес, при който работата, извършена по "основната верига" (т.е. Bitcoin), се използва повторно за валидиране на по-малки "помощни" вериги. Този процес е
 предложен в дискусията за BitDNS от самия Satoshi. Комбинираната mining беше активирана в мрежата Namecoin на 8 октомври 2011 г. на ниво блок 19 200.
reviewed: true
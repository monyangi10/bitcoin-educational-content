question: अक्टूबर 2011 में नेमकॉइन क्रिप्टोकरेंसी में कौन सा तकनीकी नवाचार शामिल किया गया था?
answer: मर्ज्ड mining
wrong_answers:
  - जीपीयू-प्रतिरोधी mining
  - विश्वसनीय नोड्स
  - दांव का प्रमाण
explanation: |
 मर्ज्ड mining एक ऐसी प्रक्रिया है जिसके तहत "मदर चेन" (यानी Bitcoin) पर किए गए कार्य का उपयोग छोटी "सहायक" चेनों को मान्य करने के लिए किया जाता है। इस प्रक्रिया का प्रस्ताव BitDNS चर्चा में स्वयं Satoshi द्वारा दिया गया था। संयुक्त mining को 8 अक्टूबर, 2011 को ब्लॉक स्तर 19,200 पर नेमकॉइन नेटवर्क पर सक्रिय किया गया था।
reviewed: true
question: 2011년 테네브릭스 암호화폐에서 메모리 집약적인 스크립트 기능을 GPU 내성 mining 알고리즘으로 구현한 사람은 누구인가요?
answer: 아트포즈
wrong_answers:
  - 찰리 리
  - 롤커스트
  - 콜린 퍼시벌
explanation: |
 Scrypt는 캐나다의 컴퓨터 과학자 콜린 퍼시벌이 2009년에 처음 설계한 키 파생 기능입니다. 이 기능은 채굴자 아트포즈에 의해 채택되었습니다
 2011년 9월에 출시된 테네브릭스 암호화폐를 개발하는 데 도움을 주었습니다. 찰리 리는 10월에 출시된 라이트코인에 포함시키기 위해 이 모델을 채택했습니다.
reviewed: true
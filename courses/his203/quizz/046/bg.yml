question: Кой реализира интензивната на памет функция Scrypt като устойчив на GPU алгоритъм mining в криптовалутата Tenebrix през 2011 г.?
answer: ArtForz
wrong_answers:
  - Чарли Лий
  - Lolcust
  - Колин Пърсивал
explanation: |
 Scrypt е функция за деривация на ключове, първоначално разработена през 2009 г. от канадския компютърен учен Колин Пърсивал. Тя е възприета от миньора ArtForz, който помага
 Lolcust да разработи криптовалутата Tenebrix, пусната на пазара през септември 2011 г. Чарли Лий възприе модела за включване в Litecoin, която дебютира през октомври.
reviewed: true
question: چه کسی تابع Scrypt که به حافظه زیادی نیاز دارد را به عنوان الگوریتم mining مقاوم در برابر GPU در ارز دیجیتال Tenebrix در سال 2011 پیاده‌سازی کرد؟
answer: آرت‌فورز
wrong_answers:
  - چارلی لی
  - لولکاست
  - کالین پرسیوال
explanation: |
 اسکریپت یک تابع استخراج کلید است که در اصل در سال 2009 توسط دانشمند کامپیوتر کانادایی کالین پرسیوال طراحی شد. این تابع توسط ماینر ArtForz انتخاب شد، که به Lolcust در توسعه ارز دیجیتال Tenebrix کمک کرد، که در سپتامبر 2011 راه‌اندازی شد. چارلی لی این مدل را برای گنجاندن در لایت‌کوین انتخاب کرد، که در اکتبر معرفی شد.
reviewed: true
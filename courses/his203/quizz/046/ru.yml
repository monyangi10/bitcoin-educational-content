question: Кто реализовал функцию Scrypt, занимающую много памяти, как устойчивый к GPU алгоритм mining в криптовалюте Tenebrix в 2011 году?
answer: ArtForz
wrong_answers:
  - Чарли Ли
  - Lolcust
  - Колин Персиваль
explanation: |
 Scrypt - это функция деривации ключей, первоначально разработанная в 2009 году канадским компьютерщиком Колином Персивалем. Она была подхвачена майнером ArtForz, который помог
 Lolcust в разработке криптовалюты Tenebrix, запущенной в сентябре 2011 года. Чарли Ли взял модель на вооружение для включения в Litecoin, которая дебютировала в октябре.
reviewed: true
question: 2011年、テネブリックス暗号通貨にGPU耐性のあるminingアルゴリズムとして、メモリ集約型のScrypt関数を実装したのは誰か？
answer: アートフォルツ
wrong_answers:
  - チャーリー・リー
  - ロルカスト
  - コリン・パーシヴァル
explanation: |
 Scryptは、2009年にカナダのコンピュータ科学者Colin Percivalによって設計された鍵導出関数である。この関数は、2011年9月にローンチされた暗号通貨Tenebrixの開発を支援したマイナーのArtForzによって取り上げられた。
 2011年9月にローンチされた暗号通貨Tenebrixの開発に協力した。チャーリー・リーは、10月にデビューしたライトコインにこのモデルを採用した。
reviewed: true
question: 2011 में टेनेब्रिक्स क्रिप्टोकरेंसी में मेमोरी-इंटेंसिव स्क्रिप्ट फ़ंक्शन को जीपीयू-प्रतिरोधी mining एल्गोरिदम के रूप में किसने लागू किया था?
answer: आर्टफॉर्ज़
wrong_answers:
  - चार्ली ली
  - लोलकस्ट
  - कॉलिन पर्सीवल
explanation: |
 स्क्रिप्ट एक कुंजी व्युत्पत्ति फ़ंक्शन है जिसे मूल रूप से 2009 में कनाडाई कंप्यूटर वैज्ञानिक कॉलिन पर्सीवल द्वारा डिज़ाइन किया गया था। इसे माइनर आर्टफ़ोर्ज़ ने अपनाया, जिसने लोलकुस्ट को टेनेब्रिक्स क्रिप्टोकरेंसी विकसित करने में मदद की, जिसे सितंबर 2011 में लॉन्च किया गया था। चार्ली ली ने इस मॉडल को लाइटकॉइन में शामिल करने के लिए अपनाया, जो अक्टूबर में शुरू हुआ।
reviewed: true
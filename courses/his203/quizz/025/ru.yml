question: Какое мобильное приложение для хранения биткоинов было разработано французской компанией Paymium SAS в апреле 2012 года?
answer: Paytunia
wrong_answers:
  - Instawallet
  - MyBitcoin
  - Вибанко
explanation: |
 Paymium представила его как "революционное приложение на основе открытого протокола Bitcoin для безопасных и простых онлайн-платежей и денежных переводов".
 В марте 2012 года компания также приобрела веб-приложение Instawallet у Яна Ворнбергера.
reviewed: true
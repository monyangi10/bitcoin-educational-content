question: کدام برنامه کاربردی سپرده‌گذاری بیت‌کوین موبایل توسط شرکت فرانسوی Paymium SAS در آوریل ۲۰۱۲ توسعه داده شد؟
answer: پیتونیا
wrong_answers:
  - اینستاوالت
  - مای‌بیت‌کوین
  - ویبانکو
explanation: |
 Paymium آن را به عنوان "یک برنامه انقلابی مبتنی بر پروتکل باز Bitcoin برای پرداخت‌ها و انتقالات پول آنلاین امن و آسان" ارائه کرد.  
 این شرکت همچنین برنامه وب Instawallet را از جان ورنبرگر در مارس 2012 خریداری کرده بود.
reviewed: true
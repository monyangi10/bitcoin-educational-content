question: Vilken applikation för mobila bitcoinförvar utvecklades av det franska bolaget Paymium SAS i april 2012?
answer: Paytunia
wrong_answers:
  - Instawallet
  - MyBitcoin
  - Vibanko
explanation: |
 Paymium presenterade det som "en revolutionerande applikation baserad på det öppna protokollet Bitcoin för säkra och enkla onlinebetalningar och penningöverföringar".
 Bolaget hade även förvärvat webbapplikationen Instawallet från Jan Vornberger i mars 2012.
reviewed: true
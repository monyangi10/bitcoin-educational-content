question: Кое мобилно приложение за депозиране на биткойни е разработено от френската компания Paymium SAS през април 2012 г.?
answer: Paytunia
wrong_answers:
  - Instawallet
  - MyBitcoin
  - Vibanko
explanation: |
 Paymium го представя като "революционно приложение, базирано на отворения протокол Bitcoin, за сигурни и лесни онлайн плащания и парични преводи".
 През март 2012 г. компанията придоби и уеб приложението Instawallet от Ян Ворнбергер.
reviewed: true
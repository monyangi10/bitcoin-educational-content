question: Ni programu gani ya kuhifadhi bitcoin ya simu iliyotengenezwa na kampuni ya Ufaransa Paymium SAS mnamo Aprili 2012?
answer: Paytunia
wrong_answers:
  - Pochi ya Insta
  - Bitcoin Yangu
  - Vibanko
explanation: |
 Paymium iliiwasilisha kama "programu ya mapinduzi inayotegemea itifaki ya wazi ya Bitcoin kwa malipo salama na rahisi mtandaoni na uhamishaji wa pesa".
 
 Kampuni hiyo pia ilikuwa imepata programu ya wavuti ya Instawallet kutoka kwa Jan Vornberger mnamo Machi 2012.
reviewed: true
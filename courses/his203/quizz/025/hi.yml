question: फ्रांसीसी कंपनी Paymium SAS द्वारा अप्रैल 2012 में कौन सा मोबाइल बिटकॉइन डिपॉजिटरी एप्लिकेशन विकसित किया गया था?
answer: पायटूनिया
wrong_answers:
  - इंस्टावॉलेट
  - माईबिटकॉइन
  - विबांको
explanation: |
 Paymium ने इसे "सुरक्षित और आसान ऑनलाइन भुगतान और धन हस्तांतरण के लिए Bitcoin ओपन प्रोटोकॉल पर आधारित एक क्रांतिकारी एप्लिकेशन" के रूप में प्रस्तुत किया।
 कंपनी ने मार्च 2012 में जान वोर्नबर्गर से इंस्टावॉलेट वेब एप्लिकेशन भी अधिग्रहित किया था।
reviewed: true
question: 2012년 4월 프랑스 회사 Paymium SAS가 개발한 모바일 비트코인 보관소 애플리케이션은 무엇인가요?
answer: 페이투니아
wrong_answers:
  - 인스타월렛
  - 마이비트코인
  - Vibanko
explanation: |
 Paymium는 이를 "안전하고 간편한 온라인 결제 및 송금을 위한 Bitcoin 개방형 프로토콜 기반의 혁신적인 애플리케이션"이라고 소개했습니다.
 또한 2012년 3월에는 얀 보른베르거로부터 Instawallet 웹 애플리케이션을 인수했습니다.
reviewed: true
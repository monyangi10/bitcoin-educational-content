question: แอปพลิเคชันฝากบิตคอยน์บนมือถือใดที่พัฒนาโดยบริษัทฝรั่งเศส Paymium SAS ในเดือนเมษายน 2012?
answer: เพย์ทูเนีย
wrong_answers:
  - อินสตาวอลเล็ต
  - มายบิตคอยน์
  - Vibanko
explanation: |
 Paymium นำเสนอว่าเป็น "แอปพลิเคชันปฏิวัติที่อิงตามโปรโตคอลเปิด Bitcoin สำหรับการชำระเงินออนไลน์และการโอนเงินที่ปลอดภัยและง่ายดาย" บริษัทได้เข้าซื้อแอปพลิเคชันเว็บ Instawallet จาก Jan Vornberger ในเดือนมีนาคม 2012
reviewed: true
question: مارک کارپلس قبل از تصدی مدیریت Mt. Gox، کدام سرویس میزبانی را مدیریت می‌کرد؟
answer: کالی‌هاست
wrong_answers:
  - TibanneHost
  - ما شما را میزبانی می‌کنیم
  - پلانت‌هاست
explanation: |
 این تنها یکی از خدمات بسیاری بود که او به عنوان یک توسعه‌دهنده مستقل ارائه می‌داد. در نوامبر، مارک کارپلس شروع به پذیرش پرداخت‌های بیت‌کوین با KalyHost کرد.  
 راس اولبریکت نیز از این سرویس برای میزبانی صفحه وب Silkroadmarket.org استفاده کرد که به Silk Road هدایت می‌شد.
reviewed: true
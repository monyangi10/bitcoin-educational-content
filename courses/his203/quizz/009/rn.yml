question: Ni igikorwa ikihe c’ukwakira abashitsi Mark Karpelès yarongoye imbere y’uko afata umusozi Gox?
answer: KalyUmushitsi
wrong_answers:
  - Tibanne Umushitsi
  - Turakwakira
  - Umubumbe
explanation: |
 Ivyo vyari bimwe mu bikorwa vyinshi yatanga nk’umuhinga mu bijanye n’iterambere yigenga. Mu kwezi kwa 11, Mark Karpelès yatanguye kwemera amahera y’amahera y’ibiceri (bitcoins) na KalyHost. 
 Ross Ulbricht na we nyene yarakoresheje iyo nzira kugira ngo akoreshe urubuga rwa Silkroadmarket.org, rwaciye ruja ku nzira y’ubudodo.
reviewed: true
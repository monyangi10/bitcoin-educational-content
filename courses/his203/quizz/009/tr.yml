explanation: |
 Bu, bağımsız bir geliştirici olarak sunduğu birçok hizmetten sadece biriydi. Kasım ayında Mark Karpelès KalyHost ile bitcoin ödemelerini kabul etmeye başladı.
 Ross Ulbricht de bu hizmeti Silk Road'a yönlendiren Silkroadmarket.org web sayfasını barındırmak için kullandı.

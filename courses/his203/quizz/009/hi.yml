question: माउंट गोक्स का कार्यभार संभालने से पहले मार्क कार्पेल्स किस होस्टिंग सेवा का प्रबंधन करते थे?
answer: कलिहोस्ट
wrong_answers:
  - तिबानेहोस्ट
  - हम आपकी मेजबानी करते हैं
  - प्लैनेटहोस्ट
explanation: |
 यह उन अनेक सेवाओं में से एक थी जो उन्होंने एक स्वतंत्र डेवलपर के रूप में प्रदान कीं। नवंबर में, मार्क कार्पेल्स ने कलिहोस्ट के माध्यम से बिटकॉइन भुगतान स्वीकार करना शुरू किया।
 रॉस उलब्रिच ने भी सिल्क रोड पर रीडायरेक्ट करने वाले Silkroadmarket.org वेब पेज को होस्ट करने के लिए इस सेवा का उपयोग किया।
reviewed: true
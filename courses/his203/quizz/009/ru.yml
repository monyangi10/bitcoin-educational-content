question: Каким хостингом руководил Марк Карпелес до того, как возглавил Mt. Gox?
answer: KalyHost
wrong_answers:
  - TibanneHost
  - WeHostYou
  - PlanetHost
explanation: |
 Это была лишь одна из многих услуг, которые он предлагал как независимый разработчик. В ноябре Марк Карпелес начал принимать биткоин-платежи с помощью KalyHost.
 Росс Ульбрихт также использовал этот сервис для размещения веб-страницы Silkroadmarket.org, которая перенаправляла на Silk Road.
reviewed: true
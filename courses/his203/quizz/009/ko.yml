question: 마크 카펠레스는 마운트곡스를 인수하기 전에 어떤 호스팅 서비스를 운영했나요?
answer: KalyHost
wrong_answers:
  - 티반네 호스트
  - WeHostYou
  - PlanetHost
explanation: |
 이것은 그가 독립 개발자로서 제공한 많은 서비스 중 하나에 불과했습니다. 11월에 마크 카르펠레스는 칼리호스트를 통해 비트코인 결제를 받기 시작했습니다.
 로스 울브리히트도 이 서비스를 사용하여 실크로드로 리디렉션되는 실크로드마켓.org 웹페이지를 호스팅했습니다.
reviewed: true
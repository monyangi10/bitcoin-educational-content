question: Коя хостинг услуга е управлявал Марк Карпелес, преди да поеме Mt. Gox?
answer: KalyHost
wrong_answers:
  - TibanneHost
  - WeHostYou
  - PlanetHost
explanation: |
 Това е само една от многото услуги, които той предлага като независим разработчик. През ноември Марк Карпелес започна да приема плащания в биткойн с KalyHost.
 Рос Улбрихт също използваше услугата за хостинг на уебстраницата Silkroadmarket.org, която пренасочваше към Silk Road.
reviewed: true
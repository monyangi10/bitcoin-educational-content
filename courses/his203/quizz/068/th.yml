question: แพลตฟอร์มแลกเปลี่ยนใดที่มีการขโมยบิตคอยน์จำนวน 24,000 เหรียญในช่วงต้นเดือนกันยายน 2012?
answer: บิทฟลอร์
wrong_answers:
  - Mt. Gox
  - เทรดฮิลล์
  - BTC-e
explanation: |
 ในคืนวันที่ 3 ถึง 4 กันยายน 2012 แฮ็กเกอร์ได้เข้าถึงข้อมูลสำรองที่ไม่ได้เข้ารหัสของกุญแจ wallet ของ Bitfloor และสามารถถอนเงินได้มากกว่า 24,000 BTC หรือประมาณ $250,000 ในขณะนั้น
reviewed: true
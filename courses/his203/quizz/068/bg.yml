question: От коя платформа за обмен бяха откраднати 24 000 биткойна в началото на септември 2012 г.?
answer: Bitfloor
wrong_answers:
  - Mt. Gox
  - Tradehill
  - BTC-e
explanation: |
 През нощта на 3 срещу 4 септември 2012 г. хакер получава достъп до некриптирано резервно копие на ключовете wallet на Bitfloor и успява да изтегли малко над 24 000 BTC, или
 около 250 000 щатски долара по това време.
reviewed: true
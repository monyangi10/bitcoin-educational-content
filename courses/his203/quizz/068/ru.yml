question: С какой обменной платформы в начале сентября 2012 года было украдено 24 000 биткоинов?
answer: Bitfloor
wrong_answers:
  - Mt. Gox
  - Трейдхилл
  - BTC-e
explanation: |
 В ночь с 3 на 4 сентября 2012 года хакер получил доступ к незашифрованной резервной копии ключей wallet компании Bitfloor и сумел вывести чуть более 24 000 BTC, или
 около 250 000 долларов США на тот момент.
reviewed: true
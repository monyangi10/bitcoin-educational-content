question: کدام پلتفرم تبادل در اوایل سپتامبر 2012 تعداد 24,000 بیت‌کوین به سرقت رفت؟
answer: بیت‌فلور
wrong_answers:
  - Mt. Gox
  - ترید‌هیل
  - BTC-e
explanation: |
 در شب ۳ تا ۴ سپتامبر ۲۰۱۲، یک هکر به یک نسخه پشتیبان رمزنگاری‌نشده از کلیدهای wallet بیت‌فلور دسترسی پیدا کرد و توانست کمی بیش از ۲۴,۰۰۰ BTC، یا حدود ۲۵۰,۰۰۰ دلار در آن زمان، برداشت کند.
reviewed: true
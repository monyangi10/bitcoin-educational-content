question: सितंबर 2012 की शुरुआत में किस एक्सचेंज प्लेटफॉर्म से 24,000 बिटकॉइन चोरी हो गए थे?
answer: बिटफ्लोर
wrong_answers:
  - माउंट गोक्स
  - ट्रेडहिल
  - BTC-ई
explanation: |
 3 से 4 सितंबर, 2012 की रात को, एक हैकर ने बिटफ्लोर की wallet कुंजियों के एक अनएन्क्रिप्टेड बैकअप तक पहुंच बनाई और 24,000 से कुछ अधिक BTC, या उस समय लगभग $250,000 निकालने में कामयाब रहा।
reviewed: true
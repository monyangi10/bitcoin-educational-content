question: Ni uruhe rubuga rwo guhinduranya amafaranga rwari rufise amafaranga 24.000 yibwe mu ntango za Nzero 2012?
answer: Hasi
wrong_answers:
  - Umusozi Gox
  - Ubucuruzi
  - BTC-e
explanation: |
 Mu ijoro ryo kuva ku wa 3 gushika ku wa 4 Nzero 2012, umunyaruyeri yarashitse ku rubuga rw’imfunguruzo za Bitfloor wallet zitashizwemwo amakuru, maze ashobora gukuramwo ama BTC arenga gatoyi 24.000, canke . 
 nk’amadolari 250.000 ico gihe.
reviewed: true
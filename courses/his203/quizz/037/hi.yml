question: 2011 में व्लादिमीर वैन डेर लान द्वारा मुख्य सॉफ्टवेयर के लिए विकसित किए गए ग्राफिक इंटरफेस का नाम क्या था?
answer: Bitcoin-क्यूटी
wrong_answers:
  - wxWindows-Bitcoin
  - bitcoind
  - Bitcoin कोर
explanation: |
 Bitcoin-Qt, Bitcoin के ग्राफिकल इंटरफेस का पूर्णतः संशोधित संस्करण था। इसका विकास जून 2011 से शुरू हुआ और संस्करण 0.5 में इसे मुख्य सॉफ़्टवेयर में एकीकृत किया गया, जो 21 नवंबर को जारी किया गया था। Qt ग्राफिक्स फ्रेमवर्क पर आधारित, इसने Satoshi द्वारा मूल रूप से उपयोग की जाने वाली wxWindows लाइब्रेरी का स्थान ले लिया। इसी नाम से इस सॉफ़्टवेयर को आगे Bitcoin-Qt कहा जाने लगा।
reviewed: true
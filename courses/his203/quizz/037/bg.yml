question: Как се нарича графичният интерфейс, разработен за основния софтуер от Владимир ван дер Лаан през 2011 г.?
answer: Bitcoin-Qt
wrong_answers:
  - wxWindows-Bitcoin
  - bitcoind
  - Ядро Bitcoin
explanation: |
 Bitcoin-Qt беше изцяло преработен графичният интерфейс на Bitcoin. Той е разработен през юни 2011 г. и е интегриран в основния софтуер във версия 0.5,
 пусната на 21 ноември. Базиран на графичната рамка Qt, той заменя библиотеката wxWindows, използвана първоначално от Satoshi. По метонимия софтуерът се наричаше
 Bitcoin-Qt от този момент нататък.
reviewed: true
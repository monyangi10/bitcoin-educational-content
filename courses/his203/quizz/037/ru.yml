question: Как назывался графический интерфейс, разработанный для основного программного обеспечения Владимиром ван дер Лааном в 2011 году?
answer: Bitcoin-Qt
wrong_answers:
  - wxWindows-Bitcoin
  - bitcoind
  - Bitcoin Core
explanation: |
 Bitcoin-Qt - это полная переработка графического интерфейса Bitcoin. Он разрабатывался с июня 2011 года и был интегрирован в основное программное обеспечение в версии 0.5,
 выпущенной 21 ноября. Основанный на графическом фреймворке Qt, он заменил библиотеку wxWindows, изначально использовавшуюся в Satoshi. По метонимии программа стала называться
 Bitcoin-Qt.
reviewed: true
question: ชื่อของอินเทอร์เฟซกราฟิกที่พัฒนาสำหรับซอฟต์แวร์หลักโดย Wladimir van der Laan ในปี 2011 คืออะไร?
answer: Bitcoin-Qt
wrong_answers:
  - wxWindows-Bitcoin
  - bitcoind
  - Bitcoin Core
explanation: |
 Bitcoin-Qt เป็นการยกเครื่องครั้งใหญ่ของอินเทอร์เฟซกราฟิกของ Bitcoin ถูกพัฒนาขึ้นตั้งแต่เดือนมิถุนายน 2011 และถูกรวมเข้ากับซอฟต์แวร์หลักในเวอร์ชัน 0.5 ซึ่งเปิดตัวเมื่อวันที่ 21 พฤศจิกายน โดยใช้เฟรมเวิร์กกราฟิก Qt แทนที่ไลบรารี wxWindows ที่เดิมใช้โดย Satoshi โดยการใช้ชื่อแทน ซอฟต์แวร์จึงถูกเรียกว่า Bitcoin-Qt ตั้งแต่นั้นเป็นต้นมา
reviewed: true
question: BitPay 是斯蒂芬-派尔（Stephen Pair）和托尼-加里皮（Tony Gallippi）于 2011 年夏天推出的支付处理器，它背后的商业模式是什么？
answer: 将客户的比特币即时兑换成美元，并收取一定费用
wrong_answers:
  - 使客户能够使用美元支付即时购买比特币，并获得佣金
  - 借出客户存入的比特币并收取利息
  - 将比特币支付中继到区块链，收取交易费用
explanation: |
 BitPay 背后的理念是为商家提供将比特币支付即时兑换成美元的可能性，这样他们就可以对冲
 波动。BitPay 先期向客户提供美元，最初收取 1%的手续费。
reviewed: true
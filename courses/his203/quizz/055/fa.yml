question: مدل کسب‌وکار پشت BitPay، پردازشگر پرداختی که توسط استفان پیر و تونی گالیپی در تابستان ۲۰۱۱ راه‌اندازی شد، چه بود؟
answer: بیت‌کوین‌های مشتریان را بلافاصله به دلار تبدیل کنید، با دریافت کارمزد
wrong_answers:
  - به مشتریان امکان خرید فوری بیت‌کوین با پرداخت دلاری، با دریافت کمیسیون را بدهید.
  - بیت‌کوین‌های سپرده‌گذاری شده توسط مشتریان را قرض دهید و بهره جمع‌آوری کنید.
  - انتقال پرداخت‌های بیت‌کوین به بلاکچین و دریافت کارمزد تراکنش‌ها
explanation: |
 ایده پشت BitPay این بود که به بازرگانان امکان تبدیل فوری پرداخت‌های بیت‌کوین به دلار را بدهد، تا بتوانند در برابر نوسانات محافظت کنند. BitPay به مشتریان دلار را به صورت پیش‌پرداخت ارائه می‌داد و کارمزد پردازش که در ابتدا ۱٪ بود، دریافت می‌کرد.
reviewed: true
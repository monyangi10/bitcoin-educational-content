question: स्टीफन पेयर और टोनी गैलिप्पी द्वारा 2011 की गर्मियों में लॉन्च किए गए पेमेंट प्रोसेसर बिटपे के पीछे का बिजनेस मॉडल क्या था?
answer: ग्राहकों के बिटकॉइन को शुल्क लेकर तुरंत डॉलर में बदलें।
wrong_answers:
  - ग्राहकों को डॉलर भुगतान के साथ तुरंत बिटकॉइन खरीदने की सुविधा दें, इसके लिए कमीशन लिया जाएगा।
  - ग्राहकों द्वारा जमा किए गए बिटकॉइन उधार दें और ब्याज अर्जित करें।
  - बिटकॉइन भुगतान को ब्लॉकचेन पर भेजें और लेनदेन शुल्क प्राप्त करें।
explanation: |
 बिटपे का मूल विचार व्यापारियों को बिटकॉइन भुगतान को तुरंत डॉलर में परिवर्तित करने की सुविधा देना था, ताकि वे बाजार की अस्थिरता से बचाव कर सकें। बिटपे ग्राहकों को अग्रिम रूप से डॉलर देता था और इसके लिए वह शुरू में 1% प्रोसेसिंग शुल्क लेता था।
reviewed: true
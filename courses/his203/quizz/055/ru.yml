question: Какова была бизнес-модель BitPay, платежного процессора, запущенного Стивеном Пэйром и Тони Галлиппи летом 2011 года?
answer: За определенную плату мгновенно конвертируйте биткоины клиентов в доллары
wrong_answers:
  - Предоставьте клиентам возможность мгновенно покупать биткойны с помощью долларовых платежей за комиссию
  - Предоставляйте в кредит биткоины, внесенные клиентами, и получайте проценты
  - Ретранслируйте биткойн-платежи в блокчейн, получая комиссионные за транзакции
explanation: |
 Идея BitPay заключалась в том, чтобы предоставить торговцам возможность мгновенно конвертировать свои биткоин-платежи в доллары, чтобы они могли застраховаться от
 волатильности. BitPay предоставляла клиентам доллары авансом, взимая комиссию за обработку, которая изначально составляла 1 %.
reviewed: true
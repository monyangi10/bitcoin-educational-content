question: Какъв е бизнес моделът на BitPay, платежния процесор, стартиран от Стивън Пейр и Тони Галипи през лятото на 2011 г.?
answer: Конвертиране на биткойни на клиенти в долари незабавно срещу заплащане
wrong_answers:
  - Дайте възможност на клиентите да купуват биткойн незабавно с плащания в долари срещу комисиона
  - Предоставяне на биткойни, депозирани от клиенти, и събиране на лихви
  - Предаване на плащания в биткойн към блокчейна, получаване на такси за транзакции
explanation: |
 Идеята на BitPay е да даде възможност на търговците да конвертират незабавно плащанията си в биткойни в долари, за да могат да се предпазят от
 волатилността. BitPay предоставяше на клиентите си долари предварително, като начисляваше такса за обработка, която първоначално беше 1%.
reviewed: true
question: 2011년 여름 스티븐 페어와 토니 갈리피가 출시한 결제 프로세서인 비트페이의 비즈니스 모델은 무엇이었나요?
answer: 유료로 고객의 비트코인을 즉시 달러로 전환하세요
wrong_answers:
  - 고객이 수수료를 지불하고 달러 결제를 통해 비트코인을 즉시 구매할 수 있도록 지원합니다
  - 고객이 예치한 비트코인을 빌려주고 이자를 받습니다
  - 비트코인 결제를 블록체인에 중계하여 거래 수수료를 받습니다
explanation: |
 비트페이의 아이디어는 판매자가 비트코인 결제를 즉시 달러로 전환할 수 있도록 하여
 변동성. BitPay는 고객에게 선불로 달러를 제공하면서 처음에는 1%의 처리 수수료를 부과했습니다.
reviewed: true
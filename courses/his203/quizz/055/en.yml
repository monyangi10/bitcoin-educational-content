question: What was the business model behind BitPay, the payment processor launched by Stephen Pair and Tony Gallippi in the summer of 2011?
answer: Convert customers' bitcoins into dollars instantly, for a fee
wrong_answers:
  - Enable customers to buy bitcoin instantly with dollar payments, for a commission
  - Lend bitcoins deposited by customers and collect interest
  - Relay bitcoin payments to the blockchain, receiving transaction fees
explanation: |
 The idea behind BitPay was to give merchants the possibility of converting their bitcoin payments instantly into dollars, so that they could hedge against volatility. BitPay advanced the dollars to their customers against a processing fee, which was initially 1%.

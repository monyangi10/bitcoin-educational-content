question: รูปแบบธุรกิจของ BitPay ซึ่งเป็นผู้ประมวลผลการชำระเงินที่เปิดตัวโดย Stephen Pair และ Tony Gallippi ในช่วงฤดูร้อนปี 2011 คืออะไร?
answer: แปลงบิตคอยน์ของลูกค้าเป็นดอลลาร์ทันที โดยมีค่าธรรมเนียม
wrong_answers:
  - เปิดให้ลูกค้าซื้อบิตคอยน์ได้ทันทีด้วยการชำระเงินเป็นดอลลาร์ โดยมีค่าคอมมิชชั่น
  - ให้ยืมบิตคอยน์ที่ฝากโดยลูกค้าและเก็บดอกเบี้ย
  - ส่งต่อการชำระเงินด้วยบิตคอยน์ไปยังบล็อกเชน รับค่าธรรมเนียมการทำธุรกรรม
explanation: |
 แนวคิดเบื้องหลัง BitPay คือการให้ผู้ค้าสามารถแปลงการชำระเงินด้วยบิตคอยน์เป็นดอลลาร์ได้ทันที เพื่อให้พวกเขาสามารถป้องกันความผันผวนได้ BitPay ให้ลูกค้าได้รับดอลลาร์ล่วงหน้า โดยคิดค่าธรรมเนียมการประมวลผลที่เริ่มต้นที่ 1%
reviewed: true
question: 2011年夏、スティーブン・ペアとトニー・ガリッピが立ち上げた決済プロセッサー、BitPayのビジネスモデルはどのようなものだったのでしょうか？
answer: 顧客のビットコインを即座にドルに変換する。
wrong_answers:
  - 顧客がドル決済でビットコインを即座に購入できるようにする。
  - 顧客から預かったビットコインを貸し出し、利息を徴収する。
  - ビットコイン決済をブロックチェーンに中継し、取引手数料を受け取る
explanation: |
 BitPayの背後にあるアイデアは、加盟店がビットコインでの支払いを即座にドルに変換する可能性を提供し、ボラティリティをヘッジできるようにすることだった。
 ボラティリティをヘッジできるようにすることだった。BitPayは、当初は1％の処理手数料を徴収し、顧客に前払いでドルを提供した。
reviewed: true
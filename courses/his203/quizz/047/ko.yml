question: 2011년 10월 찰리 리가 만든 암호화폐 라이트코인의 마케팅 전략은 무엇인가요?
answer: Bitcoin이 골드에 해당하는 실버가 되십시오
wrong_answers:
  - 영적 화폐 만들기
  - Bitcoin이 무너졌을 때 후속하는 GW-2
  - 자유 소프트웨어의 세계에 자금을 조달하기
explanation: |
 라이트코인은 Bitcoin보다 더 빠르고(블록 시간이 10분이 아닌 2분 30초) 희소성(21개가 아닌 8,400만 개)도 낮았기 때문에 귀금속에 비유할 수 있습니다
 금속에 비유할 수 있습니다. 암호화폐에 대한 초기 설명에 이 비교를 포함시킨 것은 찰리 리 자신이었습니다.
reviewed: true
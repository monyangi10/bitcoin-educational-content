question: चार्ली ली द्वारा अक्टूबर 2011 में बनाई गई क्रिप्टोकरेंसी लाइटकॉइन की मार्केटिंग रणनीति क्या थी?
answer: चांदी के लिए वही बनो जो Bitcoin सोने के लिए है।
wrong_answers:
  - एक आध्यात्मिक मुद्रा का निर्माण करना
  - प्रथम विश्व युद्ध के पतन के बाद उसका सफल होना
  - मुफ्त सॉफ्टवेयर की दुनिया को वित्तपोषण प्रदान करना
explanation: |
 लाइटकॉइन, Bitcoin की तुलना में तेज़ (ब्लॉक टाइम 10 मिनट के बजाय 2 मिनट 30 सेकंड) और कम दुर्लभ (21 मिलियन यूनिट के बजाय 84 मिलियन यूनिट) दोनों थी, इसलिए इसकी तुलना कीमती धातुओं से की गई।
 यह तुलना चार्ली ली ने स्वयं अपनी क्रिप्टोकरेंसी के प्रारंभिक विवरण में शामिल की थी।
reviewed: true
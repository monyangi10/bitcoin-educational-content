question: Каким был маркетинговый ход для Litecoin, криптовалюты, созданной Чарли Ли в октябре 2011 года?
answer: Быть для серебра тем же, чем Bitcoin является для золота
wrong_answers:
  - Создание духовной валюты
  - Преемник Bitcoin, когда он разрушится
  - Финансирование мира свободного программного обеспечения
explanation: |
 Litecoin был одновременно и быстрее (время блока 2 минуты 30 минут вместо 10 минут), и менее дефицитным (84 миллиона единиц вместо 21), чем Bitcoin, отсюда и аналогия с драгоценными
 металлы. Сам Чарли Ли включил это сравнение в первоначальное описание своей криптовалюты.
reviewed: true
question: การตลาดของ Litecoin ซึ่งเป็นสกุลเงินดิจิทัลที่สร้างโดย Charlie Lee ในเดือนตุลาคม 2011 คือการเป็น "เงิน" ในขณะที่ Bitcoin ถูกมองว่าเป็น "ทอง" ของโลกคริปโต โดย Litecoin ถูกออกแบบมาให้มีการทำธุรกรรมที่รวดเร็วและมีค่าธรรมเนียมที่ต่ำกว่า Bitcoin ทำให้เหมาะสำหรับการใช้งานในชีวิตประจำวันมากขึ้น
answer: เป็นกับเงินเหมือนที่ Bitcoin เป็นกับทอง
wrong_answers:
  - สร้างสกุลเงินทางจิตวิญญาณ
  - ประสบความสำเร็จ Bitcoin เมื่อมันล่มสลาย
  - การจัดหาเงินทุนสำหรับโลกของซอฟต์แวร์เสรี
explanation: |
 Litecoin นั้นทั้งเร็วกว่า (เวลาบล็อกคือ 2 นาที 30 วินาทีแทนที่จะเป็น 10 นาที) และมีความขาดแคลนน้อยกว่า (84 ล้านหน่วยแทนที่จะเป็น 21 ล้านหน่วย) เมื่อเทียบกับ Bitcoin ดังนั้นจึงมีการเปรียบเทียบกับโลหะมีค่า ซึ่งเป็น Charlie Lee เองที่ได้รวมการเปรียบเทียบนี้ไว้ในคำอธิบายเริ่มต้นของสกุลเงินดิจิทัลของเขา
reviewed: true
question: ارائه بازاریابی برای لایت‌کوین، ارز دیجیتالی که توسط چارلی لی در اکتبر ۲۰۱۱ ایجاد شد، چه بود؟
answer: به نقره همان چیزی باش که Bitcoin به طلا است
wrong_answers:
  - ایجاد یک ارز معنوی
  - موفقیت Bitcoin زمانی که فرو می‌ریزد
  - تأمین مالی دنیای نرم‌افزار آزاد
explanation: |
 لایت‌کوین هم سریع‌تر بود (زمان بلاک ۲ دقیقه و ۳۰ ثانیه به جای ۱۰ دقیقه) و هم کمتر کمیاب (۸۴ میلیون واحد به جای ۲۱ میلیون) نسبت به Bitcoin، از این رو تشبیه به فلزات گرانبها. این چارلی لی بود که این مقایسه را در توصیف اولیه ارز دیجیتال خود گنجاند.
reviewed: true
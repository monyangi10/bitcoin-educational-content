question: 2011年10月、チャーリー・リーによって作られた暗号通貨ライトコインのマーケティング・ピッチはどのようなものだったのだろうか？
answer: 銀にとってのBitcoinは、金にとってのBitcoinである。
wrong_answers:
  - 精神的な通貨を作る
  - Bitcoinの崩壊を引き継ぐ
  - フリーソフトウェアの世界に資金を供給
explanation: |
 ライトコインはBitcoinより速く（ブロックタイムは10分ではなく2分30秒）、希少性も低い（2100万ユニットではなく8400万ユニット）。
 貴金属に例えている。暗号通貨の最初の説明にこの比較を盛り込んだのはチャーリー・リー自身だった。
reviewed: true
question: Каква беше рекламната кампания на Litecoin - криптовалутата, създадена от Чарли Лий през октомври 2011 г.?
answer: Бъдете за среброто това, което Bitcoin е за златото
wrong_answers:
  - Създаване на духовна валута
  - Наследява Bitcoin, когато той се срине
  - Финансиране на света на свободния софтуер
explanation: |
 Litecoin е по-бърз (времето за блокиране е 2 минути и 30 минути, вместо 10 минути) и по-малко оскъден (84 милиона единици, вместо 21) от Bitcoin, поради което скъпоценният
 аналогия с благородните метали. Самият Чарли Лий е включил това сравнение в първоначалното описание на своята криптовалута.
reviewed: true
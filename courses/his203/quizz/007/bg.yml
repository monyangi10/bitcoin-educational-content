question: Кой беше Марк Карпелес, преди да поеме Mt. Gox?
answer: Разработчик със страст към технологиите
wrong_answers:
  - Експерт инвеститор в цифрови валути
  - Либертариански активист, мотивиран от идеологията на Bitcoin
  - Предприемач, специализиран в търговията на фондовия пазар
explanation: |
 Марк Карпелес е френски програмист, роден през 1985 г., със страст към компютрите и технологиите. Той не се мотивира от идеология или печалба,
 а от техническо любопитство.
reviewed: true
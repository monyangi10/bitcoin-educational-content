question: Qui était Mark Karpelès avant de reprendre Mt. Gox ?
answer: Un développeur passionné de technologie
wrong_answers:
  - Un investisseur expert en monnaies numériques
  - Un activiste libertarien motivé par l'idéologie de Bitcoin
  - Un entrepreneur spécialisé dans la négociation sur les marchés boursiers
explanation: |
 Mark Karpelès était un développeur français né en 1985, passionné d'informatique et de technologie. Il n'était pas motivé par l'idéologie ou le profit, mais par la curiosité technique.

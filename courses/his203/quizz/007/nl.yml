question: Wie was Mark Karpelès voordat hij Mt. Gox overnam?
answer: Een ontwikkelaar met een passie voor technologie
wrong_answers:
  - Een deskundige belegger in digitale valuta
  - Libertarische activist gemotiveerd door Bitcoin ideologie
  - Een ondernemer gespecialiseerd in beurshandel
explanation: |
 Mark Karpelès is een Franse ontwikkelaar geboren in 1985, met een passie voor computers en technologie. Hij werd niet gemotiveerd door ideologie of winstbejag,
 maar door technische nieuwsgierigheid.
reviewed: true
question: None Mark Karpelès yari nde imbere y’uko afata umusozi Gox?
answer: Umuhinguzi afise urukundo rwinshi rw'ubuhinga
wrong_answers:
  - Umushoramari w'umuhinga mu mafaranga y'ubuhinga bwa none
  - Umunyagihugu arwanya umwidegemvyo avyuriwe umutima n'ingengabitekerezo ya Bitcoin
  - Umucuruzi yizeye cane ubucuruzi bw'isoko ry'ivy'ubutunzi
explanation: |
 Mark Karpelès yari umufaransa w’umuhinga mu vy’ubuhinga bwa none yavutse mu 1985, afise urukundo rwinshi rw’ubuhinga bwa mudasobwa n’ubuhinga bwa none. Ntiyavyurwa n’ingengabitekerezo canke inyungu, . 
 ariko kubera ugushaka kumenya ibintu mu buryo bw’ubuhinga.
reviewed: true
question: مارک کارپلس قبل از اینکه مدیریت Mt. Gox را به دست بگیرد چه کسی بود؟
answer: یک توسعه‌دهنده با علاقه به فناوری
wrong_answers:
  - یک سرمایه‌گذار خبره در ارزهای دیجیتال
  - فعالیت‌گر لیبرترین با انگیزه ایدئولوژی Bitcoin
  - یک کارآفرین متخصص در معاملات بازار سهام
explanation: |
 مارک کارپلز یک توسعه‌دهنده فرانسوی بود که در سال 1985 متولد شد و علاقه زیادی به کامپیوتر و فناوری داشت. انگیزه او نه ایدئولوژی بود و نه سود، بلکه کنجکاوی فنی بود.
reviewed: true
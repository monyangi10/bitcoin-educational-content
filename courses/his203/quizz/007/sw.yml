question: Mark Karpelès alikuwa nani kabla ya kuchukua Mlima Gox?
answer: Msanidi programu mwenye shauku ya teknolojia
wrong_answers:
  - Mwekezaji mtaalamu katika sarafu za kidijitali
  - Mwanaharakati wa uhuru akichochewa na itikadi ya Bitcoin
  - Mjasiriamali mtaalamu wa biashara ya soko la hisa
explanation: |
 Mark Karpelès alikuwa msanidi programu wa Ufaransa aliyezaliwa mwaka wa 1985, akiwa na shauku ya kompyuta na teknolojia. Hakuchochewa na itikadi au faida, bali na udadisi wa kiufundi.
reviewed: true
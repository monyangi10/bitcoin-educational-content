question: Кем был Марк Карпелес до того, как возглавил Mt. Gox?
answer: Разработчик, увлеченный технологиями
wrong_answers:
  - Эксперт-инвестор в цифровые валюты
  - Либертарианский активист, движимый идеологией Bitcoin
  - Предприниматель, специализирующийся на торговле на фондовом рынке
explanation: |
 Марк Карпелес - французский разработчик, родившийся в 1985 году и увлекавшийся компьютерами и технологиями. Им двигала не идеология или выгода,
 а техническим любопытством.
reviewed: true
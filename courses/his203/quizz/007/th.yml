question: มาร์ค คาร์เปเลสเป็นใครก่อนที่เขาจะเข้ามาบริหาร Mt. Gox?
answer: นักพัฒนาที่มีความหลงใหลในเทคโนโลยี
wrong_answers:
  - ผู้เชี่ยวชาญด้านการลงทุนในสกุลเงินดิจิทัล
  - นักเคลื่อนไหวเสรีนิยมที่ได้รับแรงบันดาลใจจากอุดมการณ์ Bitcoin
  - ผู้ประกอบการที่เชี่ยวชาญในการซื้อขายตลาดหุ้น
explanation: |
 มาร์ค คาร์เพเลส เป็นนักพัฒนาชาวฝรั่งเศสที่เกิดในปี 1985 ด้วยความหลงใหลในคอมพิวเตอร์และเทคโนโลยี เขามีแรงจูงใจไม่ใช่จากอุดมการณ์หรือผลกำไร 
 แต่จากความอยากรู้อยากเห็นทางเทคนิค
reviewed: true
question: माउंट गोक्स का कार्यभार संभालने से पहले मार्क कार्पेल्स कौन थे?
answer: एक डेवलपर जिसे प्रौद्योगिकी से बेहद लगाव है
wrong_answers:
  - डिजिटल मुद्राओं में एक विशेषज्ञ निवेशक
  - Bitcoin विचारधारा से प्रेरित स्वतंत्रतावादी कार्यकर्ता
  - शेयर बाजार में ट्रेडिंग में विशेषज्ञता रखने वाला एक उद्यमी
explanation: |
 मार्क कार्पेल्स एक फ्रांसीसी डेवलपर थे जिनका जन्म 1985 में हुआ था और उन्हें कंप्यूटर और प्रौद्योगिकी से गहरा लगाव था। उनकी प्रेरणा विचारधारा या लाभ से नहीं, बल्कि तकनीकी जिज्ञासा से प्रेरित थी।
reviewed: true
question: Trước khi tiếp quản Mt. Gox, Mark Karpelès là ai?
answer: Một nhà phát triển phần mềm với niềm đam mê công nghệ
wrong_answers:
  - Một nhà đầu tư chuyên nghiệp về tiền điện tử
  - Nhà hoạt động theo chủ nghĩa tự do, được thúc đẩy bởi tư tưởng Bitcoin
  - Một doanh nhân chuyên về giao dịch chứng khoán
explanation: |
 Mark Karpelès là một nhà phát triển người Pháp, sinh năm 1985, với niềm đam mê máy tính và công nghệ. Động lực của anh không phải là lý tưởng hay lợi nhuận, mà là sự tò mò về kỹ thuật.
reviewed: true
question: OP_EVALのオペレーションコードは、Bitcoinの内部プログラミングシステムにどのような影響を与えたのだろうか？
answer: スクリプトの中でスクリプトを実行する
wrong_answers:
  - 参加者の署名を求める
  - スクリプトを切り刻み、その結果を与えられたフットプリントと比較する。
  - 2つの値が等しいことを確認する
explanation: |
 2011年10月1日から2日にかけての夜、ByteCoinことNicolas van Saberhagenによって設計された。このオペコードは、ロックスクリプトの最後に実行される。
 スクリプトの最後に実行され、そのハッシュが与えられたフィンガープリントと比較される。
reviewed: true
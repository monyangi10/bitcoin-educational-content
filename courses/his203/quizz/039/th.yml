question: รหัสปฏิบัติการ OP_EVAL มีผลกระทบอย่างไรต่อระบบการเขียนโปรแกรมภายในของ Bitcoin?
answer: เรียกใช้สคริปต์ภายในสคริปต์
wrong_answers:
  - ขอลายเซ็นของผู้เข้าร่วม
  - ตัดสคริปต์และเปรียบเทียบผลลัพธ์กับรอยเท้าที่ให้มา
  - ตรวจสอบค่าว่าสองค่านี้เท่ากัน
explanation: |
 มันถูกอธิบายโดย Nicolas van Saberhagen หรือที่รู้จักในชื่อ ByteCoin ซึ่งออกแบบมันในคืนวันที่ 1 ถึง 2 ตุลาคม 2011 โอปโค้ดจะถูกดำเนินการเมื่อสิ้นสุดสคริปต์ล็อกเพื่อตรวจสอบความถูกต้องของสคริปต์ที่ให้มา ซึ่งแฮชของมันจะถูกเปรียบเทียบกับลายนิ้วมือที่ให้ไว้
reviewed: true
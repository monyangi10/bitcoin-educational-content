question: OP_EVAL 운영 코드는 Bitcoin의 내부 프로그래밍 시스템에 어떤 영향을 미쳤나요?
answer: 스크립트 내에서 스크립트 실행
wrong_answers:
  - 참가자의 서명 요청
  - 스크립트를 자르고 결과를 제공된 풋프린트와 비교하세요
  - 두 값이 동일한지 확인합니다
explanation: |
 2011년 10월 1일 밤부터 2일 새벽까지 바이트코인을 설계한 니콜라스 반 사버하겐이 설명했습니다. 이 연산 코드는 잠금의 끝에서 실행됩니다
 스크립트의 끝에서 실행되어 제공된 스크립트의 유효성을 평가하며, 해시는 주어진 지문과 비교됩니다.
reviewed: true
question: Какое влияние оказал операционный код OP_EVAL на внутреннюю систему программирования Bitcoin?
answer: Выполнение сценария внутри сценария
wrong_answers:
  - Запросите подписи участников
  - Выполните отбивку сценария и сравните результат с заданным отпечатком
  - Проверьте, что два значения равны
explanation: |
 Его описал Николас ван Саберхаген, он же ByteCoin, который разработал его в ночь с 1 на 2 октября 2011 года. Опкод выполняется в конце скрипта блокировки
 для оценки валидности предоставленного скрипта, хэш которого сравнивается с заданным отпечатком пальца.
reviewed: true
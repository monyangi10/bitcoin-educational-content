question: OP_EVAL के ऑपरेशन कोड का Bitcoin की आंतरिक प्रोग्रामिंग प्रणाली पर क्या प्रभाव पड़ा?
answer: स्क्रिप्ट के भीतर एक स्क्रिप्ट निष्पादित करें
wrong_answers:
  - प्रतिभागियों के हस्ताक्षर का अनुरोध करें
  - स्क्रिप्ट को काटें और परिणाम की तुलना दिए गए फुटप्रिंट से करें।
  - जांचें कि दो मान बराबर हैं
explanation: |
 इसका वर्णन निकोलस वैन सैबरहेगन, उर्फ ​​बाइटकॉइन द्वारा किया गया था, जिन्होंने इसे 1 से 2 अक्टूबर, 2011 की रात को डिजाइन किया था। लॉक स्क्रिप्ट के अंत में ऑपकोड निष्पादित किया जाता है।
 इसका उपयोग दी गई स्क्रिप्ट की वैधता का आकलन करने के लिए किया जाता है, जिसके हैश की तुलना दिए गए फिंगरप्रिंट से की जाती है।
reviewed: true
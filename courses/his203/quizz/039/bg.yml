question: Какъв е ефектът от кода на операцията OP_EVAL върху вътрешната програмна система на Bitcoin?
answer: Изпълнение на скрипт в рамките на скрипт
wrong_answers:
  - Поискайте подписите на участниците
  - Разбийте скрипт и сравнете резултата с предоставен отпечатък
  - Проверка дали две стойности са равни
explanation: |
 Той е описан от Николас ван Саберхаген, известен още като ByteCoin, който го е проектирал в нощта на 1 срещу 2 октомври 2011 г. Опкодът се изпълнява в края на заключването
 скрипт, за да се оцени валидността на предоставения скрипт, чийто хеш се сравнява с дадения пръстов отпечатък.
reviewed: true
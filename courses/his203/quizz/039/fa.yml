question: کد عملیات OP_EVAL چه تأثیری بر سیستم برنامه‌ریزی داخلی Bitcoin داشت؟
answer: اجرای یک اسکریپت درون یک اسکریپت
wrong_answers:
  - درخواست امضای شرکت‌کنندگان
  - یک اسکریپت را خرد کنید و نتیجه را با یک اثر پای ارائه شده مقایسه کنید
  - بررسی کنید که آیا دو مقدار برابر هستند
explanation: |
 این توسط نیکلاس ون سابرهاگن، معروف به بایت‌کوین، که آن را در شب اول تا دوم اکتبر ۲۰۱۱ طراحی کرد، توصیف شده است. اپ‌کد در انتهای اسکریپت قفل اجرا می‌شود تا اعتبار اسکریپت ارائه شده را ارزیابی کند، که هش آن با اثر انگشت داده شده مقایسه می‌شود.
reviewed: true
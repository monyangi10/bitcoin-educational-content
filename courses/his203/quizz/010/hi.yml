question: माउंट गोक्स के साथ प्रतिस्पर्धा करने वाला कौन सा विदेशी मुद्रा प्लेटफॉर्म दिसंबर 2010 में डेविड फ्रांकोइस द्वारा लॉन्च किया गया था?
answer: Bitcoin-सेंट्रल
wrong_answers:
  - Paymium
  - ब्रिटकॉइन
  - बिटोमेट
explanation: |
 Bitcoin-Central एक फ्रांसीसी प्लेटफॉर्म था, जो शुरू में लिबर्टी रिजर्व डॉलर और यूरो के साथ-साथ पारंपरिक यूरो हस्तांतरण भी स्वीकार करता था। इसका सोर्स कोड ओपन सोर्स लाइसेंस (AGPL) के तहत प्रकाशित किया गया था। बाद में, जून 2011 में, यह प्लेटफॉर्म Paymium में विलय हो गया, जो गोंजाग ग्रैंडवाल, पियरे नोइज़ैट और डेविड फ्रांकोइस द्वारा सह-स्थापित एक कंपनी थी, जिसका मूल रूप से ध्यान भुगतान क्षेत्र पर केंद्रित था।
reviewed: true
question: Коя платформа за обмен на валута, конкурираща се с Mt. Gox, беше стартирана през декември 2010 г. от Дейвид Франсоа?
answer: Bitcoin-Central
wrong_answers:
  - Paymium
  - Britcoin
  - Bitomat
explanation: |
 Bitcoin-Central беше френска платформа, която първоначално приемаше долари и евро от Liberty Reserve, както и конвенционални преводи в евро. Нейният изходен код е
 публикуван под лиценз с отворен код (AGPL). Впоследствие платформата се слива с Paymium, компания, съоснована от Гонзаг Грандвал, Пиер Нойзат и Давид
 Франсоа през юни 2011 г., която първоначално се фокусира върху сферата на плащанията.
reviewed: true
question: แพลตฟอร์มแลกเปลี่ยนเงินตราต่างประเทศใดที่แข่งขันกับ Mt. Gox และเปิดตัวในเดือนธันวาคม 2010 โดย David François?
answer: Bitcoin-Central
wrong_answers:
  - Paymium
  - บริตคอยน์
  - บิโตแมท
explanation: |
 Bitcoin-Central เป็นแพลตฟอร์มของฝรั่งเศส เริ่มแรกยอมรับเงินดอลลาร์และยูโรของ Liberty Reserve รวมถึงการโอนเงินยูโรแบบดั้งเดิม โค้ดต้นฉบับของแพลตฟอร์มนี้ถูกเผยแพร่ภายใต้ใบอนุญาตโอเพนซอร์ส (AGPL) ต่อมาแพลตฟอร์มนี้ได้รวมเข้ากับ Paymium บริษัทที่ก่อตั้งร่วมโดย Gonzague Grandval, Pierre Noizat และ David François ในเดือนมิถุนายน 2011 ซึ่งเดิมมุ่งเน้นไปที่โดเมนการชำระเงิน
reviewed: true
question: Platform valuta asing mana yang bersaing dengan Mt Gox yang diluncurkan pada bulan Desember 2010 oleh David François?
answer: Bitcoin-Pusat
wrong_answers:
  - Paymium
  - Britcoin
  - Bitomat
explanation: |
 Bitcoin-Central adalah platform Prancis, yang awalnya menerima Liberty Reserve dolar dan euro, serta transfer euro konvensional. Kode sumbernya adalah
 diterbitkan di bawah lisensi sumber terbuka (AGPL). Platform ini kemudian bergabung dengan Paymium, sebuah perusahaan yang didirikan oleh Gonzague Grandval, Pierre Noizat, dan David
 François pada bulan Juni 2011, yang awalnya berfokus pada domain pembayaran.
reviewed: true
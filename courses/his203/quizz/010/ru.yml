question: Какая валютная платформа, конкурирующая с Mt. Gox, была запущена в декабре 2010 года Дэвидом Франсуа?
answer: Bitcoin-Central
wrong_answers:
  - Paymium
  - Бриткойн
  - Bitomat
explanation: |
 Bitcoin-Central была французской платформой, первоначально принимавшей доллары Liberty Reserve и евро, а также обычные переводы в евро. Ее исходный код был
 опубликован под лицензией с открытым исходным кодом (AGPL). Впоследствии платформа объединилась с Paymium, компанией, основанной Гонзагом Грандвалем, Пьером Нуазатом и Давидом
 Франсуа в июне 2011 года, которая изначально была ориентирована на сферу платежей.
reviewed: true
question: Кой протокол на mining е разработен през септември 2012 г. от Марек Палатинус, известен още като Slush, за да подобри обмена между миньорите и пуловете на mining?
answer: Страт
wrong_answers:
  - Electrum
  - Getwork
  - Получаване на шаблон на блок (GBT)
explanation: |
 Stratum е протокол mining за тънки клиенти. Той бързо замени използваната дотогава елементарна функция getwork и се наложи за сметка на
 конкурентното предложение getblocktemplate.
reviewed: true
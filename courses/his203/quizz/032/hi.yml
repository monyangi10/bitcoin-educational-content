question: सितंबर 2012 में मारेक पलाटिनस, उर्फ ​​स्लश द्वारा माइनर्स और mining पूलों के बीच आदान-प्रदान को बेहतर बनाने के लिए कौन सा mining प्रोटोकॉल विकसित किया गया था?
answer: परत
wrong_answers:
  - Electrum
  - कार्य शुरू करें
  - गेटब्लॉकटेम्प्लेट (जीबीटी)
explanation: |
 स्ट्रैटम थिन क्लाइंट्स के लिए एक mining प्रोटोकॉल था। इसने शीघ्र ही तब तक उपयोग किए जाने वाले बुनियादी गेटवर्क फ़ंक्शन को प्रतिस्थापित कर दिया और प्रतिस्पर्धी गेटब्लॉकटेम्प्लेट प्रस्ताव की कीमत पर खुद को स्थापित कर लिया।
reviewed: true
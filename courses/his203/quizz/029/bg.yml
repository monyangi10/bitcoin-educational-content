question: Как се наричат физическите биткойни, направени от американския разработчик Майк Колдуел между септември 2011 г. и ноември 2013 г.?
answer: Casascius Coins
wrong_answers:
  - Битници
  - Lealana Cents
  - PrintCoins
explanation: |
 Казасиус е псевдонимът на Майк Колдуел, 33-годишен програмист, живеещ в Юта. Физическите му биткойни са били в купюри от 1 BTC, 25 BTC и други купюри, както
 както и на слитъци с номинал до 1000 BTC. Те имаха огромен успех, като през годините в тях бяха съхранени почти 100 000 биткойна.
reviewed: true
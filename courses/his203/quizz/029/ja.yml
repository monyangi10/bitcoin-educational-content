question: アメリカの開発者マイク・コールドウェルが2011年9月から2013年11月にかけて製造した現物のビットコインは何と呼ばれていたのか？
answer: カサシアスCoins
wrong_answers:
  - ビットビルズ
  - レアラナ・セント
  - プリントコイン
explanation: |
 カサシウスは、ユタ州に住む33歳の開発者、マイク・コールドウェルのペンネームだった。彼のビットコインの現物は、1BTC、25BTC、その他のデノミネーションと、最大1,000BTCのインゴットであった。
 1,000BTCまでのインゴットもある。彼らは大成功を収め、数年間で約10万ビットコインを保管した。
reviewed: true
question: Cómo se llamaban los bitcoins físicos fabricados por el desarrollador estadounidense Mike Caldwell entre septiembre de 2011 y noviembre de 2013?
answer: Casascius Coins
wrong_answers:
  - Billetes
  - Lealana Cents
  - PrintCoins
explanation: |
 Casascius era el seudónimo de Mike Caldwell, un desarrollador de 33 años residente en Utah. Sus bitcoins físicos venían en 1 BTC, 25 BTC y otras denominaciones, así como en lingotes de hasta 1.000 BTC
 así como lingotes de hasta 1.000 BTC. Han tenido un gran éxito, almacenando casi 100.000 bitcoins a lo largo de los años.
reviewed: true
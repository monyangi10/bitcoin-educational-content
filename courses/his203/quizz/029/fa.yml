question: فیزیکال بیت‌کوین‌هایی که توسط توسعه‌دهنده آمریکایی مایک کالدول بین سپتامبر ۲۰۱۱ و نوامبر ۲۰۱۳ ساخته شدند، چه نام داشتند؟
answer: کاساسیوس Coins
wrong_answers:
  - بیت‌بیلز
  - لئالانا سنتس
  - پرینت‌کوینز
explanation: |
 کاساسیوس نام مستعار مایک کالدول، توسعه‌دهنده ۳۳ ساله‌ای بود که در یوتا زندگی می‌کرد. بیت‌کوین‌های فیزیکی او در مقادیر ۱ BTC، ۲۵ BTC و سایر مقادیر، همچنین شمش‌هایی تا ۱,۰۰۰ BTC عرضه می‌شدند. آن‌ها موفقیت بزرگی بودند و در طول سال‌ها نزدیک به ۱۰۰,۰۰۰ بیت‌کوین ذخیره کردند.
reviewed: true
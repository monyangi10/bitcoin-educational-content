question: Como se chamavam as bitcoins físicas criadas pelo programador americano Mike Caldwell entre setembro de 2011 e novembro de 2013?
answer: Casascius Coins
wrong_answers:
  - Bitbills
  - Lealana Cents
  - PrintCoins
explanation: |
 Casascius era o pseudónimo de Mike Caldwell, um programador de 33 anos que vivia no Utah. As suas bitcoins físicas eram apresentadas em 1 BTC, 25 BTC e outras denominações, bem como
 bem como em lingotes de até 1.000 BTC. Foram um enorme sucesso, armazenando quase 100.000 bitcoins ao longo dos anos.
reviewed: true
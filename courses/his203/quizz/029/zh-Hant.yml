question: 美國開發者 Mike Caldwell 在 2011 年 9 月至 2013 年 11 月間製造的實物比特幣叫什麼？
answer: Casascius Coins
wrong_answers:
  - 比特喙
  - Lealana Cents
  - 印刷幣
explanation: |
 Casascius 是住在猶他州的 33 歲開發者 Mike Caldwell 的假名。他的實體比特幣有 1 BTC、25 BTC 和其他面額，以及最高達 1,000 BTC 的錠狀比特幣。
 以及高達 1,000 BTC 的金塊。他們取得了巨大的成功，多年來儲存了近 100,000 枚比特幣。
reviewed: true
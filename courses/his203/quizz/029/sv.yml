question: Vad kallades de fysiska bitcoins som den amerikanske utvecklaren Mike Caldwell tillverkade mellan september 2011 och november 2013?
answer: Casascius Coin:or
wrong_answers:
  - Bitbills
  - Lealana Cents
  - PrintCoins
explanation: |
 Casascius var pseudonymen för Mike Caldwell, en 33-årig utvecklare som bor i Utah. Hans fysiska bitcoins kom i 1 BTC, 25 BTC och andra valörer, samt
 samt i tackor på upp till 1 000 BTC. De har varit en enorm framgång och har lagrat nästan 100 000 bitcoins under åren.
reviewed: true
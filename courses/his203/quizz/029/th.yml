question: เหรียญบิตคอยน์ทางกายภาพที่สร้างโดยนักพัฒนาชาวอเมริกัน Mike Caldwell ระหว่างเดือนกันยายน 2011 ถึงพฤศจิกายน 2013 ถูกเรียกว่าอะไร?
answer: Casascius Coins
wrong_answers:
  - บิตบิลส์
  - ลีลานา เซนต์
  - พิมพ์เหรียญ
explanation: |
 Casascius เป็นนามแฝงของ Mike Caldwell นักพัฒนาวัย 33 ปีที่อาศัยอยู่ในรัฐยูทาห์ บิตคอยน์ทางกายภาพของเขามีหน่วย 1 BTC, 25 BTC และหน่วยอื่น ๆ รวมถึงแท่งโลหะที่มีมูลค่าสูงถึง 1,000 BTC พวกมันประสบความสำเร็จอย่างมาก โดยเก็บบิตคอยน์เกือบ 100,000 เหรียญตลอดหลายปีที่ผ่านมา
reviewed: true
question: 2011년 9월부터 2013년 11월까지 미국 개발자 마이크 콜드웰이 만든 실제 비트코인의 명칭은 무엇이었나요?
answer: 카사시우스 Coins
wrong_answers:
  - 비트빌
  - 레알라나 센트
  - PrintCoins
explanation: |
 카사시우스는 유타주에 거주하는 33세 개발자 마이크 콜드웰의 가명이었습니다. 그의 실물 비트코인은 1BTC, 25BTC 및 기타 단위로 제공되었습니다
 최대 1,000BTC의 잉곳도 있었습니다. 수년 동안 거의 100,000개의 비트코인을 보관하며 큰 성공을 거두었습니다.
reviewed: true
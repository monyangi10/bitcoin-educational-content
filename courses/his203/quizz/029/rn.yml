question: Ivyo bice vy’umubiri vyitwa bitcoins vyakozwe n’umuhinga mu vy’ubuhinga bw’amasanamu w’Umunyamerika yitwa Mike Caldwell hagati ya Nzero 2011 n’Ugushyingo 2013 vyitwa gute?
answer: Kasasiyo Coins
wrong_answers:
  - Amafaranga make
  - Amasenti ya Lealana
  - Gucapura ibiceri
explanation: |
 Casascius ryari izina ry’uruyeri rya Mike Caldwell, umuhinga mu vy’iterambere w’imyaka 33 yaba muri Utah. Ivyiwe vy’umubiri vyaje mu 1 BTC, 25 BTC n’ibindi bice, nk’uko 
 hamwe n’ivyuma bishika 1.000 BTC. Baciye batera imbere cane, babika ama bitcoins hafi 100.000 mu myaka iheze.
reviewed: true
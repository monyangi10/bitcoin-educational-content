question: Apa sebutan untuk bitcoin fisik yang dibuat oleh pengembang Amerika, Mike Caldwell, antara bulan September 2011 dan November 2013?
answer: Casascius Coins
wrong_answers:
  - Bitbills
  - Lealana Cents
  - PrintCoins
explanation: |
 Casascius adalah nama samaran dari Mike Caldwell, seorang pengembang berusia 33 tahun yang tinggal di Utah. Bitcoin fisiknya tersedia dalam bentuk 1 BTC, 25 BTC, dan denominasi lainnya
 serta batangan hingga 1.000 BTC. Mereka telah sukses besar, menyimpan hampir 100.000 bitcoin selama bertahun-tahun.
reviewed: true
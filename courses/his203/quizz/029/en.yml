question: What were the physical bitcoins made by American developer Mike Caldwell between September 2011 and November 2013 called?
answer: Casascius Coins
wrong_answers:
  - Bitbills
  - Lealana Cents
  - PrintCoins
explanation: |
 Casascius was the pseudonym of Mike Caldwell, a 33-year-old developer living in Utah. His physical bitcoins came in 1 BTC, 25 BTC and other denominations, as well as ingots of up to 1,000 BTC. They have been a huge success, storing almost 100,000 bitcoins over the years.

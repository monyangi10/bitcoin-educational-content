question: Comment étaient appelés les bitcoins physiques fabriqués par le développeur américain Mike Caldwell entre septembre 2011 et novembre 2013 ?
answer: Les Casascius Coins
wrong_answers:
  - Les Bitbills
  - Les Lealana Cents
  - Les PrintCoins
explanation: |
 Casascius était le pseudonyme de Mike Caldwell, un développeur de 33 ans habitant dans l'Utah. Ses bitcoins physiques ont été déclinés en des pièces de 1 BTC, de 25 BTC et d'autres valeurs, ainsi qu'en lingots allant jusqu'à 1 000 BTC. Ils ont connu un énorme succès, et ont servi à stocker près de 100 000 bitcoins au fil des années.

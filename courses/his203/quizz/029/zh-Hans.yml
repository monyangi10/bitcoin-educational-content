question: 美国开发者迈克-考德威尔在 2011 年 9 月至 2013 年 11 月期间制作的实物比特币叫什么？
answer: 卡萨西乌斯 Coins
wrong_answers:
  - 比特喙
  - Lealana Cents
  - 印制硬币
explanation: |
 Casascius 是居住在犹他州的 33 岁开发者 Mike Caldwell 的笔名。他的比特币实物有 1 BTC、25 BTC 和其他面值，还有高达 1,000 BTC 的锭子。
 以及高达 1,000 BTC 的币锭。这些比特币获得了巨大成功，多年来储存了近 10 万枚比特币。
reviewed: true
question: Những đồng bitcoin vật lý do nhà phát triển người Mỹ Mike Caldwell tạo ra trong khoảng thời gian từ tháng 9 năm 2011 đến tháng 11 năm 2013 được gọi là gì?
answer: Casascius Coins
wrong_answers:
  - Bitbills
  - Lealana Cents
  - In tiền xu
explanation: |
 Casascius là bút danh của Mike Caldwell, một nhà phát triển 33 tuổi sống ở Utah. Bitcoin vật lý của anh ta có các mệnh giá 1 BTC, 25 BTC và các mệnh giá khác, cũng như các thỏi lên đến 1.000 BTC. Chúng đã rất thành công, lưu trữ gần 100.000 bitcoin trong nhiều năm.
reviewed: true
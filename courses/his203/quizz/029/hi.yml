question: अमेरिकी डेवलपर माइक कैल्डवेल द्वारा सितंबर 2011 और नवंबर 2013 के बीच बनाए गए भौतिक बिटकॉइन को क्या कहा जाता था?
answer: कैसासियस Coin
wrong_answers:
  - बिटबिल्स
  - लीलाना सेंट्स
  - सिक्के छापें
explanation: |
 कैसासियस, यूटा में रहने वाले 33 वर्षीय डेवलपर माइक कैल्डवेल का छद्म नाम था। उनके द्वारा बेचे जाने वाले बिटकॉइन 1 BTC, 25 BTC और अन्य मूल्यवर्गों में उपलब्ध थे,
 साथ ही 1,000 BTC तक के सिल्लियों में भी। ये बिटकॉइन बेहद सफल रहे हैं और वर्षों में लगभग 100,000 बिटकॉइन इनमें संग्रहित किए गए हैं।
reviewed: true
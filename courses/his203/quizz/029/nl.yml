question: Hoe werden de fysieke bitcoins genoemd die de Amerikaanse ontwikkelaar Mike Caldwell maakte tussen september 2011 en november 2013?
answer: Casascius Coin's
wrong_answers:
  - Bitbills
  - Lealana centen
  - Afdrukken
explanation: |
 Casascius was het pseudoniem van Mike Caldwell, een 33-jarige ontwikkelaar die in Utah woont. Zijn fysieke bitcoins waren er in 1 BTC, 25 BTC en andere waarden, maar ook in baren tot 1.000 BTC
 maar ook in baren tot 1000 BTC. Ze waren een groot succes en hebben in de loop der jaren bijna 100.000 bitcoins opgeslagen.
reviewed: true
question: Bitcoin halisi zilizotengenezwa na msanidi programu wa Marekani Mike Caldwell kati ya Septemba 2011 na Novemba 2013 ziliitwaje?
answer: Casascius Coins
wrong_answers:
  - Bili za Bitbill
  - Lealana Cents
  - Sarafu za Kuchapisha
explanation: |
 Casascius alikuwa jina bandia la Mike Caldwell, msanidi programu mwenye umri wa miaka 33 anayeishi Utah. Bitcoin zake halisi zilikuja katika 1 BTC, 25 BTC na aina zingine, pamoja na ingots za hadi 1,000 BTC. Zimekuwa mafanikio makubwa, zikihifadhi karibu bitcoins 100,000 kwa miaka mingi.
reviewed: true
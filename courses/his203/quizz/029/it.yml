question: Come si chiamavano i bitcoin fisici realizzati dallo sviluppatore americano Mike Caldwell tra settembre 2011 e novembre 2013?
answer: Casascius Coins
wrong_answers:
  - Bitbills
  - Lealana Cents
  - Monete da stampa
explanation: |
 Casascius era lo pseudonimo di Mike Caldwell, uno sviluppatore di 33 anni residente nello Utah. I suoi bitcoin fisici erano disponibili in tagli da 1 BTC, 25 BTC e altri tagli, oltre che in lingotti fino a 1.000 BTC
 nonché lingotti fino a 1.000 BTC. Il successo è stato enorme: nel corso degli anni ha immagazzinato quasi 100.000 bitcoin.
reviewed: true
question: Как назывались физические биткоины, созданные американским разработчиком Майком Колдуэллом в период с сентября 2011 по ноябрь 2013 года?
answer: Casascius Coins
wrong_answers:
  - Битбилы
  - Лилана Центов
  - PrintCoins
explanation: |
 Casascius был псевдонимом Майка Колдуэлла, 33-летнего разработчика, живущего в штате Юта. Его физические биткоины были представлены в виде 1 BTC, 25 BTC и других номиналов, а также
 а также в виде слитков до 1 000 BTC. Они пользовались огромным успехом, за несколько лет в них хранилось почти 100 000 биткоинов.
reviewed: true
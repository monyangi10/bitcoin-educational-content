question: Ni sababu gani kuu iliyofanya harakati za Occupy Wall Street zianze kukubali michango ya bitcoin mnamo Septemba 2011?
answer: Kukwepa udhibiti wa kifedha
wrong_answers:
  - Kufaidika na akiba ya thamani ya muda mrefu
  - Kuingiza taarifa kuhusu blockchain
  - Kununua vifaa kwenye Barabara ya Hariri
explanation: |
  Harakati hii ilipitisha Bitcoin ili kuepuka udhibiti wa kifedha baada ya baadhi ya akaunti zake za PayPal kufungiwa. Matokeo yake, mkutano mkuu wa waandamanaji mjini
  New York ulipokea michango mapema Septemba 19, kwa jumla ya BTC 686 au zaidi ya $3,000 wakati wa kupokelewa.
reviewed: true
question: ウォール街を占拠せよ」運動が2011年9月にビットコインによる寄付の受付を開始した主な理由は？
answer: 金融検閲を回避するために
wrong_answers:
  - 長期積立金の恩恵を受ける
  - ブロックチェーンに情報を入力するには
  - シルクロードで物資を購入する
explanation: |
  この運動は、ペイパル口座の一部が凍結された後、金融検閲から逃れるためにBitcoinを採用した。その結果、ニューヨークで開かれた抗議者たちの総会には、9月19日という早い時期から寄付が寄せられた。
  ニューヨークでは、9月19日に早くも686BTC、つまり3000ドル以上の寄付を受け取った。
reviewed: true
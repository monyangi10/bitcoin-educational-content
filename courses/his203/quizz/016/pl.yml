question: Jaki był główny powód, dla którego ruch Occupy Wall Street zaczął przyjmować darowizny w bitcoinach we wrześniu 2011 roku?
answer: Aby obejść cenzurę finansową
wrong_answers:
  - Aby skorzystać z długoterminowej rezerwy wartości
  - Aby wprowadzić informacje do łańcucha bloków
  - Aby kupić zapasy na Jedwabnym Szlaku
explanation: |
  Ruch ten przyjął Bitcoin, aby uniknąć cenzury finansowej po tym, jak niektóre z jego kont PayPal zostały zamrożone. W rezultacie walne zgromadzenie protestujących w Nowym Jorku
  Nowy Jork otrzymało darowizny już 19 września, na łączną kwotę 686 BTC lub ponad 3000 USD w momencie ich otrzymania.
reviewed: true
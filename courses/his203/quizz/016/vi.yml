question: Lý do chính khiến phong trào Chiếm phố Wall bắt đầu chấp nhận quyên góp bằng bitcoin vào tháng 9 năm 2011 là gì?
answer: Để tránh bị kiểm duyệt tài chính
wrong_answers:
  - Để hưởng lợi từ khoản dự trữ giá trị dài hạn
  - Để nhập thông tin lên blockchain
  - Mua sắm vật phẩm trên Con đường tơ lụa
explanation: |
  Phong trào này đã sử dụng Bitcoin để tránh bị kiểm duyệt tài chính sau khi một số tài khoản PayPal của họ bị đóng băng. Kết quả là, đại hội đồng của những người biểu tình ở New York đã nhận được các khoản quyên góp ngay từ ngày 19 tháng 9, với tổng cộng 686 BTC, tương đương hơn 3.000 đô la vào thời điểm nhận được.
reviewed: true
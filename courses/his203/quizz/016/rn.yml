question: Ni igiki nyamukuru catumye umuhari Occupy Wall Street utangura kwemera intererano z’amahera ya bitcoin muri Nzero 2011?
answer: Kugira ngo umuntu yirengagize ugucengera ivy’amahera
wrong_answers:
  - Kugira ngo wungukire ku bubiko bw'agaciro bw'igihe kirekire
  - Kugira ngo winjize amakuru ku rubuga rwa blockchain
  - Kugura ibikoresho ku nzira ya Silk
explanation: |
  Iryo shirahamwe ryafashe Bitcoin kugira ngo rihunge ugucengera ivy’amahera inyuma y’aho zimwe mu makonti zayo za PayPal zifunzwe. Ivyo vyatumye ikoraniro rusangi ry’abanyagihugu bariko bariyamiriza mu 1914 riba.
  New York yararonse intererano kuva ku wa 19 Nzero, zose hamwe zikaba zari 686 BTC canke amadolari arenga 3.000 igihe zaronka intererano.
reviewed: true
question: دلیل اصلی که جنبش Occupy Wall Street در سپتامبر 2011 شروع به پذیرش کمک‌های بیت‌کوین کرد چه بود؟
answer: برای دور زدن سانسور مالی
wrong_answers:
  - برای بهره‌مندی از یک ذخیره ارزش بلندمدت
  - برای وارد کردن اطلاعات در بلاکچین
  - برای خرید لوازم در جاده ابریشم
explanation: |
  این جنبش Bitcoin را برای فرار از سانسور مالی پس از مسدود شدن برخی از حساب‌های پی‌پال خود اتخاذ کرد. در نتیجه، مجمع عمومی معترضان در نیویورک از اوایل ۱۹ سپتامبر کمک‌های مالی دریافت کرد که مجموعاً به ۶۸۶ BTC یا بیش از ۳,۰۰۰ دلار در زمان دریافت رسید.
reviewed: true
question: เหตุผลหลักที่ทำให้การเคลื่อนไหว Occupy Wall Street เริ่มรับบริจาคบิตคอยน์ในเดือนกันยายน 2011 คืออะไร?
answer: เพื่อหลีกเลี่ยงการเซ็นเซอร์ทางการเงิน
wrong_answers:
  - เพื่อประโยชน์จากการสำรองมูลค่าระยะยาว
  - เพื่อป้อนข้อมูลบนบล็อกเชน
  - ซื้อเสบียงบนเส้นทางสายไหม
explanation: |
  ขบวนการนี้ได้นำ Bitcoin มาใช้เพื่อหลีกเลี่ยงการเซ็นเซอร์ทางการเงินหลังจากบัญชี PayPal บางบัญชีของพวกเขาถูกระงับ ส่งผลให้การประชุมใหญ่ของผู้ประท้วงในนิวยอร์กได้รับเงินบริจาคตั้งแต่วันที่ 19 กันยายน รวมเป็นจำนวน 686 BTC หรือมากกว่า $3,000 ในขณะนั้น
reviewed: true
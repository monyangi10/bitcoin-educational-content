question: Wat was de belangrijkste reden waarom de Occupy Wall Street-beweging in september 2011 begon met het accepteren van bitcoin-donaties?
answer: Financiële censuur omzeilen
wrong_answers:
  - Profiteren van een langetermijnwaardereserve
  - Informatie invoeren op de blockchain
  - Voorraden kopen op de zijderoute
explanation: |
  Deze beweging nam Bitcoin aan om aan de financiële censuur te ontsnappen nadat enkele van haar PayPal-rekeningen waren bevroren. Als gevolg hiervan ontving de algemene vergadering van de demonstranten in
  New York al op 19 september donaties ontvangen, voor een totaal van 686 BTC of meer dan $3.000 op het moment van ontvangst.
reviewed: true
question: Какова основная причина, по которой движение Occupy Wall Street начало принимать пожертвования в биткоинах в сентябре 2011 года?
answer: Чтобы обойти финансовую цензуру
wrong_answers:
  - Чтобы воспользоваться долгосрочным резервом стоимости
  - Чтобы ввести информацию в блокчейн
  - Чтобы купить товары на Шелковом пути
explanation: |

question: Qual è stato il motivo principale per cui il movimento Occupy Wall Street ha iniziato ad accettare donazioni in bitcoin nel settembre 2011?
answer: Per aggirare la censura finanziaria
wrong_answers:
  - Beneficiare di una riserva di valore a lungo termine
  - Per inserire informazioni nella blockchain
  - Per acquistare forniture sulla Via della Seta
explanation: |
  Questo movimento ha adottato Bitcoin per sfuggire alla censura finanziaria dopo che alcuni dei suoi conti PayPal erano stati congelati. Di conseguenza, l'assemblea generale dei manifestanti di
  New York ha ricevuto donazioni già il 19 settembre, per un totale di 686 BTC o oltre 3.000 dollari al momento della ricezione.
reviewed: true
question: Коя беше основната причина движението Occupy Wall Street да започне да приема дарения в биткойни през септември 2011 г.?
answer: Заобикаляне на финансовата цензура
wrong_answers:
  - Да се възползвате от дългосрочен резерв на стойност
  - Въвеждане на информация в блокчейна
  - За закупуване на консумативи по Пътя на коприната
explanation: |
  Това движение прие Bitcoin, за да избегне финансовата цензура, след като някои от сметките му в PayPal бяха замразени. В резултат на това общото събрание на протестиращите в
  Ню Йорк получи дарения още на 19 септември на обща стойност 686 BTC или над 3000 долара към момента на получаването им.
reviewed: true
question: सितंबर 2011 में ऑक्युपाई वॉल स्ट्रीट आंदोलन द्वारा बिटकॉइन दान स्वीकार करना शुरू करने का मुख्य कारण क्या था?
answer: वित्तीय सेंसरशिप को दरकिनार करने के लिए
wrong_answers:
  - दीर्घकालिक मूल्य भंडार से लाभ उठाने के लिए
  - ब्लॉकचेन पर जानकारी दर्ज करने के लिए
  - सिल्क रोड पर सामान खरीदने के लिए
explanation: |
  कुछ पेपाल खातों के फ्रीज होने के बाद वित्तीय सेंसरशिप से बचने के लिए इस आंदोलन ने Bitcoin को अपनाया। परिणामस्वरूप, प्रदर्शनकारियों की न्यूयॉर्क स्थित आम सभा को 19 सितंबर से ही दान प्राप्त होने लगे, कुल मिलाकर 686 BTC या प्राप्ति के समय 3,000 डॉलर से अधिक की राशि प्राप्त हुई।
reviewed: true
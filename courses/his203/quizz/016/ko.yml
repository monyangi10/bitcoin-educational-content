question: 2011년 9월부터 월스트리트 점령 운동이 비트코인 기부를 받기 시작한 주된 이유는 무엇인가요?
answer: 금융 검열을 우회하려면
wrong_answers:
  - 장기 가치 보유의 혜택을 누리려면
  - 블록체인에 정보를 입력하려면 다음과 같이 하세요
  - 실크로드에서 소모품 구매하기
explanation: |
  이 운동은 일부 페이팔 계정이 동결된 후 금융 검열을 피하기 위해 Bitcoin을 채택했습니다. 그 결과, 뉴욕에서 열린 시위대의 총회에서
  뉴욕에서는 9월 19일에 총 686개의 BTC, 즉 3,000달러가 넘는 기부금이 접수되었습니다.
reviewed: true
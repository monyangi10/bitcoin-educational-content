question: Was war der Hauptgrund dafür, dass die Occupy-Wall-Street-Bewegung im September 2011 begann, Bitcoin-Spenden zu akzeptieren?
answer: Um die Finanzzensur zu umgehen
wrong_answers:
  - Von einer langfristigen Wertreserve profitieren
  - So geben Sie Informationen in die Blockchain ein
  - Kauf von Waren auf der Seidenstraße
explanation: |
  Diese Bewegung wählte Bitcoin, um der finanziellen Zensur zu entgehen, nachdem einige ihrer PayPal-Konten eingefroren worden waren. Infolgedessen erhielt die Generalversammlung der Demonstranten in
  New York bereits am 19. September Spenden in Höhe von insgesamt 686 BTC oder mehr als 3.000 $ zum Zeitpunkt des Eingangs erhalten.
reviewed: true
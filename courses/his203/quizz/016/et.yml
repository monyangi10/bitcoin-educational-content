question: Mis oli peamine põhjus, miks liikumine Occupy Wall Street hakkas 2011. aasta septembris bitcoini annetusi vastu võtma?
answer: Rahalise tsensuuri vältimiseks
wrong_answers:
  - Pikaajalise väärtusreservi kasutamine
  - Andmete sisestamine plokiahelasse
  - Siiditeel asjade ostmiseks
explanation: |
  See liikumine võttis Bitcoin kasutusele, et pääseda rahalisest tsensuurist pärast seda, kui mõned tema PayPal-kontod külmutati. Selle tulemusel toimus protestijate üldkoosolek aastal
  New Yorgis juba 19. septembril annetusi, kokku 686 BTC ehk üle 3000 USA dollari, kui need laekusid.
reviewed: true
question: Wall Street'i İşgal Et hareketinin Eylül 2011'de bitcoin bağışlarını kabul etmeye başlamasının ana nedeni neydi?
answer: Finansal sansürü aşmak için
wrong_answers:
  - Uzun vadeli bir değer rezervinden yararlanmak
  - Blok zincirine bilgi girmek için
  - İpek Yolu'nda malzeme satın almak için
explanation: |
  Bu hareket, bazı PayPal hesaplarının dondurulmasının ardından mali sansürden kaçmak için Bitcoin'ı benimsedi. Sonuç olarak, protestocuların genel kurulu
  New York, 19 Eylül gibi erken bir tarihte toplam 686 BTC veya alındığı tarihte 3.000 $'ın üzerinde bağış almıştır.
reviewed: true
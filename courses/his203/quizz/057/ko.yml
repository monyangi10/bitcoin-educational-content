question: 2011년 4월 15일에 포커 플레이어들이 "블랙 프라이데이"라고 부른 이벤트는 무엇인가요?
answer: 미국의 주요 온라인 포커 플랫폼이 UIGEA를 우회했다는 이유로 FBI에 의해 폐쇄되었습니다
wrong_answers:
  - 일부 온라인 포커 사이트에서 레이크 및 바이인 수수료에 대한 주요 프로모션을 제공했습니다
  - 온라인 포커 소프트웨어의 중대한 결함으로 인해 자금이 보석과 골프공 구매로 전용될 수 있었습니다
  - 아마추어 선수 크리스 머니메이커가 온라인 훈련 후 월드 포커 챔피언십 메인 토너먼트에서 우승했습니다
explanation: |
 이들은 기존 판매자로 위장하여 은행이 수신 이체를 확인하도록 한 혐의로 기소되었는데, 이는 불법 인터넷 도박
 2006년의 시행법. 이 폐쇄는 온라인 포커 업계에 재앙과도 같은 일이었습니다. 이는 여러 비트코인 포커 플랫폼의 탄생을 촉발시켰습니다
 암호화폐는 동일한 제한이 적용되지 않았기 때문입니다.
reviewed: true
question: Welches Ereignis am 15. April 2011 wurde von Pokerspielern als "Black Friday" bezeichnet?
answer: Schließung der wichtigsten US-Online-Poker-Plattformen durch das FBI wegen Umgehung des UIGEA
wrong_answers:

question: Peristiwa apa pada tanggal 15 April 2011 yang dijuluki "Black Friday" oleh para pemain poker?
answer: Menutup platform poker online utama AS oleh FBI karena menghindari UIGEA
wrong_answers:
  - Tawaran beberapa situs poker online menawarkan promosi besar-besaran untuk biaya penggaruk dan pembelian
  - Cacat utama dalam perangkat lunak poker online memungkinkan dana dialihkan untuk membeli perhiasan dan bola golf
  - Pemain amatir Chris Moneymaker memenangkan turnamen utama Kejuaraan Poker Dunia setelah berlatih secara online

 Mereka dituduh menyamar sebagai pedagang konvensional agar bank mereka memvalidasi transfer masuk, yang dilarang oleh Undang-Undang Penegakan Perjudian Internet yang Melanggar Hukum
 Undang-Undang Penegakan Hukum tahun 2006. Penutupan ini merupakan bencana bagi industri poker online. Ini mendorong terciptanya beberapa platform poker bitcoin, karena

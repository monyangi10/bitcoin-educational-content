question: Ni tukio gani lililofanyika Aprili 15, 2011 lililopewa jina la "Ijumaa Nyeusi" na wachezaji wa poka?
answer: FBI yafunga majukwaa makubwa ya poker mtandaoni ya Marekani kwa kukwepa UIGEA
wrong_answers:
  - Ofa ya baadhi ya tovuti za poka mtandaoni ilitoa ofa kubwa kwenye ada za reki na kununua
  - Dosari kubwa katika programu ya poka mtandaoni iliruhusu fedha kuelekezwa kununua vito na mipira ya gofu
  - Mchezaji wa Amateur Chris Moneymaker ameshinda mashindano makuu ya Mashindano ya Poker Duniani baada ya kufanya mazoezi mtandaoni
explanation: |
 Walishutumiwa kwa kujifanya wafanyabiashara wa kawaida ili kuzifanya benki zao kuthibitisha uhamisho unaoingia, ambao ulipigwa marufuku na Sheria ya Utekelezaji wa Kamari za Mtandaoni Isiyo halali ya 2006. Kufungwa huku kulikuwa na madhara makubwa kwa tasnia ya poka mtandaoni. Kulisababisha kuundwa kwa majukwaa kadhaa ya poka ya bitcoin, kwani sarafu ya kidijitali haikuwa chini ya vikwazo sawa.
reviewed: true
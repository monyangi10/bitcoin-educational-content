question: 15 अप्रैल, 2011 को हुई किस घटना को पोकर खिलाड़ियों ने "ब्लैक फ्राइडे" का नाम दिया था?
answer: UIGEA का उल्लंघन करने के आरोप में FBI ने अमेरिका के प्रमुख ऑनलाइन पोकर प्लेटफॉर्मों को बंद कर दिया।
wrong_answers:
  - कुछ ऑनलाइन पोकर साइटों ने रेक और बाय-इन फीस पर बड़े-बड़े डिस्काउंट ऑफर किए।
  - ऑनलाइन पोकर सॉफ्टवेयर में एक बड़ी खामी के कारण धनराशि का दुरुपयोग गहने और गोल्फ बॉल खरीदने के लिए किया जा सका।
  - शौकिया खिलाड़ी क्रिस मनीमेकर ने ऑनलाइन प्रशिक्षण के बाद विश्व पोकर चैंपियनशिप का मुख्य टूर्नामेंट जीत लिया है।
explanation: |
 उन पर आरोप था कि वे बैंकों से आने वाले धन हस्तांतरणों को मान्य करवाने के लिए पारंपरिक व्यापारियों का रूप धारण कर रहे थे, जो गैरकानूनी इंटरनेट जुआ प्रवर्तन अधिनियम 2006 द्वारा प्रतिबंधित था। यह बंद ऑनलाइन पोकर उद्योग के लिए विनाशकारी साबित हुआ। इसने कई बिटकॉइन पोकर प्लेटफॉर्मों के निर्माण को प्रेरित किया, क्योंकि क्रिप्टोकरेंसी पर समान प्रतिबंध लागू नहीं थे।
reviewed: true
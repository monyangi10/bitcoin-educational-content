question: چه رویدادی در ۱۵ آوریل ۲۰۱۱ توسط بازیکنان پوکر "جمعه سیاه" نامیده شد؟
answer: تعطیلی پلتفرم‌های اصلی پوکر آنلاین ایالات متحده توسط FBI به دلیل دور زدن UIGEA
wrong_answers:
  - پیشنهاد برخی از سایت‌های پوکر آنلاین شامل تبلیغات عمده بر روی هزینه‌های ریک و خرید ورودی بود
  - نقص عمده در نرم‌افزار پوکر آنلاین باعث شد که وجوه برای خرید جواهرات و توپ‌های گلف منحرف شوند.
  - بازیکن آماتور کریس مانی‌میکر پس از تمرین آنلاین، برنده‌ی تورنمنت اصلی مسابقات جهانی پوکر شد.
explanation: |
 آن‌ها متهم شدند که به عنوان بازرگانان معمولی ظاهر شده‌اند تا بانک‌هایشان انتقال‌های ورودی را که توسط قانون اجرای ممنوعیت قمار اینترنتی غیرقانونی سال ۲۰۰۶ ممنوع شده بود، تأیید کنند. این تعطیلی برای صنعت پوکر آنلاین فاجعه‌بار بود. این امر منجر به ایجاد چندین پلتفرم پوکر بیت‌کوین شد، زیرا ارز دیجیتال مشمول همان محدودیت‌ها نبود.
reviewed: true
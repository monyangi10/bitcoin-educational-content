question: เหตุการณ์ใดในวันที่ 15 เมษายน 2011 ที่ถูกขนานนามว่า "Black Friday" โดยผู้เล่นโป๊กเกอร์?
answer: ปิดแพลตฟอร์มโป๊กเกอร์ออนไลน์หลักในสหรัฐฯ โดย FBI เนื่องจากหลีกเลี่ยง UIGEA
wrong_answers:
  - ข้อเสนอของบางเว็บไซต์โป๊กเกอร์ออนไลน์เสนอโปรโมชั่นใหญ่เกี่ยวกับค่าธรรมเนียมเรคและบายอิน
  - ข้อบกพร่องสำคัญในซอฟต์แวร์โป๊กเกอร์ออนไลน์ทำให้สามารถเบี่ยงเบนเงินไปซื้อเครื่องประดับและลูกกอล์ฟ
  - ผู้เล่นสมัครเล่น Chris Moneymaker ชนะการแข่งขันหลักของ World Poker Championship หลังจากฝึกฝนออนไลน์
explanation: |
 พวกเขาถูกกล่าวหาว่าแอบอ้างเป็นพ่อค้าทั่วไปเพื่อให้ธนาคารของพวกเขายืนยันการโอนเงินที่เข้ามา ซึ่งถูกห้ามโดยกฎหมายบังคับใช้การพนันทางอินเทอร์เน็ตที่ผิดกฎหมายปี 2006 การปิดตัวนี้เป็นหายนะสำหรับอุตสาหกรรมโป๊กเกอร์ออนไลน์ มันกระตุ้นให้เกิดการสร้างแพลตฟอร์มโป๊กเกอร์บิตคอยน์หลายแห่ง เนื่องจากสกุลเงินดิจิทัลไม่ได้อยู่ภายใต้ข้อจำกัดเดียวกัน
reviewed: true
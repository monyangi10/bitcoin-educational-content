question: Кое събитие на 15 април 2011 г. беше наречено от покер играчите "черен петък"?
answer: ФБР спира големите американски платформи за онлайн покер заради заобикаляне на UIGEA
wrong_answers:
  - Оферта на някои сайтове за онлайн покер, предлагащи големи промоции на рейк и таксите за вход
  - Сериозен недостатък в софтуера за онлайн покер е позволил средствата да бъдат пренасочени за закупуване на бижута и топки за голф
  - Аматьорът Крис Монимейкър спечели основния турнир на World Poker Championship след онлайн обучение
explanation: |
 Те бяха обвинени, че са се представяли за обикновени търговци, за да накарат банките си да потвърдят входящите преводи, които са забранени от Закона за незаконните хазартни игри в интернет
 От 2006 г. Това затваряне беше катастрофално за онлайн покер индустрията. То подтикна създаването на няколко платформи за покер с биткойни, като
 криптовалутата не подлежеше на същите ограничения.
reviewed: true
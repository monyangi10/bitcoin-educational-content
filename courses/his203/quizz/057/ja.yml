question: 2011年4月15日、ポーカープレイヤーの間で「ブラックフライデー」と呼ばれたイベントは？
answer: UIGEAを回避したとして、FBIが米国の主要オンラインポーカープラットフォームを閉鎖した。
wrong_answers:
  - いくつかのオンラインポーカーサイトが、レーキとバイインフィーのメジャープロモーションを提供した。
  - オンライン・ポーカー・ソフトウェアの重大な欠陥により、資金が宝石やゴルフボールの購入に流用されていた。
  - アマチュアプレイヤーのクリス・マネーメーカーが、オンライントレーニングの末、世界ポーカー選手権のメイントーナメントで優勝した。
explanation: |
 彼らは、2006年の違法インターネット・ギャンブル取締法で禁止されている送金の有効性を銀行に確認させるために、従来の加盟店を装ったとして告発された。
 2006年に施行された法律で禁止されていた。この閉鎖はオンラインポーカー業界にとって悲惨なものだった。この閉鎖はオンラインポーカー業界にとって大惨事となった。
 暗号通貨は同じ制限を受けなかったからです。
reviewed: true
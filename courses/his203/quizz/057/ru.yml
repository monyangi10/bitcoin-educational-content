question: Какое событие 15 апреля 2011 года игроки в покер прозвали "черной пятницей"?
answer: ФБР закрыло крупнейшие американские платформы для онлайн-покера за обход UIGEA
wrong_answers:
  - Некоторые сайты онлайн-покера предлагают крупные акции на рейк и бай-ин
  - Крупный недостаток в программном обеспечении для онлайн-покера позволял перенаправлять средства на покупку ювелирных изделий и мячей для гольфа
  - Игрок-любитель Крис Монеймейкер выиграл главный турнир чемпионата мира по покеру после тренировки в режиме онлайн
explanation: |
 Их обвинили в том, что они выдавали себя за обычных торговцев, чтобы заставить свои банки подтвердить входящие переводы, которые были запрещены Законом о незаконных азартных играх в Интернете (Unlawful Internet Gambling Enforcement Act 2006)
 Закон о незаконных азартных играх в интернете от 2006 года. Это закрытие стало катастрофой для индустрии онлайн-покера. Оно послужило толчком к созданию нескольких покерных платформ на основе биткоина, поскольку
 криптовалюта не подвергалась тем же ограничениям.
reviewed: true
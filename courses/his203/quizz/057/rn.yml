question: Ni ikihe kintu cabaye ku wa 15 Ndamukiza 2011 abakinyi ba poker bita "Black Friday"?
answer: Gufunga ama platforms akomeye yo kuri internet yo muri Amerika na FBI kubera gukingira UIGEA
wrong_answers:
  - Itangazo ry'imbuga zimwe zimwe zo kuri interineti za poker ryatanga ama promotion akomeye ku mafaranga yo gutera no kugura
  - Ikosa rikomeye muri porogaramu ya poker yo kuri internet ryatumye amahera akoreshwa mu kugura amabuye y'agaciro n'imipira ya golf
  - Umukinyi w'umupira w'amaguru Chris Moneymaker yatsinze ihiganwa rikomeye ry'igikombe c'isi c'umupira w'amaguru wa Poker inyuma yo kwimenyereza kuri internet 
explanation: |
 Bagirizwa ko bigira nk’abadandaza basanzwe kugira ngo amabanki yabo yemeze ko amahera yinjiye, ivyo bikaba vyari bibujijwe n’Itegeko ry’Urukino rwo kuri Internet rutemewe n’amategeko . 
 Itegeko ry’ugushirwa mu ngiro ryo mu 2006. Ukwo gufunga kwari akaga ku bijanye n’ubuhinga bwo gukina poker kuri Internet. Ivyo vyatumye habaho ama platforms menshi yo gukina poker bitcoin, nk’uko 
 cryptocurrency ntiyari itegekanijwe n’ivyo bibujijwe.
reviewed: true
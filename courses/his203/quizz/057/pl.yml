question: Jakie wydarzenie z 15 kwietnia 2011 roku zostało nazwane przez pokerzystów "Czarnym Piątkiem"?
answer: Zamknięcie głównych amerykańskich platform pokera online przez FBI za obchodzenie UIGEA
wrong_answers:
  - Oferta niektórych serwisów pokerowych online oferowała duże promocje na prowizje i opłaty za wpisowe
  - Poważny błąd w oprogramowaniu do pokera online pozwolił na przekierowanie środków na zakup biżuterii i piłek golfowych
  - Gracz-amator Chris Moneymaker wygrał turniej główny World Poker Championship po treningu online
explanation: |
 Oskarżono ich o podszywanie się pod konwencjonalnych sprzedawców w celu nakłonienia ich banków do zatwierdzenia przelewów przychodzących, co było zabronione przez ustawę Unlawful Internet Gambling
 Internet Gambling Enforcement Act z 2006 roku. To zamknięcie było katastrofalne dla branży pokera online. Skłoniło to do utworzenia kilku platform pokerowych bitcoin, ponieważ kryptowaluta
 kryptowaluta nie podlegała tym samym ograniczeniom.
reviewed: true
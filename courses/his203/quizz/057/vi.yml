question: Sự kiện nào diễn ra vào ngày 15 tháng 4 năm 2011 được giới chơi poker gọi là "Thứ Sáu Đen"?
answer: Cục Điều tra Liên bang Mỹ (FBI) đã đóng cửa các nền tảng poker trực tuyến lớn vì vi phạm luật UIGEA
wrong_answers:
  - Một số trang web chơi poker trực tuyến đang cung cấp các chương trình khuyến mãi lớn về phí hoa hồng và phí tham gia
  - Lỗi nghiêm trọng trong phần mềm chơi poker trực tuyến đã cho phép tiền bị chuyển hướng để mua đồ trang sức và bóng golf
  - Chris Moneymaker, một người chơi nghiệp dư, đã giành chiến thắng giải đấu chính của Giải vô địch Poker thế giới sau thời gian luyện tập trực tuyến
explanation: |
 Họ bị cáo buộc giả mạo là các thương nhân truyền thống để yêu cầu ngân hàng xác nhận các khoản chuyển tiền đến, điều này bị cấm theo Đạo luật Thực thi Cờ bạc Trực tuyến Bất hợp pháp năm 2006. Việc đóng cửa này là thảm họa đối với ngành công nghiệp poker trực tuyến. Nó đã thúc đẩy sự ra đời của một số nền tảng poker bằng bitcoin, vì tiền điện tử này không chịu những hạn chế tương tự.
reviewed: true
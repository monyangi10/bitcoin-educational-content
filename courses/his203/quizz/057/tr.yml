question: 15 Nisan 2011 tarihinde poker oyuncuları tarafından "Kara Cuma" olarak adlandırılan olay hangisidir?
answer: UIGEA'yı deldiği gerekçesiyle ABD'nin önde gelen online poker platformları FBI tarafından kapatıldı
wrong_answers:
  - Bazı online poker sitelerinin komisyon ve giriş ücretlerinde büyük promosyonlar sunması
  - Çevrimiçi poker yazılımındaki büyük hata, fonların mücevher ve golf topu satın almak için yönlendirilmesine izin verdi
  - Amatör oyuncu Chris Moneymaker, internet üzerinden antrenman yaptıktan sonra Dünya Poker Şampiyonası'nın ana turnuvasını kazandı

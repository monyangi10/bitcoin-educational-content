 Yasadışı İnternet Kumar Yasası tarafından yasaklanan gelen transferleri bankalarına onaylatmak için geleneksel tüccarlar gibi davranmakla suçlandılar
 2006 tarihli Uygulama Yasası. Bu kapanış online poker endüstrisi için bir felaket oldu. Birkaç bitcoin poker platformunun kurulmasına yol açtı, çünkü

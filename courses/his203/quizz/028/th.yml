question: ซอฟต์แวร์ใดที่นำนวัตกรรมโดยการแสดงการสืบทอดคีย์ seed เป็นประโยค 12 คำในเดือนพฤศจิกายน 2011?
answer: Electrum
wrong_answers:
  - สเปสมีโล
  - สเตรตัม
  - Paymium
explanation: |
 wallet นี้ถูกสร้างขึ้นโดยนักพัฒนาชาวฝรั่งเศส Thomas Voegtlin ชื่อของมันหมายถึง electrum ซึ่งเป็นโลหะผสมธรรมชาติของทองคำและเงิน Electrum เป็นหนึ่งใน wallet แรก ๆ ที่นำโครงสร้างเชิงกำหนดมาใช้ในการสร้างคีย์จาก seed ซึ่งมันแสดงทั้งในรูปแบบสตริงอักขระฐานสิบหกและประโยค 12 คำ
reviewed: true
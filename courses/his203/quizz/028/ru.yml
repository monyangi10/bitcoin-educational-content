question: Какая программа в ноябре 2011 года ввела новшество, представив ключевую деривацию seed в виде предложения из 12 слов?
answer: Electrum
wrong_answers:
  - Spesmilo
  - Стратум
  - Paymium
explanation: |
 Эта модель wallet была создана французским разработчиком Томасом Вёгтлином. Его название связано с электрумом, природным сплавом золота и серебра. Electrum был одним из первых
 wallet, в котором была реализована детерминированная структура, получающая ключи от seed, которые он представлял как в виде шестнадцатеричной строки символов, так и в виде предложения из 12 слов.
reviewed: true
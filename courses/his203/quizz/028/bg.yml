question: Кой софтуер въведе иновация, като представи ключовата деривация seed като изречение от 12 думи през ноември 2011 г.?
answer: Electrum
wrong_answers:
  - Spesmilo
  - Страт
  - Paymium
explanation: |
 Този wallet е създаден от френския разработчик Томас Воегтлин. Името му се отнася до електрума - естествена сплав от злато и сребро. Electrum е един от първите
 wallet, които реализират детерминистична структура, извличаща ключове от seed, които представя както като шестнадесетичен низ от символи, така и като изречение от 12 думи.
reviewed: true
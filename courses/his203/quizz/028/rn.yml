 Iyi wallet yaremwe n’umuhinga mu vy’ubuhinga bw’ivy’ubuhinga bw’ivy’ubuhinga bw’ivy’ubuhinga bw’ivy’ubuhinga bw’ivy’ubuhinga bw’ivy’ubuhinga. Izina ryaco ryerekeza kuri electrum, ni ukuvuga ikintu gisanzwe gikozwe mu nzahabu n’ifeza. Electrum yari imwe mu za mbere . 
 wallets kugira ngo hashirwe mu ngiro uburyo bwo guhitamwo buva ku mfunguruzo zivuye muri seed, iyo yaserukira nk’urudodo rw’inyuguti z’icumi na zitandatu be n’interuro y’amajambo 12.

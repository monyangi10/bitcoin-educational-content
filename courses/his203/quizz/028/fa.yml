question: کدام نرم‌افزار با نمایش مشتق‌گیری کلید seed به‌صورت یک جمله ۱۲ کلمه‌ای در نوامبر ۲۰۱۱ نوآوری کرد؟
answer: Electrum
wrong_answers:
  - اسپسمیلو
  - استراتوم
  - Paymium
explanation: |
 این wallet توسط توسعه‌دهنده فرانسوی توماس فوگتلین ایجاد شده است. نام آن به الکتروم، یک آلیاژ طبیعی از طلا و نقره اشاره دارد. Electrum یکی از اولین walletها بود که یک ساختار تعیین‌کننده را پیاده‌سازی کرد که کلیدها را از یک seed استخراج می‌کرد و آن را هم به صورت یک رشته کاراکتر هگزادسیمال و هم به صورت یک جمله ۱۲ کلمه‌ای نمایش می‌داد.
reviewed: true
question: किस सॉफ्टवेयर ने नवंबर 2011 में कुंजी व्युत्पत्ति seed को 12 शब्दों के वाक्य के रूप में प्रस्तुत करके नवाचार किया?
answer: Electrum
wrong_answers:
  - स्पेसमिलो
  - परत
  - Paymium
explanation: |
 इस wallet को फ्रांसीसी डेवलपर थॉमस वोगेटलिन ने बनाया था। इसका नाम इलेक्ट्रम से लिया गया है, जो सोने और चांदी का एक प्राकृतिक मिश्रधातु है। Electrum उन पहले wallet में से एक था जिसने seed से कुंजी प्राप्त करने वाली एक नियतात्मक संरचना को लागू किया, जिसे यह एक हेक्साडेसिमल वर्ण स्ट्रिंग और 12-शब्दों के वाक्य दोनों के रूप में दर्शाता था।
reviewed: true
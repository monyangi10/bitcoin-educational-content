question: Wie creëerde in april 2011 de GLBSE online aandelenbeurs, een platform dat spelers in het Bitcoin ecosysteem in staat stelde financiële effecten zoals aandelen of obligaties uit te geven om zichzelf te financieren?
answer: James McCarthy (Nefario)
wrong_answers:
  - Charlie Shrem (Yankee)
  - Mircea Popescu (MPOE-PR)
  - Nathaniel Theis (Knuffelvis)
explanation: |
 James McCarthy (Nefario) was een Ier die in China woonde en een baan had als professor Engels aan een universiteit. Hij was geïnteresseerd in de Oostenrijkse school
 en de ideeën van de Cypherpunk's. In april 2011 lanceerde hij GLBSE, dat allerlei financiële diensten aan zijn klanten aanbood, waaronder de mogelijkheid om aandelen en obligaties uit te geven
 aandelen en obligaties uit te geven.
reviewed: true
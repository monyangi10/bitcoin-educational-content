question: 2011年4月、GLBSEオンライン証券取引所を創設したのは誰ですか？Bitcoinのエコシステムのプレーヤーが、資金調達のために株式や債券などの金融証券を発行できるようにしたプラットフォームです。
answer: ジェームズ・マッカーシー（ネファリオ）
wrong_answers:
  - チャーリー・シュレム（ヤンキー）
  - ミルチャ・ポペスク (MPOE-PR)
  - ナサニエル・セイス（カドルフィッシュ）
explanation: |
 ジェームズ・マッカーシー（ネファリオ）は中国に住むアイルランド人で、大学の英語教授の職にあった。彼はオーストリア学派と
 とCypherpunkの思想に興味を持っていた。2011年4月、彼はGLBSEを立ち上げた。
 2011年4月、GLBSEを設立。
reviewed: true
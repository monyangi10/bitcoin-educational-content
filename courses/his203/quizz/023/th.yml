question: ใครเป็นผู้สร้างตลาดหลักทรัพย์ออนไลน์ GLBSE ในเดือนเมษายน 2011 ซึ่งเป็นแพลตฟอร์มที่ช่วยให้ผู้เล่นในระบบนิเวศ Bitcoin สามารถออกหลักทรัพย์ทางการเงิน เช่น หุ้นหรือพันธบัตร เพื่อเป็นเงินทุนให้กับตนเอง?
answer: เจมส์ แม็คคาร์ธี (เนฟาริโอ)
wrong_answers:
  - ชาร์ลี ชเรม (แยงกี้)
  - Mircea Popescu (MPOE-PR)
  - นาธาเนียล ไทส์ (Cuddlefish)
explanation: |
 เจมส์ แมคคาร์ธี (เนฟาริโอ) เป็นชาวไอริชที่อาศัยอยู่ในประเทศจีน ซึ่งดำรงตำแหน่งเป็นศาสตราจารย์สอนภาษาอังกฤษที่มหาวิทยาลัยแห่งหนึ่ง เขาสนใจในโรงเรียนออสเตรียและแนวคิดของ Cypherpunks ในเดือนเมษายน 2011 เขาได้เปิดตัว GLBSE ซึ่งให้บริการทางการเงินทุกประเภทแก่ลูกค้า รวมถึงความเป็นไปได้ในการออกหุ้นและพันธบัตร
reviewed: true
question: Ni nde yashinze isoko ry’ivy’ubutunzi ryo kuri internet rya GLBSE muri Ndamukiza 2011, urubuga rwatumye abakinyi bo mu gisata c’ubutunzi ca Bitcoin bashobora gutanga ivy’ubutunzi nk’imigabane canke ivy’ubutunzi kugira ngo bishobore kwitunga?
answer: Yakobo McCarthy (Umunyabute)
wrong_answers:
  - Charlie Shrem (Umuyankee)
  - Mircea Popescu (umukuru w'igihugu-umukuru w'igihugu)
  - Nataniyeli Teyisi (Ifi)
explanation: |
 James McCarthy (Nefario) yari Umunyairlande yaba mu Bushinwa, yari afise ikibanza co kwigisha Icongereza muri kaminuza. Yari ashimishijwe n'ishure ry'i Otirishiya . 
 n’ivyiyumviro vy’aba Cypherpunk. Muri Ndamukiza 2011, yaratanguye ishirahamwe GLBSE, ryari ritanga ubwoko bwose bw’ibikorwa vy’ivy’ubutunzi ku bakiriya baryo, harimwo n’ubushobozi bwo
 gutanga imigabane n’amabondi.
reviewed: true
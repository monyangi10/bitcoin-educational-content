question: 是谁在 2011 年 4 月创建了 GLBSE 在线证券交易所，使 Bitcoin 生态系统中的参与者能够通过该平台发行股票或债券等金融证券为自己融资？
answer: 詹姆斯-麦卡锡（尼法里奥）
wrong_answers:
  - 查理-史瑞姆（美国佬）
  - 米尔恰-波佩斯库（MPOE-PR）
  - 纳撒尼尔-泰斯（抱抱鱼）
explanation: |
 詹姆斯-麦卡锡（尼法里奥）是一位旅居中国的爱尔兰人，在一所大学担任英语教授。他对奥地利学派
 和 Cypherpunks 的思想感兴趣。2011 年 4 月，他创办了 GLBSE，为客户提供各种金融服务，包括发行股票和债券。
 发行股票和债券。
reviewed: true
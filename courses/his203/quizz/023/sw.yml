question: Ni nani aliyeunda soko la hisa la mtandaoni la GLBSE mnamo Aprili 2011, jukwaa lililowawezesha wachezaji katika mfumo ikolojia wa Bitcoin kutoa dhamana za kifedha kama vile hisa au dhamana ili kujifadhili?
answer: James McCarthy (Nefario)
wrong_answers:
  - Charlie Shrem (Yankee)
  - Mircea Popescu (MPOE-PR)
  - Nathaniel Theis (Samaki wa Kuku)
explanation: |
 James McCarthy (Nefario) alikuwa Mwairishi aliyeishi China, ambaye alishikilia wadhifa kama profesa wa Kiingereza katika chuo kikuu. Alipendezwa na shule ya Austria na mawazo ya Cypherpunks. Mnamo Aprili 2011, alizindua GLBSE, ambayo ilitoa huduma za kifedha za kila aina kwa wateja wake, ikiwa ni pamoja na uwezekano wa kutoa hisa na dhamana.
reviewed: true
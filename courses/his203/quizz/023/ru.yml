question: Кто создал онлайн-биржу GLBSE в апреле 2011 года, платформу, которая позволила игрокам экосистемы Bitcoin выпускать финансовые ценные бумаги, такие как акции или облигации, чтобы финансировать себя?
answer: Джеймс МакКарти (Нефарио)
wrong_answers:
  - Чарли Шрем (Янки)
  - Мирча Попеску (MPOE-PR)
  - Натаниэль Тайс (Cuddlefish)
explanation: |
 Джеймс Маккарти (Нефарио) - ирландец, живший в Китае и занимавший должность профессора английского языка в одном из университетов. Он интересовался австрийской школой
 и идеями Cypherpunks. В апреле 2011 года он открыл компанию GLBSE, которая предлагала своим клиентам все виды финансовых услуг, включая возможность
 выпуска акций и облигаций.
reviewed: true
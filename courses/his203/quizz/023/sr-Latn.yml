question: Nefario je kreirao GLBSE online berzu u aprilu 2011. godine, platformu koja je omogućila učesnicima u Bitcoin ekosistemu da izdaju finansijske hartije od vrednosti kao što su akcije ili obveznice kako bi se finansirali.
answer: James McCarthy (Nefario)

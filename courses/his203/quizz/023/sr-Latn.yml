explanation: |
 Džejms Mekarti (Nefario) bio je Irac koji je živeo u Kini i radio kao profesor engleskog jezika na univerzitetu. Bio je zainteresovan za austrijsku školu i ideje Cypherpunks. U aprilu 2011. godine pokrenuo je GLBSE, koji je svojim klijentima nudio razne finansijske usluge, uključujući mogućnost izdavanja akcija i obveznica.

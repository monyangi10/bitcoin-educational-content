question: Кой създаде онлайн фондовата борса GLBSE през април 2011 г. - платформа, която даде възможност на участниците в екосистемата Bitcoin да емитират финансови ценни книжа като акции или облигации, за да се финансират?
answer: Джеймс Маккарти (Nefario)
wrong_answers:
  - Чарли Шрем (Yankee)
  - Мирча Попеску (MPOE-PR)
  - Натаниел Тайс (Cuddlefish)
explanation: |
 Джеймс Маккарти (Нефарио) е ирландец, живеещ в Китай, който заема длъжността професор по английски език в университет. Той се интересува от австрийската школа
 и идеите на Cypherpunks. През април 2011 г. той стартира GLBSE, която предлага на клиентите си всички видове финансови услуги, включително възможност за
 издаване на акции и облигации.
reviewed: true
question: 2011년 4월, Bitcoin 생태계의 플레이어가 주식이나 채권과 같은 금융 증권을 발행하여 자금을 조달할 수 있는 플랫폼인 GLBSE 온라인 증권 거래소를 만든 사람은 누구인가요?
answer: 제임스 맥카시(네파리오)
wrong_answers:
  - 찰리 슈렘(양키)
  - 미르체아 포페스쿠(MPOE-PR)
  - 나다니엘 테이스 (커들피쉬)
explanation: |
 제임스 맥카시(네파리오)는 중국에 거주하던 아일랜드인으로 대학에서 영어 교수로 재직했습니다. 그는 오스트리아 학파에 관심이 많았고
 그리고 Cypherpunk의 아이디어에 관심이 많았습니다. 2011년 4월, 그는 GLBSE를 설립하여 고객에게 다음과 같은 모든 종류의 금융 서비스를 제공했습니다
 주식 및 채권 발행.
reviewed: true
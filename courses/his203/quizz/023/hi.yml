question: अप्रैल 2011 में GLBSE ऑनलाइन स्टॉक एक्सचेंज किसने बनाया था, एक ऐसा मंच जिसने Bitcoin इकोसिस्टम के खिलाड़ियों को खुद को वित्तपोषित करने के लिए शेयर या बॉन्ड जैसी वित्तीय प्रतिभूतियां जारी करने में सक्षम बनाया?
answer: जेम्स मैकार्थी (नेफेरियो)
wrong_answers:
  - चार्ली श्रेम (यांकी)
  - मिर्सेया पोपेस्कु (एमपीओई-पीआर)
  - नथानिएल थीस (कडलफिश)
explanation: |
 जेम्स मैकार्थी (नेफेरियो) चीन में रहने वाले एक आयरिश नागरिक थे, जो एक विश्वविद्यालय में अंग्रेजी के प्रोफेसर के पद पर कार्यरत थे। उन्हें ऑस्ट्रियन विचारधारा और प्रथम विश्व युद्ध के अग्रदूतों के विचारों में रुचि थी। अप्रैल 2011 में, उन्होंने जीएलबीएसई की शुरुआत की, जो अपने ग्राहकों को सभी प्रकार की वित्तीय सेवाएं प्रदान करती थी, जिसमें शेयर और बॉन्ड जारी करने की सुविधा भी शामिल थी।
reviewed: true
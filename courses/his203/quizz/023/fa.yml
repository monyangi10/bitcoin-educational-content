question: چه کسی در آوریل 2011 بورس آنلاین GLBSE را ایجاد کرد، پلتفرمی که به بازیکنان در اکوسیستم Bitcoin اجازه می‌داد تا اوراق بهادار مالی مانند سهام یا اوراق قرضه را برای تأمین مالی خود صادر کنند؟
answer: جیمز مک‌کارتی (نفاریو)
wrong_answers:
  - چارلی شرم (یانکی)
  - میرچا پوپسکو (MPOE-PR)
  - ناتانیل تیس (Cuddlefish)
explanation: |
 جیمز مک‌کارتی (نفاریو) یک ایرلندی بود که در چین زندگی می‌کرد و به عنوان استاد زبان انگلیسی در یک دانشگاه مشغول به کار بود. او به مکتب اتریشی و ایده‌های Cypherpunks علاقه‌مند بود. در آوریل ۲۰۱۱، او GLBSE را راه‌اندازی کرد که انواع خدمات مالی را به مشتریان خود ارائه می‌داد، از جمله امکان صدور سهام و اوراق قرضه.
reviewed: true
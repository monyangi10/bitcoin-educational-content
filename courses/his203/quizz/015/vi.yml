question: Bang nào của Hoa Kỳ được Dự án Bang Tự do lựa chọn đã trở thành trung tâm áp dụng Bitcoin trong giai đoạn 2012-2013?
answer: New Hampshire
wrong_answers:
  - Texas
  - Colorado
  - California
explanation: |
 Dự án Bang Tự do là một phong trào di cư chính trị, nhằm mục đích tập hợp những người theo chủ nghĩa tự do vào một bang để gây ảnh hưởng đến chính quyền địa phương ở đó.
 Các thành viên của phong trào này bắt đầu sử dụng Bitcoin nhờ sự truyền bá tư tưởng của các nhà hoạt động theo chủ nghĩa tự do như Roger Ver và Erik Voorhees.
reviewed: true
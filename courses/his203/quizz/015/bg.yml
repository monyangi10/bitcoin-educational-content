question: Кой американски щат, избран от проекта "Свободен щат", се превърна в център на осиновяване на Bitcoin през 2012-2013 г.?
answer: Ню Хемпшир
wrong_answers:
  - Тексас
  - Колорадо
  - Калифорния
explanation: |
 Проектът "Свободна държава" е политическо движение за миграция, което има за цел да обедини либертарианците в един щат, за да повлияе на местното правителство там.
 Членовете на това движение започват да използват Bitcoin благодарение на прозелитизма на либертариански активисти като Роджър Вер и Ерик Воорхийс.
reviewed: true
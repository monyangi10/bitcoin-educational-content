question: 2012年から2013年にかけて、フリー・ステート・プロジェクトが選んだBitcoin採用の中心地となったアメリカの州は？
answer: ニューハンプシャー
wrong_answers:
  - テキサス
  - コロラド州
  - カリフォルニア
explanation: |
 フリー・ステート・プロジェクトは、ある州でリバタリアンをグループ化し、そこの地方政府に影響を与えることを目的とした政治的移住運動である。
 この運動のメンバーは、ロジャー・ヴァーやエリック・ヴォーヒーズのようなリバタリアン活動家の布教活動のおかげでBitcoinを使い始めた。
reviewed: true
question: کدام ایالت ایالات متحده که توسط پروژه ایالت آزاد انتخاب شده بود، در سال‌های ۲۰۱۲-۲۰۱۳ به مرکز پذیرش Bitcoin تبدیل شد؟
answer: نیوهمپشایر
wrong_answers:
  - تگزاس
  - کلرادو
  - کالیفرنیا
explanation: |
 پروژه ایالت آزاد یک جنبش مهاجرت سیاسی بود که هدف آن گردهم‌آوردن لیبرتارین‌ها در یک ایالت برای تأثیرگذاری بر دولت محلی آنجا بود.  
 اعضای این جنبش به لطف تبلیغات فعالان لیبرتارین مانند راجر ور و اریک وورهیس شروع به استفاده از Bitcoin کردند.
reviewed: true
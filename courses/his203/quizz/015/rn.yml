question: Ni iyihe leta ya U.S. yatowe n’umugambi wa Free State yacitse ikibanza co kwemera Bitcoin mu 2012-2013?
answer: Intara ya New Hampshire
wrong_answers:
  - Texas
  - Kolorado
  - Kaliforniya
explanation: |
 Umugambi wa Free State wari umuhari w’abimukira mu vya politike, wari ugamije gukoranya abaharanira umwidegemvyo mu gihugu kimwe kugira ngo bagire ico bakoze ku butegetsi bw’aho hantu. 
 Abagize uwo muhari batanguye gukoresha Bitcoin bivuye ku guhindura abantu abaharanira umwidegemvyo nka Roger Ver na Erik Voorhees.
reviewed: true
question: Какой американский штат, выбранный проектом "Свободное государство", стал центром усыновления Bitcoin в 2012-2013 годах?
answer: Нью-Гэмпшир
wrong_answers:
  - Техас
  - Колорадо
  - Калифорния
explanation: |
 Проект "Свободное государство" - это движение политической миграции, целью которого было объединение либертарианцев в одном штате для оказания влияния на местное правительство.
 Члены этого движения начали использовать Bitcoin благодаря проповеди таких либертарианских активистов, как Роджер Вер и Эрик Вурхиз.
reviewed: true
question: फ्री स्टेट प्रोजेक्ट द्वारा चयनित कौन सा अमेरिकी राज्य 2012-2013 में Bitcoin को अपनाने का केंद्र बन गया?
answer: न्यू हैम्पशायर
wrong_answers:
  - टेक्सास
  - कोलोराडो
  - कैलिफोर्निया
explanation: |
 फ्री स्टेट प्रोजेक्ट एक राजनीतिक प्रवासन आंदोलन था, जिसका उद्देश्य उदारवादियों को एक राज्य में एकत्रित करना था ताकि वे वहां की स्थानीय सरकार को प्रभावित कर सकें।
 रोजर वेर और एरिक वूरहीस जैसे उदारवादी कार्यकर्ताओं के प्रचार-प्रसार के कारण इस आंदोलन के सदस्यों ने Bitcoin का उपयोग करना शुरू कर दिया।
reviewed: true
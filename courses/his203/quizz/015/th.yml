question: รัฐใดของสหรัฐฯ ที่ถูกเลือกโดยโครงการ Free State Project และกลายเป็นศูนย์กลางของการนำ Bitcoin มาใช้ในปี 2012-2013?
answer: นิวแฮมป์เชียร์
wrong_answers:
  - เท็กซัส
  - โคโลราโด
  - แคลิฟอร์เนีย
explanation: |
 โครงการ Free State เป็นการเคลื่อนไหวทางการเมืองเพื่อการย้ายถิ่นฐาน โดยมีเป้าหมายในการรวมกลุ่มเสรีนิยมในรัฐเดียวเพื่อมีอิทธิพลต่อรัฐบาลท้องถิ่นที่นั่น 
 สมาชิกของการเคลื่อนไหวนี้เริ่มใช้ Bitcoin ขอบคุณการเผยแพร่ศาสนาของนักเคลื่อนไหวเสรีนิยมเช่น Roger Ver และ Erik Voorhees.
reviewed: true
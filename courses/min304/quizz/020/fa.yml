question: نگرانی آینده در مورد استفاده از فضای بلوک Bitcoin چیست؟
answer: نگرانی آینده این است که با رشد مورد انتظار Lightning Network و افزایش متعاقب در باز و بسته شدن کانال‌ها، فضای بلوک‌های Bitcoin به طور فزاینده‌ای ارزشمند خواهد شد.
wrong_answers:
  - نگرانی آینده این است که اندازه بلوک‌های Bitcoin بیش از حد بزرگ شود و مدیریت آن‌ها دشوار گردد.
  - نگرانی آینده این است که تعداد بلوک‌های Bitcoin از ظرفیت شبکه فراتر رود.
  - نگرانی آینده این است که پیچیدگی بلوک‌های Bitcoin افزایش یابد و پردازش آن‌ها دشوار شود.
explanation: |
  با رشد مورد انتظار Lightning Network و افزایش متعاقب در باز و بسته شدن کانال‌ها، فضای بلوک‌های Bitcoin به طور فزاینده‌ای ارزشمند خواهد شد. این امر منجر به بحث‌هایی درباره استفاده مشروع از فضای بلوک شده است، با نگرانی‌هایی درباره اسپم در Blockchain از تراکنش‌هایی که غیرضروری تلقی می‌شوند.
reviewed: true
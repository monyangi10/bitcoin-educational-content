question: ความกังวลในอนาคตเกี่ยวกับการใช้พื้นที่บล็อก Bitcoin คืออะไร?
answer: ความกังวลในอนาคตคือ ด้วยการเติบโตที่คาดการณ์ของ Lightning Network และการเพิ่มขึ้นของการเปิดและปิดช่องทาง พื้นที่ในบล็อก Bitcoin จะมีค่ามากขึ้นเรื่อย ๆ
wrong_answers:
  - ความกังวลในอนาคตคือขนาดของบล็อก Bitcoin จะใหญ่เกินกว่าจะจัดการได้
  - ความกังวลในอนาคตคือจำนวนบล็อก Bitcoin จะเกินความจุของเครือข่าย
  - ความกังวลในอนาคตคือความซับซ้อนของบล็อก Bitcoin จะเพิ่มขึ้น ทำให้ยากต่อการประมวลผล
explanation: |
  ด้วยการเติบโตที่คาดหวังของ Lightning Network และการเพิ่มขึ้นของการเปิดและปิดช่องทางที่ตามมา พื้นที่ในบล็อก Bitcoin จะมีค่ามากขึ้นเรื่อย ๆ สิ่งนี้นำไปสู่การอภิปรายเกี่ยวกับการใช้พื้นที่บล็อกอย่างถูกต้อง โดยมีความกังวลเกี่ยวกับสแปมบนบล็อกเชนจากธุรกรรมที่ถือว่าไม่จำเป็น
reviewed: true
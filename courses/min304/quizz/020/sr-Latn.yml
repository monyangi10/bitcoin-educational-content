question: Koja je buduća zabrinutost u vezi sa korišćenjem Bitcoin blok prostora?
answer: Buduća briga je da će sa očekivanim rastom Lightning mreže i posljedičnim povećanjem otvaranja i zatvaranja kanala, prostor u Bitcoin blokovima postati sve vredniji.
wrong_answers:
  - Buduća zabrinutost je da će veličina Bitcoin blokova postati prevelika za upravljanje.
  - Buduća zabrinutost je da će broj Bitcoin blokova premašiti kapacitet mreže.
  - Buduća zabrinutost je da će složenost Bitcoin blokova porasti, što će ih učiniti teškim za obradu.
explanation: |
  Sa očekivanim rastom Lightning mreže i
  posledičnim povećanjem otvaranja i zatvaranja kanala, prostor
  u Bitcoin blokovima postaje sve vredniji. Zbog toga su se pojavile rasprave o 
  tome šta predstavlja legitimnu upotrebu prostora u blokovima, jer postoji zabrinutost da nebitne transakcije izazivaju „spam“ na blockchainu.
reviewed: true

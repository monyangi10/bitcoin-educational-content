question: ابتکار Attakai در زمینه Bitcoin Mining چیست؟
answer: ابتکاری که هدف آن دسترسی‌پذیرتر و کم‌ضررتر کردن Mining در عین حال کمک به شبکه است.
wrong_answers:
  - یک ابتکار که هدف آن افزایش قیمت Bitcoin است
  - ابتکاری که هدف آن کاهش Hashrate شبکه است
  - ابتکاری که هدف آن متمرکز کردن قدرت هشینگ است
explanation: |
  ابتکار Attakai هدف دارد تا Bitcoin Mining را دسترس‌پذیرتر و کمتر مضر کند. این ابتکار مردم را تشویق می‌کند تا با سخت‌افزار و راه‌حل‌های مقرون‌به‌صرفه‌تر در خانه استخراج کنند و آلودگی صوتی را کاهش دهند. این ابتکار همچنین بر اهمیت مشارکت در امنیت و غیرمتمرکزسازی شبکه Bitcoin تأکید دارد.
reviewed: true
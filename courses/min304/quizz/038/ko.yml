question: Bitcoin Mining의 맥락에서 Attakai 이니셔티브는 무엇인가요?
answer: 네트워크에 기여하면서 Mining의 접근성을 높이고 유해성을 줄이는 것을 목표로 하는 이니셔티브입니다
wrong_answers:
  - Bitcoin의 가격을 인상하는 것을 목표로 하는 이니셔티브입니다
  - 네트워크의 Hashrate를 줄이는 것을 목표로 하는 이니셔티브입니다
  - 해싱 파워를 중앙 집중화하는 것을 목표로 하는 이니셔티브
explanation: |
  Attakai 이니셔티브의 목표는 Bitcoin Mining의 접근성을 높이고
  접근성을 높이고 유해성을 줄이는 것을 목표로 합니다. 이 이니셔티브는 사람들이 더 저렴한 하드웨어와
  더 저렴한 하드웨어와 솔루션으로 집에서 채굴하도록 장려하여
  소음 공해를 줄입니다. 이 이니셔티브는 또한
  보안에 기여하는 것의 중요성과
  보안과 탈중앙화에 기여하는 것의 중요성도 강조합니다.
reviewed: true
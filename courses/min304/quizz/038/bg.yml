question: Какво представлява инициативата "Атакай" в контекста на Bitcoin mining?
answer: Инициатива, която има за цел да направи mining по-достъпна и по-малко вредна, като същевременно допринася за мрежата
wrong_answers:
  - Инициатива, целяща да увеличи цената на Bitcoin
  - Инициатива, която има за цел да намали hashrate на мрежата
  - Инициатива, която има за цел да централизира силата на хеширане
explanation: |
  Инициативата Attakai има за цел да направи Bitcoin mining по-
  достъпни и по-малко вредни. Тя насърчава хората да добиват
  у дома с по-достъпен хардуер и решения за
  намаляване на шумовото замърсяване. Инициативата също така набляга на
  значението на приноса към сигурността и
  децентрализацията на мрежата Bitcoin.
reviewed: true
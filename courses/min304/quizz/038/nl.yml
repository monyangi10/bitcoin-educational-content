question: Wat is het Attakai initiatief in de context van Bitcoin Mining?
answer: Een initiatief om Mining toegankelijker en minder schadelijk te maken en tegelijkertijd bij te dragen aan het netwerk
wrong_answers:
  - Een initiatief dat de prijs van Bitcoin wil verhogen
  - Een initiatief om de Hashrate van het netwerk te verlagen
  - Een initiatief dat de hashingkracht wil centraliseren
explanation: |
  Het Attakai initiatief is erop gericht om Bitcoin en Mining toegankelijker en minder schadelijk te maken
  toegankelijker en minder schadelijk te maken. Het moedigt mensen aan om
  om thuis te mijnen met meer betaalbare hardware en oplossingen om
  geluidsoverlast te verminderen. Het initiatief benadrukt ook het
  belang om bij te dragen aan de veiligheid en
  decentralisatie van het Bitcoin netwerk.
reviewed: true
question: Šta je Attakai inicijativa u kontekstu Bitcoin rudarenja?
answer: Inicijativa koja ima za cilj da rudarenje učini pristupačnijim i manje štetnim, dok istovremeno doprinosi mreži
wrong_answers:
  - Inicijativa koja ima za cilj povećanje cene Bitcoina
  - Inicijativa koja ima za cilj smanjenje Hashrate mreže
  - Inicijativa koja ima za cilj centralizaciju hashing snage
explanation: |
  Inicijativa Attakai ima za cilj da učini Bitcoin rudarenje pristupačnijim i manje štetnim. Podstiče ljude da rudare kod kuće sa pristupačnijim hardverom 
  i rešenjima za smanjenje zagađenja bukom. Inicijativa takođe naglašava važnost doprinosa bezbednosti i decentralizaciji Bitcoin mreže.
reviewed: true

question: Ni ingorane nyamukuru iyihe ku banyamwuga mu gisata ca Bitcoin Mining?
answer: Gupanga uko bazinjiza agakwiye muri kazoza no guhindura umukenyuro wabo bivanye n’ivyo
wrong_answers:
  - Kuronka umuyagankuba uhendutse
  - Kurondera ahantu heza ho gukorera Mining
  - Kurondera abashoramari bashaka gufasha mu bikorwa vyabo
explanation: |
  Kubera ko ikoranabuhanga rihora ritera imbere mu bijanye n’ubuhinga 
  bwa mining, ababikora nk'umwuga bategerezwa kwipanga neza.
  uruganda rwa mining ruguma ruza mwo udusha twinshi, kandi abayikora bategerezwa 
  kwitega inyungu zizogabanuka mu gihe kizoza maze bagahindura ingamba canke umukenyura wabo bivanye n’ivyo.
reviewed: true

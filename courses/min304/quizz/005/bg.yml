question: Кое е основното предизвикателство за професионалистите в индустрията Bitcoin mining?
answer: Предвиждане на намаляващи печалби от ефективност в бъдеще и съответно адаптиране на стратегиите си
wrong_answers:
  - Намиране на евтино електричество
  - Намиране на подходящо място за операциите на mining
  - Намиране на инвеститори, които желаят да финансират дейността им
explanation: |
  Изправени пред постоянния технологичен напредък в
  mining, специалистите трябва да заемат стратегически позиции
  се. Отрасълът mining е обект на непрекъснати
  и участниците в индустрията трябва да предвиждат
  намаляване на повишаването на ефективността в бъдеще и да адаптират своите
  и съответно да променят стратегиите си.
reviewed: true
question: Bitcoin और Mining किस सिद्धांत पर काम करते हैं?
answer: Bitcoin और Mining एक लॉटरी सिस्टम पर काम करते हैं, जहाँ हर दस मिनट में एक ब्लॉक जीतने (और इस तरह Bitcoin इनाम पाने) की संभावना एक छोटे Miner के लिए बहुत कम होती है।
wrong_answers:
  - जीडब्ल्यू-5 और जीडब्ल्यू-6 पहले आओ, पहले पाओ के सिद्धांत पर काम करते हैं, जहां जीडब्ल्यू-7 द्वारा एक जटिल गणितीय समस्या को हल करने वाले पहले व्यक्ति को जीडब्ल्यू-5 इनाम मिलता है।
  - जीडब्ल्यू-8 जीडब्ल्यू-9 बोली लगाने के सिद्धांत पर काम करता है, जहां जीडब्ल्यू-10 जो सबसे ज्यादा बोली लगाता है उसे जीडब्ल्यू-8 का इनाम मिलता है।
  - जीडब्ल्यू-11 जीडब्ल्यू-12 एक रोटेशन सिद्धांत पर काम करता है, जहां हर जीडब्ल्यू-13 को ब्लॉक माइन करने और जीडब्ल्यू-11 इनाम पाने का मौका मिलता है।
explanation: |
  अध्याय बताता है कि Bitcoin Mining लॉटरी के जरिए काम करता है
  सिद्धांत, जहां एक ब्लॉक जीतने की संभावना होती है (और
  इसलिए हर दस मिनट में Bitcoin इनाम मिलता है)
  एक व्यक्ति के लिए बेहद कम छोटा Miner।
reviewed: true
question: Ni ingingo ngenderwako iyihe Bitcoin mining ikorerako?
answer: mining ikora ku ngingo ngenderwako ya lottery (umukino w’amahirwe), kandi amahirwe yo gutsindira igice (block) (hanyuma rero agashimwe ka Bitcoin) buri minota cumi ni make cane ku mu miner mutoyi ari wenyene.
wrong_answers:
  - Bitcoin mining ikora ku ngingo ngenderwako y’uko uwubanza kuza ari we azobanza guhabwa, aho miner wa mbere azotorera umuti ingorane igoye y’imibare aronka impembo ya Bitcoin.
  - Bitcoin mining ikora ku ngingo ngenderwako y’ugutanga amafaranga, aho miner atanga amafaranga menshi cane aronka impembo ya Bitcoin.
  - Bitcoin mining ikora ku ngingo ngenderwako y’uguhinduranya, aho miner yose ironka urugendo rwo gucukura ibuye maze ikaronka impembo ya Bitcoin.
explanation: |
  Iki gice ca gisigura Bitcoin mining uko ikorera ku ingingo ngenderwako ya lottery, 
  aho amahirwe yo gutsindira igice (block) (hanyuma rero agashimwe ka Bitcoin) buri
  minota cumi ni make cane ku mu miner mutoyi ari wenyene
reviewed: true

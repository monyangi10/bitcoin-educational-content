question: Bitcoin 挖礦的工作原理是什麼？
answer: Bitcoin 挖礦以抽獎原則運作，對個人小型礦工而言，每十分鐘贏得一個區塊（ Bitcoin 獎勵）的機會極低。
wrong_answers:
  - Bitcoin 挖礦的工作原則是先到先得，最先解決複雜數學問題的礦工可以獲得 Bitcoin 的獎勵。
  - Bitcoin 挖礦以出價原則運作，出價最高的礦工可獲得 Bitcoin 獎勵。
  - Bitcoin 挖礦以輪流原則運作，每個礦工輪流開採一個區塊並獲得 Bitcoin 獎勵。
explanation: |
  本章說明 Bitcoin 礦工以抽獎方式運作
  原則，其中贏得區塊的機會（
  Bitcoin 獎勵）每十分鐘一次
  機率對於個別的小型礦工而言是極低的。
reviewed: true

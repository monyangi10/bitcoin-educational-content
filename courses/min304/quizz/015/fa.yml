question: اصل عملکرد Bitcoin Mining چیست؟
answer: Bitcoin Mining بر اساس اصل قرعه‌کشی کار می‌کند، جایی که شانس برنده شدن یک بلوک (و در نتیجه پاداش Bitcoin) هر ده دقیقه برای یک Miner کوچک فردی بسیار کم است.
wrong_answers:
  - Bitcoin Mining بر اساس اصل "اولین مراجعه، اولین خدمت" کار می‌کند، جایی که اولین Miner که یک مسئله پیچیده ریاضی را حل کند، پاداش Bitcoin را دریافت می‌کند.
  - Bitcoin Mining بر اساس اصل مزایده کار می‌کند، جایی که Miner که بالاترین پیشنهاد را می‌دهد، پاداش Bitcoin را دریافت می‌کند.
  - Bitcoin Mining بر اساس یک اصل چرخشی کار می‌کند، به طوری که هر Miner نوبتی برای استخراج یک بلوک و دریافت پاداش Bitcoin دارد.
explanation: |
  این فصل توضیح می‌دهد که Bitcoin Mining بر اساس اصل قرعه‌کشی کار می‌کند، جایی که شانس برنده شدن یک بلوک (و بنابراین پاداش Bitcoin) هر ده دقیقه برای یک Miner کوچک فردی بسیار کم است.
reviewed: true
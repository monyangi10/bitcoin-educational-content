question: Koja je svrha mehanizma za prilagođavanje težine u Bitcoin mreži?
answer: Osiguravanje da se blokovi rudare u proseku svakih 10 minuta
wrong_answers:
  - Povećanje težine rudarenja tokom vremena
  - Smanjenje težina rudarenja tokom vremena
  - Osiguravanje da isti rudar ne izrudari uzastopne blokove
explanation: |
  Podešavanje težine je ključni mehanizam u radu Bitcoin mreže, osiguravajući da se blokovi rudare u proseku svakih 10 minuta. Ovaj mehanizam podešavanja osigurava da vreme rudarenja novih blokova ostane konstantno tokom vremena, bez obzira na broj rudara ili ukupnu računarsku snagu mreže.
reviewed: true

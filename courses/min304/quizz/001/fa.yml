question: هدف مکانیزم تنظیم سختی در شبکه Bitcoin چیست؟
answer: برای اطمینان از اینکه بلاک‌ها به‌طور متوسط هر ۱۰ دقیقه یک‌بار استخراج می‌شوند
wrong_answers:
  - برای افزایش سختی Mining در طول زمان
  - برای کاهش سختی Mining در طول زمان
  - برای اطمینان از اینکه همان Miner بلوک‌های متوالی را استخراج نمی‌کند
explanation: |
  تنظیم سختی یک مکانیزم حیاتی در عملکرد شبکه Bitcoin است که اطمینان حاصل می‌کند بلوک‌ها به‌طور متوسط هر ۱۰ دقیقه استخراج می‌شوند. این مکانیزم تنظیم تضمین می‌کند که زمان Mining برای بلوک‌های جدید در طول زمان ثابت بماند، بدون توجه به تعداد ماینرها یا قدرت محاسباتی کلی شبکه.
reviewed: true
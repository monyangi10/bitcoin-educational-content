question: Каква е целта на механизма за коригиране на трудността в мрежата Bitcoin?
answer: За да се гарантира, че блоковете се добиват средно на всеки 10 минути
wrong_answers:
  - Увеличаване на трудността на mining с течение на времето
  - Намаляване на трудността на mining с течение на времето
  - За да се гарантира, че един и същ миньор не добива последователни блокове
explanation: |
  Приспособяването към трудностите е ключов механизъм в
  в работата на мрежата Bitcoin, като гарантира, че блоковете са
  да се добиват средно на всеки 10 минути. Това регулиране
  механизъм гарантира, че времето за нови блокове в mining
  остава постоянно с течение на времето, независимо от броя на
  миньорите или общата изчислителна мощност на мрежата.
reviewed: true
question: ภัยคุกคามที่อาจเกิดขึ้นจาก Proof of Stake ในเครือข่าย Bitcoin คืออะไร?
answer: ผู้ที่ถือครองสกุลเงินจำนวนมากอยู่แล้วมีอำนาจที่ไม่สมส่วน ซึ่งสะท้อนถึงความไม่เท่าเทียมกันของอำนาจที่มีอยู่
wrong_answers:
  - มันจะเป็นอุปสรรคสำคัญสำหรับผู้ตรวจสอบที่ถือครองสกุลเงินจำนวนมาก
  - มันไม่อนุญาตให้มีการมีส่วนร่วมในขนาดเล็ก
  - มันไม่ต้องการทรัพยากรที่จับต้องได้
explanation: |
  ในเครือข่าย Proof of Stake ผู้ที่ถือครองสกุลเงินในปริมาณมากอยู่แล้วจะมีอำนาจที่ไม่สมส่วน พลวัตนี้อาจส่งเสริมการรวมศูนย์และการกระจุกตัวของอำนาจในมือของคนเพียงไม่กี่คน
reviewed: true
question: تهدید بالقوه اثبات سهام در شبکه Bitcoin چیست؟
answer: کسانی که از قبل مقدار زیادی از ارز را در اختیار دارند، قدرت نامتناسبی دارند که نابرابری‌های قدرت موجود را منعکس می‌کند.
wrong_answers:
  - این یک مانع قابل توجه برای اعتبارسنج‌هایی که مقدار زیادی ارز در اختیار دارند، خواهد بود.
  - این اجازه مشارکت در مقیاس کوچک را نمی‌دهد.
  - این به منابع ملموس نیاز ندارد.
explanation: |
  در یک شبکه اثبات سهام، کسانی که از قبل مقدار زیادی از ارز را در اختیار دارند، قدرت نامتناسبی دارند. این دینامیک می‌تواند به طور بالقوه تمرکز و تمرکز قدرت در دستان تعداد کمی را تداوم بخشد.
reviewed: true
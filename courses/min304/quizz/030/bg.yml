question: Каква е потенциалната заплаха от Proof of Stake в мрежата Bitcoin?
answer: Тези, които вече притежават голяма част от валутата, имат непропорционално голяма власт, което отразява съществуващото неравенство във властта.
wrong_answers:
  - Това би представлявало значителна пречка за валидаторите, които притежават голямо количество валута.
  - Тя не позволява участие в малък мащаб.
  - Тя не изисква материални ресурси.
explanation: |
  В мрежа с доказателство за залог тези, които вече притежават голям
  от валутата имат непропорционално голяма власт. Това
  може да доведе до засилване на централизацията и
  концентрация на власт в ръцете на малцина.
reviewed: true
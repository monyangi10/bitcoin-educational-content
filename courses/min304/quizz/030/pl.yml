question: Jakie jest potencjalne zagrożenie Proof of Stake w sieci Bitcoin?
answer: Ci, którzy już posiadają dużą ilość waluty, mają nieproporcjonalną władzę, odzwierciedlającą istniejące nierówności władzy.
wrong_answers:
  - Stanowiłoby to znaczącą barierę dla walidatorów posiadających dużą ilość waluty.
  - Nie pozwala na uczestnictwo na małą skalę.
  - Nie wymaga materialnych zasobów.
explanation: |
  W sieci Proof of Stake ci, którzy już posiadają dużą ilość waluty, mają nieproporcjonalną władzę

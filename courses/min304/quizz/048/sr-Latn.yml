question: Koji je jedinstven način da se uključite u Bitcoin ekosistem putem rudarenja?
answer: Rudarenje bitcoina u zimskom periodu može biti pametan način da zagrejete svoj dom dok generišete prihod u Bitcoin-ima.
wrong_answers:
  - Rudarenje bitcoina može biti način da se dobije besplatna struja.
  - Rudarenje bitcoina može biti način da se dobije besplatan internet.
  - Rudarenje bitcoina može biti način da se dobije besplatan hardver.
explanation: |
  Jedinstven način da se uključite u Bitcoin ekosistem 
  kroz rudarenje je rudarenje bitcoina zimi. Ovo može
  biti pametan način da zagrejete svoj dom dok generišete prihod
  u Bitcoin-ima.
reviewed: true

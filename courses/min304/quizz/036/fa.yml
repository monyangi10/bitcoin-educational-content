question: رابطه بین هزینه تولید Bitcoin و قیمت بازار آن چیست؟
answer: هزینه Bitcoin می‌تواند به طور کلی متناسب با قیمت آن باشد.
wrong_answers:
  - هزینه Bitcoin به طور معکوس با قیمت آن متناسب است.
  - هزینه Bitcoin به قیمت آن، در یک نسبت معین، ثابت است.
  - هزینه Bitcoin همیشه بیشتر از قیمت آن است
explanation: |
  هزینه Bitcoin، که به برق مورد نیاز برای کارکرد ماشین‌های Mining مربوط می‌شود، می‌تواند به طور کلی متناسب با قیمت آن باشد. این رابطه درک بهتری از نوسانات قیمت و چشم‌اندازهای آینده ارائه می‌دهد.
reviewed: true
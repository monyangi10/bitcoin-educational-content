question: ความสัมพันธ์ระหว่างต้นทุนการผลิตของ Bitcoin กับราคาตลาดคืออะไร?
answer: ต้นทุนของ Bitcoin อาจเป็นสัดส่วนโดยทั่วไปกับราคาของมัน
wrong_answers:
  - ต้นทุนของ Bitcoin แปรผกผันกับราคาของมัน
  - ต้นทุนของ Bitcoin ถูกกำหนดไว้คงที่ ภายในอัตราส่วนที่แน่นอนกับราคาของมัน
  - ต้นทุนของ Bitcoin มักจะสูงกว่าราคาของมันเสมอ
explanation: |
  ต้นทุนของ Bitcoin ซึ่งเกี่ยวข้องกับไฟฟ้าที่จำเป็นในการใช้งานเครื่อง mining โดยทั่วไปสามารถเป็นสัดส่วนกับราคาของมัน ความสัมพันธ์นี้ให้ความเข้าใจที่ดีขึ้นเกี่ยวกับความผันผวนของราคาและแนวโน้มในอนาคต
reviewed: true
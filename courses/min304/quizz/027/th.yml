question: ทำไม Proof of Work ถึงมีความสำคัญในเครือข่าย Bitcoin?
answer: มันแสดงถึงการเชื่อมโยงทางกายภาพระหว่างโลกแห่งความเป็นจริงและ Bitcoin ซึ่งต้องการพลังงานที่จับต้องได้สำหรับการผลิตและการตรวจสอบความถูกต้องของบิตคอยน์และบล็อก
wrong_answers:
  - มันอนุญาตให้มีการเข้าร่วมของนักขุดในขนาดเล็ก โดยเฉพาะอย่างยิ่งสำหรับผู้ที่อยู่ในสถานที่ที่มีการเซ็นเซอร์สูง
  - มันรับประกันการป้องกันการรวมศูนย์
  - มันสะท้อนถึงความไม่เท่าเทียมกันของอำนาจที่มีอยู่ในสังคม
explanation: |
  Proof of Work มีความสำคัญในเครือข่าย Bitcoin เพราะมันเป็นตัวแทนของการเชื่อมต่อทางกายภาพระหว่างโลกจริงและ Bitcoin การผลิตและการตรวจสอบความถูกต้องของบิตคอยน์และบล็อกต้องการพลังงานที่จับต้องได้ ซึ่งเป็นการยึดเครือข่าย Bitcoin ในความเป็นจริงทางกายภาพและป้องกันไม่ให้ถูกครอบงำโดยหน่วยงานที่มีอำนาจอย่างสมบูรณ์
reviewed: true
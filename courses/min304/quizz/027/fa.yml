question: چرا Proof of Work در شبکه Bitcoin ضروری است؟
answer: این نمایانگر پیوند فیزیکی بین دنیای واقعی و Bitcoin است که نیاز به انرژی ملموس برای تولید و اعتبارسنجی بیت‌کوین‌ها و بلوک‌ها دارد.
wrong_answers:
  - این امکان را برای مشارکت در مقیاس کوچک معدنچیان فراهم می‌کند، به‌ویژه برای کسانی که در مکان‌های با سانسور بالا هستند.
  - این تضمین می‌کند که در برابر تمرکزگرایی محافظت شود.
  - این نابرابری‌های قدرت موجود در جامعه را منعکس می‌کند.
explanation: |
  Proof of Work در شبکه Bitcoin ضروری است زیرا
  نمایانگر پیوند فیزیکی بین دنیای واقعی و
  Bitcoin است. تولید و اعتبارسنجی بیت‌کوین‌ها و
  بلوک‌ها نیازمند انرژی ملموس است که شبکه Bitcoin را در
  واقعیت فیزیکی لنگر می‌اندازد و از تسلط کامل آن توسط
  نهادهای قدرتمند جلوگیری می‌کند.
reviewed: true
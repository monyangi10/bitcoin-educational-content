question: Защо Proof of Work е от съществено значение за мрежата Bitcoin?
answer: Той представлява физическата връзка между реалния свят и Bitcoin, като изисква осезаема енергия за производството и валидирането на биткойни и блокове.
wrong_answers:
  - Тя позволява участието на миньори в малък мащаб, особено на тези, които се намират на места с висок ценз.
  - Тя гарантира защита срещу централизация.
  - Тя отразява съществуващото неравенство на властта в обществото.
explanation: |
  Proof of Work е от съществено значение за мрежата Bitcoin, тъй като
  представлява физическа връзка между реалния свят и
  Bitcoin. Производството и валидирането на биткойни и
  блоковете се нуждаят от осезаема енергия, което закрепва Bitcoin
  във физическата реалност и предотвратява нейното пълно
  доминирането на мощни субекти.
reviewed: true
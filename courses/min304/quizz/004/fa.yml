question: ابزار اصلی که امروز توسط ماینرها در شبکه Bitcoin استفاده می‌شود چیست؟
answer: ای‌سیک‌ها
wrong_answers:
  - پردازنده‌ها (CPUs)
  - واحدهای پردازش گرافیکی (GPUs)
  - FPGAها
explanation: |
  امروزه، ماینرها به‌طور انحصاری از ASICهایی استفاده می‌کنند که به این عملیات اختصاص داده شده‌اند و به‌گونه‌ای بهینه‌سازی شده‌اند که حداکثر تعداد ترکیب‌ها را با کمترین مصرف انرژی ممکن و در سریع‌ترین زمان ممکن آزمایش کنند.
reviewed: true
question: Ni igikoresho nyamukuru ikihe gikoreshwa n’abacukuzi mu muhora wa Bitcoin uno musi?
answer: ASICs
wrong_answers:
  - CPUs
  - GPUs
  - FPGAs
explanation: |
  Muri iki gihe, aba miners bakoresha gusa ASICs zigenewe ico gikorwa, 
  zitunganijwe neza kugira ngo zigerageze igitigiri kinini c'ibintu bihuriweko
  hakoresheje inguvu nkeyi cane kandi vyihuse uko bishoboka kwose.
reviewed: true

question: Ni akaryo akahe nyamukuru gatera intege abacukuzi (miners) kugira ngo bagire uruhara mugikorwa ca Bitcoin Mining?
answer: Agashimwe ka Mining
wrong_answers:
  - Ubushobozi bwo kugenzura umuhora wa Bitcoin
  - Ubushobozi bwo kurema ama bitcoins mashasha ku bushake
  - Ubushobozi bwo gukoresha nabi igiciro ca Bitcoin
explanation: |
  Akaryo nyamukuru gatera intege abacukuzi (miners) kugira ngo
  bagire uruhara mugikorwa ca Bitcoin Mining ni agashimwe ka mining.
  Ako gashimwe ni uburyo bwo guhimiriza aba miners kugira uruhara mu gikorwa ca mining naho nyene gitwara inguvu.
reviewed: true

question: माइनर्स को Bitcoin और Mining प्रक्रिया में भाग लेने का मुख्य वित्तीय प्रोत्साहन क्या है?
answer: जीडब्ल्यू-2 इनाम
wrong_answers:
  - Bitcoin नेटवर्क को नियंत्रित करने की क्षमता
  - मनमर्जी से नए बिटकॉइन बनाने की क्षमता
  - Bitcoin की कीमत को मनमाने ढंग से बदलने की क्षमता
explanation: |
  माइनर्स को भाग लेने के लिए मुख्य वित्तीय प्रोत्साहन
  जीडब्ल्यू-5 जीडब्ल्यू-6 प्रक्रिया ही जीडब्ल्यू-6 इनाम है। यह
  इनाम माइनर्स को प्रोत्साहित करने के लिए एक ताकतवर प्रेरणा का काम करता है
  Mining प्रक्रिया में भाग लेने के लिए, भले ही इसकी ऊर्जा...
  खर्च
reviewed: true
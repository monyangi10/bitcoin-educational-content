question: แรงจูงใจทางการเงินหลักสำหรับนักขุดในการเข้าร่วมในกระบวนการ Bitcoin mining คืออะไร?
answer: รางวัล mining
wrong_answers:
  - ความสามารถในการควบคุมเครือข่าย Bitcoin
  - ความสามารถในการสร้างบิตคอยน์ใหม่ตามต้องการ
  - ความสามารถในการปรับเปลี่ยนราคาของ Bitcoin
explanation: |
  แรงจูงใจทางการเงินหลักสำหรับนักขุดในการเข้าร่วมในกระบวนการ Bitcoin mining คือรางวัล mining รางวัลนี้ทำหน้าที่เป็นแรงจูงใจที่ทรงพลังเพื่อกระตุ้นให้นักขุดเข้าร่วมในกระบวนการ mining แม้จะมีต้นทุนด้านพลังงานก็ตาม
reviewed: true
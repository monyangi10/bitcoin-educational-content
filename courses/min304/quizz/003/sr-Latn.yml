question: Koji je glavni finansijski podsticaj za rudare da učestvuju u procesu Bitcoin rudarenja?
answer: Rudarska nagrada
wrong_answers:
  - Sposobnost upravljanja Bitcoin mrežom 
  - Sposobnost stvaranja novih bitkoina po volji
  - Sposobnost manipulacije Bitcoin cenom 
explanation: |
  Glavni finansijski podsticaj za rudare da učestvuju u
  procesu Bitcoin rudarenja je rudarska nagrada. Ova
  nagrada služi kao snažan podsticaj da ohrabri rudare
  da učestvuju u rudarskom procesu uprkos njegovoj energetskoj
  ceni.
reviewed: true

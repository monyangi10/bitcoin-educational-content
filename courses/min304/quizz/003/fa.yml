question: مشوق مالی اصلی برای ماینرها جهت شرکت در فرآیند Bitcoin Mining چیست؟
answer: پاداش Mining
wrong_answers:
  - توانایی کنترل شبکه Bitcoin
  - توانایی ایجاد بیت‌کوین‌های جدید به دلخواه
  - توانایی دستکاری قیمت Bitcoin
explanation: |
  مشوق مالی اصلی برای ماینرها جهت شرکت در فرآیند Bitcoin Mining، پاداش Mining است. این پاداش به عنوان یک انگیزه قوی عمل می‌کند تا ماینرها را تشویق به شرکت در فرآیند Mining کند، علیرغم هزینه انرژی آن.
reviewed: true
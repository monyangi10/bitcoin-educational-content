question: Какъв е основният финансов стимул за миньорите да участват в процеса Bitcoin mining?
answer: Наградата за mining
wrong_answers:
  - Възможност за управление на мрежата Bitcoin
  - Възможност за създаване на нови биткойни по желание
  - Възможност за манипулиране на цената на Bitcoin
explanation: |
  Основният финансов стимул за миньорите да участват в
  gW-5 mining е възнаграждението mining. Тази
  служи като мощен стимул за насърчаване на миньорите
  да участват в процеса mining, въпреки неговата енергийна
  разходите.
reviewed: true
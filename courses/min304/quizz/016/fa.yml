question: نقش ماینرهای Bitcoin در دنیای انرژی چیست؟
answer: ماینرهای Bitcoin به طور مداوم به دنبال منابع برق ارزان هستند، اغلب منابعی که هدر می‌روند یا استفاده نشده‌اند. آن‌ها می‌توانند به عنوان یک منبع تقاضای انعطاف‌پذیر عمل کنند و آماده مصرف این برق بلااستفاده باشند و بدین ترتیب به جبران هزینه‌های زیرساختی کمک کنند.
wrong_answers:
  - ماینرهای Bitcoin به طور مداوم به دنبال منابع انرژی تجدیدپذیر هستند تا ردپای کربنی خود را کاهش دهند.
  - ماینرهای Bitcoin به طور مداوم به دنبال منابع انرژی هسته‌ای برای تأمین انرژی عملیات Mining خود هستند، زیرا این تنها روش پاک و تجدیدپذیر برای تولید انرژی است.
  - ماینرهای Bitcoin به طور مداوم به دنبال منابع انرژی خورشیدی برای تأمین انرژی عملیات Mining خود هستند.
explanation: |
  این فصل توضیح می‌دهد که ماینرهای Bitcoin به طور مداوم به دنبال منابع برق ارزان هستند، اغلب آن‌هایی که هدر رفته یا استفاده نشده‌اند. آن‌ها می‌توانند به عنوان یک منبع تقاضای انعطاف‌پذیر عمل کنند و آماده مصرف این برق بلااستفاده باشند، بنابراین به جبران هزینه‌های زیرساخت کمک می‌کنند.
reviewed: true
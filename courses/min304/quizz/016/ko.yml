question: 에너지 세계에서 Bitcoin 채굴자의 역할은 무엇인가요?
answer: Bitcoin 채굴자들은 값싼 전기 공급원을 끊임없이 찾고 있으며, 종종 낭비되거나 개발되지 않은 전력을 찾고 있습니다. 채굴자는 고아가 된 전기를 소비할 준비가 되어 있는 유연한 수요처 역할을 하여 인프라 비용을 상쇄하는 데 도움을 줄 수 있습니다.
wrong_answers:
  - Bitcoin 광부들은 탄소 발자국을 줄이기 위해 끊임없이 재생 가능한 에너지원을 찾고 있습니다.
  - Bitcoin 채굴업체들은 Mining 운영에 필요한 에너지를 생산할 수 있는 유일한 청정하고 재생 가능한 방법인 원자력 에너지원을 끊임없이 찾고 있습니다.
  - Bitcoin 채굴자들은 Mining 운영에 전력을 공급하기 위해 끊임없이 태양 에너지 원을 찾고 있습니다.
explanation: |
  이 장에서는 Bitcoin 채굴자들이 끊임없이 다음과 같이 설명합니다
  값싼 전기 공급원을 찾고 있습니다
  낭비되거나 개발되지 않은 전력을 찾고 있습니다. 이러한 고아 전력을 소비할 준비가 된 유연한 수요
  고아가 된 전력을 소비할 준비가 되어 있어
  인프라 비용을 상쇄하는 데 도움이 됩니다.
reviewed: true
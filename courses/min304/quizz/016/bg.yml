question: Каква е ролята на миньорите от Bitcoin в света на енергетиката?
answer: Миньорите от Bitcoin постоянно търсят източници на евтина електроенергия, често такива, които са изгубени или неизползвани. Те могат да действат като гъвкав източник на търсене, готов да потребява тази безстопанствена електроенергия, като по този начин помагат за компенсиране на разходите за инфраструктура.
wrong_answers:
  - Миньорите от Bitcoin непрекъснато търсят източници на възобновяема енергия, за да намалят въглеродния си отпечатък.
  - Миньорите от Bitcoin непрекъснато търсят източници на ядрена енергия, за да захранват своите операции в mining, тъй като това е единственият чист и възобновяем начин за производство на енергия.
  - Миньорите от Bitcoin постоянно търсят източници на слънчева енергия, за да захранват своите операции в mining.
explanation: |
  В главата се обяснява, че миньорите от Bitcoin постоянно
  търсят източници на евтина електроенергия, често такива, които са
  които се губят или не се използват. Те могат да действат като гъвкаво търсене
  източник на енергия, готов да консумира тази изоставена електроенергия, като по този начин
  като по този начин се компенсират разходите за инфраструктура.
reviewed: true
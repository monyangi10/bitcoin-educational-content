question: Koji je potencijalni rizik centralizacije Bitcoin rudarenja?
answer: Centralizacija Bitcoin rudarenja može potencijalno dovesti do cenzure transakcija i učiniti mrežu ranjivom na napade, uključujući napad od 51%, gde akter ili grupa kontroliše više od 50% snage heširanja mreže, omogućavajući im da kontrolišu i manipulišu mrežom.
wrong_answers:
  - Centralizacija Bitcoin rudarenja može potencijalno dovesti do smanjenja vrednosti Bitcoina i učiniti mrežu ranjivom na inflaciju.
  - Centralizacija Bitcoin rudarenja može potencijalno dovesti do smanjenja nagrade za izrudareni blok i učiniti mrežu podložnom stagnaciji.
  - Centralizacija Bitcoin rudarenja može potencijalno dovesti do smanjenja brzine transakcija i učiniti mrežu podložnom zagušenju.
explanation: |
  Poglavlje objašnjava da centralizacija Bitcoin rudarenja
  može potencijalno dovesti do cenzure transakcija i učiniti
  mrežu ranjivom na napade, uključujući napad od 51%.
reviewed: true

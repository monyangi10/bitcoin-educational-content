question: خطر بالقوه تمرکز Mining در Bitcoin چیست؟
answer: متمرکزسازی Mining در Bitcoin می‌تواند به سانسور تراکنش‌ها منجر شود و شبکه را در معرض حملات، از جمله حمله 51% قرار دهد، جایی که یک بازیگر یا گروهی بیش از 50% از قدرت هش شبکه را کنترل می‌کند و به آنها اجازه می‌دهد شبکه را کنترل و دستکاری کنند.
wrong_answers:
  - متمرکز شدن Mining در Bitcoin می‌تواند به کاهش ارزش Bitcoin منجر شود و شبکه را در برابر تورم آسیب‌پذیر کند.
  - متمرکزسازی Mining در Bitcoin می‌تواند به کاهش Block reward منجر شود و شبکه را در معرض رکود قرار دهد.
  - متمرکزسازی Mining در Bitcoin می‌تواند به کاهش سرعت تراکنش منجر شود و شبکه را در برابر ازدحام آسیب‌پذیر کند.
explanation: |
  این فصل توضیح می‌دهد که تمرکز Mining در Bitcoin
  می‌تواند به سانسور تراکنش‌ها منجر شود و شبکه را در برابر حملات، از جمله حمله ۵۱٪، آسیب‌پذیر کند.
reviewed: true
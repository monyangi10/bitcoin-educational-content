question: Bitcoin에서 Mining 중앙 집중화의 잠재적 위험은 무엇인가요?
answer: Bitcoin의 Mining 중앙화는 잠재적으로 트랜잭션 검열로 이어질 수 있으며, 특정 행위자나 그룹이 네트워크 해싱 파워의 50% 이상을 통제하여 네트워크를 제어하고 조작할 수 있는 51% 공격과 같은 공격에 취약해질 수 있습니다.
wrong_answers:
  - Bitcoin의 Mining 중앙 집중화는 잠재적으로 Bitcoin의 가치를 떨어뜨리고 네트워크가 인플레이션에 취약하게 만들 수 있습니다.
  - Bitcoin의 Mining 중앙 집중화는 잠재적으로 Block reward의 감소로 이어질 수 있으며 네트워크가 정체될 수 있습니다.
  - Bitcoin의 Mining 중앙 집중화는 잠재적으로 트랜잭션 속도를 저하시키고 네트워크를 혼잡에 취약하게 만들 수 있습니다.
explanation: |
  이 장에서는 Bitcoin의 Mining 중앙화
  은 잠재적으로 트랜잭션 검열로 이어질 수 있으며, 51% 공격을 포함한
  네트워크가 51% 공격을 비롯한 공격에 취약해질 수 있다고 설명합니다.
reviewed: true
question: Какъв е потенциалният риск от централизация на mining в Bitcoin?
answer: Централизацията на Mining в Bitcoin може потенциално да доведе до цензуриране на трансакциите и да направи мрежата уязвима за атаки, включително 51% атака, при която даден участник или група контролира повече от 50% от хеширащата мощ на мрежата, което им позволява да контролират и манипулират мрежата.
wrong_answers:
  - Централизирането на Mining в Bitcoin може потенциално да доведе до намаляване на стойността на Bitcoin и да направи мрежата уязвима от инфлация.
  - Централизацията на Mining в Bitcoin може да доведе до намаляване на възнаграждението за блок и да направи мрежата уязвима към стагнация.
  - Централизацията на Mining в Bitcoin може да доведе до намаляване на скоростта на транзакциите и да направи мрежата уязвима към претоварване.
explanation: |
  В главата се обяснява, че централизацията на mining в Bitcoin
  може потенциално да доведе до цензура на транзакциите и да направи
  мрежата да бъде уязвима към атаки, включително атаката 51%.
reviewed: true
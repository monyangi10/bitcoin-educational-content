question: Ni ikihe kibazo gishobora guterwa n’ugukoraniriza hamwe mining muri Bitcoin?
answer: Gukoraniriza hamwe mining muri Bitcoin birashobora gutuma habaho ukwiharira ibikorwa vy’amahera no gutuma umuhora ushobora guterwa, harimwo n’igitero ca 51%, aho umukinyi canke umugwi ugenzura ububasha burenga 50% bwo gukora hashing ku muhora, bikaba bituma bashobora kugenzura no gukoresha umuhora.
wrong_answers:
  - Gushiramwo mining muri Bitcoin birashobora gutuma agaciro ka Bitcoin kagabanuka, bigatuma urubuga rushobora gushikirwa n’ugutera imbere kw’ibiciro.
  - Gushiramwo mining muri Bitcoin birashobora gutuma agashimwe ka Block kagabanuka maze bigatuma urubuga rushobora guhagarara.
  - Gushiramwo mining muri Bitcoin birashobora gutuma umuvuduko w’ugucuruza ugabanuka kandi bigatuma urubuga rushobora gushikirwa n’uguhagarara.
explanation: |
  Iki gice kirasigura ko gukoraniriza hamwe mining muri Bitcoin bishobora gutuma habaho
  ukwiharira ibikorwa vy’amahera no gutuma umuhora ushobora guterwa, harimwo n’igitero ca 51%.
reviewed: true

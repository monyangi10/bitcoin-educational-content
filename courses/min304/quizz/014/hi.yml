question: Mining के केंद्रीकरण का Bitcoin में संभावित जोखिम क्या है?
answer: Mining का Bitcoin में केंद्रीकरण होने से लेन-देन पर सेंसरशिप हो सकती है और नेटवर्क हमलों के प्रति कमजोर हो सकता है, जिसमें 51% हमला भी शामिल है। इसमें कोई व्यक्ति या समूह नेटवर्क की 50% से ज्यादा हैशिंग पावर पर काबू पा लेता है, जिससे वे नेटवर्क को मनमर्जी से चला और हेरफेर कर सकते हैं।
wrong_answers:
  - Mining का Bitcoin में केंद्रीकरण, Bitcoin के मूल्य में कमी ला सकता है और नेटवर्क को मुद्रास्फीति के प्रति संवेदनशील बना सकता है।
  - जीडब्ल्यू-8 का जीडब्ल्यू-7 में केंद्रीकरण, जीडब्ल्यू-6 को कम कर सकता है और नेटवर्क को ठहराव की स्थिति में ला सकता है।
  - Mining का Bitcoin में केंद्रीकरण होने से लेन-देन की गति कम हो सकती है और नेटवर्क में भीड़-भाड़ की समस्या पैदा हो सकती है।

question: ข้อเสียที่อาจเกิดขึ้นของ mining สำหรับเครือข่ายคืออะไร?
answer: หากไม่มีแรงจูงใจทางการเงินที่เพียงพอ อาจเป็นเรื่องยากสำหรับนักขุดที่จะสนับสนุนเครือข่ายต่อไป
wrong_answers:
  - มันอาจนำไปสู่การลดลงของราคา Bitcoin
  - มันอาจนำไปสู่การเพิ่มขึ้นของ hashrate ของเครือข่าย
  - มันอาจนำไปสู่การลดลงของจำนวนโหนดที่ใช้งานในเครือข่าย
explanation: |
  Mining สำหรับเครือข่ายเป็นความคิดริเริ่มที่น่ายกย่องที่มีส่วนช่วยในด้านความปลอดภัยและการกระจายอำนาจของเครือข่าย Bitcoin อย่างไรก็ตาม หากไม่มีแรงจูงใจทางการเงินที่เพียงพอ อาจเป็นเรื่องยากสำหรับนักขุดที่จะสนับสนุนเครือข่ายต่อไป โดยเฉพาะอย่างยิ่งหากพวกเขาดำเนินการขาดทุน
reviewed: true
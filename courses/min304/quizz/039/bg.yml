question: Какви са потенциалните недостатъци на mining за мрежата?
answer: Без достатъчен финансов стимул за миньорите може да е трудно да продължат да поддържат мрежата
wrong_answers:
  - Това може да доведе до намаляване на цената на Bitcoin
  - Това може да доведе до увеличаване на hashrate на мрежата
  - Това може да доведе до намаляване на броя на активните възли в мрежата
explanation: |
  Mining за мрежата е благородна инициатива, която
  допринася за сигурността и децентрализацията на
  Bitcoin. Въпреки това, без достатъчно финансови средства
  стимул, за миньорите може да бъде трудно да продължат
  да поддържат мрежата, особено ако работят на
  загуба.
reviewed: true
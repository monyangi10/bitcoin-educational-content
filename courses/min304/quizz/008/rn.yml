question: Ni akamaro akahe nyamukuru k’ama ASIC mu bijanye na Bitcoin Mining?
answer: Zishobora gukora ubwoko bumwe bw’ibiharuro
wrong_answers:
  - Zishobora gukora ubwoko bwinshi bw’ibiharuro butandukanye
  - Zikoresha umuyagankuba muto kuruta ama CPU
  - Birazimvye kurusha ama CPUs
explanation: |
  ASICs ni chips, zigereranywa na chip ya CPU, ariko rero, zateguwe kugira
  ngo zikore ubwoko bumwe gusa bw’uguharura mu buryo bwiza cane. mu gihe ASIC izoshobora gukora ubwoko
  bumwe gusa bw’ibiharuro, ariko ikabikora neza cane. Ku bijanye n’ama ASICs ya Bitcoin, yagenewe
  guharura igenabikorwa(algorithm) ya SHA-256.
reviewed: true

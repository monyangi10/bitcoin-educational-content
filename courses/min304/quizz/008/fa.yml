question: مزیت اصلی ASICها در زمینه Bitcoin Mining چیست؟
answer: آن‌ها می‌توانند یک نوع محاسبه خاص را بسیار کارآمد انجام دهند.
wrong_answers:
  - آن‌ها می‌توانند انواع مختلفی از محاسبات را انجام دهند.
  - آنها برق کمتری نسبت به CPUها مصرف می‌کنند.
  - آنها ارزان‌تر از CPUها هستند
explanation: |
  ASICها تراشه‌هایی هستند که قابل مقایسه با تراشه CPU می‌باشند، اما به گونه‌ای توسعه یافته‌اند که تنها یک نوع محاسبه خاص را به کارآمدترین شکل ممکن انجام دهند. در مورد ASICهای Bitcoin، آن‌ها برای محاسبه الگوریتم SHA256 طراحی شده‌اند.
reviewed: true
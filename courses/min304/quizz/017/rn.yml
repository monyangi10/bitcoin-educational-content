question: Ni ingaruka izihe amategeko ashobora kugira kuri Bitcoin mining?
answer: Iyo igihugu nka Leta Zunze Ubumwe za Amerika gifata ingingo yo gutegeka canke kubuza ibikorwa vy’amafaranga bimwe bimwe vya Bitcoin, vyoshobora kugira ingaruka zikomeye ku muhora, cane cane iyo igice kinini c’ububasha bwo gukora hashing kiri muri ico gihugu.
wrong_answers:
  - Iyo igihugu nka Amerika gifata ingingo yo gutegeka canke kubuza Bitcoin mining, vyoshobora gutuma agaciro ka Bitcoin kaduga.
  - Iyo igihugu nka Amerika gifata ingingo yo gutegeka canke kubuza Bitcoin mining, vyoshobora gutuma Block reward yongerekana.
  - Iyo igihugu nka Amerika gifata ingingo yo gutegeka canke kubuza Bitcoin mining, vyoshobora gutuma umuvuduko wo gucuruza wiyongera.
explanation: |
  Iki gice kirasigura ko Iyo igihugu nka Leta Zunze Ubumwe za Amerika gifata ingingo yo gutegeka canke kubuza
  ibikorwa vy’amafaranga bimwe bimwe vya Bitcoin, vyoshobora kugira ingaruka zikomeye ku muhora, cane
  cane iyo igice kinini c’ububasha bwo gukora hashing kiri muri ico gihugu.
reviewed: true

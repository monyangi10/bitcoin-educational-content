question: Bitcoin Mining에 대한 규제의 잠재적 영향은 무엇인가요?
answer: 미국과 같은 국가에서 특정 Bitcoin 거래를 규제하거나 금지하기로 결정할 경우, 특히 해싱 파워의 상당 부분이 해당 국가에 집중되어 있는 경우 네트워크에 큰 영향을 미칠 수 있습니다.
wrong_answers:
  - 미국과 같은 국가가 Bitcoin Mining를 규제하거나 금지하기로 결정하면 Bitcoin의 가치가 상승할 수 있습니다.
  - 미국과 같은 국가에서 Bitcoin Mining을 규제하거나 금지하기로 결정하면 Block reward의 증가로 이어질 수 있습니다.
  - 미국과 같은 국가에서 Bitcoin Mining를 규제하거나 금지하기로 결정하면 거래 속도가 빨라질 수 있습니다.
explanation: |
  이 장에서는 미국과 같은 국가가 특정 Bitcoin 거래를 규제하거나 금지하기로 결정할 경우, 특히 해싱 파워의 상당 부분이 해당 국가에 집중되어 있는 경우 네트워크에 큰 영향을 미칠 수 있다고 설명합니다.
reviewed: true
question: Kakav je potencijalni uticaj regulative na Bitcoin rudarenje?
answer: Ako bi zemlja poput Sjedinjenih Američkih Država odlučila da reguliše ili zabrani određene Bitcoin transakcije, to bi moglo imati značajan uticaj na mrežu, posebno ako je veliki deo snage za rudarenje centralizovan u toj zemlji.
wrong_answers:
  - Ako bi zemlja poput Sjedinjenih Država odlučila da reguliše ili zabrani Bitcoin rudarenje, to bi moglo dovesti do povećanja vrednosti Bitcoina.
  - Ako bi zemlja poput Sjedinjenih Američkih Država odlučila da reguliše ili zabrani Bitcoin rudarenje, to bi moglo dovesti do povećanja nagrade za izrudareni blok.
  - Ako bi zemlja poput Sjedinjenih Država odlučila da reguliše ili zabrani Bitcoin rudarenje, to bi moglo dovesti do povećanja brzine transakcija.

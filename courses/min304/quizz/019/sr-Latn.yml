question: Koji je značaj Lightning mreže u kontekstu Bitcoin rudarenja?
answer: Lightning mreža ima potencijal da značajno smanji naknade za transakcije, čime utiče na prihode rudara.
wrong_answers:
  - Lightning mreža povećava veličinu bloka, čime povećava prihod rudara.
  - Lightning mreža smanjuje potrošnju energije za rudarenje Bitcoina.
  - Lightning mreža povećava brzinu rudarenja Bitcoina.
explanation: |
  Lightning mreža omogućava brze i niskotroškovne
  transakcije izvan glavnog Bitcoin lanca. Ovo ima
  potencijal da značajno smanji naknade za transakcije,
  što bi moglo uticati na prihode rudara.
reviewed: true

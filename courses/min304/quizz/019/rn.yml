question: Ni ubuhe busobanuro bwa Lightning Network mu bijanye n’ivyo Bitcoin Mining ivuga?
answer: Lightning Network irafise ubushobozi bwo kugabanya cane amafaranga akatwa kuri buri gikorwa, ivyo bikaba bigira ingaruka ku mafaranga aba miners baronka.
wrong_answers:
  - Lightning Network yongera ubunini bwa block, gutyo igatuma abacukuzi bongera amahera.
  - Lightning Network igabanya inguvu zikoreshwa na Bitcoin mining.
  - Lightning Network yongera umuvuduko wa Bitcoin Mining.
explanation: |
  Lightning Network ituma habaho ibikorwa vyihuta kandi bizimbutse hanze ya Bitcoin chain.
  Ivyo bifise ubushobozi bwo kugabanya cane amafaranga akatwa kuri buri gikorwa, ivyo
  bikaba bigira ingaruka ku mafaranga aba miners baronka.
reviewed: true

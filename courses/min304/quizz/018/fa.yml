question: اصل آتاکای در زمینه Bitcoin Mining چیست؟
answer: اصل آتاکای به استفاده مولد از حرارت تولید شده از Bitcoin Mining اشاره دارد.
wrong_answers:
  - اصل آتاکای به استفاده از منابع انرژی تجدیدپذیر برای Bitcoin Mining اشاره دارد.
  - اصل آتاکای به استفاده از سیستم‌های خنک‌کننده پیشرفته در Bitcoin Mining اشاره دارد.
  - اصل آتاکای به استفاده از سخت‌افزار با مصرف انرژی کم در Bitcoin Mining اشاره دارد.
explanation: |
  اصل آتاکای به ایده‌ی تمرکززدایی Mining از طریق استفاده‌ی مولد از حرارت تولید شده اشاره دارد. این مفهوم پیشنهاد می‌کند که مؤسسات انرژی‌بر می‌توانند از حرارت تولید شده توسط ماینرها برای گرم کردن تأسیسات خود بهره‌مند شوند.
reviewed: true
question: hashrate วัดอะไรในเครือข่าย Bitcoin?
answer: การคำนวณต่อวินาที
wrong_answers:
  - จำนวนธุรกรรมต่อวินาที
  - จำนวนโหนดที่ใช้งานอยู่
  - ปริมาณไฟฟ้าที่เครือข่ายใช้
explanation: |
  hashrate ในเครือข่าย Bitcoin วัดจำนวนการคำนวณที่สามารถดำเนินการได้ต่อวินาที เป็นตัวบ่งชี้สำคัญของสุขภาพและความปลอดภัยของเครือข่าย
reviewed: true
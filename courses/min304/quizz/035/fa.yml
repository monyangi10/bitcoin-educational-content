question: Hashrate در شبکه Bitcoin چه چیزی را اندازه‌گیری می‌کند؟
answer: محاسبات در ثانیه
wrong_answers:
  - تعداد تراکنش‌ها در هر ثانیه
  - تعداد گره‌های فعال
  - مقدار برق مصرفی توسط شبکه
explanation: |
  Hashrate در شبکه Bitcoin تعداد محاسباتی که می‌توان در هر ثانیه انجام داد را اندازه‌گیری می‌کند. این یک شاخص کلیدی از سلامت و امنیت شبکه است.
reviewed: true
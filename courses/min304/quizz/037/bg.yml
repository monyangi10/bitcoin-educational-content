question: Какви са потенциалните недостатъци на mining с цел печалба?
answer: Това може да доведе до централизиране на мощността за хеширане и да има значително въздействие върху околната среда
wrong_answers:
  - Това може да доведе до намаляване на цената на Bitcoin
  - Това може да доведе до намаляване на hashrate на мрежата
  - Това може да доведе до намаляване на броя на активните възли в мрежата
explanation: |
  Mining с цел печалба може да доведе до централизиране на хеширането
  ако само няколко големи компании могат да си позволят да инвестират в
  високотехнологично оборудване mining. Освен това, енергията
  потреблението на mining с цел печалба може да има значително
  въздействие върху околната среда в зависимост от енергийния източник.
reviewed: true
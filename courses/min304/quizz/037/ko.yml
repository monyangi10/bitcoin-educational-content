question: 수익성 측면에서 Mining의 잠재적인 단점은 무엇인가요?
answer: 이는 해싱 파워의 중앙 집중화로 이어질 수 있으며 환경에 중대한 영향을 미칠 수 있습니다
wrong_answers:
  - Bitcoin의 가격 하락으로 이어질 수 있습니다
  - 네트워크의 Hashrate가 감소할 수 있습니다
  - 네트워크의 활성 노드 수가 감소할 수 있습니다
explanation: |
  영리 목적의 Mining는 해싱 파워의 중앙 집중화로 이어질 수 있습니다
  해싱의 중앙화를 초래할 수 있습니다
  하이엔드 Mining 장비. 또한, 영리 목적의 Mining의 에너지
  영리 목적의 Mining 소비는 에너지원에 따라 상당한
  환경에 큰 영향을 미칠 수 있습니다.
reviewed: true
question: Koji je potencijalni nedostatak rudarenja za profit?
answer: To može dovesti do centralizacije snage heširanja i takođe može imati značajan uticaj na životnu sredinu.
wrong_answers:
  - To može dovesti do smanjenja cene Bitcoina
  - To može dovesti do smanjenja Hashrate mreže.
  - To može dovesti do smanjenja broja aktivnih čvorova u mreži
explanation: |
  Rudarenje za profit može dovesti do centralizacije snage heširanja ako samo nekoliko velikih kompanija može priuštiti ulaganje u vrhunsku rudarsku opremu. 
  Pored toga, potrošnja energije za rudarenje za profit mogla bi imati značajan uticaj na životnu sredinu u zavisnosti od izvora energije.
reviewed: true

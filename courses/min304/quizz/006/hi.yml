question: Bitcoin नेटवर्क में माइनर्स का मुख्य काम क्या है?
answer: एक डिजिटल पज़ल को हल करने और एक नया ब्लॉक वैलिडेट करने के लिए
wrong_answers:
  - नए बिटकॉइन बनाने के लिए
  - Bitcoin की कीमत को नियंत्रित करने के लिए
  - Bitcoin उपयोगकर्ताओं की पहचान सत्यापित करने के लिए
explanation: |
  Bitcoin और Mining के संदर्भ में, माइनर्स जल्दी से प्रयास करते हैं
  डिजिटल पहेली को सुलझाओ। पहेली सुलझाने वाला पहला Miner
  पूरे नेटवर्क को अपना समाधान पेश करता है, जो
  फिर आसानी से इसकी वैधता सत्यापित करें। यह सफल
  वेरिफिकेशन Miner को एक नया ब्लॉक वैलिडेट करने की अनुमति देता है
  इसे Bitcoin टाइमचेन में जोड़ दो।
reviewed: true
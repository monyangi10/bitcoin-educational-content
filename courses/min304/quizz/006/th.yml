question: งานหลักของนักขุดในเครือข่าย Bitcoin คืออะไร?
answer: ในการแก้ปริศนาดิจิทัลและตรวจสอบบล็อกใหม่
wrong_answers:
  - สร้างบิตคอยน์ใหม่
  - เพื่อควบคุมราคาของ Bitcoin
  - เพื่อตรวจสอบตัวตนของผู้ใช้ Bitcoin
explanation: |
  ในบริบทของ Bitcoin mining นักขุดพยายามที่จะแก้ปริศนาดิจิทัลอย่างรวดเร็ว นักขุดคนแรกที่แก้ปริศนาได้จะนำเสนอวิธีแก้ปัญหาของตนต่อเครือข่ายทั้งหมด ซึ่งสามารถตรวจสอบความถูกต้องได้อย่างง่ายดาย การตรวจสอบที่ประสบความสำเร็จนี้ทำให้นักขุดสามารถยืนยันบล็อกใหม่และเพิ่มลงใน Bitcoin Timechain ได้
reviewed: true
question: وظیفه اصلی ماینرها در شبکه Bitcoin چیست؟
answer: برای حل یک معمای دیجیتال و اعتبارسنجی یک بلوک جدید
wrong_answers:
  - برای ایجاد بیت‌کوین‌های جدید
  - برای کنترل قیمت Bitcoin
  - برای تأیید هویت کاربران Bitcoin
explanation: |
  در زمینه Bitcoin Mining، ماینرها تلاش می‌کنند تا به سرعت یک معمای دیجیتال را حل کنند. اولین Miner که معما را حل کند، راه‌حل خود را به کل شبکه ارائه می‌دهد، که سپس می‌تواند به راحتی اعتبار آن را تأیید کند. این تأیید موفقیت‌آمیز به Miner اجازه می‌دهد تا یک بلوک جدید را اعتبارسنجی کرده و آن را به Bitcoin تایم‌چین اضافه کند.
reviewed: true
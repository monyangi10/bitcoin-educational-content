question: Bitcoin नेटवर्क में नोड्स की क्या भूमिका है?
answer: नोड्स लेन-देन और ब्लॉक्स को वेरिफाई और वैलिडेट करके इंटीग्रिटी बनाए रखते हैं।
wrong_answers:
  - नोड्स ब्लॉक्स बनाते हैं और उन्हें वैलिडेट करते हैं।
  - नोड्स सिर्फ ट्रांजैक्शन्स को वेरिफाई करते हैं।
  - Bitcoin नेटवर्क में नोड्स की कोई भूमिका नहीं है।
explanation: |
  Bitcoin नेटवर्क में, नोड्स अखंडता बनाए रखते हैं
  नेटवर्क द्वारा लेन-देन को सत्यापित और मान्य करके
  ब्लॉक्स। गलत या धोखाधड़ी वाला ब्लॉक रिजेक्ट कर दिया जाएगा।
  नोड्स के द्वारा, नेटवर्क की सुरक्षा को बनाए रखते हुए।
reviewed: true
question: نقش نودها در شبکه Bitcoin چیست؟
answer: گره‌ها با تأیید و اعتبارسنجی تراکنش‌ها و بلوک‌ها، یکپارچگی را حفظ می‌کنند.
wrong_answers:
  - گره‌ها بلوک‌ها را ایجاد و اعتبارسنجی می‌کنند.
  - گره‌ها فقط تراکنش‌ها را تأیید می‌کنند.
  - گره‌ها در شبکه Bitcoin نقشی ندارند.
explanation: |
  در شبکه Bitcoin، نودها با تأیید و اعتبارسنجی تراکنش‌ها و بلوک‌ها، یکپارچگی شبکه را حفظ می‌کنند. یک بلوک نادرست یا تقلبی توسط نودها رد خواهد شد و امنیت شبکه حفظ می‌شود.
reviewed: true
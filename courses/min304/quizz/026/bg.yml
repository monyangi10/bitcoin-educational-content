question: Каква е ролята на възлите в мрежата Bitcoin?
answer: Възлите поддържат интегритета, като проверяват и валидират транзакциите и блоковете.
wrong_answers:
  - Възлите създават и валидират блокове.
  - Възлите проверяват само транзакциите.
  - Възлите нямат роля в мрежата Bitcoin.
explanation: |
  В мрежата Bitcoin възлите поддържат целостта на
  мрежата, като проверяват и валидират транзакциите и
  блокове. Некоректен или фалшив блок ще бъде отхвърлен
  от възлите, като по този начин се запазва сигурността на мрежата.
reviewed: true
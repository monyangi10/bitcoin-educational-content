question: Bitcoin Mining के संदर्भ में कहावत "आपका Hashrate नहीं, तो आपका इनाम नहीं" का क्या अर्थ है?
answer: यदि आप Hashrate को नियंत्रित नहीं करते हैं, तो आप Mining पुरस्कारों को भी नियंत्रित नहीं करते हैं।
wrong_answers:
  - यदि आपका Hashrate उच्च नहीं है, तो आपको कोई पुरस्कार नहीं मिलेगा।
  - यदि आपके पास Bitcoin नहीं है, तो आपको कोई पुरस्कार नहीं मिलेगा।
  - यदि आपके पास Mining मशीन नहीं है, तो आपको कोई पुरस्कार नहीं मिलेगा।
explanation: |
  कहावत है कि अगर आपका Hashrate नहीं तो आपका इनाम नहीं क्रिप्टोकरेंसी की दुनिया में प्रचलित कहावत के समान है, अगर आपकी चाबियाँ नहीं तो आपके बिटकॉइन नहीं। इसका मतलब है कि अगर आप Hashrate को नियंत्रित नहीं करते हैं तो आप Mining पुरस्कारों को भी नियंत्रित नहीं कर सकते। ऐसा इसलिए है क्योंकि Mining से मिलने वाले पुरस्कार सीधे Hashrate के समानुपातिक होते हैं।
reviewed: true
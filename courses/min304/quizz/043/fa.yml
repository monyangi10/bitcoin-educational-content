question: معنای ضرب‌المثل "Not your Hashrate, not your reward" در زمینه Bitcoin و Mining چیست؟
answer: اگر Hashrate را کنترل نکنید، پاداش‌های Mining را کنترل نمی‌کنید.
wrong_answers:
  - اگر Hashrate بالایی نداشته باشید، هیچ پاداشی دریافت نخواهید کرد.
  - اگر Bitcoin را ندارید، هیچ پاداشی دریافت نخواهید کرد.
  - اگر دستگاه Mining ندارید، هیچ پاداشی دریافت نخواهید کرد.
explanation: |
  ضرب‌المثل "Hashrate شما نیست، پاداش شما نیست" مشابه
  ضرب‌المثل معروف در دنیای ارزهای دیجیتال است،
  "کلیدهای شما نیست، بیت‌کوین‌های شما نیست." این به این معناست که اگر شما
  Hashrate را کنترل نکنید، پاداش‌های Mining را کنترل نمی‌کنید. این به این دلیل است که پاداش‌های Mining
  مستقیماً متناسب با Hashrate هستند.
reviewed: true
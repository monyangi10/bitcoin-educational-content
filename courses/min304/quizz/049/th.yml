question: ทำไมบิทคอยน์บริสุทธิ์ถึงเป็นที่ต้องการโดยเฉพาะจากผู้เล่นสถาบันขนาดใหญ่?
answer: พวกเขาสามารถรับประกันความถูกต้องตามกฎหมายของสินทรัพย์ดิจิทัลของตนต่อหน่วยงานกำกับดูแลได้
wrong_answers:
  - พวกเขาสามารถขายในราคาที่สูงขึ้นได้
  - พวกเขาสามารถใช้มันสำหรับกิจกรรมที่ผิดกฎหมาย
  - พวกเขาสามารถหลีกเลี่ยงการจ่ายภาษีจากสิ่งเหล่านั้นได้
explanation: |
  บิทคอยน์บริสุทธิ์เป็นที่ต้องการอย่างมากโดยผู้เล่นสถาบันขนาดใหญ่เพราะพวกเขาสามารถรับประกันความถูกต้องของสินทรัพย์ดิจิทัลของพวกเขาต่อหน่วยงานกำกับดูแล บิทคอยน์เหล่านี้ไม่เคยถูกปนเปื้อน ทำให้มีการรับประกันบางอย่างต่อการถูกปฏิเสธโดยหน่วยงานกำกับดูแลหรือแพลตฟอร์มแลกเปลี่ยนหลัก ๆ
reviewed: true
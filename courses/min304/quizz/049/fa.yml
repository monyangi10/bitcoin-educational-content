question: چرا بیت‌کوین‌های دست‌نخورده به‌ویژه توسط بازیگران بزرگ نهادی مورد توجه قرار می‌گیرند؟
answer: آن‌ها می‌توانند مشروعیت دارایی‌های دیجیتال خود را به مقامات نظارتی تضمین کنند.
wrong_answers:
  - آنها می‌توانند آنها را با قیمت بالاتری بفروشند.
  - آن‌ها می‌توانند از آن‌ها برای فعالیت‌های غیرقانونی استفاده کنند.
  - آن‌ها می‌توانند از پرداخت مالیات بر روی آن‌ها اجتناب کنند.
explanation: |
  بیت‌کوین‌های دست‌نخورده به‌ویژه توسط بازیگران بزرگ نهادی مورد توجه قرار می‌گیرند زیرا می‌توانند مشروعیت دارایی‌های دیجیتال خود را به مقامات نظارتی تضمین کنند. این بیت‌کوین‌ها هرگز آلوده نشده‌اند و برخی تضمین‌ها را در برابر رد شدن توسط تنظیم‌کنندگان یا پلتفرم‌های بزرگ Exchange ارائه می‌دهند.
reviewed: true
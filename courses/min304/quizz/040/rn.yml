question: None mining ishinga iki kuri Bitcoin?
answer: Igiciro ngenderwako ca Bitcoin
wrong_answers:
  - Igiciro co hejuru
  - Igiciro gihoraho
  - Igiciro gihinduka
explanation: |
  Mining ishobora gushinga igiciro ngenderwako ca Bitcoin, munsi y’ico giciro
  ba miners bogurisha mu ruhombo. Ikiguzi ca mining kiragira ico gikoze cane ku giciro ca Bitcoin.
reviewed: true

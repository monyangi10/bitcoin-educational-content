question: Mining, Bitcoin के लिए क्या स्थापित करता है?
answer: एक न्यूनतम कीमत
wrong_answers:
  - एक सीमित कीमत
  - एक निश्चित कीमत
  - एक परिवर्तनशील कीमत
explanation: |
  Mining, Bitcoin के लिए एक न्यूनतम मूल्य तय करता है, जिससे नीचे
  माइनर्स घाटे में बेचते। Mining की कीमत
  Bitcoin की कीमत पर काफी असर डालता है।
reviewed: true
question: Mining inaanzisha nini kwa Bitcoin?
answer: Bei ya sakafu
wrong_answers:
  - Bei ya dari
  - Bei maalum
  - Bei inayobadilika
explanation: |
  Mining inaweka bei ya sakafu kwa Bitcoin, chini yake
  wachimbaji wangeuza kwa hasara. Gharama ya Mining
  huathiri sana bei ya Bitcoin.
reviewed: true
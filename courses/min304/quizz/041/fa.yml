question: بحث درون جامعه Bitcoin درباره Mining چیست؟
answer: تعادل بین جستجوی سود و مشارکت در امنیت و توزیع شبکه Bitcoin
wrong_answers:
  - تعادل بین افزایش Hashrate و کاهش تعداد نودهای فعال
  - تعادل بین افزایش قیمت و کاهش هزینه
  - تعادل بین افزایش تعداد تراکنش‌ها و کاهش مصرف انرژی
explanation: |
  بحث درون جامعه Bitcoin در مورد Mining حول محور تعادل بین جستجوی سود و کمک به امنیت و توزیع شبکه Bitcoin می‌چرخد. در هر دو طرف این بحث استدلال‌های قوی وجود دارد.
reviewed: true
question: Bitcoin समुदाय के भीतर Mining को लेकर क्या बहस चल रही है?
answer: लाभ कमाने और Bitcoin नेटवर्क की सुरक्षा व वितरण में योगदान देने के बीच संतुलन
wrong_answers:
  - Hashrate को बढ़ाने और सक्रिय नोड्स की संख्या को कम करने के बीच संतुलन
  - कीमत बढ़ाने और लागत कम करने के बीच संतुलन
  - लेन-देन की संख्या बढ़ाने और ऊर्जा खपत कम करने के बीच संतुलन
explanation: |
  Bitcoin समुदाय के भीतर Mining को लेकर बहस
  मुनाफा कमाने और संतुलन बनाए रखने के बीच की कहानी है
  सुरक्षा और वितरण में योगदान देना
  जीडब्ल्यू-6 नेटवर्क। दोनों तरफ़ के पक्षों में मज़बूत तर्क हैं।
  बहस का।
reviewed: true
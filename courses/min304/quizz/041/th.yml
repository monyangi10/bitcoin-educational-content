question: การถกเถียงภายในชุมชน Bitcoin เกี่ยวกับ mining คืออะไร?
answer: ความสมดุลระหว่างการแสวงหากำไรและการมีส่วนร่วมในความปลอดภัยและการกระจายของเครือข่าย Bitcoin
wrong_answers:
  - ความสมดุลระหว่างการเพิ่ม hashrate และการลดจำนวนโหนดที่ใช้งานอยู่
  - ความสมดุลระหว่างการเพิ่มราคาและการลดต้นทุน
  - ความสมดุลระหว่างการเพิ่มจำนวนธุรกรรมและการลดการใช้พลังงาน
explanation: |
  การอภิปรายภายในชุมชน Bitcoin เกี่ยวกับ mining
  หมุนรอบความสมดุลระหว่างการแสวงหากำไรและ
  การมีส่วนร่วมในความปลอดภัยและการกระจายของ
  เครือข่าย Bitcoin มีข้อโต้แย้งที่แข็งแกร่งในทั้งสองด้าน
  ของการอภิปราย
reviewed: true
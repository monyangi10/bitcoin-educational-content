question: Ni impaka iyihe iri mu muryango wa Bitcoin ku bijanye na mining?
answer: Uburinganire hagati yo kurondera inyungu no gutanga umusada mu kubungabunga no gukwiragiza umuhora wa Bitcoin.
wrong_answers:
  - Uburinganire hagati yo kwongerera Hashrate no kugabanya umubare wa node zikora .
  - Uburinganire hagati yo kwongera igiciro no kugabanya igiciro
  - Uburinganire hagati yo kwongera umubare wibikorwa no kugabanya ingufu zikoreshwa
explanation: |
  Impaka ziri mu muryango wa Bitcoin ku bijanye na mining.
  izunguruka k'Uburinganire hagati yo kurondera inyungu no gutanga umusada mu
  kubungabunga no gukwiragiza umuhora wa Bitcoin. hariho impamvu zikomeye kumpande zompi.
reviewed: true

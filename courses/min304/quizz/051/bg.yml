question: Какво е основното предимство на mining virgin bitcoins?
answer: Те никога не са били изразходвани и нямат никаква история, свързана с тях.
wrong_answers:
  - Те могат да бъдат продадени на по-висока цена.
  - Те могат да се използват за незаконни дейности.
  - Те могат да се съхраняват дълго време, без да губят стойността си.
explanation: |
  Основното предимство на девствените биткойни mining е, че те
  никога не са били изразходвани и нямат никаква история, свързана с тях.
  Тези биткойни често се считат за по-ценни, защото
  никога не са били опорочавани, което дава известна гаранция
  срещу отхвърляне от регулаторните органи или от големите борси
  платформи.
reviewed: true
question: مزیت اصلی بیت‌کوین‌های Mining چیست؟
answer: آنها هرگز خرج نشده‌اند و هیچ سابقه‌ای به آنها متصل نیست.
wrong_answers:
  - آنها می‌توانند به قیمت بالاتری فروخته شوند.
  - آنها می‌توانند برای فعالیت‌های غیرقانونی استفاده شوند.
  - آنها می‌توانند برای مدت طولانی بدون از دست دادن ارزش ذخیره شوند.
explanation: |
  مزیت اصلی بیت‌کوین‌های بکر Mining این است که
  هرگز خرج نشده‌اند و هیچ سابقه‌ای به آن‌ها متصل نیست.
  این بیت‌کوین‌ها اغلب باارزش‌تر در نظر گرفته می‌شوند زیرا
  هرگز آلوده نشده‌اند و برخی تضمین‌ها را
  در برابر رد شدن توسط تنظیم‌کنندگان یا پلتفرم‌های اصلی Exchange
  فراهم می‌کنند.
reviewed: true
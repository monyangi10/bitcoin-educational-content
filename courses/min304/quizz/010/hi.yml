question: Bitcoin माइनर्स एनर्जी सरप्लस को मैनेज करने और पावर ग्रिड्स को स्टेबलाइज़ करने में कैसे मदद कर सकते हैं?
answer: जीडब्ल्यू-1 माइनर्स अतिरिक्त ऊर्जा को सोख सकते हैं, एक लचीले बफर की तरह काम करते हुए, जीडब्ल्यू-3 की बजाय मांग को एडजस्ट कर सकते हैं। एक ऐसी दुनिया में जहां नवीकरणीय (गैर-नियंत्रणीय) स्रोतों से बिजली उत्पादन लगातार बढ़ रहा है, माइनर्स हमारी पावर ग्रिड्स के संतुलन को सुनिश्चित करने में अहम भूमिका निभा सकते हैं, साथ ही सस्ती या अतिरिक्त बिजली का फायदा उठाकर अपने जीडब्ल्यू-2 ऑपरेशन्स को पावर दे सकते हैं।
wrong_answers:
  - Bitcoin माइनर्स बैटरियों में अतिरिक्त ऊर्जा को स्टोर करके एनर्जी सरप्लस को मैनेज करने में मदद कर सकते हैं।
  - Bitcoin माइनर्स अतिरिक्त ऊर्जा को ग्रिड में वापस बेचकर एनर्जी सरप्लस को मैनेज करने में मदद कर सकते हैं।
  - जीडब्ल्यू-6 माइनर्स अतिरिक्त ऊर्जा को गर्मी में बदलकर एनर्जी सरप्लस को मैनेज करने में मदद कर सकते हैं।
explanation: |
  अध्याय बताता है कि Bitcoin माइनर्स ऊर्जा सोख सकते हैं
  अधिशेष, एक लचीला बफर की तरह काम करते हुए, मांग को समायोजित करते हैं
  Supply के बजाय। इससे ऊर्जा प्रबंधन में मदद मिल सकती है।
  अधिशेष और पावर ग्रिड को स्थिर करना।
reviewed: true
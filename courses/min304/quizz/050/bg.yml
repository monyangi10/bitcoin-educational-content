question: Кое е основното предизвикателство, свързано с Bitcoin mining?
answer: Индустрията на mining е изключително конкурентна и нестабилна и непредвидени инциденти могат да нарушат работата на mining.
wrong_answers:
  - Основното предизвикателство е намирането на надежден източник на електроенергия.
  - Основното предизвикателство е намирането на безопасно място за съхранение на добитите биткойни.
  - Основното предизвикателство е да се намери купувач за добитите биткойни.
explanation: |
  Основното предизвикателство, свързано с Bitcoin mining, е, че
  индустрията mining е изключително конкурентна и нестабилна,
  и непредвидени инциденти могат да нарушат работата на mining.
reviewed: true
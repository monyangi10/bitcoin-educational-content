question: Koji je glavni izazov povezan sa Bitcoin rudarenjem?
answer: Industrija rudarenja je izuzetno konkurentna i nestabilna, a nepredviđeni incidenti mogu poremetiti rudarske operacije.
wrong_answers:
  - Glavni izazov je pronalaženje pouzdanog izvora električne energije.
  - Glavni izazov je pronalaženje sigurnog mesta za čuvanje iskopanih bitkoina.
  - Glavni izazov je pronalaženje kupca za iskopane bitkoine.
explanation: |
  Glavni izazov povezan sa Bitcoin rudarenjem je taj što je
  industrija rudarenja izuzetno konkurentna i nestabilna,
  a nepredviđeni incidenti mogu poremetiti rudarske operacije.
reviewed: true

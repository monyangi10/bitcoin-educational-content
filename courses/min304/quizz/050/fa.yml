question: چالش اصلی مرتبط با Bitcoin Mining چیست؟
answer: صنعت Mining به شدت رقابتی و ناپایدار است و حوادث غیرمنتظره می‌توانند عملیات Mining را مختل کنند.
wrong_answers:
  - چالش اصلی یافتن یک منبع قابل اعتماد برق است.
  - چالش اصلی یافتن مکانی امن برای ذخیره بیت‌کوین‌های استخراج‌شده است.
  - چالش اصلی پیدا کردن یک خریدار برای بیت‌کوین‌های استخراج‌شده است.
explanation: |
  چالش اصلی مرتبط با Bitcoin Mining این است که
  صنعت Mining به شدت رقابتی و ناپایدار است،
  و حوادث غیرمنتظره می‌توانند عملیات Mining را مختل کنند.
reviewed: true
question: پاداش Mining در شبکه Bitcoin تقریباً هر چهار سال یک بار چه اتفاقی می‌افتد؟
answer: این تحت یک Halving قرار می‌گیرد
wrong_answers:
  - دو برابر می‌شود
  - سه برابر می‌شود
  - همان باقی می‌ماند
explanation: |
  پاداش Mining در شبکه Bitcoin هر 210,000 بلاک، تقریباً هر چهار سال، یک Halving را تجربه می‌کند. این پاداش به عنوان یک انگیزه قوی عمل می‌کند تا ماینرها را تشویق کند که علی‌رغم هزینه انرژی، در فرآیند Mining شرکت کنند.
reviewed: true
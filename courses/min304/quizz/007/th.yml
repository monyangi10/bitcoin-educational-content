question: จะเกิดอะไรขึ้นกับรางวัล mining ในเครือข่าย Bitcoin ประมาณทุกสี่ปี?
answer: มันผ่านการลดลงครึ่งหนึ่ง
wrong_answers:
  - มันเพิ่มขึ้นเป็นสองเท่า
  - มันเพิ่มขึ้นสามเท่า
  - มันยังคงเหมือนเดิม
explanation: |
  รางวัล mining ในเครือข่าย Bitcoin จะลดลงครึ่งหนึ่งทุก ๆ 210,000 บล็อก หรือประมาณทุก ๆ สี่ปี การตอบแทนนี้ทำหน้าที่เป็นแรงจูงใจที่ทรงพลังเพื่อกระตุ้นให้ผู้ขุดเข้าร่วมในกระบวนการ mining แม้จะมีค่าใช้จ่ายด้านพลังงานก็ตาม
reviewed: true
question: 현재 Mining 네트워크의 Bitcoin 보상은 얼마인가요?
answer: 새로운 비트코인 생성 및 거래 수수료
wrong_answers:
  - 새로운 비트코인 생성만 가능
  - 거래 수수료만
  - 새로운 비트코인 생성, 거래 수수료, 가장 빠른 Miner에 대한 보너스 제공
explanation: |
  현재 Mining 네트워크의 Bitcoin 보상은 다음과 같습니다
  두 배입니다. 여기에는 새로운 비트코인의 생성이 포함됩니다
  처음에는 10분마다 50비트코인에서
  현재(2023년) 6.25비트코인으로 감소했습니다. 또한 트랜잭션
  수수료, 즉 Mining 수수료도 포함됩니다
  가 블록에 포함하기로 선택한 트랜잭션에서 발생하는 수수료도 포함됩니다.
reviewed: true
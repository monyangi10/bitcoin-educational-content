question: Какво е текущото възнаграждение за mining в мрежата Bitcoin?
answer: Създаване на нови биткойни и такси за транзакции
wrong_answers:
  - Създаването на нови биткойни само
  - Само такси за транзакции
  - Създаване на нови биткойни, такси за транзакции и бонус за най-бързия миньор
explanation: |
  Текущото възнаграждение за mining в мрежата Bitcoin е
  е двойна. Тя включва създаването на нови биткойни, които
  е намаляло от 50 биткойна на всеки десет минути първоначално
  до 6,25 биткойна днес (2023 г.). Тя включва и транзакции
  такси, или mining такси, от транзакциите, които миньорът
  решават да включат в своя блок.
reviewed: true
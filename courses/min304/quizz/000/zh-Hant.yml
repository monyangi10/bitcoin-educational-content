question: 目前 Bitcoin 網路中的挖礦獎勵是多少？
answer: 新 Bitcoin 的創建與交易手續費
wrong_answers:
  - 僅有新 Bitcoin 的創建
  - 僅交易手續費
  - 新 Bitcoin 的產生、交易費用，以及給最快礦工的獎金
explanation: |
  目前 Bitcoin 網路中的挖礦獎勵為
  兩個。它包括創造新的 Bitcoin ，其中
  已經從最初的每十分鐘 50  Bitcoin
  到今天（2023 年）的 6.25  Bitcoin。它還包括交易手續費
  ，或稱挖礦手續費，來自礦工
  選擇包含在他們的區塊中。
reviewed: true

question: پاداش فعلی Mining در شبکه Bitcoin چیست؟
answer: ایجاد بیت‌کوین‌های جدید و کارمزدهای تراکنش‌ها
wrong_answers:
  - ایجاد بیت‌کوین‌های جدید تنها
  - فقط کارمزد تراکنش‌ها
  - ایجاد بیت‌کوین‌های جدید، کارمزدهای تراکنش، و پاداش برای سریع‌ترین Miner
explanation: |
  پاداش فعلی Mining در شبکه Bitcoin دو جنبه دارد. این شامل ایجاد بیت‌کوین‌های جدید است که از 50 بیت‌کوین هر ده دقیقه در ابتدا به 6.25 بیت‌کوین امروز (2023) کاهش یافته است. همچنین شامل کارمزدهای تراکنش، یا کارمزدهای Mining، از تراکنش‌هایی است که Miner تصمیم می‌گیرد در بلوک خود بگنجاند.
reviewed: true
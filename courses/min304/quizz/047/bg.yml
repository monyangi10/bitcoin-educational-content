question: Какъв е основният риск, свързан с инвестирането в компании, които продават хардуер за mining и управляват машините в места с ниска цена на енергията?
answer: Проблемите с електрозахранването и повредите на машините могат да оставят инвеститорите без енергия, със скъпо оборудване, което те не контролират.
wrong_answers:
  - Дружествата могат да фалират, а инвеститорите да загубят парите си.
  - Възможно е компаниите да са измамници, а инвеститорите да загубят парите си.
  - Възможно е дружествата да не могат да продадат добитите биткойни и инвеститорите да загубят парите си.
explanation: |
  Основният риск, свързан с инвестирането в компании, които продават хардуер за mining и управляват машините в места с ниски енергийни разходи, е свързан с проблеми с електрозахранването. Авариите на машините могат да оставят инвеститорите без енергия, със скъпо оборудване, което те не контролират.
reviewed: true
question: Mining 하드웨어를 판매하고 저비용 에너지 위치에서 기계를 관리하는 회사에 투자하는 것과 관련된 주요 위험은 무엇인가요?
answer: 전력 Supply 문제와 기계 고장은 투자자가 제어할 수 없는 고가의 장비로 인해 무력감을 느낄 수 있습니다.
wrong_answers:
  - 회사는 파산할 수 있고 투자자는 돈을 잃을 수 있습니다.
  - 해당 회사는 사기일 수 있으며 투자자는 돈을 잃을 수 있습니다.
  - 회사는 채굴한 비트코인을 판매하지 못할 수도 있고, 투자자는 돈을 잃을 수도 있습니다.
explanation: |
  Mining 하드웨어를 판매하고 저비용 에너지 지역에서 기계를 관리하는 회사에 투자할 때 가장 큰 위험은 전력 Supply 문제입니다. 기계 고장으로 인해 투자자는 통제할 수 없는 고가의 장비를 무력하게 만들 수 있습니다.
reviewed: true
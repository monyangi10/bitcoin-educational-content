question: خطر اصلی مرتبط با سرمایه‌گذاری در شرکت‌هایی که سخت‌افزار Mining را می‌فروشند و ماشین‌ها را در مکان‌های با انرژی کم‌هزینه مدیریت می‌کنند چیست؟
answer: مشکلات Power Supply و خرابی‌های ماشین می‌توانند سرمایه‌گذاران را بدون قدرت بگذارند، با تجهیزاتی گران‌قیمت که کنترلی بر آن ندارند.
wrong_answers:
  - ممکن است شرکت‌ها ورشکسته شوند و سرمایه‌گذاران پول خود را از دست بدهند.
  - ممکن است این شرکت‌ها کلاهبرداری باشند و سرمایه‌گذاران پول خود را از دست بدهند.
  - شرکت‌ها ممکن است نتوانند بیت‌کوین‌های استخراج‌شده را بفروشند و سرمایه‌گذاران ممکن است پول خود را از دست بدهند.
explanation: |
  خطر اصلی مرتبط با سرمایه‌گذاری در شرکت‌هایی که سخت‌افزار Mining را می‌فروشند و ماشین‌ها را در مکان‌های با هزینه انرژی پایین مدیریت می‌کنند این است که مشکلات قدرت Supply و خرابی ماشین‌ها می‌تواند سرمایه‌گذاران را بدون قدرت، با تجهیزات گران‌قیمتی که کنترل نمی‌کنند، رها کند.
reviewed: true
question: پاداش ماینرها در شبکه Bitcoin چیست؟
answer: بیت‌کوین‌های جدید و کارمزدهای تراکنش.
wrong_answers:
  - فقط بیت‌کوین‌های جدید.
  - فقط هزینه‌های تراکنش.
  - هیچ پاداشی برای ماینرها وجود ندارد.
explanation: |
  ماینرها در شبکه Bitcoin برای کار خود در اعتبارسنجی و ایجاد بلاک‌ها با بیت‌کوین‌های جدید و کارمزدهای تراکنش پاداش می‌گیرند.
reviewed: true
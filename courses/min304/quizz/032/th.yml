question: รางวัลสำหรับนักขุดในเครือข่าย Bitcoin คืออะไร?
answer: บิตคอยน์ใหม่และค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - เฉพาะบิตคอยน์ใหม่เท่านั้น
  - เฉพาะค่าธรรมเนียมการทำธุรกรรมเท่านั้น
  - ไม่มีรางวัลสำหรับนักขุด
explanation: |
  นักขุดในเครือข่าย Bitcoin จะได้รับรางวัลเป็นบิทคอยน์ใหม่และค่าธรรมเนียมการทำธุรกรรมสำหรับงานของพวกเขาในการตรวจสอบและสร้างบล็อก
reviewed: true
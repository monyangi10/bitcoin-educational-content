question: Je, ni nini athari inayowezekana ya kupiga marufuku Mining katika eneo?
answer: Inaweza kusababisha kushuka kwa kiasi kikubwa kwa Hashrate na bei ya Bitcoin
wrong_answers:
  - Inaweza kusababisha kuongezeka kwa bei ya Bitcoin
  - Inaweza kusababisha kuongezeka kwa Hashrate ya mtandao
  - Inaweza kusababisha ongezeko la idadi ya nodes zinazofanya kazi kwenye mtandao
explanation: |
  Marufuku ya Mining katika eneo, kama ilivyotokea Uchina,
  inaweza kusababisha kushuka kwa kiasi kikubwa kwa Hashrate na bei ya
  Bitcoin. Walakini, hizi zinaweza kupona haraka.
reviewed: true
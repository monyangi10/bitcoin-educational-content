question: Какво е потенциалното въздействие на забраната на mining в даден регион?
answer: Това може да доведе до значителен спад на hashrate и цената на Bitcoin
wrong_answers:
  - Това може да доведе до повишаване на цената на Bitcoin
  - Това може да доведе до увеличаване на hashrate на мрежата
  - Това може да доведе до увеличаване на броя на активните възли в мрежата
explanation: |
  Забрана на mining в даден регион, подобно на случилото се в Китай,
  може да доведе до значителен спад на hashrate и цената на
  Bitcoin. Те обаче могат бързо да се възстановят.
reviewed: true
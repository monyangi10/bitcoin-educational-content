question: Kako se osnovni sloj Bitcoin mreže često naziva?
answer: Sloj za poravnanje
wrong_answers:
  - Sloj za transakcije
  - Sloj za bezbednost
  - Sloj konsenzusa
explanation: |
  Osnovni sloj Bitcoin mreže, na kojem se Lightning mreža oslanja 
  prilikom otvaranja i zatvaranja platnih kanala, često se naziva slojem za poravnanje (eng. settlement layer).
reviewed: true

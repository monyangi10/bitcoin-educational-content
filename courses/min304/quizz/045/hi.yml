question: अपना खुद का Mining उपकरण रखने का सबसे बड़ा फायदा क्या है?
answer: कुंवारी बिटकॉइन हासिल करना।
wrong_answers:
  - Bitcoin सीधे खरीदने की ज़रूरत से बचें।
  - बाद में उपकरण बेचकर मुनाफ़ा कमाना।
  - दूसरे माइनर्स पर भरोसा करने की ज़रूरत से बचना।
explanation: |
  अपना खुद का Mining उपकरण रखने से काफी फायदा होता है
  फायदे। खुद की संतुष्टि के अलावा
  Bitcoin की सुरक्षा में सक्रिय रूप से योगदान देना
  नेटवर्क और इनाम को अपने Wallet में आते देखना, वहाँ
  वर्जिन बिटकॉइन का आकर्षक पहलू यही है। ये हैं
  ताज़ा खनन किए गए बिटकॉइन जो कभी खर्च नहीं किए गए हैं और
  उनसे कोई इतिहास नहीं जुड़ा है।
reviewed: true
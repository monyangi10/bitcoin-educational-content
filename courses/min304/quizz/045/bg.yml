question: Кое е основното предимство на това да притежавате собствено оборудване mining?
answer: Придобиване на девствени биткойни.
wrong_answers:
  - Избягване на необходимостта от директно закупуване на Bitcoin.
  - Извличане на печалба от продажбата на оборудването по-късно.
  - Избягване на необходимостта да се доверявате на други миньори.
explanation: |
  Притежаването на собствено оборудване mining предлага значителни
  предимства. В допълнение към личното удовлетворение от
  активно допринасяне за сигурността на Bitcoin
  и да виждате как наградите попадат във вашата wallet, има и
  е и привлекателният аспект на девствените биткойни. Те са
  току-що добити биткойни, които никога не са били изразходвани и имат
  не са свързани с никаква история.
reviewed: true
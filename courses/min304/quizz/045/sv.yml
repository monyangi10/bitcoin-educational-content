question: Vad är den största fördelen med att äga din egen Mining-utrustning?
answer: Förvärva jungfruliga bitcoins.
wrong_answers:
  - Undviker behovet av att köpa Bitcoin direkt.
  - Göra vinst genom att sälja utrustningen senare.
  - Du behöver inte lita på andra gruvarbetare.
explanation: |
  Att äga sin egen Mining-utrustning erbjuder betydande
  fördelar. Förutom den personliga tillfredsställelsen av att
  aktivt bidra till säkerheten i Bitcoin-nätverket och se
  nätverket och se belöningarna falla in i din Wallet, finns det
  är den attraktiva aspekten av jungfruliga bitcoins. Dessa är
  nyutvunna bitcoins som aldrig har spenderats och som inte har
  ingen historia kopplad till dem.
reviewed: true
question: مزیت اصلی داشتن تجهیزات Mining خود چیست؟
answer: به‌دست‌آوردن بیت‌کوین‌های دست‌نخورده.
wrong_answers:
  - اجتناب از نیاز به خرید مستقیم Bitcoin.
  - کسب سود از فروش تجهیزات در آینده.
  - اجتناب از نیاز به اعتماد به سایر ماینرها.
explanation: |
  داشتن تجهیزات Mining خودتان مزایای قابل توجهی دارد. علاوه بر رضایت شخصی از مشارکت فعال در امنیت شبکه Bitcoin و دیدن پاداش‌ها که به Wallet شما می‌ریزد، جنبه جذاب بیت‌کوین‌های بکر نیز وجود دارد. این‌ها بیت‌کوین‌هایی هستند که تازه استخراج شده‌اند و هرگز خرج نشده‌اند و هیچ سابقه‌ای به آن‌ها متصل نیست.
reviewed: true
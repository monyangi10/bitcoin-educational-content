question: هدف جامعه Bitcoin در زمینه مدیریت شبکه چیست؟
answer: برای تقویت توزیع، مقاومت در برابر سانسور، و ضد شکنندگی شبکه.
wrong_answers:
  - برای افزایش قیمت Bitcoin.
  - برای انجام تراکنش‌ها سریع‌تر.
  - برای افزایش سختی Mining.
explanation: |
  جامعه Bitcoin به طور مداوم در تلاش است تا توزیع، مقاومت در برابر سانسور و ضد شکنندگی شبکه را تقویت کند. این امر با مأموریت اساسی Bitcoin برای تبدیل شدن به یک شبکه ارزش Exchange مقاوم در برابر سانسور همسو است.
reviewed: true
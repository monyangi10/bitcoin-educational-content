question: Bitcoin समुदाय का लक्ष्य नेटवर्क प्रबंधन के मामले में क्या है?
answer: डिस्ट्रीब्यूशन को मजबूत करने, सेंसरशिप का विरोध करने और नेटवर्क की एंटी-फ्रैजिलिटी बढ़ाने के लिए।
wrong_answers:
  - Bitcoin की कीमत बढ़ाने के लिए।
  - लेन-देन को तेज़ करने के लिए।
  - Mining की कठिनाई बढ़ाने के लिए।
explanation: |
  Bitcoin समुदाय लगातार मजबूत होने की कोशिश कर रहा है
  वितरण, सेंसरशिप प्रतिरोध, और एंटी-फ्रैजिलिटी
  नेटवर्क का। यह Bitcoin के मूलभूत सिद्धांतों के अनुरूप है।
  मिशन होना एक सेंसरशिप-रोधी मूल्य Exchange
  नेटवर्क।
reviewed: true
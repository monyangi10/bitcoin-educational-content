question: Каква е целта на общността Bitcoin по отношение на управлението на мрежата?
answer: Засилване на разпространението, устойчивост на цензура и анти-фрагментираност на мрежата.
wrong_answers:
  - Увеличаване на цената на Bitcoin.
  - Ускоряване на транзакциите.
  - Увеличаване на трудността на mining.
explanation: |
  Общността на Bitcoin непрекъснато се стреми да подобрява разпространението, устойчивостта на цензура и антифрагментарността на мрежата. Това е в съответствие с основната мисия на Bitcoin да бъде устойчива на цензура мрежа за обмен на ценности.
reviewed: true
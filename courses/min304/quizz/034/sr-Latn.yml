question: Koji je cilj Bitcoin zajednice u pogledu upravljanja mrežom?
answer: Da se ojača distribuciju, otpornost na cenzuru i antifragilnost mreže.
wrong_answers:
  - Da se poveća cena Bitcoin.
  - Da transakcije budu brže.
  - Da se poveća težina rudarenja.
explanation: |
  Bitcoin zajednica neprestano teži jačanju
  distribucije, otpornosti na cenzuru i antifragilnosti
  mreže. Ovo je u skladu sa osnovnom misijom Bitcoina
  da bude mreža za razmenu vrednosti koja je otporna na cenzuru.
reviewed: true

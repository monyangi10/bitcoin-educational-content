question: Kako funkcioniše rudarski bazen i zašto je neophodan?
answer: Rudarski bazen je grupa rudara koji kombinuju svoje računske resurse kako bi povećali svoje šanse za rudarenje bloka. Ova saradnja je neophodna jer izolovana mala mašina za rudarenje konkuriše industrijskim gigantima, smanjujući svoje šanse za uspeh na zanemarljiv nivo. Udruživanjem, rudari mogu kombinovati svoju računarsku snagu, češće pronalaziti blokove i zatim proporcionalno raspodeliti nagrade prema doprinosu svakog uređaja u bazenu.
wrong_answers:
  - Mining pool je grupa rudara koji dele istu mašinu za rudarenje kako bi povećali svoje šanse da izrudare blok. Ova saradnja je neophodna jer jedna mašina za rudarenje može da iskopa samo ograničenu količinu Bitcoina.
  - Mining pool je grupa rudara koji dele isti softver za rudarenje kako bi povećali svoje šanse da izrudare blok. Ova saradnja je neophodna jer različiti softveri za rudarenje imaju različite efikasnosti.
  - Mining pool je grupa rudara koji dele istu lokaciju za rudarenje kako bi povećali svoje šanse da izrudare blok. Ova saradnja je neophodna jer lokacija za rudarske operacije može uticati na efikasnost rudarenja.

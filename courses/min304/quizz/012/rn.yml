question: Mining pool ikora gute kandi ni kuki ari ngombwa?
answer: Mining pool ni umugwi w’abacukuzi bafatanya ubuhinga bwabo bwo gukoresha ubuhinga bwa none kugira ngo bongere amahirwe yabo yo kuronka Mining. Ukwo gukorana ni ngombwa kubera ko imashini ntoyi yitandukanije n’izindi yitwa Mining iriko irahiganwa n’ibigo bikomeye vyo mu nganda, ivyo bikaba bigabanya amahirwe yo kuroranirwa gushika ku rugero rutoyi. Mu gukoranya, abacukuzi barashobora gukoranya ububasha bwabo bwo gukoresha ubuhinga bwa none, bagatora amabuye kenshi, hanyuma bagatanga ingororano zijanye n’intererano ya Miner imwe imwe muri iyo nzira.
wrong_answers:
  - Mining pool ni umugwi w’abacukuzi basangira imashini imwe ya mining kugira ngo bongere amahirwe yabo yo ku mining. Ukwo gukorana ni ngombwa kuko imashini imwe gusa ya mining ishobora gucukura gusa igitigiri gito ca Bitcoin.
  - Mining pool ni umugwi w’abacukuzi basangira porogarama imwe ya mining kugira ngo bongere amahirwe yabo yo gukora Mining. Ukwo gukorana ni ngombwa kubera ko porogarama zitandukanye za mining zifise ubushobozi butandukanye.
  - Mining pool ni umugwi w’abacukuzi basangira ahantu hamwe mining kugira ngo bongere amahirwe yabo yo gukora mining. Uwo mubano ni ngombwa kuko aho igikorwa ca mining gikorera gishobora kugira ico gikoze ku bushobozi bwa mining.
explanation: |
  Iki gice kirasigura yuko mining pool ari umugwi w’aba miners bafatanya ubuhinga bwabo bwa computing kugira ngo bongere
  amahirwe yabo yo gukora mining. Ubu bufatanye ni ngombwa kuko imashini ntoyi ya mining iri ukwayo iriko irahiganwa n’ibigo bikomeye vy’uruganda,
  bikagabanya amahirwe yo kuroranirwa gushika ku rugero rudahambaye.
reviewed: true

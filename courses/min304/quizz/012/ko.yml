question: Mining pool은 어떻게 작동하며 왜 필요한가요?
answer: Mining pool은 컴퓨팅 리소스를 결합하여 Mining의 확률을 높이는 채굴자 그룹입니다. 이러한 협력이 필요한 이유는 고립된 채로 운영되는 소규모 Mining 채굴기는 거대 채굴자와 경쟁하기 때문에 성공 확률이 현저히 떨어지기 때문입니다. 채굴자들은 컴퓨팅 파워를 풀링함으로써 자원을 결합하여 블록을 더 자주 발견하고, 풀에 대한 각 Miner의 기여도에 비례하여 보상을 분배할 수 있습니다.
wrong_answers:
  - Mining pool는 Mining 채굴 확률을 높이기 위해 동일한 Mining 채굴기를 공유하는 채굴자 그룹입니다. 하나의 Mining 채굴기로는 제한된 양의 Bitcoin만 채굴할 수 있기 때문에 이러한 협력이 필요합니다.
  - Mining pool은 Mining의 확률을 높이기 위해 동일한 Mining 소프트웨어를 공유하는 채굴자 그룹입니다. Mining 소프트웨어마다 효율성이 다르기 때문에 이러한 협력이 필요합니다.
  - Mining pool는 Mining의 확률을 높이기 위해 동일한 Mining 위치를 공유하는 채굴자 그룹입니다. 이러한 협력은 Mining 작업의 위치가 효율성에 큰 영향을 미칠 수 있기 때문에 필요합니다.

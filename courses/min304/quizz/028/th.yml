question: ความเสี่ยงที่อาจเกิดขึ้นจากการรวมศูนย์การผลิตฮาร์ดแวร์ mining ในประเทศจีนคืออะไร?
answer: การปฏิเสธที่จะส่งออกเครื่อง mining หรือการสะสม hashrate สำหรับการโจมตี 51% ที่อาจเกิดขึ้น
wrong_answers:
  - จีนอาจผูกขาดเครือข่าย Bitcoin
  - จีนอาจควบคุมราคาของ Bitcoin ได้
  - จีนอาจแบน Bitcoin mining.
explanation: |
  การรวมศูนย์การผลิตฮาร์ดแวร์ mining ในประเทศจีน
  ก่อให้เกิดความเสี่ยงต่อเครือข่าย Bitcoin หากจีนปฏิเสธที่จะ
  ส่งออกเครื่อง mining หรือสะสม hashrate เพื่อการโจมตี 51%
  อาจเป็นภัยต่อความปลอดภัยและการกระจายศูนย์ของเครือข่าย
reviewed: true
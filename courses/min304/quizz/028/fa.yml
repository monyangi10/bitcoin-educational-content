question: خطر بالقوه تمرکز تولید سخت‌افزار Mining در چین چیست؟
answer: امتناع از صادرات ماشین‌های Mining یا انباشت Hashrate برای یک حمله احتمالی 51٪.
wrong_answers:
  - چین می‌تواند شبکه Bitcoin را به انحصار خود درآورد.
  - چین می‌تواند قیمت Bitcoin را کنترل کند.
  - چین ممکن است Bitcoin Mining را ممنوع کند.
explanation: |
  تمرکز تولید سخت‌افزار Mining در چین
  خطری برای شبکه Bitcoin ایجاد می‌کند. اگر چین از
  صادرات ماشین‌های Mining خودداری کند یا Hashrate را برای
  یک حمله احتمالی ۵۱٪ انباشت کند، می‌تواند امنیت و
  غیرمتمرکز بودن شبکه را تهدید کند.
reviewed: true
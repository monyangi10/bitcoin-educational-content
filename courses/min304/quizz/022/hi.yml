question: जब सारे 21 मिलियन बिटकॉइन बन चुके होंगे, तो माइनर्स किस चीज़ पर कमाई के लिए निर्भर रहेंगे?
answer: माइनर्स को सिर्फ़ ट्रांजैक्शन फीस से ही पैसे मिलेंगे।
wrong_answers:
  - माइनर्स को मुआवज़े के लिए सिर्फ़ ब्लॉक रिवॉर्ड्स पर ही निर्भर रहना होगा।
  - माइनर्स को मुआवज़े के लिए सिर्फ़ ट्रांज़ैक्शन कन्फर्मेशन पर ही निर्भर रहना होगा।
  - माइनर्स को अब सिर्फ़ नेटवर्क फीस से ही मुआवज़ा मिलेगा।
explanation: |
  2140 तक, कोई नए बिटकॉइन नहीं बनाए जाएंगे। इस समय तक,
  माइनर्स सिर्फ़ ट्रांज़ैक्शन फीस पर ही निर्भर रहेंगे
  मुआवज़ा।
reviewed: true
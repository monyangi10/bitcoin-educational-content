question: นักขุดจะพึ่งพาอะไรสำหรับค่าตอบแทนหลังจากที่บิตคอยน์ทั้งหมด 21 ล้านเหรียญถูกสร้างขึ้นแล้ว?
answer: นักขุดจะพึ่งพาค่าธรรมเนียมการทำธุรกรรมเพียงอย่างเดียวสำหรับค่าตอบแทน
wrong_answers:
  - นักขุดจะพึ่งพารางวัลบล็อกเพียงอย่างเดียวสำหรับค่าตอบแทน
  - นักขุดจะพึ่งพาการยืนยันธุรกรรมเพียงอย่างเดียวสำหรับการชดเชย
  - นักขุดจะพึ่งพาค่าธรรมเนียมเครือข่ายเพียงอย่างเดียวสำหรับค่าตอบแทน
explanation: |
  ภายในปี 2140 จะไม่มีการสร้างบิตคอยน์ใหม่อีกต่อไป ณ จุดนี้ นักขุดจะพึ่งพาค่าธรรมเนียมการทำธุรกรรมเพียงอย่างเดียวเพื่อการชดเชย
reviewed: true
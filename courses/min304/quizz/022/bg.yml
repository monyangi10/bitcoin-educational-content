question: На какво ще разчитат миньорите за компенсация, след като бъдат създадени всички 21 милиона биткойна?
answer: Миньорите ще разчитат единствено на таксите за транзакции за компенсация.
wrong_answers:
  - Миньорите ще разчитат единствено на блокови възнаграждения за компенсация.
  - Миньорите ще разчитат единствено на потвържденията на транзакциите за компенсация.
  - Миньорите ще разчитат единствено на мрежовите такси за компенсация.
explanation: |
  До 2140 г. няма да се създават нови биткойни. В този момент,
  миньорите ще разчитат единствено на таксите за транзакции
  компенсация.
reviewed: true
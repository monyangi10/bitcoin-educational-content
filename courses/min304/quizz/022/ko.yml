question: 2,100만 비트코인이 모두 생성된 후 채굴자들은 어떤 보상을 받게 될까요?
answer: 채굴자는 보상을 거래 수수료에만 의존하게 됩니다.
wrong_answers:
  - 채굴자는 블록 보상에만 의존해 보상을 받게 됩니다.
  - 채굴자는 보상을 받기 위해 거래 확인에만 의존하게 됩니다.
  - 채굴자는 보상을 네트워크 수수료에만 의존하게 됩니다.
explanation: |
  2140년까지는 새로운 비트코인이 생성되지 않습니다. 이 시점에서는
  채굴자들은 거래 수수료에만 의존하여
  보상.
reviewed: true
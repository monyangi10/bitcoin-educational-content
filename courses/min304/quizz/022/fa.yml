question: ماینرها پس از ایجاد تمام 21 میلیون بیت‌کوین، برای جبران هزینه‌ها به چه چیزی تکیه خواهند کرد؟
answer: ماینرها تنها به کارمزد تراکنش‌ها برای جبران تکیه خواهند کرد.
wrong_answers:
  - ماینرها تنها به پاداش‌های بلاک برای جبران تکیه خواهند کرد.
  - ماینرها تنها برای جبران خسارت به تأییدیه‌های تراکنش تکیه خواهند کرد.
  - ماینرها تنها به کارمزدهای شبکه برای جبران تکیه خواهند کرد.
explanation: |
  تا سال 2140، بیت‌کوین جدیدی ایجاد نخواهد شد. در این زمان، ماینرها تنها به کارمزدهای تراکنش برای جبران تکیه خواهند کرد.
reviewed: true
question: Ni ubuhe butumwa nyamukuru bwa Bitcoin?
answer: kuba umuhora wo guhanahana amafranga ushobora guhangana nabashaka kuwugenzura.
wrong_answers:
  - Kugira ngo basubirize amafaranga y’imigenzo.
  - Kugira ngo amafaranga akoreshwa ntamenyekane.
  - Kugira ngo haboneke uburyo bushasha bwo gushora imari mu bikorwa.
explanation: |
  ubutumwa nyamukuru bwa Bitcoin, kuba umuhora wo
  guhanahana amafranga ushobora guhangana nabashaka kuwugenzura.
  Umuryango wagutse wa Bitcoin uguma wihatira gukomeza ikwiragizwa ry'umuhora, 
  kurwanya ukugenzurwa, no kurwanya ukworoha kw'umuhora.
reviewed: true

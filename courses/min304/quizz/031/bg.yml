question: Каква е основната мисия на Bitcoin?
answer: Да бъде устойчива на цензура мрежа за обмен на ценности.
wrong_answers:
  - Да замени традиционните валути.
  - Анонимни трансакции.
  - Създаване на нова форма на инвестиция.
explanation: |
  Основната мисия на Bitcoin е да бъде устойчива на цензура мрежа за обмен на ценности. Bitcoin
  непрекъснато се стреми да укрепва разпространението, устойчивостта на цензура и анти-фрагментарността на мрежата.
reviewed: true
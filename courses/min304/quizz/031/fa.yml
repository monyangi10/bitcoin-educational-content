question: ماموریت اساسی Bitcoin چیست؟
answer: برای تبدیل شدن به یک شبکه Exchange مقاوم در برابر سانسور.
wrong_answers:
  - برای جایگزینی ارزهای سنتی.
  - برای ناشناس کردن تراکنش‌ها.
  - برای ایجاد یک شکل جدید از سرمایه‌گذاری.
explanation: |
  ماموریت اساسی Bitcoin این است که یک شبکه Exchange با ارزش مقاوم در برابر سانسور باشد. جامعه Bitcoin به طور مداوم در تلاش است تا توزیع، مقاومت در برابر سانسور و ضد شکنندگی شبکه را تقویت کند.
reviewed: true
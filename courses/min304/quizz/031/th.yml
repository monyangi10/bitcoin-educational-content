question: ภารกิจพื้นฐานของ Bitcoin คืออะไร?
answer: เพื่อเป็นเครือข่ายแลกเปลี่ยนมูลค่าที่ต้านทานการเซ็นเซอร์
wrong_answers:
  - เพื่อแทนที่สกุลเงินแบบดั้งเดิม
  - เพื่อทำให้การทำธุรกรรมเป็นแบบไม่ระบุตัวตน
  - สร้างรูปแบบการลงทุนใหม่
explanation: |
  ภารกิจพื้นฐานของ Bitcoin คือการเป็นเครือข่ายแลกเปลี่ยนมูลค่าที่ทนทานต่อการเซ็นเซอร์ ชุมชน Bitcoin มุ่งมั่นอย่างต่อเนื่องในการเสริมสร้างการกระจาย การต้านทานการเซ็นเซอร์ และความทนทานต่อความเปราะบางของเครือข่าย
reviewed: true
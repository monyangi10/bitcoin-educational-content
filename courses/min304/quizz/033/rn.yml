question: Ni ikihe kibazo gishobora guterwa n’ukugabanuka kw’abakoresha, ama node canke abacukuzi mu muhora wa Bitcoin?
answer: Vyoshobora gutuma umuhora ucika intege, bikongera ingorane zo gukoraniriza hamwe (centralization) no guterwa n’ibitero.
wrong_answers:
  - Bishobora kwongera igiciro ca Bitcoin.
  - Bishobora kugabanya umuvuduko wo gucuruza hamwe n’ingorane za mining.
  - Bishobora kwongera ingorane za mining n’ugushobora guterwa n’ibitero, mu gihe bigabanya ingorane zo gushiramwo ibintu vyose hamwe.
explanation: |
  Kugabanuka kw'igitigiri c’abakoresha, ama node canke abacukura (miners)
  vyoshobora gutuma umuhora ucika intege, bikongera ingorane zo gukoraniriza hamwe (centralization) 
  no guterwa n’ibitero.
reviewed: true

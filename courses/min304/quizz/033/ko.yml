question: Bitcoin 네트워크에서 사용자, 노드 또는 채굴자 수가 감소할 경우 어떤 잠재적 위험이 있나요?
answer: 이는 네트워크를 약화시켜 중앙 집중화의 위험과 공격에 대한 취약성을 증가시킬 수 있습니다.
wrong_answers:
  - Bitcoin의 가격을 인상할 수 있습니다.
  - 트랜잭션 속도와 Mining 난이도가 감소할 수 있습니다.
  - 중앙 집중화의 위험을 줄이면서 Mining의 난이도와 공격에 대한 취약성을 높일 수 있습니다.
explanation: |
  사용자, 노드 또는 채굴자 수가 감소하면 다음과 같은 문제가 발생할 수 있습니다
  gW-4 네트워크를 약화시킬 수 있습니다. 이는 중앙 집중화의 위험을 증가시킬 수 있으며
  중앙 집중화의 위험이 증가하고 네트워크가 공격에
  공격에 더 취약해질 수 있습니다.
reviewed: true
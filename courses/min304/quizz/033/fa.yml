question: کاهش تعداد کاربران، نودها یا ماینرها در شبکه Bitcoin چه ریسک‌های بالقوه‌ای دارد؟
answer: این می‌تواند شبکه را تضعیف کند و خطر تمرکز و آسیب‌پذیری در برابر حملات را افزایش دهد.
wrong_answers:
  - این می‌تواند قیمت Bitcoin را افزایش دهد.
  - می‌تواند سرعت تراکنش و همچنین سختی Mining را کاهش دهد.
  - این می‌تواند سختی و آسیب‌پذیری Mining در برابر حملات را افزایش دهد، در حالی که ریسک تمرکزگرایی را کاهش می‌دهد.
explanation: |
  کاهش تعداد کاربران، گره‌ها یا ماینرها می‌تواند شبکه Bitcoin را تضعیف کند. این می‌تواند خطر تمرکز را افزایش داده و شبکه را در برابر حملات آسیب‌پذیرتر کند.
reviewed: true
question: Bitcoin नेटवर्क में यूजर्स, नोड्स या माइनर्स की संख्या कम होने का संभावित खतरा क्या है?
answer: यह नेटवर्क को कमज़ोर कर सकता है, जिससे केंद्रीकरण का ख़तरा बढ़ जाता है और हमलों के प्रति संवेदनशीलता बढ़ सकती है।
wrong_answers:
  - इससे Bitcoin की कीमत बढ़ सकती है।
  - इससे लेन-देन की गति और Mining की कठिनाई दोनों कम हो सकती हैं।
  - इससे Mining की मुश्किलें और हमलों के प्रति संवेदनशीलता बढ़ सकती है, जबकि केंद्रीकरण का खतरा कम हो सकता है।
explanation: |
  यूजर्स, नोड्स या माइनर्स की संख्या में कमी आ सकती है
  Bitcoin नेटवर्क को कमजोर करना। इससे खतरा बढ़ सकता है
  केंद्रीकरण और नेटवर्क को अधिक असुरक्षित बनाना
  हमलों।
reviewed: true
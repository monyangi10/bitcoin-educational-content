question: Mining के केंद्रीकरण को Bitcoin में कम करने के लिए कुछ चर्चित रणनीतियाँ क्या हैं?
answer: Bitcoin में Mining के केंद्रीकरण से निपटने के लिए चर्चित रणनीतियों में शामिल हैं - होम Mining, स्ट्रैटम V2 प्रोटोकॉल, Mining सॉफ्टवेयर को ओपन-सोर्स करना, और अभिनेताओं व भौगोलिक स्थानों में विविधता लाना।
wrong_answers:
  - Bitcoin में Mining के केंद्रीकरण से निपटने के लिए चर्चित रणनीतियों में ब्लॉक साइज़ बढ़ाना, प्रूफ ऑफ स्टेक लागू करना, और Mining की निगरानी के लिए एक केंद्रीय प्राधिकरण बनाना शामिल है।
  - Bitcoin में Mining के केंद्रीकरण से निपटने के लिए चर्चित रणनीतियों में Block reward को कम करना, एक लेन-देन शुल्क लागू करना और Mining टैक्स बनाना शामिल है।
  - Bitcoin में Mining के केंद्रीकरण से निपटने के लिए चर्चित रणनीतियों में Mining की कठिनाई बढ़ाना, Mining पर एक सीमा लागू करना और Mining लॉटरी बनाना शामिल हैं।
explanation: |
  अध्याय में Mining से निपटने के कई तरीकों पर चर्चा की गई है
  Bitcoin में केंद्रीकरण, जिसमें होम Mining भी शामिल है,
  स्ट्रैटम V2 प्रोटोकॉल, Mining सॉफ्टवेयर को ओपन-सोर्स करना, और
  अभिनेताओं और भूगोल का विविधीकरण।
reviewed: true
question: Какви са някои обсъждани стратегии за борба с централизацията на mining в Bitcoin?
answer: Обсъжданите стратегии за борба с централизацията на mining в Bitcoin включват Home Mining, протокола Stratum V2, софтуера mining с отворен код и диверсификацията на участниците и географията.
wrong_answers:
  - Обсъжданите стратегии за борба с централизацията на mining в Bitcoin включват увеличаване на размера на блока, въвеждане на доказателство за залог и създаване на централен орган, който да наблюдава mining.
  - Обсъжданите стратегии за борба с централизацията на mining в Bitcoin включват намаляване на възнаграждението за блок, въвеждане на такса за транзакция и създаване на данък върху mining.
  - Обсъжданите стратегии за борба с централизирането на mining в Bitcoin включват повишаване на трудността на mining, въвеждане на ограничение за mining и създаване на лотария за mining.
explanation: |

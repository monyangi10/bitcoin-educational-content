question: Ni ingamba izihe zivugwa kugira ngo harwanywe ugukoraniriza hamwe Mining muri Bitcoin?
answer: Ingamba zaganiriweko zo kurwanya ugukoraniriza hamwe mining muri Bitcoin harimwo Home Mining, itegeko rya Stratum V2, Kugira isoko y’uguruye porogarame za mining, n’Ukugira Abakinyi n’ibihugu bitandukanye vyohirya no hino.
wrong_answers:
  - Ingamba zaganiriweko zo kurwanya ugushira hamwe Mining muri Bitcoin harimwo kwongera ubunini bw’ibarabara, gushirwa mu ngiro ibimenyamenya vy’uruhara, no gushinga ubuyobozi bukuru buzogenzura Mining.
  - Ingamba zaganiriweko zo kurwanya ugushira hamwe Mining muri Bitcoin harimwo kugabanya Block reward, gushirwa mu ngiro amafaranga y’ugucuruza, no gushinga umusoro wa Mining.
  - Ingamba zaganiriweko zo kurwanya ugushira hamwe Mining muri Bitcoin harimwo kwongera ingorane za Mining, gushiraho umupaka kuri Mining, no gushinga lottery rwa Mining.
explanation: |
  Iki gice kiravuga ingamba zitari nke zo kurwanya ugukoraniriza hamwe mining muri Bitcoin,
  harimwo na mining muhira, itegeko rya Stratum V2, kugira isoko y'uguruye porogarame za mining, no 
  kugira Abakinyi n’ibihugu bitandukanye vyohirya no hino.
reviewed: true

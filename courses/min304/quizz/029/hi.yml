question: Bitcoin नेटवर्क में माइनर्स (खनिकों) की क्या भूमिका है?
answer: माइनर्स ब्लॉक्स को वैलिडेट और क्रिएट करने में अहम भूमिका निभाते हैं।
wrong_answers:
  - माइनर्स सिर्फ लेन-देन को वैलिडेट करते हैं।
  - खनिक Bitcoin की कीमत को नियंत्रित करते हैं।
  - माइनर्स का Bitcoin नेटवर्क में कोई रोल नहीं है।
explanation: |
  माइनर्स Bitcoin नेटवर्क में एक अहम भूमिका निभाते हैं, क्योंकि
  ब्लॉक्स को वैलिडेट करना और बनाना। ये नेटवर्क को मजबूत करते हैं
  सेंसरशिप के खिलाफ बिजली का इस्तेमाल करके गणना करके
  जीडब्ल्यू-4 के लिए जीडब्ल्यू-5।
reviewed: true
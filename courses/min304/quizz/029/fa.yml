question: نقش ماینرها در شبکه Bitcoin چیست؟
answer: ماینرها نقش اساسی در اعتبارسنجی و ایجاد بلاک‌ها دارند.
wrong_answers:
  - ماینرها فقط تراکنش‌ها را تأیید می‌کنند.
  - ماینرها قیمت Bitcoin را کنترل می‌کنند.
  - ماینرها هیچ نقشی در شبکه Bitcoin ندارند.
explanation: |
  ماینرها نقش اساسی در شبکه Bitcoin دارند با
  اعتبارسنجی و ایجاد بلاک‌ها. آنها با استفاده از برق برای محاسبه
  Proof of Work برای Bitcoin، شبکه را در برابر سانسور تقویت می‌کنند.
reviewed: true
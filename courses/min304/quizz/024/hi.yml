question: Mining और Bitcoin ट्रांजैक्शन्स के इनाम को आधा कर देने वाले इवेंट को क्या कहते हैं?
answer: जीडब्ल्यू-2
wrong_answers:
  - दोगुना
  - क्वार्टरिंग
  - ट्रिपलिंग
explanation: |
  Mining इनामों का प्रोग्राम्ड कम होना, Halving हर
  चार साल, एक इवेंट है जिसे Halving के नाम से जाना जाता है।
reviewed: true
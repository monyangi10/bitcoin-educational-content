question: Ico kintu citwa iki iyo agashimwe k’ibikorwa vya Mining Bitcoin kagabanutse?
answer: Halving
wrong_answers:
  - Kugwiza kabiri
  - Kugwiza kane
  - Kugwiza  gatatu
explanation: |
  Ukugabanywa vyashizwe ko agashiwe ka mining, kugabanya biba buri imyaka ine, ni ikintu kizwi kw’izina rya Halving.
reviewed: true

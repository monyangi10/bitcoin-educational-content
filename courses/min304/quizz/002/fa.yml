question: تفاوت اصلی بین یک CPU و یک ASIC در زمینه Bitcoin Mining چیست؟
answer: یک CPU می‌تواند انواع مختلفی از محاسبات را انجام دهد بدون اینکه به‌طور خاص برای یک نوع محاسبه بهینه‌سازی شده باشد، در حالی که یک ASIC می‌تواند تنها یک نوع محاسبه را انجام دهد، اما بسیار کارآمد.
wrong_answers:
  - یک CPU از یک ASIC انرژی‌بازده‌تر است.
  - یک ASIC از یک CPU همه‌کاره‌تر است.
  - یک CPU فقط می‌تواند یک نوع محاسبه انجام دهد، در حالی که یک ASIC می‌تواند انواع مختلفی از محاسبات را انجام دهد.
explanation: |
  ASICها تراشه‌هایی هستند که قابل مقایسه با تراشه‌های CPU می‌باشند، اما به گونه‌ای توسعه یافته‌اند که تنها یک نوع محاسبه خاص را به کارآمدترین شکل ممکن انجام دهند. به عبارت دیگر، یک CPU قادر است انواع مختلفی از محاسبات را انجام دهد بدون اینکه به طور خاص برای یک نوع محاسبه یا دیگری بهینه‌سازی شده باشد، در حالی که یک ASIC تنها قادر به انجام یک نوع محاسبه است، اما بسیار کارآمد.
reviewed: true
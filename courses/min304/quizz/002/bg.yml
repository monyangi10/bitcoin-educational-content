question: Каква е основната разлика между CPU и ASIC в контекста на Bitcoin mining?
answer: Процесорът може да извършва множество различни видове изчисления, без да е особено оптимизиран за един вид изчисления, докато ASIC може да извършва само един вид изчисления, но много ефективно
wrong_answers:
  - Процесорът е по-енергийно ефективен от ASIC
  - ASIC е по-универсален от CPU
  - Процесорът може да извършва само един вид изчисления, докато ASIC може да извършва множество различни видове изчисления
explanation: |
  ASIC са чипове, сравними с процесорен чип; те обаче
  са разработени да изпълняват само един специфичен вид
  изчисления по възможно най-ефективния начин. В други
  с други думи, процесорът е способен да извършва множество
  различни видове изчисления, без да е особено
  оптимизиран за един или друг вид изчисления, докато
  gW-7 ще може да извършва само един вид
  изчисления, но много ефективно.
reviewed: true
question: वर्जिन बिटकॉइन क्या होते हैं?
answer: ताज़ा खनन किए गए बिटकॉइन जिन्हें कभी खर्च नहीं किया गया है और जिनका कोई इतिहास नहीं जुड़ा है।
wrong_answers:
  - अवैध गतिविधियों में इस्तेमाल किए गए बिटकॉइन्स।
  - खोए या भूल गए बिटकॉइन्स।
  - बहुत समय से Wallet में रखे गए बिटकॉइन्स।
explanation: |
  वर्जिन बिटकॉइन्स वो नए-नए माइन किए गए बिटकॉइन्स होते हैं जिन्हें कभी
  खर्च हो चुके हैं और उनसे कोई इतिहास नहीं जुड़ा है। ये
  बिटकॉइन्स को अक्सर ज़्यादा कीमती माना जाता है क्योंकि...
  कभी दागी नहीं रहे, जिससे कुछ हद तक सुरक्षा मिलती है
  रेगुलेटर्स या बड़े Exchange प्लेटफॉर्म्स द्वारा रिजेक्शन।
reviewed: true
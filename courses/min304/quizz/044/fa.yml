question: بیت‌کوین‌های دست‌نخورده چیستند؟
answer: بیت‌کوین‌های تازه استخراج‌شده که هرگز خرج نشده‌اند و هیچ سابقه‌ای به آن‌ها متصل نیست.
wrong_answers:
  - بیت‌کوین‌هایی که در فعالیت‌های غیرقانونی استفاده شده‌اند.
  - بیت‌کوین‌هایی که گم شده یا فراموش شده‌اند.
  - بیت‌کوین‌هایی که برای مدت طولانی در Wallet ذخیره شده‌اند.
explanation: |
  بیت‌کوین‌های ویرجین بیت‌کوین‌هایی هستند که تازه استخراج شده‌اند و هرگز خرج نشده‌اند و هیچ سابقه‌ای به آن‌ها متصل نیست. این بیت‌کوین‌ها اغلب ارزش بیشتری دارند زیرا هرگز آلوده نشده‌اند و برخی تضمین‌ها را در برابر رد شدن توسط تنظیم‌کنندگان یا پلتفرم‌های بزرگ Exchange ارائه می‌دهند.
reviewed: true
question: บิทคอยน์บริสุทธิ์คืออะไร?
answer: บิตคอยน์ที่เพิ่งขุดใหม่ซึ่งไม่เคยถูกใช้จ่ายและไม่มีประวัติที่เกี่ยวข้องกับมัน
wrong_answers:
  - บิทคอยน์ที่ถูกใช้ในกิจกรรมที่ผิดกฎหมาย
  - บิตคอยน์ที่สูญหายหรือถูกลืม
  - Bitcoins ที่ถูกเก็บไว้ใน wallet เป็นเวลานาน
explanation: |
  บิทคอยน์บริสุทธิ์คือบิทคอยน์ที่เพิ่งถูกขุดขึ้นมาใหม่และไม่เคยถูกใช้จ่ายมาก่อน ไม่มีประวัติใด ๆ ติดตัว บิทคอยน์เหล่านี้มักถูกมองว่ามีมูลค่ามากกว่าเพราะไม่เคยถูกปนเปื้อน ซึ่งให้การรับประกันบางอย่างต่อการถูกปฏิเสธโดยหน่วยงานกำกับดูแลหรือแพลตฟอร์มแลกเปลี่ยนหลัก ๆ
reviewed: true
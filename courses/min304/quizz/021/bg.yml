question: Какъв е икономическият стимул да се използва миньор Bitcoin вместо обикновен електрически нагревател?
answer: Миньорът осигурява не само топлина, но и награда Bitcoin.
wrong_answers:
  - Миньорът използва по-малко електроенергия от обикновен електрически нагревател.
  - Миньорът произвежда повече топлина от обикновен електрически нагревател.
  - Миньорът е по-евтин от обикновен електрически нагревател.
explanation: |
  Разликата между използването на миньор и обикновен електрически
  се състои в това, че минералът не само осигурява
  топлина, но и награда Bitcoin. Тази допълнителна награда
  може да помогне за намаляване на опасенията относно високата енергийна
  на миньорите.
reviewed: true
question: انگیزه اقتصادی برای استفاده از Bitcoin Miner به جای یک بخاری برقی ساده چیست؟
answer: Miner نه تنها گرما فراهم می‌کند بلکه یک پاداش Bitcoin نیز ارائه می‌دهد.
wrong_answers:
  - Miner از برق کمتری نسبت به یک بخاری برقی ساده استفاده می‌کند.
  - Miner بیشتر از یک بخاری برقی ساده گرما تولید می‌کند.
  - Miner ارزان‌تر از یک بخاری برقی ساده است.
explanation: |
  تفاوت بین استفاده از Miner و یک بخاری برقی ساده در این است که Miner نه تنها گرما فراهم می‌کند بلکه پاداش Bitcoin نیز ارائه می‌دهد. این پاداش اضافی می‌تواند به کاهش نگرانی‌ها درباره مصرف بالای انرژی ماینرها کمک کند.
reviewed: true
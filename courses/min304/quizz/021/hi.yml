question: Bitcoin और Miner का इस्तेमाल करने का आर्थिक फायदा क्या है, बजाय एक साधारण इलेक्ट्रिक हीटर के?
answer: जीडब्ल्यू-3 न सिर्फ गर्मी देता है बल्कि एक जीडब्ल्यू-2 इनाम भी देता है।
wrong_answers:
  - Miner एक साधारण इलेक्ट्रिक हीटर से कम बिजली खर्च करता है।
  - Miner एक साधारण इलेक्ट्रिक हीटर से ज्यादा गर्मी पैदा करता है।
  - Miner एक साधारण इलेक्ट्रिक हीटर से सस्ता है।
explanation: |
  Miner और एक साधारण इलेक्ट्रिक में अंतर
  थिएटर की खास बात यह है कि Miner न सिर्फ देता है...
  गर्मी के साथ-साथ एक Bitcoin इनाम भी। यह अतिरिक्त इनाम
  क्या यह ऊर्जा की अधिक खपत के बारे में चिंताओं को कम करने में मदद कर सकता है?
  माइनर्स का इस्तेमाल।
reviewed: true
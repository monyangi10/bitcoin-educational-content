question: 단순 전기 히터 대신 Bitcoin Miner을 사용하는 경제적 인센티브는 무엇인가요?
answer: Miner는 열뿐만 아니라 Bitcoin 보상도 제공합니다.
wrong_answers:
  - Miner는 일반 전기 히터보다 전력 소모량이 적습니다.
  - Miner는 단순한 전기 히터보다 더 많은 열을 발생시킵니다.
  - Miner는 일반 전기 히터보다 저렴합니다.
explanation: |
  Miner과 일반 전기 히터의 차이점은?
  히터와의 차이점은 Miner이 열을 제공할 뿐만 아니라
  열뿐만 아니라 Bitcoin 보상도 제공한다는 점입니다. 이 추가 보상
  는 채굴자의 높은 에너지 소비에 대한 우려를
  에너지 소비에 대한 우려를 완화할 수 있습니다.
reviewed: true
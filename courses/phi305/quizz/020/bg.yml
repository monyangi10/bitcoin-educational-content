question: Какво можем да научим от Коперник?
answer: Че Земята се върти около Слънцето.
wrong_answers:
  - Че Земята е плоска.
  - Че Земята е в центъра на Вселената.
  - Уравненията на Евклид са грешни.
explanation: |
  Николай Коперник (1473-1543 г.) е известен с това, че доказва, че Земята се върти около Слънцето, с което променя представата ни за Вселената. Това откритие оказва огромно влияние върху съвременната философия и рационализма.

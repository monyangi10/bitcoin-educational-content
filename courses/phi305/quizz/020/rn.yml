question: None twokwigira iki kuri Copernic?
answer: Ko Isi izunguruka Izuba.
wrong_answers:
  - Ko Isi ari umubumbe.
  - Ko Isi iri hagati y’Isanzure ry’Ijuru.
  - Uko ingano za Euclid zitari zo.
explanation: |
  Nicolas Copernic (1473-1543) arazwi cane kubera yerekanye ko Isi izunguruka Izuba, ivyo bikaba vyahinduye ukuntu tubona isi n’ikirere. Ivyo bintu vyavumbuwe vyaragize ico bikoze cane kuri filozofiya yo muri iki gihe no ku bijanye n’ugutahura ibintu.

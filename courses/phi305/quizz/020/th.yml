question: เราสามารถเรียนรู้อะไรจากโคเปอร์นิคัส?
answer: ที่โลกหมุนรอบดวงอาทิตย์
wrong_answers:
  - โลกแบน
  - ว่าโลกเป็นศูนย์กลางของจักรวาล
  - ที่สมการของยูคลิดผิด
explanation: |
  นิโคลัส โคเปอร์นิคัส (1473-1543) มีชื่อเสียงจากการแสดงให้เห็นว่าโลกหมุนรอบดวงอาทิตย์ ซึ่งเป็นการปฏิวัติความเข้าใจของเราเกี่ยวกับจักรวาล การค้นพบนี้มีอิทธิพลอย่างลึกซึ้งต่อปรัชญาสมัยใหม่และเหตุผลนิยม

question: چه چیزی می‌توانیم از کوپرنیک بیاموزیم؟
answer: که زمین به دور خورشید می‌چرخد.
wrong_answers:
  - که زمین صاف است.
  - که زمین در مرکز جهان است.
  - که معادلات اقلیدس اشتباه هستند.
explanation: |
  نیکلاس کوپرنیکوس (۱۴۷۳-۱۵۴۳) به خاطر نشان دادن اینکه زمین به دور خورشید می‌چرخد، مشهور است و این کشف، تصور ما از جهان را متحول کرد. این کشف تأثیر عمیقی بر فلسفه مدرن و عقل‌گرایی داشت.
reviewed: false
question: हम कोपरनिकस से क्या सीख सकते हैं?
answer: कि पृथ्वी सूर्य के चारों ओर घूमती है.
wrong_answers:
  - कि पृथ्वी चपटी है.
  - कि पृथ्वी ब्रह्माण्ड के केन्द्र में है।
  - यूक्लिड के समीकरण ग़लत हैं.
explanation: |
  निकोलस कोपरनिकस (1473-1543) इस बात के लिए प्रसिद्ध हैं कि उन्होंने यह सिद्ध किया कि पृथ्वी सूर्य के चारों ओर घूमती है, जिससे ब्रह्मांड की हमारी अवधारणा में क्रांतिकारी बदलाव आया। इस खोज का आधुनिक दर्शन और तर्कवाद पर गहरा प्रभाव पड़ा।

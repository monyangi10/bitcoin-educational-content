question: Чему мы можем научиться у Коперника?
answer: Что Земля вращается вокруг Солнца.
wrong_answers:
  - Что Земля плоская.
  - Что Земля находится в центре Вселенной.
  - Что уравнения Евклида неверны.
explanation: |
  Николай Коперник (1473-1543 гг.) известен тем, что доказал, что Земля вращается вокруг Солнца, что произвело переворот в нашем представлении о Вселенной. Это открытие оказало глубокое влияние на современную философию и рационализм.

question: Кем был Бернарден де Сен-Пьер?
answer: Директор Парижского музея естественной истории в начале XIX века.
wrong_answers:
  - Министр Людовика XIV.
  - Французский философ.
  - Революционер террора.
explanation: |
  Бернарден де Сен-Пьер (1737-1814) был директором парижского музея естественной истории (Jardin des Plantes) в начале XIX века. Он наиболее известен своим романом "Поль и Вирджиния" и описаниями природы.

question: เบอร์นาร์แด็ง เดอ แซงต์-ปิแอร์ คือใคร?
answer: ผู้อำนวยการพิพิธภัณฑ์ประวัติศาสตร์ธรรมชาติปารีสในช่วงต้นศตวรรษที่ 19
wrong_answers:
  - รัฐมนตรีของพระเจ้าหลุยส์ที่ 14
  - นักปรัชญาชาวฝรั่งเศส
  - นักปฏิวัติแห่งความหวาดกลัว
explanation: |
  แบร์นาร์แด็ง เดอ แซงต์-ปิแยร์ (1737-1814) เป็นผู้อำนวยการของ Jardin des Plantes (พิพิธภัณฑ์ประวัติศาสตร์ธรรมชาติ) ในปารีสในช่วงต้นศตวรรษที่ 19 เขาเป็นที่รู้จักดีที่สุดจากนวนิยายเรื่อง Paul et Virginie และคำบรรยายเกี่ยวกับธรรมชาติของเขา
reviewed: false
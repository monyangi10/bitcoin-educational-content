question: برناردین دو سن-پیر که بود؟
answer: مدیر موزه تاریخ طبیعی پاریس در اوایل قرن ۱۹.
wrong_answers:
  - وزیری از لویی چهاردهم.
  - یک فیلسوف فرانسوی.
  - یک انقلابی ترور.
explanation: |
  برناردین دو سن پیر (1737-1814) در اوایل قرن نوزدهم مدیر ژاردن د پلانت (موزه تاریخ طبیعی) در پاریس بود. او بیشتر به خاطر رمانش "پل و ویرجینی" و توصیفاتش از طبیعت شناخته می‌شود.
reviewed: false
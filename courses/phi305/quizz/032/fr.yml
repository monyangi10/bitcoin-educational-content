question: Qui était Bernardin de Saint-Pierre ?
answer: Le directeur du musée d'histoire naturelle de Paris au début du 19e siècle.
wrong_answers:
- Un ministre de Louis XIV.
- Un philosophe français.
- Un révolutionnaire de la terreur.
explanation: |
  Bernardin de Saint-Pierre (1737-1814) était le directeur du Jardin des Plantes (musée d'histoire naturelle) de Paris au début du 19e siècle. Il est connu pour son roman 'Paul et Virginie' et ses descriptions de la nature.

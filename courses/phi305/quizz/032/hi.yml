question: बर्नार्डिन डी सेंट-पियरे कौन थे?
answer: 19वीं सदी के प्रारंभ में पेरिस प्राकृतिक इतिहास संग्रहालय के निदेशक।
wrong_answers:
  - लुई XIV का एक मंत्री.
  - एक फ्रांसीसी दार्शनिक.
  - आतंक का क्रांतिकारी.
explanation: |
  बर्नार्डिन डे सेंट-पियरे (1737-1814) 19वीं सदी के आरंभ में पेरिस स्थित जार्डिन डेस प्लांट्स (प्राकृतिक इतिहास संग्रहालय) के निदेशक थे। वे अपने उपन्यास पॉल एट वर्जिनी और प्रकृति के अपने वर्णनों के लिए सर्वाधिक प्रसिद्ध हैं।

question: Vem var Bernardin de Saint-Pierre?
answer: Direktör för Paris naturhistoriska museum i början av 1800-talet.
wrong_answers:
  - En minister hos Ludvig XIV.
  - En fransk filosof.
  - En revolutionär av terror.
explanation: |
  Bernardin de Saint-Pierre (1737-1814) var chef för Jardin des Plantes (naturhistoriska museet) i Paris i början av 1800-talet. Han är mest känd för sin roman Paul et Virginie och sina naturskildringar.

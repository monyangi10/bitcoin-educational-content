question: Siapakah Bernardin de Saint-Pierre?
answer: Direktur Museum Sejarah Alam Paris pada awal abad ke-19.
wrong_answers:
  - Seorang menteri Louis XIV.
  - Seorang filsuf Prancis.
  - Sebuah revolusi teror.
explanation: |
  Bernardin de Saint-Pierre (1737-1814) adalah direktur Jardin des Plantes (museum sejarah alam) di Paris pada awal abad ke-19. Dia terkenal karena novelnya Paul et Virginie dan deskripsinya tentang alam.
reviewed: false
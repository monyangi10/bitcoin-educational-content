question: Кой е бил Бернарден дьо Сен-Пиер?
answer: Директор на Парижкия природонаучен музей в началото на XIX век.
wrong_answers:
  - Министър на Луи XIV.
  - Френски философ.
  - Революционер на терора.
explanation: |
  Бернарден дьо Сен-Пиер (1737-1814) е директор на Jardin des Plantes (Природонаучния музей) в Париж в началото на XIX век. Известен е най-вече с романа си "Пол и Виржиния" и с описанията си на природата.

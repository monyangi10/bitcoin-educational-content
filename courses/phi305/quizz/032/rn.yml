question: None Bernardin wa Saint-Pierre yari nde?
answer: Umuyobozi w’Ingoro y’Ivya kera y’i Paris mu ntango z’ikinjana ca 19.
wrong_answers:
  - Umusuku wa Ludoviko wa XIV.
  - Umunyabwenge w’Umufaransa.
  - Umunyagihugu w’iterabwoba.
explanation: |
  Bernardin de Saint-Pierre (1737-1814) yari umuyobozi w'i Paris mu ntango z'ikinjana ca 19. Azwi cane kubera igitabu ciwe Paul et Virginie hamwe n'insobanuro ziwe z'ibidukikije.

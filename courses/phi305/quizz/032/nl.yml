question: Wie was Bernardin de Saint-Pierre?
answer: De directeur van het Parijse Natuurhistorisch Museum in het begin van de 19e eeuw.
wrong_answers:
  - Een minister van Louis XIV.
  - Een Franse filosoof.
  - Een revolutionair van terreur.
explanation: |
  Bernardin de Saint-Pierre (1737-1814) was begin 19e eeuw directeur van de Jardin des Plantes (natuurhistorisch museum) in Parijs. Hij is vooral bekend om zijn roman Paul et Virginie en zijn natuurbeschrijvingen.
reviewed: false
question: Quale problema pone la superstizione all'Illuminismo?
answer: Limitare l'esercizio della ragione ed essere uno strumento del potere politico
wrong_answers:
  - Essere contro la democrazia e lo Stato di diritto.
  - Per prevenire il commercio.
  - Per consentire l'emancipazione.
explanation: |
  Per gli illuministi, la superstizione poneva il problema di limitare l'esercizio della ragione e di essere uno strumento del potere politico e religioso. Essa mantiene le persone nell'ignoranza e nella servitù.

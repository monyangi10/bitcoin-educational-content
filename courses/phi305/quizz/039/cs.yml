question: Jaký problém představuje pro osvícenství pověra?
answer: Omezuje uplatňování rozumu a je nástrojem politické moci
wrong_answers:
  - Být proti demokracii a právnímu státu.
  - Zabránit obchodu.
  - Umožnit emancipaci.
explanation: |
  Pro osvícenství představovala pověra problém, který omezoval používání rozumu a byl nástrojem politické a náboženské moci. Udržuje lidi v nevědomosti a otroctví.

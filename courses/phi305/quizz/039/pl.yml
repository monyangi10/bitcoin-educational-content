question: Jaki problem przesądy stanowią dla Oświecenia?
answer: Ograniczanie korzystania z rozumu i bycie narzędziem władzy politycznej
wrong_answers:
  - Być przeciwko demokracji i rządom prawa.
  - Aby zapobiec handlowi.
  - Aby umożliwić emancypację.
explanation: |
  Dla Oświecenia przesądy stanowiły problem ograniczania możliwości korzystania z rozumu i bycia narzędziem władzy politycznej i religijnej. Utrzymuje ludzi w ignorancji i poddaństwie.

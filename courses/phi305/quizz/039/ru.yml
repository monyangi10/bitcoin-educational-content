question: Какую проблему суеверия представляют для Просвещения?
answer: Ограничивает разум и является инструментом политической власти
wrong_answers:
  - Выступать против демократии и верховенства закона.
  - Чтобы предотвратить торговлю.
  - Обеспечить возможность эмансипации.
explanation: |
  Для эпохи Просвещения суеверие представляло собой проблему, ограничивая возможности разума и являясь инструментом политической и религиозной власти. Оно держит людей в невежестве и рабстве.
reviewed: false
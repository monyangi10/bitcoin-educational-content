question: Vilket problem utgör vidskepelse för upplysningen?
answer: Begränsar utövandet av förnuftet och är ett instrument för politisk makt
wrong_answers:
  - Att vara emot demokrati och rättsstatens principer.
  - För att förhindra handel.
  - För att möjliggöra frigörelse.
explanation: |
  För upplysningen utgjorde vidskepelse ett problem eftersom den begränsade utövandet av förnuftet och var ett instrument för politisk och religiös makt. Den håller människor i okunnighet och slaveri.
reviewed: false
question: What problem does superstition pose for the Enlightenment?
answer: Limiting the exercise of reason and being an instrument of political and religious power.
wrong_answers:
  - To be against democracy and the rule of law.
  - To prevent trade.
  - To enable emancipation.
explanation: |
  For the Enlightenment, superstition posed the problem of limiting the exercise of reason and of being an instrument of political and religious power. It keeps people in ignorance and servitude.
reviewed: false
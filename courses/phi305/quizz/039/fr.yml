question: Quel problème la superstition pose-t-elle aux Lumières  ?
answer: De limiter l'exercice de la raison et d'être un instrument de pouvoir politique
  et religieux.
wrong_answers:
- D'être contre la démocratie et l'État de droit.
- D'empêcher le commerce.
- De permettre l'émancipation.
explanation: |
  Pour les Lumières, la superstition pose le problème de limiter l'exercice de la raison et d'être un instrument de pouvoir politique et religieux. Elle maintient les hommes dans l'ignorance et la servitude.

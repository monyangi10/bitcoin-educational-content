question: Hvilket problem utgjør overtroen for opplysningstiden?
answer: Begrensning av fornuften og et instrument for politisk makt
wrong_answers:
  - Å være mot demokrati og rettsstatsprinsipper.
  - For å forhindre handel.
  - For å muliggjøre frigjøring.
explanation: |
  For opplysningstiden var overtroen et problem fordi den begrenset utøvelsen av fornuften og var et instrument for politisk og religiøs makt. Den holder folk i uvitenhet og trelldom.
reviewed: false
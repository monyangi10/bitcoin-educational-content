question: Kakav problem sujeverje predstavlja za prosvetiteljstvo?
answer: Ograničavanje upotrebe razuma i biti instrument političke moći
wrong_answers:
  - Biti protiv demokratije i vladavine prava.
  - Da bi se sprečila trgovina.
  - Da omogući emancipaciju.
explanation: |
  Za prosvetiteljstvo, sujeverje je predstavljalo problem ograničavanja primene razuma i bilo je instrument političke i verske moći. Ono drži ljude u neznanju i ropstvu.

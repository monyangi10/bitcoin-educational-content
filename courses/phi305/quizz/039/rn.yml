question: Ni ingorane iyihe ukwemera ibinyoma guteza Abanyamuco?
answer: Guhagarika ikoreshwa ry'ubwenge no kuba igikoresho c'ububasha bwa politike .
wrong_answers:
  - Kuba arwanya demokarasi n’ubutegetsi bw’amategeko.
  - Kugira ngo ntihagire ubudandaji.
  - Kugira ngo bishobore kwidegemvya.
explanation: |
  Ku bijanye n’Umuco, ukwizera ibinyoma kwari gutuma haba ingorane yo guhagarika gukoresha ubwenge no kuba igikoresho c’ububasha bwa politike n’ubw’idini. Bituma abantu baguma mu bujuju no mu buja.

question: Masalah apa yang ditimbulkan oleh takhayul bagi Pencerahan?
answer: Membatasi penggunaan nalar dan menjadi alat kekuasaan politik
wrong_answers:
  - Bertentangan dengan demokrasi dan supremasi hukum.
  - Untuk mencegah perdagangan.
  - Untuk memungkinkan emansipasi.
explanation: |
  Bagi Pencerahan, takhayul menimbulkan masalah karena membatasi penggunaan akal sehat dan menjadi alat kekuasaan politik dan agama. Hal ini membuat orang tetap berada dalam ketidaktahuan dan perbudakan.

question: अंधविश्वास ज्ञानोदय के लिए क्या समस्या उत्पन्न करता है?
answer: तर्क के प्रयोग को सीमित करना और राजनीतिक शक्ति का साधन बनना
wrong_answers:
  - लोकतंत्र और कानून के शासन के विरुद्ध होना।
  - व्यापार को रोकने के लिए.
  - मुक्ति को सक्षम करने के लिए.
explanation: |
  ज्ञानोदय के लिए, अंधविश्वास ने तर्क के प्रयोग को सीमित करने और राजनीतिक व धार्मिक शक्ति का एक साधन बनने की समस्या खड़ी कर दी। यह लोगों को अज्ञानता और दासता में रखता है।

question: Welk probleem vormt bijgeloof voor de Verlichting?
answer: De uitoefening van het verstand beperken en een instrument van politieke macht zijn
wrong_answers:
  - Tegen democratie en de rechtsstaat zijn.
  - Handel voorkomen.
  - Emancipatie mogelijk maken.
explanation: |
  Voor de Verlichting vormde bijgeloof het probleem dat het de uitoefening van de rede beperkte en dat het een instrument was van politieke en religieuze macht. Het houdt mensen in onwetendheid en slavernij.

question: Je, ushirikina unaleta tatizo gani kwa Mwangaza?
answer: Kupunguza matumizi ya akili na kuwa chombo cha nguvu za kisiasa
wrong_answers:
  - Kuwa kinyume na demokrasia na utawala wa sheria.
  - Ili kuzuia biashara.
  - Ili kuwezesha ukombozi.
explanation: |
  Kwa Mwangaza, ushirikina ulitokeza tatizo la kupunguza matumizi ya akili na kuwa chombo cha mamlaka ya kisiasa na kidini. Inawaweka watu katika ujinga na utumwa.

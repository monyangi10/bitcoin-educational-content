question: خرافات چه مشکلی برای عصر روشنگری ایجاد می‌کند؟
answer: محدود کردن استفاده از عقل و تبدیل شدن به ابزاری برای قدرت سیاسی
wrong_answers:
  - مخالف دموکراسی و حاکمیت قانون بودن.
  - برای جلوگیری از تجارت.
  - برای امکان‌پذیر ساختن رهایی.
explanation: |
  برای روشنگری، خرافات مشکل محدود کردن استفاده از عقل و تبدیل شدن به ابزاری برای قدرت سیاسی و مذهبی را ایجاد کرد. این امر مردم را در جهل و بندگی نگه می‌دارد.
reviewed: false
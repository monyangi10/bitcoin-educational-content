question: Minkä ongelman taikausko aiheuttaa valistukselle?
answer: Järjen käytön rajoittaminen ja poliittisen vallan välineenä toimiminen
wrong_answers:
  - Vastustaa demokratiaa ja oikeusvaltiota.
  - Kaupankäynnin estämiseksi.
  - Mahdollistaa emansipaation.
explanation: |
  Valistusajattelulle taikausko oli ongelma, joka rajoitti järjen käyttöä ja oli poliittisen ja uskonnollisen vallan väline. Se pitää ihmiset tietämättömyydessä ja orjuudessa.
reviewed: false
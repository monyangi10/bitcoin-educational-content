question: Que problema coloca a superstição ao Iluminismo?
answer: Limitar o exercício da razão e ser um instrumento do poder político
wrong_answers:
  - Ser contra a democracia e o Estado de direito.
  - Para impedir o comércio.
  - Para permitir a emancipação.
explanation: |
  Para o Iluminismo, a superstição colocava o problema de limitar o exercício da razão e de ser um instrumento do poder político e religioso. Mantém as pessoas na ignorância e na servidão.

question: Welches Problem stellt der Aberglaube für die Aufklärung dar?
answer: Die Ausübung der Vernunft einschränken und ein Instrument der politischen Macht sein
wrong_answers:
  - Sie sind gegen Demokratie und Rechtsstaatlichkeit.
  - Um den Handel zu verhindern.
  - Die Emanzipation ermöglichen.
explanation: |
  Für die Aufklärung stellte der Aberglaube das Problem dar, dass er die Ausübung der Vernunft einschränkt und ein Instrument der politischen und religiösen Macht ist. Er hält die Menschen in Unwissenheit und Knechtschaft.
reviewed: false
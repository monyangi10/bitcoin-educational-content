question: ¿Qué problema plantea la superstición a la Ilustración?
answer: Limitar el ejercicio de la razón y ser un instrumento del poder político
wrong_answers:
  - Estar en contra de la democracia y el Estado de Derecho.
  - Para impedir el comercio.
  - Permitir la emancipación.
explanation: |
  Para la Ilustración, la superstición planteaba el problema de limitar el ejercicio de la razón y de ser un instrumento del poder político y religioso. Mantiene a la gente en la ignorancia y la servidumbre.

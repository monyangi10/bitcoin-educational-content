question: Какъв проблем представлява суеверието за Просвещението?
answer: Ограничава упражняването на разума и е инструмент на политическата и религиозната власт.
wrong_answers:
  - Да бъдеш против демокрацията и върховенството на закона.
  - Да се предотврати търговията.
  - Да се даде възможност за еманципация.
explanation: |
  За Просвещението суеверието представлява проблем, свързан с ограничаването на упражняването на разума и с това, че е инструмент на политическата и религиозната власт. То държи хората в невежество и робство.
reviewed: false
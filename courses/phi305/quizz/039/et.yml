question: Millise probleemi tekitab valgustuse jaoks ebausk?
answer: Mõistuse kasutamise piiramine ja poliitilise võimu vahendiks olemine
wrong_answers:
  - Olla demokraatia ja õigusriigi vastu.
  - Kaubanduse vältimiseks.
  - Võimaldamaks emantsipatsiooni.
explanation: |
  Valgustusajastu jaoks kujutas ebausk probleemi, et see piirab mõistuse kasutamist ning on poliitilise ja religioosse võimu vahendiks. See hoiab inimesi teadmatuses ja orjuses.

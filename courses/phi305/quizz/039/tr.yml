question: Batıl inançlar Aydınlanma için nasıl bir sorun teşkil ediyor?
answer: Aklın kullanımının sınırlandırılması ve siyasi iktidarın bir aracı olması
wrong_answers:
  - Demokrasiye ve hukukun üstünlüğüne karşı olmak.
  - Ticareti önlemek için.
  - Özgürleşmeyi sağlamak için.
explanation: |
  Aydınlanma için batıl inanç, aklın kullanımını sınırlama ve siyasi ve dini iktidarın bir aracı olma sorununu ortaya çıkarmıştır. İnsanları cehalet ve kölelik içinde tutmaktadır.

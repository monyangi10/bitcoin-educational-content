question: Mê tín dị đoan gây ra vấn đề gì cho thời kỳ Khai sáng?
answer: Hạn chế việc thực hiện lý trí và trở thành công cụ của quyền lực chính trị
wrong_answers:
  - Chống lại nền dân chủ và pháp quyền.
  - Để ngăn chặn việc buôn bán.
  - Để có thể giải phóng.
explanation: |
  Đối với thời Khai sáng, mê tín dị đoan đặt ra vấn đề hạn chế việc vận dụng lý trí và trở thành công cụ của quyền lực chính trị và tôn giáo. Nó giam cầm con người trong sự ngu dốt và nô lệ.
reviewed: false
question: क्या यह विद्वत्तावाद है?
answer: मध्य युग का एक दर्शन.
wrong_answers:
  - आधुनिक युग का एक दर्शन.
  - एक प्राचीन दर्शन.
  - एक नास्तिक दर्शन.
explanation: |
  स्कोलास्टिसिज़्म एक मध्ययुगीन दर्शन था जो ईसाई धर्म को अरस्तू के दर्शन के साथ सामंजस्य बिठाने का प्रयास करता था। आधुनिक दर्शन के उदय से पहले यह यूरोपीय विश्वविद्यालयों में व्याप्त था।

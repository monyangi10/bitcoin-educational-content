question: สกอลาสติกคืออะไร?
answer: ปรัชญาแห่งยุคกลาง
wrong_answers:
  - ปรัชญาของยุคสมัยใหม่
  - ปรัชญาโบราณ
  - ปรัชญาแบบไม่เชื่อในพระเจ้า
explanation: |
  สกอลาสติกเป็นปรัชญายุคกลางที่พยายามประสานความเชื่อคริสเตียนกับปรัชญาของอริสโตเติล มันครอบงำมหาวิทยาลัยในยุโรปก่อนการเกิดขึ้นของปรัชญาสมัยใหม่
reviewed: false
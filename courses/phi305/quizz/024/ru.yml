question: Схоластика?
answer: Философия Средневековья.
wrong_answers:
  - Философия современной эпохи.
  - Древняя философия.
  - Атеистическая философия.
explanation: |
  Схоластика - это средневековая философия, которая пыталась примирить христианскую веру с аристотелевской философией. Она доминировала в европейских университетах до появления современной философии.

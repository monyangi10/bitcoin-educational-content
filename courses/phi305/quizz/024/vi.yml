question: Chủ nghĩa kinh viện là gì?
answer: Một triết lý của thời Trung Cổ.
wrong_answers:
  - Một triết lý của thời hiện đại.
  - Một triết lý cổ xưa.
  - Một triết lý vô thần.
explanation: |
  Chủ nghĩa Kinh viện là một triết lý thời trung cổ tìm cách dung hòa đức tin Kitô giáo với triết học Aristotle. Nó thống trị các trường đại học châu Âu trước khi triết học hiện đại xuất hiện.

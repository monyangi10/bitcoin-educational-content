question: Какво е схоластика?
answer: Философия на Средновековието.
wrong_answers:
  - Философия на модерната епоха.
  - Древна философия.
  - Атеистична философия.
explanation: |
  Схоластиката е средновековна философия, която се опитва да съчетае християнската вяра с аристотеловата философия. Тя доминира в европейските университети преди появата на модерната философия.

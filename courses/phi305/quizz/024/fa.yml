question: آیا اسکولاستیک است؟
answer: فلسفه‌ای از قرون وسطی.
wrong_answers:
  - فلسفه‌ای از عصر مدرن.
  - یک فلسفه باستانی.
  - یک فلسفهٔ بی‌خدایی.
explanation: |
  اسکولاستیسیسم فلسفه‌ای قرون وسطایی بود که در پی آشتی دادن ایمان مسیحی با فلسفه ارسطویی بود. این فلسفه بر دانشگاه‌های اروپایی پیش از ظهور فلسفه مدرن تسلط داشت.

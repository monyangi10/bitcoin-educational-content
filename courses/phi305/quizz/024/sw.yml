question: Je, ni usomi?
answer: Falsafa ya Zama za Kati.
wrong_answers:
  - Falsafa ya zama za kisasa.
  - Falsafa ya zamani.
  - Falsafa ya ukana Mungu.
explanation: |
  Usomi ulikuwa falsafa ya zama za kati iliyojaribu kupatanisha imani ya Kikristo na falsafa ya Aristotle. Ilitawala vyuo vikuu vya Ulaya kabla ya kuibuka kwa falsafa ya kisasa.
reviewed: true

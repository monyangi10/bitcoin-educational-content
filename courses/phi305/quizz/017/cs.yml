question: Jaké dva atributy tvoří látku?
answer: Hmota a myšlenka.
wrong_answers:
  - Radost a smutek.
  - Rozum a pověra.
  - Minulost a současnost.
explanation: |
  Dva atributy Substance, které můžeme poznat, jsou hmota (nebo rozsah) a myšlení. Tyto dva atributy vyjadřují nekonečnou podstatu Substance ve dvou různých, ale nikoli oddělených aspektech.
reviewed: false
question: Apa saja dua atribut yang membentuk Substance?
answer: Materi dan pemikiran.
wrong_answers:
  - Suka dan duka.
  - Nalar dan takhayul.
  - Dulu dan sekarang.
explanation: |
  Dua atribut Zat yang dapat kita ketahui adalah materi (atau luas) dan pikiran. Kedua atribut ini mengekspresikan esensi Zat yang tak terbatas dalam dua aspek yang berbeda tetapi tidak terpisah.
reviewed: false
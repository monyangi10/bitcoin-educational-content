question: Какие два атрибута составляют субстанцию?
answer: Материя и мысль.
wrong_answers:
  - Радость и печаль.
  - Разум и суеверие.
  - Прошлое и настоящее.
explanation: |
  Два атрибута субстанции, которые мы можем познать, - это материя (или протяженность) и мысль. Эти два атрибута выражают бесконечную сущность субстанции в двух различных, но не отдельных аспектах.

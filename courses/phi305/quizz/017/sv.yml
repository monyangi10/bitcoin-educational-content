question: Vilka är de två attribut som utgör Substance?
answer: Materia och tanke.
wrong_answers:
  - Glädje och sorg.
  - Förnuft och vidskepelse.
  - Förr och nu.
explanation: |
  De två attribut hos Substansen som vi kan känna till är materia (eller utsträckning) och tanke. Dessa två attribut uttrycker Substansens oändliga väsen i två olika men inte åtskilda aspekter.
reviewed: false
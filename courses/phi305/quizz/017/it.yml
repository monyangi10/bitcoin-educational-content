question: Quali sono i due attributi che compongono la Sostanza?
answer: Materia e pensiero.
wrong_answers:
  - Gioia e dolore.
  - Ragione e superstizione.
  - Passato e presente.
explanation: |
  I due attributi della Sostanza che possiamo conoscere sono la materia (o estensione) e il pensiero. Questi due attributi esprimono l'essenza infinita della Sostanza in due aspetti diversi ma non separati.
reviewed: false
question: Hva er de to egenskapene som utgjør Substance?
answer: Materie og tanke.
wrong_answers:
  - Glede og sorg.
  - Fornuft og overtro.
  - Fortid og nåtid.
explanation: |
  De to egenskapene ved substansen som vi kan kjenne, er materie (eller utstrekning) og tanke. Disse to attributtene uttrykker substansens uendelige essens i to forskjellige, men ikke adskilte aspekter.
reviewed: false
question: Quels sont les deux attributs qui composent la Substance ?
answer: La matière et la pensée.
wrong_answers:
- La joie et la peine.
- La raison et la superstition.
- Le passé et le présent.
explanation: |
  Les deux attributs de la Substance que nous pouvons connaître sont la matière (ou étendue) et la pensée. Ces deux attributs expriment l'essence infinie de la Substance sous deux aspects différents mais non séparés.

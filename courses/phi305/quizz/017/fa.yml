question: دو ویژگی که جوهر را تشکیل می‌دهند چیست؟
answer: ماده و اندیشه.
wrong_answers:
  - شادی و غم.
  - دلیل و خرافات.
  - گذشته و حال.
explanation: |
  دو ویژگی از جوهر که می‌توانیم بشناسیم، ماده (یا امتداد) و اندیشه هستند. این دو ویژگی، ذات بی‌نهایت جوهر را در دو جنبه متفاوت اما غیر جداگانه بیان می‌کنند.

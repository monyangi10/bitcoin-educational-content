question: Wat zijn de twee eigenschappen waaruit Substantie bestaat?
answer: Materie en gedachte.
wrong_answers:
  - Vreugde en verdriet.
  - Rede en bijgeloof.
  - Verleden en heden.
explanation: |
  De twee eigenschappen van Substantie die we kunnen kennen zijn materie (of omvang) en gedachte. Deze twee attributen drukken de oneindige essentie van Substantie uit in twee verschillende maar niet gescheiden aspecten.
reviewed: false
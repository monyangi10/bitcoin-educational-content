question: Maddeyi oluşturan iki özellik nedir?
answer: Madde ve düşünce.
wrong_answers:
  - Neşe ve keder.
  - Akıl ve batıl inanç.
  - Geçmiş ve bugün.
explanation: |
  Maddenin bilebildiğimiz iki sıfatı madde (ya da kapsam) ve düşüncedir. Bu iki sıfat Maddenin sonsuz özünü iki farklı ama ayrı olmayan yönüyle ifade eder.

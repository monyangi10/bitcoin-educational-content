question: Jakie dwa atrybuty składają się na Substancję?
answer: Materia i myśl.
wrong_answers:
  - Radość i smutek.
  - Rozsądek i przesąd.
  - Przeszłość i teraźniejszość.
explanation: |
  Dwa atrybuty Substancji, które możemy poznać, to materia (lub zakres) i myśl. Te dwa atrybuty wyrażają nieskończoną istotę Substancji w dwóch różnych, ale nie oddzielnych aspektach.
reviewed: false
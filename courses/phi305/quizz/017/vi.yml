question: Hai thuộc tính tạo nên Chất là gì?
answer: Vật chất và tư tưởng.
wrong_answers:
  - Niềm vui và nỗi buồn.
  - Lý trí và mê tín.
  - Quá khứ và hiện tại.
explanation: |
  Hai thuộc tính của Thực thể mà chúng ta có thể biết là vật chất (hay phạm vi) và tư duy. Hai thuộc tính này thể hiện bản chất vô hạn của Thực thể ở hai khía cạnh khác nhau nhưng không tách biệt.

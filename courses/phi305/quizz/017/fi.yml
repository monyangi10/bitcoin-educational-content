question: Mitkä kaksi ominaisuutta muodostavat aineen?
answer: Aine ja ajatus.
wrong_answers:
  - Ilo ja suru.
  - Järki ja taikausko.
  - Menneisyys ja nykyisyys.
explanation: |
  Kaksi Substanssin ominaisuutta, jotka voimme tuntea, ovat aine (tai laajuus) ja ajatus. Nämä kaksi ominaisuutta ilmentävät Aineen ääretöntä olemusta kahdessa eri mutta ei erillisessä aspektissa.
reviewed: false
question: Quais são os dois atributos que constituem a Substância?
answer: Matéria e pensamento.
wrong_answers:
  - Alegria e tristeza.
  - Razão e superstição.
  - Passado e presente.
explanation: |
  Os dois atributos da Substância que podemos conhecer são a matéria (ou extensão) e o pensamento. Estes dois atributos exprimem a essência infinita da Substância em dois aspectos diferentes, mas não separados.
reviewed: false
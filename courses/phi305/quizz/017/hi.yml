question: वे दो गुण क्या हैं जिनसे पदार्थ बनता है?
answer: पदार्थ और विचार.
wrong_answers:
  - आनंद और दुःख।
  - तर्क और अंधविश्वास.
  - भूत और वर्तमान.
explanation: |
  पदार्थ के दो गुण जिन्हें हम जान सकते हैं, वे हैं पदार्थ (या विस्तार) और विचार। ये दो गुण पदार्थ के अनंत सार को दो अलग-अलग, लेकिन अलग-अलग नहीं, पहलुओं में व्यक्त करते हैं।

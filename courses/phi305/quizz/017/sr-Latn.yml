question: Koja su dva atributa koja čine Supstancu?
answer: Materija i misao.
wrong_answers:
  - Radost i tuga.
  - Razum i sujeverje.
  - Prošlost i sadašnjost.
explanation: |
  Dve osobine Supstancije koje možemo spoznati su materija (ili opseg) i misao. Ove dve osobine izražavaju beskonačnu suštinu Supstancije u dva različita, ali neodvojiva aspekta.
reviewed: false
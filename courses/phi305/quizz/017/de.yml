question: Welche beiden Eigenschaften machen die Substanz aus?
answer: Materie und Gedanken.
wrong_answers:
  - Freude und Kummer.
  - Vernunft und Aberglaube.
  - Vergangenheit und Gegenwart.
explanation: |
  Die beiden Attribute der Substanz, die wir kennen können, sind Materie (oder Ausmaß) und Gedanke. Diese beiden Attribute drücken die unendliche Essenz der Substanz in zwei verschiedenen, aber nicht getrennten Aspekten aus.
reviewed: false
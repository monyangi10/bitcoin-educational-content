question: Кои са двете характеристики, които изграждат субстанцията?
answer: Материя и мисъл.
wrong_answers:
  - Радост и скръб.
  - Разум и суеверие.
  - Минало и настояще.
explanation: |
  Двата атрибута на Субстанцията, които можем да познаем, са материя (или обем) и мисъл. Тези два атрибута изразяват безкрайната същност на Субстанцията в два различни, но не и отделни аспекта.
reviewed: false
question: อะไรคือสองคุณลักษณะที่ประกอบขึ้นเป็นสาร?
answer: สสารและความคิด
wrong_answers:
  - ความสุขและความเศร้า
  - เหตุผลและความเชื่องมงาย
  - อดีตและปัจจุบัน
explanation: |
  คุณสมบัติสองประการของสารที่เราสามารถรู้ได้คือ สสาร (หรือขอบเขต) และความคิด คุณสมบัติทั้งสองนี้แสดงถึงแก่นแท้ที่ไม่มีที่สิ้นสุดของสารในสองแง่มุมที่แตกต่างกันแต่ไม่แยกจากกัน
reviewed: false
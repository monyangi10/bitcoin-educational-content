question: ¿Cuáles son los dos atributos que componen la Sustancia?
answer: Materia y pensamiento.
wrong_answers:
  - Alegría y tristeza.
  - Razón y superstición.
  - Pasado y presente.
explanation: |
  Los dos atributos de la Substancia que podemos conocer son la materia (o extensión) y el pensamiento. Estos dos atributos expresan la esencia infinita de la Substancia en dos aspectos diferentes pero no separados.

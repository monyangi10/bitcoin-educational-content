question: लैमार्क कौन है?
answer: एक फ्रांसीसी प्रकृतिवादी जो डार्विन से पहले थे।
wrong_answers:
  - एक डच दार्शनिक.
  - स्पिनोज़ा का एक शिष्य.
  - एक क्लासिक चित्रकार.
explanation: |
  जीन-बैप्टिस्ट डी लैमार्क (1744-1829) एक फ्रांसीसी प्रकृतिवादी थे जिन्होंने डार्विन से पहले विकासवाद का सिद्धांत प्रस्तुत किया था। उनके परिवर्तनवाद के सिद्धांत में उपार्जित लक्षणों की आनुवंशिकता शामिल थी।

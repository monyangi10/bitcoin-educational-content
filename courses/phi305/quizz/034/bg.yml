question: Кой е Ламарк?
answer: Френски естествоизпитател, предшестващ Дарвин.
wrong_answers:
  - Холандски философ.
  - Ученик на Спиноза.
  - Класически художник.
explanation: |
  Жан-Батист дьо Ламарк (1744-1829) е френски естественик, който предлага теория за еволюцията преди Дарвин. Неговата теория на трансформацията включва наследствеността на придобитите черти.

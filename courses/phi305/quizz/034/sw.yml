question: Lamarck ni nani?
answer: Mtaalamu wa asili wa Ufaransa aliyemtangulia Darwin.
wrong_answers:
  - Mwanafalsafa wa Uholanzi.
  - Mwanafunzi wa Spinoza.
  - mchoraji classic.
explanation: |
  Jean-Baptiste de Lamarck (1744-1829) alikuwa mwanasayansi wa asili wa Ufaransa ambaye alipendekeza nadharia ya mageuzi kabla ya Darwin. Nadharia yake ya mabadiliko ilijumuisha urithi wa sifa zilizopatikana.
reviewed: false
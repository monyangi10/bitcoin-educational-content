question: لامارک کیست؟
answer: یک طبیعت‌شناس فرانسوی که پیش از داروین بود.
wrong_answers:
  - یک فیلسوف هلندی.
  - یک شاگرد اسپینوزا.
  - یک نقاش کلاسیک.
explanation: |
  ژان-باپتیست دو لامارک (۱۷۴۴-۱۸۲۹) یک طبیعت‌شناس فرانسوی بود که نظریه‌ای درباره تکامل پیش از داروین ارائه داد. نظریه تحول‌گرایی او شامل وراثت صفات اکتسابی بود.

question: None Lamarck ni nde?
answer: Umuhinga mu vy’ibidukikije w’Umufaransa yabanjirije Darwin.
wrong_answers:
  - Umunyabwenge w’Umuholandi.
  - Umwigishwa wa Spinoza.
  - Umunyabugenegene w’umunyabugenegene.
explanation: |
  Jean-Baptiste de Lamarck (1744-1829) yari umuhinga mu vy'ibidukikije w'umufaransa yashizeho iciyumviro c'ubwihindurize imbere ya Darwin. Iciyumviro ciwe c’uguhindura ibintu carimwo n’ivy’iragi ry’ibiranga umuntu aronka.

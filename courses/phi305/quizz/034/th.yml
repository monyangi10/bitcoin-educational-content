question: ใครคือ Lamarck?
answer: นักธรรมชาติวิทยาชาวฝรั่งเศสที่มาก่อนดาร์วิน
wrong_answers:
  - นักปรัชญาชาวดัตช์
  - สาวกของสปิโนซา
  - จิตรกรคลาสสิก
explanation: |
  ฌอง-บาติสต์ เดอ ลามาร์ค (1744-1829) เป็นนักธรรมชาติวิทยาชาวฝรั่งเศสที่เสนอทฤษฎีวิวัฒนาการก่อนดาร์วิน ทฤษฎีการเปลี่ยนแปลงของเขารวมถึงการถ่ายทอดลักษณะที่ได้รับมา
reviewed: false
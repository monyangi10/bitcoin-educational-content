question: Кто такой Ламарк?
answer: Французский натуралист, предшествовавший Дарвину.
wrong_answers:
  - Голландский философ.
  - Ученик Спинозы.
  - Классический художник.
explanation: |
  Жан-Батист де Ламарк (1744-1829) - французский натуралист, предложивший теорию эволюции раньше Дарвина. Его теория трансформизма включала наследование приобретенных признаков.

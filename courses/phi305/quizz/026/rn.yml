question: Ni nde yiyumvira ko umuntu ashobora guhungabanya Kamere aho kuyiyobora?
answer: Dekarite.
wrong_answers:
  - Sipinoza.
  - Eyinishiteni.
  - Umweranda-Augusito.
explanation: |
  Descartes yarizera ko umuntu ashobora guhungabanya Kamere aho kuyishikirwa. Iryo yerekwa ry’ububiri rituma umuntu arwanya ibidukikije, kandi ritanga iciyumviro c’uko dushobora kuduga hejuru y’amategeko y’ibidukikije biciye mu bushake bwacu.

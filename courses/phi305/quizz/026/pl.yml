question: Kto myśli, że człowiek może zakłócać Naturę, zamiast jej podlegać?
answer: Kartezjusz.
wrong_answers:
  - Spinoza.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Kartezjusz wierzył, że człowiek może raczej zakłócać naturę niż jej podlegać. Ta dualistyczna wizja stawia człowieka przeciwko naturze i sugeruje, że możemy wznieść się ponad naturalne prawa dzięki naszej woli.
reviewed: false
question: Кто считает, что человек может нарушать природу, а не подчиняться ей?
answer: Декарт.
wrong_answers:
  - Спиноза.
  - Эйнштейн.
  - Сен-Огюстен.
explanation: |
  Декарт считал, что человек может скорее нарушить природу, чем подчинить ее себе. Это дуалистическое видение ставит человека против природы и предполагает, что мы можем возвыситься над естественными законами с помощью нашей воли.

question: Кой мисли, че човек може да наруши природата, вместо да се подчини на нея?
answer: Декарт.
wrong_answers:
  - Спиноза.
  - Айнщайн.
  - Сен-Огюстен.
explanation: |
  Декарт вярва, че човекът може да наруши природата, вместо да се подчини на нея. Тази дуалистична визия противопоставя човека на природата и предполага, че можем да се издигнем над природните закони чрез волята си.
reviewed: false
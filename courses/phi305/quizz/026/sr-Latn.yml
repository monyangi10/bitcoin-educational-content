question: Ko misli da čovek može uznemiriti Prirodu umesto da joj bude podložan?
answer: Dekart.
wrong_answers:
  - Spinoza.
  - Ajnštajn.
  - Saint-Augustin.
explanation: |
  Dekart je verovao da čovek može da uznemiri Prirodu, umesto da joj se podvrgne. Ova dualistička vizija suprotstavlja čoveka prirodi i sugeriše da možemo nadvladati prirodne zakone kroz našu volju.

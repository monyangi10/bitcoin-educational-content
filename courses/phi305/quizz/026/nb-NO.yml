question: Hvem tror at mennesket kan forstyrre naturen i stedet for å underkaste seg den?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Descartes mente at mennesket kan forstyrre naturen i stedet for å underkaste seg den. Dette dualistiske synet setter mennesket opp mot naturen, og antyder at vi kan heve oss over naturlovene gjennom vår egen vilje.
reviewed: false
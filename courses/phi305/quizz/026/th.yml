question: ใครคิดว่ามนุษย์สามารถรบกวนธรรมชาติแทนที่จะยอมจำนนต่อมัน?
answer: เดส์การ์ต
wrong_answers:
  - สปิโนซา
  - ไอน์สไตน์
  - แซงต์-โอกุสแตง
explanation: |
  เดส์การ์ตเชื่อว่ามนุษย์สามารถรบกวนธรรมชาติแทนที่จะยอมรับมัน วิสัยทัศน์แบบทวิลักษณ์นี้ทำให้มนุษย์ต่อต้านธรรมชาติ และแนะนำว่าเราสามารถก้าวข้ามกฎธรรมชาติได้ด้วยเจตจำนงของเรา
reviewed: false
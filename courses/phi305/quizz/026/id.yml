question: Siapa yang mengira bahwa manusia dapat mengganggu Alam dan bukannya menjadi sasarannya?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Descartes percaya bahwa manusia dapat mengganggu alam dan bukannya mengikutinya. Pandangan dualistik ini mengadu manusia dengan alam, dan menunjukkan bahwa kita dapat mengatasi hukum alam melalui kehendak kita.

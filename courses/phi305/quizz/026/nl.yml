question: Wie denkt dat de mens de natuur kan verstoren in plaats van zich eraan te onderwerpen?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Descartes geloofde dat de mens de natuur kan verstoren in plaats van ondergaan. Deze dualistische visie zet de mens tegenover de natuur en suggereert dat we ons door onze wil boven de natuurwetten kunnen verheffen.
reviewed: false
question: कौन सोचता है कि मनुष्य प्रकृति के अधीन होने के बजाय उसे परेशान कर सकता है?
answer: डेसकार्टेस.
wrong_answers:
  - स्पिनोज़ा.
  - आइंस्टीन.
  - सेंट-ऑगस्टिन.
explanation: |
  डेसकार्टेस का मानना ​​था कि मनुष्य प्रकृति को झेलने के बजाय उसे बिगाड़ सकता है। यह द्वैतवादी दृष्टि मनुष्य को प्रकृति के विरुद्ध खड़ा करती है, और सुझाव देती है कि हम अपनी इच्छाशक्ति से प्राकृतिक नियमों से ऊपर उठ सकते हैं।
reviewed: false
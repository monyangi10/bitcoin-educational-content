question: Da li je Traité théologico-politique ikada objavljen?
answer: Anonimno.
wrong_answers:
  - Godine 1677.
  - Posthumno.
  - Samoizdavanje.
explanation: |
  Teološko-politički traktat je objavljen anonimno 1670. godine kako bi se Spinoza zaštitio od progona. Delo je ubrzo zabranjeno u mnogim zemljama zbog svojih revolucionarnih ideja o religiji i politici.

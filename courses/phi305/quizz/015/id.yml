question: Apakah Traité théologico-politique pernah diterbitkan?
answer: Anonim.
wrong_answers:
  - Pada tahun 1677.
  - Anumerta.
  - Penerbitan mandiri.
explanation: |
  Risalah Teologi-Politik diterbitkan secara anonim pada tahun 1670 untuk melindungi Spinoza dari penganiayaan. Karya ini segera dilarang di banyak negara karena gagasan revolusionernya tentang agama dan politik.
reviewed: false
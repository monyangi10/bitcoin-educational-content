question: Il Traité théologico-politique è mai stato pubblicato?
answer: In modo anonimo.
wrong_answers:
  - Nel 1677.
  - Postumo.
  - Self-publishing.
explanation: |
  Il Trattato teologico-politico fu pubblicato in forma anonima nel 1670 per proteggere Spinoza dalle persecuzioni. L'opera fu presto vietata in molti Paesi per le sue idee rivoluzionarie sulla religione e sulla politica.
reviewed: false
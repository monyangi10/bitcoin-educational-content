question: Mbega igitabu Traité théologique-politique coba carasohotse?
answer: Atamenyekana.
wrong_answers:
  - Mu 1677.
  - Inyuma y’urupfu rwiwe.
  - Ukwisohora.
explanation: |
  Igitabu c’ivy’idini n’ivy’ubutegetsi carasohowe ata wuzi izina ryiwe mu 1670 kugira ngo Spinoza ntahamirwe. Ico gikorwa nticatevye gukumirwa mu bihugu vyinshi kubera ivyiyumviro vyaco vy’uguhindura ibintu ku bijanye n’idini be n’ivya politike.

question: Byla Traité théologico-politique někdy vydána?
answer: Anonymně.
wrong_answers:
  - V roce 1677.
  - Posmrtně.
  - Vydávání vlastním nákladem.
explanation: |
  Teologicko-politický traktát byl vydán anonymně v roce 1670, aby byl Spinoza chráněn před pronásledováním. Dílo bylo brzy v mnoha zemích zakázáno pro své revoluční myšlenky o náboženství a politice.
reviewed: false
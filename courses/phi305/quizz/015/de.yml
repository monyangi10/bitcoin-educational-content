question: Ist der Traité théologico-politique jemals veröffentlicht worden?
answer: Anonym.
wrong_answers:
  - Im Jahr 1677.
  - Posthum.
  - Self-Publishing.
explanation: |
  Die Theologisch-politische Abhandlung wurde 1670 anonym veröffentlicht, um Spinoza vor Verfolgung zu schützen. Das Werk wurde bald in vielen Ländern wegen seiner revolutionären Ideen zu Religion und Politik verboten.
reviewed: false
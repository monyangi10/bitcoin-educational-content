question: Je, Traité théologico-politique imewahi kuchapishwa?
answer: Bila kujulikana.
wrong_answers:
  - Mnamo 1677.
  - Baada ya kifo.
  - Kujichapisha.
explanation: |
  Mkataba wa Kitheolojia na Kisiasa ulichapishwa bila kujulikana mnamo 1670 ili kulinda Spinoza kutokana na mateso. Upesi kazi hiyo ilipigwa marufuku katika nchi nyingi kwa sababu ya mawazo yake ya kimapinduzi kuhusu dini na siasa.
reviewed: false
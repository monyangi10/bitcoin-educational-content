question: Czy Traité théologico-politique został kiedykolwiek opublikowany?
answer: Anonimowo.
wrong_answers:
  - W 1677 r.
  - Pośmiertnie.
  - Samodzielne publikowanie.
explanation: |
  Traktat teologiczno-polityczny został opublikowany anonimowo w 1670 roku, aby chronić Spinozę przed prześladowaniami. Dzieło to zostało wkrótce zakazane w wielu krajach ze względu na rewolucyjne idee dotyczące religii i polityki.
reviewed: false
question: Traité théologico-politique เคยได้รับการตีพิมพ์หรือไม่?
answer: โดยไม่เปิดเผยชื่อ
wrong_answers:
  - ในปี ค.ศ. 1677
  - มรณกรรม
  - การเผยแพร่ด้วยตนเอง
explanation: |
  The Theological-Political Treatise ถูกตีพิมพ์โดยไม่ระบุชื่อในปี 1670 เพื่อปกป้องสปิโนซาจากการถูกข่มเหง งานชิ้นนี้ถูกห้ามในหลายประเทศในไม่ช้าหลังจากนั้นเนื่องจากแนวคิดปฏิวัติเกี่ยวกับศาสนาและการเมือง
reviewed: false
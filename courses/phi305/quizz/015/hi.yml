question: क्या ट्रैटे थियोलॉजिको-पोलिटिक कभी प्रकाशित हुआ है?
answer: गुमनाम रूप से.
wrong_answers:
  - 1677 में.
  - मरणोपरांत।
  - स्व-प्रकाशन.
explanation: |
  स्पिनोज़ा को उत्पीड़न से बचाने के लिए 1670 में "थियोलॉजिकल-पॉलिटिकल ट्रीटीज़" गुमनाम रूप से प्रकाशित किया गया था। धर्म और राजनीति पर इसके क्रांतिकारी विचारों के कारण जल्द ही कई देशों में इस कृति पर प्रतिबंध लगा दिया गया।
reviewed: false
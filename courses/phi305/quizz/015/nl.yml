question: Is de Traité théologico-politique ooit gepubliceerd?
answer: Anoniem.
wrong_answers:
  - In 1677.
  - Postuum.
  - Zelf uitgeven.
explanation: |
  Theological-Political Treatise werd in 1670 anoniem gepubliceerd om Spinoza te beschermen tegen vervolging. Het werk werd al snel in veel landen verboden vanwege zijn revolutionaire ideeën over religie en politiek.
reviewed: false
question: آیا Traité théologico-politique تا به حال منتشر شده است؟
answer: به‌صورت ناشناس.
wrong_answers:
  - در سال ۱۶۷۷.
  - پس از مرگ.
  - انتشار شخصی.
explanation: |
  رساله الهی-سیاسی به صورت ناشناس در سال 1670 منتشر شد تا از اسپینوزا در برابر آزار و اذیت محافظت کند. این اثر به زودی به دلیل ایده‌های انقلابی‌اش درباره دین و سیاست در بسیاری از کشورها ممنوع شد.
reviewed: false
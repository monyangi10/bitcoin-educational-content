question: Le Traité théologico-politique a-t-il été publié ?
answer: Anonymement.
wrong_answers:
- En 1677.
- À titre posthume.
- À compte d'auteur.
explanation: |
  Le Traité théologico-politique a été publié anonymement en 1670 pour protéger Spinoza des persécutions. L'ouvrage fut rapidement interdit dans de nombreux pays en raison de ses idées révolutionnaires sur la religion et la politique.
reviewed: false

question: Has the Traité théologico-politique ever been published?
answer: Anonymously.
wrong_answers:
  - In 1677.
  - Posthumously.
  - Self-publishing.
explanation: |
  The Theological-Political Treatise was published anonymously in 1670 to protect Spinoza from persecution. The work was soon banned in many countries for its revolutionary ideas on religion and politics.
reviewed: false
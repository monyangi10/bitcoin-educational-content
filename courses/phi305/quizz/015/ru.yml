question: Был ли когда-нибудь опубликован Traité théologico-politique?
answer: Анонимно.
wrong_answers:
  - В 1677 году.
  - Посмертно.
  - Самостоятельная публикация.
explanation: |
  Богословско-политический трактат" был опубликован анонимно в 1670 году, чтобы защитить Спинозу от преследований. Вскоре произведение было запрещено во многих странах за его революционные идеи о религии и политике.
reviewed: false
question: Cuốn Traité théologico-politique đã từng được xuất bản chưa?
answer: Ẩn danh.
wrong_answers:
  - Năm 1677.
  - Sau khi mất.
  - Tự xuất bản.
explanation: |
  Luận thuyết Thần học-Chính trị được xuất bản ẩn danh vào năm 1670 để bảo vệ Spinoza khỏi bị bức hại. Tác phẩm này sớm bị cấm ở nhiều quốc gia vì những tư tưởng cách mạng về tôn giáo và chính trị.
reviewed: false
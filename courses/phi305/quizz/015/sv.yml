question: Har Traité théologico-politique någonsin publicerats?
answer: Anonymt.
wrong_answers:
  - År 1677.
  - Postumt.
  - Självpublicering.
explanation: |
  The Theological-Political Treatise publicerades anonymt år 1670 för att skydda Spinoza från förföljelse. Verket blev snart förbjudet i många länder på grund av sina revolutionerande idéer om religion och politik.
reviewed: false
question: Публикуван ли е някога Traité théologico-politique?
answer: Анонимно.
wrong_answers:
  - През 1677 г.
  - Посмъртно.
  - Самостоятелно издаване.
explanation: |
  Теологично-политическият трактат е публикуван анонимно през 1670 г., за да предпази Спиноза от преследване. Скоро творбата е забранена в много страни заради революционните си идеи за религията и политиката.
reviewed: false
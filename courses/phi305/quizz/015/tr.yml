question: Traité théologico-politique hiç yayımlandı mı?
answer: Anonim olarak.
wrong_answers:
  - 1677'de.
  - Ölümünden sonra.
  - Kendi kendine yayıncılık.
explanation: |
  Teolojik-Politik İnceleme, Spinoza'yı zulümden korumak için 1670 yılında anonim olarak yayımlandı. Eser, din ve siyaset üzerine devrimci fikirleri nedeniyle kısa süre içinde birçok ülkede yasaklandı.
reviewed: false
question: O Traité théologico-politique já foi publicado?
answer: Anonimamente.
wrong_answers:
  - Em 1677.
  - A título póstumo.
  - Auto-publicação.
explanation: |
  O Tratado Teológico-Político foi publicado anonimamente em 1670 para proteger Spinoza de perseguições. A obra foi rapidamente proibida em muitos países devido às suas ideias revolucionárias sobre religião e política.

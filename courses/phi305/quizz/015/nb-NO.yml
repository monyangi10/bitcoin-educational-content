question: Har Traité théologico-politique noen gang blitt utgitt?
answer: Anonymt.
wrong_answers:
  - I 1677.
  - Posthumt.
  - Selvpublisering.
explanation: |
  Den teologisk-politiske avhandling ble utgitt anonymt i 1670 for å beskytte Spinoza mot forfølgelse. Verket ble snart forbudt i mange land på grunn av sine revolusjonerende ideer om religion og politikk.
reviewed: false
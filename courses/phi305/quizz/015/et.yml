question: Kas "Traité théologico-politique" on kunagi avaldatud?
answer: Anonüümselt.
wrong_answers:
  - Aastal 1677.
  - Postuumselt.
  - Isekirjastamine.
explanation: |
  Teoloogilis-poliitiline traktaat avaldati 1670. aastal anonüümselt, et kaitsta Spinozat tagakiusamise eest. Teos keelustati peagi paljudes riikides oma revolutsiooniliste religiooni- ja poliitiliste ideede tõttu.
reviewed: false
question: गिल्स डेल्यूज़ के लिए नैतिकता क्या है?
answer: अच्छे और नैतिक के बीच निर्णय की एक प्रणाली।
wrong_answers:
  - एक धार्मिक पहल.
  - कानून का परिणाम.
  - एक स्थायी सिद्धांत.
explanation: |
  गिल्स डेल्यूज़ के लिए, नैतिकता एक निर्णय प्रणाली है जो पारलौकिक मूल्यों के अनुसार कार्यों को अच्छे और बुरे में वर्गीकृत करती है। वे इसकी तुलना स्पिनोज़वादी नैतिकता से करते हैं, जो अस्तित्व के स्वरूपों का मूल्यांकन उनकी कार्य करने की क्षमता के अनुसार करती है।
reviewed: false
question: Đạo đức đối với Gilles Deleuze là gì?
answer: Một hệ thống phán đoán giữa cái thiện và cái đạo đức.
wrong_answers:
  - Một sáng kiến tôn giáo.
  - Kết quả của luật pháp.
  - Một nguyên tắc bền vững.
explanation: |
  Đối với Gilles Deleuze, đạo đức là một hệ thống phán đoán phân loại hành động thành thiện và ác dựa trên các giá trị siêu việt. Ông đối lập điều này với đạo đức học Spinoza, vốn đánh giá các phương thức tồn tại dựa trên khả năng hành động của chúng.

question: O que é a moral para Gilles Deleuze?
answer: Um sistema de julgamento entre o bom e o moral.
wrong_answers:
  - Uma iniciativa religiosa.
  - O resultado da lei.
  - Um princípio duradouro.
explanation: |
  Para Gilles Deleuze, a moral é um sistema de julgamento que classifica as acções em boas e más de acordo com valores transcendentes. Deleuze contrapõe-se à ética spinozista, que avalia os modos de existência de acordo com a sua potência de ação.

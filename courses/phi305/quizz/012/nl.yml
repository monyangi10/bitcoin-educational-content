question: Wat is moraliteit voor Gilles Deleuze?
answer: Een beoordelingssysteem tussen het goede en het morele.
wrong_answers:
  - Een religieus initiatief.
  - Het resultaat van de wet.
  - Een blijvend principe.
explanation: |
  Voor Gilles Deleuze is moraliteit een beoordelingssysteem dat handelingen classificeert in goed en kwaad op basis van transcendente waarden. Hij contrasteert dit met de Spinozistische ethiek, die bestaanswijzen evalueert op basis van hun vermogen om te handelen.

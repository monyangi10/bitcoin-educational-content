question: Apa itu moralitas bagi Gilles Deleuze?
answer: Sebuah sistem penilaian antara yang baik dan yang bermoral.
wrong_answers:
  - Inisiatif yang religius.
  - Hasil dari hukum.
  - Sebuah prinsip yang abadi.
explanation: |
  Bagi Gilles Deleuze, moralitas adalah sebuah sistem penilaian yang mengklasifikasikan tindakan ke dalam baik dan buruk menurut nilai-nilai transenden. Ia membandingkannya dengan etika Spinozisme, yang mengevaluasi modus-modus eksistensi menurut kekuatan mereka untuk bertindak.

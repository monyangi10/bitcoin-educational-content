question: Šta je moralnost za Gilesa Deleuza?
answer: Sistem prosuđivanja između dobrog i moralnog.
wrong_answers:
  - Religiozna inicijativa.
  - Rezultat zakona.
  - Trajan princip.
explanation: |
  Za Gilesa Deleza, moralnost je sistem prosuđivanja koji klasifikuje dela na dobra i zla prema transcendentnim vrednostima. On ovo suprotstavlja Spinozističkoj etici, koja procenjuje načine postojanja prema njihovoj moći delovanja.

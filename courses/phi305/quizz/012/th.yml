question: ศีลธรรมสำหรับ Gilles Deleuze คืออะไร?
answer: ระบบการตัดสินระหว่างความดีและความชั่ว
wrong_answers:
  - โครงการทางศาสนา
  - ผลของกฎหมาย
  - หลักการที่ยั่งยืน
explanation: |
  สำหรับ Gilles Deleuze ศีลธรรมเป็นระบบการตัดสินที่จำแนกการกระทำออกเป็นดีและชั่วตามค่านิยมที่อยู่เหนือธรรมชาติ เขาเปรียบเทียบสิ่งนี้กับจริยศาสตร์ของสปิโนซา ซึ่งประเมินรูปแบบการดำรงอยู่ตามพลังในการกระทำของพวกเขา
reviewed: false
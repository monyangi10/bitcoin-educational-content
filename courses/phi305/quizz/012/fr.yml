question: Qu'est-ce que la morale pour Gilles Deleuze ?
answer: Un système de jugement entre le bien et le mal.
wrong_answers:
  - Une initiative religieuse.
  - Le résultat de la loi.
  - Un principe pérenne.
explanation: |
  Pour Gilles Deleuze, la morale est un système de jugement qui classe les actions entre le bien et le mal selon des valeurs transcendantes. Il oppose cela à l'éthique spinoziste qui évalue les modes d'existence selon leur puissance d'agir.

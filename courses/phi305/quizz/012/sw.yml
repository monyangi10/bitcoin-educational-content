question: Maadili ni nini kwa Gilles Deleuze?
answer: Mfumo wa hukumu kati ya wema na maadili.
wrong_answers:
  - Mpango wa kidini.
  - Matokeo ya sheria.
  - Kanuni ya kudumu.
explanation: |
  Kwa Gilles Deleuze, maadili ni mfumo wa hukumu unaoainisha matendo kuwa mema na mabaya kulingana na maadili yanayopita maumbile. Anatofautisha hili na maadili ya Spinozist, ambayo hutathmini njia za kuwepo kulingana na uwezo wao wa kutenda.

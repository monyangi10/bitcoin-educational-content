question: Какво е моралът за Жил Дельоз?
answer: Система за отсъждане между доброто и злото.
wrong_answers:
  - Религиозна инициатива.
  - Резултатът от закона.
  - Траен принцип.
explanation: |
  За Жил Дельоз моралът е система от съждения, която класифицира действията на добри и лоши според трансцендентни ценности. Той я противопоставя на спинозистката етика, която оценява начините на съществуване според тяхната способност да действат.

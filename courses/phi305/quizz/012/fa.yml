question: اخلاق برای ژیل دلوز چیست؟
answer: یک سیستم قضاوت بین خوب و اخلاقی.
wrong_answers:
  - یک ابتکار مذهبی.
  - نتیجه قانون.
  - یک اصل پایدار.
explanation: |
  برای ژیل دلوز، اخلاق یک سیستم قضاوت است که اعمال را بر اساس ارزش‌های متعالی به خوب و بد طبقه‌بندی می‌کند. او این را با اخلاق اسپینوزایی مقایسه می‌کند که حالت‌های وجود را بر اساس قدرت عمل آن‌ها ارزیابی می‌کند.

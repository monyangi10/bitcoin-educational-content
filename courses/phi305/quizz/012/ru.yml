question: Что такое мораль для Жиля Делёза?
answer: Система суждений между добром и моралью.
wrong_answers:
  - Религиозная инициатива.
  - Результат действия закона.
  - Неизменный принцип.
explanation: |
  Для Жиля Делеза мораль - это система суждений, которая классифицирует действия на добрые и злые в соответствии с трансцендентными ценностями. Он противопоставляет ее спинозистской этике, которая оценивает способы существования в соответствии с их способностью действовать.

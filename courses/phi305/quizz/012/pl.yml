question: Czym jest moralność dla Gillesa Deleuze'a?
answer: System oceny między dobrem a moralnością.
wrong_answers:
  - Inicjatywa religijna.
  - Wynik działania prawa.
  - Trwała zasada.
explanation: |
  Dla Gillesa Deleuze'a moralność jest systemem osądu, który klasyfikuje działania na dobre i złe zgodnie z transcendentnymi wartościami. Przeciwstawia to etyce Spinozistowskiej, która ocenia sposoby istnienia zgodnie z ich mocą do działania.
reviewed: false
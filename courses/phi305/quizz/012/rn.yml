question: None inyifato runtu kuri Gilles Deleuze ni iki?
answer: Urutonde rw’urubanza hagati y’ivyiza n’ivy’inyifato runtu.
wrong_answers:
  - Intumbero y’idini.
  - Ivyavuye mu itegeko.
  - Ingingo ngenderwako iramba.
explanation: |
  Ku bwa Gilles Deleuze, inyifato runtu ni urutonde rw’urubanza rushiramwo ibikorwa mu vyiza n’ibibi hakurikijwe ingingo ngenderwako zirengeye. Ivyo abigereranya n’inyifato runtu y’aba Spinoziste, iyo na yo ikaba isuzuma uburyo bwo kubaho bivanye n’ububasha bwayo bwo gukora.

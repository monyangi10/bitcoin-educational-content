question: Voltaire có ý gì khi nói đến "kẻ khét tiếng"?
answer: Mê tín.
wrong_answers:
  - Tôn giáo.
  - Tiền bạc.
  - Chế độ cũ.
explanation: |
  Đối với Voltaire, "l'infâme" có nghĩa là mê tín, đặc biệt là mê tín tôn giáo. Câu nói nổi tiếng của ông "Écrasez l'infâme!" nhắm vào mọi hình thức ngu dân và cuồng tín tôn giáo.
reviewed: false
question: None Voltaire ashaka kuvuga iki iyo avuze «abanyaruyeri»?
answer: Ukwemera ibinyoma.
wrong_answers:
  - Idini.
  - Amahera.
  - Intwaro ya kera.
explanation: |
  Kuri Voltaire, ‘l’infâme’ vyasobanura ukwemera ibinyoma, cane cane ukwemera ibinyoma kw’idini. Induru yiwe izwi cane yitwa 'Ecrasez l'infâme!' yari igamije ubwoko bwose bw’ubujuju n’ugushikama kw’idini.

question: What does Voltaire mean by "the infamous"?
answer: Superstition.
wrong_answers:
  - Religion.
  - Money.
  - The old regime.
explanation: |
  For Voltaire, 'l'infâme' meant superstition, especially religious superstition. His famous cry 'Écrasez l'infâme!' was aimed at all forms of obscurantism and religious fanaticism.
reviewed: false
question: Was meint Voltaire mit "das Berüchtigte"?
answer: Aberglaube.
wrong_answers:
  - Religion.
  - Geld.
  - Das alte Regime.
explanation: |
  Für Voltaire bedeutete "l'infâme" Aberglaube, insbesondere religiösen Aberglauben. Sein berühmter Ausruf "Écrasez l'infâme!" richtete sich gegen alle Formen von Obskurantismus und religiösem Fanatismus.
reviewed: false
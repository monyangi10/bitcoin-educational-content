question: Hva mener Voltaire med "de beryktede"?
answer: Overtro.
wrong_answers:
  - Religion.
  - Penger.
  - Det gamle regimet.
explanation: |
  For Voltaire betydde "l'infâme" overtro, særlig religiøs overtro. Hans berømte utrop "Écrasez l'infâme!" var rettet mot alle former for obskurantisme og religiøs fanatisme.
reviewed: false
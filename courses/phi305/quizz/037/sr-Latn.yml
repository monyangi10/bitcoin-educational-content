question: Šta Volter misli pod "onaj ozloglašeni"?
answer: Praznoverje.
wrong_answers:
  - Religija.
  - Novac.
  - Stari režim.
explanation: |
  Za Voltera, 'l'infâme' je značilo sujeverje, posebno religijsko sujeverje. Njegov čuveni uzvik 'Écrasez l'infâme!' bio je usmeren protiv svih oblika mračnjaštva i religijskog fanatizma.
reviewed: false
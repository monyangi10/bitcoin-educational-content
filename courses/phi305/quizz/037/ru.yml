question: Что Вольтер подразумевает под "позорным"?
answer: Суеверие.
wrong_answers:
  - Религия.
  - Деньги.
  - Старый режим.
explanation: |
  Для Вольтера "l'infâme" означало суеверие, особенно религиозное. Его знаменитый клич "Écrasez l'infâme!" был направлен против всех форм мракобесия и религиозного фанатизма.
reviewed: false
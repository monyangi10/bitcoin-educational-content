question: वॉल्टेयर का "कुख्यात" से क्या तात्पर्य है?
answer: अंधविश्वास.
wrong_answers:
  - धर्म।
  - धन।
  - पुरानी व्यवस्था.
explanation: |
  वोल्टेयर के लिए, 'l'infâme' का अर्थ अंधविश्वास था, खासकर धार्मिक अंधविश्वास। उनका प्रसिद्ध नारा 'Écrasez l'infâme!' सभी प्रकार के रूढ़िवाद और धार्मिक कट्टरतावाद पर लक्षित था।
reviewed: false
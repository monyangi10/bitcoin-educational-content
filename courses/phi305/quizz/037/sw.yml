question: Voltaire anamaanisha nini na "maarufu"?
answer: Ushirikina.
wrong_answers:
  - Dini.
  - Pesa.
  - Utawala wa zamani.
explanation: |
  Kwa Voltaire, 'l'infâme' ilimaanisha ushirikina, hasa ushirikina wa kidini. Kilio chake maarufu 'Écrasez l'infâme!' ililenga aina zote za upuuzi na ushupavu wa kidini.
reviewed: true

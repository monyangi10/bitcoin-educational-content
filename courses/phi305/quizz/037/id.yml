question: Apa yang dimaksud Voltaire dengan "yang terkenal"?
answer: Takhayul.
wrong_answers:
  - Agama.
  - Uang.
  - Rezim lama.
explanation: |
  Bagi Voltaire, 'l'infâme' berarti takhayul, terutama takhayul agama. Teriakannya yang terkenal 'Écrasez l'infâme!' ditujukan untuk semua bentuk obskurantisme dan fanatisme agama.
reviewed: false
question: O que é que Voltaire quer dizer com "o infame"?
answer: Superstição.
wrong_answers:
  - Religião.
  - Dinheiro.
  - O antigo regime.
explanation: |
  Para Voltaire, "l'infâme" significava superstição, especialmente superstição religiosa. O seu famoso grito "Écrasez l'infâme!" visava todas as formas de obscurantismo e fanatismo religioso.

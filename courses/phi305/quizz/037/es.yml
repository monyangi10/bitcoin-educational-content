question: ¿Qué entiende Voltaire por "lo infame"?
answer: Superstición.
wrong_answers:
  - Religión.
  - Dinero.
  - El antiguo régimen.
explanation: |
  Para Voltaire, "l'infâme" significaba superstición, especialmente superstición religiosa. Su famoso grito "Écrasez l'infâme!" iba dirigido a todas las formas de oscurantismo y fanatismo religioso.

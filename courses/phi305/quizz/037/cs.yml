question: Co myslí Voltaire slovem "nechvalně proslulý"?
answer: Pověry.
wrong_answers:
  - Náboženství.
  - Peníze.
  - Starý režim.
explanation: |
  Pro Voltaira "l'infâme" znamenalo pověru, zejména náboženskou. Jeho slavné zvolání "Écrasez l'infâme!" bylo namířeno proti všem formám tmářství a náboženského fanatismu.
reviewed: false
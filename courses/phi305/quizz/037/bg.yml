question: Какво има предвид Волтер под "позорно"?
answer: Суеверие.
wrong_answers:
  - Религия.
  - Пари.
  - Старият режим.
explanation: |
  За Волтер "l'infâme" означава суеверие, особено религиозно суеверие. Прочутият му вик "Écrasez l'infâme!" е насочен срещу всички форми на мракобесие и религиозен фанатизъм.
reviewed: false
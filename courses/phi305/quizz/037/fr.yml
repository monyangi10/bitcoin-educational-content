question: Qu'est-ce que « l'infâme » pour Voltaire ?
answer: La superstition.
wrong_answers:
- La religion.
- L'argent.
- L'ancien régime.
explanation: |
  Pour Voltaire, 'l'infâme' désigne la superstition, particulièrement religieuse. Son célèbre cri 'Écrasez l'infâme!' visait toutes les formes d'obscurantisme et de fanatisme religieux.

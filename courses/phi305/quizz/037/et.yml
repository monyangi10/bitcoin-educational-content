question: Mida tähendab Voltaire "kurikuulsa" all?
answer: Ebausk.
wrong_answers:
  - Religioon.
  - Raha.
  - Vana režiim.
explanation: |
  Voltaire'i jaoks tähendas "l'infâme" ebausku, eriti religioosset ebausku. Tema kuulus hüüd "Écrasez l'infâme!" oli suunatud igasuguse obskurantismi ja religioosse fanatismi vastu.
reviewed: false
question: Che cosa intende Voltaire con "l'infame"?
answer: Superstizione.
wrong_answers:
  - Religione.
  - Soldi.
  - Il vecchio regime.
explanation: |
  Per Voltaire, "l'infâme" significava superstizione, soprattutto religiosa. Il suo famoso grido "Écrasez l'infâme!" era rivolto a tutte le forme di oscurantismo e fanatismo religioso.
reviewed: false
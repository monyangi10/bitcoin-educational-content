question: Co Voltaire rozumie przez "niesławnych"?
answer: Przesąd.
wrong_answers:
  - Religia.
  - Pieniądze.
  - Stary reżim.
explanation: |
  Dla Voltaire'a "l'infâme" oznaczało przesąd, zwłaszcza przesąd religijny. Jego słynny okrzyk "Écrasez l'infâme!" był skierowany przeciwko wszelkim formom obskurantyzmu i fanatyzmu religijnego.
reviewed: false
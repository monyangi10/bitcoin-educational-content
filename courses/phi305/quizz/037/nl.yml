question: Wat bedoelt Voltaire met "het beruchte"?
answer: Bijgeloof.
wrong_answers:
  - Religie.
  - Geld.
  - Het oude regime.
explanation: |
  Voor Voltaire betekende 'l'infâme' bijgeloof, vooral religieus bijgeloof. Zijn beroemde kreet 'Écrasez l'infâme!' was gericht tegen alle vormen van obscurantisme en religieus fanatisme.
reviewed: false
question: Voltaire หมายถึงอะไรเมื่อพูดถึง "the infamous"?
answer: ไสยศาสตร์
wrong_answers:
  - ศาสนา
  - เงิน
  - ระบอบเก่า
explanation: |
  สำหรับโวลแตร์ 'l'infâme' หมายถึงความเชื่องมงาย โดยเฉพาะความเชื่องมงายทางศาสนา คำร้องอันโด่งดังของเขา 'Écrasez l'infâme!' มุ่งเป้าไปที่รูปแบบทั้งหมดของความมืดบอดและความคลั่งไคล้ทางศาสนา
reviewed: false
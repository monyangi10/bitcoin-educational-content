question: Je, Maadili yamechapishwa?
answer: Baada ya kifo.
wrong_answers:
  - Alipokuwa hai.
  - Ni mkusanyiko wa makala kwa vyombo vya habari.
  - Na mawasiliano ya mwandishi.
explanation: |
  Maadili, kazi kuu ya Spinoza, ilichapishwa baada ya kifo mnamo 1677, miezi michache baada ya kifo chake. Kazi hiyo ilikuwa na utata sana kuweza kuchapishwa wakati wa uhai wake bila kuhatarisha mateso.

question: Sách Đạo đức đã được xuất bản chưa?
answer: Sau khi mất.
wrong_answers:
  - Khi ông còn sống.
  - Là tập hợp các bài báo.
  - Có thư từ của tác giả.
explanation: |
  Đạo đức học, tác phẩm chính của Spinoza, được xuất bản sau khi ông qua đời vào năm 1677, vài tháng sau khi ông qua đời. Tác phẩm này quá gây tranh cãi nên không thể xuất bản khi ông còn sống mà không có nguy cơ bị bức hại.

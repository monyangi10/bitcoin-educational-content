question: क्या नैतिकता प्रकाशित हो चुकी है?
answer: मरणोपरांत।
wrong_answers:
  - जब वह जीवित था.
  - प्रेस लेखों का एक संग्रह है।
  - लेखक के पत्राचार के साथ.
explanation: |
  स्पिनोज़ा की प्रमुख कृति, "द एथिक्स", उनकी मृत्यु के कुछ महीने बाद, 1677 में, मरणोपरांत प्रकाशित हुई। यह कृति इतनी विवादास्पद थी कि उत्पीड़न का जोखिम उठाए बिना इसे उनके जीवनकाल में प्रकाशित करना संभव नहीं था।
reviewed: false
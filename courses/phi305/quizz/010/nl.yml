question: Is Ethics gepubliceerd?
answer: Postuum.
wrong_answers:
  - Toen hij nog leefde.
  - Is een verzameling persartikelen.
  - Met correspondentie van de auteur.
explanation: |
  De Ethica, Spinoza's belangrijkste werk, werd postuum gepubliceerd in 1677, een paar maanden na zijn dood. Het werk was te controversieel om tijdens zijn leven te publiceren zonder vervolging te riskeren.
reviewed: false
question: "Has Ethics been published?" ได้รับการตีพิมพ์หรือยัง?
answer: มรณกรรม
wrong_answers:
  - เมื่อเขายังมีชีวิตอยู่
  - เป็นการรวบรวมบทความข่าว
  - ด้วยการติดต่อสื่อสารของผู้เขียน
explanation: |
  The Ethics, ผลงานชิ้นเอกของสปิโนซา ถูกตีพิมพ์หลังจากที่เขาเสียชีวิตในปี 1677 เพียงไม่กี่เดือนหลังจากที่เขาเสียชีวิต ผลงานนี้มีความขัดแย้งมากเกินกว่าที่จะตีพิมพ์ในช่วงชีวิตของเขาโดยไม่เสี่ยงต่อการถูกข่มเหง
reviewed: false
question: Har Ethics publicerats?
answer: Postumt.
wrong_answers:
  - När han levde.
  - Är en samling av pressartiklar.
  - Med författarens korrespondens.
explanation: |
  Etiken, Spinozas viktigaste verk, publicerades postumt 1677, några månader efter hans död. Verket var för kontroversiellt för att publiceras under hans livstid utan att riskera förföljelse.
reviewed: false
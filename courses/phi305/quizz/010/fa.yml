question: آیا اخلاق منتشر شده است؟
answer: پس از مرگ.
wrong_answers:
  - وقتی که او زنده بود.
  - مجموعه‌ای از مقالات مطبوعاتی است.
  - با مکاتبات نویسنده.
explanation: |
  اخلاق، اثر اصلی اسپینوزا، پس از مرگ او در سال ۱۶۷۷ منتشر شد، چند ماه پس از مرگش. این اثر به قدری بحث‌برانگیز بود که در طول زندگی‌اش بدون خطر آزار و اذیت نمی‌توانست منتشر شود.
reviewed: false
question: Apakah Kode Etik telah diterbitkan?
answer: Anumerta.
wrong_answers:
  - Ketika dia masih hidup.
  - Merupakan kumpulan artikel pers.
  - Dengan korespondensi penulis.
explanation: |
  The Ethics, karya utama Spinoza, diterbitkan secara anumerta pada tahun 1677, beberapa bulan setelah kematiannya. Karya ini terlalu kontroversial untuk diterbitkan semasa hidupnya tanpa risiko penganiayaan.
reviewed: false
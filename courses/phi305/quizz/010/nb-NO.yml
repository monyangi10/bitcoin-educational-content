question: Har Ethics blitt publisert?
answer: Posthumt.
wrong_answers:
  - Da han var i live.
  - Er en samling av presseartikler.
  - Med forfatterens korrespondanse.
explanation: |
  Etikken, Spinozas hovedverk, ble utgitt posthumt i 1677, noen måneder etter hans død. Verket var for kontroversielt til å bli publisert mens han levde uten å risikere forfølgelse.

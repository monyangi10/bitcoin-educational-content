question: Wurde Ethics bereits veröffentlicht?
answer: Posthum.
wrong_answers:
  - Als er noch lebte.
  - Ist eine Sammlung von Presseartikeln.
  - Mit der Korrespondenz des Autors.
explanation: |
  Die Ethik, Spinozas Hauptwerk, wurde 1677, wenige Monate nach seinem Tod, posthum veröffentlicht. Das Werk war zu umstritten, um zu seinen Lebzeiten veröffentlicht zu werden, ohne Verfolgung zu riskieren.
reviewed: false
question: None igitabu Ethics carasohowe?
answer: Inyuma y’urupfu rwiwe.
wrong_answers:
  - Igihe yari akiriho.
  - Ni igitabu c’ingingo z’ibinyamakuru.
  - N’amakete y’umwanditsi.
explanation: |
  Igitabu citwa Ethics, kikaba ari co gitabu nyamukuru ca Spinoza, carasohowe inyuma y’urupfu rwiwe mu 1677, haciye amezi makeyi apfuye. Ico gitabu cari giteye impaka cane ku buryo kitashobora gusohorwa mu kiringo c’ubuzima bwiwe ata n’umwe yoba ariko aratotezwa.

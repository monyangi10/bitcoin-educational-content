question: Была ли опубликована книга "Этика"?
answer: Посмертно.
wrong_answers:
  - Когда он был жив.
  - Представляет собой сборник статей из прессы.
  - С перепиской автора.
explanation: |
  Этика", главный труд Спинозы, была опубликована посмертно в 1677 году, через несколько месяцев после его смерти. Это произведение было слишком спорным, чтобы опубликовать его при жизни, не рискуя подвергнуться преследованиям.
reviewed: false
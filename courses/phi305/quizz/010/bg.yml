question: Публикувана ли е "Етика"?
answer: Посмъртно.
wrong_answers:
  - Когато е бил жив.
  - Представлява колекция от статии в пресата.
  - С кореспонденцията на автора.
explanation: |
  Етиката, основното произведение на Спиноза, е публикувана посмъртно през 1677 г., няколко месеца след смъртта му. Трудът е твърде противоречив, за да бъде публикуван приживе на Спиноза, без да се рискува преследване.
reviewed: false
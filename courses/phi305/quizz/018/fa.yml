question: TTP در مورد چیست؟
answer: هدف به جدایی دین از دولت دارد.
wrong_answers:
  - یک حکومت دینی برقرار کنید.
  - دفاع از آنارشی.
  - فراخوان برای انقلاب.
explanation: |
  هدف اصلی رساله الهی-سیاسی جدا کردن دین از دولت است. در این رساله، اسپینوزا از این ایده دفاع می‌کند که دولت باید آزادی فلسفه‌ورزی را تضمین کند و دین نباید در امور سیاسی دخالت کند.
reviewed: false
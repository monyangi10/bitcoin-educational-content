question: Quel est le propos du TTP ?
answer: Vise à séparer la religion et l'État.
wrong_answers:
- Établir une théocratie.
- Défendre l'anarchie.
- Appeler à la révolution.
explanation: |
  Le Traité théologico-politique vise principalement à séparer la religion et l'État. Spinoza y défend l'idée que l'État doit garantir la liberté de philosopher et que la religion ne doit pas interférer dans les affaires politiques.
reviewed: false

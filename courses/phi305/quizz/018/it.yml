question: Che cos'è il TTP?
answer: Mira a separare religione e Stato.
wrong_answers:
  - Stabilire una teocrazia.
  - Difendere l'anarchia.
  - Chiamata alla rivoluzione.
explanation: |
  Lo scopo principale del Trattato teologico-politico è quello di separare la religione dallo Stato. In esso Spinoza difende l'idea che lo Stato debba garantire la libertà di filosofare e che la religione non debba interferire negli affari politici.

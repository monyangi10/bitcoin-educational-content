question: Какво представлява TTP?
answer: Разделяне на религията и държавата.
wrong_answers:
  - Установяване на теокрация.
  - В защита на анархията.
  - Призив за революция.
explanation: |
  Основната цел на "Богословско-политическия трактат" е да се разделят религията и държавата. В този труд Спиноза защитава идеята, че държавата трябва да гарантира свободата на философстването и че религията не трябва да се намесва в политическите дела.
reviewed: false
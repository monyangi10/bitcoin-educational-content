question: O čemu se radi u TTP-u?
answer: Cilj je razdvajanje religije i države.
wrong_answers:
  - Uspostaviti teokratiju.
  - Braneći anarhiju.
  - Poziv na revoluciju.
explanation: |
  Glavni cilj Teološko-političkog traktata je da razdvoji religiju i državu. U njemu, Spinoza brani ideju da država treba da garantuje slobodu filozofiranja, i da religija ne treba da se meša u političke poslove.

question: Что такое TTP?
answer: Стремится отделить религию от государства.
wrong_answers:
  - Установить теократию.
  - Защита анархии.
  - Призыв к революции.
explanation: |
  Главная цель "Богословско-политического трактата" - разделить религию и государство. В нем Спиноза отстаивает идею о том, что государство должно гарантировать свободу философствования, а религия не должна вмешиваться в политические дела.
reviewed: false
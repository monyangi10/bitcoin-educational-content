question: Waar gaat TTP over?
answer: Streeft naar een scheiding tussen religie en staat.
wrong_answers:
  - Een theocratie vestigen.
  - Anarchie verdedigen.
  - Oproep tot revolutie.
explanation: |
  Het belangrijkste doel van de Theologisch-Politieke Verhandeling is het scheiden van religie en staat. Hierin verdedigt Spinoza het idee dat de staat vrijheid van filosoferen moet garanderen en dat religie zich niet moet bemoeien met politieke zaken.
reviewed: false
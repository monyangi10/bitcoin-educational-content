question: ¿En qué consiste el TTP?
answer: Pretende separar religión y Estado.
wrong_answers:
  - Establecer una teocracia.
  - Defender la anarquía.
  - Llamamiento a la revolución.
explanation: |
  El objetivo principal del Tratado teológico-político es separar la religión y el Estado. En él, Spinoza defiende la idea de que el Estado debe garantizar la libertad de filosofar y que la religión no debe interferir en los asuntos políticos.

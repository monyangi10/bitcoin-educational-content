question: Was hat es mit TTP auf sich?
answer: Ziel ist die Trennung von Religion und Staat.
wrong_answers:
  - Errichten Sie eine Theokratie.
  - Die Anarchie verteidigen.
  - Aufruf zur Revolution.
explanation: |
  Das Hauptziel der Theologisch-politischen Abhandlung ist die Trennung von Religion und Staat. Darin verteidigt Spinoza die Idee, dass der Staat die Freiheit des Philosophierens garantieren sollte und dass sich die Religion nicht in politische Angelegenheiten einmischen sollte.
reviewed: false
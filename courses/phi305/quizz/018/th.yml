question: TTP คืออะไร?
answer: การแยกศาสนาออกจากรัฐ
wrong_answers:
  - การจัดตั้งเทวาธิปไตย
  - ปกป้องอนาธิปไตย
  - เรียกร้องให้เกิดการปฏิวัติ
explanation: |
  จุดมุ่งหมายหลักของ Theological-Political Treatise คือการแยกศาสนาออกจากรัฐ ในงานชิ้นนี้ สปิโนซาปกป้องแนวคิดที่ว่ารัฐควรรับประกันเสรีภาพในการคิดเชิงปรัชญา และศาสนาไม่ควรแทรกแซงในกิจการทางการเมือง
reviewed: false
question: None TTP ni iki?
answer: Igamije gutandukanya idini na Leta.
wrong_answers:
  - Gushinga tewokarasi.
  - Kugwanira ubutegetsi bw’agahomerabunwa.
  - Guhamagara ngo habeho ihinduka.
explanation: |
  Intumbero nyamukuru y’Igitabo c’Ivy’Imana n’Ivya Politike ni ugutandukanya idini na Leta. Muri ryo, Spinoza araburanira iciyumviro c’uko Leta ikwiye gutanga umwidegemvyo wo gukora filozofiya, kandi ko idini ridakwiye kwivanga mu vya politike.

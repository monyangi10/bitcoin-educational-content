question: टीटीपी क्या है?
answer: इसका उद्देश्य धर्म और राज्य को अलग करना है।
wrong_answers:
  - एक धर्मतंत्र की स्थापना करें.
  - अराजकता का बचाव करना.
  - क्रांति का आह्वान.
explanation: |
  धर्मशास्त्रीय-राजनीतिक ग्रंथ का मुख्य उद्देश्य धर्म और राज्य को अलग करना है। इसमें स्पिनोज़ा इस विचार का समर्थन करते हैं कि राज्य को दर्शनशास्त्र की स्वतंत्रता की गारंटी देनी चाहिए और धर्म को राजनीतिक मामलों में हस्तक्षेप नहीं करना चाहिए।
reviewed: false
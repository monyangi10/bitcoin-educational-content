question: Apa yang dimaksud dengan TTP?
answer: Bertujuan untuk memisahkan agama dan negara.
wrong_answers:
  - Membangun sebuah teokrasi.
  - Membela anarki.
  - Menyerukan revolusi.
explanation: |
  Tujuan utama Risalah Teologi-Politik adalah untuk memisahkan agama dan negara. Di dalamnya, Spinoza membela gagasan bahwa negara harus menjamin kebebasan berfilsafat, dan bahwa agama tidak boleh ikut campur dalam urusan politik.

question: Hva handler TTP om?
answer: Har som mål å skille religion og stat.
wrong_answers:
  - Etablere et teokrati.
  - Forsvarer anarkiet.
  - Oppfordring til revolusjon.
explanation: |
  Hovedformålet med Teologisk-politisk avhandling er å skille religion og stat. Her forsvarer Spinoza ideen om at staten skal garantere frihet til å filosofere, og at religionen ikke skal blande seg inn i politiske anliggender.
reviewed: false
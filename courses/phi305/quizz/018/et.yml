question: Mida kujutab endast TTP?
answer: Eesmärk on eraldada religioon ja riik.
wrong_answers:
  - Luua teokraatia.
  - Anarhia kaitsmine.
  - Üleskutse revolutsioonile.
explanation: |
  Teoloogilis-poliitilise traktaadi peamine eesmärk on religiooni ja riigi lahutamine. Selles kaitseb Spinoza ideed, et riik peaks tagama filosoofia vabaduse ja et religioon ei tohiks sekkuda poliitilistesse asjadesse.

question: What is TTP all about?
answer: Separating religion and state.
wrong_answers:
  - Establishing a theocracy.
  - Defending anarchy.
  - Calling for revolution.
explanation: |
  The main aim of the Theological-Political Treatise is to separate religion and the state. In this work, Spinoza defends the idea that the state should guarantee freedom of philosophizing, and that religion should not interfere in political affairs.

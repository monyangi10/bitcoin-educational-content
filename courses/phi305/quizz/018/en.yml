question: What is TTP all about?
answer: Aims to separate religion and state.
wrong_answers:
  - Establish a theocracy.
  - Defending anarchy.
  - Calling for revolution.
explanation: |
  The main aim of the Theological-Political Treatise is to separate religion and the state. In it, Spinoza defends the idea that the state should guarantee freedom of philosophizing, and that religion should not interfere in political affairs.
reviewed: false
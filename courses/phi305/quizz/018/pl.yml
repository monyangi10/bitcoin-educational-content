question: O co chodzi w TTP?
answer: Ma na celu oddzielenie religii od państwa.
wrong_answers:
  - Ustanowić teokrację.
  - Obrona anarchii.
  - Wezwanie do rewolucji.
explanation: |
  Głównym celem Traktatu teologiczno-politycznego jest oddzielenie religii od państwa. Spinoza broni w nim idei, że państwo powinno gwarantować wolność filozofowania, a religia nie powinna ingerować w sprawy polityczne.
reviewed: false
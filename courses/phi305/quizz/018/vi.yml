question: TTP là gì?
answer: Nhằm mục đích tách biệt tôn giáo và nhà nước.
wrong_answers:
  - Thiết lập một chế độ thần quyền.
  - Bảo vệ chủ nghĩa vô chính phủ.
  - Kêu gọi cách mạng.
explanation: |
  Mục đích chính của Luận thuyết Thần học - Chính trị là tách biệt tôn giáo với nhà nước. Trong đó, Spinoza bảo vệ quan điểm cho rằng nhà nước phải đảm bảo quyền tự do tư tưởng, và tôn giáo không nên can thiệp vào các vấn đề chính trị.

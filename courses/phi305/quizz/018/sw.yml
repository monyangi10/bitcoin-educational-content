question: TTP inahusu nini?
answer: Inalenga kutenganisha dini na serikali.
wrong_answers:
  - Kusimamisha theokrasi.
  - Kutetea machafuko.
  - Wito wa mapinduzi.
explanation: |
  Lengo kuu la Mkataba wa Kitheolojia na Kisiasa ni kutenganisha dini na serikali. Ndani yake, Spinoza anatetea wazo kwamba serikali inapaswa kuhakikisha uhuru wa falsafa, na kwamba dini haipaswi kuingilia masuala ya kisiasa.
reviewed: false

question: Vad handlar TTP om?
answer: Syftar till att skilja religion och stat åt.
wrong_answers:
  - Upprätta en teokrati.
  - Försvarar anarkin.
  - Uppmaning till revolution.
explanation: |
  Huvudsyftet med Theological-Political Treatise är att skilja religion och stat åt. I den försvarar Spinoza idén att staten ska garantera friheten att filosofera och att religionen inte ska blanda sig i politiska angelägenheter.
reviewed: false
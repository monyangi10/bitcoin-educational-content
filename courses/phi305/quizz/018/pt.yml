question: O que é o TTP?
answer: Tem por objetivo separar a religião do Estado.
wrong_answers:
  - Estabelecer uma teocracia.
  - Defender a anarquia.
  - Apelo à revolução.
explanation: |
  O principal objetivo do Tratado Teológico-Político é separar a religião do Estado. Nele, Spinoza defende a ideia de que o Estado deve garantir a liberdade de filosofar e que a religião não deve interferir nos assuntos políticos.

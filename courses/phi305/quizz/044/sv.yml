question: Vilket problem innebär förkastandet av den fria viljan och finalismen för vårt samhälle?
answer: Problemet med ansvar för ondska.
wrong_answers:
  - För att få män att bli fria.
  - Främja sekularism.
  - Att förhindra alla former av liberalism.
explanation: |
  Förkastandet av den fria viljan och finalismen ställer oss inför problemet med ansvaret för ondskan. Om allt är förutbestämt och utan slutgiltighet, hur kan vi då hålla människor ansvariga för sina handlingar? Detta är en stor etisk utmaning.
reviewed: false
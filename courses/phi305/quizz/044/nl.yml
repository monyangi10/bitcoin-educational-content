question: Welk probleem stelt de afwijzing van de vrije wil en het finalisme voor onze samenleving?
answer: Het probleem van verantwoordelijkheid voor het kwaad.
wrong_answers:
  - Om mannen aan te sporen vrij te zijn.
  - Het bevorderen van secularisme.
  - Alle vormen van liberalisme voorkomen.
explanation: |
  De afwijzing van de vrije wil en het finalisme stelt ons voor het probleem van de verantwoordelijkheid voor het kwaad. Als alles bepaald is en zonder finaliteit, hoe kunnen we mensen dan verantwoordelijk houden voor hun daden? Dit is een grote ethische uitdaging.
reviewed: false
question: Que problema coloca a rejeição do livre-arbítrio e do finalismo à nossa sociedade?
answer: O problema da responsabilidade pelo mal.
wrong_answers:
  - Para levar os homens a serem livres.
  - Promover o secularismo.
  - Impedir todas as formas de liberalismo.
explanation: |
  A rejeição do livre arbítrio e do finalismo coloca o problema da responsabilidade pelo mal. Se tudo está determinado e sem finalidade, como podemos responsabilizar as pessoas pelos seus actos? Se tudo está determinado e sem finalidade, como podemos responsabilizar as pessoas pelos seus actos? Este é um grande desafio ético.

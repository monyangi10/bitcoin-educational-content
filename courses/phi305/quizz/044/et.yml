question: Millise probleemi tekitab vaba tahte ja finalismi tagasilükkamine meie ühiskonnale?
answer: Vastutuse probleem kurjuse eest.
wrong_answers:
  - Et mehed oleksid vabad.
  - Maailmalikkuse edendamine.
  - Et vältida igasugust liberaalsust.
explanation: |
  Vaba tahte ja finalismi tagasilükkamine tekitab kurjuse eest vastutuse probleemi. Kui kõik on determineeritud ja ilma lõplikkuseta, siis kuidas saame inimesi nende tegude eest vastutavaks pidada? See on suur eetiline väljakutse.
reviewed: false
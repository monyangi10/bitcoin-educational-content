question: Hvilket problem utgjør avvisningen av fri vilje og finalisme for vårt samfunn?
answer: Problemet med ansvar for ondskap.
wrong_answers:
  - For å presse menn til å være frie.
  - Fremme sekularisme.
  - For å forhindre alle former for liberalisme.
explanation: |
  Forkastelsen av fri vilje og finalisme reiser problemet med ansvar for ondskap. Hvis alt er determinert og uten endelighet, hvordan kan vi da holde mennesker ansvarlige for sine handlinger? Dette er en stor etisk utfordring.
reviewed: false
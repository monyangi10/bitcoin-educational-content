question: چه مشکلی را رد اراده آزاد و غایت‌گرایی برای جامعه ما ایجاد می‌کند؟
answer: مشکل مسئولیت در قبال شر.
wrong_answers:
  - برای وادار کردن مردان به آزادی.
  - ترویج سکولاریسم.
  - برای جلوگیری از همه اشکال لیبرالیسم.
explanation: |
  رد نظریه اراده آزاد و غایت‌گرایی، مسئله مسئولیت در قبال شر را مطرح می‌کند. اگر همه چیز تعیین‌شده و بدون غایت باشد، چگونه می‌توانیم افراد را برای اعمالشان مسئول بدانیم؟ این یک چالش بزرگ اخلاقی است.
reviewed: false
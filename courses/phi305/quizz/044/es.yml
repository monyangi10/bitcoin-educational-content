question: ¿Qué problema plantea a nuestra sociedad el rechazo del libre albedrío y del finalismo?
answer: El problema de la responsabilidad por el mal.
wrong_answers:
  - Empujar a los hombres a ser libres.
  - Promover el laicismo.
  - Impedir toda forma de liberalismo.
explanation: |
  El rechazo del libre albedrío y del finalismo plantea el problema de la responsabilidad por el mal. Si todo está determinado y sin finalidad, ¿cómo podemos responsabilizar a las personas de sus actos? Se trata de un reto ético de primer orden.

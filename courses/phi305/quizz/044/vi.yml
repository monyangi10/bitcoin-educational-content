question: Việc bác bỏ ý chí tự do và chủ nghĩa duy vật gây ra vấn đề gì cho xã hội chúng ta?
answer: Vấn đề trách nhiệm đối với cái ác.
wrong_answers:
  - Để thúc đẩy con người được tự do.
  - Thúc đẩy chủ nghĩa thế tục.
  - Để ngăn chặn mọi hình thức của chủ nghĩa tự do.
explanation: |
  Việc phủ nhận ý chí tự do và chủ nghĩa duy tâm đặt ra vấn đề về trách nhiệm đối với cái ác. Nếu mọi thứ đều được định đoạt và không có tính chất cuối cùng, làm sao chúng ta có thể buộc mọi người phải chịu trách nhiệm về hành động của họ? Đây là một thách thức đạo đức lớn.

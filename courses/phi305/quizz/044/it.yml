question: Quale problema pone alla nostra società il rifiuto del libero arbitrio e del finalismo?
answer: Il problema della responsabilità del male.
wrong_answers:
  - Per spingere gli uomini a essere liberi.
  - Promuovere il secolarismo.
  - Impedire ogni forma di liberalismo.
explanation: |
  Il rifiuto del libero arbitrio e del finalismo pone il problema della responsabilità del male. Se tutto è determinato e senza finalità, come possiamo ritenere le persone responsabili delle loro azioni? Questa è una grande sfida etica.
reviewed: false
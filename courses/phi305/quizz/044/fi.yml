question: Minkä ongelman vapaan tahdon ja finalismin hylkääminen aiheuttaa yhteiskunnallemme?
answer: Pahuuden aiheuttaman vastuun ongelma.
wrong_answers:
  - Työnnetään miehiä olemaan vapaita.
  - Maallistumisen edistäminen.
  - Kaikenlaisen liberalismin estäminen.
explanation: |
  Vapaan tahdon ja finalismin hylkääminen aiheuttaa ongelman vastuusta pahasta. Jos kaikki on määrättyä ja vailla lopullisuutta, miten voimme pitää ihmisiä vastuullisina teoistaan? Tämä on suuri eettinen haaste.
reviewed: false
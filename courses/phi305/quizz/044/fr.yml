question: Quel problème le rejet du libre arbitre et du finalisme pose-t-il dans nos
  vies quotidiennes ?
answer: Le problème de la responsabilité du mal.
wrong_answers:
- De pousser les hommes à être libres.
- De Favoriser la laïcité.
- D'empêcher toute forme de libéralisme.
explanation: |
  Le rejet du libre arbitre et du finalisme pose le problème de la responsabilité du mal. Si tout est déterminé et sans finalité, comment tenir les hommes responsables de leurs actes ? C'est un défi éthique majeur.
reviewed: false

question: Jaký problém představuje odmítnutí svobodné vůle a finalismu pro naši společnost?
answer: Problém odpovědnosti za zlo.
wrong_answers:
  - Tlačit na muže, aby byli svobodní.
  - Podpora sekularismu.
  - Zabránit všem formám liberalismu.
explanation: |
  Odmítnutí svobodné vůle a finalismu přináší problém odpovědnosti za zlo. Pokud je vše determinováno a nemá konečnou platnost, jak můžeme činit lidi odpovědnými za jejich činy? To je hlavní etická výzva.
reviewed: false
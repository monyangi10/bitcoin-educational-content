question: Kakav problem odbacivanje slobodne volje i finalizma predstavlja za naše društvo?
answer: Problem odgovornosti za zlo.
wrong_answers:
  - Da nateraš muškarce da budu slobodni.
  - Promovisanje sekularizma.
  - Da se spreče svi oblici liberalizma.
explanation: |
  Odbacivanje slobodne volje i finalizma postavlja problem odgovornosti za zlo. Ako je sve determinisano i bez finalnosti, kako možemo smatrati ljude odgovornima za njihove postupke? Ovo je veliki etički izazov.

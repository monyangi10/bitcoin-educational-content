question: Какъв проблем създава отхвърлянето на свободната воля и финализма в ежедневието ни?
answer: Проблемът за отговорността за злото.
wrong_answers:
  - Да подтикнем мъжете да бъдат свободни.
  - Насърчаване на секуларизма.
  - Да предотврати всички форми на либерализъм.
explanation: |
  Отхвърлянето на свободната воля и финализма поставя проблема за отговорността за злото. Ако всичко е предопределено и няма окончателност, как можем да държим хората отговорни за техните действия? Това е голямо етично предизвикателство.
reviewed: false
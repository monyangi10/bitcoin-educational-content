question: Jaki problem stanowi odrzucenie wolnej woli i finalizmu dla naszego społeczeństwa?
answer: Problem odpowiedzialności za zło.
wrong_answers:
  - Aby zmusić ludzi do bycia wolnymi.
  - Promowanie sekularyzmu.
  - Aby zapobiec wszelkim formom liberalizmu.
explanation: |
  Odrzucenie wolnej woli i finalizmu stwarza problem odpowiedzialności za zło. Jeśli wszystko jest zdeterminowane i pozbawione ostateczności, jak możemy pociągać ludzi do odpowiedzialności za ich czyny? Jest to poważne wyzwanie etyczne.
reviewed: false
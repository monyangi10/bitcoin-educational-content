question: Masalah apa yang ditimbulkan oleh penolakan terhadap kehendak bebas dan finalisme bagi masyarakat kita?
answer: Masalah tanggung jawab atas kejahatan.
wrong_answers:
  - Untuk mendorong para pria untuk bebas.
  - Mempromosikan sekularisme.
  - Untuk mencegah segala bentuk liberalisme.
explanation: |
  Penolakan terhadap kehendak bebas dan finalisme menimbulkan masalah tanggung jawab atas kejahatan. Jika segala sesuatu telah ditentukan dan tanpa akhir, bagaimana kita dapat meminta pertanggungjawaban manusia atas tindakan mereka? Ini adalah tantangan etika yang besar.
reviewed: false
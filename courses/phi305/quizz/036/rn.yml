question: None Gilles Deleuze ni nde?
answer: Umwigisha wa filozofiya wo mu myaka ya 80, yize cane Spinoza.
wrong_answers:
  - Umunyapolitike.
  - Umuhinga mu vy’ubutunzi yidegemvya.
  - Umuhinguzi.
explanation: |
  Gilles Deleuze (1925-1995) yari umwigisha w’umufaransa mu vy’ubuhinga bwa filozofiya mu myaka ya 1980, akaba n’umuhinga mu vy’ubuhinga bwa Spinoza. Igitabo ciwe citwa Spinoza et le problème de l’expression (Spinoza n’ingorane y’uguserura) carasubiye gusoma neza Inyifato runtu.

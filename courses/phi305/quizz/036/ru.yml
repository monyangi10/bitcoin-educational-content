question: Кто такой Жиль Делёз?
answer: Преподаватель философии 80-х годов, специализирующийся на Спинозе.
wrong_answers:
  - Политик.
  - Либеральный экономист.
  - Изобретатель.
explanation: |
  Жиль Делез (1925-1995) - французский профессор философии 1980-х годов, известный специалист по Спинозе. Его книга "Спиноза и проблема выражения" (Spinoza et le problème de l'expression) обновила наше прочтение "Этики".
reviewed: false
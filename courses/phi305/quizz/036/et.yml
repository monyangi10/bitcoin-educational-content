question: Kes on Gilles Deleuze?
answer: 80ndate aastate filosoofiaõpetaja, kes on spetsialiseerunud Spinozale.
wrong_answers:
  - Poliitik.
  - Liberaalne majandusteadlane.
  - Leiutaja.
explanation: |
  Gilles Deleuze (1925-1995) oli 1980. aastatel prantsuse filosoofiaprofessor ja tuntud Spinoza-spetsialist. Tema raamat "Spinoza et le problème de l'expression" ("Spinoza ja väljendusprobleem") uuendas meie eetika lugemist.

question: Кой е Жил Дельоз?
answer: Преподавател по философия от 80-те години, специализирал в Спиноза.
wrong_answers:
  - Политик.
  - Либерален икономист.
  - Изобретател.
explanation: |
  Жил Дельоз (1925-1995) е френски професор по философия през 80-те години на ХХ век и известен специалист по Спиноза. Неговата книга Spinoza et le problème de l'expression (Спиноза и проблемът за изразяването) обнови прочита ни на Етиката.

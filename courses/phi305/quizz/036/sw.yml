question: Gilles Deleuze ni nani?
answer: Mwalimu wa falsafa kutoka miaka ya 80, aliyebobea katika Spinoza.
wrong_answers:
  - Mwanasiasa.
  - Mchumi huria.
  - Mvumbuzi.
explanation: |
  Gilles Deleuze (1925-1995) alikuwa profesa wa falsafa wa Ufaransa katika miaka ya 1980, na mtaalamu mashuhuri wa Spinoza. Kitabu chake Spinoza et le problème de l'expression (Spinoza na tatizo la kujieleza) kilifanya upya usomaji wetu wa Maadili.
reviewed: true

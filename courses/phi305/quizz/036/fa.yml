question: ژیل دلوز کیست؟
answer: یک معلم فلسفه از دهه ۸۰، متخصص در اسپینوزا.
wrong_answers:
  - یک سیاستمدار.
  - یک اقتصاددان لیبرال.
  - یک مخترع.
explanation: |
  ژیل دلوز (1925-1995) استاد فلسفه فرانسوی در دهه 1980 و متخصص برجسته اسپینوزا بود. کتاب او به نام اسپینوزا و مسئله بیان (Spinoza et le problème de l'expression) خوانش ما از اخلاق را نوسازی کرد.
reviewed: false
question: गिल्स डेल्यूज़ कौन है?
answer: 80 के दशक के एक दर्शनशास्त्र शिक्षक, स्पिनोज़ा में विशेषज्ञता।
wrong_answers:
  - एक राजनीतिज्ञ.
  - एक उदार अर्थशास्त्री.
  - एक आविष्कारक.
explanation: |
  गिल्स डेल्यूज़ (1925-1995) 1980 के दशक में दर्शनशास्त्र के एक फ्रांसीसी प्रोफेसर और एक प्रसिद्ध स्पिनोज़ा विशेषज्ञ थे। उनकी पुस्तक "स्पिनोज़ा एट ले प्रोब्लम डे ल'एक्सप्रेशन" (स्पिनोज़ा और अभिव्यक्ति की समस्या) ने नीतिशास्त्र के हमारे अध्ययन को नया आयाम दिया।
reviewed: false
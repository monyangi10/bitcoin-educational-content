question: กิลส์ เดอลอซ คือใคร?
answer: ครูสอนปรัชญาจากยุค 80s เชี่ยวชาญด้านสปิโนซา
wrong_answers:
  - นักการเมือง
  - นักเศรษฐศาสตร์เสรีนิยม
  - นักประดิษฐ์
explanation: |
  Gilles Deleuze (1925-1995) เป็นศาสตราจารย์ด้านปรัชญาชาวฝรั่งเศสในช่วงทศวรรษ 1980 และเป็นผู้เชี่ยวชาญด้านสปิโนซาที่มีชื่อเสียง หนังสือของเขา Spinoza et le problème de l'expression (Spinoza and the problem of expression) ได้สร้างความใหม่ในการอ่านจริยศาสตร์ของเรา
reviewed: false
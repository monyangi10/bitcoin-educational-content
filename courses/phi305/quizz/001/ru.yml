question: Является ли Спиноза философом?
answer: С 17 века.
wrong_answers:
  - С 16 века.
  - С 18 века.
  - Из древности.
explanation: |
  Спиноза жил с 1632 по 1677 год, что делает его философом XVII века. В этот период, известный как Век Разума, зародился современный рационализм и новые научные подходы к пониманию мира.

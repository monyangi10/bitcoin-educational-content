question: None Spinoza yoba ari umunyabwenge?
answer: Kuva mu kinjana ca 17.
wrong_answers:
  - Kuva mu kinjana ca 16.
  - Kuva mu kinjana ca 18.
  - Kuva kera cane.
explanation: |
  Spinoza yabayeho kuva mu 1632 gushika mu 1677, ivyo bikaba vyatumye aba umunyabwenge wo mu kinjana ca 17. Ico gihe, kizwi kw'izina ry'Ikinjana c'Iciyumviro, carabonye uguseruka kw'iciyumviro c'ubu n'uburyo bushasha bwa siyansi bwo gutahura isi.

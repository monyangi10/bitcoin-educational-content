question: От кой век е философът Спиноза?
answer: От XVII век.
wrong_answers:
  - От 16 век.
  - От XVIII век.
  - От древността.
explanation: |
  Спиноза е живял от 1632 до 1677 г., което го прави философ на XVII век. През този период, известен като Епохата на разума, се появяват модерният рационализъм и нови научни подходи към разбирането на света.

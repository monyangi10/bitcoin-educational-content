question: آیا اسپینوزا یک فیلسوف است؟
answer: از قرن هفدهم.
wrong_answers:
  - از قرن 16.
  - از قرن 18.
  - از دوران باستان.
explanation: |
  اسپینوزا از سال 1632 تا 1677 زندگی کرد و او را به عنوان یک فیلسوف قرن هفدهمی می‌شناسند. این دوره که به عنوان عصر خرد شناخته می‌شود، شاهد ظهور عقل‌گرایی مدرن و رویکردهای علمی جدید برای درک جهان بود.
reviewed: false
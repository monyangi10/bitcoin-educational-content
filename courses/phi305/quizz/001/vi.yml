question: Spinoza có phải là một triết gia không?
answer: Từ thế kỷ 17.
wrong_answers:
  - Từ thế kỷ 16.
  - Từ thế kỷ 18.
  - Từ thời cổ đại.
explanation: |
  Spinoza sống từ năm 1632 đến năm 1677, trở thành triết gia của thế kỷ 17. Giai đoạn này, được gọi là Thời đại lý trí, chứng kiến sự xuất hiện của chủ nghĩa duy lý hiện đại và các phương pháp khoa học mới để hiểu thế giới.

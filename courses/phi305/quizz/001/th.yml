question: สปิโนซาเป็นนักปรัชญาจากศตวรรษที่เท่าไร?
answer: จากศตวรรษที่ 17
wrong_answers:
  - จากศตวรรษที่ 16
  - จากศตวรรษที่ 18
  - จากสมัยโบราณ
explanation: |
  สปิโนซาอาศัยอยู่ตั้งแต่ปี 1632 ถึง 1677 ทำให้เขาเป็นนักปรัชญาในศตวรรษที่ 17 ช่วงเวลานี้รู้จักกันในชื่อ ยุคแห่งเหตุผล ซึ่งเป็นช่วงที่มีการเกิดขึ้นของเหตุผลนิยมสมัยใหม่และวิธีการทางวิทยาศาสตร์ใหม่ ๆ ในการทำความเข้าใจโลก
reviewed: false
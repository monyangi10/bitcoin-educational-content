question: क्या स्पिनोज़ा एक दार्शनिक हैं?
answer: 17वीं सदी से.
wrong_answers:
  - 16वीं शताब्दी से.
  - 18वीं सदी से.
  - प्राचीन काल से.
explanation: |
  स्पिनोज़ा 1632 से 1677 तक जीवित रहे, जिससे वे 17वीं सदी के एक दार्शनिक बन गए। तर्क युग के नाम से प्रसिद्ध इस काल में आधुनिक बुद्धिवाद और दुनिया को समझने के नए वैज्ञानिक दृष्टिकोणों का उदय हुआ।
reviewed: false
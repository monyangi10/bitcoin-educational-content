question: Apakah Spinoza adalah seorang filsuf?
answer: Dari abad ke-17.
wrong_answers:
  - Dari abad ke-16.
  - Dari abad ke-18.
  - Dari jaman dahulu.
explanation: |
  Spinoza hidup dari tahun 1632 hingga 1677, menjadikannya seorang filsuf abad ke-17. Periode ini, yang dikenal sebagai Zaman Akal, menyaksikan munculnya rasionalisme modern dan pendekatan ilmiah baru untuk memahami dunia.

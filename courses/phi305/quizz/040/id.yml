question: Apa yang dimaksud dengan filsafat skolastik?
answer: Sebuah filosofi Kristen dari Abad Pertengahan.
wrong_answers:
  - Sebuah gerakan politik.
  - Sebuah filosofi anarkis.
  - Filosofi yang rasional.
explanation: |
  Filsafat Skolastik adalah filsafat Kristen pada Abad Pertengahan yang mendominasi universitas-universitas di Eropa. Filsafat ini berusaha menyelaraskan iman Kristen dengan filsafat Aristoteles.

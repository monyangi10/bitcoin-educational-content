question: Какво представлява схоластичната философия?
answer: Християнска философия от Средновековието.
wrong_answers:
  - Политическо движение.
  - Анархистка философия.
  - Рационална философия.
explanation: |
  Схоластичната философия е християнска философия през Средновековието, която доминира в европейските университети. Тя се стреми да хармонизира християнската вяра с аристотеловата философия.
reviewed: false
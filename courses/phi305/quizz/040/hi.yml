question: शैक्षिक दर्शन क्या है?
answer: मध्य युग का एक ईसाई दर्शन.
wrong_answers:
  - एक राजनीतिक आंदोलन.
  - एक अराजकतावादी दर्शन.
  - एक तर्कसंगत दर्शन.
explanation: |
  स्कोलास्टिक दर्शन मध्य युग का एक ईसाई दर्शन था जिसका यूरोपीय विश्वविद्यालयों में बोलबाला था। इसने ईसाई धर्म को अरस्तू के दर्शन के साथ सामंजस्य बिठाने का प्रयास किया।

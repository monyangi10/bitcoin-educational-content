question: Что такое схоластическая философия?
answer: Христианская философия Средневековья.
wrong_answers:
  - Политическое движение.
  - Анархистская философия.
  - Рациональная философия.
explanation: |
  Схоластическая философия - это христианская философия Средневековья, которая доминировала в европейских университетах. Она стремилась согласовать христианскую веру с аристотелевской философией.

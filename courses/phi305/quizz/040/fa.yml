question: فلسفه اسکولاستیک چیست؟
answer: یک فلسفه مسیحی در قرون وسطی.
wrong_answers:
  - یک جنبش سیاسی.
  - یک فلسفه آنارشیستی.
  - یک فلسفه عقلانی.
explanation: |
  فلسفه اسکولاستیک یک فلسفه مسیحی در قرون وسطی بود که بر دانشگاه‌های اروپایی تسلط داشت. این فلسفه تلاش می‌کرد تا ایمان مسیحی را با فلسفه ارسطویی هماهنگ کند.
reviewed: false
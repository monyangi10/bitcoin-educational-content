question: ปรัชญาสโกลาเป็นอย่างไร?
answer: ปรัชญาคริสเตียนในยุคกลาง
wrong_answers:
  - ขบวนการทางการเมือง
  - ปรัชญาอนาธิปไตย
  - ปรัชญาเชิงเหตุผล
explanation: |
  ปรัชญาสโกลาเป็นปรัชญาคริสเตียนในยุคกลางที่ครอบงำมหาวิทยาลัยในยุโรป มันพยายามที่จะประสานความเชื่อคริสเตียนกับปรัชญาของอริสโตเติล
reviewed: false
question: Falsafa ya kielimu ni nini?
answer: Falsafa ya Kikristo ya Zama za Kati.
wrong_answers:
  - Harakati za kisiasa.
  - Falsafa ya anarchist.
  - Falsafa ya busara.
explanation: |
  Falsafa ya kielimu ilikuwa falsafa ya Kikristo ya Zama za Kati ambayo ilitawala vyuo vikuu vya Ulaya. Ilijaribu kupatanisha imani ya Kikristo na falsafa ya Aristotle.

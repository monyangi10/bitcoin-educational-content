question: Triết học kinh viện là gì?
answer: Một triết lý Kitô giáo thời Trung cổ.
wrong_answers:
  - Một phong trào chính trị.
  - Một triết lý vô chính phủ.
  - Một triết lý hợp lý.
explanation: |
  Triết học Kinh viện là một triết lý Kitô giáo thời Trung Cổ thống trị các trường đại học châu Âu. Triết lý này tìm cách dung hòa đức tin Kitô giáo với triết học Aristotle.
reviewed: false
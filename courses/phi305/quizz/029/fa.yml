question: آین رند کیست؟
answer: نویسنده "La Grève" و "La Source Vive".
wrong_answers:
  - همراه اسپینوزا.
  - سیاستمدار بریتانیایی.
  - یک نویسنده رمانتیک.
explanation: |
  آین رند (1905-1982) نویسنده‌ی کتاب‌های «اطلس شراگد» و «سرچشمه» است. او فلسفه‌ای به نام عینیت‌گرایی را توسعه داد که از فردگرایی عقلانی و سرمایه‌داری حمایت می‌کند.
reviewed: false
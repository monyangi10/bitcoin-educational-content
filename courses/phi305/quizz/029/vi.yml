question: Ayn Rand là ai?
answer: Tác giả của "La Grève" và "La Source Vive".
wrong_answers:
  - Người bạn đồng hành của Spinoza.
  - Chính trị gia người Anh.
  - Một tác giả lãng mạn.
explanation: |
  Ayn Rand (1905-1982) là tác giả của Atlas Shrugged và The Fountainhead. Bà đã phát triển một triết lý gọi là Chủ nghĩa Khách quan, ủng hộ chủ nghĩa cá nhân lý trí và chủ nghĩa tư bản.

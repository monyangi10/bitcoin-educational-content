question: Ayn Rand ni nani?
answer: Mwandishi wa "La Grève" na "La Source Vive".
wrong_answers:
  - Mshirika wa Spinoza.
  - Mwanasiasa wa Uingereza.
  - Mwandishi wa kimapenzi.
explanation: |
  Ayn Rand (1905-1982) ni mwandishi wa Atlas Shrugged na The Fountainhead. Alianzisha falsafa iitwayo Objectivism, ambayo inatetea ubinafsi wa kimantiki na ubepari.

question: Kuka on Ayn Rand?
answer: Kirjojen "La Grève" ja "La Source Vive" kirjoittaja.
wrong_answers:
  - Spinozan kumppani.
  - Brittiläinen poliitikko.
  - Romanttinen kirjailija.
explanation: |
  Ayn Rand (1905-1982) on Atlas Shruggedin ja The Fountainheadin kirjoittaja. Hän kehitti objektivismiksi kutsutun filosofian, jossa kannatetaan rationaalista individualismia ja kapitalismia.
reviewed: false
question: Кто такая Айн Рэнд?
answer: Автор книг "La Grève" и "La Source Vive".
wrong_answers:
  - Спутник Спинозы.
  - Британский политик.
  - Романтичный автор.
explanation: |
  Айн Рэнд (1905-1982) - автор книг "Атлант расправил плечи" и "Голова фонтана". Она разработала философию под названием "объективизм", которая выступает за рациональный индивидуализм и капитализм.
reviewed: false
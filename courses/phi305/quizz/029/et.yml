question: Kes on Ayn Rand?
answer: "La Grève" ja "La Source Vive" autor.
wrong_answers:
  - Spinoza kaaslane.
  - Briti poliitik.
  - Romantiline autor.
explanation: |
  Ayn Rand (1905-1982) on raamatute "Atlas Shrugged" ja "Fountainhead" autor. Ta töötas välja filosoofia nimega objektivism, mis propageerib ratsionaalset individualismi ja kapitalismi.
reviewed: false
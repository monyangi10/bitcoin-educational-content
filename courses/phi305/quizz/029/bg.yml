question: Коя е Айн Ранд?
answer: Автор на "Атлас изправи рамене" и "Изворът".
wrong_answers:
  - Спътник на Спиноза.
  - Британски политик.
  - Романтичен автор.
explanation: |
  Айн Ранд (1905-1982) е автор на "Атлас изправи рамене" и "Изворът". Тя разработва философия, наречена обективизъм, която защитава рационалния индивидуализъм и капитализма.

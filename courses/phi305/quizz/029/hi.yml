question: ऐन रैंड कौन है?
answer: ला ग्रेव और "ला सोर्स विवे" के लेखक।
wrong_answers:
  - स्पिनोज़ा का साथी.
  - ब्रिटिश राजनीतिज्ञ.
  - एक रोमांटिक लेखक.
explanation: |
  ऐन रैंड (1905-1982) एटलस श्रग्ड और द फाउंटेनहेड की लेखिका हैं। उन्होंने ऑब्जेक्टिविज़्म नामक एक दर्शन विकसित किया, जो तर्कसंगत व्यक्तिवाद और पूंजीवाद की वकालत करता है।

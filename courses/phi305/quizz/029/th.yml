question: ใครคือ Ayn Rand?
answer: ผู้เขียน "Atlas Shrugged" และ "The Fountainhead"
wrong_answers:
  - เพื่อนร่วมทางของสปิโนซา
  - นักการเมืองชาวอังกฤษ
  - นักเขียนแนวโรแมนติก
explanation: |
  อายน์ แรนด์ (1905-1982) เป็นผู้เขียนหนังสือ Atlas Shrugged และ The Fountainhead เธอพัฒนาปรัชญาที่เรียกว่า Objectivism ซึ่งสนับสนุนปัจเจกนิยมที่มีเหตุผลและระบบทุนนิยม
reviewed: false
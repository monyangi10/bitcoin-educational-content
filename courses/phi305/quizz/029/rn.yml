question: None Ayn Rand ni nde?
answer: Umwanditsi w'igitabu "La Grève" n'igitabu "Isoko ry'ubuzima".
wrong_answers:
  - Umugenzi wa Spinoza.
  - Umunyapolitike w’Umwongereza.
  - Umwanditsi w’urukundo.
explanation: |
  Ayn Rand (1905-1982) ni we yanditse igitabu citwa Atlas n’igitabu kivuga ngo Isoko. Yarateguye filozofiya yitwa Objectivisme, ivuga ko umuntu afise ivyiyumviro vy’umuntu ku giti ciwe n’ubutunzi.

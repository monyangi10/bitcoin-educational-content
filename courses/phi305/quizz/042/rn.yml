question: Ni nde yanditse ngo "Nta kintu kiba mu kamere gishobora guterwa n'umuntu .
answer: Sipinoza.
wrong_answers:
  - Dekarite.
  - Nyutoni.
  - Umweranda-Augusito.
explanation: |
  Spinoza ni we yanditse ati: «Nta kintu kiba mu kamere gishobora guterwa n’ikibi kirimwo». Iri jambo riserura iciyumviro c’uko kamere itunganye mu bwoko bwayo, kandi ko utunenge ari ingingo z’abantu gusa.
reviewed: false
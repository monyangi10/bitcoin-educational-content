question: किसने लिखा था "प्रकृति में ऐसा कुछ भी नहीं होता जिसे किसी प्राकृतिक आपदा के लिए जिम्मेदार ठहराया जा सके?"
answer: स्पिनोज़ा.
wrong_answers:
  - डेसकार्टेस.
  - न्यूटन.
  - सेंट-ऑगस्टिन.
explanation: |
  स्पिनोज़ा ने ही लिखा था: "प्रकृति में ऐसा कुछ भी नहीं होता जिसे उसमें मौजूद किसी दोष के कारण माना जा सके।" यह वाक्यांश इस विचार को व्यक्त करता है कि प्रकृति अपने स्वरूप में परिपूर्ण है, और दोष केवल मानवीय निर्णय हैं।
reviewed: false
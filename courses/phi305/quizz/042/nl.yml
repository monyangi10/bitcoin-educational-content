question: Wie schreef "Er gebeurt niets in de natuur dat kan worden toegeschreven aan een
answer: Spinoza.
wrong_answers:
  - Descartes.
  - Newton.
  - Saint-Augustin.
explanation: |
  Het was Spinoza die schreef: "Er gebeurt niets in de natuur dat kan worden toegeschreven aan een ondeugd die erin bestaat". Deze zin drukt het idee uit dat de natuur perfect is in haar soort en dat gebreken slechts menselijke oordelen zijn.

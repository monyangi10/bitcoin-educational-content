question: ใครเป็นผู้เขียน "Nothing happens in nature that can be attributed to a vice existing in it"?
answer: สปิโนซา
wrong_answers:
  - เดส์การ์ต
  - นิวตัน
  - แซงต์-โอกุสแตง
explanation: |
  สปิโนซาเป็นผู้เขียนว่า: "ไม่มีสิ่งใดเกิดขึ้นในธรรมชาติที่สามารถอ้างถึงความชั่วร้ายที่มีอยู่ในนั้น" วลีนี้แสดงถึงแนวคิดที่ว่าธรรมชาตินั้นสมบูรณ์แบบในแบบของมันเอง และข้อบกพร่องเป็นเพียงการตัดสินของมนุษย์เท่านั้น
reviewed: false
question: Кой е написал "Нищо не се случва в природата, което може да се обясни със съществуващ в нея порок"?
answer: Спиноза.
wrong_answers:
  - Декарт.
  - Нютон.
  - Сен-Огюстен.
explanation: |
  Спиноза пише: "В природата не се случва нищо, което може да се припише на съществуващ в нея порок". Тази фраза изразява идеята, че природата е съвършена в своя вид и че дефектите са само човешки съждения.
reviewed: false
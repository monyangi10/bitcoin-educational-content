question: چه کسی نوشت "هیچ چیز در طبیعت اتفاق نمی‌افتد که بتوان آن را به یک
answer: اسپینوزا.
wrong_answers:
  - دکارت.
  - نیوتن.
  - سن-اوگوستین.
explanation: |
  اسپینوزا بود که نوشت: "هیچ چیز در طبیعت اتفاق نمی‌افتد که بتوان آن را به یک نقص موجود در آن نسبت داد". این عبارت بیانگر این ایده است که طبیعت در نوع خود کامل است و نقص‌ها صرفاً قضاوت‌های انسانی هستند.
reviewed: false
question: Qui a écrit « Rien n'arrive dans la nature qui puisse être attribué à un
  vice existant en elle » ?
answer: Spinoza.
wrong_answers:
- Descartes.
- Newton.
- Saint-Augustin.
explanation: |
  C'est Spinoza qui a écrit 'Rien n'arrive dans la nature qui puisse être attribué à un vice existant en elle'. Cette phrase exprime l'idée que la nature est parfaite en son genre et que les défauts ne sont que des jugements humains.
reviewed: false

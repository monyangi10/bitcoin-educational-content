question: Кто написал В природе не происходит ничего, что можно было бы приписать
answer: Спиноза.
wrong_answers:
  - Декарт.
  - Ньютон.
  - Сен-Огюстен.
explanation: |
  Именно Спиноза написал: В природе не происходит ничего, что можно было бы отнести к существующему в ней пороку. Эта фраза выражает идею о том, что природа совершенна в своем роде, а недостатки - это всего лишь человеческие суждения.

question: Какво е богословската илюзия за Спиноза?
answer: Вярване в антропоморфен Бог, надарен с намерение.
wrong_answers:
  - Вярвайте в много богове.
  - Материализъм.
  - Вярване в призраци.
explanation: |
  За Спиноза богословската илюзия се състои във вярата в антропоморфен Бог, надарен с намерение. Това означава да се проектират върху Бога човешки характеристики като воля, желания и намерения.

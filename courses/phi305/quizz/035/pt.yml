question: O que é a ilusão teológica para Spinoza?
answer: A crença num Deus antropomórfico dotado de intenção.
wrong_answers:
  - Acreditar em muitos deuses.
  - Ser materialista.
  - Acreditar em fantasmas.
explanation: |
  Para Spinoza, a ilusão teológica consiste em acreditar num Deus antropomórfico dotado de intenção. Isto significa projetar em Deus caraterísticas humanas como a vontade, os desejos e as intenções.

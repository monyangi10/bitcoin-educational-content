question: Che cos'è l'illusione teologica per Spinoza?
answer: Credere in un Dio antropomorfo dotato di intenzionalità.
wrong_answers:
  - Credere in molti dei.
  - Essere materialisti.
  - Credere nei fantasmi.
explanation: |
  Per Spinoza, l'illusione teologica consiste nel credere in un Dio antropomorfo dotato di intenzionalità. Ciò significa proiettare su Dio caratteristiche umane come la volontà, i desideri e le intenzioni.

question: Co je pro Spinozu teologická iluze?
answer: Víra v antropomorfního Boha obdařeného záměrem.
wrong_answers:
  - Věřte v mnoho bohů.
  - Být materialistou.
  - Víra v duchy.
explanation: |
  Podle Spinozy spočívá teologická iluze ve víře v antropomorfního Boha obdařeného záměrem. To znamená promítnout do Boha lidské vlastnosti, jako jsou vůle, touhy a záměry.
reviewed: false
question: Ảo tưởng thần học của Spinoza là gì?
answer: Tin vào một vị thần có hình dạng con người và có ý định.
wrong_answers:
  - Tin vào nhiều vị thần.
  - Có tính duy vật.
  - Tin vào ma quỷ.
explanation: |
  Đối với Spinoza, ảo tưởng thần học nằm ở việc tin vào một vị thần nhân hình, được phú cho ý định. Điều này có nghĩa là gán cho Chúa những đặc điểm của con người như ý chí, khát vọng và ý định.

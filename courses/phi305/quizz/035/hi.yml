question: स्पिनोज़ा के लिए धार्मिक भ्रम क्या है?
answer: एक मानवरूपी ईश्वर में विश्वास करना जो उद्देश्य से संपन्न है।
wrong_answers:
  - अनेक देवताओं में विश्वास रखें।
  - भौतिकवादी होना.
  - भूत-प्रेत में विश्वास करना।
explanation: |
  स्पिनोज़ा के लिए, धार्मिक भ्रम एक मानवरूपी ईश्वर में विश्वास करने में निहित है जो उद्देश्य से संपन्न है। इसका अर्थ है ईश्वर पर इच्छा, आकांक्षाएँ और इरादे जैसे मानवीय गुणों को आरोपित करना।

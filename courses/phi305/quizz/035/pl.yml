question: Czym jest teologiczna iluzja dla Spinozy?
answer: Wiara w antropomorficznego Boga obdarzonego intencją.
wrong_answers:
  - Wierzyć w wielu bogów.
  - Bycie materialistą.
  - Wiara w duchy.
explanation: |
  Dla Spinozy teologiczna iluzja polega na wierze w antropomorficznego Boga obdarzonego intencją. Oznacza to rzutowanie na Boga ludzkich cech, takich jak wola, pragnienia i intencje.
reviewed: false
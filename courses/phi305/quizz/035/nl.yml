question: Wat is theologische illusie voor Spinoza?
answer: Geloven in een antropomorfe God begiftigd met intentie.
wrong_answers:
  - Geloof in vele goden.
  - Materialistisch zijn.
  - Geloven in geesten.
explanation: |
  Voor Spinoza bestaat de theologische illusie uit het geloof in een antropomorfe God die begiftigd is met intentie. Dit betekent dat op God menselijke eigenschappen zoals wil, verlangens en intenties worden geprojecteerd.

question: Mis on Spinoza jaoks teoloogiline illusioon?
answer: Uskumine antropomorfsesse Jumalasse, kellel on kavatsus.
wrong_answers:
  - Uskuge paljudesse jumalatesse.
  - Olles materialistlik.
  - Kummitustesse uskumine.
explanation: |
  Spinoza jaoks seisneb teoloogiline illusioon selles, et ta usub antropomorfsesse Jumalasse, kellel on kavatsus. See tähendab, et Jumalale projitseeritakse selliseid inimlikke omadusi nagu tahe, soovid ja kavatsused.
reviewed: false
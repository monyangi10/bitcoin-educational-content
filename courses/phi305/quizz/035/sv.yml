question: Vad är teologisk illusion för Spinoza?
answer: Att tro på en antropomorf gud som är utrustad med avsikt.
wrong_answers:
  - Tror på många gudar.
  - Att vara materialistisk.
  - Att tro på spöken.
explanation: |
  För Spinoza består den teologiska illusionen i att tro på en antropomorf gud som är utrustad med avsikt. Detta innebär att man projicerar mänskliga egenskaper som vilja, önskningar och avsikter på Gud.
reviewed: false
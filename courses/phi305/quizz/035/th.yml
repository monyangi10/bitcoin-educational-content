question: ภาพลวงตาทางเทววิทยาสำหรับสปิโนซาคืออะไร?
answer: เชื่อในพระเจ้าที่มีลักษณะเหมือนมนุษย์และมีเจตนา
wrong_answers:
  - เชื่อในพระเจ้าหลายองค์
  - การเป็นวัตถุนิยม
  - เชื่อในเรื่องผี.
explanation: |
  สำหรับสปิโนซา ภาพลวงตาทางเทววิทยาประกอบด้วยการเชื่อในพระเจ้าที่มีลักษณะเป็นมนุษย์และมีเจตนา ซึ่งหมายถึงการฉายลักษณะของมนุษย์ เช่น ความตั้งใจ ความปรารถนา และเจตนา ไปยังพระเจ้า
reviewed: false
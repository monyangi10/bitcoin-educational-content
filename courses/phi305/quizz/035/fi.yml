question: Mitä teologinen illuusio on Spinozalle?
answer: Usko antropomorfiseen Jumalaan, jolla on aikomus.
wrong_answers:
  - Usko moniin jumaliin.
  - Olla materialistinen.
  - Aaveisiin uskominen.
explanation: |
  Spinozalle teologinen harha on siinä, että hän uskoo antropomorfiseen Jumalaan, jolla on aikomus. Tämä tarkoittaa sitä, että Jumalaan projisoidaan inhimillisiä ominaisuuksia, kuten tahto, halut ja aikomukset.
reviewed: false
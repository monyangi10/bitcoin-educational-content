question: Qu'est-ce que l'illusion théologique pour Spinoza ?
answer: Croire en un Dieu anthropomorphe doué d'intention.
wrong_answers:
- Croire en plusieurs Dieux.
- Être matérialiste.
- Croire aux fantômes.
explanation: |
  L'illusion théologique pour Spinoza consiste à croire en un Dieu anthropomorphe doué d'intention. C'est projeter sur Dieu des caractéristiques humaines comme la volonté, les désirs, ou les intentions.

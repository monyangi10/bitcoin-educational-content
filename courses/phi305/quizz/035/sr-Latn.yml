question: Šta je teološka iluzija za Spinozu?
answer: Verovanje u antropomorfnog Boga obdarenog namerom.
wrong_answers:
  - Veruj u mnoge bogove.
  - Biti materijalistički.
  - Verovanje u duhove.
explanation: |
  Za Spinozu, teološka iluzija se sastoji u verovanju u antropomorfnog Boga obdarenog namerom. To znači projektovanje na Boga ljudskih karakteristika kao što su volja, želje i namere.

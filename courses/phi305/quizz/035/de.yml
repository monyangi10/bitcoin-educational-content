question: Was ist für Spinoza eine theologische Illusion?
answer: Der Glaube an einen anthropomorphen Gott, der mit einem Willen ausgestattet ist.
wrong_answers:
  - Glaube an viele Götter.
  - Materialistisch sein.
  - Der Glaube an Gespenster.
explanation: |
  Für Spinoza besteht die theologische Illusion darin, an einen anthropomorphen Gott zu glauben, der mit einem Willen ausgestattet ist. Das bedeutet, dass er menschliche Eigenschaften wie Wille, Wünsche und Absichten auf Gott projiziert.
reviewed: false
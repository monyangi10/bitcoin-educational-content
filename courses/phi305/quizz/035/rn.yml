question: None ukwihenda kw’ivy’idini kuri Spinoza ni iki?
answer: Kwemera Imana imeze nk’umuntu ihawe umugambi.
wrong_answers:
  - Nimwizere imana nyinshi.
  - Kuba umuntu akunda amaronko.
  - Kwemera imizimu.
explanation: |
  Ku bwa Spinoza, ukwihenda kw’ivy’idini ni ukwemera Imana imeze nk’umuntu ihawe umugambi. Ivyo bisigura gutera ku Mana ibiranga umuntu nk’ubushake, ivyipfuzo n’imigambi.

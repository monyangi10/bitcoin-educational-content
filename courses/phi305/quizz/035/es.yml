question: ¿Qué es la ilusión teológica para Spinoza?
answer: Creer en un Dios antropomórfico dotado de intención.
wrong_answers:
  - Cree en muchos dioses.
  - Ser materialista.
  - Creer en fantasmas.
explanation: |
  Para Spinoza, la ilusión teológica consiste en creer en un Dios antropomórfico dotado de intención. Esto significa proyectar en Dios características humanas como la voluntad, los deseos y las intenciones.

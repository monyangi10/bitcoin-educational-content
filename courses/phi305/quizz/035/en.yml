question: What is theological illusion for Spinoza?
answer: Believing in an anthropomorphic God endowed with intention.
wrong_answers:
  - Believe in many gods.
  - Being materialistic.
  - Believing in ghosts.
explanation: |
  For Spinoza, the theological illusion consists in believing in an anthropomorphic God endowed with intention. This means projecting onto God human characteristics such as will, desires and intentions.
reviewed: false
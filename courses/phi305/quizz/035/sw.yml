question: Ni udanganyifu gani wa kitheolojia kwa Spinoza?
answer: Kuamini katika anthropomorphic Mungu aliyejaliwa na nia.
wrong_answers:
  - Amini miungu mingi.
  - Kuwa na mali.
  - Kuamini katika mizimu.
explanation: |
  Kwa Spinoza, udanganyifu wa kitheolojia unajumuisha kuamini katika Mungu wa anthropomorphic aliyepewa nia. Hii ina maana ya kudhihirisha kwa Mungu tabia za kibinadamu kama vile mapenzi, matamanio na nia.
reviewed: true

question: Hva er teologisk illusjon for Spinoza?
answer: Å tro på en antropomorf Gud som er utstyrt med intensjoner.
wrong_answers:
  - Tro på mange guder.
  - Å være materialistisk.
  - Å tro på spøkelser.
explanation: |
  For Spinoza består den teologiske illusjonen i å tro på en antropomorf Gud som er utstyrt med intensjoner. Dette innebærer å projisere menneskelige egenskaper som vilje, begjær og intensjoner over på Gud.
reviewed: false
question: توهم الهیاتی برای اسپینوزا چیست؟
answer: باور به خدایی انسان‌وار که دارای نیت است.
wrong_answers:
  - به خدایان متعدد ایمان داشته باشید.
  - مادی‌گرا بودن.
  - باور به ارواح.
explanation: |
  برای اسپینوزا، توهم الهیاتی در باور به خدایی انسان‌وار با نیت نهفته است. این به معنای فرافکنی ویژگی‌های انسانی مانند اراده، خواسته‌ها و نیت‌ها به خدا است.
reviewed: false
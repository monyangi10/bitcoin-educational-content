question: Er naturen utstyrt med intensjon for Spinoza?
answer: Aldri.
wrong_answers:
  - Avhengig av perioden.
  - Avhengig av hvilket selskap det er snakk om.
  - Bare de religiøse kan avgjøre dette.
explanation: |
  For Spinoza er naturen aldri utstyrt med intensjon. Den handler i henhold til nødvendige og uforanderlige lover, uten mål eller hensikt. Å tillegge naturen intensjoner er en illusorisk antropomorf projeksjon.
reviewed: false
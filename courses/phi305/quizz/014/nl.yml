question: Is voor Spinoza de Natuur begiftigd met intentie?
answer: Nooit.
wrong_answers:
  - Afhankelijk van de periode.
  - Afhankelijk van het bedrijf in kwestie.
  - Alleen de religieuzen kunnen dit bepalen.
explanation: |
  Voor Spinoza is de Natuur nooit begiftigd met intentie. Ze handelt volgens noodzakelijke en onveranderlijke wetten, zonder doel of oogmerk. De natuur intenties toeschrijven is een illusoire antropomorfe projectie.
reviewed: false
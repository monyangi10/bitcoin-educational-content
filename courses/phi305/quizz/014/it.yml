question: Per Spinoza, la Natura è dotata di intenzione?
answer: Mai.
wrong_answers:
  - A seconda del periodo.
  - A seconda dell'azienda in questione.
  - Solo i religiosi possono stabilirlo.
explanation: |
  Per Spinoza, la Natura non è mai dotata di intenzione. Essa agisce secondo leggi necessarie e immutabili, senza scopo o finalità. Attribuire intenzioni alla Natura è una proiezione antropomorfa illusoria.
reviewed: false
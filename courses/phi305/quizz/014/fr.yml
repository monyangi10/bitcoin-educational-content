question: Pour Spinoza, la Nature est-elle douée d'intention ?
answer: Jamais.
wrong_answers:
- Selon les périodes.
- Selon les sociétés en question.
- Seuls les religieux peuvent le déterminer.
explanation: |
  Pour Spinoza, la Nature n'est jamais douée d'intention. Elle agit selon des lois nécessaires et immuables, sans but ni finalité. Attribuer des intentions à la Nature est une projection anthropomorphique illusoire.
reviewed: false

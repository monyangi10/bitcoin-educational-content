question: Je podle Spinozy příroda obdařena záměrem?
answer: Nikdy.
wrong_answers:
  - V závislosti na období.
  - V závislosti na dané společnosti.
  - To mohou určit pouze věřící.
explanation: |
  Podle Spinozy není příroda nikdy obdařena záměrem. Jedná podle nutných a neměnných zákonů, bez cíle a účelu. Přisuzovat přírodě záměry je iluzorní antropomorfní projekce.
reviewed: false
question: Para Spinoza, ¿está la Naturaleza dotada de intención?
answer: Nunca.
wrong_answers:
  - Según el periodo.
  - Según la empresa de que se trate.
  - Sólo los religiosos pueden determinarlo.
explanation: |
  Para Spinoza, la Naturaleza nunca está dotada de intención. Actúa según leyes necesarias e inmutables, sin objetivo ni finalidad. Atribuir intenciones a la Naturaleza es una proyección antropomórfica ilusoria.
reviewed: false
question: Para Spinoza, a Natureza é dotada de intenção?
answer: Nunca.
wrong_answers:
  - Dependendo do período.
  - Dependendo da empresa em causa.
  - Só os religiosos o podem determinar.
explanation: |
  Para Spinoza, a Natureza nunca é dotada de intenção. Ela age de acordo com leis necessárias e imutáveis, sem objetivo ou propósito. Atribuir intenções à Natureza é uma projeção antropomórfica ilusória.
reviewed: false
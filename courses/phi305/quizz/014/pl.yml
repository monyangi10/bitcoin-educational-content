question: Czy dla Spinozy Natura jest obdarzona intencją?
answer: Nigdy.
wrong_answers:
  - W zależności od okresu.
  - W zależności od danej firmy.
  - Tylko zakonnicy mogą to ustalić.
explanation: |
  Dla Spinozy Natura nigdy nie jest obdarzona intencją. Działa ona zgodnie z koniecznymi i niezmiennymi prawami, bez celu i przeznaczenia. Przypisywanie intencji Naturze jest iluzoryczną antropomorficzną projekcją.
reviewed: false
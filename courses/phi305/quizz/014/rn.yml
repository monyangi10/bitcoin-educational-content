question: Ku bwa Spinoza, Kamere yoba ihawe umugambi?
answer: Ntiyigera.
wrong_answers:
  - Bivanye n’igihe.
  - Bivanye n’ishirahamwe rivugwa.
  - Abanyadini bonyene ni bo bashobora kubimenya.
explanation: |
  Ku bwa Spinoza, Kamere ntiyigera ihabwa umugambi. Ikora yisunze amategeko akenewe kandi adahinduka, ata ntumbero canke intumbero. Gushira imigambi ku Kamere ni ikigereranyo c’umuntu c’ukwihenda.

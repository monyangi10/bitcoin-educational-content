question: Ist für Spinoza die Natur mit einer Absicht ausgestattet?
answer: Niemals.
wrong_answers:
  - Je nach Zeitraum.
  - Das hängt von dem jeweiligen Unternehmen ab.
  - Nur die Ordensleute können dies bestimmen.
explanation: |
  Für Spinoza ist die Natur niemals mit einer Absicht ausgestattet. Sie handelt nach notwendigen und unveränderlichen Gesetzen, ohne Ziel und Zweck. Der Natur Absichten zuzuschreiben, ist eine illusorische anthropomorphe Projektion.
reviewed: false
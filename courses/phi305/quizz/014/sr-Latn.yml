question: Da li je za Spinozu priroda obdarena namerom?
answer: Nikad.
wrong_answers:
  - U zavisnosti od perioda.
  - U zavisnosti od dotične kompanije.
  - Samo religiozni mogu ovo odrediti.
explanation: |
  Za Spinozu, Priroda nikada nije obdarena namerom. Dela u skladu sa neophodnim i nepromenljivim zakonima, bez cilja ili svrhe. Pripisivanje namera Prirodi je iluzorna antropomorfna projekcija.

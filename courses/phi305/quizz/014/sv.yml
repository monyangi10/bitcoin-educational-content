question: För Spinoza, är naturen utrustad med avsikt?
answer: Aldrig.
wrong_answers:
  - Beroende på period.
  - Beroende på vilket bolag det gäller.
  - Endast den religiösa kan avgöra detta.
explanation: |
  För Spinoza är naturen aldrig utrustad med avsikt. Den agerar i enlighet med nödvändiga och oföränderliga lagar, utan mål eller syfte. Att tillskriva naturen avsikter är en illusorisk antropomorf projektion.

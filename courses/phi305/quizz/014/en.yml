question: For Spinoza, is Nature endowed with intention?
answer: Never.
wrong_answers:
  - Depending on the period.
  - Depending on the company in question.
  - Only the religious can determine this.
explanation: |
  For Spinoza, Nature is never endowed with intention. It acts according to necessary and immutable laws, without goal or purpose. Ascribing intentions to Nature is an illusory anthropomorphic projection.
reviewed: false
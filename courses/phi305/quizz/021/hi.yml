question: रेने डेसकार्टेस?
answer: स्पिनोज़ा से पहले.
wrong_answers:
  - स्पिनोज़ा का उत्तराधिकारी है।
  - एक स्विस दार्शनिक हैं।
  - एक नास्तिक दार्शनिक है.
explanation: |
  रेने डेसकार्टेस (1596-1650) स्पिनोज़ा से पहले के थे और उन्हें आधुनिक बुद्धिवाद का जनक माना जाता है। स्पिनोज़ा डेसकार्टेस से प्रभावित थे, लेकिन उन्होंने एक ऐसी दार्शनिक प्रणाली विकसित की जो कार्टेशियनवाद से काफी अलग थी।

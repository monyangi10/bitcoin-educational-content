question: เรอเน เดการ์ต?
answer: มาก่อนสปิโนซา
wrong_answers:
  - เป็นทายาทของสปิโนซา
  - เป็นนักปรัชญาชาวสวิส
  - เป็นนักปรัชญาที่ไม่นับถือศาสนา
explanation: |
  René Descartes (1596-1650) มาก่อนสปิโนซาและถือเป็นบิดาแห่งเหตุผลนิยมสมัยใหม่ สปิโนซาได้รับอิทธิพลจากเดส์การ์ต แต่ได้พัฒนาระบบปรัชญาที่แตกต่างอย่างมากจากคาร์ทีเซียนิสม์
reviewed: false
question: René Descartes?
answer: Đứng trước Spinoza.
wrong_answers:
  - Là người thừa kế của Spinoza.
  - Là một triết gia người Thụy Sĩ.
  - Là một triết gia vô thần.
explanation: |
  René Descartes (1596-1650) sinh trước Spinoza và được coi là cha đẻ của chủ nghĩa duy lý hiện đại. Spinoza chịu ảnh hưởng của Descartes, nhưng đã phát triển một hệ thống triết học khác biệt đáng kể so với chủ nghĩa Descartes.

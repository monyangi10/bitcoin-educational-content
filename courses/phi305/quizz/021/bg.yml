question: Рене Декарт?
answer: Предхожда Спиноза.
wrong_answers:
  - Е наследник на Спиноза.
  - Е швейцарски философ.
  - Е философ атеист.
explanation: |
  Рене Декарт (1596-1650) предшества Спиноза и се смята за баща на съвременния рационализъм. Спиноза е повлиян от Декарт, но разработва философска система, която значително се отклонява от картезианството.

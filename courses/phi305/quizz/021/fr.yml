question: René Descartes ?
answer: Précède Spinoza.
wrong_answers:
- Est un héritier de Spinoza.
- Est un philosophe suisse.
- Est un philosophe athée.
explanation: |
  René Descartes (1596-1650) précède Spinoza et est considéré comme le père du rationalisme moderne. Spinoza a été influencé par Descartes mais a développé un système philosophique qui s'écarte significativement du cartésianisme.
reviewed: false

question: René Descartes?
answer: Eelneb Spinozale.
wrong_answers:
  - On Spinoza pärija.
  - On Šveitsi filosoof.
  - On ateistlik filosoof.
explanation: |
  René Descartes (1596-1650) on Spinoza eelkäija ja teda peetakse kaasaegse ratsionalismi isaks. Spinoza oli mõjutatud Descartes'ist, kuid töötas välja filosoofilise süsteemi, mis erines oluliselt kartesiaanlusest.
reviewed: false
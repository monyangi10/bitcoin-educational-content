question: رنه دکارت؟
answer: قبل از اسپینوزا.
wrong_answers:
  - وارث اسپینوزا است.
  - یک فیلسوف سوئیسی است.
  - یک فیلسوف بی‌خدا است.
explanation: |
  رنه دکارت (1596-1650) پیش از اسپینوزا بوده و به عنوان پدر عقل‌گرایی مدرن شناخته می‌شود. اسپینوزا تحت تأثیر دکارت بود، اما یک نظام فلسفی توسعه داد که به طور قابل توجهی از کارتسیانیسم فاصله گرفت.
reviewed: false
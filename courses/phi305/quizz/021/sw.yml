question: René Descartes?
answer: Inatangulia Spinoza.
wrong_answers:
  - Ni mrithi wa Spinoza.
  - Ni mwanafalsafa wa Uswizi.
  - Ni mwanafalsafa asiyeamini Mungu.
explanation: |
  René Descartes (1596-1650) alitangulia Spinoza na anachukuliwa kuwa baba wa mantiki ya kisasa. Spinoza iliathiriwa na Descartes, lakini ilianzisha mfumo wa falsafa ambao uliondoka kwa kiasi kikubwa kutoka kwa Cartesianism.
reviewed: false
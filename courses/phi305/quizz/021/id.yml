question: René Descartes?
answer: Mendahului Spinoza.
wrong_answers:
  - Merupakan ahli waris dari Spinoza.
  - Adalah seorang filsuf Swiss.
  - Adalah seorang filsuf ateis.
explanation: |
  René Descartes (1596-1650) mendahului Spinoza dan dianggap sebagai bapak rasionalisme modern. Spinoza dipengaruhi oleh Descartes, tetapi mengembangkan sistem filosofis yang sangat berbeda dari Cartesianisme.

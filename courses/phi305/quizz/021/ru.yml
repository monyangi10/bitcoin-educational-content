question: Рене Декарт?
answer: Предшествует Спинозе.
wrong_answers:
  - Является наследником Спинозы.
  - Швейцарский философ.
  - Философ-атеист.
explanation: |
  Рене Декарт (1596-1650) предшествовал Спинозе и считается отцом современного рационализма. Спиноза испытал влияние Декарта, но разработал философскую систему, значительно отличающуюся от картезианства.

question: René Dekasite?
answer: Ibanzirizwa na Spinoza.
wrong_answers:
  - Ni umuragwa wa Spinoza.
  - Ni umunyabwenge w’Umusuwisi.
  - Ni umunyabwenge w’umutemera Imana.
explanation: |
  René Descartes (1596-1650) ni we yabanjirije Spinoza kandi afatwa ko ari we sekuru w’ubuhinga bwo gutahura ibintu bwo muri iki gihe. Spinoza yakozweko na Descartes, ariko atera imbere uburyo bwa filozofiya bwatandukanye cane n’ubu Cartesianisme.

question: ใครกล่าวว่า "ความชั่วร้ายไม่มีอะไร"?
answer: โสเครตีส
wrong_answers:
  - ไลบ์นิซ
  - สปิโนซา
  - เดส์การ์ต
explanation: |
  "ความชั่วร้ายไม่มีอะไร" เป็นแนวคิดที่มอบให้กับโสเครตีสและถูกนำมาใช้ในประเพณีทางปรัชญา สำหรับโสเครตีส ความชั่วร้ายมาจากความไม่รู้; ไม่มีใครทำความชั่วร้ายโดยสมัครใจหากเขารู้จริงว่าอะไรคือสิ่งที่ดี
reviewed: false
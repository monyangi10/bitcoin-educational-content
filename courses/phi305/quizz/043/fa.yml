question: چه کسی گفت "شر چیزی نیست"؟
answer: سقراط.
wrong_answers:
  - لایب‌نیتز.
  - اسپینوزا.
  - دکارت.
explanation: |
  «شر چیزی نیست» ایده‌ای است که به سقراط نسبت داده می‌شود و در سنت فلسفی مورد توجه قرار گرفته است. برای سقراط، شر از نادانی ناشی می‌شود؛ هیچ‌کس به‌طور داوطلبانه شر انجام نمی‌دهد اگر واقعاً بداند چه چیزی خوب است.
reviewed: false
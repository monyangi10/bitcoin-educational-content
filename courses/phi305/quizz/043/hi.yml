question: किसने कहा था कि "बुराई कुछ भी नहीं है"?
answer: सुकरात.
wrong_answers:
  - लिबनिट्ज़.
  - स्पिनोज़ा.
  - डेसकार्टेस.
explanation: |
  "बुराई कुछ भी नहीं है" यह विचार सुकरात से लिया गया है और दार्शनिक परंपरा में अपनाया गया है। सुकरात के अनुसार, बुराई अज्ञानता से आती है; कोई भी व्यक्ति स्वेच्छा से बुराई नहीं करता है यदि वह वास्तव में जानता है कि अच्छाई क्या है।
reviewed: false
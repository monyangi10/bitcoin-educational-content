question: Кто сказал: "Зло - это ничто"?
answer: Сократ.
wrong_answers:
  - Лейбниц.
  - Спиноза.
  - Декарт.
explanation: |
  зло - это ничто" - идея, приписываемая Сократу и вошедшая в философскую традицию. По Сократу, зло происходит от незнания; никто не совершает зла добровольно, если он действительно знает, что такое добро.

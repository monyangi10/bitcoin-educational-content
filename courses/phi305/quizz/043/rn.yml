question: Ninde yavuze ngo "Ikibi ntaco kimaze"?
answer: Sokarate.
wrong_answers:
  - Leyibnitsi.
  - Sipinoza.
  - Dekarite.
explanation: |
  ikibi ntaco kimaze" ni iciyumviro kivugwa ko ari ica Socrate kandi gifatwa mu migenzo ya filozofiya. Kuri Socrate, ikibi kiva mu bujuju; nta n’umwe akora ikibi ku bushake iyo azi vy’ukuri iciza.

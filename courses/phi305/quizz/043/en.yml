question: Who said "Evil is nothing"?
answer: Socrates.
wrong_answers:
  - Leibnitz.
  - Spinoza.
  - Descartes.
explanation: |
  "Evil is nothing" is an idea attributed to Socrates and taken up in philosophical tradition. For Socrates, evil comes from ignorance; no one does evil voluntarily if he truly knows what is good.
reviewed: false
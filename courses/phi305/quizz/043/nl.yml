question: Wie zei "Het kwaad is niets"?
answer: Socrates.
wrong_answers:
  - Leibnitz.
  - Spinoza.
  - Descartes.
explanation: |
  het kwaad is niets" is een idee dat aan Socrates wordt toegeschreven en dat in de filosofische traditie is opgenomen. Voor Socrates komt het kwaad voort uit onwetendheid; niemand doet vrijwillig kwaad als hij echt weet wat goed is.

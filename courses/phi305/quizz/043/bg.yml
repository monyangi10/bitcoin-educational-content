question: Кой е казал, че "Злото е нищо"?
answer: Сократ.
wrong_answers:
  - Лайбниц.
  - Спиноза.
  - Декарт.
explanation: |
  "Злото е нищо" е идея, приписвана на Сократ и възприета във философската традиция. За Сократ злото идва от незнанието; никой не върши зло доброволно, ако наистина знае кое е добро.

question: Chủ nghĩa quyết định là gì?
answer: Đảo ngược nguyên nhân và kết quả để hiểu điều gì đó.
wrong_answers:
  - Một lý thuyết chính trị.
  - Một công thức nấu ăn.
  - Một nguyên lý của phân tâm học.
explanation: |
  Chủ nghĩa mục tiêu là sự đảo ngược nguyên nhân và kết quả để hiểu một điều gì đó. Nó giải thích một hiện tượng bằng mục đích được cho là của nó thay vì bằng nguyên nhân thực sự, điều mà Spinoza chỉ trích là một ảo tưởng.
reviewed: false
question: Какво е финализъм?
answer: Обръщане на причината и следствието, за да разберете нещо.
wrong_answers:
  - Политическа теория.
  - Рецепта за готвене.
  - Принцип на психоанализата.
explanation: |
  Финализмът е преобръщане на причината и следствието, за да се разбере нещо. Това е обяснение на дадено явление чрез предполагаемата му цел, а не чрез действителните му причини, което Спиноза критикува като илюзия.
reviewed: false
question: Qu'est-ce que le finalisme ?
answer: L'inversion des causes et des effets pour comprendre une chose.
wrong_answers:
- Une théorie politique.
- Une recette de cuisine.
- Un principe de psychanalyse.
explanation: |
  Le finalisme est l'inversion des causes et des effets pour comprendre une chose. C'est expliquer un phénomène par son but supposé plutôt que par ses causes réelles, ce que Spinoza critique comme une illusion.

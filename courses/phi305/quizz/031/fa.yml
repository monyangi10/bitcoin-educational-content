question: فینالیسم چیست؟
answer: معکوس کردن علت و معلول برای درک چیزی.
wrong_answers:
  - یک نظریه سیاسی.
  - یک دستور پخت غذا.
  - اصلی از روانکاوی.
explanation: |
  فینالیسم وارونگی علت و معلول به منظور درک چیزی است. این توضیح یک پدیده بر اساس هدف فرضی آن به جای علل واقعی آن است که اسپینوزا آن را به عنوان یک توهم نقد می‌کند.
reviewed: false
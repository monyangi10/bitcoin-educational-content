question: None finalisme ni iki?
answer: Guhindura imvo n’imvano kugira ngo umuntu atahure ikintu.
wrong_answers:
  - Iciyumviro ca politike.
  - Ivyo guteka.
  - Ingingo ngenderwako y’ugusesangura mu mutwe.
explanation: |
  Iherezo ni uguhindura imvo n’imvano kugira ngo umuntu atahure ikintu. Ni ugusigura ikintu biciye ku ntumbero yaco aho gusigura imvo nyazo zaco, ivyo Spinoza anegura ko ari ukwihenda.

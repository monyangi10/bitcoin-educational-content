question: Wat is finalisme?
answer: Oorzaak en gevolg omkeren om iets te begrijpen.
wrong_answers:
  - Een politieke theorie.
  - Een recept om te koken.
  - Een principe van psychoanalyse.
explanation: |
  Finalisme is het omkeren van oorzaak en gevolg om iets te begrijpen. Het verklaart een fenomeen aan de hand van het veronderstelde doel in plaats van aan de hand van de werkelijke oorzaken, wat Spinoza bekritiseert als een illusie.
reviewed: false
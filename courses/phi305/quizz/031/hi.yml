question: अंतिमवाद क्या है?
answer: किसी चीज़ को समझने के लिए कारण और प्रभाव को उलटना।
wrong_answers:
  - एक राजनीतिक सिद्धांत.
  - खाना पकाने की एक विधि.
  - मनोविश्लेषण का एक सिद्धांत.
explanation: |
  अंतिमवाद किसी चीज़ को समझने के लिए कारण और प्रभाव का उलटा प्रयोग है। यह किसी घटना को उसके वास्तविक कारणों के बजाय उसके कथित उद्देश्य से समझाता है, जिसकी स्पिनोज़ा एक भ्रम कहकर आलोचना करते हैं।

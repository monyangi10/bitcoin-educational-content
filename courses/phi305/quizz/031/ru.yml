question: Что такое финализм?
answer: Пересмотрите причину и следствие, чтобы понять что-то.
wrong_answers:
  - Политическая теория.
  - Рецепт приготовления.
  - Принцип психоанализа.
explanation: |
  Финализм - это инверсия причины и следствия для того, чтобы понять что-то. Это объяснение явления его предполагаемой целью, а не его действительными причинами, которые Спиноза критикует как иллюзию.

question: Apa yang dimaksud dengan finalisme?
answer: Membalikkan sebab dan akibat untuk memahami sesuatu.
wrong_answers:
  - Sebuah teori politik.
  - Resep untuk memasak.
  - Sebuah prinsip psikoanalisis.
explanation: |
  Finalisme adalah pembalikan sebab dan akibat untuk memahami sesuatu. Finalisme menjelaskan sebuah fenomena berdasarkan tujuan yang seharusnya, bukan berdasarkan penyebab aktualnya, yang dikritik oleh Spinoza sebagai ilusi.

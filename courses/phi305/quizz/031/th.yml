question: Finalism คืออะไร?
answer: การย้อนกลับสาเหตุและผลลัพธ์เพื่อทำความเข้าใจบางสิ่งบางอย่าง
wrong_answers:
  - ทฤษฎีการเมือง
  - สูตรการทำอาหาร
  - หลักการของจิตวิเคราะห์
explanation: |
  Finalism คือการกลับด้านของเหตุและผลเพื่อทำความเข้าใจบางสิ่ง มันคือการอธิบายปรากฏการณ์โดยวัตถุประสงค์ที่คาดคะเนไว้แทนที่จะเป็นสาเหตุที่แท้จริง ซึ่งสปิโนซาวิจารณ์ว่าเป็นภาพลวงตา
reviewed: false
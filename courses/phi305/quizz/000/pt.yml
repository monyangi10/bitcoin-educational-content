question: De que corrente filosófica é Spinoza um embaixador?
answer: Racionalismo.
wrong_answers:
  - O movimento romântico.
  - Escolástica.
  - Estruturalismo.
explanation: |
  Spinoza é considerado um dos maiores expoentes do racionalismo do século XVII, a par de Descartes e Leibniz. Desenvolveu uma filosofia baseada na razão e na lógica, procurando compreender o mundo através de princípios racionais e não através da fé ou da tradição.

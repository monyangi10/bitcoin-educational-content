question: स्पिनोज़ा किस दार्शनिक प्रवृत्ति के राजदूत हैं?
answer: बुद्धिवाद.
wrong_answers:
  - रोमांटिक आंदोलन.
  - विद्वत्तावाद.
  - संरचनावाद.
explanation: |
  स्पिनोज़ा को डेसकार्टेस और लाइबनिज़ के साथ, 17वीं सदी के बुद्धिवाद के सबसे महान प्रतिपादकों में से एक माना जाता है। उन्होंने तर्क और युक्ति पर आधारित एक दर्शन विकसित किया, जिसका उद्देश्य दुनिया को आस्था या परंपरा के बजाय तर्कसंगत सिद्धांतों के माध्यम से समझना था।
reviewed: false
question: Ni uwuhe murongo wa filozofiya Spinoza ari intumwa yawo?
answer: Ugushira mu ngiro.
wrong_answers:
  - Ishirahamwe ry’urukundo.
  - Ivy’inyigisho.
  - Ivy’imibumbe.
explanation: |
  Spinoza abonwa ko ari umwe mu bashigikiye cane inyigisho y’ugutahura ibintu mu kinjana ca 17, ari kumwe na Descartes na Leibniz. Yarateye imbere filozofiya ishingiye ku vyiyumviro n’ubwenge, arondera gutahura isi biciye ku ngingo ngenderwako zijanye n’ubwenge aho kwizera canke imigenzo.

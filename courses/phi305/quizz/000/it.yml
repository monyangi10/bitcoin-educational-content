question: Di quale corrente filosofica Spinoza è ambasciatore?
answer: Razionalismo.
wrong_answers:
  - Il movimento romantico.
  - Scolastica.
  - Strutturalismo.
explanation: |
  Spinoza è considerato uno dei maggiori esponenti del razionalismo del XVII secolo, insieme a Cartesio e Leibniz. Egli sviluppò una filosofia basata sulla ragione e sulla logica, cercando di comprendere il mondo attraverso principi razionali piuttosto che attraverso la fede o la tradizione.

question: Кое философско направление е посланик на Спиноза?
answer: Рационализъм.
wrong_answers:
  - Романтичното движение.
  - Схоластика.
  - Структурализъм.
explanation: |
  Спиноза е смятан за един от най-големите представители на рационализма през XVII век, наред с Декарт и Лайбниц. Той развива философия, основана на разума и логиката, като се стреми да разбере света чрез рационални принципи, а не чрез вяра или традиция.

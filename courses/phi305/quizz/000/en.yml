question: What philosophical trend is Spinoza an ambassador for?
answer: Rationalism.
wrong_answers:
  - The Romantic movement.
  - Scholasticism.
  - Structuralism.
explanation: |
  Spinoza is considered one of the greatest exponents of 17th-century rationalism, alongside Descartes and Leibniz. He developed a philosophy based on reason and logic, seeking to understand the world through rational principles rather than faith or tradition.

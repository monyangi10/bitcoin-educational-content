question: Voor welke filosofische stroming is Spinoza een ambassadeur?
answer: Rationalisme.
wrong_answers:
  - De Romantische beweging.
  - Scholastiek.
  - Structuralisme.
explanation: |
  Spinoza wordt beschouwd als een van de grootste exponenten van het 17e-eeuwse rationalisme, naast Descartes en Leibniz. Hij ontwikkelde een filosofie gebaseerd op rede en logica, waarbij hij de wereld probeerde te begrijpen door middel van rationele principes in plaats van geloof of traditie.

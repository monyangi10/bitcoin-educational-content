question: Spinoza hangi felsefi akımın elçisidir?
answer: Rasyonalizm.
wrong_answers:
  - Romantik akım.
  - Skolastisizm.
  - Yapısalcılık.
explanation: |
  Spinoza, Descartes ve Leibniz ile birlikte 17. yüzyıl rasyonalizminin en büyük temsilcilerinden biri olarak kabul edilir. Akıl ve mantığa dayalı bir felsefe geliştirmiş, dünyayı inanç ya da gelenek yerine rasyonel ilkeler aracılığıyla anlamaya çalışmıştır.

question: Представителем какого философского направления является Спиноза?
answer: Рационализм.
wrong_answers:
  - Романтическое движение.
  - Схоластика.
  - Структурализм.
explanation: |
  Спиноза считается одним из величайших представителей рационализма XVII века, наряду с Декартом и Лейбницем. Он разработал философию, основанную на разуме и логике, стремясь понять мир с помощью рациональных принципов, а не веры или традиций.

question: Für welche philosophische Strömung ist Spinoza ein Botschafter?
answer: Rationalismus.
wrong_answers:
  - Die romantische Bewegung.
  - Die Scholastik.
  - Strukturalismus.
explanation: |
  Spinoza gilt neben Descartes und Leibniz als einer der größten Vertreter des Rationalismus des 17. Jahrhunderts. Er entwickelte eine Philosophie, die sich auf Vernunft und Logik stützt und versucht, die Welt durch rationale Prinzipien und nicht durch Glauben oder Tradition zu verstehen.

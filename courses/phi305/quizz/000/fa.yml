question: اسپینوزا نماینده کدام گرایش فلسفی است؟
answer: عقل‌گرایی.
wrong_answers:
  - جنبش رمانتیک.
  - اسکولاستیک.
  - ساختارگرایی.
explanation: |
  اسپینوزا در کنار دکارت و لایبنیتس به عنوان یکی از بزرگ‌ترین نمایندگان عقل‌گرایی قرن هفدهم شناخته می‌شود. او فلسفه‌ای مبتنی بر عقل و منطق توسعه داد و به دنبال درک جهان از طریق اصول عقلانی به جای ایمان یا سنت بود.
reviewed: false
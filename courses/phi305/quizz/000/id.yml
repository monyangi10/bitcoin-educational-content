question: Tren filosofis apa yang menjadi duta besar Spinoza?
answer: Rasionalisme.
wrong_answers:
  - Gerakan Romantis.
  - Skolastisisme.
  - Strukturalisme.
explanation: |
  Spinoza dianggap sebagai salah satu eksponen terbesar rasionalisme abad ke-17, bersama Descartes dan Leibniz. Dia mengembangkan filsafat berdasarkan akal dan logika, berusaha memahami dunia melalui prinsip-prinsip rasional daripada iman atau tradisi.

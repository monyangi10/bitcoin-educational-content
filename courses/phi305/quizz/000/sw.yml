question: Spinoza ni balozi gani wa kifalsafa?
answer: Rationalism.
wrong_answers:
  - Harakati za kimapenzi.
  - Usomi.
  - Miundo.
explanation: |
  Spinoza inachukuliwa kuwa mmoja wa watetezi wakuu wa busara wa karne ya 17, pamoja na Descartes na Leibniz. Alianzisha falsafa yenye msingi wa akili na mantiki, akitafuta kuelewa ulimwengu kupitia kanuni za busara badala ya imani au mapokeo.

question: Hvilken filosofisk retning er Spinoza en ambassadør for?
answer: Rasjonalisme.
wrong_answers:
  - Den romantiske bevegelsen.
  - Skolastikken.
  - Strukturalisme.
explanation: |
  Spinoza regnes som en av de største eksponentene for 1600-tallets rasjonalisme, ved siden av Descartes og Leibniz. Han utviklet en filosofi basert på fornuft og logikk, og forsøkte å forstå verden gjennom rasjonelle prinsipper snarere enn gjennom tro eller tradisjon.
reviewed: false
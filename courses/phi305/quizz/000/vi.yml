question: Spinoza là đại sứ của xu hướng triết học nào?
answer: Chủ nghĩa duy lý.
wrong_answers:
  - Phong trào lãng mạn.
  - Chủ nghĩa kinh viện.
  - Chủ nghĩa cấu trúc.
explanation: |
  Spinoza được coi là một trong những người tiên phong vĩ đại nhất của chủ nghĩa duy lý thế kỷ 17, cùng với Descartes và Leibniz. Ông đã phát triển một triết lý dựa trên lý trí và logic, tìm cách hiểu thế giới thông qua các nguyên tắc lý tính hơn là đức tin hay truyền thống.
reviewed: false
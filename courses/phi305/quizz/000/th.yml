question: สปิโนซาเป็นทูตของแนวคิดปรัชญาใด?
answer: เหตุผลนิยม
wrong_answers:
  - ขบวนการโรแมนติก
  - สกอลาสติก (Scholasticism)
  - โครงสร้างนิยม
explanation: |
  สปิโนซาถือเป็นหนึ่งในผู้สนับสนุนที่ยิ่งใหญ่ที่สุดของลัทธิเหตุผลนิยมในศตวรรษที่ 17 ควบคู่ไปกับเดส์การ์ตและไลบ์นิซ เขาได้พัฒนาปรัชญาที่อิงตามเหตุผลและตรรกะ โดยมุ่งหวังที่จะเข้าใจโลกผ่านหลักการที่มีเหตุผลแทนที่จะเป็นความเชื่อหรือประเพณี
reviewed: false
question: Da li se koncept "mašina životinja" pripisuje?
answer: Dekart.
wrong_answers:
  - Spinoza.
  - Galileo.
  - Ajnštajn.
explanation: |
  Koncept mašina-životinja pripisuje se Dekartu. Prema ovoj teoriji, životinje su složeni automati bez duše ili svesti, koji funkcionišu isključivo na mehaničkim principima.
reviewed: false
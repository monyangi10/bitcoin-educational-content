question: Wordt het concept van "machinedieren" toegeschreven aan?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Galileo.
  - Einstein.
explanation: |
  Het concept van machinedieren wordt toegeschreven aan Descartes. Volgens deze theorie zijn dieren complexe automaten zonder ziel of bewustzijn, die uitsluitend werken volgens mechanische principes.

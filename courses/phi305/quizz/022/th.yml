question: แนวคิดเรื่อง "สัตว์จักรกล" ถูกยกให้เป็นของใคร?
answer: เดส์การ์ต
wrong_answers:
  - สปิโนซา
  - กาลิเลโอ
  - ไอน์สไตน์
explanation: |
  แนวคิดเรื่องสัตว์จักรกลนั้นมาจากเดส์การ์ต ตามทฤษฎีนี้ สัตว์เป็นเครื่องจักรที่ซับซ้อนซึ่งไม่มีวิญญาณหรือจิตสำนึก ทำงานโดยอาศัยหลักการทางกลเท่านั้น
reviewed: false
question: Tilskrives begrepet "maskindyr"?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Galileo.
  - Einstein.
explanation: |
  Begrepet maskindyr tilskrives Descartes. Ifølge denne teorien er dyr komplekse automater uten sjel eller bevissthet, som utelukkende fungerer etter mekaniske prinsipper.

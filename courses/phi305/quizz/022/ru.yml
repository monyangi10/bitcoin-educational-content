question: Приписывается ли концепция "машинных животных"?
answer: Декарт.
wrong_answers:
  - Спиноза.
  - Галилей.
  - Эйнштейн.
explanation: |
  Концепция машинных животных приписывается Декарту. Согласно этой теории, животные - это сложные автоматы без души и сознания, действующие исключительно по механическим принципам.

question: آیا مفهوم "حیوانات ماشینی" به چه کسی نسبت داده می‌شود؟
answer: دکارت.
wrong_answers:
  - اسپینوزا.
  - گالیله.
  - انیشتین.
explanation: |
  مفهوم حیوانات ماشینی به دکارت نسبت داده می‌شود. بر اساس این نظریه، حیوانات اتوماتون‌های پیچیده‌ای هستند که بدون روح یا آگاهی، صرفاً بر اساس اصول مکانیکی عمل می‌کنند.
reviewed: false
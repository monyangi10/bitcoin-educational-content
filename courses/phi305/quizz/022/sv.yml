question: Tillskrivs begreppet "maskindjur"?
answer: Descartes.
wrong_answers:
  - Spinoza.
  - Galileo.
  - Einstein.
explanation: |
  Begreppet maskindjur tillskrivs Descartes. Enligt denna teori är djuren komplexa automater utan själ eller medvetande, som enbart fungerar enligt mekaniska principer.

question: क्या "मशीन जानवरों" की अवधारणा को जिम्मेदार ठहराया गया है?
answer: डेसकार्टेस.
wrong_answers:
  - स्पिनोज़ा.
  - गैलीलियो.
  - आइंस्टीन.
explanation: |
  मशीनी जानवरों की अवधारणा का श्रेय डेसकार्टेस को दिया जाता है। इस सिद्धांत के अनुसार, जानवर जटिल स्वचालित मशीनें हैं जिनमें न तो आत्मा होती है और न ही चेतना, और वे पूरी तरह से यांत्रिक सिद्धांतों पर काम करते हैं।
reviewed: false
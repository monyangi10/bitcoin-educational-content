question: На кого се дължи понятието "животни-машини"?
answer: Декарт.
wrong_answers:
  - Спиноза.
  - Галилео.
  - Айнщайн.
explanation: |
  Концепцията за животните машини се приписва на Декарт. Според тази теория животните са сложни автомати без душа или съзнание, които работят единствено на механични принципи.
reviewed: false
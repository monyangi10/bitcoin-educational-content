question: क्या इमैनुएल कांट थे?
answer: ज्ञानोदय काल के एक जर्मन दार्शनिक।
wrong_answers:
  - एक अंग्रेजी दार्शनिक और न्यूटन के शिष्य
  - एक 17वीं सदी के दार्शनिक.
  - एक ईसाई दार्शनिक.
explanation: |
  इमैनुएल कांट (1724-1804) ज्ञानोदय काल के एक जर्मन दार्शनिक थे। उन्होंने एक आलोचनात्मक दर्शन विकसित किया जिसने आधुनिक चिंतन को गहराई से प्रभावित किया, विशेष रूप से उनकी कृति 'क्रिटिक ऑफ़ प्योर रीज़न' ने।
reviewed: false
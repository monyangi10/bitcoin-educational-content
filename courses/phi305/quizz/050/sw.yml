question: Je, Immanuel Kant?
answer: Mwanafalsafa wa Kijerumani wa Mwangaza.
wrong_answers:
  - Mwanafalsafa wa Kiingereza na mwanafunzi wa Newton
  - Mwanafalsafa wa karne ya 17.
  - Mwanafalsafa Mkristo.
explanation: |
  Immanuel Kant (1724-1804) alikuwa mwanafalsafa wa Kijerumani wa Kutaalamika. Alikuza falsafa ya uhakiki ambayo iliathiri sana mawazo ya kisasa, haswa na 'Ukosoaji wa Sababu Safi'.
reviewed: true

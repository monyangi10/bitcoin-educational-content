question: อิมมานูเอล คานท์ คือใคร?
answer: นักปรัชญาชาวเยอรมันในยุคแห่งการรู้แจ้ง
wrong_answers:
  - นักปรัชญาชาวอังกฤษและศิษย์ของนิวตัน
  - นักปรัชญาศตวรรษที่ 17
  - นักปรัชญาคริสเตียน
explanation: |
  อิมมานูเอล คานท์ (1724-1804) เป็นนักปรัชญาชาวเยอรมันในยุคเรืองปัญญา เขาได้พัฒนาปรัชญาวิพากษ์ที่มีอิทธิพลอย่างลึกซึ้งต่อความคิดสมัยใหม่ โดยเฉพาะอย่างยิ่งกับผลงาน 'Critique of Pure Reason' ของเขา
reviewed: false
question: Var Immanuel Kant?
answer: En tysk opplysningsfilosof.
wrong_answers:
  - En engelsk filosof og disippel av Newton
  - En filosof fra 1600-tallet.
  - En kristen filosof.
explanation: |
  Immanuel Kant (1724-1804) var en tysk opplysningsfilosof. Han utviklet en kritisk filosofi som fikk stor innflytelse på moderne tenkning, særlig med sin "Kritikk av den rene fornuft".
reviewed: false
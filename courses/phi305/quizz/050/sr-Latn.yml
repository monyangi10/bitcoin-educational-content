question: Bio je nemački filozof iz doba prosvetiteljstva, poznat po svom radu u epistemologiji, etici i logici.
answer: Nemački filozof prosvetiteljstva.
wrong_answers:
  - Engleski filozof i učenik Njutna
  - Filozof iz 17. veka.
  - Hrišćanski filozof.
explanation: |
  Immanuel Kant (1724-1804) bio je nemački filozof prosvetiteljstva. Razvio je kritičku filozofiju koja je duboko uticala na moderno mišljenje, naročito sa svojim 'Kritikom čistog uma'.
reviewed: false
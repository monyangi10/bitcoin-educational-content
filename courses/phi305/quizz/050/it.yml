question: Immanuel Kant?
answer: Filosofo tedesco dell'Illuminismo.
wrong_answers:
  - Filosofo inglese e discepolo di Newton
  - Filosofo del XVII secolo.
  - Un filosofo cristiano.
explanation: |
  Immanuel Kant (1724-1804) è stato un filosofo tedesco dell'Illuminismo. Sviluppò una filosofia critica che influenzò profondamente il pensiero moderno, in particolare con la sua "Critica della ragion pura".
reviewed: false
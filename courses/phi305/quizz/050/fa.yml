question: ایمانوئل کانت که بود؟
answer: یک فیلسوف آلمانی از دوران روشنگری.
wrong_answers:
  - یک فیلسوف انگلیسی و شاگرد نیوتن
  - یک فیلسوف قرن هفدهمی.
  - یک فیلسوف مسیحی.
explanation: |
  ایمانوئل کانت (1724-1804) فیلسوف آلمانی عصر روشنگری بود. او فلسفه‌ای انتقادی توسعه داد که به طور عمیقی بر تفکر مدرن تأثیر گذاشت، به ویژه با اثر 'نقد عقل محض' خود.
reviewed: false
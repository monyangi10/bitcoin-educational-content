question: Кой е бил Имануел Кант?
answer: Немски философ от епохата на Просвещението.
wrong_answers:
  - Английски философ и ученик на Нютон
  - Философ от XVII век.
  - Християнски философ.
explanation: |
  Имануел Кант (1724-1804) е немски философ от епохата на Просвещението. Той разработва критична философия, която оказва огромно влияние върху съвременната мисъл, особено с неговата "Критика на чистия разум".
reviewed: false
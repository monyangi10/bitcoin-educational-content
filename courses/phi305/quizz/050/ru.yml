question: Был ли Иммануил Кант?
answer: Немецкий философ эпохи Просвещения.
wrong_answers:
  - Английский философ и ученик Ньютона
  - Философ XVII века.
  - Христианский философ.
explanation: |
  Иммануил Кант (1724-1804) - немецкий философ эпохи Просвещения. Он разработал критическую философию, которая оказала глубокое влияние на современную мысль, в частности, его "Критику чистого разума".
reviewed: false
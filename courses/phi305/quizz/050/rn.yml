question: None Imanuweli yari Kant?
answer: Umunyabwenge w’Umudagi wo mu gihe c’Umuco.
wrong_answers:
  - Umunyabwenge w’Umwongereza akaba n’umwigishwa wa Newton .
  - Umunyabwenge wo mu kinjana ca 17.
  - Umunyabwenge w’umukirisu.
explanation: |
  Immanuel Kant (1724-1804) yari umunyabwenge w'umudagi wo mu gihe c'umuco. Yateguye ubuhinga bwo kunegura bwagize ico bukoze cane ku vyiyumviro vya none, cane cane mu 'Critique of Pure Reason' yiwe.

question: С написанием ТТП, Спиноза?
answer: Изобретатель секуляризма.
wrong_answers:
  - Сторонник планирования.
  - Защитник просвещенной диктатуры.
  - Защитник конституционной монархии.
explanation: |
  Благодаря своему "Трактату о теологии и политике" Спиноза может считаться изобретателем современного секуляризма. В нем он отстаивал разделение религиозной и политической власти - революционную идею того времени.
reviewed: false
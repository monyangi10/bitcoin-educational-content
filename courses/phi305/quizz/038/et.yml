question: TTP kirjutamisega on Spinoza?
answer: Sekularismi leiutaja.
wrong_answers:
  - Planeerimise pooldaja.
  - Valgustatud diktatuuri kaitsja.
  - Konstitutsioonilise monarhia kaitsja.
explanation: |
  Spinozat võib pidada oma "Traktaadiga teoloogiast ja poliitikast" kaasaegse sekularismi leiutajaks. Selles kaitses ta usulise ja poliitilise võimu lahusust, mis oli tol ajal revolutsiooniline idee.
reviewed: false
question: การเขียน TTP ทำให้สปิโนซาเป็นอย่างไร?
answer: นักประดิษฐ์ของลัทธิฆราวาสนิยม
wrong_answers:
  - ผู้สนับสนุนการวางแผน
  - ผู้ปกป้องเผด็จการที่มีการตรัสรู้
  - ผู้พิทักษ์ระบอบราชาธิปไตยภายใต้รัฐธรรมนูญ
explanation: |
  ด้วยผลงาน "Treatise on Theology and Politics" ของเขา สปิโนซาสามารถถือได้ว่าเป็นผู้คิดค้นแนวคิดทางโลกสมัยใหม่ ในงานนี้ เขาได้ปกป้องการแยกอำนาจทางศาสนาและการเมือง ซึ่งเป็นแนวคิดที่ปฏิวัติวงการในเวลานั้น
reviewed: false
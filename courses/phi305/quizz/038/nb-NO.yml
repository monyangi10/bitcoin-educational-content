question: Er Spinoza med skrivingen av TTP?
answer: Oppfinneren av sekularismen.
wrong_answers:
  - En forkjemper for planlegging.
  - Forsvareren av det opplyste diktaturet.
  - Forsvareren av det konstitusjonelle monarkiet.
explanation: |
  Med sin Avhandling om teologi og politikk kan Spinoza regnes som oppfinneren av den moderne sekularismen. Her forsvarte han skillet mellom religiøs og politisk makt, en revolusjonerende idé på den tiden.
reviewed: false
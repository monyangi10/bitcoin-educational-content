question: Con la redacción del TTP, ¿es Spinoza?
answer: El inventor del laicismo.
wrong_answers:
  - Defensor de la planificación.
  - El defensor de la dictadura ilustrada.
  - El defensor de la monarquía constitucional.
explanation: |
  Con su Tratado de Teología y Política, Spinoza puede considerarse el inventor del laicismo moderno. En él defendía la separación del poder religioso y político, una idea revolucionaria en la época.

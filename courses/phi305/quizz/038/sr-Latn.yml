question: Sa pisanjem TTP-a, da li je Spinoza?
answer: Pronalazač sekularizma.
wrong_answers:
  - Zagovornik planiranja.
  - Branilac prosvetljene diktature.
  - Branilac ustavne monarhije.
explanation: |
  Sa svojim Traktatom o teologiji i politici, Spinoza se može smatrati izumiteljem modernog sekularizma. U njemu je branio odvajanje religijske i političke moći, što je bila revolucionarna ideja u to vreme.

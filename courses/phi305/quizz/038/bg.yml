question: Какво прави Спиноза автор на ТТП?
answer: Изобретателят на секуларизма.
wrong_answers:
  - Привърженик на планирането.
  - Защитник на просветената диктатура.
  - Защитник на конституционната монархия.
explanation: |
  Със своя "Трактат по теология и политика" Спиноза може да се смята за създател на съвременния секуларизъм. В него той защитава разделянето на религиозната и политическата власт - революционна идея по онова време.
reviewed: false
question: Ist Spinoza mit dem Schreiben der TTP?
answer: Der Erfinder des Säkularismus.
wrong_answers:
  - Ein Verfechter der Planung.
  - Der Verfechter der aufgeklärten Diktatur.
  - Der Verfechter der konstitutionellen Monarchie.
explanation: |
  Mit seiner Abhandlung über Theologie und Politik kann Spinoza als Erfinder des modernen Säkularismus angesehen werden. Darin verteidigte er die Trennung von religiöser und politischer Macht, eine für die damalige Zeit revolutionäre Idee.
reviewed: false
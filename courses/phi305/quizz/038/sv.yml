question: Med skrivandet av TTP, är Spinoza?
answer: Sekularismens uppfinnare.
wrong_answers:
  - En förespråkare av planering.
  - Förespråkare för upplyst diktatur.
  - Försvarare av den konstitutionella monarkin.
explanation: |
  Med sin Avhandling om teologi och politik kan Spinoza betraktas som den moderna sekularismens uppfinnare. I den försvarade han åtskillnaden mellan religiös och politisk makt, en revolutionerande idé på den tiden.
reviewed: false
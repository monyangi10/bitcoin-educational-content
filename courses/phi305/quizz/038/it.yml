question: Con la stesura del TTP, Spinoza?
answer: L'inventore del secolarismo.
wrong_answers:
  - Un sostenitore della pianificazione.
  - Il difensore della dittatura illuminata.
  - Il difensore della monarchia costituzionale.
explanation: |
  Con il suo Trattato di teologia e politica, Spinoza può essere considerato l'inventore del secolarismo moderno. In esso difendeva la separazione tra potere religioso e politico, un'idea rivoluzionaria per l'epoca.
reviewed: false
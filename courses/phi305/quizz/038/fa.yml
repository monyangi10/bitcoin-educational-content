question: با نوشتن TTP، آیا اسپینوزا؟
answer: مخترع سکولاریسم.
wrong_answers:
  - طرفدار برنامه‌ریزی.
  - مدافع دیکتاتوری روشنفکرانه.
  - مدافع سلطنت مشروطه.
explanation: |
  با رساله خود در مورد الهیات و سیاست، اسپینوزا می‌تواند به عنوان مخترع سکولاریسم مدرن در نظر گرفته شود. در آن، او از جدایی قدرت دینی و سیاسی دفاع کرد، ایده‌ای انقلابی در آن زمان.
reviewed: false
question: टीटीपी के लेखन के साथ, स्पिनोज़ा है?
answer: धर्मनिरपेक्षता के आविष्कारक.
wrong_answers:
  - नियोजन का समर्थक.
  - प्रबुद्ध तानाशाही के रक्षक।
  - संवैधानिक राजतंत्र के रक्षक।
explanation: |
  स्पिनोज़ा को उनके धर्मशास्त्र और राजनीति पर ग्रंथ के साथ आधुनिक धर्मनिरपेक्षता का आविष्कारक माना जा सकता है। इसमें उन्होंने धार्मिक और राजनीतिक सत्ता के पृथक्करण का समर्थन किया, जो उस समय एक क्रांतिकारी विचार था।
reviewed: false
question: Với việc viết TTP, Spinoza có phải là người như vậy không?
answer: Người phát minh ra chủ nghĩa thế tục.
wrong_answers:
  - Người ủng hộ việc lập kế hoạch.
  - Người bảo vệ chế độ độc tài khai sáng.
  - Người bảo vệ chế độ quân chủ lập hiến.
explanation: |
  Với tác phẩm "Luận thuyết về Thần học và Chính trị", Spinoza có thể được coi là người phát minh ra chủ nghĩa thế tục hiện đại. Trong tác phẩm này, ông bảo vệ sự tách biệt giữa quyền lực tôn giáo và chính trị, một tư tưởng mang tính cách mạng vào thời điểm đó.
reviewed: false
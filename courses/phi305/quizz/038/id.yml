question: Dengan penulisan TTP, apakah Spinoza?
answer: Penemu sekularisme.
wrong_answers:
  - Seorang pendukung perencanaan.
  - Pembela kediktatoran yang tercerahkan.
  - Pembela monarki konstitusional.
explanation: |
  Dengan Risalah Teologi dan Politiknya, Spinoza dapat dianggap sebagai penemu sekularisme modern. Di dalamnya, ia membela pemisahan kekuasaan agama dan politik, sebuah ide revolusioner pada saat itu.
reviewed: false
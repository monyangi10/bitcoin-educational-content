question: What does the writing of the TTP make Spinoza?
answer: The inventor of secularism.
wrong_answers:
  - An advocate of planning.
  - The defender of enlightened dictatorship.
  - The defender of constitutional monarchy.
explanation: |
  With his Treatise on Theology and Politics, Spinoza can be considered the inventor of modern secularism. In it, he defended the separation of religious and political power, a revolutionary idea at the time.
reviewed: false
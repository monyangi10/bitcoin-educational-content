question: Com a redação do TTP, será Spinoza?
answer: O inventor do laicismo.
wrong_answers:
  - Um defensor do planeamento.
  - O defensor da ditadura esclarecida.
  - O defensor da monarquia constitucional.
explanation: |
  Com o seu Tratado de Teologia e Política, Spinoza pode ser considerado o inventor do laicismo moderno. Nele, defende a separação entre o poder religioso e o poder político, uma ideia revolucionária para a época.
reviewed: false
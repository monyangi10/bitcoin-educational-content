question: N’ukwandika TTP, mbega Spinoza?
answer: Uwahinguye ubusekuriki.
wrong_answers:
  - Umuvugizi w’ugutegura.
  - Uwuburanira ubutegetsi bw’igitugu bumurikiwe.
  - Uwuburanira ubutegetsi bw’umwami bushingiye kw’itegeko nshinga.
explanation: |
  Spinoza arashobora kubonwa ko ari we yatanguje ivy’idini vyo muri iki gihe, akoresheje igitabu ciwe citwa Traité sur la théologie et la politique. Muri ryo, yaraburaniye ugutandukanya ububasha bw’idini n’ubwa politike, ico kikaba cari iciyumviro c’ihinduka ry’ibintu ico gihe.

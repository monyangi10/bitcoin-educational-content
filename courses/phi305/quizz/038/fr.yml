question: Avec la rédaction du TTP, Spinoza est-il ?
answer: L'inventeur de la laïcité.
wrong_answers:
- Le défenseur de la planification.
- Le défenseur de la dictature éclairée .
- Le défenseur de la monarchie constitutionnelle.
explanation: |
  Avec le Traité théologico-politique, Spinoza peut être considéré comme l'inventeur de la laïcité moderne. Il y défend la séparation du pouvoir religieux et du pouvoir politique, une idée révolutionnaire pour l'époque.
reviewed: false

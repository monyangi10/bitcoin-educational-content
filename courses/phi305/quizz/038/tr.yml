question: TTP'nin yazılmasıyla Spinoza?
answer: Laikliğin mucidi.
wrong_answers:
  - Bir planlama savunucusu.
  - Aydınlanmış diktatörlüğün savunucusu.
  - Anayasal monarşinin savunucusu.
explanation: |
  Spinoza, Teoloji ve Politika Üzerine İnceleme adlı eseriyle modern sekülerizmin mucidi olarak kabul edilebilir. Bu eserinde, o dönemde devrimci bir fikir olan dini ve siyasi gücün ayrılmasını savunmuştur.

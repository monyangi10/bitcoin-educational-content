question: Czy wraz z napisaniem TTP, Spinoza?
answer: Wynalazca sekularyzmu.
wrong_answers:
  - Zwolennik planowania.
  - Obrońca oświeconej dyktatury.
  - Obrońca monarchii konstytucyjnej.
explanation: |
  Dzięki Traktatowi o teologii i polityce Spinozę można uznać za wynalazcę nowoczesnego sekularyzmu. Bronił w nim rozdziału władzy religijnej i politycznej, co w tamtych czasach było ideą rewolucyjną.
reviewed: false
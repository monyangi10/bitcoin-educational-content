question: Is Spinoza met het schrijven van de TTP?
answer: De uitvinder van het secularisme.
wrong_answers:
  - Een voorstander van planning.
  - De verdediger van de verlichte dictatuur.
  - De verdediger van de constitutionele monarchie.
explanation: |
  Met zijn Verhandeling over Theologie en Politiek kan Spinoza worden beschouwd als de uitvinder van het moderne secularisme. Hierin verdedigde hij de scheiding van religieuze en politieke macht, een revolutionair idee in die tijd.
reviewed: false
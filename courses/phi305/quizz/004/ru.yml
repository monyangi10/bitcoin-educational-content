question: О чем идет речь в "Богословско-политическом трактате"?
answer: Свобода мысли и убеждений.
wrong_answers:
  - Чтобы продемонстрировать.
  - Приготовление пищи.
  - Ведение бизнеса.
explanation: |
  В "Богословско-политическом трактате", опубликованном анонимно в 1670 году, защищается свобода мысли и вероисповедания. В нем Спиноза утверждает, что свобода философствовать необходима для благополучия государства и совместима с религиозным благочестием.
reviewed: false
question: Waar gaat de Theologisch-Politieke Verhandeling over?
answer: Vrijheid van denken en geloven.
wrong_answers:
  - Aantonen.
  - Koken.
  - Zaken doen.
explanation: |
  Theological-Political Treatise, anoniem gepubliceerd in 1670, verdedigt de vrijheid van denken en geloven. Hierin stelt Spinoza dat vrijheid om te filosoferen essentieel is voor het welzijn van de staat en verenigbaar met religieuze vroomheid.
reviewed: false
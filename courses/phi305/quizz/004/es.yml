question: ¿De qué trata el Tratado teológico-político?
answer: Libertad de pensamiento y creencia.
wrong_answers:
  - Para demostrarlo.
  - Cocinar.
  - Hacer negocios.
explanation: |
  El Tratado teológico-político, publicado anónimamente en 1670, defiende la libertad de pensamiento y de creencia. En él, Spinoza sostiene que la libertad de filosofar es esencial para el bienestar del Estado y compatible con la piedad religiosa.

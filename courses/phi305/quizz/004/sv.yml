question: Vad handlar den teologisk-politiska avhandlingen om?
answer: Tanke- och trosfrihet.
wrong_answers:
  - För att demonstrera.
  - Matlagning.
  - Att göra affärer.
explanation: |
  The Theological-Political Treatise, som publicerades anonymt 1670, försvarar tanke- och trosfrihet. Spinoza argumenterar för att friheten att filosofera är nödvändig för statens välfärd och förenlig med religiös fromhet.
reviewed: false
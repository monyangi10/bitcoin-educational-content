question: Čime se bavi Teološko-politički traktat?
answer: Sloboda misli i verovanja.
wrong_answers:
  - Da demonstriraš.
  - Kuvanje.
  - Poslovanje.
explanation: |
  Teološko-politički traktat, objavljen anonimno 1670. godine, brani slobodu mišljenja i verovanja. U njemu Spinoza tvrdi da je sloboda filozofiranja ključna za dobrobit države i kompatibilna sa religioznom pobožnošću.

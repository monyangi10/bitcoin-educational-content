question: Hva handler den teologisk-politiske avhandlingen om?
answer: Tanke- og trosfrihet.
wrong_answers:
  - For å demonstrere.
  - Matlaging.
  - Å gjøre forretninger.
explanation: |
  The Theological-Political Treatise, som ble utgitt anonymt i 1670, forsvarer tanke- og trosfriheten. Her argumenterer Spinoza for at friheten til å filosofere er avgjørende for statens velferd og forenlig med religiøs fromhet.
reviewed: false
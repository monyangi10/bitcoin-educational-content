question: Je, Mkataba wa Kitheolojia na Kisiasa unahusu nini?
answer: Uhuru wa mawazo na imani.
wrong_answers:
  - Ili kuonyesha.
  - Kupika.
  - Kufanya biashara.
explanation: |
  Theological-Political Treatise, iliyochapishwa bila kujulikana mwaka wa 1670, inatetea uhuru wa mawazo na imani. Ndani yake, Spinoza anasema kuwa uhuru wa falsafa ni muhimu kwa ustawi wa serikali na unaendana na uchaji wa kidini.

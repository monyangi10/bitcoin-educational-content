question: Apa yang dibahas dalam Risalah Teologi-Politik?
answer: Kebebasan berpikir dan berkeyakinan.
wrong_answers:
  - Untuk mendemonstrasikan.
  - Memasak.
  - Melakukan bisnis.
explanation: |
  Risalah Teologi-Politik, yang diterbitkan secara anonim pada tahun 1670, membela kebebasan berpikir dan berkeyakinan. Di dalamnya, Spinoza berpendapat bahwa kebebasan untuk berfilsafat sangat penting bagi kesejahteraan negara dan sesuai dengan kesalehan agama.

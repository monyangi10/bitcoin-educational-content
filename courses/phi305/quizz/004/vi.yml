question: Luận thuyết Thần học - Chính trị đề cập đến vấn đề gì?
answer: Tự do tư tưởng và tín ngưỡng.
wrong_answers:
  - Để chứng minh.
  - Nấu ăn.
  - Làm kinh doanh.
explanation: |
  Luận thuyết Thần học - Chính trị, xuất bản ẩn danh năm 1670, bảo vệ quyền tự do tư tưởng và tín ngưỡng. Trong đó, Spinoza lập luận rằng tự do triết lý là thiết yếu cho sự thịnh vượng của nhà nước và phù hợp với lòng mộ đạo.
reviewed: false
question: धर्मशास्त्रीय-राजनीतिक ग्रंथ किससे संबंधित है?
answer: विचार और विश्वास की स्वतंत्रता.
wrong_answers:
  - प्रदर्शन करना।
  - खाना बनाना।
  - व्यापार कर रही है।
explanation: |
  1670 में गुमनाम रूप से प्रकाशित "थियोलॉजिकल-पॉलिटिकल ट्रीटीज़" विचार और विश्वास की स्वतंत्रता का समर्थन करता है। इसमें स्पिनोज़ा तर्क देते हैं कि दर्शनशास्त्र की स्वतंत्रता राज्य की भलाई के लिए आवश्यक है और धार्मिक निष्ठा के अनुकूल है।
reviewed: false
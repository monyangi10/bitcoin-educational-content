question: Le Traité théologico-politique traite-t-il ?
answer: De la liberté de penser et de croire.
wrong_answers:
- De manifester.
- De faire la cuisine.
- De faire du commerce.
explanation: |
  Le Traité théologico-politique, publié anonymement en 1670, défend la liberté de penser et de croire. Spinoza y argue que la liberté de philosopher est essentielle au bien-être de l'État et compatible avec la piété religieuse.
reviewed: false

question: رساله الهی-سیاسی به چه موضوعی می‌پردازد؟
answer: آزادی اندیشه و اعتقاد.
wrong_answers:
  - برای نشان دادن.
  - پخت و پز.
  - کسب و کار.
explanation: |
  رساله الهی-سیاسی، که به صورت ناشناس در سال 1670 منتشر شد، از آزادی اندیشه و باور دفاع می‌کند. در این رساله، اسپینوزا استدلال می‌کند که آزادی فلسفه‌ورزی برای رفاه دولت ضروری است و با دینداری مذهبی سازگار است.
reviewed: false
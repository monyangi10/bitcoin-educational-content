question: Di cosa tratta il Trattato teologico-politico?
answer: Libertà di pensiero e di credo.
wrong_answers:
  - Per dimostrare.
  - Cucinare.
  - Fare affari.
explanation: |
  Il Trattato teologico-politico, pubblicato in forma anonima nel 1670, difende la libertà di pensiero e di credo. In esso Spinoza sostiene che la libertà di filosofare è essenziale per il benessere dello Stato e compatibile con la pietà religiosa.

question: De que trata o Tratado Teológico-Político?
answer: Liberdade de pensamento e de crença.
wrong_answers:
  - Para demonstrar.
  - Cozinhar.
  - Fazer negócios.
explanation: |
  O Tratado Teológico-Político, publicado anonimamente em 1670, defende a liberdade de pensamento e de crença. Nele, Spinoza argumenta que a liberdade de filosofar é essencial para o bem-estar do Estado e compatível com a piedade religiosa.

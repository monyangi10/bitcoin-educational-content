question: Czego dotyczy traktat teologiczno-polityczny?
answer: Wolność myśli i przekonań.
wrong_answers:
  - Aby zademonstrować.
  - Gotowanie.
  - Prowadzenie działalności gospodarczej.
explanation: |
  Traktat teologiczno-polityczny, opublikowany anonimowo w 1670 roku, broni wolności myśli i przekonań. Spinoza argumentuje w nim, że wolność filozofowania jest niezbędna dla dobrobytu państwa i zgodna z pobożnością religijną.
reviewed: false
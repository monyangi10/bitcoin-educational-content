question: С какво се занимава Теологично-политическият трактат?
answer: Свобода на мисълта и убежденията.
wrong_answers:
  - За да демонстрирате.
  - Готвене.
  - Правене на бизнес.
explanation: |
  Теологично-политическият трактат, публикуван анонимно през 1670 г., защитава свободата на мисълта и вярата. В него Спиноза твърди, че свободата на философстване е от съществено значение за благосъстоянието на държавата и е съвместима с религиозното благочестие.
reviewed: false
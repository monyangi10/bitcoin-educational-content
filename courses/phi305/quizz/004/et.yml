question: Millega tegeleb teoloogilis-poliitiline traktaat?
answer: Mõtte- ja usuvabadus.
wrong_answers:
  - Näitlikustamiseks.
  - Toiduvalmistamine.
  - Äritegevus.
explanation: |
  1670. aastal anonüümselt avaldatud teoloogilis-poliitiline traktaat kaitseb mõtte- ja usuvabadust. Selles väidab Spinoza, et filosoofia vabadus on riigi heaolu jaoks hädavajalik ja kooskõlas religioosse vagadusega.
reviewed: false
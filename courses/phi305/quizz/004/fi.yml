question: Mitä teologis-poliittinen tutkielma käsittelee?
answer: Ajatuksen- ja uskonvapaus.
wrong_answers:
  - Osoitetaan.
  - Ruoanlaitto.
  - Liiketoiminnan harjoittaminen.
explanation: |
  Vuonna 1670 nimettömänä julkaistussa teologis-poliittisessa tutkielmassa puolustetaan ajatuksen- ja uskonvapautta. Siinä Spinoza väittää, että vapaus filosofoida on välttämätöntä valtion hyvinvoinnille ja yhteensopiva uskonnollisen hurskauden kanssa.
reviewed: false
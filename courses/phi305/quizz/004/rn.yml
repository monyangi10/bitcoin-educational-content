question: None igitabu ca Tewolojiya n’ivya politike kivuga iki?
answer: Umwidegemvyo wo kwiyumvira no kwemera.
wrong_answers:
  - Kugira ngo yerekane.
  - Guteka.
  - Gukora ubudandaji.
explanation: |
  Igitabu citwa Traité théologique-politique, casohowe mu 1670 ata wuzina, kiraburanira umwidegemvyo wo kwiyumvira no kwemera. Muri ryo, Spinoza avuga yuko umwidegemvyo wo gukora filozofiya ari ngirakamaro kugira ngo Leta ibeho neza kandi ko ihuye n’ugusenga Imana kw’idini.

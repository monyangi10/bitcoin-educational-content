question: Čím se zabývá Teologicko-politický traktát?
answer: Svoboda myšlení a přesvědčení.
wrong_answers:
  - Demonstrovat.
  - Vaření.
  - Podnikání.
explanation: |
  Teologicko-politický traktát, vydaný anonymně v roce 1670, hájí svobodu myšlení a víry. Spinoza v něm tvrdí, že svoboda filozofování je nezbytná pro blaho státu a slučitelná s náboženskou zbožností.

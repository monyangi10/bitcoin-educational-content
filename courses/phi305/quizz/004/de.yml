question: Womit befasst sich der Theologisch-Politische Traktat?
answer: Freiheit der Gedanken und des Glaubens.
wrong_answers:
  - Zur Demonstration.
  - Kochen.
  - Geschäfte machen.
explanation: |
  Die Theologisch-politische Abhandlung, die 1670 anonym veröffentlicht wurde, verteidigt die Gedanken- und Glaubensfreiheit. Darin argumentiert Spinoza, dass die Freiheit zu philosophieren für das Wohlergehen des Staates unerlässlich und mit religiöser Frömmigkeit vereinbar ist.
reviewed: false
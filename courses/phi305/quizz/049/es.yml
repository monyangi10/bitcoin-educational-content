question: ¿Defender las ideas finalistas?
answer: Ser supersticioso.
wrong_answers:
  - Ser sensato.
  - Para ser absurdo.
  - Defender el laicismo.
explanation: |
  Defender ideas finalistas es ser supersticioso, según Spinoza. Significa atribuir intenciones a la naturaleza o a Dios, y caer así en la ilusión antropomórfica.
reviewed: false
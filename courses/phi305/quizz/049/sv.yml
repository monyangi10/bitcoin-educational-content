question: Försvara finalistidéer?
answer: Att vara vidskeplig.
wrong_answers:
  - För att vara förnuftig.
  - För att vara absurd.
  - Försvara sekularismen.
explanation: |
  Att försvara finalistiska idéer är att vara vidskeplig, enligt Spinoza. Det innebär att man tillskriver naturen eller Gud avsikter och därmed faller in i en antropomorf illusion.

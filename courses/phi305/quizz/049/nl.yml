question: Ideeën voor finalisten verdedigen?
answer: Bijgelovig zijn.
wrong_answers:
  - Om verstandig te zijn.
  - Om absurd te zijn.
  - Het verdedigen van secularisme.
explanation: |
  Het verdedigen van finalistische ideeën is volgens Spinoza bijgelovig. Het betekent het toeschrijven van intenties aan de natuur of God, en daarmee vervallen in antropomorfe illusie.
reviewed: false
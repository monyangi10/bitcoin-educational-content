question: Difendere le idee finaliste?
answer: Essere superstiziosi.
wrong_answers:
  - Essere ragionevoli.
  - Per assurdo.
  - Difendere la laicità.
explanation: |
  Secondo Spinoza, difendere le idee finaliste significa essere superstiziosi. Significa attribuire intenzioni alla natura o a Dio, e quindi cadere nell'illusione antropomorfica.
reviewed: false
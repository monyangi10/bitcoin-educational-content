question: Forsvarer du finalistens ideer?
answer: Å være overtroisk.
wrong_answers:
  - For å være fornuftig.
  - For å være absurd.
  - Til forsvar for sekularismen.
explanation: |
  Å forsvare finalistiske ideer er å være overtroisk, ifølge Spinoza. Det betyr å tillegge naturen eller Gud intensjoner, og dermed henfalle til en antropomorf illusjon.
reviewed: false
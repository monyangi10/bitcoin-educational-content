question: Kuburanira ivyiyumviro vy’abazoja mu nyuma?
answer: Kuba umuntu yemera ibinyoma.
wrong_answers:
  - Kugira ngo umuntu abe uwufise ubwenge.
  - Kugira ngo umuntu abe uwutagira ishingiro.
  - Kugwanira ubusekuriki.
explanation: |
  Kuburanira ivyiyumviro vy’abazoheza ni ukuba umuntu yizera ibinyoma, nk’uko Spinoza abivuga. Bisigura gushingira imigambi ku kamere canke ku Mana, gutyo ukagwa mu kwihenda kw’abantu.

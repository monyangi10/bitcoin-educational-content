question: Braniti ideje finalista?
answer: Biti sujeveran.
wrong_answers:
  - Biti razuman.
  - Biti apsurdan.
  - Braniti sekularizam.
explanation: |
  Braniti ideje finalista znači biti sujeveran, prema Spinozi. To znači pripisivati namere prirodi ili Bogu, i tako upadati u antropomorfnu iluziju.

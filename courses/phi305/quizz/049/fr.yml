question: À quoi revient le fait de défendre des idées finalistes?
answer: À être superstitieux.
wrong_answers:
  - À faire preuve de raison.
  - À être absurde.
  - À défendre la laïcité.
explanation: |
  Défendre des idées finalistes revient à être superstitieux selon Spinoza. C'est attribuer des intentions à la nature ou à Dieu, et ainsi tomber dans l'illusion anthropomorphique.
reviewed: false

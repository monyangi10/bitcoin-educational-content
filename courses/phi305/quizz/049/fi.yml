question: Puolustavat finalisti-ideat?
answer: Taikauskoisuus.
wrong_answers:
  - Olla järkevä.
  - Olla absurdi.
  - Maallistumisen puolustaminen.
explanation: |
  Spinozan mukaan finalististen ajatusten puolustaminen on taikauskoista. Se tarkoittaa sitä, että luontoon tai Jumalaan liitetään aikomuksia, ja siten lankeaa antropomorfiseen harhakuvitelmiin.
reviewed: false
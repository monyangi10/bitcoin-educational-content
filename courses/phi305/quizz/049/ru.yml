question: Защищаете идеи финалистов?
answer: Быть суеверным.
wrong_answers:
  - Быть благоразумным.
  - Довести до абсурда.
  - Защита секуляризма.
explanation: |
  По мнению Спинозы, защищать финалистские идеи - значит быть суеверным. Это значит приписывать намерения природе или Богу и тем самым впадать в антропоморфную иллюзию.

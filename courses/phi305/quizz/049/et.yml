question: Kaitsvad finalistide ideed?
answer: Olles ebausklik.
wrong_answers:
  - Et olla mõistlik.
  - Et olla absurdne.
  - Maailmalikkuse kaitsmine.
explanation: |
  Spinoza sõnul on finalistlike ideede kaitsmine ebausklik. See tähendab kavatsuste omistamist loodusele või Jumalale ja seega langemist antropomorfsesse illusiooni.
reviewed: false
question: Bảo vệ ý tưởng lọt vào vòng chung kết?
answer: Mê tín.
wrong_answers:
  - Để trở nên sáng suốt.
  - Thật là vô lý.
  - Bảo vệ chủ nghĩa thế tục.
explanation: |
  Theo Spinoza, bảo vệ những ý tưởng cuối cùng là mê tín. Nó có nghĩa là gán ý định cho tự nhiên hoặc Chúa, và do đó rơi vào ảo tưởng nhân hóa.

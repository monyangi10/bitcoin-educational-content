question: دفاع از ایده‌های فینالیست؟
answer: خرافاتی بودن.
wrong_answers:
  - معقول بودن.
  - پوچ بودن.
  - دفاع از سکولاریسم.
explanation: |
  دفاع از ایده‌های نهایی به معنای خرافاتی بودن است، طبق نظر اسپینوزا. این به معنای نسبت دادن نیت‌ها به طبیعت یا خدا است و بنابراین گرفتار توهم انسان‌انگاری شدن.
reviewed: false
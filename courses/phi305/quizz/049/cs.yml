question: Obhajoba nápadů finalistů?
answer: Pověrčivost.
wrong_answers:
  - Být rozumný.
  - Být absurdní.
  - Obrana sekularismu.
explanation: |
  Obhajovat myšlenky finalistů znamená být podle Spinozy pověrčivý. Znamená to přisuzovat přírodě nebo Bohu záměry, a tím upadat do antropomorfní iluze.
reviewed: false
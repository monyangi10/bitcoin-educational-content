question: Pomysły na obronę finalistów?
answer: Bycie przesądnym.
wrong_answers:
  - Być rozsądnym.
  - To absurd.
  - Obrona sekularyzmu.
explanation: |
  Według Spinozy obrona idei finalistycznych oznacza bycie przesądnym. Oznacza to przypisywanie intencji naturze lub Bogu, a tym samym popadanie w antropomorficzną iluzję.

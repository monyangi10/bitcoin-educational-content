question: Defender as ideias dos finalistas?
answer: Ser supersticioso.
wrong_answers:
  - Para ser sensato.
  - Para ser absurdo.
  - Defender o laicismo.
explanation: |
  Defender ideias finalistas é ser supersticioso, segundo Spinoza. Significa atribuir intenções à natureza ou a Deus, caindo assim na ilusão antropomórfica.

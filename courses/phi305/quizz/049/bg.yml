question: На какво се равнява защитата на идеите на финалистите?
answer: Суеверие.
wrong_answers:
  - Да бъдем разумни.
  - Да бъдеш абсурден.
  - В защита на секуларизма.
explanation: |
  Според Спиноза да защитаваш идеите на финалистите означава да си суеверен. Това означава да се приписват намерения на природата или на Бога и по този начин да се изпада в антропоморфна илюзия.

question: Ideen der Finalisten verteidigen?
answer: Abergläubisch sein.
wrong_answers:
  - Um vernünftig zu sein.
  - Das ist absurd.
  - Verteidigung des Laizismus.
explanation: |
  Finalistische Ideen zu verteidigen, bedeutet nach Spinoza, abergläubisch zu sein. Es bedeutet, der Natur oder Gott Absichten zuzuschreiben und damit einer anthropomorphen Illusion zu verfallen.
reviewed: false
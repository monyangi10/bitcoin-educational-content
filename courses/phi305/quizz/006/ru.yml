question: Является ли Иммануил Кант философом?
answer: Немецкий язык.
wrong_answers:
  - Английский язык.
  - Польский.
  - Голландцы.
explanation: |
  Иммануил Кант (1724-1804) - немецкий философ, считающийся одним из самых значительных мыслителей эпохи Просвещения. Он разработал критическую философию, которая стремилась примирить рационализм и эмпиризм.

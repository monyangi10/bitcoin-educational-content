question: Je, Immanuel Kant ni mwanafalsafa?
answer: Kijerumani.
wrong_answers:
  - Kiingereza.
  - Kipolandi.
  - Kiholanzi.
explanation: |
  Immanuel Kant (1724-1804) alikuwa mwanafalsafa wa Kijerumani, aliyechukuliwa kuwa mmoja wa wanafikra muhimu zaidi wa Kutaalamika. Alikuza falsafa muhimu ambayo ilitaka kupatanisha busara na empiricism.
reviewed: true

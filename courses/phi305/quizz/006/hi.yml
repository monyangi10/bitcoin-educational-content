question: क्या इमैनुएल कांट एक दार्शनिक हैं?
answer: जर्मन.
wrong_answers:
  - अंग्रेज़ी।
  - पोलिश.
  - डच.
explanation: |
  इमैनुएल कांट (1724-1804) एक जर्मन दार्शनिक थे, जिन्हें ज्ञानोदय युग के सबसे महत्वपूर्ण विचारकों में से एक माना जाता है। उन्होंने एक आलोचनात्मक दर्शन विकसित किया जो तर्कवाद और अनुभववाद में सामंजस्य स्थापित करने का प्रयास करता था।

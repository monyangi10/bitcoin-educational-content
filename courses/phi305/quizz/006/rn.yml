question: Mbega Imanuweli Kant ni umunyabwenge?
answer: Ikidagi.
wrong_answers:
  - Ikirundi.
  - Igipolonye.
  - Igiholandi.
explanation: |
  Immanuel Kant (1724-1804) yari umunyabwenge w'umudagi, afatwa nk'umwe mu bazirikana bahambaye cane bo mu gihe c'umuco. Yarateguye filozofiya y’ugunegura yarondera guhuza ivyiyumviro n’ivy’ubuhinga.

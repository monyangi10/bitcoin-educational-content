question: Ist Immanuel Kant ein Philosoph?
answer: Deutsch.
wrong_answers:
  - Englisch.
  - Polnisch.
  - Niederländisch.
explanation: |
  Immanuel Kant (1724-1804) war ein deutscher Philosoph, der als einer der wichtigsten Denker der Aufklärung gilt. Er entwickelte eine kritische Philosophie, die versuchte, Rationalismus und Empirismus miteinander zu versöhnen.

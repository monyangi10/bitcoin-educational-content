question: นักปรัชญาอิมมานูเอล คานท์มีสัญชาติเยอรมัน
answer: เยอรมัน
wrong_answers:
  - ภาษาอังกฤษ
  - ขัดเงา
  - ดัตช์
explanation: |
  อิมมานูเอล คานท์ (1724-1804) เป็นนักปรัชญาชาวเยอรมัน ซึ่งถือว่าเป็นหนึ่งในนักคิดที่สำคัญที่สุดของยุคเรืองปัญญา เขาได้พัฒนาปรัชญาวิจารณ์ที่พยายามประสานเหตุผลนิยมและประสบการณ์นิยมเข้าด้วยกัน
reviewed: false
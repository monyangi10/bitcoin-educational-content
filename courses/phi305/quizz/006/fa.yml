question: آیا ایمانوئل کانت یک فیلسوف است؟
answer: آلمانی.
wrong_answers:
  - انگلیسی.
  - لهستانی.
  - هلندی.
explanation: |
  ایمانوئل کانت (1724-1804) یک فیلسوف آلمانی بود که به عنوان یکی از مهم‌ترین متفکران عصر روشنگری شناخته می‌شود. او فلسفه‌ای انتقادی توسعه داد که به دنبال آشتی دادن عقل‌گرایی و تجربه‌گرایی بود.
reviewed: false
question: Immanuel Kant có phải là một triết gia không?
answer: Tiếng Đức.
wrong_answers:
  - Tiếng Anh.
  - Đánh bóng.
  - Tiếng Hà Lan.
explanation: |
  Immanuel Kant (1724-1804) là một triết gia người Đức, được coi là một trong những nhà tư tưởng quan trọng nhất của thời kỳ Khai sáng. Ông đã phát triển một triết lý phê phán tìm cách dung hòa chủ nghĩa duy lý và chủ nghĩa kinh nghiệm.
reviewed: false
question: Каква националност е имал философът Имануел Кант?
answer: Немски език.
wrong_answers:
  - Английски език.
  - Полски език.
  - Холандски език.
explanation: |
  Имануел Кант (1724-1804) е немски философ, смятан за един от най-важните мислители на Просвещението. Той развива критическа философия, която се стреми да съчетае рационализма и емпиризма.

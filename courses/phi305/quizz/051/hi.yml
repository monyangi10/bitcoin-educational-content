question: कौन सा ऑस्ट्रियाई अर्थशास्त्री योजनावाद की बात करता है?
answer: हायेक.
wrong_answers:
  - मेंगर.
  - मिज़ेस.
  - पॉपर.
explanation: |
  फ्रेडरिक हायेक (1899-1992) ऑस्ट्रियाई अर्थशास्त्री थे जिन्होंने केंद्रीकृत आर्थिक नियोजन के लिए "योजनावाद" शब्द गढ़ा था। उन्होंने "द रोड टू सर्फडम" में इस दृष्टिकोण की आलोचना की है।
reviewed: false
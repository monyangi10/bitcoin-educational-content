question: Ni uwuhe muhinga mu vy’ubutunzi wo muri Otirishiya avuga ivy’imigambi?
answer: Hayeki.
wrong_answers:
  - Umukozi.
  - Mise.
  - Popper.
explanation: |
  Friedrich Hayek (1899-1992) ni umuhinga mu vy'ubutunzi wo muri Otirishiya yashizeho ijambo "itegurwa" kugira ngo adondore igenamigambi ry'ubutunzi ry'abantu bose. Aranegura iyo nzira mu gitabu ciwe citwa "Inzira y'ubuja".

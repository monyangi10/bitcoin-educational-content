question: Кой австрийски икономист говори за планизъм?
answer: Хайек.
wrong_answers:
  - Менгер.
  - Мизес.
  - Попър.
explanation: |
  Фридрих Хайек (1899-1992) е австрийски икономист, който въвежда термина "плановизъм", за да опише централизираното икономическо планиране. Той критикува този подход в "Пътят към робството".
reviewed: false
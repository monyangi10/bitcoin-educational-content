question: کدام اقتصاددان اتریشی از پلانیسم صحبت می‌کند؟
answer: هایک.
wrong_answers:
  - منگر.
  - میزس.
  - پاپر.
explanation: |
  فریدریش هایک (1899-1992) اقتصاددان اتریشی بود که اصطلاح "برنامه‌گرایی" را برای توصیف برنامه‌ریزی اقتصادی متمرکز ابداع کرد. او این رویکرد را در "راهی به سوی بردگی" مورد انتقاد قرار می‌دهد.
reviewed: false
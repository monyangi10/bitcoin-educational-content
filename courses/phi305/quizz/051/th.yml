question: นักเศรษฐศาสตร์ชาวออสเตรียคนใดที่พูดถึงการวางแผน?
answer: ฮาเย็ค
wrong_answers:
  - เมงเงอร์
  - มีเซส
  - ป๊อปเปอร์.
explanation: |
  ฟรีดริช ฮาเย็ค (1899-1992) เป็นนักเศรษฐศาสตร์ชาวออสเตรียที่บัญญัติคำว่า "planism" เพื่ออธิบายการวางแผนเศรษฐกิจแบบรวมศูนย์ เขาวิพากษ์วิจารณ์แนวทางนี้ใน "The Road to Serfdom"
reviewed: false
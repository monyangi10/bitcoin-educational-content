question: Nhà kinh tế học người Áo nào nói về chủ nghĩa kế hoạch?
answer: Hayek.
wrong_answers:
  - Menger.
  - Mises.
  - Người thổi kèn.
explanation: |
  Friedrich Hayek (1899-1992) là nhà kinh tế học người Áo, người đã đặt ra thuật ngữ "chủ nghĩa kế hoạch" để mô tả kế hoạch hóa kinh tế tập trung. Ông chỉ trích cách tiếp cận này trong tác phẩm "Con đường dẫn đến chế độ nông nô".
reviewed: false
question: Ekonom Austria mana yang berbicara tentang planisme?
answer: Hayek.
wrong_answers:
  - Menger.
  - Mises.
  - Popper.
explanation: |
  Friedrich Hayek (1899-1992) adalah ekonom Austria yang menciptakan istilah "planisme" untuk menggambarkan perencanaan ekonomi yang terpusat. Dia mengkritik pendekatan ini dalam "The Road to Serfdom".

question: Кто из австрийских экономистов говорит о планизме?
answer: Хайек.
wrong_answers:
  - Менгер.
  - Мизес.
  - Поппер.
explanation: |
  Фридрих Хайек (1899-1992) - австрийский экономист, который ввел термин "планизм" для обозначения централизованного экономического планирования. Он критикует этот подход в книге "Дорога к крепостному праву".
reviewed: false
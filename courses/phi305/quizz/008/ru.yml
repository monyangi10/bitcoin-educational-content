question: Что общего между немецкой и французской философиями эпохи Просвещения?
answer: Борьба с суевериями.
wrong_answers:
  - Борьба с привилегиями.
  - Борьба с рабством.
  - Борьба с естественными правами.
explanation: |
  Главной общей чертой немецкого и французского Просвещения была борьба с суевериями. Философы обеих стран стремились продвигать разум и науку против иррациональных верований и предрассудков.

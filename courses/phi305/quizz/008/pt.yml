question: O que é que as filosofias iluministas alemã e francesa têm em comum?
answer: Lutar contra a superstição.
wrong_answers:
  - Lutar contra o privilégio.
  - Lutar contra a escravatura.
  - Lutar contra os direitos naturais.
explanation: |
  Um dos principais denominadores comuns entre o Iluminismo alemão e o francês foi a luta contra a superstição. Os filósofos de ambos os países procuraram promover a razão e a ciência contra as crenças irracionais e os preconceitos.

question: Šta nemačka i francuska filozofija prosvetiteljstva imaju zajedničko?
answer: Borba protiv sujeverja.
wrong_answers:
  - Borbenje protiv privilegija.
  - Borba protiv ropstva.
  - Borba protiv prirodnih prava.
explanation: |
  Zajednički imenitelj između nemačkog i francuskog prosvetiteljstva bila je borba protiv sujeverja. Filozofi u obe zemlje su nastojali da promovišu razum i nauku naspram iracionalnih verovanja i predrasuda.
reviewed: false
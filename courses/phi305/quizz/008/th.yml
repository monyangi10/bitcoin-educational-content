question: ปรัชญาการตรัสรู้ของเยอรมันและฝรั่งเศสมีอะไรที่เหมือนกัน?
answer: การต่อสู้กับความเชื่อทางไสยศาสตร์
wrong_answers:
  - ต่อสู้กับสิทธิพิเศษ
  - การต่อสู้กับการเป็นทาส
  - ต่อสู้กับสิทธิตามธรรมชาติ
explanation: |
  ตัวแปรร่วมที่สำคัญระหว่างการตรัสรู้ของเยอรมันและฝรั่งเศสคือการต่อสู้กับความเชื่องมงาย นักปรัชญาในทั้งสองประเทศพยายามส่งเสริมเหตุผลและวิทยาศาสตร์เพื่อต่อต้านความเชื่อที่ไม่มีเหตุผลและอคติ
reviewed: false
question: जर्मन और फ्रांसीसी ज्ञानोदय दर्शन में क्या समानता है?
answer: अंधविश्वास से लड़ना.
wrong_answers:
  - विशेषाधिकार के लिए लड़ाई.
  - गुलामी से लड़ना.
  - प्राकृतिक अधिकारों के विरुद्ध लड़ाई.
explanation: |
  जर्मन और फ़्रांसीसी ज्ञानोदय के बीच एक प्रमुख समानता अंधविश्वास के विरुद्ध संघर्ष थी। दोनों देशों के दार्शनिकों ने तर्कहीन मान्यताओं और पूर्वाग्रहों के विरुद्ध तर्क और विज्ञान को बढ़ावा देने का प्रयास किया।
reviewed: false
question: Hva har tysk og fransk opplysningsfilosofi til felles?
answer: Bekjempelse av overtro.
wrong_answers:
  - Bekjempelse av privilegier.
  - Kampen mot slaveriet.
  - Kjemper mot naturlige rettigheter.
explanation: |
  En viktig fellesnevner mellom den tyske og den franske opplysningstiden var kampen mot overtro. Filosofer i begge land forsøkte å fremme fornuft og vitenskap mot irrasjonell tro og fordommer.
reviewed: false
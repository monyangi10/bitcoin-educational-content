question: ¿Qué tienen en común las filosofías de la Ilustración alemana y francesa?
answer: Lucha contra la superstición.
wrong_answers:
  - Lucha contra los privilegios.
  - Lucha contra la esclavitud.
  - Lucha contra los derechos naturales.
explanation: |
  Un importante denominador común entre la Ilustración alemana y la francesa fue la lucha contra la superstición. Los filósofos de ambos países trataron de promover la razón y la ciencia frente a las creencias irracionales y los prejuicios.

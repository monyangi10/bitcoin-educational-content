question: Apa kesamaan filosofi Pencerahan Jerman dan Prancis?
answer: Melawan takhayul.
wrong_answers:
  - Hak istimewa untuk bertarung.
  - Memerangi perbudakan.
  - Berjuang melawan hak-hak alamiah.
explanation: |
  Persamaan utama antara Pencerahan Jerman dan Prancis adalah perjuangan melawan takhayul. Para filsuf di kedua negara berusaha untuk mempromosikan akal sehat dan ilmu pengetahuan untuk melawan kepercayaan dan prasangka yang tidak rasional.

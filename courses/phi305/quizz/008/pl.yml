question: Co łączy niemiecką i francuską filozofię oświecenia?
answer: Walka z przesądami.
wrong_answers:
  - Walka z przywilejami.
  - Walka z niewolnictwem.
  - Walka z prawami naturalnymi.
explanation: |
  Głównym wspólnym mianownikiem niemieckiego i francuskiego oświecenia była walka z przesądami. Filozofowie w obu krajach starali się promować rozum i naukę przeciwko irracjonalnym przekonaniom i uprzedzeniom.
reviewed: false
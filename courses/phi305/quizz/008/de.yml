question: Was haben die deutsche und die französische Aufklärungsphilosophie gemeinsam?
answer: Kampf gegen den Aberglauben.
wrong_answers:
  - Kampf gegen das Privileg.
  - Kampf gegen die Sklaverei.
  - Kampf gegen natürliche Rechte.
explanation: |
  Ein wichtiger gemeinsamer Nenner der deutschen und der französischen Aufklärung war der Kampf gegen den Aberglauben. Philosophen in beiden Ländern versuchten, Vernunft und Wissenschaft gegen irrationale Überzeugungen und Vorurteile zu fördern.
reviewed: false
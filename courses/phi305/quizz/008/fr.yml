question: Quel est le point commun de la philosophie des Lumières allemandes et françaises
  ?
answer: Lutter contre la superstition.
wrong_answers:
- Lutter contre les privilèges.
- Lutter contre l'esclavage.
- Lutter contre les droits naturels.
explanation: |
  Un point commun majeur entre les Lumières allemandes et françaises était la lutte contre la superstition. Les philosophes des deux pays cherchaient à promouvoir la raison et la science contre les croyances irrationnelles et les préjugés.
reviewed: false

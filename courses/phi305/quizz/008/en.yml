question: What do German and French Enlightenment philosophies have in common?
answer: Fighting superstition.
wrong_answers:
  - Fighting privilege.
  - Fighting slavery.
  - Fighting against natural rights.
explanation: |
  A major common denominator between the German and French Enlightenment was the fight against superstition. Philosophers in both countries sought to promote reason and science against irrational beliefs and prejudice.
reviewed: false
question: Alman ve Fransız Aydınlanma felsefelerinin ortak noktası nedir?
answer: Batıl inançlarla savaşmak.
wrong_answers:
  - Ayrıcalıkla savaşmak.
  - Kölelikle mücadele.
  - Doğal haklara karşı savaşmak.
explanation: |
  Alman ve Fransız Aydınlanması arasındaki en önemli ortak payda batıl inançlara karşı verilen mücadeleydi. Her iki ülkedeki filozoflar da akıl dışı inançlara ve önyargılara karşı akıl ve bilimi teşvik etmeye çalışmıştır.

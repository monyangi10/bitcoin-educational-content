question: Wat hebben de Duitse en Franse verlichtingsfilosofieën gemeen?
answer: Bijgeloof bestrijden.
wrong_answers:
  - Voorrecht bestrijden.
  - Slavernij bestrijden.
  - Vechten tegen natuurlijke rechten.
explanation: |
  Een belangrijke gemene deler tussen de Duitse en Franse Verlichting was de strijd tegen bijgeloof. Filosofen in beide landen probeerden rede en wetenschap te promoten tegen irrationele overtuigingen en vooroordelen.
reviewed: false
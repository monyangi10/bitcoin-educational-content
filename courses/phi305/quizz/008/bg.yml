question: Какво е общото между немската и френската философия на Просвещението?
answer: Борба със суеверията.
wrong_answers:
  - Борба с привилегиите.
  - Борба с робството.
  - Борба срещу естествените права.
explanation: |
  Основен общ знаменател между немското и френското Просвещение е борбата срещу суеверията. Философите и в двете страни се стремят да насърчават разума и науката срещу ирационалните вярвания и предразсъдъци.
reviewed: false
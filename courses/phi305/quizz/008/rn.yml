question: Ni igiki filozofiya y’Ubudage n’iy’Ubufaransa y’Umuco ihuriyeko?
answer: Kurwanya ivyiyumviro vy’ibinyoma.
wrong_answers:
  - Kurwanya agateka.
  - Kurwanya ubuja.
  - Kurwanya uburenganzira bw’abantu.
explanation: |
  Ikintu gihambaye cari gihuriyeko hagati y’Abadagi n’Abafaransa b’Umuco ni ukurwanya imigenzo y’ibinyoma. Abanyabwenge bo muri ivyo bihugu vyompi bararondeye guteza imbere ubwenge n’ubuhinga bwo kurwanya imyizere idashingiye ku vyiyumviro be n’ukwihenda.

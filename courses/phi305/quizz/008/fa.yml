question: فلسفه‌های روشنگری آلمان و فرانسه چه وجه اشتراکی دارند؟
answer: مبارزه با خرافات.
wrong_answers:
  - مبارزه با امتیاز.
  - مبارزه با برده‌داری.
  - مبارزه با حقوق طبیعی.
explanation: |
  یک مخرج مشترک عمده بین روشنگری آلمان و فرانسه مبارزه با خرافات بود. فیلسوفان در هر دو کشور تلاش کردند تا عقل و علم را در برابر باورهای غیرمنطقی و تعصب ترویج دهند.
reviewed: false
question: Falsafa za Mwangaza wa Ujerumani na Kifaransa zinafanana nini?
answer: Kupambana na ushirikina.
wrong_answers:
  - Upendeleo wa kupigana.
  - Kupambana na utumwa.
  - Mapigano dhidi ya haki za asili.
explanation: |
  Dhehebu kuu la kawaida kati ya Mwangaza wa Wajerumani na Wafaransa lilikuwa ni vita dhidi ya ushirikina. Wanafalsafa katika nchi zote mbili walijaribu kukuza akili na sayansi dhidi ya imani zisizo na akili na ubaguzi.
reviewed: true

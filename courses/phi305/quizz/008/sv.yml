question: Vad har den tyska och den franska upplysningsfilosofin gemensamt?
answer: Bekämpa vidskepelse.
wrong_answers:
  - Kämpa mot privilegier.
  - Bekämpa slaveriet.
  - Kämpar mot naturliga rättigheter.
explanation: |
  En viktig gemensam nämnare mellan den tyska och den franska upplysningen var kampen mot vidskepelse. Filosofer i båda länderna försökte främja förnuft och vetenskap mot irrationella trosföreställningar och fördomar.
reviewed: false
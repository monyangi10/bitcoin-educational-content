question: Co mají společného německá a francouzská osvícenská filozofie?
answer: Boj proti pověrám.
wrong_answers:
  - Boj proti privilegiím.
  - Boj proti otroctví.
  - Boj proti přirozeným právům.
explanation: |
  Hlavním společným jmenovatelem německého a francouzského osvícenství byl boj proti pověrám. Filozofové v obou zemích se snažili prosazovat rozum a vědu proti iracionálním přesvědčením a předsudkům.
reviewed: false
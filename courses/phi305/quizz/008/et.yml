question: Mis on ühist saksa ja prantsuse valgustusfilosoofia vahel?
answer: Võitlus ebausu vastu.
wrong_answers:
  - Võitlus privileegide vastu.
  - Võitlus orjuse vastu.
  - Võitlus looduslike õiguste vastu.
explanation: |
  Saksa ja Prantsuse valgustusajastu peamine ühine nimetaja oli võitlus ebausu vastu. Mõlema riigi filosoofid püüdsid edendada mõistust ja teadust irratsionaalsete uskumuste ja eelarvamuste vastu.
reviewed: false
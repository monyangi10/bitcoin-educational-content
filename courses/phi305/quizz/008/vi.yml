question: Triết lý Khai sáng của Đức và Pháp có điểm gì chung?
answer: Chống lại mê tín dị đoan.
wrong_answers:
  - Đặc quyền chiến đấu.
  - Chống chế độ nô lệ.
  - Đấu tranh chống lại quyền tự nhiên.
explanation: |
  Một điểm chung lớn giữa thời kỳ Khai sáng Đức và Pháp là cuộc chiến chống lại mê tín dị đoan. Các triết gia ở cả hai nước đều tìm cách thúc đẩy lý trí và khoa học chống lại những niềm tin và định kiến phi lý.
reviewed: false
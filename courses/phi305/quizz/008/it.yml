question: Che cosa hanno in comune le filosofie illuministe tedesca e francese?
answer: Combattere la superstizione.
wrong_answers:
  - Combattere il privilegio.
  - Lotta alla schiavitù.
  - Lotta contro i diritti naturali.
explanation: |
  Un importante denominatore comune tra l'Illuminismo tedesco e quello francese fu la lotta contro la superstizione. I filosofi di entrambi i Paesi cercarono di promuovere la ragione e la scienza contro le credenze irrazionali e i pregiudizi.

question: नियतिवाद क्या है?
answer: विश्व की ऐसी अवधारणा जिसमें न तो कोई आकस्मिकता है और न ही कोई संयोग।
wrong_answers:
  - ईश्वर द्वारा निर्धारित विश्वदृष्टि।
  - नास्तिकता का एक रूप.
  - एक अंधविश्वास.
explanation: |
  नियतिवाद एक ऐसा विश्वदृष्टिकोण है जिसमें न तो कोई आकस्मिकता है और न ही कोई संयोग। प्रत्येक घटना अपरिवर्तनीय प्राकृतिक नियमों के अनुसार, पूर्व कारणों का आवश्यक परिणाम होती है।

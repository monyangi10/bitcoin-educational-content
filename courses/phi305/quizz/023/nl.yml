question: Wat is determinisme?
answer: Een opvatting van de wereld waarin noch toeval noch toeval bestaat.
wrong_answers:
  - Een wereldbeeld bepaald door God.
  - Een vorm van atheïsme.
  - Een bijgeloof.
explanation: |
  Determinisme is een wereldbeeld waarin geen toeval of kans bestaat. Elke gebeurtenis is het noodzakelijke gevolg van voorafgaande oorzaken, volgens onveranderlijke natuurwetten.

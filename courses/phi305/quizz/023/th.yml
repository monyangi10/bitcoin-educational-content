question: Determinism คืออะไร?
answer: แนวคิดของโลกที่ไม่มีทั้งความบังเอิญและโอกาส
wrong_answers:
  - โลกทัศน์ที่ถูกกำหนดโดยพระเจ้า
  - รูปแบบหนึ่งของอเทวนิยม
  - ความเชื่อทางไสยศาสตร์
explanation: |
  ลัทธิการกำหนดล่วงหน้าเป็นมุมมองของโลกที่ไม่มีความบังเอิญหรือโอกาส ทุกเหตุการณ์เป็นผลที่จำเป็นของสาเหตุก่อนหน้า ตามกฎธรรมชาติที่ไม่เปลี่ยนแปลง
reviewed: false
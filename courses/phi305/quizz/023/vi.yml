question: Chủ nghĩa quyết định luận là gì?
answer: Một quan niệm về thế giới không có sự ngẫu nhiên hay cơ hội.
wrong_answers:
  - Một thế giới quan do Chúa quyết định.
  - Một hình thức của chủ nghĩa vô thần.
  - Một sự mê tín.
explanation: |
  Thuyết tất định là một thế giới quan không có sự ngẫu nhiên hay may rủi. Mọi sự kiện đều là hệ quả tất yếu của những nguyên nhân trước đó, theo những quy luật tự nhiên bất biến.

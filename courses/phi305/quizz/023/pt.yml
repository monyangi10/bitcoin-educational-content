question: O que é o determinismo?
answer: Uma conceção do mundo em que não existe nem contingência nem acaso.
wrong_answers:
  - Uma visão do mundo determinada por Deus.
  - Uma forma de ateísmo.
  - Uma superstição.
explanation: |
  O determinismo é uma visão do mundo em que não existe nem contingência nem acaso. Cada acontecimento é a consequência necessária de causas anteriores, de acordo com leis naturais imutáveis.

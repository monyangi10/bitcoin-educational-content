question: جبرگرایی چیست؟
answer: یک تصور از جهان که در آن نه تصادف وجود دارد و نه شانس.
wrong_answers:
  - یک جهان‌بینی تعیین‌شده توسط خدا.
  - شکلی از بی‌خدایی.
  - یک خرافه.
explanation: |
  جبرگرایی یک جهان‌بینی است که در آن نه تصادف وجود دارد و نه شانس. هر رویدادی نتیجه ضروری علل قبلی است، بر اساس قوانین طبیعی تغییرناپذیر.
reviewed: false
question: Apa yang dimaksud dengan determinisme?
answer: Sebuah konsepsi tentang dunia di mana tidak ada kontingensi atau peluang.
wrong_answers:
  - Pandangan dunia yang ditentukan oleh Tuhan.
  - Suatu bentuk ateisme.
  - Sebuah takhayul.
explanation: |
  Determinisme adalah pandangan dunia di mana tidak ada kontingensi atau kebetulan. Setiap peristiwa adalah konsekuensi yang diperlukan dari sebab-sebab sebelumnya, sesuai dengan hukum alam yang tidak dapat diubah.
reviewed: false
question: Какво е детерминизъм?
answer: Концепция за света, в която няма нито случайност, нито шанс.
wrong_answers:
  - Светоглед, определен от Бога.
  - Форма на атеизъм.
  - Суеверие.
explanation: |
  Детерминизмът е светоглед, в който няма нито случайност, нито шанс. Всяко събитие е необходимо следствие от предишни причини, съгласно неизменни природни закони.

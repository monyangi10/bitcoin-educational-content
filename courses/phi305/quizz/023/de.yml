question: Was ist Determinismus?
answer: Eine Weltanschauung, in der es weder Zufälligkeit noch Zufall gibt.
wrong_answers:
  - Eine von Gott bestimmte Weltanschauung.
  - Eine Form des Atheismus.
  - Ein Aberglaube.
explanation: |
  Determinismus ist eine Weltanschauung, in der es weder Zufälligkeit noch Zufall gibt. Jedes Ereignis ist die notwendige Folge früherer Ursachen und folgt unveränderlichen Naturgesetzen.

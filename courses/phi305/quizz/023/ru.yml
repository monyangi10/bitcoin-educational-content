question: Что такое детерминизм?
answer: Концепция мира, в которой нет ни случайностей, ни случайного.
wrong_answers:
  - Мировоззрение, определенное Богом.
  - Одна из форм атеизма.
  - Суеверие.
explanation: |
  Детерминизм - это мировоззрение, в котором не существует ни случайностей, ни случайного. Каждое событие является необходимым следствием предшествующих причин, согласно неизменным естественным законам.

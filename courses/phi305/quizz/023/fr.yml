question: Qu'est-ce que le déterminisme ?
answer: Une conception du monde dans lequel il n'y a ni contingence ni hasard.
wrong_answers:
- Une conception du monde déterminé par Dieu.
- Une forme d'athéisme .
- Une superstition.
explanation: |
  Le déterminisme est une conception du monde dans laquelle il n'y a ni contingence ni hasard. Tout événement est la conséquence nécessaire de causes antérieures selon des lois naturelles immuables.

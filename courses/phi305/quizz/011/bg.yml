question: Какво мисли Спиноза за случайността?
answer: Тя не съществува.
wrong_answers:
  - Тя съществува.
  - Той го приравнява с фатализма.
  - Смята го за суеверие.
explanation: |
  За Спиноза няма такова нещо като случайност. Всичко във Вселената се подчинява на необходими и детерминирани закони. Това, което ни изглежда като случайност, е просто резултат от нашето непознаване на истинските причини.
reviewed: false
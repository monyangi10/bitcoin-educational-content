question: स्पिनोज़ा संयोग के बारे में क्या सोचते हैं?
answer: यह अस्तित्व में नहीं है.
wrong_answers:
  - यह मौजूद है।
  - वह इसे भाग्यवाद के समान मानते हैं।
  - वह इसे अंधविश्वास मानते हैं।
explanation: |
  स्पिनोज़ा के लिए, संयोग जैसी कोई चीज़ नहीं है। ब्रह्मांड में हर चीज़ आवश्यक और निश्चित नियमों का पालन करती है। जो हमें संयोग लगता है, वह केवल वास्तविक कारणों के बारे में हमारी अज्ञानता का परिणाम है।
reviewed: false
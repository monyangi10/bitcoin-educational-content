question: Apa pendapat Spinoza tentang peluang?
answer: Tidak ada.
wrong_answers:
  - Itu ada.
  - Ia menyamakannya dengan fatalisme.
  - Dia menganggapnya sebagai takhayul.
explanation: |
  Bagi Spinoza, tidak ada yang namanya kebetulan. Segala sesuatu di alam semesta mengikuti hukum-hukum yang perlu dan pasti. Apa yang tampak bagi kita sebagai kebetulan hanyalah hasil dari ketidaktahuan kita akan sebab-sebab yang sebenarnya.

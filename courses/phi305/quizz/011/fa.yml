question: اسپینوزا درباره شانس چه نظری دارد؟
answer: وجود ندارد.
wrong_answers:
  - وجود دارد.
  - او آن را با جبرگرایی برابر می‌داند.
  - او آن را خرافات می‌داند.
explanation: |
  برای اسپینوزا، چیزی به نام شانس وجود ندارد. همه چیز در جهان از قوانین ضروری و معین پیروی می‌کند. آنچه به نظر ما به عنوان شانس می‌آید، تنها نتیجه ناآگاهی ما از علل واقعی است.
reviewed: false
question: Spinoza nghĩ gì về sự ngẫu nhiên?
answer: Nó không tồn tại.
wrong_answers:
  - Nó tồn tại.
  - Ông so sánh nó với chủ nghĩa định mệnh.
  - Ông coi đó là mê tín.
explanation: |
  Với Spinoza, không hề có sự ngẫu nhiên. Mọi thứ trong vũ trụ đều tuân theo những quy luật tất yếu và xác định. Những gì chúng ta thấy là ngẫu nhiên chỉ đơn thuần là kết quả của sự thiếu hiểu biết về nguyên nhân thực sự.
reviewed: false
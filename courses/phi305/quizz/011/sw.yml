question: Spinoza anafikiria nini kuhusu bahati?
answer: Haipo.
wrong_answers:
  - Ipo.
  - Anailinganisha na fatalism.
  - Anachukulia kuwa ni ushirikina.
explanation: |
  Kwa Spinoza, hakuna kitu kama nafasi. Kila kitu katika ulimwengu kinafuata sheria zinazohitajika na zinazoamua. Kinachoonekana kwetu kama bahati ni matokeo tu ya kutojua kwetu sababu za kweli.

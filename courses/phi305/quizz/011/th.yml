question: สปิโนซาคิดอย่างไรเกี่ยวกับโอกาส?
answer: มันไม่มีอยู่จริง
wrong_answers:
  - มันมีอยู่
  - เขาเปรียบเทียบมันกับการยอมรับชะตากรรม
  - เขาถือว่าเป็นความเชื่องมงาย
explanation: |
  สำหรับสปิโนซา ไม่มีสิ่งที่เรียกว่าโอกาส ทุกสิ่งในจักรวาลเป็นไปตามกฎที่จำเป็นและกำหนดไว้แล้ว สิ่งที่ปรากฏแก่เราเป็นโอกาสนั้นเป็นเพียงผลจากความไม่รู้ของเราต่อสาเหตุที่แท้จริงเท่านั้น
reviewed: false
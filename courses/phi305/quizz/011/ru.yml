question: Что Спиноза думает о случайности?
answer: Его не существует.
wrong_answers:
  - Он существует.
  - Он приравнивает ее к фатализму.
  - Он считает это суеверием.
explanation: |
  Для Спинозы не существует такого понятия, как случайность. Все во Вселенной подчиняется необходимым и детерминированным законам. То, что кажется нам случайностью, - всего лишь результат нашего незнания истинных причин.

question: None Spinoza yiyumvira iki ku bijanye n’amahirwe?
answer: Ntaco kiriho.
wrong_answers:
  - Irahari.
  - Abigereranya n’ugupfa.
  - Abona ko ari ukwemera ibinyoma.
explanation: |
  Ku bwa Spinoza, nta kintu citwa amahirwe kiriho. Ibintu vyose vyo mw’isanzure ry’ikirere bikurikiza amategeko akenewe kandi agenerwa. Ivyo tubona ko ari ivy’ampanuka ni ingaruka gusa y’ukutamenya imvo nyakuri zituma bibaho.

question: Satoshi Nakamoto's White Paper นำเสนออะไร?
answer: วิธีการแลกเปลี่ยนแบบกระจายศูนย์บนอินเทอร์เน็ต
wrong_answers:
  - นโยบายเสรีนิยมใหม่
  - โปรโตคอลการแลกเปลี่ยนแบบรวมศูนย์
  - โปรแกรมทางการเมือง
explanation: |
  เอกสารไวท์เปเปอร์ของ Nakamoto Satoshi นำเสนอ Bitcoin เป็นสื่อกลางการแลกเปลี่ยนแบบกระจายศูนย์บนอินเทอร์เน็ต มันเสนอระบบการชำระเงินอิเล็กทรอนิกส์แบบเพียร์ทูเพียร์ที่ไม่มีหน่วยงานกลาง
reviewed: false
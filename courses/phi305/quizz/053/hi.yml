question: Satoshi नाकामोतो का श्वेत पत्र क्या प्रस्तुत करता है?
answer: इंटरनेट पर Exchange का विकेन्द्रीकृत साधन।
wrong_answers:
  - एक नई उदार नीति.
  - एक केंद्रीकृत Exchange प्रोटोकॉल.
  - एक राजनीतिक कार्यक्रम.
explanation: |
  Satoshi श्वेत पत्र में नाकामोतो ने Bitcoin को इंटरनेट पर Exchange के एक विकेन्द्रीकृत माध्यम के रूप में प्रस्तुत किया है। यह बिना किसी केंद्रीय प्राधिकरण वाली एक पीयर-टू-पीयर इलेक्ट्रॉनिक भुगतान प्रणाली का प्रस्ताव करता है।

question: Co przedstawia biała księga Satoshi Nakamoto?
answer: Zdecentralizowane środki Exchange w Internecie.
wrong_answers:
  - Nowa liberalna polityka.
  - Scentralizowany protokół Exchange.
  - Program polityczny.
explanation: |
  Satoshi White Paper Nakamoto przedstawia Bitcoin jako zdecentralizowane medium Exchange w Internecie. Proponuje elektroniczny system płatności peer-to-peer bez centralnego organu.

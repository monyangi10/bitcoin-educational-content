question: Какво представя Бялата книга на Satoshi Nakamoto?
answer: Децентрализирано средство за обмен в интернет.
wrong_answers:
  - Нова либерална политика.
  - Централизиран протокол за обмен.
  - Политическа програма.
explanation: |
  Бялата книга на Satoshi Накамото представя Bitcoin като децентрализирано средство за обмен в интернет. В нея се предлага електронна платежна система от типа "peer-to-peer" без централен орган.
reviewed: false
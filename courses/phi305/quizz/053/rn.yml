question: None igitabu cera ca Satoshi Nakamoto kivuga iki?
answer: Uburyo bwegerejwe bwa Exchange kuri Internet.
wrong_answers:
  - Politike nshasha y’ubwigenge.
  - Itegeko ry’ubuhinga bwa Exchange ry’imbere.
  - Porogarama ya politike.
explanation: |
  Igitabo cera ca Satoshi Nakamoto yerekana ko Bitcoin ari uburyo bwo gukoresha Exchange ku rubuga rwa Internet. Irasaba uburyo bwo kwishura mu buryo bw’ubuhinga bwa none ata butegetsi buhambaye bufise.

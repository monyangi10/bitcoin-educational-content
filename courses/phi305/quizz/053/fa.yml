question: Satoshi مقاله سفید ناکاموتو چه چیزی را ارائه می‌دهد؟
answer: یک روش غیرمتمرکز Exchange در اینترنت.
wrong_answers:
  - یک سیاست لیبرال جدید.
  - یک پروتکل Exchange متمرکز.
  - یک برنامه سیاسی.
explanation: |
  کاغذ سفید Satoshi ناکاموتو Bitcoin را به عنوان یک رسانه غیرمتمرکز Exchange در اینترنت معرفی می‌کند. این سیستم یک سیستم پرداخت الکترونیکی همتا به همتا را بدون هیچ مرجع مرکزی پیشنهاد می‌دهد.
reviewed: false
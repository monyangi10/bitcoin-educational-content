question: Je! Karatasi Nyeupe ya Satoshi Nakamoto inatoa nini?
answer: Njia iliyogatuliwa ya Exchange kwenye Mtandao.
wrong_answers:
  - Sera mpya ya huria.
  - Itifaki ya kati ya Exchange.
  - Mpango wa kisiasa.
explanation: |
  Satoshi White Paper Nakamoto inawasilisha Bitcoin kama njia iliyogatuliwa ya Exchange kwenye Mtandao. Inapendekeza mfumo wa malipo wa kielektroniki kati ya wenzao na hakuna mamlaka kuu.
reviewed: true

question: Что представляет собой "Белая книга" Satoshi Nakamoto?
answer: Децентрализованное средство Exchange в Интернете.
wrong_answers:
  - Новая либеральная политика.
  - Централизованный протокол Exchange.
  - Политическая программа.
explanation: |
  Satoshi White Paper Накамото представляет Bitcoin как децентрализованную среду Exchange в Интернете. Он предлагает одноранговую электронную платежную систему без центрального органа.
reviewed: false
question: Для Спинозы Бог - это?
answer: Природа.
wrong_answers:
  - Существо, наделенное намерением.
  - Часовщик.
  - Художественная литература.
explanation: |
  Для Спинозы Бог - это Природа (Deus sive Natura). Он не трансцендентное, личное существо, а уникальная, бесконечная субстанция, из которой все существующее является способом или проявлением.

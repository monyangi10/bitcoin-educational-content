question: Voor Spinoza is God?
answer: Natuur.
wrong_answers:
  - Een wezen begiftigd met intentie.
  - Een horlogemaker.
  - Fictie.
explanation: |
  Voor Spinoza is God de Natuur (Deus sive Natura). Hij is geen transcendent, persoonlijk wezen, maar de unieke, oneindige substantie waarvan alles wat bestaat een modus of manifestatie is.

question: Spinozalle Jumala on?
answer: Luonto.
wrong_answers:
  - Olento, jolla on aikomus.
  - Kelloseppä.
  - Fiktio.
explanation: |
  Spinozalle Jumala on luonto (Deus sive Natura). Hän ei ole transsendentti, persoonallinen olento, vaan ainutkertainen, ääretön substanssi, josta kaikki olemassa oleva on muotoa tai ilmenemismuotoa.

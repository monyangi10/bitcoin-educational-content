question: For Spinoza er Gud?
answer: Naturen.
wrong_answers:
  - Et vesen utstyrt med intensjon.
  - En urmaker.
  - Skjønnlitteratur.
explanation: |
  For Spinoza er Gud naturen (Deus sive Natura). Han er ikke et transcendent, personlig vesen, men den unike, uendelige substansen som alt som eksisterer er en modus eller manifestasjon av.

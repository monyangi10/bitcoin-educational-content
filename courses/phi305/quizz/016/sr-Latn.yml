question: Za Spinozu, Bog je?
answer: Priroda.
wrong_answers:
  - Biće obdareno namerom.
  - Časovničar.
  - Fikcija.
explanation: |
  Za Spinozu, Bog je Priroda (Deus sive Natura). On nije transcendentno, lično biće, već jedinstvena, beskonačna supstanca čiji je sve što postoji mod ili manifestacija.

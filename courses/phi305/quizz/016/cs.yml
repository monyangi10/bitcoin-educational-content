question: Pro Spinozu je Bůh?
answer: Příroda.
wrong_answers:
  - Bytost obdařená záměrem.
  - Hodinář.
  - Fikce.
explanation: |
  Pro Spinozu je Bůh příroda (Deus sive Natura). Není transcendentní, osobní bytostí, nýbrž jedinečnou, nekonečnou substancí, jejíž modem či projevem je vše, co existuje.
reviewed: false
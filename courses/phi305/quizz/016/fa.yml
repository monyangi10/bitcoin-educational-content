question: برای اسپینوزا، خدا چیست؟
answer: طبیعت.
wrong_answers:
  - موجودی که دارای نیت است.
  - یک ساعت‌ساز.
  - داستان.
explanation: |
  برای اسپینوزا، خدا طبیعت است (Deus sive Natura). او یک موجود متعالی و شخصی نیست، بلکه جوهر یگانه و بی‌نهایتی است که هر چیزی که وجود دارد، حالتی یا تجلی از آن است.

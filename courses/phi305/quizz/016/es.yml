question: Para Spinoza, Dios es..
answer: Naturaleza.
wrong_answers:
  - Un ser dotado de intención.
  - Un relojero.
  - Ficción.
explanation: |
  Para Spinoza, Dios es la Naturaleza (Deus sive Natura). No es un ser trascendente y personal, sino la sustancia única e infinita de la que todo lo que existe es un modo o manifestación.

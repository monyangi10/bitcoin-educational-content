question: สำหรับสปิโนซา พระเจ้าคือ?
answer: ธรรมชาติ
wrong_answers:
  - สิ่งมีชีวิตที่มีเจตนา
  - ช่างทำนาฬิกา
  - นิยาย
explanation: |
  สำหรับสปิโนซา พระเจ้าคือธรรมชาติ (Deus sive Natura) พระองค์ไม่ใช่สิ่งมีชีวิตที่อยู่เหนือธรรมชาติและมีบุคลิกภาพ แต่เป็นสารที่ไม่ซ้ำใครและไม่มีที่สิ้นสุดซึ่งทุกสิ่งที่มีอยู่เป็นโหมดหรือการแสดงออกของสารนั้น
reviewed: false
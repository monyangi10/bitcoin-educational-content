question: Für Spinoza ist Gott?
answer: Die Natur.
wrong_answers:
  - Ein Wesen, das mit Absicht ausgestattet ist.
  - Ein Uhrmacher.
  - Belletristik.
explanation: |
  Für Spinoza ist Gott die Natur (Deus sive Natura). Er ist kein transzendentes, persönliches Wesen, sondern die einzigartige, unendliche Substanz, von der alles, was existiert, eine Form oder Manifestation ist.
reviewed: false
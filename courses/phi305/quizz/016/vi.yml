question: Đối với Spinoza, Chúa là gì?
answer: Thiên nhiên.
wrong_answers:
  - Một sinh vật được ban cho ý định.
  - Một thợ sửa đồng hồ.
  - Viễn tưởng.
explanation: |
  Đối với Spinoza, Chúa là Thiên nhiên (Deus sive Natura). Ngài không phải là một thực thể siêu việt, cá nhân, mà là bản thể duy nhất, vô hạn mà mọi vật hiện hữu đều là một hình thái hay biểu hiện.

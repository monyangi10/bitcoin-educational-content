question: Bagi Spinoza, Tuhan adalah?
answer: Alam.
wrong_answers:
  - Makhluk yang diberkahi dengan niat.
  - Seorang pembuat jam tangan.
  - Fiksi.
explanation: |
  Bagi Spinoza, Tuhan adalah Alam (Deus sive Natura). Dia bukanlah makhluk pribadi yang transenden, tetapi substansi yang unik dan tak terbatas, yang mana segala sesuatu yang ada adalah modus atau manifestasi.
reviewed: false
question: Para Spinoza, Deus é?
answer: Natureza.
wrong_answers:
  - Um ser dotado de intenção.
  - Um relojoeiro.
  - Ficção.
explanation: |
  Para Spinoza, Deus é a Natureza (Deus sive Natura). Ele não é um ser transcendente e pessoal, mas a substância única e infinita da qual tudo o que existe é um modo ou manifestação.

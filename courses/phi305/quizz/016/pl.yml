question: Dla Spinozy Bóg jest?
answer: Natura.
wrong_answers:
  - Istota obdarzona intencją.
  - Zegarmistrz.
  - Fikcja.
explanation: |
  Dla Spinozy Bóg jest Naturą (Deus sive Natura). Nie jest transcendentną, osobową istotą, ale unikalną, nieskończoną substancją, której wszystko, co istnieje, jest sposobem lub przejawem.
reviewed: false
question: स्पिनोज़ा के लिए ईश्वर क्या है?
answer: प्रकृति।
wrong_answers:
  - एक ऐसा प्राणी जो इरादे से संपन्न है।
  - एक घड़ीसाज़.
  - कल्पना।
explanation: |
  स्पिनोज़ा के लिए, ईश्वर प्रकृति (देवस सिवे नेचुरा) है। वह कोई पारलौकिक, व्यक्तिगत सत्ता नहीं, बल्कि एक अद्वितीय, अनंत पदार्थ है जिसकी हर विद्यमान वस्तु एक विधा या अभिव्यक्ति है।
reviewed: false
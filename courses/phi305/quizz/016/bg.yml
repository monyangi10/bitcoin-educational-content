question: За Спиноза Бог е?
answer: Природа.
wrong_answers:
  - Същество, надарено с намерение.
  - Часовникар.
  - Художествена литература.
explanation: |
  За Спиноза Бог е природата (Deus sive Natura). Той не е трансцендентно, персонално същество, а уникална, безкрайна субстанция, чието проявление е всичко съществуващо.

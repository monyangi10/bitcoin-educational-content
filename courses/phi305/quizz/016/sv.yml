question: För Spinoza är Gud..
answer: Natur.
wrong_answers:
  - En varelse som är utrustad med avsikt.
  - En urmakare.
  - Fiktion.
explanation: |
  För Spinoza är Gud naturen (Deus sive Natura). Han är inte en transcendent, personlig varelse, utan den unika, oändliga substans av vilken allt som existerar är ett sätt eller en manifestation.

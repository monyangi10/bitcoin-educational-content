question: Shughuli ya kikazi ya Spinoza ilikuwa nini?
answer: Kipolishi kwa mawanda ya unajimu.
wrong_answers:
  - Muuzaji reja reja.
  - Profesa wa falsafa.
  - Mchapishaji.
explanation: |
  Ili kujiruzuku, Spinoza alifanya kazi ya kung'arisha lenzi kwa darubini za astronomia. Kazi hii ya mikono ilimwezesha kudumisha uhuru wake wa kiakili huku akichangia maendeleo ya kisayansi ya wakati wake.

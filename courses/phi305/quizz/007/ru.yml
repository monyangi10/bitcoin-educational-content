question: Какова была профессиональная деятельность Спинозы?
answer: Полировщик для астрономических прицелов.
wrong_answers:
  - Розничный продавец.
  - Профессор философии.
  - Издатель.
explanation: |
  Чтобы прокормить себя, Спиноза работал полировщиком линз для астрономических телескопов. Этот ручной труд позволял ему сохранять интеллектуальную независимость и в то же время способствовать научному прогрессу своего времени.

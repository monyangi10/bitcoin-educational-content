question: Каква е била професионалната дейност на Спиноза?
answer: Полираща машина за лещи за астрономически телескопи.
wrong_answers:
  - Търговец на дребно.
  - Професор по философия.
  - Издател.
explanation: |
  За да се издържа, Спиноза работи като полировач на лещи за астрономически телескопи. Този физически труд му позволява да запази интелектуалната си независимост, като същевременно допринася за научния прогрес на своето време.
reviewed: false
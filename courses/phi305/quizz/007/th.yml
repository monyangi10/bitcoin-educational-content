question: กิจกรรมทางวิชาชีพของสปิโนซาคืออะไร?
answer: เครื่องขัดเลนส์สำหรับกล้องโทรทรรศน์ดาราศาสตร์
wrong_answers:
  - ผู้ค้าปลีก
  - ศาสตราจารย์ด้านปรัชญา
  - สำนักพิมพ์
explanation: |
  เพื่อสนับสนุนตัวเอง สปิโนซาทำงานเป็นช่างขัดเลนส์สำหรับกล้องโทรทรรศน์ดาราศาสตร์ งานแรงงานนี้ทำให้เขาสามารถรักษาความเป็นอิสระทางปัญญาในขณะที่มีส่วนร่วมในการพัฒนาทางวิทยาศาสตร์ของยุคสมัยของเขา
reviewed: false
question: Was war Spinozas berufliche Tätigkeit?
answer: Polierer für astronomische Zielfernrohre.
wrong_answers:
  - Einzelhändler.
  - Professor für Philosophie.
  - Herausgeber.
explanation: |
  Um seinen Lebensunterhalt zu bestreiten, arbeitete Spinoza als Linsenpolierer für astronomische Teleskope. Diese manuelle Arbeit ermöglichte es ihm, seine geistige Unabhängigkeit zu bewahren und gleichzeitig zum wissenschaftlichen Fortschritt seiner Zeit beizutragen.
reviewed: false
question: Hoạt động chuyên môn của Spinoza là gì?
answer: Máy đánh bóng cho kính thiên văn.
wrong_answers:
  - Nhà bán lẻ.
  - Giáo sư triết học.
  - Nhà xuất bản.
explanation: |
  Để kiếm sống, Spinoza làm thợ đánh bóng thấu kính cho kính thiên văn. Công việc chân tay này giúp ông duy trì sự độc lập về trí tuệ, đồng thời đóng góp vào sự tiến bộ khoa học của thời đại mình.
reviewed: false
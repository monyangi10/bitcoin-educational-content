question: Na czym polegała działalność zawodowa Spinozy?
answer: Polerka do lunet astronomicznych.
wrong_answers:
  - Sprzedawca detaliczny.
  - Profesor filozofii.
  - Wydawca.
explanation: |
  Aby się utrzymać, Spinoza pracował jako polerowacz soczewek do teleskopów astronomicznych. Ta praca fizyczna pozwoliła mu zachować intelektualną niezależność, jednocześnie przyczyniając się do postępu naukowego swoich czasów.
reviewed: false
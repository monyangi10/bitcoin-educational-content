question: Qual era a atividade profissional de Spinoza?
answer: Polidor para astrónomos.
wrong_answers:
  - Retalhista.
  - Professor de filosofia.
  - Editora.
explanation: |
  Para se sustentar, Spinoza trabalhou como polidor de lentes de telescópios astronómicos. Este trabalho manual permitiu-lhe manter a sua independência intelectual e contribuir para o progresso científico do seu tempo.

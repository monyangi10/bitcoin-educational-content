question: فعالیت حرفه‌ای اسپینوزا چه بود؟
answer: پولیش‌دهنده برای تلسکوپ‌های نجومی.
wrong_answers:
  - خرده‌فروش.
  - استاد فلسفه.
  - ناشر.
explanation: |
  برای تأمین معاش خود، اسپینوزا به عنوان یک تراش‌دهنده عدسی برای تلسکوپ‌های نجومی کار می‌کرد. این کار یدی به او امکان می‌داد تا استقلال فکری خود را حفظ کند و در عین حال به پیشرفت علمی زمان خود کمک کند.
reviewed: false
question: Jaká byla Spinozova profesní činnost?
answer: Leštička pro astronomické dalekohledy.
wrong_answers:
  - Prodejce.
  - Profesor filozofie.
  - Vydavatel: Městská knihovna v Praze Vydavatel: Městská knihovna v Praze
explanation: |
  Aby se uživil, pracoval Spinoza jako leštič čoček astronomických dalekohledů. Tato manuální práce mu umožnila zachovat si intelektuální nezávislost a zároveň přispět k vědeckému pokroku své doby.

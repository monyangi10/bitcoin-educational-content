question: Hva var Spinozas yrkesaktivitet?
answer: Poleringsmaskin for astronomiske kikkertsikter.
wrong_answers:
  - Forhandler.
  - Professor i filosofi.
  - Utgiver.
explanation: |
  For å forsørge seg selv arbeidet Spinoza som polerer av linser til astronomiske teleskoper. Dette manuelle arbeidet gjorde det mulig for ham å opprettholde sin intellektuelle uavhengighet, samtidig som han bidro til den vitenskapelige utviklingen i sin samtid.

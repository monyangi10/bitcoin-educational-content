question: Wat was Spinoza's professionele activiteit?
answer: Polijstmachine voor astronomische telescopen.
wrong_answers:
  - Verkoper.
  - Hoogleraar filosofie.
  - Uitgever.
explanation: |
  Om in zijn levensonderhoud te voorzien werkte Spinoza als lenzenslijper voor astronomische telescopen. Dit handwerk stelde hem in staat om zijn intellectuele onafhankelijkheid te behouden en tegelijkertijd bij te dragen aan de wetenschappelijke vooruitgang van zijn tijd.
reviewed: false
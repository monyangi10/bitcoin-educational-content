question: Quelle activité professionnelle Spinoza exerçait-il ?
answer: Polisseur de lunettes d'astronomie.
wrong_answers:
- Commerçant.
- Professeur de philosophie.
- Éditeur.
explanation: |
  Pour subvenir à ses besoins, Spinoza exerçait le métier de polisseur de lentilles pour lunettes d'astronomie. Ce travail manuel lui permettait de maintenir son indépendance intellectuelle tout en contribuant au progrès scientifique de son époque.
reviewed: false

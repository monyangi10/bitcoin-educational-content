question: None igikorwa c’umwuga ca Spinoza cari ikihe?
answer: Igikoresho co gusukura ivy’inyenyeri.
wrong_answers:
  - Umucuruzi.
  - Umwigisha w’ivy’ubuhinga bwa filozofiya.
  - Umusohozi.
explanation: |
  Kugira ngo Spinoza yitunga, yarakora igikorwa co gusukura amatara y’ibikoresho vy’inyenyeri. Uwo murimo w’amaboko waratumye aguma yigenga mu vy’ubwenge mu gihe yariko aragira ico akoze ku bijanye n’iterambere ry’ubuhinga ryo mu gihe ciwe.

question: Apa aktivitas profesional Spinoza?
answer: Penggosok untuk lingkup astronomi.
wrong_answers:
  - Pengecer.
  - Profesor filsafat.
  - Penerbit.
explanation: |
  Untuk menghidupi dirinya sendiri, Spinoza bekerja sebagai pemoles lensa untuk teleskop astronomi. Pekerjaan kasar ini memungkinkannya untuk mempertahankan kemandirian intelektualnya sambil berkontribusi pada kemajuan ilmiah pada masanya.

question: स्पिनोज़ा की व्यावसायिक गतिविधि क्या थी?
answer: खगोल विज्ञान के लिए पालिशगर.
wrong_answers:
  - खुदरा विक्रेता.
  - दर्शनशास्त्र के प्रोफेसर.
  - प्रकाशक.
explanation: |
  अपनी आजीविका चलाने के लिए, स्पिनोज़ा खगोलीय दूरबीनों के लिए लेंस पॉलिशर का काम करते थे। इस शारीरिक श्रम ने उन्हें अपनी बौद्धिक स्वतंत्रता बनाए रखने के साथ-साथ अपने समय की वैज्ञानिक प्रगति में भी योगदान दिया।
reviewed: false
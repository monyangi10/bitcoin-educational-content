question: Milline oli Spinoza kutsetegevus?
answer: Astronoomiakaugude poleerija.
wrong_answers:
  - Jaemüüja.
  - Filosoofiaprofessor.
  - Väljaandja.
explanation: |
  Et end ära elatada, töötas Spinoza astronoomiliste teleskoopide läätsepoleerijana. See füüsiline töö võimaldas tal säilitada oma intellektuaalset sõltumatust, aidates samal ajal kaasa oma aja teaduslikule arengule.
reviewed: false
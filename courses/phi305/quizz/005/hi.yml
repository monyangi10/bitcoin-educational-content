question: किस वैज्ञानिक का मानना ​​है कि गणित ब्रह्मांड की भाषा है?
answer: गैलीलियो.
wrong_answers:
  - केप्लर.
  - न्यूटन.
  - कोपरनिकस.
explanation: |
  गैलीलियो अपने इस कथन के लिए प्रसिद्ध हैं कि "प्रकृति की पुस्तक गणितीय भाषा में लिखी गई है"। इस दृष्टिकोण का आधुनिक विज्ञान और तर्कवादी दर्शन, जिसमें स्पिनोज़ा का दर्शन भी शामिल है, पर गहरा प्रभाव पड़ा है।
reviewed: false
question: Кто из ученых считает, что математика - это язык Вселенной?
answer: Галилей.
wrong_answers:
  - Кеплер.
  - Ньютон.
  - Коперник.
explanation: |
  Галилей известен своим утверждением, что "книга природы написана на математическом языке". Это утверждение оказало глубокое влияние на современную науку и рационалистическую философию, в том числе на философию Спинозы.

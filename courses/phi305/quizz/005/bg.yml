question: Кой учен смята, че математиката е езикът на Вселената?
answer: Галилео.
wrong_answers:
  - Кеплер.
  - Нютон.
  - Коперник.
explanation: |
  Галилей е известен с твърдението си, че "книгата на природата е написана на математически език". Това виждане оказва огромно влияние върху съвременната наука и рационалистичната философия, включително тази на Спиноза.
reviewed: false
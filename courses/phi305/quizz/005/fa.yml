question: کدام دانشمند معتقد است که ریاضیات زبان جهان است؟
answer: گالیله.
wrong_answers:
  - کپلر.
  - نیوتن.
  - کپرنیکوس.
explanation: |
  گالیله به خاطر ادعای خود که "کتاب طبیعت به زبان ریاضی نوشته شده است" مشهور است. این دیدگاه تأثیر عمیقی بر علم مدرن و فلسفه عقل‌گرایانه، از جمله فلسفه اسپینوزا، داشته است.
reviewed: false
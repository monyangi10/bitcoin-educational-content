question: Ni uwuhe munyasiyansi yizera ko imibare ari ururimi rw’ibiriho vyose?
answer: Galilée.
wrong_answers:
  - Kepler.
  - Nyutoni.
  - Koperinik.
explanation: |
  Galilée azwi cane kubera ivyo yavuze ko "igitabu c'ibidukikije canditswe mu rurimi rw'imibare". Iryo yerekwa ryaragize akosho kanini kuri siyansi yo muri iki gihe no kuri filozofiya y’abanyabwenge, harimwo n’iya Spinoza.
reviewed: false
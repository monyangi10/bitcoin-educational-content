question: นักวิทยาศาสตร์คนใดเชื่อว่าคณิตศาสตร์เป็นภาษาของจักรวาล?
answer: กาลิเลโอ
wrong_answers:
  - เคปเลอร์
  - นิวตัน
  - โคเปอร์นิคัส
explanation: |
  กาลิเลโอมีชื่อเสียงจากการยืนยันของเขาว่า "หนังสือแห่งธรรมชาติถูกเขียนด้วยภาษาคณิตศาสตร์" วิสัยทัศน์นี้มีอิทธิพลอย่างลึกซึ้งต่อวิทยาศาสตร์สมัยใหม่และปรัชญาแนวเหตุผลนิยม รวมถึงของสปิโนซาด้วย
reviewed: false
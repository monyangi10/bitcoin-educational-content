question: Como é que o Spinozismo é frequentemente descrito?
answer: A filosofia da alegria.
wrong_answers:
  - A filosofia da lucidez.
  - A filosofia da esperança.
  - A filosofia do vazio.
explanation: |
  O Spinozismo é frequentemente descrito como a filosofia da alegria. A alegria é o afeto fundamental que aumenta a nossa capacidade de agir e nos aproxima da beatitude, o objetivo último da ética.

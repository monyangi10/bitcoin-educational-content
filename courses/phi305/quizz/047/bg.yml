question: Как често се описва спинозизмът?
answer: Философията на радостта.
wrong_answers:
  - Философията на яснотата.
  - Философията на надеждата.
  - Философията на празнотата.
explanation: |
  Спиноцизмът често е определян като философия на радостта. Радостта е основният афект, който увеличава силата ни за действие и ни приближава към блаженството - крайната цел на етиката.

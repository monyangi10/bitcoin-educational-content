question: स्पिनोज़िज़्म का वर्णन अक्सर कैसे किया जाता है?
answer: आनन्द का दर्शन.
wrong_answers:
  - स्पष्टता का दर्शन.
  - आशा का दर्शन.
  - शून्यता का दर्शन.
explanation: |
  स्पिनोज़िज़्म को अक्सर आनंद का दर्शन कहा जाता है। आनंद वह मूलभूत प्रभाव है जो हमारी कार्य करने की शक्ति को बढ़ाता है और हमें परमानंद के करीब लाता है, जो नैतिकता का अंतिम लक्ष्य है।

question: Jak często opisywany jest Spinozyzm?
answer: Filozofia radości.
wrong_answers:
  - Filozofia jasności.
  - Filozofia nadziei.
  - Filozofia pustki.
explanation: |
  Spinozyzm jest często opisywany jako filozofia radości. Radość jest fundamentalnym afektem, który zwiększa naszą siłę do działania i przybliża nas do błogosławieństwa, ostatecznego celu etyki.

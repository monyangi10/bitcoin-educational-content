question: Как часто описывают спинозизм?
answer: Философия радости.
wrong_answers:
  - Философия ясности.
  - Философия надежды.
  - Философия пустоты.
explanation: |
  Спинозизм часто описывают как философию радости. Радость - это фундаментальный аффект, который увеличивает нашу способность действовать и приближает нас к блаженству, конечной цели этики.

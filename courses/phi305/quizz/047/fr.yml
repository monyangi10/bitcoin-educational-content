question: Comment le spinozisme est-il souvent décrit ?
answer: La philosophie de la joie.
wrong_answers:
- La philosophie de la lucidité.
- La philosophie de l'espoir.
- La philosophie du vide.
explanation: |
  Le spinozisme est souvent décrit comme la philosophie de la joie. La joie est l'affect fondamental qui augmente notre puissance d'agir et nous rapproche de la béatitude, but ultime de l'Éthique.

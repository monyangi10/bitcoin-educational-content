question: Come viene spesso descritto lo spinozismo?
answer: La filosofia della gioia.
wrong_answers:
  - La filosofia della lucidità.
  - La filosofia della speranza.
  - La filosofia del vuoto.
explanation: |
  Lo Spinozismo viene spesso descritto come la filosofia della gioia. La gioia è l'affetto fondamentale che aumenta il nostro potere di agire e ci avvicina alla beatitudine, il fine ultimo dell'Etica.

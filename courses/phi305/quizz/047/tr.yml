question: Spinozacılık genellikle nasıl tanımlanır?
answer: Neşenin felsefesi.
wrong_answers:
  - Berraklık felsefesi.
  - Umut felsefesi.
  - Boşluğun felsefesi.
explanation: |
  Spinozacılık genellikle sevinç felsefesi olarak tanımlanır. Neşe, eyleme gücümüzü artıran ve bizi Etiğin nihai amacı olan yüceliğe yaklaştıran temel duygulanımdır.
reviewed: false
question: Hvordan beskrives ofte spinozismen?
answer: Gledens filosofi.
wrong_answers:
  - Klarhetens filosofi.
  - Filosofien om håp.
  - Tomhetens filosofi.
explanation: |
  Spinozismen blir ofte beskrevet som gledens filosofi. Gleden er den grunnleggende affekten som øker vår handlekraft og bringer oss nærmere saligheten, etikkens endelige mål.

question: Hoe wordt het Spinozisme vaak beschreven?
answer: De filosofie van vreugde.
wrong_answers:
  - De filosofie van helderheid.
  - De filosofie van hoop.
  - De filosofie van leegte.
explanation: |
  Spinozisme wordt vaak beschreven als de filosofie van de vreugde. Vreugde is het fundamentele affect dat onze daadkracht vergroot en ons dichter bij de zaligheid brengt, het uiteindelijke doel van de Ethiek.

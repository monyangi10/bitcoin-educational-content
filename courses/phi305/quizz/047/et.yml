question: Kuidas kirjeldatakse sageli spinozismi?
answer: Rõõmufilosoofia.
wrong_answers:
  - Selguse filosoofia.
  - Lootuse filosoofia.
  - Tühjuse filosoofia.
explanation: |
  Spinozismi kirjeldatakse sageli kui rõõmu filosoofiat. Rõõm on põhiline afekt, mis suurendab meie tegutsemisvõimet ja viib meid lähemale õndsusele, eetika lõppeesmärgile.

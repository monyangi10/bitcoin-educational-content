question: None ubuspinozi budondorwa gute kenshi?
answer: Filozofiya y’umunezero.
wrong_answers:
  - Filozofiya y’ugutahura ibintu.
  - Filozofiya y’icizigiro.
  - Filozofiya y’ubusa.
explanation: |
  Ubuspinozisme akenshi buvugwa ko ari filozofiya y’umunezero. Umunezero ni wo ngaruka nyamukuru yongera ububasha bwacu bwo gukora kandi ikatwegera umunezero, intumbero nyamukuru y’Inyifato runtu.

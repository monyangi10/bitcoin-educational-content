question: ¿Cómo se describe a menudo el spinozismo?
answer: La filosofía de la alegría.
wrong_answers:
  - La filosofía de la lucidez.
  - La filosofía de la esperanza.
  - La filosofía del vacío.
explanation: |
  El spinozismo se describe a menudo como la filosofía de la alegría. La alegría es el afecto fundamental que aumenta nuestro poder de acción y nos acerca a la beatitud, fin último de la Ética.

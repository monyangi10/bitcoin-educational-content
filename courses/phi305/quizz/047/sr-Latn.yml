question: Kako se Spinozizam često opisuje?
answer: Filozofija radosti.
wrong_answers:
  - Filozofija lucidnosti.
  - Filozofija nade.
  - Filozofija praznine.
explanation: |
  Spinozizam se često opisuje kao filozofija radosti. Radost je temeljni afekt koji povećava našu moć delovanja i približava nas blaženstvu, krajnjem cilju Etike.

question: Jak je spinozismus často popisován?
answer: Filozofie radosti.
wrong_answers:
  - Filozofie jasnosti.
  - Filozofie naděje.
  - Filozofie prázdnoty.
explanation: |
  Spinozismus je často označován za filozofii radosti. Radost je základní afekt, který zvyšuje naši sílu k jednání a přibližuje nás k blaženosti, konečnému cíli etiky.

question: اسپینوزیسم اغلب چگونه توصیف می‌شود؟
answer: فلسفه شادی.
wrong_answers:
  - فلسفه وضوح.
  - فلسفه امید.
  - فلسفه‌ی خلأ.
explanation: |
  اسپینوزیسم اغلب به عنوان فلسفه شادی توصیف می‌شود. شادی، تأثیر بنیادی است که قدرت ما را برای عمل افزایش می‌دهد و ما را به سعادت، هدف نهایی اخلاق، نزدیک‌تر می‌کند.
reviewed: false
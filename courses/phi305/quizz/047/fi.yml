question: Miten spinozismia usein kuvataan?
answer: Ilon filosofia.
wrong_answers:
  - Selkeyden filosofia.
  - Toivon filosofia.
  - Tyhjyyden filosofia.
explanation: |
  Spinozismia kuvataan usein ilon filosofiaksi. Ilo on se perustavanlaatuinen affekti, joka lisää toimintakykyämme ja tuo meidät lähemmäs autuutta, joka on etiikan perimmäinen päämäärä.

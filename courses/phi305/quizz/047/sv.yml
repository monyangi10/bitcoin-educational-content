question: Hur beskrivs ofta spinozismen?
answer: Glädjens filosofi.
wrong_answers:
  - Klarsynthetens filosofi.
  - Hoppets filosofi.
  - Tomhetens filosofi.
explanation: |
  Spinozismen beskrivs ofta som glädjens filosofi. Glädje är den grundläggande känsla som ökar vår handlingskraft och för oss närmare saligheten, etikens yttersta mål.

question: Spinozism มักถูกอธิบายว่าอย่างไร?
answer: ปรัชญาแห่งความสุข
wrong_answers:
  - ปรัชญาแห่งความชัดเจน
  - ปรัชญาแห่งความหวัง
  - ปรัชญาแห่งความว่างเปล่า
explanation: |
  สปิโนซิซึมมักถูกอธิบายว่าเป็นปรัชญาแห่งความสุข ความสุขเป็นอารมณ์พื้นฐานที่เพิ่มพลังในการกระทำของเราและนำเราเข้าใกล้ความสุขอันสูงสุด ซึ่งเป็นเป้าหมายสูงสุดของจริยธรรม
reviewed: false
question: Bagaimana Spinozisme sering digambarkan?
answer: Filosofi kegembiraan.
wrong_answers:
  - Filosofi kejernihan.
  - Filosofi harapan.
  - Filosofi kekosongan.
explanation: |
  Spinozisme sering digambarkan sebagai filosofi sukacita. Sukacita adalah pengaruh mendasar yang meningkatkan kekuatan kita untuk bertindak dan membawa kita lebih dekat kepada kebahagiaan, tujuan akhir dari Etika.

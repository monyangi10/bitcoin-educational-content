question: Chủ nghĩa Spinoza thường được mô tả như thế nào?
answer: Triết lý của niềm vui.
wrong_answers:
  - Triết lý về sự sáng suốt.
  - Triết lý của hy vọng.
  - Triết lý về sự trống rỗng.
explanation: |
  Chủ nghĩa Spinoza thường được mô tả là triết lý của niềm vui. Niềm vui là cảm xúc cơ bản giúp tăng cường sức mạnh hành động và đưa chúng ta đến gần hơn với chân phúc, mục tiêu tối thượng của Đạo đức.
reviewed: false
question: Wie wird der Spinozismus oft beschrieben?
answer: Die Philosophie der Freude.
wrong_answers:
  - Die Philosophie der Klarheit.
  - Die Philosophie der Hoffnung.
  - Die Philosophie der Leere.
explanation: |
  Der Spinozismus wird oft als die Philosophie der Freude bezeichnet. Freude ist der grundlegende Affekt, der unsere Handlungsfähigkeit erhöht und uns der Seligkeit, dem Endziel der Ethik, näher bringt.
reviewed: false
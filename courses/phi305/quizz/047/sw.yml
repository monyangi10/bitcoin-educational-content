question: Spinozism mara nyingi huelezewaje?
answer: Falsafa ya furaha.
wrong_answers:
  - Falsafa ya uwazi.
  - Falsafa ya matumaini.
  - Falsafa ya utupu.
explanation: |
  Spinozism mara nyingi huelezewa kama falsafa ya furaha. Furaha ndio athari ya kimsingi ambayo huongeza uwezo wetu wa kutenda na hutuleta karibu na hali ya moyo, lengo kuu la Maadili.
reviewed: true

question: سنت-اگوستین کیست؟
answer: یکی از پدران کلیسا.
wrong_answers:
  - یک فیلسوف از دوران روشنگری.
  - یک ستاره‌شناس.
  - یک مخترع.
explanation: |
  سنت آگوستین (354-430) یکی از پدران کلیسا است. او به عنوان فیلسوف و الهی‌دان، با آثاری همچون 'اعترافات' و 'شهر خدا' تأثیر عمیقی بر تفکر مسیحیت غربی گذاشت.
reviewed: false
question: सेंट-ऑगस्टिन कौन है?
answer: चर्च के पिताओं में से एक.
wrong_answers:
  - ज्ञानोदय के एक दार्शनिक.
  - एक खगोलशास्त्री.
  - एक आविष्कारक.
explanation: |
  संत ऑगस्टाइन (354-430) चर्च के धर्मगुरुओं में से एक हैं। एक दार्शनिक और धर्मशास्त्री होने के नाते, उन्होंने 'द कन्फेशंस' और 'द सिटी ऑफ़ गॉड' जैसी रचनाओं से पश्चिमी ईसाई विचारधारा को गहराई से प्रभावित किया।
reviewed: false
question: None mweranda-Augustin ni nde?
answer: Umwe mu Bavyeyi b’Ekleziya.
wrong_answers:
  - Umunyabwenge wo mu gihe c’Umuco.
  - Umuhinga mu vy’inyenyeri.
  - Umuhinguzi.
explanation: |
  Umweranda Augustin (354-430) ni umwe mu Bavyeyi ba Ekleziya. Umunyabwenge n'umunyatewolojiya, yarahinduye cane ivyiyumviro vya gikirisu vyo mu Burengero akoresheje ibitabu nka 'Ivyatura' na 'Igisagara c'Imana'.

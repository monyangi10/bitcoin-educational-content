question: ใครคือ Saint-Augustin?
answer: หนึ่งในบิดาแห่งคริสตจักร
wrong_answers:
  - นักปรัชญาแห่งยุคเรืองปัญญา
  - นักดาราศาสตร์
  - นักประดิษฐ์
explanation: |
  นักบุญออกัสติน (354-430) เป็นหนึ่งในบิดาแห่งศาสนจักร นักปรัชญาและนักเทววิทยา เขามีอิทธิพลอย่างลึกซึ้งต่อความคิดของคริสเตียนตะวันตกด้วยผลงานเช่น 'The Confessions' และ 'The City of God'
reviewed: false
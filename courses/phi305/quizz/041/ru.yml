question: Кто такой Сен-Огюстен?
answer: Один из Отцов Церкви.
wrong_answers:
  - Философ эпохи Просвещения.
  - Астроном.
  - Изобретатель.
explanation: |
  Святой Августин (354-430) - один из Отцов Церкви. Философ и теолог, он оказал глубокое влияние на западную христианскую мысль, написав такие произведения, как "Исповедь" и "Град Божий".

question: Saint-Augustin là ai?
answer: Một trong những Giáo phụ của Giáo hội.
wrong_answers:
  - Một triết gia của thời kỳ Khai sáng.
  - Một nhà thiên văn học.
  - Một nhà phát minh.
explanation: |
  Thánh Augustine (354-430) là một trong những Giáo phụ của Giáo hội Công giáo. Là một triết gia và nhà thần học, ngài đã có ảnh hưởng sâu sắc đến tư tưởng Kitô giáo phương Tây với các tác phẩm như 'Lời Tự Thú' và 'Thành Đô của Chúa'.
reviewed: false
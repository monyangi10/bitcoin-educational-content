question: Кой е Сен-Огюстен?
answer: Един от отците на Църквата.
wrong_answers:
  - Философ от епохата на Просвещението.
  - Астроном.
  - Изобретател.
explanation: |
  Свети Августин (354-430) е един от отците на Църквата. Философ и богослов, той оказва огромно влияние върху западната християнска мисъл с произведения като "Изповеди" и "Божият град".
reviewed: false
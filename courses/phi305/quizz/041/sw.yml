question: Saint-Augustin ni nani?
answer: Mmoja wa Mababa wa Kanisa.
wrong_answers:
  - Mwanafalsafa wa Mwangaza.
  - Mwanaastronomia.
  - Mvumbuzi.
explanation: |
  Mtakatifu Augustino (354-430) ni mmoja wa baba wa Kanisa. Mwanafalsafa na mwanatheolojia, alishawishi sana fikira za Kikristo za Magharibi kwa kazi kama vile 'The Confessions' na 'The City of God'.
reviewed: true

question: Co pro Spinozu znamená finalismus?
answer: Zaměňování důsledků věcí za jejich příčiny.
wrong_answers:
  - Víra ve fatalismus.
  - Myslí si, že je po všem.
  - Filozof.
explanation: |
  Pro Spinozu finalismus znamená zaměňovat účinky věcí za jejich příčiny. Znamená to vysvětlovat jevy jejich domnělými důsledky, a nikoli jejich skutečnými příčinami, což je chyba v uvažování.
reviewed: false
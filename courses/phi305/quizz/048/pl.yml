question: Co finalizm oznacza dla Spinozy?
answer: Mylenie skutków rzeczy z ich przyczynami.
wrong_answers:
  - Wiara w fatalizm.
  - Myśląc, że to koniec.
  - Filozof.
explanation: |
  Dla Spinozy finalizm oznacza mylenie skutków rzeczy z ich przyczynami. Oznacza to wyjaśnianie zjawisk za pomocą ich domniemanych rezultatów, a nie ich rzeczywistych przyczyn, co jest błędem w rozumowaniu.
reviewed: false
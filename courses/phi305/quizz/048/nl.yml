question: Wat betekent finalisme voor Spinoza?
answer: De gevolgen van dingen verwarren met hun oorzaken.
wrong_answers:
  - Geloven in fatalisme.
  - Denken dat het allemaal voorbij is.
  - Filosoof.
explanation: |
  Voor Spinoza betekent finalisme het verwarren van de gevolgen van dingen met hun oorzaken. Het betekent het verklaren van verschijnselen door hun veronderstelde resultaten in plaats van door hun werkelijke oorzaken, een redeneerfout.
reviewed: false
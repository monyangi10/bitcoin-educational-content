question: None ugushika ku mpera bisobanura iki kuri Spinoza?
answer: Kwihenda ingaruka z’ibintu kubera imvo zavyo.
wrong_answers:
  - Kwemera ko umuntu apfa.
  - Kwiyumvira ko vyose vyarangiye.
  - Umunyabwenge.
explanation: |
  Ku bwa Spinoza, ugushika ku mpera bisigura kwihenda ingaruka z’ibintu n’imvo zavyo. Bisigura gusigura ibintu bibaho biciye ku vyo umuntu yiyumvira ko bivamwo aho gusigura ivyo vy’ukuri bituma bibaho, ivyo bikaba ari ikosa ryo gutekereza ku bintu.

question: Vad innebär finalism för Spinoza?
answer: Att förväxla effekter av saker med deras orsaker.
wrong_answers:
  - Att tro på fatalism.
  - Tror att allt är över.
  - Filosof.
explanation: |
  För Spinoza innebär finalism att man misstar sakers effekter för deras orsaker. Det innebär att man förklarar fenomen med deras förmodade resultat snarare än med deras verkliga orsaker, vilket är ett fel i resonemanget.
reviewed: false
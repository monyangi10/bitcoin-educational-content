question: Hva betyr finalisme for Spinoza?
answer: Å forveksle tingenes virkninger med deres årsaker.
wrong_answers:
  - Å tro på fatalisme.
  - Å tro at alt er over.
  - Filosof.
explanation: |
  For Spinoza betyr finalisme å forveksle tingenes virkninger med deres årsaker. Det betyr å forklare fenomener ut fra deres antatte resultater snarere enn ut fra deres virkelige årsaker, en tankefeil.
reviewed: false
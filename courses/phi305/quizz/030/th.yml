question: ใครกล่าวว่า "มนุษย์ไม่ใช่อาณาจักรภายในอาณาจักร"?
answer: สปิโนซา
wrong_answers:
  - เดส์การ์ต
  - ไอน์สไตน์
  - แซงต์-โอกุสแตง
explanation: |
  สปิโนซาเป็นผู้ที่กล่าวว่า "มนุษย์ไม่ใช่อาณาจักรภายในอาณาจักร" วลีนี้แสดงถึงแนวคิดที่ว่ามนุษย์ไม่ได้แยกออกจากธรรมชาติ แต่เป็นส่วนสำคัญของมัน อยู่ภายใต้กฎเดียวกัน
reviewed: false
question: چه کسی می‌گوید که "انسان امپراتوری درون یک امپراتوری نیست"؟
answer: اسپینوزا.
wrong_answers:
  - دکارت.
  - اینشتین.
  - سنت-آگوستین.
explanation: |
  اسپینوزا بود که اظهار داشت "انسان امپراتوری درون یک امپراتوری نیست". این عبارت بیانگر این ایده است که انسان از طبیعت جدا نیست، بلکه بخشی جدایی‌ناپذیر از آن است و تحت همان قوانین قرار دارد.
reviewed: false
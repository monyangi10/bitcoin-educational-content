question: कौन कहता है कि "मनुष्य एक साम्राज्य के भीतर एक साम्राज्य नहीं है"?
answer: स्पिनोज़ा.
wrong_answers:
  - डेसकार्टेस.
  - आइंस्टीन.
  - सेंट-ऑगस्टिन.
explanation: |
  स्पिनोज़ा ने ही कहा था कि "मनुष्य किसी साम्राज्य के भीतर एक साम्राज्य नहीं है"। यह वाक्यांश इस विचार को व्यक्त करता है कि मनुष्य प्रकृति से अलग नहीं है, बल्कि उसका एक अभिन्न अंग है, जो समान नियमों के अधीन है।
reviewed: false
question: Кой казва, че "човекът не е империя в империята"?
answer: Спиноза.
wrong_answers:
  - Декарт.
  - Айнщайн.
  - Сен-Огюстен.
explanation: |
  Спиноза е този, който твърди, че "човекът не е империя в империята". Тази фраза изразява идеята, че човекът не е отделен от природата, а е неразделна част от нея, подчинена на същите закони.
reviewed: false
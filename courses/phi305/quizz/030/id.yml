question: Siapa bilang bahwa "manusia bukanlah sebuah kerajaan di dalam kerajaan"?
answer: Spinoza.
wrong_answers:
  - Descartes.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Spinoza-lah yang menyatakan bahwa "manusia bukanlah sebuah kerajaan di dalam kerajaan". Ungkapan ini mengekspresikan gagasan bahwa manusia tidak terpisah dari alam, tetapi merupakan bagian integral darinya, yang tunduk pada hukum yang sama.

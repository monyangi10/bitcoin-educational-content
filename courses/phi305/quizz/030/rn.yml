question: Ninde avuga ngo "umuntu si ubwami mu bwami"?
answer: Sipinoza.
wrong_answers:
  - Dekarite.
  - Eyinishiteni.
  - Umweranda-Augusito.
explanation: |
  Spinoza ni we yemeje ko "umuntu atari ubwami mu bwami". Iri jambo riserura iciyumviro c’uko umuntu atandukanye n’ibidukikije, ahubwo ko ari igice cavyo, kiyoborwa n’ayo mategeko nyene.

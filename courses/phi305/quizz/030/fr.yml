question: Qui affirme que « l'homme n'est pas un empire dans un empire » ?
answer: Spinoza.
wrong_answers:
- Descartes.
- Einstein.
- Saint-Augustin.
explanation: |
  C'est Spinoza qui affirme que 'l'homme n'est pas un empire dans un empire'. Cette formule exprime l'idée que l'homme n'est pas séparé de la nature mais en fait intégralement partie, soumis aux mêmes lois.
reviewed: false

question: Hvem sier at "mennesket ikke er et imperium i et imperium"?
answer: Spinoza.
wrong_answers:
  - Descartes.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Det var Spinoza som hevdet at "mennesket ikke er et imperium i et imperium". Denne setningen uttrykker tanken om at mennesket ikke er atskilt fra naturen, men en integrert del av den, underlagt de samme lovene.
reviewed: false
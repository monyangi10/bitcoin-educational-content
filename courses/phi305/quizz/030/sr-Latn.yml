question: Ko kaže da "čovek nije carstvo unutar carstva"?
answer: Spinoza.
wrong_answers:
  - Dekart.
  - Ajnštajn.
  - Saint-Augustin.
explanation: |
  Spinoza je bio taj koji je tvrdio da "čovek nije carstvo unutar carstva". Ova fraza izražava ideju da čovek nije odvojen od prirode, već njen sastavni deo, podložan istim zakonima.
reviewed: false
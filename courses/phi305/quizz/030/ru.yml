question: Кто сказал, что "человек не является империей внутри империи"?
answer: Спиноза.
wrong_answers:
  - Декарт.
  - Эйнштейн.
  - Сен-Огюстен.
explanation: |
  Именно Спиноза утверждал, что "человек не является империей внутри империи". Эта фраза выражает мысль о том, что человек не отделен от природы, а является ее неотъемлемой частью, подчиняясь тем же законам.
reviewed: false
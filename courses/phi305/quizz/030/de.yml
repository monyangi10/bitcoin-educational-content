question: Wer sagt, dass "der Mensch nicht ein Reich im Reich ist"?
answer: Spinoza.
wrong_answers:
  - Descartes.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Es war Spinoza, der behauptete, dass "der Mensch kein Reich im Reich ist". Dieser Satz drückt die Idee aus, dass der Mensch nicht von der Natur getrennt ist, sondern ein integraler Teil von ihr, der denselben Gesetzen unterliegt.
reviewed: false
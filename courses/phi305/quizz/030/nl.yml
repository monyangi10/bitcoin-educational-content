question: Wie zegt dat "de mens geen rijk binnen een rijk is"?
answer: Spinoza.
wrong_answers:
  - Descartes.
  - Einstein.
  - Saint-Augustin.
explanation: |
  Het was Spinoza die beweerde dat "de mens geen rijk binnen een rijk is". Deze zin drukt het idee uit dat de mens niet los staat van de natuur, maar er een integraal onderdeel van is, onderworpen aan dezelfde wetten.

question: Was ist Ethologie?
answer: Eine Wissenschaft der Seinsweisen.
wrong_answers:
  - Eine Naturwissenschaft.
  - Eine mechanische Wissenschaft.
  - Eine Ableitung der Astrologie.
explanation: |
  Ethologie ist die Wissenschaft vom Sein, vom Verhalten. Für Spinoza und Deleuze ist sie das Studium dessen, was ein Körper tun kann, seiner Affekte und Fähigkeiten zu Aktion und Leidenschaft.
reviewed: false
question: اتولوژی چیست؟
answer: علم روش‌های بودن.
wrong_answers:
  - یک علم طبیعی.
  - یک علم مکانیکی.
  - مشتقی از طالع‌بینی.
explanation: |
  اتولوژی علم بودن، علم رفتار است. برای اسپینوزا و دلوز، این مطالعه‌ای است درباره‌ی آنچه یک بدن می‌تواند انجام دهد، درباره‌ی تأثیرات و ظرفیت‌های آن برای عمل و احساس.
reviewed: false
question: วิทยาเกี่ยวกับพฤติกรรมสัตว์คืออะไร?
answer: วิทยาศาสตร์แห่งวิถีการดำรงอยู่
wrong_answers:
  - วิทยาศาสตร์ธรรมชาติ
  - วิทยาศาสตร์เชิงกล
  - อนุพันธ์ของโหราศาสตร์
explanation: |
  เอทอลโลจีคือวิทยาศาสตร์แห่งการเป็นอยู่, ของพฤติกรรม สำหรับสปิโนซาและเดอลูซ, มันคือการศึกษาว่าร่างกายสามารถทำอะไรได้บ้าง, ของผลกระทบและความสามารถในการกระทำและความหลงใหลของมัน
reviewed: false
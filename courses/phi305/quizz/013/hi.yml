question: एथोलॉजी क्या है?
answer: अस्तित्व के तरीकों का विज्ञान.
wrong_answers:
  - एक प्राकृतिक विज्ञान.
  - एक यांत्रिक विज्ञान.
  - ज्योतिष का एक व्युत्पन्न.
explanation: |
  एथोलॉजी अस्तित्व का, व्यवहार का विज्ञान है। स्पिनोज़ा और डेल्यूज़ के अनुसार, यह इस बात का अध्ययन है कि एक शरीर क्या कर सकता है, उसके प्रभाव और क्रिया व आवेश की क्षमताएँ क्या हैं।

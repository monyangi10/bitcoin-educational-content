question: Qu'est-ce que l'éthologie ?
answer: Une science des manières d'être.
wrong_answers:
- Une science naturelle.
- Une science mécanique.
- Un dérivé de l'astrologie.
explanation: |
  L'éthologie est la science des manières d'être, des comportements. Pour Spinoza et Deleuze, c'est l'étude de ce que peut un corps, de ses affects et de ses capacités d'action et de passion.

question: Что такое этология?
answer: Наука о способах существования.
wrong_answers:
  - Естественная наука.
  - Механическая наука.
  - Производное от астрологии.
explanation: |
  Этология - это наука о бытии, о поведении. Для Спинозы и Делеза - это изучение того, что может делать тело, его аффектов и способностей к действию и страсти.

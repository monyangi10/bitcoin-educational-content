question: What is ethology?
answer: A science of ways of being.
wrong_answers:
  - A natural science.
  - A mechanical science.
  - A derivative of astrology.
explanation: |
  Ethology is the science of being, of behavior. For Spinoza and Deleuze, it's the study of what a body can do, of its affects and capacities for action and passion.

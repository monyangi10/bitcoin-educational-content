question: None ivy’imico kama ni iki?
answer: Ubuhinga bw’uburyo bwo kubaho.
wrong_answers:
  - Ubuhinga bw’ibidukikije.
  - Ubuhinga bw’ivy’ubuhinga.
  - Igikomoka ku vyo kuragurira ku nyenyeri.
explanation: |
  Ethologie ni ubuhinga bw’ukubaho, bw’inyifato. Ku bwa Spinoza na Deleuze, ni inyigisho y’ico umubiri ushobora gukora, ingaruka zawo n’ubushobozi bwawo bwo gukora n’urukundo.

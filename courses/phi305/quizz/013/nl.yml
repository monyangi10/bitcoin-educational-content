question: Wat is ethologie?
answer: Een wetenschap van manieren van zijn.
wrong_answers:
  - Een natuurwetenschap.
  - Een mechanische wetenschap.
  - Een afgeleide van astrologie.
explanation: |
  Ethologie is de wetenschap van het zijn, van het gedrag. Voor Spinoza en Deleuze is het de studie van wat een lichaam kan doen, van zijn affecten en capaciteiten voor actie en passie.

question: Etholojia ni nini?
answer: Sayansi ya njia za kuwa.
wrong_answers:
  - Sayansi ya asili.
  - Sayansi ya mitambo.
  - Derivative ya unajimu.
explanation: |
  Etholojia ni sayansi ya kuwa, ya tabia. Kwa Spinoza na Deleuze, ni utafiti wa kile ambacho mwili unaweza kufanya, wa athari zake na uwezo wa kutenda na shauku.

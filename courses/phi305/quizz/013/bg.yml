question: Какво е етология?
answer: Наука за начините на съществуване.
wrong_answers:
  - Естествена наука.
  - Механична наука.
  - Производно на астрологията.
explanation: |
  Етологията е наука за битието, за поведението. За Спиноза и Дельоз тя е наука за това какво може да прави едно тяло, за неговите афекти и способности за действие и страст.

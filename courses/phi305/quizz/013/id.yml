question: Apa yang dimaksud dengan etologi?
answer: Sebuah ilmu tentang cara hidup.
wrong_answers:
  - Sebuah ilmu pengetahuan alam.
  - Sebuah ilmu pengetahuan mekanik.
  - Sebuah turunan dari astrologi.
explanation: |
  Etologi adalah ilmu tentang keberadaan, tentang perilaku. Bagi Spinoza dan Deleuze, etologi adalah ilmu tentang apa yang dapat dilakukan oleh tubuh, pengaruh dan kapasitasnya untuk bertindak dan bergairah.

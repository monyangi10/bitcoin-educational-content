question: Czym jest etologia?
answer: Nauka o sposobach bycia.
wrong_answers:
  - Nauka przyrodnicza.
  - Nauka mechaniczna.
  - Pochodna astrologii.
explanation: |
  Etologia jest nauką o bycie, o zachowaniu. Dla Spinozy i Deleuze'a jest to badanie tego, co ciało może zrobić, jego afektów i zdolności do działania i namiętności.
reviewed: false
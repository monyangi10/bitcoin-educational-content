question: Var Spinozas familj?
answer: Judisk.
wrong_answers:
  - Katolik.
  - Protestanter.
  - Ateist.
explanation: |
  Spinozas familj var judisk. Hans föräldrar var portugisiska judar som hade flytt undan inkvisitionen och bosatt sig i Amsterdam, där det fanns ett stort sefardiskt judiskt samhälle.

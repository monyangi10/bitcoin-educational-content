question: War Spinozas Familie?
answer: Jüdisch.
wrong_answers:
  - Katholisch.
  - Protestantisch.
  - Atheist.
explanation: |
  Spinozas Familie war jüdisch. Seine Eltern waren portugiesische Juden, die vor der Inquisition geflohen waren und sich in Amsterdam niedergelassen hatten, wo es eine große sephardische jüdische Gemeinde gab.

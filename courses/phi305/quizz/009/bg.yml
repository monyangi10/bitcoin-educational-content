question: Каква религия е изповядвало семейството на Спиноза?
answer: Евреи.
wrong_answers:
  - Католици.
  - Протестантски.
  - Атеист.
explanation: |
  Семейството на Спиноза е еврейско. Родителите му са португалски евреи, избягали от Инквизицията и установили се в Амстердам, където имало голяма сефарадска еврейска общност.

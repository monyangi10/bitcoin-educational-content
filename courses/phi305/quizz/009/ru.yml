question: Была ли семья Спинозы?
answer: Еврейский.
wrong_answers:
  - Католик.
  - Протестант.
  - Атеист.
explanation: |
  Семья Спинозы была еврейской. Его родители были португальскими евреями, бежавшими от инквизиции и поселившимися в Амстердаме, где существовала большая еврейская община сефардов.

question: स्पिनोज़ा का परिवार क्या था?
answer: यहूदी.
wrong_answers:
  - कैथोलिक.
  - प्रोटेस्टेंट.
  - नास्तिक.
explanation: |
  स्पिनोज़ा का परिवार यहूदी था। उनके माता-पिता पुर्तगाली यहूदी थे, जो इनक्विज़िशन से भागकर एम्स्टर्डम में बस गए थे, जहाँ एक बड़ा सेफ़र्डिक यहूदी समुदाय रहता था।
reviewed: false
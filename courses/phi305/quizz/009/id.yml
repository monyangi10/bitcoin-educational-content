question: Apakah keluarga Spinoza?
answer: Yahudi.
wrong_answers:
  - Katolik.
  - Protestan.
  - Atheis.
explanation: |
  Keluarga Spinoza adalah keluarga Yahudi. Orang tuanya adalah orang Yahudi Portugis yang melarikan diri dari Inkuisisi dan menetap di Amsterdam, di mana terdapat komunitas Yahudi Sephardic yang besar.

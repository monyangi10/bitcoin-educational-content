question: Was Spinoza familie?
answer: Joods.
wrong_answers:
  - Katholiek.
  - Protestants.
  - Atheïst.
explanation: |
  Spinoza's familie was Joods. Zijn ouders waren Portugese Joden die de inquisitie waren ontvlucht en zich in Amsterdam hadden gevestigd, waar een grote Sefardisch-Joodse gemeenschap was.

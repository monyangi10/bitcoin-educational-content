question: None umuryango wa Spinoza wari?
answer: Umuyuda.
wrong_answers:
  - Umugatolika.
  - Abaporotisanti.
  - Umutemera Imana.
explanation: |
  Umuryango wa Spinoza wari Abayuda. Abavyeyi biwe bari Abayuda b’Abanyaportigale bari bahunze Inkizisiyo, baja kuba i Amsterdam, aho hari umuryango munini w’Abayuda b’Abasefaridi.

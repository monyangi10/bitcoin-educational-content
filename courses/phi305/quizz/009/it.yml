question: La famiglia di Spinoza?
answer: Ebraico.
wrong_answers:
  - Cattolico.
  - Protestante.
  - Ateo.
explanation: |
  La famiglia di Spinoza era ebrea. I suoi genitori erano ebrei portoghesi fuggiti dall'Inquisizione e si erano stabiliti ad Amsterdam, dove c'era una grande comunità ebraica sefardita.

question: Gia đình của Spinoza là ai?
answer: Người Do Thái.
wrong_answers:
  - Công giáo.
  - Tin Lành.
  - Người vô thần.
explanation: |
  Gia đình Spinoza là người Do Thái. Cha mẹ ông là người Do Thái Bồ Đào Nha đã chạy trốn khỏi Tòa án Dị giáo và định cư tại Amsterdam, nơi có một cộng đồng Do Thái Sephardic đông đảo.

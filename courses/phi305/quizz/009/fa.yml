question: آیا خانواده اسپینوزا؟
answer: یهودی.
wrong_answers:
  - کاتولیک.
  - پروتستان.
  - بی‌خدا.
explanation: |
  خانواده اسپینوزا یهودی بودند. والدین او یهودیان پرتغالی بودند که از تفتیش عقاید گریخته و در آمستردام، جایی که جامعه بزرگی از یهودیان سفاردی وجود داشت، ساکن شده بودند.
reviewed: false
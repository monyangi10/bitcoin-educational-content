question: Var Spinozas familie?
answer: Jødisk.
wrong_answers:
  - Katolikk.
  - Protestant.
  - Ateist.
explanation: |
  Spinozas familie var jødisk. Foreldrene hans var portugisiske jøder som hadde flyktet fra inkvisisjonen og bosatt seg i Amsterdam, der det fantes et stort sefardisk jødisk samfunn.

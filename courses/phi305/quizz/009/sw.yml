question: Je! ilikuwa familia ya Spinoza?
answer: Myahudi.
wrong_answers:
  - Mkatoliki.
  - Kiprotestanti.
  - Mkana Mungu.
explanation: |
  Familia ya Spinoza ilikuwa ya Kiyahudi. Wazazi wake walikuwa Wayahudi wa Kireno ambao walikuwa wamekimbia Mahakama ya Kuhukumu Wazushi na kuishi katika Amsterdam, ambako kulikuwa na jumuiya kubwa ya Wayahudi wa Sephardic.
reviewed: true

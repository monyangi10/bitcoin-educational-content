question: Igihugu Spinoza yabayemwo kandi yandikamwo ibitabu vyiwe ni?
answer: Intara z’Ubumwe.
wrong_answers:
  - Ubufaransa.
  - Ubwongereza Bunini.
  - Suède.
explanation: |
  Spinoza yabaye kandi yandika ibitabu vyiwe vyose mu Ntara z’Ubumwe (ubu ni Ubuholandi), iyo ntara ico gihe yari ahantu abantu biyumvira bidegemvya be n’amadini makeyi yatotezwa ahandi hose mu Buraya.

question: Страната, в която Спиноза е живял и написал своето произведение, е?
answer: Обединените провинции.
wrong_answers:
  - Франция.
  - Великобритания.
  - Швеция.
explanation: |
  Спиноза живее и пише цялото си творчество в Обединените провинции (днешна Нидерландия), които по онова време са убежище за свободомислещи хора и религиозни малцинства, преследвани в други части на Европа.
reviewed: false
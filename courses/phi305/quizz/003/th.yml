question: ประเทศที่สปิโนซาอาศัยและเขียนผลงานของเขาคือ?
answer: สหจังหวัด
wrong_answers:
  - ฝรั่งเศส
  - บริเตนใหญ่
  - สวีเดน
explanation: |
  สปิโนซาอาศัยและเขียนงานทั้งหมดของเขาในสาธารณรัฐดัตช์ (ปัจจุบันคือเนเธอร์แลนด์) ซึ่งในขณะนั้นเป็นที่หลบภัยสำหรับนักคิดอิสระและชนกลุ่มน้อยทางศาสนาที่ถูกข่มเหงในที่อื่นๆ ในยุโรป
reviewed: false
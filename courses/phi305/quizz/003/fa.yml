question: کشوری که اسپینوزا در آن زندگی کرد و آثارش را نوشت کدام است؟
answer: استان‌های متحد.
wrong_answers:
  - فرانسه.
  - بریتانیا.
  - سوئد.
explanation: |
  اسپینوزا در ایالات متحده (که اکنون هلند است) زندگی کرد و تمام آثار خود را نوشت، که در آن زمان پناهگاهی برای آزاداندیشان و اقلیت‌های مذهبی بود که در سایر نقاط اروپا تحت آزار و اذیت قرار می‌گرفتند.
reviewed: false
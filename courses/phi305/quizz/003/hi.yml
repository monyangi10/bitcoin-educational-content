question: वह देश क्या है जहां स्पिनोज़ा रहते थे और उन्होंने अपनी रचनाएं लिखीं?
answer: संयुक्त प्रांत.
wrong_answers:
  - फ्रांस.
  - ग्रेट ब्रिटेन.
  - स्वीडन.
explanation: |
  स्पिनोज़ा ने अपना सारा लेखन संयुक्त प्रांत (अब नीदरलैंड) में किया, जो उस समय यूरोप में अन्यत्र सताए गए स्वतंत्र विचारकों और धार्मिक अल्पसंख्यकों के लिए आश्रय स्थल था।
reviewed: false
question: Страна, в которой жил и писал свои произведения Спиноза?
answer: Объединенные провинции.
wrong_answers:
  - Франция.
  - Великобритания.
  - Швеция.
explanation: |
  Спиноза жил и писал все свои работы в Соединенных провинциях (ныне Нидерланды), которые в то время были пристанищем для свободных мыслителей и религиозных меньшинств, преследуемых в других странах Европы.
reviewed: false
question: Le pays dans lequel Spinoza a vécu et écrit son œuvre est ?
answer: Les Provinces-Unies.
wrong_answers:
- La France.
- La Grande Bretagne.
- La Suède.
explanation: |
  Spinoza a vécu et écrit toute son œuvre dans les Provinces-Unies (actuels Pays-Bas), qui étaient à l'époque un refuge pour les penseurs libres et les minorités religieuses persécutées ailleurs en Europe.
reviewed: false

question: Negara tempat Spinoza tinggal dan menulis karyanya adalah?
answer: Provinsi-provinsi Bersatu.
wrong_answers:
  - Perancis.
  - Britania Raya.
  - Swedia.
explanation: |
  Spinoza tinggal dan menulis semua karyanya di United Provinces (sekarang Belanda), yang pada saat itu menjadi tempat berlindung bagi para pemikir bebas dan kaum minoritas agama yang dianiaya di tempat lain di Eropa.

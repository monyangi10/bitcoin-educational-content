question: Het land waar Spinoza woonde en zijn werk schreef is?
answer: De Verenigde Provincies.
wrong_answers:
  - Frankrijk.
  - Groot-Brittannië.
  - Zweden.
explanation: |
  Spinoza woonde en schreef al zijn werk in de Verenigde Provinciën (nu Nederland), dat in die tijd een toevluchtsoord was voor vrije denkers en religieuze minderheden die elders in Europa werden vervolgd.

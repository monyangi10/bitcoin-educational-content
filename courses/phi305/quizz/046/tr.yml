question: Spinoza nefreti nasıl tanımlar?
answer: Dışsal bir neden fikriyle ilişkilendirilen üzüntü.
wrong_answers:
  - Dışsal bir neden fikriyle ilişkili bir sevinç.
  - Suçluluk duygusu.
  - Mantığa aykırı bir his.
explanation: |
  Spinoza nefreti, dışsal bir neden fikriyle ilişkili üzüntü olarak tanımlar. Bu, harekete geçme gücümüzü azaltan ve bizi nefret ettiğimiz şeye zincirleyen olumsuz bir etkidir.

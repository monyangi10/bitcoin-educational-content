question: None Spinoza asobanura gute urwanko?
answer: Umubabaro ujanye n’iciyumviro c’imvo yo hanze.
wrong_answers:
  - Umunezero ujanye n’iciyumviro c’imvo yo hanze.
  - Inyiyumvo yo kwicira urubanza.
  - Inyiyumvo y’ugusubiza inyuma.
explanation: |
  Spinoza asobanura urwanko nk’umubabaro ujanye n’iciyumviro c’imvo yo hanze. Ni ingaruka mbi igabanya ububasha bwacu bwo gukora kandi ikaduboha ku vyo twanka.

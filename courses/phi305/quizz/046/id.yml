question: Bagaimana Spinoza mendefinisikan kebencian?
answer: Kesedihan yang terkait dengan gagasan tentang penyebab eksternal.
wrong_answers:
  - Kegembiraan yang terkait dengan gagasan tentang penyebab eksternal.
  - Perasaan bersalah.
  - Perasaan yang berlawanan dengan intuisi.
explanation: |
  Spinoza mendefinisikan kebencian sebagai kesedihan yang terkait dengan gagasan tentang penyebab eksternal. Ini adalah pengaruh negatif yang mengurangi kekuatan kita untuk bertindak dan membelenggu kita pada apa yang kita benci.
reviewed: false
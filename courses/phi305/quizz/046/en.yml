question: How does Spinoza define hatred?
answer: Sadness associated with the idea of an external cause.
wrong_answers:
  - A joy associated with the idea of an external cause.
  - A feeling of guilt.
  - A counter-intuitive feeling.
explanation: |
  Spinoza defines hatred as sadness associated with the idea of an external cause. It's a negative affect that diminishes our power to act and chains us to what we hate.
reviewed: false
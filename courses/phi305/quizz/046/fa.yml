question: اسپینوزا نفرت را چگونه تعریف می‌کند؟
answer: اندوه مرتبط با ایده‌ی یک علت خارجی.
wrong_answers:
  - شادی مرتبط با ایده یک علت خارجی.
  - احساس گناه.
  - یک احساس خلاف‌آمد.
explanation: |
  اسپینوزا نفرت را به عنوان غمی که با ایده‌ای از یک علت خارجی همراه است تعریف می‌کند. این یک تأثیر منفی است که قدرت عمل ما را کاهش می‌دهد و ما را به آنچه از آن متنفر هستیم زنجیر می‌کند.
reviewed: false
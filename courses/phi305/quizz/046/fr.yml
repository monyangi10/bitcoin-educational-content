question: Comment Spinoza définit-il la haine ?
answer: Une tristesse associée à l'idée d'une cause extérieure.
wrong_answers:
- Une joie associée à l'idée d'une cause extérieure.
- Un sentiment de culpabilité.
- Un sentiment contre intuitif.
explanation: |
  Spinoza définit la haine comme une tristesse associée à l'idée d'une cause extérieure. C'est un affect négatif qui diminue notre puissance d'agir et nous enchaîne à ce que nous haïssons.

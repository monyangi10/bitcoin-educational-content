question: Hoe definieert Spinoza haat?
answer: Verdriet geassocieerd met het idee van een externe oorzaak.
wrong_answers:
  - Een vreugde die geassocieerd wordt met het idee van een externe oorzaak.
  - Een schuldgevoel.
  - Een contra-intuïtief gevoel.
explanation: |
  Spinoza definieert haat als verdriet dat geassocieerd wordt met het idee van een externe oorzaak. Het is een negatief affect dat ons vermogen om te handelen vermindert en ons ketent aan wat we haten.
reviewed: false
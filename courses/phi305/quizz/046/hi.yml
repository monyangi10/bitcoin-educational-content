question: स्पिनोज़ा घृणा को कैसे परिभाषित करते हैं?
answer: किसी बाहरी कारण के विचार से जुड़ी उदासी।
wrong_answers:
  - किसी बाहरी कारण के विचार से जुड़ा आनंद।
  - अपराध बोध की भावना.
  - एक प्रति-अंतर्ज्ञानी भावना.
explanation: |
  स्पिनोज़ा घृणा को किसी बाहरी कारण से जुड़ी उदासी के रूप में परिभाषित करते हैं। यह एक नकारात्मक प्रभाव है जो हमारी कार्य करने की क्षमता को कम कर देता है और हमें उस चीज़ से जकड़ लेता है जिससे हम घृणा करते हैं।
reviewed: false
question: Hur definierar Spinoza hat?
answer: Sorg förknippad med tanken på en yttre orsak.
wrong_answers:
  - En glädje som förknippas med tanken på en yttre orsak.
  - En känsla av skuld.
  - En kontraintuitiv känsla.
explanation: |
  Spinoza definierar hat som sorg förknippad med tanken på en yttre orsak. Det är en negativ påverkan som minskar vår handlingskraft och kedjar fast oss vid det vi hatar.

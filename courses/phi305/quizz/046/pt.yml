question: Como é que Spinoza define o ódio?
answer: Tristeza associada à ideia de uma causa externa.
wrong_answers:
  - Uma alegria associada à ideia de uma causa externa.
  - Um sentimento de culpa.
  - Um sentimento contra-intuitivo.
explanation: |
  Spinoza define o ódio como uma tristeza associada à ideia de uma causa externa. É um afeto negativo que diminui o nosso poder de agir e nos acorrenta àquilo que odiamos.

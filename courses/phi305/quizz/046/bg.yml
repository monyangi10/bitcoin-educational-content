question: Как Спиноза определя омразата?
answer: Тъга, свързана с идеята за външна причина.
wrong_answers:
  - Радост, свързана с идеята за външна причина.
  - Чувство за вина.
  - Противоречиво усещане.
explanation: |
  Спиноза определя омразата като тъга, свързана с идеята за външна причина. Това е негативен афект, който намалява силата ни да действаме и ни приковава към това, което мразим.

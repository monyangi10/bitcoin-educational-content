question: Kako Spinoza definiše mržnju?
answer: Tuga povezana sa idejom spoljnog uzroka.
wrong_answers:
  - Radost povezana sa idejom spoljnog uzroka.
  - Osećaj krivice.
  - Kontraintuitivan osećaj.
explanation: |
  Spinoza definiše mržnju kao tugu povezanu sa idejom spoljašnjeg uzroka. To je negativni afekt koji umanjuje našu moć delovanja i vezuje nas za ono što mrzimo.

question: Wie definiert Spinoza den Hass?
answer: Traurigkeit in Verbindung mit der Vorstellung einer äußeren Ursache.
wrong_answers:
  - Eine Freude, die mit der Vorstellung einer äußeren Ursache verbunden ist.
  - Ein Gefühl der Schuld.
  - Ein kontra-intuitives Gefühl.
explanation: |
  Spinoza definiert Hass als Traurigkeit, die mit der Vorstellung einer äußeren Ursache verbunden ist. Es ist ein negativer Affekt, der unsere Handlungsfähigkeit einschränkt und uns an das kettet, was wir hassen.
reviewed: false
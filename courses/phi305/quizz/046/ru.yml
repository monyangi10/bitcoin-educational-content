question: Как Спиноза определяет ненависть?
answer: Печаль, связанная с мыслью о внешней причине.
wrong_answers:
  - Радость, связанная с идеей внешней причины.
  - Чувство вины.
  - Противоположное интуитивному чувство.
explanation: |
  Спиноза определяет ненависть как печаль, связанную с идеей внешней причины. Это негативный аффект, который уменьшает нашу способность действовать и приковывает нас к тому, что мы ненавидим.

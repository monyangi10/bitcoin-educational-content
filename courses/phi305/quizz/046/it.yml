question: Come definisce Spinoza l'odio?
answer: Tristezza associata all'idea di una causa esterna.
wrong_answers:
  - Una gioia associata all'idea di una causa esterna.
  - Un senso di colpa.
  - Una sensazione controintuitiva.
explanation: |
  Spinoza definisce l'odio come la tristezza associata all'idea di una causa esterna. È un affetto negativo che diminuisce il nostro potere di agire e ci incatena a ciò che odiamo.

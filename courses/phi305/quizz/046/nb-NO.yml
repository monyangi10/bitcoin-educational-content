question: Hvordan definerer Spinoza hat?
answer: Tristhet forbundet med tanken på en ytre årsak.
wrong_answers:
  - En glede forbundet med tanken på en ytre årsak.
  - En følelse av skyld.
  - En kontraintuitiv følelse.
explanation: |
  Spinoza definerer hat som tristhet forbundet med forestillingen om en ytre årsak. Det er en negativ affekt som reduserer vår handlekraft og lenker oss til det vi hater.

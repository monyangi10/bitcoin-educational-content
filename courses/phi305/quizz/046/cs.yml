question: Jak Spinoza definuje nenávist?
answer: Smutek spojený s představou vnější příčiny.
wrong_answers:
  - Radost spojená s představou vnější příčiny.
  - Pocit viny.
  - Protichůdný pocit.
explanation: |
  Spinoza definuje nenávist jako smutek spojený s představou vnější příčiny. Je to negativní afekt, který snižuje naši schopnost jednat a připoutává nás k tomu, co nenávidíme.

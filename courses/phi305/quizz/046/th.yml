question: สปิโนซานิยามความเกลียดชังอย่างไร?
answer: ความเศร้าที่เกี่ยวข้องกับแนวคิดของสาเหตุภายนอก
wrong_answers:
  - ความสุขที่เกี่ยวข้องกับแนวคิดของสาเหตุภายนอก
  - ความรู้สึกผิด
  - ความรู้สึกที่ขัดกับสัญชาตญาณ
explanation: |
  สปิโนซากำหนดความเกลียดชังว่าเป็นความเศร้าที่เกี่ยวข้องกับแนวคิดของสาเหตุภายนอก มันเป็นอารมณ์เชิงลบที่ลดทอนพลังของเราในการกระทำและผูกมัดเราไว้กับสิ่งที่เราเกลียด

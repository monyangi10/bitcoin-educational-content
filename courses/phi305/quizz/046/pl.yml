question: Jak Spinoza definiuje nienawiść?
answer: Smutek związany z ideą zewnętrznej przyczyny.
wrong_answers:
  - Radość związana z ideą zewnętrznej przyczyny.
  - Poczucie winy.
  - Uczucie sprzeczne z intuicją.
explanation: |
  Spinoza definiuje nienawiść jako smutek związany z ideą zewnętrznej przyczyny. Jest to negatywny afekt, który zmniejsza naszą moc działania i przykuwa nas do tego, czego nienawidzimy.

question: Spinoza định nghĩa lòng căm thù như thế nào?
answer: Nỗi buồn liên quan đến ý tưởng về nguyên nhân bên ngoài.
wrong_answers:
  - Niềm vui gắn liền với ý tưởng về nguyên nhân bên ngoài.
  - Cảm giác tội lỗi.
  - Một cảm giác trái ngược với trực giác.
explanation: |
  Spinoza định nghĩa lòng căm thù là nỗi buồn gắn liền với ý niệm về một nguyên nhân bên ngoài. Đó là một ảnh hưởng tiêu cực làm giảm khả năng hành động của chúng ta và trói buộc chúng ta vào những gì chúng ta ghét.

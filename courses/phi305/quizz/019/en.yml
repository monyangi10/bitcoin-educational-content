question: What debate does the Lisbon earthquake lead to?
answer: Men can and must take charge of their own lives.
wrong_answers:
  - Nature is responsible.
  - Men must fear Nature.
  - Nature is incomprehensible.
explanation: |
  The Lisbon earthquake (1755) led to the idea that people could and should take matters into their own hands. This event called divine providence into question and encouraged a more humanist, rationalist vision of the world.

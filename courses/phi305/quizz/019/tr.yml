question: Lizbon depremi hangi tartışmalara yol açtı?
answer: Erkekler kendi hayatlarının sorumluluğunu alabilirler ve almalıdırlar.
wrong_answers:
  - Doğa sorumludur.
  - İnsanlar doğadan korkmalı.
  - Doğa anlaşılmazdır.
explanation: |
  Lizbon depremi (1755), insanların meseleleri kendi ellerine alabilecekleri ve almaları gerektiği fikrine yol açtı. Bu olay ilahi takdiri sorgulattı ve daha hümanist, rasyonalist bir dünya görüşünü teşvik etti.

question: लिस्बन भूकंप किस बहस को जन्म देता है?
answer: पुरुष अपने जीवन की जिम्मेदारी स्वयं ले सकते हैं और उन्हें लेनी भी चाहिए।
wrong_answers:
  - प्रकृति जिम्मेदार है.
  - मनुष्य को प्रकृति से डरना चाहिए।
  - प्रकृति अज्ञेय है.
explanation: |
  लिस्बन भूकंप (1755) ने इस विचार को जन्म दिया कि लोग मामलों को अपने हाथों में ले सकते हैं और उन्हें ऐसा करना भी चाहिए। इस घटना ने ईश्वरीय विधान पर प्रश्नचिह्न लगा दिया और दुनिया के प्रति एक अधिक मानवतावादी, तर्कवादी दृष्टिकोण को प्रोत्साहित किया।

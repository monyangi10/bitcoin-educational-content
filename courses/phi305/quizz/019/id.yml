question: Perdebatan apa yang ditimbulkan oleh gempa bumi Lisbon?
answer: Pria dapat dan harus bertanggung jawab atas hidup mereka sendiri.
wrong_answers:
  - Alamlah yang bertanggung jawab.
  - Manusia harus takut kepada Alam.
  - Alam tidak dapat dipahami.
explanation: |
  Gempa bumi Lisbon (1755) memunculkan gagasan bahwa manusia dapat dan harus mengambil tindakan sendiri. Peristiwa ini mempertanyakan penyelenggaraan ilahi dan mendorong visi yang lebih humanis dan rasional tentang dunia.

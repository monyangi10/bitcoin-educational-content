question: Do jakiej debaty prowadzi trzęsienie ziemi w Lizbonie?
answer: Mężczyźni mogą i muszą przejąć kontrolę nad własnym życiem.
wrong_answers:
  - Natura jest odpowiedzialna.
  - Ludzie muszą bać się Natury.
  - Natura jest niezrozumiała.
explanation: |
  Trzęsienie ziemi w Lizbonie (1755) doprowadziło do idei, że ludzie mogą i powinni wziąć sprawy w swoje ręce. Wydarzenie to zakwestionowało boską opatrzność i zachęciło do bardziej humanistycznej, racjonalistycznej wizji świata.
reviewed: false
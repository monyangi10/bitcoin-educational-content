question: K jaké debatě vede lisabonské zemětřesení?
answer: Muži mohou a musí převzít odpovědnost za svůj život.
wrong_answers:
  - Příroda je za to zodpovědná.
  - Lidé se musí bát přírody.
  - Příroda je nepochopitelná.
explanation: |
  Zemětřesení v Lisabonu (1755) vedlo k myšlence, že lidé mohou a mají vzít věci do vlastních rukou. Tato událost zpochybnila Boží prozřetelnost a podpořila humanističtější, racionalistické vidění světa.

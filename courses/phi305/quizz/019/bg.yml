question: Какъв дебат предизвиква земетресението в Лисабон?
answer: Мъжете могат и трябва да поемат отговорност за собствения си живот.
wrong_answers:
  - Природата е отговорна.
  - Хората трябва да се страхуват от природата.
  - Природата е неразбираема.
explanation: |
  Лисабонското земетресение (1755 г.) води до идеята, че хората могат и трябва да вземат нещата в свои ръце. Това събитие поставя под въпрос божественото провидение и насърчава по-хуманистична и рационалистична визия за света.

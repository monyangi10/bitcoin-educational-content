question: Zu welcher Debatte führt das Erdbeben von Lissabon?
answer: Männer können und müssen ihr Leben selbst in die Hand nehmen.
wrong_answers:
  - Die Natur ist verantwortlich.
  - Der Mensch muss die Natur fürchten.
  - Die Natur ist unbegreiflich.
explanation: |
  Das Erdbeben von Lissabon (1755) führte zu der Vorstellung, dass die Menschen ihre Angelegenheiten selbst in die Hand nehmen könnten und sollten. Dieses Ereignis stellte die göttliche Vorsehung in Frage und förderte eine eher humanistische, rationalistische Sicht der Welt.
reviewed: false
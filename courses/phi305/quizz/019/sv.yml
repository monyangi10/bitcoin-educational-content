question: Vilken debatt leder jordbävningen i Lissabon till?
answer: Män kan och måste ta ansvar för sina egna liv.
wrong_answers:
  - Naturen är ansvarig.
  - Människor måste frukta naturen.
  - Naturen är obegriplig.
explanation: |
  Jordbävningen i Lissabon (1755) ledde till tanken att människor kunde och borde ta saken i egna händer. Denna händelse ifrågasatte den gudomliga försynen och uppmuntrade till en mer humanistisk och rationalistisk syn på världen.
reviewed: false
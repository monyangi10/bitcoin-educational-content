question: แผ่นดินไหวที่ลิสบอนนำไปสู่การถกเถียงเรื่องใด?
answer: ผู้ชายสามารถและต้องรับผิดชอบชีวิตของตนเอง
wrong_answers:
  - ธรรมชาติเป็นผู้รับผิดชอบ
  - ผู้ชายต้องกลัวธรรมชาติ
  - ธรรมชาตินั้นยากที่จะเข้าใจ
explanation: |
  แผ่นดินไหวที่ลิสบอน (1755) นำไปสู่แนวคิดที่ว่าผู้คนสามารถและควรจัดการเรื่องต่างๆ ด้วยตนเอง เหตุการณ์นี้ทำให้เกิดข้อสงสัยเกี่ยวกับการจัดการของพระเจ้าและส่งเสริมมุมมองของโลกที่เน้นมนุษยนิยมและเหตุผลนิยมมากขึ้น
reviewed: false
question: К каким дебатам привело землетрясение в Лиссабоне?
answer: Мужчины могут и должны сами распоряжаться своей жизнью.
wrong_answers:
  - Природа несет ответственность.
  - Люди должны бояться природы.
  - Природа непостижима.
explanation: |
  Лиссабонское землетрясение (1755) привело к мысли о том, что люди могут и должны брать ситуацию в свои руки. Это событие поставило под сомнение божественное провидение и способствовало формированию более гуманистического, рационалистического взгляда на мир.

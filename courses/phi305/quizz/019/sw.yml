question: Je, tetemeko la ardhi la Lisbon linaleta mjadala gani?
answer: Wanaume wanaweza na lazima wasimamie maisha yao wenyewe.
wrong_answers:
  - Asili inawajibika.
  - Wanaume lazima waogope Nature.
  - Asili haieleweki.
explanation: |
  Tetemeko la ardhi la Lisbon (1755) lilisababisha wazo kwamba watu wanaweza na wanapaswa kuchukua mambo mikononi mwao. Tukio hili liliita majaliwa ya kimungu kuwa mashakani na kuhimiza maono ya kiutu zaidi, ya kimantiki ya ulimwengu.
reviewed: true

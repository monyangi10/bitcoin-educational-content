question: Trận động đất ở Lisbon dẫn tới cuộc tranh luận nào?
answer: Đàn ông có thể và phải tự chịu trách nhiệm về cuộc sống của mình.
wrong_answers:
  - Thiên nhiên có trách nhiệm.
  - Con người phải sợ thiên nhiên.
  - Thiên nhiên là điều không thể hiểu nổi.
explanation: |
  Trận động đất Lisbon (1755) đã khơi dậy ý tưởng rằng con người có thể và nên tự mình giải quyết vấn đề. Sự kiện này đặt ra câu hỏi về sự quan phòng của Chúa và khuyến khích một tầm nhìn nhân văn, duy lý hơn về thế giới.

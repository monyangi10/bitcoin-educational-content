question: زلزله لیسبون به چه بحثی منجر شد؟
answer: مردان می‌توانند و باید مسئولیت زندگی خود را به عهده بگیرند.
wrong_answers:
  - طبیعت مسئول است.
  - مردان باید از طبیعت بترسند.
  - طبیعت غیرقابل‌فهم است.
explanation: |
  زلزله لیسبون (۱۷۵۵) به این ایده منجر شد که مردم می‌توانند و باید امور را به دست خود بگیرند. این رویداد مشیت الهی را زیر سوال برد و دیدگاهی انسان‌گرایانه و عقل‌گرایانه‌تر از جهان را تشویق کرد.
reviewed: false
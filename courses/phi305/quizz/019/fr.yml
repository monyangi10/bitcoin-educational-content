question: À quel débat le tremblement de terre de Lisbonne aboutit-il  ?
answer: Les hommes peuvent et doivent se prendre en main.
wrong_answers:
- La Nature est responsable.
- Les hommes doivent craindre la Nature.
- La Nature est incompréhensible.
explanation: |
  Le tremblement de terre de Lisbonne (1755) a conduit à l'idée que les hommes peuvent et doivent se prendre en main. Cet événement a remis en question la providence divine et encouragé une vision plus humaniste et rationaliste du monde.

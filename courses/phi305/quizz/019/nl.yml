question: Tot welk debat leidt de aardbeving in Lissabon?
answer: Mannen kunnen en moeten de leiding nemen over hun eigen leven.
wrong_answers:
  - De natuur is verantwoordelijk.
  - Mensen moeten bang zijn voor de natuur.
  - De natuur is onbegrijpelijk.
explanation: |
  De aardbeving in Lissabon (1755) leidde tot het idee dat mensen het heft in eigen handen konden en moesten nemen. Deze gebeurtenis trok de goddelijke voorzienigheid in twijfel en moedigde een meer humanistische, rationalistische visie op de wereld aan.
reviewed: false
question: Mihin keskusteluun Lissabonin maanjäristys johtaa?
answer: Miehet voivat ja heidän on otettava vastuu omasta elämästään.
wrong_answers:
  - Luonto on vastuussa.
  - Ihmisten on pelättävä luontoa.
  - Luonto on käsittämätön.
explanation: |
  Lissabonin maanjäristys (1755) johti ajatukseen, että ihmiset voisivat ja heidän pitäisi ottaa asiat omiin käsiinsä. Tämä tapahtuma kyseenalaisti jumalallisen kaitselmuksen ja rohkaisi humanistisempaa, rationalistisempaa maailmankuvaa.
reviewed: false
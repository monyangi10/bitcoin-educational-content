question: Kakvu debatu izaziva lisabonski zemljotres?
answer: Muškarci mogu i moraju preuzeti kontrolu nad svojim životima.
wrong_answers:
  - Priroda je odgovorna.
  - Ljudi moraju da se plaše Prirode.
  - Priroda je neshvatljiva.
explanation: |
  Lisabonski zemljotres (1755) doveo je do ideje da ljudi mogu i treba da preuzmu stvari u svoje ruke. Ovaj događaj je doveo u pitanje božansku providnost i podstakao humanističkiju, racionalističku viziju sveta.

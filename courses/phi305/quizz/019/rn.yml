question: Ni impaka iyihe umutingito wo muri Lisbonne utuma haba?
answer: Abagabo barashobora kandi bategerezwa kwitwararika ubuzima bwabo bwite.
wrong_answers:
  - Kamere ni yo ibifise uruhara.
  - Abantu bategerezwa gutinya Kamere.
  - Kamere ntishobora gutahurwa.
explanation: |
  Umutingito wo muri Lisbonne (1755) waratumye abantu biyumvira yuko abantu bashobora kandi ko bakwiye kwifatira ibintu mu minwe yabo. Ico kintu cabaye carateye amakenga ku bijanye n’ukuntu Imana itanga ibintu kandi kiraremesha abantu kubona isi mu buryo bubereye abantu, bushingiye ku vyiyumviro.

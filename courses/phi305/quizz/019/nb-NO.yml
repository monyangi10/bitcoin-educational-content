question: Hvilken debatt fører jordskjelvet i Lisboa til?
answer: Menn kan og må ta ansvar for sine egne liv.
wrong_answers:
  - Naturen er ansvarlig.
  - Mennesket må frykte naturen.
  - Naturen er uforståelig.
explanation: |
  Jordskjelvet i Lisboa (1755) førte til ideen om at folk kunne og burde ta saken i egne hender. Denne hendelsen satte spørsmålstegn ved det guddommelige forsynet og oppmuntret til et mer humanistisk og rasjonalistisk syn på verden.

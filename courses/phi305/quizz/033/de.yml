question: Ist die strukturelle Inflation das Ergebnis?
answer: Eine Erhöhung des Geldes Supply.
wrong_answers:
  - Preiserhöhungen
  - Die Finanzpolitik.
  - Anti-liberale Maßnahmen.
explanation: |
  Strukturelle Inflation ist das Ergebnis eines Anstiegs der Geldmenge Supply. Wenn die umlaufende Geldmenge schneller steigt als die Produktion von Waren und Dienstleistungen, führt dies zu einem allgemeinen Preisanstieg.
reviewed: false
question: آیا تورم ساختاری نتیجه است؟
answer: افزایش در پول Supply.
wrong_answers:
  - افزایش قیمت‌ها
  - سیاست مالی.
  - اقدامات ضد لیبرالی.
explanation: |
  تورم ساختاری نتیجه افزایش پول Supply است. هنگامی که مقدار پول در گردش سریع‌تر از تولید کالاها و خدمات افزایش می‌یابد، این امر منجر به افزایش عمومی قیمت‌ها می‌شود.
reviewed: false
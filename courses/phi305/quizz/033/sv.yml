question: Är det strukturell inflation som är resultatet?
answer: En ökning av pengarna Supply.
wrong_answers:
  - Prishöjningar
  - Finanspolitik.
  - Anti-liberala åtgärder.
explanation: |
  Strukturell inflation är resultatet av en ökning av penningmängden Supply. När mängden pengar i omlopp ökar snabbare än produktionen av varor och tjänster leder detta till en allmän prisökning.
reviewed: false
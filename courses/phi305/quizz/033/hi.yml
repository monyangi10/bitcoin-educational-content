question: क्या इसका परिणाम संरचनात्मक मुद्रास्फीति है?
answer: धन में वृद्धि Supply.
wrong_answers:
  - कीमत में बढ़ोत्तरी
  - राजकोषीय नीति।
  - उदारवाद विरोधी उपाय.
explanation: |
  संरचनात्मक मुद्रास्फीति मुद्रा Supply में वृद्धि का परिणाम है। जब प्रचलन में मुद्रा की मात्रा वस्तुओं और सेवाओं के उत्पादन की तुलना में तेज़ी से बढ़ती है, तो इससे कीमतों में सामान्य वृद्धि होती है।

question: Apakah inflasi struktural adalah akibatnya?
answer: Peningkatan uang Supply.
wrong_answers:
  - Kenaikan harga
  - Kebijakan fiskal.
  - Tindakan anti-liberal.
explanation: |
  Inflasi struktural adalah hasil dari peningkatan jumlah uang Supply. Ketika jumlah uang yang beredar meningkat lebih cepat daripada produksi barang dan jasa, hal ini menyebabkan kenaikan harga secara umum.

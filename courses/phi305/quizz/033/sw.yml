question: Je, mfumuko wa bei wa muundo ndio matokeo?
answer: Kuongezeka kwa fedha Supply.
wrong_answers:
  - Bei inaongezeka
  - Sera ya fedha.
  - Hatua za kupinga huria.
explanation: |
  Mfumuko wa bei wa miundo ni matokeo ya ongezeko la fedha Supply. Wakati kiasi cha fedha katika mzunguko kinapoongezeka kwa kasi zaidi kuliko uzalishaji wa bidhaa na huduma, hii inasababisha kupanda kwa bei kwa ujumla.
reviewed: true

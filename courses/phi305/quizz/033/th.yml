question: โครงสร้างเงินเฟ้อเป็นผลมาจากอะไร?
answer: การเพิ่มขึ้นของปริมาณเงิน
wrong_answers:
  - การขึ้นราคา
  - นโยบายการคลัง
  - มาตรการต่อต้านเสรีนิยม
explanation: |
  เงินเฟ้อเชิงโครงสร้างเป็นผลมาจากการเพิ่มขึ้นของปริมาณเงิน เมื่อปริมาณเงินที่หมุนเวียนเพิ่มขึ้นเร็วกว่าการผลิตสินค้าและบริการ จะนำไปสู่การเพิ่มขึ้นของราคาทั่วไป
reviewed: false
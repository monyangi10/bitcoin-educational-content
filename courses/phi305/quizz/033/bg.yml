question: На какво се дължи структурната инфлация?
answer: Увеличаване на паричното предлагане.
wrong_answers:
  - Увеличение на цените
  - Фискална политика.
  - Антилиберални мерки.
explanation: |
  Структурната инфлация е резултат от увеличаване на паричното предлагане. Когато количеството пари в обращение се увеличава по-бързо от производството на стоки и услуги, това води до общо повишаване на цените.
reviewed: false
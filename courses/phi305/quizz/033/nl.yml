question: Is structurele inflatie het resultaat?
answer: Een toename van het geld Supply.
wrong_answers:
  - Prijsverhogingen
  - Fiscaal beleid.
  - Antiliberale maatregelen.
explanation: |
  Structurele inflatie is het resultaat van een stijging van de geldhoeveelheid Supply. Wanneer de hoeveelheid geld in omloop sneller stijgt dan de productie van goederen en diensten, leidt dit tot een algemene prijsstijging. Wanneer de hoeveelheid geld in omloop sneller toeneemt dan de productie van goederen en diensten, leidt dit tot een algemene prijsstijging.
reviewed: false
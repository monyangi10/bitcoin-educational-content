question: Является ли структурная инфляция результатом?
answer: Увеличение денег Supply.
wrong_answers:
  - Повышение цен
  - Фискальная политика.
  - Антилиберальные меры.
explanation: |
  Структурная инфляция - это результат увеличения денежной массы Supply. Когда количество денег в обращении растет быстрее, чем производство товаров и услуг, это приводит к общему росту цен.
reviewed: false
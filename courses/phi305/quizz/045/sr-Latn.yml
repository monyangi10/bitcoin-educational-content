question: Gde je razvijena "teorija afekta"?
answer: U trećem delu Etike.
wrong_answers:
  - U Traktatu o teologiji i politici.
  - U Spinozinoj prepisci.
  - U Raspravi o metodi.
explanation: |
  Teorija afekata je razvijena u trećem delu Etike. Ovde, Spinoza sistematski analizira ljudske emocije kao prirodne modifikacije tela i uma.

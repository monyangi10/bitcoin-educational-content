question: Gdzie powstała "teoria afektu"?
answer: W trzeciej części Etyki.
wrong_answers:
  - W Traktacie o teologii i polityce.
  - W korespondencji Spinozy.
  - W Dyskursie o metodzie.
explanation: |
  Teoria afektów została rozwinięta w trzeciej części Etyki. Tutaj Spinoza systematycznie analizuje ludzkie emocje jako naturalne modyfikacje ciała i umysłu.
reviewed: false
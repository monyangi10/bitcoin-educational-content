question: Hvor er "affektteori" utviklet?
answer: I den tredje delen av Etikk.
wrong_answers:
  - I Avhandling om teologi og politikk.
  - I Spinozas korrespondanse.
  - I Discourse on Method.
explanation: |
  Teorien om affekter utvikles i tredje del av Etikken. Her analyserer Spinoza systematisk de menneskelige følelsene som naturlige modifikasjoner av kropp og sinn.

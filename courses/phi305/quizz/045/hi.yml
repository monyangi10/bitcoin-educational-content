question: "प्रभाव सिद्धांत" कहाँ विकसित किया गया है?
answer: नीतिशास्त्र के तीसरे भाग में।
wrong_answers:
  - धर्मशास्त्र और राजनीति पर ग्रंथ में।
  - स्पिनोज़ा के पत्राचार में.
  - विधि पर प्रवचन में।
explanation: |
  प्रभावों का सिद्धांत नीतिशास्त्र के तीसरे भाग में विकसित किया गया है। यहाँ, स्पिनोज़ा मानवीय भावनाओं का शरीर और मन के स्वाभाविक परिवर्तनों के रूप में व्यवस्थित विश्लेषण करते हैं।
reviewed: false
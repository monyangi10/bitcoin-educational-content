question: Где разрабатывается "теория аффекта"?
answer: В третьей части "Этики.
wrong_answers:
  - В "Трактате о теологии и политике".
  - В переписке Спинозы.
  - В "Рассуждении о методе".
explanation: |
  Теория аффектов развивается в третьей части "Этики". Здесь Спиноза систематически анализирует человеческие эмоции как естественные модификации тела и разума.

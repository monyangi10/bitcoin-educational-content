question: Etki teorisi nerede geliştirilmiştir?
answer: Etik'in üçüncü bölümünde.
wrong_answers:
  - Teoloji ve Siyaset Üzerine İnceleme'de.
  - Spinoza'nın yazışmalarında.
  - Yöntem Üzerine Söylem'de.
explanation: |
  Duygulanımlar teorisi Etika'nın üçüncü bölümünde geliştirilir. Burada Spinoza insan duygularını beden ve zihnin doğal modifikasyonları olarak sistematik bir şekilde analiz eder.
reviewed: false
question: "\"affect theory\" พัฒนาขึ้นที่ไหน?"
answer: "ในส่วนที่สามของจริยธรรม"
wrong_answers:
  - "ในบทความว่าด้วยเทววิทยาและการเมือง"
  - "ในจดหมายโต้ตอบของสปิโนซา"
  - "ในบทสนทนาว่าด้วยวิธีการ"
explanation: |
  ทฤษฎีของอารมณ์ถูกพัฒนาในส่วนที่สามของจริยธรรม ที่นี่ สปิโนซ่าวิเคราะห์อารมณ์ของมนุษย์อย่างเป็นระบบในฐานะการเปลี่ยนแปลงตามธรรมชาติของร่างกายและจิตใจ
reviewed: false

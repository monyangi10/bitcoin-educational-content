question: Kus on välja töötatud "afektiteooria"?
answer: Eetika kolmandas osas.
wrong_answers:
  - Traktaadis teoloogia ja poliitika kohta.
  - Spinoza kirjavahetuses.
  - Diskursuses meetodi kohta.
explanation: |
  Eetika kolmandas osas arendatakse afektide teooriat. Siin analüüsib Spinoza süstemaatiliselt inimese emotsioone kui keha ja meele loomulikke modifikatsioone.

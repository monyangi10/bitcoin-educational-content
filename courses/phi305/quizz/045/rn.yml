question: None "theorie affect" itera imbere hehe?
answer: Mu gice ca gatatu c’Inyifato runtu.
wrong_answers:
  - Mu gitabu kivuga ivy’Imana n’ivya politike.
  - Mu makete ya Spinoza.
  - Mu Nsiguro yerekeye Uburyo.
explanation: |
  Ivyiyumviro vy’ingaruka birategurwa mu gice ca gatatu c’Inyifato runtu. Aha, Spinoza asesangura mu buryo butunganye inyiyumvo z’umuntu nk’uguhinduka kw’umubiri n’ubwenge mu buryo busanzwe.

question: Waar is de "affecttheorie" ontwikkeld?
answer: In het derde deel van de Ethiek.
wrong_answers:
  - In de Verhandeling over theologie en politiek.
  - In Spinoza's correspondentie.
  - In het vertoog over de methode.
explanation: |
  De theorie van affecten wordt ontwikkeld in het derde deel van de Ethica. Hier analyseert Spinoza systematisch menselijke emoties als natuurlijke modificaties van lichaam en geest.
reviewed: false
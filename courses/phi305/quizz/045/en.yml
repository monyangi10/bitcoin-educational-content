question: Where is "affect theory" developed?
answer: In the third part of the Ethics.
wrong_answers:
  - In the Treatise on Theology and Politics.
  - In Spinoza's correspondence.
  - In the Discourse on Method.
explanation: |
  The theory of affects is developed in the third part of the Ethics. Here, Spinoza systematically analyzes human emotions as natural modifications of body and mind.
reviewed: false
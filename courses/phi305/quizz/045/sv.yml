question: Var har "affektteorin" utvecklats?
answer: I den tredje delen av Ethics.
wrong_answers:
  - I Avhandling om teologi och politik.
  - I Spinozas korrespondens.
  - I diskursen om metod.
explanation: |
  Teorin om affekter utvecklas i den tredje delen av Etiken. Här analyserar Spinoza systematiskt mänskliga känslor som naturliga modifikationer av kropp och själ.

question: Kde se rozvíjí "teorie afektu"?
answer: Ve třetí části etiky.
wrong_answers:
  - V Pojednání o teologii a politice.
  - Ve Spinozově korespondenci.
  - V Rozpravě o metodě.
explanation: |
  Teorie afektů je rozpracována ve třetí části etiky. Spinoza zde systematicky analyzuje lidské emoce jako přirozené modifikace těla a mysli.

question: Où la « théorie des affects » est-elle développée?
answer: Dans la troisième partie de l'Éthique.
wrong_answers:
- Dans le Traité théologico-politique.
- Dans la correspondance de Spinoza.
- Dans le Discours de la méthode.
explanation: |
  La théorie des affects est développée dans la troisième partie de l'Éthique. Spinoza y analyse systématiquement les émotions humaines comme des modifications naturelles du corps et de l'esprit.
reviewed: false

question: Dove si sviluppa la "teoria degli affetti"?
answer: Nella terza parte dell'Etica.
wrong_answers:
  - Nel Trattato di teologia e politica.
  - Nella corrispondenza di Spinoza.
  - Nel Discorso sul metodo.
explanation: |
  La teoria degli affetti viene sviluppata nella terza parte dell'Etica. Qui Spinoza analizza sistematicamente le emozioni umane come modificazioni naturali del corpo e della mente.

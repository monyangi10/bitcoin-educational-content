question: Къде е разработена "теорията на въздействието"?
answer: В третата част на "Етика.
wrong_answers:
  - В "Трактат по теология и политика".
  - В кореспонденцията на Спиноза.
  - В "Разговор за метода".
explanation: |
  Теорията на афектите е развита в третата част на Етиката. Тук Спиноза систематично анализира човешките емоции като естествени модификации на тялото и ума.

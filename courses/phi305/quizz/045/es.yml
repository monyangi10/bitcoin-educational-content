question: ¿Dónde se desarrolla la "teoría del afecto"?
answer: En la tercera parte de la Ética.
wrong_answers:
  - En el Tratado de Teología y Política.
  - En la correspondencia de Spinoza.
  - En el Discurso del método.
explanation: |
  La teoría de los afectos se desarrolla en la tercera parte de la Ética. En ella, Spinoza analiza sistemáticamente las emociones humanas como modificaciones naturales del cuerpo y de la mente.

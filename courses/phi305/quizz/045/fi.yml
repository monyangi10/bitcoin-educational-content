question: Missä "affektiteoria" on kehitetty?
answer: Etiikan kolmannessa osassa.
wrong_answers:
  - Teologiaa ja politiikkaa käsittelevässä tutkielmassa.
  - Spinozan kirjeenvaihdossa.
  - Keskustelussa metodista.
explanation: |
  Affektien teoriaa kehitetään etiikan kolmannessa osassa. Tässä Spinoza analysoi systemaattisesti ihmisen tunteita ruumiin ja mielen luonnollisina muutoksina.

question: Wo wird die "Affekttheorie" entwickelt?
answer: Im dritten Teil der Ethik.
wrong_answers:
  - In der Abhandlung über Theologie und Politik.
  - In Spinozas Briefwechsel.
  - Im Diskurs über die Methode.
explanation: |
  Die Theorie der Affekte wird im dritten Teil der Ethik entwickelt. Hier analysiert Spinoza systematisch die menschlichen Gefühle als natürliche Modifikationen von Körper und Geist.

question: Onde é desenvolvida a "teoria dos afectos"?
answer: Na terceira parte da Ética.
wrong_answers:
  - No Tratado de Teologia e Política.
  - Na correspondência de Spinoza.
  - No Discurso do Método.
explanation: |
  A teoria dos afectos é desenvolvida na terceira parte da Ética. Aqui, Spinoza analisa sistematicamente as emoções humanas como modificações naturais do corpo e da mente.

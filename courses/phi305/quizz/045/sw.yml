question: Nadharia ya kuathiri inatengenezwa wapi?
answer: Katika sehemu ya tatu ya Maadili.
wrong_answers:
  - Katika Mkataba wa Theolojia na Siasa.
  - Katika mawasiliano ya Spinoza.
  - Katika Hotuba ya Mbinu.
explanation: |
  Nadharia ya athari inaendelezwa katika sehemu ya tatu ya Maadili. Hapa, Spinoza huchambua kwa utaratibu hisia za binadamu kama marekebisho ya asili ya mwili na akili.

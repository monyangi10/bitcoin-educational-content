question: Para Spinoza, el libre albedrío es..
answer: Una ilusión.
wrong_answers:
  - Una cualidad humana.
  - Una idea imposible.
  - Un proyecto.
explanation: |
  Para Spinoza, el libre albedrío es una ilusión. Creemos que somos libres porque ignoramos las causas que nos determinan. La verdadera libertad consiste en comprender y aceptar la necesidad.

question: สำหรับสปิโนซา เจตจำนงเสรีคืออะไร?
answer: ภาพลวงตา
wrong_answers:
  - คุณสมบัติของมนุษย์
  - ความคิดที่เป็นไปไม่ได้
  - โครงการ
explanation: |
  สำหรับสปิโนซา เสรีภาพในการเลือกเป็นภาพลวงตา เราเชื่อว่าเราเป็นอิสระเพราะเราไม่รู้สาเหตุที่กำหนดเรา เสรีภาพที่แท้จริงประกอบด้วยการเข้าใจและยอมรับความจำเป็น
reviewed: false
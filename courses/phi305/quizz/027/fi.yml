question: Spinozalle vapaa tahto on?
answer: Illuusio.
wrong_answers:
  - Inhimillinen ominaisuus.
  - Mahdoton ajatus.
  - Hanke.
explanation: |
  Spinozalle vapaa tahto on illuusio. Uskomme olevamme vapaita, koska jätämme huomiotta meitä määräävät syyt. Todellinen vapaus koostuu välttämättömyyden ymmärtämisestä ja hyväksymisestä.
reviewed: false
question: Đối với Spinoza, ý chí tự do là gì?
answer: Một ảo ảnh.
wrong_answers:
  - Một phẩm chất của con người.
  - Một ý tưởng không thể thực hiện được.
  - Một dự án.
explanation: |
  Với Spinoza, ý chí tự do là một ảo tưởng. Chúng ta tin rằng mình tự do vì chúng ta phớt lờ những nguyên nhân quyết định mình. Tự do đích thực nằm ở việc hiểu và chấp nhận sự tất yếu.

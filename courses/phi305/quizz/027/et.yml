question: Spinoza jaoks on vaba tahe?
answer: Illusioon.
wrong_answers:
  - Inimlik omadus.
  - Võimatu idee.
  - Projekt.
explanation: |
  Spinoza jaoks on vaba tahe illusioon. Me usume, et oleme vabad, sest me eirame põhjusi, mis meid määravad. Tõeline vabadus seisneb selles, et mõistame ja aktsepteerime vajalikkust.
reviewed: false
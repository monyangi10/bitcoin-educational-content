question: За Спиноза свободната воля е?
answer: Илюзия.
wrong_answers:
  - Човешко качество.
  - Невъзможна идея.
  - Проект.
explanation: |
  За Спиноза свободната воля е илюзия. Вярваме, че сме свободни, защото пренебрегваме причините, които ни определят. Истинската свобода се състои в това да разберем и приемем необходимостта.

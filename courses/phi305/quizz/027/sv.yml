question: För Spinoza är den fria viljan..
answer: En illusion.
wrong_answers:
  - En mänsklig kvalitet.
  - En omöjlig idé.
  - Ett projekt.
explanation: |
  För Spinoza är den fria viljan en illusion. Vi tror att vi är fria eftersom vi ignorerar de orsaker som bestämmer över oss. Sann frihet består i att förstå och acceptera nödvändigheten.

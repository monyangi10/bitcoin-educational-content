question: Kwa Spinoza, hiari ni?
answer: Udanganyifu.
wrong_answers:
  - Ubora wa kibinadamu.
  - Wazo lisilowezekana.
  - Mradi.
explanation: |
  Kwa Spinoza, hiari ni udanganyifu. Tunaamini tuko huru kwa sababu tunapuuza sababu zinazotuamua. Uhuru wa kweli ni kuelewa na kukubali ulazima.

question: Für Spinoza ist der freie Wille?
answer: Eine Illusion.
wrong_answers:
  - Eine menschliche Eigenschaft.
  - Eine unmögliche Idee.
  - Ein Projekt.
explanation: |
  Für Spinoza ist der freie Wille eine Illusion. Wir glauben, wir seien frei, weil wir die Ursachen, die uns bestimmen, ignorieren. Wahre Freiheit besteht im Verstehen und Akzeptieren der Notwendigkeit.
reviewed: false
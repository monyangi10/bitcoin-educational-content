question: For Spinoza er fri vilje?
answer: En illusjon.
wrong_answers:
  - En menneskelig egenskap.
  - En umulig idé.
  - Et prosjekt.
explanation: |
  For Spinoza er fri vilje en illusjon. Vi tror vi er frie fordi vi ignorerer årsakene som bestemmer over oss. Sann frihet består i å forstå og akseptere nødvendigheten.

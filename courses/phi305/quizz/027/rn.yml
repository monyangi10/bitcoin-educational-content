question: Ku bwa Spinoza, umwidegemvyo wo kwihitiramwo ni?
answer: Ukwihenda.
wrong_answers:
  - Kamere y’umuntu.
  - Iciyumviro kidashoboka.
  - Umugambi.
explanation: |
  Ku bwa Spinoza, umwidegemvyo wo kwihitiramwo ni ukwihenda. Twemera ko twidegemvya kuko twirengagiza imvo zitugena. Umwidegemvyo nyawo ushingiye ku gutahura no kwemera ivy’ingenzi.

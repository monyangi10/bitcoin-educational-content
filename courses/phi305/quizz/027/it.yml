question: Per Spinoza, il libero arbitrio è?
answer: Un'illusione.
wrong_answers:
  - Una qualità umana.
  - Un'idea impossibile.
  - Un progetto.
explanation: |
  Per Spinoza, il libero arbitrio è un'illusione. Crediamo di essere liberi perché ignoriamo le cause che ci determinano. La vera libertà consiste nel comprendere e accettare la necessità.

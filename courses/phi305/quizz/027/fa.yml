question: برای اسپینوزا، اراده آزاد چیست؟
answer: یک توهم.
wrong_answers:
  - یک ویژگی انسانی.
  - یک ایده غیرممکن.
  - یک پروژه.
explanation: |
  برای اسپینوزا، اراده آزاد یک توهم است. ما باور داریم که آزادیم زیرا از عللی که ما را تعیین می‌کنند، بی‌اطلاعیم. آزادی واقعی در فهم و پذیرش ضرورت نهفته است.
reviewed: false
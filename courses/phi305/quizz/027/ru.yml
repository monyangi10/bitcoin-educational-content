question: Для Спинозы свобода воли - это?
answer: Иллюзия.
wrong_answers:
  - Человеческое качество.
  - Невозможная идея.
  - Проект.
explanation: |
  Для Спинозы свобода воли - это иллюзия. Мы считаем себя свободными, потому что игнорируем причины, которые нас определяют. Истинная свобода заключается в понимании и принятии необходимости.

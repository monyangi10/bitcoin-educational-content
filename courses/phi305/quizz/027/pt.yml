question: Para Spinoza, o livre arbítrio é?
answer: Uma ilusão.
wrong_answers:
  - Uma qualidade humana.
  - Uma ideia impossível.
  - Um projeto.
explanation: |
  Para Spinoza, o livre arbítrio é uma ilusão. Acreditamos que somos livres porque ignoramos as causas que nos determinam. A verdadeira liberdade consiste em compreender e aceitar a necessidade.

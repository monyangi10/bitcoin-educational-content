question: Dla Spinozy wolna wola jest?
answer: Iluzja.
wrong_answers:
  - Ludzka jakość.
  - Niemożliwy pomysł.
  - Projekt.
explanation: |
  Dla Spinozy wolna wola jest iluzją. Wierzymy, że jesteśmy wolni, ponieważ ignorujemy przyczyny, które nas determinują. Prawdziwa wolność polega na zrozumieniu i zaakceptowaniu konieczności.
reviewed: false
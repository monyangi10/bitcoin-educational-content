question: Za Spinozu, slobodna volja je?
answer: Iluzija.
wrong_answers:
  - Ljudska osobina.
  - Nemoguća ideja.
  - Projekat.
explanation: |
  Za Spinozu, slobodna volja je iluzija. Verujemo da smo slobodni jer ignorišemo uzroke koji nas određuju. Prava sloboda se sastoji u razumevanju i prihvatanju nužnosti.

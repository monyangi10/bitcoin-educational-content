question: Pour Spinoza, le libre arbitre est ?
answer: Une illusion.
wrong_answers:
- Une qualité humaine.
- Une idée impossible.
- Un projet.
explanation: |
  Pour Spinoza, le libre arbitre est une illusion. Nous nous croyons libres parce que nous ignorons les causes qui nous déterminent. La vraie liberté consiste à comprendre et accepter la nécessité.
reviewed: false

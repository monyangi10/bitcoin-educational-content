question: Bagi Spinoza, kehendak bebas adalah?
answer: Sebuah ilusi.
wrong_answers:
  - Sebuah kualitas manusia.
  - Sebuah ide yang mustahil.
  - Sebuah proyek.
explanation: |
  Bagi Spinoza, kehendak bebas adalah sebuah ilusi. Kita percaya bahwa kita bebas karena kita mengabaikan sebab-sebab yang menentukan kita. Kebebasan sejati terdiri dari pemahaman dan penerimaan akan kebutuhan.

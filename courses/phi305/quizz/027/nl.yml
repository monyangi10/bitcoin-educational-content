question: Voor Spinoza is de vrije wil?
answer: Een illusie.
wrong_answers:
  - Een menselijke kwaliteit.
  - Een onmogelijk idee.
  - Een project.
explanation: |
  Voor Spinoza is de vrije wil een illusie. We denken dat we vrij zijn omdat we de oorzaken die ons bepalen negeren. Ware vrijheid bestaat uit het begrijpen en accepteren van noodzakelijkheid.

question: Pro Spinozu je svobodná vůle?
answer: Iluze.
wrong_answers:
  - Lidská vlastnost.
  - Nemožná představa.
  - Projekt.
explanation: |
  Podle Spinozy je svobodná vůle iluzí. Věříme, že jsme svobodní, protože ignorujeme příčiny, které nás určují. Skutečná svoboda spočívá v pochopení a přijetí nutnosti.
reviewed: false
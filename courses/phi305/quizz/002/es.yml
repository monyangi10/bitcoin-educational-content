question: La filosofía de Spinoza pretende?
answer: Alcanzar la libertad.
wrong_answers:
  - Conocimientos científicos.
  - Conocimientos históricos.
  - Conocimiento filosófico y moral.
explanation: |
  La filosofía de Spinoza pretende, en última instancia, alcanzar la libertad mediante el conocimiento y la comprensión. Para él, la verdadera libertad procede de la comprensión de las causas que nos determinan y de la aceptación racional de la necesidad.

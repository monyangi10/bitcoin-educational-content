question: ปรัชญาของสปิโนซามุ่งหมายที่จะ?
answer: บรรลุอิสรภาพ
wrong_answers:
  - ความรู้ทางวิทยาศาสตร์
  - ความรู้ทางประวัติศาสตร์
  - ความรู้ทางปรัชญาและศีลธรรม
explanation: |
  ปรัชญาของสปิโนซามุ่งหวังที่จะบรรลุเสรีภาพผ่านความรู้และความเข้าใจ สำหรับเขา เสรีภาพที่แท้จริงมาจากการเข้าใจสาเหตุที่กำหนดเรา และจากการยอมรับความจำเป็นอย่างมีเหตุผล
reviewed: false
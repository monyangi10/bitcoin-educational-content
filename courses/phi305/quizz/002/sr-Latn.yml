question: Filozofija Spinoze ima za cilj?
answer: Postizanje slobode.
wrong_answers:
  - Naučno znanje.
  - Istorijsko znanje.
  - Filozofsko i moralno znanje.
explanation: |
  Spinozina filozofija u konačnici ima za cilj postizanje slobode kroz znanje i razumevanje. Za njega, prava sloboda dolazi iz razumevanja uzroka koji nas određuju i iz racionalnog prihvatanja nužnosti.

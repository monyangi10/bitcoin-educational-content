question: Die Philosophie Spinozas zielt auf?
answer: Erreichen der Freiheit.
wrong_answers:
  - Wissenschaftliche Kenntnisse.
  - Historisches Wissen.
  - Philosophisches und moralisches Wissen.
explanation: |
  Spinozas Philosophie zielt letztlich darauf ab, Freiheit durch Wissen und Verstehen zu erreichen. Für ihn entsteht wahre Freiheit durch das Verständnis der Ursachen, die uns bestimmen, und durch die rationale Akzeptanz der Notwendigkeit.
reviewed: false
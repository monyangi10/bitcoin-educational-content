question: Spinozas filosofi syftar till att?
answer: Uppnå frihet.
wrong_answers:
  - Vetenskaplig kunskap.
  - Historisk kunskap.
  - Filosofisk och moralisk kunskap.
explanation: |
  Spinozas filosofi syftar i slutändan till att uppnå frihet genom kunskap och förståelse. För honom kommer sann frihet från att förstå de orsaker som bestämmer oss och från att rationellt acceptera nödvändigheten.
reviewed: false
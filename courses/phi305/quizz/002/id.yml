question: Filosofi Spinoza bertujuan untuk?
answer: Mencapai kebebasan.
wrong_answers:
  - Pengetahuan ilmiah.
  - Pengetahuan sejarah.
  - Pengetahuan filosofis dan moral.
explanation: |
  Filosofi Spinoza pada akhirnya bertujuan untuk mencapai kebebasan melalui pengetahuan dan pemahaman. Baginya, kebebasan sejati datang dari pemahaman tentang sebab-sebab yang menentukan kita, dan dari penerimaan rasional akan kebutuhan.
reviewed: false
question: Filozofiya ya Spinoza igamije?
answer: Gushika ku mwidegemvyo.
wrong_answers:
  - Ubumenyi bwo mu vya siyansi.
  - Ubumenyi bw’amateka.
  - Ubumenyi bwa filozofiya n’ubw’inyifato runtu.
explanation: |
  Filozofiya ya Spinoza amaherezo igamije kuronka umwidegemvyo biciye mu bumenyi n’ugutahura. Kuri we, umwidegemvyo nyawo uva mu gutahura imvo zituma tubaho, no mu kwemera mu buryo bubereye ko ari ngombwa.

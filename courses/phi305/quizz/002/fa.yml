question: فلسفه اسپینوزا به چه چیزی هدف دارد؟
answer: رسیدن به آزادی.
wrong_answers:
  - دانش علمی.
  - دانش تاریخی.
  - دانش فلسفی و اخلاقی.
explanation: |
  فلسفه اسپینوزا در نهایت به دنبال دستیابی به آزادی از طریق دانش و فهم است. برای او، آزادی واقعی از درک عللی که ما را تعیین می‌کنند و از پذیرش عقلانی ضرورت ناشی می‌شود.
reviewed: false
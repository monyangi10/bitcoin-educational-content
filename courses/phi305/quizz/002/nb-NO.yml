question: Spinozas filosofi har som mål å?
answer: Å oppnå frihet.
wrong_answers:
  - Vitenskapelig kunnskap.
  - Historisk kunnskap.
  - Filosofisk og moralsk kunnskap.
explanation: |
  Spinozas filosofi har som mål å oppnå frihet gjennom kunnskap og forståelse. For ham kommer sann frihet fra forståelsen av årsakene som bestemmer oss, og fra den rasjonelle aksepten av nødvendigheten.

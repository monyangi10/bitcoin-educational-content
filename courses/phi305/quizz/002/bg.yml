question: Философията на Спиноза има за цел?
answer: Постигнете свобода.
wrong_answers:
  - Научни знания.
  - Исторически познания.
  - Философско и морално познание.
explanation: |
  Философията на Спиноза в крайна сметка има за цел да постигне свобода чрез познание и разбиране. За него истинската свобода идва от разбирането на причините, които ни определят, и от рационалното приемане на необходимостта.
reviewed: false
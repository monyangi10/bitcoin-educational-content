question: Falsafa ya Spinoza inalenga?
answer: Kufikia uhuru.
wrong_answers:
  - Maarifa ya kisayansi.
  - Ujuzi wa kihistoria.
  - Ujuzi wa falsafa na maadili.
explanation: |
  Falsafa ya Spinoza hatimaye inalenga kupata uhuru kupitia maarifa na ufahamu. Kwa ajili yake, uhuru wa kweli unatokana na kuelewa sababu zinazotuamua, na kutokana na kukubalika kwa busara kwa umuhimu.
reviewed: true

question: A filosofia de Spinoza tem por objetivo?
answer: Alcançar a liberdade.
wrong_answers:
  - Conhecimento científico.
  - Conhecimento histórico.
  - Conhecimento filosófico e moral.
explanation: |
  A filosofia de Spinoza tem como objetivo último alcançar a liberdade através do conhecimento e da compreensão. Para ele, a verdadeira liberdade advém da compreensão das causas que nos determinam e da aceitação racional da necessidade.

question: Filozofia Spinozy ma na celu?
answer: Osiągnięcie wolności.
wrong_answers:
  - Wiedza naukowa.
  - Wiedza historyczna.
  - Wiedza filozoficzna i moralna.
explanation: |
  Filozofia Spinozy ostatecznie dąży do osiągnięcia wolności poprzez wiedzę i zrozumienie. Dla niego prawdziwa wolność pochodzi ze zrozumienia przyczyn, które nas determinują, oraz z racjonalnej akceptacji konieczności.
reviewed: false
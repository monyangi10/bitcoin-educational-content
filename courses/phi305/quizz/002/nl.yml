question: Spinoza's filosofie is gericht op?
answer: Vrijheid bereiken.
wrong_answers:
  - Wetenschappelijke kennis.
  - Historische kennis.
  - Filosofische en morele kennis.
explanation: |
  Spinoza's filosofie is uiteindelijk gericht op het bereiken van vrijheid door kennis en begrip. Voor hem komt ware vrijheid voort uit het begrijpen van de oorzaken die ons bepalen en uit de rationele acceptatie van noodzakelijkheid.
reviewed: false
question: Cílem Spinozovy filozofie je?
answer: Dosažení svobody.
wrong_answers:
  - Vědecké poznatky.
  - Historické znalosti.
  - Filozofické a morální poznání.
explanation: |
  Spinozova filozofie se nakonec snaží dosáhnout svobody prostřednictvím poznání a porozumění. Skutečná svoboda podle něj vychází z pochopení příčin, které nás určují, a z racionálního přijetí nutnosti.

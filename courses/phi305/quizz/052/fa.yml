question: چه کسی بیانیه Cypherpunk را نوشت؟
answer: اریک هیوز.
wrong_answers:
  - تیموتی می.
  - Satoshi ناکاموتو.
  - میلتون فریدمن.
explanation: |
  اریک هیوز نویسنده مانیفست Cypherpunk (1993) است. این متن بنیادی از استفاده از رمزنگاری برای حفاظت از حریم خصوصی در عصر دیجیتال دفاع می‌کند.
reviewed: false
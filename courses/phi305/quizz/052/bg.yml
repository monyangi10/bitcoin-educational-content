question: Кой написа манифеста на Cypherpunk?
answer: Ерик Хюз.
wrong_answers:
  - Тимъти Мей.
  - Satoshi Nakamoto.
  - Милтън Фридман.
explanation: |
  Ерик Хюз е автор на "Манифест на Cypherpunk" (1993 г.). Този основополагащ текст защитава използването на криптографията за защита на личните данни в цифровата ера.
reviewed: false
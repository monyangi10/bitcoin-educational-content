question: Кто написал манифест Cypherpunk?
answer: Эрик Хьюз.
wrong_answers:
  - Тимоти Мэй.
  - Satoshi Накамото.
  - Милтон Фридман.
explanation: |
  Эрик Хьюз - автор Манифеста Cypherpunk (1993). Этот основополагающий текст защищает использование криптографии для защиты конфиденциальности в цифровую эпоху.
reviewed: false
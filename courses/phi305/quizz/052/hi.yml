question: Cypherpunk घोषणापत्र किसने लिखा?
answer: एरिक ह्यूजेस.
wrong_answers:
  - टिमोथी मे.
  - जीडब्ल्यू-1 नाकामोटो.
  - मिल्टन फ्रीडमैन.
explanation: |
  एरिक ह्यूजेस Cypherpunk घोषणापत्र (1993) के लेखक हैं। यह मौलिक ग्रंथ डिजिटल युग में गोपनीयता की रक्षा के लिए क्रिप्टोग्राफी के उपयोग का समर्थन करता है।
reviewed: false
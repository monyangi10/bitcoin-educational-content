question: None ni nde yanditse manifesto ya Cypherpunk?
answer: Eriki Huze.
wrong_answers:
  - Timoteyo Gitugutu.
  - Satoshi Nakamoto.
  - Militoni Fridimani.
explanation: |
  Eric Hughes ni we yanditse igitabu ca Cypherpunk (1993). Ico canditswe c’imbuto kiraburanira ikoreshwa ry’ubuhinga bwo gukingira ubuzima bwite mu gihe c’ubuhinga bwa none.

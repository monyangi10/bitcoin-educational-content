question: Kdo napsal manifest Cypherpunk?
answer: Eric Hughes.
wrong_answers:
  - Timothy May.
  - Satoshi Nakamoto.
  - Milton Friedman.
explanation: |
  Eric Hughes je autorem manifestu Cypherpunk (1993). Tento zásadní text obhajuje používání kryptografie k ochraně soukromí v digitálním věku.

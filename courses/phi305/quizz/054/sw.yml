question: Ni mwanafalsafa gani aliyeanzisha dhana ya unihilism?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) alijenga na kuendeleza dhana ya nihilism. Kwake, nihilism inawakilisha kupunguzwa kwa maadili ya juu na kupoteza maana katika utamaduni wa Magharibi.

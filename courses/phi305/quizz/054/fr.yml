question: Quel philosophe a construit le concept du nihilisme ?
answer: Nietzsche.
wrong_answers:
- Kant.
- Schopenhauer.
- Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) a construit et développé le concept du nihilisme. Pour lui, le nihilisme représente la dévalorisation des valeurs suprêmes et la perte de sens dans la culture occidentale.

question: Кой философ разработва концепцията за нихилизма?
answer: Ницше.
wrong_answers:
  - Кант.
  - Шопенхауер.
  - Спиноза.
explanation: |
  Фридрих Ницше (1844-1900) изгражда и развива концепцията за нихилизма. За него нихилизмът представлява девалвация на висшите ценности и загуба на смисъл в западната култура.

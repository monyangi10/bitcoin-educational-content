question: किस दार्शनिक ने शून्यवाद की अवधारणा विकसित की?
answer: नीत्शे.
wrong_answers:
  - कांत.
  - शोपेनहावर.
  - स्पिनोज़ा.
explanation: |
  फ्रेडरिक नीत्शे (1844-1900) ने शून्यवाद की अवधारणा का निर्माण और विकास किया। उनके लिए, शून्यवाद सर्वोच्च मूल्यों के अवमूल्यन और पश्चिमी संस्कृति में अर्थ के ह्रास का प्रतिनिधित्व करता है।
reviewed: false
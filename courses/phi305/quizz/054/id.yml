question: Filsuf mana yang mengembangkan konsep nihilisme?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) membangun dan mengembangkan konsep nihilisme. Baginya, nihilisme merepresentasikan devaluasi nilai-nilai tertinggi dan hilangnya makna dalam budaya Barat.

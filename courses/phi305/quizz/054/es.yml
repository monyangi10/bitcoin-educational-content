question: ¿Qué filósofo desarrolló el concepto de nihilismo?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) construyó y desarrolló el concepto de nihilismo. Para él, el nihilismo representa la devaluación de los valores supremos y la pérdida de sentido de la cultura occidental.

question: Milline filosoof töötas välja nihilismi mõiste?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) konstrueeris ja arendas nihilismi mõistet. Tema jaoks tähistab nihilism kõrgeimate väärtuste devalveerimist ja tähenduse kaotamist lääne kultuuris.
reviewed: false
question: Kuka filosofi kehitti nihilismin käsitteen?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) loi ja kehitti nihilismin käsitteen. Hänelle nihilismi edustaa korkeimpien arvojen devalvaatiota ja länsimaisen kulttuurin merkityksen menetystä.

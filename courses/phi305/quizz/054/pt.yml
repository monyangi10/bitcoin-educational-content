question: Que filósofo desenvolveu o conceito de niilismo?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) construiu e desenvolveu o conceito de niilismo. Para ele, o niilismo representa a desvalorização dos valores supremos e a perda de sentido da cultura ocidental.

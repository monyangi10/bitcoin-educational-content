question: Vilken filosof utvecklade begreppet nihilism?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) konstruerade och utvecklade begreppet nihilism. För honom representerar nihilismen devalveringen av de högsta värdena och förlusten av mening i den västerländska kulturen.

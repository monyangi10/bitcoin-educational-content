question: Кто из философов разработал концепцию нигилизма?
answer: Ницше.
wrong_answers:
  - Кант.
  - Шопенгауэр.
  - Спиноза.
explanation: |
  Фридрих Ницше (1844-1900) создал и развил концепцию нигилизма. По его мнению, нигилизм представляет собой девальвацию высших ценностей и потерю смысла в западной культуре.

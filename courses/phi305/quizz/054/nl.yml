question: Welke filosoof ontwikkelde het begrip nihilisme?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) construeerde en ontwikkelde het begrip nihilisme. Voor hem staat het nihilisme voor de devaluatie van hoogste waarden en het verlies van betekenis in de Westerse cultuur.

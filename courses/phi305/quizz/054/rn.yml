question: Ni uwuhe munyabwenge yashizeho iciyumviro c’uko ata co bimaze?
answer: Nizeshe.
wrong_answers:
  - Kant.
  - Umunyabwenge.
  - Sipinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) ni we yubatse yongera atera imbere iciyumviro c’uko ata co bimaze. Kuri we, nihilisme igereranya ugutakaza agaciro k’agaciro gahambaye no gutakaza insobanuro mu muco w’Uburengero.
reviewed: false
question: Nhà triết học nào đã phát triển khái niệm chủ nghĩa hư vô?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) là người đã xây dựng và phát triển khái niệm chủ nghĩa hư vô. Đối với ông, chủ nghĩa hư vô đại diện cho sự hạ thấp các giá trị tối cao và sự mất đi ý nghĩa trong văn hóa phương Tây.
reviewed: false
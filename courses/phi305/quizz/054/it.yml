question: Quale filosofo ha sviluppato il concetto di nichilismo?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) ha costruito e sviluppato il concetto di nichilismo. Per lui, il nichilismo rappresenta la svalutazione dei valori supremi e la perdita di significato della cultura occidentale.

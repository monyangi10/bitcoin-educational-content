question: นักปรัชญาคนใดที่พัฒนามโนทัศน์ของลัทธิความไร้ค่า?
answer: Nietzsche.
wrong_answers:
  - คานท์
  - โชเปนเฮาเออร์
  - สปิโนซา
explanation: |
  ฟรีดริช นีทเชอ (1844-1900) ได้สร้างและพัฒนามโนทัศน์ของลัทธิความไร้ค่า สำหรับเขา ลัทธิความไร้ค่าหมายถึงการลดคุณค่าของค่านิยมสูงสุดและการสูญเสียความหมายในวัฒนธรรมตะวันตก
reviewed: false
question: Nihilizm kavramını hangi filozof geliştirmiştir?
answer: Nietzsche.
wrong_answers:
  - Kant.
  - Schopenhauer.
  - Spinoza.
explanation: |
  Friedrich Nietzsche (1844-1900) nihilizm kavramını oluşturmuş ve geliştirmiştir. Ona göre nihilizm, yüce değerlerin değersizleşmesini ve Batı kültüründeki anlam kaybını temsil eder.
reviewed: false
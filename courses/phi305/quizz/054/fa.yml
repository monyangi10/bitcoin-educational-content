question: کدام فیلسوف مفهوم نیهیلیسم را توسعه داد؟
answer: نیچه.
wrong_answers:
  - کانت.
  - شوپنهاور.
  - اسپینوزا.
explanation: |
  فریدریش نیچه (1844-1900) مفهوم نیهیلیسم را ساخت و توسعه داد. برای او، نیهیلیسم نمایانگر بی‌ارزش شدن ارزش‌های برتر و از دست رفتن معنا در فرهنگ غربی است.
reviewed: false
question: Kenen motto on "ajattele itse"?
answer: Kant.
wrong_answers:
  - Spinoza.
  - Diderot.
  - Donald Trump.
explanation: |
  ajattelemaan itse" (sapere aude) on Immanuel Kantin motto ja valistuksen tunnuslause. Kyse on rohkeudesta käyttää omaa ymmärrystä ilman muiden holhousta.

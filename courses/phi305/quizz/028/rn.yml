question: Ni nde afise icivugo ngo "wiyumvire wewe nyene"?
answer: Kant.
wrong_answers:
  - Sipinoza.
  - Didero.
  - Donald Trump.
explanation: |
  kwiyumvira" (sapere aude) ni co civugo ca Immanuel Kant kandi ni ijambo ry'ibanga ry'Umuco. Ni ukugira umutima rugabo wo gukoresha ugutahura kwiwe ata n'umwe amurongoye.
reviewed: false
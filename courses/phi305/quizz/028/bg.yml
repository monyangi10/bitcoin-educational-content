question: Чий девиз е "Мисли сам за себе си"?
answer: Кант.
wrong_answers:
  - Спиноза.
  - Дидро.
  - Доналд Тръмп.
explanation: |
  "Мисли сам за себе си" (sapere aude) е девизът на Имануел Кант и девизът на Просвещението. Става дума за смелостта да използваш собственото си разбиране без опеката на другите.
reviewed: false
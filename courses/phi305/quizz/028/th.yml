question: คำขวัญของใครคือ "คิดด้วยตัวเอง"?
answer: คานท์
wrong_answers:
  - สปิโนซา
  - ดิดโรต์
  - โดนัลด์ ทรัมป์
explanation: |
  "คิดด้วยตัวเอง" (sapere aude) เป็นคำขวัญของอิมมานูเอล คานท์และเป็นคำขวัญของยุคแห่งการตรัสรู้ มันเกี่ยวกับการมีความกล้าที่จะใช้ความเข้าใจของตนเองโดยไม่ต้องพึ่งพาการชี้แนะของผู้อื่น
reviewed: false
question: Moto siapa yang "berpikir untuk diri sendiri"?
answer: Kant.
wrong_answers:
  - Spinoza.
  - Diderot.
  - Donald Trump.
explanation: |
  "Berpikir untuk diri sendiri" (sapere aude) adalah moto Immanuel Kant dan semboyan Pencerahan. Ini adalah tentang keberanian untuk menggunakan pemahaman sendiri tanpa bimbingan orang lain.

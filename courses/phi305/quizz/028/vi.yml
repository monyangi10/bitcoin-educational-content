question: Câu châm ngôn "tự suy nghĩ" của ai?
answer: Kant.
wrong_answers:
  - Spinoza.
  - Diderot.
  - Donald Trump.
explanation: |
  "Tự suy nghĩ" (sapere aude) là phương châm của Immanuel Kant và là khẩu hiệu của thời kỳ Khai sáng. Đó là việc có can đảm sử dụng sự hiểu biết của chính mình mà không cần sự chỉ bảo của người khác.

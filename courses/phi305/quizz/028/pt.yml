question: De quem é o lema "pensa por ti próprio"?
answer: Kant.
wrong_answers:
  - Spinoza.
  - Diderot.
  - Donald Trump.
explanation: |
  pensar por si próprio" (sapere aude) é o lema de Immanuel Kant e a palavra de ordem do Iluminismo. Trata-se de ter a coragem de usar o seu próprio entendimento sem a tutela de outros.

question: De qui « penser par soi-même » est-il la devise ?
answer: Kant.
wrong_answers:
- Spinoza.
- Diderot.
- Donald Trump.
explanation: |
  'Penser par soi-même' (sapere aude) est la devise d'Emmanuel Kant et le mot d'ordre des Lumières. Il s'agit d'avoir le courage de se servir de son propre entendement sans la tutelle d'autrui.

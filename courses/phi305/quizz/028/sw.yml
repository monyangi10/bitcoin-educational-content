question: Kauli mbiu ya nani ni "fikiria mwenyewe"?
answer: Kant.
wrong_answers:
  - Spinoza.
  - Diderot.
  - Donald Trump.
explanation: |
  kujifikiria mwenyewe" (sapere aude) ni kauli mbiu ya Immanuel Kant na msemo wa Mwangaza. Ni juu ya kuwa na ujasiri wa kutumia ufahamu wako bila kufunzwa na wengine.
reviewed: true

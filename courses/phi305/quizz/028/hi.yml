question: किसका आदर्श वाक्य है "स्वयं के लिए सोचो"?
answer: कांत.
wrong_answers:
  - स्पिनोज़ा.
  - डिडेरो.
  - डोनाल्ड ट्रम्प.
explanation: |
  "स्वयं सोचना" (सपेरे औडे) इमैनुएल कांट का आदर्श वाक्य और ज्ञानोदय का मूलमंत्र है। यह दूसरों के मार्गदर्शन के बिना अपनी समझ का उपयोग करने का साहस रखने के बारे में है।
reviewed: false
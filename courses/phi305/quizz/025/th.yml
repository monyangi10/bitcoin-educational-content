question: René Descartes เชื่อในเสรีภาพในการเลือกหรือไม่?
answer: ไม่เคย
wrong_answers:
  - สำหรับผู้ใหญ่เท่านั้น
  - ถ้าเราได้ศึกษาเรื่องปรัชญาเท่านั้น
  - ภายใต้เงื่อนไขบางประการ
explanation: |
  เรอเน เดการ์ตไม่เคยเชื่อในเจตจำนงเสรี เขายืนยันว่าการกระทำทั้งหมดของเราถูกกำหนดโดยสาเหตุก่อนหน้า แม้ว่าเขาจะพยายามรักษารูปแบบหนึ่งของเสรีภาพของเจตจำนงไว้ก็ตาม
reviewed: false
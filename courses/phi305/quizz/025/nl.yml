question: Geloofde René Descartes in de Vrije Wil?
answer: Nooit.
wrong_answers:
  - Alleen voor volwassenen.
  - Alleen als we filosofie hadden gestudeerd.
  - Onder bepaalde voorwaarden.
explanation: |
  René Descartes geloofde nooit in de vrije wil. Hij hield vol dat al onze handelingen worden bepaald door voorafgaande oorzaken, hoewel hij probeerde een vorm van vrijheid van de wil te behouden.
reviewed: false
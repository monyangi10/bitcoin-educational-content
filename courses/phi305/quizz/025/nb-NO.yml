question: Trodde René Descartes på den frie vilje?
answer: Aldri.
wrong_answers:
  - Kun for voksne.
  - Bare hvis vi hadde studert filosofi.
  - Under visse betingelser.
explanation: |
  René Descartes trodde aldri på den frie viljen. Han hevdet at alle våre handlinger er bestemt av forutgående årsaker, selv om han forsøkte å bevare en form for viljesfrihet.

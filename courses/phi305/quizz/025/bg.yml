question: Вярвал ли е Рене Декарт в свободната воля?
answer: Никога.
wrong_answers:
  - Само за възрастни.
  - Само ако бяхме учили философия.
  - При определени условия.
explanation: |
  Рене Декарт никога не е вярвал в свободната воля. Той твърди, че всички наши действия се определят от предварителни причини, въпреки че се опитва да запази някаква форма на свобода на волята.
reviewed: false
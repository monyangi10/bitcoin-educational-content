question: آیا رنه دکارت به اراده آزاد باور داشت؟
answer: هرگز.
wrong_answers:
  - فقط برای بزرگسالان.
  - فقط اگر فلسفه خوانده بودیم.
  - تحت شرایط خاص.
explanation: |
  رنه دکارت هرگز به اراده آزاد باور نداشت. او معتقد بود که تمام اعمال ما توسط علل قبلی تعیین می‌شوند، اگرچه سعی کرد نوعی آزادی اراده را حفظ کند.
reviewed: false
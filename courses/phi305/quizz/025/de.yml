question: Hat René Descartes an den freien Willen geglaubt?
answer: Niemals.
wrong_answers:
  - Nur für Erwachsene.
  - Nur wenn wir Philosophie studiert hätten.
  - Unter bestimmten Bedingungen.
explanation: |
  René Descartes glaubte nie an den freien Willen. Er vertrat die Ansicht, dass alle unsere Handlungen durch vorherige Ursachen bestimmt sind, obwohl er versuchte, eine gewisse Form der Willensfreiheit zu bewahren.
reviewed: false
question: Apakah René Descartes percaya pada Kehendak Bebas?
answer: Tidak pernah.
wrong_answers:
  - Hanya untuk orang dewasa.
  - Hanya jika kita mempelajari filsafat.
  - Dalam kondisi tertentu.
explanation: |
  René Descartes tidak pernah percaya pada kehendak bebas. Dia berpendapat bahwa semua tindakan kita ditentukan oleh sebab-sebab sebelumnya, meskipun dia mencoba mempertahankan beberapa bentuk kebebasan kehendak.

question: Верил ли Рене Декарт в свободу воли?
answer: Никогда.
wrong_answers:
  - Только для взрослых.
  - Только если бы мы изучали философию.
  - При определенных условиях.
explanation: |
  Рене Декарт никогда не верил в свободу воли. Он утверждал, что все наши действия определяются предшествующими причинами, хотя и пытался сохранить некоторую форму свободы воли.

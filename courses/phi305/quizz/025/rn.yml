question: René Descartes yoba yemera ko umuntu afise uburenganzira bwo kwihitiramwo?
answer: Ntiyigera.
wrong_answers:
  - Ku bakuze gusa.
  - Iyo twize filozofiya gusa.
  - Mu bihe bimwebimwe.
explanation: |
  René Descartes ntiyigeze yemera umwidegemvyo wo kwihitiramwo. Yagumye avuze yuko ibikorwa vyacu vyose bigenwa n’imvo zibanza, naho nyene yagerageza kuzigama uburyo bumwebumwe bwo kwidegemvya mu kwihitiramwo.

question: René Descartes credeva nel libero arbitrio?
answer: Mai.
wrong_answers:
  - Solo per adulti.
  - Solo se avessimo studiato filosofia.
  - A determinate condizioni.
explanation: |
  René Descartes non ha mai creduto nel libero arbitrio. Sosteneva che tutte le nostre azioni sono determinate da cause antecedenti, anche se cercava di preservare una qualche forma di libertà della volontà.
reviewed: false
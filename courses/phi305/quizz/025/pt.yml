question: René Descartes acreditava no livre arbítrio?
answer: Nunca.
wrong_answers:
  - Apenas para adultos.
  - Só se tivéssemos estudado filosofia.
  - Em determinadas condições.
explanation: |
  René Descartes nunca acreditou no livre arbítrio. Defendia que todas as nossas acções são determinadas por causas anteriores, embora tentasse preservar alguma forma de liberdade da vontade.

question: क्या रेने डेसकार्टेस स्वतंत्र इच्छा में विश्वास करते थे?
answer: कभी नहीं।
wrong_answers:
  - केवल वयस्कों के लिए.
  - काश हमने दर्शनशास्त्र का अध्ययन किया होता।
  - कुछ शर्तों के अधीन.
explanation: |
  रेने डेसकार्टेस कभी भी स्वतंत्र इच्छा में विश्वास नहीं करते थे। उनका मानना ​​था कि हमारे सभी कार्य पूर्व कारणों से निर्धारित होते हैं, हालाँकि उन्होंने इच्छा की स्वतंत्रता को किसी न किसी रूप में बनाए रखने की कोशिश की।
reviewed: false
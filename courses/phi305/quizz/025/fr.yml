question: René Descartes croyait-il au Libre arbitre ?
answer: Jamais.
wrong_answers:
- Seulement pour les adultes.
- Seulement si on avait étudié la philosophie.
- Dans certaines conditions.
explanation: |
  René Descartes ne croyait jamais au libre arbitre. Il soutenait que toutes nos actions sont déterminées par des causes antérieures, bien qu'il ait tenté de préserver une certaine forme de liberté de la volonté.
reviewed: false

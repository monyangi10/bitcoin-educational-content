question: यह कहने का मतलब क्या है कि Bitcoin एक ब्लैक होल की तरह है?
answer: यह गायब नहीं होगा और समय के साथ अपने रास्ते में आने वाली हर चीज़ को सोख लेगा।
wrong_answers:
  - वो अपने ही भार के नीचे आख़िरकार ढेर हो जाएगा।
  - यह वैश्विक वित्तीय प्रणाली के लिए एक खतरा है।
  - यह एक रहस्य है जिसे वैज्ञानिक अभी भी समझने की कोशिश कर रहे हैं।
explanation: |
  यह कहना कि Bitcoin एक ब्लैक होल की तरह है, इसकी मजबूती की ओर इशारा करता है।
  और इसकी वह क्षमता जो इसे प्रमुख वित्तीय प्रणाली बना सकती है, सभी अन्य प्रणालियों को अपने में समाहित करते हुए।
  उसके रास्ते में।

question: Ni kubera iki bihambaye ko uhora ushira kugihe ubuhinga bwawe ukoresha?
answer: Gukosora ukugyagoya kw'umutekano kuzwi
wrong_answers:
  - Kugira  .ngo wongereze umuvuduko w'inyabwonko yawe kugira ubone ningonga abashaka kukwinjirira
  - Kugira ngo wongereko ibikoresho vyo kwirinda
  - Kugira ngo umukino wa videwo uhure neza na Bitcoin.
explanation: |
  Ivyo guhindura kenshi birakosora ubugoyagoye buzwi abasuma bakoresha.

question: Защо е важно редовно да актуализирате системата и софтуера си?
answer: Отстраняване на известни уязвимости в сигурността
wrong_answers:
  - Подобряване на скоростта на компютъра и по-бързо реагиране на кибератаки
  - Добавяне на функции за хакерство
  - Оптимизиране на съвместимостта на видеоигрите с Bitcoin
explanation: |
  Актуализациите често поправят известни уязвимости, които се използват от хакери.

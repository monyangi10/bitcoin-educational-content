question: सॉफ्टवेयर अपडेट का मुख्य मकसद क्या है?
answer: सॉफ्टवेयर के बग्स को ठीक करने और उसकी सुरक्षा बढ़ाने के लिए
wrong_answers:
  - नए फीचर्स जोड़ने के लिए
  - सॉफ्टवेयर Interface को बदलने के लिए
  - सॉफ़्टवेयर का आकार बढ़ाने के लिए
explanation: |
  सॉफ़्टवेयर अपडेट्स में अक्सर नए फीचर्स होते हैं, लेकिन उनका मुख्य मकसद
  सॉफ्टवेयर के बग्स को ठीक करना और उसकी सुरक्षा को बेहतर बनाना है। यह सॉफ्टवेयर को सुरक्षित रखने के लिए बेहद जरूरी है।
  तुम्हारा कंप्यूटर बिल्कुल ठीक तरह से चले।

question: Kwa nini ni muhimu kusasisha mfumo na programu yako mara kwa mara?
answer: Ili kurekebisha udhaifu wa usalama unaojulikana
wrong_answers:
  - Ili kuboresha kasi ya Kompyuta na hivyo kujibu kwa haraka zaidi mashambulizi ya mtandaoni
  - Ili kuongeza vipengele vya udukuzi
  - Ili kuboresha uoanifu wa mchezo wa video na Bitcoin
explanation: |
  Masasisho mara nyingi hurekebisha udhaifu unaojulikana ambao hutumiwa na wadukuzi.
reviewed: true

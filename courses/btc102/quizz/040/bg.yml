question: Каква стратегия за придобиване може да бъде приета от хибриден HODL-ър?
answer: Осредняване на разходите в долари (DCA)
wrong_answers:
  - Алгоритмична търговия
  - Арбитраж
  - Хакерство
explanation: |
  Осредняването на разходите в долари позволява редовните покупки на биткойни да изгладят средната цена на покупката с течение на времето. HODL-ър може да комбинира това с периодични покупки на еднократна сума.
reviewed: false

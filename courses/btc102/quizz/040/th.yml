question: กลยุทธ์การเข้าซื้อแบบใดที่ผู้ถือแบบไฮบริดสามารถนำมาใช้ได้?
answer: การถัวเฉลี่ยต้นทุนเป็นเงินดอลลาร์
wrong_answers:
  - การซื้อขายด้วยอัลกอริทึม
  - อาร์บิทราจ
  - แฮ็กกิ้ง
explanation: |
  Dollar-Cost Averaging ช่วยให้สามารถซื้อบิตคอยน์เป็นประจำเพื่อปรับราคาเฉลี่ยของการซื้อให้ราบรื่นขึ้นตามเวลา ผู้ถืออาจรวมสิ่งนี้กับการซื้อแบบก้อนใหญ่เป็นครั้งคราว
reviewed: false
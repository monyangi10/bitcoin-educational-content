question: Người nắm giữ hỗn hợp có thể áp dụng chiến lược mua nào?
answer: Chiến lược trung bình giá
wrong_answers:
  - Giao dịch thuật toán
  - Trọng tài
  - Tin tặc
explanation: |
  Chiến lược trung bình giá cho phép mua Bitcoin thường xuyên để làm phẳng giá mua trung bình theo thời gian. Người nắm giữ có thể kết hợp điều này với việc mua một lần thỉnh thoảng.

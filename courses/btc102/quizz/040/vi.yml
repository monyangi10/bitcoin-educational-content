question: Người nắm giữ hỗn hợp có thể áp dụng chiến lược mua nào?
answer: Chiến lược trung bình giá
wrong_answers:
  - Giao dịch thuật toán
  - Trọng tài
  - Tin tặc
explanation: |
  Chiến lược bình quân giá theo thời gian (Dollar-Cost Averaging) cho phép mua Bitcoin đều đặn để làm giảm sự biến động của giá mua trung bình theo thời gian. Người nắm giữ Bitcoin có thể kết hợp điều này với những lần mua một khoản tiền lớn không thường xuyên.
reviewed: true
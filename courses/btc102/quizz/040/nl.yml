question: Welke overnamestrategie kan een hybride hodler toepassen?
answer: Dollar-Cost Averaging
wrong_answers:
  - Algoritmische handel
  - Arbitrage
  - Hacken
explanation: |
  Dollar-Cost Averaging staat regelmatige Bitcoin aankopen toe om de gemiddelde aankoopprijs in de loop van de tijd af te vlakken. De hodler kan dit combineren met incidentele aankopen ineens.

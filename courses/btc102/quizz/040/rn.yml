question: Ni ubuhe buryo bwo kuronka bushobora gukoreshwa n’umunyamideri w’umunyamigwi?
answer: Idolari-Igiciro ca mwayeni
wrong_answers:
  - Ubucuruzi bwa algorithme
  - Ubukemurampaka
  - Gutera
explanation: |
  Dollar-Cost Averaging iremesha ugugura kwa Bitcoin kwa misi yose kugira ngo ushiremwo igiciro c’ugugura gisanzwe mu gihe. Uwo hodler yoshobora gufatanya ivyo n’ugugura rimwe na rimwe amahera menshi.

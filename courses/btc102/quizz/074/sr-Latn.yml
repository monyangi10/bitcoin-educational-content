question: Koji je glavni cilj Bitcoin stackera?
answer: Da akumuliraš što više satoshija moguće
wrong_answers:
  - Da akumuliraš što više bitkoina koliko je moguće
  - Da biste prodali robu ili usluge u Bitcoin
  - Da kupite Bitcoin direktno u gotovini sa prijateljima ili članovima Bitcoin zajednice
explanation: |
  Glavni cilj Bitcoin stackera je da akumulira što više satoshija
  koliko je moguće. Ovo se postiže postavljanjem plana prosečnog dolara (DCA) i
  traženjem drugih rešenja za akumulaciju satoshija.

question: Bitcoin स्टैकर का मुख्य लक्ष्य क्या है?
answer: जितने हो सके उतने सतोशी जमा करने के लिए
wrong_answers:
  - जितने ज्यादा बिटकॉइन जमा कर सकते हो, करो
  - Bitcoin में सामान या सेवाएं बेचने के लिए
  - Bitcoin को सीधे कैश में दोस्तों या Bitcoin कम्युनिटी के मेंबर्स से खरीदने के लिए
explanation: |
  Bitcoin स्टैकर का मुख्य लक्ष्य जितने हो सके उतने सातोशी जमा करना है
  (जितना हो सके। यह डॉलर-कॉस्ट एवरेजिंग (DCA) प्लान सेट अप करके हासिल किया जाता है और)
  सतोशी जमा करने के और तरीके ढूंढ रहा हूँ।
reviewed: false
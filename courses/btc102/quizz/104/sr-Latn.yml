question: Koji je prvi korak u kreiranju plana nasledstva prema poglavlju?
answer: Odaberite prave ljude koji će pomoći vašim naslednicima.
wrong_answers:
  - Napiši pismo.
  - Izvršite jednostavan i brz popis.
  - Unajmi advokata.
explanation: |
  Prvi korak u kreiranju plana nasledstva, kako je predloženo u poglavlju,
  je odabir pravih ljudi koji će pomoći vašim naslednicima.

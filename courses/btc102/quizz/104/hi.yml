question: अध्याय के अनुसार वारिसी योजना बनाने का पहला कदम क्या है?
answer: अपने वारिसों की मदद के लिए सही लोगों को चुनें।
wrong_answers:
  - पत्र लिखो।
  - एक सरल और जल्दी इन्वेंटरी करो।
  - वकील रख लो।
explanation: |
  अध्याय में सुझाव दिया गया है कि वंशानुक्रम योजना बनाने का पहला कदम,
  यह सही लोगों को चुनने के बारे में है जो आपके वारिसों की मदद करेंगे।
reviewed: false
question: Jaki jest pierwszy krok w tworzeniu planu spadkowego zgodnie z tym rozdziałem?
answer: Wybierz odpowiednie osoby do pomocy spadkobiercom.
wrong_answers:
  - Napisz list.
  - Przeprowadź prostą i szybką inwentaryzację.
  - Zatrudnij prawnika.
explanation: |
  Pierwszym krokiem w tworzeniu planu spadkowego, jak zasugerowano w rozdziale,
  jest wybranie odpowiednich osób, które pomogą spadkobiercom.
reviewed: false
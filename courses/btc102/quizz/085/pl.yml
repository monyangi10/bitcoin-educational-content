question: Do czego służy Hot Wallet w kontekście Bitcoin?
answer: Regularne wysyłanie i odbieranie bitcoinów do codziennego użytku.
wrong_answers:
  - Bezpieczne przechowywanie bitcoinów przez długi czas.
  - Aby wydobywać nowe bitcoiny.
  - Aby handlować bitcoinami na platformie Exchange.
explanation: |
  Hot Wallet to rodzaj Bitcoin Wallet, który jest podłączony do Internetu,
  dzięki czemu nadaje się do codziennych transakcji. Jest on jednak bardziej podatny na włamania
  i kradzież niż Cold Wallet.
reviewed: false
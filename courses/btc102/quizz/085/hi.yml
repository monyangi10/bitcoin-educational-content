question: Hot और Wallet का इस्तेमाल Bitcoin के संदर्भ में किस लिए होता है?
answer: रोज़मर्रा के इस्तेमाल के लिए बिटकॉइन को नियमित भेजना और प्राप्त करना।
wrong_answers:
  - बिटकॉइन को लंबे समय तक सुरक्षित रखने के लिए।
  - नए बिटकॉइन माइन करने के लिए।
  - Exchange प्लेटफॉर्म पर बिटकॉइन ट्रेड करने के लिए।
explanation: |
  एक Hot Wallet एक प्रकार का Bitcoin Wallet है जो इंटरनेट से जुड़ा होता है,
  इसे रोज़मर्रा के लेन-देन के लिए उपयुक्त बनाता है। हालाँकि, यह हैकिंग के प्रति अधिक संवेदनशील है।
  और चोरी Cold Wallet से ज्यादा।
reviewed: false
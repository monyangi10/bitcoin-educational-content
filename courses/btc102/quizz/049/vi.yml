question: Mục đích chính của việc tích lũy là gì?
answer: Tích lũy dần satoshi (đơn vị nhỏ nhất của Bitcoin)
wrong_answers:
  - Đầu cơ ngắn hạn
  - Mua một lượng lớn satoshi cùng một lúc
  - Sử dụng Bitcoin cho các khoản thanh toán hàng ngày
explanation: |
  Người tích lũy đầu tư những khoản tiền nhỏ theo định kỳ để tính trung bình giá theo thời gian.
reviewed: false
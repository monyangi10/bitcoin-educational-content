question: Qual è l'obiettivo principale dello stacking?
answer: Accumulare gradualmente satoshi
wrong_answers:
  - Speculazione a breve termine
  - Acquistare una grande quantità di satoshi in una sola volta
  - Utilizzo di Bitcoin per i pagamenti giornalieri
explanation: |
  Uno stacker investe piccoli importi a intervalli regolari per fare una media del prezzo di acquisto nel tempo.
reviewed: true

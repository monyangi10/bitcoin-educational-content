question: Каква е основната цел на stack-ването?
answer: Постепенно натрупване на сатошита
wrong_answers:
  - Краткосрочни спекулации
  - Закупуване на голямо количество сатошита наведнъж
  - Използване на Bitcoin за ежедневни плащания
explanation: |
  Stack-ърът инвестира малки суми на равни интервали от време, за да осредни покупната цена с течение на времето.

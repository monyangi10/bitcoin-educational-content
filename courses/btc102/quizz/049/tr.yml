question: İstiflemenin ana amacı nedir?
answer: Yavaş yavaş biriken satoshiler
wrong_answers:
  - Kısa vadeli spekülasyon
  - Tek seferde büyük miktarda satoshis satın almak
  - Günlük ödemeler için Bitcoin'ı kullanma
explanation: |
  İstifleyici, satın alma fiyatının zaman içinde ortalamasını almak için düzenli aralıklarla küçük miktarlarda yatırım yapar.
reviewed: false
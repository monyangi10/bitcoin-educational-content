question: एक DIY (Do It Yourself) Wallet की मुख्य खासियत क्या है?
answer: यह एक 100% ओपन सोर्स समाधान है जिसे घर पर बनाया जा सकता है, ताकि उत्पादन या निर्माण श्रृंखला में दूसरे खिलाड़ियों पर भरोसे के जोखिम को कम किया जा सके।
wrong_answers:
  - यह बिटकॉइन को स्टोर करने के लिए एक हार्डवेयर डिवाइस है।
  - यह Mining बिटकॉइन्स के लिए एक सॉफ्टवेयर है।
  - यह बिटकॉइन खरीदने और बेचने का एक प्लेटफॉर्म है
explanation: |
  अध्याय की सामग्री बताती है कि DIY (खुद करो) वॉलेट 100%
  घर पर बनाए जा सकने वाले ओपन सोर्स समाधान जो भरोसे के जोखिम को कम कर सकें
  उत्पादन या निर्माण श्रृंखला में शामिल अन्य कलाकार।

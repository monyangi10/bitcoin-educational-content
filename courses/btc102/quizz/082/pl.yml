question: Jaki jest główny cel decyzji inwestycyjnych podejmowanych przez układarkę Bitcoin?
answer: Zgromadzenie jak największej liczby satoshi
wrong_answers:
  - Krótkoterminowe zmiany cen
  - Sprzedaż towarów lub usług w Bitcoin
  - Zakup dużej ilości Bitcoin za jednym razem
explanation: |
  Głównym celem decyzji inwestycyjnych Bitcoin jest zgromadzenie jak największej liczby satoshi
  jak największej liczby satoshi. Osiąga się to poprzez ustanowienie planu uśredniania kosztów w dolarach (DCA)
  (DCA) i szukanie innych rozwiązań w celu gromadzenia satoshi.

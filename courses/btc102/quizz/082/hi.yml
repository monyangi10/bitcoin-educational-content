question: Bitcoin स्टैकर के निवेश के फैसलों का मुख्य फोकस क्या है?
answer: जितने हो सके उतने सतोशी जमा करना
wrong_answers:
  - अल्पकालिक कीमतों में उतार-चढ़ाव
  - Bitcoin में सामान या सेवाएं बेचना
  - एक साथ बड़ी मात्रा में Bitcoin खरीदना
explanation: |
  Bitcoin स्टैकर के निवेश निर्णयों का मुख्य फोकस जमा करना होता है
  जितने ज़्यादा सैटोशी मिल सकें। यह डॉलर-कॉस्ट एवरेजिंग सेट अप करके हासिल किया जाता है।
  (डीसीए) प्लान और सतोशी जमा करने के लिए दूसरे तरीकों की तलाश में हूँ।
reviewed: false
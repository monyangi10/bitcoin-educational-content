question: Welches Protokoll auf der zweiten Schicht (second-layer) ermöglicht nahezu sofortige Zahlungen?
answer: Lightning Network
wrong_answers:
  - Side Chains
  - RGB
  - Bitcoin Core
explanation: |
  Das Lightning Network ermöglicht schnelle und kostengünstige Transaktionen durch off-chain Operationen ausserhalb der Bitcoin Blockchain.
reviewed: false

question: Jaki jest limit bitcoinów, które kiedykolwiek będą dostępne?
answer: 21 milionów
wrong_answers:
  - 100 milionów
  - 1 miliard
  - Bez limitu
explanation: |
  Rozdział ten stanowi, że nigdy nie będzie więcej niż 21 milionów bitcoinów.
  Limit ten został ustalony w protokole Bitcoin przez Satoshi i nie można go zmienić
  dzisiaj.
reviewed: false
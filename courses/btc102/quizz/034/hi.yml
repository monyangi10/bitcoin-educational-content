question: बिटकॉइन की अधिकतम सीमा क्या है?
answer: 2.1 करोड़
wrong_answers:
  - 10 करोड़
  - 1 अरब
  - कोई सीमा नहीं
explanation: |
  अध्याय में कहा गया है कि 21 मिलियन से ज़्यादा बिटकॉइन कभी नहीं होंगे।
  यह लिमिट Bitcoin प्रोटोकॉल में Satoshi द्वारा तय की गई थी और इसे बदला नहीं जा सकता
  आज।

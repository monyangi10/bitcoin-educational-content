question: Koja je glavna karakteristika pristupa "stacker-a" ulaganju u Bitcoin?
answer: Doslednost i besprekorno organizovanje
wrong_answers:
  - Spontanost i fleksibilnost
  - Visok rizik i visoka nagrada
  - Kratkoročno ulaganje i brzi povratak
explanation: |
  Pristup investiranju u Bitcoin kod stakera karakteriše doslednost i besprekorna organizacija. Oni pažljivo planiraju svoja ulaganja i organizovani su u sprovođenju svog plana prosečne cene dolara (DCA).
reviewed: false
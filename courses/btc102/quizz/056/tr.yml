question: İşlemlerin On-Chain (blok zincir üzerinde) izlenebilirliğini korumak için hangi yöntem kullanılıyor?
answer: CoinJoin ve PayJoin tekniklerinin kullanılması
wrong_answers:
  - Aynı alıcı Address'in yeniden kullanılması
  - UTXO'ların sık sık konsolidasyonu
  - Bir kripto pazar yerinin saklama cüzdanına (custodial wallet) yatırma ile
explanation: |
  Coinjoins ve payjoins, On-Chain etkinliğinin gizliliğini artırmaya yardımcı olur.
reviewed: false

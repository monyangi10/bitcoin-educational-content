question: İşlemlerin On-Chain izlenebilirliğini korumak için hangi yöntem kullanılıyor?
answer: CoinJoin ve PayJoin tekniklerinin kullanılması
wrong_answers:
  - Aynı alıcı Address'ün yeniden kullanılması
  - UTXO'ların sık sık konsolidasyonu
  - Bir saklama kuruluşuna yatırma Wallet
explanation: |
  Coinjoins ve payjoins, On-Chain etkinliğinin gizliliğini artırmaya yardımcı olur.

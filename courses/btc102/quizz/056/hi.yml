question: Bitcoin का अंतिम विज़न Bitcoin हाईवे मेटाफर के अनुसार क्या है?
answer: यह इंटरनेट ट्रैफिक और दुनिया की 90% आबादी के लिए एक हाईवे बन जाएगा।
wrong_answers:
  - यह एक लग्ज़री चीज़ बन जाएगी जो सिर्फ अमीरों की पहुँच में होगी।
  - यह अवैध गतिविधियों का एक औज़ार बन जाएगा।
  - यह पुराना हो जाएगा और दूसरी क्रिप्टोकरेंसी से बदल दिया जाएगा।
explanation: |
  जीडब्ल्यू-1 हाईवे का रूपक यह दर्शाता है कि जीडब्ल्यू-1 एक ऐसा हाईवे बनेगा
  इंटरनेट ट्रैफिक और दुनिया की 90% आबादी के लिए, सामान और सेवाओं के साथ
  इस हाईवे पर सीधे पहुँचा जा सकता है।

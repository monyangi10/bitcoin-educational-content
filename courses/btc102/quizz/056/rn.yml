question: Ni uburyo ubuhe bukoreshwa mu kurinda On-Chain gukurikirana amafaranga n'ibikorwa vyawe?
answer: Gukoresha ubuhinga bwa CoinJoin na PayJoin
wrong_answers:
  - Gusubira gukoresha iyo Address nyene yakira.
  - Guhuza kenshi ama UTXO
  - Gushira mu gitabu c’ububiko Wallet.
explanation: |
  Coinjoins na payjoins zifasha mu gutuma ubuzima bwite bw’igikorwa ca On-Chain butera imbere.
reviewed: false

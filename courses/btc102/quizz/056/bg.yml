question: Какъв метод се използва за защита на проследимостта на трансакциите on-chain?
answer: Използване на техниките coinjoin и payjoin
wrong_answers:
  - Повторно използване на един и същ адрес за получаване
  - Често консолидиране на UTXOs
  - Депозиране в попечителски фонд wallet
explanation: |
  Coinjoins и payjoins помагат за подобряване на поверителността на дейността на on-chain.
reviewed: false
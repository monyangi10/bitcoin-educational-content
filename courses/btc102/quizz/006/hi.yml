question: वित्तीय निवेश के क्षेत्र में एक आम घोटाला क्या है?
answer: पिरामिड सेलिंग सिस्टम।
wrong_answers:
  - भौतिक सामान बेचना।
  - सॉफ्टवेयर प्रोडक्ट्स बेचना।
  - फिएट करेंसी बेच रहा हूँ।
explanation: |
  वित्तीय निवेश के क्षेत्र में, पिरामिड बेचने वाली प्रणालियाँ और पोंज़ी
  योजनाएँ अवैध मॉडल के रूप में सामने आती हैं। ये नए निवेशकों के पैसे का इस्तेमाल करके चलती हैं।
  पुराने भागीदारों को भुगतान करना।

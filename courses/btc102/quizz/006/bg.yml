question: Кое е основното предимство на използването на мениджър на пароли?
answer: Той съхранява и генерира сложни пароли
wrong_answers:
  - Предоставя съвети за запомняне на паролите
  - Използва повторно едни и същи пароли в различни онлайн акаунти
  - Замества необходимостта от антивирусен софтуер
explanation: |
  Мениджърът на пароли създава силни пароли и ги съхранява на сигурно място, като позволява лесното им извличане, без да е необходимо да ги запомняте.

question: Ni akamaro akahe nyamukuru ko gukoresha umucungerezi w’ijambobanga?
answer: Ibika kandi itanga amajambo banga agoranye
wrong_answers:
  - Itanga impanuro zo kwibuka amajambobanga yawe
  - Isubira gukoresha amajambo banga amwe kuri konti zitandukanye zo kuri interineti
  - Isubirira ivy'uko hakenewe porogaramu zirwanya virusi .
explanation: |
  Uwujejwe amajambo y’ibanga arahingura amajambo y’ibanga akomeye maze akayabika neza, ivyo bikaba bituma umuntu ashobora kuyaronka bitagoranye ataco akeneye kuyafata mu mutwe.

question: Ni akahe kamaro nyamukuru ko gukoresha umugenzuzi w’ijambobanga?
answer: Irabika kandi igatanga amajambo banga agoranye
wrong_answers:
  - Itanga ikintu kigufasha kwibuka ijambo banga ryawe
  - Isubira gukoresha amajambo banga amwe kuri konti zitandukanye zo kuri interineti
  - Isubirira ivy'uko hakenewe porogaramu zirwanya virusi .
explanation: |
  Umugenzuzi w'amajambo y’ibanga arahingura amajambo y’ibanga akomeye maze akayabika neza, ivyo bikaba bituma umuntu ashobora kuyaronka bitagoranye itanabanje kuyafata mu mutwe.

question: ओपनोड, स्विस जीडब्ल्यू-0 पे, और बीटीसीपे जैसी कंपनियों की जीडब्ल्यू-0 इकोसिस्टम में क्या भूमिका है?
answer: वे ऐसे टूल्स मुहैया कराते हैं जो बिज़नेस के लिए Bitcoin को स्वीकार करना आसान बना देते हैं।
wrong_answers:
  - वे Bitcoin खनन करते हैं।
  - वे Bitcoin को रेगुलेट करते हैं।
  - वे Bitcoin जारी करते हैं।
explanation: |
  कंपनियाँ जैसे OpenNode, Swiss Bitcoin Pay, और BTCPay टूल्स मुहैया कराती हैं
  जिससे व्यापारियों के लिए Bitcoin को स्वीकार करना आसान हो जाता है, जिससे इसके अपनाने में मदद मिलती है
  और रोज़मर्रा के लेन-देन में इस्तेमाल करें।
reviewed: false
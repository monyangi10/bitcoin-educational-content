question: Какви предимства дава управлението на собствен възел Bitcoin?
answer: Независимост
wrong_answers:
  - Ликвидност
  - Централизация
  - Скорост
explanation: |
  Управлението на собствен възел осигурява независимост от трети страни и защитава поверителността на трансакциите ви.

question: Welcher Begriff bezieht sich auf die programmierte Aufteilung der Entschädigung für das 'Minen' von Blöcken?
answer: Halving
wrong_answers:
  - Fork
  - Bisektion
  - Coinbase
explanation: |
  Halving bezieht sich auf die Halbierung der Mining Entschädigung alle 210.000 Blöcke.

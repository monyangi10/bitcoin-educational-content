question: Bitcoin निवेश का सुनहरा नियम क्या है?
answer: तुम्हारी चाबी नहीं, तो तुम्हारे बिटकॉइन भी नहीं।
wrong_answers:
  - जितना गंवा सको, उससे ज़्यादा कभी न लगाओ।
  - जो ट्रेंडी है उससे बचो।
  - फाइनेंस में सफलता पाने के लिए प्लानिंग और लॉन्ग-टर्म विज़न होना बहुत ज़रूरी है।
explanation: |
  Bitcoin निवेश का सुनहरा नियम है: अगर आपकी चाबी नहीं, तो आपके बिटकॉइन भी नहीं।
  इसका मतलब है कि अगर आपके पास अपनी प्राइवेट की का कंट्रोल नहीं है, तो आप सच में
  अपने बिटकॉइन्स खुद के पास रखो।
reviewed: false
question: Koji je najteži deo biti Hodler prema poglavlju?
answer: Ne raditi ništa i držati se za Bitcoin.
wrong_answers:
  - Kupovina Bitcoin.
  - Postavljanje Cold Wallet.
  - Postavljanje plana nasledstva.
explanation: |
  Poglavlje pominje da je najteži deo biti Hodler ne raditi ništa, tj. odoleti iskušenju da prodaš i zadržiš Bitcoin na duži rok.
reviewed: false
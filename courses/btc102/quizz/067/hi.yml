question: अध्याय के अनुसार, होल्डर बनने में सबसे मुश्किल हिस्सा क्या है?
answer: कुछ नहीं करना और Bitcoin को पकड़े रहना।
wrong_answers:
  - Bitcoin खरीदना।
  - Cold और Wallet सेट कर रहे हैं।
  - विरासत की योजना बनाना।
explanation: |
  अध्याय में यह बताया गया है कि होल्डर होने का सबसे मुश्किल हिस्सा है...
  कुछ नहीं, यानी बेचने के लालच से बचना और Bitcoin को पकड़े रखना।
  लंबे समय तक।
reviewed: false
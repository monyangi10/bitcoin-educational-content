question: Lợi thế chính của Bitcoin khi đối mặt với khủng hoảng tiền tệ là gì?
answer: Bảo vệ sức mua của tiền tiết kiệm chống lại sự bào mòn sức mua của lạm phát
wrong_answers:
  - Tăng lãi suất
  - Đảm bảo lợi nhuận cố định
  - Cung cấp bảo hiểm ngân hàng
explanation: |
  Bitcoin có khả năng bảo vệ và chống lại sự mất giá tiền tệ nhờ chính sách điều chỉnh giảm nguồn cung có thể dự đoán được.
reviewed: true
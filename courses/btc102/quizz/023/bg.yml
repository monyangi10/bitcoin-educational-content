question: Кое е основното предимство на Bitcoin в условията на парични кризи?
answer: Запазване на спестяванията срещу инфлация
wrong_answers:
  - Увеличаване на лихвените проценти
  - Гарантиране на фиксирана възвръщаемост
  - Предоставяне на банково застраховане
explanation: |
  Bitcoin предлага защита срещу девалвация на валутата благодарение на предвидимата си емисионна политика.

question: Wat is het belangrijkste voordeel van Bitcoin bij monetaire crises?
answer: Sparen tegen inflatie
wrong_answers:
  - Rentes verhogen
  - Vast rendement garanderen
  - Bancaire verzekering
explanation: |
  Bitcoin biedt bescherming tegen valutadevaluatie dankzij het voorspelbare uitgiftebeleid.

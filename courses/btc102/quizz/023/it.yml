question: Qual è il principale vantaggio di avere Bitcoin di fronte alle crisi monetarie?
answer: Conservare i risparmi contro l'inflazione
wrong_answers:
  - Aumento dei tassi di interesse
  - Garantire rendimenti fissi
  - Assicurazione bancaria
explanation: |
  Bitcoin offre protezione contro la svalutazione della moneta grazie alla sua politica di emissione programmata.
reviewed: true

question: 在 Bitcoin 投資的背景下，什麼是 FOMO？
answer: Fear Of Missing Out（害怕錯失機會），可能會導致衝動性投資。
wrong_answers:
  - 害怕出價，這會導致投資猶豫不決。
  - Fear Of Market Oscillations（恐懼市場震盪），可能導致對市場波動的焦慮。
  - Fear Of Monetary Overload（恐懼貨幣超載），可能導致過度投資。
explanation: |
  在 Bitcoin 投資的背景下，FOMO 代表「害怕錯過」（Fear Of Missing Out）。
  的縮寫。這可能會導致投資者因害怕錯失潛在利潤而搶購 Bitcoin 的衝動性投資。
  的潛在利潤。

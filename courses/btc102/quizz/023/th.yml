question: ข้อได้เปรียบหลักของ Bitcoin ในสถานการณ์วิกฤตการเงินคืออะไร?
answer: การรักษาเงินออมให้ปลอดภัยจากเงินเฟ้อ
wrong_answers:
  - การเพิ่มขึ้นของอัตราดอกเบี้ย
  - การรับประกันผลตอบแทนคงที่
  - การให้บริการประกันภัยธนาคาร
explanation: |
  Bitcoin มอบการป้องกันจากการลดค่าเงินด้วยนโยบายการออกที่คาดการณ์ได้
reviewed: false
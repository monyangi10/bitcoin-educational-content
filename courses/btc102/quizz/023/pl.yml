question: Czym jest FOMO w kontekście inwestycji Bitcoin?
answer: Fear Of Missing Out, który może prowadzić do impulsywnych inwestycji.
wrong_answers:
  - Strach przed składaniem ofert, który może prowadzić do wahań w inwestowaniu.
  - Strach przed oscylacjami rynkowymi, który może prowadzić do niepokoju związanego ze zmiennością rynku.
  - Strach przed przeciążeniem monetarnym, który może prowadzić do przeinwestowania.
explanation: |
  W kontekście inwestycji Bitcoin, FOMO oznacza Fear Of Missing
  Out. Może to prowadzić do impulsywnych inwestycji, ponieważ inwestorzy spieszą się z zakupem Bitcoin ze strachu przed utratą potencjalnych zysków
  ze strachu przed utratą potencjalnych zysków.

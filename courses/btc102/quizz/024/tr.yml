question: Barack Obama Bitcoin'ı nasıl tanımladı?
answer: Cebinizde bir İsviçre bankası
wrong_answers:
  - Dijital altın
  - Oldukça spekülatif bir varlık
  - Merkezi olmayan bir para birimi
explanation: |
  Barack Obama bir keresinde Bitcoin'den "cebinizde bir İsviçre bankası" olarak bahsetmişti. Gerçekten de Bitcoin, statüsü ne olursa olsun herkese aynı fırsatları sunmakta ve gizli işlemlere'e izin vermektedir.
reviewed: false

question: Come ha descritto Bitcoin Barack Obama?
answer: Una banca svizzera in tasca
wrong_answers:
  - Oro digitale
  - Un bene altamente speculativo
  - Una moneta decentralizzata
explanation: |
  Barack Obama ha definito Bitcoin come "una banca svizzera in tasca" In effetti, Bitcoin offre le stesse opportunità a tutti, a prescindere dallo status, e consente transazioni confidenziali.
reviewed: true

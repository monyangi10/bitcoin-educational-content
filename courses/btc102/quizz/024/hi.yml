question: Bitcoin निवेश में विनम्र और सतर्क रहने का क्या महत्व है?  

(सीधे और सरल हिंदी में अनुवाद, विशेष अक्षर और फॉर्मेटिंग को बरकरार रखते हुए)
answer: अपने आप को उजागर करके, आप एक संभावित निशाना बन जाएंगे, जिससे आपके और आपके परिवार के लिए खतरा बढ़ जाएगा।
wrong_answers:
  - विनम्र और सावधान रहकर, आप दूसरे निवेशकों का ध्यान खींचने से बच सकते हैं।
  - विनम्र और सावधान रहकर, तुम Bitcoin समुदाय का ध्यान खींचने से बच सकते हो।
  - विनम्र और सावधान रहकर, आप मीडिया का ध्यान खींचने से बच सकते हैं।
explanation: |
  Bitcoin निवेश में, विनम्र और सतर्क रहना ज़रूरी है क्योंकि
  अपने आप को उजागर करके, तुम एक संभावित निशाना बन जाओगे, जिससे खतरा और बढ़ जाएगा।
  अपने और अपने परिवार के लिए।

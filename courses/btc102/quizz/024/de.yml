question: Wie hat Barack Obama Bitcoin beschrieben?
answer: Als ein Schweizer Bankkonto in der Hosentasche
wrong_answers:
  - Als digitales Gold
  - Als einen hochspekulativen Vermögenswert
  - Als eine dezentralisierte Währung
explanation: |
  Barack Obama bezeichnete Bitcoin einmal als "ein Schweizer Bankkonto in der Hosentasche". In der Tat bietet Bitcoin unabhängig vom Status jedem die gleichen Möglichkeiten und ermöglicht vertrauliche Transaktionen.
reviewed: false

question: Hoe beschreef Barack Obama Bitcoin?
answer: Een Zwitserse bank in je zak
wrong_answers:
  - Digitaal goud
  - Een zeer speculatief actief
  - Een gedecentraliseerde munt
explanation: |
  Barack Obama noemde Bitcoin ooit "een Zwitserse bank in je zak" Bitcoin biedt inderdaad dezelfde mogelijkheden aan iedereen, ongeacht status, en maakt Confidential Transactions mogelijk.

question: None Barack Obama yadondora gute Bitcoin?
answer: Banki y'Ubusuwisi iri mu mufuko wawe
wrong_answers:
  - Inzahabu y'ubuhinga bwa none
  - Itunga ry'ukwiyumvira ku bintu vyinshi
  - Ifaranga ridafisweko ububasha
explanation: |
  Barack Obama yigeze kuvuga ko Bitcoin ari "banki y'Ubusuwisi iri mu mufuko wawe." Nkako, Bitcoin itanga amahirwe amwe ku muntu wese, ataravye ikibanza afise, kandi iremeza umutekano ku mwidondoro w'umuntu no ku bikorwa vyo kurungika no kubikura akora.

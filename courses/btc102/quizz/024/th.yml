question: บารัค โอบามาอธิบาย Bitcoin อย่างไร?
answer: ธนาคารสวิสในกระเป๋าของคุณ
wrong_answers:
  - ดิจิทัลโกลด์
  - สินทรัพย์ที่มีการเก็งกำไรสูง
  - สกุลเงินแบบกระจายอำนาจ
explanation: |
  บารัค โอบามา เคยกล่าวถึง Bitcoin ว่าเป็น "ธนาคารสวิสในกระเป๋าของคุณ" จริงๆ แล้ว Bitcoin มอบโอกาสเดียวกันให้กับทุกคน ไม่ว่าจะมีสถานะใด และอนุญาตให้ทำธุรกรรมอย่างเป็นความลับ
reviewed: false
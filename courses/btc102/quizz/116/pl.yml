question: Jaki jest cel powolnego gromadzenia bitcoinów?
answer: Aby strategia inwestycyjna rozwijała się w czasie.
wrong_answers:
  - Aby wydobywać nowe Bitcoiny.
  - Aby handlować Bitcoinami.
  - Aby zamienić Bitcoiny na inne kryptowaluty.
explanation: |
  Powolne gromadzenie bitcoinów jest strategią, która pozwala inwestycji
  rozwijać się w czasie. Nie jest używana do Mining nowych Bitcoinów, handlu Bitcoinami lub
  konwersji Bitcoinów na inne kryptowaluty.
reviewed: false
question: धीरे-धीरे बिटकॉइन जमा करने का मकसद क्या है?
answer: अपनी निवेश रणनीति को समय के साथ खुलने देना।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  धीरे-धीरे बिटकॉइन जमा करना एक ऐसी रणनीति है जो आपके निवेश को...
  समय के साथ धीरे-धीरे खुलना। यह Mining नए बिटकॉइन, बिटकॉइन की ट्रेडिंग, या
  बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलना।
reviewed: false
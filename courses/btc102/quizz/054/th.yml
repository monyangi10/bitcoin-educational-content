question: เป้าหมายหลักของผู้ใช้ที่ใช้งานอยู่คืออะไร?
answer: ในการใช้ Bitcoin เป็นวิธีการชำระเงินรายวัน
wrong_answers:
  - ลงทุนในบิตคอยน์ระยะยาว
  - ค่อยๆ สะสมซาโตชิ
  - คาดการณ์เกี่ยวกับตลาด
explanation: |
  ผู้ใช้ที่ใช้งานอยู่รวม Bitcoin เข้ากับชีวิตประจำวันของพวกเขาเพื่อทำธุรกรรมและสนับสนุนการนำไปใช้
reviewed: false
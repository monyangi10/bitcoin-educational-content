question: Aktif kullanıcının ana hedefi nedir?
answer: Bitcoin'ı günlük ödeme yöntemi olarak kullanmak için
wrong_answers:
  - Bitcoin'e uzun vadeli yatırım yapmak
  - Yavaş yavaş satoshis biriktirmek için
  - Piyasa hakkında spekülasyon yapmak
explanation: |
  Aktif kullanıcı, işlem yapmak ve benimsenmesini desteklemek için Bitcoin'yi günlük yaşamına dahil eder.

question: Каква е основната цел на активния потребител?
answer: Използване на Bitcoin като метод за ежедневно плащане
wrong_answers:
  - Инвестиране в биткойн в дългосрочен план
  - Постепенно натрупване на сатоши
  - Спекулиране с пазара
explanation: |
  Активният потребител включва Bitcoin в ежедневието си, за да извършва транзакции и да подкрепя приемането му.

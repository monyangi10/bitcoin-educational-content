question: ข้อได้เปรียบหลักที่วิธีการแบบชั้นนำเสนอสำหรับ Bitcoin คืออะไร?
answer: การรักษาความปลอดภัยของโปรโตคอลพื้นฐาน
wrong_answers:
  - การรวมศูนย์ของเครือข่ายหลักที่เพิ่มขึ้น
  - นวัตกรรมที่รวดเร็วบนโปรโตคอลพื้นฐาน
  - มีคุณสมบัติเหมือนกันบนเลเยอร์เช่นเดียวกับบนโปรโตคอลพื้นฐาน
explanation: |
  วิธีการแบบเลเยอร์ช่วยให้สามารถเพิ่มฟังก์ชันการทำงานได้โดยไม่กระทบต่อความปลอดภัยและความเรียบง่ายของโปรโตคอลพื้นฐาน
reviewed: false
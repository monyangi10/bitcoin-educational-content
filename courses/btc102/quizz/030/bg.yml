question: Какво основно предимство предлага многопластовият подход за Bitcoin?
answer: Поддържане на сигурността на базовия протокол
wrong_answers:
  - Все по-голяма централизация на основната мрежа
  - Бързи иновации в базовия протокол
  - Същите характеристики на слоевете, както и на базовия протокол
explanation: |
  Многопластовият подход позволява да се добавят функционалности, без да се нарушава сигурността и простотата на основния протокол.
reviewed: false
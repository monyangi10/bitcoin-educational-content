question: Bitcoin और Blockchain क्या है?
answer: एक डेटाबेस जो सभी Bitcoin लेन-देन को रिकॉर्ड करता है
wrong_answers:
  - एक प्रकार की डिजिटल करेंसी
  - Bitcoin उपयोगकर्ताओं का एक नेटवर्क
  - Mining बिटकॉइन्स का एक तरीका
explanation: |
  जीडब्ल्यू-6 जीडब्ल्यू-5 एक डेटाबेस है जो सभी जीडब्ल्यू-6 लेनदेन को रिकॉर्ड करता है।
  इसे माइनर्स द्वारा बनाए रखा जाता है जो Blockchain में नए ट्रांजैक्शन जोड़ते हैं।

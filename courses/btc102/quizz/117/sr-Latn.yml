question: Koja je svrha obrazovanja o tehničkim, ideološkim i filozofskim aspektima Bitcoin?
answer: Da bismo bolje razumeli Bitcoin i njegov potencijalni uticaj na svet.
wrong_answers:
  - Da se iskopaju novi Bitcoini.
  - Da trgujete Bitcoinima.
  - Da konvertujete Bitcoine u druge kriptovalute.
explanation: |
  Obrazovanje o tehničkim, ideološkim i filozofskim aspektima
  Bitcoin je važno za bolje razumevanje Bitcoin i njegovog potencijalnog uticaja
  na svet. Ne koristi se za Mining nove Bitcoine, trgovanje Bitcoinima ili konvertovanje
  Bitcoina u druge kriptovalute.
reviewed: false
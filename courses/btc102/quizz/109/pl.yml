question: Czym jest Lightning Network w kontekście Bitcoin?
answer: Druga technologia Layer, która przynosi zupełnie nową wizję tego, czym jest Bitcoin.
wrong_answers:
  - Sieć górników Bitcoin.
  - Nowy typ Bitcoin.
  - Platforma handlowa Bitcoin.
explanation: |
  Lightning Network to protokół płatności Layer 2, który działa na
  na kryptowalucie opartej na Blockchain (jak Bitcoin). Został zaprojektowany, aby umożliwić
  szybkie transakcje między uczestniczącymi węzłami.
reviewed: false
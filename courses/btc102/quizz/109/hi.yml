question: Bitcoin के संदर्भ में Lightning Network क्या है?
answer: एक दूसरी Layer टेक्नोलॉजी जो Bitcoin के बारे में एक बिल्कुल नया नज़रिया लाती है।
wrong_answers:
  - Bitcoin माइनर्स का एक नेटवर्क।
  - एक नया किस्म का Bitcoin.
  - एक जीडब्ल्यू-6 ट्रेडिंग प्लेटफॉर्म।
explanation: |
  जीडब्ल्यू-7 एक जीडब्ल्यू-8 2 पेमेंट प्रोटोकॉल है जो काम करता है
  एक Blockchain-आधारित क्रिप्टोकरेंसी (जैसे Bitcoin) के शीर्ष पर। यह सक्षम बनाने के लिए डिज़ाइन किया गया है।
  भाग लेने वाले नोड्स के बीच तेज़ लेन-देन।

question: Šta je Lightning Network u kontekstu Bitcoin?
answer: Druga Layer tehnologija koja donosi potpuno novu viziju onoga što je Bitcoin.
wrong_answers:
  - Mreža Bitcoin rudara.
  - Nova vrsta Bitcoin.
  - Bitcoin platforma za trgovanje.
explanation: |
  Lightning Network je Layer 2 protokol plaćanja koji operiše na
  vrhu kriptovalute zasnovane na Blockchain (kao što je Bitcoin). Dizajniran je da omogući
  brze transakcije među čvorovima koji učestvuju.

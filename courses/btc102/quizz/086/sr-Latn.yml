question: Koji je način kupovine ili prodaje bitkoina bez KYC-a?
answer: Korišćenje peer-to-peer rešenja kao što je Peach.
wrong_answers:
  - Korišćenje Hot Wallet.
  - Korišćenje Cold Wallet.
  - Korišćenje Hardware Wallet.
explanation: |
  KYC, ili Know Your Customer, je proces koji preduzeća koriste za verifikaciju
  identiteta svojih klijenata. Metode bez KYC-a, kao što su peer-to-peer rešenja,
  omogućavaju korisnicima da kupuju ili prodaju bitkoine bez potrebe za pružanjem ličnih informacija.

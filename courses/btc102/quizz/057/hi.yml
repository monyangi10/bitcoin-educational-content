question: DCA का मतलब है "Dollar Cost Averaging" जो Bitcoin निवेश के संदर्भ में इस्तेमाल होता है। यह एक ऐसी रणनीति है जहां आप नियमित अंतराल पर एक निश्चित रकम निवेश करते हैं, चाहे बाजार की कीमतें कैसी भी हों। इससे आपको लंबे समय में औसत खरीद मूल्य मिलता है और बाजार के उतार-चढ़ाव का असर कम होता है।
answer: डॉलर कॉस्ट एवरेजिंग
wrong_answers:
  - सीधी मुद्रा अधिग्रहण
  - डिजिटल सिक्का आवंटन
  - विकेंद्रीकृत क्रिप्टो संपत्ति
explanation: |
  डॉलर कॉस्ट एवरेजिंग (Dीसीए) एक रणनीति है जहां आप कुल राशि को
  आप वॉलैटिलिटी के प्रभाव को कम करने के लिए समय-समय पर खरीदारी में कितना निवेश करना चाहते हैं।
reviewed: false
question: วิธีการได้มาซึ่งหลีกเลี่ยงโดยผู้ใช้ที่หวาดระแวงคืออะไร?
answer: แพลตฟอร์มแบบรวมศูนย์ที่มี KYC
wrong_answers:
  - P2P แพลตฟอร์มจับคู่
  - Bitcoin ตู้เอทีเอ็ม
  - การซื้อเงินสดโดยตรงที่การพบปะ
explanation: |
  เพื่อรักษาการไม่เปิดเผยตัวตน ผู้ใช้ที่หวาดระแวงหลีกเลี่ยงแพลตฟอร์มที่ต้องการการยืนยันตัวตน
reviewed: false
question: Кой метод на придобиване се избягва от параноичния потребител?
answer: Централизирани платформи с KYC
wrong_answers:
  - P2P платформи за създаване на мачове
  - Банкомати Bitcoin
  - Директни покупки в брой при срещи
explanation: |
  За да запази анонимността си, параноичният потребител избягва платформи, които изискват проверка на самоличността.
reviewed: false
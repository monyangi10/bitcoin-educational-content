question: Ni ubuhe buryo bwo kuronka ama bitcoin umu nyabwoba yirinda?
answer: Imbuga zigendurwa kandi zisaba KYC
wrong_answers:
  - Guhana hagati y'abantu babiri ku imbuga zo guhura
  - Ivyuma bitanga ama Bitcoin
  - Kugura ubwonyene ukoresheje amahera muhuye
explanation: |
  Kugira ngo umuntu ntamenyekane, umunyabwoba afise ubwoba ararinda amakuru asaba ko umuntu asuzuma ko ari we.

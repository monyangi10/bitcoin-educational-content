question: फ़्रेज़ "Not your keys, not your Bitcoins" क्या ज़ोर देती है?  

यह वाक्यांश इस बात पर ज़ोर देता है कि अगर आपके पास अपने बिटकॉइन की प्राइवेट कीज़ (गुप्त चाबियाँ) नहीं हैं, तो वास्तव में वे बिटकॉइन आपके नहीं हैं। यानी, अगर आप किसी एक्सचेंज या तीसरे पक्ष के वॉलेट में अपने बिटकॉइन रखते हैं, तो आपका उन पर पूरा नियंत्रण नहीं होता। सिर्फ़ प्राइवेट कीज़ के मालिक ही असली मालिक होते हैं!  

संक्षेप में:  
- **कीज़ आपके पास = बिटकॉइन आपके पास**  
- **कीज़ आपके पास नहीं = बिटकॉइन भी आपके नहीं!**  

इसलिए, "अपनी कीज़, अपना कंट्रोल!" 😊
answer: Bitcoin और Wallet का प्राइवेट की (निजी कुंजी) का मालिक होने का महत्व
wrong_answers:
  - अपने बिटकॉइन तक पहुंचने के लिए एक भौतिक कुंजी (फिजिकल की) होने का महत्व
  - अपने बिटकॉइन्स को सुरक्षित जगह पर रखने का महत्व
  - Bitcoin अकाउंट की डिटेल्स किसी के साथ शेयर न करने का महत्व
explanation: |
  अध्याय बताता है कि वाक्यांश "तुम्हारी चाबी नहीं, तुम्हारे बिटकॉइन नहीं"
  Bitcoin और Wallet के प्राइवेट की का मालिक होने के महत्व पर जोर देता है। प्राइवेट की का मालिक होने से
  प्राइवेट की, इसके पास जितने भी बिटकॉइन हैं, उन पर आपका पूरा कंट्रोल होता है।
reviewed: false
question: Qual è lo scopo principale della definizione del profilo utente?
answer: Adottare una strategia adatta alle proprie esigenze
wrong_answers:
  - Massimizzare la speculazione e quindi i profitti
  - Adottare una strategia generale che vada bene per tutti
  - Sapere quale influencer Bitcoin seguire sui social media
explanation: |
  Conoscere il proprio profilo e poterlo adattare, permette di scegliere soluzioni di acquisto e di protezione adatte alla propria situazione personale.
reviewed: true

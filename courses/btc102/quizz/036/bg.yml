question: Каква е основната цел на дефинирането на потребителския ви профил?
answer: Приемане на стратегия, съобразена с вашите нужди
wrong_answers:
  - За да се максимизират спекулациите и съответно печалбите
  - Приемане на обща стратегия, която да работи за всички
  - Как да разберете кой инфлуенсър на Bitcoin да следвате в социалните медии
explanation: |
  Познаването на вашия профил и възможността да го коригирате ви позволява да избирате решения за придобиване и съхранение, които отговарят на личната ви ситуация.

question: Was ist der Hauptzweck sein eigenes Benutzerprofil zu definieren?
answer: Eine auf die eigenen Bedürfnisse zugeschnittene Strategie anwenden
wrong_answers:
  - Maximierung der Spekulation und damit der Gewinne
  - Verwenden einer allgemeinen Strategie, die für alle gilt
  - Um zu wissen, welchem Bitcoin-Influencer man in den sozialen Medien folgen sollte
explanation: |
  Wenn du dein Profil kennst und es anpassen kannst, hast du die Möglichkeit, zu deiner persönlichen Situation passende Beschaffungs- und Aufbewahrungslösungen zu wählen.
reviewed: false

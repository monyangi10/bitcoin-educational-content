question: Jakie są powszechne nieporozumienia dotyczące tworzenia planu spadkowego według Pameli Morgan w Cryptoasset Inheritance Planning?
answer: Muszę zatrudnić prawnika; Muszę zaufać stronie trzeciej; Planowanie sprawi, że moje aktywa będą łatwe do kradzieży; Wartość mojej kryptowaluty jest zbyt niska, aby ją zaplanować; Moi spadkobiercy sami wszystko wymyślą; Wszystko to można zrobić za pomocą prostego Smart contract.

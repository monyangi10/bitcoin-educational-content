explanation: |
  विरासत योजना बनाने के बारे में आम गलतफहमियाँ, जैसा कि बताया गया है
  पामेला मॉर्गन द्वारा क्रिप्टोएसेट इनहेरिटेंस प्लानिंग में कहा गया है कि आपको काम पर रखने की जरूरत है
  एक वकील; आपको किसी तीसरे पक्ष पर भरोसा करना होगा; योजना बनाने से आपकी संपत्ति का बँटवारा आसान हो जाएगा
  चोरी; आपके क्रिप्टोकरेंसी की कीमत बहुत कम है, इसे प्लान नहीं किया जा सकता; आपके वारिस होंगे
  सब कुछ खुद ही समझ लें; और यह सब एक साधारण स्मार्ट डिवाइस से किया जा सकता है।
  जीडब्ल्यू-6

question: पामेला मॉर्गन के अनुसार, "क्रिप्टोएसेट इनहेरिटेंस प्लानिंग" में वारिस योजना बनाने के बारे में आम गलतफहमियाँ क्या हैं?
answer: मुझे एक वकील किराए पर लेना होगा;  
मुझे किसी तीसरे पक्ष पर भरोसा करना होगा;  
योजना बनाने से मेरी संपत्ति चोरी करना आसान हो जाएगा;  
मेरे क्रिप्टोकरेंसी का मूल्य इतना कम है कि उसकी योजना बनाने लायक नहीं;  
मेरे वारिस खुद ही सब कुछ समझ लेंगे;  
यह सब एक साधारण Smart contract से किया जा सकता है।
wrong_answers:
  - मुझे वकील रखने की जरूरत नहीं; मुझे किसी तीसरे पक्ष पर भरोसा करने की जरूरत नहीं;  
प्लानिंग से मेरी संपत्ति Hard चोरी हो जाएगी;  
मेरे क्रिप्टोकरेंसी की कीमत इतनी ज्यादा है कि प्लान नहीं किया जा सकता;  
मेरे वारिस खुद से सब कुछ समझ नहीं पाएंगे;  
यह सब एक साधारण Smart contract से नहीं हो सकता।

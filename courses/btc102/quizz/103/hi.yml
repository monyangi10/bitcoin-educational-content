मुझे किसी तीसरे पक्ष पर भरोसा करने की ज़रूरत नहीं;  
प्लानिंग से मेरी संपत्ति चोरी करना आसान हो जाएगा;  
मेरे क्रिप्टोकरेंसी की वैल्यू इतनी कम है कि प्लान करने लायक नहीं;  
मेरे वारिस खुद ही सब कुछ समझ नहीं पाएंगे;  

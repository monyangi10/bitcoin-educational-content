question: Koje su uobičajene zablude o kreiranju plana nasleđivanja prema Pameli Morgan u knjizi Cryptoasset Inheritance Planning?
answer: Moram da angažujem advokata; Moram da verujem trećoj strani; Planiranje će učiniti da moja imovina bude lako ukradena; Vrednost moje kriptovalute je suviše niska da bi se planirala; Moji naslednici će sve sami shvatiti; Sve ovo se može uraditi jednostavnim Smart contract.

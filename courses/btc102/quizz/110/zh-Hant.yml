question: 什麼是與 Bitcoin 相關的奧地利經濟學？
answer: 一個反對傳統凱恩斯主義的經濟學派，可以幫助理解 Bitcoin 在經濟中的地位。
wrong_answers:
  - 在奧地利實行的一種經濟學。
  - Bitcoin 所基礎的經濟理論。
  - 研究 Bitcoin 對奧地利經濟影響的經濟學分支。
explanation: |
  奧地利經濟學是一個經濟學派，其基礎是
  方法論
  個人主義。許多 Bitcoin 發燒友都用它來解釋像 Bitcoin 這種去中心化、通縮性貨幣的潛在益處。
  像 Bitcoin 這種去中心化、通貨緊縮貨幣的好處。

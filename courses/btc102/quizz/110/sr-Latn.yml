question: Šta je austrijska ekonomija u odnosu na Bitcoin?
answer: Ekonomska škola mišljenja koja se protivi tradicionalnom kejnzijanizmu i može pomoći u razumevanju mesta Bitcoin u ekonomiji.
wrong_answers:
  - Vrsta ekonomije koja se praktikuje u Austriji.
  - Ekonomska teorija na kojoj se zasniva Bitcoin.
  - Grana ekonomije koja proučava uticaj Bitcoin na austrijsku ekonomiju.
explanation: |
  Austrijska ekonomija je škola ekonomske misli koja se zasniva na metodološkom individualizmu. Mnogi entuzijasti Bitcoin su je koristili da objasne potencijalne prednosti decentralizovane, deflatorne valute poput Bitcoin.

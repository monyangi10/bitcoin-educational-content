question: Защо онлайн сигурността е от решаващо значение за потребителите на Bitcoin?
answer: Тъй като хакерството води до необратима загуба на биткойни
wrong_answers:
  - Тъй като банките застраховат средствата в случай на пълна загуба на биткойн
  - Защото човек може да влезе в затвора за загуба на биткойни
  - Тъй като атаките водят до много голяма административна тежест
explanation: |
  Без посредници хакването означава окончателна загуба на биткойни.

question: ทำไมความปลอดภัยออนไลน์จึงมีความสำคัญสำหรับผู้ใช้ Bitcoin?
answer: เนื่องจากการแฮ็กส่งผลให้เกิดการสูญเสียบิตคอยน์อย่างไม่สามารถย้อนกลับได้
wrong_answers:
  - เพราะธนาคารประกันเงินในกรณีที่สูญเสียบิตคอยน์ทั้งหมด
  - เพราะคนเราสามารถติดคุกได้จากการทำบิตคอยน์หาย
  - เนื่องจากการโจมตีทำให้เกิดภาระทางการบริหารที่หนักมาก
explanation: |
  หากไม่มีตัวกลาง การแฮ็กหมายถึงการสูญเสียบิตคอยน์อย่างถาวร
reviewed: false
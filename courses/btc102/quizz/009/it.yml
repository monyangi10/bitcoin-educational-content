question: Perché la sicurezza online è fondamentale per gli utenti Bitcoin?
answer: Perché l'hacking comporta la perdita irreversibile dei bitcoin
wrong_answers:
  - Perché le banche assicurano i fondi in caso di perdita totale di Bitcoin
  - Perché si può andare in galera per aver perso dei bitcoin
  - Perché gli attacchi comportano oneri amministrativi molto pesanti
explanation: |
  Senza intermediari, un attacco hacker si traduce nella perdita definitiva di bitcoin.
reviewed: true

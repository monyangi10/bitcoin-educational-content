question: पासवर्ड मैनेजर का मुख्य काम क्या है?
answer: अपने पासवर्ड को स्टोर और मैनेज करने के लिए
wrong_answers:
  - generate को बेतरतीब पासवर्ड
  - अपने यूज़रनेम याद रखने के लिए
  - अपने कंप्यूटर को वायरस से बचाने के लिए
explanation: |
  एक पासवर्ड मैनेजर सॉफ्टवेयर होता है जो आपके पासवर्ड्स को स्टोर और मैनेज करता है।
  यह आपको एक ही पासवर्ड दोबारा इस्तेमाल करने से बचाता है, जटिल और सुरक्षित पासवर्ड चुनने में मदद करता है,
  और आपके ऑनलाइन सुरक्षा प्रबंधन को आसान बनाता है।'
reviewed: false
question: Hot और Wallet, Bitcoin के संदर्भ में क्या हैं?
answer: एक डिजिटल जीडब्ल्यू-4 जिसका इस्तेमाल जीडब्ल्यू-3 को स्टोर करने, भेजने और प्राप्त करने के लिए किया जाता है
wrong_answers:
  - एक फिजिकल Wallet जिसे Bitcoin को स्टोर करने के लिए इस्तेमाल किया जाता है
  - Bitcoin खरीदने का एक तरीका
  - एक जीडब्ल्यू-9 जीडब्ल्यू-8 प्लेटफॉर्म
explanation: |
  Bitcoin के संदर्भ में, Hot Wallet एक डिजिटल Wallet है जिसका उपयोग किया जाता है
  ग्व-13 को स्टोर करना, भेजना और प्राप्त करना। यह आमतौर पर इंटरनेट से जुड़ा होता है।
  और इसलिए यह Cold Wallet से कम सुरक्षित है।
reviewed: false
question: 在 Bitcoin 的情況下，什麼是 Hot Wallet？
answer: 用於儲存、傳送和接收 Bitcoin 的數位 Wallet
wrong_answers:
  - 用於儲存 Bitcoin 的實體 Wallet
  - 購買 Bitcoin 的方法
  - A Bitcoin Exchange 平台
explanation: |
  就 Bitcoin 而言，Hot Wallet 是用於儲存、傳送和接收 Bitcoin 的數位 Wallet。
  儲存、傳送和接收 Bitcoin。它通常連接到網際網路
  因此安全性不如 Cold Wallet。

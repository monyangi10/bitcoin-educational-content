question: Šta je Hot Wallet u kontekstu Bitcoin?
answer: Digitalni Wallet koji se koristi za čuvanje, slanje i primanje Bitcoin
wrong_answers:
  - Fizički Wallet korišćen za skladištenje Bitcoin
  - Metod kupovine Bitcoin
  - Platforma Bitcoin Exchange
explanation: |
  U kontekstu Bitcoin, Hot Wallet je digitalni Wallet koji se koristi za
  skladištenje, slanje i primanje Bitcoin. Obično je povezan na internet
  i stoga je manje siguran od Cold Wallet.
reviewed: false
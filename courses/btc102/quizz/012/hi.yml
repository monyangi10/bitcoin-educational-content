question: अध्याय के अनुसार, बिटकॉइन खोने का मुख्य कारण क्या है?
answer: खराब ऑनलाइन सुरक्षा प्रबंधन
wrong_answers:
  - क्रिप्टोकरेंसी घोटाले
  - फाइनेंशियल धोखाधड़ी
  - कंप्यूटर खराब हो गया
explanation: |
  अध्याय में यह बताया गया है कि क्रिप्टोकरेंसी घोटालों और वित्तीय के अलावा...
  "स्कैम, बिटकॉइन खोने का मुख्य कारण ऑनलाइन सुरक्षा प्रबंधन की कमी से जुड़ा है।"
reviewed: false
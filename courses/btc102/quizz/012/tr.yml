question: Bitcoin dünyasında kendi kendine velayet kavramı ne anlama geliyor?
answer: Özel anahtarlarınızı kendiniz saklayın
wrong_answers:
  - Anahtarlarınızı özel bir Exchange platformuna emanet edin
  - Anahtarlarınızı bir yatırım bankasına emanet etmek
  - Açık anahtarlarınızı kendiniz saklayın
explanation: |
  Kendi kendine saklama, kullanıcının kendi özel anahtarları aracılığıyla bitcoinlerinin tam kontrolünü elinde tutmasını sağlar.

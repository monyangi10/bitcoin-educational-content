question: Bitcoin dünyasında kendin saklama (self custody) kavramı ne anlama gelir?
answer: Özel anahtarlarınızı kendinizin saklaması
wrong_answers:
  - Anahtarlarınızı buna özel bir pazar yerine emanet etmeniz
  - Anahtarlarınızı bir yatırım bankasına emanet etmeniz
  - Açık anahtarlarınızı (public keys) kendinizin saklaması
explanation: |
  Kendi kendine saklama, kullanıcının kendi özel anahtarları aracılığıyla bitcoinlerinin tam kontrolünü elinde tutmasını sağlar.

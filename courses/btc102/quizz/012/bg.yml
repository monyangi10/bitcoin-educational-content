question: Какво означава понятието за самопопечителство в света на Bitcoin?
answer: Съхраняване на частните ключове
wrong_answers:
  - Поверяване на ключовете ви на специализирана платформа за обмен
  - Да повериш ключовете си на инвестиционна банка
  - Съхраняване на вашите публични ключове
explanation: |
  Самостоятелното съхранение гарантира, че потребителят запазва пълен контрол върху своите биткойни чрез собствените си частни ключове.

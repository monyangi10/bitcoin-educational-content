question: Iciyumviro co Kwiyitwararika amatungo yawe gisobanura iki mw’isi ya Bitcoin?
answer: Kubika imfunguruzo zawe z'ibanga wewe nyene
wrong_answers:
  - Kwizigira imfunguruzo zawe ku rubuga rwihariye rwa zabigenewe
  - Guhereza imfunguruzo zawe ibanki
  - Kuzigama imfunguruzo zawe za bose wewe nyene
explanation: |
  Kwiyitwararika amatungo yawe bituma uwukoresha aguma afise ububasha bwose ku bitcoins vyiwe biciye ku mfunguruzo ziwe bwite.

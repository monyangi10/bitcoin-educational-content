question: แนวคิดของการดูแลตนเองหมายถึงอะไรในโลก Bitcoin?
answer: การเก็บรักษากุญแจส่วนตัวด้วยตัวคุณเอง
wrong_answers:
  - มอบกุญแจของคุณให้กับแพลตฟอร์มแลกเปลี่ยนเฉพาะทาง
  - มอบกุญแจของคุณให้กับธนาคารเพื่อการลงทุน
  - การเก็บรักษากุญแจสาธารณะด้วยตัวคุณเอง
explanation: |
  การดูแลตนเองทำให้ผู้ใช้สามารถควบคุมบิตคอยน์ของตนได้อย่างเต็มที่ผ่านกุญแจส่วนตัวของตนเอง
reviewed: false
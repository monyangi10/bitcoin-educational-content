question: Ni nini kisichopendekezwa wakati wa kupitisha ufikiaji wa bitcoin zako?
answer: Kutoa maneno ya Mnemonic kwa mtu mmoja
wrong_answers:
  - Kugawanya habari kati ya watu wengi
  - Kwa kutumia bahasha za opaque zilizofungwa
  - Kuandika barua ya maelezo
explanation: |
  Kukabidhi maneno ya Mnemonic kwa mtu mmoja bila usalama wa ziada huongeza sana hatari ya wizi wakati wa maisha yako.
reviewed: true

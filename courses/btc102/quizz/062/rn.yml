question: Ni igiki udahamagariwe igihe utanga uburenganzira bwo gushikira ku bitcoins zawe?
answer: Guha umuntu umwe ijambo Mnemonic
wrong_answers:
  - Gusangira amakuru hagati y'abantu benshi
  - Gukoresha amabaruwa apfutse neza
  - Kwandika ikete ry'insobanuro
explanation: |
  Kwizigira umuntu umwe gusa ijambo Mnemonic ata mutekano wongereweko, birongereza cane ingorane zo kwibwa mu buzima bwawe bwose.

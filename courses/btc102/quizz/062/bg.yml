question: Какво НЕ се препоръчва при предаване на достъп до вашите биткойни?
answer: Даване на мнемоничната фраза на един човек
wrong_answers:
  - Разделяне на информацията между няколко души
  - Използване на запечатани непрозрачни пликове
  - Писане на обяснително писмо
explanation: |
  Поверяването на мнемоничната фраза на едно лице без допълнителна защита значително увеличава риска от кражба по време на живота ви.

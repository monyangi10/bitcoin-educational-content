question: สิ่งที่ไม่แนะนำเมื่อส่งต่อการเข้าถึงบิตคอยน์ของคุณคืออะไร?
answer: ให้วลีช่วยจำกับบุคคลหนึ่ง
wrong_answers:
  - การแบ่งข้อมูลระหว่างหลายคน
  - การใช้ซองทึบแสงที่ปิดผนึก
  - การเขียนจดหมายอธิบาย
explanation: |
  การมอบวลีช่วยจำให้กับบุคคลเพียงคนเดียวโดยไม่มีการรักษาความปลอดภัยเพิ่มเติมจะเพิ่มความเสี่ยงต่อการถูกขโมยอย่างมากในช่วงชีวิตของคุณ
reviewed: false
question: Bitcoin निवेश योजना चुनने से पहले चार सवाल पूछने का मकसद क्या है?
answer: आपके लिए सबसे अच्छा रास्ता चुनें
wrong_answers:
  - Bitcoin खरीदने के लिए आपको कितनी मात्रा लेनी चाहिए, यह निर्धारित करने के लिए
  - यह पता लगाने के लिए कि आपको Bitcoin Wallet में से किस प्रकार का उपयोग करना चाहिए
  - अपने Bitcoin निवेश की अवधि निर्धारित करने के लिए
explanation: |
  Bitcoin चुनने से पहले चार सवाल पूछने का मकसद यही है कि...  

(या फिर अगर ज्यादा कैजुअल तरीके से कहें तो:)  

Bitcoin सेलेक्ट करने से पहले ये चार सवाल क्यों पूछे जाते हैं? असल में...
  निवेश
  योजना यह है कि आप अपने लिए सबसे उपयुक्त रास्ता चुनें। सवाल आपको समझने में मदद करते हैं
  आपके निवेश के लक्ष्य और पसंद।

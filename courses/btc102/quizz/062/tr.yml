question: Bitcoinlerinize erişimi devrederken ne önerilmez?
answer: Mnemonic ifadesinin tek bir kişiye verilmesi
wrong_answers:
  - Bilgilerin birden fazla kişi arasında paylaştırılması
  - Mühürlü ışık almayan zarfların kullanılması
  - Açıklayıcı bir mektup yazmak
explanation: |
  Mnemonic ifadesini ek güvenlik önlemleri olmadan tek bir kişiye emanet etmek, yaşamınız boyunca hırsızlık riskini büyük ölçüde artırır.
reviewed: false

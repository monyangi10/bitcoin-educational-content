question: Jaka jest rola zaufanych osób w planie spadkowym?
answer: Aby pomóc rodzinie, gdy użytkownika już nie będzie, zapewniając porady dotyczące zarządzania kluczami i Wallet, pomagając zrozumieć, jak bezpiecznie odzyskać tajne frazy (nasiona) i zapewniając pewność podczas transakcji.
wrong_answers:
  - Przejęcie aktywów kryptowalutowych po śmierci, zarządzanie aktywami i podział aktywów między spadkobierców.
  - Aby ukraść twoje aktywa kryptograficzne, zanim zostaną przekazane twoim bliskim, aby narazić na szwank twoje transakcje i wywołać konflikty między twoimi spadkobiercami.
  - Ignorowanie rodziny, gdy już jej nie ma, udzielanie wprowadzających w błąd porad dotyczących zarządzania kluczami i Wallet oraz wprowadzanie zamieszania podczas transakcji.
explanation: |
  Zaufane osoby w planie spadkowym są po to, aby pomóc
  twojej rodzinie, gdy Ciebie już tu nie będzie. Zapewniają porady dotyczące zarządzania kluczami i Wallet,
  pomagają zrozumieć, jak bezpiecznie odzyskać tajne frazy (nasiona) i zapewniają pewność
  podczas transakcji.

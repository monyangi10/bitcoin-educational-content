question: 可信賴的個人在您的繼承計劃中扮演什麼角色？
answer: 當您不在人世時，透過提供金鑰和 Wallet 管理建議、協助了解如何安全復原您的秘密短語 (種子)，以及在交易過程中提供保證，來協助您的家人。
wrong_answers:
  - 在您死後接管您的加密資產，管理您的資產，並在您的繼承人之間分配您的資產。
  - 在將您的加密資產移交給您的親人之前竊取這些資產，危及您的交易，並在您的繼承人之間製造衝突。
  - 在您不在的時候不理會您的家人，在鑰匙和 Wallet 管理方面提供誤導性建議，以及在交易過程中造成混亂。
explanation: |
  在您的遺產繼承計劃中，值得信賴的人會在您不在的時候幫助您的家人。
  當您不在人世時，他們會為您的家人提供協助。他們提供金鑰和 Wallet 管理的建議、
  協助瞭解如何安全地恢復您的秘密短語 (種子)，並在交易過程中提供保證。
  在交易過程中提供保證。
reviewed: false
question: Koja je uloga poverljivih osoba u vašem planu nasledstva?
answer: Da pomognete svojoj porodici kada više niste ovde pružanjem saveta o upravljanju ključevima i Wallet, pomažući im da razumeju kako bezbedno povratiti vaše tajne fraze (seeds), i pružanjem sigurnosti tokom transakcije.
wrong_answers:
  - Da preuzmu vašu kripto imovinu nakon vaše smrti, da upravljaju vašom imovinom i da raspodele vašu imovinu među vašim naslednicima.
  - Da ukradu vaše kripto imovine pre nego što budu predate vašim voljenima, da ugroze vaše transakcije i da stvore sukobe među vašim naslednicima.
  - Da ignoriš svoju porodicu kada više nisi ovde, da pružiš obmanjujuće savete o upravljanju ključem i Wallet, i da stvoriš konfuziju tokom transakcije.
explanation: |
  Pouzdani pojedinci u vašem planu nasleđa tu su da pomognu
  vašoj porodici kada više niste prisutni. Oni pružaju savete o upravljanju ključevima i Wallet,
  pomažu u razumevanju kako bezbedno povratiti vaše tajne fraze (seeds), i pružaju sigurnost
  tokom transakcije.

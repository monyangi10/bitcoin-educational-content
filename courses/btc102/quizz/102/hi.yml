question: आपके वारिसी प्लान में भरोसेमंद लोगों की क्या भूमिका है?
answer: अपने परिवार की मदद करने के लिए जब आप यहाँ नहीं होंगे, यह सलाह देकर कि कैसे महत्वपूर्ण और Wallet प्रबंधन किया जाए, यह समझने में मदद करना कि आपके गुप्त वाक्यांशों (सीड्स) को सुरक्षित तरीके से कैसे पुनर्प्राप्त किया जाए, और एक लेन-देन के दौरान आश्वासन प्रदान करना।
wrong_answers:
  - अपनी मौत के बाद अपने क्रिप्टो एसेट्स पर कब्ज़ा करने के लिए, अपने एसेट्स को मैनेज करने के लिए, और अपने वारिसों के बीच एसेट्स बाँटने के लिए।
  - आपके क्रिप्टो एसेट्स को आपके प्रियजनों को सौंपे जाने से पहले चुराना, आपके लेन-देन को हैक करना, और आपके वारिसों के बीच झगड़े पैदा करना।
  - अपने परिवार को नज़रअंदाज़ करना जब आप यहाँ नहीं होंगे, महत्वपूर्ण और Wallet प्रबंधन पर गलत सलाह देना, और एक लेन-देन के दौरान भ्रम पैदा करना।
explanation: |
  आपकी वसीयत योजना में विश्वसनीय लोग आपकी मदद के लिए मौजूद हैं
  आपके परिवार को जब आप यहां नहीं होंगे। वे महत्वपूर्ण सलाह और Wallet प्रबंधन पर मार्गदर्शन प्रदान करते हैं,
  यार, सीक्रेट फ्रेज़ (सीड) को सुरक्षित तरीके से रिकवर करने का तरीका समझने में मदद चाहिए? कोई बात नहीं, मैं समझाता हूँ:

1. **कभी भी अपना सीड ऑनलाइन शेयर न करें** - चाहे कोई कितना भी भरोसेमंद लगे, ये आपका निजी कोड है।

2. **हमेशा ऑफ़लाइन स्टोर करें** - कागज़ पर लिखकर या मेटल वॉलेट में सुरक्षित रखें, डिजिटल कॉपी न बनाएं।

3. **फ़िशिंग से बचें** - किसी भी वेबसाइट या ऐप पर सीड एंटर न करें, भले ही वो असली लगे।

4. **बैकअप ज़रूर रखें** - एक नहीं, दो-तीन सुरक्षित जगहों पर स्टोर करें (जैसे लॉकर या घर के गुप्त स्थान)।

रिलैक्स करो यार, अगर तुमने इन बातों का ध्यान रखा है तो तुम्हारा सीड पूरी तरह सुरक्षित है। कोई दिक्कत हो तो पूछ लेना! 😊
  लेन-देन के दौरान।

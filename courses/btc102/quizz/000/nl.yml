question: Wat zijn de typische kenmerken van een Ponzi-schema in het crypto-ecosysteem?
answer: Gegarandeerd rendement, moeilijke opnames en doorverwijzingen
wrong_answers:
  - Laag rendement, moeilijk opnemen en volledige transparantie
  - Gegarandeerd rendement, moeilijk opnemen en geen verwijzingssysteem
  - Gegarandeerd rendement, gemakkelijk opnemen en geen verwijzingssysteem
explanation: |
  Deze kenmerken kunnen wijzen op een piramidespel. Als je ze in een project ziet, wees dan zeer voorzichtig.
reviewed: false
question: क्रिप्टोकरेंसी के दुनिया में पोंज़ी स्कीम्स की एक आम खासियत क्या है?
answer: वे नए निवेशकों के पैसे से पुराने भागीदारों को भुगतान करते हैं।
wrong_answers:
  - वे हमेशा Bitcoin को शामिल करते हैं।
  - वे हमेशा कानूनी और नियमित होते हैं।
  - वे हमेशा भौतिक संपत्ति शामिल करते हैं।
explanation: |
  क्रिप्टोकरेंसी के क्षेत्र में पोंजी स्कीम्स अक्सर नए निवेशकों के पैसे का इस्तेमाल करके चलती हैं
  निवेशकों का पैसा पुराने सदस्यों को चुकाने के लिए इस्तेमाल होता है। यह अस्थिर प्रकृति और निर्भरता
  नए आने वालों को देखकर ऐसा लगता है कि वे जल्द ही गिर जाएंगे।

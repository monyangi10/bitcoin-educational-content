question: Kripto ekosisteminde bir saadet zincirinin tipik özellikleri nelerdir?
answer: Garantili getiriler, zor para çekme işlemleri ve sürekli yönlendirmelerin olması.
wrong_answers:
  - Düşük getiri, zor para çekme ve tam şeffaflık
  - Garantili getiriler, zor para çekme işlemleri ve yönlendirme sistemi yok
  - Garantili getiri, kolay para çekme ve yönlendirme sistemi yok
explanation: |
  Bu özellikler bir piramit şemasına işaret edebilir. Bunları bir projede gözlemlerseniz çok dikkatli olun.
reviewed: false

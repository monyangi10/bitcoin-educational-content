question: Những điểm đặc trưng của hình thức lừa đảo Ponzi trong hệ sinh thái tiền điện tử là gì?
answer: Lợi nhuận được đảm bảo, rút tiền khó khăn và môi giới
wrong_answers:
  - Lợi nhuận thấp, rút tiền khó khăn và minh bạch hoàn toàn
  - Lợi nhuận được đảm bảo, rút tiền khó khăn và không có hệ thống môi giới
  - Đảm bảo lợi nhuận, rút tiền dễ dàng và không có hệ thống môi giới
explanation: |
  Những đặc điểm này có thể chỉ ra một mô hình lừa đảo kim tự tháp. Nếu bạn quan sát thấy chúng trong một dự án, hãy hết sức thận trọng.
reviewed: true
question: Ni ibihe biranga ububeshi bwo mu bwoko bwa Ponzi mu gisata c'ama cryptos?
answer: Inyungu zizewe, kubikura biragoye cane, no gufashwa(kwinjizwa)
wrong_answers:
  - Umwimbu muke, gukura amahera bigoye, n'uguserukira abantu bose
  - Inyungu zizewe gukura bigoye, kandi nta buryo bwo kurungika
  - Inyungu zizewe, kubikura biroroshe cane, kandi ntavyo gufashwa mu kwinjira
explanation: |
  Ivyo bimenyetso bishobora kwerekana umugambi w'ipiramide. Niwabibona mu mugambi yawe, uritonda cane ugabe.

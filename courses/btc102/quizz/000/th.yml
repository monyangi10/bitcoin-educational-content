question: ลักษณะทั่วไปของโครงการ Ponzi ในระบบนิเวศคริปโตคืออะไร?
answer: ผลตอบแทนที่รับประกัน การถอนที่ยากลำบาก และการแนะนำเพื่อน
wrong_answers:
  - ผลตอบแทนต่ำ, การถอนที่ยากลำบาก, และความโปร่งใสเต็มรูปแบบ
  - ผลตอบแทนที่รับประกัน, การถอนที่ยากลำบาก, และไม่มีระบบการแนะนำ
  - รับประกันผลตอบแทน, ถอนง่าย, และไม่มีระบบแนะนำ
explanation: |
  ลักษณะเหล่านี้อาจบ่งบอกถึงแชร์ลูกโซ่ หากคุณสังเกตเห็นในโครงการใด ๆ ควรระมัดระวังเป็นอย่างยิ่ง
reviewed: false
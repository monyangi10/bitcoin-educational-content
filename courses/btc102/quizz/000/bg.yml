question: Какви са типичните характеристики на Понци схемата в крипто екосистемата?
answer: Гарантирана възвръщаемост, трудни тегления и препратки
wrong_answers:
  - Ниска възвръщаемост, трудни тегления и пълна прозрачност
  - Гарантирана възвръщаемост, трудни тегления и липса на система за препращане
  - Гарантирана възвръщаемост, лесни тегления и липса на система за препращане
explanation: |
  Тези характеристики могат да показват, че става въпрос за пирамидална схема. Ако ги забележите в даден проект, бъдете много предпазливи.
reviewed: false
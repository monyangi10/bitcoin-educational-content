question: Jaka jest główna cecha psychologiczna Hodlera?
answer: Cierpliwość.
wrong_answers:
  - Impulsywność.
  - Wizja krótkoterminowa.
  - Brak dyscypliny.
explanation: |
  Hodler wykazuje się wyjątkową cierpliwością, chcąc czekać latami
  aby zobaczyć wzrost swojej inwestycji, bez wpływu krótkoterminowych wahań rynkowych
  wahania rynku.

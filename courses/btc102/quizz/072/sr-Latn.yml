question: Koja je glavna psihološka osobina Hodlera?
answer: Strpljenje.
wrong_answers:
  - Impulsivnost.
  - Kratkoročna vizija.
  - Nedostatak discipline.
explanation: |
  Hodler pokazuje izuzetno strpljenje, spreman da čeka godinama da vidi rast svoje investicije, bez uticaja kratkoročnih tržišnih fluktuacija.

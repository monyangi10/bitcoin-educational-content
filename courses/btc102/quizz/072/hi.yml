question: एक होल्डर का मुख्य मनोवैज्ञानिक गुण क्या है?
answer: धैर्य।
wrong_answers:
  - अचानकपन।
  - छोटी सोच
  - अनुशासन की कमी।
explanation: |
  एक होल्डर बेहद सब्र दिखाता है, सालों इंतज़ार करने को तैयार रहता है।
  अपने निवेश की बढ़ोतरी देखने के लिए, बिना छोटे समय के बाजार के असर के
  उतार-चढ़ाव।
reviewed: false
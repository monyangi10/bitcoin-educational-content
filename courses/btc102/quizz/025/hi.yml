question: Bitcoin नेटवर्क में माइनर्स (खनिकों) की भूमिका क्या है?
answer: Bitcoin से Blockchain में प्रचारित लेन-देन को रिकॉर्ड करने के लिए
wrong_answers:
  - नए बिटकॉइन बनाने के लिए
  - बिटकॉइन के मूल्य को नियंत्रित करने के लिए
  - Bitcoin उपयोगकर्ताओं की पहचान सत्यापित करने के लिए
explanation: |
  Bitcoin नेटवर्क में माइनर्स लेन-देन रिकॉर्ड करने के लिए ज़िम्मेदार होते हैं।
  जो नेटवर्क में फैलाए गए हैं और Bitcoin Blockchain में पहुँच गए हैं। यह सुनिश्चित करता है
  लेन-देन की अंतिमता।
reviewed: false
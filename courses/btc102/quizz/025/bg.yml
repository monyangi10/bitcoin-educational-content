question: Коя характеристика основно отличава Bitcoin от алткойните?
answer: Децентрализация
wrong_answers:
  - Ликвидност
  - Репутация
  - Поверителност
explanation: |
  Bitcoin е известен със своята децентрализация, за разлика от повечето алткойни, които са повече или по-малко централизирани.
reviewed: false
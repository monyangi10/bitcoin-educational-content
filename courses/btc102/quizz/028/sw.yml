question: Ni majukwaa gani yanapendekezwa kuzuia KYC wakati wa kununua bitcoin?
answer: Majukwaa ya Exchange ya peer-to-peer
wrong_answers:
  - Jukwaa la madhumuni ya jumla ya Exchange
  - Majukwaa ya Bitcoin-only ya Exchange
  - Majukwaa ya Exchange yanayolenga biashara
explanation: |
  Majukwaa ya P2P huruhusu watumiaji kununua bitcoin moja kwa moja kutoka kwa mtu mwingine bila kuhitaji KYC.
reviewed: true

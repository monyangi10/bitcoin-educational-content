question: Nền tảng giao dịch công nghệ nào được khuyến nghị để tránh KYC khi mua bitcoin?
answer: Nền tảng giao dịch phi tập trung (P2P)
wrong_answers:
  - Nền tảng giao dịch đa năng
  - Nền tảng Bitcoin chỉ dành cho giao dịch
  - Nền tảng giao dịch tập trung vào giao dịch
explanation: |
  Nền tảng P2P cho phép người dùng mua bitcoin trực tiếp từ người khác mà không cần KYC.
reviewed: true
question: Bitcoin के ओपन सोर्स होने का मतलब क्या है?
answer: कोई भी Bitcoin कैसे काम करता है देख सकता है, यह पारदर्शी है और इसलिए इसकी जांच की जा सकती है।
wrong_answers:
  - कोई भी अपना खुद का Bitcoin वर्जन बना सकता है।
  - जीडब्ल्यू-3 मुफ्त में इस्तेमाल करने के लिए आज़ाद है
  - जीडब्ल्यू-4 का कोड बदलने के लिए सबके लिए खुला है
explanation: |
  ओपन सोर्स होने का मतलब है कि Bitcoin का कोड सार्वजनिक रूप से उपलब्ध है
  कोई भी समीक्षा कर सकता है। इससे यह पारदर्शी और ऑडिट करने योग्य बनता है, जिससे प्रोटोकॉल सुनिश्चित होता है।
  सबके लिए बराबर है।

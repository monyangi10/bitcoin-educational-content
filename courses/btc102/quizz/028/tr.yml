question: Bitcoin satın alırken KYC'den kaçınmak için hangi platformlar önerilir?
answer: Peer-to-peer Exchange platformları
wrong_answers:
  - Genel amaçlı Exchange platformları
  - Yalnızca Bitcoin Exchange platformları
  - Ticaret odaklı Exchange platformları
explanation: |
  P2P platformları, kullanıcıların KYC gerektirmeden doğrudan birbirlerinden bitcoin satın almalarına olanak tanır.
reviewed: false
question: แพลตฟอร์มใดบ้างที่แนะนำให้หลีกเลี่ยง KYC เมื่อซื้อบิตคอยน์?
answer: แพลตฟอร์มแลกเปลี่ยนแบบเพียร์ทูเพียร์
wrong_answers:
  - แพลตฟอร์มแลกเปลี่ยนทั่วไป
  - Bitcoin-only exchange platforms
  - แพลตฟอร์มแลกเปลี่ยนที่เน้นการซื้อขาย
explanation: |
  แพลตฟอร์ม P2P อนุญาตให้ผู้ใช้ซื้อบิตคอยน์โดยตรงจากกันและกันโดยไม่ต้องใช้ KYC
reviewed: false
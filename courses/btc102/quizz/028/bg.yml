question: Кои платформи се препоръчват, за да се избегне KYC при покупка на биткойни?
answer: Платформи за обмен между равнопоставени партньори
wrong_answers:
  - Платформи за обмен с общо предназначение
  - Платформи за обмен само на Bitcoin
  - Платформи за обмен, ориентирани към търговията
explanation: |
  Платформите P2P позволяват на потребителите да купуват биткойни директно един от друг, без да изискват KYC.
reviewed: false
question: Lightning Network के संदर्भ में Bitcoin नोड का क्या उद्देश्य है?
answer: Lightning Network द्वारा लाए गए Bitcoin के नए पहलुओं को समझने और एक्सप्लोर करने में मदद करने के लिए।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को स्टोर करने के लिए।
explanation: |
  Lightning Network के संदर्भ में एक Bitcoin नोड का उपयोग समझने के लिए किया जाता है
  और Lightning Network द्वारा लाए गए Bitcoin के नए पहलुओं का पता लगाएं।
  नया बिटकॉइन माइन नहीं करता, बिटकॉइन की ट्रेडिंग नहीं करता, और न ही बिटकॉइन स्टोर करता है।
reviewed: false
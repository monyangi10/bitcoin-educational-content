question: 在 Lightning Network 的情況下，Bitcoin 節點的目的是什麼？
answer: 幫助理解和探索 Lightning Network 帶來的 Bitcoin 的新方面。
wrong_answers:
  - 開採新的 Bitcoins。
  - 交易比特幣。
  - 儲存比特幣。
explanation: |
  在 Lightning Network 的背景下，Bitcoin 節點是用來了解
  並探索 Lightning Network 所帶來的 Bitcoin 新面貌。它
  不會挖掘新的比特幣、交易比特幣或儲存比特幣。
reviewed: false
question: Jakie są dwie cechy, które sprawiają, że Bitcoin jest tym, czym jest dzisiaj?
answer: Jego otwarty kod źródłowy i jego rzadkość
wrong_answers:
  - Jego anonimowość i decentralizacja
  - Jego wysoka wartość i zmienność
  - Łatwość użytkowania i globalna akceptacja
explanation: |
  Dwie główne cechy, które definiują Bitcoin, to jego otwarty kod źródłowy
  który sprawia, że jest on przejrzysty, możliwy do skontrolowania i może być używany przez każdego, a także jego rzadkość,
  co oznacza, że na świecie będzie tylko 21 milionów bitcoinów.
reviewed: false
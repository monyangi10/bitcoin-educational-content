question: Какво трябва да съхранят потребителите, за да притежават своите биткойни?
answer: Частни ключове
wrong_answers:
  - Адреси за получаване
  - Пароли за платформата Exchange
  - Блокове Blockchain
explanation: |
  Без да притежавате частните си ключове, не притежавате истински своите биткойни.
reviewed: false
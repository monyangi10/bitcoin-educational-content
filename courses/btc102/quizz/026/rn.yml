question: Ni igiki abakoresha bategerezwa kwibika kugira ngo vy’ukuri babe abafise ama bitcoins yabo?
answer: Imfunguruzo z'ibanga
wrong_answers:
  - Ukwakira aderesi
  - Amajambobanga y'urubuga rwa Exchange
  - Blockchain amabuye
explanation: |
  Utafashe imfunguruzo zawe z’ibanga, ntuba vy’ukuri ufise ama bitcoins yawe.

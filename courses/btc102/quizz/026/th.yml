question: ผู้ใช้ต้องเก็บรักษาอะไรด้วยตนเองเพื่อเป็นเจ้าของบิตคอยน์อย่างแท้จริง?
answer: คีย์ส่วนตัว
wrong_answers:
  - ที่อยู่สำหรับรับ
  - รหัสผ่านแพลตฟอร์ม Exchange
  - Blockchain บล็อก
explanation: |
  หากคุณไม่ได้ถือกุญแจส่วนตัวของคุณเอง คุณก็ไม่ได้เป็นเจ้าของบิตคอยน์ของคุณอย่างแท้จริง
reviewed: false
question: Bitcoin को आज जो बनाता है, उसकी दो खास बातें क्या हैं?
answer: इसका ओपन-सोर्स कोड और इसकी कमी
wrong_answers:
  - इसकी गुमनामी और इसका विकेंद्रीकरण
  - इसका बहुत ज़्यादा मूल्य और इसकी अस्थिरता
  - इसका आसान उपयोग और इसकी वैश्विक स्वीकृति
explanation: |
  Bitcoin की दो मुख्य विशेषताएँ जो इसे परिभाषित करती हैं, वो हैं इसका ओपन-सोर्स
  कोड, जो इसे पारदर्शी, ऑडिट करने योग्य और किसी के भी उपयोग के लायक बनाता है, और इसकी कमी,
  इसका मतलब है कि दुनिया में कभी भी सिर्फ 21 मिलियन बिटकॉइन ही होंगे।
reviewed: false
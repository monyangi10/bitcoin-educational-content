question: Was müssen Nutzer selbst verwahren, um ihre Bitcoins wirklich zu besitzen?
answer: Private Schlüssel
wrong_answers:
  - Empfangsadressen
  - Exchange-Plattform-Passwörter
  - Blockchain-Blöcke
explanation: |
  Wenn du deine privaten Schlüssel nicht besitzt, gehören dir deine Bitcoins nicht wirklich.

question: Việc phá giá đồng tiền quốc gia một cách có chủ đích có thể gây ra những hệ quả gì?
answer: Bất ổn xã hội và sự trỗi dậy của chủ nghĩa cực đoan chính trị
wrong_answers:
  - Tăng trưởng kinh tế và thịnh vượng quốc gia
  - Cải thiện thương mại quốc tế
  - Tăng cường dân chủ và quyền tự nhiên của cá nhân
explanation: |
  Việc phá giá đồng tiền quốc gia một cách có chủ đích có thể gây ra lạm phát dẫn đến khủng hoảng kinh tế, làm gia tăng bất bình xã hội và sự gia tăng của chủ nghĩa cực đoan chính trị.
reviewed: false
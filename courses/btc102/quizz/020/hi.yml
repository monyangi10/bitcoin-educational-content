question: निवेश का सुनहरा नियम क्या है?
answer: जितना खोने का रिस्क उठा सकते हो, उससे ज़्यादा निवेश मत करो।
wrong_answers:
  - हमेशा ट्रेंडी चीज़ों में निवेश करो।
  - "हमेशा उधार के पैसे से निवेश करो।"
  - हमेशा उस चीज़ में निवेश करो जिसे तू समझता नहीं।
explanation: |
  निवेश का सुनहरा नियम यह है कि जितना आप खोने का जोखिम उठा सकते हैं, उससे ज्यादा कभी निवेश न करें
  हारना। ऐसा इसलिए क्योंकि निवेश में हमेशा एक निश्चित स्तर का जोखिम होता है, और आप
  आपको केवल उतना पैसा निवेश करना चाहिए जिसे आप खो सकें, बिना इसके आपकी आर्थिक स्थिति पर कोई असर पड़े।
  स्थिरता।

question: Какви могат да бъдат последиците от организирана девалвация на националните валути?
answer: Социална нестабилност и възход на политическия екстремизъм
wrong_answers:
  - Икономически растеж и национален просперитет
  - Подобряване на международната търговия
  - Укрепване на демокрацията и естествените права на хората
explanation: |
  Девалвацията може да предизвика икономическа криза чрез инфлация, да подхрани социалното недоволство и да доведе до възход на политическия екстремизъм.

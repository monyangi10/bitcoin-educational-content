question: Ulusal para birimlerinin planlı bir şekilde devalüe edilmesinin etkileri neler olabilir?
answer: Sosyal istikrarsızlık ve siyasi aşırıcılığa zol açar
wrong_answers:
  - Ekonomik büyüme ve ulusal refah
  - Uluslararası ticaretin geliştirilmesi
  - Demokrasinin ve bireylerin doğal haklarının güçlendirilmesi
explanation: |
  Devalüasyon enflasyon yoluyla ekonomik krizi tetikleyebilir, toplumsal hoşnutsuzluğu ve siyasi aşırıcılığın yükselişini körükleyebilir.

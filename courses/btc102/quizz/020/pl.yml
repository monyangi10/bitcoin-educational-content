question: Jaka jest złota zasada inwestowania?
answer: Nigdy nie inwestuj więcej, niż możesz stracić.
wrong_answers:
  - Zawsze inwestuj w to, co jest modne.
  - Zawsze inwestuj za pożyczone pieniądze.
  - Zawsze inwestuj w to, czego nie rozumiesz.
explanation: |
  Złotą zasadą inwestowania jest to, aby nigdy nie inwestować więcej niż można stracić
  stracić. Wynika to z faktu, że inwestowanie zawsze wiąże się z pewnym poziomem ryzyka, a ty
  powinieneś inwestować tylko te pieniądze, na których utratę możesz sobie pozwolić bez wpływu na twoją stabilność finansową
  stabilność finansową.

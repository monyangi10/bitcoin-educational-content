question: Wat kunnen de gevolgen zijn van een georkestreerde devaluatie van nationale valuta?
answer: Sociale instabiliteit en de opkomst van politiek extremisme
wrong_answers:
  - Economische groei en nationale welvaart
  - Verbetering van de internationale handel
  - Versterking van de democratie en de natuurlijke rechten van het individu
explanation: |
  Devaluatie kan door inflatie een economische crisis veroorzaken, sociale onvrede aanwakkeren en politiek extremisme doen ontstaan.
reviewed: false
question: ผลกระทบของการลดค่าเงินสกุลชาติที่มีการวางแผนอย่างเป็นระบบอาจมีดังนี้:
answer: ความไม่มั่นคงทางสังคมและการเพิ่มขึ้นของความสุดโต่งทางการเมือง
wrong_answers:
  - การเติบโตทางเศรษฐกิจและความเจริญรุ่งเรืองของชาติ
  - การปรับปรุงการค้าระหว่างประเทศ
  - การเสริมสร้างประชาธิปไตยและสิทธิธรรมชาติของบุคคล
explanation: |
  การลดค่าเงินสามารถกระตุ้นวิกฤตเศรษฐกิจผ่านทางเงินเฟ้อ กระตุ้นความไม่พอใจในสังคมและการเพิ่มขึ้นของลัทธิสุดโต่งทางการเมือง
reviewed: false
question: Bitcoin निवेश के संदर्भ में एक Hodler की मुख्य विशेषता क्या है?
answer: वे Bitcoin को लंबे समय तक रखते हैं।
wrong_answers:
  - वे अक्सर Bitcoin का व्यापार करते हैं।
  - वे सिर्फ Bitcoin में तभी पैसा लगाते हैं जब कीमत कम होती है।
  - वे Bitcoin को तभी बेच देते हैं जब कीमत बढ़ जाती है।
explanation: |
  एक Bitcoin निवेश के संदर्भ में, "होल्डर" वह व्यक्ति होता है जो पकड़े रहता है...  

(Note: The term "Hodler" is often a playful crypto slang adaptation of "holder," implying stubbornly holding assets despite market fluctuations. In Hindi, I've kept it phonetic ("होल्डर") since it's a niche term, but added quotes for clarity. The trailing "..." suggests an unfinished thought, matching the original's tone.)
  जीडब्ल्यू-6 को लंबे समय के लिए रखें, यह सोचकर कि इसका इस्तेमाल और कमी दोनों बढ़ेगी
  समय।
reviewed: false
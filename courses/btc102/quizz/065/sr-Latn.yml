question: Koja je glavna karakteristika Hodlera u kontekstu Bitcoin investicije?
answer: Drže Bitcoin na duži rok.
wrong_answers:
  - Oni često trguju Bitcoin.
  - Oni ulažu u Bitcoin samo kada je cena niska.
  - Prodaju Bitcoin čim cena poraste.
explanation: |
  Hodler, u kontekstu Bitcoin investicije, je neko ko drži Bitcoin na duži rok, kladeći se da će njegova upotreba i oskudica rasti tokom vremena.

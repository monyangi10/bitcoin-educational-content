question: ความแตกต่างหลักระหว่างการเทรดและการลงทุนคืออะไร?
answer: การซื้อขายเป็นระยะสั้นและเก็งกำไร การลงทุนเป็นระยะยาวและมีกลยุทธ์
wrong_answers:
  - การซื้อขายมีค่าธรรมเนียมคงที่ การลงทุนมีค่าธรรมเนียมแปรผัน
  - การซื้อขายขึ้นอยู่กับการวิเคราะห์ปัจจัยพื้นฐาน การลงทุนในแนวโน้มมหภาค
  - การซื้อขายมีความเสี่ยงน้อยกว่าการลงทุน
explanation: |
  การซื้อขายต้องการการติดตามอย่างต่อเนื่องและทักษะทางเทคนิค ในขณะที่การลงทุนพึ่งพาวิสัยทัศน์ระยะยาว
reviewed: false
question: Sự khác biệt chính giữa giao dịch đầu cơ và đầu tư là gì?
answer: Giao dịch đầu cơ là mua bán ngắn hạn còn đầu tư là dài hạn và chiến lược
wrong_answers:
  - Giao dịch liên quan đến phí cố định, đầu tư liên quan đến phí thay đổi
  - Giao dịch dựa trên phân tích cơ bản, đầu tư theo xu hướng vĩ mô
  - Giao dịch ít rủi ro hơn đầu tư
explanation: |
  Giao dịch đầu cơ đòi hỏi phải theo dõi liên tục và có kỹ năng phân tích kỹ thuật, trong khi đầu tư đòi hỏi tầm nhìn dài hạn.
reviewed: true
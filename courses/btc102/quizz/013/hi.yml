question: एक बुनियादी ऑनलाइन सुरक्षा आदत सुधारने का तरीका क्या है?
answer: दो-चरणीय प्रमाणीकरण (2FA) चालू करें
wrong_answers:
  - सभी अकाउंट्स के लिए एक ही पासवर्ड इस्तेमाल करो
  - डेटा का नियमित बैकअप न लेना
  - अपने पासवर्ड शेयर मत करो
explanation: |
  दो-चरणीय प्रमाणीकरण (2FA) को सक्षम करना बुनियादी सुरक्षा उपायों में से एक है
  ऑनलाइन सुरक्षा की आदतों को सुधारने के लिए। यह सुरक्षा का एक अतिरिक्त Layer स्तर प्रदान करता है।
  तुम्हारे सबसे संवेदनशील खाते।

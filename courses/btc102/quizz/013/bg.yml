question: Каква е основната разлика между търговията и инвестирането?
answer: Търговията е краткосрочна и спекулативна, а инвестирането е дългосрочно и стратегическо
wrong_answers:
  - Търговията включва фиксирани такси, а инвестирането - променливи такси
  - Търговията се основава на фундаментален анализ, а инвестирането - на макротенденции
  - Търговията е по-малко рискова от инвестирането
explanation: |
  Търговията изисква постоянно наблюдение и технически умения, докато инвестирането разчита на дългосрочна визия.
reviewed: false
question: Ni irihe tandukaniro rikomeye riri hagati y’ugucuruza n’ugushiramwo imitahe?
answer: Ubucuruzi ni ubw’igihe gito kandi ni ubw’ugutekereza ku bintu, gushiramwo amahera ni ubw’igihe kirekire kandi n'imikenyuro
wrong_answers:
  - Ubucuruzi bujanye n'amahera adahinduka, gushiramwo imitahe amahera ahindagurika
  - Ubucuruzi bushingiye ku gusuzuma ivy'ishimikiro, gushiramwo imitahe ku bintu bihari bishaka amahera
  - Gucuruza bishobora guhomba cane kurusha gushiramwo imitahe
explanation: |
  Ubucuruzi busaba guhora bugenzurwa n’ubuhinga bwo gukora, mu gihe gushiramwo imitahe bishingiye ku ciyumviro c’igihe kirekire.

question: Koje je najbolje rešenje za početak sticanja izloženosti Bitcoin bez značajnog početnog kapitala?
answer: Kreiranje plana prosečne cene dolara (DCA)
wrong_answers:
  - Kupovina velike količine Bitcoin odjednom
  - Prodaja robe ili usluga u Bitcoin
  - Uključivanje u Bitcoin ekosistem
explanation: |
  Kreiranje plana prosečnog dolarskog troška (DCA) je najbolje rešenje za početak
  izlaganja Bitcoin bez značajnog početnog kapitala. Ovo omogućava
  kupcu da kupuje malo svake nedelje, bez obzira na iznos.

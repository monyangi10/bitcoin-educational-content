question: Bitcoin में एक्सपोजर पाने के लिए बिना ज्यादा शुरुआती पूंजी के सबसे अच्छा तरीका क्या है?
answer: डॉलर-कॉस्ट एवरेजिंग (DCA) प्लान बनाना
wrong_answers:
  - एक साथ बड़ी मात्रा में Bitcoin खरीदना
  - Bitcoin में सामान या सेवाएं बेचना
  - Bitcoin इकोसिस्टम में शामिल होना
explanation: |
  डॉलर-कॉस्ट एवरेजिंग (DCA) प्लान बनाना शुरुआत करने का सबसे बढ़िया तरीका है
  Bitcoin को एक्सपोजर पाने के लिए बिना बड़ी शुरुआती पूंजी के। यह मुमकिन बनाता है...
  स्टैकर को हर हफ्ते थोड़ा-थोड़ा खरीदना चाहिए, चाहे जितनी भी रकम हो।
reviewed: false
question: Jakie jest najlepsze rozwiązanie, aby rozpocząć ekspozycję na Bitcoin bez posiadania znacznego kapitału początkowego?
answer: Tworzenie planu uśredniania kosztów w dolarach (DCA)
wrong_answers:
  - Zakup dużej ilości Bitcoin na raz
  - Sprzedaż towarów lub usług w Bitcoin
  - Zaangażowanie w ekosystem Bitcoin
explanation: |
  Stworzenie planu Dollar-Cost Averaging (DCA) jest najlepszym rozwiązaniem, aby rozpocząć ekspozycję na Bitcoin bez posiadania znacznego kapitału początkowego
  uzyskanie ekspozycji na Bitcoin bez posiadania znacznego kapitału początkowego. Pozwala to

question: Cosa bisogna assolutamente evitare per garantire la sicurezza dei propri bitcoin?
answer: Conservare i bitcoin su una piattaforme Exchange
wrong_answers:
  - Utilizzare un Hardware Wallet open-source
  - Utilizzare un Hot Wallet per le transazioni giornaliere
  - Diversificare i metodi di conservazione
explanation: |
  Il principio "Not your keys, not your bitcoins" sottolinea l'importanza di possedere le proprie chiavi private. Su una piattaforma Exchange, i bitcoin sono esposti a rischi inutili.
reviewed: true

question: สิ่งที่ควรหลีกเลี่ยงอย่างยิ่งเพื่อความปลอดภัยของบิตคอยน์ของคุณคืออะไร?
answer: การเก็บบิตคอยน์ของคุณบนแพลตฟอร์มแลกเปลี่ยน
wrong_answers:
  - การใช้ฮาร์ดแวร์โอเพ่นซอร์ส wallet
  - การใช้ wallet ที่ร้อนสำหรับการทำธุรกรรมประจำวัน
  - การกระจายวิธีการจัดเก็บข้อมูล
explanation: |
  หลักการ "ไม่ใช่กุญแจของคุณ ไม่ใช่บิทคอยน์ของคุณ" เน้นย้ำถึงความสำคัญของการถือกุญแจส่วนตัวของคุณเอง บนแพลตฟอร์มแลกเปลี่ยน บิทคอยน์ของคุณจะถูกเปิดเผยต่อความเสี่ยงที่ไม่จำเป็น
reviewed: false
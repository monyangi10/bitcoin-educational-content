question: Какво задължително трябва да избягвате, за да гарантирате сигурността на вашите биткойни?
answer: Съхраняване на вашите биткойни в платформа за обмен
wrong_answers:
  - Използване на хардуерен портфейлс отворен код 
  - Използване на горещ портфейл за ежедневни операции
  - Разнообразяване на методите за съхранение
explanation: |
  Принципът "Нямаш ключ, нямаш биткойн" подчертава важността на притежаването на собствени частни ключове. В платформата за обмен вашите биткойни са изложени на ненужни рискове.
reviewed: false

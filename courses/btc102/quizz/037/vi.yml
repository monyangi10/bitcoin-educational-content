question: Bạn nên tránh hoàn toàn những điều gì để đảm bảo an toàn cho bitcoin của mình?
answer: Giữ bitcoin của bạn trên nền tảng giao dịch tập trung
wrong_answers:
  - Sử dụng ví lạnh (thiết bị ví) nguồn mở
  - Sử dụng ví nóng cho các giao dịch hàng ngày
  - Đa dạng hóa các phương pháp lưu trữ
explanation: |
  Nguyên tắc "Không phải khóa của bạn, không phải bitcoin của bạn" nhấn mạnh tầm quan trọng của việc giữ khóa riêng của bạn. Trên nền tảng giao dịch tập trung, bitcoin của bạn sẽ phải chịu những rủi ro không cần thiết.
reviewed: false
question: ビットコインのセキュリティを確保するために、絶対に避けるべきことは何か？
answer: ビットコインを取引所プラットフォームに保管する
wrong_answers:
  - オープンソースのハードウェアウォレットを使用する
  - 日々の取引にホットウォレットを使う
  - 保管方法を多様化する
explanation: |
  「秘密鍵（あなたの鍵）を持っていなければ、ビットコイン（コイン）を真に所有しているとは言えない」という原則は、あなた自身の秘密鍵を保持することの重要性を強調している。取引所プラットフォームでは、あなたのビットコインは不必要なリスクにさらされる。

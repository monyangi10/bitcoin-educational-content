question: Czym jest Bitcoin według ruchu cyberpunkowego?
answer: Elektroniczny odpowiednik gotówki
wrong_answers:
  - Forma cyfrowego złota
  - Nowa forma karty kredytowej
  - Rodzaj kryptowaluty
explanation: |
  Rozdział wspomina, że z perspektywy Cyberpunka Bitcoin sprzeciwia się
  społeczeństwu bezgotówkowemu. Pozwala na tworzenie w pełni prywatnych i wolnych od pośredników
  cyfrowych transakcji finansowych. Dla ruchu cyberpunkowego Bitcoin jest elektronicznym odpowiednikiem gotówki
  elektronicznym odpowiednikiem gotówki.

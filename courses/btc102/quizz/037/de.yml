question: Was solltest du unbedingt vermeiden, um die Sicherheit deiner Bitcoins nicht zu gefährden?
answer: Aufbewahrung der Bitcoins auf einer Exchange-Plattform
wrong_answers:
  - Verwendung eines quelloffenen Hardware Wallets
  - Verwendung eines Hot Wallets für tägliche Transaktionen
  - Diversifizierung der Aufbewahrungsmethoden
explanation: |
  Der Grundsatz "Nicht deine Schlüssel, nicht deine Bitcoins" unterstreicht die Bedeutung des Besitzes deiner eigenen privaten Schlüssel. Auf einer Exchange-Plattform sind deine Bitcoins unnötigen Risiken ausgesetzt.
reviewed: false

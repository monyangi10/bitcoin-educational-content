question: ทำไมถึงแนะนำให้เก็บข้อมูลเกี่ยวกับการถือครอง Bitcoin ของคุณเป็นความลับ?
answer: เพื่อหลีกเลี่ยงการดึงดูดความสนใจจากอาชญากรและรัฐบาล
wrong_answers:
  - เพื่อรับประโยชน์จากอัตราแลกเปลี่ยนที่ดีกว่าในบางประเทศ
  - เพื่อหลีกเลี่ยงการดึงดูดความสนใจของผู้ประกอบการที่กำลังมองหาทุน
  - เพื่อปรับปรุงความสามารถในการกู้ยืม
explanation: |
  การใช้ดุลยพินิจช่วยป้องกันความเสี่ยงจากการตกเป็นเป้าหมายของนักต้มตุ๋น บุคคลที่อิจฉา หรือโจร
reviewed: false
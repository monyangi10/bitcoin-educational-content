question: 2FA का मतलब है "Two-Factor Authentication" (टू-फैक्टर ऑथेंटिकेशन)। यह एक सुरक्षा प्रक्रिया है जहां यूज़र को अपनी पहचान साबित करने के लिए दो अलग-अलग तरीकों (फैक्टर्स) का इस्तेमाल करना पड़ता है, जैसे पासवर्ड के साथ एक OTP (वन-टाइम पासवर्ड)।
answer: दो-चरणीय प्रमाणीकरण
wrong_answers:
  - दो-चरणीय प्रमाणीकरण
  - दो-फीचर प्रमाणीकरण
  - दो-चरणीय प्रमाणीकरण
explanation: |
  2FA का मतलब है टू-फैक्टर ऑथेंटिकेशन। यह एक अतिरिक्त

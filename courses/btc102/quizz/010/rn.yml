question: Ni kuki ari vyiza ko uguma ugira ubwenge ku bijanye n’amahera yawe ya Bitcoin?
answer: Kugira ntidukwegere amaso y’abagizi ba nabi be n’intwaro .
wrong_answers:
  - Kugira ngo umuntu yungukire ku bipimo vyiza vya Exchange mu bihugu bimwebimwe .
  - Kugira ngo ntibikwegere umutima w'abanyamigambi barondera infashanyo .
  - Kugira ngo ubushobozi bwo kugurana bube bwiza
explanation: |
  Ubukerebutsi burakingira ingorane zo gufatwa n’abahendanyi, abantu b’ishari canke abasuma.

question: Ni kuki ari vyiza ko uguma uhoze ntuvuge ama bitcoins yawe utunze?
answer: Kugira ntiwikwegere abagizi ba nabi n'intwaro .
wrong_answers:
  - Kugira ngo uronswe ibipimo vyiza vyo kuvunja mu bihugu bimwebimwe .
  - Kugira ngo ntibikwegere umutima w'abanyamigambi barondera infashanyo .
  - Kugira ngo wongere ubushobozi bwo kugurana
explanation: |
  Ubukerebutsi burakingira ingorane zo kugendwako n'abapfungakiwani, abantu b’ishari canke abasuma.

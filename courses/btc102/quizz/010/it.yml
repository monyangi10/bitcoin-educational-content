question: Perché si raccomanda di mantenere la discrezione sulle proprietà Bitcoin?
answer: Per evitare di attirare l'attenzione di criminali e governi
wrong_answers:
  - Per beneficiare di migliori tassi di cambio in alcuni paesi
  - Per evitare di attirare l'attenzione degli imprenditori in cerca di finanziamenti
  - Per migliorare la capacità di indebitamento
explanation: |
  La discrezione protegge dal rischio di essere presi di mira da truffatori, invidiosi o ladri.
reviewed: true

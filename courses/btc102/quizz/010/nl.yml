question: Waarom is het aan te raden discreet te blijven over je Bitcoin holdings?
answer: Om de aandacht van criminelen en overheden niet te trekken
wrong_answers:
  - Om te profiteren van betere Exchange tarieven in bepaalde landen
  - Om niet de aandacht te trekken van ondernemers die op zoek zijn naar financiering
  - De leencapaciteit verbeteren
explanation: |
  Discretie beschermt tegen het risico om het doelwit te worden van oplichters, jaloerse individuen of dieven.

question: एक पैरानॉइड बिटकॉइनर की खास पहचान क्या है?
answer: केंद्रीकृत सिस्टम और KYC प्रक्रियाओं पर अविश्वास
wrong_answers:
  - केंद्रीकृत सिस्टम पर भरोसा
  - व्यक्तिगत जानकारी साझा करने की प्राथमिकता
  - गोपनीयता और सुरक्षा में दिलचस्पी की कमी
explanation: |
  अध्याय में एक परानॉइड बिटकॉइनर को ऐसे व्यक्ति के रूप में बताया गया है जिसकी एक ख़ास
  केंद्रीकृत सिस्टम और KYC प्रक्रियाओं पर अविश्वास।

question: Koja je karakteristična osobina paranoičnog Bitcoinera?
answer: Nepoverenje u centralizovane sisteme i KYC procese
wrong_answers:
  - Poverenje u centralizovane sisteme
  - Preferencija za deljenje ličnih informacija
  - Nedostatak interesa za privatnost i sigurnost
explanation: |
  Poglavlje opisuje paranoičnog Bitcoinera kao nekoga ko ima izrazito nepoverenje prema centralizovanim sistemima i KYC procesima.

question: Je! ni utaratibu gani wa RGB unahakikisha upinzani dhidi ya double-spending?
answer: Single-Use Seal
wrong_answers:
  - Single-Use Seal
  - Sahihi mara mbili
  - Ushahidi-wa-Dau
explanation: |
  Single-Use Seal inaongeza ukweli kwamba UTXO inaweza kutumika mara moja tu, kuhakikisha upinzani wa matumizi mara mbili ndani ya mikataba smart RGB.
reviewed: true

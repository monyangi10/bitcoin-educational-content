question: Cơ chế RGB nào đảm bảo khả năng chống lại chi tiêu kép?
answer: Single-Use Seal (tem sử dụng một lần)
wrong_answers:
  - Tem đa dụng
  - Chữ ký kép
  - Bằng chứng cổ phần
explanation: |
  Single-Use Seal (tem sử dụng một lần) tận dụng thực tế là UTXO chỉ có thể được chi tiêu một lần, đảm bảo khả năng chống lại việc chi tiêu gấp đôi trong các hợp đồng thông minh RGB.
reviewed: false
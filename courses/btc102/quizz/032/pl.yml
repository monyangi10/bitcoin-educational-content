question: Jakie znaczenie ma to, że Bitcoin jest innowacją od 0 do 1?
answer: Zakłóca nasze normy i nawyki
wrong_answers:
  - Jest to pierwsza cyfrowa waluta
  - Jego wartość wzrosła z 0 do 1
  - Jest to pierwszy krok w kierunku społeczeństwa bezgotówkowego
explanation: |
  Termin 0 do 1 odnosi się do dużej innowacji, która zakłóca istniejące normy i przyzwyczajenia
  normy i przyzwyczajenia. Bitcoin jest uważany za taką innowację ze względu na swoje unikalne cechy
  i potencjalny wpływ na społeczeństwo.

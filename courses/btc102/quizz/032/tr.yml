question: Hangi RGB (Really Good for Bitcoin, RGB Protocol) mekanizması çifte harcamaya karşı direnç sağlar?
answer: Single-Use Seal (tek kullanımlık mühür)
wrong_answers:
  - Çok kullanımlı mühür
  - Çift imza
  - Proof-of-Stake (sahip olunanın kanıtı)
explanation: |
  Single-Use Seal, bir UTXO'ün (Unspent Transaction Output, harcanmamış işlem çıktı birimi) yalnızca bir kez harcanabileceği gerçeğinden yararlanarak RGB akıllı sözleşmelerinde (smart contracts) çifte harcamaya karşı direnç sağlar.
reviewed: false

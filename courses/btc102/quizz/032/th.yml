question: กลไก RGB ใดที่รับประกันความต้านทานต่อการใช้จ่ายซ้ำซ้อน?
answer: ใช้ครั้งเดียว Seal
wrong_answers:
  - Multi-use Seal
  - ลายเซ็นคู่
  - หลักฐานการถือครองหุ้น
explanation: |
  Seal แบบใช้ครั้งเดียวใช้ประโยชน์จากข้อเท็จจริงที่ว่า UTXO สามารถใช้จ่ายได้เพียงครั้งเดียวเท่านั้น เพื่อให้มั่นใจถึงความต้านทานต่อการใช้จ่ายซ้ำซ้อนภายในสัญญาอัจฉริยะ RGB
reviewed: false
question: Ni ubuhe buryo bwa RGB butuma umuntu ashobora kunanirwa gukoresha amahera incuro zibiri?
answer: Single-Use Seal.
wrong_answers:
  - Ikoreshwa ryinshi Seal.
  - Umukono wa kabiri
  - Ikimenyamenya c'Igiti
explanation: |
  Single-Use Seal ikoresha ukuri kw’uko UTXO ishobora gukoreshwa rimwe gusa, igatuma habaho ukunanirwa gukoresha incuro zibiri mu masezerano y’ubwenge ya RGB.

question: Ni ubuhe buryo bwa RGB butuma umuntu ashobora kurwana ku gusohora amahera incuro zibiri?
answer: ikidodo gikora rimwe
wrong_answers:
  - Ikidodo gikoreshwa kenshi.
  - Imikono ibiri
  - Ukwerekana ko ufise umugabane
explanation: |
  Ikidodo gikora rimwe ikoresha ukuri kw’uko UTXO ishobora gukoreshwa rimwe gusa, igatuma habaho kurwanya gusohora amahera incuro zibiri mu masezerano y’ubwenge ya RGB.
reviewed: false

question: Кой механизъм на RGB осигурява устойчивост на двойното харчене?
answer: Seal за еднократна употреба
wrong_answers:
  - Многофункционална употреба Seal
  - Двоен подпис
  - Доказателство за вземане
explanation: |
  Seal за еднократна употреба използва факта, че UTXO може да бъде изразходван само веднъж, което гарантира устойчивост на двойно изразходване в рамките на интелигентните договори RGB.
reviewed: false
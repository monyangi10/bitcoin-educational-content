question: Bitcoin और alt-coins में विकेंद्रीकरण के मामले में मुख्य अंतर क्या है?
answer: जीडब्ल्यू-1 विकेंद्रित है जबकि ज़्यादातर ऑल्ट-कॉइन्स नहीं हैं
wrong_answers:
  - Bitcoin और alt-कॉइन्स दोनों ही विकेंद्रीकृत हैं।
  - Bitcoin और alt-कॉइन्स दोनों ही विकेंद्रीकृत नहीं हैं।
  - ऑल्ट-कॉइन्स डिसेंट्रलाइज़्ड हैं जबकि Bitcoin नहीं है
explanation: |
  अध्याय के विषयवस्तु में साफ़-साफ़ लिखा है कि Bitcoin विकेंद्रीकृत है जबकि
  ज़्यादातर ऑल्ट-कॉइन्स ऐसे नहीं हैं। यही खास बात है जो Bitcoin को अलग करती है
  दूसरे क्रिप्टोकरेंसीज़।
reviewed: false
question: Đặc điểm tâm lý nào là cần thiết đối với người thích nắm giữ tài sản?
answer: Khả năng kiềm chế cảm xúc
wrong_answers:
  - Sự bốc đồng về mặt cảm xúc
  - Sự hung hăng về mặt cảm xúc
  - Sự thiếu kiên nhẫn về mặt cảm xúc
explanation: |
  Khả năng kiềm chế cảm xúc cho phép một người chịu đựng được những biến động của thị trường mà không hoảng sợ.
reviewed: true
question: Ni kamere iyihe yo mu mutwe ihambaye ku muntu akora ibikorwa vy’ubusambanyi?
answer: Ukwihangana mu mutima
wrong_answers:
  - Uguhungabana kw'inyiyumvo
  - Ubukazi bwo mu mutima
  - Gutekereza ku nyiyumvo
explanation: |
  Ukwihangana mu mutima biratuma umuntu yihanganira uguhinduka kw’isoko ataco yiheba ngo agire ubwoba.

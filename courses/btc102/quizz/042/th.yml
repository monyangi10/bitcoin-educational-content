question: คุณสมบัติทางจิตวิทยาใดที่จำเป็นสำหรับผู้ถือครอง?
answer: ความยืดหยุ่นทางอารมณ์
wrong_answers:
  - ความหุนหันพลันแล่นทางอารมณ์
  - ความก้าวร้าวทางอารมณ์
  - การคาดเดาทางอารมณ์
explanation: |
  ความยืดหยุ่นทางอารมณ์ช่วยให้บุคคลสามารถทนต่อความผันผวนของตลาดโดยไม่ยอมแพ้ต่อความตื่นตระหนก
reviewed: false
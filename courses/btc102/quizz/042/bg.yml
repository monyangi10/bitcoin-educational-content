question: Кое психологическо качество е от съществено значение за HODL-ърът?
answer: Емоционална устойчивост
wrong_answers:
  - Емоционална импулсивност
  - Емоционална агресивност
  - Емоционални спекулации
explanation: |
  Емоционалната устойчивост позволява на човек да понесе колебанията на пазара, без да се поддава на паника.
reviewed: false

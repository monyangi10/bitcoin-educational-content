question: Welke psychologische kwaliteit is essentieel voor een hodler?
answer: Emotionele veerkracht
wrong_answers:
  - Emotionele impulsiviteit
  - Emotionele agressiviteit
  - Emotionele speculatie
explanation: |
  Emotionele veerkracht stelt je in staat om marktschommelingen te doorstaan zonder in paniek te raken.

question: Šta je Satoshi u kontekstu Bitcoin?
answer: Najmanja jedinica Bitcoin
wrong_answers:
  - A type of Bitcoin Wallet
  - Metod kupovine Bitcoin
  - Platforma Bitcoin Exchange
explanation: |
  U kontekstu Bitcoin, Satoshi (ili SAT) je najmanja jedinica
  Bitcoin. Bitcoin stackeri teže da akumuliraju što više satoshija.
reviewed: false
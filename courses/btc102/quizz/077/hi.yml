question: Satoshi को Bitcoin के संदर्भ में क्या मतलब है?
answer: Bitcoin का सबसे छोटा यूनिट
wrong_answers:
  - एक प्रकार का जीडब्ल्यू-3 जीडब्ल्यू-4
  - Bitcoin खरीदने का एक तरीका
  - एक जीडब्ल्यू-7 जीडब्ल्यू-6 प्लेटफॉर्म
explanation: |
  Bitcoin के संदर्भ में, Satoshi (या SAT) सबसे छोटी इकाई है
  जीडब्ल्यू-10. जीडब्ल्यू-10 स्टैकर्स का लक्ष्य जितने हो सके उतने सातोशी जमा करना है।

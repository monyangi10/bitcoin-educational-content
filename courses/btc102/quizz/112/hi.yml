question: Cold Wallet का Bitcoin में क्या उद्देश्य है?
answer: बिटकॉइन को सुरक्षित रूप से स्टोर करने के लिए।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  एक Cold Wallet, जिसे Hardware Wallet के नाम से भी जाना जाता है, एक ऐसा उपकरण है जिसे डिज़ाइन किया गया है
  बिटकॉइन को सुरक्षित रूप से स्टोर करने के लिए। यह Mining नए बिटकॉइन, बिटकॉइन ट्रेडिंग के लिए इस्तेमाल नहीं होता,
  या बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।

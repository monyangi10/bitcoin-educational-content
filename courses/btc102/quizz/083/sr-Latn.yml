question: Koji je glavni razlog zbog kojeg bi čest korisnik Bitcoin odabrao Wallet na osnovu Lightning Network za svakodnevne transakcije?
answer: Poboljšava efikasnost Bitcoin transakcija.
wrong_answers:
  - Povećava vrednost Bitcoin.
  - Omogućava anonimne transakcije.
  - Omogućava platformu za trgovanje Bitcoin.
explanation: |
  Lightning Network je protokol plaćanja Layer 2 koji operiše na
  vrhu kriptovalute zasnovane na Blockchain kao što je Bitcoin. Dizajniran je da omogući
  brze transakcije niskih troškova.

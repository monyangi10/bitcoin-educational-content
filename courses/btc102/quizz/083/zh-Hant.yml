question: 經常使用 Bitcoin 的使用者會在 Lightning Network 的基礎上選擇 Wallet 進行日常交易的主要原因是什麼？
answer: 它提高了 Bitcoin 交易的效率。
wrong_answers:
  - 它會增加 Bitcoin 的值。
  - 它允許匿名交易。
  - 它提供了一個交易 Bitcoin 的平台。
explanation: |
  Lightning Network 是一種 Layer 2 支付協定，它運行在
  Bitcoin 等基於 Blockchain 的加密貨幣之上。它旨在實現
  快速、低成本的交易。
reviewed: false
question: Jaki jest główny powód, dla którego Hodler wierzy w długoterminową wartość Bitcoin?
answer: Uważają, że Bitcoin będzie szerzej stosowany, a tym samym bardziej deficytowy.
wrong_answers:
  - Uważają oni, że Bitcoin zostanie zastąpiony przez inną kryptowalutę.
  - Uważają oni, że wartość Bitcoin będzie z czasem spadać.
  - Uważają, że Bitcoin jest inwestycją krótkoterminową.
explanation: |
  A Hodler wierzy w długoterminową wartość Bitcoin, ponieważ uważa, że
  że będzie on szerzej stosowany, a zatem w przyszłości będzie go brakować.
reviewed: false
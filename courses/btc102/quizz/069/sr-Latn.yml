question: Koji je glavni razlog zbog kojeg Hodler veruje u dugoročnu vrednost Bitcoin?
answer: Veruju da će Bitcoin biti šire korišćen i stoga oskudniji.
wrong_answers:
  - Veruju da će Bitcoin biti zamenjen drugom kriptovalutom.
  - Veruju da će vrednost Bitcoin opadati tokom vremena.
  - Veruju da je Bitcoin kratkoročna investicija.
explanation: |
  Hodler veruje u dugoročnu vrednost Bitcoin jer misli da će biti šire korišćen i stoga oskudniji u budućnosti.

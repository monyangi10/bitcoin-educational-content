question: Co powinieneś zrobić po napisaniu listu zgodnie z rozdziałem?
answer: Przejrzyj swoją pracę, zrób kopię listu, przechowuj obie kopie w kopercie, Seal, podpisz Seal i przechowuj tę kopertę w bezpiecznym, ale dostępnym miejscu.
wrong_answers:
  - Zignoruj swoją pracę, wykonaj kopię listu, przechowuj obie kopie w kopercie, Seal, podpisz Seal i przechowuj tę kopertę w niebezpiecznym, ale niedostępnym miejscu.
  - Przejrzyj swoją pracę, zrób kopię listu, przechowuj obie kopie w kopercie, otwórz ją, podpisz Seal i przechowuj tę kopertę w bezpiecznym, ale dostępnym miejscu.

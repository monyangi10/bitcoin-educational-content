explanation: |
  चिट्ठी लिखने के बाद, तुम्हें अपना काम दोबारा चेक करना चाहिए, एक कॉपी बना लेनी चाहिए
  पत्र, दोनों कॉपियों को एक लिफाफे में रखें, Seal करें, Seal पर हस्ताक्षर करें, और इसे स्टोर करें।

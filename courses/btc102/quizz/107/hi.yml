question: अध्याय के अनुसार, चिट्ठी लिखने के बाद तुम्हें क्या करना चाहिए?
answer: अपना काम चेक करो, खत की एक कॉपी बना लो, दोनों कॉपियां एक लिफाफे में रख दो, उस पर Seal लिख दो, Seal पर साइन कर दो, और इस लिफाफे को किसी सुरक्षित लेकिन आसानी से पहुंच वाली जगह पर रख दो।

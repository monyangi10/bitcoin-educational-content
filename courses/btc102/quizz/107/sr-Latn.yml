question: Šta treba da uradite nakon pisanja pisma prema poglavlju?
answer: Pregledajte svoj rad, napravite kopiju pisma, držite obe kopije u koverti, Seal to, potpišite Seal, i čuvajte ovu kovertu na sigurnom, ali pristupačnom mestu.
wrong_answers:
  - Ignoriši svoj rad, napravi kopiju pisma, zadrži obe kopije u koverti, Seal to, potpiši Seal, i odloži ovu kovertu na opasno ali nepristupačno mesto.
  - Pregledajte svoj rad, napravite kopiju pisma, zadržite obe kopije u koverti, otvorite je, potpišite Seal, i čuvajte ovu kovertu na sigurnom, ali pristupačnom mestu.
  - Ignorišite svoj rad, napravite kopiju pisma, zadržite obe kopije u koverti, otvorite je, potpišite Seal, i čuvajte ovu kovertu na opasnom ali nepristupačnom mestu.
explanation: |
  Nakon što napišete pismo, trebali biste pregledati svoj rad, napraviti kopiju
  pisma, obe kopije staviti u kovertu, Seal je, potpisati Seal, i čuvati ovu
  kovertu na sigurnom, ali dostupnom mestu, kao što je predloženo u poglavlju.

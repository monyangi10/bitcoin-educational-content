question: Ni izihe ari sidechains za Bitcoin?
answer: Liquid et Rootstock
wrong_answers:
  - Polygon et Arbitrum
  - Jupiter et Fantom
  - Bitcoin Cash et Bitcoin Satoshi Vision
explanation: |
  Liquid na RSK ni sidechains zifise inzira 2(ubuhinga bwo guhuza mu nzira zibiri) na Bitcoin. Ayandi mahitamwo si ama sidechains, canke nta 2WP na Bitcoin Blockchain.

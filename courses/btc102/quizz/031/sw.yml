question: Je, ni sidechains za Bitcoin?
answer: Liquid na Roots
wrong_answers:
  - Polygon na Arbitrum
  - Jupiter na Fantom
  - Bitcoin Cash na Bitcoin Satoshi Maono
explanation: |
  Liquid na RSK ni sidechains ambayo ina kigingi cha njia 2 na Bitcoin. Chaguzi zingine sio sidechains, au hazina 2WP na Bitcoin Blockchain.
reviewed: true

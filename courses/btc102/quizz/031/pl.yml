question: Jaki jest cel portfeli Bitcoin?
answer: Aby wysyłać i odbierać bitcoiny
wrong_answers:
  - Aby wydobywać bitcoiny
  - Aby przechowywać fizyczne bitcoiny
  - Aby wymienić bitcoiny na inne waluty
explanation: |
  Portfele Bitcoin służą do wysyłania i odbierania bitcoinów. Są to cyfrowe
  portfele, które przechowują cyfrowe dane uwierzytelniające niezbędne do uzyskania dostępu do Bitcoin Address
  i wydawania bitcoinów.
reviewed: false
question: Quali sono le sidechain di Bitcoin?
answer: Liquid e Rootstock
wrong_answers:
  - Poligon e Arbitrium
  - Jupiter e Fantom
  - Bitcoin Cash e Bitcoin Satoshi Vision
explanation: |
  Liquid e RSK sono sidechain che hanno un peg a 2 vie con Bitcoin. Le altre opzioni non sono sidechain, oppure non hanno un 2WP sulla blockchain di Bitcoin.
reviewed: true

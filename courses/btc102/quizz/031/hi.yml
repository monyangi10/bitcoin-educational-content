question: Bitcoin वॉलेट्स का उद्देश्य क्या है?
answer: बिटकॉइन भेजने और प्राप्त करने के लिए
wrong_answers:
  - बिटकॉइन माइन करने के लिए
  - भौतिक बिटकॉइन को स्टोर करने के लिए
  - बिटकॉइन को दूसरी करेंसी में बदलने के लिए
explanation: |
  जीडब्ल्यू-1 वॉलेट्स का इस्तेमाल बिटकॉइन भेजने और प्राप्त करने के लिए किया जाता है। ये डिजिटल होते हैं।
  वो वॉलेट जो डिजिटल क्रेडेंशियल्स स्टोर करते हैं, जिनकी ज़रूरत Bitcoin और Address तक पहुँचने के लिए होती है।
  और बिटकॉइन खर्च करो।
reviewed: false
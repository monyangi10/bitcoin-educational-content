question: Hangileri Bitcoin yan zincirleri?
answer: Liquid ve Anaç
wrong_answers:
  - Poligon ve Arbitrum
  - Jüpiter ve Fantom
  - Bitcoin Nakit ve Bitcoin Satoshi Vizyon
explanation: |
  Liquid ve RSK, Bitcoin ile 2 yönlü peg'e sahip yan zincirlerdir. Diğer seçenekler yan zincir değildir veya Bitcoin Blockchain ile 2WP'ye sahip değildir.
reviewed: false
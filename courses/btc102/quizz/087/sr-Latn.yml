question: Kakva vrsta korisnika najverovatnije treba i Hot i Cold Bitcoin Wallet?
answer: Korisnik koji treba redovno da koristi Bitcoin.
wrong_answers:
  - Korisnik koji povremeno koristi Bitcoin.
  - Korisnik koji rudari Bitcoin.
  - Korisnik koji ulaže samo u Bitcoin na duži rok.
explanation: |
  Redovni korisnici Bitcoin trebaju Hot Wallet za dnevne transakcije i
  Cold Wallet za sigurno dugoročno skladištenje.

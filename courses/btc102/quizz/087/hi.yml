question: वह कौन सा यूज़र है जिसे Hot और Cold, Bitcoin, Wallet दोनों की ज़रूरत पड़ने की सबसे ज़्यादा संभावना है?
answer: एक ऐसा यूज़र जिसे नियमित रूप से Bitcoin इस्तेमाल करने की ज़रूरत है।
wrong_answers:
  - एक ऐसा यूज़र जो कभी-कभार ही Bitcoin का इस्तेमाल करता है।
  - एक यूज़र जो Bitcoin माइन करता है।
  - एक यूजर जो सिर्फ लंबे समय के लिए Bitcoin में निवेश करता है।
explanation: |
  रोज़ाना Bitcoin इस्तेमाल करने वालों को Hot और Wallet की ज़रूरत पड़ती है दैनिक लेन-देन के लिए और एक
  जीडब्ल्यू-12 जीडब्ल्यू-11 सुरक्षित दीर्घकालिक भंडारण के लिए।
reviewed: false
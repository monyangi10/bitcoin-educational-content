question: ทำไมถึงแนะนำการยืนยันตัวตนสองปัจจัย?
answer: มันเพิ่มชั้นความปลอดภัยเพิ่มเติม
wrong_answers:
  - มันทำให้การเข้าถึงง่ายขึ้นโดยการลดจำนวนรหัสลง
  - มันอนุญาตให้เข้าสู่ระบบโดยไม่ต้องใช้รหัสผ่าน
  - มันแทนที่การใช้ตัวจัดการรหัสผ่าน
explanation: |
  2FA ต้องใช้รหัสชั่วคราวเพิ่มเติมจากรหัสผ่าน ซึ่งช่วยเสริมความปลอดภัยของบัญชีออนไลน์ได้อย่างมาก
reviewed: false
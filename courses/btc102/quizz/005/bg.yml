question: Защо се препоръчва двуфакторно удостоверяване?
answer: Добавя допълнително ниво на сигурност
wrong_answers:
  - Опростява достъпа, като намалява броя на кодовете
  - Позволява влизане без парола
  - Той замества използването на мениджър на пароли
explanation: |
  2FA изисква временен код в допълнение към паролата, което значително засилва защитата на онлайн акаунта.

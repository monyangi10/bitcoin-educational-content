question: Warum wird eine Zwei-Faktor-Authentifizierung empfohlen?
answer: Sie bietet eine zusätzliche Sicherheitschicht
wrong_answers:
  - Sie vereinfacht den Zugang durch die Verringerung der Anzahl der Codes
  - Sie ermöglicht die Anmeldung ohne Passwort
  - Sie ersetzt die Verwendung eines Passwortmanagers
explanation: |
  2FA erfordert zusätzlich zum Passwort einen temporären Code, der den Schutz eines Online-Kontos erheblich verstärkt.
reviewed: false

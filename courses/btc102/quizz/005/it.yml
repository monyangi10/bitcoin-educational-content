question: Perché è consigliata l'autenticazione a due fattori?
answer: Aggiunge un ulteriore livello di sicurezza
wrong_answers:
  - Semplifica l'accesso riducendo il numero di codici
  - Consente l'accesso senza password
  - Sostituisce l'uso di un gestore di password
explanation: |
  L'autenticazione a due fattori, o 2FA, richiede un codice temporaneo in aggiunta alla password, che rafforza notevolmente la protezione di un account online.
reviewed: true

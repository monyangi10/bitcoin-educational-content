question: Kwa nini two factor authentication inapendekezwa?
answer: Inaongeza Layer ya ziada ya usalama
wrong_answers:
  - Inarahisisha ufikiaji kwa kupunguza idadi ya misimbo
  - Inaruhusu kuingia bila nenosiri
  - Inachukua nafasi ya matumizi ya kidhibiti nenosiri
explanation: |
  2FA inahitaji msimbo wa muda pamoja na nenosiri, ambalo huimarisha sana ulinzi wa akaunti ya mtandaoni.
reviewed: true

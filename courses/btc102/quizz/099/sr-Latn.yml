question: Kakav je način razmišljanja paranoičnog Bitcoinera kada je u pitanju korišćenje Bitcoin?
answer: Oprez, bezbednost i anonimnost su najvažniji
wrong_answers:
  - Poverenje, otvorenost i transparentnost su od najveće važnosti
  - Preuzimanje rizika, poverenje i otvorenost su od najveće važnosti
  - Neznanje, poverenje i transparentnost su od najveće važnosti
explanation: |
  Poglavlje opisuje način razmišljanja paranoičnog Bitcoinera kao onaj gde su oprez, sigurnost i anonimnost najvažniji.

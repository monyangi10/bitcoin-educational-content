question: Jaki jest sposób myślenia paranoicznego Bitcoinera, jeśli chodzi o korzystanie z Bitcoin?
answer: Ostrożność, bezpieczeństwo i anonimowość są najważniejsze
wrong_answers:
  - Zaufanie, otwartość i przejrzystość są najważniejsze
  - Podejmowanie ryzyka, zaufanie i otwartość są najważniejsze
  - Niewiedza, zaufanie i przejrzystość są najważniejsze
explanation: |
  Rozdział opisuje sposób myślenia paranoicznego Bitcoinera jako taki, w którym
  ostrożność, bezpieczeństwo i anonimowość są najważniejsze.

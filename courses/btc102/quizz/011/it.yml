question: Perché è importante proteggere la frase Mnemonica?
answer: Perché il suo smarrimento comporta la perdita permanente dei bitcoin
wrong_answers:
  - Perché la Blockchain è troppo lunga da rigenerare
  - Perché la sua perdita comporta una fuga di dati personali
  - Perché le piattaforme Exchange richiedono molti documenti per ricreare gli account
explanation: |
  La frase Mnemonica consente di recuperare l'accesso ai fondi. Se viene persa e il wallet non è più accessibile sul dispositivo, i bitcoin sono definitivamente persi.
reviewed: true

question: Warum ist es wichtig, seinen Mnemonic-Satz zu schützen?
answer: Der Verlust führt zum dauerhaften Verlust der Bitcoins
wrong_answers:
  - Weil die Blockchain zu lang ist, um sie wiederherzustellen
  - Weil der Verlust zu einem Leck in den persönlichen Daten führt
  - Weil Exchange-Plattformen eine Menge Dokumente benötigen, um ihn wiederherzustellen
explanation: |
  Mit dem Mnemonic-Satz kann der Zugang zu den Bitcoins wiederhergestellt werden. Wenn er verloren geht und das Wallet auf dem Gerät nicht mehr zugänglich ist, sind die Bitcoins dauerhaft verloren.
reviewed: false

question: ทำไมการปกป้องวลีช่วยจำของคุณจึงสำคัญ?
answer: เพราะการสูญเสียมันจะส่งผลให้สูญเสียบิตคอยน์อย่างถาวร
wrong_answers:
  - เนื่องจากบล็อกเชนยาวเกินไปที่จะสร้างใหม่
  - เพราะการสูญเสียมันนำไปสู่การรั่วไหลของข้อมูลส่วนบุคคล
  - เนื่องจากแพลตฟอร์มแลกเปลี่ยนต้องการเอกสารจำนวนมากในการสร้างใหม่
explanation: |
  วลีช่วยจำช่วยให้สามารถกู้คืนการเข้าถึงได้ หากสูญหายและ wallet ไม่สามารถเข้าถึงได้บนอุปกรณ์อีกต่อไป บิตคอยน์จะสูญหายอย่างถาวร
reviewed: false
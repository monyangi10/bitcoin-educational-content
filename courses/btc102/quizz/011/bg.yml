question: Защо е важно да защитите своята мнемонична фраза?
answer: Защото загубата му води до постоянна загуба на биткойни
wrong_answers:
  - Защото блокчейнът е твърде дълъг, за да се регенерира
  - Защото загубата му води до изтичане на лични данни
  - Тъй като платформите за обмен изискват много документи за регенерирането му
explanation: |
  Мнемоничната фраза позволява да се възстанови достъпът. Ако тя бъде изгубена и нямате достъп до портфейла, биткойните се губят окончателно.

question: Mnemonic 문구를 보호하는 것이 중요한 이유는 무엇인가요?
answer: 이를 잃어버리면 비트코인이 영구적으로 손실되기 때문입니다
wrong_answers:
  - Blockchain이 너무 길어서 재생할 수 없기 때문입니다
  - 분실 시 개인 데이터 유출로 이어지기 때문입니다
  - Exchange 플랫폼은 재생성하는 데 많은 문서가 필요하기 때문입니다
explanation: |
  Mnemonic 문구를 사용하면 액세스를 복구할 수 있습니다. Wallet를 분실하여 해당 장치에서 더 이상 액세스할 수 없는 경우 비트코인은 영구적으로 손실됩니다.
reviewed: false
question: DCA का मतलब Bitcoin के संदर्भ में "Dynamic Channel Allocation" होता है।
answer: डॉलर-कॉस्ट एवरेजिंग
wrong_answers:
  - डिजिटल करेंसी एसोसिएशन
  - सीधा नकद पहुंच
  - डिसेंट्रलाइज्ड क्रिप्टो एसेट
explanation: |
  Bitcoin के संदर्भ में, DCA का मतलब है डॉलर-कॉस्ट एवरेजिंग। यह
  एक रणनीति है जहां एक निवेशक निवेश की जाने वाली कुल राशि को विभाजित करता है...
  समय-समय पर खरीदारी करके कुल खरीद पर अस्थिरता के प्रभाव को कम करना।
reviewed: false
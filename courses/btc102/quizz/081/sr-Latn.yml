question: Šta znači DCA u kontekstu Bitcoin?
answer: Dollar-Cost Averaging
wrong_answers:
  - Asocijacija za Digitalnu Valutu
  - Direktan pristup gotovini
  - Decentralizovana kripto imovina
explanation: |
  U kontekstu Bitcoin, DCA označava Dollar-Cost Averaging. Ovo je strategija gde investitor deli ukupan iznos koji će biti uložen na periodične kupovine kako bi smanjio uticaj volatilnosti na ukupnu kupovinu.
reviewed: false
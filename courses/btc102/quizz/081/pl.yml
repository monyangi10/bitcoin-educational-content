question: Co oznacza skrót DCA w kontekście Bitcoin?
answer: Uśrednianie kosztów w dolarach
wrong_answers:
  - Stowarzyszenie walut cyfrowych
  - Bezpośredni dostęp do gotówki
  - Zdecentralizowane aktywa kryptograficzne
explanation: |
  W kontekście Bitcoin, DCA oznacza Dollar-Cost Averaging (uśrednianie kosztów w dolarach). Jest to
  to strategia, w ramach której inwestor dzieli całkowitą kwotę do zainwestowania na
  okresowe zakupy, aby zmniejszyć wpływ zmienności na ogólny zakup.

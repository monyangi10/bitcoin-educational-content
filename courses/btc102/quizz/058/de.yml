question: Welche Cold-Speicherlösung wird für den paranoiden Benutzer empfohlen?
answer: Air-gapped oder DIY Hardware Wallet
wrong_answers:
  - Hot Wallet auf dem Handy
  - Verwahrungsdienst auf einer Exchange-Plattform
  - Hardware Wallet für allgemeine Zwecke mit geschlossenem Quellcode
explanation: |
  Der paranoide Benutzer bevorzugt die Offline-Speicherung mit Open-Source-Lösungen, um das Risiko einer Aufdeckung zu minimieren.

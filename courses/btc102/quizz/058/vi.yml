question: Giải pháp lưu trữ ngoại mạng nào được khuyến nghị cho người dùng đa nghi?
answer: Ví lạnh hỗ trợ air-gapped hoặc tự làm
wrong_answers:
  - Ứng dụng di động (ví nóng)
  - Dịch vụ bảo quản trên các sàn giao dịch tập trung
  - Các ví lạnh đa mục đích có mã nguồn đóng
explanation: |
  Người dùng đa nghi ưu tiên lưu trữ ngoại tuyến bằng giải pháp nguồn mở để giảm rủi ro lộ thông tin.
reviewed: true
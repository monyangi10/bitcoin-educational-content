question: Какво решение за студено съхранение се препоръчва на параноичния потребител?
answer: Въздушен съединител или хардуер "Направи си сам" портфейл
wrong_answers:
  - Мобилен горещ портфейл
  - Попечителска услуга на платформа за обмен
  - Хардуерен портфейл със затворен код с общо предназначение
explanation: |
  Параноичните потребители предпочитат офлайн съхранение с решения с отворен код, за да сведат до минимум риска от разкриване на информация.

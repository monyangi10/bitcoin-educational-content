question: Ni uwuhe muti wo kubika usabwa ku muntu akoresha ivy’ubujuju?
answer: Ivyuma vy’umuyaga canke .
wrong_answers:
  - Hot Wallet kuri ngendanwa yawe.
  - Ibikorwa vyo kubungabunga ku rubuga rwo guhanahana
  - Intumbero rusangi y’inkomoko yugarijwe Hardware Wallet.
explanation: |
  Uwukoresha w'umunyabwoba akunda ububiko butari mu nzira  yuguruye kugira ngo agabanye impanuka zo kwinjirirwa.

question: โซลูชันการจัดเก็บข้อมูลเย็นแบบใดที่แนะนำสำหรับผู้ใช้ที่ระมัดระวังมาก?
answer: Air-gapped หรือฮาร์ดแวร์ DIY wallet
wrong_answers:
  - โมบายฮอต wallet
  - บริการรับฝากบนแพลตฟอร์มแลกเปลี่ยน
  - ฮาร์ดแวร์ปิดแหล่งที่มาทั่วไป wallet
explanation: |
  ผู้ใช้ที่หวาดระแวงชอบการจัดเก็บแบบออฟไลน์ด้วยโซลูชันโอเพนซอร์สเพื่อลดความเสี่ยงของการเปิดเผยข้อมูล
reviewed: false
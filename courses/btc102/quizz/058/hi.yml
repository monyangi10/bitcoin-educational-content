question: अगर आपके पास अपने Bitcoin या Wallet का प्राइवेट की नहीं है, तो इसका मतलब क्या है?
answer: एक तीसरा पक्ष आपके बिटकॉइन की सुरक्षा के लिए ज़िम्मेदार है।
wrong_answers:
  - तुमने अपने सारे बिटकॉइन गंवा दिए हैं
  - अब आप अपने बिटकॉइन के साथ लेन-देन नहीं कर सकते।
  - आपके बिटकॉइन्स अपने-आप ही दूसरे क्रिप्टोकरेंसी में बदल जाते हैं
explanation: |
  अगर आपके पास अपने Bitcoin Wallet का प्राइवेट की नहीं है, तो इसका मतलब है
  एक तीसरा पक्ष आपके बिटकॉइन की सुरक्षा के लिए जिम्मेदार है। वे नियमों के अधीन हैं।
  Exchange प्लेटफॉर्म्स की तरह ही जोखिमों का सामना करना पड़ सकता है, जैसे हैकिंग, जब्ती, विनियमन, या
  दिवालियापन।

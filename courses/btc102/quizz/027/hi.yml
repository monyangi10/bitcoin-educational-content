question: Bitcoin और Blockchain की immutability का क्या मतलब है?
answer: समय के साथ इसे बदला नहीं जा सकता
wrong_answers:
  - इसे हैक नहीं किया जा सकता
  - यह कॉपी नहीं हो सकता
  - यह डिलीट नहीं हो सकता
explanation: |
  Bitcoin और Blockchain की अपरिवर्तनीयता का मतलब है कि एक बार लेन-देन हो जाने के बाद
  रिकॉर्ड हो चुका है, इसे बदला या मिटाया नहीं जा सकता। यह सुनिश्चित करता है कि अखंडता और
  Blockchain की विश्वसनीयता

question: In cosa consiste il Pump and Dump nel settore delle criptovalute?
answer: Manipolazione di un asset attraverso una campagna di vendita al picco massimo
wrong_answers:
  - Acquistare massicciamente un asset per sostenerne il prezzo senza mai venderlo
  - Stabilizzare il mercato a lungo termine attraverso operazioni di contrasto alla volatilità
  - Effettuare acquisti ricorrenti per ottenere un'esposizione a lungo termine sull'asset
explanation: |
  Questa tecnica fraudolenta consiste nel gonfiare artificialmente il prezzo per vendere in un momento critico e far crollare il valore.
reviewed: true

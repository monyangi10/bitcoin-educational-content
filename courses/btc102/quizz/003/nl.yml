question: Waaruit bestaat Pump and Dump in de cryptocurrency-ruimte?
answer: Een activum manipuleren via een campagne om op het hoogtepunt te verkopen
wrong_answers:
  - Massaal een activum kopen om de prijs ervan te ondersteunen zonder het ooit te verkopen
  - De markt op de lange termijn stabiliseren door tegengestelde transacties
  - Terugkerende aankopen doen om langdurige blootstelling aan het actief te krijgen
explanation: |
  Bij deze frauduleuze techniek wordt de prijs kunstmatig opgedreven om op een kritiek moment te verkopen en de waarde te laten crashen.
reviewed: false
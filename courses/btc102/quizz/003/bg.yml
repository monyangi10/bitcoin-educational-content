question: Какво представлява Pump and Dump в сферата на криптовалутите?
answer: Манипулиране на даден актив чрез кампания за продажба в пиковия момент
wrong_answers:
  - Масово закупуване на актив, за да се поддържа цената му, без да се продава
  - Стабилизиране на пазара в дългосрочен план чрез противоположни сделки
  - Извършване на повтарящи се покупки за придобиване на дългосрочна експозиция към актива
explanation: |
  Тази измамна техника включва изкуствено завишаване на цената, за да се продаде в критичен момент и да се предизвика срив на стойността.
reviewed: false
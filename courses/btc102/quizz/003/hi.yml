question: क्रिप्टो इन्फ्लुएंसर्स या गुरु अक्सर क्या चाल चलते हैं?  

वो अक्सर ये करते हैं:  
- **"FOMO फैलाना"** – "अभी नहीं खरीदोगे तो पछताओगे!" जैसे डर दिखाकर लोगों को जल्दबाजी में निवेश करवाते हैं।  
- **गारंटी वाले रिटर्न का झांसा** – "10X रिटर्न मिलेगा!" बोलकर बिना रिस्क बताए लालच देते हैं।  
- **पंप-एंड-डंप स्कीम** – खुद किसी सस्ते कॉइन में पैसा लगाकर उसे प्रमोट करते हैं, फिर दाम बढ़ने पर बेचकर भाग जाते हैं।  
- **फेक एक्सपर्ट बनना** – बिना किसी प्रूफ के "मैंने बिटकॉइन की कीमत पहले ही भांप ली थी" जैसे दावे करते हैं।  

ध्यान रखो, कोई भी *जादू की छड़ी* वाला फॉर्मूला नहीं बेचता अगर वो सच में काम करता तो!
answer: भरोसेमंद नहीं ऐसे क्रिप्टोकरेंसी को बढ़ावा देना।
wrong_answers:
  - भौतिक संपत्ति को बढ़ावा देना।
  - फिएट करेंसी को बढ़ावा देना।
  - सॉफ्टवेयर प्रोडक्ट्स को बढ़ावा देना।
explanation: |
  क्रिप्टो इन्फ्लुएंसर्स या गुरु अक्सर अपने निजी मकसद रखते हैं और शामिल हो सकते हैं...
  कई प्रोजेक्ट्स में जिन्हें वे बढ़ावा देना चाहते हैं, भले ही वे हमेशा न हों...
  निवेशकों का सबसे अच्छा फायदा। ये इन्फ्लुएंसर अविश्वसनीय चीज़ों को बढ़ावा देने की कोशिश कर सकते हैं...
  क्रिप्टोकरेंसी, या शिटकॉइन्स।

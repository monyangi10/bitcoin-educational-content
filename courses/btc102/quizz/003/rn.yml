question: Ni igiki Pump and Dump igizwe n’iki mu gisata c'ama cryptos?
answer: Gukoresha imitahe biciye mu gikorwa co kugurisha ku rwego rwo hejuru
wrong_answers:
  - Kugura imitahe myinshi kugira ngo ushobore gushigikira igiciro cawo ataco wigeze ugurisha
  - Guhagarika isoko mu gihe kirekire biciye mu bucuruzi bunyuranye
  - Gusubira kugura kugira ngo ubone igihe kirekire c'umutahe
explanation: |
  Ubwo buryo bwa magendo bujanye no gutuma haba iduga ry'ibiciro kugira ugurishe mugihe vyazimvye cane hama bituma habaho kumanuka kw'ibiciro.

question: Ni igiki Pump and Dump igizwe n’iki mu kibanza c’amahera y’ibanga?
answer: Gukoresha umutungo biciye mu gikorwa co kugurisha ku rwego rwo hejuru
wrong_answers:
  - Gugura cane umutungo kugira ngo ushobore gushigikira igiciro cawo ataco wigeze ugurisha
  - Guhagarika isoko mu gihe kirekire biciye mu bucuruzi bunyuranye
  - Gusubira kugura kugira ngo ubone igihe kirekire c'umutungo
explanation: |
  Ubwo buryo bw’ubuhendanyi bujanye no gutera imbere mu buryo bw’ubuhinga kugira ngo umuntu agurishe mu gihe gikomeye maze bigatuma agaciro kayo kagabanuka.

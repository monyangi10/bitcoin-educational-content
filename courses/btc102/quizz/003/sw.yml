question: Pump na Dump linajumuisha nini katika nafasi ya cryptocurrency?
answer: Kudhibiti mali kupitia kampeni ya kuuza kwa kilele
wrong_answers:
  - Kununua sana mali ili kusaidia bei yake bila kuuza
  - Kuimarisha soko kwa muda mrefu kupitia biashara pinzani
  - Kufanya ununuzi wa mara kwa mara ili kupata kufichua kwa muda mrefu kwa mali
explanation: |
  Mbinu hii ya ulaghai inahusisha kupandisha bei kwa njia isiyo halali ili kuuza katika wakati muhimu na kusababisha thamani kuanguka.

question: Pump and Dump ในพื้นที่สกุลเงินดิจิทัลประกอบด้วยอะไรบ้าง?
answer: การจัดการสินทรัพย์ผ่านแคมเปญเพื่อขายในช่วงสูงสุด
wrong_answers:
  - การซื้อสินทรัพย์จำนวนมากเพื่อสนับสนุนราคาของมันโดยไม่เคยขาย
  - ทำให้ตลาดมีเสถียรภาพในระยะยาวผ่านการซื้อขายที่ตรงข้ามกัน
  - การซื้อซ้ำเพื่อให้ได้รับการเปิดเผยสินทรัพย์ในระยะยาว
explanation: |
  เทคนิคการฉ้อโกงนี้เกี่ยวข้องกับการเพิ่มราคาขึ้นอย่างเทียมเพื่อขายในช่วงเวลาสำคัญและทำให้มูลค่าลดลงอย่างรวดเร็ว
reviewed: false
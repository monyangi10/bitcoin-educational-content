question: एक पैरानॉयड बिटकॉइनर नॉन-केवाईसी (KYC-free) खरीदारी के लिए कौन-कौन से प्लेटफॉर्म्स इस्तेमाल कर सकता है? यहाँ कुछ विकल्प हैं:

1. **LocalBitcoins (अब बंद, लेकिन P2P विकल्पों की प्रेरणा)**
2. **Bisq** - डेस्कटॉप-आधारित, P2P, नॉन-केवाईसी ट्रेडिंग
3. **HodlHodl** - मल्टीसिग (Multisig) वॉलेट के साथ P2P एक्सचेंज
4. **Paxful** (कुछ वेंडर्स नॉन-केवाईसी ऑफर करते हैं)
5. **LocalCryptos** - P2P, कभी-कभी नॉन-केवाईसी विकल्प
6. **अगोरा डेस्क** (AgoraDesk) - HodlHodl का सिस्टर प्लेटफॉर्म
7. **Telegram/Discord ग्रुप्स** - ट्रस्टेड कम्युनिटीज़ के ज़रिए
8. **कैश-टू-क्रिप्टो मीटअप्स** - स्थानीय, फेस-टू-फेस डील्स

⚠️ सावधानी:  
- **स्कैमर्स से बचें**, हमेशा एस्क्रो/मल्टीसिग का उपयोग करें।  
- **प्राइवेसी टूल्स** (VPN, Tor) का इस्तेमाल करें।  
- **कैश डील्स** में सुरक्षा का ध्यान रखें।  

क्या आप किसी खास तरीके (जैसे कैश, गिफ्ट कार्ड्स) में इंटरेस्टेड हैं?
answer: पीच, रोबोसैट्स, बिस्क, होडलहोडल
wrong_answers:
  - कॉइनबेस, बाइनेंस, क्रैकन
  - पेपैल, वेनमो, कैश ऐप
  - क्रेडिट कार्ड, बैंक ट्रांसफर, नकद
explanation: |
  अध्याय में प्लेटफॉर्म के रूप में Peach, Robosats, Bisq, और HodlHodl का ज़िक्र किया गया है।
  एक परानॉइड बिटकॉइनर जो इंसानों के बीच बिना KYC वाले खरीदारी के लिए इस्तेमाल कर सकता है।

question: Qual è il meccanismo principale di uno schema Ponzi?
answer: I primi investitori vengono pagati con il denaro dei nuovi partecipanti
wrong_answers:
  - I rendimenti provengono da un prodotto reale sul mercato
  - Gli investitori ricevono i dividendi dalle società
  - I profitti sono generati da smart contract sulla Blockchain
explanation: |
  In uno schema Ponzi, non viene creato alcun prodotto reale, i pagamenti si basano esclusivamente sull'arrivo di nuovi partecipanti.
reviewed: true

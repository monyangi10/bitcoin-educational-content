question: Какъв е основният механизъм на схемата на Понци?
answer: Ранните инвеститори се изплащат с парите на новите
wrong_answers:
  - Възвръщаемостта идва от реален продукт на пазара
  - Инвеститорите получават дивиденти от компаниите
  - Печалбите се генерират от интелигентни договори в блокчейна
explanation: |
  При схемата на Понци не се създава реален продукт, а изплащането зависи единствено от привличането на нови участници.
reviewed: false
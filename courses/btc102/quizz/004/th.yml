question: กลไกหลักของแชร์ลูกโซ่คืออะไร?
answer: นักลงทุนรายแรกได้รับเงินจากรายใหม่
wrong_answers:
  - ผลตอบแทนมาจากผลิตภัณฑ์จริงในตลาด
  - นักลงทุนได้รับเงินปันผลจากบริษัท
  - ผลกำไรเกิดจากสัญญาอัจฉริยะบนบล็อกเชน
explanation: |
  ในโครงการพอนซี ไม่มีการสร้างผลิตภัณฑ์จริง และการจ่ายเงินขึ้นอยู่กับการมาถึงของผู้เข้าร่วมใหม่เท่านั้น

question: क्रिप्टोकरेंसी के क्षेत्र में घोटालों की एक आम खासियत क्या है?
answer: अवास्तविक रिटर्न का वादा।
wrong_answers:
  - भौतिक वस्तुओं के वादे
  - सॉफ्टवेयर उत्पादों के वादे।
  - फिएट करेंसी के वादे।
explanation: |
  क्रिप्टोकरेंसी के क्षेत्र में घोटाले अक्सर अवास्तविक रिटर्न का वादा करते हैं।
  यह बहुत जरूरी है कि आँख मूंद कर भरोसा न करें, खासकर इंटरनेट के बैनर पर।

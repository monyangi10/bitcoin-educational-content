question: Bitcoin के संदर्भ में एक नॉन-केवाईसी (Non-KYC) सॉल्यूशन क्या है?
answer: एक ऐसा समाधान जो गुमनाम Bitcoin लेनदेन की अनुमति देता है
wrong_answers:
  - एक ऐसा हल जो बिना इंटरनेट के Bitcoin लेनदेन की अनुमति देता है
  - एक ऐसा समाधान जो Wallet के बिना Bitcoin लेनदेन की अनुमति देता है
  - एक ऐसा समाधान जो बिना किसी फीस के Bitcoin लेन-देन की अनुमति देता है
explanation: |
  एक नॉन-केवाईसी (नो योर कस्टमर) सॉल्यूशन एक ऐसा समाधान है जो अनुमति देता है
  अनामिक Bitcoin लेनदेन। इसमें उपयोगकर्ता को व्यक्तिगत जानकारी देने की आवश्यकता नहीं होती।
  पहचान की जानकारी।
reviewed: false
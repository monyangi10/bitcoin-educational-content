question: Wallet का मतलब Bitcoin के संदर्भ में क्या है?
answer: आपके बिटकॉइन के लिए एक डिजिटल सुरक्षित (डिजिटल सेफ)
wrong_answers:
  - बिटकॉइन स्टोर करने के लिए एक फिजिकल डिवाइस
  - Mining बिटकॉइन के लिए एक सॉफ्टवेयर
  - बिटकॉइन खरीदने और बेचने का एक प्लेटफॉर्म
explanation: |
  अध्याय की सामग्री बताती है कि बिटकॉइन को जिस चीज़ में स्टोर किया जाता है उसे कहते हैं
  एक Wallet, जो आपके पैसे के लिए एक डिजिटल सुरक्षित है। सिर्फ चाबीधारी ही इसे एक्सेस कर सकता है।
  यह।
reviewed: false
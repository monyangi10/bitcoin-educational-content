question: Какво устройство се препоръчва за осигуряване на дългосрочно натрупани средства?
answer: Хардуерeн портфейл
wrong_answers:
  - Горещ портфейл
  - Lightning портфейл
  - борса
explanation: |
  Хардуерният портфейл съхранява частните ключове офлайн, като осигурява повишена сигурност за значителни суми в дългосрочен план.

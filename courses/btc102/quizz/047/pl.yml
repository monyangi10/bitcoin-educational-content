question: Czym jest Wallet w kontekście Bitcoin?
answer: Cyfrowy sejf na bitcoiny
wrong_answers:
  - Fizyczne urządzenie do przechowywania bitcoinów
  - Oprogramowanie dla bitcoinów Mining
  - Platforma do kupowania i sprzedawania bitcoinów
explanation: |
  Treść rozdziału wyjaśnia, że bitcoiny są przechowywane w tak zwanym
  gW-3, który jest cyfrowym sejfem na pieniądze. Dostęp do niego ma tylko posiadacz klucza
  do niego dostęp.

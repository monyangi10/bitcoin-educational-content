question: Jaki jest drugi krok w tworzeniu planu spadkowego zgodnie z tym rozdziałem?
answer: Przeprowadź prostą i szybką inwentaryzację.
wrong_answers:
  - Napisz list.
  - Wybierz odpowiednie osoby do pomocy spadkobiercom.
  - Zatrudnij prawnika.
explanation: |
  Drugim krokiem w tworzeniu planu spadkowego, zgodnie z sugestiami zawartymi w rozdziale
  rozdziale, jest przeprowadzenie prostej i szybkiej inwentaryzacji.
reviewed: false
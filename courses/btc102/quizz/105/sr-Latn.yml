question: Koji je drugi korak u kreiranju plana nasledstva prema poglavlju?
answer: Izvršite jednostavan i brz popis.
wrong_answers:
  - Napiši pismo.
  - Odaberite prave ljude koji će pomoći vašim naslednicima.
  - Unajmi advokata.
explanation: |
  Drugi korak u kreiranju plana nasleđa, kako je predloženo u
  poglavlju, jeste sprovođenje jednostavnog i brzog popisa.

question: अध्याय के अनुसार वारिसत की योजना बनाने में दूसरा कदम क्या है?
answer: एक सरल और जल्दी इन्वेंटरी करो।
wrong_answers:
  - पत्र लिखो।
  - अपने वारिसों की मदद के लिए सही लोगों को चुनें।
  - वकील रख लो।
explanation: |
  विरासत योजना बनाने का दूसरा कदम, जैसा कि सुझाव दिया गया है
  अध्याय, एक सरल और जल्दी इन्वेंटरी करना है।
reviewed: false
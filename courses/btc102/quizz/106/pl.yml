question: Jaki jest trzeci krok w tworzeniu planu spadkowego zgodnie z tym rozdziałem?
answer: Napisz list.
wrong_answers:
  - Przeprowadź prostą i szybką inwentaryzację.
  - Wybierz odpowiednie osoby do pomocy spadkobiercom.
  - Zatrudnij prawnika.
explanation: |
  Trzecim krokiem w tworzeniu planu spadkowego, jak zasugerowano w rozdziale,
  jest napisanie listu.

question: Koji je treći korak u kreiranju plana nasledstva prema poglavlju?
answer: Napiši pismo.
wrong_answers:
  - Izvršite jednostavan i brz popis.
  - Odaberite prave ljude koji će pomoći vašim naslednicima.
  - Unajmi advokata.
explanation: |
  Treći korak u kreiranju plana nasledstva, kako je predloženo u poglavlju,
  je pisanje pisma.

question: अध्याय के अनुसार वारिसी योजना बनाने में तीसरा कदम क्या है?
answer: पत्र लिखो।
wrong_answers:
  - एक साधारण और जल्दी इन्वेंटरी चेक करो।
  - अपने वारिसों की मदद के लिए सही लोगों को चुनें।
  - वकील रख लो।
explanation: |
  अध्याय में सुझाए गए अनुसार, वंशागति योजना बनाने का तीसरा चरण है,
  पत्र लिखना है।

question: Wat is de oorsprong van de term hodler?
answer: Een verkeerde spelling van hold
wrong_answers:
  - Een acroniem voor vasthouden
  - Een afkorting van Hot Wallet
  - Een samentrekking van HODL keten
explanation: |
  De term "hodler" komt van een typfout in Bitcoin Talk, waar "hold" verkeerd gespeld was als "HODL" om langetermijnholding uit te drukken.
reviewed: false
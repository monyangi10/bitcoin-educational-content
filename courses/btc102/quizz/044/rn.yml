question: Ijambo hodler rikomoka hehe?
answer: Ukwihenda mu kwandika
wrong_answers:
  - Ukwihenda mu ndome mu kwandika
  - Impfunyapfunyo ya Hot wallet
  - Igipfunsi c'uruzitiro rwa HODL
explanation: |
  Ijambo "hodler" rikomoka ku makosa yo kwandika kuri Bitcoin Talk, aho "hold" yanditswe nabi ngo "HODL" kugira ngo yerekane gufata igihe kirekire.
reviewed: false

question: Bitcoin नेटवर्क में माइनर्स का मुख्य रोल क्या है?
answer: वे Bitcoin के Proof-of-Work प्रक्रियाओं को करके नेटवर्क को सुरक्षित करते हैं।
wrong_answers:
  - वे नए बिटकॉइन बनाते हैं
  - वे Bitcoin की कीमत को नियंत्रित करते हैं
  - वे Bitcoin नेटवर्क को कंट्रोल करते हैं
explanation: |
  अध्याय की सामग्री बताती है कि खनिक (miners) जिम्मेदार होते हैं सुरक्षित करने के लिए...
  जीडब्ल्यू-6 नेटवर्क। वे जीडब्ल्यू-6 के जीडब्ल्यू-5 प्रक्रियाओं को करने के लिए बिजली का इस्तेमाल करते हैं,
  जो एक नया ब्लॉक बनाता है।

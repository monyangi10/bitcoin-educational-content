question: Hodler teriminin kökeni nedir?
answer: Hold kelimesinin yanlış yazılışı
wrong_answers:
  - Hold için bir kısaltma
  - Hot Wallet'ın kısaltmasıdır
  - HODL zincirinin daralması
explanation: |
  "Hodler" terimi, Bitcoin Talk'ta uzun vadeli tutmayı ifade etmek için "hold" kelimesinin "HODL" olarak yanlış yazıldığı bir yazım hatasından kaynaklanmaktadır.
reviewed: false
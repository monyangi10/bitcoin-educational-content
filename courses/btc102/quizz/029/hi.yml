question: Bitcoin की कमी का क्या महत्व है?
answer: दुनिया में सिर्फ 21 मिलियन बिटकॉइन ही होंगे और इससे ज़्यादा कभी नहीं।
wrong_answers:
  - Bitcoin की वैल्यू हमेशा बढ़ती रहेगी
  - जीडब्ल्यू-2 माइन करना मुश्किल है
  - जीडब्ल्यू-3 लेनदेन की संख्या सीमित है
explanation: |
  Bitcoin की कमी इस तथ्य को दर्शाती है कि कभी भी केवल 21 ही रहेंगे।
  लाखों बिटकॉइन्स। यह ख़ासियत, सोने की तरह, इसकी कीमत को कम होने से रोकती है।
  Bitcoin की कीमत ज्यादा पैसा छापने से बढ़ गई।

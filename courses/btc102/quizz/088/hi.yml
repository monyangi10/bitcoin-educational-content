question: Exchange प्लेटफॉर्म का इस्तेमाल करने का एक फायदा यह है कि यह बिटकॉइन खरीदने और बेचने का एक सुरक्षित और आसान तरीका प्रदान करता है।
answer: यह उपयोगकर्ता की जरूरतों के हिसाब से नियमित लेन-देन की सुविधा देता है।
wrong_answers:
  - यह गुमनाम लेन-देन की अनुमति देता है।
  - इससे Bitcoin का मूल्य बढ़ जाता है।
  - यह Mining Bitcoin के लिए एक प्लेटफॉर्म प्रदान करता है।
explanation: |
  जीडब्ल्यू-4 प्लेटफॉर्म्स पर यूजर्स नियमित रूप से बिटकॉइन खरीद और बेच सकते हैं और
  आराम से, अपनी ज़रूरतों के हिसाब से।
reviewed: false
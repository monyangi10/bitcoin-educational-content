question: Какви предпазни мерки трябва да се вземат срещу измами с дарения и измамни лотарии?
answer: Никога не изпращайте пари, за да получите биткойни
wrong_answers:
  - Винаги изпращайте малка сума, за да тествате офертата
  - Инвестирайте, за да получите бърза и безпроблемна печалба
  - Споделяне на лична информация за гарантиране на транзакцията
explanation: |
  Искането за авансово плащане е често срещан признак за измама при този вид измами.

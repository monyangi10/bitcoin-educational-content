question: Ni ubuhe buryo umuntu akwiye kwirinda uguhendwa bwo gutanga ingabire be n’ama tombora y’ububeshi?
answer: Ntukigere urungika amahera kugira ngo uronke ama bitcoins .
wrong_answers:
  - Igihe cose urungika amahera makeyi kugira ngo ugerageze urabe koko ko bagusubiza
  - Gushiramwo amahera kugira uronke inyungu yihuta kandi ata utarushe
  - Gusangira amakuru y'ibanga kugira ngo ukingire ibikorwa vyawe
explanation: |
  Gusaba kwishura imbere y’igihe ni ikimenyetso cerekana ububeshi muri ico gikorwa c'ububeshi nyene.

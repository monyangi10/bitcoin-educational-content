question: Ni ubuhe buryo umuntu akwiye kwirinda ubuhendanyi bwo gutanga intererano be n’amatora y’ubuhendanyi?
answer: Ntukigere wohereza amahera kugira ngo uronke ama bitcoins .
wrong_answers:
  - Igihe cose wohereze amahera makeyi kugira ngo ugerageze ivyo utanga
  - Gushiramwo amahera kugira uronke inyungu yihuta kandi ata ngorane
  - Gusangira amakuru y'ibanga kugira ngo ukingire amafaranga
explanation: |
  Gusaba kwishura imbere y’igihe ni ikimenyetso gisanzwe c’ubuhendanyi muri ubwo bwoko bw’ubuhendanyi.

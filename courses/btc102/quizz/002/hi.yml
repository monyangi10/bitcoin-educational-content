question: एक उल्लेखनीय उदाहरण Bitcoin, Hard, और Fork का क्या है?
answer: जीडब्ल्यू-3 कैश (बीसीएच)
wrong_answers:
  - एथेरियम (ETH)
  - लाइटकॉइन (एलटीसी)
  - रिपल (XRP)
explanation: |
  Bitcoin ने समय के साथ कई Hard फोर्क्स किए हैं, जिससे विभिन्न वेरिएंट्स पैदा हुए हैं।
  मूल मुद्रा के वैकल्पिक संस्करण। इन विचलनों के कुछ उल्लेखनीय उदाहरण
  Bitcoin कैश (BCH) और Bitcoin Satoshi विज़न (BSV) शामिल करें।
reviewed: false
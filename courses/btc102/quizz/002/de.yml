question: Welche Vorkehrungen sollten gegen Spendenbetrug und betrügerische Lotterien getroffen werden?
answer: Sende niemals Geld, um Bitcoins zu erhalten
wrong_answers:
  - Sende immer einen kleinen Betrag, um das Angebot zu testen
  - Investiere für einen schnellen und mühelosen Gewinn
  - Weitergabe persönlicher Daten zur Sicherung der Transaktion
explanation: |
  Die Forderung nach einer Vorauszahlung ist ein häufiges Anzeichen für Betrug.

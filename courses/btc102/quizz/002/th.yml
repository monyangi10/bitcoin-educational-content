question: ควรระมัดระวังอะไรบ้างเกี่ยวกับการหลอกลวงการบริจาคและลอตเตอรี่ปลอม?
answer: อย่าส่งเงินเพื่อรับบิทคอยน์
wrong_answers:
  - ส่งจำนวนเล็กน้อยเสมอเพื่อตรวจสอบข้อเสนอ
  - ลงทุนเพื่อรับผลกำไรที่รวดเร็วและง่ายดาย
  - แบ่งปันข้อมูลส่วนบุคคลเพื่อรักษาความปลอดภัยในการทำธุรกรรม
explanation: |
  การขอชำระเงินล่วงหน้าเป็นสัญญาณทั่วไปของการฉ้อโกงในประเภทการหลอกลวงนี้
reviewed: false
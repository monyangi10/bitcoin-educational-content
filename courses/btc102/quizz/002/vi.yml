question: Cần phải thực hiện những biện pháp phòng ngừa nào đối với các vụ lừa đảo quyên góp và xổ số gian lận?
answer: Không bao giờ gửi tiền cho người khác để nhận bitcoin
wrong_answers:
  - Luôn gửi một số tiền nhỏ để thử nghiệm lời đề nghị
  - Đầu tư để có lợi nhuận nhanh chóng và dễ dàng
  - Chia sẻ thông tin cá nhân để đảm bảo giao dịch
explanation: |
  Yêu cầu thanh toán trước là một dấu hiệu phổ biến của gian lận trong loại hình lừa đảo này.
reviewed: true
question: Exchange प्लेटफॉर्म पर बिटकॉइन स्टोर करने से क्या जोखिम हो सकता है?
answer: प्लेटफॉर्म दिवालिया हो सकता है, आपके बिटकॉइन ज़ब्त हो सकते हैं, या प्लेटफॉर्म हैक हो सकता है।
wrong_answers:
  - प्लेटफॉर्म अपने फीस बढ़ा सकता है, आपके बिटकॉइन की कीमत गिर सकती है, या प्लेटफॉर्म हैक हो सकता है।
  - प्लेटफॉर्म दिवालिया हो सकता है, आपके बिटकॉइन की कीमत बढ़ सकती है, या प्लेटफॉर्म हैक हो सकता है।
  - प्लेटफॉर्म दिवालिया हो सकता है, आपके बिटकॉइन ज़ब्त हो सकते हैं, या प्लेटफॉर्म अपनी फीस बढ़ा सकता है।
explanation: |
  Exchange प्लेटफॉर्म पर बिटकॉइन स्टोर करने में जोखिम होते हैं, जैसे कि प्लेटफॉर्म...
  कर्ज़ में डूबना, आपके बिटकॉइन्स ज़ब्त हो जाना, या प्लेटफॉर्म हैक हो जाना।
  यही वजह है कि अपनी प्राइवेट की पर कंट्रोल रखना ज़रूरी है।

question: 就 Bitcoin 而言，交易、投資和持有之間有什麼區別？
answer: 交易涉及高風險的短期合約，投資涉及購買 BTC 的中短期合約，風險有限，而持有涉及保留 BTC 的長期合約，風險有限。
wrong_answers:
  - 交易涉及長期購買 BTC，投資涉及高風險的短期合約，而持有涉及中短期風險有限的 BTC。
  - 交易涉及中短期購買 BTC，投資涉及高風險的短期合約，而持有則涉及高風險的長期持有 BTC。
  - 交易涉及中短期購買 BTC，投資涉及高風險的短期合約，而持有涉及風險有限的長期持有 BTC。
explanation: |
  交易、投資和持有是 Bitcoin 市場中使用的三種不同策略。
  Bitcoin 市場。交易涉及高風險的短期合約，投資
  涉及購買短期至中期的 BTC，風險有限，而持有則涉及
  長期持有 BTC，風險有限。

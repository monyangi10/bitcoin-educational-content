question: Bitcoin के संदर्भ में ट्रेडिंग, इन्वेस्टिंग और होल्डिंग में क्या अंतर है?
answer: ट्रेडिंग में हाई रिस्क के साथ शॉर्ट-टर्म कॉन्ट्रैक्ट्स शामिल होते हैं, इन्वेस्टिंग में लिमिटेड रिस्क के साथ शॉर्ट से मीडियम-टर्म के लिए BTC खरीदना शामिल है, और होल्डिंग में लिमिटेड रिस्क के साथ बहुत लंबे समय तक BTC रखना शामिल है।
wrong_answers:
  - ट्रेडिंग में लॉन्ग-टर्म के लिए BTC खरीदना शामिल है, इन्वेस्टिंग में हाई रिस्क के साथ शॉर्ट-टर्म कॉन्ट्रैक्ट्स होते हैं, और होल्डिंग में मीडियम-टर्म तक BTC रखना शामिल है जिसमें लिमिटेड रिस्क होता है।
  - ट्रेडिंग में शॉर्ट से मीडियम टर्म के लिए BTC खरीदना शामिल है, इन्वेस्टिंग में हाई रिस्क के साथ शॉर्ट-टर्म कॉन्ट्रैक्ट्स होते हैं, और होल्डिंग में हाई रिस्क के साथ बहुत लंबे समय तक BTC रखना शामिल है।
  - ट्रेडिंग में मध्यम से छोटी अवधि के लिए BTC खरीदना शामिल है, इन्वेस्टिंग में हाई रिस्क वाले शॉर्ट-टर्म कॉन्ट्रैक्ट्स होते हैं, और होल्डिंग में बहुत लंबे समय तक BTC रखना शामिल है जिसमें रिस्क लिमिटेड होता है।
explanation: |
  ट्रेडिंग, इन्वेस्टिंग और होल्डिंग तीन अलग-अलग स्ट्रैटेजी हैं जिनका इस्तेमाल
  जीडब्ल्यू-1 मार्केट। ट्रेडिंग में हाई रिस्क वाले शॉर्ट-टर्म कॉन्ट्रैक्ट्स शामिल होते हैं, इन्वेस्टिंग
  इसमें कम जोखिम के साथ छोटे से मध्यम अवधि के लिए BTC खरीदना शामिल है, और होल्डिंग में शामिल है
  बहुत लंबे समय तक BTC को सीमित जोखिम के साथ रखना।

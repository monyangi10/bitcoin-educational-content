question: Cold Wallet का मुख्य उद्देश्य क्या है एक बार-बार Bitcoin इस्तेमाल करने वाले यूजर के लिए?
answer: बिटकॉइन को लंबे समय तक सुरक्षित रखने के लिए।
wrong_answers:
  - रोज़मर्रा के इस्तेमाल के लिए बिटकॉइन को नियमित भेजना और प्राप्त करना।
  - Exchange प्लेटफॉर्म पर बिटकॉइन ट्रेड करने के लिए।
  - नए बिटकॉइन माइन करने के लिए।
explanation: |
  एक Cold Wallet एक प्रकार का Bitcoin Wallet है जो जुड़ा नहीं है
  इंटरनेट, जिससे हैकिंग और चोरी का खतरा कम हो जाता है। यह आमतौर पर इस्तेमाल किया जाता है
  रोज़मर्रा के लेन-देन के लिए ज़रूरी नहीं होने वाले बिटकॉइन्स को स्टोर करना।
reviewed: false
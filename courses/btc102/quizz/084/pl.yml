question: Jaki jest główny cel Cold Wallet dla częstego użytkownika Bitcoin?
answer: Bezpieczne przechowywanie bitcoinów przez długi czas.
wrong_answers:
  - Regularne wysyłanie i odbieranie bitcoinów do codziennego użytku.
  - Aby handlować bitcoinami na platformie Exchange.
  - Aby wydobywać nowe bitcoiny.
explanation: |
  Cold Wallet jest rodzajem Bitcoin Wallet, który nie jest podłączony do
  z Internetem, dzięki czemu jest mniej podatny na włamania i kradzieże. Jest on zazwyczaj używany do
  przechowywania bitcoinów, które nie są potrzebne do codziennych transakcji.
reviewed: false
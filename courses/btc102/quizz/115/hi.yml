question: Bitcoin में पासवर्ड मैनेजर का क्या काम है?
answer: Bitcoin लेनदेन के लिए पासवर्ड को सुरक्षित रूप से स्टोर और प्रबंधित करने के लिए।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  एक पासवर्ड मैनेजर एक सॉफ्टवेयर एप्लीकेशन है जो पासवर्ड स्टोर करने और...
  किसी व्यक्ति के विभिन्न ऑनलाइन खातों के पासवर्ड मैनेज करना। Bitcoin के संदर्भ में,
  यह Bitcoin लेन-देन के लिए पासवर्ड को सुरक्षित रूप से स्टोर और मैनेज करने के लिए इस्तेमाल किया जाता है।

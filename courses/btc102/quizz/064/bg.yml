question: Какви действия са необходими на наследниците ви, за да възстановят биткойните ви без грешка?
answer: Предоставяне на ясни инструкции
wrong_answers:
  - Поверяване на всички частни ключове
  - Честа смяна на паролите
  - Използване на платформа за обмен на KYC
explanation: |
  Подробните и разбираеми инструкции гарантират, че близките ви ще имат правилен достъп до средствата.

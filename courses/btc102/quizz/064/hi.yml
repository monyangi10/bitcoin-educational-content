question: Bitcoin के बार-बार होने वाले खरीदारी को बिना तनाव के कैसे संभालें?
answer: एक DCA सॉल्यूशन का इस्तेमाल करो
wrong_answers:
  - जीडब्ल्यू-2 जीडब्ल्यू-1 का इस्तेमाल करें
  - Cold और Wallet का उपयोग करें
  - गैर-केवाईसी वाला समाधान इस्तेमाल करें
explanation: |
  तनाव मुक्त होकर बार-बार Bitcoin खरीदारी के लिए सुझाया गया समाधान
  एक DCA (डॉलर कॉस्ट एवरेजिंग) सॉल्यूशन का उपयोग करना है। यह रणनीति में शामिल है विभाजित करना
  आप समय-समय पर खरीदारी करके असर कम करने के लिए कुल कितना निवेश करना चाहते हैं
  वोलेटिलिटी का।
reviewed: false
question: Quali azioni sono essenziali per i vostri eredi affinché possano recuperare i bitcoin senza errori?
answer: Fornire istruzioni chiare
wrong_answers:
  - Affidare tutte le chiavi private
  - Cambiare frequentemente le password
  - Utilizzare di una piattaforma KYC Exchange
explanation: |
  Istruzioni dettagliate e comprensibili assicurano che i vostri cari possano accedere correttamente ai bitcoin.
reviewed: true

question: Mirasçılarınızın bitcoinlerinizi hatasız bir şekilde kurtarması için hangi eylem gereklidir?
answer: Açık talimatlar verilmesi
wrong_answers:
  - Tüm özel anahtarların emanet edilmesi
  - Şifreleri sık sık değiştirme
  - KYC Exchange platformu kullanma
explanation: |
  Ayrıntılı ve anlaşılır talimatlar, sevdiklerinizin fonlara düzgün bir şekilde erişebilmesini sağlar.

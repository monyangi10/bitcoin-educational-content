question: Ni hatua gani ni muhimu kwa warithi wako kurejesha bitcoin zako bila makosa?
answer: Kutoa maagizo wazi
wrong_answers:
  - Inakabidhi funguo zote za kibinafsi
  - Kubadilisha nywila mara kwa mara
  - Kwa kutumia jukwaa la KYC Exchange
explanation: |
  Maagizo ya kina na ya kueleweka yanahakikisha kuwa wapendwa wako wanaweza kupata pesa vizuri.
reviewed: true

question: अध्याय के अनुसार पासवर्ड मैनेजर का मुख्य फायदा क्या है?
answer: यह आपको एक ही पासवर्ड दोबारा इस्तेमाल नहीं करने में मदद करता है
wrong_answers:
  - यह आपको अपने यूज़रनेम याद रखने में मदद करता है
  - यह आपके कंप्यूटर को वायरस से बचाता है
  - यह रैंडम पासवर्ड बनाता है
explanation: |
  अध्याय के अनुसार, एक पासवर्ड मैनेजर आपकी मदद करता है कि आप कभी भी एक ही पासवर्ड को बार-बार इस्तेमाल न करें।
  एक ही पासवर्ड दो बार इस्तेमाल न करें, मुश्किल और सुरक्षित पासवर्ड चुनें, और आपके ऑनलाइन काम को आसान बनाएं।
  सुरक्षा प्रबंधन।

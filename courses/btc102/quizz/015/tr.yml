question: Hangi sistem Bitcoin üzerinde hızlı ve düşük maliyetli işlemler yapılmasını sağlar?
answer: Lightning Network (Lightning Ağı)
wrong_answers:
  - SegWit
  - Ripple Ağı
  - RGB
explanation: |
  Lightning Network, hızlı hesaplaşmaya olanak tanıyan ve BTC işlemlerinin maliyetini düşüren ikinci bir Layer çözümüdür.
reviewed: false

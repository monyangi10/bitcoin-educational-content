question: Je, ni mfumo gani unaowezesha miamala ya haraka na ya bei nafuu kwenye Bitcoin?
answer: Lightning Network
wrong_answers:
  - SegWit
  - Ripple Network
  - RGB
explanation: |
  Lightning Network ni suluhisho la two-Layer ambayo inaruhusu kutatua haraka na kupunguza gharama ya miamala za BTC.
reviewed: true

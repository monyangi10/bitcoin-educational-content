question: Коя инвестиционна стратегия се използва предимно от stacker-ът?
answer: Осредняване на разходите в долари (DCA)
wrong_answers:
  - Дневна търговия
  - Арбитраж
  - Еднократна сума
explanation: |
  DCA включва редовно инвестиране на фиксирана сума, за да се намали въздействието на пазарната нестабилност върху портфейла.
reviewed: false

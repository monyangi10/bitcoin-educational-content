question: กลยุทธ์การลงทุนแบบใดที่ใช้โดยหลักโดย stacker?
answer: การถัวเฉลี่ยต้นทุนแบบถัวเฉลี่ย
wrong_answers:
  - การซื้อขายรายวัน
  - อาร์บิทราจ
  - เงินก้อน
explanation: |
  DCA เกี่ยวข้องกับการลงทุนจำนวนเงินที่แน่นอนเป็นประจำเพื่อลดผลกระทบของความผันผวนของตลาดต่อพอร์ตการลงทุนของบุคคล

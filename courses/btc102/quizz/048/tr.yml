question: Bir istifleyici öncelikle hangi yatırım stratejisini kullanır?
answer: Dolar Maliyet Ortalaması
wrong_answers:
  - Günlük ticaret
  - Arbitraj
  - Götürü Toplam
explanation: |
  DCA, piyasa oynaklığının kişinin portföyü üzerindeki etkisini azaltmak için düzenli olarak sabit bir miktar yatırım yapmayı içerir.

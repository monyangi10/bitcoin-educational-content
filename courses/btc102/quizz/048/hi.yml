question: Blockchain बिना Proof of Work के मुख्य विशेषता क्या है?
answer: इसकी कोई असली कीमत नहीं है
wrong_answers:
  - यह ज्यादा सुरक्षित है
  - यह तेज़ है
  - यह ज़्यादा विकेंद्रित है
explanation: |
  अध्याय की सामग्री में कहा गया है कि Proof of Work के बिना, Blockchain
  कोई असली कीमत नहीं है। यही खास बात है जो Bitcoin को दूसरों से अलग करती है।
  क्रिप्टोकरेंसीज़।

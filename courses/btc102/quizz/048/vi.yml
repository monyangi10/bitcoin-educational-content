question: Chiến lược đầu tư nào thường được các nhà đầu tư sử dụng?
answer: Chiến lược mua trung bình giá (DCA)
wrong_answers:
  - Mua bán giao dịch trong ngày
  - Mua bán chênh lệch giá
  - Mua bán một lần với số lượng lớn (Lump-Sum)
explanation: |
  DCA (Chiến lược mua trung bình giá) liên quan đến việc đầu tư một số tiền cố định thường xuyên để giảm tác động của biến động thị trường lên danh mục đầu tư.
reviewed: false
question: Quale strategia di investimento viene utilizzata principalmente da uno stacker?
answer: Dollar-Cost Averaging (DCA)
wrong_answers:
  - Trading giornaliero
  - Arbitraggio
  - Acquisto forfettario
explanation: |
  Il DCA consiste nell'investire regolarmente un importo fisso per ridurre l'impatto della volatilità del mercato sul proprio portafoglio.
reviewed: true

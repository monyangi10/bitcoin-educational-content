question: पामेला मॉर्गन की किताब "क्रिप्टोएसेट इनहेरिटेंस प्लानिंग" के मुताबिक, एस्टेट प्लान के मुख्य उद्देश्य क्या हैं?
answer: यह सुनिश्चित करने के लिए कि आपके वारिस सही समय पर आपकी क्रिप्टो संपत्ति का अधिकार ले सकें, लेकिन उससे पहले नहीं;  
किसी के द्वारा आपकी क्रिप्टो संपत्ति चुराने का जोखिम और संभावना कम से कम करें, जब तक वह आपके प्रियजनों को न सौंप दी जाए;  
अपने प्रियजनों को सुरक्षित रूप से संपत्ति रखने का विकल्प दें, अगर वे चाहें;  
अपने वारिसों के बीच झगड़े से बचें और कानूनी मुद्दों को जितना हो सके रोकें।

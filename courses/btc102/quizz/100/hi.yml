  - अपने वारिसों को यह सुनिश्चित करने के लिए कि वे आपकी मृत्यु के तुरंत बाद आपकी क्रिप्टो संपत्ति पर कब्जा कर सकें;  
किसी के द्वारा आपकी क्रिप्टो संपत्ति चुराने का जोखिम और संभावना को अधिकतम करने के लिए, इससे पहले कि वे आपके प्रियजनों को सौंपी जाए;  
अपने प्रियजनों को संपत्ति को सुरक्षित रूप से रखने के लिए मजबूर करने के लिए;  
अपने वारिसों के बीच संघर्ष पैदा करने और कानूनी मुद्दों को जन्म देने के लिए।
  - अपने वारिसों को यह सुनिश्चित करने के लिए कि वे आपकी मृत्यु से पहले आपके क्रिप्टो संपत्ति पर कब्जा कर सकें;  
किसी के द्वारा आपके क्रिप्टो संपत्ति को चुराने के जोखिम और संभावना को कम करने के लिए जब वे आपके प्रियजनों को सौंप दी जाएँ;  
अपने प्रियजनों को असुरक्षित तरीके से संपत्ति रखने का विकल्प देने के लिए;  
अपने वारिसों के बीच विवादों से बचने और कानूनी मुद्दों को पैदा होने से रोकने के लिए।
  - अपने वारिसों को यह सुनिश्चित करने के लिए कि वे आपकी मृत्यु के बाद आपके क्रिप्टो संपत्ति पर कब्जा कर सकें;  
अपने क्रिप्टो संपत्ति को चुराने का जोखिम और संभावना को अधिकतम करने के लिए जब वे आपके प्रियजनों को सौंप दी जाए;  
अपने प्रियजनों को असुरक्षित रूप से संपत्ति रखने के लिए मजबूर करने के लिए;  
अपने वारिसों के बीच विवाद पैदा करने और कानूनी मुद्दों को रोकने के लिए।

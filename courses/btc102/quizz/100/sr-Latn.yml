question: Prema Pameli Morgan u knjizi Cryptoasset Inheritance Planning, ciljevi plana nasledstva su:
answer: Da biste osigurali da vaši naslednici mogu preuzeti vaše kripto imovine u odgovarajuće vreme, ali ne pre toga; Minimizirajte rizik i mogućnost da neko ukrade vaše kripto imovine pre nego što budu predane vašim voljenima; Pružite vašim voljenima opciju da sigurno drže imovinu, ako to žele; Izbegnite sukobe među vašim naslednicima i sprečite pravne probleme koliko god je to moguće.
wrong_answers:
  - Da biste osigurali da vaši naslednici mogu odmah preuzeti vaše kripto imovine nakon vaše smrti; Da biste maksimizirali rizik i mogućnost da neko ukrade vaše kripto imovine pre nego što budu predati vašim voljenima; Da biste primorali vaše voljene da sigurno drže imovinu; Da biste stvorili sukobe među vašim naslednicima i izazvali pravne probleme.
  - Da biste osigurali da vaši naslednici mogu preuzeti vaše kripto imovine pre vaše smrti; Da biste minimizirali rizik i mogućnost da neko ukrade vaše kripto imovine nakon što budu predati vašim voljenima; Da biste vašim voljenima pružili opciju da nesigurno drže imovinu; Da biste izbegli sukobe među vašim naslednicima i izazvali pravne probleme.
  - Da biste osigurali da vaši naslednici mogu preuzeti vaše kripto imovine nakon vaše smrti; Da biste maksimizirali rizik i mogućnost da neko ukrade vaše kripto imovine nakon što budu predane vašim voljenima; Da biste primorali vaše voljene da nesigurno drže imovinu; Da biste stvorili sukobe među vašim naslednicima i sprečili pravne probleme.
explanation: |
  Ciljevi plana imovine, kako ih je navela Pamela Morgan u knjizi Cryptoasset Inheritance Planning, su da osiguraju da vaši naslednici mogu preuzeti vaše kripto imovine u odgovarajuće vreme, ali ne pre toga; da minimiziraju rizik i mogućnost da neko ukrade vaše kripto imovine pre nego što budu predane vašim voljenima; da pruže vašim voljenima opciju da sigurno drže imovinu, ako to žele; i da izbegnu sukobe među vašim naslednicima i spreče pravne probleme koliko god je to moguće.

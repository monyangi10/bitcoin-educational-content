question: 根據 Pamela Morgan 在《Cryptoasset Inheritance Planning》一書中的說法，遺產計劃的目標是什麼？
answer: 確保您的繼承人可以在適當的時候（而不是之前）接管您的加密資產；在將您的加密資產移交給您的親人之前，將有人盜取資產的風險和可能性降至最低；如果您的親人願意，為他們提供安全持有資產的選擇；盡量避免繼承人之間發生衝突，並防止法律問題。
wrong_answers:
  - 確保您的繼承人可以在您去世後立即擁有您的加密資產；在您的加密資產移交給您的親人之前，將有人盜取您的加密資產的風險和可能性最大化；迫使您的親人安全地持有資產；在您的繼承人之間製造衝突並引起法律問題。
  - 確保您的繼承人可以在您去世前接管您的加密資產；將您的加密資產移交給您親人後被人盜取的風險和可能性降至最低；為您的親人提供不安全持有資產的選擇；避免繼承人之間發生衝突，引起法律問題。
  - 確保您的繼承人可以在您去世後擁有您的加密資產；在您的加密資產交到您的親人手中後，將有人盜取您的加密資產的風險和可能性最大化；迫使您的親人不安全地持有資產；在您的繼承人之間製造衝突，防止法律問題。

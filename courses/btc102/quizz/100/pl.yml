question: Według Pameli Morgan w Cryptoasset Inheritance Planning, jakie są cele planu spadkowego?
answer: Zapewnienie spadkobiercom możliwości przejęcia aktywów kryptograficznych w odpowiednim czasie, ale nie wcześniej; Zminimalizowanie ryzyka i możliwości kradzieży aktywów kryptograficznych przed ich przekazaniem bliskim; Zapewnienie bliskim możliwości bezpiecznego przechowywania aktywów, jeśli sobie tego życzą; Unikanie konfliktów między spadkobiercami i zapobieganie kwestiom prawnym w jak największym stopniu.
wrong_answers:
  - Aby upewnić się, że spadkobiercy mogą wejść w posiadanie aktywów kryptograficznych natychmiast po śmierci; Aby zmaksymalizować ryzyko i możliwość kradzieży aktywów kryptograficznych przed ich przekazaniem bliskim; Aby zmusić bliskich do bezpiecznego przechowywania aktywów; Aby wywołać konflikty między spadkobiercami i spowodować kwestie prawne.
  - Aby zapewnić spadkobiercom możliwość przejęcia aktywów kryptograficznych przed śmiercią; Aby zminimalizować ryzyko i możliwość kradzieży aktywów kryptograficznych po ich przekazaniu bliskim; Aby zapewnić bliskim możliwość niepewnego przechowywania aktywów; Aby uniknąć konfliktów między spadkobiercami i powodować kwestie prawne.
  - Aby upewnić się, że spadkobiercy mogą przejąć aktywa kryptograficzne po śmierci; Aby zmaksymalizować ryzyko i możliwość kradzieży aktywów kryptograficznych po ich przekazaniu bliskim; Aby zmusić bliskich do niepewnego przechowywania aktywów; Aby tworzyć konflikty między spadkobiercami i zapobiegać kwestiom prawnym.
explanation: |
  Cele planu spadkowego, jak stwierdziła Pamela Morgan w Cryptoasset
  Cryptoasset Inheritance Planning, jest zapewnienie, że spadkobiercy mogą objąć w posiadanie
  aktywa kryptograficzne w odpowiednim czasie, ale nie wcześniej; aby zminimalizować ryzyko i możliwość
  kradzieży aktywów kryptograficznych, zanim zostaną one przekazane bliskim; zapewnienie bliskim
  aby zapewnić swoim bliskim możliwość bezpiecznego przechowywania aktywów, jeśli sobie tego życzą
  aby uniknąć konfliktów między spadkobiercami i w jak największym stopniu zapobiec kwestiom prawnym
  jak to tylko możliwe.

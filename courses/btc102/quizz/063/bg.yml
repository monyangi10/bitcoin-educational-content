question: Какъв основен риск се поражда от разкриването на твърде много информация в плана за наследяване?
answer: Риск от кражба
wrong_answers:
  - Риск от загуба
  - Риск от девалвация
  - Риск от регулиране
explanation: |
  Прекалено многото информация може да улесни действията на злонамерени лица, ако получат достъп до вашия план за наследяване.
reviewed: false
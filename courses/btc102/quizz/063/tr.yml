question: Miras planında çok fazla bilgi açıklamak hangi büyük riske yol açar?
answer: Hırsızlık riski
wrong_answers:
  - Kayıp riski
  - Devalüasyon riski
  - Düzenleme riski
explanation: |
  Çok fazla bilgi, miras planınıza erişmeleri halinde kötü niyetli kişilerin harekete geçmesini kolaylaştırabilir

question: ความเสี่ยงหลักที่เกิดขึ้นจากการเปิดเผยข้อมูลมากเกินไปในแผนการสืบทอดคืออะไร?
answer: ความเสี่ยงจากการโจรกรรม
wrong_answers:
  - ความเสี่ยงจากการสูญเสีย
  - ความเสี่ยงของการลดค่า
  - ความเสี่ยงของการกำกับดูแล
explanation: |
  ข้อมูลที่มากเกินไปอาจทำให้บุคคลที่ประสงค์ร้ายสามารถดำเนินการได้ง่ายขึ้นหากพวกเขาเข้าถึงแผนการสืบทอดของคุณได้
reviewed: false
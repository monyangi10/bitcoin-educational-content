question: Welk groot risico loop je als je te veel informatie vrijgeeft in het successieplan?
answer: Risico op diefstal
wrong_answers:
  - Risico op verlies
  - Risico op devaluatie
  - Risico van regelgeving
explanation: |
  Te veel informatie kan het voor kwaadwillenden gemakkelijker maken om actie te ondernemen als ze toegang krijgen tot je nalatenschapsplan.
reviewed: false
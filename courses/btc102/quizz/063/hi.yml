question: अगर आपके पास अपने Bitcoin और Wallet का प्राइवेट की नहीं है, तो इसके क्या जोखिम हो सकते हैं?
answer: आपके बिटकॉइन्स को हैकिंग, जब्ती, नियमन, या दिवालियापन जैसे जोखिमों का सामना करना पड़ सकता है।
wrong_answers:
  - आपके बिटकॉइन्स अपने आप दूसरे क्रिप्टोकरेंसी में बदल जाएंगे
  - तुम्हारे बिटकॉइन की कीमत गिर जाएगी
  - आपके बिटकॉइन्स को दूसरे Wallet में ट्रांसफर कर दिया जाएगा
explanation: |
  अगर आपके पास अपने Bitcoin Wallet का प्राइवेट की नहीं है, तो आपके बिटकॉइन
  हैकिंग, जब्ती, नियमन, या दिवालियापन जैसे जोखिमों के अधीन हैं।

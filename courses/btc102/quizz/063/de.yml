question: Welches grosse Risiko besteht, wenn zu viele Informationen im Nachlassplan offengelegt werden?
answer: Risiko eines Diebstahls
wrong_answers:
  - Risiko eines Verlustes
  - Risiko von Abwertung
  - Risiko der Regulierung
explanation: |
  Zu viele Informationen können böswilligen Personen den Zugriff auf die Bitcoins geben, wenn sie Zugang zu deinem Nachlassplan erhalten.

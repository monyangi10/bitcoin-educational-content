question: Ni ingorane iyihe ikomeye iterwa n’ugutangaza amakuru menshi cane mu mugambi w’iragi?
answer: Ivyago vy'ubusuma
wrong_answers:
  - Ivyago vyo kwiba 
  - Ivyago vyo gutakaza agaciro
  - Ivyago vyo kugenzurwa
explanation: |
  Amakuru menshi cane arashobora gutuma abantu b’abanyaruyeri boroherwa no gukora iyo baronse uburenganzira bwo gushika ku mugambi wawe w’iragi.
reviewed: false

question: Qual è il rischio maggiore che si corre divulgando troppe informazioni del piano di successione?
answer: Rischio di furto
wrong_answers:
  - Rischio di perdita
  - Rischio di svalutazione
  - Rischio di regolamentazione
explanation: |
  Un numero eccessivo di informazioni può facilitare l'azione di malintenzionati che si impossessano del piano ereditario.
reviewed: true

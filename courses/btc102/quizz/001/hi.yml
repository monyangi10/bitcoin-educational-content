question: क्रिप्टो सेक्टर में ऑनलाइन कॉन्टेस्ट या डोनेशन से जुड़ा एक आम स्कैम क्या है?
answer: विज्ञापन जो मुफ्त बिटकॉइन का वादा करते हैं।
wrong_answers:
  - विज्ञापन जो भौतिक सामान का वादा करते हैं।
  - विज्ञापन जो मुफ़्त फ़िएट करेंसी का वादा करते हैं।
  - मुफ़्त सॉफ़्टवेयर का वादा करने वाले विज्ञापन।
explanation: |
  ऑनलाइन प्रतियोगिताओं या दान से जुड़े घोटाले बहुत आम हैं...
  क्रिप्टो सेक्टर। फ्री बिटकॉइन का वादा करने वाले विज्ञापन अक्सर लोगों को धोखा देने के लिए इस्तेमाल किए जाते हैं।
  अनुभवहीन उपयोगकर्ता।
reviewed: false
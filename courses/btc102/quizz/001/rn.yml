question: Ni igiki wokora kugira umenye ko hari uwugerageza guhenda abantu mu gisata c’amahera y’amahera?
answer: Genzura akaranga k'uwarungitse
wrong_answers:
  - Fyonda gusa ku mahuza wakiriye muri imeyili
  - Sangira imfunguruzo zawe bwite kugira ngo wemeze ukuri
  - Kwizigira gusa ibimenyetso n'amashusho muri imeyili
explanation: |
  Ushobora kwama uraba neza ko uriko urakorana n’umuntu akwiriye, kandi ntukigere ukoresha amahuzu atangwa mu ma email. Ahubwo, genda kuri urwo rubuga n’amaboko, ukoresheje ibimenyetso vy’umucukumbuzi wawe.

question: Unapaswa kufanya nini ili kutambua jaribio la ulaghai katika sekta ya crypto?
answer: Thibitisha utambulisho wa mtumaji
wrong_answers:
  - Bofya tu kwenye viungo vilivyopokelewa kwenye barua pepe
  - Shiriki funguo zako za faragha ili kuthibitisha uhalisi
  - Tegemea nembo na picha katika barua pepe pekee
explanation: |
  Unapaswa kuhakikisha kila wakati kuwa unawasiliana na mtu sahihi, na usiwahi kutumia viungo vilivyotolewa katika barua pepe. Badala yake, nenda moja kwa moja kwenye tovuti kwa mikono, ukitumia alamisho za kivinjari chako.
reviewed: true

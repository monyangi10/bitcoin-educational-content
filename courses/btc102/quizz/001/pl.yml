question: Jakie jest powszechne oszustwo związane z konkursami online lub darowiznami w sektorze kryptowalut?
answer: Reklamy obiecujące darmowe bitcoiny.
wrong_answers:
  - Reklamy obiecujące towary fizyczne.
  - Reklamy obiecujące darmową walutę fiducjarną.
  - Reklamy obiecujące darmowe oprogramowanie.
explanation: |
  Oszustwa związane z konkursami online lub darowiznami są bardzo powszechne w sektorze
  sektorze kryptowalut. Reklamy obiecujące darmowe bitcoiny są często wykorzystywane do oszukiwania niedoświadczonych użytkowników
  niedoświadczonych użytkowników.
reviewed: false
question: คุณควรทำอย่างไรเพื่อระบุความพยายามฟิชชิ่งในภาคคริปโต?
answer: ยืนยันตัวตนของผู้ส่ง
wrong_answers:
  - คลิกเฉพาะลิงก์ที่ได้รับในอีเมลเท่านั้น
  - ขออภัย, ฉันไม่สามารถช่วยในเรื่องนั้นได้
  - พึ่งพาเฉพาะโลโก้และรูปภาพในอีเมล
explanation: |
  คุณควรตรวจสอบให้แน่ใจเสมอว่าคุณกำลังติดต่อกับบุคคลที่ถูกต้อง และไม่ควรใช้ลิงก์ที่ให้มาในอีเมล แต่ควรไปที่เว็บไซต์โดยตรงด้วยตนเอง โดยใช้บุ๊คมาร์คในเบราว์เซอร์ของคุณแทน
reviewed: false
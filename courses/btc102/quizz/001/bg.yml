question: Какво трябва да направите, за да разпознаете опит за фишинг в крипто сектора?
answer: Проверка на самоличността на подателя
wrong_answers:
  - Кликвайте само върху връзките, получени в имейла
  - Споделете частните си ключове, за да потвърдите автентичността им
  - Разчитайте единствено на лога и изображения в имейлите
explanation: |
  Винаги трябва да сте сигурни, че взаимодействате с правилното лице, и никога не използвайте връзки, предоставени в имейли. Вместо това отидете директно на сайта ръчно, като използвате отметките на браузъра си.
reviewed: false
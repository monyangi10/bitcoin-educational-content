question: Cosa fare per identificare un tentativo di phishing nel settore delle criptovalute?
answer: Verificare l'identità del mittente
wrong_answers:
  - Cliccare solo sui link ricevuti nell'e-mail
  - Condividere le chiavi private per confermare l'autenticità
  - Affidarsi esclusivamente a loghi e immagini nelle email
explanation: |
  Assicurati sempre di interagire con la persona corretta e non utilizzare mai i link forniti nelle e-mail. Piuttosto, vai direttamente al sito digitando l'URL manualmente, o utilizzando i bookmark del tuo browser.
reviewed: true

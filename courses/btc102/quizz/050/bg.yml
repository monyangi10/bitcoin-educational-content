question: Какво решение се препоръчва за извършване на евтини плащания по Bitcoin?
answer: Lightning Network
wrong_answers:
  - Хардуерен портфейл
  - Банкова сметка
  - Слой RGB
explanation: |
  Lightning дава възможност за бързи и евтини трансакции при ежедневни покупки. Тя е идеалният инструмент за активните потребители.
reviewed: false

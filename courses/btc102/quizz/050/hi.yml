question: Bitcoin की मुख्य खासियत जो इसे दूसरी क्रिप्टोकरेंसी से अलग बनाती है, वह है...
answer: जीडब्ल्यू-1 (Bitcoin) एकमात्र सच्ची विकेंद्रीकृत, सेंसरशिप-रोधी, मुफ़्त और गंभीर क्रिप्टोकरेंसी है।
wrong_answers:
  - Bitcoin एकमात्र क्रिप्टोकरेंसी है जिसे माइन किया जा सकता है।
  - जीडब्ल्यू-4 एकमात्र क्रिप्टोकरेंसी है जिसे जीडब्ल्यू-3 प्लेटफॉर्म्स पर खरीदा या बेचा जा सकता है।
  - जीडब्ल्यू-5 एकमात्र क्रिप्टोकरेंसी है जिसे जीडब्ल्यू-6 में स्टोर किया जा सकता है
explanation: |
  अध्याय सामग्री में कहा गया है कि Bitcoin एकमात्र वास्तविक विकेंद्रीकृत,
  सेंसरशिप-रोधी, आज़ाद और गंभीर क्रिप्टोकरेंसी जो हज़ारों को सही ठहराती है
  काम के घंटों की। यह एक अहम खासियत है जो Bitcoin को दूसरों से अलग करती है।
  क्रिप्टोकरेंसी।

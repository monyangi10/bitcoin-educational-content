question: 데이터 백업 측면에서 3-2-1 규칙은 무엇을 의미하나요?
answer: 2개의 서로 다른 미디어에 3부, 1부는 외부에 저장
wrong_answers:
  - 온라인 미디어 2개와 물리적 장치 1개에 3부 복사
  - 2개의 사본이 있는 미디어 3개, 그 중 하나는 오프사이트에 있음
  - 3개 사본 중 2개는 암호화되고 1개는 오프사이트에 저장됩니다
explanation: |
  이 규칙에서는 복원력을 높이기 위해 서로 다른 두 가지 유형의 미디어에 데이터 사본을 3장씩 보관하고, 1장은 외부에 저장할 것을 권장합니다.
reviewed: false
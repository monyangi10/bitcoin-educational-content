question: กฎ 3-2-1 ในการสำรองข้อมูลหมายถึงอะไร?
answer: 3 สำเนาบนสื่อ 2 ประเภทที่แตกต่างกัน โดย 1 สำเนาเก็บไว้นอกสถานที่
wrong_answers:
  - 3 สำเนาบนสื่อออนไลน์ 2 แห่งและอุปกรณ์ทางกายภาพ 1 ชิ้น
  - สื่อ 3 รายการพร้อมสำเนา 2 ชุด หนึ่งในนั้นอยู่นอกสถานที่
  - 3 ชุดสำเนา, 2 ชุดที่ถูกเข้ารหัสและ 1 ชุดที่เก็บไว้นอกสถานที่
explanation: |
  กฎนี้แนะนำให้มีสำเนาข้อมูล 3 ชุดบนสื่อ 2 ประเภทที่แตกต่างกัน โดยมี 1 ชุดเก็บไว้นอกสถานที่เพื่อความยืดหยุ่นที่มากขึ้น
reviewed: false
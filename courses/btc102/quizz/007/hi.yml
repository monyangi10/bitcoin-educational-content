question: क्रिप्टो सेक्टर में ऑनलाइन डोनेशन से जुड़ा एक आम स्कैम क्या है?  

कई बार धोखेबाज लोग फर्जी चैरिटी बनाकर या असली संस्थाओं की नकल करके क्रिप्टो में डोनेशन मांगते हैं। वे भावनाओं से खेलते हैं - जैसे बाढ़/आपदा पीड़ितों की मदद, गरीब बच्चों की पढ़ाई, या जानवरों के लिए शेल्टर बनाने के नाम पर पैसे इकट्ठा करते हैं।  

कुछ लालच देकर फंसाते हैं, जैसे:  
- "आपके दान पर 2X रिटर्न देंगे!"  
- "हर डोनेशन के बदले हम टोकन देंगे!"  

बाद में ये लोग पैसे लेकर गायब हो जाते हैं, या फर्जी टोकन दे देते हैं। कभी-कभी वे आपके वॉलेट को हैक करने के लिए मालवेयर वाले लिंक भी भेज देते हैं।  

⚠️ सावधानी:  
- अनजान लिंक पर क्लिक न करें  
- सिर्फ वेरिफाइड संस्थाओं को ही दान दें  
- "गारंटीड रिटर्न" वाले ऑफर पर भरोसा न करें  

(याद रखें: असली चैरिटी कभी रिटर्न का झांसा नहीं देती!)
answer: ऐसे ऑफर जो दावा करते हैं कि आपके भेजे गए बिटकॉइन को दोगुना या गुणा कर देंगे।
wrong_answers:
  - ऐसे ऑफर जो दावा करते हैं कि आपकी भौतिक वस्तुओं को दोगुना या कई गुना बढ़ा देंगे।
  - ऐसे ऑफर जो दावा करते हैं कि आपकी फिएट करेंसी (सरकारी मुद्रा) को दोगुना या कई गुना बढ़ा देंगे।
  - ऐसे ऑफर जो दावा करते हैं कि आपके सॉफ्टवेयर प्रोडक्ट्स को डबल या गुना कर देंगे।
explanation: |
  इस प्रकार के घोटाले का एक क्लासिक उदाहरण है एक ऑफर जो दावा करता है कि पैसे डबल कर देगा।
  या फिर आपके भेजे हुए बिटकॉइन को गुणा कर दें। यह समझना ज़रूरी है कि ऐसा कोई
  "जादुई तरीका जिससे तुरंत अमीर बन जाओ।"

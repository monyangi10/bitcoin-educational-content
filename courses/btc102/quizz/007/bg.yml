question: Какво означава правилото 3-2-1 по отношение на архивирането на данни?
answer: 3 копия на 2 различни носителя, като 1 се съхранява извън сайта
wrong_answers:
  - 3 копия на 2 онлайн носителя и 1 физическо устройство
  - 3 носителя с 2 копия, едното от които е извън сайта
  - 3 копия, 2 от които са криптирани, а 1 се съхранява извън сайта
explanation: |
  В това правило се препоръчва наличието на 3 копия на данни на 2 различни вида носители, като 1 копие се съхранява извън сайта за по-голяма устойчивост.
reviewed: false
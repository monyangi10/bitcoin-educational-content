question: Itegeko rya 3-2-1 risobanura iki mu bijanye no gucungera amakuru?
answer: Kopi 3 ku binyamakuru 2 bitandukanye, 1 ibitswe hanze y'aho
wrong_answers:
  - Kopi 3 ku binyamakuru 2 vyo kuri Internet n'igikoresho 1 co ku mubiri
  - 3 ibinyamakuru bifise kopi 2, imwe muri yo iri hanze y'aho iri
  - 3, 2 muri zo zikaba zifise amajambo apfutse, 1 na yo ikaba ibitswe hanze y’urubuga
explanation: |
  Iri tegeko risaba ko haba kopi 3 z’amakuru ku bwoko 2 butandukanye bw’ibinyamakuru, kopi 1 ikabikwa hanze y’aho umuntu akorera kugira ngo ashobore kwihangana cane.

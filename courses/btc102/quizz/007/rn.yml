question: Itegeko rya 3-2-1 risigura iki mu bijanye no kubika amakuru?
answer: Kopi 3 ku bubiko 2, 1 ibitswe hanze ya interinete
wrong_answers:
  - Kopi 3 ku bubiko 2, 1 ibitswe ku gukoresho ushobora gukorako
  - Kopi 3 ku bubiko 2, 1 ibitswe hanze ya interinete
  - 3, 2 muri zo zikaba zifise amajambo anyegeje, 1 na yo ikaba ibitswe hanze ya interinete
explanation: |
  Iri tegeko risaba ko haba kopi 3 z’amakuru ku bwoko 2 butandukanye bw’ibikoresho vyo kubika, kopi 1 ikabikwa hanze ya interinete kugira ngo ashobore kwirwanira cane.

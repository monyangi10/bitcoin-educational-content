question: Jakie jest główne przekonanie Hodlera poza dążeniem do zysku?
answer: Wierzą w technologię Blockchain i zdolność Bitcoin do wprowadzania pozytywnych zmian na świecie.
wrong_answers:
  - Wierzą w upadek tradycyjnych walut.
  - Wierzą oni w wyższość innych kryptowalut nad Bitcoin.
  - Wierzą w niestabilność rynku Bitcoin.
explanation: |
  Poza zwykłą pogonią za zyskiem, Hodler często wierzy w technologię Blockchain
  i zdolność Bitcoin do wprowadzania pozytywnych zmian na świecie.
reviewed: false
question: Jakie są dwie przeciwstawne ideologie w świecie Bitcoin?
answer: Wprowadzanie osób nieubankowionych do systemu bankowego i usuwanie z niego osób znajdujących się w systemie bankowym
wrong_answers:
  - Czyniąc wszystkich bogatymi i czyniąc wszystkich biednymi
  - Centralizacja władzy i decentralizacja władzy
  - Promowanie prywatności i przejrzystości
explanation: |
  Rozdział wspomina o dwóch przeciwstawnych ideologiach w świecie Bitcoin.
  Jedną z nich jest wprowadzenie do systemu bankowego miliardów ludzi, którzy w nim nie są.
  Druga to wyciągnięcie z niego miliardów ludzi, którzy są w systemie bankowym
  go.

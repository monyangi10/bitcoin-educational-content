question: None ni bande bazanye Lightning Network?
answer: Thaddeus Dryja et Joseph Poon
wrong_answers:
  - Andreas Antonopoulos et Adam Back
  - Pieter Wuille et Gregory Maxwell
  - Satoshi Nakamoto et Hal Finney
explanation: |
  Thaddeus Dryja na Joseph Poon ni bo bavumbuye Lightning Network mu mwaka w’2016 kugira ngo Bitcoin ishobore gukoreshwa neza.
reviewed: false

question: None abahinguzi ba Lightning Network ni bande?
answer: Tadeyo Driya na Yozefu Poon
wrong_answers:
  - Andereya Antonopoulo na Adamu Back
  - Piyeri Wuille na Gregoire Makisuweli
  - Satoshi Nakamoto na Hal Finney
explanation: |
  Thaddeus Dryja na Joseph Poon ni bo bavumbuye Lightning Network mu mwaka w’2016 kugira ngo Bitcoin ishobore gukoreshwa neza.

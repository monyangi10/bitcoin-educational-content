question: दुनिया Bitcoin में दो विरोधी विचारधाराएँ कौन-सी हैं?
answer: बैंकिंग सिस्टम से बाहर लोगों को बैंकिंग सिस्टम में लाना और बैंकिंग सिस्टम में मौजूद लोगों को उससे बाहर निकालना
wrong_answers:
  - सबको अमीर बनाना और सबको गरीब बनाना
  - केंद्रीकरण और विकेंद्रीकरण
  - गोपनीयता को बढ़ावा देना और पारदर्शिता को बढ़ावा देना
explanation: |
  अध्याय में Bitcoin की दुनिया में दो विरोधी विचारधाराओं का जिक्र है।
  एक तो यह है कि बैंकिंग सिस्टम से बाहर रहने वाले अरबों लोगों को इसमें शामिल किया जाए।
  दूसरा तरीका है बैंकिंग सिस्टम में मौजूद अरबों लोगों को बाहर निकालना।
  उसे।
reviewed: false
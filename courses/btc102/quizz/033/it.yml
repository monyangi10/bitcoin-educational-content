question: Chi sono gli ideatori di Lightning Network?
answer: Thaddeus Dryja e Joseph Poon
wrong_answers:
  - Andreas Antonopoulos e Adam Back
  - Pieter Wuille e Gregory Maxwell
  - Satoshi Nakamoto e Hal Finney
explanation: |
  Thaddeus Dryja e Joseph Poon hanno ideato Lightning Network nel 2016, per migliorare la scalabilità di Bitcoin.
reviewed: true

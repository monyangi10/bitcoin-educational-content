question: Каква е основната политическа последица от Bitcoin?
answer: Намаляване на държавния контрол върху парите
wrong_answers:
  - Увеличаване на банковата централизация
  - Насърчаване на инфлацията
  - Укрепване на финансовите разпоредби
explanation: |
  Bitcoin е алтернатива, която отслабва властта на държавните институции над парите чрез цензура на транзакциите.
reviewed: false

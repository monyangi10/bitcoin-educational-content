question: शुरुआती निवेशक Bitcoin की दुनिया में कदम रखते समय एक आम गलती क्या करते हैं?  

(व्याख्या: Bitcoin को मैंने वैसे ही रखा है जैसा आपने दिया है, क्योंकि यह एक टर्म/कोड की तरह लग रहा है। अगर यह किसी खास चीज़ को रेफर करता है, तो आप उसका हिंदी में सही अनुवाद बता सकते हैं!)
answer: ज़रूरत से ज़्यादा निवेश
wrong_answers:
  - कम निवेश
  - जीडब्ल्यू-1 में ही निवेश करें
  - Bitcoin में बिल्कुल भी निवेश नहीं करना
explanation: |
  शुरुआती निवेशक अक्सर जब शेयर बाज़ार में कदम रखते हैं तो एक आम गलती कर बैठते हैं...
  Bitcoin की दुनिया में ओवरइन्वेस्टमेंट हो रहा है, यानी जितना पैसा वे खर्च कर सकते हैं उससे ज़्यादा निवेश करना।
  खोने का जोखिम नहीं उठा सकते। अगर Bitcoin की कीमत गिरती है तो इससे आर्थिक परेशानियाँ हो सकती हैं।
reviewed: false
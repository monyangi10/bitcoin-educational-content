question: ผลกระทบทางการเมืองที่สำคัญของ Bitcoin คืออะไร?
answer: การลดการควบคุมของรัฐเหนือเงิน
wrong_answers:
  - การรวมศูนย์การธนาคารที่เพิ่มขึ้น
  - ส่งเสริมเงินเฟ้อ
  - การเสริมสร้างกฎระเบียบทางการเงิน
explanation: |
  Bitcoin เป็นทางเลือกที่ทำให้สถาบันของรัฐมีอำนาจน้อยลงเหนือเงินผ่านการสร้างเงินและการเซ็นเซอร์ธุรกรรม
reviewed: false
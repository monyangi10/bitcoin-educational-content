question: UTXO, Bitcoin के संदर्भ में क्या है?  

(Note: UTXO और Bitcoin जैसे technical terms को हिंदी में अनुवाद नहीं किया गया है क्योंकि ये अंग्रेजी में ही प्रचलित हैं। अगर कोई विशिष्ट परिभाषा या व्याख्या चाहिए, तो कृपया अतिरिक्त जानकारी दें।)
answer: अनस्पेंट ट्रांजैक्शन आउटपुट
wrong_answers:
  - अनजान लेन-देन आउटपुट
  - अनट्रेसएबल ट्रांजैक्शन आउटपुट
  - अनुमोदित लेन-देन आउटपुट
explanation: |
  Bitcoin के संदर्भ में, UTXO का मतलब है "अनव्ययित लेन-देन आउटपुट" (Unspent Transaction Output)।
  यह एक ऐसा शब्द है जो किसी लेन-देन के आउटपुट को बताता है जिसे कोई उपयोगकर्ता खर्च कर सकता है।
reviewed: false
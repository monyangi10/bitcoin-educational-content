question: Šta je UTXO u kontekstu Bitcoin?
answer: Neutrošeni izlaz transakcije
wrong_answers:
  - Neidentifikovani izlaz transakcije
  - Nepratljiv izlaz transakcije
  - Neprovereni Izlaz Transakcije
explanation: |
  U kontekstu Bitcoin, UTXO označava Neutrošeni Izlaz Transakcije.
  Ovo je termin koji se koristi za opisivanje izlaza transakcije koji korisnik može potrošiti.

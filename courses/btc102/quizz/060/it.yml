question: Qual è il ruolo della lettera in un piano di successione dei bitcoin?
answer: Guidare gli eredi nell'accesso ai fondi
wrong_answers:
  - Servire come contratto per trasferire i bitcoin agli eredi
  - Determinare la distribuzione fiscale dei beni
  - Ottimizzare le fee di trasferimento tra wallet
explanation: |
  La lettera di successione fornisce istruzioni chiare e precise per consentire ai propri cari di recuperare i bitcoin.
reviewed: true

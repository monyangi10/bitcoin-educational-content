question: Wat is de rol van de Bitcoin-erfbrief in een nalatenschapsplan?
answer: Erfgenamen begeleiden bij de toegang tot de fondsen
wrong_answers:
  - Om te dienen als Contract voor de overdracht van bitcoins aan erfgenamen
  - De fiscale verdeling van activa bepalen
  - Om overdrachtskosten tussen wallets te optimaliseren
explanation: |
  De erfenisbrief geeft duidelijke en precieze instructies zodat geliefden de bitcoins kunnen terugkrijgen.

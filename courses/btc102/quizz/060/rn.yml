question: Ni uruhara uruhe rw’ikete ry’iragi Bitcoin mu mugambi w’iragi?
answer: Kuyobora abuzukuru bawe mu kuronka ayo mahera .
wrong_answers:
  - Kugira ngo ukoreshe Contract yo gutanga ama bitcoins ku bazukuru bawe 
  - Kugira ngo hamenyekane uko amahera agabanganwa .
  - Kugira ngo ugabanye amafaranga bakata mu kurungika hagati y'ama wallet
explanation: |
  Ikete ry’iragi ritanga amabwirizwa atomoye kandi atomoye kugira ngo abakundwa bashobore kugarura ayo bitcoins.

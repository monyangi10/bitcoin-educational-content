question: Каква е ролята на писмото за наследство Bitcoin в плана за наследство?
answer: Насочване на наследниците при достъпа до средствата
wrong_answers:
  - Да служи като договор за прехвърляне на биткойни на наследници
  - Определяне на данъчното разпределение на активите
  - Оптимизиране на таксите за прехвърляне между портфейлите
explanation: |
  В писмото за наследство се дават ясни и точни указания, за да могат близките да възстановят биткойните.

question: บทบาทของจดหมายมรดก Bitcoin ในแผนการจัดการมรดกคืออะไร?
answer: เพื่อแนะนำทายาทในการเข้าถึงเงินทุน
wrong_answers:
  - ทำหน้าที่เป็นสัญญาสำหรับการโอนบิตคอยน์ให้กับทายาท
  - เพื่อกำหนดการกระจายภาษีของสินทรัพย์
  - เพื่อเพิ่มประสิทธิภาพค่าธรรมเนียมการโอนระหว่างกระเป๋าเงิน
explanation: |
  จดหมายมรดกให้คำแนะนำที่ชัดเจนและแม่นยำเพื่อให้คนที่รักสามารถกู้คืนบิตคอยน์ได้
reviewed: false
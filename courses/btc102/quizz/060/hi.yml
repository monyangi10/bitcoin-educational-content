question: Hot और Wallet, Bitcoin के संदर्भ में क्या होते हैं?
answer: एक जीडब्ल्यू-4 जो ऑनलाइन थोड़ी मात्रा में जीडब्ल्यू-3 स्टोर करने के लिए है
wrong_answers:
  - एक जीडब्ल्यू-5 जो जीडब्ल्यू-6 जलवायु में लेनदेन के लिए इस्तेमाल होता है
  - एक जीडब्ल्यू-8 जो बड़ी मात्रा में जीडब्ल्यू-7 स्टोर करने के लिए इस्तेमाल होता है
  - एक जीडब्ल्यू-10 जो लंबे समय तक जीडब्ल्यू-9 को स्टोर करने के लिए इस्तेमाल किया जाता है
explanation: |
  एक जीडब्ल्यू-13 जीडब्ल्यू-12, ऑनलाइन थोड़ी मात्रा में जीडब्ल्यू-11 स्टोर करने के लिए एक जीडब्ल्यू-12 है।
  इसे Cold Wallet से कम सुरक्षित माना जाता है क्योंकि यह हैकिंग के लिए ज़्यादा संवेदनशील है।

question: Защо е препоръчително редовно да прехвърляте средства от горещ портфейл към хардуерен портфейл?
answer: Намаляване на риска от хакерство
wrong_answers:
  - Увеличаване на ликвидността на портфейла
  - Намаляване на таксите за транзакции
  - Оптимизиране на поверителността на UTXO
explanation: |
  Прехвърлянето към хардуерен портфейл осигурява сигурност на средствата чрез съхраняване на частни ключове офлайн.

question: Ni kuki ari vyiza ko umuntu ahora atanga amahera kuva ku Hot Wallet aja kuri Hardware Wallet?
answer: Kugira ngo ugabanye ingorane zo kwinjirirwa
wrong_answers:
  - Kugira ngo wongere amafaranga mu ngodo yawe
  - Kugabanya amafaranga ukatwa
  - Kugira ngo ukore neza ubuzima bw'ibanga bwa UTXO
explanation: |
  Kwimurira muri Hardware Wallet bicungera amahera mu kubika imfunguruzo z’ibanga zitari mu nzira.

question: Neden fonların düzenli olarak Hot Wallet'den Hardware Wallet'a aktarılması önerilir?
answer: Bilgisayar korsanlığı riskini azaltmak için
wrong_answers:
  - Wallet (Cüzdan) likiditesini artırmak için
  - İşlem ücretlerini azaltmak için
  - UTXO gizliliğini optimize etmek için
explanation: |
  Bir Hardware Wallet'e aktarım, özel anahtarları çevrimdışı depolayarak fonları güvence altına alır.

question: Bitcoin कोर डेवलपर्स का मुख्य रोल क्या है?
answer: वे Bitcoin प्रोटोकॉल और उसके मुख्य फीचर्स के मुख्य डेवलपमेंट के लिए जिम्मेदार हैं।
wrong_answers:
  - वे Bitcoin नेटवर्क को कंट्रोल करते हैं
  - वे नए बिटकॉइन बनाते हैं।
  - वे Bitcoin की कीमत को नियंत्रित करते हैं।
explanation: |
  अध्याय की सामग्री बताती है कि Bitcoin कोर डेवलपर्स की जिम्मेदारी है
  Bitcoin प्रोटोकॉल के मुख्य विकास और उसकी कोर फीचर्स के लिए। वे करते हैं
  Bitcoin नेटवर्क को कंट्रोल नहीं करता, नए बिटकॉइन नहीं बनाता, और न ही Bitcoin की कीमत को रेगुलेट करता है।
reviewed: false
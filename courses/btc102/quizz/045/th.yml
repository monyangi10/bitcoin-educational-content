question: ทำไมจึงแนะนำให้โอนเงินจาก wallet ร้อน ไปยัง wallet ฮาร์ดแวร์เป็นประจำ?
answer: เพื่อลดความเสี่ยงจากการถูกแฮ็ก
wrong_answers:
  - เพื่อเพิ่มสภาพคล่อง wallet
  - เพื่อลดค่าธรรมเนียมการทำธุรกรรม
  - เพื่อเพิ่มประสิทธิภาพความเป็นส่วนตัวของ UTXO
explanation: |
  การโอนย้ายไปยังฮาร์ดแวร์ wallet ช่วยรักษาความปลอดภัยของเงินโดยการเก็บคีย์ส่วนตัวแบบออฟไลน์
reviewed: false
question: Warum ist es ratsam, nur das zu investieren, was man sich leisten kann, zu verlieren?
answer: Zur Wahrung deiner finanziellen Sicherheit im Falle eines Verlustes
wrong_answers:
  - Rasche Gewinnmaximierung in einem Bärenmarkt
  - Massive Diversifizierung Ihrer Investitionen
  - Kredite aufnehmen, um mehr zu investieren
explanation: |
  Wenn du über deine Verhältnisse investierst (d.h. über deine Sparfähigkeit hinaus), setzt du dich hohen finanziellen Risiken aus.

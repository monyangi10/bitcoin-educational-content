question: ทำไมถึงแนะนำให้ลงทุนเฉพาะสิ่งที่คุณสามารถเสียได้?
answer: เพื่อรักษาความมั่นคงทางการเงินของคุณในกรณีที่สูญเสีย
wrong_answers:
  - เพื่อเพิ่มผลกำไรสูงสุดอย่างรวดเร็วในตลาดหมี
  - เพื่อกระจายการลงทุนของคุณอย่างมหาศาล
  - กู้ยืมเพื่อการลงทุนเพิ่มเติม
explanation: |
  การลงทุนเกินกำลังของคุณ (เช่น เกินกว่าความสามารถในการออมของคุณ) ทำให้คุณเสี่ยงต่อความเสี่ยงทางการเงินที่สูงเกินไป
reviewed: false
question: Tại sao người ta khuyên chỉ nên đầu tư số tiền mà bạn có thể mất?
answer: Để bảo vệ an ninh tài chính của bạn trong trường hợp mất mát
wrong_answers:
  - Để tối đa hóa lợi nhuận nhanh chóng trong thị trường giá xuống
  - Để đa dạng hóa các khoản đầu tư của bạn một cách mạnh mẽ
  - Vay để đầu tư nhiều hơn
explanation: |
  Đầu tư vượt quá khả năng của mình (tức là vượt quá khả năng tiết kiệm) sẽ khiến bạn phải chịu rủi ro tài chính cực kỳ cao.
reviewed: true
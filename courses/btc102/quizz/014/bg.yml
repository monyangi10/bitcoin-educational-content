question: Защо е препоръчително да инвестирате само това, което можете да си позволите да загубите?
answer: За да запазите финансовата си сигурност в случай на загуба
wrong_answers:
  - За бързо максимизиране на печалбите при мечи пазар
  - За да диверсифицирате значително инвестициите си
  - Вземане на заем, за да се инвестира повече
explanation: |
  Инвестирането над възможностите ви (т.е. над капацитета на спестяванията ви) ви излага на прекалено високи финансови рискове.

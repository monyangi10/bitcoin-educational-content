question: Waarom wordt geadviseerd om alleen te investeren wat je je kunt veroorloven om te verliezen?
answer: Om uw financiële zekerheid te behouden in geval van verlies
wrong_answers:
  - Snel winst maximaliseren in een dalende markt
  - Om je beleggingen massaal te diversifiëren
  - Lenen om meer te investeren
explanation: |
  Beleggen boven je vermogen (d.w.z. boven je spaarcapaciteit) stelt je bloot aan buitensporig hoge financiële risico's.

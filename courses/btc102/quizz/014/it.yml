question: Perché si consiglia di investire solo ciò che ci si può permettere di perdere?
answer: Per preservare la sicurezza finanziaria in caso di perdita
wrong_answers:
  - Per massimizzare rapidamente i profitti durante un bear market
  - Per diversificare in modo massiccio gli investimenti
  - Per prendere in prestito per investire di più
explanation: |
  Investire al di là delle proprie possibilità (cioè al di sopra della propria capacità di risparmio) espone a rischi finanziari eccessivamente elevati.
reviewed: true

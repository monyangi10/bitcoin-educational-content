question: Neden sadece kaybetmeyi göze alabileceğiniz kadar yatırım yapmanız tavsiye edilir?
answer: Kayıp durumunda finansal güvenliğinizi korumak için
wrong_answers:
  - Ayı piyasasında karı hızla maksimize etmek için
  - Yatırımlarınızı büyük ölçüde çeşitlendirmek için
  - Daha fazla yatırım yapmak için borç almanız için
explanation: |
  İmkanlarınızın ötesinde (yani tasarruf kapasitenizin ötesinde) yatırım yapmak sizi aşırı yüksek finansal risklere maruz bırakır.

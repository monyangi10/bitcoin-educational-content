question: अध्याय के अनुसार लिफाफा स्टोर करने के बाद आपको क्या करना चाहिए?
answer: यह सुनिश्चित कर लो कि तुम्हारे वारिसों को पता हो कि अगर ज़रूरत पड़े तो उन्हें यह लिफाफा लेना होगा।
wrong_answers:
  - यह सुनिश्चित करो कि तुम्हारे वारिसों को यह पता न चले कि अगर ज़रूरत पड़े तो उन्हें यह लिफाफा लेना होगा।
  - अपने वारिसों को यह बता दें कि अगर ज़रूरत हो तो उन्हें इस लिफाफे को लेने की ज़रूरत नहीं है।
  - सुनिश्चित करें कि आपके वारिसों को यह न पता चले कि उन्हें इस लिफाफे को लाने की जरूरत नहीं है
explanation: |
  एनवेलप को स्टोर करने के बाद, आपको यह सुनिश्चित करना चाहिए कि आपके वारिसों को इसके बारे में पता हो
  उन्हें अगर जरूरत पड़े तो यह लिफाफा वापस लेना होगा, जैसा कि अध्याय में सुझाया गया है।
reviewed: false
question: Šta treba da uradite nakon što pohranite kovertu prema poglavlju?
answer: Pobrinite se da vaši naslednici znaju da treba da preuzmu ovu kovertu ako bude potrebno.
wrong_answers:
  - Pobrinite se da vaši naslednici ne znaju da treba da preuzmu ovu kovertu ako bude potrebno.
  - Uverite se da vaši naslednici znaju da ne moraju preuzeti ovu kovertu ako je to neophodno.
  - Pobrinite se da vaši naslednici ne znaju da ne treba da preuzmu ovu kovertu
explanation: |
  Nakon što odložite kovertu, trebalo bi da se pobrinete da vaši naslednici znaju da
  treba da preuzmu ovu kovertu ako je potrebno, kao što je predloženo u poglavlju.
reviewed: false
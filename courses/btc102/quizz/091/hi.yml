question: एक Bitcoin यूज़र जो व्यावहारिक और प्रतिबद्ध होता है, उसकी एक खासियत क्या है?
answer: वे पारिस्थितिकी तंत्र में सक्रिय रूप से शामिल हैं और बार-बार इसका इस्तेमाल करके इसे सक्रिय रूप से सपोर्ट भी करते हैं।
wrong_answers:
  - वे कभी-कभार ही Bitcoin का इस्तेमाल करते हैं।
  - वे सिर्फ़ Bitcoin को लंबे समय के निवेश के लिए इस्तेमाल करते हैं।
  - वे सिर्फ एक Exchange प्लेटफॉर्म पर Bitcoin का इस्तेमाल करते हैं।
explanation: |
  व्यावहारिक और समर्पित Bitcoin उपयोगकर्ता Bitcoin में सक्रिय रूप से शामिल हैं
  इकोसिस्टम और इसे नियमित उपयोग से सपोर्ट करें।
reviewed: false
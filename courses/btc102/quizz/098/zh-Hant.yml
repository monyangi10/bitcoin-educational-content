question: 偏執的 Bitcoiner 可能會使用哪些錢包呢？
answer: Samourai Wallet 代表 Hot Wallet，Coldcard 和/或 seed 簽名代表 Cold Wallet
wrong_answers:
  - Coinbase Wallet for Hot Wallet、Ledger for Cold Wallet
  - Binance Wallet 為 Hot Wallet，Trezor 為 Cold Wallet
  - Hot Wallet 的 PayPal、Cold Wallet 的銀行帳戶
explanation: |
  本章提到 Samourai Wallet for Hot Wallet 和 Coldcard 和/或
  seed Signer for Cold Wallet 作為偏執的 Bitcoiner 可能會使用的錢包。
reviewed: false
question: एक पैरानॉयड बिटकॉइनर कौन-कौन से वॉलेट्स इस्तेमाल कर सकता है?
answer: समुराई Wallet से Hot के लिए, Wallet, कोल्डकार्ड और/या seed साइनर Cold से Wallet के लिए
wrong_answers:
  - कॉइनबेस जीडब्ल्यू-5 को जीडब्ल्यू-7 के लिए  
जीडब्ल्यू-5, जीडब्ल्यू-4 को जीडब्ल्यू-6 के लिए  
जीडब्ल्यू-5
  - बिनेंस Wallet से Hot के लिए Wallet, ट्रेज़र से Cold के लिए Wallet
  - Hot और Wallet के लिए PayPal, Cold और Wallet के लिए बैंक खाता
explanation: |
  अध्याय में Hot के लिए Wallet, सामुराई Wallet और कोल्डकार्ड का जिक्र है और/या
  जीडब्ल्यू-18 साइनर, जीडब्ल्यू-17 और जीडब्ल्यू-16 को उन वॉलेट्स के रूप में जिन्हें एक पैरानॉयड बिटकॉइनर इस्तेमाल कर सकता है।
reviewed: false
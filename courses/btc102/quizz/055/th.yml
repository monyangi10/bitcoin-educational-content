question: สื่อใดที่แนะนำสำหรับการสำรองวลีช่วยจำของคุณอย่างปลอดภัย?
answer: สำรองข้อมูลโลหะด้วยซองทึบแสงที่ปิดสนิท
wrong_answers:
  - ที่เก็บข้อมูลไดรฟ์ USB เข้ารหัส
  - สำเนากระดาษพร้อมปลอกใส
  - สำรองข้อมูลบนคลาวด์ที่ปลอดภัย
explanation: |
  การสำรองข้อมูลโลหะที่ทนทานต่อภัยพิบัติมอบการป้องกันที่ยาวนานต่อความเสียหายและการเข้าถึงโดยไม่ได้รับอนุญาต ซองทึบแสงที่ปิดสนิทช่วยให้คุณตรวจสอบได้ว่ามีใครเข้าถึงวลีช่วยจำหรือไม่
reviewed: false
question: Какъв носител се препоръчва за сигурно архивиране на вашата мнемонична фраза?
answer: Метален архив със запечатан непрозрачен плик
wrong_answers:
  - Криптирано съхранение на USB устройство
  - Хартиен архив с прозрачен ръкав
  - Архивиране в защитен облак
explanation: |
  Устойчивият на бедствия метален резервен вариант осигурява дълготрайна защита срещу повреди и неоторизиран достъп. Запечатаният непрозрачен плик ви позволява да проверите дали някой е имал достъп до мнемоничната фраза.
reviewed: false
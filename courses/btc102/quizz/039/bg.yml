question: Кой потребителски профил редовно натрупва биткойни чрез осредняване на цената на долара?
answer: Stacker
wrong_answers:
  - HODL-ър
  - Активният потребител
  - Параноикът
explanation: |
  Stacker-ът редовно купува малки количества, за да осредни покупната цена в дългосрочен план.
reviewed: false

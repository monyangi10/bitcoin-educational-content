question: Hangi kullanıcı profili Dolar-Maliyet Ortalaması yoluyla düzenli olarak bitcoin biriktiriyor?
answer: İstifleyici
wrong_answers:
  - Hodler
  - Aktif kullanıcı
  - Paranoyak
explanation: |
  İstifleyici, satın alma fiyatının uzun vadede ortalamasını almak için düzenli olarak küçük miktarlarda satın alır.
reviewed: false
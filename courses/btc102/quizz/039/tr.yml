question: Hangi kullanıcı profili Dolar-Maliyet Ortalaması yoluyla düzenli olarak bitcoin biriktiriyor?
answer: İstifçi
wrong_answers:
  - Hodler
  - Aktif kullanıcı
  - Paranoyak
explanation: |
  İstifçi, satın alma fiyatının uzun vadede ortalamasını almak için düzenli olarak küçük miktarlarda satın alır.

question: अध्याय के अनुसार तानाशाही शासन स्थापित होने का मुख्य कारण क्या है?
answer: दुनिया में बढ़ती हुई दौलत की असमानताएँ
wrong_answers:
  - दुनिया में शिक्षा की कमी
  - दुनिया में संसाधनों की कमी
  - दुनिया में लोकतंत्र की कमी
explanation: |
  अध्याय में यह बात उठाई गई है कि दुनिया में बढ़ती हुई संपत्ति की असमानताएं
  ने चरमपंथ को बढ़ावा दिया है, जिसके कारण कभी-कभी संगठनों की स्थापना हुई है
  तानाशाही शासनों के।
reviewed: false
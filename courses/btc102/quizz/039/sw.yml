question: Ni wasifu gani wa mtumiaji hukusanya bitcoin mara kwa mara kupitia Wastani wa Gharama ya Dollar?
answer: Stacker
wrong_answers:
  - Mshikaji
  - Mtumiaji anayetumika
  - Mbishi
explanation: |
  Mpangaji mara kwa mara hununua kiasi kidogo ili wastani wa bei ya ununuzi kwa muda mrefu.
reviewed: true

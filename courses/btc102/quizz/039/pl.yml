question: Jaki jest główny powód ustanowienia reżimów dyktatorskich według rozdziału?
answer: Pogarszające się nierówności majątkowe na świecie
wrong_answers:
  - Brak edukacji na świecie
  - Brak zasobów na świecie
  - Brak demokracji na świecie
explanation: |
  W rozdziale wspomniano, że pogłębiające się nierówności majątkowe na świecie
  doprowadziły do wzrostu ekstremizmu, który czasami skutkował ustanowieniem reżimów dyktatorskich
  dyktatorskich reżimów.
reviewed: false
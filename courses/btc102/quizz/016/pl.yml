question: Jaki jest jeden ze sposobów na utrzymanie komputera w optymalnym stanie?
answer: Regularne tworzenie kopii zapasowych danych
wrong_answers:
  - Udostępnianie haseł
  - Używanie tego samego hasła dla wszystkich kont
  - Zaniedbanie aktualizacji komputera
explanation: |
  Regularne tworzenie kopii zapasowych danych jest jednym ze sposobów na utrzymanie komputera w dobrym stanie
  
  w optymalnych warunkach pracy. Jest to również podstawowy środek poprawy bezpieczeństwa online
  
  nawyków w zakresie bezpieczeństwa online
reviewed: false
question: कंप्यूटर को बेहतर हालत में रखने का एक तरीका क्या है?
answer: अपना डेटा नियमित रूप से बैकअप करते रहें
wrong_answers:
  - अपने पासवर्ड शेयर मत करो
  - सभी अकाउंट्स के लिए एक ही पासवर्ड इस्तेमाल करो
  - अपने कंप्यूटर को अपडेट करना भूल जाओ
explanation: |
  अपने कंप्यूटर को सुरक्षित रखने के उपायों में से एक है नियमित रूप से अपना डेटा बैकअप करना।
  ऑप्टिमल वर्किंग कंडीशन में। यह ऑनलाइन सुरक्षा बढ़ाने का एक बेसिक उपाय भी है।
  आदतें।'

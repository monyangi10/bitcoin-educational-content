question: Hot, LN, और Wallet का क्या रोल है एक होल्डर के लिए जो आगे बढ़ना चाहता है?
answer: कुछ Bitcoin खर्च करने के लिए।
wrong_answers:
  - Bitcoin खरीदने के लिए।
  - उनके सारे Bitcoin को स्टोर करने के लिए।
  - Bitcoin का ट्रेडिंग करने के लिए।
explanation: |
  एक होल्डर जो आगे बढ़ना चाहता है, वह खर्च करने के लिए Hot, LN या Wallet का इस्तेमाल कर सकता है।
  कुछ Bitcoin, लंबे समय तक रखने के अलावा।
reviewed: false
question: Koja je uloga Hot LN Wallet za Hodlera koji želi da ide dalje?
answer: Za trošenje nekih Bitcoin.
wrong_answers:
  - Za kupovinu više Bitcoin.
  - Za skladištenje svih njihovih Bitcoin.
  - Za trgovanje Bitcoin.
explanation: |
  Hodler koji želi da ide dalje može koristiti Hot LN Wallet za trošenje
  neke Bitcoin, pored držanja na duži rok.
reviewed: false
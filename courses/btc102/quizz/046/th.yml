question: เครื่องมือใดที่ช่วยให้คุณตรวจสอบ wallet ของคุณโดยไม่ต้องเปิดเผยคีย์ส่วนตัวของคุณ?
answer: ดูเท่านั้น Wallet
wrong_answers:
  - Hot Wallet
  - สายฟ้า Wallet
  - ผู้ดูแล Wallet
explanation: |
  wallet แบบดูได้อย่างเดียวใช้เฉพาะคีย์สาธารณะเพื่อแสดงยอดคงเหลือและธุรกรรม โดยไม่เสี่ยงต่อการเปิดเผยคีย์ส่วนตัว
reviewed: false
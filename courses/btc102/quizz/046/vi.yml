question: Công cụ nào cho phép bạn theo dõi ví của mình mà không tiết lộ khóa riêng?
answer: Ví hỗ trợ chức năng Watch-only
wrong_answers:
  - Ví nóng
  - Ví hỗ trợ Lightning Network
  - Ví lưu ký bởi bên thứ ba
explanation: |
  Ví hỗ trợ chức năng Watch-only chỉ sử dụng khóa công khai để hiển thị số dư và giao dịch mà không có nguy cơ tiết lộ khóa riêng.
reviewed: false
question: Ni igikoresho ikihe kigufasha gukurikirana Wallet yawe utagaragaje imfunguruzo zawe z’ibanga?
answer: Ingodo uraba gusa atakindi ukora.
wrong_answers:
  - Hot Wallet
  - Lightning Wallet
  - Custodial Wallet
explanation: |
  Ingodo uraba gusa atakindi ukora ikoresha gusa imfunguruzo za bose kugira ngo yerekane amafaranga n’ibikorwa, ata ngorane yo gushirwa ahabona kw’imfunguruzo z’ibanga.
reviewed: false

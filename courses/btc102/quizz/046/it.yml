question: Quale strumento permette di monitorare il Wallet senza esporre le chiavi private?
answer: Watch-only wallet
wrong_answers:
  - Hot Wallet
  - Wallet Lightning
  - Wallet Custodial
explanation: |
  Un Watch-only wallet utilizza solo le chiavi pubbliche per visualizzare saldi e transazioni, senza rischiare di esporre online le chiavi private.
reviewed: true

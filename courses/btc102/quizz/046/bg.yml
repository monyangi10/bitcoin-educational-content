question: Кой инструмент ви позволява да наблюдавате своя портфейл, без да разкривате частните си ключове?
answer: портфейл само за наблюдение (watch-only)
wrong_answers:
  - горещ портфейл
  - Lightning портфейл
  - Попечителски портфейл
explanation: |
  watch-only портфейлът използва само публични ключове за показване на салдата и транзакциите, без да рискува разкриването на частни ключове.
reviewed: false

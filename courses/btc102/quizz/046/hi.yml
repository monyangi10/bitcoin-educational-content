question: Exchange प्लेटफॉर्म पर अपने बिटकॉइन छोड़ने का मुख्य खतरा क्या है?
answer: प्लेटफॉर्म हैक हो सकता है, जब्त किया जा सकता है, दिवालिया हो सकता है, या बस आपके पैसे लेकर गायब हो सकता है।
wrong_answers:
  - Bitcoin की कीमत अचानक गिर सकती है
  - प्लेटफॉर्म अपनी फीस बढ़ा सकता है
  - प्लेटफॉर्म आपके द्वारा खरीदे या बेचे जा सकने वाले बिटकॉइन की संख्या को सीमित कर सकता है।
explanation: |
  अध्याय की सामग्री चेतावनी देती है कि Exchange प्लेटफॉर्म्स में काफी खतरनाक
  जोखिम भरे होते हैं और जितना हो सके इनसे बचना चाहिए। ये हैक हो सकते हैं, जब्त किए जा सकते हैं, या...
  दिवालिया हो जाएँ, या बस आपका पैसा लेकर गायब हो जाएँ।
reviewed: false
question: Mit welchem Tool kannst du dein Wallet überwachen, ohne deine privaten Schlüssel preiszugeben?
answer: Watch-only wallet
wrong_answers:
  - Hot Wallet
  - Blitz Wallet
  - Wallet für den Wachdienst
explanation: |
  Ein Watch-only Wallet verwendet nur öffentliche Schlüssel zur Anzeige von Salden und Transaktionen. Damit verschwindet das Risiko, dass private Schlüssel offengelegt werden.
reviewed: false

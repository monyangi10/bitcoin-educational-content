question: एक paranoid Bitcoiner अपना खुद का LN (गैर-वॉलेट) नोड क्यों इस्तेमाल करेगा? सबसे बड़ी वजह है **"ट्रस्टलेस वेरिफिकेशन"**।  

- **बिना किसी पर भरोसा किए**: बाहरी नोड्स पर भरोसा नहीं करना पड़ता। खुद का नोड होने से सारे ब्लॉक और ट्रांजैक्शन्स खुद वेरिफाई कर सकते हैं।  
- **प्राइवेसी**: कोई तीसरा पार्टी आपके ट्रांजैक्शन हिस्ट्री को ट्रैक नहीं कर सकता।  
- **सेंसरशिप से बचाव**: कोई आपके ट्रांजैक्शन्स को रोक या फ़िल्टर नहीं कर सकता।  
- **नेटवर्क की सुरक्षा में योगदान**: जितने ज़्यादा डिसेंट्रलाइज्ड नोड्स, उतना मज़बूत नेटवर्क।  

सीधे शब्दों में—**"अपना नोड, अपना नियंत्रण।"** 🚀
answer: गोपनीयता और सुरक्षा बनाए रखने के लिए
wrong_answers:
  - KYC प्रक्रिया से बचने के लिए
  - अपने UTXOs को मैनेज करने के लिए
  - उनके सिक्कों को मिलाना
explanation: |
  अध्याय में यह बताया गया है कि एक शक्की बिटकॉइनर अपना खुद का LN इस्तेमाल करेगा।
  नोड उनकी सुरक्षा पर ध्यान केंद्रित करने का हिस्सा है। KYC प्रक्रियाओं से बचते हुए, प्रबंधित करना
  यूटीएक्सओ (UTXOs), और सिक्कों को मिक्स करना भी ऐसी गतिविधियाँ हैं जो एक पैरानॉयड बिटकॉइनर कर सकता है,
  ये सीधे तौर पर LN नोड के इस्तेमाल से जुड़े नहीं हैं।

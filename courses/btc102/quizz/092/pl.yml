question: Jaki jest główny powód, dla którego paranoiczny Bitcoiner używałby własnego węzła LN?
answer: Aby zachować prywatność i bezpieczeństwo
wrong_answers:
  - Aby uniknąć procesów KYC
  - Aby zarządzać swoimi UTXO
  - Aby wymieszać swoje monety
explanation: |
  W rozdziale wspomniano, że paranoiczny Bitcoiner używałby własnego węzła LN
  w ramach dbania o bezpieczeństwo. Podczas gdy unikanie procesów KYC, zarządzanie
  UTXO i mieszanie monet są również działaniami, w które może zaangażować się paranoiczny Bitcoiner,
  nie są one bezpośrednio związane z korzystaniem z węzła LN.
reviewed: false
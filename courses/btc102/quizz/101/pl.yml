question: Jakie są warunki utworzenia planu spadkowego zgodnie z rozdziałem?
answer: Chwila spokoju, bez rozpraszania uwagi; 4-5 arkuszy białego papieru; długopis; dwie koperty; telefon/książka Address; komputer (opcjonalnie)
wrong_answers:
  - Hałaśliwe otoczenie; 10-15 arkuszy białego papieru; ołówek; pięć kopert; telefon/książka Address; komputer (obowiązkowo)
  - Chwila spokoju, bez rozpraszania uwagi; 1-2 arkusze białego papieru; marker; jedna koperta; telefon/książka Address; komputer (opcjonalnie)
  - Chwila spokoju, bez rozpraszania uwagi; 4-5 arkuszy białego papieru; długopis; dwie koperty; telefon/książka Address; komputer (opcjonalnie)
explanation: |
  Rozdział sugeruje, że potrzebna jest chwila spokoju, bez
  4-5 kartek białego papieru, długopisu, dwóch kopert, telefonu/książki Address i komputera (który jest opcjonalny)
  (który jest opcjonalny), aby stworzyć plan spadkowy.

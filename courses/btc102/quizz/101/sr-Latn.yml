question: Koji su preduslovi za kreiranje plana nasledstva prema poglavlju?
answer: Trenutak mira, bez ometanja; 4-5 listova belog papira; Olovka; Dve koverte; Telefon/Address knjiga; Računar (opciono)
wrong_answers:
  - Buka okolina; 10-15 listova belog papira; Olovka; Pet koverata; Telefon/Address knjiga; Računar (obavezno)
  - Trenutak mira, bez ometanja; 1-2 lista belog papira; Marker; Jedna koverta; Telefon/Address knjiga; Računar (opciono)
  - Trenutak mira, sa ometanjima; 4-5 listova belog papira; Olovka; Dve koverte; Telefon/Address knjiga; Računar (opciono)
explanation: |
  Poglavlje sugeriše da vam je potreban trenutak mira, bez
  ometanja; 4-5 listova belog papira; olovka; dve koverte; telefon/Address knjiga; i računar
  (što je opcionalno) da biste kreirali plan nasledstva.
reviewed: false
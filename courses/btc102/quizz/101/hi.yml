question: अध्याय के अनुसार वंशागति योजना बनाने के लिए क्या-क्या पूर्वापेक्षाएँ हैं?
answer: एक पल की शांति, बिना किसी ध्यान भटकाने वाली चीज़ के; 4-5 सफेद कागज़ के पन्ने; एक कलम; दो लिफाफे; एक फोन/डायरी किताब; एक कंप्यूटर (वैकल्पिक)
wrong_answers:
  - एक शोरगुल वाला माहौल; 10-15 सफेद कागज़ की शीट्स; एक पेंसिल; पाँच लिफाफे; एक फोन/जीडब्ल्यू-1 किताब; एक कंप्यूटर (अनिवार्य)
  - एक पल की शांति, बिना किसी ध्यान भटकाने वाली चीज़ के; 1-2 सफेद कागज़ की शीट; एक मार्कर; एक लिफाफा; एक फोन/जीडब्ल्यू-2 किताब; एक कंप्यूटर (वैकल्पिक)
  - एक पल की शांति, थोड़ी ध्यान भटकाने वाली चीज़ों के साथ; 4-5 सफेद कागज़ की शीट्स; एक कलम; दो लिफाफे; एक फोन/जीडब्ल्यू-3 किताब; एक कंप्यूटर (वैकल्पिक)
explanation: |
  अध्याय सुझाव देता है कि आपको शांति का एक पल चाहिए, बिना
  विचलित करने वाली चीज़ें; 4-5 सफ़ेद कागज़ की शीट; एक कलम; दो लिफ़ाफ़े; एक फ़ोन/जीडब्ल्यू-4 बुक; और एक कंप्यूटर
  (जो वैकल्पिक है) एक वंशागति योजना बनाने के लिए।
reviewed: false
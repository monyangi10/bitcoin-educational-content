question: 根據本章的規定，制定繼承計劃的先決條件是什麼？
answer: 一個寧靜的時刻，心無旁騖；4-5 張白紙；一支筆；兩個信封；一個電話/Address 筆記本；一台電腦（選購）。
wrong_answers:
  - 一個嘈雜的環境；10-15 張白紙；一枝鉛筆；五個信封；一個電話/Address 本；一台電腦（必須）。
  - 一個安靜的時刻，心無旁騖；1-2 張白紙；一枝記號筆；一個信封；一個電話/Address 筆記本；一台電腦 (選購)
  - 一個寧靜的時刻，心無旁騖；4-5 張白紙；一支筆；兩個信封；一個電話/Address 筆記本；一台電腦（選擇性填寫）。
explanation: |
  本章建議您需要一個寧靜的時刻，沒有任何雜念
  4-5 張白紙、一支筆、兩個信封、一個電話/Address 手冊，以及一台電腦（可選擇使用
  (可選）來制定遺產繼承計劃。
reviewed: false
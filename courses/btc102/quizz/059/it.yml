question: Qual è l'obiettivo principale per un bitcoiner paranoico?
answer: Proteggere la privacy
wrong_answers:
  - Accumulare rapidamente satoshi
  - Massimizzare i profitti del trading
  - Detenere i loro bitcoin a lungo termine
explanation: |
  Un bitcoiner paranoico cerca soprattutto di evitare qualsiasi tracciabilità delle proprie transazioni e della propria identità.
reviewed: true

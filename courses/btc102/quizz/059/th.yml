question: เป้าหมายหลักของผู้ใช้บิตคอยน์ที่มีความระแวดระวังคืออะไร?
answer: เพื่อปกป้องความเป็นส่วนตัวของพวกเขา
wrong_answers:
  - เพื่อสะสมซาโตชิอย่างรวดเร็ว
  - เพื่อเพิ่มผลกำไรจากการซื้อขายให้สูงสุด
  - ถือบิตคอยน์ของพวกเขาในระยะยาว
explanation: |
  นักบิตคอยน์ที่หวาดระแวงมุ่งเน้นที่จะหลีกเลี่ยงการติดตามใดๆ ของธุรกรรมและตัวตนของพวกเขาเป็นหลัก
reviewed: false
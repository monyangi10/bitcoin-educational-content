question: Je, lengo kuu la bitcoiner ya paranoid ni nini?
answer: Ili kulinda usiri wao
wrong_answers:
  - Ili kukusanya satoshis haraka
  - Ili kuongeza faida ya biashara
  - Ili kushikilia bitcoin zao kwa muda mrefu
explanation: |
  Bitcoiner ya mkanganyiko kimsingi inatafuta kuzuia ufuatiliaji wowote wa miamala na utambulisho wao.
reviewed: true

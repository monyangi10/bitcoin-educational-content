question: Каква е основната цел на параноичния биткойнър?
answer: За защита на личния им живот
wrong_answers:
  - Бързо натрупване на сатоши
  - За да увеличите печалбите от търговия
  - Да държат своите биткойни в дългосрочен план
explanation: |
  Параноичните потребители на биткойн се стремят най-вече да избегнат всякакво проследяване на своите транзакции и самоличност.

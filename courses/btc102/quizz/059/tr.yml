question: Paranoyak bitcoin kullanıcısının ana hedefi nedir?
answer: Mahremiyetlerini korumak için
wrong_answers:
  - Satoshileri hızlıca biriktirmek için
  - Ticaret karını maksimize etmek için
  - Bitcoinlerini uzun vadeli tutmak için
explanation: |
  Paranoyak bitcoin kullanıcısı öncelikle işlemlerinin ve kimliklerinin izlenmesini engellemeye çalışır.

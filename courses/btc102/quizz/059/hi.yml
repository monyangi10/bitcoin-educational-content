question: Cold और Wallet का मतलब Bitcoin के संदर्भ में क्या है?
answer: Bitcoin को ऑफलाइन स्टोर करने के लिए एक Wallet
wrong_answers:
  - एक Wallet जिसका इस्तेमाल Cold जलवायु में लेन-देन के लिए किया जाता है
  - एक जीडब्ल्यू-8 जिसका इस्तेमाल थोड़ी मात्रा में जीडब्ल्यू-7 स्टोर करने के लिए किया जाता है
  - एक Wallet जिसका उपयोग Bitcoin को थोड़े समय के लिए स्टोर करने के लिए किया जाता है
explanation: |
  एक Cold Wallet बड़ी मात्रा में Bitcoin को ऑफलाइन स्टोर करने के लिए एक Wallet है।
  यह Hot Wallet से ज्यादा सुरक्षित माना जाता है क्योंकि इसमें हैकिंग का खतरा कम होता है।

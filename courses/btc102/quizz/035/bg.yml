question: Какво решение за съхранение се препоръчва за Hodler?
answer: Хардуерeн портфейл
wrong_answers:
  - Горещ портфейл
  - Услуга за попечителство
  - Документ
explanation: |
  HODL-ър, който държи биткойни в дългосрочен план, трябва да използва хардуерен портфейл, за да постигне максимална сигурност.

question: Ni uwuhe muti wo kubika usabwa ku muntu afise ububiko bw’ibintu?
answer: A Hardware Wallet.
wrong_answers:
  - A Hot Wallet.
  - Ibikorwa vyo kubungabunga
  - Urupapuro Wallet.
explanation: |
  Hodler, afise bitcoins igihe kirekire, akwiye gukoresha Hardware Wallet kugira ngo agire umutekano mwinshi.

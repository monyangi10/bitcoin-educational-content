question: Ni uwuhe muti wo kubika usabwa ku muntu abika mu buryo bw'igihe kirekire?
answer: ububiko bw'inyuma y'imbuga.
wrong_answers:
  - A Hot Wallet.
  - Ibikorwa vyo kubungabunga
  - Urupapuro rw'ingodo.
explanation: |
  Uwubika vy'igihe kirekire, afise bitcoins igihe kirekire, akwiye gukoresha ububiko inyuma y'imbuga kugira ngo agire umutekano mwinshi.

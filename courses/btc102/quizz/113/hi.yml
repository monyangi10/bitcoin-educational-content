question: Bitcoin में टू-फैक्टर ऑथेंटिकेशन (2FA) का मकसद क्या है?
answer: Bitcoin लेन-देन की सुरक्षा बढ़ाने के लिए।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  दो-चरणीय प्रमाणीकरण (2FA) उपयोगकर्ता के दावे की पुष्टि करने का एक तरीका है
  पहचान के लिए उनके द्वारा ज्ञात चीज़ (पासवर्ड) और उसके अलावा एक दूसरा कारक का उपयोग करना
  कुछ जो उनके पास है या कुछ जो वे हैं। यह सुरक्षा बढ़ाने के लिए इस्तेमाल किया जाता है।
  जीडब्ल्यू-2 लेनदेन।

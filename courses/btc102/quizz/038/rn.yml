question: Ni uwuhe umuntu ashigikira ukugura ata KYC no gukoresha ingodo afise umutekano mwinshi?
answer: Uwukoresha w'umunyabwoba
wrong_answers:
  - Uwubika vy'igihe kirekire
  - Uwurundanya
  - Uwukoresha aguma akara
explanation: |
  Uwukoresha w'umunyabwoba ashira imbere ubuzima bw'ibanga n’umutekano wiwe, akoresheje uburyo bwo kuronka no kubika butekanye cane.
reviewed: false

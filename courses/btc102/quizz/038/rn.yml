question: Ni uwuhe murongo ushigikira ugutunga ata KYC no gukoresha ama wallets afise umutekano mwinshi?
answer: Uwugira ubwoba
wrong_answers:
  - Uwo hodler
  - Uwurundanya
  - Uwukoresha akora
explanation: |
  Umunyamibabaro ashira imbere ubuzima bwite n’umutekano, akoresheje uburyo bwo kuronka no kubika butekanye cane.
reviewed: false
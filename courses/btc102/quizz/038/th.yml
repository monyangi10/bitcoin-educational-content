question: โปรไฟล์ใดที่ชื่นชอบการได้มาซึ่งไม่มี KYC และการใช้กระเป๋าเงินที่มีความปลอดภัยสูง?
answer: คนหวาดระแวง
wrong_answers:
  - The hodler
  - The stacker
  - ผู้ใช้ที่ใช้งานอยู่
explanation: |
  ผู้ที่หวาดระแวงให้ความสำคัญกับความเป็นส่วนตัวและความปลอดภัย โดยใช้วิธีการจัดหาและจัดเก็บที่มีความปลอดภัยสูง
reviewed: false
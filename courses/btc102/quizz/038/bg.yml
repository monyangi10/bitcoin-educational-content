question: Кой профил предпочита придобиването на информация без KYC и използването на високо защитени портфейли?
answer: Параноикът
wrong_answers:
  - HODL-ър
  - Активният потребител
  - Не знам
explanation: |
  Параноикът отдава приоритет на неприкосновеността на личния живот и сигурността, като използва изключително сигурни методи за придобиване и съхранение.
reviewed: false

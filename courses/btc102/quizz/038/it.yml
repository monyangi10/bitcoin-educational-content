question: Quale profilo favorisce l'acquisto senza KYC e l'uso di wallet altamente sicuri?
answer: Il paranoico
wrong_answers:
  - L'hodler
  - Lo stacker
  - L'utente attivo
explanation: |
  Il paranoico dà priorità alla privacy e alla sicurezza, utilizzando metodi di acquisto e conservazione altamente sicuri.
reviewed: true

question: Hangi profil KYC dışı edinimi ve yüksek güvenlikli cüzdanların kullanımını tercih ediyor?
answer: Paranoyak
wrong_answers:
  - Hodler
  - İstifçi
  - Aktif kullanıcı
explanation: |
  Paranoyak, gizlilik ve güvenliğe öncelik verir, son derece güvenli edinim ve depolama yöntemleri kullanır.
reviewed: false

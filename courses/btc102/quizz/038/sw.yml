question: Je, ni wasifu upi unapendelea upataji wa zisizo za KYC na matumizi ya wallets salama sana?
answer: Mbishi
wrong_answers:
  - Mshikaji
  - Stacker
  - Mtumiaji anayetumika
explanation: |
  Mkanganyiko huo unatanguliza ufaragha na usalama, kwa kutumia njia zilizo salama sana za kupata na kuhifadhi.
reviewed: true

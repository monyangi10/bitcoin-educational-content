question: Welk profiel is voorstander van niet-KYC-verwerving en het gebruik van sterk beveiligde portemonnees?
answer: De paranoïde
wrong_answers:
  - De hodler
  - De stapelaar
  - De actieve gebruiker
explanation: |
  De paranoïde geeft prioriteit aan privacy en veiligheid en gebruikt zeer veilige verwervings- en opslagmethoden.
reviewed: false
question: Bitcoin हर व्यक्ति को क्या प्रदान करता है?
answer: पारंपरिक वित्तीय प्रणाली से बाहर निकलने का एक मौका
wrong_answers:
  - तेजी से अमीर बनने का मौका
  - शेयरों में निवेश करने का मौका
  - बैंक खाता खोलने का मौका
explanation: |
  अध्याय में कहा गया है कि Bitcoin हर व्यक्ति को बाहर निकलने का एक मौका देता है
  पारंपरिक वित्तीय प्रणाली। यह एक नैतिक विकल्प है जो शायद हर कोई
  एक दिन बनाना पड़ेगा।
reviewed: false
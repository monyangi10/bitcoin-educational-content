question: 具有技術能力的 Bitcoin 使用者有什麼特徵？
answer: 他們對技術有很好的了解，包括 Hot 和 Cold Bitcoin 錢包以及 Lightning Network。
wrong_answers:
  - 他們只使用 Bitcoin 作為長期投資。
  - 他們只使用 Bitcoin 進行日常交易。
  - 他們只在 Exchange 平台上使用 Bitcoin。
explanation: |
  具有技術能力的 Bitcoin 使用者瞭解 Bitcoin 交易中涉及的技術，包括不同類型的錢包和 Lightning
  Bitcoin 交易中涉及的技術，包括不同類型的錢包和 Lightning

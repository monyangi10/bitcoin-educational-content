question: एक Bitcoin यूज़र जो टेक्नोलॉजी में माहिर होता है, उसकी एक खास बात क्या है?
answer: उन्हें टेक्नोलॉजी की अच्छी समझ है, जिसमें Hot और Cold, Bitcoin वॉलेट्स और Lightning Network भी शामिल हैं।
wrong_answers:
  - वे लंबे समय के निवेश के लिए सिर्फ Bitcoin का ही इस्तेमाल करते हैं।
  - वे रोज़मर्रा के लेन-देन के लिए सिर्फ Bitcoin का इस्तेमाल करते हैं।
  - वे सिर्फ Exchange प्लेटफॉर्म पर Bitcoin का इस्तेमाल करते हैं।
explanation: |
  टेक्नोलॉजी में माहिर Bitcoin यूज़र्स इसमें शामिल टेक्नोलॉजी को समझते हैं
  जीडब्ल्यू-10 लेनदेन में, विभिन्न प्रकार के वॉलेट और लाइटनिंग शामिल हैं
  नेटवर्क
reviewed: false
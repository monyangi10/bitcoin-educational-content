question: Jaki jest cel planu spadkowego w Bitcoin?
answer: Aby zapewnić swoim bliskim dostęp do Bitcoinów po Twojej śmierci.
wrong_answers:
  - Aby wydobywać nowe Bitcoiny.
  - Aby handlować Bitcoinami.
  - Aby zamienić Bitcoiny na inne kryptowaluty.
explanation: |
  Plan spadkowy w Bitcoin to plan, który zapewnia, że twoi bliscy
  mogą uzyskać dostęp do Bitcoinów po Twojej śmierci. Nie jest on wykorzystywany do Mining nowych Bitcoinów,
  handlu Bitcoinami lub konwersji Bitcoinów na inne kryptowaluty.
reviewed: false
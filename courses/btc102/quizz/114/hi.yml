question: Bitcoin में इनहेरिटेंस प्लान (विरासत योजना) का मकसद क्या है?
answer: यह सुनिश्चित करने के लिए कि आपके प्रियजन आपकी मृत्यु के बाद आपके बिटकॉइन तक पहुँच सकें।
wrong_answers:
  - नए बिटकॉइन माइन करने के लिए।
  - बिटकॉइन की ट्रेडिंग करना।
  - बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  Bitcoin में एक इनहेरिटेंस प्लान वो प्लान है जो आपके प्रियजनों को सुरक्षित करता है
  आपकी मृत्यु के बाद आपके बिटकॉइन्स को कोई भी एक्सेस कर सकता है। यह Mining नए बिटकॉइन्स के लिए इस्तेमाल नहीं होता है।
  बिटकॉइन की ट्रेडिंग करना, या बिटकॉइन को दूसरी क्रिप्टोकरेंसी में बदलना।
reviewed: false
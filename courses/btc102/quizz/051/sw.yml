question: Ni njia gani hukuruhusu kumaliza bitcoin zilizotumiwa wakati wa kuhifadhi akiba yako?
answer: Tumia na Ubadilishe
wrong_answers:
  - HODLing na Badilisha
  - Kutumia na HODLing
  - Biashara na Matumizi
explanation: |
  Mbinu ya kutumia na Badilisha inahusisha kutumia bitcoin na kisha kununua tena kiasi sawa ili kudumisha umiliki wako.
reviewed: true

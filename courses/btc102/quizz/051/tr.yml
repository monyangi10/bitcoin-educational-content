question: Hangi yöntem tasarruflarınızı korurken harcanan bitcoinleri dengelemenizi sağlar?
answer: Harcayın ve Değiştirin
wrong_answers:
  - HODLing ve Replace
  - Harcama ve HODLing
  - Ticaret ve Harcama
explanation: |
  Harca ve Değiştir yöntemi, bitcoinleri harcamayı ve ardından elinizdekileri korumak için aynı miktarda yeniden satın almayı içerir.
reviewed: false
question: Кой метод ви позволява да компенсирате похарчените биткойни, като същевременно запазвате спестяванията си?
answer: Изразходване и замяна (spend and replace)
wrong_answers:
  - HODLing и заместване
  - Разходване и HODLing
  - Търговия и разходи
explanation: |
  Методът "Изхарчи и замени" включва харчене на биткойни и след това обратно изкупуване на същото количество, за да поддържате наличностите си.
reviewed: false

question: Welche Methode ermöglicht es dir, Bitcoins auszugeben und gleichzeitig deine Ersparnisse zu bewahren?
answer: Ausgeben und Ersetzen
wrong_answers:
  - HODLing und Ersetzen
  - Ausgeben und HODLing
  - Handeln und Ausgeben
explanation: |
  Bei der "Spend and Replace"-Methode gibst du Bitcoins aus und kaufst dann die gleiche Menge zurück, um deinen Bestand zu erhalten.
reviewed: false

question: วิธีใดที่ช่วยให้คุณชดเชยบิตคอยน์ที่ใช้ไปในขณะที่ยังคงรักษาการออมของคุณ?
answer: ใช้จ่ายและแทนที่
wrong_answers:
  - HODLing และ Replace
  - ใช้จ่ายและ HODLing
  - การซื้อขายและการใช้จ่าย
explanation: |
  วิธีการใช้จ่ายและแทนที่เกี่ยวข้องกับการใช้จ่ายบิตคอยน์แล้วซื้อคืนในจำนวนเท่ากันเพื่อรักษาการถือครองของคุณ
reviewed: false
question: Phương pháp nào cho phép bạn bù đắp lại số bitcoin đã chi tiêu trong khi vẫn bảo toàn được khoản tiết kiệm của mình?
answer: Chi tiêu và Thay thế
wrong_answers:
  - Nắm giữ và Thay thế
  - Chi tiêu và Nắm giữ
  - Giao dịch và chi tiêu
explanation: |
  Phương pháp Chi tiêu và Thay thế liên quan đến việc chi tiêu bitcoin rồi mua lại số lượng tương tự để duy trì số bitcoin bạn nắm giữ.
reviewed: false
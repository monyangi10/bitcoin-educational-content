question: Lightning Network, Bitcoin इकोसिस्टम में क्या काम करता है?
answer: यह Bitcoin को एक दूसरे Layer की तरह काम करके और भी फीचर्स हासिल करने और बढ़ाने की सुविधा देता है।
wrong_answers:
  - यह एक अलग क्रिप्टोकरेंसी है जो Bitcoin से प्रतिस्पर्धा करती है।
  - यह Mining Bitcoin के लिए एक टूल है।
  - यह Bitcoin के ट्रेडिंग के लिए एक प्लेटफॉर्म है।
explanation: |
  जीडब्ल्यू-8 एक दूसरी जीडब्ल्यू-10 तकनीक है जिसे जीडब्ल्यू-9 पर लागू किया गया है
  जो अपने Blockchain की क्षमता को बढ़ाने के लिए माइक्रो-पेमेंट चैनल्स का इस्तेमाल करता है
  लेन-देन ज़्यादा कारगर तरीके से।

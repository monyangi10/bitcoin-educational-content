question: Bitcoin स्टैकर के लिए Bitcoin का इस्तेमाल करने का एक आम तरीका क्या है?
answer: पीयर-टू-पीयर तरीके से
wrong_answers:
  - एक दलाल के ज़रिए
  - सामान या सेवाएँ बेचकर
  - Bitcoin इकोसिस्टम में शामिल होकर
explanation: |
  Bitcoin का इस्तेमाल करने वाले Bitcoin स्टैकर के लिए एक आम तरीका है पीयर-टू-पीयर में
  तरीका। इसका मतलब है कि वे Bitcoin को सीधे नकद में दोस्तों या सदस्यों से खरीद सकते हैं।
  Bitcoin समुदाय का।
reviewed: false
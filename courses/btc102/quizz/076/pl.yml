question: Jakie jest powszechne podejście do korzystania z Bitcoin przez układarkę?
answer: W sposób peer-to-peer
wrong_answers:
  - Za pośrednictwem brokera
  - Poprzez sprzedaż towarów lub usług
  - Angażując się w ekosystem Bitcoin
explanation: |
  Powszechnym podejściem do korzystania z Bitcoin przez układarkę Bitcoin jest metoda peer-to-peer
  sposób. Oznacza to, że mogą oni kupować Bitcoin bezpośrednio za gotówkę od znajomych lub członków społeczności Bitcoin
  społeczności Bitcoin.

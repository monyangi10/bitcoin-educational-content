question: होल्डर के लिए सुझाया गया न्यूनतम वेटिंग पीरियड क्या है?
answer: कम से कम एक या दो चक्र।
wrong_answers:
  - एक साल से कम।
  - पाँच से दस साल।
  - कोई न्यूनतम प्रतीक्षा अवधि नहीं है।
explanation: |
  अध्याय यह सुझाव देता है कि एक होल्डर को कम से कम एक या दो
  निवेश की बढ़त देखने के लिए साइकिल चलाते हैं।
reviewed: false
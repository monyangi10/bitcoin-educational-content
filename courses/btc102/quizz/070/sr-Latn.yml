question: Koji je minimalni period čekanja preporučen za Hodlera?
answer: Bar jedan ili dva ciklusa.
wrong_answers:
  - Manje od godinu dana.
  - Pet do deset godina.
  - Ne postoji minimalni period čekanja.
explanation: |
  Poglavlje sugeriše da Hodler treba da sačeka bar jedan ili dva ciklusa da bi video rast svoje investicije.

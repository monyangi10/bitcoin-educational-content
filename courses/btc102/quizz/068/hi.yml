question: एक होल्डर के लिए रिकरिंग पर्चेस प्लान सेट करने का मकसद क्या है?
answer: समय-समय पर Bitcoin को अपने आप खरीदते रहना।
wrong_answers:
  - Bitcoin को तब बेचना जब कीमत ऊँची हो।
  - Bitcoin को बार-बार ट्रेड करना।
  - Bitcoin को दूसरी क्रिप्टोकरेंसी में बदलने के लिए।
explanation: |
  एक होल्डर ने Bitcoin को लगातार खरीदते रहने के लिए एक आवर्ती खरीद योजना सेट की है।
  समय-समय पर अपने आप, इसके बढ़ते इस्तेमाल और कमी पर दांव लगाते हुए
  भविष्य।
reviewed: false
question: Koja je svrha postavljanja plana za ponavljajuću kupovinu za Hodlera?
answer: Da nastavim automatsku kupovinu Bitcoin s vremena na vreme.
wrong_answers:
  - Da proda Bitcoin kada je cena visoka.
  - Da često trgujete Bitcoin.
  - Da konvertujete Bitcoin u druge kriptovalute.
explanation: |
  Hodler postavlja plan za ponavljajuću kupovinu kako bi nastavio automatski kupovati Bitcoin s vremena na vreme, kladeći se na njegovu povećanu upotrebu i oskudicu u budućnosti.
reviewed: false
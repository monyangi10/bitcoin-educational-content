question: Каква е основната цел на HODL-ърът?
answer: Да държат своите биткойни в дългосрочен план
wrong_answers:
  - Спекулиране в краткосрочен план
  - Да правите чести транзакции с биткойн
  - За да осигурят максимална поверителност на своите трансакции Bitcoin
explanation: |
  HODL-ърът се стреми да държи своите биткойни в продължение на много години, за да се възползва от предполагаемия растеж на актива.

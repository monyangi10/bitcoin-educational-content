question: Mục tiêu chính của người nắm giữ tài sản là gì?
answer: Để giữ bitcoin của họ trong thời gian dài
wrong_answers:
  - Để đầu cơ trong ngắn hạn
  - Để thực hiện các giao dịch Bitcoin thường xuyên
  - Để tối đa hóa tính riêng tư của các giao dịch Bitcoin của họ
explanation: |
  Người nắm giữ muốn giữ bitcoin của mình trong nhiều năm để hưởng lợi từ sự tăng trưởng dự kiến từ tài sản này.
reviewed: true
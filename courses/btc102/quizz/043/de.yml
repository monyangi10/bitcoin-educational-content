question: Was ist das Hauptziel eines Hodlers?
answer: Die Bitcoins langfristig zu halten
wrong_answers:
  - Kurzfristig zu spekulieren
  - Häufige Bitcoin-Transaktionen durchzuführen
  - Maximierung des Datenschutzes für die Bitcoin-Transaktionen
explanation: |
  Ein Hodler möchte seine Bitcoins viele Jahre lang behalten, um von der vermuteten Steigerung des Vermögenswertes zu profitieren.
reviewed: false

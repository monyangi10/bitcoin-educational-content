question: Wat is het belangrijkste doel van een hodler?
answer: Om hun bitcoins op lange termijn te houden
wrong_answers:
  - Op korte termijn speculeren
  - Regelmatige Bitcoin-transacties maken
  - Om de privacy van hun Bitcoin transacties te maximaliseren
explanation: |
  Een hodler wil zijn bitcoins vele jaren bewaren om te profiteren van de veronderstelde groei van de activa.

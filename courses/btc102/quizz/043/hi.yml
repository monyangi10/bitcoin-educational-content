question: सरकारें और केंद्रीय बैंक अपनी फिएट करेंसी का डिजिटल वर्जन बनाने की संभावना क्यों तलाश रहे हैं? मुख्य वजह क्या है?
answer: नियंत्रण सुनिश्चित करने और स्थानीय नियमों का पालन करने के लिए
wrong_answers:
  - Bitcoin से मुकाबला करने के लिए
  - गोपनीयता सुरक्षा प्रदान करने के लिए
  - मास सर्विलांस (निगरानी) बढ़ाने के लिए
explanation: |
  अध्याय की सामग्री बताती है कि ये प्रोजेक्ट्स दावा तो करते हैं कि वे प्रतिस्पर्धा करते हैं
  Bitcoin के साथ, वे नियंत्रण सुनिश्चित करने और अनुपालन करने के लिए केंद्रीकृत रहते हैं।
  स्थानीय नियम।
reviewed: false
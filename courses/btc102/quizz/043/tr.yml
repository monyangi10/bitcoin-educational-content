question: Bir hodler'ın ana hedefi nedir?
answer: Bitcoinlerini uzun vadede tutmak
wrong_answers:
  - Kısa vadede spekülasyon yapmak
  - Sık Bitcoin işlemleri yapmak
  - Bitcoin işlemlerinin gizliliğini en üst düzeye çıkarmak
explanation: |
  Bir hodler, varlığın fiyatının varsayılan büyümesinden faydalanmak için bitcoinlerini uzun yıllar boyunca tutmayı amaçlar.

question: Qual è l'obiettivo principale di un hodler?
answer: Conservare i propri bitcoin a lungo termine
wrong_answers:
  - Speculare a breve termine
  - Effettuare frequenti transazioni Bitcoin
  - Massimizzare la privacy delle transazioni Bitcoin
explanation: |
  Un hodler mira a conservare i propri bitcoin per molti anni, al fine di beneficiare della presunta crescita dell'asset.
reviewed: true

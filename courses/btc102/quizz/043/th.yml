question: เป้าหมายหลักของผู้ถือครองคืออะไร?
answer: ถือบิตคอยน์ของพวกเขาในระยะยาว
wrong_answers:
  - เก็งกำไรในระยะสั้น
  - เพื่อทำธุรกรรมบิตคอยน์บ่อยครั้ง
  - เพื่อเพิ่มความเป็นส่วนตัวของการทำธุรกรรม Bitcoin ของพวกเขาให้สูงสุด
explanation: |
  ผู้ถือครองมีเป้าหมายที่จะเก็บบิตคอยน์ของตนไว้เป็นเวลาหลายปีเพื่อที่จะได้รับประโยชน์จากการเติบโตที่คาดการณ์ไว้ของสินทรัพย์
reviewed: false
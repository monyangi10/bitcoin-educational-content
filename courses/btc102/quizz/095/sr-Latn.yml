question: Koje su neke od karakteristika paranoičnog Bitcoinera?
answer: Budnost, nezavisnost, nepoverenje, znanje i pragmatizam
wrong_answers:
  - Poverenje, zavisnost, neznanje i nepraktičnost
  - Lenjost, zavisnost, poverenje i neznanje
  - Poverenje, zavisnost, nedostatak znanja i nepraktičnost
explanation: |
  Poglavlje opisuje paranoičnog Bitcoinera kao nekoga ko je budan, nezavisan, nepoverljiv, obrazovan i pragmatičan.

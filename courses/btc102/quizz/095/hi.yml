question: एक पैरानॉइड बिटकॉइनर के कुछ खास लक्षण क्या हैं?  

1. **हर चीज़ पर शक करना** – सरकार, बैंक, मीडिया, यहाँ तक कि दूसरे बिटकॉइनर्स पर भी भरोसा नहीं।  
2. **"नॉट योर कीज़, नॉट योर कॉइन्स" का जुनून** – हार्डवेयर वॉलेट के बिना चैन नहीं मिलती।  
3. **हर डिप को "साजिश" समझना** – मार्केट गिरा? कोई बड़ा प्लेयर मनी निकाल रहा है या सरकारी षड्यंत्र है!  
4. **ऑफलाइन जिंदगी** – कागज़ पर प्राइवेट कीज़ लिखकर तकिए के नीचे दबाए रखना।  
5. **गोल्ड/सिल्वर की तरह बिटकॉइन को "सच्ची संपत्ति" मानना** – फिएट करेंसी को "कागज का टुकड़ा" बताना।  
6. **हर नई क्रिप्टो को "स्कैम" समझना** – बिटकॉइन के अलावा सब शिटकॉइन है!  
7. **डूम्सडे प्रेपर** – "हाइपरइन्फ्लेशन आ रहा है, सिर्फ BTC बचाएगा!"  
8. **ट्विटर पर सैटोशी होने का दावा करने वालों से झगड़ना** – "तुम नकली हो, असली सैटोशी मैं हूँ!"  

कुल मिलाकर, थोड़ा सच, थोड़ा पागलपन... पर कभी-कभी इनका शक सही निकलता है! 😅
answer: सतर्कता, स्वतंत्रता, अविश्वास, ज्ञान, और व्यावहारिकता
wrong_answers:

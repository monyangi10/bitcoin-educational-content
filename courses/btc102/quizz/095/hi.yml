  - आलस्य, निर्भरता, विश्वास, और अज्ञानता
  - विश्वास, निर्भरता, ज्ञान की कमी, और अव्यावहारिकता
explanation: |
  अध्याय में एक पैरानॉयड बिटकॉइनर को ऐसे व्यक्ति के रूप में वर्णित किया गया है जो सतर्क है,
  स्वतंत्र, शक्की, जानकार, और व्यावहारिक।

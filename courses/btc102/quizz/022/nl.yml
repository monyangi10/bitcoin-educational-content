question: Welke invloed heeft expansief monetair beleid op fiatvaluta?
answer: Ze verwateren de waarde van spaargeld
wrong_answers:
  - Ze verhogen de koopkracht
  - Ze stabiliseren de rentetarieven
  - Ze garanderen economische groei
explanation: |
  Het massaal drukken van geld leidt tot een daling van de koopkracht, waardoor de koopkracht van de spaarder geleidelijk afneemt.

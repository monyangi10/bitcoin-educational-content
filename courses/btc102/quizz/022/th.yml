question: นโยบายการเงินแบบขยายตัวมีผลกระทบอย่างไรต่อสกุลเงินเฟียต?
answer: พวกเขาทำให้มูลค่าของการออมลดลง
wrong_answers:
  - พวกเขาเพิ่มอำนาจการซื้อ
  - พวกเขาทำให้อัตราดอกเบี้ยคงที่
  - พวกเขารับประกันการเติบโตทางเศรษฐกิจ
explanation: |
  การพิมพ์เงินจำนวนมากนำไปสู่การลดค่าของอำนาจการซื้อ ซึ่งค่อยๆ กัดกร่อนอำนาจการซื้อของผู้ที่ออมเงิน
reviewed: false
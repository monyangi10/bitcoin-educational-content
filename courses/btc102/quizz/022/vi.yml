question: Chính sách nới lỏng tiền tệ có tác động như thế nào đến tiền pháp định?
answer: Họ làm giảm giá trị của tiền tiết kiệm
wrong_answers:
  - Họ tăng sức mua
  - Họ ổn định lãi suất
  - Họ đảm bảo tăng trưởng kinh tế
explanation: |
  Việc in tiền ồ ạt sẽ làm mất giá sức mua, dần dần làm xói mòn sức mua của người tiết kiệm.
reviewed: true
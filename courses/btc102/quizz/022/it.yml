question: Qual è l'impatto delle politiche di espansione monetaria sulla moneta fiat?
answer: Diluiscono il valore dei risparmi
wrong_answers:
  - Aumentano il potere d'acquisto
  - Stabilizzano i tassi di interesse
  - Garantiscono la crescita economica
explanation: |
  La stampa massiccia di moneta porta a una diminuzione del risparmio, che erode gradualmente il potere d'acquisto dei risparmiatori.
reviewed: true

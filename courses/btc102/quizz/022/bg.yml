question: Какво е влиянието на експанзионистичните парични политики върху фиатната валута?
answer: Те размиват стойността на спестяванията
wrong_answers:
  - Те увеличават покупателната способност
  - Те стабилизират лихвените проценти
  - Гарантират икономически растеж
explanation: |
  Масовото печатане на пари води до обезценяване на покупателната способност, което постепенно намалява покупателната способност на спестителите.
reviewed: false
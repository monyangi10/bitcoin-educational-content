question: Welche Auswirkungen hat eine expansive Geldpolitik auf Fiat-Währungen?
answer: Sie verwässert den Wert der Ersparnisse
wrong_answers:
  - Sie erhöht die Kaufkraft
  - Sie stabilisiert die Zinssätze
  - Sie garantiert Wirtschaftswachstum
explanation: |
  Massives Gelddrucken führt zu einer Abwertung der Ersparnisse, wodurch die Kaufkraft der Sparer allmählich schwindet.
reviewed: false

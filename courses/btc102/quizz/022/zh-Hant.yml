question: 在 Bitcoin 的背景下，交易和投資有什麼區別？
answer: 交易涉及高風險的短期合約，而投資涉及購買 BTC 的中短期合約，風險有限。
wrong_answers:
  - 交易涉及購買中短期的 BTC，而投資則涉及高風險的短期合約。
  - 交易涉及長期購買 BTC，而投資則涉及高風險的短期合約。
  - 交易涉及購買中短期的 BTC，而投資涉及購買長期的 BTC。
explanation: |
  在 Bitcoin 的背景下，交易涉及短期合約，風險較高。
  高風險，而投資則是購買 BTC 作為短期至中期投資，風險有限。
  風險。

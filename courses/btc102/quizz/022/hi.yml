question: Bitcoin के संदर्भ में ट्रेडिंग और इन्वेस्टिंग में क्या अंतर है?
answer: ट्रेडिंग में हाई रिस्क के साथ शॉर्ट-टर्म कॉन्ट्रैक्ट्स शामिल होते हैं, जबकि इन्वेस्टिंग में लिमिटेड रिस्क के साथ शॉर्ट से मीडियम-टर्म के लिए BTC खरीदना शामिल होता है।
wrong_answers:
  - ट्रेडिंग में मध्यम से छोटी अवधि के लिए BTC खरीदना शामिल है, जबकि इन्वेस्टिंग में हाई रिस्क वाले शॉर्ट-टर्म कॉन्ट्रैक्ट्स होते हैं।
  - ट्रेडिंग में लॉन्ग-टर्म के लिए BTC खरीदना शामिल है, जबकि इन्वेस्टिंग में हाई रिस्क वाले शॉर्ट-टर्म कॉन्ट्रैक्ट्स होते हैं।
  - ट्रेडिंग में शॉर्ट से मीडियम टर्म के लिए BTC खरीदना शामिल है, जबकि इन्वेस्टिंग में लॉन्ग टर्म के लिए BTC खरीदना शामिल है।
explanation: |
  Bitcoin के संदर्भ में, ट्रेडिंग में शॉर्ट-टर्म कॉन्ट्रैक्ट्स शामिल होते हैं
  हाई रिस्क, जबकि निवेश में BTC को शॉर्ट से मीडियम-टर्म के लिए सीमित मात्रा में खरीदना शामिल है
  जोखिम।

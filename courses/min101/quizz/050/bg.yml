question: Кога транзакциите в един блок стават потвърдени?
answer: Когато блокът бъде добавен към блокчейна
wrong_answers:
  - Когато транзакцията е подписана от копача
  - Когато транзакцията е разпространена от възела
  - Когато копачът започне да търси доказателство
explanation: |
  Потвърждението на плащане в Биткойн е следствие от добавянето на блока, който го съдържа, към блокчейна.

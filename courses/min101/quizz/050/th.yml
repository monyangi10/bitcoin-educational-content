question: ธุรกรรมในบล็อกจะได้รับการยืนยันเมื่อใด?
answer: เมื่อบล็อกถูกเพิ่มลงในบล็อกเชน
wrong_answers:
  - เมื่อธุรกรรมถูกลงนามโดยนักขุด
  - เมื่อธุรกรรมถูกกระจายโดยโหนด
  - เมื่อนักขุดเริ่มมองหาหลักฐาน
explanation: |
  การยืนยันการชำระเงินใน Bitcoin เป็นผลมาจากการเพิ่มบล็อกที่มีการชำระเงินนั้นลงในบล็อกเชน
reviewed: true
question: چه زمانی تراکنش‌های یک بلوک تأیید شده محسوب می‌شوند؟
answer: وقتی بلوک به بلاک‌چین اضافه می‌شود
wrong_answers:
  - وقتی تراکنش توسط استخراج‌کننده امضا می‌شود
  - وقتی تراکنش توسط نود (گره) پخش می‌شود
  - وقتی استخراج‌کننده شروع به جستجوی اثبات می‌کند
explanation: |
  تأیید یک پرداخت در بیت‌کوین نتیجه اضافه شدن بلوک حاوی آن به بلاک‌چین است.
reviewed: false

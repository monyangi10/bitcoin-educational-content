question: एक ब्लॉक में लेनदेन कब पुष्ट (confirmed) होते हैं?
answer: जब ब्लॉक को ब्लॉकचेन में जोड़ा जाता है
wrong_answers:
  - जब लेनदेन पर माइनर द्वारा हस्ताक्षर किए जाते हैं
  - जब लेनदेन को नोड द्वारा प्रसारित किया जाता है
  - जब माइनर प्रमाण खोजना शुरू करता है
explanation: |
  बिटकॉइन पर भुगतान की पुष्टि उस ब्लॉक को ब्लॉकचेन में जोड़ने का परिणाम है जिसमें वह लेनदेन शामिल है।
reviewed: false

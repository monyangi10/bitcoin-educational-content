question: Когда транзакции в блоке становятся подтвержденными?
answer: Когда блок добавляется в блокчейн
wrong_answers:
  - Когда транзакция подписана майнером
  - Когда транзакция разослана узлом
  - Когда майнер начинает искать доказательство
explanation: |
  Подтверждение платежа в Биткоине является следствием добавления блока, содержащего этот платеж, в блокчейн.
reviewed: false

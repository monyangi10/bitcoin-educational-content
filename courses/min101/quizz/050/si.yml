question: බ්ලොක් එකක ගනුදෙනු තහවුරු වන්නේ කවදාද?
answer: බ්ලොක් එක බ්ලොක්චේන් එකට එකතු වූ විට
wrong_answers:
  - මයිනර් විසින් ගනුදෙනුව අත්සන් කළ විට
  - නෝඩ් එක මගින් ගනුදෙනුව ප්‍රචාරය කළ විට
  - මයිනර් විසින් සාක්ෂි සෙවීම ආරම්භ කළ විට
explanation: |
  බිට්කොයින් හි ගෙවීමක් තහවුරු වීම යනු එම ගෙවීම අඩංගු බ්ලොක් එක බ්ලොක්චේන් එකට එකතු වීමේ ප්‍රතිඵලයකි.
reviewed: false

question: Кое условие прави един блок валиден в Биткойн?
answer: SHA256d(заглавна част на блока) <= цел
wrong_answers:
  - SHA256d(заглавна част на блока) >= цел
  - SHA256d(блок) >= цел
  - SHA256d(заглавна част на блока) > цел
explanation: |
  За да бъде един блок валиден в Биткойн, хешът на неговата заглавна част, интерпретиран като число, трябва да бъде по-малък или равен (<=) на целта.

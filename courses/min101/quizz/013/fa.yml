question: چه شرطی یک بلاک را در بیت‌کوین معتبر می‌کند؟
answer: SHA256d(هدر بلاک) <= هدف
wrong_answers:
  - SHA256d(هدر بلاک) >= هدف
  - SHA256d(بلاک) >= هدف
  - SHA256d(هدر بلاک) > هدف
explanation: |
  برای اینکه یک بلاک در بیت‌کوین معتبر باشد، هش هدر آن که به عنوان یک عدد تفسیر می‌شود، باید کمتر یا مساوی (<=) با هدف باشد.

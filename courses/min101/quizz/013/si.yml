question: බිට්කොයින් හි බ්ලොක් එකක් වලංගු වීමට අවශ්‍ය කොන්දේසිය කුමක්ද?
answer: SHA256d(බ්ලොක් හෙඩර් එක) <= ඉලක්කය
wrong_answers:
  - SHA256d(බ්ලොක් හෙඩර් එක) >= ඉලක්කය
  - SHA256d(බ්ලොක් එක) >= ඉලක්කය
  - SHA256d(බ්ලොක් හෙඩර් එක) > ඉලක්කය
explanation: |
  බිට්කොයින් හි බ්ලොක් එකක් වලංගු වීමට නම්, එහි හෙඩර් හෑෂ් එක, සංඛ්‍යාවක් ලෙස ගත් විට, ඉලක්කයට වඩා අඩු හෝ සමාන (<=) විය යුතුය.

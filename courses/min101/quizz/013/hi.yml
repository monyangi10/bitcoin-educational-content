question: कौन सी शर्त बिटकॉइन में एक ब्लॉक को मान्य बनाती है?
answer: SHA256d(ब्लॉक हेडर) <= लक्ष्य
wrong_answers:
  - SHA256d(ब्लॉक हेडर) >= लक्ष्य
  - SHA256d(ब्लॉक) >= लक्ष्य
  - SHA256d(ब्लॉक हेडर) > लक्ष्य
explanation: |
  बिटकॉइन पर किसी ब्लॉक के मान्य होने के लिए, उसके हेडर का हैश, जिसे संख्या के रूप में समझा जाता है, लक्ष्य के बराबर या उससे कम (<=) होना चाहिए।

question: What condition makes a block valid in Bitcoin?
answer: SHA256d(block header) <= target
wrong_answers:
  - SHA256d(block header) >= target
  - SHA256d(block) >= target
  - SHA256d(block header) > target
explanation: |
  For a block to be valid in Bitcoin, its header hash, interpreted as a number, must be less than or equal to (<=) the target.
reviewed: true

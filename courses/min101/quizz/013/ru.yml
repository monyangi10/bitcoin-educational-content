question: При каком условии блок в Биткоине считается валидным?
answer: SHA256d(заголовок блока) <= цель
wrong_answers:
  - SHA256d(заголовок блока) >= цель
  - SHA256d(блок) >= цель
  - SHA256d(заголовок блока) > цель
explanation: |
  Чтобы блок был валидным в Биткоине, хеш его заголовка, интерпретируемый как число, должен быть меньше или равен (<=) цели.

question: මයිනින් පූල් (mining pool) එකකින් ලබා දෙන සේවාව සාරාංශ කරන්නේ කුමන වාක්‍යයෙන්ද?
answer: එය පුරෝකථනය කළ හැකි බව විකුණයි
wrong_answers:
  - එය මයිනින් අපහසුතාව විකුණයි
  - එය විශාල බ්ලොක් විකුණයි
  - එය මයිනින් යන්ත්‍ර විකුණයි
explanation: |
  බලවේග ඒකාබද්ධ කිරීම මගින් ඉතා අස්ථායී ආදායමක්, කොටසක් සහ ගාස්තු වලට යටත්ව වඩාත් නිතිපතා ගෙවීම් බවට පත් කරයි.
reviewed: false

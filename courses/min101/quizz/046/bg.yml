question: Кое изречение обобщава услугата, предоставяна от майнинг пул?
answer: Той продава предвидимост
wrong_answers:
  - Той продава трудност на копаене
  - Той продава по-големи блокове
  - Той продава машини за копаене
explanation: |
  Обединяването трансформира силно променливия доход в по-редовни плащания срещу споделяне и такси.

question: Какая фраза резюмирует услугу, предоставляемую майнинг-пулом?
answer: Он продает предсказуемость
wrong_answers:
  - Он продает сложность майнинга
  - Он продает блоки большего размера
  - Он продает майнинговое оборудование
explanation: |
  Объединение мощностей превращает крайне нестабильный доход в более регулярные выплаты в обмен на долю и комиссии.
reviewed: false

question: कौन सा वाक्य माइनिंग पूल द्वारा प्रदान की जाने वाली सेवा का सारांश प्रस्तुत करता है?
answer: यह पूर्वानुमानयोग्यता बेचता है
wrong_answers:
  - यह माining कठिनाई बेचता है
  - यह बड़े ब्लॉक बेचता है
  - यह माining मशीनें बेचता है
explanation: |
  साझाकरण (Pooling) अत्यधिक अस्थिर आय को साझा करने और शुल्क के बदले अधिक नियमित भुगतान में बदल देता है।
reviewed: false

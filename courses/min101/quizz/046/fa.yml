question: کدام جمله خدماتی را که توسط یک استخر استخراج ارائه می‌شود خلاصه می‌کند؟
answer: پیش‌بینی‌پذیری می‌فروشد
wrong_answers:
  - سختی استخراج می‌فروشد
  - بلوک‌های بزرگ‌تر می‌فروشد
  - دستگاه‌های استخراج می‌فروشد
explanation: |
  اشتراک‌گذاری منابع، درآمد بسیار پرنوسان را در ازای سهم و کارمزد، به پرداخت‌های منظم‌تر تبدیل می‌کند.
reviewed: false

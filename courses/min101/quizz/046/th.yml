question: ประโยคใดสรุปบริการที่ให้โดยสระ mining?
answer: มันขายความคาดเดาได้
wrong_answers:
  - มันขายความยาก mining
  - มันขายบล็อกขนาดใหญ่กว่า
  - จำหน่ายเครื่อง mining
explanation: |
  การรวมกลุ่มเปลี่ยนรายได้ที่มีความผันผวนสูงให้เป็นการชำระเงินที่สม่ำเสมอมากขึ้น โดยแลกกับการแบ่งปันและค่าธรรมเนียม
reviewed: true
question: ریشه مرکل (Merkle root) در هدر یک بلاک بیت‌کوین چه کاربردی دارد؟
answer: متعهد کردن تمام تراکنش‌های بلاک
wrong_answers:
  - محاسبه اثبات کار بلاک
  - اعلام نسخه بلاک
  - دانستن دشواری بلاک
explanation: |
  ریشه مرکل تمام تراکنش‌ها را خلاصه می‌کند؛ اگر یکی تغییر کند، ریشه نیز تغییر می‌کند.
reviewed: false

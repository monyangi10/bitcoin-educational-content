question: วัตถุประสงค์ของ Merkle root ในส่วนหัวของบล็อก Bitcoin คืออะไร?
answer: เพื่อยืนยันธุรกรรมทั้งหมดในบล็อก
wrong_answers:
  - ในการคำนวณ proof of work ของบล็อก
  - เพื่อส่งสัญญาณเวอร์ชันบล็อก
  - เพื่อกำหนดความยากของบล็อก
explanation: |
  Merkle root สรุปธุรกรรมทั้งหมด; หากมีการเปลี่ยนแปลงหนึ่งรายการ รากก็จะเปลี่ยนไปด้วยเช่นกัน
reviewed: true
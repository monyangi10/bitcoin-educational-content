question: За какво служи коренът на Меркъл (Merkle root) в заглавната част на Биткойн блок?
answer: Да ангажира всички трансакции в блока
wrong_answers:
  - Да изчисли доказателството за работа на блока
  - Да сигнализира за версията на блока
  - Да узнае трудността на блока
explanation: |
  Коренът на Меркъл обобщава всички трансакции; ако една се промени, коренът също се променя.

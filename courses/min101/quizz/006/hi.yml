question: बिटकॉइन ब्लॉक हेडर में मर्कल रूट (Merkle root) का उद्देश्य क्या है?
answer: ब्लॉक के सभी लेनदेन को प्रतिबद्ध (commit) करना
wrong_answers:
  - ब्लॉक के प्रूफ ऑफ वर्क की गणना करना
  - ब्लॉक संस्करण का संकेत देना
  - ब्लॉक की कठिनाई जानना
explanation: |
  मर्कल रूट सभी लेनदेन का सारांश प्रस्तुत करता है; यदि कोई एक बदलता है, तो रूट भी बदल जाता है।
reviewed: false

question: බිට්කොයින් බ්ලොක් හෙඩර් එකේ මර්කල් රූට් (Merkle root) එකෙහි කාර්යය කුමක්ද?
answer: බ්ලොක් එකේ ඇති සියලුම ගනුදෙනු තහවුරු කිරීම
wrong_answers:
  - බ්ලොක් එකේ proof of work ගණනය කිරීම
  - බ්ලොක් එකේ සංස්කරණය (version) දැක්වීම
  - බ්ලොක් එකේ අපහසුතාවය දැන ගැනීම
explanation: |
  මර්කල් රූට් මගින් සියලුම ගනුදෙනු සාරාංශ කරයි; එකක් වෙනස් වුවහොත්, රූට් එකද වෙනස් වේ.
reviewed: false

question: Для чего нужен корень Меркла (Merkle root) в заголовке блока Биткоина?
answer: Для фиксации всех транзакций в блоке
wrong_answers:
  - Для вычисления доказательства работы блока
  - Для указания версии блока
  - Для определения сложности блока
explanation: |
  Корень Меркла обобщает все транзакции; если одна из них изменится, корень тоже изменится.

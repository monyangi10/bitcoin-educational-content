question: نانس (nonce) در هدر بلاک چه کاربردی دارد؟
answer: تغییر هدر برای تلاش مجدد
wrong_answers:
  - افزایش اندازه بلاک
  - نشان دادن تمام تراکنش‌های بلاک
  - نشان دادن هدف دشواری
explanation: |
  تغییر نانس ورودی هش را تغییر می‌دهد و اثر انگشت کاملاً متفاوتی ایجاد می‌کند. این کار اجازه می‌دهد تا برای یافتن یک هش معتبر دوباره تلاش کنید.
reviewed: false

question: За какво служи nonce в заглавната част на блока?
answer: Да променя заглавната част за нов опит
wrong_answers:
  - Да увеличава размера на блока
  - Да представя всички трансакции в блока
  - Да указва целевата трудност
explanation: |
  Промяната на nonce променя входа на хеша и произвежда напълно различен отпечатък. Това позволява да се направи нов опит за намиране на валиден хеш.

question: วัตถุประสงค์ของ nonce ในส่วนหัวของบล็อกคืออะไร?
answer: เพื่อเปลี่ยนแปลงส่วนหัวสำหรับการลองใหม่
wrong_answers:
  - เพื่อเพิ่มขนาดบล็อก
  - เพื่อแสดงธุรกรรมทั้งหมดในบล็อก
  - เพื่อระบุเป้าหมายความยาก
explanation: |
  การเปลี่ยน nonce จะเปลี่ยนข้อมูลที่ป้อนเข้าไปในแฮชและสร้างแฮชที่แตกต่างกันโดยสิ้นเชิง สิ่งนี้ช่วยให้สามารถลองใหม่เพื่อหาค่าแฮชที่ถูกต้องได้
reviewed: true
question: බ්ලොක් හෙඩර් එකේ ඇති නෝන්ස් (nonce) එකෙහි කාර්යය කුමක්ද?
answer: නැවත උත්සාහ කිරීම සඳහා හෙඩර් එක වෙනස් කිරීම
wrong_answers:
  - බ්ලොක් එකේ ප්‍රමාණය වැඩි කිරීම
  - බ්ලොක් එකේ ඇති සියලුම ගනුදෙනු නිරූපණය කිරීම
  - අපහසුතා ඉලක්කය දැක්වීම
explanation: |
  නෝන්ස් වෙනස් කිරීමෙන් හෑෂ් (hash) සඳහා ලබා දෙන දත්ත වෙනස් වන අතර සම්පූර්ණයෙන්ම වෙනස් ප්‍රතිඵලයක් (fingerprint) ලබා දෙයි. මෙය වලංගු හෑෂ් එකක් සොයා ගැනීමට නැවත උත්සාහ කිරීමට ඉඩ සලසයි.
reviewed: false

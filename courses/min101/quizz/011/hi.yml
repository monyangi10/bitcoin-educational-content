question: ब्लॉक हेडर में नॉन्स (nonce) का उद्देश्य क्या है?
answer: पुनः प्रयास करने के लिए हेडर में बदलाव करना
wrong_answers:
  - ब्लॉक का आकार बढ़ाना
  - ब्लॉक के सभी लेनदेन का प्रतिनिधित्व करना
  - कठिनाई लक्ष्य को इंगित करना
explanation: |
  नॉन्स को बदलने से हैश इनपुट बदल जाता है और पूरी तरह से अलग फिंगरप्रिंट बनता है। यह एक वैध हैश खोजने के लिए पुनः प्रयास करने की अनुमति देता है।

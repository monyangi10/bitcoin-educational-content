question: Для чего используется nonce в заголовке блока?
answer: Для изменения заголовка при повторной попытке
wrong_answers:
  - Для увеличения размера блока
  - Для представления всех транзакций в блоке
  - Для указания цели сложности
explanation: |
  Изменение nonce меняет входные данные для хеширования и создает совершенно другой отпечаток. Это позволяет повторно пытаться найти валидный хеш.
reviewed: false

question: در یک تراکنش بیت‌کوین، ورودی‌ها (inputs) چه چیزی را مصرف می‌کنند؟
answer: UTXOهای موجود
wrong_answers:
  - خروجی‌های (outputs) آینده
  - بلاک‌های موجود
  - آدرس‌های آینده
explanation: |
  یک ورودی به یک خروجی خرج نشده از یک تراکنش گذشته اشاره می‌کند که به آن UTXO می‌گویند.
reviewed: false

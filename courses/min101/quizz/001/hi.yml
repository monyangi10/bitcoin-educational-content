question: सत्यापन के बाद, एक बिटकॉइन नोड एक वैध लेकिन अपुष्ट (unconfirmed) ट्रांजेक्शन के साथ क्या करता है?
answer: वह इसे अपने साथियों (peers) को रिले करता है
wrong_answers:
  - वह इसे ब्लॉकचेन की अपनी स्थानीय प्रति में जोड़ता है
  - वह इसे अपनी निजी कुंजी से साइन करता है
  - वह इसे अपनी सार्वजनिक कुंजी से एन्क्रिप्ट करता है
explanation: |
  बिटकॉइन नेटवर्क में, प्रत्येक नोड वैध ट्रांजेक्शन को उन नोड्स तक पहुँचाता है जिनसे वह जुड़ा होता है।
reviewed: false

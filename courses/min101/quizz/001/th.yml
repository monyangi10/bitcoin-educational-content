question: หลังจากการตรวจสอบแล้ว โหนด Bitcoin จะทำอะไรกับธุรกรรมที่ถูกต้องแต่ยังไม่ได้รับการยืนยัน?
answer: มันส่งต่อไปยังเพื่อนร่วมงานของมัน
wrong_answers:
  - มันเพิ่มไปยังสำเนาบล็อกเชนในเครื่องของมัน
  - มันลงนามด้วยกุญแจส่วนตัวของมัน
  - มันเข้ารหัสด้วยกุญแจสาธารณะของมันเอง
explanation: |
  ในเครือข่าย Bitcoin แต่ละโหนดจะเผยแพร่ธุรกรรมที่ถูกต้องไปยังโหนดที่มันเชื่อมต่อด้วย
reviewed: true
question: پس از تأیید، یک نود بیت‌کوین با تراکنش معتبر اما تأیید نشده چه می‌کند؟
answer: آن را به همتایان (peers) خود رله می‌کند
wrong_answers:
  - آن را به کپی محلی خود از بلاک‌چین اضافه می‌کند
  - آن را با کلید خصوصی خود امضا می‌کند
  - آن را با کلید عمومی خود رمزگذاری می‌کند
explanation: |
  در شبکه بیت‌کوین، هر نود تراکنش‌های معتبر را به نودهایی که به آن‌ها متصل است انتشار می‌دهد.
reviewed: false

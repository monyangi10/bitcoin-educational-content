question: Что делает биткоин-узел после проверки валидной, но неподтвержденной транзакции?
answer: Передает ее своим пирам (соседям)
wrong_answers:
  - Добавляет ее в свою локальную копию блокчейна
  - Подписывает ее своим закрытым ключом
  - Шифрует ее своим открытым ключом
explanation: |
  В сети Bitcoin каждый узел распространяет валидные транзакции узлам, с которыми он соединен.
reviewed: false

question: След проверка какво прави Биткойн възел с валидна, но непотвърдена трансакция?
answer: Предава я на своите съседи
wrong_answers:
  - Добавя я в своето локално копие на блокчейна
  - Подписва я със своя частен ключ
  - Шифрова я със своя публичен ключ
explanation: |
  В Биткойн мрежата всеки възел предава валидните трансакции на възлите, с които е свързан.
reviewed: false

question: වලංගු එහෙත් තහවුරු නොකළ ගනුදෙනුවක් පරීක්ෂා කිරීමෙන් පසු, බිට්කොයින් නෝඩ් (node) එකක් කරන්නේ කුමක්ද?
answer: එය එහි අනෙකුත් සමපාර්ශවයන් (peers) වෙත යොමු කරයි
wrong_answers:
  - එය එහි බ්ලොක්චේන් එකේ දේශීය පිටපතට එක් කරයි
  - එය එහි පුද්ගලික යතුරෙන් (private key) අත්සන් කරයි
  - එය එහි පොදු යතුරෙන් (public key) සංකේතනය කරයි
explanation: |
  බිට්කොයින් ජාලය තුළ, සෑම නෝඩ් එකක්ම වලංගු ගනුදෙනු තමන් හා සම්බන්ධ වී ඇති අනෙකුත් නෝඩ් වෙත ව්‍යාප්ත කරයි.
reviewed: false

question: හෑෂ්රේට් (hashrate) මගින් මනිනු ලබන්නේ කුමක්ද?
answer: තත්පරයකට හෑෂ් ප්‍රමාණය
wrong_answers:
  - තත්පරයකට බ්ලොක් ප්‍රමාණය
  - තත්පරයකට ගනුදෙනු ප්‍රමාණය
  - තත්පරයකට බයිට් ප්‍රමාණය
explanation: |
  හෑෂ්රේට් මගින් තත්පරයකට සිදු කරනු ලබන හෑෂිං උත්සාහයන් සංඛ්‍යාව H/s වලින් ප්‍රකාශ කරයි.
reviewed: false

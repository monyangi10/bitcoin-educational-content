question: На какво съответства субсидията за блок?
answer: Парична емисия
wrong_answers:
  - Такси за трансакции
  - Депозит на потребителите
  - Наказание за спам
explanation: |
  Субсидията е частта от възнаграждението, която създава нови биткойни ex nihilo съгласно правилата на протокола.

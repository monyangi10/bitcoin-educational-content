question: Чему соответствует субсидия за блок?
answer: Денежная эмиссия
wrong_answers:
  - Комиссии за транзакции
  - Депозит пользователей
  - Штраф за спам
explanation: |
  Субсидия — это часть вознаграждения, которая создает новые биткоины ex nihilo в соответствии с правилами протокола.

question: අවසාන කාල පරිච්ඡේදය තුළ බ්ලොක් ඉතා ඉක්මනින් සොයා ගත්තේ නම්, කුමක් සිදුවේද?
answer: ඉලක්කය අඩු වේ
wrong_answers:
  - ඉලක්කය වැඩි වේ
  - ඉලක්කය එලෙසම පවතී
  - බ්ලොක් එකේ ප්‍රමාණය වැඩි වේ
explanation: |
  බ්ලොක් ඉතා ඉක්මනින් සොයා ගැනීමෙන් පෙන්නුම් කරන්නේ ඉහළ හෑෂ්රේට් එකක් පවතින බවයි, එබැවින් බිට්කොයින් ඉලක්කය අඩු කිරීමෙන් කොන්දේසිය දැඩි කරයි.
reviewed: false

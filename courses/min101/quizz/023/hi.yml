question: यदि पिछली अवधि में ब्लॉक बहुत जल्दी मिल गए, तो क्या होगा?
answer: लक्ष्य कम हो जाता है
wrong_answers:
  - लक्ष्य बढ़ जाता है
  - लक्ष्य वही रहता है
  - ब्लॉक का आकार बढ़ जाता है
explanation: |
  बहुत तेज़ी से पाए गए ब्लॉक उच्च हैशरेट का संकेत देते हैं, इसलिए बिटकॉइन लक्ष्य को कम करके स्थिति को और कड़ा कर देता है।
reviewed: false

question: Если блоки за последний период находились слишком быстро, что происходит?
answer: Цель снижается
wrong_answers:
  - Цель повышается
  - Цель остается прежней
  - Размер блока увеличивается
explanation: |
  Слишком быстрое нахождение блоков указывает на более высокий хешрейт, поэтому Bitcoin ужесточает условие, снижая цель.
reviewed: false

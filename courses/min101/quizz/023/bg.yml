question: Ако през последния период блоковете са били открити твърде бързо, какво се случва?
answer: Целта намалява
wrong_answers:
  - Целта се покачва
  - Целта остава същата
  - Размерът на блока се увеличава
explanation: |
  Блокове, открити твърде бързо, показват по-висок хашрейт, така че Биткойн затяга условията, като намалява целта.
reviewed: false

question: หากบล็อกถูกพบเร็วเกินไปในช่วงเวลาที่ผ่านมา จะเกิดอะไรขึ้น?
answer: เป้าหมายลดลง
wrong_answers:
  - เป้าหมายเพิ่มขึ้น
  - เป้าหมายยังคงเดิม
  - ขนาดบล็อกเพิ่มขึ้น
explanation: |
  บล็อกที่พบเร็วเกินไปบ่งชี้ถึง hashrate ที่สูงกว่า ดังนั้น Bitcoin จึงทำให้เงื่อนไขเข้มงวดขึ้นโดยการลดเป้าหมายลง
reviewed: true
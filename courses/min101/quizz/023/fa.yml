question: اگر بلاک‌ها در دوره اخیر خیلی سریع پیدا شده باشند، چه اتفاقی می‌افتد؟
answer: هدف کاهش می‌یابد
wrong_answers:
  - هدف افزایش می‌یابد
  - هدف ثابت می‌ماند
  - اندازه بلاک افزایش می‌یابد
explanation: |
  یافتن خیلی سریع بلاک‌ها نشان‌دهنده نرخ هش بالاتر است، بنابراین بیت‌کوین با کاهش هدف، شرایط را سخت‌تر می‌کند.
reviewed: false

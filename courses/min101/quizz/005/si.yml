question: බ්ලොක් හෙඩර් එකේ ඇති nbits ක්ෂේත්‍රය කුමක් සඳහාද?
answer: කේතනය කරන ලද අපහසුතා ඉලක්කය (difficulty target)
wrong_answers:
  - බයිට් වලින් බ්ලොක් එකේ ප්‍රමාණය
  - බ්ලොක් එකේ ඇති ගනුදෙනු සංඛ්‍යාව
  - බ්ලොක් එකේ කාලසටහන (timestamp)
explanation: |
  nbits ක්ෂේත්‍රය මගින් ක්‍රියාකාරී අපහසුතා ඉලක්කය කේතනය කරයි.
reviewed: false

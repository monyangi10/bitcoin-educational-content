question: यदि कठिनाई लक्ष्य (difficulty target) घट जाता है, तो माइनिंग का क्या होता है?
answer: यह और कठिन हो जाता है
wrong_answers:
  - यह आसान हो जाता है
  - यह समान रहता है
  - यह असंभव हो जाता है
explanation: |
  एक निचला लक्ष्य सीमा (threshold) के नीचे कम संभावित परिणाम छोड़ता है, इसलिए वैध हैश खोजने के लिए अधिक प्रयासों की आवश्यकता होती है। इसका मतलब है कि माइनिंग अधिक कठिन है।
reviewed: false

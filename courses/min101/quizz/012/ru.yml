question: Если цель сложности уменьшается, что происходит с майнингом?
answer: Он становится сложнее
wrong_answers:
  - Он становится легче
  - Ничего не меняется
  - Он становится невозможным
explanation: |
  Более низкая цель оставляет меньше возможных результатов ниже порогового значения, поэтому требуется больше попыток, чтобы найти валидный хеш. Это означает, что майнинг усложняется.

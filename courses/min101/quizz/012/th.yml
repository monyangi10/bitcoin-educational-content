question: หากเป้าหมายความยากลดลง จะเกิดอะไรขึ้นกับ mining?
answer: มันยากขึ้น
wrong_answers:
  - มันกลายเป็นเรื่องง่ายขึ้น
  - มันยังคงเหมือนเดิม
  - มันเป็นไปไม่ได้
explanation: |
  เป้าหมายที่ต่ำกว่าจะทำให้มีผลลัพธ์ที่เป็นไปได้น้อยลงภายใต้เกณฑ์ที่กำหนด ดังนั้นจึงต้องใช้ความพยายามมากขึ้นในการหาค่าแฮชที่ถูกต้อง ซึ่งหมายความว่า mining นั้นยากกว่า
reviewed: true
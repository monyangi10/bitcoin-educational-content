question: අපහසුතා ඉලක්කය (difficulty target) අඩු වුවහොත්, මයිනින් (mining) වලට කුමක් සිදු වේද?
answer: එය වඩාත් අපහසු වේ
wrong_answers:
  - එය වඩාත් පහසු වේ
  - එය එලෙසම පවතී
  - එය කළ නොහැකි වේ
explanation: |
  අඩු ඉලක්කයක් මගින් සීමාවට (threshold) වඩා අඩු ප්‍රතිඵල සංඛ්‍යාව අඩු කරන බැවින්, වලංගු හෑෂ් එකක් සොයා ගැනීමට වැඩි උත්සාහයක් අවශ්‍ය වේ. මෙයින් අදහස් කරන්නේ මයිනින් කිරීම වඩාත් අපහසු බවයි.
reviewed: false

question: اگر هدف دشواری کاهش یابد، استخراج چه تغییری می‌کند؟
answer: دشوارتر می‌شود
wrong_answers:
  - آسان‌تر می‌شود
  - یکسان باقی می‌ماند
  - غیرممکن می‌شود
explanation: |
  یک هدف پایین‌تر نتایج ممکن کمتری را زیر آستانه باقی می‌گذارد، بنابراین برای یافتن یک هش معتبر به تلاش‌های بیشتری نیاز است. این به این معنی است که استخراج دشوارتر است.
reviewed: false

question: Ако целевата трудност намалее, какво става с копаенето?
answer: По-трудно
wrong_answers:
  - По-лесно
  - Идентично
  - Невъзможно
explanation: |
  По-ниска цел оставя по-малко възможни резултати под прага, така че са необходими повече опити за намиране на валиден хеш. Това означава, че копаенето е по-трудно.
reviewed: false

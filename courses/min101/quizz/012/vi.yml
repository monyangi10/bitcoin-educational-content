question: Nếu mục tiêu độ khó giảm đi, việc khai thác sẽ trở nên như thế nào?
answer: Khó hơn
wrong_answers:
  - Dễ hơn
  - Giữ nguyên
  - Không thể thực hiện được
explanation: |
  Mục tiêu thấp hơn để lại ít kết quả khả thi hơn dưới ngưỡng, vì vậy cần nhiều lần thử hơn để tìm ra mã băm hợp lệ. Điều này có nghĩa là việc khai thác khó khăn hơn.

question: آیا کارمزد یک تراکنش بیت‌کوین یک خروجی (output) محسوب می‌شود؟
answer: خیر
wrong_answers:
  - بله
  - بله، اما فقط برای تراکنش‌های SegWit
  - خیر، اما قبل از سال ۲۰۱۲ این‌طور بود
explanation: |
  کارمزدها تفاوت بین مجموع ورودی‌ها و مجموع خروجی‌ها هستند، نه یک خروجی اختصاصی. این موضوع از ابتدا همین‌گونه بوده است.

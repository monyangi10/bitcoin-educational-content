question: බිට්කොයින් ගනුදෙනුවක ගාස්තු අවුට්පුට් (output) එකක්ද?
answer: නැත
wrong_answers:
  - ඔව්
  - ඔව්, නමුත් SegWit ගනුදෙනු සඳහා පමණි
  - නැත, නමුත් 2012 ට පෙර එය එසේ විය
explanation: |
  ගාස්තු යනු මුළු ඉන්පුට් (inputs) සහ මුළු අවුට්පුට් (outputs) අතර වෙනස මිස වෙන් කළ අවුට්පුට් එකක් නොවේ. මෙය ආරම්භයේ සිටම පවතින තත්වයකි.
reviewed: false

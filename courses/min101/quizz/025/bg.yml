question: Таксите за Bitcoin трансакция изход (output) ли са?
answer: Не
wrong_answers:
  - Да
  - Да, но само за SegWit трансакции
  - Не, но така беше преди 2012 г.
explanation: |
  Таксите са разликата между общата сума на входовете (inputs) и общата сума на изходите (outputs), а не отделен изход. Това винаги е било така.
reviewed: false

question: Являются ли комиссии за транзакцию биткоина выходом (output)?
answer: Нет
wrong_answers:
  - Да
  - Да, но только для транзакций SegWit
  - Нет, но так было до 2012 года
explanation: |
  Комиссии — это разница между общей суммой входов (inputs) и общей суммой выходов (outputs), а не отдельный выход. Так было всегда.
reviewed: false

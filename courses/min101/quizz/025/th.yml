question: ค่าธรรมเนียมการทำธุรกรรม Bitcoin เป็นผลลัพธ์หรือไม่?
answer: ไม่
wrong_answers:
  - ใช่
  - ใช่ แต่เฉพาะสำหรับธุรกรรม SegWit เท่านั้น
  - ไม่ใช่ แต่เป็นกรณีก่อนปี 2012
explanation: |
  ค่าธรรมเนียมคือความแตกต่างระหว่างอินพุตทั้งหมดและเอาต์พุตทั้งหมด ไม่ใช่เอาต์พุตที่กำหนดไว้ นี่เป็นกรณีเสมอมา
reviewed: true
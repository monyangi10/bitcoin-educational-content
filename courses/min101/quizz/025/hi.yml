question: क्या बिटकॉइन लेनदेन शुल्क एक आउटपुट (output) है?
answer: नहीं
wrong_answers:
  - हाँ
  - हाँ, लेकिन केवल SegWit लेनदेन के लिए
  - नहीं, लेकिन 2012 से पहले ऐसा ही था
explanation: |
  शुल्क कुल इनपुट (inputs) और कुल आउटपुट (outputs) के बीच का अंतर है, कोई समर्पित आउटपुट नहीं। यह हमेशा से ऐसा ही रहा है।

question: बिटकॉइन पर, UTXO को अनलॉक करने के लिए अक्सर किस प्रमाण का उपयोग किया जाता है?
answer: एक डिजिटल हस्ताक्षर
wrong_answers:
  - एक खाता पासवर्ड
  - वर्तमान ब्लॉक का हैश
  - एक SSL प्रमाणपत्र
explanation: |
  खर्च करने की शर्त के लिए आमतौर पर संबंधित निजी कुंजी के साथ बनाए गए हस्ताक्षर की आवश्यकता होती है।
reviewed: false

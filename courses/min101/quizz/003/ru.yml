question: Какое доказательство чаще всего используется в Bitcoin для разблокировки UTXO?
answer: Цифровая подпись
wrong_answers:
  - Пароль от аккаунта
  - Хеш текущего блока
  - SSL-сертификат
explanation: |
  Условие расходования обычно требует подписи, созданной с помощью соответствующего закрытого ключа.
reviewed: false

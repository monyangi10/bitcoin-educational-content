question: බිට්කොයින් හි, UTXO එකක් අගුළු හැරීමට (unlock) බොහෝ විට භාවිතා කරන සාක්ෂිය කුමක්ද?
answer: ඩිජිටල් අත්සනක්
wrong_answers:
  - ගිණුම් මුරපදයක්
  - වත්මන් බ්ලොක් එකේ හෑෂ් (hash) එකක්
  - SSL සහතිකයක්
explanation: |
  වියදම් කිරීමේ කොන්දේසිය සඳහා සාමාන්‍යයෙන් අදාළ පුද්ගලික යතුරෙන් සාදන ලද අත්සනක් අවශ්‍ය වේ.
reviewed: false

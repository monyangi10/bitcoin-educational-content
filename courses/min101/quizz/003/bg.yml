question: В Биткойн какво доказателство се използва най-често за отключване на UTXO?
answer: Цифров подпис
wrong_answers:
  - Парола за акаунт
  - Хеш на текущия блок
  - SSL сертификат
explanation: |
  Условието за харчене обикновено изисква подпис, създаден със съответния частен ключ.
reviewed: false

question: Какую проблему прежде всего пытался решить Hashcash?
answer: Email-спам
wrong_answers:
  - Двойная трата
  - DNS-фишинг
  - Кража приватных ключей
explanation: |
  Hashcash накладывает вычислительные затраты на каждое сообщение, чтобы сделать массовую рассылку электронных писем невыгодной.
reviewed: false

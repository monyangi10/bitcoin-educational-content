question: බිට්කොයින් හි ආරම්භයේදීම පතල් කැණීම ප්‍රධාන වශයෙන් සිදු කළේ කුමන ආකාරයේ දෘඩාංග (hardware) සමඟද?
answer: CPU
wrong_answers:
  - GPU
  - ASIC
  - FPGA
explanation: |
  ආරම්භයේදී, මෘදුකාංගය පුද්ගලික පරිගණකයක ක්‍රියාත්මක වූ අතර ප්‍රධාන වශයෙන් ප්‍රොසෙසරය (processor) භාවිතා කරන ලදී.
reviewed: false

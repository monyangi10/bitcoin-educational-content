question: С помощью какого оборудования в основном осуществлялся майнинг в самом начале существования Биткоина?
answer: CPU (процессор)
wrong_answers:
  - GPU (видеокарта)
  - ASIC
  - FPGA
explanation: |
  На момент запуска программное обеспечение работало на персональном компьютере и использовало в основном центральный процессор.

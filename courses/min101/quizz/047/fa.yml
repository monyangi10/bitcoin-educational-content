question: کدام اصل آماری توضیح می‌دهد که فرکانس بلوک‌های یافت شده در درازمدت به سهم هش‌ریت نزدیک می‌شود؟
answer: قانون اعداد بزرگ
wrong_answers:
  - قضیه بیز
  - پارادوکس تولد
  - اصل کمترین کنش
explanation: |
  همگرایی نتایج به دلیل قانون اعداد بزرگ است، زیرا هر هش یک تلاش مستقل محسوب می‌شود.
reviewed: false

question: หลักการทางสถิติใดที่อธิบายว่าทำไมความถี่ของบล็อกที่พบจึงบรรจบกับส่วนแบ่งของ hashrate ในระยะยาว?
answer: กฎของจำนวนมาก
wrong_answers:
  - ทฤษฎีบทของเบย์
  - ปรากฏการณ์วันเกิด
  - หลักการของการกระทำที่น้อยที่สุด
explanation: |
  การบรรจบกันของผลลัพธ์เกิดจากกฎของจำนวนมาก เนื่องจากแต่ละแฮชเป็นการทดลองที่เป็นอิสระ
reviewed: true
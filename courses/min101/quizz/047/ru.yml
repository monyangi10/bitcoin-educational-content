question: Какой статистический принцип объясняет, что частота найденных блоков в долгосрочной перспективе сходится к доле хешрейта?
answer: Закон больших чисел
wrong_answers:
  - Теорема Байеса
  - Парадокс дней рождения
  - Принцип наименьшего действия
explanation: |
  Сходимость результатов обусловлена законом больших чисел, так как каждый хеш является независимым испытанием.

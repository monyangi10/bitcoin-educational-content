question: Кой статистически принцип обяснява, че честотата на намерените блокове се доближава до дела на хашрейта в дългосрочен план?
answer: Закон за големите числа
wrong_answers:
  - Теорема на Бейс
  - Парадокс на рождените дни
  - Принцип на най-малкото действие
explanation: |
  Сближаването на резултатите се дължи на закона за големите числа, тъй като всеки хеш е независим опит.
reviewed: false

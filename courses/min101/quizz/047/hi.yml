question: कौन सा सांख्यिकीय सिद्धांत यह बताता है कि लंबे समय में पाए गए ब्लॉकों की आवृत्ति हैशरेट के हिस्से की ओर झुकती है?
answer: बड़ी संख्याओं का नियम (Law of large numbers)
wrong_answers:
  - बेयस प्रमेय
  - जन्मदिन विरोधाभास
  - न्यूनतम क्रिया का सिद्धांत
explanation: |
  परिणामों का अभिसरण बड़ी संख्याओं के नियम के कारण होता है, क्योंकि प्रत्येक हैश एक स्वतंत्र प्रयास है।
reviewed: false

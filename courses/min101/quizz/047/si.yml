question: දිගුකාලීනව සොයා ගන්නා ලද බ්ලොක් ප්‍රමාණය හෑෂ් රේට් (hashrate) කොටසට අනුකූල වන බව පැහැදිලි කරන සංඛ්‍යානමය මූලධර්මය කුමක්ද?
answer: විශාල සංඛ්‍යා පිළිබඳ නීතිය (Law of large numbers)
wrong_answers:
  - බේස් ප්‍රමේයය (Bayes' theorem)
  - උපන්දින විරෝधाභාසය (Birthday paradox)
  - අවම ක්‍රියාකාරීත්වයේ මූලධර්මය (Principle of least action)
explanation: |
  ප්‍රතිඵලවල අනුකූලතාවය ඇති වන්නේ විශාල සංඛ්‍යා පිළිබඳ නීතිය නිසාය, මන්ද එක් එක් හෑෂ් එක ස්වාධීන උත්සාහයකි.
reviewed: false

question: Кое явление прави времето между два блока фундаментално променливо?
answer: Вероятностният характер на хаширането
wrong_answers:
  - Детерминистичният характер на хаширането
  - Рекурсивният характер на хаширането
  - Периодичният характер на хаширането
explanation: |
  Всеки хеш е независим опит, което прави времето за откриване произволно дори при константен хашрейт.

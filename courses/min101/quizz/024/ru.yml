question: Какое явление делает задержку между двумя блоками принципиально изменчивой?
answer: Вероятностный характер хеширования
wrong_answers:
  - Детерминированный характер хеширования
  - Рекурсивный характер хеширования
  - Периодический характер хеширования
explanation: |
  Каждый хеш — это независимая попытка, что делает время нахождения блока случайным даже при постоянном хешрейте.

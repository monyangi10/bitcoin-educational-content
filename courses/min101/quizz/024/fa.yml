question: چه پدیده‌ای باعث می‌شود تأخیر بین دو بلاک به طور اساسی متغیر باشد؟
answer: ماهیت احتمالی هش کردن
wrong_answers:
  - ماهیت قطعی هش کردن
  - ماهیت بازگشتی هش کردن
  - ماهیت دوره‌ای هش کردن
explanation: |
  هر هش یک تلاش مستقل است که باعث می‌شود زمان‌های کشف حتی با نرخ هش ثابت نیز تصادفی باشند.
reviewed: false

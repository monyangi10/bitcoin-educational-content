question: ปรากฏการณ์ใดที่ทำให้ช่วงเวลาระหว่างสองบล็อกมีความแปรปรวนโดยธรรมชาติ?
answer: ลักษณะเชิงความน่าจะเป็นของการแฮช
wrong_answers:
  - ลักษณะการแฮชที่เป็นเชิงกำหนด
  - ลักษณะการทำงานแบบวนซ้ำของการแฮช
  - ลักษณะตามช่วงเวลาของการแฮช
explanation: |
  แฮชแต่ละรายการเป็นความพยายามที่เป็นอิสระ ซึ่งทำให้เวลาการค้นพบเป็นแบบสุ่มแม้ที่ hashrate คงที่
reviewed: true
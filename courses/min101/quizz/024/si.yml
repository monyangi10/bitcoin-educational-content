question: බ්ලොක් දෙකක් අතර ප්‍රමාදය මූලික වශයෙන් වෙනස් වීමට බලපාන සංසිද්ධිය කුමක්ද?
answer: හෑෂිං හි සම්භාවිතා ස්වභාවය
wrong_answers:
  - හෑෂිං හි නිර්ණායක ස්වභාවය
  - හෑෂිං හි පුනරාවර්තන ස්වභාවය
  - හෑෂිං හි ආවර්තිතා ස්වභාවය
explanation: |
  සෑම හෑෂ් එකක්ම ස්වාධීන උත්සාහයකි, එමගින් හෑෂ්රේට් එක නියතව පවතින විට පවා බ්ලොක් සොයා ගන්නා කාලය අහඹු වේ.
reviewed: false

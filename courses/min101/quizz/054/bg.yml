question: Как се нарича споделеният публичен регистър, в който се записва историята на плащанията в биткойни?
answer: Блокчейнът
wrong_answers:
  - Mempool
  - Портфейлът (wallet)
  - Хашрейтът
explanation: |
  Споделената публична книга, която съдържа всички транзакции, е блокчейнът.
reviewed: false

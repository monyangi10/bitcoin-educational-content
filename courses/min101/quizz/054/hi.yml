question: उस साझा सार्वजनिक बहीखाते (ledger) का क्या नाम है जहाँ बिटकॉइन भुगतानों का इतिहास लिखा जाता है?
answer: ब्लॉकचेन
wrong_answers:
  - मेमपूल (mempool)
  - वॉलेट (wallet)
  - हैशरेट (hashrate)
explanation: |
  साझा सार्वजनिक बहीखाता जिसमें सभी लेनदेन शामिल होते हैं, ब्लॉकचेन है।
reviewed: false

question: บล็อกผู้สมัครใน Bitcoin คืออะไร?
answer: บล็อกที่เตรียมโดยนักขุด แต่ยังไม่ถูกต้อง
wrong_answers:
  - บล็อกที่ได้รับการยืนยันโดยเครือข่าย แต่ยังไม่ได้แชร์
  - บล็อกที่สร้างโดย wallet แต่ยังไม่ถูกต้อง
  - บล็อกที่เก็บไว้ใน mempool
explanation: |
  นักขุดแต่ละคนจะประกอบบล็อกผู้สมัครในท้องถิ่นก่อนที่จะพยายามหาค่า proof of work ที่ถูกต้อง
reviewed: true
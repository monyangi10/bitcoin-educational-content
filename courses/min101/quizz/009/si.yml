question: බිට්කොයින් හි අපේක්ෂක බ්ලොක් (candidate block) එකක් යනු කුමක්ද?
answer: පතල්කරුවෙකු විසින් සකස් කරන ලද, නමුත් තවමත් වලංගු නොවන බ්ලොක් එකකි
wrong_answers:
  - ජාලය විසින් තහවුරු කරන ලද, නමුත් තවමත් බෙදා නොගත් බ්ලොක් එකකි
  - පසුම්බියක් (wallet) විසින් සාදන ලද, නමුත් තවමත් වලංගු නොවන බ්ලොක් එකකි
  - mempool එකෙහි ගබඩා කර ඇති බ්ලොක් එකකි
explanation: |
  සෑම පතල්කරුවෙකුම වලංගු proof of work එකක් සොයා ගැනීමට උත්සාහ කිරීමට පෙර දේශීයව අපේක්ෂක බ්ලොක් එකක් සකස් කරයි.
reviewed: false

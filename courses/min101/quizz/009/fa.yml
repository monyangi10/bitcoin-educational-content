question: بلاک کاندید در بیت‌کوین چیست؟
answer: بلاکی که توسط استخراج‌کننده آماده شده، اما هنوز معتبر نیست
wrong_answers:
  - بلاکی که توسط شبکه تایید شده، اما هنوز به اشتراک گذاشته نشده است
  - بلاکی که توسط یک کیف پول ایجاد شده، اما هنوز معتبر نیست
  - بلاکی که در مم‌پول ذخیره شده است
explanation: |
  هر استخراج‌کننده قبل از تلاش برای یافتن یک اثبات کار معتبر، یک بلاک کاندید را به صورت محلی جمع‌آوری می‌کند.
reviewed: false

question: Что такое блок-кандидат в Биткоине?
answer: Блок, подготовленный майнером, но еще не ставший валидным
wrong_answers:
  - Блок, подтвержденный сетью, но еще не разосланный
  - Блок, созданный кошельком, но еще не валидный
  - Блок, хранящийся в мемпуле
explanation: |
  Каждый майнер локально собирает блок-кандидат, прежде чем пытаться найти валидное доказательство работы.

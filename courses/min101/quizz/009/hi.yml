question: बिटकॉइन में उम्मीदवार ब्लॉक (candidate block) क्या है?
answer: एक खनिक द्वारा तैयार किया गया ब्लॉक, लेकिन अभी तक मान्य नहीं है
wrong_answers:
  - नेटवर्क द्वारा मान्य किया गया ब्लॉक, लेकिन अभी तक साझा नहीं किया गया है
  - वॉलेट द्वारा बनाया गया ब्लॉक, लेकिन अभी तक मान्य नहीं है
  - मेमपूल में संग्रहीत एक ब्लॉक
explanation: |
  प्रत्येक खनिक एक वैध प्रूफ ऑफ वर्क खोजने का प्रयास करने से पहले स्थानीय रूप से एक उम्मीदवार ब्लॉक को इकट्ठा करता है।
reviewed: false

question: Какво е блок кандидат в Биткойн?
answer: Блок, подготвен от миньор, но все още невалиден
wrong_answers:
  - Блок, валидиран от мрежата, но все още несподелен
  - Блок, създаден от портфейл, но все още невалиден
  - Блок, съхраняван в mempool-а
explanation: |
  Всеки миньор сглобява локално блок кандидат, преди да се опита да намери валидно доказателство за работа.

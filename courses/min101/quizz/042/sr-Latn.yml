question: Šta znači ASIC?
answer: Application-Specific Integrated Circuits
wrong_answers:
  - Advanced Secure Integrated Circuit
  - Automated Silicon Integrated Circuit
  - Application-Shared Integrated Circuit
explanation: |
  ASIC je čip dizajniran za jedan jedini zadatak. To je, dakle, Application-Specific Integrated Circuits.
reviewed: false

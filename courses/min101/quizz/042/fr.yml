question: Que signifie ASIC ?
answer: Application-Specific Integrated Circuits
wrong_answers:
  - Advanced Secure Integrated Circuits
  - Automated Silicon Integrated Circuits
  - Application-Shared Integrated Circuits
explanation: |
  Un ASIC est une puce conçue pour une tâche unique. C'est donc un Application-Specific Integrated Circuits.
reviewed: true 

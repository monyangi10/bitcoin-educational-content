question: На основе какого элемента рассчитывается доказательство работы в Биткоине?
answer: Заголовок блока
wrong_answers:
  - Высота блока
  - Мемпул сети
  - Первые 21 транзакция блока
explanation: |
  Майнинг заключается в циклическом хешировании 80-байтового заголовка блока, который фиксирует содержимое блока.

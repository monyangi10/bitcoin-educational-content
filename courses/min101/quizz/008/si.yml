question: බිට්කොයින් හි proof of work ගණනය කරනු ලබන්නේ කුමන අංගය මතද?
answer: බ්ලොක් හෙඩර් එක මත
wrong_answers:
  - බ්ලොක් එකේ උස (block height)
  - ජාලයේ mempool එක
  - බ්ලොක් එකේ පළමු ගනුදෙනු 21
explanation: |
  මයිනින් (mining) කිරීමේදී බ්ලොක් එකේ අන්තර්ගතය තහවුරු කරන බයිට් 80 ක බ්ලොක් හෙඩර් එක නැවත නැවතත් හෑෂ් (hash) කිරීම සිදු කරනු ලැබේ.
reviewed: false

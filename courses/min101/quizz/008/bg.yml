question: На базата на кой елемент се изчислява доказателството за работа (proof of work) в Биткойн?
answer: Заглавната част на блока (block header)
wrong_answers:
  - Височината на блока
  - Mempool-ът на мрежата
  - Първите 21 трансакции на блока
explanation: |
  Копаенето се състои в повтарящо се хеширане на 80-байтовата заглавна част на блока, която ангажира съдържанието на блока.
reviewed: false

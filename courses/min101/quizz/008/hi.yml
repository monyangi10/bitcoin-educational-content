question: बिटकॉइन में प्रूफ ऑफ वर्क की गणना किस तत्व पर की जाती है?
answer: ब्लॉक हेडर
wrong_answers:
  - ब्लॉक की ऊँचाई (block height)
  - नेटवर्क का मेमपूल
  - ब्लॉक के पहले 21 लेनदेन
explanation: |
  माइनिंग में 80-बाइट के ब्लॉक हेडर को बार-बार हैश करना शामिल है, जो ब्लॉक की सामग्री को प्रतिबद्ध करता है।
reviewed: false

question: หลังจากการยืนยันกี่ครั้งที่เอาต์พุตของ Coinbase สามารถใช้จ่ายได้?
answer: 101 การยืนยัน
wrong_answers:
  - 6 การยืนยัน
  - 201 การยืนยัน
  - 210 การยืนยัน
explanation: |
  ระยะเวลาครบกำหนดคือ 100 บล็อก ดังนั้นต้องใช้การยืนยัน 101 ครั้งเพื่อทำให้ UTXO เหล่านี้สามารถใช้จ่ายได้
reviewed: true
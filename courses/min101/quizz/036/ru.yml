question: Через сколько подтверждений выходы coinbase-транзакции становятся доступными для траты?
answer: 101 подтверждение
wrong_answers:
  - 6 подтверждений
  - 201 подтверждение
  - 210 подтверждений
explanation: |
  Период созревания составляет 100 блоков, поэтому требуется 101 подтверждение, чтобы сделать эти UTXO доступными.

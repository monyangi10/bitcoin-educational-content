question: තහවුරු කිරීම් (confirmations) කීයකට පසු coinbase ප්‍රතිදානයන් වියදම් කළ හැකි වේද?
answer: තහවුරු කිරීම් 101
wrong_answers:
  - තහවුරු කිරීම් 6
  - තහවුරු කිරීම් 201
  - තහවුරු කිරීම් 210
explanation: |
  මෝරන කාලය (maturity period) බ්ලොක් 100 කි, එබැවින් මෙම UTXO වියදම් කළ හැකි කිරීමට තහවුරු කිරීම් 101 ක් අවශ්‍ය වේ.
reviewed: false

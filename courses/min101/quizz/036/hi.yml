question: कितने कन्फर्मेशन के बाद coinbase आउटपुट खर्च करने योग्य हो जाते हैं?
answer: 101 कन्फर्मेशन
wrong_answers:
  - 6 कन्फर्मेशन
  - 201 कन्फर्मेशन
  - 210 कन्फर्मेशन
explanation: |
  परिपक्वता अवधि (maturity period) 100 ब्लॉक है, इसलिए इन UTXO को खर्च करने योग्य बनाने के लिए 101 कन्फर्मेशन की आवश्यकता होती है।
reviewed: false

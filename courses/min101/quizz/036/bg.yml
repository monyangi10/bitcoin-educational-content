question: След колко потвърждения изходите на една coinbase стават използваеми?
answer: 101 потвърждения
wrong_answers:
  - 6 потвърждения
  - 201 потвърждения
  - 210 потвърждения
explanation: |
  Периодът на зрялост е 100 блока, така че са необходими 101 потвърждения, за да станат тези UTXO използваеми.

question: Какую практическую проблему в первую очередь стремится решить майнинг-пул?
answer: Дисперсия доходов
wrong_answers:
  - Сложность сети
  - Размер блоков
  - Цена на ASIC
explanation: |
  Объединяя хешрейт, пул превращает крайне нерегулярный доход в более стабильные выплаты. Это снижает дисперсию доходов для майнера.
reviewed: false

question: माइनिंग पूल मुख्य रूप से किस व्यावहारिक समस्या को हल करने का प्रयास करता है?
answer: आय की भिन्नता (Variance)
wrong_answers:
  - नेटवर्क की कठिनाई
  - ब्लॉक का आकार
  - ASIC की कीमत
explanation: |
  हैशरेट को साझा करके, एक पूल बहुत अनियमित आय को अधिक नियमित भुगतान में बदल देता है। यह माइनर के लिए आय की भिन्नता को कम करता है।
reviewed: false

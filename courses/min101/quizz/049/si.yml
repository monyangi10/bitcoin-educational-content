question: මයිනින් පූල් (mining pool) එකක් ප්‍රධාන වශයෙන් විසඳීමට උත්සාහ කරන ප්‍රායෝගික ගැටලුව කුමක්ද?
answer: ආදායමේ විචලතාව (variance)
wrong_answers:
  - ජාලයේ අපහසුතාව
  - බ්ලොක් වල ප්‍රමාණය
  - ASIC වල මිල
explanation: |
  හෑෂ් රේට් (hashrate) එක ඒකාබද්ධ කිරීමෙන්, පූල් එකක් මගින් ඉතා අක්‍රමවත් ආදායමක් වඩාත් නිතිපතා ගෙවීම් බවට පත් කරයි. මෙය මයිනර් සඳහා ආදායම් විචලතාව අඩු කිරීමකි.
reviewed: false

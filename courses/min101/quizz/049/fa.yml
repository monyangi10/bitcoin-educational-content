question: یک استخر استخراج عمدتاً به دنبال حل چه مشکل عملی است؟
answer: نوسان درآمد
wrong_answers:
  - سختی شبکه
  - اندازه بلوک‌ها
  - قیمت ASIC
explanation: |
  با به اشتراک گذاشتن هش‌ریت، یک استخر درآمد بسیار نامنظم را به پرداخت‌های منظم‌تر تبدیل می‌کند. این کار باعث کاهش نوسان درآمد برای استخراج‌کننده می‌شود.
reviewed: false

question: ปัญหาที่เป็นรูปธรรมที่สระ mining มุ่งเน้นที่จะแก้ไขคืออะไร?
answer: ความแปรปรวนของรายได้
wrong_answers:
  - ความยากของเครือข่าย
  - ขนาดบล็อก
  - ราคา ASIC
explanation: |
  โดยการรวม hashrate เข้าด้วยกัน สระจะเปลี่ยนรายได้ที่ไม่สม่ำเสมอมากให้กลายเป็นการจ่ายเงินที่สม่ำเสมอมากขึ้น ซึ่งจะลดความแปรปรวนของรายได้สำหรับนักขุด
reviewed: true
question: Какъв практически проблем се стреми да реши най-вече един майнинг пул?
answer: Вариацията на приходите
wrong_answers:
  - Трудността на мрежата
  - Размерът на блоковете
  - Цената на ASIC
explanation: |
  Чрез обединяване на хашрейта, един пул трансформира силно нередовния доход в по-редовни плащания. Това е намаляване на вариацията на приходите за копача.
reviewed: false

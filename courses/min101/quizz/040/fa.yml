question: کدام عامل در رقابت‌پذیری استخراج صنعتی مهم‌ترین است؟
answer: هزینه برق
wrong_answers:
  - میزان هزینه‌های دستمزد
  - کیفیت ارگونومیک زیرساخت‌ها
  - هزینه مجوزهای نرم‌افزاری
explanation: |
  در مقیاس بزرگ، سودآوری استخراج به هزینه هر واحد محاسباتی بستگی دارد که عمدتاً توسط هزینه برق تعیین می‌شود.

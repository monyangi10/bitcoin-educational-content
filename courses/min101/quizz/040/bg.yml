question: Кой елемент е най-важен за конкурентоспособността на индустриалния майнинг?
answer: Цената на електроенергията
wrong_answers:
  - Размерът на разходите за заплати
  - Ергономичното качество на инфраструктурата
  - Цената на софтуерните лицензи
explanation: |
  В голям мащаб рентабилността на копаенето зависи от цената на единица изчисление, която се определя основно от цената на електроенергията.
reviewed: false

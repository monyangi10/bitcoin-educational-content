question: කාර්මික පතල් කැණීමේ (industrial mining) තරඟකාරිත්වයේ වඩාත්ම වැදගත් අංගය කුමක්ද?
answer: විදුලි පිරිවැය
wrong_answers:
  - වැටුප් පිරිවැය
  - යටිතල පහසුකම්වල කාර්යක්ෂමතාව
  - මෘදුකාංග බලපත්‍ර පිරිවැය
explanation: |
  විශාල පරිමාණයෙන්, පතල් කැණීමේ ලාභදායීතාවය ගණනය කිරීමේ ඒකකයක පිරිවැය මත රඳා පවතින අතර එය ප්‍රධාන වශයෙන් විදුලි පිරිවැය මත තීරණය වේ.
reviewed: false

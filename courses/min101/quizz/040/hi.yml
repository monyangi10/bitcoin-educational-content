question: औद्योगिक माइनिंग की प्रतिस्पर्धात्मकता में सबसे महत्वपूर्ण तत्व कौन सा है?
answer: बिजली की लागत
wrong_answers:
  - वेतन लागत की राशि
  - बुनियादी ढांचे की एर्गोनोमिक गुणवत्ता
  - सॉफ्टवेयर लाइसेंस की लागत
explanation: |
  बड़े पैमाने पर, माइनिंग की लाभप्रदता प्रति गणना इकाई की लागत पर निर्भर करती है, जो मुख्य रूप से बिजली की लागत से निर्धारित होती है।
reviewed: false

question: ปัจจัยใดที่สำคัญที่สุดสำหรับความสามารถในการแข่งขันในอุตสาหกรรม mining?
answer: ค่าไฟฟ้า
wrong_answers:
  - จำนวนค่าแรง
  - คุณภาพการยศาสตร์ของโครงสร้างพื้นฐาน
  - ต้นทุนของใบอนุญาตซอฟต์แวร์
explanation: |
  ในขนาดใหญ่ กำไรของ mining ขึ้นอยู่กับต้นทุนต่อหน่วยของการคำนวณ ซึ่งส่วนใหญ่ถูกกำหนดโดยต้นทุนของไฟฟ้า
reviewed: true
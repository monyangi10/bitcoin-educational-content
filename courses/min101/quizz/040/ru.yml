question: Какой элемент является наиболее важным в конкурентоспособности промышленного майнинга?
answer: Стоимость электроэнергии
wrong_answers:
  - Размер затрат на оплату труда
  - Эргономическое качество инфраструктуры
  - Стоимость программных лицензий
explanation: |
  В больших масштабах прибыльность майнинга зависит от стоимости единицы вычислений, которая в основном определяется стоимостью электроэнергии.
reviewed: false

question: چه معیار اقتصادی راهنمای انتخاب تراکنش‌ها توسط یک استخراج‌کننده است؟
answer: نرخ کارمزد (fee rate)
wrong_answers:
  - مبلغ کل کارمزدها
  - قدمت UTXOها
  - تعداد UTXOها
explanation: |
  از آنجایی که فضای یک بلاک محدود است، استخراج‌کننده تراکنش‌های سودآورتر در هر بایت را در اولویت قرار می‌دهد. بنابراین، نرخ کارمزد است که انتخاب تراکنش‌ها را هدایت می‌کند.
reviewed: false

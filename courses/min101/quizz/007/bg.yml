question: Какъв икономически критерий ръководи избора на трансакции от миньора?
answer: Степента на таксата (fee rate)
wrong_answers:
  - Общата сума на таксите
  - Възрастта на UTXO
  - Броят на UTXO
explanation: |
  Тъй като пространството в блока е ограничено, миньорът дава приоритет на най-печелившите трансакции на байт. Ето защо изборът на трансакции се ръководи от степента на таксата.
reviewed: false

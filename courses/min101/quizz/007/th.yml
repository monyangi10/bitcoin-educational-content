question: เกณฑ์ทางเศรษฐกิจใดที่เป็นแนวทางในการเลือกธุรกรรมของนักขุด?
answer: อัตราค่าธรรมเนียม
wrong_answers:
  - จำนวนค่าธรรมเนียมทั้งหมด
  - ยุคของ UTXOs
  - จำนวน UTXOs
explanation: |
  เนื่องจากพื้นที่บล็อกมีจำกัด นักขุดจึงให้ความสำคัญกับธุรกรรมที่ทำกำไรได้มากที่สุดต่อไบต์ ดังนั้น อัตราค่าธรรมเนียมจึงเป็นตัวชี้นำการเลือกธุรกรรม
reviewed: true
question: खनिक (miner) द्वारा लेनदेन के चुनाव के लिए कौन सा आर्थिक मानदंड मार्गदर्शन करता है?
answer: शुल्क दर (fee rate)
wrong_answers:
  - शुल्क की राशि
  - UTXOs की आयु
  - UTXOs की संख्या
explanation: |
  चूंकि ब्लॉक स्पेस सीमित है, इसलिए खनिक प्रति बाइट सबसे अधिक लाभदायक लेनदेन को प्राथमिकता देता है। इसलिए शुल्क दर ही लेनदेन के चयन का मार्गदर्शन करती है।
reviewed: false

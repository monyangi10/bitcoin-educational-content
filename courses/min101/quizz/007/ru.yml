question: Каким экономическим критерием руководствуется майнер при выборе транзакций?
answer: Ставка комиссии (fee rate)
wrong_answers:
  - Сумма комиссий
  - Возраст UTXO
  - Количество UTXO
explanation: |
  Поскольку пространство в блоке ограничено, майнер отдает предпочтение наиболее прибыльным транзакциям на байт. Таким образом, именно ставка комиссии определяет выбор транзакций.
reviewed: false

question: පතල්කරුවෙකු (miner) විසින් ගනුදෙනු තෝරා ගැනීමේදී මඟ පෙන්වන ආර්ථික නිර්ණායකය කුමක්ද?
answer: ගාස්තු අනුපාතය (fee rate)
wrong_answers:
  - ගාස්තු මුදල
  - UTXO වල පැරණි බව
  - UTXOs සංඛ්‍යාව
explanation: |
  බ්ලොක් එකක ඉඩ සීමිත බැවින්, පතල්කරු බයිට් එකකට වැඩිම ලාභයක් ලබා දෙන ගනුදෙනු වලට ප්‍රමුඛතාවය දෙයි. එබැවින් ගනුදෙනු තෝරා ගැනීම මෙහෙයවනු ලබන්නේ ගාස්තු අනුපාතය මගිනි.
reviewed: false

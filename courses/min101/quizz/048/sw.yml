question: Ni pool gani ya kwanza kabisa ya uchimbaji kwenye Bitcoin?
answer: Braiins Pool
wrong_answers:
  - Foundry USA
  - AntPool
  - F2Pool
explanation: |
  Braiins Pool, hapo awali Slush Pool na Bitcoin CZ, ndiyo pool ya kwanza ya uchimbaji kwenye Bitcoin, iliyoanzishwa mwaka 2010.
reviewed: false

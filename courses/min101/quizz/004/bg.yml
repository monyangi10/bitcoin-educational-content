question: Според идеята, обобщена от Сатоши, кой е единственият начин да се гарантира липсата на двойно харчене?
answer: Да се познават всички трансакции
wrong_answers:
  - Да се познават всички активни възли
  - Да се познават всички активни миньори
  - Да се познават всички частни ключове
explanation: |
  Двойното харчене се открива чрез сравняване на трансакцията с минали разходи, вписани в споделен регистър.

question: Согласно идее, сформулированной Сатоши, каков единственный способ гарантировать отсутствие двойной траты (double-spending)?
answer: Знать все транзакции
wrong_answers:
  - Знать все активные узлы
  - Знать всех активных майнеров
  - Знать все закрытые ключи
explanation: |
  Двойная трата обнаруживается путем сравнения транзакции с прошлыми расходами, записанными в общем реестре.
reviewed: false

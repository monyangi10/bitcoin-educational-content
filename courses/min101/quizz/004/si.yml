question: සතෝෂි විසින් සාරාංශ කරන ලද අදහසට අනුව, ද්විත්ව වියදම් (double-spending) නොමැති බව සහතික කිරීමට ඇති එකම මාර්ගය කුමක්ද?
answer: සියලුම ගනුදෙනු පිළිබඳව දැනුවත් වීම
wrong_answers:
  - සියලුම සක්‍රීය නෝඩ් පිළිබඳව දැනුවත් වීම
  - සියලුම සක්‍රීය පතල්කරුවන් (miners) පිළිබඳව දැනුවත් වීම
  - සියලුම පුද්ගලික යතුරු පිළිබඳව දැනුවත් වීම
explanation: |
  හවුල් ලේඛනයක (shared ledger) සටහන් කර ඇති අතීත වියදම් සමඟ ගනුදෙනුවක් සැසඳීමෙන් ද්විත්ව වියදම් හඳුනා ගනු ලැබේ.
reviewed: false

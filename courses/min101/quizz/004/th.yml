question: ตามแนวคิดที่สรุปโดย Satoshi วิธีเดียวที่จะรับประกันการไม่มี double-spending คืออะไร?
answer: เพื่อทราบธุรกรรมทั้งหมด
wrong_answers:
  - เพื่อทราบโหนดที่ใช้งานทั้งหมด
  - เพื่อทราบนักขุดที่ใช้งานทั้งหมด
  - เพื่อทราบคีย์ส่วนตัวทั้งหมด
explanation: |
  Double-spending ถูกตรวจพบโดยการเปรียบเทียบธุรกรรมกับการใช้จ่ายก่อนหน้านี้ที่บันทึกไว้ในบัญชีแยกประเภทที่ใช้ร่วมกัน
reviewed: true
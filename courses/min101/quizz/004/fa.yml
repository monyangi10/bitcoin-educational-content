question: طبق ایده‌ای که ساتوشی خلاصه کرده است، تنها راه برای اطمینان از عدم خرج کردن مضاعف (double-spending) چیست؟
answer: دانستن تمام تراکنش‌ها
wrong_answers:
  - دانستن تمام نودهای فعال
  - دانستن تمام ماینرهای فعال
  - دانستن تمام کلیدهای خصوصی
explanation: |
  خرج کردن مضاعف با مقایسه یک تراکنش با مخارج گذشته که در یک دفتر کل مشترک ثبت شده است، شناسایی می‌شود.
reviewed: false

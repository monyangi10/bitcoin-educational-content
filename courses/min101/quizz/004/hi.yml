question: सातोशी द्वारा संक्षेपित विचार के अनुसार, डबल-स्पेंडिंग (double-spending) की अनुपस्थिति सुनिश्चित करने का एकमात्र तरीका क्या है?
answer: सभी ट्रांजेक्शन को जानना
wrong_answers:
  - सभी सक्रिय नोड्स को जानना
  - सभी सक्रिय खनिकों (miners) को जानना
  - सभी निजी कुंजियों को जानना
explanation: |
  डबल-स्पेंडिंग का पता एक ट्रांजेक्शन की तुलना साझा लेज़र में दर्ज पिछले खर्चों से करके लगाया जाता है।
reviewed: false

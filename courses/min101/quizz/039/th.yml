question: ทำไมธุรกรรมของ Coinbase จึงแตกต่างจากธุรกรรมอื่น ๆ?
answer: มันไม่ได้ใช้จ่าย UTXO จริง
wrong_answers:
  - มันไม่มี TXID
  - มันไม่มีเอาต์พุต
  - มันไม่ได้อยู่ในต้นไม้เมอร์เคิล
explanation: |
  อินพุตของมันชี้ไปที่ UTXO จำลอง ทำให้สามารถสร้างเงินอุดหนุนและการเก็บค่าธรรมเนียมได้
reviewed: true
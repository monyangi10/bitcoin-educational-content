question: coinbase ट्रांजैक्शन अन्य ट्रांजैक्शनों से अलग क्यों है?
answer: यह किसी भी वास्तविक UTXO को खर्च नहीं करता है
wrong_answers:
  - इसका कोई TXID नहीं है
  - इसके कोई आउटपुट नहीं हैं
  - यह Merkle ट्री में नहीं है
explanation: |
  इसका इनपुट एक काल्पनिक UTXO की ओर इशारा करता है, जो सब्सिडी बनाने और फीस प्राप्त करने की अनुमति देता है।

question: Почему coinbase-транзакция отличается от других транзакций?
answer: Она не тратит реальные UTXO
wrong_answers:
  - У нее нет TXID
  - У нее нет выходов
  - Она не входит в дерево Меркла
explanation: |
  Ее вход указывает на фиктивный UTXO, что позволяет создавать вознаграждение и собирать комиссии.
reviewed: false

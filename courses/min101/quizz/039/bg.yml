question: Защо транзакцията coinbase се различава от останалите транзакции?
answer: Тя не харчи никакъв реален UTXO
wrong_answers:
  - Тя няма TXID
  - Тя няма изходи (outputs)
  - Тя не е в дървото на Merkle
explanation: |
  Нейният вход сочи към фиктивен UTXO, което позволява създаването на субсидията и събирането на таксите.

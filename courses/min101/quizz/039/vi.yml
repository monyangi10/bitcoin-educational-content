question: Tại sao giao dịch coinbase lại khác với các giao dịch khác?
answer: Nó không chi tiêu bất kỳ UTXO thực nào
wrong_answers:
  - Nó không có TXID
  - Nó không có đầu ra (output)
  - Nó không nằm trong cây Merkle
explanation: |
  Đầu vào của nó trỏ đến một UTXO giả, cho phép tạo ra trợ cấp và thu phí.

question: چرا تراکنش coinbase با سایر تراکنش‌ها متفاوت است؟
answer: هیچ UTXO واقعی را خرج نمی‌کند
wrong_answers:
  - شناسه تراکنش (TXID) ندارد
  - خروجی ندارد
  - در درخت مرکل نیست
explanation: |
  ورودی آن به یک UTXO فرضی اشاره می‌کند که اجازه ایجاد پاداش (subsidy) و دریافت کارمزدها را می‌دهد.
reviewed: false

question: coinbase ගනුදෙනුව අනෙකුත් ගනුදෙනු වලින් වෙනස් වන්නේ ඇයි?
answer: එය කිසිදු සැබෑ UTXO එකක් වියදම් නොකරන බැවිනි
wrong_answers:
  - එයට TXID එකක් නොමැත
  - එයට ප්‍රතිදානයන් (outputs) නොමැත
  - එය Merkle ගසෙහි නොමැත
explanation: |
  එහි ආදානය (input) මනඃකල්පිත UTXO එකක් වෙත යොමු වන අතර, එමඟින් සහනාධාරය නිර්මාණය කිරීමට සහ ගාස්තු ලබා ගැනීමට ඉඩ සලසයි.
reviewed: false

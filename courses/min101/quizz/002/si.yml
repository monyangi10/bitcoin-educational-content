question: mempool එක සම්බන්ධයෙන් නිවැරදි ප්‍රකාශය කුමක්ද?
answer: සෑම නෝඩ් එකකටම ආවේණික වූ mempool එකක් ඇත
wrong_answers:
  - මුළු ජාලයටම ඇත්තේ එක් සුවිශේෂී mempool එකක් පමණි
  - mempool යනු සෑම බ්ලොක් එකකම අඩංගු ගොනුවකි
  - mempool යනු මධ්‍යම සර්වරයකි
explanation: |
  mempool යනු එක් එක් නෝඩ් එකට දේශීය වූවකි, එබැවින් එක් එක් නෝඩ් එක මගින් ක්‍රියාත්මක කරන නීති මත පදනම්ව එහි අන්තර්ගතය නෝඩ් එකෙන් නෝඩ් එකට වෙනස් විය හැකිය.

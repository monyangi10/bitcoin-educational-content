question: Какое утверждение о мемпуле (mempool) верно?
answer: У каждого узла свой собственный мемпул
wrong_answers:
  - Существует единственный уникальный мемпул
  - Мемпул — это файл, содержащийся в каждом блоке
  - Мемпул — это центральный сервер
explanation: |
  Мемпул является локальным для каждого узла, поэтому его содержимое может варьироваться от узла к узлу в зависимости от правил, которые применяет каждый из них.

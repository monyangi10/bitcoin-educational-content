question: Относно mempool-а, кое твърдение е вярно?
answer: Всеки възел има свой собствен mempool
wrong_answers:
  - Съществува един единствен mempool
  - Mempool-ът е файл, съдържащ се във всеки блок
  - Mempool-ът е централен сървър
explanation: |
  Mempool-ът е локален за всеки възел, така че съдържанието му може да варира от възел до възел в зависимост от правилата, които всеки прилага.
reviewed: false

question: เกี่ยวกับ mempool ข้อใดถูกต้อง?
answer: แต่ละโหนดมี mempool ของตัวเอง
wrong_answers:
  - มีเมมพูลที่ไม่ซ้ำกันเพียงหนึ่งเดียว
  - mempool เป็นไฟล์ที่อยู่ในแต่ละบล็อก
  - mempool เป็นเซิร์ฟเวอร์กลาง
explanation: |
  Mempool เป็นข้อมูลเฉพาะของแต่ละโหนด ดังนั้นเนื้อหาของมันอาจแตกต่างกันไปในแต่ละโหนด ขึ้นอยู่กับกฎที่แต่ละโหนดใช้
reviewed: true
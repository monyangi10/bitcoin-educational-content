question: मेमपूल (mempool) के बारे में कौन सा कथन सही है?
answer: प्रत्येक नोड का अपना मेमपूल होता है
wrong_answers:
  - एक ही अनूठा मेमपूल होता है
  - मेमपूल प्रत्येक ब्लॉक में निहित एक फ़ाइल है
  - मेमपूल एक केंद्रीय सर्वर है
explanation: |
  मेमपूल प्रत्येक नोड के लिए स्थानीय होता है, इसलिए इसकी सामग्री प्रत्येक नोड द्वारा लागू किए गए नियमों के आधार पर अलग-अलग हो सकती है।
reviewed: false

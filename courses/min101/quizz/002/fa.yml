question: در مورد مم‌پول (mempool)، کدام عبارت صحیح است؟
answer: هر نود مم‌پول خاص خود را دارد
wrong_answers:
  - یک مم‌پول واحد و منحصربه‌فرد وجود دارد
  - مم‌پول فایلی است که در هر بلاک وجود دارد
  - مم‌پول یک سرور مرکزی است
explanation: |
  مم‌پول برای هر نود محلی است، بنابراین محتوای آن بسته به قوانینی که هر نود اعمال می‌کند، می‌تواند از نودی به نود دیگر متفاوت باشد.
reviewed: false

question: Как се изчисляват таксите за трансакция?
answer: Входове минус изходи
wrong_answers:
  - Изходи минус входове
  - Входове плюс изходи
  - Изходи делено на входове
explanation: |
  Таксите съответстват на стойността, консумирана във входовете, която не е пресъздадена в изходите.

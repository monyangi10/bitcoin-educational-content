question: ගනුදෙනු ගාස්තු ගණනය කරන්නේ කෙසේද?
answer: ඉන්පුට් වලින් අවුට්පුට් අඩු කිරීමෙන්
wrong_answers:
  - අවුට්පුට් වලින් ඉන්පුට් අඩු කිරීමෙන්
  - ඉන්පුට් සහ අවුට්පුට් එකතු කිරීමෙන්
  - අවුට්පුට් ඉන්පුට් වලින් බෙදීමෙන්
explanation: |
  ගාස්තු යනු ඉන්පුට් වල භාවිතා කර අවුට්පුට් වල නැවත නිර්මාණය නොකරන ලද අගයයි.
reviewed: false

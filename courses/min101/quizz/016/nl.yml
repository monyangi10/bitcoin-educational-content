question: Wat betekent het acroniem RPOW?
answer: Reusable Proofs of Work
wrong_answers:
  - Recursive Proofs of Work
  - Random Proofs of Work
  - Replayed Proofs of Work
explanation: |
  RPOW staat voor herbruikbare and uitwisselbare bewijzen van werk, voorgesteld door Hal Finney in 2004.
reviewed: false

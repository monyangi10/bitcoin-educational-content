question: Que signifie l’acronyme RPOW ?
answer: Reusable Proofs of Work
wrong_answers:
  - Recursive Proofs of Work
  - Random Proofs of Work
  - Replayed Proofs of Work
explanation: |
  RPOW désigne des preuves de travail réutilisables et échangeables, proposées par Hal Finney en 2004.
reviewed: true 

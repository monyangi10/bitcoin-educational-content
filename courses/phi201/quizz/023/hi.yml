question: रॉथबर्ड का मानना है कि लिखित संविधान अकेले राज्य की शक्ति को सीमित करने के लिए पर्याप्त नहीं हैं, क्योंकि:

1. **सरकारें संविधान की व्याख्या अपने हित में करती हैं** - वे कानूनों को तोड़-मरोड़कर पेश करती हैं ताकि अपनी शक्ति बढ़ा सकें।

2. **संवैधानिक सीमाएँ लचीली होती हैं** - समय के साथ सरकारें "आवश्यकता" के नाम पर इन्हें खोखला कर देती हैं।

3. **न्यायपालिका स्वतंत्र नहीं रह पाती** - अक्सर न्यायाधीश सरकार के दबाव में आकर संविधान के मूल उद्देश्य को नज़रअंदाज़ कर देते हैं।

4. **लोगों की मानसिकता** - जनता यह मानने लगती है कि "संविधान है तो सब ठीक है", जबकि असल में सरकारें धीरे-धीरे अधिकार छीनती रहती हैं।

रॉथबर्ड के अनुसार, असली सुरक्षा केवल **लोगों की सतर्कता, सीमित सरकार की अवधारणा और व्यक्तिगत स्वतंत्रता के प्रति प्रतिबद्धता** में निहित है, न कि कागज के एक टुकड़े में।
answer: ऊपर लिखा सब
wrong_answers:
  - सत्ता में बैठे लोग इन्हें आसानी से बदल सकते हैं
  - उन्हें समझा जा सकता है
  - वे नौकरशाहों और अधिकारियों द्वारा सत्ता के दुरुपयोग को रोक नहीं सकते
explanation: |
  रोथबर्ड का मानना है कि लिखित संविधान राज्य की शक्ति को सीमित करने के लिए पर्याप्त नहीं हैं क्योंकि वे व्याख्या के अधीन होते हैं, सत्ता में बैठे लोग उनमें संशोधन कर सकते हैं, और नौकरशाहों द्वारा होने वाले दुरुपयोग के खिलाफ प्रभावी ढंग से सुरक्षा नहीं देते।
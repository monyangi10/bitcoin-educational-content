question: Zašto Rothbard veruje da pisani ustavi nisu dovoljni da ograniče moć države?
answer: Sve navedeno
wrong_answers:
  - Oni se lako mogu izmeniti od strane onih na vlasti
  - Oni se mogu interpretirati
  - Oni ne mogu sprečiti zloupotrebe moći od strane birokrata i zvaničnika
explanation: |
  Rothbard veruje da pisani ustavi nisu dovoljni da ograniče moć države jer su podložni tumačenju, mogu biti izmenjeni od strane onih koji drže vlast i ne štite efikasno od zloupotreba od strane birokrata.
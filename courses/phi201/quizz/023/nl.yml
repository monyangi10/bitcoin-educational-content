question: Waarom gelooft Rothbard dat geschreven grondwetten niet genoeg zijn om de macht van de staat te beperken?
answer: Alle bovenstaande
wrong_answers:
  - Ze kunnen gemakkelijk worden gewijzigd door de machthebbers
  - Ze kunnen worden geïnterpreteerd
  - Ze kunnen machtsmisbruik door bureaucraten en ambtenaren niet voorkomen
explanation: |
  Rothbard gelooft dat geschreven grondwetten onvoldoende zijn om de macht van de staat te beperken, omdat ze vatbaar zijn voor interpretatie, gewijzigd kunnen worden door de machthebbers en geen effectieve bescherming bieden tegen misbruik door bureaucraten.
  beoordeeld: waar
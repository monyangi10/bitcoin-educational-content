question: Welke rol moet de staat volgens Keynes spelen in de economie?
answer: Een actieve rol door de vraag te stimuleren om de economie te stimuleren
wrong_answers:
  - Een minimale rol om de markt de economie te laten reguleren
  - Een neutrale rol zonder in te grijpen in de marktmechanismen
  - Een voornamelijk fiscale rol om de begroting in evenwicht te brengen
explanation: |
  Keynes stelde dat de staat actief moest ingrijpen om de vraag te stimuleren, vooral tijdens een recessie, om de economie te stimuleren en tekortkomingen van de markt te compenseren.
reviewed: true
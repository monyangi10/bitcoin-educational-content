question: 푸시스와 노모스의 차이점은 무엇인가요?
answer: 푸시스는 자연의 법칙이고 노모스는 인간의 법칙입니다.
wrong_answers:
  - 푸시스는 신들의 법이고 노모스는 인간의 법입니다.
  - 푸시스는 약자의 법칙이고 노모스는 강자의 법칙입니다.
  - 푸시스는 고대의 법칙이고 노모스는 현대의 법칙입니다.
explanation: |
  그리스 철학에서 푸시스는 인간의 행동과 무관한 자연법 또는 자연에 내재된 법칙을 의미하며, 노모스는 공동체의 삶을 규제하기 위해 사회가 만든 인간의 법칙을 의미합니다.
reviewed: true
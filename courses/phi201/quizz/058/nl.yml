question: Wat was het standpunt van de School van Salamanca over de bekering van de Indianen?
answer: Het moet gebeuren door overreding.
wrong_answers:
  - Het moest met geweld gebeuren.
  - Het zou helemaal niet gedaan moeten worden.
  - Ze namen geen standpunt in over deze kwestie.
explanation: |
  De School van Salamanca pleitte voor de bekering van de Indianen door middel van overreding, waarbij hun gewetensvrijheid werd gerespecteerd en gewelddadige dwang werd afgewezen, in overeenstemming met hun principes van natuurrecht en respect voor mensenrechten.
reviewed: true
question: None Ishure ry’i Salamanca ryari rifise ikihe kibanza ku bijanye n’uguhinduka kw’Abanyamerika?
answer: Bikwiye gukorwa biciye mu kwemeza.
wrong_answers:
  - Vyari ngombwa ko bikorwa ku nguvu.
  - Ntibikwiye gukorwa na gato.
  - Ntibafashe ingingo kuri ico kibazo.
explanation: |
  Ishure ry’i Salamanca ryarashigikiye uguhinduka kw’Abanyamerika biciye mu kwemeza, gutyo ryubahiriza umwidegemvyo wabo wo mu mutimanama kandi rikanka uguhatirwa kwose kw’ubukazi, bihuye n’ingingo ngenderwako zabo z’amategeko kavukire be n’ukwubaha uburenganzira bwa muntu.
reviewed: true
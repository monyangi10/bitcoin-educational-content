question: सलामांका स्कूल का भारतीयों (इंडियंस) के धर्म परिवर्तन के बारे में क्या रुख था?
answer: इसे समझा-बुझाकर किया जाना चाहिए।
wrong_answers:
  - इसे ज़बरदस्ती करना पड़ा।
  - यह बिल्कुल नहीं करना चाहिए।
  - उन्होंने इस मुद्दे पर कोई रुख नहीं लिया।
explanation: |
  सालामांका स्कूल ने भारतीयों (इंडियंस) के धर्मांतरण के लिए समझाने-बुझाने की वकालत की, जिससे उनकी अंतःकरण की स्वतंत्रता का सम्मान हो और किसी भी तरह के हिंसक दबाव को खारिज किया जाए। यह उनके प्राकृतिक कानून और मानवाधिकारों के सम्मान के सिद्धांतों के अनुरूप था।
reviewed: false
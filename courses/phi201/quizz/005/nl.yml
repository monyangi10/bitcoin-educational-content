question: Wat is de dominante kijk op macht in de westerse filosofie en geschiedschrijving?
answer: Macht is een corrumperende kracht die leidt tot onderdrukking
wrong_answers:
  - Macht is noodzakelijk voor de vooruitgang en welvaart van de mensheid
  - Macht is een neutraal instrument dat ten goede of ten kwade kan worden gebruikt
  - Alle bovenstaande
explanation: |
  In de westerse filosofie en geschiedschrijving wordt macht vaak gezien als een corrumperende kracht die waarschijnlijk leidt tot onderdrukking en misbruik, waarbij de gevaren van autoriteitsconcentratie en de negatieve gevolgen voor de individuele vrijheid worden benadrukt.
reviewed: true
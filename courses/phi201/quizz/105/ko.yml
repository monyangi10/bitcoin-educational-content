question: 농노로 가는 길에서 하이에크의 주요 논지는 무엇인가요?
answer: 국가 개입주의는 필연적으로 종속으로 이어집니다.
wrong_answers:
  - 사회주의와 나치즘은 근본적으로 다른 이념입니다.
  - 사유 재산은 제한이 있는 경우에만 정당합니다.
  - 농노로 가는 도로의 제한 속도는 80km/h입니다.
explanation: |
  하이에크는 <노예로 가는 길>에서 중앙 계획은 필연적으로 개인의 자유를 제한하기 때문에 국가의 경제 개입은 점차 자유의 상실로 이어진다고 주장합니다.
reviewed: true
question: हायेक की "द रोड टू सर्फडम" में मुख्य थीसिस क्या है?  

हायेक का मुख्य तर्क यह है कि सरकार द्वारा अर्थव्यवस्था और समाज पर अत्यधिक नियंत्रण (जैसे समाजवाद या सेंट्रल प्लानिंग) धीरे-धीरे व्यक्तिगत स्वतंत्रता को खत्म कर देता है और एक तानाशाही (सर्फडम) की ओर ले जाता है। उनका मानना है कि मुक्त बाजार, निजी संपत्ति और सीमित सरकारी हस्तक्षेप ही समृद्धि और आजादी को बनाए रख सकते हैं। वह चेतावनी देते हैं कि अच्छे इरादों वाली योजनाएं भी अगर सत्ता केंद्रित हो जाएं, तो अंततः दमनकारी व्यवस्था को जन्म दे सकती हैं।
answer: सरकार का दखलंदाजी गुलामी की तरफ ले जाता ही है।
wrong_answers:
  - समाजवाद और नाज़ीवाद मूल रूप से अलग-अलग विचारधाराएँ हैं।
  - निजी संपत्ति तभी न्यायसंगत है जब वह सीमित हो।
  - गुलामी की सड़क पर स्पीड लिमिट 80 किमी/घंटा है।
explanation: |
  "द रोड टू सर्फडम" में, हायेक कहते हैं कि अर्थव्यवस्था में सरकारी दखल धीरे-धीरे आज़ादी खोने का कारण बनता है, क्योंकि केंद्रीय योजना आखिरकार व्यक्तिगत स्वतंत्रता पर पाबंदियाँ लगा देती है।
reviewed: false
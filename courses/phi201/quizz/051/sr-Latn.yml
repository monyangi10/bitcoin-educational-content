question: Prema Svetom Augustinu, koja su dva grada koja koegzistiraju u svetu?
answer: Grad Božji i Zemaljski grad.
wrong_answers:
  - Grad ljudi i grad bogova.
  - Grad svetaca i grad grešnika.
  - Univerzitetski grad i grad anđela.
explanation: |
  Sveti Avgustin opisuje dva grada koja koegzistiraju u svetu: Grad Božiji, usmeren ka Bogu i duhovnom životu, i Zemaljski Grad, fokusiran na ljudske brige i materijalne stvari, pri čemu svaki sledi različite ciljeve.

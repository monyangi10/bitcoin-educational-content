question: Kulingana na Mtakatifu Augustino, ni miji gani miwili inayoishi pamoja ulimwenguni?
answer: Mji wa Mungu na Mji wa Kidunia.
wrong_answers:
  - Mji wa watu na mji wa miungu.
  - Mji wa watakatifu na mji wa wenye dhambi.
  - Mji wa chuo kikuu na mji wa malaika.
explanation: |
  Mtakatifu Augustino anaelezea miji miwili inayoishi pamoja ulimwenguni: Mji wa Mungu, unaoelekezwa kwa Mungu na maisha ya kiroho, na Mji wa Kidunia, unaozingatia maswala ya kibinadamu na vitu vya kimwili, kila moja ikifuata malengo tofauti.

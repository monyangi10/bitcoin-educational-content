question: Augustyna, jakie są dwa miasta, które współistnieją na świecie?
answer: Miasto Boga i ziemskie miasto.
wrong_answers:
  - Miasto ludzi i miasto bogów.
  - Miasto świętych i miasto grzeszników.
  - Miasto uniwersyteckie i miasto aniołów.
explanation: |
  Augustyn opisuje dwa miasta współistniejące w świecie: Miasto Boże, zorientowane na Boga i życie duchowe, oraz Miasto Ziemskie, skoncentrowane na ludzkich troskach i sprawach materialnych, z których każde podąża za odrębnymi celami.

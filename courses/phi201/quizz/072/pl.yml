question: Jakie jest pochodzenie porządku ekonomicznego według fizjokratów?
answer: Naturalne prawa rynku.
wrong_answers:
  - Decyzje rządowe.
  - Prawo międzynarodowe.
  - Przywileje arystokracji.
explanation: |
  Fizjokraci wierzyli, że porządek gospodarczy wynika z naturalnych praw rynku, twierdząc, że bez interwencji rynek dąży do równowagi, która zapewnia ogólny dobrobyt.

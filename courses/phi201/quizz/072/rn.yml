question: Nk’uko aba Physiocrates babivuga, urutonde rw’ubutunzi rwakomotse hehe?
answer: Amategeko kamere y’isoko.
wrong_answers:
  - Ivyemezo vya Leta.
  - Amategeko mpuzamakungu.
  - Ivyiza vy’abanyacubahiro.
explanation: |
  Abafiziyokarate bemera ko urutonde rw’ubutunzi ruva ku mategeko kavukire y’isoko, bavuga ko, ata n’umwe yinjiramwo, isoko rishobora gushika ku buringanire butuma haba uguterimbere muri rusangi.
reviewed: true
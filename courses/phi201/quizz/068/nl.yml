question: Wat is de definitie van tolerantie volgens Turgot?
answer: Weigeren om geweld te gebruiken tegen mensen met andere overtuigingen dan de eigen en tegelijkertijd de eigen overtuigingen blijven verdedigen met rede.
wrong_answers:
  - Het accepteren en goedkeuren van alle religieuze overtuigingen, zelfs die welke als verkeerd worden beschouwd.
  - Afstand doen van de eigen religieuze overtuigingen om in vrede met anderen te kunnen leven.
  - Totale onverschilligheid voor religieuze kwesties en hun invloed op de samenleving.
explanation: |
  Voor Turgot bestaat tolerantie uit het niet aanwenden van geweld tegen andersdenkenden, terwijl men de vrijheid behoudt om zijn eigen overtuigingen rationeel te verdedigen.
reviewed: true
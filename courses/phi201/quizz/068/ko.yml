question: 투고에 따르면 관용의 정의는 무엇인가요?
answer: 자신과 다른 신념을 가진 사람들에게 폭력을 사용하지 않으면서도 이성을 통해 자신의 신념을 계속 옹호하는 것입니다.
wrong_answers:
  - 잘못된 것으로 간주되는 종교적 신념을 포함하여 모든 종교적 신념을 받아들이고 승인합니다.
  - 다른 사람들과 평화롭게 살기 위해 자신의 종교적 신념을 포기합니다.
  - 종교적 질문과 그것이 사회에 미치는 영향에 대한 완전한 무관심.
explanation: |
  투고에게 관용이란 자신의 신념을 합리적으로 방어할 자유를 유지하면서 자신의 신념과 다른 사람에 대해 폭력을 행사하지 않는 것을 의미합니다.
reviewed: true
question: Wat is individualisme volgens Tocqueville?
answer: Individualisme is een gevoel van zelfredzaamheid dat burgers ertoe brengt zich af te zonderen van anderen en zich in zichzelf terug te trekken.
wrong_answers:
  - Individualisme is een element dat in elk tijdperk voorkomt.
  - Individualisme is een politieke doctrine die pleit voor een terugkeer naar het voorouderlijke leven.
  - Individualisme is een term die het menselijke egoïsme karakteriseert.
explanation: |
  Voor Tocqueville is individualisme een moderne neiging tot zelfvoorziening die burgers ertoe aanzet om collectieve verantwoordelijkheden te verwaarlozen, waardoor isolatie ontstaat die het sociale weefsel verzwakt.
reviewed: true
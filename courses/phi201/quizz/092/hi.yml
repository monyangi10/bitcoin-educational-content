question: टॉकविल के अनुसार व्यक्तिवाद क्या है?
answer: इंडिविजुअलिज़्म यानी व्यक्तिवाद एक ऐसी भावना है जहाँ इंसान खुद को दूसरों से काफ़ी स्वतंत्र और आत्मनिर्भर समझने लगता है। इसकी वजह से लोग दूसरों से कटने लगते हैं और अपनी ही दुनिया में सिमट जाते हैं।
wrong_answers:
  - हर ज़माने में व्यक्तिवाद एक ऐसा तत्व होता है जो मौजूद रहता है।
  - व्यक्तिवाद एक राजनीतिक सिद्धांत है जो पुरखों के जीवन में वापसी की वकालत करता है।
  - "व्यक्तिवाद" एक ऐसा शब्द है जो इंसानी स्वार्थ को दर्शाता है।
explanation: |
  टॉकविल के अनुसार, व्यक्तिवाद आत्मनिर्भरता की एक आधुनिक प्रवृत्ति है जो नागरिकों को सामूहिक ज़िम्मेदारियों को नज़रअंदाज़ करने के लिए प्रेरित करती है, जिससे अलगाव पैदा होता है और सामाजिक ताना-बाना कमज़ोर हो जाता है।

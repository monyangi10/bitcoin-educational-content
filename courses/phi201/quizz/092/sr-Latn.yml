question: Šta je individualizam prema Tokvilu?
answer: Individualizam je osećaj samodovoljnosti koji navodi građane da se izoluju od drugih i povlače u sebe.
wrong_answers:
  - Individualizam je element koji postoji u svakoj eri.
  - Individualizam je politička doktrina koja se zalaže za povratak životu predaka.
  - Individualizam je termin koji karakteriše ljudsku sebičnost.
explanation: |
  Za Tokvila, individualizam je moderna tendencija ka samodovoljnosti koja navodi građane da zanemaruju kolektivne odgovornosti, stvarajući tako izolaciju koja slabi društveno tkivo.

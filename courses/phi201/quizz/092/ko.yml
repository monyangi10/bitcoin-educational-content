question: 토크빌이 말하는 개인주의란 무엇인가요?
answer: 개인주의는 시민들이 다른 사람들로부터 자신을 고립시키고 스스로에게로 물러나도록 만드는 자급자족의 감정입니다.
wrong_answers:
  - 개인주의는 어느 시대에나 존재하는 요소입니다.
  - 개인주의는 조상의 삶으로 돌아갈 것을 주장하는 정치 이념입니다.
  - 개인주의는 인간의 이기심을 특징짓는 용어입니다.
explanation: |
  토크빌에게 개인주의는 시민들이 집단적 책임을 소홀히 하여 사회 구조를 약화시키는 고립을 초래하는 자급자족을 지향하는 현대적 경향입니다.
reviewed: true
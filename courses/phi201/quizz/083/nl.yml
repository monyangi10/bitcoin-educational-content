question: Wat is volgens Tocqueville een van de belangrijkste factoren die hebben bijgedragen aan het succes van de Amerikaanse Revolutie?
answer: Het respect voor een hogere wet.
wrong_answers:
  - De centralisatie van macht.
  - De afwezigheid van een dominante religie.
  - De aanwezigheid van een sterke monarchie.
explanation: |
  Tocqueville schrijft het succes van de Amerikaanse Revolutie toe aan het respect van de kolonisten voor een hogere wet, die individuele vrijheden omkaderde en een solide morele en wettelijke basis bood voor de organisatie van de samenleving.
reviewed: true
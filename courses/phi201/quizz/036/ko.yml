question: 로마 황제들이 주최한 빵과 게임의 목적은 무엇이었을까요?
answer: 국민을 즐겁게 하고 정치적 문제로부터 관심을 돌리기 위해
wrong_answers:
  - 로마의 문화와 예술을 홍보하기 위해
  - 군인 훈련 및 전쟁에 대비한 시민 준비
  - 경제 활성화 및 일자리 창출을 위해
explanation: |
  빵과 게임은 백성들을 즐겁게 하고 정치적, 경제적 어려움으로부터 관심을 돌리기 위해 고안된 것으로, 지도자들은 오락을 제공하고 음식을 나눠줌으로써 사회적 평화를 유지할 수 있었습니다.
reviewed: true
question: Jaki był cel chleba i igrzysk organizowanych przez rzymskich cesarzy?
answer: Zabawiać ludzi i odwracać ich uwagę od problemów politycznych
wrong_answers:
  - Promowanie rzymskiej kultury i sztuki
  - Szkolenie żołnierzy i przygotowanie obywateli do wojny
  - Stymulowanie gospodarki i tworzenie miejsc pracy
explanation: |
  Chleb i gry miały na celu zabawianie ludzi i odwracanie ich uwagi od trudności politycznych i gospodarczych, pozwalając przywódcom na utrzymanie pokoju społecznego poprzez zapewnienie rozrywki i dystrybucji żywności.

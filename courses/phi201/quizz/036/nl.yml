question: Wat was het doel van het brood en de spelen die de Romeinse keizers organiseerden?
answer: De mensen vermaken en hun aandacht afleiden van politieke problemen
wrong_answers:
  - Romeinse cultuur en kunst promoten
  - Om soldaten te trainen en burgers voor te bereiden op oorlog
  - De economie stimuleren en banen creëren
explanation: |
  Het brood en de spelletjes waren bedoeld om de mensen te vermaken en hun aandacht af te leiden van politieke en economische problemen, zodat de leiders de sociale vrede konden bewaren door vermaak te bieden en voedsel uit te delen.
reviewed: true
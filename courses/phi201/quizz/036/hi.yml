question: रोमन सम्राटों द्वारा आयोजित "रोटी और खेल" (Bread and Circuses) का उद्देश्य क्या था?  

इसका मुख्य मकसद था आम जनता को खुश और शांत रखना। सम्राट लोगों को मुफ्त अनाज (रोटी) देते थे और बड़े-बड़े मनोरंजन के कार्यक्रम (जैसे ग्लैडीएटर की लड़ाई, रथ दौड़ आदि) आयोजित करते थे। इस तरह, गरीब और बेरोजगार लोगों का ध्यान सरकार की समस्याओं या विरोध से हटाकर मनोरंजन की ओर लगाया जाता था। एक तरह से, यह जनता को नियंत्रण में रखने की एक चाल थी!  

कहावत भी है — "पेट भरो, तमाशा दो, फिर कोई बगावत नहीं करेगा!"
answer: लोगों का मनोरंजन करने और उनका ध्यान राजनीतिक समस्याओं से हटाने के लिए
wrong_answers:
  - रोमन संस्कृति और कलाओं को बढ़ावा देने के लिए
  - सैनिकों को ट्रेन करना और नागरिकों को युद्ध के लिए तैयार करना
  - अर्थव्यवस्था को उत्तेजित करने और रोजगार पैदा करने के लिए
explanation: |
  रोटी और तमाशे लोगों का मनोरंजन करने और उनका ध्यान राजनीतिक और आर्थिक मुश्किलों से हटाने के लिए बनाए गए थे, जिससे नेता मनोरंजन और खाने की वितरण के जरिए सामाजिक शांति बनाए रख सकें।
reviewed: false
question: Augustyna, w jaki sposób Bóg godzi fakt, że dał człowiekowi wolną wolę, z faktem, że jest wszechmocny i wszechwiedzący?
answer: Bóg dopuszcza zło, aby ludzie mogli uczyć się na swoich błędach i wzrastać duchowo.
wrong_answers:
  - Bóg nie jest odpowiedzialny za zło, które ludzie decydują się czynić z wolnej woli.
  - Bóg nie ma mocy, by powstrzymać ludzi przed wyborem zła.
  - Wszystkie powyższe odpowiedzi.
explanation: |
  Augustyn wierzy, że dopuszczając wolną wolę, Bóg pozostawia możliwość zła, aby ludzie mogli się uczyć i doskonalić, czyniąc wolność środkiem duchowego rozwoju pomimo złych wyborów.
reviewed: false
question: Wat is de oplossing die Tocqueville voorstelt om de gevaren van egalisatie te vermijden?
answer: Ontwikkel burgerverenigingen en lokale democratie.
wrong_answers:
  - De centrale macht van de staat versterken.
  - Economische en sociale ongelijkheden verminderen.
  - Alle andere antwoorden zijn juist.
explanation: |
  Tocqueville stelt voor om burgerverenigingen en lokale democratie te versterken om de uniforme effecten van egalisatie tegen te gaan, omdat dit de actieve participatie van burgers aanmoedigt en de diversiteit van lokale initiatieven behoudt.
reviewed: true
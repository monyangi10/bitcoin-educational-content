question: कीन्स के मुताबिक, गोल्ड स्टैंडर्ड में मुख्य समस्या क्या है?
answer: यह सरकार के खर्चों को वित्तपोषित करने की क्षमता को सीमित करता है।
wrong_answers:
  - यह महंगाई बढ़ाता है
  - यह अंतरराष्ट्रीय व्यापार में रुकावट डालता है
  - बाकी सारे जवाब सही हैं।
explanation: |
  कीन्स का मानना था कि गोल्ड स्टैंडर्ड ने सरकार की पैसे Supply को एडजस्ट करने की क्षमता को सीमित कर दिया, जिससे उनके लिए खर्चों को आसानी से फाइनेंस करना मुश्किल हो गया, खासकर आर्थिक संकट के दौरान।

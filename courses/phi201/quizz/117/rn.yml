question: Nk’uko Keynes abivuga, ni ikihe kibazo nyamukuru kiri ku rugero rw’inzahabu?
answer: Bigabanya ubushobozi bwa Leta bwo gutanga amahera y'amahera ikoresha .
wrong_answers:
  - Bitera imbere ugutera imbere kw'ibiciro
  - Bibangamira ubudandaji mpuzamakungu .
  - Ibindi bisubizo vyose ni ukuri.
explanation: |
  Keynes yarizera ko iyo ngingo y’inzahabu yagabanya ubushobozi bwa Leta bwo guhindura amahera Supply, bikaba bituma zidashobora gutanga amahera yo gukoresha mu buryo bworoshe, cane cane mu gihe c’amagume y’ubutunzi.
reviewed: true
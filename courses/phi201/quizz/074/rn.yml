question: None aba Fiziyokarate bagize uruhara uruhe mu vyiyumviro vy’ubwigenge?
answer: Inyishu zose zivugwa haruguru ni ukuri.
wrong_answers:
  - Bavuganira umwidegemvyo w’umuntu ku giti ciwe n’itunga ryiwe bwite.
  - Baciye batera imbere inyigisho y’isoko ry’uburenganzira.
  - Banegura ubudandaji n’ingene Leta igira ico ikoze.
explanation: |
  Abanyabwenge b’abanyabwenge baragize ico baterereye mu vyiyumviro vy’ubwigenge mu kuvuganira umwidegemvyo w’umuntu ku giti ciwe, umutungo w’umuntu ku giti ciwe, n’isoko ry’ubwigenge, mu gihe banse ubudandaji n’ukwivanga kwa Leta, gutyo bagashinga umushinge w’ubutunzi bushingiye ku mategeko y’ibidukikije.
reviewed: true
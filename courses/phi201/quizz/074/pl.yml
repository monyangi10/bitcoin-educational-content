question: Jaki był wkład fizjokratów w myśl liberalną?
answer: Wszystkie powyższe odpowiedzi są prawidłowe.
wrong_answers:
  - Opowiadali się za wolnością jednostki i własnością prywatną.
  - Rozwinęli oni teorię wolnego rynku.
  - Krytykowali oni merkantylizm i interwencję państwa.
explanation: |
  Fizjokraci wnieśli wkład do myśli liberalnej, opowiadając się za wolnością jednostki, własnością prywatną, wolnym rynkiem oraz odrzucając merkantylizm i interwencję państwa, kładąc podwaliny pod gospodarkę opartą na prawach naturalnych.
reviewed: false
question: Wat is volgens Tocqueville het gevolg van het gelijktrekken van omstandigheden?
answer: Individuen worden kwetsbaarder en geïsoleerder.
wrong_answers:
  - Individuen worden autonomer en onafhankelijker.
  - Individuen worden rijker en welvarender.
  - Er is minder geweld.
explanation: |
  Tocqueville merkt op dat de gelijkschakeling van omstandigheden ertoe kan leiden dat individuen zich in zichzelf terugtrekken, waardoor ze kwetsbaarder en geïsoleerder worden, omdat ze de sociale banden en collectieve steun verliezen die voorheen door traditionele hiërarchieën werden geboden.
reviewed: true
question: Prema Tokvilu, koja je posledica izjednačavanja uslova?
answer: Pojedinci postaju krhkiji i izolovaniji.
wrong_answers:
  - Pojedinci postaju autonomniji i nezavisniji.
  - Pojedinci postaju bogatiji i prosperitetniji.
  - Manje je nasilja.
explanation: |
  Tocqueville primećuje da izjednačavanje uslova može dovesti do toga da se pojedinci povuku u sebe, čineći ih ranjivijim i izolovanijim, jer gube društvene veze i kolektivnu podršku koju su ranije pružale tradicionalne hijerarhije.

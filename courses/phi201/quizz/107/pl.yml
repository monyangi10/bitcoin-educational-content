question: Jaka jest krytyka socjalizmu przez Hayeka?
answer: Krytykuje środki wykorzystywane przez socjalizm do osiągnięcia swoich celów, takie jak centralne planowanie i eliminacja własności prywatnej.
wrong_answers:
  - Odrzuca cele socjalizmu, takie jak sprawiedliwość i równość.
  - Uważa, że socjalizm to zbyt stara doktryna.
  - Żadne z powyższych.
explanation: |
  Hayek krytykuje socjalizm nie za jego cele, ale za jego metody, takie jak centralne planowanie i zniesienie własności prywatnej, które uważa za niebezpieczne dla wolności jednostki i wydajności gospodarczej.

question: None Hayek anegura ubusosiyalisimu ni igiki?
answer: Aranegura uburyo ubusosiyalisimu bukoresha kugira ngo bushike ku ntego zabwo, nk’ugutegura ivy’imbere mu gihugu no gukuraho umutungo w’abantu ku giti cabo.
wrong_answers:
  - Yanse intumbero z’ubusosiyalisimu, nk’ubutungane n’uburinganire.
  - Yiyumvira ko ubusosiyalisimu ari inyigisho ya kera cane.
  - Nta na kimwe muri ivyo bivugwa haruguru.
explanation: |
  Hayek anegura ubusosiyalisimu atari kubera intumbero zabwo, ahubwo kubera uburyo bwabwo, nk’ugutegura ivy’imbere mu gihugu no gukuraho umutungo w’abantu ku giti cabo, ivyo abona ko ari akaga ku mwidegemvyo w’umuntu ku giti ciwe no ku bushobozi bw’ubutunzi.
reviewed: true
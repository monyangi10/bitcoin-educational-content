question: 사회주의에 대한 하이에크의 비판은 무엇인가요?
answer: 그는 중앙 계획과 사유 재산의 철폐 등 사회주의가 목표를 달성하기 위해 사용하는 수단을 비판합니다.
wrong_answers:
  - 그는 정의와 평등과 같은 사회주의의 목표를 거부합니다.
  - 그는 사회주의가 지나치게 오래된 교리라고 생각합니다.
  - 위에 해당되지 않습니다.
explanation: |
  하이에크는 사회주의의 목표가 아니라 중앙 계획과 사유 재산의 폐지 등 개인의 자유와 경제적 효율성에 위험하다고 생각하는 사회주의의 방법을 비판합니다.
reviewed: true
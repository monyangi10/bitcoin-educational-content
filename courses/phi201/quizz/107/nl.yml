question: Wat is Hayeks kritiek op het socialisme?
answer: Hij bekritiseert de middelen die het socialisme gebruikt om zijn doelen te bereiken, zoals centrale planning en de afschaffing van privébezit.
wrong_answers:
  - Hij verwerpt de doelen van het socialisme, zoals rechtvaardigheid en gelijkheid.
  - Hij denkt dat socialisme een te oude doctrine is.
  - Geen van bovenstaande.
explanation: |
  Hayek bekritiseert het socialisme niet om zijn doelen, maar om zijn methoden, zoals centrale planning en de afschaffing van privébezit, die hij gevaarlijk acht voor individuele vrijheid en economische efficiëntie.
reviewed: true
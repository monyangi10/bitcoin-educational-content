question: Koje su bile posledice ekonomske krize i gladi u Francuskoj krajem 1791?
answer: Izazvali su talas nereda i ustanaka.
wrong_answers:
  - Doveli su do usvajanja papirnog novca.
  - Predvodili su Skupštinu da konfiskuje imovinu Crkve.
  - Svi gore navedeni odgovori su tačni.
explanation: |
  Ekonomska kriza i glad iz 1791. pogoršali su nezadovoljstvo naroda, izazivajući nerede i pobune kao odgovor na sve veće teškoće, što je označilo porast društvenih tenzija u Francuskoj.

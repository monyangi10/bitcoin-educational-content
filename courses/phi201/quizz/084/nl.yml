question: Wat waren de gevolgen van de economische crisis en hongersnood in Frankrijk eind 1791?
answer: Ze veroorzaakten een golf van rellen en opstanden.
wrong_answers:
  - Ze leidden tot de invoering van papiergeld.
  - Ze leidden de Assemblee ertoe om de bezittingen van de kerk in beslag te nemen.
  - Alle bovenstaande antwoorden zijn juist.
explanation: |
  De economische crisis en hongersnood van 1791 verergerden de ontevredenheid onder de bevolking en leidden tot rellen en opstanden als reactie op de toenemende ontberingen.
reviewed: true
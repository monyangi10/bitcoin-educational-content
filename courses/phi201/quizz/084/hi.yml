question: 1791 के अंत में फ्रांस में आर्थिक संकट और अकाल के क्या परिणाम हुए?  

1. **गरीबी और भूखमरी बढ़ी**: खाद्यान्न की कमी और महंगाई ने आम लोगों को बुरी तरह प्रभावित किया, खासकर ग्रामीण इलाकों और शहरी गरीबों को।  

2. **जनता का गुस्सा**: लोगों ने सरकार और अमीर वर्ग पर आरोप लगाए कि वे अनाज जमा करके कीमतें बढ़ा रहे हैं। इससे दंगे और लूटपाट की घटनाएँ बढ़ीं।  

3. **राजनीतिक अस्थिरता**: आर्थिक हालात ने क्रांति को और तेज कर दिया। लोगों का राजा लुई सोलहवें और राजशाही में विश्वास कम हो गया।  

4. **क्रांतिकारी नेताओं को समर्थन**: मैक्सिमिलियन रोबेस्पियर जैसे नेताओं ने इस संकट का फायदा उठाकर जनता को और ज्यादा उग्र बनाया।  

5. **सरकारी नीतियों में बदलाव**: इस संकट के बाद, नेशनल असेंबली ने खाद्यान्न की कीमतों को नियंत्रित करने और जमाखोरी रोकने के लिए नए कानून बनाए।  

संक्षेप में, यह संकट फ्रांसीसी क्रांति को और भड़काने वाला एक बड़ा कारण बना!
answer: उन्होंने दंगों और विद्रोहों की एक लहर शुरू कर दी।
wrong_answers:
  - इससे कागज़ के पैसे (करेंसी) का चलन शुरू हुआ।
  - उन्होंने असेंबली को चर्च की संपत्ति ज़ब्त करने के लिए प्रेरित किया।
  - ऊपर दिए गए सभी जवाब सही हैं।
explanation: |
  1791 की आर्थिक मंदी और अकाल ने आम लोगों में असंतोष को और बढ़ा दिया, जिससे बढ़ती मुश्किलों के जवाब में दंगे और विद्रोह होने लगे। इससे फ्रांस में सामाजिक तनाव में भी बढ़ोतरी हुई।

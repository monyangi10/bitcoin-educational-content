question: Jaki był biblijny stosunek do pożyczek na procent?
answer: To było zabronione.
wrong_answers:
  - Zachęcał do tego.
  - W niektórych przypadkach tolerował to.
  - Nie miał zdania w tej sprawie.
explanation: |
  Biblia zabrania udzielania pożyczek na procent, zwłaszcza w Starym Testamencie, gdzie pożyczanie na procent wśród członków społeczności jest postrzegane jako niemoralne i sprzeczne z wartościami solidarności.
reviewed: false
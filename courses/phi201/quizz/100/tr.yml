question: Avusturyalıların Marksist sınıf mücadelesi teorisine ilişkin temel eleştirisi nedir?
answer: Toplumun iki karşıt sınıfa bölündüğü fikrine karşı çıkmaktadırlar.
wrong_answers:
  - Toplumsal çatışmaların ana kaynağının sınıf mücadelesi değil, ekonomi olduğunu iddia ediyorlar.
  - İşçiye düşük ücret verildiği fikrini reddediyorlar.
  - Diğer tüm cevaplar doğrudur.
explanation: |
  Avusturyalılar, ekonomik etkileşimlerin sınıflar arasındaki yapısal çatışmalardan ziyade gönüllü işbirliğine dayandığına inanarak, iki düşman sınıfa bölünmüş bir toplum şeklindeki Marksist görüşü reddederler.
reviewed: true
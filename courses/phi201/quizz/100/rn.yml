question: Ni igiki nyamukuru Abanyaotrishe banegura ku bijanye n’inyigisho ya Marx y’urugamba rw’imigwi?
answer: Bahakana iciyumviro c’uko ikibano gicitsemwo imigwi ibiri irwanyanya.
wrong_answers:
  - Bavuga ko ubutunzi ari bwo butera cane amakimbirane mu kibano, atari intambara y’imigwi.
  - Baranka iciyumviro c’uko uwo mukozi ahembwa make.
  - Ibindi bisubizo vyose ni ukuri.
explanation: |
  Abanya Otirishiya banse iciyumviro ca Marxiste c’uko ikibano gica mu migwi ibiri irwanya, bemera ko imigenderanire y’ubutunzi ishingiye ku gukorana n’abandi ku bushake aho gushingiye ku ntambara z’imibumbe hagati y’imigwi.
reviewed: true
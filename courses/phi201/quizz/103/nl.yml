question: Wat is de Oostenrijkse kritiek op de marxistische winsttheorie?
answer: Winst is een noodzakelijke beloning voor ondernemers die risico's nemen en investeren.
wrong_answers:
  - De Oostenrijkers stellen dat winst een vorm van uitbuiting van arbeiders is.
  - De Oostenrijkers bekritiseren de theorie van Marx omdat deze geen rekening houdt met de rol van verdienste.
  - De marxistische theorie van winst dient de belangen van een klasse.
explanation: |
  Voor Oostenrijkse economen is winst de compensatie voor ondernemers voor de genomen risico's en de gedane investeringen, in tegenstelling tot de marxistische visie, die winst ziet als uitbuiting van arbeiders.
reviewed: true
question: 마르크스주의 이윤 이론에 대한 오스트리아의 비판은 무엇인가요?
answer: 위험을 감수하고 투자하는 기업가에게 수익은 필수적인 보상입니다.
wrong_answers:
  - 오스트리아 사람들은 이윤은 노동자에 대한 착취의 한 형태라고 주장합니다.
  - 오스트리아 사람들은 마르크스의 이론이 공로의 역할을 고려하지 않았다고 비판합니다.
  - 마르크스주의의 이윤 이론은 계급의 이익을 위해 봉사합니다.
explanation: |
  오스트리아 경제학자들에게 이윤은 기업가가 감수한 위험과 투자에 대한 보상을 의미하며, 노동자에 대한 착취로 보는 마르크스주의적 관점과 반대되는 개념입니다.
reviewed: true
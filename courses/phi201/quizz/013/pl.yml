question: Jaka jest definicja wolności podana przez Lorda Actona?
answer: Prawo do działania zgodnie z własnym sumieniem, nawet wbrew opinii większości
wrong_answers:
  - Możliwość robienia tego, co się chce
  - Brak jakichkolwiek ograniczeń
  - Ochrona przed inwazją z zewnątrz
explanation: |
  Lord Acton definiuje wolność jako prawo do działania zgodnie z własnym sumieniem, podkreślając znaczenie zdolności jednostki do podejmowania osobistych decyzji, nawet jeśli są one sprzeczne z opinią większości.
reviewed: false
question: लॉर्ड एक्टन ने स्वतंत्रता की परिभाषा कुछ इस तरह दी थी:  

**"स्वतंत्रता का मतलब यह नहीं है कि आप जो चाहें वह करें, बल्कि यह है कि आपको वह करने का अधिकार है जो आपको करना चाहिए।"**  

(मूल अंग्रेज़ी में: *"Liberty is not the power of doing what we like, but the right of being able to do what we ought."*)  

वो यह भी कहते थे कि **"सत्ता भ्रष्ट करती है, और पूर्ण सत्ता पूरी तरह भ्रष्ट कर देती है।"** (Power tends to corrupt, and absolute power corrupts absolutely.)  

साफ़ है, उनके हिसाब से असली आज़ादी बिना ज़िम्मेदारी के नहीं हो सकती!
answer: अपनी अंतरात्मा की आवाज़ के अनुसार काम करने की ताक़त, चाहे बहुमत की राय के ख़िलाफ़ ही क्यों न हो
wrong_answers:
  - जो चाहे वो करने की आज़ादी
  - किसी भी पाबंदी का न होना
  - बाहरी हमलों से सुरक्षा
explanation: |
  लॉर्ड एक्टन आज़ादी को इंसान की अपनी अंतरात्मा के अनुसार काम करने की ताकत के रूप में परिभाषित करते हैं। वे इस बात पर ज़ोर देते हैं कि व्यक्ति को अपने निजी फैसले लेने का हक होना चाहिए, चाहे वह बहुमत की राय के खिलाफ ही क्यों न हो।

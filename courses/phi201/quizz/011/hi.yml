question: लॉर्ड एक्टन का इतिहास पर मुख्य सिद्धांत क्या है?
answer: आज़ादी और ताक़त के बीच का टकराव ही तरक़्क़ी और समाज के विकास की असली वजह है।
wrong_answers:
  - प्रगति सीधी और अनिवार्य है, जो आज़ादी और बराबरी वाले समाज की ओर ले जाती है।
  - इतिहास एक चक्र है जो बार-बार दोहराता है - कभी आज़ादी के दौर, तो कभी ज़ुल्म के ज़माने।
  - आर्थिक कारक इतिहास की दिशा तय करने में सबसे अहम भूमिका निभाते हैं।
explanation: |
  लॉर्ड एक्टन का कहना है कि इतिहास मुख्य रूप से आज़ादी और सत्ता के बीच टकराव से चिह्नित है, और यह संघर्ष प्रगति और समाजों के विकास के लिए ज़रूरी है ताकि व्यक्तिगत स्वतंत्रता बढ़ सके।

question: None nk’uko Bastiat abivuga, isoko y’agahahazo ni iyihe?
answer: Inyota y'ububasha .
wrong_answers:
  - Kamere mbi y'abantu
  - Kubura ububasha
  - Ubusumbane mu vy'ubutunzi
explanation: |
  Bastiat avuga ko inyota y’ubutegetsi ari yo isoko nyamukuru y’agahahazo, avuga ko abafise ubutegetsi kenshi barondera kubwagura no kugenzura abandi, ivyo bikaba bituma habaho ukurenganywa n’uguhohotera uburenganzira bw’umuntu ku giti ciwe.
reviewed: true
question: Jakie jest źródło ucisku według Bastiata?
answer: Pragnienie władzy
wrong_answers:
  - Z natury zła natura ludzi
  - Brak mocy
  - Nierówności ekonomiczne
explanation: |
  Bastiat identyfikuje pragnienie władzy jako podstawowe źródło ucisku, argumentując, że ci, którzy posiadają władzę, często starają się ją rozszerzyć i kontrolować innych, co prowadzi do nadużyć i naruszeń praw jednostki.

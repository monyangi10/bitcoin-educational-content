question: Šta je izvor ugnjetavanja prema Bastijatu?
answer: Žeđ za moći
wrong_answers:
  - Inherentno zla priroda ljudi
  - Odsustvo moći
  - Ekonomske nejednakosti
explanation: |
  Bastiat identifikuje žeđ za moći kao osnovni izvor ugnjetavanja, tvrdeći da oni koji drže moć često nastoje da je prošire i kontrolišu druge, što dovodi do zloupotreba i kršenja individualnih prava.

question: Ni kuki Abanyaotrishe bavuga ko ubusosiyalisimu budashoboka?
answer: Bavuga ko ubusosiyalisiti butagira akamaro mu vy’ubutunzi ariko bukaba bubereye mu vy’inyifato runtu.
wrong_answers:
  - Ubusosiyalisiti burateye kubiri n’ibiremwa.
  - Ubusosiyalisimu burakora neza mu vy’ubutunzi ariko buratera isoni.
  - Abanya Otirishiya baranegura ubusosiyalisimu kuko butarekura ubuhinga bushasha no kurema ubutunzi.
explanation: |
  Abahinga mu vy’ubutunzi bo mw’ishure ry’i Otirishiya babona ko ubusosiyalisimu butagira akamaro mu vy’ubutunzi kubera ko ata buryo bwo gutanga ibiciro ku buntu, bukenewe kugira ngo ubutunzi buhuzwe neza, naho rimwe na rimwe bemera ko bufise imigambi yo mu vy’inyifato runtu.
reviewed: true
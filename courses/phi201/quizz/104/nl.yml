question: Waarom beweren Oostenrijkers dat socialisme onmogelijk te realiseren is?
answer: Ze beweren dat socialisme economisch inefficiënt is, maar moreel rechtvaardig.
wrong_answers:
  - Socialisme is in strijd met de natuur.
  - Socialisme is economisch efficiënt maar immoreel.
  - Oostenrijkers bekritiseren het socialisme omdat het geen ruimte biedt voor innovatie en het creëren van welvaart.
explanation: |
  Economen van de Oostenrijkse school beschouwen socialisme als economisch inefficiënt door de afwezigheid van vrije prijsmechanismen die nodig zijn om de economie effectief te coördineren, ook al erkennen ze soms de morele bedoelingen ervan.
reviewed: true
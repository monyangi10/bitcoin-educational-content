question: Dlaczego Austriacy twierdzą, że socjalizm jest niemożliwy do osiągnięcia?
answer: Twierdzą oni, że socjalizm jest ekonomicznie nieefektywny, ale moralnie sprawiedliwy.
wrong_answers:
  - Socjalizm jest sprzeczny z naturą.
  - Socjalizm jest wydajny ekonomicznie, ale niemoralny.
  - Austriacy krytykują socjalizm, ponieważ nie pozwala on na innowacje i tworzenie bogactwa.
explanation: |
  Ekonomiści ze szkoły austriackiej uważają, że socjalizm jest ekonomicznie nieefektywny z powodu braku wolnych mechanizmów cenowych, niezbędnych do skutecznej koordynacji gospodarki, nawet jeśli czasami uznają jego moralne intencje.
question: Wat is volgens Bastiat de ergste vorm van plundering?
answer: Belastingen en monopolies
wrong_answers:
  - Diefstal gepleegd door een individu tegen een ander
  - Oorlog en veroveringen
  - Alle vormen van plundering zijn even slecht
explanation: |
  Bastiat beschouwt belastingen en monopolies als de ergste vorm van plundering omdat ze door de staat worden gelegitimeerd, wat leidt tot een systematische toe-eigening van de middelen en vrijheden van individuen, vaak onder het mom van het algemeen belang.
reviewed: true
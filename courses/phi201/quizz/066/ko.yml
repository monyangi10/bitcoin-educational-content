question: 상업과 종교적 관용의 연관성에 대한 볼테르의 주요 논지는 무엇인가요?
answer: 상거래는 사람들이 공동의 이익 추구를 통해 종교적 신념을 포함한 서로의 의견을 존중하고 협력하도록 장려합니다.
wrong_answers:
  - 커머스는 과학적 방법에 기반한 공유된 세계관을 통해 사람들을 통합합니다.
  - 상거래는 사치와 게으름을 조장합니다.
  - 다른 모든 정답이 맞습니다.
explanation: |
  볼테르는 상업이 서로 다른 신념을 가진 개인들이 공동의 경제적 이익을 추구하기 위해 협력하고 서로의 의견을 존중하도록 촉구함으로써 종교적 관용을 촉진한다고 주장합니다.
reviewed: true
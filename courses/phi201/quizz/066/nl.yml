question: Wat is Voltaires belangrijkste stelling over het verband tussen commercie en religieuze tolerantie?
answer: Handel moedigt mensen aan om samen te werken en elkaars meningen te respecteren, inclusief hun religieuze overtuigingen, door het gezamenlijke streven naar winst.
wrong_answers:
  - Handel verenigt mensen door een gedeeld wereldbeeld gebaseerd op de wetenschappelijke methode.
  - Handel bevordert luxe en luiheid.
  - Alle andere antwoorden zijn juist.
explanation: |
  Voltaire stelt dat commercie religieuze tolerantie bevordert door individuen met verschillende geloofsovertuigingen aan te sporen om samen te werken en hun meningen wederzijds te respecteren bij het nastreven van gedeelde economische belangen.
reviewed: true
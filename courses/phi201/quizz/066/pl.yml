question: Jaka jest główna teza Voltaire'a dotycząca związku między handlem a tolerancją religijną?
answer: Handel zachęca ludzi do współpracy i wzajemnego poszanowania swoich opinii, w tym przekonań religijnych, poprzez wspólne dążenie do zysku.
wrong_answers:
  - Handel jednoczy ludzi poprzez wspólny światopogląd oparty na metodzie naukowej.
  - Handel promuje luksus i lenistwo.
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  Voltaire argumentuje, że handel sprzyja tolerancji religijnej, zachęcając osoby o różnych przekonaniach do współpracy i wzajemnego poszanowania swoich opinii w dążeniu do wspólnych interesów gospodarczych.
reviewed: false
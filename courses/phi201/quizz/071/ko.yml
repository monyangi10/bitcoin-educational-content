question: 피지오크랫츠의 모토는 무엇인가요?
answer: 자유방임, 자유방임 통과자.
wrong_answers:
  - 국가는 은행, 판매자, 공급자의 역할을 동시에 수행합니다.
  - 프랑스는 영국과 네덜란드의 파멸을 통해서만 부유해질 수 있었습니다.
  - 듀퐁 드 네모르가 요약한 정치경제학은 문명 사회에 적용되는 자연법칙의 과학입니다.
explanation: |
  "자유방임, 자유방임주의자"라는 피지오크라트의 모토는 국가의 개입이 없어 시장의 자연스러운 힘이 자유롭게 균형을 이룰 때 경제가 번성한다는 믿음을 표현한 것입니다.
reviewed: true
question: Wat zijn de twee vormen van plundering die Bastiat beschrijft?
answer: Legale en illegale plundering
wrong_answers:
  - Morele plundering en immorele plundering
  - Interne plundering en externe plundering
  - Plundering van goederen en plundering van diensten
explanation: |
  Bastiat maakt onderscheid tussen legale plundering, die door de wet wordt gedefinieerd en vaak door de staat wordt uitgevoerd (zoals belastingen), en illegale plundering, die buiten het wettelijke kader plaatsvindt, zoals diefstal of mishandeling.
reviewed: true
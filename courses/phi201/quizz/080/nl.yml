question: Wat is het belangrijkste verschil tussen de theorieën van Locke en Rousseau over soevereiniteit?
answer: Locke geloofde dat soevereiniteit beperkt werd door natuurlijke rechten, terwijl Rousseau geloofde dat het onbeperkt was.
wrong_answers:
  - Locke geloofde dat soevereiniteit toebehoorde aan de monarch, terwijl Rousseau geloofde dat het toebehoorde aan het volk.
  - Locke geloofde dat de beste regeringsvorm een democratie was, terwijl Rousseau geloofde dat de beste regeringsvorm een republiek was.
  - Alle andere antwoorden zijn juist.
explanation: |
  Locke stelde dat de soevereiniteit van de staat beperkt wordt door de natuurlijke rechten van individuen. Rousseau daarentegen vond dat de algemene soevereiniteit onbeperkt kon worden uitgeoefend in naam van de collectieve wil.
reviewed: true
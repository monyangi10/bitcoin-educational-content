question: Ni itandukaniro irihe rikomeye riri hagati y’ivyiyumviro vya Locke na Rousseau ku bijanye n’ubusegaba?
answer: Locke yarizera ko ubusegaba bufise aho bugarukira kubera uburenganzira bw’abantu, mu gihe Rousseau we yizera ko butagira aho bugarukira.
wrong_answers:
  - Locke yarizera ko ubusegaba ari ubw’umwami, mu gihe Rousseau yarizera ko ari ubw’abantu.
  - Locke yarizera ko uburyo bwiza bwo gutwara ari demokarasi, mu gihe Rousseau we yizera ko uburyo bwiza bwo gutwara ari repubulika.
  - Ibindi bisubizo vyose ni ukuri.
explanation: |
  Locke yavuze ko ubusegaba bwa Leta buzitirwa n’uburenganzira bw’abantu ku giti cabo. Mu buryo butandukanye n’ubwo, Rousseau yumvise ko ubusegaba rusangi bushobora gukoreshwa ata n’aho bugarukira mw’izina ry’ubushake rusangi.
reviewed: true
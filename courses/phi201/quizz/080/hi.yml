question: लॉक और रूसो की संप्रभुता के सिद्धांतों में मुख्य अंतर क्या है?
answer: लॉक का मानना था कि संप्रभुता प्राकृतिक अधिकारों द्वारा सीमित होती है, जबकि रूसो का मानना था कि यह असीमित है।
wrong_answers:
  - लॉक का मानना था कि संप्रभुता राजा के पास होनी चाहिए, जबकि रूसो का मानना था कि यह जनता के पास होनी चाहिए।
  - लॉक का मानना था कि सबसे अच्छी सरकार लोकतंत्र होती है, जबकि रूसो का मानना था कि सबसे अच्छी सरकार गणतंत्र होती है।
  - बाकी सारे जवाब सही हैं।
explanation: |
  लॉक ने तर्क दिया कि राज्य की संप्रभुता व्यक्तियों के प्राकृतिक अधिकारों से सीमित होती है, जबकि रूसो का मानना था कि सामूहिक इच्छा के नाम पर सामान्य संप्रभुता को बिना किसी सीमा के प्रयोग किया जा सकता है।

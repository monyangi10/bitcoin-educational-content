question: '모든 것에는 이유가 있지만 신에게는 이유가 없다'는 에크하르트의 말은 어떤 의미일까요?
answer: 신은 인간의 이성으로는 이해할 수 없으며 이성적인 원인으로 설명할 수 없습니다.
wrong_answers:
  - 믿음은 이성보다 우월하므로 이성적인 의심을 받아서는 안 됩니다.
  - 이성적인 지식의 추구는 헛된 것이며 우리를 하나님께로 인도할 수 없습니다.
  - 위의 정답은 모두 정답입니다.
explanation: |
  에크하르트는 신은 이성적 개념과 인간의 설명을 초월한다는 생각을 전합니다. 피조물과 달리 신은 인간의 정신이 이해할 수 있는 원인과 이유의 지배를 받지 않습니다.
reviewed: true
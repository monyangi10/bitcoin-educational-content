question: Wat is de betekenis van Eckhart's zin Alle dingen hebben een waarom, maar God heeft geen waarom?
answer: God is onbegrijpelijk voor de menselijke rede en kan niet verklaard worden door rationele oorzaken.
wrong_answers:
  - Geloof is superieur aan rede en mag niet onderworpen worden aan rationele vragen.
  - Het nastreven van rationele kennis is zinloos en kan ons niet naar God leiden.
  - Alle bovenstaande antwoorden zijn juist.
explanation: |
  Meester Eckhart brengt het idee over dat God rationele concepten en menselijke verklaringen overstijgt. In tegenstelling tot geschapen dingen is God niet onderworpen aan oorzaken en redenen die het menselijk verstand kan begrijpen.
reviewed: true
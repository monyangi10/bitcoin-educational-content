question: प्रकृति को तर्क के जरिए समझने वाले पहले दार्शनिक कौन थे?
answer: प्री-सॉक्रेटिक दार्शनिक
wrong_answers:
  - यूनानी पुजारी
  - यूनानी कवि
  - यूनानी गणितज्ञ
explanation: |
  प्री-सॉक्रेटिक दार्शनिक प्रकृति को समझने के लिए तर्क का इस्तेमाल करने वाले पहले लोग थे। वे पौराणिक कथाओं से अलग, दुनिया की व्याख्या करने के लिए तर्कसंगत और सार्वभौमिक सिद्धांतों की तलाश कर रहे थे।

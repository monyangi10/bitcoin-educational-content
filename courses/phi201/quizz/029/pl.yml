question: Kim byli pierwsi filozofowie, którzy starali się zrozumieć naturę za pomocą rozumu?
answer: Filozofowie przedsokratejscy
wrong_answers:
  - Greccy kapłani
  - Greccy poeci
  - Greccy matematycy
explanation: |
  Filozofowie przedsokratejscy byli pierwszymi, którzy użyli rozumu, aby spróbować zrozumieć naturę, szukając racjonalnych i uniwersalnych zasad wyjaśniających świat, niezależnie od wyjaśnień mitologicznych.

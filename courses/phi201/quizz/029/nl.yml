question: Wie waren de eerste filosofen die de natuur probeerden te begrijpen door middel van de rede?
answer: De pre-Socratische filosofen
wrong_answers:
  - De Griekse priesters
  - De Griekse dichters
  - De Griekse wiskundigen
explanation: |
  De pre-Socratische filosofen waren de eersten die de rede gebruikten om de natuur te begrijpen, op zoek naar rationele en universele principes om de wereld te verklaren, los van mythologische verklaringen.
reviewed: true
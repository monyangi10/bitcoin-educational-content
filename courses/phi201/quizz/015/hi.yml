question: मार्क्स ने इतिहास का क्या नजरिया पेश किया है?
answer: इतिहास सामाजिक वर्गों के बीच संघर्ष का नतीजा है
wrong_answers:
  - इतिहास एक सीधी रेखा में बुर्जुआ समाज की ओर बढ़ता है
  - इतिहास एक चक्र है जहां आज़ादी के दौर के बाद तानाशाही का दौर आता है
  - इतिहास जलवायु कारकों से निर्धारित होता है
explanation: |
  मार्क्स इतिहास को सामाजिक वर्गों के बीच संघर्ष का नतीजा मानते हैं। उनका कहना है कि शोषक और शोषित वर्गों के बीच का तनाव ही हर युग में सामाजिक और आर्थिक बदलाव की असली वजह रहा है।
reviewed: false
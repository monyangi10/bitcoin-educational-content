question: 하이에크가 노예를 피하기 위해 제안한 해결책은 무엇인가요?
answer: 폭정에 대항하는 보루로서 사유 재산과 시장의 자발적 질서를 보호하세요.
wrong_answers:
  - 그는 빈곤층을 돕기 위해 세금을 인상해야 한다고 주장합니다.
  - 그는 봉건적 경제 체제로의 회귀를 요구합니다.
  - 대중에게 도로 규칙을 교육하세요.
explanation: |
  하이에크는 개인의 자유는 사유 재산을 보호하고 시장의 자율 규제를 허용함으로써 권위주의적 표류와 권력의 중앙 집중화를 방지함으로써 지켜질 수 있다고 믿었습니다.
reviewed: true
question: Wat is de oplossing die Hayek voorstelt om slavernij te vermijden?
answer: Verdedig privébezit en de spontane orde van de markt als bolwerken tegen tirannie.
wrong_answers:
  - Hij pleit voor een belastingverhoging om de armen te helpen.
  - Hij roept op tot een terugkeer naar een feodaal economisch systeem.
  - Het publiek voorlichten over verkeersregels.
explanation: |
  Hayek gelooft dat individuele vrijheid behouden blijft door privébezit te beschermen en de markt toe te staan zichzelf te reguleren, waardoor autoritaire drift en centralisatie van macht wordt voorkomen.
reviewed: true
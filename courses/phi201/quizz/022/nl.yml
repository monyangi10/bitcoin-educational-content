question: Hoe karakteriseert Rothbard de staat?
answer: Een parasiet die leeft ten koste van de productieve samenleving en vooruitgang belemmert
wrong_answers:
  - Een essentieel instrument voor de bescherming van individuele rechten en vrijheden
  - Een noodzakelijk kwaad om orde en sociale stabiliteit te garanderen
  - Een neutrale kracht die ten goede of ten kwade kan worden gebruikt, afhankelijk van de omstandigheden
explanation: |
  Rothbard beschrijft de staat als een parasiet en stelt dat de staat zich middelen toe-eigent van de productieve samenleving en de economische en sociale vooruitgang belemmert, waardoor de vrijheid en het individuele initiatief worden geschaad.
reviewed: true
question: Jak Rothbard charakteryzuje państwo?
answer: Pasożyt, który żyje kosztem produktywnego społeczeństwa i hamuje postęp
wrong_answers:
  - Podstawowy instrument ochrony praw i wolności jednostki
  - Zło konieczne dla zapewnienia porządku i stabilności społecznej
  - Neutralna siła, która może być użyta dla dobra lub zła w zależności od okoliczności
explanation: |
  Rothbard opisuje państwo jako pasożyta, argumentując, że przywłaszcza ono zasoby od produktywnego społeczeństwa, jednocześnie utrudniając postęp gospodarczy i społeczny, szkodząc w ten sposób wolności i indywidualnej inicjatywie.

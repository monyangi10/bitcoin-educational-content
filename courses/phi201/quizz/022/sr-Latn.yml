question: Kako Rothbard karakteriše Državu?
answer: Parazit koji živi na račun produktivnog društva i ometa napredak
wrong_answers:
  - Osnovni instrument za zaštitu individualnih prava i sloboda
  - Neophodno zlo za obezbeđivanje reda i društvene stabilnosti
  - Neutralna sila koja se može koristiti za dobro ili zlo u zavisnosti od okolnosti
explanation: |
  Rothbard opisuje Državu kao parazita, tvrdeći da ona prisvaja resurse od produktivnog društva dok ometa ekonomski i društveni napredak, čime šteti slobodi i individualnoj inicijativi.

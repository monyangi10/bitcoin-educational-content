question: None Rothbard yerekana gute Leta?
answer: Igikoko kibaho ku giciro c'ikibano c'umwimbu kandi kigatuma umuntu adatera imbere .
wrong_answers:
  - Igikoresho nyamukuru co gukingira uburenganzira n'umwidegemvyo w'umuntu ku giti ciwe
  - Ikibi gikenewe kugira ngo habeho urutonde n'ugutekana kw'imibano
  - Inkomezi zitagira aho zigarukira zishobora gukoreshwa mu vyiza canke mu bibi, bivanye n’ingene ibintu vyifashe .
explanation: |
  Rothbard adondora Leta nk’ikintu gitera indwara, avuga ko yigarurira ubutunzi buva mu kibano c’umwimbu mu gihe ibuza iterambere ry’ubutunzi n’imibano, gutyo igatuma umwidegemvyo n’ugushinga intahe kw’umuntu ku giti ciwe bihungabana.
reviewed: true
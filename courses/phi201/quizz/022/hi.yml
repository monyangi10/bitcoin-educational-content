question: रॉथबर्ड राज्य को कैसे परिभाषित करते हैं?
answer: एक ऐसा परजीवी जो मेहनतकश समाज की कीमत पर जीता है और तरक्की में रुकावट डालता है।
wrong_answers:
  - व्यक्तिगत अधिकारों और आज़ादी की सुरक्षा के लिए एक ज़रूरी उपकरण
  - एक ज़रूरी बुराई जो व्यवस्था और सामाजिक स्थिरता बनाए रखने के लिए ज़रूरी है
  - एक ऐसी तटस्थ शक्ति जिसे परिस्थितियों के अनुसार अच्छे या बुरे काम के लिए इस्तेमाल किया जा सकता है
explanation: |
  रॉथबर्ड राज्य को एक परजीवी के रूप में वर्णित करते हैं, यह तर्क देते हुए कि यह उत्पादक समाज से संसाधनों का हरण करता है जबकि आर्थिक और सामाजिक प्रगति में बाधा डालता है, इस प्रकार स्वतंत्रता और व्यक्तिगत पहल को नुकसान पहुँचाता है।

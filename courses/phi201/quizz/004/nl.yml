question: Wat is het fundamentele verschil tussen de filosofie van vrijheid en de filosofie van macht?
answer: Alle andere antwoorden
wrong_answers:
  - De filosofie van vrijheid begunstigt het individu, terwijl de filosofie van macht de samenleving begunstigt
  - De vrijheidsfilosofie hecht waarde aan privébezit, terwijl de machtsfilosofie waarde hecht aan het collectieve belang
  - De filosofie van vrijheid is gebaseerd op natuurrecht, terwijl de filosofie van macht is gebaseerd op positief recht
explanation: |
  Het fundamentele verschil ligt in het feit dat de vrijheidsfilosofie de nadruk legt op het individu en zijn rechten, terwijl de machtsfilosofie zich richt op sociale en politieke structuren, vaak ten koste van individuele autonomie en privébezit.
reviewed: true
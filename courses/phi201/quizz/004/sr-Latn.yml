question: Koja je osnovna razlika između filozofije slobode i filozofije moći?
answer: Svi ostali odgovori
wrong_answers:
  - Filozofija slobode favorizuje pojedinca dok filozofija moći favorizuje društvo
  - Filozofija slobode ceni privatnu svojinu dok filozofija moći ceni kolektivni interes
  - Filozofija slobode zasniva se na prirodnom pravu dok se filozofija moći zasniva na pozitivnom pravu
explanation: |
  Fundamentalna razlika leži u činjenici da filozofija slobode naglašava pojedinca i njegova prava, dok se filozofija moći fokusira na društvene i političke strukture, često na račun individualne autonomije i privatne svojine.
reviewed: false
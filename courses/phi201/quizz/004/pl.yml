question: Jaka jest zasadnicza różnica między filozofią wolności a filozofią władzy?
answer: Wszystkie pozostałe odpowiedzi
wrong_answers:
  - Filozofia wolności faworyzuje jednostkę, podczas gdy filozofia władzy faworyzuje społeczeństwo
  - Filozofia wolności ceni własność prywatną, podczas gdy filozofia władzy ceni interes zbiorowy
  - Filozofia wolności opiera się na prawie naturalnym, podczas gdy filozofia władzy opiera się na prawie pozytywnym
explanation: |
  Podstawowa różnica polega na tym, że filozofia wolności kładzie nacisk na jednostkę i jej prawa, podczas gdy filozofia władzy koncentruje się na strukturach społecznych i politycznych, często kosztem autonomii jednostki i własności prywatnej.
reviewed: false
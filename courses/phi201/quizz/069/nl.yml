question: Wat was Turgots houding ten opzichte van religieuze waarheid?
answer: Religieuze waarheid is een zaak van het individuele geweten en kan door geen enkele autoriteit worden opgelegd.
wrong_answers:
  - Religieuze waarheid is relatief en hangt af van de cultuur en het tijdperk waarin men leeft.
  - Religieuze waarheid is ontoegankelijk voor de mens en kan niet het onderwerp zijn van enige zekerheid.
  - De religieuze waarheid moet door de politieke macht worden bepaald en aan alle burgers worden opgelegd.
explanation: |
  Turgot beschouwde de religieuze waarheid als een persoonlijke zaak die tot het individuele geweten behoort en stelde dat de overheid niet het recht heeft om religieuze overtuigingen aan individuen op te leggen.
reviewed: true
question: Jaki był stosunek Turgota do prawdy religijnej?
answer: Prawda religijna jest kwestią indywidualnego sumienia i nie może być narzucona przez żaden autorytet.
wrong_answers:
  - Prawda religijna jest względna i zależy od kultury i epoki, w której żyjemy.
  - Prawda religijna jest niedostępna dla człowieka i nie może być przedmiotem żadnej pewności.
  - Prawda religijna musi być określona przez władzę polityczną i narzucona wszystkim obywatelom.
explanation: |
  Turgot uważał prawdę religijną za osobistą sprawę dotyczącą indywidualnego sumienia, twierdząc, że władza nie ma prawa narzucać jednostkom przekonań religijnych.

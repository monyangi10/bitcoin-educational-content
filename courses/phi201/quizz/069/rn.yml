question: None Turgot yari afise inyifato iyihe ku bijanye n’ukuri kw’idini?
answer: Ukuri kw’idini ni ikibazo c’ijwi ryo mu mutima ry’umuntu ku giti ciwe kandi nta bukuru na bumwe bushobora gutegekwa.
wrong_answers:
  - Ukuri kw’idini kuragereranywa kandi kuvana n’umuco n’igihe umuntu abayemwo.
  - Ukuri kw’idini ntigushobora gushikirwa n’umuntu kandi ntigushobora kuba ikintu co gushingirako ata gukeka.
  - Ukuri kw’idini gutegerezwa gushingwa n’ububasha bwa politike kandi kugategekwa abanyagihugu bose.
explanation: |
  Turgot yabona ko ukuri kw’idini ari ikintu c’umuntu ku giti ciwe kijanye n’ijwi ryo mu mutima ry’umuntu ku giti ciwe, akavuga yuko ubukuru butagira uburenganzira bwo gutegeka umuntu ku giti ciwe ivyo yemera mu vy’idini.
reviewed: true
question: Koja je bila jedinstvena karakteristika Rimskog carstva koja je omogućila razvoj složenog pravnog sistema?
answer: Njegova prostranost i kulturna i jezička raznolikost
wrong_answers:
  - Njegova organizacija u nezavisne gradove-države
  - Njegov apsolutni monarhijski politički sistem
  - Njegovo pridržavanje verskih tradicija
explanation: |
  Rimsko carstvo, sa svojim ogromnim prostranstvom i raznolikošću naroda i kultura, zahtevalo je složen pravni sistem sposoban da se prilagodi različitim stvarnostima različitih provincija, dok istovremeno ujedinjuje Carstvo pod zajedničkim pravnim principima.

question: Wat was het unieke kenmerk van het Romeinse Rijk dat de ontwikkeling van een complex rechtssysteem mogelijk maakte?
answer: Zijn uitgestrektheid en culturele en taalkundige diversiteit
wrong_answers:
  - De organisatie in onafhankelijke stadstaten
  - Het is een absoluut monarchaal politiek systeem
  - Het vasthouden aan religieuze tradities
explanation: |
  Het Romeinse Rijk, met zijn immense uitgestrektheid en grote verscheidenheid aan volkeren en culturen, vereiste een verfijnd rechtssysteem dat rekening kon houden met de verschillende realiteiten van de verschillende provincies en tegelijkertijd het Rijk kon verenigen onder gemeenschappelijke juridische principes.
reviewed: true
question: Wat is de reikwijdte van de ethische revolutie die de Bijbel teweeg heeft gebracht?
answer: Alle andere antwoorden zijn juist.
wrong_answers:
  - Het leidt tot een nieuw concept van rechtvaardigheid gebaseerd op gelijkheid en mededogen.
  - Het daagt uit tot passieve aanvaarding van lijden en moedigt aan tot actie om het te verlichten.
  - Het legt de basis voor een moreel universalisme dat de gelijke waarde van elk menselijk wezen erkent.
explanation: |
  De Bijbel introduceerde een ethische revolutie door concepten van rechtvaardigheid voor te stellen die gebaseerd zijn op gelijkheid en mededogen, die actie tegen lijden waarderen en die de basis leggen voor een moreel universalisme waarin elk individu intrinsieke waardigheid bezit.
reviewed: true
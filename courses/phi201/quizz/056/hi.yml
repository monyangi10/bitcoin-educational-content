question: बाइबल द्वारा लाई गई नैतिक क्रांति का दायरा क्या है?
answer: बाकी सारे जवाब सही हैं।
wrong_answers:
  - यह समानता और दया पर आधारित न्याय की एक नई अवधारणा की ओर ले जाता है।
  - यह दुख को चुपचाप स्वीकार करने को चुनौती देता है और उसे कम करने के लिए कदम उठाने को प्रोत्साहित करता है।
  - यह हर इंसान की बराबर कीमत को मानने वाले नैतिक सार्वभौमिकता की बुनियाद रखता है।
explanation: |
  बाइबल ने एक नैतिक क्रांति पेश की, जिसमें समानता और करुणा पर आधारित न्याय के विचार, दुख के खिलाफ कार्रवाई को महत्व देने, और एक नैतिक सार्वभौमिकता की नींव रखी जहाँ हर व्यक्ति का अपना आंतरिक मूल्य होता है।

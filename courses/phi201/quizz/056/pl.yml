question: Jaki jest zakres rewolucji etycznej wywołanej przez Biblię?
answer: Wszystkie pozostałe odpowiedzi są poprawne.
wrong_answers:
  - Prowadzi to do nowej koncepcji sprawiedliwości opartej na równości i współczuciu.
  - Rzuca wyzwanie biernej akceptacji cierpienia i zachęca do działania w celu jego złagodzenia.
  - Kładzie podwaliny pod moralny uniwersalizm uznający równą wartość każdej istoty ludzkiej.
explanation: |
  Biblia wprowadziła rewolucję etyczną, proponując koncepcje sprawiedliwości oparte na równości i współczuciu, doceniając działania przeciwko cierpieniu i kładąc podwaliny pod moralny uniwersalizm, w którym każda jednostka posiada wewnętrzną godność.
reviewed: false
question: Kakav je obim etičke revolucije koju je donela Biblija?
answer: Svi ostali odgovori su tačni.
wrong_answers:
  - To vodi do novog koncepta pravde zasnovanog na jednakosti i saosećanju.
  - Izaziva pasivno prihvatanje patnje i podstiče akciju za njeno ublažavanje.
  - Postavlja temelje za moralni univerzalizam koji prepoznaje jednaku vrednost svakog ljudskog bića.
explanation: |
  Biblija je uvela etičku revoluciju predlažući koncepte pravde zasnovane na jednakosti i saosećanju, vrednujući akciju protiv patnje i postavljajući temelje za moralni univerzalizam gde svaka individua poseduje intrinzično dostojanstvo.

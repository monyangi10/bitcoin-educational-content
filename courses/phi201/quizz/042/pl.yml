question: Jaka jest funkcja prawa naturalnego według świętego Tomasza z Akwinu?
answer: Oświeca sumienia ludzi i pozwala im dokonywać słusznych wyborów moralnych.
wrong_answers:
  - Prowadzi ludzi ku zbawieniu, objawiając Bożą wolę.
  - Pozwala na poznanie praw natury.
  - To rodzaj instynktu.
explanation: |
  Według św. Tomasza z Akwinu, funkcją prawa naturalnego jest oświecanie ludzkiego sumienia, dostarczanie uniwersalnych wzorców moralnych, które pomagają jednostkom dostrzec i wybrać to, co dobre w ich działaniach.
reviewed: false
question: Wat is de functie van de natuurwet volgens Thomas van Aquino?
answer: Het verlicht het geweten van mensen en stelt hen in staat om rechtvaardige morele keuzes te maken.
wrong_answers:
  - Het leidt mensen naar verlossing door Gods wil te openbaren.
  - Het maakt de kennis van de natuurwetten mogelijk.
  - Het is een soort instinct.
explanation: |
  Volgens de heilige Thomas van Aquino is de functie van de natuurwet om het menselijk geweten te verlichten, door universele morele maatstaven aan te reiken die mensen helpen om te onderscheiden en te kiezen wat goed is in hun handelingen.
reviewed: true
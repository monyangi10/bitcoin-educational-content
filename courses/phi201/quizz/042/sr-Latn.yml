question: Koja je funkcija prirodnog zakona prema Svetom Tomi Akvinskom?
answer: Osvetljava savest ljudi i omogućava im da donose pravedne moralne izbore.
wrong_answers:
  - Ono vodi ljude ka spasenju otkrivajući Božiju volju.
  - Omogućava poznavanje zakona prirode.
  - To je neka vrsta instinkta.
explanation: |
  Prema Svetom Tomi Akvinskom, funkcija prirodnog zakona je da prosvetli ljudsku savest, pružajući univerzalne moralne standarde koji pomažu pojedincima da razluče i izaberu ono što je dobro u njihovim delima.

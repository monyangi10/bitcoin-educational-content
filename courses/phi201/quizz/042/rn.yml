question: Ni igiki gikorwa n’itegeko ry’ibidukikije nk’uko Tomasi mweranda w’i Aquin abivuga?
answer: Iramurikira ijwi ryo mu mutima ry’abantu kandi ikabareka bagahitamwo mu buryo bubereye mu vy’inyifato runtu.
wrong_answers:
  - Iyobora abantu ku gakiza mu guhishura ubugombe bw’Imana.
  - Bituma umuntu amenya amategeko y’ibidukikije.
  - Ni ubwoko bw’akameremere.
explanation: |
  Nk’uko Tomasi mweranda w’Aquin abivuga, igikorwa c’itegeko ry’ibidukikije ni ugumurikira ijwi ryo mu mutima ry’umuntu, rigatanga ingingo ngenderwako z’inyifato runtu zo kw’isi yose zifasha umuntu ku giti ciwe gutahura no guhitamwo iciza mu bikorwa vyiwe.
reviewed: true
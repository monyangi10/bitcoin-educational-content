question: संत थॉमस एक्विनास के अनुसार प्राकृतिक नियम (नेचुरल लॉ) का क्या कार्य है?
answer: यह इंसान की अंतरात्मा को जगाता है और उन्हें सही नैतिक फैसले लेने में मदद करता है।
wrong_answers:
  - यह पुरुषों को भगवान की इच्छा बताकर मोक्ष की ओर ले जाता है।
  - यह प्रकृति के नियमों का ज्ञान देता है।
  - यह एक तरह का स्वाभाविक ज्ञान है।
explanation: |
  संत थॉमस एक्विनास के अनुसार, प्राकृतिक नियम (नेचुरल लॉ) का काम है इंसानी अंतरात्मा को जागृत करना। यह सार्वभौमिक नैतिक मानक देता है जो लोगों को अच्छे-बुरे की पहचान करने और सही कर्म चुनने में मदद करता है।
reviewed: false
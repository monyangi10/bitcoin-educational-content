question: 성 토마스 아퀴나스에 따르면 자연법의 기능은 무엇인가요?
answer: 그것은 인간의 양심을 일깨우고 정당한 도덕적 선택을 할 수 있게 해줍니다.
wrong_answers:
  - 하나님의 뜻을 드러냄으로써 인간을 구원으로 인도합니다.
  - 이를 통해 자연의 법칙에 대한 지식을 얻을 수 있습니다.
  - 일종의 본능입니다.
explanation: |
  성 토마스 아퀴나스에 따르면 자연법의 기능은 인간의 양심을 일깨워 개인이 자신의 행동에서 무엇이 선한 것인지 분별하고 선택할 수 있도록 보편적인 도덕적 기준을 제공하는 것입니다.
reviewed: true
question: एडम स्मिथ की किताब का क्या नाम है?
answer: "राष्ट्रों की संपत्ति के स्वरूप और कारणों की जांच।"
wrong_answers:
  - "राष्ट्रों के धन की प्रकृति और भावना पर एक जांच।"
  - "राष्ट्रों की संपत्ति की प्रकृति और उत्पत्ति पर एक जांच।"
  - "राष्ट्रों की संपत्ति के कारण और उत्पत्ति की जाँच।"
explanation: |
  एडम स्मिथ की किताब का पूरा नाम, "अन इंक्वायरी इन्टू द नेचर एंड कॉजेज़ ऑफ द वेल्थ ऑफ नेशंस", उनके आर्थिक समृद्धि में योगदान देने वाले कारकों के विश्लेषण को उजागर करता है, जो धन उत्पादन और वितरण के तंत्र की खोज करता है।
reviewed: false
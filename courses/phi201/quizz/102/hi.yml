question: ऑस्ट्रियाई आलोचना मार्क्स के श्रम मूल्य सिद्धांत के बारे में क्या कहती है?
answer: ऑस्ट्रियाई लोग कहते हैं कि मूल्य व्यक्तिपरक होता है और उपभोक्ता की पसंद से तय होता है, न कि मेहनत से।
wrong_answers:
  - वे कहते हैं कि मार्क्स का सिद्धांत मेहनत की मुश्किल को ध्यान में नहीं रखता।
  - ऑस्ट्रियाई लोग मार्क्स के सिद्धांत की आलोचना करते हैं क्योंकि यह अक्षम है।
  - ऑस्ट्रियाई लोग मार्क्स के सिद्धांत की आलोचना करते हैं क्योंकि श्रम-मूल्य एक पूंजीवादी गुण है।
explanation: |
  ऑस्ट्रियन स्कूल का मानना है कि मूल्य व्यक्तिपरक होता है, जो उपभोक्ताओं की व्यक्तिगत पसंद से तय होता है। यह मार्क्सवादी सिद्धांत के विपरीत है, जो मूल्य को श्रम के समय और मेहनत से जोड़ता है।

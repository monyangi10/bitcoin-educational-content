question: 바스티아트가 말하는 약탈 이야기의 핵심 아이디어는 무엇인가요?
answer: 자유와 억압 사이에서 끊임없이 투쟁하는 이야기
wrong_answers:
  - 문명의 발전과 쇠퇴를 반복하는 이야기입니다
  - 경제적 요인에 의해 결정되는 스토리
  - 이 이야기는 변하지 않는 인간의 본성에 대한 이야기입니다
explanation: |
  바스티아트에 따르면, 약탈 이야기의 핵심은 개인의 자유와 억압의 세력 사이의 지속적인 투쟁에 있으며, 일부의 특권은 종종 다른 사람의 권리와 자유를 희생하여 얻어지는 경우가 많습니다.
reviewed: true
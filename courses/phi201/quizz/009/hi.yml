question: बास्तिया के अनुसार 'प्लंडर' (लूट) कहानी का मुख्य विचार क्या है?
answer: कहानी आज़ादी और ज़ुल्म के बीच लगातार जंग है।
wrong_answers:
  - कहानी सभ्यताओं के उत्थान और पतन का एक चक्र है
  - कहानी आर्थिक कारकों से तय होती है
  - कहानी अपरिवर्तनीय मानव प्रकृति की एक कथा है
explanation: |
  बास्तियात के अनुसार, लूट की कहानी का मुख्य विचार व्यक्तिगत स्वतंत्रता और उत्पीड़न की ताकतों के बीच चल रही जद्दोजहद में है, जहाँ कुछ लोगों के विशेषाधिकार अक्सर दूसरों के अधिकारों और आज़ादी की कीमत पर हासिल किए जाते हैं।
reviewed: false
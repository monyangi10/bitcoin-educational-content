question: Koja je glavna inovacija Zakona dvanaest tablica u pogledu zaštite individualnih prava?
answer: Jasno definiše vlasnička prava i uslove za njihov prenos.
wrong_answers:
  - Ona daje pravo glasa svim strancima.
  - Uspostavlja sistem restorativne pravde.
  - To garantuje slobodu govora i veroispovesti.
explanation: |
  Zakon dvanaest tablica inovirao je postavljanjem jasnih pravila za imovinu i njen prenos, čime je obezbedio čvrstu pravnu osnovu za zaštitu individualnih prava i smanjenje zloupotreba moći u pitanjima posedovanja.

question: "ट्वेल्व टेबल्स कानून" (Law of the Twelve Tables) का मुख्य नवाचार क्या था जब यह व्यक्तिगत अधिकारों की सुरक्षा की बात आती है?  

इस कानून की सबसे बड़ी खासियत यह थी कि यह **लिखित कानून** (written law) था, जिससे सभी नागरिकों को अपने अधिकारों और कर्तव्यों का स्पष्ट पता चलता था। पहले, कानून मौखिक और धार्मिक परंपराओं पर आधारित होते थे, जिससे अन्याय होने का डर रहता था।  

इसके अलावा, यह कानून **समानता का सिद्धांत** लाया – अमीर-गरीब सबके लिए एक ही नियम लागू होते थे। साथ ही, इसमें **निष्पक्ष सुनवाई** (fair trial) और **कानूनी प्रक्रिया** (legal procedure) के नियम तय किए गए, ताकि किसी को भी बिना सुनवाई दंड न दिया जाए।  

संक्षेप में, यह कानून **पारदर्शिता, समानता और न्यायिक सुरक्षा** लेकर आया, जो व्यक्तिगत अधिकारों की रक्षा के लिए एक बड़ा कदम था।
answer: यह साफ़-साफ़ संपत्ति के अधिकारों और उनके हस्तांतरण की शर्तों को परिभाषित करता है।
wrong_answers:
  - यह सभी विदेशियों को वोट देने का अधिकार देता है।
  - यह मरम्मती न्याय (restorative justice) की एक प्रणाली स्थापित करता है।
  - यह भाषण और धर्म की स्वतंत्रता की गारंटी देता है।
explanation: |
  बारह तालिकाओं का कानून ने संपत्ति और उसके हस्तांतरण के लिए स्पष्ट नियम बनाकर नई राह दिखाई, जिससे व्यक्तिगत अधिकारों की सुरक्षा और कब्जे के मामलों में सत्ता के दुरुपयोग को कम करने के लिए एक मजबूत कानूनी आधार प्रदान किया गया।

question: Ni igiki gishasha cane mw’Itegeko ry’Imeza Cumi n’Ibiri mu bijanye no kurinda uburenganzira bw’umuntu ku giti ciwe?
answer: Irasobanura neza uburenganzira bw’itunga n’ivyo bisabwa kugira ngo bushikirizwe uwundi muntu.
wrong_answers:
  - Iha uburenganzira bwo gutora abanyamahanga bose.
  - Rishiraho urutonde rw’ubutungane bwo gusubizaho ibintu.
  - Iratanga umwidegemvyo wo kuvuga no gusenga.
explanation: |
  Itegeko ry’Imeza Cumi n’Ibiri ryarahinduye ibintu bishasha mu gushinga amategeko atomoye yerekeye umutungo n’ukuwutanga, gutyo ritanga urufatiro rukomeye rw’amategeko rwo kurinda uburenganzira bw’umuntu ku giti ciwe no kugabanya ukurenga kw’ububasha mu bijanye n’ugutunga.
reviewed: true
question: Jaka jest główna innowacja Prawa Dwunastu Tablic w zakresie ochrony praw jednostki?
answer: Jasno definiuje prawa własności i warunki ich przeniesienia.
wrong_answers:
  - Przyznaje ona prawo do głosowania wszystkim obcokrajowcom.
  - Ustanawia system sprawiedliwości naprawczej.
  - Gwarantuje wolność słowa i wyznania.
explanation: |
  Prawo Dwunastu Tablic wprowadziło innowacje, ustanawiając jasne zasady dotyczące własności i jej przenoszenia, zapewniając w ten sposób solidną podstawę prawną dla ochrony praw jednostki i ograniczając nadużycia władzy w kwestiach posiadania.

question: None umwidegemvyo usaba iki?
answer: Ibindi bisubizo vyose
wrong_answers:
  - Ububasha bwo gukora ivyo umuntu ashaka n'ivyiwe .
  - Kubura inzitizi zo hanze
  - Ubushobozi bwo kwiyumvira no gukora wigenga .
explanation: |
  Umwidegemvyo ugizwe n’ibintu vyinshi, harimwo ububasha bwo gukora ivyo umuntu ashaka, ukutagira inzitizi zivuye hanze, n’ubushobozi bwo kwigenga mu vyiyumviro no mu bikorwa, ivyo vyose bikaba bifasha mu gusobanura neza ico ciyumviro.
reviewed: ture
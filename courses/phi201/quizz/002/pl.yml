question: Co oznacza wolność?
answer: Wszystkie pozostałe odpowiedzi
wrong_answers:
  - Moc robienia tego, co się chce z tym, co do nich należy
  - Brak zewnętrznych ograniczeń
  - Zdolność do samodzielnego myślenia i działania
explanation: |
  Wolność obejmuje kilka wymiarów, w tym moc działania zgodnie z własną wolą, brak zewnętrznych ograniczeń oraz zdolność do autonomii w myśleniu i działaniu, co przyczynia się do kompleksowej definicji tego pojęcia.
reviewed: false
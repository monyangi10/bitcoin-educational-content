question: Wat houdt vrijheid in?
answer: Alle andere antwoorden
wrong_answers:
  - De macht om te doen wat iemand wil met wat van hem is
  - De afwezigheid van externe beperkingen
  - Zelfstandig kunnen denken en handelen
explanation: |
  Vrijheid omvat verschillende dimensies, waaronder het vermogen om naar eigen wil te handelen, de afwezigheid van externe beperkingen en het vermogen tot autonomie in denken en handelen, die allemaal bijdragen aan een allesomvattende definitie van dit concept.
reviewed: ture
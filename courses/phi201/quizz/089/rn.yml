question: None urubibi rukomeye hagati y’inzego za Leta n’inzego z’abikorera ku giti cabo Constant ashigikira rurimwo iki?
answer: Uwo mupaka usobanura ko Leta idakwiye kwivanga mu buzima bwite bw’abantu ku giti cabo.
wrong_answers:
  - Uwo mupaka usobanura ko abantu ku giti cabo badakwiye kwivanga mu bikorwa vya Leta.
  - Uwo mupaka usobanura ugutandukana kwose hagati ya Ekleziya na Leta.
  - Uwo mupaka usobanura ko abantu bategerezwa kugira umwidegemvyo umwe mu nzego za Leta no mu nzego z’abikorera ku giti cabo.
explanation: |
  Ku bwa Benjamin Constant, urubibi rukomeye hagati y’inzego za Leta n’iz’abikorera ku giti cabo bisigura ko Leta itegerezwa kwubahiriza ubuzima bwite bw’abantu ku giti cabo no kwirinda kwivanga mu mahitamwo y’umuntu ku giti ciwe atareba ivy’abantu bose.
reviewed: true
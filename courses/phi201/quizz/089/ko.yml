question: 콘스탄트가 주장하는 공적 영역과 사적 영역의 엄격한 경계는 무엇을 의미할까요?
answer: 이 경계는 국가가 개인의 사생활에 간섭해서는 안 된다는 것을 의미합니다.
wrong_answers:
  - 이 경계는 개인이 공적 업무에 관여해서는 안 된다는 것을 의미합니다.
  - 이 경계는 교회와 국가 간의 완전한 분리를 의미합니다.
  - 이 경계는 개인이 공적 영역과 사적 영역 모두에서 동일한 자유를 누려야 한다는 것을 의미합니다.
explanation: |
  벤자민 콘스탄트에게 공적 영역과 사적 영역의 엄격한 경계는 국가가 개인의 프라이버시를 존중하고 공적 영역과 관련 없는 개인의 선택에 개입하지 않아야 한다는 것을 의미합니다.
reviewed: true
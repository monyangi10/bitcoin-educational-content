question: Jaka jest krytyka demokracji socjalistycznej przeprowadzona przez Frédérica Bastiata?
answer: Bastiat krytykuje demokrację socjalistyczną, ponieważ prowadzi ona do wzrostu podatków, zadłużenia państwa i grabieży.
wrong_answers:
  - Bastiat krytykuje demokrację socjalistyczną, ponieważ nie szanuje ona zasad wolności i równości.
  - Bastiat krytykuje demokrację socjalistyczną, ponieważ prowadzi ona do stagnacji.
  - Bastiat krytykuje demokrację socjalistyczną, ponieważ zagraża ona tradycyjnym wartościom rodziny i religii.
explanation: |
  Frédéric Bastiat widzi w demokracji socjalistycznej tendencję do wykorzystywania państwa do redystrybucji bogactwa poprzez podatki i zadłużenie, co uważa za legalną grabież własności indywidualnej.

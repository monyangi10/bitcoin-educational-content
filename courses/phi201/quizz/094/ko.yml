question: 프레데릭 바스티앙의 사회주의 민주주의에 대한 비판은 무엇인가요?
answer: 바스티아는 사회주의 민주주의가 세금 증가, 국가 부채, 약탈로 이어진다고 비판합니다.
wrong_answers:
  - 바스티아는 사회주의 민주주의가 자유와 평등의 원칙을 존중하지 않는다고 비판합니다.
  - 바스티아는 사회주의 민주주의가 정체로 이어진다고 비판합니다.
  - 바스티앗은 사회주의 민주주의가 가족과 종교의 전통적인 가치를 위협한다는 이유로 비판합니다.
explanation: |
  프레데릭 바스티아는 사회주의 민주주의는 국가가 세금과 부채를 통해 부를 재분배하는 경향이 있으며, 이는 개인 재산에 대한 합법적인 약탈의 한 형태라고 생각합니다.
reviewed: true
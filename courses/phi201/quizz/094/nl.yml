question: Wat is Frédéric Bastiat's kritiek op de socialistische democratie?
answer: Bastiat bekritiseert socialistische democratie omdat het leidt tot hogere belastingen, staatsschulden en plundering.
wrong_answers:
  - Bastiat bekritiseert de socialistische democratie omdat deze de principes van vrijheid en gelijkheid niet respecteert.
  - Bastiat bekritiseert de socialistische democratie omdat die tot stagnatie leidt.
  - Bastiat bekritiseert de socialistische democratie omdat deze de traditionele waarden van familie en religie bedreigt.
explanation: |
  Frédéric Bastiat ziet in de socialistische democratie de neiging om de staat te gebruiken om rijkdom te herverdelen door middel van belastingen en schulden, wat hij beschouwt als een vorm van legale plundering van individueel eigendom.
reviewed: true
question: None Frédéric Bastiat anegura demokarasi y’abasosiyalisiti ni igiki?
answer: Bastiat anegura demokarasi y’abasosiyalisiti kuko ituma imisoro yongerekana, Leta igira umwenda mwinshi, n’ugusahura.
wrong_answers:
  - Bastiat anegura demokarasi y’abasosiyalisiti kuko idatubaha ingingo ngenderwako z’umwidegemvyo n’uburinganire.
  - Bastiat anegura demokarasi y’abasosiyalisiti kuko ijana mu guhagarara.
  - Bastiat anegura demokarasi y’abasosiyalisiti kuko itera ubwoba agaciro ka kera k’umuryango n’idini.
explanation: |
  Frédéric Bastiat abona ko demokarasi y’abasosiyalisiti ifise impengamiro yo gukoresha Leta kugira ngo isubire gusangira ubutunzi biciye mu gutanga imisoro no mu myenda, ivyo abona ko ari uburyo bwo gusahura umutungo w’umuntu ku giti ciwe mu buryo butegekanijwe n’amategeko.
reviewed: true
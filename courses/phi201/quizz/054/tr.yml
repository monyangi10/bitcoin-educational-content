question: Krallar egemenliklerini Kilise'ye karşı savunmak için hangi araçları kullandılar?
answer: Diğer tüm cevaplar doğrudur.
wrong_answers:
  - Merkezi ve güçlü bir devlet aygıtının geliştirilmesi.
  - Kendi yasal ve mali sistemlerini oluşturmaları.
  - Ordular kurup Kilise'ye karşı savaş açtılar.
explanation: |
  Krallar, Kilise'ye karşı egemenliklerini savunmak için devleti merkezileştirerek, kendi yasal ve mali sistemlerini kurarak ve bazen de kilisenin nüfuzuna meydan okumak için ordular konuşlandırarak güçlerini pekiştirdiler.
reviewed: true
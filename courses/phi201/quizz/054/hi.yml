question: राजाओं ने चर्च के खिलाफ अपनी सत्ता जताने के लिए कौन-कौन से तरीके अपनाए?
answer: सारे दूसरे जवाब सही हैं।
wrong_answers:
  - एक केंद्रीकृत और शक्तिशाली राज्य तंत्र का विकास।
  - अपनी खुद की कानूनी और वित्तीय प्रणालियों का निर्माण।
  - सेनाएँ खड़ी करना और चर्च के खिलाफ युद्ध छेड़ना।
explanation: |
  चर्च के खिलाफ अपनी संप्रभुता साबित करने के लिए, राजाओं ने राज्य को केंद्रीकृत करके, अपने खुद के कानूनी और वित्तीय सिस्टम स्थापित करके, और कभी-कभी सेना का इस्तेमाल करके चर्च के प्रभाव को चुनौती दी।
reviewed: false
question: Welke middelen gebruikten koningen om hun soevereiniteit te laten gelden tegenover de Kerk?
answer: Alle andere antwoorden zijn juist.
wrong_answers:
  - De ontwikkeling van een gecentraliseerd en machtig staatsapparaat.
  - Het opzetten van hun eigen juridische en fiscale systemen.
  - Legers oprichten en oorlogen voeren tegen de kerk.
explanation: |
  Om hun soevereiniteit tegenover de kerk te laten gelden, versterkten koningen hun macht door de staat te centraliseren, hun eigen juridische en fiscale systemen op te zetten en soms door legers in te zetten om de kerkelijke invloed uit te dagen.
reviewed: true
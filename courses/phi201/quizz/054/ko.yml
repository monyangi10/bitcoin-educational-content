question: 왕들은 교회에 대항하여 자신의 주권을 주장하기 위해 어떤 수단을 사용했나요?
answer: 다른 모든 정답이 맞습니다.
wrong_answers:
  - 중앙집권적이고 강력한 국가기구의 개발.
  - 자체적인 법률 및 재정 시스템을 구축합니다.
  - 군대를 모집하고 교회를 상대로 전쟁을 벌입니다.
explanation: |
  교회에 대항하여 주권을 주장하기 위해 왕들은 국가를 중앙집권화하고, 독자적인 법률 및 재정 시스템을 구축했으며, 때로는 군대를 배치하여 교회의 영향력에 도전함으로써 권력을 강화했습니다.
reviewed: true
question: Jakie jest główne ograniczenie praw człowieka według Marksa?
answer: Chronią one jedynie formalną i abstrakcyjną wolność.
wrong_answers:
  - Są to prawa naturalne.
  - Są to prawa opcjonalne.
  - Zapobiegają rewolucji.
explanation: |
  Marks krytykuje prawa człowieka, nazywając je formalnymi, ponieważ gwarantują one abstrakcyjną wolność jednostki, bez faktycznej transformacji materialnych warunków wyzysku w społeczeństwie kapitalistycznym.
reviewed: false
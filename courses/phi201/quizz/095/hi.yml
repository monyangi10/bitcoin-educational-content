question: मार्क्स के अनुसार, मानव अधिकारों की मुख्य सीमा क्या है?
answer: वे सिर्फ़ एक औपचारिक और अमूर्त आज़ादी की हिफ़ाज़त करते हैं।
wrong_answers:
  - वे प्राकृतिक अधिकार हैं।
  - वे वैकल्पिक अधिकार हैं।
  - वे क्रांति को रोकते हैं।
explanation: |
  मार्क्स मानवाधिकारों की आलोचना करते हुए उन्हें औपचारिक बताते हैं, क्योंकि ये अमूर्त व्यक्तिगत स्वतंत्रता की गारंटी तो देते हैं, लेकिन पूंजीवादी समाज में शोषण की भौतिक परिस्थितियों को वास्तव में बदलते नहीं हैं।
reviewed: false
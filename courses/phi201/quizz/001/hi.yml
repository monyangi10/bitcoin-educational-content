question: इतिहास और दर्शन में क्या अंतर है?
answer: बाकी सारे जवाब
wrong_answers:
  - इतिहास अतीत का वर्णन करता है जबकि दर्शन उसका मूल्यांकन करता है
  - इतिहास तथ्यात्मक होता है जबकि दर्शनशास्त्र नैतिक/मानक होता है
  - इतिहास घटनाओं पर ध्यान देता है जबकि दर्शन शास्त्र अवधारणाओं पर ध्यान देता है।

question: Kako se biblijska etika razlikuje od drevne etike?
answer: Svi ostali odgovori su tačni.
wrong_answers:
  - Biblijska etika dodeljuje beskonačnu vrednost pojedincu jer je stvoren po Božjem obličju, dok antička etika podređuje čoveka kosmosu.
  - Biblijska etika zagovara ljubav prema bližnjem i saosećanje, dok drevna etika naglašava pravdu i reciprocitet.
  - Biblijska etika obraća se svim ljudima, dok je antička etika rezervisana za elitnu grupu građana.
explanation: |
  Biblijska etika vrednuje pojedinca kao nosioca božanskog dostojanstva, promoviše univerzalnu ljubav i saosećanje, i obraća se svim ljudskim bićima, za razliku od antičke etike, koja privileguje elitu i fokusira se na kosmičku harmoniju i recipročnu pravdu.
reviewed: false
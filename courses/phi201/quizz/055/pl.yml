question: Czym różni się etyka biblijna od etyki starożytnej?
answer: Wszystkie pozostałe odpowiedzi są poprawne.
wrong_answers:
  - Etyka biblijna przypisuje nieskończoną wartość jednostce, ponieważ jest ona stworzona na obraz Boga, podczas gdy etyka starożytna podporządkowuje człowieka kosmosowi.
  - Etyka biblijna opowiada się za miłością bliźniego i współczuciem, podczas gdy etyka starożytna kładzie nacisk na sprawiedliwość i wzajemność.
  - Etyka biblijna odnosi się do wszystkich ludzi, podczas gdy etyka starożytna jest zarezerwowana dla elitarnej grupy obywateli.
explanation: |
  Etyka biblijna ceni jednostkę jako niosącą boską godność, promuje uniwersalną miłość i współczucie oraz odnosi się do wszystkich istot ludzkich, w przeciwieństwie do etyki starożytnej, która uprzywilejowuje elitę i koncentruje się na kosmicznej harmonii i wzajemnej sprawiedliwości.

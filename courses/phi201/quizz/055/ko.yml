question: 성서 윤리는 고대 윤리와 어떻게 다른가요?
answer: 다른 모든 답이 정답입니다.
wrong_answers:
  - 성경적 윤리는 하나님의 형상대로 창조된 개인에게 무한한 가치를 부여하는 반면, 고대 윤리는 인간을 우주에 종속시킵니다.
  - 성서 윤리는 이웃 사랑과 연민을 옹호하는 반면, 고대 윤리는 정의와 호혜를 강조합니다.
  - 성서 윤리는 모든 인간을 대상으로 하는 반면, 고대 윤리는 엘리트 시민을 대상으로 합니다.
explanation: |
  성서 윤리는 엘리트에게 특권을 부여하고 우주적 조화와 호혜적 정의에 초점을 맞춘 고대 윤리와 달리 개인을 신성한 존엄성을 지닌 존재로 존중하고 보편적 사랑과 연민을 장려하며 모든 인간을 대상으로 합니다.
reviewed: true
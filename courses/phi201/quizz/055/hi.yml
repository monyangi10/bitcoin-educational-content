question: बाइबिल की नैतिकता और प्राचीन नैतिकता में क्या अंतर है?
answer: बाकी सारे जवाब सही हैं।
wrong_answers:
  - बाइबिल की नैतिकता व्यक्ति को अनंत मूल्य देती है क्योंकि उसे ईश्वर के रूप में बनाया गया है, जबकि प्राचीन नैतिकता मनुष्य को ब्रह्मांड के अधीन मानती है।
  - बाइबिल की नैतिकता पड़ोसी से प्यार और दया की वकालत करती है, जबकि प्राचीन नैतिकता न्याय और आपसीता पर ज़ोर देती है।
  - बाइबिल की नैतिकता सभी लोगों को संबोधित करती है, जबकि प्राचीन नैतिकता केवल नागरिकों के एक विशेष समूह के लिए होती थी।
explanation: |
  बाइबिल की नैतिकता हर व्यक्ति को ईश्वरीय गरिमा से सम्मानित मानती है, सार्वभौमिक प्रेम और करुणा को बढ़ावा देती है, और सभी मनुष्यों को संबोधित करती है। यह प्राचीन नैतिकता से अलग है, जो केवल एक विशिष्ट वर्ग को महत्व देती है और ब्रह्मांडीय सामंजस्य तथा आपसी न्याय पर केंद्रित होती है।

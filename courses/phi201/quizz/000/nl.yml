question: Wat is het doel van deze cursus?
answer: Alle bovenstaande
wrong_answers:
  - De historische gebeurtenissen bestuderen die de strijd voor vrijheid hebben gemarkeerd
  - De relatie tussen ideeën en gebeurtenissen begrijpen om vandaag beter te handelen
  - De filosofische concepten met betrekking tot vrijheid definiëren
explanation: |
  Het doel van deze cursus is veelzijdig: het bestuderen van invloedrijke historische gebeurtenissen in de strijd voor vrijheid, het analyseren van het verband tussen ideeën en gebeurtenissen om ons huidige handelen te verduidelijken en het verduidelijken van filosofische concepten met betrekking tot vrijheid.
reviewed: true
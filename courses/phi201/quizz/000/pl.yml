question: Jaki jest cel tego kursu?
answer: Wszystkie powyższe
wrong_answers:
  - Badanie wydarzeń historycznych, które naznaczyły walkę o wolność
  - Zrozumienie związku między ideami i wydarzeniami w celu lepszego działania w dzisiejszych czasach
  - Zdefiniowanie pojęć filozoficznych związanych z wolnością
explanation: |
  Cel tego kursu jest wielopłaszczyznowy: ma on na celu zbadanie wpływowych wydarzeń historycznych w walce o wolność, przeanalizowanie związku między ideami i wydarzeniami w celu oświecenia naszych obecnych działań oraz wyjaśnienie filozoficznych pojęć związanych z wolnością.

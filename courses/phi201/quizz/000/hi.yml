question: इस कोर्स का उद्देश्य क्या है?
answer: ऊपर लिखे सभी
wrong_answers:
  - उन ऐतिहासिक घटनाओं का अध्ययन करो जिन्होंने आज़ादी की लड़ाई को चिह्नित किया है।
  - विचारों और घटनाओं के बीच के रिश्ते को समझो, ताकि आज बेहतर तरीके से काम कर सको।
  - फ्रीडम (स्वतंत्रता) से जुड़े कुछ प्रमुख दार्शनिक विचार यहां दिए गए हैं:

1. **निजी स्वतंत्रता (Individual Liberty)**  
   - व्यक्ति के अपने जीवन, विचार और कार्यों पर नियंत्रण का अधिकार।  
   - जॉन लॉक और जॉन स्टुअर्ट मिल जैसे विचारकों ने इसे प्रमुखता दी।

2. **निर्णय की स्वतंत्रता (Free Will)**  
   - मनुष्य के पास अपने फैसले लेने की क्षमता है या नहीं, इस पर बहस।  
   - डिटरमिनिज़्म (नियतिवाद) vs. इंडिटरमिनिज़्म।

3. **राजनीतिक स्वतंत्रता (Political Freedom)**  
   - नागरिकों के अधिकार और सरकारी दखल से मुक्ति।  
   - रूसो का "सोशल कॉन्ट्रैक्ट" थ्योरी इससे जुड़ा है।

4. **अस्तित्ववादी स्वतंत्रता (Existential Freedom)**  
   - सार्त्र और कामू के अनुसार, इंसान खुद अपने जीवन का मतलब गढ़ता है।  
   - "हम स्वतंत्रता के लिए अभिशप्त हैं।"

5. **आध्यात्मिक मुक्ति (Spiritual Liberation)**  
   - हिंदू/बौद्ध दर्शन में मोक्ष या निर्वाण की अवधारणा।  
   - इच्छाओं और बंधनों से मुक्ति।

कुल मिलाकर, स्वतंत्रता की व्याख्या संदर्भ और दार्शनिक परंपरा पर निर्भर करती है।
  The purpose of this course is multifaceted: it aims to study the influential historical events in the struggle for freedom, to analyze the connection between ideas and events to enlighten our current actions, and to clarify the philosophical concepts related to freedom.

question: मध्यकालीन चर्च का ब्याज वाले कर्ज़ (सूदखोरी) के प्रति क्या रवैया था?  

उस समय चर्च ब्याज वाले कर्ज़ को गंभीर पाप मानता था। बाइबिल के अनुसार, सूदखोरी (usury) को नैतिक रूप से गलत ठहराया गया था, खासकर ईसाइयों के बीच पैसे उधार देने पर ब्याज लेना मना था। चर्च का मानना था कि यह "परिश्रम के बिना मुनाफा कमाना" है और यह लालच को बढ़ावा देता है।  

हालाँकि, व्यापार के विस्तार के साथ, यहूदी व्यापारियों को अक्सर इस काम के लिए इस्तेमाल किया जाता था, क्योंकि उन पर धार्मिक प्रतिबंध लागू नहीं होते थे। बाद में, कुछ ईसाई धर्मशास्त्रियों ने "उचित ब्याज" की अवधारणा को स्वीकार करना शुरू किया, लेकिन मध्ययुगीन काल में चर्च की मुख्य स्थिति सख्त विरोध की थी।
answer: उसने उन्हें मना कर दिया।
wrong_answers:
  - इसने उन्हें प्रोत्साहित किया।
  - इसने कुछ मामलों में उन्हें बर्दाश्त किया।
  - इस मामले पर इसकी कोई राय नहीं थी।
explanation: |
  मध्यकालीन चर्च ने ब्याज़ वाले कर्ज़ पर रोक लगा दी थी, क्योंकि उनका मानना था कि यह सूदखोरी का पाप है। उनके हिसाब से, कर्ज़ देकर उससे मूल रकम से ज़्यादा वसूलना अनैतिक था।

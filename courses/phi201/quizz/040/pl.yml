question: W jaki sposób idea grzechu jest powiązana z pojęciem wolności w myśli chrześcijańskiej?
answer: Grzech jest bezpośrednią konsekwencją ludzkiej wolności, ponieważ ludzie mogą swobodnie wybierać między dobrem a złem.
wrong_answers:
  - Grzech jest dziedziczną wadą przekazywaną przez Adama i Ewę wszystkim ich potomkom, ograniczającą ich wolność.
  - Grzech jest iluzją stworzoną przez diabła, aby oszukać ludzi i pozbawić ich wolności.
  - Grzech jest konieczną próbą dla ludzi, aby udowodnić swoją miłość do Boga i zasłużyć na zbawienie.
explanation: |
  W myśli chrześcijańskiej grzech jest wynikiem działania wolnej woli. Ludzie, obdarzeni wolnością, mają wybór między dobrem a złem i to właśnie ten wolny wybór sprawia, że grzech jest możliwy.
reviewed: false
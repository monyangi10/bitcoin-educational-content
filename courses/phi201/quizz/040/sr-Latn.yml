question: Kako je ideja greha povezana sa pojmom slobode u hrišćanskoj misli?
answer: Greh je direktna posledica ljudske slobode jer ljudi su slobodni da biraju između dobra i zla.
wrong_answers:
  - Greška je nasledna mana koju su Adam i Eva preneli na sve svoje potomke, ograničavajući njihovu slobodu.
  - Greh je iluzija koju je stvorio đavo da prevari ljude i liši ih njihove slobode.
  - Greh je neophodno iskušenje za ljude da dokažu svoju ljubav prema Bogu i zasluže spasenje.
explanation: |
  U hrišćanskoj misli, greh je rezultat upotrebe slobodne volje. Ljudi, obdareni slobodom, imaju izbor između dobra i zla, i upravo taj slobodan izbor čini čin grešenja mogućim.

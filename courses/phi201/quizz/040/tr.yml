question: Günah fikri Hıristiyan düşüncesindeki özgürlük kavramıyla nasıl bağlantılıdır?
answer: Günah insan özgürlüğünün doğrudan bir sonucudur çünkü insanlar iyi ve kötü arasında seçim yapmakta özgürdür.
wrong_answers:
  - Günah, Adem ve Havva tarafından tüm torunlarına aktarılan ve onların özgürlüğünü sınırlayan kalıtsal bir kusurdur.
  - Günah, insanları kandırmak ve özgürlüklerinden mahrum bırakmak için şeytan tarafından yaratılan bir yanılsamadır.
  - Günah, insanların Tanrı'ya olan sevgilerini kanıtlamaları ve kurtuluşu kazanmaları için gerekli bir denemedir.
explanation: |
  Hıristiyan düşüncesinde günah, özgür iradenin kullanılmasından kaynaklanır. Özgürlükle donatılmış olan insanlar iyi ile kötü arasında seçim yapma hakkına sahiptir ve günah işleme eylemini mümkün kılan da bu özgür seçimdir.
reviewed: true
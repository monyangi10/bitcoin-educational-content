question: Hoe is het idee van zonde verbonden met het begrip vrijheid in het christelijke denken?
answer: Zonde is een direct gevolg van menselijke vrijheid omdat mensen vrij zijn om te kiezen tussen goed en kwaad.
wrong_answers:
  - Zonde is een erfelijke fout die door Adam en Eva wordt doorgegeven aan al hun nakomelingen, waardoor hun vrijheid wordt beperkt.
  - Zonde is een illusie die door de duivel is gecreëerd om mensen te misleiden en van hun vrijheid te beroven.
  - Zonde is een noodzakelijke beproeving voor mensen om hun liefde voor God te bewijzen en redding te verdienen.
explanation: |
  In het Christelijke denken komt zonde voort uit de uitoefening van de vrije wil. Mensen, begiftigd met vrijheid, hebben de keuze tussen goed en kwaad, en het is deze vrije keuze die zondigen mogelijk maakt.
reviewed: true
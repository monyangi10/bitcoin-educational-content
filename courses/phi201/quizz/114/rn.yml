question: Ni igiki Jacques Rueff avuga cane ku bijanye n’amahera?
answer: Amahera y'impapuro arateye akaga kandi ajana mu gukora dirigisme .
wrong_answers:
  - Amahera y'impapuro arashikamye kandi aramenyekana
  - Amafaranga y'impapuro ni ngombwa kugira ubutunzi butere imbere
  - Amahera y'impapuro ategerezwa gushigikirwa n'ibintu vy'umubiri .
explanation: |
  Jacques Rueff yarizera ko amahera y’impapuro, mu kworohereza abategetsi kugenzura ubutunzi, ashigikira dirigisme kandi akagira ingorane ku gushikama kw’amahera.
reviewed: true
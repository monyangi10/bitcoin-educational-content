question: जैक्स रूएफ़ का मुद्रा के बारे में मुख्य तर्क क्या है?
answer: कागज़ का पैसा खतरनाक है और सरकारी नियंत्रण (डिरिजिस्म) की ओर ले जाता है।
wrong_answers:
  - कागज़ का पैसा स्थिर और अनुमानित होता है
  - कागज़ का पैसा आर्थिक विकास के लिए ज़रूरी है
  - कागज़ के पैसे को भौतिक संपत्ति द्वारा समर्थित होना चाहिए
explanation: |
  जैक्स रूएफ़ का मानना था कि कागज़ी मुद्रा, अर्थव्यवस्था पर अधिकारियों के नियंत्रण को आसान बनाकर, नियंत्रणवाद (dirigisme) को बढ़ावा देती है और मौद्रिक स्थिरता के लिए ख़तरा पैदा करती है।
reviewed: false
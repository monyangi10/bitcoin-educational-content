question: Wat is het belangrijkste argument van Jacques Rueff met betrekking tot valuta?
answer: Papiergeld is gevaarlijk en leidt tot dirigisme
wrong_answers:
  - Papiergeld is stabiel en voorspelbaar
  - Papiergeld is nodig voor economische ontwikkeling
  - Papiergeld moet worden gedekt door fysieke activa
explanation: |
  Jacques Rueff was van mening dat papiergeld, door de controle over de economie door de autoriteiten te vergemakkelijken, dirigisme in de hand werkte en risico's inhield voor de monetaire stabiliteit.
reviewed: true
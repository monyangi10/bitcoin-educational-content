question: None inyigisho nyinshi ni iki nk’uko Ludwig von Mises abivuga?
answer: Polylogisme irarwanya ubudasa n’ubumwe bw’ubwenge.
wrong_answers:
  - Polylogisme ni inyigisho isigura ubudasa bw’indimi n’imico kama.
  - Abanya Otirishiya bararikoresha kugira ngo berekane ko ivyiyumviro vy’aba Marxiste bivuguruzanya.
  - Polylogisme ni uburyo bwo gusesangura inyandiko bushobora gutuma umuntu ashobora kumenya ivy’ubuhinga bwa sophisme.
explanation: |
  Ku bwa Ludwig von Mises, polylogisme ni iciyumviro c’uko imiterere y’ivyiyumviro itandukanye hagati y’imigwi canke imigwi, bikaba bitera umugere iciyumviro c’uko imvo n’imvano ari iyo kw’isi yose kandi ko ikoreshwa kuri bose mu buryo bumwe.
reviewed: true
question: 根據 Ludwig von Mises 的說法，何謂多偶性？
answer: 多元論挑戰理性的獨特性與普遍性。
wrong_answers:
  - Polylogism 是一種解釋語言和文化多樣性的理論。
  - 奧地利人用它來說明，馬克思主義的邏輯是自相矛盾的。
  - Polylogism 是一種文字分析方法，可以偵測出詭辯。
explanation: |
  對於路德維希‧馮‧米塞斯 (Ludwig von Mises) 來說，多重論 (polylogism) 是一種思想結構在不同階級或群體之間會有所不同的觀點，挑戰了理性是普遍且以相同方式適用於每個人的觀點。

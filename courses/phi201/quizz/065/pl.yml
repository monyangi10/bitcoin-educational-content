question: W którym okresie historycznym wojny religijne spustoszyły Europę?
answer: Renesans
wrong_answers:
  - Średniowiecze
  - Oświecenie
  - Rewolucja francuska
explanation: |
  Wojny religijne naznaczyły Europę przede wszystkim w okresie renesansu, w którym konflikty między katolikami i protestantami doprowadziły do gwałtownych starć, zwłaszcza we Francji i Świętym Cesarstwie Rzymskim.

question: Ni mu kiringo ikihe co muri kahise intambara z’idini zasambuye Uburayi?
answer: Ivugurura
wrong_answers:
  - Ikinjana ca mbere
  - Umuco
  - Impinduka y'Abafaransa
explanation: |
  Intambara z’idini zari ahanini mu Buraya mu kiringo c’Ivugurura, igihe intambara hagati y’Abagatolika n’Abaporotisanti zatuma haba intambara z’ubukazi, canecane mu Bufaransa no mu Bwami Bweranda bw’Uburoma.
reviewed: true
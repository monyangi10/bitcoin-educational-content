question: In welke historische periode verwoestten de godsdienstoorlogen Europa?
answer: Renaissance
wrong_answers:
  - Middeleeuwen
  - Verlichting
  - Franse Revolutie
explanation: |
  De godsdienstoorlogen kenmerkten Europa vooral tijdens de Renaissance, een periode waarin conflicten tussen katholieken en protestanten tot gewelddadige botsingen leidden, met name in Frankrijk en het Heilige Roomse Rijk.
reviewed: true
question: सलामांका स्कूल का आधुनिक विचारधारा के विकास पर क्या प्रभाव पड़ा?
answer: बाकी सारे जवाब सही हैं।
wrong_answers:
  - इसने अंतर्राष्ट्रीय कानून के उदय और सार्वभौमिक मानव अधिकारों की मान्यता में योगदान दिया।
  - इसने अधिकारों के पृथक्करण और लोकप्रिय संप्रभुता को स्थापित करके आधुनिक राजनीतिक दर्शन की नींव रखी।
  - इसने वैज्ञानिक सोच को प्रभावित किया, प्रयोगात्मक तरीके और तर्कवाद को बढ़ावा देकर।
explanation: |
  सालामांका स्कूल का आधुनिक विचारधारा पर गहरा असर पड़ा। इसने अंतरराष्ट्रीय कानून की नींव रखी, सार्वभौमिक मानवाधिकारों की वकालत की, और राजनीतिक दर्शन तथा वैज्ञानिक सोच के मूल सिद्धांत स्थापित किए।
reviewed: false
question: Kakav je bio uticaj Škole iz Salamanke na razvoj modernog mišljenja?
answer: Svi ostali odgovori su tačni.
wrong_answers:
  - Doprinelo je pojavi međunarodnog prava i priznavanju univerzalnih ljudskih prava.
  - Postavio je temelje moderne političke filozofije tvrdeći odvajanje vlasti i narodnu suverenost.
  - Uticalo je na naučnu misao podsticanjem eksperimentalne metode i racionalizma.
explanation: |
  Škola iz Salamanke imala je dubok uticaj na moderno mišljenje, postavljajući temelje za međunarodno pravo, zalažući se za univerzalna ljudska prava i uspostavljajući osnovne principe za političku filozofiju i naučno razmišljanje.

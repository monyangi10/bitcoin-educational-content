question: 살라망카 학파가 근대 사상의 발전에 미친 영향은 무엇인가요?
answer: 다른 모든 정답이 맞습니다.
wrong_answers:
  - 이는 국제법의 출현과 보편적 인권의 인정에 기여했습니다.
  - 삼권 분립과 국민 주권을 주장하며 현대 정치 철학의 토대를 마련했습니다.
  - 실험적 방법과 합리주의를 장려하여 과학적 사고에 영향을 미쳤습니다.
explanation: |
  살라망카 학파는 국제법의 토대를 마련하고 보편적 인권을 옹호하며 정치 철학과 과학적 사고의 기본 원칙을 확립하는 등 근대 사상에 지대한 영향을 미쳤습니다.
reviewed: true
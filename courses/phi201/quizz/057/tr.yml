question: Salamanca Okulu'nun modern düşüncenin gelişimi üzerindeki etkisi neydi?
answer: Diğer tüm cevaplar doğrudur.
wrong_answers:
  - Uluslararası hukukun ortaya çıkmasına ve evrensel insan haklarının tanınmasına katkıda bulunmuştur.
  - Kuvvetler ayrılığını ve halk egemenliğini savunarak modern siyaset felsefesinin temellerini atmıştır.
  - Deneysel yöntemi ve rasyonalizmi teşvik ederek bilimsel düşünceyi etkilemiştir.
explanation: |
  Salamanca Okulu, uluslararası hukukun temelini atarak, evrensel insan haklarını savunarak ve siyaset felsefesi ve bilimsel düşünce için temel ilkeler oluşturarak modern düşünce üzerinde derin bir etkiye sahip olmuştur.
reviewed: true
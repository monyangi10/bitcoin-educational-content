question: Ni igiki Ishure ry’i Salamanca ryagize ico rikoze ku bijanye n’ugutera imbere kw’ivyiyumviro vyo muri iki gihe?
answer: Ibindi bisubizo vyose ni ukuri.
wrong_answers:
  - Yatumye habaho amategeko mpuzamakungu no kwemera uburenganzira bwa muntu kw’isi yose.
  - Yashizeho imishinge y’ubuhinga bwa politike bwo muri iki gihe mu kwemeza ko ubutegetsi butandukanye n’ubusegaba bwa bose.
  - Yaragize ico ikoze ku vyiyumviro vya siyansi mu kuremesha uburyo bwo kugerageza no gushingira intahe ibintu.
explanation: |
  Ishure ry’i Salamanca ryaragize akosho kanini ku vyiyumviro vyo muri iki gihe, ryashizeho umushinge w’amategeko mpuzamakungu, riharanira uburenganzira bwa muntu kw’isi yose, rishiraho ingingo ngenderwako z’ishimikiro z’ubuhinga bwa politike n’ivyiyumviro vya siyansi.
reviewed: true
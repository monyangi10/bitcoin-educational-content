question: Wat was de invloed van de School van Salamanca op de ontwikkeling van het moderne denken?
answer: Alle andere antwoorden zijn juist.
wrong_answers:
  - Het droeg bij aan het ontstaan van internationaal recht en de erkenning van universele mensenrechten.
  - Het legde de basis voor de moderne politieke filosofie door de scheiding der machten en volkssoevereiniteit te bevestigen.
  - Het beïnvloedde het wetenschappelijke denken door de experimentele methode en het rationalisme aan te moedigen.
explanation: |
  De School van Salamanca had een grote invloed op het moderne denken, legde de basis voor het internationale recht, pleitte voor universele mensenrechten en stelde fundamentele principes vast voor politieke filosofie en wetenschappelijk denken.
reviewed: true
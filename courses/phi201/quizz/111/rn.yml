question: Nk’uko Keynes abivuga, amahera afise uruhara uruhe mu bukungu?
answer: Igikoresho ca politike y'ubutunzi
wrong_answers:
  - Uburyo gusa bwa Exchange.
  - Ifirimbi ku gukura
  - Igikoresho co gutekereza ku bintu
explanation: |
  Ku bwa Keynes, amahera ni yo akora nk’inzira y’ubutunzi, agatuma intwaro zishobora gutunganya ubutunzi mu guhindura ishoramari, akazi, n’ivyo abantu bose basaba.
reviewed: true
question: कीन्स के अनुसार, अर्थव्यवस्था में पैसे की क्या भूमिका है?
answer: आर्थिक नीति का एक उपकरण
wrong_answers:
  - एक सिर्फ़ Exchange का ज़रिया
  - विकास पर ब्रेक
  - एक अटकलबाजी का औज़ार
explanation: |
  कीन्स के लिए, पैसा आर्थिक नीति का एक लीवर है जो सरकारों को निवेश, रोज़गार और कुल मांग को प्रभावित करके अर्थव्यवस्था को नियंत्रित करने की अनुमति देता है।
reviewed: false
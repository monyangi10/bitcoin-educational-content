question: Wat is het centrale idee van Voltaire's passage over de Londense beurs Exchange?
answer: Zakenmensen van alle religies zetten hun verschillen opzij om zich te richten op wederzijds voordeel.
wrong_answers:
  - De verschillende religies van de wereld komen samen op de Stock Exchange om hun geloof in vrede te belijden.
  - De London Stock Exchange is een plaats van speculatie en corruptie waar morele waarden worden genegeerd.
  - Religie hoort niet thuis in de zakenwereld die gedomineerd wordt door een geest van competitie en individualisme.
explanation: |
  Voltaire benadrukt dat zakenmensen op de London Stock Exchange hun religieuze verschillen overstijgen om samen te werken aan een gemeenschappelijk economisch doel, wat het primaat van materiële belangen boven religieuze verdeeldheid illustreert.
reviewed: true
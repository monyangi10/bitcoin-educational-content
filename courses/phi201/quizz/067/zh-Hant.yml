question: 伏爾泰關於倫敦股票 Exchange 的段落的中心思想是什麼？
answer: 所有宗教的商人都拋開歧見，專注於共同獲利。
wrong_answers:
  - 世界上不同的宗教聚集在 Stock Exchange 和平地實踐他們的信仰。
  - 倫敦證券交易所 (London Stock Exchange) 是一個投機和貪污的地方，道德價值被漠視。
  - 在以競爭精神和個人主義為主的商業世界中，宗教是沒有立足之地的。
explanation: |
  伏爾泰強調，在倫敦證券交易所（London Stock Exchange），商人們超越宗教差異，為了共同的經濟目標而合作，說明了物質利益凌駕於宗教分歧之上。
reviewed: false
question: Jak nazywa się pierwsza pisemna kodyfikacja prawa rzymskiego?
answer: Prawo dwunastu tablic
wrong_answers:
  - Kodeks Hammurabiego
  - The Digest
  - Edykty Justyniana
explanation: |
  Prawo Dwunastu Tablic to pierwsza pisemna kodyfikacja prawa rzymskiego, stworzona w celu sformalizowania prawa i zapewnienia równości prawnej obywateli poprzez udostępnienie prawa wszystkim.

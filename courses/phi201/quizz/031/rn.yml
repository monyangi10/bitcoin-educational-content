question: None igitabu ca mbere canditswe c’amategeko y’Abaroma citwa gute?
answer: Itegeko ry'Imeza Cumi n'Ibiri .
wrong_answers:
  - Itegeko rya Hamurabi
  - Igitabu ca Digest
  - Amategeko ya Yustiniyani
explanation: |
  Itegeko ry’Imeza Cumi n’Ibiri ni ryo rya mbere ryanditswe ry’amategeko y’Uburoma, ryaremewe gutuma amategeko agira uburinganire mu vy’amategeko hagati y’abanyagihugu mu gutuma itegeko rishikira bose.
reviewed: true
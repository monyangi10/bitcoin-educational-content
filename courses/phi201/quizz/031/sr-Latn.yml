question: Koineks dvanaest tablica
answer: Zakon dvanaest tablica
wrong_answers:
  - Hammurabijev zakonik
  - The Digest
  - Edikti Justinijana
explanation: |
  Zakon dvanaest tablica je prva pisana kodifikacija rimskog prava, stvorena da formalizuje zakone i obezbedi pravnu jednakost među građanima tako što će zakon učiniti dostupnim svima.

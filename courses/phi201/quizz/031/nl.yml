question: Wat is de naam van de eerste schriftelijke codificatie van de Romeinse wet?
answer: De Wet van de Twaalf Tafelen
wrong_answers:
  - De code van Hammurabi
  - De samenvatting
  - De edicten van Justinianus
explanation: |
  De Wet van de Twaalf Tafelen is de eerste schriftelijke codificatie van de Romeinse wet, gemaakt om de wetten te formaliseren en juridische gelijkheid tussen burgers te garanderen door de wet voor iedereen toegankelijk te maken.
reviewed: true
question: Waarom is het idee van spontane orde belangrijk voor het liberale denken?
answer: Het laat zien dat individuen, door hun eigen belangen na te streven, het welzijn van de samenleving als geheel kunnen bevorderen.
wrong_answers:
  - Het rechtvaardigt de belangrijke rol van de overheid in de economie.
  - Het benadrukt het belang van collectieve emoties.
  - Alle bovenstaande antwoorden zijn juist.
explanation: |
  Het idee van spontane orde staat centraal in het liberale denken omdat het suggereert dat, zonder staatsinterventie, individuele acties geleid door eigenbelang op natuurlijke wijze leiden tot een gunstig evenwicht voor de hele samenleving.
reviewed: true
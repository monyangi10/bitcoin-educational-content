question: 자유주의적 사고에서 자발적 질서라는 개념이 중요한 이유는 무엇인가요?
answer: 이는 개인이 자신의 이익을 추구함으로써 사회 전체의 복지를 증진할 수 있음을 보여줍니다.
wrong_answers:
  - 이는 경제에서 정부의 중요한 역할을 정당화합니다.
  - 집단 감정의 중요성을 강조합니다.
  - 위의 정답은 모두 정답입니다.
explanation: |
  자발적 질서라는 개념은 국가의 개입 없이 개인의 이기심에 따른 행동이 자연스럽게 사회 전체에 유익한 균형으로 이어진다는 점에서 자유주의적 사고의 핵심입니다.
reviewed: true
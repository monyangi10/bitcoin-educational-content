question: Dlaczego idea spontanicznego porządku jest ważna dla myśli liberalnej?
answer: Pokazuje, że jednostki, realizując własne interesy, mogą promować dobrobyt społeczeństwa jako całości.
wrong_answers:
  - Uzasadnia to ważną rolę rządu w gospodarce.
  - Podkreśla znaczenie zbiorowych emocji.
  - Wszystkie powyższe odpowiedzi są prawidłowe.
explanation: |
  Idea spontanicznego porządku jest kluczowa dla myśli liberalnej, ponieważ sugeruje, że bez interwencji państwa indywidualne działania kierowane własnym interesem w naturalny sposób prowadzą do korzystnej równowagi dla całego społeczeństwa.
reviewed: false
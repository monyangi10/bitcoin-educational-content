question: Ni igiki nyamukuru umuntu anegura mu bijanye n’isesengura rya Marx?
answer: Ivyo vyose biri hejuru
wrong_answers:
  - Marx ntiyitaho uruhara rw'inzego za politike muri kahise .
  - Marx asuzugura akamaro k'ubuhinga bushasha n'iterambere ry'ubuhinga .
  - Marx afise iciyumviro kitari co ku bijanye n’ingene inyungu n’ugukoresha nabi .
explanation: |
  Abanegura isesengura rya Marx barashira ahabona ingingo zitari nke, harimwo ukuntu asuzugura inzego za politike, ukuntu asuzugura ubuhinga bushasha n’iterambere ry’ubuhinga, n’ukuntu atahura inyungu n’ugukoresha nabi ibintu bitari vyo, ivyo bikaba bigaragaza ko umuntu abona ibintu mu buryo bworoshe cane ku bijanye n’ingene ubutunzi bugenda.
reviewed: true
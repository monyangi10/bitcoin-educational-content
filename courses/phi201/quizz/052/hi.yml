question: संत ऑगस्टाइन का क्या रुख था आध्यात्मिक शक्ति और सांसारिक शक्ति के बीच के संबंध पर?
answer: समयिक शक्ति को आध्यात्मिक शक्ति के अधीन होना चाहिए।
wrong_answers:
  - आध्यात्मिक शक्ति को सांसारिक शक्ति के अधीन रहना चाहिए।
  - दोनों ताकतें एक-दूसरे से स्वतंत्र हैं और शांतिपूर्वक साथ रहनी चाहिए।
  - दुनियावी ताक़त का कोई वैध अधिकार नहीं है और उसे आध्यात्मिक ताक़त के पक्ष में ख़त्म कर देना चाहिए।
explanation: |
  संत ऑगस्टीन ने कहा कि सांसारिक सत्ता को आध्यात्मिक सत्ता के अधीन होना चाहिए, क्योंकि मानव जीवन का उद्देश्य आध्यात्मिक है और राजनीतिक कार्यों को ईसाई मूल्यों के अनुरूप होना चाहिए।

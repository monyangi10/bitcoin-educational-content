question: Jakie było stanowisko św. Augustyna w kwestii relacji między władzą duchową a władzą doczesną?
answer: Władza doczesna musi być podporządkowana władzy duchowej.
wrong_answers:
  - Władza duchowa musi być podporządkowana władzy doczesnej.
  - Obie potęgi są od siebie niezależne i muszą pokojowo współistnieć.
  - Władza doczesna nie ma legitymacji i musi zostać zniesiona na rzecz władzy duchowej.
explanation: |
  Augustyn argumentował, że władza doczesna musi być podporządkowana władzy duchowej, ponieważ cel ludzkiego życia jest duchowy i powinien kierować działaniami politycznymi, aby były one zgodne z wartościami chrześcijańskimi.

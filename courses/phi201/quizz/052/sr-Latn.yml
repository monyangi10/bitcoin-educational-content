question: Kakav je bio stav Svetog Avgustina o odnosu između duhovne i svetovne moći?
answer: Vremenska moć mora biti podređena duhovnoj moći.
wrong_answers:
  - Duhovna moć mora biti podređena svetovnoj moći.
  - Dve sile su nezavisne jedna od druge i moraju mirno koegzistirati.
  - Privremena moć nema legitimitet i mora biti ukinuta u korist duhovne moći.
explanation: |
  Sveti Avgustin je tvrdio da temporalna vlast mora biti podređena duhovnoj vlasti jer je svrha ljudskog života duhovna i treba da vodi političke akcije u skladu sa hrišćanskim vrednostima.

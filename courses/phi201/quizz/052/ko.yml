question: 영적 힘과 현세적 힘의 관계에 대한 성 어거스틴의 입장은 무엇이었나요?
answer: 현세의 힘은 영적인 힘에 종속되어야 합니다.
wrong_answers:
  - 영적인 힘은 현세적인 힘에 종속되어야 합니다.
  - 두 권력은 서로 독립적이며 평화롭게 공존해야 합니다.
  - 현세적 권력은 정당성이 없으며 영적 권력을 위해 폐지되어야 합니다.
explanation: |
  성 어거스틴은 인간 삶의 궁극적인 목적은 영적인 것이므로 현세적 권력은 영적인 권력에 종속되어야 하며, 기독교적 가치에 따라 정치적 행동을 이끌어야 한다고 주장했습니다.
reviewed: true
question: Aziz Augustinus'un ruhani güç ile geçici güç arasındaki ilişki konusundaki tutumu neydi?
answer: Geçici güç ruhani güce tabi olmalıdır.
wrong_answers:
  - Ruhani güç geçici güce tabi olmalıdır.
  - İki güç birbirinden bağımsızdır ve barış içinde bir arada var olmalıdır.
  - Geçici iktidarın hiçbir meşruiyeti yoktur ve ruhani iktidar lehine ortadan kaldırılmalıdır.
explanation: |
  Aziz Augustinus, insan hayatının nihai amacının manevi olması ve siyasi eylemleri Hıristiyan değerlerine uygun olarak yönlendirmesi nedeniyle geçici gücün manevi güce tabi olması gerektiğini savunmuştur.
reviewed: true
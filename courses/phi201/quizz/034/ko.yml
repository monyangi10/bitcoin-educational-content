question: 로마 사상에 따르면 자연법과 실정법의 차이점은 무엇인가요?
answer: 자연법칙은 보편적이고 불변하는 반면, 양법칙은 가변적이며 인간의 법칙에 따라 달라집니다.
wrong_answers:
  - 자연법은 강자의 법이고, 실정법은 약자의 법입니다.
  - 자연법은 종교를 기반으로 하는 반면, 실정법은 이성을 기반으로 합니다.
  - 자연법은 로마 시민에게만 적용되는 반면, 실정법은 제국의 모든 주민에게 적용됩니다.
explanation: |
  로마 사상에서 자연법은 불변의 원칙에서 비롯된 보편적이고 변경할 수 없는 것으로 간주됩니다. 반면, 실정법은 인간이 정한 일련의 규칙을 의미하며 사회적, 정치적 상황에 따라 변경될 수 있습니다.
reviewed: true
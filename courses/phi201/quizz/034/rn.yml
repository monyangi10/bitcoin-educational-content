question: Ni itandukaniro irihe riri hagati y’itegeko ry’akameremere n’itegeko ryiza hakurikijwe ivyiyumviro vy’Abaroma?
answer: Itegeko ry’akameremere ni iry’isi yose kandi ntirihinduka, mu gihe itegeko ryiza rihinduka kandi rivana n’amategeko y’abantu.
wrong_answers:
  - Itegeko ry’akameremere ni itegeko ry’abakomeye, mu gihe itegeko ryiza ari itegeko ry’abagoyagoya.
  - Itegeko ry’akameremere rishingiye kw’idini, mu gihe itegeko ryiza rishingiye ku vyiyumviro.
  - Itegeko ry’akameremere rikoreshwa ku benegihugu b’Abaroma gusa, mu gihe itegeko ryiza ryerekeye ababa mu Bwami bose.
explanation: |
  Mu vyiyumviro vy’Abaroma, itegeko ry’akameremere ribonwa ko ari ry’isi yose kandi ritahinduka, rikomoka ku ngingo ngenderwako zidahinduka. Mu buryo butandukanye n’ubwo, itegeko ryiza ryerekeza ku mategeko ashizweho n’abantu kandi ashobora guhinduka bivanye n’imibano n’ivya politike.
reviewed: true
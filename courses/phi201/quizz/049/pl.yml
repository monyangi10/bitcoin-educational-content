question: W jaki sposób powstanie średniowiecznych uniwersytetów przyczyniło się do refleksji nad relacją między rozumem a wiarą?
answer: Uniwersytety ułatwiały konfrontację różnych idei i narodziny intelektualnej debaty na temat wiary i rozumu.
wrong_answers:
  - Uniwersytety sprzyjały wyłonieniu się jednej, dogmatycznej myśli podlegającej autorytetowi Kościoła.
  - Uniwersytety koncentrowały się na nauczaniu praktycznym i zawodowym, zaniedbując refleksję filozoficzną i teologiczną.
  - Uniwersytety nie odegrały znaczącej roli w refleksji nad relacją między rozumem a wiarą.
explanation: |
  Powstanie średniowiecznych uniwersytetów stworzyło przestrzeń do konfrontacji idei i debaty na temat wiary i rozumu, umożliwiając głęboką refleksję filozoficzną i współistnienie różnych punktów widzenia na związek między tymi dwiema dziedzinami.
reviewed: false
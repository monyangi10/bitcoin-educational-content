question: 중세 대학의 부상은 이성과 신앙의 관계에 대한 성찰에 어떻게 기여했을까요?
answer: 대학은 다양한 사상의 대립을 촉진하고 신앙과 이성에 대한 지적 논쟁을 탄생시켰습니다.
wrong_answers:
  - 대학은 교회의 권위에 종속된 하나의 독단적인 사상의 출현을 선호했습니다.
  - 대학은 실용적이고 전문적인 교육에 집중하고 철학적, 신학적 성찰은 소홀히 했습니다.
  - 대학은 이성과 신앙의 관계에 대한 성찰에서 중요한 역할을 하지 못했습니다.
explanation: |
  중세 대학의 부상은 신앙과 이성에 대한 사상적 대립과 토론의 장을 만들어 이 두 영역의 관계에 대한 깊은 철학적 성찰과 다양한 관점의 공존을 가능하게 했습니다.
reviewed: true
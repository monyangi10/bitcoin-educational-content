question: थॉमस एक्विनास का मुख्य सिद्धांत यह है कि विश्वास और तर्क एक-दूसरे के विरोधी नहीं हैं, बल्कि एक-दूसरे को पूरक करते हैं। उनका मानना था कि तर्क और विज्ञान के माध्यम से भी ईश्वर के बारे में कुछ सच्चाइयों को समझा जा सकता है, लेकिन पूर्ण सत्य तक पहुँचने के लिए विश्वास की भी आवश्यकता होती है। एक्विनास के अनुसार, विश्वास और तर्क दोनों ही सत्य की खोज में सहायक हैं और इनमें कोई विरोधाभास नहीं है।
answer: कारण और विश्वास एक-दूसरे के पूरक हैं और एक-दूसरे का साथ दे सकते हैं।
wrong_answers:
  - वजह (तर्क) और ईमान (विश्वास) ज्ञान के दो अलग-अलग और विरोधाभासी स्रोत हैं।
  - बाकी सारे जवाब सही हैं।
  - विश्वास तर्क से बेहतर है और वह बिना तर्क के भी काम कर सकता है।
  Thomas Aquinas argues that reason and faith are complementary: reason can help understand and explain the truths of faith, while faith guides reason towards truths that would otherwise be inaccessible to it.
reviewed: false
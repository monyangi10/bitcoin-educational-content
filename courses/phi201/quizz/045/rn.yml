question: Ni igiki ciyumviro nyamukuru ca Thomas d’Aquin ku bijanye n’isano riri hagati y’ubwenge n’ukwizera?
answer: Imvo n’imvano n’ukwizera birafashanya kandi birashobora gushigikirana.
wrong_answers:
  - Imvo n’imvano n’ukwizera ni amasoko abiri yigenga kandi avuguruzanya y’ubumenyi.
  - Ibindi bisubizo vyose ni ukuri.
  - Ukwizera kuraruta ukwiyumvira kandi kurashobora gukora ata mpamvu zakwo.
explanation: |
  Thomas d’Aquin avuga ko ugutahura n’ukwizera bifashanya; ivyiyumviro birashobora gufasha gutahura no gusigura ukuri kw’ukwizera. Mu buryo butandukanye n’ubwo, ukwizera kurayobora ivyiyumviro ku kuri ubundi kwoba kutashobora kuronka.
reviewed: true
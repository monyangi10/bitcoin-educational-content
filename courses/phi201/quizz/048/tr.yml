question: Skolastik yöntemde disputatio'nun rolü nedir?
answer: Eleştirel düşünme ve argümantasyon becerilerinin geliştirilmesini teşvik eder.
wrong_answers:
  - Öğrencilerin inanç dogmalarını sorgulamadan ezberlemelerini sağlar.
  - Teolojik tartışmaları kesin olarak çözmeye ve tek bir gerçeğe ulaşmaya hizmet eder.
  - Ustalar ve öğrenciler arasındaki ilişkileri ritüelleştirmek ve Kilise'nin otoritesini ortaya koymak için kullanılır.
explanation: |
  Disputatio, skolastik yöntemde merkezi bir alıştırmadır ve öğrencileri eleştirel düşüncelerini geliştirmeye ve titizlikle tartışmaya teşvik ederek felsefi ve teolojik sorular üzerinde derinlemesine düşünmelerine katkıda bulunur.
reviewed: true
question: Ni uruhara uruhe disputatio ifise mu buryo bw’inyigisho?
answer: Bituma umuntu agira ubuhinga bwo guca irya n’ino ibintu no gutanga inyishu.
wrong_answers:
  - Bituma abanyeshure bafata mu mutwe inyigisho z’ukwizera batazibajije.
  - Bifasha gutorera umuti impaka z’ivy’idini ata gukeka no gushika ku kuri kudasanzwe.
  - Rikoreshwa mu gukora imigenzo y’imigenderanire hagati y’abakuru n’abanyeshure no kwemeza ubukuru bwa Ekleziya.
explanation: |
  Disputatio ni umwimenyerezo nyamukuru mu buryo bw’inyigisho, uremesha abanyeshure gutera imbere mu vyiyumviro vyabo vy’uguca irya n’ino no gushinga intahe bimwe bikomeye, bikaba bifasha mu gutekereza ku bibazo vy’ubuhinga bwa filozofiya n’ivy’idini.
reviewed: true
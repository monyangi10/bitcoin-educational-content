question: अमेरिकी क्रांति और फ्रांसीसी क्रांति में मुख्य अंतर क्या है?
answer: अमेरिकी क्रांति ने विकेंद्रीकृत कानून के राज्य का गठन किया, जबकि फ्रांसीसी क्रांति आतंक और तानाशाही के दौर में बदल गई।
wrong_answers:
  - अमेरिकी क्रांति प्रबोधन युग के विचारों से प्रेरित थी, जबकि फ्रांसीसी क्रांति धार्मिक विचारों से प्रेरित थी।
  - अमेरिकी क्रांति कोलोनिस्टों (उपनिवेशवासियों) ने चलाई थी, जबकि फ्रांसीसी क्रांति नवाबों (अमीरों) ने चलाई थी।
  - अमेरिकी क्रांति लंबी थी, जबकि फ्रांसीसी क्रांति छोटी थी।
explanation: |
  अमेरिकी क्रांति ने कानून के शासन पर आधारित एक विकेंद्रीकृत और स्थिर व्यवस्था को जन्म दिया, जबकि फ्रांसीसी क्रांति आंतरिक मतभेदों और सत्ता के केंद्रीकरण के कारण जल्दी ही आतंक और तानाशाही में बदल गई।

question: Ni itandukaniro irihe rikomeye riri hagati y’Impinduka y’Abanyamerika n’Impinduka y’Abafaransa?
answer: Impinduka y’Abanyamerika yatumye habaho Leta y’ubutegetsi bw’amategeko yegerejwe, mu gihe Impinduka y’Abafaransa yatumye haba igihe c’Iterabwoba n’ubutegetsi bw’igitugu.
wrong_answers:
  - Impinduka y’Abanyamerika yahumekewe n’ivyiyumviro vy’Umuco, mu gihe Impinduka y’Abafaransa yahumekewe n’ivyiyumviro vy’idini.
  - Impinduka y’Abanyamerika yarongowe n’abakoloni, mu gihe Impinduka y’Abafaransa yarongowe n’abanyacubahiro.
  - Impinduka y’Abanyamerika yari ndende, mu gihe Impinduka y’Abafaransa yari ngufi.
explanation: |
  Impinduka y’Abanyamerika yatumye habaho uburyo bwo kwegeranya ubutegetsi kandi bushikamye bushingiye ku butegetsi bw’amategeko, mu gihe Impinduka y’Abafaransa yamanutse ningoga mu Buterabwoba n’ubutegetsi bw’igitugu kubera amacakubiri yo mu mutima no gushiramwo ubutegetsi hamwe.
reviewed: true
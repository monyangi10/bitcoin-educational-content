question: 미국 혁명과 프랑스 혁명의 주요 차이점은 무엇인가요?
answer: 미국 혁명은 분권화된 법치 국가의 형성으로 이어졌고, 프랑스 혁명은 공포와 독재의 시대로 이어졌습니다.
wrong_answers:
  - 미국 혁명은 계몽주의 사상에서 영감을 받았고, 프랑스 혁명은 종교 사상에서 영감을 받았습니다.
  - 미국 혁명은 식민지 주민들이 주도한 반면, 프랑스 혁명은 귀족들이 주도했습니다.
  - 미국 혁명은 길었던 반면 프랑스 혁명은 짧았습니다.
explanation: |
  미국 혁명은 법치에 기반한 분권적이고 안정적인 체제를 구축한 반면, 프랑스 혁명은 내부 분열과 권력 집중으로 인해 공포와 독재로 빠르게 몰락했습니다.
reviewed: true
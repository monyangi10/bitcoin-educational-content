question: Wat is het belangrijkste verschil tussen de Amerikaanse Revolutie en de Franse Revolutie?
answer: De Amerikaanse Revolutie leidde tot de vorming van een gedecentraliseerde rechtsstaat, terwijl de Franse Revolutie leidde tot een periode van Terreur en dictatuur.
wrong_answers:
  - De Amerikaanse Revolutie werd geïnspireerd door ideeën uit de Verlichting, terwijl de Franse Revolutie werd geïnspireerd door religieuze ideeën.
  - De Amerikaanse Revolutie werd geleid door kolonisten, terwijl de Franse Revolutie werd geleid door edelen.
  - De Amerikaanse Revolutie duurde lang, terwijl de Franse Revolutie kort was.
explanation: |
  De Amerikaanse Revolutie resulteerde in een gedecentraliseerd en stabiel systeem gebaseerd op de rechtsstaat, terwijl de Franse Revolutie snel afgleed naar Terreur en dictatuur door interne verdeeldheid en centralisatie van de macht.
reviewed: true
question: मार्क्स के अनुसार मनुष्य के अलगाव (alienation) का मुख्य स्रोत क्या है?  

(मार्क्स के मुताबिक, पूंजीवादी व्यवस्था में मजदूर का अपने काम, उत्पाद, अपने साथी मजदूरों और खुद से अलगाव हो जाता है। यह अलगाव मुख्य रूप से उत्पादन के साधनों पर मजदूर के नियंत्रण की कमी और शोषण की व्यवस्था की वजह से पैदा होता है।)
answer: पूंजीवादी शोषण की वजह से होने वाली आर्थिक अलगाव।
wrong_answers:
  - वो राजनीतिक अलगाव जो नागरिकों को खुलकर अपनी बात कहने से रोकता है।
  - सामाजिक अन्याय की हकीकत को छुपाने वाला धार्मिक अलगाव।
  - अमेरिकी संस्कृति से अलगाव।
explanation: |
  मार्क्स के अनुसार, मानवीय अलगाव (alienation) की जड़ आर्थिक अलगाव में है, जहाँ पूंजीवाद के तहत मजदूर को अपने श्रम का फल नहीं मिलता, जिससे उसके अस्तित्व पर नियंत्रण और जीवन का अर्थ दोनों खो जाते हैं।

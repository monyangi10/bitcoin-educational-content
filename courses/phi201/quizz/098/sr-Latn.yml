question: Koji je primarni izvor ljudske otuđenosti prema Marksu?
answer: Ekonomska alienacija koja proizlazi iz kapitalističke eksploatacije.
wrong_answers:
  - Politička otuđenost koja sprečava građane da se slobodno izražavaju.
  - Religijska otuđenost koja prikriva stvarnost društvenih nepravdi.
  - Otuđenje od američke kulture.
explanation: |
  Prema Marksu, ljudska otuđenost je ukorenjena u ekonomskoj otuđenosti, gde je radnik lišen plodova svog rada pod kapitalizmom, što dovodi do gubitka kontrole i smisla u njihovom postojanju.

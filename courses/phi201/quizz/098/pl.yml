question: Jakie jest główne źródło ludzkiej alienacji według Marksa?
answer: Alienacja ekonomiczna wynikająca z kapitalistycznego wyzysku.
wrong_answers:
  - Polityczna alienacja, która uniemożliwia obywatelom swobodne wyrażanie siebie.
  - Religijna alienacja, która maskuje rzeczywistość niesprawiedliwości społecznej.
  - Alienacja od kultury amerykańskiej.
explanation: |
  Według Marksa ludzka alienacja jest zakorzeniona w alienacji ekonomicznej, w której pracownik jest pozbawiony owoców swojej pracy w kapitalizmie, co prowadzi do utraty kontroli i sensu jego istnienia.
reviewed: false
question: 마르크스에 따르면 인간 소외의 주요 원인은 무엇인가요?
answer: 자본주의적 착취로 인한 경제적 소외.
wrong_answers:
  - 시민들이 자유롭게 자신을 표현하지 못하게 하는 정치적 소외.
  - 사회적 불의의 현실을 가리는 종교적 소외.
  - 미국 문화로부터의 소외.
explanation: |
  마르크스에 따르면 인간 소외는 자본주의 하에서 노동의 결실을 박탈당하는 경제적 소외에 뿌리를 두고 있으며, 이로 인해 노동자는 자신의 존재에 대한 통제력과 의미를 상실하게 됩니다.
reviewed: true
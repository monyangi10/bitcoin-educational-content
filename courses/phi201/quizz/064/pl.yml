question: Według Jacquesa Le Goffa, kiedy po raz pierwszy sformułowano pojęcie uzasadnionego interesu?
answer: W XIII w.
wrong_answers:
  - W XI w.
  - W XII w.
  - W XIV w.
explanation: |
  Jacques Le Goff umieszcza pierwszą teoretyzację uzasadnionego interesu w XIII wieku, gdzie idea ta pojawiła się w kontekście teologicznej i ekonomicznej refleksji nad wykorzystaniem pieniędzy i praktyk handlowych.

question: Volgens Jacques Le Goff, wanneer werd het begrip legitiem belang voor het eerst getheoretiseerd?
answer: In de 13e eeuw.
wrong_answers:
  - In de 11e eeuw.
  - In de 12e eeuw.
  - In de 14e eeuw.
explanation: |
  Jacques Le Goff plaatst de eerste theorievorming over legitieme rente in de 13e eeuw, waar dit idee opkwam in een context van theologische en economische reflectie over het gebruik van geld en handelspraktijken.
reviewed: true
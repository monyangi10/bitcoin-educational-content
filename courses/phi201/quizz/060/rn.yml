question: None ubu kapitalizimu bwavukiye mu dini irihe?
answer: Mu bijanye n’ubukirisu.
wrong_answers:
  - Mu bijanye n’ubuyisilamu.
  - Mu bijanye n’idini ry’Abayuda.
  - Mu bijanye n’ubupagani.
explanation: |
  Ubu kapitalizimu bwavutse mu gihe c’ubukirisu bwo mu kinjana ca mbere mu Buraya, aho ibisagara vy’ubudandaji n’imigenzo y’ubutunzi vyateye imbere naho idini ryari ribujije inguzanyo zitanga inyungu be n’inyungu.
reviewed: true
question: Jakie jest główne narzędzie ekonomiczne zalecane przez Keynesa do stymulowania gospodarki?
answer: Wzrost wydatków publicznych
wrong_answers:
  - Cięcia podatkowe
  - Liberalizacja rynku
  - Wzrost eksportu
explanation: |
  Keynes opowiadał się za zwiększeniem wydatków publicznych w celu stymulowania ogólnego popytu, zwłaszcza w okresach recesji, w celu zmniejszenia bezrobocia i pobudzenia wzrostu gospodarczego.

question: Wat is het belangrijkste economische middel dat Keynes aanbeveelt om de economie te stimuleren?
answer: Stijgingen in overheidsuitgaven
wrong_answers:
  - Belastingverlagingen
  - Liberalisering van de markt
  - Toename export
explanation: |
  Keynes pleitte voor het verhogen van de overheidsuitgaven om de algemene vraag te stimuleren, vooral tijdens periodes van recessie, om de werkloosheid te verminderen en de economische groei te stimuleren.
reviewed: true
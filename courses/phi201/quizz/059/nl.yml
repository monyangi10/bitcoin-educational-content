question: Op basis waarvan stelden de geleerden van de School van Salamanca dat de inheemse bevolking recht had op hun land?
answer: Natuurwet.
wrong_answers:
  - Goddelijk recht.
  - Het recht van veroveraars.
  - Internationaal recht.
explanation: |
  De geleerden van de School van Salamanca stelden dat de inheemse bevolking recht had op hun land op basis van het natuurrecht, omdat ze van mening waren dat alle mensen fundamentele rechten hebben, onafhankelijk van religieuze overtuigingen of veroveringen.
reviewed: true
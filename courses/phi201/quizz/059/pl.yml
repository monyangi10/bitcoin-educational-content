question: Na jakiej podstawie uczeni ze Szkoły w Salamance argumentowali, że rdzenni mieszkańcy mieli prawa do swoich ziem?
answer: Prawo naturalne.
wrong_answers:
  - Boskie prawo.
  - Prawo zdobywców.
  - Prawo międzynarodowe.
explanation: |
  Uczeni ze Szkoły w Salamance twierdzili, że rdzenni mieszkańcy mieli prawa do swoich ziem w oparciu o prawo naturalne, biorąc pod uwagę, że wszyscy ludzie mają podstawowe prawa niezależne od przekonań religijnych lub podbojów.

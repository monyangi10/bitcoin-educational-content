question: Salamanca Okulu akademisyenleri, Yerli halkın toprakları üzerinde hakları olduğunu neye dayanarak savunmuşlardır?
answer: Doğal hukuk.
wrong_answers:
  - İlahi hak.
  - Fatihlerin hakkı.
  - Uluslararası hukuk.
explanation: |
  Salamanca Okulu akademisyenleri, tüm insanların dini inançlardan veya fetihlerden bağımsız olarak temel haklara sahip olduğunu göz önünde bulundurarak, Yerli halkın toprakları üzerinde doğal hukuka dayalı hakları olduğunu ileri sürmüşlerdir.
reviewed: true
question: स्कूल ऑफ सलामांका के विद्वानों ने किस आधार पर यह तर्क दिया कि स्वदेशी लोगों को अपनी भूमि पर अधिकार था?
answer: प्राकृतिक कानून।
wrong_answers:
  - दैवीय अधिकार
  - विजेताओं का अधिकार।
  - अंतरराष्ट्रीय कानून।
explanation: |
  सालामांका स्कूल के विद्वानों ने दावा किया कि मूल निवासियों को प्राकृतिक कानून के आधार पर अपनी ज़मीनों का अधिकार था, क्योंकि उनका मानना था कि सभी इंसानों के मूल अधिकार होते हैं, चाहे उनका धर्म कुछ भी हो या फिर उनपर किसी ने कब्ज़ा कर लिया हो।
reviewed: false
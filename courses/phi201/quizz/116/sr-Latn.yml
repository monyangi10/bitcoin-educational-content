question: Koji je glavni događaj označio kraj konvertibilnosti dolara u zlato?
answer: Nixonov šok
wrong_answers:
  - Velika depresija
  - Naftni šok
  - Drugi svetski rat
explanation: |
  Nixonov šok, 1971. godine, okončao je konvertibilnost dolara u zlato, označavajući kraj Bretton Woods sistema i početak fluktuirajućih valuta, jer Sjedinjene Američke Države više nisu mogle podržavati Exchange zlata za dolare.

question: वह कौन सी बड़ी घटना थी जिसने डॉलर का सोने में परिवर्तन (कन्वर्टिबिलिटी) खत्म कर दिया?
answer: निक्सन शॉक
wrong_answers:
  - महामंदी
  - तेल का झटका (Oil Shock)
  - द्वितीय विश्व युद्ध
explanation: |
  1971 में निक्सन शॉक ने डॉलर को सोने में बदलने की सुविधा को खत्म कर दिया, जिससे ब्रेटन वुड्स सिस्टम का अंत हो गया और करेंसी के फ्लोटिंग होने की शुरुआत हुई, क्योंकि अमेरिका अब डॉलर के बदले Exchange सोने की गारंटी नहीं दे सकता था।
reviewed: false
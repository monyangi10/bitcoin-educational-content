question: Czym jest grecka polis?
answer: Rynek
wrong_answers:
  - Prawo natury
  - Prawo człowieka
  - Świątynia poświęcona bogom
explanation: |
  Grecka polis odnosi się do miasta-państwa, organizacji politycznej i społecznej, w której obywatele uczestniczą w życiu publicznym i biorą udział w zbiorowych decyzjach. Stanowi ona ramy demokracji i obywatelstwa w starożytnej Grecji.

question: Wat is de Griekse polis?
answer: De markt
wrong_answers:
  - De wet van de natuur
  - Mensenrecht
  - De tempel is gewijd aan de goden
explanation: |
  De Griekse polis verwijst naar de stadstaat, een politieke en sociale organisatie waar burgers deelnemen aan het openbare leven en deelnemen aan collectieve beslissingen. Het vormt het kader van de democratie en het burgerschap in het oude Griekenland.
reviewed: true
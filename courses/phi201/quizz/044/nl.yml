question: Hoe heeft de bevestiging van de menselijke vrijheid in de middeleeuwse christelijke theologie bijgedragen aan de ontwikkeling van het moderne denken?
answer: Alle bovenstaande antwoorden zijn juist.
wrong_answers:
  - Het leidde tot het in twijfel trekken van het politieke gezag en de bevestiging van de vrijheid van geweten.
  - Het legde de basis voor een verdediging van individuele rechten.
  - Het bevorderde de ontwikkeling van experimentele wetenschap en rationeel onderzoek.
explanation: |
  De bevestiging van menselijke vrijheid in de middeleeuwse christelijke theologie plaveide de weg voor het moderne denken door de autonomie van het geweten aan te moedigen, de basis te leggen voor individuele rechten en een rationele en experimentele benadering van kennis te bevorderen.
reviewed: true
question: मध्यकालीन ईसाई धर्मशास्त्र में मानव स्वतंत्रता के दावे ने आधुनिक विचारधारा के विकास में कैसे योगदान दिया?
answer: ऊपर दिए गए सभी जवाब सही हैं।
wrong_answers:
  - इससे राजनीतिक अधिकार पर सवाल उठने लगे और अंतःकरण की आज़ादी पर ज़ोर दिया जाने लगा।
  - इसने व्यक्तिगत अधिकारों के बचाव की नींव रखी।
  - इसने प्रयोगात्मक विज्ञान और तर्कसंगत शोध के विकास को बढ़ावा दिया।
explanation: |
  मध्यकालीन ईसाई धर्मशास्त्र में मानव स्वतंत्रता के दावे ने आधुनिक विचारधारा का रास्ता साफ किया। इसने विवेक की स्वायत्तता को बढ़ावा दिया, व्यक्तिगत अधिकारों की नींव रखी, और ज्ञान के प्रति तर्कसंगत व प्रयोगात्मक दृष्टिकोण को बढ़ावा दिया।
reviewed: false
question: 중세 기독교 신학에서 인간의 자유에 대한 주장은 근대 사상의 발전에 어떻게 기여했나요?
answer: 위의 정답은 모두 정답입니다.
wrong_answers:
  - 이는 정치적 권위에 대한 의문과 양심의 자유에 대한 주장으로 이어졌습니다.
  - 이를 통해 개인의 권리를 보호할 수 있는 토대가 마련되었습니다.
  - 실험 과학과 합리적 연구의 발전을 촉진했습니다.
explanation: |
  중세 기독교 신학에서 인간의 자유를 주장한 것은 양심의 자율성을 장려하고 개인의 권리를 위한 토대를 마련하며 지식에 대한 합리적이고 실험적인 접근 방식을 장려함으로써 근대적 사고의 토대를 마련했습니다.
reviewed: true
question: Ortaçağ Hıristiyan teolojisinde insan özgürlüğünün savunulması modern düşüncenin gelişimine nasıl katkıda bulunmuştur?
answer: Yukarıdaki cevapların hepsi doğrudur.
wrong_answers:
  - Siyasi otoritenin sorgulanmasına ve vicdan özgürlüğünün savunulmasına yol açmıştır.
  - Bireysel hakların savunulması için zemin hazırlamıştır.
  - Deneysel bilimin ve rasyonel araştırmanın gelişmesini teşvik etmiştir.
explanation: |
  Ortaçağ Hıristiyan teolojisinde insan özgürlüğünün savunulması, vicdanın özerkliğini teşvik ederek, bireysel haklar için zemin hazırlayarak ve bilgiye rasyonel ve deneysel bir yaklaşımı teşvik ederek modern düşüncenin yolunu açmıştır.
reviewed: true
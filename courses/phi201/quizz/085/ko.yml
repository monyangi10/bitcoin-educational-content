question: 존 스튜어트 밀에 따르면 국가 주권의 한계는 무엇인가요?
answer: 국가는 개인의 행동이 다른 사람에게 해를 끼칠 경우에만 개입할 수 있습니다.
wrong_answers:
  - 국가는 모든 상황에서 주권 국가이며 어떤 개인이나 집단에 의해 제한될 수 없습니다.
  - 국가 주권은 경제적 수단에 의해 제한됩니다.
  - 국가 주권은 자연의 법칙에 의해 제한됩니다.
explanation: |
  존 스튜어트 밀은 개인의 행동이 타인에게 해를 끼칠 때만 국가 개입이 정당하며, 타인에게 해를 끼치지 않는 영역에서 개인의 자유를 보호해야 한다고 주장합니다.
reviewed: true
question: Ni igiki Philippe Fabry yashizeho ku bijanye n’ivyo vyatumye Ubwami bw’Uburoma bugwa?
answer: Igutemba kw’Ubwami bw’Uburoma ni ingaruka y’ubutunzi butari bwiza be n’ingingo ngenderwako y’ubwami bw’abanyagihugu.
wrong_answers:
  - Ubwami bw'Uburoma bwarasenyutse kubera ibitero vy'abanyamahanga n'imikazo y'abantu b'Abadagi.
  - Ubwami bw’Uburoma bwaratsinzwe n’ingorane zo mu vy’inyifato runtu be n’ugutakaza ingingo ngenderwako za kera.
  - Itemba ry’Ubwami bw’Uburoma riterwa n’idini be n’ukwaguka kw’ubukirisu.
explanation: |
  Nk’uko Philippe Fabry abivuga, ugutemba kw’Ubwami bw’Uburoma kuva ku rutonde rw’ubutunzi rwacitse intege kubera ugushira ubutegetsi hagati bikomeye be n’ugushiramwo Leta birenze urugero, ivyo bikaba bigabanya ubwigenge bw’ubutunzi kandi bikaba bituma haba ukudahukana imbere mu gihugu.
reviewed: true
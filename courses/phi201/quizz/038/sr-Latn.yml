question: Koja je glavna teza Philippea Fabryja u vezi sa uzrocima pada Rimskog carstva?
answer: Pad Rimačkog carstva posledica je neuspešnog ekonomskog sistema i intervencionističke imperijalne politike.
wrong_answers:
  - Rimsko carstvo se srušilo zbog invazija varvara i pritiska germanskih naroda.
  - Rimsko carstvo je podleglo moralnoj krizi i gubitku tradicionalnih vrednosti.
  - Pad rimskog carstva je zbog religioznih uzroka i širenja hrišćanstva.
explanation: |
  Prema Philippe Fabryju, pad Rimskog carstva rezultat je ekonomskog sistema oslabljenog jakom centralizacijom i prekomernim državnim intervencionizmom, što je ograničilo ekonomsku autonomiju i izazvalo unutrašnje neravnoteže.

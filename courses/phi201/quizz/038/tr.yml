question: Philippe Fabry'nin Roma İmparatorluğu'nun çöküş nedenlerine ilişkin temel tezi nedir?
answer: Roma İmparatorluğu'nun çöküşü, başarısız bir ekonomik sistemin ve müdahaleci emperyal politikanın sonucudur.
wrong_answers:
  - Roma İmparatorluğu, barbar istilaları ve Germen halklarının baskısı nedeniyle çöktü.
  - Roma İmparatorluğu ahlaki bir krize ve geleneksel değerlerin kaybına yenik düşmüştür.
  - Roma İmparatorluğu'nun çöküşü dini nedenlere ve Hıristiyanlığın yayılmasına bağlıdır.
explanation: |
  Philippe Fabry'ye göre Roma İmparatorluğu'nun çöküşü, güçlü merkezileşme ve aşırı devlet müdahaleciliği nedeniyle zayıflayan, ekonomik özerkliği sınırlayan ve iç dengesizliklere neden olan bir ekonomik sistemden kaynaklanmaktadır.
reviewed: true
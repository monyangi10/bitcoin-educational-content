question: 로마 제국 멸망의 원인에 관한 필립 파브리의 주요 논지는 무엇인가요?
answer: 로마 제국의 몰락은 실패한 경제 시스템과 개입주의적 제국 정책의 결과입니다.
wrong_answers:
  - 로마 제국은 야만족의 침략과 게르만 민족의 압력으로 무너졌습니다.
  - 로마 제국은 도덕적 위기와 전통적 가치의 상실에 굴복했습니다.
  - 로마 제국의 멸망은 종교적 원인과 기독교의 확장으로 인한 것입니다.
explanation: |
  필립 파브리에 따르면 로마 제국의 몰락은 강력한 중앙집권화와 과도한 국가 개입주의로 인해 경제 시스템이 약화되어 경제적 자율성이 제한되고 내부 불균형이 초래된 결과입니다.
reviewed: true
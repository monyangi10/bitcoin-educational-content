question: Jaka jest główna teza Philippe'a Fabry'ego dotycząca przyczyn upadku Cesarstwa Rzymskiego?
answer: Upadek Imperium Rzymskiego jest konsekwencją upadającego systemu gospodarczego i interwencjonistycznej polityki imperialnej.
wrong_answers:
  - Imperium Rzymskie upadło z powodu najazdów barbarzyńców i presji ze strony ludów germańskich.
  - Imperium Rzymskie uległo kryzysowi moralnemu i utracie tradycyjnych wartości.
  - Upadek Cesarstwa Rzymskiego wynika z przyczyn religijnych i ekspansji chrześcijaństwa.
explanation: |
  Według Philippe'a Fabry'ego upadek Cesarstwa Rzymskiego wynikał z systemu gospodarczego osłabionego przez silną centralizację i nadmierny interwencjonizm państwowy, ograniczający autonomię gospodarczą i powodujący wewnętrzną nierównowagę.

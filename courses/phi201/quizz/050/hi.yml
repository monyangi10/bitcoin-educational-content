question: मध्यकालीन समाजों पर हावी रहने वाली धार्मिक-राजनीतिक व्यवस्था की मुख्य विशेषता क्या थी?
answer: राजनीतिक ताकत और धार्मिक ताकत आपस में गहराई से जुड़े हुए थे, और राजनीतिक नेता एक धार्मिक नेता भी होता था।
wrong_answers:
  - चर्च और राज्य के बीच शक्तियों का बँटवारा साफ-साफ तय था और उसका सम्मान किया जाता था।
  - धार्मिक सहिष्णुता व्यापक रूप से प्रचलित थी, और धार्मिक अल्पसंख्यकों को बहुसंख्यकों के समान अधिकार प्राप्त थे।
  - बाकी सारे जवाब सही हैं।
explanation: |
  मध्यकालीन समाजों में, धार्मिक-राजनीतिक व्यवस्था राजनीतिक और धार्मिक शक्ति के गहरे जुड़ाव से बनी थी, जहाँ नेताओं को उनकी सांसारिक शक्ति के साथ-साथ आध्यात्मिक अधिकार भी प्राप्त होते थे।
reviewed: false
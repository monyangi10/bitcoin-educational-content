question: 산업화는 근로자의 생활 환경에 어떤 영향을 미쳤나요?
answer: 지역과 활동 분야에 따라 다른 영향을 미쳤습니다
wrong_answers:
  - 이로 인해 생활 환경이 전반적으로 악화되었습니다
  - 새로운 기회를 창출하고 생활 수준을 향상시켰습니다
  - 산업화가 근로자에게 미치는 영향은 판단하기에는 너무 복잡합니다
explanation: |
  산업화는 근로자의 생활 조건에 다양한 영향을 미쳤으며, 지역과 업종에 따라 그 영향이 달라 일부 근로자는 개선된 근무 환경을 경험한 반면 다른 근로자는 어려운 근무 조건에 직면했습니다.
reviewed: true
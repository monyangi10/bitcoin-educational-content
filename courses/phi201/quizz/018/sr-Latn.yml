question: Kako je industrijalizacija uticala na životne uslove radnika?
answer: Imalo je različite efekte u zavisnosti od regiona i sektora aktivnosti.
wrong_answers:
  - To je dovelo do opšteg pogoršanja njihovih životnih uslova.
  - Stvorilo je nove prilike i poboljšalo njihov životni standard.
  - Uticaj industrijalizacije na radnike je previše složen da bi se mogao oceniti
explanation: |
  Industrijalizacija je imala različite uticaje na životne uslove radnika, s efektima koji su se razlikovali po regionima i sektorima, pri čemu su neki radnici doživeli poboljšanja, dok su se drugi suočavali sa teškim radnim uslovima.
reviewed: false
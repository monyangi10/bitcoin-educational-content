question: औद्योगीकरण ने मजदूरों के रहन-सहन पर क्या असर डाला?
answer: इसका असर अलग-अलग इलाकों और काम के क्षेत्रों पर अलग-अलग तरीके से हुआ।
wrong_answers:
  - इससे उनकी रहने की हालत आम तौर पर खराब हो गई
  - इसने नए अवसर पैदा किए और उनकी जीवन स्तर को सुधार दिया
  - औद्योगीकरण का मजदूरों पर असर इतना पेचीदा है कि उसका आसानी से फैसला नहीं किया जा सकता
explanation: |
  औद्योगीकरण का मजदूरों की जिंदगी पर अलग-अलग असर पड़ा, जगह और काम के हिसाब से फर्क था। कुछ मजदूरों की हालत सुधरी, तो वहीं दूसरों को मुश्किल कामकाजी हालात का सामना करना पड़ा।
reviewed: false
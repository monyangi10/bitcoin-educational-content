question: Hoe beïnvloedde de industrialisatie de levensomstandigheden van arbeiders?
answer: Het had verschillende effecten, afhankelijk van de regio's en sectoren van activiteit
wrong_answers:
  - Het leidde tot een algemene verslechtering van hun levensomstandigheden
  - Het creëerde nieuwe kansen en verbeterde hun levensstandaard
  - De impact van industrialisatie op werknemers is te complex om te beoordelen
explanation: |
  De industrialisatie had uiteenlopende gevolgen voor de levensomstandigheden van arbeiders, waarbij de effecten verschilden per regio en sector; sommige arbeiders ondervonden verbeteringen, terwijl anderen te maken kregen met moeilijke arbeidsomstandigheden.
reviewed: true
question: Wat is de fundamentele illusie van de staat volgens Marx?
answer: Het vertegenwoordigt het algemeen belang en niet de specifieke belangen van een klasse.
wrong_answers:
  - Het is in staat om onpartijdigheid te garanderen.
  - Het dient de burgermaatschappij.
  - Het bevordert de klassenstrijd.
explanation: |
  Voor Marx beweert de staat het algemeen belang te vertegenwoordigen. Maar in werkelijkheid is het een instrument ten dienste van de belangen van de dominante klasse, waardoor de onderdrukking van de ondergeschikte klassen wordt bestendigd.
reviewed: true
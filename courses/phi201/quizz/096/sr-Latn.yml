question: Koja je osnovna iluzija države prema Marksu?
answer: Predstavlja opšti interes, a ne specifične interese jedne klase.
wrong_answers:
  - Sposoban je da garantuje nepristrasnost.
  - Služi civilnom društvu.
  - Promovi klasnu borbu.
explanation: |
  Za Marksa, država tvrdi da predstavlja opšti interes, ali u stvarnosti, ona je instrument u službi interesa vladajuće klase, čime se perpetuira ugnjetavanje podređenih klasa.
reviewed: false
question: मार्क्स के अनुसार, यूरोप के असाधारण विकास की व्याख्या क्या है?
answer: तकनीकी प्रगति और दूसरे लोगों के शोषण का मेल
wrong_answers:
  - तकनीकों की प्रगति और पूंजी का संचय
  - साम्राज्यवाद, गुलामी, और दूसरे लोगों का शोषण
  - व्यक्तिगत स्वतंत्रताओं और लोकतंत्र का विकास
explanation: |
  मार्क्स यूरोप के असाधारण विकास को तकनीकी प्रगति और दूसरे लोगों के शोषण के गठजोड़ का नतीजा मानते हैं। वे बताते हैं कि यूरोपीय आर्थिक विकास दूसरे देशों पर प्रभुत्व जमाकर और उनके संसाधनों पर कब्ज़ा करके हासिल किया गया था।
reviewed: false
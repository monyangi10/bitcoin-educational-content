question: Marx'a göre Avrupa'nın olağanüstü büyümesini ne açıklar?
answer: Teknik ilerleme ve diğer insanların sömürülmesinin birleşimi
wrong_answers:
  - Tekniklerin ilerlemesi ve sermaye birikimi
  - Emperyalizm, kölelik ve diğer insanların sömürülmesi
  - Bireysel özgürlüklerin ve demokrasinin gelişimi
explanation: |
  Marx, Avrupa'nın istisnai büyümesini teknik ilerleme ve diğer halkların sömürülmesinin ittifakına bağlayarak, Avrupa'nın ekonomik kalkınmasının diğer ulusların kaynaklarına tahakküm ve el koyma yoluyla sağlandığını vurgulamıştır.
reviewed: true
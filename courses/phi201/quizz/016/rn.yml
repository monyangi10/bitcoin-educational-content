question: Nk’uko Marx abivuga, ni igiki gisigura iterambere ridasanzwe ry’Uburayi?
answer: Ihuriro ry'iterambere ry'ubuhinga n'ugukoresha nabi abandi bantu .
wrong_answers:
  - Ugutera imbere kw'ubuhinga n'ukwirundanira umutungo
  - Ubutegetsi bw’abami, ubuja, n’ugukoresha nabi abandi bantu .
  - Guteza imbere umwidegemvyo w'umuntu ku giti ciwe na demokarasi
explanation: |
  Marx avuga ko iterambere ridasanzwe ry’Uburayi riterwa n’ubumwe bw’iterambere ry’ubuhinga n’ugukoresha nabi abandi bantu, ashimika ku vy’uko iterambere ry’ubutunzi bw’Uburayi ryashitsweko biciye mu kuganza no kwigarurira ubutunzi buva mu bindi bihugu.
reviewed: true
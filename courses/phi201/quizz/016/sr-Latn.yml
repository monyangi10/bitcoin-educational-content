question: Prema Marksu, šta objašnjava izuzetan rast Evrope?
answer: Kombinacija tehničkog napretka i eksploatacije drugih naroda
wrong_answers:
  - Napredak tehnika i akumulacija kapitala
  - Imperijalizam, ropstvo i eksploatacija drugih naroda
  - Razvoj individualnih sloboda i demokratije
explanation: |
  Marks pripisuje izuzetan rast Evrope savezu tehničkog napretka i eksploatacije drugih naroda, ističući da je evropski ekonomski razvoj postignut kroz dominaciju i prisvajanje resursa iz drugih nacija.

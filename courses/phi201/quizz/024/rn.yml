question: Ni igiki Rothbard abona ku bijanye n’ikibano c’umwidegemvyo?
answer: Ikibano aho ata n’umwe yoshobora gutera umuntu canke itunga ryiwe ku nguvu.
wrong_answers:
  - Ikibano aho Leta igenzura gusa imice mikeyi y’ubuzima bw’ubutunzi n’imibano.
  - Igihugu aho umuntu afise umwidegemvyo wo gukora ivyo ashaka vyose ata n’umwe amubuza.
  - Ikibano aho ububasha bugabanywa mu buryo buringaniye mu migwi yose y’abantu.
explanation: |
  Rothbard asobanura ko igihugu cidegemvya ari ahantu ata bugizi bwa nabi bwo guhatira umuntu canke itunga ryiwe kwemerewe, gutyo akavuga ko hariho uburenganzira bwo kwidegemvya bushingiye ku buhinga bwa none, bukaba bwanka ko Leta yinjira mu buzima bw’umuntu ku giti ciwe.
reviewed: true
question: 로스바드의 자유 사회에 대한 비전은 무엇인가요?
answer: 개인의 신체나 재산에 대한 강압적인 공격의 가능성이 없는 사회.
wrong_answers:
  - 국가가 경제 및 사회 생활의 몇 가지 측면만을 통제하는 사회.
  - 개인이 아무런 제약 없이 원하는 것을 자유롭게 할 수 있는 사회.
  - 권력이 모든 사회 계층에 고르게 분배되는 사회.
explanation: |
  로스바드는 자유 사회를 개인이나 재산에 대한 강압적 침략이 허용되지 않는 곳으로 정의하며, 개인의 삶에 대한 국가의 개입을 거부하는 급진적 자유주의를 옹호합니다.
reviewed: true
question: रॉथबार्ड की एक मुक्त समाज की दृष्टि क्या है?
answer: एक ऐसा समाज जिसमें किसी व्यक्ति के शरीर या संपत्ति के खिलाफ जबरदस्ती आक्रमण की कोई संभावना नहीं हो।
wrong_answers:
  - एक समाज जहां राज्य आर्थिक और सामाजिक जीवन के केवल कुछ पहलुओं पर ही नियंत्रण रखता है।
  - एक ऐसा समाज जहां लोग बिना किसी पाबंदी के जो चाहें वो करने के आज़ाद हों।
  - एक समाज जहां सत्ता सभी सामाजिक वर्गों में बराबर बांटी गई हो।
explanation: |
  रॉथबार्ड एक मुक्त समाज को ऐसी जगह के रूप में परिभाषित करते हैं जहाँ किसी व्यक्ति या संपत्ति के खिलाफ जबरदस्ती की आक्रामकता की अनुमति नहीं होती, इस तरह वे एक कट्टरपंथी उदारतावाद (radical libertarianism) का समर्थन करते हैं जो व्यक्तिगत जीवन में किसी भी राज्य हस्तक्षेप को खारिज करता है।

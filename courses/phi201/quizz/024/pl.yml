question: Jaka jest wizja wolnego społeczeństwa według Rothbarda?
answer: Społeczeństwo, w którym nie ma możliwości przymusowej agresji przeciwko osobie lub własności jednostki.
wrong_answers:
  - Społeczeństwo, w którym państwo kontroluje tylko kilka aspektów życia gospodarczego i społecznego.
  - Społeczeństwo, w którym jednostki mogą robić, co chcą, bez żadnych ograniczeń.
  - Społeczeństwo, w którym władza jest równomiernie rozłożona na wszystkie klasy społeczne.
explanation: |
  Rothbard definiuje wolne społeczeństwo jako miejsce, w którym nie dopuszcza się żadnej przymusowej agresji przeciwko osobie lub własności, opowiadając się tym samym za radykalnym libertarianizmem, który odrzuca jakąkolwiek interwencję państwa w życie jednostki.

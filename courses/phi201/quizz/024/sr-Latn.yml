question: Kakva je Rothbardova vizija slobodnog društva?
answer: Društvo u kojem ne postoji mogućnost prinudne agresije protiv ličnosti ili imovine pojedinca.
wrong_answers:
  - Društvo u kojem država kontroliše samo nekoliko aspekata ekonomskog i društvenog života.
  - Društvo u kojem su pojedinci slobodni da rade šta god žele bez ikakvih ograničenja.
  - Društvo u kojem je moć ravnomerno raspoređena među svim društvenim klasama.
explanation: |
  Rothbard definiše slobodno društvo kao mesto gde nije dozvoljena nikakva prinudna agresija protiv osobe ili imovine, zagovarajući tako radikalni libertarijanizam koji odbacuje bilo kakvu državnu intervenciju u individualni život.

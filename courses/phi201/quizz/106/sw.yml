question: Kulingana na Hayek, ni nini kinachotofautisha uliberali na ujamaa?
answer: Njia zinazotumiwa kufikia malengo haya.
wrong_answers:
  - Inayofuatwa inaisha.
  - Jukumu la wasomi.
  - Yote ya hapo juu.
explanation: |
  Kwa Hayek, tofauti ya kimsingi kati ya uliberali na ujamaa iko katika njia: uliberali unakuza uhuru wa mtu binafsi na soko huria, wakati ujamaa unahusisha uingiliaji kati wa serikali na mipango.

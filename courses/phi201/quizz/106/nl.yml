question: Wat onderscheidt volgens Hayek liberalisme van socialisme?
answer: De middelen die worden gebruikt om deze doelen te bereiken.
wrong_answers:
  - De achtervolging eindigt.
  - De rol van intellectuelen.
  - Al het bovenstaande.
explanation: |
  Voor Hayek ligt het fundamentele verschil tussen liberalisme en socialisme in de middelen: liberalisme bevordert individuele vrijheid en de vrije markt, terwijl socialisme staatsinterventies en planning inhoudt.
reviewed: true
question: Co według Hayeka odróżnia liberalizm od socjalizmu?
answer: Środki użyte do osiągnięcia tych celów.
wrong_answers:
  - Ścigany się kończy.
  - Rola intelektualistów.
  - Wszystkie powyższe.
explanation: |
  Dla Hayeka podstawowa różnica między liberalizmem a socjalizmem polega na środkach: liberalizm promuje wolność jednostki i wolny rynek, podczas gdy socjalizm obejmuje interwencje państwa i planowanie.
reviewed: false
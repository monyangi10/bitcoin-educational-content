question: Ni nde yateye iciyumviro co guhiganwa hagati y’amafaranga y’abikorera ku giti cabo?
answer: Fridiriki Hayek
wrong_answers:
  - Yohani Maynard Keynes
  - Jako Rufu
  - Satoshi Nakamoto
explanation: |
  Friedrich Hayek yateye imbere iciyumviro co guhiganwa hagati y’amafaranga y’abikorera ku giti cabo kugira ngo bigabanye ingaruka za Leta ku mafaranga no guhimiriza ugushikama kw’amahera ashingiye ku isoko aho gushingira ku ngingo ngenderwako zishingiye ku ngingo zitandukanye.
reviewed: true
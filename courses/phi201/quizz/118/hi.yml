question: निजी मुद्राओं के बीच प्रतिस्पर्धा का विचार किसने प्रस्तावित किया था?
answer: फ्रीडरिख हायेक
wrong_answers:
  - जॉन मेनार्ड कीन्स
  - जैक्स रुइफ़
  - जीडब्ल्यू-0 नाकामोटो
explanation: |
  फ्रेडरिक हायेक ने सरकारों के मुद्रा पर प्रभाव को कम करने और केंद्रीकृत नीतियों के बजाय बाजार के आधार पर मौद्रिक स्थिरता को बढ़ावा देने के लिए निजी मुद्राओं के बीच प्रतिस्पर्धा का विचार प्रस्तावित किया।
reviewed: false
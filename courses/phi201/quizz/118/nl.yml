question: Wie opperde het idee van concurrentie tussen privévaluta's?
answer: Friedrich Hayek
wrong_answers:
  - John Maynard Keynes
  - Jacques Rueff
  - Satoshi Nakamoto
explanation: |
  Friedrich Hayek stelde het idee van concurrentie tussen privévaluta's voor om de invloed van overheden op valuta's te verminderen en monetaire stabiliteit op basis van de markt in plaats van gecentraliseerd beleid aan te moedigen.
reviewed: true
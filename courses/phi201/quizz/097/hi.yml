question: मार्क्सवादी धर्म की आलोचना क्या है?  

मार्क्सवाद के अनुसार, धर्म एक तरह का "जनता का अफीम" (opium of the people) है। यह लोगों को उनकी वास्तविक समस्याओं से ध्यान भटकाकर काल्पनिक सुख देता है और शोषण के खिलाफ संघर्ष करने से रोकता है। मार्क्स का मानना था कि धर्म पूँजीवादी व्यवस्था को बनाए रखने का एक औजार है, जो गरीबों और मजदूरों को यह समझाता है कि उनकी मुश्किलें "ईश्वर की मर्जी" हैं और उन्हें इन्हें स्वीकार करना चाहिए।  

इसके अलावा, मार्क्सवादियों का कहना है कि धर्म वर्ग संघर्ष को धुंधला कर देता है। यह लोगों को यह विश्वास दिलाता है कि असली बदलाव "परलोक" में मिलेगा, न कि इस दुनिया में संघर्ष करके। इस तरह, यह शोषित वर्गों को उनके हक के लिए लड़ने से रोकता है और सत्ताधारियों को फायदा पहुँचाता है।  

संक्षेप में, मार्क्सवादी आलोचना के मुताबिक धर्म एक भ्रम है जो समाज में असमानता को बनाए रखने में मदद करता है।
answer: यह लोगों को उनकी असली आज़ादी की लड़ाई से भटका देता है।
wrong_answers:
  - यह बुद्धिजीवियों का अफीम है।
  - यह आज़ादी और बराबरी के सिद्धांतों के साथ मेल नहीं खाता।
  - यह मेहनत में कोई अतिरिक्त फायदा नहीं देता।
explanation: |
  मार्क्स धर्म को एक ऐसे औज़ार के रूप में देखते हैं जो मज़दूरों को उनके शोषण के ढाँचे को बदलने के बजाय, उनकी भौतिक स्थितियों के बारे में सांत्वना देकर उनके मुक्ति के संघर्ष से भटका देता है।
reviewed: false
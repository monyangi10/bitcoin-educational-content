question: None ivyo aba Marxiste banegura idini ni ibiki?
answer: Bikevya abantu mu ntambara yo kwidegemvya kwabo nyakuri.
wrong_answers:
  - Ni opium y’abanyabwenge.
  - Ntibihuye n’ingingo ngenderwako z’umwidegemvyo n’uburinganire.
  - Nta gaciro kongerewe mu bikorwa bitanga.
explanation: |
  Marx abona ko idini ari igikoresho gikevya abakozi mu rugamba rwabo rwo kwidegemvya mu kubahoza ku bijanye n’imibereho yabo y’ivy’umubiri ata kubaremesha guhindura imiterere y’ugukoresha nabi.
reviewed: true
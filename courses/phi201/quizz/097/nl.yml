question: Wat is de marxistische kritiek op religie?
answer: Het leidt mensen af van de strijd voor hun werkelijke emancipatie.
wrong_answers:
  - Het is de opium van de intellectuelen.
  - Het is onverenigbaar met de principes van vrijheid en gelijkheid.
  - Het biedt geen toegevoegde waarde in arbeid.
explanation: |
  Marx ziet religie als een middel dat arbeiders afleidt van hun strijd voor emancipatie door hen te troosten over hun materiële omstandigheden zonder hen aan te moedigen de structuren van uitbuiting te veranderen.
reviewed: true
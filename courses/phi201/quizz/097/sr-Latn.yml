question: Kakva je marksistička kritika religije?
answer: To odvraća ljude od borbe za njihovu stvarnu emancipaciju.
wrong_answers:
  - To je opijum intelektualaca.
  - To je nespojivo sa principima slobode i jednakosti.
  - Ne pruža dodatnu vrednost u radu.
explanation: |
  Marks vidi religiju kao alat koji skreće pažnju radnika sa njihove borbe za emancipaciju tako što ih teši u vezi sa njihovim materijalnim uslovima, bez podsticanja da promene strukture eksploatacije.

question: Nk’uko Acton abivuga, ni uruhara uruhe Ekleziya Gatolika yagize mu gutuma umwidegemvyo utera imbere mu Buraya?
answer: Ivyo vyose biri hejuru
wrong_answers:
  - Yarateye imbere ugutandukanya ububasha n'uburinganire bw'inguvu .
  - Rwaraburanira uburenganzira bw’umuntu ku giti ciwe be n’umwidegemvyo w’ijwi ryo mu mutima .
  - Yaremesheje guca irya n’ino ibintu no kwibaza ubukuru .
explanation: |
  Nk’uko Acton abivuga, Ekleziya Gatolika yarafise uruhara runini mu gutuma umwidegemvyo utera imbere mu Buraya mu guteza imbere ugutandukanya ubutegetsi, mu kugwanira uburenganzira bw’umuntu ku giti ciwe no mu kuremesha impwemu yo guca imanza, gutyo bikaba vyarafashije mu gushinga igihugu gifise umwidegemvyo kuruta.
reviewed: true
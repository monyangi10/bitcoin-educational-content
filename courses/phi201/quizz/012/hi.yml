question: एक्टन के मुताबिक, कैथोलिक चर्च ने यूरोप में आज़ादी के उदय में क्या भूमिका निभाई?
answer: ऊपर लिखा सब कुछ
wrong_answers:
  - इसने अधिकारों के बँटवारे और ताक़तों के संतुलन को बढ़ावा दिया
  - इसने व्यक्तिगत अधिकारों और विवेक की स्वतंत्रता की रक्षा की।
  - इसने आलोचनात्मक सोच को बढ़ावा दिया और अधिकारियों पर सवाल उठाने को प्रोत्साहित किया।
explanation: |
  ऐक्टन के अनुसार, कैथोलिक चर्च ने यूरोप में आज़ादी के उदय में अहम भूमिका निभाई। उसने अलग-अलग सत्ताओं को बाँटने, व्यक्तिगत अधिकारों की रक्षा करने और आलोचनात्मक सोच को बढ़ावा देकर एक स्वतंत्र समाज के निर्माण में योगदान दिया।
reviewed: false
question: Według Actona, jaką rolę odegrał Kościół katolicki w powstaniu wolności w Europie?
answer: Wszystkie powyższe
wrong_answers:
  - Promowała ona podział władzy i równowagę sił
  - Broniła praw jednostki i wolności sumienia
  - Zachęcała do krytycznego myślenia i kwestionowania autorytetów
explanation: |
  Według Actona Kościół katolicki odegrał kluczową rolę w powstaniu wolności w Europie, promując podział władzy, broniąc praw jednostki i zachęcając do krytycznego ducha, przyczyniając się w ten sposób do kształtowania bardziej wolnego społeczeństwa.
reviewed: false
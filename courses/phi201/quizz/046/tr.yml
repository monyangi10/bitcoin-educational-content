question: Ortaçağ mistisizminin dini rasyonalizmden farkı nedir?
answer: Mistisizm Tanrı'nın doğrudan deneyimini ve inancın aşkınlığını vurgular.
wrong_answers:
  - Mistisizm akla ve rasyonel bilgi arayışına değer verir.
  - Dini rasyonalizm, inancı akıldan daha aşağı bir bilgi biçimi olarak görür.
  - Dini rasyonalizm, inanç ve aklı tutarlı bir şekilde ifade ederek uzlaştırmaya çalışır.
explanation: |
  Ortaçağ mistisizmi, inancı akıl yoluyla anlamaya ve yapılandırmaya çalışan dini rasyonalizmin aksine, Tanrı'nın doğrudan deneyimine odaklanan sezgisel ve kişisel bir inanç yaklaşımını tercih eder.
reviewed: true
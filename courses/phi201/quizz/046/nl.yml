question: Waarin verschilt middeleeuwse mystiek van religieus rationalisme?
answer: Mystiek benadrukt de directe ervaring van God en de transcendentie van het geloof.
wrong_answers:
  - Mystiek waardeert de rede en het streven naar rationele kennis.
  - Religieus rationalisme beschouwt geloof als een vorm van kennis die inferieur is aan de rede.
  - Religieus rationalisme probeert geloof en rede met elkaar te verzoenen door ze op een samenhangende manier te verwoorden.
explanation: |
  Middeleeuwse mystiek geeft de voorkeur aan een intuïtieve en persoonlijke benadering van het geloof, gericht op de directe ervaring van God, in tegenstelling tot religieus rationalisme, dat het geloof probeert te begrijpen en te structureren door middel van de rede.
reviewed: true
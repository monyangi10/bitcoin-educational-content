question: मध्यकालीन रहस्यवाद और धार्मिक तर्कवाद में क्या अंतर है?
answer: रहस्यवाद में भगवान के सीधे अनुभव और आस्था के परमात्मा से मिलन पर ज़ोर दिया जाता है।
wrong_answers:
  - रहस्यवाद तर्क और तर्कसंगत ज्ञान की खोज को महत्व देता है।
  - धार्मिक तर्कवाद विश्वास को ज्ञान का एक ऐसा रूप मानता है जो तर्क से कमतर होता है।
  - धार्मिक तर्कवाद आस्था और तर्क को सुसंगत तरीके से जोड़ने की कोशिश करता है।
explanation: |
  मध्यकालीन रहस्यवाद आस्था के एक सहज और व्यक्तिगत तरीके को पसंद करता है, जो ईश्वर के सीधे अनुभव पर केंद्रित होता है। यह धार्मिक तर्कवाद से अलग है, जो आस्था को तर्क के जरिए समझने और व्यवस्थित करने की कोशिश करता है।

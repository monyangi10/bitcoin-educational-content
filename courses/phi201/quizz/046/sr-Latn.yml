question: Kako se srednjovekovni misticizam razlikuje od religijskog racionalizma?
answer: Misticizam naglašava direktno iskustvo Boga i transcendenciju vere.
wrong_answers:
  - Misticizam ceni razum i potragu za racionalnim znanjem.
  - Religijski racionalizam smatra veru oblikom znanja inferiornim u odnosu na razum.
  - Religiozni racionalizam nastoji da pomiri veru i razum artikulišući ih na koherentan način.
explanation: |
  Srednjovekovni misticizam favorizuje intuitivan i lični pristup veri, fokusirajući se na direktno iskustvo Boga, za razliku od religijskog racionalizma, koji nastoji da razume i strukturira veru kroz razum.

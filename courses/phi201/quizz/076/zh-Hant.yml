question: 圖爾戈的價值理論與亞當‧斯密的價值理論有什麼根本的差異？
answer: Turgot 認為價值是由勞動力決定的，而 Smith 則認為價值是由效用決定的。
wrong_answers:
  - Turgot 相信自由貿易是最好的經濟政策，而 Smith 則相信保護主義。
  - Turgot認為國家的角色是讓市場自由發展，而Smith則認為政府應該介入經濟。
  - 在價值方面，Turgot 與 Smith 的理論沒有根本的差異。
explanation: |
  圖爾戈 (Turgot) 認為勞動是價值的主要決定因素，而亞當‧斯密 (Adam Smith) 則提出了受效用與需求影響的價值觀念，預示了主觀經濟學的來臨。
reviewed: false
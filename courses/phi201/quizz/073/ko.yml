question: 물리학자들에 따르면 중상주의와 자유무역의 근본적인 차이점은 무엇인가요?
answer: 상업주의는 다른 국가를 희생시키면서 한 국가를 풍요롭게 하는 반면, 자유무역은 모든 국가를 풍요롭게 합니다.
wrong_answers:
  - 상업주의는 포지티브섬 게임인 반면, 자유무역은 제로섬 게임입니다.
  - 상업주의는 경쟁을 부추깁니다.
  - 자유 무역은 스와핑을 촉진합니다.
explanation: |
  물리학자들에게 중상주의는 한 국가가 다른 국가를 희생하여 스스로를 풍요롭게 한다는 생각에 기초합니다. 반면, 자유무역은 호혜적인 교류를 통해 모든 국가를 풍요롭게 하는 호혜적 이익을 가능하게 합니다.
reviewed: true
question: Wat is het fundamentele verschil tussen mercantilisme en vrijhandel volgens de fysiocraten?
answer: Mercantilisme verrijkt één natie ten koste van andere, terwijl vrijhandel alle naties verrijkt.
wrong_answers:
  - Mercantilisme is een spel met een positieve som, terwijl vrijhandel een spel met een nul som is.
  - Mercantilisme bevordert concurrentie.
  - Vrije handel bevordert ruilhandel.
explanation: |
  Voor de fysiocraten is mercantilisme gebaseerd op het idee dat een natie zichzelf verrijkt ten koste van anderen. Vrijhandel daarentegen maakt wederzijdse voordelen mogelijk, waardoor alle naties verrijkt worden door wederzijds voordelige uitwisselingen.
reviewed: true
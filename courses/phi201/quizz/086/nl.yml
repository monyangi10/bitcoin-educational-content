question: Wat is Constants kritiek op Rousseau en zijn concept van vrijheid?
answer: Constant bekritiseert Rousseau omdat hij de vrijheid van de Ouden verwart met die van de Modernen.
wrong_answers:
  - Constant bekritiseert Rousseau voor zijn pleidooi voor democratie.
  - Constant bekritiseert Rousseau omdat hij het belang van verkiezingen ontkent.
  - Constant bekritiseert Rousseau omdat hij revolutionair geweld steunt.
explanation: |
  Constant verwijt Rousseau dat hij een concept van vrijheid waardeert dat geïnspireerd is door de Oudheid en gericht is op collectieve participatie, ten koste van de individuele vrijheid die kenmerkend is voor moderne samenlevingen, waar de privésfeer beschermd moet worden.
reviewed: true
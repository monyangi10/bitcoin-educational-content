question: Wat is volgens de tekst het fundamentele verschil tussen Contract theorieën en markttheorieën?
answer: Contract theorieën streven naar sociale harmonie door middel van staatsdwang, terwijl markttheorieën individuele belangen op zichzelf laten harmoniseren.
wrong_answers:
  - Contract theorieën zijn van toepassing op primitieve samenlevingen, terwijl markttheorieën van toepassing zijn op moderne samenlevingen.
  - Contract theorieën gaan over de verdeling van rijkdom, terwijl markttheorieën gaan over de productie van goederen en diensten.
  - De Contract theorieën worden verdedigd door de fysiocraten, terwijl de markttheorieën worden verdedigd door de mercantilisten.
explanation: |
  Contract theorieën zien sociale harmonie als opgelegd door de staat, terwijl markttheorieën ervan uitgaan dat individuele belangen, door vrije interactie, spontaan een sociaal evenwicht creëren.
reviewed: true
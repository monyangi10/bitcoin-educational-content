question: Wat is Hayeks belangrijkste kritiek op het Keynesiaanse monetaire beleid?
answer: Het creëert economische zeepbellen en recessies
wrong_answers:
  - Het bevordert langetermijninvesteringen
  - Het vermindert sociale ongelijkheden
  - Het verhoogt de binnenlandse vraag ongecontroleerd
explanation: |
  Hayek bekritiseerde het Keynesiaanse monetaire beleid door te stellen dat het kunstmatige overinvesteringscycli aanmoedigt, wat leidt tot economische zeepbellen en, onvermijdelijk, tot recessies wanneer deze zeepbellen uiteenspatten.
reviewed: true
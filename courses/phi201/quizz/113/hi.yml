question: हायेक की कीन्सियन मौद्रिक नीति पर मुख्य आलोचना क्या है?
answer: यह आर्थिक बुलबुले और मंदी पैदा करता है
wrong_answers:
  - यह लंबे समय के निवेश को बढ़ावा देता है
  - यह सामाजिक असमानताओं को कम करता है
  - यह घरेलू मांग को बेकाबू तरीके से बढ़ा देता है
explanation: |
  हायक ने कीन्सियन मौद्रिक नीति की आलोचना करते हुए कहा कि यह कृत्रिम अति-निवेश चक्रों को बढ़ावा देती है, जिससे आर्थिक बुलबुले बनते हैं और अंततः मंदी आती है जब ये बुलबुले फूटते हैं।

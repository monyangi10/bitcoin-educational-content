question: Wat is volgens Marx de noodzakelijke voorwaarde voor echte emancipatie?
answer: De realisatie van een economische en sociale revolutie die het kapitalisme afschaft.
wrong_answers:
  - De oprichting van een onpartijdige en neutrale staat.
  - De eliminatie van religie en haar illusies.
  - De vernietiging van McDonald's.
explanation: |
  Voor Marx vereist werkelijke emancipatie een radicale transformatie van economische en sociale structuren door middel van revolutie, om zo een einde te maken aan de kapitalistische uitbuiting en een klassenloze maatschappij te vestigen.
reviewed: true
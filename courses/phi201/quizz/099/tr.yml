question: Marx'a göre gerçek kurtuluş için gerekli koşul nedir?
answer: Kapitalizmi ortadan kaldıran ekonomik ve sosyal bir devrimin gerçekleştirilmesi.
wrong_answers:
  - Tarafsız ve nötr bir devletin kurulması.
  - Dinin ve onun yanılsamalarının ortadan kaldırılması.
  - McDonald's'ın yıkımı.
explanation: |
  Marx'a göre gerçek kurtuluş, ekonomik ve sosyal yapıların devrim yoluyla radikal bir şekilde dönüştürülmesini, böylece kapitalist sömürünün sona erdirilmesini ve sınıfsız bir toplumun kurulmasını gerektirir.
reviewed: true
question: मार्क्स के अनुसार सच्ची आज़ादी की ज़रूरी शर्त क्या है?
answer: एक आर्थिक और सामाजिक क्रांति की प्राप्ति जो पूंजीवाद को खत्म कर दे।
wrong_answers:
  - एक निष्पक्ष और तटस्थ राज्य की स्थापना।
  - धर्म और उसके भ्रमों का खात्मा।
  - मैकडॉनल्ड्स का विनाश।
explanation: |
  मार्क्स के लिए, असली आज़ादी के लिए क्रांति के ज़रिए आर्थिक और सामाजिक ढाँचे में बुनियादी बदलाव ज़रूरी है, ताकि पूँजीवादी शोषण ख़त्म हो और एक बिना वर्ग वाला समाज बन सके।
reviewed: false
question: Koji je neophodan uslov za istinsku emancipaciju prema Marksu?
answer: Ostvarenje ekonomske i socijalne revolucije koja ukida kapitalizam.
wrong_answers:
  - Osnivanje nepristrasne i neutralne države.
  - Eliminacija religije i njenih iluzija.
  - Uništenje McDonald's-a.
explanation: |
  Za Marksa, prava emancipacija zahteva radikalnu transformaciju ekonomskih i društvenih struktura putem revolucije, kako bi se okončala kapitalistička eksploatacija i uspostavilo društvo bez klasa.

question: Wat is vrijheid volgens Aristoteles?
answer: Gehoorzaamheid aan de wet van de stad
wrong_answers:
  - De afwezigheid van enige beperking
  - De macht om te doen wat je wilt
  - Alle andere antwoorden zijn juist.
explanation: |
  Voor Aristoteles bestaat vrijheid uit het gehoorzamen van de wetten van de stad, zoals deze zijn vastgesteld voor het algemeen welzijn. Ware vrijheid wordt gerealiseerd binnen het kader van burgerschap en deelname aan het politieke leven.
reviewed: true
question: Waar wordt in traditionele geschiedenisboeken vaak de nadruk op gelegd?
answer: Militaire veroveringen en biografieën van leiders
wrong_answers:
  - De ontwikkeling van ideeën en filosofische bewegingen
  - De strijd voor vrijheid en individuele rechten
  - Wetenschappelijke en technologische vooruitgang
explanation: |
  In traditionele geschiedenisboeken wordt vaak de nadruk gelegd op militaire veroveringen en de biografieën van leiders, waardoor de invloed van ideeën, sociale bewegingen en vooruitgang op andere gebieden wordt verwaarloosd.
reviewed: true
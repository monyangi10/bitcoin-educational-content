question: Na czym często koncentrują się tradycyjne podręczniki do historii?
answer: Podboje militarne i biografie przywódców
wrong_answers:
  - Rozwój idei i ruchów filozoficznych
  - Walka o wolność i prawa jednostki
  - Postęp naukowy i technologiczny
explanation: |
  W tradycyjnych podręcznikach historii nacisk kładzie się często na podboje militarne i biografie przywódców, zaniedbując tym samym wpływ idei, ruchów społecznych i postępów w innych dziedzinach.

question: Na šta se često fokusiraju tradicionalni udžbenici istorije?
answer: Vojna osvajanja i biografije vođa
wrong_answers:
  - Razvoj ideja i filozofskih pokreta
  - Borbe za slobodu i individualna prava
  - Naučni i tehnološki napredak
explanation: |
  U tradicionalnim istorijskim udžbenicima, naglasak je često stavljen na vojne osvajanja i biografije vođa, čime se zanemaruje uticaj ideja, društvenih pokreta i napredaka u drugim oblastima.

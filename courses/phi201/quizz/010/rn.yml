question: Ni igiki akenshi kishimikwako cane mu bitabu vy’amateka y’imigenzo?
answer: Intsinzi z'igisirikare n'amateka y'abarongozi
wrong_answers:
  - Iterambere ry'ivyiyumviro n'imigwi ya filozofiya .
  - Intambara zo kwidegemvya n'uburenganzira bw'umuntu ku giti ciwe
  - Amaterambere mu vya siyansi no mu vy'ubuhinga
explanation: |
  Mu bitabu vy’amateka vy’imigenzo, akenshi hashirwako umutima ku vyo ingabo zinesheje no ku makuru y’ubuzima bw’abarongozi, gutyo hakaba hatagira ico bitaho ku ngaruka z’ivyiyumviro, imigwi y’abantu be n’iterambere mu bindi bintu.
reviewed: true
question: De Atheense democratie werd gekenmerkt door...
answer: Levendige openbare discussies over stadszaken
wrong_answers:
  - Een erfelijke koning die alle beslissingen nam
  - Een kleine groep rijke mannen die de regering controleerde
  - Een machtig leger dat zijn wil oplegde aan andere steden
explanation: |
  De Atheense democratie hield een actieve deelname van burgers in, die in de Assemblee publiekelijk debatteerden over stadszaken, waardoor collectieve besluitvorming en een bestuurssysteem gebaseerd op dialoog bevorderd werden.
reviewed: true
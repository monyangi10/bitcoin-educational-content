question: एथेनियन डेमोक्रेसी की खासियत थी...
answer: शहर के मामलों पर जोशीली सार्वजनिक चर्चाएँ
wrong_answers:
  - एक वंशानुगत राजा जो सारे फैसले खुद लेता था
  - सरकार पर काबू रखने वाले अमीर आदमियों का एक छोटा समूह
  - एक ताकतवर सेना जो दूसरे शहरों पर अपनी मर्जी थोपती थी
explanation: |
  एथेनियन लोकतंत्र में नागरिकों की सक्रिय भागीदारी होती थी, जो असेंबली में शहर के मामलों पर खुलकर बहस करते थे। इस तरह सामूहिक निर्णय लेने और संवाद पर आधारित सरकारी प्रणाली को बढ़ावा मिलता था।

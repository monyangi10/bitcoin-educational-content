question: Koja je glavna posledica politike kontrole cena koju je sproveo car Dioklecijan?
answer: To je dovelo do nestašica robe i porasta crnog tržišta.
wrong_answers:
  - Pomoglo je stabilizaciji cena i obuzdavanju inflacije.
  - Ojačalo je carevu moć i povećalo njegovu popularnost među narodom.
  - Doprinelo je povećanju vojnih resursa.
explanation: |
  Dioklecijanova politika kontrole cena stvorila je ekonomske distorzije, uzrokujući nestašice i podstičući razvoj crnog tržišta, jer postavljene cene nisu odražavale realnost Supply i potražnje.

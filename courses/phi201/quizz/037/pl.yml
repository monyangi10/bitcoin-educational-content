question: Jaka jest główna konsekwencja polityki kontroli cen wdrożonej przez cesarza Dioklecjana?
answer: Doprowadziło to do niedoborów towarów i wzrostu czarnego rynku.
wrong_answers:
  - Pomogło to ustabilizować ceny i ograniczyć inflację.
  - Wzmocniło to władzę cesarza i zwiększyło jego popularność wśród ludu.
  - Przyczyniło się to do zwiększenia zasobów wojskowych.
explanation: |
  Polityka kontroli cen Dioklecjana spowodowała zakłócenia gospodarcze, powodując niedobory i zachęcając do rozwoju czarnego rynku, ponieważ ustalone ceny nie odzwierciedlały rzeczywistości Supply i popytu.

question: Ni ingaruka nyamukuru iyihe y’ingingo ngenderwako yo kugenzura ibiciro yashizwe mu ngiro n’Umwami w’abami Dioclétien?
answer: Vyatumye haba ubukene bw’ibicuruzwa n’ukwiyongera kw’isoko ry’ibara ry’agahama.
wrong_answers:
  - Vyafashije gutuma ibiciro biguma bimeze neza no kugabanya ugutera imbere kw’ibiciro.
  - Rwarakomeje ububasha bw’umwami w’abami kandi rwongera gukundwa n’abantu.
  - Yaratumye habaho ukwiyongera kw’ubutunzi bw’igisirikare.
explanation: |
  Itegeko rya Dioclétien ryo kugenzura ibiciro ryatumye habaho uguhinduka kw’ubutunzi, bituma haba ubukene n’ugutera imbere kw’isoko ry’umwirabura, kuko ibiciro vyashizweho bitagaragaza neza ukuri kwa Supply n’ivyo abantu basaba.
reviewed: true
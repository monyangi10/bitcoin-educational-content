question: Wat is het belangrijkste gevolg van het prijscontrolebeleid van keizer Diocletianus?
answer: Dit leidde tot tekorten aan goederen en een toename van de zwarte markt.
wrong_answers:
  - Het hielp de prijzen te stabiliseren en de inflatie te beteugelen.
  - Het versterkte de macht van de keizer en verhoogde zijn populariteit onder het volk.
  - Het droeg bij aan de toename van militaire middelen.
explanation: |
  Het prijscontrolebeleid van Diocletianus leidde tot economische verstoringen, met tekorten en de ontwikkeling van een zwarte markt tot gevolg, omdat de vastgestelde prijzen niet nauwkeurig de Supply en de vraag weerspiegelden.
reviewed: true
question: Jaka jest definicja władzy społecznej podana przez Rothbarda?
answer: Zdolność jednostek do współpracy i tworzenia bogactwa poprzez pracę i innowacje
wrong_answers:
  - Siła przymusu państwa używana do kontrolowania i wykorzystywania społeczeństwa
  - Władza dużych korporacji i monopoli nad gospodarką
  - Siła związków zawodowych i organizacji pracowniczych
explanation: |
  Rothbard definiuje władzę społeczną jako zdolność jednostek do łączenia się w celu współpracy, innowacji i wytwarzania bogactwa, podkreślając znaczenie osobistej inicjatywy i współpracy w tworzeniu wartości ekonomicznej.

question: Wat is volgens Murray Rothbard de drijvende kracht achter de geschiedenis?
answer: Het conflict tussen sociale macht en staatsmacht
wrong_answers:
  - De strijd tussen sociale klassen
  - Wetenschappelijke en technologische vooruitgang
  - Alle andere antwoorden zijn juist.
explanation: |
  Murray Rothbard stelt dat het conflict tussen sociale macht, die staat voor samenwerking en productie, en staatsmacht, die streeft naar controle en uitbuiting, de ware drijvende kracht is achter historische gebeurtenissen en sociale ontwikkelingen.
reviewed: true
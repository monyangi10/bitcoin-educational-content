question: मरे रोथबार्ड के मुताबिक, इतिहास की असली चालक शक्ति क्या है?
answer: सामाजिक ताकत और राज्य की ताकत के बीच का टकराव
wrong_answers:
  - सामाजिक वर्गों के बीच संघर्ष
  - वैज्ञानिक और तकनीकी प्रगति
  - बाकी सारे जवाब सही हैं।
explanation: |
  मरे रोथबार्ड का कहना है कि सामाजिक शक्ति, जो सहयोग और उत्पादन को दर्शाती है, और राज्य शक्ति, जो नियंत्रण और शोषण करना चाहती है, के बीच का संघर्ष ही ऐतिहासिक घटनाओं और सामाजिक विकास की असली प्रेरक शक्ति है।
reviewed: false
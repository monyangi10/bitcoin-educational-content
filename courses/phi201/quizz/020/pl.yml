question: Według Murraya Rothbarda, co jest siłą napędową historii?
answer: Konflikt między władzą społeczną a władzą państwową
wrong_answers:
  - Walka między klasami społecznymi
  - Postęp naukowy i technologiczny
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  Murray Rothbard argumentuje, że konflikt między władzą społeczną, która reprezentuje współpracę i produkcję, a władzą państwową, która dąży do kontroli i wyzysku, jest prawdziwą siłą napędową wydarzeń historycznych i rozwoju społecznego.
reviewed: false
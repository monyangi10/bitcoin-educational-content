question: Nk’uko Murray Rothbard abivuga, ni igiki gituma amateka agira ico akoze?
answer: Intambara iri hagati y'ububasha bw'imibano n'ububasha bwa Leta .
wrong_answers:
  - Urugamba hagati y'imigwi y'abantu
  - Iterambere ry'ubuhinga n'ubuhinga
  - Ibindi bisubizo vyose ni ukuri.
explanation: |
  Murray Rothbard avuga ko intambara iri hagati y’ububasha bw’imibano, buserukira ubufatanye n’uguhingura, n’ububasha bwa Leta, bushaka kugenzura no gukoresha nabi, ari yo nguvu nyakuri ituma ibintu vyabaye mu mateka n’iterambere ry’imibano bigenda neza.
reviewed: true
question: Welke van de oorzaken van de val van het Romeinse Rijk wordt door Montesquieu genoemd?
answer: Het loslaten van republikeinse waarden en het aannemen van een autoritair imperiaal systeem
wrong_answers:
  - Het einde van de veroveringen en de verarming van de bevolking
  - Hyperinflatie en economische crisis
  - Politieke instabiliteit en de snelle opvolging van keizers
explanation: |
  Montesquieu schrijft de val van het Romeinse Rijk toe aan het verlies van de republikeinse waarden die de basis vormden van de kracht van Rome, en aan de evolutie naar een gecentraliseerd en autoritair imperiaal regime dat de cohesie en burgerzin verzwakte.
reviewed: true
question: रोमन साम्राज्य के पतन के कारणों में से मॉन्टेस्क्यू ने किसे प्रमुखता से उजागर किया है?
answer: रिपब्लिकन मूल्यों का त्याग और एक अधिनायकवादी साम्राज्यवादी प्रणाली को अपनाना
wrong_answers:
  - विजयों का अंत और जनता की गरीबी
  - हाइपरइन्फ्लेशन और आर्थिक संकट
  - राजनीतिक अस्थिरता और बादशाहों का तेजी से बदलना
explanation: |
  मॉन्टेस्क्यू रोमन साम्राज्य के पतन का कारण उन गणतांत्रिक मूल्यों के खो जाने को मानते हैं जो रोम की ताकत की नींव थे, और एक केंद्रीकृत व अधिनायकवादी साम्राज्यवादी व्यवस्था की ओर विकास को भी, जिसने एकजुटता और नागरिक सद्गुण को कमज़ोर कर दिया।
reviewed: false
question: 성 토마스 아퀴나스에 따르면 자연법과 인간법의 관계는 무엇인가요?
answer: 인간의 법은 자연법에 따라야 정의롭고 합법적일 수 있습니다.
wrong_answers:
  - 인간의 법은 합법적인 당국에 의해 제정되었기 때문에 자연법보다 우월합니다.
  - 자연법은 인간의 법과 동등합니다.
  - 인간의 법은 부분적으로만 적용됩니다.
explanation: |
  성 토마스 아퀴나스에게 인간의 법은 보편적인 도덕 원칙을 표현하는 자연법과의 일치에서 그 정당성을 얻습니다. 인간법이 자연법과 모순되면 그 법은 정의와 정당성을 잃게 됩니다.
reviewed: true
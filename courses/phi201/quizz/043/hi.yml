question: सेंट थॉमस एक्विनास के अनुसार, प्राकृतिक नियम (natural law) और मानव नियम (human law) के बीच क्या संबंध है?  

एक्विनास के मुताबिक, प्राकृतिक नियम ईश्वर द्वारा बनाए गए नैतिक सिद्धांत हैं जो मनुष्य की तर्कशक्ति के ज़रिए समझे जा सकते हैं। यह सार्वभौमिक और अपरिवर्तनीय है। जबकि मानव नियम (human law) समाज द्वारा बनाए गए कानून होते हैं, जो प्राकृतिक नियम के आधार पर तैयार किए जाने चाहिए।  

वो कहते हैं कि मानव नियम प्राकृतिक नियम से प्रेरित होने चाहिए और उसके अनुरूप होने चाहिए। अगर कोई मानव नियम प्राकृतिक नियम के ख़िलाफ़ जाता है, तो वह अन्यायपूर्ण और अमान्य हो जाता है। इस तरह, प्राकृतिक नियम मानव नियमों के लिए एक आधार और मानक का काम करता है।
answer: इंसानी कानून प्राकृतिक कानून के मुताबिक होना चाहिए तभी वह न्यायसंगत और वैध माना जाएगा।
wrong_answers:
  - इंसानी कानून प्राकृतिक कानून से बेहतर है क्योंकि यह वैध अधिकारियों द्वारा बनाया जाता है।
  - प्राकृतिक कानून इंसानी कानून के बराबर है।
  - इंसानी कानून तो बस आधा-अधूरा ही लागू होता है।
explanation: |
  संत थॉमस एक्विनास के अनुसार, मानव कानून की वैधता प्राकृतिक कानून के अनुरूप होने से आती है, जो सार्वभौमिक नैतिक सिद्धांतों को व्यक्त करता है। अगर मानव कानून प्राकृतिक कानून के खिलाफ जाता है, तो वह अपनी न्यायसंगतता और वैधता खो देता है।

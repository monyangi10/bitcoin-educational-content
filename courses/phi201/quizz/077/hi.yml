question: थॉमस पेन की किताब का क्या नाम है?
answer: आम समझ।
wrong_answers:
  - अनोखा अहसास।
  - सबका भला।
  - उपरोक्त में से कोई भी उत्तर सही नहीं है।
explanation: |
  थॉमस पेन की किताब, जिसका नाम *कॉमन सेंस* (फ्रेंच में *Le sens commun*) है, एक प्रभावशाली पैम्फलेट थी जिसमें अमेरिकी आज़ादी का समर्थन किया गया और ब्रिटिश अत्याचार की निंदा की गई। इसने उपनिवेशवासियों को एकजुट करने में अहम भूमिका निभाई।
reviewed: false
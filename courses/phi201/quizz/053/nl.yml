question: Welke argumenten gebruikt de kerk om haar suprematie over de wereldlijke macht te bevestigen?
answer: Alle bovenstaande antwoorden zijn juist.
wrong_answers:
  - Het gezag van de paus als de plaatsvervanger van Christus op aarde.
  - Canoniek recht en kerkelijke rechtbanken.
  - De superioriteit van het christelijk geloof boven elke andere religie of filosofie.
explanation: |
  De kerk rechtvaardigt haar suprematie over de wereldlijke macht op basis van het gezag van de paus als vertegenwoordiger van Christus, de macht van kerkelijke rechtbanken door het kerkelijk recht en de bewering dat het christelijk geloof alle andere doctrines overtreft.
reviewed: true
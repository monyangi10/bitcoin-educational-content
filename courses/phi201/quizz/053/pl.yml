question: Jakimi argumentami posługuje się Kościół, aby potwierdzić swoją wyższość nad władzą doczesną?
answer: Wszystkie powyższe odpowiedzi są prawidłowe.
wrong_answers:
  - Autorytet papieża jako wikariusza Chrystusa na Ziemi.
  - Prawo kanoniczne i sądy kościelne.
  - Wyższość wiary chrześcijańskiej nad jakąkolwiek inną religią lub filozofią.
explanation: |
  Kościół uzasadnia swoją supremację nad władzą doczesną w oparciu o autorytet papieża jako przedstawiciela Chrystusa, władzę sądów kościelnych poprzez prawo kanoniczne oraz twierdzenie, że wiara chrześcijańska przewyższa wszystkie inne doktryny.
reviewed: false
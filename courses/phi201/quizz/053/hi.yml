question: चर्च ने अपने आध्यात्मिक अधिकार को सांसारिक सत्ता से ऊपर स्थापित करने के लिए कौन-कौन से तर्क दिए हैं?
answer: ऊपर दिए गए सभी जवाब सही हैं।
wrong_answers:
  - पोप का अधिकार, जो पृथ्वी पर ईसा मसीह के प्रतिनिधि के रूप में है।
  - कैनन कानून और चर्चीय अदालतें।
  - ईसाई धर्म की किसी भी अन्य धर्म या दर्शन पर श्रेष्ठता।
explanation: |
  चर्च अपनी सांसारिक सत्ता पर वर्चस्व को पोप के अधिकार के आधार पर सही ठहराता है, जो कि ईसा मसीह के प्रतिनिधि के रूप में हैं, कैनन कानून के माध्यम से चर्च की अदालतों की ताकत, और इस दावे पर कि ईसाई धर्म अन्य सभी सिद्धांतों से श्रेष्ठ है।
reviewed: false
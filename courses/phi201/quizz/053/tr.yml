question: Kilise'nin zamansal güç üzerindeki üstünlüğünü savunmak için kullandığı argümanlar nelerdir?
answer: Yukarıdaki cevapların hepsi doğrudur.
wrong_answers:
  - İsa'nın yeryüzündeki vekili olarak Papa'nın otoritesi.
  - Kilise hukuku ve kilise mahkemeleri.
  - Hıristiyan inancının diğer din veya felsefelere üstünlüğü.
explanation: |
  Kilise, geçici güç üzerindeki üstünlüğünü, Mesih'in temsilcisi olarak Papa'nın otoritesine, kanon hukuku aracılığıyla kilise mahkemelerinin gücüne ve Hıristiyan inancının diğer tüm doktrinlerden üstün olduğu iddiasına dayanarak haklı çıkarmaktadır.
reviewed: true
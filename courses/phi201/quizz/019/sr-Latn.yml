question: Koje je objašnjenje za evropsko čudo?
answer: Politička fragmentacija Evrope i odsustvo hegemonističke centralne sile
wrong_answers:
  - Nadmoć evropske kulture
  - Eksploatacija kolonija i prirodnih resursa iz ostatka sveta
  - Napredak nauke i tehnologije
explanation: |
  Evropsko čudo se objašnjava političkom fragmentacijom Evrope, koja je podsticala konkurenciju među državama i inovacije, dok je odsustvo dominantne centralne vlasti omogućilo pluralizam koji je stimulisao ekonomski i kulturni razvoj.

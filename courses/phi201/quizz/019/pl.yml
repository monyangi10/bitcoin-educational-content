question: Jakie jest wyjaśnienie europejskiego cudu?
answer: Polityczna fragmentacja Europy i brak hegemonicznej władzy centralnej
wrong_answers:
  - Wyższość kultury europejskiej
  - Eksploatacja kolonii i zasobów naturalnych z reszty świata
  - Postęp nauki i technologii
explanation: |
  Europejski cud tłumaczy się polityczną fragmentacją Europy, która sprzyjała konkurencji między państwami i innowacjom, podczas gdy brak dominującej władzy centralnej pozwolił na pluralizm, który stymulował rozwój gospodarczy i kulturalny.

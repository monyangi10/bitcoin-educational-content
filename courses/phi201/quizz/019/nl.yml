question: Wat is de verklaring voor het Europese wonder?
answer: De politieke fragmentatie van Europa en de afwezigheid van een hegemoniale centrale macht
wrong_answers:
  - De superioriteit van de Europese cultuur
  - De exploitatie van kolonies en natuurlijke hulpbronnen uit de rest van de wereld
  - De vooruitgang van wetenschap en technologie
explanation: |
  Het Europese wonder wordt verklaard door de politieke fragmentatie van Europa, die concurrentie tussen staten en innovatie bevorderde, terwijl de afwezigheid van een dominante centrale macht pluralisme mogelijk maakte dat economische en culturele ontwikkeling stimuleerde.
reviewed: true
question: Wat waren de belangrijkste doelen van de staat volgens Locke?
answer: Het leven, de vrijheid en het eigendom van individuen beschermen.
wrong_answers:
  - De wet handhaven en de orde handhaven.
  - Het bevorderen van het algemeen welzijn en sociale rechtvaardigheid.
  - Religie en morele waarden verdedigen.
explanation: |
  Voor Locke is de primaire missie van de staat het garanderen van de veiligheid van natuurlijke rechten, vooral leven, vrijheid en eigendom, zodat individuen in vrede kunnen leven en welvarend kunnen zijn.
reviewed: true
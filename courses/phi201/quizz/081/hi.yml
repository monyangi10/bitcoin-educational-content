question: लॉक के अनुसार राज्य के मुख्य उद्देश्य क्या थे?  

लॉक के मुताबिक, राज्य के प्रमुख लक्ष्य थे:  
1. **जीवन की सुरक्षा**: व्यक्तियों के जीवन को सुरक्षित रखना।  
2. **स्वतंत्रता की सुरक्षा**: नागरिकों की व्यक्तिगत आज़ादी को बचाना।  
3. **संपत्ति की सुरक्षा**: लोगों की निजी संपत्ति को सरकारी हस्तक्षेप से बचाना।  

वो मानता था कि राज्य का गठन ही एक "सामाजिक अनुबंध" के तहत होता है, जहाँ लोग अपनी कुछ स्वतंत्रताएँ सुरक्षा और व्यवस्था के बदले में सौंप देते हैं।
answer: व्यक्तियों के जीवन, आज़ादी और संपत्ति की सुरक्षा करना।
wrong_answers:
  - कानून लागू करना और व्यवस्था बनाए रखना।
  - सामान्य कल्याण और सामाजिक न्याय को बढ़ावा देना।
  - धर्म और नैतिक मूल्यों की रक्षा करना।
explanation: |
  लॉक के अनुसार, राज्य का मुख्य काम यह सुनिश्चित करना है कि प्राकृतिक अधिकारों, खासकर जीवन, आज़ादी और संपत्ति की सुरक्षा हो, ताकि लोग शांति से जी सकें और तरक्की कर सकें।

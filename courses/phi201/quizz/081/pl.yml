question: Jakie były główne cele państwa według Locke'a?
answer: Ochrona życia, wolności i własności jednostek.
wrong_answers:
  - Egzekwowanie prawa i utrzymywanie porządku.
  - Promowanie wspólnego dobrobytu i sprawiedliwości społecznej.
  - Bronić religii i wartości moralnych.
explanation: |
  Dla Locke'a podstawową misją państwa jest zapewnienie bezpieczeństwa praw naturalnych, zwłaszcza życia, wolności i własności, aby umożliwić jednostkom życie w pokoju i dobrobycie.
reviewed: false
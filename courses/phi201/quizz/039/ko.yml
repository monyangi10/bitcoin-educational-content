question: 필립 파브리는 로마 제국과 사회주의를 어떻게 비교하나요?
answer: 로마 제국은 사회주의 체제와 마찬가지로 중앙집권적 권력과 지시형 경제가 특징이었습니다.
wrong_answers:
  - 로마 제국과 사회주의 사이에는 유사점이 없습니다.
  - 로마 제국은 로마법에 기초하여 설립되었으며 개인의 자유를 존중했습니다.
  - 로마 제국은 다른 민족에게 지배권을 행사하고자 했던 다국적 제국이었어요.
explanation: |
  필립 파브리는 로마 제국을 현대 사회주의 체제와 비교하며 권력의 중앙 집중화와 경제에 대한 통제를 강조하는데, 그에 따르면 이러한 구조는 자유를 제한하고 내부 긴장을 유발합니다.
reviewed: true
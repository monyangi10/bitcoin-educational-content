question: Koje poređenje pravi Philippe Fabry između Rimskog carstva i socijalizma?
answer: Rimsko carstvo, kao i socijalistički režimi, karakterisala je centralizovana vlast i usmerena ekonomija.
wrong_answers:
  - Ne postoji sličnost između Rimskog carstva i socijalizma.
  - Rimsko carstvo je bilo zasnovano na rimskom pravu i poštovalo je individualne slobode.
  - Rimsko carstvo je bilo multinacionalno carstvo koje je nastojalo da nametne svoju dominaciju drugim narodima.
explanation: |
  Philippe Fabry poredi Rimsko carstvo sa modernim socijalističkim režimima ističući njihovu centralizaciju moći i kontrolu nad ekonomijom, strukturu koja, prema njemu, ograničava slobode i dovodi do unutrašnjih tenzija.

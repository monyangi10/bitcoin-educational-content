question: Jakiego porównania dokonuje Philippe Fabry między Imperium Rzymskim a socjalizmem?
answer: Imperium Rzymskie, podobnie jak reżimy socjalistyczne, charakteryzowało się scentralizowaną władzą i ukierunkowaną gospodarką.
wrong_answers:
  - Nie ma żadnego podobieństwa między Imperium Rzymskim a socjalizmem.
  - Imperium Rzymskie opierało się na prawie rzymskim i szanowało wolność jednostki.
  - Imperium Rzymskie było wielonarodowym imperium, które starało się narzucić swoją dominację innym narodom.
explanation: |
  Philippe Fabry porównuje Imperium Rzymskie do współczesnych reżimów socjalistycznych, podkreślając ich centralizację władzy i kontrolę nad gospodarką, strukturę, która według niego ogranicza wolności i prowadzi do wewnętrznych napięć.
reviewed: false
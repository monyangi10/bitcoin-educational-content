question: 콘스탄트에 따르면 정치적 자유와 경제적 자유의 관계는 무엇인가요?
answer: 이 두 가지 자유는 상호 의존적입니다.
wrong_answers:
  - 정치적 자유는 경제적 자유를 위한 필수 전제 조건입니다.
  - 경제적 자유는 정치적 자유를 위한 필수 전제 조건입니다.
  - 이 두 가지 자유는 서로 양립할 수 없습니다.
explanation: |
  벤자민 콘스탄트에게 정치적 자유와 경제적 자유는 밀접하게 연결되어 있는데, 개인의 자율성은 공적 업무에 참여할 수 있는 능력만큼이나 경제 활동을 방해받지 않고 수행할 수 있는 자유에 달려 있기 때문입니다.
reviewed: true
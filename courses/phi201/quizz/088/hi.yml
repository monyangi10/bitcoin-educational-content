question: कॉन्स्टैंट के अनुसार, राजनीतिक स्वतंत्रता और आर्थिक स्वतंत्रता के बीच क्या संबंध है?
answer: दोनों आज़ादियाँ एक-दूसरे पर निर्भर हैं।
wrong_answers:
  - राजनीतिक आज़ादी आर्थिक आज़ादी की एक ज़रूरी शर्त है।
  - आर्थिक आज़ादी राजनीतिक आज़ादी की एक ज़रूरी शर्त है।
  - दोनों आज़ादियाँ एक-दूसरे के साथ नहीं चल सकतीं।
explanation: |
  बेंजामिन कॉन्स्टेंट के लिए, राजनीतिक स्वतंत्रता और आर्थिक स्वतंत्रता गहराई से जुड़ी हुई हैं, क्योंकि व्यक्तिगत स्वायत्तता सार्वजनिक मामलों में भाग लेने की क्षमता पर उतनी ही निर्भर करती है, जितनी कि बिना रुकावट के आर्थिक गतिविधियाँ चलाने की स्वतंत्रता पर।
reviewed: false
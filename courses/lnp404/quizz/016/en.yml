question: What specific baseline value does Lightning Labs recommend for base_fee_msat when configuring Auto-Fees, and why is this value strategically important?
answer: 2,500 millisatoshis because it provides algorithmic headroom for both upward and downward fee adjustments
wrong_answers:
  - 1,000 millisatoshis because it minimizes initial routing costs while maximizing traffic volume
  - 5,000 millisatoshis because it ensures maximum revenue capture during high-demand periods
  - 500 millisatoshis because it creates the lowest possible barrier to entry for routing payments
explanation: |
  Lightning Labs specifically recommends 2,500 millisatoshis as the baseline because this middle-ground value gives the Auto-Fees algorithm necessary flexibility to adjust fees in both directions without immediately hitting floor or ceiling constraints. This strategic positioning allows the system to respond effectively to both demand surges (by increasing fees) and demand slumps (by decreasing fees) without being constrained by overly high or low starting points.

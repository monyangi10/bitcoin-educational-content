question: What is the primary architectural advantage of using LND Accounts for risk management when multiple applications need Lightning Network access?
answer: Each application operates in a sandboxed environment with granular permissions, budget limits, and expiration dates, containing security breaches to individual accounts
wrong_answers:
  - "Each application gets its own dedicated Lightning channels and private keys, completely isolating their funds from the main node's infrastructure"
  - Applications share the same macaroon but the node automatically creates backup channels that activate if one application becomes compromised
  - The system creates separate on-chain wallets for each application while maintaining shared Lightning channel liquidity across all accounts
explanation: |
  LND Accounts create virtual segregation through access control rather than infrastructure separation. The correct answer captures the core security model: sandboxed environments with restricted permissions, spending limits, and time-locks that limit breach impact. The wrong answers incorrectly suggest physical infrastructure separation (dedicated channels/keys, separate wallets) or shared credentials with backup mechanisms, which contradicts the virtual account architecture where the host node retains all cryptographic control while providing logical isolation.

question: What is the hierarchical order of Auto Loop's operational levels, from broadest to most specific?
answer: Node Level, Peer Level, Channel Level
wrong_answers:
  - Channel Level, Peer Level, Node Level
  - Peer Level, Node Level, Channel Level
  - Node Level, Channel Level, Peer Level
explanation: |
  Auto Loop operates in a three-tier hierarchy starting with the broadest scope and narrowing down. Node Level manages the aggregate liquidity of the entire node, Peer Level handles total balance across all channels with a specific peer, and Channel Level provides micro-management of individual high-priority channels. This hierarchical structure allows operators to set automated liquidity management policies at different granularities, ensuring comprehensive coverage from general node health down to specific channel requirements.

question: What is the primary purpose of the Privacy Mapper component in Lightning Terminal's Auto-Fees architecture?
answer: To obfuscate sensitive identifiers like Channel IDs and Node Public Keys before data leaves the local node environment
wrong_answers:
  - To encrypt the communication channel between the local node and the Auto-Fees algorithm processing server
  - To anonymize forwarding history data by removing transaction amounts and timestamps from routing records
  - To create secure backup copies of channel policies before the Auto-Fees algorithm makes any fee adjustments
explanation: |
  The Privacy Mapper specifically obfuscates sensitive identifiers such as Channel IDs, Channel Points, and Node Public Keys before any data leaves the local node environment. This allows the external Auto-Fees logic to perform mathematical optimizations without exposing the node's specific identity or topology map to the central server. The other options describe general security measures but not the Privacy Mapper's actual function of identifier obfuscation.

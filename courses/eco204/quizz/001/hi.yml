question: Supply के पैसे बढ़ाने के लिए इतिहास में दो मुख्य तरीके क्या थे?
answer: मुद्रा छपाई और धातु की मात्रा में कमी
wrong_answers:
  - मुद्रा छपाई और धातु की मात्रा में वृद्धि
  - मुद्रा में कमी और धातु की मात्रा में वृद्धि
  - मुद्रा में कमी और धातु की मात्रा में कमी
explanation: |
  पहले के समय में, पैसे बढ़ाने के दो मुख्य तरीके हुआ करते थे।
  जीडब्ल्यू-1; मुद्रा छपाई और धातु की मात्रा में कमी।

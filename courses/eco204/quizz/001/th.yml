question: วิธีหลักสองวิธีที่ใช้ในประวัติศาสตร์เพื่อเพิ่มปริมาณเงินคืออะไร?
answer: การพิมพ์เงินและการลดปริมาณโลหะ
wrong_answers:
  - การพิมพ์เงินและการเพิ่มปริมาณโลหะ
  - การลดค่าเงินและการเพิ่มปริมาณโลหะ
  - การลดค่าเงินและการลดปริมาณโลหะ
explanation: |
  ในทางประวัติศาสตร์ มีวิธีหลักสองวิธีในการเพิ่มปริมาณเงิน
  
  การพิมพ์เงินและการลดปริมาณโลหะ
reviewed: true
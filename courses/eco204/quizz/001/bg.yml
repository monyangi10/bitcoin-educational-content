question: Кои са двата основни метода, използвани в миналото за увеличаване на паричното предлагане?
answer: Печатане на парични знаци и намаляване на металното съдържание
wrong_answers:
  - Печатане на парични знаци и увеличаване на съдържанието на метали
  - Монетарно намаляване и увеличаване на металното съдържание
  - Монетарно намаляване и намаляване на металното съдържание
explanation: |
  Исторически погледнато, съществуват два основни метода за увеличаване на парите: печатане на парични знаци и намаляване на металното съдържание
reviewed: true

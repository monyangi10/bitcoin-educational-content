question: Jakie były dwie główne metody historycznie stosowane w celu zwiększenia podaży pieniądza?
answer: Druk monetarny i redukcja zawartości metalu
wrong_answers:
  - Druk monetarny i zwiększenie zawartości metalu
  - Redukcja kosztów produkcji i zwiększenie zawartości metalu
  - Redukcja kosztów produkcji i zmniejszenie zawartości metalu
explanation: |
  W przeszłości istniały dwie główne metody zwiększania podaży środków pieniężnych: druk monetarny i redukcja zawartości metalu.
reviewed: true

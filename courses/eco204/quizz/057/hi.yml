question: जर्मनी में प्रथम विश्व युद्ध के बाद के अनुभव के बारे में जिज्ञासु लोगों के लिए सुझाई गई कॉमिक बुक का नाम क्या है?
answer: राइख़ का बैंकर
wrong_answers:
  - राइख का डॉलर
  - राइख़ की मुद्रास्फीति
  - राइख़ की अर्थव्यवस्था
explanation: |
  जो लोग प्रथम विश्व युद्ध के बाद जर्मनी के अनुभव के बारे में जानना चाहते हैं, वो
  लेक्चर में कॉमिक बुक "द राइख'स बैंकर" की सिफारिश की गई है। यह बताती है कि कैसे जर्मनी...
  हाइपरइन्फ्लेशन पर काबू पाने में कामयाब रहे, खासकर रेंटेनमार्क बनाने के जरिए।
reviewed: false
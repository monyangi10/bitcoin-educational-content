question: Ico gitabu c’ibisekeje gishikirizwa abashaka kumenya ivyabaye mu Budagi inyuma y’Intambara ya mbere y’isi yose citwa iki?
answer: Umukozi wa banki w'Ubwami
wrong_answers:
  - Idolari ry'Ubwami
  - Ukwiyongera kw'ibiciro kwa Reich
  - Ubutunzi bwa Reich
explanation: |
  Ku bashaka kumenya ivyabaye mu Budagi inyuma y’Intambara ya mbere y’isi yose,
  insiguro irasaba igitabu c’ibisekeje citwa The Reich’s Banker. Ivuga ingene Ubudage .
  yarashoboye gutsinda ugutera imbere kw’ibiciro, cane cane biciye mu kurema ikimenyetso ca Rentenmark.

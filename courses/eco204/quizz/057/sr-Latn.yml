question: Kako se zove strip preporučen za one koji su znatiželjni o nemačkom iskustvu posle Prvog svetskog rata?
answer: Bankar Rajha
wrong_answers:
  - Rajhov dolar
  - Inflacija Rajha
  - Privreda Rajha
explanation: |
  Za one koji su znatiželjni o nemačkom iskustvu posle Prvog svetskog rata, predavanje preporučuje strip The Reich's Banker. Pripoveda kako je Nemačka uspela da prevaziđe hiperinflaciju, posebno kroz stvaranje Rentenmarke.

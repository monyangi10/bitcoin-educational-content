question: Je! ni jina lipi la kitabu cha katuni kinachopendekezwa kwa wale wanaotaka kujua kuhusu uzoefu wa Ujerumani baada ya Vita vya Kwanza vya Kidunia?
answer: Benki ya Reich
wrong_answers:
  - Dola ya Reich
  - Mfumuko wa Bei wa Reich
  - Uchumi wa Reich
explanation: |
  Kwa wale wanaotamani kujua uzoefu wa Wajerumani baada ya Vita vya Kwanza vya Kidunia, the
  hotuba inapendekeza kitabu cha vichekesho The Reich's Banker. Kinachosimulia jinsi Ujerumani
  iliweza kushinda mfumuko wa bei, haswa kupitia uundaji wa Rentenmark.
reviewed: true

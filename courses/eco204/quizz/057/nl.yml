question: Wat is de naam van het stripboek dat wordt aanbevolen voor mensen die nieuwsgierig zijn naar de Duitse ervaringen na de Eerste Wereldoorlog?
answer: De bankier van het Reich
wrong_answers:
  - De dollar van het Reich
  - De inflatie van het Reich
  - De economie van het Reich
explanation: |
  Voor degenen die nieuwsgierig zijn naar de Duitse ervaringen na de Eerste Wereldoorlog beveelt de
  lezing het stripboek De bankier van het Reich aan. Het vertelt hoe Duitsland
  erin slaagde hyperinflatie te overwinnen, met name door de creatie van de Rentenmark.
reviewed: false
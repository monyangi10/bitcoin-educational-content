question: Birinci Dünya Savaşı sonrası Alman deneyimini merak edenler için önerilen çizgi romanın adı nedir?
answer: Reich'ın Bankeri
wrong_answers:
  - Reich'ın Doları
  - Reich'ın Enflasyonu
  - Reich'ın Ekonomisi
explanation: |
  Birinci Dünya Savaşı sonrası Alman deneyimini merak edenler için
  ders Reich'ın Bankeri adlı çizgi romanı öneriyor. Almanya'nın nasıl
  özellikle Rentenmark'ın yaratılması yoluyla hiperenflasyonun üstesinden gelmeyi başardı.
reviewed: false
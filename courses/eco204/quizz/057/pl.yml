question: Jak nazywa się komiks polecany osobom ciekawym niemieckich doświadczeń po I wojnie światowej?
answer: Bankier Rzeszy
wrong_answers:
  - Dolar Rzeszy
  - Inflacja Rzeszy
  - Gospodarka Rzeszy
explanation: |
  Dla tych, którzy są ciekawi niemieckich doświadczeń po I wojnie światowej, wykład
  poleca komiks "Bankier Rzeszy". Opowiada on o tym, jak Niemcy
  udało się przezwyciężyć hiperinflację, zwłaszcza dzięki stworzeniu marki Rentenmark.
reviewed: false
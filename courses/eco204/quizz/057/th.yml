question: ชื่อหนังสือการ์ตูนที่แนะนำสำหรับผู้ที่สนใจเกี่ยวกับประสบการณ์ของเยอรมันหลังสงครามโลกครั้งที่หนึ่งคืออะไร?
answer: The Reich's Banker
wrong_answers:
  - ดอลลาร์ของไรช์
  - ภาวะเงินเฟ้อของไรช์
  - เศรษฐกิจของไรช์
explanation: |
  สำหรับผู้ที่สนใจเกี่ยวกับประสบการณ์ของเยอรมันหลังสงครามโลกครั้งที่หนึ่ง การบรรยายแนะนำหนังสือการ์ตูน The Reich's Banker ซึ่งบอกเล่าเรื่องราวว่าเยอรมันจัดการกับภาวะเงินเฟ้อสูงอย่างไร โดยเฉพาะผ่านการสร้าง Rentenmark
reviewed: true
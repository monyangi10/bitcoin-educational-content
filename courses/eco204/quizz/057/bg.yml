question: Как се казва комиксът, който се препоръчва на любопитните за преживяванията на Германия след Първата световна война?
answer: Банкерът на Райха
wrong_answers:
  - Доларът на Райха
  - Инфлацията на Райха
  - Икономиката на Райха
explanation: |
  За тези, които се интересуват от опита на Германия след Първата световна война,
  препоръчва комикса "Банкерът на Райха". В него се разказва как Германия
  успява да преодолее хиперинфлацията, по-специално чрез създаването на рентната марка.
reviewed: true
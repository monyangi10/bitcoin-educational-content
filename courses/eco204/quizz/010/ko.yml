question: 소비자물가지수(CPI)가 인플레이션 측정에 미치는 영향은 무엇인가요?
answer: CPI는 부동산 가격의 변화를 종합적으로 고려하지 않기 때문에 실제 인플레이션을 과소평가할 수 있으며, 실제 가격 상승을 상쇄하거나 가릴 수 있습니다.
wrong_answers:
  - CPI는 항상 인플레이션을 정확하게 측정합니다.
  - CPI는 실제 인플레이션을 과대평가합니다.
  - CPI는 인플레이션 측정에 영향을 미치지 않습니다.
explanation: |
  이 장에서는 인플레이션의 주요 지표로 사용되는 CPI,
  특정 한계가 있음을 설명합니다. 예를 들어, 다음과 같은 사항을 종합적으로 고려하지 않습니다
  부동산 가격의 변화. 또한 CPI의 계산에는 특정
  실제 가격 상승을 상쇄하거나 가릴 수 있는 방법론이 포함되어 있습니다.

question: Какво е влиянието на индекса на потребителските цени (ИПЦ) върху измерването на инфлацията?
answer: Индексът на потребителските цени може да подцени действителната инфлация, тъй като не отчита изчерпателно динамиката на цените на недвижимите имоти и може да компенсира или да прикрие действителните увеличения на цените.
wrong_answers:
  - Индексът на потребителските цени винаги измерва инфлацията с точност.
  - Индексът на потребителските цени надценява действителната инфлация.
  - Индексът на потребителските цени не оказва влияние върху измерването на инфлацията.
explanation: |
  В главата се обяснява, че индексът на потребителските цени, използван като основен показател за инфлацията,
  има някои ограничения. Например, той не отчита изчерпателно
  еволюцията на цените на недвижимите имоти. Освен това изчисляването на ИПЦ включва някои
  методики, които могат да компенсират или прикрият действителните увеличения на цените.
reviewed: true
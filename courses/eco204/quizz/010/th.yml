question: ผลกระทบของดัชนีราคาผู้บริโภค (CPI) ต่อการวัดอัตราเงินเฟ้อคืออะไร?
answer: CPI อาจประเมินอัตราเงินเฟ้อที่แท้จริงต่ำเกินไป เนื่องจากไม่ได้คำนึงถึงการเปลี่ยนแปลงของราคาที่อยู่อาศัยอย่างครอบคลุม และอาจชดเชยหรือปกปิดการเพิ่มขึ้นของราคาที่แท้จริง
wrong_answers:
  - CPI มักจะวัดอัตราเงินเฟ้อได้อย่างแม่นยำเสมอ
  - CPI ประเมินอัตราเงินเฟ้อจริงสูงเกินไป
  - CPI ไม่มีผลกระทบต่อการวัดอัตราเงินเฟ้อ
explanation: |
  บทนี้อธิบายว่า CPI ซึ่งใช้เป็นตัวบ่งชี้หลักของอัตราเงินเฟ้อมีข้อจำกัดบางประการ ตัวอย่างเช่น มันไม่ได้คำนึงถึงการเปลี่ยนแปลงของราคาที่อยู่อาศัยอย่างครอบคลุม นอกจากนี้ การคำนวณ CPI ยังรวมถึงวิธีการบางอย่างที่สามารถชดเชยหรือปกปิดการเพิ่มขึ้นของราคาจริงได้
reviewed: true
question: मुद्रास्फीति (इन्फ्लेशन) को मापने में उपभोक्ता मूल्य सूचकांक (सीपीआई) का क्या प्रभाव पड़ता है?
answer: CPI वास्तविक मुद्रास्फीति को कम आंक सकता है क्योंकि यह रियल एस्टेट की कीमतों में बदलाव को पूरी तरह से ध्यान में नहीं लेता और वास्तविक कीमतों में वृद्धि को कम करके या छिपा सकता है।
wrong_answers:
  - CPI हमेशा सही-सही महंगाई को मापता है।
  - CPI असली महँगाई से ज़्यादा अनुमान लगाता है।
  - सीपीआई (CPI) का मुद्रास्फीति के मापन पर कोई प्रभाव नहीं पड़ता।
explanation: |
  अध्याय बताता है कि सीपीआई, जिसे मुद्रास्फीति के मुख्य संकेतक के रूप में इस्तेमाल किया जाता है,
  कुछ सीमाएँ हैं। उदाहरण के लिए, यह व्यापक रूप से ध्यान में नहीं लेता
  रियल एस्टेट की कीमतों का विकास। साथ ही, सीपीआई की गणना में कुछ शामिल होते हैं।
  ऐसे तरीके जो असली कीमतों में बढ़ोतरी को छुपा सकें या कम कर सकें।
reviewed: false
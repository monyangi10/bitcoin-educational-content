question: Jakie jest kryterium hiperinflacji według Kagana?
answer: Stopa inflacji w wysokości 50% miesięcznie.
wrong_answers:
  - Stopa inflacji w wysokości 50% rocznie.
  - Stopa inflacji w wysokości 25% miesięcznie.
  - Stopa inflacji w wysokości 25% rocznie.
explanation: |
  Kryterium Kagana definiuje hiperinflację jako stopę inflacji na poziomie 50% miesięcznie
  miesięcznie. Kryterium to może czasami prowadzić do niejednoznacznych interpretacji
  lat o wysokich stopach inflacji, ale niespełniających ścisłej definicji hiperinflacji.
reviewed: false
question: Какъв е критерият на Каган за хиперинфлация?
answer: Инфлация в размер на 50% на месец.
wrong_answers:
  - Инфлация в размер на 50% годишно.
  - Инфлация от 25% на месец.
  - Инфлация от 25% годишно.
explanation: |
  Критерият на Каган определя хиперинфлацията като инфлация от 50%
  на месец. Този критерий понякога може да доведе до двусмислени тълкувания, като
  години, в които инфлацията е висока, но не отговаря на строгото определение за хиперинфлация.
reviewed: true
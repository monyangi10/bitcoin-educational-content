question: 케이건이 말하는 하이퍼인플레이션의 기준은 무엇인가요?
answer: 월 50%의 인플레이션율.
wrong_answers:
  - 연간 50%의 인플레이션율.
  - 월 25%의 인플레이션율.
  - 연간 25%의 인플레이션율.
explanation: |
  케이건의 기준은 하이퍼인플레이션을 월 50%의 인플레이션율로 정의합니다
  로 정의합니다. 이 기준은 때때로 다음과 같이 모호한 해석으로 이어질 수 있습니다
  인플레이션율이 높았지만 하이퍼인플레이션의 엄격한 정의에 부합하지 않는 해가 있을 수 있습니다.
reviewed: false
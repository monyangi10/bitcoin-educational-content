question: कागन का हाइपरइन्फ्लेशन के लिए क्या मापदंड है?
answer: महीने में 50% की महँगाई दर।
wrong_answers:
  - सालाना 50% की महंगाई दर।
  - महीने में 25% की मुद्रास्फीति दर।
  - सालाना 25% की महंगाई दर।
explanation: |
  कगन का मापदंड हाइपरइन्फ्लेशन को 50% की मुद्रास्फीति दर के रूप में परिभाषित करता है
  प्रति महीना। यह मापदंड कभी-कभी अस्पष्ट व्याख्याओं की ओर ले जाता है, जिससे...
  वे साल जिनमें महँगाई की दरें ऊँची थीं, लेकिन हाइपरइन्फ्लेशन की सख्त परिभाषा पर खरे नहीं उतरते।
reviewed: false
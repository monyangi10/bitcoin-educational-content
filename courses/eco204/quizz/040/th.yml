question: Cagan's criterion for hyperinflation คืออะไร?
answer: อัตราเงินเฟ้อ 50% ต่อเดือน
wrong_answers:
  - อัตราเงินเฟ้อ 50% ต่อปี
  - อัตราเงินเฟ้อ 25% ต่อเดือน
  - อัตราเงินเฟ้อ 25% ต่อปี
explanation: |
  เกณฑ์ของ Cagan กำหนดให้ภาวะเงินเฟ้อรุนแรงคืออัตราเงินเฟ้อที่ 50% ต่อเดือน เกณฑ์นี้บางครั้งอาจนำไปสู่การตีความที่คลุมเครือ โดยมีปีที่มีอัตราเงินเฟ้อสูงแต่ไม่ตรงตามคำจำกัดความที่เข้มงวดของภาวะเงินเฟ้อรุนแรง
reviewed: true
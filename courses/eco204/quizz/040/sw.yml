question: Je, kigezo cha Cagan cha mfumuko wa bei ni kipi?
answer: Kiwango cha mfumuko wa bei cha 50% kwa mwezi.
wrong_answers:
  - Kiwango cha mfumuko wa bei cha 50% kwa mwaka.
  - Kiwango cha mfumuko wa bei cha 25% kwa mwezi.
  - Kiwango cha mfumuko wa bei cha 25% kwa mwaka.
explanation: |
  Kigezo cha Cagan kinafafanua mfumuko wa bei kama kiwango cha mfumuko wa bei cha 50%
  kwa mwezi. Kigezo hiki wakati mwingine kinaweza kusababisha tafsiri zenye utata, na
  miaka kuwa na viwango vya juu vya mfumuko wa bei lakini haifikii ufafanuzi mkali wa mfumuko wa bei.
reviewed: true

question: ऐसी कंपनी को क्या कहते हैं जो सामान्य बाजार हालात में दिवालिया या दिवालियापन के करीब होने के बावजूद, मुख्य रूप से सस्ते कर्ज़ लेकर चलती रहती है?  

(इस स्थिति को आमतौर पर **"ज़ोंबी कंपनी"** कहा जाता है।)
answer: ज़ॉम्बी कंपनी
wrong_answers:
  - भूतिया कंपनी
  - वैम्पायर कंपनी
  - फैंटम कंपनी
explanation: |
  एक ज़ोंबी कंपनी वह कंपनी होती है जो सामान्य बाजार हालात में,
  दिवालिया होना या दिवालियापन के कगार पर होना, लेकिन मुख्य रूप से कम लागत से काम चलाना
  कर्ज़ लेना।
reviewed: false
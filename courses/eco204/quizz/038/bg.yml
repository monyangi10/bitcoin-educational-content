question: Какъв е терминът за дружество, което продължава да функционира главно чрез евтини заеми, въпреки че е неплатежоспособно или близо до фалит при нормални пазарни условия?
answer: Компания Zombie
wrong_answers:
  - Компания за призраци
  - Компания за вампири
  - Фирма Фантом
explanation: |
  "Зомби компания" е компания, която при нормални пазарни условия би
  е неплатежоспособно или близо до фалит, но продължава да функционира главно чрез евтини
  заеми.
reviewed: true
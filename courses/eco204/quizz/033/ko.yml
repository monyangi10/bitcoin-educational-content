question: 바이마르에서 부채 재평가가 미친 영향은 무엇이었나요?
answer: 주주들은 모든 배상금이 지급되었다는 전제 하에 초기 투자금의 2.5%를 받았습니다.
wrong_answers:
  - 이로 인해 통화가치가 더욱 평가절하되었습니다.
  - 이로 인해 실업률이 증가했습니다.
  - 그 결과 외국인 투자가 감소했습니다.
explanation: |
  바이마르에서는 다음과 같은 영향을 보상하기 위해 일부 부채의 재평가가 이루어졌습니다
  인플레이션.
  1925년 정부 소유 대출의 재평가 결정이 법으로 제정되어 주주들은 초기 투자금의 2.5%를
  모든 배상금을 지불한 경우 초기 투자금의 2.5퍼센트를 받게 되었습니다
  지급되었습니다.
reviewed: false
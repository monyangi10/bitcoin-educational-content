question: Jaki był wpływ przeszacowania długów w Weimarze?
answer: Akcjonariusze otrzymali 2,5% swojej początkowej inwestycji pod warunkiem, że wszystkie reparacje zostały wypłacone.
wrong_answers:
  - Doprowadziło to do dalszej dewaluacji waluty.
  - Spowodowało to wzrost bezrobocia.
  - Spowodowało to spadek inwestycji zagranicznych.
explanation: |
  W Weimarze niektóre długi zostały przeszacowane, aby zrekompensować wpływ inflacji
  inflacji.
  Decyzja o rewaloryzacji pożyczek rządowych stała się prawem w 1925 roku, w wyniku czego akcjonariusze
  otrzymali 2,5% ich początkowej inwestycji, pod warunkiem, że wszystkie reparacje zostały spłacone
  zostały zapłacone.
reviewed: false
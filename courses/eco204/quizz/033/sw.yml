question: Je, matokeo ya kutathmini upya madeni huko Weimar yalikuwa yapi?
answer: Wanahisa walipokea asilimia 2.5 ya uwekezaji wao wa awali ili mradi fidia zote zimelipwa.
wrong_answers:
  - Ilisababisha kushuka kwa thamani zaidi ya sarafu.
  - Ilisababisha kuongezeka kwa ukosefu wa ajira.
  - Ilisababisha kupungua kwa uwekezaji wa kigeni.
explanation: |
  Katika Weimar, baadhi ya madeni yalithaminiwa ili kufidia athari za
  mfumuko wa bei.
  Uamuzi wa kutathmini upya mikopo inayomilikiwa na serikali ikawa sheria mnamo 1925, na kusababisha wanahisa
  kupokea asilimia 2.5 ya uwekezaji wao wa awali ili mradi fidia zote
  alikuwa amelipwa.
reviewed: true

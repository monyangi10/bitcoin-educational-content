question: वीमर में कर्ज़ों के पुनर्मूल्यांकन का क्या असर हुआ?
answer: शेयरहोल्डर्स को उनके शुरुआती निवेश का 2.5 प्रतिशत मिला, बशर्ते कि सभी मुआवज़े का भुगतान हो चुका हो।
wrong_answers:
  - इससे मुद्रा का और अवमूल्यन हो गया।
  - इससे बेरोज़गारी बढ़ गई।
  - इससे विदेशी निवेश में कमी आई।
explanation: |
  वीमर में, कुछ कर्ज़ों को मुद्रास्फीति के असर की भरपाई के लिए दोबारा मूल्यांकित किया गया था।
  महँगाई।
  1925 में सरकारी कर्जों को दोबारा मूल्यांकन करने का फैसला कानून बन गया, जिससे शेयरधारकों को...
  शुरुआती निवेश का 2.5 प्रतिशत प्राप्त करना, बशर्ते कि सभी मुआवज़े...
  भुगतान किया गया था।

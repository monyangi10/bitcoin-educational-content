question: Какво е било въздействието на преоценката на дълговете във Ваймар?
answer: Акционерите получиха 2,5 процента от първоначалната си инвестиция, при условие че са изплатени всички обезщетения.
wrong_answers:
  - Това доведе до допълнително обезценяване на валутата.
  - Това доведе до увеличаване на безработицата.
  - Това доведе до намаляване на чуждестранните инвестиции.
explanation: |
  Във Ваймар някои дългове бяха преоценени, за да се компенсира въздействието на
  инфлацията.
  Решението за преоценка на държавните заеми става закон през 1925 г., в резултат на което акционерите получават 2,5% от първоначалната си инвестиция, при условие че са изплатени всички репарации.
reviewed: true
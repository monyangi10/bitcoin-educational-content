question: Wat was de impact van de herwaardering van schulden in Weimar?
answer: Aandeelhouders ontvingen 2,5 procent van hun oorspronkelijke investering op voorwaarde dat alle herstelbetalingen waren gedaan.
wrong_answers:
  - Dit leidde tot een verdere devaluatie van de munt.
  - Het veroorzaakte een stijging van de werkloosheid.
  - Dit resulteerde in een daling van de buitenlandse investeringen.
explanation: |
  In Weimar werden sommige schulden geherwaardeerd om de impact van de inflatie te compenseren
  inflatie te compenseren.
  Een besluit om staatsleningen te herwaarderen werd in 1925 wettelijk vastgelegd
  2,5 procent van hun oorspronkelijke investering kregen, op voorwaarde dat alle herstelbetalingen
  betaald waren.

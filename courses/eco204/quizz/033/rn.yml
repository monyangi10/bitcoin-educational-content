question: None gusubira gupima agaciro k’imyenda i Weimar vyagize ingaruka izihe?
answer: Abafise imigabane bararonse 2,5 kw’ijana vy’amahera bashize mu ntango igihe gusa indishi zose zari zarishe.
wrong_answers:
  - Vyatumye amafaranga yongera gucika intege.
  - Vyatumye ubushomeri bwiyongera.
  - Vyatumye ishoramari ry’amahanga rigabanuka.
explanation: |
  I Weimar, imyenda imwimwe yarasubiwemwo agaciro kugira ngo haboneke ingaruka z’ivyo .
  ibiciro.
  Ingingo yo gusubira guha agaciro inguzanyo za Leta yaracitse itegeko mu 1925, bituma abafise imigabane .
  n’ibice 2,5 kw’ijana vy’amahera bashoye mu ntango, iyo indishi yose .
  yari yarishe.

question: ผลกระทบของการประเมินหนี้ใหม่ในไวมาร์คืออะไร?
answer: ผู้ถือหุ้นได้รับ 2.5 เปอร์เซ็นต์ของการลงทุนเริ่มแรกของพวกเขา โดยมีเงื่อนไขว่าการชดใช้ทั้งหมดได้ถูกชำระแล้ว
wrong_answers:
  - มันนำไปสู่การลดค่าเงินเพิ่มเติม
  - มันทำให้อัตราการว่างงานเพิ่มขึ้น
  - ส่งผลให้การลงทุนจากต่างประเทศลดลง
explanation: |
  ในไวมาร์ หนี้สินบางส่วนถูกประเมินค่าใหม่เพื่อชดเชยผลกระทบจากเงินเฟ้อ
  การตัดสินใจประเมินค่าเงินกู้ที่รัฐบาลเป็นเจ้าของใหม่กลายเป็นกฎหมายในปี 1925 ส่งผลให้ผู้ถือหุ้นได้รับ 2.5 เปอร์เซ็นต์ของการลงทุนเริ่มแรกของพวกเขา โดยมีเงื่อนไขว่าการชดใช้ค่าเสียหายทั้งหมดได้ถูกชำระแล้ว
reviewed: true
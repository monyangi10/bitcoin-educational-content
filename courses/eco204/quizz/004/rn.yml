question: None insobanuro y’ugutera imbere kw’ibiciro nk’uko Larousse abivuga ni iyihe?
answer: Inflation ni ikintu kirangwa n’ugutera imbere muri rusangi kandi gukomeza kw’urugero rw’ibiciro.
wrong_answers:
  - Inflation ni ikintu kirangwa no kugabanya rusangi kandi gukomeza ku rugero rw’ibiciro.
  - Inflation ni ikintu kirangwa n’ugutera imbere kwihariye kandi gukomeza kw’urugero rw’ibiciro.
  - Inflation ni ikintu kigaragazwa n’ugutera imbere kw’ibiciro muri rusangi kandi mu bihe bimwe bimwe.
explanation: |
  Nk’uko Larousse abivuga, ugutera imbere kw’ibiciro bisobanurwa nk’ikintu kiranga .
  n’ugutera imbere rusangi kandi gukomeza kw’urugero rw’ibiciro.

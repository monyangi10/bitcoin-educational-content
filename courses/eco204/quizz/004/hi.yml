question: लारूस के अनुसार मुद्रास्फीति (inflation) की परिभाषा क्या है?
answer: महँगाई एक ऐसी घटना है जिसमें कीमतों के स्तर में लगातार और व्यापक रूप से वृद्धि होती है।
wrong_answers:
  - मुद्रास्फीति एक ऐसी घटना है जिसमें कीमतों के स्तर में सामान्य और निरंतर गिरावट होती है।
  - महँगाई एक ऐसी घटना है जिसमें कीमतों के स्तर में लगातार और खास तौर पर बढ़ोतरी होती है।
  - महंगाई एक ऐसी घटना है जिसमें कीमतों के स्तर में सामान्य और रुक-रुक कर वृद्धि होती है।
explanation: |
  लारूस के अनुसार, मुद्रास्फीति को एक ऐसी घटना के रूप में परिभाषित किया गया है जिसकी विशेषता है...
  एक सामान्य और लगातार कीमतों के स्तर में वृद्धि से।

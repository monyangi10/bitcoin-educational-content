question: Jaka jest definicja inflacji według francuskiej encyklopedii Larousse?
answer: Inflacja to zjawisko charakteryzujące się uogólnionym i ciągłym wzrostem poziomu cen.
wrong_answers:
  - Inflacja to zjawisko charakteryzujące się uogólnionym i ciągłym spadkiem poziomu cen.
  - Inflacja to zjawisko charakteryzujące się określonym i ciągłym wzrostem poziomu cen.
  - Inflacja to zjawisko charakteryzujące się uogólnionym i okresowym wzrostem poziomu cen.
explanation: |
  Według francuskiej encyklopedii Larousse inflacja jest definiowana jako zjawisko charakteryzujące się uogólnionym i ciągłym wzrostem poziomu cen.
reviewed: true

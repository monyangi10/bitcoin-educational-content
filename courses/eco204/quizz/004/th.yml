question: คำจำกัดความของเงินเฟ้อตาม Larousse คืออะไร?
answer: เงินเฟ้อเป็นปรากฏการณ์ที่มีลักษณะการเพิ่มขึ้นทั่วไปและต่อเนื่องของระดับราคา
wrong_answers:
  - เงินเฟ้อเป็นปรากฏการณ์ที่มีลักษณะโดยการลดลงทั่วไปและต่อเนื่องในระดับของราคา
  - เงินเฟ้อเป็นปรากฏการณ์ที่มีลักษณะเฉพาะโดยการเพิ่มขึ้นอย่างต่อเนื่องในระดับของราคา
  - อัตราเงินเฟ้อเป็นปรากฏการณ์ที่มีลักษณะการเพิ่มขึ้นของระดับราคาที่เป็นไปอย่างทั่วไปและเป็นระยะๆ
explanation: |
  ตามที่ Larousse ระบุไว้ เงินเฟ้อถูกกำหนดให้เป็นปรากฏการณ์ที่มีลักษณะเฉพาะโดยการเพิ่มขึ้นอย่างทั่วไปและต่อเนื่องในระดับของราคา
reviewed: true
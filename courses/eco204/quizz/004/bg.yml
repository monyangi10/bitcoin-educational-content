question: Какво е определението за инфлация според Larousse?
answer: Инфлацията е явление, което се характеризира с общо и непрекъснато повишаване на равнището на цените.
wrong_answers:
  - Инфлацията е явление, което се характеризира с общо и непрекъснато намаляване на равнището на цените.
  - Инфлацията е явление, което се характеризира със специфично и непрекъснато повишаване на равнището на цените.
  - Инфлацията е явление, което се характеризира с общо и периодично повишаване на равнището на цените.
explanation: |
  Според Larousse инфлацията се определя като явление, което се характеризира с
  от общо и непрекъснато повишаване на равнището на цените.
reviewed: true
question: 라루스에 따르면 인플레이션의 정의는 무엇인가요?
answer: 인플레이션은 물가 수준이 일반화되고 지속적으로 상승하는 것을 특징으로 하는 현상입니다.
wrong_answers:
  - 인플레이션은 물가 수준의 일반화되고 지속적인 하락을 특징으로 하는 현상입니다.
  - 인플레이션은 물가 수준의 구체적이고 지속적인 상승을 특징으로 하는 현상입니다.
  - 인플레이션은 물가 수준이 일반화되고 간헐적으로 상승하는 것을 특징으로 하는 현상입니다.
explanation: |
  라루스에 따르면 인플레이션은 다음과 같은 특징을 가진 현상으로 정의됩니다
  물가 수준이 일반화되고 지속적으로 상승하는 현상입니다.
reviewed: false
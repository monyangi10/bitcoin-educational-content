question: Каква е разликата между инфлацията, предизвикана от търсенето, и инфлацията, предизвикана от разходите?
answer: Demand Pull инфлацията е ситуация, при която търсенето в икономиката надвишава наличното производство, докато Cost Push инфлацията се дължи на увеличаването на производствените разходи.
wrong_answers:
  - Demand Pull инфлацията се дължи на увеличаването на производствените разходи, докато Cost Push инфлацията е ситуация, при която търсенето в икономиката превишава наличното производство.
  - Инфлацията, предизвикана от търсенето, и инфлацията, предизвикана от разходите, са едни и същи; и двете се отнасят до ситуация, при която търсенето в икономиката надвишава наличното производство.

question: डिमांड पुल और कॉस्ट पुश इन्फ्लेशन में क्या अंतर है?
answer: डिमांड पुल इन्फ्लेशन एक ऐसी स्थिति है जहां अर्थव्यवस्था में मांग उपलब्ध उत्पादन से अधिक हो जाती है, जबकि कॉस्ट पुश इन्फ्लेशन उत्पादन लागत में वृद्धि के कारण होता है।
wrong_answers:
  - डिमांड पुल इन्फ्लेशन (मांग से खींची गई महंगाई) उत्पादन लागत में वृद्धि के कारण होती है, जबकि कॉस्ट पुश इन्फ्लेशन (लागत से धकेली गई महंगाई) एक ऐसी स्थिति है जहां अर्थव्यवस्था में मांग उपलब्ध उत्पादन से अधिक हो जाती है।
  - डिमांड पुल और कॉस्ट पुश इन्फ्लेशन एक ही चीज़ है, दोनों ही उस स्थिति को दर्शाते हैं जहां अर्थव्यवस्था में मांग उपलब्ध उत्पादन से ज़्यादा हो जाती है।
  - डिमांड पुल और कॉस्ट पुश इन्फ्लेशन एक ही हैं, दोनों का मतलब प्रोडक्शन कॉस्ट के बढ़ने से है।
explanation: |
  अध्याय बताता है कि मांग-प्रेरित मुद्रास्फीति को अक्सर समझाया जाता है
  एक ऐसी स्थिति जहाँ अर्थव्यवस्था में माँग उपलब्ध उत्पादन से अधिक हो जाती है।
  हाथ, लागत-प्रेरित मुद्रास्फीति उत्पादन लागत में वृद्धि के कारण होती है।

question: Jaka jest różnica między inflacją popytową a inflacją kosztową?
answer: Inflacja popytowa to sytuacja, w której popyt w gospodarce przewyższa dostępną produkcję, podczas gdy inflacja kosztowa jest przypisywana wzrostowi kosztów produkcji.
wrong_answers:
  - Inflacja popytowa przypisywana jest wzrostowi kosztów produkcji, podczas gdy inflacja kosztowa to sytuacja, w której popyt w gospodarce przewyższa dostępną produkcję.
  - Inflacje popytowa i kosztowa są takie same, obie odnoszą się do sytuacji, w której popyt w gospodarce przewyższa dostępną produkcję.
  - Inflacje popytowa i kosztowa są takie same, obie odnoszą się do wzrostu kosztów produkcji.
explanation: |
  W rozdziale tym wyjaśniono, że inflacja popytowa jest często tłumaczona jako
  sytuacja, w której popyt w gospodarce przewyższa dostępną produkcję. Z drugiej strony inflacja kosztowa jest przypisywana wzrostowi kosztów produkcji.
reviewed: true

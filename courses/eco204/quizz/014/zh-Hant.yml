question: 需求拉動型通貨膨脹與成本推動型通貨膨脹有何差異？
answer: 需求拉動型通貨膨脹是指經濟體系中的需求超過可用產量的情況，而成本推動型通貨膨脹則歸因於生產成本的增加。
wrong_answers:
  - 需求拉動型通貨膨脹是由於生產成本的增加，而成本推進型通貨膨脹則是指經濟體系中的需求超過可用產量的情況。
  - 需求拉動通貨膨脹和成本推動通貨膨脹是相同的，都是指經濟體中的需求超過可用產量的情況。
  - 需求拉動通貨膨脹與成本推動通貨膨脹是相同的，都是指生產成本的增加。
explanation: |
  本章解釋需求拉動通貨膨脹通常解釋為
  是指經濟體系中的需求超過了可用的生產量。另一方面
  成本推升通貨膨脹是由於生產成本增加所致。

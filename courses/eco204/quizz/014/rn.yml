question: Ni itandukaniro irihe riri hagati y’ugukura kw’ibiciro n’ugukura kw’ibiciro?
answer: Inflation ya Demand Pull ni ikintu aho ivyifuzo mu bukungu birenze umusaruro uriho, mu gihe inflation ya Cost Push iterwa n’ukwiyongera kw’ibiciro vy’umusaruro.
wrong_answers:
  - Inflation ya Demand Pull iterwa n’ukwiyongera kw’ibiciro vy’ibikorwa, mu gihe inflation ya Cost Push ari ikintu aho ivyipfuzo mu bukungu birenze ivyimburwa biriho.
  - Demand Pull na Cost Push inflation ni kimwe, vyose vyerekeye ikintu aho ivyifuzo mu bukungu birenze umusaruro uriho.
  - Demand Pull na Cost Push inflation ni kimwe, vyose vyerekeye ukwiyongera kw’ibiciro vy’ibikorwa.
explanation: |
  Ikigabane kirasigura ko ugutera imbere kw’ibiciro kw’ibintu bikenewe (Demand Pull inflation) akenshi gusigurwa nk’uko .
  ikintu aho ivyifuzo mu bukungu birenze umusaruro uriho. Ku rundi ruhande
  hand, Cost Push inflation iterwa n’ukwiyongera kw’ibiciro vyo gukora.

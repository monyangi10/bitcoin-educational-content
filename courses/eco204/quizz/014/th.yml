question: ความแตกต่างระหว่างเงินเฟ้อที่เกิดจากการดึงอุปสงค์และเงินเฟ้อที่เกิดจากการผลักดันต้นทุนคืออะไร?
answer: อุปสงค์ดึงเงินเฟ้อเป็นสถานการณ์ที่อุปสงค์ในเศรษฐกิจเกินกว่าการผลิตที่มีอยู่ ในขณะที่อุปทานดันเงินเฟ้อเกิดจากการเพิ่มขึ้นของต้นทุนการผลิต
wrong_answers:
  - อัตราเงินเฟ้อที่เกิดจากการดึงความต้องการ (Demand Pull inflation) เกิดจากการเพิ่มขึ้นของต้นทุนการผลิต ในขณะที่อัตราเงินเฟ้อที่เกิดจากการผลักดันต้นทุน (Cost Push inflation) เป็นสถานการณ์ที่ความต้องการในเศรษฐกิจเกินกว่าการผลิตที่มีอยู่
  - อุปสงค์ดึงและต้นทุนดันเงินเฟ้อเหมือนกัน; ทั้งสองหมายถึงสถานการณ์ที่อุปสงค์ในเศรษฐกิจเกินกว่าการผลิตที่มีอยู่
  - อุปสงค์ดึงและต้นทุนดันเงินเฟ้อเหมือนกัน; ทั้งสองหมายถึงการเพิ่มขึ้นของต้นทุนการผลิต
explanation: |
  บทนี้อธิบายว่าเงินเฟ้อที่เกิดจากการดึงของอุปสงค์มักถูกอธิบายว่าเป็นสถานการณ์ที่อุปสงค์ในเศรษฐกิจเกินกว่าการผลิตที่มีอยู่ ในทางกลับกัน เงินเฟ้อที่เกิดจากการผลักดันของต้นทุนถูกอธิบายว่าเกิดจากการเพิ่มขึ้นของต้นทุนการผลิต
reviewed: true
question: 수요 풀 인플레이션과 비용 푸시 인플레이션의 차이점은 무엇인가요?
answer: 수요 견인 인플레이션은 경제의 수요가 가용 생산량을 초과하는 상황이며, 비용 밀어 인플레이션은 생산 비용의 증가에 기인합니다.
wrong_answers:
  - 수요 당김 인플레이션은 생산 비용의 증가로 인한 것이고, 비용 밀기 인플레이션은 경제의 수요가 가용 생산량을 초과하는 상황입니다.
  - 수요 당김 인플레이션과 비용 밀기 인플레이션은 모두 경제의 수요가 가용 생산량을 초과하는 상황을 의미합니다.
  - 수요 풀 인플레이션과 비용 푸시 인플레이션은 모두 생산 비용의 증가를 의미한다는 점에서 동일합니다.

question: Ni igiki nyamukuru catumye habaho Banki y’Ubwongereza?
answer: Kugira ngo haboneke amahera y’intambara yo mu mpera z’ikinjana ca 17 .
wrong_answers:
  - Kugira ngo isohore amafaranga yiwe bwite .
  - Kugira ngo bashobore guhangana na Banki y’i Amsterdam .
  - Gutunganya isoko ry'ivy'ubutunzi
explanation: |
  Banki y’Ubwongereza yashinzwe mu mpera z’ikinjana ca 17 n’umwaka wa 1990.
  mu
  ikintu nyamukuru catumye habaho amahera y’intambara. Yashizeho amafaranga y’ibizigamirwa n’itegeko maze iramanukana .
  amabanki yigenga gushika ku kibanza ca kabiri mu bijanye n’amahera.

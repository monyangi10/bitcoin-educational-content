question: बैंक ऑफ़ इंग्लैंड बनाने का मुख्य कारण क्या था?
answer: 17वीं सदी के अंत में युद्ध का खर्च उठाने के लिए
wrong_answers:
  - अपनी खुद की मुद्रा जारी करना
  - एम्स्टर्डम बैंक से मुकाबला करने के लिए
  - शेयर बाज़ार को नियंत्रित करने के लिए
explanation: |
  बैंक ऑफ इंग्लैंड का गठन 17वीं सदी के अंत में हुआ था, जब
  वो
  युद्ध को वित्तपोषित करने की प्राथमिक प्रेरणा। इसने डिक्री द्वारा जमाएँ लगाईं और पीछे धकेल दिया।
  निजी बैंकों को मौद्रिक प्रणाली में द्वितीयक स्थान पर धकेल दिया गया।
reviewed: false
question: Wat was de belangrijkste reden voor de oprichting van de Bank of England?
answer: Om de oorlog aan het einde van de 17e eeuw te financieren
wrong_answers:
  - Zijn eigen munteenheid uitgeven
  - Concurreren met de Bank van Amsterdam
  - De aandelenmarkt reguleren
explanation: |
  De Bank of England werd opgericht aan het einde van de 17e eeuw met
  de
  belangrijkste motivatie om de oorlog te financieren. Ze legde per decreet deposito's op en degradeerde
  particuliere banken naar een ondergeschikte positie in het monetaire systeem.
reviewed: false
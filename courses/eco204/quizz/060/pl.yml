question: Jaki był główny powód utworzenia Banku Anglii?
answer: Sfinansowanie wojny pod koniec XVII wieku
wrong_answers:
  - Emitowaanie własnej waluty
  - Konkurowanie z Bankiem Amsterdamu
  - Regulacja rynku akcji
explanation: |
  Bank Anglii został utworzony pod koniec XVII wieku. Główną motywacją do jego utworzenia było sfinansowanie wojny. Dekretem narzucił depozyty i zdegradował prywatne banki do drugorzędnej pozycji w systemie finansowym.
reviewed: true

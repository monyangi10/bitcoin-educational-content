question: เหตุผลหลักในการก่อตั้งธนาคารแห่งประเทศอังกฤษคืออะไร?
answer: เพื่อเป็นเงินทุนสำหรับสงครามในช่วงปลายศตวรรษที่ 17
wrong_answers:
  - ออกสกุลเงินของตนเอง
  - เพื่อแข่งขันกับธนาคารอัมสเตอร์ดัม
  - ควบคุมตลาดหุ้น
explanation: |
  ธนาคารแห่งประเทศอังกฤษถูกสร้างขึ้นในช่วงปลายศตวรรษที่ 17 โดยมีแรงจูงใจหลักในการจัดหาเงินทุนสำหรับสงคราม มันกำหนดให้มีการฝากเงินตามพระราชกฤษฎีกาและลดบทบาทของธนาคารเอกชนให้อยู่ในตำแหน่งรองในระบบการเงิน
reviewed: true
question: Каква е основната причина за създаването на Английската централна банка?
answer: Финансиране на войната в края на XVII в
wrong_answers:
  - Да емитира собствена валута
  - Да се конкурира с Банката на Амстердам
  - Регулиране на фондовия пазар
explanation: |
  Банката на Англия е създадена в края на XVII в. с основната цел да финансира войната. Тя налага депозитите с декрет и изтласква частните банки на второстепенно място в паричната система.
reviewed: true

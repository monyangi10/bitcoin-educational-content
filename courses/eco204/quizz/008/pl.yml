question: Jaki jest wpływ wzrostu podaży pieniądza na inflację i deflację w systemie z niezmienną podażą pieniądza?
answer: Wzrost podaży pieniądza niweluje potencjalną deflację spowodowaną wzrostem produkcji.
wrong_answers:
  - Wzrost podaży pieniądza prowadzi do deflacji.
  - Wzrost podaży oieniądza nie ma wpływu na inflację lub deflację.
  - Wzrost podaży pieniądza prowadzi do spadku produkcji.
explanation: |
  W rozdziale tym wyjaśniono, że w systemie z niezmienną podażą pieniądza wzrost produkcji powinien teoretycznie prowadzić do deflacji, tj. spadku cen,
  ponieważ dostępnych byłoby więcej towarów i usług. Jednak w obecnym systemie pieniądza fiducjarnego
  fiat, wzrost podaży pieniądza niweluje potencjalną deflację spowodowaną wzrostem produkcji.
reviewed: true

question: ผลกระทบของการเพิ่มปริมาณเงินต่อเงินเฟ้อและเงินฝืดในระบบที่มีปริมาณเงินคงที่คืออะไร?
answer: การเพิ่มขึ้นของปริมาณเงินจะยกเลิกภาวะเงินฝืดที่อาจเกิดขึ้นจากการเพิ่มขึ้นของการผลิต
wrong_answers:
  - การเพิ่มขึ้นของปริมาณเงินนำไปสู่ภาวะเงินฝืด
  - การเพิ่มขึ้นของปริมาณเงินไม่มีผลกระทบต่อเงินเฟ้อหรือเงินฝืด
  - การเพิ่มขึ้นของปริมาณเงินนำไปสู่การลดลงของการผลิต
explanation: |
  บทนี้อธิบายว่าในระบบที่มีปริมาณเงินคงที่ การเพิ่มขึ้นของการผลิตควรจะนำไปสู่ภาวะเงินฝืดตามทฤษฎี นั่นคือ การลดลงของราคา เนื่องจากจะมีสินค้าและบริการมากขึ้น อย่างไรก็ตาม ในระบบเงินตราปัจจุบัน การเพิ่มขึ้นของปริมาณเงินจะยกเลิกภาวะเงินฝืดที่อาจเกิดขึ้นจากการเพิ่มขึ้นของการผลิต
reviewed: true
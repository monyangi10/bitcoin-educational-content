question: Какво е влиянието на увеличаването на паричното предлагане върху инфлацията и дефлацията при система с фиксирано парично предлагане?
answer: Увеличаването на паричното предлагане неутрализира потенциалната дефлация, причинена от увеличаването на производството.
wrong_answers:
  - Увеличаването на паричното предлагане води до дефлация.
  - Увеличаването на паричното предлагане не оказва влияние върху инфлацията или дефлацията.
  - Увеличаването на паричното предлагане води до намаляване на производството.
explanation: |
  В тази глава се обяснява, че при система с фиксирано парично предлагане увеличението
  теоретично би трябвало да доведе до дефлация, т.е. до намаляване на цените,
  тъй като ще има повече налични стоки и услуги. Въпреки това в настоящата фиатна
  ната парична система, увеличаването на паричното предлагане унищожава потенциалната дефлация
  причинена от увеличаването на производството.
reviewed: true
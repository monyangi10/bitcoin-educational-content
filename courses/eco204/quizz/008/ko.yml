question: 고정 화폐 Supply 시스템에서 화폐 Supply의 증가가 인플레이션과 디플레이션에 미치는 영향은 무엇인가요?
answer: 화폐 Supply의 증가는 생산량 증가로 인한 잠재적 디플레이션을 상쇄합니다.
wrong_answers:
  - Supply 화폐가 증가하면 디플레이션이 발생합니다.
  - Supply의 통화량 증가는 인플레이션이나 디플레이션에 영향을 미치지 않습니다.
  - Supply의 증가는 생산량 감소로 이어집니다.
explanation: |
  이 장에서는 고정 화폐 Supply 시스템에서 생산량이 증가하면
  생산이 증가하면 이론적으로 디플레이션, 즉 가격 하락으로 이어져야 한다고 설명합니다,
  더 많은 상품과 서비스를 이용할 수 있기 때문입니다. 그러나 현재의 법정화폐
  통화 시스템에서는 통화량이 증가하면 생산량 증가로 인한 잠재적 디플레이션이 상쇄됩니다
  잠재적 디플레이션을 상쇄합니다.
reviewed: false
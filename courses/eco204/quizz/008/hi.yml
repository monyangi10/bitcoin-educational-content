question: एक फिक्स्ड मनी Supply सिस्टम में पैसे (Supply) की मात्रा बढ़ने का इन्फ्लेशन और डिफ्लेशन पर क्या असर होता है?
answer: पैसे में बढ़ोतरी Supply, उत्पादन बढ़ने से होने वाली मंदी की संभावना को खत्म कर देती है।
wrong_answers:
  - पैसे (Supply) में बढ़ोतरी से मंहगाई कम होती है।
  - पैसे में Supply की बढ़ोतरी का महंगाई या मंदी पर कोई असर नहीं पड़ता।
  - पैसे (Supply) में बढ़ोतरी होने से उत्पादन में कमी आती है।
explanation: |
  अध्याय बताता है कि एक निश्चित धन Supply प्रणाली में, वृद्धि
  उत्पादन में वृद्धि सैद्धांतिक रूप से मुद्रास्फीति में कमी यानी कीमतों में गिरावट का कारण बननी चाहिए,
  जैसा कि और ज़्यादा सामान और सेवाएँ उपलब्ध होंगी। हालाँकि, मौजूदा फ़िएट
  मौद्रिक प्रणाली में, पैसे की मात्रा (Supply) में वृद्धि होने से संभावित मुद्रास्फीति की कमी का असर खत्म हो जाता है।
  उत्पादन में वृद्धि के कारण हुआ।
reviewed: false
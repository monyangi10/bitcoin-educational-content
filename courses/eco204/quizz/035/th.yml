question: ผลกระทบของภาวะเงินเฟ้อสูงต่อการออมคืออะไร?
answer: มันกัดกร่อนมูลค่าของทุนและรายได้ ทำให้การวางแผนระยะยาวเป็นเรื่องยาก
wrong_answers:
  - มันเพิ่มมูลค่าของการออม
  - มันไม่มีผลกระทบต่อการออม
  - มันกระตุ้นให้ผู้คนออมมากขึ้น
explanation: |
  ในช่วงภาวะเงินเฟ้อสูง การออมกลายเป็นเรื่องท้าทาย เงินสูญเสียมูลค่าอย่างรวดเร็ว ทำให้การวางแผนระยะยาวเป็นเรื่องยาก ความไม่มั่นคงทางการเงินนี้สามารถก่อให้เกิดความเครียดและความวิตกกังวล
reviewed: true
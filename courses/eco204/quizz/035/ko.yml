question: 초인플레이션이 저축에 미치는 영향은 무엇인가요?
answer: 이는 자본과 소득의 가치를 약화시켜 장기적인 계획을 세우기 어렵게 만듭니다.
wrong_answers:
  - 저축의 가치를 높입니다.
  - 비용 절감에는 영향을 미치지 않습니다.
  - 사람들이 더 많이 저축하도록 장려합니다.
explanation: |
  초인플레이션 시대에는 저축이 어려운 일이 됩니다. 돈이 빨리
  가치를 잃게 되어 장기적인 계획이 어려워집니다. 이러한 재정적 불안정성은
  스트레스와 불안을 유발할 수 있습니다.
reviewed: false
question: Kakav je uticaj hiperinflacije na štednju?
answer: Ona nagriza vrednost kapitala i prihoda, otežavajući dugoročno planiranje.
wrong_answers:
  - Povećava vrednost štednje.
  - To nema uticaja na uštede.
  - Podstiče ljude da više štede.
explanation: |
  U periodu hiperinflacije, štednja postaje izazov. Novac brzo gubi svoju vrednost, što otežava dugoročno planiranje. Ova finansijska nestabilnost može izazvati stres i anksioznost.

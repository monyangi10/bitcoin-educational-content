question: Wat is de impact van hyperinflatie op besparingen?
answer: Het holt de waarde van kapitaal en inkomen uit, wat langetermijnplanning moeilijk maakt.
wrong_answers:
  - Het verhoogt de waarde van spaargeld.
  - Het heeft geen invloed op besparingen.
  - Het moedigt mensen aan om meer te sparen.
explanation: |
  In een periode van hyperinflatie wordt sparen een uitdaging. Geld verliest snel
  verliest zijn waarde, waardoor langetermijnplanning moeilijk wordt. Deze financiële instabiliteit
  kan stress en angst veroorzaken.

question: Jaki jest wpływ hiperinflacji na oszczędności?
answer: Powoduje erozję wartości kapitału i dochodu, utrudniając długoterminowe planowanie.
wrong_answers:
  - Zwiększa wartość oszczędności.
  - Nie ma wpływu na oszczędności.
  - Zachęca ludzi do większego oszczędzania.
explanation: |
  W okresie hiperinflacji oszczędzanie staje się wyzwaniem. Pieniądze szybko tracą na wartości, utrudniając długoterminowe planowanie. Ta niestabilność finansowa
  może powodować stres i niepokój.
reviewed: true

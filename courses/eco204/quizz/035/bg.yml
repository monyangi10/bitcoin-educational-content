question: Какво е въздействието на хиперинфлацията върху спестяванията?
answer: Тя намалява стойността на капитала и доходите, което затруднява дългосрочното планиране.
wrong_answers:
  - Той увеличава стойността на спестяванията.
  - Тя не оказва влияние върху спестяванията.
  - Тя насърчава хората да спестяват повече.
explanation: |
  В период на хиперинфлация спестяването се превръща в предизвикателство. Парите бързо
  губят стойността си, което затруднява дългосрочното планиране. Тази финансова нестабилност
  може да предизвика стрес и безпокойство.
reviewed: true
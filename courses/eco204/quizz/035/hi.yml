question: हाइपरइन्फ्लेशन का बचत पर क्या असर होता है?
answer: यह पूंजी और आय की कीमत को कम कर देता है, जिससे लंबी अवधि की योजना बनाना मुश्किल हो जाता है।
wrong_answers:
  - यह बचत की कीमत बढ़ाता है।
  - इसका बचत पर कोई असर नहीं होता।
  - यह लोगों को और बचत करने के लिए प्रोत्साहित करता है।
explanation: |
  हाइपरइन्फ्लेशन के दौरान, बचत करना एक चुनौती बन जाता है। पैसा तेजी से
  अपनी कीमत खो देता है, जिससे लंबी अवधि की योजना बनाना मुश्किल हो जाता है। यह आर्थिक अस्थिरता
  तनाव और चिंता पैदा कर सकता है।
reviewed: false
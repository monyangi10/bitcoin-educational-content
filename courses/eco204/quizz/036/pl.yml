question: Jaka jest rola oszczędności w czasach niepewności?
answer: Oszczędności służą jako lekarstwo na niepewność, zapewniając rezerwy finansowe na wypadek nieprzewidzianych sytuacji.
wrong_answers:
  - Oszczędności nie są konieczne w czasach niepewności.
  - Oszczędności są wykorzystywane do stymulowania gospodarki w czasach niepewności.
  - Oszczędności są wykorzystywane do spłaty długów w niepewnych czasach.
explanation: |
  Oszczędności zawsze były lekarstwem na niepewność. Posiadanie rezerw finansowych
  w celu radzenia sobie w nieprzewidzianych sytuacjach zapewnia spokój ducha i przyczynia się do wzmacniania spójności społeczej.
reviewed: true

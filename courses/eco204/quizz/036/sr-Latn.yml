question: Koja je uloga štednje u vremenima neizvesnosti?
answer: Štednja služi kao lek protiv neizvesnosti, obezbeđujući finansijske rezerve za upravljanje nepredviđenim situacijama.
wrong_answers:
  - Štednja nije neophodna u vremenima nesigurnosti.
  - Štednja se koristi za stimulisanje ekonomije u vremenima neizvesnosti.
  - Štednja se koristi za otplatu dugova u vremenima neizvesnosti.
explanation: |
  Štednja je oduvek bila lek protiv neizvesnosti. Imati finansijske rezerve za upravljanje nepredviđenim situacijama doprinosi miru uma i jača društvenu koheziju.

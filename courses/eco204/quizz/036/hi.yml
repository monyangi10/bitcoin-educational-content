question: अनिश्चितता के समय में बचत की क्या भूमिका है?
answer: बचत अनिश्चितता के खिलाफ एक इलाज की तरह काम करती है, जो अप्रत्याशित हालात को संभालने के लिए वित्तीय बचत देती है।
wrong_answers:
  - अनिश्चितता के समय में बचत करना ज़रूरी नहीं है।
  - बेरोज़गारी के समय में बचत का इस्तेमाल अर्थव्यवस्था को बढ़ावा देने के लिए किया जाता है।
  - अनिश्चितता के समय में बचत का इस्तेमाल कर्ज चुकाने के लिए किया जाता है।
explanation: |
  बचत हमेशा से अनिश्चितता के खिलाफ एक इलाज रही है। वित्तीय सुरक्षा होना...
  अनपेक्षित स्थितियों को संभालने के लिए रिजर्व रखना मन की शांति देता है और मजबूती प्रदान करता है।
  सामाजिक एकजुटता।

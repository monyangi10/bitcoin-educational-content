question: Wat is de rol van sparen in tijden van onzekerheid?
answer: Sparen dient als remedie tegen onzekerheid, het verschaft financiële reserves om onvoorziene situaties het hoofd te bieden.
wrong_answers:
  - Besparingen zijn niet nodig in tijden van onzekerheid.
  - Besparingen worden gebruikt om de economie te stimuleren in tijden van onzekerheid.
  - Spaargeld wordt gebruikt om schulden af te betalen in tijden van onzekerheid.
explanation: |
  Sparen is altijd een remedie geweest tegen onzekerheid. Het hebben van financiële
  reserves om onvoorziene situaties aan te kunnen draagt bij aan gemoedsrust en versterkt de
  sociale cohesie.
reviewed: false
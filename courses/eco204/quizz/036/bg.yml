question: Каква е ролята на спестяванията във времена на несигурност?
answer: Спестяванията служат като средство за защита от несигурността, като осигуряват финансови резерви за справяне с непредвидени ситуации.
wrong_answers:
  - Във времена на несигурност не е необходимо да се правят икономии.
  - Спестяванията се използват за стимулиране на икономиката във времена на несигурност.
  - Спестяванията се използват за погасяване на дългове в несигурни времена.
explanation: |
  Спестяванията винаги са били средство за защита от несигурността. Наличието на финансови
  резерви за справяне с непредвидени ситуации допринася за душевното спокойствие и укрепва
  социалното сближаване.
reviewed: true
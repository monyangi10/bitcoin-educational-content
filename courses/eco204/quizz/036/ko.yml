question: 불확실성의 시대에 저축의 역할은 무엇인가요?
answer: 저축은 불확실성에 대비하여 예기치 못한 상황에 대처할 수 있는 재정적 여유를 제공하는 역할을 합니다.
wrong_answers:
  - 불확실한 시기에는 저축이 필요하지 않습니다.
  - 저축은 불확실한 시기에 경제를 활성화하는 데 사용됩니다.
  - 저축은 불확실한 시기에 부채를 갚는 데 사용됩니다.
explanation: |
  저축은 항상 불확실성에 대한 대비책이었습니다. 예상치 못한 상황에 대처할 수 있는 재정적
  예기치 않은 상황에 대처할 수 있는 재정적 여유를 갖는 것은 마음의 평화에 기여하고
  사회적 결속력을 강화합니다.
reviewed: false
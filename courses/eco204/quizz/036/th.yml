question: บทบาทของการออมในช่วงเวลาที่ไม่แน่นอนคืออะไร?
answer: การออมเงินทำหน้าที่เป็นยารักษาความไม่แน่นอน โดยให้เงินสำรองเพื่อจัดการกับสถานการณ์ที่ไม่คาดคิด
wrong_answers:
  - การออมไม่จำเป็นในช่วงเวลาที่ไม่แน่นอน
  - การออมถูกใช้เพื่อกระตุ้นเศรษฐกิจในช่วงเวลาที่ไม่แน่นอน
  - การออมถูกใช้เพื่อชำระหนี้ในช่วงเวลาที่ไม่แน่นอน
explanation: |
  การออมเงินเป็นวิธีการแก้ปัญหาความไม่แน่นอนมาโดยตลอด การมีเงินสำรองเพื่อจัดการกับสถานการณ์ที่ไม่คาดคิดช่วยเสริมสร้างความสบายใจและความสามัคคีในสังคม
reviewed: true
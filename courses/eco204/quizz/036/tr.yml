question: Belirsizlik dönemlerinde tasarrufların rolü nedir?
answer: Tasarruflar, öngörülemeyen durumları yönetmek için mali rezervler sağlayarak belirsizliğe karşı bir çare görevi görür.
wrong_answers:
  - Belirsizlik dönemlerinde tasarruf gerekli değildir.
  - Tasarruflar, belirsizlik dönemlerinde ekonomiyi canlandırmak için kullanılır.
  - Tasarruflar, belirsizlik dönemlerinde borçları ödemek için kullanılır.
explanation: |
  Tasarruf her zaman belirsizliğe karşı bir çare olmuştur. Finansal
  öngörülemeyen durumlarla başa çıkma rezervleri iç huzuruna katkıda bulunur ve
  sosyal uyum.

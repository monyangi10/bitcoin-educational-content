question: ผลที่ตามมาทั่วไปของภาวะเงินเฟ้อสูงที่เห็นในกรณีของซิมบับเวและสาธารณรัฐไวมาร์คือการลดค่าของสกุลเงินอย่างรุนแรง
answer: มูลค่าที่แท้จริงของธนบัตรอาจต่ำกว่ามูลค่าของกระดาษที่ใช้พิมพ์ธนบัตรนั้น
wrong_answers:
  - มูลค่าของสกุลเงินเพิ่มขึ้น
  - ความต้องการธนบัตรลดลง
  - มูลค่าของสินทรัพย์ที่จับต้องได้ลดลง
explanation: |
  ในสถานการณ์ทางเศรษฐกิจบางอย่าง เช่น ภาวะเงินเฟ้อรุนแรง มูลค่าที่แท้จริงของธนบัตรอาจต่ำกว่ามูลค่าของกระดาษที่ใช้พิมพ์ธนบัตรนั้น การเสื่อมค่าที่รุนแรงนี้ทำให้ธนบัตรซึ่งปกติเป็นสัญลักษณ์ของมูลค่าและอำนาจการซื้อ กลายเป็นเพียงกระดาษที่ไร้ค่า
reviewed: true
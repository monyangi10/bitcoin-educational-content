question: Co jest powszechną konsekwencją hiperinflacji, jak widać na przykładzie Zimbabwe i Republiki Weimarskiej?
answer: Wewnętrzna wartość banknotu może stać się niższa niż wartość papieru, na którym został wydrukowany.
wrong_answers:
  - Wartość waluty wzrasta.
  - Popyt na banknoty spada.
  - Wartość aktywów rzeczowych spada.

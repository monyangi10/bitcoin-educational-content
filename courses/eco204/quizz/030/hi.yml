question: हाइपरइन्फ्लेशन का एक आम नतीजा क्या है, जैसा कि जिम्बाब्वे और वाइमर रिपब्लिक के मामलों में देखा गया?
answer: एक बैंकनोट की असली कीमत उस कागज से भी कम हो सकती है जिस पर वह छपा होता है।
wrong_answers:
  - मुद्रा का मूल्य बढ़ जाता है।
  - बैंकनोटों की मांग कम हो जाती है।
  - मूर्त संपत्ति का मूल्य घट जाता है।
explanation: |
  कुछ आर्थिक हालातों में, जैसे कि हाइपरइन्फ्लेशन (महंगाई की चरम स्थिति), असली...
  एक बैंकनोट की कीमत उस कागज से भी कम हो सकती है जिस पर वह छपा होता है।
  ये भारी गिरावट नोटों को, जो आमतौर पर मूल्य और
  खरीदने की ताकत, बेकार कागज के टुकड़ों में बदल जाती है।
reviewed: false
question: None insobanuro y’ugutera imbere cane nk’uko Bernholz abivuga ni iyihe?
answer: Hyperinflation ni ukwaguka kw’inflation nyinshi, irangwa n’ibihombo vyinshi vy’ingengo y’imari biterwa inkunga n’uguhingura amahera.
wrong_answers:
  - Inflation nyinshi ni ukugabanya amahera Supply.
  - Inflation nyinshi ni ukwiyongera kw’amahera Supply.
  - Inflation nyinshi cane ni ukugabanya ivyimburwa.
explanation: |
  Ico kigabane kirasigura yuko nk’uko Bernholz abivuga, ugutera imbere cane kw’ibiciro ari ikintu .
  kwagura inflation nini, irangwa n’amadeni menshi y’ingengo y’imari aterwa inkunga n’
  irema ry’amahera.

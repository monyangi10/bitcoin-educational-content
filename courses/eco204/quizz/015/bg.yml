question: Какво е определението за хиперинфлация според Бернхолц?
answer: Хиперинфлацията е продължение на високата инфлация, която се характеризира с големи бюджетни дефицити, финансирани чрез създаване на пари.
wrong_answers:
  - Хиперинфлацията е намаляване на паричното предлагане.
  - Хиперинфлацията е умерено увеличение на паричното предлагане.
  - Хиперинфлацията е спад в производството.
explanation: |
  В главата се обяснява, че според Бернхолц хиперинфлацията е
  продължение на високата инфлация, характеризираща се с големи бюджетни дефицити, финансирани от
  създаването на пари.
reviewed: true
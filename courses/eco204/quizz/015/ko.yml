question: 베른홀츠에 따르면 하이퍼인플레이션의 정의는 무엇인가요?
answer: 하이퍼인플레이션은 높은 인플레이션의 연장선으로, 화폐 발행으로 인한 대규모 재정 적자를 특징으로 합니다.
wrong_answers:
  - 하이퍼인플레이션은 화폐 Supply의 감소입니다.
  - 하이퍼인플레이션은 화폐 Supply의 완만한 증가를 의미합니다.
  - 하이퍼인플레이션은 생산량 감소를 의미합니다.
explanation: |
  이 장에서는 베른홀츠에 따르면 하이퍼인플레이션은 다음과 같이 설명합니다
  고인플레이션의 연장이며, 대규모 예산 적자로 인해 자금이 조달되는 것이 특징입니다
  화폐 창출.

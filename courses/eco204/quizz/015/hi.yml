question: बर्नहोल्ज़ के अनुसार हाइपरइन्फ्लेशन की परिभाषा क्या है?
answer: हाइपरइन्फ्लेशन (Hyperinflation) हाई इन्फ्लेशन का ही एक बढ़ा हुआ रूप है, जिसमें पैसे छापकर बड़े बजट घाटे को पूरा किया जाता है।
wrong_answers:
  - हाइपरइन्फ्लेशन पैसे की कीमत Supply में कमी होना है।
  - हाइपरइन्फ्लेशन पैसे में एक मामूली बढ़ोतरी है Supply।
  - हाइपरइन्फ्लेशन उत्पादन में कमी है।
explanation: |
  अध्याय बताता है कि बर्नहोल्ज़ के अनुसार, हाइपरइन्फ्लेशन एक
  उच्च मुद्रास्फीति का विस्तार, जिसमें बड़े बजट घाटे को वित्तपोषित करने की विशेषता है
  पैसा बनाना।

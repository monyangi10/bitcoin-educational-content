question: คำจำกัดความของภาวะเงินเฟ้อรุนแรงตาม Bernholz คืออะไร?
answer: ภาวะเงินเฟ้อรุนแรงเป็นการขยายตัวของเงินเฟ้อสูง ซึ่งมีลักษณะเฉพาะโดยการขาดดุลงบประมาณจำนวนมากที่ได้รับการสนับสนุนโดยการสร้างเงิน
wrong_answers:
  - ภาวะเงินเฟ้อสูงเป็นการลดลงของปริมาณเงินในระบบเศรษฐกิจ
  - ภาวะเงินเฟ้อรุนแรงคือการเพิ่มขึ้นของปริมาณเงินในระดับปานกลาง
  - ภาวะเงินเฟ้อรุนแรงคือการลดลงของการผลิต
explanation: |
  บทนี้อธิบายว่า ตามที่ Bernholz กล่าวไว้ ภาวะเงินเฟ้อรุนแรงเป็นการขยายตัวของเงินเฟ้อสูง ซึ่งมีลักษณะเฉพาะคือการขาดดุลงบประมาณจำนวนมากที่ได้รับการสนับสนุนทางการเงินโดยการสร้างเงิน
reviewed: true
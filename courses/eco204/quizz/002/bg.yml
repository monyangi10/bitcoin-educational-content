question: Какво е определението за инфлация според Le Robert?
answer: Инфлацията е прекомерно нарастване на стойността на платежните инструменти, което води до повишаване на цените и обезценяване на валутата.
wrong_answers:
  - Инфлацията е намаляване на стойността на платежните инструменти, което води до повишаване на цените и обезценяване на валутата.
  - Инфлацията е прекомерно нарастване на стойността на платежните инструменти, което води до намаляване на цените и обезценяване на валутата.
  - Инфлацията е прекомерно нарастване на стойността на платежните инструменти, което води до повишаване на цените и поскъпване на валутата.
explanation: |

question: 로버트에 따르면 인플레이션의 정의는 무엇인가요?
answer: 인플레이션은 결제 수단이 과도하게 증가하여 물가가 상승하고 통화가치가 하락하는 것을 말합니다.
wrong_answers:
  - 인플레이션은 결제 수단의 감소로 인해 물가가 상승하고 통화가치가 하락하는 것을 말합니다.
  - 인플레이션은 결제 수단이 과도하게 증가하여 물가가 하락하고 통화가치가 하락하는 것을 말합니다.
  - 인플레이션은 결제 수단이 과도하게 증가하여 물가가 상승하고 통화가치가 절상되는 것을 말합니다.
explanation: |
  로버트에 따르면 인플레이션은 다음과 같은 과도한 증가로 정의됩니다
  지불 수단(지폐, 자본)이 물가 상승과 통화 가치 하락을 초래하는 것
  통화 가치 하락으로 정의합니다.

question: คำจำกัดความของเงินเฟ้อตามที่โรเบิร์ตคืออะไร?
answer: เงินเฟ้อคือการเพิ่มขึ้นอย่างมากของมูลค่าของเครื่องมือการชำระเงิน ทำให้ราคาสินค้าเพิ่มขึ้นและค่าเงินลดลง
wrong_answers:
  - เงินเฟ้อคือการลดลงของมูลค่าของเครื่องมือการชำระเงิน ซึ่งทำให้ราคาสินค้าเพิ่มขึ้นและค่าเงินลดลง
  - เงินเฟ้อคือการเพิ่มขึ้นอย่างมากในมูลค่าของเครื่องมือการชำระเงิน ซึ่งทำให้ราคาลดลงและค่าเงินเสื่อมค่า
  - เงินเฟ้อคือการเพิ่มขึ้นอย่างมากของมูลค่าของเครื่องมือการชำระเงิน ซึ่งทำให้ราคาสูงขึ้นและค่าเงินแข็งค่าขึ้น
explanation: |
  ตามที่โรเบิร์ตกล่าวไว้ เงินเฟ้อถูกกำหนดให้เป็นการเพิ่มขึ้นอย่างมากเกินไปของเครื่องมือการชำระเงิน (ธนบัตร, ทุน) ซึ่งทำให้เกิดการเพิ่มขึ้นของราคาและการลดค่าเงินของสกุลเงิน
reviewed: true
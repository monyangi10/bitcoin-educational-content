question: Jaka jest definicja inflacji według francuskiego słownika Le Robert?
answer: Inflacja to nadmierny wzrost wartości instrumentów płatniczych powodujący wzrost cen i deprecjację waluty.
wrong_answers:
  - Inflacja to spadek wartości środków płatniczych powodujący wzrost cen i deprecjację waluty.
  - Inflacja to nadmierny wzrost wartości instrumentów płatniczych powodujący spadek cen i deprecjację waluty.
  - Inflacja to nadmierny wzrost wartości instrumentów płatniczych powodujący wzrost cen i aprecjację waluty.
explanation: |
  Według francuskiego słownika Le Robert inflację definiuje się jako nadmierny wzrost wartości
  instrumentów płatniczych (banknoty, kapitał) powodujący wzrost cen i deprecjację waluty.
reviewed: true

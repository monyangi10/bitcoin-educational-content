question: रॉबर्ट के अनुसार मुद्रास्फीति की परिभाषा क्या है?
answer: महँगाई भुगतान के साधनों में अत्यधिक वृद्धि है जिससे कीमतों में बढ़ोतरी होती है और मुद्रा का मूल्य घटता है।
wrong_answers:
  - महँगाई भुगतान के साधनों में कमी होने की वजह से होती है, जिससे कीमतें बढ़ती हैं और मुद्रा का मूल्य घटता है।
  - महँगाई भुगतान के साधनों में अत्यधिक वृद्धि है जिससे कीमतों में कमी आती है और मुद्रा का मूल्य घटता है।
  - मुद्रास्फीति भुगतान के साधनों में अत्यधिक वृद्धि है जिससे कीमतों में वृद्धि और मुद्रा का अधिमूल्यन होता है।
explanation: |
  रॉबर्ट के मुताबिक, मुद्रास्फीति को एक अत्यधिक वृद्धि के रूप में परिभाषित किया गया है...
  भुगतान के साधन (नोट, पूंजी) जिससे कीमतों में वृद्धि और मूल्यह्रास होता है
  मुद्रा का।

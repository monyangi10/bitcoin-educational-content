question: 영란은행이 민간 은행을 통화 시스템에서 부차적인 위치로 강등시킨 결과는 무엇일까요?
answer: 세 번째 Layer의 화폐가 생성되었습니다
wrong_answers:
  - 잉글랜드 은행이 파산했습니다
  - 금의 가치가 증가했습니다
  - 암스테르담 은행, 글로벌 경제의 중심이 되다
explanation: |
  영란은행이 민간 은행을 통화 시스템에서 부차적인 위치로 강등했을 때
  통화 시스템에서 부차적인 위치로 강등되었을 때, 세 번째 Layer 화폐가 만들어졌습니다. 민간 은행이 발행한 지폐는
  민간 은행에서 발행한 지폐는 더 이상 금으로 전환할 수 없었지만
  잉글랜드 은행의 지폐로 전환할 수 있었습니다.
reviewed: false
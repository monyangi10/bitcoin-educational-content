question: Каква е последицата от това, че Английската централна банка изтласква частните банки на втори план в паричната система?
answer: Създаден е трети валутен слой
wrong_answers:
  - Английската централна банка фалира
  - Стойността на златото се увеличава
  - Банката на Амстердам се превръща в световен икономически център
explanation: |
  Когато Английската централна банка изтласква частните банки на втори план
  в паричната система, беше създаден трети паричен слой. Банкнотите, емитирани
  от частните банки вече не бяха конвертируеми в злато, а в книжни пари от
  банката на Англия, която сама по себе си беше конвертируема в злато.
reviewed: true
question: Wat was het gevolg van het feit dat de Bank of England particuliere banken naar een secundaire positie in het monetaire systeem verwees?
answer: Een derde Layer van valuta werd gecreëerd
wrong_answers:
  - De Bank of England ging failliet
  - De waarde van goud steeg
  - De Bank van Amsterdam werd het wereldwijde economische centrum
explanation: |
  Toen de Bank of England particuliere banken naar een secundaire positie verwees
  in het monetaire systeem, werd een derde Layer van valuta gecreëerd. De bankbiljetten
  van privé-banken waren niet langer converteerbaar in goud, maar in papiergeld van de Bank of England, dat zelf converteerbaar was in goud
  de Bank of England, die zelf weer in goud kon worden omgezet.
reviewed: false
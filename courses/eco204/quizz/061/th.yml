question: ผลที่ตามมาของการที่ธนาคารแห่งประเทศอังกฤษลดบทบาทของธนาคารเอกชนลงเป็นตำแหน่งรองในระบบการเงินคืออะไร?
answer: มีการสร้างชั้นที่สามของสกุลเงิน
wrong_answers:
  - ธนาคารแห่งประเทศอังกฤษล้มละลาย
  - มูลค่าของทองคำเพิ่มขึ้น
  - ธนาคารอัมสเตอร์ดัมกลายเป็นศูนย์กลางเศรษฐกิจโลก
explanation: |
  เมื่อธนาคารแห่งประเทศอังกฤษลดสถานะของธนาคารเอกชนลงเป็นตำแหน่งรองในระบบการเงิน ชั้นที่สามของสกุลเงินก็ถูกสร้างขึ้น ธนบัตรที่ออกโดยธนาคารเอกชนไม่สามารถแลกเปลี่ยนเป็นทองคำได้อีกต่อไป แต่สามารถแลกเปลี่ยนเป็นสกุลเงินกระดาษจากธนาคารแห่งประเทศอังกฤษ ซึ่งตัวมันเองสามารถแลกเปลี่ยนเป็นทองคำได้
reviewed: true
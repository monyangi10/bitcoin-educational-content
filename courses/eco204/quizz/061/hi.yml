question: बैंक ऑफ इंग्लैंड ने निजी बैंकों को मौद्रिक प्रणाली में द्वितीयक स्थान पर धकेलने का क्या परिणाम हुआ?
answer: तीसरा Layer करेंसी का बनाया गया
wrong_answers:
  - बैंक ऑफ इंग्लैंड दिवालिया हो गया
  - सोने की कीमत बढ़ गई
  - एम्स्टर्डैम का बैंक वैश्विक आर्थिक केंद्र बन गया
explanation: |
  जब बैंक ऑफ इंग्लैंड ने निजी बैंकों को दूसरे दर्जे पर धकेल दिया
  मौद्रिक प्रणाली में, मुद्रा का एक तीसरा Layer हिस्सा बनाया गया था। जारी किए गए नोटों में...
  निजी बैंकों द्वारा जारी किए गए नोट अब सोने में परिवर्तनीय नहीं थे, बल्कि कागजी मुद्रा में परिवर्तनीय थे।
  बैंक ऑफ इंग्लैंड, जो खुद सोने में परिवर्तनीय था।
reviewed: false
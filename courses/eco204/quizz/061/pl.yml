question: Jakie były konsekwencje zdegradowania przez Bank Anglii prywatnych banków do drugorzędnej pozycji w systemie finansowym?
answer: Powstała trzecia warstwa waluty
wrong_answers:
  - Bank Anglii zbankrutował
  - Wartość złota wzrosła
  - Bank Amsterdamu stał się globalnym centrum gospodarczym
explanation: |
  Kiedy Bank Anglii zdegradował prywatne banki do drugorzędnej pozycji w systemie finansowym, powstała trzecia warstwa waluty. Banknoty emitowane
  przez prywatne banki nie były już wymienialne na złoto, ale na papierową walutę Banku Anglii, która była wymienialna na złoto.
reviewed: true

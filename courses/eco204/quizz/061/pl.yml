question: Jakie były konsekwencje zdegradowania przez Bank Anglii prywatnych banków do drugorzędnej pozycji w systemie monetarnym?
answer: Powstał trzeci Layer waluty
wrong_answers:
  - Bank Anglii zbankrutował
  - Wartość złota wzrosła
  - Bank of Amsterdam stał się globalnym centrum gospodarczym
explanation: |
  Kiedy Bank Anglii zdegradował prywatne banki do drugorzędnej pozycji w systemie monetarnym, powstał trzeci Layer waluty
  w systemie monetarnym, powstał trzeci Layer waluty. Banknoty emitowane
  przez prywatne banki nie były już wymienialne na złoto, ale na papierową walutę Banku Anglii
  bank of England, która sama była wymienialna na złoto.

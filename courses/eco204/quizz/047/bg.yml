question: Какъв е обменният курс на цифровия боливар във Венецуела през 2021 г.?
answer: Един милион към едно.
wrong_answers:
  - Хиляда към едно.
  - Десет хиляди към едно.
  - Сто хиляди към едно.
explanation: |
  През 2021 г. цифровият боливар във Венецуела беше заменен с нов
  реденоминация от един милион към едно.
reviewed: true
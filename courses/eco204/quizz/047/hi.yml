question: वेनेजुएला में 2021 में डिजिटल बोलिवर की Exchange दर क्या थी?
answer: दस लाख में से एक।
wrong_answers:
  - एक हज़ार का एक।
  - दस हज़ार में से एक।
  - एक लाख में से एक।
explanation: |
  2021 में, वेनेज़ुएला में डिजिटल बोलिवर को एक नए से बदल दिया गया था।
  एक लाख को एक में बदलना।

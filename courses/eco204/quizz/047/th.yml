question: อัตราแลกเปลี่ยนของโบลิวาร์ดิจิทัลในเวเนซุเอลาในปี 2021 คืออะไร?
answer: หนึ่งล้านต่อหนึ่ง
wrong_answers:
  - หนึ่งพันต่อหนึ่ง
  - หนึ่งหมื่นต่อหนึ่ง
  - หนึ่งแสนต่อหนึ่ง
explanation: |
  ในปี 2021 โบลิวาร์ดิจิทัลในเวเนซุเอลาถูกแทนที่ด้วยการเปลี่ยนชื่อใหม่ในอัตราหนึ่งล้านต่อหนึ่ง
reviewed: true
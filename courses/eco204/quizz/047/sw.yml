question: Kiwango cha Exchange cha bolivar ya dijiti nchini Venezuela mwaka wa 2021 kilikuwa kipi?
answer: Milioni moja hadi moja.
wrong_answers:
  - Elfu moja hadi moja.
  - Elfu kumi hadi moja.
  - Laki moja hadi moja.
explanation: |
  Mnamo 2021, bolivar ya dijiti nchini Venezuela ilibadilishwa na mpya
  upya wa milioni moja hadi moja.
reviewed: true

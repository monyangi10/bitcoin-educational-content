question: Ni igitigiri ikihe ca Exchange c’ibolovar ya digitale muri Venezuela mu 2021?
answer: Miliyoni imwe kuri imwe.
wrong_answers:
  - Igihumbi ku kimwe.
  - Ibihumbi cumi kuri kimwe.
  - Ibihumbi ijana ku kimwe.
explanation: |
  Muri 2021, igiharuro ca bolivar co muri Venezuela carasubirijwe n’igiharuro gishasha
  guhindura idini ry’imiliyoni imwe kuri imwe.

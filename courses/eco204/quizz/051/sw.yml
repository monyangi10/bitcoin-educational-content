question: Ni suluhisho lipi lililopitishwa na Ujerumani kukabiliana na mfumuko wa bei baada ya Vita vya Kwanza vya Kidunia?
answer: Uundaji wa sarafu mpya, Rentenmark
wrong_answers:
  - Uwekezaji wa dola
  - Kuchapisha pesa zaidi
  - Kupunguza pesa za Supply
explanation: |
  Ujerumani iliunda sarafu mpya, Rentenmark, ili kukabiliana na mfumuko wa bei
  baada ya Vita vya Kwanza vya Kidunia. Sarafu hii iliungwa mkono na mali ya eneo la Reich, na
  mikakati hii imeonekana kuwa na ufanisi.
reviewed: true

question: Jakie było rozwiązanie przyjęte przez Niemcy w celu przeciwdziałaniu inflacji po I wojnie światowej?
answer: Utworzenie nowej waluty, Rentenmark.
wrong_answers:
  - Dolaryzacja.
  - Drukowanie większej ilości pieniędzy.
  - Zmniejszenie ilości pieniędzy.
explanation: |
  Niemcy stworzyły nową walutę, Rentenmark, aby przeciwdziałać inflacji po I wojnie światowej. Waluta ta była zabezpieczona przez aktywa terytorialne Rzeszy, a strategia okazała się skuteczna.
reviewed: true

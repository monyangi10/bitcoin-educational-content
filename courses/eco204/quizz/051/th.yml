question: วิธีแก้ปัญหาที่เยอรมนีใช้เพื่อต่อสู้กับภาวะเงินเฟ้อหลังสงครามโลกครั้งที่ 1 คืออะไร?
answer: การสร้างสกุลเงินใหม่, เรนเทนมาร์ค
wrong_answers:
  - ดอลลาร์ไลเซชั่น
  - การพิมพ์เงินเพิ่ม
  - การลดปริมาณเงินในระบบ
explanation: |
  เยอรมนีสร้างสกุลเงินใหม่ชื่อว่า Rentenmark เพื่อแก้ปัญหาเงินเฟ้อหลังสงครามโลกครั้งที่หนึ่ง สกุลเงินนี้ได้รับการสนับสนุนจากทรัพย์สินทางดินแดนของ Reich และกลยุทธ์นี้พิสูจน์แล้วว่ามีประสิทธิภาพ
reviewed: true
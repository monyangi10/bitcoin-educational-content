question: Ni umuti uwuhe Ubudage bwafashe kugira ngo burwanye ugutera imbere kw’ibiciro inyuma y’Intambara ya mbere y’isi yose?
answer: Guhingura ifaranga rishasha, ari ryo Rentenmark .
wrong_answers:
  - Guhindura amadolari
  - Gucapura amafranga menshi
  - Kugabanya amahera Supply.
explanation: |
  Ubudage bwaremye ifaranga rishasha, Rentenmark, kugira ngo rihangane n'ugutera imbere kw'ibiciro
  inyuma y’Intambara ya mbere y’isi yose.Ayo mahera yari ashigikiwe n’itunga ry’intara ya Reich, kandi .
  iyo nzira yaragaragaye ko ari ngirakamaro.

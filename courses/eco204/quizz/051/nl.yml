question: Welke oplossing koos Duitsland om de inflatie na de Eerste Wereldoorlog tegen te gaan?
answer: Creatie van een nieuwe munteenheid, de Rentenmark
wrong_answers:
  - Dollarisering
  - Meer geld drukken
  - Geld verminderen Supply
explanation: |
  Duitsland creëerde een nieuwe munteenheid, de Rentenmark, om de inflatie tegen te gaan na de Eerste Wereldoorlog
  na de Eerste Wereldoorlog werd deze munt gedekt door de territoriale bezittingen van het Reich
  deze strategie bleek effectief.

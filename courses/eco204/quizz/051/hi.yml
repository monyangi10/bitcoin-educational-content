question: जर्मनी ने प्रथम विश्व युद्ध के बाद महंगाई से निपटने के लिए क्या उपाय अपनाया था?
answer: एक नई मुद्रा, रेंटेनमार्क का निर्माण
wrong_answers:
  - डॉलराइजेशन
  - ज़्यादा पैसा छापना
  - पैसे Supply को कम करना
explanation: |
  जर्मनी ने महँगाई से निपटने के लिए एक नई करेंसी बनाई, रेंटेनमार्क।
  प्रथम विश्व युद्ध के बाद। यह मुद्रा राइख की प्रादेशिक संपत्तियों द्वारा समर्थित थी, और
  यह रणनीति कारगर साबित हुई।
reviewed: false
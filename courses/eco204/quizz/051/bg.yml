question: Какво е решението, прието от Германия за борба с инфлацията след Първата световна война?
answer: Създаване на нова валута - рентна марка
wrong_answers:
  - Доларизация
  - Печатане на повече пари
  - Намаляване на паричното предлагане
explanation: |
  Германия създава нова валута - рентна марка, за да противодейства на инфлацията
  след Първата световна война тази валута е обезпечена с териториалните активи на Райха и
  тази стратегия се оказа ефективна.
reviewed: true
question: สาเหตุหลักของการปฏิวัติราคาระหว่างศตวรรษที่ 15 ถึง 17 ในยุโรปคืออะไร?
answer: การปฏิวัติด้านราคาส่วนใหญ่เกิดจากการไหลเข้าของโลหะมีค่าจำนวนมาก โดยเฉพาะทองคำและเงิน จากทวีปอเมริกา
wrong_answers:
  - การปฏิวัติด้านราคาส่วนใหญ่ถูกกระตุ้นโดยการไหลออกของโลหะมีค่าจำนวนมาก โดยเฉพาะทองคำและเงิน ไปยังทวีปอเมริกา
  - การปฏิวัติด้านราคาส่วนใหญ่ถูกกระตุ้นโดยการหลั่งไหลเข้ามาของโลหะมีค่าจำนวนมาก โดยเฉพาะทองคำและเงิน จากเอเชีย
  - การปฏิวัติด้านราคาส่วนใหญ่ถูกกระตุ้นโดยการไหลออกของโลหะมีค่าจำนวนมาก โดยเฉพาะทองคำและเงิน ไปยังเอเชีย
explanation: |
  ระหว่างศตวรรษที่ 15 ถึง 17 ยุโรปได้เห็นปรากฏการณ์ทางเศรษฐกิจที่น่าทึ่ง ซึ่งมักเรียกกันว่าการปฏิวัติราคา ช่วงเวลาเงินเฟ้อนี้ถูกกระตุ้นอย่างมากจากการไหลเข้าของโลหะมีค่าอย่างมหาศาล โดยเฉพาะทองคำและเงินจากทวีปอเมริกา
reviewed: true
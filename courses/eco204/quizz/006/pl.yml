question: Co było główną przyczyną rewolucji cenowej między XV a XVII wiekiem w Europie?
answer: Rewolucja cenowa została w dużej mierze wywołana przez masowy napływ metali szlachetnych, w szczególności złota i srebra, z obu Ameryk.
wrong_answers:
  - Rewolucja cenowa została w dużej mierze wywołana masowym odpływem metali szlachetnych, w szczególności złota i srebra, do obu Ameryk.
  - Rewolucja cenowa została w dużej mierze wywołana przez masowy napływ metali szlachetnych, w szczególności złota i srebra, z Azji.
  - Rewolucja cenowa została w dużej mierze wywołana masowym odpływem metali szlachetnych, w szczególności złota i srebra, do Azji.
explanation: |
  Między XV a XVII wiekiem Europa była świadkiem niezwykłego zjawiska gospodarczego, często nazywanego rewolucją cen
  zjawisko, często określane mianem rewolucji cenowej. Ten okres inflacji
  został w dużej mierze wywołany przez masowy napływ metali szlachetnych, w szczególności złota
  i srebra z obu Ameryk.
reviewed: false
question: Wat was de belangrijkste oorzaak van de prijsrevolutie tussen de 15e en 17e eeuw in Europa?
answer: De prijsrevolutie werd grotendeels veroorzaakt door een massale instroom van edelmetalen, vooral goud en zilver, uit Amerika.
wrong_answers:
  - De prijsrevolutie werd grotendeels veroorzaakt door een massale uitstroom van edelmetalen, vooral goud en zilver, naar Amerika.
  - De prijsrevolutie werd grotendeels veroorzaakt door een massale toestroom van edelmetalen, met name goud en zilver, uit Azië.
  - De prijsrevolutie werd grotendeels veroorzaakt door een massale uitstroom van edelmetalen, vooral goud en zilver, naar Azië.
explanation: |
  Tussen de 15e en 17e eeuw was Europa getuige van een opmerkelijk economisch
  fenomeen, dat vaak de prijsrevolutie wordt genoemd. Deze periode van inflatie
  werd grotendeels veroorzaakt door een massale toevloed van edelmetalen, vooral goud
  en zilver, vanuit Amerika.

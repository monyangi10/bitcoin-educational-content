question: 15वीं से 17वीं सदी के बीच यूरोप में कीमतों में हुए बड़े बदलाव (Price Revolution) का मुख्य कारण क्या था?
answer: कीमतों में क्रांति मुख्य रूप से अमेरिका से आए कीमती धातुओं, खासकर सोने और चांदी, की भारी मात्रा के कारण हुई थी।
wrong_answers:
  - कीमतों में क्रांति मुख्य रूप से अमेरिका की तरफ बहुमूल्य धातुओं, खासकर सोने और चांदी के बड़े पैमाने पर बहाव से शुरू हुई थी।
  - कीमतों में क्रांति मुख्य रूप से एशिया से खासकर सोने और चांदी जैसी बहुमूल्य धातुओं की भारी मात्रा में आमद से शुरू हुई थी।
  - कीमतों में क्रांति मुख्य रूप से एशिया को कीमती धातुओं, खासकर सोने और चांदी, के बड़े पैमाने पर निकासी से शुरू हुई थी।
explanation: |
  15वीं से 17वीं सदी के बीच, यूरोप ने एक अद्भुत आर्थिक...
  इस घटना को अक्सर "कीमत क्रांति" कहा जाता है। यह मुद्रास्फीति का दौर था...
  यह मुख्य रूप से कीमती धातुओं, खासकर सोने की भारी मात्रा में आमद से शुरू हुआ था
  और चांदी, अमेरिका से।

question: 15~17세기 유럽에서 일어난 가격 혁명의 주요 원인은 무엇이었나요?
answer: 가격 혁명은 주로 아메리카 대륙에서 귀금속, 특히 금과 은이 대량으로 유입되면서 촉발되었습니다.

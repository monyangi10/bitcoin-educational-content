question: 歐洲 15 世紀到 17 世紀之間價格革命的主要原因是什麼？
answer: 價格革命主要是由來自美洲的貴金屬，尤其是黃金和白銀的大量湧入所引發。
wrong_answers:
  - 價格革命主要是由於貴金屬（尤其是黃金和銀）大量外流至美洲所觸發的。
  - 價格革命主要是由來自亞洲的貴金屬，尤其是黃金和白銀的大量湧入所引發。
  - 這場價格革命主要是由於貴金屬，尤其是黃金和白銀，大量外流至亞洲所引發的。
explanation: |
  在 15 世紀到 17 世紀之間，歐洲經歷了一個顯著的經濟轉型。
  現象，通常被稱為價格革命。這段期間的通貨膨脹
  主要是由於貴金屬，尤其是黃金的大量湧入所引發。
  和銀，來自美洲。

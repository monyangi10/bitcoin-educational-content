question: Коя е основната причина за революцията в цените между XV и XVII век в Европа?
answer: Ценовата революция до голяма степен е предизвикана от масовия приток на благородни метали, по-специално злато и сребро, от Северна и Южна Америка.
wrong_answers:
  - Ценовата революция до голяма степен е предизвикана от масовия отлив на благородни метали, по-специално злато и сребро, към Америка.
  - Ценовата революция до голяма степен бе предизвикана от масовия приток на благородни метали, особено злато и сребро, от Азия.
  - Ценовата революция до голяма степен бе предизвикана от масовия отлив на благородни метали, особено на злато и сребро, към Азия.
explanation: |
  Между XV и XVII в. Европа е свидетел на забележителен икономически
  явление, често наричано ценова революция. Този период на инфлация
  до голяма степен е предизвикан от масовия приток на благородни метали, по-специално злато
  и сребро, от Северна и Южна Америка.
reviewed: true
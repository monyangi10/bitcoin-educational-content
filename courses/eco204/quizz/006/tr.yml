question: Avrupa'da 15. ve 17. yüzyıllar arasında yaşanan fiyat devriminin ana nedeni neydi?
answer: Fiyat devrimi büyük ölçüde Amerika'dan gelen başta altın ve gümüş olmak üzere değerli metallerin büyük akını ile tetiklendi.
wrong_answers:
  - Fiyat devrimi büyük ölçüde, başta altın ve gümüş olmak üzere değerli metallerin Amerika kıtasına büyük miktarda çıkışıyla tetiklendi.
  - Fiyat devrimi büyük ölçüde Asya'dan gelen başta altın ve gümüş olmak üzere kıymetli metallerin yoğun akını ile tetiklendi.
  - Fiyat devrimi büyük ölçüde değerli metallerin, özellikle de altın ve gümüşün Asya'ya doğru büyük bir çıkışıyla tetiklendi.
explanation: |
  15. ve 17. yüzyıllar arasında Avrupa kayda değer bir ekonomik gelişmeye tanık oldu
  genellikle fiyat devrimi olarak adlandırılan bir olgudur. Bu enflasyon dönemi
  büyük ölçüde değerli metallerin, özellikle de altının büyük bir akını ile tetiklendi
  ve gümüş, Amerika'dan.
reviewed: false
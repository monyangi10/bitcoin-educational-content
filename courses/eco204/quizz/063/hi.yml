question: डच लोगों ने एंटवर्प की अंतरराष्ट्रीय आर्थिक केंद्र के रूप में सर्वोच्चता को खत्म करने के लिए क्या रणनीति अपनाई थी?
answer: उन्होंने शेल्ड नदी तक पहुँच बंद कर दी।
wrong_answers:
  - उन्होंने पैसे के समय मूल्य (time value of money) का कॉन्सेप्ट पेश किया।
  - उन्होंने अपनी खुद की मुद्रा जारी की।
  - उन्होंने पहला शेयर बाजार बनाया
explanation: |
  डच लोगों ने एंटवर्प की अंतरराष्ट्रीय आर्थिक प्रभुता को खत्म करने में कामयाबी हासिल कर ली।
  केंद्र ने शेल्ड नदी तक पहुँच को रोककर। यह रणनीति एक बड़ी योजना का हिस्सा थी।
  ऐतिहासिक आंदोलन, 'भिखारियों का विद्रोह'।
reviewed: false
question: Antwerp'in uluslararası bir ekonomik merkez olarak üstünlüğüne son vermek için Hollandalılar tarafından kullanılan strateji neydi?
answer: Scheldt Nehri'ne erişimi engellediler
wrong_answers:
  - Paranın zaman değeri kavramını ortaya attılar
  - Kendi para birimlerini çıkardılar
  - İlk borsayı onlar yarattı
explanation: |
  Hollandalılar, Antwerp'in uluslararası bir ekonomik merkez olarak üstünlüğüne son vermeyi başardılar
  
  scheldt Nehri'ne erişimi engelleyerek merkezi ele geçirdi. Bu strateji, daha büyük bir stratejinin parçasıydı
  
  tarihsel hareket, dilencilerin isyanı.'
reviewed: false
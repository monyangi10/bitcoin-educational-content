question: Welke strategie gebruikten de Nederlanders om een einde te maken aan de suprematie van Antwerpen als internationaal economisch centrum?
answer: Ze blokkeerden de toegang tot de Schelde
wrong_answers:
  - Ze introduceerden het concept van de tijdswaarde van geld
  - Ze gaven hun eigen munteenheid uit
  - Ze creëerden de eerste aandelenmarkt
explanation: |
  De Nederlanders slaagden erin een einde te maken aan de suprematie van Antwerpen als internationale economische macht
  
  centrum door de toegang tot de Schelde te blokkeren. Deze strategie maakte deel uit van een groter
  
  historische beweging, de opstand van de bedelaars
reviewed: false
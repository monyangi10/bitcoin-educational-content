question: Каква е стратегията, използвана от холандците, за да сложат край на господството на Антверпен като международен икономически център?
answer: Те блокират достъпа до река Шелда
wrong_answers:
  - Те въвеждат концепцията за времевата стойност на парите
  - Издават собствена валута
  - Те създават първия фондов пазар
explanation: |
  Холандците успяват да сложат край на превъзходството на Антверпен като международен икономически център, като блокират достъпа до река Шелда. Тази стратегия е част от по-голямо историческо движение - бунта на просяците.
reviewed: true
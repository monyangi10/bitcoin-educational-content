question: 네덜란드가 국제 경제 중심지로서 앤트워프의 패권을 끝내기 위해 사용한 전략은 무엇이었나요?
answer: 셸트 강에 대한 접근을 차단했습니다
wrong_answers:
  - 돈의 시간 가치 개념을 도입했습니다
  - 자체 통화를 발행했습니다
  - 그들은 최초의 주식 시장을 만들었습니다
explanation: |
  네덜란드는 앤트워프의 국제 경제 패권을 종식시켰습니다
  
  셸트 강에 대한 접근을 차단함으로써 앤트워프의 국제 경제 중심지로서의 우위를 끝장냈습니다. 이 전략은 더 큰
  
  거지들의 반란'이라는 역사적 운동의 일부였습니다
reviewed: false
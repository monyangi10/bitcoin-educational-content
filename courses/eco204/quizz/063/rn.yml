question: Ni ubuhe buryo Abaholandi bakoresheje kugira ngo bashireho ubukuru bwa Anvers nk’ikibanza c’ubutunzi mpuzamakungu?
answer: Barabujije abantu gushika ku ruzi Scheldt .
wrong_answers:
  - Baciye bazana iciyumviro c'agaciro k'igihe k'amahera .
  - Baciye basohora amafaranga yabo bwite .
  - Bashinze isoko rya mbere ry'ivy'ubutunzi .
explanation: |
  Abaholandi barashoboye guhagarika ubukuru bwa Anvers nk'ubutunzi mpuzamakungu
  
  hagati mu kubuza abantu gushika ku ruzi Scheldt. Iryo tegeko ryari mu mugambi munini kuruta .
  
  umuhari w’akahise, ubugarariji bw’abasabirizi.’
reviewed: false
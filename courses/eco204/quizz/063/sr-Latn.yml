question: Koja je strategija koju su koristili Holanđani da okončaju prevlast Antverpena kao međunarodnog ekonomskog centra?
answer: Blokirali su pristup reci Šelda.
wrong_answers:
  - Uveli su koncept vremenske vrednosti novca
  - Oni su izdali sopstvenu valutu
  - Oni su stvorili prvo tržište akcija
explanation: |
  Holanđani su uspeli da okončaju prevlast Antverpena kao međunarodnog ekonomskog
  
  centra blokiranjem pristupa reci Šeldi. Ova strategija bila je deo šireg
  
  istorijskog pokreta, pobune prosjaka.'
reviewed: false
question: กลยุทธ์ที่ชาวดัตช์ใช้เพื่อยุติความเป็นศูนย์กลางเศรษฐกิจระหว่างประเทศของแอนต์เวิร์ปคืออะไร?
answer: พวกเขาได้ปิดกั้นการเข้าถึงแม่น้ำ Scheldt
wrong_answers:
  - พวกเขาได้แนะนำแนวคิดเรื่องมูลค่าของเงินตามเวลา
  - พวกเขาออกสกุลเงินของตนเอง
  - พวกเขาสร้างตลาดหลักทรัพย์แห่งแรก
explanation: |
  ชาวดัตช์สามารถยุติความเป็นศูนย์กลางเศรษฐกิจระหว่างประเทศของแอนต์เวิร์ปได้โดยการปิดกั้นการเข้าถึงแม่น้ำเชลด์ กลยุทธ์นี้เป็นส่วนหนึ่งของการเคลื่อนไหวทางประวัติศาสตร์ที่ใหญ่กว่า คือ การกบฏของขอทาน
reviewed: true
question: Jaką strategię zastosowali Holendrzy, aby położyć kres dominacji Antwerpii jako międzynarodowego centrum gospodarczego?
answer: Zablokowali dostęp do rzeki Skaldy.
wrong_answers:
  - Wprowadzili koncepcję wartości pieniądza w czasie.
  - Wyemitowali własną walutę.
  - Stworzyli pierwszą giełdę papierów wartościowych.
explanation: |
  Holendrom udało się zakończyć supremację Antwerpii jako międzynarodowego ośrodka gospodarczego poprzez zablokowanie dostępu do rzeki Skaldy. Strategia ta była częścią większego historycznego ruchu tzw. rewolty żebraków.
reviewed: true

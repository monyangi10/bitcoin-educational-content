question: อัตราแลกเปลี่ยนเริ่มต้นของดอลลาร์ซิมบับเวเมื่อถูกนำมาใช้ในปี 1980 คือเท่าใด?
answer: สองดอลลาร์ซิมบับเวมีมูลค่าประมาณ 1.60 ดอลลาร์สหรัฐ
wrong_answers:
  - หนึ่งดอลลาร์ซิมบับเวมีค่าเท่ากับประมาณ 1 ดอลลาร์สหรัฐ
  - หนึ่งดอลลาร์ซิมบับเวมีค่าเท่ากับประมาณ 2 ดอลลาร์สหรัฐ
  - สองดอลลาร์ซิมบับเวมีค่าเท่ากับประมาณ 2 ดอลลาร์สหรัฐ
explanation: |
  ซิมบับเวได้รับเอกราชในปี 1980 และได้แนะนำสกุลเงินของตนเองคือ ดอลลาร์ซิมบับเว
  ในช่วงแรก ดอลลาร์ซิมบับเวสองหน่วยมีมูลค่าประมาณ 1.60 ดอลลาร์สหรัฐ
reviewed: true
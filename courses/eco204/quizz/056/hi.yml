question: ज़िम्बाब्वे डॉलर की शुरुआती Exchange दर 1980 में जब इसे पेश किया गया था, वो क्या थी?
answer: दो ज़िम्बाब्वे डॉलर की कीमत लगभग 1.60 अमेरिकी डॉलर थी।
wrong_answers:
  - एक ज़िम्बाब्वेयन डॉलर लगभग 1 अमेरिकी डॉलर के बराबर था।
  - एक जिम्बाब्वेयन डॉलर की कीमत लगभग 2 अमेरिकी डॉलर थी
  - दो ज़िम्बाब्वे डॉलर की कीमत लगभग 2 अमेरिकी डॉलर थी
explanation: |
  ज़िम्बाब्वे ने 1980 में आज़ादी हासिल की और ज़िम्बाब्वे डॉलर की शुरुआत की।
  शुरुआत में, दो ज़िम्बाब्वे डॉलर की कीमत लगभग 1.60 अमेरिकी डॉलर थी।
reviewed: false
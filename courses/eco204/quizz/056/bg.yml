question: Какъв е първоначалният обменен курс на зимбабвийския долар при въвеждането му през 1980 г.?
answer: Два зимбабвийски долара струваха около 1.60 щатски долара
wrong_answers:
  - Един зимбабвийски долар струваше около 1 щатски долар
  - Един зимбабвийски долар струваше около 2 щатски долара
  - Два зимбабвийски долара струваха около 2 щатски долара
explanation: |
  Зимбабве получава независимост през 1980 г. и въвежда собствена валута - зимбабвийския долар.
  Първоначално два зимбабвийски долара са на стойност около 1.60 щатски долара.
reviewed: true

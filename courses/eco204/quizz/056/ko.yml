question: 1980년 도입 당시 짐바브웨 달러의 초기 Exchange 환율은 얼마였나요?
answer: 짐바브웨 달러 2달러는 미화 약 1.60달러의 가치가 있습니다
wrong_answers:
  - 짐바브웨 1달러는 미국 달러 약 1달러의 가치가 있습니다
  - 짐바브웨 1달러는 미화 약 2달러의 가치가 있습니다
  - 짐바브웨 달러 2달러는 미화 약 2달러의 가치가 있습니다
explanation: |
  짐바브웨는 1980년에 독립하여 짐바브웨 달러를 도입했습니다.
  처음에 짐바브웨 달러 2달러는 약 1.60달러의 가치가 있었습니다.

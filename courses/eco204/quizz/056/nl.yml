question: Wat was de initiële Exchange koers van de Zimbabwaanse dollar toen deze in 1980 werd geïntroduceerd?
answer: Twee Zimbabwaanse dollars waren ongeveer 1,60 US dollar waard
wrong_answers:
  - Eén Zimbabwaanse dollar was ongeveer 1 US dollar waard
  - Eén Zimbabwaanse dollar was ongeveer 2 Amerikaanse dollar waard
  - Twee Zimbabwaanse dollars waren ongeveer 2 Amerikaanse dollars waard
explanation: |
  Zimbabwe werd onafhankelijk in 1980 en introduceerde de Zimbabwaanse dollar.
  Aanvankelijk waren twee Zimbabwaanse dollars ongeveer 1,60 US dollar waard.

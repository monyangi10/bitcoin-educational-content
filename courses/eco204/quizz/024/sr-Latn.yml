question: Uobičajen odgovor vlada na monetarnu ili ekonomsku krizu, kao što je viđeno u slučajevima Zimbabvea i Vajmarske Republike, bio je štampanje velike količine novca.
answer: Primena stroge kontrole nad kretanjem i oblicima kapitala.
wrong_answers:
  - Devalvacija nacionalne valute.
  - Podsticanje stranih investicija.
  - Povećanje kamatnih stopa.
explanation: |
  Kada se neka zemlja suoči sa monetarnom ili ekonomskom krizom, jedan od uobičajenih odgovora vlada je da uvedu strogu kontrolu nad kretanjem i oblicima kapitala. Ovo se često radi u pokušaju da se obuzda panika i povrati poverenje.
reviewed: false
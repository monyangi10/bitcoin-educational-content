question: Ni inyishu iyihe intwaro zari zisanzwe zitanga ku ngorane z’amahera canke z’ubutunzi nk’uko vyabonetse muri Zimbabwe na Repubulika ya Weimar?
answer: Gucungera cane ingendo n’uburyo bw’umutungo kamere.
wrong_answers:
  - Gukuraho agaciro k’amahera y’igihugu.
  - Guhimiriza abanyamahanga gushiramwo amafaranga.
  - Kwongerekana kw’inyungu.
explanation: |
  Iyo igihugu gishikiwe n’ingorane z’amahera canke z’ubutunzi, inyishu imwe rusangi .
  n’intwaro ni ugucungera cane ingendo n’uburyo bw’umutungo kamere.
  Ivyo akenshi bikorwa kugira ngo umuntu agerageze guhagarika ubwoba no kugaruka kwizigira.

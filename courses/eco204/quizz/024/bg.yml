question: Каква е общата реакция на правителствата при парична или икономическа криза, както се вижда от случаите със Зимбабве и Ваймарската република?
answer: Упражняване на строг контрол върху движението и формите на капитала.
wrong_answers:
  - Девалвация на националната валута.
  - Насърчаване на чуждестранните инвестиции.
  - Увеличаване на лихвените проценти.
explanation: |
  Когато дадена страна е изправена пред парична или икономическа криза, една от често срещаните реакции е
  на правителствата е да наложат строг контрол върху движението и формите на капитала.
  Това често се прави в опит да се овладее паниката и да се възстанови доверието.
reviewed: true
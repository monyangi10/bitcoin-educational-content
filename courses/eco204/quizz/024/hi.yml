question: ज़िम्बाब्वे और वीमर रिपब्लिक के मामलों में देखा गया कि आर्थिक या मौद्रिक संकट के जवाब में सरकारों ने अक्सर क्या किया?  

जवाब: सरकारें आमतौर पर पैसे की छपाई बढ़ा देती थीं, जिससे हाइपरइन्फ्लेशन (महंगाई का बेकाबू बढ़ना) हो जाता था।
answer: पूंजी की आवाजाही और रूपों पर सख्त नियंत्रण लगाना।
wrong_answers:
  - राष्ट्रीय मुद्रा का अवमूल्यन करना।
  - विदेशी निवेश को बढ़ावा देना।
  - ब्याज दरें बढ़ाना।
explanation: |
  जब किसी देश को मौद्रिक या आर्थिक संकट का सामना करना पड़ता है, तो एक आम प्रतिक्रिया होती है
  सरकारों का काम है पूंजी की आवाजाही और उसके रूपों पर सख्त नियंत्रण रखना।
  यह अक्सर घबराहट को रोकने और भरोसा बहाल करने के लिए किया जाता है।
reviewed: false
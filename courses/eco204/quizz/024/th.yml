question: การตอบสนองที่พบบ่อยโดยรัฐบาลต่อวิกฤตการณ์ทางการเงินหรือเศรษฐกิจ ซึ่งเห็นได้ในกรณีของซิมบับเวและสาธารณรัฐไวมาร์คือการพิมพ์เงินเพิ่ม
answer: การควบคุมอย่างเข้มงวดต่อการเคลื่อนไหวและรูปแบบของทุน
wrong_answers:
  - การลดค่าเงินสกุลของประเทศ
  - ส่งเสริมการลงทุนจากต่างประเทศ
  - การเพิ่มขึ้นของอัตราดอกเบี้ย
explanation: |
  เมื่อประเทศหนึ่งเผชิญกับวิกฤตทางการเงินหรือเศรษฐกิจ การตอบสนองทั่วไปอย่างหนึ่งของรัฐบาลคือการควบคุมอย่างเข้มงวดต่อการเคลื่อนไหวและรูปแบบของเงินทุน สิ่งนี้มักทำเพื่อพยายามควบคุมความตื่นตระหนกและฟื้นฟูความเชื่อมั่น
reviewed: true
question: 짐바브웨와 바이마르 공화국의 사례에서 볼 수 있듯이 통화 또는 경제 위기에 대한 정부의 일반적인 대응은 무엇이었나요?
answer: 자본의 이동과 형태에 대한 엄격한 통제권을 행사합니다.
wrong_answers:
  - 국가 통화 평가 절하.
  - 외국인 투자 장려.
  - 금리 인상.
explanation: |
  국가가 통화 위기나 경제 위기에 직면했을 때 정부가 취하는 일반적인 대응책 중 하나는
  자본의 이동과 형태를 엄격하게 통제하는 것입니다.
  이는 공황을 억제하고 신뢰를 회복하기 위해 종종 시행됩니다.
reviewed: false
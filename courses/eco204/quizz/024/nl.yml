question: Wat was een gebruikelijke reactie van regeringen op een monetaire of economische crisis, zoals in het geval van Zimbabwe en de Weimarrepubliek?
answer: Strikte controle uitoefenen op het verkeer en de vormen van kapitaal.
wrong_answers:
  - Devaluatie van de nationale munt.
  - Buitenlandse investeringen aanmoedigen.
  - Stijgende rentetarieven.
explanation: |
  Wanneer een land geconfronteerd wordt met een monetaire of economische crisis, is een gebruikelijke reactie
  door regeringen om strenge controle uit te oefenen op de bewegingen en vormen van kapitaal.
  Dit wordt vaak gedaan in een poging om paniek in te dammen en het vertrouwen te herstellen.

question: Zimbabwe ve Weimar Cumhuriyeti örneklerinde görüldüğü gibi, hükümetlerin parasal veya ekonomik krizlere verdikleri ortak tepki neydi?
answer: Sermayenin hareketleri ve biçimleri üzerinde sıkı kontrol uygulamak.
wrong_answers:
  - Ulusal paranın değerinin düşürülmesi.
  - Yabancı yatırımın teşvik edilmesi.
  - Faiz oranlarının artırılması.
explanation: |
  Bir ülke parasal veya ekonomik bir krizle karşı karşıya kaldığında, yaygın bir tepki
  hükümetler tarafından sermayenin hareketleri ve biçimleri üzerinde sıkı bir kontrol uygulamaktır.
  Bu genellikle paniği kontrol altına almak ve güveni yeniden tesis etmek amacıyla yapılır.

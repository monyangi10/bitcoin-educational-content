question: हाइपरइन्फ्लेशन का पैसों की कीमत पर क्या असर होता है?
answer: यह पैसे की कीमत तेज़ी से गिरा देता है।
wrong_answers:
  - यह पैसे की कीमत बढ़ा देता है।
  - इसका पैसे की कीमत पर कोई असर नहीं पड़ता।
  - यह पैसे की कीमत को अप्रत्याशित रूप से घटने-बढ़ने का कारण बनता है।
explanation: |
  हाइपरइन्फ्लेशन के दौर में, पैसा तेजी से अपनी कीमत खो देता है, जिससे...
  लंबे समय की योजना बनाना मुश्किल।

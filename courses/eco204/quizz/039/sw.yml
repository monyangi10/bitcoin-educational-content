question: Je, ni madhara gani ya mfumuko wa bei kwenye thamani ya fedha?
answer: Yanasababisha pesa kupoteza thamani yake haraka.
wrong_answers:
  - Inasababisha pesa kuongezeka kwa thamani.
  - Haina athari kwa thamani ya pesa.
  - Husababisha thamani ya pesa kubadilikabadilika bila kutabirika.
explanation: |
  Katika kipindi cha mfumuko wa bei, pesa hupoteza haraka thamani yake, kutengeneza
  mipango ya muda mrefu ngumu.
reviewed: true

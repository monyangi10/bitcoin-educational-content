question: ผลกระทบของภาวะเงินเฟ้อสูงต่อมูลค่าของเงินคืออะไร?
answer: มันทำให้เงินสูญเสียมูลค่าอย่างรวดเร็ว
wrong_answers:
  - มันทำให้เงินมีมูลค่าเพิ่มขึ้น
  - มันไม่มีผลกระทบต่อมูลค่าของเงิน
  - มันทำให้มูลค่าของเงินผันผวนอย่างไม่สามารถคาดเดาได้
explanation: |
  ในช่วงภาวะเงินเฟ้อสูง เงินจะสูญเสียมูลค่าอย่างรวดเร็ว ทำให้การวางแผนระยะยาวเป็นเรื่องยาก
reviewed: true
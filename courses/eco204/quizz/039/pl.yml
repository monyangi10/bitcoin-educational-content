  - Nie ma to wpływu na wartość pieniądza.
  - Powoduje to nieprzewidywalne wahania wartości pieniądza.
explanation: |
  W okresie hiperinflacji pieniądze szybko tracą na wartości, co utrudnia długoterminowe planowanie

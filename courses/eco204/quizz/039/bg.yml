question: Какво е въздействието на хиперинфлацията върху стойността на парите?
answer: Тя води до бърза загуба на стойността на парите.
wrong_answers:
  - Тя води до увеличаване на стойността на парите.
  - Тя не оказва влияние върху стойността на парите.
  - Това води до непредсказуеми колебания в стойността на парите.
explanation: |
  В период на хиперинфлация парите бързо губят стойността си, което
  затруднява дългосрочното планиране.
reviewed: true
question: एक "ज़ोंबी कंपनी" क्या होती है?
answer: एक कंपनी जो सामान्य बाजार स्थितियों में दिवालिया या दिवालियापन के करीब होगी, लेकिन मुख्य रूप से सस्ते कर्ज़ के जरिए काम करती रहती है।
wrong_answers:
  - एक कंपनी जो 100 साल से भी ज़्यादा समय से कारोबार में है।
  - एक कंपनी जो टेक्नोलॉजी सेक्टर में काम करती है।
  - सरकार द्वारा बचाई गई कंपनी।
explanation: |
  एक ज़ोंबी कंपनी वह कंपनी होती है जो सामान्य बाजार हालात में,
  दिवालिया होना या दिवालियापन के कगार पर होना, लेकिन मुख्य रूप से कम लागत से काम चलाना
  कर्ज़ लेना। ये कंपनियाँ सिर्फ इतना पैसा कमाती हैं कि अपने कर्ज़ चुका सकें, लेकिन उनसे ज़्यादा कमाने में असमर्थ होती हैं।
  काफी बढ़ना।

question: Какво е "зомби компания"?
answer: Дружество, което при нормални пазарни условия би било неплатежоспособно или близо до фалит, но продължава да функционира главно чрез евтини заеми.
wrong_answers:
  - Фирма, която развива дейност от над 100 години.
  - Компания, която работи в технологичния сектор.
  - Компания, която е била спасена от правителството.
explanation: |
  "Зомби компания" е компания, която при нормални пазарни условия би
  е неплатежоспособно или близо до фалит, но продължава да функционира главно чрез евтини
  заеми. Тези дружества печелят достатъчно пари, за да покрият дълговете си, но не са в състояние
  да се развиват значително.
reviewed: true
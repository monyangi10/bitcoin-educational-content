question: บริษัทซอมบี้คืออะไร?
answer: บริษัทที่ภายใต้สภาวะตลาดปกติจะไม่สามารถชำระหนี้ได้หรือใกล้จะล้มละลาย แต่ยังคงดำเนินการต่อไปโดยอาศัยการกู้ยืมที่มีต้นทุนต่ำเป็นหลัก
wrong_answers:
  - บริษัทที่ดำเนินธุรกิจมานานกว่า 100 ปี
  - บริษัทที่ดำเนินงานในภาคเทคโนโลยี
  - บริษัทที่ได้รับการช่วยเหลือทางการเงินจากรัฐบาล
explanation: |
  บริษัทซอมบี้คือบริษัทที่ภายใต้สภาวะตลาดปกติจะล้มละลายหรือใกล้ล้มละลาย แต่ยังคงดำเนินการต่อไปได้โดยอาศัยการกู้ยืมที่มีต้นทุนต่ำเป็นหลัก บริษัทเหล่านี้มีรายได้เพียงพอที่จะครอบคลุมหนี้สินของตน แต่ไม่สามารถเติบโตได้อย่างมีนัยสำคัญ
reviewed: true
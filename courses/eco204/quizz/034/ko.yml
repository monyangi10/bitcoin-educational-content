question: 좀비 기업이란 무엇인가요?
answer: 정상적인 시장 상황에서는 파산 또는 파산에 가까울 수 있지만 주로 저비용 차입을 통해 계속 운영되는 기업입니다.
wrong_answers:
  - 100년이 넘는 역사를 가진 기업.
  - 기술 분야에서 활동하는 회사.
  - 정부로부터 구제 금융을 받은 회사.
explanation: |
  좀비 기업이란 정상적인 시장 상황에서는 파산하거나 파산에 가까워졌지만
  파산했거나 파산에 가까워졌지만 주로 저비용 차입을 통해
  차입을 통해 계속 운영됩니다. 이러한 기업은 부채를 감당할 수 있을 만큼만 수익을 올리지만, 크게 성장하지 못합니다
  크게 성장할 수 없습니다.

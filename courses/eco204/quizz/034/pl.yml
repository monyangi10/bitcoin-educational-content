question: Czym jest firma zombie?
answer: Spółka, która w normalnych warunkach rynkowych byłaby niewypłacalna lub bliska bankructwa, ale kontynuuje działalność głównie dzięki tanim pożyczkom.
wrong_answers:
  - Firma, która działa na rynku od ponad 100 lat.
  - Firma działająca w sektorze technologicznym.
  - Firma, która została dofinansowana przez rząd.
explanation: |
  Spółka zombie to spółka, która w normalnych warunkach rynkowych byłaby niewypłacalna lub bliska bankructwa
  niewypłacalna lub bliska bankructwa, ale kontynuuje działalność głównie dzięki tanim pożyczkom
  tanich pożyczek. Firmy te zarabiają wystarczająco dużo pieniędzy, aby pokryć swoje długi, ale nie są w stanie
  znacząco się rozwijać.
reviewed: false
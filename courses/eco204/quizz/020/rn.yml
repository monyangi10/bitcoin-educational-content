question: Ni nde yatanze insobanuro yemewe cane y’ugutera imbere kw’ibiciro?
answer: Filipo Cagan
wrong_answers:
  - Bernholz
  - Dawidi
  - Hanke-Krus
explanation: |
  Insobanuro yemewe cane y’ugutera imbere kw’ibiciro cane ikomoka kuri Philip Cagan,
  uwo yasavye ko umuntu yotahura ivy’ugutera imbere kw’ibiciro mu buryo bw’ingero mu gitabu ciwe co mu 1956 citwa The .
  Ivy’Amahera vy’Iterambere ry’Ibiciro.
reviewed: false
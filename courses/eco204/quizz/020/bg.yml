question: Кой предлага най-признатото определение за хиперинфлация?
answer: Филип Кейгън
wrong_answers:
  - Бернхолц
  - Дейвид
  - Ханке-Круз
explanation: |
  Най-признатото определение за хиперинфлация е на Филип Кейгън,
  който предлага количествено разбиране за хиперинфлацията в своя труд от 1956 г. "The
  Парична динамика на хиперинфлацията.
reviewed: true

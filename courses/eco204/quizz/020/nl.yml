question: Wie stelde de meest erkende definitie van hyperinflatie voor?
answer: Philip Cagan
wrong_answers:
  - Bernholz
  - David
  - Hanke-Krus
explanation: |
  De meest erkende definitie van hyperinflatie komt van Philip Cagan,
  die een kwantitatief begrip van hyperinflatie voorstelde in zijn werk uit 1956, The
  Monetaire dynamiek van hyperinflatie.
reviewed: false
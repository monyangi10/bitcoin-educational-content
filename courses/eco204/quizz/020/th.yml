question: ใครเป็นผู้เสนอคำจำกัดความของภาวะเงินเฟ้อสูงที่ได้รับการยอมรับมากที่สุด?
answer: ฟิลิป คาแกน
wrong_answers:
  - เบิร์นโฮลซ์
  - เดวิด
  - Hanke-Krus
explanation: |
  คำจำกัดความของภาวะเงินเฟ้อรุนแรงที่ได้รับการยอมรับมากที่สุดมาจาก Philip Cagan ซึ่งเสนอความเข้าใจเชิงปริมาณของภาวะเงินเฟ้อรุนแรงในผลงานของเขาในปี 1956 เรื่อง The Monetary Dynamics of Hyperinflation.
reviewed: true
question: Kto zaproponował najbardziej rozpoznawalną definicję hiperinflacji?
answer: Philip Cagan
wrong_answers:
  - Bernholz
  - David
  - Hanke-Krus
explanation: |
  Najbardziej znana definicja hiperinflacji pochodzi od Philipa Cagana,
  który zaproponował ilościowe rozumienie hiperinflacji w swojej pracy z 1956 r. pt
  Monetary Dynamics of Hyperinflation.

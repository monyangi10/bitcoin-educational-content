question: Ko je predložio najpriznatiju definiciju hiperinflacije?
answer: Philip Cagan
wrong_answers:
  - Bernholz
  - David
  - Hanke-Krus
explanation: |
  Najpriznatija definicija hiperinflacije dolazi od Filipa Kagana, koji je predložio kvantitativno razumevanje hiperinflacije u svom delu iz 1956. godine, Monetarna dinamika hiperinflacije.

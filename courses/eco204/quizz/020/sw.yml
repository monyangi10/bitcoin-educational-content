question: Nani alipendekeza ufafanuzi unaotambulika zaidi wa mfumuko wa bei?
answer: Philip Cagan
wrong_answers:
  - Bernholz
  - Daudi
  - Hanke-Krus
explanation: |
  Ufafanuzi unaotambulika zaidi wa mfumuko wa bei unatoka kwa Philip Cagan,
  ambaye alipendekeza uelewa wa kiasi cha mfumuko wa bei katika kazi yake ya 1956, The
  Mienendo ya Fedha ya Mfumuko wa bei.
reviewed: true

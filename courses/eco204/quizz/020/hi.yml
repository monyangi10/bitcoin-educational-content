question: हाइपरइन्फ्लेशन की सबसे मान्यता प्राप्त परिभाषा किसने दी थी?
answer: फिलिप कैगन
wrong_answers:
  - बर्नहोल्ज़
  - डेविड
  - हैंके-क्रुस
explanation: |
  हाइपरइन्फ्लेशन की सबसे मान्य परिभाषा फिलिप केगन ने दी है,
  किसने 1956 में अपने काम "द मॉनेटरी डायनैमिक्स ऑफ हाइपरइन्फ्लेशन" में हाइपरइन्फ्लेशन की मात्रात्मक समझ प्रस्तावित की थी?
  हाइपरइन्फ्लेशन का मौद्रिक गतिशीलता।
reviewed: false
question: What is the main focus of Cagan's work, The Monetary Dynamics of Hyperinflation?
answer: ความเข้าใจเชิงปริมาณเกี่ยวกับภาวะเงินเฟ้อขั้นสูง
wrong_answers:
  - ความเข้าใจเชิงคุณภาพเกี่ยวกับภาวะเงินเฟ้อขั้นสูง
  - การวิเคราะห์ทางประวัติศาสตร์ของภาวะเงินเฟ้อขั้นสูง
  - แบบจำลองทางทฤษฎีของภาวะเงินเฟ้อขั้นสูง
explanation: |
  ในงานของเขา The Monetary Dynamics of Hyperinflation, Philip Cagan เสนอความเข้าใจเชิงปริมาณของภาวะเงินเฟ้อรุนแรง
reviewed: true
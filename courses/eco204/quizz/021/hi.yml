question: कागन के काम, "द मॉनेटरी डायनैमिक्स ऑफ हाइपरइन्फ्लेशन" का मुख्य फोकस क्या है?
answer: हाइपरइन्फ्लेशन की मात्रात्मक समझ
wrong_answers:
  - हाइपरइन्फ्लेशन की गुणात्मक समझ
  - हाइपरइन्फ्लेशन का ऐतिहासिक विश्लेषण
  - हाइपरइन्फ्लेशन का एक सैद्धांतिक मॉडल
explanation: |
  फिलिप केगन ने अपने काम, **"हाइपरइन्फ्लेशन की मौद्रिक गतिशीलता"** में...
  हाइपरइन्फ्लेशन की मात्रात्मक समझ का प्रस्ताव करता है।
reviewed: false
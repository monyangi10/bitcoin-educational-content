question: Ni igiki nyamukuru gishimikiyeko igitabu ca Cagan citwa Ivyiyumviro vy’amahera bitera ugutera imbere kw’ibiciro?
answer: Gutahura ivy'ingero vy'ugutera imbere kw'ibiciro
wrong_answers:
  - Gutahura neza ivy'ugutera imbere kw'ibiciro
  - Isesengura ry'amateka y'ugutera imbere kw'ibiciro
  - Icitegererezo c'ugutera imbere kw'ibiciro
explanation: |
  Mu gitabu ciwe, Philip Cagan .
  itanga ugutahura kw’ingero kw’ugutera imbere cane kw’ibiciro.

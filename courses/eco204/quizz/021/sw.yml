question: Je, lengo kuu la kazi ya Cagan, The Monetary Dynamics of Hyperinflation?
answer: Uelewa wa kiasi cha mfumuko wa bei
wrong_answers:
  - Uelewa wa ubora wa mfumuko wa bei
  - Uchambuzi wa kihistoria wa mfumuko wa bei
  - Mfano wa kinadharia wa mfumuko wa bei
explanation: |
  Katika kazi yake, The Monetary Dynamics of Hyperinflation, Philip Cagan
  inapendekeza uelewa wa kiasi cha mfumuko wa bei.
reviewed: true

question: Waar richt het werk van Cagan, The Monetary Dynamics of Hyperinflation, zich op?
answer: Een kwantitatief begrip van hyperinflatie
wrong_answers:
  - Een kwalitatief begrip van hyperinflatie
  - Een historische analyse van hyperinflatie
  - Een theoretisch model van hyperinflatie
explanation: |
  In zijn werk The Monetary Dynamics of Hyperinflation stelt Philip Cagan
  een kwantitatief begrip van hyperinflatie.

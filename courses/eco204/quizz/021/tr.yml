question: Cagan'ın The Monetary Dynamics of Hyperinflation adlı çalışmasının ana odak noktası nedir?
answer: Hiperenflasyonun niceliksel olarak anlaşılması
wrong_answers:
  - Hiperenflasyona ilişkin niteliksel bir anlayış
  - Hiperenflasyonun tarihsel analizi
  - Hiperenflasyonun teorik bir modeli
explanation: |
  Philip Cagan, The Monetary Dynamics of Hyperinflation adlı çalışmasında
  hiperenflasyonun niceliksel olarak anlaşılmasını önermektedir.

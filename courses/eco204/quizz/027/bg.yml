question: Какъв е общият метод, използван от правителствата, за да поддържат привидната нормалност по време на икономически срив?
answer: Принуждаване на търговците да държат магазините си отворени.
wrong_answers:
  - Насърчаване на чуждестранните инвестиции.
  - Намаляване на данъците.
  - Увеличаване на публичните разходи.
explanation: |
  Когато икономиката се срине и валутата изгуби стойността си, правителствата
  може да прибегне до драстични мерки, за да запази впечатлението за нормалност. Една от тези мерки
  е принуждаването на търговците да държат магазините си отворени.
reviewed: true
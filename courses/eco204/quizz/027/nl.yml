question: Wat was een veelgebruikte methode van regeringen om de schijn van normaliteit op te houden tijdens een economische ineenstorting?
answer: Kooplui dwingen hun winkels open te houden.
wrong_answers:
  - Buitenlandse investeringen aanmoedigen.
  - Belastingen verlagen.
  - De overheidsuitgaven verhogen.
explanation: |
  Wanneer de economie instort en de munteenheid zijn waarde verliest, kunnen overheden
  kunnen regeringen hun toevlucht nemen tot drastische maatregelen om de schijn van normaliteit op te houden. Eén zo'n maatregel
  is handelaren dwingen hun winkels open te houden.
reviewed: false
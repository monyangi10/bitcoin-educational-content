question: सरकारें आर्थिक मंदी के दौरान भी "सब ठीक है" का नाटक करने के लिए क्या करती थीं?  

जवाब:  
कागज़ी करेंसी छापना! पैसे की कीमत गिरने लगे, तो सरकारें ज्यादा नोट छापकर लोगों को भरमाने की कोशिश करती थीं। असल में तो ये बस एक पटाखा होता था - थोड़ी देर तेज आवाज़, फिर... धमाका! महँगाई आसमान छूने लगती थी, पर तब तक सरकार अपनी "हम सब संभाल लेंगे" वाली इमेज बना चुकी होती थी।
answer: दुकानदारों को उनकी दुकानें खुली रखने के लिए मजबूर करना।
wrong_answers:
  - विदेशी निवेश को प्रोत्साहित करना।
  - टैक्स कम करना।
  - सार्वजनिक खर्च बढ़ाना।
explanation: |
  जब अर्थव्यवस्था धराशायी हो जाती है और मुद्रा की कीमत गिर जाती है, तो सरकारें...
  ऐसी स्थिति में लोग सामान्य दिखने के लिए कड़े कदम उठा सकते हैं। एक ऐसा ही कदम
  दुकानदारों को अपनी दुकानें खुली रखने के लिए मजबूर कर रहा है।
reviewed: false
question: วิธีการทั่วไปที่รัฐบาลใช้เพื่อรักษาภาพลักษณ์ของความปกติในช่วงวิกฤตเศรษฐกิจคืออะไร?
answer: บังคับให้พ่อค้าเปิดร้านของพวกเขา
wrong_answers:
  - ส่งเสริมการลงทุนจากต่างประเทศ
  - การลดภาษี
  - การเพิ่มการใช้จ่ายภาครัฐ
explanation: |
  เมื่อเศรษฐกิจล่มสลายและค่าเงินสูญเสียมูลค่า รัฐบาลอาจใช้มาตรการที่รุนแรงเพื่อรักษาภาพลักษณ์ของความปกติ หนึ่งในมาตรการเหล่านั้นคือการบังคับให้พ่อค้าเปิดร้านค้าของตน
reviewed: true
question: Wat is de onderliggende oorzaak van hyperinflatie die redenominatie niet Address?
answer: De uitbreiding van het geld Supply.
wrong_answers:
  - De afname van het geld Supply.
  - De toename van de vraag naar goederen en diensten.
  - De afname van de vraag naar goederen en diensten.
explanation: |
  De hoofdoorzaak van hyperinflatie is de uitbreiding van het geld Supply.
  
  Redenominatie is een gebruikelijke maatregel van regeringen tijdens inflatieperiodes,
  
  maar het lost het onderliggende probleem niet op. Het is slechts een manier om de munt een andere naam te geven
  
  en nullen te verwijderen

question: 리디노미네이션이 Address이 되지 않는 하이퍼인플레이션의 근본적인 원인은 무엇인가요?
answer: 돈의 확장 Supply.
wrong_answers:
  - 돈의 감소 Supply.
  - 상품과 서비스에 대한 수요 증가.
  - 상품과 서비스에 대한 수요 감소.
explanation: |
  하이퍼인플레이션의 근본 원인은 화폐 Supply의 팽창입니다.
  
  리디노미네이션은 인플레이션 기간 동안 정부가 취하는 일반적인 조치입니다,
  
  하지만 이 근본적인 문제를 해결하지는 못합니다. 화폐의 이름을 바꾸는 방법일 뿐입니다
  
  0을 제거하는 방법일 뿐입니다
reviewed: false
question: हाइपरइन्फ्लेशन की असली वजह क्या है जिसे रेडिनोमिनेशन Address नहीं कर पाता?
answer: पैसे का विस्तार Supply.
wrong_answers:
  - Supply का पैसा कम हो गया।
  - माल और सेवाओं की मांग में वृद्धि।
  - माल और सेवाओं की मांग में कमी।
explanation: |
  हाइपरइन्फ्लेशन की असली वजह है पैसे की मात्रा में बढ़ोतरी Supply।
  रीडिनॉमिनेशन (मुद्रा का पुनर्मूल्यांकन) मुद्रास्फीति के दौरान सरकारों द्वारा उठाया जाने वाला एक आम कदम है।
  लेकिन यह मूल समस्या का हल नहीं करता। यह सिर्फ मुद्रा का नाम बदलने का एक तरीका है।
  और शून्य हटा दो।'
reviewed: false
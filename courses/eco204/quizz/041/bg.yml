question: Каква е основната причина за хиперинфлацията, която реденоминацията не отстранява?
answer: Разширяване на паричното предлагане.
wrong_answers:
  - Намаляването на паричното предлагане.
  - Увеличаване на търсенето на стоки и услуги.
  - Намаляване на търсенето на стоки и услуги.
explanation: |
  Основната причина за хиперинфлацията е увеличаването на паричното предлагане. Реденоминацията е обичайна мярка, предприемана от правителствата в периоди на инфлация, но тя не решава този основен проблем. То е само начин да се преименува валутата и да се премахнат нулите.
reviewed: true
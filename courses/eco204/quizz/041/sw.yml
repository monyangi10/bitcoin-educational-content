  - Kuongezeka kwa mahitaji ya bidhaa na huduma.
  - Kupungua kwa mahitaji ya bidhaa na huduma.
explanation: |
  Chanzo kuu cha mfumuko wa bei ni upanuzi wa fedha za Supply.
  Kuunda upya ni hatua ya kawaida inayochukuliwa na serikali wakati wa mfumuko wa bei,
  lakini haisuluhishi tatizo hili la msingi. Ni njia pekee ya kubadilisha jina la sarafu

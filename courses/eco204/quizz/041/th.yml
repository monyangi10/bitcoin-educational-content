question: สาเหตุพื้นฐานของภาวะเงินเฟ้อรุนแรงที่การเปลี่ยนหน่วยเงินตราไม่ได้แก้ไขคืออะไร?
answer: การขยายตัวของปริมาณเงิน
wrong_answers:
  - การลดลงของปริมาณเงิน
  - การเพิ่มขึ้นของความต้องการสินค้าและบริการ
  - การลดลงของความต้องการสินค้าและบริการ
explanation: |
  สาเหตุหลักของภาวะเงินเฟ้อสูงคือการขยายตัวของปริมาณเงิน การเปลี่ยนหน่วยเงินเป็นมาตรการที่รัฐบาลมักใช้ในช่วงที่เกิดภาวะเงินเฟ้อ แต่ไม่ได้แก้ปัญหาพื้นฐานนี้ เป็นเพียงวิธีการเปลี่ยนชื่อสกุลเงินและลบเลขศูนย์ออกเท่านั้น
reviewed: true
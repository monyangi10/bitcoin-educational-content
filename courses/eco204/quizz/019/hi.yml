question: हैंके-क्रूस टेबल में हाइपरइन्फ्लेशन के कितने एपिसोड दर्ज हैं?
answer: 56 (छप्पन)
wrong_answers:
  - 46
  - 66
  - 76
explanation: |
  हैंके-क्रुस टेबल में हाइपरइन्फ्लेशन के 56 मामले दर्ज हैं। हालांकि,
  यह सभी एपिसोड्स को कवर नहीं करता, जैसे कि 2016 में वेनेज़ुएला में हुआ वाला, जिसमें लाया गया
  कुल 57 हुआ।
reviewed: false
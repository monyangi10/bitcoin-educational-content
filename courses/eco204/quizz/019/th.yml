question: มีตอนของภาวะเงินเฟ้อรุนแรงกี่ตอนที่ถูกบันทึกในตาราง Hanke-Krus?
answer: 56
wrong_answers:
  - 46
  - 66
  - 76
explanation: |
  ตาราง Hanke-Krus บันทึกเหตุการณ์ภาวะเงินเฟ้อรุนแรง 56 ครั้ง อย่างไรก็ตาม มันไม่ได้ครอบคลุมทุกเหตุการณ์ เช่น เหตุการณ์ในเวเนซุเอลาในปี 2016 ทำให้ยอดรวมเป็น 57 ครั้ง
reviewed: true
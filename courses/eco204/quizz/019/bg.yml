question: Колко епизода на хиперинфлация са документирани в таблицата на Ханке-Крус?
answer: 56
wrong_answers:
  - 46
  - 66
  - 76
explanation: |
  Таблицата на Ханке-Крус документира 56 епизода на хиперинфлация. Въпреки това,
  тя не обхваща всички епизоди, като този във Венецуела през 2016 г., който доведе до
  общо 57.
reviewed: true
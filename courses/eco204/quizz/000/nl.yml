question: Wat is de intrinsieke relatie tussen monetaire expansie en inflatie volgens Milton Friedman?
answer: Inflatie is altijd en overal een monetair verschijnsel.
wrong_answers:
  - Inflatie is altijd en overal een fiscaal fenomeen.
  - Inflatie is altijd en overal een politiek fenomeen.
  - Inflatie is altijd en overal een sociaal fenomeen.
explanation: |
  Milton Friedman, een bekende econoom, heeft beroemd verklaard dat inflatie
  altijd en overal een monetair fenomeen is. Deze uitspraak benadrukt de intrinsieke
  relatie tussen monetaire expansie en inflatie.

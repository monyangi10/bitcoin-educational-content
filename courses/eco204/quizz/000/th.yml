question: ความสัมพันธ์ภายในระหว่างการขยายตัวของเงินและเงินเฟ้อ ตามที่มิลตัน ฟรีดแมนกล่าวคืออะไร?
answer: อัตราเงินเฟ้อเป็นปรากฏการณ์ทางการเงินเสมอและทุกที่
wrong_answers:
  - อัตราเงินเฟ้อเป็นปรากฏการณ์ทางการคลังเสมอและทุกที่
  - อัตราเงินเฟ้อเป็นปรากฏการณ์ทางการเมืองเสมอและทุกที่
  - อัตราเงินเฟ้อเป็นปรากฏการณ์ทางสังคมเสมอและทุกที่
explanation: |
  มิลตัน ฟรีดแมน นักเศรษฐศาสตร์ชื่อดัง ได้กล่าวไว้อย่างมีชื่อเสียงว่า เงินเฟ้อเป็นปรากฏการณ์ทางการเงินเสมอและทุกที่ คำกล่าวนี้เน้นถึงความสัมพันธ์ที่แท้จริงระหว่างการขยายตัวทางการเงินและเงินเฟ้อ
reviewed: true
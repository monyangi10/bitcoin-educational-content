question: मिल्टन फ्राइडमैन के अनुसार, मुद्रा विस्तार (मोनेटरी एक्सपेंशन) और मुद्रास्फीति (इन्फ्लेशन) के बीच क्या आंतरिक संबंध है?  

फ्राइडमैन का मानना था कि **"मुद्रास्फीति हमेशा और हर जगह एक मौद्रिक घटना है"**। उनके अनुसार, जब किसी अर्थव्यवस्था में पैसे की आपूर्ति (मनी सप्लाई) बढ़ती है, लेकिन वस्तुओं और सेवाओं की उत्पादन दर (प्रोडक्शन) उसी गति से नहीं बढ़ती, तो कीमतें बढ़ने लगती हैं। यानी, **अत्यधिक मुद्रा विस्तार** ही मुद्रास्फीति का मूल कारण होता है।  

उन्होंने इसे सरल शब्दों में समझाया:  
> *"ज्यादा पैसा, कम सामान = कीमतें ऊपर!"*  

इसलिए, फ्राइडमैन सरकारों और केंद्रीय बैंकों को सलाह देते थे कि वे मुद्रा आपूर्ति को नियंत्रित रखें, नहीं तो महंगाई बेकाबू हो सकती है।
answer: महँगाई हमेशा और हर जगह पैसों से जुड़ी बात है।
wrong_answers:
  - महंगाई हमेशा और हर जगह एक सरकारी खर्च का मामला होता है।
  - महँगाई हमेशा और हर जगह एक राजनीतिक मामला है।
  - महँगाई हमेशा और हर जगह एक सामाजिक घटना है।
explanation: |

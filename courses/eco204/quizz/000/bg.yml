question: Каква е вътрешната връзка между паричната експанзия и инфлацията, както твърди Милтън Фридман?
answer: Инфлацията винаги и навсякъде е парично явление.
wrong_answers:
  - Инфлацията винаги и навсякъде е фискално явление.
  - Инфлацията винаги и навсякъде е политически феномен.
  - Инфлацията винаги и навсякъде е социално явление.
explanation: |
  Известният икономист Милтън Фридман заяви, че инфлацията
  винаги и навсякъде е парично явление. Това твърдение подчертава присъщата
  връзката между паричната експанзия и инфлацията.
reviewed: true
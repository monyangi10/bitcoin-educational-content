question: 밀턴 프리드먼이 말한 통화 팽창과 인플레이션의 본질적인 관계는 무엇인가요?
answer: 인플레이션은 언제 어디서나 일어나는 금전적 현상입니다.
wrong_answers:
  - 인플레이션은 언제 어디서나 발생하는 재정 현상입니다.
  - 인플레이션은 언제 어디서나 정치적 현상입니다.
  - 인플레이션은 언제 어디서나 발생하는 사회적 현상입니다.
explanation: |
  저명한 경제학자 밀턴 프리드먼은 다음과 같은 유명한 말을 남겼습니다
  은 언제 어디서나 일어나는 화폐 현상입니다. 이 말은 통화 팽창과 인플레이션의 본질적인
  통화 팽창과 인플레이션 사이의 관계를 강조합니다.
reviewed: false
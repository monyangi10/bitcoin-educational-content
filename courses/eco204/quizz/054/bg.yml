question: Какъв е официалният праг, при който една държава се счита за хиперинфлационна?
answer: 50% на месец
wrong_answers:
  - 10% на месец
  - 25% на месец
  - 75% на месец
explanation: |
  През 2007 г. инфлацията в Зимбабве достигна прага от 50 % на месец,
  и официално беше обявена за хиперинфлация.
reviewed: true
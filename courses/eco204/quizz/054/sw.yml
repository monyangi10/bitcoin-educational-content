question: Je, ni kizingiti kipi rasmi cha nchi kuzingatiwa katika mfumuko wa bei?
answer: 50% kwa mwezi
wrong_answers:
  - 10% kwa mwezi
  - 25% kwa mwezi
  - 75% kwa mwezi
explanation: |
  Mwaka 2007, mfumuko wa bei wa Zimbabwe ulifikia kiwango cha 50% kwa mwezi,
  kuashiria nchi kuwa katika mfumuko wa bei.
reviewed: true

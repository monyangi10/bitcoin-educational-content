question: हाइपरइन्फ्लेशन के लिए किसी देश को आधिकारिक तौर पर क्या थ्रेशोल्ड माना जाता है?
answer: 50% प्रति महीना
wrong_answers:
  - 10% प्रति महीना
  - 25% प्रति महीना
  - 75% प्रति महीना
explanation: |
  2007 में, ज़िम्बाब्वे की महंगाई दर हर महीने 50% के स्तर तक पहुँच गई थी,
  देश को आधिकारिक तौर पर हाइपरइन्फ्लेशन (महंगाई की चरम स्थिति) में घोषित कर दिया गया।
reviewed: false
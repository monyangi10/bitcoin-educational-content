question: เกณฑ์อย่างเป็นทางการสำหรับประเทศที่จะถือว่าอยู่ในภาวะเงินเฟ้อสูงคืออะไร?
answer: 50% ต่อเดือน
wrong_answers:
  - 10% ต่อเดือน
  - 25% ต่อเดือน
  - 75% ต่อเดือน
explanation: |
  ในปี 2007 อัตราเงินเฟ้อของซิมบับเวพุ่งถึงระดับ 50% ต่อเดือน ซึ่งเป็นการประกาศอย่างเป็นทางการว่าประเทศกำลังเผชิญกับภาวะเงินเฟ้อรุนแรง
reviewed: true
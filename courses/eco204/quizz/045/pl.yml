question: Jaka była waluta Peru przed XIX wiekiem?
answer: Hiszpańskie złoto.
wrong_answers:
  - Dolar peruwiański.
  - Peruwiańska rzeczywistość.
  - The soldi oro.
explanation: |
  Peru używało hiszpańskiego złota aż do XIX wieku. Dolar peruwiański był
  
  w użyciu od 1822 do 1863 roku"

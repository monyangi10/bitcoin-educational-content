question: Je! ni sarafu gani ya Peru kabla ya karne ya 19?
answer: dhahabu ya Kihispania.
wrong_answers:
  - Dola ya Peru.
  - Ukweli wa Peru.
  - Oro ya askari.
explanation: |
  Peru ilitumia dhahabu ya Uhispania hadi karne ya 19. Dola ya Peru ilikuwa
  ikitumika kuanzia 1822 hadi 1863.'
reviewed: true

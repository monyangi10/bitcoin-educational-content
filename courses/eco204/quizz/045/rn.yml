question: Imbere y’ikinjana ca 19, amahera yo muri Peru yari ayahe?
answer: Inzahabu y’Igisupanyoli.
wrong_answers:
  - Idolari ry’i Peru.
  - Ivy’ukuri vy’i Peru.
  - Abasirikare oro.
explanation: |
  Peru yarakoresheje inzahabu y’i Esupanye gushika mu kinjana ca 19. Idolari ry’Uburundi ryari 100.000.
  
  ryakoreshejwe kuva mu 1822 gushika mu 1863.’

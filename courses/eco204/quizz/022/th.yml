question: ลักษณะสำคัญของภาวะเงินเฟ้อรุนแรงตามคำจำกัดความของ Cagan คืออะไร?
answer: อัตราเงินเฟ้อรายเดือนที่สูงมาก
wrong_answers:
  - อัตราเงินเฟ้อประจำปีที่สูงมาก
  - อัตราเงินเฟ้อรายสัปดาห์ที่สูงมาก
  - อัตราเงินเฟ้อรายวันที่สูงมาก
explanation: |
  ตามคำจำกัดความของ Cagan ภาวะเงินเฟ้อรุนแรงมีลักษณะเฉพาะด้วยอัตราเงินเฟ้อรายเดือนที่สูงมากเกินกว่า 50%
reviewed: true
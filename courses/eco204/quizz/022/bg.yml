question: Каква е основната характеристика на хиперинфлацията според определението на Каган?
answer: Изключително висок месечен процент на инфлация
wrong_answers:
  - Изключително висок годишен темп на инфлация
  - Изключително висок седмичен процент на инфлация
  - Изключително висок дневен процент на инфлация
explanation: |
  Според определението на Каган хиперинфлацията се характеризира с
  изключително висок месечен темп на инфлация, който надхвърля 50%.
reviewed: true
question: कैगन की परिभाषा के अनुसार हाइपरइन्फ्लेशन की मुख्य विशेषता क्या है?
answer: बेहद ऊंची मासिक महंगाई दर
wrong_answers:
  - बेहद ऊँची सालाना मुद्रास्फीति दर
  - बेहद ऊंची साप्ताहिक महंगाई दर
  - बेहद ऊंची रोज़ाना मुद्रास्फीति दर
explanation: |
  कैगन की परिभाषा के अनुसार, हाइपरइन्फ्लेशन की पहचान एक महीने में
  बेहद ऊंची मासिक महंगाई दर जो 50% से भी ज्यादा है।
reviewed: false
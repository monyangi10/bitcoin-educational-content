question: Jaki jest kluczowy czynnik sukcesu lub porażki reformy monetarnej według Bernholza?
answer: Zaufanie, jakim reformę darzy społeczeństwo.
wrong_answers:
  - Ilość pieniędzy w obiegu.
  - Wartość waluty.
  - Polityka gospodarcza rządu.
explanation: |
  Bernholz sugeruje, że sukces reformy monetarnej zależy nie tylko
  od jej technicznego znaczenia, ale także od zaufania, jakie pokłada w niej społeczeństwo.
  Percepcja i zaufanie społeczne są zatem kluczowymi czynnikami sukcesu lub porażki reformy monetarnej.
reviewed: true

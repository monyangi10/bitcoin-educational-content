question: Jaki jest kluczowy czynnik sukcesu lub porażki reformy monetarnej według Bernolda?
answer: Zaufanie, jakim darzą ją mieszkańcy
wrong_answers:
  - Ilość pieniędzy w obiegu
  - Wartość waluty
  - Polityka gospodarcza rządu
explanation: |
  Bernold sugeruje, że sukces reformy monetarnej zależy nie tylko
  od jej technicznego znaczenia, ale także od zaufania, jakie pokłada w niej społeczeństwo.
  Percepcja i zaufanie społeczne są zatem kluczowymi czynnikami Elements dla sukcesu lub porażki reformy
  reformy monetarnej.

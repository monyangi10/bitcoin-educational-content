question: बर्नोल्ड के अनुसार, मौद्रिक सुधार की सफलता या विफलता का एक प्रमुख कारक क्या है?
answer: जनता का उस पर भरोसा
wrong_answers:
  - पैसे की मात्रा जो चलन में है
  - मुद्रा का मूल्य
  - सरकार की आर्थिक नीतियाँ
explanation: |
  बर्नोल्ड का सुझाव है कि मौद्रिक सुधार की सफलता न केवल...
  इसकी तकनीकी प्रासंगिकता पर ही नहीं, बल्कि जनता के उस पर भरोसे पर भी निर्भर करता है।
  इसलिए, सफलता या असफलता में धारणा और जनता का विश्वास बेहद जरूरी है Elements
  पैसों के सुधार की।
reviewed: false
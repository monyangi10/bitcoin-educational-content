question: Koji je ključni faktor uspeha ili neuspeha monetarne reforme prema Bernoldu?
answer: Poverenje koje stanovništvo polaže u to
wrong_answers:
  - Količina novca u opticaju
  - Vrednost valute
  - Ekonomske politike vlade
explanation: |
  Bernold sugeriše da uspeh monetarne reforme zavisi ne samo od njene tehničke relevantnosti već i od poverenja koje stanovništvo ima u nju. Percepcija i javno poverenje su stoga suštinski Elements za uspeh ili neuspeh monetarne reforme.

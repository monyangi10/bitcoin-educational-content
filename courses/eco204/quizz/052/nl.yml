question: Wat is volgens Bernholz een sleutelfactor voor het slagen of mislukken van een monetaire hervorming?
answer: Het vertrouwen van de bevolking
wrong_answers:
  - De hoeveelheid geld in omloop
  - De waarde van de valuta
  - Het economische beleid van de overheid
explanation: |
  Bernholz suggereert dat het succes van een monetaire hervorming niet alleen afhangt
  van de technische relevantie, maar ook van het vertrouwen dat de bevolking erin heeft.
  Perceptie en vertrouwen van het publiek zijn daarom essentiële Elements in het slagen of mislukken
  van een monetaire hervorming.
reviewed: false
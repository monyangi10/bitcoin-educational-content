question: ปัจจัยสำคัญในความสำเร็จหรือความล้มเหลวของการปฏิรูปการเงินตามที่ Bernholz กล่าวคืออะไร?
answer: ความไว้วางใจที่ประชากรมอบให้
wrong_answers:
  - จำนวนเงินที่หมุนเวียนในระบบ
  - มูลค่าของสกุลเงิน
  - นโยบายเศรษฐกิจของรัฐบาล
explanation: |
  Bernholz แนะนำว่าความสำเร็จของการปฏิรูปทางการเงินขึ้นอยู่ไม่เพียงแค่ความเกี่ยวข้องทางเทคนิคเท่านั้น แต่ยังขึ้นอยู่กับความไว้วางใจที่ประชาชนมีต่อมันด้วย ดังนั้น การรับรู้และความไว้วางใจของสาธารณชนจึงเป็นองค์ประกอบที่สำคัญต่อความสำเร็จหรือความล้มเหลวของการปฏิรูปทางการเงิน
reviewed: true
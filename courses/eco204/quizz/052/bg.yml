question: Кой е ключовият фактор за успеха или неуспеха на една парична реформа според Бернхолц?
answer: Доверието на населението в нея
wrong_answers:
  - Размерът на парите в обращение
  - Стойността на валутата
  - Икономическите политики на правителството
explanation: |
  Бернхолц предполага, че успехът на паричната реформа зависи не само от
  от нейната техническа целесъобразност, но и от доверието на населението в нея.
  Следователно възприемането и общественото доверие са съществени елементи за успеха или неуспеха
  на паричната реформа.
reviewed: true
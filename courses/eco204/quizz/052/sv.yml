question: Vilken är nyckelfaktorn för att en penningpolitisk reform ska lyckas eller misslyckas enligt Bernholz?
answer: Det förtroende som befolkningen har för den
wrong_answers:
  - Mängden pengar i omlopp
  - Valutans värde
  - Regeringens ekonomiska politik
explanation: |
  Bernholz menar att framgången för en penningpolitisk reform inte bara beror
  av dess tekniska relevans utan också av det förtroende som befolkningen hyser för den.
  Uppfattning och allmänhetens förtroende är därför avgörande Elements för om en penningreform lyckas eller misslyckas
  för en monetär reform.
reviewed: false
question: Ni igiki nyamukuru gituma ivugurura ry’amahera ritera imbere canke ritera imbere nk’uko Bernold abivuga?
answer: Icizigiro abanyagihugu babishiramwo .
wrong_answers:
  - Igitigiri c'amahera ariko aragenda
  - Agaciro k'amafaranga
  - Amategeko y'ubutunzi ya Leta
explanation: |
  Bernold avuga yuko ukuroranirwa kw’ivugurura ry’amahera kutavana gusa .
  ku bijanye n’akamaro kayo mu vy’ubuhinga ariko kandi ku cizigiro abanyagihugu bayishiramwo.
  Ugutahura n’ukwizigira kwa bose rero ni ngirakamaro Elements mu kuroranirwa canke mu kunanirwa .
  y’ivugurura ry’amahera.

question: Wat is het gevolg van meerdere redenominaties voor de bevolking?
answer: Verlies van spaargeld en voedselproblemen.
wrong_answers:
  - Toename in rijkdom en voedselovervloed.
  - Toename van besparingen en voedselschaarste.
  - Afname in rijkdom en voedselrijkdom.
explanation: |
  Meerdere keren hernoemen, nullen verwijderen of de naam wijzigen
  van
  
  van de munteenheid heeft directe gevolgen voor de bevolking, variërend van het verlies van
  
  hulp tot voedselproblemen

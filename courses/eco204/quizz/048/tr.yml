question: Birden fazla mezhep değiştirmenin nüfus üzerindeki etkisi nedir?
answer: Birikim kaybı ve gıda sorunları.
wrong_answers:
  - Zenginlik ve gıda bolluğunda artış.
  - Tasarruflarda artış ve gıda kıtlığı.
  - Zenginlik ve gıda bolluğunda azalma.
explanation: |
  Birden fazla kez yeniden nominasyon, sıfırların kaldırılması veya adın değiştirilmesi
  
  
  para biriminin halk üzerinde doğrudan etkileri vardır; bu etkiler arasında
  
  gıda sorunlarına yardım'
reviewed: false
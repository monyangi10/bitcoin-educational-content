question: Какви са последиците от многобройните реденоминации за населението?
answer: Загуба на спестявания и проблеми с храната.
wrong_answers:
  - Увеличаване на богатството и изобилието от храна.
  - Увеличаване на спестяванията и недостиг на храна.
  - Намаляване на богатството и изобилието от храна.
explanation: |
  Многократното превалутиране, премахването на нулите или промяната на името на валутата имат преки последици за населението - от загуба на помощи до проблеми с прехраната.
reviewed: true
question: बार-बार मुद्रा का मूल्य बदलने (redenomination) का आम जनता पर क्या असर पड़ता है?
answer: बचत का नुकसान और खाने की समस्या।
wrong_answers:
  - धन और भोजन की बढ़ोतरी।
  - बचत में वृद्धि और खाद्य संकट।
  - धन और भोजन की प्रचुरता में कमी।
explanation: |
  कई बार मुद्रा का पुनर्मूल्यांकन करना, ज़ीरो हटाना, या नाम बदलना
  का
  मुद्रा का सीधा असर आबादी पर पड़ता है, जिसमें नुकसान से लेकर...
  खाने की समस्याओं के लिए मदद।
reviewed: false
question: ผลกระทบของการเปลี่ยนสกุลเงินหลายครั้งต่อประชากรคืออะไร?
answer: การสูญเสียเงินออมและปัญหาอาหาร
wrong_answers:
  - เพิ่มความมั่งคั่งและความอุดมสมบูรณ์ของอาหาร
  - การเพิ่มขึ้นของการออมและความขาดแคลนอาหาร
  - ลดลงในความมั่งคั่งและความอุดมสมบูรณ์ของอาหาร
explanation: |
  การเปลี่ยนสกุลเงินหลายครั้ง การลบศูนย์ หรือการเปลี่ยนชื่อสกุลเงินมีผลกระทบโดยตรงต่อประชากร ตั้งแต่การสูญเสียความช่วยเหลือไปจนถึงปัญหาเรื่องอาหาร
reviewed: true
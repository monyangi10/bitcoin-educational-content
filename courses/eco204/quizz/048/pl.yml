question: Jakie są konsekwencje wielokrotnej redenominacji dla populacji?
answer: Utrata oszczędności i problemy z żywnością.
wrong_answers:
  - Wzrost bogactwa i obfitości żywności.
  - Wzrost oszczędności i niedobór żywności.
  - Spadek bogactwa i obfitości żywności.
explanation: |
  Wielokrotna redenominacja, usuwanie zer lub zmiana nazwy
  z
  
  waluty ma bezpośrednie reperkusje dla ludności, począwszy od utraty
  
  pomocy do problemów z żywnością"

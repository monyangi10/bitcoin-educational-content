question: Jaka była rola 'banków światowych' w okresach hiperinflacji w Zimbabwe i Republice Weimarskiej?
answer: Stanowiły schronienie dla tych, którzy chcieli chronić swoje aktywa przed dewaluacją.
wrong_answers:
  - Drukowały nowe banknoty, aby zalać rynek.
  - Regulowały kurs wymiany waluty krajowej.
  - Udzielały pożyczek rządowi.
explanation: |
  W sytuacjach hiperinflacji lub kryzysu monetarnego, równoległe i nieuregulowane
  rynki walut obcych mają tendencję do mnożenia się. Te nieformalne banki, często humorystycznie nazywane bankami światowymi lub innymi lokalnymi nazwami, zapewniają schronienie
  dla tych, którzy chcą chronić swoje aktywa przed dewaluacją.
reviewed: true

question: บทบาทของธนาคารโลกในช่วงภาวะเงินเฟ้อสูงในซิมบับเวและสาธารณรัฐไวมาร์คืออะไร?
answer: พวกเขาได้จัดหาที่หลบภัยสำหรับผู้ที่ต้องการปกป้องทรัพย์สินของตนจากการลดค่า
wrong_answers:
  - พวกเขาพิมพ์ธนบัตรใหม่เพื่อท่วมตลาด
  - พวกเขาควบคุมอัตราแลกเปลี่ยนของสกุลเงินประจำชาติ
  - พวกเขาให้กู้ยืมแก่รัฐบาล
explanation: |
  ในสถานการณ์ของภาวะเงินเฟ้อสูงหรือวิกฤตการณ์ทางการเงิน ตลาดคู่ขนานและตลาดที่ไม่ได้รับการควบคุมสำหรับสกุลเงินต่างประเทศมักจะขยายตัว ธนาคารที่ไม่เป็นทางการเหล่านี้ ซึ่งมักถูกเรียกขานอย่างขบขันว่าเป็นธนาคารโลกหรือชื่อท้องถิ่นอื่น ๆ ให้ที่พักพิงสำหรับผู้ที่ต้องการปกป้องทรัพย์สินของตนจากการลดค่า
reviewed: true
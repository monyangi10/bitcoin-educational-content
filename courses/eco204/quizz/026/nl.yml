question: Wat was de rol van de wereldbanken tijdens perioden van hyperinflatie in Zimbabwe en de Weimarrepubliek?
answer: Ze boden een toevluchtsoord voor mensen die hun bezittingen wilden beschermen tegen devaluatie.
wrong_answers:
  - Ze drukten nieuwe bankbiljetten om de markt te overspoelen.
  - Ze regelden de Exchange koers van de nationale munteenheid.
  - Ze verstrekten leningen aan de overheid.
explanation: |
  In situaties van hyperinflatie of monetaire crisis hebben parallelle en ongereguleerde
  markten voor vreemde valuta de neiging om te woekeren. Deze informele banken, vaak
  vaak met humor wereldbanken of andere lokale namen genoemd, bieden een toevluchtsoord
  voor mensen die hun bezittingen willen beschermen tegen devaluatie.

question: Каква е била ролята на Световната банка по време на периодите на хиперинфлация в Зимбабве и Ваймарската република?
answer: Те предоставиха убежище на онези, които искаха да защитят активите си от обезценяване.
wrong_answers:
  - Те отпечатаха нови банкноти, за да наводнят пазара.
  - Те регулираха обменния курс на националната валута.
  - Те предоставят заеми на правителството.
explanation: |
  В ситуации на хиперинфлация или парична криза, паралелни и нерегулирани
  пазарите на чуждестранни валути са склонни да се разрастват. Тези неофициални банки, често
  наричани с чувство за хумор световни банки или с други местни имена, предоставят убежище
  за тези, които искат да защитят активите си от обезценяване.
reviewed: true
question: विश्व बैंकों ने जिम्बाब्वे और वाइमर रिपब्लिक में हाइपरइन्फ्लेशन के दौरान क्या भूमिका निभाई थी?
answer: उन्होंने उन लोगों के लिए शरण दी जो अपनी संपत्ति को मूल्यह्रास से बचाना चाहते थे।
wrong_answers:
  - उन्होंने बाज़ार में पैसे की बाढ़ लाने के लिए नए नोट छापे।
  - उन्होंने राष्ट्रीय मुद्रा की Exchange दर को नियंत्रित किया।
  - उन्होंने सरकार को कर्ज़ दिया।
explanation: |
  हाइपरइन्फ्लेशन या मुद्रा संकट की स्थिति में, समानांतर और अनियमित
  विदेशी मुद्राओं के बाजार बढ़ते जाते हैं। ये अनौपचारिक बैंक, जो अक्सर...
  हास्यपूर्वक "वर्ल्ड बैंक" या अन्य स्थानीय नामों से जाने जाते हैं, ये एक शरणस्थली प्रदान करते हैं
  उन लोगों के लिए जो अपनी संपत्ति को मूल्यह्रास से बचाना चाहते हैं।

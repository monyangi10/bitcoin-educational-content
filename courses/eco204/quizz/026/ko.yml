question: 짐바브웨와 바이마르 공화국에서 초인플레이션이 발생했을 때 세계 은행의 역할은 무엇이었나요?
answer: 자산 가치 하락으로부터 자산을 보호하려는 사람들에게 피난처를 제공했습니다.
wrong_answers:
  - 그들은 새 지폐를 인쇄하여 시장에 넘쳐나게 했습니다.
  - 그들은 국가 통화의 Exchange 환율을 규제했습니다.
  - 그들은 정부에 대출을 제공했습니다.
explanation: |
  초인플레이션이나 통화 위기 상황에서는 규제되지 않은 병렬적이고
  외화 시장이 확산되는 경향이 있습니다. 이러한 비공식 은행은 종종
  유머러스하게 세계 은행 또는 다른 현지 이름으로 불리는 이러한 비공식 은행은
  자산을 평가절하로부터 보호하고자 하는 사람들에게 피난처를 제공합니다.
reviewed: false
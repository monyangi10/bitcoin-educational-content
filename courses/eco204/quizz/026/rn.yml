question: Ni uruhara uruhe amabanki y’isi yose yari afise mu bihe vy’ugutera imbere cane kw’ibiciro muri Zimbabwe no muri Repubulika ya Weimar?
answer: Zari zitanga ubuhungiro ku barondera gukingira itunga ryabo kugira ngo ntirigabanuke agaciro.
wrong_answers:
  - Bacapura amafaranga mashasha kugira ngo bashire isoko ryose.
  - Baciye batunganya igipimo ca Exchange c’amahera y’igihugu.
  - Batanga inguzanyo kuri leta.
explanation: |
  Mu bihe vy'ugutera imbere cane canke ingorane z'amahera, bihuye kandi bitatunganijwe
  amasoko y’amahera y’amahanga arakunda kwiyongera. Izo banki zidasanzwe, akenshi .
  zivugwa mu buryo butwenza ko ari amabanki y’isi yose canke ayandi mazina yo mu karere, zitanga ubuhungiro .
  ku barondera gukingira itunga ryabo ngo ntirigabanuke agaciro.
reviewed: false
question: Zimbabwe ve Weimar Cumhuriyeti'ndeki hiperenflasyon dönemlerinde dünya bankalarının rolü neydi?
answer: Varlıklarını devalüasyondan korumak isteyenler için bir sığınak sağladılar.
wrong_answers:
  - Piyasayı doldurmak için yeni banknotlar bastılar.
  - Ulusal para biriminin Exchange oranını düzenlediler.
  - Hükümete kredi sağladılar.
explanation: |
  Hiperenflasyon veya parasal kriz durumlarında, paralel ve düzenlenmemiş
  yabancı para birimleri için piyasalar çoğalma eğilimindedir. Bu gayri resmi bankalar, genellikle
  esprili bir şekilde dünya bankaları ya da diğer yerel isimlerle anılan bu bankalar
  varlıklarını devalüasyondan korumak isteyenler için.

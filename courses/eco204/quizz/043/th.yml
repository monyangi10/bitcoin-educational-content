question: ธนบัตรที่มีมูลค่าสูงสุดในบราซิลก่อนการเปลี่ยนสกุลเงินครั้งสุดท้ายในปี 1994 คือธนบัตร 500,000 cruzeiros reais
answer: 500,000
wrong_answers:
  - 1,000,000
  - ๒๕๐,๐๐๐
  - 100,000
explanation: |
  ธนบัตรที่มีมูลค่าสูงสุดในบราซิลถึง 500,000 และการเปลี่ยนแปลงค่าเงินครั้งสุดท้ายในปี 1994 ได้ดำเนินการในอัตรา 2,750 ต่อ 1
reviewed: true
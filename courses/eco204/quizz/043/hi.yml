question: ब्राज़ील में 1994 में आखिरी बार मुद्रा सुधार से पहले सबसे बड़ी करेंसी नोट कौन सी थी?
answer: 5 लाख
wrong_answers:
  - 10 लाख
  - 2,50,000
  - एक लाख
explanation: |
  ब्राज़ील का सबसे बड़ा नोट 500,000 का था, और आखिरी वाला...
  1994 में रीडिनॉमिनेशन 2,750 से 1 की दर पर किया गया था।'
reviewed: false
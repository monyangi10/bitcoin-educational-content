question: Каква е била банкнотата с най-висок номинал в Бразилия преди последното ѝ превалутиране през 1994 г.?
answer: 500 000
wrong_answers:
  - 1 000 000
  - 250 000
  - 100 000
explanation: |
  Банкнотата с най-висок номинал в Бразилия достига 500 000, а последната реденоминация през 1994 г. е извършена при курс 2750 към 1.
reviewed: true

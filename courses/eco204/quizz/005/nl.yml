question: Welke strategie gebruikte Spanje om zijn munt te devalueren zonder zijn positie in de internationale handel aan te tasten?
answer: Spanje devalueerde selectief de Maravedi, een lokale munteenheid, terwijl de waarde van de Spaanse dollar op het wereldtoneel behouden bleef.
wrong_answers:
  - Spanje devalueerde selectief de Spaanse dollar, een lokale valuta, terwijl het de waarde van de Maravedi op het wereldtoneel behield.
  - Spanje verhoogde selectief de waarde van de Maravedi, een lokale munteenheid, terwijl de waarde van de Spaanse dollar op het wereldtoneel behouden bleef.
  - Spanje verhoogde selectief de waarde van de Spaanse dollar, een lokale valuta, terwijl het de waarde van de Maravedi op het wereldtoneel behield.
explanation: |
  Spanje bevond zich in een netelige situatie. Het verdunnen van de Spaanse dollar
  zou zijn positie in de internationale handel in gevaar brengen. Om dit dilemma te overwinnen,
  Wendde Spanje zich tot de Maravedi, een koperen munteenheid die vooral door de lokale bevolking werd gebruikt.
  Deze munteenheid was bedoeld voor devaluatie.

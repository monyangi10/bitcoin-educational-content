question: 西班牙使用什麼策略使其貨幣貶值而不影響其在國際貿易中的地位？
answer: 西班牙選擇性地讓當地貨幣 Maravedi 貶值，同時在全球舞台上維持西班牙美元的價值。
wrong_answers:
  - 西班牙選擇性地讓當地貨幣西班牙元貶值，同時在全球舞台上保住馬拉維地的價值。
  - 西班牙選擇性地提高當地貨幣 Maravedi 的價值，同時在全球舞台上維護西班牙元的價值。
  - 西班牙選擇性地提高當地貨幣西班牙元的價值，同時在全球舞台上保住馬拉維地的價值。
explanation: |
  西班牙發現自己處於一個微妙的境地。稀釋西班牙元
  會損害其在國際貿易中的地位。為了克服這個兩難局面：
  西班牙轉而使用馬拉維地 (Maravedi)，這是一種主要在當地居民中使用的銅幣。
  這種貨幣是貶值的目標。
reviewed: false
question: 스페인이 국제 무역에서 자국의 입지에 영향을 주지 않으면서 통화의 가치를 떨어뜨리기 위해 사용한 전략은 무엇인가요?
answer: 스페인은 글로벌 무대에서 스페인 달러의 가치를 유지하면서 현지 통화인 마라베디의 가치를 선별적으로 평가 절하했습니다.
wrong_answers:
  - 스페인은 현지 통화인 스페인 달러를 선별적으로 평가 절하하는 동시에 글로벌 무대에서 마라베디의 가치를 보존했습니다.
  - 스페인은 글로벌 무대에서 스페인 달러의 가치를 유지하면서 현지 통화인 마라베디의 가치를 선별적으로 높였습니다.
  - 스페인은 글로벌 무대에서 마라베디의 가치를 보존하면서 현지 통화인 스페인 달러의 가치를 선별적으로 높였습니다.
explanation: |
  스페인은 미묘한 상황에 처했습니다. 스페인 달러가 희석되면
  을 희석하면 국제 무역에서 스페인의 입지가 위태로워질 수 있었습니다. 이 딜레마를 극복하기 위해,
  스페인은 현지에서 주로 사용되는 구리 화폐인 마라베디에 눈을 돌렸습니다.
  이 화폐는 평가 절하의 표적이 되었습니다.

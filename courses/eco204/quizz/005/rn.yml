question: Ni ubuhe buryo Esipanye yakoresheje kugira ngo igabanye agaciro k’amahera yayo ataco ihinduye ku kibanza cayo mu bucuruzi mpuzamakungu?
answer: Esipanye yarahisemwo guca agaciro k’idolari ry’igihugu ca Maravedi, mu gihe yazigamye agaciro k’idolari ry’Esipanye kw’isi yose.
wrong_answers:
  - Esipanye yarahisemwo guca agaciro k’idolari ry’Igisupanyoli, ari ryo ry’aho hantu, mu gihe yazigama agaciro k’idolari ry’i Maravedi kw’isi yose.
  - Esipanye yarahisemwo kwongera agaciro k’ifaranga ry’igihugu ryitwa Maravedi, mu gihe yazigamye agaciro k’idolari ry’Esipanye kw’isi yose.
  - Esipanye yarahisemwo kwongera agaciro k’idolari ry’Igisupanyoli, ari na ryo ry’aho hantu, mu gihe yazigamye agaciro k’idolari ry’i Maravedi ku rugero rw’isi yose.
explanation: |
  Esipanye yarisanze iri mu bihe bigoye cane. Gugabanya idolari ry'Esipanye
  yari gutuma ikibanza cayo gihungabana mu bucuruzi mpuzamakungu. Kugira ngo umuntu ashobore gutsinda iyo ngorane, .
  Esipanye yarahindukiriye Maravedi, iyo na yo ikaba ari amahera y’umuringa yakoreshwa canecane mu bantu bo ng’aho.
  Iryo shirahamwe ryari rigenewe gukurwako agaciro.

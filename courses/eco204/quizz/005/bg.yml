question: Каква е стратегията, използвана от Испания, за да девалвира валутата си, без това да се отрази на позицията ѝ в международната търговия?
answer: Испания избирателно девалвира местната валута мараведи, като същевременно запазва стойността на испанския долар на световната сцена.
wrong_answers:
  - Испания избирателно девалвира испанския долар, местна валута, като същевременно запазва стойността на мараведи на световната сцена.
  - Испания избирателно увеличава стойността на местната валута мараведи, като същевременно запазва стойността на испанския долар на световната сцена.
  - Испания избирателно увеличава стойността на испанския долар, местна валута, като същевременно запазва стойността на мараведи на световната сцена.
explanation: |
  Испания се оказа в деликатна ситуация. Разводняване на испанския долар
  щеше да компрометира позициите ѝ в международната търговия. За да преодолее тази дилема,
  Испания се обърна към мараведи - медна валута, използвана главно от местното население.
  Тази валута е била насочена към обезценяване.
reviewed: true
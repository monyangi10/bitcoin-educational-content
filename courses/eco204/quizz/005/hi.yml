question: स्पेन ने अपनी मुद्रा का मूल्य कम करने के लिए कौन सी रणनीति अपनाई थी जिससे अंतरराष्ट्रीय व्यापार में उसकी स्थिति पर कोई असर नहीं पड़ा?
answer: स्पेन ने मारावेडी, जो एक स्थानीय मुद्रा थी, को चुनिंदा तरीके से अवमूल्यित किया, जबकि वैश्विक स्तर पर स्पेनिश डॉलर की कीमत को बरकरार रखा।
wrong_answers:
  - स्पेन ने स्पैनिश डॉलर, जो एक स्थानीय मुद्रा थी, को चुनिंदा तरीके से अवमूल्यित किया, जबकि मारावेडी की वैश्विक स्तर पर कीमत को बरकरार रखा।
  - स्पेन ने मारावेडी, जो एक स्थानीय मुद्रा है, की कीमत को चुनिंदा तरीके से बढ़ाया, जबकि वैश्विक स्तर पर स्पेनिश डॉलर की कीमत को बरकरार रखा।
  - स्पेन ने चुनिंदा तरीके से स्पेनिश डॉलर (एक स्थानीय मुद्रा) की कीमत बढ़ा दी, जबकि मारावेडी (Maravedi) का वैश्विक स्तर पर मूल्य बरकरार रखा।
explanation: |
  स्पेन एक नाज़ुक हालात में फंस गया। स्पेनिश डॉलर को पतला कर दिया गया।
  अंतरराष्ट्रीय व्यापार में अपनी स्थिति को कमजोर कर देता। इस दुविधा से पार पाने के लिए,
  स्पेन ने मारावेडी की ओर रुख किया, जो एक तांबे की मुद्रा थी जो मुख्य रूप से स्थानीय आबादी द्वारा इस्तेमाल की जाती थी।
  इस करेंसी को जानबूझकर कमजोर किया गया था।

question: กลยุทธ์ที่สเปนใช้ในการลดค่าเงินโดยไม่ส่งผลกระทบต่อสถานะในตลาดการค้าระหว่างประเทศคืออะไร?
answer: สเปนได้ลดค่าเงินมาราเวดี ซึ่งเป็นสกุลเงินท้องถิ่น ในขณะที่ยังคงรักษามูลค่าของเงินดอลลาร์สเปนในเวทีโลก
wrong_answers:
  - สเปนลดค่าเงินดอลลาร์สเปนซึ่งเป็นสกุลเงินท้องถิ่นอย่างเลือกสรร ในขณะที่รักษามูลค่าของมาราเวดีในเวทีโลก
  - สเปนได้เพิ่มมูลค่าของมาราเวดี ซึ่งเป็นสกุลเงินท้องถิ่นอย่างเลือกสรร ในขณะที่ยังคงรักษามูลค่าของดอลลาร์สเปนในเวทีโลก
  - สเปนได้เพิ่มมูลค่าของเงินดอลลาร์สเปน ซึ่งเป็นสกุลเงินท้องถิ่น ในขณะที่ยังคงรักษามูลค่าของมาราเวดีในเวทีโลก
explanation: |
  สเปนพบว่าตัวเองอยู่ในสถานการณ์ที่ละเอียดอ่อน การลดค่าเงินดอลลาร์สเปนจะทำให้ตำแหน่งของตนในตลาดการค้าระหว่างประเทศถูกกระทบ เพื่อเอาชนะปัญหานี้ สเปนหันไปใช้มาราเวดี ซึ่งเป็นสกุลเงินทองแดงที่ใช้กันในหมู่ประชากรท้องถิ่นเป็นหลัก สกุลเงินนี้ถูกกำหนดเป้าหมายให้ลดค่า
reviewed: true
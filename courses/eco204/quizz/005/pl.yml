question: Jaką strategię zastosowała Hiszpania, aby zdewaluować swoją walutę bez wpływu na swoją pozycję w handlu międzynarodowym?
answer: Hiszpania selektywnie zdewaluowała maravedi, lokalną walutę, jednocześnie zachowując wartość hiszpańskiego dolara na arenie międzynarodowej.
wrong_answers:
  - Hiszpania selektywnie zdewaluowała dolara hiszpańskiego, lokalną walutę, jednocześnie zachowując wartość maravedi na arenie międzynarodowej.
  - Hiszpania selektywnie zwiększyła wartość lokalnej waluty Maravedi, zachowując jednocześnie wartość dolara hiszpańskiego na arenie międzynarodowej.
  - Hiszpania selektywnie zwiększyła wartość dolara hiszpańskiego, lokalnej waluty, jednocześnie zachowując wartość maravedi na arenie międzynarodowej.
explanation: |
  Hiszpania znalazła się w delikatnej sytuacji. Rozcieńczenie hiszpańskiego dolara
  zagroziłoby jej pozycji w handlu międzynarodowym. Aby przezwyciężyć ten dylemat,
  Hiszpania zwróciła się do Maravedi, miedzianej waluty używanej głównie przez lokalną ludność.
  Waluta ta została poddana dewaluacji.

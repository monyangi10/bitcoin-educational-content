question: 價格上漲與通貨膨脹的根本區別是什麼？
answer: 價格上漲可能是特定產業的特有現象，也可能是由各種因素所引起，而通貨膨脹的定義則是一系列商品和服務的價格普遍上漲。
wrong_answers:

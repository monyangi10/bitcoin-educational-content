question: Fiyat Artışı ile Enflasyon arasındaki temel fark nedir?
answer: Fiyat artışı sektöre özgü olabilir ve çeşitli faktörlerden kaynaklanabilirken, enflasyon bir dizi mal ve hizmette genel bir fiyat artışı ile tanımlanır.
wrong_answers:
  - Fiyat artışı, bir dizi mal ve hizmetin fiyatlarındaki genel bir artışken, enflasyon sektöre özgüdür ve çeşitli faktörlerden kaynaklanır.
  - Fiyat artışı ve enflasyon aynı şeydir, her ikisi de bir dizi mal ve hizmette genel bir fiyat artışını ifade eder.
  - Fiyat artışı fiyatlardaki düşüşü ifade ederken, enflasyon fiyatlardaki artışı ifade eder.
explanation: |
  Bu bölümde, fiyat artışının sektöre özgü olabileceği ve
  oPEC'in petrol üretimindeki düşüş veya elverişsiz koşullar gibi çeşitli faktörlerin etkisiyle
  buğday için hava koşulları. Diğer taraftan enflasyon, genelleştirilmiş bir
  sadece belirli bir mal ve hizmette değil, bir dizi mal ve hizmette fiyat artışı
  sektör.
reviewed: false
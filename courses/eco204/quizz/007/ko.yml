question: 가격 인상과 인플레이션의 근본적인 차이점은 무엇인가요?
answer: 가격 상승은 다양한 요인에 의해 유발될 수 있으며, 인플레이션은 다양한 상품과 서비스 전반의 가격 상승으로 정의됩니다.
wrong_answers:
  - 물가 상승은 다양한 상품과 서비스 전반에 걸쳐 가격이 전반적으로 상승하는 것을 말하며, 인플레이션은 다양한 요인에 의해 유발되는 부문별 현상입니다.
  - 가격 인상과 인플레이션은 모두 다양한 상품과 서비스 전반에 걸쳐 가격이 전반적으로 상승하는 것을 의미한다는 점에서 동일합니다.
  - 가격 인상은 가격 하락을 의미하며, 인플레이션은 가격 상승을 의미합니다.
explanation: |
  이 장에서는 가격 상승은 부문별로 다를 수 있으며
  석유에 대한 OPEC의 생산량 감소 또는 불리한
  밀의 기상 조건. 반면에 인플레이션은 다양한 상품과 서비스 전반에 걸친
  특정 분야뿐만 아니라 다양한 상품과 서비스 전반의 가격 상승으로 정의됩니다
  부문.

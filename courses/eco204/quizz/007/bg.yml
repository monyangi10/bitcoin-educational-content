question: Каква е основната разлика между увеличение на цените и инфлация?
answer: Увеличението на цените може да бъде специфично за даден сектор и предизвикано от различни фактори, докато инфлацията се определя от обобщено увеличение на цените на редица стоки и услуги.
wrong_answers:
  - Повишаването на цените е обобщено увеличение на цените на редица стоки и услуги, докато инфлацията е специфична за даден сектор и е предизвикана от различни фактори.
  - Увеличението на цените и инфлацията са едни и същи понятия; и двете се отнасят до обобщено увеличение на цените на редица стоки и услуги.
  - Повишаването на цените се отнася до намаляване на цените, докато инфлацията се отнася до повишаване на цените.
explanation: |
  В главата се обяснява, че увеличението на цените може да бъде специфично за сектора и
  предизвикано от различни фактори, като например намаляване на производството на петрол от ОПЕК или неблагоприятни
  климатичните условия за пшеницата. Инфлацията, от друга страна, се определя от обобщен
  увеличение на цените на редица стоки и услуги, а не само на конкретни
  сектора.
reviewed: true
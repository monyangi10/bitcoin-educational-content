question: कीमत बढ़ना और महंगाई में बुनियादी फर्क क्या है?
answer: कीमतों में बढ़ोतरी किसी खास सेक्टर में हो सकती है और अलग-अलग वजहों से हो सकती है, जबकि मुद्रास्फीति का मतलब होता है कई सामान और सेवाओं की कीमतों में एक साथ बढ़ोतरी होना।
wrong_answers:
  - कीमतों में बढ़ोतरी (Price increase) तब होती है जब सामान और सेवाओं की कीमतें आम तौर पर बढ़ जाती हैं, जबकि मुद्रास्फीति (Inflation) किसी खास क्षेत्र में होती है और अलग-अलग कारकों से प्रभावित होती है।
  - कीमतों में बढ़ोतरी और महंगाई एक ही चीज़ हैं, दोनों का मतलब है कि चीज़ों और सेवाओं की कीमतें आम तौर पर बढ़ रही हैं।
  - कीमतों में वृद्धि (Price increase) का मतलब है कीमतों में कमी होना, जबकि महंगाई (Inflation) का मतलब है कीमतों में बढ़ोतरी होना।
explanation: |
  अध्याय बताता है कि कीमतों में वृद्धि किसी खास क्षेत्र तक सीमित हो सकती है और
  विभिन्न कारकों से प्रेरित होता है जैसे कि तेल के लिए ओपेक उत्पादन में कमी या प्रतिकूल
  गेहूं के लिए मौसम की स्थिति। वहीं, मुद्रास्फीति को एक सामान्यीकृत...
  कई सामान और सेवाओं की कीमतों में बढ़ोतरी, सिर्फ किसी एक चीज़ में नहीं
  क्षेत्र।

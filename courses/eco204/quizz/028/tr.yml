question: Zimbabve ve Weimar Cumhuriyeti'ndeki hiperenflasyonun sonuçlarındaki ortak benzerlik nedir?
answer: Temel malların dağıtımını kontrol etmek için bir tayınlama sisteminin uygulanması.
wrong_answers:
  - Yabancı yatırımlardaki artış.
  - Ulusal para biriminin değerindeki artış.
  - Temel mallara yönelik talebin azalması.
explanation: |
  Kötüleşen ekonomi ve kaynak kıtlığı bağlamında,
  hükümetler temel ihtiyaç maddelerinin dağıtımını kontrol etmek için tayınlama sistemleri uygulayabilir
  mallar. Bu, aşağıdakilerin satın alınmasını düzenlemek için kuponların veya kuponların kullanılmasını içerir
  benzin veya yakıt.
reviewed: false
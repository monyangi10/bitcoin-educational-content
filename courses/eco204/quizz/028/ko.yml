question: 짐바브웨와 바이마르 공화국에서 초인플레이션이 가져온 결과의 공통점은 무엇인가요?
answer: 필수품의 배급을 통제하기 위해 배급 시스템을 구현합니다.
wrong_answers:
  - 외국인 투자 증가.
  - 국가 통화 가치의 상승.
  - 생필품에 대한 수요 감소.
explanation: |
  경제가 악화되고 자원이 부족한 상황에서,
  정부는 필수품의 배급을 통제하기 위해 배급제를 시행할 수 있습니다
  배급 시스템을 시행할 수 있습니다. 여기에는 쿠폰이나 바우처를 사용하여 다음과 같은 물품의 구매를 규제하는 것이 포함됩니다
  휘발유 또는 연료.
reviewed: false
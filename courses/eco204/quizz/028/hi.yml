question: ज़िम्बाब्वे और वाइमर रिपब्लिक में हाइपरइन्फ्लेशन के नतीजों में एक आम समानता क्या है?
answer: आवश्यक सामानों के वितरण को नियंत्रित करने के लिए राशनिंग प्रणाली का कार्यान्वयन।
wrong_answers:
  - विदेशी निवेश में वृद्धि।
  - राष्ट्रीय मुद्रा के मूल्य में वृद्धि।
  - आवश्यक वस्तुओं की मांग में कमी।
explanation: |
  एक खस्ताहाल अर्थव्यवस्था और संसाधनों की कमी के माहौल में,
  सरकारें ज़रूरी चीज़ों के बंटवारे को नियंत्रित करने के लिए राशनिंग सिस्टम लागू कर सकती हैं।
  माल। इसमें कूपन या वाउचर का उपयोग करके खरीदारी को नियंत्रित करना शामिल है
  पेट्रोल या ईंधन।
reviewed: false
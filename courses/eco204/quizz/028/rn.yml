question: Ni igiki gisanzwe gihurikiyeko mu ngaruka z’ugutera imbere cane kw’ibiciro muri Zimbabwe no muri Repubulika ya Weimar?
answer: Gushirwa mu ngiro kw’uburyo bwo gutanga ibifungurwa kugira ngo hagenzurwe ugusangira ibintu vy’ingenzi.
wrong_answers:
  - Ukwo kwiyongera kw’ishoramari ry’amahanga.
  - Ukwongerekana kw’agaciro k’amahera y’igihugu.
  - Igabanuka ry’abasaba ibintu vy’ingenzi.
explanation: |
  Mu gihe ubutunzi buriko burasenyuka kandi ubutunzi buriko burabura,
  intwaro zishobora gushiramwo uburyo bwo gutanga ibifungurwa kugira ngo zigenzure ugusangira ibifungurwa vy'ingenzi
  ibicuruzwa. Ivyo birimwo no gukoresha amakupo canke amavoucher kugira ngo umuntu atunganye ukuntu agura .
  peteroli canke amavuta y’ibinyabiziga.
reviewed: false
question: Wat is een gemeenschappelijke overeenkomst in de gevolgen van hyperinflatie in Zimbabwe en de Weimarrepubliek?
answer: De implementatie van een rantsoeneringssysteem om de distributie van essentiële goederen te controleren.
wrong_answers:
  - De toename van buitenlandse investeringen.
  - De waardestijging van de nationale munteenheid.
  - De daling van de vraag naar essentiële goederen.
explanation: |
  In de context van een verslechterende economie en schaarste aan middelen,
  kunnen overheden rantsoeneringssystemen implementeren om de distributie van essentiële
  goederen. Dit omvat het gebruik van bonnen of vouchers om de aankoop van benzine of brandstof te regelen
  benzine of brandstof.
reviewed: false
question: ความคล้ายคลึงกันทั่วไปในผลกระทบของภาวะเงินเฟ้อสูงในซิมบับเวและสาธารณรัฐไวมาร์คืออะไร?
answer: การดำเนินการระบบปันส่วนเพื่อควบคุมการกระจายสินค้าจำเป็น
wrong_answers:
  - การเพิ่มขึ้นของการลงทุนจากต่างประเทศ
  - การเพิ่มขึ้นของมูลค่าสกุลเงินของประเทศ
  - การลดลงของความต้องการสินค้าจำเป็น
explanation: |
  ในบริบทของเศรษฐกิจที่เสื่อมโทรมและความขาดแคลนของทรัพยากร รัฐบาลอาจดำเนินการระบบปันส่วนเพื่อควบคุมการกระจายสินค้าจำเป็น ซึ่งรวมถึงการใช้คูปองหรือบัตรกำนัลเพื่อควบคุมการซื้อก๊าซหรือเชื้อเพลิง
reviewed: true
question: Jakie jest podobieństwo w konsekwencjach hiperinflacji w Zimbabwe i Republice Weimarskiej?
answer: Wdrożenie systemu racjonowania w celu kontroli dystrybucji podstawowych towarów.
wrong_answers:
  - Wzrost inwestycji zagranicznych.
  - Wzrost wartości waluty krajowej.
  - Spadek popytu na podstawowe towary.
explanation: |
  W kontekście pogarszającej się sytuacji gospodarczej i niedoboru zasobów,
  rządy mogą wdrożyć systemy racjonowania, aby kontrolować dystrybucję podstawowych
  towarów. Obejmuje to wykorzystanie kuponów lub voucherów do regulowania zakupu benzyny lub paliwa
  benzyny lub paliwa.
reviewed: false
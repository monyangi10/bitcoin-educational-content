question: Koja je zajednička sličnost u posledicama hiperinflacije u Zimbabveu i Vajmarskoj Republici?
answer: Implementacija sistema racionisanja za kontrolu distribucije osnovnih dobara.
wrong_answers:
  - Povećanje stranih investicija.
  - Povećanje vrednosti nacionalne valute.
  - Smanjenje potražnje za osnovnim dobrima.
explanation: |
  U kontekstu pogoršanja ekonomije i oskudice resursa, vlade mogu uvesti sisteme racionisanja kako bi kontrolisale distribuciju osnovnih dobara. Ovo uključuje korišćenje kupona ili vaučera za regulisanje kupovine benzina ili goriva.

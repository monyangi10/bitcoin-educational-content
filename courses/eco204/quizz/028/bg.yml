question: Каква е общата прилика в последиците от хиперинфлацията в Зимбабве и Ваймарската република?
answer: Въвеждане на система за разпределение на дажбите с цел контрол на разпределението на стоки от първа необходимост.
wrong_answers:
  - Увеличаването на чуждестранните инвестиции.
  - Увеличаването на стойността на националната валута.
  - Намаляване на търсенето на стоки от първа необходимост.
explanation: |
  В контекста на влошаващата се икономика и недостига на ресурси,
  правителствата могат да въведат системи за нормиране, за да контролират разпределението на основни
  стоки. Това включва използването на купони или ваучери за регулиране на покупката на
  бензин или гориво.
reviewed: true
question: Jaki jest kluczowy wniosek z wykładu na temat sposobów przezwyciężenia hiperinflacji?
answer: Istnieje kilka strategii przezwyciężenia hiperinflacji, ale będą one skuteczne tylko wtedy, gdy ludność będzie miała do nich zaufanie, a na rząd zostaną nałożone surowe ograniczenia.
wrong_answers:
  - Jedynym sposobem na przezwyciężenie hiperinflacji jest dolaryzacja
  - Jedynym sposobem na przezwyciężenie hiperinflacji jest wprowadzenie nowej waluty
  - Hiperinflację można przezwyciężyć po prostu zwiększając Supply pieniądza
explanation: |
  Wykład sugeruje, że istnieje kilka strategii przezwyciężenia hiperinflacji
  hiperinflacji,
  takich jak dolaryzacja lub wprowadzenie nowej waluty. Jednak rozwiązania te będą
  zadziałają tylko wtedy, gdy ludność będzie miała do nich zaufanie, a na rząd zostaną nałożone ścisłe ograniczenia
  na rząd.

question: Koji je ključni zaključak predavanja o tome kako prevazići hiperinflaciju?
answer: Postoji nekoliko strategija za prevazilaženje hiperinflacije, ali one će funkcionisati samo ako stanovništvo ima poverenja u njih i ako se vladi nametnu stroga ograničenja.
wrong_answers:
  - Jedini način da se prevaziđe hiperinflacija je dolarizacija.
  - Jedini način da se prevaziđe hiperinflacija je uvođenje nove valute.
  - Hiperinflacija se može prevazići jednostavnim povećanjem novca Supply
explanation: |
  Predavanje sugeriše da postoji nekoliko strategija za prevazilaženje
  hiperinflacije,
  kao što su dolarizacija ili uvođenje nove valute. Međutim, ova rešenja će
  funkcionisati samo ako stanovništvo ima poverenje u njih i ako se vladi nametnu stroga ograničenja.

question: Какъв е основният извод от лекцията за това как да преодолеем хиперинфлацията?
answer: Съществуват няколко стратегии за преодоляване на хиперинфлацията, но те ще бъдат ефективни само ако населението има доверие в тях и ако на правителството бъдат наложени строги ограничения.
wrong_answers:
  - Единственият начин за преодоляване на хиперинфлацията е доларизацията
  - Единственият начин да се преодолее хиперинфлацията е да се въведе нова валута
  - Хиперинфлацията може да бъде преодоляна чрез просто увеличаване на паричното предлагане
explanation: |
  Лекцията показва, че има няколко стратегии за преодоляване на
  хиперинфлацията,
  като например доларизация или въвеждане на нова валута. Тези решения обаче ще
  работят само ако населението има доверие в тях и се наложат строги ограничения
  на правителството.
reviewed: true
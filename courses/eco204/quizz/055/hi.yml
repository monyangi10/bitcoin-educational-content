question: हाइपरइन्फ्लेशन से कैसे निपटें इस लेक्चर का मुख्य सीख क्या है?
answer: हाइपरइन्फ्लेशन से निपटने के कई तरीके हैं, लेकिन वे तभी काम करेंगे जब जनता को उन पर भरोसा हो और सरकार पर सख्त पाबंदियाँ लगाई जाएँ।
wrong_answers:
  - हाइपरइन्फ्लेशन से निपटने का एकमात्र तरीका डॉलराइजेशन है
  - हाइपरइन्फ्लेशन से निपटने का एकमात्र तरीका है नई करेंसी लाना
  - हाइपरइन्फ्लेशन को पैसे की Supply बढ़ाकर ही हराया जा सकता है।
explanation: |
  लेक्चर में सुझाव दिया गया है कि कठिनाइयों को पार करने के कई तरीके हैं
  "हाइपरइन्फ्लेशन" (मुद्रास्फीति की अत्यधिक दर)
  जैसे कि डॉलराइजेशन या नई मुद्रा शुरू करना। हालाँकि, ये समाधान होंगे
  काम तभी होगा जब जनता को उन पर भरोसा हो और सख्त पाबंदियाँ लगाई जाएँ।
  सरकार पर।

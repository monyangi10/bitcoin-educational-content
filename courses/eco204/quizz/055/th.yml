question: หัวใจสำคัญจากการบรรยายเกี่ยวกับวิธีการเอาชนะภาวะเงินเฟ้อสูงคืออะไร?
answer: มีกลยุทธ์หลายอย่างในการเอาชนะภาวะเงินเฟ้อสูง แต่จะมีประสิทธิภาพก็ต่อเมื่อประชาชนมีความเชื่อมั่นในกลยุทธ์เหล่านั้นและมีการกำหนดข้อจำกัดที่เข้มงวดต่อรัฐบาล
wrong_answers:
  - วิธีเดียวที่จะเอาชนะภาวะเงินเฟ้อสูงคือการใช้ดอลลาร์สหรัฐ
  - วิธีเดียวที่จะเอาชนะภาวะเงินเฟ้อสูงคือการแนะนำสกุลเงินใหม่
  - ภาวะเงินเฟ้อสูงสามารถเอาชนะได้โดยการเพิ่มปริมาณเงินในระบบ
explanation: |
  การบรรยายแนะนำว่ามีกลยุทธ์หลายอย่างในการเอาชนะภาวะเงินเฟ้อรุนแรง เช่น การใช้เงินดอลลาร์หรือการแนะนำสกุลเงินใหม่ อย่างไรก็ตาม วิธีแก้ปัญหาเหล่านี้จะได้ผลก็ต่อเมื่อประชาชนมีความเชื่อมั่นในวิธีการเหล่านี้และมีการกำหนดข้อจำกัดที่เข้มงวดต่อรัฐบาล
reviewed: true
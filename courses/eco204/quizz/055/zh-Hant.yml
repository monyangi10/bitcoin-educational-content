question: 如何克服惡性通貨膨脹，講座的主要啟示是什麼？
answer: 克服惡性通貨膨脹的策略有幾種，但只有當民眾對這些策略有信心，且政府受到嚴格限制時，這些策略才會奏效。
wrong_answers:
  - 克服惡性通貨膨脹的唯一方法是美元化
  - 克服惡性通貨膨脹的唯一方法是引入新貨幣
  - 只要增加貨幣 Supply 就可以克服惡性通貨膨脹。
explanation: |
  本演講提出了幾種策略來克服以下問題
  惡性通貨膨脹、
  例如美元化或引入新貨幣。然而，這些解決方案將
  只有當人民對其有信心，並施加嚴格的限制時，才能發揮作用
  在政府身上。
reviewed: false
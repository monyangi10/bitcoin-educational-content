question: 銀行和中央銀行資產負債表對通貨膨脹有何影響？
answer: 如果新創造的資金只停留在私人銀行的資產負債表上，而沒有借給經濟活動者，就不會直接影響實體經濟，因此也不會造成通貨膨脹。
wrong_answers:
  - 如果新創造的資金仍然停留在私人銀行的資產負債表上，它總是會導致通貨膨脹。
  - 銀行和中央銀行的資產負債表對通貨膨脹並無影響。
  - 如果新創造的貨幣借給經濟活動者，就不會造成通貨膨脹。
explanation: |
  本章解釋了貨幣印刷之間的關係
  而通貨膨脹則受新創造的貨幣如何被引入經濟體系所調節。
  如果這些資金留在私人銀行的資產負債表上，而沒有借出
  對經濟行動者而言，它不會直接影響實體經濟，因此、
  不會導致通貨膨脹。
reviewed: false
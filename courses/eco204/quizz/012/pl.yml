question: Jaki jest wpływ bilansów banków i banków centralnych na inflację?
answer: Jeśli nowo wykreowane pieniądze pozostaną w bilansach prywatnych banków bez pożyczania ich podmiotom gospodarczym, nie będą one miały bezpośredniego wpływu na realną gospodarkę, a zatem nie spowodują inflacji.
wrong_answers:
  - Jeśli nowo wykreowane pieniądze pozostaną w bilansach prywatnych banków, zawsze będzie to skutkować inflacją.
  - Bilanse banków i banków centralnych nie mają wpływu na inflację.
  - Jeśli nowo wykreowane pieniądze zostaną pożyczone podmiotom gospodarczym, nie spowoduje to inflacji.
explanation: |

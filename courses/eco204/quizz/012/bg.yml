question: Какво е влиянието на балансите на банките и централните банки върху инфлацията?
answer: Ако новосъздадените пари останат в балансите на частните банки, без да бъдат отпуснати на икономическите субекти, те няма да окажат пряко въздействие върху реалната икономика и следователно няма да доведат до инфлация.
wrong_answers:
  - Ако новосъздадените пари останат в балансите на частните банки, те винаги ще водят до инфлация.
  - Балансите на банките и централните банки не оказват влияние върху инфлацията.
  - Ако новосъздадените пари се отпускат в заем на икономическите субекти, това няма да доведе до инфлация.
explanation: |
  В главата се обяснява, че връзката между паричното печатане
  и инфлацията се определя от начина, по който новосъздадените пари се въвеждат в икономиката.
  Ако тези пари останат в балансите на частните банки, без да бъдат заети
  на икономическите субекти, те няма да окажат пряко въздействие върху реалната икономика и следователно,
  няма да доведат до инфлация.
reviewed: true
question: 은행 및 중앙은행 대차대조표가 인플레이션에 미치는 영향은 무엇인가요?
answer: 새로 창출된 화폐가 경제 주체에게 대출되지 않고 민간 은행의 대차대조표에 남아 있으면 실물 경제에 직접적인 영향을 미치지 않으므로 인플레이션을 초래하지 않습니다.
wrong_answers:

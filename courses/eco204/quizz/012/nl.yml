question: Wat is de invloed van de balansen van banken en centrale banken op de inflatie?
answer: Als nieuw gecreëerd geld op de balansen van particuliere banken blijft staan zonder te worden uitgeleend aan economische actoren, zal het geen directe invloed hebben op de reële economie en dus niet leiden tot inflatie.
wrong_answers:
  - Als nieuw gecreëerd geld op de balansen van privébanken blijft staan, zal dat altijd leiden tot inflatie.
  - De balansen van banken en centrale banken hebben geen invloed op de inflatie.
  - Als nieuw gecreëerd geld wordt uitgeleend aan economische actoren, zal dit niet leiden tot inflatie.

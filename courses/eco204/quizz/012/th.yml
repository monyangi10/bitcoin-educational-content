question: ผลกระทบของงบดุลของธนาคารและธนาคารกลางต่อเงินเฟ้อคืออะไร?
answer: หากเงินที่สร้างขึ้นใหม่ยังคงอยู่ในงบดุลของธนาคารเอกชนโดยไม่ได้ถูกปล่อยกู้ให้กับผู้มีบทบาททางเศรษฐกิจ จะไม่มีผลกระทบโดยตรงต่อเศรษฐกิจจริงและดังนั้นจะไม่ส่งผลให้เกิดเงินเฟ้อ
wrong_answers:
  - หากเงินที่สร้างขึ้นใหม่ยังคงอยู่ในงบดุลของธนาคารเอกชน จะส่งผลให้เกิดเงินเฟ้อเสมอ
  - งบดุลของธนาคารและธนาคารกลางไม่มีผลกระทบต่อเงินเฟ้อ
  - หากเงินที่สร้างขึ้นใหม่ถูกให้ยืมแก่ผู้มีบทบาททางเศรษฐกิจ จะไม่ส่งผลให้เกิดเงินเฟ้อ
explanation: |
  บทนี้อธิบายว่าความสัมพันธ์ระหว่างการพิมพ์เงินและเงินเฟ้อถูกปรับโดยวิธีการที่เงินที่สร้างขึ้นใหม่ถูกนำเข้าสู่เศรษฐกิจ หากเงินนี้ยังคงอยู่ในงบดุลของธนาคารเอกชนโดยไม่ถูกปล่อยกู้ให้กับผู้มีบทบาททางเศรษฐกิจ มันจะไม่ส่งผลกระทบโดยตรงต่อเศรษฐกิจจริงและดังนั้นจะไม่ส่งผลให้เกิดเงินเฟ้อ
reviewed: true
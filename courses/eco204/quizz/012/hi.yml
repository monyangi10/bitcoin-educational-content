question: बैंक और सेंट्रल बैंक के बैलेंस शीट का महंगाई पर क्या असर होता है?
answer: अगर नया बनाया हुआ पैसा प्राइवेट बैंकों के बैलेंस शीट पर ही पड़ा रहे और इकोनॉमिक एक्टर्स (जैसे कि बिजनेस या लोग) को उधार न दिया जाए, तो इसका असली इकोनॉमी पर सीधा असर नहीं पड़ेगा और इसलिए महंगाई भी नहीं बढ़ेगी।
wrong_answers:
  - अगर नया बनाया हुआ पैसा प्राइवेट बैंकों के बैलेंस शीट पर ही रह जाता है, तो इसका हमेशा मतलब महंगाई बढ़ना ही होगा।
  - बैंक और सेंट्रल बैंक के बैलेंस शीट का महंगाई पर कोई असर नहीं होता।
  - अगर नया बनाया हुआ पैसा आर्थिक काम करने वालों को उधार दिया जाए, तो इससे महंगाई नहीं बढ़ेगी।
explanation: |
  अध्याय बताता है कि मुद्रा छपाई और...
  और महंगाई इस बात से नियंत्रित होती है कि नया बनाया गया पैसा अर्थव्यवस्था में कैसे डाला जाता है।
  अगर यह पैसा प्राइवेट बैंकों के बैलेंस शीट पर ही पड़ा रह जाए और उधार न दिया जाए
  आर्थिक कारकों के लिए, यह सीधे तौर पर वास्तविक अर्थव्यवस्था को प्रभावित नहीं करेगा और इसलिए,
  महंगाई नहीं बढ़ेगी।

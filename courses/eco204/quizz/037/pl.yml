question: Jak nazywał się pieniądz awaryjny używany w Niemczech podczas kryzysu gospodarczego?
answer: Notgeld
wrong_answers:
  - Marka Rzeszy
  - Euro
  - Deutsche Mark
explanation: |
  Podczas kryzysu gospodarczego w Niemczech Notgeld (pieniądz awaryjny) został
  został użyty do rozwiązania problemu niedoboru wspólnej waluty.
reviewed: true

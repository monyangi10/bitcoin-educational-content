question: Как се наричат спешните пари, използвани в Германия по време на икономическата криза?
answer: Notgeld
wrong_answers:
  - Райхсмарка
  - Евро
  - Дойче марка
explanation: |
  По време на икономическата криза в Германия Notgeld (спешни пари) е
  за преодоляване на недостига на обща валута.
reviewed: true
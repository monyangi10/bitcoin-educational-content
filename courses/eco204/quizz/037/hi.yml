question: जर्मनी में आर्थिक संकट के दौरान इस्तेमाल होने वाले इमरजेंसी पैसे को क्या कहते हैं?
answer: नॉटगेल्ड
wrong_answers:
  - राइख़्समार्क
  - यूरो
  - डॉयचे मार्क
explanation: |
  जर्मनी के आर्थिक संकट के दौरान, नोटगेल्ड (आपातकालीन पैसा)
  इस्तेमाल होता था Address आम मुद्रा की कमी।
reviewed: false
question: Wat is de term voor het noodgeld dat in Duitsland werd gebruikt tijdens de economische crisis?
answer: Notgeld
wrong_answers:
  - Reichsmark
  - Euro
  - Duitse mark
explanation: |
  Tijdens de economische crisis in Duitsland werd Notgeld (noodgeld)
  gebruikt om een tekort aan gemeenschappelijke valuta op te vangen.

question: คุณลักษณะเฉพาะของตั๋วสัญญาใช้เงินที่ถูกนำมาใช้ที่ตลาดหลักทรัพย์แอนต์เวิร์ป Exchange ในศตวรรษที่ 16 คืออะไร?
answer: พวกเขามีชื่อและวันที่ครบกำหนด
wrong_answers:
  - พวกมันทำจากทองคำ
  - พวกเขาถูกออกโดยธนาคารแห่งอัมสเตอร์ดัม
  - พวกมันสามารถแปลงเป็นฟลอรินได้
explanation: |
  ตลาดหลักทรัพย์แอนต์เวิร์ป Exchange ได้แนะนำตั๋วสัญญาใช้เงินที่มีชื่อและวันที่ครบกำหนดชำระ ซึ่งทำให้ยากต่อการแลกเปลี่ยนก่อนถึงวันครบกำหนด อย่างไรก็ตาม ตลาดหลักทรัพย์ได้แนะนำการปฏิบัติในการลดราคาตั๋วเหล่านี้ก่อนถึงวันครบกำหนด ทำให้ตั๋วมีสภาพคล่องมากขึ้นและแนะนำแนวคิดของมูลค่าเงินตามเวลา
reviewed: true
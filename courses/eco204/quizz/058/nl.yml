question: Wat was het unieke kenmerk van de promessen die in de 16e eeuw op de Antwerpse beurs Exchange werden geïntroduceerd?
answer: Ze droegen namen en vervaldata
wrong_answers:
  - Ze waren gemaakt van goud
  - Ze werden uitgegeven door de Bank van Amsterdam
  - Ze waren converteerbaar in florijnen
explanation: |
  De Antwerpse Stock Exchange introduceerde promessen met namen en vervaldata
  en vervaldata. Dit maakte het moeilijk om ze voor de vervaldatum Exchange te maken. Echter,
  de Exchange introduceerde echter de praktijk om deze biljetten voor hun vervaldatum te verdisconteren, waardoor ze meer Liquid waarde kregen en het concept van de tijdswaarde werd geïntroduceerd
  datum, waardoor ze meer Liquid werden en het concept van de tijdswaarde van geld werd geïntroduceerd.

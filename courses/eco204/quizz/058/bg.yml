question: Каква е уникалната характеристика на менителниците, въведени в Антверпенската борса през XVI в.?
answer: Те носеха имена и дати на падеж
wrong_answers:
  - Бяха направени от злато
  - Те са емитирани от Bank of Amsterdam
  - Те бяха конвертируеми във флорини
explanation: |
  Антверпенската фондова борса Exchange въвежда записи на заповед, които носят имена
  и дати на падеж. Това затрудняваше размяната им преди датата на падежа. Въпреки това,
  борсата въведе практиката за сконтиране на тези менителници преди падежа им
  така те стават по-ликвидни и се въвежда концепцията за стойността на парите във времето.
reviewed: true
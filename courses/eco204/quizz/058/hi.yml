question: 16वीं सदी में एंटवर्प स्टॉक एक्सचेंज (Exchange) में पेश किए गए प्रॉमिसरी नोट्स की खास बात क्या थी?  

(Note: "Exchange" जैसे technical terms को उसी फॉर्मेट में रखा गया है।)
answer: उनके नाम और परिपक्वता तिथियाँ थीं
wrong_answers:
  - वो सोने के बने हुए थे।
  - वे एम्स्टर्डम बैंक द्वारा जारी किए गए थे
  - वे फ्लोरिन में बदले जा सकते थे
explanation: |
  एंटवर्प स्टॉक Exchange ने प्रॉमिसरी नोट्स पेश किए जिन पर नाम लिखे होते थे।
  और मैच्योरिटी डेट्स। इसकी वजह से उन्हें ड्यू डेट से पहले Exchange करना मुश्किल हो गया। हालांकि,
  Exchange ने इन नोटों की अवधि से पहले ही उन पर छूट देने की प्रथा शुरू की थी।
  तारीख, जिससे वे और ज्यादा Liquid हो जाते हैं और पैसे के समय मूल्य (time value of money) की अवधारणा को पेश करते हैं।
reviewed: false
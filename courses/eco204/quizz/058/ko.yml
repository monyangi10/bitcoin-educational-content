question: 16세기 앤트워프 증권거래소에서 도입된 약속어음의 독특한 특징은 무엇인가요?
answer: 이름과 만기일이 적혀 있습니다
wrong_answers:
  - 그들은 금으로 만들어졌습니다
  - 암스테르담 은행에서 발행했습니다
  - 플로린으로 전환 가능
explanation: |
  앤트워프 주식 Exchange은 이름과 만기일이 명시된 약속어음을 도입했습니다
  만기일이 명시된 약속어음을 도입했습니다. 이로 인해 만기일 전에 Exchange을 발행하기가 어려웠습니다. 하지만
  gW-1은 만기일 전에 이러한 어음을 할인하는 관행을 도입했습니다
  만기일 전에 할인하는 관행을 도입하여 Liquid로 만들고 화폐의 시간 가치 개념을 도입했습니다.
reviewed: false
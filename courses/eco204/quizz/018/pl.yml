question: Jakie jest główne ograniczenie klasycznych tabel hiperinflacji?
answer: Wykluczają pewne historyczne okresy wysokiej inflacji ze względu na ścisłe kryteria klasyfikacji.
wrong_answers:
  - Obejmują zbyt wiele epizodów inflacji, które nie kwalifikują się jako hiperinflacja.
  - Są przestarzałe i nie mają zastosowania do nowoczesnych gospodarek.
  - Nie uwzględniają wpływu inflacji na gospodarkę.
explanation: |
  Klasyczne tabele hiperinflacji, takie jak tabela Hanke-Krusa, często
  wykluczają pewne historyczne okresy wysokiej inflacji ze względu na ścisłe kryteria klasyfikacji, takie jak próg 50% miesięcznej inflacji określony w definicji Cagana.
reviewed: true

question: 고전적인 하이퍼인플레이션 표의 주요 한계는 무엇인가요?
answer: 엄격한 분류 기준으로 인해 역사적으로 인플레이션이 높았던 특정 시기는 제외됩니다
wrong_answers:
  - 하이퍼인플레이션에 해당하지 않는 인플레이션 에피소드가 너무 많이 포함되어 있습니다
  - 구식이며 현대 경제에는 적용되지 않습니다
  - 인플레이션이 경제에 미치는 영향은 고려하지 않습니다
explanation: |
  한케-크루스 표와 같은 고전적인 하이퍼인플레이션 표는 종종
  엄격한 분류로 인해 특정 역사적 고인플레이션 시기를 제외합니다
  기준(예: 캐건의 정의에 명시된 월 50% 인플레이션 임계치)으로 인해 특정 역사적 고인플레이션 시기를 제외하기도 합니다.

question: Ni kizuizi kipi kuu cha meza za classic za mfumuko wa bei?
answer: Hazijumuishi vipindi fulani vya kihistoria vya mfumuko wa bei wa juu kwa sababu ya vigezo vikali vya uainishaji
wrong_answers:
  - Zinajumuisha vipindi vingi sana vya mfumuko wa bei ambavyo havifai kuwa mfumuko wa bei
  - Zimepitwa na wakati na hazitumiki kwa uchumi wa kisasa
  - Hawazingatii athari za mfumuko wa bei kwenye uchumi
explanation: |
  Jedwali la kawaida la mfumuko wa bei, kama vile meza ya Hanke-Krus, mara nyingi
  ondoa vipindi fulani vya kihistoria vya mfumuko wa bei wa juu kutokana na uainishaji mkali
  vigezo, kama vile kiwango cha juu cha mfumuko wa bei cha 50% kila mwezi kilichoainishwa na ufafanuzi wa Cagan.
reviewed: true

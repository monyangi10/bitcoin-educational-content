question: Wat is de belangrijkste beperking van de klassieke tabellen van hyperinflatie?
answer: Ze sluiten bepaalde historische perioden van hoge inflatie uit vanwege strikte classificatiecriteria
wrong_answers:
  - Ze omvatten te veel perioden van inflatie die niet kunnen worden aangemerkt als hyperinflatie
  - Ze zijn verouderd en niet van toepassing op moderne economieën
  - Ze houden geen rekening met de invloed van inflatie op de economie
explanation: |
  Klassieke tabellen van hyperinflatie, zoals de Hanke-Krus tabel, sluiten vaak
  sluiten vaak bepaalde historische perioden van hoge inflatie uit vanwege strikte classificatiecriteria, zoals de drempel van 50% maandelijkse inflatie volgens de definitie van Cagan
  criteria, zoals de drempel van 50% maandelijkse inflatie die is vastgelegd in de definitie van Cagan.

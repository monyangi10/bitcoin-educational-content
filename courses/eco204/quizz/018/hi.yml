question: क्लासिक हाइपरइन्फ्लेशन के टेबल्स की मुख्य सीमा क्या है?
answer: वे कड़े वर्गीकरण मानदंडों के कारण उच्च मुद्रास्फीति के कुछ ऐतिहासिक कालखंडों को बाहर रखते हैं।
wrong_answers:
  - उनमें बहुत सारे मुद्रास्फीति के मामले शामिल हैं जो हाइपरइन्फ्लेशन की श्रेणी में नहीं आते।
  - वे पुराने हो चुके हैं और आधुनिक अर्थव्यवस्थाओं पर लागू नहीं होते
  - वे मुद्रास्फीति के अर्थव्यवस्था पर प्रभाव को ध्यान में नहीं रखते
explanation: |
  हाइपरइन्फ्लेशन की क्लासिक टेबल्स, जैसे कि हेंके-क्रुस टेबल, अक्सर
  कुछ ऐतिहासिक समयावधियों को उच्च मुद्रास्फीति के कारण सख्त वर्गीकरण की वजह से बाहर रखें
  मापदंड, जैसे कि केगन की परिभाषा में निर्धारित 50% मासिक मुद्रास्फीति की सीमा।

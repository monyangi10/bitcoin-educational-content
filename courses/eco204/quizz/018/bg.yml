question: Кое е основното ограничение на класическите таблици за хиперинфлация?
answer: Те изключват някои исторически периоди с висока инфлация поради строги критерии за класификация
wrong_answers:
  - Те включват твърде много епизоди на инфлация, които не могат да бъдат квалифицирани като хиперинфлация
  - Те са остарели и не са приложими към съвременните икономики
  - Те не отчитат въздействието на инфлацията върху икономиката
explanation: |
  Класическите таблици за хиперинфлация, като например таблицата на Ханке-Крус, често
  изключват някои исторически периоди на висока инфлация поради строга класификация
  като например прага от 50% месечна инфлация, предвиден в определението на Каган.
reviewed: true
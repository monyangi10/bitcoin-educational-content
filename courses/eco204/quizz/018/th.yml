question: ข้อจำกัดหลักของตารางภาวะเงินเฟ้อสูงแบบคลาสสิกคืออะไร?
answer: พวกเขาไม่รวมช่วงเวลาทางประวัติศาสตร์บางช่วงที่มีอัตราเงินเฟ้อสูงเนื่องจากเกณฑ์การจำแนกที่เข้มงวด
wrong_answers:
  - พวกเขารวมถึงตอนของภาวะเงินเฟ้อมากเกินไปที่ไม่เข้าข่ายเป็นภาวะเงินเฟ้อรุนแรง
  - พวกมันล้าสมัยและไม่สามารถใช้ได้กับเศรษฐกิจสมัยใหม่
  - พวกเขาไม่ได้คำนึงถึงผลกระทบของเงินเฟ้อต่อเศรษฐกิจ
explanation: |
  ตารางคลาสสิกของภาวะเงินเฟ้อสูง เช่น ตาราง Hanke-Krus มักจะไม่รวมช่วงเวลาทางประวัติศาสตร์บางช่วงที่มีเงินเฟ้อสูงเนื่องจากเกณฑ์การจำแนกที่เข้มงวด เช่น เกณฑ์เงินเฟ้อรายเดือน 50% ที่กำหนดโดยคำจำกัดความของ Cagan
reviewed: true
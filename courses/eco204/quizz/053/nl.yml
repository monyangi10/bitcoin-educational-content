question: Wat is een van de gevolgen van de dollarisering?
answer: Verlies van autonoom monetair beleid
wrong_answers:
  - Stijging van de inflatie
  - Toename in geld Supply
  - Afname van publiek vertrouwen
explanation: |
  Dollarisering kan een einde maken aan hyperinflatie, maar het brengt andere economische
  uitdagingen. Een van de gevolgen is het verlies van autonoom monetair beleid. Zonder
  zonder eigen munt kan een land zijn monetaire beleid niet aanpassen aan interne economische schokken
  economische schokken.

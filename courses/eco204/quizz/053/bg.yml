question: Кое е едно от последствията от доларизацията?
answer: Загуба на автономна парична политика
wrong_answers:
  - Увеличаване на инфлацията
  - Увеличаване на паричното предлагане
  - Намаляване на общественото доверие
explanation: |
  Доларизацията може да сложи край на хиперинфлацията, но представлява и други икономически
  предизвикателства. Една от последиците е загубата на автономна парична политика. Без
  собствена валута, страната не може да коригира паричната си политика в отговор на вътрешни
  икономически шокове.
reviewed: true
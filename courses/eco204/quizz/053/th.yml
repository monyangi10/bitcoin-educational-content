question: หนึ่งในผลกระทบของการใช้เงินดอลลาร์คืออะไร?
answer: การสูญเสียอำนาจนโยบายการเงินอิสระ
wrong_answers:
  - เพิ่มขึ้นของอัตราเงินเฟ้อ
  - การเพิ่มขึ้นของปริมาณเงิน
  - ความเชื่อมั่นของประชาชนลดลง
explanation: |
  การใช้เงินดอลลาร์สามารถยุติภาวะเงินเฟ้อรุนแรงได้ แต่ก็ทำให้เกิดความท้าทายทางเศรษฐกิจอื่นๆ หนึ่งในผลกระทบคือการสูญเสียความเป็นอิสระทางนโยบายการเงิน เมื่อไม่มีสกุลเงินของตนเอง ประเทศไม่สามารถปรับนโยบายการเงินเพื่อตอบสนองต่อแรงกระแทกทางเศรษฐกิจภายในได้
reviewed: true
question: Ni iyihe imwe mu ngaruka z’uguhindura amadolari?
answer: Gutakaza politike y'amahera yigenga
wrong_answers:
  - Ukwiyongera kw'ibiciro
  - Ukwongerekana kw’amahera Supply.
  - Kugabanya ukwizera kwa bose
explanation: |
  Uguhindura amadolari birashobora gukuraho ugutera imbere kw’ibiciro, ariko birazana n’ibindi bihe vy’ubutunzi .
  ingorane. Kimwe mu ngaruka ni ugutakaza politike y’amahera yigenga. Ata
  amafaranga yaco bwite, igihugu ntigishobora guhindura politike yaco y’amahera kugira ngo gishobore kwishura ku bibazo vyo mu mutima .
  ivy’ubutunzi bihungabana.

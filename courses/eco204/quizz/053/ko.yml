question: 달러화의 결과 중 하나는 무엇인가요?
answer: 자율적 통화 정책의 상실
wrong_answers:
  - 인플레이션 증가
  - 돈 증가 Supply
  - 대중의 신뢰도 하락
explanation: |
  달러화는 초인플레이션을 종식시킬 수 있지만, 다른 경제
  문제를 야기합니다. 그 결과 중 하나는 자율적인 통화 정책의 상실입니다. 자국 통화가 없으면
  자체 통화가 없는 국가는 내부 경제 충격에 대응하기 위해 통화 정책을 조정할 수 없습니다
  경제 충격에 대응할 수 없습니다.
reviewed: false
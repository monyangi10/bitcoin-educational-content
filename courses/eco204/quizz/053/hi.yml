question: डॉलराइजेशन का एक नतीजा क्या है?
answer: स्वायत्त मौद्रिक नीति का नुकसान
wrong_answers:
  - महँगाई में बढ़ोतरी
  - पैसे में बढ़ोतरी Supply
  - जनता का भरोसा कम होना
explanation: |
  डॉलराइजेशन हाइपरइन्फ्लेशन को खत्म कर सकता है, लेकिन यह दूसरी आर्थिक...
  चुनौतियाँ। इसका एक नतीजा यह है कि स्वायत्त मौद्रिक नीति खो जाती है। बिना
  अपनी खुद की मुद्रा होने पर, एक देश अपनी मौद्रिक नीति को आंतरिक परिस्थितियों के अनुसार ठीक से समायोजित नहीं कर पाता।
  आर्थिक झटके।

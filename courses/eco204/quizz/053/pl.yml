question: Jaka jest jedna z konsekwencji dolaryzacji?
answer: Utrata autonomicznej polityki pieniężnej.
wrong_answers:
  - Wzrost inflacji.
  - Wzrost ilości środków pieniężnych.
  - Spadek zaufania publicznego.
explanation: |
  Dolaryzacja może zakończyć hiperinflację, ale wiąże się z innymi wyzwaniami gospodarczymi. Jedną z jej konsekwencji jest utrata autonomicznej polityki pieniężnej. Bez
  własnej waluty, kraj nie może dostosowywać swojej polityki pieniężnej w odpowiedzi na wewnętrzne wstrząsy gospodarcze.
reviewed: true

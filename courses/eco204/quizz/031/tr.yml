question: Weimar Cumhuriyeti'ndeki hiperenflasyon döneminde Alman halkının algısı nasıldı?
answer: Enflasyonu, kendi para birimlerinin içsel devalüasyonundan ziyade doların yükselişine bağladılar.
wrong_answers:
  - Yaşadıkları hiperenflasyonun altında yatan nedenin tamamen farkındaydılar.
  - Yaşadıkları ekonomik zorluklardan dolayı hükümeti suçladılar.
  - Hiperenflasyonun savaş tazminatlarının bir sonucu olduğuna inanıyorlardı.
explanation: |
  Weimar Cumhuriyeti döneminde Alman halkı enflasyonu
  doların yükselişiyle ilgili olarak yaşadıkları sıkıntıları göz ardı ederek
  ekonomik zorlukları ile parasal devalüasyon arasındaki bağlantı, özellikle de
  aşırı para yaratarak.

question: Jaka była percepcja ludności niemieckiej w okresie hiperinflacji w Republice Weimarskiej?
answer: Inflację przypisywali raczej wzrostowi wartości dolara niż wewnętrznej dewaluacji własnej waluty.
wrong_answers:
  - Byli w pełni świadomi przyczyn hiperinflacji, której doświadczali.
  - Obwiniali rząd za swoje trudności gospodarcze.
  - Uważali, że hiperinflacja była wynikiem reparacji wojennych.
explanation: |
  Ludność niemiecka w okresie Republiki Weimarskiej przypisywała inflację, której doświadczała, wzrostowi wartości dolara, odrzucając wszelkie uznanie
  związku między ich trudnościami gospodarczymi a dewaluacją pieniądza, wywołaną głównie nadmierną kreacją pieniądza przez rząd.
reviewed: true

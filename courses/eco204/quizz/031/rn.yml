question: None abantu bo mu Budagi babona gute ibintu mu kiringo c’ugutera imbere cane muri Repubulika ya Weimar?
answer: Bavuga ko ugutera imbere kw’ibiciro ari ukuduga kw’idolari aho gushingira ku gucika intege kw’agaciro k’amahera yabo bwite.
wrong_answers:
  - Bari bazi neza imvo nyamukuru y’ugutera imbere kw’ibiciro bariko barashikirwa.
  - Baciye bavuga ko Leta ari yo yatumye bagira ingorane z’ubutunzi.
  - Bemera yuko ugutera imbere kw’ibiciro kwari guterwa n’indishi z’intambara.
explanation: |
  Abanyagihugu bo mu Budagi mu gihe ca Repubulika ya Weimar bavuze ko ivyo vyatumye habaho ugutera imbere kw’ibiciro .
  bariko barashikirwa n’ugutera imbere kw’idolari, bakirengagiza kwemerwa kwose kw’
  isano hagati y’ingorane zabo z’ubutunzi n’ugucika kw’agaciro k’amahera, ahanini vyatumwe n’
  mu kurema amahera birenze urugero.

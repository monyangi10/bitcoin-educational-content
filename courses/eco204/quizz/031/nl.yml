question: Wat was de perceptie van de Duitse bevolking tijdens de hyperinflatieperiode in de Weimarrepubliek?
answer: Ze schreven de inflatie eerder toe aan de stijging van de dollar dan aan de intrinsieke devaluatie van hun eigen munt.
wrong_answers:
  - Ze waren zich volledig bewust van de onderliggende oorzaak van de hyperinflatie die ze meemaakten.
  - Ze gaven de regering de schuld van hun economische problemen.
  - Ze geloofden dat hyperinflatie het gevolg was van oorlogsvergoedingen.
explanation: |
  De Duitse bevolking tijdens de Weimarrepubliek schreef de inflatie toe aan de opkomst van de dollar
  die ze ervoeren toe aan de stijging van de dollar, waarbij ze elke erkenning van het verband
  het verband tussen hun economische problemen en monetaire devaluatie, voornamelijk veroorzaakt
  door buitensporige geldschepping.
reviewed: false
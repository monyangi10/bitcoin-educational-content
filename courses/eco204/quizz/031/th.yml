question: การรับรู้ของประชากรเยอรมันในช่วงภาวะเงินเฟ้อสูงในสาธารณรัฐไวมาร์เป็นอย่างไร?
answer: พวกเขาอ้างว่าเงินเฟ้อเกิดจากการเพิ่มขึ้นของค่าเงินดอลลาร์มากกว่าการลดค่าของสกุลเงินของพวกเขาเอง
wrong_answers:
  - พวกเขาตระหนักดีถึงสาเหตุที่แท้จริงของภาวะเงินเฟ้อสูงที่พวกเขากำลังประสบอยู่
  - พวกเขาโทษรัฐบาลสำหรับความยากลำบากทางเศรษฐกิจของพวกเขา
  - พวกเขาเชื่อว่าเงินเฟ้อสูงเป็นผลมาจากการชดใช้ค่าเสียหายจากสงคราม
explanation: |
  ประชากรชาวเยอรมันในช่วงสาธารณรัฐไวมาร์มองว่าเงินเฟ้อที่พวกเขากำลังประสบอยู่เกิดจากการเพิ่มขึ้นของค่าเงินดอลลาร์ โดยไม่ยอมรับความเชื่อมโยงระหว่างความยากลำบากทางเศรษฐกิจของพวกเขากับการลดค่าเงิน ซึ่งส่วนใหญ่เกิดจากการสร้างเงินที่มากเกินไป
reviewed: true
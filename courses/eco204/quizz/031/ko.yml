question: 바이마르 공화국 초인플레이션 기간 동안 독일 국민들의 인식은 어땠나요?
answer: 그들은 인플레이션의 원인을 자국 통화의 본질적인 평가절하보다는 달러의 상승에 있다고 생각했습니다.
wrong_answers:
  - 그들은 그들이 겪고 있는 초인플레이션의 근본적인 원인을 충분히 인식하고 있었습니다.
  - 그들은 경제적 어려움의 원인을 정부 탓으로 돌렸습니다.
  - 그들은 하이퍼인플레이션이 전쟁 배상금의 결과라고 믿었습니다.
explanation: |
  바이마르 공화국 시절 독일 국민들은 인플레이션의 원인을
  그들은 달러의 상승에 대해 경험하고 있었고, 어떤 인식도 무시했습니다
  경제적 어려움과 화폐 평가절하 사이의 연관성을 인정하지 않았습니다
  과도한 화폐 발행으로 인한 것입니다.

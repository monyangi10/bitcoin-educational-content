question: Как се възприема германското население по време на периода на хиперинфлация във Ваймарската република?
answer: Те обясняват инфлацията по-скоро с поскъпването на долара, отколкото с девалвацията на собствената си валута.
wrong_answers:
  - Те са напълно наясно с причината за хиперинфлацията, която изпитват.
  - Те обвиняват правителството за икономическите си затруднения.
  - Те смятат, че хиперинфлацията е резултат от военните репарации.
explanation: |
  По време на Ваймарската република германците обясняват инфлацията, която изпитват, с поскъпването на долара, като не признават връзката между икономическите си затруднения и паричната девалвация, предизвикана главно от прекомерното създаване на пари.
reviewed: true
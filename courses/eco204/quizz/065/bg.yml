question: Каква е основната идея на концепцията за стойността на парите във времето?
answer: Времето има стойност
wrong_answers:
  - Парите губят стойност с течение на времето
  - Парите могат да се разменят за време
  - Времето може да се обменя срещу пари
explanation: |
  Основната идея на концепцията за стойността на парите във времето е, че
  времето има стойност. Ако някой реши да плати запис на заповед на стойност 100 USD един месец предварително,
  той може да я получи например за 98 USD и да получи 100 USD на датата на падежа.
reviewed: true
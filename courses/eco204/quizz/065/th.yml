question: แนวคิดหลักเบื้องหลังแนวคิดเรื่องมูลค่าของเงินตามเวลา (Time Value of Money) คืออะไร?
answer: เวลามีค่า
wrong_answers:
  - เงินสูญเสียมูลค่าเมื่อเวลาผ่านไป
  - เงินสามารถแลกเปลี่ยนเป็นเวลาได้
  - เวลาสามารถแลกเปลี่ยนเป็นเงินได้
explanation: |
  แนวคิดหลักเบื้องหลังแนวคิดเรื่องมูลค่าของเงินตามเวลา คือ เวลา มีมูลค่า หากมีคนตัดสินใจชำระตั๋วสัญญาใช้เงินมูลค่า $100 ล่วงหน้า หนึ่งเดือน พวกเขาสามารถได้มันมาในราคา เช่น $98 และรับ $100 ในวันที่ครบกำหนด
reviewed: true
question: पैसे की समय की कीमत (Time Value of Money) का मुख्य विचार क्या है?
answer: समय की कीमत है
wrong_answers:
  - पैसे की कीमत समय के साथ कम होती जाती है
  - पैसा देकर वक्त खरीदा जा सकता है
  - समय के बदले पैसे मिल सकते हैं
explanation: |
  पैसे के समय मूल्य (टाइम वैल्यू ऑफ मनी) की अवधारणा के पीछे मुख्य विचार यह है कि
  समय की कीमत होती है। अगर कोई 100 डॉलर के प्रॉमिसरी नोट को एक महीने पहले चुकाने का फैसला करता है,
  वे इसे, उदाहरण के लिए, $98 में प्राप्त कर सकते हैं और नियत तारीख पर $100 प्राप्त कर सकते हैं।

question: 화폐의 시간 가치 개념의 주요 개념은 무엇인가요?
answer: 시간에는 가치가 있습니다
wrong_answers:
  - 시간이 지남에 따라 가치가 떨어지는 돈
  - 돈은 시간으로 교환할 수 있습니다
  - 시간을 돈으로 바꿀 수 있습니다
explanation: |
  돈의 시간 가치 개념의 기본 개념은 다음과 같습니다
  시간에는 가치가 있다는 것입니다. 누군가 100달러 상당의 약속어음을 한 달 전에 미리 지불하기로 결정했다고 가정해 보겠습니다,
  예를 들어 98달러에 어음을 발행하고 만기일에 100달러를 받을 수 있습니다.
reviewed: false
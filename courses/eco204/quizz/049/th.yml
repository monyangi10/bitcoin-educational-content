question: ตามที่ Bernholz กล่าว วิธีเดียวที่จะยุติภาวะเงินเฟ้อคืออะไร?
answer: ดำเนินการปฏิรูปการเงินและกำหนดข้อจำกัดต่อรัฐบาล
wrong_answers:
  - เพิ่มปริมาณเงินในระบบ
  - ลดปริมาณเงินในระบบ
  - รับสกุลเงินต่างประเทศ
explanation: |
  Bernholz แนะนำว่าวิธีเดียวที่จะยุติภาวะเงินเฟ้อคือการดำเนินการปฏิรูปทางการเงินและกำหนดข้อจำกัดต่อรัฐบาล ซึ่งรวมถึงการจัดตั้งสถาบัน เช่น ธนาคารกลาง ที่ดำเนินการอย่างอิสระจากการตัดสินใจทางการเมืองของรัฐบาล
reviewed: true
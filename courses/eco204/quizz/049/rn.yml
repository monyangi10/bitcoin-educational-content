question: Nk’uko Bernold abivuga, ni ubuhe buryo bwonyene bwo gukuraho inflation?
answer: Gukora ivugurura ry'amahera no gushinga amategeko kuri leta
wrong_answers:
  - Wongere amahera Supply.
  - Gabanya amahera Supply.
  - Kwemera amafaranga y'amahanga
explanation: |
  Bernold avuga ko uburyo bwonyene bwo gukuraho ugutera imbere kw’ibiciro ari ugukora .
  ivugurura ry’amahera no gushinga amategeko kuri Leta. Ivyo birimwo n’ugushinga .
  y’ikigo, nk’akarorero banki nkuru, ikora yigenga ku .
  ingingo za politike za leta.

question: 버놀드에 따르면 인플레이션을 종식시킬 수 있는 유일한 방법은 무엇일까요?
answer: 통화 개혁을 수행하고 정부에 제한을 부과합니다
wrong_answers:
  - 돈 Supply 증가
  - 돈 Supply 감소
  - 외화 채택
explanation: |
  버놀드는 인플레이션을 종식시키는 유일한 방법은
  통화 개혁을 실시하고 정부에 규제를 가하는 것입니다. 여기에는 중앙은행과 같은
  중앙은행과 같은 기관을 설립하여 정부의 정치적 결정과
  중앙은행과 같은 기관을 설립해야 합니다.

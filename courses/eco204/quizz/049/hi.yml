question: बर्नोल्ड के मुताबिक, महंगाई को खत्म करने का एकमात्र तरीका क्या है?
answer: मुद्रा सुधार करो और सरकार पर पाबंदियां लगाओ
wrong_answers:
  - पैसे बढ़ा दो Supply
  - Supply का पैसा कम करो
  - विदेशी मुद्रा अपनाएं
explanation: |
  बर्नोल्ड का सुझाव है कि महंगाई को खत्म करने का एकमात्र तरीका है कि एक...
  मौद्रिक सुधार और सरकार पर पाबंदियां लगाना। इसमें स्थापना शामिल है...
  एक संस्था का, जैसे कि एक केंद्रीय बैंक, जो स्वतंत्र रूप से काम करता है
  सरकार के राजनीतिक फैसले।
reviewed: false
question: Kulingana na Bernold, ni njia ipi pekee ya kumaliza mfumuko wa bei?
answer: Kufanya mageuzi ya fedha na kuweka vikwazo kwa serikali
wrong_answers:
  - Ongeza pesa za Supply
  - Punguza pesaza  Supply
  - Kupitisha fedha za kigeni
explanation: |
  Bernold anapendekeza kuwa njia pekee ya kumaliza mfumuko wa bei ni kutekeleza
  mageuzi ya fedha na kuweka vikwazo kwa serikali. Hii inahusisha kuanzishwa
  ya taasisi, kama vile benki kuu, inayofanya kazi kwa uhuru kutoka kwa
  maamuzi ya kisiasa ya serikali.
reviewed: true

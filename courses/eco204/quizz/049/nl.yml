question: Wat is volgens Bernholz de enige methode om een einde te maken aan de inflatie?
answer: Voer een monetaire hervorming door en leg de overheid beperkingen op
wrong_answers:
  - Verhoog het geld Supply
  - Verlaag het geld Supply
  - Een vreemde valuta aannemen
explanation: |
  Bernholz suggereert dat de enige manier om een einde te maken aan de inflatie het doorvoeren van een
  monetaire hervorming door te voeren en de overheid beperkingen op te leggen. Dit houdt de oprichting in
  van een instelling, zoals een centrale bank, die onafhankelijk opereert van de
  politieke beslissingen van de regering.
reviewed: false
question: Според Бернхолц кой е единственият метод за прекратяване на инфлацията?
answer: Провеждане на парична реформа и налагане на ограничения на правителството
wrong_answers:
  - Увеличаване на паричното предлагане
  - Намаляване на паричното предлагане
  - Приемане на чуждестранна валута
explanation: |
  Бернхолц смята, че единственият начин да се сложи край на инфлацията е да се извърши
  парична реформа и да се наложат ограничения на правителството. Това включва създаването на
  на институция, като например централна банка, която да действа независимо от
  политическите решения на правителството.
reviewed: true
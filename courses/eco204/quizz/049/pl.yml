question: Jaka jest jedyna metoda skończenia z inflacjią według Bernholza?
answer: Przeprowadzenie reformy monetarnej i nałożenie ograniczeń na rząd.
wrong_answers:
  - Zwiększenie ilości pieniędzy.
  - Zmniejszenie ilości pieniądzy.
  - Przyjęcie obcej waluty.
explanation: |
  Bernholz sugeruje, że jedynym sposobem na skończenie z inflacją jest przeprowadzenie reformy monetarnej i nałożenie ograniczeń na rząd. Wiąże się to z ustanowieniem
  instytucji, takiej jak bank centralny, która działa niezależnie od decyzji politycznych rządu.
reviewed: true

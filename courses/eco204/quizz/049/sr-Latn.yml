question: Prema Bernoldu, koji je jedini metod za zaustavljanje inflacije?
answer: Sprovesti monetarnu reformu i nametnuti ograničenja vladi
wrong_answers:
  - Povećaj novac Supply
  - Smanji novac Supply
  - Usvojiti stranu valutu
explanation: |
  Bernold predlaže da je jedini način za zaustavljanje inflacije sprovođenje monetarne reforme i uvođenje ograničenja vladi. Ovo podrazumeva osnivanje institucije, kao što je centralna banka, koja funkcioniše nezavisno od političkih odluka vlade.

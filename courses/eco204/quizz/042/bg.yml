question: Каква е валутата на Аржентина преди 1826 г.?
answer: Испанският долар.
wrong_answers:
  - Аржентинското песо.
  - Песото moneda nacional.
  - Песото real.
explanation: |
  Преди 1826 г. Аржентина използва испанския долар. След обявяването на независимостта си
  през 1816 г., тя въвежда своя собствена валута, базирана на испанския реал, в резултат на което
  създаването на подобна валута.
reviewed: true
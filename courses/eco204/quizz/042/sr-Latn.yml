question: Kožica.
answer: Španski dolar.
wrong_answers:
  - Argentinski pezo.
  - Peso moneda nacional.
  - Pezo real.
explanation: |
  Pre 1826. godine, Argentina je koristila španski dolar. Nakon sticanja nezavisnosti 1816. godine, uvela je sopstvenu valutu zasnovanu na španskom realu, što je rezultiralo stvaranjem slične valute.

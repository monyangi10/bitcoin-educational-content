question: None amafaranga yo muri Argentine imbere y’umwaka wa 1826 yari ayahe?
answer: Idolari ry’Igisupanyoli.
wrong_answers:
  - Ipeso ya Argentine.
  - Ipeso y’igihugu.
  - Ipeso nyayo.
explanation: |
  Imbere y’umwaka wa 1826, Argentine yakoresha idolari ry’Igisupanyoli. Inyuma y'ukwikukira kwayo .
  mu 1816, ryarashizeho amahera yaryo bwite ashingiye ku mafaranga y’ukuri y’Igisupanyoli, ivyo bikaba vyatumye 1816.
  kurema amafaranga asa n’ayo.
reviewed: false
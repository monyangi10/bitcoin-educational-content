question: 1826 से पहले अर्जेंटीना की मुद्रा क्या थी?
answer: स्पेनिश डॉलर।
wrong_answers:
  - अर्जेंटीनी पेसो।
  - पेसो मोनेदा नैशनल।
  - पेसो रियल।
explanation: |
  1826 से पहले, अर्जेंटीना स्पेनिश डॉलर का इस्तेमाल करता था। आज़ादी के बाद...
  1816 में, इसने स्पेनिश रियल के आधार पर अपनी खुद की मुद्रा शुरू की, जिसका नतीजा यह हुआ कि
  एक ऐसी ही मुद्रा का निर्माण।
reviewed: false
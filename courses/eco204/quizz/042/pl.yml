question: Co było walutą Argentyny przed 1826 rokiem?
answer: Dolar hiszpański.
wrong_answers:
  - Peso argentyńskie.
  - Peso moneda nacional.
  - Peso real.
explanation: |
  Przed 1826 r. Argentyna używała dolara hiszpańskiego. Po uzyskaniu niepodległości
  w 1816 r. wprowadziła własną walutę opartą na hiszpańskim realu, co doprowadziło do
  stworzenia podobnej waluty.
reviewed: true

question: สกุลเงินของอาร์เจนตินาก่อนปี 1826 คืออะไร?
answer: ดอลลาร์สเปน
wrong_answers:
  - เปโซอาร์เจนตินา
  - เปโซโมเนดาเนซิอองนาล
  - เปโซจริง
explanation: |
  ก่อนปี 1826 อาร์เจนตินาใช้เงินดอลลาร์สเปน หลังจากได้รับเอกราชในปี 1816 อาร์เจนตินาได้แนะนำสกุลเงินของตนเองที่อิงตามเงินเรียลสเปน ส่งผลให้เกิดการสร้างสกุลเงินที่คล้ายกัน
reviewed: true
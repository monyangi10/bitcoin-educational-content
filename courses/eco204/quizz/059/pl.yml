question: Jaka była pierwsza warstwa pieniądza w XIII-wiecznych Włoszech?
answer: Złoto, reprezentowane przez floren.
wrong_answers:
  - Rachunki giełdowe
  - Weksle własne
  - Srebrne monety
explanation: |
  W XIII-wiecznych Włoszech, a konkretnie we Florencji, pierwszą warstwą pieniądza
  było prawdziwe złoto - złotnicy emitowali weksle wymiany w zamian za zdeponowane złote floreny.
reviewed: true

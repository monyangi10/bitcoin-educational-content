question: อะไรคือชั้นแรกของเงินในอิตาลีศตวรรษที่ 13?
answer: ทองคำ, แทนด้วยฟลอริน
wrong_answers:
  - ตั๋วแลกเงิน
  - ตั๋วสัญญาใช้เงิน
  - เหรียญเงิน
explanation: |
  ในศตวรรษที่ 13 อิตาลี โดยเฉพาะเมืองฟลอเรนซ์ ชั้นแรกของเงินคือทองคำจริง ซึ่งแสดงโดยฟลอริน ช่างทองออกตั๋วแลกเงินเพื่อแลกกับฟลอรินที่ฝากไว้ ซึ่งก่อให้เกิดชั้นที่สองของเงิน
reviewed: true
question: Какъв е първият паричен слой в Италия през XIII век?
answer: Златото, представено от флорина
wrong_answers:
  - Валутни сметки
  - Записи на заповед
  - Сребърни монети
explanation: |
  През XIII в. в Италия, по-конкретно във Флоренция, се създава първият слой пари
  е истинско злато, представено от флорина. Златарите издават менителници в
  в замяна на депозираните флорини, които формират втория паричен слой.
reviewed: true
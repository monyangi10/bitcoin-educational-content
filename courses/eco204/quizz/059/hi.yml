question: 13वीं सदी के इटली में पैसे का पहला Layer क्या था?
answer: सोना, जिसे फ्लोरिन द्वारा दर्शाया जाता है
wrong_answers:
  - जीडब्ल्यू-1 के बिल
  - प्रॉमिसरी नोट्स
  - चांदी के सिक्के
explanation: |
  13वीं सदी के इटली में, खासकर फ्लोरेंस में, पैसे का पहला Layer
  असली सोना था, जिसे फ्लोरिन द्वारा दर्शाया गया था। सुनारों ने Exchange के बिल जारी किए थे।
  जीडब्ल्यू-4 जमा किए गए फ्लोरिन के लिए, जिसने पैसे का दूसरा जीडब्ल्यू-5 बनाया।
reviewed: false
question: Wat was de eerste Layer van geld in het 13e eeuwse Italië?
answer: Goud, vertegenwoordigd door de florijn
wrong_answers:
  - Rekeningen van Exchange
  - Promessen
  - Zilveren munten
explanation: |
  In het 13e-eeuwse Italië, met name in Florence, was de eerste Layer van geld
  echt goud, vertegenwoordigd door de florijn. Goudsmeden gaven biljetten uit van Exchange in
  Exchange voor ingelegde florijnen, die de tweede Layer van geld vormden.

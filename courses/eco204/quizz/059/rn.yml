question: Ni igiki cari Layer ya mbere y’amahera mu kinjana ca 13 mu Butaliyano?
answer: Inzahabu, igereranywa n’iyitwa florin .
wrong_answers:
  - Amafaranga y’amafaranga y’i Exchange.
  - Amakete y'isezerano
  - Ibiceri vy'ifeza
explanation: |
  Mu kinjana ca 13 Ubutaliyano, canecane Florence, Layer ya mbere y’amahera .
  yari inzahabu nyayo, igereranywa n’iflorin. Abacuzi b’inzahabu barasohoye amafaranga y’i Exchange mu 1999.
  Exchange ku ma florins yashizwemwo, ayo na yo akaba yari Layer ya kabiri y’amahera.

question: Ni uruhara uruhe rw’ivyo umuntu yitega n’inyifato y’abakozi b’ubutunzi mu bijanye n’ugucapura amahera n’ugutera imbere kw’ibiciro?
answer: Ugukekeranya mu vy’ubutunzi be n’ivyo abakozi b’ubutunzi biteze birashobora kwihutisha canke gutevya ingaruka z’ugutera imbere kw’ibiciro z’icapa ry’amahera.
wrong_answers:
  - Ivyo umuntu yitega n’inyifato y’abakozi b’ubutunzi ntaco bihindura ku bijanye n’isano riri hagati y’ugucapura amahera n’ugutera imbere kw’ibiciro.
  - Ivyo umuntu yitega be n’inyifato y’abakozi b’ubutunzi vyama vyihuta ingaruka z’ugutera imbere kw’ibiciro z’ugucapura amahera.
  - Ivyo umuntu yitega be n’inyifato y’abakozi b’ubutunzi vyama bitera intege ingaruka z’ugutera imbere kw’ibiciro z’ugucapura amahera.
explanation: |
  Ico kigabane kirasigura yuko akarorero ka Repubulika ya Weimar kerekana .
  uruhara rw'ivyo umuntu yitega n'inyifato y'abakozi b'ubutunzi mu migenderanire
  hagati y’ugucapura amahera n’ugutera imbere kw’ibiciro. Ugukekeranya mu vy'ubutunzi n'ivyo twiteze
  y'abakozi b'ubutunzi bashobora kwihutisha canke gutevya ingaruka z'ugutera imbere kw'amahera
  gucapura.

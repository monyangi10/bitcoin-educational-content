question: Para basımı ve enflasyon arasındaki ilişkide beklentilerin ve ekonomik aktörlerin davranışlarının rolü nedir?
answer: Ekonomik belirsizlikler ve ekonomik aktörlerin beklentileri para basmanın enflasyonist etkilerini hızlandırabilir ya da geciktirebilir.
wrong_answers:
  - Beklentilerin ve ekonomik aktörlerin davranışlarının para basımı ve enflasyon arasındaki ilişki üzerinde hiçbir etkisi yoktur.
  - Beklentiler ve ekonomik aktörlerin davranışları, para basmanın enflasyonist etkilerini her zaman hızlandırır.
  - Beklentiler ve ekonomik aktörlerin davranışları, para basmanın enflasyonist etkilerini her zaman geciktirir.
explanation: |
  Bu bölümde, Weimar Cumhuriyeti örneğinin aşağıdakileri gösterdiği açıklanmaktadır
  beklentilerin ve ekonomik aktörlerin davranışlarının ilişkideki rolü
  para basımı ve enflasyon arasında bir ilişki vardır. Ekonomik belirsizlikler ve beklentiler
  ekonomik aktörler paranın enflasyonist etkilerini hızlandırabilir ya da geciktirebilir
  baskı.

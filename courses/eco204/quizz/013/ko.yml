question: 화폐 인쇄와 인플레이션의 관계에서 기대와 경제 주체들의 행동은 어떤 역할을 하나요?
answer: 경제적 불확실성과 경제 주체들의 기대는 화폐 발행의 인플레이션 효과를 가속화하거나 지연시킬 수 있습니다.
wrong_answers:

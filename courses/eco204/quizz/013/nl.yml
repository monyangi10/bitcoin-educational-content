question: Wat is de rol van verwachtingen en het gedrag van economische agenten in de relatie tussen het drukken van geld en inflatie?
answer: Economische onzekerheden en de verwachtingen van economische agenten kunnen de inflatoire effecten van het drukken van geld versnellen of vertragen.
wrong_answers:
  - Verwachtingen en het gedrag van economische agenten hebben geen invloed op de relatie tussen het drukken van geld en inflatie.
  - Verwachtingen en het gedrag van economische agenten versnellen altijd de inflatoire effecten van het drukken van geld.
  - Verwachtingen en het gedrag van economische agenten vertragen altijd de inflatoire effecten van het drukken van geld.
explanation: |
  Het hoofdstuk legt uit dat het voorbeeld van de Weimarrepubliek illustreert
  de rol van verwachtingen en het gedrag van economische agenten in de relatie
  tussen het drukken van geld en inflatie. Economische onzekerheden en de verwachtingen
  van economische agenten kunnen de inflatoire effecten van geld drukken versnellen of vertragen
  geld printen.

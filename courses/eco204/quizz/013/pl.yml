question: Jaka jest rola oczekiwań i zachowania podmiotów gospodarczych na związek między drukowaniem pieniędzy a inflacją?
answer: Niepewność gospodarcza i oczekiwania podmiotów gospodarczych mogą przyspieszyć lub opóźnić inflacyjne skutki dodruku pieniądza.
wrong_answers:
  - Oczekiwania i zachowanie podmiotów gospodarczych nie mają wpływu na związek między dodrukiem pieniądza a inflacją.
  - Oczekiwania i zachowanie podmiotów gospodarczych zawsze przyspieszają inflacyjne skutki dodruku pieniądza.
  - Oczekiwania i zachowanie podmiotów gospodarczych zawsze opóźniają inflacyjne skutki dodruku pieniądza.
explanation: |
  W rozdziale tym zaprezentowano przykład Republiki Weimarskiej ilustrujący
  wpływ oczekiwań i zachowań podmiotów gospodarczych na relację między dodrukiem pieniądza a inflacją. Niepewność gospodarcza i oczekiwania
  mogą przyspieszyć lub opóźnić inflacyjne skutki dodruku pieniądza.
reviewed: true

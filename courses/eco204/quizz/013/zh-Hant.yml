question: 在印鈔機和通貨膨脹之間的關係中，預期和經濟代理人的行為扮演什麼角色？
answer: 經濟的不確定性和經濟代理人的預期可以加速或延遲印鈔的通貨膨脹效應。
wrong_answers:
  - 預期與經濟代理人的行為對印鈔與通貨膨脹之間的關係並無影響。
  - 預期和經濟代理人的行為總是會加速印鈔機的通貨膨脹效應。
  - 預期和經濟代理人的行為總是會延遲印鈔的通貨膨脹效應。
explanation: |
  本章說明魏瑪共和國的例子說明
  預期的角色與經濟代理人的行為關係
  印鈔與通貨膨脹之間的關係。經濟不確定性與預期
  經濟代理人的行為可以加速或延遲貨幣的通貨膨脹效應。
  印刷。
reviewed: false
question: Koja je uloga očekivanja i ponašanja ekonomskih agenata u odnosu između štampanja novca i inflacije?
answer: Ekonomske neizvesnosti i očekivanja ekonomskih agenata mogu ili ubrzati ili odložiti inflatorne efekte štampanja novca.
wrong_answers:
  - Očekivanja i ponašanje ekonomskih agenata nemaju uticaj na odnos između štampanja novca i inflacije.
  - Očekivanja i ponašanje ekonomskih agenata uvek ubrzavaju inflatorne efekte štampanja novca.
  - Očekivanja i ponašanje ekonomskih agenata uvek odlažu inflatorne efekte štampanja novca.
explanation: |
  Poglavlje objašnjava da primer Vajmarske Republike ilustruje ulogu očekivanja i ponašanja ekonomskih agenata u odnosu između štampanja novca i inflacije. Ekonomske neizvesnosti i očekivanja ekonomskih agenata mogu ili ubrzati ili odložiti inflatorne efekte štampanja novca.

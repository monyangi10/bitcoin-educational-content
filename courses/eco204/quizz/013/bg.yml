question: Каква е ролята на очакванията и поведението на икономическите агенти във връзката между печатането на пари и инфлацията?
answer: Икономическата несигурност и очакванията на икономическите агенти могат да ускорят или забавят инфлационните ефекти от печатането на пари.
wrong_answers:
  - Очакванията и поведението на икономическите агенти не оказват влияние върху връзката между печатането на пари и инфлацията.
  - Очакванията и поведението на икономическите агенти винаги ускоряват инфлационните ефекти от печатането на пари.
  - Очакванията и поведението на икономическите агенти винаги забавят инфлационните ефекти от печатането на пари.
explanation: |
  В главата се обяснява, че примерът с Ваймарската република илюстрира
  ролята на очакванията и поведението на икономическите агенти във взаимоотношенията
  между печатането на пари и инфлацията. Икономическата несигурност и очакванията
  на икономическите агенти могат или да ускорят, или да забавят инфлационните ефекти на паричните
  печатането на пари.
reviewed: true
question: Welke strategie gebruikten de Verenigde Staten in 1933-1934 om de dollar te devalueren?
answer: De overheid nam het goud van de burgers in beslag en veranderde vervolgens de spelregels door de waarde van het goud te herwaarderen ten gunste van de schatkist en ten nadele van degenen die hun goud in eerste instantie hadden ingeruild voor bankbiljetten.
wrong_answers:
  - De overheid verhoogde de Supply van goud en veranderde vervolgens de spelregels door de waarde van goud te devalueren ten gunste van de schatkist en ten nadele van degenen die hun goud aanvankelijk hadden ingewisseld voor bankbiljetten.
  - De overheid nam het goud van de burgers in beslag en veranderde vervolgens de spelregels door de waarde van het goud te devalueren ten gunste van de schatkist en ten nadele van degenen die hun goud in eerste instantie hadden ingeruild voor bankbiljetten.
  - De overheid verhoogde de Supply van goud en veranderde vervolgens de spelregels door de waarde van goud te herwaarderen ten gunste van de schatkist en ten nadele van degenen die hun goud aanvankelijk hadden ingewisseld voor bankbiljetten.
explanation: |
  In 1933 nam de Amerikaanse overheid het goud van de burgers in beslag. In 1934
  de goudprijs geherwaardeerd naar $35 per ounce, in plaats van $20,67. In wezen devalueerde de
  devalueerde de overheid de dollar die mensen bezaten. Door goud van de bevolking te kopen
  voor $20,67 per ounce in 1933, en vervolgens de goudprijs te revalueren in 1934, maakte de regering
  een aanzienlijke winst terwijl ze het spaargeld van haar burgers devalueerde

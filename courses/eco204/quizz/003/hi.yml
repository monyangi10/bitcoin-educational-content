  - सरकार ने नागरिकों का सोना जब्त कर लिया, फिर खेल के नियम बदल दिए—सोने की कीमत घटाकर खजाने को फायदा पहुंचाया और उन लोगों को नुकसान पहुंचाया जिन्होंने शुरू में अपना सोना नोटों के बदले दिया था।
  - सरकार ने सोने का Supply बढ़ा दिया, फिर खेल के नियम बदल दिए और सोने की कीमत को फिर से निर्धारित करके खजाने को फायदा पहुंचाया और उन लोगों को नुकसान पहुंचाया जिन्होंने शुरू में अपना सोना नोटों के बदले में बदला था।
explanation: |
  1933 में, अमेरिकी सरकार ने नागरिकों का सोना ज़ब्त कर लिया। फिर 1934 में, उन्होंने...
  सोने की कीमत को $20.67 के बजाय $35 प्रति औंस पर पुनर्मूल्यांकित किया। मूल रूप से,
  सरकार ने डॉलर की कीमत घटा दी जो लोगों के पास थे। जनता से सोना खरीदकर।
  1933 में $20.67 प्रति औंस की कीमत पर, और फिर 1934 में सोने की कीमत को पुनर्मूल्यांकित करके, सरकार ने
  "अपने नागरिकों की बचत को कम करते हुए भारी मुनाफ़ा कमाया।"

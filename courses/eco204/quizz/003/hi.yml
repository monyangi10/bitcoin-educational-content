question: 1933-1934 में अमेरिका ने डॉलर की कीमत कम करने के लिए क्या रणनीति अपनाई थी?
answer: सरकार ने नागरिकों का सोना जब्त कर लिया, फिर खेल के नियम बदल दिए और सोने की कीमत को फिर से तय किया ताकि खजाने को फायदा हो और जिन लोगों ने शुरू में अपना सोना नोटों के बदले बेचा था, उन्हें नुकसान हो।

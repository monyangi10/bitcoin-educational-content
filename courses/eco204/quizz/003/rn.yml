explanation: |
  Mu mwaka w'1933, Leta ya Amerika yafashe inzahabu y'abanyagihugu. Hanyuma mu 1934, bara .
  yasubiyemwo igiciro c’inzahabu kikaja ku madolari 35 ku nkoko, aho kuba amadolari 20,67. Mu vy’ukuri, i
  guverinoma yaciye igabanya agaciro k’idolari abantu bari bafise. Mu kugura inzahabu mu bantu .
  ku madolari 20,67 ku nkoko imwe mu 1933, hanyuma mu 1934, leta isubiramwo agaciro k’igiciro c’inzahabu .
  yaronse inyungu nyinshi mu gihe yariko iragabanya agaciro k'amahera abanyagihugu bayo bazigamye.'

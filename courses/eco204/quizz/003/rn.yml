question: Ni ubuhe buryo Leta Zunze Ubumwe za Amerika zakoresheje mu 1933-1934 kugira ngo zigabanye agaciro k’idolari?
answer: Leta yafashe inzahabu z’abanyagihugu, hanyuma ihindura amategeko y’urukino mu gusubira gupima agaciro k’inzahabu kugira ngo ivyungukireko ububiko bw’inzahabu, bigirire nabi abari barahinduye inzahabu yabo mu ntango amafaranga y’amafaranga.

question: Jaką strategię zastosowały Stany Zjednoczone w latach 1933-1934 w celu dewaluacji dolara?
answer: Rząd przejął złoto obywateli, a następnie zmienił zasady gry, przeszacowując wartość złota na korzyść skarbu państwa i na niekorzyść tych, którzy początkowo wymienili swoje złoto na banknoty.

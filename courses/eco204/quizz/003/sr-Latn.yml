question: Koja je strategija korišćena od strane Sjedinjenih Američkih Država 1933-1934 za devalvaciju dolara?
answer: Vlada je zaplenila zlato građana, a zatim promenila pravila igre revalorizacijom vrednosti zlata kako bi koristila državnoj kasi i nanela štetu onima koji su prvobitno zamenili svoje zlato za novčanice.

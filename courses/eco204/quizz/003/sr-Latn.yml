explanation: |
  Godine 1933, vlada SAD-a zaplenila je zlato građana. Zatim su 1934. godine
  revalorizovali cenu zlata na $35 po unci, umesto $20.67. U suštini, vlada je
  devalvirala dolar koji su ljudi posedovali. Kupovinom zlata od stanovništva
  po $20.67 po unci 1933. godine, a zatim revalorizacijom cene zlata 1934. godine, vlada je
  ostvarila značajan profit dok je devalvirala ušteđevinu svojih građana.

question: Каква е стратегията, използвана от САЩ през 1933-1934 г., за обезценяване на долара?
answer: Правителството конфискува златото на гражданите, след което променя правилата на играта, като преоценява стойността на златото в полза на държавната хазна и в ущърб на онези, които първоначално са обменили златото си срещу банкноти.
wrong_answers:
  - Правителството увеличава предлагането на злато, след което променя правилата на играта, като обезценява стойността на златото в полза на държавната хазна и в ущърб на онези, които първоначално са обменили златото си срещу банкноти.
  - Правителството конфискува златото на гражданите, след което променя правилата на играта, като обезценява стойността на златото в полза на държавната хазна и в ущърб на онези, които първоначално са обменили златото си срещу банкноти.
  - Правителството увеличава предлагането на злато, а след това променя правилата на играта, като преоценява стойността на златото в полза на хазната и в ущърб на онези, които първоначално са обменили златото си срещу банкноти.
explanation: |
  През 1933 г. правителството на САЩ конфискува златото на гражданите. След това през 1934 г. преоценява цената на златото на 35 долара за унция, вместо на 20.67 долара. По същество правителството обезцени долара, който хората притежаваха. Чрез изкупуване на злато от населението по 20.67 долара за унция през 1933 г., а след това ревалоризира цената на златото през 1934 г., правителството реализира значителна печалба, докато обезценява спестяванията на своите граждани.
reviewed: true

question: กลยุทธ์ที่สหรัฐอเมริกาใช้ในปี 1933-1934 เพื่อทำให้ค่าเงินดอลลาร์ลดลงคืออะไร?
answer: รัฐบาลยึดทองคำของประชาชน จากนั้นเปลี่ยนกติกาโดยการปรับมูลค่าทองคำใหม่เพื่อให้เป็นประโยชน์ต่อคลังและทำให้ผู้ที่แลกเปลี่ยนทองคำเป็นธนบัตรในตอนแรกเสียเปรียบ
wrong_answers:
  - รัฐบาลเพิ่มปริมาณทองคำในตลาด จากนั้นเปลี่ยนกฎของเกมโดยการลดค่าเงินของทองคำเพื่อให้เป็นประโยชน์ต่อคลังและทำให้ผู้ที่แลกเปลี่ยนทองคำเป็นธนบัตรในตอนแรกเสียเปรียบ
  - รัฐบาลยึดทองคำของประชาชน จากนั้นเปลี่ยนกฎของเกมโดยการลดค่าเงินของทองคำเพื่อเป็นประโยชน์ต่อคลังและทำให้ผู้ที่แลกเปลี่ยนทองคำเป็นธนบัตรในตอนแรกเสียเปรียบ
  - รัฐบาลเพิ่มปริมาณทองคำในตลาด จากนั้นเปลี่ยนกฎของเกมโดยการประเมินมูลค่าทองคำใหม่เพื่อให้เป็นประโยชน์ต่อคลังและทำให้ผู้ที่แลกเปลี่ยนทองคำเป็นธนบัตรในตอนแรกเสียเปรียบ
explanation: |
  ในปี 1933 รัฐบาลสหรัฐฯ ได้ยึดทองคำของพลเมือง จากนั้นในปี 1934 พวกเขาได้
  ประเมินราคาใหม่ของทองคำเป็น $35 ต่อออนซ์ แทนที่จะเป็น $20.67 โดยพื้นฐานแล้ว
  รัฐบาลได้ลดค่าเงินดอลลาร์ที่ประชาชนถือครอง โดยการซื้อทองคำจากประชาชน
  ในราคา $20.67 ต่อออนซ์ในปี 1933 และจากนั้นประเมินราคาใหม่ของทองคำในปี 1934 รัฐบาล
  ได้กำไรอย่างมากในขณะที่ลดค่าการออมของพลเมือง
reviewed: true
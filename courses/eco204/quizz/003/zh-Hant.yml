question: 美國在 1933-1934 年使用什麼策略讓美元貶值？
answer: 政府扣押了公民的黃金，然後通過重估黃金價值來改變遊戲規則，使國庫受益，而對那些最初用黃金兌換紙幣的人不利。
wrong_answers:
  - 政府增加了黃金的 Supply，然後通過黃金貶值來改變遊戲規則，使國庫受益，並對那些最初用黃金兌換紙幣的人不利。
  - 政府扣押了公民的黃金，然後通過貶低黃金價值來改變遊戲規則，使國庫受益，並對那些最初用黃金兌換紙幣的人不利。
  - 政府增加了黃金的 Supply，然後通過重估黃金價值改變了遊戲規則，使國庫受益，而對那些最初用黃金兌換紙幣的人不利。
explanation: |
  1933 年，美國政府扣押了公民的黃金。然後在 1934 年，他們
  黃金價格從每盎司 20.67 美元重估為每盎司 35 美元。基本上
  政府使人民擁有的美元貶值。透過向人民購買黃金
  在 1933 年，黃金價格為每盎司 20.67 美元，然後在 1934 年重估黃金價格。
  在貶值國民儲蓄的同時賺取了可觀的利潤。

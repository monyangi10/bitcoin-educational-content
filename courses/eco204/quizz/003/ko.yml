question: 1933~1934년 미국이 달러 가치를 떨어뜨리기 위해 사용한 전략은 무엇인가요?
answer: 정부는 시민들의 금을 압수한 다음, 금의 가치를 재평가하여 국고에 이익을 주고 처음에 금을 지폐로 교환한 사람들에게 불이익을 주는 방식으로 게임의 규칙을 변경했습니다.

question: ज़िम्बाब्वे ने महंगाई से निपटने के लिए क्या उपाय अपनाया था?
answer: डॉलराइजेशन
wrong_answers:
  - ज़्यादा पैसा छापना
  - एक नया मुद्रा का परिचय
  - Supply का पैसा कम करना
explanation: |
  ज़िम्बाब्वे ने महंगाई से निपटने के लिए डॉलराइज़ेशन अपनाया। इसका मतलब है कि उन्होंने
  अमेरिकी डॉलर या पड़ोसी देशों की अन्य मुद्राओों को अपना लिया, जिससे रोक लगती है
  सरकार को मनमर्जी से पैसा छापने से रोकना।
reviewed: false
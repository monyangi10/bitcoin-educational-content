question: Ni umuti uwuhe Zimbabwe yafashe kugira ngo irwanye ugutera imbere kw’ibiciro?
answer: Guhindura amadolari
wrong_answers:
  - Gucapura amafranga menshi
  - Kuzana amafaranga mashasha
  - Kugabanya amahera Supply.
explanation: |
  Zimbabwe yemeye gukoresha amadolari kugira ngo irwanye ugutakaza agaciro kw'ibiciro. Ivyo bisigura ko bo .
  yaremeye idolari ry’Amerika canke ayandi mafaranga ava mu bihugu bihegereye, ivyo bikaba bibuza .
  leta ntiyicapure amahera uko ishatse.

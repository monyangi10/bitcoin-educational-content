question: วิธีแก้ปัญหาที่ซิมบับเวนำมาใช้เพื่อรับมือกับเงินเฟ้อคืออะไร?
answer: ดอลลาร์ไลเซชัน
wrong_answers:
  - การพิมพ์เงินเพิ่ม
  - แนะนำสกุลเงินใหม่
  - การลดปริมาณเงินในระบบ
explanation: |
  ซิมบับเวนำการใช้เงินดอลลาร์มาใช้เพื่อต่อต้านเงินเฟ้อ ซึ่งหมายความว่าพวกเขา
  นำเงินดอลลาร์สหรัฐหรือสกุลเงินอื่น ๆ จากประเทศเพื่อนบ้านมาใช้ ซึ่งป้องกัน
  รัฐบาลจากการพิมพ์เงินตามอำเภอใจ
reviewed: true
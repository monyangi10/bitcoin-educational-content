question: Jakie było rozwiązanie przyjęte przez Zimbabwe w celu przeciwdziałaniu inflacji?
answer: Dolaryzacja.
wrong_answers:
  - Drukowanie większej ilości pieniędzy.
  - Wprowadzenie nowej waluty.
  - Zmniejszenie ilości pieniędzy.
explanation: |
  Zimbabwe przyjęło dolaryzację jako metodę przeciwdziałania inflacji. Oznacza to przyjęcie
  dolara amerykańskiego jako oficjalnej waluty kraju, co uniemożliwiło rządowi drukowanie pieniędzy do woli.
reviewed: true

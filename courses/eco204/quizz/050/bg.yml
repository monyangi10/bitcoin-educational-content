question: Какво е решението, прието от Зимбабве за борба с инфлацията?
answer: Доларизация
wrong_answers:
  - Печатане на повече пари
  - Въвеждане на нова валута
  - Намаляване на паричното предлагане
explanation: |
  Зимбабве приема доларизацията, за да противодейства на инфлацията. Това означава, че те
  че е приел щатския долар или други валути от съседни държави, което предотвратява
  правителството да печата пари по свое усмотрение.
reviewed: true
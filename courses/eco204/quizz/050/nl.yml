question: Welke oplossing koos Zimbabwe om de inflatie tegen te gaan?
answer: Dollarisering
wrong_answers:
  - Meer geld drukken
  - Een nieuwe valuta introduceren
  - Geld verminderen Supply
explanation: |
  Zimbabwe heeft de dollarisatie ingevoerd om de inflatie tegen te gaan. Dit betekent dat ze
  de Amerikaanse dollar of andere munteenheden van buurlanden, wat voorkomt dat
  voorkomt dat de overheid naar believen geld kan drukken.

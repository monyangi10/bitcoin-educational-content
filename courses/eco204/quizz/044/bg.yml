question: Какъв е годишният процент на инфлация в Боливия през 1985 г.?
answer: 11 749%
wrong_answers:
  - 12 800%
  - 10 000%
  - 15 000%
explanation: |
  През 1985 г. годишният темп на инфлация в Боливия достига 11 749%, което означава, че почти всеки месец инфлацията е близо до или надхвърля прага на хиперинфлация от 50%.
reviewed: true

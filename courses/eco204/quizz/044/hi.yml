question: 1985 में बोलीविया का सालाना महंगाई दर (इन्फ्लेशन रेट) क्या था?
answer: ग्यारह हज़ार सात सौ उनचास प्रतिशत
wrong_answers:
  - 12,800%
  - दस हज़ार परसेंट (10,000%)
  - 15,000%
explanation: |
  1985 में, बोलीविया की सालाना मुद्रास्फीति दर 11,749% तक पहुँच गई, जो दर्शाता है
  कि लगभग हर महीने, महंगाई हाइपरइन्फ्लेशन की सीमा के करीब या उससे अधिक हो जाती थी।
  50% का।

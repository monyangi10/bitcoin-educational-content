question: Wat was de jaarlijkse inflatie in Bolivia in 1985?
answer: 11,749%
wrong_answers:
  - 12,800%
  - 10,000%
  - 15,000%
explanation: |
  In 1985 bereikte de jaarlijkse inflatie in Bolivia 11,749%, wat aangeeft
  
  dat de inflatie bijna elke maand de hyperinflatiegrens benaderde of overschreed
  
  van 50%

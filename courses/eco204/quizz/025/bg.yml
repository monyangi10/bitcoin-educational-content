question: Каква е общата последица от хиперинфлацията, както се вижда от случаите на Зимбабве и Ваймарската република?
answer: Вътрешната стойност на банкнотата може да стане по-ниска от стойността на хартията, върху която е отпечатана.
wrong_answers:
  - Стойността на валутата се увеличава.
  - Търсенето на банкноти намалява.
  - Стойността на материалните активи намалява.
explanation: |
  При определени икономически обстоятелства, като например хиперинфлация, присъщата
  стойността на банкнотата може да стане по-ниска от стойността на хартията, на която е отпечатана.
  Това драстично обезценяване превръща банкнотите, които обикновено са символи на стойност и
  покупателна способност, се превръщат в обикновени парчета безполезна хартия.
reviewed: true
question: हाइपरइन्फ्लेशन का एक आम नतीजा क्या है, जैसा कि जिम्बाब्वे और वीमर रिपब्लिक के मामलों में देखा गया?
answer: एक बैंकनोट की असली कीमत कभी-कभी उस कागज से भी कम हो सकती है जिस पर वो छपा होता है।
wrong_answers:
  - मुद्रा का मूल्य बढ़ जाता है।
  - बैंकनोटों की मांग कम हो जाती है।
  - मूर्त संपत्ति का मूल्य घट जाता है।
explanation: |
  कुछ खास आर्थिक हालातों में, जैसे कि हाइपरइन्फ्लेशन (महंगाई की चरम स्थिति), असली कीमत...  

(नोट: आपका वाक्य अधूरा है, इसलिए मैंने "the intrinsic" का अनुवाद "असली कीमत..." किया है। पूरा वाक्य मिलने पर सटीक अनुवाद किया जा सकता है।)
  एक बैंकनोट की कीमत उस कागज से भी कम हो सकती है जिस पर वह छपा होता है।
  ये भारी गिरावट नोटों को, जो आमतौर पर मूल्य और
  खरीदने की ताक़त, बेकार कागज़ के टुकड़ों में बदल जाती है।
reviewed: false
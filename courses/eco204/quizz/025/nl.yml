question: Wat is een veelvoorkomend gevolg van hyperinflatie, zoals in Zimbabwe en de Weimarrepubliek?
answer: De intrinsieke waarde van een bankbiljet kan lager worden dan de waarde van het papier waarop het gedrukt is.
wrong_answers:
  - De waarde van de valuta stijgt.
  - De vraag naar bankbiljetten neemt af.
  - De waarde van materiële activa daalt.
explanation: |
  In bepaalde economische omstandigheden, zoals hyperinflatie, kan de intrinsieke
  waarde van een bankbiljet lager worden dan de waarde van het papier waarop het gedrukt is.
  Door deze drastische waardevermindering veranderen bankbiljetten, die normaal gesproken een symbool van waarde en koopkracht zijn, in louter waardeloos papier
  koopkracht, in louter waardeloos papier.

question: 짐바브웨와 바이마르 공화국의 사례에서 볼 수 있듯이 하이퍼인플레이션의 일반적인 결과는 무엇인가요?
answer: 지폐의 내재적 가치는 지폐가 인쇄된 종이의 가치보다 낮아질 수 있습니다.
wrong_answers:
  - 통화 가치가 상승합니다.
  - 지폐에 대한 수요가 감소합니다.
  - 유형 자산의 가치가 감소합니다.
explanation: |
  초인플레이션과 같은 특정 경제 상황에서는 지폐의 내재적
  지폐의 내재 가치가 지폐가 인쇄된 종이의 가치보다 낮아질 수 있습니다.
  이러한 급격한 감가상각으로 인해 일반적으로 가치와 구매력의 상징인 지폐가
  구매력의 상징인 지폐를 그저 쓸모없는 종이 조각으로 바꿔버립니다.
reviewed: false
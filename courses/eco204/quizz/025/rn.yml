question: Ni ingaruka izihe zisanzwe ziterwa n’ugutera imbere kw’ibiciro nk’uko vyabonetse muri Zimbabwe no muri Repubulika ya Weimar?
answer: Agaciro k’imbere k’inoti kashobora kuba hasi y’agaciro k’urupapuro rwacapweko.
wrong_answers:
  - Agaciro k’amahera karaduga.
  - Ivyo gusaba amafaranga y’amabanki biragabanuka.
  - Agaciro k’ibintu bifatika karagabanuka.
explanation: |
  Mu bihe bimwebimwe vy’ubutunzi, nk’ugutera imbere cane kw’ibiciro, ivy’imbere mu mutima .
  agaciro k’inoti gashobora kuba hasi y’agaciro k’urupapuro rwacapweko.
  Ukwo gusenyuka kw’agaciro gukomeye kurahindura amafaranga y’amahera, ayo mu bisanzwe akaba ari ibimenyetso vy’agaciro be n’
  ububasha bwo kugura, bukaba ibipande gusa vy’impapuro zitagira akamaro.
reviewed: false
question: Какво е значението на термина "Burner-preneurs" в контекста на хиперинфлацията?
answer: Тя се отнася до предприемачи, които процъфтяват, като вземат назаем обезценена валута, за да инвестират в материални активи, и след това изплащат дълговете си с още по-обезценена валута.
wrong_answers:
  - Той се отнася за лица, които изгарят обезценена валута за отопление.
  - Тя се отнася до лица, които започват бизнес, свързан с производството на банкноти.
  - Той се отнася за лица, които незаконно търгуват с чуждестранни валути.
explanation: |
  В периоди на хиперинфлация стойността на валутата бързо намалява.
  Това създава възможности за предприемачи, често наричани Burner-preneurs, които
  заемат обезценената валута, за да инвестират в материални активи, а след това изплащат
  дълговете си с още по-девалвирана валута.
reviewed: true
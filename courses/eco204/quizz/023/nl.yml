question: Wat is de betekenis van de term Burner-preneurs in de context van hyperinflatie?
answer: Het verwijst naar ondernemers die gedijen door gedevalueerde valuta te lenen om te investeren in tastbare activa, en vervolgens hun schulden terug te betalen met nog meer gedevalueerde valuta.
wrong_answers:
  - Het verwijst naar individuen die gedevalueerde valuta verbranden voor verwarmingsdoeleinden.
  - Het verwijst naar individuen die bedrijven starten die gerelateerd zijn aan de productie van bankbiljetten.
  - Het verwijst naar individuen die illegaal handelen in buitenlandse valuta.
explanation: |
  In periodes van hyperinflatie erodeert de waarde van de munt snel.
  Dit creëert kansen voor ondernemers, vaak Burner-preneurs genoemd, die
  de gedevalueerde valuta lenen om te investeren in tastbare activa, en vervolgens hun
  schulden terugbetalen met nog meer gedevalueerde valuta.

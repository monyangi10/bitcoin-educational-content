question: 在惡性通貨膨脹的背景下，Burner-preneurs 一詞的意義何在？
answer: 它指的是企業家透過借入貶值的貨幣來投資有形資產，然後以更貶值的貨幣來償還債務，從而茁壯成長。
wrong_answers:
  - 它指的是為了取暖而燒掉貶值貨幣的個人。
  - 它指的是開辦與紙幣生產相關業務的個人。
  - 它是指非法買賣外幣的個人。
explanation: |
  在惡性通貨膨脹期間，貨幣價值會迅速貶值。
  這為通常被稱為 Burner-preneurs 的創業者創造了機會，他們
  借入貶值的貨幣投資於有形資產，然後償還
  以更加貶值的貨幣償還債務。
reviewed: false
question: हाइपरइन्फ्लेशन के संदर्भ में "Burner-preneurs" शब्द का क्या महत्व है?  

(सीधे शब्दों में: यह उन छोटे व्यापारियों या उद्यमियों को संदर्भित करता है जो हाइपरइन्फ्लेशन के दौरान तेजी से पैसा बनाने और खर्च करने पर फोकस करते हैं, क्योंकि पैसे की वैल्यू तेजी से गिर रही होती है। इनका लक्ष्य लंबे समय तक चलने वाला बिज़नेस नहीं, बल्कि जल्दी कैश फ्लो बनाना होता है।)
answer: यह उन उद्यमियों को संदर्भित करता है जो अवमूल्यित मुद्रा उधार लेकर मूर्त संपत्तियों में निवेश करते हैं, और फिर अपने कर्ज को और भी अधिक अवमूल्यित मुद्रा से चुकाते हैं।
wrong_answers:
  - यह उन लोगों के बारे में है जो गर्माहट के लिए बेकार हो चुकी मुद्रा को जला देते हैं।
  - यह उन लोगों को संदर्भित करता है जो बैंकनोट के उत्पादन से संबंधित व्यवसाय शुरू करते हैं।
  - यह उन लोगों को संदर्भित करता है जो विदेशी मुद्राओं में अवैध व्यापार करते हैं।
explanation: |
  हाइपरइन्फ्लेशन के दौरों में, करेंसी की कीमत तेज़ी से गिर जाती है।
  इससे उद्यमियों के लिए अवसर पैदा होते हैं, जिन्हें अक्सर "बर्नर-प्रेन्योर्स" कहा जाता है, जो
  मूल्यहीन मुद्रा उधार लेकर ठोस संपत्ति में निवेश करें, और फिर उसे चुका दें
  कर्ज और भी अधिक मूल्यहीन मुद्रा के साथ।

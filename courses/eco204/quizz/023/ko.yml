question: 초인플레이션의 맥락에서 버너프러너라는 용어의 의미는 무엇인가요?
answer: 이는 평가절하된 통화를 빌려 유형 자산에 투자한 후 더 평가절하된 통화로 부채를 상환함으로써 번창하는 기업가를 말합니다.
wrong_answers:
  - 난방 목적으로 평가 절하된 화폐를 소각하는 개인을 말합니다.
  - 지폐 생산과 관련된 사업을 시작하는 개인을 말합니다.
  - 불법적으로 외화를 거래하는 개인을 말합니다.
explanation: |
  초인플레이션 기간에는 통화 가치가 급격히 하락합니다.
  이는 종종 버너 기업가라고 불리는 기업가들에게 기회를 창출합니다
  평가절하된 통화를 빌려 유형 자산에 투자한 후, 더 평가절하된 통화로 부채를 상환하는
  부채를 상환할 수 있습니다.

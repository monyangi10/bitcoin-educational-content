question: Jakie jest znaczenie terminu Burner-preneurs w kontekście hiperinflacji?
answer: Odnosi się do przedsiębiorców, którzy rozwijają się, pożyczając zdewaluowaną walutę w celu inwestowania w aktywa materialne, a następnie spłacając swoje długi jeszcze bardziej zdewaluowaną walutą.
wrong_answers:
  - Odnosi się do osób, które spalają zdewaluowaną walutę w celach grzewczych.
  - Odnosi się do osób, które rozpoczynają działalność związaną z produkcją banknotów.
  - Odnosi się do osób, które nielegalnie handlują walutami obcymi.
explanation: |
  W okresach hiperinflacji wartość waluty gwałtownie spada.
  Stwarza to możliwości dla przedsiębiorców, często nazywanych Burner-preneurs, którzy
  pożyczają zdewaluowaną walutę, aby inwestować w aktywa rzeczowe, a następnie spłacają swoje długi jeszcze bardziej zdewaluowaną walutą
  długi jeszcze bardziej zdewaluowaną walutą.

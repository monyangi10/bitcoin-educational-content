question: Ijambo Burner-preneurs rifise akamaro akahe mu bijanye n’ugutera imbere kw’ibiciro?
answer: Bivuga abacuruzi batera imbere mu kugurana amahera yacitse intege kugira ngo bashire mu bintu bifatika, hanyuma bakishura imyenda yabo mbere n’amahera yacitse agaciro kuruta.
wrong_answers:
  - Bivuga abantu ku giti cabo baturira amahera yacitse agaciro kugira ngo bashobore gushusha.
  - Rivuga abantu ku giti cabo batangura ubudandaji bujanye n’uguhingura amafaranga y’amahera.
  - Rivuga abantu ku giti cabo bacuruza amafaranga y’amahanga mu buryo butemewe n’amategeko.
explanation: |
  Mu bihe vy’ugutera imbere cane, agaciro k’amahera karagabanuka ningoga.
  Ivyo bituma abacuruzi, akenshi bitwa Burner-preneurs, baronka uturyo .
  gutiza ayo mafaranga yacitse agaciro kugira ngo bashire mu bintu bifatika, hanyuma basubire kwishura .
  imyenda n’amahera mbere yacitse agaciro kuruta.

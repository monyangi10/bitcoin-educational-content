question: फिलिप केगन की परिभाषा के अनुसार, हाइपरइन्फ्लेशन की सीमा क्या है?
answer: महीने भर की महंगाई 50% से भी ज़्यादा हो गई है
wrong_answers:
  - महीने का महंगाई दर 40% से भी ज्यादा हो गया है
  - महीने का महँगाई दर 60% से भी ज़्यादा हो गया है
  - महीने भर की महँगाई 70% से भी ज़्यादा हो गई है
explanation: |
  फिलिप केगन की परिभाषा के अनुसार, हाइपरइन्फ्लेशन तब शुरू होता है जब मासिक
  महँगाई 50% से भी ज़्यादा हो गई है।
reviewed: false
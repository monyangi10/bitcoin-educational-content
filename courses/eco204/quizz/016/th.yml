question: เกณฑ์สำหรับภาวะเงินเฟ้อรุนแรงตามคำจำกัดความของ Philip Cagan คืออะไร?
answer: อัตราเงินเฟ้อรายเดือนเกิน 50%
wrong_answers:
  - อัตราเงินเฟ้อรายเดือนเกิน 40%
  - อัตราเงินเฟ้อรายเดือนเกิน 60%
  - อัตราเงินเฟ้อรายเดือนเกิน 70%
explanation: |
  ตามคำจำกัดความของ Philip Cagan ภาวะเงินเฟ้อรุนแรงเริ่มต้นเมื่ออัตราเงินเฟ้อรายเดือนเกิน 50%
reviewed: true
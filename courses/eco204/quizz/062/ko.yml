question: 1796년 은행 공황에 대한 영란은행의 반응은 어땠나요?
answer: 지폐의 금화 전환을 중단했습니다
wrong_answers:
  - 더 많은 지폐를 발행했습니다
  - 폐쇄되었습니다
  - 지폐의 가치를 높였습니다
explanation: |
  1796년 은행 공황 이후 영국 은행은
  
  전환성
  
  금 보유량의 디플레이션을 방지하기 위해 지폐를 금으로 전환하는 것을 중단했습니다. 이
  
  일시적인 조치로 의도된 이 중단은 2년간 지속되었습니다
  
  수십 년 동안 지속되었습니다
reviewed: false
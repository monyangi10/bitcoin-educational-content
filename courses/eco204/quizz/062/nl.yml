question: Wat was de reactie van de Bank of England op de bankpaniek van 1796?
answer: Het schortte de inwisselbaarheid van zijn bankbiljetten in goud op
wrong_answers:
  - Het gaf meer bankbiljetten uit
  - Het sloot
  - Het verhoogde de waarde van zijn bankbiljetten
explanation: |
  Na de bankpaniek van 1796 schortte de Bank of England de
  
  convertibiliteit
  
  van haar bankbiljetten in goud om een potentiële deflatie van de goudreserves te voorkomen. Dit
  
  opschorting, aanvankelijk bedoeld als een tijdelijke maatregel, duurde twee jaar
  
  decennia

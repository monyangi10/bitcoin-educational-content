question: Jaka była reakcja Banku Anglii na panikę bankową w 1796 roku?
answer: Zawiesił wymienialność swoich banknotów na złoto
wrong_answers:
  - Wyemitował więcej banknotów
  - Został zamknięty
  - Zwiększył wartość swoich banknotów
explanation: |
  W następstwie paniki bankowej w 1796 r. Bank Anglii zawiesił wymienialność swoich banknotów na złoto, aby zapobiec potencjalnej deflacji rezerw złota. To zawieszenie, początkowo pomyślane jako środek tymczasowy, trwało przez okres dwóch lat.
reviewed: true

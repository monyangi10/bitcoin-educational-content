question: ปฏิกิริยาของธนาคารแห่งประเทศอังกฤษต่อความตื่นตระหนกของธนาคารในปี 1796 คืออะไร?
answer: ได้ระงับการแปลงธนบัตรเป็นทองคำ
wrong_answers:
  - มันออกธนบัตรมากขึ้น
  - มันปิดตัวลงแล้ว
  - มันเพิ่มมูลค่าของธนบัตร
explanation: |
  หลังจากความตื่นตระหนกทางการเงินในปี 1796 ธนาคารแห่งประเทศอังกฤษได้ระงับการแปลงธนบัตรเป็นทองคำเพื่อป้องกันการลดลงของทุนสำรองทองคำ การระงับนี้ซึ่งตั้งใจให้เป็นมาตรการชั่วคราวนั้นกินเวลาประมาณสองทศวรรษ
reviewed: true
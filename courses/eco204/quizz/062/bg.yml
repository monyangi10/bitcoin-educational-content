question: Каква е реакцията на Английската централна банка на банковата паника от 1796 г.?
answer: Тя преустановява конвертируемостта на своите банкноти в злато
wrong_answers:
  - Тя емитира повече банкноти
  - Затворена е
  - Увеличава стойността на своите банкноти
explanation: |
  След банковата паника от 1796 г. Английската централна банка преустановява конвертирането на банкнотите си в злато, за да предотврати евентуална дефлация на златните резерви. Това спиране, първоначално замислено като временна мярка, продължава приблизително две десетилетия.
reviewed: true
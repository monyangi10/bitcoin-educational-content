question: 1796 के बैंक आतंक के प्रति बैंक ऑफ इंग्लैंड की प्रतिक्रिया क्या थी?
answer: इसने अपने बैंकनोट्स को सोने में बदलने की क्षमता को रोक दिया।
wrong_answers:
  - इसने ज़्यादा करेंसी नोट छापे
  - वो बंद हो गया
  - इसने अपने बैंकनोटों का मूल्य बढ़ा दिया
explanation: |
  1796 के बैंक आतंक के बाद, बैंक ऑफ इंग्लैंड ने रोक लगा दी
  परिवर्तनीयता
  इसने अपने बैंकनोटों को सोने में बदलने की क्षमता को सीमित कर दिया ताकि सोने के भंडार में संभावित कमी को रोका जा सके।
  सस्पेंशन, जो शुरू में एक अस्थायी उपाय के रूप में था, दो साल तक चला।
  दशकों।

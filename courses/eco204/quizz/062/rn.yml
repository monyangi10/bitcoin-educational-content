question: None Banki y’Ubwongereza yavyifashemwo gute igihe banki yateye ubwoba mu 1796?
answer: Yahagaritse uguhindura amafaranga y'amahera yayo ngo abe inzahabu .
wrong_answers:
  - Yasohoye ama noti menshi
  - Yarafunze .
  - Yarongereje agaciro k'amafaranga yayo .
explanation: |
  Inyuma y’aho amabanki ateye ubwoba mu 1796, Banki y’Ubwongereza yarahagaritse .
  
  guhindura
  
  y’amafaranga yayo y’amabanki mu nzahabu kugira ngo ntihagire ukuntu inzahabu zibitswe zishobora gusenyuka. Ibi
  
  guhagarika, mu ntango vyari vyerekeye ingero y’igihe gito, vyaramaze ikiringo c’imyaka ibiri .
  
  imyaka mirongo.’

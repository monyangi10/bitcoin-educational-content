question: İngiltere Merkez Bankası'nın 1796'daki banka paniğine tepkisi ne oldu?
answer: Banknotlarının altına dönüştürülebilirliğini askıya aldı
wrong_answers:
  - Daha fazla banknot bastı
  - Kapatıldı
  - Banknotlarının değerini artırdı
explanation: |
  1796'da yaşanan banka paniğinin ardından İngiltere Merkez Bankası
  
  dönüştürülebilirlik
  
  altın rezervlerinde olası bir deflasyonu önlemek için banknotlarını altına çevirmiştir. Bu
  
  başlangıçta geçici bir önlem olarak düşünülen askıya alma, iki yıllık bir süre boyunca devam etti
  
  on yıllar.'
reviewed: false
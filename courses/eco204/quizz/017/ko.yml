question: 케이건의 하이퍼인플레이션 정의에 대한 주요 비판은 무엇인가요?
answer: 50% 기준은 임의적인 것이며 특정 인플레이션이 높은 경우 제외됩니다
wrong_answers:
  - 정의가 너무 광범위하고 너무 많은 인플레이션 에피소드를 포함합니다
  - 이 정의는 구식이며 현대 경제에는 적용되지 않습니다
  - 이 정의는 인플레이션이 경제에 미치는 영향을 고려하지 않습니다
explanation: |
  Bernholz와 같은 Cagan의 정의에 대한 비판자들은 50%의
  임계 값
  은 자의적이며 하이퍼인플레이션과 동일한 질적 특성을 가진
  질적 특성을 가진 특정 고인플레이션을 배제한다고 주장합니다.
reviewed: false
question: कागन के हाइपरइन्फ्लेशन की परिभाषा की मुख्य आलोचना क्या है?
answer: 50% का थ्रेशोल्ड मनमाना है और कुछ उच्च मुद्रास्फीति के दौर को छोड़ देता है
wrong_answers:
  - परिभाषा बहुत ही व्यापक है और इसमें मुद्रास्फीति के बहुत सारे मामले शामिल हो जाते हैं।
  - परिभाषा पुरानी हो चुकी है और आधुनिक अर्थव्यवस्थाओं पर लागू नहीं होती
  - परिभाषा में मुद्रास्फीति का अर्थव्यवस्था पर प्रभाव को ध्यान में नहीं रखा गया है।
explanation: |
  कैगन की परिभाषा के आलोचक, जैसे बर्नहोल्ज़, तर्क देते हैं कि 50%
  दहलीज़
  यह मनमाना है और कुछ ऐसे उच्च मुद्रास्फीति के दौर को छोड़ देता है जिनकी प्रकृति एक जैसी होती है
  गुणात्मक विशेषताएँ जैसे कि हाइपरइन्फ्लेशन के प्रकरण।

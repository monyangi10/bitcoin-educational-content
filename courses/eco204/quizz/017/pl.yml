question: Jaka jest główna krytyka definicji hiperinflacji Cagana?
answer: Próg 50% jest arbitralny i wyklucza pewne epizody wysokiej inflacji
wrong_answers:
  - Definicja jest zbyt szeroka i obejmuje zbyt wiele epizodów inflacji
  - Definicja ta jest przestarzała i nie ma zastosowania do nowoczesnych gospodarek
  - Definicja ta nie uwzględnia wpływu inflacji na gospodarkę
explanation: |
  Krytycy definicji Cagana, tacy jak Bernholz, argumentują, że próg 50%
  próg
  jest arbitralny i wyklucza pewne epizody wysokiej inflacji, które mają takie same cechy jakościowe jak epizody hiperinflacji
  te same cechy jakościowe, co epizody hiperinflacji.
reviewed: false
question: Wat is de belangrijkste kritiek op Cagans definitie van hyperinflatie?
answer: De drempel van 50% is arbitrair en sluit bepaalde perioden van hoge inflatie uit
wrong_answers:
  - De definitie is te breed en omvat te veel perioden van inflatie
  - De definitie is verouderd en niet van toepassing op moderne economieën
  - De definitie houdt geen rekening met de invloed van inflatie op de economie
explanation: |
  Critici van Cagans definitie, zoals Bernholz, beweren dat de 50%
  drempel
  arbitrair is en bepaalde perioden van hoge inflatie uitsluit die dezelfde
  kwalitatieve kenmerken hebben als perioden van hyperinflatie.
reviewed: false
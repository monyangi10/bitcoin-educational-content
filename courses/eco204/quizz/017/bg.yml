question: Каква е основната критика на определението на Кейгън за хиперинфлация?
answer: Прагът от 50 % е произволен и изключва някои епизоди на висока инфлация
wrong_answers:
  - Дефиницията е твърде широка и включва твърде много епизоди на инфлация
  - Определението е остаряло и не е приложимо към съвременните икономики
  - Определението не взема предвид въздействието на инфлацията върху икономиката
explanation: |
  Критиците на определението на Кейгън, като Бернхолц, твърдят, че 50%
  
  е произволен и изключва някои епизоди на висока инфлация, които имат същия
  качествени характеристики като епизодите на хиперинфлация.
reviewed: true
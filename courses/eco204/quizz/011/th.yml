question: ทฤษฎีการเงินสมัยใหม่ (MMT) มีมุมมองอย่างไรเกี่ยวกับการสร้างเงินและเงินเฟ้อ?
answer: ตามทฤษฎีการเงินสมัยใหม่ (MMT) เงินมีต้นกำเนิดหลักจากรัฐบาล ซึ่งสามารถพิมพ์เงินจำนวนมากเพื่อใช้ในการเงินตามความต้องการโดยไม่ก่อให้เกิดเงินเฟ้อ ตราบใดที่ภาคส่วนที่ได้รับเงินเหล่านี้ยังไม่อิ่มตัว
wrong_answers:
  - ตามทฤษฎี MMT เงินมีต้นกำเนิดหลักจากภาคเอกชน และการพิมพ์เงินเพิ่มขึ้นเสมอจะนำไปสู่อัตราเงินเฟ้อ
  - ตามทฤษฎีการเงินสมัยใหม่ (MMT) เงินมีต้นกำเนิดหลักจากรัฐบาล แต่การพิมพ์เงินเพิ่มเสมอจะนำไปสู่ภาวะเงินเฟ้อ
  - ตามทฤษฎี MMT เงินมีต้นกำเนิดหลักจากภาคเอกชน และการพิมพ์เงินเพิ่มไม่เคยนำไปสู่ภาวะเงินเฟ้อ
explanation: |
  บทนี้อธิบายว่า ทฤษฎีการเงินสมัยใหม่ (MMT) เสนอแนวคิดที่แตกต่างเกี่ยวกับการสร้างเงินและเงินเฟ้อ ตาม MMT เงินมีต้นกำเนิดหลักจากรัฐบาล ซึ่งสามารถพิมพ์เงินจำนวนมากเพื่อใช้จ่ายตามความต้องการโดยไม่ก่อให้เกิดเงินเฟ้อ ตราบใดที่ภาคส่วนที่เงินเหล่านี้มุ่งเป้าไปยังไม่อิ่มตัว
reviewed: true
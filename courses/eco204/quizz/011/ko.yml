question: 화폐 창출과 인플레이션에 대한 현대 통화 이론(MMT)의 관점은 무엇인가요?
answer: MMT에 따르면, 자금은 주로 정부로부터 나오며, 정부는 이 자금의 대상이 되는 부문이 포화 상태가 아닌 한 인플레이션을 일으키지 않고도 필요한 자금을 조달하기 위해 상당한 금액을 인쇄할 수 있습니다.
wrong_answers:
  - MMT에 따르면 화폐는 주로 민간 부문에서 발행되며, 더 많은 화폐를 찍어내면 항상 인플레이션이 발생한다고 합니다.
  - MMT에 따르면 화폐는 주로 정부에서 발행되지만, 화폐를 더 많이 찍어내면 항상 인플레이션이 발생합니다.
  - MMT에 따르면 화폐는 주로 민간 부문에서 발행되며, 더 많은 화폐를 찍어내는 것은 결코 인플레이션으로 이어지지 않습니다.

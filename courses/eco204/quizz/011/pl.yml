question: Jaka jest perspektywa Nowoczesnej Teorii Monetarnej (MMT) na kreację pieniądza i inflację?
answer: Zgodnie z MMT, pieniądz pochodzi głównie od rządu, który może drukować znaczne kwoty w celu sfinansowania swoich potrzeb bez powodowania inflacji, o ile sektory, do których skierowane są te fundusze, nie są nasycone.
wrong_answers:
  - Według MMT pieniądze pochodzą głównie z sektora prywatnego, a drukowanie większej ilości pieniędzy zawsze prowadzi do inflacji.
  - Według MMT pieniądze pochodzą głównie od rządu, ale drukowanie większej ilości pieniędzy zawsze prowadzi do inflacji.
  - Według MMT pieniądze pochodzą głównie z sektora prywatnego, a drukowanie większej ilości pieniędzy nigdy nie prowadzi do inflacji.
explanation: |
  W rozdziale tym wyjaśniono, że nowoczesna teoria monetarna (MMT) oferuje odrębną perspektywę
  spojrzenie na kreację pieniądza i inflację. Według MMT pieniądz pochodzi przede wszystkim
  od rządu, który może drukować znaczne kwoty w celu sfinansowania swoich potrzeb bez
  bez powodowania inflacji, o ile sektory, do których kierowane są te fundusze, nie są nasycone.
reviewed: false
question: Каква е гледната точка на съвременната парична теория (ММТ) по отношение на създаването на пари и инфлацията?
answer: Според ММТ парите произхождат предимно от правителството, което може да печата значителни количества за финансиране на своите нужди, без да предизвиква инфлация, стига секторите, към които са насочени тези средства, да не са пренаситени.
wrong_answers:
  - Според ММТ парите произхождат предимно от частния сектор и печатането на повече пари винаги води до инфлация.
  - Според ММТ парите произлизат предимно от правителството, но печатането на повече пари винаги води до инфлация.
  - Според ММТ парите произлизат предимно от частния сектор и печатането на повече пари никога не води до инфлация.
explanation: |
  В главата се обяснява, че съвременната парична теория (ММТ) предлага различна
  перспектива за създаването на пари и инфлацията. Според ММТ парите се появяват предимно
  от правителството, което може да печата значителни количества, за да финансира нуждите си, без да
  без да предизвиква инфлация, стига секторите, към които са насочени тези средства, да не са наситени.
reviewed: true
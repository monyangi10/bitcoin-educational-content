question: Wat is het perspectief van de Moderne Monetaire Theorie (MMT) op geldschepping en inflatie?
answer: Volgens MMT is geld in de eerste plaats afkomstig van de overheid, die aanzienlijke bedragen kan drukken om haar behoeften te financieren zonder inflatie te veroorzaken, zolang de sectoren waarop deze fondsen zich richten niet verzadigd zijn.
wrong_answers:
  - Volgens MMT komt geld voornamelijk uit de private sector en leidt het drukken van meer geld altijd tot inflatie.
  - Volgens MMT komt geld voornamelijk van de overheid, maar leidt het drukken van meer geld altijd tot inflatie.
  - Volgens MMT komt geld voornamelijk uit de particuliere sector en leidt het drukken van meer geld nooit tot inflatie.
explanation: |
  Het hoofdstuk legt uit dat de Moderne Monetaire Theorie (MMT) een apart
  perspectief biedt op geldschepping en inflatie. Volgens MMT is geld voornamelijk afkomstig
  van de overheid, die aanzienlijke bedragen kan drukken om haar behoeften te financieren zonder
  zonder inflatie te veroorzaken, zolang de sectoren waarop deze fondsen zich richten niet verzadigd zijn.

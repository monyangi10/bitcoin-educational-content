  - MMT के अनुसार, पैसा मुख्य रूप से सरकार से आता है, लेकिन ज्यादा पैसा छापने से हमेशा महंगाई बढ़ती है।
  - MMT के अनुसार, पैसा मुख्य रूप से प्राइवेट सेक्टर से आता है और ज्यादा पैसा छापने से कभी भी महंगाई नहीं बढ़ती।
explanation: |
  अध्याय बताता है कि मॉडर्न मॉनेटरी थ्योरी (MMT) एक अलग
  पैसे के सृजन और मुद्रास्फीति पर दृष्टिकोण। एमएमटी के अनुसार, पैसा मुख्य रूप से उत्पन्न होता है...
  सरकार की तरफ से, जो अपनी ज़रूरतों को पूरा करने के लिए बड़ी मात्रा में पैसा छाप सकती है बिना
  जब तक इन फंडों के लक्षित क्षेत्र संतृप्त नहीं हो जाते, तब तक मुद्रास्फीति पैदा करना।

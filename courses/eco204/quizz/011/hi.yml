question: आधुनिक मौद्रिक सिद्धांत (MMT) के अनुसार, पैसा बनाने और मुद्रास्फीति पर क्या नज़रिया है?  

MMT का मानना है कि:  
1. **पैसा बनाना**: सरकार (खासकर संप्रभु देश जो अपनी मुद्रा छापते हैं) पैसे की कमी से बंधी नहीं है। वह जितना चाहे उतना पैसा छाप सकती है, क्योंकि उसकी मुद्रा की मांग टैक्स और कानूनी तौर पर चलन से बनी रहती है।  
2. **मुद्रास्फीति**: MMT मानता है कि जब असली संसाधनों (जैसे मजदूर, कच्चा माल) की कमी होती है, तब ज़्यादा पैसा छापने से महँगाई बढ़ती है। इसलिए, सरकार को पैसे छापते समय अर्थव्यवस्था की "वास्तविक क्षमता" देखनी चाहिए।  

सीधे शब्दों में:  
- "पैसा छापो, पर संसाधनों की लिमिट समझो!"  
- महँगाई रोकने के लिए टैक्स या सरकारी खर्च घटाकर मांग कंट्रोल करो।  

MMT के हिसाब से, बेरोज़गारी दिखाती है कि सरकार *पर्याप्त* पैसा नहीं छाप रही, न कि *ज़्यादा*!
answer: MMT के अनुसार, पैसा मुख्य रूप से सरकार से आता है, जो अपनी जरूरतों को पूरा करने के लिए बड़ी मात्रा में नोट छाप सकती है और इससे मुद्रास्फीति नहीं होगी, बशर्ते कि इन फंडों से लाभान्वित होने वाले क्षेत्र संतृप्त न हों।

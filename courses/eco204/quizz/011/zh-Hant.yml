question: 現代貨幣理論 (Modern Monetary Theory, MMT) 如何看待貨幣創造與通貨膨脹？
answer: 根據 MMT 的觀點，貨幣主要來自政府，只要這些資金所針對的部門未達飽和，政府就可以印製大量的資金來滿足其需求，而不會造成通貨膨脹。
wrong_answers:
  - 根據 MMT，貨幣主要來自於私人部門，印製更多的貨幣總是會導致通貨膨脹。
  - 根據 MMT，貨幣主要來自於政府，但是印製更多的貨幣總是會導致通貨膨脹。
  - 根據 MMT，貨幣主要來自於私人部門，印製更多的貨幣從來不會導致通貨膨脹。
explanation: |
  本章說明現代貨幣理論 (MMT) 提供了一個獨特的
  從貨幣創造和通貨膨脹的角度來看。根據 MMT，貨幣主要起源於
  政府可以大量印鈔票來滿足其需求，而無需
  只要這些基金所針對的產業未達飽和，就不會造成通貨膨脹。
reviewed: false
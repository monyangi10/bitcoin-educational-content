question: Ni igiki inyigisho y’amahera y’ubu (MMT) ibona ku bijanye no kurema amahera n’ugutera imbere kw’ibiciro?
answer: Nk’uko MMT ibivuga, amahera ahanini akomoka kuri Leta, ishobora gucapura amahera menshi kugira ngo ishobore gutanga amahera y’ivyo ikeneye ataco itera inflation igihe cose imice iyo mahera igamije itazoba yuzuye.
wrong_answers:
  - Nk’uko MMT ibivuga, amahera ahanini ava mu bigo vyigenga kandi gucapura amahera menshi vyama bituma habaho ugutera imbere kw’ibiciro.
  - Nk’uko MMT ibivuga, amahera ahanini akomoka kuri leta, ariko gucapura amahera menshi vyama bituma haba ugutera imbere kw’ibiciro.
  - Nk’uko MMT ibivuga, amahera ahanini akomoka mu bigo vyigenga kandi gucapura amahera menshi ntivyigera bituma habaho ugutera imbere kw’ibiciro.
explanation: |
  Ico kigabane kirasigura ko Ivyiyumviro vy’Amahera vy’Iki gihe (MMT) bitanga inyigisho idasanzwe .
  ivyiyumviro ku bijanye no kurema amahera n’ugutera imbere kw’ibiciro. Nk’uko MMT ibivuga, amahera ahanini akomoka .
  iva kuri leta, ishobora gucapura amahera menshi kugira ngo ishobore gutanga amahera y’ivyo ikeneye ata .
  bitera inflation igihe cose imice igenewe ayo mahera itazoba yuzuye.

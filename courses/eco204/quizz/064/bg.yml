question: Каква е била ролята на златарите в Италия през XIII век?
answer: Те издават менителници в замяна на депозирани флорини
wrong_answers:
  - Те създават първия фондов пазар
  - Те въвеждат концепцията за времевата стойност на парите
  - Те блокират достъпа до река Шелда
explanation: |
  През XIII в. италианските златари издават менителници в замяна на депозирани флорини. Тези флорини се съхранявали грижливо в трезорите им и съставлявали първия слой пари, а менителниците - втория слой
reviewed: true
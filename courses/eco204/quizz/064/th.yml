question: บทบาทของช่างทองในอิตาลีศตวรรษที่ 13 คืออะไร?
answer: พวกเขาออกตั๋วแลกเงินเพื่อแลกกับฟลอรินที่ฝากไว้
wrong_answers:
  - พวกเขาสร้างตลาดหุ้นแห่งแรก
  - พวกเขาได้แนะนำแนวคิดเรื่องมูลค่าของเงินตามเวลา
  - พวกเขาปิดกั้นการเข้าถึงแม่น้ำ Scheldt
explanation: |
  ในศตวรรษที่ 13 ช่างทองชาวอิตาลีได้ออกตั๋วแลกเงินเพื่อแลกกับฟลอรินที่ฝากไว้ ฟลอรินเหล่านี้ถูกเก็บรักษาไว้อย่างดีในห้องนิรภัยของพวกเขา ซึ่งเป็นการสร้างชั้นแรกของเงิน ในขณะที่ตั๋วแลกเงินเป็นการสร้างชั้นที่สอง
reviewed: true
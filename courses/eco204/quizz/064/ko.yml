question: 13세기 이탈리아에서 금세공인의 역할은 무엇이었을까요?
answer: 그들은 예치된 플로린에 대해 Exchange 지폐를 Exchange으로 발행했습니다
wrong_answers:
  - 그들은 최초의 주식 시장을 만들었습니다
  - 돈의 시간 가치 개념을 도입했습니다
  - 셸트 강에 대한 접근을 차단했습니다
explanation: |
  13세기 이탈리아에서는 금세공인들이 Exchange 지폐를 Exchange로 발행했습니다
  
  지폐를 발행했습니다. 이 플로린은 금고에 조심스럽게 보관되어 다음과 같이 형성되었습니다
  
  첫 번째 Layer 화폐를 형성했고, Exchange 지폐는 두 번째 Layer를 형성했습니다.'
reviewed: false
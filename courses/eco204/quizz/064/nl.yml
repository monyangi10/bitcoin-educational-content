question: Wat was de rol van goudsmeden in het 13e-eeuwse Italië?
answer: Ze gaven rekeningen uit van Exchange in Exchange voor gestorte florijnen
wrong_answers:
  - Ze creëerden de eerste aandelenmarkt
  - Ze introduceerden het concept van de tijdswaarde van geld
  - Ze blokkeerden de toegang tot de Schelde
explanation: |
  In het 13e eeuwse Italië gaven goudsmeden biljetten uit van Exchange in Exchange
  
  voor ingelegde florijnen. Deze florijnen werden zorgvuldig bewaard in hun kluizen en vormden
  
  de eerste Layer van geld, terwijl de biljetten van Exchange een tweede Layer vormden
reviewed: false
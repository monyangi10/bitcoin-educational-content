question: 13वीं सदी के इटली में सुनारों की क्या भूमिका थी?
answer: उन्होंने जमा किए गए फ्लोरिन के लिए Exchange में Exchange के बिल जारी किए।
wrong_answers:
  - उन्होंने पहला शेयर बाजार बनाया
  - उन्होंने पैसे के समय मूल्य (Time Value of Money) का सिद्धांत पेश किया
  - उन्होंने शेल्ड नदी तक पहुँच बंद कर दी।
explanation: |
  13वीं सदी के इटली में, सुनारों ने Exchange के बिल Exchange में जारी किए थे।
  जमा किए गए फ्लोरिन के लिए। ये फ्लोरिन उनके तिजोरियों में सावधानी से रखे गए थे, जिससे बना
  पहला Layer पैसे का, जबकि Exchange के बिल दूसरा Layer बनाते हैं।
reviewed: false
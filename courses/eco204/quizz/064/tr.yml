question: Kuyumcuların 13. yüzyıl İtalya'sındaki rolü neydi?
answer: Yatırılan florinler için Exchange cinsinden Exchange bonoları çıkardılar
wrong_answers:
  - İlk borsayı onlar yarattı
  - Paranın zaman değeri kavramını ortaya attılar
  - Scheldt Nehri'ne erişimi engellediler
explanation: |
  13. yüzyıl İtalya'sında kuyumcular Exchange cinsinden Exchange faturaları düzenlediler
  
  yatırılan florinler için. Bu florinler kasalarında özenle saklanıyordu
  
  ilk Layer parasını oluştururken, Exchange banknotları ikinci Layer'yi oluşturmuştur
reviewed: false
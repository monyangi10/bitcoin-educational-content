question: Jaka była rola złotników w XIII-wiecznych Włoszech?
answer: Wystawili weksle wymiany w zamian za zdeponowane floreny
wrong_answers:
  - Stworzyli pierwszą giełdę papierów wartościowych
  - Wprowadzili koncepcję wartości pieniądza w czasie
  - Zablokowali dostęp do rzeki Skaldy
explanation: |
  W XIII-wiecznych Włoszech złotnicy wystawiali weksle wymiany w zamian za zdeponowane floreny. Floreny te były starannie przechowywane w skarbcach, tworząc pierwszą warstwę pieniądza, podczas gdy weksle wymiany tworzyły drugą.
reviewed: true

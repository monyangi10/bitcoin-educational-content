question: एकॉनमी में इन्फ्लेशन और डिफ्लेशन का क्या रिश्ता है?
answer: महंगाई और मंदी (डिफ्लेशन) एक अर्थव्यवस्था में जुड़े हुए बर्तनों की तरह होते हैं। उत्पादन बढ़ने से मंदी आ सकती है, लेकिन अगर पैसे Supply की मात्रा भी उसी समय बढ़ा दी जाए, तो मंदी का असर खत्म हो जाता है और महंगाई होने लगती है।
wrong_answers:
  - महंगाई और मंदी एक अर्थव्यवस्था में एक-दूसरे से स्वतंत्र होते हैं।
  - महंगाई हमेशा अर्थव्यवस्था में मंदी का कारण बनती है।
  - डिफ्लेशन हमेशा अर्थव्यवस्था में मुद्रास्फीति का कारण बनता है।
explanation: |
  अध्याय बताता है कि महंगाई और मंदी एक-दूसरे से बात करने जैसी हैं।
  एक अर्थव्यवस्था में वाहक। उत्पादन में वृद्धि से मुद्रास्फीति में कमी आ सकती है, लेकिन अगर
  पैसा Supply एक साथ बढ़ जाता है, तो मुद्रास्फीति-रोधी प्रभाव रद्द हो जाता है,
  जिससे महंगाई बढ़ गई।

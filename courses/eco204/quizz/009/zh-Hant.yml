question: 在一個經濟體系中，通貨膨脹和通貨緊縮之間的關係是什麼？
answer: 通貨膨脹與通貨緊縮就像是經濟體系中的溝通管道。生產的增加會導致通縮，但如果同時增加貨幣 Supply，通縮效應就會被抵消，從而導致通貨膨脹。
wrong_answers:
  - 在一個經濟體系中，通貨膨脹與通貨緊縮是彼此獨立的。
  - 在一個經濟體中，通貨膨脹總會導致通貨緊縮。
  - 通貨緊縮總是會導致經濟體的通貨膨脹。
explanation: |
  本章解釋了通貨膨脹和通貨緊縮就像溝通
  經濟體系中的船隻。生產的增加可能會導致通貨緊縮，但如果
  同時增加 Supply 錢，通縮效應就會被抵銷、
  導致通貨膨脹。
reviewed: false
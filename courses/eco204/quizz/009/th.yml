question: ความสัมพันธ์ระหว่างเงินเฟ้อและเงินฝืดในระบบเศรษฐกิจคืออะไร?
answer: อัตราเงินเฟ้อและเงินฝืดเปรียบเสมือนภาชนะสื่อสารในระบบเศรษฐกิจ การเพิ่มขึ้นของการผลิตสามารถนำไปสู่ภาวะเงินฝืด แต่หากมีการเพิ่มปริมาณเงินในเวลาเดียวกัน ผลกระทบของเงินฝืดจะถูกยกเลิก ส่งผลให้เกิดภาวะเงินเฟ้อ
wrong_answers:
  - อัตราเงินเฟ้อและภาวะเงินฝืดเป็นอิสระจากกันในระบบเศรษฐกิจ
  - อัตราเงินเฟ้อมักนำไปสู่ภาวะเงินฝืดในระบบเศรษฐกิจเสมอ
  - ภาวะเงินฝืดมักนำไปสู่ภาวะเงินเฟ้อในระบบเศรษฐกิจเสมอ
explanation: |
  บทนี้อธิบายว่าเงินเฟ้อและเงินฝืดเปรียบเสมือนภาชนะสื่อสารในระบบเศรษฐกิจ การเพิ่มขึ้นของการผลิตสามารถนำไปสู่เงินฝืด แต่หากมีการเพิ่มปริมาณเงินในเวลาเดียวกัน ผลกระทบของเงินฝืดจะถูกยกเลิก ส่งผลให้เกิดเงินเฟ้อ
reviewed: true
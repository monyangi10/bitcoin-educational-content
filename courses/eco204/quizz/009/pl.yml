question: Jaki jest związek między inflacją a deflacją w gospodarce?
answer: Inflacja i deflacja są jak naczynia połączone w gospodarce. Wzrost produkcji może prowadzić do deflacji, ale jeśli jednocześnie zwiększy się ilość pieniądza Supply, efekt deflacyjny zostanie zniwelowany, powodując inflację.
wrong_answers:
  - Inflacja i deflacja są niezależne od siebie w gospodarce.
  - Inflacja zawsze prowadzi do deflacji w gospodarce.
  - Deflacja zawsze prowadzi do inflacji w gospodarce.

question: Каква е връзката между инфлацията и дефлацията в една икономика?
answer: Инфлацията и дефлацията са като комуникационни съдове в една икономика. Увеличаването на производството може да доведе до дефлация, но ако едновременно с това се увеличи паричното предлагане, дефлационният ефект се неутрализира и се стига до инфлация.
wrong_answers:
  - Инфлацията и дефлацията са независими една от друга в една икономика.
  - Инфлацията винаги води до дефлация в една икономика.
  - Дефлацията винаги води до инфлация в една икономика.
explanation: |
  В главата се обяснява, че инфлацията и дефлацията са като общуване
  съдове в икономиката. Увеличаването на производството може да доведе до дефлация, но ако
  паричното предлагане се увеличава едновременно, дефлационният ефект се неутрализира,
  което води до инфлация.
reviewed: true
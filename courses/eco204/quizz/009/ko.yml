question: 경제에서 인플레이션과 디플레이션의 관계는 무엇인가요?
answer: 인플레이션과 디플레이션은 경제에서 소통하는 그릇과 같습니다. 생산량이 증가하면 디플레이션이 발생할 수 있지만, 통화량이 동시에 증가하면 디플레이션 효과가 상쇄되어 인플레이션이 발생하게 됩니다.
wrong_answers:
  - 경제에서 인플레이션과 디플레이션은 서로 독립적입니다.
  - 인플레이션은 항상 경제에서 디플레이션으로 이어집니다.
  - 디플레이션은 항상 경제에서 인플레이션으로 이어집니다.
explanation: |
  이 장에서는 인플레이션과 디플레이션이 마치 경제에서 소통하는
  선박과 같다고 설명합니다. 생산량이 증가하면 디플레이션이 발생할 수 있지만, 동시에
  화폐 Supply이 동시에 증가하면 디플레이션 효과가 상쇄됩니다,
  인플레이션이 발생하게 됩니다.

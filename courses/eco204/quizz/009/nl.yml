question: Wat is de relatie tussen inflatie en deflatie in een economie?
answer: Inflatie en deflatie zijn als communicerende vaten in een economie. Een verhoging van de productie kan leiden tot deflatie, maar als tegelijkertijd de geldhoeveelheid Supply wordt verhoogd, wordt het deflatoire effect tenietgedaan, wat resulteert in inflatie.
wrong_answers:
  - Inflatie en deflatie zijn onafhankelijk van elkaar in een economie.
  - Inflatie leidt altijd tot deflatie in een economie.
  - Deflatie leidt altijd tot inflatie in een economie.
explanation: |
  Het hoofdstuk legt uit dat inflatie en deflatie als communicerende
  schepen in een economie. Een productiestijging kan leiden tot deflatie, maar als het
  geld Supply tegelijkertijd wordt verhoogd, wordt het deflatoire effect tenietgedaan,
  wat resulteert in inflatie.

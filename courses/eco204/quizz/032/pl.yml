question: Jaki był cel  banknotów Notgeld podczas kryzysu gospodarczego w Niemczech?
answer: Został zaprojektowany w celu rozwiązania problemu niedoboru wspólnej waluty.
wrong_answers:
  - Został wykorzystany do wypłacenia reparacji wojennych.
  - Była to forma protestu przeciwko rządowi.
  - Był to sposób na pobudzenie gospodarki.
explanation: |
  W obliczu kryzysu monetarnego i gospodarczego Niemcy uciekły się do Notgeld
  (pieniądze awaryjne). Banknoty te, drukowane przez miasta lub określone firmy, zostały zaprojektowane, aby rozwiązać problem niedoboru wspólnej waluty.
reviewed: true

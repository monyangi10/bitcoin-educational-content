question: Каква е била целта на Notgeld по време на икономическата криза в Германия?
answer: Тя е създадена, за да се справи с недостига на обща валута.
wrong_answers:
  - Тя е използвана за изплащане на военни репарации.
  - Това беше форма на протест срещу правителството.
  - Това беше начин да се стимулира икономиката.
explanation: |
  Изправена пред паричната и икономическата криза, Германия прибягва до Notgeld
  (спешни пари). Тези банкноти, отпечатани от градове или определени компании, бяха предназначени за
  да се справят с недостига на обща валута.
reviewed: true
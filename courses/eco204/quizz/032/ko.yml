question: 독일 경제 위기 당시 노트겔트의 목적은 무엇이었나요?
answer: 이는 공통 통화 부족을 해소하기 위해 고안된 것입니다.
wrong_answers:
  - 전쟁 배상금을 지불하는 데 사용되었습니다.
  - 이는 정부에 대한 일종의 항의였습니다.
  - 경제를 활성화하기 위한 방법이었습니다.
explanation: |
  통화 및 경제 위기에 직면한 독일은 노트겔트(Notgeld)
  (긴급 자금)에 의존했습니다. 도시나 특정 회사에서 인쇄한 이 지폐는 공통 통화가 부족한
  일반 화폐의 부족을 해결하기 위해 고안되었습니다.
reviewed: false
question: नॉटगेल्ड (Notgeld) का उद्देश्य जर्मनी में आर्थिक संकट के दौरान क्या था?  

वह पैसे की कमी को पूरा करने के लिए था, खासकर प्रथम विश्व युद्ध और हाइपरइन्फ्लेशन (मुद्रास्फीति) के दौरान। जब सरकारी मुद्रा (ऑफिशियल करेंसी) की कमी हो गई, तो स्थानीय अधिकारियों और कंपनियों ने अपने खुद के "इमरजेंसी मनी" (Notgeld) जारी किए ताकि लेन-देन चलता रहे। बाद में, यह कलेक्टर्स के लिए सजावटी और यादगार नोट्स के रूप में भी प्रसिद्ध हो गया।
answer: इसे Address सामान्य मुद्रा की कमी को पूरा करने के लिए डिज़ाइन किया गया था।
wrong_answers:
  - इसका इस्तेमाल युद्ध की क्षतिपूर्ति भुगतान के लिए किया गया था।
  - यह सरकार के खिलाफ एक तरह का विरोध था।
  - यह अर्थव्यवस्था को उत्तेजित करने का एक तरीका था।
explanation: |
  मौद्रिक और आर्थिक संकट का सामना करते हुए, जर्मनी ने नोटगेल्ड का सहारा लिया।
  (आपातकालीन पैसा)। ये नोट, जो शहरों या कुछ कंपनियों द्वारा छापे गए थे, बनाए गए थे
  Address को आम मुद्रा की कमी।
reviewed: false
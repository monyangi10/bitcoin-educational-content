question: Wat was het doel van Notgeld tijdens de economische crisis in Duitsland?
answer: Het was ontworpen om Address een tekort aan gemeenschappelijke valuta.
wrong_answers:
  - Het werd gebruikt om oorlogsvergoedingen te betalen.
  - Het was een vorm van protest tegen de regering.
  - Het was een manier om de economie te stimuleren.
explanation: |
  Geconfronteerd met de monetaire en economische crisis nam Duitsland zijn toevlucht tot Notgeld
  (noodgeld). Deze biljetten, gedrukt door steden of bepaalde bedrijven, waren bedoeld
  om een tekort aan gemeenschappelijke valuta op te vangen.
reviewed: false
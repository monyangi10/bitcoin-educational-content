question: วัตถุประสงค์ของ Notgeld ในช่วงวิกฤตเศรษฐกิจในเยอรมนีคืออะไร?
answer: มันถูกออกแบบมาเพื่อแก้ไขปัญหาการขาดแคลนสกุลเงินทั่วไป
wrong_answers:
  - มันถูกใช้เพื่อจ่ายค่าชดเชยสงคราม
  - มันเป็นรูปแบบหนึ่งของการประท้วงต่อต้านรัฐบาล
  - มันเป็นวิธีหนึ่งในการกระตุ้นเศรษฐกิจ
explanation: |
  เผชิญกับวิกฤตการเงินและเศรษฐกิจ เยอรมนีหันไปใช้ Notgeld
  (เงินฉุกเฉิน) ธนบัตรเหล่านี้ซึ่งพิมพ์โดยเมืองหรือบริษัทบางแห่ง ถูกออกแบบมาเพื่อแก้ไขปัญหาการขาดแคลนสกุลเงินทั่วไป
reviewed: true
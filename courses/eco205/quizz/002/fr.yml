question: En quelle année et dans quelle ville l'école autrichienne d'économie a-t-elle été fondée avec la publication des Principes d'économie politique de Carl Menger?
answer: 1871 à Vienne
wrong_answers:
  - 1867 à Berlin
  - 1875 à Prague
  - 1869 à Budapest
explanation: |
  L'école autrichienne d'économie est née à Vienne en 1871 avec la publication des Principes d'économie politique de Carl Menger. Cette date marque le début officiel de cette tradition intellectuelle qui allait révolutionner la pensée économique. Les autres dates et villes proposées sont incorrectes car elles ne correspondent pas à cet événement fondateur historique de l'école autrichienne.

question: In what year and in what city was the Austrian School of Economics founded with the publication of Carl Menger's Principles of Political Economy?
answer: 1871 in Vienna
wrong_answers:
  - 1867 in Berlin
  - 1875 in Prague
  - 1869 in Budapest
explanation: |
  The Austrian School of Economics was born in Vienna in 1871, with the publication of Carl Menger's Principles of Political Economy. This date marks the official beginning of an intellectual tradition that was to revolutionize economic thought. The other proposed dates and cities are incorrect, as they do not correspond to this historic founding event of the Austrian school.
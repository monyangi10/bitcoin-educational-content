question: In the Austrian view, how does competition contribute to economic efficiency?
answer: It works like a discovery process that reveals the best opportunity cost of each resource
wrong_answers:
  - "It maintains a perfect balance between supply and demand by automatically adjusting prices"
  - It eliminates inefficient entrepreneurs and keeps only the most innovative and destructive
  - It allows consumers to choose rationally between perfectly known alternatives
explanation: |
  According to Austrian theory, competition is an epistemic mechanism of permanent discovery, enabling economic players to gradually discover the best use of each resource. This dynamic process maximizes the use of scarce factors and limits waste thanks to the coordination of dispersed information, contrary to static visions of perfect equilibrium or creative destruction.
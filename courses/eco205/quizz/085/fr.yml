question: Dans la vision autrichienne, comment la concurrence contribue-t-elle à l'efficacité économique?
answer: Elle fonctionne comme un processus de découverte qui révèle le meilleur coût d'opportunité de chaque ressource
wrong_answers:
  - "Elle maintient un équilibre parfait entre l'offre et la demande par l'ajustement automatique des prix"
  - Elle élimine les entrepreneurs inefficaces pour ne conserver que les plus innovants et destructeurs
  - Elle permet aux consommateurs de choisir rationnellement entre des alternatives parfaitement connues
explanation: |
  Selon la théorie autrichienne, la concurrence est un mécanisme épistémique de découverte permanente qui permet aux acteurs économiques de découvrir progressivement le meilleur usage de chaque ressource. Ce processus dynamique maximise l'utilisation des facteurs rares et limite le gaspillage grâce à la coordination de l'information dispersée, contrairement aux visions statiques d'équilibre parfait ou de destruction créatrice.

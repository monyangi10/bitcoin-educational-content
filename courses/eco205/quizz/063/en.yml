question: What does capital represent in the productive structure according to the Austrian school?
answer: The entire productive structure, from original factors to final consumer goods
wrong_answers:
  - A homogeneous mass of easily measurable and interchangeable production goods
  - Only machines and equipment used directly for final production
  - Financial resources available to invest in new productive projects
explanation: |
  According to the Austrian school of thought, capital represents the entire complex productive structure, including all stages from original factors such as land to the final production of consumer goods. This contrasts with the neoclassical view, which treats capital as a homogeneous mass. The Austrians emphasize the heterogeneity and complexity of this structure, where each intermediate stage contributes to the continuous improvement of the productive process thanks to entrepreneurial investment.
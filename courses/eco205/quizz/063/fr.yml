question: Que représente le capital dans la structure productive selon l'école autrichienne?
answer: L'ensemble de la structure productive depuis les facteurs originels jusqu'aux biens de consommation finale
wrong_answers:
  - Une masse homogène de biens de production facilement mesurable et interchangeable
  - Uniquement les machines et équipements utilisés directement pour la production finale
  - Les ressources financières disponibles pour investir dans de nouveaux projets productifs
explanation: |
  Selon l'école autrichienne, le capital représente l'ensemble de la structure productive complexe, incluant toutes les étapes depuis les facteurs originels comme la terre jusqu'à la production finale des biens de consommation. Cette vision s'oppose à la conception néoclassique qui traite le capital comme une masse homogène. Les autrichiens insistent sur l'hétérogénéité et la complexité de cette structure, où chaque étape intermédiaire contribue à l'amélioration continue du processus productif grâce aux investissements des entrepreneurs.

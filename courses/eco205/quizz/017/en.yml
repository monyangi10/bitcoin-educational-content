question: What does the principle of diminishing marginal utility mean according to the marginalist revolution?
answer: With each additional consumption of the same good, the satisfaction obtained decreases progressively
wrong_answers:
  - The more a good is consumed, the higher its objective market value
  - "Satisfaction remains constant whatever the quantity of a good consumed"
  - "The first unit of a good provides less satisfaction than subsequent units."
explanation: |
  The principle of diminishing marginal utility explains that once a need has been satisfied, an additional unit of the same good no longer represents the same value for the consumer. For example, someone who already owns a computer will not place the same value on a second unit. This progressive decrease in satisfaction with each additional consumption is a fundamental concept of the marginalist theory developed in the 1870s.
question: Que signifie le principe de l'utilité marginale décroissante selon la révolution marginaliste?
answer: À chaque consommation supplémentaire d'un même bien, la satisfaction obtenue diminue progressivement
wrong_answers:
  - Plus on consomme un bien, plus sa valeur objective sur le marché augmente
  - "La satisfaction reste constante quelle que soit la quantité consommée d'un bien"
  - "La première unité d'un bien procure moins de satisfaction que les unités suivantes"
explanation: |
  Le principe de l'utilité marginale décroissante explique qu'une fois un besoin satisfait, une unité supplémentaire du même bien ne représente plus la même valeur pour le consommateur. Par exemple, celui qui possède déjà un ordinateur n'accordera pas la même valeur à un second appareil. Cette diminution progressive de la satisfaction à chaque consommation supplémentaire est un concept fondamental de la théorie marginaliste développée dans les années 1870.

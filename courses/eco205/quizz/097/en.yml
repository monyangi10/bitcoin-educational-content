question: According to Carl Menger and Ludwig von Mises, why is scarcity a fundamental principle for understanding the nature of money?
answer: Without scarcity, man would not know need and would never seek to act, so money must reflect this fundamental economic reality
wrong_answers:
  - "Scarcity only makes it possible to maintain price stability and avoid inflation in a market economy"
  - "Scarcity guarantees that only central institutions can effectively control the money supply and its distribution."
  - "Scarcity mainly ensures the convertibility of money into tangible goods such as physical gold or silver."
explanation: |
  Menger explains that property and the human economy are the solution to the problem of the disparity between human needs and available goods. Mises develops this idea by asserting that without scarcity, man would not know need and would not act. Money, though unique, must reflect this fundamental reality of scarcity if it is to be consistent with what it represents in the economy.
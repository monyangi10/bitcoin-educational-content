question: Selon Carl Menger et Ludwig von Mises, pourquoi la rareté est-elle un principe fondamental pour comprendre la nature de la monnaie?
answer: Sans rareté, l'homme ne connaîtrait pas le besoin et ne chercherait jamais à agir, la monnaie doit donc refléter cette réalité économique fondamentale
wrong_answers:
  - "La rareté permet uniquement de maintenir la stabilité des prix et d'éviter l'inflation dans l'économie de marché"
  - "La rareté garantit que seules les institutions centrales peuvent contrôler efficacement l'offre monétaire et sa distribution"
  - "La rareté assure principalement la convertibilité de la monnaie en biens tangibles comme l'or ou l'argent physique"
explanation: |
  Menger explique que la propriété et l'économie humaine constituent la solution au problème de la disparité entre besoins humains et biens disponibles. Mises développe cette idée en affirmant que sans rareté, l'homme ne connaîtrait pas le besoin et n'agirait pas. La monnaie, bien qu'unique, doit refléter cette réalité fondamentale de rareté pour être cohérente avec ce qu'elle représente dans l'économie.

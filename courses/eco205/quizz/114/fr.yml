question: Quel est le rôle principal du processus de découverte des prix dans une économie de marché libre selon l'école autrichienne?
answer: Il permet la coordination économique décentralisée sans planificateur central grâce aux échanges volontaires
wrong_answers:
  - Il établit une égalité parfaite entre la valeur subjective et le prix objectif des biens échangés
  - Il garantit que tous les coûts de production soient entièrement répercutés dans les prix finaux
  - Il assure une distribution équitable des richesses en fixant des prix justes pour tous les participants
explanation: |
  Le processus de découverte des prix permet la coordination économique dans une société complexe sans qu'aucun planificateur central ne détermine les prix. Chaque transaction contribue à cette découverte collective où les prix émergent naturellement des échanges volontaires entre individus aux valorisations différentes. Les autres options sont incorrectes car l'école autrichienne rejette l'idée d'égalité entre valeur et prix (la valeur reste subjective), nie que les coûts déterminent les prix (c'est l'inverse), et ne vise pas la distribution équitable mais l'efficacité coordinatrice.

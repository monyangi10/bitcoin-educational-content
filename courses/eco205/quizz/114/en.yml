question: What is the main role of the price discovery process in a free market economy according to the Austrian school?
answer: It enables decentralized economic coordination without a central planner, thanks to voluntary exchanges
wrong_answers:
  - It establishes perfect equality between the subjective value and the objective price of the goods exchanged
  - It ensures that all production costs are fully reflected in the final price
  - It ensures equitable distribution of wealth by setting fair prices for all participants
explanation: |
  The price discovery process enables economic coordination in a complex society, with no central planner determining prices. Each transaction contributes to this collective discovery, where prices emerge naturally from voluntary exchanges between individuals with different valuations. The other options are incorrect, as the Austrian school rejects the idea of equality between value and price (value remains subjective), denies that costs determine prices (it's the other way around), and aims not at equitable distribution but at coordinating efficiency.
question: Selon l'école autrichienne, que se passe-t-il naturellement dans une économie à monnaie saine lorsque les taux d'intérêt sont fixés artificiellement bas?
answer: La pénurie d'épargne se reflète dans la réduction du capital disponible, entraînant une hausse naturelle des taux qui rétablit l'équilibre
wrong_answers:
  - "L'épargne augmente automatiquement pour compenser les taux bas et maintenir l'équilibre du marché des capitaux"
  - Les entrepreneurs réduisent leurs investissements dans les étapes éloignées de la consommation pour préserver le capital
  - "La préférence temporelle collective s'ajuste spontanément vers une valorisation plus forte du futur par rapport au présent"
explanation: |
  Dans une économie à monnaie saine, la manipulation artificielle des taux d'intérêt est impossible car le marché corrige automatiquement les déséquilibres. Lorsque les taux sont fixés trop bas, cela crée une demande excessive de capital qui ne correspond pas à l'épargne réelle disponible. Cette pénurie d'épargne se traduit concrètement par une réduction du capital disponible, ce qui pousse naturellement les taux à remonter jusqu'à retrouver l'équilibre entre l'offre et la demande de capital. Les autres réponses décrivent des mécanismes qui ne correspondent pas au fonctionnement naturel du marché des capitaux selon la théorie autrichienne.

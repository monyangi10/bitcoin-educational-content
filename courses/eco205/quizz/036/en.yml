question: What are the three methodological pillars of the Austrian school of economics?
answer: Methodological subjectivism, methodological individualism and praxeology
wrong_answers:
  - Empiricism, inductivism and quantitative econometrics
  - Rationalism, methodological collectivism and historicism
  - Positivism, dialectical materialism and statistical analysis
explanation: |
  The three methodological pillars of the Austrian school are methodological subjectivism (which recognizes that values are subjective), methodological individualism (which places the individual as the fundamental unit of analysis) and praxeology (the formal study of human action). These three elements form a coherent whole that radically distinguishes the Austrian approach from other economic schools that emphasize empiricism and quantitative methods.
question: Quels sont les trois piliers méthodologiques de l'école autrichienne d'économie?
answer: Subjectivisme méthodologique, individualisme méthodologique et praxéologie
wrong_answers:
  - Empirisme, inductivisme et économétrie quantitative
  - Rationalisme, collectivisme méthodologique et historicisme
  - Positivisme, matérialisme dialectique et analyse statistique
explanation: |
  Les trois piliers méthodologiques de l'école autrichienne sont le subjectivisme méthodologique (qui reconnaît que les valeurs sont subjectives), l'individualisme méthodologique (qui place l'individu comme unité d'analyse fondamentale) et la praxéologie (l'étude formelle de l'action humaine). Ces trois éléments forment un ensemble cohérent qui distingue radicalement l'approche autrichienne des autres écoles économiques qui privilégient l'empirisme et les méthodes quantitatives.

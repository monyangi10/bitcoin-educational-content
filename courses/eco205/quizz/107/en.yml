question: According to the Austrian school, what is the fundamental difference between their vision of the origin of money and that of mainstream economists and modern monetary theory?
answer: Austrians see money as emerging from a natural, spontaneous market process, while mainstreamers see it as an institutional creation controlled by central authorities
wrong_answers:
  - "Austrians believe that money should be based on gold, while mainstreamers favor fiat money issued by central banks"
  - "Austrians believe that currency is the result of international trade agreements, while mainstreamers see it as a product of technological evolution"
  - "Austrians see currency as an instrument of economic policy, while mainstreamers see it as a mere facilitator of trade."
explanation: |
  This fundamental theoretical opposition structures the entire debate on the origin of money. Carl Menger and the Austrian school defend the idea of spontaneous emergence through natural market selection, where agents progressively choose the most exchangeable goods. Conversely, mainstream economists and modern monetary theory see money as an institution created and controlled by the authorities, requiring state intervention to exist and function.